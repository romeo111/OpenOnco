name: Score Research Reports

on:
  pull_request:
    paths:
      - 'research_db/**/reports/*_report.json'
      - 'experiment_reports/**/*_report.json'

jobs:
  score:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Find new/changed report files
        id: find_reports
        run: |
          # Get list of changed report JSON files vs. base branch
          git fetch origin ${{ github.base_ref }} --depth=1
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '_report\.json$' || true)
          echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Found $(echo "$CHANGED" | grep -c '_report.json' || echo 0) report(s)"

      - name: Score all changed reports
        id: score
        run: |
          CHANGED="${{ steps.find_reports.outputs.changed_files }}"
          if [ -z "$CHANGED" ]; then
            echo "No report files changed."
            echo "score_table=No report files changed in this PR." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ROWS=""
          PASS_COUNT=0
          FAIL_COUNT=0
          TOTAL_SCORE=0
          REPORT_COUNT=0

          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            if [ ! -f "$FILE" ]; then
              ROWS="${ROWS}\n| \`$FILE\` | FILE NOT FOUND | — | ❌ |"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              continue
            fi

            OUTPUT=$(python evaluate.py "$FILE" --score-only 2>&1)
            EXIT_CODE=$?

            SCORE=$(echo "$OUTPUT" | grep -oP '[\d]+(?=/100)' | head -1 || echo "0")

            if [ "$EXIT_CODE" -eq 0 ] && [ -n "$SCORE" ]; then
              TOTAL_SCORE=$((TOTAL_SCORE + SCORE))
              REPORT_COUNT=$((REPORT_COUNT + 1))
              if [ "$SCORE" -ge 80 ]; then
                STATUS="✅ PASS"
                PASS_COUNT=$((PASS_COUNT + 1))
              else
                STATUS="❌ FAIL (<80)"
                FAIL_COUNT=$((FAIL_COUNT + 1))
              fi
              ROWS="${ROWS}\n| \`$FILE\` | $SCORE/100 | — | $STATUS |"
            else
              ROWS="${ROWS}\n| \`$FILE\` | ERROR | \`$OUTPUT\` | ❌ |"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          done <<< "$CHANGED"

          # Compute mean
          if [ "$REPORT_COUNT" -gt 0 ]; then
            MEAN=$((TOTAL_SCORE / REPORT_COUNT))
          else
            MEAN=0
          fi

          # Build markdown table
          TABLE="## Cancer Research Report Scores\n\n"
          TABLE="${TABLE}| File | Score | Notes | Status |\n"
          TABLE="${TABLE}|---|---|---|---|\n"
          TABLE="${TABLE}${ROWS}\n\n"
          TABLE="${TABLE}**Mean score:** ${MEAN}/100 across ${REPORT_COUNT} report(s).  \n"
          TABLE="${TABLE}**Pass threshold:** 80/100  \n"
          if [ "$FAIL_COUNT" -eq 0 ]; then
            TABLE="${TABLE}\n✅ All reports meet quality threshold."
          else
            TABLE="${TABLE}\n❌ ${FAIL_COUNT} report(s) below threshold — revise before merging."
          fi

          echo "score_table<<EOF" >> "$GITHUB_OUTPUT"
          printf "$TABLE" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "fail_count=$FAIL_COUNT" >> "$GITHUB_OUTPUT"

      - name: Post score comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.score.outputs.score_table }}

            ---
            *Scored by [evaluate.py](../blob/${{ github.head_ref }}/evaluate.py) — [Schema Reference](../blob/${{ github.head_ref }}/docs/SCHEMA_REFERENCE.md)*`;

            // Find existing bot comment and update it, or create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Cancer Research Report Scores')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if any reports below threshold
        if: steps.score.outputs.fail_count != '0'
        run: |
          echo "One or more reports scored below 80/100. Fix and re-push."
          exit 1
