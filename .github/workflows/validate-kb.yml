name: Validate Knowledge Base

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "knowledge_base/**"
      - "specs/**"
      - "scripts/**"
      - "tests/**"
      - "docs/try.html"
      - "docs/ukr/try.html"
      - "docs/style.css"
      - "docs/sw.js"
      - "docs/manifest.webmanifest"
      - "pyproject.toml"
      - ".github/workflows/validate-kb.yml"
  push:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate YAML schema + referential integrity
        run: |
          python scripts/audit_validator.py --human

      - name: Run tests
        run: |
          python -m pytest tests/ -v

      - name: Lint (non-blocking)
        continue-on-error: true
        run: |
          python -m ruff check knowledge_base/ tests/
