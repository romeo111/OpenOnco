name: Validate Knowledge Base

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "knowledge_base/**"
      - "specs/**"
      - "scripts/**"
      - "tests/**"
      - "docs/try.html"
      - "docs/ukr/try.html"
      - "docs/style.css"
      - "docs/sw.js"
      - "docs/manifest.webmanifest"
      - "pyproject.toml"
      - ".github/workflows/validate-kb.yml"
  push:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate YAML schema + referential integrity
        run: |
          python scripts/audit_validator.py --human

      - name: Run tests
        run: |
          python -m pytest \
            tests/test_audit_validator_contracts.py \
            tests/test_run_scheduled_audit.py \
            tests/test_audit_writers.py \
            tests/test_algorithm_regimen_routing_contracts.py \
            tests/test_legacy_regimen_normalization.py \
            tests/test_esophageal_1l_algorithm.py \
            tests/test_build_site.py::test_static_assets_present \
            tests/test_build_site.py::test_try_page_wires_pyodide_and_form \
            tests/test_build_site.py::test_try_page_has_pwa_manifest_and_build_status \
            -v

      - name: Lint (non-blocking)
        continue-on-error: true
        run: |
          python -m ruff check knowledge_base/ tests/
