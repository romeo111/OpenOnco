  - Colorectal Cancer
  - Endometrial Cancer
  - Villous Adenoma
  reason: >-
    BMA-MLH1-SOMATIC-GASTRIC already has evidence_sources populated on master
    at HEAD (EID1680, EID1315) from a prior backfill pass. The upsert script
    replaces evidence_sources wholesale; emitting an idempotent rewrite of
    the same two EIDs adds noise without changing master state. The
    2026-04-25 CIViC snapshot reproduces the same two items with identical
    molecular_profile / disease / level / direction / significance / therapies.
    Recording as already_backfilled rather than silently skipping (chunk-spec
    rejection criterion 'Any manifest ID is silently skipped' requires every
    manifest ID to have a documented outcome). Maintainer call. If a future
    CIViC snapshot adds new MLH1 + Stomach-Carcinoma items, a follow-up
    backfill chunk can re-run the match and emit a true upsert.
