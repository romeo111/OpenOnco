id: BMA-MSH6-GERMLINE-UROTHELIAL
biomarker_id: BIO-DMMR-IHC
variant_qualifier: MSH6 germline loss-of-function (dMMR / MSI-H)
disease_id: DIS-UROTHELIAL
escat_tier: IA
evidence_summary: 'MSH6 germline loss-of-function in urothelial produces dMMR/MSI-H
  phenotype. Pan-tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab
  per GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval. MSI-H
  in urothelial is rare (~3-5%); pembrolizumab tissue-agnostic applies.

  '
evidence_summary_ua: 'MSH6 герміногенний втрата функції in urothelial produces dMMR/MSI-H
  фенотип. Pan-пухлина MSI-H ICI eligibility (пембролізумаб per KEYNOTE-158, dostarlimab
  per GARNET) supersedes пухлина-specific lines via tissue-agnostic FDA схвалення.
  MSI-H in urothelial is рідкісний (~3-5%); пембролізумаб tissue-agnostic applies.

  '
