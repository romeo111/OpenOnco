  note: 'CIViC snapshot 2026-04-25: Predictive evidence — MSH6 LOSS in Transitional
    Cell Carcinoma. Supports Sensitivity/Response to Durvalumab and anti-PD-1
    monoclonal antibody MEDI0680. Disease-token overlap with DIS-UROTHELIAL
    (Transitional Cell Carcinoma is the CIViC term for urothelial carcinoma).
    Alteration class: CIViC encodes "LOSS" (IHC loss-of-protein) which captures
    the dMMR phenotype targeted by BMA biomarker_id=BIO-DMMR-IHC; germline vs
    somatic origin is not distinguished at the IHC level. Therapy anchors are
    PD-1/PD-L1 ICIs, consistent with pan-tumor MSI-H label. PMID associated with
    item per CIViC URL https://civicdb.org/links/evidence_items/1878.'
actionability_review_required: true
notes: 'Germline MSH6 loss → cascade testing mandatory (Lynch syndrome). Family meets
  Amsterdam/Bethesda criteria. Pan-tumor MSI-H ICI eligibility supersedes tumor- specific
  lines.

