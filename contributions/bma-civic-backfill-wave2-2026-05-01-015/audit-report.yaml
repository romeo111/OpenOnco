  verdict: gene_absent_from_civic
  civic_gene_evidence_count_any_disease: 0
  no_civic_match_reason: 'CIViC does not catalog IGHV mutational status as a
    molecular profile; gene tokens IGHV / IGH return zero accepted evidence items
    in snapshot 2026-04-25. IGHV is a clinical risk-stratifier (sequencing of
    IGHV gene segments to determine somatic hypermutation status) rather than a
    point-mutation or copy-number variant of the type CIViC curates. Hosted file
    cites SRC-NCCN-BCELL-2025, SRC-ESMO-CLL-2024, SRC-MOZ-UA-CLL-2022 plus
    foundational trials (CLL14 Fischer NEJM 2019, ECOG E1912 Shanafelt NEJM 2019)
    — these remain the appropriate primary sources, no CIViC supplement available.'
