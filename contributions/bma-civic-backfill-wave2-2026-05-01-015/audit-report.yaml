  disease_id: DIS-GASTRIC
  verdict: gene_in_civic_no_disease_overlap
  civic_gene_evidence_count_any_disease: 7
  no_civic_match_reason: 'MSH2 has 7 accepted CIViC evidence items in snapshot
    2026-04-25, but none is annotated to gastric cancer (DOID:10534) or stomach
    cancer. CIViC MSH2 evidence covers Endometrial Cancer (EID1790, EID1837),
    Colorectal Cancer (EID1826, EID1827, EID1834), Transitional Cell Carcinoma
    (EID1877), and pan-tumor "Cancer" with combined MSH2/MLH1 Loss + Nivolumab
    (EID11677). The pan-tumor item EID11677 (variant "Loss OR MLH1 Loss",
    disease "Cancer", DOID:162) is intentionally excluded here because (a) its
    variant phrasing is a logical OR over MLH1 + MSH2 rather than MSH2-specific
    and (b) including it would constitute cross-disease borrowing prohibited by
    chunk-spec. Hosted KEYNOTE-158 / KEYNOTE-859 / CheckMate-649 evidence is
    appropriately captured via SRC-NCCN-GASTRIC-2025 / SRC-ESMO-GASTRIC-2024.'
- bma_id: BMA-PMS2-SOMATIC-PROSTATE
