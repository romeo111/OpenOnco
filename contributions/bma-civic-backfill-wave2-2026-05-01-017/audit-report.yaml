    Carcinoma (2), and generic "Cancer" (1, entrectinib does-not-support).
    No salivary-gland-annotated evidence; generic "Cancer" rejected per
    match-method. Hosted content (larotrectinib / entrectinib tumor-agnostic
    NTRK-fusion approvals) remains backed by SRC-FDA-CDS-2026.'
  evidence_consulted:
  - source: civic-snapshot-2026-04-25
    query: gene == "NTRK3" AND disease contains any-of ("salivary")
    hits: 0
  - source: civic-snapshot-2026-04-25
    query: gene == "NTRK3"
    hits: 4
    diseases:
    - 'Gastrointestinal Stromal Tumor (1)'
    - 'Lung Non-small Cell Carcinoma (2)'
    - 'Cancer / tissue-agnostic (1)'
  - source: civic-snapshot-2026-04-25
    query: gene == "NTRK1"
    hits: 5
    note: 'Reviewed but not applicable — variant_qualifier specifies NTRK3 fusion partner.'

- bma_id: BMA-RAD51C-GERMLINE-BREAST
  biomarker_id: BIO-HRR-PANEL
  variant_qualifier: 'RAD51C germline pathogenic'
  disease_id: DIS-BREAST
