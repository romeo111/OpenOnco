  - NTRK3
  variant_aware_gene_resolved: NTRK3
  verdict: gene_in_civic_no_disease_overlap
  civic_gene_evidence_count_any_disease: 4
  rationale: 'Variant-aware extraction: variant_qualifier "ETV6-NTRK3 fusion"
    yields HGNC symbol NTRK3 (fusion-partner-specific). NTRK3 has 4 CIViC
    evidence items in snapshot 2026-04-25, distributed across Gastrointestinal
