- bma_id: BMA-NTRK-FUSION-CRC
  outcome: no_civic_match
  hosted_state_before: 'evidence_sources: [] (empty)'
  proposed_action: none
  rationale: |
    CIViC snapshot 2026-04-25 contains 9 accepted evidence items across
    NTRK1 (5), NTRK2 (0), NTRK3 (4). None have a colorectal disease token
    (search: disease contains "colon"/"colorectal"/"rectal"). The fusion-
    specific NTRK entries are catalogued in NSCLC and GIST, not CRC.
    Synonym expansion checked: also queried fusion partners
    (TPM3, LMNA, TFG, ETV6) for CRC disease overlap — none in snapshot.
