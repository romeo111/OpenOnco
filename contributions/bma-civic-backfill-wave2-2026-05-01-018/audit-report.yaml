- bma_id: BMA-CD30-CHL
  outcome: no_civic_match
  hosted_state_before: 'evidence_sources: [] (empty)'
  proposed_action: none
  rationale: |
    CIViC snapshot 2026-04-25 contains zero accepted evidence items where
    gene == "CD30" or gene == "TNFRSF8" (the official HGNC symbol for CD30).
    Synonym expansion: also checked "CD30" molecular_profile substring
    matches — none found. CD30 is universally expressed on Reed-Sternberg
    cells in classical Hodgkin lymphoma and is essentially a histologic-
    confirmation gate (per hosted notes, ESCAT IA / OncoKB Level 1) — the
    actionable evidence base lives in the brentuximab vedotin clinical
    program (ECHELON-1, AETHERA, CheckMate-744) which CIViC has not
    catalogued at the EID level.
  no_civic_match_reason: 'gene_absent_from_civic_snapshot'
  evidence_used:
  - civic_snapshot: 2026-04-25
  - hosted_file: knowledge_base/hosted/content/biomarker_actionability/bma_cd30_chl.yaml
  recommended_followup: 'Source-gap remains: ingest SRC-ECHELON-1 (Ansell NEJM
    2022, PMID: 35353261), SRC-AETHERA (Younes Lancet 2015, PMID: 25796459),
    SRC-CHECKMATE-744 (pediatric R/R cHL) as primary_sources for the BV
    evidence base. Already noted in hosted notes field. CIViC backfill not
    applicable.'

- bma_id: BMA-KIT-EXON9-GIST
  outcome: already_populated_no_action_taken
  hosted_state_before: 'evidence_sources contains 16 SRC-CIVIC blocks
    spanning ~62 EIDs across CIViC levels A/B/C/D'
  proposed_action: none
  rationale: |
    Hosted file already has a richly populated evidence_sources block from
    a prior backfill pass. Re-running variant-aware filter
    (gene == "KIT" AND variant matches "Exon 9" AND disease matches
    "Gastrointestinal Stromal Tumor") yields a strict subset of 8 EIDs:
    EID1221, EID1223, EID1424, EID2466, EID2477, EID4104, EID4139, EID4628.
    The hosted block contains these 8 EIDs plus ~54 additional KIT-gene
    EIDs whose variants are NOT "Exon 9" (e.g. specific point mutations,
    other-exon variants). Removing the broader 54 EIDs would be a
    destructive narrowing of an already-reviewer-pending block; preserving
    the over-broad list lets the maintainer adjudicate whether the wider
    KIT panel is intended (clinically reasonable for a gene-level link)
    versus the strict variant-aware interpretation. No upsert proposed
    in this chunk to avoid silently dropping existing CIViC references
    pending Co-Lead signoff.
  variant_aware_strict_eids:
  - EID1221  # Imatinib, Sensitivity/Response, level A, PMID 16624552
  - EID1223  # Sunitinib, Sensitivity/Response, level B, PMID 22439647
  - EID1424  # Sunitinib, Sensitivity/Response, level B, PMID 18955458
  - EID2466  # Imatinib, Sensitivity/Response, level B, PMID 14645423
  - EID2477  # Imatinib, Reduced Sensitivity, level B, PMID 18955451
  - EID4104  # Regorafenib, Reduced Sensitivity, level C, PMID 27371698
  - EID4139  # Regorafenib, Reduced Sensitivity, level B, PMID 22614970
  - EID4628  # Regorafenib, Sensitivity/Response, level B, PMID 23177515
  evidence_used:
  - civic_snapshot: 2026-04-25
  - hosted_file: knowledge_base/hosted/content/biomarker_actionability/bma_kit_exon9_gist.yaml
  recommended_followup: 'Maintainer decision: keep gene-level KIT block (status
    quo) OR tighten to variant-aware 8-EID subset. If tightening is preferred,
    spawn a separate chunk with target_action=upsert because narrowing
    requires explicit Co-Lead approval per CHARTER §6.1.'

