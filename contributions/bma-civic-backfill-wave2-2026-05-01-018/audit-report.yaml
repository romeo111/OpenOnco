    string. Tumor-agnostic NTRK actionability lives in larotrectinib /
    entrectinib labels (FDA 2018/2019) and the LOXO-101 / STARTRK-2
    pooled trials, which CIViC has not catalogued under the umbrella
    DOID:162 for fusion variants. No-match per the closed-#43 strict
    disease-token-overlap rule.
  no_civic_match_reason: 'no_disease_token_overlap_with_DIS_CRC'
