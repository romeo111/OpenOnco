  proposed_action: none
  rationale: |
    CIViC snapshot 2026-04-25 contains zero accepted evidence items where
    gene == "RAD51C". Synonym expansion checked:
      - HGNC alias for RAD51C: none (RAD51C is the canonical HGNC symbol;
        FANCO is a Fanconi-anemia complementation-group alias rarely
        used as a primary symbol — also absent from snapshot).
      - RAD51 paralogs (RAD51, RAD51B, RAD51D) considered but NOT
        substituted: per closed-#43 / wave2-018 precedent, synonym
        expansion is reserved for HGNC symbol aliases (e.g. HER2 ≡
        ERBB2, CD30 ≡ TNFRSF8), not for paralog substitution. RAD51C
        and RAD51D are separate HGNC genes encoding distinct
        Rad51-paralog proteins; their HRR-pathway functional homology
        does not justify CIViC evidence borrowing under this chunk's
        strict-filter policy.
      - For completeness: RAD51 has limited entries; RAD51B has
        EID11212 (mutation + Olaparib in CRPC level A, PMID 32343890 —
