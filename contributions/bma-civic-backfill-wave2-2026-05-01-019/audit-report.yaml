- bma_id: BMA-NTRK-FUSION-GIST
  outcome: no_civic_match
  hosted_state_before: 'evidence_sources: [] (empty)'
  proposed_action: none
  rationale: |
    CIViC snapshot 2026-04-25 contains 9 accepted evidence items across
    NTRK1 (5), NTRK2 (0), NTRK3 (4), plus fusion-partner entries
    (NTRK3::SCAPER for melanocytoma; MET::ATXN7L1 etc. for other genes).

    Disease-token filter for DIS-GIST (DOID:9253):
      - One item matches: EID9592 (NTRK3 F617L in Gastrointestinal Stromal
        Tumor + Larotrectinib, level C, Supports Resistance, PMID 30624546
        — Cocco Cancer Discovery 2019).

    Variant-aware filter on EID9592: BMA variant_qualifier is "NTRK1/3
    fusion (rare in KIT/PDGFRA wild-type GIST)". EID9592 variant is
    "F617L" — a kinase-domain point mutation that arises as acquired
    resistance AFTER initial TRK-inhibitor response in fusion-positive
    tumors. F617L is NOT a fusion variant; it is a secondary resistance
    mutation. Per closed-#43 / chunk-spec strict variant-aware filter
    ("exclude evidence inverting clinical message" — and more strictly,
    "EID variant must match BMA variant_qualifier scope"), EID9592 is
    rejected: it neither matches "fusion" variant scope, nor would
    importing it accurately represent the BMA's primary-actionability
    claim of fusion → larotrectinib/entrectinib sensitivity.

    Synonym expansion checked:
      - NTRK1/2/3 fusion partners (EML4, ETV6, TPM3, LMNA, TFG, SCAPER,
        ATXN7L1) for GIST disease overlap — none in snapshot.
      - Pan-tumor "Solid Tumor" DOID:'' — EID10170 (NTRK1 Amplification
        + Larotrectinib level C) is amplification not fusion; rejected
        by variant-aware filter regardless of disease-token.
      - Pan-tumor "Cancer" DOID:162 entries (EID2958 NTRK1/2/3
        Amplification + Entrectinib level B Does Not Support;
        EID2959 NTRK3 Amplification + Entrectinib level B Does Not
        Support) — both amplification not fusion, AND off-disease.

    Tumor-agnostic NTRK-fusion actionability (larotrectinib FDA 2018,
    entrectinib FDA 2019) is captured in the hosted regulatory_approval
    block and recommended_combinations — not CIViC-derivable in current
    snapshot for fusion-variant scope.
  considered_civic_eids:
  - eid: EID9592
    disease: Gastrointestinal Stromal Tumor (DOID:9253)
    gene: NTRK3
    variant: F617L
    therapies: [Larotrectinib]
    direction: Supports
    significance: Resistance
    level: C
    pmid: '30624546'
    excluded_because: variant_F617L_is_acquired_resistance_point_mutation_NOT_fusion_does_not_match_BMA_variant_qualifier_NTRK1_3_fusion
  no_civic_match_reason: 'no_eid_with_fusion_variant_AND_DIS_GIST_disease_token'
  evidence_used:
  - civic_snapshot: 2026-04-25
  - hosted_file: knowledge_base/hosted/content/biomarker_actionability/bma_ntrk_fusion_gist.yaml
  recommended_followup: 'Source-gap: SRC-NCCN-SARCOMA / SRC-NCCN-GIST-2025
    not yet ingested per hosted notes. Tumor-agnostic FDA approvals for
    larotrectinib (2018) and entrectinib (2019) are regulatory-anchored
    rather than CIViC-anchored. Re-check on next CIViC nightly refresh
    once tumor-agnostic NTRK fusion EIDs are catalogued under DOID:9253
    or DOID:162 with fusion variant scope.'

- bma_id: BMA-RAD51C-SOMATIC-BREAST
