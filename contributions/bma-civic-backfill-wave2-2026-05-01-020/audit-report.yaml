- bma_id: BMA-NTRK-FUSION-IFS
  outcome: civic_match
  hosted_state_before: 'evidence_sources: [] (empty)'
  proposed_action: upsert
  proposed_sidecar: bma_ntrk_fusion_ifs.yaml
  rationale: |
    Synonym expansion required: hosted variant_qualifier is "ETV6-NTRK3
    fusion (defining lesion)" and disease_id DIS-IFS = "Infantile
    fibrosarcoma". CIViC catalogs the same disease as "Congenital
    Fibrosarcoma" (DOID:8418) — these are synonymous (CFS/IFS — congenital
    infantile fibrosarcoma is the same WHO entity). Synonym match
    confirmed via DOID and clinical literature.

    Snapshot 2026-04-25 contains 15 accepted evidence items with
    disease == "Congenital Fibrosarcoma" (DOID:8418), all NTRK-fusion
    variants. By gene-record:
      ETV6::NTRK3: 8 EIDs (variant_qualifier strict match)
      EML4::NTRK3: 4 EIDs (different fusion partner)
      SQSTM1::NTRK1: 2 EIDs (different gene + fusion partner)
      LMNA::NTRK1: 1 EID (different gene + fusion partner)

    Variant-aware strict filter (matches hosted variant_qualifier
    "ETV6-NTRK3 fusion"): 8 EIDs only. The other 7 EIDs share the same
    disease and same drug class (TRK inhibitor) but use alternate fusion
    partners — clinically equivalent for actionability purposes (the
    biomarker_id BIO-NTRK-FUSION is a generic NTRK-fusion biomarker, not
    ETV6::NTRK3-specific), but the hosted variant_qualifier is the
    narrower scope.

    Per closed-#43 strict variant-aware policy and consistency with
    wave2-018 ("variant-aware filter applied"), populate evidence_sources
    with the 8 strict-match ETV6::NTRK3 EIDs. The 7 alternate-fusion EIDs
    are NOT included in the upsert; they are listed below for maintainer
    awareness. Maintainer can broaden the variant_qualifier to "NTRK
    fusion (any partner)" and re-run the backfill in a follow-up chunk
    if BIO-NTRK-FUSION's generic scope is intended to dominate.
