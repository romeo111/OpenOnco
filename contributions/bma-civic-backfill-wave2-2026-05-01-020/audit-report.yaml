  - EID797    # MET Exon 14 Skipping Mutation, Lung Adenocarcinoma, level C, Crizotinib, PMID 25971939 [HOSTED]
  - EID1185   # Lung Adenocarcinoma, level C, Crizotinib, PMID 26729443 [HOSTED]
