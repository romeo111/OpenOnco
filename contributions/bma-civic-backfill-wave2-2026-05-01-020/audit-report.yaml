    EID1692 — Lung Adenocarcinoma / Lung Squamous Cell Carcinoma)'
  proposed_action: upsert
  proposed_sidecar: bma_met_ex14_nsclc.yaml
  rationale: |
    CIViC snapshot 2026-04-25 contains 37 accepted evidence items for
    gene == "MET". Variant-aware filter (variant matches "Exon 14
    Skipping Mutation") narrows to 12 items. Disease-aware filter
    (disease ∈ {Lung Adenocarcinoma, Lung Non-small Cell Carcinoma})
    yields 9 strict-match EIDs.

    Of those 9 strict-match EIDs, the hosted file already contains 5
    (EID797, EID1185, EID1186, EID1651, EID4786 — all Lung Adenocarcinoma).
    The remaining 4 strict-match EIDs are MISSING from the hosted file:
    EID7272 (Tepotinib level B), EID7642 (Crizotinib level B), EID7643
    (Crizotinib level C), and **EID8847 (Capmatinib level A)** — all in
    Lung Non-small Cell Carcinoma (DOID:3908). EID8847 is the highest-
    actionability item (level A, GEOMETRY mono-1 PMID 32877583) and a
    significant gap in the hosted block.

    Per the wave2 invariant ("no destructive narrowing"), the 4 hosted
    MET amplification EIDs are PRESERVED. Diverges from the wave2-018
    KIT-EXON9 pattern because that case was a strict subset (existing ⊃
    strict-match); here the relationship is overlap (existing has
    amplification entries the strict variant filter does not, and is
    missing 4 strict-match exon-14 entries — including a level A item).

    Upsert action: APPEND new evidence_sources entries for the 4 missing
    strict-match exon-14 NSCLC EIDs. PRESERVE all existing entries.
    Maintainer adjudicates whether the 4 amplification EIDs should be
    pruned (out of variant_qualifier scope) or retained (out-of-scope
    cross-reference for the broader BIO-MET biomarker).
