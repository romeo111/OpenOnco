  - EID890    # MET Amplification, Lung Squamous Cell Carcinoma, level C, Crizotinib (NOT exon 14)
  - EID1392   # MET Amplification, Lung Adenocarcinoma, level C, Resistance Gefitinib/Erlotinib (NOT exon 14)
  - EID1692   # MET Amplification, Lung Adenocarcinoma, level C, Crizotinib (NOT exon 14)
