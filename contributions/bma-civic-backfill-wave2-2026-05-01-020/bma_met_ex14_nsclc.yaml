  notes_for_reviewer: 'CIViC backfill (additive-only): variant-aware strict filter
    (gene=MET AND variant matches "Exon 14 Skipping Mutation") + disease-aware
    filter (Lung Adenocarcinoma OR Lung Non-small Cell Carcinoma) yields 9 strict-
    match EIDs. Hosted file already had 5 of those (EID797, EID1185, EID1186,
    EID1651, EID4786 — Lung Adenocarcinoma). 4 strict-match EIDs added this pass:
    EID8847 (level A, Capmatinib, GEOMETRY mono-1 PMID 32877583), EID7272 (level
    B, Tepotinib), EID7642 (level B, Crizotinib), EID7643 (level C, Crizotinib
    PMID 26892698). EID8847 closes the highest-actionability gap. PRESERVED:
    existing 4 MET amplification EIDs (EID836, EID890, EID1392, EID1692) — out
    of strict variant_qualifier scope but already on hosted; pruning would be a
    destructive narrowing requiring separate Co-Lead-approved chunk per CHARTER
    §6.1 (cf. wave2-018 KIT-EXON9 precedent). Pan-tumor "Cancer" DOID:162 EIDs
    (EID736, EID7797) NOT included per off-disease policy. Off-disease
    Histiocytic And Dendritic Cell Cancer EID NOT included.
    actionability_review_required: true preserved.'
