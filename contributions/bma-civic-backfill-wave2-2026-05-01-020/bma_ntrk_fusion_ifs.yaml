  (>90%). ларотрексиніб has transformative activity (SCOUT педіатричний дослідження,
  Laetsch Lancet Oncol 2018 — ORR 93% in IFS), enabling organ-sparing surgery and
  avoiding mutilating resection or intensive хіміотерапія. пухлина-agnostic FDA схвалення
  since 2018; SCOUT дані drove педіатричний label.

  '
