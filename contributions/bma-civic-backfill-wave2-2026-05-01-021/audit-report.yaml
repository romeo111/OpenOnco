- bma_id: BMA-MGMT-METHYLATION-GBM
  outcome: already_populated_no_action_taken
  hosted_state_before: 'evidence_sources contains 4 SRC-CIVIC blocks
    spanning 8 EIDs across CIViC levels A/B/E (EID172, EID307, EID308,
    EID309, EID491, EID822, EID2899, EID2903)'
  proposed_action: none
  rationale: |
    Hosted file already has a richly populated evidence_sources block
    from a prior backfill pass (bma-civic-backfill-2026-04-29-009).
    Re-running variant-aware filter on snapshot 2026-04-25 with strict
    constraint (gene == "MGMT" AND variant == "Promoter Methylation"
    AND disease == "Glioblastoma" DOID:3068) yields a 5-EID subset:
    EID172, EID307, EID308, EID309, EID491.
    The hosted block contains these 5 EIDs plus 3 additional MGMT-gene
    EIDs whose variants are NOT "Promoter Methylation":
      EID822  — variant "RS16906252" (SNP locus)
      EID2899 — variant "Underexpression" (protein-level)
      EID2903 — variant "Underexpression" (protein-level)
    All 3 are MGMT-pathway-related Glioblastoma+Temozolomide evidence
    items and are clinically reasonable lumps for a "MGMT methylation"
    actionability concept (low MGMT activity → TMZ sensitivity).
    Removing the 3 broader EIDs would be a destructive narrowing of an
    already-reviewer-pending block; preserving the over-broad list lets
    the maintainer adjudicate whether the wider MGMT-pathway panel is
    intended (clinically reasonable for an expression/methylation
    actionability link) versus the strict variant-name interpretation.
    No upsert proposed in this chunk to avoid silently dropping
    existing CIViC references pending Co-Lead signoff.
  variant_aware_strict_eids:
  - EID172   # Better Outcome (Prognostic), level B, PMID 11070098
  - EID307   # Temozolomide, Sensitivity/Response, level A, PMID 15758010
  - EID308   # Carmustine, Sensitivity/Response, level B, PMID 11070098
  - EID309   # O6-Benzylguanine, Sensitivity/Response, level E, PMID 11070098
  - EID491   # Better Outcome (Prognostic), level B, PMID 15758010
  hosted_extra_pathway_eids:
  - EID822   # variant=RS16906252 (SNP locus), Temozolomide level B, PMID 25910840
  - EID2899  # variant=Underexpression, Temozolomide level B, PMID 17442989
  - EID2903  # variant=Underexpression, Temozolomide level B, PMID 21331613
  evidence_used:
  - civic_snapshot: 2026-04-25
  - hosted_file: knowledge_base/hosted/content/biomarker_actionability/bma_mgmt_methylation_gbm.yaml
  recommended_followup: 'Maintainer decision: keep MGMT-pathway block
    (status quo) OR tighten to strict variant-aware 5-EID subset. If
    tightening is preferred, spawn a separate chunk with target_action=upsert
    because narrowing requires explicit Co-Lead approval per CHARTER §6.1.
    Alternatively, split into two evidence_sources blocks (strict-methylation
    + ancillary-MGMT-pathway) for clearer provenance.'

