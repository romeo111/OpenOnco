- bma_id: BMA-NTRK-FUSION-NSCLC
  outcome: civic_match
  hosted_state_before: 'evidence_sources: [] (empty)'
  proposed_action: upsert
  proposed_sidecar: bma_ntrk_fusion_nsclc.yaml
  rationale: |
    CIViC snapshot 2026-04-25 contains 9 accepted evidence items across
    NTRK1 (5), NTRK2 (0), NTRK3 (4). Disease-token overlap with
    DIS-NSCLC ("Lung Non-small Cell Carcinoma" DOID:3908): 3 items —
    EID9593, EID11515, EID11516.
    Variant-aware filter (require explicit "Fusion" token in variant
    string for an NTRK-FUSION-scoped BMA):
      EID11515 — NTRK3 G623R AND EML4::NTRK3 Fusion, Resistance to
                 Entrectinib, level C, PMID 34625502 — INCLUDE (variant
                 contains "Fusion" token, fusion-scoped acquired-
                 resistance evidence relevant to NSCLC NTRK-fusion BMA)
      EID11516 — NTRK3 G623R AND EML4::NTRK3 Fusion, Sensitivity/Response
                 to Repotrectinib, level C, PMID 34625502 — INCLUDE
                 (variant contains "Fusion" token, post-resistance
                 next-line sensitivity directly relevant)
      EID9593  — NTRK1 G595R AND NTRK1 G667S (no explicit "Fusion"
                 token in variant string), Resistance to Larotrectinib,
                 level C, PMID 30624546 — EXCLUDE (variant-aware filter:
                 strict CIViC variant string does not contain "Fusion".
                 Clinically these are solvent-front/gatekeeper kinase-
                 domain mutations that arise on the background of a
                 pre-existing TRK fusion, but the CIViC variant
                 representation does not encode the fusion partner
                 explicitly — flagged for maintainer review.)
    Tumor-agnostic actionability lives in the larotrectinib (LOXO-101 /
    NAVIGATE) and entrectinib (STARTRK-2) pooled trials and the FDA
    tumor-agnostic approvals already cited in hosted regulatory_approval.
    CIViC has NOT catalogued the primary tumor-agnostic Sensitivity
    EIDs under DOID:3908 — only the acquired-resistance items. The
    proposed upsert therefore covers acquired-resistance actionability
    only (which is the realistic 2L+ treatment-decision context for a
    NSCLC NTRK-fusion patient: progressed-on-larotrectinib EID11515
    informs entrectinib resistance; EID11516 supports repotrectinib
    salvage). Maintainer adjudicates whether to extend to EID9593
    (point-mutation-on-fusion-background evidence) in a follow-up
    review.
  matched_evidence_ids:
  - eid: EID11515
    disease: Lung Non-small Cell Carcinoma (DOID:3908)
    variant: NTRK3 G623R AND EML4::NTRK3 Fusion
