    reason: 'variant string "NTRK1 G595R AND NTRK1 G667S" does not
      contain explicit "Fusion" token; strict variant-aware filter
      excludes. Clinically a TRK-fusion-background acquired-resistance
      item — flag for maintainer review.'
  evidence_used:
