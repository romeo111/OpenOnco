  - hosted_file: knowledge_base/hosted/content/biomarker_actionability/bma_ntrk_fusion_nsclc.yaml
  - pmid: '34625502'
  caveat: 'Both included EIDs (EID11515, EID11516) are level C
    acquired-resistance items from a single PMID 34625502 cohort.
    They do NOT provide primary tumor-agnostic Sensitivity/Response
    evidence for treatment-naive NTRK-fusion NSCLC (that evidence base
    is already captured in hosted regulatory_approval and primary_sources
    via FDA/EMA tumor-agnostic approvals + ESCAT IA citation). Maintainer
    adjudicates whether to expand block to include EID9593 (NTRK1
    kinase-domain mutations on fusion background — pattern-matches
    fusion biology but variant-aware filter excludes per strict policy).'

