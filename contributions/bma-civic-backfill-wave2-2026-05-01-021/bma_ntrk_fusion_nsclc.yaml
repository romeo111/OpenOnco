  note: 'CIViC snapshot 2026-04-25: NTRK3 G623R AND EML4::NTRK3 Fusion in Lung
    Non-small Cell Carcinoma (DOID:3908) — acquired-resistance evidence cohort
    (PMID 34625502). EID11515 Supports Resistance to Entrectinib (post-fusion
    kinase-domain mutation context). EID11516 Supports Sensitivity/Response to
    Repotrectinib in the same molecular profile (next-line salvage). Both items
    are level C. Treatment-naive tumor-agnostic Sensitivity/Response evidence is
    NOT in CIViC under DOID:3908 — that actionability is captured via hosted
    regulatory_approval (FDA/EMA tumor-agnostic larotrectinib/entrectinib) and
    primary_sources (NCCN/ESMO). EID9593 (NTRK1 G595R+G667S Resistance to
    Larotrectinib, PMID 30624546) excluded by strict variant-aware filter
    (no "Fusion" token in variant string) — flagged in audit-report for
    maintainer review.'
