reviewer_actions:
  - Confirm whether each proposed treatment belongs as regimen, indication, algorithm, or non-drug modality content.
  - Draft source-grounded sidecars only inside the relevant contribution chunk.
  - Keep weak, off-label, pediatric, rare-disease, or architecture-sensitive claims marked review_required.
  - Do not promote content that uses banned source IDs or unreviewed patient-specific advice.
