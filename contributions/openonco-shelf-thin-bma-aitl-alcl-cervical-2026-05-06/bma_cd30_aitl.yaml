id: BMA-CD30-AITL
biomarker_id: BIO-CD30-IHC
variant_qualifier: "CD30 expression by IHC in AITL, typically using the 10% ECHELON-2 threshold"
disease_id: DIS-AITL
escat_tier: IA
evidence_summary: >
  CD30 expression in AITL supports brentuximab vedotin plus CHP as a
  first-line option when the patient is fit for anthracycline-based therapy
  and access is feasible. Hosted AITL pathway logic already routes CD30-positive
  disease to IND-AITL-1L-CHP-BV and CD30-negative or inaccessible cases to
  CHOEP-based therapy.
regulatory_approval:
  fda:
    - "brentuximab vedotin plus CHP - previously untreated CD30-expressing PTCL, including AITL in guideline/trial context"
  ema: []
  ukraine: []
recommended_combinations:
  - "brentuximab vedotin + CHP for CD30-positive AITL when clinically fit and accessible"
contraindicated_monotherapy:
  - "Do not combine brentuximab vedotin with bleomycin."
  - "Do not use CD30 positivity alone to bypass AITL-specific EBV, autoimmune cytopenia, and immunoglobulin workup."
primary_sources:
  - SRC-ECHELON-2-HORWITZ-2019
  - SRC-ESMO-PTCL-2024
last_verified: "2026-05-06"
evidence_sources:
