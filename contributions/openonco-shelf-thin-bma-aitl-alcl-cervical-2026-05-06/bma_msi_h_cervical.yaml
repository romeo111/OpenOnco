variant_qualifier: "MSI-H or dMMR phenotype in recurrent or metastatic cervical cancer"
disease_id: DIS-CERVICAL
escat_tier: IA
evidence_summary: >
  MSI-H or dMMR status in cervical cancer supports immune-checkpoint inhibitor
  consideration through tumor-agnostic pembrolizumab evidence and guideline
  context, especially after recurrence or metastatic progression when standard
  cervical pathways are being selected. Because the hosted cervical algorithm is
  primarily PD-L1 CPS-driven, this BMA should remain review-required until the
  tumor-agnostic source mapping is explicitly ingested for cervical.
