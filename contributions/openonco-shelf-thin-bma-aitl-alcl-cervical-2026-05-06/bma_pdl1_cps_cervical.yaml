id: BMA-PDL1-CPS-CERVICAL
biomarker_id: BIO-PDL1-CPS
variant_qualifier: "PD-L1 CPS >=1 by 22C3 IHC in persistent, recurrent, or metastatic cervical cancer"
disease_id: DIS-CERVICAL
escat_tier: IA
evidence_summary: >
  PD-L1 CPS >=1 is a treatment-selection biomarker for pembrolizumab plus
  platinum/paclitaxel chemotherapy with or without bevacizumab in first-line
  persistent, recurrent, or metastatic cervical cancer. Hosted cervical
  algorithm and red-flag content already encode this KEYNOTE-826 branch.
regulatory_approval:
  fda:
    - "pembrolizumab plus chemotherapy with or without bevacizumab - PD-L1 CPS >=1 persistent, recurrent, or metastatic cervical cancer"
  ema:
    - "pembrolizumab plus chemotherapy with or without bevacizumab - PD-L1 CPS >=1 persistent, recurrent, or metastatic cervical cancer"
  ukraine: []
recommended_combinations:
  - "pembrolizumab + paclitaxel + cisplatin or carboplatin +/- bevacizumab for CPS >=1 metastatic, persistent, or recurrent cervical cancer"
contraindicated_monotherapy:
  - "Do not skip PD-L1 CPS testing before first-line metastatic cervical treatment selection."
  - "Do not add bevacizumab when fistula, uncontrolled hypertension, major bleeding risk, or significant proteinuria makes it unsafe."
primary_sources:
  - SRC-KEYNOTE-826-COLOMBO-2021
  - SRC-NCCN-CERVICAL-2025
  - SRC-ESMO-CERVICAL-2024
