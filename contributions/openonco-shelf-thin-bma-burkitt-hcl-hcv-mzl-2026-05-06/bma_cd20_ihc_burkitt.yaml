      - IND-BURKITT-1L-CODOXM-IVAC
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "Hosted Burkitt pathways use rituximab-containing intensive regimens."
actionability_review_required: true
notes: >
  Most Burkitt lymphoma is CD20-positive; confirm IHC and anti-CD20 infection
  safety checks before hosted promotion.
