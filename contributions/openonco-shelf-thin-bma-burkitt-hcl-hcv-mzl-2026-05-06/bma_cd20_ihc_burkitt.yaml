id: BMA-CD20-IHC-BURKITT
biomarker_id: BIO-CD20-IHC
variant_qualifier: "CD20-positive Burkitt lymphoma by IHC"
disease_id: DIS-BURKITT
escat_tier: IA
evidence_summary: >
  CD20 expression supports rituximab-containing intensive chemoimmunotherapy
  in Burkitt lymphoma. Hosted Burkitt indications already use DA-EPOCH-R,
  CODOX-M/IVAC plus rituximab, R-hyperCVAD, and rituximab-containing salvage
  contexts; this BMA adds biomarker-layer traceability for anti-CD20 use.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "DA-EPOCH-R for standard or intermediate-risk Burkitt when clinically appropriate"
  - "CODOX-M/IVAC plus rituximab for high-risk or CNS-positive Burkitt when fit"
contraindicated_monotherapy:
  - "Do not use rituximab monotherapy as curative treatment for Burkitt lymphoma."
  - "Do not skip HBV screening and prophylaxis planning before anti-CD20 therapy."
primary_sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-BURKITT-2024
last_verified: "2026-05-06"
evidence_sources:
