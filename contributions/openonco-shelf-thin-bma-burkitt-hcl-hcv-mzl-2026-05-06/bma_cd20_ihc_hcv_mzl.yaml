id: BMA-CD20-IHC-HCV-MZL
biomarker_id: BIO-CD20-IHC
variant_qualifier: "CD20-positive HCV-associated marginal zone lymphoma by IHC"
disease_id: DIS-HCV-MZL
escat_tier: IA
evidence_summary: >
  CD20 expression supports anti-CD20 therapy in HCV-associated marginal zone
  lymphoma when disease burden, symptoms, non-response after DAA, or aggressive
  features require lymphoma-directed treatment. Hosted HCV-MZL pathways reserve
  rituximab-containing therapy for aggressive presentation or inadequate
  response to antiviral-first management.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "bendamustine + rituximab for bulky, symptomatic, transformed, or DAA-nonresponsive HCV-MZL when clinically appropriate"
  - "rituximab-based therapy only after confirming anti-CD20 eligibility and viral-hepatitis safety planning"
contraindicated_monotherapy:
  - "Do not use CD20 positivity to bypass HCV RNA assessment in suspected HCV-MZL."
  - "Do not give anti-CD20 therapy without HBV reactivation risk assessment and prophylaxis where indicated."
primary_sources:
  - SRC-ESMO-MZL-2024
  - SRC-NCCN-BCELL-2025
last_verified: "2026-05-06"
evidence_sources:
  - source: SRC-ESMO-MZL-2024
    level: "guideline context"
    evidence_ids:
      - ALGO-HCV-MZL-1L
      - IND-HCV-MZL-1L-BR-AGGRESSIVE
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "Hosted HCV-MZL pathway reserves anti-CD20 chemoimmunotherapy for aggressive or antiviral-nonresponsive settings."
actionability_review_required: true
notes: >
  CD20 is a treatment-enabling marker here, while HCV RNA remains the primary
  etiologic biomarker for antiviral-first selection.
