id: BMA-HCV-RNA-HCV-MZL
biomarker_id: BIO-HCV-RNA
variant_qualifier: "detectable HCV RNA in HCV-associated marginal zone lymphoma"
disease_id: DIS-HCV-MZL
escat_tier: IA
evidence_summary: >
  Detectable HCV RNA is the actionable etiologic marker for HCV-associated
  marginal zone lymphoma. In indolent, non-bulky disease, the hosted HCV-MZL
  algorithm routes RNA-positive cases to antiviral-first therapy with DAA and
  hematologic response surveillance; bulky, symptomatic, or transformed disease
  routes to immediate chemoimmunotherapy with concurrent or sequenced antiviral
  management.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "sofosbuvir/velpatasvir or glecaprevir/pibrentasvir DAA therapy for HCV-RNA-positive indolent HCV-MZL"
  - "DAA plus disease-directed immunochemotherapy when bulky, symptomatic, or transformed lymphoma requires immediate cytoreduction"
contraindicated_monotherapy:
  - "Do not use anti-HCV antibody alone as the actionability gate; active infection requires detectable HCV RNA."
  - "Do not delay urgent lymphoma cytoreduction for aggressive or transformed HCV-MZL solely to await antiviral response."
primary_sources:
  - SRC-ESMO-MZL-2024
  - SRC-EASL-HCV-2023
  - SRC-NCCN-BCELL-2025
