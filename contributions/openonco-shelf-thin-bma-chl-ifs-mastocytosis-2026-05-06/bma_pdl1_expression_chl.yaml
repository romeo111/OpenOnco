id: BMA-PDL1-EXPRESSION-CHL
biomarker_id: BIO-PDL1-EXPRESSION
variant_qualifier: "PD-L1 overexpression / 9p24.1 biology in relapsed or refractory classical Hodgkin lymphoma"
disease_id: DIS-CHL
escat_tier: IA
evidence_summary: >
  Classical Hodgkin lymphoma commonly has PD-L1 overexpression driven by
  9p24.1 biology, supporting strong sensitivity to PD-1 blockade in relapsed
  or refractory disease. Hosted IND-CHL-2L-PEMBROLIZUMAB already encodes
  pembrolizumab monotherapy for relapsed or refractory cHL after appropriate
  prior therapy; this sidecar adds biomarker-layer traceability.
regulatory_approval:
  fda:
    - "pembrolizumab - relapsed or refractory classical Hodgkin lymphoma in label/guideline context"
  ema: []
  ukraine: []
recommended_combinations:
  - "pembrolizumab monotherapy for eligible relapsed or refractory cHL"
  - "nivolumab as an alternative PD-1 inhibitor in relapsed or refractory cHL when access and clinical context favor it"
contraindicated_monotherapy:
  - "Do not use PD-1 blockade in active severe autoimmune disease without specialist risk review."
  - "Do not proceed directly to alloSCT after PD-1 blockade without transplant-team washout and GVHD risk planning."
primary_sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-HODGKIN-2024
last_verified: "2026-05-06"
