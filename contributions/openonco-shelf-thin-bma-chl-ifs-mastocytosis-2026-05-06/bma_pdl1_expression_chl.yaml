    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "Hosted cHL pembrolizumab indication cites PD-L1 overexpression and 9p24.1 biology in relapsed/refractory disease."
  - source: SRC-ESMO-HODGKIN-2024
