id: BMA-BCL6-REARRANGEMENT-HGBL-DH
biomarker_id: BIO-BCL6-REARRANGEMENT
variant_qualifier: "BCL6 rearrangement as MYC partner in double-hit or triple-hit HGBL"
disease_id: DIS-HGBL-DH
escat_tier: IIA
evidence_summary: >
  BCL6 rearrangement is an HGBL-DH/TH defining partner when it occurs with
  MYC rearrangement, either as MYC+BCL6 double-hit lymphoma or as part of
  MYC+BCL2+BCL6 triple-hit lymphoma. The hosted HGBL-DH algorithm already
  treats double-/triple-hit disease as high-risk biology favoring intensified
  first-line therapy over R-CHOP when feasible.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "DA-EPOCH-R for newly diagnosed HGBL-DH/TH when clinically fit"
  - "CAR-T strategy in early relapsed or primary refractory HGBL-DH/TH when eligible"
contraindicated_monotherapy:
  - "Do not treat confirmed HGBL-DH/TH with R-CHOP alone when intensified therapy is feasible."
primary_sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024
last_verified: "2026-05-06"
evidence_sources:
  - source: SRC-ESMO-DLBCL-2024
    level: "guideline context"
    evidence_ids:
      - BIO-BCL6-REARRANGEMENT
      - ALGO-HGBL-DH-1L
    direction: Supports
    significance: Positive
    evidence_lane: standard_care
    note: "BCL6 rearrangement matters for HGBL-DH/TH only when paired with MYC rearrangement."
actionability_review_required: true
notes: >
  Isolated BCL6 rearrangement in DLBCL-NOS should not be promoted through this
  HGBL-DH sidecar; require MYC co-rearrangement.
