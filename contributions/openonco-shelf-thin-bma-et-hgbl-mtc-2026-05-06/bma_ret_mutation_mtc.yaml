id: BMA-RET-MUTATION-MTC
biomarker_id: BIO-RET
variant_qualifier: "activating RET mutation in advanced or metastatic medullary thyroid carcinoma"
disease_id: DIS-MTC
escat_tier: IA
evidence_summary: >
  RET mutation is the primary treatment-selection biomarker for advanced or
  metastatic medullary thyroid carcinoma. Hosted MTC pathways route RET-mutant
  advanced disease toward selective RET inhibitors such as selpercatinib, with
  multikinase TKIs reserved for RET-wildtype disease, RET inhibitor failure, or
  access constraints.
regulatory_approval:
  fda:
    - "selpercatinib - advanced or metastatic RET-mutant MTC"
    - "pralsetinib - advanced or metastatic RET-mutant MTC"
  ema:
    - "selpercatinib / pralsetinib - RET-mutant advanced MTC"
  ukraine: []
recommended_combinations:
  - "selpercatinib monotherapy for eligible RET-mutant advanced or metastatic MTC"
  - "pralsetinib monotherapy when clinically appropriate and accessible"
contraindicated_monotherapy:
  - "Do not default to cabozantinib or vandetanib before checking RET mutation status when selective RET inhibitors are accessible."
primary_sources:
  - SRC-NCCN-THYROID-2025
  - SRC-LIBRETTO-531-WIRTH-2024
  - SRC-LIBRETTO001-DRILON-2020
last_verified: "2026-05-06"
evidence_sources:
