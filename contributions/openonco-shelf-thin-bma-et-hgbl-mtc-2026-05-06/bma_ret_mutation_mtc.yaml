    level: "guideline context"
    evidence_ids:
      - ALGO-MTC-1L
      - IND-MTC-ADVANCED-1L-SELPERCATINIB
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "NCCN thyroid source records RET-selective TKI preference in RET-mutant MTC."
  - source: SRC-LIBRETTO-531-WIRTH-2024
    level: "phase 3 randomized trial"
    evidence_ids:
      - LIBRETTO-531
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "LIBRETTO-531 supports first-line selpercatinib over multikinase TKI in advanced RET-mutant MTC."
actionability_review_required: true
notes: >
  This generic RET-mutant MTC cell complements variant-specific M918T and C634R
  hosted cells and should be reconciled with them before promotion.
