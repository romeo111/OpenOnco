id: BMA-CD20-IHC-NLPBL
biomarker_id: BIO-CD20-IHC
variant_qualifier: "CD20-positive nodular lymphocyte-predominant Hodgkin lymphoma by IHC"
disease_id: DIS-NLPBL
escat_tier: IA
evidence_summary: >
  NLPBL is a CD20-positive B-cell lymphoma entity, and CD20 expression enables
  rituximab-containing management when systemic anti-CD20 therapy is selected.
  Hosted NLPBL pathways already separate observation or radiotherapy for selected
  limited disease from rituximab monotherapy and transformation-directed R-CHOP.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "rituximab monotherapy for selected NLPBL cases when systemic anti-CD20 therapy is chosen"
  - "R-CHOP for biopsy-confirmed transformation to aggressive B-cell lymphoma"
contraindicated_monotherapy:
  - "Do not use CD20 positivity to bypass observation or radiotherapy options in selected limited-stage NLPBL."
  - "Do not treat suspected transformation without biopsy confirmation when feasible."
primary_sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-LYMPHOMA-2025
last_verified: "2026-05-06"
evidence_sources:
  - source: SRC-NCCN-BCELL-2025
    level: "guideline context"
    evidence_ids:
      - ALGO-NLPBL-1L
      - IND-NLPBL-1L-RITUXIMAB-MONO
      - IND-NLPBL-2L-RCHOP-TRANSFORMATION
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "Hosted NLPBL pathway uses CD20-directed treatment only in the appropriate NLPBL or transformed-disease context."
actionability_review_required: true
notes: >
  CD20 is treatment enabling in NLPBL; it should not be modeled as a
  transformation marker by itself.
