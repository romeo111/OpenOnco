    level: "guideline context"
    evidence_ids:
      - ALGO-NMZL-1L
      - IND-NMZL-1L-BR
      - IND-NMZL-2L-BR
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "Hosted nodal MZL pathway contains rituximab-containing treatment options but preserves watchful waiting when appropriate."
actionability_review_required: true
notes: >
  CD20 is a treatment-enabling marker; HCV-positive nodal MZL still needs
  viral-hepatitis routing before lymphoma-directed therapy selection.
