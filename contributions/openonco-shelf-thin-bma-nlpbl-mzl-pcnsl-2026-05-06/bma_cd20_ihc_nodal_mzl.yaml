id: BMA-CD20-IHC-NODAL-MZL
biomarker_id: BIO-CD20-IHC
variant_qualifier: "CD20-positive nodal marginal zone lymphoma by IHC"
disease_id: DIS-NODAL-MZL
escat_tier: IA
evidence_summary: >
  CD20 expression supports anti-CD20 therapy selection in nodal marginal zone
  lymphoma when lymphoma-directed treatment is clinically indicated. Hosted
  nodal MZL pathways include watchful waiting for asymptomatic disease and
  rituximab-containing therapy such as bendamustine-rituximab for treatment-
  requiring disease or relapse.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "bendamustine + rituximab for treatment-requiring nodal MZL when clinically appropriate"
  - "rituximab-containing retreatment strategy in relapsed nodal MZL after specialist review"
contraindicated_monotherapy:
  - "Do not use CD20 positivity to bypass watchful waiting in asymptomatic low-burden nodal MZL."
  - "Do not give anti-CD20 therapy without HBV reactivation risk assessment and prophylaxis where indicated."
primary_sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-LYMPHOMA-2025
  - SRC-ESMO-MZL-2024
last_verified: "2026-05-06"
