id: BMA-CD20-IHC-PCNSL
biomarker_id: BIO-CD20-IHC
variant_qualifier: "CD20-positive primary CNS lymphoma by IHC"
disease_id: DIS-PCNSL
escat_tier: IA
evidence_summary: >
  Most PCNSL is CD20-positive diffuse large B-cell lymphoma biology, and hosted
  first-line PCNSL pathways include rituximab-containing high-dose methotrexate
  regimens such as R-MPV and MATRix. CD20 confirmation supports anti-CD20
  eligibility while renal function, fitness, and CNS-directed regimen selection
  remain governed by the PCNSL algorithm.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "R-MPV for CD20-positive PCNSL when high-dose methotrexate-based induction is appropriate"
  - "MATRix for eligible fit PCNSL patients where clinically appropriate"
contraindicated_monotherapy:
  - "Do not use rituximab alone as curative-intent PCNSL induction."
  - "Do not use CD20 positivity to bypass high-dose methotrexate eligibility checks."
primary_sources:
  - SRC-NCCN-CNS-2025
  - SRC-NCCN-BCELL-2025
last_verified: "2026-05-06"
evidence_sources:
  - source: SRC-NCCN-CNS-2025
    level: "guideline context"
    evidence_ids:
      - ALGO-PCNSL-1L
      - IND-PCNSL-1L-R-MPV
      - IND-PCNSL-1L-MATRIX
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "Hosted PCNSL induction options are rituximab-containing HD-MTX-based regimens, not CD20-only therapy."
actionability_review_required: true
notes: >
  CD20 should be represented as regimen eligibility support in PCNSL, separate
  from MYD88/CD79B biology used for relapse molecular context.
