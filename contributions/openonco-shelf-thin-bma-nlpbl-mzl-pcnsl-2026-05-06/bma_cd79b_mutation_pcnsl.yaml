id: BMA-CD79B-MUTATION-PCNSL
biomarker_id: BIO-CD79B-MUTATION
variant_qualifier: "CD79B mutation in primary CNS lymphoma"
disease_id: DIS-PCNSL
escat_tier: IIB
evidence_summary: >
  CD79B mutations are common in PCNSL and often co-occur with MYD88 L265P in
  BCR/NF-kB pathway biology. Hosted PCNSL molecular context already records
  MYD88 L265P as a review-required, off-label BTK-inhibitor consideration in
  relapsed or refractory disease; this CD79B sidecar should be treated as a
  molecular-evidence option rather than standard first-line regimen selection.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "BTK inhibitor clinical-trial or specialist off-label consideration in relapsed/refractory PCNSL with BCR/NF-kB pathway biology"
  - "standard HD-MTX-based induction remains governed by the PCNSL pathway independent of CD79B mutation status"
contraindicated_monotherapy:
  - "Do not use CD79B mutation to replace first-line HD-MTX-based PCNSL induction."
  - "Do not infer BTK-inhibitor eligibility without relapse setting, CNS disease review, and drug-interaction/infection risk assessment."
primary_sources:
