id: BMA-MPL-W515-PMF
biomarker_id: BIO-MPL-W515
variant_qualifier: "MPL W515 driver mutation in primary myelofibrosis"
disease_id: DIS-PMF
escat_tier: IA
evidence_summary: >
  MPL W515 mutations are canonical PMF driver alterations and support the MPN
  diagnosis together with morphology and exclusion of other myeloid neoplasms.
  PMF treatment is not MPL-specific: hosted PMF pathways select observation,
  ruxolitinib, fedratinib, momelotinib, or transplant strategy by risk,
  symptom burden, cytopenias, and transplant fitness rather than by driver
  mutation alone.
regulatory_approval:
  fda:
    - "ruxolitinib - intermediate-2 or high-risk myelofibrosis"
    - "fedratinib - intermediate-2 or high-risk myelofibrosis"
    - "momelotinib - myelofibrosis with anemia"
  ema:
    - "ruxolitinib - myelofibrosis"
    - "fedratinib - myelofibrosis"
    - "momelotinib - myelofibrosis with anemia"
  ukraine: []
recommended_combinations:
  - "risk- and symptom-adapted PMF pathway; JAK inhibitor selection is genotype-agnostic"
  - "ruxolitinib for symptomatic intermediate-2/high-risk PMF when clinically appropriate"
  - "fedratinib after ruxolitinib failure or intolerance when clinically appropriate"
  - "momelotinib when anemia is a dominant problem and access permits"
contraindicated_monotherapy:
  - "Do not use MPL mutation alone to start JAK-inhibitor therapy without PMF risk and symptom assessment."
  - "Do not use MPL status as a substitute for blast-phase evaluation or transplant eligibility review."
primary_sources:
  - SRC-NCCN-MPN-2025
  - SRC-ESMO-MPN-2015
  - SRC-COMFORT-I-VERSTOVSEK-2012
  - SRC-JAKARTA2-HARRISON-2017
  - SRC-MOMENTUM-VERSTOVSEK-2023
last_verified: "2026-05-06"
evidence_sources:
  - source: SRC-NCCN-MPN-2025
    level: "guideline context"
    evidence_ids:
      - BIO-MPL-W515
      - ALGO-PMF-1L
      - IND-PMF-1L-RUXOLITINIB
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "MPL is a PMF driver marker; PMF JAK-inhibitor selection is downstream pathway and clinical-context based."
actionability_review_required: true
notes: >
  Model as diagnostic and pathway-enabling, not as a mutation-specific drug
  predictor. Existing JAK2/CALR PMF records already note genotype-agnostic JAK
  inhibitor activity across JAK2, CALR, MPL, and triple-negative MF.
