id: BMA-CD20-IHC-PTLD
biomarker_id: BIO-CD20-IHC
variant_qualifier: "CD20-positive B-cell PTLD by IHC"
disease_id: DIS-PTLD
escat_tier: IA
evidence_summary: >
  CD20 expression supports rituximab-containing therapy in B-cell PTLD after
  transplant-team review and immunosuppression reduction planning. Hosted PTLD
  pathways already route most CD20-positive B-PTLD through reduce
  immunosuppression plus rituximab, with escalation to R-CHOP for monomorphic,
  high-risk, or refractory disease.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "reduce immunosuppression plus rituximab for CD20-positive B-PTLD when clinically appropriate"
  - "R-CHOP for monomorphic, high-risk, or refractory CD20-positive PTLD after MDT review"
contraindicated_monotherapy:
  - "Do not use rituximab without transplant-team review of graft rejection risk and infection risk."
  - "Do not use CD20 positivity for T-cell or NK-cell PTLD routing."
primary_sources:
  - SRC-NCCN-BCELL-2025
last_verified: "2026-05-06"
evidence_sources:
  - source: SRC-NCCN-BCELL-2025
    level: "guideline context"
    evidence_ids:
      - ALGO-PTLD-1L
      - IND-PTLD-1L-REDUCE-IS
      - IND-PTLD-1L-RCHOP
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "Hosted PTLD pathway requires CD20-positive histology for rituximab-based B-PTLD routing."
actionability_review_required: true
notes: >
  CD20 is treatment-enabling in B-PTLD, but PTLD routing must also preserve EBV
  status, histology, transplant type, graft risk, and infection context.
