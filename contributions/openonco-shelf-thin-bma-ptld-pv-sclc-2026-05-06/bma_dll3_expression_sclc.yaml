id: BMA-DLL3-EXPRESSION-SCLC
biomarker_id: BIO-DLL3-EXPRESSION
variant_qualifier: "DLL3-expressing relapsed or refractory SCLC"
disease_id: DIS-SCLC
escat_tier: IIB
evidence_summary: >
  DLL3 is a therapeutic target in SCLC, and the hosted SCLC source notes
  tarlatamab as a DLL3-targeted bispecific option in relapsed or refractory
  SCLC. The hosted SCLC 2L algorithm does not yet model tarlatamab as an output
  indication, so this sidecar is review-required and should not displace
  lurbinectedin, topotecan, platinum rechallenge, or clinical-trial routing.
regulatory_approval:
  fda:
    - "tarlatamab - relapsed or refractory extensive-stage SCLC after platinum-based chemotherapy"
  ema: []
  ukraine: []
recommended_combinations:
  - "tarlatamab for eligible relapsed/refractory SCLC after platinum-based therapy where registered and accessible"
  - "clinical trial preferred at SCLC recurrence when available"
contraindicated_monotherapy:
  - "Do not use DLL3 expression to bypass performance-status and chemotherapy-free-interval gates in relapsed SCLC."
  - "Do not start DLL3-targeted therapy without cytokine-release and neurotoxicity monitoring capability."
