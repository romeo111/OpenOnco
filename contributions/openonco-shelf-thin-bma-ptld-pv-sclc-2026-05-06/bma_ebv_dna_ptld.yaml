id: BMA-EBV-DNA-PTLD
biomarker_id: BIO-EBV-DNA
variant_qualifier: "plasma EBV-DNA monitoring in PTLD"
disease_id: DIS-PTLD
escat_tier: IA
evidence_summary: >
  Plasma EBV-DNA supports PTLD risk assessment and response monitoring,
  especially in EBV-driven PTLD. Hosted PTLD pathways use detectable plasma
  EBV-DNA together with EBER-ISH and CD20-positive histology to support the
  reduce-immunosuppression plus rituximab pathway.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "serial plasma EBV-DNA monitoring alongside clinical and imaging response assessment in EBV-driven PTLD"
  - "reduce immunosuppression plus rituximab for EBV-driven CD20-positive B-PTLD when clinically appropriate"
contraindicated_monotherapy:
  - "Do not use EBV-DNA alone as proof of tumor EBV status without tissue and clinical correlation."
  - "Do not use falling EBV-DNA as the only response criterion when residual disease is suspected."
primary_sources:
  - SRC-NCCN-BCELL-2025
last_verified: "2026-05-06"
evidence_sources:
