      - RF-PTLD-INFECTION-SCREENING
    direction: Supports
    significance: Monitoring
    evidence_lane: standard_care
    note: "Hosted PTLD pathway and infection-screening red flag require EBV viral load context."
actionability_review_required: true
notes: >
  This is a monitoring and routing support marker, not a standalone systemic
  therapy trigger.
