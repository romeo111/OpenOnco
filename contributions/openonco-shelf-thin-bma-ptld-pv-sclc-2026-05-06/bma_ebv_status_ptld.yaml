id: BMA-EBV-STATUS-PTLD
biomarker_id: BIO-EBV-STATUS
variant_qualifier: "EBV-positive PTLD by tumor EBER-ISH"
disease_id: DIS-PTLD
escat_tier: IA
evidence_summary: >
  EBV positivity by tumor EBER-ISH supports EBV-driven B-PTLD routing and
  informs expected response to immunosuppression reduction plus rituximab.
  Hosted PTLD pathways use EBV-positive tumor status, plasma EBV-DNA, and CD20
  positivity together when selecting the initial PTLD treatment ladder.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "reduce immunosuppression plus rituximab for EBV-positive CD20-positive B-PTLD when clinically appropriate"
  - "early escalation review for EBV-negative, monomorphic, T/NK, or refractory PTLD"
contraindicated_monotherapy:
  - "Do not use EBV status alone without CD20 lineage and histology context."
  - "Do not reduce immunosuppression without transplant-team review."
primary_sources:
  - SRC-NCCN-BCELL-2025
last_verified: "2026-05-06"
evidence_sources:
  - source: SRC-NCCN-BCELL-2025
    level: "guideline context"
    evidence_ids:
      - ALGO-PTLD-1L
      - BIO-EBV-STATUS
      - IND-PTLD-1L-REDUCE-IS
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "Hosted PTLD algorithm explicitly branches on EBV-positive tumor EBER-ISH or detectable plasma EBV-DNA."
actionability_review_required: true
notes: >
  EBV-positive PTLD is a routing and monitoring marker. It should be paired
  with CD20 status and transplant MDT review before therapy promotion.
