id: BMA-JAK2-EXON12-PV
biomarker_id: BIO-JAK2
variant_qualifier: "JAK2 exon 12 mutation in polycythemia vera"
disease_id: DIS-PV
escat_tier: IA
evidence_summary: >
  JAK2 exon 12 mutations account for a small minority of PV and usually present
  with erythrocytosis-dominant disease. Like JAK2 V617F, exon 12 mutation
  supports PV diagnosis, while PV treatment remains risk-stratified rather than
  exon-specific: phlebotomy plus aspirin for low-risk disease, cytoreduction for
  high-risk disease, and ruxolitinib after hydroxyurea resistance or intolerance.
regulatory_approval:
  fda:
    - "ruxolitinib - PV resistant or intolerant to hydroxyurea"
    - "ropeginterferon alfa-2b - PV"
  ema:
    - "ruxolitinib - PV resistant or intolerant to hydroxyurea"
    - "ropeginterferon alfa-2b - PV"
  ukraine: []
recommended_combinations:
  - "phlebotomy plus low-dose aspirin for low-risk PV when clinically appropriate"
  - "hydroxyurea or interferon-based cytoreduction for high-risk PV"
  - "ruxolitinib after hydroxyurea resistance or intolerance"
contraindicated_monotherapy:
  - "Do not treat JAK2 exon 12 PV as a separate drug-selection path from PV risk stratification."
  - "Do not diagnose PV from JAK2 exon 12 alone without hematologic and marrow correlation."
primary_sources:
  - SRC-NCCN-MPN-2025
  - SRC-ESMO-MPN-2015
  - SRC-RESPONSE-VANNUCCHI-2015
last_verified: "2026-05-06"
evidence_sources:
  - source: SRC-NCCN-MPN-2025
    level: "guideline context"
    evidence_ids:
      - BMA-JAK2-V617F-PV
      - ALGO-PV-1L
      - ALGO-PV-2L
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "Hosted PV records note exon 12 PV management is similar and risk-stratified."
actionability_review_required: true
notes: >
  Variant qualifier keeps this exon-12-specific while reusing BIO-JAK2 until a
  separate JAK2 exon 12 biomarker entity is approved.
