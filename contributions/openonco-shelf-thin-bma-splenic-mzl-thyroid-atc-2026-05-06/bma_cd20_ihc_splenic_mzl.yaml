      - IND-SMZL-2L-BR
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "Hosted SMZL pathway uses CD20-directed therapy while preserving HCV-first routing."
actionability_review_required: true
notes: >
  CD20 is treatment-enabling in SMZL; HCV RNA and HBV risk remain required
