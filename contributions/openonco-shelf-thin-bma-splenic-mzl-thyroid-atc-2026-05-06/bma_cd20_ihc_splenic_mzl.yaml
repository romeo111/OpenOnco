id: BMA-CD20-IHC-SPLENIC-MZL
biomarker_id: BIO-CD20-IHC
variant_qualifier: "CD20-positive splenic marginal zone lymphoma by IHC"
disease_id: DIS-SPLENIC-MZL
escat_tier: IA
evidence_summary: >
  CD20 expression supports rituximab-based therapy in splenic marginal zone
  lymphoma when lymphoma-directed treatment is indicated. Hosted SMZL pathways
  route HCV-positive compensated patients to antiviral-first therapy and use
  rituximab for HCV-negative disease or when antiviral routing is not
  appropriate.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "rituximab monotherapy for treatment-requiring HCV-negative SMZL when clinically appropriate"
  - "bendamustine + rituximab for relapsed or treatment-requiring SMZL after specialist review"
contraindicated_monotherapy:
  - "Do not use CD20 positivity to bypass mandatory HCV RNA assessment in SMZL."
  - "Do not give anti-CD20 therapy without HBV reactivation risk assessment and prophylaxis where indicated."
primary_sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-MZL-2024
  - SRC-BSH-MZL-2024
last_verified: "2026-05-06"
