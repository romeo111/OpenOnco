id: BMA-HCV-RNA-SPLENIC-MZL
biomarker_id: BIO-HCV-RNA
variant_qualifier: "detectable HCV RNA in splenic marginal zone lymphoma"
disease_id: DIS-SPLENIC-MZL
escat_tier: IA
evidence_summary: >
  Detectable HCV RNA identifies the antiviral-first SMZL pathway when liver
  status permits, because HCV-associated indolent MZL can regress after viral
  eradication. Hosted SMZL pathways require HCV testing and route compensated
  HCV-positive patients to DAA therapy before lymphoma-directed treatment unless
  aggressive features or contraindications require another approach.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "direct-acting antiviral therapy first for compensated HCV RNA-positive SMZL when clinically appropriate"
  - "rituximab-based lymphoma therapy if antiviral-first management is not appropriate or lymphoma remains treatment-requiring"
contraindicated_monotherapy:
  - "Do not treat anti-HCV antibody positivity as active HCV without HCV RNA confirmation."
  - "Do not start DAA-only management for aggressive, transformed, or immediately organ-threatening lymphoma without MDT review."
primary_sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-MZL-2024
  - SRC-BSH-MZL-2024
last_verified: "2026-05-06"
