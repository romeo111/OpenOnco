      - BIO-HCV-RNA
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "Hosted SMZL pathway routes detectable HCV RNA and compensated liver status to antiviral-first therapy."
actionability_review_required: true
notes: >
  HCV RNA is etiologic and route-defining in SMZL; it should not replace CD20,
  histology, spleen/cytopenia severity, or liver status assessment.
