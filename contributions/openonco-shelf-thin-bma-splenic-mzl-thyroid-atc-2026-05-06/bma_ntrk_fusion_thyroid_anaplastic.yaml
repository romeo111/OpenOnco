id: BMA-NTRK-FUSION-THYROID-ANAPLASTIC
biomarker_id: BIO-NTRK-FUSION
variant_qualifier: "NTRK fusion in anaplastic thyroid carcinoma"
disease_id: DIS-THYROID-ANAPLASTIC
escat_tier: IA
evidence_summary: >
  NTRK fusions are rare but targetable in anaplastic thyroid carcinoma. Hosted
  ATC disease notes call for rapid molecular testing beyond BRAF because
  wild-type BRAF cases can still harbor targetable NTRK or RET alterations.
  This sidecar is review-required because the hosted ATC 1L algorithm currently
  models only BRAF V600E targeted therapy versus chemotherapy.
regulatory_approval:
  fda:
    - "larotrectinib - NTRK fusion-positive solid tumors"
    - "entrectinib - NTRK fusion-positive solid tumors"
  ema:
    - "larotrectinib - NTRK fusion-positive solid tumors"
    - "entrectinib - NTRK fusion-positive solid tumors"
  ukraine: []
recommended_combinations:
  - "larotrectinib or entrectinib for confirmed NTRK fusion-positive ATC when tumor-agnostic criteria and access are met"
  - "urgent ATC multimodal review; do not delay airway and local-control decisions while awaiting broad NGS"
contraindicated_monotherapy:
  - "Do not infer NTRK fusion status without confirmatory RNA/DNA fusion testing."
  - "Do not use NTRK-targeted therapy to bypass urgent ATC airway and local-control assessment."
primary_sources:
