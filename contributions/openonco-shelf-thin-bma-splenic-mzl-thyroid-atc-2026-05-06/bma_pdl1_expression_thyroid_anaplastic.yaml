id: BMA-PDL1-EXPRESSION-THYROID-ANAPLASTIC
biomarker_id: BIO-PDL1-EXPRESSION
variant_qualifier: "PD-L1-positive anaplastic thyroid carcinoma by IHC"
disease_id: DIS-THYROID-ANAPLASTIC
escat_tier: IIB
evidence_summary: >
  PD-L1 expression may support immune-checkpoint inhibitor consideration in ATC
  after urgent genotype, airway, local-control, and access review. Hosted ATC
  notes mention pembrolizumab if PD-L1-positive, but the current ATC algorithm
  does not yet model a PD-L1-specific immunotherapy branch.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "checkpoint inhibitor consideration only after specialist review and when standard ATC options are unsuitable or exhausted"
contraindicated_monotherapy:
  - "Do not use PD-L1 expression to delay BRAF V600E testing, targetable-fusion testing, or urgent airway/local-control decisions."
  - "Do not assume PD-L1 positivity alone has the same evidence strength as BRAF V600E targeted therapy in ATC."
primary_sources:
