id: BMA-RET-FUSION-THYROID-ANAPLASTIC
biomarker_id: BIO-RET
variant_qualifier: "RET fusion in anaplastic thyroid carcinoma"
disease_id: DIS-THYROID-ANAPLASTIC
escat_tier: IA
evidence_summary: >
  RET fusions are rare but targetable in anaplastic thyroid carcinoma, usually
  in the setting of dedifferentiated thyroid cancer biology. Hosted ATC notes
  identify RET as a rare actionable alteration, but the current ATC 1L algorithm
  only models BRAF V600E targeted therapy versus chemotherapy. This sidecar
  preserves RET traceability as review-required pending a dedicated ATC RET
  pathway.
regulatory_approval:
  fda:
    - "selpercatinib - RET fusion-positive thyroid cancer"
    - "pralsetinib - RET fusion-positive thyroid cancer"
  ema: []
  ukraine: []
recommended_combinations:
  - "selpercatinib or pralsetinib for confirmed RET fusion-positive ATC when thyroid-cancer label/context and access are met"
  - "urgent ATC multimodal review with rapid fusion testing when BRAF V600E is absent"
contraindicated_monotherapy:
  - "Do not infer RET fusion status from RET expression or mutation testing alone; confirm fusion status."
  - "Do not delay urgent ATC airway and local-control decisions while awaiting broad NGS."
primary_sources:
  - SRC-NCCN-THYROID-2025
  - SRC-ATA-ATC-2021
  - SRC-FDA-CDS-2026
