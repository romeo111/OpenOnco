id: BMA-TMB-HIGH-THYROID-ANAPLASTIC
biomarker_id: BIO-TMB-HIGH
variant_qualifier: "TMB-high anaplastic thyroid carcinoma"
disease_id: DIS-THYROID-ANAPLASTIC
escat_tier: IIA
evidence_summary: >
  TMB-high status may support tissue-agnostic immune-checkpoint inhibitor
  eligibility in ATC when standard urgent ATC options, BRAF status, targetable
  fusions, and local-control needs have been reviewed. Hosted ATC notes mention
  pembrolizumab in biomarker-selected contexts, but the current ATC algorithm
  does not yet model TMB-high routing.
regulatory_approval:
  fda:
    - "pembrolizumab - TMB-high solid tumors after prior therapy when no satisfactory alternatives exist"
  ema: []
  ukraine: []
recommended_combinations:
  - "pembrolizumab consideration for TMB-high ATC only after urgent ATC pathway and access review"
contraindicated_monotherapy:
  - "Do not use TMB-high status to delay BRAF V600E testing or urgent airway/local-control decisions."
  - "Do not treat TMB-high as automatically superior to genotype-matched targeted therapy in ATC."
primary_sources:
