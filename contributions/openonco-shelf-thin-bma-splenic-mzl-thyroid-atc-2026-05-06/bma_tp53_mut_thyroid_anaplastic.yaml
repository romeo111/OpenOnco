evidence_summary: >
  TP53 mutation is common in ATC and supports aggressive dedifferentiated tumor
  biology, but it is not a standard targeted-therapy selector. Hosted ATC
  disease notes list TP53 as prognostic/dedifferentiation biology while routing
  actionable first-line therapy by BRAF V600E and other targetable fusions.
