id: BIO-PML-RARA-FUSION
names:
  preferred: PML-RARA fusion
  ukrainian: PML-RARA fusion
  english: PML-RARA fusion
  synonyms:
  - PML::RARA
  - t(15;17)(q24;q21)
  - APL defining fusion
biomarker_type: gene_fusion
mutation_details:
  gene: PML::RARA
  variant_type: fusion
  functional_impact: APL-defining fusion oncoprotein; retinoic-acid receptor repression
    reversed by ATRA and PML moiety degraded by arsenic trioxide.
measurement:
  method: RT-PCR, FISH, karyotype, or fusion-capable NGS; RT-qPCR is used for MRD
    monitoring after remission.
  units: categorical at diagnosis; quantitative transcript level for MRD.
specimen_requirements:
- Bone marrow aspirate preferred at diagnosis.
- Peripheral blood acceptable when circulating abnormal promyelocytes are present.
related_biomarkers:
- BIO-CD33-EXPRESSION
- BIO-FLT3-ITD
- BIO-RAS-MUTATION
sources:
- SRC-ELN-APL-2019
- SRC-NCCN-AML-2025
- SRC-APL0406-LOCOCO-2013
last_reviewed: '2026-05-06'
oncokb_skip_reason: fusion_mvp
external_ids:
  hgnc_symbol: PML::RARA
notes: >
  PML-RARA is the molecular definition of classic APL and the reason APL is
  separated from non-APL AML in OpenOnco. It is both diagnostic and predictive:
  ATRA targets the RARA differentiation block, while arsenic trioxide degrades
  the PML-RARA oncoprotein. Treat as a fusion marker, not a point-variant
  lookup.
ukrainian_review_status: pending_clinical_signoff
