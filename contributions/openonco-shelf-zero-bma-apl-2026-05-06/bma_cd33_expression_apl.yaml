id: BMA-CD33-EXPRESSION-APL
biomarker_id: BIO-CD33-EXPRESSION
variant_qualifier: CD33-positive APL blasts
disease_id: DIS-APL
escat_tier: IIIB
evidence_summary: >
  APL blasts are typically CD33-positive, which provides a rationale for
  gemtuzumab ozogamicin in relapsed or refractory APL when ATO/ATRA-based salvage
  is insufficient or when a clinician chooses an anti-CD33-containing salvage
  strategy. This is not a frontline replacement for ATRA/ATO.
regulatory_approval:
  fda:
  - Gemtuzumab ozogamicin is approved for CD33-positive AML; APL-specific salvage
    use should be treated as specialist-directed/off-label unless label review says
    otherwise.
  ema: []
  ukraine:
  - OpenOnco currently marks gemtuzumab ozogamicin as not registered in Ukraine.
recommended_combinations:
- Gemtuzumab ozogamicin with ATO +/- ATRA in selected relapsed APL after expert review.
contraindicated_monotherapy: []
primary_sources:
- SRC-MYLOFRANCE-ARIBI-2007
- SRC-APL-RELAPSE-LENGFELDER-2017
- SRC-ELN-APL-2019
