id: BMA-FLT3-ITD-APL
biomarker_id: BIO-FLT3-ITD
variant_qualifier: FLT3-ITD co-mutation in PML-RARA APL
disease_id: DIS-APL
escat_tier: X
evidence_summary: >
  FLT3-ITD can occur as a co-mutation in APL and is associated with leukocytosis
  and higher-risk presentation in some series. Current OpenOnco APL routing is
  still driven by Sanz risk and PML-RARA-directed ATRA/ATO-based therapy; FLT3
  inhibitor use is not established as standard APL actionability.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
- Use Sanz-risk and APL-specific treatment algorithms rather than AML FLT3-inhibitor
  routing.
contraindicated_monotherapy:
- FLT3 inhibitor monotherapy for APL.
primary_sources:
- SRC-ELN-APL-2019
- SRC-NCCN-AML-2025
- SRC-ESMO-AML-2020
