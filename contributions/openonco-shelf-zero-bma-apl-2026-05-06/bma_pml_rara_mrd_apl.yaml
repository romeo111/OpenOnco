id: BMA-PML-RARA-MRD-APL
biomarker_id: BIO-PML-RARA-FUSION
variant_qualifier: RT-qPCR measurable residual disease
disease_id: DIS-APL
escat_tier: IA
evidence_summary: >
  Quantitative PML-RARA RT-PCR after therapy is the core MRD marker in APL.
  Molecular remission supports standard consolidation/monitoring, while molecular
  persistence or relapse requires urgent expert review and may redirect salvage
  strategy. This is monitoring actionability rather than a new drug target.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
- MRD-guided surveillance after induction/consolidation.
- Salvage ATRA + arsenic trioxide-based therapy for molecular or hematologic relapse
  after clinician confirmation.
contraindicated_monotherapy: []
