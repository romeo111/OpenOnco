id: BMA-PML-RARA-VARIANT-FUSION-APL
biomarker_id: BIO-PML-RARA-FUSION
variant_qualifier: RARA rearrangement with variant partner or atypical APL genetics
disease_id: DIS-APL
escat_tier: IIIB
evidence_summary: >
  Rare APL-like RARA rearrangements with non-PML partners can differ in ATRA and
  arsenic sensitivity. They should trigger hematopathology/molecular review rather
  than automatic use of the classic PML-RARA treatment assumption. This draft uses
  the PML-RARA biomarker entity as a temporary anchor until a separate RARA
  rearrangement biomarker is authored.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
- Expert molecular review to confirm whether the rearrangement behaves like classic
  PML-RARA APL.
contraindicated_monotherapy:
- Assuming classic PML-RARA actionability without partner confirmation.
primary_sources:
