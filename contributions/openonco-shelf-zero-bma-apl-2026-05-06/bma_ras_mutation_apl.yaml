id: BMA-RAS-MUTATION-APL
biomarker_id: BIO-RAS-MUTATION
variant_qualifier: KRAS or NRAS co-mutation in PML-RARA APL
disease_id: DIS-APL
escat_tier: X
evidence_summary: >
  KRAS/NRAS mutations may appear as cooperating mutations in myeloid neoplasms, but
  they do not currently define standard targeted treatment in APL. APL management
  should remain anchored on PML-RARA-directed therapy, Sanz risk, DIC management,
  and MRD response.
