id: BMA-TP53-MUTATION-APL
biomarker_id: BIO-TP53-MUTATION
variant_qualifier: TP53 mutation co-occurring with PML-RARA APL
disease_id: DIS-APL
escat_tier: X
evidence_summary: >
  TP53 mutation is not a standard therapy-selection marker for APL. If detected,
  it should prompt review for diagnostic ambiguity, therapy-related disease, or
  additional myeloid biology, while frontline APL actionability remains driven by
  PML-RARA, Sanz risk, and response/MRD.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
- Hematopathology and molecular review if TP53 mutation is prominent or discordant
  with classic APL morphology/genetics.
contraindicated_monotherapy:
- TP53-directed investigational therapy outside a trial as APL standard care.
primary_sources:
- SRC-ELN-APL-2019
- SRC-NCCN-AML-2025
- SRC-ESMO-AML-2020
