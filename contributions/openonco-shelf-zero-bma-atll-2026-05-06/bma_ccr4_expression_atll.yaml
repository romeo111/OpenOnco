id: BMA-CCR4-EXPRESSION-ATLL
biomarker_id: BIO-CCR4-IHC
variant_qualifier: "CCR4 protein expression in ATLL cells"
disease_id: DIS-ATLL
escat_tier: IIB
evidence_summary: >
  CCR4 expression is frequent in ATLL and provides biologic rationale for
  CCR4-directed therapy such as mogamulizumab in relapsed or refractory
  disease. The clinical action is jurisdiction-sensitive: confirm local
  registration, reimbursement, transplant timing, and GVHD risk before use.
  This sidecar should be reviewed as a specialist option, not an automatic
  first-line recommendation.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "mogamulizumab for relapsed/refractory CCR4-positive ATLL when accessible and clinically appropriate"
contraindicated_monotherapy: []
primary_sources:
