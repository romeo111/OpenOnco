    level: "consensus treatment option"
    evidence_ids: []
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: molecular_evidence_option
    note: "Consensus ATLL source discusses mogamulizumab as a CCR4-directed option in ATLL management."
actionability_review_required: true
notes: >
  Transplant sequencing is safety-critical because mogamulizumab exposure
  before allogeneic transplant can increase severe GVHD risk. Keep review
  required until local access and timing language is confirmed.
