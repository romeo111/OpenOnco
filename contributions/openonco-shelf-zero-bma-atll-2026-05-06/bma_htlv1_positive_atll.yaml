id: BMA-HTLV1-POSITIVE-ATLL
biomarker_id: BIO-HTLV-1
variant_qualifier: "confirmed HTLV-1 seropositivity or clonal HTLV-1 integration"
disease_id: DIS-ATLL
escat_tier: IIIA
evidence_summary: >
  HTLV-1 positivity is disease-defining for adult T-cell leukemia/lymphoma.
  In a suspected mature T-cell leukemia/lymphoma, confirmed HTLV-1 status
  supports classification as ATLL and routes the patient into ATLL-specific
  subtype assessment and treatment pathways. It is not by itself a drug
  sensitivity biomarker, so treatment choice still depends on subtype,
  disease tempo, fitness, and access.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "ATLL-specific diagnostic and subtype pathway after HTLV-1 confirmation"
contraindicated_monotherapy: []
primary_sources:
  - SRC-IMC-HTLV-2017
  - SRC-NCCN-BCELL-2025
last_verified: "2026-05-06"
evidence_sources:
  - source: SRC-IMC-HTLV-2017
    level: "international consensus"
    evidence_ids: []
    direction: Supports
    significance: Diagnostic
    evidence_lane: standard_care
    note: "Consensus source defines ATL/ATLL as a mature T-cell malignancy caused by chronic HTLV-1 infection."
actionability_review_required: true
notes: >
  ESCAT IIIA is used conservatively because this is diagnostic and pathway
  routing evidence, not a direct molecular drug-response claim. Confirmatory
  testing should distinguish HTLV-1 from HTLV-2 and resolve indeterminate
  serology before classification.
