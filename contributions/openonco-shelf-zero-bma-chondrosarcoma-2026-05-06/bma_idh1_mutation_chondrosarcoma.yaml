id: BMA-IDH1-MUTATION-CHONDROSARCOMA
biomarker_id: BIO-IDH-MUTATION
variant_qualifier: "IDH1 R132 hotspot mutation in advanced conventional chondrosarcoma; specify allele when available"
disease_id: DIS-CHONDROSARCOMA
escat_tier: IIB
evidence_summary: >
  IDH1 mutations are common in conventional chondrosarcoma and identify a
  subset with evidence of disease control on the mutant-IDH1 inhibitor
  ivosidenib in advanced disease. This is not a curative or standard
  perioperative recommendation; it is a review-required systemic option for
  unresectable or metastatic IDH1-mutant conventional chondrosarcoma when
  clinical trial, compassionate, or off-label access is appropriate.
