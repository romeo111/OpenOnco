actionability_review_required: true
notes: >
  ESCAT IIB is conservative for rare-disease single-arm evidence. Do not
  use this BMA to override surgery for localized disease or histology-specific
  sarcoma management. Confirm IDH1 allele by NGS; R132C may be missed by
  R132H-only IHC.
