id: BMA-CD30-EXPRESSION-EATL
biomarker_id: BIO-CD30-IHC
variant_qualifier: "CD30 expression in EATL cells"
disease_id: DIS-EATL
escat_tier: IIB
evidence_summary: >
  CD30 expression is variable in EATL but can support specialist review of
  brentuximab-containing therapy extrapolated from CD30-positive peripheral
  T-cell lymphoma evidence. This should not replace the current CHOEP plus
  transplant-oriented pathway unless hematology review confirms CD30-positive
  disease, treatment line, access, and bowel/perforation risk.
