id: BMA-EGFR-EXPRESSION-HNSCC
biomarker_id: BIO-EGFR-EXPRESSION-IHC
variant_qualifier: "EGFR expression context for cetuximab-containing HNSCC therapy"
disease_id: DIS-HNSCC
escat_tier: IB
evidence_summary: >
  EGFR is the biologic target for cetuximab-containing therapy in recurrent
  or metastatic HNSCC, including the EXTREME regimen. EGFR expression should
  be treated as mechanism/context rather than a precise positive predictor:
  regimen selection still depends on line of therapy, PD-L1 CPS, fitness,
  contraindications to immunotherapy, and access.
regulatory_approval:
  fda:
    - "cetuximab-containing therapy - HNSCC settings per label and guideline context"
  ema: []
  ukraine: []
recommended_combinations:
  - "cetuximab + platinum + 5-FU (EXTREME) when indicated for recurrent/metastatic HNSCC"
contraindicated_monotherapy: []
primary_sources:
  - SRC-EXTREME-VERMORKEN-2008
  - SRC-NCCN-HNSCC-2025
last_verified: "2026-05-06"
evidence_sources:
  - source: SRC-EXTREME-VERMORKEN-2008
    level: "phase III regimen evidence"
    evidence_ids: []
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "EXTREME established cetuximab plus platinum/5-FU in recurrent/metastatic SCCHN before the immunotherapy era."
actionability_review_required: true
notes: >
  Do not use EGFR IHC intensity alone as a hard selection threshold. This row
  exists to connect cetuximab mechanism to biomarker review and safety notes.
