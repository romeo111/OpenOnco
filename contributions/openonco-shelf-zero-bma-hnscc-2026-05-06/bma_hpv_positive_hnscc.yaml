id: BMA-HPV-POSITIVE-HNSCC
biomarker_id: BIO-HPV-STATUS
variant_qualifier: "HPV-positive or p16-positive oropharyngeal squamous cell carcinoma context"
disease_id: DIS-HNSCC
escat_tier: IA
evidence_summary: >
  HPV-positive or p16-positive oropharyngeal HNSCC is a core prognostic and
  staging marker with better outcomes and AJCC 8 stage grouping. It should
  not automatically de-escalate curative therapy outside protocol-driven
  settings, and it does not change recurrent/metastatic systemic therapy
  selection by itself.
