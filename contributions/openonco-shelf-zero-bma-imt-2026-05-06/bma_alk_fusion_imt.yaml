id: BMA-ALK-FUSION-IMT
biomarker_id: BIO-ALK-FUSION
variant_qualifier: "ALK rearrangement/fusion in inflammatory myofibroblastic tumor"
disease_id: DIS-IMT
escat_tier: IA
evidence_summary: >
  ALK fusion is the central actionable driver in a large subset of
  inflammatory myofibroblastic tumors. For unresectable, multifocal, or
  metastatic ALK-positive IMT, OpenOnco already has an indication and regimen
  path for crizotinib; this BMA adds biomarker-layer traceability for that
  routing and keeps clinical review required.
regulatory_approval:
  fda:
    - "crizotinib - ALK-positive inflammatory myofibroblastic tumor in eligible adult and pediatric settings per label/guideline context"
  ema: []
  ukraine: []
recommended_combinations:
  - "crizotinib monotherapy for unresectable or metastatic ALK-positive IMT when surgery is insufficient"
  - "next-generation ALK inhibitor review for progression on crizotinib or CNS-risk context"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-SARCOMA
last_verified: "2026-05-06"
evidence_sources:
  - source: SRC-NCCN-SARCOMA
    level: "guideline supported option"
    evidence_ids:
      - IND-IMT-ALK-CRIZOTINIB
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "Existing hosted IMT indication routes ALK-positive unresectable/metastatic IMT to crizotinib."
actionability_review_required: true
notes: >
  Confirm fusion by RNA-NGS, FISH, or validated ALK IHC with orthogonal
  confirmation where feasible. Localized resectable IMT remains primarily
  surgical.
