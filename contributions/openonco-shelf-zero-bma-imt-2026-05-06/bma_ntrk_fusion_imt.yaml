id: BMA-NTRK-FUSION-IMT
biomarker_id: BIO-NTRK-FUSION
variant_qualifier: "NTRK1/2/3 fusion in inflammatory myofibroblastic tumor"
disease_id: DIS-IMT
escat_tier: IA
evidence_summary: >
  NTRK fusion is rare in IMT but is tumor-agnostically actionable when a
  pathogenic NTRK1/2/3 fusion is confirmed. Larotrectinib or entrectinib may
  be considered under tumor-agnostic NTRK-fusion pathways when surgery or
  local therapy is insufficient and no better disease-specific option exists.
regulatory_approval:
  fda:
    - "larotrectinib or entrectinib - NTRK fusion-positive solid tumors in tumor-agnostic settings"
  ema: []
  ukraine: []
recommended_combinations:
  - "larotrectinib monotherapy for confirmed NTRK-fusion solid tumor when clinically appropriate"
  - "entrectinib monotherapy for confirmed NTRK-fusion solid tumor when clinically appropriate"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NAVIGATE-DRILON-2018
  - SRC-SCOUT
last_verified: "2026-05-06"
evidence_sources:
