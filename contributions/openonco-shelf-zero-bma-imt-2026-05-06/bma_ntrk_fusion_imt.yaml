    level: "tumor-agnostic clinical trial evidence"
    evidence_ids: []
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "Tumor-agnostic NTRK fusion evidence supports TRK inhibitor review across solid tumors."
actionability_review_required: true
notes: >
  Confirm an oncogenic NTRK fusion, not simple NTRK expression. If ALK fusion
  is also present, sarcoma molecular tumor board should adjudicate driver
  hierarchy and access.
