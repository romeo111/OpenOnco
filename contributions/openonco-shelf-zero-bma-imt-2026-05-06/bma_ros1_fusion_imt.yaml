evidence_summary: >
  ROS1 fusion is an uncommon but plausible actionable driver in ALK-negative
  IMT. ROS1-directed therapy should be handled through sarcoma molecular
  tumor board review, with drug choice and access individualized. This row
  is not a substitute for the stronger ALK-positive crizotinib pathway.
