id: BMA-BRAF-V600E-GLIOMA-LOW-GRADE
biomarker_id: BIO-BRAF-V600E
variant_qualifier: "BRAF V600E mutation in low-grade glioma"
disease_id: DIS-GLIOMA-LOW-GRADE
escat_tier: IIA
evidence_summary: >
  BRAF V600E is an actionable MAPK-pathway alteration enriched in
  pediatric-type low-grade glioma and selected circumscribed gliomas. BRAF/MEK
  targeted therapy may be considered in appropriate recurrent, progressive,
  or unresectable settings after neuro-oncology review. Adult IDH-mutant LGG
  remains primarily IDH/integrated-diagnosis driven.
regulatory_approval:
  fda:
    - "dabrafenib plus trametinib - BRAF V600E solid tumor / pediatric low-grade glioma context per label and guideline review"
  ema: []
  ukraine: []
recommended_combinations:
  - "dabrafenib + trametinib for confirmed BRAF V600E low-grade glioma when clinically appropriate"
