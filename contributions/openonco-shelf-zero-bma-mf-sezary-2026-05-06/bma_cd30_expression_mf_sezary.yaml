id: BMA-CD30-EXPRESSION-MF-SEZARY
biomarker_id: BIO-CD30-IHC
variant_qualifier: "CD30 expression in advanced MF/Sezary syndrome or large-cell-transformed MF"
disease_id: DIS-MF-SEZARY
escat_tier: IA
evidence_summary: >
  CD30 expression supports brentuximab vedotin monotherapy in advanced
  CD30-positive MF/Sezary syndrome, especially skin/nodal-dominant or
  large-cell-transformed disease. Hosted MF content already routes CD30-positive
  advanced disease to IND-MF-ADVANCED-1L-BV when clinically appropriate.
regulatory_approval:
  fda:
    - "brentuximab vedotin - CD30-expressing mycosis fungoides after prior systemic therapy per label context"
  ema: []
  ukraine: []
recommended_combinations:
  - "brentuximab vedotin monotherapy for CD30-positive advanced MF/Sezary where hosted criteria are met"
contraindicated_monotherapy:
  - "Do not use brentuximab vedotin with grade 2 or higher baseline peripheral neuropathy without specialist risk review."
  - "Do not combine brentuximab vedotin with bleomycin."
primary_sources:
