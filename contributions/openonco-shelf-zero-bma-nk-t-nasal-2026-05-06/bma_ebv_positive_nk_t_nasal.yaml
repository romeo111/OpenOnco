id: BMA-EBV-POSITIVE-NK-T-NASAL
biomarker_id: BIO-EBV-STATUS
variant_qualifier: "EBER-positive tumor tissue and/or EBV-driven extranodal NK/T-cell lymphoma context"
disease_id: DIS-NK-T-NASAL
escat_tier: IA
evidence_summary: >
  EBV positivity by EBER-ISH is defining diagnostic context for extranodal
  NK/T-cell lymphoma, nasal type. Quantitative plasma EBV-DNA is also used
  in the hosted NK/T pathway as baseline, response, and surveillance context;
  it should not be treated as a standalone drug-selection gate.
