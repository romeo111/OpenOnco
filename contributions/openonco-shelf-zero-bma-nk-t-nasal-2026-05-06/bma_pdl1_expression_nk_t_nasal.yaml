id: BMA-PDL1-EXPRESSION-NK-T-NASAL
biomarker_id: BIO-PDL1-EXPRESSION
variant_qualifier: "PD-L1 expression or CD274 alteration context in relapsed/refractory extranodal NK/T-cell lymphoma"
disease_id: DIS-NK-T-NASAL
escat_tier: IIB
evidence_summary: >
  PD-L1 expression and CD274 immune-evasion biology support the hosted
  relapsed/refractory NK/T nasal checkpoint-inhibitor pathway. PD-L1 IHC is
  desirable for prognostic and response-context stratification, but the hosted
  2L avelumab indication does not require PD-L1 positivity as a gating test.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "checkpoint inhibitor therapy only within the existing relapsed/refractory NK/T nasal indication context and specialist review"
contraindicated_monotherapy:
  - "Do not use PD-L1 expression alone to bypass first-line asparaginase-based therapy when standard 1L treatment is appropriate."
