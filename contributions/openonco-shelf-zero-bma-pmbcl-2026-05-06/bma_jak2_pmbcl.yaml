id: BMA-JAK2-PMBCL
biomarker_id: BIO-JAK2-COPY-GAIN
variant_qualifier: "JAK2 copy gain as part of PMBCL 9p24.1 biology"
disease_id: DIS-PMBCL
escat_tier: IIIB
evidence_summary: >
  JAK2 copy gain in PMBCL is usually part of the 9p24.1 copy-number pattern
  that also involves PD-L1/PD-L2. It supports biologic annotation and trial
  discussion but does not justify JAK-inhibitor treatment selection in routine
  OpenOnco PMBCL care.
