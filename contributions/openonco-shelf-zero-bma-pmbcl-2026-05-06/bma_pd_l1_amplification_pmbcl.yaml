    evidence_ids:
      - KEYNOTE-170
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "Final KEYNOTE-170 analysis supports pembrolizumab activity in relapsed/refractory PMBCL."
  - source: SRC-FDA-PEMBROLIZUMAB-PMBCL-2018
    level: "regulatory approval"
    evidence_ids:
      - KEYNOTE-170
    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "FDA approval is disease-context based, not dependent on a PD-L1 amplification assay."
actionability_review_required: true
notes: >
  Keep the BMA subordinate to PMBCL relapsed/refractory indication logic.
  9p24.1 testing adds biologic traceability but should not create a new
  first-line or urgent-cytoreduction rule.
