id: BMA-PD-L1-AMPLIFICATION-PMBCL
biomarker_id: BIO-9P24-1-AMPLIFICATION
variant_qualifier: "9p24.1 copy gain involving CD274/PD-L1 and PDCD1LG2/PD-L2 in PMBCL"
disease_id: DIS-PMBCL
escat_tier: IIA
evidence_summary: >
  PMBCL commonly has 9p24.1 copy gain/amplification involving PD-L1, PD-L2,
  and JAK2. This biology supports the relapsed/refractory checkpoint-inhibitor
  pathway already described in hosted PMBCL content, including pembrolizumab
  after refractory disease or relapse after multiple prior lines. Testing for
  9p24.1 is not required as a standalone gate in the existing indications.
regulatory_approval:
  fda:
    - "pembrolizumab - refractory PMBCL or relapse after two or more prior lines, not PD-L1-amplification gated"
  ema: []
  ukraine: []
recommended_combinations:
  - "pembrolizumab monotherapy only within relapsed/refractory PMBCL indication context and specialist review"
contraindicated_monotherapy:
  - "Do not use pembrolizumab when urgent cytoreduction is required; use cytoreductive salvage/CAR-T pathway per clinical context."
primary_sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-LYMPHOMA-2025
  - SRC-ZINZANI-KEYNOTE170-PMBCL-2023
  - SRC-FDA-PEMBROLIZUMAB-PMBCL-2018
