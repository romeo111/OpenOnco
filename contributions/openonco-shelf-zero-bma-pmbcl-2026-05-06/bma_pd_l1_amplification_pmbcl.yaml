    direction: Supports
    significance: Sensitivity/Response
    evidence_lane: standard_care
    note: "Hosted 2L PMBCL indication already notes pembrolizumab as an option for chemorefractory disease or when CAR-T is inaccessible."
  - source: SRC-ZINZANI-KEYNOTE170-PMBCL-2023
