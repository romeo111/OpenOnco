id: BMA-ALK-RULE-OUT-PTCL-NOS
biomarker_id: BIO-ALK-REARRANGEMENT
variant_qualifier: "ALK rearrangement testing as ALCL rule-out before assigning PTCL-NOS"
disease_id: DIS-PTCL-NOS
escat_tier: IA
evidence_summary: >
  PTCL-NOS is a diagnosis of exclusion. ALK rearrangement or strong ALK
  expression should trigger review for ALK-positive ALCL rather than keeping
  the case classified as PTCL-NOS. This sidecar is a diagnostic guardrail and
  does not create an ALK-inhibitor treatment rule for PTCL-NOS.
