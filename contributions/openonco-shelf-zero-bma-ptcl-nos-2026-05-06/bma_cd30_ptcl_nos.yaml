id: BMA-CD30-PTCL-NOS
biomarker_id: BIO-CD30-IHC
variant_qualifier: "CD30 expression by IHC in PTCL-NOS, typically using the 10% ECHELON-2 threshold"
disease_id: DIS-PTCL-NOS
escat_tier: IA
evidence_summary: >
  CD30 expression in PTCL-NOS routes eligible patients to the hosted
  brentuximab vedotin plus CHP first-line pathway when clinically feasible.
  The existing PTCL algorithm already uses RF-TCELL-CD30-POSITIVE to select
  IND-TCELL-1L-CHP-BV over CHOEP for CD30-positive disease.
regulatory_approval:
  fda:
    - "brentuximab vedotin plus CHP - previously untreated CD30-expressing PTCL including PTCL-NOS per label/guideline context"
  ema: []
  ukraine: []
recommended_combinations:
  - "brentuximab vedotin + CHP for CD30-positive PTCL-NOS when fit and accessible"
contraindicated_monotherapy:
  - "Do not combine brentuximab vedotin with bleomycin."
  - "Do not omit CD30 IHC before choosing CHOEP versus CHP-BV in PTCL-NOS."
primary_sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-PTCL-2024
  - SRC-ECHELON-2-HORWITZ-2019
