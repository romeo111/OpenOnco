variant_qualifier: "CD52 expression in T-cell prolymphocytic leukemia"
disease_id: DIS-T-PLL
escat_tier: IA
evidence_summary: >
  CD52 expression is the therapeutic target for alemtuzumab in T-PLL. Hosted
  T-PLL first-line content requires CD52 positivity and routes to IV
  alemtuzumab induction with immediate allo-SCT planning in fit responders.
