      retry_after_15s: 403
    url_check_url: https://ascopubs.org/doi/10.1200/JCO.2009.25.4037
    content_current: yes
    content_current_evidence: |
      OVA-301 (Monk et al., JCO 2010, doi 10.1200/JCO.2009.25.4037,
      PMID 20194850) remains the registrational publication for trabectedin
      + PLD in recurrent ovarian cancer. Trabectedin is an EMA-approved
      regimen for recurrent ovarian cancer; FDA approval was withdrawn
      historically. ESMO ovarian cancer guideline 2024 retains the
      OVA-301 evidence as basis for trabectedin + PLD recommendation in
      partially-platinum-sensitive recurrence when re-platinum is
      undesirable. No supersession.
    proposed_current_as_of: '2026-05-01'
    license_status: unchanged
    license_status_detail: 'ASCO (subscription); commercial_use_allowed: false; redistribution_allowed: false. No visible change.'
    notes: |
