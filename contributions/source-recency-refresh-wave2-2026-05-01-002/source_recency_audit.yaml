  - id: SRC-INVICTUS
    url_verified: no
    url_check_status: skipped_no_url_in_stub
    content_current: yes
    content_current_evidence: |
      INVICTUS (NCT03353753) is a known phase-3 trial of ripretinib
      vs placebo in 4L+ advanced GIST. Primary publication: Blay et al.,
      Lancet Oncol 2020;21(7):923-934 (PMID 32511981, doi
      10.1016/S1470-2045(20)30168-6). Approved as standard 4L+ GIST
      regimen by FDA (2020-05-15) and EMA (2020-11-18). No supersession;
      INVICTUS remains the registrational evidence and current ESMO/NCCN
      GIST guidelines (2024 / 2025) cite it as level-1 evidence for 4L+.
    proposed_current_as_of: '2026-05-01'
    proposed_url: https://pubmed.ncbi.nlm.nih.gov/32511981
    proposed_doi: 10.1016/S1470-2045(20)30168-6
    proposed_pmid: '32511981'
    license_status: pending
    notes: |
      Stub still has TODO citation in title. Recommend maintainer
      upsert: title → "Ripretinib in patients with advanced gastrointestinal
      stromal tumours (INVICTUS): a double-blind, randomised, placebo-
      controlled, phase 3 trial"; authors → Blay JY, Serrano C, Heinrich
      MC, et al.; journal → Lancet Oncology; doi/pmid as proposed above;
      url → PubMed; access_level → subscription_required; license → Elsevier
      (subscription); evidence_tier → 2; current_as_of → 2026-05-01;
      legal_review.status → reviewed. URL check deferred to that upsert
      (no URL field in current stub).

  - id: SRC-OVA-301-MONK-2010
    url_verified: blocked_by_bot_protection
