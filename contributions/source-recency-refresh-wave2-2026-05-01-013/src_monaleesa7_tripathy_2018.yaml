notes: >
  MONALEESA-7 phase-3 (NCT02278120): ribociclib + tamoxifen-or-NSAI + goserelin
  vs placebo + endocrine + goserelin in 1L pre/peri-menopausal HR+/HER2- ABC
  (n=672). Median PFS 23.8 vs 13.0 mo (HR 0.55; p<0.0001). OS update (Im NEJM
  2019): 42-mo OS 70.2% vs 46.0% (HR 0.71; p=0.00973) — first OS benefit
  demonstration for CDK4/6i in pre-menopausal HR+/HER2- ABC.
