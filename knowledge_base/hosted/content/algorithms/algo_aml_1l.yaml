id: ALGO-AML-1L
applicable_to_disease: DIS-AML
applicable_to_line_of_therapy: 1
purpose: >
  Select default + alternative Indication for first-line AML based on
  fitness for intensive 7+3 induction (age, comorbidity, ECOG) and
  emergency / disease-modifier flags. Outputs the two-plan pair: VEN+AZA
  (standard / unfit default) vs 7+3 ± midostaurin (aggressive / fit
  default). FLT3-ITD/TKD addition of midostaurin is handled at the
  regimen layer once 7+3 selected.

output_indications:
  - IND-AML-1L-VEN-AZA
  - IND-AML-1L-7-3
  - IND-AML-1L-7-3-GO-CBF
  - IND-AML-1L-CPX351-SECONDARY

default_indication: IND-AML-1L-VEN-AZA
alternative_indication: IND-AML-1L-7-3

decision_tree:
  # Step 1 — emergency: TLS / leukostasis / hyperleukocytosis HOLD
  # Bumped priority via RF severity; here the algorithm pins to standard
  # (lowest-toxicity) but plan generation should also surface the
  # emergency workup separately.
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-AML-EMERGENCY-TLS-LEUKOSTASIS
    if_true:
      result: IND-AML-1L-VEN-AZA
    if_false:
      next_step: 2

  # Step 2 — frailty / age / organ dysfunction → ven+aza default
  - step: 2
    evaluate:
      any_of:
        - red_flag: RF-AML-FRAILTY-AGE
        - red_flag: RF-AML-ORGAN-DYSFUNCTION
    if_true:
      result: IND-AML-1L-VEN-AZA
    if_false:
      next_step: 3

  # Step 3 — CBF-favorable cytogenetics: t(8;21) RUNX1::RUNX1T1 OR
  # inv(16)/t(16;16) CBFB::MYH11. ELN-favorable; standard 7+3 induction
  # plus high-dose cytarabine consolidation; no alloHCT in CR1 (vs other
  # AML high-risk routings). Gate on fitness — unfit CBF still goes to
  # ven+aza via step 2 (precedes this).
  - step: 3
    evaluate:
      any_of:
        - red_flag: RF-AML-CORE-BINDING-FACTOR-FAVORABLE
    if_true:
      next_step: 4
    if_false:
      next_step: 41

  # Step 4 — CBF-favorable + fit + CD33+ → 7+3 + fractionated GO
  # (ALFA-0701 Castaigne 2012; Hills meta 2014: ~20% relative
  # mortality reduction in favorable / intermediate risk; no benefit
  # in adverse). CD33-positivity (≥20% blasts by flow) is a
  # treatment-defining gate; CBF AML is routinely CD33+ but the
  # explicit finding is required (some pediatric / KIT-mut subsets
  # CD33-low / negative). Fall-through to plain 7+3 if CD33-status
  # unknown / negative or GO inaccessible. Additive 2026-04-30.
  - step: 4
    evaluate:
      all_of:
        - red_flag: RF-AML-CORE-BINDING-FACTOR-FAVORABLE
        - {finding: cd33_positive, value: true}
    if_true:
      result: IND-AML-1L-7-3-GO-CBF
    if_false:
      next_step: 41
    notes: "Wired via RF-AML-CORE-BINDING-FACTOR-FAVORABLE + cd33_positive=true (explicit; ≥20% blasts by flow per ALFA-0701 entry criterion). Daunorubicin 60 mg/m² (not 90) when GO added per ALFA-0701. NOT for adverse-risk (TP53-mut, complex karyotype). Falls through to plain 7+3 if CD33 not documented or GO inaccessible — current 7+3 routing preserved by default."

  # Step 41 — CPX-351 (Vyxeos) for tAML / AML-MRC age 60-75 fit
  # (Lancet 2018 Lancet 2018;392:2088: mOS 9.56 vs 5.95 mo for 7+3,
  # HR 0.69; 5-yr OS 18% vs 8%). Gates BEFORE high-risk-biology step
  # so CPX-351 takes precedence over plain 7+3 when secondary-AML
  # signal is present. Age 60-75 + fitness constraints live in
  # IND-AML-1L-CPX351-SECONDARY.applicable_to.demographic_constraints
  # — engine track-filter drops the indication for out-of-range
  # patients, falling through to step 5 (high-risk-biology → 7+3).
  # Additive 2026-05-01 (W5d carry-forward — closes drift-signal #4
  # from W5b heme chunk that deferred this fix to avoid breaking
  # patient_aml_secondary_cpx351 fixture golden; golden now
  # correctly updated alongside this wiring).
  - step: 41
    evaluate:
      any_of:
        - red_flag: RF-AML-SECONDARY-AML-MRC-CPX351-ELIGIBLE
    if_true:
      result: IND-AML-1L-CPX351-SECONDARY
    if_false:
      next_step: 5
    notes: "Wired via RF-AML-SECONDARY-AML-MRC-CPX351-ELIGIBLE (truthy on therapy_related_aml / antecedent_mds / aml_mrc / aml_secondary). CPX-351 (Vyxeos) is the FDA-approved subset Tx for AML 60-75 fit with secondary biology (lowers OS HR 0.69 vs 7+3); fall-through to step 5 if the RF doesn't fire OR if track-filter drops the IND for age-out-of-range / unfit patients (preserves prior 7+3 routing for those cohorts)."

  # Step 5 — high-risk biology (TP53, complex karyotype) AND FLT3+ AND
  # NPM1-favorable — fit patients escalate to 7+3 (with concurrent alloHCT
  # donor search if transplant-eligible). NPM1-mut without FLT3-ITD is
  # ELN-favorable and benefits from standard 7+3 (no alloHCT in CR1).
  # Note: high-risk biology in unfit patients already routed to ven+aza
  # in step 2.
  - step: 5
    evaluate:
      any_of:
        - red_flag: RF-AML-HIGH-RISK-BIOLOGY
        - red_flag: RF-AML-FLT3-ACTIONABLE
        - red_flag: RF-AML-NPM1-MUT-FAVORABLE
        - red_flag: RF-AML-TRANSFORMATION-PROGRESSION
    if_true:
      result: IND-AML-1L-7-3
    if_false:
      next_step: 6

  # Step 6 — IDH1 / IDH2 actionable. AGILE / IDHENTIFY: ivosidenib /
  # enasidenib + azacitidine for unfit; 7+3 + IDHi emerging for fit.
  # No dedicated IDHi indication in this KB yet (PROD-5 territory) —
  # route to ven+aza backbone with MDT note to consider IDH1/IDH2
  # inhibitor add-on.
  - step: 6
    evaluate:
      any_of:
        - red_flag: RF-AML-IDH1-MUT-ACTIONABLE
        - red_flag: RF-AML-IDH2-MUT-ACTIONABLE
    if_true:
      result: IND-AML-1L-VEN-AZA
    if_false:
      next_step: 7
    notes: "MDT-only — IDH1/IDH2 actionable: route to ven+aza backbone (default unfit-AML standard); MDT to add ivosidenib (IDH1) or enasidenib (IDH2) per AGILE / IDHENTIFY. No dedicated IDHi Indication in KB (PROD-5 deferred)."

  # Step 7 — default for fit patients = 7+3
  - step: 7
    evaluate:
      any_of:
        - condition: "Fit for intensive chemotherapy (default if no fitness flags)"
    if_true:
      result: IND-AML-1L-7-3
    if_false:
      result: IND-AML-1L-7-3
    notes: "Default fall-through — fit patient with no biomarker flags routes to 7+3."

sources:
  - SRC-NCCN-AML-2025
  - SRC-ELN-AML-2022
  - SRC-VIALE-A-DINARDO-2020

last_reviewed: "2026-04-30"
notes: >
  Fit-vs-unfit triage is the dominant decision. FLT3-ITD/TKD adds
  midostaurin via REG-AML-7-3 component dose_adjustment, not via
  separate algorithm branch. CBF + CD33+ adds fractionated GO via
  IND-AML-1L-7-3-GO-CBF (step 4 — additive 2026-04-30, ALFA-0701);
  CBF without explicit CD33-positivity remains on plain 7+3 path
  preserving prior behavior. Transplant eligibility is a parallel
  layer captured in regimen + supportive care planning.
  RF-AML-INFECTION-SCREENING is "investigate"-equivalent and surfaces
  as an annotation, not a tree branch. CPX-351 (IND-AML-1L-CPX351-
  SECONDARY) for tAML / AML-MRC age 60-75 fit remains unwired in this
  algorithm — wiring would redirect curated case patient_aml_secondary_
  cpx351.json (golden IND-AML-1L-7-3) breaking the e2e fixture; deferred
  pending fixture-golden refresh in a follow-up chunk. STUB — requires
  clinical co-lead signoff.
notes_ua: >
  Тріаж «придатний/непридатний» є домінуючим рішенням. FLT3-ITD/TKD
  додає мідостаурин через компонент дозового коригування REG-AML-7-3,
  а не через окрему гілку алгоритму. CBF + CD33+ додає фракційний GO
  через IND-AML-1L-7-3-GO-CBF (крок 4 — доповнення 2026-04-30,
  ALFA-0701); CBF без явної CD33-позитивності залишається на шляху
  звичайного 7+3, зберігаючи попередню поведінку. Придатність до
  трансплантації — паралельний рівень, відображений у плануванні
  режиму та підтримуючої терапії. RF-AML-INFECTION-SCREENING має
  еквівалент «дослідити» та виводиться як анотація, а не гілка дерева.
  CPX-351 (IND-AML-1L-CPX351-
  SECONDARY) для tAML / AML-MRC у пацієнтів 60–75 років придатних
  залишається незадіяним у цьому алгоритмі — розводка порушила б золотий
  фікстур IND-AML-1L-7-3; відкладено на оновлення фікстуру.
  STUB — потребує підпису клінічного со-лідера.
