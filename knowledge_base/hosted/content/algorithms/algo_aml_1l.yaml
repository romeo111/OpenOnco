id: ALGO-AML-1L
applicable_to_disease: DIS-AML
applicable_to_line_of_therapy: 1
purpose: >
  Select default + alternative Indication for first-line AML based on
  fitness for intensive 7+3 induction (age, comorbidity, ECOG) and
  emergency / disease-modifier flags. Outputs the two-plan pair: VEN+AZA
  (standard / unfit default) vs 7+3 ± midostaurin (aggressive / fit
  default). FLT3-ITD/TKD addition of midostaurin is handled at the
  regimen layer once 7+3 selected.

output_indications:
  - IND-AML-1L-VEN-AZA
  - IND-AML-1L-7-3
  - IND-AML-1L-7-3-GO-CBF
  - IND-AML-1L-CPX351-SECONDARY
  - IND-AML-1L-IDH1-IVOSIDENIB-AZA
  - IND-AML-1L-QUIZARTINIB-FLT3ITD

default_indication: IND-AML-1L-VEN-AZA
alternative_indication: IND-AML-1L-7-3

decision_tree:
  # Step 1 — emergency: TLS / leukostasis / hyperleukocytosis HOLD
  # Bumped priority via RF severity; here the algorithm pins to standard
  # (lowest-toxicity) but plan generation should also surface the
  # emergency workup separately.
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-AML-EMERGENCY-TLS-LEUKOSTASIS
    if_true:
      result: IND-AML-1L-VEN-AZA
    if_false:
      next_step: 2

  # Step 2 — frailty / age / organ dysfunction → ven+aza default
  - step: 2
    evaluate:
      any_of:
        - red_flag: RF-AML-FRAILTY-AGE
        - red_flag: RF-AML-ORGAN-DYSFUNCTION
    if_true:
      result: IND-AML-1L-VEN-AZA
    if_false:
      next_step: 3

  # Step 3 — CBF-favorable cytogenetics: t(8;21) RUNX1::RUNX1T1 OR
  # inv(16)/t(16;16) CBFB::MYH11. ELN-favorable; standard 7+3 induction
  # plus high-dose cytarabine consolidation; no alloHCT in CR1 (vs other
  # AML high-risk routings). Gate on fitness — unfit CBF still goes to
  # ven+aza via step 2 (precedes this).
  - step: 3
    evaluate:
      any_of:
        - red_flag: RF-AML-CORE-BINDING-FACTOR-FAVORABLE
    if_true:
      next_step: 4
    if_false:
      next_step: 41

  # Step 4 — CBF-favorable + fit + CD33+ → 7+3 + fractionated GO
  # (ALFA-0701 Castaigne 2012; Hills meta 2014: ~20% relative
  # mortality reduction in favorable / intermediate risk; no benefit
  # in adverse). CD33-positivity (≥20% blasts by flow) is a
  # treatment-defining gate; CBF AML is routinely CD33+ but the
  # explicit finding is required (some pediatric / KIT-mut subsets
  # CD33-low / negative). Fall-through to plain 7+3 if CD33-status
  # unknown / negative or GO inaccessible. Additive 2026-04-30.
  - step: 4
    evaluate:
      all_of:
        - red_flag: RF-AML-CORE-BINDING-FACTOR-FAVORABLE
        - {finding: cd33_positive, value: true}
    if_true:
      result: IND-AML-1L-7-3-GO-CBF
    if_false:
      next_step: 41
    notes: "Wired via RF-AML-CORE-BINDING-FACTOR-FAVORABLE + cd33_positive=true (explicit; ≥20% blasts by flow per ALFA-0701 entry criterion). Daunorubicin 60 mg/m² (not 90) when GO added per ALFA-0701. NOT for adverse-risk (TP53-mut, complex karyotype). Falls through to plain 7+3 if CD33 not documented or GO inaccessible — current 7+3 routing preserved by default."

  # Step 41 — CPX-351 (Vyxeos) for tAML / AML-MRC age 60-75 fit
  # (Lancet 2018 Lancet 2018;392:2088: mOS 9.56 vs 5.95 mo for 7+3,
  # HR 0.69; 5-yr OS 18% vs 8%). Gates BEFORE high-risk-biology step
  # so CPX-351 takes precedence over plain 7+3 when secondary-AML
  # signal is present. Age 60-75 + fitness constraints live in
  # IND-AML-1L-CPX351-SECONDARY.applicable_to.demographic_constraints
  # — engine track-filter drops the indication for out-of-range
  # patients, falling through to step 5 (high-risk-biology → 7+3).
  # Additive 2026-05-01 (W5d carry-forward — closes drift-signal #4
  # from W5b heme chunk that deferred this fix to avoid breaking
  # patient_aml_secondary_cpx351 fixture golden; golden now
  # correctly updated alongside this wiring).
  - step: 41
    evaluate:
      any_of:
        - red_flag: RF-AML-SECONDARY-AML-MRC-CPX351-ELIGIBLE
    if_true:
      result: IND-AML-1L-CPX351-SECONDARY
    if_false:
      next_step: 5
    notes: "Wired via RF-AML-SECONDARY-AML-MRC-CPX351-ELIGIBLE (truthy on therapy_related_aml / antecedent_mds / aml_mrc / aml_secondary). CPX-351 (Vyxeos) is the FDA-approved subset Tx for AML 60-75 fit with secondary biology (lowers OS HR 0.69 vs 7+3); fall-through to step 5 if the RF doesn't fire OR if track-filter drops the IND for age-out-of-range / unfit patients (preserves prior 7+3 routing for those cohorts)."

  # Step 5 — high-risk biology (TP53, complex karyotype) AND FLT3+ AND
  # NPM1-favorable — fit patients escalate to 7+3 (with concurrent alloHCT
  # donor search if transplant-eligible). NPM1-mut without FLT3-ITD is
  # ELN-favorable and benefits from standard 7+3 (no alloHCT in CR1).
  # Note: high-risk biology in unfit patients already routed to ven+aza
  # in step 2.
  - step: 5
    evaluate:
      any_of:
        - red_flag: RF-AML-HIGH-RISK-BIOLOGY
        - red_flag: RF-AML-FLT3-ACTIONABLE
        - red_flag: RF-AML-NPM1-MUT-FAVORABLE
        - red_flag: RF-AML-TRANSFORMATION-PROGRESSION
    if_true:
      result: IND-AML-1L-7-3
      notes: >
        Fit AML with high-risk biology, FLT3 mutation, NPM1 mutation, or
        MDS-transformed: 7+3 induction (daunorubicin 60 mg/m² d1-3 +
        cytarabine 100-200 mg/m² d1-7). For FLT3-TKD (D835/I836) or
        combined ITD+TKD: add midostaurin 50 mg BID continuous (RATIFY;
        NCCN Cat 1) via regimen layer adjustment — quizartinib inactive
        against TKD. AlloHCT in CR1 for high-risk biology and
        FLT3-ITD/high-allelic-burden. Aggressive track (Cat 1 preferred
        over standard): quizartinib+7+3 for confirmed FLT3-ITD (see
        alternative below).
      alternatives:
        - indication_id: IND-AML-1L-QUIZARTINIB-FLT3ITD
          nccn_category: "1"
          criteria: >
            FLT3-ITD confirmed (NOT D835/I836 TKD); QTc <470 ms at baseline;
            age 18–75; fit for intensive 7+3; no non-interruptible strong
            CYP3A4 inhibitors; planned 3-year quizartinib maintenance post-chemo.
          note: >
            QuANTUM-First (Erba 2023 Lancet; NCT02668653; N=539): mOS 31.9 vs
            15.1 months (HR 0.78; p=0.032); 4-yr OS ~39% vs 30%; FDA approved
            July 20, 2023; NCCN Cat 1. Preferred over midostaurin for confirmed
            FLT3-ITD (Type-II FLT3 inhibitor — ITD-specific; does NOT cover TKD).
            Requires strict QTc management: baseline ECG, K+ ≥4.0/Mg++ ≥2.0
            before each cycle, avoid concomitant QT-prolonging drugs, dose-reduce
            50% with strong CYP3A4 inhibitors. Ukraine: not registered (access barrier
            — midostaurin also unfunded; clinical trial pathway needed).
    if_false:
      next_step: 6
    notes: "Step 5 updated 2026-05-04 (Workstream EZ): IND-AML-1L-QUIZARTINIB-FLT3ITD wired as Cat 1 aggressive-track alternative for confirmed FLT3-ITD+ AML. QuANTUM-First (Erba 2023 Lancet; mOS 31.9 vs 15.1 mo; HR 0.78). FLT3-TKD/combined → midostaurin via regimen layer. Default 7+3 preserved for non-FLT3 flags."

  # Step 6 — IDH1 actionable. AGILE (DiNardo 2022 Lancet Oncol): ivosidenib 500 mg QD
  # + azacitidine 75 mg/m² d1-7 q28d for ND IDH1-mutated AML unfit for intensive
  # induction. CR 47.2% vs 14.9%; OS HR 0.44; FDA May 2022; NCCN Cat 1.
  # IDH1-mut + unfit patients now have a dedicated indication.
  # IDH2 routing handled at step 61 below.
  - step: 6
    evaluate:
      any_of:
        - red_flag: RF-AML-IDH1-MUT-ACTIONABLE
    if_true:
      result: IND-AML-1L-IDH1-IVOSIDENIB-AZA
      notes: >
        IDH1 R132 mutation confirmed + unfit for intensive induction:
        ivosidenib 500 mg QD + azacitidine 75 mg/m² d1-7 q28d (AGILE; CR 47.2% vs 14.9%;
        OS HR 0.44; median OS 24 vs 7.9 mo; FDA May 2022; NCCN Cat 1).
        Abbott RealTime IDH1 Assay required as companion diagnostic.
        IDH differentiation syndrome (IDS): empirical corticosteroids if suspected.
        AlloHCT consolidation if CR/CRi achieved and patient eligible.
    if_false:
      next_step: 61
    notes: "Step 6 updated 2026-05-04 (Workstream EW): IDH1-specific step — PROD-5 deferred gap CLOSED. IND-AML-1L-IDH1-IVOSIDENIB-AZA authored (AGILE; FDA May 2022; NCCN Cat 1). IDH2 routing → step 61."

  # Step 61 — IDH2 actionable. Enasidenib+azacitidine (IDHENTIFY-like) for unfit
  # IDH2-mut ND AML. No dedicated FDA-approved combination for 1L IDH2-mut unfit AML
  # as of 2026 — enasidenib mono FDA-approved for R/R only. Route to ven+aza backbone;
  # MDT may add enasidenib off-label per IDHENTIFY data (ORR ~34% enasidenib+aza
  # vs 13% aza alone in phase 3; EMA approved 2023 for 1L enasidenib+aza in unfit IDH2-mut AML).
  - step: 61
    evaluate:
      any_of:
        - red_flag: RF-AML-IDH2-MUT-ACTIONABLE
    if_true:
      result: IND-AML-1L-VEN-AZA
      notes: >
        IDH2 R140/R172 mutation + unfit: no FDA-approved IDH2+aza combination for 1L
        (enasidenib FDA-approved R/R only). Route to ven+aza as unfit-AML standard.
        MDT consideration: IDHENTIFY-like data (enasidenib+aza ORR 34% vs 13%; EMA
        approved enasidenib+aza for 1L unfit IDH2-mut AML in EU 2023).
        For EU patients or clinical trial access: enasidenib 100 mg QD + azacitidine.
        AlloHCT consolidation if CR/CRi and patient eligible.
    if_false:
      next_step: 7
    notes: "Step 61 added 2026-05-04 (Workstream EW): IDH2-specific fallback. FDA no 1L IDH2 combination approval (EU EMA approved enasidenib+aza). Routes IDH2-mut unfit → ven+aza (MDT adds enasidenib per EMA approval or IDHENTIFY data)."

  # Step 7 — default for fit patients = 7+3
  - step: 7
    evaluate:
      any_of:
        - condition: "Fit for intensive chemotherapy (default if no fitness flags)"
    if_true:
      result: IND-AML-1L-7-3
    if_false:
      result: IND-AML-1L-7-3
    notes: "Default fall-through — fit patient with no biomarker flags routes to 7+3."

sources:
  - SRC-NCCN-AML-2025
  - SRC-ELN-AML-2022
  - SRC-VIALE-A-DINARDO-2020
  - SRC-AGILE-DINARDO-2022
  - SRC-QUANTUM-FIRST-ERBA-2023

last_reviewed: "2026-05-04"
notes: >
  UPDATED 2026-05-04 (Workstream EZ): IND-AML-1L-QUIZARTINIB-FLT3ITD wired at
  step 5 as Cat 1 aggressive-track alternative for confirmed FLT3-ITD+ AML
  (QuANTUM-First; Erba 2023 Lancet; mOS 31.9 vs 15.1 mo; HR 0.78; FDA Jul 2023).
  FLT3-TKD (D835/I836) or combined ITD+TKD → midostaurin via regimen layer (not
  quizartinib — Type-II inhibitor inactive against TKD). Gap CLOSED.
  Fit-vs-unfit triage is the dominant decision. FLT3-ITD/TKD adds
  midostaurin via REG-AML-7-3 component dose_adjustment; quizartinib
  now surfaces as Cat 1 aggressive-track alternative for ITD-confirmed patients.
  CBF + CD33+ adds fractionated GO via
  IND-AML-1L-7-3-GO-CBF (step 4 — additive 2026-04-30, ALFA-0701); CBF + CD33+ adds fractionated GO via
  IND-AML-1L-7-3-GO-CBF (step 4 — additive 2026-04-30, ALFA-0701);
  CBF without explicit CD33-positivity remains on plain 7+3 path
  preserving prior behavior. Transplant eligibility is a parallel
  layer captured in regimen + supportive care planning.
  RF-AML-INFECTION-SCREENING is "investigate"-equivalent and surfaces
  as an annotation, not a tree branch. CPX-351 (IND-AML-1L-CPX351-
  SECONDARY) for tAML / AML-MRC age 60-75 fit remains unwired in this
  algorithm — wiring would redirect curated case patient_aml_secondary_
  cpx351.json (golden IND-AML-1L-7-3) breaking the e2e fixture; deferred
  pending fixture-golden refresh in a follow-up chunk. STUB — requires
  clinical co-lead signoff.
