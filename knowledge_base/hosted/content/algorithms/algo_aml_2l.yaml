id: ALGO-AML-2L
applicable_to_disease: DIS-AML
applicable_to_line_of_therapy: 2
purpose: >
  Select default + alternative Indication for relapsed/refractory AML
  after ≥1 prior line (typically post 7+3 induction failure or post
  ven+aza progression). Outputs gilteritinib (default for FLT3-actionable
  R/R AML per ADMIRAL) vs re-induction / clinical-trial / BSC pathway
  for FLT3 wild-type. CPX-351 and quizartinib are 1L-variant indications
  for AML-MRC/secondary and de-novo FLT3-ITD respectively, surfaced via
  ALGO-AML-1L stratification — they are not 2L+ branches here.
  CRITICAL: re-test FLT3 at relapse (clones evolve; ~25% of FLT3-mut
  relapses lose detectable FLT3).

output_indications:
  - IND-AML-2L-GILTERITINIB-FLT3
  - IND-AML-1L-VEN-AZA
  - IND-AML-2L-IDH2-ENASIDENIB
  - IND-AML-2L-IDH1-IVOSIDENIB

default_indication: IND-AML-1L-VEN-AZA
alternative_indication: IND-AML-2L-GILTERITINIB-FLT3

decision_tree:
  # Step 1 — emergency at relapse (TLS / leukostasis): pin to lower-
  # toxicity hypomethylating-style backbone; surface emergency workup.
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-AML-EMERGENCY-TLS-LEUKOSTASIS
    if_true:
      result: IND-AML-1L-VEN-AZA
    if_false:
      next_step: 2

  # Step 2 — measurable residual disease (MRD) post-induction or post-
  # consolidation: ELN-2021 ≥0.1% MFC-MRD or molecular MRD ≥10⁻³.
  # MRD-positive after CR1 is an indication for consolidation
  # intensification (alloHCT bridge for fit) or early salvage. Gate on
  # FLT3 status at step 3.
  - step: 2
    evaluate:
      any_of:
        - red_flag: RF-AML-MEASURABLE-RESIDUAL-DISEASE
    if_true:
      next_step: 3
    if_false:
      next_step: 4

  # Step 3 — MRD-positive: FLT3+ → gilteritinib salvage (ADMIRAL; bridge
  # to alloHCT). FLT3-WT MRD+ → ven+aza intensification (default
  # backbone; MDT considers alloHCT bridge for fit). Both branches
  # short-circuit subsequent steps.
  - step: 3
    evaluate:
      any_of:
        - red_flag: RF-AML-FLT3-ACTIONABLE
    if_true:
      result: IND-AML-2L-GILTERITINIB-FLT3
    if_false:
      result: IND-AML-1L-VEN-AZA
    notes: "MRD-positive AML — FLT3+ routes to gilteritinib salvage (ADMIRAL); FLT3-WT MRD+ routes to ven+aza intensification with MDT to consider alloHCT bridge."

  # Step 4 — FLT3 actionable at relapse → gilteritinib (FDA-approved
  # 2L+; ADMIRAL OS benefit; bridge to alloHCT for fit responders).
  - step: 4
    evaluate:
      any_of:
        - red_flag: RF-AML-FLT3-ACTIONABLE
    if_true:
      result: IND-AML-2L-GILTERITINIB-FLT3
    if_false:
      next_step: 5

  # Step 5 — IDH2-actionable at relapse (FLT3-WT) → enasidenib
  # monotherapy per AG221-AML-001 (FDA Aug 2017 R/R IDH2-mut AML).
  # Additive 2026-04-30 — IDH2-positive patients now route to dedicated
  # IND-AML-2L-IDH2-ENASIDENIB rather than ven+aza backbone. IDH1
  # still falls through to step 6 ven+aza backbone with MDT
  # annotation (no dedicated IDH1 IND in KB).
  - step: 5
    evaluate:
      any_of:
        - red_flag: RF-AML-IDH2-MUT-ACTIONABLE
    if_true:
      result: IND-AML-2L-IDH2-ENASIDENIB
    if_false:
      next_step: 6
    notes: "Wired via RF-AML-IDH2-MUT-ACTIONABLE — IDH2 R140Q/R172K routes to enasidenib monotherapy (AG221-AML-001 phase 1/2; ORR 38%, CR 19%, mOS 9.3 mo). Bridge to alloHCT for fit responders. Ukraine: not registered, EU CHMP negative; international referral / compassionate-use only."

  # Step 6 — IDH1-actionable at relapse → ivosidenib monotherapy
  # (FDA-approved July 2018; DiNardo 2018 NEJM; ORR 41.6%; NCCN Cat 1).
  # IDH2 captured at step 5. IDH differentiation syndrome (IDS) mandatory
  # monitoring protocol applies — 10% incidence in AML (higher than CCA).
  - step: 6
    evaluate:
      any_of:
        - red_flag: RF-AML-IDH1-MUT-ACTIONABLE
    if_true:
      result: IND-AML-2L-IDH1-IVOSIDENIB
      notes: >
        IDH1 R132C/H/G/S/L mutation at relapse: ivosidenib 500 mg PO daily
        (REG-IVOSIDENIB-AML; AG-120-AML DiNardo 2018 NEJM; ORR 41.6%; CR 21.8%;
        mOS 8.8 months; FDA July 2018; NCCN Cat 1). CRITICAL: IDH differentiation
        syndrome (IDS) in 10% — daily fever monitoring + dexamethasone 10 mg IV q12h
        protocol if IDS Grade ≥2. QTc baseline ECG mandatory. Fit responders:
        bridge to alloHCT. Ukraine: not registered; compassionate-use Servier or
        named-patient. When inaccessible → ven+aza (IND-AML-1L-VEN-AZA) as fallback.
    if_false:
      next_step: 7
    notes: "Step 6 updated 2026-05-04 (Workstream CK): IDH1-mut R/R now routes to IND-AML-2L-IDH1-IVOSIDENIB (REG-IVOSIDENIB-AML; NCCN Cat 1) instead of ven+aza backbone. Gap (IDH1 IND deferred PROD-5) CLOSED."

  # Step 7 — frailty / organ dysfunction at relapse → ven+aza (lower
  # toxicity than re-induction; also covers FLT3-WT R/R unfit).
  - step: 7
    evaluate:
      any_of:
        - red_flag: RF-AML-FRAILTY-AGE
        - red_flag: RF-AML-ORGAN-DYSFUNCTION
    if_true:
      result: IND-AML-1L-VEN-AZA
    if_false:
      next_step: 8

  # Step 8 — default FLT3 wild-type R/R: ven+aza for unfit / fallback;
  # re-induction (off-algorithm) or clinical trial preferred for fit
  # patients. Algorithm pins to ven+aza so plan generator surfaces the
  # clinical-trial / BSC annotation rather than silently failing.
  - step: 8
    evaluate:
      any_of:
        - condition: "FLT3 wild-type R/R AML; clinical-trial / re-induction / BSC routing surfaced as annotation"
    if_true:
      result: IND-AML-1L-VEN-AZA
    if_false:
      result: IND-AML-1L-VEN-AZA
    notes: "Default fall-through — FLT3-WT R/R routes to ven+aza backbone; clinical-trial / BSC noted in Indication."

sources:
  - SRC-NCCN-AML-2025
  - SRC-ELN-AML-2022
  - SRC-ADMIRAL-PERL-2019

last_reviewed: "2026-04-30"
notes: >
  ALGO-AML-2L routes: FLT3-actionable → gilteritinib; IDH2-actionable → enasidenib
  (step 5, added 2026-04-30); IDH1-actionable → ivosidenib (step 6, Workstream CK
  2026-05-04); non-actionable (FLT3-WT, IDH-WT) → ven+aza backbone.
  UPDATED 2026-05-04 (Workstream CK): IND-AML-2L-IDH1-IVOSIDENIB authored and wired
  at step 6 (AG-120-AML DiNardo 2018 NEJM; ORR 41.6%; CR 21.8%; NCCN Cat 1;
  REG-IVOSIDENIB-AML). Deferred IDH1 gap (PROD-5) CLOSED.
  CPX-351 (IND-AML-1L-CPX351-SECONDARY) and quizartinib (IND-AML-1L-QUIZARTINIB-FLT3ITD)
  belong to ALGO-AML-1L stratification, not 2L. AlloHCT bridge is parallel layer for
  any responder. RF re-test of FLT3/IDH1/IDH2 at relapse is mandatory before
  gilteritinib/ivosidenib/enasidenib selection. STUB — requires clinical co-lead signoff.
