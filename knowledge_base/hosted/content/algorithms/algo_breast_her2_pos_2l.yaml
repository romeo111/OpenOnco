id: ALGO-BREAST-HER2-POS-2L
applicable_to_disease: DIS-BREAST
applicable_to_disease_state: HER2-positive
applicable_to_line_of_therapy: 2
purpose: >
  Select 2L+ HER2+ metastatic breast Indication after progression
  on 1L THP (trastuzumab + pertuzumab + taxane). Subtype-restricted:
  only fires for HER2-positive cohort. Branching on brain-metastasis
  status: brain-mets-positive → HER2CLIMB tucatinib triplet (CNS
  activity proven); otherwise → T-DXd (DESTINY-Breast03 superior to
  T-DM1).

output_indications:
  - IND-BREAST-HER2-POS-MET-2L-TDXD
  - IND-BREAST-HER2-POS-3L-TUCATINIB
  - IND-BREAST-HER2-POS-2L-TDM1

default_indication: IND-BREAST-HER2-POS-MET-2L-TDXD
alternative_indication: IND-BREAST-HER2-POS-3L-TUCATINIB

decision_tree:
  # Step 1 — Verify HER2-amplified status (subtype gate). RF fires only
  # when HER2 IHC 3+ OR ISH-amplified is documented. Failure routes to
  # the algo's default T-DXd (HER2+ cohort assumed by entry condition).
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-BREAST-HER2-AMP-ACTIONABLE
    if_true:
      next_step: 2
    if_false:
      next_step: 3

  # Step 2 — brain metastases present (active or treated, stable or
  # progressing) → HER2CLIMB tucatinib + trastuzumab + capecitabine
  # preferred. T-DXd has CNS activity but HER2CLIMB is the only
  # regimen with prospective CNS-PFS doubling demonstrated. Brain-met
  # status has no dedicated breast-scoped RF; condition retained.
  - step: 2
    evaluate:
      any_of:
        - condition: "Brain metastases present (active OR previously treated, stable or progressing)"
        - condition: "MRI brain confirms intracranial disease ≤2 cm OR symptomatic ≥2 cm post-local therapy"
    if_true:
      result: IND-BREAST-HER2-POS-3L-TUCATINIB
    if_false:
      next_step: 3
    notes: "MDT-only — brain-met status has no dedicated breast-scoped RF; positive branch routes to HER2CLIMB triplet (CNS-PFS doubling proven)."

  # Step 3 — default: T-DXd 2L gate (DESTINY-Breast03 — superior to T-DM1).
  # Routes to step 31 for T-DXd accessibility check.
  - step: 3
    evaluate:
      any_of:
        - condition: "No brain metastases OR brain mets not the dominant clinical issue"
    if_true:
      next_step: 31
      notes: "No dominant brain-met issue: routes to step 31 (T-DXd access gate)."
    if_false:
      next_step: 31
      notes: "Fall-through to T-DXd access gate — step 31."

  # Step 31 — T-DXd vs T-DM1 access gate.
  # T-DXd (ENHERTU; trastuzumab deruxtecan) is NCCN Cat 1 preferred 2L (DESTINY-Breast03;
  # mPFS 28.8 vs 6.8 mo; HR 0.33). T-DM1 (EMILIA; NCCN Cat 1) is the accessible alternative
  # when T-DXd is not registered or not reimbursed (Ukraine 2026: T-DXd not NSZU-funded).
  - step: 31
    evaluate:
      all_of:
        - condition: "T-DXd (ENHERTU, trastuzumab deruxtecan) accessible (registered + funded/reimbursed or patient programme at prescribing centre)"
    if_true:
      result: IND-BREAST-HER2-POS-MET-2L-TDXD
      notes: >
        T-DXd accessible: trastuzumab deruxtecan 5.4 mg/kg IV q3w (REG-TDXD-METASTATIC;
        DESTINY-Breast03; mPFS 28.8 vs 6.8 mo; HR 0.33; NCCN Cat 1).
        Critical ILD monitoring: CT chest baseline + q2 cycles × 6; hold for any respiratory
        symptoms; corticosteroids Grade ≥2; permanent d/c Grade ≥3.
    if_false:
      result: IND-BREAST-HER2-POS-2L-TDM1
      notes: >
        T-DXd inaccessible (not NSZU-funded UA 2026): T-DM1 (trastuzumab emtansine)
        3.6 mg/kg IV q3w (REG-TDM1-METASTATIC; EMILIA Verma 2012 NEJM; mPFS 9.6 mo,
        mOS 30.9 mo; NCCN Cat 1). Switch to T-DXd when access becomes available.
        Monitor PLT before each cycle (thrombocytopenia); LVEF q3 months.
    notes: "Step 31 added 2026-05-04 (Workstream BZ): T-DXd vs T-DM1 access gate. T-DXd not NSZU-reimbursed in UA 2026 → T-DM1 wired as accessible Cat 1 alternative. IND-BREAST-HER2-POS-2L-TDM1 authored. Gap CLOSED."

sources:
  - SRC-NCCN-BREAST-2025
  - SRC-ESMO-BREAST-METASTATIC-2024
  - SRC-DESTINY-BREAST03-CORTES-2022
  - SRC-HER2CLIMB-MURTHY-2019

last_reviewed: "2026-05-04"
notes: >
  UPDATED 2026-05-04 (Workstream BZ): IND-BREAST-HER2-POS-2L-TDM1 authored and
  wired at step 31 as T-DXd access gate fallback (EMILIA; NCCN Cat 1; mPFS 9.6 mo,
  mOS 30.9 mo). T-DXd not NSZU-reimbursed in Ukraine (2026) → T-DM1 is the accessible
  HER2-ADC 2L standard. When T-DXd access becomes available, switch.

  ROUTING SUMMARY: (1) HER2-amplified confirmed → step 2; (2) active brain mets →
  IND-BREAST-HER2-POS-3L-TUCATINIB (HER2CLIMB CNS-PFS proven); (3→31) no dominant
  brain mets → T-DXd access gate: T-DXd accessible → TDXD (Cat 1 preferred);
  T-DXd inaccessible → T-DM1 (Cat 1 accessible alternative).

  Subtype constraint: HER2+ only — algorithm fires only after receptor-subtype
  branching routes the patient here.

  Deferred / OOS:
  - Bispecifics (zanidatamab — late-stage; not yet approved)
  - ≥3L options (tucatinib triplet post-T-DXd, clinical trial)
  - HER2-low 2L (T-DXd 5.4 mg/kg; DESTINY-Breast04 — requires separate algo/IND)
