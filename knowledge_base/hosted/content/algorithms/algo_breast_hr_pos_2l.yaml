id: ALGO-BREAST-HR-POS-2L
applicable_to_disease: DIS-BREAST
applicable_to_disease_state: HR-positive_HER2-negative
applicable_to_line_of_therapy: 2
purpose: >
  Select 2L+ HR+/HER2- metastatic breast Indication after progression
  on AI ± CDK4/6i. Subtype-restricted: only fires for the HR+/HER2-
  cohort. Branching driven by molecular profile (PIK3CA / AKT1 /
  PTEN, ESR1, HER2-low). Default fallback when no targetable mutation
  and HER2-IHC=0: fulvestrant + everolimus (BOLERO-2 backbone).

output_indications:
  - IND-BREAST-HR-POS-2L-PIK3CA-ALPELISIB
  - IND-BREAST-HR-POS-2L-AKT-CAPIVASERTIB
  - IND-BREAST-HR-POS-2L-PIK3CA-INAVOLISIB
  - IND-BREAST-HR-POS-2L-ESR1-ELACESTRANT
  - IND-BREAST-HR-POS-2L-T-DXD-HER2-LOW
  - IND-BREAST-HR-POS-2L-FUL-EVEROLIMUS
  - IND-BREAST-HR-POS-2L-DATO-DXD
  - IND-BREAST-BRCA-POS-MET-PARPI
  - IND-BREAST-BRCA-MET-TALAZOPARIB
  - IND-BREAST-HER2-LOW-2L-DATO-DXD
  - IND-BREAST-HR-POS-3L-POST-CDK46I-POST-AKT

default_indication: IND-BREAST-HR-POS-2L-FUL-EVEROLIMUS
alternative_indication: IND-BREAST-HR-POS-2L-AKT-CAPIVASERTIB

decision_tree:
  # Step 0 — gBRCA1/2 mutation rescue. CLAUDE.md guidance: PARPi for
  # HR+/HER2- gBRCA-mut metastatic is handled at 1L (OlympiAD); revisit
  # at 2L if PARPi not yet given. Most HR+/HER2- gBRCA-mut patients
  # arrive here on the AI±CDK4/6i path (OlympiAD line position varied);
  # offering olaparib/talazoparib at 2L when PARPi-naive is supported
  # by OlympiAD/EMBRACA OS data.
  - step: 0
    evaluate:
      any_of:
        - red_flag: RF-BREAST-BRCA-GERMLINE-ACTIONABLE
    if_true:
      result: IND-BREAST-BRCA-POS-MET-PARPI
      notes: >
        gBRCA1/2 pathogenic: PARPi preferred (olaparib or talazoparib).
        IND-BREAST-BRCA-MET-TALAZOPARIB is the EMBRACA-specific talazoparib
        entity for HR+/HER2- BRCA-mutated metastatic BC — see alternatives.
      alternatives:
        - indication_id: IND-BREAST-BRCA-MET-TALAZOPARIB
          nccn_category: "1"
          criteria: >
            HR+/HER2-negative metastatic breast cancer; germline BRCA1 or BRCA2
            pathogenic / likely-pathogenic mutation confirmed; progression on prior
            endocrine therapy ± CDK4/6i; PARPi-naive (olaparib not yet given);
            ≤3 prior chemo lines for metastatic disease (EMBRACA eligibility);
            ECOG 0-2; adequate organ function.
          note: >
            Talazoparib monotherapy for gBRCA1/2-mutated HR+/HER2- metastatic BC
            (EMBRACA; Litton 2018 NEJM; NCCN Cat 1): mPFS 8.6 vs 5.6 mo (HR 0.54);
            ORR 62.6% vs 27.2%. Talazoparib 1 mg PO QD continuously until progression.
            FDA-approved Oct 2018. Alternative: olaparib 300 mg BID (OlympiAD;
            Robson 2017 NEJM; mPFS 7.0 vs 4.2 mo; HR 0.58) — clinical equivalence,
            no direct head-to-head comparison; choice based on access + toxicity
            (talazoparib higher Grade 3 anemia ~55%, thrombocytopenia ~27%).
            Ukraine: neither routinely NSZU-reimbursed — import/foundation access.
    if_false:
      next_step: 1
    notes: "MDT-only — 2L PARPi entry assumes PARPi-naive at 1L (OlympiAD line-position varied; ESMO 2024 supports 2L+ when PARPi not yet given); MDT confirms not-already-exposed before this branch fires."

  # Step 1 — PIK3CA / AKT1 / PTEN alteration.
  # THREE Cat 1 options for PIK3CA-mutant; TWO for AKT1/PTEN (no inavolisib).
  # DEFAULT: capivasertib+fulvestrant (broader: 3-gene pathway; Cat 1).
  # ALTERNATIVE 1 (PIK3CA only): inavolisib+palbociclib+fulvestrant (Cat 1; lower hyperglycemia).
  # ALTERNATIVE 2 (PIK3CA only, access): alpelisib+fulvestrant (Cat 2A; higher hyperglycemia).
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-BREAST-PIK3CA-MUT-ACTIONABLE
        - red_flag: RF-BREAST-AKT1-E17K-ACTIONABLE
        - condition: "PTEN loss-of-function (biallelic NGS or complete IHC loss + NGS confirmation)"
    if_true:
      result: IND-BREAST-HR-POS-2L-AKT-CAPIVASERTIB
      alternatives:
        - indication: IND-BREAST-HR-POS-2L-PIK3CA-INAVOLISIB
          criteria: "PIK3CA mutation only (NOT AKT1/PTEN) + no uncontrolled diabetes + post-CDK4/6i + AI; INAVO120 (Turner NEJM 2024); mPFS 15.0 vs 7.3 mo (HR 0.43); ORR 58%; FDA Oct 2024 (Itovebi); NCCN Cat 1 preferred; lower hyperglycemia vs alpelisib (5% vs 35% Grade 3+)"
          nccn_category: 1
        - indication: IND-BREAST-HR-POS-2L-PIK3CA-ALPELISIB
          criteria: "PIK3CA mutation only + capivasertib and inavolisib inaccessible; SOLAR-1; NCCN Cat 2A; high hyperglycemia burden (Grade 3+ ~35%) — second-line access option"
          nccn_category: "2A"
      notes: >
        PIK3CA/AKT1/PTEN pathway — THREE options by biomarker specificity:
        DEFAULT: Capivasertib 400 mg BID 4d/7d + fulvestrant (CAPItello-291; PIK3CA/AKT1/PTEN;
        HR 0.60 all-comer, HR 0.50 biomarker-selected; NCCN Cat 1; broader 3-gene coverage).
        PREFERRED (PIK3CA-only): Inavolisib 9 mg QD + palbociclib + fulvestrant (INAVO120;
        PIK3CA-specific; mPFS 15.0 mo, HR 0.43; ORR 58%; FDA Oct 2024; NCCN Cat 1 preferred;
        lower hyperglycemia risk — Grade 3+ 5% vs alpelisib 35%).
        ACCESS FALLBACK (PIK3CA-only): Alpelisib 300 mg QD + fulvestrant (SOLAR-1; NCCN Cat 2A;
        significant hyperglycemia/rash burden; for settings where capivasertib+inavolisib not available).
        AKT1 mutation or PTEN loss without PIK3CA: capivasertib only (inavolisib and alpelisib inactive).
    if_false:
      next_step: 2

  # Step 2 — ESR1 mutation present → elacestrant
  - step: 2
    evaluate:
      any_of:
        - red_flag: RF-BREAST-ESR1-MUT-ACTIONABLE
    if_true:
      result: IND-BREAST-HR-POS-2L-ESR1-ELACESTRANT
    if_false:
      next_step: 3

  # Step 3 — HER2-low (IHC 1+ or IHC 2+/ISH-) detected → next step
  # checks chemo-line eligibility. Split from old single all_of step
  # so the biomarker arm wires additively to RF-BREAST-HER2-LOW-ACTIONABLE.
  - step: 3
    evaluate:
      any_of:
        - red_flag: RF-BREAST-HER2-LOW-ACTIONABLE
    if_true:
      next_step: 4
    if_false:
      next_step: 5

  - step: 4
    # Sub-step: HER2-low + chemo-line eligibility (≥1 prior chemo OR rapid
    # progression on endocrine). Free-text retained — no fitness RF for
    # chemo-line count exists; defaults to T-DXd either way (line eligibility
    # is an MDT confirmation, not a contraindication).
    evaluate:
      any_of:
        - condition: "≥1 prior chemo line for metastatic disease OR rapid progression on endocrine"
    if_true:
      result: IND-BREAST-HR-POS-2L-T-DXD-HER2-LOW
      notes: >
        HER2-low HR+/HER2- BC: T-DXd preferred (DESTINY-Breast04; OS HR 0.64; NCCN Cat 1).
        Dato-DXd available as Cat 2A alternative with lower ILD risk (~3% vs ~12%) — see
        IND-BREAST-HER2-LOW-2L-DATO-DXD in alternatives.
      alternatives:
        - indication_id: IND-BREAST-HER2-LOW-2L-DATO-DXD
          nccn_category: "2A"
          criteria: >
            HR+/HER2-negative metastatic BC; HER2-low (IHC 1+ or IHC 2+/ISH-); ≥1 prior chemo
            line for metastatic disease; ECOG 0-2; T-DXd inaccessible or prior ILD history
            (ILD Grade ≥2 after T-DXd → dato-DXd lower risk; ~3% ILD vs ~12% T-DXd).
            TROP2 testing not required. Prefer T-DXd when accessible (stronger OS data).
          note: >
            Dato-DXd for HER2-low HR+/HER2- metastatic BC (TROPION-Breast01 HER2-low pre-
            specified subgroup; NCCN Cat 2A): PFS 6.9 vs 4.9 mo (HR 0.63); ILD ~3% (vs
            T-DXd ~12%); no head-to-head vs T-DXd in HER2-low. Datopotamab deruxtecan
            6 mg/kg IV Q3W (FDA Jan 2025, Datroway). DESTINY-Breast04 OS benefit makes
            T-DXd preferred when accessible.
    if_false:
      result: IND-BREAST-HR-POS-2L-T-DXD-HER2-LOW
    notes: "MDT-only — chemo-line eligibility check has no dedicated RF; T-DXd default for HER2-low metastatic per DESTINY-Breast04."

  # Step 5 — default: fulvestrant + everolimus (BOLERO-2 backbone, no
  # biomarker gating, broadly applicable when no targetable mutation
  # and HER2-IHC=0). Dato-DXd (IND-BREAST-HR-POS-2L-DATO-DXD) is Cat 1
  # alternative for the HER2 IHC 0 subset with ≥1 prior chemo line
  # (TROPION-Breast01; Bardia 2024 NEJM; PFS HR 0.63; FDA Jan 2025,
  # Datroway). Lower ILD rate vs T-DXd (~3% vs ~12%).
  - step: 5
    evaluate:
      any_of:
        - condition: "No PIK3CA / AKT1 / PTEN / ESR1 alteration AND HER2 IHC 0"
    if_true:
      result: IND-BREAST-HR-POS-2L-FUL-EVEROLIMUS
      alternatives:
        - indication: IND-BREAST-HR-POS-2L-DATO-DXD
          criteria: "≥1 prior chemo line for metastatic disease + HER2 IHC 0 (NOT HER2-low — T-DXd step 4 takes priority for IHC 1+/2+); TROPION-Breast01 PFS HR 0.63; FDA Jan 2025 (Datroway); NCCN Cat 1; lower ILD ~3% vs T-DXd ~12%; TROP2 testing not required"
          nccn_category: 1
        - indication_id: IND-BREAST-HR-POS-3L-POST-CDK46I-POST-AKT
          nccn_category: "2A"
          criteria: >
            HR+/HER2-negative metastatic BC; LOT ≥3; prior CDK4/6 inhibitor exposure AND
            prior AKT pathway inhibitor (capivasertib or alpelisib) exposure; ECOG 0-2;
            adequate organ function. Everolimus + exemestane at 3L+ after CDK4/6i + AKT
            inhibitor exhaustion (mTOR pathway remains partially active).
          note: >
            Everolimus 10 mg PO QD + exemestane 25 mg PO QD for HR+/HER2- metastatic BC
            at 3L+ after CDK4/6i and AKT-pathway exhaustion (NCCN Cat 2A; BOLERO-2 Baselga
            2012 NEJM established 2L; extrapolated to 3L+ here; ORR ~12%; mPFS ~4-6 mo in
            heavily pretreated setting). Hyperglycemia + pneumonitis monitoring. Clinical
            trial strongly preferred at 3L+ if available.
    if_false:
      result: IND-BREAST-HR-POS-2L-FUL-EVEROLIMUS
    notes: >
      Default fall-through (HER2 IHC 0, no actionable biomarker). FUL-EVEROLIMUS
      (BOLERO-2; Baselga 2012 NEJM; NCCN Cat 1) default: endocrine-based, no prior
      chemo required. DATO-DXD alternative (NCCN Cat 1) when ≥1 prior chemo line
      given (TROPION-Breast01; post-ET + 1-2 prior chemo; Datroway FDA Jan 2025).
      HER2-low patients (IHC 1+/2+ ISH-) routed to T-DXd at step 4 — dato-DXd
      only fires here for HER2-IHC 0 (true HER2-zero). Dato-DXd added 2026-05-04
      (Workstream EQ).

sources:
  - SRC-NCCN-BREAST-2025
  - SRC-ESMO-BREAST-METASTATIC-2024
  - SRC-SOLAR1-ANDRE-2019
  - SRC-CAPITELLO291-TURNER-2023
  - SRC-EMERALD-BIDARD-2022
  - SRC-BOLERO2-BASELGA-2012
  - SRC-DESTINY-BREAST04-MODI-2022
  - SRC-TROPION-BREAST01-BARDIA-2024

last_reviewed: "2026-05-04"
notes: >
  Subtype constraint: HR+/HER2- only — algorithm should be entered
  only after receptor-subtype branching at the disease-level dispatcher
  routes the patient here. Schema currently lacks a top-level
  `receptor_subtype` field on Algorithm; encoded in purpose + via
  Indication.applicable_to.receptor_subtype on each output.

  Sequencing rationale (default order):
    PIK3CA/AKT1/PTEN > ESR1 > HER2-low > no-biomarker
  Capivasertib preferred over alpelisib in the pathway-altered
  branch because (1) broader coverage (3 genes vs 1), (2) intermittent
  4-on/3-off dosing better tolerated, (3) more recent evidence base.
  Alpelisib remains a valid alternative if PIK3CA-only and
  capivasertib not accessible (UA major access barrier — neither is
  reimbursed).

  PARPi (olaparib/talazoparib) for HR+/HER2- gBRCA-mut metastatic is
  handled by IND-BREAST-BRCA-POS-MET-PARPI in 1L; revisit at 2L if
  PARPi not yet given. Not in this algo's default tree to keep the
  decision focused on post-CDK4/6i targeted-therapy selection.

  UPDATED 2026-05-04 (Workstream EQ): Dato-DXd (IND-BREAST-HR-POS-2L-
  DATO-DXD) wired at step 5 as Cat 1 alternative to FUL-EVEROLIMUS for
  HER2 IHC 0 patients with ≥1 prior chemo line (TROPION-Breast01;
  PFS HR 0.63; FDA Jan 2025, Datroway). Source SRC-TROPION-BREAST01-
  BARDIA-2024 stub not yet in KB — flagged for source ingestion.
  Sequencing: T-DXd (step 4) takes priority for HER2-low (IHC 1+/2+
  ISH-); dato-DXd is the HER2-IHC-0 post-chemo ADC option at step 5.
  UPDATED 2026-05-04 (Workstream FW): IND-BREAST-HER2-LOW-2L-DATO-DXD (Cat 2A)
  wired at step 4 if_true (T-DXd HER2-low track) — dato-DXd as T-DXd-inaccessible
  or ILD-risk alternative. IND-BREAST-HR-POS-3L-POST-CDK46I-POST-AKT (Cat 2A) wired
  at step 5 as 3L+ alternative post-CDK4/6i+AKT exhaustion. Both gaps CLOSED.
