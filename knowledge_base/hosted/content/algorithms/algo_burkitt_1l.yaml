id: ALGO-BURKITT-1L
applicable_to_disease: DIS-BURKITT
applicable_to_line_of_therapy: 1
purpose: >
  Select default + alternative for first-line Burkitt based on risk
  profile. Two tracks: DA-EPOCH-R (standard, broader applicability)
  vs CODOX-M/IVAC (aggressive, fit younger high-risk).

output_indications:
  - IND-BURKITT-1L-DAEPOCHR
  - IND-BURKITT-1L-CODOXM-IVAC

default_indication: IND-BURKITT-1L-DAEPOCHR
alternative_indication: IND-BURKITT-1L-CODOXM-IVAC

decision_tree:
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-BURKITT-HIGH-RISK
    if_true:
      result: IND-BURKITT-1L-CODOXM-IVAC
    if_false:
      next_step: 2
  - step: 2
    evaluate:
      all_of:
        - condition: "Standard / intermediate risk"
        - condition: "ECOG ≤ 3"
    if_true:
      result: IND-BURKITT-1L-DAEPOCHR
    if_false:
      result: IND-BURKITT-1L-DAEPOCHR
    notes: "MDT-only after CSD-7A audit — composite is biomarker/disease-specific (not fitness/eligibility/prior-therapy), so no pan-disease RF applies. Wireable only via dedicated disease-specific RFs in a future round."

sources: [SRC-NCCN-BCELL-2025, SRC-ESMO-BURKITT-2024]
last_reviewed: "2026-04-27"
notes: >
  CODOX-M/IVAC requires fit younger (age ≤60, ECOG ≤2). If high-risk
  AND not fit younger, falls back to DA-EPOCH-R + supportive care.

  Etiology rails (parallel to indication selection):

  - HIV (HIV-Burkitt — 25-40% of adult Burkitt is HIV-associated) —
    DA-EPOCH-R is the preferred 1L regimen for HIV-Burkitt per CALGB
    10002 / Sparano 2010 / AMC 048 — outcomes approach HIV-negative
    with concurrent ART. CODOX-M/IVAC is reserved for hard high-risk
    features (CNS+, leukemic phase, LDH>3×ULN, bulky abdomen) regardless
    of HIV status. RF-BURKITT-HIGH-RISK explicitly includes
    "HIV+ AND CD4 <100" as one of the intensifiers — this captures the
    subset where CODOX-M/IVAC may still win. ART continued throughout;
    integrase-inhibitor backbone preferred (avoid ritonavir-boosted PIs
    with vincristine + HD-MTX). PJP prophylaxis throughout induction +
    3-6 mo post. CD4 + HIV-VL pre-cycle.

  - HBV (HBsAg+ OR anti-HBc+) — entecavir prophylaxis before first
    rituximab dose (DA-EPOCH-R or CODOX-M/IVAC + R) through induction +
    ≥12 months post. CI-HBV-NO-PROPHYLAXIS hard-blocks both indications.

  - HCV — Treat Burkitt first (extremely rapid disease — Ki67 ~100%);
    DAA after induction unless CP-A and rapid clearance feasible.

  - EBV (endemic Burkitt EBV+ ~95%; sporadic ~15%) — informational, not
    treatment-altering. Documented for prognostication.

  All three operate via parallel SUP-* / RF-BURKITT-INFECTION-SCREENING
  surfaces. BIO-HIV-STATUS, BIO-HBV-STATUS missing — flagged.
notes_ua: >
  CODOX-M/IVAC потребує молодих придатних пацієнтів (вік ≤60, ECOG ≤2).
  При поєднанні високого ризику з непридатністю відбувається повернення
  до DA-EPOCH-R + підтримуюча терапія.

  Етіологічні рейки (паралельно до вибору показання):

  - ВІЛ (ВІЛ-Burkitt — 25–40% дорослого Burkitt асоційовано з ВІЛ) —
    DA-EPOCH-R є переважним режимом 1L для ВІЛ-Burkitt згідно CALGB 10002
    / Sparano 2010 / AMC 048 — результати близькі до ВІЛ-негативних при
    паралельній АРТ. CODOX-M/IVAC резервується для жорстких ознак
    високого ризику (ЦНС+, лейкемічна фаза, ЛДГ>3×ВМН, масивний живіт)
    незалежно від ВІЛ-статусу. RF-BURKITT-HIGH-RISK явно включає
    «ВІЛ+ ТА CD4 <100» як один із підсилювачів — охоплює підгрупу, де
    CODOX-M/IVAC може бути кращим. АРТ продовжується протягом усього
    лікування; перевага — скелет на основі інгібіторів інтегрази
    (уникати ритонавір-бустованих ІП з вінкристином + HD-MTX). PJP-
    профілактика протягом усієї індукції + 3–6 міс. після. CD4 +
    HIV-VL перед кожним циклом.

  - HBV (HBsAg+ АБО anti-HBc+) — профілактика ентекавіром перед першою
    дозою ритуксимабу (DA-EPOCH-R або CODOX-M/IVAC + R) протягом
    індукції + ≥12 місяців після. CI-HBV-NO-PROPHYLAXIS жорстко блокує
    обидва показання.

  - HCV — спочатку лікувати Burkitt (вкрай швидкоплинне захворювання —
    Ki67 ~100%); DAA після індукції, якщо тільки CP-A і швидке зникнення
    вірусу не є можливим.

  - EBV (ендемічний Burkitt EBV+ ~95%; спорадичний ~15%) — інформаційний,
    не впливає на лікування. Документується для прогностики.

  Всі три функціонують через паралельні поверхні SUP-* /
  RF-BURKITT-INFECTION-SCREENING. BIO-HIV-STATUS, BIO-HBV-STATUS
  відсутні — відмічено.
