id: ALGO-CHL-1L
applicable_to_disease: DIS-CHL
applicable_to_line_of_therapy: 1
purpose: >
  Classical Hodgkin 1L: stage-driven. Advanced (III-IV) — A+AVD preferred
  per ECHELON-1; ABVD fallback. Early-stage (I-II) — ABVD × 2-4 + ISRT
  (response-adapted, but represented here as ABVD for simplicity).

output_indications:
  - IND-CHL-1L-ABVD
  - IND-CHL-1L-A-AVD
  - IND-CHL-1L-N-AVD
  - IND-CHL-PREGNANCY-MOD-ABVD
  - IND-CHL-CHILD-PUGH-C-MOD
default_indication: IND-CHL-1L-ABVD
alternative_indication: IND-CHL-1L-A-AVD

decision_tree:
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-CHL-ADVANCED-STAGE
    if_true:
      result: IND-CHL-1L-A-AVD
      notes: >
        A+AVD (brentuximab vedotin + AVD) for advanced cHL stage III-IV
        (ECHELON-1; NCCN Cat 1; mature OS benefit demonstrated). N+AVD
        (nivolumab + AVD) is an equivalent Cat 1 alternative per SWOG S1826
        — see alternatives block below.
      alternatives:
        - indication_id: IND-CHL-1L-N-AVD
          nccn_category: "1"
          criteria: >
            Advanced cHL stage III-IV (or stage II with bulky/B-symptoms/IPS ≥4);
            no active autoimmune disease requiring systemic immunosuppression
            (CI-PEMBROLIZUMAB-AUTOIMMUNE); no solid-organ transplant; nivolumab
            accessible + funding pathway confirmed; ECOG ≤2; younger / fit
            patients or those with neuropathy concern from brentuximab preferred.
          note: >
            N+AVD (SWOG S1826; Herrera 2024 NEJM; NCCN Cat 1): 2-yr PFS 92%
            vs A+AVD 83% (HR 0.48; p<0.001) — superior PFS in advanced cHL.
            Bleomycin replaced by nivolumab (eliminates bleomycin pulmonary
            toxicity same as A+AVD). Less peripheral neuropathy vs A+AVD
            (no brentuximab); less hematologic AEs Grade ≥3. Baseline thyroid
            function + cortisol mandatory (endocrine irAE monitoring). No
            maintenance added per S1826 protocol. UA access: nivolumab
            off-label for cHL — institutional funding appeal required.
    if_false:
      result: IND-CHL-1L-ABVD
      notes: >
        Early-stage cHL (I-II) or advanced not qualifying for A+AVD/N+AVD: standard
        ABVD × 2-6 cycles ± ISRT (NCCN Cat 1). Pregnancy and hepatic impairment
        alternatives below.
      alternatives:
        - indication_id: IND-CHL-PREGNANCY-MOD-ABVD
          nccn_category: "2A"
          criteria: >
            cHL any stage; confirmed pregnancy (2nd-3rd trimester); brentuximab vedotin
            and nivolumab CONTRAINDICATED in pregnancy (teratogenic/fetal risk); DTIC
            omitted (teratogenicity concerns); modified AVD schedule; multidisciplinary
            obstetrics + oncology mandatory. 1st trimester: delay if possible or
            discuss options per patient values.
          note: >
            Modified ABVD (DTIC omitted) for cHL in pregnancy (NCCN Cat 2A): doxorubicin
            25 mg/m² + vinblastine 6 mg/m² + bleomycin 10 U/m² d1,15 q28d (DTIC held);
            delivery planned at 35-37 weeks; full ABVD resumed post-partum. Brentuximab
            vedotin and nivolumab absolutely contraindicated. Multidisciplinary obstetrics
            + hematology-oncology co-management mandatory.
        - indication_id: IND-CHL-CHILD-PUGH-C-MOD
          nccn_category: "2B"
          criteria: >
            cHL; Child-Pugh C or bilirubin >3 × ULN; severe hepatic dysfunction. Bleomycin
            and DTIC HELD (see note). Doxorubicin + vinblastine dose-reduced 50-75% per
            bilirubin level. Brentuximab vedotin CONTRAINDICATED (Child-Pugh B-C). Hepatology
            consultation mandatory; defer if reversible hepatic cause (HCV cure, alcohol
            abstinence, HBV suppression) correctable first.
          note: >
            Modified A-V (dose-adjusted doxorubicin + vinblastine) for cHL + Child-Pugh C
            (NCCN Cat 2B; NCCN BCELL + ESMO Lymphoma 2025; ORR ~70% extrapolated, no RCT).
            Bleomycin HOLD — pulmonary toxicity amplified without hepatic compensatory
            mechanisms. DTIC HOLD — FDA contraindication in severe hepatic impairment
            (veno-occlusive disease risk). REG-AV-HEPATIC-MODIFIED STUB pending dedicated
            regimen entity.

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-HODGKIN-2024
  - SRC-ESMO-LYMPHOMA-2025

last_reviewed: "2026-05-04"
notes: >
  Etiology rails (parallel to indication selection — none shifts ABVD
  vs A+AVD choice; both routed via SUP-* + RF-CHL-INFECTION-SCREENING):

  - HBV (HBsAg+ OR anti-HBc+) — Brentuximab vedotin (anti-CD30 ADC) in
    A+AVD carries documented HBV reactivation risk; entecavir 0.5 mg PO
    daily started before first BV dose, continued through induction +
    ≥12 months post-BV. ABVD without BV has lower (but non-zero) HBV
    reactivation risk on steroid pulse — entecavir still recommended in
    HBsAg+ patients per NCCN B-Cell §HBV-1, optional in anti-HBc+
    (monitor HBV-DNA q-cycle). For BEACOPP-escalated (not modeled here)
    entecavir is mandatory due to prolonged prednisone + alkylator load.

  - HIV (HIV+ HL "Stanford-style") — Continue ART throughout induction;
    ABVD or A+AVD acceptable at full dose (Spina 2002, Hentrich 2012 —
    HIV-HL outcomes approach HIV-negative cHL with concurrent ART).
    Avoid BEACOPP in HIV (excess infectious toxicity). PJP prophylaxis
    on TMP-SMX recommended throughout. CD4 + HIV-VL pre-cycle. Watch
    for ART-vincristine interaction (avoid ritonavir-boosted PIs;
    integrase-inhibitor backbone preferred). HIV-HL is more often EBV+
    than HIV-negative HL but treatment unchanged.

  - HCV (HCV-RNA+) — Less common comorbidity in cHL; treat HL first
    (ABVD/A+AVD) and coordinate DAA timing with hepatologist (typically
    after induction unless CP-A and rapid clearance feasible).

  All three operate via parallel SUP-* / RF-* surfaces. BIO-HBV-STATUS
  and BIO-HIV-STATUS missing — would let us formalize these rails as
  biomarker_requirements; flagged for future round.
  UPDATED 2026-05-04 (Workstream FH): IND-CHL-1L-N-AVD added to
  output_indications; wired as Cat 1 alternative at step 1 A+AVD branch.
  SWOG S1826 (Herrera 2024 NEJM): N+AVD 2-yr PFS 92% vs A+AVD 83%
  (HR 0.48). Preferred in younger/fit patients without autoimmune CI.
  UPDATED 2026-05-04 (Workstream FU): IND-CHL-PREGNANCY-MOD-ABVD (Cat 2A) and
  IND-CHL-CHILD-PUGH-C-MOD (Cat 2B) added; wired as alternatives at step 1
  if_false (ABVD track). Pregnancy and hepatic-impairment gaps CLOSED.
