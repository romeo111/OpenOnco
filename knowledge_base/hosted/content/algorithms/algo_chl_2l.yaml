id: ALGO-CHL-2L
applicable_to_disease: DIS-CHL
applicable_to_line_of_therapy: 2
purpose: >
  Select 2L+/relapsed cHL Indication. Four tracks: (0) ASCT-eligible + BV-naive
  + relapsed → IND-CHL-2L-BV-SALVAGE (BV+Benda; LaCasce 2018; NCCN Cat 1;
  bridge to BEAM-ASCT; followed_by: BV maintenance if high-risk); (1) post-ASCT
  + high-risk + BV-naive → IND-CHL-2L-BRENTUXIMAB-MAINTENANCE (AETHERA; Cat 1);
  (2) post-ASCT relapse OR transplant-ineligible → IND-CHL-2L-PEMBROLIZUMAB
  (KEYNOTE-204; Cat 1). Default: pembrolizumab.

output_indications:
  - IND-CHL-2L-PEMBROLIZUMAB
  - IND-CHL-2L-BRENTUXIMAB-MAINTENANCE
  - IND-CHL-2L-BV-SALVAGE
  - IND-CHL-2L-NIVOLUMAB

default_indication: IND-CHL-2L-PEMBROLIZUMAB
alternative_indication: IND-CHL-2L-BRENTUXIMAB-MAINTENANCE

decision_tree:
  # Step 0 — BV salvage bridge gate. ASCT-eligible + BV-naive + 1st/2nd relapse.
  # BV + bendamustine (LaCasce 2018, Blood): ORR 93%; CR 73%. NCCN Cat 1.
  # Goal: achieve PET-CR (Deauville ≤3) → PBSC harvest → BEAM-ASCT.
  # NOTE: This is the CURRENT episode recommendation. After ASCT, the engine
  # will route again: high-risk post-ASCT → step 1 (AETHERA maintenance).
  # Post-ASCT relapse / transplant failure → step 2 (pembrolizumab).
  # BV unavailable (UA access barrier): use ICE/DHAP salvage (NCCN Cat 1 alternative).
  - step: 0
    evaluate:
      all_of:
        - red_flag: RF-PRIOR-BV-NAIVE
        - condition: "ASCT-eligible: ECOG 0-2, adequate cardiac/renal/hepatic function, age ≤65 (relative)"
        - condition: "1st or 2nd relapse cHL after ABVD/A-AVD/BEACOPP; measurable disease"
        - none_of:
          - condition: "Post-ASCT relapse (ASCT already completed)"
          - condition: "Transplant-ineligible (ECOG ≥3, organ failure, patient declined)"
    if_true:
      result: IND-CHL-2L-BV-SALVAGE
      notes: >
        ASCT-eligible + BV-naive: BV + bendamustine salvage bridge (REG-BV-BENDA-CHL).
        ORR 93%; CR 73% (LaCasce 2018 Blood). Goal: PET-CR → PBSC harvest → BEAM-ASCT.
        After ASCT: re-evaluate via this algorithm for BV maintenance (step 1) or
        pembrolizumab (step 2) depending on high-risk features and subsequent course.
        UA access: BV not NSZU-reimbursed; ICE/DHAP are funded alternatives if BV unavailable.
    if_false:
      next_step: 1
    notes: "BV salvage bridge gate added 2026-05-04 (Workstream AN). Closes gap: IND-CHL-2L-BV-SALVAGE not previously modeled."

  # Step 1 — BV-naive gate. AETHERA BV-maintenance post-ASCT requires
  # patient is BV-exposure-naive at the maintenance start (or limited
  # prior BV in the salvage line) and has ≥1 high-risk feature for
  # post-ASCT relapse. RF-PRIOR-BV-NAIVE wires the BV-naive prerequisite;
  # high-risk-feature composite remains MDT-evaluated text (no
  # pan-disease RF for the post-ASCT high-risk composite yet).
  - step: 1
    evaluate:
      all_of:
        - red_flag: RF-PRIOR-BV-NAIVE
        - condition: "ASCT-eligible AND completed BV-based salvage → BEAM-ASCT"
        - condition: "≥1 high-risk feature: primary refractory OR extranodal involvement at relapse OR <12mo from CR1 to relapse OR ≥2 prior salvage lines"
    if_true:
      result: IND-CHL-2L-BRENTUXIMAB-MAINTENANCE
    if_false:
      next_step: 2
    notes: "Partially wired - RF-PRIOR-BV-NAIVE gates AETHERA eligibility (BV-naive vs BV-exposed routes); remaining high-risk composite (primary refractory OR extranodal OR <12mo CR1→relapse OR ≥2 prior salvage) kept as MDT-evaluated text (no pan-disease RF for post-ASCT high-risk composite yet)."

  # Step 2 — post-ASCT relapse OR transplant-ineligible → pembrolizumab.
  - step: 2
    evaluate:
      any_of:
        - condition: "Post-ASCT relapse"
        - condition: "Transplant-ineligible (age >70, comorbidity, ECOG ≥2)"
        - condition: "Post-BV failure pre-ASCT, salvage required"
        - red_flag: RF-CHL-FRAILTY-AGE
        - red_flag: RF-CHL-TRANSFORMATION-PROGRESSION
    if_true:
      next_step: 21
    if_false:
      next_step: 3
    notes: "Step 2 if_true updated 2026-05-04 (Workstream CJ): routes to step 21 (pembro vs nivo access gate) instead of direct pembro result."

  # Step 21 — Pembrolizumab vs nivolumab access gate for PD-1 arm.
  # Both KEYNOTE-204 (pembro) and CheckMate-205 (nivo) are NCCN Cat 1.
  # ORR ~65-66% for both. Choice driven by access/formulary.
  - step: 21
    evaluate:
      all_of:
        - condition: "Pembrolizumab accessible (registered + funded at prescribing centre)"
    if_true:
      result: IND-CHL-2L-PEMBROLIZUMAB
      notes: >
        Pembrolizumab accessible: 200 mg IV q3w (REG-PEMBROLIZUMAB-CHL; KEYNOTE-204;
        ORR 65.6%; CR 24.5%; mPFS 13.2 mo; NCCN Cat 1). Nivolumab is equally valid
        Cat 1 alternative — access-driven choice. cHL PD-L1 overexpression (9p24.1)
        makes it among the most ICI-responsive hematologic malignancies.
    if_false:
      result: IND-CHL-2L-NIVOLUMAB
      notes: >
        Pembrolizumab inaccessible: nivolumab 240 mg IV q2w or 480 mg IV q4w
        (REG-NIVOLUMAB-MONO; CheckMate-205 Armand 2018 JCO; ORR ~66%; mPFS ~14.7 mo;
        NCCN Cat 1). Equivalent to pembrolizumab; choice is access-driven.
        cHL RS cells express constitutive PD-L1 (9p24.1 amplification) → high PD-1 sensitivity.
    notes: "Step 21 added 2026-05-04 (Workstream CJ): pembro vs nivo access gate for r/r cHL. Both NCCN Cat 1. Gap (2) nivolumab not separately modeled — CLOSED."

  # Step 3 — default: 1st relapse, ASCT-eligible → BV salvage→ASCT then
  # BV maintenance if high-risk; else PD-1 inhibitor. Default surfaces
  # PD-1 (pembro/nivo via step 21) as the standard-track option (most realistic for UA).
  - step: 3
    evaluate:
      any_of:
        - condition: "1st relapse, ASCT-eligible, no high-risk feature"
        - condition: "ASCT not accessible / patient declined"
        - red_flag: RF-CHL-TRANSFORMATION-PROGRESSION
    if_true:
      next_step: 21
    if_false:
      next_step: 21

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-HODGKIN-2024

last_reviewed: "2026-05-04"
notes: >
  AUTHORED 2026-05-04: IND-CHL-2L-BV-SALVAGE wired at step 0 (BV+benda;
  LaCasce 2018 ORR 93%; NCCN Cat 1; Workstream AN). ROUTING SUMMARY:
  (0) ASCT-eligible + BV-naive → BV+benda salvage (bridge to ASCT);
  (1) post-ASCT + high-risk + BV-naive → BV maintenance (AETHERA);
  (2) post-ASCT relapse / transplant-ineligible → pembrolizumab (KEYNOTE-204).
  UPDATED 2026-05-04 (Workstream CJ): IND-CHL-2L-NIVOLUMAB authored and wired at
  step 21 (CheckMate-205; Armand 2018 JCO; ORR ~66%; mPFS ~14.7 mo; NCCN Cat 1;
  REG-NIVOLUMAB-MONO). Steps 2 and 3 if_true/if_false now route to step 21 (pembro
  vs nivo access gate): pembro accessible → pembro; else → nivolumab. Gap (2) CLOSED.
  OOS / wiring gaps:
  (1) BEAM-autoSCT itself is a procedure (not an indication) — not modeled.
  (3) BV+nivolumab combo (post-ASCT relapse) — not modeled.
  (4) Allogeneic SCT for post-PD-1 relapse — referral, outside KB.
  (5) ICE/DHAP/GDP salvage (platinum-based) — not separately modeled;
  surfaced as alternative in IND-CHL-2L-BV-SALVAGE alternative_regimens.
