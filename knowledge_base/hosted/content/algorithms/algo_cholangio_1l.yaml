id: ALGO-CHOLANGIO-1L
applicable_to_disease: DIS-CHOLANGIOCARCINOMA
applicable_to_line_of_therapy: 1
purpose: >
  1L systemic therapy for unresectable / metastatic biliary tract cancer (iCCA, eCCA, GBC).
  Primary tracks: ICI+gem-cis (TOPAZ-1 durvalumab / KEYNOTE-966 pembro) for ECOG 0-2 without
  active autoimmune disease; gem-cis monotherapy for ICI-ineligible. Both ICI+gem-cis options
  are NCCN BTC 2025 Category 1; selection by MDT preference and drug access.

output_indications:
  - IND-CHOLANGIO-1L-DURVALUMAB-GEMCIS
  - IND-CHOLANGIO-1L-PEMBRO-GEMCIS
  - IND-CHOLANGIO-ADVANCED-GEM-CIS

default_indication: IND-CHOLANGIO-1L-DURVALUMAB-GEMCIS

decision_tree:
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-CHOLANGIO-AUTOIMMUNE
    if_true:
      next_step: 5
    if_false:
      next_step: 2
    notes: "Active autoimmune disease requiring >10mg prednisone/day → ICI contraindicated; route to gem-cis monotherapy."

  - step: 2
    evaluate:
      all_of:
        - condition: "ECOG PS 0-2"
        - condition: "Adequate biliary drainage (no unrelieved obstruction)"
        - condition: "No prior systemic therapy for advanced BTC"
    if_true:
      next_step: 3
    if_false:
      next_step: 5
    notes: "Fitness gate. ECOG 3-4 or biliary obstruction without drainage → not ICI+gem-cis eligible."

  - step: 3
    evaluate:
      all_of:
        - condition: "Durvalumab accessible (registered or named-patient)"
    if_true:
      result: IND-CHOLANGIO-1L-DURVALUMAB-GEMCIS
      notes: >
        TOPAZ-1 (Oh DY NEJM Evid 2022; n=685): durvalumab+GemCis vs GemCis —
        mOS 12.8 vs 11.5 months (HR 0.80; p=0.021); 24-month OS 24.9% vs 10.4%.
        FDA approved September 2022. NCCN BTC 2025 Category 1.
        Durvalumab 1500mg Q3W × 8 cycles then 1500mg Q4W maintenance until progression.
        Biliary drainage mandatory before starting.
    if_false:
      next_step: 4
    notes: "Durvalumab access gate — if accessible prefer TOPAZ-1; else check pembrolizumab (step 4)."

  - step: 4
    evaluate:
      all_of:
        - condition: "Pembrolizumab accessible (registered or named-patient)"
    if_true:
      result: IND-CHOLANGIO-1L-PEMBRO-GEMCIS
      notes: >
        KEYNOTE-966 (Kelley RK Lancet 2023; n=1069): pembro+GemCis vs GemCis —
        mOS 12.7 vs 10.9 months (HR 0.83; p=0.0034). FDA approved April 2023.
        NCCN BTC 2025 Category 1. Pembrolizumab advantage: max 2-year (35 cycles)
        duration per FDA label — planned discontinuation endpoint. Biliary drainage mandatory.
    if_false:
      next_step: 5
    notes: "Pembrolizumab access gate — if neither ICI accessible, fall through to gem-cis monotherapy."

  - step: 5
    evaluate:
      all_of:
        - condition: "ECOG PS 0-2"
        - condition: "Adequate biliary drainage"
    if_true:
      result: IND-CHOLANGIO-ADVANCED-GEM-CIS
      notes: >
        ICI-ineligible (autoimmune) or ICI-inaccessible: gemcitabine 1000mg/m² + cisplatin
        25mg/m² days 1,8 Q21D × 8 cycles (ABC-02; mOS 11.7 vs 8.1 months GC vs G; p<0.001).
        Cisplatin-ineligible: substitute carboplatin AUC 4.
    if_false:
      result: IND-CHOLANGIO-ADVANCED-GEM-CIS
      notes: "ECOG PS 3-4 or drainage pending — consider BSC; MDT required."

sources:
  - SRC-NCCN-BTC-2025
last_reviewed: "2026-05-04"
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  UPDATED 2026-05-04 (Workstream EB): Expanded from STUB scaffold.
  Added IND-CHOLANGIO-1L-DURVALUMAB-GEMCIS (TOPAZ-1; HR 0.80; FDA Sep 2022; NCCN Cat 1)
  and IND-CHOLANGIO-1L-PEMBRO-GEMCIS (KEYNOTE-966; HR 0.83; FDA Apr 2023; NCCN Cat 1).
  Decision tree: autoimmune check → fitness gate → durvalumab access → pembro access → gem-cis fallback.
  Both ICI+gem-cis options equivalent NCCN Cat 1; ordering by access preference (durvalumab first).
  IND-CHOLANGIO-ADVANCED-GEM-CIS retained as ICI-ineligible/inaccessible fallback.
