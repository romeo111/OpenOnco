id: ALGO-CHOLANGIO-2L
applicable_to_disease: DIS-CHOLANGIOCARCINOMA
applicable_to_line_of_therapy: 2
purpose: >
  2L+ routing for advanced / metastatic biliary tract / cholangiocarcinoma
  post-chemo (gem+cis ± durvalumab) progression. Driver-mutation routing:
  (1) FGFR2 fusion → pemigatinib (FIGHT-202; step 1; NCCN Cat 1);
  (2) IDH1 hotspot mutation → ivosidenib (ClarIDHy; step 12; NCCN Cat 1);
  (3) BRAF V600E mutation → dabrafenib+trametinib (ROAR; step 13; NCCN Cat 2A);
  (4) MSI-H/dMMR → pembrolizumab (KEYNOTE-158; step 14; NCCN Cat 2A);
  (5) HER2 IHC3+/2+ISH+ → trastuzumab deruxtecan (DESTINY-PanTumor02; step 15; NCCN Cat 2A);
  (6) NTRK1/2/3 fusion → larotrectinib (NAVIGATE; step 16; NCCN Cat 2A);
  (7) Default non-driver → FOLFOX (ABC-06; step 2; NCCN Cat 1).

output_indications:
  - IND-CHOLANGIO-2L-FGFR2-FUSION-PEMIGATINIB
  - IND-CHOLANGIO-2L-FUTIBATINIB
  - IND-CHOLANGIO-2L-IDH1-IVOSIDENIB
  - IND-CHOLANGIO-2L-BRAF-V600E-DABTRAM
  - IND-CHOLANGIO-2L-MSI-H-PEMBROLIZUMAB
  - IND-CHOLANGIO-2L-HER2-TDXD
  - IND-CHOLANGIO-2L-NTRK-LAROTRECTINIB
  - IND-CHOLANGIO-2L-FOLFOX-ABC06

default_indication: IND-CHOLANGIO-2L-FOLFOX-ABC06
alternative_indication: IND-CHOLANGIO-2L-FGFR2-FUSION-PEMIGATINIB

decision_tree:
  # Step 1 — FGFR2 fusion / rearrangement (~10–20% of intrahepatic CCA).
  # Treatment-defining for 2L: pemigatinib (FIGHT-202) preferred;
  # futibatinib (FOENIX-CCA2) alternative including post-pemigatinib
  # resistance. Surfaced via known_controversies in indication.
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-CHOLANGIO-FGFR2-FUSION-ACTIONABLE
        - condition: "FGFR2 fusion or rearrangement confirmed by RNA-NGS / DNA-NGS fusion-aware / FISH break-apart"
    if_true:
      result: IND-CHOLANGIO-2L-FGFR2-FUSION-PEMIGATINIB
      notes: >
        FGFR2 fusion/rearrangement iCCA: pemigatinib 13.5 mg PO d1-14 q21d
        (FIGHT-202; Abou-Alfa 2020 JCO; ORR 35.5%; mPFS 6.9 mo; FDA April 2020;
        NCCN Cat 1). ALTERNATIVE (Cat 2A): futibatinib (IND-CHOLANGIO-2L-FUTIBATINIB;
        FOENIX-CCA2; ORR 41.7%; mPFS 9.0 mo; mOS 21.7 mo; FDA September 2023) —
        preferred when pemigatinib inaccessible or prior pemigatinib intolerance/resistance.
        Infigratinib: voluntarily withdrawn from market (not available); do not use.
      alternatives:
        - indication_id: IND-CHOLANGIO-2L-FUTIBATINIB
          nccn_category: "2A"
          criteria: >
            FGFR2 fusion/rearrangement confirmed; pemigatinib inaccessible or
            prior pemigatinib intolerance or post-pemigatinib acquired resistance
            (FGFR2 gatekeeper mutation V565I or other); ECOG ≤2.
          note: >
            Futibatinib (Lytgobi; FOENIX-CCA2; Goyal 2023 NEJM; ORR 41.7%; mPFS
            9.0 mo; mOS 21.7 mo; FDA September 22, 2023 regular approval). Covalent
            irreversible FGFR1-4 inhibitor — distinct mechanism from pemigatinib
            (non-covalent); retains activity against acquired FGFR2 resistance mutations.
            Hyperphosphatemia + dry eye management mandatory.
    if_false:
      next_step: 12
    notes: "Updated Workstream FF 2026-05-05: futibatinib (Cat 2A) added as alternative to pemigatinib at step 1 (FOENIX-CCA2; ORR 41.7%; mPFS 9.0 mo; FDA Sept 2023). IND-CHOLANGIO-2L-FUTIBATINIB wired. Infigratinib: withdrawn from market — NOT wired."

  # Step 12 — IDH1 hotspot mutation (~15-20% intrahepatic CCA).
  # Ivosidenib 500 mg/day (ClarIDHy; Abou-Alfa 2020 NEJM; 2021 FDA);
  # mPFS 2.7 vs 1.4 mo HR 0.37; mOS 10.3 vs 7.5 mo; NCCN Cat 1.
  # QTc monitoring mandatory. UA: not registered; named-patient only.
  - step: 12
    evaluate:
      any_of:
        - condition: "IDH1 hotspot mutation confirmed (R132C/H/G/S/L) by NGS/PCR on tissue or cfDNA — intrahepatic CCA ONLY"
    if_true:
      result: IND-CHOLANGIO-2L-IDH1-IVOSIDENIB
      notes: >
        IDH1-mutant iCCA: ivosidenib 500 mg/day (ClarIDHy; FDA 2021; NCCN Cat 1).
        mPFS 2.7 vs 1.4 months (HR 0.37; p<0.001); mOS 10.3 vs 7.5 months.
        QTc baseline ECG mandatory (>480 ms = contraindication). Biliary drainage
        if bilirubin >3× ULN. Ukraine: not registered — named-patient import only;
        FOLFOX as accessible alternative when ivosidenib unavailable.
    if_false:
      next_step: 13
    notes: "Step 12 added 2026-05-04 (Workstream BB): IDH1-mut intrahepatic CCA → ivosidenib. Gap (2) CLOSED."

  # Step 13 — BRAF V600E mutation (~5% intrahepatic CCA; rare in perihilar/distal).
  # Dabrafenib 150 mg BID + trametinib 2 mg/day (ROAR; Subbiah 2020 JCO;
  # ORR 51%; DCR 84%; mPFS 9 mo; mOS 14.5 mo; NCCN Cat 2A).
  # UA: dab+tram registered + NSZU for melanoma/NSCLC; CCA off-label MDT request.
  - step: 13
    evaluate:
      any_of:
        - condition: "BRAF V600E mutation confirmed by NGS or PCR on tissue or liquid biopsy"
    if_true:
      result: IND-CHOLANGIO-2L-BRAF-V600E-DABTRAM
      notes: >
        BRAF V600E CCA: dabrafenib 150 mg BID + trametinib 2 mg/day (ROAR; Subbiah 2020
        JCO; ORR 51%; DCR 84%; mPFS 9 mo; mOS 14.5 mo; NCCN Cat 2A). LVEF ≥50% required.
        Pyrexia ~50% — antipyretic protocol mandatory. Ukraine: off-label for CCA; MDT
        request required; accessible if approved (NSZU-funded for melanoma/NSCLC).
    if_false:
      next_step: 14
    notes: "Step 13 added 2026-05-04 (Workstream BC): BRAF V600E CCA → dab+tram (ROAR). Gap (4) CLOSED."

  # Step 14 — MSI-H/dMMR (~1-5% pan-BTC; higher in gallbladder carcinoma ~5%).
  # Pembrolizumab 200 mg IV q3w (KEYNOTE-158; Bang 2020; ORR ~41% BTC cohort;
  # FDA tumor-agnostic approval; NCCN Cat 2A). Lynch syndrome germline testing.
  # UA: pembrolizumab registered; CCA off-label — MDT request likely needed.
  - step: 14
    evaluate:
      any_of:
        - condition: "MSI-H or dMMR confirmed: PCR MSI testing, MMR IHC (MLH1/MSH2/MSH6/PMS2 loss), or NGS TMB-H (≥10 mut/Mb)"
    if_true:
      result: IND-CHOLANGIO-2L-MSI-H-PEMBROLIZUMAB
      notes: >
        MSI-H/dMMR BTC: pembrolizumab 200 mg IV q3w (KEYNOTE-158; Bang 2020 AoO; ORR ~41%;
        durable responses; NCCN Cat 2A). FDA tumor-agnostic approval covers BTC. irAE
        protocol mandatory. Lynch syndrome germline testing recommended. Ukraine:
        pembrolizumab registered; CCA off-label MDT request required.
    if_false:
      next_step: 15
    notes: "Step 14 added 2026-05-04 (Workstream BD): MSI-H/dMMR CCA → pembrolizumab (KEYNOTE-158). Gap (5) CLOSED."

  # Step 15 — HER2-overexpressing BTC (~5-7% overall; ~20% gallbladder CA).
  # Trastuzumab deruxtecan (T-DXd) 5.4 mg/kg IV q21d (DESTINY-PanTumor02;
  # Shitara 2023 NEJM; BTC cohort n=22; ORR 36.4%; DCR 90.9%; NCCN Cat 2A).
  # HER2 threshold: IHC 3+ OR IHC 2+/ISH+. ILD (14.6% grade ≥2) = key toxicity.
  # UA: Enhertu off-label for BTC; MDT compassionate use request required.
  - step: 15
    evaluate:
      any_of:
        - condition: "HER2-overexpressing confirmed: IHC 3+ (any histotype) OR IHC 2+/ISH+ (FISH/CISH/NGS amplification) on most recent tumor biopsy"
    if_true:
      result: IND-CHOLANGIO-2L-HER2-TDXD
      notes: >
        HER2+ BTC: T-DXd 5.4 mg/kg IV q21d (REG-TDXD-METASTATIC; DESTINY-PanTumor02
        Shitara 2023 NEJM; ORR 36.4%; DCR 90.9%; NCCN Cat 2A). IHC 3+ alone = sufficient;
        IHC 2+ requires ISH confirmation. Mandatory CT chest baseline for ILD screening.
        Any new respiratory symptoms → immediately hold T-DXd + urgent CT. Ukraine: off-label
        for BTC; MDT compassionate use request required; not NSZU-funded for this indication.
    if_false:
      next_step: 16
    notes: "Step 15 added 2026-05-04 (Workstream BH): HER2+ BTC → T-DXd (DESTINY-PanTumor02; NCCN Cat 2A). Gap (3) CLOSED. If_false → step 16 (NTRK) updated 2026-05-04 (Workstream CD)."

  # Step 16 — NTRK1/2/3 gene fusion (~1-2% BTC; all histotypes).
  # Larotrectinib 100 mg PO BID (NAVIGATE; Drilon 2018 NEJM;
  # ORR 75% pooled; FDA tumor-agnostic approval 2018; NCCN Cat 2A).
  # RNA-NGS preferred (highest sensitivity for fusion detection).
  # UA: not registered; named-patient Bayer or cross-border EU.
  - step: 16
    evaluate:
      any_of:
        - condition: "NTRK1, NTRK2, or NTRK3 gene fusion confirmed by RNA-NGS (preferred) or DNA-NGS fusion-aware panel or TRK IHC (pan-TRK) with confirmatory NGS or FISH break-apart"
    if_true:
      result: IND-CHOLANGIO-2L-NTRK-LAROTRECTINIB
      notes: >
        NTRK fusion BTC: larotrectinib 100 mg PO BID continuous (REG-LAROTRECTINIB-PANTUMOR;
        NAVIGATE Drilon 2018 NEJM; pooled ORR 75%; CR 13%; 1-year DOR 71%; FDA tumor-agnostic
        2018; NCCN Cat 2A). RNA-NGS mandatory — standard exome/hotspot panels miss most fusions.
        CYP3A4 DDI review before starting. Biliary drainage mandatory if bilirubin >3× ULN.
        Ukraine: larotrectinib not registered — named-patient Bayer pathway or cross-border EU
        (МОЗ наказ 988). If inaccessible: IND-CHOLANGIO-2L-FOLFOX-ABC06.
        At progression: rebiopsy for NTRK kinase domain resistance (G595R, G667C) → repotrectinib.
    if_false:
      next_step: 2
    notes: "Step 16 added 2026-05-04 (Workstream CD): NTRK1/2/3 fusion BTC → larotrectinib (NAVIGATE; ORR 75%; NCCN Cat 2A). Gap CLOSED. If_false → step 2 (FOLFOX default)."

  # Step 2 — default 2L non-driver: FOLFOX (ABC-06; Lamarca 2021 JCO;
  # mOS 6.2 vs 5.3 mo HR 0.69 p=0.031; NCCN Cat 1). Reached only after
  # FGFR2/IDH1/BRAF V600E/MSI-H/HER2/NTRK steps all negative.
  # Comprehensive molecular profiling MANDATORY at or before 2L start.
  - step: 2
    evaluate:
      any_of:
        - condition: "Disease progression on 1L gem+cis ± durvalumab; no actionable driver biomarker"
    if_true:
      result: IND-CHOLANGIO-2L-FOLFOX-ABC06
      notes: >
        2L non-driver BTC/CCA (FGFR2/IDH1/BRAF V600E/MSI-H/HER2/NTRK all negative):
        mFOLFOX (REG-FOLFOX; oxaliplatin 85 mg/m² d1 + 5-FU 2400 mg/m² 46h q14d;
        ABC-06 Lamarca 2021 JCO; mOS 6.2 mo HR 0.69 p=0.031; NCCN Cat 1).
        Comprehensive molecular profiling (FGFR2, IDH1, BRAF, HER2, MSI, NTRK)
        MANDATORY before accepting non-driver status — targeted therapy ORR 30-51%
        vs FOLFOX ~5% in driver-positive tumors.
        Biliary drainage required if bilirubin >3× ULN. Neuropathy screen baseline.
    if_false:
      result: IND-CHOLANGIO-2L-FOLFOX-ABC06

sources:
  - SRC-NCCN-HEPATOBILIARY
  - SRC-ESMO-BTC-2023
  - SRC-FIGHT-202

