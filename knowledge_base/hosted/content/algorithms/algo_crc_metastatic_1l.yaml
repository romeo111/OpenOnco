id: ALGO-CRC-METASTATIC-1L
applicable_to_disease: DIS-CRC
applicable_to_disease_state: metastatic
applicable_to_line_of_therapy: 1
purpose: >
  Select 1L regimen for metastatic colorectal cancer (mCRC). Step 0
  (D2 chunk gi3-d2-algo-extensions-2026-05-08-2300) gates the liver-
  only oligometastatic track first — RF-CRC-OLIGOMET-LIVER-DEFINITION
  fires when ≤3 liver-confined mets + controllable primary + ECOG 0-1
  + amenable to local therapy (resection / SBRT / ablation). Otherwise
  falls through to the standard biomarker hierarchy: MSI-H/dMMR
  (treatment-defining), then RAS/BRAF + tumor sidedness (NCCN/ESMO),
  then frailty (de-escalate).

output_indications:
  - IND-CRC-OLIGOMET-LIVER-LIMITED
  - IND-CRC-METASTATIC-1L-MSI-H-PEMBRO
  - IND-CRC-METASTATIC-1L-RAS-WT-LEFT
  - IND-CRC-METASTATIC-1L-FOLFOXIRI-BEV
  - IND-CRC-METASTATIC-1L-FOLFOX-BEV

default_indication: IND-CRC-METASTATIC-1L-RAS-WT-LEFT
alternative_indication: IND-CRC-METASTATIC-1L-FOLFOX-BEV

decision_tree:
  # Step 0 (D2 chunk gi3-d2-algo-extensions-2026-05-08-2300) —
  # RF-CRC-OLIGOMET-LIVER-DEFINITION gate. When patient meets liver-
  # only oligometastatic criteria (≤3 liver lesions confined to liver,
  # controllable primary, ECOG 0-1, all sites amenable to local therapy
  # — resection / SBRT / ablation), route to systemic-plus-local
  # oligomet track (induction systemic → restaging → metastasis-
  # directed local therapy → adjuvant systemic). Falls through to the
  # standard 1L metastatic biomarker hierarchy when the RF does not
  # fire (>3 liver mets, extra-hepatic disease, peritoneal involvement,
  # ECOG ≥2, etc.).
  - step: 0
    evaluate:
      any_of:
        - red_flag: RF-CRC-OLIGOMET-LIVER-DEFINITION
    if_true:
      result: IND-CRC-OLIGOMET-LIVER-LIMITED
      notes: >
        Liver-limited oligometastatic CRC (RF-CRC-OLIGOMET-LIVER-DEFINITION):
        ≤3 liver lesions + ECOG 0-1 + controllable primary + all sites
        amenable to local therapy (R0-resectable, SBRT-eligible, or
        ablation-amenable). Aggressive plan track — induction systemic
        chemo (FOLFOX or FOLFOXIRI ± bev/EGFRi per biomarker) →
        restaging → metastasis-directed local therapy → adjuvant
        systemic continuation. NCCN v3.2025 supports curative-intent
        approach for liver-limited mCRC (CALGB-80405 / FIRE-3
        derivative cohorts). Confidence: moderate (no dedicated
        randomized trial; consensus-driven from observational and
        post-hoc analyses).
    if_false:
      next_step: 1
    notes: "D2 chunk new branch — prepended oligomet step gates the standard biomarker hierarchy. Fires only when RF-CRC-OLIGOMET-LIVER-DEFINITION composite trigger evaluates True (≤3 liver lesions + ECOG≤1 + primary controllable + all sites amenable + no extra-hepatic disease). MSI-H, RAS/BRAF biomarkers continue to inform the systemic backbone selected in the induction phase but do NOT override the oligomet track at routing-time."

  # Step 1 — MSI-H/dMMR overrides everything (KEYNOTE-177).
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-CRC-MSI-H-ACTIONABILITY
    if_true:
      result: IND-CRC-METASTATIC-1L-MSI-H-PEMBRO
    if_false:
      next_step: 2

  # Step 2 — RAS-WT + left-sided primary → cetuximab (CALGB-80405).
  # RF-CRC-RAS-WT gates extended-RAS wild-type (KRAS exons 2/3/4 +
  # NRAS exons 2/3/4 all WT). Left-sidedness criterion kept as
  # MDT-text (no RF for primary-tumour location yet).
  - step: 2
    evaluate:
      all_of:
        - red_flag: RF-CRC-RAS-WT
        - condition: "Left-sided primary (splenic flexure or distal)"
    if_true:
      result: IND-CRC-METASTATIC-1L-RAS-WT-LEFT
    if_false:
      next_step: 3
    notes: "Partially wired - RF-CRC-RAS-WT gates extended-RAS wild-type cetuximab eligibility (vs RF-CRC-RAS-MUTANT → bev+chemo); left-sided primary criterion remains MDT-text (no primary-location RF authored)."

  # Step 3 — BRAF V600E (poor prognosis) → FOLFOXIRI+bev if ECOG 0-1
  # (TRIBE/TRIBE2 support; ESMO 2024 preferred for fit BRAF V600E 1L).
  # BEACON encorafenib+cetuximab is the 2L standard after this induction.
  - step: 3
    evaluate:
      all_of:
        - red_flag: RF-CRC-BRAF-V600E-POOR-PROGNOSIS
        - condition: "ECOG PS 0-1 AND age <75"
    if_true:
      result: IND-CRC-METASTATIC-1L-FOLFOXIRI-BEV
      notes: "BRAF V600E + fit: FOLFOXIRI+bev preferred (TRIBE; ESMO 2024). Plan BEACON 2L after progression."
    if_false:
      next_step: 4

  # Step 4 — BRAF V600E but frail/older → de-escalate to doublet.
  - step: 4
    evaluate:
      any_of:
        - red_flag: RF-CRC-BRAF-V600E-POOR-PROGNOSIS
    if_true:
      result: IND-CRC-METASTATIC-1L-FOLFOX-BEV
      notes: "BRAF V600E + ECOG ≥2 or age ≥75: FOLFOX+bev (tolerable doublet); BEACON 2L after progression."
    if_false:
      next_step: 5

  # Step 4 — Fit patient with high tumour burden / conversion intent
  # (non-BRAF, non-MSI-H, ECOG 0-1) → consider FOLFOXIRI+bev.
  - step: 5
    evaluate:
      all_of:
        - condition: "ECOG PS 0-1 AND age <75"
        - condition: "High tumour burden OR liver-limited disease with conversion-to-surgery intent"
    if_true:
      result: IND-CRC-METASTATIC-1L-FOLFOXIRI-BEV
      notes: "Fit + high-burden/conversion intent: FOLFOXIRI+bev (TRIBE OS benefit; higher ORR/R0 rate). MDT resectability review before starting."
    if_false:
      next_step: 6

  # Step 5 — frailty de-escalation.
  - step: 6
    evaluate:
      any_of:
        - red_flag: RF-CRC-FRAILTY-AGE
    if_true:
      result: IND-CRC-METASTATIC-1L-FOLFOX-BEV
      notes: "Frail/older: dose-modified FOLFOX+bev. Palliative-intent 5-FU/LV mono awaits dedicated geriatric indication."
    if_false:
      result: IND-CRC-METASTATIC-1L-FOLFOX-BEV

sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024
  - SRC-TRIBE-LOUPAKIS-2014
  - SRC-TRIBE2-CREMOLINI-2020

last_reviewed: "2026-05-08"
notes: >
  D2 chunk gi3-d2-algo-extensions-2026-05-08-2300 — prepended step 0
  oligomet-liver gate (RF-CRC-OLIGOMET-LIVER-DEFINITION → IND-CRC-
  OLIGOMET-LIVER-LIMITED) before the standard biomarker hierarchy.
  Mirrors the GI-2 D2 ALGO-GASTRIC-METASTATIC-1L step-0 oligomet
  pattern (PR #446 — RF-OLIGOMET-DEFINITION → IND-GASTRIC-OLIGOMET-
  SYSTEMIC-PLUS-LOCAL).

  Algorithm covering 5 indications: liver-limited oligomet curative
  (D2 step 0), MSI-H pembro (1L standard), RAS-WT left-sided cetux
  (CALGB-80405), FOLFOXIRI+bev for fit BRAF V600E or high-burden
  conversion intent (TRIBE/TRIBE2), FOLFOX+bev default. Still missing
  (deferred): HER2+ trastuzumab+tucatinib (MOUNTAINEER — 2L, already
  authored), regorafenib/TAS-102 3L+, palliative 5-FU/LV mono for
  frail patients.

  Frailty (step 5) routes to FOLFOX+bev — clinically dose-modified or
  palliative-intent 5-FU/LV mono is more appropriate but awaits dedicated
  geriatric-oncology indication entry.

  BRAF V600E routing: fit patients → FOLFOXIRI+bev 1L then BEACON 2L
  (encorafenib+cetuximab). Frail/older BRAF V600E → FOLFOX+bev 1L then
  BEACON 2L (no age bar for BEACON, only PS restriction).
