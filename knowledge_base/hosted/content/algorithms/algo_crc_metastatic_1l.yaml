id: ALGO-CRC-METASTATIC-1L
applicable_to_disease: DIS-CRC
applicable_to_line_of_therapy: 1
purpose: >
  Select 1L regimen for metastatic colorectal cancer (mCRC) based on
  MSI-H status (treatment-defining), then RAS/BRAF + tumor sidedness
  (NCCN/ESMO algorithm), then frailty (de-escalate).

output_indications:
  - IND-CRC-METASTATIC-1L-MSI-H-PEMBRO
  - IND-CRC-METASTATIC-1L-MSI-H-NIVO-IPI
  - IND-CRC-METASTATIC-1L-RAS-WT-LEFT
  - IND-CRC-METASTATIC-1L-RAS-WT-LEFT-PANI
  - IND-CRC-METASTATIC-1L-FOLFOXIRI-BEV
  - IND-CRC-METASTATIC-1L-FOLFOX-BEV
  - IND-CRC-METASTATIC-1L-CAPE-BEV-FRAIL
  - IND-CRC-PERFORMANCE-STATUS-3
  - IND-CRC-METASTATIC-MAINT-FOLFIRI-BEV

default_indication: IND-CRC-METASTATIC-1L-RAS-WT-LEFT
alternative_indication: IND-CRC-METASTATIC-1L-FOLFOX-BEV

decision_tree:
  # Step 1 — MSI-H/dMMR overrides everything (KEYNOTE-177; CheckMate-8HW).
  # Two NCCN Cat 1 options: pembrolizumab (default) and nivo+ipi (alternative).
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-CRC-MSI-H-ACTIONABILITY
    if_true:
      result: IND-CRC-METASTATIC-1L-MSI-H-PEMBRO
      alternatives:
        - indication: IND-CRC-METASTATIC-1L-MSI-H-NIVO-IPI
          criteria: "Doublet ICI preferred by MDT or patient; CheckMate-8HW PFS HR 0.21 vs chemo; NCCN Cat 1; note higher irAE burden vs pembro monotherapy"
          nccn_category: 1
      notes: >
        MSI-H/dMMR (~5% of mCRC) — TWO NCCN Cat 1 ICI options:
        DEFAULT: Pembrolizumab monotherapy 200 mg Q3W (KEYNOTE-177; PFS HR 0.60; ORR 44%;
        5-year follow-up data available; single-agent; lower irAE burden).
        ALTERNATIVE: Nivolumab 240 mg Q2W + ipilimumab 1 mg/kg Q6W (CheckMate-8HW;
        PFS HR 0.21; ORR ~45%; doublet ICI; FDA ~2024; potentially superior durability).
        DOSING NOTE: nivo+ipi CRC uses NIVO 240 mg Q2W + IPI 1 mg/kg Q6W (nivo-dominant)
        — NOT the HCC dosing (nivo 1 mg/kg + ipi 3 mg/kg Q6W).
        MDT select based on irAE tolerance, Lynch syndrome implications, and patient preference.
    if_false:
      next_step: 2

  # Step 2 — RAS-WT + left-sided primary → cetuximab (CALGB-80405).
  # RF-CRC-RAS-WT gates extended-RAS wild-type (KRAS exons 2/3/4 +
  # NRAS exons 2/3/4 all WT). Left-sidedness criterion kept as
  # MDT-text (no RF for primary-tumour location yet).
  - step: 2
    evaluate:
      all_of:
        - red_flag: RF-CRC-RAS-WT
        - condition: "Left-sided primary (splenic flexure or distal)"
    if_true:
      result: IND-CRC-METASTATIC-1L-RAS-WT-LEFT
    if_false:
      next_step: 3
    notes: "Partially wired - RF-CRC-RAS-WT gates extended-RAS wild-type cetuximab eligibility (vs RF-CRC-RAS-MUTANT → bev+chemo); left-sided primary criterion remains MDT-text (no primary-location RF authored)."

  # Step 3 — BRAF V600E (poor prognosis) → FOLFOXIRI+bev if ECOG 0-1
  # (TRIBE/TRIBE2 support; ESMO 2024 preferred for fit BRAF V600E 1L).
  # BEACON encorafenib+cetuximab is the 2L standard after this induction.
  - step: 3
    evaluate:
      all_of:
        - red_flag: RF-CRC-BRAF-V600E-POOR-PROGNOSIS
        - condition: "ECOG PS 0-1 AND age <75"
    if_true:
      result: IND-CRC-METASTATIC-1L-FOLFOXIRI-BEV
      notes: "BRAF V600E + fit: FOLFOXIRI+bev preferred (TRIBE; ESMO 2024). Plan BEACON 2L after progression."
    if_false:
      next_step: 3b

  # Step 3b — BRAF V600E but frail/older → de-escalate to doublet.
  - step: 3b
    evaluate:
      any_of:
        - red_flag: RF-CRC-BRAF-V600E-POOR-PROGNOSIS
    if_true:
      result: IND-CRC-METASTATIC-1L-FOLFOX-BEV
      notes: "BRAF V600E + ECOG ≥2 or age ≥75: FOLFOX+bev (tolerable doublet); BEACON 2L after progression."
    if_false:
      next_step: 4

  # Step 4 — Fit patient with high tumour burden / conversion intent
  # (non-BRAF, non-MSI-H, ECOG 0-1) → consider FOLFOXIRI+bev.
  - step: 4
    evaluate:
      all_of:
        - condition: "ECOG PS 0-1 AND age <75"
        - condition: "High tumour burden OR liver-limited disease with conversion-to-surgery intent"
    if_true:
      result: IND-CRC-METASTATIC-1L-FOLFOXIRI-BEV
      notes: "Fit + high-burden/conversion intent: FOLFOXIRI+bev (TRIBE OS benefit; higher ORR/R0 rate). MDT resectability review before starting."
    if_false:
      next_step: 5

  # Step 5 — frailty de-escalation gate.
  # RF-CRC-FRAILTY-AGE: ECOG ≥3 OR age ≥80+Charlson ≥3 OR age ≥75+albumin<3.0+≥2 comorbidities.
  # Frail patients cannot tolerate oxaliplatin; route to step 51 for fitness sub-stratification.
  - step: 5
    evaluate:
      any_of:
        - red_flag: RF-CRC-FRAILTY-AGE
    if_true:
      next_step: 51
      notes: >
        RF-CRC-FRAILTY-AGE met: routes to step 51 for ECOG-based de-escalation.
        Avoids FOLFOX+bev in frail patients (oxaliplatin neuropathy + IV burden
        outweigh benefit in true frailty). Step 51 selects cape+bev vs BSC-adjacent mono.
    if_false:
      result: IND-CRC-METASTATIC-1L-FOLFOX-BEV
      notes: >
        Default mCRC 1L for fit non-frail patients (no specific FOLFOXIRI driver):
        FOLFOX + bevacizumab (TREE/N016966; NCCN Cat 1). After 6-8 induction cycles
        with ≥SD/PR: de-escalate to maintenance capecitabine + bevacizumab to limit
        cumulative oxaliplatin neuropathy (CAIRO3; AIO 0207; NCCN Cat 1) —
        see IND-CRC-METASTATIC-MAINT-FOLFIRI-BEV in alternatives.
      alternatives:
        - indication_id: IND-CRC-METASTATIC-MAINT-FOLFIRI-BEV
          nccn_category: "1"
          criteria: >
            Stage IV unresectable mCRC; achieved ≥SD/PR after 6-8 cycles FOLFOX+bev
            induction (non-MSI-H — MSI-H patients remain on pembrolizumab maintenance
            pathway); ECOG 0-2; RF-CRC-TRANSFORMATION-PROGRESSION absent.
            Maintenance regimen: capecitabine 1000 mg/m² BID d1-14 q21d + bevacizumab
            7.5 mg/kg q21d. DPYD genotyping required before capecitabine start. LOT=1
            continuation — induction → maintenance is one continuous 1L pathway; not a
            new line of therapy.
          note: >
            Capecitabine + bevacizumab maintenance after FOLFOX+bev induction (CAIRO3;
            Simkens 2015 Lancet; AIO 0207; Hegewisch-Becker 2015 Lancet Oncol; NCCN
            Cat 1): CAIRO3 — mPFS 8.5 vs 4.1 mo (maintenance vs observation);
            AIO 0207 — bev ± fluoropyrimidine maintenance superior to full pause.
            Main rationale: avoid cumulative oxaliplatin neuropathy (>30% irreversible
            at >7-12 g/m² cumulative). Reintroduce oxaliplatin at progression if
            tolerated (CAIRO3 reintroduction arm supported re-induction). Full stop
            acceptable for deep CR patients or patient preference (OPTIMOX stop-and-go
            approach). REG stub: REG-CAPE-BEV-MAINTENANCE pending authoring.

  # Step 51 — Frailty ECOG sub-stratification.
  # RF-CRC-FRAILTY-AGE positive patients reach this step.
  # ECOG 0-2 (ambulatory even if frail by age/comorbidity) → cape+bev (AVEX; NCCN Cat 2A).
  # ECOG ≥3 (not ambulatory) → capecitabine mono or BSC (IND-CRC-PERFORMANCE-STATUS-3).
  - step: 51
    evaluate:
      any_of:
        - red_flag: RF-FITNESS-ECOG-FIT
        - red_flag: RF-FITNESS-ECOG-INTERMEDIATE
    if_true:
      result: IND-CRC-METASTATIC-1L-CAPE-BEV-FRAIL
      notes: >
        Frail by age/comorbidity but ECOG 0-2: capecitabine 1000 mg/m² BID d1-14 q21d
        + bevacizumab 7.5 mg/kg q21d (REG-CAPE-BEV-FRAIL; AVEX Cunningham 2013 Lancet Oncol;
        mPFS 9.1 vs 5.1 mo; HR 0.53; NCCN Cat 2A). Avoids oxaliplatin neuropathy + IV pump.
        DPYD genotyping mandatory before capecitabine initiation.
    if_false:
      result: IND-CRC-PERFORMANCE-STATUS-3
      notes: >
        ECOG ≥3 (PS3/PS4): doublet/triplet chemotherapy not appropriate. BSC-adjacent
        care. If patient and family elect active treatment: capecitabine mono
        (REG-CAPECITABINE-PALLIATIVE; 750-1000 mg/m² BID; minimal IV burden).
        Goals-of-care MDT + palliative care referral strongly recommended.
    notes: "Step 51 added 2026-05-04 (Workstream BY): frailty ECOG sub-stratification for CRC 1L. ECOG 0-2 frail → IND-CRC-METASTATIC-1L-CAPE-BEV-FRAIL (AVEX Cat 2A); ECOG ≥3 → IND-CRC-PERFORMANCE-STATUS-3. Gaps (frailty track + 5-FU/LV palliative mono) CLOSED."

sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024
  - SRC-TRIBE-LOUPAKIS-2014
  - SRC-TRIBE2-CREMOLINI-2020

last_reviewed: "2026-05-04"
notes: >
  UPDATED 2026-05-04 (Workstream BY): IND-CRC-METASTATIC-1L-CAPE-BEV-FRAIL authored and
  wired at step 51 for moderately frail (ECOG 0-2, RF-CRC-FRAILTY-AGE) patients (AVEX
  Cunningham 2013; mPFS 9.1 mo; NCCN Cat 2A). IND-CRC-PERFORMANCE-STATUS-3 wired at step
  51 if_false for ECOG ≥3 patients. Frailty de-escalation gap CLOSED.

  ROUTING SUMMARY: (1) MSI-H → pembro; (2) RAS-WT + left-sided → cetux; (3) BRAF V600E +
  fit → FOLFOXIRI+bev; (3b) BRAF V600E + frail/older → FOLFOX+bev; (4) fit + high-burden →
  FOLFOXIRI+bev; (5) frailty gate → step 51; (51) ECOG 0-2 frail → cape+bev; (51 if_false)
  ECOG ≥3 → BSC-adjacent capecitabine mono; (5 if_false) default → FOLFOX+bev.

  UPDATED 2026-05-04 (Workstream EM): IND-CRC-METASTATIC-1L-MSI-H-NIVO-IPI added to
  output_indications; step 1 expanded with alternatives block — nivo+ipi (CheckMate-8HW;
  PFS HR 0.21; FDA ~2024; NCCN Cat 1) as second Cat 1 option alongside pembrolizumab.

  Algorithm covering 7 indications now: MSI-H pembro + nivo+ipi (alt), RAS-WT left-sided
  cetux, FOLFOXIRI+bev (fit BRAF V600E or high-burden), FOLFOX+bev default, cape+bev frail
  (AVEX), PS3+ BSC-adjacent mono.

  Still deferred/OOS: HER2+ trastuzumab+tucatinib (MOUNTAINEER — 2L, already authored);
  regorafenib/TAS-102 3L+; BRAF V600E frail subgroup (step 3b frail → FOLFOX+bev → BEACON
  2L still applies; frailty gate step 5 does NOT catch BRAF V600E frail since step 3b
  handles it upstream).

  BRAF V600E routing: fit → FOLFOXIRI+bev 1L then BEACON 2L. Frail/older BRAF V600E →
  FOLFOX+bev 1L then BEACON 2L (no age bar for BEACON; only PS restriction).

  UPDATED 2026-05-04 (Workstream FR): IND-CRC-METASTATIC-MAINT-FOLFIRI-BEV wired as
  Cat 1 alternative at step 5 if_false (FOLFOX+bev default track). Maintenance
  capecitabine + bevacizumab after 6-8 induction cycles per CAIRO3/AIO 0207 (NCCN
  Cat 1). Maintenance gap CLOSED.
