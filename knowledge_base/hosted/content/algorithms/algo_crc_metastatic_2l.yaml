id: ALGO-CRC-METASTATIC-2L
applicable_to_disease: DIS-CRC
applicable_to_line_of_therapy: 2
purpose: >
  2L+ routing for metastatic CRC by molecular profile + prior therapy.
  Driver-mutation routing first (MSI > BRAF > KRAS-G12C > HER2 > EGFRi
  rechallenge > 3L default chemo-refractory salvage). MSI-H supersedes
  all other 2L choices. Each driver-mutation indication is treatment-
  defining for its biomarker subset.

output_indications:
  - IND-CRC-METASTATIC-2L-MSI-H-PEMBRO
  - IND-CRC-METASTATIC-2L-BRAF-BEACON
  - IND-CRC-METASTATIC-2L-KRAS-G12C-SOTORASIB-CETUXIMAB
  - IND-CRC-METASTATIC-2L-HER2-AMP-TUCATINIB
  - IND-CRC-METASTATIC-2L-HER2-AMP-T-DXD
  - IND-CRC-METASTATIC-2L-EGFRI-RECHALLENGE
  - IND-CRC-METASTATIC-2L-FOLFIRI-BEV
  - IND-CRC-METASTATIC-3L-TAS102-BEV
  - IND-CRC-METASTATIC-3L-REGORAFENIB
  - IND-CRC-METASTATIC-3L-TRIFLURIDINE-TIPIRACIL-MONO
  - IND-CRC-3L-FRUQUINTINIB

default_indication: IND-CRC-METASTATIC-2L-FOLFIRI-BEV
alternative_indication: IND-CRC-METASTATIC-3L-TAS102-BEV

decision_tree:
  # Step 1 — MSI-H/dMMR overrides everything (KEYNOTE-164 2L+ continuation
  # of KEYNOTE-177 1L). Treatment-defining biomarker.
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-CRC-MSI-H-ACTIONABILITY
        - condition: "MSI-H or dMMR confirmed by validated assay AND no prior anti-PD-1 exposure"
    if_true:
      result: IND-CRC-METASTATIC-2L-MSI-H-PEMBRO
    if_false:
      next_step: 2

  # Step 2 — BRAF V600E (poor prognosis). BEACON encorafenib + cetuximab
  # is the molecular-targeted 2L+ standard for this subset.
  - step: 2
    evaluate:
      any_of:
        - red_flag: RF-CRC-BRAF-V600E-POOR-PROGNOSIS
        - condition: "BRAF V600E confirmed by validated assay (NGS or IHC + confirm)"
    if_true:
      result: IND-CRC-METASTATIC-2L-BRAF-BEACON
    if_false:
      next_step: 3

  # Step 3 — KRAS G12C (~3-4% of mCRC). CodeBreaK 300 sotorasib + cetuximab.
  - step: 3
    evaluate:
      all_of:
        - condition: "KRAS G12C confirmed by NGS (tissue OR ctDNA)"
        - condition: "BRAF V600E excluded (ruled out via step 2)"
    if_true:
      result: IND-CRC-METASTATIC-2L-KRAS-G12C-SOTORASIB-CETUXIMAB
    if_false:
      next_step: 4
    notes: "MDT-only after CSD-7A audit — composite is biomarker/disease-specific (not fitness/eligibility/prior-therapy), so no pan-disease RF applies. Wireable only via dedicated disease-specific RFs in a future round."

  # Step 4 — HER2 amplified (~3% of mCRC) AND RAS-WT. MOUNTAINEER
  # tucatinib + trastuzumab default; T-DXd alternative noted in
  # algorithm purpose / indication controversies. RF-CRC-HER2-AMP-
  # ACTIONABLE added as additive any_of clause in W1.B2 chunk
  # (2026-04-30); free-text conditions retained for back-compat.
  - step: 4
    evaluate:
      any_of:
        - red_flag: RF-CRC-HER2-AMP-ACTIONABLE
        - all_of:
            - condition: "HER2 amplified (IHC 3+ OR IHC 2+/ISH+)"
            - condition: "RAS wild-type (MOUNTAINEER eligibility)"
    if_true:
      result: IND-CRC-METASTATIC-2L-HER2-AMP-TUCATINIB
    if_false:
      next_step: 5
    notes: "RF-CRC-HER2-AMP-ACTIONABLE wired W1.B2 (2026-04-30); free-text conditions retained for back-compat."

  # Step 5 — Anti-EGFR rechallenge (3L+; positioned here so 2L candidates
  # without driver mutations route to standard cytotoxic-switch first).
  # Only fires if patient has prior anti-EGFR response AND intervening
  # EGFR-free 2L line — typically 3L scenario. RF-CRC-RAS-WT gates the
  # extended-RAS WT prerequisite at baseline; ctDNA RAS-WT at
  # rechallenge timepoint, prior-EGFR-response and intervening-line
  # criteria remain MDT-text (CHRONOS-style ctDNA timing not modelled).
  - step: 5
    evaluate:
      all_of:
        - red_flag: RF-CRC-RAS-WT
        - condition: "ctDNA RAS-WT at rechallenge timepoint (CHRONOS biomarker selection)"
        - condition: "Prior anti-EGFR response (PR or better OR SD ≥6 mo) in 1L"
        - condition: "Intervening anti-EGFR-free 2L line completed (typically bev-based)"
        - condition: "BRAF V600E excluded (ruled out via step 2)"
    if_true:
      result: IND-CRC-METASTATIC-2L-EGFRI-RECHALLENGE
    if_false:
      next_step: 6
    notes: "Partially wired - RF-CRC-RAS-WT gates extended-RAS wild-type baseline (CHRONOS biomarker selection for cetuximab rechallenge post-FOLFOX failure); ctDNA-timepoint RAS-WT, prior-EGFR-response, and intervening-line criteria remain MDT-text (CHRONOS-style ctDNA timing and prior-response history not RF-modelled)."

  # Step 6 — 2L cytotoxic-switch default (FOLFOX → FOLFIRI + biologic
  # continuation per TML/ML18147). Standard track.
  - step: 6
    evaluate:
      any_of:
        - condition: "First disease progression on 1L FOLFOX-based regimen (FOLFOX, FOLFOX+bev, FOLFOX+cetux)"
        - red_flag: RF-CRC-TRANSFORMATION-PROGRESSION
    if_true:
      result: IND-CRC-METASTATIC-2L-FOLFIRI-BEV
    if_false:
      next_step: 7

  # Step 7 — 3L+ chemo-refractory salvage. Route to step 71 for
  # TAS-102+bev vs fruquintinib sub-decision; regorafenib alternative
  # noted via known_controversies in indication entities.
  - step: 7
    evaluate:
      any_of:
        - condition: "Disease progression on standard chemo (FOLFOX, FOLFIRI) + biologic; no driver mutation actionable"
        - red_flag: RF-CRC-TRANSFORMATION-PROGRESSION
    if_true:
      next_step: 71
    if_false:
      result: IND-CRC-METASTATIC-3L-TAS102-BEV

  # Step 71 — TAS-102+bev (SUNLIGHT preferred; mOS 10.8 mo) vs fruquintinib
  # (FRESCO-2; mOS 7.4 mo). TAS-102+bev preferred where accessible (superior
  # OS vs monotherapy); fruquintinib preferred if TAS-102+bev not available or
  # patient intolerant to tipiracil/trifluridine (oral monotherapy preference).
  - step: 71
    evaluate:
      any_of:
        - condition: "Prior trifluridine/tipiracil (TAS-102) therapy — fruquintinib preferred (no cross-resistance)"
        - condition: "TAS-102+bevacizumab not accessible or unaffordable (Ukraine: bevacizumab NSZU gap for 3L combination)"
        - condition: "Patient prefers oral VEGFR-TKI without IV infusion (bevacizumab requires IV)"
    if_true:
      result: IND-CRC-3L-FRUQUINTINIB
      notes: >
        Fruquintinib 5 mg PO daily × 21/28 days (FRESCO-2; Dasari 2023 Lancet;
        mOS 7.4 vs 4.8 mo HR 0.66 p<0.001; mPFS 3.7 vs 1.8 mo HR 0.32; NCCN Cat 1).
        Preferred when TAS-102+bev inaccessible, prior TAS-102 exposure, or IV-free
        oral monotherapy preferred. Hepatotoxicity monitoring (LFT q4w). BP q2w.
        Ukraine: fruquintinib not NSZU-registered; EAP Takeda / cross-border / self-pay.
    if_false:
      result: IND-CRC-METASTATIC-3L-TAS102-BEV
      notes: >
        TAS-102 + bevacizumab (SUNLIGHT; Van Cutsem 2023 NEJM; mOS 10.8 vs 7.5 mo
        HR 0.61 p<0.001; NCCN Cat 1) preferred where accessible — superior OS
        vs TAS-102 mono and vs regorafenib in indirect comparison. IND-CRC-3L-
        FRUQUINTINIB is an equivalent alternative (see step 71 if_true above).
    notes: "Step 71 added Workstream AU 2026-05-04. Free-text conditions; MDT access/exposure evaluation."

sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024

last_reviewed: "2026-05-04"
notes: >
  2L+ routing for metastatic CRC. Driver-mutation cascade:
  MSI-H > BRAF V600E > KRAS G12C > HER2-amp > EGFRi rechallenge >
  2L cytotoxic switch > 3L salvage (TAS-102+bev preferred / fruquintinib).

  UPDATED 2026-05-04 (Workstream AU): IND-CRC-3L-FRUQUINTINIB (existing entity)
  added to output_indications; step 71 added as sub-decision routing TAS-102+bev
  (preferred) vs fruquintinib (prior TAS-102 / IV-free preference / access).
  Gap (3) CLOSED.

  Wiring gaps / future work:
  (1) RF-CRC-KRAS-G12C-ACTIONABILITY and RF-CRC-HER2-AMP-ACTIONABILITY
  do not yet exist as red-flag entities — algorithm currently uses
  free-text conditions for steps 3-4. Add dedicated RFs in next batch.
  (2) HER2-amp T-DXd alternative (DESTINY-CRC01) surfaced via known_controversies;
  no separate algorithm branch needed.
  (4) TAS-102 monotherapy fallback (RECOURSE) surfaced via known_controversies in
  IND-CRC-METASTATIC-3L-TAS102-BEV; no separate algorithm branch.
  (5) Adagrasib + cetuximab (KRYSTAL-1) for KRAS G12C+ with CNS — known_controversies
  in IND-CRC-METASTATIC-2L-KRAS-G12C-SOTORASIB-CETUXIMAB.
  (6) ctDNA-guided EGFRi rechallenge (step 5) requires ctDNA NGS access
  not universally available in Ukraine — clinical-selection fallback
  noted in indication.
