id: ALGO-DLBCL-1L
applicable_to_disease: DIS-DLBCL-NOS
applicable_to_line_of_therapy: 1
purpose: 'Select default + alternative Indication for first-line newly-diagnosed DLBCL NOS based on IPI risk. Outputs the
  two-plan pair (R-CHOP standard vs Pola-R-CHP intensified) per CHARTER §2.

  '
output_indications:
- IND-DLBCL-1L-RCHOP
- IND-DLBCL-1L-POLA-R-CHP
- IND-DLBCL-1L-RCHOP-ISRT-EARLY
- IND-DLBCL-RENAL-FAILURE-MOD-RCHOP
default_indication: IND-DLBCL-1L-RCHOP
alternative_indication: IND-DLBCL-1L-POLA-R-CHP
decision_tree:
- step: 1
  evaluate:
    any_of:
    - red_flag: RF-DLBCL-FRAILTY-AGE
    - red_flag: RF-DLBCL-ORGAN-DYSFUNCTION
  if_true:
    result: IND-DLBCL-1L-RCHOP
    notes: >
      Frailty or organ dysfunction: standard R-CHOP. Severe renal impairment (CrCl <30):
      dose-modified R-CHOP required — see IND-DLBCL-RENAL-FAILURE-MOD-RCHOP in alternatives.
    alternatives:
      - indication_id: IND-DLBCL-RENAL-FAILURE-MOD-RCHOP
        nccn_category: "2A"
        criteria: >
          DLBCL NOS; CrCl <30 mL/min or CKD stage 4-5 or dialysis; cyclophosphamide
          −25% (CrCl 10-30) or −50%/omit (CrCl <10/dialysis); vincristine −25-50%
          (uremic neuropathy risk); doxorubicin full dose if LVEF ≥50%; rituximab
          full dose; CI-HBV-NO-PROPHYLAXIS cleared; ECOG ≤3.
        note: >
          Dose-modified R-CHOP for DLBCL + severe renal impairment (NCCN Cat 2A;
          Ostgard 2014 retrospective CKD subgroup; ORR ~80% extrapolated): cyclophosphamide
          dose-reduced per GFR; vincristine reduced (uremic neuropathy amplified);
          doxorubicin at full dose if LVEF ≥50%; rituximab full dose (minimal renal
          clearance). Nephrology MDT consultation mandatory before first cycle.
  if_false:
    next_step: 2
- step: 2
  evaluate:
    any_of:
    - red_flag: RF-IPI-HIGH
    - red_flag: RF-AAIPI-HIGH
    - red_flag: RF-DLBCL-HIGH-IPI
    - red_flag: RF-DLBCL-HIGH-RISK-BIOLOGY
  if_true:
    result: IND-DLBCL-1L-POLA-R-CHP
  if_false:
    next_step: 3
- step: 3
  evaluate:
    all_of:
    - any_of:
      - red_flag: RF-IPI-LOW
      - red_flag: RF-IPI-INTERMEDIATE
    - any_of:
      - red_flag: RF-FITNESS-ECOG-FIT
      - red_flag: RF-FITNESS-ECOG-INTERMEDIATE
  if_true:
    result: IND-DLBCL-1L-RCHOP
    notes: >
      IPI-low/intermediate fit DLBCL: R-CHOP standard. If Stage I-II non-bulky
      (tumor ≤7.5 cm) — abbreviated 4 cycles R-CHOP + 30 Gy ISRT is a Cat 1
      alternative (LYSA LNH 02-03 / SWOG S1001 approach; lower anthracycline
      cumulative dose). See alternatives block.
    alternatives:
      - indication_id: IND-DLBCL-1L-RCHOP-ISRT-EARLY
        nccn_category: "1"
        criteria: >
          Stage I-II non-bulky DLBCL (largest mass ≤7.5 cm); CD20+ confirmed;
          ECOG 0-2; IPI-low or IPI-intermediate (RF-IPI-LOW or RF-IPI-INTERMEDIATE);
          RF-DLBCL-HIGH-IPI absent (high-IPI routes to full 6-cycle R-CHOP or
          Pola-R-CHP at step 2); HBV screened + entecavir prophylaxis in place if
          HBsAg+ or anti-HBc+; RT accessible (regional radiation oncology center);
          disease location amenable to ISRT without critical structure overlap.
        note: >
          4 cycles R-CHOP + 30 Gy ISRT for early-stage non-bulky DLBCL (LYSA
          LNH 02-03; SWOG S1001; NCCN Cat 1): 5-year PFS ~85-90%; 5-year OS
          ~89-91%. Abbreviated anthracycline exposure with ISRT consolidation
          yields equivalent cure rates to 6-cycle R-CHOP. Interim PET-CT after
          3-4 cycles required (Deauville 1-3 confirms response-adaptive eligibility;
          Deauville 4-5 triggers escalation). Alternative: 6 cycles R-CHOP alone
          (FLYER; RT-sparing) if RT logistics unfavorable or field overlaps heart/breast.
          Ukraine: RT accessible in regional centers; modern ISRT (30 Gy) preferred
          over historical extended-field techniques.
  if_false:
    result: IND-DLBCL-1L-RCHOP
  notes: "Wired via RF-IPI-LOW / RF-IPI-INTERMEDIATE (CSD-8A) for IPI risk strata; fitness gate via CSD-7A pan-disease RFs."
sources:
- SRC-NCCN-BCELL-2025
- SRC-ESMO-DLBCL-2024
last_reviewed: '2026-05-04'
notes: "IPI + biology are the primary regimen determinants; frailty / organ dysfunction de-escalate ahead of intensification\
  \ (step 1 wins over step 2 if both fire). Engine still surfaces all fired RFs in trace — the conflict is visible to the\
  \ MDT.\nRF-DLBCL-CNS-RISK and RF-DLBCL-INFECTION-SCREENING are intentionally NOT in the decision_tree because they don't\
  \ switch indication: CNS-RISK adds CNS prophylaxis (handled in plan render); INFECTION-SCREENING adds HBV/HIV prophylaxis\
  \ (parallel SUP-* triggers). Cell-of-origin (Hans GCB vs ABC) recorded as biomarker; non-GCB + high-IPI is captured by RF-DLBCL-HIGH-RISK-BIOLOGY.\n\
  Etiology rails (parallel to indication selection — none shifts R-CHOP vs Pola-R-CHP):\n- HBV (HBsAg+ OR anti-HBc+) — RF-UNIVERSAL-HBV-REACTIVATION-RISK\
  \ +\n  RF-DLBCL-INFECTION-SCREENING fire; entecavir 0.5 mg PO daily started\n  before first rituximab dose, continued through\
  \ induction +12 months\n  post-last-anti-CD20. CI-HBV-NO-PROPHYLAXIS is a hard contraindication\n  on both R-CHOP and Pola-R-CHP\
  \ indications, blocking plan finalization\n  until SUP-HBV-PROPHYLAXIS is acknowledged.\n\n- HCV (HCV-RNA detectable) —\
  \ Unlike indolent HCV-MZL, aggressive DLBCL\n  is NOT routed to DAA-first. R-CHOP / Pola-R-CHP proceeds without\n  delay;\
  \ DAA (sofosbuvir/velpatasvir) is initiated concurrently or\n  after induction depending on liver function (ESMO DLBCL 2024\
  \ §HCV;\n  NCCN B-Cell 2.2025). Exception: very-low-tumor-burden HCV+ DLBCL\n  in CP-A liver is an unsettled area — refer\
  \ to MDT + hepatologist.\n  Avoid sofosbuvir + amiodarone (severe bradycardia).\n\n- HIV (positive serology) — Continue\
  \ ART throughout R-CHOP / DA-EPOCH-R\n  (DA-EPOCH-R preferred for HIV-DLBCL per AMC 034 / Sparano 2010 with\n  superior\
  \ outcomes vs R-CHOP in HIV+ subset). Avoid TMP-SMX overlap\n  with high-dose methotrexate (CNS-prophylaxis cycles); coordinate\n\
  \  PJP prophylaxis schedule. Monitor CD4 + HIV-VL pre-cycle. Drug-drug\n  interactions: avoid ritonavir-boosted PIs with\
  \ vincristine\n  (potentiated neurotoxicity); switch to integrase-inhibitor ART\n  backbone if feasible. No empirical R-CHOP\
  \ dose-reduction required\n  for HIV per se (CD4-driven only).\n\nAll three rails operate via parallel SUP-* / RF-* surfaces,\
  \ not by branching the indication tree. DA-EPOCH-R-for-HIV-DLBCL is currently represented at the rationale layer; future\
  \ round may add IND-DLBCL- 1L-DAEPOCHR-HIV as a separate plan-track entity once HIV co-infection is wired as a first-class\
  \ biomarker (BIO-HIV-STATUS missing — flagged).\n"
