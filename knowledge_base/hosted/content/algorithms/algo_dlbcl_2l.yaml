id: ALGO-DLBCL-2L
applicable_to_disease: DIS-DLBCL-NOS
applicable_to_line_of_therapy: 2
purpose: 'Select 2L+/relapsed-refractory DLBCL Indication. Three tracks: (1) transplant-eligible salvage chemo → BEAM-autoSCT (no dedicated indication yet — surfaced as free-text recommendation in trace, see notes); (2) ≥3 lines failed AND CAR-T-eligible → axi-cel CAR-T (curative-intent aggressive track); (3) transplant-ineligible / older / frail → Pola-R- bendamustine (standard-track 2L for the realistic UA majority).

  '
output_indications:
- IND-DLBCL-2L-RDHAP-AUTOSCT
- IND-DLBCL-2L-POLA-R-BENDAMUSTINE
- IND-DLBCL-3L-AXICEL-CART
- IND-DLBCL-3L-LONCASTUXIMAB
default_indication: IND-DLBCL-2L-POLA-R-BENDAMUSTINE
alternative_indication: IND-DLBCL-3L-AXICEL-CART
decision_tree:
- step: 1
  evaluate:
    all_of:
    - red_flag: RF-ASCT-ELIGIBLE-COMPOSITE
    - condition: First relapse, chemosensitive disease (≥PR to salvage)
  if_true:
    result: IND-DLBCL-2L-RDHAP-AUTOSCT
    notes: >
      Transplant-eligible + chemosensitive relapse: R-ICE or R-DHAP × 2-3 cycles
      (CORAL: ORR ~63% each; NS difference) → BEAM-autoSCT for responders (≥PR).
      NCCN Cat 1. Note: axi-cel CAR-T (ZUMA-7) superior over R-ICE→autoSCT for
      early-relapse (≤12m from 1L) in CAR-T eligible — MDT decision.
      Late relapse (>12m): R-ICE→autoSCT remains standard.
  if_false:
    next_step: 2
  notes: "Partially wired - RF-ASCT-ELIGIBLE-COMPOSITE gates the transplant-eligible composite (ECOG ≤2 + LVEF ≥50% + CrCl ≥30 + bilirubin ≤2× ULN + no active infection + age <70) for autoSCT consolidation route (vs transplant-ineligible CAR-T pivot at step 2); chemosensitivity-to-salvage criterion remains MDT-text (response-to-prior-line not RF-modelled)."
- step: 2
  evaluate:
    all_of:
    - condition: ≥2 prior systemic lines failed
    - red_flag: RF-FITNESS-ECOG-FIT
    - condition: Age 18-75
    - red_flag: RF-CAR-T-ELIGIBLE
    - condition: CD19+ disease confirmed
  if_true:
    result: IND-DLBCL-3L-AXICEL-CART
  if_false:
    next_step: 21
  notes: Partially wired - fitness/eligibility gates wired via CSD-7A pan-disease RFs; remaining condition(s) kept as MDT-evaluated text (no RF available for that criterion).
- step: 21
  evaluate:
    any_of:
    - red_flag: RF-DLBCL-CART-INELIGIBLE-POST-2L
  if_true:
    result: IND-DLBCL-3L-LONCASTUXIMAB
  if_false:
    next_step: 3
  notes: "Wired 2026-05-01 (W5d carry-forward). Loncastuximab tesirine (LOTIS-2 Caimi 2021; ORR 48%, mPFS 4.9 mo, mOS 9.5 mo) — off-the-shelf outpatient CD19-targeted ADC for post-2L DLBCL when CAR-T not feasible (frailty, comorbidity, no funded UA international referral pathway, manufacturing-window risk, prior CAR-T failure). RF-DLBCL-CART-INELIGIBLE-POST-2L composite fires on prior_lines_count ≥2 + (cart_ineligibility_reason set OR ECOG ≥2 + age ≥70 OR universal CAR-T-ineligible). Closes drift-signal #5 from W5b heme chunk that deferred this fix to avoid breaking patient_dlbcl_primary_refractory_loncast_post_pola fixture golden; golden updated alongside this wiring. IND-DLBCL-3L-LONCASTUXIMAB has applicable_to.line_of_therapy=3 — cross-line surfacing (algo line=2 emits a 3L-tagged IND) is intentional: engine routes patients with line=2+post-2L-progression into this branch since DLBCL doesn't have a separate 3L algo."
- step: 3
  evaluate:
    any_of:
    - condition: Transplant-ineligible (age >70 OR comorbidity OR ECOG ≥2)
    - condition: CAR-T not accessible
    - red_flag: RF-DLBCL-FRAILTY-AGE
  if_true:
    result: IND-DLBCL-2L-POLA-R-BENDAMUSTINE
  if_false:
    result: IND-DLBCL-2L-POLA-R-BENDAMUSTINE
sources:
- SRC-NCCN-BCELL-2025
- SRC-ESMO-DLBCL-2024
last_reviewed: '2026-04-26'
notes: 'AUTHORED 2026-05-04: IND-DLBCL-2L-RDHAP-AUTOSCT (CORAL NCCN Cat 1; R-ICE/R-DHAP ORR ~63% → BEAM-autoSCT) wired at step 1 for transplant-eligible chemosensitive relapse.
  OOS / wiring gaps: (2) Liso-cel / TRANSFORM (early-relapse 2L CAR-T) not modeled — only axi-cel for ≥3L modeled. (3) Bispecifics (epcoritamab, glofitamab) for ≥3L not modeled. (4) RF-DLBCL-FRAILTY-AGE / RF-DLBCL-ORGAN-DYSFUNCTION should also fire here — wired only via free-text condition until 2L-specific RFs land.

  '
reviewer_signoffs_v2:
