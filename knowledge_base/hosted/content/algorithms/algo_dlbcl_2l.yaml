id: ALGO-DLBCL-2L
applicable_to_disease: DIS-DLBCL-NOS
applicable_to_line_of_therapy: 2
purpose: 'Select 2L+/relapsed-refractory DLBCL Indication. Six tracks: (1) early-relapse/primary refractory + CAR-T eligible → liso-cel (TRANSFORM; EFS HR 0.35; NCCN Cat 1) OR axi-cel (ZUMA-7; EFS HR 0.24; NCCN Cat 1); (2) late relapse/ASCT-eligible → R-ICE/R-DHAP → BEAM-autoSCT; (3) ≥3 lines + FIT + CAR-T eligible → axi-cel 3L (ZUMA-1); (4) ≥3 lines + CAR-T-INELIGIBLE-post-2L → loncastuximab (LOTIS-2; ORR 48%); (5) ≥3 lines + ECOG 0-2 + CD20+ bispecific-eligible → epcoritamab (EPCORE-NHL-1; ORR 63%; NCCN Cat 2A) OR glofitamab; (6) transplant-ineligible/frail → Pola-R-benda.

  '
output_indications:
- IND-DLBCL-2L-RDHAP-AUTOSCT
- IND-DLBCL-2L-POLA-R-BENDAMUSTINE
- IND-DLBCL-2L-LISOCEL
- IND-DLBCL-2L-AXICEL-CART
- IND-DLBCL-3L-AXICEL-CART
- IND-DLBCL-3L-LISO-CEL-CART
- IND-DLBCL-3L-LONCASTUXIMAB
- IND-DLBCL-3L-EPCORITAMAB
- IND-DLBCL-3L-GLOFITAMAB
- IND-DLBCL-2L-TAFA-LEN
default_indication: IND-DLBCL-2L-POLA-R-BENDAMUSTINE
alternative_indication: IND-DLBCL-2L-LISOCEL
decision_tree:
- step: 1
  evaluate:
    all_of:
    - red_flag: RF-ASCT-ELIGIBLE-COMPOSITE
    - condition: First relapse, chemosensitive disease (≥PR to salvage)
  if_true:
    next_step: 11
    notes: "Transplant-eligible + chemosensitive: route to step 11 to assess early-relapse CAR-T eligibility before autoSCT path."
  if_false:
    next_step: 2
  notes: "Partially wired - RF-ASCT-ELIGIBLE-COMPOSITE gates the transplant-eligible composite (ECOG ≤2 + LVEF ≥50% + CrCl ≥30 + bilirubin ≤2× ULN + no active infection + age <70) for autoSCT consolidation route (vs transplant-ineligible CAR-T pivot at step 2); chemosensitivity-to-salvage criterion remains MDT-text (response-to-prior-line not RF-modelled)."
- step: 11
  evaluate:
    all_of:
    - condition: "Early relapse or primary refractory (relapse ≤12 months from 1L completion OR no CR to 1L R-CHOP/Pola-R-CHP)"
    - red_flag: RF-CAR-T-ELIGIBLE
    - condition: "CD19+ confirmed"
  if_true:
    next_step: 12
  if_false:
    result: IND-DLBCL-2L-RDHAP-AUTOSCT
    notes: >
      Late relapse (>12m from 1L) OR CAR-T ineligible: R-ICE or R-DHAP × 2-3 cycles
      (CORAL: ORR ~63% each; NS difference) → BEAM-autoSCT for responders (≥PR).
      NCCN Cat 1. For late-relapse DLBCL, autoSCT consolidation remains standard.
  notes: "Partially wired - RF-CAR-T-ELIGIBLE gates manufacturing eligibility; early-relapse timing remains MDT-text. if_true updated 2026-05-04 (Workstream CP): routes to step 12 (liso-cel vs axi-cel access gate) instead of direct liso-cel result."

  # Step 12 — liso-cel vs axi-cel product selection gate.
  # Both are NCCN Cat 1 for 2L early-relapse/primary-refractory DLBCL.
  # TRANSFORM (Kamdar 2022 Lancet): liso-cel EFS HR 0.35; ICANS G≥3 ~4%.
  # ZUMA-7 (Locke 2022 NEJM): axi-cel EFS HR 0.24; ICANS G≥3 ~21%.
  # Liso-cel preferred when accessible (lower ICANS toxicity profile).
  # Axi-cel when liso-cel inaccessible at CAR-T referral centre.
  # Both require international referral from Ukraine (no domestic centres).
- step: 12
  evaluate:
    all_of:
    - condition: "Lisocabtagene maraleucel (liso-cel; Breyanzi) accessible at CAR-T referral centre (certified centre + manufacturing slot + funding pathway)"
  if_true:
    result: IND-DLBCL-2L-LISOCEL
    notes: >
      Liso-cel accessible: lisocabtagene maraleucel (TRANSFORM; Kamdar 2022 Lancet;
      EFS HR 0.35; ORR 86% vs 48%; NCCN Cat 1; lower ICANS G≥3 profile ~4% vs 21%).
      Preferred over axi-cel when available due to improved ICANS tolerability.
      Bridging chemotherapy permitted during ~3-4 week manufacturing window.
      Ukraine: international referral required (no domestic certified centres).
  if_false:
    result: IND-DLBCL-2L-AXICEL-CART
    notes: >
      Liso-cel inaccessible at referral centre (formulary, manufacturing, funding):
      axicabtagene ciloleucel (ZUMA-7; Locke 2022 NEJM; EFS HR 0.24; ORR 83%; NCCN Cat 1).
      Equivalent Cat 1 efficacy outcome. ICANS G≥3 ~21% (higher than liso-cel ~4%)
      — intensive monitoring required. Ukraine: international referral required.
  notes: "Step 12 added 2026-05-04 (Workstream CP): liso-cel vs axi-cel access gate for early-relapse/primary-refractory DLBCL 2L. Both NCCN Cat 1; liso-cel preferred (lower ICANS); axi-cel when liso-cel unavailable. Gap (3) CLOSED."
- step: 2
  evaluate:
    all_of:
    - condition: ≥2 prior systemic lines failed
    - red_flag: RF-FITNESS-ECOG-FIT
    - condition: Age 18-75
    - red_flag: RF-CAR-T-ELIGIBLE
    - condition: CD19+ disease confirmed
  if_true:
    result: IND-DLBCL-3L-AXICEL-CART
    notes: >
      ≥3L DLBCL + CAR-T eligible: axi-cel (ZUMA-1; Neelapu 2017 NEJM;
      ORR ~83%; CR ~58%; NCCN Cat 1). Liso-cel is equivalent Cat 1
      alternative with better safety profile — see alternatives below.
      Prefer liso-cel when centre offers both products.
    alternatives:
      - indication_id: IND-DLBCL-3L-LISO-CEL-CART
        nccn_category: "1"
        criteria: >
          R/R DLBCL after ≥2 prior lines; CD19+ confirmed; ECOG 0-2;
          adequate organ function for Flu/Cy lymphodepletion; no prior
          CD19-directed CAR-T; manufacturing slot + funding pathway
          confirmed; liso-cel accessible at certified CAR-T centre.
          Preferred when centre offers both products (lower ICANS).
        note: >
          Liso-cel 3L (TRANSCEND NHL-001; Abramson 2020 Lancet; NCCN Cat 1):
          ORR 73%; CR 53%; mOS 27.3 months. CRS Grade ≥3 ~2% (vs axi-cel
          ~13%); ICANS Grade ≥3 ~10% (vs axi-cel ~28%) — markedly safer
          profile. Preferred in older / frail / cardiac-comorbid patients.
          Single infusion (no step-up dosing). Manufacturing ~3 weeks —
          bridge therapy during window mandatory for active disease. Ukraine:
          not registered; international referral required.
  if_false:
    next_step: 21
  notes: "Partially wired - fitness/eligibility gates wired via CSD-7A pan-disease RFs; remaining condition(s) kept as MDT-evaluated text (no RF available for that criterion). UPDATED 2026-05-04 (Workstream FI): IND-DLBCL-3L-LISO-CEL-CART added as Cat 1 alternative at step 2 if_true (axi-cel default; liso-cel preferred when accessible for lower ICANS profile)."
- step: 21
  evaluate:
    any_of:
    - red_flag: RF-DLBCL-CART-INELIGIBLE-POST-2L
  if_true:
    result: IND-DLBCL-3L-LONCASTUXIMAB
  if_false:
    next_step: 22
  notes: "Wired 2026-05-01 (W5d carry-forward). Loncastuximab tesirine (LOTIS-2 Caimi 2021; ORR 48%, mPFS 4.9 mo, mOS 9.5 mo) — off-the-shelf outpatient CD19-targeted ADC for post-2L DLBCL when CAR-T not feasible (frailty, comorbidity, no funded UA international referral pathway, manufacturing-window risk, prior CAR-T failure). RF-DLBCL-CART-INELIGIBLE-POST-2L composite fires on prior_lines_count ≥2 + (cart_ineligibility_reason set OR ECOG ≥2 + age ≥70 OR universal CAR-T-ineligible). UPDATED 2026-05-04 (Workstream BJ): step 21 if_false now routes to step 22 (bispecific gate) before step 3 fallback."
- step: 22
  evaluate:
    all_of:
    - condition: "≥2 prior systemic lines (≥3L context)"
    - condition: "CD20+ confirmed on most recent biopsy (epcoritamab/glofitamab require CD20 target)"
    - condition: "ECOG PS 0-2 (bispecific infusion burden; CRS/ICANS monitoring required)"
    - condition: "No active uncontrolled autoimmune disease requiring systemic immunosuppression (anti-CD20×CD3 bispecific → T-cell activation → irAE risk)"
    - condition: "No active Grade ≥3 infection (CRS risk additive with active infection)"
  if_true:
    result: IND-DLBCL-3L-EPCORITAMAB
    notes: >
      ≥3L DLBCL + bispecific eligible: epcoritamab 48 mg SC step-up (EPCORE-NHL-1;
      REGIMEN-EPCORITAMAB-MONO-DLBCL-3L; de Vos 2023 Lancet; ORR 63.1%; CR 38.9%;
      mDOR 12 months; NCCN Cat 2A). Step-up dosing mandatory (0.16/0.8/48 mg)
      for CRS mitigation. Hospitalisation for cycles 1-2 required (CRS monitoring).
      Glofitamab (NP30179; ORR 52%; CR 39%; fixed 12 cycles; REGIMEN-GLOFITAMAB-MONO-DLBCL-3L)
      is the equivalent alternative — pre-treatment obinutuzumab 1000 mg IV d-7 mandatory.
      Both NCCN Cat 2A; meta-analysis suggests comparable ORR/CR.
      Ukraine: neither registered; international clinical trial or named-patient only.
  if_false:
    next_step: 3
  notes: "Step 22 added 2026-05-04 (Workstream BJ): bispecific gate (epcoritamab/glofitamab) for ≥3L DLBCL post-CAR-T-ineligibility check. Gap (1) CLOSED. Free-text conditions; MDT-evaluated access constraints."
- step: 3
  evaluate:
    any_of:
    - condition: Transplant-ineligible (age >70 OR comorbidity OR ECOG ≥2)
    - condition: CAR-T not accessible
    - red_flag: RF-DLBCL-FRAILTY-AGE
  if_true:
    result: IND-DLBCL-2L-POLA-R-BENDAMUSTINE
    notes: >
      Transplant-ineligible R/R DLBCL: Pola-BR (NCCN Cat 1; GO29365 ORR ~63%;
      mPFS ~9.5 months). Preferred standard-track option.
      Alternative (Cat 2A): tafasitamab + lenalidomide (IND-DLBCL-2L-TAFA-LEN;
      L-MIND; ORR 57.5%; CR 40%; mDOR 43.9 months; mOS 33.5 months; FDA Jul
      2020) — preferred when bendamustine contraindicated (CrCl <30 mL/min,
      prior benda exposure) or inaccessible; requires lenalidomide REMS and
      VTE prophylaxis; not registered in Ukraine.
    alternatives:
      - indication_id: IND-DLBCL-2L-TAFA-LEN
        nccn_category: "2A"
        criteria: >
          Bendamustine contraindicated (CrCl <30 mL/min) or prior bendamustine
          exposure or inaccessible; CD19+ confirmed; not pregnant; lenalidomide
          REMS enrollment feasible; not eligible for autoSCT.
        note: >
          L-MIND: ORR 57.5%; CR 40%; mDOR 43.9 months; mOS 33.5 months;
          FDA accelerated Jul 31, 2020. No head-to-head vs Pola-BR. NCCN Cat 2A
          (lower evidence — single-arm trial). After 12 lenalidomide cycles:
          tafasitamab monotherapy maintenance continues until progression.
  if_false:
    result: IND-DLBCL-2L-POLA-R-BENDAMUSTINE
sources:
- SRC-NCCN-BCELL-2025
- SRC-ESMO-DLBCL-2024
- SRC-TRANSFORM-KAMDAR-2022
- SRC-LMIND-SALLES-2020
last_reviewed: '2026-05-04'
notes: 'AUTHORED 2026-05-04: IND-DLBCL-2L-RDHAP-AUTOSCT (CORAL NCCN Cat 1; R-ICE/R-DHAP ORR ~63% → BEAM-autoSCT) wired at step 1 for transplant-eligible chemosensitive relapse.
  UPDATED 2026-05-04: IND-DLBCL-2L-LISOCEL wired at step 11 (early-relapse ≤12m + CAR-T eligible → liso-cel preferred over autoSCT; TRANSFORM NCCN Cat 1; EFS HR 0.35). Step 1 if_true now routes to step 11 before autoSCT decision.
  AUTHORED 2026-05-04 (Workstream AP): IND-DLBCL-2L-AXICEL-CART created (ZUMA-7; EFS HR 0.24; NCCN Cat 1); added to output_indications; step 11 notes updated. Liso-cel remains primary at step 11 (lower ICANS); axi-cel is documented equivalent alternative.
  UPDATED 2026-05-04 (Workstream BJ): IND-DLBCL-3L-EPCORITAMAB + IND-DLBCL-3L-GLOFITAMAB wired at step 22 (epcoritamab EPCORE-NHL-1 ORR 63%; glofitamab NP30179 ORR 52%; both NCCN Cat 2A). Gap (1) CLOSED. Step 21 if_false → step 22 → step 3 fallback. Both pre-existing indication entities now surfaced by engine.
  UPDATED 2026-05-04 (Workstream CP): Step 12 added as liso-cel vs axi-cel access gate (early-relapse/primary-refractory DLBCL 2L). Step 11 if_true now routes to step 12; liso-cel preferred (TRANSFORM; ICANS G≥3 ~4%); axi-cel when liso-cel unavailable (ZUMA-7; ICANS G≥3 ~21%); both NCCN Cat 1. Gap (3) CLOSED.
  UPDATED 2026-05-04 (Workstream EY): IND-DLBCL-2L-TAFA-LEN added to output_indications; wired as Cat 2A alternative at step 3 (transplant-ineligible track) when bendamustine contraindicated/inaccessible. L-MIND: ORR 57.5%; CR 40%; mDOR 43.9 months; FDA Jul 2020. DRUG-TAFASITAMAB + REG-TAFASITAMAB-LEN-DLBCL + SRC-LMIND-SALLES-2020 created.
  UPDATED 2026-05-04 (Workstream FI): IND-DLBCL-3L-LISO-CEL-CART added to output_indications; wired as Cat 1 alternative at step 2 if_true (axi-cel default; liso-cel preferred when both accessible — lower ICANS G≥3 ~10% vs axi-cel ~28%; TRANSCEND NHL-001 ORR 73%; CR 53%; NCCN Cat 1). Gap CLOSED.
  OOS / wiring gaps: (2) RF-DLBCL-FRAILTY-AGE / RF-DLBCL-ORGAN-DYSFUNCTION should also fire here — wired only via free-text condition until 2L-specific RFs land.

  '
