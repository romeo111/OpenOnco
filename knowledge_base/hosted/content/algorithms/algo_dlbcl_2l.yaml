id: ALGO-DLBCL-2L
applicable_to_disease: DIS-DLBCL-NOS
applicable_to_line_of_therapy: 2
purpose: 'Select 2L+/relapsed-refractory DLBCL Indication. Four CAR-T and chemo tracks: (1) early-relapse/primary refractory + CAR-T eligible → liso-cel (TRANSFORM; EFS HR 0.35; NCCN Cat 1) OR axi-cel (ZUMA-7; EFS HR 0.24; NCCN Cat 1) — both entities now modeled; (2) late relapse/ASCT-eligible → R-ICE/R-DHAP → BEAM-autoSCT; (3) ≥3 lines + CAR-T eligible → axi-cel 3L (ZUMA-1); (4) transplant-ineligible/frail → Pola-R-benda.

  '
output_indications:
- IND-DLBCL-2L-RDHAP-AUTOSCT
- IND-DLBCL-2L-POLA-R-BENDAMUSTINE
- IND-DLBCL-2L-LISOCEL
- IND-DLBCL-2L-AXICEL-CART
- IND-DLBCL-3L-AXICEL-CART
- IND-DLBCL-3L-LONCASTUXIMAB
default_indication: IND-DLBCL-2L-POLA-R-BENDAMUSTINE
alternative_indication: IND-DLBCL-2L-LISOCEL
decision_tree:
- step: 1
  evaluate:
    all_of:
    - red_flag: RF-ASCT-ELIGIBLE-COMPOSITE
    - condition: First relapse, chemosensitive disease (≥PR to salvage)
  if_true:
    next_step: 11
    notes: "Transplant-eligible + chemosensitive: route to step 11 to assess early-relapse CAR-T eligibility before autoSCT path."
  if_false:
    next_step: 2
  notes: "Partially wired - RF-ASCT-ELIGIBLE-COMPOSITE gates the transplant-eligible composite (ECOG ≤2 + LVEF ≥50% + CrCl ≥30 + bilirubin ≤2× ULN + no active infection + age <70) for autoSCT consolidation route (vs transplant-ineligible CAR-T pivot at step 2); chemosensitivity-to-salvage criterion remains MDT-text (response-to-prior-line not RF-modelled)."
- step: 11
  evaluate:
    all_of:
    - condition: "Early relapse or primary refractory (relapse ≤12 months from 1L completion OR no CR to 1L R-CHOP/Pola-R-CHP)"
    - red_flag: RF-CAR-T-ELIGIBLE
    - condition: "CD19+ confirmed"
  if_true:
    result: IND-DLBCL-2L-LISOCEL
    notes: >
      Primary-refractory or early-relapse (≤12m) + CAR-T eligible:
      liso-cel (TRANSFORM; Kamdar 2022, Lancet; EFS HR 0.35; ORR 86% vs 48%;
      NCCN Cat 1) preferred over salvage chemo → autoSCT.
      Axi-cel (ZUMA-7; EFS HR 0.24; NCCN Cat 1) is an equivalent Cat 1 alternative
      — now separately modeled as IND-DLBCL-2L-AXICEL-CART (Workstream AP). Product
      selection: liso-cel preferred for lower ICANS G≥3 profile (~4% vs 21%); axi-cel
      when liso-cel unavailable or physician preference. Both NCCN Cat 1.
      Bridging chemotherapy permitted during ~3-4 week manufacturing window.
      Ukraine: international CAR-T referral required (no domestic centres).
      CAR-T inaccessible → fall back to IND-DLBCL-2L-RDHAP-AUTOSCT.
  if_false:
    result: IND-DLBCL-2L-RDHAP-AUTOSCT
    notes: >
      Late relapse (>12m from 1L) OR CAR-T ineligible: R-ICE or R-DHAP × 2-3 cycles
      (CORAL: ORR ~63% each; NS difference) → BEAM-autoSCT for responders (≥PR).
      NCCN Cat 1. For late-relapse DLBCL, autoSCT consolidation remains standard.
  notes: "Partially wired - RF-CAR-T-ELIGIBLE gates manufacturing eligibility (organ function, no active CNS disease, no active infection, ECOG 0-1); early-relapse timing criterion remains MDT-text (time-from-1L not RF-modelled)."
- step: 2
  evaluate:
    all_of:
    - condition: ≥2 prior systemic lines failed
    - red_flag: RF-FITNESS-ECOG-FIT
    - condition: Age 18-75
    - red_flag: RF-CAR-T-ELIGIBLE
    - condition: CD19+ disease confirmed
  if_true:
    result: IND-DLBCL-3L-AXICEL-CART
  if_false:
    next_step: 21
  notes: Partially wired - fitness/eligibility gates wired via CSD-7A pan-disease RFs; remaining condition(s) kept as MDT-evaluated text (no RF available for that criterion).
- step: 21
  evaluate:
    any_of:
    - red_flag: RF-DLBCL-CART-INELIGIBLE-POST-2L
  if_true:
    result: IND-DLBCL-3L-LONCASTUXIMAB
  if_false:
    next_step: 3
  notes: "Wired 2026-05-01 (W5d carry-forward). Loncastuximab tesirine (LOTIS-2 Caimi 2021; ORR 48%, mPFS 4.9 mo, mOS 9.5 mo) — off-the-shelf outpatient CD19-targeted ADC for post-2L DLBCL when CAR-T not feasible (frailty, comorbidity, no funded UA international referral pathway, manufacturing-window risk, prior CAR-T failure). RF-DLBCL-CART-INELIGIBLE-POST-2L composite fires on prior_lines_count ≥2 + (cart_ineligibility_reason set OR ECOG ≥2 + age ≥70 OR universal CAR-T-ineligible). Closes drift-signal #5 from W5b heme chunk that deferred this fix to avoid breaking patient_dlbcl_primary_refractory_loncast_post_pola fixture golden; golden updated alongside this wiring. IND-DLBCL-3L-LONCASTUXIMAB has applicable_to.line_of_therapy=3 — cross-line surfacing (algo line=2 emits a 3L-tagged IND) is intentional: engine routes patients with line=2+post-2L-progression into this branch since DLBCL doesn't have a separate 3L algo."
- step: 3
  evaluate:
    any_of:
    - condition: Transplant-ineligible (age >70 OR comorbidity OR ECOG ≥2)
    - condition: CAR-T not accessible
    - red_flag: RF-DLBCL-FRAILTY-AGE
  if_true:
    result: IND-DLBCL-2L-POLA-R-BENDAMUSTINE
  if_false:
    result: IND-DLBCL-2L-POLA-R-BENDAMUSTINE
sources:
- SRC-NCCN-BCELL-2025
- SRC-ESMO-DLBCL-2024
- SRC-TRANSFORM-KAMDAR-2022
last_reviewed: '2026-05-04'
notes: 'AUTHORED 2026-05-04: IND-DLBCL-2L-RDHAP-AUTOSCT (CORAL NCCN Cat 1; R-ICE/R-DHAP ORR ~63% → BEAM-autoSCT) wired at step 1 for transplant-eligible chemosensitive relapse.
  UPDATED 2026-05-04: IND-DLBCL-2L-LISOCEL wired at step 11 (early-relapse ≤12m + CAR-T eligible → liso-cel preferred over autoSCT; TRANSFORM NCCN Cat 1; EFS HR 0.35). Step 1 if_true now routes to step 11 before autoSCT decision.
  AUTHORED 2026-05-04 (Workstream AP): IND-DLBCL-2L-AXICEL-CART created (ZUMA-7; EFS HR 0.24; NCCN Cat 1); added to output_indications; step 11 notes updated. Liso-cel remains primary at step 11 (lower ICANS); axi-cel is documented equivalent alternative. OOS / wiring gaps: (1) Bispecifics (epcoritamab, glofitamab) for ≥3L not modeled. (2) RF-DLBCL-FRAILTY-AGE / RF-DLBCL-ORGAN-DYSFUNCTION should also fire here — wired only via free-text condition until 2L-specific RFs land. (3) Dedicated step 12 (liso-cel vs axi-cel sub-decision) not yet added — MDT product choice; both entities now exist for surfacing.

  '
