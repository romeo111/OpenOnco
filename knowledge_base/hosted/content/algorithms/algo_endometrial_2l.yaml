id: ALGO-ENDOMETRIAL-2L
applicable_to_disease: DIS-ENDOMETRIAL
applicable_to_line_of_therapy: 2
purpose: 'Select 2L+ recurrent/metastatic endometrial carcinoma Indication after 1L platinum-based chemotherapy failure. Four tracks: (1) HER2 IHC 3+ → T-DXd (DESTINY-PanTumor02; NCCN Cat 1); (2) dMMR/MSI-H + no prior ICI → dostarlimab (GARNET; NCCN Cat 1); (3) fit for lenva combination → pembro+lenva (KEYNOTE-775); (4) Grade 1-2 endometrioid ER+ not lenva-fit → hormonal therapy (megestrol/AI; NCCN Cat 2A). Note: in modern era (post-RUBY/NRG-GY018 ~2023+), most dMMR patients receive ICI in 1L and so route to pembro+lenva in 2L; the dostarlimab single-agent track is for historical-era patients without prior ICI.

  '
output_indications:
- IND-ENDOMETRIAL-2L-HER2-TDXD
- IND-ENDOMETRIAL-2L-PEMBRO-LENVA-PMMR
- IND-ENDOMETRIAL-2L-DOSTARLIMAB-DMMR
- IND-ENDOMETRIAL-2L-HORMONAL
- IND-ENDOMETRIAL-2L-PACLITAXEL-FRAIL
default_indication: IND-ENDOMETRIAL-2L-PEMBRO-LENVA-PMMR
alternative_indication: IND-ENDOMETRIAL-2L-HER2-TDXD
decision_tree:
- step: 1
  evaluate:
    all_of:
    - condition: "HER2 IHC 3+ confirmed (validated assay — PATHWAY HER2/neu 4B5 or equivalent)"
    - any_of:
      - red_flag: RF-FITNESS-ECOG-FIT
      - red_flag: RF-FITNESS-ECOG-INTERMEDIATE
    - none_of:
      - condition: "Prior T-DXd or HER2-targeted ADC therapy"
      - condition: "Active ILD/pneumonitis Grade ≥2"
  if_true:
    result: IND-ENDOMETRIAL-2L-HER2-TDXD
    notes: >
      HER2 IHC 3+ + ECOG 0-1 + no prior T-DXd: trastuzumab deruxtecan (T-DXd) 5.4 mg/kg q3w.
      DESTINY-PanTumor02 endometrial cohort (n=40): ORR 57.5%; median PFS 10.1 months.
      FDA tumor-agnostic approval August 2023; NCCN Uterine 2025 Category 1.
      ~30% of uterine serous carcinomas are HER2 IHC 3+. HER2 testing mandatory at recurrence.
      CRITICAL ILD risk: CT chest baseline + every 2 cycles × 6 cycles; hold immediately for
      any new respiratory symptoms; corticosteroids for Grade ≥2; permanent d/c for Grade ≥3.
  if_false:
    next_step: 2
  notes: "Wired 2026-05-04: HER2 IHC 3+ gate added as highest-priority routing (DESTINY-PanTumor02; FDA Aug 2023; NCCN Cat 1). Condition-based (no universal RF for endometrial HER2+ yet). ILD and prior T-DXd are exclusion conditions."
- step: 2
  evaluate:
    all_of:
    - any_of:
      - {finding: mmr_status, value: deficient}
      - {finding: msi_status, value: MSI-H}
      - {finding: msi_status, value: MSI-high}
    - none_of:
      - red_flag: RF-PRIOR-IO-PROGRESSION
    - any_of:
      - red_flag: RF-FITNESS-ECOG-FIT
      - red_flag: RF-FITNESS-ECOG-INTERMEDIATE
  if_true:
    result: IND-ENDOMETRIAL-2L-DOSTARLIMAB-DMMR
  if_false:
    next_step: 3
  notes: "Fully wired (W5c-finish 2026-04-30): replaced free-text 'dMMR/MSI-H' with structured finding lookups + replaced 'No prior ICI exposure in 1L' with none_of(RF-PRIOR-IO-PROGRESSION) — universal RF triggers on any documented prior anti-PD-(L)1 PD or recent IO exposure within 6mo."
- step: 3
  evaluate:
    all_of:
    - red_flag: RF-PRIOR-PLATINUM-RESISTANT
    - red_flag: RF-FITNESS-ECOG-FIT
    - red_flag: RF-ENDOMETRIAL-FIT-FOR-LENVATINIB-COMBO
  if_true:
    result: IND-ENDOMETRIAL-2L-PEMBRO-LENVA-PMMR
  if_false:
    next_step: 4
  notes: "Fully wired (W5c-finish 2026-04-30): replaced 3 free-text conditions ('Disease progression after 1L platinum-based chemo', 'lenvatinib toxicity tolerance required', 'Adequate organ function...') with RF-PRIOR-PLATINUM-RESISTANT (universal) + new RF-ENDOMETRIAL-FIT-FOR-LENVATINIB-COMBO (composite organ function from KEYNOTE-775 prerequisites). if_true → PEMBRO-LENVA-PMMR (fit for lenva combination). if_false → step 4 (hormonal therapy gate for patients not fit for lenva combo)."
- step: 4
  evaluate:
    all_of:
    - condition: "Grade 1-2 endometrioid histology (NOT Grade 3, uterine serous, clear cell, carcinosarcoma)"
    - condition: "ER positive (≥10% nuclear staining by IHC; BIO-ER-IHC)"
  if_true:
    result: IND-ENDOMETRIAL-2L-HORMONAL
    notes: >
      Grade 1-2 endometrioid + ER+ + not fit for lenva combination:
      hormonal therapy (megestrol 160 mg PO daily or letrozole 2.5 mg PO daily).
      NCCN Uterine 2025 Category 2A. ORR ~25-30% megestrol (GOG 081); ~9-14% AI (GOG 263).
      ECOG 0-3 eligible (broader than pembro+lenva). Appropriate for elderly/frail patients
      preferring low-toxicity oral therapy, patients with lenvatinib contraindications
      (renal/hepatic dysfunction, uncontrolled hypertension), or indolent low-burden Grade 1 relapse.
  if_false:
    next_step: 41
    notes: >
      High-grade histology (Grade 3/serous/clear cell/carcinosarcoma) or ER-negative:
      hormonal therapy ineffective (<5% ORR). Routes to step 41 (lenvatinib-fitness check)
      before pembro+lenva vs paclitaxel mono decision.
  notes: "Free-text conditions — no engine RF for Grade 1-2 endometrioid or ER+ histotype yet; MDT validation required. Authored 2026-05-04 (Workstream AK). Wires IND-ENDOMETRIAL-2L-HORMONAL for the niche population (ECOG 0-3 ER+ Grade 1-2 not fit for lenva combo). Updated BW 2026-05-04: step 4 if_false → step 41."

# Step 41 — Lenvatinib-fitness gate for high-grade/ER-negative patients reaching this step.
# Patients here: Grade 3 or ER-negative; failed step 3 (not lenva-fit at first evaluation
# or not ECOG-fit). Re-check lenvatinib eligibility at this point.
# ECOG 0-1 + lenva-eligible → pembro+lenva (Cat 1).
# ECOG ≥2 OR lenva-contraindicated → paclitaxel weekly mono (Cat 2A; NSZU-funded UA).
- step: 41
  evaluate:
    all_of:
    - red_flag: RF-ENDOMETRIAL-FIT-FOR-LENVATINIB-COMBO
    - any_of:
      - red_flag: RF-FITNESS-ECOG-FIT
      - red_flag: RF-FITNESS-ECOG-INTERMEDIATE
  if_true:
    result: IND-ENDOMETRIAL-2L-PEMBRO-LENVA-PMMR
    notes: >
      Lenvatinib-eligible + ECOG fit: pembrolizumab 200 mg q3w + lenvatinib 20 mg/day
      (REG-PEMBRO-LENVA-ENDOMETRIAL; KEYNOTE-775; pMMR arm mPFS 6.6 mo, mOS 17.4 mo;
      NCCN Cat 1). Superior to single-agent chemotherapy for lenva-eligible patients.
  if_false:
    result: IND-ENDOMETRIAL-2L-PACLITAXEL-FRAIL
    notes: >
      Lenvatinib-ineligible (ECOG ≥2, CrCl <40, uncontrolled HTN, hepatic dysfunction)
      OR ECOG PS 2-3 with grade 3/serous/clear cell histology: weekly paclitaxel 80 mg/m²
      d1,8,15 q28d (REG-PACLITAXEL-WEEKLY-ENDOMETRIAL; NCCN Uterine 2025 Cat 2A; NSZU-funded UA).
      Goals-of-care MDT discussion recommended for ECOG 3. At progression: BSC or clinical trial.
  notes: "Step 41 added 2026-05-04 (Workstream BW): lenvatinib-fitness re-check for high-grade/ER-neg. Pembro+lenva for lenva-eligible; paclitaxel mono for lenva-ineligible frail. Gap (2) CLOSED."
sources:
- SRC-NCCN-UTERINE-2025
- SRC-ESMO-ENDOMETRIAL-2022
- SRC-DESTINY-PANTUMOR02-MERIC-2024
last_reviewed: '2026-05-04'
notes: >
  AUTHORED 2026-05-04: IND-ENDOMETRIAL-2L-HER2-TDXD wired at step 1 (HER2 IHC 3+ gate;
  DESTINY-PanTumor02 ORR 57.5%; FDA Aug 2023; NCCN Cat 1). IND-ENDOMETRIAL-2L-HORMONAL
  wired at step 4 (Grade 1-2 endometrioid ER+ not fit for lenva combo; NCCN Cat 2A;
  megestrol GOG 081 ORR ~25-30%).
  UPDATED 2026-05-04 (Workstream BW): IND-ENDOMETRIAL-2L-PACLITAXEL-FRAIL authored
  and wired at step 41 for lenvatinib-ineligible high-grade patients (weekly paclitaxel
  80 mg/m²; NCCN Cat 2A; NSZU-funded UA). Gap (2) CLOSED.
  ROUTING SUMMARY: (1) HER2 IHC 3+ → T-DXd; (2) dMMR/MSI-H + ICI-naive → dostarlimab;
  (3) fit + lenva-eligible → pembro+lenva; (4) ER+ Grade 1-2 endometrioid → hormonal;
  (4→41) high-grade/ER-neg + lenva-eligible → pembro+lenva; (4→41) high-grade/ER-neg +
  lenva-ineligible/frail → paclitaxel weekly mono.
  OOS / wiring gaps: (1) HRD+/POLE-mutated 2L scenarios — molecular-class-specific 2L
  (e.g., POLE-mut excellent prognosis with chemo re-challenge) not modeled.
  (3) UA funding gap — pembro+lenva not NSZU-reimbursed for endometrial 2L (2026 onco package);
  dostarlimab funding extends to 2L+ under same package but verify per current NSZU protocol.

  '
