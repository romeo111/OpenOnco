id: ALGO-ENDOMETRIAL-2L
applicable_to_disease: DIS-ENDOMETRIAL
applicable_to_line_of_therapy: 2
purpose: 'Select 2L+ recurrent/metastatic endometrial carcinoma Indication after 1L platinum-based chemotherapy failure. Two tracks: (1) dMMR/MSI-H + no prior ICI → single-agent dostarlimab (GARNET) or pembrolizumab (KEYNOTE-158); (2) pMMR OR dMMR with prior 1L ICI → pembrolizumab + lenvatinib (KEYNOTE-775). Note: in modern era (post-RUBY/NRG-GY018 ~2023+), most dMMR patients receive ICI in 1L and so route to pembro+lenva in 2L; the dostarlimab single-agent track is for historical-era patients without prior ICI.

  '
output_indications:
- IND-ENDOMETRIAL-2L-PEMBRO-LENVA-PMMR
- IND-ENDOMETRIAL-2L-DOSTARLIMAB-DMMR
default_indication: IND-ENDOMETRIAL-2L-PEMBRO-LENVA-PMMR
alternative_indication: IND-ENDOMETRIAL-2L-DOSTARLIMAB-DMMR
decision_tree:
- step: 1
  evaluate:
    all_of:
    - any_of:
      - {finding: mmr_status, value: deficient}
      - {finding: msi_status, value: MSI-H}
      - {finding: msi_status, value: MSI-high}
    - none_of:
      - red_flag: RF-PRIOR-IO-PROGRESSION
    - any_of:
      - red_flag: RF-FITNESS-ECOG-FIT
      - red_flag: RF-FITNESS-ECOG-INTERMEDIATE
  if_true:
    result: IND-ENDOMETRIAL-2L-DOSTARLIMAB-DMMR
  if_false:
    next_step: 2
  notes: "Fully wired (W5c-finish 2026-04-30): replaced free-text 'dMMR/MSI-H' with structured finding lookups + replaced 'No prior ICI exposure in 1L' with none_of(RF-PRIOR-IO-PROGRESSION) — universal RF triggers on any documented prior anti-PD-(L)1 PD or recent IO exposure within 6mo."
- step: 2
  evaluate:
    all_of:
    - red_flag: RF-PRIOR-PLATINUM-RESISTANT
    - red_flag: RF-FITNESS-ECOG-FIT
    - red_flag: RF-ENDOMETRIAL-FIT-FOR-LENVATINIB-COMBO
  if_true:
    result: IND-ENDOMETRIAL-2L-PEMBRO-LENVA-PMMR
  if_false:
    result: IND-ENDOMETRIAL-2L-PEMBRO-LENVA-PMMR
  notes: "Fully wired (W5c-finish 2026-04-30): replaced 3 free-text conditions ('Disease progression after 1L platinum-based chemo', 'lenvatinib toxicity tolerance required', 'Adequate organ function...') with RF-PRIOR-PLATINUM-RESISTANT (universal) + new RF-ENDOMETRIAL-FIT-FOR-LENVATINIB-COMBO (composite organ function from KEYNOTE-775 prerequisites). Both branches still route to PEMBRO-LENVA-PMMR — gates serve MDT brief surfacing rather than indication switching here."
sources:
- SRC-NCCN-UTERINE-2025
- SRC-ESMO-ENDOMETRIAL-2022
last_reviewed: '2026-04-26'
notes: 'OOS / wiring gaps: (1) HER2+ endometrial 2L T-DXd (DESTINY-PanTumor02 + uterine serous carcinoma evidence) — not modeled as separate indication; surfaced as free-text recommendation. (2) HRD+/POLE-mutated 2L scenarios — molecular-class-specific 2L (e.g., POLE-mut excellent prognosis with chemo re-challenge) not modeled. (3) Hormonal therapy (megestrol, AI) for low-grade ER+ endometrial 2L — not modeled; appropriate for indolent low-burden cases. (4) ECOG ≥2 patients ineligible for lenva combination — single-agent doxorubicin or paclitaxel re-challenge is the funded fallback; surfaced as free-text since not separately modeled. (5) UA funding gap — pembro+lenva not NSZU-reimbursed for endometrial 2L (2026 onco package); dostarlimab funding extends to 2L+ under same package but verify per current NSZU protocol.

  '
notes_ua: >
  OOS / прогалини в підключенні: (1) HER2+ рак ендометрію 2L T-DXd
  (DESTINY-PanTumor02 + дані серозної карциноми матки) — не змодельовано
  як окреме показання; виводиться як текстова рекомендація.
  (2) HRD+/POLE-мутований 2L — молекулярно-класифікований 2L
  (наприклад, POLE-мут з відмінним прогнозом при повторному введенні
  хімії) не змодельовано. (3) Гормональна терапія (мегестрол, AI)
  для низькодиференційованого ER+ ендометрію 2L — не змодельовано;
  підходить для індолентних випадків з низьким навантаженням.
  (4) Пацієнти ECOG ≥2, непридатні для комбінації з ленватинібом —
  монотерапія доксорубіцином або повторне введення паклітакселу є
  фінансованим запасним варіантом; виводиться як вільний текст,
  оскільки окремо не змодельовано. (5) Прогалина фінансування в UA —
  пембролізумаб+ленватиніб не відшкодовується НСЗУ для ендометрію 2L
  (пакет онко 2026); фінансування досталімабу поширюється на 2L+ в
  рамках того ж пакету, але необхідно перевірити за актуальним
  протоколом НСЗУ.
ukrainian_review_status: pending_clinical_signoff
