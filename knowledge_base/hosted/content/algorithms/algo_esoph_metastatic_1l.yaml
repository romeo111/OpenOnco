id: ALGO-ESOPH-METASTATIC-1L
applicable_to_disease: DIS-ESOPHAGEAL
applicable_to_line_of_therapy: 1
purpose: >
  Select 1L systemic therapy for metastatic or unresectable locally advanced
  esophageal carcinoma. Routes by histology (ESCC vs adenocarcinoma/EAC),
  PD-L1 CPS, HER2 status, and chemo-sparing preference. Distinct from
  ALGO-ESOPH-RESECTABLE-1L (neoadjuvant CROSS) and
  ALGO-ESOPHAGEAL-ADJUVANT-1L.

output_indications:
  - IND-ESOPH-METASTATIC-1L-NIVO-CHEMO-SCC
  - IND-ESOPH-METASTATIC-1L-SCC-IPI-NIVO
  - IND-ESOPH-METASTATIC-1L-PEMBRO-CHEMO
  - IND-ESOPH-METASTATIC-1L-HER2-TRASTUZUMAB-CHEMO

default_indication: IND-ESOPH-METASTATIC-1L-NIVO-CHEMO-SCC
alternative_indication: IND-ESOPH-METASTATIC-1L-PEMBRO-CHEMO

decision_tree:
  # Step 1 - Staging confirmation. Algorithm applies to metastatic (stage IV)
  # or unresectable locally advanced esophageal carcinoma only.
  - step: 1
    evaluate:
      any_of:
        - condition: "Stage IV (metastatic) OR unresectable locally advanced esophageal carcinoma"
        - condition: "metastatic_or_unresectable"
    if_true:
      next_step: 2
    if_false:
      result: null
      notes: "Resectable disease uses ALGO-ESOPH-RESECTABLE-1L. Locally advanced with curative RT intent uses definitive CRT."

  # Step 2 - Histology. ESCC and EAC have different evidence bases.
  # GEJ adenocarcinoma Siewert I is managed as esophageal. Siewert II/III is
  # managed as gastric (ALGO-GASTRIC-METASTATIC-1L).
  - step: 2
    evaluate:
      any_of:
        - condition: "Squamous-cell carcinoma (ESCC) histology"
        - condition: "histology_escc"
    if_true:
      next_step: 3
    if_false:
      next_step: 4
    notes: "Adenocarcinoma of esophagus (EAC) and GEJ Siewert I go to step 4. Pure squamous goes to step 3."

  # Step 3 - ESCC: chemo-free nivo+ipi only when chemo-sparing preference or
  # chemo unsuitability is explicit; otherwise chemo+nivo remains default.
  - step: 3
    evaluate:
      any_of:
        - condition: "ESCC CPS >=1 chemo-sparing preference"
        - all_of:
            - any_of:
                - condition: "PD-L1 CPS >= 1 (22C3 or 28-8 assay)"
                - condition: "PD-L1 CPS â‰¥ 1 (22C3 or 28-8 assay)"
                - condition: "ESCC CPS >=1"
            - any_of:
                - condition: "Chemo-sparing preference"
                - condition: "Chemo unsuitable but ICI eligible"
                - condition: "chemo_sparing_preference"
    if_true:
      result: IND-ESOPH-METASTATIC-1L-SCC-IPI-NIVO
      notes: >
        ESCC + CPS>=1 with chemo-sparing preference or chemo unsuitability:
        nivolumab+ipilimumab (CheckMate-648; mOS 13.7 vs 9.1 mo, HR 0.64).
        Use chemo+nivo instead when rapid response / high tumor burden is the
        priority.
    if_false:
      next_step: 31

  # Step 31 - ESCC default: nivo+chemo remains the rapid-response/default
  # branch when chemo-sparing preference is absent.
  - step: 31
    evaluate:
      any_of:
        - condition: "PD-L1 CPS >= 1 (22C3 or 28-8 assay)"
        - condition: "PD-L1 CPS â‰¥ 1 (22C3 or 28-8 assay)"
        - condition: "ESCC CPS >=1"
    if_true:
      result: IND-ESOPH-METASTATIC-1L-NIVO-CHEMO-SCC
      notes: >
        ESCC + CPS>=1: nivolumab+chemo preferred when rapid response or
        disease burden matters (CheckMate-648; mOS 15.4 vs 9.1 mo, HR 0.54).
        Pembro+chemo is also valid in selected CPS>=10 or mixed-histology
        settings.
    if_false:
      result: IND-ESOPH-METASTATIC-1L-NIVO-CHEMO-SCC
      notes: >
        ESCC + CPS <1: nivo+chemo still shows OS benefit in all-randomized
        population. Chemo alone is an alternative if ICI is contraindicated.

  # Step 4 - Adenocarcinoma (EAC / GEJ Siewert I): HER2 branch first.
  - step: 4
    evaluate:
      all_of:
        - any_of:
            - condition: "Adenocarcinoma histology (EAC or GEJ Siewert I)"
            - condition: "histology_adenocarcinoma"
        - any_of:
            - condition: "HER2-positive adenocarcinoma"
            - condition: "HER2-positive"
            - condition: "BIO-HER2-SOLID positive"
            - condition: "her2_positive"
    if_true:
      result: IND-ESOPH-METASTATIC-1L-HER2-TRASTUZUMAB-CHEMO
      notes: >
        EAC/GEJ Siewert I + HER2-positive: trastuzumab+chemo using the ToGA
        backbone, extrapolated from gastric/GEJ adenocarcinoma and endorsed by
        NCCN-Esophageal/EGJ. Do not use this branch for ESCC.
    if_false:
      next_step: 41

  # Step 41 - Adenocarcinoma (EAC / GEJ Siewert I): PD-L1 CPS gate.
  # KEYNOTE-590 is the evidence base for EAC (enrolled adeno + ESCC).
  - step: 41
    evaluate:
      all_of:
        - any_of:
            - condition: "Adenocarcinoma histology (EAC or GEJ Siewert I)"
            - condition: "histology_adenocarcinoma"
        - any_of:
            - condition: "PD-L1 CPS >= 10"
            - condition: "PD-L1 CPS â‰¥ 10"
    if_true:
      result: IND-ESOPH-METASTATIC-1L-PEMBRO-CHEMO
      notes: >
        EAC/GEJ Siewert I + CPS>=10: pembro+chemo (KEYNOTE-590 adeno arm).
        If HER2-positive, step 4 should already have routed to trastuzumab+chemo.
    if_false:
      result: IND-ESOPH-METASTATIC-1L-PEMBRO-CHEMO
      notes: >
        EAC/GEJ Siewert I + CPS <10 or unknown: pembro+chemo remains the
        closest authored esophageal adenocarcinoma systemic option; chemo alone
        can be substituted by HCP judgment if ICI is contraindicated.

sources:
  - SRC-CHECKMATE648-DOKI-2022
  - SRC-KEYNOTE590-SUN-2021
  - SRC-NCCN-ESOPHAGEAL-2025
  - SRC-ESMO-ESOPHAGEAL-2024

last_reviewed: "2026-05-07"
notes: >
  This algorithm covers metastatic/unresectable advanced disease only.
  Resectable: ALGO-ESOPH-RESECTABLE-1L (CROSS neoadjuvant to esophagectomy).
  Adjuvant post-CROSS-non-pCR: ALGO-ESOPHAGEAL-ADJUVANT-1L (nivolumab 1yr).
  2L post-ICI+chemo: limited options - cytotoxic taxane or irinotecan.
  2L post-chemo-only: nivo (ATTRACTION-3, ESCC) or pembro CPS>=10
  (KEYNOTE-181) per ALGO-ESOPH-2L.

  D1-thin update 2026-05-07: already-authored A1 indications are now reachable.
  ESCC + CPS>=1 + chemo-sparing preference routes to ipi+nivo. HER2-positive
  EAC/GEJ Siewert I routes to trastuzumab+chemo. Gastric FGFR2b remains
  intentionally unrouted until a non-null bemarituzumab regimen exists.

  GEJ Siewert II/III (gastroesophageal junction tumors below the Z-line):
  managed as gastric - use ALGO-GASTRIC-METASTATIC-1L (not this algorithm).
