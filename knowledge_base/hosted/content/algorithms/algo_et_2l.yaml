id: ALGO-ET-2L
applicable_to_disease: DIS-ET
applicable_to_line_of_therapy: 2
purpose: >
  Select 2L+ ET cytoreduction Indication for hydroxyurea-failure /
  intolerance / pregnancy. Three tracks: (1) pregnancy or planning →
  IND-ET-2L-PEG-IFN (only safe cytoreductive in pregnancy; ELN/BSH
  preferred); (2) young (<50) or high JAK2 allele burden → IND-ET-2L-
  PEG-IFN (disease modification; allele burden reduction); (3) default
  HU-failure older or anagrelide-preferred → IND-ET-2L-ANAGRELIDE
  (platelet-selective; NCCN Cat 2A).

  2L entry triggered by: HU resistance (platelets ≥600 ×10^9/L on max
  HU ≥3 months), HU intolerance, thrombosis on HU, or pregnancy.

output_indications:
  - IND-ET-2L-ANAGRELIDE
  - IND-ET-2L-PEG-IFN

default_indication: IND-ET-2L-ANAGRELIDE
alternative_indication: IND-ET-2L-PEG-IFN

decision_tree:
  # Step 1 — pregnancy / planning: HU teratogenic, anagrelide also
  # contraindicated → peg-IFN α-2a (Pegasys) or ropeginterferon (ELN/BSH
  # preferred; only safe cytoreductive option in pregnancy).
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-PV-ET-PREGNANCY-OR-PLANNING
    if_true:
      result: IND-ET-2L-PEG-IFN
      notes: >
        Pregnancy or planning pregnancy: peg-IFN α-2a (Pegasys 45-180 µg/week SC)
        or ropeginterferon (if accessible). MANDATORY — both HU and anagrelide are
        teratogenic and contraindicated. ELN 2018 and BSH 2024 recommend peg-IFN
        as the only safe cytoreductive option in pregnancy. TSH monitoring q3 months.
    if_false:
      next_step: 2

  # Step 2 — HU failure / intolerance / thrombosis on HU → step 21
  # to pick between peg-IFN (young/JAK2+) vs anagrelide (older/default).
  - step: 2
    evaluate:
      any_of:
        - condition: "HU resistance (platelets ≥600 ×10^9/L on max-tolerated HU ≥3mo)"
        - condition: "HU intolerance (cytopenia, mucocutaneous toxicity, leg ulcers, GI)"
        - condition: "Thrombotic event on HU therapy"
        - red_flag: RF-PV-ET-HIGH-THROMBOSIS-RISK
    if_true:
      next_step: 21
    if_false:
      next_step: 3

  # Step 21 — peg-IFN preferred for young patients (<50) or high JAK2 allele burden
  # (disease modification benefit; JAK2 allele burden reduction unique to IFN).
  # Otherwise default to anagrelide (older patients; anagrelide cardiac safety profile
  # considered acceptable; simpler monitoring requirements).
  - step: 21
    evaluate:
      any_of:
        - condition: "Age <50 years (young ET patient preferring disease-modifying therapy)"
        - condition: "High JAK2-V617F allele burden (>50% by quantitative PCR; IFN reduces allele burden)"
        - condition: "Anagrelide cardiac contraindication (LVEF <50%, severe CAD, uncontrolled arrhythmia)"
    if_true:
      result: IND-ET-2L-PEG-IFN
      notes: >
        Young (<50y) or high JAK2 allele burden: peg-IFN preferred (ELN 2018 / BSH 2024).
        Disease modification (JAK2 allele burden reduction ~15-30% CR); not achievable
        with anagrelide or HU. TSH q3 months; psychiatric screen. In Ukraine: Pegasys
        (peg-IFN α-2a) registered and accessible off-label for ET.
    if_false:
      result: IND-ET-2L-ANAGRELIDE
      notes: >
        Older patients (≥50) or psychiatric contraindication to IFN: anagrelide preferred
        (0.5 mg bid → titrate; platelet-selective; no leukemogenic risk; no molecular benefit
        but adequate platelet control). NCCN/ELN standard 2L.
    notes: "Peg-IFN vs anagrelide sub-decision added 2026-05-04 (Workstream AQ). Free-text age/allele conditions; MDT validation."

  # Step 3 — default: anagrelide for any 2L+ ET indication.
  - step: 3
    evaluate:
      any_of:
        - condition: "Persistent high-risk ET requiring switch from 1L"
    if_true:
      result: IND-ET-2L-ANAGRELIDE
    if_false:
      result: IND-ET-2L-ANAGRELIDE
    notes: "Free-text condition without matching disease-scoped RF; engine routes to default. Flag for RF authoring."

sources:
  - SRC-NCCN-MPN-2025
  - SRC-ESMO-MPN-2015

last_reviewed: "2026-05-04"
notes: >
  AUTHORED 2026-05-04: IND-ET-2L-PEG-IFN created and wired at step 1
  (pregnancy → peg-IFN mandatory; HU/anagrelide contraindicated) and
  step 21 (young <50 or JAK2 allele burden high → peg-IFN preferred;
  Workstream AQ). ROUTING SUMMARY: (1) pregnancy → peg-IFN (mandatory);
  (2) young/JAK2+ → peg-IFN (disease modification); (3) default → anagrelide.
  OOS / wiring gaps:
  (1) Busulfan / pipobroman as 3L cytoreduction in elderly HU-intolerant — not
  modeled (leukemogenic risk; reserved for end-of-life palliation).
  (2) Thrombosis-prevention (low-dose aspirin) continues regardless of
  cytoreduction switch — handled in SUP layer, not algorithm.
  (3) reviewer_signoffs: 0 — pending two Clinical Co-Lead approvals per
  CHARTER §6.1.
