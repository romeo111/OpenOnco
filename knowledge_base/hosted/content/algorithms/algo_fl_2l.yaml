id: ALGO-FL-2L
applicable_to_disease: DIS-FL
applicable_to_line_of_therapy: 2
purpose: 'Select 2L+ relapsed/refractory FL Indication. Five tracks: (1) TRUE 2L rituximab-sensitive → R2 (AUGMENT; NCCN Cat 1; PFS HR 0.46; ORR 78%); (2) TRUE 2L rituximab-REFRACTORY → obinutuzumab+benda (GADOLIN; NCCN Cat 1; PFS HR 0.55; ORR 69%); (3) 3L+ EZH2-mutated (Y641) → tazemetostat (ORR ~69%); (4) 3L+ CAR-T-eligible non-EZH2 → axi-cel; (5) CAR-T-ineligible / older → mosunetuzumab bispecific. Workstreams AT+AX 2026-05-04.

  '
output_indications:
- IND-FL-2L-R2
- IND-FL-2L-OBINU-BENDA
- IND-FL-3L-TAZEMETOSTAT
- IND-FL-3L-AXICEL-CART
- IND-FL-3L-MOSUNETUZUMAB
default_indication: IND-FL-2L-R2
alternative_indication: IND-FL-2L-OBINU-BENDA
decision_tree:
- step: 0
  evaluate:
    all_of:
    - condition: "Exactly 1 prior systemic line (true 2L; not yet ≥2 lines post-progression)"
    - condition: "NOT rituximab-refractory: no progression within 6 months of last anti-CD20 dose"
    - condition: "FL Grade 1-3a confirmed (NOT Grade 3b; NOT histologic transformation to DLBCL at relapse biopsy)"
  if_true:
    result: IND-FL-2L-R2
    notes: >
      True 2L rituximab-sensitive FL: R2 (rituximab 375 mg/m² d1 q28d + lenalidomide
      20 mg/day d1-21 q28d × 12 cycles; AUGMENT; Leonard 2019 JCO). PFS HR 0.46
      (p<0.001); ORR 78% FL subgroup 81%; CR 34%; NCCN Cat 1.
      VTE prophylaxis mandatory (aspirin 81 mg or LMWH). Lenalidomide REMS: negative
      pregnancy test + contraception mandatory before start. EZH2 testing at this point
      for future reference; result does not change 2L routing.
      Rituximab-refractory → fall to step 02 (obinutuzumab+benda; GADOLIN; Workstream AX).
  if_false:
    next_step: 02
  notes: "Step 0 updated Workstream AX 2026-05-04: rituximab-refractory 2L → step 02 (G-benda). Free-text conditions — prior-lines count and rituximab-refractory status not yet RF-modelled; MDT text evaluation."
- step: 02
  evaluate:
    all_of:
    - condition: "Exactly 1 prior systemic line (true 2L; not yet ≥2 lines post-progression)"
    - condition: "Rituximab-REFRACTORY: progression within 6 months of last rituximab-containing regimen or last rituximab maintenance dose"
    - condition: "FL Grade 1-3a confirmed (NOT transformation)"
  if_true:
    result: IND-FL-2L-OBINU-BENDA
    notes: >
      2L rituximab-refractory FL: obinutuzumab + bendamustine × 6 cycles →
      obinutuzumab maintenance q2m × 2 years (GADOLIN; Sehn 2016 JCO).
      mPFS 29.2 vs 13.7 months (HR 0.55 p<0.0001); ORR 69%; NCCN Cat 1.
      HBV screen mandatory. PJP prophylaxis mandatory. Ukraine: obinutuzumab
      (Gazyvaro) registered; NSZU reimbursement limited.
  if_false:
    next_step: 1
  notes: "Step 02 added Workstream AX 2026-05-04: rituximab-refractory 2L FL → O-benda (GADOLIN); if not 2L or not truly refractory → step 1 (3L+ EZH2/CAR-T cascade)."
- step: 1
  evaluate:
    any_of:
    - red_flag: RF-FL-EZH2-Y641-ACTIONABLE
  if_true:
    next_step: 11
  if_false:
    next_step: 2
  notes: "Wired via RF-FL-EZH2-Y641-ACTIONABLE (CSD-9A): biomarker-gated branch fires on EZH2 hotspot mutation; sequential step 11 then checks ≥2 prior lines requirement before routing to tazemetostat."
- step: 11
  evaluate:
    any_of:
    - finding: "prior_lines"
      threshold: 2
      comparator: ">="
  if_true:
    result: IND-FL-3L-TAZEMETOSTAT
  if_false:
    next_step: 2
  notes: "Sequential gate after EZH2 RF (step 1): tazemetostat is FDA-approved only for ≥2 prior systemic lines (Morschhauser 2020). EZH2-mut at <2 lines falls through to CAR-T / mosunetuzumab routing."
- step: 2
  evaluate:
    all_of:
    - condition: ≥2 prior systemic lines
    - red_flag: RF-FITNESS-ECOG-FIT
    - red_flag: RF-CAR-T-ELIGIBLE
    - condition: Age 18-75
    - condition: CD19+ disease confirmed
  if_true:
    result: IND-FL-3L-AXICEL-CART
  if_false:
    next_step: 3
  notes: Partially wired - fitness/eligibility gates wired via CSD-7A pan-disease RFs; remaining condition(s) kept as MDT-evaluated text (no RF available for that criterion).
- step: 3
  evaluate:
    any_of:
    - condition: Transplant-ineligible OR CAR-T inaccessible
    - condition: EZH2-WT and patient prefers chemo-free off-the-shelf
  if_true:
    result: IND-FL-3L-MOSUNETUZUMAB
  if_false:
    result: IND-FL-3L-MOSUNETUZUMAB
  notes: Free-text condition without matching disease-scoped RF; engine routes to default. Flag for RF authoring.
sources:
- SRC-NCCN-BCELL-2025
- SRC-ESMO-FL-2024
last_reviewed: '2026-05-04'
notes: 'UPDATED 2026-05-04 (Workstream AT): IND-FL-2L-R2 + step 0 (2L rituximab-sensitive).
  UPDATED 2026-05-04 (Workstream AX): IND-FL-2L-OBINU-BENDA + step 02 (2L rituximab-refractory
  → obinutuzumab+benda; GADOLIN; Sehn 2016 JCO; mPFS 29.2 mo HR 0.55; ORR 69%; NCCN Cat 1).
  Gap (1) FULLY CLOSED: both R2 (rituximab-sensitive) and O-benda (rituximab-refractory) 2L.
  OOS / wiring gaps: (2) Histologic transformation detection (RF-FL-TRANSFORMATION-SUSPECT)
  routes to DLBCL algos — must be resolved upstream. (3) Loncastuximab tesirine, glofitamab
  not modeled for 3L+. (4) Bridging therapy for axi-cel in Regimen/SUP layer.

  '
