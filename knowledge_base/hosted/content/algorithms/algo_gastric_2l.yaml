id: ALGO-GASTRIC-2L
applicable_to_disease: DIS-GASTRIC
applicable_to_line_of_therapy: 2
purpose: 'Select 2L+ metastatic gastric/GEJ Indication. Four tracks: (1) HER2+ (reconfirmed) → T-DXd (DESTINY-Gastric01; NCCN Cat 1); (2) ≥2 prior regimens → trifluridine-tipiracil (TAGS; NCCN Cat 1); (3) MSI-H + ICI-naive → pembrolizumab mono (KEYNOTE-158; NCCN Cat 1); (4) default HER2-neg 2L → ramucirumab + paclitaxel (RAINBOW; NCCN Cat 1).

  '
output_indications:
- IND-GASTRIC-METASTATIC-2L-RAMUCIRUMAB-PACLITAXEL
- IND-GASTRIC-METASTATIC-2L-HER2-TDXD
- IND-GASTRIC-METASTATIC-3L-TAS102
- IND-GASTRIC-METASTATIC-2L-MSI-H-PEMBROLIZUMAB
default_indication: IND-GASTRIC-METASTATIC-2L-RAMUCIRUMAB-PACLITAXEL
alternative_indication: IND-GASTRIC-METASTATIC-2L-HER2-TDXD
decision_tree:
- step: 1
  evaluate:
    all_of:
    - red_flag: RF-GASTRIC-HIGH-RISK-BIOLOGY
    - condition: HER2+ reconfirmed on archival or fresh biopsy (IHC 3+ OR 2+/ISH+)
    - condition: Prior trastuzumab-containing 1L
    - condition: ECOG ≤1
  if_true:
    result: IND-GASTRIC-METASTATIC-2L-HER2-TDXD
  if_false:
    next_step: 2
- step: 2
  evaluate:
    all_of:
    - condition: ≥2 prior systemic regimens (incl. platinum + fluoropyrimidine ± taxane/ramucirumab)
    - any_of:
      - red_flag: RF-FITNESS-ECOG-FIT
      - red_flag: RF-FITNESS-ECOG-INTERMEDIATE
  if_true:
    result: IND-GASTRIC-METASTATIC-3L-TAS102
  if_false:
    next_step: 3
  notes: Partially wired - fitness/eligibility gates wired via CSD-7A pan-disease RFs; remaining condition(s) kept as MDT-evaluated text (no RF available for that criterion).
- step: 3
  evaluate:
    all_of:
    - condition: Disease progression on or after 1L platinum + fluoropyrimidine ± ICI
    - condition: HER2-negative OR HER2 status unknown / unable to test
    - any_of:
      - red_flag: RF-FITNESS-ECOG-FIT
      - red_flag: RF-FITNESS-ECOG-INTERMEDIATE
  if_true:
    next_step: 21
  if_false:
    result: IND-GASTRIC-METASTATIC-2L-RAMUCIRUMAB-PACLITAXEL
  notes: "Partially wired (CSD-7A). if_true → step 21 (MSI-H ICI-naive gate). if_false → pac+ram (patients not meeting fitness/HER2-neg criteria may still proceed at MDT discretion but default to pac+ram)."

  # Step 21 — MSI-H ICI-naive gate → pembrolizumab monotherapy.
  # In modern 1L practice (post-KEYNOTE-859), most MSI-H gastric patients received
  # pembro+FOLFOX in 1L and are ICI-experienced → route to pac+ram.
  # Residual ICI-naive MSI-H 2L scenario: pre-2023 era, 1L ICI contraindicated,
  # or clinical trial without ICI. Pembrolizumab mono NCCN Cat 1; ORR ~45-57% MSI-H.
- step: 21
  evaluate:
    all_of:
    - red_flag: RF-GASTRIC-MSI-H-ACTIONABLE
    - none_of:
      - red_flag: RF-PRIOR-IO-PROGRESSION
  if_true:
    result: IND-GASTRIC-METASTATIC-2L-MSI-H-PEMBROLIZUMAB
    notes: >
      MSI-H/dMMR + ICI-naive in 2L: pembrolizumab monotherapy 200 mg q3w.
      NCCN Gastric 2025 Category 1. FDA dMMR tumor-agnostic 2017.
      KEYNOTE-158 gastric MSI-H cohort ORR ~45-57%; substantially better than
      pac+ram in unselected 2L (~26-28% ORR). Re-check HER2 at relapse —
      if HER2 3+ → T-DXd preferred (step 1; higher ORR ~51%).
  if_false:
    result: IND-GASTRIC-METASTATIC-2L-RAMUCIRUMAB-PACLITAXEL
    notes: >
      MSS/pMMR or ICI-experienced: standard 2L pac+ram
      (RAINBOW; ORR ~28%; PFS 4.4 mo). Pembro monotherapy ineffective
      in MSS gastric; ICI re-challenge after progression unproven.
  notes: "MSI-H ICI-naive gate added 2026-05-04 (Workstream AL). Uses RF-GASTRIC-MSI-H-ACTIONABLE (biomarker trigger) + RF-PRIOR-IO-PROGRESSION (none_of = ICI-naive)."
sources:
- SRC-NCCN-GASTRIC-2025
- SRC-ESMO-GASTRIC-2024
- SRC-KEYNOTE158-ANAL-MARABELLE-2020
last_reviewed: '2026-05-04'
notes: 'AUTHORED 2026-05-04: IND-GASTRIC-METASTATIC-2L-MSI-H-PEMBROLIZUMAB wired at step 21 (MSI-H ICI-naive gate; KEYNOTE-158 ORR ~45-57%; NCCN Cat 1; Workstream AL). ROUTING SUMMARY: (1) HER2 3+ → T-DXd; (2) ≥2 prior lines → TAS-102; (3) MSI-H + ICI-naive → pembro mono; (4) default → pac+ram. OOS / wiring gaps: (1) Zolbetuximab + chemo for CLDN18.2+ patients (SPOTLIGHT/GLOW trials) is a 1L indication when zolbetuximab access exists — not in 2L scope. (2) Nivolumab single-agent / ipi-nivo for late-line MSI-H not modeled (rare scenario; ICI-exposed in 1L is now standard). (3) Single-agent paclitaxel weekly is the UA-funded fallback when ramucirumab unavailable — surfaced in regimen notes, not separate indication.

  '
