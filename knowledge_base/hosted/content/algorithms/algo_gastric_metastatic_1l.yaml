id: ALGO-GASTRIC-METASTATIC-1L
applicable_to_disease: DIS-GASTRIC
applicable_to_line_of_therapy: 1
purpose: >
  Algorithm for gastric/GEJ adenocarcinoma metastatic 1L. HER2+ →
  TOGA trastuzumab+chemo (treatment-defining); HER2- + PD-L1 CPS ≥5 →
  FOLFOX+nivo. CLDN18.2+ zolbetuximab and MSI-H pembro mono pathways
  await full authoring (separate Indications when zolbetuximab regimen
  is added).

output_indications:
  - IND-GASTRIC-METASTATIC-1L-HER2-TOGA
  - IND-GASTRIC-METASTATIC-1L-PDL1-CHEMO-ICI

default_indication: IND-GASTRIC-METASTATIC-1L-PDL1-CHEMO-ICI
alternative_indication: IND-GASTRIC-METASTATIC-1L-HER2-TOGA

decision_tree:
  # Step 1 — HER2+ routes to trastuzumab+chemo (TOGA / KEYNOTE-811).
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-GASTRIC-HIGH-RISK-BIOLOGY
    if_true:
      result: IND-GASTRIC-METASTATIC-1L-HER2-TOGA
    if_false:
      next_step: 2

  # Step 2 — HER2- + PD-L1 CPS ≥1 → FOLFOX+nivo (CheckMate-649). Note:
  # FDA strict label is CPS ≥5; EMA broader label is CPS ≥1.
  # RF-GASTRIC-PDL1-CPS-1-PLUS captures the broader CPS ≥1 cohort; the
  # MDT note in the indication discusses CPS 1-5 vs ≥5 magnitude-of-
  # benefit. HER2-negative gate kept as MDT-text (HER2+ already routed
  # at step 1; HER2-low not yet a separate gastric branch).
  - step: 2
    evaluate:
      all_of:
        - red_flag: RF-GASTRIC-PDL1-CPS-1-PLUS
        - condition: "HER2-negative"
    if_true:
      result: IND-GASTRIC-METASTATIC-1L-PDL1-CHEMO-ICI
    if_false:
      result: IND-GASTRIC-METASTATIC-1L-PDL1-CHEMO-ICI
    notes: "Partially wired - RF-GASTRIC-PDL1-CPS-1-PLUS gates ICI add-on (CheckMate-649 FOLFOX+nivo); HER2-negative criterion kept as MDT-text (HER2+ pre-routed at step 1)."

sources:
  - SRC-NCCN-GASTRIC-2025
  - SRC-ESMO-GASTRIC-2024

last_reviewed: "2026-04-26"
notes: >
  HER2+ branch added (RF-GASTRIC-HIGH-RISK-BIOLOGY fires on any of
  HER2+/CLDN18.2+/MSI-H/EBV+ — ALGO step 1 currently routes all to
  TOGA which is correct for HER2+ but suboptimal for the rare
  CLDN18.2-only subset; revisit when zolbetuximab regimen is added).
  Out-of-scope: T-DXd 2L+ HER2+, FLOT periop for resectable.
