id: ALGO-GASTRIC-METASTATIC-1L
applicable_to_disease: DIS-GASTRIC
applicable_to_line_of_therapy: 1
purpose: >
  Algorithm for gastric/GEJ adenocarcinoma metastatic 1L. Step 0
  (D2 chunk gi2-d2-algo-extensions-phase-c-2026-05-08-1300) checks
  RF-OLIGOMET-DEFINITION first — when ≤3 metastases + controllable
  primary + ECOG 0-1 + amenable to local therapy + no peritoneal/
  leptomeningeal/>3-brain-mets exclusions, route to the systemic-
  plus-local oligomet track. Otherwise falls through to standard 1L
  metastatic biomarker hierarchy: HER2+ → TOGA trastuzumab+chemo
  (treatment-defining); CLDN18.2+ HER2- → zolbetuximab (SPOTLIGHT/
  GLOW); FGFR2b+ HER2- → bemarituzumab (FORTITUDE-101); HER2- +
  PD-L1 CPS ≥1 → FOLFOX+nivo (CheckMate-649).

output_indications:
  - IND-GASTRIC-OLIGOMET-SYSTEMIC-PLUS-LOCAL
  - IND-GASTRIC-METASTATIC-1L-HER2-TOGA
  - IND-GASTRIC-METASTATIC-1L-CLDN18-2-ZOLBETUXIMAB
  - IND-GASTRIC-METASTATIC-1L-FGFR2B-BEMARITUZUMAB
  - IND-GASTRIC-METASTATIC-1L-PDL1-CHEMO-ICI

default_indication: IND-GASTRIC-METASTATIC-1L-PDL1-CHEMO-ICI
alternative_indication: IND-GASTRIC-METASTATIC-1L-HER2-TOGA

decision_tree:
  # Step 0 (D2 chunk gi2-d2-algo-extensions-phase-c-2026-05-08-1300) —
  # RF-OLIGOMET-DEFINITION gate. When patient meets OMEC-1 oligomet
  # consensus criteria (≤3 distant mets, ECOG 0-1, controllable primary,
  # all sites amenable to local therapy; not peritoneal carcinomatosis /
  # leptomeningeal / >3 brain mets), route to systemic-plus-local
  # oligomet track (induction FLOT → restaging → metastasis-directed
  # local therapy → adjuvant FLOT per RENAISSANCE / AIO-FLOT5 design).
  # Falls through to existing standard 1L metastatic biomarker hierarchy
  # when the RF does not fire (>3 mets, peritoneal, leptomeningeal, etc.).
  - step: 0
    evaluate:
      any_of:
        - red_flag: RF-OLIGOMET-DEFINITION
    if_true:
      result: IND-GASTRIC-OLIGOMET-SYSTEMIC-PLUS-LOCAL
      notes: >
        OMEC-1 oligomet consensus (Kroese 2023, PMID 36947929) +
        RENAISSANCE / AIO-FLOT5 design (Al-Batran BMC Cancer 2017;
        NCT02578368). ≤3 distant metastatic lesions + controllable
        primary + ECOG 0-1 + all sites amenable to local therapy.
        Aggressive plan track — induction FLOT → restaging at ~12 wk
        → metastasis-directed local therapy (metastasectomy or SBRT)
        in responders → adjuvant FLOT continuation. NCCN v3.2025 2B,
        ESMO 2024 conditional. Confidence: moderate (RENAISSANCE
        primary OS pending).
    if_false:
      next_step: 1
    notes: "D2 chunk new branch — prepended oligomet step gates the standard biomarker hierarchy. Fires only when RF-OLIGOMET-DEFINITION composite trigger evaluates True (≤3 mets + ECOG≤1 + primary controllable + all sites amenable + none of peritoneal/leptomeningeal/>3-brain). HER2-positive oligomet excluded at indication-level (biomarker_requirements_excluded) so HER2+ patients still route to TOGA at step 1."

  # Step 1 — HER2+ routes to trastuzumab+chemo (TOGA / KEYNOTE-811).
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-GASTRIC-HIGH-RISK-BIOLOGY
    if_true:
      result: IND-GASTRIC-METASTATIC-1L-HER2-TOGA
    if_false:
      next_step: 2

  # Step 2 — CLDN18.2+ HER2-negative → zolbetuximab + chemo
  # (SPOTLIGHT/GLOW; FDA Oct 2024). Added in W1.B2 chunk
  # (2026-04-30); positioned after step 1 so HER2+ patients (which
  # also fire RF-GASTRIC-HIGH-RISK-BIOLOGY) continue to route to TOGA
  # — preserves prior behavior for HER2+ cohort. CLDN18.2+ patients
  # who are also HER2-negative and not MSI-H take this branch.
  - step: 2
    evaluate:
      all_of:
        - red_flag: RF-GASTRIC-CLDN18-2-ACTIONABLE
        - {finding: her2_status, value: negative}
    if_true:
      result: IND-GASTRIC-METASTATIC-1L-CLDN18-2-ZOLBETUXIMAB
    if_false:
      next_step: 10
    notes: "CLDN18.2 branch added W1.B2 (2026-04-30). MSI-H pembrolizumab branch still pending — surfaces via known_controversies in indication."

  # Step 10 (D1 chunk gi2-d1-algo-extensions-2026-05-07-2030) — FGFR2b+ HER2-
  # non-positive → bemarituzumab + mFOLFOX6 (FORTITUDE-101 phase 3 / FIGHT phase
  # 2). FGFR2b IHC 2+/3+ ≥10% threshold. Positioned between CLDN18.2 (step 2)
  # and PD-L1 CPS (step 3) per indication-level hierarchy: HER2+ TOGA → CLDN18.2+
  # zolbetuximab (phase 3 FDA-approved) → FGFR2b+ bemarituzumab (phase 3 emerging,
  # FORTITUDE-101 ESMO 2025 LBA10) → PD-L1 CPS+ chemo+nivo (CheckMate-649). Falls
  # through to step 3 (PD-L1 CPS) when FGFR2b-negative.
  - step: 10
    evaluate:
      all_of:
        - finding: "fgfr2b_status"
          value: "positive"
        - {finding: her2_status, value: negative}
    if_true:
      result: IND-GASTRIC-METASTATIC-1L-FGFR2B-BEMARITUZUMAB
    if_false:
      next_step: 3
    notes: >
      D1 chunk new branch — FGFR2b+ (IHC 2+/3+ ≥10%) HER2-non-positive routes to
      bemarituzumab + mFOLFOX6 (FORTITUDE-101 phase 3 mOS 17.9 vs 12.5 mo at
      primary analysis HR 0.61, attenuated to HR 0.82 at descriptive follow-up;
      FIGHT phase 2 mOS 19.2 vs 13.5 mo HR 0.60). HER2+ pre-routed at step 1
      (TOGA supersedes); CLDN18.2+ pre-routed at step 2 (zolbetuximab supersedes
      until FORTITUDE-101 vs SPOTLIGHT/GLOW head-to-head data emerges).

  # Step 3 — HER2- + PD-L1 CPS ≥1 → FOLFOX+nivo (CheckMate-649). Note:
  # FDA strict label is CPS ≥5; EMA broader label is CPS ≥1.
  # RF-GASTRIC-PDL1-CPS-1-PLUS captures the broader CPS ≥1 cohort; the
  # MDT note in the indication discusses CPS 1-5 vs ≥5 magnitude-of-
  # benefit. HER2-negative gate kept as MDT-text (HER2+ already routed
  # at step 1; HER2-low not yet a separate gastric branch).
  - step: 3
    evaluate:
      all_of:
        - red_flag: RF-GASTRIC-PDL1-CPS-1-PLUS
        - {finding: her2_status, value: negative}
    if_true:
      result: IND-GASTRIC-METASTATIC-1L-PDL1-CHEMO-ICI
    if_false:
      result: IND-GASTRIC-METASTATIC-1L-PDL1-CHEMO-ICI
    notes: "RF-GASTRIC-PDL1-CPS-1-PLUS gates ICI add-on (CheckMate-649 FOLFOX+nivo); HER2-negative criterion now structured as finding lookup (HER2+ already pre-routed at step 1)."

sources:
  - SRC-NCCN-GASTRIC-2025
  - SRC-ESMO-GASTRIC-2024

last_reviewed: "2026-05-08"
notes: >
  Step 0 (D2 chunk gi2-d2-algo-extensions-phase-c-2026-05-08-1300):
  RF-OLIGOMET-DEFINITION gate routes oligometastatic patients to
  IND-GASTRIC-OLIGOMET-SYSTEMIC-PLUS-LOCAL before standard biomarker
  hierarchy. HER2+ branch (step 1) routes to TOGA via
  RF-GASTRIC-HIGH-RISK-BIOLOGY. CLDN18.2-positive HER2-negative
  branch (step 2) added W1.B2 chunk 2026-04-30 — routes to
  zolbetuximab+chemo (SPOTLIGHT/GLOW; FDA Oct 2024). FGFR2b+ HER2-
  branch (step 10) added D1 chunk 2026-05-07 — routes to bemarituzumab
  + mFOLFOX6 (FORTITUDE-101). PD-L1 CPS≥1 + HER2-negative branch
  (step 3) routes to nivolumab+chemo (CheckMate-649). The CLDN18.2
  step precedes PD-L1 because zolbetuximab + chemo is treatment-
  defining when CLDN18.2≥75% AND PD-L1<5; for dual-positive
  CLDN18.2≥75% AND PD-L1≥5 the indication's known_controversies
  surfaces the MDT trade-off.
  Out-of-scope: T-DXd 2L+ HER2+, FLOT periop for resectable
  (ALGO-GASTRIC-RESECTABLE-PERIOP), MSI-H KEYNOTE-859 pembrolizumab
  as separate algorithm branch (pending dedicated indication).
notes_ua: >
  Крок 0 (чанк D2 gi2-d2-algo-extensions-phase-c-2026-05-08-1300):
  шлюз RF-OLIGOMET-DEFINITION спрямовує олігометастатичних пацієнтів до
  IND-GASTRIC-OLIGOMET-SYSTEMIC-PLUS-LOCAL перед стандартною ієрархією
  біомаркерів. Гілка HER2+ (крок 1) спрямовується до TOGA через
  RF-GASTRIC-HIGH-RISK-BIOLOGY. Гілка CLDN18.2-позитивний HER2-негативний
  (крок 2) додана у чанку W1.B2 2026-04-30 — спрямовується до
  золбетуксимаб+хімія (SPOTLIGHT/GLOW; FDA жовтень 2024). Гілка FGFR2b+
  HER2- (крок 10) додана у чанку D1 2026-05-07 — спрямовується до
  бемаритузумаб + mFOLFOX6 (FORTITUDE-101). Гілка PD-L1 CPS≥1 +
  HER2-негативний (крок 3) спрямовується до ніволумаб+хімія
  (CheckMate-649). Крок CLDN18.2 передує PD-L1, оскільки золбетуксимаб
  + хімія є визначальним лікуванням при CLDN18.2≥75% ТА PD-L1<5; для
  подвійно-позитивних CLDN18.2≥75% ТА PD-L1≥5 known_controversies
  показання виводить компроміс МДТ.
  Поза обсягом: T-DXd 2L+ HER2+, FLOT періопераційний для резектабельних
  (ALGO-GASTRIC-RESECTABLE-PERIOP), MSI-H KEYNOTE-859 пембролізумаб
  як окрема гілка алгоритму (очікується окреме показання).
