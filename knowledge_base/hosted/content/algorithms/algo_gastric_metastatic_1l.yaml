id: ALGO-GASTRIC-METASTATIC-1L
applicable_to_disease: DIS-GASTRIC
applicable_to_line_of_therapy: 1
purpose: >
  Algorithm for gastric/GEJ adenocarcinoma metastatic 1L. Routes by
  hierarchical biomarker priority: (1) HER2+ → TOGA trastuzumab+chemo;
  (2) CLDN18.2 ≥75% HER2-neg → zolbetuximab+chemo (SPOTLIGHT/GLOW);
  (3) MSI-H/dMMR HER2-neg → pembrolizumab+chemo (KEYNOTE-859 Cat 1;
  OS HR 0.38 in MSI-H subgroup); (4) PD-L1 CPS ≥1 HER2-neg →
  FOLFOX+nivolumab (CheckMate-649 Cat 1).

output_indications:
  - IND-GASTRIC-METASTATIC-1L-HER2-TOGA
  - IND-GASTRIC-METASTATIC-1L-CLDN18-2-ZOLBETUXIMAB
  - IND-GASTRIC-METASTATIC-1L-MSI-H-PEMBROLIZUMAB
  - IND-GASTRIC-METASTATIC-1L-PDL1-CHEMO-ICI

default_indication: IND-GASTRIC-METASTATIC-1L-PDL1-CHEMO-ICI
alternative_indication: IND-GASTRIC-METASTATIC-1L-HER2-TOGA

decision_tree:
  # Step 1 — HER2+ routes to trastuzumab+chemo (TOGA / KEYNOTE-811).
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-GASTRIC-HIGH-RISK-BIOLOGY
    if_true:
      result: IND-GASTRIC-METASTATIC-1L-HER2-TOGA
    if_false:
      next_step: 2

  # Step 2 — CLDN18.2+ HER2-negative → zolbetuximab + chemo
  # (SPOTLIGHT/GLOW; FDA Oct 2024). Added in W1.B2 chunk
  # (2026-04-30); positioned after step 1 so HER2+ patients (which
  # also fire RF-GASTRIC-HIGH-RISK-BIOLOGY) continue to route to TOGA
  # — preserves prior behavior for HER2+ cohort. CLDN18.2+ patients
  # who are also HER2-negative and not MSI-H take this branch.
  - step: 2
    evaluate:
      all_of:
        - red_flag: RF-GASTRIC-CLDN18-2-ACTIONABLE
        - {finding: her2_status, value: negative}
    if_true:
      result: IND-GASTRIC-METASTATIC-1L-CLDN18-2-ZOLBETUXIMAB
    if_false:
      next_step: 21
    notes: "CLDN18.2 branch added W1.B2 (2026-04-30). MSI-H pembrolizumab branch wired at step 21 (2026-05-04)."

  # Step 21 — MSI-H/dMMR gate.
  # MSI-H/dMMR (~7% of advanced gastric) confers dramatic ICI benefit
  # (KEYNOTE-859 MSI-H OS HR 0.38 vs all-comers HR 0.78). Route before
  # the generic PD-L1 CPS check so MSI-H patients receive pembrolizumab+chemo
  # explicitly documented as MSI-H preferred regimen. Benefit is CPS-independent.
  # HER2+ already captured at step 1; CLDN18.2 at step 2; MSI-H here at step 21.
  - step: 21
    evaluate:
      all_of:
        - red_flag: RF-GASTRIC-MSI-H-ACTIONABLE
        - {finding: her2_status, value: negative}
    if_true:
      result: IND-GASTRIC-METASTATIC-1L-MSI-H-PEMBROLIZUMAB
      notes: >
        MSI-H/dMMR HER2-negative gastric: pembrolizumab+FOLFOX or CAPOX
        (REG-FOLFOX-PEMBRO-GASTRIC; KEYNOTE-859 MSI-H subgroup OS HR 0.38;
        NCCN Cat 1). CPS testing still recommended for documentation but
        benefit is CPS-independent in MSI-H. If CLDN18.2 also ≥75%: MDT —
        ICI (pembro+chemo) generally preferred for MSI-H; zolbetuximab
        indication surfaced in parallel by IND-GASTRIC-METASTATIC-1L-CLDN18-2-ZOLBETUXIMAB.
        Pembrolizumab inaccessible → use FOLFOX+nivolumab (CheckMate-649 Cat 1).
    if_false:
      next_step: 3
    notes: "MSI-H gate added 2026-05-04 (Workstream AF). Wired between CLDN18.2 (step 2) and PD-L1 CPS (step 3)."

  # Step 3 — HER2- + PD-L1 CPS ≥1 → FOLFOX+nivo (CheckMate-649). Note:
  # FDA strict label is CPS ≥5; EMA broader label is CPS ≥1.
  # RF-GASTRIC-PDL1-CPS-1-PLUS captures the broader CPS ≥1 cohort; the
  # MDT note in the indication discusses CPS 1-5 vs ≥5 magnitude-of-
  # benefit. HER2-negative gate kept as MDT-text (HER2+ already routed
  # at step 1; HER2-low not yet a separate gastric branch).
  - step: 3
    evaluate:
      all_of:
        - red_flag: RF-GASTRIC-PDL1-CPS-1-PLUS
        - {finding: her2_status, value: negative}
    if_true:
      result: IND-GASTRIC-METASTATIC-1L-PDL1-CHEMO-ICI
    if_false:
      result: IND-GASTRIC-METASTATIC-1L-PDL1-CHEMO-ICI
    notes: "RF-GASTRIC-PDL1-CPS-1-PLUS gates ICI add-on (CheckMate-649 FOLFOX+nivo); HER2-negative criterion now structured as finding lookup (HER2+ already pre-routed at step 1)."

sources:
  - SRC-NCCN-GASTRIC-2025
  - SRC-ESMO-GASTRIC-2024
  - SRC-KEYNOTE859-RHA-2023

last_reviewed: "2026-05-04"
notes: >
  HER2+ branch (step 1) routes to TOGA via RF-GASTRIC-HIGH-RISK-BIOLOGY.
  CLDN18.2-positive HER2-negative branch (step 2) added W1.B2 chunk
  2026-04-30 — routes to zolbetuximab+chemo (SPOTLIGHT/GLOW; FDA Oct 2024).
  MSI-H/dMMR HER2-negative branch (step 21) added 2026-05-04 — routes to
  pembrolizumab+chemo (KEYNOTE-859; FDA March 2023; MSI-H OS HR 0.38;
  NCCN Cat 1). PD-L1 CPS≥1 + HER2-negative branch (step 3) routes to
  nivolumab+chemo (CheckMate-649).
  Routing priority: HER2+ (step 1) > CLDN18.2≥75% HER2-neg (step 2) >
  MSI-H HER2-neg (step 21) > PD-L1 CPS≥1 HER2-neg (step 3).
  Dual-positive cases (CLDN18.2 + MSI-H, or CLDN18.2 + high CPS): MDT
  discussion; ICI preferred for MSI-H due to exceptional OS benefit.
  Out-of-scope: T-DXd 2L+ HER2+, FLOT periop for resectable.
