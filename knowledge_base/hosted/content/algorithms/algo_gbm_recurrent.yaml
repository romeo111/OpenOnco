id: ALGO-GBM-RECURRENT
applicable_to_disease: DIS-GBM
applicable_to_line_of_therapy: 2
purpose: >
  Select systemic therapy at first recurrence of GBM (IDH-WT, WHO grade 4)
  after standard Stupp protocol (RT + TMZ) or elderly-adapted regimen. Routes
  by ECOG fitness, prior treatment, and re-biopsy/MGMT status. Clinical trial
  enrollment is the preferred option at recurrence for all fit patients.

output_indications:
  - IND-GBM-RECURRENT-BEVACIZUMAB
  - IND-GBM-RECURRENT-LOMUSTINE

default_indication: IND-GBM-RECURRENT-BEVACIZUMAB
alternative_indication: IND-GBM-RECURRENT-LOMUSTINE

decision_tree:
  # Step 1 — Clinical trial availability. At GBM recurrence, clinical
  # trial is the preferred option (NCCN, EANO). Only proceed to step 2
  # if no suitable trial is available or patient declines.
  - step: 1
    evaluate:
      any_of:
        - condition: "No available clinical trial OR patient declines trial"
    if_true:
      next_step: 2
    if_false:
      result: null
      notes: "Clinical trial preferred at recurrence for all ECOG 0-2 patients. Discuss with MDT. Enroll if trial available."

  # Step 2 — Confirm true progression vs pseudoprogression.
  # MRI at 12 weeks post-RT can show pseudoprogression (treatment effect
  # mimicking recurrence). Requires MDT/radiological consensus before
  # initiating salvage.
  - step: 2
    evaluate:
      any_of:
        - condition: "Progression confirmed on MRI (RANO criteria) OR biopsy-confirmed recurrence"
        - condition: "Pseudoprogression excluded (>12 weeks from end of RT, or biopsy)"
    if_true:
      next_step: 3
    if_false:
      result: null
      notes: "Pseudoprogression must be excluded before systemic salvage. Continue observation ± MRI in 4-6 weeks. Perfusion MRI, MRS, or biopsy may help distinguish."

  # Step 3 — Performance status gate.
  - step: 3
    evaluate:
      any_of:
        - red_flag: RF-FITNESS-ECOG-FIT
        - red_flag: RF-FITNESS-ECOG-INTERMEDIATE
    if_true:
      next_step: 4
    if_false:
      result: null
      notes: "ECOG ≥ 3: systemic therapy unlikely to benefit. Best supportive care + corticosteroids for symptom management. Palliative/hospice referral."

  # Step 4 — MGMT methylation + prior TMZ gate.
  # MGMT-methylated + prior TMZ → proceed to step 41 (lomustine eligibility gate).
  # Non-methylated or prior bevacizumab → bevacizumab monotherapy.
  - step: 4
    evaluate:
      all_of:
        - condition: "MGMT promoter methylated"
        - condition: "Prior TMZ completed (≥6 adjuvant cycles or discontinued due to confirmed progression)"
        - condition: "No prior lomustine or nitrosourea"
    if_true:
      next_step: 41
    if_false:
      result: IND-GBM-RECURRENT-BEVACIZUMAB
      notes: >
        MGMT unmethylated, prior nitrosourea, or MGMT unknown: bevacizumab 10 mg/kg q2w
        monotherapy (FDA approved; NCCN 2A; steroid-sparing + PFS benefit; no OS benefit).
        Lomustine benefit in MGMT-unmethylated GBM is minimal (ORR ~5-10%).
        Any systemic therapy at GBM recurrence is palliative intent.

  # Step 41 — Lomustine eligibility gate (MGMT-methylated confirmed).
  # CrCl ≥30 + no prior bevacizumab → lomustine preferred (cytotoxic, MGMT-sensitive).
  # CrCl <30 or prior bevacizumab → bevacizumab (if bev-naive) or BSC/trial.
  - step: 41
    evaluate:
      all_of:
        - condition: "CrCl ≥30 mL/min (lomustine renally excreted; adequate renal function)"
        - condition: "No active Grade ≥2 pulmonary disease (lomustine cumulative pulmonary toxicity)"
        - condition: "ANC ≥1.5×10⁹/L and PLT ≥100×10⁹/L (bone marrow adequate for lomustine myelosuppression)"
    if_true:
      result: IND-GBM-RECURRENT-LOMUSTINE
      notes: >
        MGMT-methylated + adequate organ function: lomustine 110 mg/m² PO q6w
        (REG-LOMUSTINE-GBM; EF-11 Stupp 2012 EJC; NCCN Cat 2A).
        CRITICAL: single oral dose per 6-week cycle (multiple fatalities from daily dosing errors).
        CBC nadir at week 4-6; check CBC on day 21 AND day 42.
        Consider lomustine + bevacizumab if bev-naive (BELOB: 6-mo PFS 41% combo vs 13% lom alone).
        MDT decision: lomustine alone vs lom+bev based on patient comorbidities + bev contraindications.
    if_false:
      result: IND-GBM-RECURRENT-BEVACIZUMAB
      notes: >
        Renal impairment (CrCl <30), pulmonary comorbidity, or marrow compromise: bevacizumab
        10 mg/kg q2w monotherapy preferred (IND-GBM-RECURRENT-BEVACIZUMAB; NCCN 2A).
    notes: "Step 41 added 2026-05-04 (Workstream BP): MGMT-methylated lomustine eligibility gate. IND-GBM-RECURRENT-LOMUSTINE wired. Deferred gap CLOSED. Free-text organ-function conditions; MDT-evaluated."

sources:
  - SRC-EF14-STUPP-2015
  - SRC-NCCN-CNS-2025
  - SRC-EANO-GBM-2024

last_reviewed: "2026-05-04"
notes: >
  UPDATED 2026-05-04 (Workstream BP): IND-GBM-RECURRENT-LOMUSTINE authored and wired
  at step 41 (EF-11; lomustine 110 mg/m² q6w; NCCN Cat 2A; MGMT-methylated preferred).
  Step 4 restructured to route MGMT-methylated + nitrosourea-naive patients to step 41
  (lomustine eligibility gate) instead of directly to bevacizumab.

  ROUTING SUMMARY:
  - ECOG ≥3: best supportive care (no systemic therapy)
  - Pseudoprogression not excluded: observation ± MRI (no systemic therapy)
  - MGMT-methylated + no prior nitrosourea + adequate organ function: lomustine (Cat 2A)
  - MGMT unmethylated / prior nitrosourea / renal/pulmonary impairment: bevacizumab (Cat 2A)

  GBM recurrence prognosis is poor (mOS ~6-9 months with any therapy).
  No treatment has shown a survival benefit in a phase 3 randomized trial
  at recurrence. All recurrent GBM treatment is palliative intent.

  Key agents at recurrence (none are standard with OS benefit):
  - Lomustine (CCNU) 110 mg/m² q6w (cytotoxic; MGMT-methylated benefit; EF-11)
  - Bevacizumab 10 mg/kg q2w (FDA approved; PFS/steroid-sparing; no OS benefit)
  - Lomustine + bevacizumab (BELOB: 6-mo PFS 41% combo vs 13% lom alone vs 38% bev alone)
  - TMZ dose-dense rechallenge (MGMT-methylated only; limited evidence)
  - Re-irradiation (focal; select MDT cases — not a systemic therapy)

  TTFields (EF-11): phase 3 showed NO superiority vs lomustine at recurrence;
  TTFields not standard at recurrence (unlike newly diagnosed EF-14).

  Remaining deferred paths:
  - Lomustine + bevacizumab combination: not modeled as separate indication (BELOB data modest)
  - TMZ dose-dense rechallenge at recurrence: MGMT-methylated only; limited RCT data
  - Carboplatin ± bevacizumab: some phase 2 data; not NCCN Cat 1 or 2A
