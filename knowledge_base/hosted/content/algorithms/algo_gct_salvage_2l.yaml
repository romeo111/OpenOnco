id: ALGO-GCT-SALVAGE-2L
applicable_to_disease: DIS-TESTICULAR-GCT
applicable_to_line_of_therapy: 2
purpose: >
  Select salvage therapy for relapsed or refractory GCT (NSGCT or seminoma) after
  1L BEP or EP chemotherapy. Routes by: (1) cisplatin sensitivity at relapse,
  (2) Indiana prognostic score (AFP/hCG/visceral met profile), and (3) ASCT
  candidacy. TIP × 4 for cisplatin-sensitive good/intermediate Indiana score;
  HDCT+ASCT for cisplatin-refractory or poor Indiana score.
  Curative intent maintained in most relapsed GCT — early referral to GCT
  specialty center is mandatory.

output_indications:
  - IND-GCT-METASTATIC-1L-BEP
  - IND-GCT-SALVAGE-2L-TIP
  - IND-GCT-SALVAGE-2L-HDCT-ASCT
  - IND-GCT-SALVAGE-3L
  - IND-GCT-SALVAGE-RPLND

default_indication: IND-GCT-SALVAGE-2L-TIP
alternative_indication: IND-GCT-SALVAGE-2L-HDCT-ASCT

decision_tree:
  # Step 1 — Prior chemotherapy gate.
  # Surveillance relapse (no prior chemo): 1L BEP, not salvage.
  # True relapse after BEP/EP 1L: salvage pathway.
  - step: 1
    evaluate:
      any_of:
        - condition: "Prior cisplatin-containing chemotherapy received (BEP or EP 1L)"
    if_true:
      next_step: 2
      notes: "Post-BEP/EP relapse: salvage pathway."
    if_false:
      result: IND-GCT-METASTATIC-1L-BEP
      notes: >
        Clinical stage I surveillance relapse with no prior chemotherapy:
        treat as 1L with BEP × 3 (good-risk) or × 4 (intermediate/poor-risk)
        or EP × 4 if bleomycin-contraindicated. Not salvage — 1L standard.

  # Step 2 — Cisplatin refractoriness gate.
  # Cisplatin-refractory = progression during or within 4 weeks of last cisplatin dose.
  # Absolute platinum refractoriness: HDCT+ASCT (or clinical trial) preferred.
  - step: 2
    evaluate:
      any_of:
        - condition: "Cisplatin-refractory: disease progression during BEP/EP OR within 4 weeks of last cisplatin administration"
    if_true:
      result: IND-GCT-SALVAGE-2L-HDCT-ASCT
      notes: >
        Cisplatin-refractory GCT (relapse within 4 weeks of last cisplatin):
        conventional TIP or VeIP have poor outcomes (~15-20% CR). HDCT+ASCT
        (IND-GCT-SALVAGE-2L-HDCT-ASCT) preferred per NCCN.
        Clinical trial strongly preferred — cisplatin-refractory GCT has poor
        prognosis with any approach; enroll in novel trials (e.g., immunotherapy,
        PARP inhibitor combinations) where available.
        Requires urgent referral to GCT specialty center with ASCT capability.
    if_false:
      next_step: 3

  # Step 3 — Indiana prognostic score at relapse.
  # Poor Indiana score: AFP ≥1000 ng/mL OR hCG ≥1000 IU/L OR liver/bone/brain
  # metastases at relapse. Poor score → HDCT preferred over TIP.
  - step: 3
    evaluate:
      any_of:
        - condition: "Poor Indiana prognostic score: AFP ≥1000 ng/mL OR hCG ≥1000 IU/L at relapse"
        - condition: "Liver, bone, or brain metastases at relapse"
        - condition: "Incomplete response to 1L (AFP/hCG never normalized after BEP completion)"
    if_true:
      next_step: 4
      notes: "Poor Indiana score or incomplete 1L response: assess ASCT candidacy (step 4)."
    if_false:
      result: IND-GCT-SALVAGE-2L-TIP
      notes: >
        Good/intermediate Indiana score (AFP <1000, hCG <1000, no liver/bone/brain mets,
        CR after 1L then relapse): TIP × 4 cycles q21d preferred.
        Kondagunta 2005: CR 63% (durable NED 52%); favorable group CR 76%.
        NCCN Category 1. G-CSF + mesna mandatory.
        MDT at GCT specialty center recommended for all salvage decisions.
        Post-TIP completion: if residual mass ≥1 cm + normalized markers →
        PC-RPLND (IND-GCT-SALVAGE-RPLND; Cat 1) — see alternatives.
      alternatives:
        - indication_id: IND-GCT-SALVAGE-RPLND
          nccn_category: "1"
          criteria: >
            Non-seminomatous GCT (NSGCT); post-chemotherapy residual mass ≥1 cm on CT;
            AFP + beta-hCG + LDH normalized (or declining to nadir) after TIP or
            HDCT+ASCT completion; ECOG PS 0-1 (surgical fitness for major retroperitoneal
            surgery); pulmonary function adequate (prior bleomycin: DLCO checked);
            GCT referral center with RPLND expertise accessible.
            Seminoma: use FDG-PET to differentiate — PET-avid residual → RPLND/resection;
            PET-negative residual <3 cm → observation preferred.
            Rising AFP/hCG (active disease): NOT RPLND — salvage chemotherapy first.
          note: >
            Post-chemotherapy RPLND (PC-RPLND; NCCN GCT Cat 1; Indiana University /
            MSKCC series): residual NSGCT masses contain teratoma ~40% (no response to
            chemo; resection curative), viable GCT ~15% (→ 2 more BEP cycles post-RPLND),
            or necrosis ~45% (no further treatment). RPLND is the only way to distinguish
            these histologies and prevent teratoma malignant transformation (growing
            teratoma syndrome). Complete resection achieved in >95% at experienced centers.
            Ukraine: referral to specialized urologic oncology center (consider Poland /
            Germany / Austria for complex cases).

  # Step 4 — ASCT candidacy gate for poor Indiana / incomplete responders.
  - step: 4
    evaluate:
      all_of:
        - condition: "ECOG PS 0-1"
        - condition: "LVEF ≥45%"
        - condition: "CrCl ≥30 mL/min"
        - condition: "ASCT-capable center accessible"
    if_true:
      result: IND-GCT-SALVAGE-2L-HDCT-ASCT
      notes: >
        Poor Indiana score / incomplete 1L response + ASCT-eligible: HDCT+ASCT preferred.
        Einhorn 2007 (NEJM): 63% NED 2y; 78% favorable (among poor-score patients within
        the Indiana series). 2 tandem cycles carboplatin 700 mg/m²/d × 3 + etoposide
        750 mg/m²/d × 3 + ASCT per cycle. Referral to specialized center mandatory.
        Ukraine: limited ASCT centers — consider international referral (Poland, Germany,
        Austria) for patients with good PS and motivated to pursue curative-intent therapy.
    if_false:
      result: IND-GCT-SALVAGE-2L-TIP
      notes: >
        Poor Indiana score but ASCT not feasible (ECOG ≥2, organ dysfunction, no center):
        TIP × 4 conventional salvage is the best available option.
        Enroll in clinical trial if available. Palliative intent discussion if TIP fails.

sources:
  - SRC-KONDAGUNTA-TIP-2005
  - SRC-EINHORN-HDCT-ASCT-2007
  - SRC-IGCCC-1997
  - SRC-NCCN-TESTICULAR-2025

last_reviewed: "2026-05-04"
notes: >
  GCT SALVAGE ROUTING SUMMARY:

  Cisplatin sensitivity at relapse is the dominant branch:
  - Cisplatin-refractory (progress during/within 4w of cis): HDCT+ASCT
  - Cisplatin-sensitive (CR then relapse): Indiana score routing

  Indiana prognostic score at relapse:
  - Good/intermediate (AFP <1000, hCG <1000, no liver/bone/brain): TIP × 4
  - Poor (AFP ≥1000, hCG ≥1000, or liver/bone/brain mets): HDCT+ASCT

  VeIP (vinblastine + ifosfamide + cisplatin) and VIP (etoposide + ifosfamide + cisplatin)
  are alternative salvage regimens when paclitaxel is contraindicated but are not
  separately modeled here.

  AUTHORED 2026-05-04:
  - REG-HDCT-ASCT-GCT: Indiana HDCT (carbo 700 mg/m²/d×3 + VP-16 750 mg/m²/d×3 × 2 tandem ASCT); wired to IND-GCT-SALVAGE-2L-HDCT-ASCT
  - IND-GCT-SALVAGE-3L + REG-GEMPACLITAXEL-GCT: GemPac 3L salvage (paclitaxel
    110 mg/m² + gemcitabine 1000 mg/m² d1+8 q21d; NCCN Cat 2A; ORR ~20-32%).
    Not wired as a formal algorithm step (3L post-2L-failure is beyond this
    algorithm's scope); referenced via IND-GCT-SALVAGE-2L-TIP followed_by
    and IND-GCT-SALVAGE-3L itself. See ALGO-GCT-SALVAGE-3L (to be authored)
    for full 3L routing.

  UPDATED 2026-05-04 (Workstream FO): IND-GCT-SALVAGE-RPLND added to
  output_indications; wired as Cat 1 alternative at step 3 if_false (good/
  intermediate Indiana score TIP track). Post-TIP residual mass ≥1 cm +
  normalized markers → PC-RPLND (NSGCT; Indiana/MSKCC series; NCCN Cat 1).
  Histology at RPLND drives post-op decision: teratoma → surveillance;
  viable GCT → 2 more BEP; necrosis → observation. Gap CLOSED.

  REMAINING GAPS:
  - Seminoma late relapse (>2 years): carboplatin-based salvage has different
    considerations; not separately modeled
  - ALGO-GCT-SALVAGE-3L: CLOSED 2026-05-04 (Workstream DD): full 3L routing
    algorithm authored — HDCT check + paclitaxel-eligibility gate → GemPac (Cat 2A)
    or GEMOX (Cat 2B; neuropathy). Gap CLOSED.

  Curative intent: GCT is one of the most chemotherapy-sensitive solid tumors.
  Even multiply-relapsed patients can achieve long-term remission with HDCT+ASCT.
  Early referral to GCT specialty center is paramount.
