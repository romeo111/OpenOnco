id: ALGO-GIST-1L
applicable_to_disease: DIS-GIST
applicable_to_line_of_therapy: 1
purpose: >
  Select 1L systemic therapy for advanced / metastatic GIST (and
  high-risk adjuvant) by KIT/PDGFRA genotype. Imatinib for the
  imatinib-sensitive majority (~85%); avapritinib for the
  imatinib-resistant PDGFRA D842V subset (~7%). KIT exon 9 dose
  escalation (400 → 800 mg) is encoded inside REG-IMATINIB-GIST-1L
  rather than as a separate Indication.

output_indications:
  - IND-GIST-1L-IMATINIB
  - IND-GIST-1L-AVAPRITINIB-PDGFRA-D842V
  - IND-GIST-1L-WT-CLINICAL-TRIAL

default_indication: IND-GIST-1L-IMATINIB
alternative_indication: IND-GIST-1L-AVAPRITINIB-PDGFRA-D842V

decision_tree:
  - step: 1
    evaluate:
      any_of:
        - condition: "PDGFRA D842V mutation positive"
    if_true:
      result: IND-GIST-1L-AVAPRITINIB-PDGFRA-D842V
    if_false:
      next_step: 2
    notes: "Free-text condition without matching disease-scoped RF; engine routes to default. Flag for RF authoring."
  - step: 2
    evaluate:
      any_of:
        - condition: "KIT exon 11 mutation positive"
        - condition: "KIT exon 9 mutation positive"
        - condition: "PDGFRA non-D842V exon 18 OR exon 12 OR exon 14 mutation positive"
    if_true:
      result: IND-GIST-1L-IMATINIB
    if_false:
      next_step: 3
    notes: "Free-text condition without matching disease-scoped RF; engine routes to default. Flag for RF authoring."
  - step: 3
    evaluate:
      any_of:
        - condition: "KIT/PDGFRA wild-type (SDH-deficient OR NF1-mutant OR uncharacterized)"
    if_true:
      result: IND-GIST-1L-WT-CLINICAL-TRIAL
      notes: >
        KIT/PDGFRA WT GIST (SDH-deficient, NF1-mutant, or uncharacterized): imatinib is
        NOT standard (WT GIST lacks the KIT/PDGFRA driver that imatinib targets; imatinib
        ORR <10% in WT-GIST). Clinical trial enrollment is strongly preferred. If no trial
        available: sunitinib or regorafenib empirically (VEGFR inhibitors; limited data).
        Imatinib as accessible fallback only — see alternatives.
      alternatives:
        - indication_id: IND-GIST-1L-IMATINIB
          nccn_category: "2B"
          criteria: >
            KIT/PDGFRA WT GIST; no clinical trial accessible; imatinib used empirically.
            NOTE: imatinib is NOT the preferred treatment for WT GIST — clinical trial or
            sunitinib/regorafenib are preferred over imatinib in WT disease. Use only when
            no alternative accessible.
          note: >
            Imatinib 400 mg PO daily as accessible fallback for WT GIST (NCCN Cat 2B for
            WT; imatinib ORR <10% in WT GIST vs ~80% in KIT/PDGFRA-mutant disease). Not
            a recommended treatment; listed for access completeness. SDH-deficient GIST may
            respond to sunitinib (ORR ~35%). Trial enrollment at specialized GIST center
            strongly preferred.
    if_false:
      result: IND-GIST-1L-IMATINIB
    notes: "Step 3 updated 2026-05-04 (Workstream FV): WT GIST now routes to IND-GIST-1L-WT-CLINICAL-TRIAL (preferred; clinical trial) rather than imatinib (wrong target). Imatinib wired as Cat 2B accessible-only fallback alternative."

sources:
  - SRC-NCCN-GIST-2025
  - SRC-ONCOKB
last_reviewed: '2026-05-04'
notes: >
  KIT exon 9 dose-escalation (400 → 800 mg) is encoded inside
  REG-IMATINIB-GIST-1L dose_adjustments; not a separate Indication.
  UPDATED 2026-05-04 (Workstream FV): IND-GIST-1L-WT-CLINICAL-TRIAL wired at
  step 3 if_true (WT GIST gate). Imatinib is NOT standard for WT GIST — step 3
  now correctly routes WT to clinical trial preferred, with imatinib as Cat 2B
  accessible-only fallback. WT-GIST gap CLOSED.

  POST-1L CASCADE: ALGO-GIST-2L authored 2026-05-04 (Workstream DF).
  Sequential NCCN Cat 1 cascade fully wired:
    2L sunitinib (IND-GIST-2L-SUNITINIB; SUN1111; Demetri 2006 Lancet)
    3L regorafenib (IND-GIST-3L-REGORAFENIB; GRID; Demetri 2013 Lancet)
    4L ripretinib (IND-GIST-4L-RIPRETINIB; INVICTUS; Blay 2020)
  Gap CLOSED (2026-05-04).
