id: ALGO-HCL-2L
applicable_to_disease: DIS-HCL
applicable_to_line_of_therapy: 2
purpose: >
  Select 2L Indication for relapsed/refractory hairy cell leukemia
  after 1L purine analog (cladribine or pentostatin). Routing
  branches on BIO-BRAF-V600E mutation status (defining HCL feature,
  ~100% positive in classic HCL but absent in HCL-variant):

  - BRAF-V600E POSITIVE (classic HCL): IND-HCL-2L-VEMURAFENIB-
    RITUXIMAB (vemurafenib + rituximab combo, NEJM Tiacci 2021;
    chemo-free, deep MRD-negative responses).

  - BRAF-V600E NEGATIVE (HCL-variant or rare WT): IND-HCL-2L-
    CLADRIBINE-RETREATMENT (cladribine same 7-day course; ORR ~80-92%;
    NCCN Cat 1; Workstream AW 2026-05-04).

  2L entry triggered by: documented HCL relapse (cytopenia
  recurrence, splenomegaly progression, marrow infiltration) ≥1y
  after 1L purine analog response, OR primary refractoriness
  (failure to achieve hematologic CR after 1L cladribine 7-day
  course).

output_indications:
  - IND-HCL-2L-VEMURAFENIB-RITUXIMAB
  - IND-HCL-2L-VEMURAFENIB
  - IND-HCL-2L-CLADRIBINE-RETREATMENT
  - IND-HCL-2L-PENTOSTATIN-SWITCH

default_indication: IND-HCL-2L-VEMURAFENIB-RITUXIMAB
alternative_indication: IND-HCL-2L-CLADRIBINE-RETREATMENT

decision_tree:
  # Step 1 — frail / organ dysfunction precluding both vemurafenib
  # (hepatic, QTc, severe arthralgia history) and intensive purine
  # retreatment: free-text rituximab monotherapy or best-supportive-
  # care.
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-HCL-FRAILTY-AGE
        - red_flag: RF-HCL-ORGAN-DYSFUNCTION
    if_true:
      result: IND-HCL-2L-VEMURAFENIB  # placeholder; see notes — R-mono / BSC alternative
    if_false:
      next_step: 2

  # Step 2 — BRAF-V600E POSITIVE (classic HCL ~100%): vemurafenib
  # + rituximab is the chemo-free targeted 2L preferred per NCCN /
  # NEJM Tiacci 2021 (median PFS not reached, deep MRD-negative).
  # Routes to IND-HCL-2L-VEMURAFENIB-RITUXIMAB (combination, Cat 1).
  - step: 2
    evaluate:
      all_of:
        - biomarker: BIO-BRAF-V600E
          comparator: "positive"
        - condition: "HCL relapse documented (cytopenia, splenomegaly, marrow infiltration) OR primary refractory after 1L purine"
    if_true:
      result: IND-HCL-2L-VEMURAFENIB-RITUXIMAB
    if_false:
      next_step: 3
    notes: "Updated 2026-05-04 (Workstream CL): routes to IND-HCL-2L-VEMURAFENIB-RITUXIMAB (combo, Cat 1) instead of monotherapy. Gap (4) CLOSED. MDT-only after CSD-7A audit — composite is biomarker/disease-specific; no pan-disease RF applies."

  # Step 3 — BRAF-V600E NEGATIVE (HCL-variant) OR vemurafenib
  # contraindicated/inaccessible: cladribine retreatment (>1y
  # interval from 1L) OR pentostatin switch. No dedicated 2L
  # indication; routes to IND-HCL-1L-CLADRIBINE / IND-HCL-1L-
  # PENTOSTATIN with MDT note.
  - step: 3
    evaluate:
      any_of:
        - biomarker: BIO-BRAF-V600E
          comparator: "negative (HCL-variant or rare WT)"
        - condition: "Vemurafenib inaccessible / contraindicated (severe arthralgia history, QTc prolongation, hepatic dysfunction)"
        - condition: "Late relapse (>1y from 1L) — cladribine retreatment retains efficacy"
        - red_flag: RF-HCL-ORGAN-DYSFUNCTION
        - red_flag: RF-HCL-TRANSFORMATION-PROGRESSION
    if_true:
      next_step: 31
      notes: >
        BRAF-V600E negative (HCL-variant) OR vemurafenib inaccessible/contraindicated
        OR late relapse (>1y from 1L) → step 31 (purine cross-over gate): early
        relapse / cladribine-refractory → pentostatin switch; late relapse (>1y) →
        cladribine retreatment.
    if_false:
      next_step: 4

  # Step 31 — Purine analog cross-over gate: pentostatin vs cladribine retreatment.
  # Key clinical question: was 1L cladribine AND is it early relapse (<1y)?
  # Early relapse (<1y from last cladribine dose) OR cladribine-refractory: pentostatin
  # switch preferred — different mechanism allows response without sufficient purine interval.
  # Late relapse (>1y from 1L): cladribine retreatment highly effective (ORR ~80-92%).
  # NCCN HCL 2025: both pentostatin and cladribine are Category 1 for 2L; cross-over endorsed.
  # Ukraine: cladribine (Litak/Biodribin) NSZU-funded; pentostatin access limited — if
  # pentostatin inaccessible even for early relapse, cladribine retreatment is acceptable
  # fallback (document shorter interval; monitor response carefully).
  - step: 31
    evaluate:
      any_of:
        - condition: "1L was cladribine AND relapse within 12 months of last cladribine dose (early relapse)"
        - condition: "Cladribine-refractory: failure to achieve complete remission after 1L cladribine × 1-2 courses"
    if_true:
      result: IND-HCL-2L-PENTOSTATIN-SWITCH
      notes: >
        Early relapse (<1y from cladribine 1L) or cladribine-refractory: pentostatin
        switch preferred (REG-PENTOSTATIN-HCL; 4 mg/m² IV q2w × 6-12 doses; ORR ~95%;
        CR ~80-92%; NCCN Cat 1). Ukraine: if pentostatin inaccessible (not NSZU-funded)
        → cladribine retreatment acceptable with documented shorter interval + close
        monitoring; or vemurafenib+rituximab for BRAF V600E+ (IND-HCL-2L-VEMURAFENIB-RITUXIMAB).
    if_false:
      result: IND-HCL-2L-CLADRIBINE-RETREATMENT
      notes: >
        Late relapse (>1y from 1L cladribine) OR 1L was pentostatin: cladribine retreatment
        (REG-CLADRIBINE-SINGLE; same 7-day protocol; ORR ~80-92%; NCCN Cat 1).
        Ukraine: NSZU-funded + widely accessible. PJP + antiviral prophylaxis mandatory.
    notes: "Step 31 added 2026-05-04 (Workstream CW): purine cross-over gate — early relapse (<1y) / cladribine-refractory → pentostatin (IND-HCL-2L-PENTOSTATIN-SWITCH); late relapse (>1y) → cladribine retreatment. Gap (2) CLOSED."

  # Step 4 — default fall-through: BRAF-V600E+ classic HCL →
  # vemurafenib + rituximab combination (preferred NCCN Cat 1).
  - step: 4
    evaluate:
      any_of:
        - condition: "Classic HCL (BRAF-V600E+), 2L+ relapsed/refractory"
        - red_flag: RF-HCL-TRANSFORMATION-PROGRESSION
    if_true:
      result: IND-HCL-2L-VEMURAFENIB-RITUXIMAB
    if_false:
      result: IND-HCL-2L-VEMURAFENIB-RITUXIMAB
    notes: "Updated 2026-05-04 (Workstream CL): routes to IND-HCL-2L-VEMURAFENIB-RITUXIMAB (combo, Cat 1; Tiacci 2021 NEJM). Gap (4) CLOSED."

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-05-04"
notes: >
  UPDATED 2026-05-04 (Workstream AW): IND-HCL-2L-CLADRIBINE-RETREATMENT authored
  and wired at step 3 if_true (BRAF-V600E negative/vemurafenib-inaccessible/late relapse
  >1y → cladribine retreatment; REG-CLADRIBINE-SINGLE reused; ORR ~80-92%; NCCN Cat 1;
  PJP + antiviral prophylaxis mandatory). Gap (1) CLOSED.
  UPDATED 2026-05-04 (Workstream CL): IND-HCL-2L-VEMURAFENIB-RITUXIMAB authored and
  wired at steps 2 and 4 (vemurafenib 960 mg BID × 8w + rituximab × 8 doses; Tiacci
  2021 NEJM; ORR ~100%; CR ~87%; uMRD ~67%; NCCN Cat 1). DRUG-VEMURAFENIB entity
  authored. REG-VEMURAFENIB-HCL-RELAPSED updated to include DRUG-VEMURAFENIB component
  and Tiacci 2021 scheduling details. IND-HCL-2L-VEMURAFENIB (monotherapy) retained as
  alternative when rituximab inaccessible. Gap (4) CLOSED.

  UPDATED 2026-05-04 (Workstream CW): IND-HCL-2L-PENTOSTATIN-SWITCH authored and
  wired at step 31 (early relapse <1y / cladribine-refractory → pentostatin cross-over;
  REG-PENTOSTATIN-HCL authored; 4 mg/m² IV q2w × 6-12 doses; ORR ~95%; NCCN Cat 1).
  Step 3 if_true now routes to step 31 instead of direct cladribine result. Gap (2) CLOSED.
  ROUTING SUMMARY (full):
  (1) frail/organ dysfunction → vemurafenib placeholder (BSC/R-mono MDT);
  (2) BRAF V600E+ classic HCL → IND-HCL-2L-VEMURAFENIB-RITUXIMAB (Cat 1 preferred);
  (3→31) BRAF V600E-neg / vemurafenib-inaccessible / late relapse → step 31 (purine cross-over);
  (31) early relapse <1y / cladribine-refractory → pentostatin switch (IND-HCL-2L-PENTOSTATIN-SWITCH);
  (31) late relapse >1y → cladribine retreatment (IND-HCL-2L-CLADRIBINE-RETREATMENT).
  OOS / wiring gaps:
  (3) Moxetumomab pasudotox — withdrawn from market 2023 (sponsor decision), not modeled.
  (5) Allogeneic SCT for chemo-refractory young HCL — referral, outside KB.
  (6) Splenectomy for symptomatic hypersplenism — surgical referral, outside KB.
  (7) HCL-variant (BRAF-V600E-WT, IGHV4-34+): rituximab + bendamustine OR R + cladribine — not modeled.
  (8) reviewer_signoffs: 0 — pending two Clinical Co-Lead approvals.
