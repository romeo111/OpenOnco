id: ALGO-HCV-MZL-2L
applicable_to_disease: DIS-HCV-MZL
applicable_to_line_of_therapy: 2
purpose: >
  Select 2L Indication for HCV-associated MZL after 1L direct-acting
  antiviral (DAA) ± rituximab. Routing branches on HCV virologic
  outcome (BIO-HCV-STATUS / BIO-HCV-RNA) at SVR12 milestone:

  - SVR12 NOT achieved (HCV-RNA detectable 12wk post-DAA): retreat
    with second-line DAA regimen (sofosbuvir/velpatasvir/voxilaprevir
    or glecaprevir/pibrentasvir) + add BR if lymphoma persists/
    progresses despite re-eradication.

  - SVR12 ACHIEVED + lymphoma relapse (HCV-cleared but MZL
    progresses): straight to BR (no further DAA benefit, lymphoma
    is now antigen-independent).

  Default 2L indication is IND-HCV-MZL-POST-DAA-SURVEILLANCE for
  the ~70% of HCV-MZL patients in whom DAA-induced HCV eradication
  produces durable lymphoma response (no chemo needed); BR routed
  via free-text MDT note when surveillance flags relapse.

  2L entry triggered by: HCV-RNA positive at week 12 post-DAA
  (virologic failure), OR lymphoma progression on imaging despite
  achieved SVR12, OR transformation to aggressive histology.

output_indications:
  - IND-HCV-MZL-POST-DAA-SURVEILLANCE
  - IND-HCV-MZL-2L-BR
  - IND-HCV-MZL-2L-DAA-RETREATMENT

default_indication: IND-HCV-MZL-POST-DAA-SURVEILLANCE
alternative_indication: IND-HCV-MZL-2L-BR

decision_tree:
  # Step 1 — histologic transformation suspected → upstream re-biopsy
  # + ALGO-DLBCL routing.
  - step: 1
    evaluate:
      any_of:
        - condition: "Aggressive histology suspected at relapse (rapid growth, B-symptoms, LDH ↑↑, extranodal sites)"
        - red_flag: RF-AGGRESSIVE-HISTOLOGY-TRANSFORMATION
    if_true:
      result: IND-HCV-MZL-POST-DAA-SURVEILLANCE  # placeholder; see notes — routes to ALGO-DLBCL
    if_false:
      next_step: 2

  # Step 2 — SVR12 NOT achieved (HCV-RNA detectable post-DAA) →
  # DAA retreatment (GLE/PIB 16w; EASL 2023 rescue regimen).
  # If lymphoma progressing despite retreatment: add BR concurrent after week 4.
  - step: 2
    evaluate:
      all_of:
        - biomarker: BIO-HCV-RNA
          comparator: "detectable at week 12 post-DAA (SVR12 not achieved)"
    if_true:
      result: IND-HCV-MZL-2L-DAA-RETREATMENT
      notes: >
        SVR12 not achieved: second-line DAA (GLE/PIB 16 weeks; REG-DAA-RETREAT-GLECPIBR;
        EASL HCV 2023; UA: SOF/VEL/VOX not registered → GLE/PIB accessible alternative).
        If lymphoma also progressing → add BR (IND-HCV-MZL-2L-BR) concurrent after
        week 4 of retreatment (once HCV-RNA suppressing; MDT decision).
        HBV screen + entecavir mandatory before any rituximab addition.
    if_false:
      next_step: 3
    notes: "Step 2 wired 2026-05-04 (Workstream CA): placeholder removed; IND-HCV-MZL-2L-DAA-RETREATMENT wired for SVR12-failure track. Gap (1) CLOSED."

  # Step 3 — SVR12 achieved + lymphoma relapse (HCV cleared, MZL
  # now antigen-independent / clonal escape) → BR. Histologic
  # transformation exclusion (re-biopsy) is mandatory before BR.
  # BR ORR ~70-80% (REG-R-BENDAMUSTINE-RELAPSED-MZL; Rummel 2013 StiL;
  # extrapolated from SMZL/NMZL relapsed; NCCN Cat 2A for relapsed MZL).
  - step: 3
    evaluate:
      all_of:
        - biomarker: BIO-HCV-RNA
          comparator: "undetectable at SVR12 (HCV cleared)"
        - condition: "Documented lymphoma progression on imaging or biopsy after DAA"
        - condition: "Histologic transformation excluded on relapse biopsy (DLBCL ruled out)"
    if_true:
      result: IND-HCV-MZL-2L-BR
      notes: >
        SVR12-achieved HCV-MZL relapse (antigen-independent): BR (bendamustine 90 mg/m²
        d1-2 + rituximab 375 mg/m² d1 q28d × 4-6 cycles; REG-R-BENDAMUSTINE-RELAPSED-MZL;
        NCCN Cat 2A). ORR ~70-80%; mPFS ~24-36 months. HBV screen + entecavir mandatory
        before rituximab. HCV-RNA must be undetectable (SVR12) before starting BR.
        Rebiopsy at relapse is mandatory — transformation to DLBCL in ~10-15% of relapses
        requires aggressive salvage (not BR). Ukraine: BR both NSZU-funded; accessible.
    if_false:
      next_step: 4
    notes: "Step 3 updated 2026-05-04 (Workstream BK): SVR12-achieved relapse → IND-HCV-MZL-2L-BR (wired; placeholder removed). Gap (2) CLOSED. Free-text conditions; MDT rebiopsy + HCV-RNA verification mandatory."

  # Step 4 — default: routine post-DAA surveillance (~70% of patients
  # achieve durable lymphoma response from HCV eradication alone).
  - step: 4
    evaluate:
      all_of:
        - biomarker: BIO-HCV-STATUS
          comparator: "categorical (post-DAA)"
        - condition: "No documented relapse / progression"
    if_true:
      result: IND-HCV-MZL-POST-DAA-SURVEILLANCE
    if_false:
      result: IND-HCV-MZL-POST-DAA-SURVEILLANCE
    notes: "MDT-only after CSD-7A audit — composite is biomarker/disease-specific (not fitness/eligibility/prior-therapy), so no pan-disease RF applies. Wireable only via dedicated disease-specific RFs in a future round."

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-BSH-MZL-2024
  - SRC-EASL-HCV-2023

last_reviewed: "2026-05-04"
notes: >
  UPDATED 2026-05-04 (Workstream CA): IND-HCV-MZL-2L-DAA-RETREATMENT authored and
  wired at step 2 for SVR12-failure track (EASL HCV 2023; GLE/PIB 16w;
  REG-DAA-RETREAT-GLECPIBR; SOF/VEL/VOX preferred but not UA-registered → GLE/PIB
  accessible alternative). Gap (1) CLOSED.

  ROUTING SUMMARY (post-CA):
  (1) Aggressive histology at relapse → histology re-biopsy + DLBCL-routing (placeholder)
  (2) HCV-RNA detectable at SVR12 → IND-HCV-MZL-2L-DAA-RETREATMENT (GLE/PIB 16w ±
      concurrent BR if lymphoma progressing)
  (3) HCV cleared (SVR12) + lymphoma relapsed → IND-HCV-MZL-2L-BR (BR)
  (4) Post-DAA, no relapse → IND-HCV-MZL-POST-DAA-SURVEILLANCE

  EARLIER UPDATES:
  Workstream BK (2026-05-04): IND-HCV-MZL-2L-BR wired at step 3. Gap (2) CLOSED.

  OOS / wiring gaps remaining:
  (3) Histologic transformation routing (step 1 if_true) uses placeholder IND-HCV-MZL-
  POST-DAA-SURVEILLANCE — correct routing would be separate DLBCL-context indication;
  deferred pending disease-state entity authoring.
  (4) BIO-HCV-RNA comparator is free-text (no numeric binding) — wireable only when
  quantitative biomarker comparator engine supports HCV-RNA threshold semantics.
  (3) Histologic transformation routing must be resolved at upstream
  disease-resolution stage (re-biopsy mandatory at any clinical
  progression in HCV-MZL given baseline transformation risk).
  (4) Branching uses BIO-HCV-RNA (quantitative confirmation) plus
  BIO-HCV-STATUS (screening); BIO-HCV-RNA is the actionable
  biomarker per EASL 2023 (anti-HCV antibody persists for life
  even after clearance).
  (5) IND-HCV-MZL-POST-DAA-SURVEILLANCE serves as the algorithmic
  anchor — it covers the ~70% durable-response track and acts as
  surveillance gate for the ~30% who progress (escalation to DAA
  retreatment or BR is MDT-driven via free-text triggers).
  (6) reviewer_signoffs: 0 — pending two Clinical Co-Lead approvals.
