id: ALGO-HNSCC-RM-1L
applicable_to_disease: DIS-HNSCC
applicable_to_line_of_therapy: 1
purpose: >
  Select 1L systemic therapy for recurrent / metastatic HNSCC by
  PD-L1 CPS stratum (KEYNOTE-048 framework). CPS ≥20: pembrolizumab
  monotherapy (less toxicity, equivalent OS). CPS 1-19: pembrolizumab
  + 5-FU + platinum (chemo-IO superior OS to EXTREME). CPS <1:
  EXTREME (cetuximab + 5-FU + platinum) — chemo-IO benefit attenuated
  in CPS<1 subgroup of KEYNOTE-048 (OS HR crossed 1.0). Locally
  advanced (curative-intent) HNSCC is out of scope for this algorithm.

output_indications:
  - IND-HNSCC-RM-1L-PEMBRO-CHEMO
  - IND-HNSCC-RM-1L-PEMBRO-MONO-CPS-HIGH
  - IND-HNSCC-RM-1L-EXTREME

default_indication: IND-HNSCC-RM-1L-PEMBRO-CHEMO
alternative_indication: IND-HNSCC-RM-1L-PEMBRO-MONO-CPS-HIGH

decision_tree:
  # Step 0 — CPS<1 → EXTREME (Vermorken NEJM 2008). Direct finding lookup
  # on patient.findings.pdl1_cps_negative (true when CPS=0) OR pdl1_cps
  # numeric < 1. Engine resolves `condition: pdl1_cps_negative` via
  # _resolve_finding to the patient's boolean. W5b drift fix (2026-04-30) —
  # additive only; original step 1 + step 2 preserved verbatim below.
  - step: 0
    evaluate:
      any_of:
        - condition: "pdl1_cps_negative"
        - all_of:
            - finding: "pdl1_cps"
              threshold: 1
              comparator: "<"
    if_true:
      result: IND-HNSCC-RM-1L-EXTREME
    if_false:
      next_step: 1
    notes: "EXTREME for CPS<1 (chemo-IO benefit attenuated per KEYNOTE-048 subgroup)."

  - step: 1
    evaluate:
      any_of:
        - condition: "PD-L1 CPS ≥20 AND no rapid progression / visceral crisis AND ECOG 0-2"
    if_true:
      result: IND-HNSCC-RM-1L-PEMBRO-MONO-CPS-HIGH
    if_false:
      next_step: 2
    notes: >
      RF-HNSCC-TRANSFORMATION-PROGRESSION removed (2026-05-08): it is a
      hold/critical flag (rapid progression / airway compromise) that
      CONTRA-indicates pembro-mono, not selects it. Patients with that RF
      firing should fall through to step 2 (pembro-chemo default) or
      palliative hold per MDT. Biomarker gate (CPS ≥20 numeric finding
      lookup via RF-HNSCC-CPS-HIGH) deferred to future RF authoring round.
  - step: 2
    evaluate:
      any_of:
        - condition: "PD-L1 CPS ≥1"
    if_true:
      result: IND-HNSCC-RM-1L-PEMBRO-CHEMO
    if_false:
      result: IND-HNSCC-RM-1L-PEMBRO-CHEMO
    notes: >
      Degenerate step — both branches route to pembro-chemo. CPS <1 is
      already handled in step 0 (→ EXTREME), so any patient reaching this
      step has CPS ≥1 and pembro-chemo is the correct default. Remove step
      when CPS 1-19 vs ≥20 gets a further bifurcating Indication.

sources:
  - SRC-NCCN-HNSCC-2025
  - SRC-EXTREME-VERMORKEN-2008
last_reviewed: '2026-05-08'
notes: >
  W5b drift fix (2026-04-30): added step 0 only — CPS<1 → EXTREME.
  W5c structural fix (2026-05-08): removed RF-HNSCC-TRANSFORMATION-
  PROGRESSION from step 1 any_of — it is a hold/critical flag that
  contra-indicates pembro-mono (rapid progression / airway compromise),
  not a positive selector for it. CPS-stratum biomarker gate
  (RF-HNSCC-CPS-HIGH with numeric pdl1_cps ≥20 finding lookup) deferred
  to future RF authoring round.
  Genotype-driven 1L (HRAS-mutant tipifarnib, NTRK-fusion
  larotrectinib/entrectinib, BRAF V600E dabra+trame) are
  investigational / accelerated and not authored as 1L Indications
  here. Locally advanced HNSCC (definitive cisplatin + RT, induction
  chemo, larynx-preservation strategies) is a separate algorithm not
  yet authored.
