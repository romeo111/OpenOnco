id: ALGO-MCL-2L
applicable_to_disease: DIS-MCL
applicable_to_line_of_therapy: 2
purpose: 'Select 2L+/relapsed MCL Indication. Three tracks: (1) cBTKi-naive at 1L progression → acalabrutinib (preferred 2L BTKi, better cardiac safety than ibrutinib); (2) post-cBTKi failure with BTK-C481 mutation OR clinical resistance → pirtobrutinib (non-covalent, retains activity vs C481-mut); (3) post-cBTKi AND CAR-T-eligible (age ≤70, fit) → brexucabtagene autoleucel (CAR-T, durable 2-yr remission).

  '
output_indications:
- IND-MCL-2L-ACALABRUTINIB
- IND-MCL-3L-PIRTOBRUTINIB
- IND-MCL-3L-BREXUCEL-CART
default_indication: IND-MCL-2L-ACALABRUTINIB
alternative_indication: IND-MCL-3L-BREXUCEL-CART
decision_tree:
- step: 1
  evaluate:
    all_of:
    - condition: 1L progression (post-chemo or post-BTKi+R from 1L algo)
    - none_of:
      - red_flag: RF-PRIOR-BTKI-PROGRESSION
  if_true:
    result: IND-MCL-2L-ACALABRUTINIB
  if_false:
    next_step: 2
  notes: Partially wired - fitness/eligibility gates wired via CSD-7A pan-disease RFs; remaining condition(s) kept as MDT-evaluated text (no RF available for that criterion).
- step: 2
  evaluate:
    any_of:
    - red_flag: RF-MCL-BLASTOID-VARIANT
    - red_flag: RF-PRIOR-BTKI-PROGRESSION
  if_true:
    next_step: 21
  if_false:
    next_step: 3
  notes: "Wired via RF-MCL-BLASTOID-VARIANT (CSD-9A) + RF-PRIOR-BTKI-PROGRESSION: blastoid/pleomorphic histology OR documented post-cBTKi progression flags candidacy for CAR-T; sequential step 21 then checks fitness + CAR-T eligibility before routing to brexucel."
- step: 21
  evaluate:
    all_of:
    - red_flag: RF-FITNESS-ECOG-FIT
    - red_flag: RF-CAR-T-ELIGIBLE
  if_true:
    result: IND-MCL-3L-BREXUCEL-CART
  if_false:
    next_step: 3
  notes: "Sequential CAR-T gate after blastoid/post-cBTKi flag (step 2): only fit + CAR-T-eligible patients route to brexucel (ZUMA-2); else fall through to pirtobrutinib (step 3)."
- step: 3
  evaluate:
    any_of:
    - red_flag: RF-PRIOR-BTKI-PROGRESSION
    - finding: btk_c481_mutation
      value: true
    - finding: btk_c481_status
      value: mutated_S
    - finding: btk_c481_status
      value: mutated
  if_true:
    result: IND-MCL-3L-PIRTOBRUTINIB
  if_false:
    result: IND-MCL-2L-ACALABRUTINIB
  notes: "Wired via universal RF-PRIOR-BTKI-PROGRESSION (post-cBTKi failure) OR structured btk_c481_mutation/btk_c481_status finding (BRUIN MCL-321: pirtobrutinib ORR 58% post-cBTKi, retains activity vs C481-mut). Free-text 'CAR-T-ineligible' from prior version is implicit — step 21 already gates fit + CAR-T-eligible patients to brexucel before falling through to step 3, so step 3 inherently captures CAR-T-ineligible post-cBTKi cases."
sources:
- SRC-NCCN-BCELL-2025
- SRC-ESMO-MCL-2024
last_reviewed: '2026-04-26'
notes: 'OOS / wiring gaps: (1) Bridging therapy for brexucel (rituximab, BTKi continuation, RT) not modeled as separate indication. (2) Lisocabtagene maraleucel (TRANSCEND-NHL-001 MCL cohort) FDA- approved alternative to brexucel — not modeled. (3) Venetoclax-based combos for post-BTKi MCL not modeled. (4) Allogeneic SCT for fit younger post-CAR-T relapse — outside KB scope (transplant referral handled in MDT brief). (5) RF-MCL-BLASTOID-OR-TP53 fires at 1L only; recurrence at relapse doesn''t switch indication here but should surface in trace.

  '
