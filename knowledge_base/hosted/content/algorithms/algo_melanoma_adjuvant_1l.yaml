id: ALGO-MELANOMA-ADJUVANT-1L
applicable_to_disease: DIS-MELANOMA
applicable_to_line_of_therapy: 1
applicable_to_disease_state: adjuvant
purpose: >
  Adjuvant 1L melanoma — resected stage III (KEYNOTE-054) and resected
  stage IV (KEYNOTE-054 expansion + CheckMate-238 stage IV inclusion).
  Standard track: pembrolizumab × 12 months (KEYNOTE-054, FDA Feb
  2019). BRAF-V600 mutants have an alternative of dabrafenib +
  trametinib × 12 months (COMBI-AD) — not authored as a separate
  Indication here; surfaced as an MDT note via
  RF-MELANOMA-BRAF-V600-ACTIONABLE.

output_indications:
  - IND-MELANOMA-ADJUVANT-PEMBRO-STAGE-III
default_indication: IND-MELANOMA-ADJUVANT-PEMBRO-STAGE-III
alternative_indication: null

decision_tree:
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-MELANOMA-STAGE-III-RESECTED
    if_true:
      result: IND-MELANOMA-ADJUVANT-PEMBRO-STAGE-III
    if_false:
      result: IND-MELANOMA-ADJUVANT-PEMBRO-STAGE-III
    notes: >
      Single-branch scaffold — current curated patient profiles do not
      carry `disease_state: "adjuvant"`, so this algorithm is reached
      only when the orchestrator explicitly sets it. The metastatic-1L
      algorithm carries an additive step 0 (RF-MELANOMA-STAGE-III-
      RESECTED) that re-routes adjuvant biology to this Indication
      without requiring the patient JSON migration.

sources:
  - SRC-NCCN-MELANOMA-2025
  - SRC-ESMO-MELANOMA-2024
  - SRC-KEYNOTE-054-EGGERMONT-2018

last_reviewed: "2026-04-30"
notes: >
  Future scaffolding. Engine wiring for the existing curated case
  patient_melanoma_adjuvant_pembro_stage_iii.json comes via an additive
  step 0 in ALGO-MELANOMA-METASTATIC-1L (load-order fallback), not via
  this state-tagged algorithm. Once the curated JSON migrates to set
  `disease_state: "adjuvant"`, traffic shifts here directly.
  BRAF-mutant aggressive-track (COMBI-AD) and stage IIB/IIC
  (KEYNOTE-716) are deliberately not authored in this scaffold —
  both are out of scope for the W5b drift fixes.
notes_ua: >
  Скаффолд майбутнього. Підключення рушія для існуючого відкурованого
  випадку patient_melanoma_adjuvant_pembro_stage_iii.json здійснюється
  через додатковий крок 0 в ALGO-MELANOMA-METASTATIC-1L (резервна логіка
  завантаження), а не через цей алгоритм з тегом стану. Після міграції
  відкурованого JSON з встановленням `disease_state: "adjuvant"` трафік
  переходить сюди безпосередньо. Агресивний трек BRAF-мутантів (COMBI-AD)
  та стадії IIB/IIC (KEYNOTE-716) навмисно не описані в цьому скаффолді —
  обидва поза обсягом дрейф-виправлень W5b.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_13
draft_revision: 2
