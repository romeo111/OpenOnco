id: ALGO-MF-SEZARY-2L
applicable_to_disease: DIS-MF-SEZARY
applicable_to_line_of_therapy: 2
purpose: >
  Relapsed/refractory advanced MF/Sézary — five branches: (1) post
  CR/PR to induction → bexarotene low-dose maintenance to extend
  response; (2) CD30+ + BV-naive → BV mono (ALCANZA); (3) Sézary
  leukemic + moga-naive → mogamulizumab; (4) plaque-dominant MF +
  CrCl ≥30 → methotrexate 5-25 mg/week (NCCN Cat 2A); (5) erythrodermic/
  non-plaque + QTcF ≤480 ms + romidepsin accessible → romidepsin (HDACi;
  Whittaker 2010 JCO; ORR ~34%; NCCN Cat 2A); default → bexarotene.

output_indications:
  - IND-MF-MAINTENANCE-RETINOID
  - IND-MF-ADVANCED-2L-BEXAROTENE
  - IND-MF-ADVANCED-1L-MOGA
  - IND-MF-ADVANCED-1L-BV
  - IND-MF-ADVANCED-2L-METHOTREXATE
  - IND-MF-ADVANCED-2L-ROMIDEPSIN
  - IND-MF-ADVANCED-2L-VORINOSTAT
  - IND-MF-TRANSFORMED-PRALATREXATE

default_indication: IND-MF-ADVANCED-2L-BEXAROTENE
alternative_indication: IND-MF-ADVANCED-2L-ROMIDEPSIN

decision_tree:
  # Step 0 — large-cell transformation (LCT) gate: pralatrexate for CD30-neg LCT-MF.
  # MF with confirmed LCT (biopsy ≥25% large cells) behaves like aggressive T-cell
  # lymphoma — standard CTCL skin-directed and retinoid/MTX approaches are ineffective.
  # Pralatrexate (antifolate; PROPEL ORR ~29%; NCCN Cat 2A) endorsed for transformed CTCL.
  # CD30+ LCT (~30-50% of cases): brentuximab vedotin preferred — routes via step 2 (BV gate).
  # Pralatrexate-inaccessible LCT: MDT + CHOP-based / gemcitabine outside KB scope.
  - step: 0
    evaluate:
      all_of:
        - condition: "Biopsy-confirmed large-cell transformation (LCT; ≥25% large cells on skin or nodal biopsy)"
        - condition: "CD30-negative on transformation biopsy (IHC <10% large cells) OR brentuximab vedotin inaccessible/contraindicated"
        - condition: "Pralatrexate accessible (named-patient import from US feasible; MDT + pharmacy confirmed)"
    if_true:
      result: IND-MF-TRANSFORMED-PRALATREXATE
      notes: >
        Biopsy-confirmed LCT-MF + CD30-negative (or BV-inaccessible) + pralatrexate accessible:
        pralatrexate 30 mg/m² IV weekly ×6 of 7-week cycle (REG-PRALATREXATE-PTCL; PROPEL
        O'Connor 2011 JCO; ORR ~29% r/r CTCL/PTCL; NCCN Cat 2A). Mandatory folate 1 mg PO
        daily (start ≥10 days before first dose) + B12 1 mg IM q8-10w. Bridge to alloSCT
        for fit CR/PR responders. Ukraine: not registered; CHOP/gemcitabine UA fallback.
    if_false:
      next_step: 1
    notes: "Step 0 added 2026-05-04 (Workstream CZ): LCT-MF pralatrexate gate. Gap (1) CLOSED. CD30+ LCT → falls to step 2 (BV gate); pralatrexate-inaccessible LCT → MDT/CHOP/gemcitabine outside KB scope."

  # Step 1 — in CR/PR to induction → maintenance
  - step: 1
    evaluate:
      all_of:
        - condition: "Best response to induction is CR or PR"
        - condition: "Tolerating systemic therapy"
    if_true:
      result: IND-MF-MAINTENANCE-RETINOID
    if_false:
      next_step: 2
    notes: "MDT-only after CSD-7A audit — composite is biomarker/disease-specific (not fitness/eligibility/prior-therapy), so no pan-disease RF applies. Wireable only via dedicated disease-specific RFs in a future round."

  # Step 2 — CD30+ relapse and BV-naive → BV mono
  - step: 2
    evaluate:
      all_of:
        - red_flag: RF-TCELL-CD30-POSITIVE
        - condition: "Brentuximab vedotin not previously administered"
    if_true:
      result: IND-MF-ADVANCED-1L-BV
    if_false:
      next_step: 3

  # Step 3 — Sézary blood-dominant and moga-naive → mogamulizumab
  - step: 3
    evaluate:
      all_of:
        - red_flag: RF-MF-SEZARY-LEUKEMIC
        - condition: "Mogamulizumab not previously administered"
    if_true:
      result: IND-MF-ADVANCED-1L-MOGA
    if_false:
      next_step: 4

  # Step 4 — Plaque-dominant MF (not Sézary/erythrodermic) + renal adequate →
  # low-dose methotrexate (NCCN Cat 2A; Coors 2004; ORR ~58% plaque-MF).
  # Bexarotene preferred for erythrodermic or Sézary-dominant presentation.
  # MTX preferred for plaque-dominant disease where retinoid + lipid burden
  # of bexarotene is undesirable. Both are NCCN Cat 2A; MDT choice.
  - step: 4
    evaluate:
      all_of:
        - condition: "Plaque or patch dominant MF (stage IB-IIA or IIB skin-dominant; NOT primarily erythrodermic/blood disease)"
        - condition: "CrCl ≥30 mL/min (methotrexate renally cleared; CrCl <30 → bexarotene)"
    if_true:
      result: IND-MF-ADVANCED-2L-METHOTREXATE
      notes: >
        Plaque-dominant MF + adequate renal function: methotrexate 5-25 mg/week PO
        (REG-METHOTREXATE-MF). NCCN Cat 2A; Coors 2004 ORR ~58%.
        Folic acid supplementation mandatory (not on MTX day). Monitor LFT monthly × 3.
        Bexarotene is an equivalent alternative: use if erythrodermic presentation or
        patient preference for non-antifolate mechanism.
    if_false:
      next_step: 5
    notes: "MTX gate added 2026-05-04 (Workstream AO). Updated 2026-05-04 (Workstream BI): step 4 if_false now routes to step 5 (romidepsin gate) before bexarotene fallback."

  # Step 5 — Erythrodermic/non-plaque MF or CrCl <30 (MTX contraindicated):
  # HDACi (romidepsin) as systemic alternative to bexarotene.
  # Romidepsin 14 mg/m² IV days 1,8,15 q28d (Whittaker 2010 JCO; ORR 34%; mDOR 15 mo;
  # FDA approved CTCL 2009; NCCN Cat 2A). QTcF ≤480 ms required; electrolyte repletion.
  # Bexarotene preferred when romidepsin inaccessible (UA: romidepsin not registered).
  - step: 5
    evaluate:
      all_of:
        - condition: "QTcF ≤480 ms at baseline ECG (HDACi class contraindicated if QTcF >480 ms)"
        - condition: "No Grade ≥3 cardiac arrhythmia or uncontrolled heart failure precluding HDACi"
        - condition: "Romidepsin accessible (named-patient import, compassionate access, or clinical trial)"
    if_true:
      result: IND-MF-ADVANCED-2L-ROMIDEPSIN
      notes: >
        Erythrodermic/non-plaque MF or CrCl <30 + QTcF adequate + romidepsin accessible:
        romidepsin 14 mg/m² IV days 1,8,15 q28d (REG-ROMIDEPSIN-PTCL; Whittaker 2010 JCO;
        ORR 34%; mDOR 15 months; NCCN Cat 2A). Active across MF stages IIB-IV.
        K+/Mg²+ repletion mandatory before each infusion. ECG monitoring each cycle.
        Ukraine: not registered — named-patient only. Substantial access barrier.
    if_false:
      next_step: 51
    notes: "Step 5 added 2026-05-04 (Workstream BI): romidepsin HDACi gate. Gap (3) CLOSED. if_false updated 2026-05-04 (Workstream CN): routes to step 51 (vorinostat access gate) instead of direct bexarotene result."

  # Step 51 — Oral HDACi (vorinostat) access gate.
  # When romidepsin is inaccessible (step 5 if_false): check if vorinostat
  # (oral HDAC inhibitor; FDA-approved 2006; ORR ~30%; NCCN Cat 2A) is
  # obtainable AND QTcF still ≤480 ms. Vorinostat preferred over bexarotene
  # (stays in HDAC-class; oral like bexarotene but targeted mechanism).
  # If neither HDACi accessible → bexarotene (non-HDAC; most accessible UA).
  - step: 51
    evaluate:
      all_of:
        - condition: "QTcF ≤480 ms at baseline (vorinostat HDAC class QTc risk)"
        - condition: "Vorinostat accessible (named-patient import / compassionate-use / international referral)"
        - condition: "No prior pan-HDACi failure (romidepsin or vorinostat — class cross-resistance)"
    if_true:
      result: IND-MF-ADVANCED-2L-VORINOSTAT
      notes: >
        Romidepsin inaccessible + vorinostat accessible + QTcF ≤480 ms:
        vorinostat 400 mg PO daily (REG-VORINOSTAT-MF; Olsen 2007 JCO;
        ORR ~30%; mTTP 4.9 months; FDA Oct 2006; NCCN Cat 2A). ORAL advantage
        over romidepsin IV — no weekly infusion clinic required. DVT/PE risk ~5%;
        Caprini score + loperamide available; CBC q2 weeks; ECG baseline.
        Ukraine: not registered — named-patient/compassionate-use required.
    if_false:
      result: IND-MF-ADVANCED-2L-BEXAROTENE
      notes: >
        Neither romidepsin nor vorinostat accessible OR QTcF >480 ms (HDAC contraindicated):
        bexarotene 300 mg/m² PO daily (IND-MF-ADVANCED-2L-BEXAROTENE; NCCN Cat 2A;
        ORR ~45% erythrodermic MF). Fenofibrate + levothyroxine MANDATORY concurrent.
        Most accessible CTCL-systemic option in Ukraine.
    notes: "Step 51 added 2026-05-04 (Workstream CN): vorinostat oral HDACi access gate (romidepsin-inaccessible patients). Gap (4) CLOSED."

sources: [SRC-NCCN-BCELL-2025, SRC-ESMO-CTCL-2024]
last_reviewed: "2026-05-04"
notes: >
  AUTHORED 2026-05-04: IND-MF-ADVANCED-2L-METHOTREXATE wired at step 4
  (plaque-dominant MF + CrCl ≥30 → MTX 5-25 mg/week; NCCN Cat 2A; Workstream AO).
  UPDATED 2026-05-04 (Workstream BI): IND-MF-ADVANCED-2L-ROMIDEPSIN authored and wired
  at step 5 for erythrodermic/non-plaque MF + adequate QTcF (Whittaker 2010 JCO;
  ORR 34%; NCCN Cat 2A). Gap (3) CLOSED.
  UPDATED 2026-05-04 (Workstream CN): IND-MF-ADVANCED-2L-VORINOSTAT authored and
  wired at step 51 (oral HDACi sub-gate for romidepsin-inaccessible patients;
  vorinostat 400 mg PO daily; Olsen 2007 JCO; ORR ~30%; FDA Oct 2006; NCCN Cat 2A).
  Step 5 if_false now routes to step 51 (vorinostat check) before bexarotene fallback.
  Gap (4) CLOSED.
  ROUTING SUMMARY: (1) CR/PR to induction → bexarotene maintenance; (2) CD30+
  BV-naive → BV; (3) Sézary leukemic moga-naive → mogamulizumab; (4) plaque-MF
  CrCl ≥30 → MTX; (5) erythrodermic/non-plaque + QTcF≤480 + romidepsin accessible
  → romidepsin IV; (51) romidepsin inaccessible + vorinostat accessible + QTcF≤480
  → vorinostat PO; else → bexarotene (HDAC CI or both HDACi inaccessible).
  Reuses 1L MOGA/BV indications when axes still naive at 2L relapse.
  UPDATED 2026-05-04 (Workstream CZ): IND-MF-TRANSFORMED-PRALATREXATE authored and
  wired at step 0 (LCT gate: biopsy-confirmed large-cell transformation + CD30-neg +
  pralatrexate accessible → pralatrexate 30 mg/m² IV ×6 of 7-week cycle; PROPEL
  O'Connor 2011 JCO; NCCN Cat 2A). DRUG-PRALATREXATE authored (Workstream CY).
  Gap (1) CLOSED.

  OOS / wiring gaps: gap (1) CLOSED (see above).
  (2) ECP (extracorporeal photopheresis) for Sézary — not in KB.
