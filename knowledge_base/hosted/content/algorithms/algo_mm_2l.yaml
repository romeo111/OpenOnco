id: ALGO-MM-2L
applicable_to_disease: DIS-MM
applicable_to_line_of_therapy: 2
purpose: >
  Select 2L+/maintenance MM Indication based on prior exposures and ASCT status.
  Seven tracks: (1) post-ASCT CR/VGPR → maintenance; (15) lenalidomide-naive +
  anti-CD38-naive → DRd (POLLUX; HR 0.44; Cat 1); (16) lenalidomide-refractory
  + manufacturing window tolerable → cilta-cel 2L (CARTITUDE-4; HR 0.26; Cat 1);
  (2) triple-class refractory → CAR-T (cilta-cel preferred; step 211) → BCMA
  bispecific (teclistamab/elranatamab; step 21) → talquetamab after BCMA
  exposure (step 212) → selinexor fallback (step 22); (3) t(11;14) →
  venetoclax+dex (BELLINI; Cat 2A); (4) default → DKd.

output_indications:
- IND-MM-2L-DKD
- IND-MM-2L-DRD
- IND-MM-RR-3L-TECLISTAMAB
- IND-MM-RR-3L-ELRANATAMAB
- IND-MM-RR-3L-TALQUETAMAB
- IND-MM-RR-3L-CILTACEL
- IND-MM-RR-3L-IDECEL
- IND-MM-RR-2L-CILTACEL
- IND-MM-4L-LINVOSELTAMAB
- IND-MM-POST-ASCT-LENALIDOMIDE-MAINTENANCE
- IND-MM-2L-VENETOCLAX-T1114
- IND-MM-5L-SELINEXOR
default_indication: IND-MM-2L-DKD
alternative_indication: IND-MM-2L-DRD

decision_tree:
- step: 1
  evaluate:
    all_of:
    - condition: Post-ASCT (autoSCT consolidation completed)
    - condition: 'Disease status: CR, VGPR, or PR'
    - condition: No active progression
  if_true:
    result: IND-MM-POST-ASCT-LENALIDOMIDE-MAINTENANCE
  if_false:
    next_step: 15
  notes: "MDT-only after CSD-7A audit — composite is biomarker/disease-specific (not fitness/eligibility/prior-therapy), so no pan-disease RF applies. Wireable only via dedicated disease-specific RFs in a future round."

- step: 15
  evaluate:
    all_of:
    - condition: "Lenalidomide-NAIVE: did NOT receive lenalidomide in 1L induction or maintenance (e.g., received VCD/VMP/PAd, NOT VRd/DaraVRd)"
    - condition: "Anti-CD38-naive OR ≥12 months from last daratumumab dose (non-daratumumab-refractory)"
    - condition: "NOT triple-class refractory"
    - condition: "CrCl ≥30 mL/min (lenalidomide renal dosing requirement)"
  if_true:
    result: IND-MM-2L-DRD
    notes: >
      Lenalidomide-naive 2L MM: DRd (POLLUX; Dimopoulos 2016 NEJM; mPFS not reached vs 18.4 mo
      Rd alone; HR 0.44; ORR 92.9% vs 76.4%; NCCN Cat 1). DVT prophylaxis mandatory (aspirin
      or LMWH). Lenalidomide REMS mandatory. HBV screen + entecavir. DRd preferred over DKd
      in lenalidomide-naive patients (DKd reserved for lenalidomide-refractory; CANDOR).
  if_false:
    next_step: 16
  notes: "Step 15 added 2026-05-04 (Workstream BE): DRd wired for lenalidomide-naive 2L MM (POLLUX; NCCN Cat 1). Gap (2) CLOSED. If lenalidomide-exposed or CrCl <30 → step 16 (cilta-cel 2L gate) → step 2 (triple-class check → DKd)."

  # Step 16 — Cilta-cel 2L for lenalidomide-refractory R/R MM (CARTITUDE-4).
  # CARTITUDE-4 (San-Miguel 2023 NEJM): cilta-cel vs SOC (KRd/DVd/DPd) in
  # lena-refractory 1-3 prior lines. mPFS NR vs 11.8 mo (HR 0.26; p<0.001);
  # ORR ~85%; ≥CR ~73%. Paradigm-shift: CAR-T moved from 4L → 2L for
  # lenalidomide-refractory patients. Manufacturing window (4 weeks) gating:
  # if rapid progression precludes 4-week wait → step 2 (conventional path).
  # Aggressive-track: ECOG 0-1 ideal; ECOG 2 acceptable in real-world.
  # Ukraine access: not registered; international referral required.
- step: 16
  evaluate:
    all_of:
    - condition: "Lenalidomide-refractory OR lenalidomide-exposed with relapse"
    - condition: "1-3 prior lines (CARTITUDE-4 enrolment range)"
    - condition: "Manufacturing window tolerable: 4-week wait acceptable for disease tempo + bridge therapy feasible"
    - condition: "No prior BCMA-directed therapy (or sufficient washout)"
    - condition: "Adequate organ function for lymphodepletion (fludarabine + cyclophosphamide)"
  if_true:
    result: IND-MM-RR-2L-CILTACEL
    notes: >
      Lenalidomide-refractory 2L MM + manufacturing feasible: cilta-cel (CARTITUDE-4;
      San-Miguel 2023 NEJM; mPFS NR vs 11.8 mo; HR 0.26; ORR ~85%; ≥CR ~73%;
      NCCN Cat 1). Aggressive-track — paradigm shift moving CAR-T to 2L. Late MNT
      signal (parkinsonism ~5-10%) — unique cilta-cel safety dimension. Bridge therapy
      mandatory during 4-week manufacturing window. Ukraine: international referral.
  if_false:
    next_step: 2
  notes: "Step 16 added 2026-05-04 (Workstream EP): cilta-cel 2L gate for lena-refractory R/R MM (CARTITUDE-4; HR 0.26; Cat 1). Rapid progression or manufacturing unavailable → step 2 (triple-class + venetoclax → DKd path)."

- step: 2
  evaluate:
    all_of:
    - condition: ≥3 prior lines including ≥1 IMiD, ≥1 PI, ≥1 anti-CD38
    - condition: Triple-class refractory (refractory to last line of each class)
    - any_of:
      - red_flag: RF-FITNESS-ECOG-FIT
      - red_flag: RF-FITNESS-ECOG-INTERMEDIATE
    - condition: adequate organ function for bispecific or CAR-T
  if_true:
    next_step: 211
  if_false:
    next_step: 3
  notes: "Updated 2026-05-04 (Workstream EP): if_true now routes to step 211 (CAR-T eligibility gate) before bispecific selection."

  # Step 211 — CAR-T eligibility gate for triple-class refractory MM.
  # CAR-T (cilta-cel, ide-cel) preferred over BCMA bispecifics when:
  # (a) manufacturing window tolerable — 4-week wait + bridge feasible,
  # (b) BCMA-naive — prior BCMA exposure risks antigen-loss resistance,
  # (c) ECOG 0-1 (CARTITUDE-1/KarMMa enrolment; ECOG 2 borderline).
  # Cilta-cel preferred over ide-cel: ORR 98% vs 73%; mPFS 35 mo vs 12 mo.
  # Ide-cel as alternate CAR-T when cilta-cel slot unavailable (broader mfg).
  # If CAR-T not feasible → step 212 (BCMA-exposure check → bispecific/talq).
- step: 211
  evaluate:
    all_of:
    - condition: "Manufacturing window tolerable: 4-week wait acceptable + bridge therapy feasible"
    - condition: "No prior BCMA-directed therapy (teclistamab, elranatamab, ide-cel, cilta-cel)"
    - condition: "ECOG 0-1 (CAR-T enrolment criterion; borderline ECOG 2 MDT discussion)"
    - condition: "Adequate organ function for lymphodepletion (fludarabine + cyclophosphamide)"
  if_true:
    result: IND-MM-RR-3L-CILTACEL
    alternatives:
      - indication: IND-MM-RR-3L-IDECEL
        criteria: "Cilta-cel manufacturing slot unavailable; ide-cel as alternate BCMA CAR-T (KarMMa; ORR 73%, mPFS 12 mo); broader manufacturing capacity"
        nccn_category: 1
    notes: >
      Triple-class refractory + CAR-T eligible: cilta-cel preferred (CARTITUDE-1;
      Berdeja 2021 Lancet; ORR 98%; mPFS ~35 mo; NCCN Cat 1). CAR-T has superior
      depth + durability vs bispecifics — first choice when manufacturing window
      tolerable. CRITICAL: late MNT (movement/neurocognitive AEs including
      parkinsonism) ~5-10% — unique cilta-cel signal. Bridge therapy mandatory
      during 4-week manufacturing window. Ukraine: international referral.
  if_false:
    next_step: 212
  notes: "Step 211 added 2026-05-04 (Workstream EP): CAR-T eligibility gate — cilta-cel preferred when manufacturing feasible + BCMA-naive; ide-cel as alternate; step 212 if CAR-T not feasible."

  # Step 212 — BCMA-exposure check for bispecific/talquetamab selection.
  # Prior BCMA-directed therapy → antigen-loss resistance risk with re-challenge.
  # Talquetamab (GPRC5D × CD3; off-the-shelf) preserves activity after BCMA
  # exposure — the alternate-target rescue option.
  # BCMA-naive (CAR-T not feasible due to rapid progression/ECOG/slot) →
  # BCMA bispecific (teclistamab/elranatamab) via step 21.
- step: 212
  evaluate:
    any_of:
    - condition: "Prior BCMA-directed therapy received (teclistamab, elranatamab, ide-cel, cilta-cel) with potential antigen-loss escape"
  if_true:
    result: IND-MM-RR-3L-TALQUETAMAB
    notes: >
      Prior BCMA exposure + BCMA CAR-T not feasible: talquetamab (GPRC5D × CD3;
      MonumenTAL-1; ORR ~73%; mPFS ~11.9 mo Q2W; NCCN Cat 2A). GPRC5D target is
      independent of BCMA — no cross-resistance. On-target AEs: dysgeusia ~50%,
      oral/nail/skin toxicities. Less hypogammaglobulinemia vs BCMA bispecifics.
      Step-up dosing inpatient observation required. Ukraine: international referral.
  if_false:
    next_step: 21
  notes: "Step 212 added 2026-05-04 (Workstream EP): BCMA-exposure check. Prior BCMA → talquetamab GPRC5D (Cat 2A); BCMA-naive + CAR-T not feasible → step 21 (teclistamab/elranatamab bispecific)."

  # Step 21 — BCMA bispecific gate for triple-class-refractory MM.
  # Both teclistamab (MajesTEC-1; ORR 63%; NCCN Cat 1) and elranatamab
  # (MagnetisMM-3 BCMA-naive cohort A; ORR ~61%; NCCN Cat 2A) are options.
  # Teclistamab default: mature data, weekly dosing; NCCN Cat 1.
  # Elranatamab alternative: SC Q2W maintenance after response (post-steady-
  # state) — operationally lighter; ORR comparable; NCCN Cat 2A.
  # If bispecifics accessible: preferred vs selinexor.
  # If inaccessible → step 22 (selinexor fallback).
  # Ukraine: neither teclistamab nor elranatamab registered.
- step: 21
  evaluate:
    all_of:
    - condition: "BCMA bispecific accessible (FDA-registered + named-patient / EMA compassionate / clinical trial)"
  if_true:
    result: IND-MM-RR-3L-TECLISTAMAB
    alternatives:
      - indication: IND-MM-RR-3L-ELRANATAMAB
        criteria: "Elranatamab SC Q2W maintenance after response (post-step-up steady-state); operationally lighter than weekly teclistamab; MagnetisMM-3 ORR ~61%; NCCN Cat 2A"
        nccn_category: "2A"
    notes: >
      Triple-class refractory + BCMA-naive + CAR-T not feasible → BCMA bispecific.
      DEFAULT: Teclistamab 1.5 mg/kg SC weekly (MajesTEC-1; ORR 63%; ≥CR 39%;
      mPFS ~11.3 mo; mOS ~22 mo; NCCN Cat 1). Step-up mandatory (0.06 → 0.3 →
      1.5 mg/kg SC). IVIG + PJP/HSV/VZV prophylaxis mandatory (universal
      hypogammaglobulinemia). ALTERNATIVE: Elranatamab (Q2W maintenance schedule
      post-steady-state; MagnetisMM-3; ORR ~61%; Cat 2A). Ukraine: international
      referral for either agent.
  if_false:
    next_step: 22
  notes: "Step 21 updated 2026-05-04 (Workstream EP): result → IND-MM-RR-3L-TECLISTAMAB (from IND-MM-4L-TECLISTAMAB; RR-3L framing canonical). Elranatamab added as Cat 2A alternative."

  # Step 22 — selinexor fallback when bispecifics also inaccessible.
  # STORM (Chari 2019 NEJM): selinexor 80 mg BIW + dex 20 mg BIW; ORR 26%;
  # NCCN Cat 2A. XPO1 mechanism — distinct from all conventional anti-MM.
  # High toxicity (thrombocytopenia 74%, nausea 72%); patient selection critical.
- step: 22
  evaluate:
    all_of:
    - condition: "Selinexor accessible (US named-patient import feasible; MDT + pharmacy confirmed)"
    - condition: "Platelets ≥75×10⁹/L at start (selinexor-related thrombocytopenia; baseline plt check)"
    - condition: "ECOG 0-2 AND adequate antiemetic compliance feasible"
  if_true:
    result: IND-MM-5L-SELINEXOR
    notes: >
      Bispecific inaccessible + selinexor accessible + platelets adequate: selinexor
      80 mg PO BIW + dex 20 mg BIW (REG-SELINEXOR-DEX-MM; STORM Chari 2019 NEJM;
      ORR 26%; mPFS 3.7 mo; NCCN Cat 2A). Mandatory aggressive antiemetics (5-HT3 + NK1).
      Weekly CBC + Na monitoring. Ukraine: not registered; US named-patient import.
  if_false:
    result: IND-MM-2L-DKD
    notes: >
      Neither bispecific nor selinexor accessible (Ukraine: all require named-patient
      import/trial) OR inadequate baseline platelets/ECOG: fallback to DKd MDT
      discussion. For triple-class refractory patients, DKd is likely insufficient —
      consider clinical trial enrollment, bisphosphonate + pain management (BSC),
      or international referral for bispecific/CAR-T access. MDT mandatory.
  notes: "Step 22 added 2026-05-04 (Workstream DA): selinexor fallback for bispecific-inaccessible triple-class refractory MM (STORM Cat 2A). Gap (5) CLOSED."

- step: 3
  evaluate:
    any_of:
    - red_flag: RF-MM-T11-14-ACTIONABLE
  if_true:
    result: IND-MM-2L-VENETOCLAX-T1114
    notes: >
      t(11;14) confirmed: venetoclax 800 mg/day PO + dexamethasone 40 mg/week
      (REG-VEN-DEX-MM; BELLINI t(11;14) subgroup mPFS 22.4 vs 11.6 mo; HR 0.37;
      NCCN Cat 2A). BCL-2-dependent biology in t(11;14) drives venetoclax sensitivity.
      FISH confirmation mandatory before starting. TLS prophylaxis + CYP3A4 DDI review.
      Ukraine: venetoclax registered for CLL/AML; MM off-label — MDT + patient consent.
      If venetoclax inaccessible: DKd (IND-MM-2L-DKD) as fallback.
  if_false:
    next_step: 4
  notes: 'Step 3 wired 2026-05-04 (Workstream CC): IND-MM-2L-VENETOCLAX-T1114 authored and wired for RF-MM-T11-14-ACTIONABLE (BELLINI t(11;14) subgroup HR 0.37; NCCN Cat 2A). Gap (PROD-5 deferred → CLOSED). Placeholder DKd routing removed.'

- step: 4
  evaluate:
    any_of:
    - condition: Post-VRd / VTd progression, transplant-naive or post-ASCT relapse
    - condition: anti-CD38-naive AND carfilzomib/proteasome-switch eligible
    - red_flag: RF-MM-TRANSFORMATION-PROGRESSION
  if_true:
    result: IND-MM-2L-DKD
  if_false:
    result: IND-MM-2L-DKD

sources:
- SRC-NCCN-MM-2025
- SRC-ESMO-MM-2023
last_reviewed: '2026-05-04'
notes: >
  UPDATED 2026-05-04 (Workstream EP): Wired 6 orphaned Tier-2 RR-MM indications —
  IND-MM-RR-2L-CILTACEL, IND-MM-RR-3L-CILTACEL, IND-MM-RR-3L-IDECEL,
  IND-MM-RR-3L-ELRANATAMAB, IND-MM-RR-3L-TALQUETAMAB, IND-MM-RR-3L-TECLISTAMAB.
  RR-3L framing chosen as canonical over 4L framing (richer rationale, accurate
  line numbers, Ukrainian text, controversies blocks). IND-MM-4L-TECLISTAMAB and
  IND-MM-4L-CILTACEL-CART removed from output_indications (files retained as
  legacy; RR-3L entities supersede them for engine routing). Decision to model
  CAR-T explicitly reverses the prior "UA access ≈zero; not modeled" note per
  project feedback_efficacy_over_registration: access is metadata, not a filter.

  NEW STEPS:
  Step 16: Cilta-cel 2L for lena-refractory R/R MM (CARTITUDE-4; San-Miguel 2023
  NEJM; mPFS NR vs 11.8 mo; HR 0.26; Cat 1). Inserted between step 15 if_false
  and step 2 triple-class gate.
  Step 211: CAR-T eligibility gate for triple-class refractory — cilta-cel
  (CARTITUDE-1; ORR 98%; mPFS 35 mo; Cat 1) preferred when manufacturing window
  tolerable + BCMA-naive; ide-cel alternative (KarMMa; ORR 73%).
  Step 212: BCMA-exposure check — talquetamab (GPRC5D; MonumenTAL-1; ORR ~73%;
  Cat 2A) as alternate-target rescue after prior BCMA; bispecific (step 21) if
  BCMA-naive but CAR-T not feasible.
  Step 21: Updated result → IND-MM-RR-3L-TECLISTAMAB; elranatamab added as
  Cat 2A alternative (MagnetisMM-3; ORR ~61%; Q2W maintenance).

  ROUTING SUMMARY:
  (1) Post-ASCT CR/VGPR → maintenance
  (15) Lena-naive + CD38-naive → DRd (Cat 1)
  (16) Lena-refractory + manufacturing feasible + BCMA-naive → cilta-cel 2L (Cat 1)
  (2) Triple-class refractory → step 211
  (211) CAR-T eligible → cilta-cel 3L (Cat 1; ide-cel alt)
  (212) Prior BCMA → talquetamab GPRC5D (Cat 2A)
  (21) BCMA-naive bispecific → teclistamab (Cat 1; elranatamab Cat 2A alt)
  (22) Bispecific inaccessible → selinexor (Cat 2A) or DKd fallback
  (3) t(11;14) → venetoclax+dex (Cat 2A)
  (4) Default → DKd

  EARLIER UPDATES:
  Workstream BE (2026-05-04): IND-MM-2L-DRD + REG-DRD wired at step 15 (POLLUX).
  Workstream CC (2026-05-04): IND-MM-2L-VENETOCLAX-T1114 wired at step 3.
  Workstream DA (2026-05-04): IND-MM-5L-SELINEXOR + teclistamab access gate.

  OOS / wiring gaps:
  Linvoseltamab (IND-MM-4L-LINVOSELTAMAB; FDA Apr 2025; ≥4L) in output_indications
  but not yet wired in decision tree — requires a ≥4L step extending step 22.
  Isatuximab combinations — not modeled.
