id: ALGO-MM-2L
applicable_to_disease: DIS-MM
applicable_to_line_of_therapy: 2
purpose: 'Select 2L+/maintenance MM Indication based on prior exposures and ASCT status. Four tracks: (1) post-ASCT in CR/VGPR → IND-MM-POST-ASCT-LENALIDOMIDE-MAINTENANCE; (2) lenalidomide-naive + anti-CD38-naive → IND-MM-2L-DRD (POLLUX; mPFS HR 0.44; NCCN Cat 1); (3) lenalidomide-refractory/exposed → IND-MM-2L-DKD (carfilzomib-based, CANDOR; HR 0.59); (4) triple-class refractory (≥3 lines IMiD+PI+CD38) → IND-MM-4L-TECLISTAMAB (BCMA bispecific, MajesTEC-1).

  '
output_indications:
- IND-MM-2L-DKD
- IND-MM-2L-DRD
- IND-MM-4L-TECLISTAMAB
- IND-MM-POST-ASCT-LENALIDOMIDE-MAINTENANCE
- IND-MM-2L-VENETOCLAX-T1114
- IND-MM-5L-SELINEXOR
default_indication: IND-MM-2L-DKD
alternative_indication: IND-MM-2L-DRD
decision_tree:
- step: 1
  evaluate:
    all_of:
    - condition: Post-ASCT (autoSCT consolidation completed)
    - condition: 'Disease status: CR, VGPR, or PR'
    - condition: No active progression
  if_true:
    result: IND-MM-POST-ASCT-LENALIDOMIDE-MAINTENANCE
  if_false:
    next_step: 15
  notes: "MDT-only after CSD-7A audit — composite is biomarker/disease-specific (not fitness/eligibility/prior-therapy), so no pan-disease RF applies. Wireable only via dedicated disease-specific RFs in a future round."
- step: 15
  evaluate:
    all_of:
    - condition: "Lenalidomide-NAIVE: did NOT receive lenalidomide in 1L induction or maintenance (e.g., received VCD/VMP/PAd, NOT VRd/DaraVRd)"
    - condition: "Anti-CD38-naive OR ≥12 months from last daratumumab dose (non-daratumumab-refractory)"
    - condition: "NOT triple-class refractory"
    - condition: "CrCl ≥30 mL/min (lenalidomide renal dosing requirement)"
  if_true:
    result: IND-MM-2L-DRD
    notes: >
      Lenalidomide-naive 2L MM: DRd (POLLUX; Dimopoulos 2016 NEJM; mPFS not reached vs 18.4 mo
      Rd alone; HR 0.44; ORR 92.9% vs 76.4%; NCCN Cat 1). DVT prophylaxis mandatory (aspirin
      or LMWH). Lenalidomide REMS mandatory. HBV screen + entecavir. DRd preferred over DKd
      in lenalidomide-naive patients (DKd reserved for lenalidomide-refractory; CANDOR).
  if_false:
    next_step: 2
  notes: "Step 15 added 2026-05-04 (Workstream BE): DRd wired for lenalidomide-naive 2L MM (POLLUX; NCCN Cat 1). Gap (2) CLOSED. If lenalidomide-exposed or CrCl <30 → step 2 (triple-class check → DKd)."
- step: 2
  evaluate:
    all_of:
    - condition: ≥3 prior lines including ≥1 IMiD, ≥1 PI, ≥1 anti-CD38
    - condition: Triple-class refractory (refractory to last line of each class)
    - any_of:
      - red_flag: RF-FITNESS-ECOG-FIT
      - red_flag: RF-FITNESS-ECOG-INTERMEDIATE
    - condition: adequate organ function for bispecific
  if_true:
    next_step: 21
  if_false:
    next_step: 3
  notes: "Partially wired. Updated 2026-05-04 (Workstream DA): if_true now routes to step 21 (teclistamab access gate + selinexor fallback) instead of direct teclistamab result."

  # Step 21 — teclistamab access gate for triple-class-refractory MM.
  # Teclistamab (IND-MM-4L-TECLISTAMAB) is NCCN Cat 1 preferred; ORR 63%; mDOR 18.4 mo.
  # However, not EMA-approved (MajesTEC-1 basis; US FDA-only + individual EU compassionate).
  # Ukraine: neither teclistamab nor selinexor registered.
  # If teclistamab accessible: preferred (Cat 1, superior efficacy).
  # If inaccessible: selinexor (Cat 2A; STORM; ORR 26%; XPO1-mechanism non-overlapping).
- step: 21
  evaluate:
    all_of:
    - condition: "Teclistamab accessible (FDA-registered + named-patient / EMA compassionate / clinical trial)"
  if_true:
    result: IND-MM-4L-TECLISTAMAB
    notes: >
      Triple-class refractory + teclistamab accessible: teclistamab 1.5 mg/kg SC weekly
      after step-up dosing (IND-MM-4L-TECLISTAMAB; REG-TECLISTAMAB-MM; MajesTEC-1
      Moreau 2022 NEJM; ORR 63%; CR 39%; mDOR 18.4 mo; NCCN Cat 1). Step-up dosing
      mandatory (0.06 mg/kg SC → 0.3 mg/kg SC → 1.5 mg/kg SC) to mitigate CRS risk.
      Infection prophylaxis (IgG monitoring; PJP; antiviral) mandatory.
  if_false:
    next_step: 22
  notes: "Step 21 added 2026-05-04 (Workstream DA): teclistamab access gate — accessible → IND-MM-4L-TECLISTAMAB (Cat 1); inaccessible → step 22 (selinexor fallback)."

  # Step 22 — selinexor fallback when teclistamab inaccessible (penta-refractory MM).
  # STORM (Chari 2019 NEJM): selinexor 80 mg BIW + dex 20 mg BIW; ORR 26%; NCCN Cat 2A.
  # XPO1 inhibitor — distinct from all conventional anti-MM mechanisms.
  # High toxicity (thrombocytopenia 74%, nausea 72%); patient selection critical.
  # Not EMA-approved (CHMP negative 2021); not UA-registered.
- step: 22
  evaluate:
    all_of:
    - condition: "Selinexor accessible (US named-patient import feasible; MDT + pharmacy confirmed)"
    - condition: "Platelets ≥75×10⁹/L at start (selinexor-related thrombocytopenia; baseline plt check)"
    - condition: "ECOG 0-2 AND adequate antiemetic compliance feasible"
  if_true:
    result: IND-MM-5L-SELINEXOR
    notes: >
      Teclistamab inaccessible + selinexor accessible + platelets adequate: selinexor
      80 mg PO BIW + dex 20 mg BIW (REG-SELINEXOR-DEX-MM; STORM Chari 2019 NEJM;
      ORR 26%; mPFS 3.7 mo; NCCN Cat 2A). Mandatory aggressive antiemetics (5-HT3 + NK1).
      Weekly CBC + Na monitoring. Ukraine: not registered; US named-patient import.
  if_false:
    result: IND-MM-2L-DKD
    notes: >
      Neither teclistamab nor selinexor accessible (Ukraine: both require named-patient
      import/trial) OR inadequate baseline platelets/ECOG: fallback to DKd MDT
      discussion. For penta-refractory patients, DKd is likely insufficient —
      consider clinical trial enrollment, bisphosphonate + pain management (BSC),
      or international referral for bispecific access. MDT mandatory.
  notes: "Step 22 added 2026-05-04 (Workstream DA): selinexor fallback for teclistamab-inaccessible triple-class refractory MM (STORM Cat 2A). Gap (5) CLOSED."
- step: 3
  evaluate:
    any_of:
    - red_flag: RF-MM-T11-14-ACTIONABLE
  if_true:
    result: IND-MM-2L-VENETOCLAX-T1114
    notes: >
      t(11;14) confirmed: venetoclax 800 mg/day PO + dexamethasone 40 mg/week
      (REG-VEN-DEX-MM; BELLINI t(11;14) subgroup mPFS 22.4 vs 11.6 mo; HR 0.37;
      NCCN Cat 2A). BCL-2-dependent biology in t(11;14) drives venetoclax sensitivity.
      FISH confirmation mandatory before starting. TLS prophylaxis + CYP3A4 DDI review.
      Ukraine: venetoclax registered for CLL/AML; MM off-label — MDT + patient consent.
      If venetoclax inaccessible: DKd (IND-MM-2L-DKD) as fallback.
  if_false:
    next_step: 4
  notes: 'Step 3 wired 2026-05-04 (Workstream CC): IND-MM-2L-VENETOCLAX-T1114 authored and wired for RF-MM-T11-14-ACTIONABLE (BELLINI t(11;14) subgroup HR 0.37; NCCN Cat 2A). Gap (PROD-5 deferred → CLOSED). Placeholder DKd routing removed.'
- step: 4
  evaluate:
    any_of:
    - condition: Post-VRd / VTd progression, transplant-naive or post-ASCT relapse
    - condition: anti-CD38-naive AND carfilzomib/proteasome-switch eligible
    - red_flag: RF-MM-TRANSFORMATION-PROGRESSION
  if_true:
    result: IND-MM-2L-DKD
  if_false:
    result: IND-MM-2L-DKD
sources:
- SRC-NCCN-MM-2025
- SRC-ESMO-MM-2023
last_reviewed: '2026-05-04'
notes: >
  UPDATED 2026-05-04 (Workstream CC): IND-MM-2L-VENETOCLAX-T1114 + REG-VEN-DEX-MM
  authored and wired at step 3 for t(11;14)-positive R/R MM (BELLINI t(11;14) subgroup;
  HR 0.37; NCCN Cat 2A; venetoclax 800 mg/day + dex 40 mg/week). Placeholder DKd
  routing replaced with dedicated venetoclax indication. Gap CLOSED.

  EARLIER UPDATES:
  Workstream BE (2026-05-04): IND-MM-2L-DRD + REG-DRD wired at step 15 (POLLUX;
  lenalidomide-naive 2L; HR 0.44; NCCN Cat 1). Gap (2) CLOSED.

  ROUTING SUMMARY: (1) Post-ASCT CR/VGPR → maintenance; (15) lena-naive + CD38-naive →
  DRd (Cat 1); (2) triple-class refractory → teclistamab bispecific; (3) t(11;14) →
  venetoclax+dex (Cat 2A); (4) default → DKd.

  OOS / wiring gaps:
  (1) Maintenance algo (ALGO-MM-MAINTENANCE) pragmatically included in step 1 here.
  (3) Belantamab mafodotin — withdrawn from market post DREAMM-3; not modeled.
  (4) CAR-T (cilta-cel CARTITUDE-4, ide-cel KarMMa-3) — UA access ≈zero; not modeled.
  UPDATED 2026-05-04 (Workstream DA): IND-MM-5L-SELINEXOR authored and wired at
  steps 21 and 22 (teclistamab access gate + selinexor fallback; DRUG-SELINEXOR +
  REG-SELINEXOR-DEX-MM authored; STORM Chari 2019 NEJM; ORR 26%; NCCN Cat 2A).
  Step 2 if_true now routes to step 21 (teclistamab access check) → step 22
  (selinexor fallback). Gap (5) CLOSED.

  (5) CLOSED — Selinexor penta-refractory now modeled at steps 21-22.
  (6) Venetoclax inaccessible in Ukraine off-label MM context → DKd as fallback
  (documented in IND notes; MDT decision).
