id: ALGO-MTC-1L
applicable_to_disease: DIS-MTC
applicable_to_line_of_therapy: 1
purpose: >
  Select 1L systemic therapy for advanced / progressive medullary
  thyroid carcinoma by RET mutation status. RET-mutant: selpercatinib
  (LIBRETTO-531 superior to multikinase TKIs in PFS + tolerability).
  RET-WT (RAS-mutant or unknown): cabozantinib (EXAM). Localized MTC
  is managed surgically (total thyroidectomy + central neck dissection)
  and is out of scope for this 1L systemic algorithm. Trigger for
  systemic therapy: symptomatic disease OR structural progression OR
  calcitonin doubling time <2 yr.

output_indications:
  - IND-MTC-ADVANCED-1L-SELPERCATINIB
  - IND-MTC-ADVANCED-1L-CABOZANTINIB-RET-WT

default_indication: IND-MTC-ADVANCED-1L-SELPERCATINIB
alternative_indication: IND-MTC-ADVANCED-1L-CABOZANTINIB-RET-WT

decision_tree:
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-MTC-RET-MUTANT
        # Legacy finding-based evaluations for backward engine compatibility:
        - {finding: ret_mutation_status, value: positive}
        - {finding: ret_mutation_status, value: mutant}
        - {finding: ret_mutation_status, value: detected}
        - {finding: ret_mutation_status, value: MEN2A}
        - {finding: ret_mutation_status, value: MEN2B}
        - {finding: ret_germline_mutation, value: positive}
        - {finding: ret_somatic_mutation, value: positive}
        - {finding: BIO-RET, value: M918T}
        - {finding: BIO-RET, value: C634R}
        - {finding: BIO-RET, value: C634W}
        - {finding: BIO-RET, value: C634Y}
        - condition: "RET mutation positive (somatic M918T OR germline MEN2-associated C634/M918T/other)"
    if_true:
      result: IND-MTC-ADVANCED-1L-SELPERCATINIB
      notes: >
        RF-MTC-RET-MUTANT fired — selpercatinib preferred 1L for all
        advanced RET-mutant MTC (LIBRETTO-531; PFS HR 0.28; ORR 69% vs 38%).
        Covers somatic (M918T) and germline (MEN2A/MEN2B) variants.
        NCCN Thyroid 2025 Category 1.
    if_false:
      next_step: 2
    notes: >
      W5c RF wiring: RF-MTC-RET-MUTANT added as primary gate; legacy
      finding lookups and free-text condition retained for backward
      engine compatibility.
  - step: 2
    evaluate:
      any_of:
        - condition: "RET wild-type (RAS-mutant OR unknown OR negative)"
    if_true:
      result: IND-MTC-ADVANCED-1L-CABOZANTINIB-RET-WT
    if_false:
      result: IND-MTC-ADVANCED-1L-CABOZANTINIB-RET-WT
    notes: "Free-text condition without matching disease-scoped RF; engine routes to default. Flag for RF authoring."

sources:
  - SRC-NCCN-THYROID-2025
  - SRC-LIBRETTO-531-WIRTH-2024
last_reviewed: '2026-05-08'
notes: >
  Decision tree intentionally simplified: pralsetinib is an
  alternative RET-selective and vandetanib an alternative multikinase,
  not authored as separate Indications for MVP. Trigger criteria for
  systemic therapy (calcitonin doubling time <2 yr, structural
  progression, symptoms) are encoded as `stage_requirements` on each
  Indication. Localized MTC routes to surgery (separate solid-tumor
  workup not yet authored — KNOWLEDGE_SCHEMA_SPECIFICATION §17 gap).
