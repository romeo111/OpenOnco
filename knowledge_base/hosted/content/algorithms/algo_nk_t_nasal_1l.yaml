id: ALGO-NK-T-NASAL-1L
applicable_to_disease: DIS-NK-T-NASAL
applicable_to_line_of_therapy: 1
purpose: 'NK/T-cell nasal 1L — asparaginase-based regimens are essential (P-glycoprotein-bypass mechanism). Choice between SMILE (strongest RCT evidence, MTX-intensive) and P-GEMOX (comparable efficacy, less toxicity, broader eligibility) is driven by patient fitness, renal function, and asparaginase supply continuity. Concurrent RT for localized stage I/II remains standard regardless of induction choice.

  '
output_indications:
- IND-NK-T-NASAL-1L-SMILE
- IND-NK-T-NASAL-1L-P-GEMOX
default_indication: IND-NK-T-NASAL-1L-SMILE
alternative_indication: IND-NK-T-NASAL-1L-P-GEMOX
decision_tree:
- step: 1
  evaluate:
    all_of:
    - condition: Age ≤ 70
    - any_of:
      - red_flag: RF-FITNESS-ECOG-FIT
      - red_flag: RF-FITNESS-ECOG-INTERMEDIATE
    - none_of:
      - red_flag: RF-ORGAN-RENAL-IMPAIRED
    - condition: L-asparaginase access available
  if_true:
    result: IND-NK-T-NASAL-1L-SMILE
  if_false:
    result: IND-NK-T-NASAL-1L-P-GEMOX
  notes: Partially wired - fitness/eligibility gates wired via CSD-7A pan-disease RFs; remaining condition(s) kept as MDT-evaluated text (no RF available for that criterion).
sources:
- SRC-NCCN-BCELL-2025
- SRC-ESMO-PTCL-2024
last_reviewed: '2026-04-27'
notes: 'P-GEMOX preferred for older / renal-impaired / centers with intermittent asparaginase access. DDGP (cisplatin variant) not yet modeled as separate indication.

  EBV-DNA monitoring (added 2026-04-27 documentation): EBV-DNA is THE pharmacodynamic biomarker for NK/T-nasal lymphoma. RF-NK-T-NASAL- INFECTION-SCREENING captures the trigger (baseline ≥10^4 copies/mL OR persistent post-induction). Monitoring schedule: baseline → q-cycle (q3w) → end-of-induction → q3mo surveillance ×2 yr. Persistent/rising EBV-DNA = consolidation intensification trigger (autoSCT-CR1, RT boost, early move to NK/T-2L PD-1 track).

  '
notes_ua: >
  P-GEMOX є кращим варіантом для літніх пацієнтів / при нирковій недостатності /
  для центрів з переривчастим доступом до аспарагінази. DDGP (варіант з цисплатином)
  ще не змодельований як окреме показання.

  Моніторинг EBV-ДНК (додано в документацію 2026-04-27): EBV-ДНК є ГОЛОВНИМ
  фармакодинамічним біомаркером для NK/T-носового лімфоми. RF-NK-T-NASAL-
  INFECTION-SCREENING фіксує тригер (вихідний рівень ≥10^4 копій/мл АБО персистуючий після індукції).
  Графік моніторингу: базовий → кожен цикл (q3w) → кінець індукції → q3mo нагляд
  ×2 роки. Персистуюча/зростаюча EBV-ДНК = тригер інтенсифікації консолідації
  (autoSCT-CR1, підсилення ПТ, рання перехід до NK/T-2Л PD-1 треку).
ukrainian_review_status: pending_clinical_signoff
