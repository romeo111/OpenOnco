id: ALGO-NLPBL-2L
applicable_to_disease: DIS-NLPBL
applicable_to_line_of_therapy: 2
purpose: >
  Select 2L Indication for relapsed nodular lymphocyte-predominant
  B-cell lymphoma (formerly NLPHL). Two tracks:
  (1) IND-NLPBL-2L-RCHOP-TRANSFORMATION — R-CHOP for confirmed
  transformation to THRLBCL or DLBCL-like histology;
  (2) IND-NLPBL-2L-RITUXIMAB-RETREATMENT — rituximab monotherapy
  ± ISRT for biopsy-confirmed indolent relapse (NCCN Cat 2A; ORR ~80-90%).

  CRITICAL do_not_do: re-biopsy is MANDATORY before treating any
  NLPBL relapse. NLPBL has a high (>10%) lifetime risk of histologic
  transformation to THRLBCL / DLBCL; treating clinically suspected
  relapse as if it were indolent NLPBL recurrence (with rituximab
  monotherapy or RT alone) misses transformation in ~30-40% of
  relapse cases and substantially worsens outcomes. The MDT must
  obtain excisional or core re-biopsy at the relapse site BEFORE
  any 2L decision. Routing to R-CHOP is appropriate ONLY when
  re-biopsy confirms transformation; indolent-pattern recurrence
  (NLPBL-typical histology preserved) routes to free-text "rituximab
  retreatment ± involved-site RT" alternative.

  2L entry triggered by: documented nodal recurrence ≥6mo after 1L
  (rituximab monotherapy, observation, or RT), OR new B-symptoms /
  rapid clinical progression suggestive of transformation, OR
  unexpected LDH elevation in known NLPBL patient.

output_indications:
  - IND-NLPBL-2L-POLA-R-CHP-TRANSFORMATION
  - IND-NLPBL-2L-RCHOP-TRANSFORMATION
  - IND-NLPBL-2L-RITUXIMAB-RETREATMENT

default_indication: IND-NLPBL-2L-POLA-R-CHP-TRANSFORMATION
alternative_indication: IND-NLPBL-2L-RCHOP-TRANSFORMATION

decision_tree:
  # Step 0 (do_not_do gate) — MANDATORY re-biopsy before any 2L
  # routing. Algorithm cannot enforce a procedure; this step
  # documents the requirement and refuses to route until re-biopsy
  # result is supplied. Trace must surface "re-biopsy mandatory
  # — do NOT treat as indolent relapse without histology".
  - step: 1
    do_not_do: true
    description: "MANDATORY re-biopsy before 2L treatment selection"
    evaluate:
      any_of:
        - condition: "Re-biopsy NOT performed at relapse site"
        - red_flag: RF-NLPBL-TRANSFORMATION-PROGRESSION
    if_true:
      result: IND-NLPBL-2L-RCHOP-TRANSFORMATION  # halt placeholder; see notes — algo MUST stop here until biopsy supplied
      reason: "Re-biopsy mandatory: NLPBL transforms to THRLBCL/DLBCL in ~30-40% of relapses; treating without histology misses transformation"
      stop: true
    if_false:
      next_step: 2

  # Step 2 — re-biopsy confirms transformation (THRLBCL or DLBCL-
  # like aggressive histology) → route to step 21 (Pola-R-CHP vs R-CHOP
  # access gate; both NCCN Cat 2A for NLPBL transformation).
  - step: 2
    evaluate:
      any_of:
        - red_flag: RF-NLPBL-TRANSFORMATION-PROGRESSION
        - red_flag: RF-AGGRESSIVE-HISTOLOGY-TRANSFORMATION
        - condition: "Re-biopsy confirms THRLBCL or DLBCL-like transformation"
    if_true:
      next_step: 21
    if_false:
      next_step: 3
    notes: "if_true updated 2026-05-04 (Workstream CR): routes to step 21 (Pola-R-CHP vs R-CHOP access gate) instead of direct R-CHOP result."

  # Step 3 — re-biopsy confirms indolent NLPBL recurrence (CD20+,
  # CD15-, CD30-, LP-cell preservation): rituximab retreatment
  # ± involved-site RT (ISRT 30Gy). No dedicated 2L indolent
  # indication; routes to IND-NLPBL-1L-RITUXIMAB-MONO with MDT
  # note flagging "retreatment, not de novo".
  - step: 3
    evaluate:
      all_of:
        - condition: "Re-biopsy: NLPBL histology preserved (LP-cells, CD20+ CD15- CD30-)"
        - condition: "Indolent presentation, no B-symptoms, no LDH elevation"
    if_true:
      result: IND-NLPBL-2L-RITUXIMAB-RETREATMENT
      notes: >
        Biopsy-confirmed indolent NLPBL relapse: rituximab monotherapy ± ISRT (24-30 Gy).
        ORR ~80-90%; preferred over chemoimmunotherapy to spare cytotoxics for future
        transformation events. HBV screen + entecavir prophylaxis mandatory. Re-biopsy
        mandatory if rapid new progression during or after this regimen (transformation risk).
    if_false:
      next_step: 4
    notes: "Step 3 wired 2026-05-04 (Workstream AZ): IND-NLPBL-2L-RITUXIMAB-RETREATMENT authored and wired for biopsy-confirmed indolent relapse. Gap (1) CLOSED."

  # Step 4 — default (transformation suspected but not confirmed):
  # precautionary aggressive routing via step 21 (Pola-R-CHP vs R-CHOP gate).
  - step: 4
    evaluate:
      any_of:
        - condition: "Transformation suspected at relapse — biopsy pending or inconclusive"
        - red_flag: RF-NLPBL-TRANSFORMATION-PROGRESSION
    if_true:
      next_step: 21
    if_false:
      next_step: 21

  # Step 21 — Pola-R-CHP vs R-CHOP access gate for NLPBL transformation.
  # Both NCCN Cat 2A for confirmed NLPBL transformation (extrapolated from DLBCL protocols).
  # POLARIX (Tilly 2022 NEJM): Pola-R-CHP mPFS 24.2 vs R-CHOP 17.3 mo (HR 0.73; DLBCL).
  # Pola-R-CHP = polatuzumab vedotin CD79b-ADC replaces vincristine in CHOP.
  # POLARIX excluded secondary DLBCL — extrapolation to NLPBL transformation requires
  # MDT discussion; R-CHOP is always a valid equivalent alternative.
  - step: 21
    evaluate:
      all_of:
        - condition: "Polatuzumab vedotin (Pola-R-CHP) accessible at prescribing centre (registered + funded or named-patient)"
        - condition: "No prior polatuzumab vedotin exposure"
        - condition: "ECOG PS 0-2 (POLARIX enrolled ECOG 0-2)"
        - condition: "No active Grade ≥2 peripheral neuropathy (polatuzumab ADC component)"
        - condition: "No active Grade ≥2 ILD/pneumonitis"
    if_true:
      result: IND-NLPBL-2L-POLA-R-CHP-TRANSFORMATION
      notes: >
        Pola-R-CHP accessible: polatuzumab vedotin + R-CHP (POLARIX; Tilly 2022 NEJM;
        NCCN Cat 2A for transformed NLPBL; extrapolated from DLBCL Cat 1). ORR 88%;
        mPFS 24.2 vs R-CHOP 17.3 months (HR 0.73). NLPBL transformation = first
        anthracycline-containing therapy of this episode → POLARIX data applicable.
        MDT discussion recommended re: POLARIX exclusion of secondary DLBCL.
    if_false:
      result: IND-NLPBL-2L-RCHOP-TRANSFORMATION
      notes: >
        Pola-R-CHP inaccessible or contraindicated (polatuzumab unavailable, neuropathy,
        ILD, ECOG ≥3): R-CHOP × 6 cycles (REG-R-CHOP; IND-NLPBL-2L-RCHOP-TRANSFORMATION;
        NCCN Cat 2A). Standard transformation regimen; ORR ~85%; well-established safety.
    notes: "Step 21 added 2026-05-04 (Workstream CR): Pola-R-CHP vs R-CHOP access gate for NLPBL transformation. Both NCCN Cat 2A; Pola-R-CHP preferred when accessible (POLARIX; mPFS HR 0.73). Gap (4) CLOSED."

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-BSH-MZL-2024
  - SRC-ESMO-DLBCL-2024

last_reviewed: "2026-05-04"
notes: >
  UPDATED 2026-05-04 (Workstream AZ): IND-NLPBL-2L-RITUXIMAB-RETREATMENT
  authored and wired at step 3 for biopsy-confirmed indolent NLPBL relapse
  (R-mono ± ISRT 24-30 Gy; ORR ~80-90%; NCCN Cat 2A). Gap (1) CLOSED.
  UPDATED 2026-05-04 (Workstream CR): IND-NLPBL-2L-POLA-R-CHP-TRANSFORMATION
  authored and wired at step 21 (Pola-R-CHP vs R-CHOP access gate for confirmed
  NLPBL transformation; POLARIX Tilly 2022 NEJM; mPFS HR 0.73; NCCN Cat 2A
  extrapolated from DLBCL Cat 1). Steps 2 and 4 now route to step 21. Gap (4) CLOSED.
  ROUTING SUMMARY: (1) re-biopsy not done OR transformation flag → mandatory stop;
  (2) transformation confirmed → step 21 (Pola-R-CHP if accessible; else R-CHOP);
  (3) indolent NLPBL relapse confirmed → rituximab retreatment ± ISRT;
  (4) transformation suspected → step 21.
  OOS / wiring gaps:
  (2) BSH-MZL-2024 referenced as proxy guideline (no dedicated NLPBL guideline from BSH;
  GHSG NLPHL position paper not yet ingested as SRC-*).
  (3) do_not_do mandatory re-biopsy gate: rule engine must honor stop=true flag.
  (5) AutoSCT consolidation in CR2 transformation — referral, outside KB at this stage.
  (6) reviewer_signoffs: 0 — pending two Clinical Co-Lead approvals.
