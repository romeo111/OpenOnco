id: ALGO-NMZL-2L
applicable_to_disease: DIS-NODAL-MZL
applicable_to_line_of_therapy: 2
purpose: >
  Select 2L+ Indication for nodal marginal zone lymphoma after 1L
  failure (rituximab monotherapy, watch-and-wait progression, or
  R-CHOP for aggressive presentation). Two tracks:
  (1) IND-NMZL-2L-BR (bendamustine + rituximab; BSH 2024 / NCCN 2L
  preferred; Rummel STIL-1; fit patients ECOG 0-1);
  (2) IND-NMZL-2L-RITUXIMAB-RETREATMENT (rituximab monotherapy for
  frail/bendamustine-ineligible or late relapse ≥12 months; ORR ~70-80%;
  NCCN Cat 2A).

  2L entry triggered by: progression after 1L systemic therapy
  (nodal progression, B-symptoms, new extranodal sites, cytopenia
  from marrow involvement), OR transformation to aggressive
  histology.

output_indications:
  - IND-NMZL-2L-BR
  - IND-NMZL-2L-RITUXIMAB-RETREATMENT
  - IND-NMZL-2L-R2

default_indication: IND-NMZL-2L-BR
alternative_indication: IND-NMZL-2L-R2

decision_tree:
  # Step 1 — histologic transformation suspected → upstream re-biopsy
  # + ALGO-DLBCL routing. Cannot reference cross-disease algo here;
  # trace must surface "transformation-suspect: ALGO-DLBCL routing"
  # MDT note.
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-NMZL-TRANSFORMATION-PROGRESSION
        - red_flag: RF-AGGRESSIVE-HISTOLOGY-TRANSFORMATION
    if_true:
      result: IND-NMZL-2L-BR  # placeholder; see notes — routes upstream to ALGO-DLBCL
    if_false:
      next_step: 2

  # Step 2 — frail / organ dysfunction precluding bendamustine →
  # rituximab monotherapy retreatment (IND-NMZL-2L-RITUXIMAB-RETREATMENT).
  # Late relapse ≥12 months: rituximab-non-refractory; R-mono ORR ~70-80%.
  # Fit patients (ECOG 0-1, CrCl ≥40) fall through to BR at step 3.
  - step: 2
    evaluate:
      any_of:
        - red_flag: RF-NMZL-FRAILTY-AGE
        - red_flag: RF-NMZL-ORGAN-DYSFUNCTION
    if_true:
      result: IND-NMZL-2L-RITUXIMAB-RETREATMENT
      notes: >
        Frail or organ-dysfunction precluding bendamustine: rituximab monotherapy
        375 mg/m² × 4 weekly + maintenance q2months × 2 years (REG-RITUXIMAB-MONO).
        ORR ~70-80% (indolent MZL retreatment; NCCN Cat 2A; BSH MZL 2024).
        Late relapse ≥12 months = rituximab-non-refractory: R-mono active.
        Early relapse <6 months → IND-NMZL-2L-BR (obinutuzumab-containing preferred).
    if_false:
      next_step: 3

  # Step 3 — default: nodal progression, fit, BR-eligible → step 31 (BR vs R² gate).
  - step: 3
    evaluate:
      any_of:
        - condition: "Nodal progression / new extranodal sites after 1L"
        - condition: "B-symptoms or symptomatic cytopenia from marrow involvement"
        - condition: "CD20+ confirmed at relapse biopsy, adequate marrow + organ function for bendamustine"
        - red_flag: RF-NMZL-ORGAN-DYSFUNCTION
        - red_flag: RF-NMZL-TRANSFORMATION-PROGRESSION
    if_true:
      next_step: 31
    if_false:
      next_step: 31

  # Step 31 — BR vs R² (lenalidomide+rituximab) gate for fit NMZL 2L.
  # Prior bendamustine/alkylator at 1L → R² preferred (avoid alkylator re-use).
  # BR-naive at 1L → BR preferred (stronger evidence base; standard Cat 1).
  # Both BR and R² are NCCN Cat 1 for relapsed NMZL (AUGMENT MZL subgroup).
  - step: 31
    evaluate:
      all_of:
        - condition: "Prior bendamustine or alkylating agent in 1L regimen (e.g., R-BR at 1L, CVP/CHOP-containing) — cumulative alkylator toxicity concern"
    if_true:
      result: IND-NMZL-2L-R2
      notes: >
        Prior alkylator/bendamustine at 1L: R² preferred to avoid cumulative alkylator
        toxicity and cross-resistance. Lenalidomide 20 mg d1-21 + rituximab 375 mg/m² q28d × 12 cycles
        (REG-R2-FL; AUGMENT Leonard JCO 2019; MZL subgroup ORR 80%, mPFS 31.4 mo; NCCN Cat 1).
        Oral lenalidomide reduces clinic burden vs IV bendamustine infusion.
    if_false:
      result: IND-NMZL-2L-BR
      notes: >
        Bendamustine-naive at 1L (1L was R-mono, W&W, or R-CVP): BR preferred as
        standard-of-care 2L immunochemotherapy (REG-R-BENDAMUSTINE-RELAPSED-MZL;
        ORR ~85-90%; NCCN Cat 1). R² (IND-NMZL-2L-R2) is an equally valid Cat 1
        alternative — MDT choice based on patient preference for oral vs IV and
        REMS access considerations.
    notes: "Step 31 added 2026-05-04 (Workstream BV): BR vs R² prior-alkylator gate. IND-NMZL-2L-R2 wired for prior-alkylator track. Gap (2) CLOSED. Free-text condition; MDT-evaluated."

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-BSH-MZL-2024

last_reviewed: "2026-05-04"
notes: >
  UPDATED 2026-05-04 (Workstream BA): IND-NMZL-2L-RITUXIMAB-RETREATMENT
  authored and wired at step 2 for frail/bendamustine-ineligible NMZL
  (rituximab 375 mg/m² × 4 + maintenance; ORR ~70-80%; NCCN Cat 2A).
  Gap (1) CLOSED.
  UPDATED 2026-05-04 (Workstream BV): IND-NMZL-2L-R2 authored and wired at step 31
  for prior-alkylator NMZL 2L (AUGMENT Leonard JCO 2019; MZL subgroup ORR 80%, mPFS
  31.4 mo; NCCN Cat 1). Gap (2) CLOSED. ROUTING SUMMARY: (1) Transformation suspect →
  BR placeholder (upstream DLBCL re-biopsy); (2) Frail/organ-dysfunction → R-mono;
  (3) Fit → step 31 → R² if prior alkylator; BR if alkylator-naive.
  OOS / wiring gaps:
  (3) Ibrutinib for r/r NMZL — FDA-approved 2017 (basket label
  with SMZL/MALT) but not modeled; UA access ≈zero.
  (4) Histologic transformation routing must be resolved at upstream
  disease-resolution stage (relapse re-biopsy mandatory).
  (5) reviewer_signoffs: 0 — pending two Clinical Co-Lead approvals.
