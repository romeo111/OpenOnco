id: ALGO-NSCLC-METASTATIC-1L
applicable_to_disease: DIS-NSCLC
applicable_to_line_of_therapy: 1
purpose: >
  Select 1L metastatic NSCLC regimen via molecular-cascade decision
  tree: actionable driver → driver-targeted TKI/ADC; driver-negative →
  PD-L1 TPS → ICI strategy. Stage III unresectable handled in separate
  Algorithm. Driver cascade: EGFR → ALK → ROS1 → MET ex14 → RET fusion
  → BRAF V600E → NTRK fusion → PD-L1 stratified ICI ± chemo.

output_indications:
  - IND-NSCLC-1L-EGFR-EX20INS-AMIVANTAMAB-CHEMO
  - IND-NSCLC-EGFR-MUT-MET-1L
  - IND-NSCLC-1L-EGFR-CLASSIC-OSI-CHEMO
  - IND-NSCLC-1L-EGFR-CLASSIC-AMIVANTAMAB-LAZERTINIB
  - IND-NSCLC-ALK-MET-1L
  - IND-NSCLC-ROS1-1L-REPOTRECTINIB
  - IND-NSCLC-ROS1-1L-TALETRECTINIB
  - IND-NSCLC-MET-EX14-1L-CAPMATINIB
  - IND-NSCLC-RET-FUSION-1L-SELPERCATINIB
  - IND-NSCLC-BRAF-V600E-1L-DAB-TRAM
  - IND-NSCLC-NTRK-FUSION-1L-LAROTRECTINIB
  - IND-NSCLC-PDL1-HIGH-MET-1L
  - IND-NSCLC-PDL1-22C3-PEMBRO-CLONE-SPECIFIC
  - IND-NSCLC-PDL1-LOW-NONSQ-MET-1L
  - IND-NSCLC-ALK-MAINT-ALECTINIB
  - IND-NSCLC-EGFR-MAINT-OSIMERTINIB
  - IND-NSCLC-PEMBRO-MAINTENANCE-POST-CHEMO
  - IND-NSCLC-ELDERLY-CARBO-PEM-MOD
  - IND-NSCLC-ALK-1L-ENSARTINIB
  - IND-NSCLC-TMB-HIGH-MET-1L-PEMBRO-MONO

default_indication: IND-NSCLC-PDL1-LOW-NONSQ-MET-1L
alternative_indication: IND-NSCLC-PDL1-HIGH-MET-1L

decision_tree:
  # Step 1 — Actionable driver gate.
  # RF-NSCLC-HIGH-RISK-BIOLOGY summarizes presence of any known oncogenic driver
  # detected on comprehensive NGS panel. If any driver detected → driver cascade.
  # If no driver detected → PD-L1 stratified ICI pathway (step 9).
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-HIGH-RISK-BIOLOGY
    if_true:
      next_step: 2
    if_false:
      next_step: 9

  # Step 2 — EGFR exon 20 insertion (amivantamab+chemo; PAPILLON; FDA Oct 2023).
  # IMPORTANT: Exon 20 insertions are NOT sensitive to classical EGFR TKIs (osimertinib).
  # Must be split from classical sensitizing mutations before reaching step 25.
  - step: 2
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-EGFR-EX20INS-ACTIONABLE
    if_true:
      result: IND-NSCLC-1L-EGFR-EX20INS-AMIVANTAMAB-CHEMO
      notes: >
        EGFR exon 20 insertion: amivantamab 1400/1750 mg + carboplatin AUC 5 + pemetrexed
        (PAPILLON; Zhou C NEJM 2023; mPFS 11.4 vs 6.7 months; HR 0.40; FDA Oct 2023;
        NCCN Cat 1). NOT osimertinib — osimertinib is inactive against exon 20 insertions.
    if_false:
      next_step: 25
    notes: "Workstream EF 2026-05-04: Exon 20 insertion split from classical EGFR. Prior routing incorrectly sent ex20ins to osimertinib (IND-NSCLC-EGFR-MUT-MET-1L). Fixed: ex20ins -> amivantamab+chemo (PAPILLON Cat 1)."

  # Step 25 — Classical EGFR sensitizing mutation (ex19del / L858R).
  # Three NCCN Cat 1 options (all FDA-approved as of Aug 2024):
  # 1. Osimertinib monotherapy (FLAURA; mPFS 18.9m; mOS 38.6m) — default: best tolerated,
  #    oral-only, suitable ECOG 0-2.
  # 2. Osimertinib+carbo+pem (FLAURA2; mPFS 25.5m; OS HR 0.75) — for high-burden disease,
  #    ECOG 0-1, non-squamous; higher toxicity (64% Grade 3+).
  # 3. Amivantamab+lazertinib (MARIPOSA; mPFS 23.7m; OS HR 0.80 trend) — fit ECOG 0-1,
  #    IV+oral combination, DOAC prophylaxis mandatory; highest toxicity (~75% Grade 3+).
  # Algorithm routes to osimertinib monotherapy as default; alternatives noted for clinician.
  - step: 25
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-EGFR-EX19DEL-ACTIONABLE
        - condition: "EGFR L858R or other classical sensitizing mutation"
    if_true:
      result: IND-NSCLC-EGFR-MUT-MET-1L
      alternatives:
        - indication: IND-NSCLC-1L-EGFR-CLASSIC-OSI-CHEMO
          criteria: "High disease burden + ECOG 0-1 + non-squamous + adequate renal function (CrCl ≥45)"
          nccn_category: 1
        - indication: IND-NSCLC-1L-EGFR-CLASSIC-AMIVANTAMAB-LAZERTINIB
          criteria: "Fit patient ECOG 0-1 + no VTE/bleeding contraindication + willing to accept IV+oral + DOAC prophylaxis"
          nccn_category: 1
        - indication_id: IND-NSCLC-EGFR-MAINT-OSIMERTINIB
          nccn_category: "1"
          criteria: >
            EGFR sensitizing mutation confirmed (ex19del or L858R); osimertinib 80 mg
            QD selected as 1L TKI (IND-NSCLC-EGFR-MUT-MET-1L decision); ≥SD/PR at
            first restaging; ongoing 1L continuation (continuous TKI paradigm — no
            distinct induction+maintenance phases). RF-NSCLC-TRANSFORMATION-PROGRESSION
            absent. Engine activates for any patient on osimertinib 1L beyond first
            restaging.
          note: >
            Osimertinib continuous 1L (FLAURA; Soria 2018 NEJM; Ramalingam 2020 NEJM):
            mPFS 18.9 vs 10.2 mo (HR 0.46); mOS 38.6 vs 31.8 mo (HR 0.80) vs 1st-gen
            TKI. CNS PFS HR 0.47 (superior CNS penetration). 80 mg PO QD continuously
            until progression or intolerable toxicity. Baseline ECHO + serial LVEF
            (cardiotoxicity ~3-5% LVEF decline); ILD monitoring throughout.
            Oligoprogression: continue + local SBRT. At systemic progression:
            amivantamab+chemotherapy (MARIPOSA-2; IND-NSCLC-3L-OSI-FAILURE-AMI) or
            biopsy-guided (C797S → 4G TKI on trial; MET-amp → savolitinib combo).
      notes: >
        Classical EGFR sensitizing (ex19del/L858R) — THREE NCCN Cat 1 options (all FDA Aug 2024):
        DEFAULT: Osimertinib 80 mg QD (FLAURA; mPFS 18.9m; mOS 38.6m; IND-NSCLC-EGFR-MUT-MET-1L)
        — oral-only, best tolerated, broad PS eligibility.
        ALTERNATIVE 1 (high-burden): Osimertinib+carbo+pem (FLAURA2; mPFS 25.5m; OS HR 0.75;
        IND-NSCLC-1L-EGFR-CLASSIC-OSI-CHEMO) — non-squamous ECOG 0-1, Grade 3+ AEs 64%.
        ALTERNATIVE 2 (fit patients): Amivantamab+lazertinib (MARIPOSA; mPFS 23.7m; OS HR 0.80 trend;
        IND-NSCLC-1L-EGFR-CLASSIC-AMIVANTAMAB-LAZERTINIB) — ECOG 0-1, DOAC mandatory, Grade 3+ ~75%.
        NOT for exon 20 insertion (step 2 above routes ex20ins to amivantamab+carbo+pem).
    if_false:
      next_step: 3
    notes: "Updated 2026-05-04 (Workstream EG): Added FLAURA2 and MARIPOSA Cat 1 alternatives. All three FDA-approved Aug 19, 2024 (FLAURA2) or older (osimertinib mono). Osimertinib mono remains default due to best tolerability."

  # Step 3 — ALK fusion.
  - step: 3
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-ALK-FUSION-ACTIONABLE
    if_true:
      result: IND-NSCLC-ALK-MET-1L
      notes: >
        ALK fusion: alectinib (ALEX), brigatinib (ALTA-1L), or lorlatinib (CROWN)
        preferred 1L. Lorlatinib preferred for CNS disease/poor prognostic features.
        If alectinib selected and ≥SD at first restaging: IND-NSCLC-ALK-MAINT-ALECTINIB
        tracks the alectinib continuation phase (Cat 1; ALEX mPFS 34.8 mo) — see alternatives.
      alternatives:
        - indication_id: IND-NSCLC-ALK-MAINT-ALECTINIB
          nccn_category: "1"
          criteria: >
            ALK fusion confirmed; alectinib 600 mg BID selected as 1L TKI (from
            IND-NSCLC-ALK-MET-1L decision); ≥SD/PR achieved at first restaging;
            ongoing 1L continuation (continuous TKI — not post-progression; not new
            line). RF-NSCLC-TRANSFORMATION-PROGRESSION absent. Tracks alectinib
            continuation beyond induction response per ALEX paradigm.
          note: >
            Alectinib continuous 1L (ALEX; Peters 2017 NEJM; Mok 2020 Ann Oncol;
            Mok 2024 5-yr update): mPFS 34.8 vs 10.9 mo (HR 0.43) vs crizotinib;
            5-yr OS 62.5% vs 45.5%. CNS PFS HR 0.18 (intracranial response ~81%).
            Alectinib 600 mg BID PO continuously until progression or toxicity.
            Oligoprogression: continue alectinib + local SBRT; systemic progression
            → lorlatinib 2L (preferred per CROWN) or platinum doublet.
            LFT monitoring q4w initially (hepatotoxicity Grade ≥3 ~5%).
            Alternative 1L: lorlatinib (CROWN; mPFS NR at 5yr; higher CNS cognitive AEs).
        - indication_id: IND-NSCLC-ALK-1L-ENSARTINIB
          nccn_category: "2A"
          criteria: >
            ALK rearrangement confirmed (FISH / IHC D5F3 / RNA-NGS); TKI-naive stage IV
            metastatic NSCLC; ECOG 0-2; alectinib not accessible or rash-tolerant patient
            profile. Ensartinib 225 mg PO QD continuously. Strong CYP3A4 inhibitors/inducers
            require dose modification. LFT monitoring (hepatotoxicity); dermatology consult
            for Grade 2+ rash (dominant AE class ~67% any-grade, ~12% Grade 3).
          note: >
            Ensartinib 1L ALK+ metastatic NSCLC (eXalt3; Markham 2021 Lancet Oncol; FDA
            Dec 2024; NCCN Cat 2A): mPFS 25.8 vs 12.7 mo vs crizotinib (HR 0.51; 95%
            CI 0.35-0.72); ORR ~74% BICR; intracranial ORR ~64% with brain metastases.
            Second-generation ALK TKI — similar PFS magnitude to alectinib (eXalt3 ~25.8
            mo; ALEX ~35 mo); choose when alectinib inaccessible, rash-tolerant profile,
            or patient/MDT preference. CNS-active. Rash management: topical corticosteroids
            + proactive dermatology referral; dose interruption for Grade 3.
            NOT recommended post-alectinib (cross-resistance likely; lorlatinib preferred).
    if_false:
      next_step: 4

  # Step 4 — ROS1 fusion.
  # Two NCCN Cat 1 next-gen ROS1 TKIs: repotrectinib (aggressive-track, CNS-dominant)
  # and taletrectinib (standard-track, QD dosing, lower dizziness burden).
  - step: 4
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-ROS1-FUSION-ACTIONABLE
    if_true:
      result: IND-NSCLC-ROS1-1L-REPOTRECTINIB
      alternatives:
        - indication: IND-NSCLC-ROS1-1L-TALETRECTINIB
          criteria: "Standard-track alternative: QD dosing (vs BID), no lead-in titration, potentially lower dizziness burden; TRUST-I/II ORR ~72-91%; FDA accelerated approval ~2024; NCCN Cat 1"
          nccn_category: 1
      notes: >
        ROS1 fusion (~1-2% NSCLC) — TWO NCCN Cat 1 next-gen preferred options:
        DEFAULT: Repotrectinib 160 mg QD lead-in × 14d → 160 mg BID (TRIDENT-1: ORR 79%;
        mDOR 34.1 mo; IC-ORR 89%; aggressive-track for CNS-dominant disease).
        ALTERNATIVE: Taletrectinib 600 mg QD continuous (TRUST-I/II: ORR ~72-91%;
        QD dosing; no lead-in; lower dizziness; mDOR ~15 mo — may mature further).
        LEGACY: Entrectinib (STARTRK-2: ORR ~57%; CNS-active) and crizotinib remain
        options where repotrectinib/taletrectinib inaccessible (access/cost).
        MDT select based on CNS burden, patient tolerability preference, and drug access.
    if_false:
      next_step: 5

  # Step 5 — MET exon 14 skipping mutation.
  # Capmatinib preferred 1L (GEOMETRY mono-1: treatment-naive ORR 68%).
  # Tepotinib is alternative (VISION-lung: ORR 56% overall).
  - step: 5
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-MET-EX14-ACTIONABLE
    if_true:
      result: IND-NSCLC-MET-EX14-1L-CAPMATINIB
      notes: >
        MET exon 14 skipping: capmatinib 400 mg BID (GEOMETRY mono-1: treatment-naive
        ORR 67.9%; mPFS ~12.4m). Tepotinib 500 mg QD (VISION: ORR 56%) is alternative.
        RNA-NGS preferred for splice variant detection.
    if_false:
      next_step: 6

  # Step 6 — RET fusion.
  # Selpercatinib preferred 1L (LIBRETTO-001: ORR 84.1%; LIBRETTO-431: PFS HR 0.46).
  # Pralsetinib is alternative.
  - step: 6
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-RET-FUSION-ACTIONABLE
    if_true:
      result: IND-NSCLC-RET-FUSION-1L-SELPERCATINIB
      notes: >
        RET fusion: selpercatinib 160 mg BID (LIBRETTO-001: treatment-naive ORR 84.1%;
        LIBRETTO-431: PFS HR 0.46 vs chemo±ICI). Pralsetinib 400 mg QD (ARROW: ORR 70%)
        is alternative. RNA-NGS preferred for fusion detection.
    if_false:
      next_step: 7

  # Step 7 — BRAF V600E mutation.
  # Dabrafenib+trametinib preferred 1L (BRF113928 cohort C: ORR 64.4%; mPFS 10.9m).
  - step: 7
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-BRAF-V600E-ACTIONABLE
    if_true:
      result: IND-NSCLC-BRAF-V600E-1L-DAB-TRAM
      notes: >
        BRAF V600E: dabrafenib 150 mg BID + trametinib 2 mg QD (BRF113928: ORR 64.4%).
        NOT for BRAF non-V600E (class II/III). Dermatology monitoring mandatory.
    if_false:
      next_step: 8

  # Step 8 — NTRK fusion (tumor-agnostic; rare in NSCLC ~0.1-0.3%).
  - step: 8
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-NTRK-FUSION-ACTIONABLE
    if_true:
      result: IND-NSCLC-NTRK-FUSION-1L-LAROTRECTINIB
      notes: >
        NTRK fusion: larotrectinib 100 mg BID (ORR ~75%; tumor-agnostic FDA approval).
        Entrectinib 600 mg QD (ORR ~57%; also ROS1/ALK active; CNS-active) is alternative.
        RNA-NGS preferred for NTRK fusion detection.
    if_false:
      next_step: 9

  # Step 9 — Driver-negative: PD-L1 TPS gate.
  # TPS ≥50%: pembrolizumab monotherapy (KEYNOTE-024: OS HR 0.63).
  # TPS <50%: chemo+ICI (KEYNOTE-189 non-squamous or KEYNOTE-407 squamous).
  - step: 9
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-PDL1-50-PLUS
    if_true:
      result: IND-NSCLC-PDL1-HIGH-MET-1L
      notes: >
        PD-L1 TPS ≥50% (22C3 pharmDx): pembrolizumab monotherapy 200 mg q3w
        (KEYNOTE-024; OS HR 0.63). Pembro+chemo also acceptable if rapid progression
        or visceral crisis requiring faster tumor reduction. For label-strict 22C3
        clone-specific documentation (insurance/regulatory audit), use
        IND-NSCLC-PDL1-22C3-PEMBRO-CLONE-SPECIFIC (same regimen, clone-documented track).
      alternatives:
        - indication_id: IND-NSCLC-PDL1-22C3-PEMBRO-CLONE-SPECIFIC
          nccn_category: "1"
          criteria: >
            Same as IND-NSCLC-PDL1-HIGH-MET-1L but PD-L1 was scored specifically
            on Dako 22C3 pharmDx companion diagnostic; label-strict adherence required
            (insurance prior-auth requiring 22C3 documentation, regulatory audit,
            clinical trial eligibility). KEYNOTE-024 clinical evidence base identical.
          note: >
            Label-strict pembrolizumab 1L track (KEYNOTE-024; NCCN Cat 1): identical
            clinical recommendation to the permissive IND-NSCLC-PDL1-HIGH-MET-1L,
            but explicitly records that PD-L1 scoring used FDA-required Dako 22C3
            pharmDx companion diagnostic. Use when payer, regulator, or protocol
            requires 22C3 assay documentation rather than Blueprint-concordant SP263/28-8.
            Clinical outcome identical; distinction is regulatory/documentation only.
    if_false:
      result: IND-NSCLC-PDL1-LOW-NONSQ-MET-1L
      notes: >
        PD-L1 TPS <50% or unknown: pembrolizumab + platinum + pemetrexed (non-squamous;
        KEYNOTE-189) or pembrolizumab + carboplatin + paclitaxel/nab-paclitaxel (squamous;
        KEYNOTE-407). TMB-high (≥10 mut/Mb) may support pembro mono even at low TPS.
        Post-4-cycle induction: pembrolizumab maintenance continuation is Cat 1 automatic
        (IND-NSCLC-PEMBRO-MAINTENANCE-POST-CHEMO). Elderly ≥75 or ECOG 2: modified
        dose-reduced regimen (IND-NSCLC-ELDERLY-CARBO-PEM-MOD). See alternatives.
      alternatives:
        - indication_id: IND-NSCLC-PEMBRO-MAINTENANCE-POST-CHEMO
          nccn_category: "1"
          criteria: >
            Driver-negative metastatic NSCLC; completed 4 induction cycles chemo +
            pembrolizumab (KEYNOTE-189 non-squamous OR KEYNOTE-407 squamous); ≥SD/PR
            at end of induction; no Grade ≥3 irAE during induction;
            CI-PEMBROLIZUMAB-AUTOIMMUNE absent. ECOG ≤2. Automatic continuation —
            not a separate clinical decision point.
          note: >
            Pembrolizumab maintenance continuation q3w to total 35 cycles (~2 yr)
            (KEYNOTE-189; Gandhi 2018 NEJM; 5-yr update; NCCN Cat 1): 5-yr OS ~19-22%
            vs ~11% chemo alone. Non-squamous: pembrolizumab + pemetrexed 500 mg/m²
            q3w maintenance. Squamous: pembrolizumab monotherapy. TSH + thyroid q3
            cycles; any new dyspnea → hold + CT (pneumonitis). At 35 cycles: stop per
            protocol; re-challenge feasible if response durable ≥6 months and progression occurs.
        - indication_id: IND-NSCLC-ELDERLY-CARBO-PEM-MOD
          nccn_category: "1"
          criteria: >
            Non-squamous stage IV NSCLC; driver-negative; PD-L1 TPS <50% (TPS ≥50%
            → IND-NSCLC-PDL1-HIGH-MET-1L monotherapy); age ≥75 AND/OR ECOG 2; CGA
            + G8 frailty score performed; full-dose KEYNOTE-189 regimen (carbo AUC
            5-6) deemed intolerable. Excludes ECOG ≥3 (hard gate — BSC/palliative).
          note: >
            Dose-modified carbo-pem ± pembro for elderly/ECOG 2 non-squamous NSCLC
            (NCCN Cat 1 reduced-intensity approach; JCOG 0803; Quoix 2011 Lancet Oncol):
            carboplatin AUC 4 (vs standard AUC 5-6) + pemetrexed 500 mg/m² q21d ×
            4-6 cycles then pemetrexed maintenance ± pembrolizumab. Elderly subgroup
            KEYNOTE-189 (JCO 2020): pembro addition OS HR ~0.79 — add when ECOG 0-1
            + tolerability confirmed. ECOG 2: single-agent chemo (weekly paclitaxel
            or gemcitabine) if doublet still intolerable. CGA mandatory for ≥75.
            Ukraine: carbo+pem NSZU-accessible; pembro via import/foundation.
        - indication_id: IND-NSCLC-TMB-HIGH-MET-1L-PEMBRO-MONO
          nccn_category: "2A"
          criteria: >
            Driver-negative metastatic NSCLC (EGFR/ALK/ROS1/RET/MET/BRAF all absent);
            TMB ≥10 mut/Mb by Foundation One CDx or comparable validated assay; PD-L1
            TPS ambiguous (1-49%) or patient prefers ICI monotherapy over chemo+ICI;
            ECOG 0-2; no active autoimmune disease. NOT for EGFR/ALK-driven NSCLC —
            targeted TKIs are superior.
          note: >
            Pembrolizumab monotherapy for TMB-high (≥10 mut/Mb) NSCLC (KEYNOTE-158
            pan-tumor; KEYNOTE-042 TMB-high subgroup; NCCN Cat 2A): ORR ~29% in
            TMB-high cohort vs ~6% in TMB-low. TMB-high status enables single-agent
            pembrolizumab even when PD-L1 TPS is 1-49% — addresses the patient group
            where chemo+ICI toxicity is less desirable. NOTE: KEYNOTE-158 FDA approval
            is pan-tumor (excludes NSCLC in primary cohort); NSCLC evidence extrapolated
            from subgroup analyses. TMB-high does NOT override strong driver mutations —
            standard targeted therapy takes precedence. CheckMate-227 (nivo+ipi vs chemo)
            also showed TMB-high PFS benefit (≥10 mut/Mb); OS endpoint not TMB-selective.

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed: "2026-05-04"
notes: >
  NSCLC DRIVER CASCADE (1L):
  EGFR (ex19del/L858R/ex20ins) → ALK fusion → ROS1 fusion → MET ex14 →
  RET fusion → BRAF V600E → NTRK fusion → PD-L1 ICI ± chemo

  Driver prevalence in non-squamous NSCLC (approximate):
  - EGFR sensitizing: 10-15% (Western), 40-50% (East Asian)
  - ALK fusion: 3-5%
  - ROS1 fusion: 1-2%
  - MET ex14 skipping: 3-4%
  - BRAF V600E: 1-3%
  - RET fusion: 1-2%
  - NTRK fusion: 0.1-0.3%
  - KRAS G12C: 13% (no approved 1L inhibitor as of 2026)

  Key testing note: comprehensive NGS (DNA+RNA) at diagnosis recommended for
  all non-squamous NSCLC stage IV. RNA-NGS critical for fusion detection
  (ALK, ROS1, RET, NTRK, MET ex14 splice variants).

  KRAS G12C: no approved 1L inhibitor — routes to ICI+chemo backbone 1L;
  sotorasib/adagrasib are 2L options.

  Updated 2026-05-04: expanded step 4 cascade to cover all 5 remaining
  driver subtypes with per-driver 1L indications now authored.
  UPDATED 2026-05-04 (Workstream FJ): IND-NSCLC-PDL1-22C3-PEMBRO-CLONE-SPECIFIC
  added to output_indications; wired as Cat 1 alternative at step 9 if_true
  (PD-L1 high track). Companion to IND-NSCLC-PDL1-HIGH-MET-1L — identical
  clinical recommendation but explicit 22C3 pharmDx clone documentation
  for label-strict adherence scenarios.

  UPDATED 2026-05-04 (Workstream FT): IND-NSCLC-ALK-1L-ENSARTINIB (Cat 2A)
  wired as alternative at step 3 if_true (ALK 1L; eXalt3 mPFS 25.8 mo; FDA
  Dec 2024; rash-dominant AE). IND-NSCLC-TMB-HIGH-MET-1L-PEMBRO-MONO (Cat 2A)
  wired as alternative at step 9 if_false (TMB ≥10 mut/Mb; pembro mono;
  KEYNOTE-158 subgroup; driver-negative only).

  UPDATED 2026-05-04 (Workstream FN): 4 maintenance/special-population
  indications added to output_indications and wired as alternatives:
  - IND-NSCLC-ALK-MAINT-ALECTINIB at step 3 if_true (alectinib cont.; ALEX
    mPFS 34.8 mo; Cat 1).
  - IND-NSCLC-EGFR-MAINT-OSIMERTINIB at step 25 if_true (osimertinib cont.;
    FLAURA mPFS 18.9 mo; Cat 1).
  - IND-NSCLC-PEMBRO-MAINTENANCE-POST-CHEMO at step 9 if_false (pembro
    continuation post 4-cycle induction; KEYNOTE-189 5-yr OS 22%; Cat 1).
  - IND-NSCLC-ELDERLY-CARBO-PEM-MOD at step 9 if_false (carbo AUC4 + pem
    for elderly ≥75 / ECOG 2; Cat 1).
