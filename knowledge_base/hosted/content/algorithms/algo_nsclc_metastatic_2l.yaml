id: ALGO-NSCLC-METASTATIC-2L
applicable_to_disease: DIS-NSCLC
applicable_to_line_of_therapy: 2
purpose: >
  Single integrated decision tree for 2L+ metastatic NSCLC. Branches in
  priority order by actionable driver mutation, with default fallback
  to docetaxel-based cytotoxic chemotherapy for driver-negative disease.
  Driver detection requires comprehensive NGS panel (ideally RNA-NGS for
  fusion sensitivity) prior to 2L; if 1L NGS not done, repeat at
  progression to characterize resistance and rule out missed drivers.
  Driver-positive patients who progressed on 1L targeted TKI receive
  next-line targeted (per molecular subtype); driver-negative who
  progressed on 1L platinum+ICI receive cytotoxic doublet.

output_indications:
  - IND-NSCLC-2L-EGFR-POST-OSI-AMI-LAZ
  - IND-NSCLC-2L-EGFR-EX20INS-AMIVANTAMAB
  - IND-NSCLC-2L-EGFR-POST-1G-OSIMERTINIB
  - IND-NSCLC-ALK-2L-LORLATINIB
  - IND-NSCLC-2L-ROS1-POST-CRIZ-ENTRECTINIB
  - IND-NSCLC-2L-ROS1-REPOTRECTINIB
  - IND-NSCLC-2L-KRAS-G12C-SOTORASIB
  - IND-NSCLC-2L-KRAS-G12C-ADAGRASIB
  - IND-NSCLC-2L-KRAS-G12C-GLECIRASIB
  - IND-NSCLC-2L-MET-EX14-CAPMATINIB
  - IND-NSCLC-2L-MET-EX14-TEPOTINIB
  - IND-NSCLC-2L-MET-AMP-CAPMATINIB
  - IND-NSCLC-2L-BRAF-V600E-DAB-TRAM
  - IND-NSCLC-2L-RET-FUSION-SELPERCATINIB
  - IND-NSCLC-2L-NTRK-LAROTRECTINIB
  - IND-PAN-NTRK-2L-REPOTRECTINIB
  - IND-NSCLC-2L-HER2-MUT-T-DXD
  - IND-NSCLC-2L-DATO-DXD
  - IND-NSCLC-2L-PD-L1-POST-IO-DOCETAXEL
  - IND-NSCLC-2L-DOCETAXEL-RAMUCIRUMAB
  - IND-NSCLC-KRAS-G12C-MET-2L
  - IND-NSCLC-NRG1-ZENOCUTUZUMAB
  - IND-NSCLC-EGFR-POST-OSI-PATRITUMAB-DXD

default_indication: IND-NSCLC-2L-PD-L1-POST-IO-DOCETAXEL  # driver-negative cytotoxic fallback
alternative_indication: IND-NSCLC-2L-EGFR-POST-OSI-AMI-LAZ  # most-common driver-targeted aggressive track

decision_tree:
  # ── Step 1: EGFR-mut detect (any EGFR sensitizing variant) ──────────
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-EGFR-EX19DEL-ACTIONABLE
        - red_flag: RF-NSCLC-EGFR-EX20INS-ACTIONABLE
        - red_flag: RF-NSCLC-EGFR-T790M-ACTIONABLE
        - red_flag: RF-NSCLC-EGFR-C797S-RESISTANCE
    if_true:
      next_step: 2
    if_false:
      next_step: 4

  - step: 2
    # Ex20ins is a distinct molecular subset → amivantamab (CHRYSALIS).
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-EGFR-EX20INS-ACTIONABLE
    if_true:
      result: IND-NSCLC-2L-EGFR-EX20INS-AMIVANTAMAB
    if_false:
      next_step: 3

  - step: 3
    # EGFR activating (ex19del / L858R / T790M / C797S): routes to step 31
    # for prior-TKI-generation gate (post-1G/2G TKI → osimertinib 2L;
    # post-osimertinib → ami+laz MARIPOSA-2).
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-EGFR-EX19DEL-ACTIONABLE
        - red_flag: RF-NSCLC-EGFR-T790M-ACTIONABLE
        - red_flag: RF-NSCLC-EGFR-C797S-RESISTANCE
        - red_flag: RF-NSCLC-TRANSFORMATION-PROGRESSION
    if_true:
      next_step: 31
      notes: "EGFR activating: routes to step 31 (prior TKI generation gate)."
    if_false:
      next_step: 31
      notes: "Fall-through to step 31 (EGFR 2L prior-generation gate)."

  # Step 31 — Prior EGFR-TKI generation gate.
  # Post-osimertinib 1L → ami+laz (MARIPOSA-2; NCCN Cat 1).
  # Post-1G/2G TKI 1L (erlotinib/gefitinib/afatinib) → osimertinib 2L
  # (AURA3; T790M+; NCCN Cat 1). Free-text condition (no RF for prior TKI generation yet).
  - step: 31
    evaluate:
      any_of:
        - condition: "Prior 1L EGFR-TKI was osimertinib (3rd-generation; Tagrisso)"
    if_true:
      result: IND-NSCLC-2L-EGFR-POST-OSI-AMI-LAZ
      notes: >
        Post-osimertinib 1L: amivantamab 1400 mg IV + lazertinib 240 mg PO once daily
        (REG-AMI-LAZ-NSCLC; MARIPOSA-2; ORR 64%; mPFS 8.3 mo vs chemo;
        NCCN Cat 1). Preferred post-osi 2L. Monitor for infusion-related reactions (IVRs)
        + EGFR/MET-targeted toxicity (rash, paronychia, edema, hypoalbuminemia). 3L+ post
        ami+laz failure or as salvage option: patritumab-DXd (HERTHENA-Lung01; ORR ~30%;
        Cat 2A) — see IND-NSCLC-EGFR-POST-OSI-PATRITUMAB-DXD in alternatives.
      alternatives:
        - indication_id: IND-NSCLC-EGFR-POST-OSI-PATRITUMAB-DXD
          nccn_category: "2A"
          criteria: >
            EGFR sensitizing mutation (ex19del / L858R / T790M-acquired); disease
            progression on prior osimertinib AND prior platinum-based chemotherapy
            (typical 3L+ position: post-osi + post-platinum); ECOG 0-2; no active
            or history of ILD/pneumonitis; adequate renal and hepatic function.
            NOTE: FDA accelerated approval withdrawn 2024 post HERTHENA-Lung02 (negative
            OS in phase III vs platinum doublet) — regulatory status fluid; access via
            expanded-access or clinical trial preferred. Informed consent re phase III
            results mandatory.
          note: >
            Patritumab deruxtecan (HER3-DXd) for EGFR-mut NSCLC post-osi + platinum
            (HERTHENA-Lung01 phase II; Nakagawa 2023 NEJM; NCCN Cat 2A): BICR ORR ~30%;
            mPFS 5.5 mo; mDOR 5.6 mo; intracranial ORR ~33% (non-irradiated). HER3-DXd
            mechanism targets HER3-overexpressed resistance clones post-osimertinib.
            ILD class risk (adjudicated ILD ~5-10% all-grade; Grade ≥3 ~3%) — baseline
            HR-CT + serial pulmonary monitoring; permanently discontinue Grade ≥2.
            Neutropenia + nausea dominant other AEs. G-CSF prophylaxis per protocol.
            FDA accelerated approval withdrawn 2024 after HERTHENA-Lung02 OS negative;
            reserve for truly 3L+ exhausted patients or via trial.
    if_false:
      result: IND-NSCLC-2L-EGFR-POST-1G-OSIMERTINIB
      notes: >
        Post-1G/2G TKI 1L (erlotinib/gefitinib/afatinib/dacomitinib): osimertinib 80 mg/day
        (REG-OSIMERTINIB-NSCLC; AURA3 Mok 2017 NEJM; T790M+; mPFS 10.1 mo; HR 0.30;
        ORR 71%; CNS ORR 91%; NCCN Cat 1). T790M confirmation recommended (tissue rebiopsy
        or liquid biopsy); if T790M-negative: platinum-pemetrexed or docetaxel±ram.
        Ukraine: erlotinib/gefitinib are common 1L options (NSZU-funded generics) →
        post-1G TKI osimertinib 2L is a prevalent clinical scenario.
    notes: "Step 31 added 2026-05-04 (Workstream CB): prior EGFR-TKI generation gate. IND-NSCLC-2L-EGFR-POST-1G-OSIMERTINIB authored (AURA3 Cat 1). Post-osi → ami+laz; post-1G/2G → osimertinib 2L. Gap CLOSED. Free-text condition — MDT-evaluated (no RF for prior TKI generation yet)."

  # ── Step 4: ALK-rearranged ────────────────────────────────────────
  - step: 4
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-ALK-FUSION-ACTIONABLE
    if_true:
      next_step: 5
    if_false:
      next_step: 6

  - step: 5
    # ALK 2L: post-1G crizotinib OR post-2G alectinib/brigatinib → lorlatinib
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-ALK-FUSION-ACTIONABLE
        - red_flag: RF-NSCLC-TRANSFORMATION-PROGRESSION
    if_true:
      result: IND-NSCLC-ALK-2L-LORLATINIB
    if_false:
      result: IND-NSCLC-ALK-2L-LORLATINIB

  # ── Step 6: ROS1 ──────────────────────────────────────────────────
  - step: 6
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-ROS1-FUSION-ACTIONABLE
    if_true:
      next_step: 7
    if_false:
      next_step: 8

  - step: 7
    # ROS1 2L: characterized G2032R → repotrectinib; otherwise entrectinib.
    # G2032R/post-entrectinib failure is a sub-classification not yet captured
    # by a dedicated RF; condition retained as plain text + MDT flag.
    evaluate:
      any_of:
        - condition: "G2032R solvent-front resistance mutation OR post-entrectinib failure"
    if_true:
      result: IND-NSCLC-2L-ROS1-REPOTRECTINIB
    if_false:
      result: IND-NSCLC-2L-ROS1-POST-CRIZ-ENTRECTINIB
    notes: "MDT-only — sub-stratification by G2032R / post-entrectinib failure has no dedicated RF (resistance-mutation level). Default routes to entrectinib (MDT may switch to repotrectinib)."

  # ── Step 8: KRAS G12C ─────────────────────────────────────────────
  - step: 8
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-KRAS-G12C-ACTIONABLE
    if_true:
      next_step: 9
    if_false:
      next_step: 10

  - step: 9
    # KRAS G12C 2L: THREE options. Active brain mets → adagrasib preferred.
    # Sotorasib is default (avoid if PPI use — acid-dependent dissolution).
    # Glecirasib (KRYSTAL-6; FDA Oct 2024) is NCCN Cat 2A third option.
    evaluate:
      any_of:
        - condition: "Active untreated brain metastases (adagrasib intracranial ORR ~33%)"
    if_true:
      result: IND-NSCLC-2L-KRAS-G12C-ADAGRASIB
      alternatives:
        - indication: IND-NSCLC-2L-KRAS-G12C-GLECIRASIB
          criteria: "Glecirasib 400 mg BID when adagrasib inaccessible; KRYSTAL-6; FDA Oct 2024; NCCN Cat 2A; third KRAS G12C inhibitor; QTc monitoring required"
          nccn_category: "2A"
    if_false:
      result: IND-NSCLC-2L-KRAS-G12C-SOTORASIB
      alternatives:
        - indication: IND-NSCLC-2L-KRAS-G12C-ADAGRASIB
          criteria: "PPI use contraindicated with sotorasib (acid-dependent dissolution) → adagrasib preferred; or adagrasib when CNS activity needed"
          nccn_category: 1
        - indication: IND-NSCLC-2L-KRAS-G12C-GLECIRASIB
          criteria: "Glecirasib 400 mg BID — NCCN Cat 2A; third option when sotorasib/adagrasib inaccessible; FDA Oct 2024 (KRYSTAL-6); QTc monitoring required"
          nccn_category: "2A"
        - indication_id: IND-NSCLC-KRAS-G12C-MET-2L
          nccn_category: "2A"
          criteria: >
            KRAS G12C-mutant metastatic NSCLC; 2L after progression on 1L platinum+ICI;
            ECOG 0-2. Legacy entity for sotorasib 2L (CodeBreaK 200; FDA May 2021; NCCN
            Cat 2A). Use IND-NSCLC-2L-KRAS-G12C-SOTORASIB (Cat 1) as primary. Retained
            for backward compatibility with pre-CodeBreaK-200 NCCN versioned plans.
          note: >
            Sotorasib 960 mg PO QD (REG-SOTORASIB-KRAS) for KRAS G12C 2L NSCLC
            (CodeBreaK 200; de Langen 2023 NEJM; NCCN Cat 2A legacy / Cat 1 updated).
            mPFS 5.6 vs 4.5 mo (HR 0.66). Adagrasib 600 mg BID alternative (KRYSTAL-1).
            Superseded in NCCN priority by Cat 1 specifics — defer to sotorasib
            (IND-NSCLC-2L-KRAS-G12C-SOTORASIB) or adagrasib/glecirasib variants above.
    notes: >
      KRAS G12C 2L — THREE KRAS G12C inhibitors available:
      Cat 1: Sotorasib 960 mg QD (CodeBreaK-200; default when no active CNS + no PPI).
      Cat 1: Adagrasib 600 mg BID (KRYSTAL-1; brain-met preferred; QTc monitoring).
      Cat 2A: Glecirasib 400 mg BID (KRYSTAL-6; FDA Oct 2024; third option when 1st two inaccessible).
      PPI interaction: sotorasib requires acidic environment (avoid PPIs);
      adagrasib and glecirasib have no PPI interaction — prefer adagrasib/glecirasib if PPI required.
      MDT-only — brain-met status and drug access drive choice.

  # ── Step 10: MET ex14 ─────────────────────────────────────────────
  - step: 10
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-MET-EX14-ACTIONABLE
    if_true:
      next_step: 11
    if_false:
      next_step: 100

  - step: 11
    # MET ex14 2L: once-daily preference → tepotinib; otherwise capmatinib.
    # Adherence preference is not a clinical-finding RF; condition retained.
    evaluate:
      any_of:
        - condition: "Once-daily dosing preferred (adherence / convenience)"
    if_true:
      result: IND-NSCLC-2L-MET-EX14-TEPOTINIB
    if_false:
      result: IND-NSCLC-2L-MET-EX14-CAPMATINIB
    notes: "MDT-only — capmatinib BID vs tepotinib once-daily is a preference call; default capmatinib."

  # ── Step 100: MET amplification (high-level, distinct from ex14) ───
  # Parallel to MET ex14 — fires only when ex14 absent. High-level MET
  # amplification (FISH MET/CEP7 ≥4 OR mean GCN ≥10) routes to capmatinib
  # (off-label expansion supported by GEOMETRY mono-1 high-amp cohort:
  # ORR ~40%, mPFS ~5.5 mo). Step number 100 to avoid renumbering existing
  # downstream steps (12-16); engine resolves steps by id, not by order.
  - step: 100
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-MET-AMP-ACTIONABLE
    if_true:
      result: IND-NSCLC-2L-MET-AMP-CAPMATINIB
    if_false:
      next_step: 12
    notes: "MET amplification is distinct from ex14 skipping; capmatinib off-label use supported by NCCN/ESMO 2024-2025 (Cat 2A)."

  # ── Step 12: BRAF V600E ───────────────────────────────────────────
  - step: 12
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-BRAF-V600E-ACTIONABLE
    if_true:
      result: IND-NSCLC-2L-BRAF-V600E-DAB-TRAM
    if_false:
      next_step: 13

  # ── Step 13: RET fusion ───────────────────────────────────────────
  - step: 13
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-RET-FUSION-ACTIONABLE
    if_true:
      result: IND-NSCLC-2L-RET-FUSION-SELPERCATINIB
    if_false:
      next_step: 14

  # ── Step 14: NTRK fusion (pan-tumor) ──────────────────────────────
  - step: 14
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-NTRK-FUSION-ACTIONABLE
    if_true:
      result: IND-NSCLC-2L-NTRK-LAROTRECTINIB
      notes: >
        NTRK fusion: larotrectinib preferred 2L (best-tolerated; ORR ~75%;
        tumor-agnostic Cat 1). Repotrectinib preferred when post-1G TKI
        resistance mutations present (G595R, G667C, xDFG-motif) — see
        alternatives.
      alternatives:
        - indication_id: IND-PAN-NTRK-2L-REPOTRECTINIB
          nccn_category: "1"
          criteria: >
            NTRK1/2/3 fusion confirmed; disease progression on prior TRK
            inhibitor (larotrectinib OR entrectinib) with solvent-front
            resistance mutations (G595R/G667C/xDFG-motif confirmed on
            resistance-biopsy NGS); OR TKI-naive when repotrectinib selected
            as first targeted agent; ECOG ≤2; pan-tumor FDA approval 2024.
          note: >
            Repotrectinib 2L post-TKI (TRIDENT-1; Drilon 2024 NEJM;
            NCCN Cat 1; FDA tumor-agnostic approval Jun 2024): ORR ~58%
            post-1G-TKI; covers solvent-front resistance mutations inactive
            to larotrectinib/entrectinib. 160 mg QD lead-in × 14d →
            160 mg BID. Also active in ROS1 fusion (separate 2L ROS1
            indication). RNA-NGS preferred for NTRK fusion detection +
            resistance mutation profiling at progression. Tumor-agnostic:
            NSCLC listed as primary disease_id; applies across solid tumors.
    if_false:
      next_step: 15

  # ── Step 15: HER2 mutation ────────────────────────────────────────
  - step: 15
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-HER2-MUT-ACTIONABLE
    if_true:
      result: IND-NSCLC-2L-HER2-MUT-T-DXD
    if_false:
      next_step: 151

  # ── Step 151: NRG1 fusion (zenocutuzumab) ─────────────────────────
  # Rare driver (~0.2-0.3% NSCLC; enriched in invasive mucinous adenocarcinoma).
  # RNA-NGS essential — DNA-NGS misses ~30-50% of NRG1 fusions.
  # FDA approved Dec 2024 for NRG1-fusion+ NSCLC + pancreatic adenocarcinoma.
  - step: 151
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-NRG1-FUSION-ACTIONABLE
    if_true:
      result: IND-NSCLC-NRG1-ZENOCUTUZUMAB
      notes: >
        NRG1 fusion+ NSCLC: zenocutuzumab (Bizengri) — HER2×HER3 bispecific antibody;
        blocks NRG1-driven HER3 hyperactivation. eNRGy phase II NSCLC subset ORR ~33%;
        mDOR 7.4 mo; mPFS ~6.8 mo (FDA Dec 2024; NCCN Cat 2A). RNA-NGS mandatory
        (DNA-NGS false-negative ~30-50% for NRG1). Infusion premedication required;
        monitor LVEF (HER2-class signal if LVEF <50%).
    if_false:
      next_step: 16
    notes: "Step 151 added 2026-05-04 (Workstream FT): NRG1 fusion gate between HER2 (step 15) and driver-negative default (step 16). RF-NSCLC-NRG1-FUSION-ACTIONABLE: if authored, this step wires automatically; if not present, falls through to step 16 (driver-negative default). RNA-NGS mandatory for NRG1 detection."

  # ── Step 16: Default — driver-negative post-IO+chemo → histology gate ─
  - step: 16
    evaluate:
      any_of:
        - condition: "Driver-negative disease, progression on 1L platinum + ICI"
        - red_flag: RF-NSCLC-TRANSFORMATION-PROGRESSION
    if_true:
      next_step: 161
    if_false:
      next_step: 161
    notes: "Step 16 if_true/if_false updated 2026-05-04 (Workstream CF): routes to step 161 (nonsquamous gate) instead of docetaxel directly."

  # ── Step 161: Nonsquamous histology gate (DATO-DXd vs docetaxel±ram) ─
  # DATO-DXd: TROPION-Lung01 nonsquamous PFS HR 0.84; ORR 26% vs 13%;
  # squamous subgroup excluded (no benefit). FDA approval Jan 2025
  # (EGFR-mut scope; NCCN Cat 2A broad nonsquamous).
  # Docetaxel±ram: REVEL NCCN Cat 1 squamous + nonsquamous.
  - step: 161
    evaluate:
      any_of:
        - condition: "Nonsquamous NSCLC histology confirmed (adenocarcinoma, large-cell, adenosquamous, or NOS/mixed; NOT pure squamous cell carcinoma by pathology)"
    if_true:
      result: IND-NSCLC-2L-DATO-DXD
      notes: >
        Nonsquamous NSCLC 2L driver-negative: datopotamab deruxtecan 6 mg/kg IV q21d
        (REG-DATO-DXD-NSCLC-2L; TROPION-Lung01; nonsquamous mPFS HR 0.84; ORR 26%
        vs 13% docetaxel; NCCN Cat 2A). ILD monitoring mandatory (adjudicated ~8%
        all-grade) — baseline CT chest; any new dyspnea → hold + CT. Squamous excluded.
        Ukraine: DATO-DXd not NSZU-funded; imported/foundation access required.
        If inaccessible: IND-NSCLC-2L-PD-L1-POST-IO-DOCETAXEL as standard fallback.
    if_false:
      result: IND-NSCLC-2L-PD-L1-POST-IO-DOCETAXEL
      notes: >
        Squamous NSCLC or histology unknown: docetaxel ± ramucirumab (REVEL Garon 2014
        Lancet; mOS 10.5 vs 9.1 mo; HR 0.86; NCCN Cat 1). DATO-DXd excluded —
        TROPION-Lung01 squamous subgroup showed no PFS/OS benefit. Single-agent
        docetaxel (IND-NSCLC-2L-PD-L1-POST-IO-DOCETAXEL) is default; docetaxel +
        ramucirumab is Cat 1 preferred for fit patients with funding — see alternatives.
        Ukraine: ramucirumab not NSZU-reimbursed; single-agent docetaxel is the
        practical standard fallback.
      alternatives:
        - indication_id: IND-NSCLC-2L-DOCETAXEL-RAMUCIRUMAB
          nccn_category: "1"
          criteria: >
            Squamous or non-squamous NSCLC; 2L after 1L chemo+ICI failure; driver-negative
            (EGFR-wt, ALK-neg); ECOG 0-2; no active hemoptysis; no uncontrolled HTN
            >160/100; no major surgery within 28 days (ramucirumab VEGFR2 contraindications);
            ramucirumab access confirmed (funding pathway identified). If ramucirumab
            inaccessible (UA default): IND-NSCLC-2L-PD-L1-POST-IO-DOCETAXEL (single-agent
            docetaxel) is the NSZU-accessible fallback.
          note: >
            Docetaxel + ramucirumab (REVEL; Garon 2014 Lancet; NCCN Cat 1): mOS 10.5
            vs 9.1 months (HR 0.86; p=0.023); mPFS 4.5 vs 3.0 months (HR 0.76); ORR
            23% vs 14%. Ramucirumab 10 mg/kg IV + docetaxel 75 mg/m² q21d. Benefit
            across squamous and non-squamous histology (subgroup consistent). Preferred
            over docetaxel alone for fit patients with access.
            Ukraine: ramucirumab not NSZU-reimbursed — single-agent docetaxel remains
            UA-accessible 2L cytotoxic default.
    notes: "Step 161 added 2026-05-04 (Workstream CF): nonsquamous histology gate — nonsquamous → DATO-DXd (TROPION-Lung01; NCCN Cat 2A); squamous/unknown → docetaxel±ram (Cat 1). Gap CLOSED."

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

last_reviewed: "2026-05-04"
notes: >
  Driver-stratified 2L+ algorithm. Branches in priority order by
  actionable mutation; default fallback to docetaxel±ramucirumab for
  driver-negative disease.

  DEPTH CAP: nesting capped at 4 levels (per scope). Deeper logic
  surfaced as `condition` text within steps and as free-text below:

  EGFR sub-branches (deferred — separate Indications when authored):
  - Post-1G/2G TKI 1L → osimertinib 2L (FLAURA pre-arrival pathway,
    increasingly rare).
  - T790M-positive post-1G/2G TKI → osimertinib 2L.
  - C797S resistance post-osimertinib → next-gen 4G EGFR-TKI in
    development (no FDA approval yet).
  - MET-amp resistance post-osimertinib → osimertinib + savolitinib
    (SAVANNAH; not FDA-approved); ami+laz covers indirectly via MET arm.
  - Histologic transformation (small-cell ~5-15%) → platinum+etoposide.

  ALK sub-branches:
  - Post-1G crizotinib → 2G alectinib/brigatinib (preserves lorlatinib
    for 3L); but if 1L was already 2G, then 2L = lorlatinib.
  - Post-lorlatinib 3L → repotrectinib (early data; off-label).
  - Compound-mutation ALK → repotrectinib.

  ROS1 sub-branches:
  - Crizotinib 1L → entrectinib 2L (CNS) OR repotrectinib (G2032R).
  - Entrectinib 1L → repotrectinib 2L (G2032R or other resistance).

  KRAS G12C: sotorasib + adagrasib both phase-3-validated (CodeBreaK
  200) or phase-2 (KRYSTAL-1, KRYSTAL-12 ongoing). CNS-mets-driven choice.

  MET ex14: capmatinib BID vs tepotinib once-daily — comparable.

  BRAF V600E: dab+tram (BRF113928) vs encorafenib+binimetinib (PHAROS
  2023) — comparable; dab+tram registered in UA.

  RET: selpercatinib > pralsetinib (less heme toxicity).

  NTRK: larotrectinib (best-tolerated) > entrectinib > repotrectinib
  (resistance).

  HER2-mut: T-DXd 5.4 mg/kg (DESTINY-Lung02 dose; less pneumonitis).

  Driver-negative default: doc+ram (REVEL) > doc+nintedanib (LUME-Lung
  1, adenocarcinoma) > single-agent docetaxel (UA fallback).

  UPDATED 2026-05-04 (Workstream CB): IND-NSCLC-2L-EGFR-POST-1G-OSIMERTINIB authored
  and wired at step 31 as prior EGFR-TKI generation gate (AURA3 Mok 2017 NEJM; NCCN Cat 1;
  mPFS 10.1 mo; HR 0.30). Post-osimertinib 1L → ami+laz; post-1G/2G TKI → osi 2L.
  Gap (post-1G/2G TKI sub-branch) CLOSED.
  UPDATED 2026-05-04 (Workstream CF): IND-NSCLC-2L-DATO-DXD wired at step 161
