id: ALGO-PCNSL-2L
applicable_to_disease: DIS-PCNSL
applicable_to_line_of_therapy: 2
purpose: "Select 2L Indication for relapsed/refractory primary CNS lymphoma after 1L HD-MTX-based induction (R-MPV or MATRix). Routing branches on HD-MTX eligibility and prior MTX-response:\n- HD-MTX CONTRAINDICATED (frailty, CrCl <50, hepatic dysfunction):\n  IND-PCNSL-2L-IBRUTINIB — oral BTKi; no nephrotoxicity; BBB-penetrant.\n\n- MTX-REFRACTORY (primary refractory OR early relapse <6 months from 1L):\n  IND-PCNSL-2L-IBRUTINIB — ibrutinib 560 mg/d; iLOC ORR 52.3%\n  (PCNSL); NCCN Cat 2A. Bridge to thiotepa-based autoSCT if CR2.\n\n- MTX-RESPONSIVE late relapse (≥6 months from 1L):\n  IND-PCNSL-2L-RMPV-SALVAGE — HD-MTX re-challenge; chemosensitive\n  late relapse ORR ~50-70%; followed by autoSCT for fit responders.\n\n2L entry triggered by: documented relapse on brain MRI ± CSF cytology after 1L (R-MPV / MATRix), OR primary refractoriness (residual contrast-enhancing lesion ≥4 weeks post-induction completion), OR isolated CSF/leptomeningeal relapse despite parenchymal CR.\n"
output_indications:
- IND-PCNSL-2L-RMPV-SALVAGE
- IND-PCNSL-2L-IBRUTINIB
- IND-PCNSL-2L-LENALIDOMIDE-RITUXIMAB
default_indication: IND-PCNSL-2L-RMPV-SALVAGE
alternative_indication: IND-PCNSL-2L-IBRUTINIB
decision_tree:
- step: 1
  evaluate:
    any_of:
    - red_flag: RF-PCNSL-FRAILTY-AGE
    - red_flag: RF-PCNSL-ORGAN-DYSFUNCTION
    - condition: CrCl <50 mL/min OR severe hepatic dysfunction (HD-MTX contraindicated)
  if_true:
    next_step: 22
    notes: >
      HD-MTX contraindicated (renal or hepatic dysfunction, frailty): ibrutinib 560 mg/d preferred
      (oral, no nephrotoxicity, CNS-penetrant). R² (lenalidomide+rituximab) if ibrutinib inaccessible.
      CrCl <30: use R² cautiously (lenalidomide renally excreted) or ibrutinib (NCCN Cat 2A).
  if_false:
    next_step: 2
- step: 2
  evaluate:
    any_of:
    - condition: 'Primary refractory: residual contrast-enhancing lesion ≥4 weeks post-1L'
    - condition: 'Early relapse: <6 months from 1L completion'
    - condition: Failure to achieve CR to 1L R-MPV / MATRix
    - red_flag: RF-PCNSL-TRANSFORMATION-PROGRESSION
  if_true:
    next_step: 22
    notes: >
      MTX-refractory (primary refractory OR early relapse <6 months): ibrutinib preferred
      (iLOC ORR 52.3%; NCCN Cat 2A). HD-MTX re-challenge has very low ORR (~15-20%).
      R² (lenalidomide+rituximab; REAL ORR ~36%) if ibrutinib inaccessible (Ukraine 2026).
      CRITICAL for ibrutinib: no anticoagulants (ICH risk); CYP3A4 check mandatory.
  if_false:
    next_step: 3
- step: 22
  evaluate:
    all_of:
    - condition: "Ibrutinib accessible (registered + funded in patient's healthcare system)"
    - condition: "No prior ibrutinib progression in this disease"
  if_true:
    result: IND-PCNSL-2L-IBRUTINIB
    notes: >
      Ibrutinib 560 mg/day PO (REG-IBRUTINIB-PCNSL; iLOC Soussain 2019; ORR 52.3% PCNSL;
      NCCN Cat 2A). BTK/NF-κB mechanism — active in MYD88-L265P+ PCNSL (~85%).
      CRITICAL: No therapeutic anticoagulation (ICH risk); CYP3A4 inhibitor interactions
      (azole antifungals → reduce ibrutinib to 140 mg/day).
  if_false:
    result: IND-PCNSL-2L-LENALIDOMIDE-RITUXIMAB
    notes: >
      Ibrutinib inaccessible (not registered in Ukraine as of 2026) OR prior ibrutinib
      progression: R² (lenalidomide 20 mg/day d1-21 + rituximab 375 mg/m² d1 q28d;
      REG-LENALIDOMIDE-RITUXIMAB-PCNSL; REAL/Rubenstein JCO 2018; ORR ~36%; NCCN Cat 2A).
      Distinct mechanism (IMiD+CD20) from BTKi — active in ibrutinib-inaccessible setting.
      MANDATORY: REMS enrollment + monthly pregnancy test; DVT prophylaxis; PJP prophylaxis.
  notes: "Step 22 added 2026-05-04 (Workstream BR): ibrutinib access gate. R² (IND-PCNSL-2L-LENALIDOMIDE-RITUXIMAB) wired as ibrutinib-inaccessible fallback. Gap (2) CLOSED. Free-text access condition; MDT-evaluated."
- step: 3
  evaluate:
    all_of:
    - condition: Documented CR or PR to 1L HD-MTX-based regimen
    - condition: 'Late relapse: ≥6 months from 1L completion'
    - none_of:
      - red_flag: RF-ORGAN-RENAL-IMPAIRED
    - condition: HD-MTX-eligible
    - any_of:
      - red_flag: RF-FITNESS-ECOG-FIT
      - red_flag: RF-FITNESS-ECOG-INTERMEDIATE
  if_true:
    result: IND-PCNSL-2L-RMPV-SALVAGE
  if_false:
    next_step: 4
  notes: Partially wired - fitness/eligibility gates wired via CSD-7A pan-disease RFs; remaining condition(s) kept as MDT-evaluated text (no RF available for that criterion).
- step: 4
  evaluate:
    any_of:
    - condition: PCNSL relapsed, CD20+, HD-MTX-eligible by default
    - red_flag: RF-PCNSL-TRANSFORMATION-PROGRESSION
  if_true:
    result: IND-PCNSL-2L-RMPV-SALVAGE
  if_false:
    result: IND-PCNSL-2L-RMPV-SALVAGE
sources:
- SRC-NCCN-CNS-2025
- SRC-NCCN-BCELL-2025
- SRC-ILOC-SOUSSAIN-2019
last_reviewed: '2026-05-04'
notes: 'UPDATED 2026-05-04 (Workstream BR): IND-PCNSL-2L-LENALIDOMIDE-RITUXIMAB authored and wired at step 22 as ibrutinib-inaccessible fallback (REAL/Rubenstein JCO 2018; lenalidomide 20 mg/day d1-21 + rituximab 375 mg/m² d1 q28d; ORR ~36%; NCCN Cat 2A). Gap (2) CLOSED. Steps 1 and 2 if_true now route to step 22 (ibrutinib access gate). ROUTING SUMMARY: (1) HD-MTX-contraindicated/frail → step 22 (ibrutinib or R²); (2) MTX-refractory/early relapse → step 22 (ibrutinib or R²); (3) MTX-sensitive late relapse → R-MPV salvage; (fallback) → R-MPV salvage. UKRAINE: ibrutinib not registered for PCNSL → R² is the default ibrutinib-inaccessible path. OOS / wiring gaps: (1) IND-PCNSL-2L-AUTOSCT-CONSOLIDATION — not modeled. (3) WBRT palliative — ECOG ≥3; MDT free-text. (4) Temozolomide ± rituximab — not modeled. (5) PD-1 inhibitors — case series only. (6) Re-biopsy mandatory if imaging atypical. (7) reviewer_signoffs: 0.

  '
