id: ALGO-PDAC-METASTATIC-1L
applicable_to_disease: DIS-PDAC
applicable_to_line_of_therapy: 1
purpose: 'Algorithm for PDAC metastatic 1L. ECOG 0-1 + bilirubin-resolved → FOLFIRINOX (preferred for fit patients; better OS but more toxic). Frail / ECOG ≥2 → gem-nab-pac de-escalation. BRCA-germline maintenance (POLO) follows ≥16 weeks platinum-induction without progression.

  '
output_indications:
- IND-PDAC-METASTATIC-1L-FOLFIRINOX
- IND-PDAC-METASTATIC-1L-GEM-NAB-PAC
- IND-PDAC-MAINTENANCE-OLAPARIB-BRCA
default_indication: IND-PDAC-METASTATIC-1L-FOLFIRINOX
alternative_indication: IND-PDAC-METASTATIC-1L-GEM-NAB-PAC
decision_tree:
- step: 2
  evaluate:
    any_of:
    - red_flag: RF-PDAC-FRAILTY-AGE
  if_true:
    result: IND-PDAC-METASTATIC-1L-GEM-NAB-PAC
  if_false:
    next_step: 3
- step: 3
  evaluate:
    all_of:
    - red_flag: RF-FITNESS-ECOG-FIT
    - red_flag: RF-PDAC-FIT-FOR-FOLFIRINOX
  if_true:
    result: IND-PDAC-METASTATIC-1L-FOLFIRINOX
  if_false:
    result: IND-PDAC-METASTATIC-1L-GEM-NAB-PAC
  notes: "Wired via RF-FITNESS-ECOG-FIT (universal) AND RF-PDAC-FIT-FOR-FOLFIRINOX (W5c chunk 2026-04-30 — bilirubin_uln_x <=1.5 AND ecog <=1 AND age <=75 per PRODIGE-4 inclusion). Both required (all_of) for FOLFIRINOX intensification; failure on either gate routes to gem-nab-pac default."
- step: 4
  evaluate:
    any_of:
    - red_flag: RF-PDAC-HIGH-RISK-BIOLOGY
  if_true:
    result: IND-PDAC-METASTATIC-1L-FOLFIRINOX
  if_false:
    result: IND-PDAC-METASTATIC-1L-FOLFIRINOX
sources:
- SRC-NCCN-PANCREATIC-2025
- SRC-ESMO-PANCREATIC-2024
last_reviewed: '2026-04-26'
notes: '3-arm algorithm: FOLFIRINOX (default fit) / gem-nab-pac (frail) / olaparib-maintenance (BRCA-germline post-platinum). NALIRIFOX (NAPOLI-3) emerging as 1L alternative — separate Indication when added.

  '
