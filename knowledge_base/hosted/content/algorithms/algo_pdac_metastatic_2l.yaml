id: ALGO-PDAC-METASTATIC-2L
applicable_to_disease: DIS-PDAC
applicable_to_line_of_therapy: 2
purpose: >
  Select 2L systemic therapy for metastatic pancreatic adenocarcinoma (mPDAC)
  after disease progression on 1L chemotherapy. Routes by prior 1L backbone
  (gemcitabine-based vs FOLFIRINOX/oxaliplatin-based) and performance status.
  2L PDAC is palliative intent; median OS with any 2L therapy is ~5-7 months.

output_indications:
  - IND-PDAC-METASTATIC-2L-NAL-IRI
  - IND-PDAC-METASTATIC-1L-GEM-NAB-PAC
  - IND-PDAC-METASTATIC-2L-FOLFOX

default_indication: IND-PDAC-METASTATIC-2L-NAL-IRI
alternative_indication: IND-PDAC-METASTATIC-2L-FOLFOX

decision_tree:
  # Step 1 — Performance status gate. PS must allow 2L systemic therapy.
  # ECOG ≥3 in PDAC: extremely poor prognosis; systemic therapy rarely beneficial.
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-FITNESS-ECOG-FIT
        - red_flag: RF-FITNESS-ECOG-INTERMEDIATE
    if_true:
      next_step: 2
    if_false:
      result: null
      notes: >
        ECOG ≥3 after 1L PDAC: systemic therapy benefit minimal — toxicity likely
        exceeds benefit. Best supportive care. Hospice/palliative referral.
        Assess reversible causes of PS decline (biliary obstruction, dehydration,
        pain, steroids) before concluding PS ≥3 is irreversible.

  # Step 2 — Biliary obstruction clearance. High bilirubin contraindicates
  # irinotecan/5-FU-based therapy (hepatic metabolism impaired).
  - step: 2
    evaluate:
      any_of:
        - condition: "Total bilirubin ≤ 2× ULN OR biliary obstruction drained with stent/drain"
    if_true:
      next_step: 3
    if_false:
      result: null
      notes: >
        Biliary obstruction with bilirubin >2× ULN: address obstruction first
        (endoscopic biliary stent or percutaneous drain). Irinotecan and most
        cytotoxics are contraindicated with significant hyperbilirubinemia.
        Reassess for 2L once bilirubin <2× ULN.

  # Step 3 — Prior 1L backbone determines 2L choice.
  # Cross-resistance exists between FOLFIRINOX components (oxaliplatin, irinotecan,
  # 5-FU) and nal-IRI+5-FU/LV — use gemcitabine-based 2L after FOLFIRINOX.
  # After gemcitabine-based 1L: nal-IRI+5-FU/LV is FDA-approved NCCN Cat 1.
  - step: 3
    evaluate:
      any_of:
        - condition: "Prior 1L was gemcitabine-based (gemcitabine monotherapy, gem+nab-paclitaxel, or gem+erlotinib)"
    if_true:
      next_step: 31
      notes: >
        After gemcitabine-based 1L: routes to step 31 (nal-IRI access gate).
        Nal-IRI+5-FU/LV preferred when accessible (NAPOLI-1; NCCN Cat 1).
        FOLFOX when nal-IRI unavailable (ONIVYDE not registered in Ukraine).
        BRCA1/2 germline-mutated patients: olaparib maintenance (IND-PDAC-MAINTENANCE-
        OLAPARIB-BRCA) applicable at 2L if prior platinum-containing and disease control.
    if_false:
      result: IND-PDAC-METASTATIC-1L-GEM-NAB-PAC
      notes: >
        After FOLFIRINOX-based or oxaliplatin-based 1L: gemcitabine ± nab-
        paclitaxel is the 2L of choice (non-overlapping mechanism; NCCN
        Category 2A — no phase 3 RCT but standard cross-over regimen).
        IND-PDAC-METASTATIC-1L-GEM-NAB-PAC applies here as a 2L regimen
        with same dosing. Consider reduced nab-paclitaxel dose if significant
        neuropathy from prior oxaliplatin. Single-agent gemcitabine if intolerant
        of nab-paclitaxel.

  # Step 31 — Nal-IRI vs FOLFOX access gate (gemcitabine-pretreated track).
  # ONIVYDE not registered in Ukraine (as of 2026) → FOLFOX is the accessible fallback.
  # Nal-IRI+5-FU/LV is Cat 1; FOLFOX is Cat 2A (no phase 3 RCT in PDAC 2L).
  - step: 31
    evaluate:
      all_of:
        - condition: "Nal-IRI (ONIVYDE, nanoliposomal irinotecan) accessible (registered + stocked at prescribing centre)"
    if_true:
      result: IND-PDAC-METASTATIC-2L-NAL-IRI
      notes: >
        Nal-IRI accessible: nal-IRI 70 mg/m² + 5-FU/LV q14d (REG-NAL-IRI-5FU-LV-PDAC;
        NAPOLI-1 Wang-Gillam Lancet 2016; mOS 6.1 vs 4.2 mo; HR 0.67; NCCN Cat 1).
    if_false:
      result: IND-PDAC-METASTATIC-2L-FOLFOX
      notes: >
        Nal-IRI inaccessible (ONIVYDE not registered/stocked): FOLFOX (oxaliplatin 85 mg/m²
        + leucovorin 400 mg/m² + 5-FU bolus/CIV q14d; REG-FOLFOX; NCCN Cat 2A).
        Cross-class switch after gemcitabine; modest evidence (phase 2 data; mOS ~4.5 mo).
        When ONIVYDE becomes available: switch to nal-IRI-based regimen (preferred Cat 1).
    notes: "Step 31 added 2026-05-04 (Workstream BX): nal-IRI vs FOLFOX UA access gate. ONIVYDE not registered in Ukraine → FOLFOX is the accessible 2L alternative post-gemcitabine. IND-PDAC-METASTATIC-2L-FOLFOX wired. Gap CLOSED."

sources:
  - SRC-NAPOLI1-WANG-GILLAM-2016
  - SRC-NCCN-PANCREATIC-2025
  - SRC-ESMO-PANCREATIC-2024

last_reviewed: "2026-05-04"
notes: >
  UPDATED 2026-05-04 (Workstream BX): IND-PDAC-METASTATIC-2L-FOLFOX authored and
  wired at step 31 as nal-IRI access gate fallback (NCCN Cat 2A; NSZU-funded UA).
  Gap CLOSED. ROUTING SUMMARY: (1) ECOG ≥3 → BSC; (2) Bilirubin >2× ULN → biliary
  drainage first; (3) Gemcitabine-pretreated → step 31 → nal-IRI if accessible,
  FOLFOX if not; (3 if_false) FOLFIRINOX-pretreated → gem±nab-pac 2L.

  Remaining notes:
  IND-PDAC-METASTATIC-1L-GEM-NAB-PAC doubles as the 2L regimen post-FOLFIRINOX —
  same dosing applies in both 1L and 2L contexts.

  3L and beyond: very limited evidence; consider clinical trial or best supportive care.
  Gemcitabine rechallenge after both FOLFIRINOX and gem-based therapy: minimal benefit.

  BRCA germline maintenance: IND-PDAC-MAINTENANCE-OLAPARIB-BRCA applies in the context
  of platinum-containing regimens; verify prior olaparib use before considering at 2L.
