id: ALGO-PMBCL-2L
applicable_to_disease: DIS-PMBCL
applicable_to_line_of_therapy: 2
purpose: "Select 2L Indication for relapsed/refractory primary mediastinal large B-cell lymphoma. Routing branches on transplant-eligibility:\n- Transplant-ELIGIBLE (fit, age ≤65-70, ECOG ≤1, adequate organ\n  function, chemosensitive to salvage): IND-PMBCL-2L-RICE-AUTOSCT\n  (R-ICE salvage → BEAM-autoSCT consolidation, the curative-\n  intent standard track).\n\n- Transplant-INELIGIBLE / R-ICE-refractory: pembrolizumab\n  monotherapy (KEYNOTE-170 — PMBCL has 9p24.1 amplification with\n  PD-L1 overexpression in ~70%, ORR 45% with durable responses).\n  No dedicated IND-PMBCL-2L-PEMBROLIZUMAB; routes via free-text\n  MDT note (see notes).\n\n2L entry triggered by: documented relapse on imaging/biopsy after 1L (DA-EPOCH-R or R-CHOP ± mediastinal RT), OR primary refractoriness (residual mediastinal mass with persistent FDG- avidity Deauville 4-5 post-1L).\n"
output_indications:
- IND-PMBCL-2L-RICE-AUTOSCT
default_indication: IND-PMBCL-2L-RICE-AUTOSCT
alternative_indication: IND-PMBCL-2L-RICE-AUTOSCT
decision_tree:
- step: 1
  evaluate:
    any_of:
    - red_flag: RF-PMBCL-FRAILTY-AGE
    - red_flag: RF-PMBCL-ORGAN-DYSFUNCTION
    - condition: Age >70 OR ECOG ≥2 OR LVEF <45% OR CrCl <50 (transplant-ineligible)
  if_true:
    result: IND-PMBCL-2L-RICE-AUTOSCT
  if_false:
    next_step: 2
- step: 2
  evaluate:
    all_of:
    - condition: R-ICE x 2 cycles completed
    - condition: Interim Deauville ≥4 (no metabolic response) — chemorefractory
  if_true:
    result: IND-PMBCL-2L-RICE-AUTOSCT
  if_false:
    next_step: 3
  notes: "MDT-only after CSD-7A audit — composite is biomarker/disease-specific (not fitness/eligibility/prior-therapy), so no pan-disease RF applies. Wireable only via dedicated disease-specific RFs in a future round."
- step: 3
  evaluate:
    all_of:
    - red_flag: RF-FITNESS-ECOG-FIT
    - none_of:
      - red_flag: RF-ORGAN-RENAL-IMPAIRED
    - none_of:
      - red_flag: RF-ORGAN-CARDIAC-LVEF-LOW
    - condition: Age ≤65-70, (transplant-eligible)
    - condition: First relapse OR primary refractory with chemosensitive disease
    - condition: CD20+ confirmed at relapse biopsy
  if_true:
    result: IND-PMBCL-2L-RICE-AUTOSCT
  if_false:
    next_step: 4
  notes: Partially wired - fitness/eligibility gates wired via CSD-7A pan-disease RFs; remaining condition(s) kept as MDT-evaluated text (no RF available for that criterion).
- step: 4
  evaluate:
    any_of:
    - condition: PMBCL relapsed/refractory, transplant-eligible by default
    - red_flag: RF-PMBCL-TRANSFORMATION-PROGRESSION
  if_true:
    result: IND-PMBCL-2L-RICE-AUTOSCT
  if_false:
    result: IND-PMBCL-2L-RICE-AUTOSCT
sources:
- SRC-NCCN-BCELL-2025
- SRC-ESMO-DLBCL-2024
last_reviewed: '2026-04-27'
notes: 'OOS / wiring gaps: (1) IND-PMBCL-2L-PEMBROLIZUMAB (KEYNOTE-170, FDA-approved 2018 for r/r PMBCL ≥2 prior lines, ORR 45% durable) — not modeled as dedicated indication. Steps 1+2 route to R-ICE-autoSCT placeholder; trace must surface "transplant-ineligible OR R-ICE-refractory → pembrolizumab KEYNOTE-170 (200mg q3w)" as free-text MDT note. (2) BEAM-autoSCT consolidation is a procedure (not an indication); IND-PMBCL-2L-RICE-AUTOSCT name signals the expected consolidation downstream. (3) CAR-T (axi-cel ZUMA-12 included PMBCL; tisa-cel JULIET PMBCL cohort) for ≥3L or post-autoSCT relapse — not modeled. (4) Brentuximab vedotin for CD30+ PMBCL r/r — phase 2 ECOG-1412 data positive, not FDA-approved for PMBCL specifically; not modeled. (5) Mediastinal RT consolidation post-CR2 — radiation oncology referral, outside algorithm. (6) Allogeneic SCT for post-autoSCT relapse young patients — referral, outside KB. (7) reviewer_signoffs: 0 — pending two Clinical Co-Lead approvals.

  '
notes_ua: >
  OOS / прогалини в підключенні:
  (1) IND-PMBCL-2L-PEMBROLIZUMAB (KEYNOTE-170, схвалений FDA у 2018 р. для
  рецидивуючого/рефрактерного PMBCL ≥2 попередніх ліній, ORR 45% тривалий)
  — не змодельовано як окреме показання. Кроки 1+2 спрямовуються до
  placeholder R-ICE-autoSCT; трасування має виводити «непридатний до
  трансплантації АБО рефрактерний до R-ICE → пембролізумаб KEYNOTE-170
  (200mg q3w)» як вільнотекстову примітку МДТ.
  (2) Консолідація BEAM-autoSCT є процедурою (не показанням); назва
  IND-PMBCL-2L-RICE-AUTOSCT сигналізує про очікувану консолідацію далі.
  (3) CAR-T (axi-cel ZUMA-12 включав PMBCL; когорта PMBCL tisa-cel JULIET)
  для ≥3Л або рецидиву після autoSCT — не змодельовано.
  (4) Брентуксимаб ведотін (brentuximab vedotin) для CD30+ PMBCL r/r —
  позитивні дані фази 2 ECOG-1412, не схвалений FDA конкретно для PMBCL;
  не змодельовано.
  (5) Консолідація медіастинальною ПТ після CR2 — направлення до радіаційної
  онкології, поза алгоритмом.
  (6) Алогенна ТКМ для молодих пацієнтів після рецидиву post-autoSCT —
  направлення, поза КБ.
  (7) reviewer_signoffs: 0 — очікує двох підписів клінічних ко-лідерів.
