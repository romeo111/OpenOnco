id: ALGO-PMF-2L
applicable_to_disease: DIS-PMF
applicable_to_line_of_therapy: 2
purpose: >
  Select default + alternative Indication for PMF after ruxolitinib
  failure or for anemia-dominant disease where ruxolitinib is poorly
  tolerated. Routing axes: anemia / transfusion dependence (momelotinib
  preferred — addresses anemia where ruxolitinib worsens it),
  transplant eligibility (alloHCT for high-risk DIPSS-Plus + fit),
  and ruxolitinib-resistant non-anemic course (fedratinib per JAKARTA-2).
  AlloHCT is curative; momelotinib + fedratinib are JAK-inhibitor
  switches.

output_indications:
  - IND-PMF-2L-PACRITINIB
  - IND-PMF-MOMELOTINIB-ANEMIA
  - IND-PMF-2L-FEDRATINIB
  - IND-PMF-ALLOHCT-HIGH-RISK

default_indication: IND-PMF-MOMELOTINIB-ANEMIA
alternative_indication: IND-PMF-ALLOHCT-HIGH-RISK

decision_tree:
  # Step 1 — blast progression → re-route conceptually to ALGO-AML-2L;
  # algorithm pins to alloHCT-high-risk locally as bridge intent.
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-PMF-BLAST-PROGRESSION
    if_true:
      result: IND-PMF-ALLOHCT-HIGH-RISK
    if_false:
      next_step: 2

  # Step 2 — high-risk DIPSS-Plus + transplant-eligible → alloHCT
  # (only curative pathway; bridging JAKi parallel layer).
  - step: 2
    evaluate:
      all_of:
        - red_flag: RF-PMF-HIGH-RISK-DIPSS
    if_true:
      result: IND-PMF-ALLOHCT-HIGH-RISK
    if_false:
      next_step: 21

  # Step 21 — severe thrombocytopenia gate (plt <50×10⁹/L):
  # pacritinib (Vonjo) is the ONLY approved JAKi for this population.
  # Ruxolitinib and fedratinib are contraindicated at plt <50 (JAK1-driven
  # myelosuppression); momelotinib has dose adjustments but is not specifically
  # approved. Pacritinib has minimal JAK1 activity — effective JAK2 blockade
  # without worsening thrombocytopenia.
  # PERSIST-2 (Harrison 2018 JAMA Oncol): plt <50K subgroup SVR35 23% vs 3%
  # BAT; TSS50 36% vs 9%. FDA accelerated approval Feb 2022. NCCN Cat 1.
  - step: 21
    evaluate:
      all_of:
        - condition: "Platelet count <50×10⁹/L (severe thrombocytopenia)"
    if_true:
      result: IND-PMF-2L-PACRITINIB
      notes: >
        Severe thrombocytopenia (plt <50K): pacritinib 200 mg PO BID
        (REG-PACRITINIB-PMF; PERSIST-2; FDA Feb 2022; NCCN Cat 1).
        Pacritinib is the ONLY JAKi approved and validated in this subpopulation.
        Ukraine: not registered; named-patient/compassionate-use required.
    if_false:
      next_step: 3
    notes: "Step 21 added 2026-05-04 (Workstream CT): plt <50K gate — pacritinib wired as dedicated Indication IND-PMF-2L-PACRITINIB. Gap CLOSED per algo_pmf_2l notes (pacritinib previously annotation-only)."

  # Step 3 — anemia-dominant (Hgb <10 OR transfusion-dependent) →
  # momelotinib (MOMENTUM / SIMPLIFY-1: ACVR1 inhibition addresses
  # anemia where ruxolitinib worsens it).
  - step: 3
    evaluate:
      any_of:
        - red_flag: RF-PMF-ANEMIA-DOMINANT
    if_true:
      result: IND-PMF-MOMELOTINIB-ANEMIA
    if_false:
      next_step: 4

  # Step 4 — frailty → momelotinib (better tolerability than fedratinib
  # for elderly; no Wernicke risk).
  - step: 4
    evaluate:
      any_of:
        - red_flag: RF-PMF-FRAILTY-AGE
        - red_flag: RF-PMF-ORGAN-DYSFUNCTION
    if_true:
      result: IND-PMF-MOMELOTINIB-ANEMIA
    if_false:
      next_step: 5

  # Step 5 — default ruxolitinib-resistant / intolerant non-anemic →
  # fedratinib (JAKARTA-2 spleen response + symptom benefit post-rux).
  - step: 5
    evaluate:
      all_of:
        - condition: "Default ruxolitinib-resistant non-anemic non-frail — fedratinib per JAKARTA-2"
    if_true:
      result: IND-PMF-2L-FEDRATINIB
    if_false:
      result: IND-PMF-2L-FEDRATINIB
    notes: "MDT-only after CSD-7A audit — composite is biomarker/disease-specific (not fitness/eligibility/prior-therapy), so no pan-disease RF applies. Wireable only via dedicated disease-specific RFs in a future round."

sources:
  - SRC-NCCN-MPN-2025
  - SRC-DIPSS-PLUS-GANGAT-2011
  - SRC-MOMENTUM-VERSTOVSEK-2023
  - SRC-JAKARTA2-HARRISON-2017

last_reviewed: "2026-05-04"
notes: >
  UPDATED 2026-05-04 (Workstream CT): IND-PMF-2L-PACRITINIB authored and
  wired at step 21 (plt <50K thrombocytopenia gate; PERSIST-2 Harrison 2018
  JAMA Oncol; FDA Feb 2022; NCCN Cat 1). Step 2 if_false now routes to step 21
  (pacritinib gate) before step 3 (anemia). Gap CLOSED.
  ROUTING SUMMARY:
  (1) blast progression → alloHCT;
  (2) high-risk DIPSS + transplant-eligible → alloHCT;
  (21) plt <50K → pacritinib (IND-PMF-2L-PACRITINIB; only approved JAKi for plt <50K);
  (3) anemia-dominant (Hgb <10 / transfusion-dependent) → momelotinib;
  (4) frailty/organ dysfunction → momelotinib;
  (5) default non-anemic non-frail → fedratinib.
  OOS / wiring gaps remaining:
  (1) RF-PMF-INFECTION-SCREENING surfaces as annotation (HBV/TB pre-JAKi).
  (2) Fedratinib: thiamine prophylaxis mandatory — boxed warning Wernicke encephalopathy.
  (3) AlloHCT eligibility (age ≤70, HCT-CI ≤4, donor) gates step 2 — no dedicated RF.
  (4) Pacritinib + momelotinib both inaccessible in Ukraine — access barrier documented
      in respective IND files; MDT must address funding pathway.
  STUB — requires clinical co-lead signoff.
