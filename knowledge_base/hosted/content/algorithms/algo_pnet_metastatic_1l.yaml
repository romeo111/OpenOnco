id: ALGO-PNET-METASTATIC-1L
applicable_to_disease: DIS-PNET
applicable_to_line_of_therapy: 1
purpose: >
  Select 1L systemic therapy for unresectable / metastatic pNET.
  Primary decision gate: grade (Ki67). G1/G2 (≤20%): two equivalent NCCN Cat 1 options —
  sunitinib 37.5 mg/day continuously (SUN1111; Raymond 2011 NEJM; mPFS 11.4 mo HR 0.42)
  OR everolimus 10 mg/day (RADIANT-3; Yao 2011 NEJM; mPFS 11.0 mo HR 0.35).
  Cardiovascular gate: LVEF <50% or prior VEGFR-TKI → everolimus preferred;
  otherwise → sunitinib (cardiac toxicity lower with everolimus in cardiac-impaired patients).
  G3 (>20%) or poorly differentiated NEC: MDT review — may require chemotherapy.
  Fitness gates via pan-disease RFs.

output_indications:
  - IND-PNET-METASTATIC-1L-EVEROLIMUS
  - IND-PNET-METASTATIC-1L-SUNITINIB

default_indication: IND-PNET-METASTATIC-1L-EVEROLIMUS
alternative_indication: IND-PNET-METASTATIC-1L-SUNITINIB

decision_tree:
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-NET-HIGH-GRADE-G3
    if_true:
      result: IND-PNET-METASTATIC-1L-EVEROLIMUS
      notes: "G3 / Ki67 >20% — engine routes to everolimus indication but indication carries contraindication warning for poorly differentiated NEC. MDT must verify well-differentiated G3 vs NEC morphology before proceeding."
    if_false:
      next_step: 2
  - step: 2
    evaluate:
      all_of:
        - any_of:
          - red_flag: RF-FITNESS-ECOG-FIT
          - red_flag: RF-FITNESS-ECOG-INTERMEDIATE
    if_true:
      next_step: 21
    if_false:
      result: IND-PNET-METASTATIC-1L-EVEROLIMUS
    notes: >
      ECOG fit/intermediate: proceed to step 21 (sunitinib vs everolimus gate).
      ECOG ≥3 or poor: everolimus 5 mg/day dose reduction + MDT goals-of-care;
      ECOG PS ≥4 → engine hard gate suppresses active tracks.

  # Step 21 — Sunitinib vs everolimus gate (both NCCN Cat 1, no head-to-head).
  # Cardiovascular function gate: LVEF <50% or active cardiac disease → everolimus preferred.
  # Prior VEGFR-TKI → everolimus (cross-resistance within class).
  # Suitable cardiac function + no prior VEGFR-TKI → sunitinib preferred
  # (Raymond 2011 NEJM mPFS 11.4 mo HR 0.42 vs placebo; NCCN Cat 1).
  # Everolimus remains equally valid (RADIANT-3 mPFS 11.0 mo HR 0.35; NCCN Cat 1).
  - step: 21
    evaluate:
      all_of:
        - condition: "LVEF ≥50% (baseline echocardiogram adequate cardiac function for sunitinib)"
        - condition: "No prior VEGFR-TKI therapy (sunitinib, sorafenib, axitinib, pazopanib) — cross-class resistance"
        - condition: "No uncontrolled hypertension (SBP ≤140/90 on or off anti-HTN therapy)"
    if_true:
      result: IND-PNET-METASTATIC-1L-SUNITINIB
      notes: >
        Adequate cardiac function + no prior VEGFR-TKI: sunitinib 37.5 mg PO daily
        continuous (REG-SUNITINIB-MONO-PNET; SUN1111 Raymond 2011 NEJM; mPFS 11.4 mo
        HR 0.42; ORR 9.3%; NCCN Cat 1). CRITICAL: continuous 37.5 mg/day — NOT RCC
        4-week on/2-week off schedule. LVEF monitoring q3 months.
        Everolimus (IND-PNET-METASTATIC-1L-EVEROLIMUS) is an equally valid alternative —
        MDT choice based on comorbidity profile, access, and patient preference.
    if_false:
      result: IND-PNET-METASTATIC-1L-EVEROLIMUS
      notes: >
        LVEF <50% or prior VEGFR-TKI or uncontrolled HTN: everolimus preferred
        (REG-EVEROLIMUS-MONO-PNET; RADIANT-3 Yao 2011 NEJM; mPFS 11.0 mo HR 0.35;
        NCCN Cat 1). mTOR mechanism avoids cardiac/VEGFR toxicities of sunitinib.
    notes: "Step 21 added 2026-05-04 (Workstream BO): sunitinib vs everolimus cardiac function gate. IND-PNET-METASTATIC-1L-SUNITINIB wired for LVEF-adequate patients. Deferred gap CLOSED. Free-text conditions; MDT-evaluated."

sources:
  - SRC-RADIANT3-YAO-2011
  - SRC-NCCN-NET-2025

last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  UPDATED 2026-05-04 (Workstream BO): IND-PNET-METASTATIC-1L-SUNITINIB authored
  and wired at step 21 (SUN1111; Raymond 2011 NEJM; sunitinib 37.5 mg continuous;
  mPFS 11.4 mo HR 0.42; NCCN Cat 1). Step 2 restructured to route to step 21 for
  sunitinib/everolimus cardiovascular gate. Deferred gap CLOSED.

  ROUTING SUMMARY:
  - G3/high-grade: everolimus (with MDT G3 warning)
  - ECOG fit + LVEF ≥50% + no prior VEGFR-TKI: sunitinib (Cat 1)
  - LVEF <50% / prior VEGFR-TKI / uncontrolled HTN: everolimus (Cat 1)

  Remaining deferred paths:
  - SSA (octreotide LAR, lanreotide): CLARINET Cat 1 for SSTR2+ G1/G2 pNET;
    not modeled as dedicated 1L indication (SSA often concurrent with sunitinib/everolimus)
  - Chemotherapy for poorly differentiated NEC: platinum-etoposide (EP/IP) —
    separate disease entity DIS-GEP-NEC needed
  - PRRT (lutetium-177-DOTATATE) for SSTR2+ pNET: requires SSTR biomarker
    scaffolding (DRUG-LUTETIUM-177-DOTATATE) — future PR
