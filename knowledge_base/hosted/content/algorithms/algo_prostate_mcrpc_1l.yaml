id: ALGO-PROSTATE-MCRPC-1L
applicable_to_disease: DIS-PROSTATE
applicable_to_disease_state: mCRPC
applicable_to_line_of_therapy: 1
purpose: >
  Select systemic therapy for mCRPC (castration-resistant, progression on ADT).
  Three main branches: (1) BRCA1/2 or HRR-mutant → PARPi (olaparib preferred for
  BRCA2; PROfound); (2) PSMA-PET-positive post-ARPI + post-taxane → Lu-PSMA-617
  (VISION; typically later line but algorithm-addressable here); (3) otherwise →
  ARPI switch or docetaxel based on prior exposure and visceral burden.

output_indications:
  - IND-PROSTATE-MCRPC-1L-ARPI
  - IND-PROSTATE-MCRPC-1L-PARPI
  - IND-PROSTATE-MCRPC-1L-TALAZOPARIB-ENZALUTAMIDE
  - IND-PROSTATE-MCRPC-1L-NIRAPARIB-ABIRATERONE
  - IND-PROSTATE-MCRPC-1L-OLAPARIB-ABIRATERONE
  - IND-PROSTATE-MCRPC-2L-LU-PSMA
  - IND-PROSTATE-MCRPC-2L-DOCETAXEL
  - IND-PROSTATE-MCRPC-2L-CABAZITAXEL

default_indication: IND-PROSTATE-MCRPC-1L-ARPI
alternative_indication: IND-PROSTATE-MCRPC-1L-PARPI

decision_tree:
  # Step 1 — Somatic/germline HRR testing mandatory before proceeding.
  # BRCA1/2 mutation = strongest PARPi signal (PROfound Cohort A).
  # Other HRR genes (ATM, CDK12, PALB2, RAD51) = smaller/uncertain benefit.
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-PROSTATE-HIGH-RISK-BIOLOGY
        - condition: "BRCA1 or BRCA2 somatic or germline pathogenic variant"
    if_true:
      result: IND-PROSTATE-MCRPC-1L-PARPI
      alternatives:
        - indication: IND-PROSTATE-MCRPC-1L-TALAZOPARIB-ENZALUTAMIDE
          criteria: "BRCA1/2-mutant (preferred signal HR 0.20) OR other HRR-mutant (HR 0.46 full HRR-mutant cohort) + enzalutamide-naive; TALAPRO-2 (Agarwal 2023 Lancet Oncol); FDA Jun 2023 (Talzenna+Xtandi); NCCN Cat 1; broader HRR coverage vs MAGNITUDE"
          nccn_category: 1
        - indication: IND-PROSTATE-MCRPC-1L-NIRAPARIB-ABIRATERONE
          criteria: "BRCA1/2-mutant ONLY (MAGNITUDE non-BRCA NEGATIVE) + abiraterone-based ARPI preferred; MAGNITUDE (Chi 2023 Lancet Oncol); FDA Aug 2023; NCCN Cat 1; do NOT use for non-BRCA HRR mutations"
          nccn_category: 1
        - indication: IND-PROSTATE-MCRPC-1L-OLAPARIB-ABIRATERONE
          criteria: "All-comer mCRPC (FDA all-comer approval) + abiraterone-based ARPI preferred + ARPI-naive; PROpel (Clarke 2022 NEJM Evidence); FDA Aug 2022 (first PARPi+ARPI approval); NCCN Cat 1; BRCA1/2 rPFS HR 0.23, OS HR 0.29; all-comers rPFS HR 0.66; NO dose reduction needed (abiraterone ≠ CYP3A4 inducer)"
          nccn_category: 1
      notes: >
        BRCA1/2 or HRR-mutant mCRPC — FOUR Cat 1 combination options:
        DEFAULT: Olaparib 300mg BID monotherapy (PROfound; Cohort A rPFS HR 0.49;
        post-ARPI setting; broadly applicable regardless of prior ARPI). NCCN Cat 1.
        COMBINATION 1 (ARPI-naive, HRR-mutant + enzalutamide-naive): Talazoparib 0.5mg QD
        + enzalutamide 160mg QD (TALAPRO-2; BRCA1/2 HR 0.20, HRR-mutant HR 0.46;
        FDA Jun 2023; covers broadest HRR including non-BRCA). NCCN Cat 1.
        COMBINATION 2 (ARPI-naive, BRCA1/2 ONLY, abiraterone preferred): Niraparib
        200mg QD + abiraterone 1000mg QD + prednisone 5mg BID (MAGNITUDE; BRCA1/2
        HR 0.47; FDA Aug 2023; NON-BRCA HRR NEGATIVE — absolute contraindication). Cat 1.
        COMBINATION 3 (ARPI-naive, all-comers or BRCA preferred, abiraterone-based):
        Olaparib 300mg BID + abiraterone 1000mg QD + prednisone 5mg BID (PROpel;
        all-comers rPFS HR 0.66; BRCA1/2 rPFS HR 0.23, OS HR 0.29; FDA Aug 2022;
        first PARPi+ARPI approval; no dose reduction — abiraterone ≠ CYP3A4 inducer). Cat 1.
        CRITICAL DOSING: Talazoparib 0.5mg (not 1mg) with enzalutamide (CYP3A4 inducer
        reduces talazoparib by ~32%); abiraterone requires fasting (food 5-10× absorption).
    if_false:
      next_step: 2

  # Step 2 — Prior ARPI exposure in mHSPC?
  # If ARPI-naïve at mCRPC (e.g., got docetaxel in mHSPC without ARPI):
  # switch to ARPI (enzalutamide or abiraterone) is the standard 1L mCRPC move.
  # If prior ARPI in mHSPC: taxane-based or Lu-PSMA preferred.
  - step: 2
    evaluate:
      any_of:
        - condition: "No prior ARPI (enzalutamide/abiraterone/apalutamide/darolutamide) in mHSPC"
    if_true:
      result: IND-PROSTATE-MCRPC-1L-ARPI
      notes: >
        ARPI-naive mCRPC: enzalutamide or abiraterone+prednisone are the 1L
        standard (NCCN category 1). Enzalutamide preferred if no steroid concern;
        abiraterone+prednisone if adrenal insufficiency risk or liver disease.
        After ARPI failure → docetaxel or cabazitaxel (taxane-naïve) or Lu-PSMA.
    if_false:
      next_step: 3

  # Step 3 — Prior ARPI exposure: taxane eligibility + PSMA-PET status.
  - step: 3
    evaluate:
      all_of:
        - condition: "PSMA-PET/CT positive (all lesions PSMA-avid, no PSMA-negative sites with metastases)"
        - condition: "Prior taxane AND prior ARPI both received (Lu-PSMA eligibility per VISION)"
    if_true:
      result: IND-PROSTATE-MCRPC-2L-LU-PSMA
      notes: >
        PSMA-PET-positive + post-taxane + post-ARPI: Lu-PSMA-617 (VISION;
        mOS 15.3 vs 11.3 mo HR 0.62). PSMA-PET/CT required to confirm eligibility.
        All sites must be PSMA-positive; any PSMA-negative site with metastasis = exclusion.
    if_false:
      next_step: 4

  # Step 4 — Prior ARPI, taxane-naive or PSMA-not-eligible: docetaxel.
  - step: 4
    evaluate:
      all_of:
        - condition: "ECOG PS 0-2 (docetaxel eligible)"
        - condition: "No prior taxane in mHSPC or mCRPC"
    if_true:
      result: IND-PROSTATE-MCRPC-2L-DOCETAXEL
      notes: >
        Prior ARPI + taxane-naive + ECOG 0-2: docetaxel 75mg/m² q3w × 10 cycles
        (TAX 327; Tannock 2004 NEJM; mOS 18.9 mo; NCCN Cat 1).
        Prednisone 5mg BID concurrent. G-CSF prophylaxis recommended for patients
        ≥65 or borderline PS. After docetaxel progression: cabazitaxel
        (IND-PROSTATE-MCRPC-2L-CABAZITAXEL; CARD trial preferred post-ARPI+docetaxel)
        or Lu-PSMA if PSMA-PET positive.
    if_false:
      result: IND-PROSTATE-MCRPC-2L-CABAZITAXEL
      notes: >
        Prior ARPI + prior taxane + PSMA-PET unavailable or negative + ECOG 0-2:
        cabazitaxel 25mg/m² q3w (CARD trial; De Wit 2019 NEJM: superior rPFS HR 0.54
        and OS HR 0.64 vs second ARPI post-prior-ARPI+docetaxel; NCCN Cat 1).
        ARPI cross-switch (enzalutamide ↔ abiraterone) has very limited activity
        after prior ARPI failure (cross-resistance common); cabazitaxel preferred.
        If ECOG ≥3 or organ dysfunction precludes cabazitaxel: clinical trial or
        BSC per MDT.

sources:
  - SRC-PROFOUND-DEBONO-2020
  - SRC-VISION-PSMA-SARTOR-2021
  - SRC-NCCN-PROSTATE-2025
  - SRC-ESMO-PROSTATE-2024
  - SRC-TALAPRO2-AGARWAL-2023
  - SRC-MAGNITUDE-CHI-2023
  - SRC-PROPEL-CLARKE-2022

last_reviewed: "2026-05-04"
notes: >
  Modern mCRPC algorithm assumes most patients received ARPI (abiraterone/
  enzalutamide/darolutamide) in mHSPC per LATITUDE/ENZAMET/ARASENS. For those
  ARPI-naive at mCRPC entry (docetaxel only in mHSPC), ARPI switch is the
  clear 1L choice.

  HRR testing (germline + somatic) is mandatory before treatment initiation
  in mCRPC — gates PARPi eligibility. BRCA1/2 has the clearest benefit;
  other HRR genes (ATM, CDK12) have weaker/uncertain evidence.

  Lu-PSMA-617 (Pluvicto): requires PSMA-PET/CT before each cycle. Post-ARPI
  + post-taxane are the VISION eligibility criteria. Earlier line use (PSMAfore,
  PSMAddition trials) is emerging but not yet standard.

  Docetaxel + cabazitaxel wiring CLOSED 2026-05-04 (Workstream DG):
    Step 4 if_true → IND-PROSTATE-MCRPC-2L-DOCETAXEL (TAX 327; NCCN Cat 1)
    Step 4 if_false → IND-PROSTATE-MCRPC-2L-CABAZITAXEL (CARD; NCCN Cat 1)

  UPDATED 2026-05-04 (Workstream ER): PARPi+ARPI combination options wired at
  step 1 as Cat 1 alternatives to olaparib monotherapy.
  IND-PROSTATE-MCRPC-1L-TALAZOPARIB-ENZALUTAMIDE: TALAPRO-2 (Agarwal 2023 Lancet
  Oncol; FDA Jun 2023). HRR-mutant mCRPC + enzalutamide-naive. BRCA1/2 rPFS HR 0.20;
  HRR-mutant HR 0.46. Broad HRR coverage (not just BRCA1/2). NCCN Cat 1.
  IND-PROSTATE-MCRPC-1L-NIRAPARIB-ABIRATERONE: MAGNITUDE (Chi 2023 Lancet Oncol;
  FDA Aug 2023). BRCA1/2-mutant ONLY — non-BRCA HRR cohort NEGATIVE. BRCA1/2
  rPFS HR 0.47. NCCN Cat 1. Non-BRCA absolute contraindication — MAGNITUDE negative.
  CRITICAL DOSING NOTE: Talazoparib dose in combination is 0.5mg QD (not 1mg
  standard) because enzalutamide reduces talazoparib exposure ~32% via CYP3A4.
