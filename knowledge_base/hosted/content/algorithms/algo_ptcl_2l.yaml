id: ALGO-PTCL-2L
applicable_to_disease: DIS-PTCL-NOS
applicable_to_line_of_therapy: 2
purpose: 'Relapsed/refractory PTCL-NOS — three salvage options of comparable modest efficacy (ORR 25-30%) but distinct mechanisms: pralatrexate (selective antifolate, PROPEL), romidepsin (HDACi, NCI 1312), and belinostat (HDACi, BELIEF). Selection in UA practice is dominated by access (none registered domestically) and toxicity profile (mucositis-prone vs HDACi cardiotoxicity vs HDACi liver toxicity). All three are bridges to alloSCT consolidation in fit transplant- eligible responders. CD30+ relapse may be eligible for brentuximab vedotin monotherapy (separate consideration).

  '
output_indications:
- IND-PTCL-2L-PRALATREXATE
- IND-PTCL-2L-ROMIDEPSIN
- IND-PTCL-2L-BELINOSTAT
default_indication: IND-PTCL-2L-ROMIDEPSIN
alternative_indication: IND-PTCL-2L-PRALATREXATE
decision_tree:
- step: 1
  evaluate:
    all_of:
    - red_flag: RF-PRIOR-HDACI-NAIVE
    - condition: Romidepsin accessible (named-patient or trial)
    - condition: No baseline cardiac arrhythmia / QTc prolongation precluding HDACi
  if_true:
    result: IND-PTCL-2L-ROMIDEPSIN
  if_false:
    next_step: 2
  notes: "Partially wired - RF-PRIOR-HDACI-NAIVE gates romidepsin/belinostat eligibility (HDACi-naive vs prior-HDACi → CHOEP/pralatrexate routing); access + cardiac criteria kept as MDT-evaluated text (no RF for named-patient access; QTc/arrhythmia criterion is pre-treatment workup, not RF-modeled)."
- step: 2
  evaluate:
    all_of:
    - condition: Pralatrexate accessible (named-patient or trial)
    - condition: No prior Grade ≥3 mucositis from antifolates
    - none_of:
      - red_flag: RF-ORGAN-RENAL-IMPAIRED
  if_true:
    result: IND-PTCL-2L-PRALATREXATE
  if_false:
    next_step: 3
  notes: Partially wired - fitness/eligibility gates wired via CSD-7A pan-disease RFs; remaining condition(s) kept as MDT-evaluated text (no RF available for that criterion).
- step: 3
  evaluate:
    all_of:
    - red_flag: RF-PRIOR-HDACI-NAIVE
    - condition: Belinostat accessible (named-patient or compassionate access)
    - condition: No QTcF >500 ms or active Grade ≥3 thrombocytopenia
    - condition: Hepatic function adequate (bilirubin ≤3×ULN; if UGT1A1 *28/*28 → dose reduce to 750 mg/m²)
  if_true:
    result: IND-PTCL-2L-BELINOSTAT
    notes: >
      Belinostat 1000 mg/m² IV d1-5 q21d (BELIEF trial; O'Connor 2015, JCO; ORR 25.8%;
      NCCN Cat 2A). Used when romidepsin AND pralatrexate are both inaccessible or
      contraindicated. HDACi class — requires HDACi-naive status (no prior romidepsin/vorinostat).
      UGT1A1 *28/*28 homozygous → dose reduce to 750 mg/m². QTc monitoring mandatory.
      Toxicity advantage: lower mucositis than pralatrexate; less nausea than romidepsin.
      FDA accelerated approval July 2014. Ukraine: unregistered — named-patient access required.
  if_false:
    result: IND-PTCL-2L-ROMIDEPSIN
    notes: >
      MDT fallback — all three standard agents unavailable/contraindicated. Romidepsin
      returned as default for MDT discussion re: expanded access, clinical trial enrollment
      (NCT available), or alloSCT bridge without salvage systemic therapy.
sources:
- SRC-NCCN-BCELL-2025
- SRC-ESMO-PTCL-2024
- SRC-BELIEF-OCONNOR-2015
last_reviewed: '2026-05-04'
notes: 'AUTHORED 2026-05-04: IND-PTCL-2L-BELINOSTAT wired at step 3 (fallback when romidepsin AND pralatrexate both inaccessible/contraindicated). OOS / wiring gaps: (1) Brentuximab vedotin monotherapy for CD30+ PTCL-NOS relapse (IHC ≥10%) — standalone indication needed; currently surfaced only as red_flag redirect in IND-PTCL-2L-BELINOSTAT. (2) Allo-SCT bridging is referral, outside KB scope. (3) Combination HDACi + pralatrexate emerging but not modeled. (4) reviewer_signoffs: 0 — pending two Clinical Co-Lead approvals.

  '
