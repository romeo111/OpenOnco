id: ALGO-PV-2L
applicable_to_disease: DIS-PV
applicable_to_line_of_therapy: 2
purpose: >
  Select default + alternative Indication for PV after first-line
  cytoreduction failure (typically HU resistance or HU intolerance per
  ELN criteria). Outputs ruxolitinib (RESPONSE / RESPONSE-2 trial
  endpoint; FDA-approved for HU-resistant/intolerant PV) vs
  ropeginterferon-α-2b (PROUD-PV / CONTINUATION-PV; preferred for
  younger patients seeking molecular response). Pregnancy re-routes to
  IFN at the regimen layer.

output_indications:
  - IND-PV-2L-RUXOLITINIB
  - IND-PV-1L-ROPEGINTERFERON
  - IND-PV-ANAGRELIDE-CONTINUOUS

default_indication: IND-PV-2L-RUXOLITINIB
alternative_indication: IND-PV-1L-ROPEGINTERFERON

decision_tree:
  # Step 1 — pregnancy / planning → ropeginterferon (only safe
  # cytoreductive option in pregnancy; ruxolitinib contraindicated).
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-PV-ET-PREGNANCY-OR-PLANNING
    if_true:
      result: IND-PV-1L-ROPEGINTERFERON
    if_false:
      next_step: 2

  # Step 2 — HU resistance / intolerance documented (ELN criteria) →
  # ruxolitinib per RESPONSE.
  - step: 2
    evaluate:
      any_of:
        - red_flag: RF-PV-HU-RESISTANCE-INTOLERANCE
    if_true:
      result: IND-PV-2L-RUXOLITINIB
      notes: >
        HU-resistant/intolerant PV: ruxolitinib preferred (NCCN Cat 1; RESPONSE trial
        hematocrit control + spleen response). For patients where ruxolitinib is
        inaccessible and thrombocytosis is the dominant concern: anagrelide (Cat 2A)
        — see IND-PV-ANAGRELIDE-CONTINUOUS in alternatives.
      alternatives:
        - indication_id: IND-PV-ANAGRELIDE-CONTINUOUS
          nccn_category: "2A"
          criteria: >
            PV; HU-resistant or HU-intolerant (ELN criteria); ruxolitinib inaccessible
            or contraindicated; thrombocytosis dominant concern (platelet reduction as
            primary goal); CrCl ≥30; ECOG 0-2. NOT preferred over ruxolitinib when
            ruxolitinib accessible (higher arterial thrombosis risk in PT1 ET data).
          note: >
            Anagrelide 0.5-3 mg PO daily for PV after HU failure (NCCN Cat 2A; selective
            megakaryocyte maturation inhibitor; platelet response ~70-80% ELN criteria;
            PT1 Harrison 2005 NEJM — ET cohort, PV data extrapolated). Does NOT control
            erythrocytosis — phlebotomy still required for Hct target. Prefer ruxolitinib
            or ropeginterferon over anagrelide in PV when accessible.
    if_false:
      next_step: 3

  # Step 3 — frailty / organ dysfunction → ruxolitinib (better
  # tolerated than IFN in elderly; lower depression / autoimmune
  # risk).
  - step: 3
    evaluate:
      any_of:
        - red_flag: RF-PV-ET-FRAILTY-AGE
        - red_flag: RF-PV-ET-ORGAN-DYSFUNCTION
    if_true:
      result: IND-PV-2L-RUXOLITINIB
    if_false:
      next_step: 4

  # Step 4 — default 2L PV (post-HU failure non-frail) → ruxolitinib
  # (RESPONSE primary endpoint hematocrit control + spleen response).
  - step: 4
    evaluate:
      all_of:
        - condition: "Default 2L PV post-HU failure — ruxolitinib per RESPONSE"
    if_true:
      result: IND-PV-2L-RUXOLITINIB
    if_false:
      result: IND-PV-2L-RUXOLITINIB
    notes: "MDT-only after CSD-7A audit — composite is biomarker/disease-specific (not fitness/eligibility/prior-therapy), so no pan-disease RF applies. Wireable only via dedicated disease-specific RFs in a future round."

sources:
  - SRC-NCCN-MPN-2025
  - SRC-ESMO-MPN-2015
  - SRC-RESPONSE-VANNUCCHI-2015

last_reviewed: "2026-05-04"
notes: >
  Ropeginterferon-α-2b (Besremi) is conventionally a 1L alternative for
  younger lower-risk PV seeking molecular response; it is surfaced here
  as the 2L pregnancy / IFN-preferred fallback for the HU-failed
  population. RF-PV-ET-INFECTION-SCREENING surfaces as annotation
  (HBV pre-JAKi). RF-PV-ET-HIGH-THROMBOSIS-RISK is the dominant 1L
  high-risk flag and is treated as already addressed by 1L cytoreduction
  selection in this 2L context. STUB — requires clinical co-lead
  signoff.
  UPDATED 2026-05-04 (Workstream FV): IND-PV-ANAGRELIDE-CONTINUOUS wired as Cat 2A
  alternative at step 2 if_true (HU resistance/intolerance track). Anagrelide accessible
  fallback when ruxolitinib inaccessible; gap CLOSED.
