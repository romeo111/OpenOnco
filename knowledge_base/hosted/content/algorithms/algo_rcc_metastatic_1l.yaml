id: ALGO-RCC-METASTATIC-1L
applicable_to_disease: DIS-RCC
applicable_to_line_of_therapy: 1
purpose: >
  Select 1L systemic regimen for advanced/metastatic clear-cell RCC based on
  histologic subtype (clear-cell only; non-clear cell → separate pathway),
  IMDC risk group (favorable vs intermediate/poor), and patient fitness/toxicity
  profile to choose among four NCCN category-1 ICI+TKI combinations (or
  ICI+ICI for ipi-eligible intermediate/poor).

output_indications:
  - IND-RCC-METASTATIC-1L-NIVO-IPI
  - IND-RCC-METASTATIC-1L-PEMBRO-AXI
  - IND-RCC-METASTATIC-1L-LENV-PEMBRO
  - IND-RCC-METASTATIC-1L-NIVO-CABO
  - IND-RCC-VHL-DISEASE-BELZUTIFAN
  - IND-RCC-ADJUVANT-PEMBRO

default_indication: IND-RCC-METASTATIC-1L-PEMBRO-AXI
alternative_indication: IND-RCC-METASTATIC-1L-NIVO-CABO

decision_tree:
  # Step 1 — Histology gate. Algorithm covers clear-cell ccRCC only.
  # Non-clear cell (papillary, chromophobe, sarcomatoid-predominant, collecting duct)
  # follow separate NCCN guidance (cabozantinib preferred for papillary; clinical trial).
  - step: 1
    evaluate:
      any_of:
        - condition: "Clear-cell (conventional) RCC confirmed on pathology"
    if_true:
      next_step: 2
      notes: >
        Clear-cell ccRCC confirmed: route to IMDC risk stratification (step 2).
        VHL syndrome patients (germline VHL pathogenic mutation) should receive
        belzutifan monotherapy rather than ICI+TKI (LITESPARK-004; NCCN Cat 1) —
        see IND-RCC-VHL-DISEASE-BELZUTIFAN in alternatives. Post-nephrectomy
        adjuvant setting (Stage II high-risk/III/M1 NED): pembrolizumab × 1 year
        (KEYNOTE-564; NCCN Cat 1) — see IND-RCC-ADJUVANT-PEMBRO in alternatives.
      alternatives:
        - indication_id: IND-RCC-VHL-DISEASE-BELZUTIFAN
          nccn_category: "1"
          criteria: >
            Clear-cell RCC in setting of VHL disease (germline VHL pathogenic /
            likely-pathogenic variant confirmed by germline testing); tumors not
            requiring immediate surgery; ECOG 0-2. Standard ICI+TKI NOT preferred
            in VHL disease — belzutifan targets HIF-2α directly upstream of VEGF.
            Not for sporadic ccRCC without germline VHL mutation. VHL-associated CNS
            hemangioblastomas and pancreatic pVHL-pathway tumors also covered.
          note: >
            Belzutifan for VHL disease-associated clear-cell RCC (LITESPARK-004;
            Jonasch 2021 NEJM; FDA Aug 2021; NCCN Cat 1): ORR 49% for RCC; DCR ~99%;
            belzutifan 120 mg PO QD continuously. HIF-2α inhibitor targeting the
            VHL/HIF pathway. Also active against VHL-associated CNS hemangioblastomas
            (ORR 63%) and pancreatic lesions. Anemia Grade 3+ ~7% — monitor CBC,
            consider EPO support. Hypoxia rare — monitor O2 saturation. FDA-approved
            for VHL disease-associated RCC, CNS hemangioblastoma, pancreatic NET /
            serous cystadenoma. NOT standard for sporadic metastatic RCC 1L.
        - indication_id: IND-RCC-ADJUVANT-PEMBRO
          nccn_category: "1"
          criteria: >
            Post-curative-intent nephrectomy (radical or partial) for clear-cell ccRCC;
            KEYNOTE-564 eligibility: pT2 Grade 4 or sarcomatoid, OR pT3 any grade N0M0,
            OR pT4/N+ any grade, OR M1 NED (resected metastases, no evidence of disease);
            ECOG 0-2; no active systemic autoimmune disease; adequate organ function.
            ADJUVANT track — LOT=1 post-curative resection; separate from metastatic
            systemic therapy decision tree (steps 2-5). Not for active metastatic disease.
          note: >
            Pembrolizumab adjuvant post-nephrectomy for clear-cell ccRCC (KEYNOTE-564;
            Choueiri 2021 NEJM; Choueiri 2023 NEJM 5-yr update; NCCN Cat 1): DFS HR 0.68
            (5-yr 57.2% vs 49.7%); OS HR 0.62 (5-yr 83.4% vs 76.2%; p<0.001).
            Pembrolizumab 200 mg IV Q3W × 17 cycles (~1 year). FDA approved Nov 2021.
            Stage III high-risk and M1 NED subgroups have strongest NNT rationale.
            Thyroid dysfunction most common irAE (~20%); monitor TSH q6-12w. Low-risk
            pT2a Grade 1-2 not included in KEYNOTE-564 eligibility.
    if_false:
      result: null
      notes: >
        Non-clear cell RCC: use cabozantinib 60mg monotherapy (REG-CABOZANTINIB-RCC)
        for papillary subtype (NCCN preferred, MET pathway rationale); clinical trial
        enrollment preferred for chromophobe, collecting duct, translocation RCC.
        Algorithm does not cover these subtypes.

  # Step 2 — IMDC risk group. Determines regimen eligibility.
  # IMDC favorable (0 factors) vs intermediate/poor (1-2 / ≥3 factors).
  # IMDC factors: KPS <80, <1y from dx to systemic therapy, Hgb < LLN,
  # Ca > ULN, Neutrophil > ULN, Platelets > ULN.
  - step: 2
    evaluate:
      any_of:
        - red_flag: RF-RCC-IMDC-INTERMEDIATE-POOR-RISK
    if_true:
      next_step: 3b
    if_false:
      next_step: 3a
    notes: "RF-RCC-IMDC-INTERMEDIATE-POOR-RISK fires on imdc_risk in {intermediate, poor, int} or imdc_risk_factors_count >= 1. Favorable (0 factors) falls to step 3a."

  # Step 3a — IMDC favorable. Nivo+ipi is NOT preferred (CheckMate-214:
  # sunitinib numerically better in favorable subgroup). Use ICI+TKI.
  - step: 3a
    evaluate:
      all_of:
        - condition: "IMDC favorable risk (0 adverse factors)"
        - condition: "ECOG PS 0-1 AND fit for ICI+TKI combination"
    if_true:
      next_step: 4
    if_false:
      result: IND-RCC-METASTATIC-1L-PEMBRO-AXI
      notes: "IMDC favorable + ECOG 2 or limited fitness: pembro+axi preferred (KEYNOTE-426 includes ECOG 0-2; less TKI toxicity than lenv+pembro)."

  # Step 3b — IMDC intermediate/poor. All 4 preferred regimens eligible.
  # Route based on ipilimumab eligibility and patient profile.
  - step: 3b
    evaluate:
      all_of:
        - condition: "No active autoimmune disease; no prior transplant; ECOG 0-1"
        - condition: "Ipi-eligible (no significant autoimmune history, patient accepts 4-dose ipi induction)"
    if_true:
      result: IND-RCC-METASTATIC-1L-NIVO-IPI
      notes: >
        IMDC intermediate/poor + ipi-eligible: nivo+ipi preferred (CheckMate-214;
        mOS 56 mo in int/poor; 48% ORR; durable responses including complete remissions).
        ICI+TKI alternatives (pembro+axi, lenv+pembro, nivo+cabo) are equally valid
        if patient/MDT prefers TKI-containing regimen or ipi not suitable.
    if_false:
      next_step: 4

  # Step 4 — ICI+TKI selection for fit patients (all IMDC groups reaching this step).
  # Three equally valid NCCN category-1 regimens; differentiate by toxicity profile
  # and tumor burden / response priority.
  - step: 4
    evaluate:
      all_of:
        - condition: "ECOG PS 0-1"
        - condition: "High tumour burden OR conversion-to-resection intent OR rapid response needed"
    if_true:
      result: IND-RCC-METASTATIC-1L-LENV-PEMBRO
      notes: >
        Fit + high-burden/rapid response: lenv+pembro preferred (CLEAR: ORR 71%,
        mPFS 23.9 mo vs 9.2 sunitinib — highest response magnitude of 1L regimens).
        Requires active BP management (hypertension G3-4 ~36%). Alternative:
        nivo+cabo if BP uncontrolled or bone metastases prominent.
    if_false:
      next_step: 5

  # Step 5 — Bone metastases or lenv+pembro hypertension concern → nivo+cabo.
  - step: 5
    evaluate:
      any_of:
        - condition: "Significant bone metastases (MET/AXL pathway biological rationale for cabozantinib)"
        - condition: "Uncontrolled hypertension (lenvatinib toxicity concern)"
        - condition: "ECOG PS 1-2 (better tolerability of nivo+cabo vs lenv+pembro)"
    if_true:
      result: IND-RCC-METASTATIC-1L-NIVO-CABO
      notes: >
        Nivo+cabo preferred with bone mets, marginal BP tolerance, or ECOG 1-2.
        CheckMate-9ER: PFS HR 0.51, mOS HR 0.70 vs sunitinib; cabo 40mg in combo
        reduces SRE risk and has MET inhibition rationale for bone disease.
    if_false:
      result: IND-RCC-METASTATIC-1L-PEMBRO-AXI
      notes: >
        Default ICI+TKI for fit ccRCC without specific driver to lenv+pembro or
        nivo+cabo: pembro+axi (KEYNOTE-426; PFS HR 0.69, mOS HR 0.68 across all
        IMDC risk groups including favorable). Well-tolerated, mature OS data.

sources:
  - SRC-CHECKMATE214-MOTZER-2018
  - SRC-KEYNOTE426-RINI-2019
  - SRC-CLEAR-MOTZER-2021
  - SRC-CHECKMATE9ER-CHOUEIRI-2021
  - SRC-NCCN-KIDNEY-2025
  - SRC-ESMO-RCC-2024

last_reviewed: "2026-05-04"
notes: >
  1L clear-cell RCC algorithm covering all 4 NCCN category-1 regimens.
  Non-clear cell (papillary, chromophobe, etc.) is out of scope — use
  cabozantinib monotherapy for papillary; clinical trial for others.

  IMDC favorable: nivo+ipi NOT preferred (CheckMate-214 numerical inferiority
  in favorable subgroup). Use ICI+TKI for favorable.

  ICI+TKI selection (steps 4-5) differentiates by tumor burden and toxicity
  profile, not fixed hierarchy. All three are NCCN category 1; MDT/patient
  preference is a valid tiebreaker.

  Adjuvant pembro (KEYNOTE-564) → IND-RCC-ADJUVANT-PEMBRO wired at step 1
  if_true as stage-gated alternative (KEYNOTE-564 post-nephrectomy, LOT=1
  adjuvant; DFS HR 0.68; OS HR 0.62; NCCN Cat 1). No dedicated adjuvant
  algorithm exists — wired here with explicit adjuvant criteria.

  2L: ALGO-RCC-METASTATIC-2L exists — belzutifan, cabozantinib,
  tivozanib 3L (IND-RCC-METASTATIC-3L-TIVOZANIB), nivolumab mono wired.
  Gap CLOSED (2026-05-04).

  UPDATED 2026-05-04 (Workstream FR): IND-RCC-VHL-DISEASE-BELZUTIFAN and
  IND-RCC-ADJUVANT-PEMBRO wired as Cat 1 alternatives at step 1 if_true
  (clear-cell histology gate). VHL belzutifan (LITESPARK-004; ORR 49%; FDA
  Aug 2021) for germline VHL syndrome patients; adjuvant pembro (KEYNOTE-564;
  DFS HR 0.68; OS HR 0.62) for post-nephrectomy high-risk Stage II/III and
  M1 NED. Both are separate from the metastatic ICI+TKI pathway (steps 2-5).
  Both gaps CLOSED.
