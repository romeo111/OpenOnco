id: ALGO-SALIVARY-1L
applicable_to_disease: DIS-SALIVARY
applicable_to_line_of_therapy: 1
purpose: >
  1L systemic therapy for metastatic/recurrent salivary gland carcinoma.
  Biomarker-gated preferred track: NTRK fusion (Cat 1; larotrectinib) for secretory
  carcinoma and rare other subtypes. Default: paclitaxel+carboplatin cytotoxic chemotherapy.
  Obtain HER2 IHC+FISH and AR IHC at diagnosis for 2L planning.

output_indications:
  - IND-SALIVARY-NTRK-LAROTRECTINIB
  - IND-SALIVARY-PALLIATIVE-PACLITAXEL-CARBO
  - IND-SALIVARY-HER2-TDXD

default_indication: IND-SALIVARY-PALLIATIVE-PACLITAXEL-CARBO

decision_tree:
  - step: 1
    evaluate:
      all_of:
        - condition: "NTRK1/2/3 gene fusion confirmed by NGS (IHC pan-TRK screen + NGS confirmation acceptable)"
    if_true:
      result: IND-SALIVARY-NTRK-LAROTRECTINIB
      notes: >
        NCCN Cat 1. Larotrectinib tumor-agnostic approval (FDA 2018); ORR ~75% in NTRK fusion+
        solid tumors. In salivary, secretory carcinoma (MASC) carries ETV6-NTRK3 fusion in up
        to 90% — test all secretory carcinoma routinely. Non-secretory subtypes: NTRK fusion
        rate <5% but should still be tested given high ORR if positive.
    if_false:
      next_step: 2
    notes: "NTRK testing is mandatory at diagnosis for all salivary gland carcinomas per NCCN."

  - step: 2
    evaluate:
      all_of:
        - condition: "ECOG PS 0-2"
        - condition: "Adequate organ function"
    if_true:
      result: IND-SALIVARY-PALLIATIVE-PACLITAXEL-CARBO
      notes: >
        Paclitaxel 175 mg/m² + carboplatin AUC 5 Q21D. Standard cytotoxic 1L for salivary gland
        carcinoma without actionable mutation. ORR typically 30-50% in retrospective series;
        no large randomized trial. HER2+ patients: T-DXd preferred at 2L (see alternatives).
      alternatives:
        - indication_id: IND-SALIVARY-HER2-TDXD
          nccn_category: "2A"
          criteria: >
            Recurrent/metastatic salivary gland carcinoma; HER2-overexpressing (IHC 3+ OR IHC 2+
            FISH-amplified); progressed on or after 1L platinum-based chemotherapy; ECOG 0-2;
            no baseline ILD; baseline LFTs ≤2 × ULN. LOT=2 — plan HER2 IHC+FISH at diagnosis
            to enable timely 2L access. Salivary duct carcinoma and adenocarcinoma NOS are
            HER2+ in ~15-25%.
          note: >
            T-DXd (trastuzumab deruxtecan) for HER2+ recurrent/metastatic salivary gland
            carcinoma at 2L (DESTINY-PanTumor02; Meric-Bernstam 2023 JCO; ORR 61% in
            HER2+ salivary cohort N=15; mDOR 18.0 mo; NCCN Cat 2A; tumor-agnostic HER2+
            approval). ILD class risk ~5-15% — monitor for pulmonary symptoms; grade ≥2 ILD:
            permanently discontinue. NTRK+ patients who progress on larotrectinib also
            eligible if HER2+ confirmed.
    if_false:
      result: IND-SALIVARY-PALLIATIVE-PACLITAXEL-CARBO
      notes: "ECOG 3-4: dose-reduce carboplatin; MDT required. ECOG 4: BSC discussion."

sources:
  - SRC-NCCN-SALIVARY-2025
last_reviewed: "2026-05-04"
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  UPDATED 2026-05-04 (Workstream EC): Added NTRK gate at step 1 for larotrectinib
  (Cat 1; enriched in secretory carcinoma/MASC with ETV6-NTRK3 up to 90%).
  2L planning: obtain HER2 IHC+FISH (T-DXd DESTINY-PanTumor02 ORR 61% in HER2+ salivary;
  IND-SALIVARY-HER2-TDXD authored) and AR IHC (androgen deprivation for AR+ salivary duct).
  Default: IND-SALIVARY-PALLIATIVE-PACLITAXEL-CARBO (cytotoxic 1L for mutation-negative).
  AR-directed therapy (enzalutamide/leuprolide) and HER2-directed 2L: out-of-scope for 1L algo.
  UPDATED 2026-05-04 (Workstream FV): IND-SALIVARY-HER2-TDXD wired as Cat 2A alternative
  at step 2 if_true (cytotoxic default). DESTINY-PanTumor02 salivary cohort ORR 61%;
  HER2 IHC+FISH testing at diagnosis enables timely 2L access. Gap CLOSED.
