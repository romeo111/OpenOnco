id: ALGO-SCLC-2L
applicable_to_disease: DIS-SCLC
applicable_to_line_of_therapy: 2
purpose: >
  Select 2L systemic therapy for relapsed or refractory SCLC after platinum-based 1L.
  Routes by ECOG performance status (gate) and chemotherapy-free interval (CTFI)
  from last platinum dose. Clinical trial enrollment is preferred for all ECOG 0-2
  patients at recurrence.

output_indications:
  - IND-SCLC-RR-TOPOTECAN
  - IND-SCLC-RR-LURBINECTEDIN
  - IND-SCLC-PLATINUM-RECHALLENGE
  - IND-SCLC-3L-TARLATAMAB
  - IND-SCLC-3L-IFINATAMAB

default_indication: IND-SCLC-RR-TOPOTECAN
alternative_indication: IND-SCLC-RR-LURBINECTEDIN

decision_tree:
  # Step 1 — Clinical trial. At SCLC recurrence, clinical trial is the
  # preferred option for ECOG 0-2 patients (NCCN, ESMO). Proceed to Step 2
  # only if no suitable trial is available or patient declines.
  - step: 1
    evaluate:
      any_of:
        - condition: "No available clinical trial OR patient declines trial enrollment"
    if_true:
      next_step: 2
    if_false:
      result: null
      notes: "Clinical trial preferred at recurrence for ECOG 0-2. Discuss with MDT. Enroll if suitable trial available."

  # Step 2 — Performance status gate.
  # ECOG ≥3: systemic therapy unlikely to benefit; BSC.
  - step: 2
    evaluate:
      any_of:
        - red_flag: RF-FITNESS-ECOG-FIT
        - red_flag: RF-FITNESS-ECOG-INTERMEDIATE
    if_true:
      next_step: 3
    if_false:
      result: null
      notes: "ECOG ≥3: systemic therapy benefit minimal. Best supportive care + corticosteroids for paraneoplastic symptoms. Palliative/hospice referral."

  # Step 3 — Platinum rechallenge gate for CTFI ≥180 days.
  # CTFI = time from end of 1L platinum chemotherapy to disease progression/recurrence.
  # CTFI ≥180 days (highly platinum-sensitive): platinum rechallenge preferred (ORR ~50-60%,
  # superior to topotecan ~24% or lurbinectedin ~35% in this sensitivity category).
  # CTFI <180 days: proceed to step 4 (lurbinectedin vs topotecan routing).
  - step: 3
    evaluate:
      any_of:
        - condition: "CTFI ≥ 180 days from end of 1L platinum chemotherapy"
    if_true:
      result: IND-SCLC-PLATINUM-RECHALLENGE
      notes: >
        Highly platinum-sensitive (CTFI ≥180d): rechallenge with carboplatin+etoposide
        (REG-CE-SCLC) × 4-6 cycles. NCCN Category 2A: ORR ~50-60% in CTFI ≥180d
        (superior to topotecan ORR ~24% or lurbinectedin ~35% in this category).
        For patients who received CE+atezo or CE+durva as 1L: rechallenge with CE
        alone (without re-adding immunotherapy — no data to support ICI re-challenge).
        If patient declines rechallenge or has contraindication to platinum:
        proceed to lurbinectedin (if accessible) or topotecan.
    if_false:
      next_step: 4
      notes: "CTFI <180 days: route to step 4 for CTFI ≥30d gate and lurbinectedin access."

  # Step 4 — CTFI ≥30d gate for lurbinectedin eligibility.
  # Lurbinectedin FDA label requires CTFI ≥30 days from last platinum dose.
  # CTFI <30 days (platinum-refractory): topotecan only.
  - step: 4
    evaluate:
      any_of:
        - condition: "CTFI ≥ 30 days from last platinum dose"
    if_true:
      next_step: 5
      notes: "CTFI 30-179 days: lurbinectedin within FDA-label eligibility. Route to step 5 for access gate."
    if_false:
      result: IND-SCLC-RR-TOPOTECAN
      notes: >
        CTFI <30 days (true platinum-refractory): topotecan standard of care (NCCN Cat 1).
        Lurbinectedin FDA label specifies CTFI ≥30 days — outside label for CTFI <30d.
        Topotecan ORR ~4-9% in platinum-refractory; disease control may still be achieved.
        CAV (cyclophosphamide+doxorubicin+vincristine) is NCCN Category 2A alternative
        but rarely used given topotecan similar efficacy and better tolerability.

  # Step 5 — Lurbinectedin access gate (CTFI 30-179 days).
  # Lurbinectedin is preferred per NCCN Cat 2A when accessible (ORR 35% overall;
  # 45% for CTFI ≥90d). Not registered or reimbursed in Ukraine — topotecan is
  # the accessible standard.
  - step: 5
    evaluate:
      all_of:
        - condition: "Lurbinectedin accessible (registered/reimbursed or international pharmacy available)"
    if_true:
      result: IND-SCLC-RR-LURBINECTEDIN
      notes: >
        Lurbinectedin accessible + CTFI 30-179 days: lurbinectedin 3.2 mg/m² IV q3w
        preferred (NCCN Cat 2A; ORR 35% overall; 45% platinum-sensitive ≥90d CTFI;
        Trigo Lancet Oncol 2020). Better toxicity profile vs topotecan (less G3-4
        neutropenia, no oral unavailability in UA). ATLANTIS phase 3 failed OS
        primary endpoint (HR 0.97) — lurbinectedin not proven superior on OS;
        monotherapy use rests on basket trial.
    if_false:
      result: IND-SCLC-RR-TOPOTECAN
      notes: >
        Topotecan IV standard when lurbinectedin inaccessible (standard in Ukraine --
        registered, reimbursable per NSZU). NCCN Category 1. ORR ~17-24% in
        platinum-sensitive relapse (CTFI >=90d); ~9% in resistant (CTFI 30-90d).

  # Step 6 -- 3L+ novel agent gate.
  # After progression on 2L topotecan or lurbinectedin (>=3rd line):
  # TWO NCCN Cat 2A options: tarlatamab (DLL3 x CD3 BiTE) OR ifinatamab deruxtecan (B7-H3 ADC).
  # Tarlatamab: step-up dosing mandatory; hospitalization C1D1 + C1D8; tocilizumab on site.
  # Ifinatamab: ILD/pneumonitis monitoring mandatory; no hospitalization requirement.
  # Choose based on baseline pulmonary status (ILD risk favors tarlatamab) and accessibility.
  - step: 6
    evaluate:
      all_of:
        - condition: "Patient has received >=2 prior systemic therapy lines (including platinum)"
        - red_flag: RF-FITNESS-ECOG-FIT
    if_true:
      result: IND-SCLC-3L-TARLATAMAB
      alternatives:
        - indication: IND-SCLC-3L-IFINATAMAB
          criteria: "No baseline ILD/pulmonary fibrosis + adequate pulmonary function + ifinatamab accessible"
          nccn_category: 2A
      notes: >
        3L+ ES-SCLC after platinum + topotecan/lurbinectedin — TWO NCCN Cat 2A options:
        DEFAULT: Tarlatamab (Imdelltra; DLL3×CD3 BiTE; 1 mg→10 mg step-up; Q2W IV;
        IND-SCLC-3L-TARLATAMAB; FDA May 2024; DeLLphi-301 ORR 40%; mOS 13.2m).
        Hospitalization C1D1+C1D8 mandatory; CRS ~53%; tocilizumab on site required.
        ALTERNATIVE: Ifinatamab deruxtecan (I-DXd; B7-H3 ADC; 12 mg/kg Q3W IV;
        IND-SCLC-3L-IFINATAMAB; FDA 2024; IDeate-Lung01 ORR ~52.4%; mOS ~12.9m).
        ILD/pneumonitis Grade 3+ ~6-9% — requires baseline CT chest + active surveillance.
        No hospitalization required. Prefer ifinatamab if tarlatamab inaccessible/contraindicated;
        prefer tarlatamab if ILD risk or baseline pulmonary compromise present.
        Both not registered in Ukraine; named-patient/compassionate use required.
    if_false:
      result: null
      notes: "3L+ with ECOG >=2 or both agents inaccessible: BSC/palliative care. Clinical trial if eligible."

sources:
  - SRC-NCCN-SCLC-2025
  - SRC-ESMO-SCLC-2021
  - SRC-TRIGO-2020

last_reviewed: "2026-05-04"
notes: >
  SCLC 2L routing: 5-step algorithm — clinical trial gate → PS gate →
  CTFI ≥180d rechallenge gate → CTFI ≥30d gate → lurbinectedin access gate.

  Three active indications:
  - IND-SCLC-PLATINUM-RECHALLENGE (NCCN Cat 2A; CTFI ≥180d; ORR ~50-60%)
  - IND-SCLC-RR-LURBINECTEDIN (NCCN Cat 2A; CTFI 30-179d; not registered UA)
  - IND-SCLC-RR-TOPOTECAN (NCCN Cat 1; all CTFI; registered UA; default)

  CAV (cyclophosphamide+doxorubicin+vincristine) is NCCN Category 2A alternative for
  CTFI ≥90 days but rarely used given topotecan non-inferiority and better tolerability
  (von Pawel 1999 phase 3: equivalent OS, topotecan better QoL and hematologic profile).
