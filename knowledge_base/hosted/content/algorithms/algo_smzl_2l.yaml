id: ALGO-SMZL-2L
applicable_to_disease: DIS-SPLENIC-MZL
applicable_to_line_of_therapy: 2
purpose: >
  Select 2L+ Indication for splenic marginal zone lymphoma after 1L
  failure (rituximab monotherapy, splenectomy, or HCV-DAA antiviral
  in HCV+ subset). Two tracks: (1) IND-SMZL-2L-BR (bendamustine +
  rituximab; BSH 2024 / NCCN 2L preferred; fit patients);
  (2) IND-SMZL-2L-RITUXIMAB-RETREATMENT (rituximab monotherapy for
  frail / bendamustine-ineligible patients or late relapse >12 months;
  Kalpadakis 2007 JCO; ORR ~70-80%; NCCN Cat 2A).

  2L entry triggered by: symptomatic relapse after 1L (cytopenia
  recurrence, splenomegaly progression, B-symptoms, transformation),
  OR persistent active treatment indication despite 1L. HCV+ patients
  who relapse despite SVR12 also enter via this algo.

output_indications:
  - IND-SMZL-2L-BR
  - IND-SMZL-2L-RITUXIMAB-RETREATMENT
  - IND-SMZL-2L-R2
  - IND-SMZL-2L-IBRUTINIB

default_indication: IND-SMZL-2L-BR
alternative_indication: IND-SMZL-2L-RITUXIMAB-RETREATMENT

decision_tree:
  # Step 1 — histologic transformation suspected → route to ALGO-DLBCL.
  # Cannot reference cross-disease algo here; trace must surface
  # "transformation-suspect: re-biopsy + ALGO-DLBCL routing" MDT note.
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-SMZL-TRANSFORMATION-PROGRESSION
        - red_flag: RF-AGGRESSIVE-HISTOLOGY-TRANSFORMATION
    if_true:
      result: IND-SMZL-2L-BR  # placeholder; see notes — routes upstream to ALGO-DLBCL
    if_false:
      next_step: 2

  # Step 2 — frail / organ dysfunction precluding bendamustine →
  # rituximab monotherapy retreatment (IND-SMZL-2L-RITUXIMAB-RETREATMENT).
  # Late relapse >12 months + rituximab-non-refractory: R-mono ORR ~70-80%.
  # Fit patients (ECOG 0-1, CrCl ≥40) fall through to BR at step 3.
  - step: 2
    evaluate:
      any_of:
        - red_flag: RF-SMZL-FRAILTY-AGE
        - red_flag: RF-SMZL-ORGAN-DYSFUNCTION
    if_true:
      next_step: 21
    if_false:
      next_step: 3
    notes: "Step 2 if_true updated 2026-05-04 (Workstream CH): routes to step 21 (R²/R-mono sub-gate) instead of direct R-mono result."

  # Step 21 — Frail sub-gate: rituximab-refractory vs rituximab-sensitive.
  # Early relapse (<6m from last rituximab) = rituximab-refractory: R-mono retreatment
  # unlikely active → R² (lenalidomide+rituximab; AUGMENT; ORR ~80%; mPFS 31.4 mo).
  # Late relapse (≥12m from last rituximab) = rituximab-sensitive: R-mono retreatment
  # adequate (ORR ~70-80%; less toxic; no REMS required).
  - step: 21
    evaluate:
      any_of:
        - condition: "Rituximab-refractory: early relapse <6 months from last rituximab OR refractory to prior rituximab-containing regimen"
    if_true:
      result: IND-SMZL-2L-R2
      notes: >
        Frail + rituximab-refractory SMZL: R² (lenalidomide 20 mg/day d1-21 +
        rituximab 375 mg/m² d1 q28d × 12 cycles; REG-R2-FL; AUGMENT Leonard JCO 2019;
        MZL subgroup ORR ~80%; mPFS 31.4 vs 13.3 months HR 0.41; NCCN Cat 1;
        BSH MZL 2024). R² provides IMiD-mediated activity overcoming anti-CD20
        resistance in rituximab-refractory disease. MANDATORY: REMS + VTE prophylaxis
        + PJP prophylaxis + HBV screening.
    if_false:
      result: IND-SMZL-2L-RITUXIMAB-RETREATMENT
      notes: >
        Frail + rituximab-sensitive (late relapse ≥12 months from last rituximab):
        rituximab 375 mg/m² × 4 weekly + maintenance q2months × 2 years
        (REG-RITUXIMAB-MONO; ORR ~70-80%; Kalpadakis 2007 JCO; NCCN Cat 2A).
        HBV screen + entecavir mandatory. Lower toxicity than R² (no lenalidomide
        REMS, VTE, or IMiD side effects). Adequate for rituximab-sensitive late relapse.
    notes: "Step 21 added 2026-05-04 (Workstream CH): R²/R-mono sub-gate for frail SMZL. Rituximab-refractory → IND-SMZL-2L-R2; rituximab-sensitive → IND-SMZL-2L-RITUXIMAB-RETREATMENT. Gap (3) CLOSED."

  # Step 3 — default: symptomatic relapse, fit, BR-eligible → BR.
  # Patients with prior BR/R² failure OR chemo-intolerance fall through
  # to step 4 (ibrutinib gate).
  - step: 3
    evaluate:
      any_of:
        - condition: "Symptomatic relapse after 1L (cytopenia, progressive splenomegaly, B-symptoms)"
        - condition: "CD20+ confirmed at relapse biopsy"
        - condition: "Adequate marrow + organ function for bendamustine"
        - red_flag: RF-SMZL-ORGAN-DYSFUNCTION
        - red_flag: RF-SMZL-TRANSFORMATION-PROGRESSION
    if_true:
      result: IND-SMZL-2L-BR
    if_false:
      next_step: 4

  # Step 4 — ibrutinib fallback gate: chemotherapy-exhausted or chemo-
  # intolerant SMZL patients where BR and R² are both contraindicated
  # or previously failed. Ibrutinib 560 mg PO daily (PCYC-1121; Noy
  # 2017 Blood; ORR ~58% SMZL; NCCN Cat 2B; FDA Jan 2017).
  # UA access ≈zero (NSZU not funded for MZL); named-patient only.
  - step: 4
    evaluate:
      any_of:
        - condition: "Prior BR failure AND prior R² failure (chemo-exhausted, BTKi-naive)"
        - condition: "Chemotherapy contraindicated (organ dysfunction, patient refusal) AND R² inaccessible/failed AND BTKi-naive"
    if_true:
      result: IND-SMZL-2L-IBRUTINIB
      notes: >
        Chemo-exhausted or chemo-intolerant SMZL (BR and R² both failed/contraindicated):
        ibrutinib 560 mg PO daily (REG-IBRUTINIB-MZL; PCYC-1121 Noy 2017 Blood;
        SMZL ORR ~58%; all-MZL CR only ~3% — mainly PRs; NCCN Cat 2B; FDA Jan 2017).
        ECG baseline (AF risk); hold peri-procedure (bleeding); avoid strong CYP3A4
        inhibitors. UA: not NSZU-funded for MZL; named-patient or compassionate-use required.
    if_false:
      result: IND-SMZL-2L-BR
    notes: "Step 4 added 2026-05-04 (Workstream CM): ibrutinib fallback gate for BR/R²-exhausted or chemo-intolerant SMZL. Gap (2) CLOSED."

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-BSH-MZL-2024

last_reviewed: "2026-05-04"
notes: >
  UPDATED 2026-05-04 (Workstream AZ): IND-SMZL-2L-RITUXIMAB-RETREATMENT
  authored and wired at step 2 for frail/bendamustine-ineligible SMZL
  (rituximab 375 mg/m² × 4 + maintenance; ORR ~70-80%; NCCN Cat 2A;
  Kalpadakis 2007 JCO). Gap (1) CLOSED.
  UPDATED 2026-05-04 (Workstream CH): IND-SMZL-2L-R2 authored and wired at step 21
  (AUGMENT MZL subgroup; Leonard JCO 2019; ORR ~80%; mPFS 31.4 mo; NCCN Cat 1;
  REG-R2-FL). Step 2 if_true now routes to step 21 (rituximab-refractory sub-gate):
  early relapse <6m → R²; late relapse ≥12m → R-mono retreatment. Gap (3) CLOSED.
  UPDATED 2026-05-04 (Workstream CM): IND-SMZL-2L-IBRUTINIB authored and
  wired at step 4 (ibrutinib 560 mg PO daily; PCYC-1121 Noy 2017 Blood;
  SMZL ORR ~58%; NCCN Cat 2B; FDA Jan 2017; UA access ≈zero — named-patient only).
  Gap (2) CLOSED.
  OOS / wiring gaps:
  (4) Histologic transformation routing must be resolved at upstream
  disease-resolution stage (relapse re-biopsy mandatory); algo
  surfaces but does not auto-route to ALGO-DLBCL.
  (5) Splenectomy as 2L mechanical debulking for symptomatic
  hypersplenism — surgical referral, outside KB.
  (6) reviewer_signoffs: 0 — pending two Clinical Co-Lead approvals.
