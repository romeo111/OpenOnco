id: ALGO-STS-ADVANCED-2L
applicable_to_disease: DIS-SOFT-TISSUE-SARCOMA
applicable_to_disease_state: advanced
applicable_to_line_of_therapy: 2
purpose: >
  Select 2L systemic therapy for advanced/metastatic STS after anthracycline-based 1L.
  Routes by: (1) STS subtype (leiomyosarcoma/UPS → GemDoc; liposarcoma → trabectedin
  or pazopanib; other non-adipocytic → pazopanib or GemDoc), (2) ECOG PS gate, and
  (3) organ function for chemotherapy vs targeted therapy.
  GemDoc (SARC002) is the preferred cytotoxic 2L; pazopanib (PALETTE) is the
  preferred targeted 2L for non-adipocytic STS. Trabectedin is the preferred 2L
  for liposarcoma/LMS (ET-743-SAR-3007) but has limited Ukraine access.

output_indications:
  - IND-STS-ADVANCED-2L-GEMDOC
  - IND-STS-ADVANCED-2L-PAZOPANIB
  - IND-STS-ADVANCED-2L-TRABECTEDIN
  - IND-STS-ADVANCED-2L-ERIBULIN
  - IND-STS-ADVANCED-2L-IFOSFAMIDE-HDDOSE
  - IND-STS-SYNOVIAL-2L-AFAMI-CEL

default_indication: IND-STS-ADVANCED-2L-GEMDOC
alternative_indication: IND-STS-ADVANCED-2L-PAZOPANIB

decision_tree:
  # Step 1 — Subtype exclusion gate.
  # GIST, Ewing, RMS: out of scope (different disease pathways).
  - step: 1
    evaluate:
      any_of:
        - condition: "STS subtype confirmed as non-GIST, non-Ewing, non-RMS"
    if_true:
      next_step: 2
    if_false:
      result: null
      notes: >
        GIST: use imatinib/sunitinib/regorafenib pathway (out of scope).
        Ewing sarcoma: IE, VIE, high-dose protocols (out of scope — NCCN Ewing).
        Rhabdomyosarcoma: pediatric/specialized protocols (out of scope).

  # Step 2 — ECOG PS gate.
  - step: 2
    evaluate:
      any_of:
        - condition: "ECOG PS 0-2"
    if_true:
      next_step: 3
    if_false:
      result: null
      notes: >
        ECOG ≥3: systemic chemotherapy not appropriate. Best supportive care.
        Consider palliative RT for painful/bleeding lesions.

  # Step 3 — STS subtype routing gate.
  # Leiomyosarcoma (uterine or extra-uterine) and UPS: GemDoc has strongest evidence.
  # Liposarcoma (adipocytic): trabectedin preferred (ET-743-SAR-3007) if available;
  # pazopanib alternative (though PALETTE excluded liposarcoma).
  # Other non-adipocytic STS: pazopanib (PALETTE) or GemDoc.
  - step: 3
    evaluate:
      any_of:
        - condition: "STS subtype = leiomyosarcoma (uterine LMS or extra-uterine LMS) OR undifferentiated pleomorphic sarcoma (UPS)"
    if_true:
      result: IND-STS-ADVANCED-2L-GEMDOC
      notes: >
        Leiomyosarcoma + UPS: GemDoc preferred 2L (SARC002: PFS 6.2 vs 3.0 months;
        ORR 16% vs 8%; LMS subgroup greatest benefit). G-CSF mandatory.
        Gemcitabine 90-min infusion at 10 mg/m²/min CRITICAL.
        Pazopanib (IND-STS-ADVANCED-2L-PAZOPANIB) is an alternative, especially
        after GemDoc failure or if chemotherapy is poorly tolerated.
    if_false:
      next_step: 4

  # Step 4 — Liposarcoma gate.
  # Liposarcoma: trabectedin preferred where available (ET-743-SAR-3007;
  # ORR 9.9% vs dox 6.9% NS; PFS HR 0.88 NS but disease-specific endpoint;
  # FDA approved for unresectable LPS/LMS). In Ukraine: limited access.
  # Eribulin also for liposarcoma (ERIBULIN-312; OS benefit in LPS subgroup).
  - step: 4
    evaluate:
      any_of:
        - condition: "STS subtype = liposarcoma (well-differentiated, dedifferentiated, myxoid, pleomorphic)"
    if_true:
      result: IND-STS-ADVANCED-2L-ERIBULIN
      notes: >
        Liposarcoma 2L preferred: eribulin (IND-STS-ADVANCED-2L-ERIBULIN) — ERIBULIN-312
        LPS subgroup OS HR 0.51 (strongest OS evidence in LPS); FDA approved Jan 2016 for LPS.
        Trabectedin (IND-STS-ADVANCED-2L-TRABECTEDIN) is an alternative if eribulin
        inaccessible — ET-743-SAR-3007 PFS HR 0.55; FDA-approved LPS/LMS Oct 2015;
        requires 24h CIV + central access + dexamethasone 20 mg premedication.
        GemDoc has limited evidence in liposarcoma vs LMS (SARC002 LMS-preferential).
        Ukraine: eribulin (Halaven, Eisai) check NSZU access; trabectedin = named-patient import.
    if_false:
      next_step: 41

  # Step 41 — Synovial sarcoma + ifosfamide-naive gate.
  # Synovial sarcoma is particularly ifosfamide-sensitive (ORR ~25-40% with HD-IFO
  # vs ~16% GemDoc in SARC002 ANGIOSARCOMA-rich cohort). If patient received
  # doxorubicin monotherapy in 1L (without ifosfamide) and has SS histology:
  # HD-ifosfamide is preferred over GemDoc for synovial sarcoma.
  # CrCl gate: ifosfamide contraindicated at CrCl < 30 mL/min → fall through to step 5.
  - step: 41
    evaluate:
      all_of:
        - condition: "STS subtype = synovial sarcoma (SS18-SSX fusion or histological diagnosis)"
        - condition: "Prior 1L was doxorubicin monotherapy (no prior ifosfamide exposure)"
        - condition: "CrCl ≥ 30 mL/min"
    if_true:
      result: IND-STS-ADVANCED-2L-IFOSFAMIDE-HDDOSE
      notes: >
        Synovial sarcoma + ifosfamide-naive 1L: HD-ifosfamide preferred 2L
        (IND-STS-ADVANCED-2L-IFOSFAMIDE-HDDOSE; REG-IFOSFAMIDE-HDDOSE-STS;
        NCCN STS 2025 Cat 2A; ORR ~25-40% in SS — highest of any STS subtype).
        GemDoc (IND-STS-ADVANCED-2L-GEMDOC) is an acceptable alternative
        (SARC002; NCCN Cat 2A; ORR ~16% unselected STS; MDT decision).
        Mesna + aggressive hydration mandatory. Neurological monitoring daily
        (ifosfamide encephalopathy risk ~20% at HD dosing).
    if_false:
      next_step: 5
    notes: "Partially wired — 1L ifosfamide-naive status and CrCl kept as MDT-evaluated text (no RF available for prior-ifosfamide status or synovial sarcoma subtype at this level). Falls through to step 5 (GemDoc/pazopanib) if not synovial sarcoma or if ifosfamide contraindicated."

  # Step 42 — Synovial sarcoma + afami-cel gate (HLA-A*02:01 positive).
  # Afami-cel (Tecelra) FDA approved August 2024 for HLA-A*02:01+ synovial sarcoma
  # with prior chemotherapy. SPEARHEAD-1 (Lancet 2024): ORR 37%, mDOR 11.3 months.
  # This step captures SS patients who are HLA-A*02:01+ and MAGE-A4+.
  # Applies whether ifosfamide was used 1L or not (eligibility: >=1 prior line).
  # Manufacturing time ~6 weeks: bridge therapy planning required.
  - step: 42
    evaluate:
      all_of:
        - condition: "STS subtype = synovial sarcoma (SS18-SSX fusion or histological diagnosis)"
        - condition: "HLA-A*02:01 positive (confirmed by validated high-resolution HLA typing)"
        - condition: "MAGE-A4 expression confirmed (IHC or RNA-seq)"
        - condition: "Afami-cel accessible (TECELRA REMS center, named-patient or approved)"
        - condition: "ECOG PS 0-1 and adequate organ function for lymphodepletion"
    if_true:
      result: IND-STS-SYNOVIAL-2L-AFAMI-CEL
      notes: >
        HLA-A*02:01+ MAGE-A4+ synovial sarcoma: afami-cel (Tecelra) preferred when
        accessible (FDA accelerated approval August 2024; NCCN STS 2025 Cat 2A).
        SPEARHEAD-1 (Demetri Lancet 2024): ORR 37%, mDOR 11.3 months, DCR 68%.
        First solid-tumor TCR-T therapy. REMS required (TECELRA REMS).
        Manufacturing ~6 weeks: plan bridge therapy for rapidly progressive disease.
        Lymphodepletion: fludarabine 25 mg/m2 x5d + cyclophosphamide 900 mg/m2 x3d.
        ECOG PS 0-1 and adequate organ function required for lymphodepletion tolerance.
        HLA-A*02:01 prevalence: ~40-45% in European/US populations; ~20-25% in East Asian.
        If afami-cel inaccessible or patient ineligible: proceed to ifosfamide HD
        (IND-STS-ADVANCED-2L-IFOSFAMIDE-HDDOSE if ifosfamide-naive) or GemDoc/pazopanib.
    if_false:
      next_step: 5
    notes: >
      Step 42 added 2026-05-04: afami-cel gate for HLA-A*02:01+ MAGE-A4+ synovial sarcoma.
      Falls through to step 5 (GemDoc/pazopanib) if HLA-negative, MAGE-A4-negative,
      afami-cel inaccessible, or ECOG/organ function insufficient for lymphodepletion.

  # Step 5 — Other non-adipocytic STS: chemotherapy tolerance assessment.
  # Non-LMS, non-UPS, non-liposarcoma STS (synovial sarcoma, angiosarcoma,
  # fibrosarcoma, MPNST, etc.): pazopanib is NCCN Cat 1 (PALETTE enrolled
  # these histologies). GemDoc is acceptable if chemo appropriate.
  - step: 5
    evaluate:
      all_of:
        - condition: "ECOG PS 0-2 AND adequate renal function (CrCl ≥30 mL/min)"
        - condition: "No severe peripheral neuropathy (Grade ≥2)"
    if_true:
      result: IND-STS-ADVANCED-2L-GEMDOC
      notes: >
        Other non-adipocytic STS (synovial, angiosarcoma, MPNST, fibrosarcoma, etc.):
        GemDoc is an option (SARC002 enrolled heterogeneous STS). Pazopanib is equally
        valid for non-adipocytic STS (PALETTE); clinician choice based on toxicity
        preference, comorbidities, and patient preference (IV vs oral).
    if_false:
      result: IND-STS-ADVANCED-2L-PAZOPANIB
      notes: >
        Renal impairment (CrCl <30) or neuropathy contraindication for gemcitabine/docetaxel:
        pazopanib 800 mg PO QD is preferred (PALETTE; non-renal excretion; NCCN Cat 1).
        Hepatic function and BP monitoring mandatory. Not for liposarcoma.

sources:
  - SRC-SARC002-MAKI-2007
  - SRC-PALETTE-VAN-DER-GRAAF-2012
  - SRC-NCCN-STS-2025

last_reviewed: "2026-05-04"
notes: >
  STS 2L ROUTING SUMMARY:

  Post-anthracycline ± ifosfamide (1L):
  1. LMS / UPS → GemDoc (SARC002 Cat 1; LMS-preferential benefit)
  2. Liposarcoma → trabectedin (ET-743-SAR-3007; FDA approved) or eribulin (ERIBULIN-312 LPS subset)
  3. Other non-adipocytic → pazopanib (PALETTE Cat 1) or GemDoc
  4. Synovial sarcoma → ifosfamide (if not used 1L) or pazopanib; GemDoc less active in SS

  Resequencing options:
  - If doxorubicin 1L: ifosfamide 2L (if not prior); GemDoc; pazopanib
  - If dox+ifo 1L (AI): GemDoc → pazopanib → trabectedin/eribulin sequence

  AUTHORED 2026-05-04:
  - IND-STS-ADVANCED-2L-TRABECTEDIN: trabectedin LPS/LMS (ET-743-SAR-3007; PFS HR 0.55; NCCN Cat 1)
  - IND-STS-ADVANCED-2L-ERIBULIN: eribulin for liposarcoma (ERIBULIN-312 LPS OS HR 0.51; NCCN Cat 1)
  - IND-STS-ADVANCED-2L-IFOSFAMIDE-HDDOSE: wired at new step 41 for synovial sarcoma + ifosfamide-naive 1L (NCCN Cat 2A; ORR ~25-40% in SS)

  Subtype nuances (not captured in algorithm):
  - Angiosarcoma: paclitaxel or gem preferred (angiosarcoma is taxane-sensitive)
  - Alveolar soft part sarcoma: sunitinib/cediranib preferred (vascular)
  - Desmoplastic small round cell tumor: specialized protocols
  All require MDT discussion.
