id: ALGO-T-ALL-1L
applicable_to_disease: DIS-T-ALL
applicable_to_line_of_therapy: 1
purpose: >
  Select 1L T-ALL induction. AYA (15-39) → pediatric-inspired (CALGB 10403;
  NCCN Cat 1); adults ≥40 or asparaginase-contraindicated → Hyper-CVAD.
  ETP-ALL: high-risk subtype; allo-SCT planning in CR1 regardless of regimen.

output_indications:
  - IND-T-ALL-1L-PEDIATRIC-INSPIRED
  - IND-T-ALL-1L-HYPER-CVAD

default_indication: IND-T-ALL-1L-PEDIATRIC-INSPIRED
alternative_indication: IND-T-ALL-1L-HYPER-CVAD

decision_tree:
  # Step 1 — Age gate: AYA (15-39) → pediatric-inspired preferred (CALGB 10403;
  # superior OS in this age group vs adult regimens). Older (≥40) or
  # asparaginase-contraindicated → Hyper-CVAD.
  - step: 1
    evaluate:
      all_of:
        - condition: "Age 15-39 years (AYA population)"
        - condition: "No contraindication to L-asparaginase/PEGasparaginase: no prior pancreatitis, no severe hepatic dysfunction, no coagulopathy grade ≥3"
    if_true:
      result: IND-T-ALL-1L-PEDIATRIC-INSPIRED
    if_false:
      result: IND-T-ALL-1L-HYPER-CVAD
    notes: >
      AYA gate: ages 15-39 → pediatric-inspired (CALGB 10403; 3-year OS 73%).
      Adults ≥40 or asparaginase-contraindicated → Hyper-CVAD.
      ETP-ALL (early T-precursor ALL): both regimens applicable; add allo-SCT
      planning in CR1 regardless of regimen choice.

sources: [SRC-NCCN-ALL-2025]
last_reviewed: "2026-05-04"
notes: >
  UPDATED 2026-05-04 (Workstream DS): IND-T-ALL-1L-PEDIATRIC-INSPIRED authored
  and wired at step 1 (AYA gate). Pediatric-inspired regimen (CALGB 10403;
  Stock 2019 JCO; N=318; 3-year OS 73%) preferred over Hyper-CVAD for ages 15-39.
  Older adults (≥40) or asparaginase-contraindicated → Hyper-CVAD (IND-T-ALL-1L-HYPER-CVAD).
  ETP-ALL (early T-precursor ALL): high-risk subtype; allo-SCT planning in CR1
  independent of induction regimen (to be modeled as separate indication).
  Nelarabine incorporation for ETP-ALL and relapsed T-ALL (REG-NELARABINE-T-ALL
  or combined with other agents) is a remaining gap for future authoring.
