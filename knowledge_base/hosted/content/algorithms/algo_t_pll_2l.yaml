id: ALGO-T-PLL-2L
applicable_to_disease: DIS-T-PLL
applicable_to_line_of_therapy: 2
purpose: >
  Relapsed/refractory T-PLL — single-track default to venetoclax +
  alemtuzumab combination per emerging Boidol 2017 / Hampel 2020 data,
  bridging to alloSCT consolidation in fit responders. Investigational
  — refer to clinical trial when available.

output_indications:
  - IND-T-PLL-2L-VENETOCLAX-ALEMTUZUMAB

default_indication: IND-T-PLL-2L-VENETOCLAX-ALEMTUZUMAB
alternative_indication: IND-T-PLL-2L-VENETOCLAX-ALEMTUZUMAB

decision_tree:
  - step: 1
    evaluate:
      any_of:
        - condition: "Relapsed/refractory after alemtuzumab IV monotherapy"
        - condition: "Alemtuzumab-refractory primary disease"
        - red_flag: RF-T-PLL-TRANSFORMATION-PROGRESSION
    if_true:
      result: IND-T-PLL-2L-VENETOCLAX-ALEMTUZUMAB
    if_false:
      result: IND-T-PLL-2L-VENETOCLAX-ALEMTUZUMAB

sources: [SRC-NCCN-BCELL-2025, SRC-ESMO-PTCL-2024]
last_reviewed: "2026-04-27"
notes: >
  Investigational regimen — clinical trial enrollment preferred where
  available. Bendamustine, pentostatin, and other historic salvage
  options not yet authored as separate indications.
notes_ua: >
  Дослідницька схема — там, де є така можливість, є кращою участь у клінічних
  дослідженнях. Бендамустин (bendamustine), пентостатин та інші історичні
  варіанти рятівної терапії ще не авторовані як окремі показання.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_13
draft_revision: 2
