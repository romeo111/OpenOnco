id: ALGO-WM-2L
applicable_to_disease: DIS-WM
applicable_to_line_of_therapy: 2
purpose: 'Select 2L+/relapsed WM Indication based on CXCR4 status, prior BTKi exposure, and patient preference for chemo-free vs fixed-duration. Four tracks: (1) CXCR4-WHIM-mutated → carfilzomib-based (BTKi response weaker in CXCR4-mut); (2) cBTKi-naive → zanubrutinib (ASPEN superior cardiac safety vs ibrutinib); (3) chemo-tolerant + chemo-sensitive late relapse ≥24 mo → BR (bendamustine-rituximab; NCCN Cat 2A; ORR ~70-80%); (4) BR-refractory or post-BTKi failure → VRd (bortezomib-rituximab-dex).

  '
output_indications:
- IND-WM-2L-ZANUBRUTINIB
- IND-WM-2L-VRD
- IND-WM-2L-CARFILZOMIB-CXCR4MUT
- IND-WM-2L-BR
- IND-WM-2L-PIRTOBRUTINIB
default_indication: IND-WM-2L-ZANUBRUTINIB
alternative_indication: IND-WM-2L-BR
decision_tree:
- step: 1
  evaluate:
    any_of:
    - condition: CXCR4-WHIM mutation positive (NGS or Sanger)
    - condition: Bortezomib-intolerant due to baseline neuropathy AND PI-class still indicated
  if_true:
    result: IND-WM-2L-CARFILZOMIB-CXCR4MUT
  if_false:
    next_step: 2
  notes: Free-text condition without matching disease-scoped RF; engine routes to default. Flag for RF authoring.
- step: 2
  evaluate:
    all_of:
    - none_of:
      - red_flag: RF-PRIOR-BTKI-PROGRESSION
    - any_of:
      - red_flag: RF-WM-MYD88-L265P-ACTIONABLE
    - condition: No high atrial fibrillation / cardiac risk precluding BTKi
  if_true:
    result: IND-WM-2L-ZANUBRUTINIB
  if_false:
    next_step: 3
  notes: "Wired via RF-WM-MYD88-L265P-ACTIONABLE (CSD-9A): MYD88-L265P-positive route to BTKi (zanubrutinib per ASPEN); pan-disease RF gates fitness; cardiac-risk condition stays MDT-evaluated (no RF for cardiac comorbidity grading)."
- step: 3
  evaluate:
    any_of:
    - condition: Chemo-tolerant fixed-duration preference (avoid continuous BTKi)
    - condition: Post-cBTKi failure / progression
    - condition: MYD88-WT (BTKi response markedly weaker)
    - red_flag: RF-WM-TRANSFORMATION-PROGRESSION
  if_true:
    next_step: 31
  if_false:
    result: IND-WM-2L-ZANUBRUTINIB
- step: 31
  evaluate:
    all_of:
    - condition: "Post-cBTKi failure or intolerance (ibrutinib, acalabrutinib, or zanubrutinib)"
    - red_flag: RF-WM-MYD88-L265P-ACTIONABLE
    - condition: "No prior pirtobrutinib or other non-covalent BTK inhibitor"
    - condition: "ECOG PS 0-2 (pirtobrutinib oral; adequate for continuous dosing)"
  if_true:
    result: IND-WM-2L-PIRTOBRUTINIB
    notes: >
      Post-cBTKi WM + MYD88-L265P-positive: pirtobrutinib 200 mg PO daily
      (REG-PIRTOBRUTINIB; BRUIN WM cohort Mato 2021 Lancet; ORR ~68%; NCCN Cat 2A).
      Non-covalent BTKi overcomes C481-S/R resistance mutation (most common cBTKi
      resistance mechanism). Cardiac safety advantage vs ibrutinib (afib ~3-5%).
      Access barrier: pirtobrutinib NOT registered in Ukraine — named-patient import
      required. If inaccessible → VRd (IND-WM-2L-VRD) is the practical fallback.
  if_false:
    next_step: 4
    notes: >
      Not post-cBTKi OR MYD88-WT OR prior pirtobrutinib: proceed to BR/VRd gate (step 4).
      MYD88-WT patients have poor BTKi response (class effect); VRd preferred.
  notes: "Step 31 added 2026-05-04 (Workstream BQ): post-cBTKi WM pirtobrutinib gate. IND-WM-2L-PIRTOBRUTINIB wired. Gap (1) CLOSED. Free-text conditions; MDT-evaluated access constraints."
- step: 4
  evaluate:
    all_of:
    - condition: "Chemo-sensitive late relapse: ≥24 months from last BR or alkylator-based therapy (OR BTKi-naive patient with no prior bendamustine exposure)"
    - condition: "Not prior bendamustine-REFRACTORY (progression >6 months from last BR dose)"
    - condition: "CrCl ≥30 mL/min (bendamustine dose reduction 70 mg/m² if CrCl 30-50; avoid if CrCl <30)"
    - condition: "No active uncontrolled infection precluding bendamustine immunosuppression"
  if_true:
    result: IND-WM-2L-BR
    notes: >
      Chemo-sensitive late relapse WM: BR (bendamustine 90 mg/m² d1-2 + rituximab 375 mg/m²
      d1 q28d × 4-6 cycles; REG-BR-STANDARD; Rummel 2013 StiL Lancet; NCCN Cat 2A).
      ORR ~70-80%; mPFS ~24-36 months in chemo-sensitive R/R WM.
      Preferred over VRd: no cumulative neuropathy (avoids bortezomib); fixed duration;
      lower cardiac toxicity than BTKi. IgM flare post-cycle 1 expected — do not stop.
      UA: bendamustine + rituximab both NSZU-funded; accessible.
  if_false:
    result: IND-WM-2L-VRD
    notes: >
      BR-refractory or CrCl <30 or active infection: bortezomib-rituximab-dexamethasone
      (VRd; IND-WM-2L-VRD). Also preferred for post-BTKi failure in patients with prior BR
      exposure (mechanism switch: alkylator → PI class). NCCN Cat 2A for R/R WM.
  notes: "Step 4 added 2026-05-04 (Workstream BG): BR-retreatment gate for chemo-sensitive late-relapse WM. Gap (2) CLOSED. Free-text conditions retained (no RF for 'chemo-sensitivity interval' or 'prior BR exposure' timing); MDT-evaluated."
sources:
- SRC-NCCN-BCELL-2025
- SRC-ESMO-WM-2024
last_reviewed: '2026-05-04'
notes: 'UPDATED 2026-05-04 (Workstream BQ): IND-WM-2L-PIRTOBRUTINIB authored and wired at step 31 (post-cBTKi WM + MYD88-L265P → pirtobrutinib; BRUIN Mato 2021 Lancet; ORR ~68%; NCCN Cat 2A). Gap (1) CLOSED. Step 3 if_true now routes to step 31 (pirtobrutinib gate) then step 4 (BR/VRd gate). ROUTING SUMMARY: (1) CXCR4-WHIM-mut → carfilzomib; (2) cBTKi-naive + MYD88-L265P + cardiac OK → zanubrutinib; (3) post-cBTKi + MYD88-L265P → pirtobrutinib (Cat 2A); (4) chemo-sensitive late relapse / MYD88-WT → BR; (fallback) → VRd. OOS / wiring gaps: (3) Hyperviscosity emergency routes via RF-WM-HYPERVISCOSITY (plasmapheresis); not decision-tree branch. (4) MYD88-WT WM covered by RF-WM-HIGH-RISK-BIOLOGY → VRd or BR.

  '
