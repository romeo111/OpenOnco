      EANO 2022: IDH mutation + 1p/19q codeletion diagnostic of oligodendroglioma;
      RT+PCV or RT+TMZ standard; PCV preferred based on EORTC 26951 codeleted subgroup.
actionability_review_required: true
notes: >
  ESCAT IA. The combination of IDH mutation + 1p/19q codeletion is one of the strongest
  molecular biomarker-to-treatment relationships in neuro-oncology: it predicts both
  diagnosis (oligodendroglioma, definitionally) and chemosensitivity (PCV response).
  ATRX mutation status (IHC) is used to EXCLUDE astrocytoma when codeletion is found —
  the two markers are mutually exclusive per WHO CNS 2021.
  Testing workflow: IDH first (IHC ± sequencing) → if IDH-mutant → 1p/19q FISH or
  SNP array → if codeleted = oligodendroglioma → PCV+RT. If not codeleted and ATRX
  lost = astrocytoma → different treatment pathway.
  TERT promoter mutation co-occurs in ~95% of oligodendrogliomas and may reinforce
  the diagnosis when 1p/19q FISH is equivocal.
