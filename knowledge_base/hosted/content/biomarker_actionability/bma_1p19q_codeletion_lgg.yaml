id: BMA-1P19Q-CODELETION-LGG
biomarker_id: BIO-1P19Q-CODELETION
variant_qualifier: >
  Concurrent loss of 1p and 19q (codeletion) by FISH or SNP array in the context
  of IDH-mutant diffuse glioma (WHO grade 2 or 3). IDH mutation must be confirmed
  separately. Codeletion in IDH-wildtype context does NOT qualify.
disease_id: DIS-GLIOMA-LOW-GRADE
escat_tier: IA
evidence_summary: >
  1p/19q codeletion combined with IDH mutation defines oligodendroglioma (WHO CNS 2021
  5th edition). Oligodendroglioma has the best prognosis among diffuse gliomas and is
  uniquely chemosensitive. Two landmark phase III trials establish PCV chemotherapy
  added to radiotherapy as standard of care:
  EORTC 26951 (van den Bent et al. JCO 2013 / 12-yr update Cairncross JCO 2013):
  374 pts, anaplastic oligodendroglioma; RT alone vs RT + PCV; in the 1p/19q-codeleted
  subgroup: mOS 14+ yr with RT+PCV vs 9.3 yr RT alone (HR ~0.5). Benefit confined
  to codeleted tumors.
  RTOG 9802 (Shaw et al. NEJM 2012 / 10-yr update): low-risk LGG subset; RT+PCV
  vs RT alone; 10-yr OS 73.8% vs 60.1% (HR 0.59, p=0.003). 1p/19q-codeleted
  patients derived greatest benefit.
  For grade 2 oligodendroglioma, temozolomide (TMZ) is an alternative to PCV
  (less neurotoxicity, shorter course) — EORTC 22033-26033 trial showed no OS
  advantage of TMZ monotherapy over RT but equal outcomes in codeleted tumors.
  NCCN CNS 2025: PCV (Category 1) preferred; TMZ acceptable.
  The biomarker (1p/19q codeletion + IDH mutation) governs both diagnosis AND
  treatment selection — PCV chemosensitivity is the therapeutic consequence.
evidence_summary_ua: >
  Коделеція 1p/19q у поєднанні з мутацією IDH визначає олігодендрогліому (видання
  WHO CNS 2021, 5-те). Олігодендрогліома характеризується найкращим прогнозом серед
  дифузних гліом та унікальною хемочутливістю. Два ключових дослідження фази 3
  встановлюють PCV-хіміотерапію у поєднанні з променевою терапією як стандарт лікування.
  EORTC 26951 (van den Bent та ін., JCO 2013; 12-річне оновлення Cairncross, JCO 2013):
  374 пацієнти з анапластичною олігодендрогліомою; порівнювали лише RT та RT + PCV;
  у підгрупі з коделецією 1p/19q — медіана загальної виживаності >14 років при RT+PCV
  проти 9.3 року при лише RT (HR ~0.5). Перевага обмежена коделетованими пухлинами.
  RTOG 9802 (Shaw та ін., NEJM 2012; 10-річне оновлення): підгрупа низького ризику ЛГГ;
  RT+PCV проти лише RT; 10-річна загальна виживаність 73.8% проти 60.1%
  (HR 0.59, p=0.003). Найбільша перевага спостерігалась у пацієнтів з коделецією 1p/19q.
  При гліомі ступеня 2 темозоломід (TMZ) є альтернативою PCV (менша нейротоксичність,
  коротший курс) — дослідження EORTC 22033-26033 не виявило переваги монотерапії TMZ
  над RT щодо загальної виживаності, але продемонструвало рівнозначні результати
  у коделетованих пухлинах.
  NCCN CNS 2025: PCV (категорія 1) є пріоритетним режимом; темозоломід — прийнятна альтернатива.
  Біомаркер (коделеція 1p/19q + мутація IDH) визначає як діагноз, так і вибір
  лікування — хемочутливість до PCV є терапевтичним наслідком.
notes_ua: >
  ESCAT IA. Комбінація мутації IDH + коделеції 1p/19q є одним із найбільш надійних
  взаємозв'язків «молекулярний біомаркер — лікування» в нейроонкології: вона прогнозує
  як діагноз (олігодендрогліома, за визначенням), так і хемочутливість (відповідь на PCV).
  Статус мутації ATRX (імуногістохімія) використовується для ВИКЛЮЧЕННЯ астроцитоми
  при виявленні коделеції — ці два маркери є взаємовиключними згідно з WHO CNS 2021.
  Алгоритм тестування: спочатку IDH (IHC ± секвенування) → при IDH-мутантному статусі
  → FISH або SNP-аналіз 1p/19q → при коделеції = олігодендрогліома → PCV+RT.
  При відсутності коделеції та втраті ATRX = астроцитома → інший терапевтичний шлях.
  Мутація промотора TERT зустрічається у ~95% олігодендрогліом і може підтверджувати
  діагноз у випадках, коли FISH-аналіз 1p/19q є неоднозначним.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_03
draft_revision: 2
regulatory_approval:
  fda:
    - "PCV (procarbazine + lomustine/CCNU + vincristine) — no standalone FDA approval for oligodendroglioma specifically; lomustine, procarbazine, vincristine all individually approved; standard use per RTOG 9802 / EORTC 26951 evidence"
    - "Temozolomide — FDA-approved for GBM and anaplastic astrocytoma; used off-label in LGG per NCCN Category 2A"
  ema:
    - "Temozolomide — EMA-approved for recurrent glioma including oligodendroglioma; standard institutional use for LGG"
  ukraine: []
recommended_combinations:
  - "RT + PCV (procarbazine 60 mg/m² d8-21, lomustine 110 mg/m² d1, vincristine 1.4 mg/m² d8+29, q6w x6) — preferred per RTOG 9802 (Category 1)"
  - "RT + temozolomide (TMZ 75 mg/m² concurrent, then 150-200 mg/m² d1-5 q28d adjuvant x12) — alternative, less neurotoxic"
contraindicated_monotherapy:
  - "RT alone (inferior to RT+PCV in 1p/19q-codeleted oligodendroglioma per phase III data)"
  - "Bevacizumab (anti-VEGF — no evidence of benefit in IDH-mutant LGG)"
