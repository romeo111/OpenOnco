id: BMA-ALK-FUSION-ALCL
biomarker_id: BIO-ALK-FUSION
variant_qualifier: "NPM1-ALK and other ALK fusions"
disease_id: DIS-ALCL
escat_tier: "IIA"
oncokb_level: "2"
evidence_summary: >
  ALK-positive ALCL (typically NPM1-ALK t(2;5)) is generally cured by
  CHOP-based regimens with brentuximab vedotin (ECHELON-2: BV-CHP). For
  relapsed/refractory ALK+ ALCL, crizotinib monotherapy achieves high
  response rates (Gambacorti-Passerini 2014; pediatric COG NCT00939770).
  ALK-TKIs are an established salvage option but not 1L.
regulatory_approval:
  fda:
    - "crizotinib — relapsed/refractory ALK+ ALCL pediatric (FDA approved 2021)"
    - "brentuximab vedotin + CHP — 1L systemic ALK+ ALCL (FDA approved 2018)"
  ema:
    - "brentuximab vedotin + CHP — 1L systemic ALK+ ALCL (EMA approved)"
  ukraine: []
recommended_combinations:
  - "brentuximab vedotin + cyclophosphamide/doxorubicin/prednisone (BV-CHP, 1L)"
  - "crizotinib monotherapy (R/R, especially pediatric)"
  - "alectinib / lorlatinib (off-label salvage)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-PTCL-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIA — strong retrospective + single-arm evidence for ALK-TKI
  in R/R ALK+ ALCL. ALK status by IHC (ALK1 antibody) is mandatory
  for ALCL diagnosis per WHO.
