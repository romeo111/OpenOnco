id: BMA-APC-CRC
biomarker_id: BIO-APC
variant_qualifier: "APC loss-of-function mutation (somatic) in colorectal carcinoma — WNT/β-catenin pathway driver; no approved APC-directed therapy"
disease_id: DIS-CRC
escat_tier: IIIB
evidence_summary: >
  APC somatic loss-of-function mutations occur in ~80% of sporadic colorectal carcinomas (CRC)
  and represent the earliest molecular event in the adenoma-carcinoma sequence. APC loss
  stabilizes β-catenin, driving constitutive WNT target gene transcription (MYC, CCND1).
  Despite its ubiquity, APC is not a direct therapeutic target for systemic therapy in CRC:
  (1) WNT pathway inhibitors: porcupine inhibitors (WNT-974/LGK-974, RXC004) block Wnt
      ligand secretion upstream of APC and are in Phase I/II trials across WNT-driven tumors
      including CRC. Early results show modest single-agent activity; no CRC-specific approval.
  (2) Tankyrase inhibitors: block AXIN degradation → restore destruction complex despite
      APC loss; early preclinical/Phase I (NVP-TNKS656, G007-LK); dose-limiting GI toxicity.
  (3) APC loss does not predict response to anti-EGFR (cetuximab/panitumumab) in CRC —
      RAS/RAF wild-type status determines anti-EGFR eligibility, not APC status.
  (4) MSI-H/dMMR CRC (~15%) frequently co-occurs with somatic APC mutation; immunotherapy
      (pembrolizumab 1L or 2L) is actionable via the MMR deficiency, not APC per se.
  ESCAT IIIB: APC mutation is a ubiquitous driver in CRC with investigational pathway
  targeting but no approved APC-selected systemic therapy.
evidence_summary_ua: >
  Соматичні мутації APC з втратою функції зустрічаються у ~80% спорадичних колоректальних
  карцином (КРР) і є найбільш ранньою молекулярною подією в послідовності аденома—карцинома.
  Втрата APC стабілізує β-катенін, зумовлюючи конститутивну транскрипцію цільових генів
  WNT (MYC, CCND1). Попри поширеність, APC не є прямою терапевтичною мішенню при КРР:
  (1) Інгібітори шляху WNT: порцупін-інгібітори (WNT-974/LGK-974, RXC004) блокують
      секрецію ліганду Wnt вище APC і перебувають у дослідженнях фаз I/II при WNT-залежних
      пухлинах, включаючи КРР. Попередні результати демонструють помірну активність у монотерапії;
      специфічне схвалення для КРР відсутнє.
  (2) Інгібітори танкірази: блокують деградацію AXIN → відновлення деструктивного комплексу
      незважаючи на втрату APC; ранні доклінічні/фаза I (NVP-TNKS656, G007-LK); доза-лімітована
      шлунково-кишкова токсичність.
  (3) Втрата APC не прогнозує відповідь на анти-EGFR (цетуксимаб/панітумумаб (panitumumab))
      при КРР — критеріями відбору є RAS/RAF дикого типу, а не статус APC.
  (4) MSI-H/dMMR КРР (~15%) часто супроводжується соматичними мутаціями APC; імунотерапія
      (пембролізумаб (pembrolizumab) 1-а або 2-а лінія) є клінічно значущою на основі
      дефіциту MMR, а не APC як такого.
  ESCAT IIIB: мутація APC є повсюдним драйвером у КРР із досліджуваним пригніченням
  шляху, проте схвалена терапія, що вибирається на підставі APC, відсутня.
notes_ua: >
  ESCAT IIIB: мутація APC маркує послідовність аденома—карцинома, але наразі не є
  ознакою, що визначає вибір терапії. Ключові клінічні аспекти:
  (1) Герміногенне тестування: пацієнти молодше 50 років з КРР або з ≥10 аденомами
      повинні пройти герміногенне тестування APC для виключення FAP/AFAP; профілактична
      колектомія є куративним методом.
  (2) Стан шляху WNT: ядерний β-катенін за IHC є сурогатним маркером; застосовується
      при недоступності повного секвенування, однак не додає клінічної значущості понад
      секвенування.
  (3) Критерії включення у дослідження: «кошикові» дослідження WNT-шляху (порцупін-
      інгібітори RXC004, LGK-974) використовують мутацію APC або CTNNB1 як критерії відбору.
  (4) Контекст резистентності: втрата APC при КРР з набутими мутаціями KRAS або BRAF
      відображає пізню клональну еволюцію; серійний ctDNA може відстежувати цей процес.
