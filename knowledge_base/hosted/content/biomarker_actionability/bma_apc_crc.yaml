notes: >
  ESCAT IIIB: APC mutation marks the adenoma-carcinoma sequence but is not currently
  actionable for therapy selection. Key clinical implications:
  (1) Germline testing: any patient <50y with CRC or with ≥10 adenomas should have germline
      APC testing to exclude FAP/AFAP; prophylactic colectomy is curative.
  (2) WNT pathway state: nuclear β-catenin IHC is a surrogate; useful when full sequencing
      unavailable but does not add actionability above sequencing.
  (3) Trial eligibility: WNT pathway basket trials (porcupine inhibitors RXC004, LGK-974)
      use APC mutation or CTNNB1 mutation as eligibility criteria.
  (4) Resistance context: APC loss in CRC that acquires KRAS or BRAF mutations represents
      late clonal evolution; serial ctDNA may track this.
