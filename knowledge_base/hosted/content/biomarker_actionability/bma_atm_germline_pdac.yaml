id: BMA-ATM-GERMLINE-PDAC
biomarker_id: BIO-HRR-PANEL
variant_qualifier: ATM germline pathogenic
disease_id: DIS-PDAC
escat_tier: IIA
evidence_summary: 'ATM germline pathogenic confers ~5-10× pancreatic-cancer risk;
  PARPi activity in ATM-mutated PDAC is modest (POLO germline-only, BRCA-restricted).
  NCCN recommends platinum-based chemo first; PARPi off-label or trial-only. ESCAT
  IIA / OncoKB Level 3A.

  '
evidence_summary_ua: >
  Герміногенний патогенний варіант ATM підвищує ризик раку підшлункової залози
  приблизно у 5–10 разів; активність PARPi при PDAC з мутацією ATM є помірною
  (дослідження POLO включало лише герміногенні варіанти та було обмежене BRCA).
  NCCN рекомендує першочергову хіміотерапію на основі платини; PARPi призначається
  поза інструкцією або виключно в рамках клінічних досліджень. ESCAT IIA / рівень 3A.
notes_ua: >
  Каскадне тестування членів родини є обов'язковим. Носії варіантів ATM з PDAC
  мають право на включення до протоколів спостереження за групами високого ризику (CAPS).
