id: BMA-ATM-GERMLINE-PROSTATE
biomarker_id: BIO-HRR-PANEL
variant_qualifier: ATM germline pathogenic
disease_id: DIS-PROSTATE
escat_tier: IB
evidence_summary: 'ATM germline pathogenic in mCRPC: olaparib approved per PROfound
  (Cohort A included ATM); benefit smaller than BRCA but FDA/EMA-labeled. Talazoparib+enzalutamide
  and olaparib+abiraterone also include ATM in HRR- mutated populations. ESCAT IB
  / OncoKB Level 1.

  '
evidence_summary_ua: >
  Герміногенний патогенний варіант ATM при мКРРП: олапариб (olaparib) схвалений
  на підставі результатів дослідження PROfound (когорта A включала ATM); перевага
  менша, ніж при BRCA, проте препарат включений у реєстраційне маркування FDA та
  EMA. Талазопариб (talazoparib) + ензалутамід (enzalutamide) та олапариб +
  абіратерон (abiraterone) також охоплюють ATM у популяціях з мутаціями HRR.
  ESCAT IB / рівень 1.
notes_ua: >
  Маркування EMA є більш обмежувальним, ніж FDA — у ЄС олапариб обмежений носіями
  BRCA1/2. Каскадне тестування членів родини є обов'язковим; носії варіантів ATM
  мають підвищений ризик раку молочної залози та підшлункової залози в родичів.
