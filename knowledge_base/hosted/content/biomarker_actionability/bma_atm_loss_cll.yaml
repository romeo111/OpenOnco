id: BMA-ATM-LOSS-CLL
biomarker_id: BIO-HRR-PANEL
variant_qualifier: ATM loss (11q deletion or somatic mutation)
disease_id: DIS-CLL
escat_tier: IIA
evidence_summary: 'ATM loss in CLL (del(11q) or somatic mutation): historically poor-prognostic
  with chemoimmunotherapy (FCR), but BTK inhibitors (ibrutinib, acalabrutinib, zanubrutinib)
  and venetoclax+obinutuzumab abrogate this risk. Avoid FCR in ATM-deficient CLL.
  ESCAT IIA (treatment-modifying) / OncoKB Level 3A.

  '
evidence_summary_ua: >
  Втрата ATM при ХЛЛ (del(11q) або соматична мутація): історично асоціювалася з
  несприятливим прогнозом на фоні хіміоімунотерапії (FCR), однак BTK-інгібітори
  (ібрутиніб (ibrutinib), акалабрутиніб (acalabrutinib), занубрутиніб (zanubrutinib))
  та венетоклакс (venetoclax) + обінутузумаб (obinutuzumab) нівелюють цей ризик.
  FCR при ATM-дефіцитному ХЛЛ слід уникати.
  ESCAT IIA (модифікує лікування) / рівень 3A.
notes_ua: >
  Примітка: порушення TP53 (del(17p) або мутація TP53) є домінуючим несприятливим
  прогностичним фактором — ATM є вторинним. Рекомендується тестування del(11q) методом
  FISH та ATM методом NGS у всіх хворих на ХЛЛ перед початком терапії.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_03
draft_revision: 2
regulatory_approval:
  fda:
  - ibrutinib, acalabrutinib, zanubrutinib — CLL all-comers including del(11q)
  - venetoclax + obinutuzumab — 1L CLL
  ema:
  - BTKi — CLL all-comers
  - venetoclax + obinutuzumab — 1L CLL
  ukraine: []
recommended_combinations:
- acalabrutinib (preferred for cardiac safety)
- zanubrutinib
- ibrutinib
- venetoclax + obinutuzumab (fixed-duration)
contraindicated_monotherapy:
- FCR (fludarabine-cyclophosphamide-rituximab) in ATM-deficient CLL — inferior outcomes
