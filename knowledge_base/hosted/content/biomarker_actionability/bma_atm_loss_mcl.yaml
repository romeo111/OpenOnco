id: BMA-ATM-LOSS-MCL
biomarker_id: BIO-HRR-PANEL
variant_qualifier: ATM loss-of-function (mutation or 11q deletion)
disease_id: DIS-MCL
escat_tier: IIA
evidence_summary: 'ATM is the most common somatic mutation in MCL (~40-50%). Not directly
  therapy-selecting; standard MCL regimens (BTKi, R-CHOP/R-DHAP induction + ASCT,
  BR) apply. ATM loss may sensitize to ATR inhibitors in trials. ESCAT IIA (biological)
  / OncoKB Level 3A.

  '
evidence_summary_ua: >
  ATM є найпоширенішою соматичною мутацією при МКЛ (~40–50%). Безпосередньо не визначає
  вибір терапії; застосовуються стандартні схеми для МКЛ (BTKi, R-CHOP/R-DHAP
  індукція + ASCT, BR). Втрата ATM може підвищувати чутливість до інгібіторів ATR
  у рамках клінічних досліджень. ESCAT IIA (біологічний) / рівень 3A.
notes_ua: >
  Супутня мутація TP53 є домінуючим несприятливим прогностичним фактором при МКЛ;
  ізольована втрата ATM є менш значущою з прогностичної точки зору.
