id: BMA-BAP1-MUT-RCC-PROGNOSTIC
biomarker_id: BIO-BAP1-MUTATION
disease_id: DIS-RCC
histologic_subtype: CLEAR_CELL
actionability_type: prognostic
escat_tier: "IIIA"
evidence_level: B

summary: >
  BAP1 loss-of-function mutation in clear-cell RCC is associated with worse
  prognosis (shorter CSS and OS) compared to BAP1-intact tumours. Frequently
  co-occurs with SETD2 mutation. BAP1 mutation does not currently predict
  differential response to any specific approved agent (ICI vs TKI), but
  identifies a high-risk subgroup warranting closer surveillance and aggressive
  systemic therapy consideration. ESCAT IIIA — prognostic biomarker, no
  approved targeted therapy for BAP1-mutant RCC as of 2026.

clinical_utility:
  treatment_selecting: false
  prognostic_value: true
  note: >
    BAP1 mutation = poor prognosis marker. Does not gate any specific regimen.
    In clinical practice: use IMDC risk score (which captures clinical factors)
    for treatment selection; BAP1 status is complementary molecular prognostic
    information, not yet a selection criterion in any guideline.

associated_pathways:
  - "Polycomb repressive complex deubiquitination (H2AK119 deubiquitylase)"
  - "DNA damage response"
  - "Cell cycle regulation"

frequency_in_disease: "~15-20% of sporadic ccRCC"

primary_sources:
  - SRC-NCCN-KIDNEY-2025
  - SRC-ESMO-RCC-2024
last_verified: "2026-05-05"
evidence_sources:
  - source: SRC-NCCN-KIDNEY-2025
    level: "Category 2A"
    direction: Supports
    significance: Prognosis
    note: >
      NCCN Kidney 2025: BAP1 and PBRM1 mutations (TCGA/Kapur 2013) define
      two molecular subtypes of ccRCC with distinct prognosis; BAP1-mut
      associated with worse CSS and OS. No treatment-selecting implication
      in current NCCN guidelines.

variant_qualifier: "BAP1 loss-of-function mutation (somatic; ~15-20% sporadic ccRCC); IHC loss of nuclear BAP1 staining is a validated tissue surrogate"
actionability_review_required: true

rationale_ua: >
  Мутація BAP1 з втратою функції при світлоклітинній карциномі нирки (НКК) асоціюється
  з гіршим прогнозом (коротша виживаність, специфічна для захворювання, та загальна
  виживаність порівняно з BAP1-інтактними пухлинами) і часто співіснує з мутацією
  SETD2. Наразі BAP1 не прогнозує диференційовану відповідь на будь-який конкретний
  схвалений препарат (ICI проти TKI), проте ідентифікує підгрупу високого ризику,
  де показані ретельне спостереження та більш агресивна системна терапія. ESCAT IIIA —
  прогностичний біомаркер; таргетна терапія, специфічна для BAP1-мутантного НКК,
  станом на 2026 рік не затверджена.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_03
draft_revision: 2

do_not_do:
  - "Do NOT use BAP1 mutation status alone to select or exclude any specific 1L regimen"
  - "Do NOT confuse BAP1-associated hereditary tumour syndrome (BAP1 tumour predisposition syndrome) with somatic BAP1 ccRCC — different clinical implications"

last_reviewed_legacy: "2026-05-03"
notes: >
  BAP1 mutation identifies poor-prognosis ccRCC. Relevant for counselling and
  potentially for intensity of treatment (supports aggressive treatment approach
  in fit patients). No biomarker-directed therapy approved. PBRM1 (mutually
  exclusive) is separately prognostic with better outcomes. Both are complementary
  to IMDC clinical risk score. Germline BAP1 testing indicated if personal/family
  history of mesothelioma, uveal melanoma, or other BAP1-associated tumours.
