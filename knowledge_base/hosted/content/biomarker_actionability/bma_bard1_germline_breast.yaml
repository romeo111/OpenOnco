id: BMA-BARD1-GERMLINE-BREAST
biomarker_id: BIO-HRR-PANEL
variant_qualifier: BARD1 germline pathogenic
disease_id: DIS-BREAST
escat_tier: IIA
evidence_summary: 'BARD1 germline pathogenic confers moderate breast-cancer risk (~2-3×).
  BARD1 forms heterodimer with BRCA1 → biological HR deficiency. Limited clinical
  PARPi data; off-label consideration. ESCAT IIA / OncoKB Level 3A.

  '
evidence_summary_ua: >
  Герміногенний патогенний варіант BARD1 асоціюється з помірним ризиком раку
  молочної залози (~2–3-кратним підвищенням). BARD1 формує гетеродимер з BRCA1,
  зумовлюючи біологічну недостатність гомологічної рекомбінації (HR). Клінічні
  дані щодо PARPi обмежені; застосування поза інструкцією можливе. ESCAT IIA /
  рівень 3A.
notes_ua: >
  Каскадне тестування відповідно до NCCN. Рекомендовано посилений скринінг.
