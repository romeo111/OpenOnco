evidence_summary_ua: >
  Герміногенний патогенний варіант BARD1 при епітеліальному раку яєчника (EOC): трапляється
  рідко; включений до HRR-панелей; перевага PARPi екстраполована з підгруп
  HRD-позитивних досліджень (PAOLA-1, NOVA non-gBRCA). ESCAT IIB / рівень 3B.
notes_ua: >
  Каскадне тестування відповідно до NCCN.
