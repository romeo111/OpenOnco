id: BMA-BCL2-EXPRESSION-AML
biomarker_id: BIO-BCL2-IHC
variant_qualifier: "BCL2 protein overexpression by IHC (H-score ≥100 or ≥50% cells 1+/2+/3+) OR BCL2-expressing AML (flow cytometry positivity); note: FDA approval for venetoclax in AML is NOT restricted to BCL2+ patients — overexpression is a predictive enrichment biomarker, not a companion diagnostic"
disease_id: DIS-AML
escat_tier: IIB
evidence_summary: >
  Venetoclax (BCL2 inhibitor) + azacitidine or decitabine is FDA-approved (Oct 2020) for
  newly diagnosed AML in patients ≥75 years or those ineligible for intensive induction
  chemotherapy, regardless of BCL2 expression status. However, BCL2 protein overexpression
  and specific co-mutations (IDH1/2, NPM1) are strong predictors of venetoclax response.
  VIALE-A trial (DiNardo et al. NEJM 2020 — venetoclax + azacitidine vs azacitidine):
  mOS 14.7 vs 9.6 mo (HR 0.66, p<0.001); CR/CRi rate 66.4% vs 28.3%. BCL2 IHC high-expressors
  had superior outcomes in retrospective VIALE-A subanalyses. Molecular co-mutation context:
  NPM1-mutated AML: CR ~75% with ven+aza; IDH2-mutated: CR ~67%; IDH1-mutated: CR ~57%;
  TP53-mutated: CR ~40% (inferior). AML with t(8;21) or inv(16) (CBF-AML): poor ven response —
  avoid ven+aza in favor of intensive 7+3 + GO when fit. ESCAT IIB reflects that BCL2 IHC
  alone is not a mandated companion diagnostic — clinical eligibility criteria (age/fitness)
  are the primary drivers; BCL2 overexpression adds predictive value in molecular context.
evidence_summary_ua: >
  Венетоклакс + азацитидин — схвалено FDA (жовтень 2020) для новодіагностованого AML у
  пацієнтів ≥75 років або непридатних до інтенсивної хіміотерапії, незалежно від статусу
  BCL2. VIALE-A (фаза III): mЗВ 14.7 vs 9.6 міс (HR 0.66). Надекспресія BCL2 та ко-мутації
  (IDH1/2, NPM1) — предиктори відповіді. CBF-AML (t(8;21), inv(16)): ven+aza неефективне,
  перевага 7+3+GO при придатних пацієнтах.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "venetoclax 400 mg/day PO (after 3-day ramp-up) + azacitidine 75 mg/m² or decitabine 20 mg/m² — newly diagnosed AML, age ≥75 or unfit for intensive induction (FDA Oct 2020; VIALE-A / VIALE-C)"
  ema:
    - "venetoclax + azacitidine — newly diagnosed AML in adults ≥75 or unfit for intensive chemotherapy (EMA 2021)"
  ukraine: []
recommended_combinations:
  - "venetoclax 400 mg/day PO + azacitidine 75 mg/m² SC/IV days 1-7 (28-day cycles; VIALE-A regimen — preferred)"
  - "venetoclax 400 mg/day PO + decitabine 20 mg/m² IV days 1-5 (28-day cycles; VIALE-C alternative)"
contraindicated_monotherapy:
  - "venetoclax monotherapy in AML (insufficient single-agent activity; HMA backbone required for sustained remissions)"
  - "venetoclax + azacitidine in CBF-AML (t(8;21) / inv(16)) — inferior to 7+3 + gemtuzumab ozogamicin in fit patients; avoid"
primary_sources:
  - SRC-NCCN-AML-2025
  - SRC-ELN-AML-2022
  - SRC-VIALE-A-DINARDO-2020
last_verified: "2026-05-03"
