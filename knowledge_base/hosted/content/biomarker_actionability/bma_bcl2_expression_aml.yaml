notes: >
  ESCAT IIB: BCL2 overexpression is a predictive enrichment marker, not a mandatory companion
  diagnostic for venetoclax approval in AML. Eligibility is determined by age (≥75) or fitness
  for intensive chemotherapy. BCL2 IHC or flow cytometry adds predictive information in clinical
  decision-making, particularly in younger unfit patients where the response probability needs
  to be weighed. TLS (tumor lysis syndrome) prophylaxis mandatory: ramp-up dosing (20mg → 50mg
  → 100mg → 200mg → 400mg over 3 days), aggressive hydration, allopurinol/rasburicase.
  Differentiate from lymphoma indications where BCL2 rearrangement (not just expression) drives
  ESCAT tier — in AML, BCL2 expression (protein) is the relevant biomarker.
