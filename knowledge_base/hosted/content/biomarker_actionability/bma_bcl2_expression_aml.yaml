    level: A
    direction: Supports
    significance: Sensitivity/Response
    note: "VIALE-A phase III: venetoclax + azacitidine vs azacitidine in newly diagnosed AML ≥75/unfit; mOS 14.7 vs 9.6 mo, HR 0.66 (p<0.001); CR/CRi 66.4% vs 28.3%."
  - source: SRC-NCCN-AML-2025
    level: "Category 1"
    direction: Supports
    significance: Sensitivity/Response
    note: "NCCN AML 2025: venetoclax + HMA Category 1 for newly diagnosed AML ≥75 or unfit. BCL2 IHC not required but NPM1/IDH1/IDH2 co-mutation status predicts depth of response."
  - source: SRC-ELN-AML-2022
    level: A
    direction: Supports
