id: BMA-BCL2-EXPRESSION-AML
biomarker_id: BIO-BCL2-EXPRESSION-IHC
variant_qualifier: "BCL2 protein overexpression by IHC (H-score ≥100 or ≥50% cells 1+/2+/3+) OR BCL2-expressing AML (flow cytometry positivity); note: FDA approval for venetoclax in AML is NOT restricted to BCL2+ patients — overexpression is a predictive enrichment biomarker, not a companion diagnostic"
disease_id: DIS-AML
escat_tier: IIB
evidence_summary: >
  Venetoclax (BCL2 inhibitor) + azacitidine or decitabine is FDA-approved (Oct 2020) for
  newly diagnosed AML in patients ≥75 years or those ineligible for intensive induction
  chemotherapy, regardless of BCL2 expression status. However, BCL2 protein overexpression
  and specific co-mutations (IDH1/2, NPM1) are strong predictors of venetoclax response.
  VIALE-A trial (DiNardo et al. NEJM 2020 — venetoclax + azacitidine vs azacitidine):
  mOS 14.7 vs 9.6 mo (HR 0.66, p<0.001); CR/CRi rate 66.4% vs 28.3%. BCL2 IHC high-expressors
  had superior outcomes in retrospective VIALE-A subanalyses. Molecular co-mutation context:
  NPM1-mutated AML: CR ~75% with ven+aza; IDH2-mutated: CR ~67%; IDH1-mutated: CR ~57%;
  TP53-mutated: CR ~40% (inferior). AML with t(8;21) or inv(16) (CBF-AML): poor ven response —
  avoid ven+aza in favor of intensive 7+3 + GO when fit. ESCAT IIB reflects that BCL2 IHC
  alone is not a mandated companion diagnostic — clinical eligibility criteria (age/fitness)
  are the primary drivers; BCL2 overexpression adds predictive value in molecular context.
evidence_summary_ua: >
  Венетоклакс (venetoclax) (інгібітор BCL2) + азацитидин (azacitidine) або децитабін
  (decitabine) схвалений FDA (жовтень 2020) для вперше діагностованого ГМЛ у пацієнтів
  ≥75 років або тих, хто не може отримати інтенсивну індукційну хіміотерапію, незалежно
  від статусу BCL2. Водночас гіперекспресія BCL2 та специфічні ко-мутації (IDH1/2, NPM1)
  є потужними предикторами відповіді на венетоклакс.
  Дослідження VIALE-A (DiNardo та ін., NEJM 2020 — венетоклакс + азацитидин проти
  азацитидину): медіана загальної виживаності 14.7 проти 9.6 міс (HR 0.66, p<0.001);
  частота CR/CRi 66.4% проти 28.3%. Пацієнти з високою експресією BCL2 за IHC
  демонстрували кращі результати в ретроспективних підгрупових аналізах VIALE-A.
  Контекст молекулярних ко-мутацій: NPM1-мутований ГМЛ — CR ~75% при ven+aza;
  IDH2-мутований — CR ~67%; IDH1-мутований — CR ~57%; TP53-мутований — CR ~40%
  (гірші результати). ГМЛ з t(8;21) або inv(16) (CBF-AML): погана відповідь на ven —
  слід уникати ven+aza на користь інтенсивного 7+3 + GO у придатних пацієнтів.
  ESCAT IIB відображає те, що BCL2 IHC окремо не є обов'язковим супутнім діагностичним
  тестом — первинними критеріями є вік/фізичний стан; гіперекспресія BCL2 додає
  предиктивну цінність у молекулярному контексті.
notes_ua: >
  ESCAT IIB: гіперекспресія BCL2 є предиктивним маркером збагачення, не обов
  язковим супутнім діагностичним тестом для схвалення венетоклаксу при ГМЛ. Критеріями
  відбору є вік (≥75) або непридатність до інтенсивної хіміотерапії. BCL2 IHC або
  проточна цитометрія (flow cytometry) додають предиктивну інформацію. Синдром
  лізису пухлини — профілактика є обов язковою: ступінчасте підвищення дози
  (20mg → 50mg → 100mg → 200mg → 400mg протягом 3 днів), агресивна гідратація,
  алопуринол/расбуриказа.
  Слід розрізняти лімфомні показання, де перебудова BCL2 (а не лише гіперекспресія)
  визначає рівень ESCAT — при ГМЛ відповідним біомаркером є саме експресія білка BCL2.
