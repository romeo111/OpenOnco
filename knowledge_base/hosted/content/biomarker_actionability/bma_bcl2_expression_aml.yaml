regulatory_approval:
  fda:
    - "venetoclax 400 mg/day PO (after 3-day ramp-up) + azacitidine 75 mg/m² or decitabine 20 mg/m² — newly diagnosed AML, age ≥75 or unfit for intensive induction (FDA Oct 2020; VIALE-A / VIALE-C)"
  ema:
    - "venetoclax + azacitidine — newly diagnosed AML in adults ≥75 or unfit for intensive chemotherapy (EMA 2021)"
  ukraine: []
recommended_combinations:
  - "venetoclax 400 mg/day PO + azacitidine 75 mg/m² SC/IV days 1-7 (28-day cycles; VIALE-A regimen — preferred)"
  - "venetoclax 400 mg/day PO + decitabine 20 mg/m² IV days 1-5 (28-day cycles; VIALE-C alternative)"
contraindicated_monotherapy:
  - "venetoclax monotherapy in AML (insufficient single-agent activity; HMA backbone required for sustained remissions)"
  - "venetoclax + azacitidine in CBF-AML (t(8;21) / inv(16)) — inferior to 7+3 + gemtuzumab ozogamicin in fit patients; avoid"
