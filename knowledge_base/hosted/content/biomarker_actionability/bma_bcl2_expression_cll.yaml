id: BMA-BCL2-EXPRESSION-CLL
biomarker_id: BIO-BCL2-EXPRESSION-IHC
variant_qualifier: BCL2 high expression (universal in CLL)
disease_id: DIS-CLL
escat_tier: IA
evidence_summary: 'CLL universally expresses BCL2 (no rearrangement needed; driven
  by miR-15/16 deletion at 13q14). Venetoclax-based fixed-duration (CLL14: VenO 1L;
  MURANO: VenR R/R) is FDA/EMA-approved and disease-defining as a target. Not biomarker-selected
  per se — BCL2 is a CLL-class marker.

  '
evidence_summary_ua: >
  ХЛЛ повсюдно експресує BCL2 (перебудова не потрібна; обумовлено делецією miR-15/16
  в локусі 13q14). Схеми на основі венетоклаксу з фіксованою тривалістю (CLL14:
  VenO перша лінія; MURANO: VenR рецидивний/рефрактерний) схвалені FDA та EMA і
  є визначальними з точки зору мішені захворювання. Окремий вибір на підставі
  біомаркера не проводиться — BCL2 є класовим маркером ХЛЛ.
notes_ua: >
  ESCAT IA. Профілактика синдрому лізису пухлини є обов язковою при ступінчастому
  підвищенні дози венетоклаксу.
