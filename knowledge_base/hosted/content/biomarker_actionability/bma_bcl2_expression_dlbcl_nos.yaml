id: BMA-BCL2-EXPRESSION-DLBCL-NOS
biomarker_id: BIO-BCL2-EXPRESSION-IHC
variant_qualifier: BCL2 high expression by IHC (without rearrangement; 'dual-expressor'
  if MYC IHC also high)
disease_id: DIS-DLBCL-NOS
escat_tier: IIIB
evidence_summary: 'High BCL2 IHC expression in DLBCL — common in GCB and ABC subsets.
  ''Dual-expressor'' (BCL2+MYC IHC ≥40-50% / ≥70%) is adverse but distinct from HGBL-DH
  (rearrangement-defined). Venetoclax + R-CHOP investigational (CAVALLI Ph2). Not
  biomarker-selected for venetoclax in DLBCL.

  '
evidence_summary_ua: >
  Висока експресія BCL2 за IHC при ДВКЛП (DLBCL) — поширена як у підтипах GCB,
  так і ABC. «Подвійний-експресор» (BCL2+MYC IHC ≥40–50% / ≥70%) є несприятливим
  прогностичним фактором, однак відрізняється від HGBL-DH (що визначається підтвердженою
  FISH перебудовою). Венетоклакс + R-CHOP є досліджуваною комбінацією (CAVALLI,
  фаза 2). Відбір на підставі BCL2-статусу для призначення венетоклаксу при ДВКЛП
  не встановлений.
notes_ua: >
  ESCAT IIIB. Слід відрізняти від HGBL-DH, для якого потрібна підтверджена FISH перебудова.
