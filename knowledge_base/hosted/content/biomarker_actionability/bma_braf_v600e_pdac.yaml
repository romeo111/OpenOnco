id: BMA-BRAF-V600E-PDAC
biomarker_id: BIO-BRAF-V600E
variant_qualifier: "V600E"
disease_id: DIS-PDAC
escat_tier: "IIIA"
oncokb_level: "3A"
evidence_summary: >
  BRAF V600E in PDAC (~1-3%, often in KRAS-WT subset). Tissue-
  agnostic dabrafenib + trametinib (FDA 2022) approved for
  unresectable/metastatic V600E solid tumors after prior therapy.
  Consider after FOLFIRINOX failure in BRAF V600E PDAC.
regulatory_approval:
  fda:
    - "dabrafenib + trametinib — tissue-agnostic V600E (FDA 2022)"
  ema:
    - "dabrafenib + trametinib — V600E solid tumors (EMA 2023)"
  ukraine: []
recommended_combinations:
  - "dabrafenib + trametinib (post-1L, tissue-agnostic)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-PANCREATIC-2025
  - SRC-ESMO-PANCREATIC-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIIA. KRAS-WT PDAC subset enriched for actionable drivers (BRAF, NTRK, NRG1, FGFR2).
