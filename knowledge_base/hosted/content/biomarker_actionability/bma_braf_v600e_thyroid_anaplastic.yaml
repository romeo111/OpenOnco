id: BMA-BRAF-V600E-THYROID-ANAPLASTIC
biomarker_id: BIO-BRAF-V600E
variant_qualifier: V600E (exon 15, kinase domain — present in ~25-50% of anaplastic
  thyroid carcinoma)
disease_id: DIS-THYROID-ANAPLASTIC
escat_tier: IA
evidence_summary: 'BRAF V600E in anaplastic thyroid carcinoma (ATC, ~25-50% of cases):
  dabrafenib + trametinib has tumor-agnostic FDA approval for BRAF V600E unresectable/metastatic
  disease and is preferred 1L for V600E-mutant ATC per SRC-NCCN-THYROID-2025. The
  pivotal ROAR basket trial (Subbiah JCO 2018 — ATC cohort ORR 69%, mOS ~14 mo, dramatic
  response in a historically rapid-fatal disease — historical mOS ~5 mo) drove the
  2018 FDA accelerated approval (full conversion 2022 with pan-cancer broadening).
  Consider neoadjuvant dabrafenib+trametinib to enable surgery in initially unresectable
  V600E ATC per SRC-NCCN-THYROID-2025.

  '
evidence_summary_ua: >
  BRAF V600E при анапластичній карциномі щитоподібної залози (ATC, ~25–50%
  випадків): дабрафеніб (dabrafenib) + траметиніб є переважним препаратом
  1-ї лінії при V600E-мутантній ATC відповідно до SRC-NCCN-THYROID-2025 та має
  пухлино-агностичне схвалення FDA для BRAF V600E-позитивних нерезектабельних/
  метастатичних солідних пухлин. Ключове дослідження ROAR (Subbiah та ін., JCO 2018
  — когорта ATC: ORR 69%, mOS ~14 міс.; для порівняння — исторична mOS ~5 міс.)
  обгрунтувало прискорене схвалення FDA у 2018 р. з повним перетворенням у 2022 р.
  Неоад'ювантне застосування дабрафенібу + траметинібу рекомендоване для перведення
  початково нерезектабельної ATC у резектабельний стан.
notes_ua: >
  ESCAT IA. ATC є клінічною надзвичайною ситуацією — тестування на BRAF V600E
  слід ініціювати в день морфологічного підтвердження діагнозу (протокол "RAID"
  за SRC-NCCN-THYROID-2025). Механізми резистентності: реактивація MEK, альтернативні
  ізоформи MAPK; потрійна комбінація з анти-PD-1 (ATLEP) є експериментальною.
  Примітка: SRC-ROAR-SUBBIAH-2018 (когорта ATC) ще не включено до бази знань.
