regulatory_approval:
  fda:
  - dabrafenib + trametinib — locally advanced/metastatic BRAF V600E ATC (FDA accelerated
    2018)
  - dabrafenib + trametinib — solid tumors with BRAF V600E (FDA tumor-agnostic 2022)
  ema:
  - dabrafenib + trametinib — BRAF V600E ATC (EMA approved 2020)
  ukraine: []
recommended_combinations:
- dabrafenib + trametinib (1L V600E ATC per SRC-NCCN-THYROID-2025)
- neoadjuvant dabrafenib + trametinib → surgery → adjuvant systemic ± RT (initially
  unresectable, per SRC-NCCN-THYROID-2025)
contraindicated_monotherapy:
- BRAF inhibitor monotherapy (paradoxical MAPK activation; combination with MEK inhibitor
  required per SRC-NCCN-THYROID-2025)
primary_sources:
