id: BMA-BRCA1-SOMATIC-BREAST
biomarker_id: BIO-HRR-PANEL
variant_qualifier: "BRCA1 somatic loss-of-function"
disease_id: DIS-BREAST
escat_tier: "IB"
oncokb_level: "2"
evidence_summary: >
  Somatic BRCA1 loss-of-function in HER2-negative metastatic breast: TBCRC-048
  (Tung 2020) showed talazoparib activity in sBRCA tumors (ORR ~31%). PARPi
  labels in breast are formally germline-only (gBRCAm); somatic tumors treated
  off-label or via NCCN extrapolation. ESCAT IB / OncoKB Level 2.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "talazoparib monotherapy (off-label, NCCN-listed)"
  - "olaparib monotherapy (off-label)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-BREAST-2025
  - SRC-ESMO-BREAST-METASTATIC-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  Off-label PARPi use; reflex germline testing recommended. Distinguish BRCA1
  promoter methylation (epigenetic, also actionable) from somatic mutation.
