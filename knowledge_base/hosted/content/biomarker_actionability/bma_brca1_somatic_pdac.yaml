evidence_summary: >
  Somatic BRCA1 loss-of-function in metastatic PDAC: POLO trial restricted to
  germline; somatic data limited but smaller series suggest similar PARPi
  sensitivity. NCCN allows PARPi consideration off-label in sBRCA PDAC. ESCAT
  IIA / OncoKB Level 3A.
