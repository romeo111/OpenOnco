id: BMA-BRCA2-GERMLINE-MELANOMA
biomarker_id: BIO-BRCA1-BRCA2-GERMLINE
variant_qualifier: BRCA2 germline pathogenic
disease_id: DIS-MELANOMA
escat_tier: IIIA
evidence_summary: 'BRCA2 germline pathogenic confers ~2-3× elevated cutaneous melanoma
  risk and uveal-melanoma association; no melanoma-specific PARPi indication exists.
  Standard melanoma therapy (BRAF/MEKi or ICI) per usual algorithm. PARPi only in
  clinical-trial context. ESCAT IIIA / OncoKB Level 3B.

  '
evidence_summary_ua: >
  Герміногенна патогенна мутація BRCA2 підвищує ризик шкірної меланоми у ~2–3 рази
  та асоціюється з увеальною меланомою; специфічних показань до PARPi при меланомі
  не існує. Стандартна терапія меланоми (BRAFi+MEKi або ICI) проводиться за
  звичайним алгоритмом без зміни підходу. PARPi — лише в рамках клінічних досліджень.
  ESCAT IIIA.
notes_ua: >
  Герміногенна знахідка потребує каскадного тестування родичів — підвищені ризики
  раку молочної залози, яєчників, передміхурової залози та підшлункової залози
  незалежно від наявності меланоми. Рекомендоване посилене дерматологічне спостереження.
