id: BMA-BRIP1-GERMLINE-BREAST
biomarker_id: BIO-HRR-PANEL
variant_qualifier: BRIP1 germline pathogenic
disease_id: DIS-BREAST
escat_tier: IIIA
evidence_summary: 'BRIP1 germline pathogenic and breast cancer: weak/uncertain risk
  association (NCCN does not currently recommend enhanced breast surveillance based
  on BRIP1 alone). No PARPi indication. ESCAT IIIA / OncoKB Level 3B.

  '
evidence_summary_ua: >
  Герміногенна патогенна мутація BRIP1 та рак молочної залози: слабка/невизначена
  асоціація ризику; NCCN не рекомендує посиленого нагляду за молочною залозою
  виключно на підставі BRIP1. Показань до PARPi немає. ESCAT IIIA.
notes_ua: >
  Каскадне тестування рекомендоване для оцінки оваріального ризику (більш
  стабільна асоціація BRIP1 з раком яєчників).
