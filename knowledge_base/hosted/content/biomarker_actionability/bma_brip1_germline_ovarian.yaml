id: BMA-BRIP1-GERMLINE-OVARIAN
biomarker_id: BIO-HRR-PANEL
variant_qualifier: BRIP1 germline pathogenic
disease_id: DIS-OVARIAN
escat_tier: IIA
evidence_summary: 'BRIP1 (FANCJ) germline pathogenic in EOC: established moderate-risk
  gene (~RR 3-5); included in HRR panels and HRD-positive PARPi trial subgroups. NCCN
  includes BRIP1 in PARPi-eligible HRR list. ESCAT IIA / OncoKB Level 3A.

  '
evidence_summary_ua: >
  Герміногенна патогенна мутація BRIP1 (FANCJ) при епітеліальній карциномі
  яєчників: встановлений ген помірного ризику (~RR 3–5); включений до панелей
  HRR та підгруп HRD-позитивних клінічних досліджень PARPi. NCCN включає BRIP1
  до переліку HRR-придатних для PARPi. ESCAT IIA.
notes_ua: >
  Каскадне тестування рекомендоване за NCCN. Підвищений ризик раку молочної
  залози у родичів є помірним. При HRD-позитивному статусі — розгляд
  нірапарибу (niraparib) або олапарибу (olaparib) + бевацизумаб (bevacizumab).
