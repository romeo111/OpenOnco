id: BMA-CALR-PMF
biomarker_id: BIO-CALR
variant_qualifier: exon 9 indels — type-1/type-1-like (52-bp deletion) and type-2/type-2-like
  (5-bp insertion); ~25% of primary myelofibrosis
disease_id: DIS-PMF
escat_tier: IA
evidence_summary: 'CALR exon 9 indels are the second most common driver in PMF (~25%)
  and a WHO 2022 / ICC 2022 major diagnostic criterion in JAK2/MPL- negative cases
  (per SRC-NCCN-MPN-2025, SRC-ESMO-MPN-2015). CALR type-1 mutation in PMF is associated
  with better OS and lower leukemic transformation risk than JAK2 V617F or triple-negative
  PMF, integrated into MIPSS70+v2 risk model. Treatment is genotype- agnostic JAK-inhibitor
  therapy by symptom / risk score: ruxolitinib for symptomatic intermediate-2/high-risk
  (COMFORT-I extends to all driver genotypes); fedratinib for ruxolitinib failure
  (JAKARTA2); momelotinib for anemic patients (MOMENTUM); allogeneic HCT for transplant-eligible
  higher-risk patients per SRC-NCCN-MPN-2025.

  '
evidence_summary_ua: >
  Інделі в екзоні 9 CALR є другою за частотою мутацією-драйвером при ПМФ (~25%)
  та основним діагностичним критерієм WHO 2022 / ICC 2022 у JAK2/MPL-негативних
  випадках (SRC-NCCN-MPN-2025, SRC-ESMO-MPN-2015). Мутація CALR типу-1 при ПМФ
  асоціюється з кращою загальною виживаністю та нижчим ризиком лейкемічної
  трансформації порівняно з JAK2 V617F або тричі негативним ПМФ; враховується
  у прогностичній моделі MIPSS70+v2. Лікування є генотип-агностичним за допомогою
  JAK-інгібіторів залежно від симптоматики та балу ризику: руксолітиніб (ruxolitinib)
  при симптоматичній проміжній-2/високій стадії (COMFORT-I охоплює всі генотипи
  драйверних мутацій); федратиніб (fedratinib) після невдачі руксолітинібу (JAKARTA2);
  момелотиніб (momelotinib) для пацієнтів з анемією (MOMENTUM); алогенна
  трансплантація гемопоетичних стовбурових клітин для придатних до трансплантації
  пацієнтів з вищими групами ризику.
notes_ua: >
  ESCAT IA — діагностичний критерій та прогностичний маркер (SRC-NCCN-MPN-2025).
  JAK-інгібітори блокують низхідну JAK-STAT сигналізацію незалежно від
  мутації-драйвера (CALR, JAK2, MPL). CALR тип-1 є сприятливим прогностичним
  фактором у MIPSS70+v2.
