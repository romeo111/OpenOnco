id: BMA-CCND1-IHC-MCL
biomarker_id: BIO-CCND1-IHC
variant_qualifier: cyclin D1 IHC (universal in MCL; defines diagnosis with t(11;14)
  FISH)
disease_id: DIS-MCL
escat_tier: IA
evidence_summary: 'Cyclin D1 IHC is a defining diagnostic marker of MCL (positive
  in >95%; SOX11 used in cyclin D1-negative variant). Drives DIS-MCL diagnosis but
  does not ''select'' therapy independently of t(11;14).

  '
evidence_summary_ua: >
  Циклін D1 (IHC) є визначальним діагностичним маркером для встановлення
  діагнозу DIS-MCL (позитивний у >95% випадків; SOX11 використовується при
  циклін D1-негативному варіанті). Не визначає вибір терапії незалежно від
  t(11;14). ESCAT IA.
notes_ua: >
  ESCAT IA — захворювання-визначальний діагностичний маркер. Лікування визначається
  алгоритмом MCL (BTKi-центровані схеми); циклін D1 IHC самостійно не змінює
  вибір режиму.
