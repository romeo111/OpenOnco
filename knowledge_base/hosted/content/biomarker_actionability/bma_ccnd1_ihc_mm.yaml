id: BMA-CCND1-IHC-MM
biomarker_id: BIO-CCND1-IHC
variant_qualifier: CCND1 expression / cyclin D1 IHC (often surrogate for t(11;14))
disease_id: DIS-MM
escat_tier: IIA
evidence_summary: 'CCND1 (cyclin D1) overexpression in MM strongly correlates with
  t(11;14) and BCL2 dependence — predicts venetoclax response. Used as surrogate when
  FISH unavailable.

  '
evidence_summary_ua: >
  Гіперекспресія CCND1 (циклін D1) при ММ тісно корелює з t(11;14) та
  BCL2-залежністю — прогнозує відповідь на венетоклакс (venetoclax).
  Використовується як сурогатний маркер при відсутності FISH. ESCAT IIA.
notes_ua: >
  ESCAT IIA. Перевага FISH t(11;14) перед IHC CCND1 при наявності; IHC CCND1
  є прийнятним сурогатом. При підтвердженій t(11;14) або CCND1 IHC+ —
  розгляд венетоклакс + дексаметазон поза інструкцією.
