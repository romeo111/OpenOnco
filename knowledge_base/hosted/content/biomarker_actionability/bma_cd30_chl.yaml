id: BMA-CD30-CHL
biomarker_id: BIO-CD30-IHC
variant_qualifier: CD30 expression on Reed-Sternberg / Hodgkin cells (~100% positive
  by IHC — defining feature of classical Hodgkin lymphoma)
disease_id: DIS-CHL
escat_tier: IA
evidence_summary: 'CD30 is universally expressed on Reed-Sternberg cells in classical
  Hodgkin lymphoma and is the target of brentuximab vedotin (BV), an anti-CD30 antibody-drug
  conjugate (auristatin payload). 1L advanced- stage cHL: A+AVD (BV + doxorubicin/vinblastine/dacarbazine)
  is preferred over ABVD per ECHELON-1 (Ansell NEJM 2022 — 6y OS 93.9% vs 89.4%, HR
  0.59) per SRC-NCCN-BCELL-2025, SRC-ESMO-HODGKIN-2024. Pediatric AHOD1331 supported
  BV + AVE-PC for high-risk pediatric. R/R cHL: BV monotherapy and BV + nivolumab
  are standard pre-/post- HCT options. BV consolidation post-autoHCT for high-risk
  R/R cHL (AETHERA Younes Lancet 2015 — improves PFS) per SRC-NCCN-BCELL-2025.

  '
evidence_summary_ua: >
  CD30 є універсально позитивним на клітинах Рід-Штернберга при класичній лімфомі
  Ходжкіна та є мішенню брентуксимабу ведотину (brentuximab vedotin, BV) —
  кон'югату анти-CD30 антитіло-ауристатин. У 1-й лінії поширеної cHL: A+AVD
  (BV + доксорубіцин/вінбластин/дакарбазин) є переважним над ABVD (ECHELON-1,
  Ansell NEJM 2022 — 6-річна загальна виживаність 93.9% проти 89.4%, HR 0.59;
  SRC-NCCN-BCELL-2025, SRC-ESMO-HODGKIN-2024). При педіатричній cHL: AHOD1331
  підтримує BV + AVE-PC для пацієнтів з високим ризиком. При рецидивній/рефрактерній
  cHL: монотерапія BV та BV + ніволумаб (nivolumab) є стандартними варіантами
  до/після аутоТГСК. Консолідація BV після аутоТГСК при cHL з високим ризиком
  (AETHERA, Younes Lancet 2015 — покращує ВБП).
notes_ua: >
  ESCAT IA. CD30 IHC є універсально позитивним при cHL, тому біомаркер є
  радше гістологічним підтвердженням, ніж порогом відбору для класу препаратів.
  Ключові джерела: SRC-ECHELON-1, SRC-AETHERA, SRC-CHECKMATE-744 ще не включені
  до бази знань. BV + блеоміцин протипоказаний (легенева токсичність).
  Інгібітори контрольних точок (checkpoint inhibitor) (пембролізумаб (pembrolizumab)
  KEYNOTE-204, ніволумаб CheckMate-205) є альтернативними варіантами при
  рецидивній/рефрактерній cHL.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_03
draft_revision: 2
regulatory_approval:
  fda:
  - brentuximab vedotin — relapsed cHL post-autoHCT or in transplant-ineligible (FDA
    accelerated 2011, full)
  - brentuximab vedotin — consolidation post-autoHCT high-risk cHL (FDA approved 2015,
    AETHERA)
  - brentuximab vedotin + AVD — newly-diagnosed stage III/IV cHL (FDA approved 2018,
    ECHELON-1)
  ema:
  - brentuximab vedotin — relapsed/refractory cHL (EMA approved 2012)
  - brentuximab vedotin + AVD — 1L advanced cHL (EMA approved 2018)
  ukraine: []
recommended_combinations:
- A+AVD (brentuximab vedotin + AVD) — 1L stage III/IV cHL per SRC-NCCN-BCELL-2025,
  SRC-ESMO-HODGKIN-2024
- brentuximab vedotin + nivolumab — R/R cHL pre-/post-autoHCT per SRC-NCCN-BCELL-2025
- brentuximab vedotin consolidation post-autoHCT — high-risk R/R cHL per SRC-NCCN-BCELL-2025
contraindicated_monotherapy:
- brentuximab vedotin + bleomycin (pulmonary toxicity contraindication per ECHELON-1)
primary_sources:
