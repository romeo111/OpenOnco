id: BMA-CHEK1-SOMATIC-OVARIAN
biomarker_id: BIO-HRR-PANEL
variant_qualifier: CHEK1 somatic loss-of-function
disease_id: DIS-OVARIAN
escat_tier: IIIA
evidence_summary: 'Somatic CHEK1 loss-of-function in EOC: rare (<1%); included in
  some HRR panel definitions but evidence for PARPi benefit weaker than core HRR genes.
  NCCN HRR panel inclusion is variable. ESCAT IIIA / OncoKB Level 3B.

  '
evidence_summary_ua: >
  Соматична втрата функції CHEK1 при епітеліальній карциномі яєчників є рідкісною
  (<1%); включена до деяких визначень HRR-панелей, але доказова база щодо користі
  PARPi є значно слабшою порівняно з ключовими генами HRR (BRCA1/2, PALB2).
  Включення CHEK1 до HRR-панелі NCCN є варіабельним. ESCAT IIIA.
notes_ua: >
  Деякі HRR-панелі виключають CHEK1; рекомендоване підтвердження за допомогою
  комбінованого показника HRD. При HRD-позитивному статусі можна розглядати
  PARPi поза інструкцією.
