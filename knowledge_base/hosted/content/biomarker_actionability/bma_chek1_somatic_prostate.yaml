id: BMA-CHEK1-SOMATIC-PROSTATE
biomarker_id: BIO-HRR-PANEL
variant_qualifier: CHEK1 somatic loss-of-function
disease_id: DIS-PROSTATE
escat_tier: IIIA
evidence_summary: 'Somatic CHEK1 loss-of-function in mCRPC: rare; PROfound included
  CHEK1 in Cohort B but small sample. Olaparib FDA label includes CHEK1 in HRR list.
  ESCAT IIIA / OncoKB Level 3B.

  '
evidence_summary_ua: >
  Соматична втрата функції CHEK1 при мКРРПЗ є рідкісною; PROfound включав CHEK1
  до когорти B, але кількість зразків була малою. Ярлик FDA для олапарибу
  (olaparib) включає CHEK1 до переліку HRR-генів. ESCAT IIIA.
notes_ua: >
  Реєстрація EMA обмежена лише BRCA1/2. Олапариб можна розглядати за FDA
  HRR-ярлыком при виявленні соматичної втрати CHEK1, однак доказова база для
  цієї підгрупи є обмеженою.
