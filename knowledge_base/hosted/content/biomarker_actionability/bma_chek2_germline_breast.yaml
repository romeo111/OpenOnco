id: BMA-CHEK2-GERMLINE-BREAST
biomarker_id: BIO-HRR-PANEL
variant_qualifier: CHEK2 germline pathogenic
disease_id: DIS-BREAST
escat_tier: IIA
evidence_summary: 'CHEK2 germline pathogenic (e.g. 1100delC) confers ~2× breast-cancer
  risk; no PARPi activity demonstrated (TBCRC-048 CHEK2 cohort minimal response).
  Standard HR/HER2-directed therapy. ESCAT IIA (predisposition) / OncoKB Level 3A.

  '
evidence_summary_ua: >
  Герміногенна патогенна мутація CHEK2 (наприклад, 1100delC) підвищує ризик раку
  молочної залози у ~2 рази; активності PARPi не продемонстровано (когорта CHEK2
  у TBCRC-048: мінімальна відповідь). Лікування проводиться за стандартними
  протоколами для гормонорецептор-позитивного або HER2-позитивного РМЗ. ESCAT IIA.
notes_ua: >
  Каскадне тестування рекомендоване за NCCN. CHEK2 c.1100delC (засновницька
  мутація у Східноєвропейській популяції) є найпоширенішим патогенним варіантом.
  Двостороння мастектомія зазвичай не рекомендована (ризик нижчий, ніж при BRCA).
  Щорічний МРТ молочної залози з 40 років при підтвердженій CHEK2.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_03
draft_revision: 2
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
- standard breast therapy by subtype
- enhanced screening (annual MRI from age 40)
contraindicated_monotherapy:
- PARPi monotherapy (no demonstrated benefit)
primary_sources:
