- SRC-ESMO-BREAST-METASTATIC-2024
last_verified: '2026-04-27'
evidence_sources: []
actionability_review_required: true
notes: 'Cascade testing per NCCN. CHEK2 c.1100delC (Eastern European founder) is the
  most common pathogenic variant. Bilateral mastectomy not routinely recommended (risk
  lower than BRCA).

  '
