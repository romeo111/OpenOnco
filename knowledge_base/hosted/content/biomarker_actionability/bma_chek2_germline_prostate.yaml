id: BMA-CHEK2-GERMLINE-PROSTATE
biomarker_id: BIO-HRR-PANEL
variant_qualifier: CHEK2 germline pathogenic
disease_id: DIS-PROSTATE
escat_tier: IB
evidence_summary: 'CHEK2 germline pathogenic in mCRPC: included in PROfound Cohort
  B; olaparib FDA HRR label (post-NHA) includes CHEK2 (FDA), though EMA label restricts
  to BRCA1/2. ESCAT IB (FDA jurisdiction) / OncoKB Level 1.

  '
evidence_summary_ua: >
  Герміногенна патогенна мутація CHEK2 при мКРРПЗ: включена до когорти B
  PROfound; ярлик FDA для олапарибу (olaparib) (після НГА) включає CHEK2 до
  переліку HRR-генів, тоді як реєстрація EMA обмежується лише BRCA1/2. ESCAT IB
  (юрисдикція FDA).
notes_ua: >
  Каскадне тестування є обов'язковим. Носії CHEK2 мають підвищений ризик
  раку молочної залози у родичів жіночої статі. Талазопариб (talazoparib) +
  ензалутамід (enzalutamide) — альтернатива у 1-й лінії HRR-мутованого мКРРПЗ.
