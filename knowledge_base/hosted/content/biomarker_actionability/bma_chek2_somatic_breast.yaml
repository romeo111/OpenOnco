evidence_summary_ua: >
  Соматична мутація CHEK2 при раку молочної залози: мінімальна активність PARPi;
  лікування проводиться за стандартними підтип-орієнтованими протоколами. ESCAT IIIA.
notes_ua: >
  Рефлексне герміногенне тестування рекомендоване. Монотерапія PARPi не
  рекомендована через відсутність доведеної користі при соматичному CHEK2.
