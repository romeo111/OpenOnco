id: BMA-CLDN18-2-GASTRIC
biomarker_id: BIO-CLDN18-2
variant_qualifier: "≥75% of tumor cells with moderate-to-strong (2+/3+) membranous staining by VENTANA CLDN18 (43-14A) RxDx companion diagnostic"
disease_id: DIS-GASTRIC
escat_tier: IA
evidence_summary: >
  Zolbetuximab (anti-CLDN18.2 chimeric IgG1 mAb) + chemotherapy is FDA-approved (Oct 2024)
  for CLDN18.2-positive (≥75% 2+/3+ cells), HER2-negative, locally advanced unresectable or
  metastatic gastric/gastroesophageal junction (GEJ) adenocarcinoma, 1L. Two registrational
  phase III trials: SPOTLIGHT (Shah et al. Lancet 2023 — zolbetuximab + mFOLFOX6 vs mFOLFOX6;
  mOS 18.2 vs 15.5 mo, HR 0.75, p=0.0053; mPFS 10.6 vs 8.7 mo, HR 0.75) and GLOW (Lordick
  et al. Lancet Oncol 2023 — zolbetuximab + CAPOX vs CAPOX; mOS 14.4 vs 12.2 mo, HR 0.77,
  p=0.0053; mPFS 8.2 vs 6.8 mo, HR 0.68). CLDN18.2 prevalence: ~38% of HER2-negative
  metastatic gastric/GEJ adenocarcinomas meet the ≥75% 2+/3+ threshold. Companion diagnostic
  (VENTANA CLDN18 43-14A RxDx) required before initiation. Priority hierarchy when co-positive:
  HER2+ (TOGA/KEYNOTE-811) > MSI-H (KEYNOTE-859) > CLDN18.2+ (SPOTLIGHT/GLOW).
evidence_summary_ua: >
  Зольбетуксимаб (zolbetuximab) — анти-CLDN18.2 химерне IgG1 моноклональне антитіло — у
  комбінації з хіміотерапією схвалено FDA (жовтень 2024) для лікування CLDN18.2-позитивного
  (≥75% клітин 2+/3+), HER2-негативного місцево-поширеного нерезектабельного або метастатичного
  аденокарциноми шлунку / гастроезофагеального з єднання (GEJ) у 1-й лінії. Два реєстраційні
  дослідження фази III: SPOTLIGHT (Shah та ін., Lancet 2023 — зольбетуксимаб + mFOLFOX6;
  mOS 18.2 vs 15.5 міс., HR 0.75, p=0.0053; mPFS 10.6 vs 8.7 міс., HR 0.75) та GLOW (Lordick
  та ін., Lancet Oncol 2023 — зольбетуксимаб + CAPOX; mOS 14.4 vs 12.2 міс., HR 0.77,
  p=0.0053; mPFS 8.2 vs 6.8 міс., HR 0.68). Поширеність CLDN18.2: ~38% HER2-негативних
  метастатичних аденокарцином шлунку/GEJ відповідають порогу ≥75% 2+/3+. Обов язковий
  супутній діагностичний тест: VENTANA CLDN18 43-14A RxDx. Ієрархія при ко-позитивності:
  HER2+ (TOGA/KEYNOTE-811) > MSI-H (KEYNOTE-859) > CLDN18.2+ (SPOTLIGHT/GLOW).
notes_ua: >
  ESCAT IA. Два конкордантних рандомізованих дослідження фази III (SPOTLIGHT + GLOW) з
  перевагою у виживаності у CLDN18.2+ HER2-негативній підгрупі. Рефлекторне CLDN18.2 IHC
  тестування є категорією 1 NCCN для всіх новодіагностованих метастатичних випадків поряд з
  HER2, MSI та PD-L1 (SRC-NCCN-GASTRIC-2025, SRC-ESMO-GASTRIC-2024). Управління нудотою/блюванням:
  зольбетуксимаб характеризується вираженим профілем нудота/блювання — необхідна інтенсивна
  антиеметична профілактика, включаючи 5-HT3 + NK1-антагоніст + дексаметазон у День 1.
  Реєстрація EMA очікується (позитивний висновок прогнозується у 2025 р.; станом на 2026-05-03
  процедура розгляду тривала). Зольбетуксимаб не має даних реєстрації для монотерапії —
  хіміотерапевтична основа обов язкова.
