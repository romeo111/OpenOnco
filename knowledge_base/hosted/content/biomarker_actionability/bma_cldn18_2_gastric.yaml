notes: >
  ESCAT IA. Two concordant phase III RCTs (SPOTLIGHT + GLOW) with survival benefit in
  CLDN18.2+ HER2-negative subgroup. Companion diagnostic (VENTANA RxDx) FDA-cleared —
  reflex CLDN18.2 IHC testing now NCCN Category 1 for all newly diagnosed metastatic
  gastric/GEJ adenocarcinoma alongside HER2, MSI, PD-L1. N/V management (nausea/vomiting
  prominent AE profile for zolbetuximab — intensive antiemetic prophylaxis required including
  5-HT3 + NK1 antagonist + dexamethasone on Day 1). EMA approval pending as of 2026-05-03.
