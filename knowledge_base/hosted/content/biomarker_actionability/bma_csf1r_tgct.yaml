id: BMA-CSF1R-TGCT
biomarker_id: BIO-CSF1R
variant_qualifier: "CSF1R pathway activation — diffuse-type TGCT (COL6A3-CSF1 fusion OR CSF1 overexpression; pexidartinib indication does not require molecular confirmation of fusion)"
disease_id: DIS-TGCT
escat_tier: IA
evidence_summary: >
  Pexidartinib (PLX3397), a CSF1R/KIT/FLT3 inhibitor, is FDA-approved (August 2019) for
  adult patients with symptomatic tenosynovial giant cell tumor (TGCT) associated with
  severe morbidity or functional limitations not amenable to improvement with surgery.
  ILLUMINATE phase III trial (Tap et al., Lancet 2019): N=120 (pexidartinib vs placebo,
  crossover design); primary endpoint ORR at week 25 by RECIST 1.1 and TTP-MRI.
  ORR: 38% (RECIST) vs 0% placebo (p<0.0001); 56% by TTP-MRI vs 0%.
  mDOR: not reached at median 23.1 months follow-up. Clinical benefit rate: 56%.
  Safety: significant hepatotoxicity (cholestatic hepatitis, including one fatal case in
  open-label extension); ALT/AST elevations in ~51%; FDA REMS program mandatory.
  EMA approved for same indication (2020). No biomarker companion diagnostic required —
  all TGCT patients are eligible based on clinical criteria (symptomatic, surgery-resistant).
  CSF1R IHC or COL6A3-CSF1 fusion testing is not required for treatment initiation.
evidence_summary_ua: >
  Пексидартиніб (pexidartinib, PLX3397) — інгібітор CSF1R/KIT/FLT3 — схвалений FDA (серпень 2019)
  для дорослих пацієнтів із симптоматичною тенодиновіальною гігантоклітинною пухлиною (ТГКП),
  що супроводжується вираженою захворюваністю або функціональними обмеженнями та не може бути
  адекватно покращена хірургічним втручанням. Рандомізоване дослідження фази III ILLUMINATE
  (Tap та ін., Lancet 2019): N=120 (пексидартиніб проти плацебо, crossover design); ORR
  за RECIST 1.1 на тижні 25: 38% проти 0% (p<0.0001); за TTP-MRI: 56% проти 0%.
  Медіана тривалості відповіді: не досягнута при медіані спостереження 23.1 міс.
  Частота клінічної користі: 56%. Профіль безпеки: значна гепатотоксичність (холестатичний
  гепатит, включаючи один летальний випадок у відкритій фазі продовження); підвищення
  ALT/AST у ~51% пацієнтів; програма REMS FDA є обов язковою. EMA схвалило для тієї самої
  покази (2020 р.). Молекулярне підтвердження CSF1R не вимагається — усі пацієнти з ТГКП
  мають право на лікування за клінічними критеріями.
notes_ua: >
  ESCAT IA (FDA-схвалено, РКД фази III). Програма REMS: пексидартиніб відпускається лише
  через сертифіковані аптеки; призначальні лікарі мають бути зареєстровані у програмі
  (SRC-ILLUMINATE-TAP-2019, SRC-NCCN-SARCOMA, SRC-ESMO-SARCOMA-2024). Моніторинг
  гепатотоксичності: функціональні печінкові тести (ФПТ) на початку лікування, щотижнево
  протягом 8 тижнів, потім кожні 2-3 тижні протягом 2 місяців, потім щомісяця. За умови
  ALT/AST >5x ВМН — призупинити та повторно оцінити; за холестатичного патерну (підвищення
  ALP + білірубіну) — постійне припинення. Хірургічне втручання залишається першою лінією;
  пексидартиніб зарезервований для пацієнтів, у яких хірургія не може адекватно контролювати
  захворювання. Диференціація: агенти, спрямовані проти CSF1R для деплеції пухлиноасоційованих
  макрофагів (емактузумаб (emactuzumab), кабірілізумаб (cabiralizumab)), є дослідницькими
  для солідних пухлин — не схвалені.
