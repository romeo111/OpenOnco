notes: >
  ESCAT IA (FDA-approved, phase III RCT). REMS program: pexidartinib is dispensed only
  through certified pharmacies; prescribers must be enrolled. Hepatotoxicity monitoring:
  LFTs at baseline, weekly for 8 weeks, then every 2–3 weeks for 2 months, then monthly.
  If ALT/AST >5× ULN, hold and reassess; if cholestatic pattern (elevated ALP + bilirubin),
  discontinue permanently — one fatal cholestatic hepatitis case occurred in the open-label
  extension. Differentiate from other CSF1R-directed agents used for tumor-associated
  macrophage depletion (emactuzumab, cabiralizumab) which are investigational for solid
  tumors — those are off-label and not approved. Surgery remains first-line; pexidartinib
  is reserved for patients where surgery cannot adequately control disease.
