actionability_review_required: true
notes: >
  ESCAT IIB: CTNNB1 mutation is a validated prognostic biomarker in EC that modifies
  adjuvant treatment decisions for low-stage endometrioid disease. L1CAM IHC (>10%
  positive cells) is an acceptable surrogate if CTNNB1 molecular testing is unavailable
  — both identify the high-recurrence NSMP subgroup. Molecular classification workflow
  for all EC: (1) POLE mutation testing (ultramutated → best prognosis); (2) MMR IHC
  (dMMR → pembrolizumab); (3) p53 IHC (abnormal = serous-like → worst prognosis); (4)
  CTNNB1 exon 3 sequencing (NSMP high-risk reclassification). CTNNB1 mutation in the
  context of dMMR or p53-aberrant EC does not independently modify management — MMR and
  p53 status take precedence in those molecular classes.
