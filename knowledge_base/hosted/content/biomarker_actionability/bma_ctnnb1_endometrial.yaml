    note: "ESGO Endometrial 2025: CTNNB1 exon 3 mutation in NSMP EC upgrades risk classification; FIGO stage I CTNNB1-mutant → high-intermediate risk → chemotherapy consideration; L1CAM IHC surrogate acceptable if CTNNB1 testing unavailable."
