id: BMA-CTNNB1-ENDOMETRIAL
biomarker_id: BIO-CTNNB1
variant_qualifier: "CTNNB1 exon 3 activating mutation (S33C, S37F, T41A, S45P) in endometrial carcinoma; NSMP molecular class; associated with L1CAM overexpression and high recurrence risk despite low stage"
disease_id: DIS-ENDOMETRIAL
escat_tier: IIB
evidence_summary: >
  CTNNB1 exon 3 mutations occur in ~25–30% of endometrial carcinoma (EC), predominantly
  endometrioid histology within the NSMP (No Specific Molecular Profile) molecular class
  per TCGA/ESGO/ESMO classification. CTNNB1 mutation is a key risk-stratifier within
  NSMP/intermediate-risk EC: presence of CTNNB1 exon 3 mutation is associated with L1CAM
  (L1 cell adhesion molecule) overexpression, which is an independent predictor of
  lymphovascular invasion and distant metastasis even in FIGO stage I-II disease.
  PORTEC-3 subset analyses and ESGO/ESMO/ESTRO 2023 EC risk stratification:
  CTNNB1-mutant FIGO IA-IB endometrioid EC is reclassified to "high-intermediate risk"
  or "high risk" — warranting consideration of adjuvant chemotherapy (carboplatin/paclitaxel)
  rather than vaginal brachytherapy alone, which would be standard for low-risk NSMP.
  No CTNNB1-targeted therapy approved for EC. WNT pathway inhibitors (porcupine inhibitors
  such as WNT-974, OMP-54F28; tankyrase inhibitors) are in early-phase trials but not
  endometrial-specific. Nirogacestat (gamma-secretase inhibitor, FDA 2023 for desmoid tumor)
  targets Notch pathway with WNT pathway intersection but is not approved for EC.
evidence_summary_ua: >
  Мутації екзону 3 CTNNB1 виявляються у ~25-30% раку ендометрія (РЕ), переважно
  ендометріоїдної гістології в рамках молекулярного класу NSMP (без специфічного
  молекулярного профілю) згідно з класифікацією TCGA/ESGO/ESMO. Мутація CTNNB1 є
  ключовим стратифікатором ризику в межах NSMP/проміжного-ризику РЕ: наявність мутації
  екзону 3 CTNNB1 асоційована з надекспресією L1CAM (молекули L1 клітинної адгезії) —
  незалежного предиктора лімфоваскулярної інвазії та відділених метастазів навіть при
  FIGO I-II стадії. Аналізи підгруп PORTEC-3 та стратифікація ризику ESGO/ESMO/ESTRO 2023:
  CTNNB1-мутантний FIGO IA-IB ендометріоїдний РЕ перекласифіковується до категорії
  "проміжно-високого" або "високого ризику" — що потребує розгляду ад'ювантної хіміотерапії
  (карбоплатин/паклітаксел), а не лише вагінальної брахітерапії (VBT). Затвердженої
  CTNNB1-таргетної терапії для РЕ не існує. Інгібітори шляху WNT (інгібітори порцупіну:
  WNT-974, OMP-54F28; інгібітори танкірази) перебувають у дослідженнях ранніх фаз.
  Нірогацестат (nirogacestat) — інгібітор гамма-секретази, схвалений FDA 2023 для
  десмоїдної пухлини — не схвалений для РЕ.
notes_ua: >
  ESCAT IIB: мутація CTNNB1 є валідованим прогностичним біомаркером при РЕ, що модифікує
  рішення щодо ад'ювантного лікування при низькостадійному ендометріоїдному захворюванні.
  IHC L1CAM (>10% позитивних клітин) є прийнятним сурогатом, якщо молекулярне тестування
  CTNNB1 недоступне — обидва ідентифікують підгрупу NSMP з підвищеним ризиком рецидиву
  (SRC-NCCN-UTERINE-2025, SRC-ESGO-ENDOMETRIAL-2025, SRC-ESMO-ENDOMETRIAL-2022).
  Алгоритм молекулярної класифікації для всіх РЕ: (1) тестування мутацій POLE (ультрамутований
  → найкращий прогноз); (2) IHC MMR (dMMR → пембролізумаб (pembrolizumab)); (3) IHC p53
  (аберантний = серозноподібний → найгірший прогноз); (4) секвенування екзону 3 CTNNB1
  (перекласифікація NSMP до високого ризику). Мутація CTNNB1 в контексті dMMR або
  p53-аберантного РЕ не модифікує тактику самостійно — статус MMR і p53 мають пріоритет
  у цих молекулярних класах.
