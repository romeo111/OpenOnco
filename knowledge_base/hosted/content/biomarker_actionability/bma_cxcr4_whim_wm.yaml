id: BMA-CXCR4-WHIM-WM
biomarker_id: BIO-CXCR4-WHIM
variant_qualifier: CXCR4 WHIM-like nonsense / frameshift mutations (C-terminal truncation,
  e.g., S338X, R334X); ~30-40% of MYD88-L265P Waldenström macroglobulinemia
disease_id: DIS-WM
escat_tier: IB
evidence_summary: 'CXCR4 WHIM-like mutations co-occur in ~30-40% of MYD88-L265P Waldenström
  macroglobulinemia and confer relative resistance to ibrutinib (BTKi) — lower ORR
  and major-response rate, slower kinetics of IgM decline (Treon NEJM 2015 — initial
  cohort; Castillo Blood 2020 — confirmation) per SRC-NCCN-BCELL-2025, SRC-ESMO-WM-2024.
  CXCR4 status drives 1L therapy selection in WM: in CXCR4-mutated patients, guidelines
  list bendamustine + rituximab (BR) or proteasome-inhibitor- based regimens (BDR
  — bortezomib/dex/rituximab) as preferred over BTKi monotherapy; in CXCR4-WT patients,
  BTKi monotherapy (ibrutinib or zanubrutinib) is preferred. Mavorixafor (CXCR4 antagonist)
  has FDA orphan designation for WHIM but is investigational in WM.

  '
evidence_summary_ua: >
  CXCR4 WHIM-подібні мутації (нонсенс/зрушення рамки зчитування, усічення C-кінця,
  напр. S338X, R334X) виявляються у ~30-40% хворих на макроглобулінемію Вальденстрема (МВ)
  із MYD88-L265P і зумовлюють відносну резистентність до ібрутинібу (ibrutinib, BTKi) —
  нижча частота загальної відповіді та основної відповіді, повільніша кінетика зниження
  IgM (Treon та ін., NEJM 2015 — початкова когорта; Castillo та ін., Blood 2020 — підтвердження;
  SRC-NCCN-BCELL-2025, SRC-ESMO-WM-2024). Статус CXCR4 визначає вибір терапії 1-ї лінії
  при МВ: у пацієнтів із мутацією CXCR4 настанови надають перевагу бендамустину (bendamustine)
  + ритуксимабу (rituximab) (BR) або схемам на основі інгібіторів протеасоми (BDR —
  бортезоміб (bortezomib)/дексаметазон (dexamethasone)/ритуксимаб) над монотерапією BTKi;
  у пацієнтів із CXCR4 WT перевага — монотерапія BTKi (ібрутиніб або занубрутиніб
  (zanubrutinib)). Маворіксафор (mavorixafor, антагоніст CXCR4) має статус орфанного
  препарату FDA для WHIM, проте є дослідницьким при МВ.
notes_ua: >
  ESCAT IB / OncoKB рівень 3A (предиктор резистентності/модифікатор відповіді, а не
  пряма мішень для препарату). Виявлення: NGS-панель цільового секвенування (екзон 2
  C-кінцевої ділянки CXCR4). Пацієнти з одночасними мутаціями MYD88-L265P та CXCR4-WHIM
  мають вищий тягар захворювання (рівень IgM, інфільтрація кісткового мозку) згідно з
  SRC-NCCN-BCELL-2025. Занубрутиніб зберігає ефективність у підгрупі CXCR4-мутованих
  у дослідженні ASPEN (SRC-NCCN-BCELL-2025). Пробіл у джерелах: SRC-ASPEN, SRC-INNOVATE-WM
  ще не включені до бази знань.
