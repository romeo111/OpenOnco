recommended_combinations:
- bendamustine + rituximab (1L CXCR4-mutated WM per SRC-NCCN-BCELL-2025, SRC-ESMO-WM-2024)
- bortezomib + dexamethasone + rituximab (BDR, 1L CXCR4-mutated alternative per SRC-NCCN-BCELL-2025)
- zanubrutinib monotherapy (1L CXCR4-mutated alternative — preserved efficacy vs ibrutinib
  in CXCR4-mut subgroup of ASPEN trial per SRC-NCCN-BCELL-2025)
contraindicated_monotherapy:
- ibrutinib monotherapy as preferred 1L in CXCR4-mutated WM (slower / less complete
  response per SRC-ESMO-WM-2024 — alternative; not strict contraindication)
