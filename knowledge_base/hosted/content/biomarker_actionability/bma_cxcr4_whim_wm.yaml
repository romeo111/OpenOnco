notes: 'ESCAT IB / OncoKB Level 3A (predictive of resistance / response modifier rather
  than a direct drug target). Detection: NGS targeted panel (CXCR4 C-terminal exon
  2). Patients with both MYD88-L265P and CXCR4-WHIM mutation have higher disease burden
  (IgM, BM infiltration) per SRC-NCCN-BCELL-2025. Source-gap: SRC-ASPEN, SRC-INNOVATE-WM
  not yet ingested.

  '
