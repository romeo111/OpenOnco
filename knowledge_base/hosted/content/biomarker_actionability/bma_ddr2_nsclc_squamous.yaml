id: BMA-DDR2-NSCLC-SQUAMOUS
biomarker_id: BIO-DDR2
variant_qualifier: "DDR2 activating mutation in squamous cell NSCLC (~2–4%); investigational RTK target; dasatinib inhibits DDR2 but no approved DDR2-selected therapy"
disease_id: DIS-NSCLC
escat_tier: IIIB
evidence_summary: >
  DDR2 activating mutations are identified in ~2–4% of squamous cell carcinoma of the lung
  (enriched in squamous vs. adenocarcinoma). DDR2 signals via SRC and MAPK pathways; dasatinib
  (a BCR-ABL/SRC/KIT inhibitor) also inhibits DDR2 kinase. Clinical evidence:
  (1) Preclinical: DDR2 S768R-mutant lines sensitive to dasatinib in vitro; erlotinib not active.
  (2) Clinical (LUNG-MAP S1400D, NCT02154490): phase II umbrella trial with dasatinib for
      DDR2-mutant squamous NSCLC was closed early due to insufficient enrollment and limited
      signals; no significant ORR reported.
  (3) Case reports: isolated responses to dasatinib in DDR2-mutant squamous NSCLC (Hammerman
      et al. Cancer Discov 2011); no prospective validation.
  Standard of care for squamous NSCLC (regardless of DDR2 status): pembrolizumab ± carboplatin/
  nab-paclitaxel/paclitaxel (KEYNOTE-789/407) per PD-L1 and histology. DDR2 mutation does not
  modify treatment algorithm in current guidelines.
  ESCAT IIIB: prognostic/investigational marker with insufficient clinical evidence to guide
  therapy selection.
evidence_summary_ua: >
  Активуючі мутації DDR2 виявляються у ~2-4% плоскоклітинного раку легені (переважно у
  плоскоклітинному, а не аденокарциномі). DDR2 передає сигнали через шляхи SRC та MAPK;
  дазатиніб (dasatinib) — інгібітор BCR-ABL/SRC/KIT — також інгібує кіназу DDR2.
  Клінічні дані: (1) Доклінічні дані: клітинні лінії з мутацією DDR2 S768R чутливі до
  дазатинібу in vitro; ерлотиніб (erlotinib) неактивний. (2) Клінічне дослідження
  LUNG-MAP S1400D (NCT02154490): дослідження фази 2 дазатинібу при DDR2-мутантному
  плоскоклітинному НМРЛ закрито передчасно через недостатнє включення пацієнтів і
  обмежені сигнали; значущої частоти ORR не зафіксовано. (3) Клінічні випадки:
  поодинокі відповіді на дазатиніб при DDR2-мутантному плоскоклітинному НМРЛ
  (Hammerman та ін., Cancer Discov 2011); проспективного підтвердження немає. Стандарт
  лікування плоскоклітинного НМРЛ (незалежно від статусу DDR2): пембролізумаб (pembrolizumab)
  +/- карбоплатин/наб-паклітаксел/паклітаксел (KEYNOTE-789/407) відповідно до PD-L1
  та гістології. Мутація DDR2 не модифікує алгоритм лікування в чинних настановах. ESCAT IIIB.
notes_ua: >
  ESCAT IIIB: мутація DDR2 у плоскоклітинному НМРЛ є дослідницькою мішенню без
  затвердженої терапії. Клінічно важливі відмінності: (1) DDR2 відсутній у стандартному
  переліку обов язкових NCCN біомаркерів для НМРЛ (EGFR, ALK, ROS1, BRAF, KRAS, MET,
  RET, NTRK, PD-L1, TMB); NGS-панелі можуть виявляти його випадково (SRC-NCCN-NSCLC-2025,
  SRC-ESMO-NSCLC-METASTATIC-2024). (2) Інгібітори SRC (дазатиніб) мають дозообмежуючу
  токсичність (затримка рідини, плевральний випіт) при дозах, необхідних для інгібування
  DDR2 у солідних пухлинах. (3) Для DDR2-мутованих пацієнтів, які прогресували на
  стандартній терапії, рекомендується включення у кошикове дослідження з DDR2-таргетуванням.
  (4) Мутація DDR2 при КРР або раку молочної залози не має встановленого клінічного значення.
