id: BMA-DDR2-NSCLC-SQUAMOUS
biomarker_id: BIO-DDR2
variant_qualifier: "DDR2 activating mutation in squamous cell NSCLC (~2–4%); investigational RTK target; dasatinib inhibits DDR2 but no approved DDR2-selected therapy"
disease_id: DIS-NSCLC
escat_tier: IIIB
evidence_summary: >
  DDR2 activating mutations are identified in ~2–4% of squamous cell carcinoma of the lung
  (enriched in squamous vs. adenocarcinoma). DDR2 signals via SRC and MAPK pathways; dasatinib
  (a BCR-ABL/SRC/KIT inhibitor) also inhibits DDR2 kinase. Clinical evidence:
  (1) Preclinical: DDR2 S768R-mutant lines sensitive to dasatinib in vitro; erlotinib not active.
  (2) Clinical (LUNG-MAP S1400D, NCT02154490): phase II umbrella trial with dasatinib for
      DDR2-mutant squamous NSCLC was closed early due to insufficient enrollment and limited
      signals; no significant ORR reported.
  (3) Case reports: isolated responses to dasatinib in DDR2-mutant squamous NSCLC (Hammerman
      et al. Cancer Discov 2011); no prospective validation.
  Standard of care for squamous NSCLC (regardless of DDR2 status): pembrolizumab ± carboplatin/
  nab-paclitaxel/paclitaxel (KEYNOTE-789/407) per PD-L1 and histology. DDR2 mutation does not
  modify treatment algorithm in current guidelines.
  ESCAT IIIB: prognostic/investigational marker with insufficient clinical evidence to guide
  therapy selection.
evidence_summary_ua: >
  Мутації DDR2 у ~2–4% плоскоклітинного НМРЛ. Дазатиніб інгібує DDR2; поодинокі відповіді
  у клінічних прикладах (Hammerman 2011). LUNG-MAP S1400D закрито через відсутність значущих
  результатів. Стандарт — хіміоімунотерапія незалежно від DDR2-статусу. ESCAT IIIB.
