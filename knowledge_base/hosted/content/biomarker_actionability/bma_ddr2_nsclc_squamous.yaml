notes: >
  ESCAT IIIB: DDR2 mutation in squamous NSCLC is an investigational target with no approved
  therapy. Clinically important distinctions:
  (1) DDR2 is not in standard NCCN-required biomarker testing (EGFR, ALK, ROS1, BRAF, KRAS,
      MET, RET, NTRK, PD-L1, TMB); NGS panels may detect it incidentally.
  (2) SRC inhibitors (dasatinib) have dose-limiting toxicity (fluid retention, pleural effusion)
      at doses needed for DDR2 inhibition in solid tumors.
  (3) For DDR2-mutant patients who have progressed on standard therapy, enrollment in a
      DDR2-targeting basket trial is the recommended approach.
  (4) DDR2 mutation in CRC or breast cancer has no established clinical significance.
