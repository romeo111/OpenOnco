    significance: Sensitivity/Response
    note: "NCCN NSCLC 2025: DDR2 mutation is not in the NCCN required biomarker panel for squamous NSCLC; standard chemoimmunotherapy applies regardless of DDR2 status; clinical trial referral for DDR2-mutant squamous NSCLC is appropriate."
  - source: SRC-ESMO-NSCLC-METASTATIC-2024
