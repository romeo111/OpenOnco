last_verified: "2026-05-07"
evidence_sources:
  - source: SRC-TCGA-GASTRIC-BASS-2014
    level: "Tier 1 (landmark molecular classification)"
    direction: Supports
    significance: "Subtype definition / molecular biology"
    note: >
      TCGA Nature 2014 (n=295): defines EBV-positive gastric
      adenocarcinoma (~9%) as a discrete molecular subtype with
      recurrent PIK3CA / ARID1A mutations, CDKN2A silencing, and
      JAK2 / PD-L1 / PD-L2 amplification at 9p24.1. Canonical
      primary citation for the EBV+ subtype biology underpinning
      this BMA.
  - source: SRC-KIM-PEMBRO-EBV-NATMED-2018
    level: "Tier 2 (single-arm phase 2)"
    direction: Supports
    significance: "ICI response signal in EBV+ subset"
    note: >
      Kim et al. Nature Medicine 2018 (n=61, salvage pembrolizumab):
      EBV+ subset ORR 100% (6/6); MSI-H ORR 85.7%. Small EBV+ cohort
      and single-center design — hypothesis-generating, not
      practice-changing on its own, but the canonical primary citation
      for the exceptional ICI response signal in EBV+ gastric.
  - source: SRC-KEYNOTE-061-SHITARA-2018
    level: "Tier 1 (parent randomised phase 3)"
    direction: Context
    significance: "Parent trial citation; EBV+ subset analysis pending"
    note: >
      Shitara et al. Lancet 2018 (KEYNOTE-061; PMID 29880231) —
      pembrolizumab vs paclitaxel as 2L gastric/GEJ adenocarcinoma
      after platinum/fluoropyrimidine failure. Cited here as the
      parent randomised trial; the EBV+ subset analysis (Janjigian
      et al.) is still pending source-ingestion and is not used to
      support an EBV-specific claim in this BMA. No EBV-specific
      subset claim is made on the basis of this citation alone.
  - source: SRC-NCCN-GASTRIC-2025
    level: "Category 2B"
    direction: Supports
    significance: "Subtype-stratification / explanatory"
    note: >
      NCCN gastric v2025: EBER-ISH listed as optional molecular
      characterization for gastric adenocarcinoma. Treatment selection
      not yet mandated by EBV status; ICI hierarchy follows MSI / PD-L1
      CPS; EBV+ identification is supportive context.
  - source: SRC-ESMO-GASTRIC-2024
    level: C
    direction: Supports
    significance: "Subtype-stratification / explanatory"
    note: >
      ESMO Gastric / GEJ 2024: EBV-positive subtype mentioned as
      molecular feature with high PD-L1 association; not a primary
      treatment-selection biomarker but contextual when ICI benefit
      assessment is uncertain.
actionability_review_required: true
notes: >
  ESCAT IIIA — explanatory / subtype-routing biomarker; not
  treatment-selecting on its own. Primary citations now include the
  TCGA gastric classification paper (Bass et al., Nature 2014) and
  Kim et al. Nature Medicine 2018 (pembrolizumab response in EBV+
  metastatic gastric). NCCN gastric v2025 and ESMO gastric 2024 retained
  as guideline corroboration. KEYNOTE-061 EBV+ subset analysis
  (Janjigian) is still pending source-ingestion; the parent trial
  KN-061 is now cited as Shitara 2018 Lancet (PMID 29880231) for
  context, but no EBV-specific subset claim is asserted on the basis
  of that citation. Co-positivity with MSI-H, PD-L1
  CPS+, HER2+ is mostly mutually exclusive (EBV+ rarely overlaps with
  MSI-H — both confer immunogenicity through different mechanisms);
  HER2+ and EBV+ cooccur in <2% of cases. NOT a 1L-routing biomarker
  in current OpenOnco algorithm; documented for clinician context and
  for future ICI-prioritization rule when phase 3 EBV-stratified data
  emerges. Engine routing intentionally does not fire on this BMA
  alone; it is consumed by the render layer for explanatory display.
