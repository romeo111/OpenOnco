id: BMA-EBV-POSITIVE-GASTRIC
biomarker_id: BIO-EBV-STATUS
variant_qualifier: "EBV-positive gastric adenocarcinoma by EBER in-situ hybridization on tumor tissue (TCGA molecular subtype EBV; ~9% of gastric adenocarcinoma)"
disease_id: DIS-GASTRIC
escat_tier: IIIA
evidence_summary: >
  EBV-positive gastric adenocarcinoma is a TCGA-defined molecular subtype
  (~9% of gastric adenocarcinoma; Cancer Genome Atlas Research Network,
  Nature 2014) characterized by recurrent PIK3CA mutations (~80%), ARID1A
  mutations (~55%), CDKN2A silencing, JAK2 / PD-L1 / PD-L2 amplification
  at 9p24.1, and elevated tumor PD-L1 expression. Clinically, EBV+
  gastric tumors show high PD-L1 expression (CPS ≥1 in >90%) and exceptional
  response signals to immune-checkpoint inhibitors (pembrolizumab single-agent
  ORR ~33% in EBV+ vs ~12% in EBV-negative in small cohorts: Kim et al.
  Nature Medicine 2018; Janjigian KEYNOTE-061 EBV+ subset analysis).
  Functions primarily as a SUBTYPE ROUTER / EXPLANATORY biomarker in the
  current KB — it identifies a population highly likely to derive ICI
  benefit independent of CPS thresholding. Standard 1L treatment selection
  remains driven by HER2 / MSI / CLDN18.2 / PD-L1 CPS hierarchy; EBV+
  status reinforces ICI rationale where CPS-driven indications already
  apply, and is hypothesis-generating for ICI consideration in CPS<5
  patients (off-label / trial). Routine EBV testing is NOT yet a guideline
  requirement (NCCN gastric v2025 lists EBER-ISH as an option not a
  mandate); reflex testing is increasing in academic centers.
evidence_summary_ua: >
  EBV-позитивна аденокарцинома шлунка — TCGA-визначений молекулярний
  підтип (~9% аденокарциноми шлунка; Cancer Genome Atlas Research
  Network, Nature 2014), що характеризується частими мутаціями PIK3CA
  (~80%), ARID1A (~55%), сайленсингом CDKN2A, ампліфікацією JAK2 /
  PD-L1 / PD-L2 на 9p24.1 та підвищеною пухлинною експресією PD-L1.
  Клінічно EBV+ пухлини шлунка демонструють високу PD-L1-експресію
  (CPS ≥1 у >90%) та винятково сильну відповідь на інгібітори
  імунних чекпоїнтів (Kim et al. Nature Medicine 2018:
  пембролізумаб монотерапія ORR ~33% у EBV+ проти ~12% у EBV-негативних
  у малих когортах). Функціонує насамперед як SUBTYPE-ROUTER /
  пояснювальний біомаркер у поточній БД — ідентифікує популяцію з
  високою ймовірністю користі від ICI незалежно від порогу CPS.
  Стандартний відбір 1L-терапії залишається керованим ієрархією HER2 /
  MSI / CLDN18.2 / PD-L1 CPS; EBV+ статус підсилює ICI-обґрунтування там,
  де CPS-залежні показання вже застосовуються, та є гіпотезо-генеруючим
  для ICI у пацієнтів з CPS<5 (off-label / дослідження). Рутинне
  тестування EBV ще не є вимогою настанов (NCCN gastric v2025 наводить
  EBER-ISH як опцію, а не вимогу); reflex-тестування зростає в
  академічних центрах.
