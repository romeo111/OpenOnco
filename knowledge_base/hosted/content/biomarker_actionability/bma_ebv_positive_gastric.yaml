notes: >
  ESCAT IIIA — explanatory / subtype-routing biomarker; not
  treatment-selecting on its own. PRIMARY-SOURCE GAP: TCGA gastric
  classification paper (Cancer Genome Atlas Research Network, Nature
  2014; Kim et al. EBV+ ICI response, Nature Medicine 2018) and
  KEYNOTE-061 EBV+ subset analysis are NOT yet ingested as SRC entities;
  citing NCCN-gastric and ESMO-gastric secondary sources as primary
  per chunk-spec instruction (tier-2 acceptable). Source-stub follow-up
  recommended for: TCGA gastric subtype paper, Kim NatMed 2018,
  Janjigian KEYNOTE-061 EBV+ subset. Co-positivity with MSI-H, PD-L1
  CPS+, HER2+ is mostly mutually exclusive (EBV+ rarely overlaps with
  MSI-H — both confer immunogenicity through different mechanisms);
  HER2+ and EBV+ cooccur in <2% of cases. NOT a 1L-routing biomarker
  in current OpenOnco algorithm; documented for clinician context and
  for future ICI-prioritization rule when phase 3 EBV-stratified data
  emerges. Engine routing intentionally does not fire on this BMA
  alone; it is consumed by the render layer for explanatory display.
