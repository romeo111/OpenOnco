id: BMA-EGFR-EX19DEL-NSCLC
biomarker_id: BIO-EGFR-MUTATION
variant_qualifier: exon 19 deletion
disease_id: DIS-NSCLC
escat_tier: IA
evidence_summary: 'EGFR exon 19 deletion in advanced NSCLC: osimertinib 1L improves
  OS vs first-generation EGFR-TKIs (FLAURA, Soria et al. 2018; Ramalingam 2020). Adjuvant
  osimertinib post-resection improves DFS (ADAURA, Wu et al. 2020). Exon 19 del is
  one of two classical sensitizing mutations (with L858R) and predicts the highest
  TKI response rates.

  '
evidence_summary_ua: >
  Делеції екзону 19 EGFR при поширеному НМРЛ: осимертиніб (osimertinib) у 1-й лінії
  покращує загальну виживаність порівняно з EGFR-TKI першого покоління (FLAURA, Soria
  та ін., 2018; Ramalingam та ін., 2020). Ад'ювантний осимертиніб після резекції покращує
  безрецидивну виживаність (ADAURA, Wu та ін., 2020). Делеція екзону 19 є однією з двох
  класичних сенсибілізуючих мутацій (разом з L858R) і передбачає найвищі показники
  відповіді на EGFR-TKI. ESCAT IA / OncoKB рівень 1.
notes_ua: >
  ESCAT IA. Супутній діагностичний тест: cobas EGFR Mutation Test v2, FoundationOne CDx.
  Обов язкове тестування для всього поширеного несквамозного НМРЛ (SRC-NCCN-NSCLC-2025,
  SRC-ESMO-NSCLC-METASTATIC-2024). Осимертиніб + пеметрексед/платина (FLAURA2) є опцією
  комбінованої терапії 1-ї лінії. Амівантамаб (amivantamab) + лазертиніб (lazertinib)
  (MARIPOSA) — альтернатива 1-ї лінії.
