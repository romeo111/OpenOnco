    PAPILLON)
  - amivantamab — 2L EGFR ex20ins NSCLC (FDA approved 2021)
  ema:
  - amivantamab — 2L EGFR ex20ins (EMA approved 2021)
  - amivantamab + chemo — 1L (EMA approved 2024)
  ukraine: []
recommended_combinations:
- amivantamab + carboplatin + pemetrexed (PAPILLON 1L)
- amivantamab monotherapy (2L)
- platinum-doublet chemotherapy (alternative)
contraindicated_monotherapy:
- osimertinib (poor activity in classical ex20ins)
- gefitinib / erlotinib / afatinib (resistant)
- mobocertinib (withdrawn 2023-2024)
