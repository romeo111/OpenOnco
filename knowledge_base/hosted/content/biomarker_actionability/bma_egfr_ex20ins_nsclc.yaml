id: BMA-EGFR-EX20INS-NSCLC
biomarker_id: BIO-EGFR-MUTATION
variant_qualifier: exon 20 insertion
disease_id: DIS-NSCLC
escat_tier: IA
evidence_summary: 'EGFR exon 20 insertions (excluding A763_Y764insFQEA) are insensitive
  to classical EGFR-TKIs. Amivantamab (EGFR-MET bispecific) + chemo is 1L standard
  (PAPILLON, Zhou et al. 2023). Mobocertinib was withdrawn globally 2023-2024 for
  failed confirmatory trial. Sunvozertinib (China-approved) is an emerging option
  in 2L.

  '
evidence_summary_ua: >
  Інсерції екзону 20 EGFR (за винятком A763_Y764insFQEA) нечутливі до класичних EGFR-TKI.
  Амівантамаб (amivantamab, EGFR-MET біспецифічне антитіло) + хіміотерапія є стандартом
  1-ї лінії (PAPILLON, Zhou та ін., 2023). Мобоцертиніб (mobocertinib) відкликаний
  глобально у 2023-2024 рр. через невдале підтверджувальне дослідження. Сунвозертиніб
  (sunvozertinib, схвалений у Китаї) є перспективною опцією у 2-й лінії. ESCAT IA.
notes_ua: >
  ESCAT IA згідно з PAPILLON. OncoKB рівень 1. NGS є кращим за PCR для виявлення —
  багато варіантів інсерцій екзону 20 пропускають точкові PCR-панелі. A763_Y764insFQEA
  є рідкісним винятком, чутливим до класичних TKI (SRC-NCCN-NSCLC-2025,
  SRC-ESMO-NSCLC-METASTATIC-2024).
