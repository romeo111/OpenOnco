id: BMA-EGFR-MUTATION-GBM
biomarker_id: BIO-EGFR-MUTATION
variant_qualifier: EGFRvIII / amplification
disease_id: DIS-GBM
escat_tier: X
evidence_summary: 'EGFR amplification (~40%) and EGFRvIII variant (~25%) are common
  in glioblastoma but no targeted therapy has shown OS benefit. Erlotinib, gefitinib,
  lapatinib trials negative. Depatuxizumab-mafodotin (ADC) failed phase III INTELLANCE-1.
  Currently no actionable EGFR-targeted therapy in GBM.

  '
evidence_summary_ua: >
  Ампліфікація EGFR (~40%) та варіант EGFRvIII (~25%) часто зустрічаються при
  гліобластомі (GBM), однак жодна таргетна терапія не продемонструвала переваги
  щодо загальної виживаності. Дослідження ерлотинібу (erlotinib), гефітинібу (gefitinib)
  та лапатинібу (lapatinib) були негативними. Депатуксизумаб-мафодотин (depatuxizumab
  mafodotin, ADC) не пройшов дослідження фази 3 INTELLANCE-1. На даний час відсутня
  схвалена EGFR-таргетна терапія при GBM. ESCAT X.
notes_ua: >
  ESCAT X — жодних дієвих доказів при GBM попри високу частоту альтерацій. Вакцини
  проти EGFRvIII (ріндопепімут (rindopepimut)) не пройшли дослідження фази 3. EGFR
  CAR-T дослідження тривають, однак є дослідницькими (SRC-NCCN-CNS-2025, SRC-EANO-GBM-2024).
