id: BMA-EPCAM-GERMLINE-CRC
biomarker_id: BIO-DMMR-IHC
variant_qualifier: EPCAM germline 3' deletion (silences MSH2 by promoter methylation)
  → Lynch
disease_id: DIS-CRC
escat_tier: IA
evidence_summary: 'EPCAM germline deletion (3'' end) silences downstream MSH2 by promoter
  hypermethylation → Lynch syndrome with isolated MSH2/MSH6 protein loss on IHC. Treat
  as MSH2-equivalent Lynch: pembrolizumab 1L mCRC dMMR (KEYNOTE-177); pan- tumor MSI-H
  ICI eligibility supersedes tumor-specific lines. ESCAT IA / OncoKB Level 1.

  '
evidence_summary_ua: >
  Герміногенна делеція 3'-кінця EPCAM пригнічує нижче розташований MSH2 через
  гіперметилювання промотора → синдром Лінча з ізольованою втратою білків MSH2/MSH6 при
  IHC. Розглядати як MSH2-еквівалентний синдром Лінча: пембролізумаб (pembrolizumab) у
  1-й лінії метастатичного КРР з dMMR (KEYNOTE-177); пан-пухлинна допустимість ICI при
  MSI-H/dMMR має пріоритет над пухлиноспецифічними лініями. ESCAT IA / OncoKB рівень 1.
notes_ua: >
  EPCAM-Lynch трапляється рідше, ніж Lynch, зумовлений MLH1/MSH2/MSH6/PMS2 (~1-3%
  випадків синдрому Лінча). Каскадне тестування є обов язковим; сімейні наслідки
  ідентичні Lynch із MSH2. Пан-пухлинна допустимість ICI при MSI-H/dMMR має пріоритет
  над пухлиноспецифічними лініями (SRC-NCCN-COLON-2025, SRC-ESMO-COLON-2024).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_03
draft_revision: 2
regulatory_approval:
