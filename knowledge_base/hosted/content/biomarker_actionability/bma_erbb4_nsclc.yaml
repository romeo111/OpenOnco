id: BMA-ERBB4-NSCLC
biomarker_id: BIO-ERBB4
variant_qualifier: "ERBB4 (HER4) somatic activating mutation in NSCLC (~2–3%); pan-HER inhibitors investigational; distinct from NRG1 fusion (actionable via ERBB4 signaling)"
disease_id: DIS-NSCLC
escat_tier: IIIB
evidence_summary: >
  ERBB4 (HER4) somatic activating mutations are identified in ~2–3% of NSCLC (mixed histologies).
  ERBB4 is a member of the ERBB/HER RTK family; it signals via homo- or heterodimerization
  (primarily with EGFR or HER2) activating PI3K/AKT and MAPK pathways. Therapeutic considerations:
  (1) Afatinib (pan-HER1/2/4 irreversible inhibitor, FDA-approved for EGFR-mutant NSCLC and
      ERBB2 exon 20 insertion NSCLC): has in vitro activity against ERBB4-mutant cell lines,
      but no FDA-approved indication for ERBB4-selected NSCLC.
  (2) Neratinib (pan-HER1/2/4; FDA-approved for HER2-mutant NSCLC per NTRK basket, BreastFTD):
      investigational in ERBB4-mutant NSCLC.
  (3) SUMMIT basket trial (neratinib): included ERBB4-mutant patients across tumor types;
      NSCLC cohort showed 1/10 responses in ERBB4-mutant patients; insufficient for approval.
  (4) NRG1 fusions: NRG1 (neuregulin-1, the primary ERBB4 ligand) fusions in ~0.2% NSCLC
      activate ERBB3/ERBB4 signaling — zenocutuzumab (bispecific anti-HER2/HER3) ORR ~33%
      (eNRGy trial, FDA Breakthrough 2023). NRG1 fusion is the actionable alteration; ERBB4
      mutation is a distinct entity that does not qualify for zenocutuzumab or NRG1-fusion
      protocols.
  Standard of care: chemoimmunotherapy regardless of ERBB4 status; ERBB4 mutation does not
  modify the treatment algorithm.
  ESCAT IIIB: insufficient prospective evidence to support ERBB4-selected therapy in NSCLC.
evidence_summary_ua: >
  Мутації ERBB4 у ~2–3% НМРЛ. Афатиніб/нератиніб активні in vitro; у SUMMIT-корзині
  відповідь 1/10 при ERBB4-мутантному НМРЛ — недостатньо для схвалення. УВАГА: злиття NRG1
  (~0,2% НМРЛ) → активація ERBB3/ERBB4 → земоцутузумаб ORR ~33%; NRG1-злиття — окрема
  actionable мішень. ERBB4-мутація — не показання до земоцутузумабу. ESCAT IIIB.
