actionability_review_required: true
notes: >
  ESCAT IIIB: ERBB4 mutation in NSCLC is an investigational target. Critical distinction:
  (1) ERBB4 somatic mutation (kinase/extracellular domain): rare, no approved therapy.
  (2) NRG1 gene fusion (NRG1 is the ERBB4 ligand): actionable — zenocutuzumab FDA Breakthrough
      Designation, ORR ~33% in NRG1-fusion NSCLC/pancreatic (eNRGy trial). NRG1 fusions require
      RNA-seq for detection (not captured on DNA-only panels). These are clinically distinct.
  (3) Afatinib is pan-HER (HER1/2/4) but its approvals are HER1-mutant NSCLC and HER2 exon 20
      insertion NSCLC; using afatinib for ERBB4 mutation is off-label with limited evidence.
  (4) No companion diagnostic exists for ERBB4 mutation; standard NSCLC biomarker panel is sufficient.
