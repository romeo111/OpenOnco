recommended_combinations:
  - "Pembrolizumab ± platinum chemotherapy — standard 1L NSCLC regardless of ERBB4 status; histology and PD-L1 determine regimen"
  - "Afatinib 40 mg PO QD — investigational for ERBB4-mutant NSCLC; not FDA-approved for ERBB4 indication (approved for EGFR and HER2 exon 20 NSCLC)"
