notes: 'ESCAT IB / OncoKB Level 1. ESR1 mutations are acquired (rarely present in
  primary tumor) and frequently polyclonal — ctDNA preferred over single-site biopsy.
  Other oral SERDs (camizestrant, giredestrant, imlunestrant) and combinations (elacestrant
  + abemaciclib, etc.) in late-stage development; not yet FDA-approved as of 2026-04
  per SRC-NCCN-BREAST-2025. Source-gap: SRC-EMERALD-BIDARD-2022 not yet ingested.

