id: BMA-ESR1-MUT-BREAST
biomarker_id: BIO-ESR1
variant_qualifier: ligand-binding-domain hotspots — D538G, Y537S/N/C, L536H, E380Q;
  acquired during aromatase-inhibitor exposure in ~30-40% of HR+/HER2- metastatic
  breast progressing on AI
disease_id: DIS-BREAST
escat_tier: IB
evidence_summary: 'ESR1 ligand-binding-domain mutations confer aromatase-inhibitor
  (AI) resistance through constitutive ER-α activation and are FDA-actionable in HR+/HER2-negative
  metastatic breast cancer post-AI ± CDK4/6i. Elacestrant (oral SERD) FDA-approved
  2L+ for ESR1-mutated HR+/HER2- metastatic disease based on EMERALD (Bidard JCO 2022
  — ESR1-mut subgroup mPFS 3.8 vs 1.9 mo, HR 0.55; benefit confined to ESR1-mut population)
  per SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024. Detection by serial plasma
  ctDNA at progression is preferred per SRC-NCCN-BREAST-2025.

  '
evidence_summary_ua: >
  Мутації лігандзв'язувального домену ESR1 (D538G, Y537S/N/C, L536H, E380Q) зумовлюють
  резистентність до інгібіторів ароматази (IA) через конститутивну активацію ER-альфа та
  є об'єктом дії FDA-схвалених препаратів при HR+/HER2-негативному метастатичному раку
  молочної залози після IA +/- CDK4/6i. Еласестрант (elacestrant, пероральний SERD)
  схвалений FDA у 2-й лінії+ для ESR1-мутованого HR+/HER2-негативного метастатичного
  захворювання на підставі EMERALD (Bidard та ін., JCO 2022 — підгрупа ESR1-мут:
  mPFS 3.8 проти 1.9 міс., HR 0.55; перевага обмежена ESR1-мутованою популяцією).
  Виявлення: рідинна біопсія (ctDNA) плазми при прогресуванні є кращим методом
  порівняно з одноразовою тканинною біопсією. ESCAT IB (SRC-NCCN-BREAST-2025,
  SRC-ESMO-BREAST-METASTATIC-2024).
notes_ua: >
  ESCAT IB / OncoKB рівень 1. Мутації ESR1 є набутими (рідко присутні у первинній
  пухлині) та часто полікорнальними — ctDNA має перевагу над одноділянковою біопсією
  (SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024). Інші пероральні SERD
  (камізестрант (camizestrant), гіредестрант (giredestrant), імлунестрант (imlunestrant))
  та комбінації (еласестрант + абемацикліб (abemaciclib) тощо) знаходяться на пізніх
  стадіях розробки; не схвалені FDA станом на квітень 2026 р. Пробіл у джерелах:
  SRC-EMERALD-BIDARD-2022 ще не включено до бази знань.
