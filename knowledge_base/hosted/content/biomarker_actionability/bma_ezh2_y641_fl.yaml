id: BMA-EZH2-Y641-FL
biomarker_id: BIO-EZH2-Y641
variant_qualifier: Y641N/F/H/S/C activating mutations in SET domain — gain-of-function
  H3K27 hypermethylation; ~20-25% of follicular lymphoma
disease_id: DIS-FL
escat_tier: IB
evidence_summary: 'EZH2 Y641 hotspot activating mutations occur in ~20-25% of follicular
  lymphoma (and rarely in DLBCL/HGBL). Tazemetostat is a selective EZH2 inhibitor
  FDA-approved for relapsed/refractory FL: in EZH2- mutated FL after ≥2 prior lines,
  ORR 69%, mPFS 13.8 mo (E7438-202 Morschhauser Lancet Oncol 2020); in EZH2-WT FL,
  ORR 35%, mPFS 11.1 mo — mutated population had stronger responses, leading to a
  companion-diagnostic-paired indication per SRC-NCCN-BCELL-2025, SRC-ESMO-FL-2024.

  '
evidence_summary_ua: >
  Активуючі мутації гарячої точки EZH2 Y641 (Y641N/F/H/S/C) трапляються у ~20-25%
  фолікулярної лімфоми (FL) (і рідко при DLBCL/HGBL). Таземетостат (tazemetostat) —
  селективний інгібітор EZH2, схвалений FDA для рецидивної/рефрактерної FL: при
  EZH2-мутованій FL після ≥2 попередніх ліній: ORR 69%, mPFS 13.8 міс. (E7438-202,
  Morschhauser та ін., Lancet Oncol 2020); при EZH2-WT FL: ORR 35%, mPFS 11.1 міс.
  Мутована популяція мала значно сильнішу відповідь, що зумовило прив'язку до
  супутнього діагностичного тесту (SRC-NCCN-BCELL-2025, SRC-ESMO-FL-2024). ESCAT IB.
notes_ua: >
  ESCAT IB / OncoKB рівень 1. Супутній діагностичний тест: cobas EZH2 Mutation Test.
  Підгрупа EZH2-WT також має схвалення FDA, але з вдвічі меншою частотою ORR —
  тестування мутацій покращує відбір пацієнтів (SRC-ESMO-FL-2024). EZH2-Y641 при
  DLBCL: дослідницький; не схвалений (дослідження в комбінації з R-CHOP ще не дали
  позитивних результатів (SRC-NCCN-BCELL-2025)). Пробіл у джерелах: SRC-E7438-202
  (Morschhauser 2020) ще не включено до бази знань.
