id: BMA-FANCL-GERMLINE-OVARIAN
biomarker_id: BIO-HRR-PANEL
variant_qualifier: FANCL germline pathogenic (heterozygous)
disease_id: DIS-OVARIAN
escat_tier: IIIA
evidence_summary: 'FANCL germline (heterozygous) in EOC: Fanconi-anemia-pathway gene;
  biallelic loss = Fanconi anemia (recessive). Heterozygous carriers have uncertain
  cancer risk. FANCL included in some HRR panels (FANCL on PROfound HRR list). PARPi
  off-label consideration in HRD-positive. ESCAT IIIA / OncoKB Level 3B.

  '
evidence_summary_ua: >
  Герміногенний (гетерозиготний) патогенний варіант FANCL при епітеліальному раку
  яєчників (EOC): FANCL є геном шляху анемії Фанконі; біалельна втрата = анемія Фанконі
  (аутосомно-рецесивна). Онкологічний ризик у гетерозиготних носіїв невизначений.
  FANCL включений у деякі HRR-панелі (наявний у списку HRR PROfound). Позаетикеткове
  застосування PARPi розглядається при HRD-позитивності. ESCAT IIIA / OncoKB рівень 3B.
notes_ua: >
  Дієвість гетерозиготного FANCL є невизначеною; біалельна втрата = анемія Фанконі
  (уникати опромінення та алкілуючих агентів у відповідних випадках). Каскадне
  тестування — від випадку до випадку (SRC-NCCN-OVARIAN-2025, SRC-ESMO-OVARIAN-2024).
