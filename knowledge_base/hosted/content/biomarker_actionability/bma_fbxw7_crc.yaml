id: BMA-FBXW7-CRC
biomarker_id: BIO-FBXW7
variant_qualifier: "FBXW7 loss-of-function mutation in colorectal carcinoma (~10–15%); oncoprotein stabilization/resistance marker; no approved FBXW7-directed therapy"
disease_id: DIS-CRC
escat_tier: IV
evidence_summary: >
  FBXW7 loss-of-function mutations occur in ~10–15% of CRC and result in stabilization of
  multiple oncoproteins (NOTCH1/2, MYC, CCNE1, mTOR, JUN, MCL-1) that are normally targeted
  by the SCF-FBXW7 E3 ubiquitin ligase complex for proteasomal degradation.
  (1) WNT intersection: FBXW7 regulates β-catenin in some contexts; FBXW7 loss + APC mutation
      is common in CRC (both WNT pathway alterations, different nodes).
  (2) NOTCH pathway: FBXW7 loss stabilizes NOTCH — investigational gamma-secretase inhibitors
      (nirogacestat, AL101) target Notch processing, not downstream FBXW7 substrates.
  (3) Resistance implications: FBXW7 loss confers resistance to CDK4/6 inhibitors (via CCNE1
      stabilization), anti-NOTCH agents, and potentially mTOR inhibitors (via mTOR stabilization).
      Not an independent predictive biomarker for any approved CRC therapy.
  (4) MSI-H co-occurrence: FBXW7 mutation is more common in MSI-H CRC (~20–25% MSI-H vs ~7%
      MSS); MSI-H remains the actionable determinant for immunotherapy (pembrolizumab).
  No approved targeted therapy exploits FBXW7 deficiency in CRC.
  ESCAT IV: no actionable therapeutic implication in CRC. Standard therapy by RAS/RAF/MMR status.
evidence_summary_ua: >
  Мутації втрати функції FBXW7 трапляються у ~10-15% КРР і призводять до стабілізації
  множинних онкопротеїнів (NOTCH1/2, MYC, CCNE1, mTOR, JUN, MCL-1), які за нормальних
  умов спрямовуються SCF-FBXW7 E3 убіквітин-лігазним комплексом на протеасомальну
  деградацію. Мутації FBXW7 асоційовані з MSI-H (~20-25% MSI-H vs ~7% MSS); при MSI-H
  діє пембролізумаб (pembrolizumab), а не FBXW7-специфічна терапія. Затвердженої
  FBXW7-специфічної терапії при КРР не існує. ESCAT IV.
notes_ua: >
  ESCAT IV: мутація FBXW7 при КРР не має поточного терапевтичного значення поза
  стандартним тестуванням MSI/MMR/RAS/BRAF (SRC-NCCN-COLON-2025, SRC-ESMO-CRC-2024).
  Ключові положення: (1) Мутація FBXW7 не є супутнім діагностичним тестом для жодного
  схваленого агента. (2) Є предиктором резистентності до CDK4/6-інгібіторів (через
  CCNE1) — релевантно лише у контексті клінічних досліджень. (3) При виявленні мутації
  FBXW7 на NGS клінічно значущим кроком є підтвердження статусу MSI/MMR — збагачення
  FBXW7 при MSI-H означає, що MSI-H є активованою знахідкою. (4) Нірогацестат
  (nirogacestat, інгібітор гамма-секретази, схвалений FDA для десмоїдної пухлини)
  механістично пов'язаний з NOTCH — але схвалення лише для десмоїдної пухлини; даних
  по КРР немає.
