actionability_review_required: true
notes: >
  ESCAT IV: FBXW7 mutation in CRC has no current therapeutic implication beyond standard
  MSI/MMR/RAS/BRAF testing. Key points:
  (1) FBXW7 mutation is not a companion diagnostic for any approved agent.
  (2) It is a resistance predictor for CDK4/6 inhibitors (via CCNE1), relevant only if CRC
      were to enter CDK4/6 inhibitor trials.
  (3) When FBXW7 mutation is found on NGS, the clinically actionable step is to confirm
      MSI/MMR status (if not already done) — FBXW7 enrichment in MSI-H means the MSI-H
      status is the actionable finding.
  (4) Nirogacestat (gamma-secretase inhibitor, FDA-approved for desmoid tumor) targets
      Notch processing — mechanistically relevant to NOTCH substrate stabilization in
      FBXW7-mutant tumors, but desmoid-specific approval; no CRC data.
