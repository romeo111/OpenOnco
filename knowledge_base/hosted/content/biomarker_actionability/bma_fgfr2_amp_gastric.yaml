id: BMA-FGFR2-AMP-GASTRIC
biomarker_id: BIO-FGFR2
variant_qualifier: amplification (~5-7% gastric/GEJ; high-level GCN ≥10)
disease_id: DIS-GASTRIC
escat_tier: IIA
evidence_summary: 'FGFR2 amplification in gastric/GEJ adenocarcinoma (~5-7% high-level):
  bemarituzumab (anti-FGFR2b mAb) + mFOLFOX6 improved PFS/OS in FGFR2b-overexpressing
  1L gastric (FIGHT phase 2, Wainberg Lancet Oncol 2022 — PFS 9.5 vs 7.4 mo; phase
  3 FORTITUDE-101 ongoing). Selective FGFR-TKIs (futibatinib, pemigatinib) have basket
  activity in FGFR2-amp gastric.

  '
evidence_summary_ua: >
  Ампліфікація FGFR2 при аденокарциномі шлунку/GEJ (~5-7% на рівні високого числа
  копій): бемарітузумаб (bemarituzumab, анти-FGFR2b мАт) + mFOLFOX6 покращував
  виживаність без прогресування та загальну виживаність при 1-й лінії гастрального раку
  з гіперекспресією FGFR2b (FIGHT фаза 2, Wainberg та ін., Lancet Oncol 2022 — PFS 9.5
  проти 7.4 міс., HR 0.68; OS 19.2 проти 13.5 міс., HR 0.60). Підтверджувальне дослідження
  фази 3 FORTITUDE-101 триває. Селективні FGFR-TKI (футибатиніб (futibatinib), пемігатиніб
  (pemigatinib)) мають кошикову активність при FGFR2-ампліфікованому гастральному раку.
  ESCAT IIA.
notes_ua: >
  ESCAT IIA. OncoKB рівень 3A. Бемарітузумаб використовує FGFR2b IHC (а не ампліфікацію
  гена) як супутній тест. Стандарт 1-ї лінії гастрального раку залишається фторпіримідин
  + платина +/- трастузумаб (HER2+) +/- нівол умаб (PD-L1+) до завершення FORTITUDE-101
  (SRC-NCCN-GASTRIC-2025, SRC-ESMO-GASTRIC-2024). Пробіл у джерелах: SRC-FIGHT та
  SRC-FORTITUDE-101 ще не включені до бази знань.
