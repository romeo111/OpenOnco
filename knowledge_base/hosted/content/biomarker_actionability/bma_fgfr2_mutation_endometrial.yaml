id: BMA-FGFR2-MUTATION-ENDOMETRIAL
biomarker_id: BIO-FGFR2
variant_qualifier: activating mutation (~12% endometrioid; hotspots S252W, N549K,
  K310R)
disease_id: DIS-ENDOMETRIAL
escat_tier: IIA
evidence_summary: 'FGFR2 mutation in endometrial carcinoma (~10-12% endometrioid histology).
  Pemigatinib and erdafitinib have basket activity (FIGHT-207, Mirati / NCI-MATCH
  EAY131-W) — ORR ~25-30% in FGFR2-mutant endometrial. No regulatory approval for
  endometrial alone; tumor-agnostic FGFR-TKI label not yet granted.

  '
evidence_summary_ua: >
  Мутація FGFR2 при раку ендометрія (~10-12% ендометріоїдної гістології; гарячі точки
  S252W, N549K, K310R). Пемігатиніб (pemigatinib) та ердафітиніб (erdafitinib) мають
  кошикову активність (FIGHT-207, NCI-MATCH EAY131-W) — ORR ~25-30% при FGFR2-мутантному
  раку ендометрія. Регуляторного схвалення виключно для раку ендометрія немає;
  пан-пухлинний ярлик FGFR-TKI поки не отриманий. ESCAT IIA.
notes_ua: >
  ESCAT IIA. OncoKB рівень 3A. Стандарт 1-ї лінії поширеного/рецидивного раку ендометрія
  — карбоплатин + паклітаксел +/- достарлімаб (RUBY) / пембролізумаб (NRG-GY018) при
  dMMR або pMMR. Тестування FGFR2 зарезервоване для включення в клінічне дослідження /
  при виявленні панеллю (SRC-NCCN-UTERINE-2025, SRC-ESGO-ENDOMETRIAL-2025). Пробіл у
  джерелах: SRC-FIGHT-207 ще не включено до бази знань.
