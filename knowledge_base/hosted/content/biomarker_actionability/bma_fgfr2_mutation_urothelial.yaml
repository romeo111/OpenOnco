id: BMA-FGFR2-MUTATION-UROTHELIAL
biomarker_id: BIO-FGFR2
variant_qualifier: activating mutation (FGFR2 fusion or kinase-domain mutation)
disease_id: DIS-UROTHELIAL
escat_tier: IB
evidence_summary: 'FGFR2 fusion / activating mutation in metastatic urothelial carcinoma:
  erdafitinib (BLC2001, Loriot NEJM 2019 — ORR 40%; THOR phase 3, Loriot NEJM 2023
  — OS HR 0.64 vs chemo) is FDA-approved for FGFR2/3-altered locally advanced or metastatic
  urothelial 2L+. FGFR2 alterations less common than FGFR3 in urothelial (~3% vs ~15%).

  '
evidence_summary_ua: >
  Злиття/активуюча мутація FGFR2 при метастатичній уротеліальній карциномі: ердафітиніб
  (erdafitinib; BLC2001, Loriot та ін., NEJM 2019 — ORR 40%; THOR фаза 3, Loriot та ін.,
  NEJM 2023 — OS HR 0.64 проти хіміотерапії) схвалений FDA для FGFR2/3-змінених
  місцево-поширених або метастатичних уротеліальних карцином у 2L+. Зміни FGFR2 зустрічаються
  рідше, ніж FGFR3, при уротеліальному раку (~3% проти ~15%). ESCAT IB.
notes_ua: >
  ESCAT IB. OncoKB рівень 1. Супутній діагностичний тест FDA: therascreen FGFR RGQ RT-PCR
  (охоплює злиття FGFR2 та мут/злиття FGFR3). Для виявлення злиттів надається перевага
  RNA-NGS. Гіперфосфатемія є on-target токсичністю, що вимагає корекції дози (SRC-NCCN-BLADDER-2025,
  SRC-EAU-BLADDER-2024).
