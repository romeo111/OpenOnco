id: BMA-FGFR2B-MEMBRANE-GASTRIC
biomarker_id: BIO-FGFR2B-IHC
variant_qualifier: "FGFR2b 2+/3+ membranous staining in ≥10% of tumor cells by IIIb-isoform-selective IHC (FORTITUDE-101 / FIGHT eligibility threshold)"
disease_id: DIS-GASTRIC
escat_tier: IIA
evidence_summary: >
  FGFR2b protein overexpression (IHC 2+/3+ membranous in ≥10% of tumor cells)
  identifies a ~30% subset of HER2-negative metastatic gastric / GEJ
  adenocarcinoma sensitive to bemarituzumab — anti-FGFR2b chimeric IgG1
  monoclonal antibody with afucosylated Fc enhancing ADCC. FIGHT phase 2
  (Wainberg et al. Lancet Oncol 2022): bemarituzumab + mFOLFOX6 vs
  placebo + mFOLFOX6 in FGFR2b-overexpressing 1L gastric — mPFS 9.5 vs
  7.4 mo (HR 0.68), mOS 19.2 vs 13.5 mo (HR 0.60); benefit greater at
  higher FGFR2b cutoffs (≥10% vs all-comer). Phase 3 confirmatory trial
  FORTITUDE-101 (interim data — full readout pending; source stub
  flagged). Distinct from FGFR2 gene amplification (covered by
  BMA-FGFR2-AMP-GASTRIC) — IHC selects on protein expression of the IIIb
  isoform regardless of underlying gene amp status. Adverse-event
  profile dominated by ocular toxicity (corneal events ~70% any-grade,
  ~25% grade ≥3) — mandatory baseline + serial slit-lamp ophthalmologic
  exams.
evidence_summary_ua: >
  Гіперекспресія білка FGFR2b (ІГХ 2+/3+ мембранне забарвлення в ≥10%
  клітин) ідентифікує ~30% підгрупу HER2-негативного метастатичного
  раку шлунка / GEJ-аденокарциноми, чутливу до bemarituzumab — химерного
  IgG1 мАт проти FGFR2b з afucosylated Fc для посилення ADCC. Дослідження
  FIGHT фази 2 (Wainberg, Lancet Oncol 2022): bemarituzumab + mFOLFOX6
  проти плацебо + mFOLFOX6 у 1L гастральному раку з гіперекспресією
  FGFR2b — мПВ 9.5 проти 7.4 міс (HR 0.68); мЗВ 19.2 проти 13.5 міс
  (HR 0.60); користь більша при вищих порогах FGFR2b (≥10% проти
  all-comer). Підтверджуюче дослідження фази 3 FORTITUDE-101
  (попередні дані — повна публікація очікується; source stub
  позначений). Відрізняється від ампліфікації гена FGFR2 (охоплено
  BMA-FGFR2-AMP-GASTRIC) — ІГХ-відбір базується на експресії білка
  ізоформи IIIb незалежно від статусу ампліфікації гена. Профіль
  побічних ефектів — переважно очна токсичність (рогівкові події
  ~70% будь-якого ступеня, ~25% ≥3 ступеня) — обов'язковий вихідний
  + серійний огляд офтальмолога зі щілинною лампою.
