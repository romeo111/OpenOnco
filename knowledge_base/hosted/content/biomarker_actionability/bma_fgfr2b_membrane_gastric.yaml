actionability_review_required: true
notes: >
  ESCAT IIA — phase 2 randomized data (FIGHT) supports the cell;
  confidence will upgrade to IA upon full FORTITUDE-101 publication.
  CITATION GAP: SRC-FORTITUDE-101 is currently a TODO-stub (legal review
  pending, title placeholder). Cited as-is per chunk-spec instruction;
  upgrade is a separate housekeeping task. Distinguishing this BMA from
  BMA-FGFR2-AMP-GASTRIC (gene amplification → off-label TKI / basket
  trial activity) — the protein-IHC and gene-amp tests overlap in
  ~50% of cases but each captures a distinct subset (FIGHT data,
  Wainberg Lancet Oncol 2022). Hierarchy when multiple biomarkers
  co-positive: HER2+ (TOGA / KEYNOTE-811) > MSI-H (KEYNOTE-859) >
  CLDN18.2+ (SPOTLIGHT / GLOW) > FGFR2b+ (FIGHT / FORTITUDE-101).
  Ocular toxicity is the dose-defining AE — protocol-driven
  ophthalmology pre-treatment + ongoing slit-lamp surveillance.
