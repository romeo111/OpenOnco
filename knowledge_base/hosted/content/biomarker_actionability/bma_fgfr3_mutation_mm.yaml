  - SRC-ESMO-MM-2023
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT X — biological rationale present but no actionable clinical
  evidence. t(4;14) status defines high-risk MM and influences
  proteasome-inhibitor-based regimen choice (KRd, IsaKRd, daratumumab
  combos), but FGFR3 itself is not a treatment target in MM.
