id: BMA-FGFR3-MUTATION-MM
biomarker_id: BIO-FGFR3-MUTATION
variant_qualifier: FGFR3 activating (Y373C, K650E) with t(4;14)
disease_id: DIS-MM
escat_tier: X
evidence_summary: 'In multiple myeloma, t(4;14) translocation places MMSET/FGFR3 under
  IgH control; ~30% of t(4;14) cases co-express FGFR3, with rare acquired activating
  point mutations (Y373C, K650E). Despite preclinical sensitivity, clinical trials
  of FGFR inhibitors (dovitinib, AZD4547) in MM showed limited efficacy; no FGFR-targeted
  therapy is approved in MM. Treatment is standard t(4;14) high-risk myeloma protocol
  (proteasome-inhibitor-based).

  '
evidence_summary_ua: >
  При множинній мієломі (ММ) транслокація t(4;14) ставить MMSET/FGFR3 під контроль IgH;
  ~30% випадків t(4;14) коекспресують FGFR3 з рідкісними набутими активуючими точковими
  мутаціями (Y373C, K650E). Незважаючи на доклінічну чутливість, клінічні дослідження
  FGFR-інгібіторів (довітиніб (dovitinib), AZD4547) при ММ показали обмежену ефективність;
  жодного FGFR-таргетного препарату не схвалено для ММ. Лікування відповідає стандартному
  протоколу високоризикової ММ з t(4;14) (на основі інгібіторів протеасоми). ESCAT X.
notes_ua: >
  ESCAT X — біологічне обгрунтування є, але дієвих клінічних доказів немає. Статус t(4;14)
  визначає ММ з високим ризиком та впливає на вибір протеасома-інгібіторного режиму (KRd,
  IsaKRd, комбінації з даратумумабом (daratumumab)), але FGFR3 сам по собі не є лікувальною
  мішенню при ММ (SRC-NCCN-MM-2025, SRC-ESMO-MM-2023).
