id: BMA-FGFR3-MUTATION-MM
biomarker_id: BIO-FGFR3-MUTATION
variant_qualifier: "FGFR3 activating (Y373C, K650E) with t(4;14)"
disease_id: DIS-MM
escat_tier: "X"
oncokb_level: "4"
evidence_summary: >
  In multiple myeloma, t(4;14) translocation places MMSET/FGFR3 under
  IgH control; ~30% of t(4;14) cases co-express FGFR3, with rare
  acquired activating point mutations (Y373C, K650E). Despite
  preclinical sensitivity, clinical trials of FGFR inhibitors
  (dovitinib, AZD4547) in MM showed limited efficacy; no FGFR-targeted
  therapy is approved in MM. Treatment is standard t(4;14) high-risk
  myeloma protocol (proteasome-inhibitor-based).
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations: []
contraindicated_monotherapy:
  - "erdafitinib (no MM efficacy in trials)"
  - "FGFR-TKI monotherapy in MM (insufficient evidence)"
primary_sources:
