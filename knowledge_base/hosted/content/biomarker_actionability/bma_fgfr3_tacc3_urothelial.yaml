id: BMA-FGFR3-TACC3-UROTHELIAL
biomarker_id: BIO-FGFR3-MUTATION
variant_qualifier: FGFR3-TACC3 fusion
disease_id: DIS-UROTHELIAL
escat_tier: IA
evidence_summary: 'FGFR3-TACC3 fusion is an activating rearrangement in urothelial
  carcinoma (~2-3%). Included in the erdafitinib companion-diagnostic FGFR alteration
  list. Erdafitinib responses in fusion-positive patients are comparable to those
  in mutation-positive (THOR, BLC2001).

  '
evidence_summary_ua: >
  Злиття FGFR3-TACC3 є активуючою перебудовою при уротеліальній карциномі (~2-3%).
  Включено до переліку альтерацій FGFR супутнього діагностичного тесту ердафітинібу
  (erdafitinib). Відповідь на ердафітиніб у злиття-позитивних пацієнтів є порівнянною
  з такою у мутація-позитивних (THOR, BLC2001). ESCAT IA.
notes_ua: >
  ESCAT IA. RNA-NGS є кращим для виявлення злиттів; деякі ДНК-панелі пропускають
  інтронні точки розриву (SRC-NCCN-BLADDER-2025, SRC-EAU-BLADDER-2024).
