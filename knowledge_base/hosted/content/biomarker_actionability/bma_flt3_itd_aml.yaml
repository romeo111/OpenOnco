id: BMA-FLT3-ITD-AML
biomarker_id: BIO-FLT3-ITD
variant_qualifier: internal tandem duplication (juxtamembrane domain — ~25% of AML)
disease_id: DIS-AML
escat_tier: IA
evidence_summary: 'FLT3-ITD in newly-diagnosed AML: midostaurin + 7+3 induction +
  high-dose cytarabine consolidation + maintenance improved OS vs chemo alone in fit
  adults (RATIFY, Stone NEJM 2017 — 4-yr OS HR 0.78). Quizartinib + 7+3 + maintenance
  also superior in QuANTUM-First (Erba Lancet 2023 — 4-yr OS HR 0.78). FLT3-ITD remains
  a poor-risk marker (ELN 2022) when allelic ratio high; allo-SCT in CR1 indicated.

  '
evidence_summary_ua: >
  FLT3-ITD при вперше діагностованому ГМЛ: мідостаурин (midostaurin) + індукція 7+3
  + консолідація цитарабіном у високих дозах + підтримуюча терапія покращував загальну
  виживаність порівняно з лише хіміотерапією у фізично задовільних дорослих (RATIFY,
  Stone та ін., NEJM 2017 — 4-річна ЗВ HR 0.78). Квізартиніб (quizartinib) + 7+3 +
  підтримка також перевершував у QuANTUM-First (Erba та ін., Lancet 2023 — 4-річна ЗВ
  HR 0.78). FLT3-ITD залишається маркером поганого прогнозу (ELN 2022) при високому
  алельному співвідношенні; алоТГСК у першій повній ремісії (CR1) показана. ESCAT IA.
notes_ua: >
  ESCAT IA. OncoKB рівень 1. ELN 2022: FLT3-ITD з високим алельним співвідношенням
  без NPM1 = несприятливий ризик; FLT3-ITD з NPM1 (будь-яке АС) = проміжний. Супутній
  діагностичний тест: LeukoStrat CDx (аналіз мутацій FLT3, RT-PCR);
  SRC-RATIFY-STONE-2017, SRC-QUANTUM-FIRST-ERBA-2023, SRC-NCCN-AML-2025,
  SRC-ELN-AML-2022).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_03
draft_revision: 2
regulatory_approval:
  fda:
  - midostaurin + 7+3 — 1L FLT3-mutant AML (FDA approved 2017)
  - quizartinib + 7+3 — 1L FLT3-ITD AML (FDA approved 2023)
  ema:
  - midostaurin + 7+3 — 1L FLT3-mutant AML (EMA approved 2017)
  - quizartinib + 7+3 — 1L FLT3-ITD AML (EMA approved 2024)
  ukraine: []
recommended_combinations:
- midostaurin + 7+3 induction + HiDAC consolidation + midostaurin maintenance
- quizartinib + 7+3 induction + HiDAC consolidation + quizartinib maintenance (FLT3-ITD
  specifically)
- allo-SCT in CR1 (high-allelic-ratio FLT3-ITD or other adverse-risk features)
contraindicated_monotherapy:
- FLT3i monotherapy (off-trial; combine with chemo or use in R/R)
