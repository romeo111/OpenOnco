recommended_combinations:
- BEP (bleomycin 30 U IV day 1/8/15 + etoposide 100 mg/m² IV days 1–5 + cisplatin
  20 mg/m² IV days 1–5 per 21-day cycle) — standard for advanced/recurrent AGCT
- carboplatin AUC 5 + paclitaxel 175 mg/m² q3w — alternative for BEP-ineligible
- leuprolide 3.75 mg IM q4w (or 11.25 mg q3m) — hormonal therapy for recurrent AGCT
  (off-label)
- palbociclib 125 mg PO QD (days 1–21) + letrozole 2.5 mg QD (28-day cycles) — investigational;
  FOXL2 C134W mutation may predict CDK4/6 inhibitor sensitivity
