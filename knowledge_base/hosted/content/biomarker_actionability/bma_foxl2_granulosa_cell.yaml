notes: 'ESCAT IIB: FOXL2 C134W is a diagnostic biomarker with emerging predictive
  utility. Clinical use: (1) Diagnosis — FOXL2 testing should be part of workup for
  any suspected AGCT; (2) ctDNA monitoring — FOXL2 C134W in plasma ctDNA detects subclinical
  relapse (AGCT recurs at median 10–15 years post-diagnosis; serial ctDNA surveillance
  is under investigation); (3) Therapeutic target — clinical trials with CDK4/6 inhibitors
  actively enrolling (refer patients to NCT03462186 or institutional protocols). Inhibin
  B and AMH are serum markers used for AGCT monitoring (not FOXL2-specific but clinically
  useful). Staging surgery (BSO + peritoneal staging) is curative for early-stage
  disease (stage I; 90% 10-yr OS). Fertility-sparing surgery (unilateral SO) may be
  considered for young patients with stage IA disease.

  '
