id: BMA-FOXL2-GRANULOSA-CELL
biomarker_id: BIO-FOXL2
variant_qualifier: FOXL2 p.C134W (c.402C>G) — present in ~97% of adult granulosa cell
  tumors; pathognomonic diagnostic marker; no FDA-approved targeted therapy as of
  2026
disease_id: DIS-GRANULOSA-CELL
escat_tier: IIB
evidence_summary: 'FOXL2 p.C134W (c.402C>G) is the defining molecular marker of adult
  granulosa cell tumor (AGCT), present in ~97% of cases and essentially absent in
  other ovarian tumors (100% positive predictive value when confirmed). The mutation
  distinguishes AGCT from: (1) Juvenile GCT (FOXL2 wild-type); (2) Other sex cord-stromal
  tumors (Sertoli-Leydig, fibroma, thecoma); (3) Poorly differentiated carcinomas
  mimicking AGCT. Therapeutic targets: no FDA/EMA-approved targeted therapy for FOXL2
  C134W as of 2026. Investigational: (a) CDK4/6 inhibitors (palbociclib, ribociclib)
  — phase II trials (NCT03462186 palbociclib in GCT); (b) Olaparib (PARP inhibitor)
  in BRCA-wild-type GCT (Mirvetuximab + olaparib combination); (c) Bevacizumab (anti-VEGF)
  — phase II activity ~14%; (d) Hormonal therapies (leuprolide, megestrol, anastrozole)
  — common in clinical practice for recurrent disease (response rates 20–30%) but
  no prospective phase III data. BEP chemotherapy (bleomycin/etoposide/cisplatin)
  or carboplatin/paclitaxel for advanced/relapsed disease. ESCAT IIB: diagnostic and
  monitoring utility established; therapeutic targeting investigational.

  '
evidence_summary_ua: 'FOXL2 p.C134W (~97% AGCT) — патогномонічний маркер. Розрізняє
  AGCT від ювенільного ГКП, пухлин Сертолі-Лейдіга, карцином-мімікрів. Немає схваленої
  FDA/EMA таргетної терапії станом на 2026. Дослідні: CDK4/6-інгібітори (фаза II,
  NCT03462186); олапариб; бевацизумаб (ORR ~14%); гормональна терапія (лупрорелін,
  мегестрол; відповідь 20–30%). Хімотерапія: BEP або карбоплатин/паклітаксел. ESCAT
  IIB.

  '
