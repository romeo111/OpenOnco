    note: "NCCN Pancreatic 2025: GNAS R201 mutation in cyst fluid is a diagnostic marker for mucinous cyst (IPMN/MCN); GNAS + KRAS double positivity increases malignant risk stratification; surgical referral criteria based on imaging/clinical features, not GNAS alone."
