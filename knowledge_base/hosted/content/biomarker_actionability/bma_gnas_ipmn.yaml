id: BMA-GNAS-IPMN
biomarker_id: BIO-GNAS
variant_qualifier: "GNAS R201 activating mutation (R201C, R201H) in pancreatic cyst fluid or tissue — intraductal papillary mucinous neoplasm (IPMN); diagnostic/risk-stratification marker for cyst malignant potential"
disease_id: DIS-PDAC
escat_tier: IIB
evidence_summary: >
  GNAS R201 mutations are detected in ~40–70% of IPMNs (predominantly main-duct and
  mixed-type) and in a subset of GNAS-driven mucinous cystic neoplasms (MCNs). GNAS
  mutation is a key component of multi-analyte pancreatic cyst fluid analysis (alongside
  KRAS mutation, CEA level, cytology) used to classify cysts as mucinous vs non-mucinous
  and to stratify malignant potential. Clinical utility:
  (1) Diagnostic: GNAS R201 mutation in cyst fluid confirms mucinous neoplasm (IPMN
      or MCN) with high specificity (>95%). Used in Pancrasite and other commercial cyst
      analysis panels.
  (2) Risk stratification: GNAS + KRAS double-positive cysts have higher malignant
      risk than GNAS or KRAS single-positive. Per NCCN/IAP (International Association
      of Pancreatology) 2022 guidelines, worrisome features and high-risk stigmata drive
      surgical referral, but molecular markers (GNAS + KRAS + TP53/SMAD4/CDKN2A) in
      cyst fluid are increasingly incorporated into risk models.
  (3) No treatment is directed at GNAS per se — management is surgical resection for
      high-risk features. GNAS mutation does not select systemic therapy in PDAC.
  ESCAT IIB: GNAS mutation is a validated diagnostic and risk-stratification biomarker
  for IPMN; no therapeutic implication for PDAC beyond surgical decision-making.
evidence_summary_ua: >
  Мутації GNAS R201 (R201C, R201H) виявляються у ~40-70% IPMN (переважно головна
  протока і змішаний тип) та в підгрупі GNAS-зумовлених муцинозних кістозних неоплазм
  (MCN). Мутація GNAS є ключовим компонентом мультианалітного аналізу рідини панкреатичної
  кісти (поряд з мутацією KRAS, рівнем CEA, цитологією), що використовується для
  класифікації кіст як муцинозних vs немуцинозних та стратифікації ризику малігнізації.
  Діагностичне значення: мутація GNAS R201 в рідині кісти підтверджує муцинозну неоплазму
  (IPMN або MCN) з високою специфічністю (>95%). GNAS + KRAS подвійно-позитивні кісти
  мають вищий ризик малігнізації. Лікування спрямоване на хірургічну резекцію при
  ризик-факторах; GNAS-специфічної системної терапії не існує. ESCAT IIB.
notes_ua: >
  ESCAT IIB: мутація GNAS є діагностичним/стратифікаційним інструментом в управлінні
  IPMN, а не терапевтичною мішенню. DIS-PDAC використовується як найближча відповідність
  (IPMN є передраковим попередником PDAC). Клінічний алгоритм для кіст: (1) візуалізація
  (МРТ/МРХПГ); (2) ЕУС-ТАБ з аналізом рідини для кіст ≥2 см; (3) CEA рідини (>192 нг/мл
  = муцинозна), амілаза, цитологія, NGS-панель GNAS/KRAS. (4) GNAS+ підтверджує муцинозну
  природу → протокол нагляду IAP/NCCN. (5) Додаткові молекулярні маркери (TP53, SMAD4,
  CDKN2A) можуть вказувати на дисплазію високого ступеня (SRC-NCCN-PANCREATIC-2025,
  SRC-ESMO-PANCREATIC-2024).
