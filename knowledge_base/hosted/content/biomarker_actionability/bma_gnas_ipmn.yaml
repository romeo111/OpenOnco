actionability_review_required: true
notes: >
  ESCAT IIB: GNAS mutation is a diagnostic/risk-stratification tool in IPMN management,
  not a therapeutic target. The disease_id DIS-PDAC is used as the closest match, since
  IPMN is a pre-malignant precursor to PDAC; no dedicated IPMN disease entity exists in
  the KB. Clinical workflow for pancreatic cysts:
  (1) Imaging characterization: MRI/MRCP (preferred), CT for mural nodule detection.
  (2) EUS-FNA with cyst fluid analysis for cysts ≥2 cm or with concerning features.
  (3) Cyst fluid CEA (>192 ng/mL = mucinous), amylase (low in serous), cytology (atypical/
      malignant cells = immediate surgery), GNAS/KRAS NGS panel.
  (4) GNAS+ (or KRAS+) confirms mucinous → enter IAP/NCCN surveillance protocol.
  (5) Additional molecular markers (TP53, SMAD4, CDKN2A mutations in cyst fluid) may
      indicate high-grade dysplasia requiring resection even without imaging high-risk stigmata.
  GNAS R201 testing: requires dedicated pancreatic cyst fluid NGS panel (e.g., Pancrasite
  by LabCorp, or institutional panel); not covered by standard tumor tissue NGS panels.
