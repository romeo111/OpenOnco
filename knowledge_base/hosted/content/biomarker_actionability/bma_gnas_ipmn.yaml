recommended_combinations:
  - "Pancreaticoduodenectomy or distal pancreatectomy — for IPMN with high-risk stigmata (obstructive jaundice, mural nodule ≥5 mm, main duct dilation ≥10 mm, positive cytology) regardless of GNAS status"
  - "Surveillance (MRI/MRCP or EUS q6m–3yr depending on size/features) — for IPMN without high-risk stigmata; GNAS + KRAS positivity informs more frequent surveillance"
