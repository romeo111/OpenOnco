notes: 'ESCAT IIA (FDA-approved disease-specific). HER2 testing (IHC + reflex ISH for
  IHC 2+) recommended at diagnosis for unresectable / metastatic BTC per
  SRC-NCCN-HEPATOBILIARY. Gastric-style scoring (Hofmann 2008 — basolateral / lateral
  membranous staining ≥10%) is generally applied. HER2 amplification frequency varies
  by anatomic subsite: highest in gallbladder + extrahepatic cholangiocarcinoma
  (~10-15%), lower in intrahepatic CCA (~3-5%). FDA accelerated approval Nov 2024
  based on HERIZON-BTC-01; confirmatory study and traditional approval pending. UA
  access: zanidatamab not registered in UA (named-patient / EAP only as of 2026-05).
  Trastuzumab + pertuzumab combination has separate weak evidence in BTC (MyPathway
  Meric-Bernstam 2021 ORR ~23%) but is not the FDA-approved disease-specific
  combination — zanidatamab is the disease-specific actionable option.

  '
notes_ua: 'ESCAT IIA (схвалений FDA, хворобо-специфічний). Тестування HER2 (IHC з
  рефлекторним ISH для IHC 2+) рекомендовано при діагнозі для нерезектабельного або
  метастатичного BTC згідно з SRC-NCCN-HEPATOBILIARY. Зазвичай застосовується шлунковий
  стиль скорингу (Hofmann 2008 — базолатеральне / латеральне мембранне забарвлення
  ≥10%). Частота HER2-ампліфікації варіює залежно від анатомічної локалізації:
  найвища при раку жовчного міхура та позапечінковій холангіокарциномі (~10-15%),
  нижча при внутрішньопечінковій холангіокарциномі (~3-5%). Прискорене схвалення FDA
  у листопаді 2024 ґрунтувалося на HERIZON-BTC-01; підтверджувальне дослідження та
  традиційне схвалення очікуються. Доступ в Україні: занідатамаб не зареєстрований
  в Україні (доступний лише за програмою іменованих пацієнтів / EAP станом на
  2026-05). Комбінація трастузумаб + пертузумаб має окремі слабкі докази при BTC
  (MyPathway, Meric-Bernstam 2021, ORR ~23%), однак не є схваленою FDA хворобо-специфічною
  комбінацією — занідатамаб залишається хворобо-специфічною актіонабельною опцією.

  '
