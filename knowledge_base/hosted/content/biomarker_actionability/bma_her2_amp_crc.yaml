id: BMA-HER2-AMP-CRC
biomarker_id: BIO-HER2-SOLID
variant_qualifier: amplification / overexpression — IHC 3+ or (IHC 2+ + ISH amplified,
  HER2/CEP17 ≥2.0); ~3-5% of metastatic colorectal cancer (RAS/BRAF-WT)
disease_id: DIS-CRC
escat_tier: IB
evidence_summary: 'HER2-amplified metastatic colorectal cancer (~3-5% in RAS/BRAF-WT
  population): tucatinib + trastuzumab is FDA-approved 2L+ for HER2- positive RAS-WT
  mCRC based on MOUNTAINEER (Strickler Lancet Oncol 2023 — ORR 38%, mDOR 12 mo) per
  SRC-NCCN-COLON-2025. Trastuzumab deruxtecan also has activity (DESTINY-CRC01 Siena
  Lancet Oncol 2021 — ORR 45% in HER2 IHC 3+ RAS-WT) and tumor-agnostic FDA approval
  (2024) for HER2-positive solid tumors that have progressed on prior therapy. Older
  trastuzumab + lapatinib (HERACLES) is referenced as alternative. RAS-mutant tumors
  should not receive HER2-directed therapy in 2L because RAS-driven resistance is
  well-documented per SRC-NCCN-COLON-2025.

  '
evidence_summary_ua: 'HER2-ампліфікований метастатичний колоректальний рак (~3-5% у
  популяції RAS/BRAF-WT): тукатиніб (tucatinib) + трастузумаб (trastuzumab) — схвалена
  FDA схема для HER2-позитивного RAS-WT mCRC у режимі ≥2L на підставі дослідження
  MOUNTAINEER (Strickler, Lancet Oncol 2023 — ORR 38%, mDOR 12 міс.) згідно з
  SRC-NCCN-COLON-2025. Трастузумаб дерукстекан (trastuzumab deruxtecan) також демонструє
  активність (DESTINY-CRC01, Siena, Lancet Oncol 2021 — ORR 45% при HER2 IHC 3+ RAS-WT)
  та має пухлино-агностичне схвалення FDA (2024) для HER2-позитивних солідних пухлин,
  що прогресували на попередній терапії. Старіша комбінація трастузумаб + лапатиніб
  (lapatinib; дослідження HERACLES) згадується як альтернатива. RAS-мутовані пухлини
  не повинні отримувати HER2-спрямовану терапію у 2L, оскільки RAS-залежна резистентність
  добре задокументована згідно з SRC-NCCN-COLON-2025.

  '
ukrainian_review_status: pending_clinical_signoff
