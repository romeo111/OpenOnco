regulatory_approval:
  fda:
  - tucatinib + trastuzumab — HER2+ RAS-WT unresectable/metastatic CRC after fluoropyrimidine,
    oxaliplatin, irinotecan (FDA accelerated 2023)
  - trastuzumab deruxtecan — HER2+ solid tumors with no satisfactory alternative (FDA
    tumor-agnostic 2024)
  ema:
  - tucatinib + trastuzumab — HER2+ RAS-WT mCRC (EMA approved 2024)
  ukraine: []
recommended_combinations:
- tucatinib + trastuzumab (2L+ HER2+ RAS-WT mCRC per SRC-NCCN-COLON-2025)
- trastuzumab deruxtecan (2L+ HER2+ mCRC per SRC-NCCN-COLON-2025)
- trastuzumab + lapatinib (alternative per HERACLES, listed in SRC-NCCN-COLON-2025)
contraindicated_monotherapy:
- HER2-directed therapy in RAS-mutated mCRC (RAS mutation drives downstream resistance
  per SRC-NCCN-COLON-2025)
- trastuzumab monotherapy
