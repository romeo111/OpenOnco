notes: 'ESCAT IB / OncoKB Level 2 (initially Level 2A in CRC pre-MOUNTAINEER; Level
  1 tumor-agnostic for T-DXd 2024). HER2 testing recommended for metastatic CRC with
  RAS/BRAF-WT genotype per SRC-NCCN-COLON-2025. RAS mutation = exclusion criterion
  for anti-HER2 therapy. Source-gap: SRC-MOUNTAINEER-STRICKLER-2023, SRC-DESTINY-CRC01,
  SRC-HERACLES not yet ingested.

  '
notes_ua: 'ESCAT IB / OncoKB Level 2 (початково Level 2A при CRC до публікації
  MOUNTAINEER; Level 1 пухлино-агностичний для T-DXd, 2024). Тестування HER2
  рекомендовано для метастатичного колоректального раку з генотипом RAS/BRAF-WT
  згідно з SRC-NCCN-COLON-2025. Мутація RAS — критерій виключення для анти-HER2-терапії.
  Прогалина у джерелах: SRC-MOUNTAINEER-STRICKLER-2023, SRC-DESTINY-CRC01,
  SRC-HERACLES ще не інгестовані.

  '
