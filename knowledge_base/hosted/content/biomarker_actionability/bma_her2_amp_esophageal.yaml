id: BMA-HER2-AMP-ESOPHAGEAL
biomarker_id: BIO-HER2-SOLID
variant_qualifier: amplification / overexpression — IHC 3+ or (IHC 2+ + ISH amplified)
  using gastric Hofmann 2008 criteria; ~10-30% of esophageal/GEJ adenocarcinoma
disease_id: DIS-ESOPHAGEAL
escat_tier: IA
evidence_summary: 'HER2-positive esophageal/GEJ adenocarcinoma scored by gastric criteria:
  trastuzumab + chemotherapy is preferred 1L (cross-referenced from ToGA / KEYNOTE-811)
  per SRC-NCCN-ESOPHAGEAL-2025, SRC-ESMO-ESOPHAGEAL-2024. Pembrolizumab + trastuzumab
  + fluoropyrimidine/platinum is FDA-approved for HER2+ PD-L1 CPS≥1 metastatic GEJ
  adenocarcinoma (KEYNOTE-811). Trastuzumab deruxtecan is FDA-approved 2L+ for HER2-positive
  advanced gastric/GEJ adenocarcinoma (DESTINY-Gastric01 includes Siewert types).
  Squamous-cell esophageal carcinoma is HER2-negative as a rule and is not in scope
  for HER2-directed therapy.

  '
evidence_summary_ua: 'HER2-позитивна аденокарцинома стравоходу/гастроезофагеального
  переходу (GEJ), скорингована за шлунковими критеріями: трастузумаб (trastuzumab)
  + хіміотерапія — пріоритетна схема 1L (за матеріалами ToGA / KEYNOTE-811) згідно
  з SRC-NCCN-ESOPHAGEAL-2025, SRC-ESMO-ESOPHAGEAL-2024. Комбінація пембролізумаб
  (pembrolizumab) + трастузумаб + фторпіримідин/платина схвалена FDA для HER2+
  PD-L1 CPS≥1 метастатичної GEJ-аденокарциноми (KEYNOTE-811). Трастузумаб дерукстекан
  (trastuzumab deruxtecan) схвалений FDA у режимі 2L+ для HER2-позитивної поширеної
  аденокарциноми шлунка/GEJ (DESTINY-Gastric01 включає типи за Siewert). Плоскоклітинна
  карцинома стравоходу, як правило, HER2-негативна та не належить до показань для
  HER2-спрямованої терапії.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_04
