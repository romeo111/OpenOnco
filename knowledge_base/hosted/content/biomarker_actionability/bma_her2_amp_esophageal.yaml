notes: 'ESCAT IA / OncoKB Level 1. HER2 testing for adenocarcinoma histology only
  (not squamous). Heterogeneity high — ≥4 biopsies recommended. Source-gap: SRC-TOGA-BANG-2010,
  SRC-KEYNOTE-811, SRC-DESTINY-GASTRIC01 not ingested.

  '
notes_ua: 'ESCAT IA / OncoKB Level 1. Тестування HER2 застосовується лише для
  аденокарциноми (не для плоскоклітинної гістології). Висока гетерогенність — рекомендовано
  ≥4 біопсії. Прогалина у джерелах: SRC-TOGA-BANG-2010, SRC-KEYNOTE-811,
  SRC-DESTINY-GASTRIC01 ще не інгестовані.

  '
