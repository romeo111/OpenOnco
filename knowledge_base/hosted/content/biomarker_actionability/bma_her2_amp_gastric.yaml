id: BMA-HER2-AMP-GASTRIC
biomarker_id: BIO-HER2-SOLID
variant_qualifier: amplification / overexpression — IHC 3+ or (IHC 2+ + ISH amplified,
  HER2/CEP17 ≥2.0); ~15-20% of gastric/GEJ adenocarcinoma
disease_id: DIS-GASTRIC
escat_tier: IA
evidence_summary: 'HER2-positive gastric/GEJ adenocarcinoma (~15-20%): trastuzumab
  + chemotherapy is standard 1L (ToGA Bang Lancet 2010 — mOS 13.8 vs 11.1 mo, HR 0.74).
  Pembrolizumab + trastuzumab + chemo is FDA-approved 1L for HER2-positive PD-L1 CPS
  ≥1 metastatic gastric/GEJ disease per SRC-NCCN-GASTRIC-2025, SRC-ESMO-GASTRIC-2024
  (KEYNOTE-811). Trastuzumab deruxtecan (T-DXd) is FDA-approved 2L+ for HER2-positive
  (IHC 3+ or 2+) advanced gastric/GEJ adenocarcinoma based on DESTINY-Gastric01 (Shitara
  NEJM 2020 — ORR 51% vs 14% with chemotherapy).

  '
evidence_summary_ua: 'HER2-позитивна аденокарцинома шлунка/гастроезофагеального
  переходу (GEJ; ~15-20%): трастузумаб (trastuzumab) + хіміотерапія — стандарт 1L
  (ToGA, Bang, Lancet 2010 — медіана загальної виживаності 13.8 проти 11.1 міс.,
  HR 0.74). Пембролізумаб (pembrolizumab) + трастузумаб + хіміотерапія схвалені
  FDA у 1L для HER2-позитивного PD-L1 CPS ≥1 метастатичного захворювання шлунка/GEJ
  згідно з SRC-NCCN-GASTRIC-2025, SRC-ESMO-GASTRIC-2024 (KEYNOTE-811). Трастузумаб
  дерукстекан (trastuzumab deruxtecan; T-DXd) схвалений FDA у режимі 2L+ для
  HER2-позитивної (IHC 3+ або 2+) поширеної аденокарциноми шлунка/GEJ на підставі
  DESTINY-Gastric01 (Shitara, NEJM 2020 — ORR 51% проти 14% при хіміотерапії).

  '
