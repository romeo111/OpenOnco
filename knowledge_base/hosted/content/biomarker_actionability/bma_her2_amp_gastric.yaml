notes: 'ESCAT IA / OncoKB Level 1. Gastric HER2 scoring (Hofmann 2008) differs from
  breast: basolateral/lateral membranous staining ≥10% qualifies (cf. circumferential
  criterion in breast). HER2 testing recommended for all metastatic gastric/GEJ adenocarcinoma
  at diagnosis. Heterogeneity is significant: ≥4 endoscopic biopsies preferred. Source-gap:
  SRC-TOGA-BANG-2010, SRC-DESTINY-GASTRIC01, SRC-KEYNOTE-811 not yet ingested.

  '
notes_ua: 'ESCAT IA / OncoKB Level 1. Шлунковий стиль скорингу HER2 (Hofmann 2008)
  відрізняється від молочної залози: кваліфікуючим є базолатеральне/латеральне
  мембранне забарвлення ≥10% (на відміну від циркумферентного критерію при раку
  молочної залози). Тестування HER2 рекомендовано для всіх випадків метастатичної
  аденокарциноми шлунка/GEJ при діагнозі. Гетерогенність значна: бажано ≥4
  ендоскопічні біопсії. Прогалина у джерелах: SRC-TOGA-BANG-2010, SRC-DESTINY-GASTRIC01,
  SRC-KEYNOTE-811 ще не інгестовані.

  '
