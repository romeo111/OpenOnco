    direction: Supports
    significance: Sensitivity/Response
    note: "DESTINY-Breast04 phase III: T-DXd vs chemotherapy in HER2-low metastatic breast. Primary endpoint mPFS HR+/HER2-low 10.1 vs 5.4 mo, HR 0.49 (p<0.001); mOS 23.9 vs 17.5 mo, HR 0.64 (p=0.003). FDA approval basis."
  - source: SRC-NCCN-BREAST-2025
