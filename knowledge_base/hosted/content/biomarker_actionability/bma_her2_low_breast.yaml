id: BMA-HER2-LOW-BREAST
biomarker_id: BIO-HER2-LOW
variant_qualifier: "IHC 1+ OR IHC 2+/ISH-negative (HER2-low by ASCO/CAP 2023 criteria)"
disease_id: DIS-BREAST
escat_tier: IA
evidence_summary: >
  Trastuzumab deruxtecan (T-DXd, DS-8201) is FDA-approved (Aug 2022) for unresectable or
  metastatic HER2-low (IHC 1+ or 2+/ISH-) breast cancer following prior chemotherapy.
  DESTINY-Breast04 (Modi et al. NEJM 2022): HR+/HER2-low — mPFS 10.1 vs 5.4 mo (HR 0.49,
  p<0.001); mOS 23.9 vs 17.5 mo (HR 0.64, p=0.003). HR-/HER2-low (TNBC subgroup) — mOS
  18.2 vs 8.3 mo. DESTINY-Breast06 (Curigliano et al. NEJM 2024) extended indication to
  HER2-low and HER2-ultralow (IHC 0 with incomplete staining) HR+/HER2- endocrine-pretreated
  patients — mPFS 13.2 vs 8.1 mo (HR 0.62, p<0.001). T-DXd dose: 5.4 mg/kg IV q3w.
  Key safety: interstitial lung disease (ILD) / pneumonitis ~12% (grade ≥3 ~3%) — mandatory
  baseline CT and monitoring per NCCN/ESMO. HER2-low reclassification affects ~60% of
  previously HER2-negative metastatic breast cancer patients — large population impact.
evidence_summary_ua: >
  Трастузумаб дерукстекан (trastuzumab deruxtecan; T-DXd, DS-8201) схвалений FDA
  (серпень 2022) для нерезектабельного або метастатичного HER2-low (IHC 1+ або
  IHC 2+/ISH-негативний за критеріями ASCO/CAP 2023) раку молочної залози після
  попередньої хіміотерапії. DESTINY-Breast04 (Modi et al., NEJM 2022): HR+/HER2-low —
  медіана виживаності без прогресування 10.1 проти 5.4 міс. (HR 0.49, p<0.001); медіана
  загальної виживаності 23.9 проти 17.5 міс. (HR 0.64, p=0.003). HR-/HER2-low
  (підгрупа TNBC) — медіана загальної виживаності 18.2 проти 8.3 міс. DESTINY-Breast06
  (Curigliano et al., NEJM 2024) розширив показання на HER2-low та HER2-ultralow
  (IHC 0 з неповним забарвленням) у раніше лікованих ендокринною терапією пацієнток
  з HR+/HER2- — медіана виживаності без прогресування 13.2 проти 8.1 міс. (HR 0.62,
  p<0.001). Доза T-DXd: 5.4 mg/kg в/в кожні 3 тижні. Ключова безпека: інтерстиціальна
  хвороба легень (ILD) / пневмоніт ~12% (ступінь ≥3 ~3%) — обов'язкове базове КТ та
  моніторинг згідно з настановами NCCN/ESMO. Рекласифікація HER2-low торкається ~60%
  раніше HER2-негативних пацієнток з метастатичним раком молочної залози — значний
  популяційний вплив.
