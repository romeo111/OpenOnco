id: BMA-HER2-LOW-BREAST
biomarker_id: BIO-HER2-LOW
variant_qualifier: "IHC 1+ OR IHC 2+/ISH-negative (HER2-low by ASCO/CAP 2023 criteria)"
disease_id: DIS-BREAST
escat_tier: IA
evidence_summary: >
  Trastuzumab deruxtecan (T-DXd, DS-8201) is FDA-approved (Aug 2022) for unresectable or
  metastatic HER2-low (IHC 1+ or 2+/ISH-) breast cancer following prior chemotherapy.
  DESTINY-Breast04 (Modi et al. NEJM 2022): HR+/HER2-low — mPFS 10.1 vs 5.4 mo (HR 0.49,
  p<0.001); mOS 23.9 vs 17.5 mo (HR 0.64, p=0.003). HR-/HER2-low (TNBC subgroup) — mOS
  18.2 vs 8.3 mo. DESTINY-Breast06 (Curigliano et al. NEJM 2024) extended indication to
  HER2-low and HER2-ultralow (IHC 0 with incomplete staining) HR+/HER2- endocrine-pretreated
  patients — mPFS 13.2 vs 8.1 mo (HR 0.62, p<0.001). T-DXd dose: 5.4 mg/kg IV q3w.
  Key safety: interstitial lung disease (ILD) / pneumonitis ~12% (grade ≥3 ~3%) — mandatory
  baseline CT and monitoring per NCCN/ESMO. HER2-low reclassification affects ~60% of
  previously HER2-negative metastatic breast cancer patients — large population impact.
evidence_summary_ua: >
  Трастузумаб дерукстекан (T-DXd) — схвалено FDA (серпень 2022) для нерезектабельного або
  метастатичного HER2-low (ІГХ 1+ або 2+/ISH-) РМЗ після попередньої хіміотерапії.
  DESTINY-Breast04: HR+/HER2-low — mПВ 10.1 vs 5.4 міс (HR 0.49); mЗВ 23.9 vs 17.5 міс
  (HR 0.64). DESTINY-Breast06 (2024) розширює показання на HER2-low і HER2-ultralow при
  гормонально-позитивному РМЗ після ендокринної терапії. Ключовий ризик: ILD/пневмоніт ~12%.
  HER2-low охоплює ~60% раніше HER2-негативних метастатичних пацієнток.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "trastuzumab deruxtecan (T-DXd) 5.4 mg/kg — HER2-low unresectable/metastatic breast cancer, post-chemotherapy (FDA Aug 2022; DESTINY-Breast04)"
    - "trastuzumab deruxtecan (T-DXd) — HER2-low HR+/HER2- post-endocrine therapy (FDA label update 2024; DESTINY-Breast06)"
  ema:
    - "trastuzumab deruxtecan — HER2-low metastatic breast cancer after prior chemotherapy (EMA 2023)"
  ukraine: []
recommended_combinations:
  - "trastuzumab deruxtecan (T-DXd) 5.4 mg/kg IV q3w monotherapy (post-chemotherapy; DESTINY-Breast04)"
  - "trastuzumab deruxtecan (T-DXd) 5.4 mg/kg IV q3w monotherapy (post-endocrine HR+ disease; DESTINY-Breast06)"
contraindicated_monotherapy:
  - "trastuzumab or pertuzumab (no anti-HER2 activity at IHC 1+/2+ ISH- level for these agents)"
  - "T-DM1 (ado-trastuzumab emtansine) — approved for HER2+ (IHC 3+ or ISH+) only, not HER2-low"
