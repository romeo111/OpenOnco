actionability_review_required: true
notes: >
  ESCAT IA. HER2-low reclassification (IHC 1+ or 2+/ISH-) is now clinically actionable —
  a paradigm shift from binary HER2+/- to a three-tier classification (HER2-positive /
  HER2-low / HER2-zero). Reflex HER2 IHC with careful 1+ vs 0 distinction now required
  on all metastatic breast specimens per NCCN/ESMO. ILD management: baseline CT chest,
  monitoring at each cycle, dose-reduction/hold/discontinue algorithm per NCCN. DESTINY-Breast06
  further extended benefit to HER2-ultralow (IHC 0 with incomplete/faint staining) — this
  specific subgroup requires separate BIO entity (BIO-HER2-ULTRALOW) when reclassification
  is confirmed by pathology.
