actionability_review_required: true
notes: >
  ESCAT IA. HER2-low reclassification (IHC 1+ or 2+/ISH-) is now clinically actionable —
  a paradigm shift from binary HER2+/- to a three-tier classification (HER2-positive /
  HER2-low / HER2-zero). Reflex HER2 IHC with careful 1+ vs 0 distinction now required
  on all metastatic breast specimens per NCCN/ESMO. ILD management: baseline CT chest,
  monitoring at each cycle, dose-reduction/hold/discontinue algorithm per NCCN. DESTINY-Breast06
  further extended benefit to HER2-ultralow (IHC 0 with incomplete/faint staining) — this
  specific subgroup requires separate BIO entity (BIO-HER2-ULTRALOW) when reclassification
  is confirmed by pathology.
notes_ua: >
  ESCAT IA. Рекласифікація HER2-low (IHC 1+ або IHC 2+/ISH-) тепер клінічно актіонабельна —
  парадигмальний зсув від бінарної моделі HER2+/- до трирівневої класифікації
  (HER2-позитивний / HER2-low / HER2-zero). Рефлекторне імуногістохімічне дослідження
  HER2 з ретельною диференціацією 1+ проти 0 наразі рекомендоване для всіх метастатичних
  зразків раку молочної залози згідно з NCCN/ESMO. Ведення ILD: базове КТ органів
  грудної клітки, моніторинг при кожному циклі, алгоритм зниження дози / зупинки /
  припинення згідно з NCCN. DESTINY-Breast06 додатково розширив користь на HER2-ultralow
  (IHC 0 з неповним/слабким забарвленням) — ця специфічна підгрупа потребує окремої
  BIO-сутності (BIO-HER2-ULTRALOW) у разі підтвердження рекласифікації патологом.
