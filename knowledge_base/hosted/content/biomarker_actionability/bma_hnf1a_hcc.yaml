actionability_review_required: true
notes: >
  ESCAT IIB: HNF1A mutation is a diagnostic/risk-stratification marker primarily for
  hepatocellular adenoma subtyping, with secondary relevance in HCC phenotyping.
  Practical notes:
  (1) For HCA: LFABP IHC (loss of staining) is the validated surrogate for HNF1A inactivation
      — available in most pathology labs; NGS confirmation adds specificity but is not
      mandatory if IHC is negative.
  (2) For HCC on NGS: HNF1A somatic mutation is incidental finding; does not alter NCCN/AASLD
      treatment algorithm; may correlate with better-differentiated tumor biology.
  (3) Germline HNF1A (MODY3): sulfonylurea treatment is highly effective; recommend endocrinology
      referral if germline HNF1A found incidentally in an HCC patient.
  (4) HNF1A is NOT in routine comprehensive NGS panels for HCC biomarker eligibility
      (which focuses on VEGF pathway, PD-L1, TMB, MSI for immunotherapy eligibility).
  DIS-HCC is used as the disease_id for both HCC (~10%) and HCA contexts; HCA has no dedicated
  disease entity in the KB.
notes_ua: >
  ESCAT IIB: мутація HNF1A — переважно діагностичний маркер та маркер стратифікації
  ризику для субтипування гепатоцелюлярної аденоми, з вторинним значенням для
  фенотипування ГЦК. Практичні зауваження:
  (1) Для ГЦА: LFABP-імуногістохімія (втрата забарвлення) — валідований сурогат для
      інактивації HNF1A; доступна у більшості патоморфологічних лабораторій; підтвердження
      NGS додає специфічності, але не є обов'язковим за умови негативної IHC.
  (2) Для ГЦК на NGS: соматична мутація HNF1A — випадкова знахідка; не змінює лікувальний
      алгоритм за NCCN/AASLD; може корелювати з більш диференційованою біологією пухлини.
  (3) Гермінальна HNF1A (MODY3): лікування препаратами сульфонілсечовини високоефективне;
      рекомендовано консультацію ендокринолога при випадковому виявленні гермінальної
      HNF1A у пацієнта з ГЦК.
  (4) HNF1A НЕ входить до рутинних комплексних NGS-панелей для оцінки актіонабельних
      біомаркерів при ГЦК (які фокусуються на VEGF-шляху, PD-L1, TMB, MSI для оцінки
      придатності до імунотерапії).
  DIS-HCC використовується як disease_id як для контексту ГЦК (~10%), так і для ГЦА;
  ГЦА не має окремої сутності захворювання у базі знань.
