id: BMA-HNF1A-HCC
biomarker_id: BIO-HNF1A
variant_qualifier: "HNF1A somatic mutation in hepatocellular carcinoma and hepatocellular adenoma (H-subtype); diagnostic/risk-stratification marker; no HNF1A-directed systemic therapy"
disease_id: DIS-HCC
escat_tier: IIB
evidence_summary: >
  HNF1A somatic inactivating mutations occur in ~10% of HCC and ~35–40% of hepatocellular
  adenoma (H-subtype, H-HCA). Clinical utility:
  (1) HCA subtyping: biallelic HNF1A inactivation defines the H-HCA subtype characterized
      by steatotic hepatocytes, LFABP (liver fatty acid binding protein) loss by IHC, and
      very low malignant transformation risk (<1%). H-HCA management: surveillance rather
      than resection for lesions <5 cm in women who discontinue oral contraceptives; resection
      for >5 cm or persistent growth.
  (2) HCC context: somatic HNF1A mutation in HCC is associated with preserved hepatocyte
      differentiation phenotype (low AFP, well-differentiated histology) but does not select
      systemic therapy. Standard HCC management applies: lenvatinib or sorafenib 1L; atezolizumab
      + bevacizumab (IMbrave150) preferred 1L for Child-Pugh A patients without contraindications.
  (3) Germline HNF1A (MODY3): not an HCC risk factor; separate clinical context (diabetes
      management), not oncologically relevant in HCC.
  ESCAT IIB: HNF1A mutation is a validated diagnostic/risk-stratification marker for HCA
  subtyping with management implications; no therapeutic target in HCC.
evidence_summary_ua: >
  Соматичні інактивуючі мутації HNF1A зустрічаються у ~10% гепатоцелюлярної карциноми
  (ГЦК) та у ~35–40% гепатоцелюлярних аденом (H-підтип, H-ГЦА). Клінічна цінність:
  (1) Субтипування ГЦА: біалельна інактивація HNF1A визначає підтип H-ГЦА, який
      характеризується стеатотичними гепатоцитами, втратою LFABP (печінковий
      жирно-кислотний зв'язуючий білок) при імуногістохімії та дуже низьким ризиком
      малігнізації (<1%).
      Тактика при H-ГЦА: спостереження замість резекції для утворень <5 см у жінок,
      які припиняють прийом оральних контрацептивів; резекція показана при розмірі
      >5 см або стійкому рості.
  (2) Контекст ГЦК: соматична мутація HNF1A при ГЦК асоційована зі збереженим
      диференційованим фенотипом гепатоцитів (низький AFP, добре диференційована
      гістологія), однак не визначає системну терапію. Застосовується стандартна
      тактика при ГЦК: ленватиніб (lenvatinib) або сорафеніб (sorafenib) у 1L;
      атезолізумаб (atezolizumab) + бевацизумаб (bevacizumab) (IMbrave150) — пріоритетна
      схема 1L для пацієнтів з функцією печінки Child-Pugh A без протипоказань.
  (3) Гермінальна HNF1A (MODY3): не є фактором ризику ГЦК; відноситься до окремого
      клінічного контексту (ведення цукрового діабету), не має онкологічного значення
      при ГЦК.
  ESCAT IIB: мутація HNF1A — валідований діагностичний маркер та маркер стратифікації
  ризику для субтипування ГЦА із наслідками для тактики ведення; терапевтичної мішені
  при ГЦК немає.
