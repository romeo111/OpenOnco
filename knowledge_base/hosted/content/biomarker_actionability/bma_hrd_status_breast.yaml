notes: 'ESCAT IA / OncoKB Level 1 (gBRCAm). Somatic BRCA mutations and broader HRD-genomic
  signatures (Myriad MyChoice CDx) have less consistent evidence in breast — current
  FDA-companion is BRACAnalysis CDx for gBRCAm. ESMO 2024 advanced breast guidelines
  flag PARP-i is preferred 2L over CDK4/6 sequencing in gBRCAm/HR+ metastatic when
  available. Source-gap: SRC-OLYMPIA, SRC-OLYMPIAD, SRC-EMBRACA not yet ingested.

  '
notes_ua: 'ESCAT IA / OncoKB Level 1 (gBRCAm). Соматичні мутації BRCA та ширші
  HRD-геномні сигнатури (Myriad MyChoice CDx) мають менш узгоджені докази при раку
  молочної залози — наразі FDA-компаньйонним тестом є BRACAnalysis CDx для gBRCAm.
  Настанови ESMO 2024 з поширеного раку молочної залози вказують, що PARP-інгібітори
  є пріоритетними у 2L над секвенуванням CDK4/6-інгібіторів при gBRCAm/HR+ метастатичному
  захворюванні, якщо доступні. Прогалина у джерелах: SRC-OLYMPIA, SRC-OLYMPIAD,
  SRC-EMBRACA ще не інгестовані.

  '
