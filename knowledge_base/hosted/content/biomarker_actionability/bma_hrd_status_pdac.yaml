id: BMA-HRD-STATUS-PDAC
biomarker_id: BIO-HRD-STATUS
variant_qualifier: germline BRCA1/2 (gBRCAm) — primary FDA-actionable subset (~5-7%
  of pancreatic ductal adenocarcinoma); somatic BRCA / PALB2 with growing evidence
disease_id: DIS-PDAC
escat_tier: IA
evidence_summary: 'Germline BRCA1/2 mutation in metastatic PDAC (~5-7%): olaparib
  monotherapy maintenance after ≥4 months of platinum-based 1L (FOLFIRINOX or gemcitabine/cisplatin)
  without progression is FDA-approved based on POLO (Golan NEJM 2019 — mPFS 7.4 vs
  3.8 mo, HR 0.53; OS not significant) per SRC-NCCN-PANCREATIC-2025, SRC-ESMO-PANCREATIC-2024.
  Platinum-containing 1L is preferred for gBRCAm PDAC over gemcitabine + nab-paclitaxel
  because of platinum sensitivity (FOLFIRINOX response rates substantially higher
  in gBRCAm patients per multiple retrospective series cited in SRC-NCCN-PANCREATIC-2025).

  '
evidence_summary_ua: 'Гермінальна мутація BRCA1/2 при метастатичному PDAC (~5-7%):
  олапариб (olaparib) у монотерапії як підтримуюча терапія після ≥4 місяців
  платино-вмісного режиму 1L (FOLFIRINOX або гемцитабін (gemcitabine) / цисплатин
  (cisplatin)) без прогресування захворювання — схвалена FDA на підставі POLO (Golan,
  NEJM 2019 — медіана виживаності без прогресування 7.4 проти 3.8 міс., HR 0.53;
  переваги за загальною виживаністю не виявлено) згідно з SRC-NCCN-PANCREATIC-2025,
  SRC-ESMO-PANCREATIC-2024. Платино-вмісна 1L — пріоритетна схема для gBRCAm PDAC над
  комбінацією гемцитабін + наб-паклітаксел (nab-paclitaxel) з огляду на платино-чутливість
  (рівень відповіді на FOLFIRINOX суттєво вищий у gBRCAm-пацієнтів за даними багатьох
  ретроспективних серій, цитованих у SRC-NCCN-PANCREATIC-2025).

  '
