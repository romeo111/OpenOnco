notes: 'ESCAT IA / OncoKB Level 1 (gBRCAm). Somatic BRCA in PDAC has less evidence;
  PALB2 inclusion in NCCN PARP indication is conditional / Level 2A. Germline testing
  recommended for ALL pancreatic cancer at diagnosis per NCCN. POLO did not show OS
  benefit, but PFS improvement with low maintenance toxicity supports use. Source-gap:
  SRC-POLO-GOLAN-2019 not yet ingested.

  '
notes_ua: 'ESCAT IA / OncoKB Level 1 (gBRCAm). Соматичні мутації BRCA при PDAC мають
  менш надійну доказову базу; включення PALB2 у NCCN-показання для PARP — умовне /
  Level 2A. Гермінальне тестування рекомендовано для ВСІХ випадків раку підшлункової
  залози при діагнозі згідно з NCCN. POLO не показало переваг за загальною виживаністю,
  однак покращення виживаності без прогресування за умови низької токсичності підтримки
  підтримує застосування. Прогалина у джерелах: SRC-POLO-GOLAN-2019 ще не інгестовано.

  '
