    pending)
  - olaparib + abiraterone + prednisone — BRCA-mutated mCRPC 1L (FDA approved 2023)
  - niraparib + abiraterone + prednisone — BRCA-mutated mCRPC 1L (FDA approved 2023)
  - talazoparib + enzalutamide — HRR-mutated mCRPC 1L (FDA approved 2023)
  ema:
  - olaparib — BRCA1/2 mCRPC after new hormonal agent (EMA approved 2020)
  - olaparib + abiraterone — BRCA-mut mCRPC 1L (EMA approved 2023)
  - niraparib + abiraterone — BRCA-mut mCRPC 1L (EMA approved 2023)
  - talazoparib + enzalutamide — HRR-mut mCRPC 1L (EMA approved 2023)
