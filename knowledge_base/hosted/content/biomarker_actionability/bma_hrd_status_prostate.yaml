notes: 'ESCAT IA / OncoKB Level 1 (BRCA1/2 strongest evidence; other HRR genes Level
  1 by FDA label inclusion but heterogeneous evidence — ATM benefit weakest in PROfound
  subgroup analysis). EAU 2024 more conservative than NCCN on non-BRCA HRR PARP indications
  — documented position difference. Both germline and somatic testing recommended
  at metastatic diagnosis. Source-gap: SRC-PROFOUND, SRC-MAGNITUDE, SRC-PROPEL, SRC-TALAPRO2
  not yet ingested.

  '
notes_ua: 'ESCAT IA / OncoKB Level 1 (найсильніші докази для BRCA1/2; інші HRR-гени —
  Level 1 за FDA-етикеткою, проте з гетерогенною доказовою базою — найслабший виграш
  від ATM у субгруповому аналізі PROfound). Настанови EAU 2024 більш консервативні
  ніж NCCN щодо PARP-показань для не-BRCA HRR — задокументована різниця позицій.
  Рекомендовано як гермінальне, так і соматичне тестування при метастатичному діагнозі.
  Прогалина у джерелах: SRC-PROFOUND, SRC-MAGNITUDE, SRC-PROPEL, SRC-TALAPRO2 ще не
  інгестовані.

  '
