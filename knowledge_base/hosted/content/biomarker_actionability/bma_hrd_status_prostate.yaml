id: BMA-HRD-STATUS-PROSTATE
biomarker_id: BIO-HRD-STATUS
variant_qualifier: HRR-pathway alteration — BRCA1/2 (~10% of mCRPC), ATM, CHEK2, PALB2,
  FANCA, RAD51 family, etc.; BRCA-mut subset is most actionable
disease_id: DIS-PROSTATE
escat_tier: IA
evidence_summary: 'Homologous-recombination-repair (HRR) gene alterations in metastatic
  castration-resistant prostate cancer (mCRPC, ~25% somatic + germline): olaparib
  monotherapy is FDA-approved for BRCA1/2 (and several other HRR genes per FDA label)
  mCRPC after enzalutamide or abiraterone failure based on PROfound (de Bono NEJM
  2020 — cohort A BRCA1/2/ATM mPFS 7.4 vs 3.6 mo, HR 0.34). Niraparib + abiraterone
  acetate (MAGNITUDE Chi JCO 2023) and olaparib + abiraterone (PROpel Clarke NEJM
  Evid 2022) are FDA-approved 1L combinations for HRR- altered mCRPC. Talazoparib
  + enzalutamide (TALAPRO-2 Agarwal Lancet 2023) is FDA-approved for HRR-mutated mCRPC
  1L. Rucaparib has accelerated approval for BRCA1/2 mCRPC post-androgen-receptor-
  targeted therapy (TRITON3) per SRC-NCCN-PROSTATE-2025, SRC-ESMO-PROSTATE-2024, SRC-EAU-PROSTATE-2024.

  '
evidence_summary_ua: 'Homologous-recombination-repair (HRR) gene альтерації in метастатичний
  castration-resistant рак передміхурової залози (mCRPC, ~25% соматичний + герміногенний):
  олапариб монотерапія is FDA-схвалений для BRCA1/2 (and several other HRR genes per
  FDA label) mCRPC after ензалутамід or абіратерон failure based on PROfound (de Bono
  NEJM 2020 — cohort A BRCA1/2/ATM mPFS 7.4 проти 3.6 міс., HR 0.34). нірапариб +
  абіратерон acetate (MAGNITUDE Chi JCO 2023) and олапариб + абіратерон (PROpel Clarke
  NEJM Evid 2022) are схвалений FDA 1L combinations for HRR- altered mCRPC. талазопариб
  + ензалутамід (TALAPRO-2 Agarwal Lancet 2023) is FDA-схвалений для HRR-mutated mCRPC
  1L. рукапариб has accelerated схвалення for BRCA1/2 mCRPC post-androgen-receptor-
  таргетна терапія (TRITON3) per SRC-NCCN-PROSTATE-2025, SRC-ESMO-PROSTATE-2024, SRC-EAU-PROSTATE-2024.

  '
