notes: 'ESCAT IIA. OncoKB Level 2. IDH-mut GBM is a distinct entity from IDH-WT GBM
  and has better prognosis. R132H IHC is the standard screening test; non-canonical
  R132 require sequencing.

  '
notes_ua: 'ESCAT IIA. OncoKB Level 2. IDH-мутована GBM — окрема нозологічна одиниця,
  відмінна від IDH-WT GBM, з кращим прогнозом. Імуногістохімія R132H — стандартний
  скринінговий тест; неканонічні варіанти R132 потребують секвенування.

  '
