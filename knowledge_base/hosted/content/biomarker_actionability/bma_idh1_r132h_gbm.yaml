id: BMA-IDH1-R132H-GBM
biomarker_id: BIO-IDH-MUTATION
variant_qualifier: IDH1 R132H
disease_id: DIS-GBM
escat_tier: IIA
evidence_summary: 'IDH1 R132H — defines IDH-mutant astrocytoma (WHO 2021 grade 2-4)
  and oligodendroglioma (with 1p/19q codeletion). Vorasidenib improved PFS in residual/recurrent
  grade 2 IDH-mut glioma post- resection (INDIGO, Mellinghoff et al. NEJM 2023) —
  FDA-approved 2024. For grade 4 (IDH-mut GBM equivalent) — standard of care still
  RT + TMZ; ivosidenib explored.

  '
evidence_summary_ua: 'IDH1 R132H — визначає IDH-мутантну астроцитому (WHO 2021,
  ступінь 2-4) та олігодендрогліому (з ко-делецією 1p/19q). Ворасиденіб (vorasidenib)
  покращив виживаність без прогресування при резидуальній/рецидивній IDH-мутантній
  гліомі ступеня 2 після резекції (INDIGO, Mellinghoff et al., NEJM 2023) — схвалений
  FDA у 2024 році. Для гліом ступеня 4 (еквівалент IDH-мутантної GBM) стандартом
  лікування залишається стандарт лікування — променева терапія + темозоломід (temozolomide;
  TMZ); івосидениб (ivosidenib) досліджується.

  '
