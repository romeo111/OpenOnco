id: BMA-IDH2-R140Q-AML
biomarker_id: BIO-IDH-MUTATION
variant_qualifier: IDH2 R140Q
disease_id: DIS-AML
escat_tier: IA
evidence_summary: 'IDH2 R140Q (~5-9% of AML). Enasidenib (IDHIFA, AG221-C-001 Stein
  et al. Blood 2017) FDA-approved 2017 for R/R IDH2-mut AML. IDHENTIFY (Ph3) confirmed
  OS benefit late-line. Combos with azacitidine (Ph2) promising 1L unfit.

  '
evidence_summary_ua: 'IDH2 R140Q (~5-9% випадків AML). Енасиденіб (enasidenib; IDHIFA,
  AG221-C-001, Stein et al., Blood 2017) схвалений FDA у 2017 році для рецидивного/
  рефрактерного IDH2-мутованого AML. Дослідження IDHENTIFY (фаза 3) підтвердило
  виграш у загальній виживаності в пізніх лініях терапії. Комбінації з азацитидином
  (azacitidine; фаза 2) перспективні у 1L для пацієнтів, не придатних до інтенсивної
  терапії.

  '
