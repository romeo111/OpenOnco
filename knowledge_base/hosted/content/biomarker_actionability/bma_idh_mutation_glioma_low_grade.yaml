id: BMA-IDH-MUTATION-GLIOMA-LOW-GRADE
biomarker_id: BIO-IDH-MUTATION
variant_qualifier: "IDH1 or IDH2 mutation (IDH1 R132H most common >90%; IDH1 R132C/G/S/L; IDH2 R140Q/R172K — WHO CNS grade 2 astrocytoma or oligodendroglioma context)"
disease_id: DIS-GLIOMA-LOW-GRADE
escat_tier: IA
evidence_summary: >
  IDH1/IDH2 mutation is the defining molecular feature of WHO grade 2 (and 3) diffuse gliomas —
  astrocytoma, IDH-mutant and oligodendroglioma, IDH-mutant and 1p/19q codeleted. Vorasidenib
  (dual IDH1/IDH2 inhibitor) is FDA-approved (Aug 2024) for IDH1- or IDH2-mutated grade 2
  glioma in adults following prior surgery. INDIGO trial (Mellinghoff et al. NEJM 2023 —
  phase III, 331 pts): vorasidenib 40 mg/day vs placebo; mPFS 27.7 vs 11.1 mo (HR 0.39,
  p<0.001); 61% reduction in risk of progression or death; time to next intervention also
  significantly improved. The approval defines a new 1L systemic standard after surgery for
  IDH-mutant grade 2 glioma. EANO 2024 guidelines incorporate vorasidenib as preferred systemic
  option at progression or post-biopsy-only grade 2 IDH-mutant glioma. IDH1 R132H accounts for
  >90% of IDH-mutant LGG; IDH2 mutations ~3-5%; rare non-R132H IDH1 mutations ~5%.
evidence_summary_ua: >
  Мутація IDH1/IDH2 — визначальна молекулярна ознака гліом WHO grade 2 і 3. Ворасиденіб
  (подвійний інгібітор IDH1/2) — схвалено FDA (серпень 2024) для IDH1- або IDH2-мутованої
  гліоми grade 2 у дорослих після хірургії. Дослідження INDIGO (фаза III): ворасиденіб vs
  плацебо; мВБП 27.7 vs 11.1 міс (HR 0.39, p<0.001). Визначає новий стандарт 1Л системного
  лікування для IDH-мутованої гліоми grade 2. IDH1 R132H — >90% IDH-мутованих LGG.
