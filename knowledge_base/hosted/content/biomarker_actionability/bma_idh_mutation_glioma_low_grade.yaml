actionability_review_required: true
notes: >
  ESCAT IA. INDIGO trial is the first phase III RCT to demonstrate PFS benefit with a
  targeted agent in low-grade glioma. IDH mutation testing by next-generation sequencing
  or immunohistochemistry (IDH1 R132H antibody — covers >90%) is now mandatory in all
  WHO grade 2-3 glioma per WHO CNS 2021 classification. Vorasidenib has better CNS
  penetration than ivosidenib (specifically developed for brain tumor context). Strong
  safety profile: hepatotoxicity monitoring (LFTs) required — grade 3+ ALT elevation ~10%.
  Do not confuse with GBM (IDH-wildtype grade 4) where vorasidenib has no approval.
