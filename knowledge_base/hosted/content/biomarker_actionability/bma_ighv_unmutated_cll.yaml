id: BMA-IGHV-UNMUTATED-CLL
biomarker_id: BIO-IGHV-MUTATIONAL-STATUS
variant_qualifier: IGHV-unmutated (≥98% homology to germline) — adverse risk; ~50-60%
  of CLL
disease_id: DIS-CLL
escat_tier: IA
evidence_summary: 'IGHV mutational status is a fundamental CLL risk stratifier and
  treatment-selection biomarker per SRC-NCCN-BCELL-2025, SRC-ESMO-CLL-2024, SRC-MOZ-UA-CLL-2022.
  IGHV-unmutated CLL has shorter response to chemoimmunotherapy (CIT — FCR, BR) and
  is now a strong indication for continuous BTK inhibitor (ibrutinib, acalabrutinib,
  zanubrutinib) or fixed-duration venetoclax-obinutuzumab as 1L regardless of TP53
  status. CLL14 (Fischer NEJM 2019 — venetoclax + obinutuzumab fixed-duration vs chlorambucil
  + obinutuzumab) and ECOG E1912 (Shanafelt NEJM 2019 — ibrutinib + rituximab vs FCR)
  are foundational trials that demonstrated CIT inferiority specifically in IGHV-
  unmutated subgroups. ESMO 2024 explicitly recommends against FCR/BR 1L in IGHV-unmutated
  patients.

  '
evidence_summary_ua: 'Мутаційний статус IGHV — фундаментальний стратифікатор ризику
  при ХЛЛ та біомаркер вибору лікування згідно з SRC-NCCN-BCELL-2025, SRC-ESMO-CLL-2024,
  SRC-MOZ-UA-CLL-2022. ХЛЛ із немутованим IGHV має коротшу відповідь на хіміоімунотерапію
  (CIT — FCR, BR) і наразі є сильним показанням для безперервної терапії BTK-інгібіторами
  (ібрутиніб (ibrutinib), акалабрутиніб (acalabrutinib), занубрутиніб (zanubrutinib))
  або фіксованою комбінацією венетоклакс (venetoclax) + обінутузумаб (obinutuzumab) у
  1L незалежно від статусу TP53. CLL14 (Fischer, NEJM 2019 — венетоклакс + обінутузумаб
  у фіксованій тривалості проти хлорамбуцилу (chlorambucil) + обінутузумабу) та ECOG
  E1912 (Shanafelt, NEJM 2019 — ібрутиніб + ритуксимаб (rituximab) проти FCR) — основоположні
  дослідження, які продемонстрували поступливість CIT, зокрема у підгрупах із немутованим
  IGHV. Настанови ESMO 2024 явно не рекомендують застосування FCR/BR у 1L у пацієнтів
  з немутованим IGHV.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_04
draft_revision: 2
regulatory_approval:
  fda:
  - ibrutinib — CLL/SLL 1L (FDA approved 2016)
  - acalabrutinib — CLL/SLL (FDA approved 2019)
  - zanubrutinib — CLL/SLL (FDA approved 2023)
  - venetoclax + obinutuzumab — 1L CLL fixed-duration (FDA approved 2019)
  ema:
  - ibrutinib — CLL 1L (EMA approved 2014)
  - acalabrutinib — CLL (EMA approved 2020)
  - zanubrutinib — CLL (EMA approved 2023)
  - venetoclax + obinutuzumab — 1L CLL (EMA approved 2020)
  ukraine: []
recommended_combinations:
- ibrutinib continuous monotherapy (1L IGHV-unmutated per SRC-NCCN-BCELL-2025, SRC-ESMO-CLL-2024)
- acalabrutinib ± obinutuzumab (1L IGHV-unmutated per SRC-NCCN-BCELL-2025)
- zanubrutinib continuous monotherapy (1L IGHV-unmutated per SRC-NCCN-BCELL-2025)
- venetoclax + obinutuzumab fixed-duration 12 mo (1L IGHV-unmutated per SRC-NCCN-BCELL-2025,
  SRC-ESMO-CLL-2024)
contraindicated_monotherapy:
- FCR (fludarabine/cyclophosphamide/rituximab) in IGHV-unmutated CLL (inferior PFS
  — explicitly not recommended per SRC-ESMO-CLL-2024)
- BR (bendamustine/rituximab) as preferred 1L in IGHV-unmutated young/fit (inferior
  to BTKi per SRC-NCCN-BCELL-2025)
primary_sources:
- SRC-NCCN-BCELL-2025
- SRC-ESMO-CLL-2024
- SRC-MOZ-UA-CLL-2022
