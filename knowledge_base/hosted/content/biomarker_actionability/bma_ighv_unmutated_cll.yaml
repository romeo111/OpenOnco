notes: 'ESCAT IA / OncoKB Level 2 (predictive biomarker — selects between drug classes,
  no targeted IGHV agent). IGHV-mutated favorable-risk patients without TP53 disruption
  have durable PFS with FCR (E1912 showed FCR was non-inferior to ibrutinib+rituximab
  in IGHV-mut), but FCR carries long-term MDS/AML risk so younger patients are increasingly
  offered targeted therapy regardless. Source-gap: SRC-CLL14-FISCHER-2019, SRC-ECOG-E1912-SHANAFELT-2019,
  SRC-ELEVATE-TN not yet ingested.

  '
notes_ua: 'ESCAT IA / OncoKB Level 2 (предиктивний біомаркер — обирає між класами
  препаратів, специфічного IGHV-таргетного агента не існує). Пацієнти з мутованим
  IGHV сприятливого ризику без порушення TP53 мають тривалу виживаність без прогресування
  на FCR (E1912 показало, що FCR не поступається ібрутинібу + ритуксимабу при
  IGHV-мутованому ХЛЛ), однак FCR має віддалений ризик розвитку МДС/AML, тому молодшим
  пацієнтам дедалі частіше пропонують таргетну терапію незалежно від цього. Прогалина
  у джерелах: SRC-CLL14-FISCHER-2019, SRC-ECOG-E1912-SHANAFELT-2019, SRC-ELEVATE-TN
  ще не інгестовані.

  '
