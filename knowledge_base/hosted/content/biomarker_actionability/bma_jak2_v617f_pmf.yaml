id: BMA-JAK2-V617F-PMF
biomarker_id: BIO-JAK2
variant_qualifier: V617F (exon 14 — present in ~50-60% of primary myelofibrosis)
disease_id: DIS-PMF
escat_tier: IA
evidence_summary: 'JAK2 V617F is one of three defining drivers in primary myelofibrosis
  (~50-60%; CALR ~25%, MPL ~5-10%, triple-negative ~10%) and a WHO 2022 / ICC 2022
  major diagnostic criterion (per SRC-NCCN-MPN-2025, SRC-ESMO-MPN-2015). Treatment
  by symptom burden / risk score (DIPSS- Plus, MIPSS70, MIPSS70+v2): symptomatic intermediate/high-risk
  → ruxolitinib (COMFORT-I Verstovsek 2012 — 41.9% spleen response vs 0.7% placebo,
  OS benefit on extended follow-up); fedratinib for ruxolitinib-failure (JAKARTA2
  Harrison 2017 — 31% spleen response in RUX-failure); momelotinib for anemic patients
  (MOMENTUM Verstovsek 2023 — superior anemia + symptom benefit vs danazol). Allogeneic
  HCT is the only curative therapy and is recommended for transplant- eligible higher-risk
  patients per SRC-NCCN-MPN-2025.

  '
evidence_summary_ua: 'JAK2 V617F — один із трьох визначальних драйверів первинного
  мієлофіброзу (~50-60% випадків; CALR ~25%, MPL ~5-10%, тричі-негативні ~10%) та
  головний діагностичний критерій за WHO 2022 / ICC 2022 (згідно з SRC-NCCN-MPN-2025,
  SRC-ESMO-MPN-2015). Лікування — за тяжкістю симптомів / шкалою ризику (DIPSS-Plus,
  MIPSS70, MIPSS70+v2): симптомне захворювання проміжного/високого ризику → руксолітиніб
  (ruxolitinib; COMFORT-I, Verstovsek 2012 — 41.9% селезінкової відповіді проти 0.7%
  у плацебо, виграш у загальній виживаності за подовженого спостереження); федратиніб
  (fedratinib) при невдачі руксолітинібу (JAKARTA2, Harrison 2017 — 31% селезінкової
  відповіді при невдачі RUX); момелотиніб (momelotinib) для пацієнтів з анемією
  (MOMENTUM, Verstovsek 2023 — переваги щодо анемії та симптомів порівняно з даназолом).
  Алогенна трансплантація гемопоетичних клітин (HCT) — єдина куративна терапія;
  рекомендована для пацієнтів вищого ризику, придатних до трансплантації, згідно з
  SRC-NCCN-MPN-2025.

  '
