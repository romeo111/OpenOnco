notes: 'ESCAT IA / OncoKB Level 1 — JAK-inhibitor therapy is genotype- agnostic (works
  for V617F, CALR, MPL, and triple-negative MF) because it targets downstream activated
  JAK-STAT signaling rather than the upstream mutation. Risk stratification (DIPSS-Plus,
  MIPSS70+v2) considers V617F allele burden indirectly via cytogenetics / molecular
  high-risk features. Source-gap: SRC-NCCN-MPN-2025 STUB.

  '
notes_ua: 'ESCAT IA / OncoKB Level 1 — терапія JAK-інгібіторами є генотип-агностичною
  (ефективна при V617F, CALR, MPL та тричі-негативному МФ), оскільки спрямована на
  низхідну активовану JAK-STAT-сигналізацію, а не на висхідну мутацію. Стратифікація
  ризику (DIPSS-Plus, MIPSS70+v2) враховує алельне навантаження V617F опосередковано —
  через цитогенетичні / молекулярні ознаки високого ризику. Прогалина у джерелах:
  SRC-NCCN-MPN-2025 — STUB.

  '
