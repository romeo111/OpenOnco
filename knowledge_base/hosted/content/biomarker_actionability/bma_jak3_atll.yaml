id: BMA-JAK3-ATLL
biomarker_id: BIO-JAK3
variant_qualifier: "JAK3 activating mutation (A572V, A573V, M511I most common) — adult T-cell leukemia/lymphoma (ATLL); predominantly aggressive subtypes (acute and lymphoma)"
disease_id: DIS-ATLL
escat_tier: IIA
evidence_summary: >
  JAK3 activating mutations are detected in ~35% of aggressive ATLL subtypes (acute and
  lymphoma types) and activate downstream STAT3/STAT5 independent of cytokine stimulation.
  Ruxolitinib (JAK1/2 inhibitor; FDA-approved for myelofibrosis, PV, GVHD, CTCL) has
  documented activity in JAK3-mutant ATLL: case series and retrospective analyses report
  ORRs of 40–67% in relapsed/refractory ATLL; single-arm phase II data is limited.
  No FDA approval for ATLL specifically. Mogamulizumab (anti-CCR4, FDA 2018 for CTCL) is
  approved for relapsed/refractory CTCL and ATLL in Japan; FDA approval is CTCL only in
  US — CCR4 expression is present in ~90% of ATLL independent of JAK3 status.
  JAK3 mutation confers worse prognosis in ATLL and identifies a subset potentially
  responsive to JAK pathway inhibition. ESCAT IIA: biomarker predicts response to an
  investigational (in ATLL context) therapy class (JAK inhibitors).
evidence_summary_ua: >
  Мутації JAK3 у ~35% агресивного ATLL (гострий, лімфоматозний). Руксоліті ніб
  (JAK1/2-інгібітор): ORR 40–67% при рецидивуючому ATLL (ретроспективно/серії випадків).
  Немає схвалення FDA для ATLL. Могамулізумаб (анти-CCR4): схвалений у Японії для ATLL;
  у США — лише CTCL (FDA 2018). JAK3 мутація → гірший прогноз та потенційна чутливість
  до JAK-інгібіторів. ESCAT IIA.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "ruxolitinib 20 mg PO BID (investigational in ATLL; dose per MF/GVHD approval; JAK3-mutant subset; clinical trial preferred)"
  - "mogamulizumab 1 mg/kg IV (approved for CTCL in US; used off-label for ATLL; CCR4-targeted, not JAK3-specific)"
  - "VCAP-AMP-VECP chemotherapy (standard aggressive ATLL per Japanese guidelines)"
primary_sources:
