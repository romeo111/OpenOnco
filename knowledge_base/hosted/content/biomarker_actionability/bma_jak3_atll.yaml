id: BMA-JAK3-ATLL
biomarker_id: BIO-JAK3
variant_qualifier: "JAK3 activating mutation (A572V, A573V, M511I most common) — adult T-cell leukemia/lymphoma (ATLL); predominantly aggressive subtypes (acute and lymphoma)"
disease_id: DIS-ATLL
escat_tier: IIA
evidence_summary: >
  JAK3 activating mutations are detected in ~35% of aggressive ATLL subtypes (acute and
  lymphoma types) and activate downstream STAT3/STAT5 independent of cytokine stimulation.
  Ruxolitinib (JAK1/2 inhibitor; FDA-approved for myelofibrosis, PV, GVHD, CTCL) has
  documented activity in JAK3-mutant ATLL: case series and retrospective analyses report
  ORRs of 40–67% in relapsed/refractory ATLL; single-arm phase II data is limited.
  No FDA approval for ATLL specifically. Mogamulizumab (anti-CCR4, FDA 2018 for CTCL) is
  approved for relapsed/refractory CTCL and ATLL in Japan; FDA approval is CTCL only in
  US — CCR4 expression is present in ~90% of ATLL independent of JAK3 status.
  JAK3 mutation confers worse prognosis in ATLL and identifies a subset potentially
  responsive to JAK pathway inhibition. ESCAT IIA: biomarker predicts response to an
  investigational (in ATLL context) therapy class (JAK inhibitors).
evidence_summary_ua: >
  Активуючі мутації JAK3 виявляються у ~35% агресивних підтипів дорослої T-клітинної
  лейкемії/лімфоми (ATLL — гострий та лімфоматозний типи) та активують низхідну
  STAT3/STAT5-сигналізацію незалежно від цитокінової стимуляції. Руксолітиніб
  (ruxolitinib; JAK1/2-інгібітор; схвалений FDA для мієлофіброзу, справжньої поліцитемії,
  GVHD, CTCL) має задокументовану активність при JAK3-мутованому ATLL: серії випадків
  та ретроспективні аналізи повідомляють про ORR 40–67% при рецидивному/рефрактерному
  ATLL; даних із одногрупних досліджень фази 2 обмаль. Схвалення FDA саме для ATLL
  відсутнє. Могамулізумаб (mogamulizumab; анти-CCR4, схвалений FDA у 2018 році для
  CTCL) схвалений для рецидивної/рефрактерної CTCL та ATLL у Японії; у США схвалений
  FDA лише для CTCL — експресія CCR4 наявна у ~90% випадків ATLL незалежно від статусу
  JAK3. Мутація JAK3 пов'язана з гіршим прогнозом при ATLL та визначає підгрупу,
  потенційно чутливу до інгібування JAK-шляху. ESCAT IIA: біомаркер прогнозує відповідь
  на дослідницький (у контексті ATLL) клас препаратів (JAK-інгібітори).
