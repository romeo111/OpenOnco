actionability_review_required: true
notes: >
  ESCAT IIA: JAK3 mutation predicts JAK inhibitor sensitivity in ATLL; no regulatory
  approval in ATLL for JAK inhibitors as of 2026. ATLL is caused by HTLV-1 (Human T-cell
  Leukemia Virus 1) and is endemic in Japan, the Caribbean, and parts of Africa/South
  America. Molecular landscape: JAK3 mutations (~35%), CCR4 mutations (~25%), RHOA
  G17V (~20%), PD-L1 amplification. Mogamulizumab (CCR4-targeted) has activity in ATLL
  independent of JAK3 status and is standard in Japan. Allogeneic HCT is potentially
  curative for fit patients with aggressive ATLL in CR. Ruxolitinib access: JAK3 mutation
  testing should be performed in all relapsed ATLL; if positive, ruxolitinib off-label or
  via compassionate use/basket trial is a reasonable option when standard therapies fail.
notes_ua: >
  ESCAT IIA: мутація JAK3 прогнозує чутливість до JAK-інгібіторів при ATLL; станом на
  2026 рік схвалення JAK-інгібіторів для ATLL відсутнє. ATLL спричинюється HTLV-1
  (T-клітинний лейкемічний вірус людини 1-го типу) та є ендемічною у Японії,
  Карибському басейні,
  частинах Африки/Південної Америки. Молекулярний ландшафт: мутації JAK3 (~35%),
  мутації CCR4 (~25%), RHOA G17V (~20%), ампліфікація PD-L1. Могамулізумаб
  (CCR4-таргетний) має активність при ATLL незалежно від статусу JAK3 та є стандартом
  у Японії. Алогенна трансплантація гемопоетичних клітин (HCT) потенційно куративна
  для пацієнтів, придатних до інтенсивної терапії, з агресивним ATLL у повній відповіді.
  Доступ до руксолітинібу: тестування на мутацію JAK3 слід проводити при всіх
  рецидивних випадках ATLL; за позитивного результату руксолітиніб off-label або
  через програму співчутливого використання / кошикові дослідження — обґрунтований
  варіант при невдачі стандартних терапій.
