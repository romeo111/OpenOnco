id: BMA-JAK3-CTCL
biomarker_id: BIO-JAK3
variant_qualifier: "JAK3 activating mutation — mycosis fungoides (MF) or Sézary syndrome (SS); JAK/STAT pathway hyperactivation; ruxolitinib approved for MF/SS regardless of JAK3 status"
disease_id: DIS-MF-SEZARY
escat_tier: IIA
evidence_summary: >
  Ruxolitinib cream (Opzelura) received FDA approval (September 2022) for mild-to-moderate
  atopic dermatitis; separately, ruxolitinib phosphate (Jakafi, oral) is FDA-approved
  for steroid-refractory acute/chronic GVHD but NOT specifically approved for CTCL as of
  2026. However, the JAK/STAT pathway is aberrantly activated in MF/SS (~30–50% have
  JAK3 mutations or JAK1/STAT3/STAT5 alterations), making JAK inhibitors an active
  investigational area. Phase II evidence: ruxolitinib (oral) ORR ~29% in relapsed/refractory
  MF (RUXO-MF pilot data); itacitinib (JAK1 inhibitor) and cerdulatinib (JAK/SYK inhibitor)
  in phase II trials for CTCL. The CTCL-specific approvals are for non-JAK-targeted agents:
  romidepsin (HDAC inhibitor; FDA 2009 CTCL), brentuximab vedotin (CD30+; FDA 2017),
  mogamulizumab (CCR4; FDA 2018), vorinostat (FDA 2006). JAK3-mutant CTCL: JAK3 mutation
  identifies a subset with stronger a priori rationale for JAK inhibitor use; ESCAT IIA
  reflects absence of dedicated FDA approval in CTCL despite biological rationale and early
  phase data.
evidence_summary_ua: >
  JAK/STAT-шлях гіперактивований у MF/SS (~30–50%: мутації JAK3, JAK1, STAT3/STAT5).
  Руксоліті ніб (пероральний): ORR ~29% при рецидивуючому MF (пілот). Немає схвалення FDA
  для CTCL (руксоліті ніб крем — атопічний дерматит; пероральний — РТПХ). Схвалені для CTCL:
  ромідепсин (FDA 2009), бренту ксимаб ведотин (CD30+; FDA 2017), могамулізумаб (CCR4;
  FDA 2018). JAK3-мутантний CTCL: сильніший а priori аргумент для JAK-інгібіторів.
  ESCAT IIA.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
