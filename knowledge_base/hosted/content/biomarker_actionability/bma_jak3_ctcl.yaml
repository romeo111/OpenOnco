    level: B
    direction: Supports
    significance: Sensitivity/Response
    note: "ESMO CTCL 2024: JAK/STAT pathway activation including JAK3 mutations present in ~30–50% MF/SS; JAK inhibitors investigational; early phase data supports activity; clinical trial enrollment preferred."
actionability_review_required: true
notes: >
  ESCAT IIA: JAK3 mutation enriches for JAK inhibitor sensitivity in CTCL; no FDA-approved
  JAK inhibitor for oral CTCL use as of 2026. Clinical decision: JAK3 testing in MF/SS
  informs trial eligibility for JAK inhibitor basket trials; does not currently change
  standard therapy sequence. Standard sequence for MF/SS: skin-directed therapy (topical
  steroids, phototherapy PUVA/UVB) → bexarotene → mogamulizumab or brentuximab vedotin
  (CD30+) → romidepsin → clinical trial (including JAK inhibitor trials for JAK-altered
  disease). Itacitinib (JAK1-selective) and cerdulatinib (JAK/SYK) have phase II CTCL
  data; watch for label updates. Note: mogamulizumab is CCR4-targeted (not JAK3-specific)
  and is FDA-approved for R/R MF/SS regardless of JAK3 status.
