id: BMA-KDR-NSCLC
biomarker_id: BIO-KDR
variant_qualifier: "KDR (VEGFR2) somatic activating mutation in NSCLC (~2–3%); no KDR mutation-selected approved therapy; ramucirumab approved for NSCLC regardless of KDR status"
disease_id: DIS-NSCLC
escat_tier: IIIB
evidence_summary: >
  KDR (VEGFR2) somatic activating mutations occur in ~2–3% of NSCLC across histologies.
  KDR is the primary signal transducer for VEGF-driven tumor angiogenesis; multiple approved
  anti-angiogenic agents target KDR/VEGFR2 (ramucirumab, cabozantinib, lenvatinib, sunitinib).
  Clinical evidence for KDR mutation-selected therapy in NSCLC:
  (1) Ramucirumab + docetaxel (REVEL, FDA 2014): approved 2L NSCLC (regardless of KDR status);
      ramucirumab is an anti-VEGFR2 antibody but approval is biomarker-unselected.
  (2) Bevacizumab + chemotherapy: VEGF-A targeted, not KDR-mutation selected; contraindicated
      in squamous histology (central tumor, hemorrhage risk).
  (3) Cabozantinib, lenvatinib: multi-RTK inhibitors with VEGFR2 activity; no KDR mutation-
      selected NSCLC approval; under investigation in basket trials.
  (4) Hypothesized predictive value: KDR activating mutation may confer intrinsic VEGFR2
      activation independent of VEGF-A — theoretically higher VEGFR2 dependence. No prospective
      evidence that KDR mutation predicts better response to ramucirumab vs. KDR wild-type.
  Standard of care: chemoimmunotherapy (pembrolizumab ± platinum) regardless of KDR status.
  ESCAT IIIB: prognostic/investigational marker; no approved KDR-selected therapy in NSCLC.
evidence_summary_ua: >
  Соматичні активуючі мутації KDR (VEGFR2) зустрічаються у ~2–3% випадків НМРЛ
  усіх гістологій. KDR — основний трансдуктор VEGF-залежного ангіогенезу пухлин;
  численні схвалені антиангіогенні препарати націлені на KDR/VEGFR2 (рамуцирумаб
  (ramucirumab), кабозантиніб (cabozantinib), ленватиніб (lenvatinib), сунітиніб
  (sunitinib)). Клінічні докази для KDR-мутаційно відібраної терапії при НМРЛ:
  (1) Рамуцирумаб + доцетаксел (docetaxel; REVEL, FDA 2014): схвалений у 2L НМРЛ
      незалежно від статусу KDR; рамуцирумаб — анти-VEGFR2-антитіло, проте схвалення
      не базується на біомаркерному відборі.
  (2) Бевацизумаб (bevacizumab) + хіміотерапія: націлений на VEGF-A, не на
      KDR-мутацію; протипоказаний при плоскоклітинній гістології (центральна пухлина,
      ризик кровотечі).
  (3) Кабозантиніб, ленватиніб: мульти-RTK-інгібітори з активністю проти VEGFR2; не
      мають KDR-мутаційно відібраного схвалення для НМРЛ; досліджуються у кошикових
      випробуваннях.
  (4) Гіпотетичне передбачувальне значення: активуюча мутація KDR може забезпечувати
      внутрішню активацію VEGFR2 незалежно від VEGF-A — теоретично вища залежність
      від VEGFR2. Проспективних доказів того, що мутація KDR прогнозує кращу відповідь
      на рамуцирумаб порівняно з KDR-WT, немає.
  Стандарт лікування: хіміоімунотерапія (пембролізумаб (pembrolizumab) ± платина)
  незалежно від статусу KDR. ESCAT IIIB: прогностичний/дослідницький маркер; KDR-відібраної
  схваленої терапії при НМРЛ немає.
