    direction: Does Not Support
    significance: Sensitivity/Response
    note: "NCCN NSCLC 2025: KDR/VEGFR2 mutation is not in the required NSCLC biomarker testing panel; ramucirumab is approved 2L NSCLC regardless of KDR status; KDR mutation does not modify treatment selection."
