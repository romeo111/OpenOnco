actionability_review_required: true
notes: >
  ESCAT IIIB: KDR mutation in NSCLC is an investigational marker. Practical notes:
  (1) KDR mutation is detectable on comprehensive NGS panels; not in NCCN's required biomarker
      panel (EGFR, ALK, ROS1, BRAF, KRAS, MET, RET, NTRK, PD-L1, TMB for NSCLC).
  (2) Anti-angiogenic treatment decisions use VEGF/VEGFR2 protein expression (PD-L1 analogue
      reasoning) or histology (bevacizumab contraindicated in squamous), not KDR mutation.
  (3) For KDR-mutant NSCLC patients who have progressed on standard therapy, basket trial
      enrollment with a VEGFR2/multi-TKI arm is appropriate.
  (4) KDR mutation in other tumor types (e.g., angiosarcoma, renal cell carcinoma) may have
      different clinical significance — those contexts are outside this BMA scope.
