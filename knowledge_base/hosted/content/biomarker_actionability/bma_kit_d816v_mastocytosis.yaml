notes: 'ESCAT IA. OncoKB Level 1. Source-gap: SRC-NCCN-SM-2025 / SRC-EXPLORER / SRC-PATHFINDER
  not yet ingested. AdvSM diagnosis requires WHO- defined C-findings (cytopenias,
  hepatomegaly + dysfunction, organ damage). Indolent SM is generally NOT treated
  with KIT-TKI; symptomatic treatment only.

  '
notes_ua: 'ESCAT IA. OncoKB Level 1. Прогалина у джерелах: SRC-NCCN-SM-2025 /
  SRC-EXPLORER / SRC-PATHFINDER ще не інгестовані. Діагностика AdvSM потребує
  C-критеріїв за WHO (цитопенії, гепатомегалія + дисфункція, ураження органів).
  Індолентний SM зазвичай НЕ лікується KIT-TKI; лише симптоматичне лікування.

  '
