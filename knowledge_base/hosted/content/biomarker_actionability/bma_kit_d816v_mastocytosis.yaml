id: BMA-KIT-D816V-MASTOCYTOSIS
biomarker_id: BIO-KIT
variant_qualifier: D816V (activation loop, exon 17 — >90% of advanced systemic mastocytosis)
disease_id: DIS-MASTOCYTOSIS
escat_tier: IA
evidence_summary: 'KIT D816V in advanced systemic mastocytosis (AdvSM — aggressive
  SM, SM-AHN, mast cell leukemia): midostaurin (EXPLORER / D2201 phase 2, Gotlib NEJM
  2016 — ORR 60%) and avapritinib (PATHFINDER / EXPLORER, Gotlib JCO 2023 — ORR 75%,
  deeper molecular response) are FDA- approved. Avapritinib selectively targets the
  D816V conformation with high potency. Imatinib is INACTIVE against D816V — distinct
  from imatinib-sensitive juxtamembrane mutations.

  '
evidence_summary_ua: 'KIT D816V при поширеному системному мастоцитозі (AdvSM —
  агресивний SM, SM-AHN, лейкоз тучних клітин): мідостаурин (midostaurin; EXPLORER /
  D2201, фаза 2, Gotlib, NEJM 2016 — ORR 60%) та авапритиніб (avapritinib; PATHFINDER /
  EXPLORER, Gotlib, JCO 2023 — ORR 75%, глибша молекулярна відповідь) схвалені FDA.
  Авапритиніб селективно діє на D816V-конформацію з високою потенцією. Іматиніб
  (imatinib) НЕАКТИВНИЙ проти D816V — на відміну від іматиніб-чутливих юкстамембранних
  мутацій.

  '
