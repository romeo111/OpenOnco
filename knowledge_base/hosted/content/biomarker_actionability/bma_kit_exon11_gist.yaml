id: BMA-KIT-EXON11-GIST
biomarker_id: BIO-KIT
variant_qualifier: exon 11 deletion / insertion (juxtamembrane domain — ~50% of GIST)
disease_id: DIS-GIST
escat_tier: IA
evidence_summary: 'KIT exon 11 mutation in GIST: imatinib 400 mg/day is standard 1L
  (B2222, Demetri NEJM 2002 — ORR 67%; EORTC-62005 / S0033 confirmed long-term benefit).
  Exon 11 mutants have the longest PFS and OS on imatinib of any GIST genotype. Adjuvant
  imatinib 3 yr post- resection improves RFS in high-risk disease (SSG-XVIII / ACOSOG-Z9001).

  '
evidence_summary_ua: 'Мутації KIT в екзоні 11 при GIST: іматиніб (imatinib) 400 mg/day —
  стандарт лікування 1L (B2222, Demetri, NEJM 2002 — ORR 67%; EORTC-62005 / S0033
  підтвердили віддалені переваги). Носії мутацій екзону 11 мають найдовшу виживаність
  без прогресування та загальну виживаність на іматинібі серед усіх GIST-генотипів.
  Ад''ювантний іматиніб упродовж 3 років після резекції покращує виживаність без
  рецидиву при високого ризику захворюванні (SSG-XVIII / ACOSOG-Z9001).

  '
