notes: 'ESCAT IA. OncoKB Level 1. Source-gap: SRC-NCCN-SARCOMA / SRC-NCCN-GIST-2025
  / SRC-B2222-DEMETRI / SRC-EORTC-62005 / SRC-SSG-XVIII not yet ingested — using SRC-NCCN-MELANOMA-2025
  placeholder per DIS-GIST source gap. SRC-IRIS-OBRIEN-2003 cited as the imatinib
  pivotal CML/GIST-era reference. Resistance: secondary KIT exon 13/14 (ATP-binding)
  or 17/18 (activation loop) mutations emerge during therapy.

  '
notes_ua: 'ESCAT IA. OncoKB Level 1. Прогалина у джерелах: SRC-NCCN-SARCOMA /
  SRC-NCCN-GIST-2025 / SRC-B2222-DEMETRI / SRC-EORTC-62005 / SRC-SSG-XVIII ще не
  інгестовані — використано плейсхолдер SRC-NCCN-MELANOMA-2025 у зв''язку з прогалиною
  в джерелах для DIS-GIST. SRC-IRIS-OBRIEN-2003 цитоване як ключове джерело
  CML/GIST-епохи для іматинібу. Резистентність: вторинні мутації KIT в екзонах 13/14
  (ATP-зв''язуючий домен) або 17/18 (активаційна петля) виникають у процесі терапії.

  '
