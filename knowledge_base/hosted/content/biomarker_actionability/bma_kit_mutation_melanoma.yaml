id: BMA-KIT-MUTATION-MELANOMA
biomarker_id: BIO-KIT
variant_qualifier: activating mutation (exon 11 / 13 / 17 — enriched in mucosal/acral
  melanoma ~15-20%)
disease_id: DIS-MELANOMA
escat_tier: IB
evidence_summary: 'KIT mutation in mucosal / acral / chronic-sun-damaged melanoma
  (~15-20% of these subtypes; rare in cutaneous CSD-low): imatinib has activity (Carvajal
  JCO 2013; Hodi JCO 2013 — ORR 16-23% in selected KIT-mutant melanoma). Exon 11 L576P
  and exon 13 K642E are the most imatinib-responsive variants. Modern frontline is
  immunotherapy (anti-PD-1 ± anti-CTLA-4); imatinib is reserved for IO-refractory
  or IO-ineligible KIT-mutant disease.

  '
evidence_summary_ua: 'Мутація KIT при слизовій / акральній / хронічно сонячно-пошкодженій
  (CSD) меланомі (~15-20% цих підтипів; рідко при шкірній CSD-low): іматиніб (imatinib)
  виявляє активність (Carvajal, JCO 2013; Hodi, JCO 2013 — ORR 16-23% при відібраній
  KIT-мутованій меланомі). Найбільш чутливими до іматинібу варіантами є exon-11 L576P
  та exon-13 K642E. Сучасна перша лінія — імунотерапія (анти-PD-1 ± анти-CTLA-4);
  іматиніб резервується для IO-рефрактерної або IO-непридатної KIT-мутованої хвороби.

  '
