actionability_review_required: true
notes: >
  ESCAT IA (accelerated approval; confirmatory phase III AUGMENT-101P ongoing). Drug-drug
  interaction caution: revumenib is a CYP3A4 substrate; strong CYP3A4 inhibitors (azoles)
  require dose reduction to 95 mg BID. QTc prolongation monitoring required (baseline ECG,
  potassium/magnesium correction). Differentiation syndrome risk (similar to ATRA in APL) —
  monitor for fever, hypotension, pulmonary infiltrates; prophylactic corticosteroids under
  evaluation. Bridge to alloHCT should be planned for all eligible patients achieving remission.
  NPM1-mutated AML is a separate FDA-approved indication for revumenib (same drug, different
  biomarker mechanism) — see BMA for NPM1 when created.
notes_ua: >
  ESCAT IA (прискорене схвалення; підтверджувальне дослідження фази 3 AUGMENT-101P
  триває). Обережність щодо лікарських взаємодій: ревуменіб — субстрат CYP3A4; сильні
  інгібітори CYP3A4 (азоли) вимагають зниження дози до 95 mg двічі на добу. Необхідний
  моніторинг подовження QTc (базове ЕКГ, корекція рівня калію/магнію). Ризик синдрому
  диференціації (подібно до ATRA при APL) — спостереження за лихоманкою, гіпотензією,
  інфільтратами в легенях; профілактичні кортикостероїди під оцінкою. Усім придатним
  пацієнтам, які досягли ремісії, слід планувати міст до алоHCT. NPM1-мутований AML —
  окреме FDA-схвалене показання для ревуменібу (той самий препарат, інший біомаркерний
  механізм) — див. BMA для NPM1, коли буде створено.
