id: BMA-KMT2A-REARR-AML
biomarker_id: BIO-KMT2A-REARRANGEMENT
variant_qualifier: "KMT2A (MLL) rearrangement — any fusion partner (KMT2A-MLLT3/AF9, KMT2A-MLLT4/AF6, KMT2A-ELL, KMT2A-MLLT1/ENL, KMT2A-AF1Q, KMT2A-AFDN among others; detected by FISH, RNA-seq, or cytogenetics)"
disease_id: DIS-AML
escat_tier: IA
evidence_summary: >
  Revumenib (SNDX-5613), an oral menin inhibitor, is FDA-approved (Nov 2024) for
  relapsed/refractory KMT2A-rearranged acute leukemia (AML and ALL). AUGMENT-101 (Issa et al.
  NEJM 2023; Erba et al. ASH 2023 update): KMT2A-rearranged R/R AML/ALL — ORR 23% (CR + CRh
  + CRi), complete remission with full recovery 18%; mOS 8.0 mo. FDA accelerated approval
  based on remission rate as surrogate endpoint. KMT2A rearrangement is present in ~10% of
  adult AML (more common in secondary/therapy-related AML and infant leukemia). Menin is an
  essential co-factor of KMT2A-fusion oncoproteins — revumenib disrupts menin-MLL interaction,
  restoring differentiation block. Combination strategies under evaluation: revumenib +
  venetoclax + azacitidine (phase II ongoing). ELN 2022 risk: KMT2A-rearranged AML classified
  as intermediate risk (specific partner-dependent — MLLT3 intermediate; others may be adverse).
evidence_summary_ua: >
  Ревуменіб (revumenib; SNDX-5613) — пероральний інгібітор меніну, схвалений FDA
  (листопад 2024) для рецидивного/рефрактерного гострого лейкозу з перебудовою KMT2A
  (AML та ALL). AUGMENT-101 (Issa et al., NEJM 2023; Erba et al., оновлення ASH 2023):
  KMT2A-перебудований рецидивний/рефрактерний AML/ALL — ORR 23% (CR + CRh + CRi),
  повна ремісія з повним відновленням 18%; медіана загальної виживаності 8.0 міс.
  Прискорене схвалення FDA базується на рівні ремісії як сурогатній кінцевій точці.
  Перебудова KMT2A присутня у ~10% дорослих з AML (частіше при вторинному / асоційованому
  з терапією AML та лейкозах немовлят). Менін — ессенціальний ко-фактор KMT2A-фузійних
  онкопротеїнів; ревуменіб руйнує взаємодію менін-MLL, відновлюючи диференціювання.
  Комбінаторні стратегії під вивченням: ревуменіб + венетоклакс + азацитидин (триває
  фаза 2). Ризик за ELN 2022: KMT2A-перебудований AML класифікований як проміжний
  ризик (специфічний партнер-залежний — MLLT3 проміжний; інші можуть бути несприятливими).
