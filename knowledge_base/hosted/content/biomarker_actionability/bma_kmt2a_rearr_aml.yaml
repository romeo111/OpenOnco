    level: "Category 2A"
    direction: Supports
    significance: Sensitivity/Response
    note: "NCCN AML 2025: revumenib listed for R/R KMT2A-rearranged or NPM1-mutated AML per FDA accelerated approval. Bridge-to-transplant intent preferred when CR achieved."
  - source: SRC-ELN-AML-2022
    level: B
