actionability_review_required: true
notes: >
  ESCAT IA (accelerated approval, confirmatory trial ongoing). KMT2A-AFF1 (t(4;11)) is
  the most common rearrangement in adult B-ALL and is uniformly adverse-risk per ELN/NCCN.
  Infant B-ALL with KMT2A rearrangement: revumenib use in pediatric/infant context is still
  experimental (AUGMENT-101 enrolled adults; pediatric trials underway). QTc monitoring and
  CYP3A4 interaction management apply equally to B-ALL as AML setting (see BMA-KMT2A-REARR-AML
  notes). AlloHCT in CR1 remains mandatory for all fit adults with KMT2A-rearranged B-ALL
  regardless of MRD status.
notes_ua: >
  ESCAT IA (прискорене схвалення; підтверджувальне дослідження триває). KMT2A-AFF1
  (t(4;11)) — найпоширеніша перебудова при B-ALL у дорослих та однозначно несприятливий
  ризик за ELN/NCCN. B-ALL з KMT2A-перебудовою у немовлят: застосування ревуменібу в
  педіатричному / неонатальному контексті залишається експериментальним (AUGMENT-101
  включало дорослих; педіатричні дослідження тривають). Моніторинг QTc та ведення
  взаємодій з CYP3A4 застосовуються однаково при B-ALL та AML (див. примітки до
  BMA-KMT2A-REARR-AML). АлоHCT у CR1 залишається обов'язковою для всіх придатних
  дорослих з KMT2A-перебудованим B-ALL незалежно від MRD-статусу.
