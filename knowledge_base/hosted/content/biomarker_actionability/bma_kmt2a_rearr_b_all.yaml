id: BMA-KMT2A-REARR-B-ALL
biomarker_id: BIO-KMT2A-REARRANGEMENT
variant_qualifier: "KMT2A (MLL) rearrangement — any fusion partner; infant ALL (KMT2A-AFF1/AF4 most common ~80%) or adult B-ALL"
disease_id: DIS-B-ALL
escat_tier: IA
evidence_summary: >
  Revumenib (menin inhibitor) FDA-approved (Nov 2024) for relapsed/refractory KMT2A-rearranged
  acute leukemia including B-ALL. AUGMENT-101 combined KMT2A-rearranged cohort (AML + ALL):
  ORR 23%, CR/CRh 18%. KMT2A rearrangement defines a high-risk B-ALL subset: in infants
  KMT2A-AFF1 is present in ~80% of infant B-ALL (EFS <30% with standard chemotherapy);
  in adults KMT2A-rearranged B-ALL is adverse-risk (NCCN/ELN). Revumenib represents a
  first targeted option for this historically chemotherapy-refractory population. Blinatumomab
  (CD19 BiTE, FDA-approved for R/R B-ALL) and inotuzumab ozogamicin are also active in
  KMT2A-rearranged B-ALL regardless of KMT2A status, but revumenib is the first mutation-specific
  approved agent. AlloHCT in CR remains the standard consolidation for eligible adults.
evidence_summary_ua: >
  Ревуменіб — схвалено FDA (листопад 2024) для рецидивуючого/рефрактерного B-ГЛЛ з перебудовою
  KMT2A. AUGMENT-101: ORR 23%, CR/CRh 18% у комбінованій когорті KMT2A-rearranged. Перебудова
  KMT2A визначає групу високого ризику B-ГЛЛ: у немовлят KMT2A-AFF1 — ~80% infant B-ALL
  (EFS <30% при стандартній хіміотерапії); у дорослих — несприятливий ризик. Перший таргетний
  препарат для цієї популяції.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "revumenib — R/R KMT2A-rearranged acute leukemia including B-ALL (FDA accelerated approval Nov 2024)"
  ema:
    - "revumenib — EMA review ongoing 2025"
  ukraine: []
recommended_combinations:
  - "revumenib 163 mg PO BID monotherapy (dose-adjusted for CYP3A4 inhibitors to 95 mg BID)"
  - "blinatumomab (independent of KMT2A status; CD19-targeted; R/R B-ALL per TOWER trial)"
  - "inotuzumab ozogamicin (CD22-targeted; R/R B-ALL per INO-VATE trial)"
primary_sources:
  - SRC-NCCN-ALL-2025
last_verified: "2026-05-03"
evidence_sources:
  - source: SRC-NCCN-ALL-2025
    level: "Category 2A"
    direction: Supports
    significance: Sensitivity/Response
    note: "NCCN ALL 2025: revumenib listed for R/R KMT2A-rearranged B-ALL per FDA accelerated approval. Preferred bridge-to-transplant strategy."
actionability_review_required: true
notes: >
  ESCAT IA (accelerated approval, confirmatory trial ongoing). KMT2A-AFF1 (t(4;11)) is
  the most common rearrangement in adult B-ALL and is uniformly adverse-risk per ELN/NCCN.
  Infant B-ALL with KMT2A rearrangement: revumenib use in pediatric/infant context is still
  experimental (AUGMENT-101 enrolled adults; pediatric trials underway). QTc monitoring and
  CYP3A4 interaction management apply equally to B-ALL as AML setting (see BMA-KMT2A-REARR-AML
  notes). AlloHCT in CR1 remains mandatory for all fit adults with KMT2A-rearranged B-ALL
  regardless of MRD status.
