actionability_review_required: true
notes: >
  ESCAT IV: no approved targeted therapy for KRAS G12V in NSCLC (as of 2026). The absence
  of a cysteine residue in the G12V substitution prevents covalent binding by G12C-selective
  inhibitors (sotorasib, adagrasib). Clinical priority: (1) confirm KRAS G12V by validated
  NGS; (2) co-test PD-L1, STK11, KEAP1, TMB; (3) treat per PD-L1 algorithm; (4) refer
  to KRAS G12V-specific trials. HLA-A*11:01 typing may be relevant if adoptive T-cell
  therapy trials are available locally. KRAS G12V occurs at higher frequency in
  never-smokers compared with G12C (smoker-associated). Do not confuse with KRAS G12C —
  the mutation subtype must be confirmed before counseling patients about targeted therapy
  options; patients may have heard of sotorasib/adagrasib from community oncologists.
