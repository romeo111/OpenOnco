    significance: Sensitivity/Response
    note: "NCCN NSCLC 2025: no approved targeted therapy for KRAS G12V. Standard chemoimmunotherapy algorithm applies; KRAS G12V is not an exclusion criterion for ICI but STK11/KEAP1 co-mutations should be assessed."
