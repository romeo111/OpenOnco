id: BMA-KRAS-G12V-NSCLC
biomarker_id: BIO-KRAS-G12V
variant_qualifier: "KRAS G12V (p.G12V; c.35G>T) — glycine-to-valine substitution; no cysteine for covalent G12C-inhibitor binding"
disease_id: DIS-NSCLC
escat_tier: IV
evidence_summary: >
  KRAS G12V occurs in ~3–5% of NSCLC (less common than G12C ~13% and G12D ~5%). Unlike
  KRAS G12C, there is no FDA/EMA-approved selective inhibitor for G12V as of 2026 — the
  G12C-selective covalent inhibitors (sotorasib, adagrasib) require the cysteine substitution
  and are inactive against G12V. Standard treatment follows usual NSCLC algorithm:
  platinum-based chemotherapy + pembrolizumab (PD-L1 ≥50%) or chemoimmunotherapy
  (PD-L1 any) per NCCN/ESMO. Investigational strategies: pan-KRAS inhibitors
  (RMC-6236, Revolution Medicines — phase I/II KRYSTAL-G12V-like programs), KRAS G12V-selective
  non-covalent inhibitors in early clinical development, SOS1 inhibitors + MEK inhibitors
  (combinatorial approaches to bypass KRAS G12V). Adoptive T-cell therapy targeting KRAS G12V
  neoantigen on HLA-A*11:01 (NCT03399448, MSK) — early phase with objective responses
  reported (Leidner et al. NEJM 2022 in one metastatic rectal case; NSCLC trials ongoing).
  STK11 and KEAP1 co-mutations (common in KRAS-mutant NSCLC) predict inferior ICI response
  and should be tested concurrently.
evidence_summary_ua: >
  KRAS G12V виявляється у ~3–5% NSCLC (рідше G12C ~13% і G12D ~5%). На відміну від
  KRAS G12C, немає схвалених FDA/EMA селективних інгібіторів G12V станом на 2026 рік —
  ковалентні інгібітори G12C (соторасиб, адаграсиб) потребують залишку цистеїну і неактивні
  проти G12V. Стандартне лікування — за звичайним алгоритмом NSCLC: платина + пембролізумаб
  (PD-L1 ≥50%) або хімоімунотерапія (будь-який PD-L1). Дослідні підходи: пан-KRAS інгібітори
  (RMC-6236), SOS1-інгібітори, адоптивна Т-клітинна терапія проти G12V-неоантигену на
  HLA-A*11:01. Ко-мутації STK11/KEAP1 — предиктори гіршої відповіді на ІКТ.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "Standard platinum-based chemoimmunotherapy per PD-L1 status (pembrolizumab ± carboplatin/paclitaxel or pemetrexed per KEYNOTE-189/024)"
  - "Enrollment in KRAS G12V-selective inhibitor trials where available (e.g., RMC-6236 expansion cohorts)"
contraindicated_monotherapy:
  - "Sotorasib (G12C-specific covalent — not active on G12V; structure lacks cysteine target)"
  - "Adagrasib (G12C-specific covalent — same reason; G12V not a clinical indication)"
  - "Anti-EGFR therapy (cetuximab/panitumumab) — not used in NSCLC regardless of KRAS status; relevant only in CRC"
