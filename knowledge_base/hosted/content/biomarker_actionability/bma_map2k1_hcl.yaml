notes: >
  ESCAT IIA (no FDA approval; clinical evidence from small series; MAP2K1 mutation strongly
  predicts MEK inhibitor response in HCL-V subset). Differentiate HCL-V from classic HCL:
  HCL-V lacks TRAP positivity, CD25, CD123, CD11c (or dim); BRAF V600E absent; often more
  aggressive behavior. Standard HCL treatments (cladribine monotherapy, vemurafenib for
  BRAF-mutant classic HCL) are largely ineffective in HCL-V. Clinical trial enrollment
  preferred for MAP2K1-mutant HCL-V (basket trials of MEK inhibitors in MAPK-altered
  hematologic malignancies). Consider ofatumumab, bendamustine, ibrutinib (off-label) as
  alternatives if MAP2K1 mutation absent.
notes_ua: >
  ESCAT IIA (відсутнє схвалення FDA; клінічні дані обмежені невеликими серіями;
  мутація MAP2K1 надійно передбачає відповідь на MEK-інгібітори у підгрупі
  HCL-V). Диференційна діагностика HCL-V від класичної HCL: при HCL-V
  відсутня TRAP-позитивність, CD25, CD123, CD11c (або слабка експресія);
  BRAF V600E відсутня; перебіг часто більш агресивний. Стандартні режими
  лікування HCL (монотерапія кладрибіном, вемурафеніб для класичної
  BRAF-мутантної HCL) переважно неефективні при HCL-V. При MAP2K1-мутантній
  HCL-V переважним вибором є включення в клінічні дослідження
  (кошикові протоколи MEK-інгібіторів при MAPK-змінених гематологічних
  злоякісних новоутвореннях). За відсутності мутації MAP2K1 розглядаються
  офатумумаб, бендамустин (bendamustine), ібрутиніб (ibrutinib) (off-label)
  як альтернативи.
