id: BMA-MAP2K1-HCL
biomarker_id: BIO-MAP2K1
variant_qualifier: "MAP2K1 activating mutation (K57E, Q56P, E203K) — hairy cell leukemia variant (HCL-V); by definition BRAF V600E-negative"
disease_id: DIS-HCL
escat_tier: IIA
evidence_summary: >
  Hairy cell leukemia variant (HCL-V) is a rare splenic B-cell lymphoma (~10% of HCL cases)
  that is BRAF V600E-negative (in contrast to classic HCL where BRAF V600E is present in
  ~100%). MAP2K1 (MEK1) activating mutations are detected in ~40–50% of HCL-V cases and
  represent an alternative MAPK pathway activation mechanism. Unlike classic HCL (where
  vemurafenib or cladribine + rituximab are standard), HCL-V responds poorly to BRAF
  inhibitors and less well to purine analogues. Small series and case reports document
  activity of MEK inhibitors (cobimetinib, trametinib) in MAP2K1-mutant HCL-V: ORRs of
  50–80% in heavily pretreated patients. No phase III RCT; no FDA approval. NCCN lists
  MEK inhibitors as Category 2B for HCL-V with MAP2K1 mutation. Pentostatin + rituximab
  remains standard first-line for HCL-V. MAP2K1 testing recommended in all HCL-V to
  guide salvage therapy.
evidence_summary_ua: >
  Варіантна форма волосистоклітинного лейкозу (HCL-V) — рідкісна селезінкова
  B-клітинна лімфома (~10% усіх випадків HCL), яка за визначенням є
  BRAF V600E-негативною (на відміну від класичної HCL, де BRAF V600E
  присутня практично у 100% хворих). Активуючі мутації MAP2K1 (MEK1)
  (K57E, Q56P, E203K) виявляються у ~40–50% випадків HCL-V і представляють
  альтернативний механізм активації MAPK-сигнального шляху. На відміну
  від класичної HCL (де стандартом є вемурафеніб або кладрибін +
  ритуксимаб (rituximab)), HCL-V погано відповідає на BRAF-інгібітори
  та має нижчу чутливість до пуринових аналогів. Невеликі серії та
  клінічні випадки документують активність MEK-інгібіторів — кобіметинібу
  (cobimetinib) та траметинібу (trametinib) — у MAP2K1-мутантній HCL-V:
  ORR 50–80% у пацієнтів з кількома попередніми лініями терапії.
  Рандомізованих досліджень фази 3 немає; схвалення FDA відсутнє. NCCN
  відносить MEK-інгібітори до категорії 2B при HCL-V з мутацією MAP2K1.
  Пентостатин + ритуксимаб залишається стандартом першої лінії при HCL-V.
  Тестування MAP2K1 рекомендовано в усіх випадках HCL-V для вибору
  сальвадж-терапії.
