actionability_review_required: true
notes: >
  ESCAT IIA: MAP2K1 is an actionable MAPK pathway alteration in LGG; MEK inhibitors
  (trametinib) and RAF inhibitors (tovorafenib) active. BRAF fusion testing (FISH/RNA-seq)
  should be performed first in pLGG — BRAF-KIAA1549 fusion is the dominant driver and
  is most robustly treated with RAF inhibitors. MAP2K1 mutation may be identified when
  BRAF fusion and BRAF V600E are absent. IDH1/2 mutation status is critical for adult LGG:
  IDH-mutant → vorasidenib; IDH-wildtype + MAP2K1 → MEK inhibitors investigational.
  Comprehensive molecular testing recommended: IDH1/2, BRAF (fusion + V600E), MAP2K1,
  CDKN2A/B, 1p/19q codeletion (molecular oligodendroglioma), TERT promoter.
