id: BMA-MAP2K1-LGG
biomarker_id: BIO-MAP2K1
variant_qualifier: "MAP2K1 activating mutation — low-grade glioma (LGG); BRAF-fusion-negative, IDH-wildtype or IDH-mutant; MAPK pathway alternative activation"
disease_id: DIS-GLIOMA-LOW-GRADE
escat_tier: IIA
evidence_summary: >
  MAPK pathway activation is the hallmark of pediatric-type low-grade glioma (pLGG) and
  occurs in ~90% via BRAF-KIAA1549 fusion (~70%), BRAF V600E (~15%), or alternative MAPK
  alterations including MAP2K1 mutations (~5–10% of BRAF-fusion-negative pLGG). The
  FIREFLY-1 phase II trial (Kilburn et al., JCO 2024) demonstrated tovorafenib (type II
  RAF inhibitor) activity in pLGG with MAPK pathway alterations including MAP2K1 mutations:
  ORR 67% overall; MAP2K1 cohort showed responses. Trametinib (MEK1/2 inhibitor) has
  demonstrated activity in MAPK-pathway-altered pLGG in the TRAM-01 and FIREFLY-2 trials.
  In adult LGG, MAP2K1 mutations occur in ~5% (predominantly IDH-wildtype histiocytic NEC);
  data more limited. For adult IDH-mutant LGG, vorasidenib (IDH1/2 inhibitor) is now
  standard (INDIGO trial; FDA 2024) — see BMA-IDH-MUTATION-GLIOMA-LOW-GRADE. MAP2K1
  mutations in adult LGG without IDH: MEK inhibitors investigational. NCCN CNS 2025:
  trametinib / tovorafenib Category 2A for MAPK-altered pLGG.
evidence_summary_ua: >
  Активація MAPK-шляху — ознака педіатричної LGG (~90%): BRAF-KIAA1549 злиття (~70%),
  BRAF V600E (~15%), MAP2K1 мутації (~5–10%). FIREFLY-1 (JCO 2024): товорафеніб ORR 67%
  в MAPK-altered pLGG. Траметиніб активний у TRAM-01/FIREFLY-2. У дорослих IDH-мутантній
  LGG — ворасидениб стандарт (INDIGO; FDA 2024). MAP2K1 при LGG у дорослих: MEK-інгібітори
  дослідні. NCCN CNS 2025: Cat. 2A.
