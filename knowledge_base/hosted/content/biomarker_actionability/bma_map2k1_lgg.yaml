  - "tovorafenib 420 mg/m² PO QW — BRAF-altered or MAPK-pathway-altered pLGG (FIREFLY-1 eligible)"
  - "clinical trial enrollment preferred for MAP2K1-mutant LGG (adult or pediatric)"
