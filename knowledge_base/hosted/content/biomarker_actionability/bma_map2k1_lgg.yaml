    direction: Supports
    significance: Sensitivity/Response
    note: "NCCN CNS 2025: trametinib Category 2A for MAPK-pathway-altered pediatric LGG; MAP2K1 as alternative MAPK driver included. Adult MAP2K1-mutant LGG: less data, trial preferred."
