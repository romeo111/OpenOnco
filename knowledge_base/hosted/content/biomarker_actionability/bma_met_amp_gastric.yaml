notes: 'ESCAT IIIA. OncoKB Level 3B. Standard 1L gastric/GEJ remains fluoropyrimidine
  + platinum ± trastuzumab (HER2+) ± nivolumab (PD-L1+). MET status is not currently
  a routine treatment-decision biomarker outside trials.

  '
notes_ua: 'ESCAT IIIA. OncoKB рівень 3B. Стандартом першої лінії при раку шлунка / GEJ
  залишається фторпіримідин + платина ± трастузумаб (HER2+) ± ніволумаб (PD-L1+).
  MET-статус наразі не є рутинним біомаркером для прийняття рішення про лікування
  поза межами клінічних досліджень.

  '
