id: BMA-MET-AMP-GASTRIC
biomarker_id: BIO-MET
variant_qualifier: amplification (GCN ≥10 or MET/CEP7 ≥4)
disease_id: DIS-GASTRIC
escat_tier: IIIA
evidence_summary: 'MET amplification in gastric / GEJ adenocarcinoma (~5%): preclinical
  rationale strong but phase 3 trials of rilotumumab (anti-HGF; RILOMET-1) and onartuzumab
  (anti-MET; METGastric) were negative. Selective MET-TKI activity in MET-amp gastric
  is reported in case series and basket cohorts; no regulatory approval.

  '
evidence_summary_ua: 'MET-ампліфікація при аденокарциномі шлунка / стравохідно-шлункового
  переходу (GEJ) (~5%): доклінічне обґрунтування потужне, проте дослідження фази 3
  rilotumumab (anti-HGF; RILOMET-1) та onartuzumab (anti-MET; METGastric) виявилися
  негативними. Активність селективних MET-TKI при MET-ампліфікованому раку шлунка
  описана у клінічних випадках і кошикових когортах; регуляторне схвалення відсутнє.

  '
