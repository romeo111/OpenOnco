id: BMA-MET-AMP-NSCLC
biomarker_id: BIO-MET
variant_qualifier: amplification (high — gene copy number ≥10 or MET/CEP7 ≥4)
disease_id: DIS-NSCLC
escat_tier: IIA
evidence_summary: 'High-level MET amplification in NSCLC: capmatinib activity in high-amp
  cohort of GEOMETRY mono-1 (ORR ~29-40% at GCN ≥10). No FDA-approved drug for MET-amp
  alone — actionability is expansion-cohort / off-label / trial. Also a key resistance
  mechanism to EGFR-TKIs (post-osimertinib MET-amp → trial enrollment for amivantamab
  + lazertinib MARIPOSA-2 / SAVANNAH).

  '
evidence_summary_ua: 'Високорівнева MET-ампліфікація при НДКРЛ: капматиніб (capmatinib)
  показав активність у когорті високої ампліфікації дослідження GEOMETRY mono-1
  (ORR ~29-40% при GCN ≥10). Жоден препарат не схвалений FDA лише за наявності
  MET-ампліфікації — actionability реалізується через розширені когорти, off-label
  призначення або клінічні дослідження. MET-ампліфікація також є ключовим механізмом
  резистентності до EGFR-TKI (постосимертиніб MET-amp → включення у дослідження
  амівантамабу (amivantamab) + лазертинібу (lazertinib) MARIPOSA-2 / SAVANNAH).

  '
