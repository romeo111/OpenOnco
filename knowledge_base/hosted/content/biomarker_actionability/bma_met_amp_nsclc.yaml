notes: 'ESCAT IIA. OncoKB рівень 3A. Порогові значення різняться між дослідженнями;
  найбільш предиктивними є GCN ≥10 за FISH або ≥6 копій за NGS. Слід відрізняти
  первинну ампліфікацію (de novo драйвер, ~1-2%) від набутої ампліфікації
  (постосимертиніб / постEGFR-TKI, ~15-30% механізмів резистентності).

  '
