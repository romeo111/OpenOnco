id: BMA-MET-AMP-RCC-PAPILLARY
biomarker_id: BIO-MET
variant_qualifier: amplification or activating mutation (papillary type-1 context)
disease_id: DIS-RCC
escat_tier: IIA
evidence_summary: 'MET-driven papillary type-1 RCC: cabozantinib superior to sunitinib
  in MET-driven pRCC (PAPMET / SWOG-1500, Pal 2021 — PFS 9.0 vs 5.6 mo in MET-driven
  cohort). Savolitinib (selective MET-TKI) showed activity in MET-driven papillary
  RCC (SAVOIR phase 3 closed early for futility vs sunitinib but signal in MET-driven
  subset).

  '
evidence_summary_ua: 'MET-керований папілярний нирковоклітинний рак (RCC) типу 1:
  кабозантиніб (cabozantinib) перевершив сунітиніб (sunitinib) у MET-керованому
  pRCC у дослідженні PAPMET / SWOG-1500 (Pal 2021 — медіана PFS 9.0 проти 5.6 міс
  у MET-керованій когорті). Саволітиніб (savolitinib; селективний MET-TKI) показав
  активність при MET-керованому папілярному RCC: дослідження фази 3 SAVOIR було
  закрите достроково через футильність порівняно з сунітинібом, проте сигнал
  ефективності зберігався у MET-керованій підгрупі.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_04b
draft_revision: 2
regulatory_approval:
