notes: 'ESCAT IA / OncoKB Level 2 (predictive biomarker; not a target). MGMT testing
  recommended for ALL newly-diagnosed GBM; methodology = MS-PCR or pyrosequencing;
  mosaic / weakly-methylated intermediate cases remain therapeutically ambiguous.
  In MGMT-unmethylated GBM, the benefit of TMZ is small but Stupp remains standard
  outside of trials per SRC-EANO-GBM-2024 — see notes on contradictions: NCCN does
  not withhold TMZ from unmethylated patients while EANO 2024 explicitly considers
  RT-alone an acceptable alternative for unmethylated elderly. This represents a documented
  evidence-based disagreement between guidelines — flagged for clinical-co-lead review.
  Source-gap: SRC-STUPP-NEJM-2005, SRC-PERRY-NEJM-2017, SRC-CETEG-NOA09 not ingested.

  '
notes_ua: 'ESCAT IA / OncoKB рівень 2 (предиктивний біомаркер; не мішень). Тестування
  MGMT рекомендоване для ВСІХ випадків вперше діагностованої GBM; методологія —
  MS-PCR або піросеквенування; мозаїчні / слабко метильовані проміжні випадки
  залишаються терапевтично неоднозначними. У MGMT-неметильованій GBM виграш від TMZ
  невеликий, проте поза межами клінічних досліджень протокол Stupp залишається
  стандартом згідно з SRC-EANO-GBM-2024 — слід враховувати розбіжності: NCCN не
  виключає TMZ у неметильованих пацієнтів, тоді як EANO 2024 явно вважає RT-без-TMZ
  прийнятною альтернативою для неметильованих пацієнтів літнього віку. Це задокументована
  розбіжність на основі доказів між настановами — позначено для розгляду
  Клінічними Cпівкерівниками. Прогалина джерел: SRC-STUPP-NEJM-2005, SRC-PERRY-NEJM-2017,
  SRC-CETEG-NOA09 не інгестовано.

  '
