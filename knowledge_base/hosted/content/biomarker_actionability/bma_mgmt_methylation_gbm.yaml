recommended_combinations:
- 'Stupp protocol: concurrent RT + temozolomide → 6 cycles adjuvant TMZ (1L MGMT-methylated
  GBM per SRC-NCCN-CNS-2025, SRC-EANO-GBM-2024)'
- hypofractionated RT + TMZ (elderly ≥65y MGMT-methylated per SRC-EANO-GBM-2024)
- lomustine + TMZ + RT (alternative MGMT-methylated 1L per CeTeG/NOA-09 — listed as
  option in SRC-EANO-GBM-2024)
contraindicated_monotherapy:
- TMZ monotherapy without RT in newly-diagnosed GBM (excluding very elderly poor performance
  per SRC-EANO-GBM-2024)
