id: BMA-MGMT-METHYLATION-GBM
biomarker_id: BIO-MGMT-METHYLATION
variant_qualifier: MGMT promoter methylation (positive vs unmethylated; ~40% of newly-diagnosed
  glioblastoma IDH-WT)
disease_id: DIS-GBM
escat_tier: IA
evidence_summary: 'MGMT promoter methylation in IDH-WT glioblastoma is the strongest
  validated predictor of temozolomide benefit (Stupp NEJM 2005 / 2009 long-term —
  methylated patients derive ~2x OS benefit from RT+TMZ vs RT alone). Standard 1L
  for newly-diagnosed GBM remains Stupp protocol (concurrent RT + temozolomide → 6
  cycles adjuvant TMZ) per SRC-NCCN-CNS-2025, SRC-EANO-GBM-2024 — but methylation
  status drives intensification decisions: in elderly MGMT-methylated patients, hypofractionated
  RT + TMZ (Perry NEJM 2017) is preferred, while elderly MGMT-unmethylated patients
  can receive RT alone with much smaller TMZ benefit. CeTeG/NOA-09 (Herrlinger Lancet
  2019) showed lomustine + TMZ + RT may extend OS in newly-diagnosed MGMT- methylated
  GBM but is not standard worldwide.

  '
evidence_summary_ua: 'Метилювання промотора MGMT при IDH-WT гліобластомі є найбільш
  валідованим предиктором ефективності темозоломіду (Stupp NEJM 2005 / 2009 довготривалі
  результати — у пацієнтів з метильованим MGMT відзначається приблизно дворазовий
  виграш у загальній виживаності від RT+TMZ порівняно з самою RT). Стандартом
  першої лінії при вперше діагностованій GBM залишається протокол Stupp
  (одночасна RT + темозоломід (temozolomide) → 6 циклів ад''ювантного TMZ) згідно з
  SRC-NCCN-CNS-2025, SRC-EANO-GBM-2024 — однак статус метилювання визначає рішення
  щодо інтенсифікації: у пацієнтів літнього віку з метильованим MGMT перевагу мають
  гіпофракціонована RT + TMZ (Perry NEJM 2017), тоді як у пацієнтів літнього віку з
  неметильованим MGMT допустима лише RT з істотно меншим виграшем від TMZ. У дослідженні
  CeTeG/NOA-09 (Herrlinger Lancet 2019) показано, що ломустин (lomustine) + TMZ + RT
  може подовжити OS у вперше діагностованій MGMT-метильованій GBM, проте такий режим
  не є світовим стандартом.

  '
