id: BMA-MLH1-GERMLINE-OVARIAN
biomarker_id: BIO-DMMR-IHC
variant_qualifier: MLH1 germline loss-of-function (dMMR / MSI-H)
disease_id: DIS-OVARIAN
escat_tier: IA
evidence_summary: 'MLH1 germline loss-of-function in ovarian produces dMMR/MSI-H phenotype.
  Pan- tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per
  GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval. MSI-H
  is rare (~3%) in EOC; pembrolizumab tissue-agnostic applies in pretreated setting.

  '
evidence_summary_ua: 'Гермінальна втрата функції MLH1 при раку яєчника спричинює фенотип
  dMMR/MSI-H. Пан-пухлинна придатність до ICI при MSI-H (пембролізумаб (pembrolizumab) —
  KEYNOTE-158; достарлімаб (dostarlimab) — GARNET) переважає пухлино-специфічні
  лінії через тканино-агностичне схвалення FDA. MSI-H зустрічається рідко (~3%) при
  епітеліальному раку яєчника; пембролізумаб у тканино-агностичному режимі застосовується
  у попередньо лікованих пацієнток.

  '
