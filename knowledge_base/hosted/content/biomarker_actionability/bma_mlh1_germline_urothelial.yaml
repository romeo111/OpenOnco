id: BMA-MLH1-GERMLINE-UROTHELIAL
biomarker_id: BIO-DMMR-IHC
variant_qualifier: MLH1 germline loss-of-function (dMMR / MSI-H)
disease_id: DIS-UROTHELIAL
escat_tier: IA
evidence_summary: 'MLH1 germline loss-of-function in urothelial produces dMMR/MSI-H
  phenotype. Pan-tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab
  per GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval. MSI-H
  in urothelial is rare (~3-5%); pembrolizumab tissue-agnostic applies.

  '
evidence_summary_ua: 'Гермінальна втрата функції MLH1 при уротеліальному раку спричинює
  фенотип dMMR/MSI-H. Пан-пухлинна придатність до ICI при MSI-H (пембролізумаб
  (pembrolizumab) — KEYNOTE-158; достарлімаб (dostarlimab) — GARNET) переважає
  пухлино-специфічні лінії через тканино-агностичне схвалення FDA. MSI-H при уротеліальному
  раку зустрічається рідко (~3-5%); пембролізумаб у тканино-агностичному режимі
  застосовується.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_04
draft_revision: 2
regulatory_approval:
