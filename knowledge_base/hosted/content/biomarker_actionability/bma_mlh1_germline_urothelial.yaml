id: BMA-MLH1-GERMLINE-UROTHELIAL
biomarker_id: BIO-DMMR-IHC
variant_qualifier: MLH1 germline loss-of-function (dMMR / MSI-H)
disease_id: DIS-UROTHELIAL
escat_tier: IA
evidence_summary: 'MLH1 germline loss-of-function in urothelial produces dMMR/MSI-H
  phenotype. Pan-tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab
  per GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval. MSI-H
  in urothelial is rare (~3-5%); pembrolizumab tissue-agnostic applies.

  '
evidence_summary_ua: 'Герміногенна втрата функції MLH1 при уротеліальному раку
  формує dMMR/MSI-H-фенотип. Пан-пухлинна можливість призначення інгібіторів
  контрольних точок при MSI-H (пембролізумаб (pembrolizumab) — KEYNOTE-158,
  достарлімаб (dostarlimab) — GARNET) переважає над пухлино-специфічними лініями
  через tissue-agnostic схвалення FDA. MSI-H при уротеліальному раку зустрічається
  рідко (~3-5%); пембролізумаб у tissue-agnostic режимі застосовується.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_04b
draft_revision: 2
regulatory_approval:
  fda:
  - pembrolizumab — pan-tumor MSI-H/dMMR
  ema: []
  ukraine: []
recommended_combinations:
- pembrolizumab monotherapy (pan-tumor MSI-H, FDA 2017)
- standard urothelial therapy (cisplatin or ICI 1L per PD-L1)
contraindicated_monotherapy: []
primary_sources:
