notes: 'Germline MLH1 loss → cascade testing mandatory (Lynch syndrome). Family meets
  Amsterdam/Bethesda criteria. Pan-tumor MSI-H ICI eligibility supersedes tumor- specific
  lines.

  '
notes_ua: 'Гермінальна втрата MLH1 → каскадне тестування обов''язкове (синдром Лінча).
  Сім''я відповідає критеріям Амстердам/Бетесда. Пан-пухлинна придатність до ICI
  при MSI-H переважає пухлино-специфічні лінії.

  '
