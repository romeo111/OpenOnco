id: BMA-MLH1-SOMATIC-CRC
biomarker_id: BIO-DMMR-IHC
variant_qualifier: MLH1 somatic loss-of-function (dMMR / MSI-H)
disease_id: DIS-CRC
escat_tier: IA
evidence_summary: 'MLH1 somatic loss-of-function in crc produces dMMR/MSI-H phenotype.
  Pan-tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per
  GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval. 1L mCRC:
  pembrolizumab monotherapy (KEYNOTE-177) — mPFS 16.5 vs 8.2 mo vs chemo. Adjuvant
  ICI in stage III dMMR CRC under investigation; deferral of adjuvant 5-FU appropriate
  in stage II dMMR (chemoinsensitive). Neoadjuvant dostarlimab in dMMR rectal cancer
  → 100% cCR (Cercek 2022).

  '
evidence_summary_ua: 'Соматична втрата функції MLH1 при колоректальному раку (CRC)
  формує dMMR/MSI-H-фенотип. Пан-пухлинна можливість призначення інгібіторів
  контрольних точок при MSI-H (пембролізумаб (pembrolizumab) — KEYNOTE-158,
  достарлімаб (dostarlimab) — GARNET) переважає над пухлино-специфічними лініями
  через tissue-agnostic схвалення FDA. Перша лінія при mCRC: пембролізумаб у
  монотерапії (KEYNOTE-177) — медіана PFS 16.5 проти 8.2 міс порівняно з хіміотерапією.
  Ад''ювантні ICI у III стадії dMMR CRC перебувають у фазі досліджень; відмова від
  ад''ювантного 5-FU доцільна у II стадії dMMR (хіміонечутливість). Неоад''ювантний
  достарлімаб при dMMR раку прямої кишки → 100% клінічна повна відповідь
  (Cercek 2022).

  '
