notes: 'Somatic MLH1 loss → cascade testing optional (reflex germline confirmation
  strongly recommended; ~30% of dMMR tumors have germline cause). Pan-tumor MSI-H
  ICI eligibility supersedes tumor-specific lines.

  '
notes_ua: 'Соматична втрата MLH1 → каскадне тестування родичів опційне (наполегливо
  рекомендоване рефлексивне підтвердження герміногенного носійства; ~30% dMMR
  пухлин мають герміногенне походження). Пан-пухлинна можливість призначення ICI
  при MSI-H переважає над пухлино-специфічними лініями.

  '
