notes: 'Somatic MLH1 loss → cascade testing optional (reflex germline confirmation
  strongly recommended; ~30% of dMMR tumors have germline cause). Pan-tumor MSI-H
  ICI eligibility supersedes tumor-specific lines.

  '
notes_ua: 'Соматична втрата MLH1 → каскадне тестування за бажанням (наполегливо
  рекомендоване рефлекторне підтвердження гермінального статусу; ~30% dMMR-пухлин
  мають гермінальну причину). Пан-пухлинна придатність до ICI при MSI-H переважає
  пухлино-специфічні лінії.

  '
