id: BMA-MLH1-SOMATIC-OVARIAN
biomarker_id: BIO-DMMR-IHC
variant_qualifier: MLH1 somatic loss-of-function (dMMR / MSI-H)
disease_id: DIS-OVARIAN
escat_tier: IB
evidence_summary: 'MLH1 somatic loss-of-function in ovarian produces dMMR/MSI-H phenotype.
  Pan- tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per
  GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval. MSI-H
  is rare (~3%) in EOC; pembrolizumab tissue-agnostic applies in pretreated setting.

  '
evidence_summary_ua: 'Соматична втрата функції MLH1 при раку яєчника спричинює фенотип
  dMMR/MSI-H. Пан-пухлинна придатність до ICI при MSI-H (пембролізумаб (pembrolizumab) —
  KEYNOTE-158; достарлімаб (dostarlimab) — GARNET) переважає пухлино-специфічні лінії
  через тканино-агностичне схвалення FDA. MSI-H зустрічається рідко (~3%) при
  епітеліальному раку яєчника; пембролізумаб у тканино-агностичному режимі застосовується
  у попередньо лікованих пацієнток.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_04
