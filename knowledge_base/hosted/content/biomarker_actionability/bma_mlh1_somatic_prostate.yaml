id: BMA-MLH1-SOMATIC-PROSTATE
biomarker_id: BIO-DMMR-IHC
variant_qualifier: MLH1 somatic loss-of-function (dMMR / MSI-H)
disease_id: DIS-PROSTATE
escat_tier: IB
evidence_summary: 'MLH1 somatic loss-of-function in prostate produces dMMR/MSI-H phenotype.
  Pan- tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per
  GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval. MSI-H
  in prostate is rare (~3-5%); pembrolizumab tissue-agnostic applies in mCRPC after
  standard therapy.

  '
evidence_summary_ua: 'Соматична втрата функції MLH1 при раку передміхурової залози
  спричинює фенотип dMMR/MSI-H. Пан-пухлинна придатність до ICI при MSI-H (пембролізумаб
  (pembrolizumab) — KEYNOTE-158; достарлімаб (dostarlimab) — GARNET) переважає
  пухлино-специфічні лінії через тканино-агностичне схвалення FDA. MSI-H при раку
  передміхурової залози зустрічається рідко (~3-5%); пембролізумаб у тканино-агностичному
  режимі застосовується при mCRPC після стандартної терапії.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_04
