id: BMA-MLH1-SOMATIC-UROTHELIAL
biomarker_id: BIO-DMMR-IHC
variant_qualifier: MLH1 somatic loss-of-function (dMMR / MSI-H)
disease_id: DIS-UROTHELIAL
escat_tier: IB
evidence_summary: 'MLH1 somatic loss-of-function in urothelial produces dMMR/MSI-H
  phenotype. Pan-tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab
  per GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval. MSI-H
  in urothelial is rare (~3-5%); pembrolizumab tissue-agnostic applies.

  '
evidence_summary_ua: 'Соматична втрата функції MLH1 при уротеліальному раку спричинює
  фенотип dMMR/MSI-H. Пан-пухлинна придатність до ICI при MSI-H (пембролізумаб
  (pembrolizumab) — KEYNOTE-158; достарлімаб (dostarlimab) — GARNET) переважає
  пухлино-специфічні лінії через тканино-агностичне схвалення FDA. MSI-H при уротеліальному
  раку зустрічається рідко (~3-5%); пембролізумаб у тканино-агностичному режимі
  застосовується.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_04
draft_revision: 2
regulatory_approval:
  fda:
  - pembrolizumab — pan-tumor MSI-H/dMMR
  ema: []
  ukraine: []
recommended_combinations:
- pembrolizumab monotherapy (pan-tumor MSI-H, FDA 2017)
- standard urothelial therapy (cisplatin or ICI 1L per PD-L1)
contraindicated_monotherapy: []
primary_sources:
- SRC-NCCN-BLADDER-2025
- SRC-EAU-PROSTATE-2024
last_verified: '2026-04-27'
evidence_sources: []
actionability_review_required: true
notes: 'Somatic MLH1 loss → cascade testing optional (reflex germline confirmation
  strongly recommended; ~30% of dMMR tumors have germline cause). Pan-tumor MSI-H
  ICI eligibility supersedes tumor-specific lines.

  '
notes_ua: 'Соматична втрата MLH1 → каскадне тестування за бажанням (наполегливо
  рекомендоване рефлекторне підтвердження гермінального статусу; ~30% dMMR-пухлин
  мають гермінальну причину). Пан-пухлинна придатність до ICI при MSI-H переважає
  пухлино-специфічні лінії.

  '
