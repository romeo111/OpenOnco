id: BMA-MSH2-GERMLINE-ENDOMETRIAL
biomarker_id: BIO-DMMR-IHC
variant_qualifier: MSH2 germline loss-of-function (dMMR / MSI-H)
disease_id: DIS-ENDOMETRIAL
escat_tier: IA
evidence_summary: 'MSH2 germline loss-of-function in endometrial produces dMMR/MSI-H
  phenotype. Pan-tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab
  per GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval. Advanced/recurrent
  dMMR endometrial: dostarlimab + carbo/paclitaxel 1L (RUBY) and pembrolizumab + carbo/paclitaxel
  (NRG-GY018) doubled PFS. Dostarlimab/pembrolizumab monotherapy in 2L+. Adjuvant
  ICI in early-stage dMMR under study.

  '
evidence_summary_ua: 'Гермінальна втрата функції MSH2 при раку ендометрія спричинює
  фенотип dMMR/MSI-H. Пан-пухлинна придатність до ICI при MSI-H (пембролізумаб
  (pembrolizumab) — KEYNOTE-158; достарлімаб (dostarlimab) — GARNET) переважає
  пухлино-специфічні лінії через тканино-агностичне схвалення FDA. Поширений / рецидивний
  dMMR рак ендометрія: достарлімаб + карбо/паклітаксел (paclitaxel) у 1L (RUBY) та
  пембролізумаб + карбо/паклітаксел (NRG-GY018) подвоюють виживаність без прогресування.
  Достарлімаб / пембролізумаб у монотерапії — у 2L+. Ад''ювантна ICI при ранніх
  стадіях dMMR досліджується.

  '
