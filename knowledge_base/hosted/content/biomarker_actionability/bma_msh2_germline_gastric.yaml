id: BMA-MSH2-GERMLINE-GASTRIC
biomarker_id: BIO-DMMR-IHC
variant_qualifier: MSH2 germline loss-of-function (dMMR / MSI-H)
disease_id: DIS-GASTRIC
escat_tier: IA
evidence_summary: 'MSH2 germline loss-of-function in gastric produces dMMR/MSI-H phenotype.
  Pan- tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per
  GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval. 1L MSI-H
  gastric: nivolumab + chemo (CheckMate-649) and pembrolizumab + chemo (KEYNOTE-859)
  show enhanced benefit in MSI-H subgroup. Trastuzumab+pembro+chemo in HER2+ MSI-H
  (KEYNOTE-811).

  '
evidence_summary_ua: 'Герміногенна втрата функції MSH2 при раку шлунка формує
  dMMR/MSI-H-фенотип. Пан-пухлинна можливість призначення інгібіторів контрольних
  точок при MSI-H (пембролізумаб (pembrolizumab) — KEYNOTE-158, достарлімаб
  (dostarlimab) — GARNET) переважає над пухлино-специфічними лініями через
  tissue-agnostic схвалення FDA. У першій лінії при MSI-H раку шлунка: ніволумаб
  (nivolumab) + хіміотерапія (CheckMate-649) та пембролізумаб + хіміотерапія
  (KEYNOTE-859) демонструють підсилений виграш у MSI-H підгрупі. Трастузумаб
  (trastuzumab) + пембролізумаб + хіміотерапія застосовуються при HER2+ MSI-H
  (KEYNOTE-811).

  '
