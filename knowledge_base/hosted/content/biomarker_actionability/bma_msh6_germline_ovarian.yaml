id: BMA-MSH6-GERMLINE-OVARIAN
biomarker_id: BIO-DMMR-IHC
variant_qualifier: MSH6 germline loss-of-function (dMMR / MSI-H)
disease_id: DIS-OVARIAN
escat_tier: IA
evidence_summary: 'MSH6 germline loss-of-function in ovarian produces dMMR/MSI-H phenotype.
  Pan- tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per
  GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval. MSI-H
  is rare (~3%) in EOC; pembrolizumab tissue-agnostic applies in pretreated setting.

  '
evidence_summary_ua: 'Герміногенна втрата функції MSH6 при раку яєчника формує
  dMMR/MSI-H-фенотип. Пан-пухлинна можливість призначення інгібіторів контрольних
  точок при MSI-H (пембролізумаб (pembrolizumab) — KEYNOTE-158, достарлімаб
  (dostarlimab) — GARNET) переважає над пухлино-специфічними лініями через
  tissue-agnostic схвалення FDA. MSI-H зустрічається рідко (~3%) при епітеліальному
  раку яєчника (EOC); пембролізумаб у tissue-agnostic режимі застосовується у
  раніше лікованих пацієнток.

  '
ukrainian_review_status: pending_clinical_signoff
