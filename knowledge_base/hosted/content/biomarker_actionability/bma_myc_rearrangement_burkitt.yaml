id: BMA-MYC-REARRANGEMENT-BURKITT
biomarker_id: BIO-MYC-REARRANGEMENT
variant_qualifier: t(8;14) IGH/MYC (or t(2;8), t(8;22) — variant)
disease_id: DIS-BURKITT
escat_tier: IA
evidence_summary: 'MYC rearrangement (t(8;14) most common) is the defining genetic
  lesion of Burkitt lymphoma. Diagnosis requires MYC-R + appropriate morphology/IHC
  + absence of BCL2/BCL6 rearrangements (else HGBL- DH/TH). Treatment is intensive
  chemoimmunotherapy: DA-EPOCH-R (CALGB 50402, Roschewski et al. JCO 2020 / Blood
  2021) for low/ intermediate risk; CODOX-M/IVAC + R for high-risk/CNS+. Cure rates
  >85% with appropriate intensity.

  '
evidence_summary_ua: 'Перебудова MYC (найчастіше t(8;14)) — визначальне генетичне
  ушкодження лімфоми Беркіта. Діагноз потребує MYC-R + відповідної морфології /
  ІГХ + відсутності перебудов BCL2/BCL6 (інакше HGBL-DH/TH). Лікування —
  інтенсивна хіміоімунотерапія: DA-EPOCH-R (CALGB 50402, Roschewski et al. JCO 2020
  / Blood 2021) для груп низького / проміжного ризику; CODOX-M/IVAC + R для груп
  високого ризику / CNS+. Частота вилікування >85% за умов адекватної інтенсивності.

  '
