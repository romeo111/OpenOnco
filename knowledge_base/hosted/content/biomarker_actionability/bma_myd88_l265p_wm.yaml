id: BMA-MYD88-L265P-WM
biomarker_id: BIO-MYD88-L265P
variant_qualifier: L265P
disease_id: DIS-WM
escat_tier: IA
evidence_summary: 'MYD88 L265P present in >90% of WM. Activates NF-κB via BTK/IRAK
  signaling — rationale for BTKi. Ibrutinib monotherapy (iNNOVATE substudy 2 / arm
  A — Treon et al. NEJM 2015 R/R; iNNOVATE — Dimopoulos et al. NEJM 2018 1L+R/R with
  rituximab) and zanubrutinib (ASPEN — Tam et al. Blood 2020) FDA-approved. CXCR4
  WHIM-like co-mutation reduces but does not abolish response.

  '
evidence_summary_ua: 'MYD88 L265P виявляється у >90% випадків макроглобулінемії
  Вальденстрема (WM). Активує NF-κB через сигналінг BTK/IRAK — патогенетичне
  обґрунтування для BTKi. Ібрутиніб (ibrutinib) у монотерапії (iNNOVATE substudy 2
  / arm A — Treon et al. NEJM 2015 при рецидивній / рефрактерній; iNNOVATE —
  Dimopoulos et al. NEJM 2018 у першій лінії та рецидивній / рефрактерній з
  ритуксимабом) та занубрутиніб (zanubrutinib; ASPEN — Tam et al. Blood 2020)
  схвалені FDA. WHIM-подібна ко-мутація CXCR4 зменшує, проте не скасовує відповідь.

  '
