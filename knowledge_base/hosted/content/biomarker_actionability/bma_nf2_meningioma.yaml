id: BMA-NF2-MENINGIOMA
biomarker_id: BIO-NF2
variant_qualifier: "NF2 loss-of-function (biallelic somatic in sporadic meningioma ~50%; germline in NF2 syndrome); merlin loss by IHC acceptable surrogate"
disease_id: DIS-MENINGIOMA
escat_tier: IIIA
evidence_summary: >
  NF2 loss is the most common molecular driver in meningioma (~50% of grade I; higher
  proportion in grade II/III). Despite its frequency, no FDA/EMA-approved targeted therapy
  exists specifically for NF2-mutant meningioma as of 2026. Standard treatment is maximal
  safe surgical resection ± radiotherapy (SRS for small residual, fractionated RT for
  larger/grade II-III). Systemic therapy evidence for progressive/recurrent meningioma:
  Selumetinib (MEK inhibitor; FDA-approved for NF1 pediatric plexiform neurofibroma):
  investigated in NF2-related vestibular schwannomas (ACTR-4 trial) and NF2-related
  meningiomas — limited hearing preservation benefit; single-agent activity modest.
  Bevacizumab (anti-VEGF): off-label use in progressive grade II-III meningioma or
  NF2-related schwannomas — radiologic responses in 40–50% in retrospective series, PFS
  benefit uncertain. AKT1 E17K-mutant meningioma (~10% of grade I): AKT inhibitors
  (capivasertib, ipatasertib) in phase II trials — not NF2-specific but relevant for
  co-occurring pathway alterations. SMO-mutant (~5% of meningioma): vismodegib case reports
  show activity. ESCAT IIB: NF2 loss is molecularly relevant but no validated targeted
  therapy with prospective trial data.
evidence_summary_ua: >
  Втрата NF2 — найчастіший молекулярний драйвер менінгіоми (~50% випадків
  I ступеня; вища частка у II/III ступенях). Незважаючи на високу частоту,
  на 2026 р. жодна таргетна терапія, схвалена FDA/EMA, спеціально для
  NF2-мутантної менінгіоми не зареєстрована. Стандартним лікуванням
  є максимально безпечна хірургічна резекція ± променева терапія (SRS для
  невеликих залишків, фракціонована RT для більших або II-III ступеня).
  Системна терапія при прогресуючій / рецидивній менінгіомі: селуметиніб
  (selumetinib; MEK-інгібітор, схвалений FDA для педіатричної плексиформної
  нейрофіброми при NF1) — досліджувався при NF2-асоційованих вестибулярних
  шваномах (дослідження ACTR-4) та NF2-асоційованих менінгіомах; обмежений
  виграш у збереженні слуху, активність як монотерапії помірна. Бевацизумаб
  (bevacizumab; анти-VEGF) — off-label при прогресуючих менінгіомах
  II-III ступеня або NF2-асоційованих шваномах: радіологічні відповіді у
  40–50% за ретроспективними серіями, виграш у PFS невизначений. AKT1
  E17K-мутантна менінгіома (~10% I ступеня): AKT-інгібітори (капівасертиб
  (capivasertib), іпатасертиб (ipatasertib)) у дослідженнях фази 2 — не
  NF2-специфічні, але релевантні для співіснуючих змін шляху. SMO-мутантні
  (~5% менінгіом): клінічні випадки демонструють активність вісмодегібу
  (vismodegib). ESCAT IIB: втрата NF2 молекулярно значуща, проте відсутня
  валідована таргетна терапія з даними проспективних досліджень.
