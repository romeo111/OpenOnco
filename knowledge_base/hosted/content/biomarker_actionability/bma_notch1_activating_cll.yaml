id: BMA-NOTCH1-ACTIVATING-CLL
biomarker_id: BIO-NOTCH1-MUTATION
variant_qualifier: activating (PEST domain truncating, c.7541_7542delCT canonical)
disease_id: DIS-CLL
escat_tier: IIIA
evidence_summary: 'NOTCH1 activating mutations (~10-15% of CLL) — adverse prognostic;
  reduced response to anti-CD20 mAb (rituximab, obinutuzumab) in some studies. Venetoclax-based
  fixed-duration (CLL14) and BTKi continuous remain effective. Not directly targeted;
  selects venetoclax-based therapy when present.

  '
evidence_summary_ua: 'Активуючі мутації NOTCH1 (~10-15% CLL) — несприятливий
  прогностичний фактор; в окремих дослідженнях відмічено знижену відповідь на
  анти-CD20 mAb (ритуксимаб (rituximab), обінутузумаб (obinutuzumab)). Режими
  фіксованої тривалості на основі венетоклаксу (venetoclax; CLL14) та безперервні
  BTKi зберігають ефективність. Прямої таргетної терапії немає; виявлення мутації
  схиляє вибір на користь венетоклакс-вмісних схем.

  '
