id: BMA-NOTCH1-ACTIVATING-MCL
biomarker_id: BIO-NOTCH1-MUTATION
variant_qualifier: activating (PEST / HD)
disease_id: DIS-MCL
escat_tier: IIIB
evidence_summary: 'NOTCH1 mutations in ~10-15% of MCL — adverse prognostic; not directly
  targeted. BTKi-based 1L (acalabrutinib + R) or BR + autoSCT per fitness/TP53.

  '
evidence_summary_ua: 'Мутації NOTCH1 виявляються у ~10-15% MCL — несприятливий
  прогностичний фактор; прямої таргетної терапії немає. У першій лінії
  застосовуються BTKi-вмісні режими (акалабрутиніб (acalabrutinib) + R) або
  BR + аутологічна ТГСК залежно від соматичного стану / TP53-статусу.

  '
