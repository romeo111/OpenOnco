id: BMA-NOTCH1-ACTIVATING-T-ALL
biomarker_id: BIO-NOTCH1-MUTATION
variant_qualifier: activating (HD or PEST domain)
disease_id: DIS-T-ALL
escat_tier: IIIA
evidence_summary: 'NOTCH1 activating mutations occur in >50% of T-ALL (HD and PEST
  domains). Gamma-secretase inhibitors (GSI) showed activity but were limited by GI
  toxicity. No GSI is FDA-approved in T-ALL. Standard 1L remains pediatric-inspired
  regimens (BFM, CALGB-10403). MRD-directed nelarabine/PEG-asparaginase per protocol.

  '
evidence_summary_ua: 'Активуючі мутації NOTCH1 виявляються у >50% T-ALL (домени HD
  та PEST). Інгібітори гамма-секретази (GSI) демонстрували активність, проте їх
  застосування обмежене шлунково-кишковою токсичністю. Жоден GSI не схвалений FDA
  при T-ALL. Стандартом першої лінії залишаються педіатрично орієнтовані схеми
  (BFM, CALGB-10403). MRD-керовані неларабін (nelarabine) / PEG-аспарагіназа
  застосовуються згідно з протоколом.

  '
