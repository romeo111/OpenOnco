id: BMA-NRG1-FUSION-NSCLC
biomarker_id: BIO-NRG1-FUSION
variant_qualifier: "NRG1 gene fusion — any fusion partner (CD74-NRG1 most common in lung mucinous adenocarcinoma; ATP1B1-NRG1, SLC3A2-NRG1; detected by RNA-seq or FISH)"
disease_id: DIS-NSCLC
escat_tier: IIA
evidence_summary: >
  NRG1 fusions (~0.2% NSCLC; enriched in invasive mucinous adenocarcinoma, never-smokers)
  drive tumor growth via HER3 activation and downstream PI3K/AKT signaling. Zenocutuzumab
  (MCLA-128), an anti-HER2/HER3 bispecific antibody that blocks NRG1 binding to HER3,
  received FDA accelerated approval (Nov 2024) for NRG1 fusion-positive locally advanced
  or metastatic NSCLC and pancreatic adenocarcinoma after prior systemic therapy. CRESTONE
  trial (Schram et al. JCO 2024): NRG1-fusion NSCLC cohort — ORR 33% (RECIST), mDOR
  7.4 mo, mPFS 8.1 mo in previously treated patients; disease control rate 73%.
  NRG1 fusions are mutually exclusive with EGFR, ALK, ROS1, KRAS G12C in the vast majority
  of cases. Standard NTRK/RET/MET panel may miss NRG1 — RNA-based sequencing required.
evidence_summary_ua: >
  Злиття NRG1 (~0.2% НДКРЛ; збагачені в інвазивній муцинозній аденокарциномі та
  у некурців) забезпечують ріст пухлини через активацію HER3 та сигналінг PI3K/AKT.
  Зенокутузумаб (zenocutuzumab; MCLA-128), анти-HER2/HER3 біспецифічне антитіло,
  яке блокує зв''язування NRG1 з HER3, отримав прискорене схвалення FDA (листопад
  2024) для NRG1-fusion-позитивного локально поширеного або метастатичного НДКРЛ
  та аденокарциноми підшлункової залози після попередньої системної терапії.
  Дослідження CRESTONE (Schram et al. JCO 2024): когорта НДКРЛ з NRG1-fusion —
  ORR 33% (RECIST), медіана DOR 7.4 міс, медіана PFS 8.1 міс у раніше лікованих
  пацієнтів; рівень контролю захворювання 73%. Злиття NRG1 у переважній більшості
  випадків взаємно виключають EGFR, ALK, ROS1, KRAS G12C. Стандартні панелі
  NTRK/RET/MET можуть пропустити NRG1 — потрібне RNA-секвенування.
