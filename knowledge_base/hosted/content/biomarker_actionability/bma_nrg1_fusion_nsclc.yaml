actionability_review_required: true
notes: >
  ESCAT IIA (accelerated approval, basket trial data; confirmatory phase III pending).
  RNA sequencing is required — NRG1 fusions are not reliably detected by DNA-based NGS panels
  due to large intronic breakpoints. Zenocutuzumab mechanism: blocks NRG1 ligand from binding
  HER3, preventing HER2-HER3 heterodimerization and downstream oncogenic signaling — distinct
  from kinase inhibitors and not susceptible to gatekeeper mutations. NRG1-fusion NSCLC tumors
  are typically ICI-resistant (low TMB, low PD-L1); do not delay zenocutuzumab for ICI rechallenge.
  KRAS, EGFR, ALK testing still required — NRG1 rarely co-occurs with these drivers.
notes_ua: >
  ESCAT IIA (прискорене схвалення, дані кошикового дослідження; підтверджувальна
  фаза 3 очікується). Необхідне RNA-секвенування — злиття NRG1 ненадійно виявляються
  ДНК-NGS-панелями через великі інтронні точки розриву. Механізм зенокутузумабу:
  блокує зв''язування ліганду NRG1 з HER3, запобігаючи HER2-HER3-гетеродимеризації
  та подальшому онкогенному сигналінгу — відмінний від кіназних інгібіторів і не
  схильний до мутацій-вартових. NRG1-fusion НДКРЛ зазвичай ICI-резистентні (низький
  TMB, низький PD-L1); не варто відтерміновувати призначення зенокутузумабу заради
  повторного ICI. Тестування KRAS, EGFR, ALK залишається обов''язковим — NRG1
  рідко співіснує з цими драйверами.
