id: BMA-NRG1-FUSION-PDAC
biomarker_id: BIO-NRG1-FUSION
variant_qualifier: "NRG1 gene fusion — any fusion partner (RBPMS-NRG1, SLC3A2-NRG1, PMEPA1-NRG1 among most common in PDAC; detected by RNA-seq)"
disease_id: DIS-PDAC
escat_tier: IIA
evidence_summary: >
  NRG1 fusions occur in ~0.5% of pancreatic ductal adenocarcinoma (PDAC) — a rare but
  actionable subset. Zenocutuzumab (MCLA-128), anti-HER2/HER3 bispecific antibody, FDA
  accelerated approval (Nov 2024) for NRG1 fusion-positive locally advanced or metastatic
  NSCLC and pancreatic adenocarcinoma after prior systemic therapy. CRESTONE trial (Schram
  et al. JCO 2024): NRG1-fusion PDAC cohort — ORR 40%, mDOR 9.1 mo, mPFS 8.7 mo —
  particularly notable given the ~3 mo mPFS typically seen with 2L-3L chemotherapy in PDAC.
  NRG1-fusion PDAC is likely KRAS-wild-type in >90% of cases (oncogenic KRAS and NRG1 fusion
  may be functionally redundant). RNA sequencing required — DNA NGS panels miss most NRG1 fusions.
evidence_summary_ua: >
  Злиття NRG1 виявляються у ~0.5% протокової аденокарциноми підшлункової залози
  (PDAC) — рідкісна, але actionable підгрупа. Зенокутузумаб (zenocutuzumab; MCLA-128),
  анти-HER2/HER3 біспецифічне антитіло, отримав прискорене схвалення FDA (листопад
  2024) для NRG1-fusion-позитивного локально поширеного або метастатичного НДКРЛ
  та аденокарциноми підшлункової залози після попередньої системної терапії.
  Дослідження CRESTONE (Schram et al. JCO 2024): когорта PDAC з NRG1-fusion —
  ORR 40%, медіана DOR 9.1 міс, медіана PFS 8.7 міс — особливо клінічно значущі
  показники з огляду на медіану PFS ~3 міс при стандартній хіміотерапії другої-третьої
  лінії при PDAC. NRG1-fusion PDAC у >90% випадків KRAS-wild-type (онкогенний
  KRAS та злиття NRG1 функціонально надлишкові). Необхідне RNA-секвенування —
  ДНК-NGS-панелі пропускають більшість злиттів NRG1.
