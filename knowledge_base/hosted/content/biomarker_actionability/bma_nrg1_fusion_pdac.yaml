actionability_review_required: true
notes: >
  ESCAT IIA (accelerated approval based on ORR; confirmatory data pending). NRG1-fusion
  PDAC is enriched in KRAS-wild-type tumors (testing KRAS early identifies a subpopulation
  that warrants comprehensive RNA-seq). ORR of 40% in CRESTONE PDAC cohort is particularly
  impactful given the absence of other effective targeted therapies in 2L-3L PDAC. Testing
  strategy: if KRAS-wild-type PDAC identified, proceed to RNA-based comprehensive genomic
  profiling to detect NRG1 (and other rare fusions: NTRK, ALK, RET, FGFR). Zenocutuzumab
  is generally well tolerated: infusion reactions (premedication required), fatigue, nausea;
  no grade 3-4 cardiotoxicity seen in CRESTONE.
notes_ua: >
  ESCAT IIA (прискорене схвалення на підставі ORR; підтверджувальні дані очікуються).
  NRG1-fusion PDAC збагачена KRAS-wild-type-пухлинами (раннє тестування KRAS виявляє
  підгрупу, яка потребує всебічного RNA-секвенування). ORR 40% у когорті CRESTONE
  PDAC має особливе клінічне значення з огляду на відсутність інших ефективних
  таргетних опцій у другій-третій лініях PDAC. Стратегія тестування: за виявлення
  KRAS-wild-type PDAC проводять всебічне RNA-геномне профілювання для виявлення
  NRG1 (та інших рідкісних злиттів: NTRK, ALK, RET, FGFR). Зенокутузумаб у цілому
  добре переноситься: інфузійні реакції (потребують премедикації), втома, нудота;
  кардіотоксичність 3-4 ступеня в CRESTONE не зареєстровано.
