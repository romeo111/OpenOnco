notes: 'ESCAT IA. OncoKB Level 1. Fusion-partner-specific cell maintained for completeness.
  ETV6-NTRK3 also drives infantile fibrosarcoma, congenital mesoblastic nephroma,
  and a fraction of secretory breast carcinoma — separate BMA cells per disease.

  '
notes_ua: 'ESCAT IA. OncoKB рівень 1. Fusion-partner-специфічна клітина утримується
  для повноти. ETV6-NTRK3 також драйвер інфантильної фібросаркоми, вродженої
  мезобластичної нефроми та частини секреторної карциноми молочної залози —
  окремі BMA-клітини для кожного захворювання.

  '
