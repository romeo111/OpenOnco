id: BMA-NTRK-ETV6-SALIVARY
biomarker_id: BIO-NTRK-FUSION
variant_qualifier: ETV6-NTRK3 fusion
disease_id: DIS-SALIVARY
escat_tier: IA
evidence_summary: 'ETV6-NTRK3 is the defining fusion of mammary analogue secretory
  carcinoma (MASC) of salivary gland. Larotrectinib and entrectinib are highly active
  (NAVIGATE / STARTRK-2 pooled — ORR 75-90% in salivary cohort). Treatment is identical
  to gene-level NTRK fusion.

  '
evidence_summary_ua: 'ETV6-NTRK3 — визначальне злиття при секреторній карциномі
  з мамма-подібною диференціацією (MASC) слинних залоз. Ларотректиніб (larotrectinib) та ентректиніб
  (entrectinib) високоактивні (об''єднані дані NAVIGATE / STARTRK-2 — ORR 75-90%
  у когорті слинних залоз). Лікування ідентичне до гено-рівневого NTRK-fusion.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_04b
draft_revision: 2
regulatory_approval:
  fda:
  - larotrectinib — NTRK-fusion solid tumors (FDA tumor-agnostic 2018)
  - entrectinib — NTRK-fusion solid tumors (FDA tumor-agnostic 2019)
  ema:
