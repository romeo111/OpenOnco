id: BMA-NTRK-FUSION-GIST
biomarker_id: BIO-NTRK-FUSION
variant_qualifier: NTRK1/3 fusion (rare in KIT/PDGFRA wild-type GIST)
disease_id: DIS-GIST
escat_tier: IA
evidence_summary: 'NTRK fusion in GIST is rare and confined to KIT/PDGFRA wild-type
  GIST (which is itself ~10-15% of GIST). Larotrectinib and entrectinib are FDA tumor-agnostic
  for NTRK-fusion solid tumors; GIST cohort small but consistent with pan-tumor response
  rates.

  '
evidence_summary_ua: 'Злиття NTRK при GIST зустрічається рідко й обмежене
  KIT/PDGFRA wild-type GIST (на яку припадає ~10-15% GIST). Ларотректиніб
  (larotrectinib) та ентректиніб (entrectinib) схвалені FDA в tissue-agnostic
  режимі для NTRK-fusion солідних пухлин; когорта GIST невелика, проте показники
  відповіді узгоджуються з пан-пухлинними даними.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_04b
draft_revision: 2
regulatory_approval:
  fda:
  - larotrectinib — NTRK-fusion solid tumors (FDA tumor-agnostic 2018)
  - entrectinib — NTRK-fusion solid tumors (FDA tumor-agnostic 2019)
  ema:
  - larotrectinib / entrectinib — NTRK-fusion solid tumors (EMA tumor-agnostic 2019/2020)
  ukraine: []
recommended_combinations:
- larotrectinib monotherapy
- entrectinib monotherapy
contraindicated_monotherapy:
- imatinib (KIT/PDGFRA-WT GIST is imatinib-refractory)
primary_sources:
- SRC-FDA-CDS-2026
last_verified: '2026-04-27'
evidence_sources: []
actionability_review_required: true
notes: 'ESCAT IA. OncoKB Level 1. NTRK-fusion screening in GIST should be reserved
  for KIT/PDGFRA-WT cases (after SDHB IHC to exclude SDH-deficient GIST). Source-gap:
  SRC-NCCN-SARCOMA / SRC-NCCN-GIST-2025 not yet ingested.

  '
notes_ua: 'ESCAT IA. OncoKB рівень 1. Скринінг на NTRK-злиття при GIST доцільно
  резервувати для KIT/PDGFRA-WT випадків (після SDHB-ІГХ для виключення
  SDH-дефіцитної GIST). Прогалина джерел: SRC-NCCN-SARCOMA / SRC-NCCN-GIST-2025
  ще не інгестовано.

  '
