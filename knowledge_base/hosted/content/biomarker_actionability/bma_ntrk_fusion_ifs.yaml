notes: 'ESCAT IA. OncoKB Level 1. IFS is the prototype tumor for the paradigm shift
  from cytotoxic to targeted therapy in pediatric oncology. Prior standard (VAC chemotherapy)
  achieved ~70% response but with substantial toxicity. Larotrectinib enables less
  mutilating surgery in localized IFS. Source-gap: SRC-NCCN-PEDIATRIC-SARCOMA / SRC-SCOUT
  not yet ingested.

  '
notes_ua: 'ESCAT IA. OncoKB рівень 1. IFS — прототипна пухлина зміни парадигми від
  цитотоксичної до таргетної терапії в педіатричній онкології. Попередній стандарт
  (VAC-хіміотерапія) забезпечував ~70% відповіді, але з суттєвою токсичністю.
  Ларотректиніб уможливлює менш калічні хірургічні втручання при локалізованій
  IFS. Прогалина джерел: SRC-NCCN-PEDIATRIC-SARCOMA / SRC-SCOUT ще не інгестовано.

  '
