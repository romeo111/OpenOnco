id: BMA-NTRK-FUSION-NSCLC
biomarker_id: BIO-NTRK-FUSION
variant_qualifier: NTRK1/3 fusion (rare ~0.1-0.5%)
disease_id: DIS-NSCLC
escat_tier: IA
evidence_summary: 'NTRK fusion in NSCLC is rare (~0.1-0.5%). Larotrectinib and entrectinib
  are FDA tumor-agnostic; NSCLC subset of pooled trials shows durable responses including
  CNS activity (entrectinib has superior CNS penetrance). Tumor-agnostic actionability
  — NTRK testing is part of comprehensive NGS panels in NSCLC.

  '
evidence_summary_ua: 'Злиття NTRK при НДКРЛ зустрічається рідко (~0.1-0.5%).
  Ларотректиніб (larotrectinib) та ентректиніб (entrectinib) схвалені FDA в
  tissue-agnostic режимі; НДКРЛ-підгрупа об''єднаних досліджень демонструє стійкі
  відповіді, включно з активністю в ЦНС (ентректиніб має кращу пенетрацію через
  ГЕБ). Tissue-agnostic actionability — тестування NTRK входить до всебічних
  NGS-панелей при НДКРЛ.

  '
