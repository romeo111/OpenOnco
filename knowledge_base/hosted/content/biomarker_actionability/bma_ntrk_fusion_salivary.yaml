id: BMA-NTRK-FUSION-SALIVARY
biomarker_id: BIO-NTRK-FUSION
variant_qualifier: NTRK1/2/3 fusion (ETV6-NTRK3 defines mammary analogue secretory
  carcinoma, MASC)
disease_id: DIS-SALIVARY
escat_tier: IA
evidence_summary: 'NTRK fusion in salivary gland tumors — virtually 100% of mammary
  analogue secretory carcinoma (MASC) carry ETV6-NTRK3. Larotrectinib (NAVIGATE /
  pooled phase 1/2, Drilon NEJM 2018 — ORR 75% across tumor types, salivary subset
  ORR ~85%) and entrectinib (STARTRK-2 / ALKA / STARTRK-NG) are FDA-approved tumor-agnostic
  for NTRK-fusion solid tumors. Salivary MASC has among the highest response rates.

  '
evidence_summary_ua: 'Злиття NTRK при пухлинах слинних залоз — практично 100%
  випадків секреторної карциноми з мамма-подібною диференціацією (MASC) несуть
  ETV6-NTRK3.
  Ларотректиніб (larotrectinib; NAVIGATE / об''єднана фаза 1/2, Drilon NEJM 2018
  — ORR 75% серед різних типів пухлин, у підгрупі слинних залоз ORR ~85%) та
  ентректиніб (entrectinib; STARTRK-2 / ALKA / STARTRK-NG) схвалені FDA в
  tissue-agnostic режимі для NTRK-fusion солідних пухлин. Слинна MASC має одні з
  найвищих показників відповіді.

  '
