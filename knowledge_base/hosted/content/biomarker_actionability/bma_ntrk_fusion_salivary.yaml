notes: 'ESCAT IA. OncoKB Level 1. MASC re-classified from acinic cell carcinoma in
  2010 — driven entirely by ETV6-NTRK3 fusion. Detection: pan-TRK IHC screen → confirm
  by FISH or NGS. Resistance: solvent-front (NTRK G595R / G623R) and gatekeeper (G667C)
  mutations → next-gen TRK inhibitor selitrectinib / repotrectinib in trials. Source-gap:
  SRC-NCCN-HEAD-AND-NECK / SRC-NAVIGATE-DRILON-2018 / SRC-STARTRK2-DRILON-2020 not
  yet ingested.

  '
notes_ua: 'ESCAT IA. OncoKB рівень 1. MASC рекласифіковано з ацинарноклітинної
  карциноми у 2010 р. — повністю обумовлюється злиттям ETV6-NTRK3. Виявлення:
  pan-TRK ІГХ-скринінг → підтвердження методом FISH або NGS. Резистентність:
  solvent-front-мутації (NTRK G595R / G623R) та gatekeeper (G667C) → TRK-інгібітори
  наступної генерації — селітректиніб / репотректиніб у дослідженнях. Прогалина
  джерел: SRC-NCCN-HEAD-AND-NECK / SRC-NAVIGATE-DRILON-2018 / SRC-STARTRK2-DRILON-2020
  ще не інгестовано.

  '
