id: BMA-PALB2-GERMLINE-BREAST
biomarker_id: BIO-HRR-PANEL
variant_qualifier: PALB2 germline pathogenic
disease_id: DIS-BREAST
escat_tier: IIA
evidence_summary: 'PALB2 germline pathogenic confers BRCA-like breast risk (~50% lifetime). Olaparib activity
  reported in PALB2-mutated breast (Tung TBCRC-048: ORR ~82% in HER2-negative metastatic, n=11) but PARPi
  labels in breast remain BRCA- only. NCCN lists PALB2 as a PARPi-eligible mutation off-label. ESCAT IIA
  / OncoKB Level 3A.

  '
evidence_summary_ua: 'Герміногенні патогенні варіанти PALB2 забезпечують BRCA-подібний ризик раку молочної
  залози (~50% протягом життя). Активність олапарибу (olaparib) задокументована при PALB2-мутованому раку
  молочної залози (Tung, TBCRC-048: ЗЧВ ~82% при HER2-негативному метастатичному, n=11), проте ярлики
  PARPi при раку молочної залози залишаються лише для BRCA. NCCN включає PALB2 до переліку мутацій, прийнятних
  для застосування PARPi поза показаннями. ESCAT IIA.

  '
