id: BMA-PALB2-GERMLINE-OVARIAN
biomarker_id: BIO-HRR-PANEL
variant_qualifier: PALB2 germline pathogenic
disease_id: DIS-OVARIAN
escat_tier: IIA
evidence_summary: 'PALB2 germline pathogenic in EOC: rare (~1%); biologically HR-deficient. Niraparib
  NOVA non-gBRCA cohort and rucaparib ARIEL3 LOH-high included PALB2; olaparib + bev (PAOLA-1) in HRD-positive
  includes PALB2. ESCAT IIA / OncoKB Level 3A.

  '
evidence_summary_ua: 'Герміногенні патогенні варіанти PALB2 при епітеліальному раку яєчників (EOC): рідко
  (~1%); біологічно HR-дефіцитний. Когорта non-gBRCA ніраparибу (niraparib) у дослідженні NOVA та LOH-high
  когорта рукапарибу (rucaparib) у ARIEL3 включали PALB2; олапариб + бевацизумаб (olaparib + bevacizumab;
  PAOLA-1) при HRD-позитивних пухлинах охоплює PALB2. ESCAT IIA.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_05
regulatory_approval:
  fda:
  - niraparib — maintenance recurrent EOC (HRD broad label includes PALB2)
  ema:
  - olaparib + bevacizumab — 1L HRD-positive EOC (incl PALB2-mutated)
  ukraine: []
recommended_combinations:
