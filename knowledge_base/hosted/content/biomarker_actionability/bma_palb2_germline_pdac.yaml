id: BMA-PALB2-GERMLINE-PDAC
biomarker_id: BIO-HRR-PANEL
variant_qualifier: PALB2 germline pathogenic
disease_id: DIS-PDAC
escat_tier: IIA
evidence_summary: 'PALB2 germline pathogenic in metastatic PDAC: behaves BRCA-like; case series support
  platinum sensitivity and PARPi activity. POLO germline-only and BRCA- restricted; NCCN allows off-label
  olaparib for HRR-mutated. ESCAT IIA / OncoKB Level 3A.

  '
evidence_summary_ua: 'Герміногенні патогенні варіанти PALB2 при метастатичній аденокарциномі підшлункової
  залози (PDAC): поводяться BRCA-подібно; серії випадків підтверджують чутливість до препаратів платини
  та активність PARPi. Дослідження POLO обмежено герміногенними мутаціями та лише BRCA; NCCN допускає
  застосування олапарибу (olaparib) поза показаннями при HRR-мутованій PDAC. ESCAT IIA.

  '
