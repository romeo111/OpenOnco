notes: 'ESCAT IA. OncoKB Level 1. Source-gap: SRC-NCCN-SARCOMA / SRC-NCCN-GIST-2025 / SRC-NAVIGATOR /
  SRC-VOYAGER not yet ingested. CNS toxicity (cognitive effects, intracranial hemorrhage) is on-target
  / dose- related — dose modifications standard. Companion-diagnostic genotyping via NGS panel mandatory
  before avapritinib initiation. Adjuvant imatinib has NO benefit in D842V GIST — these patients should
  be observed post-resection.

  '
notes_ua: "ESCAT IA. Генотипування методом NGS-панелі є обов'язковим перед ініціацією авапритинібу (avapritinib).
  Нейротоксичність (когнітивні порушення, внутрішньочерепні крововиливи) є цільовою та дозозалежною —
  стандартне коригування дози. Ад'ювантний іматиніб НЕ є ефективним при D842V GIST — цих пацієнтів спостерігають
  після резекції. Джерела: SRC-NCCN-GIST-2025, SRC-NCCN-SARCOMA, SRC-NAVIGATOR, SRC-VOYAGER.\n"
