id: BMA-PDGFRA-D842V-GIST
biomarker_id: BIO-PDGFRA
variant_qualifier: D842V (activation loop, exon 18 — ~7% of GIST, predominantly gastric)
disease_id: DIS-GIST
escat_tier: IA
evidence_summary: 'PDGFRA D842V in GIST is imatinib-RESISTANT (distinct from imatinib-sensitive PDGFRA
  non-D842V mutations). Avapritinib (NAVIGATOR phase 1/2 + VOYAGER phase 3, Heinrich Lancet Oncol 2020
  / Kang JCO 2022 — ORR 88-91% in D842V GIST; treatment-naive cohort) is FDA-approved for advanced D842V
  GIST. Imatinib, sunitinib, regorafenib are ineffective.

  '
evidence_summary_ua: 'PDGFRA D842V у GIST є РЕЗИСТЕНТНИМ до іматинібу (imatinib) (на відміну від іматиніб-чутливих
  non-D842V мутацій PDGFRA). Авапритиніб (avapritinib; NAVIGATOR фаза 1/2 + VOYAGER фаза 3, Heinrich Lancet
  Oncol 2020 / Kang JCO 2022 — ЗЧВ 88–91% при D842V GIST; когорта без попереднього лікування) схвалений
  FDA для поширеного D842V GIST. Іматиніб, сунітиніб (sunitinib) та регорафеніб (regorafenib) є неефективними.

  '
