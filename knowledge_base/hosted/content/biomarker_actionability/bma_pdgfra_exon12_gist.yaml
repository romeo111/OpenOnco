id: BMA-PDGFRA-EXON12-GIST
biomarker_id: BIO-PDGFRA
variant_qualifier: exon 12 mutation (juxtamembrane domain — V561D most common; rare <2% GIST)
disease_id: DIS-GIST
escat_tier: IB
evidence_summary: 'PDGFRA exon 12 mutations in GIST are imatinib-sensitive. Imatinib 400 mg/day is standard
  1L — response rates comparable to KIT exon 11 and PDGFRA non-D842V exon 18. Rare genotype (<2% of GIST).

  '
evidence_summary_ua: 'Мутації PDGFRA екзону 12 у GIST є чутливими до іматинібу (imatinib). Іматиніб 400
  mg/day є стандартом першої лінії — частота відповіді порівнянна з мутаціями KIT екзону 11 та non-D842V
  PDGFRA екзону 18. Рідкісний генотип (<2% GIST).

  '
