id: BMA-PIK3R1-ENDOMETRIAL
biomarker_id: BIO-PIK3R1
variant_qualifier: "PIK3R1 activating/loss-of-function mutation — endometrial carcinoma; PI3K/AKT/mTOR pathway driver; co-occurs with PIK3CA in ~50% of EC"
disease_id: DIS-ENDOMETRIAL
escat_tier: IIB
evidence_summary: >
  PIK3R1 mutations occur in ~33% of endometrial carcinoma (EC) — among the highest
  frequencies in any cancer. PIK3R1 mutations activate PI3K/AKT/mTOR signaling by
  reducing p85α inhibitory constraint on the p110α catalytic subunit. PI3K pathway
  activation is present in ~50% of EC (PIK3CA + PIK3R1 + PTEN combined). Therapeutic
  evidence for PI3K/mTOR pathway inhibitors in EC:
  Lenvatinib + pembrolizumab (KEYNOTE-775, FDA 2021): approved for advanced/recurrent
  mismatch repair proficient (pMMR/MSS) EC after prior chemotherapy — not specifically
  PIK3R1-selected; lenvatinib inhibits multiple RTKs including VEGFR/FGFR rather than PI3K.
  Everolimus + letrozole (GOG-0248): showed activity in recurrent EC (~32% CBR) but is
  not FDA-approved for EC; used off-label in hormone-receptor-positive EC.
  Alpelisib (PI3Kα inhibitor, FDA-approved for PIK3CA-mutant HR+ breast cancer): not
  approved for EC but under investigation in PI3K-pathway-altered EC (MATCH subprotocol
  trials, SUMMIT basket trial). PIK3R1 mutations may sensitize to alpelisib via the same
  PI3Kα activation mechanism as PIK3CA. No PIK3R1-specific companion diagnostic exists.
  ESCAT IIB: PI3K pathway activation in EC is targetable in principle; no PIK3R1-selected
  approved therapy.
evidence_summary_ua: >
  Мутації PIK3R1 у ~33% РЕ (найвища частота серед усіх онкологічних захворювань). PI3K-шлях
  активований у ~50% РЕ (PIK3CA + PIK3R1 + PTEN). Таргетна терапія: ленватиніб + пембролізумаб
  (FDA 2021, pMMR/MSS РЕ; не PIK3R1-специфічне); еверолімус + летрозол (off-label). Алпелізиб
  (PI3Kα; схвалений при PIK3CA-мутантному РГЗ) — досліджується при PIK3R1-мутантному РЕ.
  Компаньйон-діагностики для PIK3R1 немає. ESCAT IIB.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "lenvatinib 20 mg PO QD + pembrolizumab 200 mg IV q3w — FDA-approved for pMMR/MSS advanced EC (KEYNOTE-775); not PIK3R1-specific but active in PI3K-pathway-altered EC"
  - "everolimus 10 mg PO QD + letrozole 2.5 mg PO QD — off-label for hormone-receptor-positive, pMMR advanced EC (GOG-0248 data; ~32% CBR)"
  - "alpelisib 300 mg PO QD + fulvestrant — investigational for PIK3CA/PIK3R1-mutant HR+ EC (basket trial regimen; not FDA-approved for EC)"
contraindicated_monotherapy: []
