    level: "Category 2A"
    direction: Supports
    significance: Sensitivity/Response
    note: "NCCN Uterine 2025: PI3K/AKT/mTOR pathway frequently altered in EC (PIK3CA + PIK3R1 + PTEN); everolimus-based combinations active in recurrent EC; alpelisib investigational in PIK3-altered EC basket trials."
  - source: SRC-ESGO-ENDOMETRIAL-2025
    level: B
    direction: Supports
    significance: Sensitivity/Response
    note: "ESGO Endometrial 2025: PIK3R1 mutation is a frequent PI3K pathway driver in EC; lenvatinib+pembrolizumab is recommended regardless of PIK3R1 status for pMMR EC; PI3K inhibitors investigational."
actionability_review_required: true
notes: >
  ESCAT IIB: PIK3R1 mutation in EC activates the same PI3K/AKT/mTOR pathway as PIK3CA
  and PTEN loss, but currently lacks a PIK3R1-specific companion diagnostic and approved
  targeted therapy. Management: (1) First, characterize EC molecular class (POLE, MMR,
  p53, CTNNB1) to guide first-line adjuvant decisions; (2) PIK3R1 testing is relevant
  for trial eligibility (PI3K pathway basket trials), not for current standard therapy
  selection; (3) For recurrent/advanced pMMR EC, lenvatinib + pembrolizumab is standard
  regardless of PIK3R1 status (KEYNOTE-775); (4) Alpelisib access: compassionate use or
  clinical trial for PIK3R1-mutant EC; (5) PTEN IHC (surrogate for PTEN loss, co-occurring
  with PIK3R1 in many EC) provides complementary PI3K pathway information.
