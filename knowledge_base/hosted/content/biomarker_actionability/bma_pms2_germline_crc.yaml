id: BMA-PMS2-GERMLINE-CRC
biomarker_id: BIO-DMMR-IHC
variant_qualifier: PMS2 germline loss-of-function (dMMR / MSI-H)
disease_id: DIS-CRC
escat_tier: IA
evidence_summary: 'PMS2 germline loss-of-function in crc produces dMMR/MSI-H phenotype. Pan-tumor MSI-H
  ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per GARNET) supersedes tumor-specific lines
  via tissue-agnostic FDA approval. 1L mCRC: pembrolizumab monotherapy (KEYNOTE-177) — mPFS 16.5 vs 8.2
  mo vs chemo. Adjuvant ICI in stage III dMMR CRC under investigation; deferral of adjuvant 5-FU appropriate
  in stage II dMMR (chemoinsensitive). Neoadjuvant dostarlimab in dMMR rectal cancer → 100% cCR (Cercek
  2022).

  '
evidence_summary_ua: 'Герміногенна втрата функції PMS2 при колоректальному раку (CRC) зумовлює фенотип
  dMMR/MSI-H. Тканинно-агностична придатність до ICI при pan-tumor MSI-H (пембролізумаб (pembrolizumab)
  згідно з KEYNOTE-158, достарлімаб (dostarlimab) згідно з GARNET) переважає пухлиноспецифічні лінії через
  тканинно-агностичне схвалення FDA. Перша лінія mCRC: пембролізумаб монотерапія (KEYNOTE-177) — mPFS
  16.5 проти 8.2 міс порівняно з хіміотерапією. Ад''ювантний ICI при III стадії dMMR CRC перебуває на
  стадії дослідження; відкладення ад''ювантного 5-FU доцільне при II стадії dMMR (хіміорезистентність).
  Неоад''ювантний достарлімаб при dMMR раку прямої кишки → 100% cCR (Cercek 2022).

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_05
regulatory_approval:
  fda:
  - pembrolizumab — 1L MSI-H/dMMR mCRC (FDA 2020)
  - pembrolizumab — pan-tumor MSI-H/dMMR (FDA 2017)
  - nivolumab + ipilimumab — MSI-H/dMMR mCRC (FDA 2018)
  - dostarlimab — pan-tumor dMMR (FDA 2021)
  ema:
  - pembrolizumab — 1L MSI-H/dMMR mCRC (EMA 2022)
  ukraine: []
recommended_combinations:
- pembrolizumab monotherapy (1L mCRC dMMR, KEYNOTE-177)
- dostarlimab (neoadjuvant rectal dMMR, off-label)
- nivolumab + ipilimumab (2L+ mCRC dMMR, CheckMate-142)
contraindicated_monotherapy:
- FOLFOX/FOLFIRI 1L in dMMR mCRC (inferior to ICI)
- adjuvant 5-FU monotherapy in stage II dMMR (no benefit, possibly harmful)
primary_sources:
- SRC-NCCN-COLON-2025
- SRC-ESMO-COLON-2024
last_verified: '2026-04-27'
evidence_sources: []
actionability_review_required: true
notes: 'Germline PMS2 loss → cascade testing mandatory (Lynch syndrome). Family meets Amsterdam/Bethesda
  criteria. Pan-tumor MSI-H ICI eligibility supersedes tumor- specific lines.

  '
notes_ua: "Герміногенна втрата PMS2 → каскадне тестування є обов'язковим (синдром Лінча). Сім'я відповідає
  Амстердамським/Бетесдівським критеріям. Тканинно-агностична придатність до ICI при MSI-H переважає пухлиноспецифічні
  лінії терапії.\n"
