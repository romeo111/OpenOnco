id: BMA-PMS2-GERMLINE-GASTRIC
biomarker_id: BIO-DMMR-IHC
variant_qualifier: PMS2 germline loss-of-function (dMMR / MSI-H)
disease_id: DIS-GASTRIC
escat_tier: IA
evidence_summary: 'PMS2 germline loss-of-function in gastric produces dMMR/MSI-H phenotype. Pan- tumor
  MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per GARNET) supersedes tumor-specific
  lines via tissue-agnostic FDA approval. 1L MSI-H gastric: nivolumab + chemo (CheckMate-649) and pembrolizumab
  + chemo (KEYNOTE-859) show enhanced benefit in MSI-H subgroup. Trastuzumab+pembro+chemo in HER2+ MSI-H
  (KEYNOTE-811).

  '
evidence_summary_ua: 'Герміногенна втрата функції PMS2 при раку шлунка зумовлює фенотип dMMR/MSI-H. Тканинно-агностична
  придатність до ICI при pan-tumor MSI-H (пембролізумаб згідно з KEYNOTE-158, достарлімаб згідно з GARNET)
  переважає пухлиноспецифічні лінії. MSI-H при раку шлунка виявляють у ~10–15%; пембролізумаб або ніволумаб
  (nivolumab) рекомендовані у першій лінії.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_05
regulatory_approval:
  fda:
  - nivolumab + chemo — 1L gastric (broad label, MSI-H subgroup benefit)
  - pembrolizumab — pan-tumor MSI-H/dMMR
  ema:
  - nivolumab + chemo — 1L gastric
  ukraine: []
recommended_combinations:
- nivolumab + FOLFOX/CapeOX (1L MSI-H gastric, CheckMate-649)
- pembrolizumab + chemo (KEYNOTE-859)
- pembrolizumab monotherapy (pan-tumor MSI-H, 2L+)
contraindicated_monotherapy: []
primary_sources:
- SRC-NCCN-GASTRIC-2025
- SRC-ESMO-GASTRIC-2024
last_verified: '2026-04-27'
evidence_sources: []
actionability_review_required: true
notes: 'Germline PMS2 loss → cascade testing mandatory (Lynch syndrome). Family meets Amsterdam/Bethesda
  criteria. Pan-tumor MSI-H ICI eligibility supersedes tumor- specific lines.

  '
notes_ua: "Герміногенна втрата PMS2 → каскадне тестування є обов'язковим (синдром Лінча). Сім'я відповідає
  Амстердамським/Бетесдівським критеріям. Тканинно-агностична придатність до ICI при MSI-H переважає пухлиноспецифічні
  лінії терапії.\n"
