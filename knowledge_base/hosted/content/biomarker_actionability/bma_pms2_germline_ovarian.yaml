id: BMA-PMS2-GERMLINE-OVARIAN
biomarker_id: BIO-DMMR-IHC
variant_qualifier: PMS2 germline loss-of-function (dMMR / MSI-H)
disease_id: DIS-OVARIAN
escat_tier: IA
evidence_summary: 'PMS2 germline loss-of-function in ovarian produces dMMR/MSI-H phenotype. Pan- tumor
  MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per GARNET) supersedes tumor-specific
  lines via tissue-agnostic FDA approval. MSI-H is rare (~3%) in EOC; pembrolizumab tissue-agnostic applies
  in pretreated setting.

  '
evidence_summary_ua: 'Герміногенна втрата функції PMS2 при раку яєчників зумовлює фенотип dMMR/MSI-H.
  Тканинно-агностична придатність до ICI при pan-tumor MSI-H (пембролізумаб згідно з KEYNOTE-158, достарлімаб
  згідно з GARNET) переважає пухлиноспецифічні лінії через тканинно-агностичне схвалення FDA. MSI-H є
  рідкісним (~3%) при епітеліальному раку яєчників; тканинно-агностичний пембролізумаб застосовується
  у попередньо лікованих пацієнтів.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_05
regulatory_approval:
