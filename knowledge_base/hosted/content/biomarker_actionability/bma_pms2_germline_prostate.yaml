notes: 'Germline PMS2 loss → cascade testing mandatory (Lynch syndrome). Family meets Amsterdam/Bethesda
  criteria. Pan-tumor MSI-H ICI eligibility supersedes tumor- specific lines.

  '
notes_ua: "Герміногенна втрата PMS2 → каскадне тестування є обов'язковим (синдром Лінча). Сім'я відповідає
  Амстердамським/Бетесдівським критеріям. Тканинно-агностична придатність до ICI при MSI-H переважає пухлиноспецифічні
  лінії терапії.\n"
