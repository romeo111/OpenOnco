id: BMA-PMS2-GERMLINE-PROSTATE
biomarker_id: BIO-DMMR-IHC
variant_qualifier: PMS2 germline loss-of-function (dMMR / MSI-H)
disease_id: DIS-PROSTATE
escat_tier: IA
evidence_summary: 'PMS2 germline loss-of-function in prostate produces dMMR/MSI-H phenotype. Pan- tumor
  MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per GARNET) supersedes tumor-specific
  lines via tissue-agnostic FDA approval. MSI-H in prostate is rare (~3-5%); pembrolizumab tissue-agnostic
  applies in mCRPC after standard therapy.

  '
evidence_summary_ua: 'Герміногенна втрата функції PMS2 при раку передміхурової залози зумовлює фенотип
  dMMR/MSI-H. Тканинно-агностична придатність до ICI при pan-tumor MSI-H (пембролізумаб згідно з KEYNOTE-158,
  достарлімаб згідно з GARNET) переважає пухлиноспецифічні лінії через тканинно-агностичне схвалення FDA.
  MSI-H при раку передміхурової залози є рідкісним (~3–5%); тканинно-агностичний пембролізумаб застосовується
  при mCRPC після стандартної терапії.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_05
