id: BMA-PMS2-GERMLINE-UROTHELIAL
biomarker_id: BIO-DMMR-IHC
variant_qualifier: PMS2 germline loss-of-function (dMMR / MSI-H)
disease_id: DIS-UROTHELIAL
escat_tier: IA
evidence_summary: 'PMS2 germline loss-of-function in urothelial produces dMMR/MSI-H phenotype. Pan-tumor
  MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per GARNET) supersedes tumor-specific
  lines via tissue-agnostic FDA approval. MSI-H in urothelial is rare (~3-5%); pembrolizumab tissue-agnostic
  applies.

  '
evidence_summary_ua: 'Герміногенна втрата функції PMS2 при уротеліальному раку зумовлює фенотип dMMR/MSI-H.
  Тканинно-агностична придатність до ICI при pan-tumor MSI-H (пембролізумаб згідно з KEYNOTE-158, достарлімаб
  згідно з GARNET) переважає пухлиноспецифічні лінії через тканинно-агностичне схвалення FDA. MSI-H при
  уротеліальному раку є рідкісним (~3–5%); тканинно-агностичний пембролізумаб застосовується.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_05
regulatory_approval:
  fda:
  - pembrolizumab — pan-tumor MSI-H/dMMR
  ema: []
  ukraine: []
recommended_combinations:
- pembrolizumab monotherapy (pan-tumor MSI-H, FDA 2017)
- standard urothelial therapy (cisplatin or ICI 1L per PD-L1)
contraindicated_monotherapy: []
