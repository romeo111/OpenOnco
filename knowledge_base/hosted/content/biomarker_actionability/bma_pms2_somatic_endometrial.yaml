id: BMA-PMS2-SOMATIC-ENDOMETRIAL
biomarker_id: BIO-DMMR-IHC
variant_qualifier: PMS2 somatic loss-of-function (dMMR / MSI-H)
disease_id: DIS-ENDOMETRIAL
escat_tier: IA
evidence_summary: 'PMS2 somatic loss-of-function in endometrial produces dMMR/MSI-H phenotype. Pan-tumor
  MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per GARNET) supersedes tumor-specific
  lines via tissue-agnostic FDA approval. Advanced/recurrent dMMR endometrial: dostarlimab + carbo/paclitaxel
  1L (RUBY) and pembrolizumab + carbo/paclitaxel (NRG-GY018) doubled PFS. Dostarlimab/pembrolizumab monotherapy
  in 2L+. Adjuvant ICI in early-stage dMMR under study.

  '
evidence_summary_ua: 'Соматична втрата функції PMS2 при раку ендометрія зумовлює фенотип dMMR/MSI-H. Тканинно-агностична
  придатність до ICI при pan-tumor MSI-H переважає пухлиноспецифічні лінії. Перша лінія: достарлімаб (dostarlimab)
  або пембролізумаб + карбоплатин/паклітаксел при dMMR/MSI-H ендометрії.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_05
