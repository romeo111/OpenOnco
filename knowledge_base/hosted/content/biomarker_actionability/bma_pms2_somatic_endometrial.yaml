notes: 'Somatic PMS2 loss → cascade testing optional (reflex germline confirmation strongly recommended;
  ~30% of dMMR tumors have germline cause). Pan-tumor MSI-H ICI eligibility supersedes tumor-specific
  lines.

  '
notes_ua: "Соматична втрата PMS2 → тканинно-агностична придатність до ICI при MSI-H переважає пухлиноспецифічні
  лінії. Рефлекторне герміногенне тестування рекомендоване для виключення синдрому Лінча. Частота MSI-H
  при dMMR пухлинах становить ~30% серед усіх dMMR клінічних варіантів.\n"
