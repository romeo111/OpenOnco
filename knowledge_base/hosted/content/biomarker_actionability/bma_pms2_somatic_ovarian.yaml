id: BMA-PMS2-SOMATIC-OVARIAN
biomarker_id: BIO-DMMR-IHC
variant_qualifier: PMS2 somatic loss-of-function (dMMR / MSI-H)
disease_id: DIS-OVARIAN
escat_tier: IB
evidence_summary: 'PMS2 somatic loss-of-function in ovarian produces dMMR/MSI-H phenotype. Pan- tumor
  MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per GARNET) supersedes tumor-specific
  lines via tissue-agnostic FDA approval. MSI-H is rare (~3%) in EOC; pembrolizumab tissue-agnostic applies
  in pretreated setting.

  '
evidence_summary_ua: 'Соматична втрата функції PMS2 при раку яєчників зумовлює фенотип dMMR/MSI-H. Тканинно-агностична
  придатність до ICI переважає пухлиноспецифічні лінії. MSI-H є рідкісним (~3%) при EOC; тканинно-агностичний
  пембролізумаб застосовується у попередньо лікованих пацієнтів.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_05
regulatory_approval:
  fda:
  - pembrolizumab — pan-tumor MSI-H/dMMR
  ema: []
  ukraine: []
recommended_combinations:
- pembrolizumab monotherapy (pan-tumor MSI-H/dMMR, FDA 2017)
- standard EOC therapy by HRD/BRCA status
contraindicated_monotherapy: []
primary_sources:
