notes: >
  ESCAT IA (cross-reference BMA-SMO-BCC for primary efficacy citations). The PTCH1 BMA
  exists separately from SMO BMA because: (1) Gorlin syndrome patients require specific
  management considerations (radiation avoidance, genetic counseling, enhanced surveillance);
  (2) PTCH1 germline testing should be offered to BCC patients with early onset (<30y),
  multiple synchronous BCCs, or family history; (3) acquired HHI resistance mechanism
  in PTCH1-driven BCC involves secondary SMO mutation (not amplification of PTCH1).
  Distinguish: PTCH1 somatic (sporadic BCC — most common) vs PTCH1 germline (Gorlin —
  rare, ~1/30,000 live births, accounts for ~1% of all BCC cases but nearly 100% of
  childhood BCCs). Gorlin syndrome workup: cranial MRI (calcified falx cerebri, medulloblastoma
  risk), orthopantomogram (odontogenic keratocysts), skeletal survey, ophthalmology.
notes_ua: "ESCAT IA (перехресне посилання BMA-SMO-BCC для основних цитувань ефективності). BMA PTCH1 існує
  окремо від BMA SMO, оскільки: (1) пацієнти з синдромом Горліна потребують особливого ведення (уникнення
  опромінення, генетичне консультування, посилений нагляд); (2) герміногенне тестування PTCH1 слід пропонувати
  пацієнтам з БКК з раннім початком (<30 років), множинними синхронними БКК або сімейним анамнезом; (3)
  механізм набутої резистентності до HHI при PTCH1-зумовленому БКК включає вторинну мутацію SMO. Диференціація:
  соматичний PTCH1 (спорадичний БКК — найбільш поширений) та герміногенний PTCH1 (синдром Горліна — рідко,
  ~1/30 000 живонароджених, ~1% усіх БКК, але майже 100% БКК дитячого віку). Обстеження при синдромі Горліна:
  МРТ головного мозку (кальцифікований falx cerebri, ризик медулобластоми), ортопантомограма (одонтогенні
  кератокісти), рентгенографія скелету, офтальмологія.\n"
