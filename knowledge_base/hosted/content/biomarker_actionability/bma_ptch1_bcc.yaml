id: BMA-PTCH1-BCC
biomarker_id: BIO-PTCH1
variant_qualifier: "PTCH1 loss-of-function (somatic — sporadic BCC; germline — Gorlin/Basal Cell Nevus
  Syndrome); activates HH pathway via SMO disinhibition"
disease_id: DIS-BCC
escat_tier: IA
evidence_summary: >
  PTCH1 loss is the primary molecular driver of BCC (~90% of sporadic cases and all
  Gorlin syndrome-associated BCCs). Loss of PTCH1 function disinhibits SMO, constitutively
  activating Hedgehog (HH) signaling. Therapeutic implication is identical to SMO-mutant
  BCC: SMO antagonists (vismodegib, sonidegib) block SMO activity downstream of PTCH1 and
  restore HH pathway suppression. FDA approvals for vismodegib (2012) and sonidegib (2015)
  for laBCC/mBCC apply regardless of whether the underlying driver is PTCH1 loss or SMO
  mutation — clinical eligibility is based solely on disease extent (locally advanced or
  metastatic) and surgical/radiation suitability, not on molecular testing.
  Gorlin syndrome (germline PTCH1): same therapeutic approach but radiation therapy is
  relatively contraindicated (radiation-induced BCC within field). Cemiplimab FDA-approved
  post-HHI (2021). See BMA-SMO-BCC for full efficacy data (ERIVANCE, BOLT trials) — the
  PTCH1 and SMO BMA entries share identical therapeutic recommendations; the distinction
  is clinically relevant for resistance mechanism (secondary SMO mutation in PTCH1-driven
  BCC after HHI = acquired SMO mutation) and for Gorlin syndrome genetic counseling.
evidence_summary_ua: >
  Втрата PTCH1 є основним молекулярним драйвером базальноклітинного раку (БКК) (~90% спорадичних випадків
  та всіх БКК, асоційованих із синдромом Горліна). Втрата функції PTCH1 розгальмовує SMO, конститутивно
  активуючи Hedgehog (HH)-сигналювання. Терапевтичні наслідки ідентичні SMO-мутантному БКК: антагоністи
  SMO (візомодегіб (vismodegib), сонідегіб (sonidegib)) блокують активність SMO нижче PTCH1 та відновлюють
  пригнічення HH-шляху. Схвалення FDA для візомодегібу (2012) та сонідегібу (2015) при laBCC/mBCC поширюється
  незалежно від того, чи є драйвером втрата PTCH1 або мутація SMO — клінічна придатність визначається
  виключно поширеністю захворювання (місцево поширений або метастатичний) та можливістю хірургічного/променевого
  лікування, а не молекулярним тестуванням. Синдром Горліна (герміногенний PTCH1): аналогічний терапевтичний
  підхід, але променева терапія є відносно протипоказаною (радіаційно-індукований БКК у полі опромінення).
  Цемпліmаб (cemiplimab) схвалений FDA після невдачі HHI (2021). Детальні дані з ефективності — у BMA-SMO-BCC
  (дослідження ERIVANCE, BOLT).
