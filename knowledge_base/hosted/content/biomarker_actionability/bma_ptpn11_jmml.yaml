notes: >
  ESCAT IIIA: somatic PTPN11 in JMML is a validated prognostic biomarker and molecular
  target of investigational SHP2 inhibitors. HCT is the only proven curative option.
  CRITICAL CLINICAL DISTINCTION: Noonan syndrome-associated myeloproliferation (germline
  PTPN11) is typically self-limiting and does NOT require HCT — over-treatment with HCT
  in Noonan patients carries significant morbidity without benefit. Always confirm somatic
  vs germline origin of PTPN11 mutation before committing to HCT. Methods: compare tumor
  (bone marrow) vs germline (buccal swab/saliva) allele frequency; variant frequency >25–30%
  in bone marrow with homozygous loss suggests somatic with uniparental disomy.
  Post-HCT relapse: high (25–30%); salvage with second HCT or investigational agent.
  MRD monitoring by quantitative PCR for PTPN11 mutation pre/post HCT has predictive value
  for relapse risk.
