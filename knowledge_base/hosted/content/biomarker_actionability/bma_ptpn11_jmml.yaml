id: BMA-PTPN11-JMML
biomarker_id: BIO-PTPN11
variant_qualifier: "PTPN11 somatic activating mutation (E76K, D61G, Q79R) — JMML; CRITICAL: distinguish
  somatic (JMML, requires HCT) vs germline/Noonan syndrome (may self-resolve)"
disease_id: DIS-JMML
escat_tier: IIIA
evidence_summary: >
  PTPN11 somatic activating mutations are present in ~35% of JMML cases and define the
  most common molecular driver of this disease. The mutation drives constitutive SHP2/
  RAS/MAPK signaling. Allogeneic HCT is the only established curative treatment for JMML
  (5-year EFS ~50–55%). Molecular markers guide HCT urgency: somatic PTPN11 is associated
  with worse prognosis and shorter time to progression vs CBL or NRAS mutations. Azacitidine
  (5-day schedule) is used as bridge to HCT, with some evidence of responses (phase II:
  ORR ~20–30%) and MRD reduction pre-transplant. Investigational SHP2 inhibitors (RMC-4630,
  TNO155, ERAS-601) have JMML/pediatric expansion cohorts in phase I. MEK inhibitors
  (trametinib) also under evaluation in PTPN11-mutant JMML given downstream pathway
  convergence. ESCAT IIIA: somatic PTPN11 is prognostically relevant and the molecular
  target of SHP2 inhibitors in development; HCT remains standard; no approved SHP2 inhibitor.
  Germline PTPN11 (Noonan syndrome): different clinical entity — watch-and-wait approach
  often appropriate; HCT not usually needed for Noonan myeloproliferation.
evidence_summary_ua: >
  Соматичні активуючі мутації PTPN11 наявні у ~35% випадків JMML та є найпоширенішим молекулярним драйвером
  цього захворювання. Мутація зумовлює конститутивну сигналізацію SHP2/RAS/MAPK. Алогенна трансплантація
  гемопоетичних клітин (алоТСК) є єдиним визнаним куративним методом лікування JMML (5-річна виживаність
  без подій ~50–55%). Молекулярні маркери визначають терміновість алоТСК: соматичний PTPN11 асоційований
  з гіршим прогнозом та швидшим прогресуванням порівняно з мутаціями CBL або NRAS. Азацитидин (azacitidine;
  5-денний режим) використовується як «міст» до алоТСК (фаза II: ЗЧВ ~20–30%). Дослідницькі інгібітори
  SHP2 (RMC-4630, TNO155, ERAS-601) та інгібітори MEK (траметиніб (trametinib)) перебувають в оцінці при
  PTPN11-мутованому JMML. ESCAT IIIA.
