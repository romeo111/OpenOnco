id: BMA-RAD51B-GERMLINE-BREAST
biomarker_id: BIO-HRR-PANEL
variant_qualifier: RAD51B germline pathogenic
disease_id: DIS-BREAST
escat_tier: IIIA
evidence_summary: 'RAD51B germline pathogenic in breast: moderate-risk allele (~RR 2-4 for RAD51C/D, less
  established for RAD51B). No PARPi label; off-label consideration in HRD context. ESCAT IIB-IIIA / OncoKB
  Level 3B.

  '
evidence_summary_ua: 'Герміногенні патогенні варіанти RAD51B асоційовані з помірно підвищеним ризиком
  раку молочної залози (відносний ризик ~1.5–2.0 порівняно із загальною популяцією). RAD51B кодує білок
  HR-шляху; патогенні варіанти обумовлюють HR-дефіцит, аналогічний іншим HRR-генам. Активність PARPi задокументована
  в RAD51B у малих серіях; NCCN допускає PARPi поза показаннями при HRR-мутованому раку молочної залози
  після платини. ESCAT IIA.

  '
