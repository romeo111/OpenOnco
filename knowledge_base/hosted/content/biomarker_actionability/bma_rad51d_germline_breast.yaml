id: BMA-RAD51D-GERMLINE-BREAST
biomarker_id: BIO-HRR-PANEL
variant_qualifier: RAD51D germline pathogenic
disease_id: DIS-BREAST
escat_tier: IIB
evidence_summary: 'RAD51D germline pathogenic in breast: moderate-risk allele (~RR 2-4 for RAD51C/D, less
  established for RAD51B). No PARPi label; off-label consideration in HRD context. ESCAT IIB-IIIA / OncoKB
  Level 3B.

  '
evidence_summary_ua: 'Герміногенні патогенні варіанти RAD51D асоційовані з підвищеним ризиком раку молочної
  залози. HR-дефіцит обумовлює чутливість до PARPi та препаратів платини. NCCN допускає PARPi поза показаннями
  при HRR-мутованому раку молочної залози. ESCAT IIA.

  '
