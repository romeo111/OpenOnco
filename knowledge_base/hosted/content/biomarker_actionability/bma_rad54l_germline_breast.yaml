evidence_summary: 'RAD54L germline variants: rare; HR-pathway gene with limited clinical evidence. Included
  in some HRR panels but no labeled indication. ESCAT IIIA / OncoKB Level 4.

  '
evidence_summary_ua: 'Герміногенні патогенні варіанти RAD54L асоційовані з підвищеним ризиком раку молочної
  залози. RAD54L кодує геліказу, що бере участь у HR-репарації ДНК. HR-дефіцит обумовлює теоретичну чутливість
  до PARPi та препаратів платини. ESCAT IIA/IIB залежно від контексту.

  '
