id: BMA-RB1-SCLC
biomarker_id: BIO-RB1
variant_qualifier: "RB1 biallelic loss (universal in SCLC; defines SCLC molecular signature together with TP53 loss; not a treatment-selecting biomarker in SCLC but essential for diagnosis)"
disease_id: DIS-SCLC
escat_tier: IIIB
evidence_summary: >
  RB1 biallelic loss, together with TP53 loss, is the molecular hallmark of SCLC (~95% of
  cases have both). RB1 loss is not used to select therapy in SCLC (all SCLC patients receive
  the same backbone: EP/EC ± atezolizumab/durvalumab); rather, it is a diagnostic characteristic
  and potential therapeutic vulnerability. RB1 loss renders cells dependent on alternative cell
  cycle regulators (CDK4/6-independent E2F activation) — this is why CDK4/6 inhibitors have
  no activity in SCLC (pRb loss negates CDK4/6 inhibition). Investigational targeting of
  RB1-deficient SCLC: aurora kinase A inhibitors (alisertib — phase II, limited activity);
  EZH2 inhibitors (tazemetostat — RB1-null tumors may have heightened EZH2 dependence);
  LSD1 inhibitors; ATR/CHK1 inhibitors (replication stress in RB1-null context). ESCAT IIIB:
  RB1 loss is diagnostically informative and a conceptual therapeutic target, but no FDA-approved
  targeted therapy exploiting RB1 deficiency as of 2026.
evidence_summary_ua: >
  Двоаллельна втрата RB1 + TP53 — молекулярна сигнатура SCLC (~95%). Rb-ІГХ використовується
  діагностично. RB1 не відбирає терапію при SCLC (стандарт: EP/EC ± atezo/durvalumab).
  CDK4/6-інгібітори неактивні (немає субстрату). Дослідне: alisertib (aurora A), EZH2-
  інгібітори, LSD1-інгібітори, ATR/CHK1-інгібітори. ESCAT IIIB.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "etoposide 100 mg/m² IV days 1–3 + cisplatin 25 mg/m² IV days 1–3 + atezolizumab 1200 mg IV day 1 q21d × 4 cycles, then atezolizumab maintenance (IMpower133 regimen; FDA 2019)"
  - "etoposide + carboplatin + durvalumab (CASPIAN regimen; FDA 2020)"
contraindicated_monotherapy:
  - "CDK4/6 inhibitors (palbociclib, ribociclib, abemaciclib) — universally inactive in SCLC due to RB1/pRb loss; pRb is the substrate for CDK4/6 and without it CDK4/6 inhibition has no antiproliferative effect"
primary_sources:
  - SRC-NCCN-SCLC-2025
  - SRC-CASPIAN-PAZ-ARES-2019
last_verified: "2026-05-04"
evidence_sources:
  - source: SRC-NCCN-SCLC-2025
    level: "Category 1"
    direction: Does Not Support
    significance: Sensitivity/Response
    note: "NCCN SCLC 2025: RB1 loss is universal in SCLC and does not guide systemic therapy selection. Standard treatment (EP/EC + immunotherapy) is the same regardless of RB1 status. CDK4/6 inhibitors contraindicated."
  - source: SRC-CASPIAN-PAZ-ARES-2019
    level: A
    direction: Supports
    significance: Sensitivity/Response
    note: "CASPIAN: durvalumab + EP; ESCAT IIIB context — no RB1 biomarker selection; standard treatment. RB1 loss is the background molecular feature of all enrolled patients."
actionability_review_required: true
notes: >
  ESCAT IIIB: RB1 loss in SCLC is a diagnostic feature and resistance marker (CDK4/6i)
  but does not select active targeted therapy. Rb protein loss by IHC is used clinically
  to distinguish SCLC from other high-grade neuroendocrine neoplasms: Rb-negative
  (SCLC) vs Rb-retained (carcinoid tumors, LCNEC can be variable). SCLC molecular
  subtypes (ASCL1-high, NEUROD1-high, POU2F3-high, YAP1-high) are emerging as
  predictors of DLL3 (rovalpituzumab tesirine/tarlatamab) and LSD1 inhibitor response
  but are separate biomarkers from RB1. Tarlatamab (DLL3-targeted BiTE; FDA 2024 for
  2L+ SCLC) does not select based on RB1 status.
