id: BMA-RB1-UROTHELIAL
biomarker_id: BIO-RB1
variant_qualifier: "RB1 loss in muscle-invasive urothelial carcinoma (basal/squamous-differentiated subtype enrichment; CDK4/6i resistance marker; no approved RB1-directed therapy)"
disease_id: DIS-UROTHELIAL
escat_tier: IIIB
evidence_summary: >
  RB1 alterations (deletion, mutation) occur in ~30% of muscle-invasive bladder cancer
  (MIBC) and are enriched in the basal/squamous-differentiated molecular subtype (~50%).
  RB1 loss is associated with resistance to CDK4/6 inhibitors (which require pRb to exert
  G1 arrest). In urothelial cancer, CDK4/6 inhibitors are investigational (no approved
  indication); however, RB1 status is being evaluated as a predictive biomarker for
  CDK4/6 inhibitor non-response in HR+ cancers where bladder patients are enrolled in
  basket trials. Therapeutic implications in bladder cancer: (1) RB1 loss may associate
  with sensitivity to immunotherapy (higher genomic instability) — inconsistent evidence;
  (2) Basal/squamous subtype (often RB1-low) responds better to neoadjuvant chemotherapy
  than luminal subtypes; (3) No approved targeted therapy exploits RB1 deficiency in
  bladder cancer as of 2026. ESCAT IIIB: RB1 is a prognostic and potential therapeutic
  vulnerability marker in urothelial cancer; no approved targeted agent.
evidence_summary_ua: >
  Мутації RB1 у ~30% MIBC (збагачені у базальному/плоскоклітинному підтипі ~50%).
  RB1 втрата → резистентність до CDK4/6-інгібіторів. У сечоміхурі CDK4/6i є дослідними.
  (1) Можлива чутливість до ІТ? — непослідовні дані; (2) Базальний підтип (RB1-low) →
  краща відповідь на неоад'ювантну хіміотерапію; (3) Немає схваленої таргетної терапії
  для RB1-дефіцитного МР. ESCAT IIIB.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "Platinum-based neoadjuvant chemotherapy (gemcitabine + cisplatin × 4 cycles prior to radical cystectomy) — standard for MIBC regardless of RB1 status; basal/squamous subtype (often RB1-low) may have enhanced sensitivity"
  - "Pembrolizumab or atezolizumab — approved for urothelial carcinoma (not RB1-specific; PD-L1 and TMB guide selection)"
contraindicated_monotherapy:
  - "CDK4/6 inhibitors (palbociclib, ribociclib, abemaciclib) — inactive in RB1-null context; not approved for bladder cancer and biologically ineffective without pRb"
primary_sources:
  - SRC-EAU-BLADDER-2024
  - SRC-NCCN-BLADDER-2025
last_verified: "2026-05-04"
evidence_sources:
  - source: SRC-EAU-BLADDER-2024
    level: B
    direction: Does Not Support
    significance: Sensitivity/Response
    note: "EAU Bladder 2024: RB1 loss is a molecular characterization feature in MIBC; not currently used to select systemic therapy; basal/squamous subtype classification (which correlates with RB1 loss) may inform chemotherapy sensitivity."
  - source: SRC-NCCN-BLADDER-2025
    level: "Category 2B"
    direction: Supports
    significance: "Poor Outcome"
    note: "NCCN Bladder 2025: RB1 status emerging as prognostic in MIBC; no CDK4/6 inhibitor approved for bladder; clinical trial enrollment for RB1-targeting strategies."
actionability_review_required: true
notes: >
  ESCAT IIIB: RB1 loss in urothelial cancer marks the basal/squamous subtype (along with
  CD44+, CK5/6+, CK14+) which has distinct biology from luminal subtypes. Key clinical
  implication: in the context of bladder cancer molecular subtyping, RB1-low/basal tumors
  appear to have more favorable responses to neoadjuvant cisplatin-based chemotherapy
  (paradoxically better despite poorer prognosis at diagnosis). This has not led to a
  specific approved biomarker-driven therapy. Watch for: EV-302/KEYNOTE-A39 trial
  (enfortumab vedotin + pembrolizumab, regardless of molecular subtype) has largely
  supplanted subtype-based treatment decisions in 1L metastatic urothelial cancer.
