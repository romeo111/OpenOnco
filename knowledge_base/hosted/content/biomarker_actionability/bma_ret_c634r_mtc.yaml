id: BMA-RET-C634R-MTC
biomarker_id: BIO-RET
variant_qualifier: C634R (germline — MEN2A)
disease_id: DIS-MTC
escat_tier: IB
evidence_summary: 'RET C634R is the most common MEN2A germline variant. In advanced / metastatic MEN2A-driven
  MTC, selpercatinib and pralsetinib have activity comparable to M918T disease (LIBRETTO-001 RET-mutant
  MTC cohort). FDA labels for selpercatinib/pralsetinib in RET-mutant MTC encompass germline / extracellular-domain
  variants. C634R also drives prophylactic-thyroidectomy timing in MEN2A kindred.

  '
evidence_summary_ua: 'RET C634R є найпоширенішим герміногенним варіантом MEN2A. При прогресуючому / метастатичному
  MTC, зумовленому MEN2A, селперкатиніб (selpercatinib) та пральсетиніб (pralsetinib) мають активність,
  порівнянну з захворюванням, асоційованим з p.M918T (LIBRETTO-001). Вандетаніб (vandetanib) та кабозантиніб
  (cabozantinib) схвалені FDA без вимоги до молекулярного відбору. ESCAT IB.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_05
