notes: 'ESCAT IB (slightly lower than M918T because LIBRETTO-531 1L superiority data are most robust in
  M918T-enriched cohorts; C634 is treated identically by FDA label and clinical practice). OncoKB Level
  1. Mandatory pheochromocytoma + hyperparathyroidism screening (MEN2A syndrome). Source-gap: SRC-NCCN-THYROID-2025
  placeholder; SRC-LIBRETTO001-DRILON-2020 not yet ingested.

  '
notes_ua: "ESCAT IB. Герміногенне тестування є обов'язковим. При MEN2A: скринінг феохромоцитоми та гіперпаратиреозу.
  Профілактична тиреоїдектомія рекомендована залежно від категорії ризику ATA. Джерела: SRC-LIBRETTO001-DRILON-2020,
  SRC-NCCN-THYROID-2025.\n"
