id: BMA-RET-CCDC6-NSCLC
biomarker_id: BIO-RET
variant_qualifier: CCDC6-RET fusion
disease_id: DIS-NSCLC
escat_tier: IA
evidence_summary: 'CCDC6-RET fusion is the second-most common RET fusion in NSCLC (~10-20%). Response
  to selective RET-TKIs (selpercatinib LIBRETTO-001, pralsetinib ARROW) is comparable to KIF5B-RET — fusion-partner
  identity does not currently modify treatment selection.

  '
evidence_summary_ua: 'Злиття CCDC6-RET є другим за поширеністю злиттям RET у НМРЛ (~10–20%). Відповідь
  на селективні RET-TKI (селперкатиніб (selpercatinib) LIBRETTO-001, пральсетиніб (pralsetinib) ARROW)
  є порівнянною з KIF5B-RET і не залежить від партнера злиття. ESCAT IA.

  '
