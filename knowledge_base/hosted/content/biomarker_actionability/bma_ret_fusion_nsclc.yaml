id: BMA-RET-FUSION-NSCLC
biomarker_id: BIO-RET
variant_qualifier: fusion (gene-level — KIF5B-RET, CCDC6-RET, NCOA4-RET et al.)
disease_id: DIS-NSCLC
escat_tier: IA
evidence_summary: 'RET fusion in advanced NSCLC (~1-2% of adenocarcinoma): selpercatinib (LIBRETTO-001
  Drilon 2020 — ORR 64% prior-tx / 85% TKI-naive; LIBRETTO-431 1L vs platinum-pemetrexed) and pralsetinib
  (ARROW Gainor 2021 — ORR 70%) are highly selective RET-TKIs with deep, durable responses including in
  CNS. Multikinase TKIs (cabozantinib, vandetanib) are inferior and toxic.

  '
evidence_summary_ua: 'Злиття RET при поширеному НМРЛ (~1–2% аденокарциноми): селперкатиніб (selpercatinib;
  LIBRETTO-001, Drilon 2020 — ЗЧВ 64% попередньо лікованих / 85% TKI-наївних; LIBRETTO-431 перша лінія
  проти платина/пеметрексед) та пральсетиніб (pralsetinib; ARROW, Gainor 2021 — ЗЧВ 70%) є високоселективними
  RET-TKI з глибокими відповідями, зокрема у ЦНС. Мультикіназні TKI (кабозантиніб, вандетаніб) є нижчими
  за ефективністю та токсичнішими.

  '
