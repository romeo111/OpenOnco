notes: 'ESCAT IA. OncoKB Level 1. Detection: RNA-NGS preferred over DNA-NGS (intronic breakpoints). KIF5B-RET
  most common partner (~70%); fusion-partner generally does not influence TKI response (unlike ALK). Trial-source
  gaps: SRC-LIBRETTO001-DRILON-2020, SRC-LIBRETTO-431, SRC-ARROW not yet ingested.

  '
notes_ua: "ESCAT IA. Виявлення: RNA-NGS є кращим за DNA-NGS (інтронні точки розриву). KIF5B-RET є найпоширенішим
  партнером (~70%); партнер злиття зазвичай не впливає на відповідь до TKI (на відміну від ALK). Прогалини
  в джерелах: SRC-LIBRETTO001-DRILON-2020, SRC-LIBRETTO-431, SRC-ARROW ще не завантажені.\n"
