id: BMA-RET-FUSION-THYROID-PAPILLARY
biomarker_id: BIO-RET
variant_qualifier: fusion (CCDC6-RET, NCOA4-RET, ELKS-RET et al.) — distinct from MTC mutations
disease_id: DIS-THYROID-PAPILLARY
escat_tier: IB
evidence_summary: 'RET fusion in papillary thyroid carcinoma (PTC) — ~5-10% sporadic, enriched in radiation-induced
  PTC. Selpercatinib (LIBRETTO-001 PTC cohort, Wirth 2020 — ORR 79%) and pralsetinib (ARROW PTC cohort,
  ORR 89%) are FDA-approved for RAI-refractory advanced disease. Selective RET-TKIs are preferred over
  sorafenib / lenvatinib for RET-fusion-positive RAI-refractory disease.

  '
evidence_summary_ua: 'Злиття RET при папілярному раку щитоподібної залози (PTC) — ~5–10% спорадичного,
  збагачений при радіаційно-індукованому PTC. Селперкатиніб (selpercatinib; LIBRETTO-001, когорта PTC,
  Wirth 2020 — ЗЧВ 79%) та пральсетиніб (pralsetinib; ARROW, когорта PTC — ЗЧВ 89%) є FDA-схваленими при
  RAI-рефрактерному PTC зі злиттям RET. Аблація радіоактивним йодом (RAI) залишається першою лінією при
  диференційованому PTC; селективні RET-TKI застосовуються при RAI-рефрактерному прогресуванні. ESCAT
  IB.

  '
