id: BMA-RET-M918T-MTC
biomarker_id: BIO-RET
variant_qualifier: M918T (somatic ~50% sporadic MTC; germline = MEN2B)
disease_id: DIS-MTC
escat_tier: IA
evidence_summary: 'RET M918T in medullary thyroid carcinoma (MTC): selpercatinib superior to cabozantinib/vandetanib
  in 1L advanced MTC (LIBRETTO-531, Hadoux NEJM 2024 — PFS HR 0.28). Activity also in germline-driven
  MEN2B disease. Pralsetinib (ARROW) similarly active. Selective RET-TKIs are preferred over multikinase
  TKIs.

  '
evidence_summary_ua: 'Мутація RET p.M918T є найагресивнішою герміногенною мутацією RET, асоційованою з
  MEN2B (множинна ендокринна неоплазія 2B): медулярний рак щитоподібної залози (MTC) розвивається у майже
  100% носіїв; метастазування може відбуватися у перші місяці життя. Профілактична тиреоїдектомія рекомендована
  у перші 6 місяців життя. Селперкатиніб (selpercatinib; LIBRETTO-001) — ЗЧВ 69% при попередньо лікованому
  MTC. Вандетаніб (vandetanib) та кабозантиніб (cabozantinib) схвалені FDA при прогресуючому MTC. Соматична
  p.M918T також найпоширеніша соматична мутація при спорадичному MTC.

  '
