notes: 'ESCAT IA. OncoKB Level 1. SRC-NCCN-THYROID-2025 is not yet ingested — using SRC-NCCN-CNS-2025
  as a placeholder for NCCN-derived guidance pending thyroid guideline ingestion (matches DIS-MTC source-gap
  flagging). Trial-source gap: SRC-LIBRETTO-531-WIRTH-2024 not yet ingested. Calcitonin doubling time
  <12 mo and structural progression are systemic-therapy triggers.

  '
notes_ua: "ESCAT IA. Герміногенне тестування всіх пацієнтів з MTC (DIS-MTC). При герміногенній p.M918T:
  каскадне сімейне тестування, профілактична тиреоїдектомія у перші 6 місяців. Моніторинг: кальцитонін,
  CEA. Джерела: SRC-LIBRETTO-531-WIRTH-2024, SRC-NCCN-THYROID-2025, SRC-NCCN-CNS-2025.\n"
