notes: 'ESCAT IA. OncoKB Level 1. ~1-2% NSCLC adenocarcinoma. RNA-NGS preferred for fusion detection;
  FISH and IHC alternatives.

  '
notes_ua: "ESCAT IA. Тестування на злиття ROS1 (IHC + підтвердження FISH/NGS або РНК-NGS) рекомендовано
  при всіх несквамозних НМРЛ (~1–2% поширеності). Злиття ROS1 взаємовиключні з іншими драйверними мутаціями
  EGFR/ALK/KRAS. Кришталиноподібні ретинальні відкладення при кризотинібі (доброякісні).\n"
