id: BMA-ROS1-FUSION-NSCLC
biomarker_id: BIO-ROS1-FUSION
variant_qualifier: fusion (gene-level, TKI-naive)
disease_id: DIS-NSCLC
escat_tier: IA
evidence_summary: 'ROS1 rearrangement in advanced NSCLC: entrectinib (CNS-active) and crizotinib have
  established 1L approvals. Repotrectinib (TRIDENT-1, Drilon 2024) demonstrated superior PFS and CNS activity
  1L — including activity vs G2032R resistance — and is increasingly preferred. Lorlatinib also active
  off-label.

  '
evidence_summary_ua: 'Злиття ROS1 виявляють у ~1–2% НМРЛ, переважно у молодих некурців з аденокарциномою.
  Кризотиніб (crizotinib; профіль 001, Shaw Lancet Oncol 2015) — ЗЧВ 72%; схвалений FDA 2016. Ентректиніб
  (entrectinib; STARTRK-2, Drilon NEJM 2020) — ЗЧВ 67%, ЗЧВ ЦНС >70%; схвалений FDA 2019. Лорлатиніб (lorlatinib)
  активний після невдачі кризотинібу/ентректинібу. Резистентність до кризотинібу: мутації кіназного домену
  ROS1 (p.G2032R), активація обхідних шляхів (KRAS, MET).

  '
