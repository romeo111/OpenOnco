actionability_review_required: true
notes: >
  ESCAT IA (FDA accelerated approval based on ORR; confirmatory phase III for conversion
  to regular approval pending). INI1 IHC (BAF47 antibody) is simpler and faster than
  molecular testing — loss of nuclear staining in tumor cells confirms SMARCB1 deficiency.
  Important caveat: ~10% of epithelioid sarcomas retain INI1 by IHC despite molecular loss
  (heterogeneous or focal) — in equivocal cases, SMARCB1 NGS/FISH is recommended. Note:
  tazemetostat has a second FDA approval (EZH2-mutant follicular lymphoma; SRC-MORSCHHAUSER-
  2020-TAZEMETOSTAT-FL) — that is a distinct indication driven by EZH2 gain-of-function
  mutation, not SMARCB1 loss. Secondary T-cell lymphoma risk: EZH2 inhibitors in EZH2
  wild-type/SMARCB1-deficient context have a class-wide concern; monitor CBC, consider
  periodic bone marrow monitoring in long-term responders.
