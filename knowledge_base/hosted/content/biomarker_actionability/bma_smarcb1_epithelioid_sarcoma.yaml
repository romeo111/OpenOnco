id: BMA-SMARCB1-EPITHELIOID-SARCOMA
biomarker_id: BIO-SMARCB1
variant_qualifier: "SMARCB1/INI1 biallelic loss-of-function — confirmed by loss of INI1 nuclear expression on IHC (BAF47/INI1 antibody); NGS/FISH for deletion confirmation optional"
disease_id: DIS-EPITHELIOID-SARCOMA
escat_tier: IA
evidence_summary: >
  Tazemetostat (EPZ-6438), an EZH2 methyltransferase inhibitor, is FDA-approved (January
  2020) for adults and pediatric patients (≥16 years) with metastatic or locally advanced
  epithelioid sarcoma not eligible for complete resection. This was the first FDA approval
  in this disease and the first EZH2-targeted approval in solid tumors. EZH-202 phase II
  (Gounder et al., Lancet Oncology 2020): N=62 evaluable; primary endpoint ORR by RECIST 1.1.
  ORR: 15% (9/62; 1 CR, 8 PR); clinical benefit rate (CR+PR+SD ≥32 weeks): 26%.
  mDOR in responders: not reached at time of analysis. Disease control rate: ~26% with
  durable SD. Safety profile: generally well-tolerated; rare secondary T-cell lymphoma risk
  (class-wide EZH2 inhibitor concern); myeloid malignancy risk with long-term use (monitoring
  recommended). INI1 loss (IHC) is the companion diagnostic — required for diagnosis and
  eligibility. Standard chemotherapy (doxorubicin-based) remains an option for fit patients
  with rapidly progressive disease; tazemetostat preferred for slow-growing/indolent course.
evidence_summary_ua: >
  Таземетостат (EZH2-інгібітор) — схвалений FDA (січень 2020) для дорослих та педіатричних
  пацієнтів (≥16 р.) з метастатичною або місцево-поширеною епітеліоїдною саркомою без
  можливості повної резекції. EZH-202 (Gounder et al., Lancet Oncol 2020): N=62; ORR 15%
  (1 CR, 8 PR); CBR 26%. Втрата INI1 (ІГХ) — супутня діагностика. Доксорубіцин-based —
  альтернатива при швидкопрогресуючому захворюванні.
