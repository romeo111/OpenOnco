id: BMA-SMO-BCC
biomarker_id: BIO-SMO
variant_qualifier: "SMO activating mutation — activates HH pathway downstream of PTCH1; all BCC harbors HH pathway activation; biomarker testing not required for clinical eligibility; SMO mutation identifies HH pathway driver"
disease_id: DIS-BCC
escat_tier: IA
evidence_summary: >
  Hedgehog (HH) pathway inhibitors — vismodegib (Erivedge, FDA 2012) and sonidegib
  (Odomzo, FDA 2015) — are approved for locally advanced BCC (laBCC) not amenable to
  surgery/radiation, and metastatic BCC (mBCC). Both are SMO antagonists; all BCC harbors
  HH pathway activation (PTCH1 loss ~90%, SMO mutation ~10–20%), so biomarker testing
  is not required for clinical eligibility. Key efficacy data:
  Vismodegib (ERIVANCE, Sekulic et al. NEJM 2012): laBCC ORR 43% (CR 13%), mBCC ORR 30%;
  mDOR ~7.6 months; CR in laBCC can be durable and enable resection.
  Sonidegib (BOLT, Migden et al. Lancet Oncol 2015): laBCC ORR 58% (200 mg arm); mBCC
  ORR 17%. Comparable efficacy; different toxicity profile.
  Cemiplimab (anti-PD-1, FDA 2021) is approved for laBCC/mBCC after HHI failure or
  in patients where HHI is not appropriate.
  SMO secondary mutations (D473H most common) drive acquired HHI resistance — clinical
  crossover between agents has limited efficacy.
evidence_summary_ua: >
  HH-інгібітори — візомодегіб (FDA 2012) та сонідегіб (FDA 2015) — схвалені для місцево-
  поширеного (laBCC) та метастатичного (mBCC) БКК. Тестування на SMO/PTCH1 не потрібне.
  Візомодегіб (ERIVANCE): ORR 43% (laBCC), 30% (mBCC). Сонідегіб (BOLT): ORR 58% (laBCC).
  Цемипліумаб (FDA 2021) — після прогресування на HHI або при протипоказаннях.
  Вторинні мутації SMO (D473H) → набута резистентність.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "vismodegib (Erivedge) 150 mg PO QD — locally advanced or metastatic BCC (FDA January 2012; ERIVANCE)"
    - "sonidegib (Odomzo) 200 mg PO QD with food — locally advanced BCC not amenable to curative surgery/radiation (FDA July 2015; BOLT)"
    - "cemiplimab (Libtayo) — locally advanced or metastatic BCC after HHI failure (FDA February 2021)"
  ema:
    - "vismodegib — laBCC/mBCC (EMA 2013)"
    - "sonidegib — laBCC (EMA 2015)"
    - "cemiplimab — laBCC/mBCC after HHI (EMA 2021)"
  ukraine: []
recommended_combinations:
  - "vismodegib 150 mg PO QD (continuous; break after 24 weeks if CR/near-CR to reduce cumulative toxicity; MIKIE study)"
  - "sonidegib 200 mg PO QD with food (preferred over 800 mg arm — similar efficacy, less toxicity)"
  - "cemiplimab 350 mg IV q3w — post-HHI progression or HHI-inappropriate patients"
contraindicated_monotherapy:
  - "HHI (vismodegib/sonidegib) in pregnancy — teratogenic (embryo-fetal toxicity Category X); mandatory contraception required"
  - "HHI in Gorlin syndrome + prior radiation — radiation-induced BCC outside field is not an indication; radiation itself is relatively contraindicated in Gorlin patients"
