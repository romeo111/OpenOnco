notes: >
  ESCAT IA (multiple FDA approvals; phase II/III data). Drug-class toxicity (both HHIs):
  muscle cramps (~68%), alopecia (~60%), dysgeusia (~55%), weight loss (~45%), fatigue,
  nausea. A treatment holiday (12 weeks off after initial response) reduces cumulative
  toxicity without compromising efficacy (MIKIE study). Sonidegib has higher rate of
  elevated CPK (myopathy risk) than vismodegib — monitor CPK. HHI-to-HHI crossover:
  generally not effective; SMO D473H resistance mutation not blocked by either approved agent.
  Consider vismodegib for patients with multiple BCCs (Gorlin syndrome) — can dramatically
  reduce BCC burden, but long-term toxicity limits chronic use. Cemiplimab is effective
  post-HHI; PD-L1 testing not required (approved regardless of PD-L1 status).
