    note: "NCCN CNS 2025: TERT promoter mutation required for molecular GBM diagnosis (IDH-wildtype astrocytoma with TERT, EGFR amp, or +7/-10 = GBM regardless of histologic grade). TERT does not guide treatment selection; MGMT methylation guides temozolomide."
  - source: SRC-EANO-GBM-2024
