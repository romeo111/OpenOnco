actionability_review_required: true
notes: >
  ESCAT IIB: TERT mutation in glioma is a diagnostic classifier and prognostic marker, not
  a therapeutic target. TERT testing is part of the mandatory integrated molecular workup
  for all diffuse gliomas per WHO CNS 5th edition (2021): IDH1/2, ATRX, 1p/19q, CDKN2A/B,
  TERT promoter, MGMT promoter (treatment-predictive). Note: TERT promoter is NOT covered by
  most routine exome sequencing panels — dedicated panel or separate Sanger/ddPCR assay needed.
  Oligodendroglioma precision: triple positive (IDH+/1p19q-codel+/TERT+) is the most reliable
  molecular classifier; TERT-negative IDH+/1p19q-codel tumors are diagnostically ambiguous.
  Treatment for TERT-positive GBM is identical to TERT-negative GBM: RT + temozolomide ±
  bevacizumab; no clinical benefit from TERT-specific approaches has been demonstrated.
