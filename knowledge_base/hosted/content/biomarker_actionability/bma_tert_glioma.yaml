id: BMA-TERT-GLIOMA
biomarker_id: BIO-TERT
variant_qualifier: "TERT promoter mutation (C228T or C250T) — WHO CNS tumor classification context: GBM (IDH-wild-type; required for molecular diagnosis), oligodendroglioma (IDH-mutant + 1p/19q co-deletion + TERT = canonical)"
disease_id: DIS-GBM
escat_tier: IIB
evidence_summary: >
  TERT promoter mutations are central to WHO CNS tumor classification (2021 5th edition):
  (1) GBM (IDH-wildtype, WHO grade 4): TERT promoter mutation is one of three molecular
      defining features (together with EGFR amplification and chromosome +7/-10 copy number
      changes). An IDH-wildtype diffuse astrocytoma with any of these features meets criteria
      for molecular GBM diagnosis regardless of histologic grade. TERT alone: ~70–80% of
      GBM. TERT mutation identifies the most aggressive tumor biology within IDH-wildtype
      astrocytomas. No TERT-directed therapy available.
  (2) Oligodendroglioma (IDH-mutant, 1p/19q co-deleted): TERT promoter mutation is
      present in ~70% and is part of the canonical molecular definition. TERT testing is
      used to confirm oligodendroglioma classification (IDH + 1p/19q + TERT triple positive).
  (3) IDH-mutant astrocytoma (grade 2–4): TERT promoter mutation is less common (~20%)
      and associated with worse prognosis within IDH-mutant tumors; CDKN2A/B homozygous
      deletion is the main grade 4 determinant in IDH-mutant astrocytoma.
  Standard treatment for GBM is unchanged by TERT status: Stupp protocol (RT + temozolomide,
  followed by temozolomide maintenance). MGMT promoter methylation — not TERT — determines
  temozolomide sensitivity. ESCAT IIB: TERT is a diagnostic molecular classifier in glioma
  with strong prognostic significance but no actionable therapeutic target.
evidence_summary_ua: >
  Мутації промотора TERT — центральні для класифікації WHO CNS 2021:
  (1) GBM (IDH-wild): TERT — одна з 3 молекулярних ознак (разом з EGFR ампліфікацією
      та +7/-10); ~70–80% GBM; найагресивніша біологія.
  (2) Олігодендрогліома: IDH + 1p/19q + TERT = канонічне визначення.
  (3) IDH-мутантна астроцитома: TERT рідше (~20%), гірший прогноз.
  Лікування GBM незмінне при TERT: Stupp (RT + TMZ). MGMT — не TERT — визначає
  відповідь на TMZ. ESCAT IIB.
