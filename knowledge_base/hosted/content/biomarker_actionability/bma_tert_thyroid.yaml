id: BMA-TERT-THYROID
biomarker_id: BIO-TERT
variant_qualifier: "TERT promoter mutation (C228T or C250T) in papillary or follicular thyroid carcinoma
  — adverse prognostic marker; synergistic mortality risk when co-occurring with BRAF V600E"
disease_id: DIS-THYROID-PAPILLARY
escat_tier: IIB
evidence_summary: >
  TERT promoter mutations (C228T or C250T) occur in ~10–15% of papillary thyroid cancer
  (PTC) and ~15–20% of follicular thyroid cancer (FTC). TERT mutation is a strong adverse
  prognostic marker in differentiated thyroid cancer. Key evidence:
  Xing et al. (NEJM 2014 correspondence / JAMA Oncol): BRAF V600E + TERT promoter mutation
  creates a synergistic mortality risk — patients with both mutations have ~40× higher
  disease-specific mortality vs those with neither (BRAF+TERT double-positive: ~68% 10-yr
  mortality vs ~2% wild-type). TERT alone or BRAF alone: intermediate risk. ATA 2015
  guidelines incorporate BRAF V600E as a risk-stratification factor; ESMO/NCCN 2025 updates
  recommend TERT testing alongside BRAF to identify the highest-risk PTC subgroup.
  Therapeutic implication: TERT-mutant/BRAF-mutant PTC should receive more aggressive
  radioiodine (RAI) therapy and enhanced surveillance. RAI-refractory TERT/BRAF-double-
  mutant PTC may benefit from kinase inhibitors (sorafenib, lenvatinib). No TERT-specific
  inhibitor approved for thyroid cancer. ESCAT IIB: established prognostic biomarker;
  no direct therapeutic target, but guides treatment intensity.
evidence_summary_ua: >
  Мутації промотору TERT (C228T або C250T) виявляють у ~10–15% папілярного (PTC) та ~15–20% фолікулярного
  (FTC) раку щитоподібної залози. Мутація TERT є сильним несприятливим прогностичним маркером при диференційованому
  раку щитоподібної залози. Ключові докази: Xing et al. (NEJM 2014 / JAMA Oncol): BRAF V600E + мутація
  TERT-промотору створюють синергічний ризик смертності — пацієнти з обома мутаціями мають ~40-кратно
  вищу хворобоспецифічну смертність порівняно з носіями дикого типу (BRAF+TERT: ~68% 10-річна смертність
  проти ~2% дикий тип). Без прямої таргетної терапії для мутацій TERT-промотору. При RAI-рефрактерному
  диференційованому раку: ленватиніб (lenvatinib) та сорафеніб (sorafenib) є стандартом незалежно від
  статусу TERT. ESCAT IIB.
