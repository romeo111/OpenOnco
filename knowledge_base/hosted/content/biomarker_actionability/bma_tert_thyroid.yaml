recommended_combinations:
- "Radioactive iodine (RAI) — intensified dosing strategy for TERT+BRAF double-positive PTC (consider
  150–200 mCi therapeutic dose with TSH stimulation for high-risk features)"
- "lenvatinib 24 mg PO QD — for RAI-refractory differentiated thyroid cancer (SELECT trial; FDA 2015);
  TERT mutation predicts RAI-refractoriness; not TERT-specific approval"
- "sorafenib 400 mg PO BID — RAI-refractory DTC (DECISION trial; FDA 2013; alternative to lenvatinib)"
