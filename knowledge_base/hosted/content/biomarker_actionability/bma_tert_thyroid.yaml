notes: >
  ESCAT IIB: TERT promoter mutation is a validated adverse prognostic marker in differentiated
  thyroid cancer; it modulates treatment intensity (more aggressive RAI, enhanced
  surveillance) rather than selecting a targeted drug. TERT testing is NOT universally
  standard of care yet but is increasingly incorporated in high-risk PTC workup.
  Practical implementation: TERT testing should be performed in PTC with any of these
  features: T3/T4, N1b, M1, large tumor, extrathyroidal extension, multifocal disease,
  or aggressive histology (tall cell, columnar cell, diffuse sclerosing variants). If
  TERT+ and BRAF+: classify as highest risk; consider intensified RAI and kinase inhibitor
  planning if RAI-refractory. If TERT-/BRAF+: intermediate risk per ATA. Note: TERT
  promoter sequencing requires specific panel design — many standard targeted NGS panels
  do NOT cover the TERT promoter; verify panel before ordering.
notes_ua: "ESCAT IIIB (прогностичний). Тестування TERT-промотору рекомендовано при стратифікації ризику
  прогресуючого диференційованого раку щитоподібної залози. Особливо важливе при BRAF V600E-позитивних
  пухлинах (найгірший прогноз при коінтеграції).\n"
