notes: >
  ESCAT IB. p53-aberrant IHC pattern (not TP53 sequencing) is the clinical standard
  for molecular subtype assignment in the ESMO 2023 / ProMisE classification.
  This is distinct from BMA-TP53-MUT-ENDOMETRIAL (gene mutation level, ESCAT IIIB,
  no targeted therapy) — the IHC pattern's actionability is about treatment intensification
  (chemoRT over RT alone), not about a targeted agent.
  The 4-class molecular subtyping (POLE-ultramutated → best prognosis, MMR-deficient,
  NSMP, p53-abn → worst prognosis) is now required in all newly diagnosed endometrial
  carcinomas per ESMO 2023 and NCCN 2025. Testing priority: POLE sequencing first,
  then MMR IHC (MLH1/MSH2/MSH6/PMS2), then p53 IHC.
  Practical note: p53-abn IHC CANNOT be interpreted in the context of concurrent
  POLE mutation — POLE-ultramutated tumors are assigned regardless of p53 IHC
  (POLE overrides per ESMO hierarchy rule).
