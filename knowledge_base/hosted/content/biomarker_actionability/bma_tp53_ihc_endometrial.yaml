id: BMA-TP53-IHC-ENDOMETRIAL
biomarker_id: BIO-TP53-IHC
variant_qualifier: >
  p53-aberrant IHC pattern: either (a) diffuse strong nuclear staining >80% of
  tumor cell nuclei (overexpression, missense surrogate) OR (b) complete absence
  of nuclear staining with intact internal controls — endothelium/stroma must
  stain positive (null pattern, nonsense/frameshift surrogate). Equivocal
  (heterogeneous, patchy <80% or wild-type-pattern) = p53-wildtype by IHC.
  Note: BIO-TP53-IHC (this entry) ≠ BIO-TP53-MUTATION — IHC is the clinical
  surrogate used in ESMO 2023 molecular subtyping; sequencing confirmation optional
  but not required for guideline application.
disease_id: DIS-ENDOMETRIAL
escat_tier: IB
evidence_summary: >
  p53-aberrant (p53-abn) endometrial carcinoma defines the highest-risk molecular
  subgroup per the ProMisE/TCGA/ESMO 2023 molecular classification (corresponding
  to "copy-number-high/serous-like" TCGA group). p53-abn tumors are typically
  high-grade, often serous or clear-cell histology, with the worst prognosis
  (5-yr OS ~55-60% in early-stage vs ~90% for POLE-ultramutated).

  PORTEC-3 (de Boer et al. Lancet 2019 / Oncology 2022 update): phase III RCT,
  686 pts high-risk endometrial carcinoma; adjuvant chemoradiotherapy (cisplatin
  45 Gy EBRT + carboplatin/paclitaxel x4 cycles) vs pelvic RT alone.
  Primary results: 5-yr failure-free survival 75.5% vs 68.6% (HR 0.71, p=0.022);
  5-yr OS 81.4% vs 76.1% (HR 0.70, p=0.034).
  Molecular subgroup analysis (León-Castillo et al. JCO 2020): among p53-abn tumors
  (n=150), chemoRT benefit was largest — HR for FFS 0.52 (95% CI 0.30–0.89); whereas
  no benefit was observed in MMRd or NSMP subgroups. This biomarker-treatment
  interaction analysis is the primary evidence for ESMO 2023 escalation recommendation.

  ESMO-ESGO-ESTRO 2023 guidelines: p53-abn molecular subtype → recommended for
  adjuvant chemoRT ± maintenance chemotherapy regardless of stage.
  NCCN Uterine Neoplasms 2025: p53-abn molecular subtype is Category 1 indication
  for adjuvant combination chemotherapy + external beam RT (chemoRT) in high-risk
  patients. Standard carboplatin AUC5 + paclitaxel 175 mg/m² q3w x4-6 cycles
  combined with or sequenced around EBRT.

  Additional support: PORTEC-4a trial (ongoing) evaluates adjuvant therapy
  de-escalation/escalation based on molecular subtype — early data further
  validate molecular triage including p53-abn as high-risk group requiring escalation.

  The actionability here is PREDICTIVE (not merely prognostic): p53-abn specifically
  predicts benefit from chemotherapy intensification BEYOND standard RT, guiding
  treatment selection in clinical practice.
evidence_summary_ua: >
  p53-аберантний (p53-abn) підтип ендометріального раку — найвищий ризик за
  молекулярною класифікацією ProMisE/ESMO 2023 (TCGA "copy-number-high"). Зазвичай
  високоагресивний, серозний або світлоклітинний гістотип.
  PORTEC-3 (фаза III, 686 пацієнтів): ад'ювантна хімопроменева терапія vs ПТ alone;
  5-річна ОВ 81.4% vs 76.1% (HR 0.70, p=0.034). Аналіз молекулярних підгруп
  (León-Castillo JCO 2020): у p53-abn пухлинах найбільша користь — HR для ВВП 0.52.
  ESMO 2023: p53-abn → ад'ювантна хімопроменева терапія незалежно від стадії.
  NCCN 2025: категорія 1 для комбінованої хімотерапії + ВППТ.
  Стандарт: карбоплатин AUC5 + паклітаксел 175 мг/м² q3w x4-6 циклів + ВППТ.
