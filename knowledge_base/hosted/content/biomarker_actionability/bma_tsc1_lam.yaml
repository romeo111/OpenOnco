evidence_sources:
- source: SRC-MILES-MCCORMACK-2011
  level: A
  direction: Supports
  significance: Sensitivity/Response
  note: "MILES phase III: sirolimus vs placebo in LAM; FEV1 slope difference +11 mL/month (p<0.001); FVC
    improved; VEGF-D reduced; QoL improved. Basis of FDA/EMA approval."
actionability_review_required: true
notes: >
  ESCAT IA (FDA-approved, phase III RCT). Sirolimus does not cure LAM — TSC1/TSC2-deficient
  LAM cells persist but their mTORC1-driven proliferation is suppressed. Therapy is indefinite.
  Monitoring: pulmonary function tests (PFTs) q3–6 months; HRCT annually or if symptoms
  change; sirolimus trough levels (target 5–15 ng/mL); VEGF-D (diagnostic and monitoring).
  Drug interactions: sirolimus is a CYP3A4 substrate and inhibitor — avoid strong CYP3A4
  inhibitors (azoles increase sirolimus levels) and inducers (rifampin decreases levels).
  TSC-associated LAM vs sporadic LAM: clinical management identical; TSC patients also need
  surveillance for SEGA, renal AML (both everolimus-treatable), and other TSC manifestations.
  Lung transplantation: reserved for advanced LAM (FEV1 <40% predicted, significant hypoxemia);
  sirolimus is typically held peri-transplant (impairs healing) and restarted post-transplant
  in some centers.
notes_ua: "ESCAT IA (схвалення FDA, фаза III РКД). Сіролімус (sirolimus) не виліковує LAM — TSC1/TSC2-дефіцитні
  LAM-клітини зберігаються, але їх mTORC1-залежна проліферація пригнічується. Терапія є безстроковою.
  Моніторинг: функціональні дихальні тести кожні 3–6 міс; HRCT щорічно або при зміні симптомів; рівні
  сіролімусу в крові (цільові 5–15 нг/мл); VEGF-D (діагностика та моніторинг). Лікарські взаємодії: сіролімус
  є субстратом та інгібітором CYP3A4 — уникати сильних інгібіторів CYP3A4 (азоли підвищують рівні сіролімусу)
  та індукторів (рифампін знижує рівні). TSC-асоційована LAM проти спорадичної LAM: клінічне ведення ідентичне;
  пацієнти з TSC також потребують нагляду за SEGA, нирковою AML (обидва підлягають лікуванню еверолімусом)
  та іншими проявами TSC. Трансплантація легень: резервована для прогресуючої LAM (ОФВ1 <40% від прогнозованого,
  значна гіпоксемія); сіролімус зазвичай відміняють перитрансплантаційно (погіршує загоєння) та відновлюють
  після трансплантації в деяких центрах.\n"
