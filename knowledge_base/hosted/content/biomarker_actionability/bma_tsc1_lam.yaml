recommended_combinations:
- "sirolimus (target trough 5–15 ng/mL; start 2 mg/day PO, adjust to trough; continuous indefinitely for
  progressive LAM)"
- "everolimus 10 mg PO QD (TSC-associated LAM and renal AML; EXIST-2 dosing)"
contraindicated_monotherapy:
- "sirolimus in pregnancy — embryo-fetal toxicity; mandatory contraception"
- "hormonal contraceptives (estrogen-containing) — LAM is estrogen-sensitive; progesterone-only or non-hormonal
  methods preferred"
