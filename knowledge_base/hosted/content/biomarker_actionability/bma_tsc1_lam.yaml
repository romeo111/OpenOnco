id: BMA-TSC1-LAM
biomarker_id: BIO-TSC1
variant_qualifier: "TSC1 or TSC2 loss-of-function (LAM context — somatic in sporadic LAM, germline in TSC-associated LAM); mTORC1 hyperactivation is the therapeutic target regardless of TSC1 vs TSC2 specificity"
disease_id: DIS-LAM
escat_tier: IA
evidence_summary: >
  Sirolimus (rapamycin), an mTORC1 inhibitor, is FDA-approved (May 2015) and EMA-approved
  (2017) for treatment of LAM in adults. MILES phase III RCT (McCormack et al., NEJM 2011):
  N=89 (46 sirolimus, 43 placebo); 12-month treatment + 12-month observation.
  Primary endpoint: FEV1 change from baseline to 12 months (mL/month rate).
  FEV1 slope: +1 mL/month (sirolimus) vs -12 mL/month (placebo); difference 11 mL/month
  (p<0.001). Secondary: FVC improvement, VEGF-D reduction, 6-min walk improvement, QoL.
  After 12-month observation: benefits partially lost (FEV1 decline resumes), suggesting
  need for continuous therapy. mTOR inhibition does not eliminate LAM cells but controls
  their mTORC1-driven proliferation. Everolimus is used for TSC-associated LAM and for
  renal angiomyolipoma (EXIST-2). VEGF-D ≥800 pg/mL is a diagnostic biomarker (non-invasive
  diagnosis of LAM possible in right clinical context without biopsy).
evidence_summary_ua: >
  Сіролімус (рапаміцин) — схвалений FDA (травень 2015) та EMA (2017) для ЛАМ у дорослих.
  MILES (McCormack et al., NEJM 2011): N=89; лікування 12 міс + спостереження 12 міс.
  Швидкість ОФВ1: +1 мл/міс (сіролімус) vs -12 мл/міс (плацебо); різниця 11 мл/міс
  (p<0.001). VEGF-D знижений. Після відміни: ОФВ1 знову знижується → безперервна терапія.
  Еверолімус: для ТС-асоційованої ЛАМ та ниркових AML.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "sirolimus (Rapamune) — lymphangioleiomyomatosis in adults (FDA May 2015; MILES trial)"
    - "everolimus (Afinitor) — angiomyolipoma associated with TSC, renal (EXIST-2); SEGA associated with TSC (EXIST-1); TSC-associated partial-onset seizures (EXIST-3)"
  ema:
    - "sirolimus — LAM in adults (EMA 2017)"
    - "everolimus — TSC-related SEGA, renal AML, and pulmonary LAM (EMA)"
  ukraine: []
recommended_combinations:
  - "sirolimus (target trough 5–15 ng/mL; start 2 mg/day PO, adjust to trough; continuous indefinitely for progressive LAM)"
  - "everolimus 10 mg PO QD (TSC-associated LAM and renal AML; EXIST-2 dosing)"
contraindicated_monotherapy:
  - "sirolimus in pregnancy — embryo-fetal toxicity; mandatory contraception"
  - "hormonal contraceptives (estrogen-containing) — LAM is estrogen-sensitive; progesterone-only or non-hormonal methods preferred"
primary_sources:
  - SRC-MILES-MCCORMACK-2011
last_verified: "2026-05-04"
evidence_sources:
  - source: SRC-MILES-MCCORMACK-2011
    level: A
    direction: Supports
    significance: Sensitivity/Response
    note: "MILES phase III: sirolimus vs placebo in LAM; FEV1 slope difference +11 mL/month (p<0.001); FVC improved; VEGF-D reduced; QoL improved. Basis of FDA/EMA approval."
actionability_review_required: true
notes: >
  ESCAT IA (FDA-approved, phase III RCT). Sirolimus does not cure LAM — TSC1/TSC2-deficient
  LAM cells persist but their mTORC1-driven proliferation is suppressed. Therapy is indefinite.
  Monitoring: pulmonary function tests (PFTs) q3–6 months; HRCT annually or if symptoms
  change; sirolimus trough levels (target 5–15 ng/mL); VEGF-D (diagnostic and monitoring).
  Drug interactions: sirolimus is a CYP3A4 substrate and inhibitor — avoid strong CYP3A4
  inhibitors (azoles increase sirolimus levels) and inducers (rifampin decreases levels).
  TSC-associated LAM vs sporadic LAM: clinical management identical; TSC patients also need
  surveillance for SEGA, renal AML (both everolimus-treatable), and other TSC manifestations.
  Lung transplantation: reserved for advanced LAM (FEV1 <40% predicted, significant hypoxemia);
  sirolimus is typically held peri-transplant (impairs healing) and restarted post-transplant
  in some centers.
