id: BMA-TSC1-LAM
biomarker_id: BIO-TSC1
variant_qualifier: "TSC1 or TSC2 loss-of-function (LAM context — somatic in sporadic LAM, germline in
  TSC-associated LAM); mTORC1 hyperactivation is the therapeutic target regardless of TSC1 vs TSC2 specificity"
disease_id: DIS-LAM
escat_tier: IA
evidence_summary: >
  Sirolimus (rapamycin), an mTORC1 inhibitor, is FDA-approved (May 2015) and EMA-approved
  (2017) for treatment of LAM in adults. MILES phase III RCT (McCormack et al., NEJM 2011):
  N=89 (46 sirolimus, 43 placebo); 12-month treatment + 12-month observation.
  Primary endpoint: FEV1 change from baseline to 12 months (mL/month rate).
  FEV1 slope: +1 mL/month (sirolimus) vs -12 mL/month (placebo); difference 11 mL/month
  (p<0.001). Secondary: FVC improvement, VEGF-D reduction, 6-min walk improvement, QoL.
  After 12-month observation: benefits partially lost (FEV1 decline resumes), suggesting
  need for continuous therapy. mTOR inhibition does not eliminate LAM cells but controls
  their mTORC1-driven proliferation. Everolimus is used for TSC-associated LAM and for
  renal angiomyolipoma (EXIST-2). VEGF-D ≥800 pg/mL is a diagnostic biomarker (non-invasive
  diagnosis of LAM possible in right clinical context without biopsy).
evidence_summary_ua: >
  Сіролімус (sirolimus; рапаміцин) — схвалений FDA (травень 2015) та EMA (2017) для лімфангіолейоміоматозу
  (LAM) у дорослих. Дослідження MILES (McCormack et al., NEJM 2011): N=89 (46 сіролімус, 43 плацебо);
  лікування 12 міс + спостереження 12 міс. Первинна кінцева точка: швидкість зміни ОФВ1 від базису до
  12 міс (мл/міс). Нахил ОФВ1: +1 mL/month (сіролімус) проти -12 mL/month (плацебо); різниця 11 mL/month
  (p<0.001). Вторинні кінцеві точки: покращення ФЖЄЛ, зниження VEGF-D, покращення дистанції 6-хвилинної
  ходи, якість життя. Після 12-місячного спостереження: частина переваг втрачається (ОФВ1 знову знижується)
  → необхідна безперервна терапія. Інгібування mTOR не усуває LAM-клітини, але контролює їх mTORC1-залежну
  проліферацію. Еверолімус (everolimus) застосовується при TSC-асоційованій LAM та нирковій ангіоміоліпомі
  (EXIST-2). VEGF-D ≥800 pg/mL є діагностичним біомаркером.
