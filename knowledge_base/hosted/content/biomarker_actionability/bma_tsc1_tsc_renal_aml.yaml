notes: >
  ESCAT IB (note: disease_id is DIS-RCC as closest match; this indication is specifically
  renal angiomyolipoma in TSC — a benign smooth-muscle/fat tumor, not RCC). TSC management
  requires multidisciplinary approach (neurology, nephrology, pulmonology/LAM, dermatology,
  ophthalmology, genetics). Renal AML surveillance: MRI or ultrasound q1–3 years depending
  on size and growth; embolization reserved for acute hemorrhage (Wunderlich syndrome) or
  when surgery required. Everolimus vs embolization: everolimus preferred for growing AML
  <3 cm or multiple AMLs; embolization for acute hemorrhage or very large (>8 cm) AMLs.
  Sorafenib, sunitinib, and mTOR inhibitors (everolimus, temsirolimus) are approved for
  conventional clear-cell RCC — different indication from TSC-associated AML. Malignant
  transformation of renal AML is extremely rare (<1%).
notes_ua: "ESCAT IB (примітка: disease_id — DIS-RCC як найближча відповідність; це показання специфічно
  для ниркової AML при TSC — доброякісна пухлина, не RCC). Злоякісна трансформація ниркової AML є надзвичайно
  рідкісною (<1%). Ведення TSC потребує мультидисциплінарної команди. Нагляд за AML: МРТ або УЗД кожні
  1–3 роки залежно від розміру; емболізація резервована для гострої кровотечі або дуже великих AML (>8
  см).\n"
