id: BMA-TSC1-TSC-RENAL-AML
biomarker_id: BIO-TSC1
variant_qualifier: "TSC1 or TSC2 germline loss-of-function — Tuberous Sclerosis Complex with renal angiomyolipoma
  (AML) ≥3 cm or growing, at risk for hemorrhage (Wunderlich syndrome)"
disease_id: DIS-LAM
escat_tier: IB
evidence_summary: >
  Everolimus (mTOR inhibitor) is FDA-approved (2012) for renal angiomyolipoma (AML)
  associated with TSC. EXIST-2 phase III (Bissler et al., Lancet 2013): N=118 (everolimus
  10 mg vs placebo); primary endpoint: AML response rate (≥50% reduction in sum of longest
  diameters of target AMLs). AML response: 42% (everolimus) vs 0% (placebo) (p<0.0001);
  mDOR: not reached. Disease stabilization: 96% vs 55%. Everolimus also reduces AML
  growth rate and risk of spontaneous hemorrhage (Wunderlich syndrome). In TSC patients
  with AMLs ≥3 cm, prophylactic everolimus is preferred to prophylactic embolization per
  current guidelines. Note: TSC1 germline is the biomarker for eligibility (Tuberous Sclerosis
  Complex diagnosis required); sporadic renal AML without TSC features are a different entity.
  ESCAT IB: phase III RCT data but for renal angiomyolipoma (benign disease context, not
  malignant RCC — thus IB not IA despite strong evidence).
evidence_summary_ua: >
  Мутації TSC1 (та TSC2) спричиняють гіперактивацію mTORC1, що призводить до утворення ниркових ангіоміоліпом
  (AML) при туберозному склерозі (TSC). Еверолімус (everolimus; EXIST-2, Bissler et al., Lancet 2013):
  N=118 (еверолімус 10 mg проти плацебо); частота відповіді AML ≥50%: 42% проти 0% (p<0.0001); стабілізація
  захворювання: 96% проти 55%. Схвалено FDA при AML, асоційованій з TSC. Сіролімус також активний при
  TSC-асоційованій AML. Еверолімус також схвалений для SEGA (EXIST-1) та TSC-асоційованих нападів (EXIST-3).
  ESCAT IB.
