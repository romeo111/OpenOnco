id: BIO-1P19Q-CODELETION
names:
  preferred: "1p/19q codeletion"
  synonyms:
    - "1p19q codeletion"
    - "chromosome 1p/19q loss"
    - "1p and 19q codeletion"
    - "oligodendroglioma codeletion"
    - "LOH 1p/19q"

biomarker_type: copy_number

mutation_details:
  note: >
    Concurrent loss of heterozygosity (LOH) of chromosomal arms 1p and 19q.
    Results from unbalanced translocation t(1;19)(q10;p10) generating der(1;19)
    fusion chromosome with loss of 1p and 19p material. By definition, requires
    BOTH 1p AND 19q loss (codeletion) — isolated 1p or isolated 19q loss is
    NOT diagnostic of oligodendroglioma lineage.
    Per WHO CNS 2021: IDH-mutant + 1p/19q-codeleted = Oligodendroglioma,
    IDH-mutant, 1p/19q-codeleted (WHO grade 2 or 3). This combination is
    REQUIRED for the diagnosis.

measurement:
  method: >
    FISH (most common clinical assay): dual-probe FISH using 1p36/1q25 and
    19q13/19p13 probes. Cut-off: 1p/1q ratio <0.85 or 19q/19p ratio <0.85
    considered deleted (lab-specific thresholds).
    Alternative: SNP array / chromosomal microarray (detects LOH without
    requiring copy-number change — preferred for equivocal FISH cases).
    DNA methylation profiling (EPIC array) provides surrogate via copy-number
    inference and is increasingly standard at reference centers.
    NGS-based (WGS/WES/large panels): copy-number calling — emerging but
    not yet fully standardized for 1p/19q in routine practice.

specimen_requirements:
  tissue_type: "FFPE brain tumor tissue (biopsy or resection)"
  minimum_tumor_content: ">20% for reliable FISH interpretation"
  notes: >
    Must be co-tested with IDH mutation status (IDH1 R132H IHC + sequencing
    for non-canonical variants). Codeletion in IDH-wildtype context is NOT
    diagnostic of oligodendroglioma — check IDH first.

interpretation_notes: >
  Clinically actionable in:
  1. Low-grade glioma (IDH-mutant + 1p/19q-codeleted = oligodendroglioma):
     — PCV chemotherapy (procarbazine + CCNU + vincristine) or temozolomide
       after RT is the standard adjuvant for high-risk LGG (RTOG 9802 / EORTC 26951).
     — Oligodendroglioma has significantly better prognosis than IDH-mutant
       astrocytoma (no 1p/19q codeletion + ATRX loss).
  2. Absence of codeletion + IDH mutation = astrocytoma lineage → ATRX-IHC
     and TP53-IHC useful for confirmation.

related_biomarkers:
  - BIO-IDH1-R132H
  - BIO-IDH-MUTATION
  - BIO-ATRX-MUTATION
  - BIO-TERT
  - BIO-CDKN2A

external_ids:
  hugo_gene_id: "N/A — chromosomal arm deletion, not single-gene"

sources:
  - source_id: SRC-NCCN-CNS-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN CNS 2025: 1p/19q codeletion (with IDH mutation) defines oligodendroglioma;
      PCV or temozolomide chemotherapy added to RT for high-risk low-grade glioma
      (RTOG 9802: 10-yr OS 73.8% vs 60.1% with RT alone).
  - source_id: SRC-EANO-GLIOMA-2022
    position: supports
    relevant_quote_paraphrase: >
      EANO 2022 guidelines: IDH + 1p/19q codeletion diagnostic of oligodendroglioma
      per WHO CNS 2021; molecular testing mandatory for all adult diffuse gliomas.

notes: >
  WHO CNS 5th edition (2021) mandates 1p/19q codeletion testing for ALL adult
  diffuse gliomas as part of integrated histomolecular diagnosis.
  Key clinical impact: oligodendroglioma (IDH-mut/1p19q-codel) has better
  prognosis (mOS 14.7 yr RTOG 9802) vs astrocytoma (IDH-mut/no-codel, mOS 8-10 yr)
  vs GBM (IDH-wildtype, mOS 15-18 mo). Treatment intensification (PCV+RT vs RT alone)
  benefits the 1p/19q-codeleted group most (EORTC 26951, RTOG 9802). TERT promoter
  mutation is a co-occurring feature of oligodendroglioma (in ~95%) — co-testing
  reinforces diagnosis.

notes_ua: >
  Делеція 1p/19q разом з мутацією IDH = WHO-діагноз олігодендрогліоми (WHO ЦНС 2021).
  Є обов'язковим тестом при дифузних гліомах дорослих. RTOG 9802: додання PCV до ПТ
  покращує 10-річну ОВ (73.8% vs 60.1%). Краще прогноз, ніж IDH-мутантна астроцитома.

