notes: >
  APC (Adenomatous Polyposis Coli) is the gatekeeper tumor suppressor of the WNT/β-catenin
  pathway. APC forms the destruction complex with AXIN1/2, GSK-3β, and CK1α that phosphorylates
  β-catenin (CTNNB1) at exon 3 residues (S33/S37/T41/S45) targeting it for proteasomal
  degradation. Loss of APC → β-catenin accumulates, translocates to the nucleus, activates
  TCF/LEF transcription of MYC, CCND1, and pro-proliferative genes.
  Frequency: somatic APC mutation in ~80% of sporadic CRC (earliest event in adenoma-carcinoma
  sequence). Germline: FAP (familial adenomatous polyposis) — >100 adenomas, nearly 100%
  CRC risk by 40y without colectomy; AFAP (attenuated FAP) — fewer adenomas, later onset.
  Clinical relevance: APC mutation is diagnostic/prognostic context in CRC; no APC-targeted
  therapy approved. Surrogate: nuclear β-catenin by IHC confirms WNT pathway activation
  when sequencing unavailable.
notes_ua: >
  APC (Adenomatous Polyposis Coli) — ворітний ген-супресор пухлини шляху WNT/β-катенін.
  APC утворює комплекс деструкції разом з AXIN1/2, GSK-3β та CK1α, що фосфорилює
  β-катенін (CTNNB1) за залишками екзону 3 (S33/S37/T41/S45) для протеасомної
  деградації. Втрата APC → накопичення β-катеніну, його транслокація до ядра та
  активація TCF/LEF-транскрипції MYC, CCND1 та проліферативних генів.
  Частота: соматична мутація APC у ~80% спорадичного КРР (найрання подія в аденома-карциномній
  послідовності). Зародкова лінія: ФАП (сімейний аденоматозний поліпоз) — >100 аденом,
  ризик КРР ~100% до 40 р. без колектомії; аФАП (ослаблена ФАП) — менше аденом, пізніший
  початок. Клінічне значення: мутація APC є діагностичним/прогностичним контекстом при КРР;
  схваленої APC-таргетної терапії не існує. Сурогат: ядерний β-катенін за IHC підтверджує
  активацію WNT-шляху за відсутності можливості секвенування.
