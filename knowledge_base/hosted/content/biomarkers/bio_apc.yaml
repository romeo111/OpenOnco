last_reviewed: "2026-05-04"
notes: >
  APC (Adenomatous Polyposis Coli) is the gatekeeper tumor suppressor of the WNT/β-catenin
  pathway. APC forms the destruction complex with AXIN1/2, GSK-3β, and CK1α that phosphorylates
  β-catenin (CTNNB1) at exon 3 residues (S33/S37/T41/S45) targeting it for proteasomal
  degradation. Loss of APC → β-catenin accumulates, translocates to the nucleus, activates
  TCF/LEF transcription of MYC, CCND1, and pro-proliferative genes.
  Frequency: somatic APC mutation in ~80% of sporadic CRC (earliest event in adenoma-carcinoma
  sequence). Germline: FAP (familial adenomatous polyposis) — >100 adenomas, nearly 100%
  CRC risk by 40y without colectomy; AFAP (attenuated FAP) — fewer adenomas, later onset.
  Clinical relevance: APC mutation is diagnostic/prognostic context in CRC; no APC-targeted
  therapy approved. Surrogate: nuclear β-catenin by IHC confirms WNT pathway activation
  when sequencing unavailable.
notes_ua: >
  APC — ворітний ген-супресор пухлини WNT/β-катенін-шляху. Соматична мутація у ~80% спорадичного
  КРР (рання подія в аденома-карциномній послідовності). Зародкова лінія: ФАП (>100 аденом,
  ризик КРР ~100% без колектомії); аФАП (ослаблена). Немає схваленої APC-таргетної терапії.
  Ядерний β-катенін (IHC) — сурогатний маркер активації WNT-шляху.
