notes: >
  BAP1 (BRCA1-associated protein 1) is a nuclear deubiquitinase / tumor
  suppressor on 3p21. Somatic loss is a major prognostic and lineage-
  defining lesion in two rare tumors:

  **Uveal melanoma (UM):**
  - BAP1 LOF (somatic, often biallelic via 3p loss + somatic mutation)
    is the dominant driver of metastatic risk.
  - Class 2 GEP / BAP1-loss UM: ~70-80% metastasize within 5 years
    (vs <10% for BAP1-retained class 1). Liver-tropic metastatic
    pattern.
  - Distinct from cutaneous melanoma: GNAQ/GNA11 are the activating
    drivers; BAP1 is the metastatic-risk modifier.
  - Tebentafusp (gp100 × CD3 ImmTAC, FDA-approved 2022 for
    HLA-A*02:01+ metastatic UM) is the first systemic OS-prolonging
    therapy; BAP1 status does not currently gate eligibility but is
    standard prognostic stratification.

  **Malignant pleural / peritoneal mesothelioma:**
  - BAP1 LOF in ~50-60% of mesotheliomas, frequently as part of
    germline BAP1 tumor predisposition syndrome (TPDS) — increased
    lifetime risk of mesothelioma, uveal melanoma, renal cell
    carcinoma, cutaneous melanocytic BAP1-inactivated tumors.
  - BAP1 IHC loss is part of the WHO 2021 mesothelioma diagnostic
    criteria (with MTAP IHC + CDKN2A FISH).
  - Pre-clinical: BAP1-deficient mesothelioma may sensitize to EZH2
    inhibitors (tazemetostat) and PARP inhibitors — phase II evidence
    in early stages.

  **Other contexts (lower prevalence):** clear cell renal cell
  carcinoma (BAP1-mutant subtype, adverse prognosis vs PBRM1-mutant
  subtype), cholangiocarcinoma, atypical Spitz tumors.

  multi_allele_mvp skip-reason: tumor-suppressor with no single
  canonical actionable variant — many distinct LOF events all map to
  the same functional consequence; conservative MVP defers per-variant
  lookup.
notes_ua: >
  BAP1 (BRCA1-associated protein 1) — ядерна деубіквітиназа і супресор
  пухлин на 3p21. Соматична втрата — головне прогностичне і лінія-
  визначальне ушкодження у двох рідкісних пухлин:

  **Увеальна меланома (UM):**
  - BAP1 LOF (соматично, часто біалельно через втрату 3p + соматичну
    мутацію) — домінантний драйвер ризику метастазування.
  - Class 2 GEP / BAP1-loss UM: ~70-80% метастазують протягом 5 років
    (vs <10% для BAP1-retained class 1). Печінково-тропний патерн
    метастазів.
  - Відмінна від шкірної меланоми: GNAQ/GNA11 — активуючі драйвери;
    BAP1 — модифікатор ризику метастазування.
  - Тебентафузп (gp100 × CD3 ImmTAC, FDA-схвалений 2022 для HLA-A*02:01+
    метастатичної UM) — перша системна терапія, що подовжує ЗВ; статус
    BAP1 наразі не визначає прийнятність, але є стандартом прогностичної
    стратифікації.

  **Злоякісна плевральна / перитонеальна мезотеліома:**
  - BAP1 LOF у ~50-60% мезотеліом, часто як частина гермінативного
    BAP1 синдрому схильності до пухлин (TPDS) — підвищений ризик
    мезотеліоми, увеальної меланоми, ниркової карциноми, шкірних
    BAP1-інактивованих меланоцитарних пухлин.
  - Втрата BAP1 при IHC — частина діагностичних критеріїв ВООЗ 2021
    для мезотеліоми (разом з MTAP IHC + CDKN2A FISH).
  - Доклінічно: BAP1-дефіцитна мезотеліома може сенситизувати до
    EZH2-інгібіторів (таземетостат) і PARP-інгібіторів — рання фаза II.

  **Інші контексти (нижча поширеність):** світлоклітинний нирково-
  клітинний рак (BAP1-mut підтип, несприятливий прогноз vs PBRM1-mut),
  холангіокарцинома, атипові пухлини Шпіца.

  Skip-reason multi_allele_mvp: ген-супресор без єдиної канонічної
  дієвої варіанти — багато LOF подій мапуються в той самий
  функціональний наслідок; консервативний MVP відкладає per-variant
  lookup.
