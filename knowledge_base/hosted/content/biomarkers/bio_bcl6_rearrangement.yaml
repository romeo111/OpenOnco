last_reviewed: "2026-04-25"
notes: >
  Cross-disease relevance:

  - **HGBL-DH/THL**: BCL6 rearrangement is the third member of double-/
    triple-hit definition. MYC + BCL6 = double-hit (less common than
    MYC + BCL2). MYC + BCL2 + BCL6 = triple-hit (rarest, worst
    prognosis). Drives DA-EPOCH-R over R-CHOP.
  - **DLBCL**: ~20-30% have isolated BCL6 rearrangement — does NOT
    drive treatment alone (only when combined with MYC).
  - **FL**: rare ~10%.

  Required FISH on every newly-diagnosed DLBCL alongside MYC + BCL2 to
  identify HGBL-DH/THL early.
notes_ua: >
  Клінічне значення за нозологіями:

  - **ВГРЛ-DH/THL**: перебудова BCL6 є третьою складовою визначення double-/
    triple-hit. MYC + BCL6 = double-hit (менш поширений, ніж MYC + BCL2).
    MYC + BCL2 + BCL6 = triple-hit (найрідкісніший, найгірший прогноз). Є
    підставою для призначення DA-EPOCH-R замість R-CHOP.
  - **ДВКЛ**: ~20-30% мають ізольовану перебудову BCL6 — лікування не
    змінює самостійно (лише в поєднанні з MYC).
  - **ФЛ**: рідко ~10%.

  Обов'язкове FISH-тестування при кожному вперше діагностованому ДВКЛ поряд із MYC
  та BCL2 для раннього виявлення ВГРЛ-DH/THL.
