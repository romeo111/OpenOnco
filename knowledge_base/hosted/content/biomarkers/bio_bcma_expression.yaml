id: BIO-BCMA-EXPRESSION
names:
  preferred: "BCMA expression (target of teclistamab / elranatamab / cilta-cel / ide-cel)"
  ukrainian: "Експресія BCMA (мішень теклістамабу / елранатамабу / cilta-cel / ide-cel)"
  english: "BCMA expression"
biomarker_type: protein_expression_ihc

measurement:
  method: "IHC on BM core biopsy or flow cytometry on plasma cells (anti-BCMA / anti-TNFRSF17)"
  units: "categorical (positive | negative); semi-quantitative %"

specimen_requirements:
  - "BM core biopsy FFPE for IHC"
  - "Fresh BM aspirate for flow on CD138-gated plasma cells"

sources:
  - SRC-MAJESTEC-1-MOREAU-2022
  - SRC-CARTITUDE-1-BERDEJA-2021
  - SRC-NCCN-MM-2025

last_reviewed: "2026-04-29"
oncokb_skip_reason: ihc_no_variant
external_ids:
  hgnc_symbol: "TNFRSF17"
notes: >
  BCMA (B-cell maturation antigen, encoded by TNFRSF17) is universally
  expressed on malignant plasma cells in multiple myeloma — therapeutic
  target for the entire BCMA-directed class:

  - **BCMA × CD3 bispecifics**: teclistamab (MajesTEC-1, ORR 63% / ≥CR 39%
    in penta-refractory MM); elranatamab (MagnetisMM-3 — pivotal trial
    for elranatamab; SRC entry NOT YET INGESTED, flagged in commit body).
  - **BCMA CAR-T**: ciltacabtagene autoleucel (CARTITUDE-1, ORR 97% /
    sCR 67% in heavily pre-treated R/R MM); idecabtagene vicleucel
    (KarMMa, R/R MM).
  - **BCMA ADC**: belantamab mafodotin (DREAMM-7/8, R/R MM).

  Cross-disease relevance: MM is the only adult disease with
  BCMA-directed therapy in clinical use. BCMA+ status is assumed by
  histology (plasma-cell neoplasm) in clinical trials — formal IHC/flow
  measurement not part of standard MM workup but documented in trial
  eligibility logs and as reference for BCMA-loss / antigen-escape
  surveillance at relapse on BCMA-directed therapy.

  Quantitative measurement gains relevance at relapse: BCMA-loss / low
  expression after prior BCMA therapy is an emerging mechanism of
  resistance — IHC re-biopsy can guide re-treatment vs class switch
  (talquetamab / GPRC5D, selinexor combinations).

  `ihc_no_variant` skip reason — protein expression target, not variant
  lookup. MagnetisMM-3 SRC stub TODO: SRC-MAGNETISMM-3-LESOKHIN-2023
  (Lesokhin AM et al., Nat Med 2023) — pending source-ingest chunk.
notes_ua: >
  BCMA (B-cell maturation antigen, кодується TNFRSF17) є універсально
  вираженим на злоякісних плазматичних клітинах при множинній мієломі —
  терапевтична мішень усього класу BCMA-спрямованих засобів:

  - **BCMA × CD3 біспецифіки**: теклістамаб (teclistamab, MajesTEC-1, ORR 63% / ≥CR 39%
    при пента-рефрактерній ММ); елранатамаб (elranatamab, MagnetisMM-3 — піворний
    клінічне дослідження для елранатамабу; запис SRC ЩЕ НЕ ІНГЕСТОВАНО, позначено
    у тілі коміту).
  - **BCMA CAR-T**: ciltacabtagene autoleucel (CARTITUDE-1, ORR 97% /
    sCR 67% при інтенсивно передлікованій рецидивній/рефрактерній ММ);
    idecabtagene vicleucel (KarMMa, рецидивна/рефрактерна ММ).
  - **BCMA ADC**: белантамаб мафодотин (DREAMM-7/8, рецидивна/рефрактерна ММ).

  Міжнозологічне значення: ММ є єдиним дорослим захворюванням, при якому застосовуються
  BCMA-спрямовані засоби в клінічній практиці. Статус BCMA+ передбачається на підставі
  гістології (плазмоклітинна пухлина) у клінічних дослідженнях — формальне вимірювання
  IHC/проточна цитометрія не є частиною стандартного обстеження при ММ, але документується
  в журналах критеріїв включення до досліджень та є орієнтиром для спостереження за
  втратою BCMA / антигенною евазією при рецидиві на тлі BCMA-спрямованої терапії.

  Кількісне вимірювання набуває значення при рецидиві: втрата BCMA / низька
  експресія після попередньої BCMA-терапії є механізмом резистентності, що виникає, —
  повторна IHC-біопсія може визначити доцільність повторного лікування проти переходу
  на інший клас (talquetamab / GPRC5D, комбінації з selinexor).
  SRC-заглушка: SRC-MAGNETISMM-3-LESOKHIN-2023 (Lesokhin AM et al., Nat Med 2023)
  — очікує на чанк інгестування джерела.
