id: BIO-BRAF-V600E
names:
  preferred: "BRAF V600E mutation"
  ukrainian: "Мутація BRAF V600E"
  english: "BRAF V600E"
biomarker_type: gene_mutation

mutation_details:
  gene: "BRAF"
  variant_type: "missense"
  hgvs_protein: "p.V600E"
  functional_impact: "activating"

measurement: {method: "PCR / sequencing on bone marrow or peripheral blood (HCL); FFPE tumor (melanoma)", units: "categorical (positive | negative)"}
specimen_requirements: ["BM aspirate or PB for HCL", "FFPE tumor for solid tumors"]

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Defining feature of HCL (~100%). Targetable with BRAF inhibitors
  (vemurafenib, dabrafenib) — useful in relapsed/refractory HCL when
  cladribine fails. Also relevant in melanoma, some thyroid, colorectal
  cancers (different therapeutic context).
