notes: >
  Diagnostic criterion for ET (~25%) and PMF (~25–30%); essentially
  absent in PV. Mutually exclusive with JAK2 V617F and MPL W515 (the
  three drive ~95% of MPNs). Type 1 (52-bp del) carries more
  myelofibrotic phenotype and better OS in PMF; type 2 (5-bp ins)
  more thrombocytosis-predominant ET phenotype with lower thrombosis
  risk. JAK inhibitors (ruxolitinib, momelotinib, fedratinib,
  pacritinib) are not mutation-specific — they target downstream
  JAK-STAT, so they work in CALR-, JAK2-, and MPL-driven disease.
  Mutant CALR is also a tumor-specific neoantigen — anti-mutCALR
  immunotherapy in early-phase trials.
notes_ua: >
  Діагностичний критерій для ЕТ (~25%) та ПМФ (~25–30%); практично відсутня при ІП.
  Є взаємовиключною з JAK2 V617F та MPL W515 (ці три мутації визначають ~95% МПН).
  Тип 1 (делеція 52 п.н.) асоціюється з більш мієлофіброзним фенотипом і кращою ЗВ
  при ПМФ; тип 2 (інсерція 5 п.н.) — з тромбоцитоз-домінантним фенотипом ЕТ та нижчим
  ризиком тромбозу. Інгібітори JAK (руксолітиніб (ruxolitinib), момелотиніб, федратиніб,
  пакритиніб) не є мутація-специфічними — вони спрямовані на низхідний JAK-STAT, тому
  діють при CALR-, JAK2- і MPL-керованому захворюванні. Мутантний CALR є
  пухлино-специфічним неоантигеном — анти-mutCALR імунотерапія досліджується у
  ранньофазових клінічних дослідженнях.
