id: BIO-CD10-IHC
names:
  preferred: "CD10 IHC (CALLA, neprilysin)"
  synonyms:
    - "CD10 immunohistochemistry"
    - "CALLA (Common Acute Lymphoblastic Leukemia Antigen)"
    - "Neprilysin IHC"
    - "MME protein expression"

biomarker_type: protein_expression_ihc

mutation_details:
  gene_symbol: MME
  gene_id_ncbi: 4311
  note: >
    CD10 (cluster of differentiation 10) is a cell-surface metalloprotease
    expressed on germinal center B-cells, follicular lymphoma cells, ALL blasts,
    endometrial stromal cells, and renal proximal tubular cells. In lymphoma
    context: CD10 positivity (≥30% of tumor cells) = GC origin (Hans algorithm
    Step 1). Membranous staining pattern.

measurement:
  method: >
    IHC on FFPE biopsy. Anti-CD10 antibody (clone 56C6 or SP67).
    Membranous ± cytoplasmic staining. Hans algorithm cut-off: ≥30% positive
    tumor cells = CD10 positive (GCB assignment in DLBCL). Some algorithms use
    ≥20%. Automated scoring on digital platforms.

specimen_requirements:
  - "FFPE lymph node or extranodal biopsy; also bone marrow trephine"

interpretation_notes: >
  Hans algorithm (Step 1): CD10 ≥30% → GCB subtype (no further IHC needed).
  Other hematologic contexts:
  - Follicular lymphoma: CD10+ (characteristic, used in panel diagnosis)
  - B-ALL: CD10+ (pre-B ALL; CALLA expression; poor prognosis if absent in some subtypes)
  - Burkitt lymphoma: CD10+ (helps distinguish from DLBCL)
  - Marginal zone lymphoma (MALT): CD10- (helps distinguish from FL)
  - Mantle cell lymphoma: CD10- usually (negative)
  Solid tumor contexts:
  - Clear-cell RCC: CD10+ (used in panel for RCC diagnosis)
  - Endometrial stromal sarcoma: CD10+ (characteristic)
  - Melanoma: CD10+/- (variable)

related_biomarkers:
  - BIO-BCL6-IHC
  - BIO-MUM1-IHC
  - BIO-DLBCL-COO-HANS

external_ids:
  hugo_gene_id: "4311"

sources: [SRC-NCCN-B-CELL-2025]

notes: >
  CD10 is a multi-purpose diagnostic marker in hematopathology. In DLBCL,
  it is the first and most specific step of the Hans algorithm — CD10+ alone
  classifies as GCB without needing BCL6 or MUM1. In FL, CD10 is used in
  the diagnostic panel (CD10+ CD20+ BCL2+ BCL6+ with follicular architecture).
  In B-ALL, CD10 expression is standard immunophenotyping.

notes_ua: >
  CD10 IHC — крок 1 алгоритму Hans для ДВКЛ. CD10 ≥30% = ГЦБ без додаткових
  тестів. Також позитивний при ФЛ, В-ГЛЛ, лімфомі Беркіта, ясноклітинному НКК,
  ендометріальній стромальній саркомі.

last_reviewed: "2026-05-05"
