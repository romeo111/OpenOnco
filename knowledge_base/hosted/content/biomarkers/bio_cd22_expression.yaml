id: BIO-CD22-EXPRESSION
names:
  preferred: "CD22 expression (target of inotuzumab ozogamicin)"
  ukrainian: "Експресія CD22 (мішень інотузумабу озогаміцину)"
  english: "CD22 expression"
biomarker_type: protein_expression_ihc

measurement:
  method: "Flow cytometry on PB/BM blasts OR IHC on FFPE biopsy (anti-CD22)"
  units: "categorical (positive ≥20% blasts | negative); semi-quantitative %"

specimen_requirements:
  - "Fresh PBMC / BM aspirate for flow"
  - "FFPE biopsy block for IHC"

sources:
  - SRC-INOVATE-KANTARJIAN-2016
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-29"
oncokb_skip_reason: ihc_no_variant
external_ids:
  hgnc_symbol: "CD22"
notes: >
  CD22+ status (≥20% of blasts/lymphoma cells expressing CD22 by flow or
  IHC) is the standard eligibility threshold for inotuzumab ozogamicin
  (anti-CD22 calicheamicin ADC) — INO-VATE used flow ≥20% of blasts.

  Cross-disease relevance:

  - **B-ALL** (~90%+): CD22+ on virtually all B-ALL — required for
    inotuzumab in R/R B-ALL (INO-VATE 2L+; CR/CRi 81% vs 29% chemo).
    Also gates moxetumomab (HCL) and emerging CD22 CAR-T trials.
  - **B-cell NHL** (variable): CD22+ in CLL, MCL, FL, DLBCL — quantitative
    threshold matters for ADC dosing rationale; qualitative positive for
    diagnostic panel use.
  - **HCL**: CD22+ universally (target of moxetumomab).

  Quantitative measurement matters: weak / partial CD22 expression
  predicts inferior ADC response. VOD/SOS risk post-allo-HCT (~14% in
  INO-VATE) — pre-transplant inotuzumab dose limit. `ihc_no_variant`
  skip reason — protein expression target, not variant lookup.
notes_ua: >
  Статус CD22+ (≥20% бластів / клітин лімфоми, що експресують CD22, за проточною
  цитометрією або IHC) є стандартним порогом відбору для інотузумабу озогаміцину
  (inotuzumab ozogamicin; анти-CD22 кон'югат каліхеаміцин ADC) — у INO-VATE
  використовувався поріг ≥20% бластів за проточною цитометрією.

  Клінічне значення за нозологіями:

  - **В-ГЛЛ** (~90%+): CD22+ практично на всіх В-ГЛЛ — обов'язковий для
    інотузумабу при рецидивному/рефрактерному В-ГЛЛ (INO-VATE 2L+; CR/CRi 81% vs 29%
    при хіміотерапії). Також є критерієм для моксетумомабу (ВКЛ) та
    клінічних досліджень CD22 CAR-T.
  - **В-клітинна НГЛ** (варіабельно): CD22+ при ХЛЛ, МКЛ, ФЛ, ДВКЛ —
    кількісний поріг є важливим для обґрунтування дозування ADC; якісна
    позитивність — для діагностичних панелей.
  - **ВКЛ**: CD22+ універсально (мішень моксетумомабу).

  Кількісне вимірювання є важливим: слабка / часткова експресія CD22
  передбачає гіршу відповідь на ADC. Ризик VOD/SOS після алоТГСК (~14% в
  INO-VATE) — обмеження дози інотузумабу до трансплантації.
