id: BIO-CD38-EXPRESSION
names:
  preferred: "CD38 expression (target of daratumumab / isatuximab)"
  ukrainian: "Експресія CD38 (мішень даратумумабу / ізатуксимабу)"
  english: "CD38 expression"
biomarker_type: protein_expression_ihc

measurement:
  method: "Flow cytometry on CD138-gated plasma cells (MM) OR IHC on BM core biopsy"
  units: "categorical (positive | negative); semi-quantitative MFI / %"

specimen_requirements:
  - "Fresh BM aspirate for flow on CD138+ plasma cells"
  - "BM core biopsy FFPE for IHC"

sources:
  - SRC-CASTOR-PALUMBO-2016
  - SRC-ALCYONE-MATEOS-2018
  - SRC-NCCN-MM-2025

last_reviewed: "2026-04-29"
oncokb_skip_reason: ihc_no_variant
external_ids:
  hgnc_symbol: "CD38"
notes: >
  CD38 is universally expressed at high density on malignant plasma
  cells in multiple myeloma — basis for the entire anti-CD38 mAb class
  (daratumumab, isatuximab) which is now part of standard 1L MM regimens
  (Dara-VRd / Dara-RVd, Dara-VMP for transplant-ineligible).

  Cross-disease relevance + quantitative line stratification:

  - **MM (1L)**: assumed CD38+ on histology (plasma-cell neoplasm). Pivotal
    trials (ALCYONE Dara-VMP vs VMP, MAIA Dara-Rd vs Rd, GRIFFIN
    Dara-VRd) established anti-CD38 mAb as 1L standard. Formal IHC/flow
    not gating but documented at diagnosis.
  - **MM (R/R after anti-CD38)**: CD38 antigen loss / down-modulation is
    a known resistance mechanism after daratumumab — quantitative IHC /
    flow MFI on relapse biopsy informs class switch (BCMA-directed,
    selinexor, anti-SLAMF7 elotuzumab) vs anti-CD38 retreatment with
    isatuximab (CASTOR + IKEMA, ICARIA-MM in R/R).
  - **AL amyloidosis**: CD38+ on plasma-cell clone — Dara-CyBorD is
    standard 1L (ANDROMEDA).
  - **Indolent NHL / CLL**: CD38+ subset in CLL is an adverse prognostic
    marker (independent of BTKi-era; flag-only).
  - **T-ALL / NK-cell neoplasms**: CD38+ subset; daratumumab investigated
    in early-phase trials.

  Antigen-density consideration: CD38-low plasma-cell populations
  pre-existing or emergent post-Dara predict reduced subsequent
  anti-CD38 efficacy. `ihc_no_variant` skip reason — protein expression
  target, not variant lookup.
notes_ua: >
  CD38 є універсально вираженим на злоякісних плазматичних клітинах у множинній
  мієломі з високою щільністю — основа всього класу анти-CD38 mAb (даратумумаб
  (daratumumab), ізатуксимаб (isatuximab)), що нині входить до стандартних схем
  першої лінії ММ (Dara-VRd / Dara-RVd, Dara-VMP для непридатних до трансплантації).

  Міжнозологічне значення та кількісна стратифікація:

  - **ММ (1L)**: CD38+ передбачається на підставі гістології (плазмоклітинна пухлина).
    Піворні клінічні дослідження (ALCYONE Dara-VMP vs VMP, MAIA Dara-Rd vs Rd,
    GRIFFIN Dara-VRd) встановили анти-CD38 mAb як стандарт першої лінії. Формальне
    IHC/проточна цитометрія не є критерієм відбору, але документується при діагностиці.
  - **ММ (рецидивна/рефрактерна після анти-CD38)**: втрата / зниження антигену CD38
    є відомим механізмом резистентності після даратумумабу — кількісне IHC /
    MFI проточної цитометрії при рецидивній біопсії визначає доцільність переходу
    до іншого класу (BCMA-спрямовані, selinexor, анти-SLAMF7 елотузумаб (elotuzumab))
    або повторного лікування ізатуксимабом (CASTOR + IKEMA, ICARIA-MM).
  - **AL амілоїдоз**: CD38+ на плазмоклітинному клоні — Dara-CyBorD є стандартом
    першої лінії (ANDROMEDA).
  - **Індолентна НГЛ / ХЛЛ**: підгрупа CD38+ при ХЛЛ є несприятливим прогностичним
    маркером (незалежно від ери BTKi; лише прапор).
  - **Т-ГЛЛ / NK-клітинні неоплазії**: підгрупа CD38+; даратумумаб досліджується у
    ранньофазових клінічних дослідженнях.

  Щільність антигену важлива: плазмоклітинні популяції з низьким рівнем CD38,
  наявні до або що виникли після терапії Dara, передбачають знижену подальшу
  ефективність анти-CD38.
