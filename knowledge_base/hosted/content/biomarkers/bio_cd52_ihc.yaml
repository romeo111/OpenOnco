notes: >
  Cross-disease relevance — alemtuzumab target:

  - **CLL**: alemtuzumab (anti-CD52) historically used for fludarabine-
    refractory CLL; almost obsolete now in BTKi/VenO era but option for
    select r/r cases.
  - **T-cell prolymphocytic leukemia (T-PLL)**: alemtuzumab is
    standard-of-care 1L (~80% response rate) — a rare T-cell entity.
  - **Sézary syndrome**: alemtuzumab option for refractory.
  - **B-cell lymphomas variably express**.

  Profound + prolonged immunosuppression on alemtuzumab — mandatory PJP
  + HSV/VZV + CMV-DNA monitoring. Future scope: T-PLL workstream when
  rare-disease module lands.
notes_ua: >
  Клінічне значення за нозологіями — мішень алемтузумабу (alemtuzumab):

  - **ХЛЛ**: алемтузумаб (анти-CD52) історично застосовувався при флударабін-
    рефрактерному ХЛЛ; нині практично витіснений в епоху BTKi/VenO, проте залишається
    варіантом для окремих рецидивних/рефрактерних випадків.
  - **Т-клітинний пролімфоцитарний лейкоз (T-PLL)**: алемтузумаб є стандартом
    лікування першої лінії (~80% частота відповіді) — рідкісна Т-клітинна нозологія.
  - **Синдром Сезарі**: алемтузумаб як варіант при рефрактерному перебігу.
  - **В-клітинні лімфоми**: варіабельна експресія.

  Глибока та тривала імуносупресія на тлі алемтузумабу — обов'язковий моніторинг
  PJP, HSV/VZV та ДНК-ЦМВ. Перспектива: робочий процес T-PLL при впровадженні
  модуля рідкісних захворювань.
