id: BIO-CD79B-IHC
names:
  preferred: "CD79b expression by IHC (target of polatuzumab vedotin)"
  ukrainian: "Експресія CD79b (мішень полатузумабу ведотину) — ІГХ"
  english: "CD79b expression"
biomarker_type: protein_expression_ihc

measurement: {method: "IHC on FFPE biopsy", units: "categorical (positive | negative); semi-quantitative scoring optional"}
specimen_requirements: ["FFPE biopsy block"]

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
oncokb_skip_reason: ihc_no_variant
external_ids:
  hgnc_symbol: "CD79B"
notes: >
  Universal B-cell receptor component — expressed on virtually all
  mature B-cell neoplasms (DLBCL, FL, MCL, MZL, CLL, Burkitt, plasma
  cell neoplasms variably). Primarily relevant as therapeutic target
  for polatuzumab vedotin (anti-CD79b ADC; replaces vincristine in
  Pola-R-CHP for DLBCL). Routine confirmation not required for
  polatuzumab eligibility — assumed positive on B-cell histology — but
  documented when negative or weak as caveat for ADC efficacy.
notes_ua: >
  CD79b є універсальним компонентом В-клітинного рецептора, що експресується практично
  на всіх зрілих В-клітинних новоутвореннях (ДВКЛ, ФЛ, МКЛ, МЗЛ, ХЛЛ, Беркіт,
  плазмоклітинні пухлини — варіабельно). Основне значення — як терапевтична мішень
  для полатузумабу ведотину (polatuzumab vedotin; анти-CD79b ADC; замінює вінкристин
  (vincristine) у схемі Pola-R-CHP при ДВКЛ). Рутинне підтвердження не є обов'язковим
  для відбору до полатузумабу — позитивність передбачається на підставі В-клітинної
  гістології — проте фіксується при негативному або слабкому результаті як
  застереження щодо ефективності ADC.
ukrainian_review_status: pending_clinical_signoff
