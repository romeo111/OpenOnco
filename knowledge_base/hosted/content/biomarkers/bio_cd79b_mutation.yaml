last_reviewed: "2026-04-29"
notes: >
  Distinct from BIO-CD79B-IHC (which captures protein expression as
  polatuzumab-vedotin target). This biomarker captures activating
  *mutations* in the ITAM domain (most commonly Y196F/H/N/S/I) that
  drive chronic active BCR signaling.

  Cross-disease relevance:

  - **DLBCL (MCD / C5 cluster)** (~20% of ABC-DLBCL): co-mutates with
    MYD88 L265P → defines LymphGen MCD subtype. BTKi-sensitive
    (ibrutinib monotherapy ORR ~80% in MCD R/R DLBCL; rationale for
    R-CHOP + ibrutinib in fit MCD 1L per PHOENIX subgroup).
  - **PCNSL** (~30-50%): also co-clusters with MYD88 L265P; ibrutinib
    crosses BBB and shows R/R activity (Grommes 2017).
  - **CLL** (~3%): rare; no current treatment-decision driver.

  Currently a LymphGen MCD-classifier component in DLBCL/PCNSL; engine
  uses presence as input to BCR-pathway-targeted regimen selection.
  `multi_allele_mvp` skip reason: ITAM-Y196 has multiple recurring
  alleles without a single canonical hotspot — defer per-variant
  actionability lookup to post-MVP.
notes_ua: >
  Відрізняється від BIO-CD79B-IHC (який фіксує експресію білка як мішень полатузумабу
  ведотину). Цей біомаркер відображає активуючі *мутації* в ITAM-домені (найчастіше
  Y196F/H/N/S/I), що зумовлюють хронічне активне BCR-сигналювання.

  Клінічне значення за нозологіями:

  - **ДВКЛ (MCD / C5 кластер)** (~20% of ABC-ДВКЛ): ко-мутує з MYD88 L265P →
    визначає підтип LymphGen MCD. BTKi-чутливий (ібрутиніб (ibrutinib) монотерапія
    ORR ~80% при MCD рецидивній/рефрактерній ДВКЛ; обґрунтування R-CHOP + ібрутиніб
    при придатному MCD першій лінії за підгрупою PHOENIX).
  - **ПЦНСЛ** (~30-50%): також ко-кластеризується з MYD88 L265P; ібрутиніб
    проникає через ГЕБ і демонструє активність при рецидивному/рефрактерному
    захворюванні (Grommes 2017).
  - **ХЛЛ** (~3%): рідко; наразі не є драйвером терапевтичних рішень.

  Наразі є компонентом класифікатора LymphGen MCD при ДВКЛ/ПЦНСЛ; рушій (engine)
  використовує наявність мутації як вхідний сигнал для вибору схеми, спрямованої
  на BCR-шлях. Причина пропуску `multi_allele_mvp`: ITAM-Y196 має кілька рекурентних
  алелів без єдиного канонічного хотспоту — пошук actionability per-variant
  відкладено до пост-MVP.
