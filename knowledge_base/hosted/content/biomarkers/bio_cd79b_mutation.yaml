  - **PCNSL** (~30-50%): also co-clusters with MYD88 L265P; ібрутиніб
    crosses BBB and shows R/R activity (Grommes 2017).
  - **CLL** (~3%): рідкісний; no current treatment-decision driver.

  Currently a LymphGen MCD-classifier component in DLBCL/PCNSL; engine
