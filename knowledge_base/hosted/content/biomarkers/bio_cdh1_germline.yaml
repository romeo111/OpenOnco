id: BIO-CDH1-GERMLINE
names:
  preferred: "Germline CDH1 pathogenic variant"
  ukrainian: "Зародкова патогенна варіація CDH1"
  english: "Germline CDH1 mutation (HDGC syndrome)"
  synonyms: ["gCDH1", "E-cadherin germline mutation", "HDGC"]
biomarker_type: gene_mutation

mutation_details:
  gene: "CDH1"
  variant_type: "loss-of-function (frameshift, nonsense, splice, large deletions)"
  functional_impact: "loss of E-cadherin — cell-adhesion failure → diffuse-pattern epithelial cancers"
  inheritance: "germline"

measurement:
  method: "Germline multi-gene hereditary-cancer NGS panel on whole blood or saliva. Large-deletion / MLPA testing required (single-exon and whole-gene deletions are recurrent and missed by short-read NGS alone)."
  units: "categorical: pathogenic | likely_pathogenic | VUS | benign | absent"

specimen_requirements:
  - "Whole blood EDTA or saliva — germline DNA"

interpretation_notes: >
  CDH1 germline pathogenic variants define Hereditary Diffuse Gastric
  Cancer (HDGC) syndrome. Clinical implications:

    • Diffuse-type (signet-ring) gastric cancer lifetime risk
      ~40-70% (revised down from earlier 80% estimates by 2020
      international consortium).
    • Lobular breast cancer lifetime risk ~40% (women).
    • Increased risk of cleft lip/palate developmental anomaly.

  Management (NCCN Gastric / Genetic Familial High-Risk):
    • Prophylactic total gastrectomy recommended age 20–30 in carriers
      with pathogenic variants (endoscopy surveillance is unreliable —
      diffuse-type seeds beneath intact mucosa).
    • Annual breast MRI from age 30 in female carriers.
    • Risk-reducing mastectomy is a discussion-point, not default.

  Treatment-selection implication is small (no targeted therapy keyed
  on CDH1 status); the biomarker drives surveillance and prophylaxis,
  not systemic-therapy choice.

related_biomarkers:
  - BIO-BRCA-GERMLINE
  - BIO-BRCA1-BRCA2-GERMLINE

sources:
  - SRC-NCCN-GASTRIC-2025
  - SRC-NCCN-BREAST-2025
  - SRC-CIVIC

oncokb_skip_reason: germline_no_somatic

external_ids:
  hgnc_symbol: "CDH1"
  civic_url: "https://civicdb.org/genes/CDH1/summary"

last_reviewed: "2026-04-29"
notes: >
  Surveillance / prophylaxis biomarker — not a therapy-selection
  biomarker in v0.1. Engine should surface CDH1+ status under
  "hereditary syndrome — referral to genetics" rather than treatment
  branches. Lobular breast subtype + family history of diffuse gastric
  cancer is a strong testing trigger even without other red flags.
notes_ua: >
  Біомаркер для нагляду / профілактики, а не для вибору терапії
  у v0.1. Двигун має відображати CDH1+ статус у блоці "спадковий
  синдром — направлення до генетика", а не у гілках лікування.
  Лобулярний рак молочної залози + сімейний анамнез дифузного раку
  шлунка — сильний тригер тестування навіть без інших red flags.
