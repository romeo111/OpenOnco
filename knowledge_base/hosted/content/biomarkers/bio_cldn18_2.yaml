id: BIO-CLDN18-2
names:
  preferred: "Claudin-18.2 expression (CLDN18.2)"
  ukrainian: "Експресія клаудину-18.2 (CLDN18.2)"
  english: "Claudin-18 isoform 2 expression"
  synonyms: ["CLDN18.2", "Claudin 18.2", "Zolbetuximab companion biomarker"]

biomarker_type: protein_expression_ihc

measurement:
  method: "IHC with VENTANA CLDN18 (43-14A) RxDx assay (zolbetuximab companion diagnostic). Score: % of tumor cells with moderate-to-strong (2+/3+) membranous staining."
  units: "categorical: positive (≥75% of tumor cells with 2+/3+ membranous staining) | negative"

specimen_requirements:
  - "FFPE tumor block; primary or metastatic acceptable"
  - "Endoscopic biopsies — multiple fragments preferred (heterogeneity in gastric)"

interpretation_notes: >
  Positivity threshold (SPOTLIGHT/GLOW): ≥75% of tumor cells with
  moderate-to-strong (2+/3+) membranous staining → eligibility for
  zolbetuximab + chemo 1L. ~38% of HER2-negative metastatic gastric/GEJ
  adenocarcinomas meet the threshold. CLDN18.2 testing is independent
  of HER2 / MSI / PD-L1 — patients can be CLDN18.2+ AND HER2+ (HER2+
  trastuzumab takes priority); CLDN18.2+ AND MSI-H (MSI-H pembrolizumab
  takes priority); CLDN18.2+ AND CPS≥5 (MDT decision — both are
  category 1; zolbetuximab preferred when chemo backbone tolerated and
  PD-L1 modest CPS 5-10; ICI preferred for higher CPS).

related_biomarkers: [BIO-HER2-SOLID, BIO-MSI-STATUS, BIO-PDL1-CPS]

sources:
  - SRC-NCCN-GASTRIC-2025
  - SRC-ESMO-GASTRIC-2024

oncokb_skip_reason: ihc_no_variant
external_ids:
  hgnc_symbol: CLDN18

last_reviewed: "2026-04-30"

notes: >
  CLDN18.2 is a tight-junction protein normally restricted to gastric
  mucosa; aberrantly expressed in gastric/GEJ, pancreatic, and biliary
  adenocarcinomas. Zolbetuximab is a chimeric IgG1 mAb targeting
  CLDN18.2 — first FDA approval Oct 2024 (SPOTLIGHT mFOLFOX6 + GLOW CAPOX
  registrational trials). Companion diagnostic VENTANA CLDN18 (43-14A)
  RxDx required. SPOTLIGHT: mOS 18.2 vs 15.5 mo (HR 0.75); GLOW: mOS
  14.4 vs 12.2 mo (HR 0.77). Hierarchy when multiple actionable signals
  co-occur: HER2+ (TOGA/KEYNOTE-811) > MSI-H (KEYNOTE-859) > CLDN18.2+
  (SPOTLIGHT/GLOW) > PD-L1 CPS≥5 ICI add-on (CheckMate-649).
notes_ua: >
  CLDN18.2 — білок щільних контактів, у нормі обмежений шлунковою
  слизовою; аномально експресується в gastric/GEJ, панкреатичних і
  біліарних аденокарциномах. Зольбетуксимаб — химерне IgG1 мАт проти
  CLDN18.2 — перше FDA схвалення жовтень 2024 (SPOTLIGHT mFOLFOX6 +
  GLOW CAPOX). Супутній діагностичний тест VENTANA CLDN18 (43-14A)
  RxDx обов'язковий. SPOTLIGHT: мЗВ 18.2 vs 15.5 міс (HR 0.75);
  GLOW: мЗВ 14.4 vs 12.2 міс (HR 0.77). Ієрархія при ко-екпресії:
  HER2+ > MSI-H > CLDN18.2+ > PD-L1 CPS≥5.
