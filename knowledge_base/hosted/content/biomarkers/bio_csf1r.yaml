notes: >
  CSF1R (CD115) is the receptor for colony-stimulating factor 1 (CSF1/M-CSF) and IL-34.
  In TGCT (diffuse type, formerly PVNS), the predominant mechanism is CSF1 overexpression
  by a minority neoplastic cell population (via COL6A3-CSF1 fusion in ~50%), which recruits
  and drives proliferation of CSF1R-expressing macrophages and osteoclast-like giant cells
  constituting the bulk of the tumor mass. Pexidartinib (PLX3397) is a CSF1R/KIT/FLT3
  inhibitor FDA-approved (2019) specifically for TGCT. CSF1R is also expressed broadly on
  tumor-associated macrophages (TAMs) — multiple investigational agents target TAMs via
  CSF1R (emactuzumab, cabiralizumab) but none is approved for non-TGCT indications.
  Do not confuse with KIT (CD117) — pexidartinib inhibits both, but the TGCT approval is
  CSF1R pathway-driven.
notes_ua: >
  CSF1R (CD115) — рецептор для CSF1/M-CSF та IL-34. При ТГКП (дифузний тип): CSF1
  надекспресується малою популяцією неопластичних клітин (через COL6A3-CSF1 злиття у ~50%),
  рекрутуючи CSF1R-позитивні макрофаги та гігантські клітини. Пексидартиніб (CSF1R/KIT/FLT3
  інгібітор) — схвалений FDA 2019 для ТГКП. Не плутати з KIT.
