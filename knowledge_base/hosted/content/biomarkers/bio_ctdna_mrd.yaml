notes_ua: >
  Лінія-агностичний пост-терапевтичний біомаркер для нагляду /
  стратифікації ризику. Дві сім'ї аналізів:

  - **Tumor-informed (персоналізовані):** Signatera (Natera), RaDaR
    (NeoGenomics/Inivata) — WES первинної пухлини проектує
    мульти-локусну панель пацієнта; висока аналітична чутливість
    (~0.01% VAF).
  - **Tumor-agnostic (універсальні):** фіксовані панелі ctDNA —
    ширше покриття рекурентних драйверних мутацій / сигнатур
    метилювання; нижча специфічність при низькому пухлинному навантаженні.

  **КРР ад'ювантно (найсильніша доказова база):**
  - **GALAXY (CIRCULATE-Japan, Kotani et al. Nat Med 2023):**
    КРР стадій II-IV, після куративної резекції, Signatera. Пацієнти
    з пост-операційним MRD+ мали ~22% 18-міс DFS проти ~93% у MRD-
    негативних. MRD+ пацієнти суттєво виграли від ад'ювантної
    хіміотерапії (vs відсутність / маргінальний ефект у MRD-).
    Встановлено цтДНК-МЗХ як клінічно дієвий стратифікатор ризику у КРР.
  - **CIRCULATE-Japan ALTAIR / VEGA / CIRCULATE-US:** триваючі
    рандомізовані дослідження ескалації / деескалації за MRD.

  **Інші лінії з накопичуваними даними:**
  - М'язово-інвазивний рак сечового міхура (IMvigor010 ctDNA-підгрупа):
    MRD+ виграли від ад'ювантного атезолізумабу; MRD- — ні.
  - Молочна залоза (рання HR+/HER2+): емерджентно з c-TRAK-TN, CHIRP
    тощо — поки не рівень-1 дієвість.
  - НДРЛ ад'ювантно (ретроспективи пост-IMpower010), підшлункова, шлунок —
    емерджентно.

  **Клінічні застереження:**
  - **Негативний != вилікуваний:** межа виявлення ~0.01% VAF;
    мікрометастатична хвороба нижче LOD може рецидивувати.
  - **Позитивний != хвороба:** клональний гемопоез (CHIP) може давати
    хибно-позитивні; tumor-informed аналізи зменшують, але не
    усувають.
  - Оптимальний час пост-операційного забору залежить від аналізу;
    більшість даних — 4-8 тижнів після терапії з куративним наміром.
  - Доступ і відшкодування різні (US Medicare КРР, розширюється).

  Skip-reason tumor_agnostic: композитне вимірювання (вихід аналізу,
  не варіант послідовності) — немає єдиного (ген, варіант) кортежу,
  придатного для per-variant actionability lookup; клінічне використання
  керується кількісним результатом, не специфічним алелем.

