last_reviewed: "2026-05-04"
notes: >
  CTNNB1 encodes β-catenin, a dual-function protein: (1) structural (adherens junctions,
  E-cadherin complex); (2) transcriptional (WNT signaling effector, activating TCF/LEF
  target genes including MYC, CCND1). Activating mutations in exon 3 prevent destruction
  complex (APC/AXIN/GSK-3β/CK1) from phosphorylating β-catenin, leading to nuclear
  accumulation and constitutive WNT target gene activation. Key clinical contexts:
  (1) Endometrial cancer (EC): CTNNB1 exon 3 mutations in ~25–30%, predominantly in
      endometrioid histology. The TCGA molecular classification: CTNNB1 mutation is
      enriched in the NSMP (No Specific Molecular Profile) and POLE-ultramutated groups.
      Critical prognostic finding: CTNNB1 mutations, particularly in FIGO stage I-II EC,
      associate with L1CAM overexpression and high risk of recurrence despite low stage —
      this subgroup may benefit from adjuvant chemotherapy (EC-specific risk stratification
      per ESGO/ESMO/ESTRO 2023). CTNNB1-mutant NSMP EC is classified as intermediate/
      high-intermediate risk.
  (2) HCC: CTNNB1 mutations in ~20–30%, associated with the β-catenin activated molecular
      subtype (cholestatic, hepatocytic differentiation). CTNNB1-mutant HCC has lower
      response rate to atezolizumab + bevacizumab (Wnt-activation may suppress immune
      infiltration — immunologically cold tumors).
  (3) Desmoid tumors (aggressive fibromatosis): CTNNB1 exon 3 mutations in ~85% of
      sporadic desmoids. Nirogacestat (gamma-secretase inhibitor) is FDA-approved (2023)
      for desmoid tumors — WNT/Notch pathway intersection; CTNNB1 mutation may predict
      response.
  (4) Medulloblastoma (WNT subtype): CTNNB1 mutations define the WNT subtype (~10% of
      MB) with best prognosis; now treated with de-escalated therapy per SJMB12/PNET5.
  No FDA-approved CTNNB1-specific inhibitor as of 2026.
notes_ua: >
  CTNNB1 кодує β-катенін — структурний (E-кадгеринові з'єднання) та транскрипційний
  (WNT-ефектор, активує MYC, CCND1). Мутації в екзоні 3 → накопичення у ядрі.
  Контексти: (1) РЕ (~25–30%; CTNNB1+L1CAM → ризик рецидиву попри низький стадій;
  ESGO/ESMO проміжний/високий ризик); (2) HCC (~20–30%; гірша відповідь на atezo+bev);
  (3) Дesmoid пухлини (~85%; нірогацестат FDA 2023); (4) Медулобластома WNT-підтип (~10%;
  найкращий прогноз, de-escalation хіміотерапії).
