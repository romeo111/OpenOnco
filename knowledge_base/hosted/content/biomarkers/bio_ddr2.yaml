notes: >
  DDR2 (Discoidin Domain Receptor Tyrosine Kinase 2) is a collagen receptor RTK that signals
  through SRC, MAPK, and PI3K cascades. Activating mutations occur in ~2–4% of squamous cell
  NSCLC (enriched in squamous histology; rare in adenocarcinoma). Dasatinib inhibits DDR2
  kinase in vitro and preclinical models, but clinical responses have been anecdotal (case
  reports/small series only). No Phase III trial or FDA approval for DDR2-selected therapy.
  DDR2 mutation in squamous NSCLC co-occurs with FGFR1 amplification (~10–15% of SqCC) and
  does not exclude standard-of-care chemoimmunotherapy. Clinical significance: investigational
  target; not used to select therapy outside clinical trials.
notes_ua: >
  DDR2 (рецепторна тирозинкіназа 2 дискоїдинового домену) є рецепторною RTK колагену, що
  передає сигнали через каскади SRC, MAPK та PI3K. Активуючі мутації виявляються у ~2–4%
  плоскоклітинного НМРЛ (збагачення у плоскоклітинній гістології; рідко при аденокарциномі).
  Дазатиніб (dasatinib) пригнічує кіназу DDR2 in vitro та на передклінічних моделях, однак
  клінічні відповіді були поодинокими (повідомлення про окремі випадки / невеликі серії).
  Жодного клінічного дослідження фази 3 або схвалення FDA для DDR2-відібраної терапії немає.
  Мутація DDR2 при плоскоклітинному НМРЛ співіснує з ампліфікацією FGFR1 (~10–15% ПКК)
  і не виключає стандартного лікування хіміоімунотерапією. Клінічне значення: дослідницька
  мішень; поза клінічними дослідженнями терапевтичний вибір не визначає.
