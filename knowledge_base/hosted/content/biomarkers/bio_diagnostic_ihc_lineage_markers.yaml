oncokb_skip_reason: ihc_no_variant
notes: >
  Composite vocabulary entry for diagnostic lineage and differentiation IHC
  markers. These markers support histogenesis, site-of-origin, lymphoma
  immunophenotype, neuroendocrine differentiation, melanoma lineage,
  mesothelial lineage, sarcoma lineage, and germ-cell differentiation. They
  should be accepted by free-text case parsing as biopsy context, but should
  not be interpreted as variant-level actionability or used alone to select
  targeted systemic therapy.
