measurement:
  method: "Immunohistochemistry or in situ hybridization on FFPE tissue as part of a diagnostic lineage/differentiation panel"
  units: "categorical staining pattern or expression status"
specimen_requirements:
  - "Representative FFPE biopsy or resection tissue"
  - "Interpret in a pathology panel with morphology, tumor site, and staining pattern"
