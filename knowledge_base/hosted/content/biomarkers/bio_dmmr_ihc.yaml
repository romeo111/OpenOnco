id: BIO-DMMR-IHC
names:
  preferred: "Mismatch repair protein expression by IHC"
  ukrainian: "Експресія MMR-білків (ІГХ)"
  english: "dMMR / pMMR by IHC"
  synonyms: ["MMR IHC", "MLH1/MSH2/MSH6/PMS2 panel"]
biomarker_type: protein_expression_ihc
measurement:
  method: "IHC for MLH1, MSH2, MSH6, PMS2 on FFPE; loss of any → dMMR"
  units: "categorical: dMMR (≥1 protein lost) | pMMR (all retained)"
  rounding: "categorical"
specimen_requirements: ["FFPE tumor block"]
interpretation_notes: >
  IHC for the 4 MMR proteins. Loss of MLH1+PMS2 most common (Lynch
  syndrome germline OR sporadic via MLH1 hypermethylation —
  BRAF V600E + MLH1 promoter methylation suggests sporadic).
  Clinically equivalent to MSI-H by PCR/NGS for treatment decisions.
related_biomarkers: [BIO-MSI-STATUS]
sources: [SRC-NCCN-COLON-2025]
last_reviewed: "2026-04-26"
oncokb_skip_reason: ihc_no_variant
