last_reviewed: "2026-05-04"
notes: >
  ERBB4 (HER4) is the fourth member of the ERBB/HER receptor tyrosine kinase family. Somatic
  mutations occur in ~2–3% of NSCLC (mixed histologies). Afatinib (pan-HER inhibitor) and
  neratinib have preclinical/early clinical activity against ERBB4-mutant tumors, but no
  prospective Phase III trial has demonstrated benefit in ERBB4-selected patients. Afatinib
  is FDA-approved for EGFR-mutant NSCLC and ERBB2-mutant NSCLC (exon 20) — ERBB4 mutation
  alone does not qualify for these approvals. NRG1 fusions (NRG1 is the primary ERBB4 ligand)
  are a distinct actionable alteration that activates ERBB3/ERBB4 signaling; afatinib and
  zenocutuzumab (bispecific anti-HER2/HER3) have shown activity in NRG1-fusion lung cancer.
  ERBB4 mutation per se is not currently an approved companion diagnostic target.
notes_ua: >
  ERBB4 (HER4) — четвертий член родини ERBB/HER RTK. Соматичні мутації у ~2–3% НМРЛ.
  Афатиніб/нератиніб активні in vitro, але немає фази III для ERBB4-відібраних пацієнтів.
  Афатиніб FDA-схвалений для EGFR-мутантного та HER2-мутантного (екзон 20) НМРЛ — ERBB4
  не входить до цих показань. Злиття NRG1 (ліганд ERBB4) — окрема мішень (земоцутузумаб).
