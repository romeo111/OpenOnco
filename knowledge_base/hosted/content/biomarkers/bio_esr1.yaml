notes: >
  Acquired in ~30–40% of HR+ HER2− metastatic breast progressing on
  aromatase inhibitor; <1% in primary tumors at diagnosis. Predictive
  for elacestrant (oral SERD; EMERALD trial — PFS benefit limited to
  ESR1-mut subgroup). Test on ctDNA at progression on AI ± CDK4/6i.
  Other oral SERDs (camizestrant, giredestrant, imlunestrant) and
  PROTACs in late development. Y537S confers more aggressive biology
  than D538G in some series. ctDNA is the preferred specimen because
  ESR1 mutations are typically subclonal in tissue and frequently
  polyclonal across metastatic sites.
notes_ua: >
  Мутація ESR1 набуває характеру у ~30–40% HR+ HER2− метастатичного раку молочної залози,
  що прогресує на інгібіторі ароматази; <1% у первинних пухлинах при діагнозі. Є
  предиктивним маркером для елацестранту (elacestrant, пероральний SERD; EMERALD —
  перевага у виживаності без прогресування обмежена підгрупою з ESR1-мут). Тестування
  на циркулюючій пухлинній ДНК при прогресуванні на AI ± CDK4/6i. Інші пероральні SERD
  (camizestrant, giredestrant, imlunestrant) та PROTAC-деградери в пізній стадії розробки.
  Y537S асоціюється з агресивнішою біологією порівняно з D538G за деякими серіями.
  Циркулююча пухлинна ДНК є переважним матеріалом, оскільки мутації ESR1 зазвичай є
  субклональними в тканині та часто поліклональними в різних метастатичних сайтах.
