id: BIO-ESR1
names:
  preferred: "ESR1 mutation (ligand-binding domain)"
  ukrainian: "Мутація ESR1 (ліганд-зв'язуючий домен)"
  english: "ESR1 LBD mutation"
  synonyms: ["ESR1 LBD", "ER-α mutation", "ESR1 D538G", "ESR1 Y537S"]

biomarker_type: gene_mutation
mutation_details:
  gene: "ESR1"
  gene_hugo_id: "HGNC:3467"
  hotspots: ["D538G", "Y537S", "Y537N", "Y537C", "L536H", "E380Q"]
