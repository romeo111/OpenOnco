last_reviewed: "2026-04-25"
notes: >
  Cross-disease relevance:

  - **Follicular Lymphoma** (~25% Y641-mutated): predicts response to
    tazemetostat (EZH2 inhibitor) in r/r FL. FDA-approved for
    EZH2-mutated FL after ≥2 prior lines. Wild-type EZH2 r/r FL has
    lower response rate. NCCN: tazemetostat preferred in 3L+ for
    EZH2-mut.
  - **DLBCL** (~20%): GCB subtype enriched. Tazemetostat investigational.
  - **MM** (~5%): mostly subset with t(4;14) — investigational.

  Direct algorithm impact: future r/r FL routing toward tazemetostat
  vs other 3L+ options. Currently informational + 2L flag for clinical
  trials.
notes_ua: >
  Клінічне значення за нозологіями:

  - **Фолікулярна лімфома** (~25% Y641-мутована): передбачає відповідь на
    таземетостат (tazemetostat; EZH2-інгібітор) при рецидивному/рефрактерному ФЛ.
    Схвалений FDA для EZH2-мутованого ФЛ після ≥2 попередніх ліній. Wild-type EZH2
    рецидивний/рефрактерний ФЛ має нижчу частоту відповіді. NCCN: таземетостат
    є переважним у третій лінії та пізніше при EZH2-мут.
  - **ДВКЛ** (~20%): збагачений у ГЦБ-підтипі. Таземетостат є дослідницьким.
  - **ММ** (~5%): переважно підгрупа з t(4;14) — дослідницький.

  Прямий вплив на алгоритм: у перспективі маршрутизація рецидивного/рефрактерного ФЛ
  до таземетостату проти інших варіантів третьої лінії та пізніше. Наразі є
  інформаційним + прапор другої лінії для клінічних досліджень.
