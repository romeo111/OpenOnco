notes: >
  FBXW7 (F-Box and WD Repeat Domain Containing 7) is the substrate-recognition subunit of the
  SCF (SKP1-CUL1-F-box) E3 ubiquitin ligase complex. FBXW7 recognizes phosphodegrons on multiple
  oncoproteins and mediates their ubiquitin-proteasomal degradation. Key substrates: NOTCH1/2,
  MYC, CCNE1, mTOR, JUN, MCL-1. Loss of FBXW7 → stabilization of these oncoproteins → resistance
  to multiple targeted therapies.
  Frequency: ~10–15% CRC (one of highest across cancers), ~15% T-ALL, ~6% gastric, ~5% pancreatic.
  Clinical significance: FBXW7 mutation is a resistance mechanism (to anti-NOTCH, CDK4/6i via CCNE1
  upregulation, mTOR inhibitors via mTOR stabilization) rather than an independent therapeutic
  target. In CRC, FBXW7 mutation does not select any approved systemic therapy; it may co-occur
  with MSI-H (favoring immunotherapy) but is not independently actionable. ESCAT IV.
notes_ua: >
  FBXW7 (ген F-box/WD-repeat, хромосома 4q) є субодиницею розпізнавання субстрату
  E3-убіквітинлігазного комплексу SCF (SKP1-CUL1-F-box). FBXW7 розпізнає фосфодегрони
  на численних онкопротеїнах і опосередковує їх убіквітин-протеасомну деградацію.
  Ключові субстрати: NOTCH1/2, MYC, CCNE1, mTOR, JUN, MCL-1. Втрата FBXW7 →
  стабілізація цих онкопротеїнів → резистентність до кількох таргетних терапій.
  Частота: ~10–15% КРР (одна з найвищих серед злоякісних пухлин), ~15% Т-ГЛЛ,
  ~6% раку шлунку, ~5% раку підшлункової залози. Клінічне значення: мутація FBXW7
  є механізмом резистентності (до анти-NOTCH, CDK4/6i через накопичення CCNE1,
  mTOR-інгібіторів через стабілізацію mTOR), а не самостійною терапевтичною мішенню.
  При КРР мутація FBXW7 не є показанням до жодної схваленої системної терапії;
  може співіснувати з MSI-H (що надає перевагу імунотерапії), але самостійно не є
  actionable. ESCAT IV.
