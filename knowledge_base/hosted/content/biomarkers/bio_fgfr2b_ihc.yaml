id: BIO-FGFR2B-IHC
names:
  preferred: "FGFR2b protein expression by IHC (membranous staining)"
  ukrainian: "Експресія білка FGFR2b за ІГХ (мембранне забарвлення)"
  english: "FGFR2b protein expression (IHC)"
  synonyms:
    - "FGFR2b membrane IHC"
    - "FGFR2b overexpression"
    - "Bemarituzumab companion biomarker"
    - "FGFR2 IIIb isoform"

biomarker_type: protein_expression_ihc

measurement:
  method: >
    IHC with FGFR2b-specific monoclonal antibody (FPR2-D, central laboratory
    assay used in FIGHT phase 2 and FORTITUDE-101 phase 3). Score: percentage
    of tumor cells with moderate-to-strong (2+/3+) membranous staining.
    Requires FGFR2b-IIIb-isoform-selective antibody — generic FGFR2 IHC does
    not distinguish isoforms.
  units: "categorical: positive (FGFR2b 2+/3+ membranous staining in ≥10% of tumor cells, FORTITUDE-101 threshold) | negative"

specimen_requirements:
  - "FFPE tumor block; primary or metastatic acceptable"
  - "Endoscopic biopsies — multiple fragments preferred (FGFR2b heterogeneity in gastric)"
  - "Sufficient tumor cellularity (≥100 evaluable tumor cells per FORTITUDE-101 protocol)"

interpretation_notes: >
  FGFR2b protein overexpression by IHC is mechanistically distinct from
  FGFR2 gene-level alterations (fusion / amplification / mutation, captured
  separately by BIO-FGFR2). The IHC signal reflects translation of the
  IIIb splice isoform of FGFR2 and may occur with or without underlying
  gene amplification. ~30% of HER2-negative gastric / GEJ adenocarcinoma
  show FGFR2b 2+/3+ ≥10% (FORTITUDE-101 screening data). Approximately
  half of FGFR2b-IHC-positive cases are also FGFR2-amplified by NGS
  (Wainberg, Lancet Oncol 2022, FIGHT data). Bemarituzumab binds the
  IIIb isoform of FGFR2 — the IHC test is the eligibility gate, not gene
  amplification. Co-positivity considerations: HER2+ takes priority
  (TOGA / KEYNOTE-811); MSI-H takes priority (KEYNOTE-859).

related_biomarkers:
  - BIO-FGFR2
  - BIO-HER2-SOLID
  - BIO-MSI-STATUS
  - BIO-CLDN18-2

sources:
  - SRC-FORTITUDE-101
  - SRC-NCCN-GASTRIC-2025
  - SRC-ESMO-GASTRIC-2024

oncokb_skip_reason: ihc_no_variant

external_ids:
  hgnc_symbol: FGFR2

last_reviewed: "2026-05-07"

notes: >
  Distinct from BIO-FGFR2 (gene-level alterations: fusion / amplification
  / mutation). FGFR2b-IHC is the protein-level companion biomarker for
  bemarituzumab — anti-FGFR2b chimeric IgG1 mAb with afucosylated Fc
  enhancing ADCC. FIGHT phase 2 (Wainberg, Lancet Oncol 2022) used
  FGFR2b 2+/3+ in ≥10% of tumor cells as eligibility threshold; phase 3
  FORTITUDE-101 (cite as-is — source stub pending citation upgrade)
  uses the same threshold. Companion-diagnostic IVD development ongoing
  alongside FORTITUDE-101 readout. Note: FGFR2-pan IHC and FGFR2b-IHC
  are NOT interchangeable — only the IIIb-isoform-selective antibody
  enables bemarituzumab patient selection.

notes_ua: >
  Відрізняється від BIO-FGFR2 (генні альтерації: фузія / ампліфікація /
  мутація). FGFR2b-IHC — біомаркер на рівні білка (companion biomarker)
  для bemarituzumab, химерного IgG1 мАт з afucosylated Fc-фрагментом
  для посиленої ADCC. Дослідження FIGHT фази 2 (Wainberg, Lancet Oncol
  2022) використовувало FGFR2b 2+/3+ у ≥10% пухлинних клітин як поріг
  включення; фаза 3 FORTITUDE-101 (цитується as-is — джерело-stub
  очікує оновлення цитування) застосовує той самий поріг. Розробка
  IVD-companion діагностики триває паралельно з відчитанням
  FORTITUDE-101. Зауваження: FGFR2-pan IHC і FGFR2b-IHC НЕ
  взаємозамінні — лише ізоформа-IIIb-селективне антитіло дозволяє
  відбір пацієнтів для bemarituzumab.

