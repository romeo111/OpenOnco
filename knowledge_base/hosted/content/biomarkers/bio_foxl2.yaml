notes: >
  FOXL2 (Forkhead Box L2) is a transcription factor essential for granulosa cell
  differentiation and maintenance of ovarian identity. The p.C134W (c.402C>G) hotspot
  mutation is present in ~97% of adult granulosa cell tumors (AGCTs) and is the only
  known pathognomonic point mutation in any solid tumor (100% specificity if hotspot
  confirmed). The mutation is a dominant-negative gain-of-function: C134W FOXL2 protein
  mislocalizes and aberrantly activates target genes (including CYP19A1/aromatase),
  driving estrogen excess. Clinically, the mutation is used:
  (1) Diagnostic: confirms AGCT vs other sex cord-stromal tumors (Sertoli-Leydig, fibroma).
  (2) Prognostic/monitoring: ctDNA detection of FOXL2 c.402C>G for early relapse detection
      (AGCTs recur late — 10–20 years post-diagnosis; ctDNA surveillance under investigation).
  (3) Therapeutic target: FOXL2 inhibition and CDK4/6 inhibitors (olaparib, palbociclib,
      ribociclib) are in clinical trials. Luteinizing hormone-RH agonists (leuprolide) and
      progestins are used for recurrent disease but no FDA approval in this specific context.
  ESCAT IIB: clinically useful diagnostic marker with emerging predictive utility;
  no FDA-approved targeted drug for FOXL2 p.C134W as of 2026.
notes_ua: >
  FOXL2 (p.C134W, c.402C>G) — мутація наявна у ~97% дорослих ГКП. Єдиний патогномонічний
  точковий маркер у солідних пухлинах (100% специфічність). Функція: домінантно-негативна
  активація, гіперекспресія CYP19A1/ароматаза → надлишок естрогену. Застосування:
  (1) Діагностика ГКП.
  (2) Моніторинг рецидиву (ctDNA; рецидиви через 10–20 р.).
  (3) Мішень для CDK4/6-інгібіторів (дослідне).
  Немає схваленої FDA таргетної терапії станом на 2026 р. ESCAT IIB.
