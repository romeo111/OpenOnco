last_reviewed: "2026-05-04"
notes: >
  GNAS encodes the Gα stimulatory subunit (Gα_s) that couples G-protein-coupled receptors
  to adenylyl cyclase. Activating mutations at R201 or Q227 impair intrinsic GTPase activity,
  leading to constitutive cAMP signaling. Key clinical contexts:
  (1) Intraductal papillary mucinous neoplasm (IPMN): GNAS R201 mutations in ~40–70% of
      IPMNs (predominantly main-duct and mixed-type). GNAS mutation in cyst fluid provides
      evidence of mucinous (vs serous) neoplasm when combined with KRAS mutation and elevated
      CEA (>192 ng/mL). GNAS alone does not distinguish high-grade from low-grade IPMN.
      GNAS + KRAS double mutation associated with higher malignant risk (NCCN/IAP guidelines
      recommend surgical resection more strongly). Used in Pancrasite and other multi-analyte
      cyst fluid panels.
  (2) Pancreatic ductal adenocarcinoma (PDAC): GNAS mutations in ~10% — typically arising
      from IPMN-associated PDAC (mucinous pathway).
  (3) Fibrous dysplasia / McCune-Albright syndrome: post-zygotic somatic GNAS R201 mutations
      in a mosaic distribution cause fibrous dysplasia (bone) and, in McCune-Albright,
      also café-au-lait spots, precocious puberty, and hormone hypersecretion. Not oncology-
      relevant unless malignant transformation occurs (rare).
  (4) Acromegaly: GNAS R201 mutations in ~30–40% of GH-secreting pituitary adenomas
      (clinical implication: GNAS-mutant somatotroph adenomas tend to have better response
      to somatostatin analogues — octreotide, lanreotide).
  (5) Cholangiocarcinoma: GNAS mutations in ~5%.
  No approved GNAS-targeted therapy as of 2026. Investigational: cAMP pathway inhibitors
  (phosphodiesterase inhibitors, PRKAR1A inhibitors) in preclinical/early clinical stage.
notes_ua: >
  GNAS кодує Gα-стимулюючу субодиницю. Активуючі мутації (R201, Q227) → конститутивний
  cAMP. Контексти: (1) IPMN (~40–70%): маркер муцинозної природи кісти у поєднанні з KRAS
  та CEA; GNAS+KRAS → вищий ризик малігнізації; (2) PDAC (~10%, IPMN-асоційований);
  (3) Фіброзна дисплазія/Мак'юн-Олбрайт (мозаїчний); (4) Акромегалія (~30–40% GH-аденом;
  краща відповідь на соматостатинові аналоги). Немає схваленої терапії.
