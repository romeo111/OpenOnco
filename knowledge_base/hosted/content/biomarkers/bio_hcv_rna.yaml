id: BIO-HCV-RNA
names:
  preferred: "HCV RNA (quantitative PCR)"
  ukrainian: "РНК HCV (кількісна ПЛР)"
  english: "HCV RNA by quantitative PCR"
  synonyms:
    - "HCV viral load"
    - "HCV PCR"
biomarker_type: viral_load

measurement:
  method: "Real-time quantitative PCR"
  units: "IU/mL"
  typical_range: [0, 100000000]

specimen_requirements:
  - "Serum or EDTA plasma"
  - "LOINC code 11011-4 (HCV RNA quantitation)"

sources:
  - SRC-EASL-HCV-2023

last_reviewed: "2026-04-24"
notes: >
  Binary positive/negative used for Indication applicability; quantitative
  value tracked for antiviral response assessment (SVR12 = undetectable at
  week 12 post-treatment).
