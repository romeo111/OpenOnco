id: BIO-HER2-SOLID
names:
  preferred: "HER2 status (solid tumors — gastric/GEJ/CRC scoring)"
  ukrainian: "Статус HER2 (солідні пухлини)"
  english: "HER2 IHC + ISH"
  synonyms: ["ERBB2", "HER-2/neu"]
biomarker_type: protein_expression_ihc
measurement:
  method: "IHC (4B5 / HercepTest), reflex ISH (FISH/CISH/SISH) for IHC 2+. Solid-tumor scoring uses gastric criteria (Hofmann 2008) — basolateral / lateral membranous staining ≥10% (vs breast 2018 ASCO/CAP)."
  units: "IHC 0 | 1+ | 2+ | 3+; ISH HER2/CEP17 ratio with cutoff ≥2.0"
specimen_requirements: ["FFPE tumor block; ≥4 endoscopic biopsy fragments preferred for gastric heterogeneity"]
interpretation_notes: >
  Gastric/GEJ HER2-positive: IHC 3+ OR (IHC 2+ AND ISH amplified) →
  trastuzumab + chemo 1L (TOGA). T-DXd indicated 2L+ for HER2 IHC ≥2+
  (DESTINY-Gastric01).
  CRC: HER2 amplification rare (~3%) but actionable — trastuzumab +
  tucatinib in HER2+ RAS-WT mCRC (MOUNTAINEER).
  Esophageal adeno: same TOGA-style cutoff as gastric.
related_biomarkers: []
sources: [SRC-NCCN-GASTRIC-2025, SRC-NCCN-COLON-2025, SRC-ESMO-GASTRIC-2024]
last_reviewed: "2026-04-26"
oncokb_skip_reason: ihc_no_variant
external_ids:
  hgnc_symbol: "ERBB2"
