notes: >
  HNF1A (Hepatocyte Nuclear Factor 1 Alpha) is a homeodomain transcription factor critical
  for liver and pancreatic beta-cell differentiation. Clinical contexts:
  (1) Germline MODY3: ~30% of MODY cases; autosomal dominant; mild fasting hyperglycaemia;
      excellent sulfonylurea response; diagnosis changes management (avoid insulin first-line).
  (2) Hepatocellular Adenoma (HCA), H-subtype: biallelic somatic HNF1A inactivation in
      ~35–40% of HCA; steatotic hepatocytes, absent LFABP IHC; low malignant transformation
      risk (<1%); management is surveillance rather than resection for <5 cm lesions.
  (3) HCC: somatic HNF1A mutations in ~10% of HCC; associated with better hepatocyte
      differentiation (lower AFP, preserved liver function); no specific therapy implication
      beyond standard HCC management. ESCAT IIB for HCC: diagnostic/risk-stratification context
      (HCA subtype identification) rather than a therapeutic target.
  LFABP IHC (L-FABP/liver fatty acid binding protein) loss is a validated surrogate for
  HNF1A-inactivated HCA (available in most pathology labs).
notes_ua: >
  HNF1A — фактор транскрипції для диференціювання гепатоцитів і β-клітин підшлункової залози.
  (1) Зародкова лінія MODY3 (~30% MODY): сульфонілсечовинний відповідь; уникати інсулін
  як перша лінія. (2) Гепатоцелюлярна аденома (H-тип): бі-алельна соматична інактивація
  HNF1A у ~35–40%; LFABP-IHC негативна; низький ризик малігнізації (<1%); спостереження
  при <5 см. (3) ГЦК: ~10%; не впливає на вибір терапії. ESCAT IIB.
