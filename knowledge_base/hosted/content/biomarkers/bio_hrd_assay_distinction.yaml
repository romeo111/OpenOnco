id: BIO-HRD-ASSAY-DISTINCTION
names:
  preferred: "HRD assay distinction (Myriad myChoice CDx vs FoundationOne CDx)"
  ukrainian: "Розмежування HRD-аналізів (Myriad myChoice CDx vs FoundationOne CDx)"
  english: "HRD assay distinction"
  synonyms: ["HRD platform comparison", "GIS vs LOH/TAI/LST"]
biomarker_type: composite_score

measurement:
  method: >
    Two FDA-approved companion diagnostic platforms with different scoring
    systems: (a) Myriad myChoice CDx — Genomic Instability Score (GIS)
    combining LOH + TAI + LST as a single composite, threshold GIS >=42
    for HRD-positive; (b) FoundationOne CDx HRD — reports LOH-high
    (>=16% genomic LOH) plus BRCA1/2 status; aggregates LOH only, no TAI
    or LST. Both run on FFPE tumor.
  units: "categorical (HRD-positive | HRD-negative); platform-specific cut-points are not interchangeable"
specimen_requirements: ["FFPE tumor block (>=20% tumor cellularity for both assays)"]

related_biomarkers: [BIO-HRD-STATUS, BIO-BRCA1-BRCA2-GERMLINE]

sources: [SRC-NCCN-COLON-2025, SRC-CIVIC]

oncokb_skip_reason: clinical_composite

last_reviewed: "2026-04-29"
notes: >
  Scope: this entity is a methodological / assay-distinction layer on
  top of BIO-HRD-STATUS. The clinical concept (HRD as a PARPi-response
  predictor) lives in BIO-HRD-STATUS. This entity records the technical
  caveats clinicians need when interpreting an HRD report from a
  specific platform.

  **Why two assays diverge:**
  - **Myriad myChoice CDx (companion to olaparib + bevacizumab in PAOLA-1
    and niraparib in NOVA / PRIMA):**
    - Composite Genomic Instability Score (GIS) = LOH + TAI + LST
    - Threshold: GIS >=42 OR BRCA1/2 mutation -> HRD-positive
    - Captures three independent genome-scarring footprints (LOH = loss
      of heterozygosity; TAI = telomeric allelic imbalance;
      LST = large-scale state transitions)
  - **FoundationOne CDx HRD (companion to rucaparib in ARIEL3 design;
    olaparib HRRm-positive subset):**
    - LOH-high threshold: %LOH >=16% across genome
    - Does NOT include TAI or LST
    - More permissive on some BRCA-wt high-grade serous tumors,
      stricter on others — discordance with myChoice runs ~10-20% in
      head-to-head series

  **Clinical implications of the discordance:**
  - A patient classified HRD-positive on one platform may be classified
    HRD-negative on the other; this is a known pre-analytic limitation.
  - **Drug-label fidelity matters:** the FDA label for each PARPi
    references the specific companion diagnostic used in its
    registration trial. Using the wrong assay to gate access is an
    off-label practice — clinically defensible but not label-strict.
  - Niraparib + olaparib + bevacizumab access decisions in ovarian
    cancer should ideally use myChoice CDx (per PAOLA-1 / PRIMA / NOVA);
    rucaparib decisions can use FoundationOne HRD or BRCA1/2 alone
    (per ARIEL3 design).
  - **Both assays converge on BRCA1/2-mutant tumors:** mutation status
    alone is sufficient for HRD-positive call regardless of GIS / LOH
    score.

  **Other HRD assays (research / non-FDA-cleared in 2026):** SOPHiA
  GENETICS HRD, OncoScan, AmoyDx HRD Focus Panel; outputs not
  cross-validated against PARPi outcomes at level-1 evidence.

  clinical_composite skip-reason: this entity describes a methodological
  distinction between platforms, not a sequence variant — actionability
  lookup happens via the underlying biomarkers (BRCA1/2 mutations,
  HRD-positive call from BIO-HRD-STATUS), not via this assay-distinction
  entity itself.

