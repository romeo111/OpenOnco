notes_ua: >
  Сфера: ця сутність — методологічний шар розмежування аналізів поверх
  BIO-HRD-STATUS. Клінічна концепція (HRD як предиктор відповіді на
  PARPi) розкрита в BIO-HRD-STATUS. Тут зафіксовано технічні
  застереження, потрібні клініцисту при інтерпретації HRD-звіту з
  конкретної платформи.

  **Чому два аналізи розходяться:**
  - **Myriad myChoice CDx (компаньйон для olaparib + bevacizumab у
    PAOLA-1 і niraparib у NOVA / PRIMA):**
    - Композитний Genomic Instability Score (GIS) = LOH + TAI + LST
    - Поріг: GIS >=42 АБО мутація BRCA1/2 -> HRD-позитивний
    - Враховує три незалежні відбитки рубцювання геному (LOH = втрата
      гетерозиготності; TAI = теломерний алельний дисбаланс;
      LST = великомасштабні стан-переходи)
  - **FoundationOne CDx HRD (компаньйон для rucaparib за дизайном
    ARIEL3; olaparib HRRm-позитивна підгрупа):**
    - Поріг LOH-high: %LOH >=16% по геному
    - НЕ включає TAI чи LST
    - Більш дозволений до деяких BRCA-wt high-grade серозних пухлин,
      суворіший до інших — невідповідність із myChoice ~10-20% у
      головних порівняльних серіях

  **Клінічні наслідки невідповідності:**
  - Пацієнт, класифікований HRD-позитивним на одній платформі, може
    бути класифікований HRD-негативним на іншій; це відоме
    пре-аналітичне обмеження.
  - **Точність ярлика препарату важлива:** ярлик FDA для кожного PARPi
    посилається на конкретний компаньйон-діагностичний тест із
    реєстраційного дослідження. Використання неправильного аналізу
    для гейтингу доступу — off-label практика, клінічно захисна, але
    не сувора за ярликом.
  - Доступ до niraparib + olaparib + bevacizumab у раку яєчників має
    використовувати myChoice CDx (за PAOLA-1 / PRIMA / NOVA); рішення
    щодо rucaparib можуть використовувати FoundationOne HRD або BRCA1/2
    окремо (за дизайном ARIEL3).
  - **Обидва аналізи сходяться на BRCA1/2-мутантних пухлинах:** статусу
    мутації достатньо для виклику HRD-позитивного незалежно від GIS / LOH.

  **Інші HRD-аналізи (дослідницькі / не FDA-cleared у 2026):** SOPHiA
  GENETICS HRD, OncoScan, AmoyDx HRD Focus Panel; виходи не
  крос-валідовані проти результатів PARPi на рівні-1 доказів.

  Skip-reason clinical_composite: ця сутність описує методологічну
  різницю між платформами, не варіант послідовності — actionability
  lookup відбувається через підлеглі біомаркери (мутації BRCA1/2,
  HRD-позитивний виклик з BIO-HRD-STATUS), а не через цю сутність
  розмежування аналізів.

