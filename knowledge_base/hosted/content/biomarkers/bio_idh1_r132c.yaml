# Per oncokb_integration_safe_rollout_v3.md §4: variant-specific lookup
# for the IDH1-R132C residue. Most enriched in cholangiocarcinoma (~25-30%
# of IDH1-mutant CCA) where ClarIDHy established ivosidenib benefit.
