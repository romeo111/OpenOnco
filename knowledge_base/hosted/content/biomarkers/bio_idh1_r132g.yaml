# Per oncokb_integration_safe_rollout_v3.md §4: variant-specific lookup
# for the IDH1-R132G residue. Less prevalent than R132H/R132C but on the
# ivosidenib hotspot list — reuses REG-IVOSIDENIB via existing IDH1
# indications.
