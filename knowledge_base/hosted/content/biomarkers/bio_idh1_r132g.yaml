last_reviewed: "2026-04-29"
notes: >
  Less prevalent IDH1 variant (~3-5% of IDH1-mutant glioma; rarer in
  AML and cholangiocarcinoma). IHC-negative with the R132H-specific
  antibody (clone H09) — NGS required. On the ivosidenib hotspot list
  alongside R132H/R132C/R132L/R132S; reuses existing REG-IVOSIDENIB and
  IDH1-keyed indications. Vorasidenib (INDIGO 2024 — grade 2 IDH-mut
  glioma post-resection) covers IDH1/IDH2 variants broadly. Engine
  should treat as functionally equivalent to R132H for ICI / IDH-i
  treatment selection logic.
notes_ua: >
  Менш поширений варіант IDH1 (~3-5% IDH1-мутантних гліом; рідший у
  ГМЛ та холангіокарциномі). IHC-негативний з R132H-специфічним
  антитілом (клон H09) — потрібна NGS. У hotspot-списку івосиденібу
  поряд з R132H/R132C/R132L/R132S; повторно використовує наявний
  REG-IVOSIDENIB та IDH1-keyed показання. Vorasidenib (INDIGO 2024 —
  grade 2 IDH-mut гліома після резекції) охоплює варіанти IDH1/IDH2
  широко. Engine повинен розглядати функціонально еквівалентно R132H
  для логіки відбору ICI / IDH-i терапії.
