id: BIO-IDH1-R132H
names:
  preferred: "IDH1 R132H mutation (glioma / AML)"
  ukrainian: "Мутація IDH1 R132H (гліома / ГМЛ)"
  english: "IDH1 R132H"
biomarker_type: gene_mutation

mutation_details:
  gene: "IDH1"
  exon: "4"
  variant_type: "missense"
  hgvs_protein: "p.R132H"
  functional_impact: "neomorphic — converts α-KG to 2-hydroxyglutarate (oncometabolite); DNA hypermethylation"

measurement:
  method: "IHC (R132H-specific antibody) for glioma initial screen; NGS panel for AML and non-R132H IDH1/2 variants"
  units: "categorical (positive | negative)"
specimen_requirements: ["FFPE tumor (glioma)", "BM aspirate (AML)"]

related_biomarkers: [BIO-IDH-MUTATION, BIO-MGMT-METHYLATION]
sources: [SRC-NCCN-CNS-2025, SRC-EANO-GBM-2024, SRC-ESMO-AML-2020]

# Most common IDH1 variant (>90% in glioma; ~50% in IDH-mutant AML).
# Ivosidenib (Tibsovo) — IDH1 inhibitor; AGILE (AML 1L) and
# INDIGO (vorasidenib for low-grade glioma 2024).
oncokb_lookup:
  gene: IDH1
  variant: R132H

last_reviewed: "2026-04-27"
notes: >
  Defining feature of IDH-mutant glioma (per WHO 2021 CNS5 — distinct
  diagnostic class) and ~6-10% of AML. IHC (mIDH1-R132H antibody) is
  highly sensitive for this specific variant — used as first-pass
  glioma screen. Other IDH1 variants (R132C, R132G, R132S, R132L) are
  rarer and IHC-negative — require NGS. Ivosidenib (AGILE, AML 1L
  combo with azacitidine in IDH1-mut AML), enasidenib (IDH2 R140/R172),
  vorasidenib (INDIGO 2024 — first-in-class for grade 2 IDH-mut glioma
  post-resection — practice-changing). 2-HG MRS imaging emerging as
  noninvasive activity readout.
