last_reviewed: "2026-04-27"
notes: >
  Defining feature of IDH-mutant glioma (per WHO 2021 CNS5 — distinct
  diagnostic class) and ~6-10% of AML. IHC (mIDH1-R132H antibody) is
  highly sensitive for this specific variant — used as first-pass
  glioma screen. Other IDH1 variants (R132C, R132G, R132S, R132L) are
  rarer and IHC-negative — require NGS. Ivosidenib (AGILE, AML 1L
  combo with azacitidine in IDH1-mut AML), enasidenib (IDH2 R140/R172),
  vorasidenib (INDIGO 2024 — first-in-class for grade 2 IDH-mut glioma
  post-resection — practice-changing). 2-HG MRS imaging emerging as
  noninvasive activity readout.
notes_ua: >
  IDH1 R132H є визначальною ознакою IDH-мутантної гліоми (класифікація
  ВООЗ CNS5 2021 — окрема діагностична категорія) та виявляється у ~6–10%
  ГМЛ. ІГХ (антитіло mIDH1-R132H) є високочутливим для цього конкретного
  варіанта і використовується як скринінг першої черги при гліомі.
  Інші варіанти IDH1 (R132C, R132G, R132S, R132L) є рідшими та
  ІГХ-негативними — для їх виявлення потрібен NGS.
  Івосиденіб (ivosidenib; AGILE — комбінація з азацитидином у першій
  лінії IDH1-мут ГМЛ), енасиденіб (enasidenib; IDH2 R140/R172),
  ворасиденіб (vorasidenib; INDIGO 2024 — перший у класі для гліоми
  2-го ступеня IDH-мут після резекції — змінює практику).
  Візуалізація 2-HG методом МРС формується як неінвазивний контроль
  активності.
