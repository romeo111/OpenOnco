last_reviewed: "2026-04-30"
notes: >
  R140Q is the dominant IDH2 hotspot in AML (~70-80% of IDH2-mut AML;
  ~6-8% of all AML). Enasidenib (IDHIFA, AG-221) FDA-approved Aug 2017
  for R/R-AML-IDH2 monotherapy (phase 1/2: ORR 38%, CR 19%). 1L
  combination with azacitidine in unfit patients (AG221-AML-005:
  ORR 71%). Differentiation syndrome (~14%) — same monitoring +
  dexamethasone protocol as ivosidenib. Hyperbilirubinemia (~80% any
  grade; UGT1A1 inhibition — usually asymptomatic, no dose adjustment
  unless symptomatic). IDHENTIFY R/R AML phase-3 did not show OS
  benefit vs conventional care over all comers but enriched in
  IDH2-mut who had not received prior HMA. Combination with venetoclax
  + azacitidine under study. Triggers RF-AML-IDH2-MUT-ACTIONABLE
  (existing) for algorithm routing.
notes_ua: >
  R140Q — домінантна гарячої точки IDH2 у ГМЛ (~70-80% IDH2-mut ГМЛ;
  ~6-8% всіх ГМЛ). Енасиденіб (IDHIFA, AG-221) FDA-схвалено серпень
  2017 для р/р ГМЛ-IDH2 монотерапія (фаза 1/2: ORR 38%, ПР 19%). 1L
  комбінація з азацитидином у непридатних (AG221-AML-005: ORR 71%).
  Синдром диференціації (~14%) — той же моніторинг + дексаметазон-
  протокол як для івосиденібу. Гіпербілірубінемія (~80% будь-якого
  ступеня; UGT1A1-інгібування — зазвичай безсимптомна). IDHENTIFY р/р
  ГМЛ фаза-3 не показав виграшу за ЗВ vs стандарт у всіх пацієнтів,
  але enriched у IDH2-мут, які не отримували раніше HMA. Комбінація
  з венетоклаксом + азацитидин — у дослідженнях. Запускає
  RF-AML-IDH2-MUT-ACTIONABLE (існуючий) для маршрутизації алгоритмом.
