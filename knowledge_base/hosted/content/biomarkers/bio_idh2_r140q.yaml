# Most common IDH2 variant (~70-80% of IDH2-mutant AML). Enasidenib
# (IDHIFA / AG-221) — IDH2 inhibitor; FDA-approved 2017 for R/R-AML-IDH2
# (IDHENTIFY phase-3); also active 1L combination with azacitidine
# (AG221-AML-005).
