# Second IDH2 hotspot (~20-30% of IDH2-mutant AML). Enasidenib (AG-221)
# active across both R140 and R172 variants per IDHENTIFY / AG221-AML-005.
# R172K may carry slightly lower remission rates than R140Q in some
# series but still benefits from enasidenib.
