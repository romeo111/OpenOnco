last_reviewed: "2026-04-30"
notes: >
  R172K is the second IDH2 hotspot in AML (~20-30% of IDH2-mut AML;
  ~2-3% of all AML). Enasidenib (IDHIFA, AG-221) FDA-approved across
  both R140 and R172 variants. Some series (Stein et al., Blood 2017)
  suggest R172K carries lower CR rate than R140Q on enasidenib mono,
  but still substantial activity. Differentiation syndrome (~14%) and
  hyperbilirubinemia same as R140Q. Glioma IDH2 R172K is a separate
  clinical entity (vorasidenib INDIGO trial) — this biomarker is
  AML-scoped; glioma IDH2 captured under BIO-IDH-MUTATION composite.
  Triggers RF-AML-IDH2-MUT-ACTIONABLE (existing) for algorithm routing.
notes_ua: >
  R172K — друга гаряча точка IDH2 у ГМЛ (~20-30% IDH2-mut ГМЛ; ~2-3%
  всіх ГМЛ). Енасиденіб (IDHIFA, AG-221) FDA-схвалено для обох
  варіантів R140 і R172. Деякі серії (Stein et al., Blood 2017)
  припускають, що R172K має нижчу частоту ПР ніж R140Q на монотерапії
  енасиденібом, але все ще суттєва активність. Синдром диференціації
  (~14%) та гіпербілірубінемія такі ж, як для R140Q. Гліома IDH2
  R172K — окрема клінічна сутність (vorasidenib INDIGO) — цей
  біомаркер — ГМЛ-обмежений; гліома IDH2 — у композитному
  BIO-IDH-MUTATION. Запускає RF-AML-IDH2-MUT-ACTIONABLE (існуючий)
  для маршрутизації алгоритмом.
