last_reviewed: "2026-05-04"
notes: >
  JAK3 is unique among JAK family kinases: it exclusively signals through the common gamma
  chain (γc, CD132, IL2RG), the shared receptor subunit for IL-2, IL-4, IL-7, IL-9, IL-15,
  IL-21 cytokines. JAK3 is therefore predominantly expressed in T, NK, and B lymphocytes.
  Activating JAK3 mutations drive constitutive STAT3/STAT5 signaling independent of cytokine.
  Clinical contexts:
  (1) T-cell acute lymphoblastic leukemia (T-ALL): JAK3 mutations in ~15–20% (co-occur with
      NOTCH1, CDKN2A loss).
  (2) Adult T-cell leukemia/lymphoma (ATLL): JAK3 mutations in ~35% of aggressive subtypes.
  (3) Mycosis fungoides / Sézary syndrome (CTCL): JAK3/STAT3 pathway activated in ~30%.
  (4) Anaplastic large cell lymphoma (ALCL): JAK1/STAT3 (related pathway; JAK3 less common).
  Therapeutic relevance: ruxolitinib (JAK1/2 inhibitor; not JAK3-selective) is FDA-approved
  for CTCL (mycosis fungoides) and GVHD and has activity in ATLL (off-label). Ritlecitinib
  (irreversible JAK3/TEC family inhibitor, FDA 2023 for alopecia areata) is being investigated
  in JAK3-mutant hematologic malignancies. JAK3-selective inhibitors are theoretically preferred
  over JAK1/2 inhibitors to avoid myelosuppression, but clinical data in malignancy is limited.
notes_ua: >
  JAK3 — унікальна JAK-кіназа, що виключно сигналізує через загальний γ-ланцюг (CD132).
  Переважно в Т-, NK- та В-клітинах. Активуючі мутації → конститутивний STAT3/STAT5.
  Контексти: T-ALL (~15–20%), ATLL (~35%), MF/SS (~30%). Рукситиніб (JAK1/2) схвалений
  для МФ/СС та РТПХ; рітлецитиніб (JAK3-селективний) досліджується.
