last_reviewed: "2026-05-04"
notes: >
  KDR encodes VEGFR2 (Vascular Endothelial Growth Factor Receptor 2), the primary mediator of
  VEGF-driven tumor angiogenesis. Somatic KDR activating mutations occur in ~2–3% of NSCLC
  (mixed histologies) and ~1–2% across multiple other solid tumors. Multiple approved multi-target
  TKIs inhibit VEGFR2 (ramucirumab, lenvatinib, cabozantinib, regorafenib, sunitinib, sorafenib),
  but none are approved in a KDR mutation-selected indication. In NSCLC, ramucirumab + docetaxel
  (REVEL, FDA 2014) is approved for 2L regardless of KDR status. KDR mutation has been
  hypothesized to predict response to VEGFR-targeted agents, but prospective evidence is lacking;
  no companion diagnostic exists. Clinical significance: investigational target; KDR mutation is
  reported on NGS panels but does not currently change standard therapy selection in NSCLC.
notes_ua: >
  KDR кодує VEGFR2 — первинний медіатор VEGF-керованого пухлинного ангіогенезу. Соматичні
  активуючі мутації KDR виявляються у ~2–3% НМРЛ (змішані гістології) і ~1–2% при інших
  солідних пухлинах. Множинні схвалені мультитаргетні TKI інгібують VEGFR2 (рамуцирумаб,
  ленватиніб та ін.), але жоден — не в KDR-мутація-відібраному показанні. Рамуцирумаб +
  доцетаксел (2L НМРЛ; REVEL, FDA 2014) схвалений незалежно від KDR-статусу. Немає
  супутньої діагностики для KDR.
