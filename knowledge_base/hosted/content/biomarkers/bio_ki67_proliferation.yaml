id: BIO-KI67-PROLIFERATION-INDEX
names:
  preferred: "Ki-67 proliferation index (IHC, % positive nuclei)"
  ukrainian: "Ki-67 індекс проліферації (ІГХ, % позитивних ядер)"
  english: "Ki-67 proliferation index"
  synonyms: ["Ki-67", "MIB-1", "proliferation index"]
biomarker_type: protein_expression_ihc

measurement: {method: "IHC on FFPE biopsy (Ki-67 / MIB-1 antibody); count nuclear-positive cells in hot-spot", units: "percentage (0-100% positive nuclei)"}
specimen_requirements: ["FFPE biopsy block"]

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
oncokb_skip_reason: ihc_no_variant
notes: >
  Universal proliferation marker across hematologic + solid neoplasms:

  - **Burkitt** (~100% — defining): highest Ki-67 of any human malignancy
  - **HGBL** (~80-100%)
  - **DLBCL** (~60-80%): higher Ki-67 may identify "double-expressor"
    aggressive subset
  - **MCL** (~10-50% — defines MIPI-b): >30% = blastoid-like aggressive,
    triggers RF-MCL-BLASTOID-OR-TP53 → BTKi-R route
  - **FL** grade: 1-2 typically <30%; grade 3 ≥30% (informs grade)
  - **Indolent NHL** (CLL, MZL, indolent FL): typically <20%
  - **Plasma cell myeloma**: >40-60% may indicate plasma cell leukemia
    transformation

  Algorithm-impacting in MCL (drives BTKi-R via blastoid RedFlag at
  >30%). Informational/grading elsewhere.
notes_ua: >
  Загальний маркер проліферації у гематологічних і солідних пухлинах:

  - **Лімфома Беркіта** (~100% — визначальна): найвищий Ki-67 серед усіх
    злоякісних новоутворень людини.
  - **ВГРЛ** (~80–100%).
  - **ДВКЛ** (~60–80%): вищий Ki-67 може ідентифікувати агресивну
    «double-expressor» підгрупу.
  - **МКЛ** (~10–50% — визначає MIPI-b): >30% = бластоїдно-подібний
    агресивний варіант; спрацьовує RF-MCL-BLASTOID-OR-TP53 → маршрут BTKi-R.
  - **ФЛ**: ступінь 1–2 — як правило <30%; ступінь 3 — ≥30%
    (інформує про ступінь).
  - **Індолентні НХЛ** (ХЛЛ, МКЛ, індолентна ФЛ): як правило <20%.
  - **Мієлома плазматичних клітин**: >40–60% може свідчити про
    трансформацію в лейкоз плазматичних клітин.

  Впливає на алгоритм при МКЛ (веде до BTKi-R через бластоїдний
  RedFlag при >30%). В інших нозологіях — інформаційна / оцінка ступеня.
