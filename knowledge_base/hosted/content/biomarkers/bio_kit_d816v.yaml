last_reviewed: "2026-04-27"
notes: >
  Found in ~95% of advanced systemic mastocytosis (ASM, SM-AHN, MCL).
  Confers resistance to type-II KIT inhibitors (imatinib, sunitinib).
  Avapritinib (Ayvakit) — first KIT D816V-selective TKI; FDA-approved
  2021 for advanced SM and 2023 for indolent SM. Midostaurin
  (Stoffregen 2016): historic standard pre-avapritinib. Bone-marrow
  mast-cell quantification + tryptase + KIT D816V VAF together
  define disease burden. Allele-specific PCR is the gold standard
  for SM diagnosis (sensitivity to ~0.01% VAF).
notes_ua: >
  Виявляється у ~95% поширеного системного мастоцитозу (ПСМ; SM-AHN; MCL).
  Забезпечує резистентність до інгібіторів KIT типу II (іматиніб, сунітиніб).
  Авапритиніб (avapritinib; Ayvakit) — перший селективний інгібітор KIT D816V;
  схвалений FDA у 2021 для поширеного СМ і у 2023 — для індолентного СМ.
  Мідостаурин (midostaurin; Stoffregen 2016): попередній стандарт до
  авапритинібу. Кількість тучних клітин у кістковому мозку + триптаза + VAF
  KIT D816V разом визначають тягар захворювання. Алель-специфічна ПЛР є
  золотим стандартом діагностики СМ (чутливість до ~0.01% VAF).
