  hgnc_symbol: "KRAS"
  hgvs_protein: "p.G12D"
  oncokb_url: "https://www.oncokb.org/gene/KRAS/G12D"

last_reviewed: "2026-04-27"
notes: >
  ~40% of PDAC, ~13% of CRC, ~6% of NSCLC adenocarcinoma. No FDA-approved
  selective inhibitor as of 2025 (MRTX1133, RMC-9805 in early trials).
  Common alongside other PDAC adverse markers (TP53, SMAD4, CDKN2A).
  EGFR-targeted therapy (cetuximab/panitumumab) contraindicated in
  RAS-mutant CRC — anti-EGFR resistance is a defining feature.
notes_ua: >
  Частота: ~40% аденокарцином підшлункової залози (PDAC), ~13% КРР, ~6%
  аденокарцином НМРЛ. Станом на 2025 рік відсутній схвалений FDA
  селективний інгібітор KRAS G12D (MRTX1133, RMC-9805 — на стадії ранніх
  клінічних досліджень). Часто поєднується з іншими несприятливими маркерами
  PDAC (TP53, SMAD4, CDKN2A). Таргетна терапія анти-EGFR
  (цетуксимаб/панітумумаб) протипоказана при RAS-мутантному КРР —
  резистентність до анти-EGFR є визначальною ознакою.
