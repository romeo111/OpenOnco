# Most common KRAS variant in PDAC (~40% of all PDAC). Investigational
# G12D-specific inhibitors (MRTX1133, RMC-9805) — currently clinical
# trials only. OncoKB likely returns Level 4 or trial-only evidence.
actionability_lookup:
  gene: KRAS
  variant: G12D
