last_reviewed: "2026-05-04"
notes: >
  MAP2K1 (MEK1) is a dual-specificity kinase directly downstream of BRAF and upstream of
  ERK1/2. Activating mutations constitute an alternative mechanism of MAPK pathway activation
  in tumors that lack BRAF mutations. Key clinical contexts:
  (1) Hairy cell leukemia variant (HCL-V): MAP2K1 K57E present in ~40–50% of HCL-V cases
      (which are BRAF V600E-negative by definition). Cobimetinib (MEK inhibitor) shows
      activity in MAP2K1-mutant HCL-V in small series; no FDA approval but NCCN 2B evidence.
  (2) Low-grade glioma (LGG): MAP2K1 mutations are one of the MAPK pathway alterations
      (~5–10% of BRAF-fusion-negative LGGs). Trametinib (MEK inhibitor) shows activity in
      pediatric LGG with MAPK pathway alterations per FIREFLY-1 trial (binimetinib/trametinib).
  (3) Melanoma: MAP2K1 mutations occur in ~5–8% as secondary resistance to BRAF inhibitors;
      MEK inhibitors still active but combination needed.
  (4) Histiocytic disorders (ECD, LCH): MAP2K1 mutations as alternative to BRAF V600E.
  Do not confuse MEK inhibitors approved for BRAF V600E indications — those approvals are
  as adjuncts to BRAF inhibitors (vemurafenib + cobimetinib; dabrafenib + trametinib) and
  are not driven by MAP2K1 mutation status.
notes_ua: >
  MAP2K1 (MEK1) — кіназа нижче BRAF, вище ERK1/2. Ключові контексти:
  (1) Варіант волосисто-клітинного лейкозу (HCL-V): MAP2K1 K57E у ~40–50% (BRAF V600E-негативні).
      Кобіметиніб (cobimetinib) показав активність у невеликих серіях; доказова база NCCN 2B.
  (2) Низькодиференційована гліома: MAP2K1 у ~5–10% BRAF-fusion-негативних НДГ;
      траметиніб/бінімет иніб активні (FIREFLY-1).
  (3) Меланома: MAP2K1 у ~5–8% — вторинна резистентність до BRAF-інгібіторів;
      MEK-інгібітори активні, але потребують комбінації.
  Не плутати зі схваленнями MEK-інгібіторів при BRAF V600E — вони не залежать від статусу MAP2K1.
