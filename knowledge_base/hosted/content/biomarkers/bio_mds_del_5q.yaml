id: BIO-MDS-DEL-5Q
names:
  preferred: "MDS with del(5q) cytogenetic abnormality"
  ukrainian: "МДС з цитогенетичною аномалією del(5q)"
  english: "del(5q) MDS"
  synonyms:
    - "5q minus syndrome"
    - "5q- syndrome"
    - "isolated del(5q)"
    - "MDS del 5q"

biomarker_type: copy_number

mutation_details:
  gene: "5q (commonly deleted region 5q31-q33; CDR includes RPS14, CSNK1A1, miR-145, miR-146a)"
  variant_type: "interstitial deletion"
  functional_impact: "haploinsufficiency of CSNK1A1 (CK1α) and ribosomal RPS14 — selectively lenalidomide-sensitive"

measurement:
  method: "Conventional karyotype (G-banding) on bone marrow ± FISH (5q31/EGR1 probe) when karyotype fails or insufficient metaphases; SNP array as adjunct"
  units: "categorical (positive | negative); isolated vs +1 additional non-7 abnormality vs complex karyotype subclassification"
specimen_requirements:
  - "Bone marrow aspirate (heparin or unfractionated for cytogenetics)"
  - "Minimum 20 metaphases for karyotype reporting per ISCN"

related_biomarkers:
  - BIO-TP53-MUTATION  # ~20% of del(5q) co-occurrence; predicts lenalidomide resistance + AML transformation
  - BIO-AML-TP53-ADVERSE

sources:
  - SRC-NCCN-AML-2025
  - SRC-ESMO-MDS-2021
  - SRC-IPSS-M-BERNARD-2022
  - SRC-MDS-004-FENAUX-2011

# Cytogenetic copy-number biomarker — variant-level actionability
# lookup not applicable (deletion, not point variant). Drives
# treatment selection via RF-MDS-DEL-5Q-ISOLATED (existing) →
# lenalidomide track per IND-MDS-LR-LENALIDOMIDE-DEL5Q (existing).
oncokb_skip_reason: clinical_composite
# external_ids omitted — multi-gene commonly-deleted region; no single
# HGNC anchor for the 5q deletion.

last_reviewed: "2026-04-30"
notes: >
  del(5q) is detected in ~10-15% of MDS-LR cases. WHO 5th edition
  recognizes "MDS with isolated del(5q)" as a distinct entity defined
  by the 5q deletion as the sole cytogenetic abnormality (or with
  one additional non-monosomy-7 abnormality), <5% BM blasts, and
  characteristic clinical features (macrocytic anemia, normal-to-high
  platelets, hypolobated megakaryocytes). Lenalidomide MDS-003 (Houston
  phase-2) + MDS-004 (phase-3 RCT, Fenaux et al., Blood 2011) — at
  10 mg PO d1-21/28d: ~56% achieve RBC transfusion independence
  vs 5.9% placebo at 26 weeks; ~20-25% achieve cytogenetic CR
  (loss of del(5q) clone). Mechanism: cereblon-mediated selective
  degradation of CK1α encoded within the 5q33.1 commonly-deleted
  region — del(5q) cells haploinsufficient and uniquely sensitive.
  CRITICAL: TP53 co-mutation (~20% of del(5q) MDS) predicts
  lenalidomide resistance + higher AML transformation risk
  (~30-40% at 2 years vs ~10% TP53-WT) — TP53 NGS screening
  mandatory before initiating lenalidomide. Triggers
  RF-MDS-DEL-5Q-ISOLATED (existing).
notes_ua: >
  del(5q) виявляється у ~10-15% випадків МДС-LR. WHO 5-го видання
  визнає "МДС з ізольованою del(5q)" як окрему сутність, визначену
  делецією 5q як єдиною цитогенетичною аномалією (або з однією
  додатковою не-моносомією-7), <5% бластів КМ та характерними
  клінічними ознаками (макроцитарна анемія, нормальна-висока
  кількість тромбоцитів, гіполобовані мегакаріоцити). Леналідомід
  MDS-003 (Хьюстон фаза-2) + MDS-004 (фаза-3 РКД, Fenaux et al.,
  Blood 2011) — при 10 мг PO д1-21/28д: ~56% досягають незалежності
  від трансфузій еритроцитів vs 5.9% плацебо за 26 тижнів; ~20-25%
  досягають цитогенетичної ПР (втрата клону del(5q)). Механізм:
  cereblon-опосередкована селективна деградація CK1α, кодованого в
  5q33.1 commonly-deleted region — клітини del(5q) гапло-недостатні
  та унікально чутливі. КРИТИЧНО: ко-мутація TP53 (~20% del(5q)
  МДС) прогнозує резистентність до леналідоміду + вищий ризик
  трансформації в ГМЛ (~30-40% за 2 роки vs ~10% TP53-WT) — NGS-
  скринінг TP53 обов'язковий перед стартом леналідоміду. Запускає
  RF-MDS-DEL-5Q-ISOLATED (існуючий).
ukrainian_review_status: pending_clinical_signoff
