id: BIO-MYC-REARRANGEMENT
names:
  preferred: "MYC rearrangement (8q24) by FISH break-apart"
  ukrainian: "MYC rearrangement (8q24) — FISH break-apart"
  english: "MYC rearrangement"
biomarker_type: gene_fusion

measurement: {method: "FISH break-apart probe on FFPE biopsy", units: "categorical (positive | negative)"}
specimen_requirements: ["FFPE biopsy block; minimum 100 cells scored"]

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Defining feature of Burkitt lymphoma (~95-100%); also seen in
  high-grade B-cell lymphoma double-hit (~10-15% of DLBCL, with concurrent
  BCL2 or BCL6 rearrangement). Distinguishing Burkitt from HGBL-DH:
  MYC + Ki67 ~100% + characteristic morphology + flow markers
  (CD10+, CD19+, BCL2−). HGBL-DH has Ki67 typically lower + BCL2+.
