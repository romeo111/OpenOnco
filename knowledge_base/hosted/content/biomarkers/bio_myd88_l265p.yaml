last_reviewed: "2026-04-25"
notes: >
  Cross-disease relevance — activating mutation in TLR/NF-κB pathway:

  - **Waldenström / LPL** (defining ~95%): predicts BTKi response —
    MYD88-mut patients respond well to zanubrutinib/ibrutinib monotherapy;
    MYD88-WT (rare) does NOT respond well, chemoimmuno (DRC, BR)
    preferred. CXCR4-WHIM co-mutation modulates depth of BTKi response.
  - **Primary CNS Lymphoma (PCNSL)** (~70-90%): defining-like marker;
    drives BTKi activity in r/r PCNSL (ibrutinib monotherapy emerging).
  - **DLBCL ABC subtype** (~30%): predicts ibrutinib activity (PHOENIX
    trial subset signal) — investigational, not yet driving 1L choice.
  - **Cutaneous DLBCL of leg type** (~70%): MYD88-mut frequent.

  Direct algorithm impact in WM 1L. Future: PCNSL workstream + DLBCL
  ABC 2L+ ibrutinib pathway.
notes_ua: >
  Клінічна значущість за нозологіями — активуюча мутація в шляху TLR/NF-κB:

  - **Макроглобулінемія Вальденстрема / ЛПЛ** (~95% — визначальна):
    передбачає відповідь на BTKi — MYD88-мутантні пацієнти добре відповідають
    на занубрутиніб/ібрутиніб у монотерапії; MYD88-WT (рідко) НЕ відповідають
    добре, переважаються хімоімунотерапія (DRC, BR). Ко-мутація CXCR4-WHIM
    модулює глибину відповіді на BTKi.
  - **Первинна лімфома ЦНС (PCNSL)** (~70–90%): квазі-визначальний маркер;
    визначає активність BTKi при рецидивному/рефрактерному PCNSL
    (ібрутиніб у монотерапії — нова опція).
  - **ДВКЛ ABC-підтипу** (~30%): передбачає активність ібрутинібу (сигнал
    підгрупи в PHOENIX) — дослідницький, наразі не визначає вибір першої лінії.
  - **Шкірна ДВКЛ типу ніг** (~70%): мутація MYD88 часто присутня.

  Безпосередній вплив на алгоритм при ВМ у першій лінії. Перспективи:
  напрям PCNSL + шлях ібрутинібу при ДВКЛ ABC 2L+.
