id: BIO-MYD88-L265P
names:
  preferred: "MYD88 L265P mutation"
  ukrainian: "Мутація MYD88 L265P"
  english: "MYD88 L265P"
biomarker_type: gene_mutation

mutation_details:
  gene: "MYD88"
  variant_type: "missense"
  hgvs_protein: "p.L265P"
  functional_impact: "activating (constitutive NF-κB signaling)"

measurement: {method: "PCR / ASO / NGS on bone marrow or peripheral blood", units: "categorical (positive | negative)"}
specimen_requirements: ["BM aspirate or PB; sensitivity higher on marrow"]

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Defining feature of WM (~95%). Strongly predicts BTKi response —
  MYD88-mutated patients respond well to BTKi monotherapy. MYD88-WT
  WM (rare) does NOT respond well to BTKi; chemoimmuno (DRC, BR)
  preferred. Also seen in subset DLBCL (ABC subtype, ~30%) and
  primary CNS lymphoma.
