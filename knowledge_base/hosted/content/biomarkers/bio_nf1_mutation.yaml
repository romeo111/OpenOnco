notes: >
  NF1 encodes neurofibromin, a RAS-GAP tumor suppressor. Loss-of-function
  events activate RAS/MAPK signaling.

  **Melanoma sub-classification (TCGA Cell 2015):** four genomic subtypes —
  BRAF-mutant, RAS-mutant, NF1-mutant, triple wild-type. NF1-mutant
  melanomas (~14%) are typically:
  - cutaneous, sun-exposed sites with high UV signature mutational burden
  - older patients
  - frequently co-occur with RASopathy-pattern alterations
  - generally lack canonical BRAF V600 / NRAS Q61 drivers

  **Therapeutic relevance:**
  - No tumor-type-agnostic NF1-directed targeted therapy approved (2026).
  - MEK inhibitor sensitivity reported in plexiform neurofibroma
    (selumetinib FDA-approved for pediatric NF1 plexiform NF, 2020) and
    explored in NF1-mutant cutaneous melanoma (off-label, evidence
    emerging).
  - High TMB common in UV-driven NF1-mutant melanoma → ICI candidate.

  Outside melanoma: NF1 mutation is the defining lesion in
  neurofibromatosis type 1 (germline) and recurs somatically in
  glioblastoma, MPNST, juvenile myelomonocytic leukemia (JMML), AML,
  ovarian, lung adenocarcinoma. Lineage drives interpretation.

  multi_allele_mvp skip-reason: tumor-suppressor with no single canonical
  actionable variant — many distinct LOF events all map to the same
  functional consequence; conservative MVP defers per-variant lookup.
notes_ua: >
  NF1 кодує нейрофібромін — RAS-GAP супресор пухлин. Втрата функції
  активує сигналінг RAS/MAPK.

  **Підтипи меланоми (TCGA Cell 2015):** чотири геномних підтипи —
  BRAF-mut, RAS-mut, NF1-mut, потрійна wild-type. NF1-mut меланоми
  (~14%) зазвичай:
  - шкірні, сонце-уражені ділянки з високим UV-сигналом мутаційного
    навантаження
  - старші пацієнти
  - часто співіснують з RASopathy-патерн альтераціями
  - типово відсутні канонічні драйвери BRAF V600 / NRAS Q61

  **Терапевтична релевантність:**
  - Жодна тумор-агностична NF1-таргетна терапія не затверджена (2026).
  - MEK-інгібітори показали чутливість у плексиформній нейрофіброматозі
    (селуметиніб схвалений FDA для педіатричної NF1 плексиформ.
    нейрофіброми, 2020) і вивчаються у NF1-mut шкірній меланомі
    (off-label, дані накопичуються).
  - Високий TMB у UV-керованій NF1-mut меланомі → кандидат на ICI.

  Поза меланомою: мутація NF1 — визначальне ушкодження при
  нейрофіброматозі типу 1 (гермінативно), а також рекурентна соматично
  у гліобластомі, MPNST, JMML, ГМЛ, яєчниках, аденокарциномі легень.
  Лінія тканини визначає інтерпретацію.

  Skip-reason multi_allele_mvp: ген-супресор без єдиної канонічної дієвої
  варіанти — багато LOF подій мапуються в той самий функціональний
  наслідок; консервативний MVP відкладає per-variant lookup.
