last_reviewed: "2026-05-04"
notes: >
  NF2 encodes merlin (moesin-ezrin-radixin-like protein), a tumor suppressor that links
  the actin cytoskeleton to membrane receptor signaling. NF2 loss deregulates multiple
  oncogenic pathways: mTORC1, RAC1/PAK, Hippo/YAP, FAK, MAPK. Loss of NF2 defines the
  most common sporadic meningioma driver (~50%) and is the defining germline defect in
  Neurofibromatosis Type 2 (NF2 syndrome). NF2 syndrome features: bilateral vestibular
  schwannomas (pathognomonic), multiple intracranial/spinal meningiomas, spinal schwannomas,
  and peripheral neuropathy. Therapeutic relevance: no FDA-approved targeted therapy
  specifically for NF2-mutant tumors (2026). Investigational: selumetinib (MEK inhibitor;
  FDA-approved for NF1 pediatric plexiform neurofibroma) being evaluated for NF2 vestibular
  schwannomas (phase II ACTR-4 trial — limited activity); bevacizumab (anti-VEGF) used
  off-label for NF2-related vestibular schwannomas (hearing preservation in some patients);
  FAK inhibitors (defactinib) in NF2-deficient mesothelioma (phase I/II).
  In mesothelioma: NF2 loss (~50% of pleural mesothelioma) is being evaluated as biomarker
  for FAK inhibitor sensitivity.
notes_ua: >
  NF2 кодує мерлін — онкосупресор, що зв'язує актиновий цитоскелет із рецепторним
  сигналінгом. Найчастіший драйвер спорадичної менінгіоми (~50%); зародкова мутація →
  синдром NF2 (двосторонні вестибулярні шваноми, множинні менінгіоми). Немає схваленої
  FDA терапії 2026. Дослідне: селуметиніб, бевацизумаб (вестибулярні шваноми);
  FAK-інгібітори (мезотеліома).
