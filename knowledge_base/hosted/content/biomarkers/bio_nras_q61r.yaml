# Most common NRAS variant in melanoma (~80% of NRAS-mut cases at Q61).
# MEK inhibitors (binimetinib monotherapy — NEMO trial; modest benefit).
# OncoKB likely returns Level 3A/3B for binimetinib in melanoma.
oncokb_lookup:
  gene: NRAS
  variant: Q61R

last_reviewed: "2026-04-27"
notes: >
  ~15-20% of cutaneous melanoma; mutually exclusive with BRAF V600.
  Worse prognosis than BRAF-mutant disease in metastatic setting.
  No FDA-approved selective NRAS inhibitor. Binimetinib (NEMO trial,
  Dummer 2017): modest PFS benefit vs dacarbazine; not OS positive.
  ICI (pembrolizumab, nivolumab, nivo+ipi) remains backbone of 1L
  metastatic regardless of NRAS status. Q61K and Q61L are alternative
  Q61 substitutions — also activating, similar therapeutic implications.
