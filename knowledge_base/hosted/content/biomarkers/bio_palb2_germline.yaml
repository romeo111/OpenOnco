id: BIO-PALB2-GERMLINE
names:
  preferred: "Germline PALB2 pathogenic variant"
  ukrainian: "Зародкова патогенна варіація PALB2"
  english: "Germline PALB2 mutation"
  synonyms: ["gPALB2", "FANCN"]
biomarker_type: gene_mutation

mutation_details:
  gene: "PALB2"
  variant_type: "loss-of-function (frameshift, nonsense, splice)"
  functional_impact: "loss of HRR (BRCA2-binding partner)"
  inheritance: "germline"

measurement:
  method: "Germline multi-gene HRR / hereditary-cancer NGS panel on whole blood or saliva."
  units: "categorical: pathogenic | likely_pathogenic | VUS | benign | absent"

specimen_requirements:
  - "Whole blood EDTA or saliva — germline DNA"

interpretation_notes: >
  PALB2 is BRCA2's recruitment partner; biallelic LOF produces the same
  HRR-deficient phenotype as BRCA1/2. Pathogenic-variant carriers face:

    • Breast cancer lifetime risk ~35–55% (NCCN: high-penetrance gene)
    • Pancreatic ductal adenocarcinoma (PDAC) ~3–5x baseline
    • Ovarian cancer modest elevation
    • mCRPC: cohort-B in PROfound (HRR genes excluding BRCA1/2/ATM)
      includes PALB2; smaller absolute olaparib benefit than cohort A
      but PARPi remains an option per NCCN 2025.

  Genetic counseling required (NCCN hereditary-cancer panel). Cascade
  testing for first-degree relatives. Surveillance: enhanced breast
  screening (annual MRI from 30); pancreatic surveillance per CAPS
  consortium when family history present.

related_biomarkers:
  - BIO-BRCA-GERMLINE
  - BIO-BRCA1-BRCA2-GERMLINE
  - BIO-BRCA-SOMATIC
  - BIO-ATM-CHEK2-CDK12-GERMLINE

sources:
  - SRC-PROFOUND-DEBONO-2020
  - SRC-NCCN-PROSTATE-2025
  - SRC-NCCN-BREAST-2025
  - SRC-NCCN-PANCREATIC-2025
  - SRC-CIVIC

oncokb_skip_reason: germline_no_somatic

external_ids:
  hgnc_symbol: "PALB2"
  civic_url: "https://civicdb.org/genes/PALB2/summary"

last_reviewed: "2026-04-29"
notes: >
  Distinguished from BRCA1/2 by lower clinician familiarity and a more
  recent inclusion in NCCN high-penetrance lists (added 2020). PARPi
  efficacy data is smaller-N (PROfound cohort B; case series) but
  biologically supported. EMBRACA was germline-BRCA-only; talazoparib
  in PALB2 is off-label / NCCN-2A category.
notes_ua: >
  Відрізняється від BRCA1/2 меншою обізнаністю клініцистів і нещодавнім
  включенням до списків NCCN високо-пенетрантних генів (з 2020).
  Дані щодо PARPi мають менший обсяг (PROfound когорта B; серії
  випадків), але біологічно обґрунтовані. EMBRACA включала лише
  гермінальний BRCA; талазопариб при PALB2 — off-label / NCCN-2A.
ukrainian_review_status: pending_clinical_signoff
