id: BIO-PDGFRA
names:
  preferred: "PDGFRA mutation"
  ukrainian: "Мутація PDGFRA"
  english: "PDGFRA mutation"
  synonyms: ["PDGFR-α mutation", "PDGFRA D842V"]

biomarker_type: gene_mutation
mutation_details:
  gene: "PDGFRA"
  gene_hugo_id: "HGNC:8803"
  hotspots:
    - "D842V (exon 18 — activation loop; ~70% of PDGFRA-mutant GIST; imatinib-RESISTANT, avapritinib-sensitive)"
    - "exon 18 non-D842V (deletions — imatinib-sensitive)"
    - "exon 12 (juxtamembrane — imatinib-sensitive; rare)"
    - "exon 14 (kinase domain — rare)"
  variant_type: "missense / deletion"
  functional_impact: "Constitutive PDGFRA tyrosine kinase activation"

measurement:
  method: "DNA-NGS (preferred — covers exons 12 / 14 / 18) OR Sanger directed at exons 12 + 18"
  units: "categorical; variant + exon reported"
  sensitivity_requirement: "Standard NGS"

specimen_requirements:
  - "FFPE tumor tissue, minimum 20% tumor cellularity"

related_biomarkers:
  - BIO-KIT

sources:
  - SRC-NCCN-MELANOMA-2025
  - SRC-ONCOKB

oncokb_skip_reason: multi_allele_mvp
external_ids:
  hgnc_symbol: PDGFRA
last_reviewed: "2026-04-27"
notes: >
  ~10% of GIST overall; ~80% of stomach (vs small-bowel) GIST. D842V
  (the dominant variant) is imatinib-RESISTANT and historically the
  worst-prognosis GIST subtype. Avapritinib (NAVIGATOR / VOYAGER)
  changed the paradigm — FDA-approved for unresectable / metastatic
  PDGFRA-D842V-mutant GIST 1L; ORR ~88% historical control vs ~0% on
  imatinib. Non-D842V exon-18 mutations and exon 12 mutations remain
  imatinib-sensitive. Eosinophilic disorders (myeloid neoplasms with
  PDGFRA fusion to FIP1L1 etc.) are a separate entity and use imatinib
  100 mg / day.
notes_ua: >
  Частота ~10% ГІСП загалом; ~80% ГІСП шлунку (порівняно з тонкокишковими).
  D842V (домінантний варіант) є РЕЗИСТЕНТНИМ до іматинібу та історично
  становить підтип ГІСП з найгіршим прогнозом. Авапритиніб (avapritinib;
  NAVIGATOR / VOYAGER) змінив парадигму — схвалений FDA для нерезектабельного
  / метастатичного ГІСП з мутацією PDGFRA D842V у першій лінії;
  ORR ~88% проти ~0% при іматинібі. Мутації не-D842V екзону 18 та екзону 12
  зберігають чутливість до іматинібу. Еозинофільні розлади (мієлоїдні
  новоутворення зі злиттям PDGFRA та FIP1L1 тощо) є окремою нозологією
  та лікуються іматинібом 100 mg / день.
ukrainian_review_status: pending_clinical_signoff
