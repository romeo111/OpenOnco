id: BIO-PDL1-28-8-CLONE
names:
  preferred: "PD-L1 IHC — Dako 28-8 pharmDx clone"
  ukrainian: "PD-L1 ІГХ — клон Dako 28-8 pharmDx"
  english: "PD-L1 28-8 (Dako pharmDx)"
  synonyms: ["28-8", "PD-L1 28-8 pharmDx", "Dako 28-8"]
biomarker_type: protein_expression_ihc

measurement:
  method: >
    IHC with Dako PD-L1 IHC 28-8 pharmDx companion diagnostic on
    Autostainer Link 48. Tumor-cell membranous staining quantified
    as % positive tumor cells (TPS-analogous). Used as:
    - Companion diagnostic: NSCLC nivolumab post-platinum (TC ≥1%
      complementary in some labels; TC ≥10% in older monotherapy data).
    - Complementary diagnostic: melanoma nivolumab / nivo+ipi
      (CheckMate-067) — TC ≥5% identifies subgroup with stronger
      mono-therapy response, but combo benefits across all expression
      levels.
    - RCC nivo+ipi (CheckMate-214) — TC% reported as stratification
      marker, NOT a cut-point gate.
  units: "TC% (% tumor cells with membranous PD-L1 staining)"
  typical_range: [0, 100]

specimen_requirements:
  - "FFPE tumor block"

interpretation_notes: >
  28-8 is the companion / complementary diagnostic for nivolumab
  (Opdivo). Blueprint Phase 1 (Hirsch et al, J Thorac Oncol 2017)
  showed 28-8 is analytically concordant with 22C3 and SP263 on
  tumor-cell scoring. Clinical use:
  - Melanoma 1L nivolumab vs nivo+ipi (CheckMate-067, Larkin 2015/2019):
    TC ≥5% — comparable monotherapy benefit; TC <5% — combination
    therapy preferred (greater absolute benefit).
  - RCC intermediate/poor-risk 1L nivo+ipi (CheckMate-214): no
    biomarker gate; TC% used as stratification only.
  - NSCLC 2L+ nivolumab (CheckMate-017/057): TC ≥1% complementary,
    not required for treatment.

related_biomarkers: [BIO-PDL1-EXPRESSION, BIO-PDL1-TPS]
sources:
  - SRC-CHECKMATE-067-LARKIN-2019
  - SRC-CHECKMATE-816-FORDE-2022
  - SRC-NCCN-MELANOMA-2025
  - SRC-NCCN-KIDNEY-2025
last_reviewed: "2026-04-29"
oncokb_skip_reason: ihc_no_variant
external_ids:
  hgnc_symbol: "CD274"
notes: >
  Companion-diagnostic clone-specific entity for nivolumab. 28-8 results
  are interchangeable with 22C3 / SP263 for tumor-cell-based scoring
  (Blueprint concordance) but NOT for CPS-based scoring.

  TRIAL ANCHOR: CheckMate-067 (Larkin et al, NEJM 2015 / 2019 5y update)
  for melanoma nivo / nivo+ipi; CheckMate-214 (Motzer 2018) for RCC
  combination — Source stub TBD (flag for source-ingest follow-up).
notes_ua: >
  Клон-специфічна сутність companion diagnostic для ніволумабу.
  Результати 28-8 взаємозамінні з 22C3 / SP263 при оцінці на
  пухлинних клітинах (Blueprint concordance), але НЕ для CPS-оцінки.

  ТРИАЛ-ЯКОР: CheckMate-067 (Larkin та ін., NEJM 2015 / оновлення
  2019 — 5-річна виживаність) для меланоми nivo / nivo+ipi;
  CheckMate-214 (Motzer 2018) для НКР — Source-stub TBD (позначено
  для подальшого ingest).
