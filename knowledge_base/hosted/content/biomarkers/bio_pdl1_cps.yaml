id: BIO-PDL1-CPS
names:
  preferred: "PD-L1 Combined Positive Score (CPS)"
  ukrainian: "PD-L1 Combined Positive Score (CPS)"
  english: "PD-L1 CPS"
  synonyms: ["CPS"]
biomarker_type: protein_expression_ihc
measurement:
  method: "IHC 22C3 pharmDx; CPS = (PD-L1+ cells [tumor + lymphocytes + macrophages] / total tumor cells) × 100"
  units: "CPS score (numeric, ≥0)"
specimen_requirements: ["FFPE tumor block"]
interpretation_notes: >
  CPS scoring (vs TPS in NSCLC) considers PD-L1 expression on both
  tumor + immune cells. GI thresholds vary:
    - Gastric/GEJ adeno: CPS ≥5 — pembro+chemo (KEYNOTE-859), nivo+chemo
      (CheckMate-649 with CPS-stratified subgroups).
    - Esophageal SCC: CPS ≥10 — pembro+chemo (KEYNOTE-590).
    - Esophageal adeno: same CPS criteria as gastric.
related_biomarkers: [BIO-PDL1-EXPRESSION]
sources: [SRC-NCCN-GASTRIC-2025, SRC-NCCN-ESOPHAGEAL-2025]
last_reviewed: "2026-04-26"
