id: BIO-PDL1-EXPRESSION
names:
  preferred: "PD-L1 expression by IHC"
  ukrainian: "Експресія PD-L1 (ІГХ)"
  english: "PD-L1 expression"
  synonyms: ["PD-L1", "B7-H1", "CD274"]
biomarker_type: protein_expression_ihc

measurement: {method: "IHC on FFPE biopsy (22C3, SP142, SP263 clones — assay-specific scoring)", units: "Tumor Proportion Score (TPS) % OR Combined Positive Score (CPS)"}
specimen_requirements: ["FFPE biopsy block"]

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
oncokb_skip_reason: ihc_no_variant
external_ids:
  hgnc_symbol: "CD274"
notes: >
  Cross-disease relevance — checkpoint inhibitor response marker:

  - **Classical Hodgkin Lymphoma**: 9p24 amplification → universal
    PD-L1 over-expression → dramatic response to nivolumab /
    pembrolizumab (~70% ORR in r/r). Approved for r/r cHL after
    autoSCT + brentuximab failure.
  - **Primary Mediastinal Large B-Cell Lymphoma (PMBCL)**:
    similar 9p24 + universal PD-L1 → checkpoint-responsive.
    Pembrolizumab approved r/r PMBCL.
  - **EBV+ neoplasms** (EBV+ DLBCL elderly, NK/T, PTLD): variable
    PD-L1 + checkpoint-response in subset.
  - **Mediastinal Gray Zone Lymphoma**: PD-L1+ subset.
  - Most other DLBCL / NHL: PD-L1 expression variable, response
    rates lower; not standard.

  Algorithm impact: future 2L+ pembrolizumab/nivolumab routing for
  cHL r/r post-autoSCT. PMBCL future scope (Tier 2 disease).
