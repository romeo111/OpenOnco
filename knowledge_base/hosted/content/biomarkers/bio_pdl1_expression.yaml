external_ids:
  hgnc_symbol: "CD274"
notes: >
  Cross-disease relevance — checkpoint inhibitor response marker:

  - **Classical Hodgkin Lymphoma**: 9p24 amplification → universal
    PD-L1 over-expression → dramatic response to nivolumab /
    pembrolizumab (~70% ORR in r/r). Approved for r/r cHL after
    autoSCT + brentuximab failure.
  - **Primary Mediastinal Large B-Cell Lymphoma (PMBCL)**:
    similar 9p24 + universal PD-L1 → checkpoint-responsive.
    Pembrolizumab approved r/r PMBCL.
  - **EBV+ neoplasms** (EBV+ DLBCL elderly, NK/T, PTLD): variable
    PD-L1 + checkpoint-response in subset.
  - **Mediastinal Gray Zone Lymphoma**: PD-L1+ subset.
  - Most other DLBCL / NHL: PD-L1 expression variable, response
    rates lower; not standard.

  Algorithm impact: future 2L+ pembrolizumab/nivolumab routing for
  cHL r/r post-autoSCT. PMBCL future scope (Tier 2 disease).
notes_ua: >
  Клінічна значущість за нозологіями — маркер відповіді на інгібітори
  контрольних точок:

  - **Класична лімфома Ходжкіна**: ампліфікація 9p24 → універсальна
    надекспресія PD-L1 → висока відповідь на ніволумаб / пембролізумаб
    (~70% ORR при рецидивній/рефрактерній формі). Схвалено для
    рецидивної/рефрактерної кЛХ після аутоТГСК + невдачі брентуксимабу.
  - **Первинна медіастинальна великоклітинна B-клітинна лімфома (PMBCL)**:
    схожа ампліфікація 9p24 + універсальний PD-L1 → чутлива до
    checkpoint-терапії. Пембролізумаб схвалений при рецидивній/
    рефрактерній PMBCL.
  - **EBV+-новоутворення** (EBV+ ДВКЛ у літніх, NK/T, PTLD): варіабельний
    PD-L1 + відповідь на checkpoint у підгрупі.
  - **Медіастинальна сіро-зонна лімфома**: PD-L1+ підгрупа.
  - Більшість інших ДВКЛ / NHL: варіабельна PD-L1, нижчі ставки відповіді;
    не є стандартом.

  Вплив на алгоритм: майбутня маршрутизація 2L+ пембролізумаб/ніволумаб
  для рецидивної/рефрактерної кЛХ після аутоТГСК. PMBCL — майбутній
  напрям (нозологія рівня 2).
