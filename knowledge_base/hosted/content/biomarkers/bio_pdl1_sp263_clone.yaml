id: BIO-PDL1-SP263-CLONE
names:
  preferred: "PD-L1 IHC — Ventana SP263 clone"
  ukrainian: "PD-L1 ІГХ — клон Ventana SP263"
  english: "PD-L1 SP263 (Ventana)"
  synonyms: ["SP263", "VENTANA PD-L1 (SP263)", "Ventana SP263"]
biomarker_type: protein_expression_ihc

measurement:
  method: >
    IHC with VENTANA PD-L1 (SP263) Assay on BenchMark ULTRA. Tumor-cell
    membranous staining quantified as TC% (functionally analogous to TPS).
    Cut-points by indication:
    - NSCLC PACIFIC (durvalumab consolidation post-CRT): TC ≥1%
      (post-hoc analysis; FDA approval not strictly cut-point-restricted
      but EMA limited to TC ≥1%).
    - NSCLC 1L durvalumab+tremelimumab+chemo (POSEIDON):
      not biomarker-restricted by label.
    - Urothelial 1L cisplatin-ineligible durvalumab (historical, now
      restricted).
  units: "TC% (% tumor cells with membranous PD-L1 staining)"
  typical_range: [0, 100]

specimen_requirements:
  - "FFPE tumor block"

interpretation_notes: >
  SP263 is the companion / complementary diagnostic for durvalumab
  (Imfinzi). Blueprint Phase 2 (Tsao et al, J Thorac Oncol 2018)
  demonstrated SP263 is ANALYTICALLY CONCORDANT with 22C3 on tumor-cell
  scoring (TC vs TPS) — clinically interchangeable for tumor-cell
  cut-points in NSCLC, but NOT for CPS-based indications (22C3-only).
  Indications relying on SP263:
  - NSCLC stage III post-cCRT durvalumab consolidation (PACIFIC,
    Antonia 2017/2018) — EMA TC ≥1% restriction.
  - SCLC 1L durvalumab+platinum-etoposide (CASPIAN) — not
    biomarker-restricted.

related_biomarkers: [BIO-PDL1-EXPRESSION, BIO-PDL1-TPS]
sources:
  - SRC-CASPIAN-PAZ-ARES-2019
  - SRC-NCCN-NSCLC-2025
  - SRC-NCCN-SCLC-2025
last_reviewed: "2026-04-29"
oncokb_skip_reason: ihc_no_variant
external_ids:
  hgnc_symbol: "CD274"
notes: >
  Companion-diagnostic clone-specific entity for durvalumab. SP263
  results are interchangeable with 22C3 for tumor-cell-based NSCLC
  cut-points (Blueprint concordance) but NOT for CPS-based scoring.

  TRIAL ANCHOR: PACIFIC (Antonia et al, NEJM 2017/2018) for stage III
  NSCLC consolidation; CASPIAN (Paz-Ares 2019) for SCLC. PACIFIC
  Source stub TBD (flag for source-ingest follow-up); CASPIAN already
  in KB.
notes_ua: >
  Клон-специфічна сутність companion diagnostic для дурвалумабу.
  Результати SP263 взаємозамінні з 22C3 для NSCLC cut-points на
  основі пухлинних клітин (Blueprint concordance), але НЕ для CPS-оцінки.

  ТРИАЛ-ЯКОР: PACIFIC (Antonia та ін., NEJM 2017/2018) для
  консолідації NSCLC III стадії; CASPIAN (Paz-Ares 2019) для МКЛ.
  Source-stub PACIFIC TBD (позначено для подальшого ingest); CASPIAN
  вже у KB.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
