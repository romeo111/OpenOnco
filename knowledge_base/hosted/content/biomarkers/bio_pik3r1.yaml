id: BIO-PIK3R1
names:
  preferred: "PIK3R1 mutation (p85α regulatory subunit of PI3K)"
  ukrainian: "Мутація PIK3R1 (регуляторна субодиниця p85α PI3K)"
  english: "PIK3R1 / p85α mutation"

biomarker_type: gene_mutation

mutation_details:
  gene: "PIK3R1"
  exon: "multiple (iSH2 domain, nSH2 domain: codons 449–580 most common)"
  variant_type: "loss-of-function or gain-of-function (heterogeneous; iSH2 domain deletions → reduced p85α inhibition of p110α → PI3K activation)"
  functional_impact: "activating (via reduced inhibitory constraint on PI3Kα catalytic subunit p110α)"

