last_reviewed: "2026-05-04"
notes: >
  PIK3R1 encodes the p85α regulatory subunit of PI3Kα (phosphatidylinositol 3-kinase).
  p85α normally inhibits the p110α catalytic subunit; PIK3R1 mutations (deletions and
  missense in the iSH2 domain) reduce this inhibition, activating PI3K/AKT/mTOR signaling.
  Clinical contexts:
  (1) Endometrial cancer: PIK3R1 mutations in ~33% — among the highest frequencies in
      any cancer type. Co-occurs with PIK3CA (~50% of EC have PI3K pathway mutations).
      PIK3R1-mutant EC may be sensitized to PI3K/AKT/mTOR inhibitors. Alpelisib
      (PI3Kα inhibitor) is FDA-approved for PIK3CA-mutant HR+ breast cancer (SOLAR-1);
      evidence in EC is more limited — lenvatinib + everolimus is the approved mTOR-based
      combination for advanced EC (KEYNOTE-775, not PIK3R1-specific). Copanlisib
      (pan-PI3K inhibitor) and other PI3K inhibitors are being evaluated in EC basket trials.
  (2) Breast cancer: PIK3R1 mutations in ~8–10% (often with PIK3CA co-mutation); may
      predict PI3K inhibitor sensitivity similarly to PIK3CA.
  (3) Glioblastoma: PIK3R1 mutations in ~10%.
  Therapeutic note: alpelisib (PI3Kα-specific) is approved only for PIK3CA-mutant
  HR+ breast cancer (companion diagnostic: therascreen PIK3CA test). PIK3R1 mutations
  are not currently included in the approved alpelisib companion diagnostic but may
  co-activate the same pathway — clinical trial enrollment preferred.
notes_ua: >
  PIK3R1 кодує p85α — регуляторну субодиницю PI3Kα. Мутації (делеції/missense iSH2-домену)
  → зниження інгібування p110α → активація PI3K/AKT/mTOR.
  Контексти: (1) РЕ (~33%; найвища частота; PI3K-шлях у ~50% РЕ; ленватиніб+еверолімус
  схвалені при прогресуванні); (2) РГЗ (~8–10%); (3) GBM (~10%). Алпелізиб (PI3Kα)
  схвалений лише для PIK3CA-мутантного HER2- РГЗ; PIK3R1 не в компаньйон-діагностиці.
