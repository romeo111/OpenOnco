last_reviewed: "2026-05-04"
notes: >
  PTCH1 (Patched-1) is the primary tumor suppressor in the Hedgehog (HH) pathway. It
  normally inhibits SMO by sequestering it; when HH ligand (SHH, DHH, IHH) binds PTCH1,
  this inhibition is released, allowing SMO to activate GLI1/2 transcription factors.
  Somatic PTCH1 loss is the dominant driver of sporadic BCC (~90%). Germline PTCH1
  mutation causes Gorlin syndrome (Basal Cell Nevus Syndrome): multiple BCCs from early
  adulthood, odontogenic keratocysts, skeletal anomalies, calcified falx cerebri, and
  markedly increased medulloblastoma risk (SHH-subtype, predominantly desmoplastic,
  in childhood). Gorlin syndrome patients are exquisitely sensitive to ionizing radiation
  (radiation-induced BCCs within field); radiation therapy is relatively contraindicated
  for BCC treatment in Gorlin patients. Therapeutic implication: loss of PTCH1 in BCC
  justifies hedgehog inhibitor (vismodegib/sonidegib) for locally advanced/metastatic
  disease — routine tumor PTCH1 testing is not required because HH pathway activation
  is universal in BCC.
notes_ua: >
  PTCH1 — головний онкосупресор HH-шляху. Соматична втрата PTCH1 — домінуючий драйвер
  БКК (~90%). Зародкова мутація PTCH1 → синдром Горліна: множинні БКК змалку, одонтогенні
  кератокісти, підвищений ризик медулобластоми (SHH-підтип). Пацієнти з синдромом Горліна
  надзвичайно чутливі до іонізуючого випромінювання — ПТ відносно протипоказана.
