last_reviewed: "2026-05-04"
notes: >
  PTPN11 encodes SHP2, a protein tyrosine phosphatase that acts as a positive regulator
  of the RAS/MAPK pathway. Gain-of-function mutations disrupt autoinhibition, leading to
  constitutive RAS/ERK activation. Clinical contexts:
  (1) JMML: somatic PTPN11 mutations in ~35% — the single most common driver. Somatic
      PTPN11 in JMML carries poor prognosis; germline PTPN11 (Noonan syndrome) may cause
      a transient self-limiting myeloproliferative process that resolves without HCT.
      Critical to distinguish somatic vs germline origin — germline PTPN11 is a very
      different clinical entity.
  (2) Noonan syndrome (germline): most common cause (~50%); N308D, Q79R, D61G hotspots.
      Features: short stature, cardiac defects (pulmonary stenosis, HCM), webbed neck.
      Very low lifetime malignancy risk beyond juvenile myeloproliferative disease.
  (3) Acute leukemias: PTPN11 mutations in ~7% of AML, ~5% of B-ALL.
  (4) Solid tumors: ~5% of NSCLC, gastric, colorectal (often co-occurring with KRAS).
  Therapeutic target: SHP2 inhibitors are in active clinical development — TNO155 (Novartis),
  RMC-4630 (Revolution Medicines), ERAS-601 (Erasca). Phase I/II trials in solid tumors
  with KRAS mutations and PTPN11 mutations. SHP2 inhibition disrupts RAS activation:
  effective against RTK-driven RAS signaling and as combination partner for KRAS G12C
  inhibitors (adagrasib + TNO155 trial for KRAS G12C NSCLC). No FDA approval 2026.
notes_ua: >
  PTPN11 кодує SHP2 — позитивний регулятор RAS/MAPK. Активуючі мутації → конститутивний
  RAS/ERK. Контексти: ЮММЛ (соматичний ~35%; найчастіший драйвер); синдром Нунан (зародковий
  ~50%; розрізнити від соматичного критично!); AML/ALL (~5–7%); солідні пухлини (NSCLC ~5%).
  SHP2-інгібітори (TNO155, RMC-4630, ERAS-601) у фазі I/II. Немає схвалення FDA.
