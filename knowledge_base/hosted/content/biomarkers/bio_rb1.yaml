  сигнатуру; Rb ІГХ діагностична); (3) Уротеліальний рак (~30%); (4) TNBC (~10%); (5)
  Остеосаркома (~30%). КЛЮЧОВО: RB1 втрата → резистентність до CDK4/6-інгібіторів
  (palbociclib, ribociclib, abemaciclib) при РГЗ — pRb є субстратом CDK4/6.
