notes: >
  RB1 encodes the retinoblastoma protein (pRb), the master G1/S checkpoint regulator.
  pRb normally sequesters E2F transcription factors to prevent S-phase entry; loss of pRb
  → uncontrolled cell cycle progression. Clinical contexts:
  (1) Hereditary retinoblastoma: germline RB1 mutation → bilateral/multifocal retinoblastoma
      in childhood; lifetime elevated risk of osteosarcoma, SCLC, melanoma.
  (2) SCLC: biallelic RB1 loss + TP53 mutation defines the SCLC molecular signature (~95%
      of SCLC). pRb loss by IHC is used in pathologic diagnosis. No targeted therapy for
      RB1 deficiency per se; SCLC treatment is chemotherapy (EP/EC) ± atezolizumab.
  (3) Urothelial carcinoma: RB1 alterations in ~30% of muscle-invasive bladder cancer;
      associated with basal/squamous subtype; not currently targeted.
  (4) Breast cancer: RB1 mutations occur in ~10% of TNBC; RB1 loss predicts resistance
      to CDK4/6 inhibitors (palbociclib, ribociclib, abemaciclib) — pRb is the substrate
      for CDK4/6 that drives cell cycle entry; without pRb, CDK4/6 inhibition is ineffective.
  (5) Osteosarcoma: RB1 alterations in ~30%.
  Therapeutic implication of RB1 loss in HR+ breast cancer: CDK4/6 inhibitors are
  essentially non-functional without pRb; test for RB1 loss when CDK4/6i resistance
  is encountered. This is a resistance biomarker, not a sensitivity marker.
