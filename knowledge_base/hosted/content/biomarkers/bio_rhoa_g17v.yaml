last_reviewed: "2026-04-25"
notes: >
  AITL-defining marker: ~70% of AITL / nodal TFH-cell lymphomas carry
  RHOA G17V. Useful diagnostic-confirmation marker (with TET2/IDH2/
  DNMT3A clonal hematopoiesis-like background). Not currently
  algorithm-driving — informational. Future: may stratify within
  AITL prognosis.

  Outside AITL: rare in other hematologic neoplasms (gastric cancer
  context different therapeutic framing).
notes_ua: >
  Визначальний маркер АІТЛ: ~70% АІТЛ / вузлових TFH-клітинних лімфом
  несуть RHOA G17V. Корисний маркер підтвердження діагнозу (у поєднанні
  з клональним гемопоетичним фоном TET2/IDH2/DNMT3A). Наразі не є
  рушієм алгоритму — інформаційний. Перспектива: може стратифікувати
  прогноз у межах АІТЛ.
  Поза АІТЛ: рідко зустрічається в інших гематологічних неоплазмах;
  при раку шлунка контекст і терапевтичні рамки відрізняються.
