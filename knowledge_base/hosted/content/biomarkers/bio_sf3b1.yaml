notes: >
  MDS: ~20% overall, ~80% of MDS with ring sideroblasts (MDS-LR-RS in
  WHO-2022 / ICC-2022). SF3B1-mutant MDS-LR-RS has a distinct biology
  — favorable in IPSS-M, transfusion-dependent anemia phenotype,
  responds to luspatercept (COMMAND, MEDALIST). Also luspatercept
  ESAs first-line for low-risk MDS irrespective of RS in some regions
  per ESMO 2024 update. CLL: ~10–20%, adverse prognostic marker.
  Uveal melanoma: ~20%, intermediate prognosis (vs BAP1 worst).
  H3B-8800 / E7107 splicing modulators in development but no approved
  agents target SF3B1 directly.
notes_ua: >
  МДС: ~20% загалом, ~80% МДС з кільцевими сидеробластами (MDS-LR-RS
  за WHO-2022 / ICC-2022). SF3B1-мутантний MDS-LR-RS має особливу
  біологію — сприятливий за IPSS-M, фенотип трансфузійно-залежної
  анемії, відповідає на люспатерцепт (luspatercept; COMMAND, MEDALIST).
  Також люспатерцепт і ЕСА є терапією першої лінії при низькоризиковому
  МДС незалежно від наявності RS у ряді регіонів за оновленням ESMO
  2024. ХЛЛ: ~10–20%, несприятливий прогностичний маркер. Увеальна
  меланома: ~20%, проміжний прогноз (порівняно з BAP1 — найгірший).
  Модулятори сплайсингу H3B-8800 / E7107 у розробці, проте схваленого
  препарату, що безпосередньо пригнічує SF3B1, не існує.
