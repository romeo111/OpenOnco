last_reviewed: "2026-05-04"
notes: >
  SMARCB1 (INI1/hSNF5/BAF47) is a core subunit of the SWI/SNF chromatin remodeling
  complex. Biallelic inactivation removes SWI/SNF antagonism of EZH2 (PRC2 complex),
  leading to H3K27me3 accumulation and epigenetic silencing of tumor suppressor genes.
  This makes SMARCB1-deficient tumors selectively sensitive to EZH2 inhibition.
  SMARCB1 loss defines three main tumor types:
  (1) Epithelioid sarcoma — tazemetostat FDA-approved (2020; EZH-202 trial).
  (2) Malignant rhabdoid tumor (MRT, AT/RT in CNS) — extremely aggressive; no approved
      targeted therapy; investigational EZH2 inhibitors.
  (3) SMARCB1-deficient chordoma, sinonasal carcinoma — rare.
  IHC for INI1 (nuclear loss) is the companion diagnostic for tazemetostat in epithelioid
  sarcoma and is simpler than molecular testing. Note: retained INI1 expression does NOT
  exclude epithelioid sarcoma — ~10% of cases have normal INI1 by IHC despite molecular
  loss (technical or heterogeneous loss).
notes_ua: >
  SMARCB1 (INI1) є основною субодиницею хроматин-ремоделюючого комплексу SWI/SNF.
  Двоалельна інактивація усуває антагонізм SWI/SNF щодо EZH2 (комплекс PRC2),
  що призводить до накопичення H3K27me3 та епігенетичного замовчування генів-
  пухлинних супресорів. Це робить SMARCB1-дефіцитні пухлини вибірково чутливими
  до інгібування EZH2.
  Визначальна роль при трьох основних типах пухлин:
  (1) Епітеліоїдна саркома: таземетостат (tazemetostat) схвалений FDA у 2020
      (дослідження EZH-202); ІГХ на INI1 (ядерна втрата) є супутньою
      діагностикою.
  (2) Злоякісна рабдоїдна пухлина (MRT, AT/RT в ЦНС) — надзвичайно агресивна;
      схвалена цільова терапія відсутня; дослідницькі EZH2-інгібітори.
  (3) SMARCB1-дефіцитна хордома, синоназальна карцинома — рідкісні.
  Збережена ядерна експресія INI1 за ІГХ НЕ виключає епітеліоїдну саркому —
  ~10% випадків мають нормальний INI1 за ІГХ попри молекулярну втрату.
