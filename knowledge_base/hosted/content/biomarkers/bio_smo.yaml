notes: >
  SMO (Smoothened) is a G-protein-coupled receptor that transmits Hedgehog (HH) signaling.
  Normally suppressed by PTCH1; activated when PTCH1 loses its inhibitory function (whether
  via PTCH1 loss-of-function or SMO gain-of-function mutation). SMO activating mutations
  (~10–20% of BCCs) and PTCH1 loss-of-function (~90% of BCCs) both result in constitutive
  HH pathway activation. Vismodegib and sonidegib are SMO antagonists — they bind the SMO
  transmembrane domain and block downstream HH signaling (GLI1/2 repression). In practice,
  BCC HHI therapy does not require pre-testing for SMO vs PTCH1 mutation — all BCCs have
  HH pathway activation. SMO mutations also occur in sporadic medulloblastoma (SHH subtype)
  and rarely in other tumors. Resistance: secondary SMO mutations (D473H most common) emerge
  during vismodegib therapy, driving acquired resistance. Sonidegib may be active in some
  vismodegib-resistant D473H mutants.
notes_ua: >
  SMO (Smoothened) — G-протеїн-зв'язаний рецептор, що передає Hedgehog (HH) сигналінг.
  Активуючі мутації SMO (~10–20% БКК) та втрата PTCH1 (~90% БКК) обидва призводять до
  конститутивної активації HH. Візомодегіб та сонідегіб — SMO антагоністи. Тестування
  на SMO vs PTCH1 не потрібне перед призначенням. Резистентність: вторинні мутації SMO
  (D473H).
