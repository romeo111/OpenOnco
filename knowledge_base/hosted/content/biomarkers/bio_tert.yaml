last_reviewed: "2026-05-04"
notes: >
  TERT (Telomerase Reverse Transcriptase) is the catalytic subunit of telomerase.
  TERT promoter mutations (C228T or C250T, by chr5 coordinates) create de novo ETS family
  transcription factor binding sites, increasing TERT transcription and telomerase activity,
  extending cellular lifespan and enabling replicative immortality.
  Key clinical contexts:
  (1) Papillary thyroid cancer (PTC): TERT promoter mutations (~10–15% of PTC) are adverse
      prognostic markers, particularly when co-occurring with BRAF V600E (~8–12% of PTC).
      BRAF V600E + TERT promoter → mortality risk ~40× vs wild-type (Xing et al. NEJM 2014);
      this combination stratifies high-risk PTC requiring aggressive RAI and surveillance.
  (2) Follicular thyroid cancer: TERT mutations in ~15–20%.
  (3) GBM: TERT promoter mutations in ~70–80% (often co-occurring with EGFR amplification or
      IDH wild-type — defines molecular IDH-wild-type GBM). TERT mutation in IDH-wild-type
      astrocytoma with EGFR amplification or +7/-10 → WHO grade 4 GBM (CNS WHO 2021).
  (4) Oligodendroglioma: IDH mutation + 1p/19q codeletion + TERT mutation = canonical
      molecular definition of oligodendroglioma (WHO CNS 5th ed).
  (5) Bladder cancer: TERT promoter mutations in ~60–80% — useful non-invasive detection
      in urine (early detection research).
  (6) HCC: TERT mutations in ~50%.
  No FDA-approved TERT inhibitor as of 2026. Investigational: imetelstat (telomerase
  inhibitor; FDA 2024 for MDS) — different mechanism from TERT promoter targeting.
notes_ua: >
  TERT промоторні мутації (C228T / C250T) — de novo сайти зв'язування ETS-факторів →
  підвищення транскрипції TERT → реплікативне безсмертя. Контексти:
  (1) PTC: TERT (~10–15%); BRAF+TERT → смертність ~40× vs wild-type; стратифікація ризику.
  (2) GBM: TERT ~70–80%; IDH-wild-type + TERT + EGFR ампліфікація → WHO grade 4.
  (3) Олігодендрогліома: IDH + 1p/19q + TERT = канонічне молекулярне визначення.
  (4) Уротеліальний (~60–80%), HCC (~50%). Немає FDA-схваленого TERT-інгібітору.
