id: BIO-TP53-MUTATION
names:
  preferred: "TP53 mutation / del(17p)"
  ukrainian: "Мутація TP53 / del(17p)"
  english: "TP53 mutation / del(17p)"
  synonyms:
    - "TP53"
    - "del 17p"
    - "p53 mutation"
    - "17p deletion"

biomarker_type: gene_mutation

mutation_details:
  gene: "TP53"
  gene_hugo_id: "11998"
  variant_type: "missense / nonsense / frameshift / splice / 17p deletion"
  functional_impact: "loss_of_function (tumor suppressor)"

measurement:
  method: "NGS panel (PCR + sequencing) for point mutations + FISH for del(17p13.1) on tumor cells"
  units: "categorical (positive | negative); positive = mutation OR del(17p) OR both"

specimen_requirements:
  - "Tumor tissue (FFPE biopsy) for solid + lymphoid neoplasms"
  - "CD138-enriched plasma cells (BM aspirate) for myeloma"
  - "CD19-enriched B cells (PB) for CLL — preferred over BM"
  - "BM aspirate for AML / MDS"

related_biomarkers:
