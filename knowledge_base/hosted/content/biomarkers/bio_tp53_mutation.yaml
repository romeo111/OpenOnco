notes: >
  Universal adverse marker across most hematologic + solid malignancies
  — predicts poor response to chemo + chemoimmuno; selects for novel-
  agent regimens / targeted therapies / cellular therapy / alloSCT.

  **Cross-disease decision impact in our KB (current scope):**

  - **CLL/SLL**: TP53-mut OR del(17p) → contraindicates chemoimmuno
    (FCR/BR); favors fixed-duration VenO (CLL14) over BTKi continuous
    in some guidelines. Captured in composite BIO-CLL-HIGH-RISK-GENETICS
    + RF-CLL-HIGH-RISK.

  - **MCL**: TP53-mut → predicts chemoimmuno failure (intensive
    R-CHOP/R-DHAP+autoSCT outcomes substantially worse); routes to
    BTKi-based 1L (acalabrutinib+R) regardless of fitness. Captured in
    RF-MCL-BLASTOID-OR-TP53.

  - **MM**: del(17p) part of high-risk cytogenetics composite — drives
    quadruplet (D-VRd) over triplet (VRd). Captured in
    BIO-MM-CYTOGENETICS-HR + RF-MM-HIGH-RISK-CYTOGENETICS.

  - **DLBCL** (future scope): predicts R-CHOP failure; flag for early
    CAR-T pathway consideration at 2L+. Not yet driving 1L algorithm.

  - **AML** (future scope, not in KB yet): TP53-mut AML has dismal
    chemo outcomes — currently routes directly to alloSCT consideration
    + venetoclax-azacitidine for unfit + clinical trials.

  This entity is the **standalone marker citation** for all the above.
  Engine algorithms reference it indirectly via composite biomarkers
  (CLL-HIGH-RISK-GENETICS, MM-CYTOGENETICS-HR) or via RedFlags
  (RF-MCL-BLASTOID-OR-TP53). Centralizing it here gives clean
  traceability + ready ground for future direct-driving rules
  (e.g., 2L CAR-T flag) without re-encoding the source citation in
  multiple places.
notes_ua: >
  Універсальний несприятливий маркер при більшості гематологічних і солідних
  злоякісних пухлин — передбачає погану відповідь на хімотерапію та
  хімоімунотерапію; відбирає для схем з новими агентами / цільовою терапією
  / клітинною терапією / алоТГСК.

  **Вплив на вибір терапії в нашій БЗ (поточний обсяг):**

  - **ХЛЛ/МЛЛ**: TP53-мут АБО del(17p) → протипоказання до хімоімунотерапії
    (FCR/BR); перевага фіксованій тривалості VenO (CLL14) над безперервним
    BTKi за деякими настановами. Закодовано в BIO-CLL-HIGH-RISK-GENETICS
    + RF-CLL-HIGH-RISK.

  - **МКЛ**: TP53-мут → передбачає невдачу хімоімунотерапії (результати
    інтенсивного R-CHOP/R-DHAP+аутоТГСК суттєво гірші); маршрутизація до
    BTKi-ГЦБ першої лінії (акалабрутиніб + R) незалежно від фізичного стану.
    Закодовано в RF-MCL-BLASTOID-OR-TP53.

  - **ММ**: del(17p) є частиною цитогенетичного комплексу високого ризику —
    визначає вибір квартету (D-VRd) над триплетом (VRd). Закодовано в
    BIO-MM-CYTOGENETICS-HR + RF-MM-HIGH-RISK-CYTOGENETICS.

  - **ДВКЛ** (майбутній напрям): передбачає невдачу R-CHOP; позначка для
    раннього розгляду CAR-T при 2L+. Ще не визначає алгоритм першої лінії.

  - **ГМЛ** (майбутній напрям, поки не в БЗ): TP53-мутантна ГМЛ має
    катастрофічні результати при хімотерапії — наразі маршрутизується
    безпосередньо до розгляду алоТГСК + венетоклакс-азацитидин
    для непридатних до інтенсивного лікування + клінічні дослідження.

  Ця сутність є **самостійним маркерним цитуванням** для всіх наведених
  вище ситуацій. Алгоритми рушія посилаються на неї опосередковано через
  BIO-CLL-HIGH-RISK-GENETICS, BIO-MM-CYTOGENETICS-HR або RF-MCL-BLASTOID-OR-TP53.
  Централізація тут забезпечує чисту відстежуваність + готову основу для
  майбутніх правил прямого керування (наприклад, позначка CAR-T при 2L+)
  без повторного кодування цитування джерела в кількох місцях.
