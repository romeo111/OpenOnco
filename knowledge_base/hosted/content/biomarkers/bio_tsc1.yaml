notes: >
  TSC1 (hamartin) forms a heterodimeric complex with TSC2 (tuberin) that acts as a GTPase
  activating protein (GAP) for Rheb, maintaining mTORC1 in an inactive state. Loss of either
  TSC1 or TSC2 → constitutive mTORC1 activation → protein synthesis, cell growth, proliferation.
  Clinical manifestations of TSC1 loss:
  (1) Tuberous Sclerosis Complex (TSC) — germline TSC1 (~30%) or TSC2 (~70%): cortical
      tubers, SEGA, renal AML, cardiac rhabdomyomas, LAM (females), skin lesions.
      TSC1 germline associated with milder phenotype than TSC2.
  (2) LAM — predominantly somatic TSC2 (>80%) or rarely TSC1 in sporadic LAM. TSC-associated
      LAM has germline TSC mutation.
  (3) Renal angiomyolipoma (sporadic) — somatic TSC1/TSC2 in ~50%.
  mTOR inhibitors (everolimus, sirolimus) are approved for multiple TSC/LAM manifestations:
  - Sirolimus: LAM (MILES 2011; FDA 2015)
  - Everolimus: SEGA (EXIST-1), renal AML (EXIST-2), TSC-related seizures (EXIST-3);
    renal cell carcinoma (SRC-BOLERO2 — different indication via PIK3/AKT/mTOR pathway).
  Note: the BIO entity covers TSC1 specifically; TSC2 mutations are clinically similar but
  a separate gene — both treated with mTOR inhibitors.
notes_ua: >
  TSC1 (гамартин) формує комплекс з TSC2 (туберин), що підтримує mTORC1 в неактивному стані.
  Втрата → конститутивна активація mTORC1. Клінічні прояви: синдром туберозного склерозу
  (ТС; SEGA, ниркові AML, ЛАМ у жінок), LAM, ниркові ангіоміоліпоми.
  mTOR-інгібітори: сіролімус для ЛАМ (MILES 2011; FDA 2015), еверолімус для SEGA/AML
  при ТС (EXIST-1, EXIST-2, EXIST-3).
