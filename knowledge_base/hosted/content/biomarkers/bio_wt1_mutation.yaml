id: BIO-WT1-MUTATION
names:
  preferred: "WT1 mutation (Wilms tumor 1 gene)"
  synonyms:
    - "WT1 gene mutation"
    - "Wilms tumor gene 1 mutation"
    - "WT1 sequence variant"

biomarker_type: gene_mutation

mutation_details:
  gene_symbol: WT1
  gene_id_ncbi: 7490
  note: >
    WT1 (Wilms Tumor 1) is a transcription factor and tumor suppressor on chromosome
    11p13. Somatic mutations occur in ~10-15% of AML cases and are concentrated in
    exons 7 and 9 (zinc-finger domain). WT1 mutations are included in the ELN 2022
    adverse-risk category when co-occurring with FLT3-ITD high allelic ratio or other
    adverse features. WT1 mutations confer adverse prognosis with standard induction
    chemotherapy (7+3) and are associated with high relapse rates. WT1 is also used
    as a molecular measurable residual disease (MRD) target — WT1 transcript
    overexpression by RT-qPCR is a pan-AML MRD marker even without a somatic WT1
    mutation.

measurement:
  method: >
    Next-generation sequencing (NGS) myeloid panel — exons 7 and 9 targeted
    sequencing is standard; comprehensive AML NGS panel recommended.
    Variant allele frequency (VAF) tracking used for MRD.
    WT1 transcript level by RT-qPCR: overexpression (>250 copies/10^4 ABL copies
    at diagnosis, normalized to ABL) correlates with disease burden even without
    somatic WT1 mutation — used as pan-AML MRD marker.

specimen_requirements:
  - "Bone marrow aspirate (EDTA) — primary specimen for AML diagnosis"
  - "Peripheral blood (if blasts ≥20%) acceptable for initial screen; bone marrow preferred for NGS"

interpretation_notes: >
  ELN 2022 AML risk stratification (Döhner et al. Blood 2022):
  WT1 mutation — per ELN 2022, WT1 mutations are included in adverse-risk
  cytogenetic/molecular group when co-occurring with FLT3-ITD (any allelic ratio)
  or when arising in context of complex karyotype.
  Isolated WT1 mutation: intermediate-risk per ELN 2022 (not independently adverse
  without co-occurring adverse features).
  Clinical impact:
  - Intermediate/adverse risk AML → consider allogeneic HSCT in CR1
  - WT1 RT-qPCR MRD tracking: rising WT1 transcripts pre-HSCT predict relapse
    (sensitivity ~75%, specificity ~80% for relapse prediction at 3 months post-CR)
  - CPX-351 (liposomal daunorubicin/cytarabine) for AML arising from MDS/t-AML:
    WT1 mutations common in this context; CPX-351 preferred over 7+3 (NEJM 2017)

related_biomarkers:
  - BIO-FLT3-MUTATION
  - BIO-NPM1-MUTATION
  - BIO-CEBPA
  - BIO-AML-TP53-ADVERSE
  - BIO-IDH1-R132H
  - BIO-IDH-MUTATION

external_ids:
  hugo_gene_id: "7490"

sources: [SRC-ELN-AML-2022, SRC-NCCN-AML-2025]

notes: >
  WT1 mutations occur in ~10-15% of AML but are most clinically impactful when
  co-occurring with other adverse features. The dual role of WT1 (somatic mutation
  as prognostic marker + WT1 transcript overexpression as MRD marker) is unique
  among AML molecular markers. Per ELN 2022, WT1 mutations alone in NPM1-mutant,
  FLT3-ITD-negative AML do not confer adverse risk. Key clinical decision: WT1
  mutation in AML with FLT3-ITD high allelic ratio → adverse risk → allogeneic HSCT
  in CR1 strongly recommended.

notes_ua: >
  Мутація WT1 зустрічається у ~10-15% ГМЛ. ELN 2022: несприятливий ризик при
  наявності WT1-мутації разом з FLT3-ITD або іншими несприятливими ознаками. Ізольована
  WT1-мутація — проміжний ризик. WT1 RT-qPCR використовується як пан-ГМЛ маркер МЗХ
  (навіть без соматичної мутації). Підвищення транскрипту WT1 перед ТГСК прогнозує рецидив.

