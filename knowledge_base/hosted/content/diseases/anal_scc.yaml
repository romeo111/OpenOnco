id: DIS-ANAL-SCC
names:
  preferred: "Squamous cell carcinoma of the anal canal"
  ukrainian: "Плоскоклітинний рак анального каналу"
  english: "Anal squamous cell carcinoma (Anal SCC)"
  synonyms:
    - "Anal carcinoma"
    - "Cancer of the anus"
    - "Squamous cell carcinoma of the anus"
    - "Anal canal SCC"
    - "SCCA"

codes:
  icd_10: "C21.0"
  icd_o_3_morphology: "8070/3"
  icd_o_3_topography:
    - "C21.0"
    - "C21.1"
    - "C21.2"
  oncotree_code: "ANSC"

archetype: stage_driven
lineage: "squamous"

epidemiology:
  incidence_us: "~9,000 new cases/year (USA)"
  sex_ratio: "Slightly more common in women (anal canal); perianal SCC slightly more common in men"
  peak_age: "55-65 years"
  hpv_association: "~90% HPV-positive; HPV16 predominates (~70%); HPV18 (~10%)"
  risk_factors:
    - "HPV infection (primary etiologic driver)"
    - "HIV+ / immunosuppression (20× higher risk)"
    - "Receptive anal intercourse"
    - "High-number sexual partners"
    - "History of cervical/vulvar/vaginal high-grade squamous intraepithelial lesion (HSIL)"
    - "Chronic immunosuppression (transplant recipients)"
    - "Cigarette smoking"

histological_subtypes:
  - subtype: "Squamous cell carcinoma (keratinizing and non-keratinizing)"
    frequency: "~90%"
    characteristics: "HPV-driven; responds well to chemoradiation; APR is salvage, NOT primary treatment"
  - subtype: "Adenocarcinoma"
    frequency: "~5-10%"
    characteristics: "Arises in anal glands or perianal skin; treated differently (more like rectal cancer); not covered by this disease entity"
  - subtype: "Melanoma of the anal canal"
    frequency: "<1%"
    characteristics: "Extremely rare; poor prognosis; managed like mucosal melanoma"

staging_system: "AJCC/TNM 8th edition"
staging_notes: >
  T stage based on tumor size: T1 ≤2 cm; T2 2-5 cm; T3 >5 cm; T4 invades adjacent organs.
  N stage: N0 no nodes; N1 inguinal/perirectal/internal iliac; N2 pelvic nodes.
  Most patients present with stage II-III (locally advanced) and can be cured with CRT.
  Stage IV (metastatic) is uncommon at presentation (~10-15%); metastatic sites: liver, lung, bone.

key_molecular_alterations:
  - "HPV oncoproteins E6/E7 — inactivate p53 and pRb; primary oncogenic drivers"
  - "PD-L1 expression — present in ~70-80% of anal SCC; predicts some immunotherapy response"
  - "EGFR overexpression — common (~70%) but anti-EGFR therapy not yet established as standard"
  - "PIK3CA mutations — ~20%"
  - "No KRAS/BRAF driver mutations (unlike colorectal)"

actionable_biomarkers:
  - "HPV testing (confirmation of SCC type, not treatment-modifying)"
  - "PD-L1 CPS (informative for immunotherapy response but retifanlimab approved regardless of PD-L1 in POD1UM-303)"

prognosis:
  stage_1_5y_os: "~80-90% (small T1N0 — local excision or CRT)"
  stage_2_3_5y_os: "~75-85% colostomy-free survival with CRT (ACT II)"
  stage_4_5y_os: "~20% (metastatic disease)"
  crt_complete_response: "~90% complete response at 26 weeks with standard CRT (ACT II)"

treatment_principles:
  - "Organ preservation via chemoradiation (Nigro/MMC+5FU+RT) is standard — NOT APR first"
  - "APR is reserved for CRT failure or residual disease confirmed by biopsy at 8-26 weeks"
  - "Stage IV: platinum-based chemotherapy ± PD-1 inhibitor"
  - "HIV+ patients: treat with same CRT; optimize antiretroviral therapy; may need dose adjustments"
  - "Biopsy to confirm residual disease before salvage surgery — early post-CRT biopsy has high false-positive rate"

notes: >
  Anal SCC is HPV-driven (90%) and highly curable in locally advanced stages (~75-85%)
  with organ-preserving chemoradiation. The Nigro protocol (mitomycin C + 5-FU + RT)
  is NCCN Category 1 — APR is NOT standard initial treatment. Response assessment
  at 8-11 weeks post-CRT; confirm residual disease by biopsy before salvage APR.
  HIV+ patients require same CRT with antiretroviral optimization.
  Screening: high-resolution anoscopy for HIV+ patients and MSM is recommended.
notes_ua: |
  Плоскоклітинний рак анального каналу є HPV-асоційованою пухлиною (90%) і
  при місцево-поширених стадіях добре виліковний (~75-85%) шляхом
  органозберігаючої хіміопроменевої терапії. Протокол Nigro (мітоміцин C
  (mitomycin) + 5-FU + RT) має категорію 1 за NCCN — абдоміноперинеальна
  резекція (APR) НЕ є стандартом первинного лікування. Оцінку відповіді
  виконують через 8-11 тижнів після хіміопроменевої терапії; залишкову
  хворобу необхідно підтверджувати біопсією перед сальвадж-APR.
  ВІЛ-позитивні пацієнти отримують ту саму хіміопроменеву терапію з
  оптимізацією антиретровірусної терапії. Скринінг: для ВІЛ-позитивних
  пацієнтів і MSM рекомендована анальна аноскопія високої роздільної
  здатності.

