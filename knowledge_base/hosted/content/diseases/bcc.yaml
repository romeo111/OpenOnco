id: DIS-BCC
names:
  preferred: "Basal cell carcinoma (BCC)"
  ukrainian: "Базально-клітинна карцинома (БКК)"
  english: "Basal cell carcinoma"
  synonyms: ["BCC", "basal cell skin cancer", "rodent ulcer", "basalioma"]

codes:
  icd_o_3_morphology: "8090/3"
  icd_o_3_topography: ["C44"]  # skin
  icd_10: "C44"
  who_classification: "WHO Classification of Skin Tumours 5th ed (2023): Basal cell carcinoma"

archetype: biomarker_driven
oncotree_code: BCC
lineage: "skin"

etiological_factors:
  - "UV radiation (cumulative sun exposure — most important modifiable risk factor)"
  - "PTCH1 germline loss-of-function mutation (Gorlin/Basal Cell Nevus Syndrome — multiple BCCs from youth)"
  - "SMO activating mutations (somatic; most sporadic BCCs have HH pathway activation)"
  - "Immunosuppression (organ transplant recipients — up to 10× increased risk)"
  - "Ionizing radiation exposure"
  - "Arsenic exposure (chronic)"
  - "Fair skin, light eyes, red/blonde hair (Fitzpatrick I-II)"

related_diseases: ["DIS-MELANOMA", "DIS-HNSCC"]

key_biomarkers:
  - BIO-SMO        # hedgehog pathway effector — vismodegib/sonidegib target
  - BIO-PTCH1      # hedgehog pathway suppressor — loss activates SMO

epidemiology:
  global_incidence: "Most common cancer in humans; ~3-4 million cases/year in the US alone"
  age_distribution: "Median ~65 years; Gorlin syndrome presents in 2nd-3rd decade"
  primary_site_distribution: "Head/neck ~80%, trunk ~15%, extremities ~5%"

sources:
  - SRC-NCCN-SKIN-2025
  - SRC-NCCN-MELANOMA-2025  # skin cancer section

last_reviewed: "2026-05-04"
reviewers: []

metadata:
  proposal_status: partial
  awaiting_proposal: "Surgery (standard) + Mohs micrographic surgery for high-risk + hedgehog inhibitor pathway for locally advanced/metastatic BCC"

notes: >
  The vast majority of BCCs are cured with surgery or radiation. Hedgehog inhibitors
  (vismodegib, sonidegib) are approved only for locally advanced unresectable or
  metastatic BCC — a small fraction of all BCCs. Gorlin syndrome (PTCH1 germline) warrants
  genetic counseling and lifelong surveillance. SMO inhibitors cause significant side effects
  (muscle cramps, alopecia, dysgeusia, weight loss) limiting long-term use. Cemiplimab
  (anti-PD-1) is FDA-approved for locally advanced/metastatic BCC after HHI failure.
notes_ua: >
  Переважна більшість БКК виліковуються хірургічно або опроміненням. Інгібітори Hedgehog
  (візомодегіб, сонідегіб) схвалені лише при місцево-поширеному нерезектабельному або
  метастатичному БКК. Синдром Горліна (PTCH1 зародкова мутація) потребує генетичного
  консультування. Цемипліумаб схвалено після прогресування на HHI.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
