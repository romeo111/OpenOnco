id: DIS-DMG-H3K27M
names:
  preferred: "H3K27M-mutant diffuse midline glioma (DMG)"
  ukrainian: "Дифузна серединна гліома з мутацією H3K27M"
  english: "Diffuse midline glioma, H3K27M-mutant"
  synonyms:
    - "H3K27M DMG"
    - "Diffuse intrinsic pontine glioma (DIPG)"
    - "H3.3K27M diffuse midline glioma"
    - "H3.1K27M diffuse midline glioma"
    - "WHO grade 4 diffuse midline glioma H3K27M"

codes:
  icd_o_3_morphology: "9385/3"
  icd_o_3_topography: ["C71", "C72", "C70"]
  icd_10: "C71.9"
  who_classification: "WHO CNS 5th ed (2021): Diffuse midline glioma, H3K27M-mutant, WHO grade 4 (9385/3)"

archetype: biomarker_driven
oncotree_code: DIFG

epidemiology: >
  Predominantly affects children and young adults (median age ~8-11 years for DIPG,
  but also occurs in adults). Incidence ~1-2 per million/year. Predilection for
  midline structures: pons (~75%), thalamus (~15%), spinal cord, cerebellum.
  H3K27M mutation (H3.3 HIST1H3B or H3.1 H3F3A) is the defining molecular alteration.
  Prognosis historically poor: median OS ~9-11 months. No prior systemic therapy
  approved until dordaviprone (2024).

staging: >
  No formal staging system. Disease characterization: location (pontine = DIPG vs.
  extra-pontine thalamic/spinal), H3K27M variant (H3.3 vs H3.1), ACVR1 co-mutation
  (associated with H3.1K27M; more common in DIPG), TP53 status, PDGFRA amplification.
  Dissemination at diagnosis (~10-15% leptomeningeal; worsens with recurrence).

standard_workup:
  - "MRI brain + spine with gadolinium (diagnostic and staging)"
  - "H3K27M IHC (antibody clone RM-2118; highly sensitive/specific) on biopsy tissue"
  - "Molecular confirmation: H3F3A or HIST1H3B Sanger or NGS sequencing"
  - "Comprehensive NGS panel: ACVR1, TP53, PDGFRA, EGFR, FGFR1, PPM1D, PIK3CA co-alterations"
  - "Biopsy: strongly recommended for thalamic DMG; historically avoided in DIPG (now recommended when feasible)"
  - "Ophthalmology: visual field testing for thalamic/optic pathway involvement"
  - "Neurology + neuro-oncology MDT required at diagnosis"

treatment_overview: >
  Standard of care: radiotherapy (RT) 54 Gy in 30 fractions (or hyperfractionated).
  Systemic: historically no approved agent. Dordaviprone (ONC201) FDA-approved April 2024
  for H3K27M-mutant diffuse glioma after prior RT (NCCN CNS 2025: Cat 2A).
  Bevacizumab has been used off-label without survival benefit.
  Clinical trial enrollment strongly recommended at all stages.

last_reviewed: "2026-05-04"
drafted_by: claude_extraction
sources:
  - SRC-NCCN-CNS-2025
notes: >
  Disease entity authored 2026-05-04 (Workstream EI) to support dordaviprone
  (ONC201) indication wiring. H3K27M DMG is distinct from IDH-wildtype GBM
  (DIS-GBM) and IDH-mutant low-grade glioma (DIS-GLIOMA-LOW-GRADE).
  Pending clinical signoff per CHARTER §6.1.
