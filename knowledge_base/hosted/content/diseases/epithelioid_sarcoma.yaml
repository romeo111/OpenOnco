notes: >
  Epithelioid sarcoma is defined by SMARCB1/INI1 loss and has historically poor prognosis
  in the proximal/aggressive variant. Tazemetostat (EZH2 inhibitor) is FDA-approved (2020)
  for metastatic or locally advanced epithelioid sarcoma not eligible for complete resection —
  the first and only FDA-approved targeted therapy. INI1 loss (detected by IHC) is the
  companion diagnostic. ORR ~15% in EZH-202 but durable responses seen. Note: tazemetostat
  is also approved for EZH2-mutant follicular lymphoma (different indication/biomarker).
  Distal-type has better prognosis than proximal-type; lymph node metastases are common (30%).
notes_ua: |
  Епітеліоїдна саркома визначається втратою SMARCB1/INI1 та історично
  має несприятливий прогноз при проксимальному/агресивному варіанті.
  Таземетостат (tazemetostat, інгібітор EZH2) схвалений FDA (2020) для
  метастатичної або місцево-поширеної епітеліоїдної саркоми, що не
  підлягає повній резекції — це перша і єдина схвалена FDA таргетна
  терапія. Втрата INI1 (за даними ІГХ) є супутнім діагностичним
  тестом. ORR у дослідженні EZH-202 становила ~15% з тривалими
  відповідями у респондерів. Слід зазначити, що таземетостат також
  схвалений для EZH2-мутантної фолікулярної лімфоми (інше показання та
  біомаркер). Дистальний підтип має кращий прогноз порівняно з
  проксимальним; метастази у лімфатичні вузли поширені (30%).
