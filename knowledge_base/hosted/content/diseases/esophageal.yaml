id: DIS-ESOPHAGEAL
names:
  preferred: "Esophageal carcinoma (squamous + adeno)"
  ukrainian: "Карцинома стравоходу (плоскоклітинна + аденокарцинома)"
  english: "Esophageal carcinoma"
  synonyms: ["Esophageal cancer", "Esophageal SCC + adenocarcinoma"]

codes:
  icd_o_3_morphology: "8070/3"  # Squamous; adeno (8140/3) tracked under findings
  icd_o_3_topography: ["C15"]
  icd_10: "C15"
  who_classification: "WHO Digestive System Tumours 5th ed: Esophageal squamous cell carcinoma + esophageal adenocarcinoma"

archetype: stage_driven
oncotree_code: ESCA
lineage: "carcinoma"

etiological_factors:
  - "Squamous: smoking, alcohol, hot beverages, lye-injury history, achalasia, low SES diet"
  - "Adeno: GERD chronic, Barrett's esophagus, obesity, smoking"
  - "Plummer-Vinson syndrome (squamous)"
  - "Tylosis (rare familial squamous)"

related_diseases:
  - "DIS-GASTRIC (GEJ adeno overlaps Siewert classification)"

epidemiology:
  global_incidence: "~600K new cases/yr; 10th cancer worldwide; 6th cancer death"
  histology_distribution: "~85% squamous globally (Asia/Africa); ~70% adeno in Western populations (Barrett-driven)"
  ukraine_incidence: "Squamous predominant; high alcohol cofactor"
  her2_positive_rate: "~15-20% of adeno (TOGA-style scoring)"
  pdl1_cps10_rate: "~50% of squamous (KEYNOTE-590 stratified)"

sources:
  - SRC-NCCN-ESOPHAGEAL-2025
  - SRC-ESMO-ESOPHAGEAL-2024

last_reviewed: "2026-04-26"
reviewers: []

metadata:
  proposal_status: full
  # §17 Surgery entity references (added 2026-05-08, chunk
  # gi2-c4-mie-ramie-selection). Three valid esophagectomy techniques
  # with equivalent oncologic outcomes per TIME (open vs MIE) and ROBOT
  # (open vs RAMIE) RCTs; technique selection by surgeon expertise +
  # patient factors. Disease has no canonical `procedure_options` field
  # in v0.1; this lives under metadata per `extra='allow'` and CLAUDE.md
  # "do not invent fields" guidance, mirroring the gastric.yaml
  # precedent set by chunk gi2-c1-flot-periop-gastric.
  # Intended consumers: render layer (procedure-context surfacing),
  # MDT note builder, future technique-selection algorithm extensions.
  procedure_options:
    - surgery_id: SUR-ESOPHAGECTOMY-OPEN
      role: "Curative resection — historical reference operation (Ivor-Lewis or McKeown); valid where surgeon expertise favours it or extensive local invasion requires open exposure"
      sources:
        - SRC-TIME-BIERE-2012
        - SRC-ROBOT-VAN-DER-SLUIS-2019
        - SRC-NCCN-ESOPHAGEAL-2025
        - SRC-ESMO-ESOPHAGEAL-2024
    - surgery_id: SUR-ESOPHAGECTOMY-MIE
      role: "Curative resection — minimally invasive (thoracoscopic + laparoscopic); reduced pulmonary morbidity vs open per TIME RCT (Biere 2012); equivalent oncologic outcomes; preferred where MIE expertise is established"
      sources:
        - SRC-TIME-BIERE-2012
        - SRC-NCCN-ESOPHAGEAL-2025
        - SRC-ESMO-ESOPHAGEAL-2024
    - surgery_id: SUR-ESOPHAGECTOMY-RAMIE
      role: "Curative resection — robot-assisted minimally invasive; reduced surgery-related + cardiopulmonary complications and improved QoL vs open per ROBOT RCT (van der Sluis 2019); equivalent oncologic outcomes; preferred where robotic-surgery programs are established"
      sources:
        - SRC-ROBOT-VAN-DER-SLUIS-2019
        - SRC-NCCN-ESOPHAGEAL-2025
        - SRC-ESMO-ESOPHAGEAL-2024

notes: >
  Scaffolded for Phase GI-1: 1 RF (high-grade dysphagia / aspiration —
  most common acute presentation), 1 indication (CROSS-style scaffold
  noting RT not modellable), 1 algorithm. Full histology-stratified
  algorithm (squamous: definitive CRT for unresectable, CROSS for
  resectable; adeno: FLOT preferred for resectable, CROSS alternative)
  + adjuvant nivolumab post-CROSS without pCR + metastatic biomarker-
  stratified ICI/chemo combos await ratification + clinical authoring.

  Histology branching is critical — squamous and adeno have largely
  parallel but partially divergent paradigms. Per-prompt allowance:
  one disease YAML covers both, with histology field on Indication
  applicability.
notes_ua: >
  Scaffolded for Phase GI-1: 1 RF (високого ступеня dysphagia / aspiration — найбільш поширений acute presentation), 1 показання (CROSS-style scaffold noting RT not modellable), 1 algorithm. Full гістологія-stratified algorithm (squamous: definitive CRT for нерезектабельний, CROSS for резектабельний; adeno: FLOT переважний for резектабельний, CROSS alternative) + ад'ювантний ніволумаб post-CROSS without pCR + метастатичний біомаркер- stratified ICI/chemo combos await ratification + clinical authoring.

  гістологія branching is critical — squamous and adeno have largely parallel but partially divergent paradigms. Per-prompt allowance: one хвороба YAML covers both, with гістологія field on показання applicability.
