notes: >
  Scaffolded for batch #2: 4 RFs (intracranial-pressure emergency,
  MGMT-actionability, frailty/age — elderly Stupp-modified, biopsy-only
  vs maximal-safe-resection MDT-trigger). 1 regimen (TMZ Stupp
  concurrent + adjuvant). 2 indications (Stupp full for fit; TMZ-only
  for elderly unmethylated unfit). 1 algorithm.

  Lineage value `carcinoma` is suboptimal — neuroepithelial would be
  more accurate. Schema's lineage field is free-text Optional; using
  `carcinoma` for now to match other solid-tumor entries; clinical
  authors may want to add `glioma` / `neuroepithelial` enum value
  in future.

  RT 60 Gy / 30 fractions concurrent with TMZ 75 mg/m²/d daily during
  RT is the canonical Stupp concurrent phase. RT NOT modellable per
  PROPOSAL §17 — treated as free-text in Indication.notes for now.
notes_ua: |
  Скафолд для партії #2: 4 червоні прапори (невідкладна
  внутрішньочерепна гіпертензія, актиабельність MGMT, похилий вік /
  стареча астенія — модифікований Stupp у літніх пацієнтів, рішення
  про "лише біопсія" vs максимально безпечна резекція як тригер
  обговорення в MDT). Один режим (TMZ Stupp — одночасний + ад'ювантний).
  Два показання (повна схема Stupp для придатних пацієнтів; лише TMZ —
  для літніх непридатних пацієнтів без метилування MGMT). Один
  алгоритм.

  Значення поля lineage `carcinoma` є субоптимальним — точнішим був би
  `neuroepithelial`. Поле lineage у схемі — вільний текст
  (опціональне); наразі використано `carcinoma` задля узгодженості з
  іншими записами солідних пухлин; у майбутньому клінічні автори
  можуть додати енумеративне значення `glioma` / `neuroepithelial`.

  Канонічна одночасна фаза Stupp складається з променевої терапії
  60 Gy / 30 фракцій одночасно з прийомом TMZ у дозі 75 mg/m²/d
  щодня під час курсу. Променева терапія НЕ моделюється згідно
  PROPOSAL §17 — наразі описана як вільний текст у Indication notes.
