notes: >
  Adult GCT is defined molecularly by the FOXL2 p.C134W mutation (present in ~97% of cases),
  which is the only pathognomonic molecular alteration in any solid tumor. FOXL2 is a
  granulosa cell transcription factor; the C134W mutation is a dominant-negative gain-of-function
  that prevents normal granulosa cell differentiation. Clinically, tumors present with
  estrogen excess (abnormal uterine bleeding, endometrial pathology) or abdominal mass.
  Prognosis is generally favorable for stage I (90% 10-yr OS) but late recurrences (10–20 years)
  are characteristic. No FDA-approved targeted therapy as of 2026; FOXL2 inhibition and
  CDK4/6 inhibitors are in clinical trials. FOXL2 mutation testing is diagnostic, not
  therapeutic selection (ESCAT IIB — clinical utility as diagnostic/prognostic marker).
notes_ua: |
  Доросла гранульозоклітинна пухлина (GCT) визначається молекулярно
  через соматичну мутацію FOXL2 p.C134W (наявна у ~97% випадків), що є
  єдиною патогномонічною молекулярною альтерацією серед усіх солідних
  пухлин. FOXL2 — транскрипційний фактор гранульозних клітин; мутація
  C134W має домінант-негативний gain-of-function ефект, що порушує
  нормальну диференціацію гранульозних клітин. Клінічно пухлина
  маніфестує синдромом надлишку естрогену (аномальні маткові
  кровотечі, патологія ендометрія) або пухлинним утвором у черевній
  порожнині. Прогноз загалом сприятливий при стадії I (10-річна
  загальна виживаність 90%), однак характерні пізні рецидиви через
  10–20 років. Станом на 2026 рік схваленої FDA таргетної терапії
  немає; інгібітори FOXL2 та CDK4/6-інгібітори перебувають у
  клінічних дослідженнях. Тестування мутації FOXL2 має діагностичну,
  а не терапевтично-селекційну роль (ESCAT IIB — клінічна
  корисність як діагностичного/прогностичного маркера).
