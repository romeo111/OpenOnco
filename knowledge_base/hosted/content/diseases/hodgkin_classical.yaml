epidemiology: {context: "~95% of Hodgkin lymphoma. Bimodal age distribution (~25 + ~65). Highly curable: ~80% 5y OS overall; >90% early-stage."}
sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Stage-driven 1L: early (I-II) → ABVD × 2-4 + ISRT (response-adapted
  per interim PET-CT Deauville score); advanced (III-IV) → ABVD × 6
  OR A+AVD × 6 (ECHELON-1 — brentuximab replaces bleomycin, OS benefit).
  escBEACOPP for high-risk advanced (more European preference).

  Differential — mediastinal/hilar adenopathy: sarcoidosis (D86.0–D86.2)
  mimics cHL on CT and PET/CT (bilateral hilar uptake, mediastinal and
  subcarinal nodes). Discriminators: histology (Reed-Sternberg CD15+/CD30+
  absent in sarcoid; non-caseating granuloma present), serum ACE, calcium,
  ophthalmology exam. Biopsy mandatory before chemotherapy; steroids before
  biopsy mask sarcoid granulomata and confound cHL histopathology.
notes_ua: >
  Stage-driven 1L: early (I-II) → ABVD × 2-4 + ISRT (відповідь-adapted per interim PET-CT Deauville score); поширений (III-IV) → ABVD × 6 OR A+AVD × 6 (ECHELON-1 — brentuximab replaces bleomycin, OS виграш). escBEACOPP for високого ризику поширений (more European preference).

  Диференційна діагностика — медіастинальна/прикоренева аденопатія:
  саркоїдоз (D86.0–D86.2) імітує кЛХ на КТ та ПЕТ/КТ (білатеральне
  прикореневе захоплення, медіастинальні та субкаринальні вузли).
  Дискримінатори: гістологія (клітини Ріда-Штернберга CD15+/CD30+
  відсутні при саркоїдозі; наявна некасеозна гранульома), АПФ, Ca2+,
  огляд офтальмолога. Біопсія обов'язкова перед ХТ; стероїди до біопсії
  маскують гранульоми саркоїдозу та ускладнюють гістологічний діагноз.
