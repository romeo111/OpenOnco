id: DIS-HSTCL
names:
  preferred: "Hepatosplenic T-Cell Lymphoma"
  ukrainian: "Гепатоспленічна T-клітинна лімфома"
  english: "Hepatosplenic T-Cell Lymphoma"
  synonyms: ["HSTCL", "γδ T-cell lymphoma hepatosplenic type"]

codes:
  icd_o_3_morphology: "9716/3"
  icd_10: "C84.7"
  who_classification: "Mature T-cell and NK-cell neoplasms — Hepatosplenic T-cell lymphoma per WHO 5th ed."

archetype: biomarker_driven
oncotree_code: HSTCL
lineage: t_cell_lymphoma

etiological_factors:
  - "γδ TCR phenotype у ~80% (αβ rare variant)"
  - "Isochromosome 7q (i(7q)) — defining cytogenetic"
  - "Trisomy 8 second most common"
  - "Iatrogenic: long-term immunosuppression (anti-TNF + thiopurines у IBD)"

related_diseases:
  - DIS-PTCL-NOS
  - DIS-CUTANEOUS-GAMMA-DELTA  # related γδ TCR entity, different site

epidemiology:
  context: >
    Дуже rare — <1% NHL. Median age 30-40, M:F ~2:1. Часто iatrogenic
    у young IBD patients (long-term azathioprine + infliximab). Aggressive
    клінічно — hepatosplenomegaly, cytopenias, B-symptoms; LN involvement
    rare. Median OS historically 1-2 роки. Cure лише з allo-SCT
    consolidation у CR1; chemo-only — virtually 0% long-term OS.

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  STUB. Bone marrow + spleen biopsy diagnostic; LN biopsy often negative.
  γδ TCR + i(7q) — defining. Refractory до CHOP-style; ICE / IVAC або
  HD-ара-С / platinum-based induction. Allo-SCT від matched donor —
  єдиний curative option.
notes_ua: |
  STUB. Діагностичну роль виконують біопсія кісткового мозку та селезінки;
  лімфовузлова біопсія часто негативна. Дефінітивні ознаки —
  γδ-TCR-фенотип та ізохромосома i(7q). Захворювання рефрактерне до
  схем CHOP-типу; як індукційні режими використовують ICE / IVAC або
  високодозний цитарабін (HD-ара-С) у поєднанні з платиновмісною
  терапією. Алогенна трансплантація гемопоетичних клітин від
  HLA-сумісного донора — єдиний курабельний варіант.
ukrainian_review_status: pending_clinical_signoff
