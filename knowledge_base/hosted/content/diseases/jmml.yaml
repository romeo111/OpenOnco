notes: >
  JMML is a rare pediatric overlap myeloid neoplasm with myelodysplastic and
  myeloproliferative features. Allogeneic HCT is the only curative treatment (5-yr EFS
  ~50%). The RAS/MAPK pathway is activated in ~90% of cases; PTPN11 mutations (SHP2
  gain-of-function) are the most common driver. SHP2 inhibitors (RMC-4630, TNO155,
  SHP099, ERAS-601) are in phase I/II trials, including pediatric expansion cohorts.
  Important: germline PTPN11 (Noonan syndrome) is associated with a usually self-limiting
  myeloproliferative process that may not require HCT — distinguishing somatic vs germline
  PTPN11 is clinically critical. Somatic PTPN11 mutations confer worse prognosis.
  Azacitidine is used as bridge to HCT. Post-HCT relapse treated with second transplant
  or investigational agents.
notes_ua: >
  ЮММЛ — рідкісна педіатрична мієлоїдна неоплазма. Аллогенна ТКМ — єдиний куративний
  метод (5-річний EFS ~50%). Мутації RAS/MAPK у ~90% випадків; PTPN11 — найчастіший
  драйвер. SHP2-інгібітори (RMC-4630, TNO155) у фазі I/II. Критично: розрізнити
  соматичну vs зародкову мутацію PTPN11 (синдром Нунан — може мати сприятливий перебіг).
