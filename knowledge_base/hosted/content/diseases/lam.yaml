id: DIS-LAM
names:
  preferred: "Lymphangioleiomyomatosis (LAM)"
  ukrainian: "Лімфангіолейоміоматоз (ЛАМ)"
  english: "Lymphangioleiomyomatosis"
  synonyms: ["LAM", "pulmonary LAM", "tuberous sclerosis-associated LAM", "sporadic LAM"]

codes:
  icd_o_3_morphology: "8894/1"  # angiomyolipoma-related smooth muscle proliferation (borderline)
  icd_o_3_topography: ["C34"]   # lung
  icd_10: "J84.81"
  who_classification: "WHO Classification of Thoracic Tumours 5th ed (2021): Lymphangioleiomyomatosis (PEComa family)"

archetype: biomarker_driven
oncotree_code: LAM
lineage: "rare_lung"

etiological_factors:
  - "Sporadic LAM: somatic TSC2 (rarely TSC1) mutations in LAM cells (~90% sporadic)"
  - "TSC-associated LAM: germline TSC1 or TSC2 mutation (Tuberous Sclerosis Complex); LAM occurs in ~30–40% of TSC females"
  - "Exclusively (or nearly exclusively) affects females; estrogen-sensitive"
  - "Lung destruction by mTORC1-hyperactive smooth-muscle-like LAM cells infiltrating lung parenchyma"

related_diseases: []

key_biomarkers:
  - BIO-TSC1  # mTORC1 pathway; TSC1 or TSC2 loss → mTOR hyperactivation → sirolimus/everolimus target

epidemiology:
  global_incidence: "~3–8 per million women; sporadic LAM exclusively female; TSC-associated LAM predominantly female"
  age_distribution: "Sporadic: typically 20–50 years (reproductive age); TSC-associated: variable"
  primary_site_distribution: "Bilateral diffuse cystic lung disease; extra-pulmonary: retroperitoneal lymphangioleiomyomas, angiomyolipomas (kidney)"

sources:
  - SRC-MILES-MCCORMACK-2011
  - SRC-NCCN-SARCOMA  # no dedicated NCCN LAM guideline; ERS/ATS guidelines primary

last_reviewed: "2026-05-04"
reviewers: []

metadata:
  proposal_status: partial
  awaiting_proposal: "Sirolimus (mTOR inhibitor) for progressive LAM per MILES trial; lung transplant for advanced disease"

notes: >
  LAM is a rare, progressive cystic lung disease caused by TSC1/TSC2 loss-of-function
  and consequent mTORC1 hyperactivation. Sirolimus (rapamycin) is FDA/EMA-approved for
  LAM (MILES trial, 2011: improved FEV1 trajectory, reduced VEGF-D). Everolimus is used
  for TSC-related manifestations including SEGA and renal AML. Disease is estrogen-sensitive:
  exacerbations during pregnancy, use of hormonal contraceptives discouraged. Diagnosis:
  high-resolution CT (diffuse bilateral thin-walled cysts) ± serum VEGF-D ≥800 pg/mL
  (diagnostic without biopsy in right clinical context). LAM Foundation guidelines
  (NHLBI/ERS) primary reference; NCCN does not cover LAM.
notes_ua: |
  LAM — рідкісне прогресуюче кістозне захворювання легень, зумовлене
  втратою функції TSC1/TSC2 та подальшою гіперактивацією mTORC1.
  Сиролімус (sirolimus, рапаміцин) схвалений FDA/EMA для LAM
  (дослідження MILES, 2011: покращення динаміки FEV1, зниження
  VEGF-D). Еверолімус (everolimus) застосовується при супутніх
  проявах TSC, включно з SEGA та нирковим ангіоміоліпомою (AML).
  Захворювання є естроген-чутливим: загострення під час вагітності,
  застосування гормональних контрацептивів не рекомендоване.
  Діагностика: КТ високої роздільної здатності (дифузні білатеральні
  тонкостінні кісти) ± сироватковий VEGF-D ≥800 pg/mL (діагностично
  у правильному клінічному контексті без потреби в біопсії).
  Першоджерелом є настанови LAM Foundation (NHLBI/ERS); NCCN не
  охоплює LAM.
