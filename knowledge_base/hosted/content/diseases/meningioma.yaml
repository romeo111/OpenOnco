id: DIS-MENINGIOMA
names:
  preferred: "Meningioma"
  ukrainian: "Менінгіома"
  english: "Meningioma"
  synonyms: ["intracranial meningioma", "spinal meningioma", "WHO grade I/II/III meningioma", "atypical meningioma", "anaplastic meningioma"]

codes:
  icd_o_3_morphology: "9530/0"  # meningioma NOS (grade I); 9530/1 atypical (grade II); 9530/3 anaplastic (grade III)
  icd_o_3_topography: ["C70"]   # meninges
  icd_10: "D32"                 # benign; C70 for malignant/grade III
  who_classification: "WHO Classification of Tumours of the CNS 5th ed (2021): Meningioma (grades 1–3)"

archetype: biomarker_driven
oncotree_code: MNG
lineage: "cns"

etiological_factors:
  - "NF2 biallelic loss (Neurofibromatosis type 2 gene) — most common driver in sporadic meningioma (~50%)"
  - "Non-NF2 sporadic mutations: TRAF7, KLF4 (secretory subtype), AKT1 E17K (WHO grade I, ~10%), SMO (meningothelial, convexity), PIK3CA (WHO grade I)"
  - "Neurofibromatosis type 2 (NF2 germline) — multiple meningiomas, bilateral vestibular schwannomas"
  - "Prior cranial radiation (latency 10–20 years)"
  - "Female sex / hormonal factors (2:1 female predominance; progesterone receptor positive ~70%)"

related_diseases: []

key_biomarkers:
  - BIO-NF2    # most common driver; also diagnostic for NF2 syndrome when germline

epidemiology:
  global_incidence: "~8 per 100,000 per year; most common primary intracranial tumor (~37% of CNS tumors)"
  age_distribution: "Peak 45–70 years; NF2-related: 2nd–4th decade"
  primary_site_distribution: "Convexity (~35%), parasagittal/falx (~25%), sphenoid wing (~20%), posterior fossa (~10%), spinal cord (~10%)"

sources:
  - SRC-EANO-MENINGIOMA-2024
  - SRC-NCCN-CNS-2025

last_reviewed: "2026-05-04"
reviewers: []

metadata:
  proposal_status: partial
  awaiting_proposal: "Surgery (gross total resection if accessible) ± radiation (SRS/FSRT for residual or recurrent); systemic therapy for grade III/recurrent"

notes: >
  Most meningiomas are WHO grade I (benign) and cured by gross total resection. Grade II
  (atypical) and grade III (anaplastic) have high recurrence rates and limited systemic
  options. NF2 loss is the most common molecular event; NF2-associated meningiomas often
  harbor co-occurring SMARCB1/SMARCA4 alterations in aggressive subtypes.
  Targeted therapy: AKT1-mutant meningioma → AKT inhibitors (capivasertib, ipatasertib) in
  phase II trials. SMO-mutant meningioma → vismodegib (case series). Selumetinib for
  NF2-associated plexiform neurofibroma has shown activity (FDA-approved in NF1 pediatric
  context) but NF2-meningioma selumetinib data is limited.
  Hormonal agents (progesterone receptor antagonists) not proven effective in trials.
  Bevacizumab used off-label for recurrent/progressive grade II-III based on small trials.
notes_ua: |
  Більшість менінгіом є WHO grade I (доброякісні) та виліковуються
  тотальною хірургічною резекцією. Grade II (атипові) та grade III
  (анапластичні) характеризуються високою частотою рецидивів та
  обмеженими системними опціями. Найчастішою молекулярною подією є
  втрата NF2; при NF2-асоційованих менінгіомах в агресивних підтипах
  часто співіснують альтерації SMARCB1/SMARCA4.
  Таргетна терапія: AKT1-мутантні менінгіоми — AKT-інгібітори
  (капівасертіб (capivasertib), іпатасертіб (ipatasertib)) у
  дослідженнях фаза 2. SMO-мутантні — вісмодегіб (vismodegib;
  серії випадків). Селуметиніб (selumetinib) для NF2-асоційованих
  плексиформних нейрофібром продемонстрував активність (схвалений
  FDA у педіатричному контексті NF1), однак дані щодо
  NF2-менінгіом обмежені.
  Гормональні засоби (антагоністи прогестеронового рецептора) не
  довели ефективності в дослідженнях. Бевацизумаб (bevacizumab)
  застосовується off-label при рецидивних / прогресуючих менінгіомах
  grade II-III на підставі невеликих досліджень.
