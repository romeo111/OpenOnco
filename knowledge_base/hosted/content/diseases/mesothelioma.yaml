id: DIS-MESOTHELIOMA
names:
  preferred: "Malignant pleural mesothelioma (MPM)"
  ukrainian: "Злоякісна мезотеліома плеври"
  english: "Malignant mesothelioma"
  synonyms:
    - "Malignant pleural mesothelioma (MPM)"
    - "Peritoneal mesothelioma"
    - "Mesothelioma NOS"

codes:
  icd_o_3_morphology: "9050/3"
  icd_o_3_topography: ["C38.4", "C48.1", "C48.2"]
  icd_10: "C45.0"
  who_classification: "WHO Thoracic Tumours 5th ed (2021): Mesothelioma"

archetype: stage_driven
oncotree_code: MESO
lineage: "mesothelial"

etiological_factors:
  - "Asbestos exposure (>80% of MPM cases; all fiber types — amphiboles highest risk)"
  - "Erionite exposure (rare; certain geographic regions)"
  - "Radiation therapy to thorax (prior mantle RT for lymphoma)"
  - "BAP1 germline mutation (~2% hereditary predisposition)"
  - "SV40 virus (controversial; not established causal)"

histological_subtypes:
  - subtype: "Epithelioid"
    frequency: "~60%"
    prognosis: "Best; mOS ~16-20 mo with systemic therapy"
  - subtype: "Sarcomatoid (including desmoplastic)"
    frequency: "~20%"
    prognosis: "Worst; mOS ~8-10 mo; dramatic benefit from ICI (CheckMate-743 HR 0.46 vs chemo)"
  - subtype: "Biphasic (mixed epithelioid + sarcomatoid)"
    frequency: "~20%"
    prognosis: "Intermediate; prognosis depends on sarcomatoid component proportion; ICI beneficial"

staging_system: "TNM 8th edition (AJCC); IMIG staging system also used for pleural MPM"

key_molecular_alterations:
  - "BAP1 loss/mutation (~60%; most common; tumor suppressor; associated with germline variant in hereditary MPM)"
  - "CDKN2A/p16 homozygous deletion (~70%; prognostic; seen more in non-epithelioid)"
  - "NF2 loss/mutation (~40%; Hippo pathway; no approved targeted therapy)"
  - "SETD2 mutation (~10%; epigenetic regulator)"
  - "No KRAS, EGFR, or common oncogenic driver mutations (unlike NSCLC)"

actionable_biomarkers: []

notes: >
  Malignant mesothelioma is predominantly a pleural cancer (MPM ~80% of cases);
  peritoneal mesothelioma (~20%) has different treatment (cytoreductive surgery +
  hyperthermic intraperitoneal chemotherapy [HIPEC] for peritoneal).
  This disease entity focuses on MPM. Historically extremely poor prognosis
  (mOS ~12 mo); CheckMate-743 (FDA 2020) with nivolumab+ipilimumab improved
  mOS to 18.1 mo — first new 1L approval in 15 years.
  BAP1 IHC loss is a diagnostic marker (not actionable therapeutically).
  PD-L1 expression is not validated as predictive for ICI benefit in MPM.

last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
