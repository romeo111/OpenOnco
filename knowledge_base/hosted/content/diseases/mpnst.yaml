metadata:
  proposal_status: partial
  awaiting_proposal: "Surgery (wide en-bloc resection — often morbid) + adjuvant RT + chemo for high-grade. Source gap: SRC-NCCN-SARCOMA / SRC-ESMO-SARCOMA / SRC-NF1-CONSORTIUM not yet ingested. NF1 itself lacks BIO entity."

notes: >
  Aggressive soft-tissue sarcoma arising from peripheral nerve sheath
  Schwann cells. Most surgically treatable when diagnosed early; once
  metastatic, systemic options are limited.

  Standard treatment:
  - Localized: wide en-bloc surgical resection ± adjuvant RT.
    Chemotherapy (doxorubicin + ifosfamide) for high-grade per soft-
    tissue sarcoma protocols; benefit modest.
  - Metastatic: doxorubicin ± ifosfamide (1L); pazopanib (PALETTE);
    trabectedin / eribulin in later lines.

  Targeted-therapy investigational signals (no FDA approval to date for
  MPNST specifically):
  - MEK inhibitors (selumetinib, mirdametinib): rationale from
    NF1 → loss of neurofibromin → unrestrained RAS → MAPK; trials
    ongoing in NF1-related MPNST. Selumetinib is FDA-approved for
    NF1-associated symptomatic inoperable plexiform NEUROFIBROMA
    (SPRINT trial) — the pre-malignant precursor — but not yet for
    MPNST proper.
  - SHP2 inhibitors: investigational.
  - CDK4/6 inhibitors (CDKN2A loss → synthetic-lethality hypothesis):
    investigational.
  - Mirdametinib + selumetinib + similar agents being studied in NF1
    consortia for atypical neurofibroma → MPNST transition.

  Surveillance: NF1 patients with rapidly enlarging or painful
  neurofibroma → urgent imaging + biopsy; FDG-PET useful (high SUV
  predicts MPNST transformation).
notes_ua: |
  Агресивна саркома м'яких тканин, що розвивається з шваннівських
  клітин оболонки периферичного нерва. При ранньому виявленні
  переважно хірургічно піддатна; при метастатичному поширенні
  системні опції обмежені.

  Стандартне лікування:
  - Локалізована форма: широка en-bloc хірургічна резекція ±
    ад'ювантна променева терапія. Хіміотерапія (доксорубіцин
    (doxorubicin) + іфосфамід (ifosfamide)) для пухлин високого ступеня
    — за протоколами для саркоми м'яких тканин;
    виграш помірний.
  - Метастатична форма: доксорубіцин ± іфосфамід у першій лінії;
    пазопаніб (pazopanib) (PALETTE); трабектедин / еребулін у
    подальших лініях.

  Експериментальні сигнали таргетної терапії (схвалення FDA для
  MPNST на сьогодні відсутні):
  - Інгібітори MEK (селуметиніб (selumetinib), мірдаметиніб
    (mirdametinib)): обґрунтування — NF1 → втрата нейрофіброміну →
    нестримна активація RAS → MAPK; тривають дослідження при
    NF1-асоційованій MPNST. Селуметиніб схвалений FDA для
    NF1-асоційованої симптомної неоперабельної плексиформної
    НЕЙРОФІБРОМИ (SPRINT) — премалігнатного попередника, але не
    для самої MPNST.
  - Інгібітори SHP2: експериментальні.
  - Інгібітори CDK4/6 (на гіпотезі synthetic-lethality при втраті
    CDKN2A): експериментальні.
  - Мірдаметиніб, селуметиніб та подібні агенти вивчаються у
    NF1-консорціумах для трансформації атипової нейрофіброми у MPNST.

  Динамічне спостереження: у пацієнтів з NF1 при швидкому збільшенні
  або больовому синдромі нейрофіброми — невідкладна візуалізація з
  біопсією; інформативним є FDG-PET (висока SUV прогнозує
  трансформацію в MPNST).
