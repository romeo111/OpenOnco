  - SRC-NCCN-CNS-2025  # NCCN-THYROID not yet ingested — placeholder; flag for replacement

last_reviewed: "2026-04-27"
reviewers: []

metadata:
  proposal_status: partial
  awaiting_proposal: "Total thyroidectomy + central neck dissection + lymph node mapping + lifelong calcitonin / CEA monitoring — depends on KNOWLEDGE_SCHEMA_SPECIFICATION.md §17 solid-tumor extension. Source gap: SRC-NCCN-THYROID-2025 and SRC-ATA-THYROID-2015 not yet ingested."

notes: >
  Parafollicular C-cell origin — secretes calcitonin (diagnostic +
  monitoring biomarker) and CEA (parallel monitoring). RAI is NOT
  effective (C-cells do not concentrate iodide).

  Germline RET testing is mandatory at diagnosis — drives:
  - Prophylactic thyroidectomy timing in kindred (MEN2B: <1 yr; MEN2A
    C634: <5 yr per ATA risk classification).
  - Pheochromocytoma screening (plasma metanephrines / urinary catechols
    annually) — RET drives both MTC and adrenal medullary tumors.
  - Hyperparathyroidism screening in MEN2A.

  Therapy:
  - Localized: total thyroidectomy + central compartment LN dissection.
  - Advanced / unresectable (calcitonin doubling time <1 yr or
    structural progression): selpercatinib (LIBRETTO-001 / -531) or
    pralsetinib (ARROW) for RET-mutant MTC — superior to multikinase
    TKIs (vandetanib ZETA / cabozantinib EXAM remain alternatives,
    significant toxicity).
  - RET-WT (RAS-mutant or other): no targeted option; cabozantinib /
    vandetanib by default.

  Calcitonin doubling time <6 months portends very poor survival;
  <2 yr drives systemic-therapy decisions even without RECIST progression.
notes_ua: |
  Походить з парафолікулярних C-клітин — секретує кальцитонін
  (діагностичний та моніторинговий біомаркер) та CEA (паралельний
  маркер моніторингу). Радіойодтерапія НЕ ефективна (C-клітини не
  накопичують йодид).

  Тестування герміногенної мутації RET є обов'язковим при встановленні
  діагнозу та визначає:
  - Час профілактичної тиреоїдектомії у родичів (MEN2B: <1 рік;
    MEN2A з мутацією C634: <5 рік за класифікацією ризику ATA).
  - Скринінг феохромоцитоми (плазмові метанефрини / сечові
    катехоламіни щорічно) — RET зумовлює як MTC, так і пухлини
    мозкової речовини надниркових залоз.
  - Скринінг гіперпаратиреозу при MEN2A.

  Терапія:
  - Локалізована форма: тотальна тиреоїдектомія з дисекцією
    центрального компартменту лімфовузлів.
  - Поширена / нерезектабельна форма (час подвоєння кальцитоніну
    <1 рік або структурне прогресування): селперкатиніб
    (selpercatinib) (LIBRETTO-001 / -531) або пралсетиніб
    (pralsetinib) (ARROW) для RET-мутантної MTC — перевершують
    мультикіназні TKI (вандетаніб ZETA та кабозантиніб (cabozantinib)
    EXAM залишаються альтернативами зі значною токсичністю).
  - RET-WT (RAS-мутантна або інша): таргетної опції немає; за
    замовчуванням використовують кабозантиніб або вандетаніб.

  Час подвоєння кальцитоніну <6 місяців є провісником вкрай поганої
  виживаності; <2 рік визначає рішення щодо системної терапії навіть
  за відсутності RECIST-прогресування.
