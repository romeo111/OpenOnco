notes: >
  Scaffolded for Phase GI-1: 1 RF (biliary obstruction / cholangitis —
  most common acute decompensation), 1 indication (1L metastatic
  FOLFIRINOX as the most-applicable scaffolded option), 1 algorithm.
  Resectable / borderline / locally advanced strata + adjuvant
  mFOLFIRINOX + olaparib BRCA-maintenance await proposal ratification +
  clinical authoring.

  Key biomarkers: germline BRCA1/2 + PALB2 (POLO trial — olaparib
  maintenance), MSI/dMMR (~1% rare but pembro-eligible), KRAS G12C
  (rare ~1-2% in PDAC, sotorasib emerging).
notes_ua: |
  Скафолд для Phase GI-1: один червоний прапор (біліарна обструкція /
  холангіт — найчастіша гостра декомпенсація), одне показання (FOLFIRINOX
  у першій лінії метастатичної терапії як найбільш застосовний
  скафолдний варіант), один алгоритм. Стратифікація для резектабельної /
  пограничної / місцево-поширеної форми, а також ад'ювантний mFOLFIRINOX
  з підтримкою олапарибом (olaparib) при BRCA — очікують ратифікації
  пропозиції та клінічного авторства.

  Ключові біомаркери: герміногенні BRCA1/2 + PALB2 (POLO — олапариб у
  підтримці), MSI/dMMR (~1% — рідкісний, але пацієнти підлягають
  пембролізумабу (pembrolizumab)), KRAS G12C (рідкісний — ~1-2% PDAC,
  ємний клас сотораcибу (sotorasib)).
