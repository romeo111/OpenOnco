metadata:
  proposal_status: partial
  awaiting_proposal: "Surgery (arthroscopic or open synovectomy) ± radiation for diffuse-type; pexidartinib for inoperable/severely symptomatic"

notes: >
  TGCT is classified as locally aggressive (diffuse-type) or benign (localized). Despite
  benign histology, diffuse-type TGCT (formerly PVNS) causes severe joint destruction,
  pain, and functional disability, with high surgical recurrence rates (25–50%).
  Pexidartinib (CSF1R inhibitor) is the only FDA-approved systemic therapy (2019,
  ILLUMINATE trial): ORR 38%, durable response in responders, but significant
  hepatotoxicity risk (REMS program; transaminase monitoring mandatory). Surgery remains
  the primary modality; pexidartinib is reserved for patients with severe morbidity not
  amenable to surgery improvement. Malignant TGCT (9252/3) is extremely rare.
notes_ua: >
  ТГКП класифікується як локально-агресивна (дифузний тип, колишній PVNS) або доброякісна
  (локалізований тип). Незважаючи на доброякісну гістологію, дифузний тип спричиняє значне
  руйнування суглоба та функціональні обмеження з високим рівнем рецидивів (25–50%).
  Пексидартиніб (CSF1R-інгібітор) — єдина схвалена FDA системна терапія (2019, ILLUMINATE):
  ORR 38%. Значний гепатотоксичний ризик (REMS). Хірургія залишається первинним методом.
