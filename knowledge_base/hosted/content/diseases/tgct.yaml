id: DIS-TGCT
names:
  preferred: "Tenosynovial giant cell tumor (TGCT)"
  ukrainian: "Теносиновіальна гігантоклітинна пухлина (ТГКП)"
  english: "Tenosynovial giant cell tumor"
  synonyms: ["TGCT", "PVNS", "pigmented villonodular synovitis", "giant cell tumor of tendon sheath", "GCTTS", "diffuse-type TGCT"]

