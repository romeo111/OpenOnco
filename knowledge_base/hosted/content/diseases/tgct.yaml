  icd_o_3_morphology: "9252/1"  # tenosynovial giant cell tumor, diffuse type (borderline); 9252/0 localized
  icd_o_3_topography: ["C49"]   # soft tissue
  icd_10: "M12.2"               # villonodular synovitis (pigmented)
