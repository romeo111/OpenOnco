metadata:
  proposal_status: partial
  awaiting_proposal: "Multimodal sequencing (rapid-turnaround BRAF testing + targeted induction + chemo-radiation) — depends on KNOWLEDGE_SCHEMA_SPECIFICATION.md §17. Source gap: SRC-NCCN-THYROID-2025 and SRC-ATA-ATC-2021 not yet ingested. Speed-of-workup is itself the clinical decision driver in ATC and may need a dedicated workflow primitive."

notes: >
  Among the most lethal solid tumors historically — IVC by AJCC at
  diagnosis (any T any N M0/M1 = stage IVA/B/C). Median OS without
  targeted therapy 3-6 months; rapid airway compromise common.

  Time-critical workup: BRAF V600E status drives first-line systemic
  therapy and must be available within days, not weeks. ATA 2021
  guideline mandates rapid IHC (VE1 antibody) + reflex sequencing.

  Therapy by genotype:
  - BRAF V600E mutant (~25–40%): dabrafenib + trametinib (ROAR basket
    trial — ORR ~56%, transformative); FDA approved 2018 for ATC.
    Often used as neoadjuvant induction → surgery → adjuvant chemoRT.
  - BRAF wild-type RAS / NTRK / RET targetable: selpercatinib /
    pralsetinib / larotrectinib / entrectinib per genotype.
  - BRAF/RAS/NTRK/RET wild-type: chemo-radiation (paclitaxel + RT or
    docetaxel + doxorubicin + RT); pembrolizumab if PD-L1+ or TMB-H.

  Tracheostomy decision is patient-/family-driven; some protocols
  defer to systemic-therapy response over upfront tracheostomy when
  BRAF-mutant.
notes_ua: |
  Історично — серед найбільш летальних солідних пухлин: за AJCC будь-яка
  ATC при встановленні діагнозу класифікується як IV стадія (будь-яке T,
  будь-яке N, M0/M1 = stage IVA/B/C). Медіана загальної виживаності
  без таргетної терапії — 3-6 months; характерна швидка компрометація
  дихальних шляхів.

  Часово-критичне обстеження: перша лінія системної терапії визначається
  статусом BRAF V600E, тому результат має бути доступним у межах днів,
  а не тижнів.
  Настанови ATA 2021 вимагають швидкого IHC (з антитілом VE1) з
  рефлекторним секвенуванням.

  Терапія за генотипом:
  - BRAF V600E мутантний (~25–40%): дабрафеніб (dabrafenib) +
    траметиніб (trametinib) (basket-дослідження ROAR — ORR ~56%,
    трансформаційний результат); схвалення FDA для ATC у 2018 році.
    Часто застосовують у неоад'ювантній індукції з подальшою
    хірургією та ад'ювантною хіміопроменевою терапією.
  - BRAF wild-type з таргетним RAS / NTRK / RET: селперкатиніб
    (selpercatinib) / пралсетиніб (pralsetinib) / ларотректиніб
    (larotrectinib) / ентректиніб (entrectinib) — за генотипом.
  - BRAF/RAS/NTRK/RET wild-type: хіміопроменева терапія (паклітаксел
    (paclitaxel) + променева терапія або доцетаксел (docetaxel) +
    доксорубіцин (doxorubicin) + променева терапія); пембролізумаб
    (pembrolizumab) при PD-L1+ або TMB-H.

  Рішення щодо трахеостомії визначається пацієнтом і родиною; у
  пацієнтів з BRAF-мутацією деякі протоколи відтерміновують
  трахеостомію на користь оцінки відповіді на системну терапію.
