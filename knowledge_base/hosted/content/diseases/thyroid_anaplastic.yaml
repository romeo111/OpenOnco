  - BIO-RAS-MUTATION  # ~25%
  - BIO-NTRK-FUSION  # rare (<5%)
  - BIO-RET  # rare (<5%)
  - BIO-TP53-MUTATION  # >70% — prognostic, drives dedifferentiation

