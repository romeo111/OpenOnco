  global_incidence: "<1-2% of thyroid cancers; ~500-1500 new cases/yr in US"
  age_distribution: "Median ~70 years (older than PTC)"
  median_os_historical: "3-5 months without targeted therapy"
  median_os_targeted: "~14-24 months for BRAF V600E + dabrafenib + trametinib (ROAR)"

