metadata:
  proposal_status: partial
  awaiting_proposal: "Total / hemi-thyroidectomy + radioiodine ablation phasing + TSH suppression — depends on KNOWLEDGE_SCHEMA_SPECIFICATION.md §17 solid-tumor extension. Source gap: SRC-NCCN-THYROID-2025 and SRC-ATA-THYROID-2015 not yet ingested. Differentiated thyroid cancer (PTC + FTC + oncocytic) currently scoped to PTC; FTC sub-entity may be added later."

notes: >
  Differentiated thyroid carcinoma — most indolent of common cancers.
  Standard care: surgery → risk-stratified RAI ablation → TSH
  suppression → calibrated thyroglobulin (Tg) monitoring.

  Radioiodine-refractory progressive disease is the trigger for
  systemic therapy:
  - Multikinase TKI 1L: lenvatinib (SELECT) or sorafenib (DECISION).
  - Targeted by genotype:
    * BRAF V600E (~50% PTC): dabrafenib + trametinib (MARCH/REINK
      compassionate-use; FDA tumor-agnostic 2022 BRAF V600E approval
      for solid tumors); single-agent dabrafenib also active.
    * RET fusion: selpercatinib (LIBRETTO-531; positive 2024) and
      pralsetinib (ARROW) — selpercatinib FDA-approved for RET-fusion+
      thyroid cancer.
    * NTRK fusion: larotrectinib / entrectinib (tumor-agnostic).
    * Re-differentiation strategies: short-course MAPK inhibitor
      (selumetinib / dabrafenib + trametinib) restoring RAI uptake —
      under study.

  Aggressive variants (tall cell, hobnail, columnar, diffuse sclerosing)
  upstage to higher recurrence-risk groups even when small.
notes_ua: |
  Диференційована карцинома щитовидної залози — найбільш індолентний з
  поширених видів раку. Стандартна тактика: хірургія → ризик-стратифікована
  абляція радіойодом (RAI) → супресія TSH → калібрований моніторинг
  тиреоглобуліну (Tg).

  Тригером для початку системної терапії є радіойод-рефрактерне
  прогресуюче захворювання:
  - Перша лінія мультикіназних TKI: ленватиніб (lenvatinib) (SELECT)
    або сорафеніб (sorafenib) (DECISION).
  - Таргетна терапія за генотипом:
    * BRAF V600E (~50% PTC): дабрафеніб (dabrafenib) + траметиніб
      (trametinib) (MARCH/REINK compassionate-use; туморагностичне
      схвалення FDA для BRAF V600E у солідних пухлинах у 2022);
      монотерапія дабрафенібом також активна.
    * Злиття RET: селперкатиніб (selpercatinib) (LIBRETTO-531;
      позитивні дані 2024) та пралсетиніб (pralsetinib) (ARROW) —
      селперкатиніб схвалений FDA для RET-fusion+ карциноми
      щитовидної залози.
    * Злиття NTRK: ларотректиніб (larotrectinib) / ентректиніб
      (entrectinib) (туморагностично).
    * Стратегії редиференціації: короткотривале призначення MAPK-
      інгібітора (селуметиніб (selumetinib) / дабрафеніб +
      траметиніб) для відновлення RAI-захоплення — у стадії
      вивчення.

  Агресивні варіанти (tall cell, hobnail, columnar, diffuse
  sclerosing) переводять пацієнта у вищі групи ризику рецидиву
  навіть при невеликих розмірах пухлини.
