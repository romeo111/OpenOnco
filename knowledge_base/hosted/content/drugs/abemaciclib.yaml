id: DRUG-ABEMACICLIB
names:
  preferred: "Abemaciclib"
  ukrainian: "Абемацикліб"
  english: "Abemaciclib"
  brand_names: ["Verzenio"]
atc_code: L01EF03
rxnorm_id:
drug_class: "CDK4/6 inhibitor (continuous dosing)"
mechanism: >
  More CDK4-selective than CDK6 — different cycle dosing (continuous, not 21+7) and AE profile (more diarrhea, less neutropenia). Established adjuvant role (monarchE) for high-risk HR+/HER2- early breast.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-27"
    notes: "Зареєстрований; НСЗУ покриває РМЗ HR+/HER2- метастатичний 1L/2L та адьювант monarchE-критеріями (≥4 LN+ або 1-3 LN+ з high-risk features). Джерело: nszu.gov.ua (2026-04)."

    reimbursement_indications:
    - 'Програма медичних гарантій 2026: РМЗ HR+/HER2- метастатичний 1L з AI (MONARCH-3)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: РМЗ HR+/HER2- метастатичний 2L з fulvestrant (MONARCH-2)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: РМЗ HR+/HER2- адьювант високого ризику з ET 2 роки (monarchE)'
typical_dosing: >
  Metastatic: 150 mg PO BID continuous + AI/fulvestrant. Monotherapy: 200 mg PO BID. Adjuvant: 150 mg PO BID + ET for 2 years.

key_toxicities:
- Diarrhea (~80% any grade, ~10% G3+) — CDK4/6i differentiating AE; loperamide standard supportive care
- Neutropenia (~40% G3+ — less than other CDK4/6i)
- Fatigue, nausea, abdominal pain
- Hepatotoxicity (modest)
- VTE / pulmonary embolism (modest excess)
- Renal function pseudo-decline (creatinine OAT-mediated; not true GFR change)

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed:
notes: >
  Adjuvant indication unique: monarchE established 2-year benefit for N+ HR+/HER2- ≥grade 3 OR ≥4 nodes. Continuous schedule + diarrhea-management distinguishes from palbociclib/ribociclib.

notes_ua: >
  Унікальність ад'ювантного показання: дослідження monarchE встановило перевагу
  2-річного курсу абемациклібу (abemaciclib) у пацієнток з HR+/HER2-негативним
  раннім РМЗ за наявності ≥4 уражених лімфатичних вузлів (N+) або 1-3 уражених
  вузлів зі стадією ≥grade 3 / іншими ознаками високого ризику. Безперервний
  режим прийому (continuous, без перерви 21+7) та профіль діареї як основного
  небажаного явища відрізняють абемацикліб від палбоциклібу та рибоциклібу.

ukrainian_review_status: pending_clinical_signoff
