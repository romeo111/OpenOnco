id: DRUG-ADAGRASIB
names:
  preferred: "Adagrasib"
  ukrainian: "Адаграсіб"
  english: "Adagrasib"
  brand_names: ["Krazati"]
atc_code: L01XX76
rxnorm_id: null
drug_class: "KRAS G12C inhibitor (CNS-penetrant)"
mechanism: >
  KRAS G12C-selective covalent inhibitor with greater CNS penetration than sotorasib. KRYSTAL-1: ORR ~43% in pretreated KRAS G12C+ NSCLC, intracranial response ~33%.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      KRAS-G12C інгібітор для KRAS-G12C+ NSCLC; не входить до пакетів НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP Bristol-Myers Squibb Ukraine (Krazati access program; обмежено
        для post-platinum + post-pembrolizumab пацієнтів з підтвердженою
        KRAS-G12C мутацією).
      - Cross-border (EU): EU онкоцентри через "Лікування за кордоном"
        (наказ МОЗ 988); KRAZATI EMA-затверджений 2024.
      - Trial-only: KRYSTAL-серія активна в EU.
      Source: drlz.com.ua пошук "adagrasib"/"krazati" 2026-04-27 — РП відсутнє.

typical_dosing: >
  600 mg PO BID.

key_toxicities:
  - Diarrhea, nausea, vomiting (high)
  - QT prolongation
  - Hepatotoxicity
  - Renal impairment

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed: null
notes: >
  Better CNS profile than sotorasib makes it preferred for brain-met-positive KRAS G12C+ disease.

notes_ua: >
  Кращий профіль проникнення в ЦНС, ніж у сотораcибу, робить адаграсіб
  (adagrasib) переважним вибором при KRAS G12C-позитивному захворюванні
  з ураженням головного мозку (brain-met-positive). За даними KRYSTAL-1
  інтракраніальна частота відповіді сягає ~33%.

ukrainian_review_status: pending_clinical_signoff
