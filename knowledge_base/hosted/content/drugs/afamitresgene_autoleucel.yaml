id: DRUG-AFAMI-CEL
name: "Afamitresgene autoleucel (afami-cel)"
name_ua: "Афамітресген аутолейцел"
brand_names: ["Tecelra"]
drug_class: "T-cell receptor (TCR) engineered T-cell therapy — MAGE-A4-specific"
atc_code: L01XL05
mechanism_of_action: >
  Autologous T cells genetically engineered to express a MAGE-A4c1032-specific T-cell
  receptor (TCR). The engineered TCR recognizes the MAGE-A4 peptide GVYDGREHTV presented
  by HLA-A*02:01 MHC class I molecules on tumor cell surfaces. MAGE-A4 (melanoma-associated
  antigen A4) is a cancer-testis antigen expressed in ~80% of synovial sarcomas but absent
  on normal adult tissues (testis exception, immune-privileged). Mechanism: HLA-A*02:01
  restriction → requires mandatory HLA typing. T cells infiltrate tumor, recognize MAGE-A4
  peptide/HLA complex, and mediate cytotoxic killing via perforin/granzyme. Unlike CAR-T,
  TCR therapy targets intracellular antigens via MHC presentation.
standard_doses:
  - indication: "Synovial sarcoma — ≥2L"
    dose: "Target infusion: 0.1–10 × 10^9 MAGE-A4c1032-specific cells/kg"
    schedule: "Single one-time IV infusion after lymphodepletion"
    notes: >
      REMS program required (TECELRA REMS). Manufacturing time ~6 weeks from leukapheresis.
      Lymphodepletion regimen: fludarabine 25 mg/m² IV days -5 to -1 + cyclophosphamide
      900 mg/m² IV days -5 to -3. Infusion 2-7 days after last lymphodepletion dose.
key_toxicities:
  - "CRS: ~58% any grade; Grade 3+: ~10%. Onset 1-8 days post-infusion"
  - "Prolonged cytopenias from lymphodepletion (neutropenia, thrombocytopenia, anemia): universal"
  - "Infections: bacteria, fungal, viral from lymphodepletion-induced immunosuppression"
  - "Engraftment syndrome (fever, rash, non-infectious infiltrates)"
  - "Hepatotoxicity: transaminase elevation"
eligibility_requirements:
  - "HLA-A*02:01 positive (validated HLA typing mandatory)"
  - "MAGE-A4 expression by IHC or RNA-seq (recommended but not FDA-mandated for label)"
  - "Adequate organ function and ECOG PS 0-1"
  - "Must be able to tolerate lymphodepletion chemotherapy"
contraindications:
  - "HLA-A*02:01 negative"
  - "Active CNS metastases (unless stable)"
  - "Active autoimmune disease requiring systemic immunosuppression"
  - "Active uncontrolled infection"
special_populations:
  - "Age ≥18 years (adult indication)"
  - "Pediatric: not studied; juvenile cases may be enrolled in expanded access"
monitoring:
  - "CRS: daily assessment for ≥7 days post-infusion; tocilizumab + corticosteroids available"
  - "CBC: daily during lymphodepletion; then per protocol frequency"
  - "LFTs: weekly × 4 weeks post-infusion"
  - "G-CSF/growth factor support for prolonged neutropenia"
  - "PCP/antifungal/antiviral prophylaxis during lymphodepletion recovery"
rems: true
rems_name: "TECELRA REMS"
sources:
  - SRC-NCCN-STS-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  FDA approved August 2024 (accelerated approval) for HLA-A*02:01-positive adults with
  unresectable or metastatic synovial sarcoma who have received prior chemotherapy.
  Based on SPEARHEAD-1 trial (Demetri G et al. Lancet 2024; NCT04044768).
  SPEARHEAD-1 (n=44 treated): ORR 37% (16/44), mDOR 11.3 months, DCR 68%.
  First TCR-T cell therapy approved in solid tumors globally.
  NCCN STS guideline: preferred option for HLA-A*02:01+ synovial sarcoma 2L+.
  Manufacturing: ~6 weeks; bridge therapy may be needed for rapidly progressing disease.
