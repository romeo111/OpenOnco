id: DRUG-ALLOPURINOL
names:
  preferred: "Allopurinol"
  ukrainian: "Алопуринол"
  english: "Allopurinol"
  brand_names: ["Zyloprim"]
atc_code: M04AA01
rxnorm_id: "519"
drug_class: "Xanthine oxidase inhibitor"
mechanism: "Inhibits xanthine oxidase, reducing uric acid production."

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-25"

typical_dosing: "100-300 mg PO daily; up to 600 mg in TLS prophylaxis"
formulations:
  - "Tablet 100 mg / 300 mg"

absolute_contraindications:
  - "Hypersensitivity (severe cutaneous reactions, esp. HLA-B*5801+)"
common_adverse_events:
  - "Rash"
  - "GI upset"
serious_adverse_events:
  - "Stevens-Johnson syndrome / TEN (HLA-B*5801 association)"
  - "Severe hepatitis"

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
notes: >
  Standard TLS prophylaxis when initiating chemoimmunotherapy in
  patients with high tumor burden. Start 24-48 hours before therapy.
