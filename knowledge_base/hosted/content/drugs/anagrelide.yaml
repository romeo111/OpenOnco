id: DRUG-ANAGRELIDE
names:
  preferred: "Anagrelide"
  ukrainian: "Анагрелід"
  english: "Anagrelide"
  brand_names: ["Agrylin", "Xagrid"]
atc_code: L01XX35
rxnorm_id: "703"
drug_class: "Phosphodiesterase-3 inhibitor (selective platelet-reduction)"
mechanism: >
  Selectively reduces platelet count by interfering with megakaryocyte
  differentiation. Does not lower WBC or Hct (unlike HU). Used as 2L
  cytoreduction in ET when HU is intolerated or insufficient.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: false
    last_verified: "2026-04-25"

typical_dosing: >
  ET: start 0.5 mg PO BID; titrate by 0.5 mg/day weekly to plt <600K
  (target plt <400-450K). Maximum 10 mg/day; usual maintenance 1-3
  mg/day divided.
formulations: ["Capsules 0.5 / 1 mg"]

absolute_contraindications:
  - "Severe heart failure"
  - "Severe hepatic impairment"
  - "Pregnancy"
  - "Hypersensitivity"
black_box_warnings:
  - "Cardiovascular events — vasodilation, palpitations, heart failure (use with caution in cardiac comorbidity)"
major_interactions:
  - "PDE3 inhibitors / vasodilators (additive)"
  - "Aspirin (additive bleeding)"
common_adverse_events:
  - "Headache (~40%; usually self-limited)"
  - "Palpitations / tachycardia"
  - "Diarrhea"
  - "Edema"
  - "Anemia"
serious_adverse_events:
  - "Heart failure / cardiomyopathy (rare)"
  - "Arrhythmia"
  - "Bleeding (additive with ASA)"
  - "Pulmonary fibrosis (very rare)"

pharmacology: {half_life: "~1.3 hours; metabolite active longer"}

sources:
  - SRC-NCCN-MPN-2025
  - SRC-ESMO-MPN-2015

last_reviewed: "2026-04-25"
notes: >
  ET 2L per PT-1 trial (Harrison et al., NEJM 2005): non-inferior to HU
  on thrombosis but more arterial thrombosis + bleeding + myelofibrosis
  progression in some endpoints. Reserved for HU-intolerance/resistance
  or for younger ET patients wanting to avoid HU's theoretical
  leukemogenic concern. Cardiac evaluation (ECG ± echo) recommended
  before starting if comorbidity present.
