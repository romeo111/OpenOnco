id: DRUG-ANASTROZOLE
names:
  preferred: "Anastrozole"
  ukrainian: "Анастрозол"
  english: "Anastrozole"
  brand_names: ["Arimidex"]
atc_code: L02BG03
rxnorm_id: null
drug_class: "Aromatase inhibitor (non-steroidal, third-generation)"
mechanism: >
  Reversible non-steroidal AI — competitively inhibits aromatase, blocking peripheral conversion of androgens to estrogens. Postmenopausal estrogen suppression to <2 pmol/L. In premenopausal women, must be combined with ovarian suppression (LHRH agonist).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: null
    notes: "Generic; reimbursed for breast cancer adjuvant/metastatic indications."

typical_dosing: >
  1 mg PO once daily, with or without food. Continue 5-10 years adjuvant; until progression in metastatic.

key_toxicities:
  - Hot flashes (~50%)
  - Arthralgia/myalgia (~30%) — bisphosphonate or vitamin-D evaluation
  - Bone-mineral-density loss → fracture risk (DEXA monitoring + bone-modifying agent)
  - Vaginal dryness, decreased libido
  - Cardiovascular events (modest excess)
  - Hypercholesterolemia

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed: null
notes: >
  First-generation AI workhorse for postmenopausal HR+/HER2- adjuvant + metastatic. Non-steroidal class — substitutable with letrozole. Patient-preference / institutional choice typically drives selection between anastrozole and letrozole.
