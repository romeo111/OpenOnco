id: DRUG-APALUTAMIDE
names:
  preferred: "Apalutamide"
  ukrainian: "Апалутамід"
  english: "Apalutamide"
  brand_names: ["Erleada"]
atc_code: L02BB05
rxnorm_id: null
drug_class: "Androgen receptor pathway inhibitor (ARPI)"
mechanism: >
  AR antagonist similar to enzalutamide; FDA-approved for nmCRPC (SPARTAN) and mHSPC (TITAN).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "Зареєстрований; станом на 2026-04 не покривається НСЗУ. Out-of-pocket або через благодійні програми. Перевірено 2026-04-27 (drlz.com.ua)."
typical_dosing: >
  240 mg PO once daily.

key_toxicities:
  - Fatigue
  - Rash (~24%) — sometimes severe; manage with topical steroids, dose hold/reduce, or discontinuation
  - Falls / fractures (especially with concomitant ADT)
  - Hypothyroidism (~8%) — monitor TSH
  - Hot flashes
  - Hypertension

sources: [SRC-NCCN-PROSTATE-2025, SRC-ESMO-PROSTATE-2024]
last_reviewed: null
notes: >
  Distinguishing AE from enzalutamide: rash is class-marker and notable. Fewer cognitive AEs than enzalutamide (less CNS penetration).

notes_ua: >
  Характерна побічна дія, що відрізняє апалутамід (apalutamide) від
  ензалутаміду — висип, який є маркером класу і трапляється помітно
  частіше. Менше когнітивних побічних явищ порівняно з ензалутамідом
  завдяки нижчому проникненню в ЦНС.

ukrainian_review_status: pending_clinical_signoff
