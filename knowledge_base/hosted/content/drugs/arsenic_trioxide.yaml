id: DRUG-ATO
names:
  preferred: "Arsenic trioxide (ATO)"
  ukrainian: "Триоксид арсену"
  english: "Arsenic trioxide"
  synonyms: ["ATO", "As2O3"]
  brand_names: ["Trisenox"]
atc_code: L01XA04
rxnorm_id: "1316"
drug_class: "Differentiation + apoptosis-inducing agent (PML-RARα degrader)"
mechanism: >
  Binds PML moiety of PML-RARα fusion → SUMOylation, ubiquitination, and
  proteasomal degradation of the oncoprotein. Synergizes with ATRA. With
  ATRA, makes APL the first chemotherapy-curable acute leukemia.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    reimbursement_indications:
      - "APL"
    last_verified: "2026-04-25"

typical_dosing: >
  APL induction: 0.15 mg/kg IV daily until complete remission (~28-35 days).
  Consolidation per APL0406 / LO-CoCo: ATO 5 days/week × 4 weeks every 8
  weeks for 4 cycles + ATRA 2 weeks every 4 weeks for 7 cycles.
formulations: ["IV 1 mg/mL ampule (10 mg / 10 mL)"]

absolute_contraindications:
  - "Baseline QTc >500 ms"
  - "Severe electrolyte abnormalities (uncorrected hypokalemia, hypomagnesemia)"
  - "Pregnancy"
  - "Severe hepatic impairment"
black_box_warnings:
  - "Differentiation syndrome (same as ATRA)"
  - "QT prolongation, torsades de pointes — baseline + serial ECG; correct K+ >4.0, Mg2+ >1.8"
  - "APL syndrome — dyspnea, fluid retention, fever"
major_interactions:
  - "QT-prolonging drugs (azoles, fluoroquinolones, ondansetron): additive risk"
  - "Diuretics: risk of electrolyte depletion"
common_adverse_events:
  - "Nausea/vomiting"
  - "Headache"
  - "Fatigue"
  - "Hypokalemia / hypomagnesemia"
  - "Hyperglycemia"
  - "Differentiation syndrome"
serious_adverse_events:
  - "QT prolongation → torsades de pointes (fatal if not monitored)"
  - "Differentiation syndrome (potentially fatal)"
  - "Hepatotoxicity"

pharmacology: {half_life: "~12 hours; renal + hepatic elimination"}

sources:
  - SRC-NCCN-AML-2025
  - SRC-ELN-APL-2019
  - SRC-APL0406-LOCOCO-2013

last_reviewed: "2026-04-25"
notes: >
  ATO + ATRA chemo-free regimen for low-risk APL (WBC ≤10) — APL0406
  trial: 2-y EFS 97% vs 86% with ATRA+chemo (AIDA). For high-risk APL
  (WBC >10): ATRA + ATO + idarubicin OR classic AIDA. Mandatory daily
  ECG + electrolyte monitoring during induction; aggressive K+/Mg2+
  repletion. Differentiation-syndrome prophylaxis as for ATRA.
