id: DRUG-ATEZOLIZUMAB
names:
  preferred: "Atezolizumab"
  ukrainian: "Атезолізумаб"
  english: "Atezolizumab"
  brand_names: ["Tecentriq"]
atc_code: L01FF05
rxnorm_id: "1976831"
drug_class: "Anti-PD-L1 humanized monoclonal antibody (ICI)"
mechanism: >
  Binds PD-L1 (vs anti-PD-1 of pembro/nivo); blocks PD-L1/PD-1 + PD-L1/B7-1.
  Pivotal HCC role: atezo + bev (IMbrave150) — first ICI combo to beat
  sorafenib in 1L unresectable HCC.
regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration: {registered: true, reimbursed_nszu: false, last_verified: "2026-04-26"}
typical_dosing: "1200 mg IV q3w (combined with bevacizumab 15 mg/kg q3w for HCC)."
formulations: ["IV solution 60 mg/mL (1200 mg vial)"]
absolute_contraindications:
  - "Active autoimmune disease on immunosuppression"
  - "Pregnancy"
black_box_warnings: ["Pneumonitis", "Hepatitis", "Endocrinopathies", "Severe infusion reactions"]
common_adverse_events: ["Fatigue", "Decreased appetite", "Nausea", "Hypertension (with bev)", "Proteinuria (with bev)"]
serious_adverse_events: ["Severe colitis", "Pneumonitis (Grade 3+)", "Hepatitis", "Adrenal insufficiency"]
sources: [SRC-NCCN-HCC-2025, SRC-AASLD-HCC-2023]
last_reviewed: "2026-04-26"
notes: >
  STUB — Phase GI-1. IMbrave150: prerequisites — Child-Pugh A, ECOG ≤1,
  EGD within 6 mo with treated high-risk varices. mOS 19.2 mo vs 13.4
  sorafenib. Major caveat: bevacizumab risks (perforation, hemorrhage,
  HTN, proteinuria) compound — strict patient selection.
