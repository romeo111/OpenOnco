id: DRUG-ATRA
names:
  preferred: "All-trans retinoic acid (Tretinoin)"
  ukrainian: "Третиноїн (ATRA)"
  english: "All-trans retinoic acid"
  synonyms: ["ATRA", "Tretinoin"]
  brand_names: ["Vesanoid"]
atc_code: L01XF01
rxnorm_id: "10763"
drug_class: "Retinoid (vitamin A derivative); differentiation agent"
mechanism: >
  Binds retinoic-acid receptor α (RARα) and degrades the PML-RARα fusion
  oncoprotein in APL → forces blast differentiation rather than killing.
  Cornerstone of every APL induction regimen.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Гострий промієлоцитарний лейкоз (APL — індукція + консолідація з ATO ± хіміотерапією)"
    last_verified: "2026-04-27"
    notes: "Стандарт індукції/консолідації APL разом з ATO. Покривається НСЗУ як життєво необхідний препарат. Перевірено 2026-04-27."
typical_dosing: >
  APL: 45 mg/m²/day PO divided BID until complete remission (typically
  ~30-50 days). Continue per consolidation/maintenance protocol.
  Initiate IMMEDIATELY at clinical APL suspicion (don't wait for
  cytogenetic confirmation) — mortality from bleeding > from leukemia
  in first 7 days.
formulations: ["Capsules 10 mg"]

absolute_contraindications:
  - "Hypersensitivity to retinoids or parabens"
  - "Pregnancy (potent teratogen — category X)"
  - "Severe hepatic impairment"
black_box_warnings:
  - "Differentiation syndrome (formerly RA-syndrome) — fever, dyspnea, weight gain, pulmonary infiltrates, hypotension; potentially fatal; treat with dexamethasone 10 mg IV BID"
  - "Leukocytosis — high WBC at diagnosis predicts higher DS risk; prophylactic steroids if WBC >5K (low-risk) or >10K (high-risk)"
  - "Teratogenicity — pregnancy must be excluded"
major_interactions:
  - "CYP3A inhibitors / inducers alter exposure"
common_adverse_events:
  - "Headache (pseudotumor cerebri-like)"
  - "Dry skin / mucositis"
  - "Hypertriglyceridemia"
  - "Bone pain"
  - "Differentiation syndrome (5-25% of APL patients)"
serious_adverse_events:
  - "Differentiation syndrome (potentially fatal)"
  - "Pseudotumor cerebri (children)"
  - "Hepatotoxicity"

pharmacology: {half_life: "~45 minutes; rapid CYP-mediated clearance"}

sources:
  - SRC-NCCN-AML-2025
  - SRC-ELN-APL-2019
  - SRC-APL0406-LOCOCO-2013

last_reviewed: "2026-04-25"
notes: >
  Initiate ATRA at clinical APL suspicion based on smear findings + DIC
  pattern, BEFORE PML-RARα confirmation — early death from bleeding is
  the dominant APL mortality. Differentiation-syndrome prophylaxis with
  dexamethasone 10 mg IV BID for high-risk (WBC >10K) or rising WBC.
  Pregnancy-test gating + 2 forms of contraception mandatory.
