id: DRUG-AXITINIB
names:
  preferred: "Axitinib"
  ukrainian: "Акситиніб"
  english: "Axitinib"
  synonyms: ["AG-013736"]
  brand_names: ["Inlyta"]
atc_code: L01EK01
rxnorm_id: ""
drug_class: "Selective VEGFR-1/2/3 tyrosine kinase inhibitor (2nd-generation)"
mechanism: >
  Selective ATP-competitive small-molecule TKI of VEGFR-1, VEGFR-2,
  and VEGFR-3 with sub-nanomolar in-vitro potency and improved
  selectivity over first-generation multikinase TKIs (sunitinib,
  sorafenib). Blocks VEGF-driven endothelial proliferation,
  migration, and survival in the tumor microenvironment, producing
  predominantly anti-angiogenic effects with minimal direct
  cytotoxicity. Short half-life (~2.5-6 h) gives titratable BID
  dosing — characteristic patient-specific dose escalation based on
  blood-pressure response (titrate up to 10 mg BID if BP tolerable
  at 5 mg). Pivotal evidence: AXIS (axitinib vs sorafenib 2L mRCC
  post-sunitinib/cytokines: mPFS 6.7 vs 4.7 mo); KEYNOTE-426
  (pembrolizumab + axitinib vs sunitinib 1L mRCC: mPFS 15.7 vs 11.1
  mo, OS HR 0.53), JAVELIN Renal 101 (avelumab + axitinib vs
  sunitinib 1L mRCC).

