  - SRC-ESMO-RCC-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  Patient-specific titration to maximum tolerated dose (5 → 7 → 10
  mg BID) is a defining feature — patients tolerating starting dose
  with normotension should escalate, as exposure correlates with
  efficacy. KEYNOTE-426 + JAVELIN-Renal-101 redefined 1L mRCC by
  combining axitinib with anti-PD-(L)1 — dual mechanism of action
  outperforms sunitinib monotherapy. Baseline workup: BP,
  urinalysis (UPCR), LFTs, CBC, TSH, ECG, pregnancy test. Monitor
  BP weekly first 6 weeks then monthly, urinalysis monthly, LFTs
  monthly, TSH q3 months. Hold for SBP >160/100 — escalate
  antihypertensives (ACE-i / ARB first then CCB amlodipine). Hold
  ≥2 weeks before elective surgery; resume only after full wound
  healing. Counsel patients on dental procedures (bleeding risk).
  UA: registered; НСЗУ-reimbursed in RCC.

notes_ua: >
  Індивідуальне титрування акситинібу (axitinib) до максимально переносимої
  дози (5 → 7 → 10 mg BID) є визначальною особливістю — пацієнтам, які
  переносять стартову дозу при нормотензії, дозу слід ескалювати, оскільки
  експозиція корелює з ефективністю. Дослідження KEYNOTE-426 та JAVELIN
  Renal 101 переформатували 1-шу лінію метастатичного НКК за рахунок
  поєднання акситинібу з анти-PD-(L)1 — подвійний механізм дії перевищує
  ефективність монотерапії сунітинібом. Базове обстеження: артеріальний
  тиск, аналіз сечі (UPCR), LFTs, CBC, TSH, ECG, тест на вагітність.
  Моніторинг: артеріальний тиск щотижня перші 6 тижнів, далі щомісяця;
  аналіз сечі та LFTs щомісяця; TSH кожні 3 місяці. Терапію слід
  призупиняти при SBP >160/100 — посилення антигіпертензивної терапії
  (ACE-інгібітор / ARB як перший вибір, далі — CCB амлодипін). Препарат
  відміняють ≥2 тижнів до планової операції та відновлюють лише після
  повного загоєння рани. Необхідно інформувати пацієнтів про ризик
  кровотечі при стоматологічних процедурах. В Україні: зареєстровано;
  покривається НСЗУ при НКК.

