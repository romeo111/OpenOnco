typical_dosing: >
  Starting dose: 5 mg PO BID (~12 h apart), with or without food.
  Titration: if BP normal/well-controlled and no G≥2 AE for ≥2
  consecutive weeks → escalate to 7 mg BID, then to 10 mg BID
  similarly. Dose level -1 = 3 mg BID; -2 = 2 mg BID; permanent
  discontinuation if recurrent G3-4 at -2. Hold for hypertensive
  crisis, severe HFS, severe proteinuria, GI perforation, or
  hemorrhage. Strong CYP3A4 inhibitor coadministration: halve
  starting dose to 2 mg BID. No formal renal adjustment for CrCl
  ≥30; modest adjustment in moderate hepatic impairment (50% dose
  reduction recommended for Child-Pugh B).

formulations:
  - "Tablets 1 mg, 5 mg"

absolute_contraindications:
  - "Hypersensitivity to axitinib or any excipient"
  - "Severe uncontrolled hypertension (resistant to ≥3 antihypertensives)"
  - "Active hemorrhage / recent (within 4 wk) major bleed"
  - "Recent major surgery / unhealed wound (within 4 wk)"
  - "Severe hepatic impairment (Child-Pugh C)"
  - "Pregnancy (embryo-fetal toxicity)"

black_box_warnings: []

common_adverse_events:
  - "Hypertension ~40% any-grade; G3 ~16%"
  - "Diarrhea ~55%"
  - "Fatigue ~40%"
  - "Decreased appetite ~35%"
  - "Nausea ~32%"
  - "Hand-foot syndrome (palmar-plantar erythrodysesthesia) ~27%"
  - "Hypothyroidism ~20-30% (anti-VEGF class)"
  - "Dysphonia ~30%"
  - "Proteinuria ~10-20%"
  - "Weight loss ~25%"
  - "Vomiting ~20%"
  - "Constipation ~20%"
  - "Headache ~14%"

serious_adverse_events:
  - "Hypertensive crisis / PRES (G3+ ~16%; baseline + serial BP)"
  - "Hemorrhage — GI, intracranial, pulmonary (G3+ ~3%)"
  - "GI perforation / fistula (rare)"
  - "Arterial thromboembolism (MI, CVA — ~2%)"
  - "Venous thromboembolism (~3%)"
  - "Severe hepatotoxicity (G3 ALT/AST ~3%)"
  - "Severe HFS (G3 ~5%)"
  - "Severe proteinuria / nephrotic syndrome (rare)"
  - "Wound-healing impairment (hold pre-/post-elective surgery)"
  - "Cardiac dysfunction / LVEF decline"

major_interactions:
  - "Strong CYP3A4 inhibitors (azoles, clarithromycin, ritonavir) — significantly ↑ exposure; halve starting dose"
  - "Strong CYP3A4 inducers (rifampin, phenytoin, carbamazepine, St John's wort) — ↓ exposure; avoid"
  - "Other anti-VEGF agents — additive toxicity; not co-administered"
  - "Anticoagulants (warfarin, DOAC) — additive bleeding risk; balance vs thrombosis"
  - "Concurrent ICIs (pembrolizumab, avelumab) — intended combination per KEYNOTE-426 / JAVELIN Renal 101"
  - "Grapefruit juice — CYP3A4 inhibition; avoid"

pharmacology:
  half_life_hours: 5
  clearance: "hepatic"
  protein_binding_pct: 99
  metabolism: "CYP3A4 (predominant); minor CYP1A2 / 2C19; UGT1A1 glucuronidation"

sources:
