id: DRUG-AXITINIB
names:
  preferred: "Axitinib"
  ukrainian: "Акситиніб"
  english: "Axitinib"
  brand_names: ["Inlyta"]
atc_code: L01EK01
rxnorm_id:
drug_class: "VEGFR-1/2/3 tyrosine kinase inhibitor"
mechanism: >
  Selective VEGFR TKI; antiangiogenic. Combined with pembrolizumab (KEYNOTE-426) for 1L mRCC.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-27"
    notes: "Реєстрація МОЗ підтверджена (раніше registered=false — виправлено). НСЗУ покриває RCC 1L (з pembro) та 2L. Джерело: nszu.gov.ua (2026-04)."

    reimbursement_indications:
    - 'Реімбурсаційний пакет «Онкологія» 2026: НКК нирки 2L+ після sunitinib/cytokines (AXIS)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: НКК нирки 1L з pembrolizumab (KEYNOTE-426) або з avelumab'
typical_dosing: >
  5 mg PO BID continuous; titrate up to 10 mg BID per BP/tolerability.

key_toxicities:
- Hypertension (~40%)
- Diarrhea
- Hand-foot syndrome
- Hypothyroidism
- Proteinuria

sources: [SRC-NCCN-NSCLC-2025]
last_reviewed:
notes: >
  STUB. KEYNOTE-426 1L mRCC.
