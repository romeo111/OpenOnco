id: DRUG-BELZUTIFAN
names:
  preferred: "Belzutifan"
  ukrainian: "Белзутифан"
  english: "Belzutifan"
  brand_names: ["Welireg"]
atc_code: L01XX78
rxnorm_id: null
drug_class: "HIF-2α inhibitor"
mechanism: >
  Selective small-molecule inhibitor of hypoxia-inducible factor 2α
  (HIF-2α). VHL inactivation (somatic in ~90% of clear-cell RCC,
  germline in von Hippel-Lindau syndrome) → HIF-2α stabilization → drives
  the angiogenic/glycolytic ccRCC phenotype. Belzutifan disrupts HIF-2α
  heterodimerization with HIF-1β, suppressing the downstream
  transcriptional programme.

regulatory_status:
  fda:
    approved: true
    notes: >
      First approval 2021 for VHL disease-associated RCC, CNS hemangioblastoma,
      pancreatic NETs not requiring immediate surgery (LITESPARK-004).
      Expanded 2023 to advanced ccRCC after PD-(L)1 + VEGF-TKI (LITESPARK-005).
  ema:
    approved: true
    notes: "EMA approval 2024 for advanced ccRCC post-IO/VEGF-TKI."
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      HIF-2α інгібітор для VHL-асоційованих RCC/CNS-haemangioblastoma/PNET
      та advanced ccRCC; не входить до НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP Merck (MSD) Ukraine (Welireg patient-access program;
        пріоритет — VHL-syndrome пацієнти з підтвердженим germline VHL).
      - Cross-border (EU): EU онкоцентри (Charité VHL-clinic) через
        "Лікування за кордоном" (наказ МОЗ 988).
      - Trial-only: LITESPARK-серія активна в EU.
      Source: drlz.com.ua пошук "belzutifan"/"welireg" 2026-04-27 — РП відсутнє.

typical_dosing: >
  120 mg PO once daily, continuous, until progression or unacceptable toxicity.
  Hemoglobin and oxygen-saturation monitoring at baseline + every cycle —
  anemia + hypoxia are class-defining ON-target effects (HIF-2α regulates EPO).

key_toxicities:
  - Anemia (~76%, often G1-2; can require EPO support or transfusion)
  - Hypoxia (~15%, on-target; supplemental O2 if SpO2 <88%)
  - Fatigue (~64%)
  - Headache (~37%)
  - Dizziness, nausea
  - Embryo-fetal toxicity (contraindicated in pregnancy; effective contraception required)

contraindications:
  - "Pregnancy / inadequate contraception"
  - "Severe pre-existing anemia (Hgb <8 g/dL) without correction"

sources: [SRC-NCCN-KIDNEY-2025, SRC-ESMO-RCC-2024]
last_reviewed: "2026-04-26"
notes: >
  First-in-class HIF-2α inhibitor; mechanism-of-action drug for
  VHL-syndrome-associated tumors. In sporadic ccRCC, used 2L+ after
  PD-(L)1 + VEGF-TKI. Reduces hemangioblastoma volume and pancreatic
  NET volume in VHL syndrome — surgery-sparing in many cases. UA-access
  is the bottleneck; document pathway in AccessPathway entity once
  Phase D content lands.
