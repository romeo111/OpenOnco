id: DRUG-BENDAMUSTINE
names:
  preferred: "Bendamustine"
  ukrainian: "Бендамустин"
  english: "Bendamustine"
  brand_names:
    - "Treanda"
    - "Bendeka"
    - "Levact"
atc_code: L01AA09
rxnorm_id: "134547"
drug_class: "Nitrogen mustard alkylating agent with purine analogue properties"
mechanism: >
  Bifunctional alkylating agent with a purine-like benzimidazole
  moiety; induces DNA damage and apoptosis in lymphocytes.

regulatory_status:
  fda:
    approved: true
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: "[TBD]"
    reimbursed_nszu: true
    reimbursement_indications:
      - "Індолентні B-клітинні лімфоми (у комбінації з ритуксимабом)"
    last_verified: "2026-04-24"

typical_dosing: "90 mg/m² IV days 1-2 of 28-day cycle (with rituximab)"
formulations:
  - "IV powder 25 mg / 100 mg vials"

absolute_contraindications:
  - "Hypersensitivity"
  - "Severe hepatic impairment (Child-Pugh C)"
  - "Severe renal impairment without dose adjustment"
black_box_warnings: []
major_interactions:
  - "CYP1A2 substrates: fluvoxamine, ciprofloxacin may inhibit metabolism"
common_adverse_events:
  - "Myelosuppression (neutropenia, thrombocytopenia, anemia)"
  - "Infusion reactions"
  - "Nausea"
  - "Fatigue"
serious_adverse_events:
  - "Severe myelosuppression with infection risk"
  - "Tumor lysis syndrome"
  - "Severe skin reactions (rare)"
  - "Opportunistic infections including PJP"

pharmacology:
  half_life: "~40 minutes (parent drug); active metabolites longer"

sources:
  - SRC-ESMO-MZL-2024
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-24"
notes: >
  Dose adjustment needed for FIB-4 > 3.25 or cirrhosis (see
  Regimen.dose_adjustments in REG-BR-STANDARD).
