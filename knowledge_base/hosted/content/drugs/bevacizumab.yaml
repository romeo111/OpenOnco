id: DRUG-BEVACIZUMAB
names:
  preferred: "Bevacizumab"
  ukrainian: "Бевацизумаб"
  english: "Bevacizumab"
  brand_names: ["Avastin", "Mvasi (biosimilar)", "Zirabev (biosimilar)"]
atc_code: L01FG01
rxnorm_id: "337525"
drug_class: "Anti-VEGF-A humanized monoclonal antibody"
mechanism: >
  Binds and neutralizes VEGF-A, blocking endothelial-cell receptor
  signaling → tumor anti-angiogenesis + vessel normalization. Adds
  ~2-4 mo PFS in metastatic CRC when added to FOLFOX/FOLFIRI;
  combined with atezolizumab in 1L unresectable HCC (IMbrave150).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: false
    last_verified: "2026-04-26"
    notes: "Original biologic out-of-pocket; biosimilars (Mvasi, Zirabev) increasingly available; selected indications NSZU-funded"

typical_dosing: >
  CRC metastatic: 5 mg/kg IV every 14d (with FOLFOX/FOLFIRI) or 7.5 mg/kg q21d (with CAPOX).
  HCC: 15 mg/kg IV q21d (with atezolizumab 1200 mg).
formulations: ["IV concentrate 25 mg/mL (100 mg, 400 mg vials)"]

absolute_contraindications:
  - "Recent (≤28 days) major surgery"
  - "Active GI perforation history"
  - "Severe uncontrolled hypertension"
  - "Active hemoptysis ≥2.5 mL"
  - "Recent CVA / arterial thromboembolic event (≤6 months)"

black_box_warnings:
  - "GI perforation"
  - "Surgery / wound healing complications (hold ≥28 days pre-op, restart ≥28 days post-op)"
  - "Hemorrhage (severe — pulmonary, GI, CNS)"

common_adverse_events:
  - "Hypertension (manage with ACE-i or CCB)"
  - "Proteinuria (monitor UPCR; hold if >3.5 g/24h)"
  - "Epistaxis"
  - "Fatigue"
  - "Impaired wound healing"

serious_adverse_events:
  - "GI perforation (1-3% in CRC)"
  - "Severe hemorrhage"
  - "Arterial thromboembolic events (MI, stroke)"
  - "Reversible posterior leukoencephalopathy syndrome (RPLS)"

sources:
  - SRC-NCCN-COLON-2025
  - SRC-NCCN-HCC-2025

last_reviewed: "2026-04-26"
notes: >
  STUB — Phase GI-1. HCC IMbrave150 require pre-treatment EGD to assess
  varices; high-risk varices need ligation/banding before atezo+bev.
  Hold ≥28 days pre-elective surgery; resume ≥28 days post-op with
  full wound healing.
