id: DRUG-BEXAROTENE
names:
  preferred: "Bexarotene"
  ukrainian: "Бексаротен"
  english: "Bexarotene"
  brand_names: ["Targretin"]
atc_code: L01XF03
rxnorm_id: "215159"
drug_class: "Selective retinoid X receptor (RXR) agonist"
mechanism: >
  Selectively binds and activates retinoid X receptors (RXRα, RXRβ,
  RXRγ), which heterodimerize with other nuclear receptors to regulate
  gene expression involved in cellular differentiation and proliferation.
  In CTCL induces apoptosis and differentiation of malignant T-cells.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      Селективний RXR-агоніст для CTCL (oral capsules + topical 1% gel);
      не входить до НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл) — Targretin/Targrexin.
      - EAP Eisai (через EU дистрибʼютора; немає активного UA медрепа).
      - Compounding: топічний 1% gel іноді доступний через спеціалізовані
        аптеки-compounders в Україні (нерегулярно).
      - Cross-border (EU): EU CTCL-центри через "Лікування за кордоном"
        (наказ МОЗ 988); EMA-затверджено 2001.
      Source: drlz.com.ua пошук "bexarotene"/"targretin" 2026-04-27 — РП відсутнє.

typical_dosing: "PO: 300 mg/m² once daily with meal. Topical 1% gel: apply to lesions every other day, increase to 4×/day as tolerated."
formulations: ["PO capsules 75 mg", "Topical gel 1%"]

absolute_contraindications:
  - "Pregnancy (Category X — teratogenic)"
  - "Severe hypersensitivity"
  - "Acute pancreatitis"
black_box_warnings:
  - "Major birth defects — pregnancy must be excluded; effective contraception ≥1 month before, during, and ≥1 month after therapy"
  - "Severe hypertriglyceridemia / pancreatitis — baseline + monthly fasting lipid panel"
major_interactions:
  - "Gemfibrozil — markedly increases bexarotene levels (avoid)"
  - "Strong CYP3A4 inhibitors / inducers — adjust dose"
  - "Vitamin A supplements — additive toxicity (avoid)"
  - "Statins — additive triglyceride concerns; monitor"
common_adverse_events:
  - "Hypertriglyceridemia (~80%) — mandates baseline + monthly fasting lipids + statin/fibrate prophylaxis"
  - "Central hypothyroidism (~30-50%) — TSH/T4 baseline + monthly; thyroxine replacement common"
  - "Hypercholesterolemia"
  - "Headache, asthenia"
  - "Leukopenia"
  - "Rash, dry skin, pruritus (PO and topical)"
  - "Photosensitivity"
serious_adverse_events:
  - "Severe hypertriglyceridemia → pancreatitis (sometimes fatal)"
  - "Central hypothyroidism (clinically significant)"
  - "Hepatotoxicity"
  - "Severe leukopenia"
  - "Cataract formation (long-term)"

pharmacology:
  half_life: "~7 hours"
  elimination: "Hepatic CYP3A4 → biliary"

sources: [SRC-NCCN-BCELL-2025, SRC-ESMO-CTCL-2024]
last_reviewed: "2026-04-27"
notes: >
  Duvic 2001 phase 2/3 in r/r CTCL — ORR ~45-55% (any stage), durable
  in maintenance setting. FDA-approved for CTCL refractory to ≥1 prior
  line. Triglyceride and thyroid management are the dominant practical
  challenges — atorvastatin or fenofibrate prophylaxis usually started
  concurrently; levothyroxine empirically considered. Topical gel
  useful for limited skin lesions. Major UA access barrier — international
  supply required.

notes_ua: >
  Дослідження Duvic (2001) у фазі 2/3 при рецидивній/рефрактерній CTCL —
  ORR ~45-55% (на будь-якій стадії), стійка відповідь у режимі
  підтримуючої терапії. Бексаротен (bexarotene) FDA-схвалений для CTCL,
  рефрактерного до ≥1 попередньої лінії. Основні практичні виклики —
  менеджмент гіпертригліцеридемії та тиреоїдної дисфункції: профілактично
  призначаються аторвастатин або фенофібрат паралельно з початком
  терапії; емпірично розглядається замісна терапія левотироксином.
  Топічний 1% гель ефективний при обмежених шкірних проявах. Основний
  бар'єр доступу в Україні — необхідне міжнародне постачання.

