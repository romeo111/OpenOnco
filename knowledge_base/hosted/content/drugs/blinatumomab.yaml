id: DRUG-BLINATUMOMAB
names:
  preferred: "Blinatumomab"
  ukrainian: "Блінатумомаб"
  english: "Blinatumomab"
  brand_names: ["Blincyto"]
atc_code: L01FX07
rxnorm_id: "1597835"
drug_class: "Bispecific T-cell engager (BiTE) — anti-CD19 × anti-CD3"
mechanism: >
  Bispecific single-chain antibody construct binding CD19 on B-cell
  malignancies AND CD3 on T cells, forming an immunological synapse
  that activates polyclonal cytotoxic T-cell killing of CD19+
  blasts. First-in-class BiTE. Approved for MRD+ post-induction
  B-ALL (BLAST trial) AND R/R Ph- and Ph+ B-ALL.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-27"

    reimbursement_indications:
    - 'Програма медичних гарантій 2026: B-ALL Ph- R/R після індукції/реіндукції (TOWER)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: B-ALL MRD+ після консолідації (BLAST)'
    notes: 'Реєстрація МОЗ підтверджена (раніше registered=false — виправлено). НСЗУ покриває B-ALL R/R та MRD+. Pediatric — також. CRS/ICANS моніторинг. Джерело: nszu.gov.ua (2026-04).'
typical_dosing: >
  R/R B-ALL: cycle 1: 9 µg/day continuous IV infusion days 1-7,
  then 28 µg/day days 8-28 of 42-day cycle. Cycles 2-5: 28 µg/day
  days 1-28. Up to 9 cycles total. MRD+ B-ALL: 28 µg/day continuous
  IV days 1-28 of 42-day cycle, up to 4 cycles. Continuous IV via
  ambulatory infusion pump. Hospitalization recommended for cycle
  1 days 1-9 + cycle 2 days 1-2.

formulations: ["Powder for IV infusion 38.5 µg/vial"]

absolute_contraindications:
- "Hypersensitivity"
- "Pregnancy"

black_box_warnings:
- "Cytokine release syndrome (CRS) — fatal if not managed; Grade ≥3 ~2-15%"
- "Neurotoxicity (encephalopathy, seizures, ataxia, aphasia) — Grade ≥3 ~10-15%"

major_interactions:
- "Concurrent dexamethasone given as premedication; otherwise minimal CYP interactions"
- "Live vaccines: avoid"

common_adverse_events:
- "Pyrexia"
- "CRS (variable severity)"
- "Neurologic events (tremor, headache, encephalopathy)"
- "Infusion-site reactions"
- "Cytopenia (less than chemo)"
- "Infection"
- "Hypogammaglobulinemia"

serious_adverse_events:
- "Severe CRS (boxed)"
- "Severe neurotoxicity (boxed)"
- "Severe infection / sepsis"
- "Tumor lysis syndrome"
- "Pancreatitis (rare)"

pharmacology: {half_life: "~2.1 hours; continuous IV infusion required"}

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Pivotal trials: TOWER (R/R Ph- B-ALL phase-3 vs chemo: median OS
  7.7 vs 4.0 mo, HR 0.71); BLAST (MRD+ B-ALL phase-2: MRD response
  78%); ALCANTARA (R/R Ph+ post-TKI). FDA approval Dec 2014; EMA
  Nov 2015. MRD+ indication added 2018. Continuous infusion +
  hospitalization for cycle 1 limit accessibility (inpatient stay
  required for cycle 1 days 1-9 + cycle 2 days 1-2 to monitor for
  CRS / ICANS). Ukraine: registered + НСЗУ-reimbursed for B-ALL R/R
  (TOWER) and MRD+ post-induction (BLAST), including pediatric.
  Continuous IV infusion via ambulatory pump; line-care training
  mandatory for outpatient cycles.

notes_ua: >
  Опорні дослідження блінатумомабу (blinatumomab): TOWER (рецидивна/
  рефрактерна Ph-негативна B-ALL, фаза 3 проти хіміотерапії: медіана
  OS 7.7 vs 4.0 mo, HR 0.71); BLAST (MRD+ B-ALL, фаза 2: MRD-відповідь
  78%); ALCANTARA (рецидивна/рефрактерна Ph+ після TKI). Схвалення FDA —
  грудень 2014; EMA — листопад 2015. Показання при MRD+ додано у 2018
  році. Безперервна інфузія та госпіталізація на 1-й цикл обмежують
  доступність терапії (обов'язкове стаціонарне перебування у дні 1-9
  циклу 1 та дні 1-2 циклу 2 для моніторингу CRS/ICANS). В Україні:
  зареєстровано та покривається НСЗУ для B-ALL R/R (TOWER) та MRD+
  після індукції (BLAST), включно з педіатричними пацієнтами.
  Безперервне в/в введення через амбулаторну інфузійну помпу; обов'язкове
  навчання догляду за лінією для амбулаторних циклів.

ukrainian_review_status: pending_clinical_signoff
