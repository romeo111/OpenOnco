id: DRUG-BRIGATINIB
names:
  preferred: "Brigatinib"
  ukrainian: "Бригатиніб"
  english: "Brigatinib"
  brand_names: ["Alunbrig"]
atc_code: L01ED04
rxnorm_id:
drug_class: "2nd-generation ALK inhibitor"
mechanism: >
  ALK / ROS1 inhibitor with broad-spectrum activity vs ALK resistance mutations. ALTA-1L: superior PFS vs crizotinib 1L.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: false
    last_verified: "2026-04-27"
    notes: "Реєстрація МОЗ підтверджена для НДРЛ ALK+ (раніше registered=false — виправлено). НСЗУ не покриває (alectinib — стандарт 1L; brigatinib як 2L+ — out-of-pocket). Джерело: nszu.gov.ua (2026-04)."

    reimbursement_indications: []
typical_dosing: >
  180 mg PO once daily after 7-day lead-in at 90 mg.

key_toxicities:
- Pulmonary AEs (early-onset cough, dyspnea — hence lead-in dosing)
- Hypertension
- GI
- CK elevation

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed:
notes: >
  Alternative to alectinib 1L with similar efficacy; choice often based on AE profile preference.

notes_ua: >
  Бригатиніб (brigatinib) — альтернатива алектинібу у 1-й лінії
  ALK-позитивного метастатичного НДРЛ з порівнянною ефективністю
  (ALTA-1L: переважання за PFS проти кризотинібу); вибір зазвичай
  визначається перевагою профілю небажаних явищ. Старт з 7-денного
  lead-in 90 mg для зниження ризику ранніх легеневих небажаних явищ
  (кашель, задишка), далі 180 mg PO once daily.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_14a
draft_revision: 2
