id: DRUG-BUSULFAN
names:
  preferred: "Busulfan"
  brand: ["Busulfex", "Myleran"]
  ukrainian: "Бусульфан"
drug_class: "Alkylating agent (bifunctional alkylsulfonate)"
mechanism_of_action: >
  DNA crosslinking via alkylation of N7 position of guanine;
  bifunctional — forms inter- and intra-strand crosslinks.
  CNS-penetrant; crosses blood-brain barrier.

atc_code: "L01AB01"
rxnorm_cid: "1302"

administration_routes: ["IV", "PO"]
standard_formulations:
  - "Busulfex IV: 60 mg/6 mL (10 mg/mL) — for high-dose conditioning"
  - "Myleran PO: 2 mg tablets — for CML maintenance (historical)"

primary_indications:
  - "High-dose myeloablative conditioning regimens (BMT/HSCT)"
  - "Conditioning for autologous and allogeneic stem cell transplant"
  - "Historical: chronic myeloid leukemia (now replaced by imatinib)"

notable_toxicities:
  - "Hepatotoxicity: sinusoidal obstruction syndrome (veno-occlusive disease; VOD) — dose-limiting"
  - "Pulmonary fibrosis (high cumulative dose)"
  - "Seizures (CNS penetration; phenytoin/levetiracetam prophylaxis required)"
  - "Mucositis"
  - "Alopecia"
  - "Myelosuppression"

pharmacokinetics:
  metabolism: "Hepatic glutathione conjugation"
  elimination: "Renal (primarily metabolites)"
  half_life: "~2.3-2.8 hours (IV)"
  pk_notes: >
    High inter-patient PK variability — pharmacokinetic monitoring (AUC targeting)
    is recommended when used in high-dose conditioning:
    Target AUC: 900-1350 µmol·min/L (total busulfan exposure per course).
    Busulfan concentration-time monitoring: sample at 0.5, 1, 2, 4, 6 hours post-dose.

drug_interactions:
  - "Phenytoin (CYP3A4 inducer): reduces busulfan AUC ~30% — avoid if possible"
  - "Itraconazole/fluconazole (CYP3A4 inhibitors): may increase busulfan exposure"
  - "Metronidazole: case reports of increased busulfan toxicity"

contraindications:
  - "Severe hepatic impairment (Child-Pugh C) — VOD risk"
  - "Active uncontrolled infection"
  - "Previous busulfan hypersensitivity"

special_populations:
  pediatric: "Used in pediatric HSCT conditioning; weight-based dosing"
  pregnancy: "Category D — teratogenic"

ukraine_registration:
  registered: true
  notes: >
    Busulfan (Busulfex IV) registered in Ukraine for use in HSCT conditioning
    at specialized bone marrow transplant centers. NSZU reimbursement in the
    context of HSCT procedures.

last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
