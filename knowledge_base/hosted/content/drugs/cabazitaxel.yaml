id: DRUG-CABAZITAXEL
names:
  preferred: "Cabazitaxel"
  ukrainian: "Cabazitaxel"
  english: "Cabazitaxel"
  brand_names: ["Jevtana"]
atc_code: L01CD04
rxnorm_id: "1300786"
drug_class: "Taxane antineoplastic agent"
mechanism: >
  Semisynthetic taxane that binds tubulin, stabilizes microtubules, and
  blocks mitotic and interphase cellular functions. Used in prostate cancer
  after docetaxel exposure, typically with prednisone and G-CSF support.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 2010
  ema:
    approved: true
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: null
    notes: "Not registered in Ukraine (МОЗ Реєстр); available via named-patient import (Постанова КМУ №333 / МОЗ наказ)."
typical_dosing: >
  mCRPC post-docetaxel: 20 mg/m2 IV every 21 days with prednisone; 25 mg/m2
  may be used in selected fit patients. Primary G-CSF prophylaxis is used for
  high-risk patients and is commonly favored with 25 mg/m2 dosing.
formulations:
  - "IV concentrate for solution"
absolute_contraindications:
  - "Baseline neutrophil count <=1500/mm3"
  - "Severe hypersensitivity to cabazitaxel or polysorbate 80"
black_box_warnings:
  - "Neutropenia"
  - "Severe hypersensitivity"
common_adverse_events:
  - "Neutropenia"
  - "Anemia"
  - "Diarrhea"
  - "Fatigue"
  - "Nausea"
serious_adverse_events:
  - "Febrile neutropenia"
  - "Severe hypersensitivity"
  - "Severe diarrhea or dehydration"
major_interactions:
  - "Strong CYP3A inhibitors may increase exposure; avoid or dose-adjust"
  - "Strong CYP3A inducers may reduce exposure; avoid when possible"
sources:
  - SRC-NCCN-PROSTATE-2025
  - SRC-ESMO-PROSTATE-2024
  - SRC-TROPIC-DE-BONO-2010
  - SRC-CARD-DE-BONO-2019
last_reviewed: "2026-05-07"
reviewers: []
notes: >
  Thin drug entity added to resolve regimen component references from
  REG-CABAZITAXEL-MCRPC. Detailed availability and dose-modification metadata
  should be expanded during prostate V1/V2 curation.

