id: DRUG-CAPECITABINE
names:
  preferred: "Capecitabine"
  ukrainian: "Капецитабін"
  english: "Capecitabine"
  brand_names: ["Xeloda"]
atc_code: L01BC06
rxnorm_id: "194000"
drug_class: "Oral fluoropyrimidine prodrug"
mechanism: >
  Oral prodrug of 5-FU; converted via 3-step metabolism (carboxylesterase →
  cytidine deaminase → thymidine phosphorylase, the latter enriched in
  tumor tissue → tumor-selective activation). Replaces continuous-infusion
  5-FU in CAPOX, neoadjuvant rectal CRT, monotherapy elderly adjuvant.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-26"

typical_dosing: >
  CAPOX: 1000 mg/m² PO BID days 1-14 every 21d.
  Neoadjuvant rectal CRT: 825 mg/m² PO BID days of RT.
  Adjuvant monotherapy: 1250 mg/m² BID days 1-14 every 21d × 8 cycles.
formulations: ["Tablets 150 mg, 500 mg"]

absolute_contraindications:
  - "DPD complete deficiency"
  - "CrCl <30 mL/min"
  - "Severe hepatic impairment"
  - "Pregnancy"

black_box_warnings:
  - "Warfarin interaction (bleeding — monitor INR weekly)"
  - "DPD-related toxicity"

common_adverse_events:
  - "Hand-foot syndrome (palmar-plantar erythrodysesthesia) — most common, dose-limiting"
  - "Diarrhea"
  - "Nausea"
  - "Mucositis"
  - "Hyperbilirubinemia"

serious_adverse_events:
  - "Severe hand-foot syndrome with skin breakdown"
  - "Severe diarrhea / dehydration"
  - "Coronary vasospasm (like 5-FU)"
  - "Severe DPD-deficiency reactions"

sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024

last_reviewed: "2026-04-26"
notes: >
  STUB — Phase GI-1. HFS prophylaxis: emollient creams, avoid friction,
  pre-emptive dose-hold at Grade 2. Renal dose-adjust: CrCl 30-50 → 75%
  dose; <30 contraindicated. Equivalent to infusional 5-FU in rectal CRT
  (Hofheinz 2012) with patient-friendlier oral schedule.
