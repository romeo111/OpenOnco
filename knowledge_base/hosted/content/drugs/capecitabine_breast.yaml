typical_dosing: >
  1000-1250 mg/m² PO BID days 1-14 of 21-day cycle. CREATE-X residual TNBC: 1000-1250 mg/m² BID 14/21 x 6-8 cycles. HER2CLIMB combination: 1000 mg/m² BID 14/21 x ≥6 cycles + tucatinib + trastuzumab.

key_toxicities:
  - Hand-foot syndrome (palmar-plantar erythrodysesthesia, ~60%)
  - Diarrhea
  - Mucositis
  - Fatigue
  - DPYD-deficient patients: severe / fatal toxicity — DPYD genotyping recommended pre-start in EU practice

