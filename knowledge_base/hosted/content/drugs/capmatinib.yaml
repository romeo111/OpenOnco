id: DRUG-CAPMATINIB
names:
  preferred: "Capmatinib"
  ukrainian: "Капматініб"
  english: "Capmatinib"
  brand_names: ["Tabrecta"]
atc_code: L01EX17
rxnorm_id: null
drug_class: "MET-selective TKI"
mechanism: >
  Selective inhibitor of MET (c-MET) tyrosine kinase. GEOMETRY mono-1: ORR ~68% in 1L MET ex14-mutant NSCLC.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      MET-інгібітор для MET-exon14-skipping NSCLC; не входить до НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP Novartis Ukraine (Tabrecta access — обмежено, потребує
        підтвердженої METex14 мутації NGS).
      - Cross-border (EU): EU онкоцентри через "Лікування за кордоном"
        (наказ МОЗ 988).
      - Trial-only: GEOMETRY-серія, post-marketing.
      Source: drlz.com.ua пошук "capmatinib"/"tabrecta" 2026-04-27 — РП відсутнє.

typical_dosing: >
  400 mg PO BID with food.

key_toxicities:
  - Peripheral edema
  - Nausea
  - Fatigue
  - Hepatotoxicity
  - Pneumonitis (rare)

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed: null
notes: >
  Indicated for MET ex14 skipping mutation NSCLC. Tepotinib alternative.
