id: DRUG-CETUXIMAB
names:
  preferred: "Cetuximab"
  ukrainian: "Цетуксимаб"
  english: "Cetuximab"
  brand_names: ["Erbitux"]
atc_code: L01FE01
rxnorm_id: "318341"
drug_class: "Anti-EGFR chimeric IgG1 monoclonal antibody"
mechanism: >
  Binds EGFR extracellular domain → blocks ligand binding + ADCC.
  Effective ONLY in RAS wild-type mCRC (mutant RAS bypasses EGFR). BRAF
  V600E mutants also resistant. Left-sided primary tumor location is
  positive predictor.
regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration: {registered: true, reimbursed_nszu: false, last_verified: "2026-04-26", notes: "out-of-pocket; selective NSZU coverage for RAS-WT left-sided mCRC"}
typical_dosing: "400 mg/m² IV loading dose, then 250 mg/m² IV weekly."
formulations: ["IV solution 5 mg/mL"]
absolute_contraindications:
  - "Severe hypersensitivity (anaphylaxis on prior exposure)"
  - "Pregnancy"
black_box_warnings: ["Severe infusion reactions (pre-medicate with H1 + H2 blockers)", "Cardiopulmonary arrest"]
common_adverse_events: ["Acneiform rash (correlates with response — 80%+ of patients)", "Hypomagnesemia", "Paronychia", "Diarrhea", "Fatigue"]
serious_adverse_events: ["Anaphylaxis (region-specific — galactose-α-1,3-galactose IgE preformed in some patients)", "Severe rash with secondary infection", "Interstitial lung disease"]
sources: [SRC-NCCN-COLON-2025, SRC-ESMO-COLON-2024]
last_reviewed: "2026-04-26"
notes: >
  STUB — Phase GI-1. RAS testing (KRAS exons 2-4 + NRAS exons 2-4) +
  BRAF V600E + tumor sidedness mandatory before use. Left-sided RAS-WT
  → strong cetux benefit; right-sided WT → bevacizumab preferred per
  CALGB-80405. Rash management: tetracyclines + topical clindamycin.
