id: DRUG-CISPLATIN
names:
  preferred: "Cisplatin"
  ukrainian: "Цисплатин"
  english: "Cisplatin"
  brand_names: ["Platinol"]
atc_code: L01XA01
rxnorm_id: "2555"
drug_class: "Platinum alkylating agent (first-generation)"
mechanism: >
  DNA cross-linker forming Pt-DNA adducts. Backbone for esophageal CRT,
  HCC (legacy), gastric (legacy). More nephrotoxic and emetogenic than
  carboplatin/oxaliplatin; ototoxic and neurotoxic at cumulative doses.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration: {registered: true, reimbursed_nszu: true, last_verified: "2026-04-26"}

typical_dosing: >
  CROSS regimen: paclitaxel 50 + carboplatin AUC 2 weekly (CARBO preferred over cis in modern protocols).
  Esophageal definitive CRT: cisplatin 75 mg/m² IV days 1, 29 + 5-FU CIV 1000 mg/m²/d days 1-4, 29-32.
  Gastric: cisplatin 80 mg/m² IV q21d (legacy ECF/EOX schedules; FLOT preferred now).
formulations: ["IV solution 1 mg/mL"]
absolute_contraindications:
  - "Severe pre-existing renal dysfunction (CrCl <60 mL/min)"
  - "Severe hearing loss"
  - "Severe peripheral neuropathy"
  - "Pregnancy"
black_box_warnings:
  - "Cumulative renal toxicity (mandatory hydration + Mg/K replacement)"
  - "Severe nausea/vomiting"
  - "Ototoxicity (irreversible; baseline audiogram)"
common_adverse_events: ["Nausea/vomiting (highly emetogenic)", "Renal tubular dysfunction", "Peripheral neuropathy", "Hypomagnesemia"]
serious_adverse_events: ["Acute kidney injury", "Ototoxicity (high-frequency loss)", "Severe peripheral neuropathy"]
sources: [SRC-NCCN-ESOPHAGEAL-2025, SRC-ESMO-ESOPHAGEAL-2024]
last_reviewed: "2026-04-26"
notes: >
  STUB — Phase GI-1. Mandatory hydration ≥3 L pre-dose + 24h post; Mg/K
  pre-emptive supplementation. Consider carboplatin substitution for
  CrCl 50-60 or hearing loss. Ondansetron + dex + NK1-RA + olanzapine
  premedication required for emetogenic prophylaxis.
