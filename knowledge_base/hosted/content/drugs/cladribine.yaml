id: DRUG-CLADRIBINE
names:
  preferred: "Cladribine (2-CdA)"
  ukrainian: "Кладрибін"
  english: "Cladribine"
  brand_names: ["Leustatin", "Litak"]
atc_code: L01BB04
rxnorm_id: "21241"
drug_class: "Purine analogue (deoxyadenosine analogue)"
mechanism: "Resistant to deamination by ADA; phosphorylated to active triphosphate that incorporates into DNA, inhibits DNA repair, and induces apoptosis. Selectively cytotoxic to lymphocytes."

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Волосистоклітинний лейкоз (1L)"
      - "Лангергансово-клітинний гістіоцитоз"
    last_verified: "2026-04-27"
typical_dosing: "HCL 1L: 0.09 mg/kg/day continuous IV × 7 days (single course often curative); SC: 0.14 mg/kg/day × 5 days alternative"
formulations: ["IV solution 1 mg/mL"]

absolute_contraindications: ["Active uncontrolled infection", "Severe pre-existing immunosuppression", "Pregnancy", "Hypersensitivity"]
black_box_warnings: ["Severe lymphocyte depletion → opportunistic infections (PJP) for ≥1 year post"]
common_adverse_events: ["Profound prolonged lymphopenia (CD4 <200 typical for 6-12 mo)", "Fever/neutropenic fever", "Mild myelosuppression"]
serious_adverse_events: ["Opportunistic infections (PJP, fungal, viral reactivations)", "Tumor lysis (low risk in HCL low burden)"]

pharmacology: {half_life: "~7 hours; intracellular triphosphate >24 hours"}
sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Single 7-day course produces durable CR in >85% of HCL — one of the
  most effective single-agent regimens in oncology. Mandatory PJP
  prophylaxis (cotrimoxazole) and HSV prophylaxis (acyclovir) for
  ≥1 year post — profound lasting CD4 lymphopenia.

notes_ua: >
  Один 7-денний курс кладрибіну (cladribine) забезпечує стійку повну
  ремісію у >85% пацієнтів з волосистоклітинним лейкозом (HCL) —
  один з найефективніших одноагентних режимів в онкології. Обов'язкова
  профілактика PJP (котримоксазол) та HSV (ацикловір) ≥1 рік після
  завершення терапії у зв'язку з глибокою тривалою CD4-лімфопенією.

ukrainian_review_status: pending_clinical_signoff
