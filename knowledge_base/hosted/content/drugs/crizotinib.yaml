id: DRUG-CRIZOTINIB
names:
  preferred: "Crizotinib"
  ukrainian: "Кризотиніб"
  english: "Crizotinib"
  brand_names: ["Xalkori"]
atc_code: L01ED01
rxnorm_id:
drug_class: "1st-generation ALK / ROS1 / MET inhibitor"
mechanism: >
  Multi-target TKI active in ALK, ROS1, and MET-driven NSCLC. Largely supplanted by alectinib/lorlatinib for ALK and entrectinib for ROS1, but retains role in ROS1+ NSCLC where access to newer agents limited.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    reimbursement_indications:
    - 'Програма медичних гарантій 2026: НДРЛ ALK+ або ROS1+ 1L (історично; зараз 2L після alectinib)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: НДРЛ ROS1+ 1L (PROFILE 1001)'
    last_verified: "2026-04-27"
    notes: "Зареєстрований; НСЗУ покриває для ALK+ та ROS1+ НДРЛ. У ALK+ витіснений alectinib, залишається стандартом для ROS1+. Джерело: nszu.gov.ua (2026-04)."

typical_dosing: >
  250 mg PO BID.

key_toxicities:
- Visual disturbances (~60%)
- Edema
- Diarrhea
- Nausea
- Hepatotoxicity
- QT prolongation
- Pneumonitis (rare)

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed:
notes: >
  ROS1-positive NSCLC standard 1L when entrectinib unavailable. Largely 2L+ for ALK now.

notes_ua: >
  Кризотиніб (crizotinib) — стандарт 1-ї лінії при ROS1-позитивному НДРЛ
  за відсутності доступу до ентректинібу. При ALK-позитивному НДРЛ
  значною мірою витіснений у 2-гу лінію та далі (preferred 1L —
  алектиніб або лорлатиніб).

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_14a
draft_revision: 2
