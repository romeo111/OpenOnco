id: DRUG-DABRAFENIB
names:
  preferred: "Dabrafenib"
  ukrainian: "Дабрафеніб"
  english: "Dabrafenib"
  brand_names: ["Tafinlar"]
atc_code: L01EC02
rxnorm_id:
drug_class: "BRAF inhibitor"
mechanism: >
  Selective BRAF V600E/K inhibitor. Always combined with trametinib (MEKi) to prevent paradoxical RAF activation in BRAF-WT cells and improve efficacy.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-27"
    notes: "Зареєстрований; НСЗУ покриває BRAF-меланому 1L (комбо з trametinib) та адьювант. НДРЛ BRAF V600E — також. Анапластичний рак щитоподібної залози — частково. Джерело: nszu.gov.ua (2026-04)."

    reimbursement_indications:
    - 'Програма медичних гарантій 2026: меланома BRAF V600 нерезектабельна/метастатична 1L з trametinib'
    - 'Реімбурсаційний пакет «Онкологія» 2026: меланома BRAF V600 адьювант стадія III після резекції (COMBI-AD) з trametinib'
    - 'Реімбурсаційний пакет «Онкологія» 2026: НДРЛ BRAF V600E 1L з trametinib'
typical_dosing: >
  150 mg PO BID + trametinib 2 mg PO daily.

key_toxicities:
- Pyrexia (~60% — class effect)
- Rash
- Fatigue
- Cutaneous SCC (paradoxical activation; less with MEKi combo)
- Hyperglycemia
- QT prolongation

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed:
notes: >
  BRAF V600E NSCLC 1L+. Pyrexia management: hold + restart at lower dose; antipyretics. Combination essential.

notes_ua: >
  Дабрафеніб (dabrafenib) при BRAF V600E НДРЛ — 1-ша лінія та далі.
  Менеджмент лихоманки: призупинення з відновленням у нижчій дозі;
  жарознижуючі. Завжди в комбінації з траметинібом — самостійно
  не застосовується (комбінація істотна для запобігання парадоксальній
  активації RAF у BRAF-WT клітинах та підвищення ефективності).
  Основні показання: меланома BRAF V600 нерезектабельна / метастатична
  1L з траметинібом, ад'ювант стадії III після резекції (COMBI-AD),
  НДРЛ BRAF V600E 1L з траметинібом.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_14a
draft_revision: 2

notes_patient: >
  Таблетка-TKI, що блокує мутацію BRAF V600 у пухлинній клітині. Майже завжди комбінують із trametinib. Може спричиняти лихоманку — повідомляйте лікарю одразу.
