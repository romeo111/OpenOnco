notes_ua: >
  Дакарбазин (dacarbazine) — компонент схеми ABVD при лімфомі Ходжкіна.
  Високоемоегенний — потребує тричленної антиеметичної профілактики
  (NK1-антагоніст + 5-HT3-антагоніст + дексаметазон). Уникати інсоляції
  упродовж терапії та ще 1 тиждень після завершення (фотосенсибілізація).

