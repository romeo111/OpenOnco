id: DRUG-DAROLUTAMIDE
names:
  preferred: "Darolutamide"
  ukrainian: "Даролутамід"
  english: "Darolutamide"
  brand_names: ["Nubeqa"]
atc_code: L02BB06
rxnorm_id:
drug_class: "Androgen receptor pathway inhibitor (ARPI)"
mechanism: >
  AR antagonist with minimal CNS penetration (low blood-brain-barrier crossing) — favorable cognitive / fall profile vs enzalutamide. Approved for nmCRPC (ARAMIS) and mHSPC (ARASENS, in combination with docetaxel).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-27"
    notes: "Зареєстрований; НСЗУ покриває nmCRPC та mHSPC (ARASENS). Кращий профіль ЦНС-проникності ніж enzalutamide/apalutamide. Джерело: nszu.gov.ua (2026-04)."

    reimbursement_indications:
    - 'Реімбурсаційний пакет «Онкологія» 2026: nmCRPC високого ризику з ADT (ARAMIS)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: mHSPC з ADT+docetaxel (ARASENS)'
typical_dosing: >
  600 mg PO twice daily with food.

key_toxicities:
- Fatigue (least among ARPIs)
- Hot flashes
- Skeletal pain
- Hypertension (modest)
- Liver enzyme elevations (mild)

sources: [SRC-NCCN-PROSTATE-2025, SRC-ESMO-PROSTATE-2024]
last_reviewed:
notes: >
  Best safety profile of the ARPIs (no excess seizures, falls, cognitive AEs). Preferred for nmCRPC in elderly. ARASENS triplet (ADT + darolutamide + docetaxel) standard for high-volume mHSPC where infrastructure permits.
