id: DRUG-DATOPOTAMAB-DERUXTECAN
names:
  preferred: "Datopotamab deruxtecan (Dato-DXd)"
  ukrainian: "Датопотамаб дерукстекан"
  english: "Datopotamab deruxtecan (Dato-DXd)"
  brand_names: ["Datroway"]
atc_code:
rxnorm_id:
drug_class: "TROP2-targeted antibody-drug conjugate (deruxtecan / topo-I inhibitor payload)"
mechanism: >
  Humanized anti-TROP2 IgG1 monoclonal antibody linked to deruxtecan (DXd, exatecan-derivative topoisomerase-I inhibitor) via cleavable tetrapeptide linker. Drug-to-antibody ratio ~4:1, bystander effect on neighboring TROP2-low cells. TROP2 is broadly expressed on epithelial tumors (breast, NSCLC).

regulatory_status:
  fda:
    approved: true
    notes: "FDA approved 2025-01-17 (Datroway) — HR+/HER2- (IHC 0, IHC 1+, IHC 2+/ISH-) unresectable or metastatic breast cancer after prior endocrine-based therapy and chemotherapy. NSCLC indication under FDA review (TROPION-Lung01 sBLA)."
  ema: {approved: false}
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-04-29"
    notes: "Не зареєстрований в Україні станом на 2026-04. НСЗУ не покриває. Доступ — клінічні випробування або import. Джерело: dls.gov.ua реєстр (2026-04)."

    reimbursement_indications: []
typical_dosing: >
  6 mg/kg IV q3 weeks until disease progression or unacceptable toxicity. Premedication with antiemetics + corticosteroids + ocular lubrication recommended.

key_toxicities:
- Stomatitis / oral mucositis (~58% any grade, ~7% G≥3 — distinguishing toxicity vs T-DXd; ice chips + topical steroid mouthwash + dose modification)
- Nausea (~51%) + vomiting — moderate-emetogenic prophylaxis
- Dry eye / keratitis (~25% — preservative-free artificial tears + ophthalmology referral on symptoms)
- Alopecia (~36%)
- Fatigue
- Interstitial lung disease / pneumonitis (~3% any grade, ~0.4% G≥3 — lower than T-DXd but boxed-warning class effect; baseline CT + monitoring)
- Constipation, decreased appetite

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024, SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed:
notes: >
  TROPION-Breast01 (NCT05104866): Phase III, HR+/HER2- pre-treated metastatic breast cancer. Dato-DXd vs investigator-choice chemo. Median PFS 6.9 vs 4.9 mo (HR 0.63). FDA approval Jan 2025. TROPION-Lung01 (NCT04656652): Phase III, pre-treated advanced NSCLC. Modest PFS benefit overall; greater benefit in non-squamous subset and in actionable-genomic-alteration NSCLC. Stomatitis + ocular toxicity = distinguishing AE profile vs T-DXd. Trial-source SRCs for TROPION-Breast01 and TROPION-Lung01 not yet ingested into KB — FLAG for follow-up.

notes_patient: >
  ADC-препарат («біологічний снаряд») проти білка TROP2 — точково доставляє хіміо-вантаж у клітини раку грудей чи легенів. Затверджено FDA у січні 2025 для HR+/HER2- РМЗ після гормонотерапії. Можливі: запалення слизової роту, сухість очей, рідко — пневмоніт.
