id: DRUG-DAUNORUBICIN
names:
  preferred: "Daunorubicin"
  ukrainian: "Даунорубіцин"
  english: "Daunorubicin"
  brand_names: ["Cerubidine", "Vyxeos (liposomal daunorubicin + cytarabine)"]
atc_code: L01DB02
rxnorm_id: "3088"
drug_class: "Anthracycline (topoisomerase II inhibitor + DNA intercalator)"
mechanism: >
  Intercalates into DNA, inhibits topoisomerase II, generates free radicals.
  Cumulative cardiotoxicity dose-dependent. Backbone of AML 7+3 induction.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Гострий мієлоїдний лейкоз (7+3 індукція)"
      - "Гострий промієлоцитарний лейкоз (AIDA, з ATRA/ATO)"
      - "Гострий лімфобластний лейкоз (індукція)"
    last_verified: "2026-04-27"
typical_dosing: >
  AML 7+3 induction: 60 mg/m² IV days 1-3 (standard); 90 mg/m² days 1-3
  (intensified, ECOG-ALL trial — younger fit patients <60). Vyxeos
  (liposomal): 44 mg/m² daunorubicin + 100 mg/m² cytarabine days 1, 3, 5
  for tAML / AML-MRC.
formulations: ["IV powder 20 mg vial"]

absolute_contraindications:
  - "Severe pre-existing cardiac dysfunction (LVEF <40%)"
  - "Cumulative anthracycline dose at threshold (~550 mg/m² lifetime)"
  - "Severe hepatic impairment"
  - "Pregnancy"
black_box_warnings:
  - "Cardiotoxicity (cumulative; risk rises sharply >550 mg/m²)"
  - "Severe myelosuppression"
  - "Vesicant — extravasation causes severe tissue necrosis"
major_interactions:
  - "Other anthracyclines / mediastinal radiation: additive cardiotoxicity"
common_adverse_events:
  - "Severe myelosuppression (expected; nadir d10-14)"
  - "Mucositis"
  - "Alopecia"
  - "Nausea/vomiting (moderately emetogenic)"
  - "Red urine discoloration (benign)"
serious_adverse_events:
  - "Acute cardiotoxicity (arrhythmia, rare cardiomyopathy)"
  - "Late cardiomyopathy (cumulative dose)"
  - "Extravasation tissue necrosis"

pharmacology: {half_life: "~18 hours"}

sources:
  - SRC-NCCN-AML-2025
  - SRC-ELN-AML-2022

last_reviewed: "2026-04-25"
notes: >
  Backbone of 7+3 (cytarabine 100-200 mg/m² CIVI d1-7 + daunorubicin 60-90
  mg/m² d1-3). Idarubicin 12 mg/m² is an interchangeable alternative
  (especially in some European protocols). Baseline LVEF + lifetime
  anthracycline dose tracking mandatory.
