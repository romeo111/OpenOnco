id: DRUG-DEGARELIX
names:
  preferred: "Degarelix"
  ukrainian: "Дегарелікс"
  english: "Degarelix"
  brand_names: ["Firmagon"]
atc_code: L02BX02
rxnorm_id: null
drug_class: "GnRH antagonist (LHRH antagonist)"
mechanism: >
  Direct GnRH-receptor antagonist — immediate (no flare) suppression of LH/FSH and testosterone within days, vs 2-4 weeks for agonists. Preferred when rapid testosterone suppression is required (e.g., spinal cord compression risk, severe bone pain, hyperviscous metastatic burden).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "Зареєстрований; НЕ покривається НСЗУ — лейпролід / госерелін є стандартом онкопакету для АДТ. Перевірено 2026-04-27 (drlz.com.ua)."
typical_dosing: >
  Loading: 240 mg SC (two 3-mL injections) on day 1; maintenance 80 mg SC monthly.

key_toxicities:
  - Local injection-site reactions (~40%, more common than agonists)
  - Hot flashes (similar to agonists)
  - Hepatic transaminase elevations (~10%)

sources: [SRC-NCCN-PROSTATE-2025, SRC-ESMO-PROSTATE-2024]
last_reviewed: null
notes: >
  First-choice ADT when rapid suppression matters or when tumor flare is unacceptable. Also slightly lower CV-event risk vs LHRH agonists in some meta-analyses.

notes_ua: >
  Дегарелікс (degarelix) — препарат вибору для андроген-депривіальної
  терапії, коли необхідна швидка супресія тестостерону або коли
  пухлинний flare неприпустимий (загроза компресії спинного мозку,
  тяжкий кістковий біль, гіперв'язке метастатичне навантаження). За
  даними окремих мета-аналізів дещо нижчий ризик серцево-судинних
  подій порівняно з LHRH-агоністами.

