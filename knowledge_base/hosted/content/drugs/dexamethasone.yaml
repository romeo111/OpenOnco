id: DRUG-DEXAMETHASONE
names:
  preferred: "Dexamethasone"
  ukrainian: "Дексаметазон"
  english: "Dexamethasone"
  brand_names:
    - "Decadron"
    - "Dexamed"
atc_code: H02AB02
rxnorm_id: "3264"
drug_class: "corticosteroid — synthetic long-acting glucocorticoid"
mechanism: >
  Binds the glucocorticoid receptor; in myeloma cells induces apoptosis
  through suppression of NF-κB signaling and direct effects on
  glucocorticoid-responsive plasma cell pathways. Synergistic with
  proteasome inhibitors and IMiDs.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 1958
    indications_brief: ["Multiple myeloma (combination)", "ALL induction", "Lymphoma R-CHOP/CHOEP", "Antiemetic", "Cerebral edema (brain metastases)", "GVHD treatment"]
  ema:
    approved: true
    year_first_approval: 1962
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Антиеметична профілактика при високоемоегенній хіміотерапії"
      - "Множинна мієлома (VRd, VCD, Rd, KRd — компонент)"
      - "Лімфоми (R-CHOP, BEACOPP, R-DHAP)"
      - "Симптоматичне лікування пухлинного набряку (ЦНС, спинальної компресії)"
    last_verified: "2026-04-27"
absolute_contraindications:
  - "Systemic fungal infection (uncontrolled)"
  - "Hypersensitivity"
black_box_warnings: []
major_interactions:
  - "CYP3A4 substrate — strong inducers (rifampin, phenytoin, carbamazepine) reduce dex efficacy; strong inhibitors (azoles, ritonavir) increase exposure → Cushingoid features"
  - "Live vaccines — contraindicated during chronic high-dose use (immunosuppression)"
  - "NSAIDs — additive GI ulceration / bleeding risk; PPI prophylaxis when co-administered"
  - "Warfarin — variable INR shift; monitor closely"
  - "Anti-diabetic agents — hyperglycemia requires dose escalation of insulin / metformin"
  - "Diuretics — additive hypokalemia"
  - "Aprepitant — increases dex AUC ~2-fold; reduce dex by 50% on co-administration day"
common_adverse_events:
  - "Hyperglycemia — ~30-50% in MM weekly schedule"
  - "Insomnia, mood elevation / agitation — ~50%"
  - "Increased appetite, weight gain — ~30%"
  - "Fluid retention, hypertension — ~25%"
  - "Increased infection susceptibility — universal effect"
  - "Muscle weakness (steroid myopathy) — ~20%"
  - "Cushingoid features (chronic) — common"
  - "Skin atrophy, easy bruising — chronic exposure"
  - "Cataract / posterior subcapsular — long-term"
  - "Dyspepsia, GI ulceration — ~10-15%"
  - "Acne — ~10%"
serious_adverse_events:
  - "Adrenal suppression with abrupt discontinuation (taper required after >2 weeks of pharmacologic dosing)"
  - "Severe psychiatric reactions (steroid psychosis, mania, severe depression)"
  - "Avascular necrosis of femoral head (long-term, especially in pediatric ALL)"
  - "Opportunistic infections (PJP, fungal, reactivated HSV/VZV/CMV)"
  - "GI bleeding / perforation"
  - "Hyperglycemic emergency (DKA / HHS)"
  - "Tumor lysis syndrome (when used as cytoreductive in CLL/lymphoma)"

pharmacology:
  half_life_hours: 4  # plasma ~4 h; biological effect 36-72 h
  clearance: "hepatic"
  protein_binding_pct: 70
  metabolism: "CYP3A4 — hepatic oxidation; renal excretion of metabolites"

sources:
  - SRC-NCCN-MM-2025

last_reviewed: "2026-04-26"
reviewers: []
notes: >
  In frail / elderly (>75 yrs) patients, weekly dose reduced to 20 mg to
  improve tolerability without compromising efficacy (FRAIL / IFM/HOVON
  data). PJP prophylaxis indicated when used at induction doses for ≥4
  weeks combined with other immunosuppressives.

notes_ua: >
  У слабких / літніх пацієнтів (>75 років) щотижневу дозу дексаметазону
  (dexamethasone) знижують до 20 mg для покращення переносимості без
  втрати ефективності (дані FRAIL / IFM / HOVON). Профілактика PJP
  показана при застосуванні в індукційних дозах ≥4 тижні у поєднанні
  з іншими імуносупресивними препаратами. Препарат — компонент
  багатьох мієломних режимів (VRd, VCD, Rd, KRd), лімфомних схем
  (R-CHOP, BEACOPP, R-DHAP), а також стандарт антиеметичної
  премедикації при HEC та симптоматичної терапії пухлинного набряку
  (ЦНС, спінальна компресія).

ukrainian_review_status: pending_clinical_signoff
