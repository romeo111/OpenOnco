id: DRUG-DORDAVIPRONE
name: "Dordaviprone"
name_ua: "Дордавіпрон"
synonyms: ["ONC201", "TRC-1062"]
brand_names: ["Ogenio"]
drug_class: "Dopamine receptor D2/D3 antagonist + mitochondrial ClpP agonist"
atc_code: ""
mechanism_of_action: >
  Dordaviprone (ONC201) is a first-in-class imipridone compound with dual mechanism:
  (1) Antagonizes dopamine D2 and D3 receptors (DRD2/DRD3) on tumor cells;
  (2) Activates mitochondrial caseinolytic protease P (ClpP), leading to
  mitochondrial unfolded protein response (UPRmt), integrated stress response (ISR),
  and selective apoptosis in H3K27M-mutant tumor cells. The H3K27M mutation creates
  a unique vulnerability to ClpP activation and DRD2 antagonism not present in
  H3K27-wildtype gliomas, providing tumor selectivity.
standard_doses:
  - indication: "H3K27M-mutant diffuse glioma after prior radiotherapy"
    dose: "625 mg PO once weekly"
    schedule: "Once weekly on the same day each week; can be taken with or without food"
    notes: >
      625 mg is the adult dose. Weight-based dosing for pediatric patients per
      FDA-approved prescribing information (Ogenio USPI). Take at approximately
      the same time each week. No dose reduction defined for most toxicities.
key_toxicities:
  - "Nausea/vomiting: common (~40-50% any grade); antiemetics as needed"
  - "Fatigue: common (~30-40%)"
  - "Diarrhea: ~25%"
  - "Headache: ~20-30% (may reflect tumor pseudoprogression or edema)"
  - "QTc prolongation: uncommon but monitor baseline ECG"
  - "Generally well-tolerated vs cytotoxic chemotherapy; Grade 3+ AEs ~10-15%"
monitoring:
  - "Baseline ECG (QTc monitoring)"
  - "CBC, CMP at baseline and periodically"
  - "MRI brain ±spine: Q8 weeks during treatment (caveat: pseudoprogression assessment difficult)"
  - "Neurological assessment: document symptoms at each visit"
drug_interactions:
  - "Strong CYP3A4 inhibitors: may increase dordaviprone exposure (monitor for toxicity)"
  - "Strong CYP3A4 inducers: may reduce efficacy"
  - "QTc-prolonging agents: additive risk"
pregnancy_category: "Embryo-fetal toxicity — effective contraception required"
ua_registration_status: not_registered
ua_notes: >
  Not registered in Ukraine as of 2026-05-04. Access only via named-patient/
  compassionate use (Chimerix/Prelude Therapeutics) or cross-border treatment.
  Orphan drug designation.
last_reviewed: "2026-05-04"
drafted_by: claude_extraction
