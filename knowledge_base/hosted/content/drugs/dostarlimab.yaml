    notes: "Не зареєстровано per drlz.com.ua snapshot 2026-04-27. Pembrolizumab dominates UA НСЗУ ICI landscape and is the typical anti-PD-1 used for dMMR/MSI-H endometrial; dostarlimab access via EAP GSK / cross-border / self-pay."

typical_dosing: >
  Induction: 500 mg IV every 3 weeks for 4 doses (cycles 1-4),
  followed by maintenance 1000 mg IV every 6 weeks until disease
  progression / unacceptable toxicity / up to 24 months. In RUBY
  combo: dostarlimab 500 mg + carboplatin AUC 5 + paclitaxel 175
  mg/m² every 3 weeks for 6 cycles, then dostarlimab 1000 mg q6w
  monotherapy maintenance. Infuse over 30 minutes (first dose); 30
  minutes for subsequent doses if first tolerated. No premedication
  required. No formal renal or hepatic adjustment (mAb catabolism).
  Hold for G2-3 irAE; permanently discontinue for G4 irAE,
  myocarditis, recurrent G3 despite steroids, or any
  life-threatening reaction.

formulations:
  - "IV concentrate 500 mg / 10 mL single-dose vial"

absolute_contraindications:
  - "Severe hypersensitivity to dostarlimab or any excipient"
  - "Active solid-organ transplant on calcineurin inhibitor (high rejection risk; case-by-case)"

black_box_warnings: []

common_adverse_events:
  - "Fatigue ~40%"
  - "Anemia ~30% any-grade (with chemo combo); ~15% mono"
  - "Nausea ~30%"
  - "Diarrhea ~25%"
  - "Constipation ~20%"
  - "Pruritus / rash ~25%"
  - "Vomiting ~20%"
  - "Hypothyroidism ~10-15%"
  - "Hyperthyroidism ~3-5%"
  - "Decreased appetite ~17%"
  - "Cough ~15%"
  - "Arthralgia ~15%"

serious_adverse_events:
  - "Immune-mediated pneumonitis (G3+ ~2%)"
  - "Immune-mediated colitis (G3+ ~2%)"
  - "Immune-mediated hepatitis (G3+ ~3%)"
  - "Immune-mediated endocrinopathies (thyroiditis, hypophysitis, adrenal insufficiency, type-1 DM)"
  - "Immune-mediated nephritis (~1%)"
  - "Severe cutaneous reactions (SJS / TEN / DRESS — rare)"
  - "Myocarditis (rare; high mortality)"
  - "Solid-organ transplant rejection"
  - "Encephalitis / GBS / myasthenic syndrome (rare)"
  - "Severe infusion reactions"

major_interactions:
  - "Systemic corticosteroids ≥10 mg prednisone-equivalent at baseline — may blunt activity; avoid unless required for prior irAE"
  - "Live attenuated vaccines — avoid during therapy and ≥3 months after"
  - "Concurrent CTLA-4 inhibitors — toxicity additive; not standard for endometrial"
  - "Concomitant chemotherapy (carboplatin + paclitaxel per RUBY) — additive cytopenia / fatigue"
  - "Calcineurin inhibitors / immunosuppressants in transplant — rejection vs efficacy trade-off"

pharmacology:
  half_life_hours: 596
  clearance: "non-renal (proteolytic catabolism); ~25 days terminal"
  protein_binding_pct: null
  metabolism: "n/a (mAb catabolism to amino acids)"

