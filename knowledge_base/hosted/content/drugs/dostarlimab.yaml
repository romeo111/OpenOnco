id: DRUG-DOSTARLIMAB
names:
  preferred: "Dostarlimab"
  ukrainian: "Достарлімаб"
  english: "Dostarlimab"
  synonyms: ["TSR-042", "dostarlimab-gxly"]
  brand_names: ["Jemperli"]
atc_code: L01FF07
rxnorm_id: ""
drug_class: "Anti-PD-1 humanized IgG4 monoclonal antibody (immune checkpoint inhibitor)"
mechanism: >
  Humanized IgG4κ (S228P-stabilized) monoclonal antibody binding
  programmed cell death protein 1 (PD-1) on activated T cells,
  preventing engagement with PD-L1 / PD-L2 and restoring
  anti-tumor T-cell function. Pharmacologic class is identical to
  pembrolizumab / nivolumab / cemiplimab; distinct binding epitope
  with no clinically meaningful efficacy differential. Approved on
  the basis of GARNET (single-arm endometrial cancer dMMR/MSI-H
  2L+: ORR ~45%) and RUBY (1L primary advanced or recurrent
  endometrial cancer with carbo+pac chemo backbone: dMMR/MSI-H
  PFS HR 0.30, all-comers PFS HR 0.64, OS benefit), and tumor-
  agnostic dMMR/MSI-H solid tumors post-platinum. The Cercek 2022
  proof-of-concept study in dMMR locally advanced rectal cancer
  showed clinical CR in 100% of 12 patients (now extended in
  larger cohorts) — neoadjuvant ICI monotherapy avoiding chemo +
  RT + surgery in this niche.

