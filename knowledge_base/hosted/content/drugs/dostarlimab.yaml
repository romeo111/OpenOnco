id: DRUG-DOSTARLIMAB
names:
  preferred: "Dostarlimab"
  ukrainian: "Достарлімаб"
  english: "Dostarlimab"
  brand_names: ["Jemperli"]
atc_code: L01FF07
rxnorm_id: null
drug_class: "Anti-PD-1 monoclonal antibody"
mechanism: >
  Anti-PD-1 IgG4. Endometrial advanced/recurrent + chemo (RUBY); tumor-agnostic dMMR/MSI-H post-platinum monotherapy.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      Anti-PD-1 для dMMR/MSI-H endometrial Ca та dMMR rectal Ca neoadjuvant;
      не входить до НСЗУ (на відміну від pembrolizumab — частково покривається).
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP GSK Ukraine (Jemperli access program; критерії:
        dMMR/MSI-H confirmation IHC або NGS).
      - Cross-border (EU): EU онкоцентри через "Лікування за кордоном"
        (наказ МОЗ 988); RUBY SoC у EU для primary advanced/recurrent EC.
      - Trial-only: GARNET, RUBY post-marketing.
      Source: drlz.com.ua пошук "dostarlimab"/"jemperli" 2026-04-27 — РП відсутнє.

typical_dosing: >
  500 mg IV q3w induction → 1000 mg IV q6w maintenance.

key_toxicities:
  - Standard ICI immune-mediated AEs
  - Fatigue
  - Anemia (with chemo)
  - Pneumonitis

sources: [SRC-NCCN-NSCLC-2025]
last_reviewed: null
notes: >
  STUB. RUBY: endometrial dMMR PFS HR 0.30. Not registered in Ukraine.
