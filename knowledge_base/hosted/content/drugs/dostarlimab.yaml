notes: >
  RUBY (NEJM 2023) — paradigm-shifting trial in primary advanced /
  recurrent endometrial cancer: dostarlimab + carbo+pac chemo vs
  chemo alone, dMMR PFS HR 0.30 (massive effect, OS benefit
  emerging); all-comers PFS HR 0.64. Has redefined 1L systemic
  therapy for advanced endometrial cancer along with KEYNOTE-868
  (pembrolizumab + chemo). Tumor-agnostic dMMR solid-tumor approval
  parallels pembrolizumab. Cercek 2022 dMMR rectal study (100% cCR
  with dostarlimab neoadjuvant — avoiding chemo+RT+surgery) is
  practice-changing for this rare niche. Baseline workup: TFTs,
  LFTs, creatinine, cortisol, HbA1c, troponin if cardiac history,
  HBV/HCV serology, baseline imaging, dermatologic + pulmonary
  review, dMMR/MSI-H confirmation by IHC or NGS for monotherapy
  indications. Monitor TFTs / LFTs / creatinine before each dose
  for first 6 cycles then q2 cycles. Refer for organ-specific
  consultation at first sign of irAE. UA access via EAP GSK / cross-
  border / self-pay; not on НСЗУ. Pembrolizumab is the dominant
  anti-PD-1 used in UA for dMMR endometrial.

notes_ua: >
  RUBY (NEJM 2023) — парадигма-зсувне дослідження при первинно
  поширеному / рецидивному раку ендометрія: достарлімаб (dostarlimab) +
  карбоплатин + паклітаксел проти хіміотерапії окремо, dMMR PFS HR
  0.30 (виражений ефект, OS-перевага наростає); у всій популяції
  PFS HR 0.64. Дослідження переформатувало 1-шу лінію системної
  терапії при поширеному раку ендометрія разом з KEYNOTE-868
  (пембролізумаб + хіміотерапія). Tumor-agnostic dMMR-показання
  паралельне такому в пембролізумабу. Cercek (2022) при dMMR
  локально поширеному раку прямої кишки (100% клінічної повної
  відповіді на неоад'ювантну монотерапію достарлімабом — уникнення
  хіміотерапії + RT + хірургії) — практико-змінне для цієї рідкісної
  ніші. Базове обстеження: TFTs, LFTs, креатинін, кортизол, HbA1c,
  тропонін за наявності кардіологічного анамнезу, серологія HBV/HCV,
  базова візуалізація, дерматологічна та пульмонологічна оцінка,
  підтвердження dMMR/MSI-H IHC або NGS для монотерапевтичних
  показань. Моніторинг TFTs / LFTs / креатиніну перед кожною дозою
  перші 6 циклів, далі через цикл. Консультація відповідного
  спеціаліста при перших ознаках irAE. В Україні доступ — через EAP
  GSK, транскордонне лікування або out-of-pocket; не покривається
  НСЗУ. Пембролізумаб — переважний анти-PD-1 у НСЗУ-практиці при
  dMMR-ендометріальному раку.

