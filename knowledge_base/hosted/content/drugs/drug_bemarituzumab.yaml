notes: >
  First-in-class IIIb-selective afucosylated anti-FGFR2b mAb (Amgen;
  development name FPA144). FDA Breakthrough Therapy Designation
  awarded April 2021 for FGFR2b-overexpressing 1L gastric/GEJ.
  Pivotal evidence: FIGHT phase 2 (Wainberg et al. Lancet Oncol 2022;
  bemarituzumab + mFOLFOX6 vs placebo + mFOLFOX6 in FGFR2b ≥10%
  2+/3+ subgroup — mPFS 9.5 vs 7.4 mo, HR 0.68); FORTITUDE-101
  phase 3 (Rha et al. ESMO 2025 LBA10; NCT05052801) — primary
  analysis (median follow-up 11.8 mo): mOS 17.9 vs 12.5 mo (HR 0.61,
  p=0.005); mPFS 8.6 vs 6.7 mo. Updated descriptive analysis (median
  follow-up 19.4 mo) showed mOS 14.5 vs 13.2 mo (HR 0.82) — early
  survival gain attenuated, raising practice-changing controversy at
  ESMO 2025 (one discussant flagged absence of PD-1 backbone in
  control arm and shrinking median OS difference). Ocular toxicity is
  the dose-defining AE (~70% any-grade corneal events, ~25% G≥3,
  typical onset ~6 months) — mandatory baseline + serial slit-lamp
  ophthalmology REQUIRED before each cycle. Companion diagnostic
  (Ventana FGFR2b RxDx, IIIb-selective IHC) defines eligibility as
  2+/3+ membranous staining ≥10% of tumor cells; FGFR2b high-positive
  (≥10% 2+/3+) ~30% of HER2-non-positive gastric/GEJ. Hierarchy when
  multiple actionable signals co-occur in HER2-non-positive 1L
  gastric/GEJ: HER2+ trastuzumab supersedes; MSI-H pembrolizumab
  supersedes; CLDN18.2 ≥75% zolbetuximab supersedes (phase 3 OS
  established Oct 2024 vs FORTITUDE-101 attenuated benefit);
  bemarituzumab reserved for FGFR2b ≥10% with CLDN18.2 <75%. STUB
  pending Clinical Co-Lead sign-off (CHARTER §6.1: ≥2 reviewers for
  clinical content). Drug-stub created to resolve transient ref-error
  introduced by REG-BEMARITUZUMAB-MFOLFOX6 (issue #413 bemfill).

notes_ua: >
  Перший представник класу IIIb-селективних афукозильованих анти-FGFR2b
  моноклональних антитіл (Amgen; робоча назва FPA144). У квітні 2021
  отримав статус «проривної терапії» FDA (Breakthrough Therapy Designation)
  для 1L гастро-стравохідних пухлин з гіперекспресією FGFR2b. Опорні дані: FIGHT, фаза 2 (Wainberg
  et al., Lancet Oncol 2022; бемаритузумаб (bemarituzumab) + mFOLFOX6
  проти плацебо + mFOLFOX6 у підгрупі FGFR2b ≥10% 2+/3+ — mPFS 9.5 vs
  7.4 mo, HR 0.68); FORTITUDE-101, фаза 3 (Rha et al., ESMO 2025 LBA10;
  NCT05052801) — первинний аналіз (медіана спостереження 11.8 mo):
  mOS 17.9 vs 12.5 mo (HR 0.61, p=0.005); mPFS 8.6 vs 6.7 mo. Оновлений
  дескриптивний аналіз (медіана спостереження 19.4 mo): mOS 14.5 vs
  13.2 mo (HR 0.82) — рання перевага за виживаністю згасла, що
  спричинило обговорення на ESMO 2025 (відсутність PD-1 інгібітора у
  контрольній групі, зменшення різниці медіан OS). Окулярна токсичність —
  дозолімітуюче небажане явище (~70% будь-якого ступеня корнеальних подій,
  ~25% G≥3, типовий початок ~6 місяців) — ОБОВ'ЯЗКОВИЙ базовий та
  серійний офтальмологічний огляд (slit-lamp) перед кожним циклом.
  Companion diagnostic (Ventana FGFR2b RxDx, IIIb-селективна IHC):
  критерії придатності — 2+/3+ мембранозне фарбування ≥10% пухлинних
  клітин; FGFR2b high-positive (≥10% 2+/3+) присутній у ~30%
  HER2-негативного гастро-стравохідного раку. Ієрархія за наявності
  кількох actionable-сигналів у HER2-негативному 1L гастро-стравохідному:
  HER2+ trastuzumab переважає; MSI-H pembrolizumab переважає;
  CLDN18.2 ≥75% zolbetuximab переважає (OS фази 3 встановлено у жовтні
  2024 проти послабленої вигоди FORTITUDE-101); бемаритузумаб
  резервується для FGFR2b ≥10% з CLDN18.2 <75%. STUB чекає на
  підписання клінічних co-lead (CHARTER §6.1: ≥2 рецензентів для
  клінічного контенту). Drug-stub створено для розв'язання тимчасової
  ref-error, яку вніс REG-BEMARITUZUMAB-MFOLFOX6 (issue #413 bemfill).

