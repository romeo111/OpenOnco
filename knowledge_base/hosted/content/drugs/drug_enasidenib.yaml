id: DRUG-ENASIDENIB
names:
  preferred: "Enasidenib"
  ukrainian: "Енасиденіб"
  english: "Enasidenib"
  brand_names:
    - "Idhifa"
atc_code: L01XX59
rxnorm_id: "1985802"
drug_class: "Selective IDH2 (mutant) enzyme inhibitor"
mechanism: >
  Small-molecule allosteric inhibitor of mutant IDH2 enzyme (R140Q,
  R172K hotspots). Mutant IDH2 catalyzes neomorphic conversion of
  α-ketoglutarate to 2-hydroxyglutarate (2-HG), an oncometabolite that
  drives DNA + histone hypermethylation and blocks myeloid
  differentiation. Enasidenib reduces 2-HG, restoring TET2-dependent
  demethylation and inducing terminal differentiation of leukemic
  blasts. FDA-approved Aug 2017 on the basis of phase 1/2 single-arm
  data in R/R AML (AG221-AML-001).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2017
    indications_brief:
      - "Relapsed/refractory IDH2-mutated AML (adult)"
  ema:
    approved: false  # CHMP negative opinion 2018; not approved in EU
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-30"
    notes: |
      Не зареєстровано в Україні (FDA схвалено серпень 2017; EMA — негативний висновок CHMP 2018).
      IDH2-інгібітор для R/R IDH2-мутованої ГМЛ; не входить до НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл) — за рахунок пацієнта.
      - EAP / compassionate-use programme (Bristol-Myers Squibb / Servier — sponsor)
        для відповідних пацієнтів з підтвердженою IDH2 R140Q/R172K мутацією.
      - Cross-border (US): US гематоцентри через "Лікування за кордоном"
        (наказ МОЗ 988); EU доступ обмежений через відсутність EMA схвалення.
      - Trial-only: IDHENTIFY post-marketing, IDH2 + ven+aza комбінаційні дослідження.
      Source: drlz.com.ua пошук "enasidenib"/"idhifa" 2026-04-30 — РП відсутнє.

typical_dosing: >
  100 mg PO once daily, continuous, until disease progression or
  unacceptable toxicity. Take with or without food at the same time
  each day. Median time to first response ~1.9 months; continue ≥6
  months before declaring non-response.

formulations: ["Tablets 50 mg / 100 mg"]

absolute_contraindications:
  - "Hypersensitivity to enasidenib"

black_box_warnings:
  - "Differentiation syndrome — fatal if not recognized; corticosteroids + hydroxyurea + dose interruption mandatory (~14% in IDHENTIFY)"

major_interactions:
  - "Strong CYP3A4 inducers (rifampin, phenytoin, carbamazepine, St John's wort) — avoid; reduce enasidenib exposure"
  - "OATP1B1 / OATP1B3 substrates (simvastatin, rosuvastatin) — enasidenib inhibits transporters; consider lower statin dose"
  - "P-gp substrates (digoxin) — enasidenib inhibits P-gp; monitor digoxin levels"
  - "Concurrent UGT1A1 substrates (irinotecan SN-38) — additive hyperbilirubinemia risk"

common_adverse_events:
  - "Hyperbilirubinemia (~80% any grade; ~12% grade ≥3) — UGT1A1 inhibition, usually asymptomatic, no dose adjustment unless symptomatic"
  - "Nausea / vomiting"
  - "Decreased appetite"
  - "Diarrhea"
  - "Fatigue"
  - "Anemia / thrombocytopenia / neutropenia"

serious_adverse_events:
  - "Differentiation syndrome (~14%; fatal cases reported in early experience)"
  - "Tumor lysis syndrome (uncommon but reported in high-burden disease)"
  - "Leukocytosis (~30% during differentiation; can mimic disease progression)"

pharmacology:
  half_life_hours: 137  # accumulates with continuous dosing; steady-state day 14-29
  metabolism: "CYP3A4 + UGT1A1 mediated; minimal renal clearance"
  protein_binding_pct: 99

sources: [SRC-NCCN-AML-2025, SRC-ELN-AML-2022]
last_reviewed: "2026-04-30"
notes: >
  Pivotal trials: AG221-AML-001 (Stein et al., Blood 2017) — phase 1/2
  monotherapy in R/R IDH2-mut AML: ORR 38%, CR 19%, median OS 9.3 mo.
  IDHENTIFY (NCT02577406) — phase 3 enasidenib mono vs conventional
  care in R/R AML; did not show OS benefit overall but enriched
  benefit in IDH2-mut HMA-naive subgroup. AG221-AML-005 — combination
  with azacitidine in 1L unfit IDH2-mut AML: ORR 71%, CR 53% — basis
  for emerging 1L combination use. Differentiation syndrome (~14%) is
  the signature AE — same monitoring + dexamethasone protocol as
  ivosidenib. Hyperbilirubinemia (~80% any grade) is biochemical
  UGT1A1 inhibition — usually asymptomatic, no dose adjustment unless
  symptomatic. Ukraine: NOT registered, NOT reimbursed; EU access
  also limited (CHMP negative). Trial source SRC-IDHENTIFY pending —
  citing umbrella SRC-NCCN-AML-2025 + SRC-ELN-AML-2022.

notes_ua: >
  Опорні дослідження енасиденібу (enasidenib): AG221-AML-001 (Stein et al.,
  Blood 2017) — фаза 1/2, монотерапія при R/R IDH2-мутантному ГМЛ:
  ORR 38%, CR 19%, медіана OS 9.3 mo. IDHENTIFY (NCT02577406) — фаза 3,
  енасиденіб vs конвенційна терапія при R/R ГМЛ: загальної переваги за OS
  не показано, проте відзначено вигоду в HMA-наївній IDH2-mut підгрупі.
  AG221-AML-005 — комбінація з азацитидином у 1-й лінії при unfit IDH2-mut
  ГМЛ: ORR 71%, CR 53% — основа для розгортання 1L-комбінованих режимів.
  Сигнатурне небажане явище — синдром диференціації (~14%); протокол
  моніторингу та терапії дексаметазоном — аналогічний такому при
  івосиденібі. Гіперібілірубінемія (~80% будь-якого ступеня) — біохімічна
  ознака інгібування UGT1A1; зазвичай безсимптомна, без необхідності
  корекції дози за відсутності симптомів. В Україні: НЕ зареєстровано,
  НЕ покривається НСЗУ; доступ у EU також обмежений (CHMP — негативний
  висновок). Trial-source SRC-IDHENTIFY ще не внесено — посилання на
  загальні джерела SRC-NCCN-AML-2025 + SRC-ELN-AML-2022.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_14a
draft_revision: 2
notes_patient: >
  Селективний інгібітор мутантного ферменту IDH2 — таргетна терапія
  для ГМЛ з мутацією IDH2 R140Q або R172K. FDA-схвалено у США
  (серпень 2017). В Україні не зареєстрований; доступ через
  міжнародне направлення або програму співчутливого використання.
  Прийом — таблетка раз на день. Сигнатурний побічний ефект —
  синдром диференціації (лихоманка, задишка, набір ваги, випоти),
  який потребує негайного дексаметазону + паузи препарату. Часто
  спостерігається безсимптомне підвищення білірубіну.
