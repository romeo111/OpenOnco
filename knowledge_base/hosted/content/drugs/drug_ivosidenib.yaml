id: DRUG-IVOSIDENIB
names:
  preferred: "Ivosidenib"
  ukrainian: "Івосіденіб"
  english: "Ivosidenib"
  brand_names: ["Tibsovo"]
atc_code: L01XE48
rxnorm_id:
drug_class: "IDH1 inhibitor (targeted small molecule)"
mechanism: >
  Selective inhibitor of mutant isocitrate dehydrogenase 1 (IDH1; R132C/H/G/S/L hotspot
  mutations). Mutant IDH1 converts alpha-ketoglutarate to the oncometabolite
  2-hydroxyglutarate (2-HG), which drives epigenetic dysregulation and blocks differentiation.
  Ivosidenib reduces 2-HG levels, restoring differentiation programs. Active only in
  IDH1-mutant tumors; no activity in IDH1-wildtype or IDH2-mutant disease.

regulatory_status:
  fda:
    approved: true
    indications:
      - "IDH1-mutant R/R AML ≥18 years (2018)"
      - "IDH1-mutant newly-diagnosed AML ≥75 years or unfit for intensive chemotherapy (2019)"
      - "IDH1-mutant intrahepatic cholangiocarcinoma, previously treated (2021; ClarIDHy)"
  ema:
    approved: true
    indications:
      - "IDH1-mutant R/R AML (2023)"
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-05-04"
    notes: >
      NOT registered in Ukraine as of May 2026. Named-patient import only (Tibsovo;
      Servier). Access for CCA or AML requires individual regulatory authorization
      (МОЗ named-patient pathway). Cost significant. For IDH1-mutant intrahepatic
      CCA in Ukraine: clinical trial referral preferred when available; ivosidenib
      only via named-patient when FOLFOX clearly insufficient and patient/family
      can access import pathway.

typical_dosing: >
  500 mg PO once daily (fasted or with low-fat meal); continuous until disease
  progression or unacceptable toxicity. QTc monitoring mandatory.

key_toxicities:
  - "QTc prolongation (any grade ~24%; Grade ≥3 ~7%) — ECG before start, at 1 week, monthly × 3, then q3 months; hold if QTc >500 ms"
  - "IDH differentiation syndrome (IDS; ~7-19% in AML; CCA rate lower) — corticosteroids if suspected; may require hold"
  - "Fatigue (any grade ~40%)"
  - "Nausea/vomiting (~30%; Grade ≥3 <5%)"
  - "Diarrhea (~25%)"
  - "Ascites (~22% in CCA; underlying liver disease + tumor burden)"
  - "Edema (~19%)"
  - "Dysgeusia (metallic taste)"
  - "Drug interactions: strong CYP3A4 inhibitors ↑ ivosidenib exposure; rifampin/carbamazepine ↓ levels; statins ↑ risk"

sources:
  - SRC-NCCN-HEPATOBILIARY
  - SRC-ESMO-BTC-2023
last_reviewed: "2026-05-04"
notes: >
  ClarIDHy trial (Abou-Alfa 2020 NEJM; 2023 JCO update; n=185): ivosidenib 500 mg/day vs
  placebo in IDH1-mutant previously-treated intrahepatic CCA. mOS 10.3 vs 7.5 months
  (HR 0.79; p=0.093 primary; 2023 crossover-adjusted HR ~0.49). mPFS 2.7 vs 1.4 months
  (HR 0.37; p<0.001). ORR 2% (mainly SD; landmark disease control). FDA approved 2021.
  NCCN Hepatobiliary 2025 Cat 1 for IDH1-mutant intrahepatic CCA.
  IDH1 mutation testing: ~15-20% of intrahepatic CCA; hotspot sequencing (R132C most
  common; also R132H/G/S/L). FISH not applicable; requires PCR or NGS hotspot panel.
  Differentiation syndrome in CCA: rare vs AML (no marrow blast context); monitor for
  fever, hypoxia, pulmonary infiltrates, pericardial effusion.
notes_patient: >
  Таблетка, що блокує мутацію IDH1 у пухлинній клітині (1 таблетка 500 мг щодня). Може
  подовжувати інтервал QT на ЕКГ — ЕКГ-контроль обов'язковий. При лихоманці, задишці
  або набряках — негайно повідомити лікарю (синдром диференціювання IDH).
