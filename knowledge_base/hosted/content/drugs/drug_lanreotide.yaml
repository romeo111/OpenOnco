id: DRUG-LANREOTIDE
names:
  preferred: "Lanreotide"
  ukrainian: "Ланреотид"
  english: "Lanreotide"
  brand_names: ["Somatuline Depot", "Somatuline Autogel"]
atc_code: H01CB03
drug_class: "Somatostatin analog (SSA) — SSTR2/SSTR5 agonist"
mechanism: >
  Synthetic analog of somatostatin with preferential binding to somatostatin
  receptor subtypes SSTR2 and SSTR5 (expressed in >80% of well-differentiated
  neuroendocrine tumors). Binding activates receptor → inhibits adenylyl cyclase
  → reduces cAMP → dual mechanism:
  (1) ANTI-SECRETORY: suppresses hormone hypersecretion (insulin, glucagon,
  gastrin, VIP, serotonin) in functional NETs → symptom control of carcinoid
  syndrome, VIPoma, glucagonoma.
  (2) ANTIPROLIFERATIVE: direct cytostatic effect on tumor cells via SSTR2/5
  → cell cycle arrest (G0/G1 phase); suppression of local growth factor
  signaling (IGF-1, EGF) in NET microenvironment.
  Long-acting depot (Autogel/Depot) formulation: sustained-release hydrogel
  allows once-monthly SC administration with stable plasma concentrations.

regulatory_status:
  fda:
    approved: true
    approvals:
      - indication: "Unresectable, well- or moderately-differentiated, locally advanced or metastatic GEP-NET"
        approval_date: "2014-08-28"
        pathway: "Regular approval based on progression-free survival (CLARINET trial)"
        trial_basis: "CLARINET (Caplin 2014 NEJM)"
  ema:
    approved: true
    notes: "EMA approved for GEP-NET; somatostatin analogs widely used in EU NET management. EU approval older than FDA (Somatuline Autogel approved EU for functional NETs)"
  ukraine_registration:
    registered: true
    reimbursed_nszu: false
    last_verified: "2026-05-04"
    notes: >
      Lanreotide (Somatuline) is registered in Ukraine. NSZU reimbursement for
      pNET/carcinoid is limited — may require hospital compassionate or out-of-pocket
      for the depot formulation. Octreotide LAR (Sandostatin LAR; NSZU-reimbursed
      for acromegaly) may be available via off-label compassionate request for NET
      symptom control if lanreotide is inaccessible.

standard_dose:
  adult: "120 mg SC deep injection every 4 weeks (28 days), given as Autogel/Depot formulation into upper outer quadrant of buttock"
  notes: >
    CLARINET trial dose: lanreotide 120 mg SC q4w (28-day intervals). Pre-filled
    syringe administered by healthcare professional (deep SC injection into gluteal
    region). No patient self-administration required due to injection technique.
    Dose adjustments not standard in oncology use (unlike in acromegaly where dose
    titrated by IGF-1 level). Continue until progression or unacceptable toxicity.

route_of_administration: subcutaneous
drug_form: "prefilled syringe (Autogel/Depot); 120 mg/0.5 mL"

key_adverse_effects:
  - "Cholelithiasis/gallstones (~20-30%): SSA reduces bile flow → gallstone risk; baseline + periodic ultrasound"
  - "Diarrhea/steatorrhea (~10%): reduced pancreatic enzyme secretion; steatorrhea with high-fat meals"
  - "Injection site reactions (~15%): pain, induration, bruising at gluteal injection site; rotation"
  - "Bradycardia (~5%): mild sinus bradycardia; clinically significant in pre-existing cardiac disease"
  - "Hyperglycemia or hypoglycemia (~5% each): suppression of both insulin and glucagon secretion"
  - "Hypothyroidism (rare <2%): periodic TSH monitoring if on long-term SSA"
  - "GI symptoms (nausea, flatulence, abdominal discomfort): common especially first 2-3 months"

key_interactions:
  - "Ciclosporin: lanreotide reduces ciclosporin AUC (~10%); monitor tacrolimus/ciclosporin levels"
  - "Bromocriptine: SSA may reduce bromocriptine bioavailability"
  - "Hypoglycemic agents (insulin, sulfonylureas): SSA may alter glucose homeostasis; adjust doses"
  - "Antidiabetics: hyperglycemia or hypoglycemia possible; monitor HbA1c"
  - "Cardiac drugs (beta-blockers, digoxin): SSA bradycardia effect may be additive"

monitoring:
  - "Tumor assessment (CT/MRI or Ga-68-DOTATATE PET) q3-6 months"
  - "Abdominal ultrasound at baseline + q6-12 months (gallstone monitoring)"
  - "Blood glucose (fasting) at baseline + q3 months (glucose dysregulation)"
  - "LFT + CBC baseline + q3 months (hepatic toxicity rare)"
  - "TSH annually if long-term use"
  - "Chromogranin A (CgA) q3 months (NET tumor marker; correlates with burden)"
  - "24h urinary 5-HIAA if functional serotonin-secreting NET (carcinoid; midgut)"
  - "Injection site assessment each clinic visit"

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
last_reviewed: "2026-05-04"
notes: >
  CLARINET (Caplin 2014 NEJM; NCT00353496): N=204; G1/G2 GEP-NET (pNET + midgut +
  other); lanreotide 120 mg SC q4w vs placebo; mPFS NR vs 18.0 months (HR 0.47;
  95% CI 0.30–0.73; p<0.001); 24-month PFS rate 65.1% vs 33.0%. FDA approved
  August 2014. NCCN NET 2025 Category 1 for unresectable/metastatic GEP-NET.
  SSA mechanism: SSTR2/5 agonist → anti-secretory + antiproliferative dual effect.
  Well-differentiated G1/G2 SSTR-expressing NETs benefit most.
  Ukraine: registered (Somatuline); NSZU reimbursement variable. Octreotide LAR
  (Sandostatin) NSZU-accessible for acromegaly (off-label for NET).
  DRUG entity authored 2026-05-04 (Workstream DC).
