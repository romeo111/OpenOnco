id: DRUG-PACRITINIB
names:
  preferred: "Pacritinib"
  ukrainian: "Пакритиніб"
  english: "Pacritinib"
  brand_names: ["Vonjo"]
atc_code: L01EJ04
drug_class: "JAK2/FLT3/IRAK1 inhibitor (minimal JAK1 activity)"
mechanism: >
  Kinase inhibitor targeting JAK2 (primary; blocks JAK2 V617F and CALR/MPL-driven
  JAK2 signaling), FLT3, and IRAK1. Critical pharmacological distinction: pacritinib
  has MINIMAL JAK1 inhibitory activity compared to ruxolitinib and fedratinib.
  JAK1 inhibition is responsible for myelosuppression and thrombocytopenia caused by
  ruxolitinib/fedratinib. The absence of significant JAK1 inhibition allows pacritinib
  to be used in patients with severe thrombocytopenia (platelet count <50×10⁹/L)
  where ruxolitinib and fedratinib are contraindicated or not feasible.
  FLT3 inhibition contributes to blast suppression.

regulatory_status:
  fda:
    approved: true
    approvals:
      - indication: "Intermediate or high-risk primary or secondary myelofibrosis with platelet count <50×10⁹/L after prior therapy"
        approval_date: "2022-02-28"
        pathway: "Accelerated approval (FDA; priority review)"
        trial_basis: "PERSIST-2 (Harrison 2018 JAMA Oncol); PAC203 dose-optimization (Oh 2020 Blood)"
  ema:
    approved: false
    notes: "Not EMA-approved as of 2026; clinical use in EU via named-patient / compassionate access"
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-05-04"
    notes: >
      Pacritinib not registered in Ukraine. Named-patient import or compassionate-use
      program required. Significant access barrier; document explicitly when recommended.

standard_dose:
  adult: "200 mg PO twice daily (BID) with or without food"
  notes: >
    200 mg BID is the FDA-approved dose established by PAC203 dose-optimization trial
    (Oh 2020 Blood). Prior PERSIST-2 used 400 mg QD arm which showed higher GI toxicity.
    200 mg BID is preferred for tolerability.

route_of_administration: oral
drug_form: "capsule"

key_adverse_effects:
  - "Diarrhea (most common; any grade ~55%; G3 ~12%): loperamide prophylaxis recommended from cycle 1"
  - "Nausea/vomiting (any grade ~32%): antiemetics PRN; dose modification if G3"
  - "Thrombocytopenia (paradoxical worsening in ~15% — monitor CBC q2 weeks × 3 months; dose reduce if PLT <25)"
  - "QTc prolongation: baseline ECG + Q1 month × 3; avoid concurrent QTc-prolonging drugs"
  - "Anemia: typically not worsened vs baseline (unlike ruxolitinib/fedratinib — no JAK1)"
  - "Bleeding events (any grade ~11%): related to thrombocytopenia; NSAID/anticoagulant caution"

key_interactions:
  - "CYP3A4 substrate: strong CYP3A4 inhibitors (azole antifungals, clarithromycin) increase pacritinib exposure — dose reduce to 100 mg BID"
  - "Strong CYP3A4 inducers (rifampicin, phenytoin): avoid — significantly reduces pacritinib AUC"
  - "QTc-prolonging drugs: additive risk — avoid fluoroquinolones, methadone, ondansetron IV >32 mg concurrently"
  - "No thiamine requirement (unlike fedratinib; no Wernicke encephalopathy risk)"

monitoring:
  - "CBC including platelet count: baseline + q2 weeks × 3 months + monthly thereafter"
  - "ECG: baseline + 1 month + 3 months (QTc prolongation)"
  - "Electrolytes (K+, Mg²+): baseline + monthly (QTc management)"
  - "Symptom assessment: TSS (Total Symptom Score) at each visit"
  - "Spleen volume: palpation/ultrasound q3 months (response monitoring)"
