id: DRUG-PEMIGATINIB
names:
  preferred: "Pemigatinib"
  ukrainian: "Пеміґатиніб"
  english: "Pemigatinib"
  brand_names: ["Pemazyre"]
atc_code: L01EN02
rxnorm_id: null
drug_class: "Selective oral FGFR1/2/3 tyrosine kinase inhibitor"

mechanism: >
  Reversible ATP-competitive selective inhibitor of FGFR1, FGFR2, and
  FGFR3 (lower activity vs FGFR4). Active against fusion-driven and
  amplification-driven FGFR2 alterations. Approved for FGFR2-fusion
  cholangiocarcinoma (FIGHT-202), relapsed/refractory MLN-eo with FGFR1
  rearrangement (FIGHT-203), and other FGFR-driven indications.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2020
    indications_brief:
      - "Locally advanced or metastatic cholangiocarcinoma with FGFR2 fusion or other rearrangement, after at least one prior line of therapy (accelerated approval Apr 2020 → traditional 2024)"
      - "Relapsed/refractory myeloid/lymphoid neoplasm with FGFR1 rearrangement (Aug 2022)"
  ema:
    approved: true
    year_first_approval: 2021
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-30"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-30).
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл) — за рахунок пацієнта.
      - Incyte EAP — обмежено для FGFR2-fusion CCA пост-1L.
      - Cross-border (EU): EU гепатобіліарні центри через "Лікування
        за кордоном" (наказ МОЗ 988).
      - Trial-only: FIGHT-302 1L vs gem+cis (post-marketing).
      Source: drlz.com.ua пошук "pemigatinib"/"pemazyre" 2026-04-30 — РП відсутнє.

typical_dosing: >
  13.5 mg PO once daily, 14 days on / 7 days off (21-day cycle), until
  progression or unacceptable toxicity. Take with or without food.
  Monitor serum phosphate before each cycle; phosphate binders
  (sevelamer) + dietary phosphate restriction for hyperphosphatemia.

formulations:
  - "Tablets 4.5 mg, 9 mg, 13.5 mg"

absolute_contraindications:
  - "Severe hypersensitivity to pemigatinib"
  - "Pregnancy (Category D — embryo-fetal toxicity)"

black_box_warnings:
  - "Ocular toxicity: retinal pigment epithelial detachment (serous retinopathy) — baseline + serial ophtho exam; hold for symptomatic detachment"

common_adverse_events:
  - "Hyperphosphatemia (~60-90% — class effect; phosphate binders + low-phosphate diet)"
  - "Alopecia"
  - "Diarrhea"
  - "Nail toxicity (onycholysis, ridging, paronychia)"
  - "Stomatitis / mucositis"
  - "Dry mouth, dry eyes, dysgeusia"
  - "Fatigue, nausea, decreased appetite"
  - "Palmar-plantar erythrodysesthesia"

serious_adverse_events:
  - "Retinal pigment epithelial detachment / serous retinopathy"
  - "Hyperphosphatemia leading to soft-tissue calcification (rare; if persistent and severe)"
  - "Severe stomatitis / mucositis"

major_interactions:
  - "Strong CYP3A4 inhibitors — reduce pemigatinib dose; avoid where possible"
  - "Strong CYP3A4 inducers — reduce exposure; avoid"
  - "P-gp inhibitors — increased exposure"
  - "Concurrent phosphate-elevating drugs — additive hyperphosphatemia"

pharmacology:
  half_life_hours: 15
  half_life_notes: "t½ ~15.4 h; once-daily dosing; intermittent schedule (14d on / 7d off) reduces hyperphosphatemia"
  clearance: "Hepatic CYP3A4-mediated"
  protein_binding_pct: 91
  metabolism: "CYP3A4 oxidative metabolism"

sources:
  - SRC-NCCN-HEPATOBILIARY
  - SRC-ESMO-BTC-2023
  - SRC-FIGHT-202

last_reviewed: "2026-04-30"
reviewers: []
notes: >
  FIGHT-202 phase 2 (Abou-Alfa Lancet Oncol 2020): pemigatinib in
  advanced cholangiocarcinoma post-≥1L; FGFR2 fusion cohort A ORR
  35.5% (n=107), DCR 82%, mPFS 6.9 mo, mOS 21.1 mo. FDA accelerated
  approval Apr 2020; converted to traditional approval after FIGHT-302
  confirmatory. Class toxicity dominated by hyperphosphatemia and
  serous retinopathy. Resistance: gatekeeper V564F + molecular-brake
  mutations; futibatinib (covalent) retains activity against some
  pemigatinib-resistance variants. SRC-FIGHT-202 stub in KB — citation
  detail pending verification.

notes_patient: >
  Таргетний препарат — таблетка, що блокує сигнал росту в пухлинних
  клітинах із поломкою у гені FGFR2. Найчастіші побічні ефекти:
  підвищений фосфор у крові (тимчасово, контрольований дієтою + ліками),
  сухість в очах і ротовій порожнині, ламкість нігтів, випадіння
  волосся. Окуліст обов'язково перед стартом і регулярно під час лікування.
