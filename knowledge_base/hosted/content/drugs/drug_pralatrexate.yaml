id: DRUG-PRALATREXATE
names:
  preferred: "Pralatrexate"
  ukrainian: "Пралатрексат"
  english: "Pralatrexate"
  brand_names: ["Folotyn"]
atc_code: L01BA05
drug_class: "Antifolate (selective DHFR inhibitor; 10-deazaaminopterin)"
mechanism: >
  Selective antifolate with higher affinity than methotrexate for the
  reduced folate carrier (RFC-1) — major cellular transport protein in
  T-cell lymphoma cells — and for folylpolyglutamate synthetase (FPGS),
  leading to enhanced intracellular accumulation and prolonged DHFR
  inhibition. Inhibits thymidylate synthesis → DNA synthesis arrest.
  Distinct mechanism from HDACi (romidepsin/belinostat), BV (ADC), and
  ALK TKIs — allows activity in HDACi-refractory PTCL.
  Mandatory folate (folic acid 1 mg PO daily) + vitamin B12 (1 mg IM
  q8-10 weeks) are required throughout therapy to mitigate mucositis
  and hematologic toxicity without compromising anti-tumor efficacy.

regulatory_status:
  fda:
    approved: true
    approvals:
      - indication: "Relapsed or refractory peripheral T-cell lymphoma (PTCL) after ≥1 prior systemic therapy"
        approval_date: "2009-09-24"
        pathway: "Accelerated approval based on ORR (PROPEL trial)"
        trial_basis: "PROPEL (O'Connor 2011 JCO)"
  ema:
    approved: false
    notes: "EMA marketing authorization application withdrawn by applicant in 2012; not approved in EU"
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-05-04"
    notes: >
      Pralatrexate not registered in Ukraine and not EMA-approved.
      Access only via named-patient import from USA or clinical trial.
      For r/r PTCL/AITL in Ukraine: romidepsin (if accessible), belinostat
      (if accessible), or azacitidine (for AITL; NSZU-accessible) are
      preferred accessible options.

standard_dose:
  adult: "30 mg/m² IV push over 3-5 minutes once weekly × 6 of each 7-week cycle"
  notes: >
    PROPEL trial dose: 30 mg/m² IV weekly ×6 of 7-week cycle (6 weeks on,
    1 week off). Mandatory supplementation: folic acid 1 mg PO daily starting
    10 days before first dose and continuing throughout + 30 days after last dose;
    vitamin B12 1 mg IM q8-10 weeks throughout. Dose reduce to 20 mg/m² for
    Grade ≥2 mucositis, platelets <50K, or ANC <1000; hold for Grade ≥3 toxicity.

route_of_administration: intravenous
drug_form: "solution for injection"

key_adverse_effects:
  - "Mucositis/stomatitis (~70% any grade; 21% Grade ≥3): dose-limiting; folate + B12 mandatory; oral cryotherapy during infusion"
  - "Thrombocytopenia (~41%): CBC before each dose; hold for plt <50K"
  - "Anemia (~34%): fatigue; transfusion support PRN"
  - "Neutropenia (~24%): G-CSF for G≥3/febrile neutropenia"
  - "Nausea/vomiting (~40%): 5-HT3 antagonist + dex premedication mandatory"
  - "Fatigue (~36%): counsel on expected course"
  - "Edema (~30%): monitor weight and fluid balance"
  - "Elevated transaminases: hold for ALT/AST >3× ULN; reduce dose 25% on resume"

key_interactions:
  - "TMP-SMX (trimethoprim-sulfamethoxazole): competitive folate transport inhibition — avoid concurrent use OR monitor for mucositis intensification"
  - "NSAIDs: may impair renal clearance of pralatrexate — reduce dose or avoid"
  - "Probenecid: renal transport inhibitor — avoid concurrent use"
  - "Strong organic anion transport inhibitors: may increase pralatrexate exposure"

monitoring:
  - "CBC with differential before each dose (weekly — hold for plt <50K, ANC <1000)"
  - "Mucositis assessment each infusion visit (dose-limiting; hold for G≥2)"
  - "LFT baseline + q4 weeks (transaminase-driven dose reduction)"
  - "Creatinine + CrCl baseline + q4 weeks (renal clearance; dose adjust at CrCl <30)"
  - "Confirm folate 1 mg PO daily + B12 1 mg IM taken as prescribed before each cycle"

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
last_reviewed: "2026-05-04"
notes: >
  PROPEL trial (O'Connor 2011 JCO; NCT00114296): r/r PTCL N=111; ORR 29%;
  CR 11%; mDOR 10.1 months; mPFS 3.5 months. FDA accelerated approval
  September 2009 based on ORR. Active across PTCL subtypes: PTCL-NOS, AITL,
  ALCL ALK-, transformed MF/SS. EMA withdrawn 2012; not registered in Ukraine.
  Mucositis is the dominant dose-limiting toxicity — folate + B12 supplementation
  is mandatory and must begin 10 days prior to first dose.
  DRUG entity authored 2026-05-04 (Workstream CY) to support DRUG-PRALATREXATE
  reference in REG-PRALATREXATE-PTCL and IND-AITL-2L-PRALATREXATE.
