id: DRUG-REVUMENIB
names:
  preferred: "Revumenib"
  ukrainian: "Ревуменіб"
  english: "Revumenib"
  brand_names:
    - "Revuforj"
atc_code: null  # ATC not yet assigned at time of FDA approval (Nov 2024)
rxnorm_id: null
drug_class: "Selective menin-MLL (KMT2A) interaction inhibitor"
mechanism: >
  Small-molecule inhibitor of the menin-KMT2A (MLL) protein-protein
  interaction. KMT2A-rearranged and NPM1-mutated leukemias are
  dependent on menin recruitment to KMT2A-fusion or wild-type KMT2A
  complexes that drive aberrant HOXA / MEIS1 transcription. Disrupting
  menin-MLL displaces the leukemogenic transcriptional program,
  inducing differentiation and apoptosis of leukemic blasts.
  FDA-approved Nov 2024 on the basis of AUGMENT-101 phase 1/2 trial.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2024
    indications_brief:
      - "Relapsed/refractory KMT2A-rearranged acute leukemia (≥1 prior line); pediatric ≥1 year and adult"
  ema:
    approved: false
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-30"
    notes: |
      Не зареєстровано в Україні (FDA схвалено листопад 2024; EMA розгляд триває).
      Менін-інгібітор для R/R KMT2A-r гострої лейкемії; не входить до НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл) — за рахунок пацієнта.
      - EAP / compassionate-use programme (Syndax — sponsor) для відповідних пацієнтів.
      - Cross-border (EU/US): EU/US гематоцентри через "Лікування за
        кордоном" (наказ МОЗ 988); необхідне підтвердження KMT2A-r FISH/RT-PCR.
      - Trial-only: AUGMENT-101 розширення, AUGMENT-102 (ven+aza+revumenib).
      Source: drlz.com.ua пошук "revumenib"/"revuforj" 2026-04-30 — РП відсутнє.

typical_dosing: >
  163 mg PO q12h with strong CYP3A inhibitor (cobicistat) co-administration
  (label-required pharmacokinetic boost), OR 270 mg PO q12h without CYP3A
  inhibitor. Continuous, until disease progression or unacceptable
  toxicity. Take with or without food. AUGMENT-101 schedule.

formulations: ["Tablets 25 / 110 mg"]

absolute_contraindications:
  - "Hypersensitivity to revumenib or any excipient"

black_box_warnings:
  - "Differentiation syndrome — fatal if not recognized; corticosteroids + dose interruption mandatory (~16% in AUGMENT-101)"
  - "QTc prolongation — baseline + serial ECG; correct K+ ≥4.0 mEq/L and Mg++ ≥2.0 mg/dL"

major_interactions:
  - "Strong CYP3A4 inhibitors (cobicistat — required co-medication per label, OR azoles, clarithromycin, ritonavir) — necessary boost when 163-mg dose used"
  - "Strong CYP3A4 inducers (rifampin, phenytoin, carbamazepine, St John's wort) — avoid; reduce revumenib exposure"
  - "Other QT-prolonging drugs — additive risk; avoid when feasible"

common_adverse_events:
  - "Differentiation syndrome — ~16% (label requires corticosteroid + hold)"
  - "QTc prolongation — ~30% any grade; ~13% grade ≥3"
  - "Nausea / vomiting"
  - "Diarrhea"
  - "Fatigue"
  - "Anemia / thrombocytopenia / neutropenia"
  - "Transaminase elevation"

serious_adverse_events:
  - "Differentiation syndrome (~16%; fatal cases reported)"
  - "QTc prolongation with potential torsades / sudden death"
  - "Severe cytopenias requiring G-CSF / transfusion"
  - "Hepatotoxicity"

pharmacology:
  half_life_hours: 11  # ~10-12 h with cobicistat boost
  metabolism: "primarily CYP3A4 (necessitates cobicistat boost or higher dose without)"
  protein_binding_pct: 96

sources: [SRC-NCCN-AML-2025]
last_reviewed: "2026-04-30"
notes: >
  Pivotal trial: AUGMENT-101 (Issa et al., Nature 2024 / NEJM 2025) —
  phase 1/2 of revumenib monotherapy in R/R KMT2A-r and NPM1-mut acute
  leukemia. KMT2A-r AML cohort: ORR ~63%, CR/CRh ~23%; durable
  responses with bridge-to-alloHCT pathway. FDA accelerated approval
  Nov 2024 for KMT2A-r R/R acute leukemia (≥1 prior line). NPM1-mut
  cohort under priority review. Differentiation syndrome (~16%) is
  the signature AE — mandate corticosteroid hold + supportive care;
  rechallenge after resolution. QTc prolongation requires baseline +
  serial ECG with electrolyte correction. Ukraine: NOT registered,
  NOT reimbursed — major access barrier; international referral or
  EAP / compassionate-use only. Trial source SRC-AUGMENT-101
  pending — citing umbrella SRC-NCCN-AML-2025.
notes_patient: >
  Інгібітор взаємодії менін-MLL — таргетна терапія для рідкісної
  агресивної форми гострої лейкемії з перебудовою KMT2A. FDA-схвалено
  у США (листопад 2024). В Україні не зареєстрований; доступ через
  міжнародне направлення або програму співчутливого використання
  (Syndax). Прийом — таблетки двічі на день. Сигнатурний побічний
  ефект — синдром диференціації (лихоманка, задишка, набір ваги),
  який потребує негайного дексаметазону + паузи препарату.
