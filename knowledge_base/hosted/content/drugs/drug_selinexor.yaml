id: DRUG-SELINEXOR
names:
  preferred: "Selinexor"
  ukrainian: "Селінексор"
  english: "Selinexor"
  brand_names: ["Xpovio"]
atc_code: L01XX73
drug_class: "Selective inhibitor of nuclear export (SINE) — XPO1 inhibitor"
mechanism: >
  Selective, covalent inhibitor of exportin-1 (XPO1; also CRM1), the
  principal nuclear export protein for tumor suppressor proteins (TSPs)
  including p53, Rb, p21, and FOXO proteins. Selinexor blocks XPO1-mediated
  nuclear export → nuclear retention and reactivation of TSPs → cell cycle
  arrest and apoptosis in malignant cells. XPO1 is overexpressed in MM cells
  and other hematologic malignancies.
  Dual anti-myeloma mechanism: (1) TSP reactivation (p53-dependent apoptosis);
  (2) suppression of IκB/NF-κB export → reduced pro-survival signaling.
  Mechanism is non-overlapping with IMiDs, PIs, and anti-CD38 antibodies —
  provides activity in cells with resistance to these drug classes.

regulatory_status:
  fda:
    approved: true
    approvals:
      - indication: "Penta-refractory multiple myeloma (refractory to bortezomib, carfilzomib, lenalidomide, pomalidomide, daratumumab) after ≥4 prior regimens"
        approval_date: "2019-07-03"
        pathway: "Accelerated approval based on ORR (STORM trial)"
        trial_basis: "STORM (Chari 2019 NEJM)"
        regimen: "Selinexor 80 mg PO twice weekly + dexamethasone 20 mg twice weekly (XdD)"
      - indication: "Multiple myeloma after ≥1 prior line with bortezomib (SVd — selinexor + bortezomib + dex)"
        approval_date: "2020-12-18"
        pathway: "Regular approval based on PFS (BOSTON trial)"
        trial_basis: "BOSTON (Grosicki 2020 NEJM)"
        regimen: "Selinexor 100 mg PO weekly + bortezomib + dexamethasone (SVd)"
  ema:
    approved: false
    notes: >
      EMA CHMP negative opinion for penta-refractory MM (2021) based on benefit-risk
      assessment — toxicity profile (severe thrombocytopenia, nausea) deemed
      unfavorable relative to modest ORR in STORM. Not approved in EU as of 2026.
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-05-04"
    notes: >
      Selinexor not registered in Ukraine (no EMA approval; US-only authorization).
      Named-patient import from US required — very limited access. For penta-refractory
      MM in Ukraine: clinical trial preferred; teclistamab (if accessible via named-patient
      EMA-regulated import); or best supportive care.

standard_dose:
  adult: "Penta-refractory MM (XdD): selinexor 80 mg PO twice weekly (days 1,3) + dexamethasone 20 mg twice weekly; SVd: selinexor 100 mg PO once weekly + bortezomib + dexamethasone"
  notes: >
    Penta-refractory (STORM schedule): 80 mg PO twice weekly (days 1 and 3 of each week),
    continuous. Reduce to 80 mg weekly if G2-3 tolerability issues.
    SVd (BOSTON schedule): 100 mg PO once weekly on the same day as bortezomib.
    Take with food to reduce nausea. Strong antiemetic premedication mandatory.
    Dexamethasone (20 mg biweekly for XdD; 20 mg weekly for SVd) acts as anti-emetic
    and direct anti-myeloma agent.

route_of_administration: oral
drug_form: "tablet"

key_adverse_effects:
  - "Nausea/vomiting (~72% any grade; ~9% Grade ≥3): mandatory 5-HT3 antagonist + dex + NK1-antagonist premedication"
  - "Thrombocytopenia (~74%; ~58% Grade ≥3): CBC weekly; hold + platelet transfusion support"
  - "Fatigue/asthenia (~73%): dose-limiting; reduce dose if G3 fatigue persists"
  - "Anemia (~62%): transfusion support; ESA not recommended in MM"
  - "Hyponatremia (~39%; ~22% Grade ≥3): monitor serum Na weekly; restrict fluid PRN; IV saline for Na <130"
  - "Anorexia/weight loss (~50%): nutritional support; antiemetics scheduled (not PRN)"
  - "Neutropenia (~34%; ~21% Grade ≥3): G-CSF PRN; hold for ANC <1000"
  - "Vision changes (blurred vision, diplopia): ~8% — ophthalmology referral for persistent symptoms"

key_interactions:
  - "Strong CYP3A4 inducers (rifampicin, carbamazepine, phenytoin): avoid — reduce selinexor AUC ~50%"
  - "Strong CYP3A4 inhibitors: may increase selinexor exposure; caution with azole antifungals + close toxicity monitoring"
  - "Dexamethasone (co-administered): both anti-emetic and direct anti-myeloma synergy; do not omit"
  - "Warfarin: monitor INR closely (CYP2C9 inhibition possible)"

monitoring:
  - "CBC with differential: weekly (thrombocytopenia; hold for plt <25K)"
  - "Serum sodium: weekly (hyponatremia; hold for Na <130 mEq/L)"
  - "BMP (electrolytes, renal function): weekly for first 3 months; monthly thereafter"
  - "Body weight: each visit (anorexia/weight loss tracking)"
  - "Visual acuity: baseline + each visit (selinexor-associated diplopia/vision changes)"
  - "Antiemetic adherence: confirm scheduled dosing before each clinic visit"

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
last_reviewed: "2026-05-04"
notes: >
  STORM (Chari 2019 NEJM; NCT02336815): N=122 penta-refractory MM; selinexor 80mg
  PO BIW + dex 20mg BIW; ORR 26%; mDOR 4.4 mo; mPFS 3.7 mo; mOS 8.6 mo; G≥3
  thrombocytopenia 58%, G≥3 hyponatremia 22%. FDA accelerated approval July 2019.
  BOSTON (Grosicki 2020 NEJM; NCT03110562): N=402; SVd vs Vd ≥1 prior line;
  mPFS 13.93 vs 9.46 mo (HR 0.70; p=0.0066); ORR 76.4% vs 62.3%; FDA approval
  December 2020 for SVd in ≥1 prior line.
  EMA rejected penta-refractory application 2021 — not approved in Europe/Ukraine.
  DRUG entity authored 2026-05-04 (Workstream DA) for penta-refractory MM modeling.
