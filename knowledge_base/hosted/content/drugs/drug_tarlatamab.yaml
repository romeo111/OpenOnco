typical_dosing: >
  Step-up regimen (mandatory) followed by maintenance:
    Cycle 1 day 1: 1 mg IV (priming dose) — inpatient monitoring ≥22 hours
    Cycle 1 day 8: 10 mg IV — inpatient monitoring ≥22 hours
    Cycle 1 day 15: 10 mg IV (outpatient acceptable if D1 + D8 well-tolerated)
    Cycles 2+: 10 mg IV every 2 weeks
  Continuous q2w until disease progression or unacceptable toxicity.
  Premedication: dexamethasone 8 mg IV + antihistamine (e.g.
  diphenhydramine 25-50 mg IV) + acetaminophen 650-1000 mg PO ≥30-60
  min before each of the first 2 doses (cycle 1 D1 + D8); IV hydration
  (1 L NS) before and after first 2 doses. Hospitalization for 22+ hours
  post-infusion mandatory for cycle 1 D1 and D8 to monitor for CRS.

formulations:
  - "Lyophilized powder for reconstitution, 1 mg single-dose vial"
  - "Lyophilized powder for reconstitution, 10 mg single-dose vial"

absolute_contraindications:
  - "Severe hypersensitivity to tarlatamab"
  - "Active uncontrolled infection (T-cell-engager risk amplification)"
  - "Pregnancy (expected embryo-fetal toxicity per class effect)"

black_box_warnings:
  - "Cytokine release syndrome (CRS) — fatal cases reported; Grade ≥3 ~1%, any-grade ~50% in DeLLphi-301; mandatory step-up dosing + inpatient monitoring cycle 1 D1 and D8 required"
  - "Neurologic toxicity including immune effector cell-associated neurotoxicity syndrome (ICANS) — Grade ≥3 ~7%; monitor for confusion, tremor, aphasia, seizures"

major_interactions:
  - "Live vaccines — avoid during therapy and ≥4 weeks after last dose (T-cell activation risk)"
  - "Concomitant immunosuppressants (chronic systemic corticosteroids, calcineurin inhibitors) — may attenuate efficacy; avoid where possible"
  - "Other T-cell-engaging agents (CAR-T, BiTEs) — additive CRS / neurotoxicity risk; sequential scheduling preferred"

common_adverse_events:
  - "Cytokine release syndrome (~50% any grade; mostly Grade 1-2 with cycle-1 fever, hypotension, hypoxia)"
  - "Pyrexia (~35%)"
  - "Fatigue / asthenia (~30%)"
  - "Decreased appetite (~30%)"
  - "Dysgeusia (~25%)"
  - "Nausea (~25%)"
  - "Constipation (~20%)"
  - "Anemia (~30%)"
  - "Lymphopenia (~25%)"
  - "Hyponatremia (~15%)"
  - "Increased AST/ALT"

serious_adverse_events:
  - "Severe CRS (Grade ≥3 ~1%; tocilizumab + supportive care indicated; rare fatal cases)"
  - "ICANS / severe neurotoxicity (Grade ≥3 ~7%; corticosteroids ± tocilizumab; may require permanent discontinuation)"
  - "Severe infections / sepsis (Grade ≥3 ~10%; T-cell redistribution + hypogammaglobulinemia risk)"
  - "Severe cytopenia (neutropenia, lymphopenia) with infection risk"
  - "Tumor flare / pseudo-progression (rare)"
  - "Embryo-fetal toxicity if exposure during pregnancy"

