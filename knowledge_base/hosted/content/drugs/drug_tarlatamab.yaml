notes: >
  First-in-class DLL3 × CD3 bispecific T-cell engager (Amgen). FDA
  accelerated approval May 2024 for extensive-stage SCLC with disease
  progression on or after platinum-based chemotherapy, on the basis of
  DeLLphi-301 (Ahn et al., NEJM 2023; n=222 across 10 mg q2w and 100 mg
  q2w cohorts; 10 mg q2w cohort n=99 — confirmed ORR 40% per independent
  central review, mDoR not reached at 10.6 mo follow-up, mPFS 4.9 mo,
  mOS 14.3 mo). 10 mg q2w selected as the registered dose (favorable
  safety/efficacy ratio; similar ORR with lower CRS rate than 100 mg).
  ESCAT tier IIA (FDA-approved disease-specific 2L+ ES-SCLC). Distinct
  from blinatumomab BiTE in solid-tumor target (DLL3) and dosing format
  (q2w bolus vs continuous infusion). Mandatory step-up cycle 1 + inpatient
  monitoring 22+ hours post-infusion D1 and D8 to detect early CRS. CRS
  mostly Grade 1-2 (fever, hypotension, hypoxia) and managed with
  supportive care + tocilizumab when needed; severe CRS (Grade ≥3) ~1%.
  Neurologic toxicity (ICANS-like) Grade ≥3 ~7% — generally reversible
  with corticosteroids. EMA review pending. Confirmatory phase 3
  DeLLphi-304 (tarlatamab vs investigator-choice chemotherapy in 2L
  ES-SCLC) ongoing. Also under investigation in maintenance after 1L
  chemoimmunotherapy (DeLLphi-303), neuroendocrine prostate cancer, and
  SCLC-transformed NSCLC. UA access: named-patient / EAP only as of
  2026-05; structural barrier — requires inpatient infusion centre with
  CRS / ICANS protocol. STUB — pending Clinical Co-Lead sign-off.

notes_ua: >
  Перший представник класу DLL3 × CD3 біспецифічних T-клітинних
  залучаючих агентів — тарлатамаб (tarlatamab, Amgen). FDA accelerated
  approval — травень 2024 для екстенсивної стадії дрібноклітинного
  раку легень (ES-SCLC) з прогресуванням на або після платиновмісної
  хіміотерапії, на основі DeLLphi-301 (Ahn et al., NEJM 2023; n=222 у
  когортах 10 mg q2w та 100 mg q2w; когорта 10 mg q2w n=99 —
  підтверджена ORR 40% за незалежним центральним переглядом, mDoR не
  досягнуто при 10.6 mo спостереження, mPFS 4.9 mo, mOS 14.3 mo).
  Доза 10 mg q2w вибрана як зареєстрована (сприятливе співвідношення
  безпеки/ефективності; подібна ORR з нижчою частотою CRS порівняно з
  100 mg). ESCAT tier IIA (FDA-затверджене disease-specific 2L+
  ES-SCLC). Відрізняється від блінатумомабу (BiTE) солідно-пухлинним
  таргетом (DLL3) та форматом дозування (q2w-болюс проти безперервної
  інфузії). Обов'язкове step-up-дозування 1-го циклу + стаціонарний
  моніторинг ≥22 год після інфузії в дні 1 та 8 для раннього виявлення
  CRS. CRS переважно 1-2 ступеня (лихоманка, гіпотензія, гіпоксія) —
  купується підтримуючою терапією + тоцилізумабом за потребою; тяжкий
  CRS (≥3 ступеня) ~1%. Неврологічна токсичність (ICANS-подібна) ≥3
  ступеня ~7% — зазвичай оборотна на тлі кортикостероїдів. EMA-розгляд
  триває. Підтверджуюче дослідження фази 3 DeLLphi-304 (тарлатамаб
  проти хіміотерапії за вибором дослідника у 2L ES-SCLC) триває.
  Вивчається також у підтримуючій терапії після 1L хіміоімунотерапії
  (DeLLphi-303), при нейроендокринному раку передміхурової залози та
  SCLC-трансформованому НДРЛ. В Україні доступ: лише named-patient /
  EAP станом на 2026-05; структурний бар'єр — потрібен стаціонарний
  інфузійний центр з протоколом ведення CRS/ICANS. STUB — чекає на
  підписання клінічних co-lead.

notes_patient: >
  Препарат-мітка нового покоління для дрібноклітинного раку легень
  (МКЛЛ) у 2-й лінії після хіміотерапії на основі платини:
  «біспецифічний» антитільний конструкт, який одним кінцем зв'язується
  з пухлиною (білок DLL3), а іншим — з імунними клітинами (Т-лімфоцити),
  що дозволяє цим клітинам атакувати пухлину. Перші дві дози вводяться
  у стаціонарі — спостерігаємо ≥22 годин після кожної інфузії, бо може
  виникнути «цитокіновий шторм» (висока температура, падіння тиску) —
  рідкісне, але серйозне явище. Потім — щодва тижні амбулаторно. Перед
  кожною з перших двох інфузій — премедикація (стероїд, антигістамін,
  парацетамол). В Україні (2026-05) не зареєстрований — доступний через
  named-patient / благодійні програми.
