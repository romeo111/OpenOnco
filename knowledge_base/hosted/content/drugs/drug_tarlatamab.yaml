id: DRUG-TARLATAMAB
names:
  preferred: "Tarlatamab"
  ukrainian: "Тарлатамаб"
  english: "Tarlatamab"
  brand_names:
    - "Imdelltra"
atc_code: L01FX29
rxnorm_id:
drug_class: "DLL3 × CD3 bispecific T-cell engager (BiTE)"
mechanism: >
  Bispecific antibody construct (half-life-extended BiTE format, IgG-like
  scaffold) binding delta-like ligand 3 (DLL3) on small-cell-lung-cancer
  tumor cells AND CD3ε on T cells, forming a tumor-redirected
  immunological synapse that activates polyclonal cytotoxic T-cell
  killing of DLL3-expressing tumor cells. DLL3 is an inhibitory Notch
  ligand aberrantly expressed on the surface of ~85-95% of SCLC tumors
  but minimally on normal tissues, making it a tumor-selective target.
  Distinct from blinatumomab (anti-CD19 × CD3 BiTE for B-ALL) in: (1)
  solid-tumor target (DLL3 on SCLC) vs hematologic; (2) longer half-life
  (~Fc-extended) permitting q2w IV bolus dosing rather than continuous
  infusion; (3) requires step-up dosing (1 mg cycle 1 day 1) with
  inpatient monitoring to mitigate cytokine release syndrome (CRS).
  Does not require pre-treatment DLL3 testing for label use — most SCLCs
  are DLL3-positive and DeLLphi-301 did not gate enrollment on DLL3 IHC.

