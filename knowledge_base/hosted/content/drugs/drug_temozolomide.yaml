id: DRUG-TEMOZOLOMIDE
names:
  preferred: "Temozolomide"
  ukrainian: "Темозоломід"
  english: "Temozolomide"
  brand_names:
    - "Temodar"
    - "Temodal"
    - "Temo C"
atc_code: "L01AX03"
rxnorm_id: "72860"
drug_class: "Alkylating agent (imidazotetrazine prodrug)"
mechanism: >
  Oral prodrug that undergoes spontaneous non-enzymatic hydrolysis to
  the active monomethyl triazeno imidazole carboxamide (MTIC) at
  physiological pH. MTIC methylates DNA primarily at the O6-position
  of guanine (O6-methylguanine), causing mispairing with thymine on
  subsequent replication cycles → triggering MMR-mediated apoptosis.
  Minor methylation at N7-guanine and N3-adenine also contributes.
  Oral bioavailability ~100%; crosses blood-brain barrier (lipophilic,
  low molecular weight) — critical for CNS tumors including PCNSL.
  MGMT promoter methylation silences MGMT repair enzyme → predictive
  biomarker for response in glioblastoma (established); less validated
  for PCNSL (exploratory).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 1999
    indications_brief:
      - "Glioblastoma multiforme (GBM) — newly diagnosed (concurrent + adjuvant with radiation)"
      - "Anaplastic astrocytoma — refractory"
  ema:
    approved: true
    year_first_approval: 1999
    indications_brief:
      - "GBM — concurrent + adjuvant chemoradiotherapy"
      - "Malignant glioma — recurrent/progressive"
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Glioblastoma multiforme (adjuvant + concurrent with radiotherapy)"
      - "Anaplastic glioma (recurrent)"
    last_verified: "2026-05-04"
    notes: |
      Темозоломід (Темодар / Темо С та генерики) зареєстрований в Україні.
      НСЗУ: відшкодовується для гліобластоми та анапластичних гліом (пухлини
      мозку). Використання при ПЛЦНС є офлейбельним (лімфома ЦНС — не гліома),
      але доступ через систему фінансування пухлин ЦНС часто можливий при
      підтвердженні MDT/ТМК.
last_reviewed: "2026-05-04"
