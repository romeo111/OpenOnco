id: DRUG-TIVOZANIB
names:
  preferred: "Tivozanib"
  ukrainian: "Тивозаніб"
  english: "Tivozanib"
  brand_names: ["Fotivda"]
atc_code: L01EK05
drug_class: "VEGFR-1/2/3 tyrosine kinase inhibitor (selective)"
mechanism: >
  Highly selective inhibitor of VEGFR-1, VEGFR-2, and VEGFR-3. Blocks
  VEGF-driven angiogenesis in the tumor microenvironment.
  Selectivity advantage: minimal off-target kinase inhibition (no RAF,
  PDGFR, c-KIT at clinically relevant concentrations) compared to sorafenib
  and sunitinib — results in lower rates of hand-foot skin reaction (HFSR)
  and fatigue. Long terminal half-life (~4.5 days) enables once-daily dosing
  on a 21-day on / 7-day off cycle. Active metabolite not established.

regulatory_status:
  fda:
    approved: true
    approvals:
      - indication: "Relapsed or refractory advanced renal cell carcinoma after ≥2 prior systemic therapies"
        approval_date: "2021-03-10"
        pathway: "Regular approval (PDUFA; priority review)"
        trial_basis: "TIVO-3 (Atkins 2021 Lancet Oncol)"
  ema:
    approved: true
    notes: "EMA approved (Fotivda) for r/r ccRCC; also used in EU"
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-05-04"
    notes: >
      Tivozanib not registered in Ukraine as of 2026. Named-patient import
      or international referral required. Cabozantinib and lenvatinib+everolimus
      are the preferred accessible alternatives for 2L+ RCC in Ukraine.

standard_dose:
  adult: "1.5 mg PO once daily for 21 consecutive days followed by 7-day rest period (28-day cycle)"
  notes: >
    TIVO-3 dose: 1.5 mg PO daily d1-21 of q28d cycle (3 weeks on, 1 week off).
    Take at approximately the same time each day. May be taken with or without food.
    Reduce to 1.0 mg daily for Grade ≥2 toxicity (hypertension, HFSR, fatigue).

route_of_administration: oral
drug_form: "capsule"

key_adverse_effects:
  - "Hypertension (~44%): most common; antihypertensive initiation/optimization early"
  - "Fatigue (~30%): manage with dose reduction if Grade ≥2"
  - "Diarrhea (~23%): antidiarrheal agents PRN; dose reduce for G3"
  - "Hoarseness/dysphonia (~20%): VEGFR class effect; generally mild"
  - "HFSR/palmar-plantar erythrodysesthesia (~12%): lower rate than sorafenib due to RAF selectivity"
  - "Hypothyroidism (~30%): TSH monitoring q4-8 weeks; levothyroxine replacement"
  - "Proteinuria: urinalysis baseline + periodic; hold for nephrotic range"
  - "Hemorrhage risk: avoid in untreated brain metastases"

key_interactions:
  - "Strong CYP3A4 inducers (rifampicin, phenytoin, carbamazepine): avoid — may decrease tivozanib exposure"
  - "Strong CYP3A4 inhibitors: no major interaction documented; caution with azole antifungals"
  - "P-gp substrate: avoid P-gp inhibitors (ciclosporin); monitor if unavoidable"
  - "Antihypertensives: additive hypotension risk during dose interruption; counsel patients"

monitoring:
  - "BP weekly × 6 weeks, then q4 weeks (hypertension; start/adjust antihypertensives pro-actively)"
  - "TSH q4-8 weeks (hypothyroidism; levothyroxine as needed)"
  - "Urinalysis for proteinuria: baseline + q4 weeks (nephrotic range → hold)"
  - "LFT: baseline + q4 weeks"
  - "CBC: baseline + q4 weeks (anemia, neutropenia)"
  - "CT chest/abdomen/pelvis q8-12 weeks (RECIST 1.1 response assessment)"
