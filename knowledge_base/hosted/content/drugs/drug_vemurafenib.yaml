id: DRUG-VEMURAFENIB
names:
  preferred: "Vemurafenib"
  ukrainian: "Вемурафеніб"
  english: "Vemurafenib"
  brand_names:
    - "Zelboraf"
atc_code: L01EC01
rxnorm_id: "1147221"
drug_class: "Selective BRAF V600E kinase inhibitor"
mechanism: >
  ATP-competitive small-molecule inhibitor of mutant BRAF V600E kinase.
  BRAF V600E constitutively activates the MAPK/ERK signalling pathway,
  driving uncontrolled proliferation. Vemurafenib selectively binds and
  inhibits V600E-mutant BRAF > 10-fold more potently than wild-type BRAF.
  Restores normal cell-cycle regulation in V600E-driven tumours.
  NOTE: Paradoxical MAPK activation occurs in BRAF-wild-type cells —
  vemurafenib MUST NOT be used in BRAF-WT HCL-variant or co-occurring
  RAS-mutant tumours (accelerates RAS-driven proliferation).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2011
    indications_brief:
      - "Unresectable or metastatic melanoma with BRAF V600E mutation (adult)"
      - "Erdheim-Chester disease with BRAF V600E mutation (2017)"
  ema:
    approved: true
    year_first_approval: 2012
    indications_brief:
      - "Unresectable or metastatic BRAF V600E-mutated melanoma"
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: ["Melanoma (off-label for HCL; no HCL-specific NSZU code)"]
    last_verified: "2026-05-04"
    notes: |
      Зареєстровано в Україні (Zelboraf) для меланоми з мутацією BRAF V600E.
      Для ВКЛ (HCL) — позареєстроване (off-label) застосування; НСЗУ не
      відшкодовує за діагнозом HCL. Шляхи доступу для ВКЛ:
      - Індивідуальне фінансування (пацієнт або страховка).
      - Named-patient або compassionate-use (Roche).
      - Melanoma NSZU funding + compassionate extension for HCL — MDT request.
      Переважно у гематологічних центрах Київ/Львів.

typical_dosing: >
  960 mg PO twice daily (BID) continuously. Take with or without food.
  Avoid high-fat meals within 2 hours (reduces absorption).
  Avoid grapefruit (CYP3A4 inhibition). In HCL (Tiacci 2021): 960 mg BID
  for 8 continuous weeks (fixed-duration alongside rituximab schedule).

formulations: ["Film-coated tablets 240 mg"]

absolute_contraindications:
  - "BRAF V600 mutation absent or not tested — do not use empirically"
  - "RAS-mutant co-occurring malignancy — paradoxical MAPK activation accelerates RAS-driven tumour"

black_box_warnings:
  - "New primary malignancies (cutaneous squamous cell carcinoma, keratoacanthoma, new melanomas) — dermatology screening mandatory q1-3 months"

major_interactions:
  - "Strong CYP3A4 inhibitors (ketoconazole, clarithromycin, voriconazole): increase vemurafenib AUC — monitor QTc; consider dose reduction"
  - "Strong CYP3A4 inducers (rifampin, phenytoin, carbamazepine): reduce vemurafenib exposure substantially — avoid"
  - "QT-prolonging agents (fluoroquinolones, azithromycin, ondansetron): additive QTc prolongation — avoid or monitor ECG"
  - "Warfarin / CYP2C9 substrates: vemurafenib inhibits CYP2C9; monitor INR closely"
  - "Ipilimumab: combination with vemurafenib associated with hepatotoxicity (melanoma trials); not applicable to HCL context but general caution"

common_adverse_events:
  - "Photosensitivity / sunburn (~52%): SPF 50+ sunscreen + protective clothing MANDATORY throughout treatment"
  - "Rash / pruritus (~37%)"
  - "Arthralgia / myalgia (~21%): dose reduction to 720 mg BID for Grade ≥2"
  - "Fatigue (~38%)"
  - "Alopecia (~20%)"
  - "Nausea / diarrhea (~15-20%)"
  - "Peripheral neuropathy (~13%)"

serious_adverse_events:
  - "Cutaneous squamous cell carcinoma / keratoacanthoma (~20% in melanoma; lower in HCL short-course): dermatology surveillance mandatory"
  - "QTc prolongation (Grade ≥3 ~3-8%): baseline ECG mandatory; re-check at 2-4 weeks"
  - "Hepatotoxicity (ALT/AST >3× ULN ~3-5%): LFT monthly"
  - "Uveitis / iritis (~1%): ophthalmology referral if vision change"
  - "Stevens-Johnson syndrome / TEN (rare; <1%): immediate discontinuation"

pharmacology:
  half_life_hours: 57  # approximate; range 30-120 hrs
  metabolism: "CYP3A4-mediated; CYP2C8 minor; also CYP3A4 inhibitor at therapeutic doses"
  protein_binding_pct: 99

sources: [SRC-NCCN-BCELL-2025, SRC-NCCN-MELANOMA-2025]
last_reviewed: "2026-05-04"
notes: >
  PRIMARY HCL EVIDENCE: Tiacci et al. 2021 NEJM (phase 2; n=30 r/r HCL):
  vemurafenib 960 mg BID × 8 weeks + rituximab 375 mg/m² q2w × 4 then qmonth × 4.
  ORR 100%; CR 87%; uMRD (bone marrow MRD-negative) 66.7%; mPFS not reached
  at median 37-month follow-up. NCCN Category 1 for r/r BRAF-V600E HCL.

  EARLIER HCL DATA: Tiacci et al. 2011 NEJM identified BRAF V600E as the
  defining mutation in ~100% of classic HCL. Tiacci 2015 NEJM phase 2 monotherapy
  (n=26): ORR 96% but mainly PRs; CR only 35%; MRD-negative rare. Combination
  with rituximab (Tiacci 2021) substantially deepens and extends responses.

  UA: Zelboraf registered for melanoma; off-label for HCL; NSZU does not reimburse
  vemurafenib for HCL — individual funding required. HCL often controlled with
  accessible cladribine re-treatment when vemurafenib access is blocked.

notes_patient: >
  Вемурафеніб — таблетований препарат, що блокує дефектний білок BRAF V600E.
  При ВКЛ приймається двічі на день протягом 8 тижнів разом з ритуксимабом.
  ВАЖЛИВО: обов'язковий сонцезахисний крем SPF 50+ протягом усього курсу та
  6 місяців після — шкіра стає надзвичайно чутливою до сонця.
  Дерматологічний огляд кожні 3-6 місяців — препарат може спричиняти
  доброякісні шкірні утворення (кератоакантоми/ПКР), що легко видаляються.
  Моніторинг ЕКГ — перед лікуванням та через 2-4 тижні.
