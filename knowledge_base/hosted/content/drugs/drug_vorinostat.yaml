id: DRUG-VORINOSTAT
names:
  preferred: "Vorinostat"
  ukrainian: "Воріностат"
  english: "Vorinostat"
  brand_names:
    - "Zolinza"
  alternate_names:
    - "SAHA"
    - "suberoylanilide hydroxamic acid"
    - "MK-0683"
atc_code: L01XH01
rxnorm_id: "213050"
drug_class: "Pan-HDAC inhibitor (hydroxamic acid class)"
mechanism: >
  Hydroxamic acid-class pan-HDAC inhibitor. Binds and inhibits zinc-dependent
  histone deacetylase (HDAC) enzymes (Class I + Class II). HDAC inhibition
  → hyperacetylation of histones and non-histone proteins → chromatin relaxation
  → re-expression of silenced tumour-suppressor genes → cell cycle arrest (G1/S)
  + differentiation + apoptosis. In CTCL/MF, malignant T-cells rely on epigenetic
  silencing of apoptotic pathways; HDAC inhibition restores pro-apoptotic gene
  expression. Pan-HDAC inhibition distinguishes vorinostat from romidepsin
  (primarily Class I HDAC selective).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2006
    indications_brief:
      - "Progressive, persistent or recurrent cutaneous T-cell lymphoma (CTCL) after ≥2 systemic therapies (adult)"
  ema:
    approved: false
    notes: "Not approved by EMA; approved by FDA only for CTCL"
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-05-04"
    notes: |
      Воріностат (Zolinza) не зареєстрований в Україні.
      FDA схвалено жовтень 2006 для CTCL; EMA не схвалено.
      Шляхи доступу для пацієнтів з МФ/СС:
      - Named-patient import (DEC/МОЗ спецдозвіл).
      - Compassionate-use (MSD/Merck програма для CTCL).
      - Міжнародне направлення в центр із доступом до CTCL-програм.
      Практичний доступ в Україні: ≈нульовий в більшості центрів.

typical_dosing: >
  400 mg PO once daily with food (standard approved dose).
  Alternative: 300 mg PO BID × 5 days out of 7 (lower GI toxicity per
  investigator preference). Take with food to reduce GI adverse effects.
  Continuous dosing until disease progression or unacceptable toxicity.

formulations: ["Capsules 100 mg"]

absolute_contraindications:
  - "Hypersensitivity to vorinostat"
  - "Uncorrected severe thrombocytopenia (PLT <50×10⁹/L): thrombocytopenia risk"

black_box_warnings: []

major_interactions:
  - "Valproic acid + other HDAC inhibitors: additive HDAC inhibition; avoid concurrent use"
  - "Coumarin anticoagulants (warfarin): vorinostat prolongs PT/INR via uncertain mechanism; monitor INR closely"
  - "QT-prolonging agents: additive QTc prolongation risk (Class Ia/III antiarrhythmics, fluoroquinolones, azoles)"

common_adverse_events:
  - "Fatigue (~52%)"
  - "Diarrhea (~52%; usually mild-moderate; manage with loperamide)"
  - "Nausea (~41%)"
  - "Thrombocytopenia (~26%; Grade 3-4 ~5-8%)"
  - "Anorexia/weight loss (~24%)"
  - "Dysgeusia (altered taste; ~28%)"
  - "Alopecia (~19%)"
  - "Dry mouth (~16%)"

serious_adverse_events:
  - "Deep vein thrombosis / pulmonary embolism (~5%): baseline Caprini DVT risk scoring; thromboprophylaxis when DVT risk high"
  - "QTc prolongation (Grade 1-2 ~5%; Grade 3 rare): baseline ECG + repeat at cycle 1 day 15"
  - "Myelosuppression (thrombocytopenia Grade 3-4 ~5-8%; neutropenia Grade 3-4 ~2%)"
  - "Hyperglycemia (especially diabetics): monitor fasting glucose"

pharmacology:
  half_life_hours: 2  # short; oral clearance rapid via glucuronidation and hydrolysis
  metabolism: "Glucuronidation (UGT) + β-oxidation of hydroxamic acid; non-CYP pathway; few drug interactions"
  protein_binding_pct: 71

sources: [SRC-NCCN-BCELL-2025, SRC-ESMO-CTCL-2024]
last_reviewed: "2026-05-04"
notes: >
  PRIMARY EVIDENCE: Olsen et al. 2007 JCO (phase 2B; n=74 r/r CTCL, ≥2 prior systemic
  therapies): vorinostat 400 mg PO daily → ORR 29.7%; mTTP 4.9 months; mDOR 168 days.
  Duvic et al. 2007 JCO (phase 2A; n=33): ORR 24.2%. FDA accelerated approval
  October 2006. NCCN CTCL 2025 Category 2A.

  KEY ADVANTAGE vs ROMIDEPSIN:
  Oral administration — eliminates need for IV infusion (days 1, 8, 15 q28d for
  romidepsin). Suitable for patients with limited IV access or inability to attend
  hospital infusions. Non-CYP metabolism reduces drug-drug interactions vs romidepsin.
  QTc risk is less severe than romidepsin but ECG monitoring still required.

  UKRAINE ACCESS:
  Zolinza not registered in Ukraine. Named-patient or compassionate-use access required
  (MSD/Merck). Practical access ≈zero in most Ukrainian oncology centres for CTCL.
  Romidepsin (also not registered) and bexarotene (registered? — verify) are comparable
  in terms of UA access barriers. Bexarotene remains the most accessible CTCL-systemic
  option in Ukraine.

notes_patient: >
  Воріностат — таблетований препарат, який блокує ферменти, що підтримують
  злоякісні T-клітини при мікозі грибковидному / синдромі Сезарі.
  Приймати з їжею (зменшує нудоту та діарею). Найчастіший побічний ефект —
  діарея та втома; часто самостійно проходить на 2-3-му тижні.
  ВАЖЛИВО: ризик тромбозу (~5%); повідомте лікаря про набряк ноги або задишку.
  В Україні: препарат не зареєстрований; доступ через спеціальні програми.
