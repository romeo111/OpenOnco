reviewers: []
notes: >
  HER2-targeted biparatopic bispecific antibody (Jazz Pharmaceuticals /
  Zymeworks). FDA accelerated approval November 2024 for HER2-positive
  (IHC 3+) previously treated unresectable / locally advanced / metastatic
  biliary tract cancer based on HERIZON-BTC-01 (Harding et al., Lancet
  Oncol 2023; n=87 cohort 1; ORR 41.3%, DCR 68.8%, median DoR 14.9 mo).
  ESCAT tier IIA (FDA-approved disease-specific HER2-amplified BTC 2L+).
  Distinct from trastuzumab in dual-epitope binding (ECD2 + ECD4) which
  produces enhanced HER2 receptor clustering, internalization, and
  degradation; mechanistically retains activity in some trastuzumab-
  experienced HER2+ tumors. Diarrhea (~40%) is the dominant clinically-
  relevant non-cardiac toxicity — antidiarrheal prophylaxis advised.
  Cardiac surveillance per HER2-targeted class. Active development in
  HER2+ gastric/GEJ (HERIZON-GEA-01 phase 3, with chemotherapy ±
  tislelizumab — pending readout); HER2-amplified colorectal; breast.
  EMA review pending. UA access: named-patient / EAP only as of 2026-05.

notes_ua: >
  HER2-таргетне біпаратопічне біспецифічне антитіло занідатамаб
  (zanidatamab, Jazz Pharmaceuticals / Zymeworks). FDA accelerated
  approval — листопад 2024 для HER2-позитивного (IHC 3+) попередньо
  лікованого нерезектабельного / локально поширеного / метастатичного
  раку жовчних шляхів за результатами HERIZON-BTC-01 (Harding et al.,
  Lancet Oncol 2023; n=87 когорта 1; ORR 41.3%, DCR 68.8%, медіана
  DoR 14.9 mo). ESCAT tier IIA (FDA-затверджене disease-specific
  HER2-ампліфіковане BTC 2L+). Відрізняється від трастузумабу
  подвійним епітопним зв'язуванням (ECD2 + ECD4), що посилює
  кластеризацію HER2-рецепторів, інтерналізацію та деградацію;
  механічно зберігає активність у деяких трастузумаб-експонованих
  HER2+ пухлинах. Діарея (~40%) — домінуюча клінічно значуща
  некардіальна токсичність; рекомендована антидіарейна профілактика.
  Кардіальне спостереження за HER2-таргетним класом. Активна розробка
  при HER2+ гастро-стравохідному раку (HERIZON-GEA-01 фаза 3, з
  хіміотерапією ± тіслелізумаб — readout очікується); HER2-ампліфікованому
  колоректальному раку; РМЗ. EMA-розгляд триває. В Україні доступ —
  named-patient / EAP лише станом на 2026-05.

