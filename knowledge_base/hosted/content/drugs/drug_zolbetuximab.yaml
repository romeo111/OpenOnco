id: DRUG-ZOLBETUXIMAB
names:
  preferred: "Zolbetuximab"
  ukrainian: "Зольбетуксимаб"
  english: "Zolbetuximab"
  brand_names: ["Vyloy"]
atc_code: L01FX31
rxnorm_id: null
drug_class: "Anti-CLDN18.2 chimeric IgG1 monoclonal antibody"

mechanism: >
  Chimeric IgG1 monoclonal antibody targeting Claudin-18 isoform 2
  (CLDN18.2), a tight-junction protein normally restricted to gastric
  mucosa but aberrantly retained in gastric/GEJ adenocarcinoma cells.
  Mechanisms: ADCC (NK cell-mediated via FcγRIIIa) and CDC (complement-
  dependent cytotoxicity). Combined with chemotherapy backbone
  (mFOLFOX6 in SPOTLIGHT, CAPOX in GLOW) for 1L HER2-negative
  CLDN18.2-positive (≥75% of tumor cells with 2+/3+ membranous
  staining) metastatic gastric / GEJ adenocarcinoma.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2024
    indications_brief:
      - "1L CLDN18.2-positive HER2-negative locally advanced unresectable / metastatic gastric or GEJ adenocarcinoma (with fluoropyrimidine + platinum)"
  ema:
    approved: true
    year_first_approval: 2024
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-30"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-30).
      Перше FDA-схвалення жовтень 2024; EMA Q4-2024.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл) — за рахунок пацієнта.
      - Astellas EAP / compassionate use — обмежено.
      - Cross-border (EU): EU онкоцентр через "Лікування за кордоном"
        (наказ МОЗ 988).
      - Trial-only: SPOTLIGHT/GLOW post-marketing programmes.
      Source: drlz.com.ua пошук "zolbetuximab"/"vyloy" 2026-04-30 — РП відсутнє.

typical_dosing: >
  Loading dose 800 mg/m² IV cycle 1 day 1; maintenance 600 mg/m² IV
  q3w (with CAPOX) or q2w (with mFOLFOX6). Slow infusion: cycle 1 over
  ≥4 hours, subsequent cycles ≥2 hours. Pre-medication for nausea
  mandatory. Companion diagnostic VENTANA CLDN18 (43-14A) RxDx required
  before initiation.

formulations:
  - "100 mg / 5 mL IV concentrate; reconstitute per labelling"

absolute_contraindications:
  - "Severe hypersensitivity to zolbetuximab"
  - "CLDN18.2 negative tumor (no benefit demonstrated)"

black_box_warnings: []

common_adverse_events:
  - "Nausea (~70% any grade — peak in cycle 1; aggressive prophylaxis required)"
  - "Vomiting (~65% any grade)"
  - "Decreased appetite, fatigue"
  - "Infusion reactions (~10-20% — slow rate, premedication)"
  - "Diarrhea, abdominal pain"
  - "Hypoalbuminemia, peripheral edema"
  - "Neutropenia (combination effect with chemo)"

serious_adverse_events:
  - "Severe nausea/vomiting requiring hospitalization (~10% G≥3 cycle 1)"
  - "Severe infusion reactions including anaphylaxis"
  - "Discontinuation due to GI toxicity ~7%"

major_interactions:
  - "Concurrent emetogenic chemotherapy — additive nausea/vomiting (mandate triple-antiemetic prophylaxis)"

pharmacology:
  half_life_hours: null
  half_life_notes: "Antibody PK; steady state by ~3-4 cycles"
  clearance: "non-specific catabolism (proteolysis); target-mediated"
  protein_binding_pct: null
  metabolism: "non-CYP; antibody catabolism"

sources:
  - SRC-NCCN-GASTRIC-2025
  - SRC-ESMO-GASTRIC-2024

last_reviewed: "2026-04-30"
reviewers: []
notes: >
  First-in-class anti-CLDN18.2 mAb. SPOTLIGHT (Shitara Lancet 2023):
  zolbetuximab + mFOLFOX6 vs mFOLFOX6 — mPFS 10.6 vs 8.7 mo (HR 0.75);
  mOS 18.2 vs 15.5 mo. GLOW (Shah Nat Med 2023): zolbetuximab + CAPOX
  vs CAPOX — mPFS 8.2 vs 6.8 mo (HR 0.69); mOS 14.4 vs 12.2 mo (HR
  0.77). FDA approval Oct 2024. Cycle-1 nausea is the dominant
  tolerability problem — mitigated by slow infusion + triple-antiemetic
  prophylaxis (5-HT3 + NK1-RA + dex) + dose interruption / reduction
  protocol; tolerance generally improves cycles 2+. SRC-SPOTLIGHT and
  SRC-GLOW source stubs not yet in KB — flagged for source ingestion.

notes_ua: >
  Перший представник класу анти-CLDN18.2 mAb — зольбетуксимаб
  (zolbetuximab). SPOTLIGHT (Shitara, Lancet 2023): зольбетуксимаб +
  mFOLFOX6 проти mFOLFOX6 — mPFS 10.6 vs 8.7 mo (HR 0.75); mOS 18.2
  vs 15.5 mo. GLOW (Shah, Nat Med 2023): зольбетуксимаб + CAPOX
  проти CAPOX — mPFS 8.2 vs 6.8 mo (HR 0.69); mOS 14.4 vs 12.2 mo
  (HR 0.77). Схвалення FDA — жовтень 2024. Нудота 1-го циклу —
  основна проблема переносимості; знижується завдяки повільній інфузії
  + тричленній антиеметичній профілактиці (5-HT3 + NK1-антагоніст +
  дексаметазон) + протоколу призупинення/зниження дози; переносимість
  загалом покращується з 2-го циклу. Stub-и SRC-SPOTLIGHT та SRC-GLOW
  ще не внесено до KB — позначено для source-ingestion.

