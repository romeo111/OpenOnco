notes_patient: >
  Препарат-мітка для пухлин шлунка з білком CLDN18.2: знаходить пухлинні
  клітини й помічає їх для імунної системи (поряд із хіміотерапією).
  Головний неприємний ефект — нудота/блювання (особливо у 1-й сесії);
  для цього призначаємо потужну профілактику + повільну інфузію.
