last_reviewed: "2026-04-26"
notes: >
  STRIDE (single priming tremelimumab + durvalumab maintenance)
  preferred over previous T+D Q4W dosing. HIMALAYA: mOS 16.4 vs 13.8
  mo sorafenib in unresectable HCC. Useful when bevacizumab
  contraindicated (high-risk varices, recent thromboembolic event).
  PACIFIC: durvalumab consolidation post-CRT in stage III
  unresectable NSCLC — mOS not reached vs 29.1 mo placebo, paradigm-
  defining. CASPIAN: durva + chemo extensive-stage SCLC. Baseline +
  serial TFTs, LFTs, creatinine, cortisol, troponin if cardiac
  history. Hospitalize and start IV methylprednisolone for G3-4 irAE.
  UA: registered; НСЗУ покриває PACIFIC-режим (NSCLC III
  нерезектабельна) та ext-SCLC. STRIDE-режим (з tremelimumab) —
  без UA НСЗУ.

notes_ua: >
  Режим STRIDE (одноразова прайминг-доза тремелімумабу + дурвалумаб у
  підтримуючій терапії) — переважний над попередньою схемою T+D Q4W.
  HIMALAYA: mOS 16.4 vs 13.8 mo при дурвалумабі (durvalumab) проти
  сорафенібу при нерезектабельному ГЦК. Корисний за наявності
  протипоказань до бевацизумабу (варикозно розширені вени високого
  ризику, нещодавня тромбоемболічна подія). PACIFIC: консолідуюча
  терапія дурвалумабом після CRT у III стадії нерезектабельного НДРЛ —
  mOS не досягнуто проти 29.1 mo при плацебо, парадигмо-визначальне
  дослідження. CASPIAN: дурвалумаб + хіміотерапія при ES-SCLC. Базові
  та серійні TFTs, LFTs, креатинін, кортизол, тропонін за наявності
  кардіологічного анамнезу. При irAE 3-4 ступеня — госпіталізація та
  в/в метилпреднізолон. В Україні: зареєстровано; НСЗУ покриває
  PACIFIC-режим (НДРЛ III нерезектабельна) та ext-SCLC. STRIDE-режим
  (з тремелімумабом) — без покриття НСЗУ.

