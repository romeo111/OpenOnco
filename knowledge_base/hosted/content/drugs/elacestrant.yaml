id: DRUG-ELACESTRANT
names:
  preferred: "Elacestrant"
  ukrainian: "Елацестрант"
  english: "Elacestrant"
  brand_names: ["Orserdu"]
atc_code: L02BA04
rxnorm_id: null
drug_class: "Oral SERD (selective estrogen receptor degrader)"
mechanism: >
  First-in-class oral SERD. EMERALD trial: elacestrant superior to fulvestrant or AI in ESR1-mutant HR+/HER2- metastatic post-CDK4/6i.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: null
    notes: "Not yet registered in Ukraine (2025). Off-label import / trial-only access. UA-availability gap; clinical-review queue item."

typical_dosing: >
  345 mg PO once daily with food.

key_toxicities:
  - Nausea (~35%)
  - Fatigue
  - Vomiting
  - Hot flashes
  - Decreased appetite
  - Hepatic enzyme elevations

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed: null
notes: >
  Indication: ESR1-mutant HR+/HER2- metastatic after at least one prior endocrine therapy. ESR1 mutation testing on ctDNA recommended pre-start.
