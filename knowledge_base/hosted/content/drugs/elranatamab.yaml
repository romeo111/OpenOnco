id: DRUG-ELRANATAMAB
names:
  preferred: "Elranatamab"
  ukrainian: "Елранатамаб"
  english: "Elranatamab"
  brand_names:
    - "Elrexfio"
atc_code: L01FX29
rxnorm_id: "2671959"
drug_class: "BCMA × CD3 bispecific T-cell engager (humanized IgG2a)"
mechanism: >
  Humanized bispecific antibody binding BCMA (B-cell maturation
  antigen, expressed on plasma cells + myeloma) on one arm and CD3
  on cytotoxic T-cells on the other. Forms immune synapse →
  T-cell activation, cytokine release + targeted plasma-cell
  killing independent of TCR specificity. Step-up dosing schedule
  mitigates first-cycle CRS. Off-the-shelf alternative to BCMA
  CAR-T for triple-class refractory MM (no manufacturing window).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2023
    indications_brief:
      - "R/R multiple myeloma after ≥4 prior lines including PI + IMiD + anti-CD38 (accelerated approval Aug 2023)"
  ema:
    approved: true
    year_first_approval: 2023
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-29"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-29).
      Біспецифічна BCMA×CD3 терапія для триклас-рефрактерної ММ;
      не входить до жодного пакету НСЗУ.
      Шляхи доступу:
      - Named-patient import: спеціальний дозвіл DEC (Держекспертний центр)
        на ввезення незареєстрованого ЛЗ для конкретного пацієнта.
      - EAP Pfizer Ukraine (compassionate use; критерії: ≥4 попередні
        лінії з PI/IMiD/anti-CD38).
      - Cross-border (EU): направлення до Charité/Karolinska за пакетом
        "Лікування за кордоном" (наказ МОЗ 988).
      - Trial-only: MagnetisMM-серія активна в EU.
      Source: drlz.com.ua пошук "elranatamab"/"elrexfio" 2026-04-29 — РП відсутнє.

typical_dosing: >
  Step-up dosing required (CRS mitigation): 12 mg SC day 1, 32 mg SC
  day 4 — minimum 48-72h between doses, with hospitalization for
  observation. Full dose: 76 mg SC weekly through week 24, then
  every 2 weeks thereafter (response-adapted; reduces infection
  burden and improves convenience). Continue until progression or
  unacceptable toxicity.
formulations:
  - "Pre-filled SC vials 40 mg/mL and 76 mg/1.9 mL"

absolute_contraindications:
  - "Active uncontrolled infection"
  - "Hypersensitivity to elranatamab"
black_box_warnings:
  - "Cytokine release syndrome (CRS) — ~58% any grade, ~0% Grade ≥3 in MagnetisMM-3"
  - "Neurologic toxicity / ICANS (~3% Grade ≥3)"
  - "Serious infections — Grade ≥3 ~40%; opportunistic + bacterial; hypogammaglobulinemia universal"
  - "Hepatotoxicity"
major_interactions:
  - "Live vaccines contraindicated"
  - "Concomitant immunosuppressants — additive infection risk"
common_adverse_events:
  - "CRS (vast majority during step-up dosing)"
  - "Hypogammaglobulinemia (universal)"
  - "Neutropenia, thrombocytopenia, anemia"
  - "Injection-site reactions"
  - "Fatigue"
  - "Diarrhea, nausea"
  - "Headache"
serious_adverse_events:
  - "Severe infection — leading cause of treatment-related mortality"
  - "Severe CRS"
  - "ICANS"
  - "Hepatotoxicity"
  - "PML (rare)"

pharmacology:
  half_life: "~22 days (steady-state); SC bioavailability good"
  route: "SC"

sources:
  - SRC-NCCN-MM-2025
  - SRC-ESMO-MM-2023

last_reviewed: "2026-04-29"
notes: >
  MagnetisMM-3 (Lesokhin 2023, Nat Med): triple-class refractory MM
  after ≥4 prior lines (median 5) — ORR 61%, CR ~35%, mPFS ~17 mo
  in BCMA-naive cohort. FDA accelerated approval Aug 2023; EMA Dec
  2023. Hospitalization REQUIRED for step-up doses (CRS observation
  48-72h after each). Tocilizumab + corticosteroids for CRS
  management. Mandatory PJP + HSV prophylaxis; IVIG supplementation
  for IgG <400 (universal hypogammaglobulinemia). Bi-weekly dosing
  after week 24 reduces infection burden vs continuous weekly
  schedules. NOTE: Pivotal trial Source SRC-MAGNETISMM-3-LESOKHIN-2023
  not yet in KB — evidence base cited via NCCN-MM and ESMO-MM
  guideline references; flag for source-stub creation.
