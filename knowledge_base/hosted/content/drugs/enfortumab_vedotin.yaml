id: DRUG-ENFORTUMAB-VEDOTIN
names:
  preferred: "Enfortumab vedotin"
  ukrainian: "Енфортумаб ведотин"
  english: "Enfortumab vedotin"
  synonyms: ["enfortumab vedotin-ejfv", "ASG-22ME"]
  brand_names: ["Padcev"]
atc_code: L01FX13
rxnorm_id: ""
drug_class: "Nectin-4-targeted antibody-drug conjugate (MMAE payload)"
mechanism: >
  Fully human anti-Nectin-4 IgG1κ monoclonal antibody (AGS-22M6)
  conjugated via a protease-cleavable maleimidocaproyl-valine-
  citrulline-PAB linker to monomethyl auristatin E (MMAE), a potent
  microtubule-disrupting cytotoxic payload (drug-to-antibody ratio
  ~3.8). Nectin-4 (PVRL4) is highly expressed in urothelial
  carcinoma (>95% of mUC cases), with limited normal-tissue
  expression (skin keratinocytes, salivary gland — accounting for
  characteristic skin and ocular AEs). After antigen binding the ADC
  is internalized; lysosomal cleavage releases MMAE, which binds
  tubulin and induces G2/M arrest and apoptosis. Pivotal EV-302
  (1L locally advanced / metastatic urothelial carcinoma:
  enfortumab vedotin + pembrolizumab vs platinum-based chemo): mPFS
  12.5 vs 6.3 mo HR 0.45, mOS 31.5 vs 16.1 mo HR 0.47 — first
  combination to surpass platinum chemo as 1L mUC standard,
  paradigm-shifting; FDA full approval Dec 2023.

