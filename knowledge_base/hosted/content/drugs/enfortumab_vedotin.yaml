reviewers: []
notes: >
  EV-302 (NEJM 2024 Powles): paradigm-shifting trial that moved
  enfortumab+pembrolizumab to 1L mUC SoC, displacing platinum-based
  chemo. mOS doubling (31.5 vs 16.1 mo) is among the largest ever
  reported in mUC. Hyperglycemia is the signal AE — monitor fasting
  glucose weekly first 4 weeks then with each cycle, especially in
  diabetic / pre-diabetic / obese patients (BMI >30); proactive
  metformin and insulin adjustment. Mandatory baseline + ongoing
  ophthalmologic exam; lubricating drops continuously; corticosteroid
  drops for keratitis. Skin toxicity escalation algorithm: hold and
  dermatology consult for any new rash with pustules, target lesions,
  or mucosal involvement (SJS suspicion); permanent discontinuation
  for SJS/TEN. Counsel patients on neuropathy onset (gloves/socks
  early symptom). UA access via EAP / cross-border / self-pay only —
  not on НСЗУ. EV-302 access pathway is the dominant 1L mUC standard
  in EU centers via "Лікування за кордоном" (наказ МОЗ 988).

notes_ua: >
  EV-302 (Powles, NEJM 2024) — парадигма-зсувне дослідження, яке
  перемістило енфортумаб ведотин (enfortumab vedotin) + пембролізумаб
  у стандарт 1L mUC, витіснивши платиновмісну хіміотерапію. Подвоєння
  mOS (31.5 vs 16.1 mo) — одне з найбільших, коли-небудь повідомлених
  у mUC. Гіперглікемія — сигнальне небажане явище: моніторинг глюкози
  натще щотижня перші 4 тижні, далі з кожним циклом, особливо у
  діабетиків / пре-діабетиків / пацієнтів з ожирінням (BMI >30);
  проактивний метформін та корекція інсуліну. Обов'язковий базовий та
  серійний офтальмологічний огляд; зволожуючі краплі постійно;
  кортикостероїдні краплі при кератиті. Алгоритм ескалації шкірної
  токсичності: призупинення та консультація дерматолога при будь-якому
  новому висипі з пустулами, мішенеподібними елементами або ураженням
  слизових (підозра на SJS); постійна відміна при SJS/TEN. Інформувати
  пацієнтів про ранні симптоми нейропатії (відчуття у пальцях рук/ніг).
  В Україні доступ — через EAP, транскордонне лікування або out-of-pocket;
  не покривається НСЗУ. Шлях EV-302 є домінуючим 1L mUC стандартом у
  EU-центрах через «Лікування за кордоном» (наказ МОЗ 988).

