typical_dosing: >
  1.25 mg/kg (capped at 125 mg per dose for patients ≥100 kg) IV
  over 30 minutes on Days 1, 8, 15 of each 28-day cycle. With or
  without pembrolizumab 200 mg IV q3w (per EV-302; pembrolizumab
  given Day 1 of each pembro cycle). Continue until disease
  progression / unacceptable toxicity. Dose level -1 = 1.0 mg/kg;
  -2 = 0.75 mg/kg; -3 = 0.5 mg/kg; permanent discontinuation if
  recurrent G3-4 at -3. Hold for G3-4 skin toxicity, G3-4
  hyperglycemia, G3-4 peripheral neuropathy, G3-4 ocular toxicity,
  pneumonitis, severe infusion reaction. Renal: no formal adjustment
  for CrCl ≥30; not studied in severe renal impairment. Hepatic:
  avoid in moderate-severe hepatic impairment (no PK data).

formulations:
  - "Powder for IV infusion (single-dose vials 20 mg, 30 mg)"

absolute_contraindications:
  - "Severe hypersensitivity to enfortumab vedotin or any excipient"
  - "Pregnancy (embryo-fetal toxicity from MMAE)"
  - "Confirmed history of severe SJS / TEN with this product"

black_box_warnings:
  - "Severe and fatal cutaneous adverse reactions (boxed) — including SJS / TEN / DRESS / SCAR; can be life-threatening; mandate immediate hold for any new skin reaction worse than maculopapular rash, dermatology consultation, and permanent discontinuation for SJS / TEN / G4 reactions"

common_adverse_events:
  - "Skin reactions (maculopapular rash, pruritus, alopecia, palmar-plantar erythrodysesthesia) ~70% any-grade; G3 ~15%"
  - "Peripheral neuropathy (sensory dominant) ~50% (G3 ~5%)"
  - "Fatigue ~50%"
  - "Decreased appetite ~50%"
  - "Diarrhea ~40%"
  - "Nausea ~40%"
  - "Dysgeusia ~40%"
  - "Hyperglycemia ~15% (G3 ~7-10%)"
  - "Anemia ~50%"
  - "Neutropenia ~30%"
  - "Increased lipase ~30%"
  - "Increased AST/ALT ~30%"
  - "Dry eye ~20%"
  - "Dry skin ~20%"

serious_adverse_events:
  - "Severe cutaneous reactions / SJS / TEN / DRESS (boxed) — G3+ ~15%; can be fatal"
  - "Severe hyperglycemia / DKA (G3+ ~7-10% — particular risk in diabetics, BMI >30, baseline HbA1c >8; mandate baseline + monitor)"
  - "Severe peripheral neuropathy with motor involvement (G3 ~5%)"
  - "Pneumonitis / interstitial lung disease (G3+ ~3%; can be fatal)"
  - "Ocular toxicity (keratitis, blurred vision, ulcer ~20% any; G3 ~3%)"
  - "Severe infusion reactions (~3%)"
  - "Hepatotoxicity (G3 ALT/AST ~3%)"
  - "Severe cytopenia / febrile neutropenia"

major_interactions:
  - "Strong CYP3A4 inhibitors (azoles, clarithromycin, ritonavir) — ↑ MMAE payload exposure; monitor for AE"
  - "Strong CYP3A4 inducers (rifampin, phenytoin, St John's wort) — ↓ exposure; avoid"
  - "Concurrent pembrolizumab (intentional EV-302 combination) — additive irAE risk (skin, hepatic)"
  - "Other neurotoxic agents (taxanes, platinum, vinca) — additive peripheral neuropathy if sequenced closely"
  - "Insulin / oral hypoglycemics — adjust diabetes regimen for hyperglycemia"
  - "Live vaccines — avoid"

pharmacology:
  half_life_hours: 84
  clearance: "ADC catabolism; MMAE payload via CYP3A4 + biliary"
  protein_binding_pct: null
  metabolism: "ADC catabolism via reticuloendothelial system; released MMAE primarily CYP3A4"

