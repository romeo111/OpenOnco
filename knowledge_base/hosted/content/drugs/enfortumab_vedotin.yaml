id: DRUG-ENFORTUMAB-VEDOTIN
names:
  preferred: "Enfortumab vedotin"
  ukrainian: "Енфортумаб ведотин"
  english: "Enfortumab vedotin"
  brand_names: ["Padcev"]
atc_code: L01FX13
rxnorm_id: null
drug_class: "Nectin-4-targeted antibody-drug conjugate (MMAE payload)"
mechanism: >
  Anti-Nectin-4 ADC linked to MMAE microtubule disruptor. EV-302: 1L metastatic urothelial w/ pembrolizumab.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      Nectin-4 ADC для la/m UC; не входить до пакетів НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл) — за рахунок пацієнта.
      - EAP Astellas/Pfizer Ukraine (через локальних медрепів) —
        обмежено, переважно для post-platinum + post-pembrolizumab.
      - Cross-border (EU): EV-302 (з пембролізумабом) — SoC 1L m UC
        в EU; направлення можливе через "Лікування за кордоном"
        (наказ МОЗ 988).
      - Trial-only: EV-серія активна в EU.
      Source: drlz.com.ua пошук "enfortumab"/"padcev" 2026-04-27 — РП відсутнє.

typical_dosing: >
  1.25 mg/kg IV days 1, 8 of 21-day cycle + pembrolizumab 200 mg q3w.

key_toxicities:
  - Severe skin reactions (TEN-like; boxed warning)
  - Hyperglycemia
  - Peripheral neuropathy
  - Ocular AEs

sources: [SRC-NCCN-NSCLC-2025]
last_reviewed: null
notes: >
  STUB. EV-302 paradigm-shifting 1L mUC. Not registered in Ukraine — major access barrier.
