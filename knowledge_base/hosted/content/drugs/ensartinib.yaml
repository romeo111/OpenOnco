id: DRUG-ENSARTINIB
names:
  preferred: "Ensartinib"
  ukrainian: "Енсартиніб"
  english: "Ensartinib"
  brand_names: ["Ensacove"]
atc_code:
rxnorm_id:
drug_class: "ALK tyrosine kinase inhibitor (2nd-generation)"
mechanism: >
  Oral, second-generation ALK tyrosine kinase inhibitor with activity against ALK rearrangements and several crizotinib-resistance mutations. Also has CNS penetration. Distinct binding mode from alectinib / brigatinib / lorlatinib.

regulatory_status:
  fda:
    approved: true
    notes: "FDA approved 2024-12-18 (Ensacove) — first-line treatment of adult patients with ALK-positive locally advanced or metastatic non-small cell lung cancer, based on eXalt3."
  ema: {approved: false}
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-04-29"
    notes: "Не зареєстрований в Україні станом на 2026-04. НСЗУ не покриває. Доступ — клінічні випробування або import. Першочерговий стандарт у НСЗУ для ALK+ НДРЛ — alectinib (зареєстрований і покривається). Джерело: dls.gov.ua (2026-04)."

    reimbursement_indications: []
typical_dosing: >
  225 mg PO once daily, with or without food, until disease progression or unacceptable toxicity.

key_toxicities:
- Rash (~67% any grade, ~12% G≥3 — distinguishing AE vs other ALK TKIs; topical / systemic corticosteroids; dose reduction)
- Constipation (~36%)
- Pruritus (~28%)
- Nausea (~25%)
- Edema (~18%)
- Hepatotoxicity / ALT-AST elevation (~33% — monitor LFTs; hold/dose-reduce per protocol)
- QT-interval prolongation (baseline + serial ECG; avoid concomitant QT-prolonging drugs)
- Bradycardia
- Pneumonitis / interstitial lung disease (~3% — class effect; baseline CT + monitoring)
- Visual disturbance (lower than crizotinib)

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed:
notes: >
  eXalt3 (NCT02767804): Phase III, treatment-naive ALK-positive advanced NSCLC. Ensartinib vs crizotinib. mPFS 25.8 vs 12.7 mo (HR 0.51). Intracranial response superior to crizotinib. FDA approval Dec 2024 — first-line ALK+ NSCLC. Comparative positioning: alectinib, brigatinib, lorlatinib remain preferred 1L per NCCN/ESMO based on cross-trial PFS and mature CNS data; ensartinib provides additional 2nd-gen option. Distinguishing AE = rash. Trial-source SRC for eXalt3 not yet ingested into KB — FLAG for follow-up.

notes_patient: >
  Таблетка-ALK-інгібітор 2-го покоління для ALK+ НДРЛ у 1-й лінії (схвалено FDA у грудні 2024). Альтернатива до alectinib / brigatinib / lorlatinib (які залишаються основним стандартом). Характерний побічний ефект — висип; контролюємо печінкові проби та ЕКГ.
