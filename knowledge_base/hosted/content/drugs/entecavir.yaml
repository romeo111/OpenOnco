id: DRUG-ENTECAVIR
names:
  preferred: "Entecavir"
  ukrainian: "Ентекавір"
  english: "Entecavir"
  brand_names: ["Baraclude"]
atc_code: J05AF10
rxnorm_id: "248111"
drug_class: "Nucleoside HBV polymerase inhibitor"
mechanism: >
  Guanosine analog; inhibits HBV reverse transcriptase / polymerase
  activity, suppressing viral replication.

regulatory_status:
  fda:
    approved: true
    first_approval_year: 2005
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: "[TBD]"
    reimbursed_nszu: true
    reimbursement_indications:
      - "Хронічний гепатит B"
    last_verified: "2026-04-25"

typical_dosing: "0.5 mg PO daily (treatment-naive); 1 mg PO daily (lamivudine-experienced)"
formulations:
  - "Tablet 0.5 mg / 1 mg"
  - "Oral solution 0.05 mg/mL"

absolute_contraindications:
  - "Hypersensitivity"
common_adverse_events:
  - "Headache"
  - "Fatigue"
  - "Dizziness"
  - "Nausea"
serious_adverse_events:
  - "Lactic acidosis (rare)"
  - "Severe hepatomegaly with steatosis (rare)"
  - "Severe HBV reactivation upon discontinuation"

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
notes: >
  Used as HBV reactivation prophylaxis in HBsAg+ or anti-HBc+ patients
  receiving rituximab/obinutuzumab or chemotherapy. Continue for at
  least 12 months after completing immunosuppressive therapy.
