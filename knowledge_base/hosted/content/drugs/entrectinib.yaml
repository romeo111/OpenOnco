id: DRUG-ENTRECTINIB
names:
  preferred: "Entrectinib"
  ukrainian: "Ентректініб"
  english: "Entrectinib"
  brand_names: ["Rozlytrek"]
atc_code: L01EX14
rxnorm_id: null
drug_class: "ROS1 / NTRK / ALK TKI (CNS-penetrant)"
mechanism: >
  Multi-kinase inhibitor (TRKA/B/C / ROS1 / ALK) with high CNS penetration. Tumor-agnostic NTRK-fusion indication; 1L preferred for ROS1+ NSCLC per ESMO.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      NTRK/ROS1 інгібітор з CNS-проникненням; не входить до НСЗУ
      (на відміну від ларотректинібу — ще менш доступний).
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP Roche Ukraine (Rozlytrek access — потребує підтвердженого
        NTRK-fusion або ROS1+ NSCLC NGS).
      - Cross-border (EU): EU онкоцентри через "Лікування за кордоном"
        (наказ МОЗ 988); EMA-затверджено 2020.
      - Trial-only: STARTRK / ALKA-серія post-marketing.
      Source: drlz.com.ua пошук "entrectinib"/"rozlytrek" 2026-04-27 — РП відсутнє.

typical_dosing: >
  600 mg PO once daily.

key_toxicities:
  - Dysgeusia
  - Constipation
  - Fatigue
  - Cognitive / mood (TRK class)
  - Weight gain
  - Hepatic

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed: null
notes: >
  STARTRK-2: tumor-agnostic NTRK + ROS1 efficacy. Larotrectinib alternative for NTRK-only.

notes_ua: >
  STARTRK-2: tumor-agnostic-ефективність ентректінібу (entrectinib) при
  NTRK + ROS1-позитивних пухлинах. Альтернатива — ларотректиніб
  (larotrectinib) для виключно NTRK-позитивних випадків. Перевагою
  ентректінібу є висока ЦНС-проникність, що робить його переважним 1L
  при ROS1+ НДРЛ за настановами ESMO.

ukrainian_review_status: pending_clinical_signoff
