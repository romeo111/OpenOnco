id: DRUG-EPCORITAMAB
names:
  preferred: "Epcoritamab"
  ukrainian: "Епкоритамаб"
  english: "Epcoritamab"
  brand_names:
    - "Epkinly"
    - "Tepkinly"
atc_code: L01FX26
rxnorm_id: "2671964"
drug_class: "CD20 × CD3 bispecific T-cell engager (humanized IgG1, DuoBody platform; SC administration)"
mechanism: >
  Humanized IgG1 bispecific antibody (Genmab DuoBody platform)
  binding CD20 on B-cells and CD3 on T-cells, redirecting
  polyclonal T-cell cytotoxicity to CD20+ malignant B-cells.
  Subcutaneous administration with step-up dosing schedule
  mitigates first-cycle CRS. First-in-class SC CD20×CD3
  bispecific (vs IV mosunetuzumab/glofitamab) — improves
  ambulatory administration profile.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2023
    indications_brief:
      - "R/R diffuse large B-cell lymphoma (DLBCL) NOS, high-grade B-cell lymphoma, after ≥2 prior lines (accelerated approval May 2023)"
      - "R/R follicular lymphoma after ≥2 prior lines (accelerated approval Jun 2024)"
  ema:
    approved: true
    year_first_approval: 2023
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-29"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-29).
      Біспецифічна CD20×CD3 SC-терапія для r/r DLBCL та r/r FL;
      не входить до жодного пакету НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP AbbVie / Genmab (compassionate use; критерії: failure ≥2
        ліній anti-CD20-вмісних режимів, неприйнятність CAR-T).
      - Cross-border (EU): EU гематоцентри за пакетом "Лікування за
        кордоном" (наказ МОЗ 988).
      - Trial-only: EPCORE-серія активна в EU.
      Source: drlz.com.ua пошук "epcoritamab"/"epkinly"/"tepkinly"
      2026-04-29 — РП відсутнє.

typical_dosing: >
  Step-up dosing required (CRS mitigation): 0.16 mg SC day 1 (cycle 1),
  0.8 mg SC day 8 (cycle 1), 48 mg SC day 15 (cycle 1) and day 22.
  Cycles 2-3 (28-day cycles): 48 mg SC weekly.
  Cycles 4-9: 48 mg SC every 2 weeks.
  Cycles 10+: 48 mg SC every 4 weeks until progression / unacceptable
  toxicity. Hospitalization required for first 48 mg dose (cycle 1
  day 15, 24h observation).
formulations:
  - "Pre-filled SC vials 4 mg/0.8 mL and 48 mg/0.8 mL"

absolute_contraindications:
  - "Active uncontrolled infection"
  - "Hypersensitivity to epcoritamab"
black_box_warnings:
  - "Cytokine release syndrome (CRS) — ~50% any grade, ~3% Grade ≥3 in EPCORE NHL-1"
  - "Neurologic toxicity / ICANS (~6%)"
  - "Serious infections — Grade ≥3 ~15-20%"
major_interactions:
  - "Live vaccines contraindicated"
  - "Concomitant immunosuppressants — additive infection risk"
common_adverse_events:
  - "CRS (predominantly during step-up + first full dose)"
  - "Pyrexia"
  - "Injection-site reactions"
  - "Fatigue"
  - "Neutropenia"
  - "Anemia, thrombocytopenia"
  - "Hypogammaglobulinemia"
  - "Headache"
  - "Diarrhea, nausea"
serious_adverse_events:
  - "Severe CRS"
  - "ICANS"
  - "Tumor flare / TLS in high-burden disease"
  - "Severe / opportunistic infection (PJP, CMV)"
  - "Hepatotoxicity (rare)"

pharmacology:
  half_life: "~22-25 days (steady-state); SC bioavailability ~63%"
  route: "SC"

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024
  - SRC-ESMO-FL-2024

last_reviewed: "2026-04-29"
notes: >
  EPCORE NHL-1 (Thieblemont 2023, JCO): r/r DLBCL after ≥2 prior
  lines (median 3; ~38% post-CAR-T) — ORR 63%, CR 39%, mDOR
  ~12 mo. Subset r/r FL ≥2L (Linton 2023, Lancet Haematol):
  ORR 82%, CR 63%. FDA accelerated approval May 2023 (DLBCL),
  Jun 2024 (FL). Distinct from CAR-T: off-the-shelf, no
  lymphodepletion, ambulatory after cycle 1 day 15. Useful in
  patients ineligible for CAR-T (frailty, comorbidity, manufacturing
  delay) or post-CAR-T progression. Lower depth/duration of
  response vs CAR-T in DLBCL but better tolerability. Hospital
  observation required for first 48 mg dose (cycle 1 day 15).
  Mandatory PJP + HSV prophylaxis; IVIG for IgG <400. NOTE:
  Pivotal trial Source SRC-EPCORE-NHL-1-THIEBLEMONT-2023 not yet
  in KB — evidence base cited via NCCN-BCELL and ESMO-DLBCL/FL
  guideline references; flag for source-stub creation.

notes_ua: >
  EPCORE NHL-1 (Thieblemont 2023, JCO): R/R ДВККЛ після ≥2 попередніх
  ліній (медіана 3; ~38% після CAR-T) — ORR 63%, CR 39%, mDOR ~12 mo.
  Підгрупа R/R FL ≥2L (Linton 2023, Lancet Haematol): ORR 82%, CR 63%.
  Епкоритамаб (epcoritamab): FDA accelerated approval — травень 2023
  (ДВККЛ), червень 2024 (FL). Відрізняється від CAR-T: off-the-shelf
  препарат, без лімфодеплеції, амбулаторне введення з 15 дня 1 циклу.
  Корисний у пацієнтів, неприйнятних для CAR-T (немічність,
  коморбідність, виробничі затримки) або при прогресуванні після
  CAR-T. Менша глибина/тривалість відповіді порівняно з CAR-T при
  ДВККЛ, проте краща переносимість. Обов'язкове стаціонарне
  спостереження після першої дози 48 mg (1 цикл, день 15). Обов'язкова
  профілактика PJP та HSV; IVIG при IgG <400. ПРИМІТКА: pivotal-trial-
  джерело SRC-EPCORE-NHL-1-THIEBLEMONT-2023 ще не внесено до KB —
  доказова база цитується через настанови NCCN-BCELL та ESMO-DLBCL/FL;
  позначено для source-stub-створення.

