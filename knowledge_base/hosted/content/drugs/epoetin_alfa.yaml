id: DRUG-EPOETIN-ALFA
names:
  preferred: "Epoetin alfa / Darbepoetin alfa"
  ukrainian: "Епоетин альфа / Дарбепоетин альфа"
  english: "Epoetin alfa / Darbepoetin alfa"
  synonyms: ["ESA", "Erythropoiesis-stimulating agent", "rHuEPO"]
  brand_names: ["Eprex", "Epogen", "Procrit", "Aranesp (darbepoetin)"]
atc_code: B03XA01
rxnorm_id: "105694"
drug_class: "Erythropoiesis-stimulating agent (ESA, recombinant erythropoietin)"
mechanism: >
  Recombinant human erythropoietin / hyperglycosylated analog (darbepoetin).
  Binds erythroid progenitor EPO receptor → erythroid expansion. 1L for
  symptomatic anemia in lower-risk MDS with low endogenous EPO (≤500
  mU/mL) and modest transfusion burden (≤2U/mo).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Анемія у пацієнтів з хіміотерапіями (у відповідних показаннях)"
      - "Анемія при мієлодиспластичних синдромах низького ризику"
    last_verified: "2026-04-27"
typical_dosing: >
  MDS-LR anemia: epoetin alfa 60,000 IU SC weekly OR darbepoetin 150-300
  μg SC weekly. Re-evaluate at 8-12 weeks; if Hb response (≥1.5 g/dL
  rise) → continue, else discontinue. Target Hb 11-12 g/dL (do not exceed).
formulations: ["Pre-filled syringes 1000-40,000 IU (epoetin) / 10-500 μg (darbepoetin)"]

absolute_contraindications:
  - "Uncontrolled hypertension"
  - "Pure red cell aplasia (PRCA) on prior ESA"
  - "Pregnancy (relative — case-by-case)"
  - "Hypersensitivity"
black_box_warnings:
  - "Increased mortality, MI, stroke when targeting Hb >12 g/dL — keep target lower"
  - "Increased VTE risk"
  - "Tumor progression / mortality in some cancer settings (ESA must NOT be used in solid tumors with curative intent)"
major_interactions: []
common_adverse_events:
  - "Hypertension"
  - "Headache"
  - "Injection-site reactions"
  - "Arthralgia"
serious_adverse_events:
  - "Thromboembolism (DVT, PE, MI, stroke)"
  - "Hypertensive crisis with seizures"
  - "Pure red cell aplasia (rare; anti-EPO antibodies)"

pharmacology: {half_life: "epoetin ~9 hours; darbepoetin ~25 hours"}

sources:
  - SRC-NCCN-AML-2025
  - SRC-ESMO-MDS-2021

last_reviewed: "2026-04-25"
notes: >
  MDS-LR 1L for symptomatic anemia if endogenous EPO ≤500 mU/mL AND TD
  ≤2U/month — response rate ~50-60% in this selected population. Add
  G-CSF in non-responders if RS-MDS. Target Hb 10-12 g/dL — do NOT exceed
  (boxed warning). Iron supplementation as needed. Switch to luspatercept
  on ESA failure (MEDALIST) — both reimbursement-asymmetric in Ukraine
  (ESA reimbursed, luspatercept not).

notes_ua: >
  Епоетин альфа (epoetin alfa) / дарбепоетин альфа — 1-ша лінія при
  МДС-LR з симптоматичною анемією за умови ендогенного EPO ≤500 mU/mL
  ТА трансфузійного навантаження ≤2U/місяць — частота відповіді
  ~50-60% у цій відібраній популяції. Додавання G-CSF у non-responders
  при RS-МДС. Цільовий Hb 10-12 g/dL — НЕ перевищувати (boxed warning).
  Залізо за потреби. Перехід на люспатерцепт при невдачі ESA-терапії
  (MEDALIST) — обидва препарати асиметрично покриваються в Україні
  (ESA покривається, люспатерцепт — ні).

ukrainian_review_status: pending_clinical_signoff
