id: DRUG-EXEMESTANE
names:
  preferred: "Exemestane"
  ukrainian: "Екземестан"
  english: "Exemestane"
  brand_names: ["Aromasin"]
atc_code: L02BG06
rxnorm_id: null
drug_class: "Aromatase inhibitor (steroidal, irreversible)"
mechanism: >
  Steroidal irreversible AI — covalently modifies aromatase active site. Useful as switch therapy after non-steroidal AI failure or in metastatic post-CDK4/6i exposure.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: null
    notes: "Generic; reimbursed."

typical_dosing: >
  25 mg PO once daily with food (food increases bioavailability).

key_toxicities:
  - Same hot-flash, arthralgia, BMD profile as non-steroidal AIs
  - Mild androgenic effects (steroidal class) — slightly different lipid profile

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed: null
notes: >
  Used in BOLERO-2 (exemestane + everolimus post-AI failure), MONARCH-2 (fulvestrant + abemaciclib alternative). Sequential use after anastrozole/letrozole if clinical preference.
