    reimbursement_indications:
      - "Гормон-чутливий рак молочної залози (ад'ювантна, постменопауза)"
      - "Метастатичний гормон-чутливий рак молочної залози (після нестероїдного АІ)"
    last_verified: "2026-04-27"
    notes: "Generic; reimbursed."
key_toxicities:
  - Same hot-flash, arthralgia, BMD profile as non-steroidal AIs
  - Mild androgenic effects (steroidal class) — slightly different lipid profile

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed: null
notes: >
  Used in BOLERO-2 (exemestane + everolimus post-AI failure), MONARCH-2 (fulvestrant + abemaciclib alternative). Sequential use after anastrozole/letrozole if clinical preference.

notes_ua: >
  Екземестан (exemestane) застосовується в BOLERO-2 (екземестан +
  еверолімус після невдачі AI), а також як альтернатива у MONARCH-2
  (фулвестрант + абемацикліб). Послідовне застосування після
  анастрозолу / летрозолу за клінічною перевагою. На відміну від
  нестероїдних AI, є стероїдним необоротним інгібітором ароматази —
  корисний як switch-терапія після невдачі нестероїдного AI.

