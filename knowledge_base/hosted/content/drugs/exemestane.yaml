id: DRUG-EXEMESTANE
names:
  preferred: "Exemestane"
  ukrainian: "Екземестан"
  english: "Exemestane"
  brand_names: ["Aromasin"]
atc_code: L02BG06
rxnorm_id: null
drug_class: "Aromatase inhibitor (steroidal, irreversible)"
mechanism: >
  Steroidal irreversible AI — covalently modifies aromatase active site. Useful as switch therapy after non-steroidal AI failure or in metastatic post-CDK4/6i exposure.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
