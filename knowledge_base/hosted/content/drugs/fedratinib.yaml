id: DRUG-FEDRATINIB
names:
  preferred: "Fedratinib"
  ukrainian: "Федратиніб"
  english: "Fedratinib"
  brand_names: ["Inrebic"]
atc_code: L01EJ02
rxnorm_id: "2282514"
drug_class: "JAK2 inhibitor (selective for JAK2 over JAK1)"
mechanism: >
  Selective JAK2 inhibitor with FLT3 activity. Active in MF after
  ruxolitinib failure / intolerance. Boxed warning for
  Wernicke encephalopathy (thiamine deficiency).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-04-25"

typical_dosing: >
  MF: 400 mg PO once daily with food. Hold for severe diarrhea / nausea.
  Mandatory thiamine supplementation + screening for thiamine deficiency
  before each cycle.
formulations: ["Capsules 100 mg"]

absolute_contraindications:
  - "Baseline thiamine deficiency (correct first)"
  - "Pregnancy"
  - "Hypersensitivity"
black_box_warnings:
  - "Wernicke encephalopathy / thiamine deficiency — fatal if untreated; mandatory thiamine before + during therapy"
major_interactions:
  - "Strong CYP3A4 inhibitors / inducers"
  - "Acid-reducing agents reduce absorption"
common_adverse_events:
  - "Diarrhea (frequent — antidiarrheal prophylaxis recommended)"
  - "Nausea/vomiting"
  - "Anemia / thrombocytopenia"
  - "Fatigue"
serious_adverse_events:
  - "Wernicke encephalopathy (boxed)"
  - "Hepatotoxicity"
  - "Severe diarrhea with dehydration"

pharmacology: {half_life: "~41 hours"}

sources:
  - SRC-NCCN-MPN-2025
  - SRC-COMFORT-I-VERSTOVSEK-2012

last_reviewed: "2026-04-25"
notes: >
  2L MF (post-ruxolitinib failure or intolerance); FREEDOM-2 confirmed
  spleen response benefit. Take with food to reduce GI toxicity.
  Mandatory thiamine measurement + supplementation before each cycle.
  NOT registered in Ukraine.
