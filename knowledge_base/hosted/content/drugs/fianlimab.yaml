id: DRUG-FIANLIMAB
name: "Fianlimab"
name_ua: "Фіанліма"
brand_names: ["Bivigam"]
drug_class: "Anti-LAG-3 immune checkpoint inhibitor (monoclonal antibody)"
atc_code: L01FX25
mechanism_of_action: >
  Fully human IgG4 monoclonal antibody that binds LAG-3 (lymphocyte activation gene 3,
  CD223), a coinhibitory immune checkpoint receptor expressed on activated and exhausted
  T cells. LAG-3 binds MHC class II molecules on antigen-presenting cells and some tumor
  cells, suppressing T-cell activity. Fianlimab blocks LAG-3/MHC-II interaction, restoring
  T-cell cytotoxic function. Combined LAG-3 + PD-1 blockade (fianlimab + pembrolizumab)
  provides synergistic immune activation beyond single checkpoint blockade — two distinct
  T-cell exhaustion pathways targeted simultaneously.
standard_doses:
  - indication: "Advanced melanoma (with pembrolizumab)"
    dose: "1600 mg IV Q3W (fianlimab) + pembrolizumab 200 mg IV Q3W"
    schedule: "Q21D; both agents administered same day; fianlimab given after pembrolizumab"
    notes: "Infuse fianlimab over 30 min via non-pyrogenic, low-protein-binding 0.2-5 micron inline filter"
key_toxicities:
  - "irAEs: similar spectrum to PD-1 inhibitors, potentially higher frequency with combination"
  - "Immune-mediated pneumonitis: ~5% Grade 3+; CT monitoring if respiratory symptoms"
  - "Immune-mediated hepatitis: LFT elevation"
  - "Immune-mediated colitis: diarrhea Grade 3+"
  - "Endocrinopathies: thyroid dysfunction, adrenal insufficiency, hypophysitis"
  - "Immune-mediated skin reactions: rash, vitiligo"
  - "Myocarditis (rare, <1%): high-sensitivity troponin monitoring if symptoms"
contraindications:
  - "Active autoimmune disease requiring systemic corticosteroids >10 mg/day prednisone equivalent"
  - "Solid organ transplant recipients"
  - "Active neurological autoimmune conditions (MS, MG, encephalitis)"
special_populations:
  - "Pregnancy: immune checkpoint inhibitors cause fetal harm; contraindicated"
  - "No dose modification for mild-moderate hepatic impairment"
monitoring:
  - "TSH, free T4: baseline and Q6-8 weeks"
  - "LFTs, glucose: baseline and with each cycle"
  - "CBC with differential: each cycle"
  - "Imaging for response assessment: Q9-12 weeks"
  - "Patient education on irAE symptoms: mandatory"
sources:
  - SRC-NCCN-MELANOMA-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  FDA approved February 2025 for adults with unresectable or metastatic melanoma,
  in combination with pembrolizumab, based on RELATIVITY-2 trial (NCT04303169).
  RELATIVITY-2: fianlimab + pembro vs pembro alone in previously untreated
  unresectable/metastatic melanoma. Dual checkpoint (LAG-3 + PD-1) blockade.
  Follows the RELATIVITY-047 precedent (relatlimab + nivolumab = Opdualag,
  approved March 2022), validating LAG-3 as a therapeutic target in melanoma.
  NCCN melanoma 2025: Category 1 for unresectable/metastatic melanoma 1L
  alongside ipilimumab+nivolumab, pembrolizumab, and nivolumab monotherapy.
