id: DRUG-FILGRASTIM
names:
  preferred: "Filgrastim (G-CSF)"
  ukrainian: "Філграстим"
  english: "Filgrastim"
  brand_names: ["Neupogen", "Zarxio", "Granix"]
atc_code: L03AA02
rxnorm_id: "4552"
drug_class: "Recombinant human granulocyte colony-stimulating factor"
mechanism: "Stimulates production, maturation, and release of neutrophils from bone marrow."

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Профілактика та лікування фебрильної нейтропенії (Г-КСФ підтримка)"
      - "Мобілізація гемопоетичних стовбурових клітин для авто-/ало-ТКМ"
    last_verified: "2026-04-27"
    notes: "Біосиміляри філграстиму (Tevagrastim, Zarzio, Nivestim тощо) включені в онкопакет НСЗУ як підтримуюча терапія. Перевірено 2026-04-27."
absolute_contraindications:
  - "Hypersensitivity to E. coli-derived proteins"
common_adverse_events:
  - "Bone pain"
  - "Headache"
  - "Mild splenomegaly"
serious_adverse_events:
  - "Splenic rupture (rare)"
  - "ARDS (rare)"
  - "Severe sickle cell crisis (in SCD patients)"

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
notes: >
  Indicated for primary prophylaxis of febrile neutropenia in regimens
  with >20% FN risk (e.g., R-CHOP in elderly), or secondary prophylaxis
  after FN episode.
