id: DRUG-FILGRASTIM
names:
  preferred: "Filgrastim (G-CSF)"
  ukrainian: "Філграстим"
  english: "Filgrastim"
  brand_names: ["Neupogen", "Zarxio", "Granix"]
atc_code: L03AA02
rxnorm_id: "4552"
drug_class: "Recombinant human granulocyte colony-stimulating factor"
mechanism: "Stimulates production, maturation, and release of neutrophils from bone marrow."

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-25"

typical_dosing: "5 mcg/kg SC daily starting 24h after chemotherapy until ANC recovery"
formulations:
  - "Pre-filled syringe 300 mcg / 480 mcg"

absolute_contraindications:
  - "Hypersensitivity to E. coli-derived proteins"
common_adverse_events:
  - "Bone pain"
  - "Headache"
  - "Mild splenomegaly"
serious_adverse_events:
  - "Splenic rupture (rare)"
  - "ARDS (rare)"
  - "Severe sickle cell crisis (in SCD patients)"

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
notes: >
  Indicated for primary prophylaxis of febrile neutropenia in regimens
  with >20% FN risk (e.g., R-CHOP in elderly), or secondary prophylaxis
  after FN episode.
