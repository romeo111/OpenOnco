id: DRUG-FLUCONAZOLE
name: "Fluconazole"
name_ua: "Флуконазол"
brand_names: ["Diflucan"]
drug_class: "Antifungal — triazole"
atc_code: J02AC01
mechanism_of_action: >
  Inhibits fungal cytochrome P450 14α-demethylase (CYP51), blocking ergosterol synthesis
  and disrupting fungal cell membrane integrity. Fungistatic against Candida; active
  against most Candida spp. (NOT C. krusei; reduced activity against C. glabrata/tropicalis).
  Poor mold (Aspergillus) coverage — use posaconazole/voriconazole for mold-active prophylaxis.
standard_doses:
  - indication: "Antifungal prophylaxis (neutropenia)"
    dose: "400 mg PO QD"
    schedule: "Daily during neutropenic period"
  - indication: "Oropharyngeal/esophageal candidiasis"
    dose: "100-200 mg PO QD × 14 days"
    schedule: "Daily"
key_toxicities:
  - "Hepatotoxicity: LFT elevation; rare severe hepatitis"
  - "QTc prolongation: significant with concomitant QT-prolonging drugs"
  - "Drug interactions: strong CYP2C9/CYP3A4 inhibitor — warfarin, vincristine, other azoles"
  - "Gastrointestinal: nausea, abdominal pain"
contraindications:
  - "Concomitant cisapride, pimozide, quinidine (QTc prolongation)"
  - "C. krusei infection (intrinsic resistance)"
special_populations:
  - "Renal impairment: dose reduce for CrCl <50 (50% dose reduction)"
  - "Note: mold coverage absent — for AML induction or HSCT patients where mold risk is high, use posaconazole 300 mg QD instead"
monitoring:
  - "LFTs: baseline + monthly"
  - "Drug-drug interactions: review all co-medications for CYP2C9/3A4"
  - "QTc: baseline ECG in patients on QT-prolonging drugs"
sources:
  - SRC-NCCN-SUPPORTIVE-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
