id: DRUG-5-FLUOROURACIL
names:
  preferred: "5-Fluorouracil"
  ukrainian: "5-Фторурацил"
  english: "5-Fluorouracil"
  brand_names: ["Adrucil", "5-FU"]
atc_code: L01BC02
rxnorm_id: "4492"
drug_class: "Antimetabolite (fluoropyrimidine)"
mechanism: >
  Pyrimidine analog; metabolites inhibit thymidylate synthase (TS) and
  incorporate into RNA/DNA. Backbone of FOLFOX, FOLFIRI, FOLFIRINOX,
  FLOT, capecitabine-bridged regimens. Bolus + continuous-infusion
  schedules differ in toxicity profile (more myelosuppression bolus,
  more mucositis/HFS infusion).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-26"

typical_dosing: >
  FOLFOX: 400 mg/m² IV bolus day 1 + 2400 mg/m² IV CIV over 46h.
  FLOT: 2600 mg/m² IV CIV over 24h day 1.
  Bolus-only regimens (5-FU/LV in adjuvant): 425 mg/m² days 1-5 q4w.
formulations: ["IV solution 50 mg/mL"]

absolute_contraindications:
  - "DPD (dihydropyrimidine dehydrogenase) complete deficiency"
  - "Pregnancy"
  - "Severe pre-existing myelosuppression"

black_box_warnings:
  - "Severe / fatal toxicity in DPD-deficient patients"
  - "Cardiac toxicity (coronary vasospasm, MI; rare but reported)"
  - "Hand-foot syndrome (more with infusion / capecitabine)"

common_adverse_events:
  - "Mucositis / stomatitis"
  - "Diarrhea"
  - "Myelosuppression (more with bolus)"
  - "Hand-foot syndrome (more with infusion)"
  - "Coronary vasospasm (chest pain — hold dose, ECG)"

serious_adverse_events:
  - "Severe pancytopenia in DPD-deficient patients"
  - "Acute coronary syndrome (vasospasm)"
  - "Severe diarrhea with sepsis"

sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024

last_reviewed: "2026-04-26"
notes: >
  STUB — Phase GI-1. DPD activity testing recommended before first dose
  (NCCN colon v2.2025 §pretreatment). Bolus-only schedules largely
  superseded by infusional + LV in modern adjuvant. Coronary spasm: hold
  drug, urgent ECG; switch to raltitrexed if confirmed.
