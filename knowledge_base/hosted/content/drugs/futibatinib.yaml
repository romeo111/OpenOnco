    notes: |
      Не зареєстровано в Україні (Держреєстр ЛЗ — РП відсутнє станом на
      2026-04-29). Селективний ковалентний пан-FGFR (1-4) інгібітор для
      попередньо лікованої FGFR2-fusion / rearranged внутрішньопечінкової
      холангіокарциноми (FDA accelerated approval, вересень 2022).

      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл МОЗ) — потребує
        підтвердженої FGFR2 fusion / rearrangement (NGS / FoundationOne
        Liquid CDx — companion diagnostic FDA-cleared).
      - EAP Taiho Oncology (Lytgobi access) — для FGFR2-altered iCCA
        post-platinum.
      - Cross-border (EU): EU гепатобіліарні центри через "Лікування
        за кордоном" (наказ МОЗ 988).
      - Trial-only: FOENIX-CCA3 (1L vs gem+cis в FGFR2-fusion iCCA —
        post-marketing підтверджуючий).
      Передумова використання: молекулярне тестування (NGS /
      FoundationOne Liquid CDx — підтвердження FGFR2 fusion або
      rearrangement).
      Source: drlz.com.ua пошук "futibatinib"/"lytgobi" 2026-04-29 — РП
      відсутнє.

typical_dosing: >
  20 mg PO once daily continuously, until disease progression or
  unacceptable toxicity. Take with or without food at the same time
  each day. Hold + reduce for grade ≥3 hyperphosphatemia despite
  phosphate binders + diet (target serum phosphate <7.0 mg/dL); hold
  for any retinal pigment epithelial detachment (RPED) until resolution.
  Dose reductions: 16 mg → 12 mg → permanent discontinuation.

formulations:
  - "Tablets 4 mg"

absolute_contraindications:
  - "Severe hypersensitivity to futibatinib"
  - "Pregnancy (embryo-fetal toxicity per animal data — class FGFR effect)"

black_box_warnings: []

common_adverse_events:
  - "Hyperphosphatemia (~85% — class FGFR pharmacodynamic effect; managed with phosphate binders + dietary phosphate restriction)"
  - "Alopecia"
  - "Dry mouth, dry eyes, dry skin"
  - "Diarrhea"
  - "Nail toxicity (onycholysis, ridging, paronychia)"
  - "Stomatitis / mucositis"
  - "Fatigue"
  - "Nausea, decreased appetite"
  - "Palmar-plantar erythrodysesthesia"
  - "Constipation"
  - "Dysgeusia"

serious_adverse_events:
  - "Retinal pigment epithelial detachment / serous retinopathy (class FGFR effect — baseline + serial ophthalmology / OCT exam)"
  - "Severe hyperphosphatemia with soft-tissue mineralization / vascular calcification (chronic exposure)"
  - "Severe stomatitis impairing oral intake"
  - "Severe nail toxicity (onycholysis, paronychia with secondary infection)"
  - "Embryo-fetal toxicity"

major_interactions:
  - "Strong CYP3A4 / P-gp dual inhibitors (itraconazole, ritonavir, clarithromycin) — avoid; if unavoidable monitor closely + reduce dose"
  - "Strong CYP3A4 / P-gp dual inducers (rifampin, phenytoin, carbamazepine, St John's wort) — avoid (loss of efficacy)"
  - "Concurrent phosphate-elevating drugs — additive hyperphosphatemia"
  - "Drugs reducing serum phosphate (sevelamer, lanthanum) — coordinate with phosphate management"

