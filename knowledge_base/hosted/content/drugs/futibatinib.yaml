notes: >
  Futibatinib is the second FGFR-targeted therapy approved for FGFR2
  fusion / rearrangement cholangiocarcinoma (after pemigatinib). Its
  irreversible covalent mechanism is the key differentiator: retains
  activity against several gatekeeper (V564F) + molecular-brake
  resistance mutations that drive acquired resistance to pemigatinib /
  infigratinib (Goyal NEJM 2019). FOENIX-CCA2 (Goyal NEJM 2023) is the
  pivotal Phase II — 103 patients, FGFR2 fusion / rearrangement iCCA
  post ≥1 prior line including gem-cis, ORR 41.7%, DCR 82.5%, mDOR
  9.7 mo, mPFS 9.0 mo, mOS 21.7 mo, all CTCAE-v5 hyperphosphatemia
  grade ≥3 manageable with binders + diet, RPED rate ~9%. NCCN-Hepatobiliary
  + ESMO-BTC-2023 list both pemigatinib and futibatinib as preferred
  2L+ options for FGFR2-altered iCCA. FOENIX-CCA3 (1L vs gem+cis) is
  the post-marketing confirmatory required for accelerated → traditional
  approval conversion. Class toxicity dominated by hyperphosphatemia
  (target <7.0 mg/dL) and serous retinopathy (monthly ophtho + OCT
  for first 4 mo, then per protocol). Missing source IDs to flag:
  SRC-FDA-LYTGOBI not yet authored; FOENIX-CCA3 trial source pending.
notes_patient: >
  Таргетний препарат — таблетка, що блокує сигнал росту в пухлинних
  клітинах із поломкою у гені FGFR2 (фьюжен / перебудова). Найчастіші
  побічні ефекти: підвищений фосфор у крові (контрольований дієтою +
  ліками), сухість в очах і ротовій порожнині, ламкість нігтів,
  випадіння волосся. Окуліст обов'язково перед стартом і регулярно
  під час лікування. Активний навіть проти деяких мутацій, що роблять
  пеміґатиніб неефективним.
