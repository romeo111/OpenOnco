id: DRUG-FUTIBATINIB
names:
  preferred: "Futibatinib"
  ukrainian: "Футибатиніб"
  english: "Futibatinib"
  brand_names: ["Lytgobi"]
atc_code: L01EN03
rxnorm_id: null
drug_class: "Selective irreversible (covalent) FGFR1/2/3/4 tyrosine kinase inhibitor"
mechanism: >
  Oral, highly selective irreversible covalent inhibitor of FGFR1, FGFR2,
  FGFR3, and FGFR4. Forms a covalent bond with a conserved cysteine in
  the FGFR P-loop, conferring sustained target inhibition with reduced
  off-target activity vs ATP-competitive reversible FGFR TKIs. Designed
  to retain potency against gatekeeper (e.g. FGFR2 V564F) and
  molecular-brake resistance mutations that drive acquired resistance to
  reversible FGFR inhibitors (pemigatinib, infigratinib). Pivotal
  FOENIX-CCA2 Phase II (n=103, FGFR2 fusion / rearrangement
  cholangiocarcinoma post ≥1 prior line including gem-cis) showed ORR
  41.7%, mDOR 9.7 months, mPFS 9.0 months, mOS 21.7 months → FDA
  accelerated approval Sep 2022.

