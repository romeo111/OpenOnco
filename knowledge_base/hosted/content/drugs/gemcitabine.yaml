id: DRUG-GEMCITABINE
names:
  preferred: "Gemcitabine"
  ukrainian: "Гемцитабін"
  english: "Gemcitabine"
  brand_names: ["Gemzar"]
atc_code: L01BC05
rxnorm_id: "12574"
drug_class: "Antimetabolite (deoxycytidine analog)"
mechanism: >
  Incorporated into DNA → masked chain termination + ribonucleotide
  reductase inhibition. PDAC backbone (gem-nab-pac), biliary tract
  cancers, NK/T-nasal lymphoma (SMILE — already used in our KB).
regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration: {registered: true, reimbursed_nszu: true, last_verified: "2026-04-26"}
typical_dosing: >
  PDAC gem-nab-pac: 1000 mg/m² IV days 1, 8, 15 of 28-d cycle.
  PDAC mono (frail): 1000 mg/m² weekly × 7 then 3-of-4-weekly.
  Adjuvant PDAC: 1000 mg/m² weekly × 3 of every 4 weeks × 6 cycles.
formulations: ["IV powder 200 mg, 1 g, 2 g"]
absolute_contraindications: ["Severe hepatic dysfunction", "Pregnancy"]
common_adverse_events: ["Myelosuppression", "Flu-like syndrome", "Mild rash", "Mild peripheral edema", "Transient transaminitis"]
serious_adverse_events: ["Hemolytic-uremic syndrome (rare, drug-related)", "Pulmonary toxicity", "Capillary-leak syndrome", "Severe thrombocytopenia"]
sources: [SRC-NCCN-PANCREATIC-2025, SRC-ESMO-PANCREATIC-2024]
last_reviewed: "2026-04-26"
notes: >
  STUB — Phase GI-1. Day-15 dose often held for ANC <1.5 or platelets <100.
  HUS rare but catastrophic — monitor renal + hemolysis labs. Already used
  in NK/T SMILE — reuse this entity rather than duplicate.
