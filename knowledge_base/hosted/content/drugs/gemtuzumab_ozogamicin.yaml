last_reviewed: "2026-04-25"
notes: >
  Anti-CD33 ADC. ALFA-0701 (Castaigne et al., Lancet 2012) — newly
  dx AML 50-70 + 7+3 + GO at fractionated dose: improved EFS +
  RFS. MyloFrance-1 (Aribi et al., Cancer 2007) — single-agent
  GO in r/r APL post-ATRA-ATO: CR ~91% (relapsed APL exquisitely
  CD33+; rapid deep MRD-negative responses). VOD risk dominant
  safety concern — dose-fractionation (3 mg/m² × 3 doses spaced
  Days 1, 4, 7) reduced VOD incidence vs original 9 mg/m² single
  dose, allowing 2017 reapproval after 2010 withdrawal. Limit to
  2 cycles pre-alloHCT; avoid dual-alkylator conditioning to
  minimize VOD risk. Ukraine: NOT registered — access via named-
  patient import / EAP Pfizer / cross-border (EMA-approved 2018).

notes_ua: >
  Гемтузумаб озогаміцин (gemtuzumab ozogamicin) — гуманізоване
  моноклональне антитіло IgG4 проти CD33, кон'юговане з
  калихеаміциновим цитотоксичним вантажем (ADC, antibody-drug
  conjugate). Понад 80% бластів AML експресують CD33, тому препарат
  використовують при вперше діагностованому CD33+ AML (дослідження
  ALFA-0701, Castaigne та співавт., Lancet 2012: AML у пацієнтів
  50-70 років + схема 7+3 + GO у фракціонованій дозі — поліпшення
  EFS і RFS) та при рецидивному/рефрактерному CD33+ AML і
  рецидивному APL (MyloFrance-1, Aribi та співавт., Cancer 2007:
  монотерапія GO після ATRA-ATO дала CR ~91%; рецидивний APL
  високочутливий до анти-CD33 з глибокими MRD-негативними
  відповідями). Домінантною проблемою безпеки є веноокклюзійна
  хвороба печінки (VOD/SOS); фракціонування дози (3 mg/m² × 3 дози,
  дні 1, 4, 7) суттєво знизило частоту VOD порівняно з первинною
  одноразовою дозою 9 mg/m² — це дозволило повторну реєстрацію у
  2017 році після відкликання 2010 року. Перед алогенною ТГСК
  обмежують максимум 2 циклами; уникають кондиціонування з двома
  алкілуючими агентами для мінімізації ризику VOD. В Україні не
  зареєстрований; доступ — через індивідуальний імпорт (named-
  patient), EAP Pfizer або транскордонне лікування в ЄС
  (EMA-затверджено 2018).

