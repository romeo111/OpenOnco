id: DRUG-GEMTUZUMAB-OZOGAMICIN
names:
  preferred: "Gemtuzumab ozogamicin"
  ukrainian: "Гемтузумаб озогаміцин"
  english: "Gemtuzumab ozogamicin"
  brand_names: ["Mylotarg"]
atc_code: L01FX02
rxnorm_id: "1659131"
drug_class: "Anti-CD33 humanized IgG4 monoclonal antibody-drug conjugate (calicheamicin payload)"
mechanism: >
  Humanized anti-CD33 IgG4 monoclonal antibody conjugated to
  N-acetyl-γ-calicheamicin dimethyl hydrazide. Binds CD33 on
  myeloid blasts (>80% AML express CD33; APL especially CD33+),
  internalizes, releases calicheamicin → DNA double-strand breaks
  → apoptosis. Originally withdrawn 2010 over OS concerns; reapproved
  2017 at fractionated lower dose with improved safety profile.
  Used in newly-dx CD33+ AML (ALFA-0701) and salvage CD33+ AML +
  relapsed APL (MyloFrance).

