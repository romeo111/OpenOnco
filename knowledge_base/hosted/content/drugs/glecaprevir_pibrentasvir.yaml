id: DRUG-GLECAPREVIR-PIBRENTASVIR
names:
  preferred: "Glecaprevir/Pibrentasvir"
  ukrainian: "Глекапревір/Пібрентасвір"
  english: "Glecaprevir/Pibrentasvir"
  synonyms: ["G/P", "GLE/PIB"]
  brand_names: ["Mavyret", "Maviret"]
atc_code: J05AP57
rxnorm_id: "1971306"
drug_class: "Pan-genotypic direct-acting antiviral (DAA) — NS3/4A + NS5A"
mechanism: >
  Fixed-dose combination: glecaprevir is an NS3/4A protease inhibitor,
  pibrentasvir is an NS5A inhibitor. Pan-genotypic activity (1-6).

regulatory_status:
  fda:
    approved: true
    first_approval_year: 2017
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Лікування HCV-інфекції до/під час імуносупресивної терапії (особливо HCV-MZL — досягнення SVR як перша лінія)"
    last_verified: "2026-04-27"
typical_dosing: "300/120 mg PO daily × 8 weeks (treatment-naive, no cirrhosis); 12 weeks (compensated cirrhosis)"
formulations:
  - "Tablet 100 mg glecaprevir / 40 mg pibrentasvir (3 tablets per dose)"

absolute_contraindications:
  - "Decompensated cirrhosis (Child-Pugh B or C) — protease inhibitor toxicity"
  - "Co-administration with atazanavir, rifampin, ethinyl estradiol, St. John's wort"
  - "Hypersensitivity"
black_box_warnings:
  - "Risk of HBV reactivation in HCV/HBV coinfection"
common_adverse_events:
  - "Headache"
  - "Fatigue"
  - "Nausea"
serious_adverse_events:
  - "HBV reactivation"
  - "Severe hepatic decompensation in patients with prior decompensation"

sources:
  - SRC-EASL-HCV-2023

last_reviewed: "2026-04-25"
notes: >
  Alternative pan-genotypic DAA. Shorter 8-week duration than
  sofosbuvir/velpatasvir for treatment-naive non-cirrhotic patients.
  Avoid in decompensated cirrhosis (use SOF/VEL+RBV instead).
