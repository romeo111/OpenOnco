id: DRUG-GLECIRASIB
name: "Glecirasib"
name_ua: "Глецирасиб"
brand_names: ["Krazati KRAS G12Ci"]
drug_class: "KRAS G12C inhibitor (covalent, irreversible)"
atc_code: L01XE64
mechanism_of_action: >
  Covalent irreversible inhibitor of KRAS G12C (Kirsten rat sarcoma viral proto-oncogene,
  glycine-to-cysteine substitution at codon 12). Binds the cysteine-12 residue in the
  switch-II pocket (SII-P) of KRAS GDP-bound (inactive) conformation, locking KRAS in
  the inactive state and preventing nucleotide exchange and downstream effector activation
  (RAF/MEK/ERK and PI3K/AKT). Third-generation KRAS G12C inhibitor; clinical data from
  KRYSTAL-6 (NSCLC) and broader basket trial experience.
standard_doses:
  - indication: "KRAS G12C NSCLC (2L+)"
    dose: "400 mg PO BID"
    schedule: "Continuous oral BID; with or without food"
  - indication: "KRAS G12C PDAC/biliary/other solid tumors (basket trial)"
    dose: "400 mg PO BID"
    schedule: "Continuous oral BID"
key_toxicities:
  - "Diarrhea: most common (40-50%); Grade 3+: ~5%"
  - "Nausea, vomiting"
  - "Peripheral edema"
  - "Musculoskeletal pain, arthralgia"
  - "QTc prolongation: monitor ECG (vs adagrasib which has higher QTc signal)"
  - "Hepatotoxicity: LFT elevation"
  - "Anemia, fatigue"
contraindications:
  - "KRAS G12C-wild-type tumor (no benefit; KRAS mutation testing mandatory)"
  - "Active QTc >500ms"
biomarker_requirements:
  - "KRAS G12C mutation: REQUIRED (tissue or ctDNA next-generation sequencing)"
  - "Co-mutation exclusions: STK11/KEAP1 co-mutations associated with lower response rate"
special_populations:
  - "Hepatic impairment: reduce dose for severe hepatic impairment"
  - "Drug interactions: moderate CYP3A4 inhibitors/inducers (glecirasib is CYP3A4 substrate)"
monitoring:
  - "ECG at baseline and per protocol (QTc monitoring)"
  - "LFTs: monthly x 3 months then as clinically indicated"
  - "CBC: baseline and periodic"
sources:
  - SRC-NCCN-NSCLC-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  FDA approved October 2024 (accelerated approval) based on KRYSTAL-6 trial
  in KRAS G12C NSCLC after prior systemic therapy. Third KRAS G12C inhibitor
  after sotorasib (approved 2021) and adagrasib (approved 2022).
  NCCN NSCLC 2025: KRAS G12C 2L option (Cat 2A alongside adagrasib).
  Differentiation from adagrasib: lower QTc prolongation signal, slightly
  different CNS penetration profile.
  Combination strategies under investigation: glecirasib + cetuximab for
  KRAS G12C CRC (similar to sotorasib/adagrasib + cetuximab combos).
