id: DRUG-GLOFITAMAB
names:
  preferred: "Glofitamab"
  ukrainian: "Глофітамаб"
  english: "Glofitamab"
  brand_names:
    - "Columvi"
atc_code: L01FX28
rxnorm_id: "2671962"
drug_class: "CD20 × CD3 bispecific T-cell engager (humanized IgG1; 2:1 CD20-bivalent / CD3-monovalent format; IV; time-limited)"
mechanism: >
  Humanized IgG1 bispecific antibody with a unique 2:1 format —
  two CD20-binding Fabs and one CD3-binding Fab — increasing
  avidity for CD20 and reducing affinity-driven CRS. Redirects
  polyclonal T-cell cytotoxicity to CD20+ malignant B-cells.
  Obinutuzumab pretreatment 1000 mg IV day -7 (single dose, 7
  days before first glofitamab dose) depletes circulating B-cells
  to mitigate first-dose CRS. Step-up dosing schedule further
  attenuates CRS. Time-limited regimen (12 cycles maximum) —
  contrast to indefinite continuous bispecifics.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2023
    indications_brief:
      - "R/R diffuse large B-cell lymphoma (DLBCL) NOS, large B-cell lymphoma arising from FL, after ≥2 prior lines (accelerated approval Jun 2023)"
  ema:
    approved: true
    year_first_approval: 2023
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-29"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-29).
      Біспецифічна CD20×CD3 IV-терапія для r/r DLBCL з обмеженою
      тривалістю 12 циклів; не входить до жодного пакету НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP Roche Ukraine (compassionate use; критерії: failure ≥2
        ліній anti-CD20-вмісних режимів).
      - Cross-border (EU): EU гематоцентри за пакетом "Лікування за
        кордоном" (наказ МОЗ 988).
      - Trial-only: NP-серія + post-marketing studies в EU.
      Source: drlz.com.ua пошук "glofitamab"/"columvi" 2026-04-29 — РП відсутнє.

typical_dosing: >
  Obinutuzumab pretreatment: 1000 mg IV day -7 (single dose, 7 days
  before first glofitamab dose; depletes circulating B-cells —
  mandatory CRS mitigation).
  Step-up dosing (cycle 1, 21-day cycle): 2.5 mg IV day 8, 10 mg IV
  day 15.
  Cycle 2 onward: 30 mg IV day 1 of each 21-day cycle, total 12
  cycles (or until progression / unacceptable toxicity, whichever
  earlier). FIXED-DURATION regimen — discontinue after 12 cycles
  even in responders.
formulations:
  - "IV solution 2.5 mg/2.5 mL and 10 mg/10 mL vials"

absolute_contraindications:
  - "Active uncontrolled infection"
  - "Hypersensitivity to glofitamab or obinutuzumab"
black_box_warnings:
  - "Cytokine release syndrome (CRS) — ~63% any grade, ~4% Grade ≥3 in NP30179"
  - "Neurologic toxicity / ICANS (~8%)"
  - "Serious infections — Grade ≥3 ~16%"
  - "Tumor flare / TLS in high-burden disease — obinutuzumab pretreatment + step-up mitigates"
major_interactions:
  - "Live vaccines contraindicated"
  - "Concomitant immunosuppressants — additive infection risk"
  - "Obinutuzumab pretreatment is mandatory (REMS-equivalent labeling) — must be administered 7 days before first glofitamab dose"
common_adverse_events:
  - "CRS (predominantly during step-up + cycle 2 first full dose)"
  - "Pyrexia"
  - "Neutropenia"
  - "Anemia, thrombocytopenia"
  - "Hypogammaglobulinemia"
  - "Fatigue"
  - "Headache"
  - "Diarrhea, nausea"
  - "Rash"
serious_adverse_events:
  - "Severe CRS"
  - "ICANS"
  - "Tumor flare / TLS"
  - "Severe / opportunistic infection (PJP, CMV)"
