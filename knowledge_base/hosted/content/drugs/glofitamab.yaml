last_reviewed: "2026-04-29"
notes: >
  NP30179 (Dickinson 2022, NEJM): r/r DLBCL after ≥2 prior lines
  (median 3; ~33% post-CAR-T) — ORR 52%, CR 39%, mDOR ~18 mo in
  CR cohort. FDA accelerated approval Jun 2023; EMA Jul 2023.
  Distinguishing features vs other CD20×CD3 bispecifics:
  (1) FIXED-duration 12 cycles — finite total exposure;
  (2) 2:1 format with bivalent CD20 binding — higher avidity,
  potentially deeper responses;
  (3) Mandatory obinutuzumab pretreatment 7 days before C1D1;
  (4) IV administration only (vs SC epcoritamab).
  Trade-offs: requires hospital/infusion-center infrastructure;
  obinutuzumab adds ~7 days to time-to-treatment. Lower long-term
  infection burden vs continuous bispecifics owing to fixed
  duration. Useful sequencing post-CAR-T progression in DLBCL.
  NOTE: Pivotal trial Source SRC-NP30179-DICKINSON-2022 not yet
  in KB — evidence base cited via NCCN-BCELL and ESMO-DLBCL
  guideline references; flag for source-stub creation.

notes_ua: >
  Глофітамаб (glofitamab) — гуманізоване біспецифічне антитіло
  IgG1 формату 2:1 (два Fab проти CD20 і один Fab проти CD3),
  T-клітинний енгейджер. Унікальний 2:1 формат збільшує авідність до
  CD20 і знижує афінітет-залежний синдром вивільнення цитокінів
  (CRS). Реєстраційне дослідження NP30179 (Dickinson, NEJM 2022):
  рецидивний/рефрактерний DLBCL після щонайменше двох ліній терапії
  (медіана 3 ліній; близько 33% — після CAR-T) — загальна частота
  відповіді 52%, повна відповідь 39%, медіана тривалості відповіді
  у когорті повних відповідей ~18 міс. Прискорене схвалення FDA в
  червні 2023, EMA — у липні 2023. Відмінні риси порівняно з іншими
  біспецифічними CD20×CD3-антитілами: (1) фіксована тривалість
  12 циклів — обмежена сумарна експозиція; (2) формат 2:1 з
  двовалентним CD20-зв'язуванням — вища авідність і потенційно
  глибші відповіді; (3) обов'язкове премедикування обінутузумабом за
  7 днів до C1D1; (4) лише внутрішньовенне введення (на відміну від
  підшкірного епкоритамабу). Компроміси: потрібна інфраструктура
  стаціонару/інфузійного центру; обінутузумаб додає ~7 днів до часу
  початку терапії. Через фіксовану тривалість загальне інфекційне
  навантаження нижче, ніж при безперервних біспецифіках. Корисний у
  послідовності лікування після прогресування на CAR-T при DLBCL.
  ПРИМІТКА: реєстраційне дослідження SRC-NP30179-DICKINSON-2022 ще
  відсутнє в KB — доказова база цитується через настанови NCCN-BCELL
  та ESMO-DLBCL; потрібне створення source-stub.

