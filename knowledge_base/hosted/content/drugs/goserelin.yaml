notes_ua: >
  Гозерелін (goserelin) — агоніст рецепторів гонадотропін-рилізинг
  гормону (GnRH/LHRH), який спричиняє початковий "flare"-сплеск
  гонадотропінів з подальшою стійкою медикаментозною кастрацією,
  тобто має той самий механізм, що й лейпролід. Випускається у
  формі підшкірного депо-імплантату, що зручніше за внутрішньом'язові
  ін'єкції. Клінічна ефективність еквівалентна лейпроліду; вибір
  часто визначається інституційними умовами або логістикою
  введення. Типові побічні явища — ефекти класу (припливи, втрата
  лібідо, остеопенія, втома) та місцеві реакції в місці введення
  імплантату.

