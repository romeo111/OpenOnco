id: DRUG-HYDROXYUREA
names:
  preferred: "Hydroxyurea (hydroxycarbamide)"
  ukrainian: "Гідроксикарбамід"
  english: "Hydroxyurea"
  synonyms: ["HU", "HC", "Hydroxycarbamide"]
  brand_names: ["Hydrea", "Litalir"]
atc_code: L01XX05
rxnorm_id: "5552"
drug_class: "Antimetabolite (ribonucleotide reductase inhibitor)"
mechanism: >
  Inhibits ribonucleotide reductase → blocks DNA synthesis. Preferentially
  reduces blood-cell production. Workhorse cytoreduction for high-risk PV/ET
  and CML pre-TKI era; still used for sickle-cell disease and palliative
  CMML/MPN-AML cytoreduction.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Хронічна мієлоїдна лейкемія (циторедукція до старту ТКІ)"
      - "Справжня поліцитемія / есенціальна тромбоцитемія високого ризику"
      - "Гострі лейкози (циторедукція при гіперлейкоцитозі)"
    last_verified: "2026-04-27"
formulations: ["Capsules 500 mg"]

absolute_contraindications:
  - "Severe baseline cytopenias (ANC <2.0, plt <100K) without leukemic indication"
  - "Pregnancy (avoid; teratogenic)"
  - "Hypersensitivity"
black_box_warnings:
  - "Severe myelosuppression"
  - "Secondary malignancies (leukemia, skin cancer with chronic use)"
major_interactions:
  - "Antiretrovirals (didanosine, stavudine): increased toxicity"
common_adverse_events:
  - "Cytopenias (manageable, dose-titratable)"
  - "Mucositis (rare)"
  - "Skin hyperpigmentation"
  - "Nail changes"
  - "Macrocytosis (universal)"
serious_adverse_events:
  - "Severe myelosuppression"
  - "Cutaneous ulceration (esp. legs — discontinue)"
  - "Hypersensitivity pneumonitis (rare)"
  - "Theoretical leukemogenic risk over decades"

pharmacology: {half_life: "~3-4 hours; renal elimination"}

sources:
  - SRC-NCCN-MPN-2025
  - SRC-ESMO-MPN-2015

last_reviewed: "2026-04-25"
notes: >
  1L cytoreduction for high-risk PV (age >60 OR prior thrombosis) and
  high-risk ET (same criteria). Goals: PV — Hct <45%, plt <400K; ET —
  plt <400K. Pegylated interferon-α (ropeginterferon for PV) is
  emerging alternative with potential disease-modifying activity but
  access-limited. Anagrelide is 2L for ET (PT-1 trial — non-inferior on
  thrombosis but more bleeding/cardiac side effects).

notes_ua: >
  Гідроксикарбамід (hydroxyurea, hydroxycarbamide) — антиметаболіт,
  інгібітор рибонуклеотидредуктази, який блокує синтез ДНК і
  переважно пригнічує продукцію клітин крові. Перша лінія
  циторедукції при справжній поліцитемії (PV) високого ризику (вік
  >60 років АБО попередній тромбоз) і при есенціальній тромбоцитемії
  (ET) високого ризику (ті самі критерії). Цілі терапії: при PV —
  гематокрит <45%, тромбоцити <400×10^9/л; при ET — тромбоцити
  <400×10^9/л. Пегільований інтерферон-α (ропегінтерферон при PV) —
  альтернатива з потенційною хвороба-модифікувальною активністю, але
  обмежено доступний. Анагрелід — препарат другої лінії при ET
  (дослідження PT-1: не поступається гідроксикарбаміду щодо профілактики
  тромбозу, але супроводжується більшою частотою кровотеч і
  кардіальних побічних ефектів).

ukrainian_review_status: pending_clinical_signoff
