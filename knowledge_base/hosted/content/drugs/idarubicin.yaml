id: DRUG-IDARUBICIN
names:
  preferred: "Idarubicin"
  ukrainian: "Ідарубіцин"
  english: "Idarubicin"
  brand_names: ["Idamycin", "Zavedos"]
atc_code: L01DB06
rxnorm_id: "5650"
drug_class: "Anthracycline (topoisomerase II inhibitor + DNA intercalator)"
mechanism: >
  Lipophilic anthracycline analog of daunorubicin; better intracellular
  penetration. Same mechanism as daunorubicin but somewhat lower cardiotoxicity
  per dose. Used as alternative anthracycline in AML 7+3 and as anthracycline
  component of high-risk APL induction (AIDA / AIDA-like schemes).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-25"

typical_dosing: >
  AML 7+3: 12 mg/m² IV days 1-3. APL high-risk (AIDA): 12 mg/m² IV days 2,
  4, 6, 8 alongside ATRA + ATO (or ATRA alone in classic AIDA).
formulations: ["IV powder 5 / 10 mg vials"]

absolute_contraindications:
  - "Severe pre-existing cardiac dysfunction (LVEF <40%)"
  - "Cumulative anthracycline dose at threshold (~150 mg/m² lifetime for idarubicin)"
  - "Severe hepatic impairment"
  - "Pregnancy"
black_box_warnings:
  - "Cardiotoxicity (cumulative)"
  - "Severe myelosuppression"
  - "Vesicant — extravasation causes severe tissue necrosis"
major_interactions:
  - "Other anthracyclines / mediastinal radiation: additive cardiotoxicity"
common_adverse_events:
  - "Severe myelosuppression"
  - "Mucositis"
  - "Alopecia"
  - "Nausea/vomiting"
serious_adverse_events:
  - "Cardiotoxicity"
  - "Extravasation"

pharmacology: {half_life: "~22 hours; active metabolite idarubicinol half-life ~45 h"}

sources:
  - SRC-NCCN-AML-2025
  - SRC-ELN-APL-2019

last_reviewed: "2026-04-25"
notes: >
  Interchangeable with daunorubicin in 7+3 (no clear OS difference in
  meta-analysis). Anthracycline of choice in classic AIDA APL induction.
  Cumulative lifetime threshold lower than daunorubicin (~150 mg/m²).
