id: DRUG-IDECABTAGENE-VICLEUCEL
names:
  preferred: "Idecabtagene vicleucel"
  ukrainian: "Ідекабтаген віклейцел"
  english: "Idecabtagene vicleucel"
  brand_names:
    - "Abecma"
  synonyms:
    - "ide-cel"
    - "bb2121"

atc_code: L01XL08
rxnorm_id: null
drug_class: "BCMA-directed autologous CAR-T cell therapy (4-1BB costimulation; murine scFv binder)"
mechanism: >
  Autologous T cells transduced with a lentiviral vector encoding
  a chimeric antigen receptor (CAR) containing a murine
  anti-BCMA single-chain variable fragment (scFv), a CD8α hinge/
  transmembrane region, a 4-1BB costimulatory domain, and a CD3-
  zeta activation domain. Recognizes B-cell maturation antigen
  (BCMA), expressed on malignant plasma cells. After lymphodepleting
  fludarabine + cyclophosphamide conditioning, a single IV infusion
  produces in vivo CAR-T expansion, peak ~7-11 days post-infusion,
  with sustained cytotoxicity against BCMA+ myeloma cells. First
  CAR-T therapy approved for multiple myeloma (FDA Mar 2021,
  KarMMa). Expanded to 2L+ R/R MM (KarMMa-3) in 2024 for
  triple-class-exposed patients.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2021
    indications_brief:
      - "R/R multiple myeloma after ≥2 prior lines including PI + IMiD + anti-CD38 (2L+ since 2024 in triple-class-exposed patients per KarMMa-3)"
  ema:
    approved: true
    year_first_approval: 2021
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-29"
    notes: |
      Не зареєстровано в Україні (Держреєстр ЛЗ — РП відсутнє станом
      на 2026-04-29). CAR-T-терапії проти BCMA не ліцензовані та не
      реімбурсуються НСЗУ; домене виробництво CAR-T в Україні
      відсутнє.
      Шляхи доступу:
      - Cross-border (EU): державне направлення «Лікування за
        кордоном» (наказ МОЗ 988) до EBMT/JACIE-акредитованих центрів
        (Charité Berlin, Karolinska Stockholm, Hôpital Saint-Louis
        Paris). Показання: r/r MM після ≥2 ліній з PI/IMiD/anti-CD38.
      - EAP BMS / 2seventy bio (compassionate use; одиничні випадки
        через локальний офіс).
      - Trial-only: KarMMa-серія, реєстр європейських trial-сайтів.
      Source: drlz.com.ua пошук «idecabtagene»/«abecma» 2026-04-29 —
      РП відсутнє. Орієнтовна вартість USD 420-520K (виробництво +
      лімфодеплеція + ICU + керування пізніми токсичностями).

typical_dosing: >
  Single IV infusion, target dose 300-460 × 10⁶ CAR-positive viable
  T cells (range 150-510 × 10⁶; flat dosing, not weight-based).
  Administered 2-7 days after lymphodepleting conditioning:
  cyclophosphamide 300 mg/m² IV daily × 3 days + fludarabine 30
  mg/m² IV daily × 3 days (days -5 to -3). Tocilizumab on-site
  (≥2 doses) before infusion is mandatory per REMS. No maintenance;
  single infusion. Bridging therapy may be used during the 4-6 week
  manufacturing window. Re-treatment not currently approved. Dose
  hold / delay if active infection, ANC <1,000/µL prior to
  lymphodepletion, or rapidly progressive extramedullary disease
  (consider re-bridging).
formulations:
  - "Cryopreserved autologous CAR-T cell suspension; patient-specific bag (single dose)"

absolute_contraindications:
  - "Active uncontrolled systemic infection at time of lymphodepletion"
  - "Pregnancy and lactation"
  - "Hypersensitivity to fludarabine, cyclophosphamide, or DMSO (cryopreservant)"
  - "Active CNS myeloma"
  - "Severe organ dysfunction precluding ICU-level supportive care (NYHA III-IV CHF, FEV1 <50%, dialysis)"
  - "Active hepatitis B (without antiviral prophylaxis), HIV with detectable viral load, or active hepatitis C"
black_box_warnings:
  - "Cytokine release syndrome (CRS) — Grade ≥3 ~5% in KarMMa (any-grade ~85%); tocilizumab + ICU support mandatory"
  - "Immune effector cell-associated neurotoxicity syndrome (ICANS) — Grade ≥3 ~3%"
  - "Hemophagocytic lymphohistiocytosis / macrophage activation syndrome (HLH/MAS)"
  - "Prolonged and recurrent cytopenias with secondary infections"
  - "Secondary T-cell malignancies (FDA class boxed warning, 2024)"
  - "REMS / FACT-JACIE accreditation required for administration"
common_adverse_events:
  - "CRS, any grade ~85% (median onset day 1; resolution ~5 days)"
  - "Neutropenia, prolonged ~90%"
  - "Anemia ~70%"
  - "Thrombocytopenia ~60%"
  - "Hypogammaglobulinemia, sustained ~85%"
  - "ICANS / encephalopathy, any grade ~18%"
  - "Infection (any) ~70%"
  - "Fatigue ~45%"
  - "Nausea ~30%"
  - "Headache ~25%"
  - "Pyrexia ~25%"
  - "Hypotension ~25%"
  - "Lymphopenia ~95%"
serious_adverse_events:
  - "Severe CRS Grade ≥3 with hemodynamic collapse / multi-organ failure"
  - "Severe ICANS Grade ≥3 with cerebral edema or seizures"
  - "Hemophagocytic lymphohistiocytosis (HLH/MAS)"
  - "Severe / prolonged cytopenias requiring transfusion + GCSF beyond day 30"
  - "Severe / opportunistic infection (PJP, CMV reactivation, invasive fungal)"
  - "Tumor lysis syndrome (high disease burden)"
  - "Secondary T-cell malignancy (class warning 2024)"
major_interactions:
  - "Concurrent corticosteroids: suppress CAR-T expansion — avoid prophylactic steroids; use only for severe AE management (CRS Grade ≥2 unresponsive to tocilizumab; ICANS Grade ≥2)"
  - "Live vaccines: contraindicated peri-treatment and ≥6-12 months post"
  - "Tocilizumab: paired rescue agent for CRS — must be on-site before infusion"
  - "Granulocyte-colony stimulating factor (G-CSF): avoid in first 21 days post-infusion (may worsen CRS/ICANS); use only for clinically significant neutropenic infection thereafter"
  - "Other lymphotoxic chemotherapy: avoid for ≥3 months post-infusion (impedes CAR persistence)"
  - "Bridging anti-myeloma therapy: permitted during manufacturing window; daratumumab and BCMA-directed prior agents do not preclude eligibility but may impact efficacy"

pharmacology:
  half_life_hours: null
  clearance: "Cellular product — no traditional clearance; in vivo expansion peaks ~7-11 days post-infusion; persistence shorter than cilta-cel, CAR transgene typically detectable median ~30-90 days"
  protein_binding_pct: null
  metabolism: "Living cell therapy — CAR-T cells expand, contract, then a memory pool persists; B-cell aplasia / hypogammaglobulinemia is the surrogate of persistence"

sources:
  - SRC-KARMMA-MUNSHI-2021
  - SRC-NCCN-MM-2025
  - SRC-ESMO-MM-2023

last_reviewed: "2026-04-29"
reviewer_signoffs: []
notes: >
  Pivotal: KarMMa (Munshi et al., NEJM 2021) — 128 heavily
  pretreated R/R MM patients (median 6 prior lines), ORR 73%,
  CR 33%, median PFS ~8.8 months. FDA approval Mar 2021;
  KarMMa-3 (NEJM 2023) shifted approval to 2L+ in triple-class-
  exposed patients. Compared to cilta-cel: shorter response
  duration but earlier-line approval and broader manufacturing
  capacity (BMS/2seventy partnership). Manufacturing window 4-6
  weeks. Ukraine: NOT registered, NO domestic CAR-T manufacturing.
  Access only via cross-border referral (EBMT/JACIE EU centers)
  under "Лікування за кордоном" (наказ МОЗ 988); approximate
  all-in cost USD 420-520K including manufacturing, lymphodepletion,
  ICU support, and post-CAR-T immunoglobulin replacement / infection
  prophylaxis. Compare to teclistamab/elranatamab (BCMA × CD3
  bispecifics) — off-the-shelf alternatives with no manufacturing
  delay but lower depth/duration of response than CAR-T in
  KarMMa-3 head-to-head against standard regimens.

notes_ua: >
  Ідекабтаген віклейцел (idecabtagene vicleucel, ide-cel) — автологічна
  CAR-T-терапія, спрямована проти BCMA (B-cell maturation antigen).
  Реєстраційне дослідження KarMMa (Munshi та співавт., NEJM 2021):
  128 інтенсивно передлікованих пацієнтів з рецидивною/рефрактерною
  множинною мієломою (медіана 6 попередніх ліній) — загальна
  частота відповіді 73%, повна відповідь 33%, медіана виживаності
  без прогресування ~8.8 міс. Схвалення FDA — березень 2021;
  KarMMa-3 (NEJM 2023) розширило показання до 2L+ у пацієнтів,
  експонованих до трьох класів препаратів. Порівняно з цилта-целом
  (cilta-cel): коротша тривалість відповіді, але реєстрація у
  ранішій лінії та ширша виробнича потужність (партнерство
  BMS/2seventy bio). Виробниче вікно — 4-6 тижнів. В Україні
  не зареєстрований; виробництво CAR-T-продуктів локально відсутнє.
  Доступ — лише через транскордонне направлення до EU-центрів,
  акредитованих EBMT/JACIE, у межах державної програми
  "Лікування за кордоном" (наказ МОЗ 988); орієнтовна сукупна
  вартість 420-520K USD з урахуванням виробництва, лімфодеплеції,
  інтенсивної підтримки в ICU та профілактики/замісної
  імуноглобулінотерапії після CAR-T. Альтернативи "off-the-shelf"
  без виробничої затримки — біспецифічні антитіла теклістамаб /
  елранатамаб (BCMA×CD3), однак вони поступаються глибиною та
  тривалістю відповіді порівняно з CAR-T у непрямому порівнянні
  з KarMMa-3.

