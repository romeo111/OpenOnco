id: DRUG-IFINATAMAB
name: "Ifinatamab deruxtecan"
name_ua: "Іфінатамаб дерукстекан"
synonyms: ["I-DXd", "DS-7300a", "DS-7300"]
brand_names: []
drug_class: "B7-H3-targeted antibody-drug conjugate (ADC)"
atc_code: ""
mechanism_of_action: >
  Ifinatamab deruxtecan is an ADC comprising an anti-B7-H3 (CD276) monoclonal antibody
  conjugated via a cleavable tetrapeptide linker to DXd (deruxtecan), a topoisomerase I
  inhibitor payload. B7-H3 is overexpressed in SCLC (>80% of tumors) and multiple solid
  tumors with limited expression on normal tissues. After binding and internalization,
  the linker is cleaved intracellularly, releasing DXd which inhibits DNA topoisomerase I,
  causing DNA strand breaks and tumor cell death. The membrane-permeable payload confers
  a bystander killing effect on neighboring tumor cells. Drug-to-antibody ratio (DAR) ~4-5.
standard_doses:
  - indication: "Relapsed/refractory SCLC ≥2 prior lines"
    dose: "12 mg/kg IV over 90 min Q21D"
    schedule: "Day 1 Q21D; continue until progression or unacceptable toxicity"
    notes: "12 mg/kg is the approved dose; first infusion over 90 min; subsequent infusions may be reduced to 30 min if tolerated. Dose reduce to 9 mg/kg then 6 mg/kg for toxicity."
key_toxicities:
  - "ILD/pneumonitis: ~15-20% any grade; Grade 3-4 ~6-9%; life-threatening cases reported. Monitor at every visit."
  - "Nausea/vomiting: common (~50% nausea); antiemetic prophylaxis recommended"
  - "Fatigue: ~50% any grade"
  - "Myelosuppression: neutropenia ~30%, thrombocytopenia, anemia"
  - "Alopecia: moderate incidence"
  - "Peripheral neuropathy: uncommon but possible with DXd payload"
monitoring:
  - "Baseline CT chest + pulmonary function tests (ILD risk)"
  - "CBC before each cycle"
  - "New/worsening respiratory symptoms: hold drug; CT chest; pulmonology if Grade ≥2 ILD"
  - "LFTs: periodic"
drug_interactions:
  - "Strong CYP3A4 inhibitors: may increase DXd exposure"
  - "Strong CYP3A4 inducers: may reduce efficacy"
pregnancy_category: "Embryo-fetal toxicity — effective contraception required"
ua_registration_status: not_registered
ua_notes: >
  Not registered in Ukraine as of 2026-05-04. Access only via named-patient/
  compassionate use or cross-border treatment (EU). Daiichi Sankyo product.
last_reviewed: "2026-05-04"
