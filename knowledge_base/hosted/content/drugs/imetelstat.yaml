id: DRUG-IMETELSTAT
names:
  preferred: "Imetelstat"
  ukrainian: "Іметельстат"
  english: "Imetelstat"
  brand_names: ["Rytelo"]
atc_code: L01XX79
rxnorm_id: "2657015"
drug_class: "First-in-class telomerase inhibitor (oligonucleotide)"
mechanism: >
  13-mer N3'→P5' thio-phosphoramidate oligonucleotide complementary
  to the RNA template region (hTR/TERC) of human telomerase. Binds
  and inhibits telomerase enzymatic activity in malignant cells with
  short telomeres + telomerase upregulation. Approved June 2024 for
  transfusion-dependent low-/intermediate-1-risk MDS post-ESA
  failure on basis of IMerge phase-3 trial.

regulatory_status:
  fda: {approved: true}
  ema: {approved: false}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      Telomerase-інгібітор для transfusion-dependent LR-MDS post-ESA failure;
      дуже новий (FDA 2024); не входить до НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл) — потребує EMA-approval
        спочатку (планується 2025-2026).
      - EAP Geron — обмежений compassionate program; немає UA медрепа,
        звертатися напряму US.
      - Cross-border (EU): обмежено до пост-EMA-approval; deg реалістично
        доступне з 2026 у академічних EU центрах.
      - Trial-only: IMerge post-marketing, IMpactMF.
      Source: drlz.com.ua пошук "imetelstat"/"rytelo" 2026-04-27 — РП відсутнє.

typical_dosing: >
  7.1 mg/kg IV every 4 weeks (2-hour infusion). Dose modifications
  for cytopenia (the dominant toxicity). Treatment duration in
  IMerge: median ~33 weeks; continue until loss of TI / unacceptable
  toxicity / disease progression.

formulations: ["Lyophilized powder for IV infusion 188 mg/vial"]

absolute_contraindications:
  - "Hypersensitivity"

black_box_warnings:
  - "Severe cytopenia (boxed): thrombocytopenia, neutropenia — bleeding + infection risk; mandatory dose modification + transfusion + G-CSF support"

major_interactions:
  - "Other myelosuppressive agents: additive cytopenia"
  - "Live vaccines: avoid"

common_adverse_events:
  - "Thrombocytopenia (~70%, often Grade ≥3)"
  - "Neutropenia (~70%, often Grade ≥3)"
  - "Anemia (paradoxical — early, before TI emerges)"
  - "Fatigue"
  - "ALT/AST elevation"
  - "Nausea / diarrhea"
  - "Headache"
  - "Bilirubin elevation"

serious_adverse_events:
  - "Severe + prolonged thrombocytopenia + bleeding"
  - "Severe neutropenia + sepsis"
  - "Hepatotoxicity (Grade ≥3 ALT/AST elevation)"
  - "Infusion reactions"

pharmacology: {half_life: "~4-5 hours; intracellular telomerase inhibition persists weeks"}

sources: [SRC-NCCN-AML-2025, SRC-ESMO-MDS-2021]
last_reviewed: "2026-04-25"
notes: >
  Pivotal: IMerge (Platzbecker et al., Lancet 2024) phase-3 —
  imetelstat 7.1 mg/kg IV q4wk vs placebo in transfusion-dependent
  LR-MDS post-ESA failure. Primary endpoint 8-week RBC TI: 39.8%
  vs 15.0% (p<0.001). Sustained 24-week TI: 28% vs 3.3%. FDA
  approval June 2024 (Rytelo). Cytopenia dominant toxicity —
  active management mandatory (transfusion support, dose modification,
  G-CSF for severe neutropenia). EMA approval pending as of
  2026-04. Ukraine: NOT registered — access only via named-patient
  import (after EMA approval) or US compassionate-use program;
  realistically unavailable in MVP timeframe.

notes_ua: >
  Іметельстат (imetelstat) — перший у класі інгібітор теломерази,
  13-мерний тіо-фосфорамідатний олігонуклеотид, комплементарний до
  ділянки РНК-матриці (hTR/TERC) людської теломерази; зв'язується з
  нею і пригнічує ферментативну активність у злоякісних клітинах із
  короткими теломерами та підвищеною експресією теломерази.
  Реєстраційне дослідження IMerge (Platzbecker та співавт., Lancet
  2024) — фаза 3, іметельстат 7.1 mg/kg внутрішньовенно кожні 4
  тижні проти плацебо у пацієнтів з трансфузійно-залежним МДС
  низького/проміжного-1 ризику після неефективності ESA. Первинна
  кінцева точка — 8-тижнева трансфузійна незалежність за еритроцитами:
  39.8% проти 15.0% (p<0.001). Стійка 24-тижнева трансфузійна
  незалежність: 28% проти 3.3%. Схвалення FDA — червень 2024 (Rytelo).
  Цитопенія — домінантна токсичність, потребує активного ведення
  (трансфузійна підтримка, корекція дози, G-CSF при тяжкій нейтропенії).
  Схвалення EMA очікується станом на 2026-04. В Україні не
  зареєстрований — доступ можливий лише через індивідуальний імпорт
  (після схвалення EMA) або американську програму compassionate-use;
  реалістично недоступний у строки MVP.

