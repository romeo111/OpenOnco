id: DRUG-INAVOLISIB
names:
  preferred: "Inavolisib"
  ukrainian: "Іναволісіб"
  english: "Inavolisib"
  brand_names: ["Itovebi"]
atc_code:
rxnorm_id:
drug_class: "PI3K-alpha-selective inhibitor (mutant-selective; degrades mutant p110α)"
mechanism: >
  Orally bioavailable PI3Kα inhibitor that selectively binds and promotes degradation of mutant p110α (PIK3CA-mut) over wild-type — improved tumor selectivity vs alpelisib. Combined with palbociclib + fulvestrant per INAVO120 in PIK3CA-mutated, HR+/HER2-, endocrine-resistant metastatic breast cancer.

regulatory_status:
  fda:
    approved: true
    notes: "FDA approved 2024-10-10 (Itovebi) — PIK3CA-mutated, HR+/HER2- locally advanced or metastatic breast cancer, in combination with palbociclib + fulvestrant, after recurrence on/after adjuvant endocrine therapy."
  ema: {approved: false}
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-04-29"
    notes: "Не зареєстрований в Україні станом на 2026-04. НСЗУ не покриває. Доступ — клінічні випробування або import. Джерело: dls.gov.ua реєстр (2026-04)."

    reimbursement_indications: []
typical_dosing: >
  9 mg PO once daily, with palbociclib 125 mg PO QD (3 weeks on / 1 week off) + fulvestrant 500 mg IM (standard schedule), until disease progression or unacceptable toxicity.

key_toxicities:
- Hyperglycemia (~58% any grade, ~6% G≥3 — lower than alpelisib due to mutant selectivity; pre-treatment HbA1c + fasting glucose; metformin first-line)
- Stomatitis / mucositis (~51%)
- Diarrhea (~48%)
- Rash (~25%)
- Neutropenia (combination effect with palbociclib — ~89% any grade)
- Nausea, decreased appetite, fatigue
- Hepatotoxicity (monitor LFTs)

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed:
notes: >
  INAVO120 (NCT04191499): Phase III, PIK3CA-mut HR+/HER2- metastatic breast cancer with disease recurrence on/after adjuvant endocrine therapy. Inavolisib + palbociclib + fulvestrant vs placebo + palbociclib + fulvestrant. Median PFS 15.0 vs 7.3 mo (HR 0.43). FDA approval Oct 2024. Pre-treatment PIK3CA testing (tissue or ctDNA) required. Mutant-selective design rationale = lower hyperglycemia + rash burden than alpelisib while preserving efficacy. Trial-source SRC for INAVO120 not yet ingested into KB — FLAG for follow-up.

notes_patient: >
  Таблетка нового покоління для HR+/HER2- раку грудей з мутацією PIK3CA — діє точніше за алпелісіб і менше підвищує цукор крові. Призначається разом з palbociclib (CDK4/6) і fulvestrant. Затверджена FDA в жовтні 2024.
