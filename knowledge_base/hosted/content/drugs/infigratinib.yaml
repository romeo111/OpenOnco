id: DRUG-INFIGRATINIB
names:
  preferred: "Infigratinib"
  ukrainian: "Інфіґратиніб"
  english: "Infigratinib"
  brand_names: ["Truseltiq"]
atc_code: L01EN
rxnorm_id: null
drug_class: "Selective oral FGFR1/2/3 tyrosine kinase inhibitor"
mechanism: >
  Oral, ATP-competitive selective inhibitor of FGFR1, FGFR2, and FGFR3
  (lower activity vs FGFR4). Mechanism shared with pemigatinib:
  reversible kinase inhibition; activity against fusion- and
  rearrangement-driven FGFR2 alterations dominant in intrahepatic
  cholangiocarcinoma. Pivotal CBGJ398X2204 Phase II (108 patients,
  FGFR2 fusion / rearrangement iCCA post ≥1 prior line including
  gem-cis) showed ORR 23.1%, mDOR 5.0 mo, mPFS 7.3 mo → FDA
  accelerated approval May 28, 2021.

regulatory_status:
  fda:
    approved: false
    year_first_approval: 2021
    indications_brief:
      - "Previously treated, unresectable, locally advanced or metastatic cholangiocarcinoma harboring FGFR2 fusions or rearrangements (accelerated approval May 28, 2021 — VOLUNTARILY WITHDRAWN by Helsinn / QED Therapeutics in Sep 2022 in the US oncology indication; Truseltiq commercial discontinuation announced Aug 2022)"
  ema:
    approved: false
    year_first_approval: null
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-29"
    notes: |
      Не зареєстровано в Україні (Держреєстр ЛЗ — РП відсутнє станом на
      2026-04-29). Препарат КОМЕРЦІЙНО ПРИПИНЕНО в США та EU у
      2022 р. (Helsinn / QED Therapeutics добровільне відкликання
      онкологічного показання FGFR2-fusion iCCA, серпень-вересень
      2022) — фактично НЕДОСТУПНИЙ. Причина: pemigatinib (Pemazyre,
      FDA 2020) + futibatinib (Lytgobi, FDA Sep 2022) зайняли клінічну
      нішу; comparable efficacy + better tolerability у конкурентів.

      Шляхи доступу:
      - НЕДОСТУПНИЙ — препарат знятий з ринку.
      - Альтернатива: pemigatinib (DRUG-PEMIGATINIB) або futibatinib
        (DRUG-FUTIBATINIB) для FGFR2-altered iCCA.
      Source: FDA Drugs@FDA + Helsinn press release Aug 2022;
      drlz.com.ua пошук "infigratinib"/"truseltiq" 2026-04-29 — РП
      відсутнє.

typical_dosing: >
  HISTORICAL (no longer marketed): 125 mg PO once daily on days 1-21
  of a 28-day cycle (21 days on / 7 days off), until progression or
  unacceptable toxicity. Take on empty stomach (≥1 h before or ≥2 h
  after food). Phosphate binders + dietary phosphate restriction
  routine. Dose modifications for hyperphosphatemia and ocular
  toxicity per label table. Note: Truseltiq commercial discontinuation
  announced Aug 2022; this dosing is documented for archival /
  comparator-trial reference only.

formulations:
  - "HISTORICAL: Capsules 25 mg, 100 mg (no longer marketed in US/EU after Aug-Sep 2022 voluntary withdrawal)"

absolute_contraindications:
  - "Severe hypersensitivity to infigratinib"
  - "Pregnancy (embryo-fetal toxicity per animal data — class FGFR effect)"
  - "Pre-existing active retinal pigment epithelial detachment or central serous retinopathy"

black_box_warnings: []

common_adverse_events:
  - "Hyperphosphatemia (>5.5 mg/dL — class FGFR pharmacodynamic effect)"
  - "Stomatitis / mucositis"
  - "Fatigue"
  - "Alopecia"
  - "Nail toxicity (onycholysis, ridging, paronychia)"
  - "Dry mouth, dry eyes"
  - "Constipation, diarrhea"
  - "Decreased appetite, weight loss"
  - "Palmar-plantar erythrodysesthesia"
  - "Dysgeusia"
  - "Arthralgia"

serious_adverse_events:
  - "Retinal pigment epithelial detachment / serous retinopathy (class FGFR effect)"
  - "Severe hyperphosphatemia with soft-tissue mineralization / vascular calcification"
  - "Severe stomatitis impairing oral intake"
  - "Embryo-fetal toxicity"

major_interactions:
  - "Strong CYP3A4 inhibitors / inducers — avoid; alters infigratinib exposure"
  - "P-gp inhibitors — increased exposure"
  - "Acid-reducing agents (PPI, H2 blocker, antacids) — significantly reduce infigratinib absorption — avoid"
  - "Concurrent phosphate-elevating drugs — additive hyperphosphatemia"

pharmacology:
  half_life_hours: 33.5
  half_life_notes: "Once-daily intermittent (21 on / 7 off) schedule reduces hyperphosphatemia"
  clearance: "Hepatic CYP3A4-mediated; biliary elimination dominant"
  protein_binding_pct: 99
  metabolism: "CYP3A4 oxidative; M28-1 active metabolite"

sources:
  - SRC-NCCN-HEPATOBILIARY
