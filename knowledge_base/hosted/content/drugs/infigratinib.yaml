reviewers: []
notes: >
  Infigratinib (Truseltiq) was the SECOND FGFR-targeted therapy approved
  for FGFR2-altered cholangiocarcinoma (after pemigatinib in Apr 2020),
  with FDA accelerated approval May 28, 2021 based on CBGJ398X2204
  Phase II (Javle JCO 2021). However, Helsinn / QED Therapeutics
  voluntarily discontinued commercial supply of Truseltiq in the US
  oncology indication in August-September 2022 — citing the competitive
  landscape (pemigatinib + futibatinib) and inability to complete the
  PROOF-301 confirmatory Phase III (1L vs gem-cis in FGFR2-fusion iCCA;
  enrollment failed, study terminated). Result: infigratinib is NO
  LONGER COMMERCIALLY AVAILABLE for cholangiocarcinoma. Documented in
  KB for historical / comparator-trial completeness; clinical
  recommendations for FGFR2-altered iCCA route to pemigatinib (1L
  preferred per FIGHT-302 pending readout) or futibatinib (covalent;
  retains activity against some pemigatinib-resistance variants).
  Class toxicity profile mirrored other FGFR TKIs (hyperphosphatemia,
  RPED, stomatitis, nail toxicity). Note: infigratinib (under brand
  Truseltiq) retains a separate FDA approval in achondroplasia
  (pediatric short-stature), an unrelated indication outside oncology
  scope — that approval is held by BridgeBio Pharma and is not
  affected by the Helsinn oncology withdrawal. Missing source IDs
  to flag: SRC-CBGJ398X2204 (pivotal Phase II), SRC-FDA-TRUSELTIQ,
  SRC-PROOF-301 (terminated confirmatory) not yet authored.
notes_patient: >
  Препарат-таблетка з групи FGFR-інгібіторів, який раніше був
  схвалений для холангіокарциноми з мутацією FGFR2. На сьогодні
  препарат знятий з ринку (серпень 2022 р.) — натомість
  призначаються пеміґатиніб або футибатиніб з тієї ж групи.
