id: DRUG-IRINOTECAN
names:
  preferred: "Irinotecan"
  ukrainian: "Іринотекан"
  english: "Irinotecan"
  brand_names: ["Camptosar", "CPT-11"]
atc_code: L01CE02
rxnorm_id: "51499"
drug_class: "Topoisomerase I inhibitor (camptothecin)"
mechanism: >
  Active metabolite SN-38 (UGT1A1-glucuronidated for clearance) inhibits
  topoisomerase I → DNA single-strand breaks → cell death. UGT1A1 *28/*28
  homozygotes have severe neutropenia + diarrhea risk; testing recommended
  before high-dose use.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-26"

typical_dosing: >
  FOLFIRI: 180 mg/m² IV day 1 every 14d.
  FOLFIRINOX: 180 mg/m² IV day 1 every 14d.
  CRC monotherapy 2L: 350 mg/m² IV every 21d.
formulations: ["IV solution 20 mg/mL"]

absolute_contraindications:
  - "Severe pre-existing diarrhea / inflammatory bowel disease"
  - "Severe baseline myelosuppression"
  - "Bilirubin >3× ULN"
  - "Pregnancy"

black_box_warnings:
  - "Severe diarrhea (early cholinergic + late delayed)"
  - "Severe myelosuppression"

common_adverse_events:
  - "Acute cholinergic syndrome (within 24h — atropine prophylaxis IV)"
  - "Late delayed diarrhea (loperamide PRN, aggressive hydration)"
  - "Neutropenia"
  - "Alopecia"
  - "Nausea (moderately emetogenic)"

serious_adverse_events:
  - "Severe diarrhea + sepsis"
  - "Febrile neutropenia"
  - "Interstitial pneumonitis (rare)"

sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024

last_reviewed: "2026-04-26"
notes: >
  STUB — Phase GI-1. UGT1A1 testing strongly recommended for
  FOLFIRINOX (intensive dose). Loperamide 4 mg at first loose stool then
  2 mg q2h until 12h diarrhea-free; consider octreotide for refractory.
