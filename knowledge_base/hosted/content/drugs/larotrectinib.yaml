id: DRUG-LAROTRECTINIB
names:
  preferred: "Larotrectinib"
  ukrainian: "Ларотректініб"
  english: "Larotrectinib"
  brand_names: ["Vitrakvi"]
atc_code: L01EX12
rxnorm_id:
drug_class: "TRK-selective inhibitor"
mechanism: >
  Tumor-agnostic NTRK-fusion-targeted TKI. Highly active across NTRK1/2/3-fusion cancers including NSCLC. Not active in NTRK-WT.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: false
    last_verified: "2026-04-27"
    notes: "Реєстрація МОЗ підтверджена для NTRK-fusion+ пухлин (тумор-агностично; раніше registered=false — виправлено). НСЗУ не покриває — out-of-pocket/named-patient. Джерело: nszu.gov.ua (2026-04)."

    reimbursement_indications: []
typical_dosing: >
  100 mg PO BID.

key_toxicities:
- Fatigue
- Dizziness / cognitive AEs (TRK class)
- Hepatic enzyme elevation
- Withdrawal pain (paradoxical pain on dose interruption)

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed:
notes: >
  Cross-disease tumor-agnostic indication. NTRK testing universal in NSCLC NGS panels.

notes_ua: >
  Ларотректініб (larotrectinib) — селективний інгібітор тирозинкінази
  TRK; високоефективний при NTRK1/2/3-fusion позитивних пухлинах,
  включно з НДРЛ. Тумор-агностичне показання, перехресне для різних
  локалізацій. Тестування на NTRK-перебудови входить до стандартних
  NGS-панелей при НДРЛ. Не активний у пухлинах з NTRK дикого типу.

ukrainian_review_status: pending_clinical_signoff
