last_reviewed: "2026-04-27"
reviewers: []
notes: >
  Currently approved in the West only in fixed combination with
  amivantamab (MARIPOSA — superior PFS vs osimertinib but more AE,
  notably VTE / IRR / rash / hepatotoxicity). Korean approval as
  monotherapy (2021) is not reflected in EMA/FDA labels. VTE
  prophylaxis with prophylactic-dose LMWH or DOAC for the first 4
  months is mandated by MARIPOSA protocol when combined with
  amivantamab. Baseline workup: ECG (QTc), LFTs, CBC, electrolytes
  (K, Mg, Ca), CT chest (ILD baseline), echo if cardiac history.
  Monitor LFTs / ECG q2 weeks first 8 weeks then monthly; CT chest
  at any new respiratory symptoms (high suspicion for ILD). Premed
  for amivantamab IRR as per ami protocol (steroid + antihistamine
  + antipyretic). Compared with osimertinib alone, the combo
  increases PFS at the cost of toxicity — patient selection
  (younger, fitter, willing to accept IV therapy and VTE prophylaxis)
  is critical.

notes_ua: >
  Лазертініб (lazertinib) — необоротний інгібітор тирозинкінази
  EGFR третього покоління, що ковалентно зв'язує цистеїновий залишок
  C797 мутантного EGFR; селективний до сенситизуючих мутацій (делеції
  екзону 19, L858R) та мутації резистентності T790M, з мінімальним
  впливом на EGFR дикого типу (відповідно менший тягар висипу та
  шлунково-кишкової токсичності порівняно з TKI першого покоління).
  Препарат проникає через ГЕБ — співвідношення CSF/плазма аналогічне
  осимертинібу, що забезпечує внутрішньочерепну активність.
  Фармакологічно та за спектром мішеней аналогічний осимертинібу.
  На Заході наразі схвалений лише у фіксованій комбінації з
  амівантамабом (дослідження MARIPOSA — перевага PFS порівняно з
  осимертинібом, але вища частота побічних явищ, передусім VTE,
  інфузійних реакцій, висипу, гепатотоксичності). Корейське
  схвалення як монотерапії (2021) не відображене в інструкціях
  EMA/FDA. Профілактика VTE низькомолекулярним гепарином або DOAC
  у профілактичних дозах протягом перших 4 місяців обов'язкова в
  протоколі MARIPOSA при комбінації з амівантамабом. Базове
  обстеження: ЕКГ (QTc), печінкові проби, ЗАК, електроліти (K, Mg,
  Ca), КТ органів грудної клітки (вихідний рівень для оцінки ILD),
  ехокардіографія за наявності кардіальної патології. Моніторинг
  печінкових проб та ЕКГ кожні 2 тижні протягом перших 8 тижнів,
  далі щомісячно; КТ органів грудної клітки при будь-яких нових
  респіраторних симптомах (висока підозра на інтерстиціальне
  ураження легень). Премедикація перед амівантамабом — за
  протоколом ami (стероїд + антигістамінний + антипіретик).
  Порівняно з монотерапією осимертинібом комбінація збільшує
  PFS ціною токсичності — критично важливим є відбір пацієнтів
  (молодші, фізично кращі, готові до внутрішньовенної терапії та
  VTE-профілактики).

