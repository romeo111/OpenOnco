    notes: "Не зареєстровано per drlz.com.ua snapshot 2026-04-27. Originally Korean (Yuhan) approval 2021; J&J global development. Доступ via EAP J&J / cross-border / self-pay. Osimertinib remains the dominant 3rd-gen EGFR-TKI in UA НСЗУ."

typical_dosing: >
  240 mg PO once daily, with or without food, in combination with
  amivantamab IV/SC dosed per MARIPOSA schedule. Continuous until
  progression / unacceptable toxicity. Dose level -1 = 160 mg daily;
  -2 = 80 mg daily; permanent discontinuation if recurrent G3-4 at
  -2. Hold for ILD/pneumonitis (any grade — workup); permanently
  discontinue for confirmed ILD ≥G2. Hold for QTc >500 ms; correct
  K+/Mg++ and reassess. No formal renal adjustment.

formulations:
  - "Tablets 80 mg"
  - "Tablets 240 mg"

absolute_contraindications:
  - "Hypersensitivity to lazertinib or any excipient"
  - "Pregnancy (embryo-fetal toxicity)"
  - "Confirmed ILD/pneumonitis attributed to lazertinib"

black_box_warnings: []

common_adverse_events:
  - "Rash / acneiform dermatitis ~40-45% (EGFR class)"
  - "Paronychia ~30%"
  - "Diarrhea ~25-30%"
  - "Dry skin ~25%"
  - "Stomatitis ~20%"
  - "Pruritus ~15%"
  - "Decreased appetite ~15%"
  - "Fatigue ~25%"
  - "Nausea ~15%"
  - "Hypoalbuminemia ~30% (combo)"
  - "Peripheral edema ~15%"

serious_adverse_events:
  - "Interstitial lung disease / pneumonitis (G3+ ~3%; class warning — workup any new dyspnea/cough)"
  - "QT prolongation (G3 QTc >500 ms ~3%)"
  - "Cardiomyopathy / LVEF decline (~6% any decrease; G3 rare)"
  - "Severe rash / SCAR (rare)"
  - "Venous thromboembolism (combo with amivantamab) — VTE prophylaxis recommended per MARIPOSA protocol (LMWH or DOAC for first 4 mo)"
  - "Severe paronychia / cellulitis"
  - "Hepatotoxicity (G3 ALT/AST ~4%)"
  - "Hypokalemia / hypomagnesemia (electrolyte derangement amplifying QT risk)"

major_interactions:
  - "Strong CYP3A4 inhibitors (azoles, clarithromycin, ritonavir) — ↑ exposure; consider dose reduction"
  - "Strong CYP3A4 inducers (rifampin, phenytoin, carbamazepine, St John's wort) — ↓ exposure; avoid"
  - "Other QT-prolonging drugs (ondansetron IV, methadone, fluoroquinolones, antipsychotics) — additive QTc"
  - "P-gp / BCRP substrates — lazertinib inhibits, modest effect"
  - "Concurrent amivantamab (intentional combination) — VTE prophylaxis required per MARIPOSA"

pharmacology:
  half_life_hours: 65
  clearance: "hepatic"
  protein_binding_pct: 99
  metabolism: "CYP3A4 (predominant); minor CYP1A2 / 2D6"

sources:
