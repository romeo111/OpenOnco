id: DRUG-LAZERTINIB
names:
  preferred: "Lazertinib"
  ukrainian: "Лазертініб"
  english: "Lazertinib"
  synonyms: ["YH25448", "JNJ-73841937"]
  brand_names: ["Lazcluze", "Leclaza"]
atc_code: L01EB10
rxnorm_id: ""
drug_class: "Third-generation EGFR tyrosine kinase inhibitor"
mechanism: >
  Irreversible third-generation EGFR-TKI that covalently binds the
  cysteine residue (C797) of mutant EGFR, selective for sensitizing
  EGFR mutations (exon-19 deletions, L858R) and the T790M
  resistance-conferring mutation while sparing wild-type EGFR (so
  reduced rash / GI toxicity vs first-generation TKIs). Brain-
  penetrant (CSF/plasma ratio similar to osimertinib), enabling
  intracranial activity. Mechanism of action and target spectrum are
  pharmacologically analogous to osimertinib. Clinical evidence:
  MARIPOSA (lazertinib + amivantamab vs osimertinib in 1L EGFR
  ex19del / L858R NSCLC): mPFS 23.7 vs 16.6 mo, HR 0.70 — added FDA
  approval Aug 2024 for the combination. Korean approval as monotherapy
  preceded the Western combo registration (2021).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2024
    indications_brief:
      - "EGFR ex19del/L858R 1L NSCLC (combo amivantamab — MARIPOSA)"
  ema:
