notes: >
  Hypertension pre-treatment optimization mandatory: ACE-i / ARB
  first, then add CCB (amlodipine), then beta-blocker if needed.
  Hold for SBP >160 or DBP >100 mm Hg; resume at lower dose once
  controlled. Child-Pugh A only fully studied; CP-B excluded from
  REFLECT (HCC) — limited data. SELECT (radioiodine-refractory DTC):
  mPFS 18.3 vs 3.6 mo placebo. CLEAR (RCC 1L): lenvatinib +
  pembrolizumab vs sunitinib — mPFS 23.9 vs 9.2 mo, OS HR 0.66.
  KEYNOTE-775 (R/R endometrial post-platinum): lenvatinib + pembro
  vs chemo, OS HR 0.62. Baseline + serial BP, urinalysis (UPCR),
  LFTs, TSH, ECG. Counsel hold pre- and post-elective surgery
  (≥2 wk wound-healing). UA: зареєстрований; НСЗУ покриває DTC,
  ГЦК, RCC, ендометрій (з pembro).

notes_ua: >
  Ленватиніб (lenvatinib) — багатоцільовий пероральний інгібітор
  тирозинкіназ (VEGFR1-3, FGFR1-4, PDGFR-α, RET, KIT) з ширшим
  VEGFR + FGFR покриттям, ніж сорафеніб. Дослідження REFLECT при
  нерезектабельному ГЦК показало непоступальну загальну виживаність
  і вищі PFS/ORR порівняно з сорафенібом у першій лінії. Обов'язкова
  оптимізація терапії артеріальної гіпертензії перед стартом
  ленватинібу: спочатку інгібітор АПФ або БРА, потім додати блокатор
  кальцієвих каналів (амлодипін), за потреби — бета-блокатор. Відміна
  при САТ >160 або ДАТ >100 mm Hg; відновлення в зниженій дозі
  після контролю. Повноцінні дані лише для Child-Pugh A; пацієнтів
  Child-Pugh B виключали з REFLECT (ГЦК) — дані обмежені. SELECT
  (радіойод-рефрактерний DTC): mPFS 18.3 проти 3.6 міс плацебо.
  CLEAR (RCC 1L): ленватиніб + пембролізумаб проти сунітинібу —
  mPFS 23.9 проти 9.2 міс, HR загальної виживаності 0.66.
  KEYNOTE-775 (R/R рак ендометрія після платини): ленватиніб +
  пембролізумаб проти хіміотерапії — HR ОС 0.62. Базовий і
  серійний контроль АТ, аналіз сечі (UPCR), печінкові проби, ТТГ,
  ЕКГ. Призначається відміна перед і після планової операції
  (≥2 тиж для загоєння рани). В Україні зареєстрований; НСЗУ
  покриває DTC, ГЦК, RCC та рак ендометрія (у комбінації з pembro).

