id: DRUG-LENVATINIB
names:
  preferred: "Lenvatinib"
  ukrainian: "Ленватиніб"
  english: "Lenvatinib"
  brand_names: ["Lenvima", "Kisplyx"]
atc_code: L01EX08
rxnorm_id: "1664320"
drug_class: "Multi-targeted oral TKI (VEGFR1-3, FGFR1-4, PDGFR-α, RET, KIT)"
mechanism: >
  Broader VEGFR + FGFR inhibition vs sorafenib. REFLECT trial showed
  non-inferior OS and superior PFS/ORR in 1L unresectable HCC.
regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration: {registered: true, reimbursed_nszu: false, last_verified: "2026-04-26"}
typical_dosing: ">60 kg: 12 mg PO daily; ≤60 kg: 8 mg PO daily."
formulations: ["Capsules 4 mg, 10 mg"]
absolute_contraindications: ["Severe uncontrolled hypertension", "Active hemorrhage", "Pregnancy"]
common_adverse_events: ["Hypertension (universal)", "Diarrhea", "Decreased appetite", "Fatigue", "Hand-foot skin reaction", "Hypothyroidism", "Proteinuria"]
serious_adverse_events: ["Severe hypertension / hypertensive crisis", "Cardiac dysfunction", "Hepatic decompensation", "Hemorrhage (esp. varices)", "Posterior reversible encephalopathy syndrome"]
sources: [SRC-NCCN-HCC-2025, SRC-AASLD-HCC-2023]
last_reviewed: "2026-04-26"
notes: >
  STUB — Phase GI-1. HTN: pre-treatment optimization, ACE-i/ARB first,
  add CCB (amlodipine). Hold for SBP >160/100 or symptomatic. Child-Pugh
  A only; CP-B excluded from REFLECT.
