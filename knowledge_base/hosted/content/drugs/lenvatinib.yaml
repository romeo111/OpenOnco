notes_patient: >
  Таблетка-TKI, що блокує ріст судин у пухлині (VEGFR) та інші ростові сигнали. Використовується при раку щитоподібної залози, нирок, печінки, ендометрію. Часто підвищує тиск — контролюємо щоденно.
