notes_ua: >
  Летрозол (letrozole) — нестероїдний інгібітор ароматази третього
  покоління, оборотний; механізм аналогічний анастрозолу, відносна
  потужність дещо вища у деяких ФК-дослідженнях, але клінічно
  препарати взаємозамінні. Часто використовується в комбінації з
  CDK4/6-інгібіторами в першій лінії метастатичного HR+/HER2- раку
  молочної залози (наприклад, дослідження PALOMA-2 — летрозол +
  палбоцикліб). Профіль токсичності — ефекти класу (припливи,
  артралгії, остеопенія).

