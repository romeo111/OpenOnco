id: DRUG-LEUCOVORIN
names:
  preferred: "Leucovorin (Folinic acid)"
  ukrainian: "Лейковорин (Фолінова кислота)"
  english: "Leucovorin"
  brand_names: ["Folinic acid"]
atc_code: V03AF03
rxnorm_id: "6313"
drug_class: "Reduced folate (5-formyltetrahydrofolate) — biomodulator"
mechanism: >
  Tetrahydrofolate donor that stabilizes the 5-FU/thymidylate-synthase
  ternary complex, potentiating 5-FU cytotoxicity. NOT a chemotherapy
  agent itself in this role — it is given alongside 5-FU. Separately,
  high-dose leucovorin is used as MTX rescue.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Колоректальний рак (FOLFOX, FOLFIRI — модулятор 5-ФУ)"
      - "Рятувальна терапія після високих доз метотрексату"
    last_verified: "2026-04-27"
formulations: ["IV solution 10 mg/mL", "PO tablets"]

absolute_contraindications:
  - "Pernicious anemia / B12 deficiency (masks neurologic symptoms)"

common_adverse_events:
  - "Allergic reactions (rare)"
  - "Nausea"

serious_adverse_events:
  - "Anaphylaxis (very rare)"

sources:
  - SRC-NCCN-COLON-2025

last_reviewed: "2026-04-26"
notes: >
  Most 5-FU regimens require leucovorin for activity modulation;
  doses are protocol-specific: Mayo Clinic (20 mg/m² IV bolus
  pre-5FU), Roswell Park (500 mg/m² IV 2-h infusion), de Gramont
  / FOLFOX / FOLFIRI (200-400 mg/m² IV 2-h infusion Day 1
  ± Day 2). Levoleucovorin (l-isomer) is the active enantiomer;
  half the dose of racemic leucovorin (10 mg/m² Mayo equivalent).
  In high-dose methotrexate rescue: 15 mg PO/IV q6h starting 24 h
  post-MTX, continued until MTX level <0.05-0.1 µM (escalate dose
  if MTX clearance delayed). Critical safety point: leucovorin
  rescue dose must be matched to MTX level — under-rescue causes
  fatal MTX toxicity. UA: зареєстрований; НСЗУ-reimbursed for
  5-FU modulation in CRC and as MTX rescue. Generic widely
  available.
