notes: >
  Most 5-FU regimens require leucovorin for activity modulation;
  doses are protocol-specific: Mayo Clinic (20 mg/m² IV bolus
  pre-5FU), Roswell Park (500 mg/m² IV 2-h infusion), de Gramont
  / FOLFOX / FOLFIRI (200-400 mg/m² IV 2-h infusion Day 1
  ± Day 2). Levoleucovorin (l-isomer) is the active enantiomer;
  half the dose of racemic leucovorin (10 mg/m² Mayo equivalent).
  In high-dose methotrexate rescue: 15 mg PO/IV q6h starting 24 h
  post-MTX, continued until MTX level <0.05-0.1 µM (escalate dose
  if MTX clearance delayed). Critical safety point: leucovorin
  rescue dose must be matched to MTX level — under-rescue causes
  fatal MTX toxicity. UA: зареєстрований; НСЗУ-reimbursed for
  5-FU modulation in CRC and as MTX rescue. Generic widely
  available.

notes_ua: >
  Лейковорин (leucovorin, фолінова кислота) — донор тетрагідрофолату,
  який стабілізує тернарний комплекс 5-ФУ/тимідилатсинтаза та
  потенціює цитотоксичність 5-ФУ. Сам по собі не є хіміотерапевтичним
  агентом у цій ролі — призначається спільно з 5-ФУ. Окремо
  високодозовий лейковорин використовують як "рятівну" терапію після
  високих доз метотрексату. Більшість схем з 5-ФУ потребують
  лейковорину для модуляції активності; дози специфічні до протоколу:
  Mayo Clinic — 20 mg/m² внутрішньовенно болюсом перед 5-ФУ; Roswell
  Park — 500 mg/m² внутрішньовенно у 2-годинній інфузії; de Gramont /
  FOLFOX / FOLFIRI — 200-400 mg/m² внутрішньовенно у 2-годинній
  інфузії в день 1 (± день 2). Левелейковорин (l-ізомер) — активний
  енантіомер; вживається в половинній дозі рацемічного лейковорину
  (10 mg/m² — еквівалент Mayo). У "рятівній" терапії після високих
  доз метотрексату: 15 mg перорально або внутрішньовенно кожні 6 год,
  починаючи через 24 год після MTX, продовжуючи до зниження рівня
  MTX <0.05-0.1 µM (ескалація дози при сповільненні кліренсу MTX).
  Критичний момент безпеки: рятівна доза лейковорину має відповідати
  поточному рівню MTX — недостатня "рятівна" терапія спричиняє
  фатальну токсичність MTX. В Україні препарат зареєстрований;
  покривається НСЗУ для модуляції 5-ФУ при колоректальному раку та
  як "рятівна" терапія після MTX; генерик широко доступний.

