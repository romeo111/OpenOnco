id: DRUG-LINVOSELTAMAB
name: "Linvoseltamab"
name_ua: "Лінвоселтамаб"
brand_names: ["Lynozyfic"]
drug_class: "BCMA × CD3 bispecific antibody (IgG4-based HLE BiTE)"
atc_code: L01FX24
mechanism_of_action: >
  Half-life-extended (HLE) bispecific antibody engaging BCMA (B-cell maturation antigen,
  TNFRSF17) on multiple myeloma plasma cells and CD3 on T cells. Bridges T cells to
  BCMA-expressing MM cells, inducing cytotoxic killing via perforin/granzyme pathway.
  BCMA is expressed on virtually all MM plasma cells and memory B cells but absent on
  naive B cells and hematopoietic stem cells, providing therapeutic selectivity.
  Similar target (BCMA × CD3) to teclistamab (Tecvayli) but distinct molecular design:
  IgG4 backbone with HLE modification for biweekly dosing. Class effects shared with
  teclistamab and elranatamab.
standard_doses:
  - indication: "R/R multiple myeloma (>=4 prior lines)"
    dose: "Step-up: Week 1 Day 1: 0.6 mg SC; Week 2 Day 1: 3 mg SC; Week 3 Day 1: 76 mg SC; maintenance: 76 mg SC Q2W"
    schedule: "SC injection; step-up over 3 weeks; Q2W maintenance after step-up"
    notes: "MANDATORY HOSPITALIZATION for Week 1 and Week 2 doses (CRS monitoring). Outpatient for Week 3 onward after safety established. Dexamethasone premedication before each dose."
key_toxicities:
  - "CRS: ~43% any grade; Grade 3+: ~1% (lower than IV BiTEs due to SC slow absorption)"
  - "ICANS: ~8% any grade"
  - "Infections: serious infections ~26%; prophylaxis mandatory"
  - "Cytopenias: neutropenia, anemia, thrombocytopenia (B-cell depletion + MM marrow)"
  - "Injection site reactions: SC formulation; local erythema, pain"
  - "Immunodeficiency: hypogammaglobulinemia; IVIG replacement may be needed"
contraindications:
  - "Active uncontrolled severe infection"
  - "Active uncontrolled autoimmune disease"
eligibility_requirements:
  - "Prior treatment with proteasome inhibitor, immunomodulatory agent, and anti-CD38 antibody"
  - "At least 4 prior lines of therapy"
special_populations:
  - "Renal impairment: no formal dose adjustment (BCMA BiTEs not renally cleared)"
  - "Hepatic impairment: limited data"
monitoring:
  - "CRS monitoring: hospitalization for first 2 doses; vital signs, O2 sat"
  - "ICANS assessment: neurological assessment with each dose"
  - "CBC with differential: before each dose"
  - "Immunoglobulin levels: monthly; IVIG if IgG <400 mg/dL"
  - "Infection surveillance: fever protocol"
prophylaxis:
  - "PCP prophylaxis: TMP-SMX or pentamidine"
  - "Antiviral prophylaxis: acyclovir/valacyclovir"
  - "Antifungal: fluconazole (per institutional protocol)"
sources:
  - SRC-NCCN-MM-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  FDA approved April 2025 for adults with R/R multiple myeloma who received
  >=4 prior lines including a proteasome inhibitor, IMiD, and anti-CD38 antibody.
  Based on LINKER-MM1 Phase 1/2 trial (Garfall 2024).
  NCCN MM 2025: Category 1 for triple-class refractory MM >=4L (alongside
  teclistamab, elranatamab, and ciltacel/lisocel CAR-T).
  Key differentiator vs teclistamab: SC HLE formulation (Q2W vs weekly for teci
  after month 6 extension); lower CRS rate due to SC slow absorption.
  BCMA class toxicities shared: infections are the primary late toxicity
  (prophylaxis critical). IVIG replacement for IgG <400 mg/dL hypogammaglobulinemia.
