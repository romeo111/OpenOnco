id: DRUG-LOMUSTINE
names:
  preferred: "Lomustine"
  ukrainian: "Ломустин"
  english: "Lomustine (CCNU)"
  brand_names: ["CeeNU", "Cecenu", "CCNU"]
drug_class: Alkylating agent (nitrosourea)
mechanism: >
  Nitrosourea alkylating agent. Cross-links DNA strands (O6-alkylguanine,
  N1-alkylguanine, N3-alkylcytosine) and carbamoylates proteins. Cell-cycle
  non-specific. Highly lipophilic — crosses blood-brain barrier efficiently
  (relevant for CNS tumors). MGMT-mediated DNA repair is the primary resistance
  mechanism (MGMT removes O6-methylguanine adducts; MGMT promoter methylation
  → lower MGMT expression → better lomustine sensitivity).
indications_approved:
  - Brain tumors (primary and metastatic; FDA/EMA approved)
  - Hodgkin lymphoma (combination regimens; historical)
routes_of_administration: [PO]
formulation: "Capsules 10 mg, 40 mg, 100 mg"
key_toxicities:
  dose_limiting:
    - "Delayed myelosuppression: nadir at 4-6 weeks post dose (LATE nadir — unlike most other agents; critical to monitor CBC at week 4-6)"
    - "Cumulative myelosuppression: thrombocytopenia predominant; CBC must recover before next cycle (6 weeks minimum)"
  serious:
    - "Pulmonary toxicity: delayed pulmonary fibrosis (cumulative dose-related; especially >1 g/m² lifetime)"
    - "Hepatotoxicity: LFT elevation (monitor before each cycle)"
    - "Secondary leukemia (nitrosourea class effect; long-term)"
  common:
    - "Nausea and vomiting (first 2-6 hours post-dose; ondansetron prophylaxis)"
    - "Anorexia, fatigue"
    - "Alopecia (mild)"
contraindications:
  - "Prior severe lomustine-related pulmonary toxicity"
  - "Severe hepatic impairment (bilirubin >3× ULN)"
  - "Active uncontrolled infection (myelosuppression risk)"
ua_registration: >
  Lomustine (Cecenu, Synerlab; or generic equivalent): regulatory status in
  Ukraine varies — not on all NSZU formularies; may require MDT compassionate
  use request or named-patient import. Check current NSZU oncology formulary
  before prescribing.
last_reviewed: "2026-05-04"
