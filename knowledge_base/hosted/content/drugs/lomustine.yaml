id: DRUG-LOMUSTINE
names:
  preferred: "Lomustine (CCNU)"
  ukrainian: "Ломустин"
  english: "Lomustine"
  synonyms:
    - "CCNU"
    - "CeeNU"

drug_class: "Alkylating agent (nitrosourea)"
mechanism: "DNA alkylation and cross-linking; crosses blood-brain barrier; myelosuppressive"
formulations:
  - "10 mg, 40 mg, 100 mg oral capsules"
route: PO

common_adverse_events:
  - "Delayed myelosuppression (nadir 4-6 weeks; recovery 6-8 weeks)"
  - "Nausea/vomiting (onset 2-6 hours after dose)"
  - "Hepatotoxicity (transaminase elevation)"
  - "Pulmonary fibrosis (cumulative dose-related)"

black_box_warnings:
  - "Severe bone marrow suppression — do not administer more frequently than every 6 weeks"

