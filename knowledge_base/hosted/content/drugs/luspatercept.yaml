notes: >
  Lower-risk MDS with RS and RBC TD post-ESA failure (MEDALIST) — TI ≥8 wk
  38% vs 13% placebo. COMMANDS trial established luspatercept as 1L over
  ESA for transfusion-dependent LR-MDS broadly. NOT registered in Ukraine.

notes_ua: >
  Луспатерцепт (luspatercept) — рекомбінантний злитий білок, що
  зв'язує окремі ліганди родини TGF-β (GDF11, активін B) і сприяє
  пізньостадійному дозріванню еритроїдних попередників; знижує
  трансфузійну залежність при МДС низького ризику з кільцевими
  сидеробластами (RS+) та β-таласемії. У МДС низького ризику з RS
  після неефективності ESA (дослідження MEDALIST): трансфузійна
  незалежність ≥8 тижнів — 38% проти 13% при плацебо. Дослідження
  COMMANDS установило луспатерцепт як терапію першої лінії
  (перевага перед ESA) при трансфузійно-залежному МДС низького
  ризику в широкій популяції. В Україні препарат не зареєстрований.

