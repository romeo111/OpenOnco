id: DRUG-LUSPATERCEPT
names:
  preferred: "Luspatercept"
  ukrainian: "Луспатерцепт"
  english: "Luspatercept"
  brand_names: ["Reblozyl"]
atc_code: B03XA06
rxnorm_id: "2178160"
drug_class: "Erythroid maturation agent (TGF-β superfamily ligand trap)"
mechanism: >
  Recombinant fusion protein binding select TGF-β superfamily ligands
  (GDF11, activin B), promotes late-stage erythroid maturation in MDS
  and β-thalassemia. Reduces transfusion burden in lower-risk MDS with
  ring sideroblasts and (per COMMANDS) in non-RS LR-MDS as 1L vs ESA.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-04-27"

    reimbursement_indications: []
    notes: 'BORDERLINE / FLAG: реєстрація МОЗ не підтверджена станом на 2026-04. Рекомендований ESMO для МДС-LR-RS+ (MEDALIST) та β-таласемії. НСЗУ не покриває. Очікується включення до пілотних UA-програм у 2026-2027. Потребує перевірки клінічним co-lead — можлива пере-категоризація до pkg3.'
typical_dosing: >
  MDS / β-thalassemia: 1.0 mg/kg SC every 3 weeks; titrate to 1.33 mg/kg
  then 1.75 mg/kg if no transfusion-burden reduction after 2 doses.
formulations: ["SC powder 25 mg / 75 mg vials"]

