notes: >
  STATUS: DEVELOPMENT DISCONTINUED — Gilead Sciences (acquired
  magrolimab via Forty Seven Inc, $4.9B, 2020) announced on
  February 14, 2024 the complete discontinuation of magrolimab AML
  and MDS development programs. DLBCL and solid-tumor (CRC, ovarian,
  bladder) programs were wound down through mid-late 2024. The
  decision followed:
  (1) FDA partial clinical hold on ENHANCE-2 (Phase III 1L TP53-mutant
      AML, magro+aza vs venetoclax+aza) in Aug 2023 — apparent
      excess mortality.
  (2) ENHANCE-3 (Phase III 1L AML unfit for intensive chemo,
      magro+ven+aza vs placebo+ven+aza) crossed pre-specified
      futility boundary at IDMC review Jan 2024.
  (3) Independent Data Monitoring Committee recommendation to halt
      all magrolimab AML / MDS studies.
  Magrolimab was the most clinically advanced anti-CD47 antibody;
  its failure raises questions about CD47-SIRPα as a therapeutic
  axis in myeloid malignancies generally — but next-generation
  CD47 / SIRPα agents (lemzoparlimab, evorpacept, AO-176) and
  bispecifics remain in earlier-phase development. KB retains
  this entry to: (a) document the failed program for clinical
  decision support (recommendation: do NOT seek magrolimab access
  for any patient — none available; do NOT include in regimen
  options); (b) preserve historical reference for any literature /
  trial-history queries; (c) provide a worked example of a "drug
  discontinued in development" YAML pattern. CHUNK NOTE: per chunk
  manifest, magrolimab was authored (not dropped) with full
  discontinuation context — orchestrator can re-evaluate whether
  to keep this entry or remove in a follow-up chunk if KB policy
  excludes never-approved discontinued candidates. Missing source
  IDs to flag: SRC-GILEAD-MAGROLIMAB-DISCONT-2024 (Gilead press
  release Feb 14, 2024), SRC-ENHANCE-2, SRC-ENHANCE-3 not yet
  authored.
notes_patient: >
  Експериментальне антитіло проти CD47 (так званого "не-їж-мене"
  сигналу на пухлинних клітинах). Розробку препарату ПРИПИНЕНО у
  лютому 2024 р. компанією Gilead — у клінічних дослідженнях
  смертність у групі magrolimab була ВИЩОЮ, ніж у стандартній
  терапії. Препарат недоступний — для пацієнтів з AML / MDS
  призначаються інші схеми (азацитидин + венетоклакс — стандарт).
