typical_dosing: >
  HISTORICAL — for archival / comparator-trial reference only. In
  clinical trials magrolimab was given IV with a priming-dose strategy
  (1 mg/kg priming dose to prevent on-target hemolytic anemia, then
  escalation to 30 mg/kg weekly maintenance) typically combined with
  azacitidine 75 mg/m² SC/IV days 1-7 of 28-day cycles. NEVER
  approved; no labeled dose exists.

formulations:
  - "INVESTIGATIONAL (never marketed): IV infusion, trial supply only — discontinued 2024"

absolute_contraindications:
  - "Hereditary spherocytosis or other chronic hemolytic anemia"
  - "Severe hypersensitivity to magrolimab or any IgG4 mAb component"
  - "Active autoimmune hemolytic anemia"

black_box_warnings: []

common_adverse_events:
  - "On-target hemolytic anemia (CD47 expression on RBCs — managed with priming dose)"
  - "Infusion-related reactions (chills, fever, hypotension)"
  - "Thrombocytopenia, neutropenia (when combined with azacitidine)"
  - "Fatigue"
  - "Nausea"
  - "Constipation, diarrhea"
  - "Pyrexia"
  - "Headache"

serious_adverse_events:
  - "Severe on-target hemolytic anemia"
  - "Treatment-emergent excess mortality observed in ENHANCE-2 (1L TP53-mutant AML) and ENHANCE-3 (1L AML unfit) — primary driver of program discontinuation Feb 2024"
  - "Severe infusion reactions"
  - "Severe cytopenias"

major_interactions:
  - "Routine RBC transfusion / typing complicated by CD47 blockade — coordinate with blood bank for compatibility testing pre-treatment"
  - "Concurrent myelosuppressive chemotherapy — additive cytopenias"

