drug_class: "Anti-CD47 humanized IgG4 monoclonal antibody (innate-immunity / macrophage-checkpoint inhibitor)"
mechanism: >
  Humanized IgG4 monoclonal antibody binding CD47, a "do-not-eat-me"
  signal expressed on tumor cells that engages SIRPα on macrophages to
  inhibit phagocytosis. Blockade of CD47-SIRPα releases macrophages
  to phagocytose tumor cells (innate-immunity macrophage-checkpoint
  inhibition). Synergizes with pro-phagocytic signals from azacitidine
  / chemo-induced calreticulin exposure. Investigated principally in
  AML / MDS (TP53-mutant focus) and DLBCL.

