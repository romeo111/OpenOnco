id: DRUG-MEGESTROL-ACETATE
names:
  preferred: "Megestrol acetate"
  brand: ["Megace", "Megace ES"]
  ukrainian: "Мегестролу ацетат"
drug_class: "Progestin (synthetic progestogen)"
mechanism_of_action: >
  Megestrol acetate is a synthetic progestogen that exerts antitumor effects in
  hormone-responsive cancers via progesterone receptor (PR) binding, inhibiting
  LH secretion and reducing estrogen levels. Also has appetite-stimulating effects
  via central mechanisms (NPY upregulation, glucocorticoid-like activity).
atc_code: "L02AB01"
administration_routes: ["PO"]
standard_dose: "160 mg PO QD (endometrial cancer); 40 mg PO QID (appetite stimulation)"
fda_approvals:
  - "Breast cancer (palliative)"
  - "Endometrial cancer (palliative)"
  - "Anorexia/cachexia in AIDS (appetite stimulation)"
notable_toxicities:
  - "Thromboembolic events (DVT, PE): dose-related risk"
  - "Weight gain, fluid retention, edema"
  - "Adrenal insufficiency (glucocorticoid-like activity at high doses)"
  - "Vaginal bleeding on discontinuation"
  - "Hypertension, hyperglycemia"
ukraine_registration:
  registered: true
  notes: "Megestrol acetate registered in Ukraine for endometrial cancer per NCCN evidence."
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
