id: DRUG-MESNA
names:
  preferred: "Mesna"
  ukrainian: "Mesna"
  english: "Mesna"
  brand_names: ["Mesnex"]
atc_code: V03AF01
rxnorm_id: "689"
drug_class: "Uroprotective thiol cytoprotectant"
mechanism: >
  Thiol compound that binds and detoxifies urotoxic ifosfamide metabolites
  in urine, reducing the risk of hemorrhagic cystitis. It is supportive care,
  not an antineoplastic treatment-selection signal.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 1988
  ema:
    approved: true
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: null
    notes: "Local registration and formulary status require verification."
typical_dosing: >
  With ifosfamide: commonly administered as a total daily mesna dose
  proportional to the ifosfamide dose, using IV and/or oral divided dosing
  according to institutional protocol. Maintain hydration and urine monitoring.
formulations:
  - "IV solution"
  - "Oral tablets"
absolute_contraindications:
  - "Hypersensitivity to mesna or thiol compounds"
common_adverse_events:
  - "Nausea"
  - "Headache"
  - "Flushing"
  - "Rash"
serious_adverse_events:
  - "Hypersensitivity reactions"
  - "Severe dermatologic reactions"
major_interactions: []
sources:
  - SRC-NCCN-STS-2025
  - SRC-ESMO-SARCOMA-2024
last_reviewed: "2026-05-07"
reviewers: []
notes: >
  Thin support-drug entity added to resolve ifosfamide-containing regimen
  component references. Regimen-specific mesna schedules remain authored on
  the regimen.

