id: DRUG-MESNA
names:
  preferred: "Mesna"
  brand: ["Mesnex", "Uromitexan"]
  ukrainian: "Месна"
drug_class: "Uroprotective agent (thiol compound)"
mechanism_of_action: >
  Mesna (sodium 2-mercaptoethane sulfonate) is a thiol compound that reacts with
  acrolein (the toxic metabolite of ifosfamide and cyclophosphamide) in the urine,
  preventing hemorrhagic cystitis.
atc_code: "V03AF01"
administration_routes: ["IV", "PO"]
standard_dose: "Dose = 60% of ifosfamide dose (given at 0, 4, 8 hours post-ifosfamide)"
primary_indications:
  - "Hemorrhagic cystitis prophylaxis with ifosfamide"
  - "Hemorrhagic cystitis prophylaxis with high-dose cyclophosphamide"
notable_toxicities:
  - "Generally well tolerated; occasional nausea, vomiting (at oral doses)"
ukraine_registration:
  registered: true
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
