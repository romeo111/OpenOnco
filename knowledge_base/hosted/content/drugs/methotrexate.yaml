id: DRUG-METHOTREXATE
names:
  preferred: "Methotrexate"
  ukrainian: "Метотрексат"
  english: "Methotrexate"
  brand_names: ["Trexall", "Otrexup", "Rasuvo"]
atc_code: L01BA01
rxnorm_id: "6851"
drug_class: "Antifolate antimetabolite (DHFR inhibitor)"
mechanism: "Competitively inhibits dihydrofolate reductase → depletes reduced folates → impaired thymidine + purine biosynthesis → S-phase arrest + apoptosis. HD-MTX crosses BBB at concentrations sufficient for CNS prophylaxis/treatment."

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration: {registered: true, reimbursed_nszu: true, last_verified: "2026-04-25"}

typical_dosing: >
  HD-MTX (CNS prophylaxis intercalated with R-CHOP): 3-3.5 g/m² IV over 2-4 hours. Burkitt CODOX-M: 3 g/m² day 10. PCNSL: 3-8 g/m². Intrathecal: 12-15 mg per dose. Leucovorin rescue starting 24h post HD-MTX.
formulations: ["IV/IM/SC injection 25 mg/mL", "Tablets 2.5 mg", "Intrathecal preparation preservative-free"]

absolute_contraindications:
  - "Severe renal impairment (CrCl <30) for HD-MTX"
  - "Significant pleural effusion or ascites (3rd-space fluid prolongs MTX clearance → lethal)"
  - "Pregnancy / lactation"
  - "Hypersensitivity"
black_box_warnings:
  - "Severe MTX toxicity if NOT given with leucovorin rescue at HD"
  - "Acute renal failure with HD-MTX (mandate aggressive hydration + urinary alkalinization)"
  - "Bone marrow suppression (severe at HD if rescue inadequate)"
  - "Hepatotoxicity (cumulative)"
  - "Severe pulmonary toxicity"
major_interactions:
  - "NSAIDs / proton pump inhibitors / penicillin derivatives: reduce MTX clearance → toxicity"
  - "Trimethoprim-sulfamethoxazole: additive antifolate toxicity"
  - "Probenecid: reduces MTX excretion"
common_adverse_events: ["Mucositis", "Myelosuppression", "Transaminitis", "Nausea", "Fatigue"]
serious_adverse_events: ["Acute renal failure", "Severe mucositis", "Pneumonitis", "Stroke-like syndrome (HD-MTX, transient)"]

pharmacology: {half_life: "Triphasic; ~3 hours alpha, longer at HD"}
sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  HD-MTX requires: aggressive IV hydration (3 L/m²/day), urinary
  alkalinization (target urine pH ≥7), serial MTX levels q24h until <0.1
  µM, leucovorin rescue (15 mg/m² q6h adjusted to MTX level), avoidance
  of pleural/ascites fluid (drain if present) and concomitant NSAIDs/PPIs.
  Glucarpidase (carboxypeptidase) is rescue for delayed clearance / AKI.
