id: DRUG-METHOTREXATE
names:
  preferred: "Methotrexate"
  ukrainian: "Метотрексат"
  english: "Methotrexate"
  brand_names: ["Trexall", "Otrexup"]
atc_code: L01BA01
rxnorm_id: null
drug_class: "Antimetabolite (dihydrofolate reductase inhibitor)"
mechanism: >
  Folate analog — competitively inhibits dihydrofolate reductase, depleting reduced folate cofactors needed for DNA/RNA synthesis. Multi-disease use; in breast: CMF regimen historical, intrathecal for leptomeningeal disease.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: null
    notes: "Generic; reimbursed."

typical_dosing: >
  CMF regimen: 40 mg/m² IV days 1, 8 of 28-day cycle. Intrathecal: 12-15 mg per dose. High-dose (PCNSL): see PCNSL-specific dosing.

key_toxicities:
  - Mucositis
  - Myelosuppression
  - Hepatotoxicity
  - Nephrotoxicity (high-dose only — leucovorin rescue + alkalinization)
  - Pneumonitis (rare)
  - Avoid in pleural effusion / ascites (third-spacing)

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed: null
notes: >
  Largely supplanted by anthracycline + taxane in modern adjuvant breast — CMF regimen now reserved for very specific cardiac-contraindication scenarios. Intrathecal use for breast leptomeningeal carcinomatosis remains active.
