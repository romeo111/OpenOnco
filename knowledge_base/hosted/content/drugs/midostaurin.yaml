id: DRUG-MIDOSTAURIN
names:
  preferred: "Midostaurin"
  ukrainian: "Мідостаурин"
  english: "Midostaurin"
  brand_names: ["Rydapt"]
atc_code: L01EX10
rxnorm_id: "1882167"
drug_class: "Multi-kinase inhibitor (FLT3, KIT, PDGFR, VEGFR, PKC)"
mechanism: >
  Multi-targeted TKI; clinically used for FLT3-ITD/TKD AML (added to 7+3
  induction + HiDAC consolidation) and advanced systemic mastocytosis
  (KIT D816V).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-27"

    reimbursement_indications:
    - 'Програма медичних гарантій 2026: ГМЛ FLT3-mut (ITD або TKD) 1L з 7+3 індукцією та консолідацією (RATIFY)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: системний мастоцитоз агресивний/SM-AHN/мастоцитарний лейкоз'
    notes: 'Зареєстрований; НСЗУ покриває FLT3-mut ГМЛ 1L з 7+3 індукцією. Джерело: nszu.gov.ua (2026-04).'
typical_dosing: >
  AML FLT3+: 50 mg PO BID days 8-21 of each induction + consolidation cycle,
  then maintenance 50 mg BID for 12 cycles (RATIFY protocol). Take with
  food.
formulations: ["Capsules 25 mg"]

absolute_contraindications:
- "Hypersensitivity to midostaurin"
- "Concomitant strong CYP3A4 inducers"
- "Pregnancy"
black_box_warnings: []
major_interactions:
- "Strong CYP3A4 inhibitors (azoles, ritonavir): increase exposure — caution"
- "Strong CYP3A4 inducers (rifampin): reduce exposure — contraindicated"
common_adverse_events:
- "Nausea/vomiting (often dose-limiting)"
- "Mucositis"
- "Diarrhea"
- "QT prolongation"
- "Pulmonary symptoms (cough, dyspnea)"
serious_adverse_events:
- "Pulmonary toxicity"
- "QT prolongation → arrhythmia"
- "Severe nausea/vomiting requiring discontinuation"

pharmacology: {half_life: "~21 hours; major CYP3A4 substrate"}

sources:
- SRC-NCCN-AML-2025
- SRC-RATIFY-STONE-2017

last_reviewed: "2026-04-25"
notes: >
  Standard FLT3-ITD/TKD AML 1L (RATIFY trial: improved OS vs placebo when
  added to 7+3 + HiDAC). Take with food to maximize bioavailability.
  Antiemetic prophylaxis essential. Not Ukraine-reimbursed — major access
  constraint; gilteritinib (single-agent r/r) and quizartinib also FLT3-active.
