id: DRUG-MITOMYCIN-C
names:
  preferred: "Mitomycin C"
  ukrainian: "Mitomycin C"
  english: "Mitomycin C"
  synonyms: ["Mitomycin"]
drug_class: "Bioreductive alkylating antitumor antibiotic"
mechanism: >
  Antitumor antibiotic that is enzymatically activated to alkylating species
  capable of DNA crosslinking. Used as the mitomycin component of definitive
  chemoradiation for anal squamous cell carcinoma.
regulatory_status:
  fda:
    approved: true
  ema:
    approved: true
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: null
    notes: "Not registered in Ukraine — access via named-patient import or cross-border procurement."
typical_dosing: >
  Anal SCC chemoradiation commonly uses mitomycin 10-12 mg/m2 IV on day 1
  and day 29 with fluoropyrimidine-based radiation sensitization. Dose and
  omission rules are regimen-specific.
formulations:
  - "IV powder for solution"
absolute_contraindications:
  - "Severe hypersensitivity to mitomycin"
  - "Severe myelosuppression"
black_box_warnings:
  - "Bone marrow suppression"
  - "Hemolytic uremic syndrome"
common_adverse_events:
  - "Myelosuppression"
  - "Mucositis"
  - "Nausea"
  - "Fatigue"
serious_adverse_events:
  - "Prolonged cytopenias"
  - "Hemolytic uremic syndrome"
  - "Pulmonary toxicity"
major_interactions:
  - "Concurrent radiation and other myelosuppressive therapy increase toxicity"
sources:
  - SRC-NCCN-ANAL-2025
  - SRC-ACT2-JAMES-2013
last_reviewed: "2026-05-07"
reviewers: []
notes: >
  Thin drug entity added to resolve REG-NIGRO-MMC-5FU-RT component
  references. Detailed drug-label metadata should be expanded in the anal SCC
  curation pass.

