id: DRUG-MOGAMULIZUMAB
names:
  preferred: "Mogamulizumab"
  ukrainian: "Могамулізумаб"
  english: "Mogamulizumab"
  brand_names: ["Poteligeo"]
atc_code: L01FX09
rxnorm_id: "2055803"
drug_class: "Defucosylated humanized anti-CCR4 monoclonal antibody (enhanced ADCC)"
mechanism: >
  Defucosylated IgG1 against CCR4 — receptor expressed on Th2 / Treg
  cells and on malignant T-cells in MF/Sézary, ATLL. Defucosylation
  enhances ADCC ~100-fold via FcγRIIIa engagement → potent depletion
  of CCR4+ cells. Highest activity in Sézary syndrome (blood
  compartment) where CCR4 expression is most uniform.

regulatory_status:
  fda: {approved: true, first_approval_year: 2018}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      Anti-CCR4 mAb для r/r MF/Sézary; не входить до НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP Kyowa Kirin (через EU локального дистрибʼютора —
        немає UA офісу; складніше organize).
      - Cross-border (EU): EU CTCL-центри (Charité, Berlin; Salford)
        через "Лікування за кордоном" (наказ МОЗ 988).
      - Trial-only: MAVORIC post-marketing.
      Source: drlz.com.ua пошук "mogamulizumab"/"poteligeo" 2026-04-27 — РП відсутнє.

typical_dosing: >
  MF/Sézary: 1.0 mg/kg IV over ≥1 hour weekly × 5 (induction), then
  every 2 weeks until progression or unacceptable toxicity.
formulations: ["IV infusion 4 mg/mL (single-dose 20 mg vials)"]

absolute_contraindications:
  - "History of severe drug rash / SJS/TEN"
  - "Active allogeneic stem cell transplant graft"
black_box_warnings:
  - "Severe skin reactions (including SJS/TEN)"
  - "Increased risk of Grade 3-4 GVHD if allo-SCT planned downstream — discuss with transplant team"
major_interactions: []
common_adverse_events:
  - "Drug rash (very common ~25% — interrupt if severe)"
  - "Infusion reactions (especially first dose)"
  - "Fatigue"
  - "Diarrhea"
  - "Upper respiratory infection"
serious_adverse_events:
  - "Severe skin reactions (SJS/TEN)"
  - "Tumor lysis syndrome (high blood tumor burden — Sézary)"
  - "Autoimmune complications (depletion of Treg)"
  - "Infections (CMV reactivation, PJP)"

pharmacology: {half_life: "~17 days; saturation kinetics on CCR4"}
sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  MAVORIC trial (Kim 2018): mogamulizumab vs vorinostat in r/r MF/Sézary
  — superior PFS especially in Sézary syndrome (blood compartment
  response). 1L use in advanced MF/Sézary emerging (NCCN). Ukraine:
  NOT registered → import-only with МОЗ exception or clinical-trial
  enrollment. Mandatory dermatology partnership for skin AE management.
