id: DRUG-MOSUNETUZUMAB
names:
  preferred: "Mosunetuzumab"
  ukrainian: "Мосунетузумаб"
  english: "Mosunetuzumab"
  brand_names: ["Lunsumio"]
atc_code: L01FX25
rxnorm_id: "2627015"
drug_class: "CD20×CD3 bispecific T-cell engager (full-length humanized IgG1)"
mechanism: >
  Bispecific antibody binding CD20 on B-cells and CD3 on T-cells,
  forming an immune synapse that redirects polyclonal T-cell
  cytotoxicity against CD20+ B-cells. Step-up dosing schedule (1 mg
  → 2 mg → 60 mg → 30 mg) mitigates first-cycle CRS by limiting
  initial T-cell activation. Time-limited (8 cycles or until CR).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      Біспецифічна CD20×CD3 терапія для r/r FL (≥2 ліній);
      не входить до пакетів НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP Roche Ukraine (Genentech compassionate program — потребує
        документації failure ≥2 anti-CD20-вмісних режимів).
      - Cross-border (EU): EU гематоцентри за пакетом "Лікування
        за кордоном" (наказ МОЗ 988).
      - Trial-only: GO-серія + post-marketing studies в EU.
      Source: drlz.com.ua пошук "mosunetuzumab"/"lunsumio" 2026-04-27 — РП відсутнє.

typical_dosing: >
  Cycle 1: 1 mg IV day 1, 2 mg IV day 8, 60 mg IV day 15.
  Cycle 2: 60 mg IV day 1.
  Cycles 3-8: 30 mg IV day 1 of each 21-day cycle (total ≤8 cycles
  with extension to 17 cycles if not in CR by cycle 8).
formulations: ["IV solution 1 mg/1 mL and 30 mg/30 mL vials"]

absolute_contraindications: ["Severe hypersensitivity to mosunetuzumab"]
black_box_warnings: []
major_interactions:
  - "Live vaccines: avoid during therapy + 6+ months post"
  - "Strong immunosuppressants concomitantly: caution (efficacy / infection balance)"
common_adverse_events:
  - "CRS (~44% any grade, predominantly cycle 1 step-up; Grade ≥3 ~2%)"
  - "Neutropenia"
  - "Pyrexia"
  - "Fatigue"
  - "Hypophosphatemia"
  - "Headache"
serious_adverse_events:
  - "Severe CRS (Grade ≥3 ~2%)"
  - "Tumor flare / TLS in high-burden disease"
  - "Severe infection (incl. opportunistic)"
  - "ICANS-like neurotoxicity (rare; lower than CAR-T)"
  - "Hepatotoxicity (rare)"

pharmacology:
  half_life: "~16 days"
  route: "IV"

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  GO29781 pivotal trial (Budde 2022): r/r FL after ≥2 prior lines
  including anti-CD20 + alkylator — ORR 80%, CR 60%, median DOR
  ~22.8 mo. Time-limited (max 17 cycles) — distinct from continuous
  BTKi paradigm. Ambulatory administration feasible after first
  cycle; hospital observation usually required for cycle 1 step-up
  doses. Major UA access barrier: not registered.

notes_ua: >
  Мосунетузумаб (mosunetuzumab) — біспецифічне антитіло, спрямоване
  на CD20 на B-клітинах і CD3 на T-клітинах: формує імунний синапс,
  що перенаправляє поліклональну T-клітинну цитотоксичність проти
  CD20+ B-клітин. Схема step-up дозування (1 мг → 2 мг → 60 мг →
  30 мг) пом'якшує CRS першого циклу за рахунок обмеження початкової
  T-клітинної активації. Тривалість обмежена (8 циклів або до повної
  відповіді, з можливістю продовження до 17 циклів). Реєстраційне
  дослідження GO29781 (Budde, 2022): пацієнти з рецидивною/
  рефрактерною FL після ≥2 ліній, включно з анти-CD20 + алкілуючим
  агентом — ORR 80%, CR 60%, медіана тривалості відповіді ~22.8 міс.
  Принципово відрізняється від парадигми безперервної BTKi-терапії.
  Амбулаторне введення можливе після першого циклу; стаціонарне
  спостереження зазвичай потрібне для доз step-up першого циклу.
  Основний бар'єр доступу в Україні — препарат не зареєстрований.

