id: DRUG-NAB-PACLITAXEL
names:
  preferred: "Nab-paclitaxel"
  ukrainian: "Наб-паклітаксел"
  english: "Nab-paclitaxel (albumin-bound paclitaxel)"
  brand_names: ["Abraxane"]
atc_code: L01CD01
rxnorm_id: "1101771"
drug_class: "Taxane (albumin-bound nanoparticle formulation)"
mechanism: >
  Microtubule stabilizer; albumin-bound formulation eliminates
  Cremophor-EL solvent (no premedication for hypersensitivity needed).
  Backbone of gem-nab-pac PDAC regimen (MPACT trial).
regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration: {registered: true, reimbursed_nszu: false, last_verified: "2026-04-26", notes: "out-of-pocket; selective NSZU coverage"}
typical_dosing: >
  PDAC gem-nab-pac: 125 mg/m² IV days 1, 8, 15 of 28-d cycle.
formulations: ["IV powder 100 mg vial"]
absolute_contraindications: ["Pre-existing severe peripheral neuropathy", "Severe baseline ANC <1.5", "Pregnancy"]
common_adverse_events: ["Peripheral neuropathy", "Fatigue", "Alopecia", "Myelosuppression", "Diarrhea", "Nausea"]
serious_adverse_events: ["Severe neutropenia / sepsis", "Severe peripheral neuropathy", "Pneumonitis (rare)"]
sources: [SRC-NCCN-PANCREATIC-2025]
last_reviewed: "2026-04-26"
notes: >
  STUB — Phase GI-1. No corticosteroid premedication required (vs
  cremophor paclitaxel). Day-15 dose held for ANC <1.0 / Plt <75. PDAC
  PS 0-1 + bilirubin <2× ULN eligibility.
