id: DRUG-NAL-IRI
names:
  preferred: "Nanoliposomal irinotecan"
  ukrainian: "Nanoliposomal irinotecan"
  english: "Nanoliposomal irinotecan"
  synonyms: ["Irinotecan liposome", "nal-IRI", "pegylated liposomal irinotecan"]
  brand_names: ["Onivyde"]
atc_code: L01CE02
drug_class: "Liposomal topoisomerase I inhibitor"
mechanism: >
  Liposomal irinotecan formulation that delivers irinotecan, a prodrug
  converted to SN-38, which inhibits topoisomerase I and causes replication-
  associated DNA damage.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 2015
  ema:
    approved: true
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: null
    notes: "Regimen notes currently flag major Ukraine access barriers."
typical_dosing: >
  Post-gemcitabine metastatic pancreatic adenocarcinoma: 70 mg/m2 free base
  IV over 90 minutes every 2 weeks with leucovorin and 46-hour infusional
  fluorouracil. Dose adjust for toxicity and relevant pharmacogenomic risk.
formulations:
  - "Liposomal IV injection"
black_box_warnings:
  - "Severe neutropenia"
  - "Severe diarrhea"
common_adverse_events:
  - "Diarrhea"
  - "Neutropenia"
  - "Vomiting"
  - "Fatigue"
  - "Nausea"
serious_adverse_events:
  - "Febrile neutropenia"
  - "Severe diarrhea and dehydration"
  - "Sepsis"
major_interactions:
  - "Strong CYP3A4 or UGT1A1 inhibitors may increase irinotecan/SN-38 exposure"
  - "Strong CYP3A4 inducers may reduce exposure"
sources:
  - SRC-NCCN-PANCREATIC-2025
  - SRC-ESMO-PANCREATIC-2024
  - SRC-NAPOLI1-WANG-GILLAM-2016
last_reviewed: "2026-05-07"
reviewers: []
notes: >
  Thin drug entity added to resolve REG-NAL-IRI-5FU-LV-PDAC component
  references. Do not treat as interchangeable with conventional irinotecan.

