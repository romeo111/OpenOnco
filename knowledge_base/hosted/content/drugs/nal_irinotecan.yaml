id: DRUG-NAL-IRI
name: "Nanoliposomal irinotecan (nal-IRI)"
brand_names: ["ONIVYDE"]
generic_names: ["nanoliposomal irinotecan", "liposomal irinotecan", "nal-IRI", "MM-398"]
drug_class: "Topoisomerase I inhibitor (liposomal formulation)"
mechanism: >
  Irinotecan encapsulated in lipid bilayer nanoparticles, providing sustained intratumoral
  drug release. Irinotecan and active metabolite SN-38 inhibit topoisomerase I, preventing
  religation of DNA strand breaks, leading to replication fork collapse and cell death.
  Liposomal formulation prolongs tumor exposure vs conventional irinotecan.
route: IV
standard_doses:
  - indication: "PDAC 2L (NAPOLI-1): nal-IRI + 5-FU/LV"
    dose: "70 mg/m² (free base; = 80 mg/m² irinotecan HCl) IV over 90 min Q14D"
  - indication: "PDAC 1L NALIRIFOX (NAPOLI-3)"
    dose: "50 mg/m² (free base; = 57.5 mg/m² irinotecan HCl) IV over 90 min Q14D"
approved_indications:
  - "Metastatic pancreatic ductal adenocarcinoma (PDAC) in combination with 5-FU/LV after gemcitabine-based therapy (FDA Oct 2015)"
  - "PDAC 1L in combination with oxaliplatin, 5-FU, and leucovorin (NALIRIFOX; FDA Jan 2024)"
fda_approval_date: "2015-10-22"
ua_registration_status: "Not registered in Ukraine (significant access barrier)"
key_toxicities:
  - "Diarrhea (late-onset, Grade 3-4 ~13-20%): loperamide; can be severe/life-threatening"
  - "Neutropenia (Grade 3-4 ~27%): G-CSF per protocol"
  - "Fatigue (Grade 3-4 ~14%)"
  - "Nausea/vomiting: moderate emetogenic; 5-HT3 + dexamethasone"
  - "Acute cholinergic syndrome (within 30 min): atropine premedication"
  - "Alopecia: common"
pharmacokinetics:
  - "Prolonged tumor retention vs conventional irinotecan"
  - "UGT1A1 genotype affects SN-38 metabolism: UGT1A1*28/*28 (TA7 allele) → reduce dose"
drug_interactions:
  - "Strong CYP3A4 inhibitors → increase irinotecan/SN-38 exposure — avoid or dose-reduce"
  - "Strong CYP3A4 inducers → decrease efficacy — avoid"
  - "UGT1A1 inhibitors (gemfibrozil, atazanavir) → increase SN-38 toxicity"
contraindications:
  - "Total bilirubin >2× ULN (impaired hepatic conjugation of SN-38)"
  - "Severe diarrhea at baseline"
monitoring:
  - "CBC before each cycle; hold if ANC <1500/mm³ or platelets <100K/mm³"
  - "LFTs + bilirubin before each cycle (hepatic SN-38 metabolism)"
  - "UGT1A1 genotyping before starting if available"
  - "Patient diarrhea diary; early loperamide for late diarrhea"
important_notes:
  - "NOT interchangeable with conventional irinotecan — different formulation, dosing, PK"
  - "ONIVYDE is not registered in Ukraine; requires named-patient import"
  - "NALIRIFOX 1L dose (50 mg/m² free base) differs from 2L NAPOLI-1 dose (70 mg/m² free base)"

sources:
  - SRC-NCCN-PANCREATIC-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
