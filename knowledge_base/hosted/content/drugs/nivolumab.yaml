id: DRUG-NIVOLUMAB
names:
  preferred: "Nivolumab"
  ukrainian: "Ніволумаб"
  english: "Nivolumab"
  brand_names: ["Opdivo"]
atc_code: L01FF01
rxnorm_id: "1597876"
drug_class: "Anti-PD-1 fully human monoclonal antibody (ICI)"
mechanism: >
  Blocks PD-1; analog mechanism to pembrolizumab. Adjuvant esophageal
  (CheckMate-577 — post-CROSS without pCR), 1L gastric/GEJ/esophageal
  with chemo (CheckMate-649), HCC 2L+ (CheckMate-040, accelerated).
regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration: {registered: true, reimbursed_nszu: false, last_verified: "2026-04-26"}
typical_dosing: "240 mg IV q2w OR 480 mg IV q4w; combination with ipilimumab uses 1 mg/kg + 3 mg/kg q3w × 4 then mono."
formulations: ["IV solution 10 mg/mL"]
absolute_contraindications:
  - "Active autoimmune disease on systemic immunosuppression"
  - "Solid organ transplant"
  - "Pregnancy"
black_box_warnings: ["Same irAE spectrum as pembrolizumab"]
common_adverse_events: ["Fatigue", "Pruritus", "Mild diarrhea", "Hypothyroidism", "Hyperthyroidism"]
serious_adverse_events: ["Pneumonitis", "Hepatitis", "Colitis", "Adrenal crisis", "Myocarditis (rare, fatal)"]
sources: [SRC-NCCN-GASTRIC-2025, SRC-NCCN-ESOPHAGEAL-2025, SRC-NCCN-HCC-2025]
last_reviewed: "2026-04-26"
notes: >
  STUB — Phase GI-1. CheckMate-577: adjuvant nivo × 1y in patients with
  residual ypT+ or ypN+ post-CROSS — DFS doubled. Combination with ipi
  amplifies irAE rates (45% Grade 3-4 vs 18% mono).
