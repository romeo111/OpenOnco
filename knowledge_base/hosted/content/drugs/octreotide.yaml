id: DRUG-OCTREOTIDE
names:
  preferred: "Octreotide"
  ukrainian: "Октреотид"
  english: "Octreotide"
  brand_names: ["Sandostatin LAR", "Sandostatin", "Bynfezia Pen"]
atc_code: H01CB02
rxnorm_id: null
drug_class: "Somatostatin analogue (SSA)"
mechanism: >
  Long-acting somatostatin analogue; high affinity for somatostatin receptor
  subtypes SSTR2 and SSTR5 (SSTR2 > SSTR5 >> SSTR1/3/4). Inhibits secretion
  of GH, IGF-1, insulin, glucagon, VIP, gastrin, and serotonin.
  Antiproliferative effect in well-differentiated GEP-NETs via SSTR2-mediated
  cell cycle arrest and apoptosis. Symptom control in functional NETs
  (carcinoid syndrome: flushing, diarrhea) via serotonin and vasoactive
  peptide suppression.
  Long-acting release (LAR) formulation: microsphere depot IM q4w;
  immediate-release (IR) formulation: SC TID available for symptom rescue.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-05-04"
    notes: >
      Sandostatin LAR (октреотид LAR 10/20/30 мг) зареєстровано в Україні
      (Держреєстр ЛЗ). У ряді регіонів октреотид LAR доступніший, ніж
      ланреотид Autogel — нижча ціна, ширша наявність у лікарнях.
      НСЗУ-реімбурсація для GEP-NET не включена до онкопакету 2025.
      Октреотид IR (Sandostatin 0.1/0.5 мг) — доступний у стаціонарі
      для карциноїдного кризу.

typical_dosing: >
  LAR (antiproliferative): Octreotide LAR 30 mg IM deep gluteal q28 days.
  Administered by healthcare professional. Administer to gluteal muscle,
  alternating sides. Shake vial vigorously before withdrawal.
  IR (rescue / carcinoid crisis): octreotide 100–500 µg SC q8h or IV infusion
  for acute symptom management or perioperative coverage.

key_toxicities:
  - Injection site reactions (pain, mass — more common with IM vs SC lanreotide)
  - Diarrhea / loose stools (transient; improves over 2-4 weeks)
  - Nausea
  - Cholelithiasis (~15-20% with long-term use — asymptomatic gallstones)
  - Bradycardia (mild)
  - Hyperglycemia or hypoglycemia (modulates insulin/glucagon)
  - Hypothyroidism (rare, long-term)
  - Vitamin B12 deficiency (long-term; monitor annually)

sources:
  - SRC-NCCN-NET-2025
last_reviewed: "2026-05-04"
notes: >
  PROMID (Rinke JCO 2009): octreotide LAR 30 mg q4w vs placebo in
  midgut well-differentiated NET (n=85). Time to tumour progression:
  14.3 vs 6.0 months (HR 0.34; p=0.000072). Established SSA
  antiproliferative class effect. Both octreotide LAR and lanreotide
  are NCCN Category 1 for GI-NET G1/G2. No head-to-head trial;
  choice by institutional/country availability and patient preference.
  Octreotide IR is the standard perioperative agent for carcinoid crisis
  prevention even in patients maintained on LAR formulations.
