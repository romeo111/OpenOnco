notes: >
  Olutasidenib (Rezlidhia, Rigel Pharmaceuticals) is the second
  FDA-approved IDH1-mutant inhibitor (after ivosidenib / Tibsovo,
  Servier 2018). Both target IDH1-R132 mutations in R/R AML; key
  differences: (1) olutasidenib pivotal data were in R/R AML mono
  (Cohort R/R, n=153, ORR/CR/CRh 35%); ivosidenib has both R/R AML
  mono approval AND newly-diagnosed AML approval (combined with
  azacitidine, AGILE trial). (2) Olutasidenib has a less prominent
  QTc-prolongation signal than ivosidenib but a more prominent
  transaminitis signal. (3) Differentiation syndrome boxed warning
  applies to BOTH agents (class IDH-inhibitor effect — analogous
  to ATRA-DS in APL). (4) Cross-resistance: switching from
  ivosidenib → olutasidenib at progression CAN restore response in a
  subset (Watts Blood 2024) — suggests IDH1-R132 second-site
  resistance mutations may differ between agents. NCCN-AML 2025
  lists olutasidenib as a category 2A option for IDH1-mut R/R AML
  (alongside ivosidenib). EMA has NOT approved olutasidenib (as of
  2026-04-29) — in EU, ivosidenib is the IDH1-mut R/R AML standard.
  Companion diagnostic: Abbott RealTime IDH1 Assay (FDA-cleared);
  NGS panels (FoundationOne Heme, MyAML, OncoMap) detecting IDH1
  R132 are clinically interchangeable. CHARTER §2 / SRC-CIVIC for
  IDH1 actionability rendering. Missing source IDs to flag:
  SRC-2102-HEM-101 (pivotal Phase II Cortes 2024), SRC-FDA-REZLIDHIA,
  SRC-AGILE (ivosidenib comparator) not yet authored.
notes_patient: >
  Таргетна таблетка для гострої мієлоїдної лейкемії (AML) із
  мутацією у гені IDH1 — призначається при рецидиві / резистентності
  до попередньої терапії. Найсерйозніша побічна дія — синдром
  диференціації (DS): задишка, лихоманка, набряки, біль у кістках,
  зміни на рентгені легень — потребує НЕГАЙНОГО початку дексаметазону
  ще до підтвердження діагнозу. Інші типові ефекти — нудота, втома,
  біль у суглобах, підвищення печінкових проб. Прийом строго
  натщесерце (їжа значно збільшує концентрацію в крові).
