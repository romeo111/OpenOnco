id: DRUG-OLUTASIDENIB
names:
  preferred: "Olutasidenib"
  ukrainian: "Олутасиденіб"
  english: "Olutasidenib"
  brand_names: ["Rezlidhia"]
atc_code: L01XX
rxnorm_id: null
drug_class: "Selective oral mutant IDH1 (R132) inhibitor"
mechanism: >
  Oral, potent, selective small-molecule inhibitor of mutant
  isocitrate dehydrogenase 1 (IDH1) bearing R132 substitutions
  (R132H, R132C, R132G, R132S, R132L). Binds an allosteric site on
  the mutant IDH1 dimer, blocking the neomorphic conversion of
  α-ketoglutarate to (R)-2-hydroxyglutarate (2-HG) — the oncometabolite
  that drives DNA + histone hypermethylation and arrests myeloid
  differentiation. 2-HG suppression restores myeloid differentiation
  in IDH1-mutant AML blasts (induces phenotypic conversion of blasts
  to functional neutrophils — analogous to ivosidenib mechanism, but
  with less potential for QTc prolongation in the head-to-head
  pharmacology profile). Pivotal Study 2102-HEM-101 (Cortes Blood
  2024) Phase II Cohort R/R AML (n=153, IDH1-R132 mutant
  relapsed/refractory AML) showed CR+CRh 35%, CR 32%, mDOR 25.9 mo,
  median time to CR/CRh 1.9 mo, transfusion independence 56-fold
  among CR/CRh responders → FDA accelerated approval Dec 1, 2022.

