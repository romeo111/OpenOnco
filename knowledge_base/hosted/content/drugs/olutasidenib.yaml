      — РП відсутнє.

typical_dosing: >
  150 mg PO twice daily (every 12 hours) on an empty stomach (≥1 h
  before or ≥2 h after food) — high-fat meals significantly increase
  exposure. Continue until disease progression, transplant,
  unacceptable toxicity, or up to 2 years of treatment for responders
  with sustained CR. Monitor for differentiation syndrome (DS,
  formerly "IDH-DS") starting from week 1 — signs: pulmonary
  infiltrates, dyspnea, hypoxia, pleural / pericardial effusion,
  unexplained fever, bone pain, peripheral edema, hyperleukocytosis,
  hypotension, renal dysfunction. Treat suspected DS empirically
  with dexamethasone 10 mg IV q12h + supportive care; do NOT delay
  steroids while awaiting confirmation. Monitor LFTs (transaminitis
  is common — frequent during induction). Dose modifications: 150 mg
  daily → permanent discontinuation for grade ≥3 hepatotoxicity or
  intolerable DS.

formulations:
  - "Capsules 150 mg"

absolute_contraindications:
  - "Severe hypersensitivity to olutasidenib"
  - "Pregnancy (embryo-fetal toxicity per animal data)"

black_box_warnings:
  - "Differentiation Syndrome (BOXED WARNING): potentially fatal; can occur as early as 1 day and up to 18+ months after start. Symptoms: dyspnea, fever, lung infiltrates, hypoxia, pleural / pericardial effusion, bone pain, edema, hyperleukocytosis, hypotension, renal dysfunction. Treat empirically with dexamethasone + hemodynamic support; hold olutasidenib for severe cases until DS resolves."

common_adverse_events:
  - "Nausea, vomiting"
  - "Fatigue / asthenia"
  - "Arthralgia, myalgia"
  - "Constipation, diarrhea"
  - "Increased AST / ALT (transaminitis — typically reversible)"
  - "Decreased appetite"
  - "Headache"
  - "Dyspnea"
  - "Pyrexia"
  - "Cough"
  - "Mucositis"
  - "Rash"
  - "Edema"

serious_adverse_events:
  - "Differentiation Syndrome (BOXED WARNING — potentially fatal)"
  - "Severe hepatotoxicity (transaminitis, hyperbilirubinemia — including grade ≥3)"
  - "QTc prolongation (less prominent than ivosidenib but monitored)"
  - "Embryo-fetal toxicity"
  - "Severe hyperleukocytosis (component of DS)"

major_interactions:
  - "Strong CYP3A4 inhibitors (itraconazole, ritonavir, clarithromycin) — increased olutasidenib exposure; avoid"
  - "Strong CYP3A4 inducers (rifampin, phenytoin, carbamazepine, St John's wort) — significantly reduced exposure; avoid"
  - "QT-prolonging drugs (azoles, fluoroquinolones, antiemetics) — additive QTc risk; ECG monitoring"
  - "Hormonal contraceptives — efficacy may be reduced via CYP3A4 induction (use barrier method)"
  - "Concurrent hepatotoxic agents — additive transaminitis risk"

