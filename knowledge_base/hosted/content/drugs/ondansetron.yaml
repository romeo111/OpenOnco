  english: "Ondansetron"
  brand_names: ["Zofran"]
atc_code: A04AA01
rxnorm_id: "26225"
drug_class: "5-HT3 receptor antagonist (antiemetic)"
mechanism: "Selective 5-HT3 receptor antagonist; blocks vagal stimulation of vomiting reflex."

