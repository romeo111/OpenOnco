last_reviewed: "2026-04-25"
notes: "Standard antiemetic premedication for moderately/highly emetogenic chemotherapy (e.g., bendamustine)."

notes_ua: >
  Ондансетрон (ondansetron) — селективний антагоніст 5-HT3-рецепторів,
  блокує вагусну стимуляцію блювотного рефлексу. Стандартна
  антиеметична премедикація при хіміотерапії середнього та високого
  еметогенного потенціалу (наприклад, бендамустин). Часто
  застосовують у комбінації з дексаметазоном та (при високій
  еметогенності) з NK1-антагоністом.

