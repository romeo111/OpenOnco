  - "IV solution 2 mg/mL"

absolute_contraindications:
  - "Concurrent apomorphine (severe hypotension)"
  - "Congenital long QT syndrome"
common_adverse_events:
  - "Headache"
  - "Constipation"
  - "QT prolongation"
serious_adverse_events:
  - "Torsades de pointes (high doses, IV)"
