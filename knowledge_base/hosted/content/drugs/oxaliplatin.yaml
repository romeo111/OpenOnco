id: DRUG-OXALIPLATIN
names:
  preferred: "Oxaliplatin"
  ukrainian: "Оксаліплатин"
  english: "Oxaliplatin"
  brand_names: ["Eloxatin"]
atc_code: L01XA03
rxnorm_id: "32592"
drug_class: "Platinum alkylating agent (third-generation; DACH-platinum)"
mechanism: >
  Forms platinum-DNA adducts (intra- and inter-strand cross-links).
  Cumulative dose-dependent peripheral sensory neuropathy is the
  signature toxicity (acute cold-induced + chronic stocking-glove).
  Backbone of FOLFOX, CAPOX, FOLFIRINOX, FLOT.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-26"

typical_dosing: >
  FOLFOX: 85 mg/m² IV over 2h day 1 every 14d.
  CAPOX: 130 mg/m² IV day 1 every 21d.
  FOLFIRINOX: 85 mg/m² IV day 1 every 14d.
formulations: ["IV powder for reconstitution 50 mg, 100 mg"]

absolute_contraindications:
  - "Hypersensitivity to platinum compounds"
  - "Severe pre-existing peripheral neuropathy (≥ Grade 2)"

common_adverse_events:
  - "Acute cold-induced peripheral neuropathy (resolves over days)"
  - "Chronic cumulative sensory neuropathy (dose-limiting, partial recovery)"
  - "Nausea/vomiting (highly emetogenic)"
  - "Fatigue"
  - "Thrombocytopenia"

serious_adverse_events:
  - "Persistent disabling peripheral neuropathy"
  - "Hypersensitivity reactions (cycle ≥6 risk)"
  - "Pulmonary fibrosis (rare)"
  - "Veno-occlusive liver disease (long-term)"

sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024

last_reviewed: "2026-04-26"
notes: >
  STUB — Phase GI-1. Cumulative dose: stop at Grade 2 functional
  neuropathy (impaired ADL) or after ~1000 mg/m² regardless. Avoid cold
  exposure × 5 days post-dose. IDEA trial: 3 vs 6 months adjuvant in
  stage III colon — for low-risk T1-3 N1, 3 months CAPOX non-inferior
  with substantially less neuropathy.
