id: DRUG-PACLITAXEL
names:
  preferred: "Paclitaxel"
  ukrainian: "Паклітаксель"
  english: "Paclitaxel"
  brand_names: ["Taxol"]
atc_code: L01CD01
rxnorm_id: null
drug_class: "Taxane (microtubule stabilizer)"
mechanism: >
  Promotes microtubule polymerization and stabilizes microtubule
  assembly, blocking mitotic progression and inducing apoptosis.
  Cremophor-EL solubilizer requires pre-medication for hypersensitivity.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: null
    notes: "Generic; reimbursed across solid-tumor and lymphoma indications."

typical_dosing: >
  Breast (weekly): 80 mg/m² IV weekly. Breast (every-3-weeks): 175 mg/m²
  IV q3 weeks. NSCLC, ovarian, gastric: indication-specific. Pre-medication:
  dexamethasone + diphenhydramine + H2 blocker for cremophor hypersensitivity.

key_toxicities:
  - Hypersensitivity reactions (cremophor — severe; pre-medication mandatory)
  - Peripheral neuropathy (sensory, dose-cumulative)
  - Neutropenia (less than docetaxel)
  - Alopecia
  - Myalgia / arthralgia (post-infusion days 2-4)
  - Bradycardia / cardiac arrhythmia (rare)

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-EARLY-2024]
last_reviewed: null
notes: >
  Cross-disease entity. Standard of care in many regimens (weekly
  paclitaxel for breast adjuvant + KEYNOTE-522 phase 1, AC-T sequencing,
  carboplatin + paclitaxel for NSCLC + ovarian + gastric).

  STUB: minimum valid entry. Full clinical content (formulation
  specifics including nab-paclitaxel comparison, indication-specific
