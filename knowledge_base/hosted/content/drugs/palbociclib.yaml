id: DRUG-PALBOCICLIB
names:
  preferred: "Palbociclib"
  ukrainian: "Палбоцикліб"
  english: "Palbociclib"
  brand_names: ["Ibrance"]
atc_code: L01EF01
rxnorm_id:
drug_class: "CDK4/6 inhibitor"
mechanism: >
  Selective inhibitor of cyclin-dependent kinases 4 and 6 — blocks Rb phosphorylation, arresting cells in G1. Combined with endocrine therapy in HR+/HER2- metastatic; modest adjuvant benefit (PALLAS / PENELOPE-B negative).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-27"
    notes: "Зареєстрований; НСЗУ покриває РМЗ HR+/HER2- метастатичний 1L/2L з ET. Адьювант (PALLAS — негативний) — без покриття. Джерело: nszu.gov.ua (2026-04)."

    reimbursement_indications:
    - 'Програма медичних гарантій 2026: РМЗ HR+/HER2- метастатичний 1L з letrozole/іншим AI (PALOMA-2)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: РМЗ HR+/HER2- метастатичний 2L з fulvestrant (PALOMA-3)'
typical_dosing: >
  125 mg PO once daily, days 1-21 of 28-day cycle (3 weeks on, 1 week off). Combined with AI (1L) or fulvestrant (2L+).

key_toxicities:
- Neutropenia (~80% any grade, ~65% G3+) — distinguishing CDK4/6i AE; require absolute neutrophil count monitoring; dose-modify per protocol
- Fatigue
- Anemia
- Stomatitis
- Diarrhea (modest, less than abemaciclib)
- Hepatic enzyme elevations
- Pulmonary embolism (modest excess)

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed:
notes: >
  Workhorse CDK4/6i for HR+/HER2- metastatic 1L (PALOMA-1/2) and 2L (PALOMA-3). PFS benefit clear; OS less consistent vs ribociclib. Adjuvant data negative — not used in early breast.
