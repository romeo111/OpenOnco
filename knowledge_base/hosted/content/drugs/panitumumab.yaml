id: DRUG-PANITUMUMAB
name: "Panitumumab"
name_ua: "Панітумумаб"
brand_names: ["Vectibix"]
drug_class: "Anti-EGFR monoclonal antibody (fully human IgG2)"
atc_code: L01FE02
mechanism_of_action: >
  Fully human monoclonal antibody targeting the extracellular domain of EGFR (epidermal
  growth factor receptor). Competitively inhibits EGF and TGF-alpha ligand binding,
  preventing receptor dimerization, autophosphorylation, and downstream RAS/MAPK/PI3K
  signaling. Unlike cetuximab (chimeric IgG1), panitumumab is a fully human IgG2 antibody
  with reduced infusion-related reaction risk (~4% vs ~20% for cetuximab) and no
  hypersensitivity crossover to cetuximab. Equivalent efficacy to cetuximab for RAS-WT CRC.
standard_doses:
  - indication: "RAS-WT, BRAF-WT metastatic CRC"
    dose: "6 mg/kg IV Q14D"
    schedule: "IV over 60 min (first dose); subsequent doses over 30 min if tolerated"
    notes: "RAS mutation (KRAS/NRAS exons 2-4) is an absolute predictive biomarker of non-response; do NOT use for RAS-mutant CRC. BRAF V600E mutation also associated with lack of single-agent benefit."
  - indication: "Head and neck SCC (off-label)"
    dose: "2.5 mg/kg IV Q2W or 9 mg/kg IV Q3W"
    schedule: "Per protocol; cetuximab preferred per EXTREME regimen labeling"
key_toxicities:
  - "Acneiform rash (papulopustular): 85-90%; correlates with response — grade 2+ rash predicts benefit; doxycycline 100 mg BID prophylaxis recommended"
  - "Hypomagnesemia: common, progressive; monitor and supplement magnesium (occurs with all EGFR antibodies)"
  - "Paronychia (nail toxicity): ~25%; worsens with treatment duration"
  - "Dry skin, mucositis, stomatitis"
  - "Infusion-related reactions: ~4% (lower than cetuximab due to fully human antibody)"
  - "Electrolyte abnormalities: Ca2+, K+ loss often accompanies Mg2+ depletion"
contraindications:
  - "RAS mutation (KRAS or NRAS exons 2, 3, 4): evidence of harm (inferior OS vs chemotherapy alone)"
  - "Right-sided CRC: EGFR antibodies less effective in right-sided tumors (biological differences, primary tumor location)"
biomarker_requirements:
  - "RAS extended panel (KRAS + NRAS exons 2-4): WILD-TYPE required (mutation = contraindication)"
  - "BRAF V600E testing: mutation predicts poor response to anti-EGFR monotherapy (use BEACON triplet for BRAF-mutant)"
  - "HER2 amplification check: anti-EGFR ineffective in HER2-amplified CRC"
special_populations:
  - "Pregnancy: Category X-equivalent — causes fetal harm; adequate contraception required"
  - "Crossover from cetuximab: safe (fully human; no hypersensitivity crossover)"
monitoring:
  - "Magnesium: before each dose; supplement to maintain Mg 0.5-0.7 mmol/L minimum"
  - "Electrolytes (Ca2+, K+): each cycle"
  - "Skin toxicity grading: each visit; withhold for Grade 3-4 rash per dose modification table"
  - "LFTs (mild elevation common)"
sources:
  - SRC-NCCN-CRC-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  FDA approved September 2006 for EGFR-expressing mCRC after prior fluoropyrimidine,
  oxaliplatin, and irinotecan. NCCN CRC 2025: Category 1 for RAS-WT, left-sided mCRC
  as part of FOLFOX+panitumumab or FOLFIRI+panitumumab in 1L and 2L.
  PRIME trial (Douillard 2010 JCO): FOLFOX4+pan vs FOLFOX4 in RAS-WT 1L mCRC;
  mPFS 9.6 vs 8.0 months (HR 0.80), mOS 23.9 vs 19.7 months (HR 0.83).
  NCCN preference for right-sided: bevacizumab-based (anti-EGFR less effective
  in right-sided regardless of RAS status — FIRE-3, PEAK data).
  Equivalent efficacy to cetuximab in RAS-WT CRC; selection based on:
  prior cetuximab use, allergy history, schedule preference.
