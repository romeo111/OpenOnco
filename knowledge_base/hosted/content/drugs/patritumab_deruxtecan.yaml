id: DRUG-PATRITUMAB-DERUXTECAN
names:
  preferred: "Patritumab deruxtecan (HER3-DXd)"
  ukrainian: "Патритумаб дерукстекан"
  english: "Patritumab deruxtecan (HER3-DXd)"
  brand_names: []
atc_code:
rxnorm_id:
drug_class: "HER3-targeted antibody-drug conjugate (deruxtecan / topo-I inhibitor payload)"
mechanism: >
  Fully human anti-HER3 (ERBB3) IgG1 monoclonal antibody linked to deruxtecan (DXd, exatecan-derivative topoisomerase-I inhibitor) via cleavable tetrapeptide linker. Drug-to-antibody ratio ~8:1 with bystander effect. HER3 is broadly expressed across solid tumors and frequently upregulated as a resistance mechanism after EGFR TKI in EGFR-mutant NSCLC.

regulatory_status:
  fda:
    approved: false
    notes: "Investigational. FDA issued Complete Response Letter (CRL) in June 2024 for accelerated-approval BLA in EGFR-mutated NSCLC after EGFR TKI + platinum chemo (HERTHENA-Lung01); CRL cited third-party manufacturing inspection findings, not efficacy/safety. Daiichi Sankyo planning resubmission. Not yet FDA-approved in any indication."
  ema: {approved: false}
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-04-29"
    notes: "Не зареєстрований в Україні станом на 2026-04. НСЗУ не покриває. Доступ — лише клінічні випробування. Джерело: dls.gov.ua реєстр (2026-04)."

    reimbursement_indications: []
typical_dosing: >
  5.6 mg/kg IV q3 weeks until disease progression or unacceptable toxicity (HERTHENA-Lung01 schedule). Premedicate with antiemetics; high-emetogenicity prophylaxis recommended.

key_toxicities:
- Thrombocytopenia (~44% any grade, ~21% G≥3 — distinguishing AE vs T-DXd / Dato-DXd; CBC monitoring + dose modification)
- Neutropenia (~31%, ~19% G≥3)
- Anemia (~37%)
- Nausea (~62%) + vomiting — high-emetogenicity prophylaxis
- Fatigue (~54%)
- Decreased appetite, alopecia
- Interstitial lung disease / pneumonitis (~5% any grade, ~1% G≥3 — boxed-warning class effect; baseline CT + monitoring + immediate hold on respiratory symptoms)
- Stomatitis

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed:
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_14c
draft_revision: 2
notes: >
  HERTHENA-Lung01 (NCT04619004): Phase II, EGFR-mutated metastatic NSCLC after EGFR TKI + platinum-based chemo. ORR 29.8%, mPFS 5.5 mo, mOS 11.9 mo. Filed for FDA accelerated approval Dec 2023; CRL received Jun 2024 (third-party manufacturing issue, not efficacy/safety). Distinct AE profile vs other DXd ADCs: cytopenias more prominent than ILD. Status as of 2026-04: investigational only; not commercially available. Trial-source SRC for HERTHENA-Lung01 not yet ingested into KB — FLAG for follow-up.

notes_ua: >
  HERTHENA-Lung01 (NCT04619004): фаза II, метастатичний EGFR-мутантний
  НДРЛ після прогресування на TKI EGFR та платиновмісній
  хіміотерапії. ORR 29.8%, медіана виживаності без прогресування
  5.5 міс, медіана загальної виживаності 11.9 міс. У грудні 2023
  подано на прискорене схвалення FDA; у червні 2024 отримано лист
  про повну відповідь (CRL) через зауваження до сторонньої виробничої
  площадки, не до ефективності/безпеки. Профіль небажаних явищ
  відрізняється від інших ADC на основі дерукстекану: цитопенії
  превалюють над інтерстиційним захворюванням легень. Станом на
  2026-04 — лише дослідницький статус, комерційно недоступний.
  Джерело-публікація для HERTHENA-Lung01 ще не ввійшло до бази
  знань — позначено для подальшого опрацювання.

notes_patient: >
  ADC-препарат проти білка HER3 — досліджується для EGFR-мутантного раку легень після прогресії на TKI (osimertinib) і хіміо. На квітень 2026 р. ще не схвалений FDA (CRL у червні 2024 через претензії до виробництва, не безпеки/ефективності). Доступ — клінічні випробування.
