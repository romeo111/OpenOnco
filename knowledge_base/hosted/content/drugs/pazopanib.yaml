id: DRUG-PAZOPANIB
names:
  preferred: "Pazopanib"
  brand: ["Votrient"]
  ukrainian: "Пазопаніб"
drug_class: "Multitargeted tyrosine kinase inhibitor (VEGFR1/2/3, PDGFR-α/β, FGFR, c-KIT)"
mechanism_of_action: >
  Pazopanib is an oral multitargeted TKI that inhibits VEGFR1/2/3, PDGFR-α/β,
  FGFR1/3, c-KIT, and other kinases involved in tumor angiogenesis and proliferation.
atc_code: "L01XE11"
administration_routes: ["PO"]
standard_dose: "800 mg PO QD on empty stomach (1 hour before or 2 hours after meals)"
fda_approvals:
  - "Renal cell carcinoma (RCC) — first-line (FDA 2009)"
  - "Advanced soft-tissue sarcoma (STS) after prior chemotherapy (FDA 2012; PALETTE trial)"
notable_toxicities:
  - "Hepatotoxicity: ALT elevation — LFT monitoring every 4 weeks × 4 months, then Q2 months"
  - "Hypertension: class effect (VEGFR inhibition); antihypertensive management"
  - "Diarrhea, fatigue, hair color changes (hair depigmentation)"
  - "QTc prolongation (ECG monitoring)"
  - "Arterial thromboembolic events"
ukraine_registration:
  registered: true
  notes: "Pazopanib registered in Ukraine for RCC and STS per NCCN evidence."
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
