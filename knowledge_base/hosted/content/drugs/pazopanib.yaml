id: DRUG-PAZOPANIB
names:
  preferred: "Pazopanib"
  ukrainian: "Pazopanib"
  english: "Pazopanib"
  brand_names: ["Votrient"]
atc_code: L01EX03
rxnorm_id: "729982"
drug_class: "Multi-target VEGFR tyrosine kinase inhibitor"
mechanism: >
  Oral kinase inhibitor targeting VEGFR1-3, PDGFR, FGFR, KIT, and related
  angiogenic signaling. Used in advanced renal cell carcinoma and selected
  advanced non-adipocytic soft-tissue sarcomas after prior chemotherapy.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 2009
  ema:
    approved: true
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: null
    notes: "Local registration and formulary status require verification."
typical_dosing: >
  800 mg PO once daily without food, at least 1 hour before or 2 hours after
  a meal. Dose interruptions/reductions are common for hepatotoxicity,
  hypertension, diarrhea, proteinuria, and other TKI toxicities.
formulations:
  - "Oral tablets"
black_box_warnings:
  - "Severe and fatal hepatotoxicity"
absolute_contraindications:
  - "Hypersensitivity to pazopanib"
  - "Severe hepatic impairment should generally be avoided"
common_adverse_events:
  - "Diarrhea"
  - "Hypertension"
  - "Hair color changes"
  - "Nausea"
  - "Fatigue"
serious_adverse_events:
  - "Hepatotoxicity"
  - "Arterial or venous thrombotic events"
  - "Hemorrhage"
  - "GI perforation or fistula"
  - "Hypertensive crisis"
major_interactions:
  - "Strong CYP3A4 inhibitors may increase exposure"
  - "Strong CYP3A4 inducers may reduce exposure"
  - "Acid-reducing agents can reduce pazopanib absorption"
sources:
  - SRC-NCCN-STS-2025
  - SRC-ESMO-SARCOMA-2024
  - SRC-PALETTE-VAN-DER-GRAAF-2012
  - SRC-NCCN-KIDNEY-2025
  - SRC-ESMO-RCC-2024
last_reviewed: "2026-05-07"
reviewers: []
notes: >
  Thin drug entity added to resolve RCC and STS pazopanib regimen references.
  PALETTE excludes adipocytic STS; do not generalize across all sarcoma
  histologies without indication-level eligibility.
