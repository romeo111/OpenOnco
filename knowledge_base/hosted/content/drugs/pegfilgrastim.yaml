id: DRUG-PEGFILGRASTIM
name: "Pegfilgrastim"
name_ua: "Пегфілграстим"
brand_names: ["Neulasta", "Fulphila", "Ziextenzo", "Udenyca", "Stimufend", "Nyvepria"]
drug_class: "Granulocyte colony-stimulating factor (G-CSF), pegylated"
atc_code: L03AA13
mechanism_of_action: >
  Pegylated recombinant G-CSF; stimulates proliferation, differentiation, and activation
  of neutrophil precursors and mature neutrophils. Pegylation extends half-life to 15-80h
  (vs filgrastim 3.5h), enabling single-dose per chemotherapy cycle administration.
  Self-regulating clearance: rapidly cleared as neutrophils recover (neutrophil-mediated
  clearance).
standard_doses:
  - indication: "Primary/secondary FN prophylaxis"
    dose: "6 mg SC × 1 dose per chemotherapy cycle"
    schedule: "SC 24-72h after last chemo dose; do NOT administer 14 days before or 24h after chemo"
key_toxicities:
  - "Bone pain (medullary expansion, 30-50%): ibuprofen/loratadine effective"
  - "Splenic rupture (rare): counsel patients on left upper quadrant pain"
  - "ARDS (rare): if respiratory symptoms + fever"
  - "Sickle cell crisis (avoid in sickle cell disease)"
  - "Aortitis (rare)"
contraindications:
  - "Do not use 14 days before or 24h after cytotoxic chemotherapy"
  - "Active myeloid malignancy (AML/MDS) without attending hematologist approval"
  - "Sickle cell disease"
special_populations:
  - "AML/MDS: AVOID pegfilgrastim during active leukemia induction — may stimulate leukemic blasts"
  - "Dose-dense regimens (Q14D): on-body injector (OBI) provides 27h delayed delivery"
monitoring:
  - "CBC with differential"
  - "Spleen assessment if LUQ pain"
sources:
  - SRC-NCCN-SUPPORTIVE-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
