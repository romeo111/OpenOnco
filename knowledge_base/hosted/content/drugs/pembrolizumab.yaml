id: DRUG-PEMBROLIZUMAB
names:
  preferred: "Pembrolizumab"
  ukrainian: "Пембролізумаб"
  english: "Pembrolizumab"
  brand_names: ["Keytruda"]
atc_code: L01FF02
rxnorm_id: null
drug_class: "Anti-PD-1 monoclonal antibody"
mechanism: >
  Humanized IgG4 monoclonal antibody targeting programmed cell death
  protein 1 (PD-1) on T cells. Blocks PD-1 / PD-L1 interaction,
  restoring T-cell-mediated antitumor immunity. Approved across many
  solid tumors and some hematologic indications.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: false
    last_verified: null
    notes: "Registered; reimbursement varies by indication. Out-of-pocket for most patients in Ukraine; clinical-review queue priority for funding pathway across breast TNBC, NSCLC, and other indications."

typical_dosing: >
  200 mg IV q3 weeks OR 400 mg IV q6 weeks. Treatment continued until
  progression, unacceptable toxicity, or 2 years (per indication).

key_toxicities:
  - Immune-mediated adverse events (any organ system) — pneumonitis, colitis, hepatitis, endocrinopathies (thyroiditis, hypophysitis, T1DM), nephritis, dermatologic
  - Fatigue
  - Infusion reactions (rare)
  - Severe immune-mediated AEs require corticosteroid management and may require permanent discontinuation

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed: null
notes: >
  Cross-disease entity. Used in: breast (TNBC neoadj KEYNOTE-522, TNBC
  met PD-L1+ KEYNOTE-355), NSCLC (multiple), melanoma, RCC, MSI-H/dMMR
  CRC, gastric, esophageal, head/neck, urothelial, classical Hodgkin
  lymphoma, etc. ICI-class management protocols apply uniformly.

  STUB: minimum valid entry to satisfy ref-checks. Full clinical
  content to be filled by cross-disease drug-curation pass.
