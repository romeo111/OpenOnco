id: DRUG-PEMETREXED
names:
  preferred: "Pemetrexed"
  ukrainian: "Пеметрексед"
  english: "Pemetrexed"
  synonyms: ["LY231514", "MTA"]
  brand_names: ["Alimta"]
atc_code: L01BA04
rxnorm_id: ""
drug_class: "Multi-targeted antifolate antimetabolite"
mechanism: >
  Pyrrolopyrimidine antifolate that, after intracellular polyglutamation
  by folylpolyglutamate synthetase, simultaneously inhibits multiple
  folate-dependent enzymes critical for thymidine and purine
  biosynthesis: thymidylate synthase (TS — primary target),
  dihydrofolate reductase (DHFR), and glycinamide ribonucleotide
  formyltransferase (GARFT). The combined inhibition disrupts both
  thymidylate and purine de-novo synthesis, halting DNA / RNA
  production and producing S-phase-specific cytotoxicity. Activity is
  histology-restricted: highly active in non-squamous NSCLC and
  malignant pleural mesothelioma (MPM); minimal-to-no activity in
  squamous NSCLC due to higher baseline TS expression in squamous
  histology. Mandatory folic acid (vitamin B9) and vitamin B12
  supplementation reduce hematologic and mucosal toxicity by ~50%
  without compromising efficacy (Niyikiza 2002, Vogelzang
  EMPHACIS). Backbone of KEYNOTE-189 (carbo + pem + pembrolizumab
  vs carbo + pem in non-squamous NSCLC 1L) and PARAMOUNT (pem
  maintenance), and the historical EMPHACIS regimen (cisplatin + pem)
  in MPM.

