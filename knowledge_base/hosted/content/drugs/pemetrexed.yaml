typical_dosing: >
  Standard: 500 mg/m² IV over 10 minutes every 21 days. Combinations:
  + cisplatin 75 mg/m² IV Day 1 (mesothelioma EMPHACIS, NSCLC AVAPERL);
  + carboplatin AUC 5-6 IV Day 1 (NSCLC alternative); + pembrolizumab
  200 mg IV q3w (KEYNOTE-189). Maintenance after induction: 500 mg/m²
  q3w continuing until progression. CRITICAL pre-medication regimen
  to mitigate hematologic and mucosal toxicity: folic acid 350-1000
  mcg PO daily starting ≥7 days before first pemetrexed dose,
  continuing throughout treatment and 3 weeks post; vitamin B12 1000
  mcg IM ≥7 days before first dose then every 9 weeks throughout
  treatment; dexamethasone 4 mg PO BID Days 0, 1, 2 of each cycle
  (rash prophylaxis). Renal adjustment: avoid in CrCl <45 mL/min
  (high toxicity risk; consider gemcitabine or other alternative).
  Hold for NSAID/aspirin renal-clearance interaction in renal
  insufficiency.

formulations:
  - "Powder for IV solution: 100 mg, 500 mg, 1000 mg single-dose vials"

absolute_contraindications:
  - "Severe hypersensitivity to pemetrexed or any excipient"
  - "CrCl <45 mL/min (relative — substantial toxicity risk; case-by-case)"
  - "Pregnancy (embryo-fetal toxicity)"
  - "Severe hepatic impairment (limited PK data)"
  - "Active uncontrolled infection"

black_box_warnings: []

common_adverse_events:
  - "Myelosuppression: neutropenia ~28%, anemia ~33%, thrombocytopenia ~17% (substantially reduced by folate / B12 supplementation)"
  - "Nausea ~50% (premedicate with 5-HT3 + dexamethasone)"
  - "Vomiting ~30%"
  - "Mucositis / stomatitis ~20%"
  - "Rash ~25% (mitigated by dexamethasone prophylaxis)"
  - "Fatigue ~40%"
  - "Decreased appetite ~30%"
  - "Diarrhea ~15%"
  - "Constipation ~15%"
  - "ALT/AST elevation ~10%"
  - "Increased creatinine ~10%"
  - "Alopecia ~10% (less than other cytotoxics)"

serious_adverse_events:
  - "Severe myelosuppression / febrile neutropenia (G3+ neutropenia ~5-15%; without folate supplementation up to 30%)"
  - "Severe mucositis (G3+ ~3-5%)"
  - "Acute interstitial nephritis / acute kidney injury (~1-3%; risk amplified by NSAIDs in renal impairment)"
  - "Pneumonitis / interstitial lung disease (~1-2%; can be fatal — workup any new respiratory symptom)"
  - "Severe rash / SJS-like reactions (rare; mostly prevented by dex prophylaxis)"
  - "Severe hepatic injury (G3+ ALT/AST ~3%)"
  - "Tumor lysis syndrome (rare; high-burden lymphoma off-label)"
  - "Sepsis from prolonged neutropenia"

major_interactions:
  - "NSAIDs + aspirin + indomethacin — reduce renal clearance of pemetrexed in renal insufficiency; avoid for 2 days before to 2 days after pemetrexed in CrCl 45-79; longer hold in worse renal function"
  - "Probenecid / penicillin — competitive renal tubular transport; avoid"
  - "Nephrotoxic agents (cisplatin — intentional combo; aminoglycosides, vancomycin, contrast) — additive AKI risk"
  - "Live vaccines — avoid during therapy and ≥6 mo after"
  - "Concurrent pembrolizumab (KEYNOTE-189) — intentional combination; additive cytopenia"
  - "Folate antagonists (high-dose methotrexate within recent days) — additive antifolate toxicity"

pharmacology:
  half_life_hours: 3.5
  clearance: "renal (predominantly; ~90% excreted unchanged in urine via OAT3)"
  protein_binding_pct: 81
  metabolism: "minimal hepatic; predominant renal tubular secretion"

sources:
