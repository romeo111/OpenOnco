notes: >
  Standard backbone for non-squamous NSCLC (KEYNOTE-189: carbo +
  pem + pembro vs carbo + pem placebo, OS HR 0.49 in PD-L1-all-
  comers — practice-defining 1L for non-squamous EGFR/ALK-WT NSCLC)
  and for malignant pleural mesothelioma (EMPHACIS cis + pem mOS
  12.1 vs 9.3 mo — historical 1L until CheckMate-743 added nivo+ipi
  as combo option). NOT active in squamous NSCLC — histology-
  specific selection is critical. Mandatory pre-medication: folic
  acid 350-1000 mcg PO daily (start ≥7 days pre-cycle 1), B12 1000
  mcg IM (start ≥7 days pre-cycle 1, then q9 wk), dexamethasone 4
  mg PO BID Days 0, 1, 2 of each cycle for rash prophylaxis. Renal
  function is the dominant gating factor — avoid in CrCl <45.
  Counsel patients to hold OTC NSAIDs / aspirin around each cycle in
  renal insufficiency. Monitor CBC weekly through nadir, CMP each
  cycle, CT chest at any new respiratory symptom (ILD suspicion).
  UA: generic available; НСЗУ-reimbursed for indicated uses.
notes_ua: >
  Пеметрексед (pemetrexed) — стандартна основа схем при
  неплоскоклітинному НДРЛ (дослідження KEYNOTE-189: карбоплатин +
  пеметрексед + пембролізумаб проти карбоплатин + пеметрексед +
  плацебо, відношення ризиків загальної виживаності 0.49 у всіх
  підгрупах за PD-L1 — режим визначив стандарт першої лінії для
  неплоскоклітинного НДРЛ без мутацій EGFR/ALK) та при злоякісній
  плевральній мезотеліомі (EMPHACIS, цисплатин + пеметрексед,
  медіана загальної виживаності 12.1 проти 9.3 міс — історично
  стандарт першої лінії, до того як CheckMate-743 додало
  ніволумаб + іпілімумаб як альтернативну комбінацію). НЕ активний
  при плоскоклітинному НДРЛ — гістологічно-специфічний відбір є
  критично важливим. Обов’язкова премедикація: фолієва кислота
  350-1000 mcg перорально щодня (початок щонайменше за 7 днів до
  1-го циклу), вітамін B12 1000 mcg внутрішньом’язово (початок
  щонайменше за 7 днів до 1-го циклу, далі кожні 9 тижнів),
  дексаметазон 4 mg перорально двічі на добу у дні 0, 1, 2 кожного
  циклу для профілактики шкірного висипу. Функція нирок є основним
  обмежувальним фактором — препарат уникати при CrCl <45.
  Пацієнти мають утримуватися від нестероїдних протизапальних
  засобів та аспірину навколо кожного циклу при нирковій
  недостатності. Моніторинг: загальний аналіз крові щотижня до
  надиру; біохімія крові кожного циклу; КТ органів грудної клітки
  при появі будь-яких нових респіраторних симптомів (підозра на
  інтерстиційне захворювання легень). Україна: генерики доступні;
  НСЗУ покриває за зареєстрованими показаннями.
