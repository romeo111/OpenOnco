id: DRUG-PENTOSTATIN
names:
  preferred: "Pentostatin"
  brand: ["Nipent"]
  ukrainian: "Пентостатин"
drug_class: "Purine analog (adenosine deaminase inhibitor)"
mechanism_of_action: >
  Pentostatin (2'-deoxycoformycin) is a potent irreversible inhibitor of adenosine
  deaminase (ADA). ADA inhibition causes accumulation of deoxyadenosine and dATP,
  which is selectively toxic to lymphocytes (particularly T-cells). Leads to
  apoptosis in lymphoid malignancies.
atc_code: "L01BB04"
administration_routes: ["IV"]
standard_dose: "4 mg/m² IV Q14D (every 2 weeks)"
fda_approvals:
  - "Hairy cell leukemia (HCL) — first-line (FDA 1991)"
notable_toxicities:
  - "Immunosuppression: profound T-cell depletion (PCP prophylaxis mandatory)"
  - "Nephrotoxicity: dose-dependent; hydration required; hold if CrCl <60 mL/min"
  - "Nausea, vomiting, fatigue"
  - "Opportunistic infections: VZV, CMV, PCP — due to prolonged lymphopenia"
  - "Neurotoxicity at high doses (lethargy, coma)"
special_precautions:
  - "Pre-treatment: CBC, CMP, CrCl (hold if <60 mL/min); rule out active infection"
  - "PCP prophylaxis: TMP-SMX BID 3x/week during and for 6 months post-treatment"
  - "Hydration: 500 mL NS before + 500 mL NS after each dose"
  - "CMV/HCV/HIV screening before initiation"
ukraine_registration:
  registered: true
  notes: "Pentostatin registered in Ukraine for HCL per NCCN evidence."
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
