id: DRUG-PERTUZUMAB
names:
  preferred: "Pertuzumab"
  ukrainian: "Пертузумаб"
  english: "Pertuzumab"
  brand_names: ["Perjeta"]
atc_code: L01FD02
rxnorm_id: null
drug_class: "HER2-targeted monoclonal antibody (subdomain II / dimerization inhibitor)"
mechanism: >
  Binds HER2 subdomain II, blocking HER2:HER3 heterodimerization — complementary mechanism to trastuzumab (which binds subdomain IV). Combination dual-blockade is synergistic.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: null
    notes: "Reimbursed for HER2+ early adjuvant + neoadjuvant + metastatic per НСЗУ."

typical_dosing: >
  Loading dose 840 mg IV; maintenance 420 mg IV q3 weeks. Combined with trastuzumab + chemotherapy (TCHP, THP, etc).

key_toxicities:
  - Diarrhea (~67% — combination effect; manage with loperamide)
  - Rash
  - Cardiotoxicity (additive with trastuzumab — LVEF monitoring q3 months)
  - Infusion reactions (mild with pre-medication)
  - Mucositis (in TCHP combination)

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed: null
notes: >
  APHINITY: improved iDFS in adjuvant high-risk HER2+. CLEOPATRA: improved OS in metastatic 1L (THP). Always combined with trastuzumab — no monotherapy role.
