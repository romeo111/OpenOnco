      Source: drlz.com.ua пошук "pexidartinib"/"turalio" 2026-05-04 — РП відсутнє.

typical_dosing: "400 mg PO twice daily with a high-fat meal for the first 2 weeks (loading phase), then 800 mg/day total — consult current FDA prescribing information. Available through REMS program only."
formulations: ["Capsule 200 mg"]

absolute_contraindications:
  - "Active hepatic impairment (AST/ALT >3× ULN)"
  - "Concurrent use of other hepatotoxic agents"
black_box_warnings:
  - "Serious hepatotoxicity including fatal cases — available only through REMS program (TURALIO REMS); monitor LFTs weekly for 2 months, then monthly"
major_interactions:
  - "Strong CYP3A4 inhibitors/inducers — avoid or adjust dose"
  - "P-gp substrates with narrow therapeutic index — monitor"
  - "Hepatotoxic drugs — contraindicated concurrently"
common_adverse_events:
