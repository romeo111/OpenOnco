  - "Fatigue (~54%)"
  - "Nausea (~47%)"
  - "AST/ALT elevation (~56% any grade, ~6% G3/4)"
  - "Anemia"
  - "Edema"
  - "Diarrhea"
  - "Decreased appetite"
