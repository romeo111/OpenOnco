notes: >
  STUB — pending Clinical Co-Lead sign-off. Authored 2026-05-04 (Workstream DH).
  Only FDA-approved systemic therapy for symptomatic TGCT.
  REMS program is a critical access/safety feature — REMS enrollment mandatory
  before any prescription. Ukraine access: not registered; expensive; named-patient.
