notes: >
  ILLUMINATE trial (Tap 2019 NEJM): pexidartinib vs placebo in symptomatic
  TGCT (n=120, crossover design). ORR 38% (pexidartinib) vs 0% (placebo);
  CR 15%. Response was durable (median DOR not reached). Hepatotoxicity was
  the key safety signal — 5% G3/4 ALT/AST elevation; serious hepatotoxicity
  including cases requiring transplant. REMS (Risk Evaluation and Mitigation
  Strategy) program required in the US — restricted distribution, mandatory
  LFT monitoring, patient enrollment. EMA refused marketing authorization
  due to hepatotoxicity concerns. Reserved for adults with symptomatic TGCT
  not amenable to improvement with surgery alone.
notes_ua: >
  Дослідження ILLUMINATE (Tap 2019, NEJM): пексидартиніб
  (pexidartinib) проти плацебо у пацієнтів із симптомною
  пухлиною з гігантських клітин сухожилкової піхви (TGCT; n=120,
  крос-овер дизайн). Загальна частота відповіді (ORR) 38% у групі
  пексидартинібу проти 0% у групі плацебо; повна відповідь у 15%.
  Відповідь була тривалою (медіана тривалості відповіді не
  досягнута). Ключовим сигналом безпеки була гепатотоксичність —
  підвищення ALT/AST 3-4 ступеня у 5% пацієнтів; зареєстровано
  тяжкі випадки гепатотоксичності, в тому числі такі, що потребували
  трансплантації печінки. У США препарат розповсюджується виключно
  через програму REMS (стратегія оцінки та мінімізації ризиків):
  обмежена дистрибуція, обов’язковий моніторинг печінкових проб,
  реєстрація пацієнта. EMA відмовила у реєстрації препарату через
  занепокоєння щодо гепатотоксичності. Призначення обмежене
  дорослими пацієнтами із симптомною TGCT, у яких хірургічне
  лікування не дає очікуваного покращення.
