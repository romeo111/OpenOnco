id: DRUG-PEXIDARTINIB
names:
  preferred: "Pexidartinib"
  ukrainian: "Пексидартиніб"
  english: "Pexidartinib"
  brand_names: ["Turalio"]
atc_code: L01EX18
rxnorm_id: null
drug_class: "CSF1R/KIT/FLT3 tyrosine kinase inhibitor"
mechanism: >
  Selective inhibitor of CSF1R (colony-stimulating factor 1 receptor), KIT, and FLT3.
  In TGCT, the tumor microenvironment is dominated by CSF1R-expressing tumor-associated
  macrophages recruited by CSF1 overexpression (driven by the COL6A3-CSF1 chromosomal
  translocation in ~50% of diffuse-type TGCT). Pexidartinib inhibits CSF1R signaling,
  depleting these macrophages and osteoclast-like giant cells that constitute the bulk
  of the tumor mass. Inhibition of KIT and FLT3 is secondary in the TGCT setting.
  ILLUMINATE Phase III RCT (Tap 2019 Lancet): pexidartinib 400 mg BID vs placebo
  in symptomatic TGCT; primary endpoint ORR 38% (RECIST) and 56% (TTP-MRI) vs 0%.

regulatory_status:
  fda:
    approved: true
    indication_summary: "Symptomatic TGCT associated with severe morbidity or functional limitations not amenable to improvement with surgery (FDA August 2019; ILLUMINATE)"
    rems: true
    rems_notes: "TURALIO REMS: prescribers, pharmacies, and patients must be enrolled due to serious and potentially fatal cholestatic hepatotoxicity. Monthly LFT monitoring mandatory for first 8 weeks, then every 3 months."
  ema:
    approved: true
    indication_summary: "Treatment of adult patients with symptomatic TGCT in whom the disease is not amenable to improvement with surgery (EMA 2020)"
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-05-04"
    notes: |
      Не зареєстровано в Україні (Держреєстр ЛЗ — РП відсутнє). REMS-програма
      робить named-patient import складнішим — потребує спеціального дозволу МОЗ
      та REMS-сертифікованої аптеки. Орієнтовна вартість: USD ~25 000/міс.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл МОЗ).
      - EAP Daiichi Sankyo (власник прав після придбання компанії).
      - Клінічне дослідження при наявності.

typical_dosing: >
  400 mg PO twice daily (BID) WITH FOOD. Take with a full meal;
  food increases absorption substantially (AUC +119% with high-fat meal vs fasted).
  Continue until disease progression or unacceptable toxicity.
  Dose interruption for hepatotoxicity per REMS protocol.
formulations: ["Capsules 200 mg"]

absolute_contraindications:
  - "Pre-existing hepatic impairment (AST or ALT >1.5× ULN at baseline — ILLUMINATE exclusion criterion)"
  - "Total bilirubin >ULN at baseline"
  - "History of cholestatic hepatitis or recurrent drug-induced liver injury"
  - "Hypersensitivity to pexidartinib"

relative_contraindications:
  - "Concomitant strong CYP3A4 inhibitors (itraconazole, clarithromycin, ritonavir) — increase pexidartinib exposure; use with caution or avoid"
  - "Concomitant strong CYP3A4 inducers (rifampicin, phenytoin, St John's Wort) — reduce pexidartinib AUC; avoid if possible"
  - "Concomitant hepatotoxic medications"

key_adverse_effects:
  - "Hepatotoxicity — AST/ALT elevation in ~51% any grade; cholestatic hepatitis including one fatal case (open-label extension); ALT/AST >5× ULN in ~15-20%; REMS program mandatory"
  - "Hair color change (depigmentation) — in ~67% (CSF1R effect on melanocytes)"
  - "Fatigue — ~54% any grade"
  - "Nausea — ~39% any grade"
  - "Peripheral edema — ~28% (fluid retention from CSF1R blockade)"
  - "Dysgeusia (taste change) — ~30%"
  - "Eye disorder (periorbital edema) — ~28%"
  - "Alopecia — ~24%"
  - "Rash — ~21%"
  - "Skin hypopigmentation — ~13%"

drug_drug_interactions:
  - "CYP3A4/CYP1A2 inhibitors: increase pexidartinib AUC — dose adjustment and LFT monitoring"
  - "CYP3A4 inducers: reduce pexidartinib AUC by up to 75% — avoid strong inducers"
  - "Proton pump inhibitors: may reduce absorption (pH-dependent dissolution) — take with food to mitigate"

monitoring_requirements:
  - "ALT/AST/total bilirubin/ALP: baseline; then every week for 8 weeks; then every 3 months"
  - "If LFTs 1-3× ULN: increase monitoring frequency"
  - "If ALT/AST >5× ULN: hold pexidartinib; discontinue permanently for cholestatic pattern (elevated ALP + bilirubin)"
  - "If ANY cholestatic findings: immediate specialist hepatology consultation; do NOT rechallenge"

sources:
  - SRC-ILLUMINATE-TAP-2019
  - SRC-NCCN-SARCOMA
  - SRC-ESMO-SARCOMA-2024

last_reviewed: "2026-05-04"
