id: DRUG-PEXIDARTINIB
names:
  preferred: "Pexidartinib"
  ukrainian: "Пексидартиніб"
  english: "Pexidartinib"
  brand_names: ["Turalio"]
atc_code: L01EX19
rxnorm_id: "2284718"
drug_class: "CSF1R inhibitor (oral, selective)"
mechanism: >
  Selective oral inhibitor of CSF1R (colony-stimulating factor 1 receptor),
  KIT, and FLT3. In TGCT (formerly PVNS), tumor cells overexpress CSF1
  (via COL6A3-CSF1 translocation), driving recruitment of CSF1R-expressing
  macrophages and osteoclast-like giant cells that constitute the bulk of
  the tumor mass. Pexidartinib depletes these CSF1R+ cells, reducing tumor
  burden. ILLUMINATE trial: ORR 38% (vs 0% placebo), with 15% complete
  response. FDA-approved August 2019 — first systemic therapy for TGCT.

regulatory_status:
  fda:
    approved: true
  ema:
    approved: false
    notes: "EMA refused marketing authorization for TGCT in 2020 (benefit-risk; hepatotoxicity concerns). Available in EU via named-patient/compassionate use."
