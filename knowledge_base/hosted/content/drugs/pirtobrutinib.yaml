notes: >
  BRUIN trial (Mato 2023): in r/r CLL/SLL after prior cBTKi (median 3
  prior lines), ORR 73%; among BTK-C481-mutated subset ORR ~71%.
  Approved for r/r CLL/SLL after ≥2 prior lines including cBTKi + BCL2i,
  AND for r/r mantle cell lymphoma after ≥2 prior lines including cBTKi.
  Distinct binding mechanism overcomes C481-mutated resistance — primary
  rationale for use. Cardiac safety profile better than ibrutinib (afib
  ~3% vs 7-15%) but bleeding risk persists. Major UA access barrier:
  not registered.
notes_ua: >
  Дослідження BRUIN (Mato 2023): у пацієнтів із рецидивним/
  рефрактерним хронічним лімфоцитарним лейкозом (CLL/SLL) після
  попередньої терапії ковалентним інгібітором BTK (cBTKi; медіана
  3 попередніх ліній) загальна частота відповіді (ORR) становила
  73%; у підгрупі з мутацією BTK-C481 ORR близько 71%.
  Піртобрутиніб (pirtobrutinib) схвалений для рецидивного/
  рефрактерного CLL/SLL після щонайменше 2 ліній терапії, які
  включали cBTKi та інгібітор BCL2 (BCL2i), а також для
  рецидивної/рефрактерної мантійноклітинної лімфоми після
  щонайменше 2 ліній терапії, що включали cBTKi. Унікальний
  механізм нековалентного зв’язування долає резистентність,
  обумовлену мутацією C481, — головне обґрунтування призначення.
  Кардіологічний профіль безпеки кращий за ібрутиніб (фібриляція
  передсердь близько 3% проти 7-15%), однак ризик кровотеч
  зберігається. Основний бар’єр доступу в Україні — препарат не
  зареєстрований.
