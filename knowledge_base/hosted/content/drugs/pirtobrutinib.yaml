id: DRUG-PIRTOBRUTINIB
names:
  preferred: "Pirtobrutinib"
  ukrainian: "Піртобрутиніб"
  english: "Pirtobrutinib"
  brand_names:
    - "Jaypirca"
atc_code: L01EL04
rxnorm_id: "2596549"
drug_class: "Non-covalent (reversible) BTK inhibitor"
mechanism: >
  Highly selective non-covalent reversible inhibitor of BTK that binds
  the kinase via a distinct mechanism not requiring the C481 cysteine
  residue. Retains activity against BTK-C481S/R mutations that confer
  resistance to covalent BTK inhibitors (ibrutinib, acalabrutinib,
  zanubrutinib). Preserves activity in TP53-mutated CLL where
  conventional chemoimmunotherapy fails.

regulatory_status:
  fda:
    approved: true
  ema:
    approved: true
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      Non-covalent BTK-інгібітор для post-cBTKi r/r MCL/CLL; не входить до НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл) — за рахунок пацієнта,
        $15-25K/міс.
      - EAP Eli Lilly Ukraine (Jaypirca access program — критерії:
        documented progression на covalent BTKi).
      - Cross-border (EU): EU гематоцентри через "Лікування за
        кордоном" (наказ МОЗ 988).
      - Trial-only: BRUIN-серія активна в EU.
      Source: drlz.com.ua пошук "pirtobrutinib"/"jaypirca" 2026-04-27 — РП відсутнє.

typical_dosing: "200 mg PO once daily, continuous until progression or unacceptable toxicity"
