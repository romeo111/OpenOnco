id: DRUG-POLATUZUMAB-VEDOTIN
names:
  preferred: "Polatuzumab vedotin"
  ukrainian: "Полатузумаб ведотин"
  english: "Polatuzumab vedotin"
  brand_names:
    - "Polivy"
atc_code: L01FX14
rxnorm_id: "2122734"
drug_class: "Anti-CD79b antibody-drug conjugate (MMAE payload)"
mechanism: >
  CD79b-targeted IgG1 monoclonal antibody conjugated via cleavable
  protease-cleavable linker to monomethyl auristatin E (MMAE), a
  microtubule-disrupting payload. Internalized into CD79b+ B-cells,
  cleaves intracellularly, releases MMAE → mitotic arrest + apoptosis.

regulatory_status:
  fda:
    approved: true
  ema:
    approved: true
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      Anti-CD79b ADC для DLBCL (1L Pola-R-CHP за POLARIX; r/r з BR);
      не входить до пакетів НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP Roche Ukraine (compassionate use; для 1L DLBCL high-IPI
        чи r/r ≥2L після BR/CAR-T невдач).
      - Cross-border (EU): direct treatment в EU гематоцентрах через
        "Лікування за кордоном" (наказ МОЗ 988); POLARIX Pola-R-CHP
        SoC у багатьох EU країнах для high-IPI DLBCL.
      - Trial-only: post-marketing study activity в EU.
      Source: drlz.com.ua пошук "polatuzumab"/"polivy" 2026-04-27 — РП відсутнє.

typical_dosing: "1.8 mg/kg IV day 1 of 21-day cycle (Pola-R-CHP, 6 cycles for newly-diagnosed DLBCL)"
formulations:
  - "IV powder 30 / 140 mg vials"

absolute_contraindications:
  - "Hypersensitivity"
  - "Severe pre-existing peripheral neuropathy (Grade ≥2)"
black_box_warnings: []
major_interactions:
  - "Strong CYP3A4 inhibitors increase MMAE exposure"
common_adverse_events:
  - "Peripheral neuropathy (sensory)"
  - "Neutropenia, thrombocytopenia, anemia"
  - "Fatigue"
  - "Diarrhea"
  - "Pyrexia"
  - "Decreased appetite"
serious_adverse_events:
  - "Severe peripheral neuropathy"
  - "Severe myelosuppression with neutropenic fever"
  - "Tumor lysis syndrome (high tumor burden)"
  - "Hepatotoxicity (rare)"
  - "PML — progressive multifocal leukoencephalopathy (very rare)"

pharmacology:
  half_life: "~12 days (antibody); MMAE released gradually intracellularly"

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_14c
draft_revision: 2
notes: >
  Replaces vincristine in Pola-R-CHP regimen for newly-diagnosed DLBCL
  with IPI ≥2 (POLARIX trial — improved PFS vs R-CHOP). Substantial cost
  + access constraint in Ukraine: NOT НСЗУ-reimbursed as of 2026-04-25 —
  funding pathway must be confirmed BEFORE plan finalization (clinical
  trial / charitable scheme / out-of-pocket). Premedication: antihistamine
  + paracetamol for first dose (infusion-related reactions). Hold for
  Grade ≥2 peripheral neuropathy.
notes_ua: >
  Полатузумаб ведотин (polatuzumab vedotin) замінює вінкристин у
  режимі Pola-R-CHP при вперше діагностованій дифузній великоклітинній
  В-клітинній лімфомі (DLBCL) з IPI ≥2 (дослідження POLARIX —
  покращення виживаності без прогресування порівняно з R-CHOP).
  Суттєвий ціновий бар’єр та обмеження доступу в Україні: станом на
  2026-04-25 НЕ покривається НСЗУ — джерело фінансування має бути
  підтверджене ДО фіналізації плану лікування (клінічне дослідження,
  благодійний фонд або власний кошт пацієнта). Премедикація:
  антигістамінний препарат + парацетамол перед першим введенням
  (профілактика інфузійних реакцій). Препарат тимчасово відмінити
  при периферичній нейропатії 2 ступеня та вище.
