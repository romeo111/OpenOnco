id: DRUG-POMALIDOMIDE
names:
  preferred: "Pomalidomide"
  ukrainian: "Помалідомід"
  english: "Pomalidomide"
  brand_names:
    - "Pomalyst"
    - "Imnovid"
atc_code: L04AX06
rxnorm_id: "1373716"
drug_class: "immunomodulator — IMiD (cereblon E3 ligase modulator, 3rd-generation)"
mechanism: >
  Third-generation immunomodulatory drug (IMiD). Binds cereblon (CRBN)
  within the CRL4-CRBN E3 ubiquitin ligase complex with higher affinity
  than lenalidomide, redirecting it to ubiquitinate IKZF1 and IKZF3
  transcription factors — selective cytotoxicity in multiple myeloma and
  immunomodulatory effects (NK-cell and T-cell activation, ADCC
  enhancement). Retains activity in lenalidomide-refractory MM. Cytochrome
  P450 metabolism (CYP1A2 primary; CYP3A4 minor).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2013
    indications_brief:
      - "Relapsed/refractory multiple myeloma after ≥2 prior therapies including lenalidomide and a PI (Pomalyst)"
      - "Kaposi sarcoma (accelerated approval, 2018)"
      - "AIDS-related Kaposi sarcoma (2020)"
  ema:
    approved: true
    year_first_approval: 2013
    approved_indication: "R/R MM after ≥2 prior therapies including lenalidomide + bortezomib (Imnovid)"
  ukraine_registration:
    registered: false
    registered_note: "Pomalidomide not registered in Ukraine; international access only"
    reimbursed_nszu: false

formulation:
  oral: true
  iv: false
  sc: false
  forms:
    - "Capsules: 1 mg, 2 mg, 3 mg, 4 mg"

dosing_reference:
  standard_dose: "4 mg PO d1-21 of each 28-day cycle (standard Isa-Pd / DPd schedule)"
  renal_adjustment: "No dose adjustment required for CrCl ≥30 mL/min; limited data below CrCl 30"
  hepatic_adjustment: "No specific dose adjustment for mild-moderate hepatic impairment; avoid severe hepatic impairment"
  rems: true
  rems_program: "Pomalyst REMS (Celgene/BMS) — mandatory pregnancy prevention program; monthly negative pregnancy test required in women of childbearing potential"

key_adverse_effects:
  common:
    - "Neutropenia (Grade 3-4 ~48%; dose-limiting)"
    - "Anemia"
    - "Thrombocytopenia"
    - "Fatigue"
    - "Peripheral neuropathy (milder than bortezomib or thalidomide)"
  serious:
    - "VTE — DVT/PE (LMWH or aspirin prophylaxis mandatory)"
    - "Teratogenicity — absolute contraindication in pregnancy (Category X; REMS)"
    - "Second primary malignancy (class IMiD effect)"
    - "Peripheral neuropathy (less prominent than lenalidomide)"
    - "Hepatotoxicity (rare)"

key_interactions:
  - "CYP1A2 inducers (rifampin, carbamazepine) — reduce pomalidomide exposure; avoid co-administration"
  - "CYP1A2 inhibitors (fluvoxamine, ciprofloxacin) — increase pomalidomide exposure; monitor"
  - "Dexamethasone co-administration — standard in all Poma-based regimens; modestly reduces IMiD CNS AEs"

contraindications:
  - "Pregnancy (teratogen — absolute; REMS mandatory)"
  - "Prior severe hypersensitivity to pomalidomide"

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
last_reviewed: "2026-05-05"
notes: >
  STUB — authored Workstream FE (2026-05-05) for Isa-Pd regimen creation.
  Third-generation IMiD; cereblon binder with activity in lenalidomide-
  refractory MM. FDA approved Feb 2013 (Pomalyst) for R/R MM ≥2 prior
  lines. Key trial anchor: ICARIA-MM (Isa-Pd vs Pd; Lancet 2019;
  SRC-ICARIA-ATTAL-2019). REMS mandatory (US Pomalyst REMS program).
notes_ua: >
  STUB — авторінг Workstream FE (2026-05-05). Помалідомід — 3rd-generation
  IMiD (церебелон-зв'язувальний) з активністю при леналідомід-рефрактерній ММ.
  FDA approved лютий 2013 (Pomalyst). Не зареєстрований в Україні.
