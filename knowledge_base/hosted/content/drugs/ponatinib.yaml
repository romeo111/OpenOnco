id: DRUG-PONATINIB
names:
  preferred: "Ponatinib"
  ukrainian: "Понатиніб"
  english: "Ponatinib"
  brand_names: ["Iclusig"]
atc_code: L01EA05
rxnorm_id: "1373415"
drug_class: "BCR-ABL1 TKI (3rd-generation, T315I-active)"
mechanism: >
  Pan-BCR-ABL1 TKI active against ALL known kinase-domain mutations
  including T315I gatekeeper. Reserved for r/r CML/Ph+ ALL after multiple
  TKI failures or T315I emergence due to substantial vascular toxicity.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      3rd-gen BCR-ABL TKI для T315I-mutated CML/Ph+ ALL та multi-TKI failure;
      не входить до НСЗУ (іматиніб/нілотиніб/дазатиніб — у НСЗУ; понатиніб — ні).
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP Incyte Ukraine (Iclusig access — критерії: T315I+ або
        failure ≥2 попередніх TKI; vascular-risk screening обовʼязковий).
      - Cross-border (EU): EU гематоцентри через "Лікування за
        кордоном" (наказ МОЗ 988); EMA-затверджено для T315I.
      - Trial-only: OPTIC post-marketing.
      Source: drlz.com.ua пошук "ponatinib"/"iclusig" 2026-04-27 — РП відсутнє.

typical_dosing: >
  CML/Ph+ ALL with T315I or post multiple TKI failures: starting 45 mg PO
  daily; reduce to 15 mg upon achievement of major molecular response
  (response-adjusted dosing per OPTIC trial reduces vascular events
  ~50%).
formulations: ["Tablets 10 / 15 / 30 / 45 mg"]

absolute_contraindications:
  - "Active uncontrolled vascular disease (recent MI, stroke, severe PAD)"
  - "Pregnancy"
  - "Hypersensitivity"
black_box_warnings:
  - "Arterial occlusive events (boxed) — MI, stroke, PAOD; mortality risk"
  - "Heart failure"
  - "Hepatotoxicity"
major_interactions:
  - "Strong CYP3A4 inhibitors / inducers"
common_adverse_events:
  - "Hypertension"
  - "Rash"
  - "Abdominal pain"
  - "Headache"
  - "Cytopenias"
  - "Fatigue"
serious_adverse_events:
  - "Arterial occlusive events (MI, stroke, PAOD) — substantial"
  - "Heart failure"
  - "Hepatotoxicity"
  - "Pancreatitis"
  - "Hemorrhage"

pharmacology: {half_life: "~22 hours"}

sources:
  - SRC-NCCN-MPN-2025
  - SRC-ELN-CML-2020

last_reviewed: "2026-04-25"
notes: >
  Reserved for T315I CML or post ≥2 TKI failures. Response-adjusted dosing
  (45 → 15 mg upon MMR) per OPTIC trial reduces toxicity. Asciminib (STAMP)
  is an emerging less-toxic alternative for similar indication.
  NOT registered in Ukraine — major access barrier.
