id: DRUG-PRALSETINIB
names:
  preferred: "Pralsetinib"
  ukrainian: "Пралсетініб"
  english: "Pralsetinib"
  synonyms: ["BLU-667"]
  brand_names: ["Gavreto"]
atc_code: L01EX23
rxnorm_id: ""
drug_class: "Selective RET tyrosine kinase inhibitor"
mechanism: >
  Highly selective ATP-competitive small-molecule inhibitor of the
  RET (REarranged during Transfection) receptor tyrosine kinase,
  active against RET fusions (KIF5B-RET, CCDC6-RET dominant in NSCLC;
  diverse fusions in papillary thyroid) and RET-activating point
  mutations including M918T (germline / sporadic medullary thyroid
  carcinoma). Designed for selectivity vs VEGFR2 to spare class
  VEGFR-mediated cardiovascular toxicity (although hypertension still
  occurs). CNS-penetrant. Pivotal trials ARROW: RET-fusion+ NSCLC
  TKI-naive ORR ~70%, prior platinum ORR ~57%; RET-mutant medullary
  thyroid ORR ~60%; RET-fusion+ thyroid (papillary, anaplastic) ORR
  ~89%. FDA approved Sep 2020. Note commercial availability has
  contracted in 2023-2024 — Roche returned US rights to Blueprint;
  some indications were withdrawn from US label while EU access
  continues; selpercatinib is the more widely available RET-TKI
  globally (and head-to-head LIBRETTO-431 favors selpercatinib in
  RET+ NSCLC 1L).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2020
    indications_brief:
      - "RET-fusion+ metastatic NSCLC"
      - "RET-mutant advanced medullary thyroid carcinoma (≥12 yr)"
      - "RET-fusion+ thyroid cancer post prior systemic therapy (status evolving — selpercatinib preferred in current US availability)"
  ema:
    approved: true
    year_first_approval: 2021
    indications_brief:
      - "RET-fusion+ NSCLC"
      - "RET-mutant MTC / RET-fusion+ thyroid"
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "Не зареєстровано per drlz.com.ua snapshot 2026-04-27. Selpercatinib is the dominant RET-TKI globally and in EU access pathways; pralsetinib accessed via EAP / cross-border / self-pay. Both lack UA НСЗУ reimbursement."

typical_dosing: >
  400 mg PO once daily on an empty stomach (no food 2 h before, 1 h
  after — fed-state increases exposure ~100%, raising AE risk).
  Continuous until progression / unacceptable toxicity. Dose level -1
  = 300 mg daily; -2 = 200 mg daily; -3 = 100 mg daily; permanent
  discontinuation if recurrent G3-4 at -3. Hold for ILD/pneumonitis
  (any grade — workup, permanently discontinue if confirmed),
  hypertensive crisis, severe hepatotoxicity. No formal renal
  adjustment.

formulations:
  - "Capsules 100 mg"

absolute_contraindications:
  - "Hypersensitivity to pralsetinib or any excipient"
  - "Pregnancy (embryo-fetal toxicity)"
  - "Confirmed ILD/pneumonitis attributed to pralsetinib"

black_box_warnings: []

common_adverse_events:
  - "Fatigue ~35%"
  - "Constipation ~35%"
  - "Musculoskeletal pain ~32%"
  - "Hypertension ~28-35%"
  - "Anemia ~50%"
  - "Lymphopenia ~50%"
  - "Neutropenia ~40%"
  - "Thrombocytopenia ~30%"
  - "AST/ALT elevation ~30-50% (mostly G1-2)"
  - "Increased creatinine (transporter; not true AKI) ~28%"
  - "Diarrhea ~25%"
  - "Dry mouth / dysgeusia ~20%"
  - "Headache ~20%"

serious_adverse_events:
  - "ILD / pneumonitis (G3+ ~3%; class warning — RET-TKI; can be fatal)"
  - "Hypertensive crisis (G3 ~14% — baseline + serial BP, anti-HTN escalation)"
  - "Severe cytopenias (G3+ neutropenia ~13%, anemia ~14%, lymphopenia ~22%)"
  - "Hepatotoxicity (G3 ALT/AST ~5-10%)"
  - "QT prolongation (modest)"
  - "Hemorrhage (G3 ~3%; pulmonary, GI)"
  - "Wound-healing impairment (hold ≥1 wk pre- and post-elective surgery)"
  - "Tumor lysis syndrome (rare, high-burden RET+)"
  - "Pneumonia (~20% any-grade; G3 ~9% — overlap with infection vs pneumonitis)"

major_interactions:
  - "Strong CYP3A4 inhibitors (azoles, clarithromycin, ritonavir) — significantly ↑ exposure; avoid"
  - "Strong CYP3A4 inducers (rifampin, phenytoin, St John's wort) — ↓ exposure; avoid"
  - "Combined P-gp + strong CYP3A4 inhibitors — particular caution"
  - "Food (high-fat meal) — increases AUC ~100%; mandate fasting administration"
  - "Other myelosuppressive agents — additive cytopenia"

pharmacology:
  half_life_hours: 22
  clearance: "hepatic"
  protein_binding_pct: 97
  metabolism: "CYP3A4 (predominant)"

sources:
