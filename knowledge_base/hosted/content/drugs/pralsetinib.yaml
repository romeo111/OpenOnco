notes: >
  Same RET-TKI class as selpercatinib; LIBRETTO-431 head-to-head
  (selpercatinib vs platinum + pembrolizumab in RET+ NSCLC 1L)
  established selpercatinib as preferred where access permits.
  Critical fasting administration (high-fat meal nearly doubles AUC).
  Baseline + ongoing monitoring: BP weekly first month then monthly,
  CBC q2 wk first 2 mo then monthly, LFTs q2 wk first 8 wk then
  monthly, ECG (QTc) baseline + periodic, CT chest at any new
  respiratory symptoms. Hold for elective surgery ≥1 week pre and
  resume only after full wound healing. In contemporary US practice
  some pralsetinib indications have been withdrawn (Roche → Blueprint
  hand-back); EU and EAP access continues. UA: not registered;
  pursue selpercatinib EAP first if RET+ tumor and access pathway
  available.
notes_ua: >
  Пралсетініб (pralsetinib) належить до того самого класу RET-TKI,
  що й селперкатиніб; пряме порівняльне дослідження LIBRETTO-431
  (селперкатиніб проти платини з пембролізумабом у першій лінії
  RET-позитивного НДРЛ) встановило селперкатиніб як препарат
  вибору там, де доступ дозволяє. Критично важливе застосування
  натще (їжа з високим вмістом жиру майже подвоює AUC). Базовий
  та поточний моніторинг: артеріальний тиск щотижня перший місяць,
  далі щомісячно; загальний аналіз крові кожні 2 тижні перші 2 міс,
  далі щомісячно; печінкові проби кожні 2 тижні перші 8 тижнів,
  далі щомісячно; ЕКГ (QTc) на старті та періодично; КТ органів
  грудної клітки при будь-яких нових респіраторних симптомах.
  Тимчасова відміна перед плановою операцією щонайменше за 1 тиждень
  з відновленням лише після повного загоєння рани. У сучасній
  американській практиці частина показань пралсетинібу була
  відкликана (повернення прав від Roche до Blueprint); доступ у ЄС
  та через програми розширеного доступу (EAP) продовжується.
  Україна: препарат не зареєстрований; за наявності RET-позитивної
  пухлини доцільно першочергово розглянути доступ до селперкатинібу
  через EAP.
