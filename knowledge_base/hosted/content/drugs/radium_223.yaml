id: DRUG-RADIUM-223
names:
  preferred: "Radium-223 dichloride"
  ukrainian: "Радій-223 дихлорид"
  english: "Radium-223 dichloride"
  brand_names: ["Xofigo"]
atc_code: V10XX03
rxnorm_id: null
drug_class: "Bone-seeking α-emitter"
mechanism: >
  Calcium-mimetic α-emitter that incorporates into hydroxyapatite at sites of high bone turnover (osteoblastic metastases). α-radiation has ~100 µm range — high local tumor cell kill with minimal marrow toxicity vs β-emitters.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: "see-DEC-registry"
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Зареєстровано в UA (Bayer — Xofigo, перевірити поточний РП у Держреєстрі ЛЗ
      drlz.com.ua); НЕ реімбурсується НСЗУ — пацієнт оплачує самостійно або
      імпорт через cross-border. Доступ обмежений ядерно-медичними центрами
      з ліцензією на роботу з α-emitter ізотопами.
      Шляхи доступу:
      - Self-pay в UA: Інститут ядерної медицини та променевої діагностики
        (Київ), Національний інститут раку (за наявності постачання).
        Орієнтовна вартість: ~$5-8K/доза × 6 доз = ~$30-50K курс.
      - EAP Bayer Ukraine (Xofigo patient-access program — обмежено,
        переважно для пацієнтів з фінансовими труднощами; not guaranteed).
      - Cross-border (EU): EU урологічні/ядерно-медичні центри через
        "Лікування за кордоном" (наказ МОЗ 988); ALSYMPCA SoC для
        symptomatic bone-predominant mCRPC без вісцеральних мет.
      Source: per CSD-2 categorization rationale — "Зареєстровано в UA але
      не реімбурсується". РП-номер потребує перевірки в drlz.com.ua.

typical_dosing: >
  55 kBq/kg IV q4 weeks × 6 cycles. Symptomatic bone-predominant mCRPC without visceral metastases (visceral mets exclude — ALSYMPCA exclusion criterion).

key_toxicities:
  - Anemia
  - Diarrhea
  - Bone pain (transient flare)
  - Falls (population is fragile)
  - Avoid concurrent abiraterone + prednisone — ERA-223 trial showed excess fractures and deaths

sources: [SRC-NCCN-PROSTATE-2025, SRC-ESMO-PROSTATE-2024]
last_reviewed: null
notes: >
  ALSYMPCA: OS benefit + symptomatic skeletal-event reduction in bone-predominant mCRPC. ERA-223 caution: avoid combination with abiraterone (use sequentially). UA-access barrier.
