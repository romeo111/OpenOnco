id: DRUG-RASBURICASE
name: "Rasburicase"
name_ua: "Расбуриказа"
brand_names: ["Elitek", "Fasturtec"]
drug_class: "Urate oxidase (recombinant) — uric acid-lowering agent"
atc_code: V03AF07
mechanism_of_action: >
  Recombinant urate oxidase that catalyzes oxidation of uric acid to allantoin, which is
  5-10× more soluble and renally excreted. Does not inhibit xanthine oxidase (unlike
  allopurinol) — rapidly lowers existing uric acid rather than preventing production.
  Produces hydrogen peroxide as byproduct — absolute contraindication in G6PD deficiency
  (hemolytic anemia).
standard_doses:
  - indication: "TLS prophylaxis or treatment (high-risk)"
    dose: "0.2 mg/kg IV QD"
    schedule: "IV over 30 min × 1-5 doses (prophylaxis: 1-3 doses; treatment: up to 5 days)"
  - indication: "Single-dose prophylaxis (intermediate/high-risk per institution)"
    dose: "0.15 mg/kg or fixed 3 mg IV × 1"
    schedule: "Single dose before/at chemotherapy initiation"
key_toxicities:
  - "Hemolytic anemia: FATAL in G6PD deficiency — MANDATORY G6PD screening before use"
  - "Methemoglobinemia: hydrogen peroxide byproduct"
  - "Anaphylaxis: rare but can occur"
  - "Antibody formation: may reduce efficacy on repeated exposure"
contraindications:
  - "G6PD DEFICIENCY — absolute contraindication (fatal hemolysis)"
  - "Methemoglobinemia on prior exposure"
  - "Hypersensitivity to urate oxidase"
special_populations:
  - "Pregnancy: Category C — limited data; use only if clearly indicated"
  - "G6PD-prevalent populations (Mediterranean, African, Southeast Asian): screen ALL patients before use"
monitoring:
  - "Uric acid: baseline, then q4-8h during TLS risk period"
  - "Creatinine, K+, phosphate, Ca²⁺: q6-12h"
  - "Blood samples must be on ice immediately (rasburicase degrades uric acid in vitro at room temperature — falsely low UA)"
  - "CBC: monitor for hemolysis if G6PD status unknown or borderline"
sources:
  - SRC-NCCN-SUPPORTIVE-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
