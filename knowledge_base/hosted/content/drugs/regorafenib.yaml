notes: >
  CORRECT trial (Grothey 2013): 3L+ chemo-refractory mCRC — regorafenib
  vs placebo improved mOS 6.4 vs 5.0 mo (HR 0.77). Modest absolute
  benefit; AE profile substantial — ReDOS dose-escalation strategy
  (start 80 mg, escalate weekly to 160 mg) improves tolerability with
  preserved efficacy. CONCUR trial (Asian patients) confirmed activity.
  Hand-foot skin reaction the dominant tolerability issue — patient
  education + topical urea prophylaxis essential. Liver function
  monitoring weekly during cycle 1, then q2 weeks.
notes_ua: >
  Дослідження CORRECT (Grothey 2013): третя і подальші лінії
  лікування метастатичного колоректального раку (mCRC),
  рефрактерного до хіміотерапії — регорафеніб проти плацебо
  покращив медіану загальної виживаності з 5.0 до 6.4 міс
  (HR 0.77). Абсолютна перевага помірна; профіль небажаних явищ
  виражений — стратегія дозо-ескалації ReDOS (старт із 80 mg із
  щотижневим збільшенням до 160 mg) покращує переносимість зі
  збереженням ефективності. Дослідження CONCUR (азійська популяція)
  підтвердило активність препарату. Долонно-підошовна шкірна
  реакція є провідною проблемою переносимості — необхідні
  навчання пацієнта та профілактичне застосування топічних
  кремів із сечовиною. Контроль печінкових проб щотижня
  упродовж 1-го циклу, далі кожні 2 тижні.
