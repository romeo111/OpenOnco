id: DRUG-RELUGOLIX
names:
  preferred: "Relugolix"
  ukrainian: "Релуголікс"
  english: "Relugolix"
  brand_names: ["Orgovyx"]
atc_code: L02BX04
rxnorm_id: null
drug_class: "GnRH antagonist (oral)"
mechanism: >
  Oral GnRH-receptor antagonist — first oral ADT option. Rapid testosterone suppression; cardiovascular profile favorable vs LHRH agonists in HERO trial.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      Пероральний GnRH-антагоніст для advanced PC; не входить до НСЗУ.
      (LHRH-агоністи leuprolide/goserelin у НСЗУ — relugolix ні).
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл) — Orgovyx/Relumina.
      - EAP Myovant/Sumitomo Pharma (через EU дистрибʼютора).
      - Cross-border (EU): EU урологічні центри через "Лікування за
        кордоном" (наказ МОЗ 988); EMA-затверджено 2022; перевага —
        oral, без flare, нижчий cardiac risk.
      - Trial-only: HERO post-marketing.
      Source: drlz.com.ua пошук "relugolix"/"orgovyx" 2026-04-27 — РП відсутнє.

typical_dosing: >
  360 mg PO loading dose day 1, then 120 mg PO once daily.

key_toxicities:
  - Hot flashes
  - Diarrhea (~12%)
  - Constipation
  - Fatigue
  - Same metabolic / bone class effects as injectable ADT

sources: [SRC-NCCN-PROSTATE-2025, SRC-ESMO-PROSTATE-2024]
last_reviewed: null
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_14c
draft_revision: 2
notes: >
  Best CV safety profile of any ADT in HERO trial (54% relative MACE reduction vs leuprolide). UA-access major barrier; flagged for clinician review.
notes_ua: >
  Релуголікс (relugolix) демонструє найкращий профіль серцево-
  судинної безпеки серед усіх засобів андроген-депривації (ADT)
  згідно з дослідженням HERO (відносне зниження ризику великих
  серцево-судинних подій / MACE на 54% порівняно з лейпроліном).
  Основний бар’єр доступу в Україні — препарат не зареєстрований;
  потребує клінічного перегляду.
