id: DRUG-REPOTRECTINIB
names:
  preferred: "Repotrectinib"
  ukrainian: "Репотректініб"
  english: "Repotrectinib"
  synonyms: ["TPX-0005"]
  brand_names: ["Augtyro"]
atc_code: L01EX26
rxnorm_id: ""
drug_class: "Next-generation ROS1 / NTRK / ALK tyrosine kinase inhibitor"
mechanism: >
  Macrocyclic next-generation ATP-competitive small-molecule TKI
  designed with a compact rigid scaffold to fit the kinase active
  site even when bulky solvent-front mutations (ROS1 G2032R, NTRK1
  G595R, NTRK3 G623R) confer resistance to first-generation TKIs
  (crizotinib, entrectinib, larotrectinib). Inhibits ROS1, NTRK1/2/3,
  and ALK with sub-nanomolar potency including against the
  resistance mutations. CNS-penetrant (CSF/plasma free-fraction
  ratio favorable) → meaningful intracranial response. Pivotal
  evidence TRIDENT-1: ROS1+ NSCLC TKI-naive ORR ~79% (mDOR ~34 mo),
  post-crizotinib ORR ~38% (active vs G2032R); NTRK fusion solid
  tumors TKI-pretreated ORR ~50%. FDA approvals Nov 2023 (ROS1
  NSCLC) and June 2024 (tumor-agnostic NTRK fusion).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2023
    indications_brief:
      - "ROS1+ locally advanced/metastatic NSCLC (TKI-naive and post prior ROS1-TKI)"
      - "NTRK fusion solid tumors, tumor-agnostic, post prior NTRK-TKI"
  ema:
    approved: true
    year_first_approval: 2024
    indications_brief:
      - "ROS1+ NSCLC"
      - "NTRK fusion solid tumors"
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "Не зареєстровано per drlz.com.ua snapshot 2026-04-27. Доступ via EAP BMS / cross-border / self-pay. Crizotinib + entrectinib are the more commonly accessible ROS1-TKIs in UA."

typical_dosing: >
  Lead-in: 160 mg PO once daily for 14 days, then escalate to 160 mg
  PO BID continuous until progression / unacceptable toxicity. The
  lead-in mitigates dizziness and other CNS adverse effects (BID
  start without lead-in significantly worsens neurologic AE). Take
  with or without food (modest effect). Dose level -1 = 120 mg BID;
  -2 = 80 mg BID; -3 = 80 mg daily; permanent discontinuation if
  recurrent G3-4. Avoid in severe hepatic impairment.

formulations:
  - "Capsules 40 mg"
  - "Capsules 160 mg"

absolute_contraindications:
  - "Hypersensitivity to repotrectinib or any excipient"
  - "Pregnancy (embryo-fetal toxicity)"

black_box_warnings: []

common_adverse_events:
  - "Dizziness ~63% (CNS class — mitigated by lead-in)"
  - "Dysgeusia ~50%"
  - "Paresthesia ~30%"
  - "Constipation ~36%"
  - "Fatigue ~30%"
  - "Ataxia / gait disturbance ~28%"
  - "Cognitive impairment (mild — slowed thinking, memory) ~20%"
  - "Anemia ~30%"
  - "Nausea ~25%"
  - "Muscular weakness ~22%"
  - "Increased AST/ALT ~30%"
  - "Increased CK ~25%"

serious_adverse_events:
  - "Severe CNS effects — cognitive impairment, mood disorder, ataxia, sleep disorder (G3 ~5%; require dose reduction or hold)"
  - "ILD / pneumonitis (G3+ ~3%; immediately interrupt for new respiratory symptoms)"
  - "Hepatotoxicity (G3 ALT/AST ~3%)"
  - "Myalgia / CK elevation / rhabdomyolysis (rare)"
  - "Skeletal fractures (long-term, ROS1-TKI class — TRK signaling impacts bone homeostasis)"
  - "Hyperuricemia (~22%; tumor-lysis-like in high-burden disease)"
  - "QT prolongation (modest)"
  - "Vision disorder / blurred vision"

major_interactions:
  - "Strong CYP3A4 inhibitors (azoles, clarithromycin, ritonavir) — significantly ↑ exposure; avoid or reduce dose"
  - "Strong CYP3A4 inducers (rifampin, phenytoin, carbamazepine, St John's wort) — ↓ exposure; avoid"
  - "Moderate CYP3A4 inhibitors (diltiazem, fluconazole, erythromycin) — caution"
  - "P-gp substrates (digoxin, dabigatran) — repotrectinib is a P-gp inhibitor"
  - "Hormonal contraception — efficacy may be reduced; non-hormonal backup advised"

pharmacology:
  half_life_hours: 30
  clearance: "hepatic"
  protein_binding_pct: 95
  metabolism: "CYP3A4 (predominant)"

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  Lead-in dosing schedule (14 days at 160 mg daily before BID) is
  critical — initiating at the full BID dose causes substantially
  more dizziness, ataxia, and cognitive AEs. Active against G2032R
  ROS1 (the dominant crizotinib-resistance mutation) and against
  G595R/G623R NTRK solvent-front mutations — making it the preferred
  agent post-crizotinib (ROS1) or post-larotrectinib/entrectinib
  (NTRK). CNS adverse events typically peak first weeks and improve
  with dose adjustments. Counsel patients on driving / operating
  machinery. Baseline workup: LFTs, CK, urate, ECG, brain MRI
  (baseline for ROS1+/NTRK+ given high CNS metastasis incidence),
  pregnancy test. Monitor LFTs q2 wks first 8 wks then monthly,
  uric acid first cycle, neurologic exam each visit. In contemporary
  practice repotrectinib has displaced crizotinib for ROS1 1L where
  access permits (TRIDENT-1 mPFS not reached vs crizotinib historical
  ~19 mo).
