id: DRUG-RIBOCICLIB
names:
  preferred: "Ribociclib"
  ukrainian: "Рибоцикліб"
  english: "Ribociclib"
  brand_names: ["Kisqali"]
atc_code: L01EF02
rxnorm_id: null
drug_class: "CDK4/6 inhibitor"
mechanism: >
  CDK4/6 inhibitor with established OS benefit in metastatic HR+/HER2- (MONALEESA-2/3/7) AND adjuvant high-risk early breast (NATALEE).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: false
    last_verified: null
    notes: "Registered; reimbursement varies. Out-of-pocket cost orientation similar to palbociclib."

typical_dosing: >
  Metastatic: 600 mg PO once daily, days 1-21 of 28-day cycle. Adjuvant (NATALEE): 400 mg PO once daily, same schedule, for 3 years.

key_toxicities:
  - Same neutropenia profile as palbociclib
  - QT prolongation — baseline + serial ECG required; avoid concomitant QT-prolonging drugs
  - Hepatotoxicity (~10% G3+) — monthly LFT first 6 months
  - Diarrhea, nausea, fatigue, hot flashes

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed: null
notes: >
  Best OS data among CDK4/6i in metastatic. NATALEE trial established 3-year adjuvant role for high-risk N+ HR+/HER2- early breast — potential standard-of-care shift.
