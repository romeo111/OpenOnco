id: DRUG-RITUXIMAB
names:
  preferred: "Rituximab"
  ukrainian: "Ритуксимаб"
  english: "Rituximab"
  brand_names:
    - "Rituxan"
    - "MabThera"
    - "Truxima"
    - "Ruxience"
atc_code: L01FA01
rxnorm_id: "198141"
drug_class: "Anti-CD20 monoclonal antibody"
mechanism: >
  Chimeric monoclonal antibody targeting CD20 on B lymphocytes;
  depletes CD20+ B cells via ADCC, CDC, and direct apoptosis.

regulatory_status:
  fda:
    approved: true
    first_approval_year: 1997
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: "[TBD — to be populated by Держреєстр ЛЗ lookup]"
    reimbursed_nszu: true
    reimbursement_indications:
      - "Дифузна великоклітинна B-клітинна лімфома"
      - "Фолікулярна лімфома"
      - "Лімфома маргінальної зони (згідно з НСЗУ переліком)"
    last_verified: "2026-04-24"

typical_dosing: "375 mg/m² IV weekly × 4 induction, then maintenance per regimen"
formulations:
  - "IV infusion 10 mg/mL (100 mg / 500 mg vials)"
  - "SC 1400 mg / 1600 mg fixed-dose (where approved)"

absolute_contraindications:
  - "Hypersensitivity to rituximab or any component"
  - "Active severe infection"
  - "Active hepatitis B without antiviral prophylaxis (reactivation risk)"
black_box_warnings:
  - "Fatal infusion reactions"
  - "Severe mucocutaneous reactions"
  - "Hepatitis B virus reactivation"
  - "Progressive multifocal leukoencephalopathy (PML)"
major_interactions: []
common_adverse_events:
  - "Infusion reactions"
  - "Fever, chills"
  - "Fatigue"
  - "Lymphopenia"
serious_adverse_events:
  - "HBV reactivation"
  - "PML (rare)"
  - "Tumor lysis syndrome (first dose, high tumor burden)"

sources:
  - SRC-ESMO-MZL-2024
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-24"
notes: >
  Foundation anti-CD20 therapy in B-cell lymphomas. For HCV-MZL,
  reserved for cases not responding to antiviral therapy alone, or
  aggressive phenotype where immediate cytoreduction is indicated.
