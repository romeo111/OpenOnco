id: DRUG-RUXOLITINIB
names:
  preferred: "Ruxolitinib"
  ukrainian: "Руксолітиніб"
  english: "Ruxolitinib"
  brand_names: ["Jakafi", "Jakavi"]
atc_code: L01EJ01
rxnorm_id: "1322001"
drug_class: "JAK1/JAK2 inhibitor"
mechanism: >
  Selective JAK1/JAK2 inhibitor. Blocks JAK-STAT signaling driven by
  JAK2 V617F (and CALR/MPL via JAK2 dimerization). Reduces splenomegaly +
  symptoms in MF/PV/ET; does not eliminate clone. Backbone of MF
  symptom-driven therapy.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-27"

    reimbursement_indications:
    - 'Програма медичних гарантій 2026: первинний мієлофіброз (PMF) проміжний-2/високий ризик (DIPSS)'
    - 'Програма медичних гарантій 2026: пост-ПВ/пост-ЕТ мієлофіброз'
    - 'Реімбурсаційний пакет «Онкологія» 2026: справжня поліцитемія (PV) резистентна/непереносна до hydroxyurea'
    notes: 'Зареєстрований; НСЗУ покриває MF (PMF, post-PV/ET) та PV 2L після HU. GVHD — частково. Джерело: nszu.gov.ua (2026-04).'
typical_dosing: >
  MF: 5-20 mg PO BID by baseline platelet count (plt 50-100K → 5 mg BID;
  100-200K → 15 mg BID; >200K → 20 mg BID). Titrate by toxicity.
  PV (HU-resistant/intolerant): start 10 mg BID; titrate to Hct <45%.
  GVHD: 5-10 mg BID.
formulations: ["Tablets 5 / 10 / 15 / 20 / 25 mg"]

absolute_contraindications:
- "Pregnancy"
- "Hypersensitivity"
black_box_warnings:
- "Serious infections (TB, viral reactivation)"
- "Withdrawal syndrome on abrupt discontinuation (cytokine rebound, splenomegaly flare, sometimes life-threatening)"
major_interactions:
- "Strong CYP3A4 inhibitors / inducers — dose adjust"
- "Fluconazole (dose reduce)"
common_adverse_events:
- "Anemia / thrombocytopenia (dose-dependent, expected)"
- "Bruising"
- "Headache"
- "Dizziness"
- "Infections (zoster reactivation)"
- "Weight gain"
serious_adverse_events:
- "Severe infection (sepsis, TB reactivation, opportunistic)"
- "Withdrawal cytokine storm (must taper, not abrupt stop)"
- "Non-melanoma skin cancers (long-term)"
- "Severe cytopenias requiring transfusion"

pharmacology: {half_life: "~3 hours; CYP3A4 substrate"}

sources:
- SRC-NCCN-MPN-2025
- SRC-COMFORT-I-VERSTOVSEK-2012
- SRC-RESPONSE-VANNUCCHI-2015

last_reviewed: "2026-04-25"
notes: >
  Established efficacy in symptomatic MF (COMFORT-I/II — improves spleen
  volume + symptoms + may extend OS in pooled analyses) and HU-resistant
  PV (RESPONSE — Hct + spleen response). NEVER abrupt-stop — taper over
  ≥1-2 weeks. HBV / HSV / TB screening before initiation. Anemia is
  predictable and usually managed with dose modification ± transfusion;
  momelotinib is preferred if anemia is dominant problem.
