id: DRUG-SELPERCATINIB
names:
  preferred: "Selpercatinib"
  ukrainian: "Селперкатиніб"
  english: "Selpercatinib"
  brand_names: ["Retevmo"]
atc_code: L01EX22
rxnorm_id: null
drug_class: "RET-selective TKI"
mechanism: >
  Highly selective RET inhibitor. LIBRETTO-001: ORR ~85% in 1L RET-fusion+ NSCLC. Tumor-agnostic for RET-fusion / RET-mutant cancers (also MTC, papillary thyroid).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      RET-інгібітор для RET-fusion NSCLC, RET-mutant MTC, RET-fusion solid tumors;
      не входить до НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP Eli Lilly Ukraine (Retsevmo access program — потребує
        підтвердженого RET-fusion/mutation NGS).
      - Cross-border (EU): EU онкоцентри через "Лікування за кордоном"
        (наказ МОЗ 988); SoC у багатьох EU країнах.
      - Trial-only: LIBRETTO-серія активна в EU.
      Source: drlz.com.ua пошук "selpercatinib"/"retsevmo" 2026-04-27 — РП відсутнє.

typical_dosing: >
  160 mg PO BID (≥50 kg) or 120 mg BID (<50 kg) with food.

key_toxicities:
  - Hypertension (~40%)
  - Hepatotoxicity
  - QT prolongation
  - Hemorrhage
  - Hypersensitivity

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed: null
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_14c
draft_revision: 2
notes: >
  RET-fusion NSCLC 1L+. High response rate transformative for this rare driver.
notes_ua: >
  Селперкатиніб (selpercatinib) застосовується при RET-fusion-
  позитивному НДРЛ, починаючи з першої лінії та далі. Висока
  частота відповіді є трансформативною для цього рідкісного
  драйверного варіанту захворювання.
