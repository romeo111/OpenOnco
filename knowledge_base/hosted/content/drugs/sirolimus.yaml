id: DRUG-SIROLIMUS
names:
  preferred: "Sirolimus"
  ukrainian: "Сіролімус"
  english: "Sirolimus"
  synonyms: ["rapamycin", "AY-9944"]
  brand_names: ["Rapamune"]
atc_code: L04AA10
rxnorm_id: null
drug_class: "mTOR inhibitor (mTORC1 inhibitor; macrolide immunosuppressant)"
mechanism: >
  Sirolimus binds FKBP12 (FK506-binding protein 12) to form a complex that inhibits
  mTORC1 (mechanistic target of rapamycin complex 1). mTORC1 phosphorylates downstream
  targets (S6K1, 4E-BP1) controlling cell growth, proliferation, and protein synthesis.
  In LAM, TSC1 or TSC2 loss-of-function mutations lead to Rheb-mediated mTORC1
  hyperactivation, driving abnormal mTOR-dependent smooth-muscle-like LAM cell
  proliferation in the lung. Sirolimus suppresses this mTORC1 hyperactivation,
  reducing LAM cell proliferation and lung function decline. Sirolimus does NOT eliminate
  LAM cells — it suppresses their activity. When discontinued, LAM progression resumes
  (MILES 12-month observation phase).
  Also used as immunosuppressant post-organ transplant (not covered here).

regulatory_status:
  fda:
    approved: true
    indication_summary: >
      Lymphangioleiomyomatosis (LAM) in adults (FDA May 2015; MILES trial).
      Also: prophylaxis of organ rejection in renal transplantation; sirolimus-eluting
      coronary stents. (LAM indication added 2015 to existing transplant approval.)
  ema:
    approved: true
    indication_summary: >
      LAM in adults (EMA 2017; extended from transplant indications).
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: ["Organ transplant (immunosuppression)"]
    last_verified: "2026-05-04"
    notes: |
      Зареєстровано в Україні (переважно для трансплантації органів).
      НСЗУ не відшкодовує сіролімус для ЛАМ (ЛАМ — не в переліку покриття НСЗУ 2026).
      Для ЛАМ: off-label відносно реєстраційного показання в Україні; доступ через
      механізм off-label призначення (Наказ МОЗ №360 / §14 Закону про ліки).
      Доступний через аптеки (дженерики) за власний рахунок. Оцінка: ~USD 500–2000/міс
      залежно від дженерика. Набагато доступніший, ніж TGCT/BCC препарати.

typical_dosing: >
  LAM indication: starting dose 2 mg PO once daily; titrate to target trough level
  5–15 ng/mL. Check trough level 5–7 days after any dose change; dose adjustments
  in 0.5–1 mg increments. Continuous therapy — do NOT discontinue if clinical benefit
  (progressive disease returns on stopping, per MILES observation phase).
  Administration: consistent timing once daily, WITH or WITHOUT food (but consistently
  the same way; food increases Cmax). Avoid grapefruit juice (CYP3A4 inhibition).
formulations: ["Tablets 0.5 mg, 1 mg, 2 mg", "Oral solution 1 mg/mL"]

absolute_contraindications:
  - "Hypersensitivity to sirolimus, rapamycin, or any component of the formulation"
  - "Pregnancy — embryo-fetal toxicity; mandatory contraception. Do NOT start without confirmed negative pregnancy test in LAM patients (women affected almost exclusively)."

relative_contraindications:
  - "Severe hepatic impairment (Child-Pugh C) — sirolimus hepatically metabolized; significantly increased exposure"
  - "Active/recent severe infection — immunosuppressant properties (dose-dependent)"
  - "Concurrent strong CYP3A4 inhibitors (ketoconazole, voriconazole, clarithromycin): dramatically increase sirolimus trough — dose reduce and monitor closely"
  - "Concurrent strong CYP3A4 inducers (rifampicin, carbamazepine, phenytoin): reduce sirolimus trough to sub-therapeutic — avoid or increase dose with careful monitoring"
  - "Concurrent high-dose corticosteroids — additive immunosuppression"
  - "Non-healing wounds / recent major surgery — sirolimus impairs wound healing (hold peri-operatively)"

key_adverse_effects:
  - "Mouth ulcers/stomatitis — ~40-44% (most common; usually manageable with topical triamcinolone)"
  - "Infections (respiratory, urinary) — immunosuppressive effect; monitor for opportunistic infections"
  - "Hyperlipidemia (elevated triglycerides and LDL) — ~20-30%; dietary management; statin if significant"
  - "Acne/skin rash — ~20%"
  - "Peripheral edema — ~15%"
  - "Nausea, diarrhea — ~15% each"
  - "Headache — ~12%"
  - "Interstitial pneumonitis — ~1-2% (rare but serious; hold sirolimus if suspected; usually resolves)"
  - "Wound healing impairment — relevant peri-operatively"
  - "Amenorrhea/menstrual irregularity — LAM population (women); discuss reproductive planning"

drug_drug_interactions:
  - "CYP3A4 inhibitors (azoles, macrolides, diltiazem, verapamil, grapefruit juice): increase sirolimus trough levels — reduce sirolimus dose; monitor trough"
  - "CYP3A4 inducers (rifampin, phenytoin, carbamazepine, St John's Wort): decrease sirolimus trough — increase dose; monitor trough"
  - "Cyclosporine (transplant co-medication): pharmacokinetic interaction — dose-adjust sirolimus; generally not used in LAM setting"
  - "Vaccine interactions: live vaccines contraindicated (immunosuppressive); inactivated vaccines may have reduced immunogenicity"

monitoring_requirements:
  - "Sirolimus trough level: check 5–7 days post dose change; target 5–15 ng/mL for LAM (MILES protocol)"
  - "Pulmonary function tests (FEV1, FVC, DLCO): baseline + q3–6 months"
  - "VEGF-D: baseline + q6–12 months (correlates with LAM disease burden; may indicate response)"
  - "HRCT chest: baseline + annually or if clinical change"
  - "Lipid panel: baseline + q3–6 months (hyperlipidemia monitoring)"
  - "CBC: baseline + q3 months (cytopenias rare but possible)"
  - "LFTs: baseline + q3–6 months"
  - "Pregnancy test: before starting; monthly during therapy (females of reproductive potential)"
  - "Blood pressure: baseline + q3 months (hypertension can occur)"

sources:
  - SRC-MILES-MCCORMACK-2011

last_reviewed: "2026-05-04"
reviewers: []
reviewer_signoffs: 0
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  STUB — pending Clinical Co-Lead sign-off. Authored 2026-05-04 (Workstream DJ).
  Only FDA-approved drug for LAM. Ukraine: registered (transplant indication); off-label
  for LAM but accessible and relatively affordable compared to TGCT/BCC agents.
  Note: everolimus (Afinitor) is approved for TSC-associated conditions including LAM
  in some jurisdictions (EMA); used when sirolimus not available.
  Sirolimus is NOT the same as temsirolimus (IV; oncology use) or everolimus (oral analog).
