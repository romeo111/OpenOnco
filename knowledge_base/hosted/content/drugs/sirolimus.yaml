id: DRUG-SIROLIMUS
names:
  preferred: "Sirolimus (Rapamycin)"
  ukrainian: "Сіролімус (Рапаміцин)"
  english: "Sirolimus"
  brand_names: ["Rapamune"]
atc_code: L04AA10
rxnorm_id: "42316"
drug_class: "mTOR inhibitor (mTORC1 — rapamycin analog, first-generation)"
mechanism: >
  Sirolimus (rapamycin) binds FKBP-12 and the sirolimus-FKBP12 complex
  inhibits mTORC1, blocking downstream S6K1 and 4E-BP1 signaling → reduced
  cell proliferation, protein synthesis, and autophagy suppression. In LAM,
  TSC1/TSC2 loss leads to mTORC1 hyperactivation → excessive LAM cell
  proliferation. MILES trial: sirolimus stabilized FEV1, improved functional
  performance, and reduced VEGF-D. FDA-approved for LAM 2015.

regulatory_status:
  fda:
    approved: true
    notes: "FDA approved for LAM (2015) based on MILES trial"
  ema:
    approved: true
    notes: "EMA approved for LAM"
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-05-04"
    notes: |
      Сіролімус (Rapamune) зареєстровано в Україні як імуносупресант для
      трансплантації органів. Для ЛАМ — off-label, НСЗУ не покриває цей
      показник; доступ через out-of-pocket або compassionate use.
      Генерики сіролімусу присутні на ринку — може знизити вартість.
      Source: Держреєстр ЛЗ — Rapamune зареєстровано; дані перевірено 2026-05-04.

typical_dosing: >
  LAM (MILES trial dosing): target trough level 5–15 ng/mL; start 2 mg
  PO once daily and titrate. Monitor trough levels at 1–2 weeks after
  each dose change. VEGF-D ≥800 pg/mL at baseline predicts response.
formulations: ["Tablet 1 mg, 2 mg", "Oral solution 1 mg/mL"]

absolute_contraindications:
  - "Known hypersensitivity to sirolimus"
black_box_warnings:
  - "Immunosuppression — increased infection risk; do not use with cyclosporine without dose reduction"
  - "Non-infectious pneumonitis — monitor for pulmonary symptoms"
major_interactions:
  - "Strong CYP3A4/P-gp inhibitors (e.g., voriconazole, ketoconazole): markedly increase sirolimus — avoid or reduce dose 90%"
  - "Strong CYP3A4 inducers (e.g., rifampicin): markedly reduce sirolimus — avoid"
  - "Calcineurin inhibitors (cyclosporine, tacrolimus): nephrotoxicity interaction"
  - "Grapefruit juice: inhibits CYP3A4 — avoid"
common_adverse_events:
  - "Stomatitis / mouth ulcers (~44%) — class mTOR effect"
  - "Infections (upper respiratory, urinary tract)"
  - "Dyslipidemia (hypercholesterolemia, hypertriglyceridemia)"
  - "Peripheral edema"
  - "Nausea / diarrhea"
  - "Menstrual irregularities"
  - "Acneiform rash"
  - "Impaired wound healing"
serious_adverse_events:
  - "Non-infectious pneumonitis (mTOR class effect; HRCT if new pulmonary symptoms)"
  - "Serious infections (bacterial, fungal, viral)"
  - "Embryo-fetal toxicity"
  - "Lymphedema exacerbation"

pharmacology:
  half_life: "~62 hours; CYP3A4/P-gp substrate"

sources:
  - SRC-MILES-MCCORMACK-2011

last_reviewed: "2026-05-04"
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_14c
draft_revision: 2
notes: >
  MILES trial (McCormack 2011 NEJM): sirolimus vs placebo in LAM with
  FEV1 <70% predicted or declining lung function (n=89). Primary endpoint:
  FEV1 rate of change — sirolimus arm stable (±1.0 mL/mo) vs placebo
  declining (−12 mL/mo, p<0.001). Secondary: improved DLCO, 6MWD, VEGF-D
  reduction. FDA approved sirolimus for LAM 2015. Note: benefits are
  stabilizing (not curative) and may not persist after stopping. Serum
  VEGF-D ≥800 pg/mL identifies patients most likely to respond and can
  also confirm LAM diagnosis (avoiding biopsy). Everolimus (another mTORC1
  inhibitor) is used for TSC-related SEGA and renal AML; sirolimus is
  preferred for LAM-specific indication based on MILES data.
notes_ua: >
  Дослідження MILES (McCormack 2011, NEJM): сіролімус (sirolimus)
  проти плацебо у пацієнтів з лімфангіолейоміоматозом (LAM) при
  ОФВ1 нижче 70% від належного або при прогресуючому зниженні
  функції зовнішнього дихання (n=89). Первинна кінцева точка —
  швидкість зміни ОФВ1: у групі сіролімусу показник був
  стабільним (±1.0 mL/місяць) проти зниження у групі плацебо
  (−12 mL/місяць, p<0.001). Вторинні точки: покращення дифузійної
  здатності легень за CO (DLCO), результатів тесту 6-хвилинної
  ходьби та зниження рівня VEGF-D. Сіролімус схвалено FDA для
  лікування LAM у 2015 році. Слід враховувати, що ефект є
  стабілізуючим (не куративним) і може не зберігатися після
  припинення прийому препарату. Рівень VEGF-D у сироватці
  ≥800 pg/mL виявляє пацієнтів з найвищою ймовірністю відповіді,
  а також може підтвердити діагноз LAM (дозволяючи уникнути
  біопсії). Еверолімус — інший інгібітор mTORC1 — застосовується
  при субепендимальній гігантоклітинній астроцитомі (SEGA) та
  ангіоміоліпомі нирки на тлі туберозного склерозу (TSC); для
  специфічного показання LAM препаратом вибору є сіролімус
  на підставі даних MILES.
