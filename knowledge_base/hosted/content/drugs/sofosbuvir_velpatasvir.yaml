id: DRUG-SOFOSBUVIR-VELPATASVIR
names:
  preferred: "Sofosbuvir/Velpatasvir"
  ukrainian: "Софосбувір/Велпатасвір"
  english: "Sofosbuvir/Velpatasvir"
  synonyms:
    - "SOF/VEL"
  brand_names:
    - "Epclusa"
atc_code: J05AP55
rxnorm_id: "1731314"
drug_class: "Pan-genotypic direct-acting antiviral (DAA) — NS5B + NS5A inhibitor"
mechanism: >
  Fixed-dose combination: sofosbuvir is an NS5B polymerase inhibitor,
  velpatasvir is an NS5A replication complex inhibitor. Pan-genotypic
  activity against HCV genotypes 1-6.

regulatory_status:
  fda:
    approved: true
    first_approval_year: 2016
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Лікування HCV-інфекції до/під час імуносупресивної терапії (HCV-MZL — пангенотиповий режим)"
    last_verified: "2026-04-27"
typical_dosing: "400/100 mg PO daily × 12 weeks (treatment-naive, no cirrhosis or compensated)"
formulations:
  - "Oral tablet 400 mg sofosbuvir / 100 mg velpatasvir"

absolute_contraindications:
  - "Use with strong P-gp / CYP3A inducers (rifampin, St. John's wort, carbamazepine)"
  - "Hypersensitivity"
black_box_warnings:
  - "Risk of HBV reactivation in HCV/HBV coinfected patients"
major_interactions:
  - "Amiodarone + sofosbuvir: severe bradycardia"
  - "P-gp inducers: reduced velpatasvir exposure"
  - "Acid-reducing agents: reduced velpatasvir exposure (spacing required)"
common_adverse_events:
  - "Fatigue"
  - "Headache"
  - "Nausea"
serious_adverse_events:
  - "Bradycardia (with amiodarone)"
  - "HBV reactivation"

sources:
  - SRC-EASL-HCV-2023

last_reviewed: "2026-04-24"
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_14c
draft_revision: 2
notes: >
  Primary DAA regimen for pan-genotypic HCV treatment. SVR12 (cure)
  rate >95% in non-cirrhotic; 85-95% in decompensated cirrhosis (with
  ribavirin). Cornerstone of antiviral-first strategy for HCV-MZL.
notes_ua: >
  Основний режим прямих противірусних препаратів (DAA) для
  пангенотипового лікування HCV-інфекції. Частота стійкої
  вірусологічної відповіді через 12 тижнів (SVR12, фактично
  одужання) перевищує 95% у пацієнтів без цирозу та становить
  85-95% при декомпенсованому цирозі (у комбінації з рибавірином).
  Препарат є основою стратегії «противірусна терапія першою лінією»
  при HCV-асоційованій лімфомі маргінальної зони (HCV-MZL).
