id: DRUG-SOFOSBUVIR-VELPATASVIR-VOXILAPREVIR
names:
  preferred: "Sofosbuvir/Velpatasvir/Voxilaprevir"
  ukrainian: "Софосбувір/Велпатасвір/Вокспілапревір"
  english: "Sofosbuvir/Velpatasvir/Voxilaprevir"
  synonyms:
    - "SOF/VEL/VOX"
    - "Vosevi"
  brand_names:
    - "Vosevi"
atc_code: J05AP58
rxnorm_id: "1999561"
drug_class: "Pan-genotypic direct-acting antiviral (DAA) — NS5B + NS5A + NS3/4A triple-class inhibitor"
mechanism: >
  Fixed-dose triple combination: sofosbuvir (NS5B polymerase inhibitor) +
  velpatasvir (NS5A replication complex inhibitor) + voxilaprevir (NS3/4A
  protease inhibitor). Triple-class coverage provides rescue activity against
  NS5A-resistant variants that fail SOF/VEL or other single/dual-class DAA
  regimens. Pan-genotypic against HCV genotypes 1-6.

regulatory_status:
  fda:
    approved: true
    first_approval_year: 2017
    indication_summary: >
      Adults with HCV genotypes 1-6: (1) previously treated with NS5A-containing
      regimen; (2) genotype 1a or 3 previously treated with SOF-containing
      regimen without an NS5A inhibitor.
  ema:
    approved: true
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-05-11"
    availability_note: >
      Vosevi not registered or reimbursed in Ukraine as of 2026-05-11.
      Glecaprevir/pibrentasvir (GLE/PIB; Mavyret) is the preferred NS5A+NS3/4A
      rescue option available in the Ukrainian national DAA program.
typical_dosing: "400/100/100 mg PO once daily × 12 weeks"
formulations:
  - "Oral tablet: sofosbuvir 400 mg / velpatasvir 100 mg / voxilaprevir 100 mg"

absolute_contraindications:
  - "Co-administration with rifampin or other strong P-gp / CYP3A inducers (St. John's wort, carbamazepine, phenytoin) — reduces voxilaprevir and velpatasvir exposure dramatically"
  - "Co-administration with atazanavir — increases voxilaprevir AUC ~7-fold"
  - "Hypersensitivity to any component"
  - "Decompensated cirrhosis (Child-Pugh B/C) — protease inhibitor (voxilaprevir) contraindicated in hepatic decompensation"
black_box_warnings:
  - "Risk of HBV reactivation in HCV/HBV coinfected patients — test for HBsAg before treatment; monitor or initiate HBV antiviral prophylaxis"
major_interactions:
  - "Amiodarone + sofosbuvir: severe/fatal bradycardia — contraindicated"
  - "Rosuvastatin: voxilaprevir inhibits BCRP/P-gp → rosuvastatin AUC ↑8-fold; avoid or use lowest dose with monitoring"
  - "Dabigatran: P-gp inhibition → increased dabigatran exposure; use with caution"
  - "Oral contraceptives containing ethinyl estradiol: use only if no alternative (risk of ALT elevation)"
  - "Acid-reducing agents (PPIs): reduce velpatasvir absorption — take SOF/VEL/VOX with food; avoid omeprazole >20 mg; H2-blockers acceptable with spacing"
common_adverse_events:
  - "Headache"
  - "Fatigue"
  - "Diarrhea"
  - "Nausea"
serious_adverse_events:
  - "HBV reactivation (potentially fatal if unrecognized)"
  - "Symptomatic bradycardia (with amiodarone co-administration)"

sources:
  - SRC-EASL-HCV-2023

last_reviewed: "2026-05-11"
reviewer_signoffs: 2
reviewers: [clinical-co-lead-signoff-2026-05-11]
ukrainian_review_status: clinical_signoff_received
notes: >
  Triple-class DAA rescue regimen (POLARIS-1/POLARIS-4 trials). POLARIS-1
  (NS5A inhibitor-experienced): SVR12 96.3% vs 0% with placebo. POLARIS-4
  (DAA-experienced, no prior NS5A inhibitor): SVR12 97.6%. Genotype 3 with
  prior NS5A failure: SVR12 91-96%. Indicated specifically for DAA-experienced
  SVR12 failure with confirmed or suspected NS5A resistance-associated
  substitutions (RAS); confirmation of NS5A RAS is recommended but not
  required per EASL 2023 (empirical use acceptable when RAS testing
  unavailable).
  Ukraine: Vosevi not in national program — GLE/PIB (Mavyret) covers most
  NS5A+NS3 dual-class rescue scenarios and is nationally reimbursed; use
  GLE/PIB as first choice per IND-HCV-MZL-2L-DAA-RETREATMENT rationale.
