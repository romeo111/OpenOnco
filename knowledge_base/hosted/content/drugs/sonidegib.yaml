id: DRUG-SONIDEGIB
names:
  preferred: "Sonidegib"
  english: "Sonidegib"
  synonyms: ["LDE225", "sonidegib phosphate"]
  brand_names: ["Odomzo"]
atc_code: L01XJ02
rxnorm_id: ""
drug_class: "Hedgehog pathway inhibitor; SMO antagonist"
mechanism: >
  Small-molecule antagonist of Smoothened (SMO), blocking Hedgehog pathway
  signaling in tumors with pathway activation such as locally advanced BCC.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2015
    indications_brief:
      - "Adults with locally advanced BCC that recurred after surgery or radiation therapy or who are not candidates for surgery or radiation therapy"
  ema: null
  ukraine_registration: null

typical_dosing: >
  200 mg orally once daily on an empty stomach, at least 1 hour before or
  2 hours after a meal, until disease progression or unacceptable toxicity.
formulations:
  - "200 mg oral capsule"

absolute_contraindications: []
black_box_warnings:
  - "Embryo-fetal toxicity; can cause embryo-fetal death or severe birth defects"
major_interactions:
  - "Avoid pregnancy exposure; contraception and reproductive-risk counseling required per label"
  - "Avoid strong CYP3A inhibitors or inducers when possible; adjust or interrupt per label"
common_adverse_events:
  - "Muscle spasms"
  - "Alopecia"
  - "Dysgeusia"
  - "Nausea"
  - "Diarrhea"
  - "Fatigue"
  - "Creatine kinase elevation"
serious_adverse_events:
  - "Severe musculoskeletal adverse reactions"
  - "Creatine kinase elevation with renal-risk monitoring"
  - "Rhabdomyolysis"

pharmacology: null

sources:
  - SRC-FDA-ODOMZO-LABEL-2024
  - SRC-BOLT-MIGDEN-2015
  - SRC-NCCN-SKIN-2025
last_reviewed: "2026-05-07"
reviewers: []
notes: >
  Draft drug entity added to close the BCC regimen-component gap. FDA label
  scope is locally advanced BCC; metastatic BCC should not inherit this row as
  labeled therapy without a separate source-backed review.
