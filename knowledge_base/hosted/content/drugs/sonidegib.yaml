id: DRUG-SONIDEGIB
names:
  preferred: "Sonidegib"
  ukrainian: "Сонідегіб"
  english: "Sonidegib"
  brand_names: ["Odomzo"]
atc_code: L01XX51
rxnorm_id: "1734977"
drug_class: "Hedgehog pathway inhibitor (SMO antagonist)"
mechanism: >
  Oral SMO (Smoothened) antagonist; second-in-class after vismodegib.
  Same mechanism: blocks SMO-mediated HH signaling, preventing GLI1/GLI2
  activation. BOLT trial established 200 mg daily as the approved dose
  (vs 800 mg — superior tolerability, maintained efficacy). ORR ~58%
  in laBCC (BOLT 200 mg, 30-month update). FDA-approved 2015.

regulatory_status:
  fda:
    approved: true
  ema:
    approved: true
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-05-04"
    notes: |
      Не зареєстровано в Україні (Держреєстр ЛЗ — РП відсутнє станом на
      2026-05-04). Інгібітор HH-шляху для місцево-поширеного БКК (ліцензія
      FDA/EMA — лише laBCC, не metastatic BCC). Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - Cross-border (EU): EU онкоцентри через "Лікування за кордоном"
        (наказ МОЗ 988).
      Source: drlz.com.ua пошук "sonidegib"/"odomzo" 2026-05-04 — РП відсутнє.

typical_dosing: "200 mg PO once daily on an empty stomach (≥1 h before or ≥2 h after food). Continuous until progression or unacceptable toxicity."
formulations: ["Capsule 200 mg"]

absolute_contraindications:
  - "Pregnancy (teratogenic — embryo-fetal toxicity; Black Box Warning)"
  - "Breastfeeding"
black_box_warnings:
  - "Embryo-fetal toxicity — teratogenic, embryotoxic; contraindicated in pregnancy; two contraceptive methods required in females of reproductive potential"
major_interactions:
  - "Strong CYP3A4 inhibitors (e.g., ketoconazole): increase sonidegib exposure — avoid; if unavoidable, reduce dose"
  - "Strong CYP3A4 inducers (e.g., rifampicin): decrease sonidegib — avoid"
common_adverse_events:
  - "Muscle spasms (~54%) — class effect; dose-limiting"
  - "Alopecia (~53%)"
  - "Dysgeusia (~46%)"
  - "Elevated CK (~61% — musculoskeletal toxicity marker)"
  - "Fatigue (~41%)"
  - "Nausea / vomiting"
  - "Elevated lipase / amylase"
  - "Weight loss"
  - "Amenorrhea"
serious_adverse_events:
  - "Embryo-fetal toxicity"
  - "Rhabdomyolysis (rare; monitor CK — hold if CK >2.5× ULN with symptoms; discontinue if rhabdomyolysis)"
  - "Severe renal impairment (secondary to rhabdomyolysis)"

pharmacology:
  half_life: "~28 days (very long; CYP3A4 substrate)"

sources:
  - SRC-NCCN-SKIN-2025

last_reviewed: "2026-05-04"
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_14c
draft_revision: 2
notes: >
  BOLT trial (Migden 2015 Lancet Oncol): 200 mg vs 800 mg daily in laBCC;
  both arms efficacious but 800 mg had significantly more musculoskeletal
  toxicity. 200 mg approved for locally advanced BCC (not metastatic BCC —
  FDA labeling restricted to laBCC). NCCN endorses sonidegib as an alternative
  to vismodegib for laBCC. Very long half-life (~28 days) means AEs persist
  weeks after discontinuation; teratogenicity counseling required for
  ~20 months after last dose in females.
notes_ua: >
  Дослідження BOLT (Migden 2015, Lancet Oncol): сонідегіб
  (sonidegib) у дозах 200 mg проти 800 mg на добу при місцево-
  поширеному базальноклітинному раку шкіри (laBCC) — обидва
  режими ефективні, проте доза 800 mg супроводжувалася значно
  вищою опорно-руховою токсичністю. Доза 200 mg схвалена для
  місцево-поширеного BCC (НЕ для метастатичного BCC — маркування
  FDA обмежене laBCC). NCCN рекомендує сонідегіб як альтернативу
  вісмодегібу при laBCC. Дуже тривалий період напіввиведення
  (близько 28 днів) означає, що небажані явища зберігаються
  упродовж тижнів після припинення прийому; інформування жінок
  щодо тератогенного ризику необхідне упродовж близько 20 місяців
  після останньої дози.
