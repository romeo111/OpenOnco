id: DRUG-SORAFENIB
names:
  preferred: "Sorafenib"
  ukrainian: "Сорафеніб"
  english: "Sorafenib"
  brand_names: ["Nexavar"]
atc_code: L01EX02
rxnorm_id: "402268"
drug_class: "Multi-targeted oral tyrosine kinase inhibitor (VEGFR1-3, PDGFR-β, c-KIT, FLT3, RAF)"
mechanism: >
  Anti-angiogenic + anti-proliferative via Raf-MEK-ERK pathway. First
  systemic agent with OS benefit in advanced HCC (SHARP 2008). Now
  largely 2L after atezo+bev or durva+treme; remains relevant in
  Child-Pugh B / when ICI contraindicated.
regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    reimbursement_indications:
    - 'Програма медичних гарантій 2026: ГЦК Child-Pugh A нерезектабельна'
    - 'Реімбурсаційний пакет «Онкологія» 2026: НКК нирки прогресивний 2L+ (історично)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: радіойод-рефрактерний диференційований рак щитоподібної залози'
    last_verified: "2026-04-27"
    notes: 'Зареєстрований; НСЗУ покриває ГЦК, RCC 2L+, радіойод-рефрактерний DTC. Джерело: nszu.gov.ua (2026-04).'
typical_dosing: "400 mg PO BID (start 200 mg BID + escalate if tolerated)."
formulations: ["Tablets 200 mg"]
absolute_contraindications: ["Severe hepatic dysfunction (Child-Pugh C)", "Pregnancy"]
common_adverse_events: ["Hand-foot skin reaction (HFSR — distinct from 5-FU HFS)", "Diarrhea", "Hypertension", "Fatigue", "Weight loss", "Hypothyroidism"]
serious_adverse_events: ["Hepatic decompensation", "Severe HFSR with skin breakdown", "Hemorrhage (especially varices)", "Cardiac ischemia"]
sources: [SRC-NCCN-HCC-2025, SRC-AASLD-HCC-2023]
last_reviewed: "2026-04-26"
notes: >
  Child-Pugh A only fully studied (CP-B partial data; CP-C
  contraindicated). SHARP (NEJM 2008): first systemic agent with OS
  benefit in advanced HCC (mOS 10.7 vs 7.9 mo placebo); REFLECT
  established lenvatinib non-inferiority. Now largely 2L after
  atezo+bev or durva+treme; remains relevant in Child-Pugh B / when
  ICI contraindicated. HFSR pre-emptive: emollient, avoid friction
  and pressure, urea-containing creams as prophylaxis. Common dose-
  reduction: 400 → 200 mg BID for Grade 2-3 HFSR. Baseline + serial
  BP, LFTs, TSH, ECG. Hold for hypertensive crisis, severe HFSR with
  skin breakdown, hemorrhage, or hepatic decompensation. UA:
  зареєстрований; НСЗУ покриває ГЦК Child-Pugh A, RCC 2L+,
  радіойод-рефрактерний DTC.
