notes: >
  Child-Pugh A only fully studied (CP-B partial data; CP-C
  contraindicated). SHARP (NEJM 2008): first systemic agent with OS
  benefit in advanced HCC (mOS 10.7 vs 7.9 mo placebo); REFLECT
  established lenvatinib non-inferiority. Now largely 2L after
  atezo+bev or durva+treme; remains relevant in Child-Pugh B / when
  ICI contraindicated. HFSR pre-emptive: emollient, avoid friction
  and pressure, urea-containing creams as prophylaxis. Common dose-
  reduction: 400 → 200 mg BID for Grade 2-3 HFSR. Baseline + serial
  BP, LFTs, TSH, ECG. Hold for hypertensive crisis, severe HFSR with
  skin breakdown, hemorrhage, or hepatic decompensation. UA:
  зареєстрований; НСЗУ покриває ГЦК Child-Pugh A, RCC 2L+,
  радіойод-рефрактерний DTC.
notes_ua: >
  Сорафеніб (sorafenib) повністю вивчений лише у пацієнтів з
  Child-Pugh A (для Child-Pugh B наявні лише часткові дані;
  Child-Pugh C — протипоказання). Дослідження SHARP (NEJM 2008):
  перший системний препарат з доведеною перевагою за загальною
  виживаністю при поширеній гепатоцелюлярній карциномі (медіана
  загальної виживаності 10.7 проти 7.9 міс на плацебо); дослідження
  REFLECT встановило нон-інферіорність ленватинібу. У сучасній
  практиці сорафеніб переважно застосовується у другій лінії
  після атезолізумабу + бевацизумабу або дурвалумабу + тремелімумабу;
  залишається актуальним при Child-Pugh B та при протипоказаннях
  до інгібіторів імунних контрольних точок (ICI). Превентивна
  тактика щодо долонно-підошовної шкірної реакції (HFSR):
  пом’якшувальні засоби, уникнення тертя та тиску, креми з
  сечовиною як профілактика. Типова корекція дози: 400 → 200 mg
  двічі на добу при HFSR 2-3 ступеня. Базовий та серійний
  моніторинг: артеріальний тиск, печінкові проби, тиреотропний
  гормон, ЕКГ. Тимчасова відміна препарату при гіпертонічному
  кризі, тяжкому HFSR із порушенням цілісності шкіри, кровотечі
  або декомпенсації функції печінки. Україна: препарат зареєстрований;
  НСЗУ покриває ГЦК Child-Pugh A, нирково-клітинний рак у 2-й
  лінії та далі, а також радіойод-рефрактерний диференційований
  рак щитоподібної залози (DTC).
