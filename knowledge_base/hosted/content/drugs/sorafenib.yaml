drug_class: "Multi-targeted oral tyrosine kinase inhibitor (VEGFR1-3, PDGFR-β, c-KIT, FLT3, RAF)"
mechanism: >
  Anti-angiogenic + anti-proliferative via Raf-MEK-ERK pathway. First
  systemic agent with OS benefit in advanced HCC (SHARP 2008). Now
  largely 2L after atezo+bev or durva+treme; remains relevant in
  Child-Pugh B / when ICI contraindicated.
