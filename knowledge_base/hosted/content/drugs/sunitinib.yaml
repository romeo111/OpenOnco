notes: >
  Raymond 2011 NEJM: sunitinib 37.5 mg continuous vs placebo in progressive
  well-differentiated pNET (n=171). mPFS 11.4 vs 5.5 mo (HR 0.42, p<0.001).
  Trial stopped early at interim analysis. FDA approved sunitinib for pNET
  May 2011 (same month as everolimus). Continuous 37.5 mg dosing vs the
  on/off 50 mg schedule used in RCC: lower peak exposure, improved
  tolerability, maintained efficacy in pNET. Also approved for imatinib-
  resistant GIST (2006) and advanced RCC (2006).
notes_ua: >
  Дослідження Raymond 2011, NEJM: сунітиніб (sunitinib) у дозі
  37.5 mg безперервно проти плацебо у пацієнтів з прогресуючою
  високодиференційованою нейроендокринною пухлиною підшлункової
  залози (pNET, n=171). Медіана виживаності без прогресування
  11.4 проти 5.5 міс (HR 0.42, p<0.001). Дослідження було
  достроково зупинене на проміжному аналізі. FDA схвалила
  сунітиніб для лікування pNET у травні 2011 року (одночасно з
  еверолімусом). Безперервний режим у дозі 37.5 mg проти схеми
  50 mg за принципом 4 тижні прийому / 2 тижні перерви, яка
  застосовується при нирково-клітинному раку (RCC), забезпечує
  нижчу пікову експозицію, кращу переносимість при збереженій
  ефективності у pNET. Препарат також схвалений для лікування
  іматиніб-резистентної гастроінтестинальної стромальної пухлини
  (GIST, 2006 рік) та поширеного нирково-клітинного раку (2006).
