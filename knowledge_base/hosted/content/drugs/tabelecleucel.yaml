id: DRUG-TABELECLEUCEL
names:
  preferred: "Tabelecleucel"
  brand: ["Ebvallo"]
  ukrainian: "Табелеклейсел"
  synonyms: ["tab-cel", "ATA129", "allogeneic EBV-specific CTLs"]

drug_class: "Allogeneic EBV-specific cytotoxic T lymphocytes (CTLs)"
mechanism_of_action: >
  Tabelecleucel is an off-the-shelf, allogeneic, EBV-specific CTL product.
  CTLs are activated against EBV-infected B cells expressing LMP1/LMP2 and
  EBNA1 antigens. Unlike CAR-T, tabelecleucel is derived from healthy donor
  T cells (not patient-derived) — manufactured and banked; selected for
  HLA-match to patient. Mechanism: MHC-restricted cytotoxic T-cell killing
  of EBV-antigen-expressing PTLD cells.

atc_code: "L01XY01"

administration_routes: ["IV"]
standard_formulations:
  - "Ebvallo: single-dose vials; frozen; infused IV (specific lots selected per HLA match)"

primary_indications:
  - "Relapsed/refractory EBV+ PTLD (post-transplant lymphoproliferative disorder) after ≥1 prior therapy"
  - "Both solid organ transplant (SOT) recipients and hematopoietic cell transplant (HCT) recipients"

regulatory_approvals:
  fda: "November 2, 2022 (r/r EBV+ PTLD in SOT patients); expanded November 2023 (HCT patients)"
  ema: "August 2023 (adult and pediatric ≥2 years r/r EBV+ PTLD)"
  ukraine: "Not registered (international referral or compassionate use required)"

key_clinical_data:
  trial: "ALLELE (Phase 3; Prockop 2023 JCO)"
  orr_sot: "50% (SOT patients; N=43)"
  orr_hct: "33% (HCT patients)"
  cr_rate: "28% CR in SOT cohort"
  durability: "Median duration of response: 25.9 months in SOT cohort"

standard_dose:
  dose: "2×10^6 cells/kg (body weight-based)"
  schedule: "IV infusion weekly × 3 doses per cycle (days 1, 8, 15 of 21-day cycle)"
  administration: "IV over 15-30 minutes; no premedication required for first infusion"
  selection: "HLA-matched lot selected from tabelecleucel inventory (≥2/8 HLA match)"

dosing_in_pediatrics:
  notes: "FDA approved ≥2 years of age; weight-based dosing (same 2×10^6 cells/kg)"

notable_toxicities:
  - "Infusion reactions: Grade 1-2 common; Grade 3-4 rare (~2%)"
  - "Graft-versus-host disease (GvHD): theoretical risk (allogeneic product); reported rarely"
  - "Cytokine release syndrome: rare (Grade 3-4 <2%)"
  - "Immunogenicity: anti-tabelecleucel antibodies possible but not clinically significant in trials"
  - "Cytopenias: manageable; usually low grade"

pharmacokinetics:
  notes: >
    T-cell product — standard PK parameters not applicable.
    Cell persistence monitored by flow cytometry.
    CTLs may persist weeks to months; HLA-match depth correlates with persistence.

contraindications:
  - "EBV-negative PTLD (tabelecleucel has no activity against EBV-antigen-negative tumors)"
  - "Active uncontrolled GVHD in HCT recipients (GvHD risk)"
  - "No HLA-compatible lot available (manufacturing constraint; check Atara Biotherapeutics inventory)"

special_notes: >
  Tabelecleucel does NOT require reduction of immunosuppression before administration
  (unlike reduce-IS strategy) — the CTLs are administered alongside maintenance IS.
  Key advantage over autologous CTL therapy: off-the-shelf availability means no
  manufacturing delay (critical for rapidly progressing PTLD).
  HLA matching: requires ≥2 of 8 loci in common between donor lot and patient HLA;
  multiple lots available to maximize HLA match depth.

ukraine_registration:
  registered: false
  notes: >
    Tabelecleucel (Ebvallo) not registered in Ukraine as of 2026.
    Access requires: international referral (EU centers with Ebvallo access) or
    compassionate use/named-patient program through Atara Biotherapeutics.
    EMA-approved since August 2023.

last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
