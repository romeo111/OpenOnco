id: DRUG-TAFASITAMAB
names:
  preferred: "Tafasitamab"
  ukrainian: "Тафасітамаб"
  english: "Tafasitamab"
  brand_names:
    - "Monjuvi"   # US
    - "Minjuvi"   # EU
atc_code: L01XC34
drug_class: "CD19-targeting monoclonal antibody (Fc-engineered for ADCC/ADCP)"
mechanism: >
  Humanized anti-CD19 IgG1/2 hybrid monoclonal antibody with Fc-region
  engineering (XmAb technology) that enhances binding to FcγRIII (CD16) and
  FcγRII (CD32), amplifying antibody-dependent cellular cytotoxicity (ADCC)
  and antibody-dependent cellular phagocytosis (ADCP). CD19 is broadly
  expressed on B-cell malignancies. Combines with lenalidomide because
  lenalidomide activates NK cells (the primary effector in ADCC) and has
  direct anti-proliferative effects on DLBCL.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2020
    indications_brief:
      - "R/R DLBCL (not eligible for autoSCT) — with lenalidomide (L-MIND; accelerated approval Jul 31, 2020)"
  ema:
    approved: true
    year_first_approval: 2021
    indications_brief:
      - "R/R DLBCL ≥2L — with lenalidomide (conditional marketing authorization 2021)"
  ukraine_registration:
    registered: false
    notes: >
      Not registered in Ukraine as of 2026-05-04. Access via compassionate use,
      named-patient import, or international clinical trial only.
    last_verified: "2026-05-04"

typical_dosing: >
  12 mg/kg IV infusion per complex step-up schedule (see REG-TAFASITAMAB-LEN-DLBCL):
  Cycle 1: d1, d4, d8, d15, d22 (5 infusions; loading); Cycles 2-3: d1, d8, d15, d22;
  Cycles ≥4: d1, d15 (biweekly). After lenalidomide completion (≤12 cycles): continue
  tafasitamab monotherapy d1, d15 until progression or unacceptable toxicity.
formulations:
  - "200 mg lyophilized powder vial for IV infusion"

absolute_contraindications:
  - "Hypersensitivity to tafasitamab or excipients"

black_box_warnings:
  - "None FDA-listed (no black box warning)"

major_interactions:
  - "Live vaccines — avoid during and after immunosuppressive therapy"
  - "Lenalidomide (intentional combination) — additive neutropenia and thromboembolism risk; mandate VTE prophylaxis and G-CSF support per protocol"

common_adverse_events:
  - "Neutropenia — ~48% grade ≥3 (most common Grade 3/4 toxicity)"
  - "Thrombocytopenia — ~17% grade ≥3"
  - "Anemia — ~10% grade ≥3"
  - "Infusion-related reactions — ~6% any grade; rare grade ≥3 (<1%)"
  - "Fatigue — ~35% any grade"
  - "Diarrhea — ~36% any grade (predominantly lenalidomide-related)"
  - "Edema — ~18% any grade"
  - "Cough — ~19% any grade"
  - "Pyrexia — ~18% any grade"
  - "Constipation — ~18% any grade"
  - "Nausea — ~15% any grade"

serious_adverse_events:
  - "Neutropenic fever / sepsis — monitor CBC closely; G-CSF prophylaxis per NCCN"
  - "Venous thromboembolism (DVT, PE) — mandatory VTE prophylaxis (aspirin or LMWH) throughout lenalidomide phase"
  - "Serious infections (pneumonia, sepsis) — ~21% serious infections in L-MIND"
  - "Cardiac arrhythmia — monitor in high-risk patients"

pharmacology:
  half_life_hours: 384   # ~16 days terminal half-life
  clearance: "typical IgG FcRn-mediated catabolism"
  protein_binding_pct: null
  metabolism: "proteolytic catabolism"

sources:
  - SRC-LMIND-SALLES-2020
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  Workstream EY 2026-05-04. Tafasitamab (Monjuvi/Minjuvi) — CD19-targeting
  Fc-engineered monoclonal antibody. FDA accelerated approval Jul 31, 2020 for
  R/R DLBCL not eligible for autoSCT (with lenalidomide; L-MIND). NCCN Cat 2A.
  Not registered in Ukraine. International access only.
