rxnorm_id: ""
drug_class: "Next-generation ROS1 / NTRK tyrosine kinase inhibitor (macrocyclic)"
mechanism: >
  Macrocyclic next-generation ATP-competitive TKI with high potency
  against ROS1 (including the G2032R solvent-front resistance mutation),
  NTRK1/2/3, and ALK. Compact macrocyclic scaffold sterically accommodates
  the G2032R substitution that confers resistance to first-generation ROS1
  inhibitors (crizotinib) and entrectinib. CNS-penetrant — achieves
  meaningful CSF exposure; demonstrated intracranial activity in ROS1+ NSCLC
  with brain metastases. Pivotal evidence from TRUST-I (China, Phase 2;
  NCT04666748) and TRUST-II (global, Phase 2; NCT04919811):
  treatment-naive ROS1+ NSCLC ORR ~72-91% across cohorts; strong intracranial
  activity. FDA accelerated approval ~2024 for ROS1+ NSCLC (treatment-naive
  and post-crizotinib). NCCN NSCLC 2025: Category 1 preferred for
  treatment-naive ROS1+ mNSCLC.

