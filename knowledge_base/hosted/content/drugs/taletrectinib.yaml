typical_dosing: >
  600 mg PO once daily (QD); continuous until progression or unacceptable
  toxicity. Take with or without food. No lead-in dose titration required
  (unlike repotrectinib). Dose reduction levels: 400 mg QD → 200 mg QD;
  permanent discontinuation if Grade 4 or recurrent Grade 3 toxicity
  after dose reduction.

formulations:
  - "Capsules/tablets 200 mg (exact formulation — VERIFICATION NEEDED)"

absolute_contraindications:
  - "Hypersensitivity to taletrectinib or any excipient"
  - "Pregnancy (embryo-fetal toxicity)"

black_box_warnings: []

common_adverse_events:
  - "Nausea ~40-50%"
  - "Dizziness ~25-35% (lower incidence vs repotrectinib; no mandatory lead-in)"
  - "Constipation ~25%"
  - "Vomiting ~20-30%"
  - "Fatigue ~25-30%"
  - "Increased AST/ALT ~25-35%"
  - "Anemia ~20%"
  - "Peripheral edema ~15-20%"
  - "Dysgeusia ~15-20%"

serious_adverse_events:
  - "ILD / pneumonitis (~5-10% any grade; ~2-4% G3+; interrupt/hold for new respiratory symptoms)"
  - "Hepatotoxicity (G3 transaminase elevation ~5-8%; monitor LFTs q2 wks first 8 wks)"
  - "CNS effects — dizziness, cognitive impairment (lower frequency vs repotrectinib)"
  - "Bradycardia (QTc monitoring; class-related)"
  - "Skeletal fractures (ROS1/TRK class long-term signal)"

major_interactions:
  - "Strong CYP3A4 inhibitors — increase taletrectinib exposure; reduce dose or avoid"
  - "Strong CYP3A4 inducers — decrease exposure; avoid concomitant use"
  - "QTc-prolonging drugs — additive risk; baseline ECG and monitoring"

