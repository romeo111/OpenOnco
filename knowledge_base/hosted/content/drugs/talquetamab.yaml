id: DRUG-TALQUETAMAB
names:
  preferred: "Talquetamab"
  ukrainian: "Талквотамаб"
  english: "Talquetamab"
  brand_names:
    - "Talvey"
atc_code: L01FX27
rxnorm_id: "2659283"
drug_class: "GPRC5D × CD3 bispecific T-cell engager (humanized IgG4)"
mechanism: >
  Humanized IgG4 bispecific antibody binding GPRC5D (G-protein-
  coupled receptor family C group 5 member D, highly expressed on
  malignant plasma cells with restricted normal-tissue expression
  to keratinized epithelia + hair follicles + tongue) on one arm
  and CD3 on T-cells. Redirects T-cell cytotoxicity to GPRC5D+
  myeloma. First-in-class non-BCMA bispecific — orthogonal target
  for patients progressing on BCMA-directed therapy. On-target
  off-tumor toxicity profile reflects normal GPRC5D expression
  (taste/skin/nail toxicities).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2023
    indications_brief:
      - "R/R multiple myeloma after ≥4 prior lines including PI + IMiD + anti-CD38 (accelerated approval Aug 2023)"
  ema:
    approved: true
    year_first_approval: 2023
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-29"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-29).
      Перша GPRC5D×CD3 біспецифічна терапія для триклас-рефрактерної ММ;
      не входить до жодного пакету НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP Janssen / Johnson & Johnson Innovative Medicine Ukraine
        (compassionate use; критерії: ≥4 попередні лінії).
      - Cross-border (EU): направлення до EBMT/JACIE-центрів за пакетом
        "Лікування за кордоном" (наказ МОЗ 988).
      - Trial-only: MonumenTAL-серія активна в EU.
      Source: drlz.com.ua пошук "talquetamab"/"talvey" 2026-04-29 — РП відсутнє.

typical_dosing: >
  Two approved schedules: weekly 0.4 mg/kg SC (step-up: 0.01 → 0.06
  → 0.4 mg/kg SC q3-4d) or biweekly 0.8 mg/kg SC (step-up: 0.01 →
  0.06 → 0.3 → 0.8 mg/kg SC). Hospitalization required for step-up
  doses. Maintenance until progression. Biweekly schedule preferred
  for prolonged therapy (improved tolerability; reduced infection
  surveillance burden).
formulations:
  - "Pre-filled SC vials 3 mg/1.5 mL and 40 mg/mL"

absolute_contraindications:
  - "Active uncontrolled infection"
  - "Hypersensitivity to talquetamab"
black_box_warnings:
  - "Cytokine release syndrome (CRS) — ~75% any grade, ~2% Grade ≥3 in MonumenTAL-1"
  - "Neurologic toxicity / ICANS (~10%)"
  - "Oral toxicity (dysgeusia, dysphagia, dry mouth) — ~75%, distinctive class effect"
  - "Skin/nail toxicity (rash, palmoplantar exfoliation, nail dystrophy) — ~70%"
  - "Weight loss (>5% in ~40%; secondary to taste/oral toxicity)"
major_interactions:
  - "Live vaccines contraindicated"
  - "Concomitant immunosuppressants — additive infection risk"
common_adverse_events:
  - "CRS (predominantly during step-up)"
  - "Dysgeusia / taste changes (durable; many patients persistent)"
  - "Skin/nail toxicities (rash, dryness, exfoliation)"
  - "Weight loss"
  - "Hypogammaglobulinemia"
  - "Neutropenia, anemia, thrombocytopenia"
  - "Fatigue"
  - "Headache"
serious_adverse_events:
  - "Severe CRS"
  - "ICANS"
  - "Severe infection (lower than BCMA bispecifics in MonumenTAL-1, but still substantial)"
  - "Severe weight loss / malnutrition (secondary)"
  - "Hepatotoxicity"

pharmacology:
  half_life: "~7-12 days (schedule-dependent); SC bioavailability good"
  route: "SC"

sources:
  - SRC-NCCN-MM-2025
  - SRC-ESMO-MM-2023

last_reviewed: "2026-04-29"
notes: >
  MonumenTAL-1 (Chari 2022, NEJM): triple-class refractory MM after
  ≥4 prior lines — ORR ~73% (weekly cohort), ~74% (biweekly cohort),
  mDOR ~9-13 mo. FDA accelerated approval Aug 2023; EMA Aug 2023.
  Distinctive toxicity profile: taste/oral/nail/skin AEs reflect
  GPRC5D expression in keratinized tissues — manageable but quality-
  of-life-impacting; nutrition + dental support critical.
  Lower infection burden vs BCMA bispecifics (different antigen
  niche; intact humoral immunity). Useful for sequencing post-BCMA
  failure (orthogonal target). NOTE: Pivotal trial Source
  SRC-MONUMENTAL-1-CHARI-2022 not yet in KB — evidence base cited
  via NCCN-MM and ESMO-MM guideline references; flag for source-
  stub creation.
