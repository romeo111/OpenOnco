id: DRUG-TARLATAMAB
name: "Tarlatamab-dlle"
name_ua: "Тарлатамаб"
brand_names: ["Imdelltra"]
drug_class: "Bispecific T-cell engager (BiTE) — DLL3 × CD3"
atc_code: L01XC52
mechanism_of_action: >
  Half-life-extended (HLE) bispecific antibody engaging DLL3 (delta-like ligand 3,
  expressed on SCLC tumor cells) and CD3 (T-cell receptor complex). Bridges cytotoxic
  T cells to DLL3-expressing tumor cells, inducing tumor cell lysis via perforin/granzyme
  pathway and T-cell activation. DLL3 is a Notch ligand expressed in >80% of SCLC but
  minimally on normal tissues, providing therapeutic window. Unlike traditional BiTEs,
  HLE modification extends half-life allowing Q2W dosing (vs daily infusion for blinatumomab).
standard_doses:
  - indication: "SCLC ≥3rd line"
    dose: "Step-up: 1 mg IV C1D1; 10 mg IV C1D8; 10 mg IV Q2W from C2D1 onward"
    schedule: "Q14D after step-up period; 2-hour infusion"
    notes: "MANDATORY HOSPITALIZATION for C1D1 and C1D8 doses (CRS monitoring). Tocilizumab and corticosteroids available at bedside. Step-up dosing reduces CRS severity."
key_toxicities:
  - "CRS (cytokine release syndrome): ~53% any grade; Grade 3+: ~4%. Onset 1-2 days post-infusion. Fever, hypotension, hypoxia."
  - "ICANS (immune effector cell-associated neurotoxicity syndrome): ~8% any grade; encephalopathy, tremor, aphasia"
  - "Fatigue: very common (>50%)"
  - "Decreased appetite, nausea"
  - "Anemia, thrombocytopenia (lymphodepletion not required — from T-cell activation)"
  - "Infections: increased risk from immune dysregulation"
contraindications:
  - "Prior severe CRS Grade 4 on tarlatamab"
  - "Active uncontrolled autoimmune disease requiring systemic therapy"
special_populations:
  - "Hepatic impairment: limited data; no formal dose adjustment available"
  - "No lymphodepletion required (unlike CAR-T)"
  - "G6PD: not relevant"
monitoring:
  - "CRS assessment: continuous during infusion + 24-48h post-infusion (hospitalization C1D1 and C1D8)"
  - "Tocilizumab 8 mg/kg IV and dexamethasone 10 mg IV available at bedside for CRS management"
  - "ICANS: neurological assessment with each dose; MMSE/CART-NEU score"
  - "CBC, CMP before each cycle"
rems: false
sources:
  - SRC-NCCN-SCLC-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  FDA approved May 2024 (accelerated approval) based on DeLLphi-301 trial
  (Ahn MJ et al. NEJM 2023; NCT05269823). ORR 40% (DLL3-high patients),
  mDOR 9.7 months, mOS 13.2 months in heavily pretreated SCLC (≥2 prior
  lines, including platinum-based regimen). NCCN SCLC Cat 2A for 3L+.
  Step-up dosing (1 mg → 10 mg) critical to mitigate CRS vs flat 10 mg dosing
  in earlier studies. DLL3 expression testing preferred but not required for
  eligibility per FDA label (benefit across expression levels).
