id: DRUG-TEPOTINIB
names:
  preferred: "Tepotinib"
  ukrainian: "Тепотініб"
  english: "Tepotinib"
  brand_names: ["Tepmetko"]
atc_code: L01EX21
rxnorm_id: null
drug_class: "MET-selective TKI"
mechanism: >
  Selective MET inhibitor with similar efficacy profile to capmatinib. VISION trial: ORR ~46% in 1L MET ex14+ NSCLC.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      MET-інгібітор для MET-exon14-skipping NSCLC; не входить до НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP Merck KGaA / Merck Ukraine (Tepmetko access — потребує
        METex14 мутації; обмежено).
      - Cross-border (EU): EU онкоцентри через "Лікування за кордоном"
        (наказ МОЗ 988).
      - Trial-only: VISION-серія, post-marketing в EU.
      Source: drlz.com.ua пошук "tepotinib"/"tepmetko" 2026-04-27 — РП відсутнє.

typical_dosing: >
  450 mg PO once daily.

key_toxicities:
  - Peripheral edema (~70%)
  - Nausea
  - Fatigue
  - Hepatic enzyme elevation

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed: null
notes: >
  Once-daily alternative to capmatinib BID. Edema dominant AE.
