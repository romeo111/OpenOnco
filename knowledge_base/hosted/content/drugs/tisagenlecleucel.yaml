id: DRUG-TISAGENLECLEUCEL
names:
  preferred: "Tisagenlecleucel"
  ukrainian: "Тисагенлеклеуцел"
  english: "Tisagenlecleucel"
  brand_names: ["Kymriah"]
  synonyms:
    - "tisa-cel"
    - "CTL019"
atc_code: L01XL02
rxnorm_id: "2000178"
drug_class: "CD19-directed autologous CAR-T cell therapy (4-1BB costimulation)"
mechanism: >
  Autologous T cells genetically modified ex vivo with lentiviral
  vector encoding chimeric antigen receptor (CAR) targeting CD19,
  with 4-1BB costimulatory domain (CD137) and CD3-zeta signaling
  domain. After lymphodepleting fludarabine + cyclophosphamide
  conditioning, single IV infusion → in vivo expansion + sustained
  cytotoxicity against CD19+ B-cell malignancies. Approved for R/R
  B-ALL ≤25 years (ELIANA) and R/R DLBCL adult (JULIET).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      CAR-T-терапія не ліцензована/не реімбурсується НСЗУ.
      Шляхи доступу:
      - Cross-border (EU): державне направлення (наказ МОЗ 988
        "Лікування за кордоном") до EBMT/JACIE-акредитованих центрів
        (Charité, Karolinska, Hôpital Saint-Louis). Показання: r/r
        pB-ALL ≤25 р., r/r DLBCL ≥3L.
      - EAP Novartis (через локальний офіс Novartis Ukraine —
        compassionate use program; одиничні випадки).
      - Trial-only: ELIANA, JULIET програми extended access.
      Source: drlz.com.ua пошук "tisagenlecleucel"/"kymriah" 2026-04-27 — РП відсутнє.

typical_dosing: >
  Single IV infusion (not weight-based per se): 0.2 to 5.0 × 10⁶
  CAR-positive viable T cells per kg for patients ≤50 kg; 0.1 to
  2.5 × 10⁸ CAR-positive viable T cells (not weight-based) for
  patients >50 kg. Preceded by lymphodepleting conditioning:
  fludarabine 30 mg/m² IV daily × 4 days + cyclophosphamide 500
  mg/m² IV daily × 2 days. Single infusion; no maintenance.

formulations: ["Cryopreserved cell suspension; product manufactured per patient"]

absolute_contraindications:
  - "Active uncontrolled infection"
  - "Pregnancy"
  - "Hypersensitivity to murine proteins"
  - "Active CNS disease excluded from trials (CNS-2/3 with neurologic symptoms)"

black_box_warnings:
  - "Cytokine release syndrome (CRS) — Grade ≥3 ~46% in ELIANA; tocilizumab + ICU support mandatory"
  - "Immune effector cell-associated neurotoxicity syndrome (ICANS) — Grade ≥3 ~13%"
  - "REMS / FACT-JACIE accreditation required for administration"

major_interactions:
  - "Concurrent corticosteroids: suppress CAR-T expansion (avoid pre-infusion + early post-infusion unless life-threatening AE)"
  - "Live vaccines: avoid"

common_adverse_events:
  - "CRS (variable severity)"
  - "ICANS (encephalopathy, tremor, aphasia)"
  - "Hypogammaglobulinemia (B-cell aplasia, often >12 months)"
  - "Cytopenia (prolonged)"
  - "Infection"
  - "Fever"

serious_adverse_events:
  - "Severe CRS (Grade ≥3, ~46%; boxed)"
  - "Severe ICANS (Grade ≥3, ~13%; boxed)"
  - "Severe + prolonged cytopenia"
  - "Severe infection (encapsulated bacteria, viral reactivation)"
  - "Tumor lysis syndrome"
  - "Secondary malignancies (T-cell malignancies — class warning)"

pharmacology: {half_life: "Cellular product — peak expansion d7-14, persistence months to years"}

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_14c
draft_revision: 2
notes: >
  Pivotal: ELIANA (Maude et al., NEJM 2018) — single-arm phase-2
  in R/R B-ALL ages 3-21 (later expanded to ≤25); ORR 81%; CR/CRi
  60%; MRD-negativity in CR/CRi 100%; 12-month EFS 50%, OS 76%.
  FDA approval Aug 2017 (first FDA-approved CAR-T). EMA Aug 2018.
  CRITICAL: REMS / FACT-JACIE-accredited center required;
  tocilizumab on-site (≥2 doses) before infusion mandatory; CNS
  exclusion (CNS-2/3 symptomatic) per registration. Ukraine: NOT
  registered, NO domestic manufacturing — international referral
  (Israel / Poland / Germany / Spain) required, USD 350-500K
  all-in. Adult (>25) DLBCL CAR-T variants (axi-cel, liso-cel,
  brexu-cel for B-ALL adults) are separate products with distinct
  costimulatory designs (CD28 vs 4-1BB) and AE profiles (axi-cel
  CD28 → faster, more severe CRS / ICANS; tisa-cel 4-1BB → slower
  onset, more durable persistence). Ukraine: NOT registered — no
  domestic CAR-T manufacturing capacity; access only via cross-
  border to EBMT/JACIE-accredited EU centers (Charité, Karolinska,
  Saint-Louis) under "Лікування за кордоном" (наказ МОЗ 988).
  All-in cost USD 350-500K including manufacturing, lymphodepletion,
  ICU support, post-CAR-T B-cell-aplasia management.
notes_ua: >
  Опорне дослідження ELIANA (Maude et al., NEJM 2018) —
  одноруке дослідження фази 2 у пацієнтів з рецидивним/
  рефрактерним В-клітинним гострим лімфобластним лейкозом
  (B-ALL) віком 3-21 років (надалі розширене до ≤25 років);
  загальна частота відповіді (ORR) 81%; повна відповідь або
  CRi 60%; MRD-негативність у пацієнтів з CR/CRi 100%;
  безподійна виживаність на 12 міс 50%, загальна виживаність
  76%. FDA схвалила тисагенлеклеуцел (tisagenlecleucel)
  у серпні 2017 (перша CAR-T-терапія, схвалена FDA);
  EMA — у серпні 2018. КРИТИЧНО: для введення обов’язково
  потрібен центр з акредитацією REMS / FACT-JACIE; наявність
  тоцилізумабу на місці (щонайменше 2 дози) перед інфузією
  є обов’язковою; виключення пацієнтів із симптомним
  ураженням ЦНС (CNS-2/3) згідно з умовами реєстрації.
  Дорослі (понад 25 років) з DLBCL отримують варіанти
  CAR-T (axi-cel, liso-cel, brexu-cel для дорослих з B-ALL),
  що є окремими продуктами з різним дизайном костимуляторного
  домену (CD28 проти 4-1BB) та різними профілями небажаних
  явищ (axi-cel з CD28 — швидший і тяжчий CRS/ICANS;
  tisa-cel з 4-1BB — повільніший початок, більш тривала
  персистенція). Україна: препарат НЕ зареєстрований; немає
  локальних потужностей виробництва CAR-T; доступ можливий
  лише через транскордонне направлення до акредитованих
  EBMT/JACIE центрів ЄС (Charité, Karolinska, Saint-Louis)
  у рамках програми «Лікування за кордоном» (наказ МОЗ 988).
  Загальна вартість — USD 350-500K із урахуванням
  виробництва клітинного продукту, лімфодеплеційного
  кондиціонування, інтенсивної терапії та подальшого ведення
  В-клітинної аплазії після CAR-T.
