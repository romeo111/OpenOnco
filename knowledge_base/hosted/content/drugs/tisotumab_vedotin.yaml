notes: >
  Tisotumab vedotin is the FIRST AND ONLY ADC approved for recurrent /
  metastatic cervical cancer 2L+ after platinum (with or without
  bevacizumab + pembrolizumab in 1L per CPS). It was the first
  oncology ADC targeting tissue factor (CD142). innovaTV 204 (Coleman
  Lancet Oncol 2021) — pivotal Phase II — n=101, post-platinum
  cervical cancer, ORR 24%, mDOR 8.3 mo, mPFS 4.2 mo, mOS 12.1 mo →
  FDA accelerated approval Sep 20, 2021. innovaTV 301 (Vergote NEJM
  2024) — confirmatory Phase III — tisotumab vedotin vs IC chemo
  (topotecan, vinorelbine, gemcitabine, irinotecan, pemetrexed),
  n=502, mOS 11.5 vs 9.5 mo (HR 0.70, p=0.0038), mPFS 4.2 vs 2.9 mo
  (HR 0.67), ORR 17.8% vs 5.2% → FDA full approval Apr 29, 2024.
  NCCN-Cervical 2025 + ESMO-Cervical 2024 list tisotumab vedotin
  category 1 / preferred 2L+ recurrent/metastatic cervical cancer
  post-platinum (regardless of PD-L1 / pembrolizumab exposure in
  1L). Class toxicity: ocular AEs are the dominant management
  challenge — mandatory ophtho monitoring + premedication +
  prophylactic eye drops protocol. Hemorrhage (TF target — vascular
  endothelium coagulation factor III) less prominent than feared
  pre-clinically, but anticoagulation interaction caution remains.
  No companion biomarker required — TF expression is broadly high
  on cervical squamous + adenocarcinoma. Missing source IDs to flag:
  SRC-INNOVATV-204 (Coleman 2021), SRC-INNOVATV-301 (Vergote 2024),
  SRC-FDA-TIVDAK not yet authored.
notes_patient: >
  Таргетний препарат — кон'югат "антитіло+хіміотерапія" (ADC), що
  доставляє хіміопрепарат прямо в клітини раку шийки матки. Найважливіша
  побічна дія — ушкодження очей (кон'юнктивіт, сухість, можливе
  тимчасове порушення зору): обов'язкові огляди офтальмолога перед
  кожним циклом, прохолодні очні компреси під час інфузії і часті
  зволожуючі краплі (≥6 раз на день). Інші типові побічні ефекти —
  носові кровотечі, втома, нудота, оніміння рук/ніг, випадіння
  волосся.
