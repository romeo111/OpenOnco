id: DRUG-TISOTUMAB-VEDOTIN
names:
  preferred: "Tisotumab vedotin"
  ukrainian: "Тисотумаб ведотин"
  english: "Tisotumab vedotin-tftv"
  brand_names: ["Tivdak"]
atc_code: L01FX31
rxnorm_id: null
drug_class: "Anti-tissue-factor (TF / CD142) antibody-drug conjugate (ADC) with MMAE payload"
mechanism: >
  Antibody-drug conjugate composed of a fully human IgG1 anti-tissue-
  factor (TF / CD142 / Factor III / coagulation factor III)
  monoclonal antibody (tisotumab) covalently linked via a cleavable
  protease-sensitive valine-citrulline linker to monomethyl auristatin
  E (MMAE), a tubulin-polymerization inhibitor. TF is broadly
  overexpressed on cervical carcinoma and other solid tumors, with
  limited / regulated expression on normal tissues. Tisotumab binds
  TF on tumor cells; the ADC is internalized; lysosomal protease
  cleavage releases MMAE intracellularly, disrupting tubulin and
  inducing apoptosis. Bystander effect on adjacent TF-low cells via
  released MMAE. Pivotal innovaTV 204 Phase II (Coleman Lancet Oncol
  2021; n=101 pre-treated recurrent / metastatic cervical cancer
  post-platinum + post-bevacizumab where eligible) showed ORR 24%,
  mDOR 8.3 mo, mPFS 4.2 mo, mOS 12.1 mo → FDA accelerated approval
  Sep 20, 2021. Confirmatory innovaTV 301 Phase III (Vergote NEJM
  2024; tisotumab vedotin vs investigator-choice chemo, n=502)
  demonstrated mOS 11.5 vs 9.5 mo (HR 0.70, p=0.0038) → FDA full
  approval Apr 29, 2024.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2021
    indications_brief:
      - "Recurrent or metastatic cervical cancer with disease progression on or after first-line systemic therapy (full approval Apr 29, 2024 — converted from accelerated approval Sep 20, 2021 based on innovaTV 301)"
  ema:
    approved: true
    year_first_approval: 2024
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-29"
    notes: |
      Не зареєстровано в Україні (Держреєстр ЛЗ — РП відсутнє станом
      на 2026-04-29). Перший і єдиний ADC, схвалений FDA для
      рецидивного / метастатичного раку шийки матки 2L+ після
      платини (FDA full approval, квітень 2024).

      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл МОЗ) — після
        платино-вмісної 1L (± бевацизумаб ± пембролізумаб залежно від
        PD-L1 CPS).
      - EAP Pfizer / Seagen (Tivdak access) — для R/M cervical 2L+.
      - Cross-border (EU): EU гінекологічні центри через "Лікування
        за кордоном" (наказ МОЗ 988) — ESMO-Cervical 2024 рекомендує
        tisotumab vedotin 2L preferred.
      - Trial-only: innovaTV 205 (комбінації з пембролізумабом /
        карбоплатином) — для розширених показань.
      Передумова використання: TF (tissue factor) — немає
        formal companion diagnostic (TF широко експресований на
        cervical carcinoma, біомаркерне тестування не вимагається).
      Source: drlz.com.ua пошук "tisotumab"/"tivdak" 2026-04-29 — РП
      відсутнє.

typical_dosing: >
  2.0 mg/kg IV (max 200 mg) over 30 minutes once every 3 weeks, until
  disease progression or unacceptable toxicity. Premedicate prior to
  each infusion to mitigate ocular AEs: lubricating eye drops, vasoconstrictor
  ophthalmic drops, and topical ophthalmic corticosteroid + cooling
  eye-pads during infusion. Patients must use lubricating eye drops
  ≥6× daily throughout treatment. Mandatory ophthalmologic exam at
  baseline, prior to every cycle for first 9 cycles, and as clinically
  indicated. Dose reductions (1.5 → 1.2 → permanent discontinuation)
  for grade ≥2 ocular AEs, peripheral neuropathy, or hemorrhage. Hold
  for grade 3+ ocular AE until resolution to grade ≤1.

formulations:
  - "Lyophilized powder for IV reconstitution: 40 mg single-dose vial"

absolute_contraindications:
  - "Severe hypersensitivity to tisotumab vedotin or any component"
  - "Pregnancy (embryo-fetal toxicity — MMAE class effect)"
  - "Active severe ocular surface disease (severe keratitis, corneal ulceration)"

black_box_warnings:
  - "Ocular toxicity (BOXED WARNING): conjunctivitis, dry eye, keratitis, corneal ulceration, vision loss — severe events including blindness reported. Mandatory baseline + per-cycle ophthalmologic exam; premedication regimen required; lubricating eye drops ≥6× daily. Hold for grade ≥2 ocular AE."

common_adverse_events:
  - "Conjunctivitis (~40-60% — class ADC ocular surface effect; managed with prophylactic eye drops + cooling pads)"
  - "Alopecia"
  - "Epistaxis (TF target — vascular endothelium expression)"
  - "Fatigue"
  - "Nausea"
  - "Peripheral neuropathy (MMAE payload class effect)"
  - "Anemia"
  - "Decreased appetite, weight loss"
  - "Dry eye, keratitis, blurred vision"
  - "Constipation, diarrhea"
  - "Stomatitis"
  - "Pruritus, rash"

serious_adverse_events:
  - "Severe ocular toxicity — corneal ulceration, vision loss, blindness (BOXED WARNING)"
  - "Severe hemorrhage including pulmonary, GI, GU bleeds (TF target — coagulation factor III)"
  - "Severe peripheral neuropathy (MMAE class)"
  - "Severe pneumonitis / interstitial lung disease"
  - "Embryo-fetal toxicity"

major_interactions:
  - "Strong CYP3A4 inhibitors / inducers — alter MMAE exposure (free MMAE component)"
  - "P-gp inhibitors — increased MMAE exposure"
  - "Concurrent neurotoxic agents (cisplatin, vincristine, paclitaxel) — additive peripheral neuropathy"
  - "Concurrent anticoagulants / antiplatelets — bleeding risk caution given TF target on vascular endothelium"

pharmacology:
  half_life_hours: 96
  half_life_notes: "ADC t½ ~4 days; free MMAE t½ ~2.5 days; q3w schedule"
  clearance: "ADC: proteolytic catabolism; free MMAE: CYP3A4-mediated"
  metabolism: "MMAE: CYP3A4 oxidative; biliary/fecal elimination"

