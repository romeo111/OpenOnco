id: DRUG-TOPOTECAN
names:
  preferred: "Topotecan"
  ukrainian: "Топотекан"
  english: "Topotecan"
  synonyms: ["SKF-104864", "9-dimethylaminomethyl-10-hydroxy-camptothecin"]
  brand_names: ["Hycamtin"]
atc_code: L01CE01
rxnorm_id: ""
drug_class: "Topoisomerase I inhibitor (semisynthetic camptothecin)"
mechanism: >
  Semisynthetic water-soluble camptothecin analog that binds and
  stabilizes the covalent topoisomerase I–DNA cleavable complex,
  preventing religation of the single-strand DNA nick generated by
  the enzyme. When a replication fork encounters the trapped complex,
  the single-strand break is converted to a lethal double-strand
  break → S-phase-specific apoptosis. Crosses the blood-brain
  barrier modestly. Active in platinum-resistant ovarian cancer,
  sensitive-relapse small-cell lung cancer (SCLC; the only cytotoxic
  approved post-platinum monotherapy), recurrent cervical cancer (in
  combination with cisplatin), and rare hematologic malignancies.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 1996
    indications_brief:
      - "Recurrent ovarian cancer post-platinum"
      - "Sensitive-relapse small-cell lung cancer"
      - "Recurrent / persistent cervical cancer (combo cisplatin)"
  ema:
    approved: true
    year_first_approval: 1996
    indications_brief:
      - "Recurrent ovarian cancer"
      - "Sensitive-relapse SCLC"
      - "Recurrent cervical (combo cisplatin)"
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Рецидивний рак яєчників після платини (моно)"
      - "Чутливий рецидив дрібноклітинного раку легень (моно)"
      - "Рецидивний рак шийки матки (з cisplatin)"
    last_verified: "2026-04-27"
    notes: "Generic widely available globally; UA registration via generics. НСЗУ покриває як стандартну хіміотерапію в зазначених показаннях. Перевірено drlz.com.ua + nszu.gov.ua 2026-04-27."

typical_dosing: >
  IV classical (most common): 1.5 mg/m²/day IV over 30 minutes for 5
  consecutive days every 21 days. Weekly schedule: 4 mg/m² IV over
  30 minutes on Days 1, 8, 15 every 28 days (better tolerated in
  pre-treated / older patients). Oral: 2.3 mg/m²/day for 5
  consecutive days every 21 days (lower neutropenia, more diarrhea).
  Cervical (combo cisplatin): topotecan 0.75 mg/m²/day Days 1-3 +
  cisplatin 50 mg/m² Day 1 every 21 days. Renal adjustment: CrCl
  20-39 → 50% dose reduction; CrCl <20 not recommended. Hepatic
  adjustment usually not required (predominantly renal clearance).
  Hold for ANC <1.5, plt <100; G-CSF support indicated for
  recurrent febrile neutropenia.

formulations:
  - "IV powder for solution (1 mg, 4 mg single-dose vials)"
  - "Capsules 0.25 mg, 1 mg (oral)"

absolute_contraindications:
  - "Severe pre-existing bone-marrow suppression (baseline ANC <1.5 or plt <100)"
  - "Severe hepatic impairment (relative — limited data)"
  - "Severe renal impairment (CrCl <20 IV; CrCl <30 oral)"
  - "Pregnancy (embryo-fetal toxicity)"
  - "Hypersensitivity to topotecan or any excipient"

black_box_warnings:
  - "Severe bone-marrow suppression (boxed) — frequent CBC monitoring required; can be life-threatening; should be administered only by clinicians experienced with cytotoxic chemotherapy"

common_adverse_events:
  - "Severe neutropenia ~80% IV (G3-4 ~60-80%); ~50% oral"
  - "Thrombocytopenia ~25-30% (G3-4 ~25%)"
  - "Anemia ~40-90% any-grade"
  - "Diarrhea ~22% IV; ~50% oral (G3 ~5-15% oral)"
  - "Nausea ~60%"
  - "Vomiting ~40%"
  - "Fatigue ~30%"
  - "Alopecia ~30-50%"
  - "Anorexia ~20%"
  - "Mucositis / stomatitis ~20%"
  - "Headache ~20%"

serious_adverse_events:
  - "Febrile neutropenia (~25% IV classical schedule; G-CSF prophylaxis advised after first event)"
  - "Severe diarrhea — predominantly oral schedule (G3-4 ~5-15%; aggressive loperamide / hospitalization for hydration)"
  - "Interstitial lung disease / pneumonitis (rare; ~1-2%)"
  - "GI perforation (rare; reported with peritoneal carcinomatosis)"
  - "Severe sepsis from neutropenia"
  - "Tumor lysis syndrome (rare; high-burden disease)"
  - "Cardiotoxicity (rare)"
  - "Severe extravasation tissue injury (vesicant — administer via central or large peripheral vein)"

major_interactions:
  - "P-gp / BCRP inhibitors (cyclosporine, ritonavir, lapatinib, gefitinib) — ↑ topotecan exposure; reduce dose or avoid"
  - "Concurrent G-CSF — administer 24 hours after last topotecan dose, not concurrently (concurrent G-CSF prolongs neutropenia)"
  - "Concurrent radiotherapy — additive myelosuppression and mucositis; sequential preferred"
  - "Other myelosuppressive cytotoxics — additive toxicity"
  - "Live vaccines — avoid"

pharmacology:
  half_life_hours: 3
  clearance: "renal (predominant; ~40-60% as parent + metabolite)"
  protein_binding_pct: 35
  metabolism: "minimal hepatic (ring opening to inactive carboxylate); pH-dependent lactone-carboxylate equilibrium"

sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  Renal dose adjustment is mandatory and frequently overlooked —
  CrCl 20-39 requires 50% dose reduction; CrCl <20 not recommended.
  Weekly schedule (4 mg/m² Days 1, 8, 15) is better tolerated than
  the 5-day continuous schedule in older / pretreated patients —
  cross-trial efficacy comparable in ovarian salvage. Oral
  formulation has more diarrhea, less neutropenia; convenient for
  outpatient use but logistics of oral cytotoxic handling apply
  (PPE for caregivers, avoid pregnancy / breastfeeding contact).
  Vesicant on extravasation — administer through central or large
  peripheral vein; have extravasation kit available. G-CSF support
  after first febrile neutropenia event. Baseline + serial CBC
  weekly. Premedicate with 5-HT3 antagonist + dexamethasone for
  nausea. UA: generic, available, НСЗУ-reimbursed for indicated
  uses.
