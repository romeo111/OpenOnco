id: DRUG-TRASTUZUMAB
names:
  preferred: "Trastuzumab"
  ukrainian: "Трастузумаб"
  english: "Trastuzumab"
  brand_names: ["Herceptin", "Ogivri (biosimilar)", "Kanjinti (biosimilar)"]
atc_code: L01FD01
rxnorm_id: null
drug_class: "HER2-targeted monoclonal antibody (subdomain IV)"
mechanism: >
  Humanized IgG1 monoclonal antibody targeting the extracellular subdomain
  IV of the HER2 receptor. Mechanisms: ADCC (antibody-dependent cell-
  mediated cytotoxicity), inhibition of HER2 signaling, blockade of HER2
  shedding, and disruption of HER2-driven angiogenesis.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: null
    notes: "Reimbursed for HER2+ breast (early adjuvant + neoadjuvant + metastatic) per НСЗУ. Biosimilar formulations widely available."

typical_dosing: >
  IV: 8 mg/kg loading dose, then 6 mg/kg q3 weeks maintenance.
  SC formulation: 600 mg fixed dose q3 weeks.
  Combined with chemotherapy + pertuzumab for early HER2+ (TCHP) and
  metastatic 1L (THP). Continued for 1 year total in adjuvant; until
  progression in metastatic. Cardiac monitoring (LVEF) at baseline
  and q3 months.

key_toxicities:
  - Cardiotoxicity (LVEF decline; usually reversible; additive with anthracyclines + pertuzumab — sequential or cardio-sparing scheduling)
  - Infusion reactions (mild-moderate; pre-medication typical)
  - Diarrhea (combination with pertuzumab)
  - Pulmonary toxicity (rare)

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-EARLY-2024]
last_reviewed: null
notes: >
  Cross-disease entity. Used in HER2+ breast (early + metastatic),
  HER2+ gastric/GEJ (1L per ToGA + 2L per DESTINY-Gastric series),
  occasional uterine/biliary HER2-amp use.

