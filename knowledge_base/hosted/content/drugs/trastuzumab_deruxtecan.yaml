id: DRUG-TRASTUZUMAB-DERUXTECAN
names:
  preferred: "Trastuzumab deruxtecan (T-DXd)"
  ukrainian: "Трастузумаб дерукстекан"
  english: "Trastuzumab deruxtecan (T-DXd)"
  brand_names: ["Enhertu"]
atc_code: L01FD04
rxnorm_id:
drug_class: "HER2-targeted antibody-drug conjugate (deruxtecan / topo-I inhibitor payload)"
mechanism: >
  Trastuzumab linked to deruxtecan (DXd, exatecan derivative) via cleavable linker. High drug-to-antibody ratio (~8:1) and bystander effect — kills neighboring HER2-low cells. Active in HER2-positive AND HER2-low (IHC 1+ or 2+ FISH-) and HER2-ultralow.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-27"
    notes: "Зареєстрований; НСЗУ покриває РМЗ HER2+ 2L (новий стандарт замість T-DM1) і HER2-low 2L+. Шлунковий HER2+ та НДРЛ HER2-mut — поза НСЗУ. ILD вимагає моніторингу. Джерело: nszu.gov.ua (2026-04)."

    reimbursement_indications:
    - 'Реімбурсаційний пакет «Онкологія» 2026: РМЗ HER2+ метастатичний 2L після trastuzumab+таксан (DESTINY-Breast03)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: РМЗ HER2-low (IHC 1+ / 2+ ISH-) метастатичний 2L+ (DESTINY-Breast04)'
typical_dosing: >
  5.4 mg/kg IV q3 weeks until progression or unacceptable toxicity.

key_toxicities:
- Interstitial lung disease / pneumonitis (~12%, ~3% G≥3, fatal in ~1% — boxed warning; baseline CT chest + serial monitoring + immediate hold on respiratory symptoms; corticosteroids for treatment)
- Nausea (~80% — high-emetogenicity prophylaxis required)
- Vomiting, fatigue, alopecia
- Neutropenia
- Anemia
- Cardiotoxicity (lower than naked trastuzumab)

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed:
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_14c
draft_revision: 2
notes: >
  DESTINY-Breast03: T-DXd superior to T-DM1 in 2L HER2+ metastatic. DESTINY-Breast04: HER2-low metastatic. DESTINY-Breast06: HER2-low first-line. ILD risk requires baseline CT + monitoring; pulmonology consult on any new respiratory symptoms.
notes_ua: >
  Дослідження DESTINY-Breast03: трастузумаб дерукстекан
  (trastuzumab deruxtecan, T-DXd) перевершив трастузумаб
  емтанзин (T-DM1) у другій лінії метастатичного HER2-позитивного
  раку молочної залози. DESTINY-Breast04: показання при
  HER2-low метастатичному раку молочної залози. DESTINY-Breast06:
  HER2-low у першій лінії. Ризик інтерстиційного захворювання
  легень (ILD) потребує базової КТ органів грудної клітки та
  серійного моніторингу; обов’язкова консультація пульмонолога
  при появі будь-яких нових респіраторних симптомів.

notes_patient: >
  Препарат-мітка з «прикріпленим» хіміо-вантажем (ADC): знаходить HER2-пухлинні клітини й точково їх руйнує. Дуже ефективний при HER2+ і HER2-low раку грудей. Контролюємо легені — рідко можливе запалення (pneumonitis).
