id: DRUG-TRASTUZUMAB-DERUXTECAN
names:
  preferred: "Trastuzumab deruxtecan (T-DXd)"
  ukrainian: "Трастузумаб дерукстекан"
  english: "Trastuzumab deruxtecan (T-DXd)"
  brand_names: ["Enhertu"]
atc_code: L01FD04
rxnorm_id: null
drug_class: "HER2-targeted antibody-drug conjugate (deruxtecan / topo-I inhibitor payload)"
mechanism: >
  Trastuzumab linked to deruxtecan (DXd, exatecan derivative) via cleavable linker. High drug-to-antibody ratio (~8:1) and bystander effect — kills neighboring HER2-low cells. Active in HER2-positive AND HER2-low (IHC 1+ or 2+ FISH-) and HER2-ultralow.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: false
    last_verified: null
    notes: "Registered; reimbursement under negotiation. Significant access barrier in Ukraine — flagged as clinical-review priority."

typical_dosing: >
  5.4 mg/kg IV q3 weeks until progression or unacceptable toxicity.

key_toxicities:
  - Interstitial lung disease / pneumonitis (~12%, ~3% G≥3, fatal in ~1% — boxed warning; baseline CT chest + serial monitoring + immediate hold on respiratory symptoms; corticosteroids for treatment)
  - Nausea (~80% — high-emetogenicity prophylaxis required)
  - Vomiting, fatigue, alopecia
  - Neutropenia
  - Anemia
  - Cardiotoxicity (lower than naked trastuzumab)

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed: null
notes: >
  DESTINY-Breast03: T-DXd superior to T-DM1 in 2L HER2+ metastatic. DESTINY-Breast04: HER2-low metastatic. DESTINY-Breast06: HER2-low first-line. ILD risk requires baseline CT + monitoring; pulmonology consult on any new respiratory symptoms.
