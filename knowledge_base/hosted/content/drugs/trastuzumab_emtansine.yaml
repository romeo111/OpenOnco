id: DRUG-TRASTUZUMAB-EMTANSINE
names:
  preferred: "Trastuzumab emtansine (T-DM1)"
  ukrainian: "Трастузумаб емтанзин"
  english: "Trastuzumab emtansine (T-DM1)"
  brand_names: ["Kadcyla"]
atc_code: L01FD03
rxnorm_id: null
drug_class: "HER2-targeted antibody-drug conjugate (DM1 maytansinoid payload)"
mechanism: >
  Trastuzumab linked to DM1 (tubulin-targeting maytansinoid) via stable linker. Internalized by HER2+ cells, releases DM1 intracellularly, microtubule-disrupting cell-cycle arrest.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: false
    last_verified: null
    notes: "Registered; reimbursement gap — pending NSZU formulary update. Out-of-pocket cost orientation high; access barrier flagged."

typical_dosing: >
  3.6 mg/kg IV q3 weeks. Standard adjuvant 14 cycles (KATHERINE) for residual disease after neoadjuvant HER2+ therapy.

key_toxicities:
  - Thrombocytopenia (~32% any, ~13% G3+)
  - Hepatotoxicity (~22% transaminitis, monitor LFTs)
  - Peripheral neuropathy (~21%)
  - Nausea, fatigue
  - Cardiotoxicity (lower than free trastuzumab)
  - Pneumonitis (rare but serious)

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed: null
notes: >
  KATHERINE: T-DM1 superior to trastuzumab in adjuvant residual-disease HER2+ post-neoadjuvant. Replaced by T-DXd as preferred 2L metastatic per DESTINY-Breast03.
