id: DRUG-TREMELIMUMAB
names:
  preferred: "Tremelimumab"
  ukrainian: "Тремелімумаб"
  english: "Tremelimumab"
  brand_names: ["Imjudo"]
atc_code: L01FX20
rxnorm_id: null
drug_class: "Anti-CTLA-4 human IgG2 monoclonal antibody (ICI)"
mechanism: >
  Blocks CTLA-4 — releases T-cell activation brake at priming phase
  (synergistic with PD-1/PD-L1 blockade). Single-dose STRIDE regimen
  with durvalumab in HCC.
regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration: {registered: false, last_verified: "2026-04-26"}
typical_dosing: "STRIDE: 300 mg IV single priming dose with durvalumab 1500 mg, then durvalumab mono q4w."
formulations: ["IV solution 20 mg/mL"]
absolute_contraindications: ["Active autoimmune disease", "Pregnancy"]
black_box_warnings: ["Severe and fatal irAEs (more frequent with CTLA-4 than PD-1)"]
common_adverse_events: ["Fatigue", "Rash", "Diarrhea", "Pruritus"]
serious_adverse_events: ["Severe colitis (CTLA-4-typical, often early)", "Severe hepatitis", "Hypophysitis", "Pneumonitis"]
sources: [SRC-NCCN-HCC-2025]
last_reviewed: "2026-04-26"
notes: >
  STUB — Phase GI-1. CTLA-4 irAE pattern differs from PD-1: earlier,
  more colitis and hypophysitis. Single-priming-dose STRIDE has acceptable
  safety vs older Q4W tremelimumab schedules.
