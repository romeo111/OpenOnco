id: DRUG-TMP-SMX
names:
  preferred: "Trimethoprim/Sulfamethoxazole"
  ukrainian: "Триметоприм/Сульфаметоксазол"
  english: "Co-trimoxazole"
  synonyms: ["TMP-SMX", "Co-trimoxazole", "Bactrim", "Septra"]
atc_code: J01EE01
rxnorm_id: "10180"
drug_class: "Folate antagonist combination antibiotic"
mechanism: >
  Synergistic blockade of two sequential steps in bacterial folate
  synthesis (dihydropteroate synthase + dihydrofolate reductase).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Профілактика Pneumocystis jirovecii (PJP) у пацієнтів з імуносупресією (флударабін, ритуксимаб, тривала кортикостероїдна терапія)"
    last_verified: "2026-04-27"
typical_dosing: "PJP prophylaxis: 80/400 mg PO daily OR 160/800 mg PO 3x/week"
formulations:
  - "Tablet 80/400 mg, 160/800 mg"
  - "Oral suspension"

absolute_contraindications:
  - "Sulfonamide hypersensitivity"
  - "Severe hepatic impairment"
  - "G6PD deficiency (severe hemolysis risk)"
  - "Megaloblastic anemia from folate deficiency"
common_adverse_events:
  - "Rash"
  - "GI upset"
  - "Hyperkalemia"
serious_adverse_events:
  - "Stevens-Johnson syndrome / TEN"
  - "Severe hyperkalemia"
  - "Bone marrow suppression"

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_14c
draft_revision: 2
notes: >
  PJP prophylaxis indicated in patients receiving sustained
  immunosuppression (rituximab + chemotherapy combinations).
notes_ua: >
  Профілактика пневмоцистної пневмонії (PJP) показана пацієнтам,
  які отримують тривалу імуносупресивну терапію (комбінації
  ритуксимабу з хіміотерапією).
