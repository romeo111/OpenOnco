id: DRUG-TUCATINIB
names:
  preferred: "Tucatinib"
  ukrainian: "Тукатиніб"
  english: "Tucatinib"
  brand_names: ["Tukysa"]
atc_code: L01EH03
rxnorm_id: null
drug_class: "HER2-selective oral tyrosine kinase inhibitor"
mechanism: >
  Highly HER2-selective TKI (vs lapatinib which inhibits both HER2 and EGFR). CNS-penetrant — particularly active in patients with brain metastases, where most other HER2-targeted agents have limited efficacy.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      HER2-tyrosine-kinase інгібітор для HER2+ m BC з CNS-метастазами;
      не входить до НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл) — за рахунок пацієнта;
        HER2CLIMB режим: tucatinib + capecitabine + trastuzumab.
      - EAP Seagen/Pfizer Ukraine (Tukysa access — обмежено, переважно
        для HER2+ m BC з активними CNS-метастазами).
      - Cross-border (EU): EU мамологічні центри через "Лікування за
        кордоном" (наказ МОЗ 988).
      - Trial-only: HER2CLIMB-серія, post-marketing в EU.
      Source: drlz.com.ua пошук "tucatinib"/"tukysa" 2026-04-27 — РП відсутнє.

typical_dosing: >
  300 mg PO BID continuous. Combined with capecitabine + trastuzumab (HER2CLIMB regimen).

key_toxicities:
  - Diarrhea (~81% any grade — combination effect with capecitabine)
  - Palmar-plantar erythrodysesthesia (capecitabine effect)
  - Hepatotoxicity
  - Nausea, fatigue
  - Hypersensitivity

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed: null
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_14c
draft_revision: 2
notes: >
  HER2CLIMB: tucatinib + capecitabine + trastuzumab improved OS + intracranial response in heavily pretreated HER2+ metastatic, including active brain metastases — major unmet need addressed.
notes_ua: >
  Дослідження HER2CLIMB: тукатиніб + капецитабін + трастузумаб
  покращили загальну виживаність та забезпечили внутрішньочерепну
  відповідь у пацієнток з інтенсивно попередньо лікованим
  HER2-позитивним метастатичним раком молочної залози, включно з
  пацієнтками з активними метастазами у головний мозок —
  закрита суттєва нереалізована клінічна потреба.
