id: DRUG-TUCATINIB
names:
  preferred: "Tucatinib"
  ukrainian: "Тукатиніб"
  english: "Tucatinib"
  brand_names: ["Tukysa"]
atc_code: L01EH03
rxnorm_id: null
drug_class: "HER2-selective oral tyrosine kinase inhibitor"
mechanism: >
  Highly HER2-selective TKI (vs lapatinib which inhibits both HER2 and EGFR). CNS-penetrant — particularly active in patients with brain metastases, where most other HER2-targeted agents have limited efficacy.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: null
    notes: "Not yet registered in Ukraine (2025). Off-label access only."

typical_dosing: >
  300 mg PO BID continuous. Combined with capecitabine + trastuzumab (HER2CLIMB regimen).

key_toxicities:
  - Diarrhea (~81% any grade — combination effect with capecitabine)
  - Palmar-plantar erythrodysesthesia (capecitabine effect)
  - Hepatotoxicity
  - Nausea, fatigue
  - Hypersensitivity

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed: null
notes: >
  HER2CLIMB: tucatinib + capecitabine + trastuzumab improved OS + intracranial response in heavily pretreated HER2+ metastatic, including active brain metastases — major unmet need addressed.
