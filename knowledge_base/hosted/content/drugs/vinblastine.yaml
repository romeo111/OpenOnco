notes: "Used in ABVD (Hodgkin), other regimens. Cap at 12 mg total dose typical. Hepatic dose adjustment for total bilirubin >3 mg/dL."
notes_ua: >
  Вінбластин (vinblastine) застосовується у режимі ABVD (лімфома
  Ходжкіна) та інших схемах. Типове обмеження сумарної дози —
  12 mg на введення. При підвищенні загального білірубіну
  понад 3 mg/dL потрібна корекція дози.
