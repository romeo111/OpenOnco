id: DRUG-VINCRISTINE
names:
  preferred: "Vincristine"
  ukrainian: "Вінкристин"
  english: "Vincristine"
  brand_names:
    - "Oncovin"
    - "Vincasar"
atc_code: L01CA02
rxnorm_id: "11202"
drug_class: "antineoplastic — vinca alkaloid (microtubule inhibitor)"
mechanism: >
  Binds tubulin, prevents microtubule polymerization, blocks mitotic
  spindle formation → arrests cells in metaphase, induces apoptosis.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 1963
    indications_brief: ["Lymphoma (R-CHOP, ABVD, BEACOPP)", "ALL induction (hyper-CVAD)", "Pediatric solid tumors (Wilms, neuroblastoma, rhabdomyosarcoma)", "ITP (off-label)"]
  ema:
    approved: true
    year_first_approval: 1965
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Лімфоми (R-CHOP, BEACOPP, EPOCH)"
      - "Гострий лімфобластний лейкоз (індукція + підтримка)"
      - "Множинна мієлома (VAD — історично)"
    last_verified: "2026-04-27"
absolute_contraindications:
  - "INTRATHECAL administration is FATAL — IV-only drug"
  - "Demyelinating Charcot-Marie-Tooth disease"
  - "Severe pre-existing neuropathy"
  - "Hypersensitivity"
black_box_warnings:
  - "FATAL if administered intrathecally — must be packaged in mini-bag, never syringe, per WHO/FDA"
major_interactions:
  - "Strong CYP3A4 inhibitors (azoles, ritonavir): increase neurotoxicity"
  - "Phenytoin: vincristine reduces phenytoin levels"
common_adverse_events:
  - "Peripheral neuropathy (sensory > motor, dose-cumulative)"
  - "Constipation / paralytic ileus"
  - "Alopecia"
  - "SIADH / hyponatremia"
  - "Jaw pain (early cycles)"
serious_adverse_events:
  - "Severe peripheral neuropathy (dose-limiting)"
  - "Autonomic neuropathy (postural hypotension, ileus)"
  - "Cranial nerve palsies"
  - "Death with intrathecal administration"

pharmacology:
  half_life_hours: 85  # triphasic; terminal ~85 h
  clearance: "hepatic (biliary)"
  protein_binding_pct: 75
  metabolism: "CYP3A4-mediated; biliary excretion (~80%) of parent and metabolites"

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-26"
reviewers: []
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_14c
draft_revision: 2
notes: >
  Cap at 2 mg per dose (regardless of BSA) to limit neuropathy. Held or
  dose-reduced for grade ≥2 peripheral neuropathy. Hepatic dose
  adjustment for total bilirubin >3 mg/dL. WHO has issued repeated
  warnings about fatal accidental intrathecal administration —
  always packaged in IV mini-bag, never as a syringe.

notes_ua: >
  Обмеження разової дози — 2 mg незалежно від площі поверхні
  тіла з метою зменшення нейротоксичності. Препарат
  тимчасово відмінити або знизити дозу при периферичній нейропатії
  2 ступеня та вище. Корекція дози при підвищенні загального
  білірубіну понад 3 mg/dL. ВООЗ неодноразово видавала
  попередження щодо смертельних випадків випадкового
  інтратекального введення — препарат завжди має бути упакований
  у внутрішньовенний міні-пакет, а не у шприц.

notes_patient: >
  Хіміотерапія, що блокує мікротрубочки — внутрішній «каркас» пухлинних клітин — і зупиняє їх поділ. Вводиться лише внутрішньовенно (ніколи в спинномозковий канал). Може викликати поколювання та оніміння кистей і стіп.
