id: DRUG-VISMODEGIB
names:
  preferred: "Vismodegib"
  ukrainian: "Візомодегіб"
  english: "Vismodegib"
  brand_names: ["Erivedge"]
atc_code: L01XX43
rxnorm_id: null
drug_class: "Hedgehog pathway inhibitor (SMO antagonist)"
mechanism: >
  Small-molecule inhibitor of Smoothened (SMO), the key transmembrane effector
  of the Hedgehog (HH) signaling pathway. In basal cell carcinoma, HH pathway
  activation drives tumor proliferation — ~90% of BCC harbor PTCH1 (Patched-1)
  loss-of-function mutations or SMO activating mutations that constitutively
  activate the pathway. Vismodegib binds SMO and prevents signal transduction
  to GLI transcription factors, suppressing HH target genes (BCL2, CCND1, PTCH2)
  and inducing tumor differentiation/apoptosis. Biomarker testing (SMO/PTCH1)
  is NOT required for clinical use — all BCC has HH pathway activation.

regulatory_status:
  fda:
    approved: true
    indication_summary: "Locally advanced BCC not amenable to surgery or radiation, AND metastatic BCC (FDA January 2012; ERIVANCE)"
  ema:
    approved: true
    indication_summary: "Treatment of adult patients with symptomatic metastatic BCC, or locally advanced BCC not appropriate for surgery or radiotherapy (EMA 2013)"
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-05-04"
    notes: |
      Не зареєстровано в Україні (Держреєстр ЛЗ — РП відсутнє). Генерики можуть
      бути доступні на деяких ринках (Індія). Орієнтовна вартість оригіналу: USD
      ~15 000–18 000/міс. Шляхи доступу: named-patient import або клінічне дослідження.

typical_dosing: >
  150 mg PO once daily continuously, with or without food.
  Continue until disease progression or unacceptable toxicity.
  Drug holidays (treatment breaks): some centers use 12-week-on / 8-week-off
  schedule per MIKIE trial (Sekulic 2017) to reduce cumulative toxicity —
  comparable efficacy with lower AE burden; not the FDA-approved schedule.
  Treatment duration: response may require 3-6 months; CR patients may benefit
  from completing 24 weeks before reassessment for treatment break.
formulations: ["Capsules 150 mg"]

absolute_contraindications:
  - "Pregnancy — highly teratogenic (Category X); embryo-fetal toxicity; fetal death and severe malformations documented in animal studies. VERIFY PREGNANCY STATUS before starting."
  - "Breastfeeding — unknown excretion; potential harm to infant"

relative_contraindications:
  - "Women of childbearing potential must use two methods of contraception during treatment and for 24 months after last dose"
  - "Male patients must use condoms during treatment and for 3 months after last dose (even if vasectomized)"
  - "Concurrent use with vemurafenib or cobimetinib (imatinib-based ERK pathway cross-talk) — pharmacokinetic interaction limited data"

key_adverse_effects:
  - "Muscle spasms — ~72% any grade; most common AE; can be disabling; managed with magnesium/quinine"
  - "Alopecia — ~64% (diffuse hair loss; usually reversible after discontinuation)"
  - "Dysgeusia (taste disturbance) — ~55% (metallic, reduced taste perception)"
  - "Weight loss — ~45% (often associated with anorexia/dysgeusia)"
  - "Fatigue — ~40%"
  - "Nausea — ~30%"
  - "Diarrhea — ~29%"
  - "Decreased appetite — ~25%"
  - "Amenorrhea — prolonged in premenopausal women; may persist after discontinuation"
  - "Grade ≥3 adverse events: ~28% (muscle spasm, weight loss, fatigue most common)"

drug_drug_interactions:
  - "Strong CYP inducers (rifampicin, phenytoin): may reduce vismodegib exposure — use with caution"
  - "P-glycoprotein inhibitors (itraconazole, clarithromycin): may increase exposure — monitor"
  - "Proton pump inhibitors: reduce gastric pH; oral solubility not significantly affected for vismodegib (unlike many TKIs)"

monitoring_requirements:
  - "Pregnancy test: before starting, monthly during treatment, and 24 months after last dose (women of childbearing potential)"
  - "Weight and nutritional status: baseline + every 4-8 weeks (weight loss common)"
  - "Tumor assessment (MRI/CT or clinical photography): baseline + every 12 weeks"
  - "Serum magnesium: if muscle spasms Grade ≥2 (hypomagnesemia can worsen muscle spasms)"

sources:
  - SRC-NCCN-SKIN-2025

last_reviewed: "2026-05-04"
reviewers: []
