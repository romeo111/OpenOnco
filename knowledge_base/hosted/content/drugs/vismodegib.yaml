id: DRUG-VISMODEGIB
names:
  preferred: "Vismodegib"
  english: "Vismodegib"
  synonyms: ["GDC-0449"]
  brand_names: ["Erivedge"]
atc_code: L01XJ01
rxnorm_id: ""
drug_class: "Hedgehog pathway inhibitor; SMO antagonist"
mechanism: >
  Small-molecule antagonist of Smoothened (SMO), blocking Hedgehog pathway
  signaling downstream of PTCH1 loss or SMO activation. In BCC, clinical
  eligibility is based on advanced disease extent and local-therapy suitability,
  not on required molecular testing.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2012
    indications_brief:
      - "Adults with metastatic BCC"
      - "Adults with locally advanced BCC that recurred after surgery or who are not candidates for surgery and radiation"
  ema: null
  ukraine_registration: null

typical_dosing: >
  150 mg orally once daily, with or without food, until disease progression or
  unacceptable toxicity.
formulations:
  - "150 mg oral capsule"

absolute_contraindications: []
black_box_warnings:
  - "Embryo-fetal toxicity; can cause embryo-fetal death or severe birth defects"
major_interactions:
  - "Avoid pregnancy exposure; contraception and reproductive-risk counseling required per label"
common_adverse_events:
  - "Muscle spasms"
  - "Alopecia"
  - "Dysgeusia or ageusia"
  - "Weight loss"
  - "Fatigue"
  - "Nausea"
  - "Diarrhea"
  - "Decreased appetite"
serious_adverse_events:
  - "Severe cutaneous adverse reactions"
  - "Severe or intolerable musculoskeletal adverse reactions"
  - "Premature fusion of epiphyses in pediatric exposure"

pharmacology: null

sources:
  - SRC-FDA-ERIVEDGE-LABEL-2024
  - SRC-ERIVANCE-SEKULIC-2012
  - SRC-NCCN-SKIN-2025
last_reviewed: "2026-05-07"
reviewers: []
notes: >
  Draft drug entity added to close the BCC regimen-component gap. Keep access,
  reimbursement, and jurisdictional details pending formal regulatory review.
