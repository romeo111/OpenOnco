id: DRUG-VISMODEGIB
names:
  preferred: "Vismodegib"
  ukrainian: "Візомодегіб"
  english: "Vismodegib"
  brand_names: ["Erivedge"]
atc_code: L01XX43
rxnorm_id: "1147220"
drug_class: "Hedgehog pathway inhibitor (SMO antagonist)"
mechanism: >
  First-in-class oral SMO (Smoothened) antagonist. Binds and inhibits
  SMO, blocking downstream HH (Hedgehog) signaling cascade (GLI1/GLI2
  transcription factor activation). In BCC, activating SMO mutations
  or PTCH1 loss-of-function constitutively activate HH → tumor growth.
  ERIVANCE pivotal trial: ORR 43% (mBCC) / 30% (laBCC) with durable
  responses. FDA-approved 2012.

regulatory_status:
  fda:
    approved: true
  ema:
    approved: true
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-05-04"
    notes: |
      Не зареєстровано в Україні (Держреєстр ЛЗ — РП відсутнє станом на
      2026-05-04). Інгібітор HH-шляху для місцево-поширеного / метастатичного
      БКК. Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - Cross-border (EU): EU онкоцентри через "Лікування за кордоном"
        (наказ МОЗ 988); EMA-затверджено для laBCC/mBCC.
      Source: drlz.com.ua пошук "vismodegib"/"erivedge" 2026-05-04 — РП відсутнє.

typical_dosing: "150 mg PO once daily, continuous until progression or unacceptable toxicity. Take with or without food."
formulations: ["Capsule 150 mg"]

absolute_contraindications:
  - "Pregnancy (teratogenic — embryo-fetal toxicity; Black Box Warning)"
  - "Breastfeeding"
black_box_warnings:
  - "Embryo-fetal toxicity — teratogenic, embryotoxic; contraindicated in pregnancy; verify negative pregnancy test before start; two contraceptive methods required"
major_interactions:
  - "P-gp inhibitors: increase vismodegib exposure; clinical significance unclear"
  - "Proton pump inhibitors: may decrease absorption (pH-dependent solubility)"
common_adverse_events:
  - "Muscle spasms (~72%) — most bothersome; dose-limiting"
  - "Alopecia (~64%)"
  - "Dysgeusia / taste disturbance (~55%)"
  - "Weight loss (~45%)"
  - "Fatigue (~40%)"
  - "Nausea / vomiting"
  - "Decreased appetite"
  - "Amenorrhea / oligomenorrhea (in premenopausal women)"
serious_adverse_events:
  - "Embryo-fetal toxicity (teratogenicity)"
  - "Severe musculoskeletal toxicity requiring treatment discontinuation"

pharmacology:
  half_life: "~4 days (single dose); ~12 days (multiple doses, saturable binding)"

sources:
  - SRC-NCCN-SKIN-2025

last_reviewed: "2026-05-04"
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_14c
draft_revision: 2
notes: >
  ERIVANCE trial (Sekulic 2012 NEJM): ORR 43% in metastatic BCC, 30% in
  locally advanced BCC; median duration of response ~7.6 months. Most
  patients discontinue due to AEs (primarily muscle cramps, alopecia,
  dysgeusia) rather than progression. Drug holiday strategy (intermittent
  dosing) investigated to reduce toxicity and potentially prevent
  resistance. Long-lasting drug due to plasma protein binding — must
  counsel on teratogenicity risk for weeks after stopping.
notes_ua: >
  Дослідження ERIVANCE (Sekulic 2012, NEJM): загальна частота
  відповіді (ORR) 43% при метастатичному базальноклітинному раку
  шкіри (BCC), 30% при місцево-поширеному BCC; медіана тривалості
  відповіді близько 7.6 місяця. Більшість пацієнтів припиняють
  лікування візомодегібом (vismodegib) через небажані явища
  (передусім м’язові судоми, алопецію, дисгевзію), а не через
  прогресування захворювання. Досліджується стратегія «лікарських
  канікул» (інтермітуючий режим прийому) для зменшення
  токсичності та потенційної профілактики резистентності.
  Через високе зв’язування з білками плазми ефект препарату
  тривалий — пацієнтів необхідно інформувати щодо ризику
  тератогенності упродовж тижнів після припинення прийому.
