notes: >
  STUB — pending Clinical Co-Lead sign-off. Authored 2026-05-04 (Workstream DI).
  First-in-class SMO antagonist; first HH pathway inhibitor approved by FDA (2012).
  TERATOGENICITY is the critical patient safety issue — mandatory pregnancy prevention
  program for all patients of reproductive potential. Ukraine: not registered;
  named-patient import required.
