id: DRUG-VORASIDENIB
names:
  preferred: "Vorasidenib"
  ukrainian: "Ворасіденіб"
  english: "Vorasidenib"
  brand_names: ["Voranigo"]
atc_code: "L01XE56"
rxnorm_id: null
drug_class: "Pan-IDH inhibitor (IDH1/IDH2; brain-penetrant targeted small molecule)"
mechanism: >
  Dual inhibitor of mutant isocitrate dehydrogenase 1 (IDH1; R132C/H/G/S) and
  mutant IDH2 (R172K/S/G/M). Mutant IDH1/IDH2 converts alpha-ketoglutarate to
  the oncometabolite 2-hydroxyglutarate (2-HG), which inhibits TET2 and histone
  demethylases, causing widespread epigenetic dysregulation and blocked
  differentiation in IDH-mutant glioma cells.
  Vorasidenib reduces intratumoral 2-HG to restore epigenetic homeostasis and
  inhibit glioma cell proliferation. Unlike ivosidenib (IDH1-only; primarily designed
  for AML), vorasidenib was designed for CNS penetration — brain:plasma ratio ~3–9×,
  enabling therapeutic 2-HG suppression within the tumor microenvironment.
  Mechanism is CYTOSTATIC, not cytotoxic — primary effect is disease stabilization
  (PFS prolongation) with low ORR, explaining the INDIGO trial endpoints.

regulatory_status:
  fda:
    approved: true
    indications:
      - "IDH1 or IDH2-mutant grade 2 astrocytoma or oligodendroglioma in adults and pediatric patients ≥12 years with residual or recurrent disease following surgery (August 6, 2024)"
    approval_type: "regular approval"
    approval_basis: "INDIGO Phase 3 (NCT04164901; Mellinghoff 2023 NEJM)"
  ema:
    approved: false
    status: "Under regulatory review (EMA application filed; MAA pending)"
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-05-04"
    notes: >
      NOT registered in Ukraine as of May 2026. Voranigo (Servier) available in
      the US and under EMA review; no Ukrainian registration pathway announced.
      Named-patient import theoretically possible but logistics complex for a
      novel oncology agent. Clinical trial referral preferred for Ukrainian patients.

typical_dosing: >
  40 mg PO once daily continuously (with or without food).
  Continue until disease progression or unacceptable toxicity.
  Starting dose: 40 mg QD (the INDIGO trial dose; do not reduce initially).
  Dose reductions: 20 mg QD (first reduction), then 10 mg QD if required.

key_toxicities:
  - "ALT/AST elevation (any grade ~34%/~29%; Grade ≥3 ALT ~9.6%; Grade ≥3 AST ~4.8%) — most clinically significant AE; monthly LFT monitoring required"
  - "Nausea (any grade ~22%; Grade ≥3 <1%)"
  - "Fatigue (any grade ~20%; manageable)"
  - "Headache (~18% — difficult to distinguish from underlying glioma symptom)"
  - "Seizure (~8% — monitor but glioma patients have baseline seizure risk)"
  - "COVID-19 infections (higher in vorasidenib arm — unclear if drug-related vs enrollment period)"
  - "Prolonged QTc: monitor ECG in patients with cardiac risk factors"

monitoring_requirements:
  - "LFTs (ALT/AST/ALP/bilirubin): baseline + monthly × 3 months, then q3 months (grade ≥3 elevation → hold; grade ≥3 bilirubin → consider discontinuation)"
  - "MRI brain: baseline + q8 weeks × 12 months, then q12–16 weeks (RANO-LGG criteria)"
  - "Neurological examination: each visit"
  - "Seizure diary: monthly assessment"
  - "Pregnancy test: women of reproductive potential before and monthly during treatment"

dose_modifications:
  - trigger: "ALT/AST Grade 2 (>3–5× ULN): monitor q2 weeks; if does not improve within 4 weeks, reduce to 20 mg QD"
  - trigger: "ALT/AST Grade 3 (>5–20× ULN) or Grade ≥2 total bilirubin: HOLD; reduce to 20 mg QD on recovery to Grade ≤1"
  - trigger: "ALT/AST Grade 4 (>20× ULN) or Grade ≥2 bilirubin with Grade ≥2 AST/ALT: DISCONTINUE permanently"
  - trigger: "Other Grade ≥3 non-hematologic toxicity: hold until recovery to Grade ≤1; restart at 20 mg QD"

drug_interactions:
  - "Strong CYP3A4 inhibitors (ketoconazole, clarithromycin): increase vorasidenib exposure — avoid; if unavoidable, consider dose reduction"
  - "Strong CYP3A4 inducers (rifampicin, carbamazepine, phenytoin, phenobarbital): decrease exposure — avoid; note carbamazepine and phenytoin are common antiepileptics in glioma patients — discuss antiseizure medication management with neurology"
  - "CYP2C9 substrates: vorasidenib is a CYP2C9 inhibitor; warfarin dose adjustment may be needed"

contraindications:
  - "Pregnancy: potential teratogenicity based on mechanism (IDH inhibitors disrupt differentiation); effective contraception required"
  - "Severe hepatic impairment (Child-Pugh C): not studied in INDIGO; use with extreme caution"
  - "IDH-wildtype glioma: no benefit without IDH mutation (mechanism requires mutant IDH)"

formulations:
  - "Tablets: 10 mg, 40 mg"

last_reviewed: "2026-05-04"
reviewers: []
reviewer_signoffs: 0
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  STUB — pending Clinical Co-Lead sign-off. Authored 2026-05-04 (Workstream DL).
  Vorasidenib (Voranigo; Servier) is a pan-IDH1/2 inhibitor designed specifically
  for CNS penetration — brain:plasma ratio of ~3–9× enables intratumoral 2-HG
  suppression. This distinguishes it from ivosidenib (IDH1-only; poor CNS penetration)
  and enasidenib (IDH2-only). INDIGO Phase 3 (Mellinghoff 2023 NEJM): mPFS 27.7 vs
  11.1 months; HR 0.39; p<0.001. First drug approved specifically for IDH-mutant LGG.
  Important CYP interaction: common antiseizure drugs (carbamazepine, phenytoin,
  phenobarbital) are CYP3A4 inducers — switch to levetiracetam or lacosamide if
  starting vorasidenib to avoid drug interaction reducing efficacy.
