id: DRUG-ZANUBRUTINIB
names:
  preferred: "Zanubrutinib"
  ukrainian: "Занубрутиніб"
  english: "Zanubrutinib"
  brand_names: ["Brukinsa"]
atc_code: L01EL03
rxnorm_id: "2375871"
drug_class: "Second-generation BTK inhibitor (highly selective)"
mechanism: "Covalent irreversible BTK inhibitor with optimized selectivity vs ibrutinib — minimal off-target binding to TEC/ITK/EGFR, lower cardiac toxicity, lower bleeding."

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration: {registered: true, reimbursed_nszu: false, last_verified: "2026-04-25"}

typical_dosing: "160 mg PO BID OR 320 mg PO once daily, continuous until progression or intolerance"
formulations: ["Capsules 80 mg"]

absolute_contraindications: ["Severe hepatic impairment", "Hypersensitivity"]
black_box_warnings: []
major_interactions: ["Strong CYP3A4 inhibitors/inducers — dose modify", "Anticoagulants — bleeding risk"]
common_adverse_events: ["Neutropenia", "Upper respiratory infection", "Bruising", "Diarrhea"]
serious_adverse_events: ["Major bleeding", "Atrial fibrillation (low rate)", "Severe infections"]

pharmacology: {half_life: "~2-4 hours; sustained BTK occupancy"}
sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Approved for CLL, MCL, WM, MZL r/r. ASPEN trial in WM: superior
  hematologic response + safety vs ibrutinib in MYD88-mutated cohort.
  Ukraine: registered, NOT НСЗУ-reimbursed.
