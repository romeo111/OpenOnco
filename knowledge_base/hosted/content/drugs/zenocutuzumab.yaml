id: DRUG-ZENOCUTUZUMAB
names:
  preferred: "Zenocutuzumab"
  ukrainian: "Зенокутузумаб"
  english: "Zenocutuzumab"
  brand_names: ["Bizengri"]
atc_code:
rxnorm_id:
drug_class: "HER2 × HER3 bispecific antibody (NRG1-fusion-targeted)"
mechanism: >
  Humanized IgG1 bispecific antibody binding HER2 (one arm) and HER3 (other arm). Mechanism of action against NRG1-fusion-driven tumors: zenocutuzumab docks on HER2, blocks the NRG1-fusion ligand from engaging HER3, disrupting HER2-HER3 heterodimerization and downstream PI3K/AKT signalling. NRG1 fusions are rare (<1%) but occur across pancreatic, NSCLC, breast, cholangiocarcinoma, and other solid tumors.

regulatory_status:
  fda:
    approved: true
    notes: "FDA approved 2024-12-04 (Bizengri, accelerated approval) — advanced unresectable or metastatic NRG1-fusion-positive non-small-cell lung cancer (NSCLC) and pancreatic adenocarcinoma after prior systemic therapy. First and only therapy approved for NRG1-fusion solid tumors."
  ema: {approved: false}
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-04-29"
    notes: "Не зареєстрований в Україні станом на 2026-04. НСЗУ не покриває. Доступ — клінічні випробування або import. Джерело: dls.gov.ua реєстр (2026-04)."

    reimbursement_indications: []
typical_dosing: >
  750 mg IV q2 weeks until disease progression or unacceptable toxicity. Premedicate with antihistamine + acetaminophen ± corticosteroid for first infusion.

key_toxicities:
- Infusion-related reactions (~14% — premedication + slow first infusion)
- Diarrhea (~25%)
- Musculoskeletal pain (~32%)
- Fatigue (~32%)
- Nausea (~24%)
- Rash
- Edema
- Hepatic enzyme elevation (monitor LFTs)
- Cardiotoxicity / decreased LVEF (HER2-class effect — baseline echo + serial monitoring)
- Embryo-fetal toxicity (HER2-class — contraception required)

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed:
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_14c
draft_revision: 2
notes: >
  eNRGy trial (NCT02912949): Phase II, NRG1-fusion-positive solid tumors (pan-tumor basket). NSCLC cohort: ORR 33%, mDOR 7.4 mo. Pancreatic adenocarcinoma cohort: ORR 40%, mDOR 7.4 mo. FDA accelerated approval Dec 2024 — confirmatory study required. NRG1 fusion testing requires RNA-based NGS (DNA NGS misses many fusions). Trial-source SRC for eNRGy not yet ingested into KB — FLAG for follow-up.
notes_ua: >
  Дослідження eNRGy (NCT02912949): фаза II, кошикове
  дослідження пан-нозологічних NRG1-fusion-позитивних солідних
  пухлин. Когорта НДРЛ: загальна частота відповіді (ORR) 33%,
  медіана тривалості відповіді 7.4 міс. Когорта аденокарциноми
  підшлункової залози: ORR 40%, медіана тривалості відповіді
  7.4 міс. FDA надала прискорене схвалення зенокутузумабу
  (zenocutuzumab) у грудні 2024 — необхідне підтверджуюче
  дослідження. Тестування на NRG1-fusion потребує
  секвенування нового покоління на основі РНК (RNA-based NGS;
  DNA-NGS пропускає багато злиттів). Опорне джерело eNRGy ще
  не внесено до бази знань — позначено для подальшого
  опрацювання.

notes_patient: >
  Перше у світі схвалене лікування для рідкісного NRG1-fusion раку (легені, підшлункова, інші). Біспецифічне антитіло — одночасно блокує HER2 і HER3. FDA схвалив у грудні 2024 (прискорено). Виявлення NRG1-fusion потребує RNA-секвенування (звичайний DNA-тест часто пропускає).
