rationale: >
  Midostaurin 100 mg BID is the alternative 1L for advanced SM in
  three scenarios: (1) avapritinib contraindicated (platelets <50)
  per boxed warning, (2) KIT D816V-negative advanced SM where
  avapritinib lacks activity, (3) avapritinib inaccessible (Ukraine
  context — avapritinib unregistered, midostaurin НСЗУ-reimbursed).
  Pre-avapritinib it was the standard-of-care; ORR by IWG criteria
  ~60% with mast-cell-burden reduction. Substantial GI toxicity —
  ~30% require dose reduction. NB: the rare D816V-negative variant
  driven by FIP1L1-PDGFRA is actually a separate WHO entity (myeloid
  neoplasm with eosinophilia) and is treated with imatinib, not
  midostaurin — outside this indication.

rationale_ua: >
  Мідостаурин (midostaurin) у дозі 100 mg BID є альтернативним препаратом першої лінії при
  поширеному системному мастоцитозі в трьох клінічних ситуаціях: (1) авапритиніб протипоказаний (тромбоцити
  <50×10⁹/л) відповідно до застереження в інструкції; (2) поширений SM з KIT D816V-негативним статусом,
  при якому авапритиніб не проявляє активності; (3) відсутність доступу до авапритинібу (в умовах України —
  авапритиніб незареєстрований, мідостаурин відшкодовується НСЗУ). До появи авапритинібу мідостаурин
  вважався стандартом лікування; загальна частота відповіді за критеріями IWG становить ~60% зі зменшенням
  пухлинного навантаження мастоцитів. Значна ШКТ-токсичність спостерігається у ~30% пацієнтів, що потребує
  зниження дози. Важливо: рідкісний D816V-негативний варіант, зумовлений злиттям FIP1L1-PDGFRA, є окремою
  нозологічною одиницею за класифікацією ВООЗ (мієлоїдне новоутворення з еозинофілією) і лікується
  іматинібом — ця ситуація виходить за межі даного показання.
