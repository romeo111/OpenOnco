do_not_do:
  - "НЕ призначати при CD30 <10% (ІГХ) — відсутність мішені; азацитидін або ромідепсин"
  - "НЕ призначати при попередньому BV (будь-яка лінія) — перехресна резистентність"
  - "НЕ призначати при периферичній нейропатії ≥2 ступ. — MMAE нейротоксичність адитивна"
  - "CD30 тест на матеріалі рецидиву (не лише первинної біопсії) — CD30 може змінитися"
  - "При відповіді → ініціювати типування HLA та пошук донора (алоТГСК — куративна мета)"
  - "В Україні: BV не НСЗУ; перевірити доступ (компасійне, клінічне дослідження) перед початком"

