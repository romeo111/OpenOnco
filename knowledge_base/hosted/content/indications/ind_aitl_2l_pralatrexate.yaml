id: IND-AITL-2L-PRALATREXATE
plan_track: aggressive

applicable_to:
  disease_id: DIS-AITL
  line_of_therapy: 2
  stage_requirements:
    - "Relapsed or refractory angioimmunoblastic T-cell lymphoma (AITL) after ≥1 prior systemic line"
    - "HDACi-refractory or HDACi-intolerant (prior romidepsin/belinostat failed or inaccessible)"
    - "OR belinostat inaccessible + romidepsin inaccessible + seeking antifolate-mechanism alternative"
    - "ECOG PS 0-2"
    - "CrCl ≥30 mL/min (pralatrexate primarily renally cleared; mucositis risk increased at lower CrCl)"
    - "No prior Grade ≥3 mucositis from antifolates (methotrexate/pralatrexate)"
    - "Folate 1 mg PO daily started ≥10 days before first dose (mandatory); B12 1 mg IM q8-10 weeks"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    notes: >
      PROPEL enrolled PTCL (including AITL) with ECOG 0-2. AITL patients
      tolerate pralatrexate similarly to PTCL-NOS. Prior HDACi failure (romidepsin,
      belinostat, vorinostat) does not exclude pralatrexate — distinct antifolate
      mechanism (RFC/FPGS-based) with no cross-resistance to HDACi class.
      In AITL, azacitidine is generally preferred as UA-accessible HMA (AITL
      TFH-epigenetic biology); pralatrexate is reserved when azacitidine inadequate
      and HDACi both inaccessible/refractory.

recommended_regimen: REG-PRALATREXATE-PTCL
concurrent_therapy:
  - "MANDATORY: folic acid 1 mg PO daily starting 10 days before first dose, throughout therapy + 30 days post"
  - "MANDATORY: vitamin B12 1 mg IM every 8-10 weeks throughout therapy"
  - "Oral cryotherapy (ice chips/cold water rinse) during each IV push — mucositis mitigation"
  - "5-HT3 antagonist + dexamethasone premedication before each infusion"
  - "PJP prophylaxis (TMP-SMX 160/800 mg 3×/week) — lymphodepletion risk"
  - "Herpes prophylaxis (acyclovir/valacyclovir) — T-cell lymphopenia"

followed_by:
  - "Bone marrow biopsy + CT reassessment after 2 cycles (weeks 14-15): assess CR/PR/PD"
  - "Fit responders (CR/PR): alloSCT evaluation — only curative strategy in r/r AITL"
  - "Partial response at 4 cycles: continue to 6 cycles if tolerating; MDT reassessment"
  - "Progression or unacceptable toxicity: MDT discussion — clinical trial, azacitidine combination (OPTILY-1 emerging), or BSC"

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~29% across r/r PTCL subtypes including AITL (PROPEL; n=111)"
  complete_response: "~11% (PROPEL; PTCL-NOS + AITL + ALCL ALK-)"
  progression_free_survival: "Median PFS ~3.5 months; mDOR 10.1 months in responders"
  overall_survival_5y: "~25-30% (heavily pretreated PTCL; small subgroup data)"
  notes: >
    PRIMARY EVIDENCE: PROPEL (O'Connor 2011 JCO; NCT00114296; N=111):
    - Single-arm phase 2; r/r PTCL after ≥1 prior therapy
    - Overall: ORR 29%; CR 11%; mDOR 10.1 mo; mPFS 3.5 mo
    - AITL subgroup (n=17): ORR 35% — numerically higher than PTCL-NOS,
      possibly reflecting AITL's epigenetic vulnerability to antifolate
      mechanisms; CR ~12% in AITL subgroup (small numbers)
    - FDA accelerated approval September 2009 based on ORR

    AITL-SPECIFIC CONTEXT: AITL harbors frequent TET2/DNMT3A/IDH2 mutations
    affecting folate metabolism pathways indirectly. Pralatrexate's RFC-1
    selectivity (higher uptake in T-lymphoma cells) may contribute to the
    numerically higher AITL response rate in PROPEL versus PTCL-NOS.
    As a bridge to alloSCT, even PR responses allow transplant eligibility.

    UKRAINE: Pralatrexate not registered (no EMA approval since 2012 withdrawal).
    Named-patient import from US sources required. Azacitidine remains the
    preferred UA-accessible option (NSZU MDS basket for AITL compassionate use).

hard_contraindications:
  - "CrCl <20 mL/min — severe renal impairment; pralatrexate renal clearance dominant"
  - "Grade ≥3 mucositis at baseline — pralatrexate will exacerbate"
  - "Prior severe (Grade ≥3) mucositis on antifolate therapy (methotrexate or pralatrexate) — retreatment very high risk"
  - "Failure to initiate/take folate + B12 supplementation — mandatory; withhold first dose until confirmed"

red_flags_triggering_alternative:
  - RF-ORGAN-RENAL-IMPAIRED

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-PERIPHERAL-SMEAR
  - TEST-BM-ASPIRATE
  - TEST-BM-TREPHINE
  - TEST-FLOW-CYTOMETRY
  - TEST-CECT-CAP
  - "Creatinine clearance (CrCl) by Cockcroft-Gault — pralatrexate renal-dose threshold"
  - "Folate + vitamin B12 levels at baseline (supplement if deficient)"
  - "Oral cavity assessment (baseline mucositis risk)"

desired_tests:
  - "BRAF V600E if not tested — not directly applicable for pralatrexate but relevant for AITL classification (AITL is BRAF WT; V600E would suggest different diagnosis)"
  - "TET2/DNMT3A/IDH2 mutation panel — confirms AITL epigenetic biology; supports azacitidine combination in future"
  - "LDH at baseline (prognostic)"

rationale: >
  Pralatrexate (Folotyn) is an antifolate with selective high affinity for RFC-1
  (reduced folate carrier) and FPGS, allowing 10-fold greater intracellular
  accumulation than methotrexate in lymphoma cells. It is FDA-approved for r/r
  PTCL after ≥1 prior line based on PROPEL (O'Connor 2011 JCO; ORR 29%; CR 11%;
  mDOR 10.1 months; NCCN Cat 2A).

  AITL-SPECIFIC RATIONALE: AITL (DIS-AITL) is a TFH-derived lymphoma with frequent
  epigenetic mutations (TET2, DNMT3A, IDH2). In PROPEL, AITL subgroup (n=17)
  showed numerically higher ORR (~35%) vs PTCL-NOS. The distinct antifolate mechanism
  is non-cross-resistant with HDACi (romidepsin/belinostat), BV, or HMA (azacitidine),
  making it a viable option when these lines have failed or are inaccessible.

  SEQUENCING IN AITL 2L: Preferred 2L options in AITL are:
  1. BV (CD30+ AITL; NCCN Cat 2A; ORR ~54% CD30+ non-ALCL PTCL; Jacobsen 2015)
  2. Azacitidine (AITL TFH-epigenetic biology; UA-accessible via MDS basket)
  3. Romidepsin (HDACi; NCCN Cat 2A for PTCL) if accessible + HDACi-naive
  4. Belinostat (HDACi; NCCN Cat 2A) if romidepsin inaccessible
  5. Pralatrexate (antifolate; NCCN Cat 2A) — when HDACi both inaccessible or refractory

  MANDATORY FOLATE + B12: Essential to reduce mucositis without compromising anti-
  tumor activity. Must start 10 days before first dose.

  UKRAINE CONTEXT: Not registered; no EMA approval. Azacitidine strongly preferred
  (NSZU-accessible via MDS compassionate basket for AITL). Pralatrexate reserved
  for azacitidine-refractory/HDACi-inaccessible AITL where named-patient import
  feasible with oncology pharmacy and MDT oversight.

rationale_ua: >
  Пралатрексат (Folotyn) — антифолат із виборчою спорідненістю до RFC-1
  та FPGS, FDA-схвалений для р/р PTCL (PROPEL; ORR 29%; CR 11%; mDOR 10,1 міс.;
  NCCN Кат 2A). Підгрупа AITL у PROPEL (n=17): ORR ~35%.

  Механізм відрізняється від HDAC-інгібіторів → відсутня перехресна резистентність.
  Обов'язково: фолієва кислота 1 мг PO щодня (починаючи за 10 днів до першої дози)
  + вітамін B12 1 мг IM кожні 8-10 тижнів.

  В Україні: не зареєстрований (EMA відкликано 2012). Азацитидин — доступна
  альтернатива (НСЗУ через МДС-кошик для AITL). Пралатрексат — резерв при
  недоступності/резистентності до всіх HDAC-інгібіторів.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

do_not_do:
  - "НЕ починати без фолієвої кислоти 1 мг PO щодня (≥10 днів ДО першого введення) + B12 — ризик важкого мукозиту"
  - "НЕ вводити при CrCl <20 мл/хв — ниркова токсичність"
  - "НЕ вводити при тромбоцитах <50 000/мкл або ANC <1000/мкл — відкладіть"
  - "НЕ ігнорувати Grade ≥2 мукозит — утримайте та знизьте дозу до 20 мг/м²"
  - "НЕ призначати одночасно з TMP-SMX як профілактику PJP без моніторингу мукозиту (TMP конкурує з RFC-транспортом)"
  - "НЕ пропускати оцінку ротової порожнини перед кожним введенням"

sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN B-cell/T-cell 2025 Category 2A: pralatrexate 30 mg/m² IV weekly ×6 of
      7-week cycle for r/r PTCL (including AITL) after ≥1 prior systemic therapy
      (PROPEL; O'Connor 2011 JCO; ORR 29%; CR 11%; mDOR 10.1 mo). FDA accelerated
      approval September 2009. Mandatory folate + B12 supplementation.
  - source_id: SRC-ESMO-PTCL-2024
    position: supports
    relevant_quote_paraphrase: >
      ESMO PTCL Guidelines 2024: pralatrexate is a recommended option for r/r PTCL
      including AITL (NCCN-endorsed; PROPEL data). Antifolate mechanism
      non-cross-resistant with HDACi class.

known_controversies:
  - topic: "Pralatrexate vs azacitidine vs HDACi for 2L+ AITL"
    positions:
      - position: "Azacitidine — preferred for AITL TFH-epigenetic biology (TET2/DNMT3A/IDH2 mutations); UA-accessible via NSZU MDS basket; emerging RCT data (ORACLE, AITL-AZA); NCCN Cat 2A"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Romidepsin — NCCN Cat 2A; HDACi-naive gate; IV weekly schedule; active in PTCL/AITL; PROPEL-comparable ORR ~25-38%"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Pralatrexate — antifolate with non-overlapping mechanism; AITL subgroup ORR ~35% in PROPEL; useful after HDACi failure; not EMA-registered; UA-inaccessible"
        sources: [SRC-NCCN-BCELL-2025]
    our_default: "Azacitidine preferred for AITL 2L (epigenetic rationale + UA access). BV preferred if CD30+. Romidepsin/belinostat for HDACi-naive. Pralatrexate reserved for HDACi-refractory/inaccessible when named-patient import feasible."

