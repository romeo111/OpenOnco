desired_tests: []

rationale: >
  Fractionated gemtuzumab ozogamicin (3 mg/m² days 1, 4, 7) added to
  standard 7+3 induction is Category 1 1L for fit CD33+ AML with CBF
  / favorable / intermediate cytogenetics (NCCN preferred). ALFA-0701
  (Castaigne Lancet 2012): 2-yr EFS 40.8% vs 17.1% (HR 0.58);
  2-yr OS 53.2% vs 41.9% (HR 0.69). Hills meta-analysis 2014: GO
  reduces 5-yr mortality ~20% in favorable-risk (HR 0.47) +
  intermediate-risk (HR 0.84); NO benefit in adverse-risk (HR 1.03).
  CBF AML — inv(16)/CBFB::MYH11, t(8;21)/RUNX1::RUNX1T1 — derives
  greatest benefit. Daunorubicin 60 mg/m² (not 90) with concurrent
  GO due to additive cardiotoxicity. NOT for adverse-risk
  (complex karyotype, TP53-mutant, monosomy 7) — standard 7+3 alone
  + alloHCT-bridge is the appropriate path for that subset. Hepatic
  VOD/SOS is dominant safety concern — careful LFT monitoring +
  alloHCT timing (avoid GO within 90 days of planned transplant).

rationale_ua: >
  Фракційний гемтузумаб озогаміцин (3 mg/m² дні 1, 4, 7), доданий до стандартної індукції 7+3, є
  переважним варіантом першої лінії (NCCN категорія 1) для фізично збережених пацієнтів із CD33+ ГМЛ
  та CBF / сприятливою / проміжною цитогенетикою. Дослідження ALFA-0701 (Castaigne, Lancet 2012):
  2-річна виживаність без подій 40.8% проти 17.1% (HR 0.58); 2-річна загальна виживаність 53.2% проти
  41.9% (HR 0.69). Метааналіз Hills 2014: гемтузумаб знижує 5-річну смертність ~20% при сприятливому
  ризику (HR 0.47) і проміжному ризику (HR 0.84); при несприятливому ризику користь відсутня (HR 1.03).
  Найбільший виграш спостерігається при CBF ГМЛ — inv(16)/CBFB::MYH11, t(8;21)/RUNX1::RUNX1T1.
  Даунорубіцин використовується у дозі 60 mg/m² (не 90 mg/m²) у комбінації з гемтузумабом через
  адитивну кардіотоксичність. Не призначається при несприятливому ризику (складний каріотип,
  TP53-мутація, моносомія 7) — для цієї підгрупи показані стандартна 7+3 з мостом до алогенної
  трансплантації. Домінуючою проблемою безпеки є печінкова веноокклюзійна хвороба/синдром синусоїдальної
  обструкції (VOD/SOS) — необхідний ретельний моніторинг LFT та дотримання 90-денного інтервалу до
  запланованої трансплантації.
