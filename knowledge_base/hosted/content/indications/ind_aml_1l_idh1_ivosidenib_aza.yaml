id: IND-AML-1L-IDH1-IVOSIDENIB-AZA
plan_track: standard

applicable_to:
  disease_id: DIS-AML
  line_of_therapy: 1
  stage_requirements:
    - "Newly diagnosed AML (not R/R)"
    - "IDH1 R132 pathogenic mutation confirmed (Abbott RealTime IDH1 Assay)"
    - "Not candidate for intensive induction chemotherapy (age ≥75 OR comorbidities precluding 7+3)"
  biomarker_requirements:
    - "IDH1 R132 mutation: REQUIRED — companion diagnostic (Abbott RealTime IDH1 Assay) MANDATORY before treatment"
    - "FLT3 status: test regardless (if FLT3-ITD/TKD positive and patient fit: consider 7+3+midostaurin instead)"
    - "TP53/complex karyotype: document; does not preclude ivosidenib+aza but prognosis worse"
  demographic_constraints:
    ecog_max: 3

recommended_regimen: REG-IVOSIDENIB-AZA-AML

concurrent_therapy:
  - "AlloHCT evaluation for fit patients achieving CR/CRi — consult transplant team early"
  - "HBV prophylaxis if HBsAg+ or anti-HBc+: entecavir or tenofovir throughout therapy"

followed_by:
  - "AlloHCT consolidation if CR/CRi achieved and patient eligible (preferred if matched donor)"
  - "Continue ivosidenib+azacitidine maintenance if alloHCT not feasible (no fixed cycle cap)"

evidence_level: high
strength_of_recommendation: strong
nccn_category: 1

expected_outcomes:
  cr_rate: "47.2% (ivosidenib+aza) vs 14.9% (placebo+aza)"
  os_hr: "0.44 (95% CI 0.27–0.73; p=0.0008)"
  median_os: "24.0 months vs 7.9 months"
  efs_hr: "0.33 (95% CI 0.16–0.69; p=0.0011)"
  notes: >
    AGILE (DiNardo 2022 Lancet Oncol; NCT03173248; Phase 3; N=146):
    Ivosidenib 500 mg QD + azacitidine 75 mg/m² d1-7 q28d vs azacitidine+placebo.
    ND IDH1-mutated AML unfit for intensive induction.
    CR rate 47.2% vs 14.9%; ORR 62.5% vs 18.9%; OS HR 0.44; median OS 24.0 vs 7.9 mo.
    EFS HR 0.33 (p=0.0011). FDA approved May 25, 2022. NCCN AML 2025: Category 1.

hard_contraindications:
  - "IDH1 R132 mutation NOT confirmed — do not use without diagnostic confirmation"
  - "Candidate for intensive induction chemotherapy (7+3): consider 7+3 ± midostaurin or CPX-351 instead"
  - "QTc >450 ms at baseline (ivosidenib prolongs QTc — absolute contraindication)"
  - "Prior IDH1 inhibitor therapy"
  - "ECOG PS 4 (engine hard gate)"

red_flags_triggering_alternative:
  - "FLT3-ITD or FLT3-TKD positive: if patient becomes eligible for intensive chemo, 7+3+midostaurin preferred per RATIFY"
  - "QTc 450-500 ms at baseline: use with extreme caution; optimize electrolytes and avoid QT-prolonging drugs"
  - "Severe hepatic impairment (Child-Pugh B/C): ivosidenib hepatically metabolized; reduce dose and intensify monitoring"

required_tests:
  - "IDH1 mutation testing: Abbott RealTime IDH1 Assay — MANDATORY before treatment"
  - "FLT3 mutation testing: IDH1/FLT3 co-mutations occur; FLT3+ may alter 1L strategy"
  - "TP53, ASXL1, RUNX1, DNMT3A (ELN 2022 risk stratification)"
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - "Bone marrow biopsy: baseline (cytology, cytogenetics, NGS)"
  - "ECG baseline (QTc monitoring)"
  - "HBV serology: HBsAg + anti-HBc"

desired_tests:
  - "Germline BRCA/IDH1 sequencing: identify germline IDH1 variants"
  - "HLA typing: if alloHCT planned as consolidation"

rationale: >
  AGILE (DiNardo 2022 Lancet Oncol) established ivosidenib+azacitidine as the standard
  of care for IDH1-mutated ND AML unfit for intensive induction: CR 47.2% vs 14.9%,
  OS HR 0.44, median OS 24 vs 7.9 months. FDA approved May 25, 2022. NCCN Cat 1.
  IDH1 inhibitor (ivosidenib) blocks mutant IDH1 (R132) → reduces 2-hydroxyglutarate
  (oncometabolite) → allows myeloid differentiation (therapeutic mechanism distinct
  from cytotoxic VEN+AZA mechanism). Combination with azacitidine (hypomethylating
  agent) shows synergy: azacitidine-mediated demethylation + ivosidenib-mediated
  IDH1 inhibition targets two complementary resistance mechanisms.
  Key safety: IDH differentiation syndrome (IDS) — potentially fatal; requires
  empirical corticosteroids without waiting for confirmation; occurs in ~25% of patients.
  Not recommended for patients eligible for intensive induction — AGILE enrolled
  exclusively unfit patients; intensive chemo ± IDHi (emerging 7+3+ivosidenib data)
  is preferred for fit IDH1-mut AML patients.

sources:
  - source_id: SRC-AGILE-DINARDO-2022
    position: supports
    relevant_quote_paraphrase: "AGILE: ivosidenib+azacitidine in ND IDH1-mutated AML (unfit) — CR 47.2% vs 14.9%; OS HR 0.44; median OS 24.0 vs 7.9 mo; FDA May 2022; NCCN Cat 1"
  - source_id: SRC-NCCN-AML-2025
    weight: primary
  - source_id: SRC-ELN-AML-2022
    weight: primary

last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  Workstream EW 2026-05-04. Ivosidenib+azacitidine for ND IDH1-mut AML (AGILE).
  FDA May 2022. Fills PROD-5 deferred gap in AML 1L IDH1 indication.
  Wired into ALGO-AML-1L step 6 (split from IDH2 routing).
  REG-IVOSIDENIB-AZA-AML is distinct from REG-IVOSIDENIB-AML (monotherapy for R/R).
  IDH differentiation syndrome: critical safety consideration — empirical corticosteroids.
  Two-reviewer clinical signoff required per CHARTER §6.1.
