    position: supports
    relevant_quote_paraphrase: >
      NCCN AML 2025 Category 1: ivosidenib (AG-120; Tibsovo) 500 mg PO daily for
      relapsed/refractory IDH1-mutated AML (R132 hotspot mutations). FDA-approved
      July 2018 based on AG-120-AML (DiNardo 2018 NEJM). IDH differentiation syndrome
      monitoring and QTc monitoring mandatory. Bridge to alloHCT for fit responders.

