do_not_do:
  - "Не призначати без підтвердженої мутації IDH1 R132 — без молекулярного базису препарат неефективний"
  - "Не ігнорувати симптоми ІДС — лихоманка + задишка + набряки → НЕГАЙНО дексаметазон 10 мг IV q12год"
  - "Не починати при QTc >500 мс — абсолютне протипоказання; спочатку корегувати електроліти"
  - "Не застосовувати разом із сильними інгібіторами CYP3A4 без коригування дози (знизити до 250 мг/добу)"
  - "Не відкладати алоТКМ для придатних відповідачів (CR/CRi) — трансплантація суттєво покращує ЗВ"
  - "Не призначати при тяжкій печінковій недостатності (Child-Pugh C) — недостатньо даних"

sources:
