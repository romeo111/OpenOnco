  disease_id: DIS-AML
  line_of_therapy: 2
  stage_requirements:
    - "Relapsed or refractory AML after ≥1 prior systemic therapy (induction failure OR relapse after CR)"
    - "IDH2 R140Q or R172K mutation confirmed at relapse (NGS panel; rare loss possible — re-test at relapse preferred)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
