id: IND-AML-2L-IDH2-ENASIDENIB
plan_track: aggressive

applicable_to:
  disease_id: DIS-AML
  line_of_therapy: 2
  stage_requirements:
    - "Relapsed or refractory AML after ≥1 prior systemic therapy (induction failure OR relapse after CR)"
    - "IDH2 R140Q or R172K mutation confirmed at relapse (NGS panel; rare loss possible — re-test at relapse preferred)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-ENASIDENIB-AML
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "2A"

expected_outcomes:
