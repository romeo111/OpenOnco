  complete_response: "~19% CR; ~7% CRi/CRp"
  progression_free_survival: "Median DOR ~5.6 mo overall; longer in patients bridged to alloHCT"
  overall_survival_5y: "Median OS 9.3 mo (AG221-AML-001); ~25-30% 2-y OS for those bridged to alloHCT. IDHENTIFY phase-3 did not show OS benefit overall but enriched in HMA-naive subgroup."

