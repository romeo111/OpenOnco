  - source_id: SRC-ELN-AML-2022
    position: supports
    relevant_quote_paraphrase: "IDH2 inhibitor (enasidenib) is standard for R/R IDH2-mutated AML; bridge to alloHCT in responders"
  - source_id: SRC-ESMO-AML-2020
    position: supports
