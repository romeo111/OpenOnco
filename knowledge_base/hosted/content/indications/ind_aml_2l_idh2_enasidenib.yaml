rationale: >
  Enasidenib monotherapy is FDA-approved (Aug 2017) for R/R IDH2-
  mutated AML, on the basis of AG221-AML-001 phase 1/2: ORR 38%,
  CR 19%, median OS 9.3 mo. Mechanism: selective allosteric inhibitor
  of mutant IDH2 (R140Q, R172K) — reduces neomorphic 2-hydroxyglutarate
  oncometabolite, restoring TET2-dependent demethylation and inducing
  terminal differentiation of leukemic blasts. CRITICAL: re-test IDH2
  status at relapse (subclonal loss possible). Bridge to alloHCT for
  fit responders — enasidenib alone NOT curative. Continue ≥6 cycles
  before declaring non-response (median time to first response ~1.9
  mo). Differentiation syndrome (~14%) requires immediate
  dexamethasone + cytoreduction; hyperbilirubinemia (~80% any grade,
  UGT1A1 inhibition) usually asymptomatic. Major Ukraine access
  barrier: not registered, EU CHMP negative; international (US)
  referral or compassionate-use only. IDHENTIFY phase-3 (R/R AML)
  did not show OS benefit vs conventional care overall but enriched
  in IDH2-mut HMA-naive — argues for early use. Trial source
  SRC-AG221-AML-001 + SRC-IDHENTIFY pending.

rationale_ua: >
  Енасиденіб монотерапія FDA-схвалена (серпень 2017) для R/R IDH2-
  мутованої ГМЛ, на підставі AG221-AML-001 фаза 1/2: ORR 38%, ПР
  19%, медіана ЗВ 9.3 міс. Механізм: селективний алостеричний
  інгібітор мутантного IDH2 (R140Q, R172K) — знижує неоморфний
  оноокометаболіт 2-гідроксиглутарат, відновлюючи TET2-залежне
  деметилювання та індукуючи термінальну диференціацію лейкемічних
  бластів. КРИТИЧНО: повторно тестувати IDH2 при рецидиві
  (можлива субклональна втрата). Міст до алоТГСК для придатних
  респондерів — енасиденіб монотерапія НЕ курабельна. Продовжувати
  ≥6 циклів перед оголошенням non-response (медіана часу до першої
  відповіді ~1.9 міс). Синдром диференціації (~14%) потребує
  негайного дексаметазону + цитозниження; гіпербілірубінемія
  (~80% будь-якого ступеня, інгібування UGT1A1) зазвичай безсимптомна.
  Великий бар'єр доступу в Україні: не зареєстрований, EU CHMP
  негативний; тільки міжнародне (US) направлення або співчутливе
  використання. IDHENTIFY фаза-3 (R/R ГМЛ) не показав виграшу за ЗВ
  vs стандарт у всіх, але enriched у IDH2-мут HMA-naive — аргумент
  на користь раннього застосування. Джерела SRC-AG221-AML-001 +
  SRC-IDHENTIFY очікуються.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-AML-2025
    position: supports
    relevant_quote_paraphrase: "Enasidenib is preferred for R/R IDH2-mutated AML (Cat 2A) per AG221-AML-001"
  - source_id: SRC-ELN-AML-2022
    position: supports
    relevant_quote_paraphrase: "IDH2 inhibitor (enasidenib) is standard for R/R IDH2-mutated AML; bridge to alloHCT in responders"
  - source_id: SRC-ESMO-AML-2020
    position: supports
    relevant_quote_paraphrase: "ESMO recognizes enasidenib for R/R IDH2-mutated AML based on AG221-AML-001 phase 1/2 data"

do_not_do:
  - "НЕ призначати без підтвердження IDH2 R140Q або R172K мутації (NGS-панель) — енасиденіб не активний у IDH2-WT."
  - "НЕ пропускати diffсиндром-навчання + corticosteroid kit — фатальне без негайного дексаметазону."
  - "НЕ оголошувати non-response раніше 6 циклів — медіана часу до першої відповіді ~1.9 міс; повільна кінетика."
  - "НЕ редукувати дозу автоматично при гіпербілірубінемії — якщо асимптомна (UGT1A1-інгібування), продовжувати без зміни."
  - "НЕ розглядати як curative monotherapy — обов'язково bridge до алоТГСК для fit responders."
  - "НЕ комбінувати з сильними CYP3A4-індукторами без моніторингу — зниження експозиції."
  - "НЕ підтверджувати план без funding pathway — препарат не зареєстрований в Україні; EU CHMP негативний."

known_controversies:
  - topic: "Enasidenib monotherapy vs enasidenib + azacitidine in R/R IDH2-mut AML"
    positions:
      - position: "Enasidenib mono per AG221-AML-001 — FDA-registered standard"
        sources: [SRC-NCCN-AML-2025]
      - position: "Enasidenib + azacitidine combination (AG221-AML-005, 1L unfit) — ORR 71%, CR 53%; emerging 1L role but not yet 2L+ standard"
        sources: [SRC-NCCN-AML-2025]
        evidence_note: "AG221-AML-005 was 1L unfit; 2L+ combination data limited."
    our_default: "Enasidenib mono per AG221-AML-001; combination reserved for 1L unfit per AG221-AML-005"
    rationale: "AG221-AML-001 monotherapy is the registered 2L+ standard"
  - topic: "Enasidenib vs ivosidenib (IDH1 inhibitor) when both IDH1 and IDH2 mutations co-exist (rare)"
    positions:
      - position: "Sequence based on dominant clone VAF; co-occurrence rare (~1-2% of IDH-mut AML)"
        sources: [SRC-NCCN-AML-2025]
        evidence_note: "Limited data; MDT decision."
    our_default: "Defer to MDT; sequence based on dominant clone VAF"
    rationale: "Co-occurrence rare; no prospective data"

time_critical: false
