rationale: >
  Enasidenib monotherapy is FDA-approved (Aug 2017) for R/R IDH2-
  mutated AML, on the basis of AG221-AML-001 phase 1/2: ORR 38%,
  CR 19%, median OS 9.3 mo. Mechanism: selective allosteric inhibitor
  of mutant IDH2 (R140Q, R172K) — reduces neomorphic 2-hydroxyglutarate
  oncometabolite, restoring TET2-dependent demethylation and inducing
  terminal differentiation of leukemic blasts. CRITICAL: re-test IDH2
  status at relapse (subclonal loss possible). Bridge to alloHCT for
  fit responders — enasidenib alone NOT curative. Continue ≥6 cycles
  before declaring non-response (median time to first response ~1.9
  mo). Differentiation syndrome (~14%) requires immediate
  dexamethasone + cytoreduction; hyperbilirubinemia (~80% any grade,
  UGT1A1 inhibition) usually asymptomatic. Major Ukraine access
  barrier: not registered, EU CHMP negative; international (US)
  referral or compassionate-use only. IDHENTIFY phase-3 (R/R AML)
  did not show OS benefit vs conventional care overall but enriched
  in IDH2-mut HMA-naive — argues for early use. Trial source
  SRC-AG221-AML-001 + SRC-IDHENTIFY pending.

rationale_ua: >
  Енасиденіб (enasidenib) у монотерапії схвалений FDA (серпень 2017) для рецидивної/рефрактерної
  IDH2-мутованої ГМЛ на підставі дослідження AG221-AML-001 (фаза 1/2): загальна частота відповіді 38%,
  повна відповідь 19%, медіана загальної виживаності 9,3 міс. Механізм дії: селективний алостеричний
  інгібітор мутантного IDH2 (R140Q, R172K) — знижує рівень неоморфного онкометаболіту
  2-гідроксиглутарату, відновлюючи TET2-залежне деметилювання та індукуючи термінальну диференціацію
  лейкемічних бластів. КРИТИЧНО: необхідне повторне визначення IDH2-статусу при рецидиві (можлива
  субклональна втрата). Міст до алогенної трансплантації стовбурових клітин є обов'язковим для фізично
  збережених пацієнтів із відповіддю — монотерапія енасиденібом не є куративною. Для оцінки відповіді
  необхідно провести ≥6 циклів (медіана часу до першої відповіді ~1,9 міс.). Синдром диференціації (~14%)
  потребує негайного призначення дексаметазону та цитозниження; гіпербілірубінемія (~80% будь-якого
  ступеня, пов'язана з інгібуванням UGT1A1) зазвичай є безсимптомною. Значний бар'єр доступу в Україні:
  препарат не зареєстрований, рішення EU CHMP є негативним — можливе лише міжнародне (США) направлення
  або застосування за гуманітарною програмою. Дослідження IDHENTIFY фази 3 (р/р ГМЛ) не показало переваги
  у загальній виживаності у всій популяції, однак збагачена вибірка IDH2-мутованих пацієнтів без
  попереднього лікування гіпометилюючими агентами свідчить на користь раннього застосування. Джерела: SRC-AG221-AML-001, SRC-IDHENTIFY.
