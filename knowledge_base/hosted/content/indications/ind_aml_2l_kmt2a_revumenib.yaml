id: IND-AML-2L-KMT2A-REVUMENIB
plan_track: aggressive

applicable_to:
  disease_id: DIS-AML
  line_of_therapy: 2
  stage_requirements:
    - "Relapsed or refractory AML after ≥1 prior systemic therapy (induction failure OR relapse after CR)"
    - "KMT2A rearrangement confirmed at relapse (karyotype + FISH break-apart probe; partner identification by RT-PCR or RNA-NGS preferred)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-REVUMENIB-AML
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "2A"

