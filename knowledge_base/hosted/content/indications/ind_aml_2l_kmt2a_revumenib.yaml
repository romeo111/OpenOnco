rationale: >
  Revumenib monotherapy is FDA-approved (Nov 2024) for R/R KMT2A-
  rearranged acute leukemia after ≥1 prior line of therapy, on the
  basis of AUGMENT-101 phase 1/2 trial — KMT2A-r AML cohort: ORR
  ~63%, CR/CRh ~23%. Mechanism: small-molecule inhibitor of menin-
  KMT2A protein-protein interaction; KMT2A-fusion proteins are
  dependent on menin recruitment to drive HOXA / MEIS1 transcription.
  CRITICAL: confirm KMT2A rearrangement at relapse (rare but possible
  loss). Bridge to alloHCT for fit responders — revumenib alone NOT
  curative. Differentiation syndrome (~16%) requires immediate
  dexamethasone + cytoreduction; QTc prolongation requires baseline +
  serial ECG with electrolyte correction. Major Ukraine access
  barrier: not registered, international referral or
  compassionate-use (Syndax EAP) only. Trial source SRC-AUGMENT-101
  pending.

rationale_ua: >
  Ревуменіб (revumenib) у монотерапії схвалений FDA (листопад 2024) для рецидивної/рефрактерної
  гострої лейкемії з перебудовою KMT2A після ≥1 попередньої лінії терапії на підставі дослідження
  SRC-AUGMENT-101 (фаза 1/2) — когорта KMT2A-r ГМЛ: загальна частота відповіді ~63%, CR/CRh ~23%.
  Механізм дії: інгібітор міжбілкової взаємодії менін-KMT2A малою молекулою; злиття (fusion)
  химерних білків KMT2A залежить від рекрутування меніну для активації транскрипції HOXA / MEIS1.
  КРИТИЧНО: необхідне підтвердження перебудови KMT2A при рецидиві (втрата можлива, хоча й рідко).
  Місток до алогенної трансплантації стовбурових клітин є обов'язковим для фізично збережених
  пацієнтів із відповіддю — монотерапія ревуменібом не є куративною. Синдром диференціації (~16%)
  потребує негайного призначення дексаметазону і цитозниження; подовження QTc потребує вихідної та
  серійних ЕКГ з корекцією електролітів. Значний бар'єр доступу в Україні: препарат не зареєстрований —
  можливі лише міжнародне направлення або доступ через гуманітарну програму (Syndax EAP).
  Рецидивний/рефрактерний AML з перебудовою KMT2A після ≥1 лінії — основне показання. Монотерапія
  ревуменібом. Первинна кінцева точка: CR/CRh.
