  complete_response: "~23% CR/CRh"
  progression_free_survival: "Median DOR ~6 mo overall; longer in patients bridged to alloHCT"
  overall_survival_5y: "Insufficient mature data (FDA approval Nov 2024); responders bridged to alloHCT trending favorable"

