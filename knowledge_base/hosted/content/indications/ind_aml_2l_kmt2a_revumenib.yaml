rationale: >
  Revumenib monotherapy is FDA-approved (Nov 2024) for R/R KMT2A-
  rearranged acute leukemia after ≥1 prior line of therapy, on the
  basis of AUGMENT-101 phase 1/2 trial — KMT2A-r AML cohort: ORR
  ~63%, CR/CRh ~23%. Mechanism: small-molecule inhibitor of menin-
  KMT2A protein-protein interaction; KMT2A-fusion proteins are
  dependent on menin recruitment to drive HOXA / MEIS1 transcription.
  CRITICAL: confirm KMT2A rearrangement at relapse (rare but possible
  loss). Bridge to alloHCT for fit responders — revumenib alone NOT
  curative. Differentiation syndrome (~16%) requires immediate
  dexamethasone + cytoreduction; QTc prolongation requires baseline +
  serial ECG with electrolyte correction. Major Ukraine access
  barrier: not registered, international referral or
  compassionate-use (Syndax EAP) only. Trial source SRC-AUGMENT-101
  pending.

rationale_ua: >
  Ревуменіб монотерапія FDA-схвалена (листопад 2024) для R/R KMT2A-
  перебудованої гострої лейкемії після ≥1 попередньої лінії терапії,
  на підставі AUGMENT-101 фаза 1/2 — когорта KMT2A-r ГМЛ: ORR ~63%,
  ПР/ПРн ~23%. Механізм: малі молекули інгібітор взаємодії менін-
  KMT2A; химерні білки KMT2A залежать від рекрутингу меніну для
  активації HOXA / MEIS1. КРИТИЧНО: підтвердити перебудову KMT2A при
  рецидиві (рідко, але можливо втрата). Міст до алоТГСК для
  придатних респондерів — ревуменіб монотерапія НЕ курабельна.
  Синдром диференціації (~16%) потребує негайного дексаметазону +
  цитозниження; подовження QTc — baseline + серійні ЕКГ з корекцією
  електролітів. Великий бар'єр доступу в Україні: не зареєстрований,
  тільки міжнародне направлення або співчутливе використання (Syndax
  EAP). Джерело дослідження SRC-AUGMENT-101 очікується.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-AML-2025
    position: supports
    relevant_quote_paraphrase: "Revumenib is preferred for R/R KMT2A-rearranged acute leukemia (Cat 2A) per AUGMENT-101"
  - source_id: SRC-ELN-AML-2022
    position: supports
    relevant_quote_paraphrase: "Menin inhibitors are emerging standard for KMT2A-r AML; bridge to alloHCT in responders"

do_not_do:
  - "НЕ призначати без підтвердження KMT2A-перебудови на момент рецидиву — каріотип + FISH break-apart обов'язково."
  - "НЕ пропускати baseline + серійний ECG + корекцію електролітів (K+ ≥4.0, Mg++ ≥2.0) — QTc-подовження документоване."
  - "НЕ ігнорувати differentiation syndrome (лихоманка, задишка, набір ваги, плевральний випіт, лейкоцитоз) — фатальне без дексаметазону + цитозниження."
  - "НЕ розглядати як curative monotherapy — обов'язково bridge до алоТГСК для fit responders."
  - "НЕ комбінувати з сильними CYP3A4-індукторами — суттєве зниження експозиції; уникати."
  - "НЕ підтверджувати план без funding pathway — препарат не зареєстрований в Україні (Syndax EAP / cross-border тільки)."

known_controversies:
  - topic: "Revumenib monotherapy vs combination (revumenib + ven+aza, AUGMENT-102)"
    positions:
      - position: "Revumenib mono per AUGMENT-101 — FDA-registered standard for R/R KMT2A-r"
        sources: [SRC-NCCN-AML-2025]
      - position: "Combination ven+aza+revumenib (AUGMENT-102) — emerging higher CR rate; under formal trial"
        sources: [SRC-NCCN-AML-2025]
        evidence_note: "Phase 1/2 ongoing; toxicity higher (cytopenia, infection). Reserve for fit patients with high-burden relapse and trial access."
    our_default: "Revumenib mono per AUGMENT-101; consider triplet only at AML-experienced trial center"
    rationale: "AUGMENT-101 is the registered standard; AUGMENT-102 evidence still maturing"

time_critical: false
last_reviewed: "2026-04-30"
reviewers: []
