rationale: 'Pediatric AML (age ≤18) is treated per Children''s Oncology Group AAML1031 (now AAML1831) protocol,
  which is distinct from adult 7+3-based therapy in dose density, supportive care, and risk stratification.
  Backbone: cytarabine 100 mg/m² CIVI × 7 days + daunorubicin 50 mg/m² IV × 3 days induction (similar
  to 7+3 but with intensified consolidation). Consolidation with high-dose cytarabine (HiDAC 3 g/m² q12h
  × 6 doses × 2-3 cycles) — the cornerstone of pediatric AML cure. Risk stratification: low-risk (NPM1+/FLT3-ITD-,
  CEBPA biallelic, inv(16), t(8;21)) → chemotherapy alone; high-risk (FLT3-ITD high allelic ratio, KMT2A
  rearranged, complex karyotype, monosomy 7, TP53) → matched-related-donor or matched-unrelated-donor alloHCT
  in CR1. Gemtuzumab ozogamicin (GO) is added to induction for low-risk per AAML1031 (Aplenc 2020 JCO):
  EFS improvement 53% vs 47%. Filgrastim / pegfilgrastim primary prophylaxis routine. CNS prophylaxis with
  intrathecal cytarabine + methotrexate × 4-6 doses standard. Late-effect surveillance (cardiotoxicity
  from anthracyclines, fertility, secondary malignancies) extends decades beyond cure. STUB regimen — no
  dedicated REG-AAML1031-PEDIATRIC entity yet; flagged for REG follow-up. Reference REG-AML-7-3 used as
  proxy with pediatric modifications described.'
rationale_ua: >
  Педіатрична ГМЛ (вік ≤18 рр.) лікується відповідно до протоколу Дитячої онкологічної групи (Children's
  Oncology Group) AAML1031 (нині AAML1831), що суттєво відрізняється від дорослої терапії на основі 7+3
  щодо щільності дозування, підтримуючої терапії та стратифікації ризику. Базова схема: цитарабін (cytarabine)
  100 mg/m² CIVI × 7 діб + даунорубіцин (daunorubicin) 50 mg/m² в/в × 3 доби (індукція, схожа на 7+3,
  але з посиленою консолідацією). Консолідація: висока доза цитарабіну (HiDAC 3 g/m² q12h × 6 доз × 2–3
  цикли) — наріжний камінь педіатричного вилікування ГМЛ. Стратифікація ризику: низький ризик
  (NPM1+/FLT3-ITD-, CEBPA біалельний, inv(16), t(8;21)) → тільки хіміотерапія; високий ризик (висока
  алельна частота FLT3-ITD, перебудова KMT2A, складний каріотип, моносомія 7, TP53) → алогенна
  трансплантація від відповідного донора у CR1. Гемтузумаб озогаміцин додається до індукції при низькому
  ризику відповідно до AAML1031 (Aplenc 2020 JCO): покращення виживаності без подій 53% проти 47%.
  Стандартна профілактика ЦНС: інтратекальний цитарабін + метотрексат × 4–6 доз. Спостереження за
  пізніми ефектами (кардіотоксичність від антрациклінів, репродуктивна функція, вторинні злоякісні
  пухлини) триває десятиліттями після вилікування. Застосовується режим REG-AML-7-3 як проксі з
  педіатричними модифікаціями (REG-AAML1031-PEDIATRIC у стадії розробки). Стратифікація: низького ризику
  (low-risk) → тільки хіміотерапія; високого ризику (high-risk) → алогенна трансплантація у CR1.
