do_not_do:
- НЕ використовувати adult 7+3 dose intensification без pediatric-specific consolidation — pediatric biology
  + tolerance differ.
- НЕ призначати alloHCT для low-risk pediatric AML в CR1 — chemotherapy alone curative для більшості.
- НЕ забути cardio-protection (dexrazoxane) для cumulative anthracycline dose >300 mg/m² — late cardiotoxicity
  ризик.
- НЕ забути fertility preservation discussion (ovarian/sperm cryopreservation) до старту — particularly
  for adolescents.
- НЕ ігнорувати late-effect surveillance — survivors потребують lifelong follow-up для secondary malignancies,
  CV, endocrine, fertility, neurocognitive.
- НЕ забути psychosocial support — pediatric oncology requires family-centered care + child-life specialists.
- "НЕ робити decisions без peds-onc-board MDT — рідкісні presentations + complex stratification."
do_not_do_en:
  - "Do NOT use adult 7+3 dose intensification without pediatric-specific consolidation — pediatric biology + tolerance differ."
  - "Do NOT prescribe alloHCT for low-risk pediatric AML in CR1 — chemotherapy alone is curative for the majority."
  - "Do NOT forget cardio-protection (dexrazoxane) for cumulative anthracycline dose >300 mg/m² — late cardiotoxicity risk."
  - "Do NOT forget fertility preservation discussion (ovarian/sperm cryopreservation) before start — particularly for adolescents."
  - "Do NOT ignore late-effect surveillance — survivors require lifelong follow-up for secondary malignancies, CV, endocrine, fertility, neurocognitive."
  - "Do NOT forget psychosocial support — pediatric oncology requires family-centered care + child-life specialists."
  - "Do NOT make decisions without peds-onc-board MDT — rare presentations + complex stratification."
