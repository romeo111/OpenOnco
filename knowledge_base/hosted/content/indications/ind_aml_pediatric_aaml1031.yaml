  rationale: Risk-benefit favors GO addition; VOD risk manageable with current supportive care
do_not_do:
- НЕ використовувати adult 7+3 dose intensification без pediatric-specific consolidation — pediatric biology
  + tolerance differ.
- НЕ призначати alloHCT для low-risk pediatric AML в CR1 — chemotherapy alone curative для більшості.
- НЕ забути cardio-protection (dexrazoxane) для cumulative anthracycline dose >300 mg/m² — late cardiotoxicity
  ризик.
- НЕ забути fertility preservation discussion (ovarian/sperm cryopreservation) до старту — particularly
  for adolescents.
- НЕ ігнорувати late-effect surveillance — survivors потребують lifelong follow-up для secondary malignancies,
  CV, endocrine, fertility, neurocognitive.
- НЕ забути psychosocial support — pediatric oncology requires family-centered care + child-life specialists.
- "НЕ робити decisions без peds-onc-board MDT — рідкісні presentations + complex stratification."
