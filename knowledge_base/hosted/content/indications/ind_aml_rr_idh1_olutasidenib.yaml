rationale: >
  Olutasidenib monotherapy is FDA-approved (Dec 2022) for R/R IDH1-
  mutated AML, on the basis of Study 2102-HEM-101 phase 1/2 single-arm
  trial — R/R AML efficacy cohort (n=153): CR + CRh rate 35% (95% CI
  27-43); among CR + CRh responders, median DoR 25.9 mo, median time
  to CR + CRh 1.9 mo, 56-day mortality 8%. Transfusion independence
  achieved in 56% of baseline-dependent patients. Mechanism: selective
  small-molecule inhibitor of mutant IDH1 (R132 variants) — reduces
  neomorphic 2-hydroxyglutarate (2-HG) oncometabolite, restoring
  TET2-dependent demethylation and inducing terminal differentiation
  of leukemic blasts. Compared to ivosidenib: olutasidenib has higher
  in vitro selectivity for mIDH1 R132 over WT-IDH1/IDH2; less
  prominent QT signal; distinguishing hepatotoxicity boxed warning
  (drug-induced liver injury, including fatal cases). CRITICAL:
  re-test IDH1 R132 status at relapse (subclonal loss possible);
  baseline + weekly LFTs x first 2 months, then q-cycle; daily
  clinical assessment for differentiation syndrome (~14% incidence)
  — initiate dexamethasone 10 mg IV q12h + hemodynamic monitoring +
  cytoreduction at first suspicion; tumor lysis prophylaxis at
  initiation. Bridge to alloHCT for fit responders — olutasidenib
  alone NOT curative. Major Ukraine access barrier: not registered,
  EMA pending; named-patient import or Rigel EAP (Rezlidhia) only.
  Trial source SRC-2102-HEM-101 (or SRC-OLUTASIDENIB-DEBOTTON-2023)
  pending KB ingestion; cited via NCCN-AML-2025 + ELN-AML-2022 +
  ESMO-AML-2020.

rationale_ua: >
  Олутасидениб (olutasidenib) у монотерапії схвалений FDA (грудень 2022) для рецидивної/рефрактерної
  IDH1-мутованої ГМЛ на підставі дослідження SRC-2102-HEM-101 (фаза 1/2) — когорта R/R ГМЛ (n=153):
  CR+CRh 35% (95% CI 27-43); серед CR+CRh-респондерів медіана тривалості відповіді 25.9 міс, медіана
  часу до CR+CRh 1.9 міс, 56-денна смертність 8%. Незалежність від трансфузій досягнута у 56%
  базально-залежних пацієнтів. Дані SRC-OLUTASIDENIB-DEBOTTON-2023 підтверджують довготривалу
  ефективність. Механізм: маломолекулярний інгібітор мутантного IDH1 (варіанти R132) — знижує
  2-гідроксиглутарат (2-HG), відновлюючи TET2-деметилювання та диференціацію бластів. Злиття
  (fusion) з іншими генами при IDH1 R132 нетипове; основний механізм — точкова мутація. Порівняно
  з івосидениб (ivosidenib): олутасидениб має вищу in vitro-селективність до мутантного IDH1 R132;
  менш виражений QT-сигнал; рамочне попередження про гепатотоксичність (DILI, включно з фатальними).
  КРИТИЧНО: повторне тестування IDH1 R132 при рецидиві; вихідні + щотижневі LFT × 2 місяці;
  щоденна оцінка синдрому диференціації (~14%) — дексаметазон 10 mg IV q12h + цитозниження.
  Місток до алоТСК для збережених респондентів. Рецидивний/рефрактерний IDH1-мутований AML.
  Первинна кінцева точка: CR+CRh.
