sources:
  - source_id: SRC-NCCN-AML-2025
    position: supports
    relevant_quote_paraphrase: "Olutasidenib is preferred for R/R IDH1-mutated AML (Cat 2A) per Study 2102-HEM-101"
  - source_id: SRC-ELN-AML-2022
    position: supports
    relevant_quote_paraphrase: "IDH1 inhibitor (olutasidenib or ivosidenib) is standard for R/R IDH1-mutated AML; bridge to alloHCT in responders"
  - source_id: SRC-ESMO-AML-2020
    position: supports
    relevant_quote_paraphrase: "ESMO recognizes IDH1 inhibitors for R/R IDH1-mutated AML; trial-anchor evidence basis"

do_not_do:
  - "НЕ призначати без підтвердження IDH1 R132 мутації (companion diagnostic Abbott RealTime IDH1 Assay або comprehensive NGS) — олутасидениб не активний у IDH1-WT."
  - "НЕ пропускати baseline + щотижневі LFTs x перші 2 місяці — гепатотоксичність із boxed warning (DILI, включно з фатальними випадками)."
  - "НЕ ігнорувати differentiation syndrome (лихоманка, задишка, гіпоксія, периферичний набряк, плевроперикардіальний випіт, висипка, лейкоцитоз) — фатальне без негайного дексаметазону + цитозниження."
  - "НЕ оголошувати non-response раніше 6 циклів — медіана часу до першої відповіді ~1.9 міс; повільна кінетика."
  - "НЕ розглядати як curative monotherapy — обов'язково bridge до алоТГСК для fit responders."
  - "НЕ комбінувати з сильними CYP3A4-індукторами без моніторингу — суттєве зниження експозиції; уникати."
  - "НЕ підтверджувати план без funding pathway — препарат не зареєстрований в Україні (Rigel EAP / named-patient import / cross-border)."

known_controversies:
  - topic: "Olutasidenib vs ivosidenib in R/R IDH1-mutated AML (no head-to-head)"
    positions:
      - position: "Either acceptable per NCCN — Cat 2A for both; choice depends on toxicity profile, access, and prior exposure"
        sources: [SRC-NCCN-AML-2025]
      - position: "Olutasidenib preferred when QT-prolongation is a concern (less prominent QT signal vs ivosidenib)"
        sources: [SRC-NCCN-AML-2025]
        evidence_note: "Cross-trial comparison only; no head-to-head RCT."
      - position: "Ivosidenib preferred when hepatotoxicity is a concern (no boxed warning vs olutasidenib DILI signal)"
        sources: [SRC-NCCN-AML-2025]
        evidence_note: "Cross-trial comparison only."
    our_default: "Either; MDT decision based on toxicity profile, access (Rigel vs Servier EAP), QT/LFT baseline"
    rationale: "No head-to-head; both Cat 2A FDA-registered for same indication"
  - topic: "Olutasidenib monotherapy vs olutasidenib + azacitidine combination"
    positions:
      - position: "Olutasidenib mono per Study 2102-HEM-101 — FDA-registered standard for R/R IDH1-mut AML"
        sources: [SRC-NCCN-AML-2025]
      - position: "Combination olutasidenib + azacitidine — emerging 1L unfit data (post-marketing studies); not yet 2L+ standard"
        sources: [SRC-NCCN-AML-2025]
        evidence_note: "Phase 1/2 ongoing; reserve for trial enrollment."
    our_default: "Olutasidenib mono per Study 2102-HEM-101; combination only on protocol"
    rationale: "Study 2102-HEM-101 monotherapy is the registered 2L+ standard"

