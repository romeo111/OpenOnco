id: IND-AML-RR-IDH1-OLUTASIDENIB
plan_track: aggressive

applicable_to:
  disease_id: DIS-AML
  line_of_therapy: 2
  stage_requirements:
    - "Relapsed or refractory AML after ≥1 prior systemic therapy (induction failure OR relapse after CR)"
    - "IDH1 R132 mutation (R132H, R132C, R132G, R132S, R132L) confirmed at relapse — companion-diagnostic Abbott RealTime IDH1 Assay OR comprehensive NGS panel covering IDH1 R132"
  biomarker_requirements_required:
    - biomarker_id: BIO-IDH1-R132H
      value_constraint: "IDH1 R132H mutation positive (any VAF)"
      required: false
    - biomarker_id: BIO-IDH1-R132C
      value_constraint: "IDH1 R132C mutation positive (any VAF)"
      required: false
    - biomarker_id: BIO-IDH1-R132G
      value_constraint: "IDH1 R132G mutation positive (any VAF)"
      required: false
  biomarker_requirements_excluded: []
  demographic_constraints:
