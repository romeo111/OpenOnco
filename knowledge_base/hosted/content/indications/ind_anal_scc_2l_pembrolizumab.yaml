id: IND-ANAL-SCC-2L-PEMBROLIZUMAB
plan_track: standard

applicable_to:
  disease_id: DIS-ANAL-SCC
  line_of_therapy: 2
  stage_requirements:
    - "Recurrent or metastatic anal squamous cell carcinoma (anal canal SCC)"
    - "Prior platinum-based chemotherapy (first-line; carboplatin+paclitaxel ± retifanlimab)"
    - "Progression on or after 1L systemic therapy"
    - "ECOG PS 0-1"
    - "No prior anti-PD-1 or anti-PD-L1 therapy (pembrolizumab-naive)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded:
    - "Prior anti-PD-1/PD-L1 therapy (e.g., retifanlimab, pembrolizumab, nivolumab) — cross-resistance expected"
    - "Active autoimmune disease requiring systemic corticosteroids >10 mg/day prednisone equivalent"
    - "Prior solid organ transplant (risk of rejection)"
    - "ECOG PS ≥3"
  demographic_constraints:
    ecog_max: 1
    notes: "KEYNOTE-158 enrolled ECOG 0-1. PD-L1 CPS ≥10 enriches response (~26% ORR vs ~3%) but testing is desired not required."

recommended_regimen: REG-PEMBROLIZUMAB-MONO
concurrent_therapy: []

evidence_level: moderate
strength_of_recommendation: moderate
nccn_category: "2A"

expected_outcomes:
  orr: "10.6% (KEYNOTE-158 cohort B anal SCC; n=112)"
  cr_rate: "3.5%"
  median_dor: "Not reached (durable responses in majority of responders)"
  os_12mo_pct: "50%"
  notes: >
    KEYNOTE-158 (Marabelle 2020, JCO; n=112 anal SCC ≥1 prior line):
    pembrolizumab 200 mg q3w. Overall ORR 10.6%; CR 3.5%; responses highly durable
    (median DOR not reached). PD-L1 CPS ≥10 subgroup: ORR ~26% (enriched response).
    KEYNOTE-028 (Ott 2017; n=24 PD-L1+ anal SCC): ORR 17%; mOS 17.5 months.
    Combined evidence supports NCCN Category 2A.
    HPV+ anal SCC (~93% of cases): ICI activity plausibly driven by viral antigen
    immunogenicity and PD-L1 expression from HPV integration.
    Context: After EV-302 era, most patients receive retifanlimab 1L (POD1UM-303
    regimen). If retifanlimab was 1L, pembrolizumab re-challenge is NOT appropriate
    (anti-PD-1 cross-resistance). Carboplatin+paclitaxel 2L preferred in that setting.

hard_contraindications:
  - "Prior PD-1/PD-L1 inhibitor (retifanlimab, pembrolizumab, nivolumab, or other anti-PD-1/L1) — cross-resistance"
  - "ECOG PS ≥3"
  - "Active autoimmune disease requiring systemic immunosuppression"
  - "Solid organ transplant (risk of rejection)"
  - "Active uncontrolled infection"

red_flags_triggering_alternative:
  - condition: "Prior retifanlimab 1L (POD1UM-303 pathway) → anti-PD-1 re-challenge not appropriate; use platinum-based chemo 2L"
  - condition: "MSI-H/dMMR confirmed → same pembrolizumab applies (tumor-agnostic FDA approval); note higher benefit expected"
  - condition: "TMB-H ≥10 mut/Mb → tumor-agnostic FDA approval for pembrolizumab"
  - condition: "ECOG 2 or immunosuppressed → best supportive care or reduced-dose capecitabine; MDT decision"

required_tests:
  - TEST-CBC
  - TEST-LFT
  - TEST-CMP
  - "PD-L1 CPS by IHC 22C3 assay (desired — enriches response prediction; CPS ≥10 subgroup ORR ~26%)"
  - "MSI/dMMR testing (if not done — ~1-2% of anal SCC are MSI-H; FDA tumor-agnostic approval applies)"
  - "HIV serology (update if not recently checked — HIV+ patients: same pembrolizumab applicable, monitor CD4)"
  - "Thyroid function (TSH) at baseline and every 3 months (pembrolizumab thyroiditis)"
  - "CT CAP (response assessment at 12 weeks; then every 3 cycles)"
  - "Hepatitis B serology: HBsAg + anti-HBc (reactivation risk with ICI)"

desired_tests:
  - "PD-L1 CPS IHC 22C3 (CPS ≥10 predicts higher ORR; not required but informs probability of benefit)"
  - "p16 IHC (surrogate for HPV status — most HPV+ anal SCC have ICI activity rationale)"
  - "TMB by NGS (FDA tumor-agnostic approval for TMB-H ≥10 mut/Mb)"

rationale: >
  Pembrolizumab 200 mg q3w is the standard 2L option for r/r anal SCC in
  ICI-naive patients. KEYNOTE-158 (n=112): ORR 10.6% with durable responses
  (median DOR not reached). CPS ≥10 enriches ORR to ~26%. Anal SCC has high HPV
  prevalence (~93%) providing an immunogenic substrate for ICI activity. NCCN
  Anal 2025 Category 2A. No FDA approval specifically for anal SCC, but tumor-agnostic
  pembrolizumab approvals (MSI-H, TMB-H) cover selected patients.
  IMPORTANT clinical context: With POD1UM-303 (retifanlimab+carbo+pacli) increasingly
  used as preferred 1L, most UA patients receive retifanlimab 1L. For these patients,
  pembrolizumab is NOT appropriate in 2L (PD-1 cross-resistance). In that scenario,
  carboplatin+paclitaxel re-challenge or other cytotoxics are used.
  For patients who received carboplatin+paclitaxel 1L (without retifanlimab — common
  in Ukraine due to retifanlimab non-registration): pembrolizumab is the appropriate 2L.

rationale_ua: >
  Пембролізумаб 200 мг q3w — стандарт 2L для р/р анального SCC у ICI-наївних пацієнтів.
  KEYNOTE-158 (n=112): ORR 10.6%, відповіді тривалі (медіана DOR не досягнута).
  CPS ≥10: ORR ~26%. ВПЛ+ статус (~93% анального SCC) → ICI активність.
  NCCN Категорія 2A. У реальній UA практиці: якщо 1L = карбоплатин+паклітаксел
  (без ретіфанлімабу) → пембролізумаб є адекватним 2L вибором.
  Якщо 1L = POD1UM-303 (ретіфанлімаб+карбо+паклі) → пембролізумаб ПРОТИПОКАЗАНИЙ
  (перехресна резистентність PD-1). Контроль TSH кожні 3 міс.

