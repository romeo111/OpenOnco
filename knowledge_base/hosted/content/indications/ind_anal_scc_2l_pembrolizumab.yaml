do_not_do:
  - "Не призначати при попередній терапії ретіфанлімабом/пембролізумабом/ніволумабом — перехресна PD-1 резистентність"
  - "Не призначати при активній автоімунній хворобі з системною ГКС-терапією"
  - "Контроль TSH кожні 3 міс — тиреоїдит найчастіший irAE пембролізумабу"
  - "PD-L1 CPS ≥10 підвищує ймовірність відповіді (ORR ~26%) — визначити перед призначенням"
  - "При ВІЛ+ пацієнтах: пембролізумаб можливий, але потрібна координація з ВІЛ-спеціалістом"
  - "При підозрі на прогресування — не зупиняти передчасно: псевдопрогресія можлива при ICI"

