id: IND-ANAL-SCC-LA-1L-NIGRO-CRT
plan_track: standard

applicable_to:
  disease_id: DIS-ANAL-SCC
  line_of_therapy: 1
  stage_requirements:
  - "Squamous cell carcinoma of the anal canal (histologically confirmed)"
  - "Locally advanced disease: any T, any N, M0 (stages I-III)"
  - "Stage I (T1N0): CRT or local excision acceptable; CRT preferred for any concern about margins"
  - "Stage II-IIIB (T2-T4 or N+): definitive concurrent CRT is NCCN Category 1 standard"
  - "No distant metastases (M0) — stage IV requires systemic chemotherapy approach"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    notes: "ECOG ≤2 required for chemoradiation; HIV+ patients eligible with optimized antiretroviral therapy"

recommended_regimen: REG-NIGRO-MMC-5FU-RT
concurrent_therapy:
- "Concurrent external beam radiation therapy (EBRT) 50.4 Gy (integral to regimen — must be planned by radiation oncology)"
followed_by:
- "Response assessment at 8-11 weeks post-CRT (clinical exam + CT/MRI pelvis)"
- "If residual mass: biopsy to confirm viable tumor; observe until 26 weeks if biopsy-negative"
- "If confirmed residual/progressive disease: salvage abdominoperineal resection (APR)"
- "Surveillance: physical exam + inguinal nodes q3-6 months × 5 years; CT 6-12 monthly × 2 years"

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  complete_response_rate: "~90% complete response at 26 weeks (ACT II)"
  progression_free_survival: "74% 3-year PFS (ACT II, MMC arm)"
  overall_survival_5y: "~80-85% 5-year OS for stage II-III with CRT"
  colostomy_free_survival_3y: "~70% colostomy-free at 3 years"
  salvage_apr_rate: "~10-25% require salvage APR for residual/recurrent disease"

hard_contraindications: []
red_flags_triggering_alternative: []

