- TEST-CT-CAP
- TEST-MRI-PELVIS
- TEST-CBC
- TEST-CMP
- TEST-LFT
- TEST-CREATININE-CL

desired_tests: []
rationale: >
  Concurrent chemoradiation (Nigro protocol: MMC + 5-FU + RT 50.4 Gy) is NCCN
  Category 1 and the global standard of care for locally advanced squamous cell
  carcinoma of the anal canal (stages I-III). Originally described by Nigro (1974),
  definitively validated by ACT II (James 2013, n=940): complete response ~90%,
  3-year PFS 74%, with organ preservation in ~75% of patients. APR is NOT primary
  treatment — it is reserved for CRT failure confirmed by biopsy. ACT II also
  confirmed: (1) MMC is equivalent to cisplatin — MMC standard; (2) maintenance
  chemotherapy provides no benefit. Radiation dose 50.4 Gy with IMRT preferred
  (reduces acute toxicity vs 3D-CRT). Response assessment at 8-11 weeks — biopsy
  only for residual mass (not at 4-6 weeks: high false-positive from radiation changes).

rationale_ua: >
  Одночасна хіміопроменева терапія (режим Нігро: ММС + 5-ФУ + ПТ 50.4 Гр) є
  NCCN Категорія 1 та глобальним стандартом для місцево-поширеного плоскоклітинного
  раку анального каналу (стадії I-III). Підтверджено ACT II (James 2013, n=940):
  повна відповідь ~90%, 3-річний PFS 74%, збереження органу у ~75% пацієнтів.
  АПЕ НЕ є первинним лікуванням — лише за наявності залишкового захворювання
  після CRT. ММС рівнозначний цисплатину (ММС є стандартом); підтримуюча
  хіміотерапія після CRT не дає переваг і не рекомендована (ACT II).

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
- source_id: SRC-ACT2-JAMES-2013
  position: supports
  relevant_quote_paraphrase: "ACT II (n=940): MMC+5FU+RT complete response 90.5% at 26 weeks; 3y PFS 74%; MMC = cisplatin; no benefit from maintenance chemotherapy — MMC is standard"
- source_id: SRC-NCCN-ANAL-2025
  position: supports
  relevant_quote_paraphrase: "NCCN Category 1: MMC+5FU+RT for stages I-III anal SCC; APR reserved for CRT failure; IMRT preferred"

do_not_do:
- "НІКОЛИ не починати з APE (абдомінально-промежинна екстирпація) при плоскоклітинному раку анального каналу — CRT є органозберігаючим стандартом"
- "Не проводити біопсію залишкового захворювання раніше 8 тижнів після CRT — радіаційні зміни дають хибно-позитивний результат"
- "Не замінювати ММС на цисплатин без клінічного обґрунтування — ACT II показав еквівалентність, ММС є стандартом"
- "Не призначати підтримуючу хіміотерапію після завершення CRT — ACT II не виявив переваг (несприятливий профіль токсичності без підвищення ефективності)"
- "Не призначати CRT при стадії IV (наявні метастази) — використовувати системну хіміотерапію ± імунотерапію"
- "Не знижувати дозу опромінення нижче 45 Гр без значного клінічного обґрунтування — доза 50.4 Гр пов'язана з оптимальним локальним контролем"

known_controversies:
- topic: "T1N0 stage I: local excision vs CRT"
  positions:
  - position: "Local excision acceptable for T1N0 with clear margins and sphincter preservation — avoids radiation toxicity"
    sources: [SRC-NCCN-ANAL-2025]
  - position: "CRT preferred even for T1N0 — higher complete response, better long-term colostomy-free survival"
    sources: [SRC-ACT2-JAMES-2013]
  our_default: "CRT for all T2+ or any N+; MDT discussion for T1N0"
  rationale: "T1N0 borderline — radiation oncology + colorectal surgery MDT discussion recommended"

