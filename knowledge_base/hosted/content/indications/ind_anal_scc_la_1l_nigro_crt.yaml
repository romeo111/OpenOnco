notes: >
  Post-CRT surveillance: physical exam + inguinal node palpation q3-6 months × 5 years;
  CT CAP q6-12 months × 2 years; MRI pelvis q6 months × 2 years (sensitive for local recurrence).
  Recurrence after CRT: local-only → consider salvage APR if resectable; distant → systemic therapy.
  HIV+ patients: same CRT protocol; coordinate with HIV specialist; CD4 >200 preferred but
  not absolute contraindication; ART must continue during CRT.
