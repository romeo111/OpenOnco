- TEST-CT-CAP
- TEST-CBC
- TEST-CMP
- TEST-LFT
rationale: >
  Carboplatin (AUC 5) + paclitaxel (175 mg/m²) q21d is the established chemotherapy
  backbone for metastatic anal SCC. This doublet served as the control arm in POD1UM-303
  (retifanlimab 500 mg q21d + carbo + pacli) demonstrating activity as backbone.
  Historical series support ~20-35% ORR; no large randomized data for doublet alone.
  Preferred over cisplatin + 5-FU for metastatic disease due to tolerability and
  outpatient administration. When retifanlimab is unavailable (UA standard), this
  doublet is the accessible 1L metastatic standard.

rationale_ua: >
  Карбоплатин (carboplatin) AUC 5 + паклітаксел (paclitaxel) 175 mg/m² q21d є встановленим
  хіміотерапевтичним дублетом при метастатичному плоскоклітинному раку анального каналу. Цей дублет
  слугував контрольною гілкою у дослідженні POD1UM-303 (ретіфанлімаб 500 mg q21d + карбоплатин +
  паклітаксел), демонструючи власну активність як основа схеми. Ретроспективні серії підтримують
  загальну частоту відповіді ~20–35%; великих рандомізованих даних для дублету у монорежимі немає.
  Переважний над цисплатином + 5-FU при метастатичному захворюванні через кращу переносимість та
  можливість амбулаторного введення. У разі недоступності ретіфанлімабу (стандарт в Україні) цей
  дублет є доступним стандартом першої лінії при метастатичному захворюванні. NCCN категорія 2A.
