id: IND-ANAL-SCC-METASTATIC-1L-CARBO-PACLI
plan_track: standard

applicable_to:
  disease_id: DIS-ANAL-SCC
  line_of_therapy: 1
  stage_requirements:
    - "Locally advanced unresectable or metastatic (stage IV) anal squamous cell carcinoma"
    - "Not amenable to definitive chemoradiation (distant metastases or unresectable local)"
    - "ECOG PS 0-2"
    - "Retifanlimab (POD1UM-303) unavailable OR immunotherapy contraindicated"
  biomarker_requirements_required: []
  biomarker_requirements_excluded:
    - "Active autoimmune disease (relative — if immunotherapy planned; not relevant for chemo-only)"
  demographic_constraints:
    ecog_max: 2
    notes: "Chemotherapy-only acceptable to ECOG 2; ECOG 3 requires dose reduction or BSC"

recommended_regimen: REG-CARBO-PACLI-ANAL-MET
concurrent_therapy: []
followed_by:
  - "CT CAP q3 cycles (RECIST 1.1)"
  - "6 cycles standard course; continue if responding and tolerating"
  - "Retifanlimab-based regimen if becomes available at progression (2L ICI-naive context)"

evidence_level: moderate
strength_of_recommendation: moderate
nccn_category: "2A"

expected_outcomes:
  notes: >
    No large phase 3 RCT for carbo+pacli alone in metastatic anal SCC.
    Historical retrospective data (Morris 2013, Cancer; phase 2 series):
    ORR ~20-35%; PFS ~5-6 months; OS ~13-14 months in small series.
    POD1UM-303 (retifanlimab + carbo + pacli vs placebo + carbo + pacli):
    PFS HR 0.63 (9.3 vs 7.3 months) — confirmed that adding retifanlimab to
    carbo+pacli backbone improves outcomes. Carbo+pacli alone remains the
    standard-track backbone when ICI is unavailable.
  orr: "~20-35% (retrospective series)"
  pfs_months: "~5-7 (backbone doublet without ICI)"

hard_contraindications:
  - "CrCl <15 mL/min (carboplatin — dose as AUC per Calvert; min threshold)"
  - "Severe paclitaxel hypersensitivity (prior Grade 3/4 reaction)"
  - "ECOG ≥3"

red_flags_triggering_alternative:
  - condition: "Retifanlimab available + no ICI contraindication: use IND-ANAL-SCC-METASTATIC-1L-RETIFANLIMAB-CARBO-PACLI (POD1UM-303; PFS HR 0.63)"
  - condition: "ICI-eligible and retifanlimab unavailable: pembrolizumab (KEYNOTE-158 squamous histology; limited anal SCC data) may be considered per MDT"

required_tests:
  - TEST-CT-CAP
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - "HIV testing (anal SCC — HPV-related; HIV association increases risk)"
  - "CrCl (Calvert formula for carboplatin AUC dosing)"
  - "Anoscopy + biopsy confirmation of histology"
  - "HPV genotyping (informative; HPV-16 most common)"

rationale: >
  Carboplatin (AUC 5) + paclitaxel (175 mg/m²) q21d is the established chemotherapy
  backbone for metastatic anal SCC. This doublet served as the control arm in POD1UM-303
  (retifanlimab 500 mg q21d + carbo + pacli) demonstrating activity as backbone.
  Historical series support ~20-35% ORR; no large randomized data for doublet alone.
  Preferred over cisplatin + 5-FU for metastatic disease due to tolerability and
  outpatient administration. When retifanlimab is unavailable (UA standard), this
  doublet is the accessible 1L metastatic standard.

rationale_ua: >
  Карбоплатин AUC 5 + паклітаксел 175 мг/м² q21d — основний хіміотерапевтичний дублет
  при метастатичному анальному SCC, що використовувався як контрольна гілка у POD1UM-303.
  Стандарт при недоступності ретіфанлімабу. ORR ~20-35% (ретроспективні дані).
  NCCN Категорія 2A. Переважніший за цисплатин + 5-FU за переносимістю при метастатичному
  захворюванні.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
  - source_id: SRC-NCCN-ANAL-2025
    position: supports
    relevant_quote_paraphrase: "NCCN 2025: carboplatin + paclitaxel Category 2A for metastatic anal SCC; backbone also used in POD1UM-303"

do_not_do:
  - "Не ігнорувати POD1UM-303 ретіфанлімаб-схему якщо вона доступна — ICI + хіміотерапія перевершує тільки хіміотерапію (PFS HR 0.63)"
  - "Не забувати преп'едикацію перед паклітакселем (реакції гіперчутливості 1-3%)"
  - "Не призначати при анальному SCC без підтвердження ВПЛ-позитивного плоскоклітинного раку (виключити аденокарциному прямої кишки або перехідно-клітинний рак)"

