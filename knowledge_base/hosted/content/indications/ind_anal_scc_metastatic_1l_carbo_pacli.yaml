id: IND-ANAL-SCC-METASTATIC-1L-CARBO-PACLI
plan_track: standard

applicable_to:
  disease_id: DIS-ANAL-SCC
  line_of_therapy: 1
  stage_requirements:
  - "Locally advanced unresectable or metastatic (stage IV) anal squamous cell carcinoma"
  - "Not amenable to definitive chemoradiation (distant metastases or unresectable local)"
  - "ECOG PS 0-2"
  - "Retifanlimab (POD1UM-303) unavailable OR immunotherapy contraindicated"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
