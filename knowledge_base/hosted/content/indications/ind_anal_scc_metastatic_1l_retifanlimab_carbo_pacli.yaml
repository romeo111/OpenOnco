rationale: >
  POD1UM-303 (randomized Phase III): retifanlimab 500 mg Q4W + carboplatin AUC 5 +
  paclitaxel 175 mg/m² q3w × 6 cycles → retifanlimab maintenance Q4W vs placebo +
  carbo+pacli in 1L advanced/metastatic anal SCC. Primary endpoint PFS was positive
  (HR ~0.63, 2024 data). Retifanlimab (Zynyz, Incyte) is a PD-1 inhibitor approved
  by FDA (March 2023, accelerated approval based on POD1UM-202 2L monotherapy data)
  and EMA (August 2023). POD1UM-303 advances this to 1L combination setting.
  Prior 1L standard was carboplatin+paclitaxel (Rao 2011, J Clin Oncol) with ~60%
  ORR but limited OS — retifanlimab addition improves PFS and likely OS.
  PD-L1 testing not required — trial enrolled regardless of PD-L1 status.

rationale_ua: >
  Дослідження POD1UM-303 (рандомізоване дослідження фази 3): ретіфанлімаб (retifanlimab) 500 mg q3w
  + карбоплатин (carboplatin) + паклітаксел (paclitaxel) 175 mg/m² q3w × 6 циклів з подальшою
  підтримуючою терапією ретіфанлімабом Q4W проти плацебо + карбо+паклітаксел при поширеному/метастатичному
  плоскоклітинному раку анального каналу в першій лінії — первинна кінцева точка виживаність без
  прогресування є позитивною (HR ~0,63, дані 2024). Ретіфанлімаб (Zynyz, Incyte) — інгібітор PD-1,
  схвалений FDA (березень 2023, прискорена реєстрація на підставі даних POD1UM-202 фази 2 у монотерапії
  другої лінії) та EMA (серпень 2023). Попередній стандарт першої лінії — карбоплатин + паклітаксел
  (Rao 2011, J Clin Oncol, загальна частота відповіді ~60% без переваги ЗВ); додавання ретіфанлімабу
  покращує виживаність без прогресування. Тестування PD-L1 не є обов'язковим — дослідження включало
  пацієнтів незалежно від статусу PD-L1.
