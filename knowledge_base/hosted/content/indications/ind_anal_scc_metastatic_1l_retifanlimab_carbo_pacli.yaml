notes: >
  Retifanlimab not registered in Ukraine as of 2026-05-04 (drlz.com.ua).
  UA-accessible alternative: carboplatin AUC 5 + paclitaxel 175 mg/m² q3w alone
  (Rao 2011 evidence; accessible and reimbursed under NSZU).
  Pembrolizumab (KEYNOTE-158 basket, anal SCC cohort): 10% ORR 2L monotherapy —
  not standard 1L but sometimes used off-label in Ukraine for PD-L1+ patients.
  Gap: IND-ANAL-SCC-METASTATIC-1L-CARBO-PACLI (doublet without immunotherapy)
  should be authored as a standard-track alternative for UA-accessible care.
