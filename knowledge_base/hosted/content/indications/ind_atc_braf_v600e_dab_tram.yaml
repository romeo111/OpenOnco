sources:
- source_id: SRC-ROAR-SUBBIAH-2018
  position: supports
  relevant_quote_paraphrase: "ROAR ATC cohort: dabrafenib+trametinib ORR 69% (n=29), mOS ~14.5 mo vs historical ~5 mo; FDA approval basis for BRAF V600E ATC"
- source_id: SRC-NCCN-THYROID-2025
  position: supports
  relevant_quote_paraphrase: "Dabrafenib+trametinib is Category 1 preferred 1L for BRAF V600E-mutant unresectable/metastatic ATC; test BRAF on day of biopsy"

do_not_do:
- "НІКОЛИ не призначати дабрафеніб без траметинібу — монотерапія BRAFi при BRAF V600E ATC викликає парадоксальну активацію MAPK та може прискорити ріст пухлини"
- "Не відкладати тестування BRAF V600E — ініціювати в день отримання матеріалу біопсії (RAID-протокол); ATC — швидко прогресуюча хвороба"
- "Не призначати при BRAF V600 дикого типу або не-V600E мутації (BRAF клас 2/3) — інша мішень, BRAFi неефективний"
- "Не починати при QTc >500 мс або LVEF нижче нижньої межі норми — кардіологічна оцінка обов'язкова перед початком"
- "Не пропускати дерматологічний огляд кожні 4-8 тижнів — шкірний плоскоклітинний рак / кератоакантома є класовим ефектом BRAFi"
- "Не відкладати хірургічну консультацію при хорошій відповіді — мета неоад'ювантної терапії: конверсія до резектабельності"

known_controversies:
- topic: "Neoadjuvant dabrafenib+trametinib → surgery vs definitive systemic therapy alone in initially unresectable BRAF V600E ATC"
  positions:
  - position: "Neoadjuvant approach endorsed by NCCN for patients with initially unresectable ATC achieving response — surgery can prolong OS in responders"
    sources:
    - SRC-NCCN-THYROID-2025
  - position: "Evidence base is case series only; no RCT comparing surgery vs no surgery in ATC responders; multidisciplinary decision required"
    sources:
    - SRC-ROAR-SUBBIAH-2018
  our_default: "Assess resectability after 2-4 cycles; refer to high-volume thyroid surgery center for multidisciplinary evaluation if response achieved"
  rationale: "Surgery in responders represents potential for cure or durable disease control; not achievable with systemic therapy alone"

time_critical: true
time_critical_note: >
  ATC is a clinical emergency. Median survival from diagnosis is ~5 months without
  effective therapy; ~14.5 months with dabrafenib+trametinib for V600E-mutant disease.
  BRAF V600E testing must be initiated on the same day as biopsy — do not wait for
  histologic confirmation before ordering molecular testing. Initiate treatment within
  days of confirmed V600E status.

