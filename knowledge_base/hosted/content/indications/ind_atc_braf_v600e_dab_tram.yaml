id: IND-ATC-BRAF-V600E-DAB-TRAM
plan_track: standard

applicable_to:
  disease_id: DIS-THYROID-ANAPLASTIC
  line_of_therapy: 1
  stage_requirements:
    - "Locally advanced unresectable OR metastatic anaplastic thyroid carcinoma (ATC)"
    - "BRAF V600E mutation confirmed (IHC or sequencing)"
    - "Not amenable to curative surgical resection at diagnosis"
    - "Also considered: neoadjuvant intent — initially unresectable ATC with goal of resection after tumor response"
  biomarker_requirements_required:
    - biomarker_id: BIO-BRAF-V600E
      required: true
      value_constraint: "BRAF V600E confirmed (codon 600 glutamic acid substitution; IHC VE1 antibody OR sequencing); present in ~25-50% of ATC"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-DAB-TRAM-ATC
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~69% ORR (initial ROAR ATC cohort n=29, Subbiah JCO 2018); updated 2022 cohort n=36: ORR 56%"
  complete_response: "~13-20% CR; some patients converted to surgical resection after response"
  progression_free_survival: "Median DoR ~9.0 mo; responses durable in CR subset"
  overall_survival_5y: "Median OS ~14.5 mo (vs historical mOS ~5 mo for unresectable ATC — 3× improvement)"

hard_contraindications:
  - "BRAF V600 wild-type or non-V600E BRAF mutation (wrong target; BRAF class 2/3 mutations do not respond)"
  - "QTc >500 ms at baseline (dabrafenib prolongs QTc)"
  - "LVEF below institutional LLN or symptomatic heart failure"

red_flags_triggering_alternative:
  - RF-THYROID-ANAPLASTIC-FRAILTY-AGE
  - RF-THYROID-ANAPLASTIC-ORGAN-DYSFUNCTION
  - RF-THYROID-ANAPLASTIC-INFECTION-SCREENING

required_tests:
  - TEST-BRAF-V600E-MUTATION
  - TEST-ECG-BASELINE
  - TEST-LVEF-ECHO
  - TEST-LFT
  - TEST-CMP
  - TEST-CBC
  - TEST-CT-NECK-THORAX-ABDOMEN-PELVIS
  - TEST-OPHTHALMOLOGIC-EXAM

desired_tests:
  - TEST-BRAIN-MRI-CONTRAST

rationale: >
  Dabrafenib 150 mg PO BID + trametinib 2 mg PO QD is FDA-approved (May 2018,
  accelerated; full tumor-agnostic 2022) for BRAF V600E-mutant ATC, based on
  the ROAR basket trial (Subbiah et al, JCO 2018, PMID 29360941). ATC cohort:
  n=29, ORR 69%, mOS ~14.5 mo vs historical ~5 mo — dramatic improvement in
  a historically fatal disease. BRAF V600E is present in ~25-50% of ATC. NCCN
  designates dabrafenib+trametinib as the preferred 1L for BRAF V600E-mutant
  unresectable/metastatic ATC (Category 1). BRAF inhibitor MONOTHERAPY is
  CONTRAINDICATED — paradoxical ERK reactivation requires MEK inhibitor co-
  administration. ATC is a clinical emergency: BRAF V600E testing should be
  initiated on the same day as biopsy diagnosis ("RAID" workflow) per NCCN,
  as delay can be fatal. Neoadjuvant use to enable surgical resection is
  reported in multiple case series and endorsed by NCCN. For non-V600E or
  BRAF wild-type ATC, paclitaxel-carboplatin ± lenvatinib (IND-ATC-PACLITAXEL-
  CARBOPLATIN) is the fallback.

rationale_ua: >
  Дабрафеніб 150 мг PO двічі/день + траметиніб 2 мг PO один раз/день є FDA-
  схваленим (травень 2018, прискорений; повне пухлино-агностичне 2022) для
  BRAF V600E-мутантного ATC, на підставі ROAR basket trial (Subbiah et al,
  JCO 2018). Когорта ATC: n=29, ORR 69%, mOS ~14.5 міс. проти ~5 міс.
  у históric — драматичне покращення при захворюванні з надзвичайно поганим
  прогнозом. BRAF V600E присутній у ~25-50% ATC. NCCN визначає дабрафеніб+
  траметиніб як переважний 1L для BRAF V600E-мутантного нерезектабельного/
  метастатичного ATC (Категорія 1). BRAF-інгібітор МОНОТЕРАПІЯ ПРОТИПОКАЗАНА —
  парадоксальна активація ERK вимагає одночасного пригнічення MEK.
  ATC є онкологічною надзвичайною ситуацією: тестування BRAF V600E слід ініціювати
  в день біопсії ("RAID" протокол), оскільки затримка може бути фатальною.
  Неоад'ювантне використання для забезпечення хірургічної резекції описане
  у кількох серіях випадків та підтримано NCCN.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
  - source_id: SRC-ROAR-SUBBIAH-2018
    position: supports
    relevant_quote_paraphrase: "ROAR ATC cohort: dabrafenib+trametinib ORR 69% (n=29), mOS ~14.5 mo vs historical ~5 mo; FDA approval basis for BRAF V600E ATC"
  - source_id: SRC-NCCN-THYROID-2025
    position: supports
    relevant_quote_paraphrase: "Dabrafenib+trametinib is Category 1 preferred 1L for BRAF V600E-mutant unresectable/metastatic ATC; test BRAF on day of biopsy"

do_not_do:
  - "НІКОЛИ не призначати дабрафеніб без траметинібу — монотерапія BRAFi при BRAF V600E ATC викликає парадоксальну активацію MAPK та може прискорити ріст пухлини"
  - "Не відкладати тестування BRAF V600E — ініціювати в день отримання матеріалу біопсії (RAID-протокол); ATC — швидко прогресуюча хвороба"
  - "Не призначати при BRAF V600 дикого типу або не-V600E мутації (BRAF клас 2/3) — інша мішень, BRAFi неефективний"
  - "Не починати при QTc >500 мс або LVEF нижче нижньої межі норми — кардіологічна оцінка обов'язкова перед початком"
  - "Не пропускати дерматологічний огляд кожні 4-8 тижнів — шкірний плоскоклітинний рак / кератоакантома є класовим ефектом BRAFi"
  - "Не відкладати хірургічну консультацію при хорошій відповіді — мета неоад'ювантної терапії: конверсія до резектабельності"

known_controversies:
  - topic: "Neoadjuvant dabrafenib+trametinib → surgery vs definitive systemic therapy alone in initially unresectable BRAF V600E ATC"
    positions:
      - position: "Neoadjuvant approach endorsed by NCCN for patients with initially unresectable ATC achieving response — surgery can prolong OS in responders"
        sources:
          - SRC-NCCN-THYROID-2025
      - position: "Evidence base is case series only; no RCT comparing surgery vs no surgery in ATC responders; multidisciplinary decision required"
        sources:
          - SRC-ROAR-SUBBIAH-2018
    our_default: "Assess resectability after 2-4 cycles; refer to high-volume thyroid surgery center for multidisciplinary evaluation if response achieved"
    rationale: "Surgery in responders represents potential for cure or durable disease control; not achievable with systemic therapy alone"

time_critical: true
time_critical_note: >
  ATC is a clinical emergency. Median survival from diagnosis is ~5 months without
  effective therapy; ~14.5 months with dabrafenib+trametinib for V600E-mutant disease.
  BRAF V600E testing must be initiated on the same day as biopsy — do not wait for
  histologic confirmation before ordering molecular testing. Initiate treatment within
  days of confirmed V600E status.

last_reviewed: "2026-05-04"
reviewers: []
reviewer_signoffs: 0
review_status: pending_clinical_signoff
