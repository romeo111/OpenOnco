notes: >
  ATC BRAF V600E targeted therapy — fills the gap in ALGO-THYROID-ANAPLASTIC-1L
  which previously only routed to palliative paclitaxel-carboplatin.
  ROAR PMID 29360941 is now ingested as SRC-ROAR-SUBBIAH-2018.
  Updated 2022 ROAR cohort (PMID 34731050, JCO 2022) shows n=36, ORR 56%,
  mDOR 8.7 mo — slightly lower ORR than original report but durable responses.
