required_tests:
- TEST-BRAF-V600E-MUTATION
- TEST-ECG-BASELINE
- TEST-LVEF-ECHO
- TEST-LFT
- TEST-CMP
- TEST-CBC
- TEST-CT-NECK-THORAX-ABDOMEN-PELVIS
- TEST-OPHTHALMOLOGIC-EXAM

desired_tests:
- TEST-BRAIN-MRI-CONTRAST

rationale: >
  Dabrafenib 150 mg PO BID + trametinib 2 mg PO QD is FDA-approved (May 2018,
  accelerated; full tumor-agnostic 2022) for BRAF V600E-mutant ATC, based on
  the ROAR basket trial (Subbiah et al, JCO 2018, PMID 29360941). ATC cohort:
  n=29, ORR 69%, mOS ~14.5 mo vs historical ~5 mo — dramatic improvement in
  a historically fatal disease. BRAF V600E is present in ~25-50% of ATC. NCCN
  designates dabrafenib+trametinib as the preferred 1L for BRAF V600E-mutant
  unresectable/metastatic ATC (Category 1). BRAF inhibitor MONOTHERAPY is
  CONTRAINDICATED — paradoxical ERK reactivation requires MEK inhibitor co-
  administration. ATC is a clinical emergency: BRAF V600E testing should be
  initiated on the same day as biopsy diagnosis ("RAID" workflow) per NCCN,
  as delay can be fatal. Neoadjuvant use to enable surgical resection is
  reported in multiple case series and endorsed by NCCN. For non-V600E or
  BRAF wild-type ATC, paclitaxel-carboplatin ± lenvatinib (IND-ATC-PACLITAXEL-
  CARBOPLATIN) is the fallback.

rationale_ua: >
  Дабрафеніб (dabrafenib) 150 mg PO двічі на добу + траметиніб (trametinib) 2 mg PO один раз на добу
  є схваленими FDA (травень 2018, прискорена реєстрація; повне пухлино-агностичне схвалення 2022) для
  BRAF V600E-мутантного анапластичного раку щитоподібної залози (ATC) на підставі дослідження кошика
  ROAR (Subbiah et al., JCO 2018, PMID 29360941). Когорта ATC: n=29, загальна частота відповіді 69%,
  медіана ЗВ ~14,5 міс. проти ~5 міс. у пацієнтів, які отримували стандарт лікування (карбоплатин
  (carboplatin) + паклітаксел (paclitaxel)) — драматичне покращення при захворюванні з надзвичайно
  поганим прогнозом. BRAF V600E виявляється у ~25–50% ATC. NCCN визначає дабрафеніб + траметиніб як
  переважний варіант першої лінії для BRAF V600E-мутантного нерезектабельного/метастатичного ATC
  (категорія 1). Монотерапія інгібітором BRAF є ПРОТИПОКАЗАНОЮ — парадоксальна реактивація ERK вимагає
  одночасного застосування інгібітора MEK. ATC є клінічною надзвичайною ситуацією: тестування BRAF V600E
  слід ініціювати того самого дня, що і діагностична біопсія (протокол «RAID») відповідно до NCCN, оскільки
  затримка може бути фатальною. Неоад'ювантне застосування для досягнення резектабельності описане у
  кількох серіях та підтримане NCCN. При не-V600E або BRAF-дикому типі ATC альтернативою є IND-ATC-PACLITAXEL-CARBOPLATIN (IND-ATC-PACLITAXEL) ± ленватиніб (lenvatinib).
