id: IND-ATC-BRAF-V600E-DAB-TRAM
plan_track: standard

applicable_to:
  disease_id: DIS-THYROID-ANAPLASTIC
  line_of_therapy: 1
  stage_requirements:
  - "Locally advanced unresectable OR metastatic anaplastic thyroid carcinoma (ATC)"
  - "BRAF V600E mutation confirmed (IHC or sequencing)"
  - "Not amenable to curative surgical resection at diagnosis"
  - "Also considered: neoadjuvant intent — initially unresectable ATC with goal of resection after tumor response"
  biomarker_requirements_required:
  - biomarker_id: BIO-BRAF-V600E
    required: true
    value_constraint: "BRAF V600E confirmed (codon 600 glutamic acid substitution; IHC VE1 antibody OR sequencing); present in ~25-50% of ATC"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-DAB-TRAM-ATC
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~69% ORR (initial ROAR ATC cohort n=29, Subbiah JCO 2018); updated 2022 cohort n=36: ORR 56%"
  complete_response: "~13-20% CR; some patients converted to surgical resection after response"
  progression_free_survival: "Median DoR ~9.0 mo; responses durable in CR subset"
  overall_survival_5y: "Median OS ~14.5 mo (vs historical mOS ~5 mo for unresectable ATC — 3× improvement)"

hard_contraindications: []
