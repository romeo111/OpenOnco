rationale: >
  Anaplastic thyroid carcinoma is universally aggressive; chemoradiation + surgery for resectable, palliative chemotherapy for metastatic. BRAF V600E (~25-50%) → dabrafenib+trametinib preferred when available; this scaffold covers non-mutant / unknown.

rationale_ua: >
  Анапластична карцинома щитоподібної залози (ATC) є агресивною у всіх випадках; хіміопроменева терапія
  + хірургія при резектабельному процесі, паліативна хіміотерапія при метастатичному захворюванні.
  BRAF V600E (~25–50%) → переважними є дабрафеніб (dabrafenib) + траметиніб (trametinib) при наявності
  доступу; ця схема (паклітаксел (paclitaxel) + карбоплатин (carboplatin)) охоплює BRAF-негативні або
  BRAF-невизначені випадки. NCCN категорія 2A.
