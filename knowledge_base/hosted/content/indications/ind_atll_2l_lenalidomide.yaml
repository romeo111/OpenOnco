  - "ВАГІТНІСТЬ — АБСОЛЮТНЕ ПРОТИПОКАЗАННЯ; леналідомід тератогенний (категорія X); тест на вагітність перед кожним рецептом"
  - "Профілактика ТГВ/ТЕЛА ОБОВ'ЯЗКОВА — аспірин 100 мг/день або НМГ (тромбогенний ефект ІМіДу)"
  - "Дозування при нирковій недостатності: КФ 30-49 → 10 мг/день; КФ <30 → 5 мг або уникати"
  - "Якщо могамулізумаб доступний — він є переважним вибором (NCCN кат.1; FDA схвалений для р/р ATLL)"
  - "ОАК перед кожним циклом — нейтропенія 3-4 ступ. ~20%"

