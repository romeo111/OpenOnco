rationale: >
  Mogamulizumab (anti-CCR4) — disease-defining antibody for ATLL
  (CCR4 expressed in essentially all ATLL clones, often very bright).
  Ishida 2012 phase 2 in r/r ATLL: ORR 50%, CR 31%, FDA-approved for
  r/r ATLL. Distinct mechanism (ADCC vs CCR4+ Treg-like clone) from
  cytotoxic chemotherapy. Used as bridge to alloSCT in fit fit
  responders — sustained response without consolidation uncommon
  given aggressive natural history. Black-box warning: severe GVHD
  if alloSCT performed within 50 days of last mogamulizumab dose —
  mandatory wash-out period required.

rationale_ua: >
  Могамулізумаб (mogamulizumab) — анти-CCR4 антитіло, що є таргетною терапією, специфічною для
  АТТЛ (CCR4 експресується в практично всіх АТТЛ-клонах, часто надяскраво). Дослідження Ishida 2012
  (фаза 2) при рецидивній/рефрактерній АТТЛ: ЧЗВ 50%, ПВ 31%; схвалений FDA для рецидивної/
  рефрактерної АТТЛ. Унікальний механізм дії (ADCC проти CCR4+ Treg-подібного клону) — відрізняється
  від цитотоксичної хіміотерапії. Використовується як місток до алогенної СКТ для фізично збережених
  пацієнтів із відповіддю — тривала відповідь без консолідаційної трансплантації нетипова через
  агресивний природний перебіг АТТЛ. Рамочне попередження (boxed warning): тяжка реакція «трансплантат
  проти господаря» (GVHD) при виконанні алоСКТ впродовж 50 днів після останньої дози могамулізумабу —
  обов'язковий відмивний період. Рецидивний/рефрактерний перебіг АТТЛ після першої лінії — основне
  показання. Перша лінія таргетної терапії CCR4 при АТТЛ; монотерапія могамулізумабом є стандартом
  у цій ситуації. Підтримуюча терапія після консолідації алоСКТ не визначена. Первинна кінцева точка
  дослідження Ishida 2012: ЧЗВ.
