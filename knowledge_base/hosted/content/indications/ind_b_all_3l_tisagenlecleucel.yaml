do_not_do:
  - "НЕ призначати prophylactic systemic corticosteroids — пригнічує CAR-T expansion + знижує efficacy."
  - "НЕ розпочинати без on-site tocilizumab (мінімум 2 дози) ДО інфузії — fatal CRS можливе."
  - "НЕ робити в центрі без CAR-T accreditation (FACT/JACIE/REMS) — toxicity management потребує спеціалізованої команди + ICU доступу."
  - "НЕ пропускати baseline brain MRI — CNS-2/3 з симптомами exclusion ELIANA; ризик fatal ICANS вищий."
  - "НЕ ігнорувати тимчасову bridging chemotherapy (3-4 тижні manufacturing window) — disease progression в цьому вікні зменшує efficacy + може unfit пацієнта для CAR-T."
  - "НЕ призначати при active uncontrolled infection — лімфодеплеція + CRS = high mortality."
  - "НЕ забути IVIG для довготривалої hypogammaglobulinemia (IgG <400 + recurrent infections) — B-cell aplasia може тривати >12 місяців."

do_not_do_en:
  - "Do NOT prescribe prophylactic systemic corticosteroids — suppresses CAR-T expansion + reduces efficacy."
  - "Do NOT start without on-site tocilizumab (minimum 2 doses) BEFORE infusion — fatal CRS possible."
  - "Do NOT do this in a center without CAR-T accreditation (FACT/JACIE/REMS) — toxicity management requires a specialized team + ICU access."
  - "Do NOT skip baseline brain MRI — CNS-2/3 with symptoms is an ELIANA exclusion; risk of fatal ICANS is higher."
  - "Do NOT ignore temporary bridging chemotherapy (3-4 week manufacturing window) — disease progression in this window reduces efficacy + may make patient unfit for CAR-T."
  - "Do NOT prescribe with active uncontrolled infection — lymphodepletion + CRS = high mortality."
  - "Do NOT forget IVIG for long-lasting hypogammaglobulinemia (IgG <400 + recurrent infections) — B-cell aplasia may last >12 months."
known_controversies:
  - topic: "Tisagenlecleucel vs allogeneic SCT for R/R pediatric/young-adult B-ALL post-2L"
    positions:
      - position: "Tisa-cel — durable remission in subset (~50% 5-y EFS) without GVHD; preferred for HCT-naive with CD19+ relapse"
        sources: [SRC-ELIANA-MAUDE-2018, SRC-NCCN-BCELL-2025]
      - position: "AlloHCT — established curative pathway; preferred for high-risk biology + post-CAR-T MRD+ relapse"
        sources: [SRC-NCCN-BCELL-2025]
        evidence_note: "Many patients receive both — CAR-T to MRD-eradication followed by HCT consolidation in high-risk biology"
    our_default: "Tisa-cel for HCT-naive R/R; CAR-T → HCT consolidation for high-risk biology + post-CAR-T MRD+; HCT for post-CAR-T relapse with CD19-loss"
    rationale: "Sequential pathway maximizes cure; CAR-T for MRD-eradication + HCT consolidation"

