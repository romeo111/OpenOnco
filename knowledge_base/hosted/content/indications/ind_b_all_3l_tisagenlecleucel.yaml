rationale: >
  Tisagenlecleucel (Kymriah) — first FDA-approved CD19 CAR-T —
  for R/R B-ALL ages 3-25 (originally 3-21, expanded). ELIANA
  pivotal phase-2 (Maude et al., NEJM 2018): ORR 81%; CR/CRi 60%;
  MRD-negativity in CR/CRi 100%; 12-mo EFS 50%, OS 76%. The only
  curative option in this otherwise grim setting (historical 3L+
  R/R B-ALL pediatric mOS ~3-6 months pre-CAR-T). For adult B-ALL
  (>25), brexucabtagene autoleucel (Tecartus) is the registered
  alternative — separate Indication, future. CRITICAL: REMS /
  FACT-JACIE-accredited center mandatory; tocilizumab on-site
  (≥2 doses) BEFORE infusion; CNS-2/3 symptomatic excluded per
  ELIANA registration; pre-existing CNS disease + ICANS-related
  risks. Bridging chemotherapy during 3-4 week manufacturing
  window (avoid corticosteroids). Hypogammaglobulinemia + B-cell
  aplasia often >12 months — IVIG support. Absolute Ukraine
  access barrier: not registered, no domestic manufacturing,
  international referral (Israel / Poland / Germany / Spain) +
  USD 350-500K all-in.

rationale_ua: >
  Тисагенлеклойцел (tisagenlecleucel, Kymriah) — перший CAR-T, схвалений FDA, для рецидивної/
  рефрактерної В-ГЛЛ (B-ALL) пацієнтів віком 3-25 років (спочатку 3-21, розширено). Дослідження
  ELIANA (ключова фаза 2; Maude et al., NEJM 2018): ЧЗВ 81%; CR/CRi 60%; MRD-негативність при
  CR/CRi 100%; 12-міс. вільна від подій виживаність (EFS) 50%, ЗВ 76%. Єдиний куративний варіант
  в цій ситуації (традиційна медіана ЗВ при 3L+ рецидивній/рефрактерній В-ГЛЛ ~3-6 міс. до CAR-T).
  Для дорослих В-ГЛЛ (>25 років) — брексукабтаген аутолейцел (brexucabtagene autoleucel, Tecartus)
  є зареєстрованою альтернативою (окреме показання). Злиття (fusion) транскрипційних факторів при
  Ph+ В-ГЛЛ (наприклад BCR-ABL1) не є протипоказанням до CAR-T, але враховується при плануванні
  подальшого лікування. КРИТИЧНО: обов'язкова REMS / FACT-JACIE-акредитований центр; тоцилізумаб
  (tocilizumab) на місці (≥2 дози) ДО інфузії; ЦНС-2/3 симптоматична — виключена за ELIANA-реєстрацією.
  Бридж-хіміотерапія під час 3-4-тижневого вікна виробництва (уникати кортикостероїдів). Гіпогаммаглобулінемія
  + В-клітинна аплазія часто >12 місяців — підтримка IVIG. Абсолютний бар'єр доступу в Україні:
  не зареєстрований, без вітчизняного виробництва, міжнародне направлення (Ізраїль/Польща/Німеччина/
  Іспанія) + USD 350-500K загально. Перша лінія CAR-T-терапії при педіатричній рецидивній/рефрактерній
  В-ГЛЛ; монотерапія тисагенлеклойцелом — одноразова інфузія. Первинна кінцева точка ELIANA: ЧЗВ.
