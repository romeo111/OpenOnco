id: IND-BCC-1L-VISMODEGIB
plan_track: standard

applicable_to:
  disease_id: DIS-BCC
  line_of_therapy: 1
  stage_requirements:
    - "Locally advanced BCC (laBCC) not amenable to curative surgery or radiation"
    - "Metastatic BCC (mBCC)"
  biomarker_requirements_required:
    - biomarker_id: BIO-PTCH1
      required: false
      value_constraint: "PTCH1 loss-of-function (HH pathway activation) — supports eligibility but not mandatory (HH activation assumed in locally advanced/metastatic BCC)"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-VISMODEGIB-BCC
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~43% (mBCC, ERIVANCE) / ~30% (laBCC, ERIVANCE)"
  complete_response: "~21% (mBCC) / ~3% (laBCC)"
  progression_free_survival: "Median ~9.5 months (mBCC); disease control rate ~90% laBCC"
  overall_survival_5y: "Mature OS data variable; most patients discontinue due to AEs before progression"

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-EXCISIONAL-SKIN-BIOPSY
  - TEST-PREGNANCY
desired_tests: []

rationale: >
  Vismodegib (SMO antagonist) was the first-in-class hedgehog pathway
  inhibitor approved for locally advanced/metastatic BCC (FDA 2012).
  ERIVANCE pivotal trial: ORR 43% in mBCC, 30% in laBCC — historically
  transformative for a disease with no prior systemic option. High
  discontinuation rate due to AEs (muscle cramps, alopecia, dysgeusia)
  rather than progression; drug holiday strategies investigated. BCC
  has near-universal HH pathway activation (PTCH1 loss or SMO activation)
  making it an excellent target for SMO inhibition. Cemiplimab approved
  after HHI failure. NCCN Category 1 for laBCC/mBCC.

rationale_ua: >
  Візомодегіб (SMO-антагоніст) — перший в класі інгібітор HH-шляху для
  місцево-поширеного/метастатичного БКК (FDA 2012). ERIVANCE: ORR 43% при mBCC,
  30% при laBCC — трансформативний для хвороби без системних опцій. Висока
  частота відміни через побічні ефекти. NCCN Category 1.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
  - source_id: SRC-NCCN-SKIN-2025
    position: supports
    relevant_quote_paraphrase: "Vismodegib is NCCN Category 1 for locally advanced and metastatic BCC; preferred hedgehog pathway inhibitor alongside sonidegib"

do_not_do:
  - "НЕ призначати під час вагітності — тяжка ембріофетальна токсичність (тератогенність, BBW)"
  - "НЕ призначати BCC, що піддається лікуванню хірургією або ДПТ — системна терапія лише при laBCC/mBCC"
  - "НЕ ігнорувати запобігання вагітності — потрібні два методи контрацепції протягом лікування + 24 місяці після у жінок"
  - "НЕ поєднувати з потужними інгібіторами P-gp без консультації"

do_not_do_en:
  - "Do NOT prescribe during pregnancy — severe embryo-fetal toxicity (teratogenicity, Black Box Warning)"
  - "Do NOT use for BCC amenable to surgery or radiation — systemic therapy only for laBCC/mBCC"
  - "Do NOT skip pregnancy prevention — two contraceptive methods required throughout + 24 months post-dose in females"
  - "Do NOT combine with strong P-gp inhibitors without monitoring"

time_critical: false
last_reviewed: "2026-05-04"
reviewers: []
reviewer_signoffs: 0
notes: >
  STUB — pending Clinical Co-Lead sign-off. Standard-track HHI for locally
  advanced/metastatic BCC. First-in-class; established safety/efficacy.
  Sonidegib is NCCN-listed alternative (aggressive track) for laBCC.
