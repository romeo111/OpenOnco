id: IND-BCC-ADVANCED-1L-SONIDEGIB
plan_track: standard

applicable_to:
  disease_id: DIS-BCC
  line_of_therapy: 1
  stage_requirements:
    - "Adult locally advanced BCC"
    - "Disease recurred after surgery or radiation therapy, or patient is not a candidate for surgery or radiation therapy"
    - "Multidisciplinary confirmation that curative local therapy is not appropriate"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    age_min: 18

recommended_regimen: REG-SONIDEGIB-BCC
concurrent_therapy: []
followed_by:
  - IND-BCC-ADVANCED-2L-CEMIPLIMAB

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate:
    value: "BOLT 200 mg arm: ORR about 58% in locally advanced BCC in 12-month reporting"
    source: SRC-BOLT-MIGDEN-2015
    source_refs:
      - SRC-BOLT-MIGDEN-2015
      - SRC-FDA-ODOMZO-LABEL-2024

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-PREGNANCY
desired_tests:
  - TEST-CBC
  - TEST-CMP

rationale: >
  Sonidegib is a source-backed hedgehog pathway inhibitor option for adult
  locally advanced BCC when curative surgery or radiation is not appropriate.
  This draft indication intentionally does not cover metastatic BCC because the
  FDA label scope captured in this KB slice is locally advanced disease.

sources:
  - source_id: SRC-FDA-ODOMZO-LABEL-2024
    position: supports
    relevant_quote_paraphrase: "FDA/DailyMed label supports sonidegib for adult locally advanced BCC after surgery/radiation recurrence or when surgery/radiation are not options."
  - source_id: SRC-BOLT-MIGDEN-2015
    position: supports
    relevant_quote_paraphrase: "BOLT phase 2 trial supports antitumor activity of sonidegib 200 mg daily in advanced BCC, with the clearest label-supported use in locally advanced disease."
  - source_id: SRC-NCCN-SKIN-2025
    position: supports
    relevant_quote_paraphrase: "NCCN skin cancer source stub lists sonidegib as a hedgehog inhibitor option for advanced BCC."

known_controversies: []

do_not_do: []
do_not_do_en:
  - "Do not reuse this indication for metastatic BCC without separate source-backed review."
  - "Do not use as a substitute for curative surgery or radiation when local therapy remains appropriate."
  - "Do not start without pregnancy-risk assessment and contraception counseling when relevant."

time_critical: false
last_reviewed: "2026-05-07"
reviewers: []
reviewer_signoffs: []
notes: >
  Draft indication created to close BCC treatment coverage. Pending clinical
  signoff, access review, and local monitoring policy alignment.
