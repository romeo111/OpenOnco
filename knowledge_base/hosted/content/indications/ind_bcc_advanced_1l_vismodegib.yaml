id: IND-BCC-ADVANCED-1L-VISMODEGIB
plan_track: standard

applicable_to:
  disease_id: DIS-BCC
  line_of_therapy: 1
  stage_requirements:
    - "Adult metastatic BCC"
    - "Adult locally advanced BCC that recurred after surgery, or patient is not a candidate for surgery and radiation"
    - "Multidisciplinary confirmation that curative local therapy is not appropriate"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    age_min: 18

recommended_regimen: REG-VISMODEGIB-BCC
concurrent_therapy: []
followed_by:
  - IND-BCC-ADVANCED-2L-CEMIPLIMAB

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate:
    value: "ERIVANCE BCC: independent-review ORR about 43% in locally advanced BCC and 30% in metastatic BCC"
    source: SRC-ERIVANCE-SEKULIC-2012
    source_refs:
      - SRC-ERIVANCE-SEKULIC-2012
      - SRC-FDA-ERIVEDGE-LABEL-2024

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-PREGNANCY
desired_tests:
  - TEST-CBC
  - TEST-CMP

rationale: >
  Vismodegib is a source-backed hedgehog pathway inhibitor option for adult
  metastatic BCC or locally advanced BCC when curative surgery/radiation is not
  appropriate. SMO/PTCH1 testing can inform disease biology and resistance but
  is not required for label eligibility.

sources:
  - source_id: SRC-FDA-ERIVEDGE-LABEL-2024
    position: supports
    relevant_quote_paraphrase: "FDA/DailyMed label supports vismodegib for adults with metastatic BCC or locally advanced BCC after surgery recurrence or when surgery and radiation are not options."
  - source_id: SRC-ERIVANCE-SEKULIC-2012
    position: supports
    relevant_quote_paraphrase: "Pivotal ERIVANCE BCC trial supports response activity of vismodegib 150 mg daily in advanced BCC."
  - source_id: SRC-NCCN-SKIN-2025
    position: supports
    relevant_quote_paraphrase: "NCCN skin cancer source stub lists vismodegib as a hedgehog inhibitor option for advanced BCC."

known_controversies: []

do_not_do: []
do_not_do_en:
  - "Do not use as a substitute for curative surgery or radiation when local therapy remains appropriate."
  - "Do not start without pregnancy-risk assessment and contraception counseling when relevant."
  - "Do not require SMO/PTCH1 testing as a gate to label-eligible treatment."

time_critical: false
last_reviewed: "2026-05-07"
reviewers: []
reviewer_signoffs: []
notes: >
  Draft indication created to close BCC treatment coverage. Pending clinical
  signoff, access review, and local monitoring policy alignment.
