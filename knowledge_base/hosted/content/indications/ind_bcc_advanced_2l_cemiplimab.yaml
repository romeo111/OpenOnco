id: IND-BCC-ADVANCED-2L-CEMIPLIMAB
plan_track: standard

applicable_to:
  disease_id: DIS-BCC
  line_of_therapy: 2
  stage_requirements:
    - "Adult locally advanced or metastatic BCC"
    - "Previously treated with a hedgehog pathway inhibitor, or hedgehog pathway inhibitor is not appropriate"
    - "For locally advanced BCC, not a candidate for curative surgery or curative radiation therapy"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    age_min: 18

recommended_regimen: REG-CEMIPLIMAB-BCC
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "1"

expected_outcomes:
  overall_response_rate:
    value: "Study 1620/FDA summary: confirmed ORR 29% in locally advanced BCC and 21% in metastatic BCC"
    source: SRC-FDA-CEMIPLIMAB-BCC-APPROVAL-2021
    source_refs:
      - SRC-FDA-CEMIPLIMAB-BCC-APPROVAL-2021
      - SRC-FDA-LIBTAYO-LABEL-2025

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-CMP
desired_tests: []

rationale: >
  Cemiplimab is a source-backed PD-1 inhibitor option for adult locally
  advanced or metastatic BCC after hedgehog pathway inhibitor exposure, or when
  HHI therapy is not appropriate. PD-L1 testing is not required for the BCC
  label context.

sources:
  - source_id: SRC-FDA-CEMIPLIMAB-BCC-APPROVAL-2021
    position: supports
    relevant_quote_paraphrase: "FDA approval summary supports cemiplimab for laBCC/mBCC after prior HHI or when HHI is not appropriate; Study 1620 reported confirmed responses."
  - source_id: SRC-FDA-LIBTAYO-LABEL-2025
    position: supports
    relevant_quote_paraphrase: "Current DailyMed label includes locally advanced or metastatic BCC after prior HHI or when HHI is not appropriate."
  - source_id: SRC-NCCN-SKIN-2025
    position: supports
    relevant_quote_paraphrase: "NCCN skin cancer source stub lists cemiplimab for advanced BCC after HHI progression or HHI-inappropriate patients."

known_controversies: []

do_not_do: []
do_not_do_en:
  - "Do not require PD-L1 testing as a gate to label-eligible BCC use."
  - "Do not use as first systemic therapy when an appropriate hedgehog inhibitor path exists and is tolerable."
  - "Do not ignore immune-mediated toxicity screening and management."

time_critical: false
