do_not_do:
  - "НЕ призначати вагітним — висока тератогенність; обов'язковий тест на вагітність перед першою дозою"
  - "НЕ застосовувати при резектабельному БКК — спочатку хірургія"
  - "НЕ використовувати після прогресування на попередньому HHI (перехресна резистентність) — перейти на цеміплімаб"
  - "НЕ зменшувати дозу (немає обґрунтованих рівнів зниження дози) — використовувати перерви в лікуванні (drug holiday) для управління токсичністю"
  - "НЕ ігнорувати контрацепцію у чоловіків — кондом обов'язковий під час терапії та 3 місяці після"

sources:
  - source_id: SRC-NCCN-SKIN-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN Skin Cancer 2025: vismodegib 150 mg PO QD Category 1 for locally advanced BCC
      not amenable to surgery or radiation therapy, and for metastatic BCC.
      Cemiplimab Category 1 after HHI failure (post-HHI laBCC/mBCC).

known_controversies:
  - topic: "Vismodegib vs sonidegib for laBCC: which HHI first?"
    positions:
      - position: "Vismodegib (ERIVANCE): earlier FDA approval (2012); more long-term safety data; more commonly used globally for both laBCC and mBCC."
        sources: [SRC-NCCN-SKIN-2025]
      - position: "Sonidegib (BOLT): approved for laBCC only (not mBCC); ORR 58% at 200 mg arm; some evidence suggests comparable efficacy to vismodegib for laBCC; different toxicity profile (more myalgia/muscle enzyme elevation but less dysgeusia)."
        sources: [SRC-NCCN-SKIN-2025]
    our_default: "Vismodegib as default for laBCC and mBCC (broader label, more global availability, more long-term data). Sonidegib reasonable alternative for laBCC if patient profile favors."
  - topic: "Continuous vs intermittent vismodegib dosing"
    positions:
      - position: "Continuous 150 mg QD: FDA-approved schedule; standard of care."
        sources: [SRC-NCCN-SKIN-2025]
      - position: "Intermittent dosing (12 weeks on/8 weeks off, MIKIE study): comparable ORR with significantly lower cumulative toxicity; patient-preferred in long-term disease management."
        sources: [SRC-NCCN-SKIN-2025]
    our_default: "Continuous dosing per FDA label; intermittent schedule for patients with significant cumulative AEs or Gorlin syndrome requiring long-term control."

