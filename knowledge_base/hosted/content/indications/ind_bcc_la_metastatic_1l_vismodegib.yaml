id: IND-BCC-LA-METASTATIC-1L-VISMODEGIB
plan_track: standard

applicable_to:
  disease_id: DIS-BCC
  line_of_therapy: 1
  stage_requirements:
    - "Locally advanced BCC (laBCC): disease not amenable to surgery or radiation therapy; large/multiple lesions; prior surgery/RT failure; high surgical morbidity"
    - "OR metastatic BCC (mBCC): distant metastasis (nodal beyond regional, visceral, bone)"
    - "Adults (≥18 years)"
    - "ECOG PS 0-2"
    - "No prior hedgehog pathway inhibitor therapy"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    notes: >
      No biomarker companion diagnostic required — all BCC has Hedgehog (HH) pathway
      activation (PTCH1 loss ~90%; SMO mutation ~10-20%); testing not required for
      clinical eligibility per FDA label or NCCN guidelines.
      Pregnancy is an absolute contraindication — mandatory pregnancy testing and
      contraception for ALL patients of reproductive potential (men and women).
      Gorlin syndrome (PTCH1 germline) patients: same treatment; more frequent monitoring
      for new lesions.

recommended_regimen: REG-VISMODEGIB-BCC
concurrent_therapy:
  - "Pregnancy prevention: two forms of contraception during treatment AND for 24 months after last dose (women of reproductive potential)"
  - "Male patients: condoms (even if vasectomized) during treatment and 3 months after last dose"
  - "Muscle spasm management: oral magnesium 400-800 mg/day from cycle 1; quinine 300 mg BID for Grade ≥2 spasms"
  - "Nutritional support: baseline dietary assessment; dietitian referral if weight loss >5%"
  - "Dermatology MDT coordination: continued surveillance for new BCCs during treatment"

followed_by:
  - "Tumor response assessment every 12 weeks (MRI for deep laBCC; CT for mBCC; clinical photography for superficial laBCC)"
  - "At CR/near-CR: consider treatment break (MIKIE schedule) — reassess at 12 weeks on break; restart if progression"
  - "At progression: cemiplimab 350 mg IV q3w (IND-BCC-2L-CEMIPLIMAB; FDA 2021 post-HHI; NCCN Cat 1)"
  - "Surgical reassessment after CR/near-CR: vismodegib may downstage laBCC sufficiently to allow surgery not previously feasible"

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "43% laBCC (ERIVANCE; Sekulic 2012 NEJM; N=104); 30% mBCC"
  complete_response: "13% CR in laBCC (ERIVANCE); <5% CR in mBCC"
  progression_free_survival: "Median DOR 7.6 months laBCC; 14.8 months laBCC in responders (ERIVANCE extended follow-up)"
  overall_survival_5y: "OS data limited (crossover allowed; rare metastatic disease population)"
  notes: >
    PRIMARY EVIDENCE: Sekulic A, et al. NEJM 2012;366:2171-2179 (ERIVANCE BCC; Phase 2;
    N=104): vismodegib 150 mg QD in laBCC (n=63) and mBCC (n=33).
    laBCC ORR: 43% (CR 13%, PR 30%); mBCC ORR: 30%.
    Median DOR: 7.6 months (laBCC); 7.7 months (mBCC).
    FDA approval January 30, 2012 (first drug for advanced BCC; first HH pathway inhibitor approved).
    NCCN Skin BCC 2025: vismodegib Category 1 for laBCC and mBCC.
    Extended follow-up (Sekulic 2017): some laBCC responders had durable CR enabling surgery.
    MIKIE study (Sekulic 2017, Lancet Oncol): treatment breaks comparable efficacy vs continuous.

hard_contraindications:
  - "Pregnancy — absolute contraindication (embryo-fetal toxicity; fetal death; teratogenic). Do NOT start without confirmed negative pregnancy test."
  - "Prior hedgehog pathway inhibitor (vismodegib or sonidegib) — cross-resistance likely; no benefit"
  - "Resectable BCC without prior surgical attempt — surgery first"
  - "ECOG PS ≥4 — ECOG engine hard gate"

red_flags_triggering_alternative:
  - RF-FITNESS-ECOG-FIT

required_tests:
  - TEST-CMP
  - TEST-CBC
  - TEST-LFT
  - "Pregnancy test (urine or serum beta-hCG) — MANDATORY before first dose in all women of childbearing potential"
  - "Clinical photography: baseline documentation of all lesions for response assessment"
  - "CT chest/abdomen/pelvis or PET-CT: if mBCC (staging) or deep laBCC (extent mapping)"
  - "MRI for deep laBCC involving periorbital/perineural structures (baseline + q12 weeks)"
  - "Dermatology or head/neck surgery consultation for surgical feasibility assessment"

desired_tests:
  - "Skin biopsy: confirm pathology if any doubt about BCC diagnosis"
  - "PTCH1/SMO mutational testing (molecular): academic value only; not required for treatment eligibility"
  - "Perineural invasion assessment (MRI): determines RT vs HHI route for laBCC"

rationale: >
  Vismodegib (Erivedge) is the first FDA-approved systemic treatment for advanced BCC
  and the first Hedgehog pathway inhibitor in oncology. ERIVANCE Phase 2 (Sekulic 2012
  NEJM; N=104): vismodegib 150 mg QD in laBCC (n=63) and mBCC (n=33):
  - laBCC ORR: 43% (CR 13%, PR 30%)
  - mBCC ORR: 30%
  - Median DOR: 7.6 months laBCC
  FDA approved January 2012 — first drug for advanced BCC after decades of surgical
  management as the only standard option.

  MECHANISM: BCC pathogenesis is driven by Hedgehog (HH) pathway hyperactivation.
  Approximately 90% of BCC harbor PTCH1 (Patched-1) loss-of-function mutations that
  relieve inhibition of SMO (Smoothened), constitutively activating GLI transcription
  factors and driving proliferation. Vismodegib binds SMO and blocks downstream signaling.
  Because all BCC is HH-pathway-driven, no companion diagnostic testing is required.

  TERATOGENICITY: The most critical patient safety issue. Vismodegib is highly
  teratogenic (embryotoxic and teratogenic in animal studies at human-equivalent doses).
  Two forms of contraception required during treatment AND for 24 months after last dose
  for all women of reproductive potential. Male patients: condoms during treatment and
  for 3 months after last dose (drug excreted in semen). Pregnancy during treatment
  is a medical emergency requiring immediate discontinuation and reproductive counseling.

  TREATMENT SEQUENCE: For laBCC, surgery and radiation therapy should be evaluated
  first — vismodegib is for patients where curative-intent locoregional therapy is not
  feasible. After complete response with vismodegib, surgical resection may become
  feasible for previously unresectable disease.

  2L POST-HHI PROGRESSION: Cemiplimab (anti-PD-1) is FDA-approved for laBCC/mBCC after
  HHI failure (FDA February 2021; Phase 2: ORR 21% laBCC, 21% mBCC after HHI). Sonidegib
  (second HHI) has limited efficacy after vismodegib failure due to cross-resistance.

  UKRAINE CONTEXT: Vismodegib (Erivedge) is NOT registered in Ukraine.
  Generic vismodegib (Indian manufacturers) may be accessible via parallel import in
  some Eastern European markets. Named-patient import available with MoH authorization.
  Approximate branded cost: USD ~15,000-18,000/month. Cemiplimab (Libtayo; post-HHI
  failure) is also not registered in Ukraine for BCC.

rationale_ua: >
  Візомодегіб (Erivedge) — перший FDA-схвалений системний препарат для поширеного БКК.
  ERIVANCE (Sekulic 2012 NEJM): ORR 43% (laBCC), 30% (mBCC); CR 13% laBCC.
  Механізм: SMO-антагоніст HH-шляху; тестування PTCH1/SMO НЕ ПОТРІБНЕ.
  Критично: ТЕРАТОГЕННІСТЬ — обов'язкова контрацепція 24 міс після останньої дози.
  Після прогресування: цеміплімаб (FDA 2021 для post-HHI BCC; ORR ~21%).
  Україна: НЕ зареєстровано; named-patient import; ~15–18 тис USD/міс.

