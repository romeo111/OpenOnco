id: IND-BREAST-HER2-LOW-2L-DATO-DXD
plan_track: aggressive

applicable_to:
  disease_id: DIS-BREAST
  receptor_subtype: HR_POS_HER2_NEG
  stage_stratum: METASTATIC
  line_of_therapy: 2
  biomarker_requirements_required:
    - biomarker_id: BIO-ESTROGEN-RECEPTOR
      value_constraint: "positive"
      required: true
    - biomarker_id: BIO-HER2-LOW
      value_constraint: "HER2-low (IHC 1+ OR IHC 2+ ISH-negative)"
      required: true
  biomarker_requirements_excluded:
    - biomarker_id: BIO-HER2-SOLID
      value_constraint: "HER2-positive (IHC 3+ OR IHC 2+ ISH-amplified)"
      required: false
  demographic_constraints:
    ecog_max: 2
    progression_on_prior_endocrine_cdk46i: true
    progression_on_prior_tdxd: true
    # Aggressive-track scenario: HR+/HER2-low patient who progressed on
    # T-DXd (DESTINY-Breast04 standard) and needs another TROP2 ADC.
    # TROPION-Breast01 enrolled HER2-low + IHC-0; PFS 6.9 vs 4.9 mo
    # in the broader HR+/HER2- ITT applies here.

recommended_regimen: REG-DATO-DXD-BREAST-2L
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  median_progression_free_survival_months:
    value: "7"
    source: SRC-NCCN-BREAST-2025
    notes: "TROPION-Breast01 HR+/HER2-low subgroup: Dato-DXd mPFS 6.9 vs 4.9 mo (HR 0.63); trial source not yet in KB — citing SRC-NCCN-BREAST-2025; no head-to-head vs T-DXd in this sequence"
  notes: "TROPION-Breast01 HR+/HER2- ITT (HER2-low subgroup pre-specified): PFS 6.9 vs 4.9 mo (HR 0.63). No head-to-head vs T-DXd; sequencing question — Dato-DXd benefit post-T-DXd progression has limited prospective data."

hard_contraindications: []
red_flags_triggering_alternative: []
