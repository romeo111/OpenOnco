  - source_id: SRC-NCCN-BREAST-2025
    weight: primary
  - source_id: SRC-ESMO-BREAST-METASTATIC-2024
    weight: primary

last_reviewed: "2026-04-29"
reviewers: []
reviewer_signoffs: 0

notes: >
  Aggressive-track. For HR+/HER2-low patients who progressed on
  T-DXd (DESTINY-Breast04 standard 2L) — Dato-DXd as 3L+ ADC option
  in HER2-low context per TROPION-Breast01 broad-eligibility design.
  Standard-track 2L for HER2-low remains T-DXd (IND-BREAST-HR-POS-2L
  -T-DXD-HER2-LOW): PFS 10.1 vs 5.4 mo HR 0.51, OS 23.9 vs 17.5 mo
  HR 0.64. Dato-DXd PFS benefit (6.9 vs 4.9 mo, HR 0.63) is smaller
  in magnitude. Sequencing rationale: distinct ADC payload (dato-DXd
  is TROP2-targeted, T-DXd is HER2-targeted) but shared deruxtecan
  topo-I-inhibitor warhead — cross-resistance plausible. Trial-source
  SRC-TROPION-BREAST01-BARDIA-2024 not yet ingested into KB —
  citations fall back to NCCN + ESMO guideline Sources; flagged for
  follow-up source-stub generation. UA access: dato-DXd not
  registered; named-patient import / EAP only.
