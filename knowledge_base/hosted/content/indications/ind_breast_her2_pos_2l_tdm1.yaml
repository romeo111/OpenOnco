do_not_do:
  - "Не замінювати T-DM1 на трастузумаб або пертузумаб — різні ADC та звичайні препарати"
  - "Не вводити T-DM1 при тромбоцитах <100×10⁹/л — висока тромбоцитопенія; відстрочте і перевірте"
  - "Без контролю LVEF — T-DM1 кардіотоксичний; ЕхоКГ кожні 3 цикли обов'язково"
  - "Не ігнорувати жовтяницю — гепатотоксичність T-DM1 може бути важкою; перевірте ЛФТ"
  - "Якщо T-DXd стає доступним — перейдіть на нього (кращий ефект; DB-03 HR 0.33)"

sources:
  - source_id: SRC-NCCN-BREAST-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN Breast 2025 Category 1: T-DM1 (trastuzumab emtansine) as 2L therapy for
      HER2+ metastatic breast cancer after prior taxane + trastuzumab. T-DXd is now
      listed as the preferred 2L when accessible (DESTINY-Breast03); T-DM1 remains
      Category 1 when T-DXd is not available.
  - source_id: SRC-ESMO-BREAST-METASTATIC-2024
    position: supports
    relevant_quote_paraphrase: >
      ESMO mBC 2024: T-DXd is recommended as preferred 2L for HER2+ mBC (Grade A,
      Level I); T-DM1 (EMILIA) remains a valid option when T-DXd is not accessible.
      Both maintain Category 1/Grade A recommendations.
  - source_id: SRC-DESTINY-BREAST03-CORTES-2022
    position: context
    relevant_quote_paraphrase: >
      DESTINY-Breast03 (Cortés 2022 NEJM): T-DXd vs T-DM1 — mPFS 28.8 vs 6.8 mo
      (HR 0.33; p<0.001). Establishes T-DXd superiority; T-DM1 used when T-DXd
      inaccessible.

