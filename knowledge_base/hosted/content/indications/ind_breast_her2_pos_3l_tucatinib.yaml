id: IND-BREAST-HER2-POS-3L-TUCATINIB
plan_track: standard

applicable_to:
  disease_id: DIS-BREAST
  receptor_subtype: HER2_POS
  stage_stratum: METASTATIC
  # line_of_therapy intentionally unset: used by algorithms of different LOTs; algorithm is routing authority.
  biomarker_requirements_required:
    - biomarker_id: BIO-HER2-SOLID
      value_constraint: "HER2-positive (IHC 3+ OR IHC 2+ ISH-amplified)"
      required: true
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    # HER2CLIMB enrolled patients with brain metastases (active or
    # treated) — preferred indication when brain mets present.
    brain_metastases_favorable: true

recommended_regimen: REG-TUCATINIB-TRASTUZUMAB-CAPECITABINE-BREAST
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  median_progression_free_survival_months: 8
  median_overall_survival_months: 22
  notes: "HER2CLIMB overall: PFS 7.8 vs 5.6 mo (HR 0.54), OS 21.9 vs 17.4 mo (HR 0.66). Brain-mets cohort: CNS-PFS 9.9 vs 4.2 mo (HR 0.32), intracranial ORR 47% vs 20%."

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-BREAST-INFECTION-SCREENING
required_tests:
  - TEST-ER-PR-IHC
  - TEST-HER2-IHC-FISH
  - TEST-CECT-CAP
  - TEST-MRI-BRAIN-CONTRAST
desired_tests: []

rationale_ua: >
  Тукатиніб (tucatinib) + трастузумаб (trastuzumab) + капецитабін (capecitabine) — схема 3L+ при
  HER2+ метастатичному раку молочної залози (РМЗ) після трастузумабу + T-DXd. Дослідження HER2CLIMB
  (фаза 3): медіана ВБП 7.8 проти 5.6 міс. (HR 0.54); ЗВ 21.9 проти 17.4 міс. (HR 0.66). Ключова
  перевага: активні метастази в головному мозку (brain metastases) — перший режим з проспективно
  доведеною інтракраніальною активністю: CNS-PFS 9.9 проти 4.2 міс. (HR 0.32); інтракраніальна ЧЗВ
  47% проти 20%. Рецидивний/рефрактерний HER2+ РМЗ після ≥2 попередніх HER2-спрямованих ліній.
  Монотерапія тукатинібом не застосовується при РМЗ — лише в комбінації з трастузумабом та
  капецитабіном. Підтримуюча терапія після завершення не стандартизована окремо. Обов'язкове МРТ
  головного мозку при виборі цього режиму при активних/пролікованих метастазах. Перша лінія
  таргетної терапії (targeted therapy) для HER2+ РМЗ з активними метастазами в мозку.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_06
draft_revision: 2

sources:
  - source_id: SRC-HER2CLIMB-MURTHY-2019
    weight: primary
  - source_id: SRC-NCCN-BREAST-2025
    weight: primary
  - source_id: SRC-ESMO-BREAST-METASTATIC-2024
    weight: confirmatory

last_reviewed: "2026-04-27"
reviewers: []
reviewer_signoffs: 0

notes: >
  ESCAT IA. HER2CLIMB established tucatinib + trastuzumab +
  capecitabine for HER2+ metastatic ≥3L (post-trastuzumab + post-T-DXd
  in current era). Major unmet need addressed: active brain
  metastases — first regimen with prospectively-demonstrated
  intracranial activity. CNS-PFS doubling justifies preferred
  positioning when brain mets present (active or treated). MRI brain
  required pre-treatment to characterize CNS disease. Diarrhea
  management dominant clinical workflow burden — combined effect of
  tucatinib + capecitabine. UA access barrier: tucatinib not
  registered; named-patient import / EAP only. T-DM1 remains an
  alternative when tucatinib not accessible (KATHERINE / EMILIA
  data — not modeled in this batch).
