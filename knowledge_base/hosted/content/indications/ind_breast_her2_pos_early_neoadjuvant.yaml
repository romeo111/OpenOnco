id: IND-BREAST-HER2-POS-EARLY-NEOADJUVANT
plan_track: standard

applicable_to:
  disease_id: DIS-BREAST
  receptor_subtype: HER2_POS
  stage_stratum: EARLY
  line_of_therapy: 1
  biomarker_requirements_required:
    - biomarker_id: BIO-HER2-SOLID
      value_constraint: "positive"
      required: true
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 1

recommended_regimen: REG-TCHP-NEOADJUVANT
concurrent_therapy: []
# Sequential: KATHERINE pathway — residual ypT+ or ypN+ post-neoadj
# switches to T-DM1 x 14 cycles; pCR continues trastuzumab + pertuzumab
# to complete 1 year HER2-targeted therapy.
followed_by:
  - REG-TDM1-ADJUVANT

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  pathologic_complete_response_rate: "60-65%"
  five_year_invasive_disease_free_survival_with_pcr: ">90%"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-BREAST-FRAILTY-AGE
  - RF-BREAST-ORGAN-DYSFUNCTION
  - RF-BREAST-INFECTION-SCREENING
required_tests:
  - TEST-ER-PR-IHC
  - TEST-HER2-IHC-FISH
  - TEST-CECT-CAP
desired_tests:
  - TEST-GERMLINE-BRCA-PANEL

rationale_ua: >
  Неоад'ювантна хіміотерапія + таргетна терапія (targeted therapy) анти-HER2 є стандартом лікування
  (standard of care) для HER2+ стадій II-III раку молочної залози (РМЗ). Мета: досягнення патологічної
  повної відповіді (pCR — pathologic complete response) — 60-65% при двійному HER2-блокуванні;
  5-річна виживаність без інвазивного захворювання (iDFS) >90% при pCR. Дослідження APHINITY
  підтримує ад'ювантний пертузумаб (pertuzumab) після pCR при вузловому залученні. Пацієнти з
  залишковим захворюванням після неоад'юванту отримують T-DM1 (трастузумаб емтансин) ад'ювантно
  (дослідження KATHERINE) — значний приріст виживаності без захворювання (iDFS). Підтримуюча
  терапія: ад'ювантний трастузумаб ± пертузумаб до 1 року. Рецидивний/рефрактерний перебіг після
  неоад'ювантного лікування — перехід на ад'ювантну або метастатичну схему. Перша лінія
  неоад'ювантного лікування HER2+ РМЗ II-III стадій. Первинна кінцева точка: pCR.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_06
draft_revision: 2

sources:
  - source_id: SRC-NCCN-BREAST-2025
    weight: primary
  - source_id: SRC-ESMO-BREAST-EARLY-2024
    weight: primary

last_reviewed: null
reviewers: []

notes: >
  Stage II-III HER2+ standard. APHINITY trial supports adjuvant
  pertuzumab post-pCR in node-positive. KATHERINE pathway for residual
  disease — major iDFS gain.
