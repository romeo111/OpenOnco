rationale_ua: >
  Трастузумаб (trastuzumab) + пертузумаб (pertuzumab) + доцетаксел (docetaxel) (THP/Perjeta regimen) —
  стандарт лікування (standard of care) першої лінії при HER2+ метастатичному раку молочної залози
  (РМЗ). Дослідження CLEOPATRA (фаза 3): медіана загальної виживаності (ЗВ) 57 місяців — найвища
  досягнута при HER2+ метастатичному РМЗ. Подвійне HER2-блокування (трастузумаб + пертузумаб) є
  механістичним обгрунтуванням: трастузумаб блокує HER2-домен IV; пертузумаб — домен II (запобігає
  димеризації HER2/HER3). Після завершення хіміотерапії підтримуюча терапія (maintenance)
  трастузумабом + пертузумабом до прогресування. Рецидивний/рефрактерний перебіг після THP —
  перехід на 2L (T-DXd per DESTINY-Breast03). Перша лінія таргетної (targeted therapy) анти-HER2
  терапії при метастатичному HER2+ РМЗ. Первинна кінцева точка CLEOPATRA: ЗВ.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_06
