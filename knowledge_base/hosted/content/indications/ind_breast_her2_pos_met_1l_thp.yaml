id: IND-BREAST-HER2-POS-MET-1L-THP
plan_track: standard

applicable_to:
  disease_id: DIS-BREAST
  receptor_subtype: HER2_POS
  stage_stratum: METASTATIC
  line_of_therapy: 1
  biomarker_requirements_required:
    - biomarker_id: BIO-HER2-SOLID
      value_constraint: "positive"
      required: true
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-THP-METASTATIC
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  median_overall_survival_months: 57
  notes: "CLEOPATRA"

hard_contraindications: []
red_flags_triggering_alternative:
