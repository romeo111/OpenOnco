last_reviewed: null
reviewers: []

notes: >
  CLEOPATRA standard. After T-DXd availability the question of THP-vs-
  T-DXd 1L is being studied (DESTINY-Breast09); current standard remains
  THP for 1L unless visceral crisis or rapid progression where T-DXd
  considered.
