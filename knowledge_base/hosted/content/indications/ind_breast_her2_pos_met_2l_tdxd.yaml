id: IND-BREAST-HER2-POS-MET-2L-TDXD
plan_track: standard

applicable_to:
  disease_id: DIS-BREAST
  receptor_subtype: HER2_POS
  stage_stratum: METASTATIC
  # line_of_therapy intentionally unset: used by algorithms of different LOTs; algorithm is routing authority.
  biomarker_requirements_required:
    - biomarker_id: BIO-HER2-SOLID
      value_constraint: "positive"
      required: true
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-TDXD-METASTATIC
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  median_progression_free_survival_months: 28
  notes: "DESTINY-Breast03 (T-DXd vs T-DM1 in 2L)"

hard_contraindications: []
