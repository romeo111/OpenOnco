desired_tests: []

rationale_ua: >
  Трастузумаб дерукстекан (trastuzumab deruxtecan, T-DXd, Enhertu) є стандартом лікування (standard
  of care) другої лінії при HER2+ метастатичному раку молочної залози (РМЗ) після трастузумабу.
  Дослідження DESTINY-Breast03 (фаза 3; T-DXd проти T-DM1 у 2L): медіана ВБП 28.8 проти 6.8 міс.
  (HR 0.33) — найбільша перевага в ВБП серед будь-яких ADC в РМЗ. Механізм: анти-HER2 ADC з
  топоізомеразою I (DXd payload) + ефект свідка (bystander effect) на HER2-гетерогенні клітини.
  Ризик інтерстиційної хвороби легень (ILD) ~10.5% будь-якого ступеня, 1-2% G3+ — базове КТ грудної
  клітки та активний моніторинг є обов'язковими; негайна відміна + кортикостероїди при підозрі.
  Рецидивний/рефрактерний HER2+ РМЗ після ≥1 попередньої анти-HER2 лінії. Монотерапія T-DXd.
  Підтримуюча терапія до прогресування. Перша лінія після трастузумабу — таргетна терапія 2L.
  Первинна кінцева точка DESTINY-Breast03: ВБП.
