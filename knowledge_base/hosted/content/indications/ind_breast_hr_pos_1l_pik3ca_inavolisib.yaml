id: IND-BREAST-HR-POS-1L-INAVOLISIB
plan_track: standard

applicable_to:
  disease_id: DIS-BREAST
  receptor_subtype: HR_POS_HER2_NEG
  stage_stratum: METASTATIC
  line_of_therapy: 1
  biomarker_requirements_required:
    - biomarker_id: BIO-ESTROGEN-RECEPTOR
      value_constraint: "positive"
      required: true
    - biomarker_id: BIO-PIK3CA-MUTATION
      value_constraint: "activating hotspot mutation present (tissue NGS or ctDNA)"
      required: true
  biomarker_requirements_excluded:
    - biomarker_id: BIO-HER2-SOLID
      value_constraint: "positive"
      required: false
  demographic_constraints:
    ecog_max: 2
    progression_or_recurrence_on_adjuvant_endocrine: true
    # INAVO120 enrolment: disease recurrence on/within 12 mo of completing
    # adjuvant endocrine therapy, OR de-novo metastatic — endocrine-refractory
    # context is the gatekeeping factor (not prior CDK4/6i, which was excluded).

recommended_regimen: REG-INAVOLISIB-PALBO-FULV-BREAST
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  median_progression_free_survival_months: 15
  notes: "INAVO120 PIK3CA-mutant cohort: 15.0 vs 7.3 mo (HR 0.43)."

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests:
  - TEST-ER-PR-IHC
  - TEST-HER2-IHC-FISH
  - TEST-PIK3CA-NGS
  - TEST-CECT-CAP
desired_tests: []

sources:
  - source_id: SRC-NCCN-BREAST-2025
    weight: primary
  - source_id: SRC-ESMO-BREAST-METASTATIC-2024
    weight: primary

last_reviewed: "2026-04-29"
reviewers: []
reviewer_signoffs: 0

notes: >
  ESCAT IA. INAVO120 (NCT04191499): inavolisib + palbociclib +
  fulvestrant in PIK3CA-mutant HR+/HER2- metastatic breast with
  endocrine-resistant disease (recurrence on/within 12 mo of
  completing adjuvant endocrine therapy, or de-novo metastatic).
  Median PFS 15.0 vs 7.3 mo (HR 0.43). FDA approval Oct 2024
  (Itovebi). Mutant-selective design yields lower hyperglycemia +
  rash burden than alpelisib while preserving efficacy. Pre-treatment
  PIK3CA testing (tissue NGS or ctDNA) required. Trial-source
  SRC-INAVO120-TURNER-2024 not yet ingested into KB — citations fall
  back to NCCN + ESMO guideline Sources; flagged for follow-up
  source-stub generation. UA access barrier: inavolisib not registered;
  named-patient import / EAP only.
