rationale_ua: >
  Іналолісиб (inavolisib) — мутант-селективний PI3K-альфа (PIK3CA) інгібітор у комбінації з
  палбоциклібом (palbociclib) + фулвестрантом (fulvestrant) для PIK3CA-мутованого HR+/HER2-
  метастатичного раку молочної залози (РМЗ) після ендокринної терапії. Дослідження INAVO120
  (NCT04191499; фаза 3, PIK3CA-мутантна когорта): медіана ВБП 15.0 проти 7.3 міс. (HR 0.43).
  FDA схвалено жовтень 2024 (Itovebi). Мутант-селективний дизайн знижує гіперглікемію та висипку
  порівняно з неселективними PI3K-інгібіторами (алпелісиб). Перша лінія таргетної терапії (targeted
  therapy) з PI3K-блокуванням у HR+/HER2- метастатичному РМЗ з PIK3CA-мутацією після резистентності
  до ендокринної терапії. Рецидивний/рефрактерний перебіг після ад'ювантної ендокринної терапії
  (рецидив ≤12 міс.) або de novo метастатичне захворювання. Підтримуюча терапія: продовження
  іналолісибу + фулвестранту після завершення CDK4/6i-компоненту (якщо застосовується). Первинна
  кінцева точка INAVO120: ВБП.
