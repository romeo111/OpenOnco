id: IND-BREAST-HR-POS-2L-DATO-DXD
plan_track: standard

applicable_to:
  disease_id: DIS-BREAST
  receptor_subtype: HR_POS_HER2_NEG
  stage_stratum: METASTATIC
  line_of_therapy: 2
  biomarker_requirements_required:
    - biomarker_id: BIO-ESTROGEN-RECEPTOR
      value_constraint: "positive"
      required: true
  biomarker_requirements_excluded:
    - biomarker_id: BIO-HER2-SOLID
      value_constraint: "HER2-positive (IHC 3+ OR IHC 2+ ISH-amplified)"
      required: false
  demographic_constraints:
    ecog_max: 2
    progression_on_prior_endocrine_cdk46i: true
    prior_chemo_lines_for_metastatic_min: 1
    prior_chemo_lines_for_metastatic_max: 2
    # TROPION-Breast01 enrolment: 1-2 prior chemotherapy lines for
    # metastatic disease + prior endocrine therapy. Engine should
    # prefer this when patient has exhausted endocrine and ≥1 chemo
    # but is not HER2-low (otherwise T-DXd HER2-low takes priority).

recommended_regimen: REG-DATO-DXD-BREAST-2L
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  median_progression_free_survival_months: 7
  notes: "TROPION-Breast01 ITT: PFS 6.9 vs 4.9 mo (HR 0.63). Benefit consistent across HER2-low / IHC-0 strata."

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-BREAST-INFECTION-SCREENING
required_tests:
  - TEST-ER-PR-IHC
  - TEST-HER2-IHC-FISH
  - TEST-CECT-CAP
desired_tests: []

sources:
  - source_id: SRC-NCCN-BREAST-2025
    weight: primary
  - source_id: SRC-ESMO-BREAST-METASTATIC-2024
    weight: primary

last_reviewed: "2026-04-29"
reviewers: []
reviewer_signoffs: 0

notes: >
  TROPION-Breast01 (NCT05104866): Phase III, HR+/HER2- metastatic
  breast post-ET + 1-2 prior chemo lines. Datopotamab deruxtecan
  (Dato-DXd) 6 mg/kg q3w vs investigator-choice chemo (eribulin /
  vinorelbine / gemcitabine / capecitabine). Median PFS 6.9 vs
  4.9 mo (HR 0.63). FDA approval Jan 2025 (Datroway). Distinguishing
  AE profile vs T-DXd: higher stomatitis + ocular toxicity, lower
  (~3% vs ~12%) ILD rate. TROP2-IHC not required as predictive
  biomarker per current label (broad-eligibility design). When
  HER2-low IHC 1+ / 2+ ISH- coexists, T-DXd (DESTINY-Breast04 PFS
  10.1 vs 5.4 mo, HR 0.51) is preferred over Dato-DXd by efficacy
  margin; Dato-DXd is the option for IHC-0 (HER2-zero) patients
  ineligible for T-DXd. Trial-source SRC-TROPION-BREAST01-BARDIA-2024
  not yet ingested into KB — citations fall back to NCCN + ESMO
  guideline Sources; flagged for follow-up source-stub generation.
  UA access: not registered; named-patient import / EAP only.
