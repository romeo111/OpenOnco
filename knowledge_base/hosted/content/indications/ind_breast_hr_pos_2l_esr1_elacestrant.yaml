rationale_ua: >
  Елацестрант (elacestrant) — пероральний селективний деградатор рецептора естрогенів (SERD) для
  ESR1-мутованого HR+/HER2- метастатичного раку молочної залози (РМЗ) після AI ± CDK4/6i.
  Дослідження EMERALD (фаза 3; ESR1-мутантна когорта): медіана ВБП 3.8 проти 1.9 міс. (HR 0.55);
  постхок аналіз: пацієнти після CDK4/6i ≥12 міс. — 8.6 проти 1.9 міс. Мутації ESR1 набуваються
  під час AI-терапії (~30-40% постАI метастатичного РМЗ) та передбачають резистентність до AI —
  тестування ctDNA при прогресуванні є оптимальним методом виявлення (субклональні, полікональні).
  Монотерапія елацестрантом. Пероральний прийом — перевага для пацієнтів без доступу до IV-режимів.
  Рецидивний/рефрактерний ESR1-мутований HR+/HER2- РМЗ після ендокринної терапії ± CDK4/6i.
  Підтримуюча терапія до прогресування. Перша лінія таргетної (targeted therapy) ендокринної терапії
  при ESR1-мутації. Первинна кінцева точка EMERALD: ВБП.
