notes: >
  ESCAT IA. EMERALD established elacestrant (oral SERD) for ESR1-mutant
  HR+/HER2- after AI ± CDK4/6i progression. ESR1 mutations are
  acquired on AI therapy (~30-40% of post-AI metastatic) and predict
  AI resistance — ctDNA testing at progression is the preferred
  detection method (subclonal, polyclonal in tissue). Modest absolute
  PFS gain in overall ESR1-mut cohort (3.8 vs 1.9 mo) but enriched
  in long-CDK4/6i-exposed subgroup. Other oral SERDs (camizestrant,
  giredestrant, imlunestrant) and PROTACs (vepdegestrant) in late
  development. UA access barrier: elacestrant not registered;
  named-patient import / EAP / cross-border only.
