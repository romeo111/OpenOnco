id: IND-BREAST-HR-POS-2L-FUL-EVEROLIMUS
plan_track: standard

applicable_to:
  disease_id: DIS-BREAST
  receptor_subtype: HR_POS_HER2_NEG
  stage_stratum: METASTATIC
  line_of_therapy: 2
  biomarker_requirements_required:
    - biomarker_id: BIO-ESTROGEN-RECEPTOR
      value_constraint: "positive"
      required: true
  biomarker_requirements_excluded:
    - biomarker_id: BIO-HER2-SOLID
      value_constraint: "positive"
      required: false
  demographic_constraints:
    ecog_max: 2
    progression_on_prior_endocrine_cdk46i: true

recommended_regimen: REG-FULVESTRANT-EVEROLIMUS-BREAST
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  median_progression_free_survival_months: 10
  notes: "BOLERO-2 (everolimus + exemestane): 10.6 vs 4.1 mo by central review (HR 0.36). PrECOG 0102 (everolimus + fulvestrant): 10.3 vs 5.1 mo."

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-BREAST-INFECTION-SCREENING
  - RF-BREAST-AKT1-E17K-CAPIVASERTIB-CANDIDATE
required_tests:
  - TEST-ER-PR-IHC
  - TEST-HER2-IHC-FISH
  - TEST-CECT-CAP
desired_tests:
  - TEST-PIK3CA-NGS  # to rule in/out alpelisib/capivasertib first

rationale_ua: >
  Еверолімус (everolimus) + фулвестрант (fulvestrant) — таргетна терапія (targeted therapy) mTOR
  інгібування для HR+/HER2- метастатичного раку молочної залози (РМЗ) за відсутності виявлених
  мутацій-мішеней (PIK3CA / AKT1 / PTEN не виявлені → без капіваседтинібу/алпелісибу; ESR1 не
  виявлений → без елацестранту). Дослідження BOLERO-2 (еверолімус + екземестан): медіана ВБП 10.6
  проти 4.1 міс. за центральним оглядом (HR 0.36). PrECOG 0102 (еверолімус + фулвестрант): медіана
  ВБП 10.3 проти 5.1 міс. Рецидивний/рефрактерний HR+/HER2- РМЗ після AI ± CDK4/6i. Монотерапія
  еверолімусом не застосовується при РМЗ — лише у комбінації з ендокринною терапією. Стандарт
  лікування (standard of care) за відсутності біомаркер-специфічних мішеней. Підтримуюча терапія
  до прогресування. Профіль токсичності: стоматит (домінуючий), пневмоніт, гіперглікемія.
  Первинна кінцева точка BOLERO-2: ВБП.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_06
draft_revision: 2

