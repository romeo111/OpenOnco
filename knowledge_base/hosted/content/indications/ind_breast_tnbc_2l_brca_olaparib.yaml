notes: >
  ESCAT IA. OlympiAD established olaparib for germline BRCA1/2-mutant
  HER2- metastatic breast (≤2 prior chemo lines for metastatic; HR+
  subset must have ≥1 prior endocrine line). For TNBC subset olaparib
  is typically ≥2L (after 1L pembro + chemo for PD-L1+ or chemo alone
  for PD-L1-). Talazoparib (EMBRACA) is the alternative PARPi —
  comparable efficacy, more anaemia, less GI. Patient preference and
  AE-profile drive olaparib-vs-talazoparib choice. UA access:
  olaparib reimbursed for breast indication; talazoparib not yet
  reimbursed.
