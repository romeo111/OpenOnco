rationale_ua: >
  Олапариб (olaparib) — пероральний PARP-інгібітор (PARPi) для гермінальних BRCA1/2-мутованих
  HER2- метастатичних ТНРМ (TNBC) після ≥2 попередніх ліній хіміотерапії (≥1 для метастатичного).
  Дослідження OlympiAD (фаза 3): медіана ВБП 7.0 проти 4.2 міс. (HR 0.58); ЧЗВ 60% проти 29%.
  Для TNBC-підгрупи олапариб є типово ≥2L (після 1L пембролізумаб (pembrolizumab) + хіміотерапія
  при PD-L1+ або лише хіміотерапія при PD-L1-). Монотерапія олапарибом. Рецидивний/рефрактерний
  gBRCA1/2-мутований HER2- РМЗ. Стандарт лікування (standard of care) при gBRCA-мутації.
  Підтримуюча терапія до прогресування. Талазопариб (talazoparib) є альтернативним PARPi:
  EMBRACA — подібна ефективність, більша анемія, менша ШКТ-токсичність. Перша лінія PARPi
  таргетної терапії при gBRCA-мутованому TNBC. Первинна кінцева точка OlympiAD: ВБП.
