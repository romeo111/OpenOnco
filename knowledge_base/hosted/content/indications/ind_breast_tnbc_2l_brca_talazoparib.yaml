  - TEST-HER2-IHC-FISH
  - TEST-GERMLINE-BRCA-PANEL
  - TEST-CECT-CAP
desired_tests: []

rationale_ua: >
  Талазопариб (talazoparib, 1 mg PO щодня) — пероральний PARP-інгібітор (PARPi) для gBRCA1/2-
  мутованого HER2- метастатичного TNBC після ≤3 попередніх цитотоксичних режимів. Дослідження EMBRACA
  (фаза 3): медіана ВБП 8.6 проти 5.6 міс. (HR 0.54); ЧЗВ 62.6% проти 27.2%. Порівнянна ефективність
  з олапарибом (olaparib; OlympiAD) — без прямого порівняння; профіль токсичності відрізняється:
  більше гематологічних ефектів (анемія G3+ ~39%), менше ШКТ. Монотерапія талазопарибом. Рецидивний/
  рефрактерний gBRCA1/2-мутований HER2- TNBC. Стандарт лікування (standard of care) при gBRCA-мутації.
  Підтримуюча терапія до прогресування. Вибір між олапарибом та талазопарибом визначається профілем
  токсичності та уподобаннями пацієнта. Перша лінія PARPi таргетної терапії при gBRCA-мутованому TNBC.
  Первинна кінцева точка EMBRACA: ВБП.
ukrainian_review_status: pending_clinical_signoff
