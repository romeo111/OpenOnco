id: IND-BREAST-TNBC-2L-SACITUZUMAB
plan_track: standard

applicable_to:
  disease_id: DIS-BREAST
  receptor_subtype: TNBC
  stage_stratum: METASTATIC
  line_of_therapy: 2
  biomarker_requirements_required: []
  biomarker_requirements_excluded:
    - biomarker_id: BIO-HER2-SOLID
      value_constraint: "positive"
      required: false
    - biomarker_id: BIO-ESTROGEN-RECEPTOR
      value_constraint: "positive"
      required: false
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-SACITUZUMAB
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  median_progression_free_survival_months: 6
  median_overall_survival_months: 12
  notes: "ASCENT brain-mets-negative cohort: PFS 5.6 vs 1.7 mo (HR 0.41), OS 12.1 vs 6.7 mo (HR 0.48), ORR 35% vs 5%."

hard_contraindications: []
