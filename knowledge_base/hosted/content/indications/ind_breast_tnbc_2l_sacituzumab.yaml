rationale_ua: >
  Сацітузумаб говітекан (sacituzumab govitecan) — анти-TROP2 ADC з пейлодом SN-38, стандарт
  лікування (standard of care) ≥2L метастатичного TNBC після ≥2 попередніх ліній хіміотерапії
  (≥1 для метастатичного захворювання). Дослідження ASCENT (мозково-безметастатична когорта):
  медіана ВБП 5.6 проти 1.7 міс. (HR 0.41); ЗВ 12.1 проти 6.7 міс. (HR 0.48); ЧЗВ 35% проти 5%.
  Тестування TROP2 не потребується — Trop-2 є універсальним маркером у TNBC. Важкий профіль
  побічних ефектів: нейтропенія G3+ 51% (рекомендована первинна профілактика Г-КСФ); діарея
  G3+ 10%. Гомозиготи UGT1A1*28 потребують редукції дози. За замовчуванням 2L для не-BRCA TNBC;
  за замовчуванням 3L для BRCA-мутованого TNBC після PARPi. Рецидивний/рефрактерний метастатичний
  TNBC. Монотерапія сацітузумабом. Підтримуюча терапія до прогресування. Первинна кінцева точка
  ASCENT: ВБП.
