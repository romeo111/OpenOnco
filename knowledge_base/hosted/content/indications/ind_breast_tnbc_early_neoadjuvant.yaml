notes: >
  Stage II-III TNBC standard. KEYNOTE-522 benefit independent of PD-L1
  status (early-disease setting, distinct from metastatic where PD-L1
  matters per KEYNOTE-355). Continuation: 9 additional pembro adjuvant
  cycles to complete ~1 year immunotherapy. BRCA+ residual disease:
  consider olaparib (OlympiA) — separate Indication.
