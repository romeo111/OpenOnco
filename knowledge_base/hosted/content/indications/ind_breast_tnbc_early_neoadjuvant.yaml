rationale_ua: >
  Пембролізумаб (pembrolizumab) + хіміотерапія неоад'ювантно з подальшим ад'ювантним пембролізумабом
  є стандартом лікування (standard of care) для стадій II-III метастатичного TNBC. Дослідження
  KEYNOTE-522 (фаза 3): частка патологічної повної відповіді (pCR) ~65%; 3-річна виживаність без подій
  (EFS) ~85%. Перевага пембролізумабу є незалежною від статусу PD-L1 (ранній рак — на відміну від
  метастатичного, де PD-L1 важливий за KEYNOTE-355). Продовження: 9 додаткових ад'ювантних циклів
  пембролізумабу для завершення ~1 року імунотерапії. Рецидивний/рефрактерний залишковий рак після
  неоад'юванту: розглянути олапариб (OlympiA) при BRCA-мутації — окреме показання. Перша лінія
  неоад'ювантного лікування HER2- TNBC стадій II-III. Монотерапія пембролізумабом не застосовується
  в цій ситуації — лише з хіміотерапевтичним каркасом. Підтримуюча терапія: ад'ювантний пембролізумаб
  до 1 року або прогресування. Первинна кінцева точка KEYNOTE-522: pCR + EFS.
