notes: >
  ATEZOLIZUMAB WARNING: Do NOT use atezolizumab+nab-paclitaxel for mTNBC.
  FDA withdrew the atezolizumab mTNBC indication August 2021 because
  IMPASSION131 (paclitaxel backbone) failed to confirm OS benefit from IMPASSION130
  (nab-paclitaxel backbone). The mechanism is that paclitaxel + nab-paclitaxel
  may have different immune interaction profiles. Any remaining KB entries
  referencing atezolizumab for mTNBC 1L are legacy/historical.

  SACITUZUMAB GOVITECAN in mTNBC 1L: ASCENT trial established sacituzumab as
  a standard-of-care option for 2L+ (≥2 prior lines), not currently 1L.
  TROPiCS-02 established 2L pembro-refractory setting.
  1L status for sacituzumab not yet established.
