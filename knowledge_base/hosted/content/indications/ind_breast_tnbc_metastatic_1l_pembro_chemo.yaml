rationale: >
  KEYNOTE-355 (Cortes 2020 Lancet, Cortes 2022 NEJM; n=847): pembrolizumab + nab-paclitaxel,
  paclitaxel, or gemcitabine-carboplatin vs placebo + chemo in 1L mTNBC.
  For PD-L1 CPS ≥10 (primary analysis population):
    ORR 53.2% vs 39.8%; mPFS 9.7 vs 5.6 months (HR 0.65, p<0.001);
    mOS 23.0 vs 16.1 months (HR 0.73, p=0.0185 — statistically significant).
  For CPS <10: OS HR 0.86 (not significant) — pembrolizumab should NOT be added.
  NCCN Category 1. FDA approved November 2020 (accelerated) / July 2021 (full) for CPS ≥10.
  NOTE: Atezolizumab+nab-paclitaxel (IMPASSION130) was FDA-approved in March 2019 but
  FDA withdrew atezolizumab mTNBC indication in August 2021 after IMPASSION131 failed
  to confirm OS benefit. Pembrolizumab (KEYNOTE-355) is the ONLY validated ICI in 1L mTNBC.

rationale_ua: >
  KEYNOTE-355 (n=847): пембролізумаб (pembrolizumab) + хіміотерапія (nab-паклітаксел,
  паклітаксел або гемцитабін-карбоплатин) проти плацебо + хіміотерапія при mTNBC 1L.
  Для PD-L1 CPS ≥10 (основна аналітична популяція): ЗЧВ 53.2% проти 39.8%; mPFS 9.7 проти
  5.6 міс. (HR 0.65, p<0.001); mOS 23.0 проти 16.1 міс. (HR 0.73, p=0.0185 —
  статистично значуще). При CPS <10: ЗВ HR 0.86 (не значуще) — пембролізумаб НЕ показаний.
  NCCN Категорія 1, схвалення FDA (повне — липень 2021) лише при CPS ≥10.
  ВАЖЛИВО: атезолізумаб (atezolizumab) + nab-паклітаксел (IMPASSION130) — FDA відкликала
  реєстрацію у серпні 2021 р. після того, як IMPASSION131 не підтвердив переваги ЗВ. Пембролізумаб
  (KEYNOTE-355) є єдиним валідованим ICI для mTNBC 1L. Необхідно перевірити BRCA1/2 перед
  призначенням — BRCA-мутовані пацієнти мають кращу відповідь на PARPi.
