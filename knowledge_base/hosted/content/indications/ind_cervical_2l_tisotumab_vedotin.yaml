notes: >
  STUB — pending Clinical Co-Lead sign-off. Aggressive-track 2L+ for
  recurrent / metastatic cervical carcinoma post-platinum. NCCN-
  Cervical 2025 cat 1 / preferred; ESMO-Cervical 2024 recommended.
  FDA accelerated Sep 2021 (innovaTV 204) → full approval Apr 2024
  (innovaTV 301 confirmatory). No biomarker prerequisite — TF broadly
  expressed on cervical carcinoma. Missing trial-level source IDs to
  flag for follow-up: SRC-INNOVATV-204 (Coleman Lancet Oncol 2021,
  PMID 33845034), SRC-INNOVATV-301 (Vergote NEJM 2024, PMID 39413376),
  SRC-FDA-TIVDAK — not yet authored in this KB; citation provisionally
  via SRC-NCCN-CERVICAL-2025 + SRC-ESMO-CERVICAL-2024 until
  trial-level sources added. UA access: named-patient pathway only.
