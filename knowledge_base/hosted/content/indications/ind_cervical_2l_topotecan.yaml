  STUB — pending Clinical Co-Lead sign-off. Standard-track 2L option for r/r cervical
  cancer when tisotumab vedotin inaccessible. Reuses REG-TOPOTECAN-SCLC-RR (identical
  1.5 mg/m²/d × 5d q21d dosing; cervical cancer same dosing as SCLC/ovarian).
  Alternative single agents (vinorelbine, gemcitabine, irinotecan, pemetrexed) all
  acceptable per NCCN Cat 1 (innovaTV 301 comparator arm). Authored 2026-05-04
  (Workstream DE).
