id: IND-CHL-1L-A-AVD
plan_track: aggressive

applicable_to:
  disease_id: DIS-CHL
  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required:
    - biomarker_id: BIO-HBV-STATUS
      required: true
      value_constraint: "any value valid (categorical etiology gate; HBsAg+ or anti-HBc+ → entecavir prophylaxis before brentuximab; anti-CD30 ADC has documented HBV reactivation risk; continue ≥12 mo post-BV)"
    - biomarker_id: BIO-HIV-STATUS
      required: true
      value_constraint: "any value valid (categorical etiology gate; HIV+ → A+AVD acceptable with cART; integrase-inhibitor backbone preferred; PJP prophylaxis throughout)"
  biomarker_requirements_excluded: []
  demographic_constraints: {ecog_max: 2}

recommended_regimen: REG-A-AVD
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate:
    value: "~96%"
    source: SRC-ECHELON-1-CONNORS-2018
    notes: "ECHELON-1 (Connors 2018 NEJM): A+AVD vs ABVD 1L advanced cHL; ORR 96% A+AVD arm"
  complete_response:
    value: "~85%"
    source: SRC-ECHELON-1-CONNORS-2018
    notes: "ECHELON-1: CR ~85% A+AVD; 6-yr follow-up confirms sustained benefit"
  progression_free_survival: "6y PFS ~83% (ECHELON-1 advanced cHL)"
  overall_survival_5y: "~93% (ECHELON-1 OS HR 0.59 vs ABVD)"

hard_contraindications: [CI-LVEF-LOW-FOR-ANTHRACYCLINE, CI-BORTEZOMIB-SEVERE-NEUROPATHY, CI-HBV-NO-PROPHYLAXIS]
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-PET-CT
  - TEST-LN-EXCISIONAL-BIOPSY
  - TEST-ECHO
  - TEST-PREGNANCY
  - TEST-HBV-SEROLOGY
  - TEST-HIV-SEROLOGY
desired_tests: []

rationale: >
  A+AVD is preferred 1L for advanced cHL per ECHELON-1 — brentuximab
  REPLACES bleomycin (eliminating BPT risk). Superior OS at 6-year
  follow-up. Mandatory G-CSF support (vs ABVD where G-CSF AVOIDED for
  bleomycin reasons). Funding pathway critical in Ukraine (brentuximab
  not НСЗУ-reimbursed).

rationale_ua: >
  A+AVD is переважний 1L for поширений cHL per ECHELON-1 — brentuximab REPLACES bleomycin (eliminating BPT risk). перевершує OS at 6-year спостереження. обов'язковий Г-КСФ support (vs ABVD where Г-КСФ AVOIDED for bleomycin reasons). Funding pathway critical in Ukraine (brentuximab not НСЗУ-відшкодовуваний).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources: [{source_id: SRC-NCCN-BCELL-2025, position: supports}, {source_id: SRC-ECHELON-1-CONNORS-2018, position: supports, relevant_quote_paraphrase: ECHELON-1 trial — see referenced publication for primary outcome data.}]
known_controversies: []

do_not_do:
  - "НЕ комбінувати brentuximab з bleomycin — ABSOLUTE; lethality risk."
  - "НЕ пропускати G-CSF support — neutropenia з brentuximab + анти-mitotic вища."
  - "НЕ ігнорувати pre-existing peripheral neuropathy — Grade ≥2 = absolute CI."
  - "НЕ призначати без verifiedного funding pathway — brentuximab не НСЗУ-reimbursed."
  - "НЕ починати brentuximab без HBV скринінгу + entecavir prophylaxis при HBsAg+ або anti-HBc+ — anti-CD30 ADC має документований HBV reactivation risk; продовжувати ≥12 міс після останньої дози BV."
  - "НЕ переривати ART у HIV+ — A+AVD акцептабельний з ART; інтегразний backbone preferred (vincristine-PI interaction); PJP prophylaxis throughout."

do_not_do_en:
  - "Do NOT combine brentuximab with bleomycin — ABSOLUTE; lethality risk."
  - "Do NOT skip G-CSF support — neutropenia with brentuximab + anti-mitotic is higher."
  - "Do NOT ignore pre-existing peripheral neuropathy — Grade ≥2 = absolute CI."
  - "Do NOT prescribe without a verified funding pathway — brentuximab is not NSZU-reimbursed."
  - "Do NOT start brentuximab without HBV screening + entecavir prophylaxis if HBsAg+ or anti-HBc+ — anti-CD30 ADC has documented HBV reactivation risk; continue ≥12 mo after last BV dose."
  - "Do NOT interrupt ART in HIV+ — A+AVD is acceptable with ART; integrase backbone preferred (vincristine-PI interaction); PJP prophylaxis throughout."
time_critical: false
last_reviewed: "2026-04-27"
reviewer_signoffs: 0
notes: STUB.
