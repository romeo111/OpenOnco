do_not_do:
  - "НЕ проводити мобілізацію CD34+ стовбурових клітин під час BV-циклу — MMAE пошкоджує CD34+ клітини-попередники"
  - "Не призначати BV при накопиченій дозі >6 циклів з нейропатією ≥2 ст. — кумулятивна MMAE нейротоксичність"
  - "Реактивація гепатиту B: перевірити HBsAg та anti-HBc перед BV; ентекавір при HBsAg+"
  - "ASCT-непридатним пацієнтам: не призначати BV+бендамустин як самостійне лікування (не курс на ремісію) — перейти на пембролізумаб"
  - "ПЕТ після 2 циклів обов'язкова: Deauville 4-5 → переглянути план (інтенсифікація або алоТГСК)"
  - "При первинній рефрактерності: BV-Benda переважніше ICE (~91% vs ~42% ORR)"

