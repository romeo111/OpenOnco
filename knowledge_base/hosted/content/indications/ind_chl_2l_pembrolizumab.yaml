rationale: >
  Pembrolizumab monotherapy for r/r cHL after BV failure (KEYNOTE-204
  registration) per FDA approval. cHL has high PD-L1 expression
  (9p24.1 amplification leading to constitutive PD-L1 expression
  on Reed-Sternberg cells) → strong checkpoint responses. Per
  KEYNOTE-204: mPFS 13.2 vs BV 8.3 mo (HR 0.65), CR rate 24.5%.
  Particularly useful as bridge to alloSCT in fit transplant-eligible
  responders. Continuous IV q3w treatment until progression or
  unacceptable toxicity (typical max ~2 years / 35 cycles per
  KEYNOTE-204 protocol). Both pembrolizumab and nivolumab are
  acceptable PD-1 inhibitors for r/r cHL — choice based on access
  + clinical experience.

rationale_ua: >
  Пембролізумаб (pembrolizumab) у монотерапії для рецидивної/рефрактерної (р/р) cHL після
  невдачі брентуксимабу (brentuximab) (реєстраційне дослідження KEYNOTE-204) за схваленням
  FDA. cHL має високу PD-L1 експресію (ампліфікація 9p24.1 призводить до конститутивної
  PD-L1 експресії на клітинах Ріда-Штернберга) → сильні відповіді на блокаду чекпоінтів.
  За KEYNOTE-204: mPFS 13.2 проти BV 8.3 міс. (HR 0.65), CR 24.5%. Особливо корисний
  як міст до алоТГСК у придатних до трансплантації пацієнтів з відповіддю. Обидва
  пембролізумаб та ніволумаб (nivolumab) є прийнятними інгібіторами PD-1 для р/р cHL
  — вибір залежить від доступності. В Україні off-label для cHL — фінансування через
  інституційне клопотання.
