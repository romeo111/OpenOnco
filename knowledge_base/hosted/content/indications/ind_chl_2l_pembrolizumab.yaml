known_controversies:
  - topic: "Pembrolizumab vs nivolumab for r/r cHL"
    positions:
      - position: "Pembrolizumab — KEYNOTE-204 head-to-head data vs BV"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Nivolumab — earlier CheckMate-205 data, longer follow-up; potentially shorter infusion time"
        sources: [SRC-NCCN-BCELL-2025]
    our_default: "Either acceptable; access dictates in UA"
  - topic: "Optimal duration of PD-1 therapy for r/r cHL responders"
    positions:
      - position: "Continue ≤2 years per KEYNOTE-204 protocol; surveillance after"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Continue until progression — durable responses depend on continued therapy in some patients"
        sources: [SRC-NCCN-BCELL-2025]
    our_default: "≤2 years per protocol unless ongoing PR with toxicity acceptable"

do_not_do:
  - "НЕ призначати при active autoimmune disease (CI-PEMBROLIZUMAB-AUTOIMMUNE) — risk of severe irAE flare."
  - "НЕ призначати при solid-organ transplant — risk of acute graft rejection from PD-1 blockade."
  - "НЕ ігнорувати baseline thyroid function + cortisol + glucose — endocrine irAE common."
  - "НЕ ігнорувати new pneumonitis-suspect symptoms (cough, dyspnea) — HRCT immediately; pneumonitis is most-feared irAE."
  - "НЕ припиняти при Grade 1 endocrinopathy — replacement therapy + continue treatment."
  - "НЕ ігнорувати myocarditis-suspect symptoms (chest pain, dyspnea, troponin rise) — discontinue + emergent cardiology."
  - "НЕ забути плану до alloSCT consolidation в fit transplant-eligible responders — PD-1 monotherapy не куративна, durable PR + bridge to SCT."
  - "НЕ передбачати alloSCT immediately after PD-1 termination — pembrolizumab impacts on post-allo GVHD risk; ≥4 weeks washout + careful conditioning regimen selection."
  - "НЕ призначати без funding pathway clarification — pembrolizumab off-label для cHL в UA."

do_not_do_en:
  - "Do NOT prescribe in active autoimmune disease (CI-PEMBROLIZUMAB-AUTOIMMUNE) — risk of severe irAE flare."
  - "Do NOT prescribe in solid-organ transplant — risk of acute graft rejection from PD-1 blockade."
  - "Do NOT ignore baseline thyroid function + cortisol + glucose — endocrine irAE common."
  - "Do NOT ignore new pneumonitis-suspect symptoms (cough, dyspnea) — HRCT immediately; pneumonitis is most-feared irAE."
  - "Do NOT discontinue for Grade 1 endocrinopathy — replacement therapy + continue treatment."
  - "Do NOT ignore myocarditis-suspect symptoms (chest pain, dyspnea, troponin rise) — discontinue + emergent cardiology."
  - "Do NOT forget the plan toward alloSCT consolidation in fit transplant-eligible responders — PD-1 monotherapy is not curative, durable PR + bridge to SCT."
  - "Do NOT plan alloSCT immediately after PD-1 termination — pembrolizumab impacts on post-allo GVHD risk; ≥4 weeks washout + careful conditioning regimen selection."
  - "Do NOT prescribe without funding pathway clarification — pembrolizumab off-label for cHL in UA."
