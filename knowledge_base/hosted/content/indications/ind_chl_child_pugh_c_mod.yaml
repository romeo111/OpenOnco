sources:
- source_id: SRC-NCCN-BCELL-2025
  position: supports
  relevant_quote_paraphrase: For CHL with severe hepatic impairment, bleomycin and dacarbazine should be
    held; doxorubicin + vinblastine dose-reduced per bilirubin; brentuximab vedotin contraindicated for
    Child-Pugh B-C
- source_id: SRC-ESMO-LYMPHOMA-2025
  position: supports
  relevant_quote_paraphrase: Severe hepatic impairment in CHL requires individualized dose modification of
    ABVD with hold of bleomycin / DTIC; hepatology consultation mandatory
known_controversies:
- topic: Dose-modified A-V vs deferred treatment vs reduced-intensity protocol for CHL + Child-Pugh C
  positions:
  - position: Dose-modified A-V — preserves curative intent
    sources:
    - SRC-NCCN-BCELL-2025
  - position: Deferred treatment until hepatic recovery (if reversible cause) — full ABVD becomes feasible
    sources:
    - SRC-ESMO-LYMPHOMA-2025
    evidence_note: HCV cure, alcohol abstinence, HBV suppression may reverse Child-Pugh C to A-B over weeks
      to months
  our_default: Defer treatment if hepatic dysfunction reversible cause + low disease burden; dose-modified
    A-V if treatment cannot be deferred
  rationale: Curative intent preserved better with full ABVD post-hepatic recovery; modification carries
    higher relapse risk
do_not_do:
- НЕ використовувати bleomycin при Child-Pugh C — pulmonary toxicity ризик amplified без compensatory mechanisms.
- НЕ використовувати dacarbazine при severe hepatic impairment — FDA contraindication; veno-occlusive disease
  risk.
- НЕ використовувати full-dose doxorubicin при bilirubin >3 × ULN — кардіо- + гепатотоксичність amplified.
- НЕ використовувати brentuximab vedotin при Child-Pugh B-C — substantial dose reduction або contraindication.
- НЕ забути hepatology консультацію — reversible causes (HCV, HBV, alcohol) можуть бути reversed для full
  treatment.
- НЕ ігнорувати ascites / coagulopathy — варіантне ризик при будь-яких procedure (LN biopsy, central line).
- НЕ продовжувати при rapid hepatic decompensation — chemo hold + supportive care.
do_not_do_en:
  - "Do NOT use bleomycin in Child-Pugh C — pulmonary toxicity risk amplified without compensatory mechanisms."
  - "Do NOT use dacarbazine in severe hepatic impairment — FDA contraindication; veno-occlusive disease risk."
  - "Do NOT use full-dose doxorubicin if bilirubin >3 × ULN — cardio- + hepatotoxicity amplified."
  - "Do NOT use brentuximab vedotin in Child-Pugh B-C — substantial dose reduction or contraindication."
  - "Do NOT forget hepatology consultation — reversible causes (HCV, HBV, alcohol) may be reversed for full treatment."
  - "Do NOT ignore ascites / coagulopathy — variant risk with any procedure (LN biopsy, central line)."
  - "Do NOT continue with rapid hepatic decompensation — chemo hold + supportive care."
