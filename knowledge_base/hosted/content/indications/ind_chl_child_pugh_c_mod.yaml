rationale: 'In CHL patients with severe hepatic impairment (Child-Pugh C, bilirubin >3 × ULN), ABVD modifications:
  (1) DOXORUBICIN: reduce dose by 50% for bilirubin 1.5-3 × ULN; reduce 75% (or omit) for bilirubin >3
  × ULN; substitute with idarubicin or omit anthracycline if Child-Pugh C — substantial extra-hepatic
  hepatotoxicity risk. (2) VINBLASTINE: reduce dose by 50% for bilirubin 1.5-3 × ULN; omit for bilirubin
  >3 × ULN. (3) BLEOMYCIN: HOLD — pulmonary toxicity risk amplified by hepatic dysfunction; substitute
  with AVD (omit bleomycin entirely). (4) DACARBAZINE (DTIC): HOLD — hepatic activation required; omitted
  (also CONTRAINDICATED per FDA label in severe hepatic impairment for veno-occlusive disease risk). Resulting
  regimen: dose-modified A-V (doxorubicin + vinblastine, both reduced); add prednisone or cyclophosphamide
  for adequate disease control. Brentuximab vedotin (BV) is METABOLIZED via CYP3A4 + hepatic clearance
  — Child-Pugh B-C contraindication or substantial dose reduction. Pembrolizumab is renally cleared (no
  hepatic adjustment) but immune hepatitis risk is amplified in baseline hepatic dysfunction. Multidisciplinary
  hepatology + transplant evaluation may shift management to deferral if hepatic decompensation reversible
  (HCV cure, alcohol abstinence, viral suppression). STUB regimen — no dedicated REG- entity for hepatic-modified
  ABVD yet; flagged for REG follow-up.'
rationale_ua: >
  При cHL у пацієнтів із тяжкою печінковою недостатністю (Child-Pugh C, білірубін >3× ВМН)
  модифікації ABVD: (1) ДОКСОРУБІЦИН: зниження дози на 50% при білірубіні 1.5–3× ВМН;
  75% (або скасування) при >3× ВМН. (2) ВІНБЛАСТИН: зниження на 50% при 1.5–3× ВМН;
  скасування при >3× ВМН. (3) БЛЕОМІЦИН: УТРИМАТИ — легенева токсичність посилена без
  печінкової компенсації; замінити на AVD. (4) ДАКАРБАЗИН (DTIC): УТРИМАТИ — потребує
  печінкової активації; скасувати (також ПРОТИПОКАЗАНИЙ за FDA при тяжкій печінковій
  недостатності). Результуючий режим: модифіковане A-V (доксорубіцин + вінбластин, обидва
  знижені) + преднізон або циклофосфамід для адекватного контролю захворювання.
  Брентуксимаб ведотин (brentuximab vedotin) метаболізується через CYP3A4 + печінковий
  кліренс — Child-Pugh B-C є протипоказанням або потребує суттєвої редукції дози.
  Пембролізумаб (pembrolizumab) виводиться нирками (без печінкової корекції), однак
  ризик імунного гепатиту посилений при вихідній дисфункції печінки.
  Мультидисциплінарна консультація гепатолога є обов'язковою — оборотні причини (ВГС,
  ВГВ, алкоголь) можуть бути усунені для відновлення повного ABVD.

