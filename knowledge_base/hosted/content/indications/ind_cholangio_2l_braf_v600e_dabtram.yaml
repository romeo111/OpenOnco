sources:
  - source_id: SRC-NCCN-HEPATOBILIARY
    position: supports
    relevant_quote_paraphrase: >
      NCCN Hepatobiliary 2025 Category 2A: dabrafenib + trametinib for BRAF V600E-mutant
      previously-treated biliary tract cancer (ROAR basket; Subbiah 2020 JCO; ORR 51%
      CCA cohort; single-arm Phase 2).
  - source_id: SRC-ESMO-BTC-2023
    position: supports
    relevant_quote_paraphrase: >
      ESMO BTC 2023: dabrafenib + trametinib recommended for BRAF V600E-mutant BTC;
      molecular profiling mandatory for all patients at 2L.

do_not_do:
  - "Без підтвердження BRAF V600E: дабрафеніб+траметиніб неактивні при BRAF-WT; молекулярний скринінг спочатку"
  - "Монотерапія BRAF-інгібітором (без MEKi): парадоксальна активація RAF → гірший результат; комбінація ОБОВ'ЯЗКОВА"
  - "Без ЕхоКГ: траметиніб → кардіоміопатія; ФВЛШ вихідна + q3 міс"
  - "При FGFR2-злитті або IDH1-мутації: ці цілі мають пріоритет (NCCN Cat 1 vs Cat 2A для BRAF)"
  - "Пірексія без протоколу: ~50% пацієнтів мають пропасницю; навчання + ацетамінофен протокол до початку"

