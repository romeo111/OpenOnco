id: IND-CHOLANGIO-2L-INFIGRATINIB
plan_track: aggressive

applicable_to:
  disease_id: DIS-CHOLANGIOCARCINOMA
  line_of_therapy: 2
  stage_requirements:
    - "Locally advanced unresectable or metastatic intrahepatic cholangiocarcinoma"
    - "Disease progression on ≥1 prior systemic therapy (typically gem+cis ± durvalumab 1L)"
    - "HISTORICAL — drug WITHDRAWN voluntarily Aug-Sep 2022 (Helsinn / QED Therapeutics commercial discontinuation; not a safety withdrawal); no new patients"
  biomarker_requirements_required:
    - biomarker_id: BIO-FGFR2
      required: true
      value_constraint: "FGFR2 fusion or rearrangement positive (RNA-NGS preferred; DNA-NGS fusion-aware OR FISH break-apart acceptable)"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-INFIGRATINIB-CHOLANGIO-2L
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~23.1% (CBGJ398X2204 cohort; 25/108 confirmed responders)"
  progression_free_survival: "Median PFS 7.3 mo (CBGJ398X2204)"
  overall_survival_5y: "Median OS 12.2 mo (CBGJ398X2204)"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-CHOLANGIOCARCINOMA-FRAILTY-AGE
  - RF-CHOLANGIOCARCINOMA-ORGAN-DYSFUNCTION

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-CT-CHEST-ABDOMEN-PELVIS
desired_tests:
  - TEST-NGS-COMPREHENSIVE

rationale: >
  HISTORICAL indication — infigratinib (Truseltiq, BGJ398) was the
  first FGFR-TKI granted FDA accelerated approval (May 2021) for
  FGFR2-fusion / rearrangement advanced cholangiocarcinoma post ≥1
  prior systemic line on the basis of CBGJ398X2204 (Javle JCO 2018
  + Lancet Gastroenterol Hepatol 2021): ORR 23.1%, mPFS 7.3 mo,
  mOS 12.2 mo. Drug VOLUNTARILY WITHDRAWN by Helsinn / QED Therapeutics
  Aug-Sep 2022 (US + EU) — commercial reasons, NOT safety. Subsequent
  FGFR-TKIs (pemigatinib FIGHT-202, futibatinib FOENIX-CCA2) replaced
  infigratinib in NCCN / ESMO guidance. KB retains this indication
  for: (1) interpreting clinical history of patients treated pre-2022;
  (2) understanding the FGFR-TKI class evolution (CBGJ398X2204 was
  the pivotal trial that established the FGFR2-fusion CCA paradigm);
  (3) comparator-trial completeness. RENDER LAYER MUST NOT surface
  this indication as an active recommendation for new patients —
  use IND-CHOLANGIO-2L-FGFR2-FUSION-PEMIGATINIB or
  IND-CHOLANGIO-2L-FUTIBATINIB instead.

sources:
  - source_id: SRC-NCCN-HEPATOBILIARY
    position: supports
    relevant_quote_paraphrase: "Infigratinib granted accelerated approval May 2021 for FGFR2-fusion CCA post ≥1L (CBGJ398X2204); voluntarily withdrawn Aug-Sep 2022; pemigatinib and futibatinib remain available FGFR-TKI options"
  - source_id: SRC-ESMO-BTC-2023
    position: supports
    relevant_quote_paraphrase: "Infigratinib historically a 2L option for FGFR2-fusion advanced biliary tract cancer; commercial supply ceased 2022; pemigatinib or futibatinib are the recommended FGFR-TKIs as of 2023 guideline"

known_controversies: []

do_not_do:
  - "НЕ призначати infigratinib новим пацієнтам — препарат ВІДКЛИКАНО з ринку 2022 (Helsinn / QED Therapeutics, комерційні причини); постачання припинено."
  - "НЕ використовувати цю indication як активну рекомендацію — render layer повинен позначати її як HISTORICAL."
  - "Для нових пацієнтів з FGFR2-fusion CCA 2L+ використовувати IND-CHOLANGIO-2L-FGFR2-FUSION-PEMIGATINIB або IND-CHOLANGIO-2L-FUTIBATINIB."
  - "НЕ призначати без RNA-NGS / DNA-NGS fusion-aware / FISH break-apart підтвердження FGFR2 fusion — амплифікація сама по собі недостатня."
  - "НЕ ігнорувати клас-токсичність FGFR-TKI (гіперфосфатемія, серозна ретинопатія) при інтерпретації pre-2022 анамнезу."

time_critical: false
last_reviewed: "2026-04-29"
reviewers: []
