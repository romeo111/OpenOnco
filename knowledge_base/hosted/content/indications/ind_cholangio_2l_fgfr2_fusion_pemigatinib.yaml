rationale: >
  Pemigatinib for FGFR2-fusion / rearrangement advanced
  cholangiocarcinoma post ≥1 prior systemic line — ORR 35.5%, mPFS
  6.9 mo, mOS 21.1 mo (FIGHT-202). FDA accelerated approval Apr 2020;
  traditional approval after FIGHT-302 confirmatory data. FGFR2
  fusion ~10–20% of intrahepatic CCA; targetable signal with durable
  responses in a disease with poor prognosis post chemotherapy
  failure. Class FGFR-TKI toxicity (hyperphosphatemia, serous
  retinopathy) requires dedicated supportive-care protocol. UA access
  barrier: pemigatinib not registered (named-patient / EAP only).
  Alternative: futibatinib (FOENIX-CCA2 ORR 42%; covalent FGFR-TKI
  active against some pemigatinib-resistance variants) where
  available; also not registered in UA.

rationale_ua: >
  Пеміготиніб (pemigatinib) — зворотний FGFR1-3 TKI, перший у класі схвалений FDA (квітень 2020)
  для прогресуючої холангіокарциноми з FGFR2-злиттям (fusion) або перебудовою після >= 1
  попередньої хіміотерапії (chemotherapy). Дослідження FIGHT-202 (Abou-Alfa et al., Lancet Oncol
  2020, n=107 когорта A): ЧЗВ 35.5%, медіана ВБП 6.9 міс., медіана ЗВ 21.1 міс. — найдовше
  спостереження серед FGFR-TKI у цій популяції. FGFR2-злиття (fusion) зустрічається у ~10-20%
  інтрапечінкових CCA; тестування RNA-NGS або DNA-NGS fusion-aware є обовязковим.
  Класова токсичність FGFR-TKI: гіперфосфатемія, серозна ретинопатія (потрібен базовий
  офтальмологічний огляд + дієтичне обмеження фосфату + моніторинг). Рекомендований алгоритм:
  пеміготиніб є стандартом 2L для FGFR2-fusion CCA (традиційна реєстрація + найдовше
  спостереження); футибатиніб (FOENIX-CCA2 ЧЗВ ~42%) — при резистентності або при
  недоступності пеміготинібу. Барєр доступу в Україні: препарат не зареєстрований
  (лише named-patient або EAP).
