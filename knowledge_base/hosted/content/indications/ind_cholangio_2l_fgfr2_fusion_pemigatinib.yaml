sources:
  - source_id: SRC-NCCN-HEPATOBILIARY
    position: supports
    relevant_quote_paraphrase: "Pemigatinib is a recommended option for FGFR2-fusion / rearrangement advanced cholangiocarcinoma post ≥1 prior line (FIGHT-202); FDA-approved Apr 2020"
  - source_id: SRC-ESMO-BTC-2023
    position: supports
    relevant_quote_paraphrase: "FGFR2 fusion testing recommended in advanced biliary tract cancer; pemigatinib or futibatinib is the standard 2L option upon FGFR2-fusion confirmation"
  - source_id: SRC-FIGHT-202
    position: supports
    relevant_quote_paraphrase: "FIGHT-202 cohort A (FGFR2 fusion/rearrangement, n=107): pemigatinib 13.5 mg PO daily 14 on/7 off; ORR 35.5%, mPFS 6.9 mo, mOS 21.1 mo"

known_controversies:
  - topic: "Pemigatinib vs futibatinib for FGFR2-fusion CCA 2L"
    positions:
      - position: "Pemigatinib: first-approved (Apr 2020), longest follow-up; reversible inhibitor; mature mOS 21.1 mo (FIGHT-202)"
        sources: [SRC-NCCN-HEPATOBILIARY]
      - position: "Futibatinib: covalent irreversible FGFR1-4 TKI; FOENIX-CCA2 ORR 42%; retains activity vs some pemigatinib-resistance variants (gatekeeper, molecular-brake)"
        sources: [SRC-NCCN-HEPATOBILIARY]
        evidence_note: "No head-to-head; futibatinib preferred when pemigatinib resistance documented; choice often by access"
    our_default: "Pemigatinib as default 2L FGFR2-fusion CCA; futibatinib reserved for pemigatinib-resistance / progression"
    rationale: "Longer follow-up + traditional approval favor pemigatinib first-line of FGFR-TKI sequence; futibatinib retains activity against pemigatinib-resistance variants"

do_not_do:
  - "НЕ призначати без RNA-NGS (або DNA-NGS fusion-aware / FISH break-apart) підтвердження FGFR2 fusion — амплифікація сама по собі недостатня для цього показання."
  - "НЕ розпочинати без baseline офтальмологічного огляду — серозна ретинопатія / RPE detachment — класова токсичність."
  - "НЕ ігнорувати моніторинг фосфату — гіперфосфатемія потребує дієти + sevelamer; затримка / зниження дози при >7 мг/дл."
  - "НЕ комбінувати з потужними CYP3A4 індукторами — експозиція pemigatinib різко знижується."
  - "НЕ підтверджувати план без funding pathway — pemigatinib не зареєстрований в UA."

do_not_do_en:
  - "Do NOT prescribe without RNA-NGS (or DNA-NGS fusion-aware / FISH break-apart) confirmation of FGFR2 fusion — amplification alone is insufficient for this indication."
  - "Do NOT start without baseline ophthalmologic exam — serous retinopathy / RPE detachment — class toxicity."
  - "Do NOT ignore phosphate monitoring — hyperphosphatemia requires diet + sevelamer; delay / dose reduction at >7 mg/dL."
  - "Do NOT combine with strong CYP3A4 inducers — pemigatinib exposure is sharply reduced."
  - "Do NOT confirm the plan without funding pathway — pemigatinib not registered in UA."
