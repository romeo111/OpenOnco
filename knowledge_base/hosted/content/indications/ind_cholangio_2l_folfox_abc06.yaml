do_not_do:
  - "Починати FOLFOX без молекулярного профілювання: FGFR2/IDH1/BRAF/HER2/MSI/NTRK скрин обов'язковий — ORR при цільовій терапії 20-36% vs 5% FOLFOX"
  - "При білірубіні >3× ВМН: дренування жовчних шляхів спочатку (стент ERCP або ПТД); лише потім FOLFOX — гепатотоксичність при обструкції значно вища"
  - "Нейропатія ≥2 ступеня до лікування: оксаліплатин абсолютно протипоказаний; замінити на FOLFIRI або 5-ФУ/ФА"
  - "Холодне питво/їжа 3-5 днів після оксаліплатину: холод-індукована нейропатія — рукавички, тепла їжа; попередити пацієнта"
  - "FGFR2 злиття підтверджено: пемігатиніб переважає FOLFOX (ORR 36% vs 5%); не давати FOLFOX як основне лікування"

