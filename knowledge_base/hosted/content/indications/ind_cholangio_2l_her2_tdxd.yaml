      NCCN Hepatobiliary 2025 Category 2A: trastuzumab deruxtecan (T-DXd) 5.4 mg/kg IV
      q21d for HER2-overexpressing (IHC 3+ or IHC 2+/ISH+) relapsed/refractory BTC
      (DESTINY-PanTumor02; Shitara 2023 NEJM; BTC cohort ORR 36.4%).
  - source_id: SRC-ESMO-BTC-2023
    position: supports
    relevant_quote_paraphrase: >
      ESMO BTC 2023: HER2-targeted therapy (T-DXd) recommended for HER2+ R/R BTC;
      mandatory HER2 IHC testing at relapse; ILD monitoring mandatory with T-DXd.

do_not_do:
  - "Без HER2 IHC тестування: T-DXd вимагає HER2-мішені; тестування обов'язкове до початку"
  - "При ILD grade ≥2 в анамнезі або активному ILD: T-DXd абсолютно протипоказаний (ризик летальної пневмонії)"
  - "Без базового КТ грудної клітки: ILD може бути асимптомним; КТ до початку T-DXd ОБОВ'ЯЗКОВЕ"
  - "Без профілю молекулярних маркерів: FGFR2/IDH1/BRAF/MSI повинні бути виключені ПЕРЕД призначенням T-DXd — пацієнти з FGFR2/IDH1 отримують Cat 1 препарати"
  - "Після невдачі T-DXd: повторне лікування не валідоване; переходити на FOLFOX або клінічне дослідження"

