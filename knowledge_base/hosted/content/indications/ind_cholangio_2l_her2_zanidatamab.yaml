  - TEST-CT-CHEST-ABDOMEN-PELVIS
desired_tests:
  - TEST-NGS-COMPREHENSIVE

rationale: >
  Zanidatamab (HER2-targeted biparatopic bispecific antibody binding
  HER2 ECD2 + ECD4) for HER2-amplified (IHC 3+ or IHC 2+/ISH+)
  unresectable / locally advanced / metastatic biliary tract cancer
  post ≥1 prior systemic line — confirmed ORR 41.3% (95% CI 30.4-52.8),
  median DoR 14.9 mo, DCR 68.8% in HERIZON-BTC-01 (Harding Lancet Oncol
  2023; n=87 cohort 1). FDA accelerated approval November 2024 for
  HER2-positive (IHC 3+) BTC ≥2L. NCCN category 2A. ESCAT tier IIA
  (FDA-approved disease-specific). HER2 amplification ~5-15% of BTC
  overall (higher in gallbladder + extrahepatic CCA; lower in
  intrahepatic CCA). Single-arm phase 2b — evidence tier 2 / moderate;
  conditional recommendation reflects accelerated approval status
  pending confirmatory data. Class HER2-targeted toxicity profile —
  ~40% any-grade diarrhea (antidiarrheal prophylaxis advised), ~33%
  infusion reactions (premedication + slow first infusion), cardiac
  surveillance per HER2-targeted class. UA access barrier: zanidatamab
  not registered (named-patient / EAP only as of 2026-05).

rationale_ua: >
  Занідатамаб (zanidatamab) — біпаратопне біспецифічне антитіло до HER2 (зв'язування ECD2 +
  ECD4) для HER2-позитивного (IHC 3+ або IHC 2+/ISH+) нерезектабельного/метастатичного раку
  жовчних шляхів (BTC) після >= 1 попередньої системної лінії.
  Дослідження HERIZON-BTC-01 (Harding et al., Lancet Oncol 2023, фаза 2 (phase 2), когорта 1,
  n=87): підтверджена ЧЗВ 41.3% (95% ДІ 30.4-52.8%), DCR 68.8%, медіана тривалості відповіді
  14.9 міс., медіана ЗВ 15.5 міс. Схвалений FDA (fda-approved) у листопаді 2024 для
  HER2-позитивного (IHC 3+) BTC >= 2L; NCCN категорія 2A. HER2-ампліфікація зустрічається у
  ~5-15% BTC (вища частота при раку жовчного міхура та екстрапечінковій CCA; нижча при
  інтрапечінковій CCA; FGFR2 злиття (fusion) є взаємовиключним з HER2-ампліфікацією).
  Клас-токсичність HER2-таргетної терапії: діарея (~40% будь-якого ступеня, профілактика
  лоперамідом), інфузійні реакції (~33%, премедикація + повільна перша інфузія), кардіальний
  нагляд (LVEF моніторинг). Занідатамаб є стандартом 2L+ при підтвердженій HER2-ампліфікації;
  трастузумаб + пертузумаб (off-label, MyPathway ЧЗВ ~23%) — альтернатива при відсутності
  доступу до занідатамабу. Барєр доступу в Україні: препарат не зареєстрований
  (лише named-patient або EAP).
