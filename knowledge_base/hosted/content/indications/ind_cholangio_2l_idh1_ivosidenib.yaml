      candidates for 2L.

do_not_do:
  - "Без підтвердження мутації IDH1: івосиденіб неактивний при IDH1-WT; спочатку молекулярний скринінг"
  - "При FGFR2-злитті: пемігатиніб/футибатиніб переважніший (ORR 36% vs 2%); не починати івосиденіб при виявленому FGFR2"
  - "ЕКГ обов'ЯЗКОВА: QTc >480 мс до початку — абсолютне протипоказання; не починати без вихідної ЕКГ"
  - "Перийогово/дистальна ХКА або ЖМ: IDH1 мутація рідкісна (<5%); тестувати але не маршрутизувати сюди без підтвердження"
  - "Жовчна обструкція: білірубін >3× ВМН — дренування спочатку (ERCP/ПТД); лише потім івосиденіб"

