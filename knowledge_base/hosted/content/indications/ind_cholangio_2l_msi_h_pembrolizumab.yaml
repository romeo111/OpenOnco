sources:
  - source_id: SRC-NCCN-HEPATOBILIARY
    position: supports
    relevant_quote_paraphrase: >
      NCCN Hepatobiliary 2025 Category 2A: pembrolizumab for MSI-H/dMMR advanced BTC
      (KEYNOTE-158 basket; ORR ~41% BTC cohort; FDA tumor-agnostic approval).
  - source_id: SRC-ESMO-BTC-2023
    position: supports
    relevant_quote_paraphrase: >
      ESMO BTC 2023: pembrolizumab recommended for MSI-H/dMMR BTC; comprehensive
      molecular profiling mandatory including MMR/MSI testing.

do_not_do:
  - "При MSS (стабільний мікросателіт): пембролізумаб неактивний; не призначати"
  - "FGFR2-злиття/IDH1/BRAF V600E мають пріоритет (Cat 1/2A vs MSI-H Cat 2A); спочатку виключити ці цілі"
  - "Без перевірки MSI/dMMR: пробіопсія з MMR IHC обов'язкова перед призначенням"
  - "Активне аутоімунне захворювання на імуносупресії — ризик тяжких ірАЕ"
  - "Жовчна обструкція без дренування → жовчний холангіт під пембролізумабом небезпечний"
  - "Не пропускати germline тестування Lynch синдрому у MSI-H BTC пацієнтів"

