do_not_do:
  - "Не застосовувати без підтвердженого NTRK-злиття — без молекулярного базису препарат неефективний"
  - "Не використовувати стандартний exome NGS замість fusion-aware панелі — більшість злиттів NTRK будуть пропущені"
  - "Сильні інгібітори CYP3A4 (позаконазол, вориконазол, кларитроміцин) → знизити дозу або змінити схему"
  - "Не ігнорувати жовтяницю або підвищення АЛТ/АСТ ≥Grade 3 — затримайте ларотректиніб до відновлення"
  - "Не продовжувати без моніторингу ЛФТ щомісячно протягом перших 3 місяців"

sources:
  - source_id: SRC-NAVIGATE-DRILON-2018
    position: supports
    relevant_quote_paraphrase: >
      Drilon et al. NEJM 2018 (NAVIGATE/SCOUT/phase-1 pooled):
      ORR 75% (IRC) in 55 patients across 17 tumor types with NTRK fusion;
      CR 13%, median DOR not reached at 9.4 mo, 1-year DOR rate 71%.
      FDA tumor-agnostic approval November 2018. Larotrectinib highly
      selective for TRKA/B/C; excellent tolerability (Grade ≥3 AE ~15%).
  - source_id: SRC-NCCN-HEPATOBILIARY
    position: supports
    relevant_quote_paraphrase: >
      NCCN Hepatobiliary Cancers 2025: larotrectinib (Category 2A)
      for NTRK fusion-positive biliary tract cancer / cholangiocarcinoma
      as a subsequent-line option. RNA-NGS testing recommended for
      fusion detection given higher sensitivity vs DNA-NGS.

