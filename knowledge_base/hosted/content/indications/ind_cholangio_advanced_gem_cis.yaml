rationale: >
  Advanced / unresectable / metastatic biliary tract carcinoma. Gem+cis was the
  global 1L standard since 2010 (ABC-02). Since 2022 (TOPAZ-1) and 2023
  (KEYNOTE-966), durva+gem-cis and pembro+gem-cis have become NCCN category 1
  preferred 1L regimens — gem+cis monotherapy is now retained primarily for
  patients with IO contraindications (active autoimmune disease, prior solid
  organ transplant) or for those unable to receive IO due to access
  limitations.

rationale_ua: >
  Гемцитабін (gemcitabine) + цисплатин (cisplatin) (GemCis) — хіміотерапевтична схема для
  поширеної/неоперабельної/метастатичної біліарної карциноми (BTC): застаріла або IO-протипоказана
  перша лінія. Дослідження ABC-02 (Valle et al., NEJM 2010): медіана ЗВ 11.7 проти 8.1 міс. (лише
  гемцитабін). Стандарт лікування до епохи імунотерапії. Наразі: переважна перша лінія для
  IO-придатних пацієнтів — TOPAZ-1 (дурвалумаб (durvalumab) + GemCis, NCCN Категорія 1) та
  KEYNOTE-966 (пембролізумаб (pembrolizumab) + GemCis, NCCN Категорія 1). GemCis залишається
  стандартом лікування (standard of care) при протипоказаннях до IO (активне аутоімунне захворювання,
  трансплантація органа, ECOG PS ≥2, тяжка ниркова недостатність при CrCl <50 мл/хв). Рецидивний/
  рефрактерний BTC після 1L — перехід на 2L (FGFR2-злиття (FGFR2 fusion): пемігатиніб/інфігратиніб/
  футибатиніб; IDH1: івосиденіб; FOLFOX/монотерапія при відсутності мішеней). Перша лінія для
  IO-протипоказаних пацієнтів. Монотерапія гемцитабіном — менш ефективна альтернатива. Первинна
  кінцева точка ABC-02: ЗВ.
