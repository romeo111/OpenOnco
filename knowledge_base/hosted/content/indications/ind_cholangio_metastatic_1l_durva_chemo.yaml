rationale: >
  TOPAZ-1 (Oh DY et al., NEJM Evid 2022;1(8):EVIDoa2200015; NCT03875235):
  durvalumab 1500 mg q3w + gemcitabine 1000 mg/m² + cisplatin 25 mg/m²
  (D1, D8 q3w x up to 8 cycles), then durvalumab maintenance, vs placebo +
  gem-cis in 1L advanced BTC (n=685). mOS 12.8 vs 11.5 mo (HR 0.80, 95%
  CI 0.66-0.97, p=0.021); benefit grew at later time points (24-month OS
  24.9% vs 10.4%) consistent with IO durable-response tail. FDA-approved
  Sep 2022; NCCN category 1 preferred 1L regimen. Choice between TOPAZ-1
  (durva) and KEYNOTE-966 (pembro) is institutional / access-driven — no
  head-to-head comparison; both are NCCN category 1. TOPAZ-1 has tighter
  HR and clearer survival curve separation but smaller trial (n=685 vs
  n=1069 KEYNOTE-966).

rationale_ua: >
  Дурвалумаб (durvalumab) у поєднанні з гемцитабіном (gemcitabine) та цисплатином (cisplatin)
  є стандартом першої лінії (Категорія 1) для прогресуючого/метастатичного раку жовчних шляхів
  (BTC), включно з інтрапечінковою та екстрапечінковою CCA й раком жовчного міхура.
  Дослідження TOPAZ-1 (Oh et al., NEJM Evidence 2022; NCT03875235, n=685): дурвалумаб 1500 mg
  q3w + гемцитабін 1000 mg/m² + цисплатин 25 mg/m² (Д1, Д8 q3w x до 8 циклів),
  потім підтримуюча терапія (maintenance) дурвалумабом, проти плацебо + гем+цис у 1L
  прогресуючому BTC. Медіана ЗВ 12.8 проти 11.5 міс. (HR 0.80, 95% ДІ 0.66-0.97, p=0.021);
  24-міс. ЗВ 24.9% проти 10.4% — характерний хвостовий ефект IO-терапії.
  Схвалено FDA вересень 2022; NCCN Категорія 1. Відповідь не залежить від PD-L1 CPS —
  схема застосовується для всього BTC-спектру незалежно від біомаркерів.
  КРИТИЧНО: до початку 1L необхідне повне молекулярне профілювання (FGFR2 злиття (fusion),
  IDH1 R132, BRAF V600E, HER2, NTRK, MSI-H) — для планування 2L таргетної терапії.
  Барєр доступу в Україні: дурвалумаб для BTC не зареєстрований — лише EAP або
  міжнародне направлення.
