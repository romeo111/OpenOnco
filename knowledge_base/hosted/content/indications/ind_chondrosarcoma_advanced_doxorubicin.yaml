rationale: >
  Conventional chondrosarcoma is poorly chemosensitive; surgery is curative-intent. Metastatic / unresectable disease — doxorubicin as 1L palliative.

rationale_ua: >
  Традиційна хондросаркома є хімічно нечутливою пухлиною; хірургічне втручання є
  куративним методом при резектабельному захворюванні. Метастатична або нерезектабельна
  хондросаркома — доксорубіцин (doxorubicin) у монотерапії у ролі 1L паліативного лікування.
  Доказова база обмежена: відповідь рідкісна (~10-15% ЧЗВ), медіана ВБП коротка.
  Доксорубіцин застосовується за відсутності таргетних опцій (IDH1/2 мутація — вориноставор
  або AG-881 у клінічних дослідженнях; дедиференційована хондросаркома — тіж режими, що
  і при остеосаркомі: MAP або AI). Моніторинг функції серця (ECHO, кумулятивна доза антрацикліну)
  є обов'язковим. Агресивний трек (aggressive) за відсутності альтернатив.
