rationale: >
  Aggressive-track 1L for CLL — fixed-duration acalabrutinib + venetoclax +
  obinutuzumab (14 cycles) per AMPLIFY trial (Brown JR et al., NEJM 2025).
  AMPLIFY established AVO as superior to chemoimmunotherapy (FCR/BR) in
  previously untreated CLL: 36-mo PFS 83.1% vs 66.5% (HR 0.42). The AVO arm
  adds obinutuzumab (cycles 2-7) on top of AV backbone, yielding deeper MRD
  responses. Key advantages: finite duration (14 cycles), depth of MRD
  negativity, no continuous drug exposure after treatment end. Key risks: TLS
  during venetoclax ramp-up (cycle 3), obinutuzumab infusion reactions, HBV
  reactivation risk with anti-CD20, BTKi-associated bleeding and arrhythmia
  risk. Preferred for patients who value time-limited therapy and can tolerate
  combined toxicity profile (ECOG 0-2).
rationale_ua: >
  Агресивна 1L для ХЛЛ — фіксованої тривалості акалабрутиніб + венетоклакс +
  обінутузумаб (14 циклів) за дослідженням AMPLIFY (Brown JR et al., NEJM 2025).
  AMPLIFY встановив перевагу AVO над хіміоімунотерапією (chemoimmunotherapy) — FCR/BR
  у раніше нелікованих (previously untreated) пацієнтів із ХЛЛ: 36-міс. ВБП 83.1% проти
  66.5% (HR 0.42). Рука AVO доповнена обінутузумабом (цикли 2-7) на тлі кісткового AV,
  що забезпечує глибші MRD-негативні відповіді. Ключові переваги: фіксована тривалість
  (14 циклів), глибина MRD-негативності, відсутність постійного медикаментозного навантаження
  після закінчення лікування. Ключові ризики: синдром лізису пухлини (TLS) під час нарощування
  дози венетоклаксу (цикл 3), інфузійні реакції на обінутузумаб, ризик реактивації ВГВ
  (HBV reactivation risk при анти-CD20 терапії), ризик кровотечі та аритмії при BTKi.
  Перевага надається пацієнтам, що цінують обмежену тривалість терапії, з ECOG 0-2.
  FGFR2 злиття (fusion) не є маркером відбору для AVO — показання є незалежним від злиття.
  Барєр доступу в Україні: акалабрутиніб не зареєстрований.
