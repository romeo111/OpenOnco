id: IND-CLL-1L-VENO
plan_track: aggressive
applicable_to:
  disease_id: DIS-CLL
  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required:
    - biomarker_id: BIO-CD5-IHC
      required: true
      value_constraint: positive (CD5+) — CLL immunophenotype panel
    - biomarker_id: BIO-CD23-IHC
      required: true
      value_constraint: positive (CD23+) — CLL immunophenotype panel; distinguishes from MCL
    - biomarker_id: BIO-NOTCH1-MUTATION
      required: false
      value_constraint: NOTCH1-mutated CLL has reduced response to obinutuzumab in some series; remains acceptable on venetoclax-obinutuzumab; consider closer surveillance
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
recommended_regimen: REG-VENETOCLAX-OBINUTUZUMAB
concurrent_therapy: []
followed_by: []
evidence_level: high
strength_of_recommendation: strong
nccn_category: '1'
expected_outcomes:
  overall_response_rate:
    value: "~85%"
    source: SRC-CLL14-FISCHER-2019
    notes: "CLL14 (Fischer 2019 NEJM): venetoclax + obinutuzumab vs chlorambucil + obinutuzumab in 1L CLL; ORR ~85% in venetoclax-obinutuzumab arm"
  complete_response:
    value: "~50% (with MRD-negative depth ~75% at end of treatment, CLL14)"
    source: SRC-CLL14-FISCHER-2019
    notes: "CLL14: CR/CRi ~50%; MRD-negative at end of treatment ~75% in venetoclax-obinutuzumab arm (iwCLL criteria)"
  progression_free_survival:
    value: "6-year PFS ~53% (CLL14 follow-up); fixed-duration"
    source: SRC-CLL14-FISCHER-2019
    notes: "CLL14 6-year follow-up (Al-Sawaf 2023): venetoclax + obinutuzumab 6-yr PFS ~53% vs chlorambucil + obinutuzumab ~21% (HR 0.27)"
  overall_survival_5y:
    value: "~85-90%"
    source: SRC-NCCN-BCELL-2025
    notes: "CLL 1L venetoclax-obinutuzumab OS ~85-90% at 5 years per CLL14 long-term follow-up; NCCN 2025 synthesis"
hard_contraindications:
  - CI-HBV-NO-PROPHYLAXIS
red_flags_triggering_alternative: []
required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-URIC-ACID
  - TEST-B2-MICROGLOBULIN
  - TEST-FISH-PANEL
  - TEST-NGS-LYMPHOID-PANEL
  - TEST-IMMUNOGLOBULINS
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
  - TEST-CECT-CAP
  - TEST-ECHO
desired_tests: []
rationale: 'Aggressive-track 1L for CLL — fixed-duration venetoclax + obinutuzumab (12 months) per CLL14 evidence. Particularly valuable for high-risk (RF-CLL-HIGH-RISK fired) where chemoimmuno is contraindicated and continuous BTKi may have suboptimal long-term outcomes. Key advantages: finite duration, deep MRD-negative responses, no continuous drug exposure; key risks: TLS during ramp, infusion reactions to obinutuzumab, neutropenia.

  '
rationale_ua: >
  агресивний-track 1L for CLL — fixed-duration венетоклакс + обінутузумаб (12 months) per CLL14 докази. особливо valuable for високого ризику (RF-CLL-високого ризику fired) where chemoimmuno is протипоказаний and continuous BTKi may have suboptimal long-term outcomes. Key advantages: finite duration, deep МЗХ-negative responses, ні continuous drug exposure; key risks: TLS during ramp, infusion reactions to обінутузумаб, нейтропенія.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: VenO is a Category 1 1L regimen for CLL; particularly preferred for high-risk genetics
  - source_id: SRC-ESMO-CLL-2024
    position: supports
    relevant_quote_paraphrase: ESMO 2024 endorses BTKi (ibrutinib/acalabrutinib/zanubrutinib) or fixed-duration venetoclax-obinutuzumab as 1L CLL standards
  - source_id: SRC-CLL14-FISCHER-2019
    position: supports
    relevant_quote_paraphrase: CLL14 trial — see referenced publication for primary outcome data.
known_controversies: []
do_not_do:
  - НЕ skip-ити venetoclax 5-week ramp-up — летальний TLS зафіксовано.
  - НЕ призначати при concomitant strong CYP3A4 inhibitor під час ramp-up — летальне підвищення концентрації.
  - НЕ починати без HBV скринінгу + entecavir prophylaxis при HBsAg+ або anti-HBc+ (anti-CD20 reactivation).
  - НЕ пропускати TLS prophylaxis (allopurinol + hydration) — особливо при ALC >25K або bulky disease.
  - НЕ робити ramp-up на amбулаторного пацієнта при high-burden disease — потрібна госпіталізація з q6-8h labs.
  - НЕ забути PJP prophylaxis на тривалу терапію obinutuzumab.
do_not_do_en:
  - "Do NOT skip the venetoclax 5-week ramp-up — fatal TLS documented."
  - "Do NOT prescribe with concomitant strong CYP3A4 inhibitor during ramp-up — fatal concentration increase."
  - "Do NOT start without HBV screening + entecavir prophylaxis if HBsAg+ or anti-HBc+ (anti-CD20 reactivation)."
  - "Do NOT skip TLS prophylaxis (allopurinol + hydration) — especially with ALC >25K or bulky disease."
  - "Do NOT do ramp-up on an outpatient with high-burden disease — hospitalization with q6-8h labs required."
  - "Do NOT forget PJP prophylaxis on prolonged obinutuzumab therapy."
time_critical: false
last_reviewed: '2026-04-27'
