id: IND-CLL-2L-VENR-MURANO
plan_track: standard

applicable_to:
  disease_id: DIS-CLL
  line_of_therapy: 2
  stage_requirements: ["Relapsed/refractory after ≥1 prior systemic line", "BCL2i-naive (venetoclax not previously failed)"]
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-VENETOCLAX-RITUXIMAB
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate:
    value: "~92% (≥PR by iwCLL, MURANO)"
    source: SRC-MURANO-SEYMOUR-2018
    notes: "MURANO (Seymour 2018 NEJM): venetoclax + rituximab vs bendamustine + rituximab in r/r CLL; ORR ~92% VenR arm"
  complete_response:
    value: "~27% (CR/CRi)"
    source: SRC-MURANO-SEYMOUR-2018
    notes: "MURANO: CR/CRi ~27%; MRD-negative at end of combination ~62% in venetoclax-rituximab arm"
  progression_free_survival:
    value: "4-year PFS 57.3% vs 4.6% BR (MURANO; HR 0.19)"
    source: SRC-MURANO-SEYMOUR-2018
    notes: "MURANO 4-year follow-up (Kater 2020 JCO): VenR 4-yr PFS 57.3% vs BR 4.6% (HR 0.19, p<0.001); durable benefit after fixed-duration 24 mo"
  overall_survival_5y:
    value: "5-year OS ~82% vs ~62% BR (HR 0.41)"
    source: SRC-MURANO-SEYMOUR-2018
    notes: "MURANO 5-year follow-up: VenR 5-yr OS ~82% vs BR ~62% (HR 0.41); long-term OS benefit confirmed"

hard_contraindications:
  - CI-HBV-NO-PROPHYLAXIS  # rituximab anti-CD20
red_flags_triggering_alternative: []

