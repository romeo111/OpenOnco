desired_tests: []

rationale: >
  Venetoclax + rituximab (VenR) for 24 months is the preferred 2L+
  fixed-duration regimen for r/r CLL after 1L BTKi or chemoimmuno
  progression. MURANO trial: substantial PFS + OS benefit over BR with
  durable MRD-negative responses (~62% MRD-negative at end of treatment).
  Distinct from VenO (1L CLL14, 12 mo + obinutuzumab anti-CD20) — VenR
  is 24 mo + rituximab, designed for r/r setting. Particularly valuable
  for patients who are BCL2-naive and need fixed-duration time-off-
  treatment. Choice of VenR vs continued BTKi at progression depends
  on prior 1L exposure: if 1L was BTKi → VenR is the rational switch;
  if 1L was chemoimmuno → either VenR or BTKi acceptable.

rationale_ua: >
  венетоклакс + ритуксимаб (VenR) for 24 months is the переважний 2L+ fixed-duration схема for р/р CLL after 1L BTKi or chemoimmuno прогресування. MURANO дослідження: substantial PFS + OS виграш over BR with durable МЗХ-negative responses (~62% МЗХ-negative at end of лікування). Distinct from VenO (1L CLL14, 12 міс. + обінутузумаб anti-CD20) — VenR is 24 міс. + ритуксимаб, designed for р/р setting. особливо valuable for patients who are BCL2-naive and need fixed-duration time-off- лікування. Choice of VenR vs continued BTKi at прогресування depends on prior 1L exposure: якщо 1L was BTKi → VenR is the rational switch; якщо 1L was chemoimmuno → either VenR or BTKi прийнятний.
