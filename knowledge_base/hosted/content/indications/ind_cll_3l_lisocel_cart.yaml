id: IND-CLL-3L-LISOCEL
plan_track: aggressive

applicable_to:
  disease_id: DIS-CLL
  line_of_therapy: 3
  stage_requirements:
    - "Relapsed / refractory CLL / SLL after ≥2 prior systemic lines including a BTK inhibitor and a BCL-2 inhibitor (covalent BTKi: ibrutinib / acalabrutinib / zanubrutinib; BCL-2i: venetoclax)"
    - "Progression on or intolerance to both cBTKi and BCL-2i (double-exposed CLL)"
    - "ECOG 0-2 (TRANSCEND CLL-004 enrolment)"
    - "Adequate organ function for fludarabine + cyclophosphamide lymphodepletion (ANC ≥1.0, plt ≥75, AST/ALT ≤3× ULN, creatinine clearance ≥60)"
    - "No prior CD19-directed CAR-T (or sufficient washout per protocol)"
    - "Manufacturing slot available (~3-week wait acceptable; bridging chemotherapy permitted in window)"
    - "No active Richter transformation at time of leukapheresis (transformed disease handled per DLBCL pathway)"
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: "CD19+ confirmed (CD19 typically retained on CLL); CD20 status confirmed at original diagnosis"
  biomarker_requirements_excluded: []
  demographic_constraints:
    age_min: 18
    ecog_max: 2

recommended_regimen:  # No dedicated CLL liso-cel regimen entity in KB; lymphodepletion + dose mirror DLBCL liso-cel REGIMEN-LISOCEL-DLBCL-3L until CLL-specific REG- entity authored
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~47% (TRANSCEND CLL-004 primary cohort, n≈87 evaluable, double-exposed cBTKi + BCL-2i progression)"
  complete_response: "~18% (CR + CRi with undetectable MRD ~64% of CR responders)"
  progression_free_survival: "Median PFS ~12 months overall; deeper / longer in CR + uMRD subset (median PFS not reached at primary analysis)"
  overall_survival_5y: "Median OS ~30+ months at primary analysis; long-term follow-up ongoing"

hard_contraindications:
  - CI-ACTIVE-INFECTION-FOR-ALEMTUZUMAB

red_flags_triggering_alternative:
  - RF-CLL-INFECTION-SCREENING
  - RF-CLL-POST-BTKI-C481-ACTIONABLE  # alternative pirtobrutinib pathway if BTK-C481 mutation
  - RF-CLL-VEN-RESISTANT-ACTIONABLE
  - RF-CLL-TRANSFORMATION-PROGRESSION  # Richter exclusion
  - RF-CLL-TP53-DELETION-ACTIONABLE  # high-risk biology consideration

