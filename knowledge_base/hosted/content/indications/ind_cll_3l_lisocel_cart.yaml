sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "Lisocabtagene maraleucel is a Category 2A preferred third-line+ option for r/r CLL/SLL after progression on both a BTK inhibitor and a BCL-2 inhibitor, per TRANSCEND CLL-004 — first CAR-T approved in CLL."
  - source_id: SRC-ESMO-CLL-2024
    position: supports
    relevant_quote_paraphrase: "CD19 CAR-T cell therapy (lisocabtagene maraleucel) is a recommended option for r/r CLL/SLL with progression on both BTKi and BCL-2i; data from TRANSCEND CLL-004 demonstrate durable remissions in a subset of double-exposed patients."

known_controversies:
  - topic: "Liso-cel vs pirtobrutinib vs alloHCT for r/r CLL post-cBTKi + BCL-2i"
    positions:
      - position: "Pirtobrutinib (non-covalent BTKi) — oral, well-tolerated, ORR ~73% in BRUIN post-cBTKi cohort; preferred for fit patients with isolated cBTKi resistance (BTK-C481 mutation) where BCL-2i has not yet been used or has produced durable response"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Liso-cel — single CAR-T infusion with deep MRD-negative responses in subset; preferred for pirtobrutinib-failure or rapidly progressing double-exposed disease where durable remission is the goal"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Allogeneic HCT — historically the only curative option for r/r CLL; high toxicity (TRM ~15-25%); reserved for young / fit patients where CAR-T inaccessible or failed"
        sources: [SRC-ESMO-CLL-2024]
    our_default: "Pirtobrutinib first for fit double-exposed CLL when BTK-C481 actionable; liso-cel for pirtobrutinib-failure or rapidly progressing disease where durable MRD-negative remission valued; alloHCT reserved for selected younger fit patients without other options. In Ukraine pirtobrutinib accessibility variable; CAR-T requires international referral; alloHCT available domestically at major haematology centres."
    rationale: >
      Sequencing in double-exposed r/r CLL is unsettled and evolving.
      MRD-negative depth of response with liso-cel may translate to
      curative-intent durability in subset; pirtobrutinib provides
      non-immunotherapy oral option that preserves CAR-T as later
      salvage. Patient fitness, prior BTK-C481 mutation status, and
      access pathway drive sequencing decision.

do_not_do:
  - "НЕ призначати prophylactic systemic corticosteroids — пригнічує CAR-T expansion + знижує efficacy."
  - "НЕ розпочинати без on-site tocilizumab (мінімум 2 дози) ДО інфузії — fatal CRS можливе."
  - "НЕ робити в центрі без CAR-T accreditation (FACT/JACIE/REMS) — toxicity management потребує спеціалізованої команди + ICU доступу; ХЛЛ ICANS-сигнал помітно вищий за DLBCL / MCL liso-cel."
  - "НЕ ігнорувати baseline brain MRI — pre-existing CNS вияви ХЛЛ або транзиторна ішемія підвищують ризик fatal ICANS."
  - "НЕ призначати при active Richter transformation — трансформоване захворювання обробляється за DLBCL шляхом (окрема Indication, future)."
  - "НЕ призначати при active uncontrolled infection — лімфодеплеція + CRS = high mortality; ХЛЛ пацієнти типово мають baseline imune dysfunction + hypogammaglobulinemia."
  - "НЕ забути IVIG для довготривалої hypogammaglobulinemia (IgG <400 + recurrent infections) — ХЛЛ пацієнти часто потребують IVIG довічно через дисфункцію imуноглобулінів незалежно від CAR-T."
  - "НЕ пропускати pre-treatment HBV / HCV / HIV скринінг — реактивація HBV вимагає entecavir / tenofovir prophylaxis при HBcAb+; CMV / EBV моніторинг бажаний."

