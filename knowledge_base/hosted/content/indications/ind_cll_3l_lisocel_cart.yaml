  - TEST-PET-CT
  - TEST-ECHO
  - TEST-IMMUNOGLOBULINS
  - TEST-LN-CORE-BIOPSY
  - TEST-FLOW-CYTOMETRY
  - TEST-MRI-BRAIN-CONTRAST
  - TEST-PREGNANCY
desired_tests: []

rationale: >
  Lisocabtagene maraleucel (liso-cel; Breyanzi) received FDA accelerated
  approval (March 2024) for relapsed/refractory CLL/SLL after ≥2 prior
  systemic lines including a BTK inhibitor and a BCL-2 inhibitor — the
  first CAR-T product approved for CLL. Defined 1:1 CD4:CD8 cell
  composition with 4-1BB costimulation. TRANSCEND CLL-004 (Siddiqi
  et al., Lancet 2023; updated J Clin Oncol 2024): primary cohort of
  double-exposed CLL (progression on cBTKi + BCL-2i, n≈87 evaluable)
  — ORR ~47%, CR + CRi ~18% with deep MRD-negative responses, median
  PFS ~12 months overall but durable in CR + uMRD subset. CRS profile
  predominantly low-grade (any ~85%, G≥3 ~9%); ICANS any ~30%,
  G≥3 ~20% (higher than MCL / DLBCL liso-cel — CLL-specific neurotox
  signal). Fills critical unmet need in double-exposed CLL where
  remaining options (pirtobrutinib non-covalent BTKi, alloHCT) have
  limited durable remissions. Pirtobrutinib (IND-CLL-3L-PIRTOBRUTINIB)
  remains preferred non-CAR-T 3L option for fit patients with isolated
  cBTKi resistance (BTK-C481 mutation); liso-cel preferred for
  pirtobrutinib-failure or rapidly progressing double-exposed disease.
  Ukraine context: not registered, no domestic CAR-T capacity;
  international referral pathway (Israel / Poland / Germany / Spain)
  required. Aggressive-track option for fit double-exposed CLL patients
  with international referral access.

rationale_ua: >
  Лісокабтаген маралейцел (lisocabtagene maraleucel, liso-cel; Breyanzi) отримав прискорену
  реєстрацію FDA (березень 2024) для рецидивного/рефрактерного (relapsed/refractory) ХЛЛ/SLL
  після >= 2 попередніх системних ліній включно з BTK-інгібітором та BCL-2-інгібітором —
  перший CAR-T для ХЛЛ. Склад 1:1 CD4:CD8 клітин з 4-1BB костимуляцією.
  TRANSCEND CLL-004 (Siddiqi et al., Lancet 2023, JCO 2024): подвійно-відкрита когорта ХЛЛ
  (прогресування після cBTKi + BCL-2i, n~87): ЧЗВ ~47%, CR+CRi ~18% з глибокими
  MRD-негативними відповідями, медіана ВБП ~12 міс. у загальній когорті, тривала при
  CR+uMRD-підгрупі. CRS переважно низького ступеня (low-grade) (~85% будь-якого ступеня,
  G>=3 ~9%); ICANS будь-який ~30%, G>=3 ~20% — специфічний нейротоксичний сигнал при ХЛЛ.
  Заповнює критичну незадоволену потребу при рецидивному/рефрактерному (relapsed/refractory) та агресивному (aggressive) подвійно відкритому ХЛЛ (double-exposed CLL).
  Піртобрутиніб (IND-CLL-3L-PIRTOBRUTINIB) залишається переважним non-CAR-T 3L варіантом
  при ізольованій cBTKi-резистентності; liso-cel — переважний при невдачі піртобрутинібу
  або стрімко прогресуючому подвійно відкритому ХЛЛ.
  Рецидивний/рефрактерний (relapsed/refractory) ХЛЛ із подвійним відкриттям після cBTKi + BCL-2i
  є основним показанням. Барєр доступу в Україні: не зареєстрований, лише міжнародне направлення до CAR-T центру.
