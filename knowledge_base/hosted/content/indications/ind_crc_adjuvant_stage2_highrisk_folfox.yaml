id: IND-CRC-ADJUVANT-STAGE2-HIGHRISK-FOLFOX
plan_track: standard

applicable_to:
  disease_id: DIS-CRC
  line_of_therapy: 1
  stage_requirements:
  - "Stage II colon cancer (T3-4 N0 M0), post-curative R0 resection"
  - "High-risk features required (≥1): T4, <12 lymph nodes examined, perforation at diagnosis, bowel obstruction, LVI/PNI, poorly differentiated/undifferentiated histology (excl. MSI-H)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded:
  - biomarker_id: BIO-MSI-STATUS
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-FOLFOX
alternative_regimens:
- regimen_id: REG-CAPOX
  rationale: "CAPOX 3 cycles (6 weeks) or 4 cycles (12 weeks) — oral fluoropyrimidine convenience for patients who cannot access infusion centre q2w"
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "Adjuvant — no response endpoint"
  complete_response: "n/a (post-resection)"
  progression_free_survival: "5-yr DFS ~75-80% high-risk stage II with adjuvant (vs ~70% without)"
  overall_survival_5y: "5-yr OS ~80-85%; absolute benefit ~3-5% for high-risk stage II"

hard_contraindications: []
red_flags_triggering_alternative:
- RF-CRC-FRAILTY-AGE

required_tests: []
desired_tests: []
rationale: >
  Stage II colon cancer benefit from adjuvant chemotherapy is modest overall
  (MOSAIC: no significant OS benefit for unselected stage II). High-risk
  features (T4, inadequate lymph node sampling, perforation, obstruction,
  LVI, PNI, poor differentiation) identify patients with ~25-30% recurrence
  risk where FOLFOX or CAPOX offers 3-5% absolute OS gain per NCCN/ESMO.
  MSI-H/dMMR exclusion is mandatory: dMMR tumours have excellent prognosis
  and derive no benefit from 5-FU-based chemotherapy; possible harm from
  immunogenicity loss.
  Duration: 6 months FOLFOX or CAPOX (IDEA evidence for stage II is limited;
  3-month option may be considered for very frail patients in discussion with
  oncology team).

rationale_ua: >
  II стадія раку товстої кишки: користь від ад'ювантної хіміотерапії помірна
  загалом. Фактори високого ризику (T4, <12 вузлів, перфорація, непрохідність,
  ЛСІ, ПНІ, низький ступінь диференціації) виявляють пацієнтів з ризиком
  рецидиву ~25-30%, де FOLFOX або CAPOX дає ~3-5% абсолютну перевагу ОВ.
  Виключення dMMR/MSI-H є обов'язковим.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
- source_id: SRC-MOSAIC-ANDRE-2004
  position: supports
- source_id: SRC-NCCN-COLON-2025
  position: supports
- source_id: SRC-ESMO-COLON-2024
  position: supports

do_not_do:
- "Do NOT offer adjuvant chemo to dMMR/MSI-H stage II — no benefit, possible harm"
- "Do NOT delay adjuvant beyond 8 weeks post-surgery"
- "Do NOT add bevacizumab — NSABP C-08 negative"
- "Do NOT continue oxaliplatin past Grade 2 functional neuropathy — switch to 5-FU/LV"
- "Do NOT apply IDEA 3-month CAPOX data to FOLFOX (not interchangeable for duration reduction)"

last_reviewed: "2026-05-03"
notes: >
  High-risk stage II colon cancer only. MSI/MMR testing is the single most
  important pre-decision test. Low-risk stage II (T3 N0, ≥12 nodes, no
  adverse features, MSS) — observation preferred; adjuvant chemotherapy
  does not improve outcomes.
