rationale: >
  CAPOX is an NCCN category 1 alternative to FOLFOX for stage III adjuvant
  colon cancer. The oral fluoropyrimidine backbone (capecitabine) replaces
  infusional 5-FU/leucovorin, eliminating the need for a central venous port
  and 46-hour CIV pump. Equivalent efficacy to FOLFOX; preference determined
  by patient convenience, renal function, and IDEA duration data.
  IDEA collaboration (Grothey 2018, NEJM N=12,834): 3 months CAPOX
  non-inferior to 6 months for T1-3 N1 (low-risk), with 68% reduction
  in grade ≥2 neuropathy. This makes 3-month CAPOX the preferred option
  for low-risk stage III per NCCN 2025 and ESMO 2024.
  High-risk (T4 or N2): 6 months remains standard (3 mo FOLFOX also
  inferior to 6 mo; 3 mo CAPOX borderline — use clinical judgment).

rationale_ua: >
  CAPOX (капецитабін + оксаліплатин (oxaliplatin)) — стандарт ад'ювантної терапії раку
  ободової кишки стадії III. Аналіз IDEA (Grothey NEJM 2018): 3 міс. CAPOX
  не поступається 6 міс. для низького ризику (low-risk) T1-3 N1 (HR 0.85, 95% ДІ 0.71-1.01),
  при значно меншій нейропатії G>=2 (16% проти 48%). Для захворювання високого ризику (high-risk)
  T4 або N2 — 6 міс. є кращими (HR на користь 6 міс.). Загальний стандарт: CAPOX або FOLFOX
  рівноцінні за ефективністю; CAPOX переважають для пацієнтів з T1-3 N1 завдяки меншій
  нейропатії та зручності (перорально). FGFR2 злиття (fusion) у стадії III — не впливає
  на вибір ад'ювантного режиму. 5-річний DFS стадії III в цілому ~73% з ад'ювантою
  на основі оксаліплатину; для T1-3 N1 (низький ризик) ~85%. Курс ад'ювантної терапії:
  8 циклів CAPOX (24 тиж.) або 12 циклів FOLFOX. 3-міс. стандарт для низького ризику дає
  Категорія 1 (category 1) NCCN для ад'ювантного лікування стадії III КРТ.
  DFS 68% (порівнянний з 6-міс.) зі суттєво нижчою токсичністю.
