id: IND-CRC-ADJUVANT-STAGE3-FOLFOX
plan_track: standard

applicable_to:
  disease_id: DIS-CRC
  line_of_therapy: 1
  stage_requirements: ["Stage III (any T, N1-2, M0)", "Post-curative resection (R0)"]
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-FOLFOX
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate:
    value: "Adjuvant — assessed by DFS not response (no ORR endpoint in MOSAIC)"
    source: SRC-MOSAIC-ANDRE-2004
    notes: "Adjuvant post-resection setting; DFS/OS are the clinically meaningful endpoints"
  complete_response:
    value: "n/a (post-resection, R0; CR not applicable in adjuvant context)"
    source: SRC-MOSAIC-ANDRE-2004
  progression_free_survival:
    value: "5-yr DFS ~70-75% stage III low-risk (T1-3 N1); ~55-65% high-risk (T4/N2)"
    source: SRC-MOSAIC-ANDRE-2004
    notes: "MOSAIC 6-yr DFS 78.2% vs 72.9% (FOLFOX4 vs 5-FU/LV); substage risk grouping per IDEA collaboration"
  overall_survival_5y:
    value: "5-yr OS ~75-85% (depends on sub-stage + tumor biology)"
    source: SRC-MOSAIC-ANDRE-2004
    notes: "MOSAIC 6-yr OS 78.5% vs 76.0% (HR 0.84, NS); André 2009 JCO 5-yr OS update; substage variation substantial"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-CRC-FRAILTY-AGE

required_tests: []
desired_tests: []

rationale: >
  MOSAIC trial established FOLFOX over 5-FU/LV for stage III adjuvant.
  IDEA pooled analysis: 3 mo non-inferior to 6 mo for low-risk (T1-3 N1)
  with much less neuropathy — duration is a clinical decision based on
  T/N substage and patient preference.

rationale_ua: >
  MOSAIC дослідження усталений FOLFOX over 5-FU/LV for stage III ад'ювантний. IDEA pooled analysis: 3 mo не гірше to 6 mo for низького ризику (T1-3 N1) with much less нейропатія — duration is a clinical decision based on T/N substage and patient preference.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-MOSAIC-ANDRE-2004
    position: supports
    relevant_quote_paraphrase: "MOSAIC: FOLFOX4 vs 5-FU/LV adjuvant stage II-III colon cancer; 6-yr DFS 78.2% vs 72.9% (HR 0.84); 6-yr OS 78.5% vs 76.0% (HR 0.84); established FOLFOX as stage III adjuvant standard"
  - source_id: SRC-NCCN-COLON-2025
    position: supports
  - source_id: SRC-ESMO-COLON-2024
    position: supports

do_not_do:
  - "Do NOT delay adjuvant beyond 8 weeks post-surgery if avoidable — diminishing benefit thereafter"
  - "Do NOT continue oxaliplatin past Grade 2 functional neuropathy — switch to 5-FU/LV alone"
  - "Do NOT add bevacizumab in adjuvant — NSABP C-08 negative, NOT a standard"

do_not_do_en:
  - "Do NOT delay adjuvant beyond 8 weeks post-surgery if avoidable — diminishing benefit thereafter"
  - "Do NOT continue oxaliplatin past Grade 2 functional neuropathy — switch to 5-FU/LV alone"
  - "Do NOT add bevacizumab in adjuvant — NSABP C-08 negative, NOT a standard"
last_reviewed: "2026-04-26"
notes: "Standard stage III adjuvant. Decision on duration (3 vs 6 mo) per IDEA risk grouping."
