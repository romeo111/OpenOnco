rationale: >
  MOSAIC trial established FOLFOX over 5-FU/LV for stage III adjuvant.
  IDEA pooled analysis: 3 mo non-inferior to 6 mo for low-risk (T1-3 N1)
  with much less neuropathy — duration is a clinical decision based on
  T/N substage and patient preference.

rationale_ua: >
  Дослідження MOSAIC встановило перевагу FOLFOX над 5-FU/LV для ад'ювантної терапії стадії III.
  Аналіз IDEA: 3 міс. не поступається 6 міс. для T1-3 N1 (низький ризик (low-risk)) з
  суттєво нижчою нейропатією — тривалість є клінічним рішенням, що базується на T/N-підстадії
  та перевагах пацієнта. 8 циклів FOLFOX q2w (16 тиж. = 4 міс.) для T1-3 N1; 12 циклів (24 тиж.)
  для T4 або N2 (захворювання високого ризику (high-risk)). Дозуюча токсичність: периферична
  сенсорна нейропатія (клас-специфічна для оксаліплатину (oxaliplatin), кумулятивна) — зупинити
  оксаліплатин при G>=2 стійкій нейропатії. 5-FU + LV продовжити при можливості для
  максимального ад'ювантного ефекту. MSI-H стадії III — ад'ювантна хіміотерапія (chemotherapy)
  Тривалість: T1-3 N1 (низького ризику (low-risk)) = 3 міс.; T4/N2 = 6 міс.
  покращує ЗВ (MOSAIC): продовжувати FOLFOX незалежно від MSI-статусу у стадії III.
