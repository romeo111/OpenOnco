do_not_do:
  - "Не давати капецитабін при CrCl <30 мл/хв: протипоказаний; перейдіть на IV 5-ФУ+ЛФ+Bev"
  - "Без DPYD-тесту у пацієнтів з ознаками підвищеного ризику: важка токсичність 5-ФУ в ~5-7%"
  - "Бевацизумаб не вводити після нещодавнього (≤6 міс) артеріального тромбозу або перфорації ШКТ"
  - "Не ескалювати до FOLFOX+Bev автоматично при прогресії — оцінюйте статус спочатку"
  - "Не продовжувати бевацизумаб після перфорації ШКТ, RPLS або важкого АТЕ — постійне скасування"

sources:
  - source_id: SRC-NCCN-COLON-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN Colon/Rectal 2025 Category 2A: fluoropyrimidine-based regimens (with or without
      bevacizumab) are appropriate for elderly/frail mCRC patients not tolerant of
      oxaliplatin-based doublets. Capecitabine-based options noted as convenient for
      oral administration in frail populations.
  - source_id: SRC-ESMO-COLON-2024
    position: supports
    relevant_quote_paraphrase: >
      ESMO mCRC 2024: capecitabine + bevacizumab (AVEX regimen) is an accepted 1L option
      for elderly/frail mCRC patients. AVEX demonstrated significant mPFS improvement
      over capecitabine monotherapy in ≥70-year patients.

