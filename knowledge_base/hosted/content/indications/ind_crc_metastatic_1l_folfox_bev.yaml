id: IND-CRC-METASTATIC-1L-FOLFOX-BEV
plan_track: aggressive

applicable_to:
  disease_id: DIS-CRC
  line_of_therapy: 1
  stage_requirements: ["Stage IV (metastatic)", "M1"]
  biomarker_requirements_required: []
  biomarker_requirements_excluded:
    - biomarker_id: BIO-MSI-STATUS
      value_constraint: "MSI-H"
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-FOLFOX-BEV
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate:
    value: "~50%"
    source: SRC-NCCN-COLON-2025
    notes: "Guideline-only; NO16966 (Saltz 2008 JCO) primary source not yet in KB. ORR ~47-53% for FOLFOX+bev 1L mCRC per NO16966 and TREE2 trials."
  complete_response:
    value: "~5-8%"
    source: SRC-NCCN-COLON-2025
    notes: "Estimate from NCCN guideline consensus for FOLFOX+bev 1L mCRC"
  progression_free_survival:
    value: "Median ~10-11 mo"
    source: SRC-NCCN-COLON-2025
    notes: "Guideline-only; NO16966 mPFS ~9.4 mo (FOLFOX4+bev arm); TREE2 ~10.3 mo (mFOLFOX6+bev). Source entity NO16966/Saltz 2008 flagged for future KB addition."
  overall_survival_5y:
    value: "mOS ~24-28 mo (RAS-mutant subgroup; higher in RAS-WT)"
    source: SRC-NCCN-COLON-2025
    notes: "Guideline-only estimate; NO16966 mOS ~21.3 mo for FOLFOX4+bev; subsequent bevacizumab biosimilar trials confirm. RAS subgroup data from retrospective analyses."

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-CRC-MSI-H-ACTIONABILITY
  - RF-CRC-FRAILTY-AGE

required_tests: []
desired_tests: []

rationale: >
  FOLFOX+bev for RAS-mutant mCRC (anti-EGFR ineffective) AND right-sided
  RAS-WT (CALGB-80405 subgroup analysis: bev preferred over cetux in
  right-sided primary). Adds ~2-4 mo PFS over FOLFOX alone.

rationale_ua: >
  FOLFOX+bev for RAS-mutant mCRC (anti-EGFR ineffective) AND right-sided RAS-WT (CALGB-80405 аналіз підгруп: bev переважний over cetux in right-sided primary). Adds ~2-4 mo PFS over FOLFOX alone.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-COLON-2025
    position: supports
  - source_id: SRC-ESMO-COLON-2024
    position: supports

do_not_do:
  - "Do NOT initiate within 28 days of major surgery (perforation / dehiscence risk)"
  - "Do NOT continue bevacizumab through uncontrolled HTN >160/100"
  - "Do NOT use in patients with high-risk varices / active hemoptysis"

do_not_do_en:
  - "Do NOT initiate within 28 days of major surgery (perforation / dehiscence risk)"
  - "Do NOT continue bevacizumab through uncontrolled HTN >160/100"
  - "Do NOT use in patients with high-risk varices / active hemoptysis"
last_reviewed: "2026-04-26"
notes: "RAS-mutant OR right-sided RAS-WT — anti-VEGF track."
