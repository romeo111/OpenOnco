id: IND-CRC-METASTATIC-1L-FOLFOX-BEV
plan_track: aggressive

applicable_to:
  disease_id: DIS-CRC
  line_of_therapy: 1
  stage_requirements: ["Stage IV (metastatic)", "M1"]
  biomarker_requirements_required: []
  biomarker_requirements_excluded:
    - biomarker_id: BIO-MSI-STATUS
      value_constraint: "MSI-H"
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-FOLFOX-BEV
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~50%"
  complete_response: "~5-8%"
  progression_free_survival: "Median ~10-11 mo"
  overall_survival_5y: "mOS ~24-28 mo (RAS-mutant subgroup)"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-CRC-MSI-H-ACTIONABILITY
  - RF-CRC-FRAILTY-AGE

required_tests: []
desired_tests: []

rationale: >
  FOLFOX+bev for RAS-mutant mCRC (anti-EGFR ineffective) AND right-sided
  RAS-WT (CALGB-80405 subgroup analysis: bev preferred over cetux in
  right-sided primary). Adds ~2-4 mo PFS over FOLFOX alone.

rationale_ua: >
  FOLFOX + бевацизумаб (bevacizumab) для RAS-мутованого мКРТ (анти-EGFR неефективний) ТА
  RAS-WT правобічного первинного вогнища (аналіз підгрупи CALGB-80405: бевацизумаб
  переважає цетуксимаб (cetuximab) при правобічному первинному вогнищі). Додає ~2-4 міс. ВБП
  порівняно з FOLFOX без бевацизумабу. RAS-WT лівобічні пухлини — стандартом 1L є анти-EGFR
  (цетуксимаб або панітумумаб) у поєднанні з FOLFOX/FOLFIRI (IND-CRC-METASTATIC-1L-RAS-WT-LEFT);
  бевацизумаб резервується для правобічних або RAS-мутованих. NCCN Категорія 1.
  Барєр доступу в Україні: бевацизумаб (біосиміляр) доступний.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_06
draft_revision: 2

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-COLON-2025
    position: supports
  - source_id: SRC-ESMO-COLON-2024
    position: supports

do_not_do:
