id: IND-CRC-METASTATIC-1L-RAS-WT-LEFT
plan_track: standard

applicable_to:
  disease_id: DIS-CRC
  line_of_therapy: 1
  stage_requirements: ["Stage IV (metastatic)", "M1", "Left-sided primary (splenic flexure / descending / sigmoid / rectum)"]
  biomarker_requirements_required:
    - biomarker_id: BIO-RAS-MUTATION
      value_constraint: "RAS-WT"
  biomarker_requirements_excluded:
    - biomarker_id: BIO-MSI-STATUS
      value_constraint: "MSI-H"
    - biomarker_id: BIO-BRAF-V600E
      value_constraint: "positive"
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-FOLFOX-CETUX
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate:
    value: "~65-70% for left-sided RAS-WT (FIRE-3 RAS-WT: 65.5% cetuximab arm; CALGB-80405 left-sided subgroup ~70%)"
    source: SRC-FIRE3-HEINEMANN-2014
    notes: "FIRE-3 RAS-WT ORR 65.5% (cetux) vs 59.6% (bev); CALGB-80405 left-sided subgroup ORR ~70% per Venook 2017 JCO (source not in KB)"
  complete_response:
    value: "~10-15% for left-sided RAS-WT (higher than right-sided)"
    source: SRC-FIRE3-HEINEMANN-2014
    notes: "CR estimate from FIRE-3 and CALGB-80405 combined RAS-WT left-sided analyses; CALGB-80405 source not in KB"
  progression_free_survival:
    value: "Median ~10-11 mo (FIRE-3: 10.4 mo cetuximab arm; no significant PFS difference vs bev)"
    source: SRC-FIRE3-HEINEMANN-2014
    notes: "FIRE-3 mPFS 10.4 vs 10.2 mo (HR 1.06, NS); sidedness advantage for cetuximab reflected primarily in OS, not PFS"
  overall_survival_5y:
    value: "mOS ~33 mo for left-sided RAS-WT (FIRE-3 left-sided: 38.3 mo cetuximab vs 28.0 mo bev)"
    source: SRC-FIRE3-HEINEMANN-2014
    notes: "FIRE-3 left-sided RAS-WT mOS 38.3 vs 28.0 mo; CALGB-80405 left-sided also favors cetuximab. The >30 mo range reflects pooled estimate."

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-CRC-FRAILTY-AGE
  - RF-CRC-MSI-H-ACTIONABILITY
  - RF-CRC-BRAF-V600E-POOR-PROGNOSIS

required_tests: []
desired_tests: []

rationale: >
  CALGB-80405 + FIRE-3: anti-EGFR (cetuximab) superior to anti-VEGF
  (bevacizumab) in RAS-WT left-sided primary mCRC. NCCN category 1.

rationale_ua: >
  CALGB-80405 + FIRE-3: anti-EGFR (цетуксимаб) перевершує anti-VEGF (бевацизумаб) in RAS-WT left-sided primary mCRC. NCCN категорія 1.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-FIRE3-HEINEMANN-2014
    position: supports
    relevant_quote_paraphrase: "FIRE-3 RAS-WT: FOLFIRI+cetuximab vs FOLFIRI+bev 1L mCRC; ORR 65.5% vs 59.6%; mOS 33.1 vs 25.6 mo (HR 0.70); left-sided subgroup mOS 38.3 vs 28.0 mo"
  - source_id: SRC-NCCN-COLON-2025
    position: supports
  - source_id: SRC-ESMO-COLON-2024
    position: supports

do_not_do:
  - "Do NOT use cetuximab/panitumumab in RAS-mutant CRC — bypassed signaling, no benefit"
  - "Do NOT use cetuximab in BRAF V600E mutant — confirmed no benefit (BEACON CRC)"
  - "Do NOT use cetuximab in right-sided RAS-WT — bevacizumab preferred per CALGB-80405"
  - "Do NOT skip rash prophylaxis — strongly correlates with response and impacts QoL"

do_not_do_en:
  - "Do NOT use cetuximab/panitumumab in RAS-mutant CRC — bypassed signaling, no benefit"
  - "Do NOT use cetuximab in BRAF V600E mutant — confirmed no benefit (BEACON CRC)"
  - "Do NOT use cetuximab in right-sided RAS-WT — bevacizumab preferred per CALGB-80405"
  - "Do NOT skip rash prophylaxis — strongly correlates with response and impacts QoL"
last_reviewed: "2026-04-26"
reviewers: []
reviewer_signoffs: 0
notes: "CRC stage IV / RAS-WT / left-sided / non-MSI-H / non-BRAF — default standard track."
