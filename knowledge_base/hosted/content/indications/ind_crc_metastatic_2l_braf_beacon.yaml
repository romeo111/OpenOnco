id: IND-CRC-METASTATIC-2L-BRAF-BEACON
plan_track: aggressive

applicable_to:
  disease_id: DIS-CRC
  line_of_therapy: 2
  stage_requirements: ["Stage IV metastatic", "Post 1L progression"]
  biomarker_requirements_required:
    - biomarker_id: BIO-BRAF-V600E
      value_constraint: "positive"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-ENCORAFENIB-CETUXIMAB
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~20% (BEACON CRC doublet)"
  complete_response: "~3%"
  progression_free_survival: "Median ~4.3 mo"
  overall_survival_5y: "mOS 9.3 vs 5.9 mo control (BEACON)"

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-BRAF-V600E
  - TEST-CT-CHEST-ABDOMEN-PELVIS

desired_tests: []

rationale: >
  BEACON CRC trial: in BRAF V600E mCRC 2L+, encorafenib + cetuximab
  doubled mOS vs irinotecan-based control. Treatment-defining for
  this 8-10% molecular subset. NCCN cat 1.

rationale_ua: >
  Дослідження BEACON CRC: при BRAF V600E мКРТ 2L+ енкорафеніб (encorafenib) + цетуксимаб
  (cetuximab) подвоїли мЗВ порівняно з іринотекан-вмісним контролем. Молекулярно-визначальний
  субсет ~8-10% мКРТ. NCCN Категорія 1. мЗВ 9.3 проти 5.9 міс. (HR 0.60, p<0.0001).
  BRAF V600E мутація — ознака несприятливого прогнозу: мЗВ ~14 міс. при стандартних схемах;
  BEACON встановлює специфічну таргетну комбінацію. Білімумаб (binimetinib, MEK-інгібітор)
  у трикомпонентній схемі (enco+bini+cetux) не перевищив дублет у OS — дублет є стандартом.
  Барєр доступу в Україні: енкорафеніб не реєструвався в UA; цетуксимаб зареєстрований.
