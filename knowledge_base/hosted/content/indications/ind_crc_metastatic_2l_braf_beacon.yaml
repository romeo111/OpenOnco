id: IND-CRC-METASTATIC-2L-BRAF-BEACON
plan_track: aggressive

applicable_to:
  disease_id: DIS-CRC
  line_of_therapy: 2
  stage_requirements: ["Stage IV metastatic", "Post 1L progression"]
  biomarker_requirements_required:
    - biomarker_id: BIO-BRAF-V600E
      value_constraint: "positive"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-ENCORAFENIB-CETUXIMAB
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate:
    value: "~20% encorafenib + cetuximab doublet (vs 2% control, BEACON CRC)"
    source: SRC-BEACON-CRC-KOPETZ-2019
    notes: "BEACON CRC doublet arm ORR 20%; triplet (enco+bini+cetux) ORR 26%; doublet is preferred due to similar efficacy with less toxicity"
  complete_response:
    value: "~3% (BEACON CRC doublet arm)"
    source: SRC-BEACON-CRC-KOPETZ-2019
  progression_free_survival:
    value: "Median PFS ~4.3 mo (BEACON CRC doublet arm; HR 0.40 vs control)"
    source: SRC-BEACON-CRC-KOPETZ-2019
  overall_survival_5y:
    value: "mOS 8.4 mo doublet / 9.3 mo triplet vs 5.9 mo control (BEACON CRC)"
    source: SRC-BEACON-CRC-KOPETZ-2019
    notes: "Doublet mOS 8.4 mo; triplet mOS 9.3 mo (HR 0.60 vs control); doublet preferred per NCCN due to similar OS with less toxicity. Tabernero 2021 Ann Oncol update confirmed doublet as preferred."

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-BRAF-V600E
  - TEST-CT-CHEST-ABDOMEN-PELVIS

desired_tests: []

rationale: >
  BEACON CRC trial: in BRAF V600E mCRC 2L+, encorafenib + cetuximab
  doubled mOS vs irinotecan-based control. Treatment-defining for
  this 8-10% molecular subset. NCCN cat 1.

rationale_ua: >
  BEACON CRC дослідження: in BRAF V600E mCRC 2L+, енкорафеніб + цетуксимаб doubled mOS vs іринотекан-based control. лікування-defining for this 8-10% molecular subset. NCCN cat 1.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-BEACON-CRC-KOPETZ-2019
    position: supports
    relevant_quote_paraphrase: "BEACON CRC: encorafenib+binimetinib+cetuximab vs encorafenib+cetuximab vs irinotecan-based control in BRAF V600E mCRC 2L+; doublet ORR 20%, mOS 8.4 mo vs 5.9 mo control (HR 0.61)"
  - source_id: SRC-NCCN-COLON-2025
    position: supports
  - source_id: SRC-ESMO-COLON-2024
    position: supports

do_not_do:
  - "Do NOT use anti-EGFR (cetuximab/panitumumab) MONOTHERAPY in BRAF V600E — minimal benefit (BEACON control arm performance)"
  - "Do NOT skip skin dermatology surveillance (BRAFi class effect — new SCC + melanoma risk)"
  - "Do NOT continue through QTcF >500 ms without dose hold + ECG"

do_not_do_en:
  - "Do NOT use anti-EGFR (cetuximab/panitumumab) MONOTHERAPY in BRAF V600E — minimal benefit (BEACON control arm performance)"
  - "Do NOT skip skin dermatology surveillance (BRAFi class effect — new SCC + melanoma risk)"
  - "Do NOT continue through QTcF >500 ms without dose hold + ECG"
last_reviewed: "2026-04-26"
notes: "BRAF V600E mCRC 2L+ targeted track. 1L for BRAF V600E remains FOLFOX+bev or FOLFOXIRI+bev intensification."
