id: IND-CRC-METASTATIC-2L-KRAS-G12C-SOTORASIB-CETUXIMAB
plan_track: aggressive

applicable_to:
  disease_id: DIS-CRC
  line_of_therapy: 2
  stage_requirements:
    - "Stage IV metastatic mCRC"
    - "Disease progression after 1L (typically FOLFOX/FOLFIRI ± biologic)"
  biomarker_requirements_required:
    - biomarker_id: BIO-KRAS-G12C
      required: true
      value_constraint: "G12C-positive (covalent inhibitor target)"
  biomarker_requirements_excluded:
    - biomarker_id: BIO-MSI-STATUS
      value_constraint: "MSI-H excluded — pembrolizumab supersedes (separate algorithm step)"
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-SOTORASIB-CETUXIMAB-CRC
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "2A"

expected_outcomes:
  overall_response_rate:
    value: "~26% (CodeBreaK 300, sotorasib 960 mg + panitumumab arm; ORR 26.4%)"
    source: SRC-CODEBREAK-300-FAKIH-2023
    notes: "CodeBreaK 300 used panitumumab (not cetuximab); cetuximab is clinically equivalent anti-EGFR and used per NCCN. ORR 26% for sotorasib 960 mg arm vs 2% investigator-choice."
  complete_response:
    value: "~0% (CodeBreaK 300 — no CRs in primary analysis)"
    source: SRC-CODEBREAK-300-FAKIH-2023
  progression_free_survival:
    value: "Median PFS 5.6 mo (CodeBreaK 300, sotorasib 960 mg arm vs 2.2 mo investigator-choice, HR 0.49)"
    source: SRC-CODEBREAK-300-FAKIH-2023
  overall_survival_5y:
    value: "OS data immature at primary analysis; 1-year OS estimate ~50% (CodeBreaK 300)"
    source: SRC-CODEBREAK-300-FAKIH-2023
    notes: "Interim OS from CodeBreaK 300; mature OS data pending; trend favors sotorasib combination over investigator-choice chemo"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-CRC-FRAILTY-AGE

required_tests:
  - TEST-NGS-COMPREHENSIVE  # KRAS G12C detection — broad NGS panel preferred for co-mutation context
  - TEST-RAS-EXTENDED
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT  # sotorasib hepatotoxicity surveillance
  - TEST-CEA
  - TEST-CT-CHEST-ABDOMEN-PELVIS
desired_tests: []

rationale: >
  Sotorasib + cetuximab for KRAS G12C-mutant mCRC in 2L+. CodeBreaK 300
  Phase III (2024): combination doubled mPFS (5.6 vs 2.2 mo, HR 0.49)
  vs investigator-choice chemo (TAS-102 / regorafenib) in chemo-
  refractory KRAS G12C+ mCRC. KRAS G12C occurs in ~3-4% of mCRC.
  Mechanistic rationale for cetuximab combination: KRAS G12C inhibition
  triggers EGFR feedback reactivation; concurrent EGFR blockade
  prevents bypass. Single-agent sotorasib 960 mg arm also met PFS
  endpoint vs control but combination was superior. Position:
  aggressive-track 2L+/3L+ for the small KRAS G12C+ subset; FDA-
  approved combination 2024. ESCAT IB. UA access barrier: sotorasib
  not registered in Ukraine (named-patient / EAP only); cetuximab
  registered but not NSZU-funded for CRC RAS-mutant indication.

sources:
  - source_id: SRC-CODEBREAK-300-FAKIH-2023
    position: supports
    relevant_quote_paraphrase: "CodeBreaK 300 Phase 3: sotorasib 960 mg + panitumumab vs sotorasib 240 mg + panitumumab vs investigator-choice in KRAS G12C+ mCRC 2L+; ORR 26% vs 2%, mPFS 5.6 vs 2.2 mo (HR 0.49)"
  - source_id: SRC-NCCN-COLON-2025
    position: supports
    relevant_quote_paraphrase: "Sotorasib + cetuximab is a recommended option for KRAS G12C-mutant mCRC in 2L+ (CodeBreaK 300); FDA-approved 2024"
  - source_id: SRC-ESMO-COLON-2024
    position: supports
    relevant_quote_paraphrase: "KRAS G12C inhibitors combined with anti-EGFR represent a new standard for KRAS G12C+ mCRC 2L+; sotorasib + cetuximab and adagrasib + cetuximab both active"

known_controversies:
  - topic: "Sotorasib + cetuximab vs adagrasib + cetuximab for KRAS G12C+ mCRC"
    positions:
      - position: "Sotorasib + cetuximab: Phase III CodeBreaK 300 PFS-positive; FDA approval 2024"
        sources: [SRC-NCCN-COLON-2025]
      - position: "Adagrasib + cetuximab (KRYSTAL-1): Phase II ORR ~46%; CNS-active; awaiting Phase III"
        sources: [SRC-NCCN-COLON-2025]
        evidence_note: "Adagrasib has CNS penetration advantage; sotorasib has Phase III evidence"
    our_default: "Sotorasib + cetuximab as default (Phase III evidence); adagrasib + cetuximab alternative for CNS-involvement OR sotorasib intolerance"
    rationale: "Phase III evidence + FDA approval favor sotorasib combination as default"

do_not_do:
  - "НЕ призначати без верифікованого KRAS G12C статусу — інші KRAS варіанти (G12D, G12V, G13D) не відповідають."
  - "НЕ використовувати sotorasib в комбінації з PPI — significantly зменшує absorption (acid-dependent dissolution)."
  - "НЕ розпочинати без baseline LFTs — sotorasib hepatotoxicity ~25% transaminase elevation."
  - "НЕ комбінувати з strong CYP3A4 inducers — sotorasib levels знижуються."
  - "НЕ ігнорувати acneiform rash management — cetuximab require tetracycline + topical clindamycin protocol."
  - "НЕ продовжувати sotorasib при Grade 3+ hepatic AE — hold + reduce dose або discontinue."
  - "НЕ підтверджувати план без funding pathway — sotorasib не зареєстрований в UA; cetuximab не реімбурсується для RAS-mut."

do_not_do_en:
  - "Do NOT prescribe without verified KRAS G12C status — other KRAS variants (G12D, G12V, G13D) do not respond."
  - "Do NOT use sotorasib in combination with PPI — significantly reduces absorption (acid-dependent dissolution)."
  - "Do NOT initiate without baseline LFTs — sotorasib hepatotoxicity ~25% transaminase elevation."
  - "Do NOT combine with strong CYP3A4 inducers — sotorasib levels reduced."
  - "Do NOT ignore acneiform rash management — cetuximab requires tetracycline + topical clindamycin protocol."
  - "Do NOT continue sotorasib with Grade 3+ hepatic AE — hold + reduce dose or discontinue."
  - "Do NOT confirm the plan without funding pathway — sotorasib not registered in UA; cetuximab not reimbursed for RAS-mut."
time_critical: false
last_reviewed: "2026-04-27"
reviewers: []
reviewer_signoffs: 0
