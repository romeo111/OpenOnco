rationale: 'Anti-EGFR rechallenge at 3L+ in RAS wild-type left-sided mCRC is supported by ctDNA-guided trials (CHRONOS, CRICKET, CAVE, REMARRY/PURSUIT). Mechanism: clones bearing acquired RAS/EGFR-ECD mutations decay during anti-EGFR-free intervals (≥4 mo); reintroducing anti-EGFR re-engages RAS-WT clones for meaningful but transient response. CHRONOS (Sartore-Bianchi 2022 Nat Med): ctDNA-RAS-WT-selected patients ORR 30%, mPFS 3.6 mo. CRICKET (Cremolini 2019 JAMA Oncol): ORR 21%, mPFS 4.0 mo. ctDNA testing essential — without it, ORR drops to ~5-10%. Rechallenge is alternative to regorafenib / TAS-102 / fruquintinib in 3L+ RAS-WT pathway. Skin toxicity, hypomagnesemia, infusion reactions all class-specific. STUB regimen — no dedicated REG- entity for cetuximab rechallenge yet; flagged for REG follow-up.'
rationale_ua: >
  Повторне застосування анти-EGFR (Anti-EGFR rechallenge) при 3L+ у RAS-WT лівобічному
  мКРТ підтримане ctDNA-скерованими дослідженнями (CHRONOS, CRICKET, CAVE, REMARRY/PURSUIT).
  Механізм: клони з набутими RAS/EGFR-ECD мутаціями згасають під час анти-EGFR-вільних
  інтервалів (>=4 міс.); повторне введення анти-EGFR залучає RAS-WT клони.
  CHRONOS (Sartore-Bianchi 2022 Nat Med): ctDNA RAS-WT відібрані пацієнти ЧЗВ 30%,
  мВБП 3.6 міс. CRICKET (Cremolini 2019 JAMA Oncol): ЧЗВ 21%, мВБП 4.0 міс.
  Тестування ctDNA є необхідним — без нього повторне призначення не підтримується (ЧЗВ ~5-10%).
  Рехалендж (rechallenge) — альтернатива регорафенібу / TAS-102 / фруквінтинібу в 3L+ RAS-WT
  шляху. Немає злиття (fusion) FGFR2 — не впливає на відбір для рехаленджу.
  Шкірна токсичність (цетуксимаб (cetuximab) і панітумумаб), гіпомагнезіємія, інфузійні реакції — класово-специфічні.
  Барєр доступу в Україні: ctDNA NGS не рефундується НСЗУ.
