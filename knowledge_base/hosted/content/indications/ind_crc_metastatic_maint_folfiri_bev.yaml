rationale: 'De-escalation to maintenance after 6-8 induction cycles of oxaliplatin- or irinotecan-based doublet + bevacizumab is NCCN/ESMO standard for unresectable mCRC responders. CAIRO3 (Simkens 2015 Lancet) established capecitabine + bevacizumab maintenance superiority over observation (mPFS 8.5 vs 4.1 mo); AIO 0207 (Hegewisch-Becker 2015) confirmed bevacizumab ± fluoropyrimidine maintenance vs full pause. Maintenance drug typically capecitabine + bevacizumab OR 5FU/LV + bevacizumab; full FOLFOX/FOLFIRI is NOT continued as maintenance (cumulative neuropathy/diarrhea). Reintroduction of oxaliplatin/irinotecan upon progression is standard. STUB regimen — no dedicated REG- entity for capecitabine+bev maintenance yet; flagged for REG follow-up.'
rationale_ua: >
  Деескалація до підтримуючої терапії (maintenance) після 6-8 циклів індукції з
  оксаліплатин- або іринотекан-вмісним дублетом + бевацизумаб — стандарт NCCN/ESMO для
  нерезектабельного мКРТ у відповідачів. CAIRO3 (Simkens 2015 Lancet): капецитабін + бевацизумаб
  перевершили спостереження (мВБП 8.5 проти 4.1 міс.); AIO 0207 підтвердив. Підтримуюча
  хіміотерапія (maintenance chemotherapy): зазвичай капецитабін + бевацизумаб АБО
  5-FU/LV + бевацизумаб; повна FOLFOX/FOLFIRI НЕ продовжується як підтримка
  (кумулятивна нейропатія/діарея). Повторне введення оксаліплатину/іринотекану при
  прогресуванні є стандартом. Відсутній окремий REG- для капецитабін+бев підтримки;
  використовується існуючий REG або клінічний вибір.
