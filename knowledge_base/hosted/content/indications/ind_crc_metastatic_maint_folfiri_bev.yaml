sources:
  - source_id: SRC-NCCN-COLON-2025
    position: supports
    relevant_quote_paraphrase: After 4-6 mo of 1L doublet + bev induction with response/SD, de-escalation to fluoropyrimidine + bevacizumab maintenance is preferred to limit cumulative oxaliplatin neuropathy
  - source_id: SRC-ESMO-COLON-2024
    position: supports
    relevant_quote_paraphrase: Maintenance with 5FU/capecitabine + bevacizumab after induction response is recommended for unresectable mCRC; full doublet continuation is not advised due to toxicity
known_controversies:
  - topic: Maintenance vs full pause (chemo holiday) after induction response in mCRC
    positions:
      - position: Active maintenance — PFS gain (CAIRO3, AIO 0207)
        sources:
          - SRC-NCCN-COLON-2025
      - position: Full pause acceptable for selected patients with deep response — improved QoL
        sources:
          - SRC-ESMO-COLON-2024
        evidence_note: OPTIMOX trials suggested feasibility of stop-and-go strategy
    our_default: Active maintenance (capecitabine + bevacizumab) for fit patients with adequate response; full pause for frail / patient preference / deep CR
    rationale: PFS gain modest but QoL/neuropathy avoidance vs continued doublet is the dominant consideration
do_not_do:
  - НЕ продовжувати full FOLFOX як maintenance — cumulative oxaliplatin neuropathy >7-12 мг/м² є irreversible у >30% пацієнтів.
  - НЕ продовжувати irinotecan-base maintenance — diarrhea cumulative ризик; бажаний switch до fluoropyrimidine + bev.
  - НЕ припиняти bevacizumab без причини — meta-analysis підтверджує PFS внесок під час maintenance.
  - НЕ ігнорувати протеїнурію + гіпертензію moнitоринг — bev-class effect триває впродовж maintenance.
  - НЕ continued bev при non-healing wound, GI fistula, або recent major surgery — hold ≥4 тижні.
  - НЕ забути screening для аневризм + arterial thromboembolism у пацієнтів старше 65.
do_not_do_en:
  - "Do NOT continue full FOLFOX as maintenance — cumulative oxaliplatin neuropathy >7-12 mg/m² is irreversible in >30% of patients."
  - "Do NOT continue irinotecan-based maintenance — diarrhea cumulative risk; preferred switch to fluoropyrimidine + bev."
  - "Do NOT discontinue bevacizumab without reason — meta-analysis confirms PFS contribution during maintenance."
  - "Do NOT ignore proteinuria + hypertension monitoring — bev-class effect persists throughout maintenance."
  - "Do NOT continue bev with non-healing wound, GI fistula, or recent major surgery — hold ≥4 weeks."
  - "Do NOT forget screening for aneurysms + arterial thromboembolism in patients over 65."
