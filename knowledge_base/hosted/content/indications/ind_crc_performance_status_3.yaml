rationale: 'Patients with metastatic CRC and ECOG 3-4 (≥50% time in bed; care-dependent) have limited evidence
  base. Best supportive care + early palliative care consultation is the foundation. Active therapy decisions
  require detailed patient + family discussion of goals of care, prognosis (median OS 4-8 mo from this
  point), and treatment burden vs benefit. When active therapy is elected, capecitabine monotherapy (1000-1250
  mg/m² PO BID d1-14 q21) is the most-tolerated option — oral, no infusion required, modest ORR ~10-15%,
  occasional response duration. Bevacizumab can be added if ECOG would tolerate IV infusion + has no contraindications.
  Avoid: combination chemo, anti-EGFR (skin toxicity burden), regorafenib (hand-foot syndrome). Hospice
  referral is appropriate when ECOG ≥3 + life expectancy <6 months + active therapy declined. Symptom
  management focus: pain (WHO ladder), bowel obstruction (stenting, palliative ostomy, octreotide), nausea
  (5HT3 + dexamethasone), ascites (paracentesis ± tunneled drain), depression/anxiety (SSRI + counseling).
  STUB regimen — no dedicated REG-CAPECITABINE-PALLIATIVE entity yet; flagged for REG follow-up.'
