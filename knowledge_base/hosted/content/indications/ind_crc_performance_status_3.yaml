    sources:
    - SRC-ESMO-COLON-2024
  our_default: Best supportive care + palliative care consultation + hospice discussion as primary; capecitabine
    monotherapy if patient elects active therapy after informed consent
  rationale: Active therapy benefit minimal for ECOG ≥3; patient-centered decision-making is dominant;
    early palliative care improves QoL + may extend OS
do_not_do:
- НЕ використовувати combination chemo (FOLFOX, FOLFIRI) при ECOG ≥3 — toxicity непомірна; може скоротити
  OS.
- НЕ призначати bevacizumab при non-healing wound, GI fistula, або recent perforation — particularly in
  rapidly declining ECOG.
- НЕ використовувати anti-EGFR (cetuximab/panitumumab) — skin toxicity burden у frail непомірний.
- НЕ продовжувати capecitabine при grade 3 hand-foot syndrome або diarrhea — discontinue + switch до supportive
  care.
- НЕ забути hospice + palliative care consultation — improve QoL, polypharmacy review, advance directives.
- НЕ ігнорувати depression / anxiety — ECOG 3-4 пацієнти high-risk; SSRI + counseling.
- "НЕ відстрочувати goals-of-care discussion — prognosis обмежена; family conversations critical."
do_not_do_en:
  - "Do NOT use combination chemo (FOLFOX, FOLFIRI) with ECOG ≥3 — toxicity unbearable; may shorten OS."
  - "Do NOT prescribe bevacizumab with non-healing wound, GI fistula, or recent perforation — particularly in rapidly declining ECOG."
  - "Do NOT use anti-EGFR (cetuximab/panitumumab) — skin toxicity burden in frail unbearable."
  - "Do NOT continue capecitabine with grade 3 hand-foot syndrome or diarrhea — discontinue + switch to supportive care."
  - "Do NOT forget hospice + palliative care consultation — improve QoL, polypharmacy review, advance directives."
  - "Do NOT ignore depression / anxiety — ECOG 3-4 patients high-risk; SSRI + counseling."
  - "Do NOT delay goals-of-care discussion — prognosis limited; family conversations critical."
