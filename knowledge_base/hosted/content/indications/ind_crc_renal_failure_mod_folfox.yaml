rationale: 'In CRC patients with severe renal impairment (CrCl <30 mL/min), key cytotoxic agent modifications:
  (1) OXALIPLATIN: omit OR reduce dose by 25-50% — neurotoxicity worsens with renal-related neuropathy
  + accumulation; meta-analyses suggest dose reduction safer than omission. (2) IRINOTECAN: dose reduction
  (75-50% of standard) for CrCl <30; SN-38 metabolite accumulation risk. (3) CAPECITABINE: avoid OR substantially
  reduce (CrCl <30 contraindication per FDA label; severe diarrhea + cytopenia risk). Use IV 5FU + leucovorin
  (LV5FU2 schedule) instead. (4) BEVACIZUMAB: continue with proteinuria + BP monitoring; nephrotic syndrome
  contraindication. (5) ANTI-EGFR (cetuximab/panitumumab): no renal adjustment needed; preferred over capecitabine-based
  regimens in CKD. (6) REGORAFENIB: no formal CKD adjustment but monitor for hand-foot, hypertension. (7)
  TAS-102 (trifluridine-tipiracil): no formal CKD adjustment for CrCl ≥15. Default modified regimen: 5FU/LV
  + bevacizumab (no oxaliplatin or capecitabine) for fit patients; sequential 5FU/LV for ECOG 2 / CrCl
  <15 (dialysis discussion). Multidisciplinary nephrology consultation mandatory. STUB regimen — no dedicated
  REG- entity for CKD-modified FOLFOX yet; flagged for REG follow-up.'
sources:
- source_id: SRC-NCCN-COLON-2025
  position: supports
  relevant_quote_paraphrase: For mCRC patients with significant renal impairment, modified regimens (omit
    capecitabine, reduce oxaliplatin or omit; use IV 5FU/LV; cetuximab unaffected by CKD) are preferred;
    nephrology consultation mandatory
- source_id: SRC-ESMO-COLON-2024
  position: supports
  relevant_quote_paraphrase: CKD in mCRC requires individualized regimen modification; capecitabine contraindicated
    for CrCl <30; cetuximab + IV 5FU/LV preferred backbone for severe CKD
known_controversies:
- topic: Oxaliplatin dose reduction vs omission in severe CKD mCRC
  positions:
  - position: Reduce oxaliplatin dose 25-50% — preserve doublet efficacy
    sources:
    - SRC-NCCN-COLON-2025
  - position: Omit oxaliplatin entirely — accumulation + neurotoxicity unpredictable
    sources:
    - SRC-ESMO-COLON-2024
  our_default: Reduce oxaliplatin to 65 mg/m² for CrCl 30-50; further reduce to 50 mg/m² for CrCl 15-30;
    omit for CrCl <15
  rationale: Dose modification preserves efficacy; complete omission may not be needed for mild-moderate
    CKD
do_not_do:
- "НЕ використовувати capecitabine при CrCl <30 — FDA contraindication; severe GI + cytopenia ризик."
- НЕ продовжувати oxaliplatin при ≥grade 3 нейропатії — кумулятивна neuropathy + uremia може бути irreversible.
- НЕ використовувати irinotecan повну дозу — SN-38 accumulation; reduce 25-50%.
- НЕ комбінувати NSAIDs + bevacizumab при CKD — adjunctive nephrotoxicity ризик.
- НЕ забути nephrology консультацію — adjusted dosing + monitoring schedule + dialysis preparation.
- НЕ ігнорувати magnesium / potassium dysregulation з cetuximab + CKD — class effect amplified.
- НЕ продовжувати bevacizumab при nephrotic syndrome (UPCR >3.5 g/g) — discontinue.
do_not_do_en:
  - "Do NOT use capecitabine when CrCl <30 — FDA contraindication; severe GI + cytopenia risk."
  - "Do NOT continue oxaliplatin with ≥grade 3 neuropathy — cumulative neuropathy + uremia may be irreversible."
  - "Do NOT use full-dose irinotecan — SN-38 accumulation; reduce 25-50%."
  - "Do NOT combine NSAIDs + bevacizumab in CKD — adjunctive nephrotoxicity risk."
  - "Do NOT forget nephrology consultation — adjusted dosing + monitoring schedule + dialysis preparation."
  - "Do NOT ignore magnesium / potassium dysregulation with cetuximab + CKD — class effect amplified."
  - "Do NOT continue bevacizumab with nephrotic syndrome (UPCR >3.5 g/g) — discontinue."
