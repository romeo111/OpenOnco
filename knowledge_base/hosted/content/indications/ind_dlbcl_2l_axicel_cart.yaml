do_not_do:
  - "CD19 ретест при рецидиві: CDK19 може бути втрачений (рідко) — підтвердити CD19+ перед апаферезом"
  - "Активна ЦНС-лімфома: аксі-сел виключений (висока токсичність ICANS); спочатку IT метотрексат + RT → реоцінка"
  - "Якщо ризик ICANS високий (похилий вік, попередня ЦНС, висока ЛДГ): розглянути лізо-сел (нижчий ICANS G≥3 ~4%)"
  - "В Україні: не існує вітчизняного CAR-T центру — міжнародне направлення обов'язкове (ЄС/Ізраїль)"
  - "Пізній рецидив (>12 міс): аксі-сел не вивчений; аутоТГСК з R-ICE/DHAP зберігає Cat 1"

