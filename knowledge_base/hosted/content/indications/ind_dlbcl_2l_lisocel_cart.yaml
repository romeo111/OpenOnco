rationale: >
  Lisocabtagene maraleucel (liso-cel; Breyanzi) is a CD19-targeted CAR-T
  with defined 1:1 CD4:CD8 cell composition and 4-1BB costimulation,
  approved for primary-refractory LBCL or relapse <12 months from
  completion of first-line therapy in transplant-intended 2L setting
  (TRANSFORM phase 3 RCT). TRANSFORM (Kamdar et al., Lancet 2022;
  long-term update Abramson et al., Blood 2023): liso-cel superior to
  standard-of-care salvage chemo + autoSCT — median EFS 10.1 vs 2.3 mo
  (HR ~0.36), CR ~74% vs ~43%, ORR ~86%, PFS substantially extended; OS
  trend favourable but crossover-confounded. Boxed warnings: CRS, ICANS,
  secondary T-cell malignancy (FDA 2024 class label). Eligibility
  narrower than 3L liso-cel (TRANSCEND): primary-refractory or
  early-relapse + transplant-intent. CRS profile favourable (G≥3 ~2%,
  ICANS G≥3 ~10% per TRANSCEND mirroring) makes liso-cel the preferred
  CAR-T product where access exists. Distinct from REGIMEN-LISOCEL-DLBCL-3L
  (TRANSCEND, ≥3L any-comer). Ukraine context: not registered, no
  domestic CAR-T manufacturing or accredited centres; international
  referral pathway (Israel / Poland / Germany / Spain) required at
  USD 350-500K all-in cost. For Ukrainian patients with primary-refractory
  or early-relapse DLBCL who cannot access CAR-T, salvage chemo
  (R-DHAP / R-ICE / R-GDP) + autoSCT remains the standard fallback.

rationale_ua: >
  Лісокабтаген маралейцел (liso-cel; Breyanzi) - CD19-таргетована CAR-T
  з визначеним 1:1 співвідношенням CD4:CD8 та 4-1BB костимуляцією,
  схвалена для первинно рефрактерної ЛВКЛ або рецидиву <12 місяців від
  завершення першої лінії (перша лінія) терапії у трансплант-намірних 2L пацієнтів
  (TRANSFORM фаза 3 РКД). TRANSFORM (Kamdar et al., Lancet 2022;
  довготривале оновлення Abramson et al., Blood 2023): liso-cel перевершує
  стандарт сальвадж-ХТ + аутоТГСК - медіана EFS 10.1 проти 2.3 міс
  (HR ~0.36), ПВ ~74% проти ~43%, ORR ~86%, ВБП суттєво подовжений;
  тренд ЗВ сприятливий, але плутаний кросовером. Рецидивний/рефрактерний
  (relapsed/refractory) ЛВКЛ, первинно рефрактерний або ранньо-рецидивний
  (<12 міс від першої лінії) - основний контингент TRANSFORM. Спеціальні
  попередження: CRS, ICANS, вторинне Т-клітинне злоякісне новоутворення
  (клас-маркер FDA 2024). Критерії вужчі ніж у 3L liso-cel (TRANSCEND):
  первинно рефрактерний або ранній рецидив + намір трансплантації.
  Профіль CRS сприятливий (G>=3 ~2%, ICANS G>=3 ~10%) робить liso-cel
  переважним CAR-T продуктом за наявності доступу.
  Контекст України: не зареєстрований, немає вітчизняного CAR-T
  виробництва або акредитованих центрів; необхідне міжнародне
  направлення (Ізраїль / Польща / Німеччина / Іспанія) при загальній
  вартості ~USD 350-500 тис. Сальвадж-ХТ (R-DHAP / R-ICE / R-GDP)
  + аутоТГСК - стандартний резервний варіант без доступу до CAR-T.
