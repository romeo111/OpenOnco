    position: supports
    relevant_quote_paraphrase: "CORAL (n=396): R-ICE vs R-DHAP × 3 → BEAM-autoSCT in r/r DLBCL; ORR ~63% each; 3yr EFS 26-35% (NS); autoSCT 3yr PFS ~42%; NCCN Cat 1"
  - source_id: SRC-NCCN-BCELL-2025
    position: supports

do_not_do:
  - "Не переходити до аутоТКМ при відсутності відповіді на сальваж-хіміотерапію (<PR після 2-3 циклів) — аутоТКМ неефективний при хіміорефрактерній ДВККЛП"
  - "При ранньому рецидиві (≤12 міс від 1L): розглянути аксі-sel CAR-T (ZUMA-7; EFS HR 0.40 vs R-ICE→аутоТКМ) — MDT обговорення"
  - "Не ігнорувати месну при іфосфаміді — обов'язкова захист від уротоксичності"
  - "Не переходити до BEAM без ECHO (ФВ ≥50% обов'язково для BCNU-кондиціонування)"

time_critical: true
time_critical_note: "Salvage response assessment (PET/CT after cycle 2) is time-sensitive; delay risks disease progression precluding autoSCT eligibility"
