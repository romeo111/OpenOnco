id: IND-DLBCL-3L-EPCORITAMAB
plan_track: aggressive

applicable_to:
  disease_id: DIS-DLBCL-NOS
  line_of_therapy: 3
  stage_requirements:
    - "Relapsed / refractory DLBCL after ≥2 prior systemic lines (1L R-CHOP / Pola-R-CHP, 2L salvage chemo ± autoSCT, pola-R-bendamustine, or CAR-T)"
    - "CD20 positive on most recent biopsy (immunohistochemistry or flow cytometry)"
    - "ECOG 0-2 (EPCORE NHL-1 enrolment)"
    - "Adequate organ function (ANC ≥1.0, plt ≥75, AST/ALT ≤3× ULN, bilirubin ≤2× ULN, eGFR ≥45)"
    - "Includes patients ineligible for or relapsed after CD19 CAR-T (~39% of EPCORE NHL-1 cohort had prior CAR-T)"
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: "CD20 positive on most recent biopsy (loss of CD20 after prior anti-CD20 therapy is exclusion)"
  biomarker_requirements_excluded: []
  demographic_constraints:
    age_min: 18
    ecog_max: 2

recommended_regimen: REGIMEN-EPCORITAMAB-MONO-DLBCL-3L
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~63% (EPCORE NHL-1; n=157, ≥3L r/r LBCL with ~39% prior CAR-T)"
  complete_response: "~39%"
  progression_free_survival: "Median PFS ~4.4 months overall; substantially longer in CR responders (median DOR ~12 months)"
  overall_survival_5y: "OS not reached at primary analysis; 12-month OS ~50% in pooled bispecific cohorts"

hard_contraindications:
  - CI-ACTIVE-INFECTION-FOR-ALEMTUZUMAB
  - CI-HBV-NO-PROPHYLAXIS

red_flags_triggering_alternative:
  - RF-DLBCL-CD20-POS-EPCORITAMAB-CANDIDATE
  - RF-DLBCL-CART-INELIGIBLE-POST-2L
  - RF-DLBCL-CNS-RISK
  - RF-DLBCL-INFECTION-SCREENING

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
  - TEST-CD20-IHC
  - TEST-PET-CT
  - TEST-ECHO
  - TEST-IMMUNOGLOBULINS
  - TEST-LN-CORE-BIOPSY
  - TEST-FLOW-CYTOMETRY
  - TEST-PREGNANCY
desired_tests:
  - TEST-MRI-BRAIN-CONTRAST

rationale: >
  Epcoritamab (Epkinly / Tepkinly) is a subcutaneous CD20×CD3 bispecific
  T-cell engager for relapsed/refractory DLBCL after ≥2 prior systemic
  lines, including patients ineligible for or relapsed after CD19 CAR-T.
  EPCORE NHL-1 (Thieblemont et al., J Clin Oncol 2023; n=157, ~39% prior
  CAR-T): ORR ~63%, CR ~39%, median DOR ~12 months, median PFS ~4.4 mo.
  Step-up dosing (0.16 → 0.8 → 48 mg) + cycle-1 corticosteroid prophylaxis
  reduce CRS to predominantly Grade 1-2 (any-grade ~50%, G≥3 ~3%); ICANS
  ~6% any-grade. SC route + ambulatory schedule favourable vs IV
  bispecifics for outpatient-heavy practices. Continuous indefinite dosing
  is the principal sequencing trade-off vs fixed-duration glofitamab.
  Ukraine context: not registered, no NSZU pathway; international
  clinical trial / compassionate use only. Cycle 1 day 15 first 48 mg
  full dose requires 24h hospital monitoring for CRS observation.
  Aggressive-track 3L+ option preferred when CAR-T is unavailable,
  declined, or has failed.

rationale_ua: >
  Рецидивний/рефрактерний (relapsed/refractory) ДВКЛ після >=2 попередніх системних
  ліній - основне показання для епкоритамабу (epcoritamab; Epkinly / Tepkinly),
  підшкірного CD20xCD3 біспецифічного Т-клітинного енгейджера, включно з
  пацієнтами, непридатними для CD19 CAR-T або з рецидивом після нього.
  Фаза 2 дослідження EPCORE NHL-1 (Thieblemont et al., J Clin Oncol 2023;
  n=157, ~39% попередня CAR-T): ORR ~63%, ПВ ~39%, медіана DOR ~12 міс,
  медіана ВБП ~4.4 міс. Покрокове дозування (0.16 -> 0.8 -> 48 mg) +
  кортикостероїдна профілактика циклу 1 знижують CRS переважно до 1-2 ступеня
  (будь-який ступінь ~50%, G>=3 ~3%); ICANS ~6% будь-якого ступеня.
  Підшкірний шлях + амбулаторний графік - перевага порівняно з IV біспецифіками.
  Безперервне невизначене дозування - головний компроміс послідовності
  проти фіксованого глофітамабу. Перша повна доза 48 mg (цикл 1 день 15)
  потребує 24-годинного лікарняного моніторингу для CRS. Злиття
  (fusion/translocation) не впливає на критерії відбору (CD20-позитивність
  є ключовим). NCCN Категорія 2A. Агресивний 3L+ варіант, переважний
  за відсутності, відмові або неуспіху CAR-T.
  Контекст України: не зареєстрований, немає шляху НСЗУ;
  лише міжнародне клінічне дослідження або compassionate use.
