sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "Epcoritamab is a Category 2A preferred third-line+ option for r/r DLBCL after ≥2 prior systemic lines per EPCORE NHL-1; available for CAR-T-ineligible / post-CAR-T relapse populations."
  - source_id: SRC-ESMO-LYMPHOMA-2025
    position: supports
    relevant_quote_paraphrase: "CD20×CD3 bispecific T-cell engagers (epcoritamab, glofitamab) are recommended therapeutic options for r/r DLBCL after ≥2 prior lines, including patients with prior CAR-T exposure."

known_controversies:
  - topic: "Epcoritamab vs glofitamab vs CAR-T for r/r DLBCL ≥3L"
    positions:
      - position: "Epcoritamab — subcutaneous, continuous indefinite dosing, ambulatory-friendly; preferred where outpatient pathway desired and indefinite therapy acceptable"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Glofitamab — IV, fixed 12-cycle duration with treatment-free interval; preferred where finite-duration therapy desired"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "CD19 CAR-T (axi-cel, liso-cel) — single infusion, durable remissions in ~40%, but requires accredited centre + manufacturing window; bispecifics preferred when CAR-T unavailable / declined / failed"
        sources: [SRC-ESMO-LYMPHOMA-2025]
    our_default: "Bispecific (epcoritamab or glofitamab) preferred over CAR-T in Ukrainian context due to absence of domestic CAR-T capacity; epcoritamab preferred if SC ambulatory dosing valued and indefinite therapy acceptable; glofitamab if finite-duration valued."
    rationale: >
      In Ukraine all three modalities require international referral or
      compassionate-use access; bispecifics may be more feasible than
      CAR-T given no manufacturing infrastructure required and lower
      total cost. Selection between epcoritamab and glofitamab driven
      by route (SC vs IV), schedule (continuous vs fixed 12-cycle), and
      partner-centre availability.

do_not_do:
  - "НЕ призначати без cycle-1 corticosteroid prophylaxis (preднізолон 100 мг ПО/ВВ + ацетамінофен + дифенгідрамін перед кожною step-up дозою) — істотно знижує ризик CRS."
  - "НЕ пропускати 24-годинне лікарняне спостереження для першої повної дози 48 мг (цикл 1 день 15) — fatal CRS можливе без on-site моніторингу."
  - "НЕ розпочинати без on-site tocilizumab (мінімум 2 дози) — стандартна терапія CRS Grade ≥2."
  - "НЕ ігнорувати pre-treatment HBV / HCV / HIV скринінг — реактивація HBV вимагає entecavir / tenofovir prophylaxis при HBcAb+."
  - "НЕ призначати при active uncontrolled infection — імунодеплеція + CRS = high mortality."
  - "НЕ забувати про PJP / HSV профілактику + IVIG (якщо IgG <400 + рецидивні інфекції) — гіпогаммаглобулінемія + B-cell aplasia спостерігаються довготривало."
  - "НЕ вводити без перевірки CD20 позитивності на найбільш свіжій біопсії — втрата CD20 після попередньої anti-CD20 терапії = absolute exclusion."

