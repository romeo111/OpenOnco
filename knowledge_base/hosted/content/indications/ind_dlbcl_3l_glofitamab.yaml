rationale: >
  Glofitamab (Columvi) is an IV CD20×CD3 bispecific T-cell engager
  with 2:1 CD20-bivalent / CD3-monovalent format and fixed 12-cycle
  duration for relapsed/refractory DLBCL after ≥2 prior systemic lines,
  including patients ineligible for or relapsed after CD19 CAR-T.
  NP30179 pivotal phase 2 (Dickinson et al., NEJM 2022; n=155, ~33%
  prior CAR-T): ORR ~52%, CR ~39%, median CR DOR not reached, 12-month
  PFS among CR responders ~71%, OS at 12 months ~50%. Obinutuzumab
  1000 mg IV pretreatment day -7 + cycle-1 step-up dosing (2.5 → 10 →
  30 mg) + corticosteroid premedication suppress CRS to predominantly
  Grade 1-2 (any-grade ~63%, G≥3 ~4%); ICANS ~8% any-grade.
  Distinguishing feature vs epcoritamab is fixed 12-cycle duration
  (~8.5 months from cycle 1 day 1) vs continuous indefinite dosing —
  improves treatment-free interval + immune reconstitution but raises
  re-treatment-on-progression question (not established).
  Ukraine context: not registered, no NSZU pathway; obinutuzumab is
  domestically registered for FL but its use as glofitamab pretreatment
  is off-label without partner drug. International clinical trial /
  compassionate use only at this time.

rationale_ua: >
  Глофітамаб (glofitamab; Columvi) - внутрішньовенний CD20xCD3 біспецифічний
  Т-клітинний енгейджер з форматом 2:1 (CD20-двовалентний / CD3-моновалентний)
  та фіксованою тривалістю 12 циклів (~8.5 міс) для рецидивного/рефрактерного
  (relapsed/refractory) ДВКЛ після >=2 попередніх системних ліній, включно з
  пацієнтами, непридатними для CD19 CAR-T або з рецидивом після нього.
  Дослідження NP30179 - опорне дослідження фаза 2 (Dickinson et al., NEJM 2022;
  n=155, ~33% попередня CAR-T): ORR ~52%, ПВ ~39%, медіана DOR у пацієнтів
  з ПВ не досягнута, 12-місячний ВБП серед пацієнтів з ПВ ~71%, ЗВ на 12 міс ~50%.
  Обов'язковий преттрітмент обінутузумабом 1000 mg IV у день -7 + покрокове
  дозування циклу 1 (2.5 -> 10 -> 30 mg) + кортикостероїдна премедикація
  знижують CRS переважно до 1-2 ступеня (будь-який ступінь ~63%, G>=3 ~4%);
  ICANS ~8% будь-якого ступеня. NCCN Категорія 2A.
  Злиття (fusion/translocation) не впливає на критерії відбору (CD20-позитивність
  є ключовим). Ключова відмінність від епкоритамабу: фіксована тривалість 12 циклів
  проти безперервного невизначеного дозування - покращує інтервал без лікування
  + імунну реконституцію, але порушує питання повторної терапії при прогресії
  (не встановлено). Рецидивний/рефрактерний ДВКЛ після >=2 ліній - основне показання.
  Контекст України: не зареєстрований, немає шляху НСЗУ; обінутузумаб зареєстрований
  за окремим показанням (FL), але його використання як преттрітменту перед
  глофітамабом - off-label. Лише міжнародне клінічне дослідження або compassionate use.
