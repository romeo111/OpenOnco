sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "Glofitamab is a Category 2A preferred third-line+ option for r/r DLBCL after ≥2 prior systemic lines per NP30179; obinutuzumab pretreatment day -7 mandatory; 12-cycle fixed duration."
  - source_id: SRC-ESMO-LYMPHOMA-2025
    position: supports
    relevant_quote_paraphrase: "CD20×CD3 bispecific T-cell engagers (epcoritamab, glofitamab) are recommended therapeutic options for r/r DLBCL after ≥2 prior lines, including patients with prior CAR-T exposure; glofitamab fixed 12-cycle schedule offers treatment-free interval."

known_controversies:
  - topic: "Glofitamab vs epcoritamab vs CAR-T for r/r DLBCL ≥3L"
    positions:
      - position: "Glofitamab — IV, fixed 12-cycle duration with treatment-free interval; preferred where finite-duration therapy desired and IV infusion accepted"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Epcoritamab — subcutaneous, continuous indefinite dosing; preferred where outpatient SC pathway valued"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "CD19 CAR-T (axi-cel, liso-cel) — single infusion, ~40% durable remissions; bispecifics preferred when CAR-T unavailable / declined / failed"
        sources: [SRC-ESMO-LYMPHOMA-2025]
    our_default: "Bispecific preferred over CAR-T in Ukrainian context (no domestic CAR-T capacity); glofitamab when finite 12-cycle duration valued; epcoritamab when SC ambulatory route valued. Both require international referral / compassionate use."
    rationale: >
      Fixed-duration 12-cycle schedule has favourable access economics
      vs indefinite continuous bispecifics and may simplify
      reimbursement pathways once registered domestically. Mandatory
      obinutuzumab pretreatment is logistical complication if obinutuzumab
      not concurrently available.

do_not_do:
  - "НЕ розпочинати без обінутузумабу 1000 мг IV у день -7 — преттрітмент попередньо виснажує B-клітини та критично знижує ризик CRS першої дози глофітамабу."
  - "НЕ пропускати 4-8-годинне лікарняне спостереження для першої повної дози 30 мг (цикл 1 день 15) — fatal CRS можливе без on-site моніторингу."
  - "НЕ призначати без cycle-1 dexamethasone 20 мг IV (або еквіваленту) перед кожною step-up дозою (циклу 1 дні 1, 8, 15) — істотно знижує ризик CRS."
  - "НЕ розпочинати без on-site tocilizumab (мінімум 2 дози) — стандартна терапія CRS Grade ≥2."
  - "НЕ ігнорувати pre-treatment HBV / HCV / HIV скринінг — реактивація HBV вимагає entecavir / tenofovir prophylaxis при HBcAb+."
  - "НЕ призначати при active uncontrolled infection — імунодеплеція + CRS = high mortality."
  - "НЕ забувати про PJP / HSV профілактику + IVIG (якщо IgG <400 + рецидивні інфекції) — гіпогаммаглобулінемія тимчасова, але присутня впродовж терапії."
  - "НЕ продовжувати після 12 циклів — фіксована тривалість; повторне лікування при прогресії не встановлено."

