id: IND-DLBCL-3L-GLOFITAMAB
plan_track: aggressive

applicable_to:
  disease_id: DIS-DLBCL-NOS
  line_of_therapy: 3
  stage_requirements:
    - "Relapsed / refractory DLBCL after ≥2 prior systemic lines (1L R-CHOP / Pola-R-CHP, 2L salvage chemo ± autoSCT, pola-R-bendamustine, or CAR-T)"
    - "CD20 positive on most recent biopsy (immunohistochemistry or flow cytometry)"
    - "ECOG 0-2 (NP30179 enrolment)"
    - "Adequate organ function (ANC ≥1.0, plt ≥75, AST/ALT ≤3× ULN, bilirubin ≤2× ULN, eGFR ≥45)"
    - "Includes patients ineligible for or relapsed after CD19 CAR-T (~33% of NP30179 cohort had prior CAR-T)"
    - "Mandatory obinutuzumab 1000 mg IV pretreatment day -7 prior to glofitamab cycle 1"
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: "CD20 positive on most recent biopsy (loss of CD20 after prior anti-CD20 therapy is exclusion)"
  biomarker_requirements_excluded: []
  demographic_constraints:
    age_min: 18
    ecog_max: 2

recommended_regimen: REGIMEN-GLOFITAMAB-MONO-DLBCL-3L
concurrent_therapy: []
followed_by: []

