rationale: 'Loncastuximab tesirine (Zynlonta) is a CD19-directed antibody-drug conjugate (ADC) with PBD warhead approved for r/r DLBCL after ≥2 prior systemic therapies. LOTIS-2 (Caimi 2021 Lancet Oncol): single-arm phase 2; ORR 48%, CR 24%, mPFS 4.9 mo, mOS 9.5 mo, in heavily pretreated patients (median 3 prior lines, ~30% prior CAR-T). Ideal for patients NOT candidates for CAR-T (frailty, manufacturing window prohibitive, prior CD19 CAR-T failure with CD19-positive relapse, comorbidity precluding lymphodepletion). Off-the-shelf + outpatient feasible — major operational advantage over CAR-T. Bispecifics (epcoritamab, glofitamab) are competing 3L+ options with comparable ORR (~60%) but require step-up dosing + inpatient observation. Loncastuximab toxicities: peripheral edema (~50%), thrombocytopenia (~33%), neutropenia (~20%), hepatotoxicity, effusions/edema (PBD class effect). STUB regimen — no dedicated REG- entity for loncastuximab yet; flagged for REG follow-up.'
rationale_ua: >
  Лонкастуксимаб тезирін (loncastuximab tesirine; Zynlonta) - кон'югат
  антитіло-препарат (ADC) з PBD-варголовкою, спрямований проти CD19,
  схвалений для рецидивного/рефрактерного (relapsed/refractory) ДВКЛ
  після >=2 попередніх системних терапій. Дослідження LOTIS-2
  (Caimi et al., Lancet Oncol 2021): одно-рукавна фаза 2;
  ORR 48%, ПВ 24%, медіана ВБП 4.9 міс, медіана ЗВ 9.5 міс,
  у пацієнтів з великою кількістю попередніх ліній (медіана 3 попередніх лінії,
  ~30% попередня CAR-T). Злиття (fusion/translocation) не є критерієм відбору;
  CD19-позитивність обов'язкова. NCCN Категорія 2A.
  Ідеальний для пацієнтів, НЕ придатних для CAR-T: дряхлість,
  manufacturing window неможливий, попередня невдача CD19 CAR-T з
  CD19-позитивним рецидивом, коморбідність, що унеможливлює лімфодеплецію.
  Off-the-shelf + амбулаторна схема - суттєва операційна перевага над CAR-T.
  Конкуруючі 3L+ опції (епкоритамаб, глофітамаб) мають порівнянний ORR (~60%),
  але потребують покрокового дозування + стаціонарного спостереження.
  Токсичності лонкастуксимабу: периферичні набряки (~50%), тромбоцитопенія
  (~33%), нейтропенія (~20%), гепатотоксичність, ексудати/набряки
  (клас-ефект PBD). Контекст України: не зареєстрований; міжнародне
  направлення або compassionate use.
