nccn_category: '2A'
expected_outcomes:
  overall_response_rate:
    value: "~80% (extrapolated from R-CHOP non-CKD cohorts; Ostgard 2014 retrospective CKD subgroup)"
    source: SRC-NCCN-BCELL-2025
    notes: "Extrapolated from standard R-CHOP trials; CKD subgroup data from Ostgard 2014 retrospective — no prospective RCT exists for this special population; NCCN 2025 recommends dose-adjusted R-CHOP per renal function"
  complete_response:
    value: "~60%"
    source: SRC-NCCN-BCELL-2025
    notes: "Estimated; likely lower than standard R-CHOP (~65-70%) due to dose reductions required for CrCl <30"
  progression_free_survival:
    value: "Median PFS ~3-4 yr (lower than non-CKD due to dose reduction + competing CKD mortality)"
