rationale: 'In DLBCL patients with severe renal impairment (CrCl <30 mL/min), R-CHOP modifications: (1) CYCLOPHOSPHAMIDE:
  reduce dose by 25% for CrCl 10-30 mL/min; consider 50% reduction or omission for CrCl <10 / dialysis;
  cyclophosphamide active metabolite (acrolein) accumulates with haemorrhagic cystitis risk — IV mesna
  + aggressive hydration mandatory. (2) DOXORUBICIN: no formal renal adjustment but consider 25% reduction
  for combined hepatic + renal dysfunction; cardiotoxicity risk amplified in fluid-overloaded CKD. (3)
  VINCRISTINE: no renal adjustment needed; cap dose at 2 mg total (standard practice). (4) PREDNISONE:
  no renal adjustment. (5) RITUXIMAB: no renal adjustment; HBV/HCV screen mandatory. CNS prophylaxis (HD-MTX
  intercalated) is challenging in CKD — methotrexate is renally cleared with risk of severe mucositis
  + AKI; for high CNS-IPI in CKD, consider intrathecal prophylaxis (cytarabine + methotrexate via Ommaya)
  rather than HD-MTX. Tumor lysis prophylaxis: rasburicase preferred over allopurinol for high-burden disease
  in CKD (avoid uric acid load). Multidisciplinary nephrology consultation mandatory; dialysis preparation
  if CrCl deteriorates. R-mini-CHOP (Peyrade 2011 Lancet Oncol) is alternative for very-frail elderly
  + CKD with similar dose-reduction concept.'
rationale_ua: >
  У пацієнтів з вперше діагностованою ДВКЛ NOS та тяжкою нирковою недостатністю
  (CrCl <30 mL/min) необхідні модифікації R-CHOP: (1) ЦИКЛОФОСФАМІД: зниження
  дози на 25% при CrCl 10-30 mL/min; розгляньте зниження на 50% або відміну
  при CrCl <10 / діаліз; активний метаболіт (акролеїн) накопичується з ризиком
  геморагічного циститу - внутрішньовенний месна + активна гідратація обов'язкові.
  (2) ДОКСОРУБІЦИН: розгляньте 25% зниження при комбінованій печінковій + нирковій
  дисфункції; кардіотоксичність посилена при перевантаженому рідиною ХХН.
  (3) ВІНКРИСТИН: ниркової корекції не потребує; обмежте дозу до 2 mg максимально.
  (4) ПРЕДНІЗОН (преднізолон): ниркової корекції не потребує.
  (5) РИТУКСИМАБ: ниркової корекції не потребує; скринінг HBV/HCV обов'язковий.
  CNS-профілактика HD-метотрексат (methotrexate) при CNS-IPI >=4 ПРОТИПОКАЗАНА
  при CrCl <30 - акумуляція MTX + важкий мукозит + ГНН; альтернатива -
  інтратекальна профілактика (цитарабін (cytarabine) + метотрексат (methotrexate)
  через Оммайя). Профілактика синдрому лізису пухлини: расбуриказа переважна
  перед алопуринолом при великій пухлинній масі + ХХН. Нефрологічна консультація
  обов'язкова; підготовка до діалізу при погіршенні CrCl. R-mini-CHOP
  (Peyrade 2011, Lancet Oncol) - альтернатива для дуже ослаблених (вік >=80 + ХХН).
  Агресивний (aggressive) трек: дозо-редукований R-CHOP зберігає куративний намір;
  R-mini-CHOP - для дуже ослаблених. NCCN Категорія 2A.
  Рецидивний/рефрактерний ДВКЛ після модифікованого R-CHOP потребує
  2L-ескалації з урахуванням ниркової функції.
