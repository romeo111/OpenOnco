  disease_id: DIS-DLBCL-NOS
  line_of_therapy: 1
  stage_requirements:
  - "Newly-diagnosed DLBCL NOS in patient with severe renal impairment (CrCl <30 mL/min)"
  - "Goal: maintain curative-intent R-CHOP backbone with renal-adjusted cyclophosphamide + doxorubicin"
  - "Multidisciplinary management: hematology + nephrology"
