sources:
- source_id: SRC-NCCN-BCELL-2025
  position: supports
  relevant_quote_paraphrase: For DLBCL with severe renal impairment, dose-reduced R-CHOP (cyclophosphamide
    -25-50%; doxorubicin -25%) with mesna + hydration is preferred; HD-MTX CNS prophylaxis contraindicated
    for CrCl <30
- source_id: SRC-ESMO-LYMPHOMA-2025
  position: supports
  relevant_quote_paraphrase: CKD in DLBCL requires individualized R-CHOP modification; cyclophosphamide reduction
    + mesna + hydration; cardio-renal monitoring throughout
known_controversies:
- topic: Dose-reduced R-CHOP vs R-mini-CHOP vs alternative regimens for DLBCL + severe CKD
  positions:
  - position: Dose-reduced R-CHOP — preserves curative intent
    sources:
    - SRC-NCCN-BCELL-2025
  - position: R-mini-CHOP (Peyrade) — better tolerated in elderly + CKD; lower curative rate
    sources:
    - SRC-ESMO-LYMPHOMA-2025
    evidence_note: "R-mini-CHOP in ≥80 yo: 2-yr OS 59% vs ~30% historical R-CHOP in same cohort"
  our_default: Dose-reduced R-CHOP for fit-CKD (ECOG 0-1, age <80); R-mini-CHOP for very-frail or age ≥80
    + CKD
  rationale: Curative intent preserved with appropriate dose modification; very frail benefit more from
    tolerability
do_not_do:
- НЕ використовувати full-dose cyclophosphamide при CrCl <30 — haemorrhagic cystitis + bone marrow toxicity
  непомірні.
- НЕ забути mesna + IV hydration з cyclophosphamide — обов'язкові для CKD.
- НЕ використовувати HD-MTX для CNS prophylaxis при CrCl <30 — MTX accumulation + severe mucositis +
  AKI; substitute з intrathecal prophylaxis.
- НЕ забути baseline + serial ECHO — anthracycline cardiotoxicity ризик amplified в CKD; cardio-renal monitoring.
- НЕ використовувати allopurinol як TLS prophylaxis при високому tumor burden CKD — uric acid не еліминуватиме
  адекватно; rasburicase preferred.
- НЕ ігнорувати electrolyte dysregulation — CKD + chemo + tumor lysis = K+, PO4, Mg disturbance.
- НЕ продовжувати при rapid CrCl deterioration — dialysis discussion + chemo hold.
do_not_do_en:
  - "Do not use full-dose cyclophosphamide at CrCl <30 — haemorrhagic cystitis + bone marrow toxicity excessive."
  - "Do not forget mesna + IV hydration with cyclophosphamide — mandatory for CKD."
  - "Do not use HD-MTX for CNS prophylaxis at CrCl <30 — MTX accumulation + severe mucositis + AKI; substitute with intrathecal prophylaxis."
  - "Do not forget baseline + serial ECHO — anthracycline cardiotoxicity risk amplified in CKD; cardio-renal monitoring."
  - "Do not use allopurinol as TLS prophylaxis in high tumor burden CKD — uric acid will not be eliminated adequately; rasburicase preferred."
  - "Do not ignore electrolyte dysregulation — CKD + chemo + tumor lysis = K+, PO4, Mg disturbance."
  - "Do not continue with rapid CrCl deterioration — dialysis discussion + chemo hold."
