id: IND-DMG-H3K27M-DORDAVIPRONE
plan_track: standard

applicable_to:
  disease_id: DIS-DMG-H3K27M
  line_of_therapy: 2
  stage_requirements:
    - "H3K27M-mutant diffuse midline glioma (DMG) — including DIPG equivalent in adults"
    - "After prior radiotherapy (RT 54 Gy or equivalent) — required per FDA label"
    - "Recurrent or progressive after initial RT, OR maintenance phase post-RT"
  biomarker_requirements:
    - "H3K27M mutation REQUIRED — confirmed by IHC (anti-H3K27M antibody RM-2118) or molecular sequencing"
    - "H3K27M IHC is the standard diagnostic test (sensitivity ~95%, specificity ~99%)"
    - "Histone H3.3K27M (H3F3A codon 27 c.83A>T) or H3.1K27M (HIST1H3B codon 27) mutations qualify"
    - "Both DIPG (pontine location) and thalamic/spinal cord/cerebellar H3K27M DMG qualify"

recommended_regimen: REG-DORDAVIPRONE-DMG

concurrent_therapy:
  - "Anti-epileptic drugs as clinically required (seizure management)"
  - "Dexamethasone: minimize dose/wean as tolerated — steroid use may obscure response assessment"

followed_by:
  - "Continue dordaviprone until progression or unacceptable toxicity"
  - "At progression: clinical trial preferred; bevacizumab (palliative) if ECOG allows"
  - "Reirradiation: may be considered at progression (limited data; focal recurrence only)"

evidence_level: moderate
strength_of_recommendation: moderate
nccn_category: 2A

expected_outcomes:
  overall_response_rate: "33-35% (ACTION-1)"
  notes: >
    ACTION-1 (NCT05009992; Phase 3): dordaviprone 625 mg weekly vs placebo in
    H3K27M-mutant diffuse glioma after prior RT. ORR ~33-35%; PFS improvement
    demonstrated. OS trend favorable. FDA accelerated approval April 2024 (Ogenio).
    NCCN CNS Tumor Guidelines 2025: Category 2A.
    Median OS in H3K27M DMG with RT alone: ~9-11 months (historical).
    Dordaviprone represents the first FDA-approved systemic therapy for this entity.

hard_contraindications:
  - "H3K27M mutation NOT confirmed (mandatory biomarker requirement)"
  - "No prior radiotherapy (FDA indication requires prior RT)"
  - "QTc >480ms at baseline without correctable cause"
  - "ECOG PS 4 (engine hard gate)"
  - "Severe hepatic impairment (Child-Pugh C)"

red_flags_triggering_alternative:
  - "Active clinical trial for H3K27M DMG: preferred over dordaviprone when available"
  - "ECOG PS ≥3: very limited data; best supportive care may be more appropriate"

required_tests:
  - "H3K27M IHC (RM-2118) or molecular confirmation — MANDATORY before starting"
  - "MRI brain (±spine) with gadolinium — baseline tumor assessment"
  - "Baseline ECG (QTc assessment)"
  - "CBC, CMP (baseline)"
  - "Documentation of prior RT (date, field, dose)"

desired_tests:
  - "Comprehensive NGS panel: ACVR1, TP53, PDGFRA co-alteration profiling"
  - "Neurology assessment (seizure history, corticosteroid dose)"
  - "Ophthalmology: visual field assessment for thalamic/optic pathway DMG"

rationale: >
  H3K27M-mutant diffuse midline glioma is a WHO grade 4 tumor defined by histone H3
  mutation at position K27M. Previously, no systemic agent was FDA-approved. Radiotherapy
  was the only standard treatment, with median OS ~9-11 months for DIPG.
  Dordaviprone (ONC201, Ogenio) received FDA accelerated approval in April 2024 based on
  ACTION-1 (Phase 3), demonstrating ORR ~33-35% and PFS improvement vs placebo in patients
  who had received prior RT. The H3K27M mutation creates selective vulnerability to
  dordaviprone's dual mechanism (DRD2 antagonism + ClpP activation → mitochondrial UPRmt).
  NCCN CNS Tumor Guidelines 2025: Category 2A. No biomarker for response prediction beyond
  H3K27M itself. Clinical trial enrollment is always preferred when available.

sources:
  - SRC-ACTION1-OU-2024
  - SRC-NCCN-CNS-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  Workstream EI 2026-05-04. Dordaviprone (ONC201) for H3K27M-mutant diffuse glioma.
  First FDA-approved systemic therapy for this entity. Affects primarily children and
  young adults. ACTION-1 Phase 3 data. Accelerated approval April 2024.
  Two-reviewer clinical signoff required per CHARTER §6.1.
