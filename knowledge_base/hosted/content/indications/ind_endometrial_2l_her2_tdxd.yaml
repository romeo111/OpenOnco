    position: supports
    relevant_quote_paraphrase: "DESTINY-PanTumor02 endometrial cohort (n=40): T-DXd ORR 57.5%; median PFS 10.1m; FDA tumor-agnostic approval August 2023 HER2 IHC 3+"
  - source_id: SRC-NCCN-UTERINE-2025
    position: supports

do_not_do:
  - "Не призначати T-DXd при ІГХ 2+ FISH-негативному — FDA-схвалення тільки для ІГХ 3+"
  - "Не призначати при активному ІЛЗ/пневмоніті ≥2 ступеня — абсолютне протипоказання"
  - "Обов'язковий КТ органів грудної клітки базово і кожні 2 цикли (перші 6 циклів) — рання діагностика ІЛЗ"
  - "При появі респіраторних симптомів → НЕГАЙНО зупинити T-DXd; КТ + пульмонологічна консультація + ГКС"
  - "Не комбінувати з іншими антитілоподібними препаратами без доказів"
  - "При dMMR/MSI-H + відсутність попередньої ICI терапії → розглянути дострілімаб/пембролізумаб спочатку"

