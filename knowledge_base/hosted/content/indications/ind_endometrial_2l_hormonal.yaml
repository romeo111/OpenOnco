do_not_do:
  - "НЕ призначати при Grade 3 ендометріоїд, серозній, світлоклітинній або карциносаркомі — гормональна терапія неефективна (<5% ORR)"
  - "НЕ призначати при ER-негативній пухлині — відсутність молекулярної мішені"
  - "dMMR/MSI-H: достарлімаб або пембролізумаб значно ефективніші (ORR ~41-47%); гормони — лише якщо ICI недоступний"
  - "Мегестрол + ТГВ/ТЕЛА: ризик тромбозу підвищується в ~3 рази; АІ (летрозол) є безпечнішою альтернативою"
  - "Адреналова недостатність: не різко відміняти мегестрол після тривалого застосування (>3 міс) — поступово"
  - "Моніторинг глюкози у діабетиків — мегестрол спричиняє гіперглікемію (~12%)"

