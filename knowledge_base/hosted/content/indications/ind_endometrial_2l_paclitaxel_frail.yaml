    position: supports
    relevant_quote_paraphrase: >
      NCCN Uterine 2025 Category 2A: weekly paclitaxel as a recommended systemic
      therapy option for recurrent/metastatic endometrial carcinoma after prior
      platinum-based therapy. Listed under "Other Recommended Regimens" alongside
      doxorubicin, pegylated liposomal doxorubicin, and topotecan.

