last_reviewed: "2026-05-04"
reviewers: []
notes: >
  RUBY trial (PMID 36854745): dostarlimab+carbo-pacli q3w ×6, then dostarlimab
  maintenance q6w up to 3 years. dMMR PFS HR 0.28, OS HR 0.55.
  Lynch syndrome screening recommended for all dMMR endometrial cancers.
  Alternative: pembrolizumab+chemo (NRG-GY018; HR 0.30 dMMR; both Cat 1).
