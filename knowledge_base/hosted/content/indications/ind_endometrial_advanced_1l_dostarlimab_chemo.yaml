id: IND-ENDOMETRIAL-ADVANCED-1L-DOSTARLIMAB-CHEMO
plan_track: aggressive
applicable_to:
  disease_id: DIS-ENDOMETRIAL
  molecular_subtype: MMR_DEFICIENT
  stage_stratum: RECURRENT_METASTATIC
  line_of_therapy: 1
  biomarker_requirements_required:
    - {biomarker_id: BIO-DMMR-IHC, value_constraint: "deficient", required: true}
  biomarker_requirements_excluded: []
  demographic_constraints: {ecog_max: 2}
recommended_regimen: REG-DOSTARLIMAB-CARBO-PACLI-ENDOM
concurrent_therapy: []
followed_by: []
evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"
expected_outcomes: {pfs_hr_dmmr: 0.30, notes: "RUBY trial"}
hard_contraindications: []
red_flags_triggering_alternative: [RF-ACTIVE-AUTOIMMUNE-DISEASE-ICI-RISK]
required_tests: [TEST-CECT-CAP, TEST-ER-PR-IHC]
desired_tests: []
rationale_ua: >
  Достарлімаб (dostarlimab) + карбоплатин + паклітаксел є NCCN Категорія 1
  переважна схема першої лінії (перша лінія) для поширеної або рецидивної
  dMMR/MSI-H ендометріальної карциноми. Дослідження RUBY (ENGOT-EN6,
  Mirza et al., NEJM 2023): достарлімаб + карбо-паклі q3w x6, потім підтримуюча
  терапія (maintenance) достарлімабом q6w до 3 років; dMMR ВБП HR 0.28 (p<0.001);
  dMMR ЗВ HR 0.55. Схвалено FDA серпень 2023 для dMMR/MSI-H. Альтернатива:
  пембролізумаб (pembrolizumab) + хіміотерапія (NRG-GY018; HR 0.30 dMMR;
  обидва Категорія 1). Скринінг на синдром Лінча обов'язковий для
  всіх dMMR ендометріальних карцином. Рецидивний/рефрактерний після
  1L потребує 2L ICI монотерапії (достарлімаб або пембролізумаб).
  Пацієнти з активним аутоімунним захворюванням потребують оцінки ризику/користі
  (RF-ACTIVE-AUTOIMMUNE-DISEASE-ICI-RISK).
ukrainian_review_status: pending_clinical_signoff
