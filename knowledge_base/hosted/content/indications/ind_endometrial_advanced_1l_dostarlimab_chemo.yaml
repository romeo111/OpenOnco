sources:
  - source_id: SRC-RUBY-MIRZA-2023
    position: supports
    relevant_quote_paraphrase: "RUBY (ENGOT-EN6): dostarlimab+carbo-pacli vs chemo for advanced/recurrent endometrial; dMMR PFS HR 0.28 (p<0.001); dMMR OS HR 0.55; FDA approved Aug 2023 for dMMR/MSI-H"
  - source_id: SRC-NCCN-UTERINE-2025
    position: supports
    relevant_quote_paraphrase: "Dostarlimab+carboplatin+paclitaxel is NCCN Category 1 preferred 1L for dMMR/MSI-H advanced or recurrent endometrial cancer"
  - source_id: SRC-ESMO-ENDOMETRIAL-2022
    position: supports
    relevant_quote_paraphrase: "ESMO endorses pembrolizumab or dostarlimab+chemo as preferred 1L for dMMR/MSI-H advanced endometrial cancer"
last_reviewed: "2026-05-04"
reviewers: []
notes: >
  RUBY trial (PMID 36854745): dostarlimab+carbo-pacli q3w ×6, then dostarlimab
  maintenance q6w up to 3 years. dMMR PFS HR 0.28, OS HR 0.55.
  Lynch syndrome screening recommended for all dMMR endometrial cancers.
  Alternative: pembrolizumab+chemo (NRG-GY018; HR 0.30 dMMR; both Cat 1).
