notes: >
  NRG-GY018/KEYNOTE-868 (PMID 35737499): pembro+carbo-pacli q3w ×6, then pembro
  maintenance q6w up to 35 cycles. dMMR PFS HR 0.30, pMMR HR 0.54.
  Choice between pembro vs dostarlimab+chemo: similar efficacy in dMMR (both HR ~0.30);
  access and institutional preference determine choice. pMMR patients also benefit
  from pembro+chemo (HR 0.54 GY018 vs HR 0.76 RUBY) — pembro+chemo preferred for pMMR.
  NRG-GY018 + RUBY together established the chemoimmuno paradigm across all endometrial.
