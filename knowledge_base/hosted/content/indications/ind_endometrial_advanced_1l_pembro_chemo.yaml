rationale_ua: >
  Пембролізумаб (pembrolizumab) + карбоплатин + паклітаксел є NCCN Категорія 1
  переважна схема першої лінії (перша лінія) для поширеної або рецидивної
  ендометріальної карциноми (усі MMR підгрупи). Дослідження NRG-GY018/KEYNOTE-868
  (Makker et al., NEJM 2022): пембро + карбо-паклі q3w x6, потім підтримуюча
  терапія (maintenance) пембролізумабом q6w до 35 циклів; dMMR ВБП HR 0.30;
  pMMR ВБП HR 0.54; схвалено FDA липень 2023 для всіх. Вибір між пембро vs
  достарлімаб + хіміотерапія: подібна ефективність у dMMR (обидва HR ~0.30);
  pMMR пацієнти також отримують користь від пембро+хімії (HR 0.54 GY018
  vs HR 0.76 RUBY) - пембро+хімія переважна для pMMR. Рецидивний/рефрактерний
  (relapsed/refractory) після 1L потребує 2L: dMMR -> ICI монотерапія;
  pMMR -> пембро+ленватиніб (KEYNOTE-775). Скринінг на синдром Лінча
  обов'язковий для dMMR. NRG-GY018 + RUBY разом встановили
  хіміоімунотерапевтичну парадигму для ендометріального раку.
