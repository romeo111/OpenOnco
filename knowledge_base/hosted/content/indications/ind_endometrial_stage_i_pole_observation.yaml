sources:
  - source_id: SRC-NCCN-UTERINE-2025
    position: supports
    relevant_quote_paraphrase: "Stage I POLE-mutated endometrial carcinoma — observation only after surgical staging; no adjuvant therapy indicated"
  - source_id: SRC-ESMO-ENDOMETRIAL-2022
    position: supports
    relevant_quote_paraphrase: "ESMO endorses TCGA/TransPORTEC molecular classification with POLE-mutated as favorable-prognosis subtype not requiring adjuvant therapy in early stage"
  - source_id: SRC-ESGO-ENDOMETRIAL-2025
    position: supports
    relevant_quote_paraphrase: "ESGO-ESTRO-ESP 2025 endometrial guideline: POLE-mutated Stage I — observation; treat per molecular class, not stage/grade alone"

known_controversies:
  - topic: "Defining 'pathogenic' POLE-EDM variants in non-canonical positions"
    positions:
      - position: "Restrict to TCGA / TransPORTEC validated hotspot list (e.g., P286R, V411L, S297F, A456P, S459F)"
        sources: [SRC-NCCN-UTERINE-2025]
      - position: "Functional / in-silico classification of any EDM variant in codons 268-471"
        sources: [SRC-ESGO-ENDOMETRIAL-2025]
    our_default: "Use validated hotspot list; non-hotspot exonuclease-domain variants of unknown significance should NOT trigger de-escalation without molecular pathology review"
    rationale: "Mis-classification risks under-treating an aggressive Stage I tumor"

do_not_do:
  - "Не призначати ад'ювантну хіміотерапію / RT для Stage I POLE-EDM — PORTEC-3/TransPORTEC показали відсутність користі."
  - "Не покладатися лише на IHC — POLE/POLD1 потребує NGS-секвенування проксимального exonuclease-домену."
  - "Не плутати POLE-hypermutator з MSI-H — це окремий TCGA-підтип; патерни лікування різні (ICI ефективна в обох, але Stage I logic відрізняється)."
  - "Не пропускати оцінку high-grade морфології в звіті — Stage I POLE-EDM з high-grade ще лишається observation, але документація обов'язкова для multidisciplinary review."
  - "Не екстраполювати observation-only на Stage II+ POLE-EDM — дані обмежені; advanced-stage логіка лишається стандартною."

do_not_do_en:
  - "Do not prescribe adjuvant chemotherapy / RT for Stage I POLE-EDM — PORTEC-3/TransPORTEC showed lack of benefit."
  - "Do not rely on IHC alone — POLE/POLD1 requires NGS sequencing of the proximal exonuclease domain."
  - "Do not confuse POLE-hypermutator with MSI-H — this is a separate TCGA subtype; treatment patterns differ (ICI effective in both, but Stage I logic differs)."
  - "Do not skip assessment of high-grade morphology in the report — Stage I POLE-EDM with high-grade still remains observation, but documentation is mandatory for multidisciplinary review."
  - "Do not extrapolate observation-only to Stage II+ POLE-EDM — data limited; advanced-stage logic remains standard."
time_critical: false
