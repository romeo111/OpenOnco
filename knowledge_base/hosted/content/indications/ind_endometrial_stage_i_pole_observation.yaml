rationale: >
  PORTEC-3 / TransPORTEC pooled analyses demonstrated that Stage I
  endometrial carcinoma harboring a pathogenic POLE exonuclease-domain
  (POLE-EDM) mutation has near-100% recurrence-free survival regardless of
  histologic grade, and adjuvant chemoradiation provides NO incremental
  benefit. POLD1-EDM is rarer but mechanistically equivalent and grouped
  with POLE in TCGA / ESGO-ESTRO integrated risk classification.
  Following total hysterectomy + bilateral salpingo-oophorectomy,
  observation alone is the standard recommendation per NCCN Uterine 2025
  and ESGO-ESTRO-ESP 2025 guidelines. Avoids unnecessary toxicity and
  cost in a population with excellent biology. Lynch screening still
  appropriate if any MMR/MSI features co-occur; germline counseling for
  POLD1 cases (PPAP differential).

rationale_ua: >
  Об'єднані аналізи PORTEC-3 / TransPORTEC продемонстрували, що Stage I
  ендометріальна карцинома з патогенною мутацією exonuclease-домену
  POLE (POLE-EDM) має майже 100% виживання без рецидиву незалежно від
  гістологічного grade, а ад'ювантна хіміотерапія або хіміопроменева терапія
  (chemoradiation) не дає додаткової користі.
  POLD1-EDM рідший, але механістично еквівалентний і згрупований з POLE
  в інтегрованій TCGA / ESGO-ESTRO класифікації ризику. Після тотальної
  гістеректомії + двосторонньої сальпінго-оофоректомії лише
  спостереження є стандартною рекомендацією NCCN Uterine 2025 та
  ESGO-ESTRO-ESP 2025. Уникає непотрібної токсичності та вартості у
  популяції з відмінною біологією. Lynch screening залишається доречним
  при супутніх MMR/MSI ознаках; гермінальне консультування для випадків
  POLD1 (PPAP диференціал).
