notes: >
  STUB — surveillance / observation track for Stage I endometrial with
  POLE-EDM or POLD1-EDM hypermutator phenotype. Requires clinical
  co-lead signoff. Orphan vs algorithm: ALGO-ENDOMETRIAL-STAGE-I does
  not yet exist; orchestrator should wire when authored. Existing
  algorithms (ALGO-ENDOMETRIAL-ADVANCED-1L, ALGO-ENDOMETRIAL-2L) are
  Stage IV and 2L respectively and intentionally untouched in this
  chunk.
