    position: supports
    relevant_quote_paraphrase: >
      EZH-202 Phase 2 (Gounder 2020 Lancet Oncol; N=62 evaluable): tazemetostat 800 mg BID
      in INI1-deficient epithelioid sarcoma. ORR 15% (1 CR, 8 PR); CBR 26%; mDOR not reached.
      Basis of FDA accelerated approval January 2020 for epithelioid sarcoma.
  - source_id: SRC-NCCN-SARCOMA
    position: supports
    relevant_quote_paraphrase: >
