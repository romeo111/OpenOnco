rationale: >
  Tazemetostat (EZH2 inhibitor) received FDA accelerated approval in
  January 2020 for metastatic or locally advanced epithelioid sarcoma
  not eligible for complete resection — the first targeted therapy ever
  approved for this disease. EZH-202 trial: ORR ~15%, but with durable
  responses (median DOR not reached in responders). SMARCB1/INI1 loss
  (via IHC) is the companion diagnostic — required for eligibility.
  EZH2 is a PRC2 component; SMARCB1 loss leads to EZH2-dependent
  transcriptional repression of tumor suppressors. Though ORR is modest,
  there is no other FDA-approved targeted option for epithelioid sarcoma.
  Doxorubicin-based chemotherapy is an alternative for chemotherapy-
  eligible patients but lacks a targeted indication.

rationale_ua: >
  Таземетостат (EZH2-інгібітор) — перший схвалений FDA цільовий препарат
  для епітеліоїдної саркоми (01/2020). EZH-202: ORR ~15%, але довготривалі
  відповіді. SMARCB1/INI1 втрата (ІГХ) є обов'язковою супутньою діагностикою.
  Інших схвалених цільових опцій немає.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
  - source_id: SRC-EZH202-GOUNDER-2020
    position: supports
    relevant_quote_paraphrase: "Tazemetostat ORR 15%, durable responses in INI1-loss epithelioid sarcoma; FDA accelerated approval January 2020 (Gounder 2020 NEJM)"
  - source_id: SRC-ESMO-SARCOMA-2024
    position: supports
    relevant_quote_paraphrase: "ESMO recommends tazemetostat for advanced epithelioid sarcoma with SMARCB1/INI1 loss; modest ORR but no alternative targeted therapy"

do_not_do:
  - "НЕ призначати без підтвердженої втрати SMARCB1/INI1 (ІГХ) — обов'язкова умова схвалення"
  - "НЕ поєднувати з потужними інгібіторами CYP3A4 без корекції дози (знижуйте до 400 мг двічі на добу)"
  - "НЕ ігнорувати ризик вторинних злоякісних пухлин — описані T-ЛБЛ/ГМЛ у педіатричних саркомних дослідженнях"
  - "НЕ призначати вагітним — тератогенність"

do_not_do_en:
  - "Do NOT prescribe without confirmed SMARCB1/INI1 loss by IHC — mandatory eligibility criterion"
  - "Do NOT combine with strong CYP3A4 inhibitors without dose reduction (reduce to 400 mg BID)"
  - "Do NOT ignore secondary malignancy risk — T-LBL/AML reported in pediatric sarcoma trials"
  - "Do NOT prescribe in pregnancy — embryo-fetal toxicity"

time_critical: false
last_reviewed: "2026-05-04"
reviewers: []
