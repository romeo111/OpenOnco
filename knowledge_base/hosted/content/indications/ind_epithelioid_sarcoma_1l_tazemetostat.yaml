  overall_response_rate: "~15% (EZH-202 trial)"
  complete_response: "~3%"
  progression_free_survival: "Median ~5.7 months"
  overall_survival_5y: "Median OS ~19 months (EZH-202)"

hard_contraindications: []
red_flags_triggering_alternative: []

