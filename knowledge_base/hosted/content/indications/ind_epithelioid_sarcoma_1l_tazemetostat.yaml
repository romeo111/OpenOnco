notes: >
  STUB — pending Clinical Co-Lead sign-off. Only FDA-approved targeted
  therapy for epithelioid sarcoma. ORR modest (~15%) but clinically
  meaningful given no prior options. SMARCB1/INI1 IHC required before
  prescribing. Access in Ukraine via DEC named-patient import or EAP Ipsen.
