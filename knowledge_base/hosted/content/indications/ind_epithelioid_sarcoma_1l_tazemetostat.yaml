do_not_do:
  - "НЕ призначати без підтвердженої втрати INI1 (ІГХ) — збережений INI1 = неефективний"
  - "НЕ ігнорувати нову лімфаденопатію або В-симптоми — вторинна Т-клітинна лімфома (класовий ефект EZH2-інгібіторів)"
  - "НЕ застосовувати при швидко прогресуючому великоб'ємному захворюванні — доксорубіцин-based більш доцільний"
  - "НЕ виконувати за відсутності CBC-моніторингу: q4 тижні × 3 місяці, потім q8 тижнів"

sources:
