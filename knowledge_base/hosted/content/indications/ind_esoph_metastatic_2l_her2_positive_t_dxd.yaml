sources:
  - source_id: SRC-DESTINY-GASTRIC04-SHITARA-2025
    weight: primary
    relevant_quote_paraphrase: "DESTINY-Gastric04 (international Phase 3, n=494): T-DXd 6.4 mg/kg q3w vs ramucirumab+paclitaxel as 2L in HER2+ metastatic gastric/GEJ adenocarcinoma post-trastuzumab. mOS 14.7 vs 11.4 mo (HR 0.70, 95% CI 0.55-0.90, p=0.004); PFS HR 0.74; ORR 44.3% vs 29.1%; ILD/pneumonitis 13.9% vs 1.3%. Extrapolated to HER2+ esoph adenocarcinoma per NCCN/ESMO biological-contiguity rationale."
  - source_id: SRC-DESTINY-GASTRIC01-SHITARA-2020
    weight: primary
    relevant_quote_paraphrase: "DESTINY-Gastric01 (Asian Phase 2): T-DXd 6.4 mg/kg q3w vs investigator's-choice chemo. ORR ~51%; mOS 12.5 vs 8.4 mo (HR 0.59); median PFS 5.6 vs 3.5 mo (HR 0.47). Originating signal for T-DXd 2L benefit in HER2+ gastric/GEJ; extrapolation basis for esoph adeno via GEJ-contiguity."
  - source_id: SRC-NCCN-ESOPHAGEAL-2025
    weight: primary
    relevant_quote_paraphrase: "NCCN-Esophageal/EGJ 2025 endorses HER2 testing in metastatic adenocarcinoma and recommends trastuzumab-based 1L (ToGA backbone); 2L T-DXd extends gastric/GEJ recommendation to esoph adeno post 1L trastuzumab failure."
  - source_id: SRC-ESMO-ESOPHAGEAL-2024
    weight: primary
    relevant_quote_paraphrase: "ESMO-Esophageal 2024 endorses HER2 testing in metastatic adenocarcinoma; biologic continuity with gastric/GEJ adeno supports trastuzumab-based therapy and post-progression switch to T-DXd in HER2+ population."

do_not_do:
  - "НЕ застосовувати при плоскоклітинному раку стравоходу — DG-01/04 та ToGA не включали ESCC, HER2-ампліфікація рідкісна."
  - "НЕ ігнорувати baseline + серійний HRCT — ILD ~13.9% (DG-04), переважно G1-2, але ~1% історично летальний."
  - "НЕ продовжувати при підозрі на пневмоніт — негайний hold + пульмонолог + кортикостероїди."
  - "НЕ призначати без HER2 reconfirmation на свіжій біопсії за можливістю — HER2-loss після 1L поширений (~30%)."
  - "НЕ призначати при baseline LVEF <50% — кардіотоксичність трастузумаб-базованих кон'югатів."
  - "НЕ пропускати profilactic high-emetogenic антиеметики — T-DXd HEC."
  - "НЕ підтверджувати план без верифікованого funding pathway — NSZU 2026 НЕ покриває T-DXd для шлункового/стравохідного показання."

do_not_do_en:
  - "Do NOT use in squamous-cell esoph carcinoma (ESCC) — DG-01/04 and ToGA did not enroll ESCC, HER2 amplification rare."
  - "Do NOT skip baseline + serial HRCT chest — ILD ~13.9% (DG-04), predominantly G1-2 but historically ~1% fatal."
  - "Do NOT continue at suspicion of pneumonitis — immediate hold + pulmonologist + corticosteroids."
  - "Do NOT prescribe without HER2 reconfirmation on fresh biopsy when feasible — HER2 loss after 1L common (~30%)."
  - "Do NOT prescribe at baseline LVEF <50% — cardiotoxicity of trastuzumab-based conjugates."
  - "Do NOT skip prophylactic high-emetogenic antiemetics — T-DXd HEC."
  - "Do NOT confirm the plan without verified funding pathway — NSZU 2026 does NOT cover T-DXd for gastric/esoph indications."

