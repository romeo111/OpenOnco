id: IND-ESOPH-METASTATIC-2L-HER2-POSITIVE-T-DXD
plan_track: aggressive

applicable_to:
  disease_id: DIS-ESOPHAGEAL
  line_of_therapy: 2
  stage_requirements:
    - "Stage IV (metastatic) OR unresectable locally advanced esophageal carcinoma"
    - "Adenocarcinoma histology (EAC) OR GEJ adenocarcinoma (Siewert I)"
    - "Disease progression on or after 1L trastuzumab-containing regimen"
  biomarker_requirements_required:
    - biomarker_id: BIO-HER2-SOLID
      required: true
      value_constraint: "HER2-positive (IHC 3+ OR IHC 2+/ISH-amplified) on archival or fresh biopsy. Reconfirmation on fresh biopsy preferred — HER2 loss after 1L trastuzumab occurs in ~30%."
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 1
    histology_required: "Adenocarcinoma only — DESTINY-Gastric01/04 enrolled gastric/GEJ adeno; extrapolation valid for esoph adeno (shared HER2 biology + GEJ contiguity), NOT for squamous-cell esoph (HER2 amplification rare in ESCC, no T-DXd evidence)"

recommended_regimen: REG-TDXD-GASTRIC
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "44.3% vs 29.1% (DESTINY-Gastric04, gastric/GEJ population — esoph adeno extrapolation); ~51% (DESTINY-Gastric01)"
  complete_response: "~9% (DESTINY-Gastric01, gastric/GEJ population — esoph adeno extrapolation)"
  progression_free_survival: "PFS HR 0.74 (95% CI 0.59-0.92, DESTINY-Gastric04 gastric/GEJ); median PFS 5.6 vs 3.5 mo (HR 0.47, DESTINY-Gastric01)"
  overall_survival_median: "mOS 14.7 vs 11.4 mo (HR 0.70, 95% CI 0.55-0.90, DESTINY-Gastric04 gastric/GEJ)"
  overall_survival_5y: "mOS 12.5 vs 8.4 mo (HR 0.59, DESTINY-Gastric01 gastric/GEJ)"
  notes: >
    Outcomes are reported from DESTINY-Gastric01 (Asian Phase 2) and
    DESTINY-Gastric04 (international Phase 3) which enrolled gastric and
    GEJ adenocarcinoma. Esoph-confined adenocarcinoma was not formally
    enrolled but is biologically grouped with GEJ/gastric adeno (shared
    chronic-GERD / Barrett pathogenesis); NCCN-Esophageal/EGJ 2025
    endorses extrapolation when distal-third esoph adeno is HER2+.
    Confidence: moderate. Magnitude of benefit in pure esoph adeno is
    inferred, not directly measured.

