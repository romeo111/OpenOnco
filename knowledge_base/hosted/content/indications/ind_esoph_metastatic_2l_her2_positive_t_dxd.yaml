rationale: >
  Trastuzumab deruxtecan (T-DXd) 6.4 mg/kg q3w is extrapolated to HER2+
  metastatic esoph adenocarcinoma (EAC) / GEJ Siewert I as 2L therapy
  after 1L trastuzumab-containing regimen failure. Evidence basis:
  DESTINY-Gastric01 (Shitara NEJM 2020, Asian Phase 2) and
  DESTINY-Gastric04 (Shitara NEJM 2025;393(4):336-348, international
  Phase 3, n=494) — both in HER2+ metastatic gastric/GEJ adenocarcinoma
  post-trastuzumab. DG-04 vs ramucirumab + paclitaxel: mOS 14.7 vs 11.4
  mo (HR 0.70, p=0.004), ORR 44.3% vs 29.1%, PFS HR 0.74; superseded
  single-region DG-01 with global Phase-3 evidence.

  Extrapolation rationale: distal-third esoph adenocarcinoma is
  biologically contiguous with GEJ adeno enrolled in DG-01/DG-04
  (Siewert I); shared HER2 amplification biology + post-trastuzumab
  progression context apply identically. NCCN-Esophageal/EGJ 2025 and
  ESMO-Esophageal 2024 endorse HER2 testing in metastatic adeno and
  recommend trastuzumab-based 1L (ToGA backbone); 2L T-DXd is the
  natural extension of this routing for HER2+ esoph adeno post 1L
  trastuzumab failure. Confidence: moderate (extrapolation from
  anatomically adjacent disease site enrolled in the pivotal trials;
  pure esoph-confined adeno was not enrolled).

  Same dose / schedule / regimen as gastric — REG-TDXD-GASTRIC is reused
  unchanged (6.4 mg/kg IV q3w; gastric dose is higher than breast
  5.4 mg/kg). ILD / pneumonitis is the dose-limiting boxed-warning
  toxicity (13.9% in DG-04, predominantly G1-2; baseline + serial HRCT
  required). HER2 reconfirmation on fresh biopsy preferred — HER2 loss
  after 1L trastuzumab occurs in ~30%.

  Extrapolation explicitly excludes squamous-cell esoph carcinoma (ESCC):
  HER2 amplification is rare in ESCC and DG-01/DG-04 enrolled adeno only.
  Patients with ESCC progressing on prior systemic therapy should be
  routed to nivolumab (CheckMate-577 / ATTRACTION-3 family) per the SCC
  branch.

rationale_ua: >
  Трастузумаб дерукстекан (trastuzumab deruxtecan; T-DXd) 6.4 mg/kg q3w
  екстрапольовано до HER2+ метастатичної EAC / GEJ Siewert I як 2L-терапія
  після невдачі 1L трастузумаб (trastuzumab)-вмісної схеми.
  Доказова база: DESTINY-Gastric04 (Shitara, NEJM 2025; міжнародна фаза 3, n=494)
  T-DXd (6.4 mg/kg) vs рамуцирумаб (ramucirumab) + паклітаксел (paclitaxel):
  медіана ЗВ 14.7 проти 11.4 міс (HR 0.70, p=0.004), ORR 44.3% проти 29.1%.
  REG-TDXD-GASTRIC - регіменна схема повторно використовується (6.4 mg/kg IV q3w;
  доза шлункова вища ніж грудна 5.4 mg/kg). ILD/пневмоніт - клас-ефект T-DXd
  (13.9% у DG-04, переважно G1-2; базовий + серійний HRCT обов'язковий).
  Ампліфікація (amplification) HER2 обов'язкова. Підтвердження HER2 на
  свіжій біопсії переважне - втрата HER2 після 1L трастузумабу у ~30%.
  NCCN Категорія 1 для EAC/GEJ 2L HER2+. Ніволумаб (nivolumab) є
  альтернативою для ESCC-гілки (не для аденокарциноми).
