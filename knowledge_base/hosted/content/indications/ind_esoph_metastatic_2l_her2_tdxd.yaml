      adenocarcinoma 2L after trastuzumab-containing 1L failure.

do_not_do:
  - "НІКОЛИ не починати T-DXd при активному ILD/пневмоніті ≥2 ступ. — смертельно небезпечно"
  - "КТ грудної клітки базова обов'язкова до початку T-DXd; + кожні 2 цикли × 6"
  - "Плоскоклітинний рак стравоходу + HER2 3+: лише MDT рішення (немає даних DESTINY SCC)"
  - "Попереднє T-DXd або HER2 ADC (трастузумаб-емтанзин та ін.): перехресна резистентність"
  - "HER2 ретест на матеріалі рецидиву — HER2 статус може змінитися після трастузумабу"
  - "При ILD: терміново відмінити + преднізон 1 мг/кг/день → III-IV ступ.: постійна відміна"

