  - "Не призначати при HER2 IHC 3+ — T-DXd є переважним вибором (ЗВ 38%)"
  - "Не ігнорувати АТ перед кожним рамуцирумабом — антигіпертензивна терапія при ≥160/100 мм рт.ст."
  - "Не продовжувати при Grade ≥3 периферичній нейропатії від паклітакселю"
  - "Не призначати при активних артеріальних тромбоемболічних подіях (ІМ, інсульт) протягом 6 міс"

