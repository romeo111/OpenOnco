  - "НЕ продовжувати при Grade ≥2 нейропатії — накопичувальна токсичність таксану"
  - "НЕ забувати перевірити HER2 при прогресії — HER2 3+ → T-DXd переважний варіант"
  - "НЕ використовувати при ANC <1000 або тромбоцитах <75 000 — відкладіть введення"
  - "НЕ ігнорувати доступність рамуцирумабу — pac+ram переважає монотерапію; переключіться при першій нагоді"

