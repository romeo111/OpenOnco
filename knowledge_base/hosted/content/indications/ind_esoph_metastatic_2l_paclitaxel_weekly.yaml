id: IND-ESOPH-METASTATIC-2L-PACLITAXEL-WEEKLY
plan_track: standard

applicable_to:
  disease_id: DIS-ESOPHAGEAL
  line_of_therapy: 2
  stage_requirements:
    - "Metastatic or locally advanced unresectable esophageal or GEJ adenocarcinoma"
    - "Progression after 1L platinum-fluoropyrimidine ± trastuzumab ± ICI"
    - "Ramucirumab inaccessible at treating centre (not registered, not reimbursed, supply unavailable)"
    - "ECOG PS 0-2"
    - "No Grade ≥2 baseline peripheral neuropathy (cumulative taxane neuropathy risk)"
    - "Adequate bone marrow: ANC ≥1500/μL, plt ≥100×10⁹/L"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    notes: >
      Paclitaxel weekly monotherapy (RAINBOW paclitaxel arm) is the NCCN Cat 1
      acceptable fallback for esophageal/GEJ adenocarcinoma when ramucirumab
      combination is inaccessible. RAINBOW demonstrated: pac+ram ORR 28%/mOS 9.6 mo
      vs paclitaxel-alone ORR 16%/mOS 7.4 mo. While combination is preferred,
      paclitaxel monotherapy retains clinical benefit compared to BSC.
      Ukraine: paclitaxel is NSZU-reimbursed (universal); ramucirumab requires
      hospital-specific budget or compassionate access — prefer pac+ram if any
      ramucirumab access available; paclitaxel mono when truly inaccessible.

recommended_regimen: REG-PACLITAXEL-WEEKLY-GASTRIC
concurrent_therapy:
  - "Standard premedication: dexamethasone 20 mg IV + diphenhydramine 50 mg IV + ranitidine/famotidine 50 mg IV 30 minutes before each dose (HSR prevention)"
  - "HER2 re-testing if not recently tested — HER2 3+ at progression → T-DXd preferred"
  - "Neuropathy assessment each cycle (cumulative paclitaxel neurotoxicity; discontinue for Grade ≥2 persistent)"
  - "CBC weekly (paclitaxel myelosuppression; neutropenia)"

followed_by:
  - "CT chest/abdomen/pelvis q6-8 weeks (RECIST 1.1 response assessment)"
  - "Continue until confirmed progression or unacceptable toxicity (Grade ≥2 neuropathy)"
  - "At progression or toxicity: best supportive care; clinical trial; MDT review for further systemic options"
  - "If ramucirumab access restored: upgrade to REG-PACLITAXEL-RAMUCIRUMAB-GASTRIC (pac+ram; preferred combination)"

evidence_level: high
strength_of_recommendation: moderate
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~16% (RAINBOW paclitaxel monotherapy arm; Wilke 2014 Lancet Oncol)"
  complete_response: "<2% (RAINBOW paclitaxel arm)"
  progression_free_survival: "Median PFS ~2.9 months (RAINBOW paclitaxel arm vs 4.4 mo with pac+ram)"
  overall_survival_5y: "Median OS ~7.4 months (RAINBOW paclitaxel arm vs 9.6 mo with pac+ram)"
  notes: >
    PRIMARY EVIDENCE: RAINBOW (Wilke 2014 Lancet Oncol; NCT01170663; N=665):
    - Ramucirumab 8 mg/kg IV d1,15 + paclitaxel 80 mg/m² d1,8,15 q28d vs
      placebo + paclitaxel 80 mg/m² d1,8,15 q28d in gastric/GEJ adenocarcinoma
      after 1L platinum+fluoropyrimidine
    - Paclitaxel monotherapy (placebo arm): ORR 16%; mPFS 2.9 mo; mOS 7.4 mo
    - Pac+ram arm (preferred when ramucirumab accessible): ORR 28%; mPFS 4.4 mo; mOS 9.6 mo
    - NCCN Esophageal 2025: paclitaxel monotherapy is Category 1 acceptable
      option in the 2L esophageal/GEJ adenocarcinoma setting (RAINBOW paclitaxel arm)
    - Esophageal SCC: paclitaxel weekly has activity but NCCN Cat preference for
      nivolumab (ATTRACTION-3) or pembrolizumab in ICI-naive SCC; paclitaxel
      acceptable for SCC-ICI-experienced or when ICI contraindicated

    UKRAINE CONTEXT: Paclitaxel is NSZU-reimbursed for GI malignancies. In most
    Ukrainian oncology centres, paclitaxel weekly is the most accessible 2L
    chemotherapy option for esophageal/GEJ adenocarcinoma where ramucirumab
    (not consistently NSZU-funded) is unavailable. Preferred standard is pac+ram
    (IND-ESOPH-METASTATIC-2L-PAC-RAM) when ramucirumab access confirmed.

hard_contraindications:
  - "Grade ≥3 pre-existing peripheral neuropathy — cumulative paclitaxel neurotoxicity"
  - "Prior severe (Grade ≥3) hypersensitivity reaction to paclitaxel or cremophor-EL"
  - "ANC <1000/μL or plt <75×10⁹/L at cycle start — hold until recovery"

red_flags_triggering_alternative: []

required_tests:
  - TEST-CT-CHEST-ABDOMEN-PELVIS
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - "HER2 IHC/ISH (if not recently assessed at progression — HER2 3+ → T-DXd preferred)"
  - "Neuropathy assessment (baseline peripheral nerve exam)"
  - "BP measurement (paclitaxel HSR monitoring; dexamethasone premedication required)"

desired_tests:
  - "PD-L1 CPS testing (if not available): CPS ≥10 → pembrolizumab may be preferred (ICI-naive) per KEYNOTE-181"
  - "Creatinine clearance (paclitaxel dose adjustment not strictly required but monitor for cisplatin cumulative renal toxicity)"

rationale: >
  Paclitaxel 80 mg/m² IV weekly (days 1,8,15 of a 28-day cycle) is a NCCN Category 1
  acceptable option in the 2L esophageal/GEJ adenocarcinoma setting, representing the
  RAINBOW trial control arm (Wilke 2014 Lancet Oncol). While inferior to the preferred
  ramucirumab+paclitaxel combination (ORR 28% vs 16%; mOS 9.6 vs 7.4 months), paclitaxel
  monotherapy provides meaningful clinical benefit over best supportive care and is the
  standard of care when anti-VEGFR therapy (ramucirumab) is inaccessible.

  UKRAINE RATIONALE: Ramucirumab is not consistently NSZU-reimbursed for esophageal
  cancer in Ukraine. Paclitaxel is universally available (NSZU-funded) and is the most
  clinically realistic 2L cytotoxic option for most Ukrainian esophageal cancer patients.
  When ramucirumab becomes accessible (hospital compassionate, charitable, or funded
  import), upgrade to combined pac+ram regimen (IND-ESOPH-METASTATIC-2L-PAC-RAM) which
  extends mOS by ~2 months.

  HISTOLOGY NOTE: Although RAINBOW enrolled gastric/GEJ adenocarcinoma, the same schedule
  is widely used for esophageal adenocarcinoma (Siewert I-III). For esophageal SCC:
  ICI-naive → nivolumab (IND-ESOPH-METASTATIC-2L-NIVO-SQUAMOUS) preferred; paclitaxel
  weekly is acceptable for ICI-experienced SCC patients.

rationale_ua: >
  Паклітаксел 80 мг/м² IV щотижнево (дні 1,8,15 циклу q28d) — NCCN Кат 1 прийнятний
  варіант 2Л при аденокарциномі стравоходу/ГЕЗ за умови недоступності рамуцирумабу.
  RAINBOW (Wilke 2014 Lancet Oncol): монотерапія паклітакселом — ORR 16%; mПВБ 2,9 міс.;
  mЗВ 7,4 міс. (проти 28%/4,4/9,6 міс. з рамуцирумабом).

  В Україні: паклітаксел відшкодується НСЗУ; рамуцирумаб — обмежено. Паклітаксел
  щотижневий — найдоступніший стандарт 2Л для більшості UA пацієнтів.
  Перевести на pac+ram при відновленні доступу до рамуцирумабу.

