    positions:
      - position: "Pac+ram — NCCN Cat 1 preferred; ORR 28% vs 16%; mOS 9.6 vs 7.4 mo (RAINBOW; HR 0.807; p=0.017); ramucirumab adds survival benefit over paclitaxel alone"
        sources: [SRC-NCCN-ESOPHAGEAL-2025]
      - position: "Paclitaxel monotherapy — NCCN Cat 1 acceptable; RAINBOW control arm; suitable when ramucirumab inaccessible (Ukraine); ORR 16%; mOS 7.4 mo still meaningful vs BSC"
        sources: [SRC-NCCN-ESOPHAGEAL-2025]
    our_default: "Pac+ram (IND-ESOPH-METASTATIC-2L-PAC-RAM) is preferred when ramucirumab accessible. Paclitaxel weekly monotherapy (this indication) for ramucirumab-inaccessible settings (Ukraine standard)."

