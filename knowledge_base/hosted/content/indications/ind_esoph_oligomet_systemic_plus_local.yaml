notes: >
  Esophageal oligometastatic systemic-plus-local track per OMEC-1 consensus
  + RENAISSANCE / AIO-FLOT5 design extrapolated to esophageal histology.
  Confidence: moderate (consensus + adenocarcinoma trial extrapolation;
  NCCN 2B). RENAISSANCE enrolled gastric/GEJ adenocarcinoma — esoph-only
  + ESCC histologies are extrapolated. Re-grade once full RENAISSANCE
  primary results published + esoph-specific oligomet RCT data emerge
  (D2 follow-up).

  §17 phases: NOT populated for v0.1 (planning doc gi2_wave §4.5
  recommendation 2). Local-therapy entities (esophagectomy /
  metastasectomy Surgery, SBRT RadiationCourse) for oligomet are
  future Phase C extensions. C2 + C4 chunks will populate Surgery +
  RadiationCourse for esoph; oligomet phases backfilled when those
  entities exist. Sequence (induction FLOT → restaging → local therapy
  → adjuvant FLOT for adenocarcinoma; nivo-chemo for ESCC) described
  in description / rationale / do_not_do text only. recommended_regimen:
  REG-FLOT (backfilled 2026-05-08 after C1 PR #435 created REG-FLOT;
  closes #438). Esoph use is extrapolation from gastric (RENAISSANCE).

  ESCC histology asymmetry flagged in known_controversies — RENAISSANCE
  evidence does not directly support ESCC; case-by-case MDT decision
  required. Indication primarily intended for EAC + GEJ Siewert I
  adenocarcinoma.

  Algorithm wiring deferred — esoph metastatic 1L algorithms do not
  yet have an oligomet branch. D2 follow-up: extend algorithm with
  oligomet decision step gated by RF-OLIGOMET-DEFINITION.

  Engine smoke (synthetic patient: esoph adenocarcinoma, mets=liver_1
  + para_aortic_LN_1, ECOG 1, primary_controllable=true, HER2 negative):
  RF-OLIGOMET-DEFINITION fires; no algorithm branch consumes it yet.
  Indication is reachable via direct ID lookup but not via current
  decision-tree routing. D2 algorithm-extension chunk needed to wire.

  actionability_review_required: true per Phase 1.5 schema convention
  (CIViC pivot — flagged for Clinical Co-Lead two-reviewer signoff
  per CHARTER §6.1).
