known_controversies:
  - topic: Routine use of metastasectomy / SBRT in esophageal oligomet outside trial — disputed; ESCC vs adenocarcinoma evidence asymmetry
    positions:
      - position: OMEC-1 consensus (Kroese 2023) — local therapy alongside systemic chemo for ≤3 metastases in selected patients (esophagogastric umbrella, both histologies)
        sources:
          - SRC-OMEC-1-KROESE-2018
        evidence_note: "European Delphi expert consensus; covers both adenocarcinoma + ESCC under esophagogastric umbrella"
      - position: RENAISSANCE / AIO-FLOT5 design — randomised test of FLOT alone vs FLOT + surgical resection for limited-metastatic gastric AND GEJ adenocarcinoma (does NOT enrol pure esoph or ESCC)
        sources:
          - SRC-RENAISSANCE-AIO-FLOT5
        evidence_note: "Phase 3 trial; OS primary endpoint full results pending as of 2026-05-04. Pure-esoph + ESCC histologies extrapolated"
      - position: NCCN v3.2025 esophageal — considers surgery for highly selected oligometastatic responders; not routine practice
        sources:
          - SRC-NCCN-ESOPHAGEAL-2025
        evidence_note: "Cites RENAISSANCE design rationale; no routine endorsement pending full results"
    our_default: "Restrict to MDT-reviewed adenocarcinoma cases meeting OMEC-1 consensus criteria + RENAISSANCE-pattern eligibility. ESCC oligomet on case-by-case MDT basis with explicit acknowledgement of weaker evidence base. Document trial registration where available."
    rationale: "Evidence base is consensus + ongoing-trial design with adenocarcinoma extrapolation; routine practice should await RENAISSANCE primary publication. ESCC asymmetry flagged so MDT can weigh evidence appropriately."

do_not_do:
  - "Do NOT offer surgical metastasectomy without 4 cycles induction systemic chemo first (RENAISSANCE design requires response demonstration)"
  - "Do NOT include peritoneal carcinomatosis, leptomeningeal disease, or >3 brain mets — these are explicit OMEC-1 exclusions"
  - "Do NOT proceed without MDT review (medical onc + surgical onc + radiation onc)"
  - "Do NOT extrapolate RENAISSANCE evidence to ESCC without explicit MDT-level evidence-base acknowledgement"
  - "Do NOT initiate FLOT-pattern systemic chemo with severe dysphagia / aspiration risk — establish nutritional access first (RF-ESOPH-SEVERE-DYSPHAGIA-ASPIRATION)"
  - "Do NOT use in HER2-positive disease — route via dedicated HER2 trastuzumab + chemo track"

