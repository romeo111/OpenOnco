rationale: >
  Oligometastatic esophageal adenocarcinoma (EAC, including GEJ Siewert I)
  per OMEC-1 European Delphi consensus (Kroese et al., Eur J Cancer 2023,
  PMID 36947929): ≤3 distant metastatic lesions in a patient with
  controllable primary disease, ECOG 0-1, all sites amenable to local
  therapy. Treatment intent is potentially curative via induction FLOT
  (or comparable platinum/fluoropyrimidine/taxane systemic chemo) with
  metastasis-directed local therapy (esophagectomy + metastasectomy or
  SBRT) in responders, modeled on the RENAISSANCE / AIO-FLOT5 trial
  design (Al-Batran et al., BMC Cancer 2017; NCT02578368). RENAISSANCE
  enrolled gastric AND esophagogastric-junction adenocarcinoma; pure
  esophageal oligomet evidence is extrapolated.

  Squamous-cell esophageal carcinoma (ESCC) oligomet is a case-by-case
  MDT decision — RENAISSANCE evidence does not extend to squamous
  histology, and ESCC standard 1L systemic is nivolumab + chemo (1L
  nivo-chemo SCC track) or ipilimumab + nivolumab; metastasis-directed
  local therapy in ESCC oligomet rests on smaller case-series + OMEC-1
  consensus.

  Sequence (described in text; phases: not populated for v0.1):
    1. Systemic induction: 4 cycles FLOT (or platinum/fluoropyrimidine/
       taxane triplet) for adenocarcinoma; for ESCC — nivolumab + chemo
       per standard 1L SCC track if ICI-eligible.
    2. Restaging at ~12 weeks: PET/CT, EUS, brain MRI if symptomatic.
    3. Metastasis-directed local therapy in responders: esophagectomy +
       metastasectomy (RENAISSANCE-pattern for adenocarcinoma in fit
       patients), or SBRT for site/patient ineligible for surgery (per
       OMEC-1 consensus on radiotherapy as alternative local modality).
    4. Adjuvant systemic continuation: 4 cycles FLOT (adenocarcinoma)
       per RENAISSANCE protocol; ICI-based maintenance for ESCC per
       1L SCC track.

  Evidence is sparse / consensus-grade. RENAISSANCE primary OS results
  pending full publication (ASCO 2024 interim only as of 2026-05-04);
  recommendation strength = conditional, NCCN category 2B (basis: NCCN
  v3.2025 esophageal cites RENAISSANCE design as rationale for
  considering surgery in highly selected oligometastatic responders,
  but does not yet endorse routine practice). HER2-positive disease
  excluded — those patients route via the dedicated HER2 trastuzumab +
  chemo track.

rationale_ua: >
  Олігометастатична аденокарцинома стравоходу (EAC, включаючи GEJ Siewert I)
  за консенсусом OMEC-1 European Delphi (Kroese et al., Eur J Cancer 2023,
  PMID 36947929): ≤3 дистантних метастатичних вогнищ у пацієнта з
  контрольованим первинним вогнищем, ECOG 0-1, всі вогнища доступні
  локальній терапії. Намір лікування — потенційно куративний: індукційний
  FLOT + метастазо-направлена локальна терапія у респондерів за дизайном
  RENAISSANCE / AIO-FLOT5. RENAISSANCE включав gastric ТА GEJ-аденокарциному;
  суто-езофагальні олігомет-дані екстраполюються.

  Squamous-cell стравоходу (ESCC) олігомет — case-by-case MDT-рішення:
  RENAISSANCE-докази не поширюються на squamous; стандарт 1L для ESCC —
  ніволумаб + хіміо (1L nivo-chemo SCC track) або іпілімумаб + ніволумаб;
  метастазо-направлена локальна терапія у ESCC олігомет базується на
  менших серіях + OMEC-1 консенсус.

