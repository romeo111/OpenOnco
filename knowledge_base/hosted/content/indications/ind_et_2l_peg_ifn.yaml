  - source_id: SRC-ESMO-MPN-2015
    position: context

do_not_do:
  - "НІКОЛИ не призначати HU або анагрелід при вагітності — тератогени; пег-IFN єдиний безпечний варіант"
  - "Активна важка депресія: пег-IFN абсолютно протипоказаний (суїцидальні ідеї); анагрелід"
  - "Важка аутоімунна хвороба (ВКВ з нирковим ур): IFN посилює — анагрелід або клінічний нагляд"
  - "ТТГ кожні 3 міс — гіпотиреоз ~10-20%; замісна терапія L-тироксином; не відміняти IFN при компенсованому гіпотиреозі"
  - "Фундоскопія до початку: ретинопатія є абсолютним протипоказанням"
  - "Ропегінтерферон (Besremi): не зареєстрований в Україні для ЕТ; тільки іменний імпорт при необхідності"

