do_not_do:
  - "Без HBV скринінгу: обінутузумаб + бендамустин викликають глибоку деплецію B-клітин → реактивація HBV може бути фатальною; ентекавір профілактично"
  - "При ритуксимаб-чутливому ФЛ (останній ритуксимаб ≥6 міс тому): R2 (AUGMENT) кращий (ORR 78%, PFS HR 0.46); G-бенда не вивчали в цій популяції"
  - "Профілактика ПЦП обов'язкова: ТМП-СМЗ від дня 1 до 12 міс після підтримки"
  - "Не відміняти підтримку обінутузумабом після 6 індукційних циклів (якщо є відповідь): 2-річна підтримка q2міс значно покращує ВБП vs лише індукція"
  - "Гістологічна трансформація → не G-бенда; агресивний лімфома протокол (DLBCL)"

