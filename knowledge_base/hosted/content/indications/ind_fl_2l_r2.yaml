rationale: >
  Rituximab+lenalidomide (R²) is the aggressive-track chemo-free 2L regimen for
  r/r FL. AUGMENT phase 3 RCT (Leonard 2019) demonstrated superior PFS over
  rituximab monotherapy (median 39.4 vs 14.1 mo; HR 0.46; p<0.001). IMiD
  (lenalidomide) + anti-CD20 (rituximab) combination exploits immunomodulatory
  activity and rituximab-resensitization mechanisms. Valuable where a chemo-free
  approach is preferred (pre-existing neuropathy, cytopenias, frailty, patient
  preference) or where rituximab-sensitive relapse allows re-challenge. NCCN
  Category 1 for r/r FL. Mandatory lenalidomide pregnancy prevention program
  (REMS/equivalent) and VTE prophylaxis required.

rationale_ua: >
  Ритуксимаб (rituximab) + леналідомід (lenalidomide) (R²) — безхімотерапевтична схема агресивного
  треку другої лінії для рецидивної/рефрактерної ФЛ. Дослідження AUGMENT (фаза 3 RCT; Leonard 2019)
  продемонструвало перевагу R² над монотерапією ритуксимабом (rituximab) за медіаною ВБП: 39.4 проти
  14.1 міс. (HR 0.46; p<0.001). Комбінація ІМіД (леналідомід) + анти-CD20 (ритуксимаб) використовує
  імуномодулюючу активність та механізми ресенсибілізації до ритуксимабу. Перевага при безхімотерапевтичному
  підході: наявна периферична нейропатія, цитопенії, крихкість пацієнта (frailty), перевага пацієнта,
  або рецидив, чутливий до ритуксимабу — показання для повторного застосування. NCCN Категорія 1 при
  рецидивній/рефрактерній ФЛ. Первинна кінцева точка дослідження AUGMENT — ВБП. Обов'язкова
  програма запобігання вагітності (REMS/еквівалент для леналідоміду) та профілактика ВТЕ.
