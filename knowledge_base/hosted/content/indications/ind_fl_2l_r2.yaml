  - "Гістологічна трансформація до DLBCL: R2 не підходить; агресивний лімфома-протокол (R-CHOP / CAR-T)"
  - "Зниження дози леналідоміду при ШКФ 30-60: 10 мг/добу; при <30 — не застосовувати"

