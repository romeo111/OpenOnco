id: IND-FL-3L-EPCORITAMAB
plan_track: aggressive

applicable_to:
  disease_id: DIS-FL
  line_of_therapy: 3
  stage_requirements:
    - "Relapsed / refractory FL Grade 1-3a after ≥2 prior systemic lines including an anti-CD20 antibody AND an alkylator"
    - "CD20 positive on most-recent biopsy (CD20 loss after prior anti-CD20 is exclusion)"
    - "ECOG 0-2"
    - "Adequate organ function (ANC ≥1.0, plt ≥75, AST/ALT ≤3× ULN, bilirubin ≤2× ULN, eGFR ≥30)"
    - "No active histologic transformation to DLBCL (re-biopsy mandatory if transformation suspected)"
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: "CD20 positive on most-recent biopsy — loss of CD20 after prior anti-CD20 is absolute exclusion"
  biomarker_requirements_excluded: []
  demographic_constraints:
    age_min: 18
    ecog_max: 2

recommended_regimen: REG-EPCORITAMAB-MONO-FL-3L
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~82% ORR (EPCORE NHL-1 FL expansion cohort, n=128; R/R FL ≥2 prior lines)"
  complete_response: "~68% CR"
  progression_free_survival: "Median PFS ~25.2 months; median DOR not reached at primary analysis"
  overall_survival_5y: "24-month OS ~83%; mature OS data still maturing"

hard_contraindications:
  - CI-HBV-NO-PROPHYLAXIS
  - CI-ACTIVE-INFECTION-FOR-ALEMTUZUMAB

red_flags_triggering_alternative:
  - RF-FL-TRANSFORMATION-SUSPECT
  - RF-FL-EZH2-Y641-ACTIONABLE

required_tests:
