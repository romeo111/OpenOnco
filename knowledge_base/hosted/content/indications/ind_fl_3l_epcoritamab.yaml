  - TEST-ECHO
  - TEST-MRI-BRAIN-CONTRAST

rationale: >
  Epcoritamab (Epkinly / Tepkinly) is a subcutaneous CD20×CD3 bispecific
  T-cell engager FDA-approved (February 29, 2024) for R/R FL ≥2 prior
  systemic lines, on the basis of EPCORE NHL-1 FL expansion cohort
  (NCT03625037; n=128): ORR ~82%, CR ~68%, median PFS ~25.2 months, 24-month
  OS ~83%. Efficacy markedly superior to DLBCL cohort (ORR 63%, CR 39%),
  consistent with indolent FL biology and more intact T-cell compartment.
  Mechanism: bivalent IgG1-based SC bispecific engaging CD3 on T cells and
  CD20 on tumor B cells, forming a cytolytic immune synapse — activates
  both CD4+ and CD8+ T cells independent of MHC class I. Step-up dosing
  (0.16 → 0.8 → 48 mg SC over cycle 1) + mandatory cycle-1 corticosteroid
  prophylaxis suppress CRS to predominantly Grade 1-2 (~50% any-grade,
  Grade ≥3 ~2%). Continuous indefinite dosing until progression —
  principal schedule trade-off vs time-limited mosunetuzumab (≤17 cycles).
  CRITICAL: confirm CD20 positivity at most-recent biopsy (CD20 loss common
  after multiple anti-CD20 lines); rule out histologic transformation to DLBCL
  (PET-CT + biopsy if suspected). HBV screen + entecavir/tenofovir prophylaxis
  mandatory (HBcAb+ = significant reactivation risk with B-cell depletion).
  NCCN B-cell lymphoma 2025: Category 2A preferred for FL ≥3L alongside
  mosunetuzumab. Major Ukraine access barrier: not registered, no NSZU pathway;
  international referral, compassionate use, or named-patient import only.
  Trial source SRC-EPCORE-NHL-1-FL-2024 present in KB.

rationale_ua: >
  Епкоритамаб (Epkinly / Tepkinly) — підшкірний CD20×CD3 біспецифічний
  Т-клітинний енгейджер FDA-схвалений (29 лютого 2024) для R/R ФЛ ≥2 попередніх
  системних ліній, на підставі EPCORE NHL-1 FL expansion cohort (NCT03625037;
  n=128): ORR ~82%, ПВ ~68%, медіана PFS ~25.2 міс, 24-місячна ЗВ ~83%.
  Ефективність помітно вища ніж у DLBCL-когорті (ORR 63%, ПВ 39%), що
  відповідає індолентній біології ФЛ і більш збереженому T-клітинному
  компартменту. Механізм: бівалентний IgG1 SC біспецифік, що активує CD3 на
  T-клітинах та CD20 на В-клітинах пухлини, формуючи цитолітичний імунний синапс.
  Покрокове дозування (0.16 → 0.8 → 48 мг SC протягом циклу 1) + обов'язкова
  кортикостероїдна профілактика знижує CRS переважно до 1-2 ступеня (~50%
  будь-якого ступеня, Grade ≥3 ~2%). Безперервне невизначене дозування до
  прогресії — головний компроміс графіка порівняно з часово-обмеженим
  мосунетузумабом (≤17 циклів). КРИТИЧНО: підтвердити CD20+ на найсвіжішій
  біопсії (втрата CD20 часта після кількох ліній anti-CD20); виключити
  гістологічну трансформацію до DLBCL (ПЕТ-КТ + біопсія за підозри).
  HBV скринінг + ентекавір/тенофовір профілактика обов'язкові. NCCN
  B-cell lymphoma 2025: Кат 2A preferred для ФЛ ≥3L поряд з мосунетузумабом.
  Великий бар'єр доступу в Україні: не зареєстрований, немає НСЗУ;
  лише міжнародне направлення, compassionate use або named-patient import.
  Джерело SRC-EPCORE-NHL-1-FL-2024 присутнє в KB.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-EPCORE-NHL-1-FL-2024
    position: supports
    relevant_quote_paraphrase: "Epcoritamab in R/R FL ≥2 prior lines: ORR 82%, CR 68%, mPFS 25.2 months; FDA approved Feb 29, 2024; NCCN Cat 2A"
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "Epcoritamab is a Category 2A preferred option for R/R FL ≥3L after ≥2 prior systemic lines per EPCORE NHL-1 FL cohort"

do_not_do:
  - "НЕ призначати без підтвердження CD20+ на найсвіжішій біопсії — втрата CD20 після попередніх анти-CD20 ліній = absolute exclusion."
  - "НЕ пропускати cycle-1 кортикостероїдну профілактику (преднізолон 100 мг × 4 дні навколо кожної step-up дози) — значно знижує CRS."
  - "НЕ пропускати 24-годинне лікарняне спостереження для першої дози 48 мг (цикл 1 день 15) — fatal CRS можливе без on-site моніторингу."
  - "НЕ розпочинати без on-site tocilizumab (≥2 дози доступно до кожної step-up дози) — рятівне лікування CRS Grade ≥2."
  - "НЕ призначати при гістологічній трансформації у DLBCL — це інше захворювання, маршрутизувати за ALGO-DLBCL-2L."
  - "НЕ призначати без HBV скринінгу та ентекавір/тенофовір профілактики при HBsAg+ або anti-HBc+ — реактивація HBV вимагає специфічної антивірусної терапії."
  - "НЕ ігнорувати baseline IgG — pre-existing гіпогаммаглобулінемія може потребувати IVIG; B-cell aplasia продовжує вразливість до інфекцій."
  - "НЕ підтверджувати план без funding pathway — не зареєстрований в Україні."

known_controversies:
  - topic: "Epcoritamab vs mosunetuzumab for R/R FL ≥3L (no head-to-head)"
    positions:
      - position: "Mosunetuzumab: time-limited (≤17 cycles), treatment-free interval possible; ORR 80%, CR 60%, mPFS 17.9 months; NCCN Cat 2A"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Epcoritamab: higher ORR (82%) and CR (68%), longer mPFS (25.2 mo); continuous indefinite dosing; SC ambulatory after cycle 1; NCCN Cat 2A"
        sources: [SRC-EPCORE-NHL-1-FL-2024, SRC-NCCN-BCELL-2025]
        evidence_note: "Cross-trial comparison only; no head-to-head RCT. mPFS advantage may reflect more recent patient selection."
    our_default: "Mosunetuzumab preferred if treatment-free interval valued or patient compliance with indefinite therapy uncertain; epcoritamab preferred if numerically better response more important and indefinite continuous therapy acceptable"
    rationale: "Both NCCN Cat 2A; no head-to-head; selection by schedule preference and patient fitness for indefinite therapy"
  - topic: "Epcoritamab vs CAR-T (axi-cel ZUMA-5) for R/R FL ≥3L"
    positions:
      - position: "Axi-cel (ZUMA-5): ORR ~94%, CR ~79%, mDOR not reached at 4 years; ~57% responders still in remission at 4 years — potentially curative"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Epcoritamab: ambulatory after cycle 1, no manufacturing window, off-the-shelf availability; practical when CAR-T inaccessible"
        sources: [SRC-EPCORE-NHL-1-FL-2024]
    our_default: "CAR-T preferred if eligible and accessible (durability advantage); epcoritamab when CAR-T is unavailable, declined, or patient ineligible"
    rationale: "CAR-T ZUMA-5 FL data shows potential curability; bispecifics are practical alternatives when CAR-T access impossible"

