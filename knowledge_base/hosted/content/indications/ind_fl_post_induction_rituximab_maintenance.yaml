rationale: 'Post-induction rituximab maintenance × 2 years standard of care for FL high-burden after BR or R-CHOP induction (NCCN Cat 1). PRIMA trial (Salles 2011 Lancet; 9-year update Bachy 2019): R-maintenance extends median PFS from ~4 to ~10 years vs observation; OS benefit not demonstrated in 9-year follow-up. Counsel on cumulative hypogammaglobulinemia + infection risk; PJP prophylaxis recommended; HBV reactivation surveillance mandatory throughout. Skip in elderly/frail/recurrent infection patients (preference-sensitive).'
rationale_ua: >
  Підтримуюча терапія (maintenance) ритуксимабом (rituximab) протягом 2 років є стандарт лікування
  (standard of care) після індукції BR або R-CHOP при ФЛ з високим пухлинним навантаженням (NCCN
  Категорія 1). Доказова база: дослідження PRIMA (Salles 2011, Lancet; 9-річне оновлення Bachy 2019):
  підтримуючий ритуксимаб подовжує медіану ВБП приблизно з 4 до ~10 років порівняно зі спостереженням;
  перевага в загальній виживаності (ЗВ) не була продемонстрована у 9-річному спостереженні.
  Рецидивний/рефрактерний перебіг після завершення підтримуючої терапії — наступний крок у лікувальному
  алгоритмі. Консультування пацієнтів щодо кумулятивної гіпогаммаглобулінемії та ризику інфекційних
  ускладнень є обов'язковим; рекомендована профілактика ПЦП (PJP prophylaxis); обов'язковий контроль
  реактивації ВГВ (HBV) під час усього курсу підтримуючої терапії. У літніх, крихких (frailty) або
  пацієнтів із рецидивними інфекціями рішення щодо підтримуючої терапії є preference-sensitive.
  Первинна кінцева точка PRIMA: ВБП.
