id: IND-GASTRIC-METASTATIC-1L-FGFR2B-BEMARITUZUMAB
plan_track: aggressive

applicable_to:
  disease_id: DIS-GASTRIC
  line_of_therapy: 1
  stage_requirements:
    - "Stage IV (metastatic) or unresectable locally advanced gastric / GEJ adenocarcinoma"
    - "No prior systemic therapy for advanced disease"
  biomarker_requirements_required:
    - biomarker_id: BIO-FGFR2B-IHC
      required: true
      value_constraint: "FGFR2b 2+/3+ membranous staining in ≥10% of tumor cells (FIGHT / FORTITUDE-101 threshold)"
  biomarker_requirements_excluded:
    - biomarker_id: BIO-HER2-SOLID
      value_constraint: "HER2-positive (IHC 3+ or IHC 2+/ISH+) excluded — TOGA trastuzumab+chemo supersedes"
    - biomarker_id: BIO-MSI-STATUS
      value_constraint: "MSI-H excluded — pembrolizumab (KEYNOTE-859) supersedes"
    - biomarker_id: BIO-CLDN18-2
      value_constraint: "CLDN18.2-positive (≥75% 2+/3+) supersedes when bemarituzumab vs zolbetuximab head-to-head data unavailable — MDT decision when dual-positive"
  demographic_constraints:
    ecog_max: 1

