known_controversies:
  - topic: "Bemarituzumab vs zolbetuximab when both biomarkers co-positive (FGFR2b-IHC ≥10% AND CLDN18.2 ≥75%)"
    positions:
      - position: "Zolbetuximab + chemo: mature phase 3 OS benefit (SPOTLIGHT / GLOW HR 0.75 / 0.77); FDA-approved Oct 2024; companion diagnostic FDA-cleared"
        sources: [SRC-NCCN-GASTRIC-2025]
        evidence_note: "Higher evidence tier (phase 3 vs phase 2 for bemarituzumab) until FORTITUDE-101 reads out"
      - position: "Bemarituzumab + chemo: numerically larger PFS / OS HRs in FIGHT phase 2 (HR 0.68 / 0.60); higher FGFR2b cutoffs amplify benefit"
        sources: [SRC-NCCN-GASTRIC-2025]
        evidence_note: "Confidence remains lower until phase 3 publication"
    our_default: "Zolbetuximab + chemo when CLDN18.2 ≥75% (phase 3 OS established); reserve bemarituzumab + chemo for FGFR2b ≥10% with CLDN18.2 <75% or post-zolbetuximab access barrier"
    rationale: "Both biomarkers can co-occur (~10% overlap estimated); evidence-tier hierarchy favors zolbetuximab until FORTITUDE-101 final results"
  - topic: "FGFR2b IHC threshold — ≥10% vs ≥5% vs all-comer 2+/3+"
    positions:
      - position: "≥10% threshold: FORTITUDE-101 / FIGHT registrational cutoff; HR magnitude greater at this stringent cutoff"
        sources: [SRC-FORTITUDE-101]
      - position: "Lower thresholds (≥5%, all-comer 2+/3+): broader eligibility but smaller HR magnitude in FIGHT exploratory subsets"
        sources: [SRC-NCCN-GASTRIC-2025]
        evidence_note: "Emerging — pending FORTITUDE-101 secondary analyses"
    our_default: "Use FORTITUDE-101 / FIGHT registrational threshold (≥10% 2+/3+) for treatment selection until label finalized"
    rationale: "Match the trial-defined threshold that drives label / reimbursement; lower-cutoff exploratory data is hypothesis-generating only"

do_not_do:
  - "НЕ розпочинати bemarituzumab без підтвердженого FGFR2b-IHC 2+/3+ ≥10% за валідованим IIIb-селективним антитілом — поза цим діапазоном користь не доведена."
  - "НЕ використовувати pan-FGFR2 IHC замість FGFR2b-селективного — ізоформа IIIb є мішенню; pan-FGFR2 не диференціює ізоформи."
  - "НЕ призначати у HER2+ пацієнтів — TOGA трастузумаб+chemo має пріоритет."
  - "НЕ призначати у MSI-H пацієнтів — пембролізумаб (KEYNOTE-859) має перевагу."
  - "НЕ розпочинати без вихідного офтальмологічного огляду + плану серійного контролю — рогівкові події ~70% будь-якого ступеня, ~25% ≥3 ступеня."
  - "НЕ підтверджувати план без funding pathway — bemarituzumab не зареєстрований; доступ через named-patient / clinical-trial only."
  - "НЕ комбінувати з іншими FGFR-селективними інгібіторами або CLDN18.2-таргетною терапією поза дослідженнями."

do_not_do_en:
  - "Do not start bemarituzumab without confirmed FGFR2b IHC 2+/3+ ≥10% by validated IIIb-isoform-selective antibody — outside this range benefit is not proven."
  - "Do not use pan-FGFR2 IHC instead of FGFR2b-selective — IIIb isoform is the target; pan-FGFR2 does not differentiate isoforms."
  - "Do not prescribe in HER2+ patients — TOGA trastuzumab+chemo takes priority."
  - "Do not prescribe in MSI-H patients — pembrolizumab (KEYNOTE-859) takes preference."
  - "Do not start without baseline ophthalmology exam + serial monitoring plan — corneal events ~70% any-grade, ~25% grade ≥3."
  - "Do not confirm the plan without funding pathway — bemarituzumab not registered; access via named-patient / clinical-trial only."
  - "Do not combine with other FGFR-selective inhibitors or CLDN18.2-targeted therapy outside trials."

