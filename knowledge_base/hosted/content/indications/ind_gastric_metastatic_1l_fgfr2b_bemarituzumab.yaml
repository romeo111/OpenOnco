rationale: >
  Bemarituzumab + mFOLFOX6 is an emerging 1L option for HER2-negative,
  MSI-stable, FGFR2b-overexpressing (IHC 2+/3+ ≥10%) metastatic gastric /
  GEJ adenocarcinoma. FIGHT phase 2 (Wainberg et al. Lancet Oncol 2022)
  demonstrated mPFS 9.5 vs 7.4 mo (HR 0.68), mOS 19.2 vs 13.5 mo (HR 0.60)
  — benefit greater at higher FGFR2b cutoffs. Phase 3 confirmatory trial
  FORTITUDE-101 ongoing; full readout pending. Confidence: MODERATE —
  phase 2 randomized data with consistent HR direction across PFS / OS /
  ORR, awaiting phase 3 confirmation. ESCAT IIA. ~30% of HER2-negative
  metastatic gastric / GEJ patients meet the FGFR2b threshold. Companion
  diagnostic IVD development concurrent with FORTITUDE-101 readout.
  Ocular toxicity (corneal events ~70% any-grade, ~25% grade ≥3) is the
  dose-defining AE — mandatory baseline + serial slit-lamp ophthalmology.
  No bemarituzumab regimen entity exists in KB yet — recommended_regimen
  intentionally null pending REG-BEMARITUZUMAB-MFOLFOX6 creation in a
  follow-up regimen-fill chunk.

rationale_ua: >
  Bemarituzumab + mFOLFOX6 — нова 1L опція для HER2-негативного,
  MSI-стабільного, FGFR2b-надекспресуючого (ІГХ 2+/3+ ≥10%)
  метастатичного раку шлунку / GEJ-аденокарциноми. Дослідження FIGHT
  фази 2 (Wainberg, Lancet Oncol 2022): мПВ 9.5 проти 7.4 міс
  (HR 0.68), мЗВ 19.2 проти 13.5 міс (HR 0.60) — користь зростає при
  вищих порогах FGFR2b. Підтверджуюче дослідження фази 3 FORTITUDE-101
  триває; повна публікація очікується. Впевненість: ПОМІРНА —
  рандомізовані дані фази 2 із послідовним HR-напрямком для ПВ / ЗВ /
  ЧВ, очікується підтвердження фази 3. ESCAT IIA. ~30% HER2-негативних
  метастатичних пацієнтів відповідають порогу FGFR2b. Розробка IVD
  companion diagnostic паралельна з FORTITUDE-101. Очна токсичність
  (рогівкові події ~70% будь-якого ступеня, ~25% ≥3 ступеня) — основна
  дозо-обмежуюча побічна дія — обов'язковий вихідний + серійний
  огляд офтальмолога.

