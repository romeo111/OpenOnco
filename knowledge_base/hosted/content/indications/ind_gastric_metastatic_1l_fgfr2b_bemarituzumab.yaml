rationale: >
  Bemarituzumab + mFOLFOX6 is an emerging 1L option for HER2-negative,
  MSI-stable, FGFR2b-overexpressing (IHC 2+/3+ ≥10%) metastatic gastric /
  GEJ adenocarcinoma. FIGHT phase 2 (Wainberg et al. Lancet Oncol 2022)
  demonstrated mPFS 9.5 vs 7.4 mo (HR 0.68), mOS 19.2 vs 13.5 mo (HR 0.60)
  — benefit greater at higher FGFR2b cutoffs. Phase 3 confirmatory trial
  FORTITUDE-101 ongoing; full readout pending. Confidence: MODERATE —
  phase 2 randomized data with consistent HR direction across PFS / OS /
  ORR, awaiting phase 3 confirmation. ESCAT IIA. ~30% of HER2-negative
  metastatic gastric / GEJ patients meet the FGFR2b threshold. Companion
  diagnostic IVD development concurrent with FORTITUDE-101 readout.
  Ocular toxicity (corneal events ~70% any-grade, ~25% grade ≥3) is the
  dose-defining AE — mandatory baseline + serial slit-lamp ophthalmology.
  recommended_regimen now resolves to REG-BEMARITUZUMAB-MFOLFOX6 (GI-2
  bemfill chunk 2026-05-07-1830) — FORTITUDE-101 phase 3 readout (ESMO
  2025 LBA10) confirmed mOS 17.9 vs 12.5 mo at primary analysis (HR 0.61)
  with attenuated benefit at descriptive follow-up (HR 0.82).

rationale_ua: >
  Бемаритузумаб (bemarituzumab) у комбінації з mFOLFOX6 — перспективна
  опція першої лінії для HER2-негативної, MSI-стабільної,
  FGFR2b-гіперекспресуючої (імуногістохімія 2+/3+ у ≥10% клітин пухлини)
  метастатичної аденокарциноми шлунка/стравохідно-шлункового з'єднання.
  У дослідженні FIGHT фази 2 (Wainberg та співавт., Lancet Oncol 2022)
  продемонстровано медіану виживаності без прогресування 9.5 проти
  7.4 міс (відношення ризиків 0.68), медіану загальної виживаності
  19.2 проти 13.5 міс (відношення ризиків 0.60) — користь зростає при
  вищих порогових значеннях FGFR2b. Підтверджувальне дослідження фази 3
  FORTITUDE-101 триває; повний звіт очікується. Рівень впевненості —
  ПОМІРНИЙ: рандомізовані дані фази 2 з послідовним напрямком відношення
  ризиків для виживаності без прогресування, загальної виживаності та
  загальної частоти відповіді, очікується підтвердження у фазі 3.
  Класифікація ESCAT IIA. Порогу FGFR2b відповідають близько 30%
  HER2-негативних пацієнтів із метастатичним захворюванням. Розробка
  супутньої діагностики IVD ведеться паралельно з аналізом FORTITUDE-101.
  Офтальмологічна токсичність (рогівкові події ~70% будь-якого ступеня,
  ~25% ступеня ≥3) є дозо-лімітуючою небажаною дією — обов'язкові
  вихідний та серійний огляди офтальмолога із застосуванням щілинної
  лампи. Поле recommended_regimen наразі вказує на REG-BEMARITUZUMAB-MFOLFOX6
  (чанк GI-2 bemfill 2026-05-07-1830) — первинний аналіз фази 3
  FORTITUDE-101 (ESMO 2025 LBA10) підтвердив медіану загальної
  виживаності 17.9 проти 12.5 міс (відношення ризиків 0.61) з
  послабленою користю при описовому подовженому спостереженні
  (відношення ризиків 0.82).

