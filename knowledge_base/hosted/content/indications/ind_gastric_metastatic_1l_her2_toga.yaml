id: IND-GASTRIC-METASTATIC-1L-HER2-TOGA
plan_track: aggressive

applicable_to:
  disease_id: DIS-GASTRIC
  line_of_therapy: 1
  stage_requirements: ["Stage IV (metastatic)", "Unresectable locally advanced"]
  biomarker_requirements_required:
    - biomarker_id: BIO-HER2-SOLID
      value_constraint: "positive (IHC 3+ OR IHC 2+/ISH+)"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-TRASTUZUMAB-CHEMO-TOGA
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate:
    value: "~47% (TOGA HER2 IHC3+ subgroup)"
    source: SRC-TOGA-BANG-2010
    notes: "TOGA (Bang 2010 Lancet): trastuzumab + cisplatin/capecitabine vs chemo alone in HER2+ advanced gastric/GEJ; ORR ~47% in IHC3+ subgroup"
  complete_response:
    value: "~5%"
    source: SRC-TOGA-BANG-2010
    notes: "TOGA: CR ~5% in trastuzumab + chemo arm overall"
  progression_free_survival:
    value: "Median ~7 mo"
    source: SRC-TOGA-BANG-2010
    notes: "TOGA: trastuzumab + chemo mPFS ~6.7 mo vs ~5.5 mo chemo alone (HR 0.71)"
  overall_survival_5y:
    value: "mOS 13.8 vs 11.1 chemo-only TOGA; 17.9 in HER2 IHC3+ subgroup"
    source: SRC-TOGA-BANG-2010
    notes: "TOGA: mOS 13.8 vs 11.1 mo (HR 0.74, p=0.0046); HER2 IHC3+ subgroup mOS 17.9 mo; first OS benefit in HER2+ gastric"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-GASTRIC-EMERGENCY-BLEED-OBSTRUCTION
  - RF-GASTRIC-FRAILTY-AGE

required_tests:
  - TEST-CT-CHEST-ABDOMEN-PELVIS
  - TEST-HER2-IHC-ISH-IF-RAS-WT  # reused; covers gastric HER2 too

desired_tests: []

rationale: >
  TOGA trial established trastuzumab + chemo as 1L standard for
  HER2+ metastatic gastric/GEJ. KEYNOTE-811 added pembrolizumab for
  HER2+ + PD-L1 CPS ≥1. Trastuzumab-deruxtecan (T-DXd) preferred
  2L+ post-trastuzumab failure. NCCN cat 1.

rationale_ua: >
  TOGA дослідження усталений трастузумаб + chemo as 1L стандарт for HER2+ метастатичний gastric/GEJ. KEYNOTE-811 added пембролізумаб for HER2+ + PD-L1 CPS ≥1. трастузумаб-deruxtecan (T-DXd) переважний 2L+ post-трастузумаб failure. NCCN cat 1.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-TOGA-BANG-2010
    position: supports
    relevant_quote_paraphrase: "TOGA (Bang 2010 Lancet): trastuzumab + cisplatin/capecitabine vs chemo alone; mOS 13.8 vs 11.1 mo (HR 0.74, p=0.0046); IHC3+ subgroup mOS 17.9 mo; established trastuzumab+chemo as 1L standard for HER2+ advanced gastric/GEJ"
  - source_id: SRC-NCCN-GASTRIC-2025
    position: supports
  - source_id: SRC-ESMO-GASTRIC-2024
    position: supports

do_not_do:
  - "Do NOT use without baseline LVEF — trastuzumab cardiotoxic (q3-mo echo monitoring)"
  - "Do NOT combine with anthracycline (cumulative cardiotoxicity)"
  - "Do NOT initiate during ongoing GI bleed / obstruction"

do_not_do_en:
  - "Do NOT use without baseline LVEF — trastuzumab cardiotoxic (q3-mo echo monitoring)"
  - "Do NOT combine with anthracycline (cumulative cardiotoxicity)"
  - "Do NOT initiate during ongoing GI bleed / obstruction"
last_reviewed: "2026-04-26"
notes: "HER2+ metastatic gastric — primary aggressive track."
