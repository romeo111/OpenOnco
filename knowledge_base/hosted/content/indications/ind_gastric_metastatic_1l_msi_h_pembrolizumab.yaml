sources:
  - source_id: SRC-KEYNOTE859-RHA-2023
    position: supports
    relevant_quote_paraphrase: >
      KEYNOTE-859: pembrolizumab+chemo vs chemo in HER2-neg advanced gastric/GEJ.
      All-comers OS HR 0.78 (p<0.0001). MSI-H/dMMR subgroup OS HR 0.38 (CI 0.19-0.74).
      FDA approved March 2023 for PD-L1 CPS ≥1.
  - source_id: SRC-NCCN-GASTRIC-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN Gastric 2025: pembrolizumab + fluoropyrimidine+platinum chemo — Category 1
      for HER2-negative advanced gastric/GEJ. MSI-H/dMMR — preferred subgroup for
      ICI-containing regimens.

do_not_do:
  - "НЕ призначати при HER2+ — трастузумаб+хімія є стандартом (незалежно від MSI)"
  - "НЕ пропускати тест на MSI/MMR та HER2 перед початком лікування"
  - "НЕ використовувати пембролізумаб монотерапію замість пембролізумаб+хімія у пацієнтів з ECOG 0-2 без обґрунтування"
  - "НЕ продовжувати ICI при Grade ≥3 irAE без повного обстеження та стероїдної терапії"
  - "Синдром Лінча — герміногенна консультація при MLH1/MSH2 дефіциті у пацієнтів <60 років"
  - "Якщо пембролізумаб недоступний в Україні — FOLFOX+ніволумаб (CheckMate-649) є прийнятною альтернативою того ж механізму"

