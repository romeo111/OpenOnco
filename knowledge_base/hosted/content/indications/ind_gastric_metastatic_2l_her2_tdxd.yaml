notes: >
  STUB — pending Co-Lead sign-off. Aggressive-track 2L for HER2+
  metastatic gastric. UA: T-DXd registered + NSZU-reimbursed for breast
  but NOT for gastric (2026 onco package); out-of-pocket / charitable
  pathway only. RAINBOW (paclitaxel + ramucirumab) is the funded
  fallback for HER2+ patients without T-DXd access.

  2026-05-07 update (GI-2 A1-extension / chunk gi2-a1ext-her2pos-2l-tdxd):
  added SRC-DESTINY-GASTRIC04-SHITARA-2025 citation alongside DG-01;
  outcomes block now carries Phase-3 Western mOS / ORR / PFS-HR alongside
  the original DG-01 Phase-2 Asian metrics. DG-04 (n=494, international,
  ramucirumab+paclitaxel control) is the definitive confirmatory trial
  and supersedes DG-01 as primary evidence basis; DG-01 retained because
  its CR rate (~9%) and median-PFS values are the only published
  point-estimates for those endpoints.
