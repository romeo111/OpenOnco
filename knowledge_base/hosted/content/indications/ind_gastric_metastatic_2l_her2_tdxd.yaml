do_not_do:
  - "НЕ ігнорувати baseline + serial HRCT chest — ILD ~12% incidence, ~1% fatal."
  - "НЕ продовжувати при підозрі на пневмоніт — негайний hold + пульмонолог + кортикостероїди."
  - "НЕ використовувати без HER2 reconfirmation на fresh biopsy за можливістю — HER2-loss після 1L поширений."
  - "НЕ призначати при baseline LVEF <50% — кардіотоксичність трастузумаб-базованих кон'югатів."
  - "НЕ пропускати profilactic high-emetogenic антиеметики — T-DXd HEC."
  - "НЕ підтверджувати план без верифікованого funding pathway — NSZU 2026 НЕ покриває T-DXd для шлунка."

do_not_do_en:
  - "Do not ignore baseline + serial HRCT chest — ILD ~12% incidence, ~1% fatal."
  - "Do not continue at suspicion of pneumonitis — immediate hold + pulmonologist + corticosteroids."
  - "Do not use without HER2 reconfirmation on fresh biopsy when possible — HER2-loss after 1L is common."
  - "Do not prescribe at baseline LVEF <50% — cardiotoxicity of trastuzumab-based conjugates."
  - "Do not skip prophylactic high-emetogenic antiemetics — T-DXd HEC."
  - "Do not confirm the plan without verified funding pathway — NSZU 2026 does NOT cover T-DXd for stomach."
time_critical: false
last_reviewed: '2026-05-07'
