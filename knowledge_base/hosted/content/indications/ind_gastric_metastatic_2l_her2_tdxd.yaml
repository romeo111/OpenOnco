desired_tests: []

rationale: >
  Trastuzumab deruxtecan (T-DXd) is the NCCN cat 1 preferred 2L for
  HER2+ metastatic gastric/GEJ adenocarcinoma after 1L trastuzumab-based
  regimen failure. DESTINY-Gastric01 (Shitara NEJM 2020, Asian Phase 2)
  established the ORR + OS + PFS benefit signal vs investigator's-choice
  chemo; DESTINY-Gastric04 (Shitara NEJM 2025, international Phase 3,
  n=494) confirmed this in a global, predominantly Western population —
  T-DXd 6.4 mg/kg q3w vs ramucirumab + paclitaxel: mOS 14.7 vs 11.4 mo
  (HR 0.70, p=0.004), ORR 44.3% vs 29.1%, PFS HR 0.74. HER2 positivity
  should be reconfirmed on fresh biopsy where feasible (HER2 loss occurs
  in ~30% post 1L). Gastric dose is 6.4 mg/kg q3w (higher than breast
  5.4 mg/kg). ILD is the dose-limiting boxed-warning toxicity (13.9% in
  DG-04, predominantly G1-2; ~12% historical, ~1% fatal).

rationale_ua: >
  трастузумаб дерукстекан (T-DXd) is the NCCN cat 1 переважний 2L for HER2+ метастатичний gastric/GEJ adenocarcinoma after 1L трастузумаб-based схема failure. DESTINY-Gastric01 усталений ORR + OS + PFS виграш over investigator's-choice chemo. HER2 positivity should be reconfirmed on fresh біопсія where feasible (HER2 loss occurs in ~30% post 1L). Gastric доза is 6.4 mg/kg q3w (higher than breast 5.4 mg/kg). ILD is the доза-limiting boxed-warning токсичність.
