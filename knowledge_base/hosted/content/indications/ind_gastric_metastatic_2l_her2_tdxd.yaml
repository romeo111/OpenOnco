id: IND-GASTRIC-METASTATIC-2L-HER2-TDXD
plan_track: aggressive

applicable_to:
  disease_id: DIS-GASTRIC
  line_of_therapy: 2
  stage_requirements:
    - "Stage IV (metastatic) OR unresectable locally advanced"
    - "Disease progression on or after 1L trastuzumab-containing regimen"
  biomarker_requirements_required:
    - biomarker_id: BIO-HER2-SOLID
      value_constraint: "positive (IHC 3+ OR IHC 2+/ISH+) on archival or fresh biopsy"
      required: true
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 1

recommended_regimen: REG-TDXD-GASTRIC
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "44.3% vs 29.1% (DESTINY-Gastric04, international Phase 3); ~51% (DESTINY-Gastric01, Asian Phase 2)"
  complete_response: "~9% (DESTINY-Gastric01)"
  progression_free_survival: "PFS HR 0.74 (95% CI 0.59-0.92, DESTINY-Gastric04); median PFS 5.6 vs 3.5 mo (HR 0.47, DESTINY-Gastric01)"
  overall_survival_median: "mOS 14.7 vs 11.4 mo (HR 0.70, 95% CI 0.55-0.90, DESTINY-Gastric04)"
  overall_survival_5y: "mOS 12.5 vs 8.4 mo (HR 0.59, DESTINY-Gastric01)"
  notes: >
    Phase-3 confirmation: DESTINY-Gastric04 (Shitara NEJM 2025;393(4):336-348,
    n=494 international) established T-DXd 6.4 mg/kg q3w superiority over
    ramucirumab + paclitaxel as 2L for HER2+ metastatic gastric/GEJ post
    1L trastuzumab. OS HR 0.70 + ORR 44.3% vs 29.1% confirm and extend the
    earlier Asian-only DESTINY-Gastric01 (Shitara NEJM 2020) Phase 2 signal
    to a global, predominantly Western population. ILD/pneumonitis 13.9%
    (predominantly G1-2) vs 1.3% reaffirms the boxed warning.

