sources:
  - source_id: SRC-KEYNOTE158-ANAL-MARABELLE-2020
    position: supports
    relevant_quote_paraphrase: >
      KEYNOTE-158 (Marabelle 2020 JCO): pembrolizumab in MSI-H non-CRC solid tumors
      including gastric/GEJ cohort; ORR ~45-57% in gastric MSI-H; CRs durable.
      Same paper covers multiple tumor cohort MSI-H pembrolizumab data.
  - source_id: SRC-NCCN-GASTRIC-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN Gastric 2025 Category 1: pembrolizumab for MSI-H/dMMR gastric/GEJ
      adenocarcinoma. Applicable to 2L+ ICI-naive patients.

do_not_do:
  - "НЕ призначати пембролізумаб при попередньому ІКІ (1L або будь-яка попередня лінія) — ретестування ICI не підтверджено в шлунку"
  - "MSS/pMMR: пембролізумаб монотерапія неефективна (<5% ORR); рам+пакліт"
  - "HER2 IHC 3+ при рецидиві: T-DXd переважно (ORR 51%; DESTINY-Gastric01); HER2 ретест при прогресуванні"
  - "Активна важка автоімунна хвороба на системній імуносупресії: рам+пакліт або клінічне дослідження"
  - "Моніторинг TSH: гіпотиреоз ~10-15% (левотироксин, не відміняти пембролізумаб)"
  - "Після пембролізумабу: рам+пакліт якщо ECOG 0-1 та придатний (наступна лінія)"

