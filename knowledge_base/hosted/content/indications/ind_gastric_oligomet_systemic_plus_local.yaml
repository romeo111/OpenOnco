known_controversies:
  - topic: Routine use of metastasectomy / SBRT in gastric oligomet outside trial — disputed
    positions:
      - position: OMEC-1 consensus (Kroese 2023) — local therapy alongside systemic chemo for ≤3 metastases in selected patients
        sources:
          - SRC-OMEC-1-KROESE-2018
        evidence_note: "European Delphi expert consensus; not RCT evidence"
      - position: RENAISSANCE / AIO-FLOT5 design — randomised test of FLOT alone vs FLOT + surgical resection for limited-metastatic disease
        sources:
          - SRC-RENAISSANCE-AIO-FLOT5
        evidence_note: "Phase 3 trial; OS primary endpoint full results pending as of 2026-05-04 (ASCO 2024 interim presented)"
      - position: NCCN v3.2025 — considers surgery for highly selected oligometastatic responders to systemic therapy; not routine practice
        sources:
          - SRC-NCCN-GASTRIC-2025
        evidence_note: "Cites RENAISSANCE design; no routine endorsement pending full results"
    our_default: "Restrict to MDT-reviewed cases meeting OMEC-1 consensus criteria + RENAISSANCE-pattern eligibility (≤1 incurable organ-system, no ascites, ≤1 retroperitoneal LN station). Document trial registration where available."
    rationale: "Evidence base is consensus + ongoing-trial design; routine practice should await RENAISSANCE primary publication. Track flagged conditional with explicit MDT gate."

do_not_do:
  - "Do NOT offer surgical metastasectomy without 4 cycles induction systemic chemo first (RENAISSANCE design requires response demonstration)"
  - "Do NOT include peritoneal carcinomatosis, leptomeningeal disease, or >3 brain mets — these are explicit OMEC-1 exclusions"
  - "Do NOT proceed without MDT review (medical onc + surgical onc + radiation onc)"
  - "Do NOT initiate during ongoing GI bleed / obstruction — emergency management first (RF-GASTRIC-EMERGENCY-BLEED-OBSTRUCTION)"
  - "Do NOT use in HER2-positive disease — route via dedicated HER2 trastuzumab + chemo track"

