rationale: >
  Oligometastatic gastric / GE-junction adenocarcinoma per OMEC-1 European
  Delphi consensus (Kroese et al., Eur J Cancer 2023, PMID 36947929):
  ≤3 distant metastatic lesions in a patient with controllable primary
  disease, ECOG 0-1, all sites amenable to local therapy. Treatment
  intent is potentially curative via induction FLOT (or comparable
  fluoropyrimidine + platinum + taxane systemic chemo) with metastasis-
  directed local therapy (metastasectomy or SBRT) in responders, modeled
  on the RENAISSANCE / AIO-FLOT5 trial design (Al-Batran et al., BMC
  Cancer 2017; NCT02578368).

  Sequence (described in text; phases: not populated for v0.1):
    1. Systemic induction: 4 cycles FLOT (or comparable platinum/
       fluoropyrimidine/taxane triplet) per OMEC-1 + RENAISSANCE design.
    2. Restaging at ~12 weeks: PET/CT, EUS as indicated. Patients with
       progression exit oligomet track to standard 1L metastatic
       management.
    3. Metastasis-directed local therapy in responders: surgical
       resection (gastrectomy + metastasectomy) per RENAISSANCE arm B,
       or SBRT for site/patient ineligible for surgery (per OMEC-1
       consensus on radiotherapy as alternative local modality).
    4. Adjuvant systemic continuation: 4 cycles FLOT post-local therapy
       per RENAISSANCE protocol.

  Evidence is sparse / consensus-grade. RENAISSANCE primary OS results
  are pending full publication (ASCO 2024 interim only as of 2026-05-04);
  recommendation strength = conditional, NCCN category 2B (basis: NCCN
  v3.2025 cites RENAISSANCE design as rationale for considering surgery
  in highly selected oligometastatic responders, but does not yet
  endorse routine practice). HER2-positive disease excluded — those
  patients route via the dedicated HER2 trastuzumab + chemo + ICI
  indication (KEYNOTE-811), with local-therapy consideration on a
  separate MDT-driven track.

rationale_ua: >
  Олігометастатична аденокарцинома шлунка / стравохідно-шлункового
  з'єднання за консенсусом OMEC-1 European Delphi (Kroese et al.,
  Eur J Cancer 2023, PMID 36947929): ≤3 дистантних метастатичних
  вогнищ у пацієнта з контрольованим первинним вогнищем, ECOG 0-1,
  всі вогнища доступні локальній терапії. Намір лікування —
  потенційно куративний: індукційний FLOT (або еквівалентна
  фторпіримідин + платина + таксан системна хіміо) + метастазо-
  направлена локальна терапія (метастазектомія або SBRT) у
  респондерів, за дизайном RENAISSANCE / AIO-FLOT5 (Al-Batran et al.,
  BMC Cancer 2017; NCT02578368).

  Послідовність (описано в тексті; phases: не заповнено для v0.1):
    1. Системна індукція: 4 цикли FLOT (або еквівалентний триплет).
    2. Restaging у ~12 тиж: PET/CT, EUS за показаннями.
    3. Метастазо-направлена локальна терапія у респондерів:
       резекція (гастректомія + метастазектомія) за RENAISSANCE arm B,
       або SBRT при недоступності хірургії.
    4. Ад'ювантне системне продовження: 4 цикли FLOT.

