desired_tests: []
rationale: >
  Bevacizumab is the most widely used agent for recurrent GBM based on two
  single-arm phase 2 studies (BRAIN; Friedman 2009 JCO) showing ~28-38%
  ORR and ~4-month PFS benefit vs historical controls. No randomized phase 3
  trial has shown OS benefit for bevacizumab in recurrent GBM; however, it
  reduces steroid requirements, improves radiographic response, and provides
  symptom palliation. NCCN category 2A. FDA approved for recurrent GBM (2009,
  accelerated approval). Alternative agents: lomustine (CCNU), temozolomide
  rechallenge (MGMT-methylated), carmustine (BCNU), or lomustine+bevacizumab
  (BELOB; modest PFS benefit but not OS). Clinical trial enrollment is preferred
  at recurrence.

rationale_ua: >
  Бевацизумаб (bevacizumab) — найширше застосовуваний препарат при
  рецидивній ГБМ на підставі двох односторонніх досліджень фази 2
  (BRAIN; Friedman, JCO 2009), що продемонстрували загальну частоту
  відповіді ~28-38% та користь щодо виживаності без прогресування
  ~4 міс порівняно з історичними контролями. У жодному рандомізованому
  дослідженні фази 3 не показано користі щодо загальної виживаності
  для бевацизумабу при рецидивній ГБМ; однак він зменшує потребу в
  кортикостероїдах, покращує рентгенологічну відповідь та забезпечує
  паліацію симптомів. Категорія NCCN 2A. Схвалено FDA для рецидивної
  ГБМ (2009, прискорене схвалення). Альтернативні препарати:
  ломустин (lomustine, CCNU), повторне призначення темозоломіду
  (за наявності метилювання MGMT), кармустин (carmustine, BCNU)
  або комбінація ломустин + бевацизумаб (BELOB; помірна користь щодо
  виживаності без прогресування, але без переваги щодо загальної
  виживаності). При рецидиві перевагу має включення в клінічне
  дослідження.
