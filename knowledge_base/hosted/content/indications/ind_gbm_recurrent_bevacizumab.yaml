id: IND-GBM-RECURRENT-BEVACIZUMAB
plan_track: standard

applicable_to:
  disease_id: DIS-GBM
  line_of_therapy: 2
  stage_requirements:
    - "Recurrent or progressive GBM (IDH-WT, WHO grade 4)"
    - "Progression on or after Stupp protocol (concurrent RT + TMZ) OR hypofractionated RT ± TMZ"
    - "Measurable disease on MRI (RANO criteria)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded:
    - "Active intracranial hemorrhage (bevacizumab contraindicated)"
    - "Recent major surgery within 28 days"
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-BEVACIZUMAB-GBM
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~28-38% (radiographic response; predominantly pseudo-response on MRI)"
  progression_free_survival: "mPFS ~4-6 mo (AVAglio + RTOG 0825 recurrent data; phase 2 studies)"
  overall_survival_median: "mOS ~9-10 mo from recurrence (no OS benefit in randomized data)"
  notes: "Bevacizumab improves PFS and steroid-sparing but NOT OS (AVAglio, RTOG 0825 — newly diagnosed trials; phase 2 recurrent data shows PFS benefit). NCCN 2A for recurrent GBM."

hard_contraindications:
  - "Active intracranial or other hemorrhage"
  - "Recent major surgery within 28 days (wound healing risk)"
  - "Uncontrolled hypertension"
  - "Active thrombotic/embolic event within 6 months"
  - "GI perforation history"
  - "Bevacizumab allergy"

red_flags_triggering_alternative:
  - RF-GBM-INTRACRANIAL-PRESSURE-EMERGENCY
  - RF-GBM-TRANSFORMATION-PROGRESSION

required_tests:
  - "MRI brain with contrast (pre-treatment baseline; RANO criteria)"
  - "CBC, CMP, LFTs, UPCR (bevacizumab baseline)"
  - "Blood pressure baseline"

desired_tests:
  - "MGMT methylation (if not already tested — predicts benefit from re-challenge TMZ)"
  - "O[6]-methylguanine-DNA methyltransferase (MGMT) expression"

rationale: >
  Bevacizumab is the most widely used agent for recurrent GBM based on two
  single-arm phase 2 studies (BRAIN; Friedman 2009 JCO) showing ~28-38%
  ORR and ~4-month PFS benefit vs historical controls. No randomized phase 3
  trial has shown OS benefit for bevacizumab in recurrent GBM; however, it
  reduces steroid requirements, improves radiographic response, and provides
  symptom palliation. NCCN category 2A. FDA approved for recurrent GBM (2009,
  accelerated approval). Alternative agents: lomustine (CCNU), temozolomide
  rechallenge (MGMT-methylated), carmustine (BCNU), or lomustine+bevacizumab
  (BELOB; modest PFS benefit but not OS). Clinical trial enrollment is preferred
  at recurrence.

rationale_ua: >
  Бевацизумаб для рецидивної ГБМ: ORR ~28-38%, PFS ~4-6 міс. Немає переваги ОВ
  у РКД, але зменшує потребу в стероїдах і дає симптоматичне полегшення. NCCN 2A.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
  - source_id: SRC-NCCN-CNS-2025
    position: supports
  - source_id: SRC-EANO-GBM-2024
    position: supports

do_not_do:
  - "Do NOT use bevacizumab with active intracranial hemorrhage"
  - "Do NOT confuse radiographic response (pseudo-response) with true tumor response — MRI signal normalization often reflects vascular normalization, not tumor kill"
  - "Do NOT delay bevacizumab due to steroid taper — both can coexist; bev may enable steroid reduction"
  - "Do NOT skip UPCR before each cycle — proteinuria can necessitate dose hold/discontinuation"
  - "Do NOT enroll in bevacizumab trials after prior bevacizumab — most trials exclude bev-pretreated patients"
  - "Do NOT add lomustine routinely without clinical trial framework — BELOB suggests modest PFS benefit but lomustine toxicity significant"

last_reviewed: "2026-05-04"
notes: >
  Recurrent GBM prognosis is poor (mOS ~6-9 months with any treatment).
  Clinical trial enrollment is strongly preferred at recurrence. Bevacizumab
  10 mg/kg IV q2w is the standard dose for recurrent GBM (FDA approval).
  Lomustine (110 mg/m² q6w) is an alternative chemotherapy agent for
  recurrent GBM, particularly in MGMT-methylated patients.
  TTFields (Optune) maintenance at recurrence: phase 3 EF-11 did not show
  superiority over physician's choice; not recommended as recurrent standard.
  REG-BEVACIZUMAB-GBM needs authoring (10 mg/kg IV q2w flat dosing).
