id: IND-GBM-RECURRENT-BEVACIZUMAB
plan_track: standard

applicable_to:
  disease_id: DIS-GBM
  line_of_therapy: 2
  stage_requirements:
  - "Recurrent or progressive GBM (IDH-WT, WHO grade 4)"
  - "Progression on or after Stupp protocol (concurrent RT + TMZ) OR hypofractionated RT ± TMZ"
  - "Measurable disease on MRI (RANO criteria)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-BEVACIZUMAB-GBM
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~28-38% (radiographic response; predominantly pseudo-response on MRI)"
  progression_free_survival: "mPFS ~4-6 mo (AVAglio + RTOG 0825 recurrent data; phase 2 studies)"
  overall_survival_median: "mOS ~9-10 mo from recurrence (no OS benefit in randomized data)"
  notes: "Bevacizumab improves PFS and steroid-sparing but NOT OS (AVAglio, RTOG 0825 — newly diagnosed trials; phase 2 recurrent data shows PFS benefit). NCCN 2A for recurrent GBM."

