    position: supports
    relevant_quote_paraphrase: >
      NCCN CNS Tumors 2025: lomustine (CCNU) 110 mg/m² q6w is a Category 2A option for
      recurrent GBM; preferred in MGMT-methylated patients. Bevacizumab is Category 2A
      for steroid-sparing. Clinical trial preferred for all fit recurrent GBM patients.
  - source_id: SRC-EF14-STUPP-2015
    position: supports
    relevant_quote_paraphrase: >
      EF-11 (Stupp 2012 Eur J Cancer; Phase 3; n=237): lomustine 110 mg/m² q6w was the
      standard control arm vs TTFields at recurrence. Lomustine ORR 10%, mPFS 2.9 mo,
      mOS 7.8 mo. Established lomustine as the reference comparator in recurrent GBM trials.
      (Note: SRC-EF14-STUPP-2015 documents the EF-14 study; EF-11 source not yet ingested.)

