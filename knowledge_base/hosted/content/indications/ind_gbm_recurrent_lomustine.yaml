do_not_do:
  - "Ломустин щоденно: ЛЕТАЛЬНО — ОДНА доза q6тижнів (110 мг/м² разово)"
  - "ОАК лише на тижні 2: надир тижні 4-6; обов'язковий контроль на днях 21 та 42"
  - "Ломустин при MGMT-неметильованих пухлинах: ЧВ ~5%; бевацизумаб кращий"
  - "Без ФЗД перед стартом: кумулятивний легеневий фіброз"
  - "Повторна доза до відновлення ОАК: ризик тяжкої мієлосупресії"

sources:
