notes: >
  Testicular GCT is unique — curative even at metastatic stage for most patients.
  Post-BEP residual mass management: seminoma >3cm → PET-guided (FDG-avid → biopsy/resection;
  FDG-negative → observe); NSGCT >1cm → RPLND for residual teratoma resection.
  Surveillance after good-risk GCT: CT CAP q3-4 months year 1, then q6 months year 2-3;
  markers q1-2 months year 1.
  2L salvage: TIP (paclitaxel + ifosfamide + cisplatin) or VIP (vinblastine + ifosfamide
  + cisplatin) for cisplatin-sensitive relapse; high-dose chemotherapy + ASCT at
  specialized centers for multiply relapsed/refractory GCT.
