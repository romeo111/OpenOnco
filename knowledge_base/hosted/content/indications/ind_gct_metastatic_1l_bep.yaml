- TEST-BRAIN-MRI-CONTRAST
- TEST-PET-CT

rationale: >
  BEP (bleomycin 30 IU days 2, 9, 16 + etoposide 100 mg/m²/d days 1-5 +
  cisplatin 20 mg/m²/d days 1-5 per 21-day cycle) is NCCN Category 1 and the
  global standard of care for advanced testicular GCT. IGCCC risk classification
  (J Clin Oncol 1997, n>5000 patients) determines cycle number: good risk → BEP
  × 3 cycles; intermediate/poor risk → BEP × 4 cycles. Testicular GCT is one
  of the most chemosensitive solid tumors — BEP cures ~92% of good-risk and ~80%
  of intermediate-risk metastatic GCT. Key principles: (1) radical orchiectomy
  must precede chemotherapy; (2) serum tumor markers (AFP, beta-hCG, LDH) must
  be measured pre-treatment and monitored each cycle; (3) DLCO assessment prevents
  fatal bleomycin pulmonary toxicity; (4) dose intensity is CRITICAL — do NOT
  reduce doses for myelosuppression without G-CSF escalation; (5) patients
  requiring general anesthesia post-BEP must limit FiO₂ <30%.
  EP (without bleomycin) × 4 cycles is equivalent for good-risk disease and
  used when bleomycin is contraindicated (IND-GCT-METASTATIC-1L-EP).

rationale_ua: >
  BEP (блеоміцин 30 МО д2, 9, 16 + етопозид 100 мг/м²/д д1-5 + цисплатин
  20 мг/м²/д д1-5 кожні 21 день) є NCCN Категорія 1 та глобальним стандартом
  для поширеного тестикулярного ГКП. IGCCC класифікація визначає кількість
  циклів: добрий ризик → BEP × 3; середній/поганий → BEP × 4. ГКП яєчка є
  одним з найбільш хіміочутливих злоякісних пухлин — BEP виліковує ~92% при
  доброму ризику. Ключові принципи: (1) радикальна орхіектомія до хіміотерапії;
  (2) маркери (АФП, бета-хГЛ, ЛДГ) до кожного циклу; (3) DLCO оцінка для
  профілактики блеоміцинової токсичності; (4) дозова інтенсивність критична —
  НЕ знижувати дози без G-КСФ ескалації.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
- source_id: SRC-IGCCC-1997
  position: supports
  relevant_quote_paraphrase: "IGCCC 1997 risk classification: good-risk (5y OS ~92%, BEP ×3), intermediate-risk (5y OS ~80%, BEP ×4), poor-risk (5y OS ~50%, BEP ×4)"
- source_id: SRC-NCCN-TESTICULAR-2025
  position: supports
  relevant_quote_paraphrase: "BEP × 3 (good risk) or × 4 (intermediate/poor risk) is NCCN Category 1 for advanced testicular GCT; IGCCC risk stratification is mandatory pre-treatment"

do_not_do:
- "НІКОЛИ не давати FiO₂ >30% пацієнтам під час або після BEP — O₂ + блеоміцин = фатальний легеневий фіброз; попередити анестезіолога"
- "Не пропускати DLCO базово і перед кожним циклом при 4-циклових протоколах — припинити блеоміцин при падінні DLCO >25%"
- "Не знижувати дози цисплатину або етопозиду заради токсичності без G-КСФ ескалації — ГКП є курабельним; дозова інтенсивність критична"
- "Не починати BEP до орхіектомії (крім рідких випадків з загрозою для життя від поширеного захворювання)"
- "Не ігнорувати зростання маркерів (АФП/ХГЛ) після 1-2 циклів BEP — може свідчити про рефрактерне захворювання; проконсультуватись з GCT-спеціалістом"
- "Не використовувати карбоплатин замість цисплатину при нормальній функції нирок — карбоплатин НИЖЧА ефективність при поганому/середньому ризику GCT (лише при CrCl <30 або непереносимості)"

known_controversies:
- topic: "BEP ×3 vs EP ×4 for good-risk testicular GCT"
  positions:
  - position: "BEP ×3 is standard (NCCN Cat 1): shorter treatment, equivalent efficacy to EP ×4; bleomycin exposure limited to 3 cycles reduces pulmonary risk"
    sources:
    - SRC-NCCN-TESTICULAR-2025
  - position: "EP ×4 preferred when DLCO impaired, age >40-50, or any pulmonary concern — equivalent to BEP ×3 for good-risk (Loehrer 1995 phase 3)"
    sources:
    - SRC-IGCCC-1997
  our_default: "BEP ×3 for good-risk with normal DLCO; EP ×4 for bleomycin contraindication"
  rationale: "Bleomycin adds activity in intermediate/poor risk but is equipotent in good-risk when cycles are adjusted"

