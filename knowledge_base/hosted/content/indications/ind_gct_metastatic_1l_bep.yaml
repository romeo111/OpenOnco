id: IND-GCT-METASTATIC-1L-BEP
plan_track: standard

applicable_to:
  disease_id: DIS-TESTICULAR-GCT
  line_of_therapy: 1
  stage_requirements:
  - "Clinical stage II-III (metastatic/advanced) testicular GCT (seminoma or non-seminoma)"
  - "Post-orchiectomy (radical orchiectomy is diagnostic and therapeutic first step)"
  - "Systemic chemotherapy indicated based on IGCCC risk classification"
  - "Stage IIA/B seminoma with multiple retroperitoneal nodes or marker elevation — consider chemotherapy over RT"
  - "Good risk (IGCCC): BEP × 3 cycles"
  - "Intermediate or poor risk (IGCCC): BEP × 4 cycles"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-BEP-GCT
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~90-95% ORR for good-risk GCT; ~80-85% for intermediate-risk"
  complete_response: "~70-80% complete marker normalization"
  progression_free_survival: "5-year relapse-free survival: ~92% good risk; ~80% intermediate risk; ~50% poor risk"
  overall_survival_5y: "5-year OS: ~92-95% good risk; ~80% intermediate risk; ~50-55% poor risk (IGCCC 1997)"

