notes: >
  Loehrer 1995 (PMID 7844589; J Clin Oncol): EP × 4 vs BEP × 3 for good-risk GCT;
  equivalent CR and 3-year relapse-free survival. This trial establishes the
  EP × 4 = BEP × 3 equivalence. SRC-LOEHRER-1995 not yet authored in KB —
  citation via SRC-NCCN-TESTICULAR-2025 which endorses this equivalence.
