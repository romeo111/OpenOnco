id: IND-GCT-METASTATIC-1L-EP
plan_track: standard

applicable_to:
  disease_id: DIS-TESTICULAR-GCT
  line_of_therapy: 1
  stage_requirements:
  - "Advanced/metastatic testicular GCT (seminoma or non-seminoma) — stage II-III"
  - "Post-radical inguinal orchiectomy"
  - "IGCCC risk classified (good/intermediate/poor)"
  - "Bleomycin CONTRAINDICATED — use when: DLCO <80% predicted, CrCl <50 mL/min, prior bleomycin pulmonary toxicity, age >40-50 with baseline lung disease"
  - "EP × 4 cycles for all IGCCC risk groups when bleomycin contraindicated"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-EP-GCT
concurrent_therapy: []
followed_by:
- "Serum tumor markers (AFP, beta-hCG, LDH) after completion — must normalize"
- "CT CAP after completion — assess residual mass"
- "Residual mass management: seminoma >3cm → PET-guided; NSGCT >1cm → RPLND"

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  complete_response_rate: "Equivalent to BEP × 3 for good-risk (Loehrer 1995)"
  overall_survival_5y: "~92% good risk; ~80% intermediate risk; ~50% poor risk (same as BEP)"
  notes: "EP × 4 cycles = BEP × 3 for good-risk GCT (Loehrer 1995, phase 3 randomized trial)"

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests:
- TEST-AFP
- TEST-BETA-HCG
- TEST-LDH
- TEST-CBC
- TEST-CMP
- TEST-CREATININE-CL
- TEST-LFT
- TEST-CT-CAP
- TEST-PFT-SPIROMETRY-DLCO
- TEST-AUDIOMETRY

desired_tests:
- TEST-BRAIN-MRI-CONTRAST

rationale: >
  EP (etoposide 100 mg/m²/d d1-5 + cisplatin 20 mg/m²/d d1-5 per 21-day cycle,
  × 4 cycles) is the bleomycin-free alternative to BEP for advanced testicular GCT
  when bleomycin is contraindicated. Loehrer 1995 (J Clin Oncol, phase 3 randomized):
  EP × 4 = BEP × 3 in good-risk GCT — equivalent complete response rate and 5-year OS.
  For intermediate/poor-risk GCT: EP × 4 = BEP × 4 (indirect; NCCN recommendation
  based on bleomycin toxicity avoidance rationale). Key: 4 cycles required regardless
  of IGCCC risk group when bleomycin is omitted — shorter EP course is NOT validated.
  Curative intent maintained — dose intensity critical (do NOT reduce cisplatin
  or etoposide for myelosuppression; use G-CSF).

rationale_ua: >
  EP (без блеоміцину) × 4 цикли = BEP × 3 при хорошому ризику IGCCC (Loehrer 1995).
  Призначається коли блеоміцин протипоказаний: DLCO <80%, КК <50 мл/хв, попередній
  блеоміциновий пневмоніт, вік >40-50 з легеневою патологією. 4 цикли обов'язкові
  незалежно від IGCCC ризику (скорочення до 3 циклів EP НЕ підтверджено). Дозова
  інтенсивність критична — ГКП є потенційно курабельним.

