sources:
- source_id: SRC-EINHORN-HDCT-ASCT-2007
  position: supports
  relevant_quote_paraphrase: "Indiana HDCT+ASCT (n=173): 63% NED at 2y overall; 78% favorable group; <3% TRM; NCCN Cat 1 for cisplatin-refractory/poor-Indiana-score relapsed GCT"

do_not_do:
- "Не відправляти на HDCT при ECOG ≥2 або значній органній дисфункції — летальність процедури неприйнятна"
- "Не відкладати збір стовбурових клітин — мобілізація G-CSF до першого HDCT циклу"
- "Не застосовувати без спеціалізованого аутоТКМ центру"
- "Не ігнорувати можливість TIP у сприятливому прогностичному сценарії — HDCT не обов'язково 1-я лінія рятівної терапії при хорошому прогнозі"

known_controversies:
- topic: "TIP × 4 vs HDCT+ASCT first-line salvage — which is better 2L?"
  positions:
  - position: "TIP × 4 first, then HDCT at TIP failure — standard sequential approach"
    sources: [SRC-KONDAGUNTA-TIP-2005]
  - position: "HDCT upfront for poor Indiana score — better NED than conventional chemo in high-risk"
    sources: [SRC-EINHORN-HDCT-ASCT-2007]
  our_default: "TIP × 4 for good/intermediate Indiana; HDCT first-line for cisplatin-refractory or poor Indiana score"

time_critical: true
time_critical_note: "Transplant eligibility window closes if ECOG deteriorates; timely referral to ASCT center essential"
