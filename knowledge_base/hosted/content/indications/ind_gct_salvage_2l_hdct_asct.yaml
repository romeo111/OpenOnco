id: IND-GCT-SALVAGE-2L-HDCT-ASCT
plan_track: transplant

applicable_to:
  disease_id: DIS-TESTICULAR-GCT
  line_of_therapy: 2
  stage_requirements:
  - "Relapsed or refractory testicular GCT after cisplatin-containing 1L chemotherapy"
  - "ANY of the following: cisplatin-refractory disease (relapse within 4 weeks of last cisplatin) OR poor Indiana prognostic score (AFP ≥1000 ng/mL OR hCG ≥1000 IU/L OR liver/bone/brain mets) OR incomplete response to 1L"
  - "ECOG PS 0-1 at time of HDCT consideration (required for transplant eligibility)"
  - "Adequate cardiac, pulmonary, renal, and hepatic function for high-dose protocol"
  - "No active infection at time of stem cell infusion"
  - "Availability of ASCT-capable center"
  biomarker_requirements_required:
  - biomarker_id: BIO-AFP
    value_constraint: "AFP — Indiana prognostic classification (≥1000 ng/mL = poor risk)"
  - biomarker_id: BIO-HCG-SERUM
    value_constraint: "hCG — Indiana prognostic classification (≥1000 IU/L = poor risk)"
  demographic_constraints:
    ecog_max: 1
    age_note: "No absolute age cutoff but physiological reserve critical; most series enrolled patients <60y"

recommended_regimen:
regimen_note: >
  REG-HDCT-ASCT-GCT not yet authored — Indiana protocol:
  2 tandem cycles of carboplatin 700 mg/m²/d × 3 days + etoposide 750 mg/m²/d × 3 days
  followed by autologous PBSC rescue. Peripheral stem cell collection (G-CSF mobilization)
  done before first HDCT cycle. Specialized ASCT center mandatory.
concurrent_therapy: []

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  ned_2year_overall: "63% (Einhorn 2007)"
  ned_favorable: "78%"
  ned_unfavorable: "53%"
  treatment_related_mortality: "<3%"
  notes: >
    Einhorn 2007 (NEJM; n=173): HDCT × 2 tandem cycles + ASCT at Indiana University.
    63% NED at 2 years (potentially curative). Favorable Indiana score: 78% NED.
    Even in previously multiply-treated GCT, long-term remissions achievable.

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests:
- TEST-CT-CAP
- TEST-CBC
- TEST-LFT
rationale: >
  HDCT+ASCT (Indiana protocol): 2 tandem cycles of high-dose carboplatin + etoposide
  with ASCT rescue. Einhorn 2007 (NEJM; n=173): 63% NED at 2 years including in
  cisplatin-refractory/poor-prognosis patients. HDCT exploits non-cross-resistant
  mechanism at supralethal doses of carboplatin (DNA crosslinking) + etoposide
  (topoisomerase II inhibition). Indiana tandem transplant is now the most widely
  referenced HDCT protocol. NCCN Category 1 for cisplatin-refractory GCT or poor
  Indiana prognostic score. Requires ASCT-capable center with GCT expertise.
  Several HDCT regimens exist (Indiana, MSKCC TI-CE); Indiana protocol most referenced.

rationale_ua: >
  HDCT+ASCT (протокол Indiana): 2 тандемні цикли високодозового
  карбоплатину (carboplatin) з етопозидом (etoposide) із подальшим
  порятунком аутологічними периферичними стовбуровими клітинами.
  Einhorn 2007 (NEJM; n=173): 63% відсутності ознак захворювання
  на 2-й рік, у тому числі у пацієнтів з цисплатин-рефрактерним
  захворюванням або несприятливим прогнозом. HDCT використовує
  механізм без перехресної резистентності при супралетальних дозах
  карбоплатину (зшивання ДНК) + етопозиду (інгібування топоізомерази
  II). Тандемна трансплантація за протоколом Indiana — найширше
  цитований протокол HDCT. Категорія NCCN 1 для цисплатин-рефрактерного
  ГКР або несприятливого прогностичного індексу Indiana. Потребує
  спеціалізованого центру ASCT з досвідом ведення ГКР. Існує кілька
  режимів HDCT (Indiana, MSKCC TI-CE); протокол Indiana
  застосовується найчастіше. Доступність в Україні обмежена — розгляньте
  направлення до міжнародного центру.

