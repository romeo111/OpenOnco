sources:
  - source_id: SRC-NCCN-TESTICULAR-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN Testicular Cancer 2025: gemcitabine+paclitaxel listed as Category 2A
      third-line or subsequent salvage for relapsed/refractory GCT after ≥2 prior
      cisplatin-containing regimens. GEMOX listed as Category 2B alternative.

do_not_do:
  - "НЕ пропускати премедикацію перед паклітакселем — ризик важкої гіперчутливості без дексаметазону/антигістаміну"
  - "НЕ застосовувати при ≥2 ступ. периферичної нейропатії — GemOx є альтернативою"
  - "КЛІНІЧНИЙ ПРОТОКОЛ — пріоритет перед GemPac у 3L ГКП; завжди перевіряти доступність"
  - "НЕ ігнорувати залишкові маси після відповіді — RPLND після нормалізації маркерів може бути куративним"
  - "Направлення до спеціалізованого ГКП центру ОБОВ'ЯЗКОВЕ у 3L"
  - "Консультація щодо збереження фертильності перед хімієтерапією — молоді пацієнти, чоловіки"

time_critical: true
time_critical_note: >
  Rapidly rising tumor markers (doubling time <7 days) indicate explosive relapse —
  initiate within days. For marker plateau or slow rise, a few weeks to clinical
  trial screening is acceptable.
