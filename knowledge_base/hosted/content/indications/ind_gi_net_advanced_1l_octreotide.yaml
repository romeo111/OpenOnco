    position: supports
    relevant_quote_paraphrase: >
      NCCN Neuroendocrine Tumors 2025 Category 1: octreotide LAR 20-30 mg IM q4w
      for well-differentiated G1/G2 GI-NET; equivalent Category 1 to lanreotide
      for antiproliferative therapy. PROMID Phase 3 basis.
  - source_id: SRC-CLARINET-CAPLIN-2014
    position: supports
    relevant_quote_paraphrase: >
      CLARINET (Caplin NEJM 2014): lanreotide (same SSA class as octreotide LAR)
      demonstrated mPFS HR 0.47 in GEP-NET G1/G2. Cross-study comparison supports
      octreotide LAR as equivalent mechanism/class agent.

