do_not_do:
  - "Не призначати SSA-монотерапію при погано-диференційованій NEC (Ki67 >55%) — протипоказано для антипроліферативного застосування"
  - "Не застосовувати октреотид LAR без базового підтвердження G1/G2 гістології — при NEC SSA неефективний"
  - "Не пропускати базову УЗД жовчного міхура — жовчнокам'яна хвороба від SSA у ~15-20%"
  - "Не ігнорувати ехокардіографію при клінічному карциноїдному синдромі — хвороба серця у ~20%"
  - "Не забувати IV октреотид IR перед хірургічним втручанням або емболізацією — ризик карциноїдного кризу"

sources:
