notes: >
  Authored 2026-05-04 (Workstream DS) — closing IND-GIST-1L-WT-CLINICAL-TRIAL
  gap noted in algo_gist_1l.yaml.
  WT-GIST is a "clinical trial preferred" indication — the KB entry serves to
  document the clinical trial pathway and ensure molecular workup is complete.
  REG-CLINICAL-TRIAL-REFERRAL: this regimen ID is a placeholder for the
  clinical trial referral. Check if a generic clinical trial referral regimen
  entity exists in the KB; if not, this should be authored.
  The key clinical value: ensuring ALL WT-GIST patients get proper molecular
  characterization (SDHB IHC + comprehensive NGS) before any treatment decision,
  and are referred to appropriate trials rather than receiving ineffective imatinib.
