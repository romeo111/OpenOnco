do_not_do:
  - "НЕ застосовувати при PDGFRA D842V — авапритиніб ефективніший"
  - "НЕ пропускати тижневий контроль АЛТ/АСТ перші 2 місяці — гепатотоксичність регорафенібу може бути фатальною"
  - "НЕ призначати при Child-Pugh B/C — печінкова недостатність у важкому ступені"
  - "НЕ продовжувати при активній неконтрольованій кровотечі або кровохарканні"
  - "НЕ плутати схему GIST (160 мг 3/1) з CRC дозуванням — ОДНАКОВА схема; але пам'ятайте про стартову дозу 80/120 мг у ECOG 2"
  - "При прогресуванні: ріпретиніб 4L (INVICTUS; NCCN Кат 1); при недоступності — повторний іматиніб (RIGHT trial; Cat 2A)"

sources:
  - source_id: SRC-NCCN-GIST-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN GIST 2025 Category 1: regorafenib 160 mg PO daily (3 weeks on/1 week off)
      for unresectable or metastatic GIST after imatinib + sunitinib failure or intolerance.
      Sequential cascade: imatinib → sunitinib → regorafenib → ripretinib.

known_controversies:
  - topic: "Regorafenib starting dose: 160 mg vs dose-escalation from 80-120 mg"
    positions:
      - position: "160 mg daily (3/1 schedule): FDA-approved GRID trial dose; NCCN standard"
        sources: [SRC-NCCN-GIST-2025]
      - position: "Start 80 or 120 mg with escalation to 160 mg: pragmatic dose-titration used in clinical practice, especially ECOG 2, borderline LFTs, or known HFSR susceptibility — reduces early discontinuation"
        sources: [SRC-NCCN-GIST-2025]
    our_default: "160 mg (3/1) per FDA/NCCN; dose-reduce at start for ECOG 2 + borderline organ function; escalate as tolerated."

