  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
  - TEST-CT-CHEST-ABDOMEN-PELVIS
  - TEST-ECHO
desired_tests:
  - TEST-NGS-COMPREHENSIVE

rationale: >
  Ripretinib monotherapy is FDA-approved (May 2020) for 4L+ advanced
  GIST after prior progression or intolerance to imatinib + sunitinib
  + regorafenib, on the basis of INVICTUS phase III (n=129, ripretinib
  150 mg PO daily vs placebo) — primary endpoint mPFS 6.3 vs 1.0 mo
  (HR 0.15, p<0.0001); ORR 9.4% vs 0%; mOS 15.1 vs 6.6 mo (HR 0.36)
  with crossover. Mechanism: switch-pocket inhibitor with broad
  activity across heterogeneous KIT and PDGFRA mutations (KIT exon 9,
  11, 13, 14, 17, 18; PDGFRA exon 12, 14, 18 except D842V) — binds
  the activation loop in both inactive and active conformations,
  overcoming secondary resistance mutations that develop on prior
  TKIs. CRITICAL: INTRIGUE phase III (ripretinib vs sunitinib 2L)
  was NEGATIVE — sunitinib remains 2L SOC; ripretinib position
  UNCHANGED at 4L+. Toxicity profile favorable vs prior 4L options
  (best supportive care historically): palmar-plantar
  erythrodysesthesia (PPES) common (~21% any grade, ~3% Grade ≥3),
  cutaneous SCC / melanoma ~5-7% (routine derm exams q2 months
  required), LVEF decline (class effect; baseline + periodic echo),
  hypertension (anti-VEGF–like), alopecia. PDGFRA D842V GIST is
  ripretinib-RESISTANT (responds to avapritinib instead) — confirm
  genotype before 4L assignment. Major Ukraine access barrier:
  not registered, not NSZU; named-patient import / international
  pharmacy / clinical trial only. Out-of-pocket USD 32K/month.
  Trial source SRC-INVICTUS exists in KB.

rationale_ua: >
  Ріпретиніб монотерапія FDA-схвалена (травень 2020) для 4L+
  поширеного ГІСП після прогресії або непереносимості іматинібу +
  сунітинібу + регорафенібу, на підставі INVICTUS фаза III (n=129,
  ріпретиніб 150 мг PO щодня проти плацебо) — первинна кінцева
  точка mPFS 6.3 проти 1.0 міс (HR 0.15, p<0.0001); ORR 9.4%
  проти 0%; mOS 15.1 проти 6.6 міс (HR 0.36) з кросовером. Механізм:
  switch-pocket інгібітор широкого спектру KIT та PDGFRA мутацій
  (KIT екзон 9, 11, 13, 14, 17, 18; PDGFRA екзон 12, 14, 18 крім
  D842V) — зв'язується з activation loop у неактивній та активній
  конформаціях, долаючи вторинні мутації резистентності, що
  розвиваються на попередніх TKI. КРИТИЧНО: INTRIGUE фаза III
  (ріпретиніб проти сунітинібу 2L) була НЕГАТИВНОЮ — сунітиніб
  лишається 2L SOC; позиція ріпретинібу НЕЗМІННА на 4L+. Профіль
  токсичності сприятливий vs історичні 4L опції (best supportive
  care): palmar-plantar erythrodysesthesia (PPES) часта (~21%
  будь-якого ступеня, ~3% Grade ≥3), шкірний SCC / меланома ~5-7%
  (рутинні дерм-огляди q2 місяці обов'язкові), зниження ФВЛШ
  (класовий ефект; baseline + періодичне ехо), гіпертензія
  (anti-VEGF–подібний), алопеція. PDGFRA D842V ГІСП —
  ріпретиніб-РЕЗИСТЕНТНИЙ (відповідає на avapritinib) — підтвердити
  генотип перед 4L. Великий бар'єр доступу в Україні:
  не зареєстрований, не НСЗУ; тільки named-patient import /
  international pharmacy / клінічне дослідження. Out-of-pocket
  USD 32K/місяць. Джерело SRC-INVICTUS присутнє в KB.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-INVICTUS
    position: supports
    relevant_quote_paraphrase: "Ripretinib 150 mg PO daily significantly improved mPFS 6.3 vs 1.0 months (HR 0.15) in 4L+ GIST after imatinib + sunitinib + regorafenib"
  - source_id: SRC-NCCN-GIST-2025
    position: supports
    relevant_quote_paraphrase: "Ripretinib is preferred for 4L+ advanced GIST (Cat 1) per INVICTUS phase III"

do_not_do:
  - "НЕ призначати ріпретиніб у PDGFRA D842V ГІСП — мутаційно резистентний; маршрутизувати на avapritinib (IND-GIST-1L-AVAPRITINIB-PDGFRA-D842V)."
  - "НЕ призначати ріпретиніб у 2L (поза трайлом) — INTRIGUE фаза III була НЕГАТИВНОЮ; сунітиніб лишається 2L SOC."
  - "НЕ пропускати baseline + періодичні дерм-огляди q2 місяці — кутані малігнізації (SCC, меланома) ~5-7%; рання ексцизія дозволяє продовжити ріпретиніб."
  - "НЕ пропускати baseline ехо/MUGA — клас-ефект кардіотоксичності TKI."
  - "НЕ комбінувати з сильними CYP3A4-індукторами (рифампін, фенітоїн, звіробій) — суттєве зниження AUC ріпретинібу + активного метаболіту DP-5439."
  - "НЕ призначати без підтвердження прогресії на ВСІХ трьох попередніх лініях (іматиніб + сунітиніб + регорафеніб) — поза показаннями FDA-етикетки."
  - "НЕ підтверджувати план без funding pathway — препарат не зареєстрований в Україні; out-of-pocket USD 32K/місяць."

known_controversies:
  - topic: "Ripretinib 4L+ vs ripretinib dose escalation (150 mg BID) on progression"
    positions:
      - position: "Ripretinib 150 mg once daily per INVICTUS — registered standard"
        sources: [SRC-INVICTUS, SRC-NCCN-GIST-2025]
      - position: "Intra-patient dose escalation to 150 mg BID on progression — Phase 1b/2 INTRIGUE-2 cross-over data; modest additional benefit"
        sources: [SRC-NCCN-GIST-2025]
        evidence_note: "Reserve for fit patients with documented progression on standard dose; toxicity increases."
    our_default: "Ripretinib 150 mg once daily per INVICTUS; consider escalation only on confirmed progression"
    rationale: "INVICTUS is the registered standard; escalation evidence still maturing"
  - topic: "Ripretinib vs re-challenge with imatinib at progression on regorafenib"
    positions:
      - position: "Ripretinib preferred per NCCN Cat 1 — INVICTUS demonstrated PFS + OS benefit vs placebo"
        sources: [SRC-NCCN-GIST-2025]
      - position: "Imatinib re-challenge — RIGHT phase III showed modest PFS benefit (1.8 vs 0.9 mo, HR 0.46) vs placebo; lower cost, registered in Ukraine"
        sources: [SRC-NCCN-GIST-2025]
        evidence_note: "Imatinib re-challenge magnitude smaller than ripretinib INVICTUS; access-driven fallback in Ukraine."
    our_default: "Ripretinib if access available; imatinib re-challenge as Ukraine fallback"
    rationale: "Ripretinib INVICTUS magnitude exceeds imatinib re-challenge RIGHT; access dominates choice in Ukraine"

