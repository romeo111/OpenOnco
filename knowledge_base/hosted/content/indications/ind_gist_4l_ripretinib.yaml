id: IND-GIST-4L-RIPRETINIB
plan_track: aggressive

applicable_to:
  disease_id: DIS-GIST
  line_of_therapy: 4
  stage_requirements:
    - "Advanced / metastatic / unresectable GIST"
    - "Prior progression OR documented intolerance to imatinib (1L), sunitinib (2L), AND regorafenib (3L) — 4L+ FDA label per INVICTUS"
  biomarker_requirements_required:
    - biomarker_id: BIO-KIT
      value_constraint: "KIT mutation positive (any exon — 9, 11, 13, 14, 17, 18) — ripretinib is broad-spectrum switch-pocket inhibitor"
      required: false
    - biomarker_id: BIO-PDGFRA
      value_constraint: "PDGFRA mutation positive (exon 12 / 14 / 18 except D842V) — D842V responds to avapritinib, NOT ripretinib"
      required: false
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-RIPRETINIB-GIST-4L
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~9.4% ORR (INVICTUS, n=129; ripretinib 150 mg vs placebo 4L+ GIST)"
  complete_response: "~0% CR; majority partial responses + stable disease"
  progression_free_survival: "Median PFS 6.3 vs 1.0 months (HR 0.15, p<0.0001) — INVICTUS primary endpoint"
  overall_survival_5y: "Median OS 15.1 vs 6.6 months (HR 0.36) — INVICTUS secondary endpoint with crossover allowed. INTRIGUE phase III (ripretinib vs sunitinib 2L) was NEGATIVE — sunitinib remains 2L SOC; ripretinib position unchanged at 4L+."

hard_contraindications: []
