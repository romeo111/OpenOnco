notes: >
  STUB — pending Clinical Co-Lead sign-off. Authored 2026-05-04 (Workstream DL).
  INDIGO trial was pivotal — first Phase 3 trial to show benefit for IDH inhibition
  in LGG. FDA approval August 2024 represents the first oral drug approved for LGG.
  OS data not mature (LGG long natural history, 10–20 year median OS).
  TTI endpoint (time to next intervention, i.e., deferral of RT/chemo) may be the
  most clinically meaningful secondary endpoint — preserving cognitive function.
  AED interaction note: flagged as do_not_do and in concurrent_therapy — this is
  the highest-priority practical issue for implementation in clinical practice.
