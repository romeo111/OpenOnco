do_not_do:
  - "НЕ призначати при IDH-дикому типі гліоми — немає цілі, немає ефекту (IDH-WT grade 2 = молекулярна ГБМ)"
  - "НЕ призначати при WHO grade 3-4 — INDIGO: тільки grade 2; при Grade 3 потрібна РТ + хімієтерапія"
  - "НЕ починати без IDH-секвенування (IDH ІГХ недостатньо — не-R132H мутанти ІГХ-негативні)"
  - "НЕ поєднувати з індукторами CYP3A4 (карбамазепін, фенітоїн) — знижують воросіденіб ~85%; замінити на леветирацетам"
  - "НЕ ігнорувати підвищення АЛТ/АСТ — гепатотоксичність потребує обов'язкового моніторингу LFT щомісяця × 3 міс"
  - "НЕ призначати вагітним — ембріо-фетальна токсичність; обов'язкова ефективна контрацепція"

