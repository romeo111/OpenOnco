id: IND-GRANULOSA-CELL-1L-CARBO-PACLITAXEL
plan_track: standard

applicable_to:
  disease_id: DIS-GRANULOSA-CELL
  line_of_therapy: 1
  stage_requirements:
    - "Advanced adult granulosa cell tumor: FIGO stage III–IV (peritoneal spread, lymph node involvement, distant metastases)"
    - "OR recurrent adult GCT after initial surgical management (unresectable recurrence or recurrence not amenable to surgery alone)"
    - "OR high-risk early stage (stage IC with rupture at surgery, stage II) — adjuvant chemotherapy considered after MDT discussion"
    - "Adults (≥18 years); juvenile GCT is a separate entity with distinct biology"
    - "ECOG PS 0-2"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    notes: >
      No companion diagnostic biomarker required — all adult GCTs share FOXL2 p.C134W
      mutation (~97%) and estrogen production; no actionable therapeutic biomarker
      available as of 2026.
      FOXL2 mutation testing: use for diagnosis confirmation (pathognomonic), not
      therapeutic selection. Inhibin B and AMH serum levels: measure at baseline as
      tumor markers for response monitoring and recurrence surveillance.
      Fertility preservation: for women of reproductive childbearing age with unilateral
      tumor who desire fertility — unilateral salpingo-oophorectomy (USO) with staging
      is acceptable for stage I disease (discuss with multidisciplinary team); BSO
      remains standard for post-menopausal women or high-risk features.
      Stage I disease without high-risk features: surgery alone (BSO + staging) is
      standard of care — chemotherapy NOT indicated for low-risk stage I adult GCT.

recommended_regimen: REG-CARBO-PACLI-OVARIAN
concurrent_therapy:
  - "Anti-emetic prophylaxis: 5-HT3 antagonist + dexamethasone + NK1 antagonist (Day 1, before chemotherapy)"
  - "G-CSF secondary prophylaxis: if prior cycle required dose delay or reduction; primary prophylaxis optional"
  - "Tumor marker monitoring: inhibin B and AMH at baseline + prior to each cycle"
  - "Endometrial biopsy: if uterus retained — GCT produces estrogen; endometrial hyperplasia/carcinoma screening mandatory"
  - "Contraception: effective contraception during treatment (carboplatin and paclitaxel are teratogenic)"

followed_by:
  - "CT chest/abdomen/pelvis: after cycle 3 (interim response) and after cycle 6 (end-of-treatment)"
  - "Tumor markers (inhibin B, AMH): after each cycle"
  - "Maintenance: observation standard post-6-cycle chemotherapy (no approved maintenance agent for GCT)"
  - "At recurrence after carbo/paclitaxel: hormonal therapy (letrozole 2.5 mg QD or anastrozole 1 mg QD or leuprolide GnRH agonist) OR BEP if not prior; clinical trial preferred"
  - "Second-line hormonal: leuprolide 3.75 mg IM q28d (GnRH agonist) — limited retrospective data"
  - "Second-line chemotherapy: TIP (paclitaxel + ifosfamide + cisplatin) or gemcitabine + paclitaxel as salvage options"

evidence_level: low
strength_of_recommendation: moderate
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~60–80% (retrospective series; platinum-based doublet in advanced/recurrent GCT; no Phase 3 RCT available)"
  complete_response: "~30–50% in advanced setting (retrospective data; wide range due to small case series)"
  progression_free_survival: "Median PFS ~12–24 months in recurrent setting (heterogeneous; long natural history with multiple recurrences possible)"
  overall_survival_5y: "~40–50% for advanced/metastatic GCT at 5 years; Stage I OS ~90% at 10 years (surgery alone)"
  notes: >
    PRIMARY EVIDENCE: No Phase 3 RCT exists for advanced/recurrent adult GCT (rare disease,
    estimated <2,000 new cases/year in the US). Evidence base is retrospective case series
    and Phase 2 studies.
    KEY REFERENCES:
    - Homesley HD et al., Gynecol Oncol 1999;73:131–137: BEP (N=57) for advanced sex-cord
      stromal tumors — 37% complete response, 51% partial response.
    - Tao X et al., Gynecol Oncol 2009;114:512–516: Retrospective carboplatin + paclitaxel
      in recurrent GCT (N=18): ORR 72% in platinum-sensitive; recommended as preferred
      regimen due to superior tolerability vs BEP.
    - Brown J et al., J Clin Oncol 2004;22:3517–3523: GOG phase 2 (BEP) in granulosa cell
      tumors — established BEP as an option but limited activity data.
    NCCN Ovarian Cancer v1.2025: carboplatin/paclitaxel listed as preferred first-line
    regimen for recurrent/advanced adult GCT (Category 2A; uniform consensus, lower evidence).
    BEP is an acceptable alternative, especially in younger patients (<35 years) or those
    with prior resistance to carbo/paclitaxel.
    NOTE: Adult GCT has a characteristically indolent but relapsing natural history —
    responses to platinum-based chemotherapy are observed, but recurrences over 10–20 years
    are typical. Treatment goals are disease control and symptom management, not cure,
    in the metastatic/advanced setting.

hard_contraindications:
  - "Stage I adult GCT without high-risk features — surgery alone is standard; chemotherapy not indicated"
  - "ECOG PS ≥4 — ECOG engine hard gate"
  - "Platinum hypersensitivity (carboplatin allergy) — substitute with BEP or discuss desensitization"

red_flags_triggering_alternative:
  - RF-FITNESS-ECOG-FIT

required_tests:
  - TEST-CBC
  - TEST-LFT
  - TEST-CMP
  - TEST-CT-CHEST-ABDOMEN-PELVIS
  - "Serum inhibin B: baseline tumor marker (most sensitive and specific for adult GCT)"
  - "Serum AMH (anti-Müllerian hormone): baseline (elevated in active GCT)"
  - "Endometrial biopsy or sampling: if uterus retained — assess for GCT-driven endometrial hyperplasia/carcinoma"
  - "Pregnancy test: mandatory before treatment"

desired_tests:
  - "FOXL2 mutation testing (p.C134W): if diagnosis equivocal — pathognomonic for adult GCT"
  - "MRI pelvis: local staging for pelvic disease extent"
  - "PET-CT: if conventional imaging inconclusive for extent of disease"
  - "Estradiol level: GCT is estrogen-producing; elevated estradiol at baseline"

rationale: >
  Adult granulosa cell tumor (AGCT) of the ovary is a rare sex cord-stromal tumor
  (~5% of ovarian malignancies, ~1-2/100,000 women/year). It is molecularly defined by
  the FOXL2 p.C134W somatic mutation (~97% of cases) — the only pathognomonic somatic
  mutation known in any solid tumor. FOXL2 is a granulosa cell transcription factor;
  the C134W mutation is a dominant-negative gain-of-function that disrupts granulosa
  cell differentiation and drives tumor estrogen production.

  CLINICAL FEATURES: Most patients present with excess estrogen manifestations
  (postmenopausal bleeding, endometrial hyperplasia). Stage I disease predominates
  (~70-80% at diagnosis) with excellent prognosis (90% 10-year OS). However, late
  recurrences (10–20 years after initial surgery) are characteristic of adult GCT,
  and the clinical course involves multiple recurrences over decades.

  TREATMENT PRINCIPLE:
  - Stage I: Surgery (BSO ± staging) is curative in the majority; no adjuvant
    chemotherapy for low-risk stage I.
  - Advanced/Recurrent (FIGO III-IV or recurrent disease): Platinum-based chemotherapy
    is the standard systemic approach. Carboplatin + paclitaxel (AUC 5-6, 175 mg/m² Q3W)
    is the preferred regimen based on retrospective data and tolerability; BEP is an
    alternative with similar activity.

  EVIDENCE BASE: No Phase 3 RCTs exist for adult GCT (disease is too rare). Evidence
  comes from Phase 2 studies and retrospective series:
  - Homesley et al. (GOG, Gynecol Oncol 1999): BEP in sex cord-stromal tumors — 88%
    response rate in advanced disease.
  - Tao et al. (Gynecol Oncol 2009): Carboplatin + paclitaxel preferred over BEP based
    on retrospective comparison (comparable efficacy, better tolerability).
  NCCN Ovarian Cancer: carboplatin/paclitaxel Category 2A for advanced/recurrent GCT.

  TUMOR MARKERS: Inhibin B is the most sensitive serum marker for adult GCT (90%+
  sensitivity) and is used for response monitoring and surveillance. AMH (anti-Müllerian
  hormone) is an alternative marker. Elevated serum inhibin/AMH at recurrence detects
  disease before imaging in many cases.

  NO FDA-APPROVED TARGETED THERAPY: As of 2026, no drug is specifically approved for
  adult GCT. Clinical trials targeting FOXL2 (inhibitors in early development) and
  CDK4/6 inhibitors (palbociclib — Phase 2 data emerging) are ongoing.

  UKRAINE CONTEXT: Carboplatin and paclitaxel are widely available in Ukraine
  (NSZU-reimbursed for ovarian cancer). Adult GCT is uncommon — Ukrainian patients
  should be referred to gynecologic oncology centers with rare tumor expertise.

rationale_ua: >
  Доросла гранульозоклітинна пухлина яєчника (ГКП): рідкісна (~5% злоякісних пухлин
  яєчника), молекулярно визначена мутацією FOXL2 p.C134W (~97%). I ст.: хірургія
  (БСО ± стадіювання); ад'ювантна хімієтерапія зазвичай не потрібна при низькому ризику.
  Поширена/рецидивуюча ГКП: карбоплатин AUC5-6 + паклітаксел 175 мг/м² Q3T × 6 циклів.
  Заснована на ретроспективних серіях (рандомізованих досліджень немає — рідкісна хвороба).
  Маркери пухлини: інгібін B та АМГ — моніторинг відповіді та рецидиву.
  Відсутня FDA-схвалена цільова терапія (FOXL2-інгібітори в клінічних дослідженнях).
  Характерні пізні рецидиви (через 10–20 р.); лікування направлене на контроль хвороби.
  Україна: карбоплатин + паклітаксел — доступно, НСЗУ-реімбурсовано для рак яєчників.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

do_not_do:
  - "НЕ призначати хімієтерапію при I ст. ГКП без факторів ризику — хірургії достатньо"
  - "НЕ ігнорувати ендометрій — ГКП виробляє естрогени; ризик гіперплазії/раку ендометрія при збереженій матці"
  - "НЕ пропускати моніторинг інгібіну B / АМГ — найбільш чутливі маркери для ГКП"
  - "НЕ відкладати клінічне дослідження при рецидиві — рідкісна хвороба потребує доказової бази"
  - "НЕ плутати ювенільну ГКП (молодші пацієнти, різна біологія, інше лікування) з дорослою ГКП"

sources:
