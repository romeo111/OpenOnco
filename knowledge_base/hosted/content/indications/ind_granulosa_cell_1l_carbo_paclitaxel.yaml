    position: supports
    relevant_quote_paraphrase: >
      NCCN Ovarian Cancer: carboplatin/paclitaxel Category 2A for recurrent/advanced
      adult granulosa cell tumor. BEP is an acceptable alternative. No FDA-approved
      targeted therapy; clinical trial enrollment encouraged.
  - source_id: SRC-ESMO-OVARIAN-2024
    position: supports
    relevant_quote_paraphrase: >
      ESMO Ovarian Cancer guidelines: platinum-based chemotherapy (carboplatin/paclitaxel
      or BEP) for advanced/recurrent adult granulosa cell tumor. No prospective Phase 3
      trial data available; expert consensus based on retrospective series.

