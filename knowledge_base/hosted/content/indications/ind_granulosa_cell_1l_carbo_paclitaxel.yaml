notes: >
  STUB — pending Clinical Co-Lead sign-off. Authored 2026-05-04 (Workstream DM).
  Evidence level LOW — no Phase 3 RCT exists for adult GCT (rare disease).
  Carboplatin + paclitaxel preferred over BEP in current practice due to better
  tolerability; retrospective data suggest comparable efficacy.
  Hormone therapy (letrozole, anastrozole, leuprolide) is used for recurrent/
  refractory disease or maintenance — not authored as a separate KB indication
  yet; referenced in followed_by notes.
  FOXL2-targeted therapy and CDK4/6 inhibitors (palbociclib Phase 2) are
  investigational — no approved agents as of 2026.
  Serum inhibin B is the most clinically important tumor marker — document at
  baseline and before each cycle for response monitoring.
