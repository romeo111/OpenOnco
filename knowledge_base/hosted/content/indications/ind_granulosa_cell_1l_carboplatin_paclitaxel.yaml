  disease_id: DIS-GRANULOSA-CELL
  line_of_therapy: 1
  stage_requirements:
    - "Advanced (stage III–IV) adult granulosa cell tumor (AGCT) requiring systemic therapy"
    - "Recurrent AGCT with symptomatic or rapidly progressing disease after surgery"
  biomarker_requirements_required:
