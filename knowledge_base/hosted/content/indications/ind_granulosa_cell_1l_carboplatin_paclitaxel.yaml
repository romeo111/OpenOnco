rationale: >
  Carboplatin + paclitaxel is the most widely used systemic chemotherapy
  regimen for advanced or recurrent adult granulosa cell tumor, extrapolated
  from platinum-taxane practice in ovarian malignancies. AGCT is rare (~1%)
  and no large randomized trial exists for systemic therapy; evidence is from
  retrospective series and phase II studies. Response rates ~50–70% in
  platinum-sensitive recurrent GCT. BEP (bleomycin-etoposide-cisplatin) is
  an alternative (historically used, higher toxicity). Inhibin B and AMH
  are tumor markers for AGCT monitoring. Surgery remains primary; chemo
  is for inoperable advanced disease or platinum-sensitive recurrence.
  No FDA-approved targeted therapy for AGCT as of 2026 — FOXL2 inhibition
  and CDK4/6 inhibitors are in trial.

rationale_ua: >
  Комбінація карбоплатину (carboplatin) з паклітакселом (paclitaxel) —
  найширше застосовуваний режим системної хіміотерапії при поширеній
  або рецидивній дорослій гранульозоклітинній пухлині (АГКП),
  екстрапольований з практики застосування платини й таксанів при
  злоякісних новоутвореннях яєчника. АГКП є рідкісним захворюванням
  (~1%), і великих рандомізованих досліджень для системної терапії не
  існує; докази отримано з ретроспективних серій та досліджень фази II.
  Загальна частота відповіді ~50-70% при платинчутливому рецидивному
  ГКП. Альтернативою є BEP (блеоміцин-етопозид-цисплатин), який
  історично використовувався, але має вищу токсичність. Інгібін B та
  антимюллерів гормон є пухлинними маркерами для моніторингу АГКП.
  Хірургічне лікування залишається основним; хіміотерапія застосовується
  при неоперабельному поширеному захворюванні або платинчутливому
  рецидиві. Станом на 2026 рік для АГКП не існує таргетної терапії,
  схваленої FDA — інгібітори FOXL2 та CDK4/6 досліджуються в межах
  клінічних випробувань.
