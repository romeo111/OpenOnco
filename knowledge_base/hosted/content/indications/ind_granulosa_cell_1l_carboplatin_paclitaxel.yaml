sources:
  - source_id: SRC-NCCN-OVARIAN-2025
    position: supports
    relevant_quote_paraphrase: "Carboplatin + paclitaxel is a recommended regimen for advanced/recurrent adult granulosa cell tumor (NCCN ovarian section)"
  - source_id: SRC-ESMO-OVARIAN-2024
    position: supports
    relevant_quote_paraphrase: "ESMO endorses platinum-taxane chemotherapy for advanced/recurrent GCT; hormonal therapy (leuprolide) for maintenance"

do_not_do:
  - "НЕ ігнорувати Інгібін B та АМГ як пухлинні маркери ГКП — основні маркери для моніторингу відповіді/рецидиву"
  - "НЕ пропускати передбачену премедикацію паклітакселу (дексаметазон + дифенгідрамін + H2-блокатор) — ризик реакцій гіперчутливості"
  - "НЕ ігнорувати нейропатію від паклітакселу — кумулятивна, може бути постійною"
  - "НЕ ігнорувати залізистий (ендокринний) компонент — надлишок естрогену при ГКП; моніторинг ендометрія"

do_not_do_en:
  - "Do NOT ignore Inhibin B and AMH as tumor markers — primary markers for GCT response/recurrence monitoring"
  - "Do NOT skip paclitaxel premedication (dexamethasone + diphenhydramine + H2-blocker) — hypersensitivity risk"
  - "Do NOT ignore paclitaxel neuropathy — cumulative, may be permanent"
  - "Do NOT ignore endocrine component — estrogen excess in GCT; endometrial surveillance"

time_critical: false
last_reviewed: "2026-05-04"
reviewers: []
reviewer_signoffs: 0
notes: >
  STUB — pending Clinical Co-Lead sign-off. No FDA-approved targeted therapy
  for AGCT; platinum-taxane is extrapolated standard. Both carboplatin and
  paclitaxel are NSZU-reimbursed in Ukraine. FOXL2 mutation testing confirms
  diagnosis but does not select therapy. CDK4/6 inhibitor trials ongoing.
