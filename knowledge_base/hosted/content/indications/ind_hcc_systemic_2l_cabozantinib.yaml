rationale: >
  Cabozantinib 60 mg PO daily is FDA-approved (January 2019) and NCCN Category 1
  for HCC after sorafenib, based on CELESTIAL (Abou-Alfa, NEJM 2018, n=707,
  phase 3 RCT). mOS 10.2 vs 8.0 mo (HR 0.76, p=0.005); mPFS 5.2 vs 1.9 mo
  (HR 0.44). Cabozantinib is a multi-TKI targeting VEGFR1/2/3, MET, AXL, RET,
  KIT — dual VEGFR+MET/AXL inhibition provides activity even in sorafenib/
  regorafenib-resistant disease. Unlike RESORCE (which required sorafenib tolerance),
  CELESTIAL enrolled patients who progressed on ANY prior systemic therapy (sorafenib,
  lenvatinib, or other) for 1-2 lines. This makes cabozantinib the preferred option
  when: (a) patient did not tolerate sorafenib, (b) post-ICI-based 1L (where
  regorafenib has only Cat 2A evidence), (c) regorafenib failed or was not tolerated.
  Aggressive track (second Cat 1 option; more complex toxicity profile vs regorafenib
  for initial sorafenib-tolerant patients).

rationale_ua: >
  Кабозантиніб (cabozantinib) 60 mg перорально щодня — препарат
  схвалений FDA (січень 2019) та має категорію NCCN 1 при ГЦК після
  сорафенібу на підставі CELESTIAL (Abou-Alfa, NEJM 2018, n=707, фаза
  3 РКД). Медіана загальної виживаності 10.2 проти 8.0 міс
  (відношення ризиків 0.76, p=0.005); медіана виживаності без
  прогресування 5.2 проти 1.9 міс (відношення ризиків 0.44).
  Кабозантиніб — мультитаргетний інгібітор тирозинкіназ, що діє на
  VEGFR1/2/3, MET, AXL, RET, KIT — подвійне інгібування VEGFR + MET/AXL
  забезпечує активність навіть при сорафеніб/регорафеніб-резистентному
  захворюванні. На відміну від RESORCE (вимагав переносимості
  сорафенібу), CELESTIAL включав пацієнтів з прогресуванням на
  БУДЬ-якій попередній системній терапії (сорафеніб, ленватиніб або
  інші) у 1-2 лініях. Це робить кабозантиніб препаратом вибору, коли:
  (a) пацієнт не переносив сорафеніб, (b) після терапії на основі ICI
  у першій лінії (де регорафеніб має лише докази категорії 2A),
  (c) регорафеніб виявився неефективним або не переносився. Агресивна
  гілка (другий варіант категорії 1; складніший профіль токсичності
  порівняно з регорафенібом для початково сорафеніб-толерантних
  пацієнтів).

