do_not_do:
- "Не призначати при Child-Pugh B/C — CELESTIAL включав тільки Child-Pugh A; гепатотоксичність посилена при порушенні функції печінки"
- "Не приймати з їжею — кабозантиніб приймати натщесерце (≥1 год до або ≥2 год після їжі)"
- "Не ігнорувати ЛФТ моніторинг кожні 4 тижні — при HCC на тлі ЦП гепатотоксичність може спричинити декомпенсацію"
- "Уникати сильних інгібіторів CYP3A4 — знизити дозу до 40 мг/день (кетоконазол, ітраконазол, ритонавір)"
- "Не призначати при нещодавньому (<6 місяців) тромбозі артерій — ризик тромботичних ускладнень"
- "Відрізняти REG-CABOZANTINIB-HCC (60 мг/день монотерапія) від REG-NIVO-CABO-RCC (40 мг/день у комбінації) — різні дози при різних показах"

known_controversies:
- topic: "Cabozantinib vs regorafenib as first choice 2L post-sorafenib HCC"
  positions:
  - position: "Regorafenib preferred when sorafenib was tolerated (RESORCE Cat 1 HR 0.63; sorafenib tolerance predicts regorafenib tolerability)"
    sources:
    - SRC-RESORCE-BRUIX-2017
  - position: "Cabozantinib is also Cat 1 and does NOT require sorafenib tolerance; MET/AXL targeting may overcome sorafenib resistance mechanisms"
    sources:
    - SRC-CELESTIAL-ABOU-ALFA-2018
  our_default: "Regorafenib first-choice post-sorafenib (sorafenib-tolerant); cabozantinib for sorafenib-intolerant, post-ICI 1L, or regorafenib failure"
  rationale: "Sorafenib-tolerance criterion of RESORCE is a practical eligibility filter; cabozantinib has broader eligibility"

