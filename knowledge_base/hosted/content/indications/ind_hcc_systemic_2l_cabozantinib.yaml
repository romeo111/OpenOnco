id: IND-HCC-SYSTEMIC-2L-CABOZANTINIB
plan_track: aggressive

applicable_to:
  disease_id: DIS-HCC
  line_of_therapy: 2
  stage_requirements:
    - "Advanced/unresectable HCC (BCLC C, or BCLC B not amenable to locoregional therapy)"
    - "Disease progression on sorafenib OR lenvatinib OR ICI-based 1L therapy (atezo+bev, durva+treme)"
    - "Up to 2 prior systemic lines acceptable (CELESTIAL enrolled 1-2 prior lines)"
    - "Child-Pugh A liver function"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 1

recommended_regimen: REG-CABOZANTINIB-HCC
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~4% ORR (RECIST 1.1, CELESTIAL) — disease stabilization is the primary goal"
  complete_response: "<1%"
  progression_free_survival: "Median PFS 5.2 mo vs 1.9 mo (HR 0.44, p<0.001, CELESTIAL)"
  overall_survival_5y: "Median OS 10.2 mo vs 8.0 mo (HR 0.76, 95% CI 0.63–0.92, p=0.005, CELESTIAL)"
  notes: >
    SRC-CELESTIAL-ABOU-ALFA-2018 SRC-NCCN-HCC-2025:
    CELESTIAL (Abou-Alfa 2018, NEJM; n=707): cabozantinib vs placebo for 2L+ advanced HCC
    post-sorafenib (CP-A, ≤2 prior lines). ORR ~4% (RECIST 1.1); CR <1%;
    mPFS 5.2 vs 1.9 mo (HR 0.44, p<0.001); mOS 10.2 vs 8.0 mo (HR 0.76, p=0.005).
    NCCN Cat 1 for 2L HCC post-sorafenib or post-ICI.

hard_contraindications:
  - "Child-Pugh B or C"
  - "Recent arterial thromboembolism (<6 months)"
  - "Uncontrolled hypertension at baseline (BP >150/100 despite treatment)"

red_flags_triggering_alternative:
  - RF-HCC-CHILD-PUGH-B-C
  - RF-HCC-FRAILTY-AGE

required_tests:
  - TEST-LFT
  - TEST-BILIRUBIN-TOTAL
  - TEST-AFP
  - TEST-CBC
  - TEST-CMP
  - TEST-CT-CAP

desired_tests: []

rationale: >
  Cabozantinib 60 mg PO daily is FDA-approved (January 2019) and NCCN Category 1
  for HCC after sorafenib, based on CELESTIAL (Abou-Alfa, NEJM 2018, n=707,
  phase 3 RCT). mOS 10.2 vs 8.0 mo (HR 0.76, p=0.005); mPFS 5.2 vs 1.9 mo
  (HR 0.44). Cabozantinib is a multi-TKI targeting VEGFR1/2/3, MET, AXL, RET,
  KIT — dual VEGFR+MET/AXL inhibition provides activity even in sorafenib/
  regorafenib-resistant disease. Unlike RESORCE (which required sorafenib tolerance),
  CELESTIAL enrolled patients who progressed on ANY prior systemic therapy (sorafenib,
  lenvatinib, or other) for 1-2 lines. This makes cabozantinib the preferred option
  when: (a) patient did not tolerate sorafenib, (b) post-ICI-based 1L (where
  regorafenib has only Cat 2A evidence), (c) regorafenib failed or was not tolerated.
  Aggressive track (second Cat 1 option; more complex toxicity profile vs regorafenib
  for initial sorafenib-tolerant patients).

rationale_ua: >
  Кабозантиніб 60 мг PO щоденно є FDA-схваленим (січень 2019) та NCCN Категорія 1
  для ГЦК після сорафенібу, на підставі CELESTIAL (Abou-Alfa, NEJM 2018, n=707).
  mOS 10.2 проти 8.0 міс. (HR 0.76, p=0.005); mPFS 5.2 проти 1.9 міс. (HR 0.44).
  На відміну від RESORCE (вимагав переносимості сорафенібу), CELESTIAL включав
  пацієнтів з прогресуванням на будь-якій попередній системній терапії (1-2 лінії).
  Кабозантиніб є переважним вибором: (a) якщо пацієнт не переносив сорафеніб,
  (b) після ICI-базованої 1L (atezo+bev, durva+treme), де регорафеніб має тільки
  Cat 2A докази, (c) якщо регорафеніб не ефективний або непереносимий.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
  - source_id: SRC-CELESTIAL-ABOU-ALFA-2018
    position: supports
    relevant_quote_paraphrase: "Cabozantinib vs placebo post-sorafenib HCC: mOS 10.2 vs 8.0 mo (HR 0.76, p=0.005); FDA approved January 2019 (CELESTIAL phase 3)"
  - source_id: SRC-NCCN-HCC-2025
    position: supports
    relevant_quote_paraphrase: "Cabozantinib is NCCN Category 1 2L for HCC after sorafenib; Cat 2A after ICI-based 1L (no phase 3 data in that setting)"

do_not_do:
  - "Не призначати при Child-Pugh B/C — CELESTIAL включав тільки Child-Pugh A; гепатотоксичність посилена при порушенні функції печінки"
  - "Не приймати з їжею — кабозантиніб приймати натщесерце (≥1 год до або ≥2 год після їжі)"
  - "Не ігнорувати ЛФТ моніторинг кожні 4 тижні — при HCC на тлі ЦП гепатотоксичність може спричинити декомпенсацію"
  - "Уникати сильних інгібіторів CYP3A4 — знизити дозу до 40 мг/день (кетоконазол, ітраконазол, ритонавір)"
  - "Не призначати при нещодавньому (<6 місяців) тромбозі артерій — ризик тромботичних ускладнень"
  - "Відрізняти REG-CABOZANTINIB-HCC (60 мг/день монотерапія) від REG-NIVO-CABO-RCC (40 мг/день у комбінації) — різні дози при різних показах"

known_controversies:
  - topic: "Cabozantinib vs regorafenib as first choice 2L post-sorafenib HCC"
    positions:
      - position: "Regorafenib preferred when sorafenib was tolerated (RESORCE Cat 1 HR 0.63; sorafenib tolerance predicts regorafenib tolerability)"
        sources:
          - SRC-RESORCE-BRUIX-2017
      - position: "Cabozantinib is also Cat 1 and does NOT require sorafenib tolerance; MET/AXL targeting may overcome sorafenib resistance mechanisms"
        sources:
          - SRC-CELESTIAL-ABOU-ALFA-2018
    our_default: "Regorafenib first-choice post-sorafenib (sorafenib-tolerant); cabozantinib for sorafenib-intolerant, post-ICI 1L, or regorafenib failure"
    rationale: "Sorafenib-tolerance criterion of RESORCE is a practical eligibility filter; cabozantinib has broader eligibility"

time_critical: false
last_reviewed: "2026-05-04"
reviewers: []
