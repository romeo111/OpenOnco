notes: >
  CELESTIAL (PMID 30110589) enrolled 1-2 prior systemic lines including
  sorafenib-refractory patients not eligible for RESORCE (sorafenib-intolerant).
  Also applicable after ICI-containing 1L (atezo+bev, durva+treme) per NCCN Cat 2A
  — no phase 3 RCT in this specific setting, but cabozantinib is the most commonly
  used TKI in the post-ICI HCC setting based on the CELESTIAL inclusion of diverse
  prior therapies.
