rationale: >
  Ramucirumab (8 mg/kg IV q2w) is FDA-approved (May 2019) and NCCN Category 1
  for HCC after sorafenib in patients with AFP ≥400 ng/mL, based on REACH-2
  (Zhu, Lancet Oncol 2019, n=292, phase 3 RCT). mOS 8.5 vs 7.3 mo (HR 0.71,
  p=0.0199); mPFS 2.8 vs 1.6 mo (HR 0.45). Ramucirumab is an anti-VEGFR2
  monoclonal antibody — it blocks VEGF-A/B/C/D binding to VEGFR2, inhibiting
  angiogenesis. The AFP ≥400 ng/mL biomarker selection is based on the failed
  REACH-1 trial (HR 0.87 in unselected patients; no OS benefit) vs REACH-2
  (AFP≥400 prospective selection; HR 0.71 significant benefit). High AFP
  correlates with VEGFR2 pathway activation and aggressive angiogenic phenotype.
  Distinct advantage: well-tolerated (primarily hypertension); no oral pill burden;
  no significant overlap with sorafenib toxicity profile (no HFSR); suitable for
  frail patients who cannot tolerate oral TKIs.

rationale_ua: >
  Рамуцирумаб (ramucirumab) 8 mg/kg внутрішньовенно q2w схвалений FDA
  (травень 2019) та має категорію NCCN 1 при ГЦК після сорафенібу у
  пацієнтів з АФП ≥400 ng/mL на підставі REACH-2 (Zhu, Lancet Oncol
  2019, n=292, фаза 3 РКД). Медіана загальної виживаності 8.5 проти
  7.3 міс (відношення ризиків 0.71, p=0.0199); медіана виживаності
  без прогресування 2.8 проти 1.6 міс (відношення ризиків 0.45).
  Рамуцирумаб — моноклональне антитіло проти VEGFR2; блокує
  зв'язування VEGF-A/B/C/D з VEGFR2, інгібуючи ангіогенез. Біомаркерний
  відбір за АФП ≥400 ng/mL ґрунтується на негативному дослідженні REACH-1
  (відношення ризиків 0.87 у невідібраній популяції; без переваги
  щодо загальної виживаності) проти REACH-2 (проспективний відбір за
  АФП ≥400; відношення ризиків 0.71, значуща користь). Високий рівень
  АФП корелює з активацією шляху VEGFR2 та агресивним ангіогенним
  фенотипом. Відмінна перевага: добра переносимість (переважно
  артеріальна гіпертензія); відсутність перорального прийому таблеток;
  відсутність значущого перекриття з профілем токсичності сорафенібу
  (відсутній долонно-підошовний синдром); підходить для ослаблених
  пацієнтів, які не переносять пероральні інгібітори тирозинкіназ.

