do_not_do:
- "НІКОЛИ не призначати при АФП <400 нг/мл — FDA-схвалення біомаркерно-вибіркове; REACH-1 (unselected) НЕ показав ЗВ-переваги (HR 0.87, p=0.14)"
- "Не призначати при активній кровотечі або нелікованому варикозному розширенні вен — анти-VEGFR2 підвищує ризик кровотечі"
- "Не ігнорувати протеїнурію — UPCR моніторинг кожні 4 тижні; призупинити при UPCR ≥2 г/добу"
- "Не призначати при Child-Pugh B/C — REACH-2 включав тільки Child-Pugh A"
- "Контроль АТ перед кожним введенням — цільовий <150/100; гіпертензія у ~13% Grade 3-4"
- "Не призначати в Україні без підтвердження доступності — рамуцирумаб не зареєстрований в Україні"

known_controversies:
- topic: "Optimal 2L sequencing: regorafenib vs cabozantinib vs ramucirumab in AFP≥400 HCC"
  positions:
  - position: "For AFP ≥400: ramucirumab is IV, well-tolerated, biomarker-selected; suitable when TKI toxicity (HFSR, fatigue) concerns dominate"
    sources:
    - SRC-REACH2-ZHU-2019
  - position: "Regorafenib has largest OS benefit (HR 0.63 vs HR 0.71 for ramu); regorafenib preferred when sorafenib was tolerated regardless of AFP"
    sources:
    - SRC-RESORCE-BRUIX-2017
  our_default: "AFP≥400 + sorafenib-intolerant (no HFSR tolerance): ramucirumab; AFP≥400 + sorafenib-tolerant: regorafenib preferred (HR 0.63 > 0.71)"
  rationale: "Tolerated sorafenib→regorafenib gives the best OS HR; ramucirumab fills a gap for sorafenib-intolerant with AFP≥400"

