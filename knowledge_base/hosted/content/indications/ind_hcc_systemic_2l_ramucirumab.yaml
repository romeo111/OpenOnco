notes: >
  REACH-2 (PMID 30922890) established AFP≥400 as the first validated biomarker
  for HCC 2L selection. AFP is routinely measured in HCC — no additional testing
  burden. Note: BIO-AFP entity may not exist in KB — verify before deploying;
  use AFP as a free-text condition in the algorithm if BIO-AFP is absent.
