  line_of_therapy: 2
  stage_requirements:
  - "Advanced/unresectable HCC (BCLC C, or BCLC B not amenable to locoregional therapy)"
  - "Disease progression on sorafenib 1L (not discontinued due to intolerance — RESORCE requirement)"
