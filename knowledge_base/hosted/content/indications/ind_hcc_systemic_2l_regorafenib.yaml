notes: >
  RESORCE (PMID 27932016) is the landmark 2L HCC trial. The sorafenib-tolerance
  requirement is clinically critical — patients who stopped sorafenib for toxicity
  should receive cabozantinib or ramucirumab instead. AFP response during regorafenib
  is prognostic (decline ≥20% associated with better OS).
  After ICI-based 1L (atezo+bev, durva+treme): regorafenib is NCCN Cat 2A
  (no specific phase 3 RCT post-ICI); expert consensus recommends TKI sequencing.
