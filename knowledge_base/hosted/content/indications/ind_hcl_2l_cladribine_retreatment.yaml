sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN HCL 2025 Category 1: purine analog retreatment (cladribine or pentostatin)
      for relapsed HCL ≥1 year from prior course. For BRAF-V600E-negative (HCL-variant)
      or vemurafenib-inaccessible patients, cladribine is the primary 2L option.

do_not_do:
  - "Ніколи при <6 міс від останнього курсу кладрибіну: кумулятивна імунотоксичність; підвищений ризик важких інфекцій"
  - "Без профілактики ПЦП (ТМП-СМЗ): обов'язково до кладрибіну — CD4 завжди <50/мкл після курсу; пневмоцистна пневмонія може бути фатальною"
  - "BRAF-V600E+ + вемурафеніб доступний: IND-HCL-2L-VEMURAFENIB кращий (МРД-негативна ВКЛ у 65%; ПВБ не досягнутий за 4 роки; Tiacci 2021 NEJM)"
  - "Активний HBV без противірусного лікування: кладрибін викликає реактивацію HBV → фульмінантний гепатит"
  - "Лихоманка нейтропенії після кладрибіну (типово день 7-21): негайна госпіталізація + емпіричні антибіотики (піперацилін/тазобактам); не чекати культур"

