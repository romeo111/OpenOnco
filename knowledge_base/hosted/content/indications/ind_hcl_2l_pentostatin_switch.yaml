notes: >
  STUB — pending Clinical Co-Lead sign-off. 2L cross-over purine analog for
  cladribine-1L failures with early relapse (<1y) or cladribine-refractory HCL.
  Wired at ALGO-HCL-2L step 31 (purine cross-over gate; Workstream CW 2026-05-04).
  Gap (2) in ALGO-HCL-2L CLOSED. NCCN Cat 1; equivalent efficacy to cladribine.
  REG-PENTOSTATIN-HCL authored — replaces cladribine-as-proxy for pentostatin 1L IND too.
  Ukraine access barrier: pentostatin not NSZU-reimbursed; cladribine-retreatment fallback.
  Grever 2003 Blood + Else 2005 Blood primary evidence; no RCT vs cladribine.
