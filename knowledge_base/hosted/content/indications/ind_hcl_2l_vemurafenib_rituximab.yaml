do_not_do:
  - "Не призначати без підтвердженої мутації BRAF V600E — вемурафеніб неефективний без молекулярної мішені; при HCL-варіанті (BRAF-WT) — парадоксальна активація MAPK"
  - "Не ігнорувати фотосенсибілізацію — SPF 50+ обов'язково з першого дня; опіки від звичайної прогулянки можливі"
  - "Не починати при QTc >500 мс — абсолютне протипоказання; корекція електролітів спочатку"
  - "Не пропускати базовий дерматологічний огляд — ПКР/кератоакантоми (20% при тривалому прийомі)"
  - "Не застосовувати без HBV-скринінгу перед ритуксимабом — ризик реактивації вірусного гепатиту B"
  - "Не переходити на монотерапію вемурафенібом без причини — комбінація значно ефективніша (ПВ 87% vs 35%)"

sources:
