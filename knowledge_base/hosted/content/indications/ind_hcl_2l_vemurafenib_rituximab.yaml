    position: supports
    relevant_quote_paraphrase: >
      NCCN B-cell Lymphomas / HCL 2025 Category 1: vemurafenib + rituximab for
      relapsed/refractory BRAF V600E-mutated HCL (Tiacci 2021 NEJM). Preferred
      over vemurafenib monotherapy (Category 2A) due to significantly deeper
      MRD-negative responses. BRAF V600E confirmation mandatory before initiating.

