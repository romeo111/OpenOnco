sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN B-cell 2025: For HCV-MZL progressing after or not responding to antiviral
      therapy, chemo-immunotherapy (BR preferred for indolent histology; NCCN Cat 2A)
      is recommended — same approach as non-HCV relapsed MZL.
  - source_id: SRC-BSH-MZL-2024
    position: supports
    relevant_quote_paraphrase: >
      BSH MZL 2024: Post-SVR12 HCV-MZL relapse → chemo-immunotherapy (BR or R-CHOP);
      no further antiviral benefit once SVR12 achieved; histologic transformation
      must be excluded at relapse biopsy.

do_not_do:
  - "Без підтвердження SVR12: BR з ритуксимабом при активному HCV — В-клітинна деплеція + вірусна реплікація → імунна дисфункція"
  - "Без ребіопсії при рецидиві: трансформація у ДВКЛ (~10-15% рецидивів) вимагає агресивного лікування; BR неадекватний для ДВКЛ"
  - "Без HBV скринінгу: анти-CD20 + HCV-ко-інфекція (HBV коенд.) → реактивація HBV; ентекавір при HBsAg+ або HBcAb+"
  - "Повторний BR при рефрактерності <6 міс: новий курс неефективний; МДК щодо об'єктутузумабу+бендамустину або R-CHOP"

