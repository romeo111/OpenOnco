sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN B-cell 2025 Category 1: salvage chemo (R-ICE or R-DHAP) → BEAM-autoSCT
      for transplant-eligible chemosensitive relapsed/refractory DLBCL (HGBL-DH
      included within DLBCL category). Early-relapse/primary refractory: CAR-T preferred.
  - source_id: SRC-ESMO-DLBCL-2024
    position: supports
    relevant_quote_paraphrase: >
      ESMO DLBCL 2024: platinum salvage → autoSCT remains standard for late chemosensitive
      relapse in DLBCL including HGBL-DH subtype. HGBL-DH has worse prognosis; early relapse
      favors CAR-T; late relapse chemosensitive → autoSCT feasible.

do_not_do:
  - "Не призначати аутоТГСК при первинно-рефрактерному HGBL-DH або ранньому рецидиві (<12 міс): ОВ гірше, ніж при CAR-T; направляти на аксі-сел"
  - "Не починати BEAM-кондиціонування без документованого ≥ЧВ після сальважу: трансплантація при прогресуванні хвороби — летальна без кінцевого ефекту"
  - "ЦНС ураження до кондиціонування — IT MTX + ВД-МТХ сальваж першочергово; потім переоцінка для аутоТГСК"
  - "Не ігнорувати збір PBSC: мобілізація G-CSF (±плериксафор) після 2-3 циклу сальважу — до BEAM; без адекватного збору (≥2×10⁶ CD34+/кг) аутоТГСК неможливий"
  - "Рецидив після аутоТГСК <12 міс → CAR-T (аксі-сел) — це єдиний потенційно куративний варіант; аутоТГСК повторно — не стандарт"

