  - "Do NOT use cisplatin in patients with GFR <60, gr ≥2 hearing loss, gr ≥2 neuropathy, or significant CHF — switch to carboplatin AUC 5."
  - "Do NOT continue pembrolizumab through gr ≥3 immune-related AE without high-dose corticosteroid initiation + multidisciplinary irAE management."
last_reviewed: '2026-04-26'
reviewers: []
reviewer_signoffs: 2
notes: >
  Standard 1L for R/M HNSCC with CPS ≥1 (the majority of HNSCC).
  Locally advanced (curable) HNSCC routes to concurrent cisplatin + RT
  or surgery + adjuvant — separate algorithm not yet authored.
  HPV+ oropharyngeal R/M handled identically (no de-escalation in
  recurrent setting). Reuses pembrolizumab + cisplatin + carboplatin +
  5-FU drug entities.
