id: IND-HNSCC-RM-1L-PEMBRO-CHEMO
plan_track: standard

applicable_to:
  disease_id: DIS-HNSCC
  line_of_therapy: 1
  stage_requirements:
    - "Recurrent / metastatic, not amenable to curative-intent local therapy"
  biomarker_requirements_required:
    - biomarker_id: BIO-PDL1-CPS
      value_constraint: "CPS ≥1"
      required: true
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 1

recommended_regimen: REG-PEMBRO-CHEMO-HNSCC-1L
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~36% (KEYNOTE-048 chemo-IO arm)"
  progression_free_survival: "Median ~5 months"
  overall_survival_5y: "Median OS 13.6 mo (vs 10.4 mo EXTREME); 24-mo OS ~29%"
  notes: "KEYNOTE-048 (Burtness Lancet 2019) — pembro + chemo vs cetuximab + chemo (EXTREME)"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-HNSCC-INFECTION-SCREENING
  - RF-HNSCC-ORGAN-DYSFUNCTION
required_tests: []
desired_tests: []

rationale: >
  Pembrolizumab + 5-FU + platinum is the preferred 1L for R/M HNSCC
  with PD-L1 CPS ≥1 per KEYNOTE-048 — superior OS vs EXTREME with
  similar tolerability and durable responses in a subset. Cisplatin
  is preferred over carboplatin when feasible; carboplatin is the
  practical default for elderly / renal-impaired / neuropathy /
  hearing-loss patients. CPS ≥20 patients have the option of
  pembrolizumab monotherapy (alternative indication) — equivalent OS
  with lower toxicity. CPS <1 falls back to EXTREME or
  cetuximab-based regimens (deferred — not authored).

rationale_ua: >
  Пембролізумаб (pembrolizumab) у комбінації з 5-фторурацилом та
  препаратами платини — переважний режим першої лінії при
  рецидивному/метастатичному плоскоклітинному раку голови та шиї з
  PD-L1 CPS ≥1 за KEYNOTE-048 — перевага щодо загальної виживаності
  порівняно з EXTREME за подібної переносимості та можливістю стійких
  відповідей у підгрупі пацієнтів. Цисплатин (cisplatin) має перевагу
  над карбоплатином (carboplatin), коли це можливо; карбоплатин є
  практичним стандартом для пацієнтів літнього віку, з нирковою
  недостатністю, нейропатією або зниженням слуху. Пацієнти з CPS ≥20
  мають можливість монотерапії пембролізумабом (альтернативне
  показання) — еквівалентна загальна виживаність з меншою токсичністю.
  Пацієнти з CPS <1 переходять на EXTREME або режими на основі
  цетуксимабу (відкладені для подальшого опрацювання).
