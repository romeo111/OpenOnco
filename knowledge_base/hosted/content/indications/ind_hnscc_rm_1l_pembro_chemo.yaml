  line_of_therapy: 1
  stage_requirements:
    - "Recurrent / metastatic, not amenable to curative-intent local therapy"
  biomarker_requirements_required:
    - biomarker_id: BIO-PDL1-CPS
      value_constraint: "CPS ≥1"
      required: true
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 1

recommended_regimen: REG-PEMBRO-CHEMO-HNSCC-1L
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~36% (KEYNOTE-048 chemo-IO arm)"
  progression_free_survival: "Median ~5 months"
  overall_survival_5y: "Median OS 13.6 mo (vs 10.4 mo EXTREME); 24-mo OS ~29%"
  notes: >
    SRC-NCCN-HNSCC-2025 SRC-ESMO-HNSCC-2020:
    KEYNOTE-048 (Burtness 2019 Lancet; primary trial source not independently indexed in KB —
    synthesised via NCCN HNSCC 2025 + ESMO HNSCC 2020): pembro + chemo vs EXTREME (CPS ≥1).
    ORR ~36%; median PFS ~5 mo; median OS 13.6 vs 10.4 mo (CPS ≥1); 24-mo OS ~29%.
    NCCN Cat 1 for CPS ≥1; superior OS vs EXTREME in CPS ≥1 population.

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests: []
desired_tests: []

rationale: >
  Pembrolizumab + 5-FU + platinum is the preferred 1L for R/M HNSCC
  with PD-L1 CPS ≥1 per KEYNOTE-048 — superior OS vs EXTREME with
  similar tolerability and durable responses in a subset. Cisplatin
  is preferred over carboplatin when feasible; carboplatin is the
  practical default for elderly / renal-impaired / neuropathy /
  hearing-loss patients. CPS ≥20 patients have the option of
  pembrolizumab monotherapy (alternative indication) — equivalent OS
  with lower toxicity. CPS <1 falls back to EXTREME or
  cetuximab-based regimens (deferred — not authored).

rationale_ua: >
  пембролізумаб + 5-FU + platinum is the переважний 1L for R/M HNSCC with PD-L1 CPS ≥1 per KEYNOTE-048 — перевершує OS vs EXTREME with подібний переносимість and durable responses in a subset. цисплатин is переважний over карбоплатин when feasible; карбоплатин is the practical default for літнього віку / renal-impaired / нейропатія / hearing-loss patients. CPS ≥20 patients have the option of пембролізумаб монотерапія (alternative показання) — еквівалентний OS with lower токсичність. CPS <1 falls back to EXTREME or цетуксимаб-based схеми (deferred — not authored).
