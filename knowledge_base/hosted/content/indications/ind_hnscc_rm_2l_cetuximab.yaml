  - "НЕ застосовувати при ICI-наївних пацієнтах — ніволумаб/пембролізумаб мають переважну доказову базу (Cat 1)"
  - "АНТИГІСТАМІН обов'язково перед кожною інфузією цетуксимабу — ризик тяжких інфузійних реакцій"
  - "Магній перед кожним прийомом — гіпомагніємія розвивається при тривалому лікуванні"
  - "Акнеподібний висип 3 ступ. — зупинити цетуксимаб; після відновлення — знижена доза"
  - "НЕ призначати при ECOG ≥3 — паліативна допомога та RT є пріоритетом"
  - "Клінічний протокол — пріоритетний вибір перед цетуксимабом у 2L ХНСЩ"

