    position: supports
    relevant_quote_paraphrase: "NCCN HNSCC v2025: docetaxel, methotrexate, cetuximab listed as 2L systemic options for R/M HNSCC post-ICI; Category 2A"
  - source_id: SRC-ESMO-HNSCC-2020
    position: context

do_not_do:
  - "НЕ призначати анти-ПД-1/ПД-Л1 (ніволумаб, пембролізумаб) при прогресуванні на попередньому ICI — перехресна резистентність; ICI re-challenge не підтверджений"
  - "Не призначати при ECOG ≥3 — системна хіміотерапія недоцільна; паліативна допомога + RT"
  - "Не пропускати скринінг клінічних протоколів (NCCN: клінічний протокол — пріоритет у 2L ХНСЩ)"
  - "Не забути дексаметазон преmedication перед доцетакселем — профілактика затримки рідини"

