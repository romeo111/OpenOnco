rationale: >
  JMML is a rare pediatric myelodysplastic/myeloproliferative neoplasm driven
  by RAS/MAPK pathway lesions. For somatic, clinically significant JMML,
  allogeneic hematopoietic cell transplant is the only established curative
  treatment. Azacitidine or cytoreduction may be used as a bridge while donor
  search and transplant workup proceed, but it should not delay definitive
  pediatric transplant evaluation. Germline Noonan/CBL/NF1 contexts require
  expert review because some infant myeloproliferative presentations can be
  observed rather than transplanted immediately.

sources:
  - source_id: SRC-COG
    position: supports
    relevant_quote_paraphrase: "Pediatric JMML management centers on allogeneic HCT for curative-intent therapy, with molecular and germline context guiding risk."

do_not_do:
  - "Do not treat a suspected Noonan-associated transient myeloproliferation as automatic transplant-eligible JMML without germline/somatic clarification."
  - "Do not delay donor search and pediatric transplant-center referral while trying non-curative bridge therapy."
  - "Do not start conditioning with uncontrolled infection or incomplete transplant fitness workup."

