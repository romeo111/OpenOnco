do_not_do:
  - "НЕ лікувати ЮММЛ азацитидином без запланованої ТКМ — без трансплантації азацитидин не є куративним"
  - "НЕ ігнорувати розрізнення соматичного vs зародкового PTPN11 — синдром Нунан може спонтанно ремітувати"
  - "НЕ застосовувати G-CSF при ЮММЛ — може стимулювати ЮММЛ-клон (відрізняється від MDS)"
  - "НЕ виконувати спленектомію — не покращує результати, підвищує ризик інфекцій"
  - "НЕ виключати BCR::ABL1 (хронічний мієлолейкоз) — обов'язкова диференційна діагностика перед початком лікування"
  - "НЕ відкладати HLA-типування та пошук донора — ТКМ є метою і потребує часу для підбору донора"

sources:
  - source_id: SRC-EWOG-JMML-AZACITIDINE
    position: supports
    relevant_quote_paraphrase: >
      EWOG-MDS azacitidine pilot data in JMML: azacitidine 75 mg/m²/day × 5-7 days
      Q28 as pre-HSCT bridging therapy shows cytoreductive activity (spleen size
      reduction, monocyte normalization) in the majority of JMML patients. Typically
      1-3 cycles before allogeneic HSCT. Evidence level: Phase 1-2 / retrospective
      (no Phase 3 RCT available; rare pediatric disease).
  - source_id: SRC-COG
    position: supports
    relevant_quote_paraphrase: >
      Children's Oncology Group (COG) JMML protocols: allogeneic HSCT is the
      standard curative treatment for JMML. Azacitidine as pre-HSCT cytoreductive
      therapy is supported per current COG/EWOG-MDS practice guidelines.

