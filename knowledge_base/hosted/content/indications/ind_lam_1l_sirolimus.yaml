  STUB — pending Clinical Co-Lead sign-off. Authored 2026-05-04 (Workstream DJ).
  LAM is a rare lung disease with no conventional oncologic management.
  ERS/ATS guidelines (not NCCN) govern LAM — NCCN nccn_category field left null
  as NCCN does not publish a separate LAM guideline (covered under lung section or not at all).
  Ukraine access: sirolimus registered for transplant; off-label for LAM is accessible
  and the generic is substantially more affordable than BCC/TGCT drugs.
