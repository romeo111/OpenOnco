do_not_do:
  - "НЕ призначати вагітним — тератогенний; обов'язковий тест на вагітність та контрацепція"
  - "НЕ застосовувати естрогенвмісну контрацепцію — естрогени можуть сприяти прогресуванню ЛАМ; тільки прогестин або негормональні методи"
  - "НЕ відміняти сіролімус при задовільній відповіді — прогресування ЛАМ відновиться після відміни (MILES)"
  - "НЕ ігнорувати терапевтичний моніторинг (TDM): цільовий рівень 5–15 нг/мл; субтерапевтичний = неефективно, надтерапевтичний = токсично"
  - "НЕ призначати пацієнту грейпфрутовий сік — інгібітор CYP3A4, значно підвищує рівень сіролімусу"
  - "НЕ відкладати відміну сіролімусу при підозрі на інтерстиціальний пневмоніт — потенційно серйозне ускладнення"

sources:
  - source_id: SRC-MILES-MCCORMACK-2011
    position: supports
    relevant_quote_paraphrase: >
      MILES Phase III (McCormack 2011 NEJM; N=89): sirolimus vs placebo in LAM.
      FEV1 slope: +1 vs -12 mL/month (difference +11 mL/month; p<0.001). VEGF-D
      reduced ~50%. Benefits lost on discontinuation — continuous therapy required.
      Basis of FDA approval May 2015 for sirolimus in LAM.

known_controversies:
  - topic: "Sirolimus vs everolimus for LAM"
    positions:
      - position: "Sirolimus: FDA/EMA-approved specifically for LAM; MILES trial evidence; standard first choice globally for sporadic and TSC-associated LAM."
        sources: [SRC-MILES-MCCORMACK-2011]
      - position: "Everolimus 10 mg QD: EMA-approved for TSC-associated LAM; EXIST-2 (renal AML) and EXIST-3 (seizures) data extend to LAM in TSC patients; practical choice when patients have both LAM and renal AML or SEGA."
        sources: [SRC-MILES-MCCORMACK-2011]
    our_default: "Sirolimus for LAM (broader approval including sporadic LAM; KB default). Everolimus reasonable alternative especially for TSC-associated LAM with concurrent renal manifestations."
  - topic: "When to start sirolimus in asymptomatic LAM"
    positions:
      - position: "Treat symptomatic/progressive LAM (ERS guidelines: FEV1 decline, functional impairment, chylous complications). Asymptomatic stable LAM: observe."
        sources: [SRC-MILES-MCCORMACK-2011]
      - position: "Earlier treatment may be considered for young patients with Gorlin-predicted high progression risk; not established by RCT."
        sources: [SRC-MILES-MCCORMACK-2011]
    our_default: "Treat when functionally impaired or progressive per MILES inclusion criteria. Asymptomatic stable LAM: observe with serial PFTs/VEGF-D."

