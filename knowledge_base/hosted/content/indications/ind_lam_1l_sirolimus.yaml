id: IND-LAM-1L-SIROLIMUS
plan_track: standard

applicable_to:
  disease_id: DIS-LAM
  line_of_therapy: 1
  stage_requirements:
    - "LAM with functional impairment: FEV1 <70% predicted OR documented FEV1 decline ≥10% over prior year"
    - "OR LAM with chylous complications (chylothorax, chylous ascites) requiring systemic control"
    - "Adults (≥18 years) — MILES enrolled adults only"
    - "Histologically confirmed LAM (surgical lung biopsy or transbronchial biopsy) OR clinical diagnosis meeting ERS criteria (VEGF-D ≥800 pg/mL + characteristic HRCT pattern)"
    - "ECOG PS 0-2 (or equivalent pulmonary functional status)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    notes: >
      No biomarker companion diagnostic required — all LAM is driven by TSC1 or TSC2
      loss and mTORC1 hyperactivation; biomarker testing does not alter treatment choice.
      TSC-associated LAM (germline TSC1/TSC2): same treatment; also requires surveillance
      for other TSC manifestations (SEGA, renal AML — everolimus may be preferred in
      TSC patients with both renal AML and LAM).
      VEGF-D ≥800 pg/mL: allows non-invasive clinical LAM diagnosis without biopsy
      (ERS diagnostic criteria).
      Near-exclusively affects women; rare case reports in males (TSC-associated only).

recommended_regimen: REG-SIROLIMUS-LAM
concurrent_therapy:
  - "Contraception: progesterone-only or non-hormonal methods MANDATORY during treatment and for sufficient post-treatment period (embryo-fetal toxicity). Avoid estrogen-containing contraceptives (may promote LAM progression)."
  - "Stomatitis prophylaxis: non-alcohol mouthwash (chlorhexidine 0.1% or similar) from day 1; topical triamcinolone 0.1% for ulcers"
  - "Lipid management: dietary counseling; statin therapy if triglycerides >500 mg/dL or LDL significantly elevated"
  - "Pneumocystis prophylaxis (TMP-SMX): consider for patients on concurrent corticosteroids or with CD4 count decline"
  - "Pulmonary rehabilitation: concurrent physiotherapy + exercise training improves exercise tolerance and quality of life"
  - "Oxygen supplementation: if SpO2 <89% at rest or during exertion — LAM can cause hypoxemic respiratory failure"

followed_by:
  - "PFTs q3–6 months (primary efficacy monitoring: FEV1/FVC/DLCO trend)"
  - "HRCT annually or if symptoms worsen"
  - "VEGF-D q6–12 months (disease activity biomarker)"
  - "Sirolimus trough levels q3 months (therapeutic drug monitoring)"
  - "Continue indefinitely — benefits lost on discontinuation (MILES observation phase)"
  - "Lung transplantation: reserve for end-stage LAM (FEV1 <40% predicted, significant hypoxemia refractory to sirolimus); sirolimus typically held peri-transplant"

evidence_level: high
strength_of_recommendation: strong
nccn_category: null

expected_outcomes:
  overall_response_rate: "Stabilization: FEV1 slope difference +11 mL/month vs placebo (MILES); not a tumor ORR metric — primary endpoint is rate of FEV1 decline"
  complete_response: "N/A (disease stabilization is the goal; LAM is not cured)"
  progression_free_survival: "FEV1 stabilization: +1 mL/month (sirolimus) vs -12 mL/month (placebo) during 12-month treatment phase; VEGF-D reduced by ~50%"
  overall_survival_5y: "OS benefit not demonstrated in MILES (underpowered, 12-month treatment); longer term follow-up data suggest survival benefit in progressive LAM"
  notes: >
    PRIMARY EVIDENCE: McCormack FX et al. NEJM 2011;364:1595-1606 (MILES Phase III; N=89):
    sirolimus vs placebo in LAM with FEV1 <70% predicted or FEV1 decline. 12-month treatment,
    12-month observation.
    Primary endpoint: FEV1 slope (mL/month) at 12 months.
    Result: +1 vs -12 mL/month (difference +11 mL/month; 95% CI 3–19; p<0.001).
    Secondary: FVC, VEGF-D, 6-min walk, QoL all improved. After discontinuation at 12 months,
    FEV1 decline resumed — supporting continuous therapy.
    FDA approval May 2015 for LAM in adults (first drug approved for LAM).
    EMA approval 2017.
    European Respiratory Society (ERS) and American Thoracic Society (ATS) guidelines support
    sirolimus for progressive LAM.
    NOTE: NCCN does not publish a separate LAM guideline; lung disease management follows ERS/ATS.

hard_contraindications:
  - "Pregnancy — embryo-fetal toxicity; absolute contraindication"
  - "Hypersensitivity to sirolimus or rapamycin"
  - "Severe hepatic impairment (Child-Pugh C) — significantly increased exposure; not studied in MILES"
  - "ECOG PS ≥4 — ECOG engine hard gate"

red_flags_triggering_alternative:
  - RF-FITNESS-ECOG-FIT

required_tests:
  - TEST-LFT
  - TEST-CBC
  - TEST-CMP
  - "Pulmonary function tests (spirometry + DLCO): baseline PFTs mandatory for efficacy monitoring"
  - "VEGF-D serum level: baseline (diagnostic and monitoring biomarker)"
  - "HRCT chest: baseline (characteristic LAM pattern: diffuse bilateral thin-walled cysts)"
  - "Sirolimus trough level: 5–7 days after starting (day 5–7) and after each dose adjustment"
  - "Lipid panel (triglycerides, LDL, HDL, total cholesterol): baseline"
  - "Pregnancy test: mandatory before starting (women of reproductive potential)"

desired_tests:
  - "Echocardiography: if pulmonary hypertension suspected (6-min walk <400m, significant dyspnea)"
  - "CT-guided or surgical lung biopsy: if HRCT and VEGF-D non-diagnostic (biopsy confirms LAM histologically)"
  - "TSC1/TSC2 germline testing: if TSC-associated LAM suspected (family history, signs of TSC)"
  - "Abdominal CT/MRI: screen for renal angiomyolipoma (common in TSC-associated LAM)"

rationale: >
  Sirolimus (Rapamune) is the only FDA-approved drug for lymphangioleiomyomatosis (LAM),
  approved May 2015 based on the MILES Phase III RCT (McCormack 2011 NEJM; N=89).

  LAM is a rare progressive cystic lung disease caused by mTORC1-hyperactive smooth-muscle-like
  LAM cells that destroy lung parenchyma. TSC1 or TSC2 loss-of-function (somatic in sporadic LAM;
  germline in TSC-associated LAM) leads to Rheb-mediated mTORC1 hyperactivation, driving
  uncontrolled LAM cell growth. Sirolimus inhibits mTORC1, suppressing LAM cell proliferation
  and associated angiogenesis/lymphangiogenesis.

  MILES Phase III (McCormack 2011 NEJM): sirolimus vs placebo in 89 patients with LAM and
  FEV1 <70% predicted or documented FEV1 decline. Primary endpoint: FEV1 slope at 12 months.
  - FEV1 slope: +1 mL/month (sirolimus) vs -12 mL/month (placebo); difference +11 mL/month (p<0.001)
  - FVC: improved by 69 mL in sirolimus arm
  - VEGF-D: reduced ~50% (disease biomarker)
  - 6-min walk: improved
  - QoL (SGRQ): improved
  After 12-month treatment break (observation phase): FEV1 decline resumed → CONTINUOUS therapy required.

  MECHANISM: Sirolimus does NOT eliminate LAM cells — it suppresses their mTORC1-driven
  proliferation. This is why continuous indefinite therapy is required and why disease
  reactivates after discontinuation. This is distinct from classical cancer cytotoxic therapy.

  ELIGIBILITY: Not all LAM patients require treatment. Asymptomatic patients with stable
  normal lung function may be monitored. Treatment is indicated for progressive disease
  (FEV1 decline), significant functional impairment, or chylous complications.

  UKRAINE CONTEXT: Sirolimus is registered in Ukraine for transplant immunosuppression.
  Off-label use for LAM requires physician prescription with appropriate documentation
  per Nakaz МОЗ №360. Cost of generic sirolimus in Ukraine is substantially lower than
  in the US (~USD 500–2000/month depending on generic manufacturer vs Rapamune brand).
  This is one of the most accessible "rare disease" drugs in the KB for Ukrainian patients.

rationale_ua: >
  Сіролімус (Rapamune) — єдиний FDA-схвалений препарат для ЛАМ (травень 2015).
  MILES (McCormack 2011 NEJM; N=89): sіролімус проти плацебо при ЛАМ + ОФВ1 <70%
  або зниження ОФВ1. Швидкість зміни ОФВ1: +1 мл/міс (сіролімус) vs -12 мл/міс
  (плацебо); різниця +11 мл/міс (p<0,001). VEGF-D знижений ~50%.
  Механізм: інгібітор mTORC1; TSC1/TSC2-дефіцитні ЛАМ-клітини зберігаються, але
  їх проліферація пригнічується. Безперервна терапія обов'язкова.
  Україна: зареєстровано (трансплантація); off-label для ЛАМ (доступно);
  ціна генерику ~500–2000 USD/міс — відносно доступно.
  Контрацепція: прогестин або негормональна (естрогени можуть погіршити ЛАМ).

ukrainian_review_status: pending_clinical_signoff
