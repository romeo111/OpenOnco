id: IND-LAM-1L-SIROLIMUS
plan_track: standard

applicable_to:
  disease_id: DIS-LAM
  line_of_therapy: 1
  stage_requirements:
    - "Progressive LAM with abnormal lung function (FEV1 <70% predicted) OR declining FEV1 (≥90 mL/year loss)"
    - "Sporadic LAM or TSC-associated LAM with pulmonary disease"
  biomarker_requirements_required:
    - biomarker_id: BIO-TSC1
      required: false
      value_constraint: "TSC1 or TSC2 mutation (diagnostic of LAM in appropriate context; identifies mTOR-activating mutation — not required for eligibility when clinical + CT diagnosis is established)"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-SIROLIMUS-LAM
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "N/A"

expected_outcomes:
  overall_response_rate: "FEV1 stabilization in ~majority (MILES); ORR not applicable (stabilizing disease)"
  complete_response: "Not applicable"
  progression_free_survival: "FEV1 rate of change: +1.0 vs −12 mL/month (sirolimus vs placebo); MILES"
  overall_survival_5y: "Long-term survival data encouraging but lung transplant remains the curative option for end-stage"

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-CMP
desired_tests: []

rationale: >
  Sirolimus (rapamycin, mTORC1 inhibitor) is the first and only FDA/EMA-
  approved therapy specifically for LAM (2015). MILES trial (McCormack 2011
  NEJM): sirolimus stabilized FEV1 trajectory (±1 vs −12 mL/month vs
  placebo; p<0.001), improved DLCO, 6MWD, VEGF-D. LAM is driven by
  TSC1/TSC2 loss → mTORC1 hyperactivation → abnormal smooth-muscle-like
  LAM cell proliferation in lung parenchyma. Treatment effect is stabilizing
  (not curative) — FEV1 decline may resume after stopping. Indicated for
  LAM with abnormal or declining lung function. Serum VEGF-D ≥800 pg/mL
  confirms diagnosis and identifies likely responders.

rationale_ua: >
  Сіролімус (mTORC1-інгібітор) — перша схвалена FDA/EMA терапія для ЛАМ (2015).
  MILES (McCormack 2011): стабілізація FEV1 (+1 vs −12 мл/міс; p<0.001).
  Ефект стабілізуючий, не лікувальний. VEGF-D ≥800 пг/мл підтверджує діагноз
  і ідентифікує відповідачів.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
  - source_id: SRC-MILES-MCCORMACK-2011
    position: supports
    relevant_quote_paraphrase: "MILES trial: sirolimus stabilized FEV1 rate of change vs placebo; FDA approved for LAM 2015 (McCormack 2011 NEJM)"

do_not_do:
  - "НЕ ігнорувати цільовий рівень трафіку сіролімусу — контролювати залишковий рівень через 1–2 тижні після кожної зміни дози (мета: 5–15 нг/мл)"
  - "НЕ призначати при активних інфекціях — mTOR-інгібіція погіршує імунний захист"
  - "НЕ ігнорувати нові респіраторні симптоми — неінфекційний пневмоніт є побічним ефектом класу"
  - "НЕ застосовувати з грейпфрутовим соком та потужними CYP3A4-інгібіторами/індукторами — різко змінює рівень препарату"
  - "НЕ застосовувати під час вагітності — тератогенність"

do_not_do_en:
  - "Do NOT ignore sirolimus trough level monitoring — check 1–2 weeks post dose change; target 5–15 ng/mL"
  - "Do NOT initiate during active infections — mTOR inhibition impairs immune defense"
  - "Do NOT ignore new respiratory symptoms — non-infectious pneumonitis is a class effect"
  - "Do NOT co-administer with grapefruit juice or strong CYP3A4 inhibitors/inducers — markedly alters drug levels"
  - "Do NOT use during pregnancy — teratogenicity"

time_critical: false
last_reviewed: "2026-05-04"
reviewers: []
reviewer_signoffs: 0
notes: >
  STUB — pending Clinical Co-Lead sign-off. Only FDA/EMA-approved therapy
  for LAM. Effect is disease-stabilizing; discuss realistic expectations.
  Sirolimus registered in Ukraine for transplant indication — off-label use
  for LAM requires clinical justification. VEGF-D ≥800 pg/mL both confirms
  diagnosis and tracks response.
