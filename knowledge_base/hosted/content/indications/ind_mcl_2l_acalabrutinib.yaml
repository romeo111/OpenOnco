notes: >
  STUB — pending Clinical Co-Lead sign-off. Standard-track 2L+
  preferred BTKi for r/r MCL. Better cardiac safety vs ibrutinib
  is dominant advantage. Funding gap (NSZU does not reimburse
  acalabrutinib) — ibrutinib practical fallback.
