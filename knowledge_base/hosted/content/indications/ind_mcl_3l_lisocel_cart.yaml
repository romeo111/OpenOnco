id: IND-MCL-3L-LISOCEL
plan_track: aggressive

applicable_to:
  disease_id: DIS-MCL
  line_of_therapy: 3
  stage_requirements:
    - "Relapsed / refractory MCL after ≥2 prior systemic lines including a covalent BTK inhibitor (ibrutinib / acalabrutinib / zanubrutinib)"
    - "ECOG 0-2 (TRANSCEND NHL-001 MCL cohort enrolment)"
    - "Adequate organ function for fludarabine + cyclophosphamide lymphodepletion (ANC ≥1.0, plt ≥75, AST/ALT ≤3× ULN, creatinine clearance ≥60)"
    - "No prior CD19-directed CAR-T (or sufficient washout per protocol)"
    - "Manufacturing slot available (~3-week wait acceptable; bridging chemotherapy permitted in window)"
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: "CD19+ confirmed (CD19 IHC or flow); CD20+ at original diagnosis sufficient"
  biomarker_requirements_excluded: []
  demographic_constraints:
    age_min: 18
    ecog_max: 2

recommended_regimen:  # No dedicated MCL liso-cel regimen entity in KB; lymphodepletion + dose mirror DLBCL liso-cel REGIMEN-LISOCEL-DLBCL-3L until MCL-specific REG- entity authored
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~83% (TRANSCEND NHL-001 MCL cohort, n≈88 evaluable)"
  complete_response: "~72%"
  progression_free_survival: "Median PFS ~15-16 months; durable responses ~50% at 12 months"
  overall_survival_5y: "12-month OS ~74%; long-term follow-up ongoing"

hard_contraindications:
  - CI-ACTIVE-INFECTION-FOR-ALEMTUZUMAB

red_flags_triggering_alternative:
  - RF-MCL-INFECTION-SCREENING
  - RF-MCL-BLASTOID-VARIANT
  - RF-MCL-POST-BTKI-C481-ACTIONABLE  # post-cBTKi r/r with potential actionable resistance mutation

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
  - TEST-CD20-IHC
  - TEST-PET-CT
  - TEST-ECHO
  - TEST-IMMUNOGLOBULINS
  - TEST-LN-CORE-BIOPSY
  - TEST-FLOW-CYTOMETRY
  - TEST-MRI-BRAIN-CONTRAST
  - TEST-PREGNANCY
desired_tests: []

rationale: >
  Lisocabtagene maraleucel (liso-cel; Breyanzi) received FDA accelerated
  approval for relapsed/refractory mantle cell lymphoma after ≥2 prior
  systemic lines including a covalent BTK inhibitor, based on the MCL
  cohort of TRANSCEND NHL-001 (Wang et al., Lancet 2024). Defined 1:1
  CD4:CD8 cell composition with 4-1BB costimulation. ORR ~83%, CR ~72%,
  median PFS ~15-16 months in heavily pretreated cohort with prior cBTKi
  (universally) and prior autoSCT (~30%). CRS profile favourable: any
  Grade ~61%, G≥3 ~1%; ICANS any ~31%, G≥3 ~9% — substantially better
  than brexucel (ZUMA-2 CRS G≥3 ~15%, ICANS G≥3 ~31%) and supports
  liso-cel preference for older / frail / cardiac comorbid MCL patients.
  Brexucel (REG-CAR-T-BREXUCEL-MCL) remains alternative CD19 CAR-T
  with longer follow-up and slightly higher response rates but worse
  safety profile (separate IND-MCL-3L-BREXUCEL-CART entity). Ukraine
  context: not registered, no domestic CAR-T manufacturing or accredited
  centres; international referral pathway (Israel / Poland / Germany /
  Spain) required at USD 350-500K all-in cost. Aggressive-track option
  for fit MCL patients with post-cBTKi failure who can access
  international CAR-T centre.

rationale_ua: >
  Лісокабтаген маралейцел (lisocabtagene maraleucel, liso-cel;
  Breyanzi) отримав прискорене схвалення FDA для лікування
  рецидивної/рефрактерної мантійноклітинної лімфоми після
  щонайменше 2 попередніх системних ліній, включно з ковалентним
  інгібітором BTK, на підставі MCL-когорти TRANSCEND NHL-001 (Wang
  та співавт., Lancet 2024). Має визначене співвідношення CD4:CD8
  1:1 з костимуляцією 4-1BB. Загальна частота відповіді ~83%, повна
  відповідь ~72%, медіана виживаності без прогресування ~15-16 міс
  у когорті з тяжким попереднім лікуванням (попередній ковалентний
  BTKi у всіх пацієнтів, попередня аутологічна трансплантація
  стовбурових клітин ~30%). Профіль синдрому вивільнення цитокінів
  сприятливий: будь-який ступінь ~61%, ступінь ≥3 ~1%; ICANS
  будь-який ступінь ~31%, ступінь ≥3 ~9% — суттєво кращий за
  брексукабтаген аутолейцел (ZUMA-2: CRS ступеня ≥3 ~15%, ICANS
  ступеня ≥3 ~31%) та підтримує перевагу liso-cel у пацієнтів
  літнього віку, ослаблених або з кардіальною коморбідністю.
  Брексукабтаген (REG-CAR-T-BREXUCEL-MCL) залишається альтернативною
  CD19 CAR-T-терапією з довшим періодом спостереження та дещо вищими
  показниками відповіді, проте з гіршим профілем безпеки (окреме
  показання IND-MCL-3L-BREXUCEL-CART). Контекст України: препарат не
  зареєстрований, відсутні вітчизняне CAR-T виробництво й
  акредитовані центри; потрібне міжнародне направлення (Ізраїль /
  Польща / Німеччина / Іспанія) із загальною вартістю
  USD 350-500 тис. Агресивний варіант для придатних пацієнтів з MCL
  після неефективності ковалентних інгібіторів BTK, які мають доступ
  до міжнародного CAR-T-центру.

