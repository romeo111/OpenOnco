sources:
  - source_id: SRC-TRANSCEND-NHL-001-ABRAMSON-2020
    position: supports
    relevant_quote_paraphrase: "TRANSCEND NHL-001 MCL cohort (Wang 2024 Lancet): liso-cel in r/r MCL post-cBTKi; ORR ~83%, CR ~72%, mPFS ~15-16 mo, 12-mo OS ~74%; favourable safety vs brexucel (CRS G≥3 ~1%, ICANS G≥3 ~9%)"
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "Lisocabtagene maraleucel is a Category 2A preferred third-line+ option for r/r MCL after ≥2 prior systemic lines including covalent BTKi, per TRANSCEND NHL-001 MCL cohort; favourable CRS / ICANS profile vs brexucel."
  - source_id: SRC-ESMO-LYMPHOMA-2025
    position: supports
    relevant_quote_paraphrase: "CD19 CAR-T cell therapy (brexucabtagene autoleucel, lisocabtagene maraleucel) is the preferred treatment for r/r MCL after failure of covalent BTK inhibitor; product selection guided by safety profile and centre availability."

known_controversies:
  - topic: "Liso-cel vs brexucel for r/r MCL post-cBTKi"
    positions:
      - position: "Brexucel — first CAR-T approved for MCL (ZUMA-2 2020); CD28 costimulation higher CR rate (~68%) and longer follow-up but worse safety (CRS G≥3 ~15%, ICANS G≥3 ~31%)"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Liso-cel — TRANSCEND NHL-001 MCL cohort 2024; 4-1BB costimulation comparable efficacy (CR ~72%) with substantially better safety (CRS G≥3 ~1%, ICANS G≥3 ~9%); preferred for older / frail / cardiac comorbid"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Pirtobrutinib (non-covalent BTKi) is alternative non-CAR-T option for post-cBTKi MCL — separate IND-MCL-3L-PIRTOBRUTINIB entity"
        sources: [SRC-ESMO-LYMPHOMA-2025]
    our_default: "Brexucel for fit ECOG 0-1 patient under 70 with longer-follow-up data preference; liso-cel preferred for older / frailer where safety advantage matters; pirtobrutinib non-CAR-T fallback when CAR-T inaccessible. In Ukraine all 3 require international referral or imported drug."
    rationale: >
      MCL CAR-T product selection driven by patient comorbidity profile
      and centre availability. Liso-cel safety advantage (G≥3 CRS ~1%
      vs brexucel ~15%) is meaningful in elderly MCL population (median
      age ~68 at diagnosis). For Ukrainian patients without CAR-T
      access, pirtobrutinib (registered in some EU markets) provides
      an oral non-CAR-T 3L option.

do_not_do:
  - "НЕ призначати prophylactic systemic corticosteroids — пригнічує CAR-T expansion + знижує efficacy."
  - "НЕ розпочинати без on-site tocilizumab (мінімум 2 дози) ДО інфузії — fatal CRS можливе."
  - "НЕ робити в центрі без CAR-T accreditation (FACT/JACIE/REMS) — toxicity management потребує спеціалізованої команди + ICU доступу."
  - "НЕ ігнорувати baseline brain MRI + lumbar puncture для blastoid / pleomorphic варіанту — pre-existing CNS disease суттєво підвищує ризик fatal ICANS."
  - "НЕ пропускати bridging chemotherapy (3-4 тижні manufacturing window) — швидкопрогресуюча MCL у вікні значно зменшує efficacy."
  - "НЕ призначати при active uncontrolled infection — лімфодеплеція + CRS = high mortality."
  - "НЕ забути IVIG для довготривалої hypogammaglobulinemia (IgG <400 + recurrent infections) — B-cell aplasia може тривати >12 місяців; MCL пацієнти часто мають baseline низький IgG після передлікування."

