do_not_do:
  - "Заборонено при прийомі сильних інгібіторів CYP3A4 (азоли, ритонавір): AUC венетоклаксу ×5-6; фатальний ТЛС"
  - "Без профілактики ТЛС: алопуринол + гідратація + серійний моніторинг (K, фосфор, сечова к-та) — обов'язково ПЕРЕД початком рампінгу"
  - "Якщо пертобрутиніб доступний: він кращий варіант (ОРВ 50-57%, без ризику ТЛС); венетоклакс — при недоступності"
  - "CD20 втрачений (рецидив): не давати ритуксимаб; венетоклакс моно замість VenR"
  - "ЛКЗ у фазі рампінгу: уникати вакцинацій живими вакцинами, уникати телефонних контактів з інфекційними хворими"
  - "Фіксований 24-місячний курс (як MURANO для ХЛЛ) НЕ застосовується при ЛКЗ: продовжувати до прогресування/токсичності"

