rationale: >
  Standard 1L for symptomatic anemia in MDS-LR (IPSS-R Very Low / Low /
  Intermediate). Patient selection: endogenous EPO ≤500 mU/mL + RBC TD
  ≤2U/month → response rate ~50-60%. Epoetin alfa 60,000 IU SC weekly
  OR darbepoetin 150-300 μg SC weekly. Add G-CSF in non-responders if
  RS-MDS subtype. Target Hb 10-12 g/dL (do NOT exceed; boxed mortality /
  VTE warning). Switch to luspatercept (RS-MDS / 1L COMMANDS) or
  lenalidomide (del 5q) or HMA escalation on failure.

rationale_ua: >
  Стандарт першої лінії при симптомній анемії при MDS-LR (IPSS-R
  Very Low / Low / Intermediate). Відбір пацієнтів: ендогенний
  еритропоетин ≤500 mU/mL + трансфузійна залежність ≤2U/місяць →
  частота відповіді ~50-60%. Епоетин альфа (epoetin alfa) 60,000 IU
  підшкірно щотижня АБО дарбепоетин (darbepoetin) 150-300 μg
  підшкірно щотижня. Додати G-CSF у нереспондерів за наявності
  підтипу RS-MDS. Цільовий рівень гемоглобіну 10-12 g/dL (НЕ
  перевищувати; чорна рамка попередження щодо смертності та
  венозного тромбоемболізму). При неефективності перейти на
  люспатерцепт (luspatercept) (RS-MDS / 1L COMMANDS) або леналідомід
  (lenalidomide) (del 5q), або ескалувати до HMA.
ukrainian_review_status: pending_clinical_signoff
