notes: >
  Standard track for MDS-LR symptomatic anemia. Treatment intent:
  cytopenia management + symptom control; does NOT alter natural
  history. AlloHCT not indicated for MDS-LR (deferred until / unless
  IPSS-R progression). STUB — requires clinical co-lead signoff.
