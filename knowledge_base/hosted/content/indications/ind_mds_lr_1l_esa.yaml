sources:
  - source_id: SRC-NCCN-AML-2025
    position: supports
    relevant_quote_paraphrase: "ESA is preferred 1L for MDS-LR symptomatic anemia with low endogenous EPO"
  - source_id: SRC-ESMO-MDS-2021
    position: supports
    relevant_quote_paraphrase: "ESA + iron repletion is the cornerstone of MDS-LR anemia management"

do_not_do:
  - "Не призначати ESA при Hb >12 g/dL — boxed warning щодо тромбоемболій + смертності."
  - "Не продовжувати ESA при відсутності відповіді на 8-12 тижні — переходити до luspatercept (якщо доступний) / lenalidomide / HMA."
  - "Не пропускати iron studies + B12/folate перед ESA — функціональний дефіцит заліза обмежує відповідь."
  - "Не пропускати IPSS-R / IPSS-M risk-стратифікацію — необхідно для виключення MDS-HR."
  - "Не призначати lenalidomide без виключення del(5q) у MDS-LR — efficacy лише у del(5q) контексті."

do_not_do_en:
  - "Do not prescribe ESA at Hb >12 g/dL — boxed warning regarding thromboembolism + mortality."
  - "Do not continue ESA in the absence of response at 8-12 weeks — switch to luspatercept (if available) / lenalidomide / HMA."
  - "Do not skip iron studies + B12/folate before ESA — functional iron deficiency limits response."
  - "Do not skip IPSS-R / IPSS-M risk stratification — required to exclude MDS-HR."
  - "Do not prescribe lenalidomide without excluding del(5q) in MDS-LR — efficacy only in del(5q) context."
known_controversies:
  - topic: "Luspatercept vs ESA as 1L (post-COMMANDS)"
    positions:
      - position: "COMMANDS: luspatercept 1L superior to ESA for transfusion independence in LR-MDS broadly"
        sources:
          - SRC-COMMANDS-FENAUX-2020
      - position: "ESA still preferred 1L in jurisdictions where luspatercept is unavailable / cost-prohibitive"
        sources:
          - SRC-ESMO-MDS-2021
    our_default: "ESA 1L in Ukraine (luspatercept not registered); luspatercept becomes 1L when access allows"
    rationale: "Access constraint dominates"

time_critical: false
last_reviewed: "2026-04-25"
