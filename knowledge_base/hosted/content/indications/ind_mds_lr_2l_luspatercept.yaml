notes: >
  STUB — requires two Clinical Co-Lead approvals before merge (CHARTER §6.1).
  Created to replace IND-MDS-LR-1L-LUSPATERCEPT incorrectly referenced in
  ALGO-MDS-LR-2L output_indications (LOT mismatch fix). This is the proper
  2L indication for luspatercept in ESA-failed MDS-LR; IND-MDS-LR-1L-LUSPATERCEPT
  remains the first-line indication. Both use REG-LUSPATERCEPT-MDS-LR (same
  regimen; different context, stage_requirements, and routing rationale).
  Decision tree step 1 (if_true: risk escalation) and step 3 (if_true: frailty)
  of ALGO-MDS-LR-2L route here.
