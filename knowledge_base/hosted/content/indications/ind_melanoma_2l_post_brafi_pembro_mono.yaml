do_not_do:
  - "Не призначати після попередньої анти-PD-1 терапії — низька ефективність при реіндукції PD-1 після прогресії"
  - "Не ігнорувати базовий ТТГ і функцію кори наднирників — тиреоїдит та надниркова недостатність найчастіші ендокринні іrAE"
  - "Не давати преднізолон >10 мг/добу перед початком ІКП — знижує ефективність"
  - "При Grade ≥2 пневмоніті — зупинити пембролізумаб + КТ грудної клітки + ГКС (преднізолон 0.5-1 мг/кг); Grade ≥3 = постійна відміна"
  - "Не призначати при трансплантації органів — PD-1 блокада викликає відторгнення трансплантата"
  - "Не підтверджувати без верифікованого НСЗУ-фінансування — Кейтруда не в усіх центрах покривається"

sources:
  - source_id: SRC-KEYNOTE006-ROBERT-2015
    position: supports
    relevant_quote_paraphrase: >
      KEYNOTE-006 (Robert 2015 NEJM; Schachter 2017 Lancet; extended follow-up):
      Pembrolizumab 200 mg q3w vs ipilimumab in IO-naive metastatic melanoma.
      ORR 33-35%; mOS ~32.7 mo vs 15.9 mo (ipi; HR 0.68); 5-year OS ~38%.
      Grade 3-4 treatment-related AEs: ~15% (pembro) vs ~20% (ipi).
      NCCN Cat 1 for metastatic melanoma; recommended as de-escalation option
      when combination IO (ipi+nivo or rela+nivo) is not appropriate.
  - source_id: SRC-NCCN-MELANOMA-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN Melanoma 2025: anti-PD-1 monotherapy (pembrolizumab or nivolumab) is
      Category 1 for patients with metastatic melanoma who cannot receive combination
      immunotherapy. For patients with ECOG ≥2 or significant comorbidities
      precluding ipi+nivo or rela+nivo, PD-1 mono is the standard IO option.

