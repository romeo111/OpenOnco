do_not_do:
  - "Без підтвердженої BRAF V600E/K мутації: BRAF-інгібітори при BRAF-WT — парадоксальна активація MAPK"
  - "Без базової ЕКГ: дабрафеніб → подовження QTc; QTc >480 мс — протипоказання"
  - "Ад'ювантно >12 місяців: COMBI-AD — 12 місяців фіксовано; немає даних по тривалішому курсу"
  - "Без дерматологічного спостереження: дабрафеніб → КпПРЕ; видалення при виявленні"
  - "Без офтальмологічного скринінгу: траметиніб → відшарування ПРЕ; моніторинг q3 міс"
  - "Ігнорувати гарячку 38-40°С: перервати дабрафеніб; жарознижувальні; відновити після нормалізації t°"

sources:
  - source_id: SRC-COMBI-AD-LONG-2017
    position: supports
    relevant_quote_paraphrase: >
      COMBI-AD (Long 2017 NEJM; Phase 3; n=870): dabrafenib+trametinib × 12 months vs
      placebo in resected BRAF V600E/K-mutant stage III melanoma. 4-yr RFS 54% vs 38%
      (HR 0.49; p<0.001). 4-yr OS 77% vs 70% (HR 0.75; p=0.005). NCCN Cat 1.
  - source_id: SRC-NCCN-MELANOMA-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN Melanoma 2025 Category 1: dabrafenib+trametinib × 12 months adjuvant for
      resected BRAF V600E/K-mutant stage III melanoma (COMBI-AD basis).
      Equivalent Category 1 recommendation alongside pembrolizumab and nivolumab.

