  - "Не призначати при активному автоімунному захворюванні з імуносупресивною терапією >10 мг/добу преднізолон-еквівалент"
  - "Не призначати після трансплантації органів — ніволумаб → відторгнення трансплантата"
  - "Не продовжувати понад 12 місяців без підтвердженого регресу: ад'ювантне лікування обмежене 1 роком"
  - "Не ігнорувати базовий ТТГ — тиреоїдит ~9% при ніволумабі; лікування гормонами щитоподібної залози без відміни ІКП"
  - "При Grade ≥3 пневмоніті — постійна відміна ніволумабу"

