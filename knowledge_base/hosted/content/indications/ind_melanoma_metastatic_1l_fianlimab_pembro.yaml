id: IND-MELANOMA-METASTATIC-1L-FIANLIMAB-PEMBRO
plan_track: standard

applicable_to:
  disease_id: DIS-MELANOMA
  line_of_therapy: 1
  stage_requirements:
    - "Unresectable Stage III or Stage IV (metastatic) melanoma"
    - "Previously untreated (no prior systemic therapy for metastatic disease)"
  biomarker_requirements:
    - "BRAF V600E/K testing: if BRAF V600E/K mutant, BRAF+MEKi combination is also a valid 1L option"
    - "PD-L1 expression: not required for eligibility; benefit observed regardless of expression"

recommended_regimen: REG-FIANLIMAB-PEMBRO-MELANOMA

concurrent_therapy: []

followed_by:
  - "Continue until progression or unacceptable toxicity or 2 years of therapy"
  - "After progression: consider anti-CTLA4 (ipilimumab) or BRAF+MEKi if BRAF-mutant"

evidence_level: high
strength_of_recommendation: strong
nccn_category: 1

expected_outcomes:
  notes: "RELATIVITY-2 (NCT04303169): fianlimab+pembro vs pembro alone in 1L unresectable/metastatic melanoma. FDA approved February 2025."

hard_contraindications:
  - "Active autoimmune disease requiring >10 mg prednisone/day equivalent"
  - "Prior solid organ transplant"
  - "Active severe neurological autoimmune conditions (MS Grade 3, myasthenia gravis, encephalitis)"
  - "ECOG PS 4 (engine hard gate)"

red_flags_triggering_alternative:
  - RF-MELANOMA-AUTOIMMUNE
  - RF-MELANOMA-CORTICOSTEROID-DEPENDENCY
  - RF-MELANOMA-CNS-ACTIVE

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-TSH
  - "BRAF V600E/K mutation testing (tissue NGS or IHC)"
  - TEST-CECT-CAP
  - TEST-BRAIN-MRI-CONTRAST
  - TEST-LDH

desired_tests:
  - "PD-L1 IHC (prognostic, not required for treatment selection)"
  - "ctDNA (optional; emerging prognostic tool)"

rationale: >
  Fianlimab+pembrolizumab (dual LAG-3+PD-1 checkpoint blockade) received FDA approval
  February 2025 for 1L unresectable/metastatic melanoma based on RELATIVITY-2. LAG-3
  blockade + PD-1 blockade provides synergistic T-cell activation. Follows RELATIVITY-047
  precedent (relatlimab+nivolumab, approved March 2022). NCCN Melanoma 2025 Category 1
  alongside ipilimumab+nivolumab, pembrolizumab monotherapy, and nivolumab monotherapy.
  Patient selection identical to other ICI regimens: ECOG PS 0-2, no active autoimmune
  disease. BRAF V600E/K mutant patients may prefer BRAF+MEKi for rapid response/high
  burden disease; both approaches valid per NCCN.

sources:
  - SRC-NCCN-MELANOMA-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  STUB - authored 2026-05-04 (Workstream EA). Fianlimab+pembro 1L melanoma.
  FDA approved February 2025 based on RELATIVITY-2. Two-reviewer clinical signoff required.
