rationale: >
  Pembrolizumab monotherapy is a Category 1 preferred 1L for advanced /
  metastatic melanoma (KEYNOTE-006). PD-L1-agnostic — used regardless
  of CPS / TPS. Particularly preferred over ipi+nivo combination when
  combination irAE profile (~55% grade 3-4) is unacceptable: irAE-frail
  patients (autoimmune comorbidity, prior solid-organ transplant
  contraindication aside, age ≥75, ECOG 2). Lower G3-4 irAE rate (~17%)
  with comparable single-agent IO efficacy. BRAF-mutated patients have
  the alternative of BRAFi+MEKi (dabrafenib+trametinib) — choice
  driven by tumor burden, LDH, symptomatic disease, and patient/
  clinician preference; IO is generally preferred for durable response
  potential. Combination ipi+nivo remains preferred where tolerable
  (younger fit, low autoimmune risk, brain mets).

rationale_ua: >
  Монотерапія пембролізумабом (pembrolizumab) — переважний варіант
  категорії 1 у першій лінії при поширеній/метастатичній меланомі
  (KEYNOTE-006). PD-L1-агностична — застосовується незалежно від
  CPS/TPS. Особливо переважна над комбінацією іпілімумаб + ніволумаб,
  коли її профіль небажаних явищ імунологічного характеру (~55%
  ступеня 3-4) неприйнятний: пацієнти з підвищеним ризиком irAE
  (автоімунна коморбідність, вік ≥75 років, ECOG 2). Нижча частота
  irAE 3-4 ступеня (~17%) при порівнянній з монотерапією ефективності.
  BRAF-мутантні пацієнти мають альтернативу у вигляді BRAFi+MEKi
  (дабрафеніб + траметиніб (dabrafenib + trametinib)) — вибір
  визначається обсягом пухлини, рівнем ЛДГ, симптомністю та
  вподобаннями пацієнта/клініциста; перевагу зазвичай надають
  імунотерапії через потенціал стійкої відповіді. Комбінація
  іпілімумаб + ніволумаб залишається пріоритетною за умови
  переносимості (молодші придатні пацієнти, низький автоімунний
  ризик, метастази в головний мозок).
ukrainian_review_status: pending_clinical_signoff
