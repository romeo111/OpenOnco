notes: >
  STUB — pending Clinical Co-Lead sign-off. Authored 2026-05-04 (Workstream DN).
  Evidence level LOW — no Phase 3 RCT for any systemic agent in meningioma.
  Bevacizumab chosen as KB default indication because: (1) most published Phase 2
  data, (2) anti-edema effect is a distinct clinical benefit, (3) drug exists in KB,
  (4) NCCN lists as Category 2B (same as everolimus and hydroxyurea).
  Molecular profiling important: AKT1 E17K (~8–10% of grade I), SMO-mutant (~5%
  of grade I convexity), and NF2 germline (NF2 syndrome) are subsets with potential
  targeted options in trials. Document molecular profile at first recurrence.
  Meningioma is increasingly recognized as a molecularly heterogeneous disease
  (2021 WHO integrated diagnosis) — future KB updates should include molecular
  subtype-specific indications as trial data matures.
