id: IND-MENINGIOMA-PROGRESSIVE-BEVACIZUMAB
plan_track: standard

applicable_to:
  disease_id: DIS-MENINGIOMA
  line_of_therapy: 1
  stage_requirements:
    - "WHO grade II (atypical) or grade III (anaplastic) meningioma confirmed by neuropathology (WHO CNS 2021 criteria)"
    - "Recurrent or progressive disease after maximal safe surgical resection AND radiotherapy (SRS/SRT/IMRT)"
    - "Not eligible for further surgery or re-irradiation (or surgery/re-RT already considered and deemed not feasible/appropriate)"
    - "Measurable disease on gadolinium-enhanced MRI (RANO-meningioma criteria)"
    - "ECOG PS 0-2"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    notes: >
      No companion diagnostic biomarker required — bevacizumab is used for all
      progressive grade II-III meningioma regardless of NF2, AKT1, SMO, or TRAF7
      status. Molecular profiling is clinically important for trial eligibility
      (e.g., AKT1 E17K → AKT inhibitor trials; SMO-mutant → vismodegib trials)
      but does not alter bevacizumab eligibility.
      Grade I meningioma: bevacizumab NOT indicated — surgery ± SRS for recurrent
      grade I meningioma; systemic therapy only if multiple prior surgical failures
      and patient unable to tolerate further surgery/radiation.
      Blood pressure must be ≤150/100 mmHg before starting bevacizumab.
      Anti-angiogenic therapy with bevacizumab may cause steroid-sparing effect
      (anti-edema) — dexamethasone reduction is a secondary clinical benefit.

recommended_regimen: REG-BEVACIZUMAB-MENINGIOMA
concurrent_therapy:
  - "Blood pressure monitoring: weekly × 2 cycles, then q2 weeks (hypertension is the most common Grade ≥3 AE)"
  - "Antihypertensive therapy: initiate if BP >140/90 on 2 readings; target ≤130/80 during bevacizumab"
  - "Corticosteroid management: attempt dexamethasone taper after cycle 1-2 if anti-edema response noted (bevacizumab anti-VEGF effect reduces vasogenic edema)"
  - "Urinalysis dipstick: each visit; 24-hour urine protein if ≥2+"
  - "Antiepileptic drug management: continue existing AED; bevacizumab does not interact significantly with most AEDs"

followed_by:
  - "MRI brain with gadolinium enhancement: baseline + every 8–12 weeks (RANO-meningioma response criteria)"
  - "Continue bevacizumab until radiographic progression or unacceptable toxicity"
  - "At progression: multidisciplinary neuro-oncology review; re-irradiation if feasible; clinical trial preferred"
  - "Everolimus ± octreotide: alternative or sequential systemic option (limited Phase 2 data)"
  - "Hydroxyurea: older historical option with limited activity; not preferred over bevacizumab or everolimus"

evidence_level: low
strength_of_recommendation: weak
nccn_category: "2B"

expected_outcomes:
  overall_response_rate: "~6–16% by RANO-meningioma criteria (partial response; CR rare in meningioma)"
  complete_response: "<5% (meningioma rarely shows complete radiographic disappearance)"
  progression_free_survival: "6-month PFS rate: ~40–45% for grade II; ~20–26% for grade III (Kaley 2015; Lou 2012)"
  overall_survival_5y: "Grade II 5-year OS ~50–65%; Grade III 5-year OS ~20–35% (primarily reflects tumor grade, not bevacizumab benefit)"
  notes: >
    PRIMARY EVIDENCE: No Phase 3 RCT for bevacizumab in meningioma.
    KEY PHASE 2 STUDIES:
    - Lou E et al., Neuro-Oncology 2012;14:1174–1179: Bevacizumab (N=14) in recurrent
      grade II-III meningioma. 6-month PFS rate 43.8%; ORR 40%. Modest activity;
      anti-edema effect documented (steroid dose reduction in most patients).
    - Kaley TJ et al., Neuro-Oncology 2015;17:873–880: Bevacizumab monotherapy (N=40)
      in recurrent grade II-III meningioma. 6-month PFS 43% (grade II), 26% (grade III).
      ORR 6% by RANO criteria; clinical benefit (stable disease or better) in majority.
    NCCN CNS v3.2025 (SRC-NCCN-CNS-2025): bevacizumab Category 2B for recurrent/
    progressive grade II-III meningioma after surgery and radiation.
    EANO Meningioma guidelines (SRC-EANO-MENINGIOMA-2024): bevacizumab listed as
    systemic option for recurrent high-grade meningioma; low evidence (Phase 2 only).
    NOTE: Anti-edema benefit (steroid-sparing effect) may be as clinically important
    as anti-tumor activity in patients with symptomatic vasogenic edema from meningioma.
    Clinical trial enrollment is STRONGLY preferred for progressive grade II-III
    meningioma given weak evidence for all systemic options.

hard_contraindications:
  - "WHO grade I meningioma — bevacizumab not evidence-based; surgery/observation preferred"
  - "Active intracranial hemorrhage — VEGF blockade impairs hemostasis; absolute contraindication"
  - "Uncontrolled hypertension (BP >160/100 mmHg despite medications) — class contraindication; bevacizumab worsens hypertension"
  - "Within 28 days of major surgery or neurosurgery — wound healing impairment"
  - "ECOG PS ≥4 — ECOG engine hard gate"

red_flags_triggering_alternative:
  - RF-FITNESS-ECOG-FIT

required_tests:
  - TEST-CBC
  - TEST-LFT
  - TEST-CMP
  - TEST-MRI-BRAIN
  - "Urinalysis with protein dipstick: baseline (nephrotic syndrome risk)"
  - "Blood pressure measurement: baseline — must be ≤150/100 mmHg to start"
  - "Coagulation panel (PT/INR/aPTT): baseline (intracranial hemorrhage risk with anticoagulation)"
  - "Neuropathology report with WHO 2021 grading: mandatory — grade I does not meet indication criteria"

desired_tests:
  - "Molecular profiling (NF2, AKT1 E17K, SMO, TRAF7, CDKN2A/B): for clinical trial eligibility and prognosis"
  - "SSTR2 somatostatin receptor scintigraphy or Ga-DOTATATE PET: for somatostatin analogue eligibility assessment"
  - "Cardiac function (echo/ECHO EF): if prior anthracyclines or cardiac comorbidities"
  - "Re-irradiation planning MRI: evaluate feasibility before committing to systemic therapy"

rationale: >
  Bevacizumab is the most commonly used systemic agent for recurrent/progressive WHO grade
  II-III meningioma, based on multiple Phase 2 studies demonstrating modest anti-tumor
  activity and clinically meaningful anti-edema effects.

  DISEASE CONTEXT: Meningioma is the most common primary intracranial tumor (~37% of CNS
  tumors). WHO grade I (benign) meningiomas are largely cured by gross total resection.
  WHO grade II (atypical; ~20%) and grade III (anaplastic; ~2%) have significantly higher
  recurrence rates despite surgery and radiation — 5-year recurrence rates of ~40% for
  grade II and >70% for grade III.

  SYSTEMIC THERAPY RATIONALE: Meningiomas are highly vascular tumors; VEGF expression
  correlates with grade and vasogenic edema. Anti-VEGF therapy (bevacizumab) addresses
  two distinct clinical problems: (1) tumor growth inhibition (modest anti-proliferative
  effect), and (2) reduction of vasogenic edema (anti-VEGF effect on blood-brain barrier
  permeability), enabling corticosteroid dose reduction.

  EVIDENCE: Phase 2 studies (Lou 2012; Kaley 2015) demonstrate 6-month PFS rates of
  40-44% for grade II and 20-26% for grade III meningioma — modest but clinically
  meaningful in a disease with no approved systemic therapy.

  ALTERNATIVES:
  - Everolimus ± octreotide: mTORC1 inhibition (Graillon 2019 Phase 2; Kaley 2015);
    somatostatin receptor expression is common in meningioma (SSTR2+)
  - Hydroxyurea: low activity, largely abandoned
  - Investigational: AKT inhibitors (capivasertib for AKT1 E17K-mutant),
    vismodegib (SMO-mutant subset), selumetinib (NF2-related), FAK inhibitors
  Clinical trial enrollment is the highest priority for progressive grade II-III
  meningioma — the evidence base for ALL systemic agents is Phase 2 only.

  UKRAINE CONTEXT: Bevacizumab biosimilars are available in Ukraine (Avastin biosimilars;
  NSZU-reimbursed for colorectal and ovarian cancer). Off-label use for meningioma
  requires individual case justification and physician documentation.

rationale_ua: >
  Бевацизумаб — найпоширеніший системний препарат при рецидивуючих менінгіомах
  WHO ступеня II-III (після операції + РТ). Фаза 2 (Lou 2012, Kaley 2015):
  6-місячна ВПЗ ~40-44% (ступінь II); ~20-26% (ступінь III); протинабряковий
  ефект → зниження дози дексаметазону. Немає фази 3 РКД; NCCN 2B.
  Клінічне дослідження — пріоритет. Таргетні варіанти для молекулярних підтипів:
  AKT1 E17K → AKT-інгібітори; SMO-мутантна → візомодегіб (серія випадків).
  Україна: бевацизумаб (біоаналоги) — доступний; off-label для менінгіоми.

ukrainian_review_status: pending_clinical_signoff
