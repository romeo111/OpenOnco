do_not_do:
  - "НЕ застосовувати при менінгіомі WHO ступеня I — хірургія ± SRS є стандартом; бевацизумаб недоцільний"
  - "НЕ починати при неконтрольованій гіпертензії (>150/100 мм рт. ст.) — клас-ефект бевацизумабу погіршує АТ"
  - "НЕ застосовувати протягом 28 днів після операції — ризик порушення загоєння ран"
  - "НЕ ігнорувати внутрішньочерепний крювовилив — бевацизумаб протипоказаний при активній кровотечі"
  - "НЕ відкладати обговорення клінічного дослідження — всі системні варіанти при менінгіомі є фазою 2 і мають низький рівень доказів"

sources:
  - source_id: SRC-NCCN-CNS-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN Central Nervous System Cancers: bevacizumab Category 2B for recurrent/
      progressive WHO grade II-III meningioma after surgery and radiotherapy.
      Clinical trial enrollment preferred. Everolimus and hydroxyurea are alternative
      systemic options (Category 2B).
  - source_id: SRC-EANO-MENINGIOMA-2024
    position: supports
    relevant_quote_paraphrase: >
      EANO Meningioma guidelines: bevacizumab listed as systemic therapy option for
      recurrent WHO grade II-III meningioma after maximal surgical resection and
      radiotherapy. Evidence level: Phase 2 studies only; low evidence. Clinical
      trials are preferred for eligible patients.

