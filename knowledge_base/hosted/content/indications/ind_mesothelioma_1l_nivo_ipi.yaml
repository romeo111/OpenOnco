notes: >
  CheckMate-743 (PMID 33581810) is the landmark MPM 1L trial.
  FDA approved October 2020 for unresectable MPM — first new 1L approval in 15 years.
  Histology-driven routing is essential: non-epithelioid MPM derives far greater benefit
  (HR 0.46) and nivo+ipi should be strongly preferred; epithelioid still benefits (HR 0.86)
  but chemotherapy remains an alternative.
  Sources note: MPM is sometimes managed by thoracic oncologists who may reference
  NCCN Mesothelioma guidelines (separate from NSCLC). SRC-NCCN-NSCLC-2025 used as
  proxy — dedicated NCCN mesothelioma source should be added.
