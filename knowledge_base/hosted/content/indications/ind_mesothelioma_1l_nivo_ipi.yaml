rationale: >
  Nivolumab 3 mg/kg q2w + ipilimumab 1 mg/kg q6w (up to 2 years) is FDA-approved
  (October 2020) and NCCN Category 1 for unresectable MPM 1L, based on CheckMate-743
  (Baas, Lancet 2021, n=605, phase 3 RCT). mOS 18.1 vs 14.1 mo (HR 0.74, p=0.005);
  2-year OS 41% vs 27%. First new FDA approval in MPM in 15 years (prior: pemetrexed+
  cisplatin, 2004). Histology-stratified benefit: non-epithelioid (sarcomatoid/biphasic)
  had dramatic OS benefit (HR 0.46, mOS 18.1 vs 8.8 mo) while epithelioid showed
  modest benefit (HR 0.86). This makes histological subtype the primary clinical
  routing decision: non-epithelioid histology → nivo+ipi preferred (substantially
  superior to chemotherapy); epithelioid → nivo+ipi or pemetrexed+platinum (both
  acceptable; nivo+ipi has modest OS advantage, better durability). ORR similar
  between arms (40% vs 43%) but duration of response longer with nivo+ipi.
  Immune-related AEs: Grade 3-4 in ~30%, comparable to chemotherapy toxicity.

rationale_ua: >
  Ніволумаб 3 мг/кг q2w + іпілімумаб 1 мг/кг q6w (до 2 років) є FDA-схваленим
  (жовтень 2020) та NCCN Категорія 1 для нерезектабельного МПМ 1L, на підставі
  CheckMate-743 (Baas, Lancet 2021). mOS 18.1 проти 14.1 міс. (HR 0.74, p=0.005).
  Перше нове FDA-схвалення при МПМ за 15 років. Гістологія-стратифікована користь:
  не-епітеліоїдний (саркоматоїдний/двофазний) — драматична ЗВ-перевага (HR 0.46,
  mOS 18.1 проти 8.8 міс.); епітеліоїдний — скромна перевага (HR 0.86). ORR
  подібний до хіміотерапії (40% vs 43%), але тривалість відповіді довша з ICI.

ukrainian_review_status: pending_clinical_signoff
