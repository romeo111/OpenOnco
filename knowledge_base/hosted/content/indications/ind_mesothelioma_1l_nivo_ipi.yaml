  disease_id: DIS-MESOTHELIOMA
  line_of_therapy: 1
  stage_requirements:
  - "Unresectable malignant pleural mesothelioma (MPM)"
  - "No prior systemic therapy for MPM"
  - "Not candidates for curative-intent resection (extrapleural pneumonectomy or pleurectomy/decortication)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
