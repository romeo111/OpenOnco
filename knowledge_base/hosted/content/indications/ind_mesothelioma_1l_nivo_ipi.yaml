sources:
- source_id: SRC-CHECKMATE743-BAAS-2021
  position: supports
  relevant_quote_paraphrase: "CheckMate-743: nivo+ipi vs chemo 1L unresectable MPM; mOS 18.1 vs 14.1 mo (HR 0.74, p=0.005); non-epithelioid HR 0.46; FDA approved October 2020"
- source_id: SRC-NCCN-NSCLC-2025
  position: supports
  relevant_quote_paraphrase: "Nivolumab+ipilimumab is NCCN Category 1 for unresectable MPM 1L; histology (epithelioid vs non-epithelioid) is the key routing factor"

do_not_do:
- "Не використовувати дозу ніволумабу 360 мг q3w або 480 мг q4w — МПМ-специфічне дозування 3 мг/кг q2w (ваговe); з CheckMate-743"
- "Не використовувати дозу іпілімумабу 3 мг/кг або q3w схему — МПМ-специфічне: 1 мг/кг q6w (вагове), НЕ як при меланомі або НМКЛЛі"
- "Не починати без базового скринінгу HBV/HCV + тиреоїдна функція + LFTs + кортизол"
- "Не вводити інфліксімаб при CTLA-4-пов'язаному Grade 3+ гепатиті — застосувати мікофенолат мофетил; інфліксімаб протипоказаний при гепатиті (ризик фульмінантного некрозу)"
- "Не оцінювати відповідь за стандартним RECIST 1.1 — МПМ вимагає модифікованого RECIST (двовимірне плевральне вимірювання)"
- "Не призначати при активному аутоімунному захворюванні, що вимагає >10 мг/д преднізолону, або при попередній трансплантації органів"

known_controversies:
- topic: "Nivo+ipi vs pemetrexed+cisplatin/carboplatin in epithelioid MPM"
  positions:
  - position: "Nivo+ipi preferred overall (Cat 1) including epithelioid — HR 0.86 still shows trend to benefit; better durability; no cumulative nephrotoxicity from cisplatin"
    sources:
    - SRC-CHECKMATE743-BAAS-2021
    - SRC-NCCN-NSCLC-2025
  - position: "Pemetrexed+platinum remains acceptable for epithelioid MPM — higher ORR (43% vs 40%), higher DCR; ICI benefit in epithelioid is modest (HR 0.86 not statistically significant in subgroup)"
    sources:
    - SRC-NCCN-NSCLC-2025
  our_default: "Nivo+ipi preferred for all MPM (Cat 1); pemetrexed+platinum acceptable for epithelioid if ICI access/tolerance issue"
  rationale: "Non-epithelioid: nivo+ipi clearly superior (HR 0.46); epithelioid: nivo+ipi modest advantage with better durability — overall preferred"

