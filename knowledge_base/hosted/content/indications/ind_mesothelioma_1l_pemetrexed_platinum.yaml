  disease_id: DIS-MESOTHELIOMA
  line_of_therapy: 1
  stage_requirements:
  - "Malignant pleural mesothelioma (MPM) — unresectable, advanced, or metastatic"
  - "Any histological subtype (epithelioid, sarcomatoid, biphasic)"
  - "ICI contraindicated OR patient ineligible for nivolumab+ipilimumab (IND-MESOTHELIOMA-1L-NIVO-IPI)"
  - "Also used: post-ICI failure as subsequent therapy; if patient progressed on 1L nivo+ipi"
