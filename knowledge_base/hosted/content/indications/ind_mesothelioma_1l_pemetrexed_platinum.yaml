notes: >
  Pemetrexed+carboplatin (AUC 5) is an equivalent alternative for cisplatin-ineligible
  patients — no phase 3 head-to-head but widely accepted (NCCN Category 2A).
  Pemetrexed maintenance after 6 cycles of doublet: not standard per EMPHACIS;
  some centers use pemetrexed maintenance for responding patients (off-label).
  Post-ICI salvage: pemetrexed+platinum is the recommended chemotherapy after
  progression on nivolumab+ipilimumab (NCCN).
  Response assessment: modified RECIST (mRECIST for pleural diseases) — measure
  tumor thickness at 3 perpendicular levels; standard RECIST underestimates MPM progression.
