rationale: >
  Pemetrexed+cisplatin is NCCN Category 1 for MPM based on EMPHACIS (Vogelzang 2003,
  n=456): ORR 41% vs 17% (p<0.001), mOS 12.1 vs 9.3 months (HR 0.77, p=0.020).
  MANDATORY: folic acid daily + vitamin B12 q9 weeks reduces Grade 3/4 toxicity
  from ~60% to ~18% — without supplementation, pemetrexed is excessively toxic.
  Dexamethasone 4 mg BID × 3 days per cycle prevents rash.
  With the advent of CheckMate-743 (nivolumab+ipilimumab: OS HR 0.74 over chemotherapy),
  pemetrexed+cisplatin is now the standard-track option for patients with
  immunotherapy contraindications or as post-ICI progression chemotherapy.
  Pemetrexed+carboplatin is an acceptable substitution for cisplatin-ineligible patients
  (similar efficacy; less renal/neural toxicity; less hydration requirement).

rationale_ua: >
  Пеметрексед+цисплатин — NCCN Категорія 1 для МПМ (EMPHACIS, 2003, n=456):
  ORR 41% vs 17%, мOS 12.1 vs 9.3 міс (HR 0.77). ОБОВ'ЯЗКОВО: фолієва кислота
  щоденно + вітамін B12 кожні 9 тижнів — зменшує токсичність Grade 3/4 з ~60%
  до ~18%. Дексаметазон 4 мг двічі × 3 дні — профілактика висипу. Після появи
  ніволумаб+іпілімумаб (CheckMate-743, OS HR 0.74), пеметрексед є стандартним
  вибором при протипоказаннях до імунотерапії або після прогресування на ICI 1L.

