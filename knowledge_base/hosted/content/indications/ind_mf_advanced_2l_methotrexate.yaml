do_not_do:
  - "НІКОЛИ не призначати при вагітності — Кат.X тератоген; контрацепція обов'язкова"
  - "CrCl <30 мл/хв: МТХ накопичується → важка мієлосупресія/мукозит; альтернатива — бексаротен"
  - "НПЗП (диклофенак, ібупрофен): підвищують токсичність МТХ (знижена ниркова екскреція); уникати"
  - "ТМП/СМК (котримоксазол) одночасно: не сумісний з МТХ; замінити пневмоцистну профілактику (аерозольний пентамідин або дапсон)"
  - "Фолієва кислота в день МТХ: не призначати фол. кислоту в той самий день (знижує ефективність МТХ)"
  - "CD30+ захворювання (≥10% ІГХ): BV переважніше; МТХ менш ефективний при CD30+ MF"
  - "Накопичена доза >1.5г: FibroScan або біопсія печінки (фіброз)"

