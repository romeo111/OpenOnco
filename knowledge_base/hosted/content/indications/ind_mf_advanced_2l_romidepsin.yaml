do_not_do:
  - "Без базового ЕКГ: ромідепсин → QTc подовження; QTcF >480 мс — протипоказання"
  - "Без корекції K+/Mg²+ до норми: гіпокаліємія + HDACi → підвищений ризик аритмії"
  - "При трансформованій МФ (великоклітинна): ромідепсин менш ефективний; пралатрексат або антрациклін-базована схема"
  - "Після невдачі HDACi (ромідепсин/вориностат): клас-перехресна резистентність; переходити на бексаротен (нехімічний механізм)"

