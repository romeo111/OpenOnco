id: IND-MF-ADVANCED-2L-ROMIDEPSIN
plan_track: standard

applicable_to:
  disease_id: DIS-MF-SEZARY
  line_of_therapy: 2
  stage_requirements:
    - "Advanced mycosis fungoides (stage IIB-IV) or Sézary syndrome relapsed/refractory to ≥1 prior systemic line"
    - "OR: MF/SS progressing after initial skin-directed therapy requiring systemic escalation"
    - "ECOG PS 0-2"
    - "QTcF ≤480 ms at baseline (romidepsin class effect QTc prolongation)"
    - "No baseline Grade ≥3 cardiac arrhythmia or uncontrolled heart failure"
    - "Adequate organ function: ANC ≥1.0×10⁹/L, PLT ≥75×10⁹/L, bilirubin ≤1.5×ULN, CrCl ≥30 mL/min"
  biomarker_requirements_required: []
  biomarker_requirements_excluded:
    - "QTcF >480 ms at baseline or uncontrolled arrhythmia (HDACi class QTc prolongation risk)"
    - "Hypokalemia or hypomagnesemia not correctible to normal range (potassium/magnesium depletion augments QTc risk)"
    - "Prior HDACi failure (romidepsin, vorinostat): class cross-resistance likely; switch to non-HDACi (bexarotene, MTX)"
    - "Transformed MF (histologic transformation to large-cell lymphoma): romidepsin less effective; pralatrexate or anthracycline-based preferred"
  demographic_constraints:
    ecog_max: 2
    notes: >
      MF/SS primarily affects adults (median age ~60); Sézary syndrome skews older.
      Romidepsin (Istodax) is an HDACi: cyclic peptide; IV administration on days 1, 8, 15
      q28d. Key toxicities: nausea/vomiting (moderate; premedicate), fatigue, QTc prolongation
      (~5-10% grade 1-2), thrombocytopenia (grade 3-4 ~10%), infections (T-cell depletion).
      K+ and Mg²+ repletion to upper-normal range before each infusion mandatory (QTc).
      Ukraine: romidepsin (Istodax) NOT registered; named-patient import or clinical trial
      required. Substantial access barrier — bexarotene or vorinostat (if available) preferred
      when romidepsin inaccessible.

recommended_regimen: REG-ROMIDEPSIN-PTCL
alternative_regimens:
  - regimen_id: null
    description: >
      Vorinostat (suberoylanilide hydroxamic acid, SAHA; Zolinza): oral HDAC inhibitor;
      400 mg PO daily with food. FDA-approved for refractory CTCL (October 2006; Duvic 2007
      JCO; ORR 29.7%; mTTP 4.9 months; NCCN Cat 2A). Oral administration advantage over
      romidepsin IV. Key toxicities: fatigue, GI (diarrhea, nausea), thrombocytopenia,
      QTc prolongation (less than romidepsin). Not registered in Ukraine; comparable
      HDACi-class access barrier. Not separately modeled as indication.
  - regimen_id: null
    description: >
      Bexarotene (IND-MF-ADVANCED-2L-BEXAROTENE): retinoid X receptor agonist; 300 mg/m²
      PO daily; ORR ~45% erythrodermic MF. Indicated when HDACi contraindicated (QTc,
      cardiac arrhythmia) or inaccessible. Requires mandatory fenofibrate + levothyroxine.
      NCCN Cat 2A; hepatotoxicity monitoring required.

concurrent_therapy:
  - "QTc monitoring protocol: 12-lead ECG at baseline + day 1 each cycle; hold for QTcF >500 ms or new ST-T changes"
  - "Electrolyte repletion: potassium ≥4.0 mEq/L and magnesium ≥0.85 mmol/L before each infusion (mandatory; use IV K+/Mg²+ if oral insufficient)"
  - "Anti-emesis: 5-HT3 antagonist + dexamethasone 4 mg before romidepsin infusion; oral metoclopramide PRN for delayed nausea"
  - "TLS prophylaxis: allopurinol 300 mg/day PO × 7 days before cycle 1 if high-burden disease (stage IV); IVF 100 mL/hr on infusion day"
  - "PJP prophylaxis: co-trimoxazole 480 mg PO 3×/week (romidepsin → T-cell depletion → opportunistic infection risk)"
  - "Herpes zoster prophylaxis: acyclovir 400 mg PO bid throughout therapy + 3 months after"

followed_by:
  - "Continue romidepsin until disease progression or unacceptable toxicity (no planned fixed duration)"
  - "Response assessment: modified Severity Weighted Assessment Tool (mSWAT) for skin + CT/PET-CT at cycle 4 and 8"
  - "Sézary blood monitoring: peripheral blood Sézary cell count + CD4/CD8 ratio q2 cycles"
  - "After romidepsin failure: bexarotene (IND-MF-ADVANCED-2L-BEXAROTENE); pralatrexate (PROPEL; NCCN Cat 2A) for transformed MF; clinical trial"

evidence_level: moderate
strength_of_recommendation: moderate
nccn_category: "2A"

expected_outcomes:
  orr: "~34% (Whittaker 2010 JCO; Phase 2 r/r advanced MF/CTCL; n=96)"
  cr_rate: "~6% CR; ~28% PR (Whittaker 2010)"
  median_dor_months: "~15 months (responders; Whittaker 2010)"
  notes: >
    Whittaker 2010 JCO (Phase 2; n=96 advanced/refractory MF/SS): romidepsin 14 mg/m²
    IV days 1, 8, 15 q28d. ORR 34% (CR 6%, PR 28%); mDOR 15 months. Most responses
    durable; deep responses (CR) maintained for extended periods. Stage IIB-IVB population.
    FDA accelerated approval for CTCL: November 2009. FDA regular approval for PTCL: June 2011.
    Comparable ORR to vorinostat (29.7%; Duvic 2007) in CTCL; IV romidepsin vs oral vorinostat
    is the main practical distinction.
    NCCN T-cell lymphoma 2025 Category 2A for advanced MF/SS at 2L+.
    UA: romidepsin NOT registered; named-patient access only — significant practical barrier.
    Vorinostat also not registered; both HDACi have approximately equal access difficulty.
    Bexarotene (oral, registered in some UA-accessible countries) is the more accessible
    systemic option for most UA MF patients.

hard_contraindications:
  - "QTcF >480 ms at baseline or history of significant ventricular arrhythmia"
  - "Uncontrolled hypokalemia / hypomagnesemia (augments QTc risk; correct first if possible)"
  - "Prior HDACi (romidepsin/vorinostat) REFRACTORY: class cross-resistance; switch mechanism"
  - "ECOG PS ≥3 (IV infusion burden; infection risk)"
  - "ECOG PS ≥4 (ECOG engine hard gate)"

red_flags_triggering_alternative:
  - condition: "QTcF >480 ms at baseline or cardiac arrhythmia → bexarotene (IND-MF-ADVANCED-2L-BEXAROTENE)"
  - condition: "Romidepsin inaccessible in Ukraine (named-patient only) → bexarotene or clinical trial"
  - condition: "Transformed MF (histologic transformation to large cell) → pralatrexate (PROPEL) or anthracycline salvage"
  - condition: "Prior HDACi failure → bexarotene (non-HDACi retinoid mechanism) or methotrexate"

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - "12-lead ECG: baseline QTcF measurement mandatory; repeat day 1 each cycle"
  - "Electrolytes (K+, Mg²+, Ca²+): baseline and before each infusion; repletion mandatory"
  - "mSWAT (modified Severity Weighted Assessment Tool): skin disease burden score at baseline + q2 cycles"
  - "CT chest/abdomen/pelvis: baseline staging + q4 cycles response"
  - "Peripheral blood Sézary count + CD4/CD8: if Sézary syndrome component (monitoring)"

desired_tests:
  - "PET-CT: baseline + response assessment (more sensitive than CT for nodal MF)"
  - "Skin biopsy (if response uncertain): residual disease vs inflammatory skin reaction can be confused"
  - "T-cell receptor (TCR) clonality PCR: baseline clonal tracking + response monitoring in blood"

rationale: >
  Romidepsin is a bicyclic depsipeptide HDAC inhibitor targeting class I (HDAC1, 2, 3) and
  class IIb (HDAC8). HDAC inhibition → histone hyperacetylation → chromatin relaxation →
  re-expression of silenced tumor suppressor genes → G1/S cell cycle arrest + apoptosis.
  In T-cell lymphomas (MF/CTCL), additional mechanisms include T-regulatory cell depletion
  and restoration of anti-tumor immune surveillance.

  In MF/CTCL specifically:
  - FDA-approved for CTCL since November 2009 (accelerated approval; Whittaker 2010 basis)
  - ORR 34% in advanced/refractory MF/SS; mDOR 15 months
  - Active across MF stages (IIB-IV) including Sézary syndrome blood involvement
  - Does NOT require CD30+ status (unlike BV) or specific molecular driver
  - QTc prolongation is the defining safety concern requiring cardiac monitoring

  HDACi class comparison in CTCL:
  - Romidepsin (IV, q28d): ORR 34%; mDOR 15 months; QTc monitoring intensive
  - Vorinostat (oral, daily): ORR 29.7%; mTTP 4.9 months; GI toxicity prominent
  - Romidepsin favored when IV access available and deeper response desired; vorinostat
    when oral preferred

  Ukraine: neither romidepsin nor vorinostat is registered; bexarotene is the most
  accessible systemic option in the same tier. Document access constraint explicitly.

rationale_ua: >
  Ромідепсин (HDACi IV): ORR ~34%, мДВ 15 міс (Whittaker 2010 JCO; n=96 MF/CTCL; NCCN кат.2A).
  FDA-затвердж. для CTCL 2009. Показання: прогресуюча МФ/СС після ≥1 системної лінії,
  стадія IIB-IV, ECOG 0-2, QTcF ≤480 мс. ЕКГ перед кожним введенням ОБОВ'ЯЗКОВО.
  K+/Mg²+ до верхньої норми перед кожною інфузією (QTc). PJP профілактика.
  В Україні: ромідепсин НЕ зареєстрований — named-patient тільки; значний бар'єр доступу.
  Беліноcтат/вориностат аналогічно недоступні. Для більшості UA пацієнтів:
  бексаротен (ORR ~45%, пероральний) є більш доступною альтернативою.

