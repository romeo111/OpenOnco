do_not_do:
  - "Не призначати при QTcF >480 мс — клас-ефект HDAC; перейти на беxаротен"
  - "Не призначати при попередній невдачі воріностату або ромідепсину — крос-резистентність"
  - "Не ігнорувати ризик ТГВ/ТЕЛА (~5%) — Caprini-оцінка та спостереження за набряком кін"
  - "Не застосовувати варфарин без моніторингу МНВ — воріностат підвищує антикоагулянтну дію"
  - "Не призначати при тяжкій тромбоцитопенії (<50×10⁹/л) — дозолімітуюча токсичність"

