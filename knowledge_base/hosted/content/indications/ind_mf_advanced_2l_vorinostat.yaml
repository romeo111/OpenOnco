id: IND-MF-ADVANCED-2L-VORINOSTAT
plan_track: standard

applicable_to:
  disease_id: DIS-MF-SEZARY
  line_of_therapy: 2
  stage_requirements:
    - "Progressive, persistent or recurrent advanced MF (stage IIB-IVB) or Sézary syndrome after ≥2 prior systemic therapies"
    - "ECOG PS 0-2"
    - "QTcF ≤480 ms at baseline ECG"
    - "Adequate hematologic function: PLT ≥75×10⁹/L, ANC ≥1.0×10⁹/L"
    - "Adequate hepatic function: bilirubin ≤1.5× ULN, AST/ALT ≤3× ULN"
    - "Romidepsin inaccessible or romidepsin-ineligible (IV logistic barrier, cardiotoxicity concern, prior romidepsin failure)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded:
    - "Prior pan-HDACi failure (romidepsin, vorinostat, panobinostat): class cross-resistance likely — route to non-HDACi (bexarotene, MTX, pralatrexate)"
    - "QTcF >480 ms: HDAC-class QTc contraindication; route to bexarotene"
    - "Active DVT/PE without stable anticoagulation: vorinostat ~5% DVT/PE risk; manage underlying thromboembolic event first"
  demographic_constraints:
    ecog_max: 2
    notes: >
      Oral vorinostat is tolerable across broad performance status but ECOG 3+
      patients may have inadequate oral intake and poor tolerance of GI toxicity
      (diarrhea, nausea). ECOG 2: proceed with MDT discussion + loperamide
      available. ECOG ≥4: CHARTER goals-of-care gate applies.

recommended_regimen: REG-VORINOSTAT-MF
alternative_regimens:
  - regimen_id: IND-MF-ADVANCED-2L-ROMIDEPSIN
    description: >
      Romidepsin 14 mg/m² IV days 1, 8, 15 q28d — IV HDACi, more potent (ORR ~34%
      vs vorinostat ~30%); use when IV infusion access available and QTcF adequate.
      Preferred over vorinostat when romidepsin accessible due to higher ORR and
      longer DoR (mDOR 15 months vs 5.6 months for vorinostat).
  - regimen_id: IND-MF-ADVANCED-2L-BEXAROTENE
    description: >
      Bexarotene 300 mg/m² PO daily — retinoid; use when all HDACi (vorinostat
      + romidepsin) contraindicated (QTcF >480 ms, cardiac arrhythmia) or failed.
      Requires mandatory fenofibrate + levothyroxine. ORR ~45% erythrodermic MF.

concurrent_therapy:
  - "ECG with QTcF baseline MANDATORY before starting (HDAC inhibitor QTc risk)"
  - "CBC every 2 weeks × first 2 months, then monthly (thrombocytopenia monitoring)"
  - "LFT monthly × 3, then q3 months"
  - "DVT risk assessment (Caprini score) at baseline; LMWH prophylaxis for high-risk patients (~5% DVT/PE incidence)"
  - "Warfarin INR monitoring q1-2 weeks if co-administered (vorinostat inhibits coumarin anticoagulants; prefer LMWH)"
  - "Loperamide 2 mg PO available for at-home diarrhea management (start at first loose stool)"

followed_by:
  - "mSWAT (modified Severity Weighted Assessment Tool) skin assessment q4 weeks: primary response metric for MF"
  - "Continue until confirmed disease progression or unacceptable toxicity"
  - "At progression: re-biopsy if transformation suspected (large-cell transformation); pralatrexate (IND-MF-ADVANCED-3L) or clinical trial; alloSCT referral for young fit patients"
  - "HDACi class cross-resistance after vorinostat: avoid romidepsin; switch class (bexarotene, pralatrexate)"

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~29.7% (Olsen 2007 JCO; n=74; 400 mg PO daily)"
  complete_response: "~2-5% (mainly PRs in MF; skin disease tends to partial response)"
  median_time_to_progression_months: "~4.9 months"
  median_dor_months: "~5.6 months (168 days)"
  notes: >
    PRIMARY EVIDENCE:
    Olsen et al. 2007 JCO (phase 2B randomized dose; n=74 r/r CTCL ≥2 prior systemic Rx):
    - Vorinostat 400 mg daily arm: ORR 29.7%; mTTP 4.9 months; mDOR 168 days
    - Pruritus reduction ≥3 points (VAS): 28% patients
    - Grade 3-4 toxicities: thrombocytopenia 5%, fatigue 5%, PE 5%
    - FDA accelerated approval October 2006

    Duvic et al. 2007 JCO (phase 2A; n=33 r/r MF/SS):
    - ORR 24.2%; mTTP 185 days; disease control rate 57%

    COMPARISON TO ROMIDEPSIN:
    Romidepsin (Whittaker 2010 JCO; n=96; IV): ORR 34%; mDOR 15 months.
    Vorinostat ORR 30%; mDOR 5.6 months.
    Romidepsin has higher ORR and substantially longer mDOR — preferred when
    IV access available. Vorinostat's key advantage: oral administration (eliminates
    weekly IV clinic visits). Both NCCN Cat 2A; choice primarily driven by access
    and administration preference.

    MECHANISM:
    Pan-HDAC inhibition (Class I + II) → histone hyperacetylation →
    chromatin relaxation → re-expression of silenced tumour-suppressor/apoptotic
    genes (p21, p16, BIM, CASP8) → G1/S arrest + apoptosis in malignant T-cells.
    Cutaneous T-cell lymphoma (MF/Sézary) reliant on epigenetic silencing of
    apoptosis — restored by HDAC inhibition.

    UKRAINE ACCESS:
    Zolinza (vorinostat) NOT registered in Ukraine. Named-patient import or
    compassionate-use (MSD/Merck) required. Practical access ≈zero.
    Bexarotene (IND-MF-ADVANCED-2L-BEXAROTENE) is the most accessible systemic
    option for MF in Ukraine when HDACi cannot be obtained.

hard_contraindications:
  - "QTcF >480 ms at baseline: HDAC class contraindication; route to bexarotene"
  - "Prior vorinostat or any pan-HDACi failure: class cross-resistance likely; switch class"
  - "Severe thrombocytopenia (PLT <50×10⁹/L) that cannot be corrected: dose-limiting toxicity"
  - "Severe hepatic impairment (Child-Pugh C or bilirubin >3× ULN): insufficient data"

red_flags_triggering_alternative:
  - condition: "QTcF >480 ms or cardiac arrhythmia → IND-MF-ADVANCED-2L-BEXAROTENE (non-HDAC; ORR ~45%)"
  - condition: "Prior vorinostat failure or romidepsin failure → class cross-resistance; IND-MF-ADVANCED-2L-BEXAROTENE or pralatrexate"
  - condition: "Romidepsin becomes accessible (IV infusion restored): romidepsin preferred (higher ORR 34% vs vorinostat 30%; longer mDOR 15 vs 5.6 months)"
  - condition: "Histologic transformation (large-cell): pralatrexate or anthracycline; vorinostat insufficient"

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - "ECG with QTcF (Fridericia formula): baseline gate"
  - "Skin biopsy at relapse: confirm MF (not transformation); CD30 status if considering BV"
  - "mSWAT baseline: required for response assessment"

desired_tests:
  - "Caprini DVT risk score at baseline (~5% DVT/PE with vorinostat)"
  - "Fasting glucose (hyperglycemia risk, especially diabetics)"
  - "T-cell receptor (TCR) clonality testing at relapse: confirms clonal MF vs reactive"

rationale: >
  Vorinostat (SAHA; Zolinza) 400 mg PO daily for r/r advanced MF/Sézary syndrome
  after ≥2 prior systemic therapies. FDA approved October 2006 (Olsen 2007 JCO;
  ORR ~30%; NCCN Category 2A).

  ORAL HDAC INHIBITOR ADVANTAGE:
  Vorinostat is the only oral HDAC inhibitor FDA-approved for CTCL. Romidepsin
  (Class I-selective HDAC inhibitor) achieves higher ORR (~34% vs ~30%) and longer
  DoR (mDOR 15 vs 5.6 months) but requires IV infusion on days 1, 8, 15 q28d.
  Vorinostat is appropriate when:
  1. Romidepsin is inaccessible (not registered/available — both have access barriers).
  2. Patient has logistic barriers to weekly IV infusions (distance, mobility).
  3. Patient prefers oral-only treatment.
  Both are NCCN Cat 2A; romidepsin is preferred when IV access is available.

  POSITION IN ALGORITHM:
  After romidepsin gate (step 5): if romidepsin inaccessible → step 51 checks
  vorinostat access → oral HDACi preferred over bexarotene (non-HDAC) when QTcF
  adequate and vorinostat obtainable.

  UKRAINE ACCESS:
  Neither vorinostat nor romidepsin is registered in Ukraine. Both require named-patient
  import. Bexarotene is the more accessible non-HDAC 2L option for Ukrainian MF patients.
  When neither HDACi is obtainable: IND-MF-ADVANCED-2L-BEXAROTENE.

rationale_ua: >
  Воріностат 400 мг PO щоденно для рецидивного/рефрактерного МФ/СС після ≥2 попередніх
  системних ліній. FDA жовтень 2006; Olsen 2007 JCO: ЗВ ~30%; NCCN Cat 2A.
  ПЕРЕВАГА: оральний прийом — уникнення щотижневих IV-інфузій (ромідепсин).
  Призначається коли ромідепсин недоступний (обидва препарати незареєстровані в UA).
  QTcF ≤480 мс — обов'язкова умова (HDAC-клас подовжує QTc).
  Ризик ТГВ/ТЕЛА ~5% — базовий Caprini + лоперамід + НМГ профілактика при
  високому ризику. В Україні: не зареєстрований; при недоступності → беxаротен
  (IND-MF-ADVANCED-2L-BEXAROTENE; НСЗУ — уточнити).

