id: IND-MF-TRANSFORMED-PRALATREXATE
plan_track: aggressive

applicable_to:
  disease_id: DIS-MF-SEZARY
  line_of_therapy: 2
  stage_requirements:
    - "Biopsy-confirmed large-cell transformation (LCT) in mycosis fungoides (≥25% large cells on skin or nodal biopsy)"
    - "Relapsed or refractory after ≥1 prior systemic therapy (TSEBT, skin-directed, or systemic agent)"
    - "ECOG PS 0-2"
    - "CrCl ≥30 mL/min (pralatrexate primarily renally cleared)"
    - "No prior Grade ≥3 mucositis from antifolates"
    - "Folate 1 mg PO daily started ≥10 days before first dose (mandatory); B12 1 mg IM q8-10 weeks"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    notes: >
      MF with large-cell transformation (LCT) behaves more like aggressive T-cell
      lymphoma than indolent MF. Standard CTCL skin-directed therapies are
      generally ineffective in LCT. Pralatrexate (antifolate; PROPEL NCCN Cat 2A)
      is endorsed for r/r CTCL including transformed MF. For true DLBCL-like
      transformation (confirmed by biopsy): CHOP/EPOCH-based regimens should also
      be considered and may be superior to pralatrexate — MDT/hematology referral.
      CD30+ transformation: brentuximab vedotin may be preferred (ALCANZA).

recommended_regimen: REG-PRALATREXATE-PTCL
concurrent_therapy:
  - "MANDATORY: folic acid 1 mg PO daily starting 10 days before first dose, throughout + 30 days post"
  - "MANDATORY: vitamin B12 1 mg IM every 8-10 weeks throughout therapy"
  - "Oral cryotherapy (ice chips) during each IV push — mucositis mitigation"
  - "5-HT3 antagonist + dexamethasone premedication before each infusion"
  - "PJP prophylaxis (TMP-SMX 160/800 mg 3×/week) — profound lymphopenia in transformed MF"
  - "Antiviral prophylaxis (acyclovir 400 mg BID) throughout treatment"

followed_by:
  - "CT chest/abdomen/pelvis + skin photography after 2 cycles (weeks 14-15): assess response"
  - "CR/PR confirmed: alloSCT evaluation for fit patients (≤65y; adequate organ function) — curative intent"
  - "CD30 IHC on relapse biopsy: if CD30+ → brentuximab vedotin (IND-MF-ADVANCED-1L-BV) may be preferred"
  - "Partial response at 4 cycles: continue to 6 cycles if tolerating; MDT reassessment at 6 cycles"
  - "Progression: MDT — CHOP-based therapy, gemcitabine, alloSCT eligibility re-evaluation, or BSC"

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~29% overall r/r PTCL/CTCL (PROPEL; O'Connor 2011 JCO); transformed MF subgroup limited"
  complete_response: "~11% overall (PROPEL PTCL/CTCL cohort)"
  progression_free_survival: "Median PFS ~3.5 months; mDOR 10.1 months in responders (PROPEL overall)"
  overall_survival_5y: "Poor; LCT-MF median OS approximately 1-2 years from transformation (historical series)"
  notes: >
    PRIMARY EVIDENCE: PROPEL (O'Connor 2011 JCO; NCT00114296; N=111):
    - Phase 2 single-arm; r/r PTCL including CTCL/transformed MF
    - Overall ORR 29%; CR 11%; mDOR 10.1 months; mPFS 3.5 months
    - Transformed MF subgroup: limited dedicated subgroup data; PROPEL
      enrolled predominantly PTCL-NOS but included CTCL patients; NCCN
      endorses pralatrexate Cat 2A for r/r CTCL including transformed MF
    - FDA accelerated approval September 2009 based on ORR in r/r PTCL

    TRANSFORMATION CONTEXT: Large-cell transformation (LCT) of MF confers
    a median OS of ~1-2 years from transformation. Standard skin-directed
    therapies are ineffective. Pralatrexate's antifolate mechanism (RFC-1
    selectivity) is distinct from HDACi (romidepsin/vorinostat) — allows
    salvage in HDACi-refractory transformed MF. CD30 expression at
    transformation ~30-50%: BV-ALCANZA data suggest BV may be preferred
    for CD30+ transformed MF.

    UKRAINE: Pralatrexate not registered (no EMA approval 2012 withdrawal).
    Named-patient import from US only — limited. Romidepsin also not
    registered. Gemcitabine (NSZU-accessible) is a pragmatic UA alternative
    for transformed MF when pralatrexate inaccessible.

hard_contraindications:
  - "CrCl <20 mL/min — severe renal impairment"
  - "Active Grade ≥3 mucositis at baseline"
  - "Prior severe (Grade ≥3) mucositis on antifolate therapy"
  - "Failure to begin folate + B12 supplementation ≥10 days before treatment"

red_flags_triggering_alternative:
  - RF-ORGAN-RENAL-IMPAIRED

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-PERIPHERAL-SMEAR
  - TEST-BM-ASPIRATE
  - TEST-BM-TREPHINE
  - TEST-FLOW-CYTOMETRY
  - TEST-CECT-CAP
  - "Skin biopsy confirming large-cell transformation (≥25% large cells; CD30 IHC)"
  - "Creatinine clearance (CrCl) by Cockcroft-Gault — pralatrexate renal threshold"
  - "Folate + vitamin B12 levels at baseline"

desired_tests:
  - "CD30 IHC at transformation biopsy (CD30+ → brentuximab vedotin may be preferred)"
  - "LDH at baseline (prognostic; often elevated at transformation)"
  - "EBER ISH (EBV) — EBV+ transformation is a poor-prognosis variant"
  - "Ki-67 proliferation index on transformation biopsy"

rationale: >
  Pralatrexate (Folotyn) is FDA-approved for r/r PTCL after ≥1 prior systemic
  therapy and is endorsed by NCCN Cat 2A for r/r CTCL including mycosis fungoides
  with large-cell transformation (LCT). LCT-MF behaves clinically like aggressive
  T-cell lymphoma (median OS ~1-2 years from transformation) and requires systemic
  salvage rather than skin-directed approaches.

  MECHANISM ADVANTAGE IN TRANSFORMED MF: LCT-MF cells show increased RFC-1 expression
  and FPGS activity (same pattern as aggressive T-cell lymphomas), giving pralatrexate
  its preferential activity over standard MTX. The antifolate mechanism is non-cross-
  resistant with HDACi (romidepsin, vorinostat) — applicable in HDACi-refractory disease.

  SEQUENCING IN TRANSFORMED MF: After transformation is confirmed on biopsy:
  (1) CD30+ (≥10%) → brentuximab vedotin preferred (ALCANZA; IND-MF-ADVANCED-1L-BV)
  (2) CD30-negative or BV-inaccessible → pralatrexate (NCCN Cat 2A)
  (3) CHOP-based / EPOCH-based — for DLBCL-type transformation (refer to aggressive
      lymphoma pathway if histology confirms DLBCL-pattern)

  UKRAINE CONTEXT: Neither pralatrexate (no EMA) nor romidepsin are registered in Ukraine.
  For LCT-MF in Ukraine: (1) BV if CD30+ (off-label; MDT request); (2) CHOP/miniCHOP
  (if DLBCL-transformation pattern; NSZU-accessible); (3) Gemcitabine-based salvage
  (NSZU-accessible); (4) Pralatrexate via named-patient import for fit patients with
  clinical infrastructure for US import.

rationale_ua: >
  Пралатрексат (Folotyn) FDA-схвалений для р/р PTCL та endorsed NCCN Cat 2A для
  р/р CTCL включаючи МФ з великоклітинною трансформацією (ВКТ).
  ВКТ-МФ поводиться як агресивна Т-клітинна лімфома (медіана ЗВ ~1-2 роки від
  трансформації). PROPEL (O'Connor 2011 JCO): ORR 29%; CR 11%; mDOR 10,1 міс.

  Механізм (RFC-1/FPGS-селективний антифолат) відрізняється від HDAC-інгібіторів
  → немає перехресної резистентності.

  Алгоритм при ВКТ: (1) CD30+ → BV (ALCANZA); (2) CD30-neg або BV недоступний →
  пралатрексат + CHOP-based (реферал при DLBCL-типі трансформації).

  В Україні: не зареєстрований; гемцитабін (НСЗУ) або CHOP — доступні альтернативи.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

do_not_do:
  - "НЕ починати без фолієвої кислоти 1 мг PO щодня + B12 1 мг IM — обов'язково"
  - "НЕ застосовувати без біоптійно підтвердженої ВКТ (≥25% великих клітин) — відрізняти від прогресії без трансформації"
  - "НЕ пропускати CD30 IHC — CD30+ → BV може бути кращим варіантом"
  - "НЕ ігнорувати CHOP/EPOCH при DLBCL-подібній трансформації — направити на консультацію"
  - "НЕ продовжувати при Grade ≥2 мукозиті без зниження дози до 20 мг/м²"
  - "НЕ вводити при тромбоцитах <50 000 або ANC <1000 без підтримки G-CSF"

sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN CTCL/MF 2025 Category 2A: pralatrexate 30 mg/m² IV weekly ×6 of
      7-week cycle for r/r CTCL including transformed mycosis fungoides after
      ≥1 prior systemic therapy (PROPEL; O'Connor 2011 JCO; ORR 29%; FDA
      accelerated approval September 2009). Mandatory folate + B12.
  - source_id: SRC-ESMO-CTCL-2024
    position: supports
    relevant_quote_paraphrase: >
      ESMO CTCL Guidelines 2024: pralatrexate endorsed for r/r CTCL including
      transformed MF where skin-directed therapies are no longer appropriate.
      Antifolate mechanism with non-HDACi cross-resistance pattern.

known_controversies:
  - topic: "Pralatrexate vs CHOP vs gemcitabine for transformed MF"
    positions:
      - position: "CHOP/EPOCH — preferred for DLBCL-type transformation by some centers; more accessible (NSZU/generic); higher CR potential if true clonal DLBCL; not specifically NCCN Cat 1 for transformed MF but widely used"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Pralatrexate — NCCN Cat 2A for transformed CTCL; antifolate RFC-1 selectivity for T-lymphoma cells; active in HDACi-refractory disease; not EMA-registered"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "BV — preferred when CD30+ (≥10%) at transformation (ALCANZA; ORR ~56% CD30+ CTCL); avoids cytotoxic toxicity; NCCN Cat 2A"
        sources: [SRC-NCCN-BCELL-2025]
    our_default: "CD30+ transformation → BV preferred. CD30-negative: pralatrexate (NCCN Cat 2A) if accessible; CHOP-based or gemcitabine if pralatrexate inaccessible (Ukraine). MDT required for DLBCL-type transformation — may benefit from aggressive NHL-type regimen."

