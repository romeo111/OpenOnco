id: IND-MM-1L-VRD
plan_track: standard

applicable_to:
  disease_id: DIS-MM
  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-VRD
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate:
    value: "~95-98% (≥PR after 4 cycles)"
    source: SRC-NCCN-MM-2025
    notes: "VRd 1L MM ORR ~95-98%; SWOG S0777 (Durie 2017 Lancet): VRd vs Rd; SWOG S0777 source not yet in KB — citing NCCN Cat 1"
  complete_response:
    value: "~30-40% post-induction; ~50-60% post-ASCT consolidation"
    source: SRC-NCCN-MM-2025
    notes: "VRd 1L CR ~30-40% post-induction, deepening to ~50-60% post-ASCT + maintenance; MRD-negative CR rates continue improving with lenalidomide maintenance"
  progression_free_survival:
    value: "Median ~50-60 months (transplant-eligible with ASCT + maintenance); ~43 months transplant-ineligible (SWOG S0777)"
    source: SRC-NCCN-MM-2025
    notes: "SWOG S0777: mPFS 43 mo (VRd) vs 30 mo (Rd) transplant-ineligible; transplant-eligible ASCT + len maintenance: mPFS ~50-60 mo (IFM2009, PETHEMA/GEM trials)"
  overall_survival_5y:
    value: "~70-75% transplant-eligible"
    source: SRC-NCCN-MM-2025
    notes: "VRd 1L MM 5-yr OS ~70-75% transplant-eligible; SWOG S0777 5-yr OS ~48% (VRd) vs ~40% (Rd) transplant-ineligible; OS benefit well-established vs Rd doublet"

hard_contraindications:
  - CI-LENALIDOMIDE-PREGNANCY
  - CI-BORTEZOMIB-SEVERE-NEUROPATHY
red_flags_triggering_alternative:
  - RF-MM-HIGH-RISK-CYTOGENETICS

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-B2-MICROGLOBULIN
  - TEST-IMMUNOGLOBULINS
  - TEST-SPEP-UPEP
  - TEST-FREE-LIGHT-CHAINS
  - TEST-FISH-PANEL
  - TEST-BM-ASPIRATE
  - TEST-BM-TREPHINE
  - TEST-WHOLE-BODY-MRI
  - TEST-HBV-SEROLOGY
desired_tests:
  - TEST-ECHO

rationale: >
  Standard-plan default for newly-diagnosed multiple myeloma with
  standard-risk cytogenetics. Triplet induction with bortezomib +
  lenalidomide + dexamethasone (VRd) is the long-established backbone
  for transplant-eligible patients (4 cycles before harvest) and remains
  acceptable for transplant-ineligible patients per SWOG S0777. Choice of
  triplet over quadruplet (D-VRd) for standard-risk reflects the smaller
  absolute MRD-negativity benefit of the quadruplet in the absence of
  high-risk cytogenetics, plus daratumumab access constraints in Ukraine.

rationale_ua: >
  стандарт-plan default for newly-diagnosed множинна мієлома with стандартного ризику cytogenetics. триплет індукція with бортезоміб + леналідомід + dexamethasone (VRd) is the long-усталений основа схеми for придатний до трансплантації patients (4 цикли before harvest) and remains прийнятний for непридатний до трансплантації patients per SWOG S0777. Choice of триплет over quadruplet (D-VRd) for стандартного ризику reflects the smaller absolute МЗХ-negativity виграш of the quadruplet in the absence of високого ризику cytogenetics, plus даратумумаб access constraints in Ukraine.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-MM-2025
    position: supports
    relevant_quote_paraphrase: "VRd is a Category 1 preferred regimen for newly-diagnosed MM, transplant-eligible and transplant-ineligible"

do_not_do:
  - "Не пропускати VTE профілактику (aspirin 81-100 mg або LMWH) — baseline ризик тромбозу на леналідоміді 10-20%, з профілактикою падає до 2-5%."
  - "Не пропускати HSV/VZV профілактику (acyclovir 400 mg BID) під час інгібітору протеасоми — ~10-15% реактивації herpes zoster без профілактики."
  - "Не використовувати IV bortezomib якщо доступний SC — частота важкої нейропатії приблизно вдвічі вища при IV введенні."
  - "Не починати схема у жінок репродуктивного віку без підтверджених двох методів контрацепції + негативного тесту на вагітність (леналідомід — потужний тератоген)."
  - "Не призначати zoledronate без попередньої стоматологічної оцінки — ризик osteonecrosis of the jaw."
  - "Не пропускати редукцію дози леналідоміду при CrCl 30-60 mL/min (10 mg) — повна доза токсична при renal impairment."

do_not_do_en:
  - "Do not skip VTE prophylaxis (aspirin 81-100 mg or LMWH) — baseline thrombosis risk on lenalidomide is 10-20%, with prophylaxis falls to 2-5%."
  - "Do not skip HSV/VZV prophylaxis (acyclovir 400 mg BID) during proteasome inhibitor — ~10-15% herpes zoster reactivation without prophylaxis."
  - "Do not use IV bortezomib if SC is available — frequency of severe neuropathy is approximately twice as high with IV administration."
  - "Do not start regimen in women of reproductive age without confirmed two methods of contraception + negative pregnancy test (lenalidomide is a potent teratogen)."
  - "Do not prescribe zoledronate without prior dental evaluation — risk of osteonecrosis of the jaw."
  - "Do not skip lenalidomide dose reduction at CrCl 30-60 mL/min (10 mg) — full dose is toxic with renal impairment."
known_controversies:
  - topic: "Triplet (VRd) vs quadruplet (D-VRd) for standard-risk transplant-eligible NDMM"
    positions:
      - position: "VRd remains the preferred standard-risk triplet given access and toxicity considerations"
        sources:
          - SRC-NCCN-MM-2025
      - position: "All-comers D-VRd quadruplet improves MRD-negativity and PFS regardless of risk (PERSEUS, GRIFFIN)"
        sources:
          - SRC-NCCN-MM-2025
        evidence_note: "PERSEUS / GRIFFIN trials show MRD-negativity benefit; absolute OS benefit unclear at current follow-up"
    our_default: "VRd for standard-risk transplant-eligible patients in Ukraine, with explicit discussion of D-VRd benefit + access constraint"
    rationale: >
      Daratumumab is not currently reimbursed via НСЗУ; offering D-VRd as
      default would create an access-driven inequity. The patient should
      always be told the trade-off and offered D-VRd if a funding pathway
      exists (clinical trial, charitable scheme, out-of-pocket).

time_critical: false  # outpatient cancer planning, not time-critical (FDA non-device CDS criterion 4)
