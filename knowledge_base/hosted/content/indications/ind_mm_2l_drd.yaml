sources:
  - source_id: SRC-NCCN-MM-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN MM 2025 Category 1: daratumumab + lenalidomide + dexamethasone (DRd) for
      lenalidomide-naive relapsed/refractory MM (POLLUX Phase 3; mPFS HR 0.44; ORR 92.9%).
  - source_id: SRC-ESMO-MM-2023
    position: supports
    relevant_quote_paraphrase: >
      ESMO MM 2023: DRd recommended for lenalidomide-naive R/R MM; 5-year POLLUX data
      confirms durable PFS and OS benefit; anti-CD38 maintenance strategy evolving.

do_not_do:
  - "При леналідомід-рефрактерній ММ (прогресія на/після леналідоміду): DRd неефективний; переходити на IND-MM-2L-DKD (карфілзоміб)"
  - "Без профілактики ТВТ/ТЕЛА: леналідомід + дарат. → ризик ТЕЛА/ТВТ; аспірин або НМГ ОБОВ'ЯЗКОВИЙ"
  - "Без REMS реєстрації: леналідомід — FDA Cat X (тератоген); тест на вагітність + контрацепція до кожного циклу"
  - "Без HBV скринінгу: дарат. анти-CD38 → деплеція B-клітин → реактивація HBV; ентекавір якщо HBsAg+ або HBcAb+"
  - "КК <30 мл/хв: леналідомід не рекомендований; переходити на DKd (без леналідоміду)"

