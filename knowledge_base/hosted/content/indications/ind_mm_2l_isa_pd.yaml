id: IND-MM-2L-ISA-PD
plan_track: aggressive

applicable_to:
  disease_id: DIS-MM
  line_of_therapy: 2
  stage_requirements:
    - "Relapsed/refractory multiple myeloma after ≥2 prior systemic lines including lenalidomide AND a proteasome inhibitor"
    - "Lenalidomide-refractory (ICARIA-MM enrolled patients who had received ≥2 prior lines including lena + PI)"
    - "Pomalidomide-naive (Isa-Pd utilizes pomalidomide as the IMiD component)"
    - "CD38-naive OR ≥12 months from last daratumumab/isatuximab dose"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-ISA-PD-MM
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~60.4% ORR (ICARIA-MM Isa-Pd arm, N=154 vs 35.3% Pd arm)"
  complete_response: "~31.8% VGPR+; mOS 24.6 vs 17.7 months"
  progression_free_survival: "Median PFS 11.5 vs 6.5 months (HR 0.596; 95% CI 0.436-0.814; p=0.001)"
  overall_survival_5y: "Median OS 24.6 vs 17.7 months; 5-year OS data still maturing"

hard_contraindications:
