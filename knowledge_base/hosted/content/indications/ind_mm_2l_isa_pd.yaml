rationale: >
  Isatuximab + pomalidomide + dexamethasone (Isa-Pd) is FDA-approved
  (March 2, 2020) for R/R MM after ≥2 prior lines including lenalidomide
  and a proteasome inhibitor, on the basis of ICARIA-MM (NCT02990338;
  Richardson/Attal 2019 Lancet; N=307): primary endpoint mPFS 11.5 vs
  6.5 months (HR 0.596; p=0.001). ORR 60.4% vs 35.3%; VGPR+ 31.8%
  vs 8.5%; mOS 24.6 vs 17.7 months. NCCN Multiple Myeloma 2025:
  Category 1 preferred for R/R MM ≥2 prior lines including lena + PI.
  Mechanism: isatuximab (anti-CD38; Fc-independent direct apoptosis
  + CDC/ADCC) combined with pomalidomide (3rd-generation IMiD with
  activity in lenalidomide-refractory MM — higher cereblon affinity
  vs lenalidomide) and dexamethasone. Isa-Pd is specifically positioned
  for lena-refractory, pomalidomide-naive patients — pomalidomide retains
  IMiD activity after lenalidomide failure through deeper cereblon
  engagement and stronger NK-cell/T-cell immunomodulation. Dominant
  toxicity: neutropenia Grade 3-4 ~53% (G-CSF secondary prophylaxis
  recommended). VTE prophylaxis mandatory (IMiD class risk). REMS:
  Pomalyst REMS (pregnancy prevention; monthly negative pregnancy test
  mandatory in women of childbearing potential). HBV screen + prophylaxis
  mandatory (anti-CD38 class). Ukraine: neither isatuximab nor pomalidomide
  registered; full international referral or named-patient import required.

rationale_ua: >
  Іза-Пд FDA-схвалена (2 березня 2020) для R/R ММ після ≥2 попередніх
  ліній включно з леналідомідом та інгібітором протеасоми, на підставі
  ICARIA-MM (NCT02990338; Lancet 2019; N=307): mPFS 11.5 vs 6.5 міс
  (HR 0.596; p=0.001). ORR 60.4% vs 35.3%; VGPR+ 31.8% vs 8.5%;
  mOS 24.6 vs 17.7 міс. NCCN ММ 2025: Кат 1 preferred для R/R ММ
  ≥2 ліній включно лена + ПI. Механізм: ісатуксімаб + помалідомід
  (3rd-gen IMiD, активний при леналідомід-рефрактерній ММ) + дексаметазон.
  Домінуюча токсичність: нейтропенія Grade 3-4 ~53% (G-КСФ вторинна
  профілактика). Тромбопрофілактика обов'язкова. REMS для помалідоміду.
  Українські бар'єри: ісатуксімаб і помалідомід не зареєстровані;
  міжнародне направлення обов'язкове.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-ICARIA-ATTAL-2019
    position: supports
    relevant_quote_paraphrase: "Isa-Pd mPFS 11.5 vs 6.5 months (HR 0.596) in R/R MM ≥2 prior lines including lena + PI; FDA March 2020; NCCN Cat 1"
  - source_id: SRC-NCCN-MM-2025
    position: supports
    relevant_quote_paraphrase: "Isa-Pd is Category 1 preferred for R/R MM ≥2 prior lines including lenalidomide and PI per ICARIA-MM"

do_not_do:
  - "НЕ призначати без реєстрації пацієнта в Pomalyst REMS (США) або Imnovid REMS (ЄС) — помалідомід REMS обов'язковий; категорично заборонений при вагітності."
  - "НЕ призначати при вагітності або без підтвердженого від'ємного тесту на вагітність — помалідомід Category X (тератоген)."
  - "НЕ призначати без HBV скринінгу та ентекавір/тенофовір профілактики — ісатуксімаб анти-CD38 = реактивація ризик."
  - "НЕ призначати без тромбопрофілактики (аспірин 81-325 мг або LMWH) — IMiD клас тромбоемболічного ризику."
  - "НЕ призначати при помалідомід-експозиції або рефрактерності — активність IMiD відсутня при попередній рефрактерності."
  - "НЕ призначати без G-КСФ secondary prophylaxis plan — Grade 3-4 нейтропенія ~53%."
  - "НЕ підтверджувати план без funding pathway — обидва компоненти не зареєстровані в Україні."

known_controversies:
  - topic: "Isa-Pd vs DPd (daratumumab + pomalidomide + dexamethasone) for lena-refractory MM"
    positions:
      - position: "Isa-Pd (ICARIA-MM): mPFS 11.5 vs 6.5 mo Pd (HR 0.596; Cat 1); FDA 2020"
        sources: [SRC-ICARIA-ATTAL-2019, SRC-NCCN-MM-2025]
      - position: "DPd (APOLLO; Dimopoulos 2021 JCO; daratumumab SC + Pd): mPFS 12.4 vs 6.9 mo (HR 0.63; Cat 1)"
        sources: [SRC-NCCN-MM-2025]
        evidence_note: "Cross-trial comparison only; no head-to-head. DPd uses daratumumab SC (easier administration). Both Cat 1."
    our_default: "Either Isa-Pd or DPd per NCCN Cat 1; MDT decision by access and administration route (Isa-Pd = IV isatuximab; DPd = SC daratumumab more convenient)"
    rationale: "Both Cat 1 anti-CD38+pomalidomide+dex triplets for lena+PI-refractory MM; cross-trial comparable; daratumumab SC (DPd) may be preferred if SC route available"

time_critical: false
last_reviewed: "2026-05-05"
reviewers: []
reviewer_signoffs: 0
notes: >
  STUB — pending Clinical Co-Lead sign-off. Aggressive-track 2L+ for R/R
  MM after ≥2 prior lines including lenalidomide + PI. Isa-Pd (ICARIA-MM;
  FDA March 2020; NCCN Cat 1) is a Cat 1 alternative to DKd for lena+PI-
  refractory, pomalidomide-naive patients. No indication files for
  isatuximab combinations existed in KB before Workstream FE.
  WIRED 2026-05-05 (Workstream FE): added to ALGO-MM-2L output_indications
  and wired as Cat 1 alternative to DKd at step 4.
