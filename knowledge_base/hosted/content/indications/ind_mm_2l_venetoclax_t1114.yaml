do_not_do:
  - "Не застосовувати венетоклакс без підтвердженого t(11;14) FISH — без молекулярного базису неефективний та ризикований"
  - "Не додавати борзаміб без необхідності — BELLINI показав сигнал смертності в нербранній популяції"
  - "Сильні інгібітори CYP3A4 (позаконазол, вориконазол, клариtromycin) → знизити венетоклакс до 100-200 мг/день або замінити схему"
  - "Не пропускати TLS-моніторинг (ОАК + електроліти) тижні 1-4 — ризик лізисного синдрому"
  - "Без противірусної профілактики (ацикловір): дексаметазон + венетоклакс → ризик реактивації VZV/HSV"

sources:
  - source_id: SRC-NCCN-MM-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN Multiple Myeloma 2025 Category 2A: venetoclax + dexamethasone (VenDex) as
      a recommended regimen for relapsed/refractory MM with confirmed t(11;14) translocation.
      Note: restricted to t(11;14)-positive disease based on BELLINI subgroup benefit;
      venetoclax NOT recommended in unselected R/R MM.
  - source_id: SRC-ESMO-MM-2023
    position: supports
    relevant_quote_paraphrase: >
      ESMO MM 2023: venetoclax-based therapy (VenDex or VenBd) is an option for
      t(11;14)-positive R/R MM. BELLINI t(11;14) subgroup provides biological rationale.
      t(11;14) FISH confirmation is mandatory before use.

