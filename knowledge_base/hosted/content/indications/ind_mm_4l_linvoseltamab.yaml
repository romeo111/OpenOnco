id: IND-MM-4L-LINVOSELTAMAB
plan_track: standard

applicable_to:
  disease_id: DIS-MM
  line_of_therapy: 4
  stage_requirements:
    - "Relapsed or refractory multiple myeloma"
    - "Triple-class exposed (prior proteasome inhibitor, immunomodulatory agent, and anti-CD38 antibody)"
    - "At least 4 prior lines of therapy"
  biomarker_requirements:
    - "BCMA expression: not required by FDA label (BCMA expressed on virtually all MM cells)"
    - "Prior anti-BCMA therapy: if prior teclistamab/elranatamab, cross-resistance possible; consider non-BCMA targets"

recommended_regimen: REG-LINVOSELTAMAB-MM

concurrent_therapy: []

followed_by:
  - "Continue until progression or unacceptable toxicity"
  - "After progression: non-BCMA bispecific (talquetamab GPRC5D or clinical trial)"

evidence_level: high
strength_of_recommendation: strong
nccn_category: 1

expected_outcomes:
  notes: "LINKER-MM1 Phase 1/2 trial (Garfall 2024). FDA approved April 2025 for R/R MM >= 4L triple-class exposed."

hard_contraindications:
  - "Active uncontrolled severe infection"
  - "Active autoimmune disease requiring systemic immunosuppression"
  - "ECOG PS 4 (engine hard gate)"

red_flags_triggering_alternative:
  - RF-MM-ACTIVE-INFECTION
  - RF-MM-ORGAN-DYSFUNCTION
  - RF-MM-PRIOR-BCMA-THERAPY

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-SERUM-PROTEIN-ELECTROPHORESIS
  - TEST-BETA2-MICROGLOBULIN
  - TEST-BM-BIOPSY
  - "HLA typing: not required (unlike CAR-T products)"
  - "Infectious disease: CMV, EBV, HBV, HCV serology baseline"
  - "IgG level: baseline and Q28D"

desired_tests:
  - "BCMA expression (optional; FDA label does not require testing)"
  - "Prior anti-BCMA therapy documentation"

rationale: >
  Linvoseltamab (Lynozyfic, BCMA x CD3 bispecific antibody) received FDA approval
  April 2025 for R/R MM after >= 4 prior lines including PI, IMiD, and anti-CD38
  antibody, based on LINKER-MM1. SC Q2W dosing after step-up is the key differentiator
  from teclistamab (weekly to biweekly) and elranatamab (biweekly). NCCN MM 2025
  Category 1 for triple-class refractory MM >= 4L alongside teclistamab, elranatamab,
  ciltacel, lisocel, talquetamab, elranatamab. SC formulation with lower CRS rate than
  IV BiTE class. Infections are the dominant long-term toxicity — prophylaxis and IVIG
  critical.

sources:
  - SRC-NCCN-MM-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  STUB - authored 2026-05-04 (Workstream EA). Linvoseltamab 4L+ MM indication.
  FDA approved April 2025. Two-reviewer clinical signoff required.
