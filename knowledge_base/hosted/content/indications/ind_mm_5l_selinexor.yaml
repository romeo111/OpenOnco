do_not_do:
  - "НЕ починати без обов'язкової антиеметичної підготовки перед кожною дозою (5-HT3 + NK1 + дексаметазон)"
  - "НЕ застосовувати при тромбоцитах <25 000 — ризик важкої кровотечі"
  - "НЕ застосовувати при активній симптоматичній гіпонатріємії (Na <125) — посилить"
  - "НЕ пропускати щотижневий CBC + Na — моніторинг токсичності обов'язковий"
  - "НЕ застосовувати при ECOG ≥3 без обговорення MDT — висока токсичність"
  - "НЕ продовжувати при Grade 4 тромбоцитопенії без відновлення — зменшіть дозу"
  - "НЕ призначати без перевірки доступності текліставабу або клінічних досліджень — Кат 1 варіанти мають пріоритет"

