known_controversies:
  - topic: "Selinexor vs teclistamab for triple-class / penta-refractory MM"
    positions:
      - position: "Teclistamab (BCMA bispecific) — NCCN Cat 1; ORR 63%; mDOR 18.4 mo; MajesTEC-1; strongly preferred over selinexor when accessible; step-up dosing protocol reduces CRS risk"
        sources: [SRC-NCCN-MM-2025]
      - position: "Selinexor (XPO1 inhibitor) — NCCN Cat 2A; ORR 26%; oral administration; no CRS/ICANS risk; applicable when bispecifics inaccessible or infusion center unavailable; EMA not approved"
        sources: [SRC-NCCN-MM-2025]
    our_default: "Teclistamab strongly preferred when accessible (NCCN Cat 1; superior ORR). Selinexor reserved for teclistamab-inaccessible or bispecific-ineligible patients (NCCN Cat 2A; Ukraine: both require named-patient access; clinical trial preferred)."

