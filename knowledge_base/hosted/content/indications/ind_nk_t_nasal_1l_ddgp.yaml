do_not_do:
  - "DDGP без базової аудіограми: цисплатин → ототоксичність; задокументувати до початку"
  - "DDGP при CrCl <45: нефротоксичність цисплатину; P-GEMOX або SMILE краща альтернатива"
  - "Пропустити аспарагіназний компонент через брак постачання: аспарагіназа є ключовим компонентом; якщо недоступна → P-GEMOX"
  - "Без AT-III моніторингу: аспарагіназа → тромбоз + кровотеча через виснаження антитромбіну"
  - "ЗАК не перевіряти перед днем 8: гемцитабін день 8 вводити лише при ANC ≥1.0"

