    position: supports
    relevant_quote_paraphrase: >
      NCCN B-cell 2025 Cat 2A: DDGP (dexamethasone + cisplatin + gemcitabine + pegaspargase)
      for NK/T-cell nasal lymphoma; alternative to SMILE for stage III/IV disease; Wang 2015
      Phase 3 data showing superior OS vs SMILE in advanced-stage NKTCL.
  - source_id: SRC-ESMO-PTCL-2024
    position: supports
    relevant_quote_paraphrase: >
      ESMO PTCL 2024: asparaginase-based regimens (SMILE, DDGP, GELOX, P-GEMOX) are the
      standard backbone for NK/T-cell lymphoma. DDGP cisplatin-based variant preferred for
      advanced stage per Wang 2015 Phase 3 RCT.

