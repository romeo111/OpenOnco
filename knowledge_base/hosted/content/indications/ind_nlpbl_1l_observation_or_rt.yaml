rationale: 'Early-stage NLPBL (formerly NLPHL) — ISRT alone is often curative; observation acceptable for some completely-resected stage IA. Avoid intensive chemoimmuno for early NLPBL — overcure with toxicity. Advanced NLPBL → R-CHOP-like (treats as B-cell, not Hodgkin).

  '
rationale_ua: >
  Ранньостадійна NLPBL (раніше NLPHL) — ISRT (опромінення залученої
  ділянки) часто є куративним методом; спостереження прийнятне для
  деяких повністю резектованих стадій IA. Слід уникати інтенсивної
  хіміоімунотерапії при ранній NLPBL — це призводить до надмірного
  лікування з токсичністю. Поширена NLPBL → схема, подібна до R-CHOP
  (лікується як B-клітинна, а не як хвороба Ходжкіна).
