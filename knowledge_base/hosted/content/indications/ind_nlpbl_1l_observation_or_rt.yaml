  ранньої стадії NLPBL (formerly NLPHL) — ISRT alone is часто curative; observation прийнятний for some completely-resected stage IA. Avoid intensive chemoimmuno for early NLPBL — overcure with токсичність. поширений NLPBL → R-CHOP-like (treats as B-cell, not Hodgkin).
