do_not_do:
  - "Без підтвердженої трансформації на re-biopsy — не призначати (індолентна NLPBL не потребує Пола-R-CHP)"
  - "Без baseline LVEF ≥50% — доксорубіцин + циклофосфамід = кардіотоксичність"
  - "Без G-CSF профілактики — пола+доксорубіцин підвищує ризик нейтропенії"
  - "Без HBV screen + entecavir при HBsAg+ або anti-HBc+ — ритуксимаб → реактивація"
  - "Вінкристин внутрішньотекально — ФАТАЛЬНО (не застосовується в Пола-R-CHP)"

sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN B-cell 2025: Pola-R-CHP Category 1 for untreated DLBCL IPI 2-5 (POLARIX;
      Tilly 2022 NEJM). Transformed indolent lymphoma treated per DLBCL protocols —
      Pola-R-CHP applicable as Category 2A for NLPBL transformation (extrapolated).
  - source_id: SRC-ESMO-DLBCL-2024
    position: supports
    relevant_quote_paraphrase: >
      ESMO DLBCL 2024: POLARIX (Tilly 2022 NEJM; N=879): Pola-R-CHP vs R-CHOP for
      untreated DLBCL IPI 2-5. ORR 88% vs 79%; mPFS 24.2 vs 17.3 months (HR 0.73; p=0.02).
      FDA approved June 2023 for untreated DLBCL/HGBL. ESMO endorses for IPI 2-5.

