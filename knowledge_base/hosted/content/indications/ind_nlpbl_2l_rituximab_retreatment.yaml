sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN B-cell 2025: rituximab monotherapy Cat 2A for relapsed NLPBL with indolent
      histology at re-biopsy. Re-biopsy mandatory before 2L treatment selection.
  - source_id: SRC-ESMO-LYMPHOMA-2025
    position: supports
    relevant_quote_paraphrase: >
      ESMO indolent B-NHL framework supports rituximab retreatment for rituximab-sensitive
      relapse with preserved indolent histology; chemoimmunotherapy reserved for transformation.

do_not_do:
  - "Ре-біопсія обов'ЯЗКОВА: лікувати NLPBL рецидив без гістології — ~30-40% трансформація; монотерапія ритуксимабом при THRLBCL/DLBCL неефективна та відстрочує лікування"
  - "HBV скринінг обов'язковий перед ритуксимабом — anti-CD20 може спровокувати фатальну реактивацію HBV"
  - "Не застосовувати при B-симптомах + ↑LDH без ре-біопсії — це ознаки трансформації"
  - "Не використовувати ABVD при NLPBL — WHO 5th ed. рекласифікував: B-cell, НЕ Hodgkin; ABVD неефективний"
  - "Не забувати трансформаційний нагляд під час та після ритуксимабу: будь-яке прискорення росту → термінова ре-біопсія"

