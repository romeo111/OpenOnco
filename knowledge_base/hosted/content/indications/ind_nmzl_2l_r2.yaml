do_not_do:
  - "Без REMS-реєстрації та тесту на вагітність — леналідомід кат X тератоген; REMS обов'язковий"
  - "Без ВТЕ-профілактики — аспірин мінімум; НМГ при високому ризику (ВТЕ в AUGMENT ~7%)"
  - "При трансформації в DLBCL — R2 неефективний; потрібна агресивна 2L терапія"
  - "При рецидиві ON ленадлідомід + ритуксимаб — повторний курс R² малоймовірно активний; перейти на BR або ібрутиніб"
  - "Без HBV скринінгу — ритуксимаб + імуносупресія → реактивація HBV; профілактика ентекавіром"
  - "Ленадлідомід без коригування дози при CrCl 30-60: 10 мг/добу (замість 20 мг) при помірному порушенні функції нирок"

