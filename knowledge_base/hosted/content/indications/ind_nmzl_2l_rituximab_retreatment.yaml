sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN B-cell 2025 Cat 2A: rituximab monotherapy for relapsed/refractory NMZL in
      frail or bendamustine-ineligible patients; also appropriate for late rituximab-non-
      refractory relapse.
  - source_id: SRC-BSH-MZL-2024
    position: supports
    relevant_quote_paraphrase: >
      BSH MZL 2024: rituximab retreatment standard for late-relapse indolent MZL;
      R-benda preferred for fit patients; R-mono for frail/elderly.

do_not_do:
  - "Ритуксимаб при ритуксимаб-рефрактерному NMZL (<6 міс від останньої дози): ORR <20%; переходити на IND-NMZL-2L-BR"
  - "HBV скринінг ОБОВ'ЯЗКОВИЙ перед ритуксимабом — реактивація HBV потенційно фатальна"
  - "Fit пацієнти (ECOG 0-1, КК ≥40): IND-NMZL-2L-BR ефективніший за R-монотерапію"
  - "Гістологічна трансформація в DLBCL → не ця індикація; агресивний лімфома протокол"

