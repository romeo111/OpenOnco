notes: >
  STUB — pending Clinical Co-Lead sign-off. Standard-track for
  HER2-mutant NSCLC 2L+. Drug physically available in UA (registered
  + reimbursed for breast); NSCLC indication funding is administrative
  gate, not import. HER2 amplification + overexpression in NSCLC are
  separate (rarer, less-validated) targets — different Indications.

rationale_ua: >
  Трастузумаб дерукстекан (trastuzumab deruxtecan, T-DXd) — HER2-таргетний
  кон'югат антитіло-препарат із дерукстекановим топоізомераза-I пейлоадом —
  при HER2-мутантному метастатичному НДКРЛ з прогресуванням на терапії
  першої лінії. Мутації HER2 виявляються у ~2-4% аденокарцином НДКРЛ —
  це окрема молекулярна сутність, відмінна від ампліфікації HER2 (рідша
  при НДКРЛ, тестується інакше). DESTINY-Lung01 (Li 2022): T-DXd 6.4 mg/kg
  забезпечує загальну частоту відповіді 55%, медіану виживаності без
  прогресування 8.2 міс, медіану загальної виживаності 17.8 міс.
  DESTINY-Lung02 (Goto 2023): рандомізоване порівняння 5.4 проти 6.4 mg/kg
  → доза 5.4 mg/kg дає загальну частоту відповіді 49%, медіану
  виживаності без прогресування 9.9 міс, медіану загальної виживаності
  19.5 міс при суттєво меншій частоті пневмоніту. 5.4 mg/kg — лейбл-доза.
  Схвалення FDA 2022 року. Чорна рамка попередження щодо пневмоніту:
  ~12% будь-якого ступеня (3% G≥3, ~1% летальність) — обов'язкові
  вихідне та серійне КТ грудної клітки; необхідний моніторинг фракції
  викиду лівого шлуночка. Препарат зареєстрований і відшкодовується
  НСЗУ при раку молочної залози (DESTINY-Breast03 / -04); показання
  НДКРЛ не входить до формуляра НСЗУ — фінансування off-label /
  благодійне / через ДЕЦ-дозвіл з посиланням на лейбл FDA для НДКРЛ.
