id: IND-NSCLC-2L-KRAS-G12C-GLECIRASIB
plan_track: aggressive

applicable_to:
  disease_id: DIS-NSCLC
  molecular_subtype: KRAS_G12C
  stage_stratum: STAGE_IV_METASTATIC
  line_of_therapy: 2
  stage_requirements:
    - "Stage IV or recurrent/metastatic NSCLC"
    - "KRAS G12C mutation confirmed (tissue or ctDNA NGS)"
    - "Prior systemic therapy (platinum-based chemotherapy and/or ICI)"

biomarker_requirements:
  - "KRAS G12C mutation: REQUIRED (tissue NGS or liquid biopsy ctDNA)"
  - "STK11/KEAP1 co-mutations: associated with lower ORR; relevant for counseling"

recommended_regimen: REG-GLECIRASIB-NSCLC

concurrent_therapy: []

followed_by:
  - IND-NSCLC-2L-DOCETAXEL-RAMUCIRUMAB

evidence_level: high
strength_of_recommendation: strong
nccn_category: 2A

expected_outcomes:
  notes: "KRYSTAL-6 trial; FDA accelerated approval October 2024. Third KRAS G12C inhibitor approved in NSCLC."

hard_contraindications:
  - "KRAS G12C wild-type (mutation is required for benefit; any KRAS inhibitor is ineffective)"
  - "Active QTc >500ms (QTc prolongation risk with glecirasib)"
  - "ECOG PS 4 (engine hard gate)"

red_flags_triggering_alternative:
  - RF-NSCLC-FRAILTY-AGE

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-CECT-CAP
  - TEST-NSCLC-NGS-PANEL
  - TEST-BRAIN-MRI-CONTRAST
  - "ECG (QTc baseline)"

desired_tests:
  - "STK11/KEAP1 mutation status (co-mutation reduces ORR)"
  - "ctDNA at progression (KRAS resistance mechanisms)"

known_controversies:
  - topic: "Glecirasib vs adagrasib vs sotorasib for 2L KRAS G12C NSCLC"
    positions:
      - position: "All 3 KRAS G12Ci are NCCN-listed; no head-to-head data as of 2025"
      - position: "Adagrasib: intracranial activity (KRYSTAL-1 brain mets cohort); glecirasib lower QTc"
      - position: "Sotorasib: weekly IV option available in addition to oral; longer track record"
      - position: "Selection based on QTc, CNS disease, drug interactions, formulary"

rationale: >
  Glecirasib (FDA approved October 2024, accelerated) is the third KRAS G12C covalent
  inhibitor for KRAS G12C NSCLC after prior systemic therapy. KRYSTAL-6 trial data
  demonstrated meaningful ORR in pretreated KRAS G12C NSCLC. NCCN NSCLC 2025 Cat 2A
  alongside adagrasib (KRYSTAL-1) and sotorasib (CodeBreak-100). Differentiation:
  lower QTc prolongation signal vs adagrasib; selection between agents based on
  CNS disease burden, QTc, drug interactions, and formulary access.
  STK11/KEAP1 co-mutations associated with reduced efficacy across KRAS G12C inhibitor
  class; relevant for patient counseling.

sources:
  - SRC-NCCN-NSCLC-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  STUB - authored 2026-05-04 (Workstream EA). Glecirasib 2L KRAS G12C NSCLC.
  FDA approved October 2024. Two-reviewer clinical signoff required.
