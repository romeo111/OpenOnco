rationale: 'Patients with driver-positive NSCLC (EGFR, ALK, ROS1, RET, MET, BRAF, NTRK, HER2) who progress through 1L targeted therapy + 2L chemoimmunotherapy or IO have limited 3L+ options. Docetaxel ± ramucirumab (REVEL trial, Garon 2014 Lancet) or docetaxel ± nintedanib (LUME-Lung 1, Reck 2014 Lancet Oncol) are the most-validated 3L+ regimens. mPFS gain ~1.5 mo and mOS gain ~1.5 mo — modest but consistent. Re-biopsy at 3L+ to identify acquired resistance mechanisms (T790M after 1st-gen EGFR TKI, MET amplification, SCLC transformation, lineage plasticity) is strongly recommended; biomarker-driven 3L options (amivantamab for EGFR ex20ins, capmatinib/tepotinib for MET, larotrectinib for NTRK) often outperform empirical chemo. Best supportive care + clinical trial is a valid alternative when ECOG declines.'
rationale_ua: >-
  Пацієнти з driver-позитивним НДКРЛ (EGFR, ALK, ROS1, RET, MET, BRAF,
  NTRK, HER2), які прогресують через таргетну терапію 1L та
  хіміоімунотерапію або IO 2L, мають обмежені опції 3L+. Найбільш
  валідовані схеми 3L+ — доцетаксел (docetaxel) ± рамуцирумаб
  (ramucirumab) (REVEL, Garon 2014 Lancet) або доцетаксел ± нінтеданіб
  (nintedanib) (LUME-Lung 1, Reck 2014 Lancet Oncol). Приріст медіани
  виживаності без прогресування ~1.5 міс і приріст медіани загальної
  виживаності ~1.5 міс — помірні, але стабільні. На етапі 3L+
  наполегливо рекомендована повторна біопсія для виявлення механізмів
  набутої резистентності (T790M після EGFR-TKI 1-го покоління,
  ампліфікація MET, трансформація у дрібноклітинний рак, lineage
  пластичність); біомаркер-керовані опції 3L (амівантамаб (amivantamab)
  при EGFR ex20ins, капматиніб (capmatinib)/тепотиніб (tepotinib) при
  MET, ларотректиніб (larotrectinib) при NTRK) часто перевершують
  емпіричну хіміотерапію. Найкраща підтримуюча терапія + клінічне
  дослідження — валідна альтернатива при зниженні ECOG.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_07
draft_revision: 2
sources:
  - source_id: SRC-NCCN-NSCLC-2025
    position: supports
    relevant_quote_paraphrase: Docetaxel + ramucirumab or docetaxel + nintedanib are Cat 2A 3L+ options for advanced NSCLC after progression on chemotherapy + IO; biomarker-driven targeted options preferred when actionable
  - source_id: SRC-ESMO-NSCLC-METASTATIC-2024
    position: supports
    relevant_quote_paraphrase: 3L+ NSCLC management is empirical with modest benefits; re-biopsy to capture actionable resistance biomarkers strongly recommended
known_controversies:
  - topic: Empirical chemo (docetaxel ± antiangiogenic) vs trial-only at 3L+ in driver-positive NSCLC
    positions:
      - position: Docetaxel + ramucirumab/nintedanib — established modest benefit
        sources:
          - SRC-NCCN-NSCLC-2025
      - position: Trial-only — biomarker-driven enrollment may identify high-impact targeted option
        sources:
          - SRC-ESMO-NSCLC-METASTATIC-2024
        evidence_note: 3L+ ORR with empirical chemo ~15-20%, mOS gain modest
    our_default: Re-biopsy first; if actionable biomarker → targeted option; if no actionable → docetaxel + antiangiogenic OR trial enrollment
    rationale: Modest empirical benefit makes biomarker-driven matching the higher-yield strategy when feasible
do_not_do:
  - "НЕ призначати 3L+ хіміотерапію без re-biopsy при можливості — 30-50% мають actionable resistance mechanism."
  - НЕ продовжувати IO в 3L+ після прогресії на ICI 2L+ — мінімальна evidence для re-challenge поза trial.
  - НЕ використовувати ramucirumab при анамнезі significant hemoptysis (≥2.5 mL bright red blood) — risk fatal pulmonary hemorrhage.
  - НЕ забути brain MRI при будь-якому неврологічному symptom — CNS progression part інша терапевтична стратегія.
  - НЕ продовжувати лікування при ECOG ≥3 — 3L+ benefit обмежений до fit пацієнтів.
  - НЕ ігнорувати proteinuria + hypertension з ramucirumab — bevacizumab-class effects.
do_not_do_en:
  - "Do NOT prescribe 3L+ chemotherapy without re-biopsy where possible — 30-50% have actionable resistance mechanism."
  - "Do NOT continue IO in 3L+ after progression on ICI 2L+ — minimal evidence for re-challenge outside trial."
  - "Do NOT use ramucirumab in history of significant hemoptysis (≥2.5 mL bright red blood) — risk fatal pulmonary hemorrhage."
  - "Do NOT forget brain MRI on any neurologic symptom — CNS progression part different therapeutic strategy."
  - "Do NOT continue treatment at ECOG ≥3 — 3L+ benefit limited to fit patients."
  - "Do NOT ignore proteinuria + hypertension with ramucirumab — bevacizumab-class effects."
