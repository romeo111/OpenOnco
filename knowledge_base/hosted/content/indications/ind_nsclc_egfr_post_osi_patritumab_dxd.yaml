id: IND-NSCLC-EGFR-POST-OSI-PATRITUMAB-DXD
plan_track: aggressive

applicable_to:
  disease_id: DIS-NSCLC
  molecular_subtype: EGFR_MUTANT
  stage_stratum: STAGE_IV_METASTATIC
  line_of_therapy: 3
  stage_requirements:
    - "Stage IV metastatic EGFR-mutant NSCLC (any sensitizing mutation: ex19del, L858R, T790M-acquired)"
    - "Disease progression on prior osimertinib (1L or 2L) AND prior platinum-based chemotherapy"
    - "Typical 3L+ position: post-osi + post-platinum"
  biomarker_requirements_required:
