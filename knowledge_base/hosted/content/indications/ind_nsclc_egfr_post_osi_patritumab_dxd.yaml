known_controversies:
  - topic: "Patritumab-DXd post-HERTHENA-Lung02 negative phase III — ongoing role?"
    positions:
      - position: "Drop from routine — phase III negative; reserve for trial only"
        sources: [SRC-ESMO-NSCLC-METASTATIC-2024]
      - position: "Heterogeneous post-osi resistance population justifies continued availability for selected patients with no other options; HERTHENA-Lung01 ORR 30% remains clinically meaningful"
        sources: [SRC-NCCN-NSCLC-2025]
    our_default: "Reserve for 3L+ EGFR-mut post-osi + platinum patients lacking other options; preferentially via clinical trial; document HERTHENA-Lung02 informed-consent context"
    rationale: "Phase III did not confirm OS benefit but ORR 30% in heavily pretreated population still useful for selected aggressive-track patients without alternatives"

do_not_do:
  - "НЕ використовувати при baseline ILD або history of pneumonitis — class-effect risk."
  - "НЕ ігнорувати baseline + serial pulmonary monitoring (HRCT, pulse oximetry, symptoms)."
  - "НЕ продовжувати при Grade ≥2 ILD — permanently discontinue."
  - "НЕ використовувати без NGS-based resistance characterization — patients without identifiable resistance mechanism may benefit less."
  - "НЕ ігнорувати neutropenia + G-CSF prophylaxis per institutional policy."
  - "НЕ підтверджувати план без funding pathway + informed consent re HERTHENA-Lung02 negative phase III — patritumab-DXd FDA-accelerated approval status fluid; не зареєстрований в Україні."
  - "НЕ комбінувати з other ADCs concurrently — additive ILD risk."

