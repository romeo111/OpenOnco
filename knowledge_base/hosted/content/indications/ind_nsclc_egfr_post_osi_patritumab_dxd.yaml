rationale: >
  Patritumab deruxtecan (HER3-DXd, HER3-directed ADC with topoisomerase-I
  payload) for EGFR-mutant metastatic NSCLC post-osimertinib + platinum.
  HERTHENA-Lung01 phase II (n=225): BICR ORR ~30%, mPFS 5.5 mo, mDOR 5.6
  mo across heterogeneously pretreated EGFR-mut population (post-osi
  diverse resistance: MET-amp, C797S, transformations). Intracranial
  activity clinically meaningful (~33% IC-ORR). FDA accelerated approval
  withdrawn 2024 after phase III HERTHENA-Lung02 (vs platinum doublet)
  read out negative for OS — indication-status fluid; clinical access
  largely via expanded-access / trial. Aggressive-track 3L+ option for
  EGFR-mut patients exhausting standard targeted + cytotoxic options,
  particularly with CNS disease. ILD class risk + neutropenia + nausea
  dominate AE profile.

sources:
  - source_id: SRC-NCCN-NSCLC-2025
    position: supports
    relevant_quote_paraphrase: "Patritumab deruxtecan emerged as an option for EGFR-mutant NSCLC progressing on osimertinib + platinum (HERTHENA-Lung01); regulatory status evolving post-HERTHENA-Lung02"
  - source_id: SRC-ESMO-NSCLC-METASTATIC-2024
    position: supports
    relevant_quote_paraphrase: "HER3-DXd (patritumab deruxtecan) is investigational option for EGFR-mut NSCLC post-osimertinib failure; HERTHENA-Lung01 phase II ORR ~30%, ILD class signal requires monitoring"

rationale_ua: >
  Патритумаб дерукстекан (patritumab deruxtecan, HER3-DXd) — HER3-таргетний
  кон'югат антитіло-препарат із топоізомераза-I пейлоадом — при
  EGFR-мутантному метастатичному НДКРЛ після осимертинібу + платини.
  HERTHENA-Lung01 фаза II (n=225): загальна частота відповіді за BICR
  ~30%, медіана виживаності без прогресування 5.5 міс, медіана
  тривалості відповіді 5.6 міс у гетерогенно передлікованій
  EGFR-мутантній популяції (різноманітні post-осимертиніб резистентності:
  MET-amp, C797S, трансформації). Інтракраніальна активність клінічно
  значуща (~33% IC-ORR). Прискорене схвалення FDA відкликано у 2024
  після негативного результату HERTHENA-Lung02 фази III (проти
  платинового дублета) щодо загальної виживаності — регуляторний
  статус нестабільний; клінічний доступ переважно через
  expanded-access / клінічні дослідження. Агресивна гілка 3L+ для
  EGFR-мутантних пацієнтів, які вичерпали стандартну таргетну та
  цитотоксичну терапію, особливо при ЦНС-захворюванні. У профілі
  небажаних явищ домінують класовий ризик ILD, нейтропенія та нудота.

