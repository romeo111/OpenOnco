known_controversies:
  - topic: "Zenocutuzumab line-of-therapy positioning (1L vs 2L) in NRG1-fusion+ NSCLC"
    positions:
      - position: "1L if NRG1 fusion identified upfront — tumor-agnostic data supports targeted-first; chemo less effective in NRG1-fusion+"
        sources: [SRC-NCCN-NSCLC-2025]
      - position: "2L after platinum + ICI failure — preserves chemo as proven initial control; NRG1 fusion frequently identified at re-biopsy/progression"
        sources: [SRC-ESMO-NSCLC-METASTATIC-2024]
    our_default: "2L+ standard; 1L if NRG1 fusion identified at diagnosis (rare due to NGS lag); preferred over chemo when fusion confirmed"
    rationale: "Both positions supported; in practice fusion detection timing drives sequencing"

do_not_do:
  - "НЕ підтверджувати NRG1 fusion лише на DNA-NGS — false-negative rate ~30-50%; reflex RNA-NGS обов'язковий."
  - "НЕ затримувати тестування — invasive mucinous adenocarcinoma + другорідні негативи на standard panel мають вищий pretest probability NRG1."
  - "НЕ ігнорувати infusion-related reactions — premedication mandatory; first-dose closely monitored."
  - "НЕ комбінувати з anti-HER2 / anti-HER3 agents без data — overlap mechanism of action."
  - "НЕ підтверджувати план без funding pathway — zenocutuzumab не зареєстрований в Україні; FDA-approved 2024-12."
  - "НЕ використовувати при significant cardiac dysfunction (LVEF <50%) без cardiology clearance — HER2-class signal."
  - "НЕ припиняти терапію за perfusable Grade 1-2 IRR — premedicate + slow infusion."

