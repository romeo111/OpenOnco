desired_tests: []

rationale: >
  Zenocutuzumab (Bizengri, MCLA-128, HER2 x HER3 bispecific antibody)
  for NRG1-fusion+ metastatic NSCLC. NRG1 fusion is a rare (~0.2-0.3%
  NSCLC; enriched in invasive mucinous adenocarcinoma) but actionable
  oncogenic driver — fusion-encoded EGF-like domain hyperactivates HER3,
  driving HER2:HER3 dimerization. Zenocutuzumab dock-and-block mechanism
  prevents NRG1-driven HER3 activation. eNRGy phase II tumor-agnostic
  registration trial: NSCLC subset ORR ~33%, mDOR 7.4 mo, mPFS 6.8 mo.
  FDA approval 2024-12 for NRG1-fusion+ pancreatic adenocarcinoma + NSCLC
  (tumor-agnostic-style with two-tumor label). RNA-NGS is essential
  (DNA-NGS misses ~30-50% of NRG1 fusions due to large intronic regions
  in NRG1). Standard-track 2L+ for NRG1-fusion+ NSCLC; can also be 1L
  if fusion identified upfront and patient prefers targeted-first
  approach over chemo.

sources:
  - source_id: SRC-NCCN-NSCLC-2025
    position: supports
    relevant_quote_paraphrase: "Zenocutuzumab is recommended for NRG1 fusion-positive NSCLC any line; Cat 2A; tumor-agnostic-style FDA approval (NSCLC + pancreatic 2024); RNA-NGS testing essential"
  - source_id: SRC-ESMO-NSCLC-METASTATIC-2024
    position: supports
    relevant_quote_paraphrase: "Zenocutuzumab is the standard-of-care for NRG1-fusion+ NSCLC; eNRGy ORR ~33% NSCLC subset, durable; reflex RNA-NGS panel testing for NRG1 detection"

rationale_ua: >
  Зенокутузумаб (zenocutuzumab, Bizengri, MCLA-128) — HER2 × HER3
  біспецифічне антитіло — при NRG1-fusion+ метастатичному НДКРЛ.
  Злиття NRG1 — рідкісний (~0.2-0.3% при НДКРЛ; частіше при інвазивній
  муцинозній аденокарциномі), але актіонабельний онкогенний драйвер:
  кодований злиттям EGF-подібний домен гіперактивує HER3, спричиняючи
  димеризацію HER2:HER3. Механізм dock-and-block зенокутузумабу
  запобігає NRG1-залежній активації HER3. Тумор-агностичне
  реєстраційне дослідження eNRGy фази II: підгрупа НДКРЛ — загальна
  частота відповіді ~33%, медіана тривалості відповіді 7.4 міс,
  медіана виживаності без прогресування 6.8 міс. Схвалення FDA —
  грудень 2024 року для NRG1-fusion+ аденокарциноми підшлункової
  залози + НДКРЛ (тумор-агностичний стиль з лейблом для двох пухлин).
  RNA-NGS обов'язкове (DNA-NGS пропускає ~30-50% злиттів NRG1 через
  великі інтронні ділянки у NRG1). Стандартна гілка 2L+ для
  NRG1-fusion+ НДКРЛ; можна застосовувати у 1L, якщо злиття виявлено
  на початку, і пацієнт надає перевагу таргетному підходу перед
  хіміотерапією.

