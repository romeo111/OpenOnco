id: IND-NSCLC-NRG1-ZENOCUTUZUMAB
plan_track: standard

applicable_to:
  disease_id: DIS-NSCLC
  molecular_subtype: NRG1_FUSION
  stage_stratum: STAGE_IV_METASTATIC
  line_of_therapy: 2
  stage_requirements:
    - "Stage IV metastatic NRG1-fusion+ NSCLC (most common partner: CD74-NRG1; less common: SLC3A2, ATP1B1)"
    - "Disease progression on prior systemic therapy OR no prior therapy if zenocutuzumab is selected as first targeted agent"
    - "NRG1 fusion frequency in NSCLC ~0.2-0.3% — RNA-NGS panel testing essential"
    - "Particular enrichment in invasive mucinous adenocarcinoma (IMA) histology"
  biomarker_requirements_required:
