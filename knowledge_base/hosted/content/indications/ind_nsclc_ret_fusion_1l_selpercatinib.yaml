id: IND-NSCLC-RET-FUSION-1L-SELPERCATINIB
plan_track: standard

applicable_to:
  disease_id: DIS-NSCLC
  line_of_therapy: 1
  stage_requirements:
    - "Stage IV metastatic RET fusion-positive NSCLC"
    - "RET fusion confirmed by NGS (DNA or RNA-NGS for fusion detection)"
    - "Treatment-naive (1L setting)"
  biomarker_requirements_required:
    - biomarker_id: BIO-RET-FUSION
      value_constraint: "RET fusion confirmed (CCDC6-RET, KIF5B-RET, NCOA4-RET, or other partner)"
      required: true
  biomarker_requirements_excluded:
    - "Co-occurring EGFR or ALK driver (EGFR/ALK-directed therapy takes priority)"
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-SELPERCATINIB-NSCLC
concurrent_therapy: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  orr_treatment_naive: "84.1% (LIBRETTO-001; treatment-naive)"
  orr_12m_dor: "~70%"
  median_pfs_months: "~22 (LIBRETTO-001 treatment-naive cohort)"
  libretto431_pfs_hr: 0.46
  notes: >
    LIBRETTO-001 (Drilon 2020, NEJM): selpercatinib 160 mg BID in RET fusion+ NSCLC.
    Treatment-naive: ORR 84.1%; 12-month DOR 70%; mPFS ~22 months.
    LIBRETTO-431 (Wirth 2024): selpercatinib vs pembrolizumab+platinum±pem in 1L
    treatment-naive RET fusion+ NSCLC; PFS HR 0.46 (selpercatinib superior); OS
    HR pending. NCCN Category 1.

hard_contraindications:
  - "QTc >500 ms at baseline (selpercatinib QT prolongation risk)"
  - "Co-occurring EGFR or ALK fusion"

red_flags_triggering_alternative:
  - RF-NSCLC-BRAIN-METS-EMERGENCY
  - RF-NSCLC-CORD-COMPRESSION
  - RF-NSCLC-SVC-SYNDROME
  - RF-NSCLC-MALIGNANT-EFFUSION
required_tests:
  - "RET fusion NGS (RNA-NGS preferred for fusion detection; IHC insensitive)"
  - TEST-CT-CAP
  - TEST-LFT
  - TEST-CBC
  - "ECG (QTc baseline — QT prolongation monitoring)"
  - "Thyroid function (TSH) — selpercatinib hypothyroidism"

sources:
  - source_id: SRC-LIBRETTO001-DRILON-2020
    position: supports
    relevant_quote_paraphrase: "LIBRETTO-001 (treatment-naive): selpercatinib ORR 84.1%; 12m DOR 70%; mPFS ~22m; NCCN Cat 1"

rationale_ua: >
  LIBRETTO-001 (лікованих раніше не): селперкатиніб 160 мг BID; ORR 84.1%;
  LIBRETTO-431: PFS HR 0.46 vs платина±pembro. NCCN Категорія 1.
  РНК-NGS перевагається для детекції фузій RET.

do_not_do:
  - "Не призначати без підтвердження RET фузії — RET-мутовані (MEN2 без фузії) — інший ландшафт"
  - "Не ігнорувати ЕКГ — QTc подовження при селперкатинібі"

time_critical: false
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
ukrainian_review_status: pending_clinical_signoff
