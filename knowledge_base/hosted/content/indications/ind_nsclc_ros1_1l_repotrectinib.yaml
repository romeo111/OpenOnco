id: IND-NSCLC-ROS1-1L-REPOTRECTINIB
plan_track: aggressive

applicable_to:
  disease_id: DIS-NSCLC
  molecular_subtype: ROS1_REARRANGED
  stage_stratum: STAGE_IV_METASTATIC
  line_of_therapy: 1
  stage_requirements:
    - "Stage IV metastatic ROS1-rearranged NSCLC, TKI-naïve"
    - "Preferred for patients with CNS-dominant disease or planning durable single-agent targeted control"
    - "Alternative to crizotinib / entrectinib 1L (sequencing approach)"
  biomarker_requirements_required:
    - biomarker_id: BIO-ROS1-FUSION
      value_constraint: "ROS1 rearrangement confirmed (RNA-NGS preferred — captures partner; FISH/IHC acceptable for rapid diagnosis with NGS confirmation)"
