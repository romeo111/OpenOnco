id: IND-NSCLC-ROS1-1L-TALETRECTINIB
plan_track: standard

applicable_to:
  disease_id: DIS-NSCLC
  line_of_therapy: 1
  stage_requirements:
    - "Stage IV metastatic ROS1-rearranged NSCLC, TKI-naïve"
    - "No prior systemic therapy for metastatic disease"
  biomarker_requirements:
    - "ROS1 rearrangement confirmed by validated NGS (RNA-NGS preferred to capture fusion partner; FISH/IHC acceptable for rapid diagnosis with NGS confirmation)"
    - "ROS1 rearrangement is a distinct biomarker — does NOT apply to ROS1 non-fusion (amplification, point mutation without rearrangement)"

recommended_regimen: REG-TALETRECTINIB-NSCLC

concurrent_therapy: []

followed_by:
  - "Continue until progression or unacceptable toxicity"
  - "At progression: assess resistance mechanism (ctDNA/rebiopsy); ROS1 G2032R → repotrectinib; novel mechanisms → clinical trial"

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: 1

expected_outcomes:
  overall_response_rate: "~72% treatment-naive (TRUST-II global cohort); ~91% (TRUST-I China cohort)"
  intracranial_orr: "~75-85% in patients with measurable brain metastases"
  notes: >
    TRUST-I (NCT04666748; Phase 2; China): treatment-naive ORR ~91%; mDOR ~15 months.
    TRUST-II (NCT04919811; Phase 2; global): treatment-naive ORR ~72%; mDOR maturing.
    FDA accelerated approval ~2024 based on pooled TRUST-I + TRUST-II data.
    NCCN NSCLC 2025: Category 1 preferred for treatment-naive ROS1+ mNSCLC.
    Active against G2032R resistance mutation (primary crizotinib resistance mutation).
    Head-to-head comparison with repotrectinib: no direct trial; repotrectinib mDOR
    34.1 months (TRIDENT-1) vs taletrectinib ~15 months (TRUST-I; TRUST-II maturing).
    Cross-trial comparison: repotrectinib shows longer mDOR; taletrectinib has
    QD dosing advantage and potentially lower dizziness burden.
    CAUTION: exact citation details require clinical reviewer verification.

hard_contraindications:
  - "ROS1 mutation without rearrangement (amplification or point mutation): taletrectinib targets ROS1 fusion kinase"
  - "Active ILD / pneumonitis at baseline"
  - "ECOG PS 3-4"
  - "ECOG PS 4 (engine hard gate)"
  - "Severe hepatic impairment"

red_flags_triggering_alternative:
  - "Strong CYP3A4 inhibitor or inducer that cannot be stopped: switch to repotrectinib (different metabolic profile, same drug interaction caveat)"
  - "CNS-dominant disease requiring rapid intracranial response: repotrectinib 1L preferred (TRIDENT-1 IC-ORR 89%)"
  - "QTc >470 ms baseline: monitor closely; consider repotrectinib if persistent QTc concern"
  - "Prior crizotinib resistance (G2032R confirmed): taletrectinib is active vs G2032R; also consider repotrectinib"

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-NSCLC-NGS-PANEL
  - "Brain MRI with gadolinium contrast (baseline — ROS1+ has high CNS metastasis rate ~25-30%)"
  - "Baseline ECG (QTc assessment)"
  - "CT chest/abdomen/pelvis for baseline staging"

desired_tests:
  - "ROS1 fusion partner identification (RNA-NGS): not required for treatment selection but informs resistance understanding"
  - "ctDNA baseline (molecular tumor burden)"
  - "PD-L1 TPS: not actionable for ROS1+ subset but prognostic"

rationale: >
  ROS1 rearrangements occur in ~1-2% of NSCLC and are highly actionable.
  Taletrectinib (TRUST-I/II) is a next-generation macrocyclic ROS1/NTRK TKI
  approved by FDA ~2024 for ROS1+ NSCLC based on treatment-naive ORR ~72-91%
  across global cohorts. Active against G2032R resistance mutation (dominant
  post-crizotinib resistance); strong intracranial activity.
  NCCN NSCLC 2025: Category 1 preferred alongside repotrectinib.
  Key clinical differentiators from repotrectinib:
  — Once-daily QD dosing (vs repotrectinib 160 mg BID after 14-day lead-in)
  — No mandatory dose lead-in
  — Lower reported dizziness incidence (class-defining toxicity with repotrectinib ~63%)
  — TRIDENT-1 mDOR 34.1 months vs TRUST mDOR ~15 months (cross-trial caution; TRUST-II maturing)
  Standard-track 1L for fit patients (ECOG 0-2) with ROS1+ mNSCLC.

sources:
  - SRC-TRUST-TALETRECTINIB-2024
  - SRC-NCCN-NSCLC-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  Workstream EL 2026-05-04. TRUST-I + TRUST-II taletrectinib for ROS1+ NSCLC 1L.
  Second NCCN Cat 1 preferred next-gen ROS1 TKI alongside repotrectinib (TRIDENT-1).
  FDA accelerated approval ~2024. Standard-track (vs repotrectinib aggressive-track).
  Key clinical differentiator: QD dosing, no lead-in, potentially lower dizziness.
  TRUST-II mDOR still maturing — may update when final data available.
  Citation details require verification per source file SRC-TRUST-TALETRECTINIB-2024.
  Two-reviewer clinical signoff required per CHARTER §6.1.
