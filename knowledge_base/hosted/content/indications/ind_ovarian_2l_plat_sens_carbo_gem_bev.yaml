id: IND-OVARIAN-2L-PLAT-SENS-CARBO-GEM-BEV
plan_track: standard

applicable_to:
  disease_id: DIS-OVARIAN
  line_of_therapy: 2
  stage_requirements:
    - "Recurrent epithelial ovarian / fallopian tube / primary peritoneal cancer"
    - "Platinum-free interval >6 months (platinum-sensitive)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-CARBO-GEM-BEV-OVARIAN
concurrent_therapy: []
followed_by:
  - IND-OVARIAN-MAINT-PARPI-BRCAM-OLAPARIB
  - IND-OVARIAN-MAINT-PARPI-HRD-NIRAPARIB
  - IND-OVARIAN-MAINT-PARPI-RUCAPARIB

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate:
    value: "78.5% (OCEANS carbo+gem+bev arm)"
    source: SRC-OCEANS-AGHAJANIAN-2012
  progression_free_survival:
    value: "mPFS 12.4 vs 8.4 mo over carbo+gem alone (OCEANS, HR 0.484)"
    source: SRC-OCEANS-AGHAJANIAN-2012
  overall_survival_5y:
    value: "mOS 33.3 vs 32.9 mo (OCEANS — OS not significantly improved vs chemo alone)"
    source: SRC-OCEANS-AGHAJANIAN-2012
    notes: "OCEANS (Aghajanian 2012 JCO): carbo+gem+bev vs carbo+gem in platinum-sensitive recurrent ovarian; mPFS HR 0.484 (p<0.001); OS HR 0.95 (NS)"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-OVARIAN-FRAILTY-AGE
  - RF-OVARIAN-PERIOPERATIVE-VTE

required_tests: []
desired_tests: []

rationale: >
  Platinum-sensitive recurrent ovarian (PFI >6 mo) — OCEANS
  carbo+gem+bev. Strongest direct RCT evidence for any platinum-
  sensitive bev-containing 2L regimen; preferred standard track in UA
  due to full NSZU coverage (carbo, gem, bev). Followed by maintenance
  PARPi (BRCA-mut → olaparib; HRD+ → niraparib; alternative rucaparib)
  after demonstrated CR/PR.

sources:
  - source_id: SRC-NCCN-OVARIAN-2025
    position: supports
  - source_id: SRC-ESMO-OVARIAN-2024
    position: supports
  - source_id: SRC-OCEANS-AGHAJANIAN-2012
    position: supports

do_not_do:
  - "Do NOT use this regimen if PFI ≤6 months (platinum-resistant — switch to AURELIA backbone)"
  - "Do NOT skip day-8 gemcitabine reflexively for borderline cytopenias — protocol-defined reductions / G-CSF preferred over discontinuation"
  - "Do NOT add bev if patient had Grade 3-4 bev event prior, untreated CNS mets, or major surgery within 28 days"
  - "Do NOT skip maintenance PARPi if BRCA1/2-mutant or HRD-positive after CR/PR"

do_not_do_en:
  - "Do NOT use this regimen if PFI ≤6 months (platinum-resistant — switch to AURELIA backbone)"
  - "Do NOT skip day-8 gemcitabine reflexively for borderline cytopenias — protocol-defined reductions / G-CSF preferred over discontinuation"
  - "Do NOT add bev if patient had Grade 3-4 bev event prior, untreated CNS mets, or major surgery within 28 days"
  - "Do NOT skip maintenance PARPi if BRCA1/2-mutant or HRD-positive after CR/PR"
last_reviewed: "2026-04-27"
reviewer_signoffs: 0
notes: "ESCAT IB. OCEANS regimen — primary platinum-sensitive 2L recommendation in UA setting (full NSZU coverage of all components)."
