id: IND-OVARIAN-ADVANCED-1L-CARBO-PACLI-HRD-OLAP
plan_track: aggressive

applicable_to:
  disease_id: DIS-OVARIAN
  line_of_therapy: 1
  stage_requirements: ["FIGO IIIB-IV (advanced)", "Post-induction platinum-responder (CR or PR)"]
  biomarker_requirements_required:
    - biomarker_id: BIO-HRD-STATUS
      value_constraint: "HRD-positive"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-CARBO-PACLI-OVARIAN
concurrent_therapy: []
followed_by:
  - IND-OVARIAN-MAINTENANCE-OLAPARIB

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate:
    value: "~80% (induction)"
    source: SRC-NCCN-OVARIAN-2025
  complete_response:
    value: "~50%"
    source: SRC-NCCN-OVARIAN-2025
    notes: "Induction CR/PR rates from 1L carbo+pacli in HRD+ advanced ovarian; PAOLA-1 enrolled post-induction CR/PR patients"
  progression_free_survival:
    value: "Median ~37 mo with HRD+ + olaparib maintenance (PAOLA-1)"
    source: SRC-PAOLA1-RAY-COQUARD-2019
    notes: "PAOLA-1 (Ray-Coquard 2019 NEJM): olaparib+bev maintenance in HRD+ (incl. BRCA-mut) mPFS 37.2 vs 17.7 mo (HR 0.33); BRCA-mut mPFS NR vs 21.7 mo"
  overall_survival_5y:
    value: "~50-60% in HRD+ subset"
    source: SRC-PAOLA1-RAY-COQUARD-2019

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-OVARIAN-FRAILTY-AGE
  - RF-OVARIAN-SUBOPTIMAL-DEBULKING

required_tests: []
desired_tests: []

rationale: >
  Advanced ovarian HGSC HRD+ — carbo+pacli induction × 6 cycles
  followed by olaparib maintenance × 2 yr (per SOLO-1 BRCA / PAOLA-1
  HRD+). Treatment-defining biomarker.

rationale_ua: >
  поширений ovarian HGSC HRD+ — carbo+pacli індукція × 6 цикли followed by олапариб підтримка × 2 рік (per SOLO-1 BRCA / PAOLA-1 HRD+). лікування-defining біомаркер.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-PAOLA1-RAY-COQUARD-2019
    position: supports
    relevant_quote_paraphrase: "PAOLA-1 Phase III (Ray-Coquard 2019 NEJM): olaparib+bev maintenance in HRD+ advanced ovarian after 1L carbo+pacli+bev induction; HRD+ mPFS 37.2 vs 17.7 mo (HR 0.33); BRCA-mut mPFS NR vs 21.7 mo"
  - source_id: SRC-NCCN-OVARIAN-2025
    position: supports
  - source_id: SRC-ESMO-OVARIAN-2024
    position: supports

do_not_do:
  - "Do NOT skip HRD testing — defines maintenance choice (PARPi-only HRD+; niraparib-all-comer if HRD-negative weak benefit)"
  - "Do NOT start olaparib without confirmed CR/PR to platinum induction"
  - "Do NOT continue olaparib through Grade 3 anemia without dose reduction"

do_not_do_en:
  - "Do NOT skip HRD testing — defines maintenance choice (PARPi-only HRD+; niraparib-all-comer if HRD-negative weak benefit)"
  - "Do NOT start olaparib without confirmed CR/PR to platinum induction"
  - "Do NOT continue olaparib through Grade 3 anemia without dose reduction"
last_reviewed: "2026-04-26"
notes: "Stage IV / FIGO IIIB+ HGSC HRD+ — primary aggressive track."
