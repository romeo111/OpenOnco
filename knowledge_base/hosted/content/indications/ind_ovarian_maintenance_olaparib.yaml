id: IND-OVARIAN-MAINTENANCE-OLAPARIB
plan_track: aggressive

applicable_to:
  disease_id: DIS-OVARIAN
  line_of_therapy: 1
  stage_requirements: ["Post platinum-induction CR/PR", "FIGO IIIB-IV"]
  biomarker_requirements_required:
    - biomarker_id: BIO-HRD-STATUS
      value_constraint: "HRD-positive"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-OLAPARIB-MAINT-OVARIAN
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate:
    value: "Maintenance — measured by PFS not response"
    source: SRC-SOLO1-MOORE-2018
  progression_free_survival:
    value: "mPFS 56 mo SOLO-1 BRCA-mut (5-yr update, HR 0.30); mPFS 37.2 mo PAOLA-1 HRD+ all (HR 0.33)"
    source: SRC-SOLO1-MOORE-2018
    notes: "SOLO-1 (Moore 2018 NEJM / 5-yr update): olaparib 1L maintenance BRCA-mut advanced ovarian; mPFS 56 vs 13.8 mo; PAOLA-1 (Ray-Coquard 2019 NEJM): olaparib+bev HRD+ mPFS 37.2 vs 17.7 mo"
  overall_survival_5y:
    value: "7-yr OS ~67% SOLO-1 BRCA arm vs ~46% placebo (HR 0.55, 7-yr exploratory analysis)"
    source: SRC-SOLO1-MOORE-2018
    notes: "SOLO-1 7-yr OS update (DiSilvestro 2023 NEJM): olaparib arm ~67% alive at 7 yr vs ~46% placebo (HR 0.55); exploratory analysis, not pre-specified OS endpoint"

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC  # for anemia monitoring
desired_tests: []

rationale: >
  SOLO-1 + PAOLA-1: olaparib maintenance after platinum-response in
  HRD+ HGSC — treatment-of-choice. NCCN cat 1.

rationale_ua: >
  SOLO-1 + PAOLA-1: олапариб підтримка after platinum-відповідь in HRD+ HGSC — лікування-of-choice. NCCN cat 1.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-SOLO1-MOORE-2018
    position: supports
    relevant_quote_paraphrase: "SOLO-1 (Moore 2018 NEJM): olaparib 1L maintenance BRCA-mut advanced ovarian; mPFS NR vs 13.8 mo (HR 0.30); 7-yr OS ~67% vs ~46% (DiSilvestro 2023)"
  - source_id: SRC-PAOLA1-RAY-COQUARD-2019
    position: supports
    relevant_quote_paraphrase: "PAOLA-1 (Ray-Coquard 2019 NEJM): olaparib+bev maintenance HRD+ advanced ovarian after 1L carbo+pacli+bev; HRD+ mPFS 37.2 vs 17.7 mo (HR 0.33)"
  - source_id: SRC-NCCN-OVARIAN-2025
    position: supports
  - source_id: SRC-ESMO-OVARIAN-2024
    position: supports

do_not_do:
  - "Do NOT start without confirmed CR/PR to platinum"
  - "Do NOT continue past 2 years for non-BRCA HRD+ unless still benefiting (label allows ≤24 mo)"
  - "Do NOT skip pre-treatment counseling on long-term MDS/AML risk"

do_not_do_en:
  - "Do NOT start without confirmed CR/PR to platinum"
  - "Do NOT continue past 2 years for non-BRCA HRD+ unless still benefiting (label allows ≤24 mo)"
  - "Do NOT skip pre-treatment counseling on long-term MDS/AML risk"
last_reviewed: "2026-04-26"
notes: "Maintenance-phase indication, follows induction IND-OVARIAN-ADVANCED-1L-CARBO-PACLI-HRD-OLAP."
