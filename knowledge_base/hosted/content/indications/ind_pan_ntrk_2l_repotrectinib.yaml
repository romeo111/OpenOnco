  - source_id: SRC-ESMO-NSCLC-METASTATIC-2024
    position: supports
    relevant_quote_paraphrase: "Repotrectinib is the preferred next-generation TRK inhibitor for NTRK-fusion+ NSCLC and pan-tumor application post-prior TRK inhibitor failure with characterized resistance"

known_controversies:
  - topic: "Repotrectinib 1L vs 2L for NTRK-fusion+ tumors (vs larotrectinib / entrectinib 1L → repotrectinib 2L)"
    positions:
      - position: "Larotrectinib 1L default: best tolerated, longest track record, tumor-agnostic FDA 2018"
        sources: [SRC-NAVIGATE-DRILON-2018]
      - position: "Repotrectinib 1L for CNS-dominant or aggressive disease: best-in-class CNS activity (50% IC-ORR), solvent-front-active"
        sources: [SRC-TRIDENT1-DRILON-2024]
      - position: "Repotrectinib 2L for documented solvent-front resistance (G595R / G667C) post-larotrectinib / entrectinib failure"
        sources: [SRC-NCCN-NSCLC-2025]
    our_default: "Larotrectinib 1L (best tolerated); repotrectinib 2L for solvent-front resistance OR 1L for CNS-dominant disease in fit patients"
    rationale: "Tolerability + access drive 1L; resistance characterization drives 2L+; shared regimen with ROS1+ application"

do_not_do:
  - "НЕ пропускати NGS resistance characterization at progression — solvent-front (G595R/G667C/xDFG) drives repotrectinib selection."
  - "НЕ пропускати lead-in dosing (14 days at 160 mg daily before BID)."
  - "НЕ ігнорувати vestibular AE counseling — adapts через 4-8 тижнів зазвичай."
  - "НЕ комбінувати з strong CYP3A4 inhibitors / inducers без dose modification."
  - "НЕ ігнорувати long-term skeletal fracture monitoring — bone density q-yearly."
  - "НЕ припиняти за reversible Grade 1-2 dizziness — reduction до 120 mg BID при Grade 3."
  - "НЕ підтверджувати план без funding pathway — repotrectinib не зареєстрований в Україні."
  - "НЕ використовувати при baseline severe vestibular dysfunction — additive CNS toxicity."

