id: IND-PAN-NTRK-2L-REPOTRECTINIB
plan_track: aggressive

applicable_to:
  disease_id: DIS-NSCLC  # primary listed disease; tumor-agnostic FDA scope (see notes)
  molecular_subtype: NTRK_FUSION
  stage_stratum: STAGE_IV_METASTATIC
  line_of_therapy: 2
  stage_requirements:
    - "Locally advanced or metastatic NTRK1/2/3 fusion-positive solid tumor (tumor-agnostic FDA approval 2024-06)"
    - "Disease progression on prior TRK inhibitor (larotrectinib OR entrectinib) — typical resistance: solvent-front G595R / G667C / xDFG-motif mutations"
    - "OR TKI-naïve NTRK-fusion+ tumor when repotrectinib is selected as first targeted agent"
    - "Common tumor types: NSCLC (~0.2%), thyroid, colorectal, sarcoma, salivary gland, secretory breast, IFS"
    - "Listed primarily under DIS-NSCLC for engine integration; tumor-agnostic application requires separate per-disease Indication wiring"
  biomarker_requirements_required:
    - biomarker_id: BIO-NTRK-FUSION
      value_constraint: "NTRK1/2/3 fusion confirmed by RNA-NGS (preferred — captures partner) or pan-TRK IHC ≥1+ confirmed by NGS/FISH; resistance mutation NGS at progression"
      required: true
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-REPOTRECTINIB-NSCLC  # same regimen ID; tumor-agnostic dosing identical to ROS1+
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~58% TRK-naïve; ~50% post-prior TKI (TRIDENT-1 NTRK arm tumor-agnostic, n=88)"
  duration_of_response: "TRK-naïve mDOR not reached at 24-mo follow-up; post-TKI mDOR ~10 mo"
  progression_free_survival: "TRK-naïve mPFS not reached; post-TKI mPFS ~7 mo"
  intracranial_orr: "~50% NTRK-fusion+ tumors with measurable CNS disease"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-NSCLC-BRAIN-METS-EMERGENCY
  - RF-NSCLC-CORD-COMPRESSION
  - RF-NSCLC-SVC-SYNDROME
  - RF-NSCLC-MALIGNANT-EFFUSION

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-CECT-CAP
  - TEST-NSCLC-NGS-PANEL  # RNA-NGS critical for both fusion detection + resistance characterization
  - TEST-BRAIN-MRI-CONTRAST
desired_tests: []

rationale: >
  Repotrectinib (next-generation macrocyclic ROS1 / NTRK / ALK TKI with
  solvent-front activity) for NTRK1/2/3 fusion-positive locally
  advanced or metastatic solid tumors, particularly post-prior TRK
  inhibitor (larotrectinib / entrectinib) with characterized solvent-
  front resistance (G595R / G667C / xDFG-motif). TRIDENT-1 NTRK
  tumor-agnostic arm (n=88): TRK-naïve ORR ~58%; post-TKI ORR ~50%
  including resistance-mutation+ cases. FDA tumor-agnostic approval
  2024-06 — second TRK inhibitor with this scope. Aggressive-track
  preferred over re-treatment with same TRK inhibitor at progression
  with documented resistance. Lead-in dosing (160 mg daily x14 days,
  then 160 mg BID) and CNS-AE counseling identical to ROS1+ context.
  Long-term skeletal-fracture surveillance class signal. Tumor-
  agnostic structurally — same Indication framework applies to other
  NTRK-fusion+ solid tumors per individual disease integration.

rationale_ua: >
  Репотректиніб (repotrectinib, наступне покоління макроциклічних ROS1/NTRK/ALK TKI з
  активністю проти solvent-front мутацій) для NTRK1/2/3 fusion-позитивних місцево-поширених
  або метастатичних солідних пухлин, особливо після попереднього TRK-інгібітора
  (ларотректиніб / ентректиніб) із характеризованою solvent-front-резистентністю
  (G595R / G667C / xDFG-мотив). TRIDENT-1 NTRK панпухлинне рамо (n=88): TRK-наївна
  ORR ~58%; після попереднього TKI ORR ~50%, включаючи випадки з мутаціями резистентності.
  Tumor-agnostic FDA-схвалення 2024-06 — другий TRK-інгібітор з такою сферою застосування.
  Схема lead-in дозування (160 mg щоденно × 14 днів, потім 160 mg двічі на день)
  та консультування з ЦНС-НЯ є ідентичними контексту ROS1+. Пухлинно-агностична
  структура — та сама платформа застосовна до інших NTRK-fusion+ солідних пухлин.
