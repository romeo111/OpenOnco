do_not_do:
  - "НІКОЛИ не комбінувати ібрутиніб з антикоагулянтами при ЦНС-захворюванні — ризик ВЧК"
  - "Зменшити дозу до 140 мг при сильних CYP3A4-інгібіторах (вориконазол, ітраконазол, HIV ПІ)"
  - "МРТ мозку кожні 2-3 цикли — оцінка за IPCG-критеріями (не ПЕТ/КТ)"
  - "При МТХ-чутливому пізньому рецидиві (≥6 міс) → розглянути повторний МТХ (R-MPV); ібрутиніб для МТХ-рефрактерних"
  - "Призупинити ібрутиніб за 3-7 днів перед нейрохірургічним втручанням"
  - "ФП на тлі ібрутинібу → контроль ритму + кардіологічна консультація; при неконтрольованій ФП — замінити на акалабрутиніб"

time_critical: true
time_critical_note: "PCNSL relapse is rapidly progressive; ibrutinib should be initiated within 1-2 weeks of confirmed progression. MRI at baseline required before first dose."
