do_not_do:
  - "Не застосовувати при попередній невдачі темозоломіду (напр., після 1L ГБМ-терапії) — перехресна резистентність через ДНК-репарацію (МGMT)"
  - "Не призначати без ПЦП-профілактики (ко-тримоксазол): лімфопенія від ТМЗ → ризик Pneumocystis jirovecii"
  - "Не пропускати антиеметики — ТМЗ є помірно еметогенним: ондансетрон обов'язково перед кожним прийомом"
  - "Не ігнорувати затриманий кровотворний токсичний ефект: надір ANC/PLT на 21-28 день → загальний аналіз крові q2 тижні в 1-му циклі"
  - "Не починати при АЧН <1.5 або PLT <100 — ризик критичної нейтропенії"
  - "Перед ритуксимабом: обов'язковий скринінг на HBV (HBsAg + anti-HBc) → ентекавір при реактивності"

sources:
  - source_id: SRC-NCCN-CNS-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN CNS Tumors 2025: temozolomide listed as Category 2B for
      relapsed/refractory PCNSL as an oral CNS-active salvage option;
      positioned after ibrutinib (Cat 2A) and R² (Cat 2A) in the
      treatment hierarchy. Evidence primarily from small phase 1/2 series.

