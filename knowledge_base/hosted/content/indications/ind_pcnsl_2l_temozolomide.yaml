id: IND-PCNSL-2L-TEMOZOLOMIDE
plan_track: standard

applicable_to:
  disease_id: DIS-PCNSL
  line_of_therapy: 2
  stage_requirements:
    - "Relapsed/refractory primary CNS lymphoma (PCNSL) — diffuse large B-cell lymphoma of the CNS"
    - "Prior ≥1 systemic line including high-dose methotrexate (HD-MTX)-based regimen"
    - "Ibrutinib inaccessible (not registered/funded in patient's healthcare setting) OR prior ibrutinib failure"
    - "R² (lenalidomide+rituximab) inaccessible (REMS not feasible, lenalidomide unavailable) OR contraindicated (CrCl <30, CD20-negative and rituximab-only component unavailable, prior lenalidomide failure) OR patient ineligible"
    - "ECOG PS 0-3 (oral temozolomide feasible across wide PS range; ECOG 3 requires MDT)"
    - "Adequate hepatic function: ALT/AST ≤3× ULN; bilirubin ≤1.5× ULN"
    - "ANC ≥1.5×10⁹/L, PLT ≥100×10⁹/L before cycle 1"
  biomarker_requirements_required: []
  biomarker_requirements_excluded:
    - "Prior temozolomide failure: re-challenge has minimal yield; alternative mechanism required"
    - "MGMT promoter unmethylated is NOT a contraindication in PCNSL (MGMT status less validated than in GBM for lymphoma)"
  demographic_constraints:
    ecog_max: 3
    notes: >
      Temozolomide is among the most accessible CNS-active agents in PCNSL. Oral,
      low toxicity profile (Grade 3-4 AE ~15-20%), and NSZU-funded in Ukraine for
      brain tumors. Appropriate when both ibrutinib (BTKi) and R² (IMiD+CD20) are
      inaccessible or contraindicated. ECOG 3 with adequate organ function: MDT
      discussion; may still be appropriate given oral route and low toxicity.
      ECOG 4: goals-of-care discussion preferred over active cytotoxic therapy.

recommended_regimen: REG-TEMOZOLOMIDE-PCNSL
alternative_regimens:
  - regimen_id: IND-PCNSL-2L-LENALIDOMIDE-RITUXIMAB
    description: >
      R² (lenalidomide 20 mg/day d1-21 + rituximab 375 mg/m² d1 q28d;
      REAL; ORR ~36%; NCCN Cat 2A) — preferred over temozolomide when
      accessible; higher ORR (36% vs ~31-35%); CD20-directed mechanism.
      Use before temozolomide if R² is feasible.
  - regimen_id: IND-PCNSL-2L-IBRUTINIB
    description: >
      Ibrutinib 560 mg/day PO (iLOC; ORR 52.3%; NCCN Cat 2A) — highest
      ORR in r/r PCNSL. Preferred when accessible. Temozolomide is
      the accessible fallback when ibrutinib is unavailable.

concurrent_therapy:
  - "PJP prophylaxis: TMP-SMX 160/800 mg PO 3×/week (temozolomide-induced lymphopenia)"
  - "Antiemetic: ondansetron 8 mg PO before temozolomide (moderate emetogenic potential)"
  - "CBC q2 weeks cycle 1 (delayed nadir at day 21-28 for temozolomide)"
  - "If adding rituximab (R-TMZ when CD20+): HBV screening (HBsAg + anti-HBc) mandatory before first rituximab; entecavir if reactive"
  - "Corticosteroids for cerebral edema: dexamethasone 4-16 mg/day if symptomatic — continue baseline steroids; does not reduce temozolomide activity"

followed_by:
  - "MRI brain with gadolinium q2 cycles (8 weeks): IPCG criteria for response assessment"
  - "CSF cytology if leptomeningeal involvement at baseline: q2 cycles"
  - "Continue until progression or unacceptable toxicity; responders: 6-12 cycles per MDT"
  - "At progression: clinical trial preferred; whole-brain radiation therapy (WBRT) 36-45 Gy palliative if ECOG permits and no prior WBRT; best supportive care"
  - "If rituximab added (R-TMZ): assess CD20 status at progression — repeat biopsy if available"

evidence_level: low
strength_of_recommendation: weak
nccn_category: "2B"

expected_outcomes:
  overall_response_rate: "~31-53% (range: TMZ mono ~31% to R-TMZ ~53%; small series n<20 each)"
  complete_response: "~10-20% (pooled small series)"
  median_pfs_months: "~4-6 months (responders; limited follow-up in small series)"
  notes: >
    PRIMARY EVIDENCE (small series; no prospective RCT):
    - Enting et al. 2004 (J Neurooncol): Temozolomide monotherapy in r/r PCNSL.
      n=13; ORR ~31% (4 PR, 0 CR); mDOR ~5 months; Grade 3-4 AE ~15%;
      well-tolerated; oral. Foundational evidence for single-agent TMZ in PCNSL.
    - Reni et al. 2004 (Cancer): Rituximab + temozolomide (R-TMZ) in r/r PCNSL.
      n=15; ORR ~53% (CR 27%, PR 27%); mOS ~14 months in responders; Grade 3-4 AE ~20%.
      Better outcomes with R-TMZ than TMZ mono when CD20+ and rituximab accessible.
    - Ngo et al. (multiple case series 2004-2012): Consistent ORR 30-50% range
      for temozolomide-based regimens in PCNSL — no prospective data beyond phase 1/2.

    NCCN CNS TUMORS 2025: Temozolomide is Category 2B for r/r PCNSL — lower evidence
    level than ibrutinib (Cat 2A) or R² (Cat 2A), but listed as an accessible oral
    option particularly relevant in resource-limited or access-restricted settings.

    UKRAINE CONTEXT:
    Temozolomide registered and NSZU-reimbursed for brain tumors (GBM/anaplastic glioma).
    Use in PCNSL is off-label (lymphoma not glioma) but accessible through brain tumor
    funding pathway with MDT/ТМК authorization. This makes temozolomide a practical
    fallback when ibrutinib (not registered for PCNSL in Ukraine) and lenalidomide
    (REMS required; formulary access varies) are inaccessible.

    COMPARISON TO IBRUTINIB AND R²:
    - Ibrutinib ORR ~52% >> R² ~36% >> TMZ ~31-53% (wide range due to small n)
    - Temozolomide: lowest evidence tier but broadest accessibility in Ukraine
    - R-TMZ (with rituximab) closes the ORR gap vs R² when CD20+ and accessible

hard_contraindications:
  - "Prior temozolomide failure (including prior GBM treatment with TMZ): re-challenge unlikely to benefit; DNA mismatch repair acquired resistance"
  - "Active severe hepatic impairment (ALT/AST >5× ULN or bilirubin >3× ULN): temozolomide hepatotoxicity risk"
  - "ANC <1.0×10⁹/L or PLT <50×10⁹/L: hematologic contraindication; delay until recovery"
  - "Unable to take oral medications with no alternative formulation available"

red_flags_triggering_alternative:
  - condition: "Ibrutinib now accessible → IND-PCNSL-2L-IBRUTINIB (ORR 52%; NCCN Cat 2A; superior)"
  - condition: "R² now accessible AND CD20+ → IND-PCNSL-2L-LENALIDOMIDE-RITUXIMAB (ORR 36%; NCCN Cat 2A; superior to TMZ mono)"
  - condition: "Prior temozolomide failure → WBRT palliative (if eligible) or clinical trial; no further active therapy"
  - condition: "Disease progression at 2 cycles with no response → consider WBRT or BSC; temozolomide non-responders unlikely to benefit further"

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - "MRI brain with gadolinium (IPCG baseline): establish measurable disease before starting"
  - "CSF cytology + protein: leptomeningeal staging baseline"
  - "MGMT promoter methylation (optional, not required for treatment decision in PCNSL)"
  - "CD20 IHC (relapse biopsy preferred): determines rituximab addition feasibility (R-TMZ)"
  - "HBV: HBsAg + anti-HBc + anti-HBs (required before rituximab; optional if TMZ mono)"

desired_tests:
  - "Ophthalmologic slit-lamp exam: PVRL involvement exclusion (vitreoretinal lymphoma)"
  - "PET-CT brain ± body: systemic lymphoma transformation exclusion"
  - "MYD88 L265P status: confirms ABC/MCD PCNSL subtype; BTKi sensitivity marker (useful if ibrutinib access improves)"

rationale: >
  Temozolomide (± rituximab) as accessible oral CNS-active salvage for
  relapsed/refractory PCNSL when first- and second-choice targeted agents
  (ibrutinib, R²) are inaccessible or contraindicated.

  CLINICAL POSITIONING:
  PCNSL 2L hierarchy:
  1. Ibrutinib (oral BTKi; ORR 52%; NCCN Cat 2A) — preferred, not registered in Ukraine
  2. R² (lenalidomide+rituximab; ORR 36%; NCCN Cat 2A) — REMS required; accessible in Ukraine if REMS feasible
  3. Temozolomide ± rituximab (ORR ~31-53%; NCCN Cat 2B) — most accessible in Ukraine via brain tumor NSZU pathway

  BBB PENETRATION:
  Temozolomide crosses the blood-brain barrier efficiently (lipophilic alkylating
  prodrug; oral bioavailability ~100%; CSF:plasma ratio ~20-40%). This is a key
  advantage for CNS lymphoma compared to most IV chemotherapy agents.

  MECHANISM RATIONALE POST-HD-MTX:
  HD-MTX (1L) acts via folate pathway inhibition. Temozolomide uses a completely
  different DNA-alkylation mechanism (O6-methylguanine) → no anticipated cross-
  resistance to prior MTX. MGMT expression determines resistance to O6-methylation;
  PCNSL MGMT promoter methylation prevalence is ~30-50% (poorly characterized) —
  empiric use without MGMT testing is standard in this setting.

  UKRAINE ACCESS RATIONALE:
  Both ibrutinib (not registered for PCNSL indication) and lenalidomide (REMS +
  variable NSZU access) face significant access barriers. Temozolomide (Temodal /
  Temo C; generic capsules) is registered and NSZU-reimbursed for brain tumors.
  An MDT authorization note framing PCNSL as a "CNS tumor requiring TMZ" can
  unlock the existing brain tumor formulary pathway in most Ukrainian oncology
  centers that treat glioblastoma.

rationale_ua: >
  Темозоломід (± ритуксимаб) для рецидивної/рефрактерної ПЛЦНС, коли
  ібрутиніб і R² недоступні або протипоказані.
  Схема: ТМЗ 150 мг/м² перорально д1-5 q28д; за наявності CD20+ та
  доступності ритуксимабу → R-ТМЗ (ритуксимаб 375 мг/м² д1 q28д + ТМЗ).
  Докази: Enting 2004 (J Neurooncol; ЗВ ~31%); Reni 2004 (Cancer; R-ТМЗ; ЗВ ~53%).
  NCCN Cat 2B. Низька токсичність: Grade ≥3 ПЕ ~15-20%.
  ПЕРЕВАГА В УКРАЇНІ: Темозоломід зареєстрований і відшкодовується НСЗУ для
  пухлин мозку (ГБМ). Використання при ПЛЦНС є офлейбельним, але доступним
  через програму фінансування пухлин ЦНС при авторизації MDT/ТМК.
  ПЦП-профілактика: ко-тримоксазол 160/800 мг 3×/тиж. МРТ мозку q2 цикли.

ukrainian_review_status: pending_clinical_signoff
