notes: >
  NAPOLI-1 (PMID 26524560) is the landmark RCT establishing nal-IRI+5-FU/LV as
  Category 1 2L post-gemcitabine mPDAC. FDA approved October 2015 (ONIVYDE).
  ONIVYDE not registered in Ukraine — significant access barrier. FOLFOX or
  modified FOLFOX (NCCN-listed 2L option) is the accessible fallback.
  Algorithm partner: ALGO-PDAC-METASTATIC-2L routes by prior 1L backbone.
