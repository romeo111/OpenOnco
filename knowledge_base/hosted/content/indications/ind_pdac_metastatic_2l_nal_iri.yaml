do_not_do:
- "Не призначати при загальному білірубіні >2× ULN — спочатку дренувати жовчну обструкцію; іринотекан є гепатично метаболізованим"
- "Не використовувати nal-IRI монотерапію (без 5-FU/LV) — NAPOLI-1 монотерапевтична рука НЕ показала ЗВ-переваги (HR 0.99)"
- "Не призначати після FOLFIRINOX-базованої 1L — призначити гемцитабін ± наб-паклітаксел як 2L (перехресна резистентність по іринотекан/5-FU можлива)"
- "Не пропускати профілактику пізньої діареї лоперамідом — Grade 3-4 у ~13%; пацієнт повинен мати лоперамід вдома та знати схему"
- "Не починати при відсутності судинного доступу (PICC або порт) для 46-годинної CI 5-FU"

known_controversies:
- topic: "Nal-IRI+5-FU/LV vs FOLFOX in 2L post-gemcitabine PDAC"
  positions:
  - position: "Nal-IRI+5-FU/LV is FDA-approved (Category 1) with phase 3 RCT data vs FOLFOX which has only retrospective/phase 2 data in 2L"
    sources:
    - SRC-NAPOLI1-WANG-GILLAM-2016
    - SRC-NCCN-PANCREATIC-2025
  - position: "FOLFOX (oxaliplatin+5-FU/LV) is an accessible alternative when ONIVYDE is unavailable — NCCN listed as 2L option"
    sources:
    - SRC-NCCN-PANCREATIC-2025
  our_default: "Nal-IRI+5-FU/LV if accessible (ONIVYDE); FOLFOX or modified FOLFOX if nal-IRI unavailable (Ukraine access barrier)"
  rationale: "ONIVYDE is not registered in Ukraine; FOLFOX is the accessible alternative with lower evidence quality"

time_critical: false
