rationale: >
  Nal-IRI (nanoliposomal irinotecan, ONIVYDE) + 5-FU/LV is the FDA-approved
  (October 2015) and NCCN Category 1 2L regimen for mPDAC after gemcitabine-
  based 1L therapy, based on NAPOLI-1 (Wang-Gillam, Lancet 2016, n=417,
  phase 3 RCT). Nal-IRI+5-FU/LV improved mOS 6.1 vs 4.2 mo (HR 0.67,
  p=0.012) and mPFS 3.1 vs 1.5 mo (HR 0.56) vs 5-FU/LV alone. ORR 16%
  vs 1% (post-gemcitabine). Nal-IRI monotherapy arm (without 5-FU/LV) did
  NOT demonstrate OS benefit (HR 0.99) — combination required. Mechanism:
  ONIVYDE (PEGylated liposomal irinotecan) delivers higher intra-tumoral
  SN-38 concentrations vs conventional irinotecan; SN-38 is a potent
  topoisomerase I inhibitor. Post-FOLFIRINOX-based 1L: gemcitabine±nab-
  paclitaxel is preferred 2L (cross-resistance with nal-IRI + 5-FU backbone
  possible if FOLFIRINOX was 1L). BRCA1/2-germline patients: olaparib
  maintenance after ≥16 weeks platinum-1L (POLO trial) is a separate indication
  (IND-PDAC-MAINTENANCE-OLAPARIB-BRCA).

rationale_ua: >
  Nal-IRI (наноліпосомальний іринотекан, ONIVYDE) + 5-FU/LV є FDA-схваленим
  (жовтень 2015) та NCCN Категорія 1 2L режимом для мПДАК після гемцитабін-
  базованої 1L терапії, на підставі NAPOLI-1 (Wang-Gillam, Lancet 2016, n=417,
  фаза 3 РКД). Nal-IRI+5-FU/LV покращив mOS 6.1 проти 4.2 міс. (HR 0.67,
  p=0.012) та mPFS 3.1 проти 1.5 міс. (HR 0.56) проти 5-FU/LV монотерапії.
  ORR 16% проти 1% (після гемцитабіну). Nal-IRI монотерапія (без 5-FU/LV)
  НЕ продемонструвала ЗВ-переваги (HR 0.99) — комбінація є обов'язковою.
  Після FOLFIRINOX-базованої 1L: гемцитабін±наб-паклітаксел — кращий 2L
  (перехресна резистентність з nal-IRI + 5-FU базовою схемою можлива якщо
  FOLFIRINOX — 1L). BRCA1/2 герміногенна лінія: оларапіб (olaparib) підтримуюча
  терапія після ≥16 тижнів платиновою 1L (POLO) — окрема показа
  (IND-PDAC-MAINTENANCE-OLAPARIB-BRCA).
