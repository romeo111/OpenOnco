  - source_id: SRC-NCCN-BCELL-2025
    position: supports

do_not_do:
  - "Не призначати пембролізумаб при попередній анти-ПД-1/ПД-Л1 терапії — перехресна резистентність"
  - "Не ігнорувати попередню RT середостіння — підвищений ризик радіаційного recall пневмоніту при ICI"
  - "Не призначати при ECOG ≥3 або активній автоімунній хворобі з потребою в системній ГКС"
  - "Перевірити HBsAg + anti-HBc — реактивація гепатиту B можлива під ICI"
  - "При трансплант-придатних пацієнтах → R-ICE→аутоТКМ залишається пріоритетним (куративний намір); пембролізумаб для трансплант-нездатних"

