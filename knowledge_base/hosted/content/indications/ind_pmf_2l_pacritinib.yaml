do_not_do:
  - "НЕ призначати без базового ЕКГ + електроліти (K+, Mg²+) — QTc подовження ризик"
  - "НЕ застосовувати з сильними інгібіторами CYP3A4 без редукції дози до 100 мг BID"
  - "НЕ застосовувати з сильними індукторами CYP3A4 (рифампіцин, фенітоїн) — значно знижує AUC"
  - "НЕ застосовувати при активній неконтрольованій кровотечі"
  - "НЕ ігнорувати діарею — лоперамід з першого дня; проактивне управління"
  - "НЕ пропускати CBC q2 тижні протягом 3 місяців — парадоксальне погіршення тромбоцитопенії ~15%; редукція дози при PLT <25K"
  - "НЕ забувати скринінг HBV / HCV / HIV перед початком"
  - "НЕ ігнорувати alloHCT pathway для transplant-eligible — пакритиніб не є куративним"
  - "НЕ підтверджувати план без funding pathway — не зареєстрований в Україні"

sources:
  - source_id: SRC-NCCN-MPN-2025
    position: supports
    relevant_quote_paraphrase: >
      Pacritinib 200 mg BID is NCCN Category 1 for intermediate or high-risk primary or
      secondary MF with platelet count <50×10⁹/L after prior therapy (PERSIST-2;
      Harrison 2018 JAMA Oncol; FDA approval February 2022).

known_controversies:
  - topic: "Pacritinib vs momelotinib for plt <50K MF with concurrent anemia"
    positions:
      - position: "Pacritinib — only option specifically approved and trial-powered in plt <50K; PERSIST-2 directly powered for this population; no JAK1 inhibition preserves platelet count"
        sources: [SRC-NCCN-MPN-2025]
      - position: "Momelotinib — has dose-adjustment guidance for plt <50K; addresses anemia via ACVR1 inhibition; may be considered for anemia-dominant thrombocytopenic MF if pacritinib inaccessible"
        sources: [SRC-NCCN-MPN-2025]
    our_default: "Pacritinib for plt <50K (only JAKi approved and trial-powered in this subpopulation; NCCN Cat 1). Momelotinib fallback only if pacritinib inaccessible (access barrier in Ukraine context)."
    rationale: "NCCN Cat 1 and FDA approval are specific to plt <50K — pacritinib is the preferred and guideline-recommended choice. Momelotinib fallback documented for Ukraine access constraint."

