  - "Electrolytes (K+, Mg²+) — baseline + monthly for QTc management"
  - "Spleen volume by MRI or ultrasound — baseline for SVR35 response monitoring"
  - "JAK2 V617F allele burden — optional prognostic; does not gate treatment"

rationale: >
  Pacritinib (Vonjo) is the only JAK inhibitor approved specifically for patients with
  severe thrombocytopenia (platelet count <50×10⁹/L) — the dominant unmet need in
  this subpopulation where ruxolitinib and fedratinib are contraindicated or poorly
  tolerated due to myelosuppression driven by JAK1 inhibition.

  CRITICAL PHARMACOLOGICAL DISTINCTION: Pacritinib inhibits JAK2 (primary target; blocks
  JAK2 V617F and CALR/MPL-driven signaling), FLT3, and IRAK1 with MINIMAL JAK1
  inhibitory activity. JAK1 inhibition is responsible for myelosuppression and
  thrombocytopenia caused by ruxolitinib and fedratinib. The absence of significant
  JAK1 inhibition allows effective JAK2 blockade without worsening thrombocytopenia —
  enabling use in the plt <50K patient where all other approved JAKi options are unsafe.
  FLT3 inhibition contributes to blast suppression.

  PERSIST-2 (Harrison et al., JAMA Oncol 2018; phase 3 RCT; N=311): Combined pacritinib
  arms vs BAT (ruxolitinib permitted as BAT): SVR35 18% vs 3% (p=0.001); TSS50 34% vs
  11%. Pre-specified plt <50K subgroup confirmed preferential activity: SVR35 23% vs 3%;
  TSS50 36% vs 9%. FDA granted accelerated approval February 28, 2022 specifically for
  intermediate or high-risk primary or secondary MF with plt <50×10⁹/L after prior therapy.
  PAC203 dose-optimization (Oh 2020 Blood) established 200 mg BID as preferred dose over
  400 mg QD (superior tolerability, non-inferior efficacy). NCCN MPN 2025 Category 1.

  KEY SAFETY ADVANTAGE: No thiamine (vitamin B1) requirement — fedratinib carries a boxed
  warning for Wernicke encephalopathy (fatal cases documented); pacritinib has no such risk.

  UKRAINE CONTEXT: Not registered (EMA also not approved as of 2026). Named-patient import
  or compassionate-use program required. Significant access barrier — document explicitly
  when recommending. AlloHCT remains concurrent curative-intent pathway for eligible patients.

rationale_ua: >
  Пакритиніб (Vonjo) — єдиний JAK-інгібітор, схвалений специфічно для пацієнтів з
  тяжкою тромбоцитопенією (тромбоцити <50×10⁹/л) — основна незадоволена потреба
  де руксолітиніб і федратиніб протипоказані через мієлосупресію, зумовлену
  інгібуванням JAK1.

  КЛЮЧОВА ФАРМАКОЛОГІЧНА ВІДМІННІСТЬ: Пакритиніб інгібує JAK2, FLT3 та IRAK1 з
  МІНІМАЛЬНОЮ активністю щодо JAK1. Відсутність інгібування JAK1 дозволяє ефективне
  блокування JAK2 без погіршення тромбоцитопенії.

  PERSIST-2 (Harrison et al., JAMA Oncol 2018; n=311): SVR35 23% проти 3% у підгрупі
  тромбоцити <50 000; TSS50 36% проти 9%. Прискорене схвалення FDA лютий 2022.
  NCCN MPN 2025 Категорія 1 для тромбоцити <50 000.

  КЛЮЧОВА ПЕРЕВАГА БЕЗПЕКИ: не потребує тіаміну (на відміну від федратинібу з boxed
  warning для Wernicke енцефалопатії). В Україні не зареєстрований — необхідне
  ввезення за іменним призначенням.

