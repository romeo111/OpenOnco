id: IND-PMF-2L-PACRITINIB
plan_track: aggressive

applicable_to:
  disease_id: DIS-PMF
  line_of_therapy: 2
  stage_requirements:
    - "Symptomatic intermediate-1/intermediate-2/high-risk primary or secondary MF (post-PV/ET MF)"
    - "Relapsed/refractory or intolerant to prior ruxolitinib (or other JAK inhibitor)"
    - "Platelet count <50×10⁹/L (severe thrombocytopenia — defining eligibility criterion)"
    - "ECOG PS 0-3 (PERSIST-2 enrolled broad performance status including ECOG 3)"
    - "No active uncontrolled bleeding"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3
    notes: >
      PERSIST-2 enrolled patients with ECOG 0-3 and platelet count <100×10⁹/L
      (plt <50K pre-specified subgroup). FDA approval specifically for plt <50×10⁹/L.
      Pacritinib is the only approved JAKi validated in this thrombocytopenic population.

recommended_regimen: REG-PACRITINIB-PMF
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "SVR35 (≥35% spleen volume reduction) at week 24: 23% pacritinib vs 3% BAT in plt <50K subgroup (PERSIST-2)"
  complete_response: "N/A — primary endpoint is SVR35; CR not applicable in MF response criteria"
  progression_free_survival: "TSS50 (≥50% symptom score reduction) 36% vs 9% BAT (plt <50K subgroup, PERSIST-2)"
  notes: >
    PRIMARY EVIDENCE: PERSIST-2 (Harrison et al., JAMA Oncol 2018; phase 3 RCT; N=311):
    - Pacritinib 200 mg BID vs 400 mg QD vs BAT (ruxolitinib permitted as BAT component)
    - Platelet count <100×10⁹/L enrolled; plt <50×10⁹/L pre-specified subgroup
    - Combined pacritinib arms vs BAT: SVR35 18% vs 3% (p=0.001); TSS50 34% vs 11%
    - Plt <50K subgroup: SVR35 23% vs 3%; TSS50 36% vs 9%
    - PAC203 dose-optimization (Oh 2020 Blood): 200 mg BID preferred over 400 mg QD (superior
      tolerability, comparable efficacy — higher GI toxicity with 400 mg QD arm)
    - FDA accelerated approval February 28, 2022 for plt <50K after prior therapy
    - NCCN MPN 2025 Category 1

hard_contraindications:
  - "Active uncontrolled bleeding — thrombocytopenia-related hemorrhage risk precludes initiation"
  - "Strong CYP3A4 inhibitors without dose adjustment (reduce to 100 mg BID if unavoidable)"
  - "Strong CYP3A4 inducers (rifampicin, phenytoin) — avoid; significantly reduces pacritinib AUC"
  - "QTc >500 ms at baseline without correction of reversible causes"

red_flags_triggering_alternative:
  - RF-PMF-BLAST-PROGRESSION
  - RF-PMF-HIGH-RISK-DIPSS

