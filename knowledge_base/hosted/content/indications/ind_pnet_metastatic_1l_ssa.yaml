id: IND-PNET-METASTATIC-1L-SSA
plan_track: standard

applicable_to:
  disease_id: DIS-PNET
  line_of_therapy: 1
  stage_requirements:
    - "Well-differentiated, unresectable or metastatic G1/G2 pancreatic neuroendocrine tumor (pNET; Ki67 ≤20%)"
    - "SSTR2 expression confirmed by imaging (Ga-68-DOTATATE PET-CT positive OR In-111-octreotide scintigraphy positive)"
    - "Low to intermediate tumor burden (no rapidly progressive disease; hepatic replacement <50%)"
    - "ECOG PS 0-2"
    - "No history of cholelithiasis requiring immediate intervention (SSA → gallstone risk)"
    - "Functional NET (hormone-related symptoms: VIPoma, glucagonoma, etc.) OR non-functional SSTR2+"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    notes: >
      CLARINET enrolled G1/G2 GEP-NET (pNET and midgut NET combined; Ki67 <10% in 96%
      of patients) with ECOG 0-2 and stable/asymptomatic disease at baseline.
      SSA is appropriate for indolent G1/G2 pNET where tumor doubling time is long
      (>12-24 months radiologically). For rapidly progressive pNET (doubling time
      <12 months, high hepatic burden ≥50%), sunitinib or everolimus may be preferred
      over SSA alone (higher cytostatic activity). Functional pNET (insulinoma,
      glucagonoma, VIPoma, gastrinoma): SSA provides symptom relief AND antiproliferative
      effect — doubly indicated. Non-functional SSTR2+: antiproliferative benefit only.

recommended_regimen: REG-LANREOTIDE-PNET
concurrent_therapy:
  - "Octreotide 50-100 μg SC rescue doses for acute carcinoid-type syndrome / hormonal crises (if functional NET)"
  - "Pancreatic enzyme replacement therapy (PERT; e.g., pancrelipase) if exocrine insufficiency / steatorrhea develops"
  - "Proton pump inhibitor if gastrinoma (Zollinger-Ellison) component — high-dose omeprazole or pantoprazole"
  - "Glucose monitoring: insulin adjustment as needed (SSA inhibits both insulin and glucagon)"

followed_by:
  - "CT chest/abdomen/pelvis q3-6 months (RECIST 1.1; NCI modified RECIST for NET if PET-avid)"
  - "CgA (chromogranin A) q3 months — tumor marker; correlates with response"
  - "Abdominal ultrasound q6-12 months (gallstone monitoring)"
  - "At radiologic progression: add sunitinib (IND-PNET-METASTATIC-1L-SUNITINIB) or everolimus (IND-PNET-METASTATIC-1L-EVEROLIMUS) to ongoing SSA — combination preferred over switch in low-burden progressors"
  - "PRRT (lutetium-177-DOTATATE; NETTER-1; Cat 1 for SSTR+ midgut NET) — consider if SSTR+ and adequate renal function; outside KB (DRUG-LUTETIUM-177-DOTATATE not yet authored)"

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~3% (CLARINET; predominantly stable disease; antiproliferative not cytotoxic)"
  complete_response: "<1% (SSA is cytostatic, not cytotoxic)"
  progression_free_survival: "Median PFS not reached in lanreotide arm at 24 months (CLARINET); 24-mo PFS rate 65.1% vs 33.0% placebo"
  overall_survival_5y: "Long-term OS benefit not established in RCT; registry data show 5y OS ~65-70% for G1/G2 pNET with multimodal management"
  notes: >
    PRIMARY EVIDENCE: CLARINET (Caplin 2014 NEJM; NCT00353496; Phase 3):
    - Lanreotide 120 mg SC q4w vs placebo; N=204; well/moderately-differentiated
      G1/G2 GEP-NET (48% pNET; 45% midgut NET; 7% other); ECOG 0-2; stable disease
    - 1° endpoint: PFS: lanreotide arm mPFS NR vs placebo mPFS 18.0 mo
    - HR 0.47 (95% CI 0.30–0.73; p<0.001)
    - 24-month PFS rate: 65.1% (lanreotide) vs 33.0% (placebo)
    - ORR 3% in lanreotide arm — SSA is cytostatic (stable disease), not cytotoxic
    - G3/G4 AEs similar between arms; well-tolerated
    - FDA approval August 2014; EMA approval older
    - NCCN NET 2025 Category 1 for unresectable/metastatic GEP-NET

    PNET-SPECIFIC SUBGROUP (CLARINET): pNET subgroup (N=97; ~48%):
    - HR for PFS in pNET subgroup similar to overall (HR ~0.58; interaction test NS)
    - Comparable benefit to midgut NET subgroup; confirms pNET-specific applicability

    PROMID (Rinke 2009 JCO; N=85): octreotide LAR 30 mg IM monthly for metastatic
    midgut NET (not pNET); mTTP 14.3 vs 6.0 months (HR 0.34); confirms SSA class effect
    in functional midgut NET. Cross-applies to pNET functional tumors.

    SSTR IMAGING IS ESSENTIAL: SSTR expression (SSTR2+/SSTR5+) should be confirmed
    before initiating antiproliferative SSA. SSTR-negative tumors (~5-10% of G1/G2
    NETs) do not respond to SSA antiproliferative effect (though symptom control for
    functional NETs may still benefit).

    UKRAINE CONTEXT: Lanreotide (Somatuline) is registered in Ukraine; NSZU
    reimbursement for pNET indication is limited. Octreotide LAR (NSZU-reimbursed
    for acromegaly) can be used off-label for pNET symptom control + antiproliferative
    at 20-30 mg IM monthly. Ga-68-DOTATATE PET is available at selected Ukrainian
    oncology centres (Kyiv, Lviv, Kharkiv); alternative: In-111-octreotide
    scintigraphy (OctreoScan) for SSTR confirmation.

hard_contraindications:
  - "SSTR-negative by functional imaging (Ga-68-DOTATATE PET or OctreoScan) — SSA antiproliferative unlikely; functional/symptom benefit may still exist"
  - "Poorly differentiated NEC (G3; Ki67 >20%) — SSA not antiproliferative in dedifferentiated tumors; chemotherapy required"
  - "Rapidly progressive pNET (doubling time <3 months; hepatic replacement >50%) — SSA alone insufficient; sunitinib/everolimus preferred"
  - "Prior SSA failure (disease progression on octreotide LAR or lanreotide) — class cross-resistance; switch to sunitinib or everolimus"

red_flags_triggering_alternative:
  - RF-NET-HIGH-GRADE-G3

required_tests:
  - TEST-CT-CHEST-ABDOMEN-PELVIS
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - "Ga-68-DOTATATE PET-CT OR In-111-octreotide scintigraphy (SSTR expression confirmation — mandatory before antiproliferative SSA)"
  - "CgA (chromogranin A) at baseline (tumor marker; treatment response tracking)"
  - "24h urinary 5-HIAA (if functional NET with serotonin symptoms; carcinoid syndrome)"
  - "Fasting blood glucose (glucose dysregulation baseline)"
  - "Abdominal ultrasound (gallstone baseline before long-term SSA)"
  - "Ki67 on biopsy (grade confirmation: G1 ≤2%, G2 3-20%, G3 >20%)"

desired_tests:
  - "Echocardiogram if carcinoid syndrome (right-sided cardiac valvulopathy in advanced functional midgut NET)"
  - "MRI abdomen (hepatic metastasis characterization; liver volumetrics)"
  - "CgA, NSE, pancreatic polypeptide (functional NET marker panel)"
  - "Fasting insulin + C-peptide if insulinoma suspected"

rationale: >
  Somatostatin analogs (SSA; octreotide LAR or lanreotide) are NCCN Category 1
  first-line options for unresectable or metastatic G1/G2 pancreatic and midgut
  NETs expressing somatostatin receptors (SSTR2+/SSTR5+). The CLARINET trial
  (Caplin 2014 NEJM) demonstrated superiority of lanreotide 120 mg SC q4w over
  placebo for progression-free survival (HR 0.47; mPFS NR vs 18.0 mo; 24-mo PFS
  65.1% vs 33.0%) in G1/G2 GEP-NET (including 48% pNET).

  SSA vs SUNITINIB/EVEROLIMUS IN PNET: SSA is preferred in:
  (1) Low/intermediate tumor burden with slowly progressive or stable disease
  (2) Functional pNET (symptomatic insulin/VIP/glucagon/gastrin excess) — dual benefit
  (3) SSTR2+ G1 tumors (Ki67 ≤2%) where indolent biology makes aggressive TKI less urgent
  (4) Patient preference for low-toxicity SC monthly injection over daily oral TKI

  Sunitinib or everolimus preferred over SSA alone when:
  (1) Rapidly progressive pNET (hepatic replacement >50%; short doubling time)
  (2) High tumor burden with symptomatic mass effect
  (3) Prior SSA failure
  (4) G2 (Ki67 10-20%) with aggressive features

  COMBINATION: SSA + sunitinib or SSA + everolimus is common clinical practice
  (SSA maintained for functional control even when targeted therapy added). The
  current KB models these as separate 1L options; oncologists often combine.

  UKRAINE CONTEXT: Lanreotide registered; NSZU funding variable for pNET.
  Octreotide LAR (Sandostatin; NSZU-reimbursed for acromegaly) is the practical
  UA fallback — same SSA class, off-label for pNET at 20-30 mg IM monthly.
  Ga-68-DOTATATE PET available at major Ukrainian NET centres.

rationale_ua: >
  Аналоги соматостатину (SSA; ланреотид або октреотид LAR) — NCCN Кат 1 терапія
  першої лінії для G1/G2 GEP-NET (включно pNET) з позитивним SSTR2.
  CLARINET (Caplin 2014 NEJM): ланреотид 120 мг SC q4w; HR мПВБ 0,47; p<0,001;
  24-місячна ВБП 65,1% проти 33,0% плацебо. FDA серпень 2014. NCCN Кат 1.

  Перевага SSA: низька токсичність; подвійний ефект при функціональній NET
  (симптоматичний + антипроліферативний). Уникати при швидко прогресуючій
  або SSTR-негативній NET.

  Україна: ланреотид зареєстрований; НСЗУ — обмежено. Октреотид LAR
  (НСЗУ при акромегалії) — off-label фолбек для NET. Ga-68-DOTATATE ПЕТ
  доступне в провідних центрах.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

do_not_do:
  - "НЕ починати SSA без підтвердження SSTR-позитивності — SSTR-негативна NET не отримає антипроліферативного ефекту"
  - "НЕ застосовувати при G3/погано диференційованій NEC — SSA неефективний; потрібна хіміотерапія (EP/IP)"
  - "НЕ ігнорувати жовчнокам'яну хворобу — УЗД черевної порожнини q6-12 міс."
  - "НЕ відкладати додавання сунітинібу/евероліму при прогресуванні — SSA часто комбінується з таргетною терапією при прогресії"
  - "НЕ застосовувати при дуже швидкому прогресуванні (заміна печінки >50%) — ефект SSA недостатній; таргетна терапія переважна"
  - "НЕ скасовувати SSA при переході на сунітиніб/евероліміс — SSA часто продовжується паралельно для симптоматичного контролю"

sources:
  - source_id: SRC-NCCN-NET-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN Neuroendocrine Tumors 2025 Category 1: lanreotide 120 mg SC q4w
      (CLARINET Caplin 2014 NEJM; HR 0.47; mPFS NR vs 18.0 mo) for unresectable
      or metastatic well/moderately-differentiated GEP-NET. Octreotide LAR 20-30 mg
      IM monthly also endorsed (PROMID Rinke 2009 JCO for midgut NET; Cat 1).
      SSA are first-line options for SSTR2+ G1/G2 NETs with low-intermediate
      tumor burden. For pNET: sunitinib and everolimus are equivalent Cat 1 options.

known_controversies:
  - topic: "SSA vs sunitinib vs everolimus as 1L for G1/G2 pNET"
    positions:
      - position: "SSA (lanreotide/octreotide LAR) — NCCN Cat 1; CLARINET PFS HR 0.47; low toxicity; dual functional + antiproliferative; preferred for indolent disease; monthly SC injection"
        sources: [SRC-NCCN-NET-2025]
      - position: "Sunitinib — NCCN Cat 1; SUN1111 HR 0.42; pNET-specific; better for high-burden progressive disease; daily oral; cardiac monitoring"
        sources: [SRC-NCCN-NET-2025]
      - position: "Everolimus — NCCN Cat 1; RADIANT-3 HR 0.35; mTOR; preferred if cardiac-impaired or prior VEGFR-TKI; stomatitis + hyperglycemia profile"
        sources: [SRC-NCCN-NET-2025]
    our_default: "SSTR2+ G1/G2 pNET with low tumor burden: SSA preferred (low toxicity; Cat 1; CLARINET). Rapidly progressive or high burden: sunitinib (preferred cardiac-adequate) or everolimus (cardiac-impaired). SSA often combined with targeted therapy at progression."

