    position: supports
    relevant_quote_paraphrase: >
      NCCN Neuroendocrine Tumors 2025 Category 1: sunitinib 37.5 mg PO continuously
      for progressive well-differentiated G1/G2 pNET (SUN1111 Raymond 2011 NEJM basis).
      Equivalent recommendation alongside everolimus; no head-to-head; clinical selection
      based on toxicity profile.

do_not_do:
  - "Сунітиніб 50 мг 4-тиж/2-тиж (режим НКК) при pNET: НЕПРАВИЛЬНО — доза 37.5 мг/добу безперервно (SUN1111)"
  - "При погано диференційованому NEC (Ki67 >55%): сунітиніб неефективний; платина+етопозид"
  - "Без ЕхоКГ: сунітиніб → кардіотоксичність; базальна ФВЛШ перед стартом ОБОВ'ЯЗКОВО"
  - "Без моніторингу ТТГ: гіпотиреоз у 29%; замісна терапія левотироксином при ТТГ >5 мО/л"

