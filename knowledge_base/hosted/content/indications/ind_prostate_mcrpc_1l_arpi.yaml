id: IND-PROSTATE-MCRPC-1L-ARPI
plan_track: standard

applicable_to:
  disease_id: DIS-PROSTATE
  disease_state: mCRPC
  line_of_therapy: 1
  stage_requirements: ["IV"]
  biomarker_requirements_required:
    - biomarker_id: BIO-GLEASON-ISUP
      required: true
      value_constraint: "Gleason / ISUP grade group (1-5) — mandatory pathologic stratifier across all prostate cancer indications"
    - biomarker_id: BIO-PSA
      required: true
      value_constraint: "PSA baseline + on-treatment per PCWG3 — mandatory response/progression marker; reportable across all systemic prostate indications"
  biomarker_requirements_excluded:
    - biomarker_id: BIO-HRR-PANEL
      value_constraint: "positive"
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-ADT-ENZALUTAMIDE
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate:
    value: "PSA decline ≥50% in ~78%"
    source: SRC-NCCN-PROSTATE-2025
    notes: "NCCN Prostate 2025 Cat 1: ARPI (enzalutamide/abiraterone/darolutamide) 1L mCRPC; PSA50 response ~78% across pivotal ARPI mCRPC trials (PROSPER, ARAMIS, SPARTAN)"
  median_radiographic_pfs_months:
    value: "20"
    source: SRC-NCCN-PROSTATE-2025
    notes: "NCCN Prostate 2025: median rPFS ~20 months with 2nd-gen ARPI in mCRPC 1L setting; varies by prior ARPI exposure and disease volume"
  median_overall_survival_months:
    value: "35"
    source: SRC-NCCN-PROSTATE-2025
    notes: "NCCN Prostate 2025 synthesis: median OS ~35 months with ARPI 1L in mCRPC; outcomes substantially better in ARPI-naive vs post-mHSPC-ARPI patients"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-PROSTATE-HIGH-RISK-BIOLOGY
  - RF-PROSTATE-PSA-PROGRESSION
required_tests:
  - TEST-PSA-SERUM
  - TEST-TESTOSTERONE-SERUM
  - TEST-BONE-SCAN
  - TEST-GERMLINE-BRCA-PANEL
desired_tests:
  - TEST-PSMA-PET
  - TEST-SOMATIC-HRR-PANEL

sources:
  - source_id: SRC-NCCN-PROSTATE-2025
    weight: primary
  - source_id: SRC-ESMO-PROSTATE-2024
    weight: primary

last_reviewed: null
reviewers: []

notes: >
  Workhorse mCRPC 1L for non-HRR-mutant disease with prior ADT exposure.
  Patients ARPI-naive (rare in modern era — most have had ARPI in mHSPC):
  enzalutamide / abiraterone preferred. Patients with prior ARPI: switch
  ARPI not generally recommended; consider docetaxel, PARPi (if HRR+),
  or Lu-PSMA (if PSMA-PET+).
