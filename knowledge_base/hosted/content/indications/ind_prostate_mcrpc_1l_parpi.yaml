id: IND-PROSTATE-MCRPC-1L-PARPI
plan_track: aggressive

applicable_to:
  disease_id: DIS-PROSTATE
  disease_state: mCRPC
  line_of_therapy: 1
  stage_requirements: ["IV"]
  biomarker_requirements_required:
    - biomarker_id: BIO-HRR-PANEL
      value_constraint: "positive"
      required: true
    - biomarker_id: BIO-GLEASON-ISUP
      required: true
      value_constraint: "Gleason / ISUP grade group (1-5) — mandatory pathologic stratifier across all prostate cancer indications"
    - biomarker_id: BIO-PSA
      required: true
      value_constraint: "PSA baseline + on-treatment per PCWG3 — mandatory response/progression marker; reportable across all systemic prostate indications"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-OLAPARIB-MONO
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate:
    value: "Confirmed objective response ~33% in BRCA-mutant"
    source: SRC-PROFOUND-DEBONO-2020
    notes: "PROfound (de Bono 2020 NEJM): olaparib vs enzalutamide/abiraterone post-ARPI in HRR-mutant mCRPC; confirmed objective response 33% (BRCA1/2 Cohort A); broader HRR Cohort B lower response"
  median_radiographic_pfs_months:
    value: "7.4"
    source: SRC-PROFOUND-DEBONO-2020
    notes: "PROfound: median rPFS 7.4 months olaparib vs 3.6 months control in Cohort A (BRCA1/2-mutant mCRPC post-ARPI); HR 0.34"
  median_overall_survival_months:
    value: "19"
    source: SRC-PROFOUND-DEBONO-2020
    notes: "PROfound: median OS 19.1 months olaparib vs 14.7 months control in Cohort A (crossover-adjusted); HR 0.69"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-PROSTATE-PSA-PROGRESSION
required_tests:
  - TEST-PSA-SERUM
  - TEST-TESTOSTERONE-SERUM
  - TEST-BONE-SCAN
  - TEST-GERMLINE-BRCA-PANEL
  - TEST-SOMATIC-HRR-PANEL
desired_tests:
  - TEST-PSMA-PET

sources:
  - source_id: SRC-NCCN-PROSTATE-2025
    weight: primary
  - source_id: SRC-ESMO-PROSTATE-2024
    weight: primary
  - source_id: SRC-PROFOUND-DEBONO-2020
    position: supports
    relevant_quote_paraphrase: "PROfound phase-3: olaparib vs enzalutamide/abiraterone post-ARPI in HRR-mutant mCRPC; rPFS 7.4 vs 3.6 mo (HR 0.34) and OS 19.1 vs 14.7 mo (HR 0.69) in BRCA1/2 Cohort A"

last_reviewed: null
reviewers: []

notes: >
  PROfound: olaparib post-ARPI in HRR-mutant mCRPC. BRCA1/2 (Cohort A)
  largest benefit; broader HRR (Cohort B) smaller benefit. Talazoparib
  + enzalutamide (TALAPRO-2) and niraparib + abiraterone (MAGNITUDE)
  alternative HRR-mutant regimens. Reimbursement gap in Ukraine for
  prostate-specific PARPi indication.
