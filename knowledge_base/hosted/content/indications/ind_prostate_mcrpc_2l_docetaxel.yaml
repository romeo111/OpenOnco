id: IND-PROSTATE-MCRPC-2L-DOCETAXEL
plan_track: standard

applicable_to:
  disease_id: DIS-PROSTATE
  disease_state: mCRPC
  line_of_therapy: 2
  stage_requirements:
  - "Metastatic castration-resistant prostate cancer (mCRPC)"
  - "Progressive disease on ARPI (enzalutamide, abiraterone, darolutamide, or apalutamide)"
  - "Taxane-naive — no prior docetaxel or cabazitaxel at any prior line"
  - "ECOG PS 0-2"
  biomarker_requirements_required:
  - biomarker_id: BIO-PSA
    value_constraint: "PSA baseline required (PCWG3 response/progression assessment)"
  - biomarker_id: BIO-GLEASON-ISUP
    value_constraint: "Gleason / ISUP grade group — mandatory pathologic stratifier"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-DOCETAXEL-MCRPC
concurrent_therapy:
- "Ongoing ADT (castration-level testosterone maintained throughout)"
followed_by:
- "Cabazitaxel (IND-PROSTATE-MCRPC-2L-CABAZITAXEL) at progression after docetaxel"
- "Reassess PSMA-PET at progression — Lu-PSMA may be eligible post-docetaxel (VISION criteria met)"

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  os_hr_vs_mitoxantrone: 0.76
  median_os_months: "18.9 (TAX 327; mCRPC population)"
  psa_decline_50pct: "45% (TAX 327)"
  notes: >
    TAX 327 (Tannock 2004, NEJM; n=1006): docetaxel 75 mg/m² q21d + prednisone vs
    mitoxantrone + prednisone in mCRPC. Docetaxel q3w arm: mOS 18.9 vs 16.5 months
    (HR 0.76, p=0.009); PSA decline ≥50%: 45% vs 32%; pain palliation 35% vs 22%.
    This trial predates the mHSPC docetaxel era (CHAARTED/STAMPEDE); in 2026,
    most patients receive docetaxel in mHSPC (high-volume disease). The taxane-naive
    mCRPC population is therefore those who:
    (a) Had low-volume mHSPC and received ARPI alone in mHSPC, then progressed to mCRPC;
    (b) Deferred chemotherapy in mHSPC or mCRPC 1L (frailty, preference).
    TAX 327 data remain valid for guiding docetaxel in the taxane-naive mCRPC population.

hard_contraindications: []
