desired_tests: []
rationale: >
  TAX 327 (Tannock 2004, NEJM, n=1006): randomized mCRPC patients to docetaxel 75 mg/m²
  q3w + prednisone vs mitoxantrone + prednisone. Docetaxel q3w: OS HR 0.76 (18.9 vs 16.5m,
  p=0.009). NCCN Category 1.
  In the taxane-naive mCRPC patient who has progressed on ARPI (1L mCRPC setting),
  docetaxel is the standard chemotherapy backbone. ARPI cross-resistance (AR pathway
  convergence) limits utility of second ARPI; docetaxel's tubulin-polymerization mechanism
  is independent of androgen receptor pathway. After docetaxel completion, cabazitaxel
  (CARD: OS HR 0.64 vs second ARPI post-docetaxel) is the preferred subsequent line.
  Mandatory ADT continuation throughout — castration is backbone of mCRPC management.

rationale_ua: >
  TAX 327 (Tannock 2004, NEJM; n=1006): доцетаксел 75 мг/м² q3w + преднізон;
  OS HR 0.76 (18.9 vs 16.5 міс, p=0.009) vs мітоксантрон + преднізон. NCCN Категорія 1.
  Для таксан-наївних пацієнтів mCRPC, що прогресують на АРПІ: доцетаксел є
  стандартом 2L хіміотерапії. Перехресна резистентність АРПІ обмежує ефективність
  другого АРПІ. ГДТ (АДТ) продовжується протягом усього курсу.
  Після доцетакселю: кабазитаксел (CARD: OS HR 0.64 vs другий АРПІ).
  Визначення HRR/BRCA ОБОВ'ЯЗКОВЕ — PARPi переважніший при мутаціях BRCA1/2.

