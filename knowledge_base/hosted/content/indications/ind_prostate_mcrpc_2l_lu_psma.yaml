id: IND-PROSTATE-MCRPC-2L-LU-PSMA
plan_track: standard

applicable_to:
  disease_id: DIS-PROSTATE
  disease_state: mCRPC
  # line_of_therapy intentionally unset: used by algorithms of different LOTs; algorithm is routing authority.
  stage_requirements:
    - "Metastatic castration-resistant prostate cancer (mCRPC)"
    - "PSMA-PET/CT positive: all metastatic lesions must be PSMA-avid"
    - "No PSMA-negative sites with metastasis (liver is highest-risk organ for PSMA-neg disease)"
    - "Prior ARPI (enzalutamide, abiraterone, darolutamide, or apalutamide) — at least 1 line"
    - "Prior taxane-based chemotherapy (docetaxel) — at least 1 line; OR taxane-ineligible"
    - "ECOG PS 0-2"
  biomarker_requirements_required:
    - biomarker_id: BIO-PSMA-PET
      value_constraint: "PSMA-PET/CT POSITIVE — MANDATORY (68Ga-PSMA-11 or 18F-DCFPyL preferred)"
      required: true
    - biomarker_id: BIO-PSA
      value_constraint: "PSA baseline required (PCWG3 response/progression assessment)"
    - biomarker_id: BIO-GLEASON-ISUP
      value_constraint: "Gleason / ISUP grade group — mandatory pathologic stratifier"
  biomarker_requirements_excluded:
    - "PSMA-PET/CT negative — lutetium will not concentrate; do NOT treat"
    - "Any PSMA-negative metastatic site (mixed PSMA expression = exclusion per VISION protocol)"
    - "HRR/BRCA mutation without prior PARPi — PARPi preferred first (IND-PROSTATE-MCRPC-1L-PARPI)"
  demographic_constraints:
    ecog_max: 2
    notes: "VISION enrolled ECOG 0-2; ECOG 2 borderline — discuss at MDT"

recommended_regimen: REG-LUTETIUM-PSMA
concurrent_therapy:
  - "ADT (castration) must be maintained throughout"
followed_by:
  - "Post-Lu-PSMA: repeat PSMA-PET/CT at progression for re-staging"
  - "Clinical trial for post-Lu-PSMA progression (PSMA-targeted retreatment trials ongoing)"
  - "Cabazitaxel if not yet given (IND-PROSTATE-MCRPC-2L-CABAZITAXEL)"

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  os_hr: 0.62
  median_os_lu_psma_months: 15.3
  median_os_control_months: 11.3
  radiographic_pfs_hr: 0.40
  median_rpfs_lu_psma_months: 8.7
  median_rpfs_control_months: 3.4
  psa_decline_50pct: "~46%"
  notes: >
    VISION (Sartor 2021, NEJM; n=831): lutetium-PSMA-617 + standard care vs standard care
    alone in PSMA-PET-positive mCRPC post-ARPI + post-taxane. mOS 15.3 vs 11.3 months
    (HR 0.62, p<0.001); rPFS 8.7 vs 3.4 months (HR 0.40, p<0.001). NCCN Category 1.
    PSA decline ≥50% in ~46% of treated patients.
    PSMA-PET positivity is critical — PSMA-negative sites were an exclusion criterion in VISION.

hard_contraindications:
  - "PSMA-PET/CT negative — absolutely contraindicated"
  - "Any PSMA-negative metastatic site (mixed expression = exclusion)"
  - "Renal impairment severe (GFR <30 mL/min — lutetium renal excretion; nephrotoxicity risk)"
  - "Salivary gland radiation sensitivity (significant xerostomia risk — discuss with patient)"
  - "No nuclear medicine department with theranostics capability"

red_flags_triggering_alternative:
  - condition: "PSMA-PET negative → cabazitaxel (IND-PROSTATE-MCRPC-2L-CABAZITAXEL)"
  - condition: "Bone-predominant + no visceral mets → Ra-223 may be complementary or alternative (IND-PROSTATE-MCRPC-2L-RADIUM223)"
  - condition: "BRCA/HRR mutation not yet treated → PARPi first (IND-PROSTATE-MCRPC-1L-PARPI)"
  - condition: "Prior taxane-naive but ARPI-experienced: docetaxel before Lu-PSMA is considered standard sequencing per VISION inclusion criteria"

required_tests:
  - TEST-PSMA-PET
  - TEST-PSA-SERUM
  - TEST-CBC
  - TEST-CMP
  - "Renal function (GFR) — kidney is dose-limiting organ"
  - "HRR/BRCA1/2 somatic + germline (if not done)"
  - "CT CAP + bone scan (baseline)"

desired_tests:
  - "68Ga-PSMA-11 PET preferred (FDA-approved; higher resolution for PSMA-negative site detection)"
  - "18F-DCFPyL (Pylarify) — FDA-approved alternative"
  - "Salivary gland assessment (xerostomia risk stratification)"

rationale: >
  VISION (Sartor 2021, NEJM; n=831): lutetium-177-PSMA-617 (vipivotide tetraxetan, Pluvicto)
  + protocol-permitted standard therapy vs standard therapy alone in PSMA-PET-positive mCRPC
  after ≥1 ARPI and ≥1 taxane (or taxane-ineligible). mOS 15.3 vs 11.3 months (HR 0.62,
  p<0.001); rPFS 8.7 vs 3.4 months (HR 0.40). FDA approved March 2022 (Pluvicto).
  Lu-PSMA-617 is a PSMA-targeted radioligand therapy: the PSMA-targeting moiety delivers
  beta-emitting lutetium-177 to PSMA-expressing prostate cancer cells, causing DNA damage.
  PSMA-PET eligibility is paramount — any PSMA-negative lesion predicts a "bystander escape"
  mechanism that was an exclusion criterion in VISION.
  Ukraine access: major barrier — only 2-3 academic centers (Kyiv, Lviv) + international referral.
  PSMAfore (2023): Lu-PSMA-617 pre-taxane (after 1 ARPI) vs ARPI switch — rPFS HR 0.41;
  earlier line use emerging but not yet NCCN Category 1 standard.

rationale_ua: >
  VISION (n=831): Лютецій-177-PSMA-617 при PSMA-ПЕТ+ mCRPC після АРПІ + таксану.
  mOS 15.3 vs 11.3 міс (HR 0.62); rPFS 8.7 vs 3.4 міс (HR 0.40). NCCN Категорія 1.
  ОБОВ'ЯЗКОВО: PSMA-ПЕТ/КТ перед призначенням — PSMA-негативні осередки = протипоказання.
  Доступність в Україні дуже обмежена — 2-3 академічні центри або міжнародне направлення.
  PSMAfore (2023): ранніша лінія (після 1 АРПІ, до таксану) показала rPFS HR 0.41 — нові дані.

