notes: >
  REG-LUTETIUM-PSMA is the required regimen — 7.4 GBq IV q6w × 6 cycles per VISION.
  Dose calculated per cycle, not weight-based (unlike Ra-223).
  Dosimetry with each administration in specialized theranostics centers.
  Salivary gland and kidney uptake are dose-limiting organs — xerostomia is the
  most common non-hematologic Grade ≥3 adverse event (~7%).
  Bone marrow suppression: Grade 3/4 anemia ~12%, thrombocytopenia ~8%.
