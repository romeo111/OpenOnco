  - source_id: SRC-NCCN-PROSTATE-2025
    position: supports

do_not_do:
  - "НІКОЛИ не призначати без PSMA-ПЕТ/КТ-підтвердження — тільки PSMA-позитивна хвороба"
  - "Не призначати при будь-якому PSMA-негативному осередку метастазування"
  - "Не ігнорувати ниркову функцію — лютецій виводиться нирками; ГФК <30 = протипоказання"
  - "Не пропускати тестування HRR/BRCA до призначення — PARPi перевершує при BRCA1/2"
  - "Не призначати без підтримки ядерно-медичного відділу з радіотерапевтичною ліцензією"

known_controversies:
  - topic: "Lu-PSMA pre-taxane (PSMAfore) vs post-taxane (VISION) placement in sequence"
    positions:
      - position: "Post-taxane + post-ARPI: VISION evidence, NCCN Category 1 standard"
        sources: [SRC-VISION-PSMA-SARTOR-2021]
      - position: "Pre-taxane (post-ARPI, taxane-naive): PSMAfore rPFS HR 0.41 favors earlier use; not yet NCCN Cat 1"
    our_default: "Post-ARPI + post-taxane per VISION (NCCN Cat 1); PSMAfore pre-taxane emerging — discuss at MDT"

time_critical: false
