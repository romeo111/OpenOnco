sources:
  - source_id: SRC-NCCN-PROSTATE-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN Prostate 2025 Category 2A: pembrolizumab for patients with MSI-H/dMMR mCRPC
      at any line of therapy. Tumor-agnostic FDA approval applies. MMR/MSI testing
      recommended at mCRPC diagnosis alongside HRR/BRCA germline + somatic testing.
  - source_id: SRC-KEYNOTE158-ANAL-MARABELLE-2020
    position: supports
    relevant_quote_paraphrase: >
      KEYNOTE-158 (Marabelle 2020 Annals of Oncology; Le 2020 JAMA Oncology):
      pembrolizumab in MSI-H/dMMR solid tumors; overall basket ORR 34.3%; prostate
      cohort n=~30 ORR ~33%; mDOR not reached; led to FDA tumor-agnostic regular approval.

do_not_do:
  - "Без тестування МСН-В: пембролізумаб при МСС простаті — ВВО 3-5%; неефективний підхід"
  - "Відміна АДТ при пембролізумабі: кастраційний рівень тестостерону ПІДТРИМУВАТИ весь курс IO"
  - "ПСА як єдиний критерій відповіді: флеш ПСА (перші 8 тижнів) ≠ прогресування; використовуйте RECIST 1.1"
  - "Пембролізумаб при активному аутоімунному захворюванні на стероїдах: іРАЕ посилення"
  - "CDK12-мутовані пухлини: танdemduplicator-фенотип ≠ MSI-H; пембролізумаб неефективний"

