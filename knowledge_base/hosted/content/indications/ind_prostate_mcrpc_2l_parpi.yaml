id: IND-PROSTATE-MCRPC-2L-PARPI
plan_track: aggressive

applicable_to:
  disease_id: DIS-PROSTATE
  disease_state: mCRPC
  line_of_therapy: 2
  stage_requirements: ["IV"]
  biomarker_requirements_required:
    - biomarker_id: BIO-HRR-PANEL
      value_constraint: "positive"
      required: true
    - biomarker_id: BIO-GLEASON-ISUP
      required: true
      value_constraint: "Gleason / ISUP grade group (1-5)"
    - biomarker_id: BIO-PSA
      required: true
      value_constraint: "PSA baseline + on-treatment per PCWG3"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    prior_parpi_excluded: true

recommended_regimen: REG-OLAPARIB-MONO
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "Confirmed objective response ~33% in BRCA-mutant"
  median_radiographic_pfs_months: 7.4
  median_overall_survival_months: 19

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-PROSTATE-PSA-PROGRESSION
required_tests:
  - TEST-PSA-SERUM
  - TEST-TESTOSTERONE-SERUM
  - TEST-BONE-SCAN
  - TEST-GERMLINE-BRCA-PANEL
  - TEST-SOMATIC-HRR-PANEL
desired_tests:
  - TEST-PSMA-PET

sources:
  - source_id: SRC-NCCN-PROSTATE-2025
    weight: primary
  - source_id: SRC-ESMO-PROSTATE-2024
    weight: primary

last_reviewed: "2026-05-07"
reviewers: []

notes: >
  Same clinical PARPi concept as IND-PROSTATE-MCRPC-1L-PARPI, but authored
  as a 2L mCRPC indication so current-line rendering does not mix first-line
  and second-line labels. Applies when the patient is HRR/BRCA-mutant and
  PARPi-naive after prior mCRPC therapy.
