id: IND-PROSTATE-MHSPC-1L-TRIPLET
plan_track: aggressive

applicable_to:
  disease_id: DIS-PROSTATE
  disease_state: mHSPC
  line_of_therapy: 1
  stage_requirements: ["IV"]
  biomarker_requirements_required:
    - biomarker_id: BIO-GLEASON-ISUP
      required: true
      value_constraint: "Gleason / ISUP grade group (1-5) — mandatory stratifier; high-volume metastatic and high-grade (ISUP 4-5) supports triplet (ARASENS / PEACE-1)"
    - biomarker_id: BIO-PSA
      required: true
      value_constraint: "PSA baseline + on-treatment per PCWG3 — mandatory response/progression marker; reportable across all systemic prostate indications"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 1

recommended_regimen: REG-ADT-DAROLUTAMIDE-DOCETAXEL
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate:
    value: "PSA <0.2 ng/mL at 9 months in ~55-65%"
    source: SRC-ARASENS-SMITH-2022
    notes: "ARASENS (Smith 2022 NEJM): darolutamide + docetaxel + ADT vs ADT + docetaxel in mHSPC; PSA undetectable at 9 months ~55-65% with triplet"
  median_radiographic_pfs_months:
    value: "36"
    source: SRC-ARASENS-SMITH-2022
    notes: "ARASENS: time to CRPC 36.2 months triplet vs 11.2 months doublet; rPFS substantially longer with darolutamide + docetaxel + ADT"
  median_overall_survival_months:
    value: "Not yet reached (ARASENS final analysis pending)"
    source: SRC-ARASENS-SMITH-2022
    notes: "ARASENS (Smith 2022): OS HR 0.68 (p<0.001); median OS not yet reached in triplet arm at data cutoff; survival benefit clearly demonstrated"
  hr_overall_survival:
    value: "0.68"
    source: SRC-ARASENS-SMITH-2022
    notes: "ARASENS: OS HR 0.68 (95% CI 0.57-0.80; p<0.001) for darolutamide + docetaxel + ADT vs ADT + docetaxel in mHSPC"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-PROSTATE-FRAILTY-AGE
  - RF-PROSTATE-PSA-PROGRESSION
required_tests:
  - TEST-PSA-SERUM
  - TEST-TESTOSTERONE-SERUM
  - TEST-BONE-SCAN
  - TEST-GERMLINE-BRCA-PANEL
desired_tests:
  - TEST-PSMA-PET
  - TEST-SOMATIC-HRR-PANEL

sources:
  - source_id: SRC-NCCN-PROSTATE-2025
    weight: primary
  - source_id: SRC-ESMO-PROSTATE-2024
    weight: primary
  - source_id: SRC-ARASENS-SMITH-2022
    position: supports
    relevant_quote_paraphrase: "ARASENS phase-3 (Smith 2022 NEJM): darolutamide + docetaxel + ADT vs ADT + docetaxel in mHSPC; OS HR 0.68 (p<0.001); time to CRPC 36.2 vs 11.2 months; benchmark for ADT + ARPI + docetaxel triplet in high-volume mHSPC"

last_reviewed: null
reviewers: []

notes: >
  ARASENS (darolutamide + docetaxel + ADT): OS benefit in high-volume
  mHSPC. Requires docetaxel-eligible patient. Alternative formulations:
  ADT + abiraterone + docetaxel (PEACE-1) for centers without
  darolutamide access.
