    position: supports

do_not_do:
  - "Перевірити CD30 IHC перед призначенням — CD30+ ≥10% → бренtuximab vedotin (NCCN Cat 1)"
  - "ЕКГ і електроліти перед кожним циклом — QT-подовження при гіпокаліємії"
  - "При UGT1A1 *28/*28 — знизити дозу до 750 мг/м² (сповільнений метаболізм)"
  - "Не призначати при попередньому ромідепсині/белінoстаті — часткова перехресна резистентність"

