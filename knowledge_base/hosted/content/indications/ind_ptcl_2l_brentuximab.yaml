    position: supports
    relevant_quote_paraphrase: >
      NCCN T-cell lymphoma 2025 Category 2A: brentuximab vedotin monotherapy for
      CD30+ (≥10%) relapsed/refractory PTCL-NOS (Bartlett 2014 JCO Phase 2; ORR ~41%).
  - source_id: SRC-ESMO-PTCL-2024
    position: supports
    relevant_quote_paraphrase: >
      ESMO PTCL 2024: brentuximab vedotin recommended for CD30+ relapsed PTCL-NOS;
      IHC testing mandatory before prescribing.

do_not_do:
  - "Без CD30 IHC: BV неактивний при CD30-негативній пухлині; обов'язкова гістологія на рецидиві"
  - "Grade ≥3 базова нейропатія — MMAE кумулятивна нейропатія; абсолютне протипоказання"
  - "Без ПЕТ-контролю: BV може давати метаболічну відповідь без CR на КТ; ПЕТ визначає трансплантаційний відбір"
  - "Після невдачі BV: HDACi (ромідепсин/беліностат) або клінічне дослідження; не повторний BV"

