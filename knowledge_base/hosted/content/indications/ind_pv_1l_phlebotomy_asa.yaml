desired_tests: []

rationale: >
  Standard 1L for low-risk PV (age ≤60 AND no prior thrombosis):
  phlebotomy to Hct <45% (CYTO-PV trial) + low-dose aspirin 81-100 mg
  daily. Cytoreduction (HU) added for high-risk patients per
  RF-PV-ET-HIGH-THROMBOSIS-RISK. Phlebotomy frequency dictated by
  Hct (typically q-week initially → maintenance q1-3 mo). Iron
  deficiency from phlebotomy is desired (limits erythropoiesis); do
  NOT supplement iron unless truly symptomatic.

rationale_ua: >
  стандарт 1L for низького ризику PV (age ≤60 AND ні prior thrombosis): phlebotomy to Hct <45% (CYTO-PV дослідження) + low-доза aspirin 81-100 mg daily. Cytoreduction (HU) added for високого ризику patients per RF-PV-ET-HIGH-THROMBOSIS-RISK. Phlebotomy frequency dictated by Hct (типово q-week initially → підтримка q1-3 міс.). Iron deficiency from phlebotomy is бажаний (limits erythropoiesis); do NOT supplement iron unless truly symptomatic.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-MPN-2025
    position: supports
    relevant_quote_paraphrase: "Phlebotomy + ASA is foundation of PV 1L; HU added for high-risk"
  - source_id: SRC-ESMO-MPN-2015
    position: supports
    relevant_quote_paraphrase: "PV management cornerstone: Hct control + low-dose aspirin; cytoreduction for high-risk"

do_not_do:
  - "Не пропускати JAK2 V617F testing — діагностичний criterion + може ескалувати risk score."
  - "Не призначати ASA при extreme thrombocytosis (plt >1500K) без виключення acquired vWD — ризик кровотечі."
  - "Не пропускати abdominal vein thrombosis screening при дебюті — atypical presentation у PV."
  - "Не призначати iron supplementation при iron-deficiency від phlebotomy без чіткої клінічної causи — це бажаний ефект."
  - "Не використовувати full-dose ASA (325 мг) — low-dose (81-100 мг) однаково ефективна з меншим ризиком кровотечі."

do_not_do_en:
  - "Do not skip JAK2 V617F testing — diagnostic criterion + may escalate risk score."
  - "Do not prescribe ASA in extreme thrombocytosis (plt >1500K) without ruling out acquired vWD — bleeding risk."
  - "Do not skip abdominal vein thrombosis screening at presentation — atypical presentation in PV."
  - "Do not prescribe iron supplementation for iron-deficiency from phlebotomy without a clear clinical cause — this is a desired effect."
  - "Do not use full-dose ASA (325 mg) — low-dose (81-100 mg) equally effective with lower bleeding risk."
known_controversies:
  - topic: "Hct target <45% for all vs <45% males / <42% females"
    positions:
      - position: "Hct <45% for all (CYTO-PV; simpler implementation)"
        sources:
          - SRC-NCCN-MPN-2025
      - position: "Hct <42% for women (some European centers)"
        sources:
          - SRC-ESMO-MPN-2015
    our_default: "Hct <45% all (CYTO-PV evidence-based)"
    rationale: "CYTO-PV phase-3 RCT validated <45% target"

time_critical: false
last_reviewed: "2026-04-25"
reviewers: []
reviewer_signoffs: 0
notes: >
  STANDARD track for PV 1L low-risk. STUB — requires clinical co-lead
  signoff.
