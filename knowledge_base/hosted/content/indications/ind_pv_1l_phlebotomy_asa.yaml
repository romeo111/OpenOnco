  disease_id: DIS-PV
  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints: {}

recommended_regimen: REG-HU-PV-ET
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate:
    value: "Hct target <45% achievable in >90% with phlebotomy ± HU"
    source: SRC-NCCN-MPN-2025
    notes: "PV 1L phlebotomy + ASA: Hct <45% achievable in >90% with phlebotomy ± HU (CYTO-PV) per NCCN MPN 2025"
  complete_response:
    value: "Spontaneous; symptom + thrombosis-risk reduction"
    source: SRC-NCCN-MPN-2025
    notes: "PV 1L low-risk: CR endpoint is symptom control + thrombosis-risk reduction; hematologic normalization guided by Hct target per NCCN MPN 2025"
  progression_free_survival:
    value: "PV-related thrombosis reduced from ~5%/y to <2%/y on aspirin + Hct control"
    source: SRC-NCCN-MPN-2025
    notes: "PV 1L phlebotomy + ASA: thrombosis rate reduced from ~5%/year to <2%/year with aspirin + Hct <45% control per NCCN MPN 2025"
  overall_survival_5y:
    value: "Median OS ~14-20 years; 5-y OS ~85-90% with proper Hct + risk control"
    source: SRC-NCCN-MPN-2025
    notes: "PV 1L low-risk: median OS ~14-20 years; 5-yr OS ~85-90% with Hct control + aspirin per NCCN MPN 2025"

