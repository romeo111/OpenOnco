notes: 'STUB — pending Clinical Co-Lead sign-off. line_of_therapy: 2 reflects post-HU failure salvage. Concurrent ASA + phlebotomy continuation expected. Engine activates after HU intolerance/resistance documented per ELN criteria. Reference REG-ANAGRELIDE-ET (originally authored for ET) used as proxy; PV-specific REG- not authored.'
