id: IND-RCC-ADJUVANT-PEMBRO
plan_track: standard

applicable_to:
  disease_id: DIS-RCC
  histologic_subtype: CLEAR_CELL
  stage_stratum: STAGE_III_LOCAL_ADVANCED
  line_of_therapy: 1
  stage_requirements:
    - "Clear-cell RCC, post-curative nephrectomy (partial or radical), R0 resection"
    - "Eligible risk categories per KEYNOTE-564: (1) pT2 G4 N0 M0; (2) pT3 any grade N0 M0; (3) pT4 any grade N0 M0; (4) any pT any grade N1 M0; (5) M1 NED (resected metastases, disease-free after surgery)"
  biomarker_requirements_required:
    - "Clear-cell histology confirmed on pathology"
  biomarker_requirements_excluded:
    - "Non-clear cell histology — no adjuvant pembro data; observe or enroll in trial"
    - "Active autoimmune disease requiring systemic treatment (ICI contraindicated)"
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-PEMBROLIZUMAB-MONO
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

duration_guidance:
  standard:
    duration_months: 17
    cycles: 17
    rationale: "KEYNOTE-564: 17 cycles (≈1 year) of pembrolizumab 200mg q3w vs placebo"

expected_outcomes:
  disease_free_survival: "DFS HR 0.68 (p=0.002) at primary analysis"
  overall_survival: "OS HR 0.62 (p=0.001) — first adjuvant therapy showing OS benefit in RCC"
  notes: "KEYNOTE-564, N=994. mDFS not reached in pembro arm at primary analysis."

hard_contraindications:
  - "Non-clear cell histology"
  - "ECOG PS ≥ 3"
  - "Active autoimmune disease requiring systemic immunosuppression"
  - "Prior organ transplant (risk of rejection)"
  - "Active interstitial lung disease"
  - "Prior pembrolizumab or other anti-PD-1/PD-L1 for this disease"

red_flags_triggering_alternative: []

required_tests:
  - "Pathology confirming clear-cell histology and TNM staging"
  - "CBC, CMP, LFTs, creatinine, TSH baseline"
  - "CT chest/abdomen/pelvis (imaging confirmation of R0/NED status)"

desired_tests:
  - "PD-L1 expression (not required for eligibility; not predictive in adjuvant setting)"
  - "Brain MRI if neurologic symptoms or prior high-risk features"

rationale: >
  KEYNOTE-564 (NCT03142334) randomized 994 patients with high-risk ccRCC post-nephrectomy
  to pembrolizumab 200mg q3w x 17 cycles vs placebo. Eligible stages: pT2G4N0, pT3, pT4,
  N1, or M1-NED after resection. Primary endpoint DFS HR 0.68 (95% CI 0.53-0.87, p=0.002).
  Updated OS analysis: HR 0.62 (95% CI 0.44-0.87, p=0.001) — the first adjuvant therapy
  to demonstrate an OS benefit in RCC. AEs: any grade irAE ~37%; G3-4 irAE ~8.5%.
  Treatment should begin within 12 weeks of nephrectomy (same timing principle as colon
  adjuvant). NCCN 2025 category 1 for eligible high-risk clear-cell RCC.

rationale_ua: >
  KEYNOTE-564: пембролізумаб 200мг q3w × 17 циклів vs плацебо у хворих з НКК
  після нефректомії. DFS HR 0.68 (p=0.002); OS HR 0.62 (p=0.001) — перший ад'ювантний
  засіб з доведеним впливом на ОВ при НКК. Категорія 1 NCCN 2025.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
  - source_id: SRC-KEYNOTE564-CHOUEIRI-2021
    position: supports
  - source_id: SRC-NCCN-KIDNEY-2025
    position: supports
  - source_id: SRC-ESMO-RCC-2024
    position: supports

do_not_do:
  - "Do NOT offer adjuvant pembrolizumab to non-clear-cell RCC — no evidence; KEYNOTE-564 enrolled clear-cell only"
  - "Do NOT use in patients with active autoimmune disease requiring immunosuppression"
  - "Do NOT delay beyond 12 weeks post-nephrectomy"
  - "Do NOT extend beyond 17 cycles (1 year) — no benefit shown beyond this in KEYNOTE-564"
  - "Do NOT use in low-risk stage II (pT2 G1-3 N0) — not included in KEYNOTE-564 eligibility"

last_reviewed: "2026-05-03"
notes: >
  Adjuvant pembrolizumab is the only systemic therapy with proven OS benefit
  post-nephrectomy in RCC (KEYNOTE-564 updated). Stage II high-risk (pT2G4),
  all stage III (pT3-4, N1), and M1-NED are the eligible groups. Stage I and
  low-risk stage II — observation only. Timing: must start ≤12 weeks post-surgery.
