rationale: >
  CLEAR (NCT02811861): lenvatinib 20mg/d + pembrolizumab 200mg q3w vs sunitinib
  in untreated advanced ccRCC (n=1069, all IMDC risk groups). PFS HR 0.39 (p<0.001),
  ORR 71% vs 36%, OS HR 0.66 (p=0.005). The largest magnitude PFS improvement
  seen in any 1L ccRCC trial to date. High toxicity: hypertension G3-4 ~36%,
  dose reductions in 69% of patients on lenvatinib arm. Appropriate for fit
  (ECOG 0-1) patients where maximal response is the priority: high tumor burden,
  conversion to resectability, symptomatic disease. Not suitable for frail patients
  or those with uncontrolled hypertension.

rationale_ua: >
  Дослідження CLEAR (NCT02811861): ленватиніб (lenvatinib) 20mg/d + пембролізумаб
  (pembrolizumab) 200mg q3w проти сунітинібу у пацієнтів з нелікованою поширеною
  світлоклітинною НКК (n=1069, усі групи ризику IMDC). PFS HR 0.39 (p<0.001),
  ORR 71% проти 36%, OS HR 0.66 (p=0.005). Найбільше покращення PFS серед усіх
  досліджень першої лінії ccRCC. Висока токсичність: гіпертензія G3-4 ~36%,
  зниження дози у 69% пацієнтів у групі ленватинібу. Схема показана для фізично
  збережених пацієнтів (ECOG 0-1), де пріоритетом є максимальна відповідь: висока
  пухлинна маса, конверсія до резектабельності, симптоматичне захворювання.
  Не підходить для ослаблених пацієнтів або при неконтрольованій гіпертензії.
