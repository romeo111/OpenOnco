id: IND-RCC-METASTATIC-2L-BELZUTIFAN
plan_track: standard

applicable_to:
  disease_id: DIS-RCC
  disease_state: "metastatic"
  line_of_therapy: 2
  stage_requirements: ["IV"]
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-BELZUTIFAN-MONO
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "ORR 23%; DCR 78%"
  median_progression_free_survival_months: 5.6
  median_overall_survival_months: 21
  notes: >
    LITESPARK-005: belzutifan vs everolimus in ccRCC after PD-(L)1 +
    VEGF-TKI. PFS and ORR significantly better; OS trend favorable
    (HR 0.88, p NS at primary analysis but improving with follow-up).

hard_contraindications: []  # contra documented in regimen + notes; entity-level CIs not authored
red_flags_triggering_alternative:
  - RF-RCC-ORGAN-DYSFUNCTION
  - RF-RCC-TRANSFORMATION-PROGRESSION
required_tests:
  - TEST-CECT-CAP
desired_tests: []

sources:
  - source_id: SRC-NCCN-KIDNEY-2025
    weight: primary
  - source_id: SRC-ESMO-RCC-2024
    weight: primary

last_reviewed: "2026-04-26"
reviewers: []

notes: >
  Sporadic-mRCC indication after PD-(L)1 + VEGF-TKI failure. Note that
  VHL status is NOT required for this indication — LITESPARK-005 enrolled
  irrespective of VHL status, and benefit was observed across subgroups.
  Distinct from IND-RCC-VHL-DISEASE-BELZUTIFAN (hereditary, requires
  germline VHL+).

  Alternative 2L+ options not yet wired in this KB: cabozantinib mono,
  lenvatinib + everolimus, tivozanib. Belzutifan represents the
  mechanism-of-action fresh option; choice typically driven by
  prior-toxicity profile + access.
