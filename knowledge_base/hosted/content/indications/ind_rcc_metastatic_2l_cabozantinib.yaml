id: IND-RCC-METASTATIC-2L-CABOZANTINIB
plan_track: standard

applicable_to:
  disease_id: DIS-RCC
  histologic_subtype: CLEAR_CELL
  stage_stratum: STAGE_IV_METASTATIC
  line_of_therapy: 2
  stage_requirements:
    - "Advanced/metastatic RCC, progression after ≥1 prior VEGFR-TKI (or ICI+TKI combination)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-CABOZANTINIB-RCC
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  progression_free_survival: "mPFS 7.4 mo vs 3.8 mo everolimus (HR 0.58, p<0.001)"
  overall_survival_median: "mOS 21.4 vs 16.5 mo (HR 0.66, p=0.0003)"
  overall_response_rate: "17% vs 3% (everolimus)"
  notes: "METEOR, N=658. Cabozantinib 60mg vs everolimus after ≥1 VEGFR-TKI."

hard_contraindications:
  - "ECOG PS ≥ 3"
  - "Active major hemorrhage"
  - "Unhealed wound or recent major surgery (<2 weeks)"
  - "Strong CYP3A4 interactions requiring unavoidable use"

red_flags_triggering_alternative: []

required_tests:
  - "CBC, CMP, LFTs, creatinine baseline"
  - "Blood pressure baseline"
  - "CT chest/abdomen/pelvis for disease burden assessment"

desired_tests:
  - "Bone scan if bone metastases suspected (cabozantinib preferred with bone involvement)"

rationale: >
  METEOR (NCT01865747): cabozantinib 60mg vs everolimus 10mg in 658 patients
  with RCC who had received ≥1 VEGFR-TKI. PFS HR 0.58 (p<0.001), OS HR 0.66
  (p=0.0003), ORR 17% vs 3%. Cabozantinib's multi-kinase profile (VEGFR2, MET,
  AXL) addresses mechanisms of sunitinib/pazopanib resistance. NCCN preferred 2L
  TKI monotherapy. Also active in non-clear cell RCC (NCCN preferred for papillary).

rationale_ua: >
  METEOR: кабозантиніб 60 мг vs еверолімус після VEGFR-TKI. PFS HR 0.58,
  OS HR 0.66. Переважна терапія 2L при НКК після TKI.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
  - source_id: SRC-METEOR-CHOUEIRI-2016
    position: supports
  - source_id: SRC-NCCN-KIDNEY-2025
    position: supports
  - source_id: SRC-ESMO-RCC-2024
    position: supports

do_not_do:
  - "Do NOT use 60mg monotherapy dose if patient received nivo+cabo 1L (prior cabozantinib exposure — cross-resistance likely; consider different mechanism 2L)"
  - "Do NOT add everolimus — combination not beneficial"
  - "Do NOT use in patients with uncontrolled hypertension without antihypertensive initiation"

last_reviewed: "2026-05-03"
notes: >
  2L cabozantinib 60mg monotherapy after prior TKI or ICI+TKI (if cabozantinib
  not part of 1L). In the modern era of ICI+TKI 1L, 2L is most commonly after
  nivo+ipi or pembro+axi; cabozantinib is preferred NCCN TKI option in this
  setting. If patient received nivo+cabo 1L, use a different 2L agent.
