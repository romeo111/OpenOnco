desired_tests: []
rationale: >
  METEOR (NCT01865747): cabozantinib 60mg vs everolimus 10mg in 658 patients
  with RCC who had received ≥1 VEGFR-TKI. PFS HR 0.58 (p<0.001), OS HR 0.66
  (p=0.0003), ORR 17% vs 3%. Cabozantinib's multi-kinase profile (VEGFR2, MET,
  AXL) addresses mechanisms of sunitinib/pazopanib resistance. NCCN preferred 2L
  TKI monotherapy. Also active in non-clear cell RCC (NCCN preferred for papillary).

rationale_ua: >
  Дослідження METEOR (NCT01865747): кабозантиніб (cabozantinib) 60mg проти
  еверолімусу (everolimus) 10mg у 658 пацієнтів із НКК, які отримали ≥1
  VEGFR-TKI. PFS HR 0.58 (p<0.001), OS HR 0.66 (p=0.0003), ORR 17% проти 3%.
  Мультикіназний профіль кабозантинібу (VEGFR2, MET, AXL) долає механізми
  резистентності до сунітинібу/пазопанібу. Кабозантиніб є пріоритетною
  монотерапією 2L за NCCN. Також активний при несвітлоклітинній НКК (NCCN
  пріоритет при папілярному гістотипі).
ukrainian_review_status: pending_clinical_signoff
