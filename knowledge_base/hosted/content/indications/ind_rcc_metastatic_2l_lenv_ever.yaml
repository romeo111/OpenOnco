sources:
  - source_id: SRC-NCCN-KIDNEY-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN Kidney 2025 Category 2A: lenvatinib + everolimus for 2L+ ccRCC after
      prior VEGFR-TKI or IO-based combination therapy. HOPE205 basis (Motzer 2015
      Lancet; ORR 43%; PFS 14.6 months vs everolimus alone).
  - source_id: SRC-ESMO-RCC-2024
    position: supports
    relevant_quote_paraphrase: >
      ESMO RCC 2024: lenvatinib+everolimus is an option for subsequent lines of
      therapy in ccRCC; HOPE205 provides Phase 2 evidence for ORR benefit; lower
      evidence level than Phase 3-validated agents (cabozantinib, belzutifan).

do_not_do:
  - "Ленватиніб+еверолімус після попереднього ленватинібу (1L CLEAR): перехресна резистентність; кабозантиніб або белзутифан"
  - "Без контролю АТ: ленватиніб → гіпертензія G3-4 у ~14%; АТ перед стартом ≤140/90"
  - "Без профілактики стоматиту: еверолімус → стоматит у ~43%; дексаметазон 0.1% полоскання з 1-го дня"
  - "Без PJP профілактики: еверолімус → імуносупресія (mTOR); ко-тримоксазол 480 мг 3×/тиж"
  - "Без моніторингу ТТГ: ленватиніб → гіпотиреоз у >50%; замісна терапія левотироксином"

