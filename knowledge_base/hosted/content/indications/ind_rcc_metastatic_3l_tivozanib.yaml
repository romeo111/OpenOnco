id: IND-RCC-METASTATIC-3L-TIVOZANIB
plan_track: aggressive

applicable_to:
  disease_id: DIS-RCC
  line_of_therapy: 3
  stage_requirements:
    - "Advanced (metastatic or unresectable) clear-cell renal cell carcinoma (ccRCC)"
    - "Relapsed or refractory after ≥2 prior systemic therapies (3L setting; TIVO-3 enrolled ≥3L)"
    - "Prior VEGFR-TKI exposure (e.g., sunitinib, pazopanib, axitinib, cabozantinib in 1L or 2L)"
    - "ECOG PS 0-2 (TIVO-3 enrolled ECOG 0-1; ECOG 2 at investigator/MDT discretion)"
    - "No active untreated CNS metastases (hemorrhage risk with VEGFR-TKI)"
    - "Adequate organ function: bilirubin ≤1.5× ULN, CrCl ≥30 mL/min, BP manageable"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    notes: >
      TIVO-3 enrolled ECOG 0-1 predominantly. For ECOG 2, individual MDT assessment
      required; lower functional status may limit tolerability of VEGFR-TKI side effects
      (hypertension, fatigue). Consider best supportive care for ECOG ≥3.

recommended_regimen: REG-TIVOZANIB-RCC
alternative_regimens:
  - regimen_id: REG-CABOZANTINIB-RCC
    description: >
      Cabozantinib 60 mg PO daily (METEOR; NCCN Cat 1 for 2L; Cat 2A for ≥3L post-prior-TKI).
      Broader multi-target profile (VEGFR/MET/AXL) may provide benefit in some patients.
      Use when tivozanib inaccessible.

concurrent_therapy:
  - "BP management: initiate antihypertensives before cycle 1 if BP >140/90 mmHg"
  - "Thyroid monitoring: TSH + free T4 at baseline + q4-8 weeks"
  - "Urinalysis (spot urine protein:creatinine ratio or 24h urine): baseline + q4 weeks"
  - "LFT + CBC: baseline + q4 weeks"

followed_by:
  - "CT chest/abdomen/pelvis q8-12 weeks (RECIST 1.1)"
  - "Continue until confirmed radiologic progression or unacceptable toxicity"
  - "At progression: clinical trial preferred; best supportive care; MDT discussion"

evidence_level: moderate
strength_of_recommendation: moderate
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~18% (TIVO-3; tivozanib arm; r/r ccRCC ≥3L after ≥2 prior therapies)"
  complete_response: "<1%"
  progression_free_survival: "Median PFS ~5.6 months (TIVO-3; tivozanib vs 3.9 mo sorafenib; HR 0.73; p=0.016)"
  overall_survival_5y: "Median OS ~16.4 months (TIVO-3; vs 19.2 mo sorafenib — OS cross-over effect)"
  notes: >
    PRIMARY EVIDENCE: TIVO-3 (Atkins et al. 2021 Lancet Oncol; phase 3 RCT; N=350):
    - Tivozanib vs sorafenib in r/r advanced RCC after ≥2 prior systemic therapies
    - 1° endpoint: PFS: tivozanib 5.6 mo vs sorafenib 3.9 mo (HR 0.73; p=0.016)
    - ORR: 18% vs 8% (tivozanib vs sorafenib)
    - OS: 16.4 vs 19.2 months (HR 1.12; p=0.35; NS) — crossover from sorafenib to tivozanib
      in 38% of sorafenib-arm patients confounded OS analysis
    - Grade ≥3 AEs: hypertension 21% vs 9%; better HFSR with tivozanib (no RAF inhibition)
    - FDA accelerated approval March 10, 2021 based on PFS benefit
    - NCCN Kidney Tumors 2025 Category 2A for ≥3L ccRCC

    SELECTIVITY ADVANTAGE: Tivozanib is more selective for VEGFR-1/2/3 than sorafenib,
    sunitinib, or cabozantinib — resulting in lower rates of fatigue and HFSR due to
    less off-target inhibition (no RAF, less PDGFR). This tolerability profile may be
    preferable for ECOG-impaired patients who need continued VEGFR inhibition.

    UKRAINE: tivozanib not registered; cabozantinib or lenvatinib+everolimus are the
    accessible alternatives for this patient population.

hard_contraindications:
  - "ECOG ≥3 — chemotherapy/TKI rarely beneficial at this performance status"
  - "Active untreated/bleeding CNS metastases — hemorrhage risk"
  - "Uncontrolled severe hypertension (BP >160/100 despite maximal antihypertensives)"

red_flags_triggering_alternative: []

required_tests:
  - TEST-CT-CHEST-ABDOMEN-PELVIS
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - "Urinalysis with urine protein:creatinine ratio (baseline proteinuria)"
  - "TSH + free T4 (baseline thyroid function)"
  - "BP measurement (baseline; antihypertensive pre-treatment if needed)"

desired_tests:
  - "Echocardiogram (baseline LVEF if prior cardiotoxic therapy; tivozanib mild cardiac risk)"
  - "Brain MRI (if CNS symptoms or prior brain met history)"

rationale: >
  Tivozanib (Fotivda) is a highly selective VEGFR-1/2/3 tyrosine kinase inhibitor
  approved for adults with relapsed or refractory advanced renal cell carcinoma after
  ≥2 prior systemic therapies. The FDA approval was based on TIVO-3 (Atkins 2021 Lancet
  Oncol), which demonstrated superior PFS vs sorafenib (5.6 vs 3.9 months; HR 0.73)
  with better tolerability (lower HFSR rates due to VEGFR-selectivity without RAF inhibition).

  SELECTIVITY RATIONALE: Unlike sorafenib (which inhibits VEGFR + RAF + PDGFR),
  tivozanib targets only VEGFR-1/2/3 — resulting in cleaner angiogenesis blockade with
  lower off-target toxicity. This is particularly relevant for 3L+ patients who have
  already experienced TKI-related cumulative toxicity and may be less tolerant of
  additional side effects.

  3L+ SEQUENCING IN RCC: After failure of 1L IO+TKI combination (e.g., pembro+axitinib,
  nivo+cabo, pembro+lenv) and 2L-targeted monotherapy (cabozantinib or lenvatinib+everolimus),
  tivozanib is a NCCN Cat 2A option that continues VEGFR-targeted strategy. Clinical trials
  remain the preferred option at this line if available.

  UKRAINE CONTEXT: Tivozanib not registered in Ukraine. For ≥3L RCC in Ukraine, consider:
  (1) Cabozantinib if not prior-exposed; (2) Lenvatinib + everolimus; (3) Clinical trial;
  (4) Tivozanib via named-patient import as the accessible VEGFR-selective TKI option.

rationale_ua: >
  Тивозаніб (Fotivda) — високоселективний інгібітор VEGFR-1/2/3 для дорослих з рецидивним
  або рефрактерним поширеним НКР після ≥2 попередніх системних терапій. FDA березень 2021.
  TIVO-3 (Atkins 2021 Lancet Oncol): мВБП 5,6 проти 3,9 міс (ВР 0,73; p=0,016).
  Краща переносимість ніж сорафеніб (без RAF-інгібування → менш HFSR та втома).
  NCCN Kidney 2025 Кат 2A. В Україні: не зареєстрований; кабозантиніб або
  ленватиніб+еверолімус — доступні альтернативи для ≥3Л НКР.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

do_not_do:
  - "НЕ застосовувати при ECOG ≥3 — краще СПД"
  - "НЕ застосовувати при нелікованих метастазах у ЦНС — ризик кровотечі"
  - "НЕ ігнорувати гіпертонію — початок/коригування антигіпертензивних препаратів ПЕРЕД або одразу з початком терапії"
  - "НЕ пропускати TSH моніторинг — гіпотиреоз у ~30% (клас-ефект VEGFR-TKI)"
  - "НЕ продовжувати при Grade 3 гіпертонії без контролю — утримати; відновити 1,0 мг після нормалізації"
  - "НЕ комбінувати з сильними індукторами CYP3A4 (рифампіцин, фенітоїн) — знижує AUC тивозанібу"
  - "НЕ підтверджувати план без funding pathway — не зареєстрований в Україні"

sources:
  - source_id: SRC-NCCN-KIDNEY-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN Kidney Tumors 2025 Category 2A: tivozanib for r/r advanced ccRCC after
      ≥2 prior systemic therapies (TIVO-3; Atkins 2021 Lancet Oncol; PFS HR 0.73;
      mPFS 5.6 vs 3.9 months; ORR 18% vs 8%; FDA approval March 2021).
  - source_id: SRC-ESMO-RCC-2024
    position: supports
    relevant_quote_paraphrase: >
      ESMO RCC 2024: tivozanib is an NCCN-endorsed option for heavily pretreated ccRCC
      (≥3L) based on TIVO-3 PFS benefit; lower HFSR profile supports use in previously
      TKI-toxicity-limited patients.

known_controversies:
  - topic: "Tivozanib vs cabozantinib vs clinical trial for ≥3L ccRCC"
    positions:
      - position: "Clinical trial — preferred at ≥3L; novel combinations (IO+IO, bispecifics, HIF-2α combinations) in development; enrol when feasible"
        sources: [SRC-NCCN-KIDNEY-2025]
      - position: "Tivozanib — PFS HR 0.73 vs sorafenib; better tolerability than sorafenib; NCCN Cat 2A; specific FDA indication for ≥3L"
        sources: [SRC-NCCN-KIDNEY-2025]
      - position: "Cabozantinib 3L+ — broader target (VEGFR/MET/AXL); NCCN Cat 2A for ≥3L; more widely accessible including Ukraine"
        sources: [SRC-NCCN-KIDNEY-2025]
    our_default: "Clinical trial preferred. When trial unavailable: tivozanib if accessible (lower HFSR selectivity advantage); cabozantinib if tivozanib inaccessible (Ukraine: cabozantinib more accessible)."

