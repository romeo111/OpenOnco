id: IND-RCC-NON-CLEAR-CELL-1L-CABOZANTINIB
plan_track: standard

applicable_to:
  disease_id: DIS-RCC
  line_of_therapy: 1
  stage_requirements:
    - "Advanced/metastatic non-clear-cell RCC (papillary, chromophobe, unclassified, MET-driven)"
    - "Not amenable to curative surgery"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-CABOZANTINIB-RCC
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~20–25% (papillary type-1/type-2 in PAPMET cohorts)"
  progression_free_survival: "mPFS 9.0 mo in MET-driven pRCC vs 5.6 mo sunitinib (PAPMET/SWOG-1500)"
  overall_survival_median: "Not mature; PAPMET underpowered for OS"
  notes: "PAPMET/SWOG-1500 (Pal 2021): cabozantinib superior to sunitinib in MET-driven papillary cohort. ESMO/NCCN preferred agent for non-clear-cell RCC."

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT

rationale: >
  Cabozantinib (VEGFR2/MET/AXL inhibitor) is the NCCN-preferred first-line agent for
  non-clear-cell RCC, including papillary type-1 (MET-driven) and type-2. Evidence:
  PAPMET/SWOG-1500 (Pal 2021, JCO): cabozantinib significantly improved PFS vs sunitinib
  in MET-driven papillary RCC (9.0 vs 5.6 mo, HR 0.60). Savolitinib (selective MET-TKI)
  was inferior to sunitinib in unselected papillary RCC (SAVOIR); MET-pathway enrichment
  by FISH/NGS selects responders. Clear-cell-like histology or sarcomatoid differentiation
  may shift regimen choice (ICI+TKI); this indication covers non-clear-cell subtype only.

rationale_ua: >
  Кабозантиніб — NCCN-переважний 1L агент при НКК ниркового раку, включаючи папілярний
  тип-1 (MET-driven) та тип-2. PAPMET/SWOG-1500: кабозантиніб > сунітиніб при MET-driven
  pRCC (PFS HR 0.60). При MET-ампліфікації/мутації — перевага кабозантинібу.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
  - source_id: SRC-NCCN-KIDNEY-2025
    position: supports
    relevant_quote_paraphrase: "NCCN Kidney 2025: cabozantinib Category 2A preferred agent for non-clear cell RCC 1L"
  - source_id: SRC-ESMO-RCC-2024
    position: supports
    relevant_quote_paraphrase: "ESMO RCC 2024: cabozantinib for MET-driven papillary RCC"

do_not_do:
  - "Do NOT use clear-cell ICI+TKI combinations (nivo+ipi, pembro+axi, lenv+pembro) as standard 1L for papillary RCC — these were studied in predominantly clear-cell populations"
  - "Do NOT assume sunitinib equivalent in MET-driven papillary RCC — inferior per PAPMET"
  - "Do NOT use 60mg in patients with uncontrolled hypertension without antihypertensive initiation"

do_not_do_en:
  - "Do NOT substitute clear-cell ICI+TKI regimens for non-clear-cell subtype without specific trial evidence"
  - "Do NOT use sunitinib preferentially for MET-driven papillary RCC — cabozantinib superior per PAPMET"
  - "Do NOT ignore BP monitoring — hypertension is major cabozantinib toxicity (G3: ~28%)"

time_critical: false
last_reviewed: "2026-05-04"
reviewers: []
reviewer_signoffs: 0
notes: >
  STUB — pending Clinical Co-Lead sign-off. Non-clear-cell RCC is a heterogeneous
  group; this indication covers the common case of papillary/MET-driven subtype where
  cabozantinib is NCCN-preferred. For chromophobe RCC, clinical trial is preferred.
  For collecting duct / medullary RCC, platinum-based chemotherapy ± ICI is preferred
  (separate indication needed). BIO-MET amplification/activating mutation identifies
  the MET-driven papillary type-1 subset with strongest cabozantinib rationale.
