id: IND-RCC-VHL-DISEASE-BELZUTIFAN
plan_track: standard

applicable_to:
  disease_id: DIS-RCC
  disease_state: "VHL-syndrome-associated"
  line_of_therapy: 1
  stage_requirements: []  # local / multifocal / non-metastatic VHL-RCC also eligible
  biomarker_requirements_required:
    - biomarker_id: BIO-VHL-STATUS
      value_constraint: "germline_pathogenic"
      required: true
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-BELZUTIFAN-MONO
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "ORR 49% (RCC subset, LITESPARK-004); 30% (CNS hemangioblastoma); 91% (pancreatic NETs)"
  median_progression_free_survival_months: "Not yet reached (24+ mo follow-up)"
  notes: >
    LITESPARK-004 enrolled patients with VHL syndrome and ≥1 measurable
    RCC <3 cm not requiring immediate surgery. Surgery-sparing endpoint
    met in vast majority — multifocal disease that previously required
    serial nephrectomies / pancreatectomies now manageable medically.

hard_contraindications: []  # contra documented in regimen + notes; entity-level CIs not authored
red_flags_triggering_alternative: []
required_tests:
  - TEST-CECT-CAP
  - TEST-MRI-BRAIN-CONTRAST  # CNS hemangioblastoma surveillance
desired_tests: []

sources:
  - source_id: SRC-NCCN-KIDNEY-2025
    weight: primary
  - source_id: SRC-ESMO-RCC-2024
    weight: primary

last_reviewed: "2026-04-26"
reviewers: []

notes: >
  Hereditary VHL-syndrome indication. Distinct from sporadic mRCC use.
  Patient typically has multifocal RCC + CNS hemangioblastomas +
  pancreatic NETs concurrently — belzutifan addresses all three
  HIF-2α-driven manifestations. Lifelong therapy expected; monitoring
  CBC + SpO2 on each cycle. Not used in sporadic ccRCC unless prior
  IO/VEGF-TKI failure (see IND-RCC-METASTATIC-2L-BELZUTIFAN).
