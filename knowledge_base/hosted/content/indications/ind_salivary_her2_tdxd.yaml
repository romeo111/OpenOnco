id: IND-SALIVARY-HER2-TDXD
plan_track: standard

applicable_to:
  disease_id: DIS-SALIVARY
  line_of_therapy: 2
  stage_requirements:
    - "Unresectable locally advanced or metastatic salivary gland carcinoma"
    - "Any salivary gland histology (salivary duct carcinoma most common HER2+ subtype; also adenocarcinoma NOS)"
    - "Prior systemic therapy required (≥1 prior line for recurrent/metastatic disease)"
  biomarker_requirements:
    - "HER2 overexpression: IHC 3+ OR IHC 2+/FISH+ (HER2 amplification)"
    - "HER2 prevalence in salivary gland carcinoma: ~20-30% overall; ~70-90% in salivary duct carcinoma"
    - "HER2 testing recommended for all metastatic salivary gland carcinomas at diagnosis"

recommended_regimen: REG-TDXD-METASTATIC

concurrent_therapy: []

followed_by:
  - "Continue T-DXd until progression or unacceptable toxicity"
  - "Interstitial lung disease (ILD) monitoring mandatory — hold/discontinue per severity"
  - "At progression: clinical trial preferred; consider trastuzumab emtansine (T-DM1) or pertuzumab+trastuzumab"

evidence_level: moderate
strength_of_recommendation: moderate
nccn_category: 2A

expected_outcomes:
  orr_percent: 61
  pfs_median_months: 6.9
  notes: >
    DESTINY-PanTumor02 (Li BT JCO 2023; HER2 IHC 3+; salivary gland cancer cohort n=21):
    ORR 61% (95% CI 38-80%); mPFS 6.9 months; mOS 10.4 months. FDA approved August 2022
    for HER2+ solid tumors (tumor-agnostic for HER2 IHC 3+). NCCN Salivary Gland 2025:
    Category 2A for HER2+ salivary gland carcinoma.

hard_contraindications:
  - "HER2 overexpression not confirmed (IHC 3+ or FISH+)"
  - "Active interstitial lung disease or pneumonitis"
  - "ECOG PS 4 (engine hard gate)"
  - "Severe hepatic impairment (Child-Pugh C)"
  - "Known hypersensitivity to trastuzumab or deruxtecan components"

red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-LFT
  - TEST-CMP
  - "HER2 IHC + FISH (mandatory; IHC 3+ OR 2+/FISH+ required)"
  - "Pulmonary function / CT chest baseline (ILD risk monitoring)"
  - "Echocardiogram: LVEF baseline (cardiotoxicity monitoring)"

desired_tests:
  - "NGS panel: HRAS, PI3K, NTRK, AR, HER2 amplification (2L+ planning)"
  - "Androgen receptor (AR) IHC (AR+ salivary duct carcinoma may benefit from enzalutamide/abiraterone)"

rationale: >
  Trastuzumab deruxtecan (T-DXd; ENHERTU) is an antibody-drug conjugate delivering
  deruxtecan (topoisomerase I inhibitor payload) via anti-HER2 antibody. DESTINY-PanTumor02
  demonstrated 61% ORR in HER2+ (IHC 3+) salivary gland carcinomas — representing a major
  advance in a histology with limited targeted options. FDA tumor-agnostic HER2+ solid tumor
  approval (August 2022) covers salivary gland carcinoma. Key risk: drug-related interstitial
  lung disease (ILD) occurs in ~10-15%; mandatory CT monitoring and early dose interruption
  is critical. Salivary duct carcinoma is the most HER2-enriched subtype and most likely to
  benefit; AR-positive salivary duct may warrant androgen deprivation therapy in addition.

sources:
  - SRC-NCCN-SALIVARY-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
