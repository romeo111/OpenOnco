id: IND-SALIVARY-NTRK-LAROTRECTINIB
plan_track: standard

applicable_to:
  disease_id: DIS-SALIVARY
  line_of_therapy: 1
  stage_requirements:
    - "Unresectable locally advanced or metastatic salivary gland carcinoma"
    - "No satisfactory alternative treatments or disease progressed on prior systemic therapy"
    - "Includes secretory carcinoma (formerly mammary analogue secretory carcinoma; MASC) — highest NTRK prevalence"
  biomarker_requirements:
    - "NTRK1, NTRK2, or NTRK3 gene fusion confirmed by validated assay (NGS preferred; IHC pan-TRK screening acceptable)"
    - "NTRK fusion prevalence: up to 90% in secretory carcinoma (ETV6-NTRK3); <5% in other histologies"
    - "Histology: secretory carcinoma should be the first NTRK testing priority in salivary"

recommended_regimen: REG-LAROTRECTINIB-PANTUMOR

concurrent_therapy: []

followed_by:
  - "Continue larotrectinib until progression; no planned discontinuation"
  - "At progression: assess for acquired TRK resistance mutations"
  - "Post-larotrectinib: selitrectinib (if accessible) for NTRK resistance; else palliative chemotherapy"

evidence_level: high
strength_of_recommendation: strong
nccn_category: 1

expected_outcomes:
  orr_percent: 75
  dor_note: "12-month DOR rate ~65-70%; durable responses in secretory carcinoma"
  notes: >
    NAVIGATE/SCOUT basket (Drilon A NEJM 2018; updated Doebele 2020): ORR 75% in NTRK
    fusion-positive solid tumors (salivary gland cancer subset included). Secretory carcinoma
    (MASC) with ETV6-NTRK3 showed exceptional responses. FDA tumor-agnostic approval
    August 2018. NCCN Salivary Gland 2025: Category 1 for NTRK fusion+ salivary gland carcinoma.

hard_contraindications:
  - "NTRK fusion not confirmed"
  - "ECOG PS 4 (engine hard gate)"
  - "Severe hepatic impairment (Child-Pugh C)"

red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-LFT
  - TEST-CMP
  - "NTRK gene fusion testing (NGS or IHC pan-TRK screen + confirmation NGS)"

desired_tests:
  - "HER2 IHC + FISH (for parallel 2L planning if NTRK-negative)"
  - "AR IHC (androgen receptor; salivary duct carcinoma AR-directed therapy)"

rationale: >
  Larotrectinib (VITRAKVI) has tumor-agnostic FDA approval for NTRK fusion-positive solid
  tumors with ORR ~75% across histologies. Salivary gland secretory carcinoma (formerly MASC)
  carries ETV6-NTRK3 fusion in up to 90% of cases, making it the highest-yield salivary subtype
  for NTRK testing. Larotrectinib is NCCN Category 1 for NTRK fusion+ salivary gland cancer.
  Testing should be performed routinely at diagnosis of metastatic salivary gland carcinoma.

sources:
  - SRC-NCCN-SALIVARY-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  STUB - authored 2026-05-04 (Workstream EC). Salivary gland NTRK fusion larotrectinib.
  Two-reviewer clinical signoff required.
