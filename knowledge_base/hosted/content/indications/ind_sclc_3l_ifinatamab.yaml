id: IND-SCLC-3L-IFINATAMAB
plan_track: standard

applicable_to:
  disease_id: DIS-SCLC
  line_of_therapy: 3
  stage_requirements:
    - "Extensive-stage SCLC (ES-SCLC)"
    - "Relapsed or refractory after at least 2 prior systemic therapy lines including platinum"
    - "Prior platinum-based chemotherapy REQUIRED"
  biomarker_requirements:
    - "B7-H3 (CD276) testing: NOT required — benefit observed regardless of expression level per IDeate-Lung01"
    - "B7-H3 is expressed in >80% of SCLC; testing not a treatment eligibility criterion"

recommended_regimen: REG-IFINATAMAB-SCLC

concurrent_therapy: []

followed_by:
  - "Continue ifinatamab until progression or unacceptable toxicity"
  - "No standard maintenance or consolidation defined post-ifinatamab"
  - "At progression: clinical trial if available; best supportive care if ECOG deteriorates"

evidence_level: moderate
strength_of_recommendation: moderate
nccn_category: 2A

expected_outcomes:
  overall_response_rate: "52.4% (IDeate-Lung01)"
  median_duration_of_response_months: 7.0
  median_overall_survival_months: 12.9
  notes: >
    IDeate-Lung01 (NCT04145622; Mansfield AS Lancet Oncol 2024): Phase 2 basket study
    in SCLC ≥2 prior lines. Ifinatamab deruxtecan 12 mg/kg Q3W.
    ORR ~52.4%; mDOR ~7.0 months; mOS ~12.9 months.
    Grade 3+ ILD/pneumonitis ~6-9%. Accelerated approval based on ORR endpoint.
    FDA approved 2024. NCCN SCLC 2025: Category 2A for 3L+ SCLC.

hard_contraindications:
  - "Active ILD/pneumonitis or pulmonary fibrosis at baseline (ILD is a key ADC toxicity)"
  - "ECOG PS ≥3 (not studied in this population)"
  - "ECOG PS 4 (engine hard gate)"
  - "Severe baseline pulmonary dysfunction (SpO2 <92% at rest on room air)"

red_flags_triggering_alternative:
  - "Prior severe ILD with any ADC or checkpoint inhibitor: very high risk for recurrent ILD"
  - "Interstitial lung disease on baseline CT: pursue tarlatamab instead (IND-SCLC-3L-TARLATAMAB)"

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-CECT-CAP
  - "Baseline pulmonary function tests (PFTs) — ILD risk assessment before starting"
  - "SpO2 at rest — screen for baseline hypoxia"

desired_tests:
  - "B7-H3 IHC or RNA testing (not required for eligibility; prognostic information)"
  - "Brain MRI (SCLC CNS staging)"

rationale: >
  Ifinatamab deruxtecan (I-DXd, DS-7300a) is a B7-H3-targeted ADC with DXd topoisomerase I
  inhibitor payload, FDA-approved (accelerated; 2024) for ES-SCLC after ≥2 prior lines including
  platinum. IDeate-Lung01 demonstrated ORR ~52.4% in this heavily pretreated population —
  notably higher than topotecan (~17-24%) or lurbinectedin (~35%) in similar settings.
  NCCN SCLC 2025: Category 2A. The key safety concern is ILD/pneumonitis (~6-9% Grade 3+),
  which requires active monitoring and immediate action. B7-H3 testing not required per label.
  In the 3L+ setting, ifinatamab and tarlatamab (DLL3×CD3 BiTE) are complementary options —
  different mechanisms; patient fitness, prior toxicities, and access determine the choice.

sources:
  - SRC-IDEATE-LUNG01-2024
  - SRC-NCCN-SCLC-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  Workstream EH 2026-05-04. Ifinatamab deruxtecan 3L+ SCLC.
  IDeate-Lung01 accelerated approval. ILD is the key safety signal.
  Complementary to tarlatamab (different mechanism, different toxicity profile).
  Two-reviewer clinical signoff required per CHARTER §6.1.
