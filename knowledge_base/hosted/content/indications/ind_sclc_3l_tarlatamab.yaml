id: IND-SCLC-3L-TARLATAMAB
plan_track: standard

applicable_to:
  disease_id: DIS-SCLC
  line_of_therapy: 3
  stage_requirements:
    - "Extensive-stage SCLC (ES-SCLC)"
    - "Relapsed or refractory after at least 2 prior systemic therapy regimens"
    - "Prior platinum-based chemotherapy required"
  biomarker_requirements:
    - "DLL3 testing: not mandated by FDA label; benefit observed across expression levels"
    - "DLL3 IHC or RNA expression testing preferred for prognostic stratification"

recommended_regimen: REG-TARLATAMAB-SCLC

concurrent_therapy: []

followed_by:
  - "Continue tarlatamab until progression or unacceptable toxicity"
  - "No standard maintenance or consolidation defined post-tarlatamab"

evidence_level: high
strength_of_recommendation: strong
nccn_category: 2A

expected_outcomes:
  overall_response_rate: "40% (DLL3-high patients, step-up dosing arm, DeLLphi-301)"
  median_duration_of_response_months: 9.7
  median_overall_survival_months: 13.2
  disease_control_rate: "~66%"
  notes: "DeLLphi-301 (NEJM 2023): step-up arm ORR 40%, mDOR 9.7 months, mOS 13.2 months. Grade 3+ CRS rate 4%."

hard_contraindications:
  - "Prior Grade 4 CRS on tarlatamab or any BiTE/immune effector cell therapy (relative contraindication; case-by-case)"
  - "Active uncontrolled autoimmune disease requiring systemic immunosuppression"
  - "ECOG PS 4 (engine hard gate)"

red_flags_triggering_alternative:
  - RF-SCLC-BRAIN-METS-EMERGENCY
  - RF-SCLC-PARANEOPLASTIC
  - RF-SCLC-INFECTION-SCREENING
  - RF-SCLC-ORGAN-DYSFUNCTION

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-CECT-CAP
  - TEST-BRAIN-MRI-CONTRAST
  - "Tocilizumab on site (hospital formulary requirement for CRS management)"

desired_tests:
  - "DLL3 IHC or RNA testing (prognostic; not required for eligibility)"
  - "ECOG PS reassessment"

rationale: >
  Tarlatamab (DLL3 x CD3 BiTE, Imdelltra) received FDA accelerated approval May 2024
  for ES-SCLC after >=2 prior therapy lines. DeLLphi-301 (Ahn 2023 NEJM) demonstrated
  ORR 40% in DLL3-high patients with step-up dosing (1 mg C1D1 -> 10 mg Q2W), with
  mDOR 9.7 months and mOS 13.2 months. Grade 3+ CRS reduced to 4% with step-up vs 10%
  flat dosing. NCCN SCLC 2025 Cat 2A. Represents first BiTE approval in SCLC and
  first DLL3-targeting therapy. Step-up dosing mandatory; C1D1 and C1D8 require
  hospitalization. Alternative to topotecan rechallenge or lurbinectedin in 3L+.

sources:
  - SRC-NCCN-SCLC-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  STUB - authored 2026-05-04 (Workstream DZ). Tarlatamab 3L+ SCLC indication.
  DeLLphi-301 accelerated approval. Two-reviewer clinical signoff required.
