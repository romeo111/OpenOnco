id: IND-SCLC-LS-CONSOLIDATION-DURVA
plan_track: standard

applicable_to:
  disease_id: DIS-SCLC
  stage_stratum: LIMITED
  line_of_therapy: 1
  stage_requirements:
    - "Limited-stage SCLC (TNM stage I–III; not candidates for surgical resection)"
    - "Completed concurrent platinum-based chemoradiotherapy (cCRT)"
    - "No disease progression after cCRT"
    - "Start durvalumab within 1–42 days of completing cCRT (per ADRIATIC protocol window)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 1

recommended_regimen: REG-DURVA-CONSOLIDATION-SCLC
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

actionability_review_required: true

expected_outcomes:
  overall_survival_median:
    value: "55.9 vs 33.4 mo (HR 0.73; p=0.01)"
    source: SRC-ADRIATIC-CHENG-2024
  progression_free_survival:
    value: "16.6 vs 9.2 mo (HR 0.76; p=0.02)"
    source: SRC-ADRIATIC-CHENG-2024

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests: []
desired_tests: []

rationale: >
  ADRIATIC (Cheng NEJM 2024, NCT03703297): consolidation durvalumab
  1500 mg q4w × up to 24 months after concurrent platinum-based CRT in
  LS-SCLC nearly doubled median OS (55.9 vs 33.4 mo; HR 0.73). First
  positive immunotherapy trial in LS-SCLC and the first major OS-
  positive trial in this disease in decades. FDA approval Dec-2024;
  EMA 2024. NCCN cat 1 / new standard of care for fit patients without
  progression after cCRT.

rationale_ua: >
  ADRIATIC (Cheng NEJM 2024, NCT03703297): консолідація дурвалумабом (durvalumab)
  1500 mg q4т до 24 місяців після одночасної платино-вмісної ХПТ при ЛС-ДКРЛ майже
  подвоїла медіану ЗВ (55.9 проти 33.4 міс; HR 0.73). Перше позитивне
  імунотерапевтичне дослідження при ЛС-ДКРЛ та перше велике OS-позитивне
  дослідження в цій хворобі за десятиліття. Схвалення FDA груд-2024; EMA 2024.
  Категорія NCCN 1 / новий стандарт лікування для фіт-пацієнтів без прогресування
  після одночасної ХПТ.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_08
draft_revision: 2

sources:
  - source_id: SRC-ADRIATIC-CHENG-2024
    weight: primary
  - source_id: SRC-NCCN-SCLC-2025
    weight: primary
  - source_id: SRC-ESMO-SCLC-2021
    weight: supporting

do_not_do:
  - "Не починайте дурвалумаб у пацієнтів з прогресуванням хвороби після ХПТ — ADRIATIC виключив таких пацієнтів; ефективність не показана"
  - "Не починайте консолідацію після ПОСЛІДОВНОЇ (не одночасної) ХПТ — ADRIATIC включив лише cCRT; для sCRT доказів немає"
  - "Не продовжуйте через імунний пневмоніт ≥G3 — постійне припинення; ризик пневмоніту підвищений на тлі попередньої грудної RT"
  - "Не відкладайте старт довше 42 днів після завершення ХПТ (верхня межа протоколу)"

do_not_do_en:
  - "Do NOT start durvalumab in patients with progression after CRT — ADRIATIC excluded such patients; benefit not shown"
  - "Do NOT start consolidation after SEQUENTIAL (not concurrent) CRT — ADRIATIC enrolled only cCRT; no evidence for sCRT"
  - "Do NOT continue through Grade ≥3 immune pneumonitis — permanent discontinuation; pneumonitis risk additive on prior thoracic RT"
  - "Do NOT delay start beyond 42 days post-CRT completion (protocol upper limit)"

last_reviewed: "2026-05-08"
reviewers: []
notes: >
  Sequential after IND-SCLC-LIMITED-1L (concurrent CRT). Reflects
  post-2024 standard-of-care shift; SRC-ESMO-SCLC-2021 predates
  ADRIATIC and may not yet reflect this consolidation strategy —
  flagged for currency review when ESMO refreshes SCLC guideline.
  Durva+tremelimumab arm in ADRIATIC did NOT improve outcomes over
  durva alone — only the monotherapy arm is the approved regimen.
