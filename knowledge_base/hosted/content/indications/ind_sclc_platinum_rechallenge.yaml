notes: >
  CTFI stratification for SCLC 2L:
  - CTFI <90 days: platinum-resistant → topotecan (IND-SCLC-RR-TOPOTECAN) or
    lurbinectedin (IND-SCLC-RR-LURBINECTEDIN)
  - CTFI 90-180 days: intermediate sensitivity → rechallenge OR topotecan;
    MDT discussion
  - CTFI ≥180 days: platinum-sensitive → rechallenge with original regimen
    (this indication) is preferred

  If patient received atezo or durva with 1L CE, rechallenge with CE alone
  (without re-adding immunotherapy) is standard; re-adding PD-L1 after
  progression on PD-L1 is not supported by data.
