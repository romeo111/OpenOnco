rationale: >
  Single-agent lurbinectedin is FDA accelerated-approved (June 2020)
  for R/R SCLC after platinum-based 1L, on the basis of Trigo et al.
  phase II basket trial (Lancet Oncol 2020, n=105 SCLC cohort) — ORR
  35.2% overall; platinum-sensitive (CTFI ≥90 days) ORR 45%, mDOR 6.2
  mo, mOS 11.9 mo; platinum-resistant (CTFI <90 days) ORR 22%, mDOR
  4.7 mo, mOS 5.0 mo. Mechanism: covalent DNA minor-groove binder
  (selectively at GC-rich regions) — induces DNA double-strand
  breaks, inhibits trans-activated transcription, depletes
  tumor-associated macrophages. Toxicity: myelosuppression dominant
  (Grade 3-4 neutropenia ~46%, febrile neutropenia ~5%) — G-CSF
  primary prophylaxis recommended in heavily pretreated patients;
  reversible transaminitis common (CYP3A4-mediated metabolism).
  ATLANTIS phase III (lurbinectedin + doxorubicin vs CAV/topotecan,
  2L SCLC) did NOT meet OS primary endpoint (mOS 8.6 vs 7.6 mo, HR
  0.97) — combination NOT superior; monotherapy use rests on basket
  trial + NCCN Cat 2A listing. Compared to topotecan (historical 2L
  SOC): non-inferior efficacy, less hematologic toxicity, oral
  alternative not available (lurbinectedin IV q3w). Major Ukraine
  access barrier: not registered, not reimbursed; out-of-pocket
  USD 8-12K per cycle. Trial source SRC-ATLANTIS-PAZ-ARES-2023 +
  SRC-TRIGO-2020 pending KB ingestion; cited via NCCN-SCLC-2025 +
  ESMO-SCLC-2021.

rationale_ua: >
  Лурбінектедин монотерапія FDA accelerated-approved (червень 2020)
  для R/R МКЛЛ після платиновмісної 1L, на підставі Trigo et al.
  фаза II basket (Lancet Oncol 2020, n=105 МКЛЛ-когорта) — ORR 35.2%
  загалом; платино-чутливі (CTFI ≥90 днів) ORR 45%, mDOR 6.2 міс,
  mOS 11.9 міс; платино-резистентні (CTFI <90 днів) ORR 22%, mDOR
  4.7 міс, mOS 5.0 міс. Механізм: ковалентний DNA minor-groove
  binder (селективно у GC-багатих ділянках) — індукує
  двониткові розриви ДНК, інгібує транс-активовану транскрипцію,
  виснажує пухлино-асоційовані макрофаги. Токсичність: мієлосупресія
  домінує (Grade 3-4 нейтропенія ~46%, febrile neutropenia ~5%) —
  Г-КСФ первинна профілактика рекомендована у важко передлікованих;
  оборотний transaminitis частий (CYP3A4-метаболізм). ATLANTIS фаза
  III (лурбінектедин + доксорубіцин проти CAV/топотекан, 2L МКЛЛ)
  НЕ досягла первинної кінцевої точки ЗВ (mOS 8.6 проти 7.6 міс,
  HR 0.97) — комбінація НЕ перевершує; монотерапія тримається на
  basket trial + NCCN Кат 2A. Порівняно з топотеканом (історичний
  2L SOC): неінферіорна ефективність, менш виражена гематологічна
  токсичність; пероральна альтернатива недоступна (лурбінектедин
  IV q3 тижні). Великий бар'єр доступу в Україні: не зареєстрований,
  не відшкодовується НСЗУ; out-of-pocket USD 8-12K за цикл. Джерела
  SRC-ATLANTIS-PAZ-ARES-2023 + SRC-TRIGO-2020 очікуються в KB;
  цитовано через NCCN-SCLC-2025 + ESMO-SCLC-2021.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-SCLC-2025
    position: supports
    relevant_quote_paraphrase: "Lurbinectedin is preferred for R/R SCLC after platinum-based 1L (Cat 2A) per Trigo phase II basket trial"
  - source_id: SRC-ESMO-SCLC-2021
    position: supports
    relevant_quote_paraphrase: "ESMO recognizes lurbinectedin as 2L option for R/R SCLC; topotecan remains alternative"

do_not_do:
  - "НЕ призначати лурбінектедин у CTFI <30 днів від останньої дози платини — поза показаннями FDA-етикетки (платино-резистентні з дуже коротким CTFI мають мінімальну користь)."
  - "НЕ пропускати Г-КСФ первинну профілактику у важко передлікованих пацієнтів — Grade 3-4 нейтропенія ~46%, febrile neutropenia ~5%."
  - "НЕ комбінувати з сильними CYP3A4-інгібіторами (ітраконазол, кларитроміцин, ритонавір) — AUC підвищення; уникати."
  - "НЕ призначати при baseline LFTs >3× ULN — гепатичний метаболізм; оборотний transaminitis частий."
  - "НЕ комбінувати з доксорубіцином поза клінічним протоколом — ATLANTIS фаза III НЕ досягла первинної кінцевої точки ЗВ; тільки монотерапія підтримана."
  - "НЕ підтверджувати план без funding pathway — препарат не зареєстрований в Україні; out-of-pocket USD 8-12K за цикл."

known_controversies:
  - topic: "Lurbinectedin monotherapy vs topotecan vs amrubicin in R/R SCLC 2L"
    positions:
      - position: "Lurbinectedin preferred per NCCN Cat 2A — non-inferior efficacy, less hematologic toxicity vs topotecan"
        sources: [SRC-NCCN-SCLC-2025]
      - position: "Topotecan remains alternative — registered in Ukraine, lower cost, established 2L SOC pre-2020"
        sources: [SRC-ESMO-SCLC-2021]
        evidence_note: "Topotecan has higher Grade 3-4 hematologic toxicity but is registered + reimbursed in Ukraine; access-driven choice."
    our_default: "Lurbinectedin if access available (international pharmacy / clinical trial); topotecan otherwise"
    rationale: "Efficacy similar; topotecan dominates Ukraine access, lurbinectedin dominates international guideline preference"
  - topic: "Re-challenge with platinum-doublet vs lurbinectedin in platinum-sensitive (CTFI ≥180 days) relapse"
    positions:
      - position: "Platinum re-challenge preferred in CTFI ≥180 days — historical precedent, registered + reimbursed"
        sources: [SRC-NCCN-SCLC-2025]
      - position: "Lurbinectedin acceptable alternative — basket trial showed 45% ORR in CTFI ≥90 days"
        sources: [SRC-NCCN-SCLC-2025]
    our_default: "Platinum re-challenge for CTFI ≥180 days; lurbinectedin for CTFI 30-180 days or platinum-intolerant"
    rationale: "Long CTFI predicts platinum response; lurbinectedin is fallback for platinum-resistant or intolerant"

time_critical: false
last_reviewed: "2026-04-29"
reviewers: []
reviewer_signoffs: 0
notes: >
  STUB — pending Clinical Co-Lead sign-off. Aggressive-track 2L
  for R/R SCLC after platinum-based 1L. No biomarker dependency
  (lurbinectedin is non-targeted DNA-damage agent); applicability
  driven by line-of-therapy + CTFI + organ function. Ukraine access
  constraint dominant (not registered, not NSZU; out-of-pocket
  USD 8-12K/cycle).
  WIRED: routed by ALGO-SCLC-2L (platinum-sensitive step 2 CTFI ≥90
  days → lurbinectedin + topotecan alternatives; platinum-resistant
  step 4 → lurbinectedin vs topotecan routing). Gap CLOSED.
