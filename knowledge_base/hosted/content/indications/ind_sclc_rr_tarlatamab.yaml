notes: >
  STUB — pending Clinical Co-Lead sign-off. Aggressive-track 2L for R/R
  ES-SCLC after platinum-based 1L chemotherapy. No biomarker dependency
  for label use (DLL3 IHC NOT required); applicability driven by
  line-of-therapy + ECOG + organ function + access to inpatient
  infusion centre. Mandatory cycle 1 inpatient monitoring (≥22 hr post
  D1 + D8) + tocilizumab-on-formulary + ICU access for Grade ≥3 CRS
  are structural deployment constraints beyond drug acquisition cost.
  Ukraine access constraint dominant (not registered, not НСЗУ;
  out-of-pocket USD 30-40K/cycle) AND structural infrastructure barrier
  limits realistic deployment. Evidence level: moderate (single-arm
  phase 2 + FDA accelerated approval; phase 3 DeLLphi-304 confirmatory
  trial pending); strength of recommendation: conditional. Algorithm
  wiring deferred — SCLC R/R algorithm not yet authored in KB; out of
  chunk scope. PUL-A4 chunk closes #491.
