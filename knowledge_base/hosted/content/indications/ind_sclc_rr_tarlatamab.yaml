rationale: >
  Tarlatamab is a first-in-class DLL3 × CD3 bispecific T-cell engager
  (BiTE) granted FDA accelerated approval May 2024 for extensive-stage
  SCLC with disease progression on or after platinum-based 1L
  chemotherapy, on the basis of DeLLphi-301 (Ahn et al., NEJM 2023;
  NCT05060016). In the 10 mg q2w cohort (n=99 evaluable), confirmed ORR
  per independent central review was 40%, mPFS 4.9 mo, mOS 14.3 mo,
  median DoR not reached at 10.6 mo follow-up — favorable benchmarks
  vs historical 2L SCLC controls (topotecan ORR ~20%, mOS 5-7 mo;
  lurbinectedin basket-trial ORR 35%, mOS 9-12 mo platinum-sensitive).
  DLL3 is an inhibitory Notch ligand aberrantly expressed on the surface
  of ~85-95% of SCLC tumors but minimally on normal tissues — DeLLphi-301
  did NOT gate enrollment on DLL3 IHC, so DLL3 testing is not a label
  requirement (most SCLCs are DLL3+). Mechanism: bispecific antibody
  links DLL3 on tumor cells to CD3ε on T cells, redirecting polyclonal
  T-cell cytotoxicity. Distinct from blinatumomab BiTE in solid-tumor
  target and dosing format (q2w bolus vs continuous infusion). Toxicity
  dominated by cytokine release syndrome (~50% any-grade, mostly Grade
  1-2 cycle 1 fever ± mild hypotension; Grade ≥3 ~1%) and ICANS-like
  neurotoxicity (Grade ≥3 ~7%); both generally reversible with
  corticosteroids ± tocilizumab. Mandatory step-up dosing (1 mg D1 → 10
  mg D8 → 10 mg D15 → q2w) plus inpatient monitoring ≥22 hours after
  cycle 1 D1 and D8 infusions is required per FDA prescribing
  information and is the dominant deployment constraint. NCCN-SCLC 2025
  Category 2A for ES-SCLC 2L+ post-platinum. ESCAT tier IIA. Confirmatory
  phase 3 DeLLphi-304 (tarlatamab vs investigator-choice chemotherapy)
  pending; if positive, will move to full approval. Compared to
  lurbinectedin (2L SCLC, FDA accelerated approval 2020): tarlatamab
  shows higher ORR (40% vs 35%) and longer mOS (14.3 vs 9.3 mo overall)
  but with substantially higher logistical complexity (inpatient cycle
  1 monitoring; CRS / ICANS protocol required). Compared to topotecan
  (historical 2L SOC, registered + reimbursed in Ukraine): superior
  efficacy on every endpoint but inaccessible in Ukraine without
  named-patient import + capable inpatient centre. Major Ukraine access
  barrier: not registered, not reimbursed; out-of-pocket USD 30-40K per
  cycle (US WAC); structural barrier beyond cost — requires inpatient
  infusion centre with tocilizumab on formulary and ICU access for
  Grade ≥3 CRS, limiting realistic deployment to a small number of
  major Kyiv / regional oncology centres.

rationale_ua: >
  Тарлатамаб — перший у класі DLL3 × CD3 біспецифічний Т-клітинний
  активатор (BiTE), отримав FDA accelerated approval у травні 2024 для
  extensive-stage МКЛЛ після прогресування на платиновмісній 1L ХТ на
  підставі DeLLphi-301 (Ahn et al., NEJM 2023; NCT05060016). У когорті
  10 мг q2w (n=99 оцінюваних) підтверджена ORR за незалежним
  центральним оглядом склала 40%, mPFS 4.9 міс, mOS 14.3 міс, медіана
  DoR не досягнута при 10.6 міс спостереження — сприятливі показники
  проти історичних 2L контролів (топотекан ORR ~20%, mOS 5-7 міс;
  лурбінектедин basket ORR 35%, mOS 9-12 міс платино-чутливі). DLL3 —
  інгібіторний ліганд Notch, надекспресований на поверхні ~85-95%
  пухлин МКЛЛ і мінімально — на нормальних тканинах; DeLLphi-301 НЕ
  обмежував включення за статусом DLL3 IHC, тому тестування DLL3 не
  є вимогою етикетки (більшість МКЛЛ — DLL3+). Механізм: біспецифічне
  антитіло зв'язує DLL3 на пухлинній клітині та CD3ε на Т-клітині,
  перенаправляючи поліклональну Т-клітинну цитотоксичність. Відмінне
  від блінатумомабу-BiTE солід-пухлинною мішенню та форматом введення
  (q2w болюс vs безперервна інфузія). Токсичність визначається CRS
  (~50% будь-якого ступеня, переважно Grade 1-2 у циклі 1: лихоманка
  ± легка гіпотензія; Grade ≥3 ~1%) та ICANS-подібною нейротоксичністю
  (Grade ≥3 ~7%); обидва зазвичай оборотні зі стероїдами ± тоцилізумабом.
  Обов'язковий step-up dosing (1 mg Д1 → 10 mg Д8 → 10 mg Д15 → q2w) +
  стаціонарний моніторинг ≥22 год після інфузій циклу 1 Д1 і Д8 за
  інструкцією FDA — головне обмеження впровадження. NCCN-SCLC 2025
  категорія 2A для ES-МКЛЛ ≥2L після платини. ESCAT tier IIA.
  Підтверджуюча фаза 3 DeLLphi-304 (тарлатамаб проти ХТ за вибором
  дослідника) триває. Порівняння: vs лурбінектедин (2L МКЛЛ, FDA
  accelerated 2020) — вища ORR (40% vs 35%) та довша mOS (14.3 vs 9.3
  міс загалом), але суттєво вища логістична складність. Vs топотекан
  (історичний 2L SOC, зареєстрований + НСЗУ) — переважає ефективністю
  на всіх кінцевих точках, але недоступний в Україні без named-patient
  імпорту та центру з відповідною інфраструктурою. Великий бар'єр
  доступу в Україні: не зареєстрований, не відшкодовується НСЗУ;
  out-of-pocket USD 30-40K за цикл (US WAC); структурний бар'єр поза
  вартістю — потрібен інфузійний центр з тоцилізумабом на формулярі
  та доступом до ВІТ для Grade ≥3 CRS, що обмежує реальне впровадження
  кількома великими київськими / регіональними онкоцентрами.

