sources:
  - source_id: SRC-DELLPHI-301-AHN-2023
    position: supports
    relevant_quote_paraphrase: "DeLLphi-301 — open-label phase 2; 10 mg q2w cohort n=99 evaluable, confirmed ORR 40% per independent central review, mPFS 4.9 mo, mOS 14.3 mo, mDoR not reached at 10.6 mo follow-up; CRS any-grade ~50% (Grade ≥3 ~1%); ICANS Grade ≥3 ~7%."
  - source_id: SRC-NCCN-SCLC-2025
    position: supports
    relevant_quote_paraphrase: "Tarlatamab is recommended for relapsed/refractory ES-SCLC after platinum-based 1L (Category 2A); mandatory step-up dosing + inpatient cycle 1 monitoring per US PI."
  - source_id: SRC-ESMO-SCLC-2021
    position: context
    relevant_quote_paraphrase: "ESMO 2021 SCLC guideline pre-dates tarlatamab approval; 2L recommendations cite topotecan / re-challenge platinum / clinical-trial enrollment; ESMO update pending tarlatamab incorporation."

do_not_do:
  - "НЕ призначати тарлатамаб без можливості стаціонарного моніторингу ≥22 год після інфузії циклу 1 Д1 і Д8 — обов'язково за інструкцією FDA для зниження ризику CRS."
  - "НЕ розпочинати тарлатамаб у центрі без тоцилізумабу на формулярі та доступу до ВІТ — Grade ≥3 CRS ~1% потребує агресивної підтримки (вазопресори, кисень високого потоку, кортикостероїди в/в)."
  - "НЕ пропускати step-up dosing (1 мг Д1 → 10 мг Д8 → 10 мг Д15) — пряме введення повної дози без праймування суттєво підвищує ризик тяжкого CRS."
  - "НЕ продовжувати тарлатамаб при Grade 4 CRS або Grade 3-4 ICANS, що рецидивують після протоколу лікування — постійна відміна за інструкцією."
  - "НЕ призначати при активній неконтрольованій інфекції — Т-клітинна перерозподілка + гіпогаммаглобулінемія підвищують ризик сепсису (~10% Grade ≥3)."
  - "НЕ комбінувати з живими вакцинами під час терапії та ≥4 тижні після останньої дози — ризик дисемінованої вакцинної інфекції на тлі активації Т-клітин."
  - "НЕ підтверджувати план без funding pathway та підтвердженого інфузійного центру — препарат не зареєстрований в Україні; out-of-pocket USD 30-40K за цикл."
  - "НЕ покладатися на DLL3-IHC для відбору пацієнтів — DeLLphi-301 не використовував DLL3-тестування для включення; більшість МКЛЛ є DLL3-позитивними."

known_controversies:
  - topic: "Tarlatamab vs lurbinectedin vs topotecan as preferred 2L for R/R ES-SCLC"
    positions:
      - position: "Tarlatamab preferred per NCCN Cat 2A — superior ORR (40% vs 35% vs 20%) and longer mOS (14.3 vs 9.3 vs 5-7 mo) on cross-trial comparison; FDA accelerated approval May 2024"
        sources: [SRC-NCCN-SCLC-2025, SRC-DELLPHI-301-AHN-2023]
        evidence_note: "Cross-trial comparison without head-to-head data; DeLLphi-304 phase 3 vs investigator-choice chemotherapy will provide randomized OS data."
      - position: "Lurbinectedin alternative — outpatient infusion, no inpatient cycle 1 requirement; lower structural barrier even though also unregistered in Ukraine"
        sources: [SRC-NCCN-SCLC-2025]
      - position: "Topotecan remains the only 2L option registered + НСЗУ-reimbursed in Ukraine — pragmatic default for UA-restricted-access patients despite inferior efficacy"
        sources: [SRC-ESMO-SCLC-2021]
        evidence_note: "Historical 2L SOC pre-2020; higher hematologic toxicity than tarlatamab or lurbinectedin."
    our_default: "Tarlatamab if access + inpatient infrastructure available; lurbinectedin if access available but inpatient barrier prohibitive; topotecan as UA-deployable fallback"
    rationale: "Efficacy ranking tarlatamab > lurbinectedin > topotecan on cross-trial comparison; access ranking inverted (topotecan > lurbinectedin > tarlatamab) for Ukraine patients."
  - topic: "DLL3 IHC pre-screening for tarlatamab eligibility"
    positions:
      - position: "DLL3 IHC NOT required per FDA label — DeLLphi-301 did not gate enrollment on DLL3 status; most SCLCs are DLL3+ (~85-95%)"
        sources: [SRC-DELLPHI-301-AHN-2023]
      - position: "DLL3 testing may be informative for response prediction in future studies — biomarker-stratified analyses suggest higher response in DLL3-high tumors but cutoffs not validated"
        sources: [SRC-DELLPHI-301-AHN-2023]
        evidence_note: "Exploratory biomarker analyses in DeLLphi-301; not actionable for current label use."
    our_default: "Do not require DLL3 IHC for eligibility — proceed per label criteria (ES-SCLC progressing post-platinum)"
    rationale: "DLL3 testing is not a label requirement; routine SCLC tumors are DLL3+ at high frequency."

