notes: >
  Standard-track 2L for R/R SCLC. Topotecan is NCCN Category 1 and remains
  the de-facto Ukraine standard (registered, NSZU-reimbursable) vs lurbinectedin
  (aggressive track, NCCN Cat 2A, not registered UA). CTFI stratification is
  key: ≥180 days → consider platinum rechallenge first; 30-180 days → lurbinectedin
  preferred (aggressive) or topotecan (standard); <30 days → topotecan.
  Oral topotecan equivalent by OS but unavailable in Ukraine.
