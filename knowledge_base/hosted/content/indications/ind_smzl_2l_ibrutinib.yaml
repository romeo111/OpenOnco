id: IND-SMZL-2L-IBRUTINIB
plan_track: standard

applicable_to:
  disease_id: DIS-SPLENIC-MZL
  line_of_therapy: 2
  stage_requirements:
    - "Relapsed or refractory splenic marginal zone lymphoma after ≥1 prior anti-CD20-containing therapy (rituximab monotherapy, BR, R-CHOP, or similar)"
    - "BTK inhibitor (ibrutinib) naive"
    - "ECOG PS 0-3 (ibrutinib oral; feasible across broad PS)"
    - "No active major bleeding or anticoagulant requirement that cannot be safely interrupted"
    - "Adequate hepatic function: ALT/AST ≤3× ULN (ibrutinib hepatotoxicity)"
    - "No uncontrolled atrial fibrillation (ibrutinib pro-AF; cardiology evaluation if pre-existing AF)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded:
    - "BTK C481S resistance mutation (rare; renders ibrutinib inactive — seen after prior BTKi; not applicable at first BTKi use)"
  demographic_constraints:
    ecog_max: 3
    notes: >
      Ibrutinib 560 mg PO daily is well-tolerated orally across broad PS. Elderly
      patients (>75): higher atrial fibrillation and bleeding risk — baseline ECG
      and fall/bleeding risk assessment mandatory. ECOG 4: CHARTER goals-of-care
      gate applies.

recommended_regimen: REG-IBRUTINIB-MZL
alternative_regimens:
  - regimen_id: IND-SMZL-2L-BR
    description: >
      Bendamustine + rituximab (BR) — NCCN Cat 1, preferred 2L for fit SMZL patients.
      ORR ~85-90% in MZL. Use ibrutinib when BR is contraindicated (renal/cardiac
      impairment, prior heavy alkylator exposure) or patient strongly prefers oral therapy.
  - regimen_id: IND-SMZL-2L-R2
    description: >
      Lenalidomide + rituximab (R²) — NCCN Cat 1 (AUGMENT; ORR ~80% MZL; mPFS 31.4 mo).
      Preferred over ibrutinib for rituximab-refractory SMZL (mechanistically bypasses
      anti-CD20 resistance via IMiD pathway). Use ibrutinib after R² failure or when
      lenalidomide inaccessible.

concurrent_therapy:
  - "ECG baseline MANDATORY: ibrutinib associated with atrial fibrillation (5-10%/year). If baseline AF present: cardiology evaluation and rate-control before starting."
  - "Blood pressure monitoring monthly (hypertension 5-10% with ibrutinib)"
  - "CBC + LFT monthly × 3, then q3 months"
  - "Hold ibrutinib 3-7 days peri-procedure (surgery, biopsy, dental extraction) — bleeding risk"
  - "Avoid concurrent strong CYP3A4 inhibitors (azole antifungals): if unavoidable, reduce ibrutinib to 140 mg/day. Prefer fluconazole over voriconazole."
  - "No concurrent anticoagulants if clinically avoidable (additive bleeding risk)"

followed_by:
  - "CT restaging every 3-4 cycles (Lugano criteria): assess for partial or complete response"
  - "Continue until disease progression or unacceptable toxicity — no fixed-duration stopping rule"
  - "At progression on ibrutinib: re-biopsy for transformation (DLBCL transformation ~5-10% in MZL); zanubrutinib or acalabrutinib (next-gen BTKi) if BTK-C481 wild-type; clinical trial"

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2B"

expected_outcomes:
  overall_response_rate: "~58% SMZL (11/19 in PCYC-1121 SMZL cohort; Noy 2017 Blood); ~48% all MZL"
  complete_response: "~3% all MZL (very low — most responses are PRs)"
  median_pfs_months: "~14.2 months (all MZL; PCYC-1121)"
  median_dor_months: "~14.8 months (Noy 2017)"
  notes: >
    PRIMARY EVIDENCE: PCYC-1121 (Noy et al. 2017 Blood; phase 2 single-arm; n=63 MZL):
    - Ibrutinib 560 mg PO daily in r/r MZL after ≥1 prior anti-CD20 therapy
    - All MZL: ORR 48% (30/63); CR 3% (2/63); PR 45%; median PFS 14.2 months
    - SMZL subgroup (n=19): ORR 58% (11/19)
    - NMZL subgroup (n=16): ORR 50% (8/16)
    - MALT subgroup (n=28): ORR 39% (11/28)
    - Median DoR 14.8 months; OS at 12 months 86%
    - Grade ≥3 AEs: neutropenia (15%), anemia (8%), pneumonia (8%)
    - FDA approved January 2017 for MZL with ≥1 prior anti-CD20 therapy

    CLINICAL POSITION vs BR/R²:
    CR rate of ~3% with ibrutinib is substantially lower than BR (CR ~40-50%) or R²
    (CR ~20-30% in MZL). Most patients achieve PR only. BR and R² are NCCN Category 1
    preferred options; ibrutinib (Cat 2B) is appropriate when:
    1. Both BR and R² have been previously used and failed.
    2. Chemotherapy contraindicated (organ dysfunction) + R² inaccessible.
    3. Patient prefers or requires oral-only non-cytotoxic therapy.
    4. Frail/elderly who tolerate oral targeted therapy but not IV chemotherapy.

    MYD88 RELEVANCE:
    MYD88 L265P mutation (~15-30% of SMZL; higher in WM/DLBCL-ABC) may predict
    ibrutinib response via enhanced BCR/NF-κB signalling. However, ibrutinib is
    FDA-approved for MZL regardless of MYD88 status — not required as a gate.

    UKRAINE ACCESS:
    Ibrutinib NSZU-reimbursed for CLL and WM in Ukraine, NOT for MZL. Access for
    MZL patients requires named-patient import or compassionate-use (AbbVie/Janssen).
    Practical access ≈zero in most Ukrainian centres for MZL indication.

hard_contraindications:
  - "Major uncontrollable bleeding or concurrent anticoagulation that cannot be interrupted: high bleeding risk with ibrutinib"
  - "Severe hepatic impairment (Child-Pugh C): ibrutinib hepatic metabolism impaired; avoid"
  - "Concurrent strong CYP3A4 inhibitor unavoidable at standard dose: if unavoidable, reduce ibrutinib to 140 mg"
  - "Hypersensitivity to ibrutinib"

red_flags_triggering_alternative:
  - condition: "Ibrutinib inaccessible (not NSZU-funded for MZL; named-patient failed) → IND-SMZL-2L-BR or IND-SMZL-2L-R2 (accessible, Cat 1)"
  - condition: "Uncontrolled atrial fibrillation that cannot be rate-controlled: cardiology evaluation; consider zanubrutinib (lower AF rate); if BTKi not feasible → IND-SMZL-2L-BR or IND-SMZL-2L-R2"
  - condition: "Histologic transformation at relapse: rebiopsy mandatory; if DLBCL → ALGO-DLBCL routing (ibrutinib monotherapy insufficient for transformed disease)"

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - "ECG with QTc baseline (atrial fibrillation risk assessment)"
  - "CT restaging (chest/abdomen/pelvis with contrast) before starting — document baseline disease"
  - TEST-HBV-SEROLOGY

desired_tests:
  - "MYD88 L265P mutation testing (NGS or allele-specific PCR): informative for response prediction; not required as gate"
  - "Bone marrow biopsy if new cytopenias (rule out transformation; assess marrow infiltration)"

rationale: >
  Ibrutinib 560 mg PO daily for relapsed/refractory SMZL after ≥1 prior anti-CD20-
  containing therapy. FDA approved January 2017 (PCYC-1121; Noy 2017 Blood; ORR 48%;
  SMZL ORR 58%; NCCN Category 2B).

  CLINICAL RATIONALE FOR IBRUTINIB IN MZL:
  MZL cells depend on B-cell receptor (BCR) / NF-κB signalling for survival.
  Ibrutinib (irreversible BTK inhibitor) blocks downstream BCR signalling →
  impairs proliferation and survival of MZL clones. MYD88 L265P mutation amplifies
  BTK-dependent NF-κB signalling — high MYD88 frequency in MZL (especially SMZL ~15-30%)
  provides mechanistic basis for BTKi activity.

  POSITION IN 2L MZL HIERARCHY:
  1. First choice (NCCN Cat 1): BR or R² (ORR ~80-90%; CR ~20-50%)
  2. Second choice (NCCN Cat 2B): ibrutinib (ORR ~48%; CR ~3%)
  Ibrutinib is particularly useful when chemotherapy + R² have been exhausted,
  when toxicity profile of cytotoxic agents is prohibitive, or when oral-only
  administration is preferred.

  UKRAINE ACCESS:
  Not NSZU-reimbursed for MZL. Named-patient or compassionate-use access required.
  BR (IND-SMZL-2L-BR) and R² (IND-SMZL-2L-R2) are the practical first-line 2L
  options for Ukrainian SMZL patients; ibrutinib is reserved for cases where both
  are exhausted or truly inaccessible.

rationale_ua: >
  Ібрутиніб 560 мг PO щоденно для рецидивної/рефрактерної СМЗЛ після ≥1 попередньої
  терапії з анти-CD20. FDA 2017; PCYC-1121 (Noy 2017 Blood): ЗВ 48% (СМЗЛ 58%);
  ПВ лише 3% — переважно часткові відповіді. NCCN Cat 2B.
  Місце в алгоритмі: третя лінія після виснаження BR (Cat 1) та R² (Cat 1).
  Механізм: блокада BTK → порушення BCR/NF-κB-сигналізації в клонах MЗЛ.
  В Україні: НСЗУ не відшкодовує для МЗЛ (лише для ХЛЛ/МКЛ/ВМ); доступ через
  named-patient або compassionate-use (AbbVie/Janssen). Практичний доступ ≈нульовий.
  При недоступності → BR або R² (НСЗУ-доступні за відповідними показаннями).

ukrainian_review_status: pending_clinical_signoff
