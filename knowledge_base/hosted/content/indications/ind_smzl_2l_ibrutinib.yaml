do_not_do:
  - "Не призначати при некерованій AF без консультації кардіолога — ібрутиніб збільшує ризик AF"
  - "Не призначати разом з антикоагулянтами без крайньої потреби — ризик великої кровотечі"
  - "Не поєднувати з сильними інгібіторами CYP3A4 без зниження дози до 140 мг/добу"
  - "Не ігнорувати підозру на гістологічну трансформацію — ібрутиніб монотерапія недостатня для DLBCL-трансформації"
  - "Не призначати при тяжкій печінковій недостатності (Child-Pugh C)"
  - "Не оминати BR/R² без обґрунтування — ібрутиніб Cat 2B, суттєво нижча ПВ vs BR/R²"

sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN B-cell/MZL 2025 Category 2B: ibrutinib 560 mg PO daily for r/r MZL
      after ≥1 prior anti-CD20 (PCYC-1121 basis; Noy 2017 Blood). FDA approved
      January 2017. Listed as an option; BR and R² are preferred Cat 1 choices
      for most patients. Low CR rate (~3%) vs Cat 1 options.

