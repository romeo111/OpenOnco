do_not_do:
  - "Без REMS-реєстрації та тесту на вагітність — леналідомід кат X тератоген; REMS обов'язковий"
  - "Без ВТЕ-профілактики — аспірин мінімум; НМГ при високому ризику (ВТЕ ~7% в AUGMENT)"
  - "При трансформації в DLBCL — R² неефективний; потрібна агресивна 2L терапія"
  - "При пізньому рецидиві ≥12 міс (ритуксимаб-чутливий) — R-моно ретретмент достатній; R² не потрібний якщо немає рефрактерності"
  - "Без HBV-скринінгу — ритуксимаб + імуносупресія → реактивація HBV"
  - "При CrCl <30: леналідомід протипоказаний; перейти на R-моно"

