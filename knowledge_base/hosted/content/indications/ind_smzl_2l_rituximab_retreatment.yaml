sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN B-cell 2025: rituximab monotherapy Cat 2A for relapsed/refractory SMZL in
      patients not candidates for bendamustine-containing regimens; also appropriate for
      rituximab-non-refractory late relapse.
  - source_id: SRC-BSH-MZL-2024
    position: supports
    relevant_quote_paraphrase: >
      BSH MZL 2024: rituximab retreatment (4-weekly induction ± maintenance) standard for
      SMZL late relapse (≥12 months); R-benda preferred for fit patients. R-mono appropriate
      for frail/elderly or CrCl <40 mL/min.

do_not_do:
  - "Ритуксимаб при ритуксимаб-рефрактерному SMZL (<6 міс від останньої дози): ORR <20%; переходити на IND-SMZL-2L-BR (O-бенда або R-бенда)"
  - "HBV скринінг обов'ЯЗКОВИЙ: без entecavir профілактики при HBsAg+ або HBcAb+ — реактивація HBV фатальна"
  - "Не пропускати оцінку придатності до бендамустину (КК, вік, ECOG): fit пацієнти — IND-SMZL-2L-BR більш ефективний"
  - "Гістологічна трансформація в DLBCL → не ця індикація; агресивний лімфома протокол"
  - "Не призначати без підтвердження CD20+ на рецидиві (рідкісна втрата CD20 при SMZL)"

