rationale: >
  AI (doxorubicin 75 mg/m² d1 + ifosfamide 10 g/m² d1-4 + mesna q21d) achieves
  significantly higher ORR (26% vs 14%) and longer PFS (7.4 vs 4.6 months, HR 0.74)
  vs doxorubicin monotherapy in EORTC 62012 (n=455) but does NOT improve OS
  (14.3 vs 12.8 months, p=0.076). AI is therefore reserved for patients where
  tumor shrinkage is specifically required: (1) neoadjuvant intent before
  potentially resectable disease; (2) rapidly progressive STS threatening organ
  function; (3) synovial sarcoma (ifosfamide-sensitive subtype). MANDATORY
  supportive care: G-CSF primary prophylaxis (Grade 3/4 neutropenia ~71%),
  mesna for hemorrhagic cystitis prevention, aggressive hydration.
  Do NOT use AI for palliative intent in ECOG ≥2 patients — the toxicity
  burden is not justified without OS benefit.

rationale_ua: >
  AI (доксорубіцин (doxorubicin) 75 mg/m² д1 + іфосфамід (ifosfamide) 10 g/m² д1-4 +
  месна q21д) дає достовірно вищий ORR (26% vs 14%) та кращий PFS (7.4 vs 4.6 міс,
  HR 0.74) при порівнянні з монотерапією доксорубіцином (EORTC 62012, n=455), але
  не покращує OS (14.3 vs 12.8 міс, p=0.076). Тому AI показаний лише при пріоритеті
  відповіді пухлини: неоад'ювантна мета, швидке прогресування, синовіальна саркома.
  ОБОВ'ЯЗКОВА первинна профілактика G-КСФ (нейтропенія Grade 3/4 у 71%).
  Месна ОБОВ'ЯЗКОВА для профілактики геморагічного циститу.
  При паліативній меті та ECOG ≥2 — лише доксорубіцин монотерапія
  (IND-STS-ADVANCED-1L-DOXORUBICIN).

