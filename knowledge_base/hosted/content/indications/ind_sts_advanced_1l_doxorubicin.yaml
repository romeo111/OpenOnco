rationale: >
  Doxorubicin 75 mg/m² q21d is NCCN Category 1 and the global standard of care
  for first-line advanced/metastatic soft-tissue sarcoma. Established in
  multiple phase 2-3 trials as the most broadly active single agent in STS
  (~14% ORR, median OS ~13 months — EORTC 62012). Despite its modest activity,
  doxorubicin monotherapy is the preferred standard-track choice because:
  (1) AI combination (dox+ifosfamide) does NOT improve OS despite higher ORR
      (EORTC 62012: OS 12.8 vs 14.3 months, p=0.076);
  (2) Dox mono has significantly lower toxicity (Grade 3/4 neutropenia 36% vs 71%);
  (3) Palliative intent — tolerability and quality of life are primary concerns.
  AI (dox+ifosfamide) reserved for response-critical situations (see IND-STS-ADVANCED-1L-AI).

rationale_ua: >
  Доксорубіцин (doxorubicin) 75 mg/m² q21д є Категорією 1 NCCN та глобальним стандартом
  першої лінії при поширеній/метастатичній саркомі м'яких тканин. Встановлено в
  множинних фазах 2-3 як найбільш широко активний монопрепарат при СМТ (~14% ORR,
  медіана OS ~13 місяців — EORTC 62012). Незважаючи на скромну активність, монотерапія
  доксорубіцином є переважним стандартним вибором: (1) AI (доксорубіцин+іфосфамід)
  НЕ покращує OS попри вищий ORR (EORTC 62012: OS 12.8 vs 14.3 міс, p=0.076);
  (2) Монотерапія доксорубіцином має достовірно нижчу токсичність (нейтропенія
  Grade 3/4 36% проти 71% при AI); (3) Паліативна мета — переносимість і якість
  життя є першочерговими. AI (доксорубіцин+іфосфамід) зарезервовано для ситуацій,
  де критично важлива відповідь (IND-STS-ADVANCED-1L-AI).

