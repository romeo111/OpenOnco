notes: >
  MDT at specialized sarcoma center is strongly recommended before starting
  chemotherapy — histological subtype significantly affects regimen selection.
  Key subtype-specific alternatives to consider at MDT:
  - Leiomyosarcoma: gemcitabine+docetaxel has specific activity; may be preferred 2L
  - Myxoid liposarcoma: trabectedin particularly effective (YONDELIS)
  - Synovial sarcoma: ifosfamide-sensitive — AI preferred over dox alone at some centers
  - WD/DD liposarcoma: doxorubicin active; CDK4/MDM2 targeted therapy in trials
  - ASPS (alveolar soft part sarcoma): anti-VEGFR agents more active than anthracyclines
