- "Не вводити без підтвердженої прохідності IV доступу — доксорубіцин є везикантом"
- "Не призначати при ФВЛШ <50% — базова ехоКГ/MUGA обов'язкова"
- "Не використовувати для GIST (іматиніб) або саркоми Юїнга (VDC-IE) — окремі нозології"
- "Не продовжувати при прогресуванні після 2-3 циклів без клінічного обґрунтування"

known_controversies:
- topic: "Doxorubicin mono vs AI combination (dox+ifosfamide)"
  positions:
  - position: "Dox mono preferred for palliative intent — EORTC 62012 showed no OS benefit with AI, significantly higher toxicity"
    sources: [SRC-EORTC62012-JUDSON-2014]
  - position: "AI preferred when response rate matters: neoadjuvant shrinkage goal, rapidly progressive disease, young fit patients with high-grade STS (ORR 26% vs 14%)"
    sources: [SRC-EORTC62012-JUDSON-2014, SRC-NCCN-SARCOMA]
  our_default: "Doxorubicin mono for palliative intent; AI for neoadjuvant or response-critical situations"
  rationale: "Guideline-concordant based on EORTC 62012 OS non-significance"

