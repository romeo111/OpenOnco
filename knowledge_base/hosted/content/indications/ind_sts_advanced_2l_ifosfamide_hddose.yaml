    position: supports
    relevant_quote_paraphrase: "NCCN STS 2025: ifosfamide (single-agent or HD) listed Category 2A for r/r STS after anthracycline-based 1L when not previously administered."

do_not_do:
  - "НЕ призначати при попередньому іфосфаміді (будь-яка лінія) — перехресна резистентність"
  - "НЕ призначати при ліпосаркомі — ерибулін або трабектедин є кращими (NCCN кат.1)"
  - "Месна ОБОВ'ЯЗКОВА — ніколи не давати іфосфамід без месни"
  - "КФ обов'язково перед кожним циклом — КФ < 30 = абсолютне протипоказання"
  - "Енцефалопатія від іфосфаміду (~20%) — неврологічне обстеження щодня; зупинити при сплутаності"
  - "НЕ призначати при пережитій попередній іфосфамідній енцефалопатії ≥2 ступ."
  - "Для синовіальної саркоми — іфосфамід є найкращим вибором у 2-й лінії (ORR ~25-40% vs ~16% GemDoc)"

