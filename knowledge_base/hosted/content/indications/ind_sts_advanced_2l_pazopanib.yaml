- TEST-TSH
rationale: >
  PALETTE (van der Graaf 2012, Lancet; n=369): pazopanib (800 mg PO QD) vs placebo
  in non-adipocytic STS after ≥1 prior chemotherapy line. PFS HR 0.35 (4.6 vs 1.6 months,
  p<0.0001); OS HR 0.86 (NS). Pazopanib inhibits VEGFR1/2/3, PDGFR-α/β, and c-Kit —
  multi-tyrosine kinase inhibitor. FDA approved April 2012. Oral once-daily administration
  is an advantage vs IV chemotherapy. Liposarcoma was excluded from PALETTE — pazopanib
  NOT standard for liposarcoma. Hepatic monitoring is critical (LFT weeks 3, 5, 7 then monthly).

rationale_ua: >
  PALETTE (van der Graaf 2012, Lancet; n=369): пазопаніб (pazopanib) 800 mg PO QD проти
  плацебо при не-адипоцитарній СМТ після ≥1 попередньої лінії ХТ. PFS HR 0.35
  (4.6 vs 1.6 міс, p<0.0001); OS HR 0.86 (не значущий). Частота контролю захворювання
  (DCR) 67% — більшість пацієнтів досягають стабілізації. Пазопаніб інгібує VEGFR1/2/3,
  PDGFR-α/β та c-Kit. Схвалений FDA квітень 2012. Пероральний щоденний прийом є
  перевагою порівняно з в/в хіміотерапією. Ліпосаркома виключена з PALETTE — пазопаніб
  НЕ є стандартом при ліпосаркомі. Гепатотоксичність — ключовий ризик; контроль LFT
  тижні 3, 5, 7 потім щомісячно.

