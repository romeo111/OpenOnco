id: IND-STS-ADVANCED-2L-PAZOPANIB
plan_track: standard

applicable_to:
  disease_id: DIS-SOFT-TISSUE-SARCOMA
  line_of_therapy: 2
  stage_requirements:
    - "Metastatic or locally recurrent unresectable non-adipocytic soft tissue sarcoma"
    - "Progression after ≥1 prior line of standard chemotherapy"
    - "ECOG PS 0-1 (PALETTE enrolled ECOG 0-1)"
    - "Histologic subtypes: leiomyosarcoma, synovial sarcoma, angiosarcoma, UPS/MFH, fibrosarcoma, MPNST, other non-adipocytic STS"
  biomarker_requirements_required: []
  biomarker_requirements_excluded:
    - "Adipocytic STS (liposarcoma) — excluded from PALETTE; pazopanib NOT standard for liposarcoma"
    - "GIST — imatinib/sunitinib landscape"
    - "Ewing sarcoma, alveolar soft part sarcoma — limited data"
    - "Prior VEGFR TKI therapy (pazopanib, sunitinib, sorafenib)"
    - "Hepatic impairment (Child-Pugh B/C)"
  demographic_constraints:
    ecog_max: 1
    notes: "PALETTE enrolled ECOG 0-1; ECOG 2 requires careful benefit-risk discussion"

recommended_regimen: REG-PAZOPANIB-STS
concurrent_therapy: []
followed_by:
  - "CT CAP response assessment q9-12 weeks (RECIST 1.1)"
  - "Continue until progression or unacceptable toxicity"

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  pfs_hr: 0.35
  median_pfs_pazopanib_months: 4.6
  median_pfs_placebo_months: 1.6
  os_hr: 0.86
  median_os_pazopanib_months: 12.5
  disease_control_rate: "67%"
  orr: "~6%"
  notes: >
    PALETTE (van der Graaf 2012, Lancet; n=369): pazopanib vs placebo in 2L+ non-adipocytic
    STS. PFS HR 0.35 (4.6 vs 1.6 months); OS HR 0.86 (NS; 12.5 vs 10.7 months).
    Disease control rate 67% — most patients achieve stable disease rather than response.
    Not a large OS benefit but meaningful PFS stabilization.

hard_contraindications:
  - "Liposarcoma (adipocytic STS) — PALETTE exclusion criterion"
  - "GIST"
  - "Severe hepatic impairment (Child-Pugh B/C)"
  - "Recent (<6 months) MI, stroke, or arterial thrombosis"
  - "Uncontrolled hypertension"
  - "Prior VEGFR TKI"

red_flags_triggering_alternative:
  - condition: "Leiomyosarcoma — GemDoc (SARC002) preferred over pazopanib (better ORR ~16% vs 6%); pazopanib after GemDoc"
  - condition: "Liposarcoma: trabectedin preferred if available (ET-743-SAR-3007); eribulin (ERIBULIN-STS) for liposarcoma alternative"

required_tests:
  - TEST-CT-CAP
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-TSH
  - "BP measurement at baseline"
  - "Urinalysis (dipstick) for proteinuria"
  - "ECG (QTc baseline)"

rationale: >
  PALETTE (van der Graaf 2012, Lancet; n=369): pazopanib (800 mg PO QD) vs placebo
  in non-adipocytic STS after ≥1 prior chemotherapy line. PFS HR 0.35 (4.6 vs 1.6 months,
  p<0.0001); OS HR 0.86 (NS). Pazopanib inhibits VEGFR1/2/3, PDGFR-α/β, and c-Kit —
  multi-tyrosine kinase inhibitor. FDA approved April 2012. Oral once-daily administration
  is an advantage vs IV chemotherapy. Liposarcoma was excluded from PALETTE — pazopanib
  NOT standard for liposarcoma. Hepatic monitoring is critical (LFT weeks 3, 5, 7 then monthly).

rationale_ua: >
  PALETTE (n=369): пазопаніб при не-адипоцитарній STS 2L+. PFS HR 0.35 (4.6 vs 1.6 міс).
  OS HR 0.86 (не значущий). NCCN Категорія 1 для не-ліпосаркомних STS.
  Оральний прийом — зручність для пацієнта. НЕ для ліпосаркоми (виключена з PALETTE).
  Гепатотоксичність — ключовий ризик; ретельний моніторинг АЛТ/АСТ.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
  - source_id: SRC-PALETTE-VAN-DER-GRAAF-2012
    position: supports
    relevant_quote_paraphrase: "PALETTE (n=369): pazopanib vs placebo, non-adipocytic STS 2L+; PFS HR 0.35 (4.6 vs 1.6m, p<0.0001); OS HR 0.86 (NS); DCR 67%; NCCN Cat 1"

do_not_do:
  - "НІКОЛИ не призначати при ліпосаркомі — виключена з PALETTE; стандартом є трабектедин або ерибулін"
  - "Не призначати без моніторингу LFT (тижні 3, 5, 7 — гепатотоксичність є найсерйознішим ускладненням)"
  - "Не застосовувати з інгібіторами CYP3A4 або симвастатином без корекції дози/заміни"
  - "Не приймати з їжею — порожній шлунок ОБОВ'ЯЗКОВИЙ"

