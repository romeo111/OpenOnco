id: IND-STS-ADVANCED-2L-PAZOPANIB
plan_track: standard

applicable_to:
  disease_id: DIS-SOFT-TISSUE-SARCOMA
  line_of_therapy: 2
  stage_requirements:
  - "Metastatic or locally recurrent unresectable non-adipocytic soft tissue sarcoma"
  - "Progression after ≥1 prior line of standard chemotherapy"
  - "ECOG PS 0-1 (PALETTE enrolled ECOG 0-1)"
  - "Histologic subtypes: leiomyosarcoma, synovial sarcoma, angiosarcoma, UPS/MFH, fibrosarcoma, MPNST, other non-adipocytic STS"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 1
    notes: "PALETTE enrolled ECOG 0-1; ECOG 2 requires careful benefit-risk discussion"

recommended_regimen: REG-PAZOPANIB-STS
concurrent_therapy: []
followed_by:
- "CT CAP response assessment q9-12 weeks (RECIST 1.1)"
- "Continue until progression or unacceptable toxicity"

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  pfs_hr: 0.35
  median_pfs_pazopanib_months: 4.6
  median_pfs_placebo_months: 1.6
  os_hr: 0.86
  median_os_pazopanib_months: 12.5
  disease_control_rate: "67%"
  orr: "~6%"
  notes: >
    PALETTE (van der Graaf 2012, Lancet; n=369): pazopanib vs placebo in 2L+ non-adipocytic
    STS. PFS HR 0.35 (4.6 vs 1.6 months); OS HR 0.86 (NS; 12.5 vs 10.7 months).
    Disease control rate 67% — most patients achieve stable disease rather than response.
    Not a large OS benefit but meaningful PFS stabilization.

