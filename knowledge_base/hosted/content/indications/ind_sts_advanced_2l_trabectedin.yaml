do_not_do:
  - "Не призначати при білірубін >ВМН — трабектедин ПРОТИПОКАЗАНИЙ (відсутні дані щодо дозування при печінковій недостатності)"
  - "Не вводити у периферичну вену — ЛИШЕ центральний венозний доступ (24-годинна інфузія)"
  - "Не пропускати дексаметазон 20 мг IV премедикацію — гепатопротекторна профілактика ОБОВ'ЯЗКОВА"
  - "Не моніторити ФПП рідше ніж раз на тиждень у перших 3 циклах — гепатотоксичність розвивається рано"
  - "Не ігнорувати КФК — рабдоміоліз (рідко, але небезпечно); при Grade ≥3 КФК — відмінити трабектедин"
  - "При ліпосаркомі — розглянути ерибулін (OS HR 0.51 в LPS підгрупі ERIBULIN-312) перед трабектедином"

