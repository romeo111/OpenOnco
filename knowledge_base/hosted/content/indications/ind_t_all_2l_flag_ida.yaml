sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "NCCN ALL 2025: FLAG-IDA listed as Category 2A salvage option for r/r ALL when primary agents (nelarabine for T-ALL; blinatumomab/inotuzumab for B-ALL) are unavailable or contraindicated."

do_not_do:
  - "НІКОЛИ не починати без неврологічного обстеження — висока доза цитарабіну (2 г/м²) спричиняє незворотну мозочкову атаксію; зупинити негайно при атаксії або дизартрії"
  - "НЕ пропускати краплі очей дексаметазон 0.1% — кератит від цитарабіну є болісним і попереджуваним ускладненням"
  - "НЕ застосовувати при активній неконтрольованій інфекції — аплазія + сепсис = висока летальність"
  - "Розрахувати кумулятивні антрацикліни перед ідарубіцином — Hyper-CVAD вже включає доксорубіцин (~300 мг/м² за всі цикли)"
  - "Алопуринол або расбуриказа + гідратація обов'язкові — синдром лізису пухлини у Т-ОЛЛ/Т-ЛБЛ"
  - "При досягненні CR/CRi — негайне направлення на алоТГСК (нема куративного потенціалу без консолідації)"
  - "Якщо нелараліб доступний — перейти на нелараліб (NCCN кат.1; краща доказова база для Т-ОЛЛ)"

time_critical: true
time_critical_note: "Rapidly progressive r/r T-ALL — initiate within 1-2 weeks of confirmed relapse. Delay reduces CR rate and narrows alloSCT window."
