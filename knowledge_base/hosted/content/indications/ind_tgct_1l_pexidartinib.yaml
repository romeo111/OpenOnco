id: IND-TGCT-1L-PEXIDARTINIB
plan_track: standard

applicable_to:
  disease_id: DIS-TGCT
  line_of_therapy: 1
  stage_requirements:
    - "Symptomatic TGCT (diffuse-type OR localized-type with severe functional limitation)"
    - "Disease not amenable to improvement with surgery: unresectable, or surgery would cause unacceptable morbidity (e.g., joint destruction, amputation), or recurrent/progressive after prior surgery"
    - "Adults (≥18 years) — ILLUMINATE enrolled adults only"
    - "ECOG PS 0-2"
    - "Adequate baseline hepatic function: AST and ALT ≤1.5× ULN AND total bilirubin ≤ULN (REMS gate)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    notes: >
      No biomarker companion diagnostic required — CSF1R/CSF1/COL6A3-CSF1 molecular
      testing is not required for pexidartinib eligibility. Baseline hepatic function
      is the critical gate (ALT/AST ≤1.5× ULN mandatory per ILLUMINATE eligibility
      criteria and REMS). Surgery remains the first consideration — pexidartinib is
      for patients where surgery cannot provide adequate disease control.

recommended_regimen: REG-PEXIDARTINIB-TGCT
concurrent_therapy:
  - "REMS enrollment: prescriber + dispensing pharmacy + patient all must be REMS-enrolled BEFORE first prescription (Turalio REMS program)"
  - "Hepatotoxicity monitoring: ALT/AST/ALP/total bilirubin weekly × 8 weeks, then monthly × 2 months, then q3 months (per REMS requirement)"
  - "Symptomatic management: anti-emetics PRN (nausea common); compression stockings for peripheral edema"
  - "Physical/occupational therapy: concurrent PT/OT for joint rehabilitation during treatment"
  - "Orthopedic surgery re-assessment: re-evaluate surgical feasibility at 3-6 months if partial response achieved"

followed_by:
  - "MRI joint q12 weeks (TTP-MRI response assessment; RECIST 1.1 also acceptable)"
  - "Continue until disease progression, unacceptable toxicity, or patient choice"
  - "At relapse after pexidartinib: clinical trial enrollment preferred; no standard 2L systemic therapy approved for TGCT"
  - "Surgical reassessment at response plateau — pexidartinib may downstage disease sufficiently to allow surgery not previously feasible"

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "38% (RECIST 1.1 at week 25; ILLUMINATE Phase III, N=120; pexidartinib vs placebo; p<0.0001)"
  complete_response: "~15% CR (TTP-MRI endpoint at week 25)"
  progression_free_survival: "TTP-MRI ORR 56% vs 0% (primary endpoint); mDOR not reached at median 23 months follow-up"
  overall_survival_5y: "OS data not mature in ILLUMINATE (rare disease; crossover confounds OS analysis)"
  notes: >
    PRIMARY EVIDENCE: Tap WD, et al. Lancet 2019;394:478-487 (ILLUMINATE; Phase III RCT;
    N=120): pexidartinib 400 mg BID vs placebo in symptomatic TGCT not amenable to surgery.
    Primary endpoint (ORR at week 25): 38% (RECIST) and 56% (TTP-MRI) vs 0% placebo
    (p<0.0001 for both). mDOR: not reached at median 23.1 months follow-up.
    FDA approval August 2019 (first-ever systemic drug approval specifically for TGCT).
    EMA approval 2020 for same indication.
    NCCN Soft Tissue Sarcoma: pexidartinib Category 1 for symptomatic TGCT.
    Key safety: cholestatic hepatotoxicity including one fatal case in open-label extension;
    REMS program mandatory (monthly reporting, certified pharmacy only).

hard_contraindications:
  - "AST or ALT >1.5× ULN at baseline — absolute exclusion per ILLUMINATE trial eligibility and REMS"
  - "Total bilirubin >ULN at baseline"
  - "History of cholestatic liver disease or prior drug-induced cholestatic hepatitis"
  - "Resectable TGCT where surgery would adequately control disease — surgery preferred"
  - "ECOG PS ≥4 — ECOG engine hard gate"

red_flags_triggering_alternative:
  - RF-FITNESS-ECOG-FIT

required_tests:
  - TEST-LFT
  - TEST-CBC
  - TEST-CMP
  - "MRI target joint (baseline TTP-MRI; diffuse-type TGCT requires whole-joint MRI)"
  - "REMS enrollment verification (prescriber + pharmacy + patient) BEFORE first dispensing"
  - "Orthopedic surgery consultation (confirm surgery not feasible or not preferred before systemic therapy)"

desired_tests:
  - "CSF1R IHC or COL6A3-CSF1 FISH: not required for treatment but of academic/research value"
  - "Repeat joint MRI at 12 and 25 weeks (TTP-MRI response assessment — more sensitive than RECIST for TGCT)"

rationale: >
  Pexidartinib (Turalio) is the only FDA-approved systemic therapy for symptomatic TGCT
  not amenable to improvement with surgery. ILLUMINATE Phase III RCT (Tap 2019 Lancet;
  N=120; pexidartinib 400 mg BID vs placebo):
  - RECIST ORR: 38% vs 0% (p<0.0001)
  - TTP-MRI ORR: 56% vs 0% (p<0.0001; primary endpoint per protocol)
  - mDOR: not reached at 23.1 months median follow-up
  - Clinical benefit rate: 56% (partial response + stable disease with clinical benefit)
  FDA approved August 2019 — first drug approved specifically for TGCT after decades of
  surgery-only management.

  MECHANISM: TGCT is macrophage-dominant. The COL6A3-CSF1 translocation (found in ~50%
  of diffuse-type TGCT) drives massive CSF1 overexpression, recruiting CSF1R+ macrophages
  that constitute ~70-90% of tumor volume. Pexidartinib depletes these reactive macrophages,
  leading to tumor shrinkage. CSF1R testing is NOT required for eligibility — all symptomatic
  unresectable TGCT patients may receive pexidartinib regardless of CSF1 gene status.

  HEPATOTOXICITY AND REMS: The critical safety issue is serious and potentially fatal
  cholestatic hepatotoxicity. One fatal case occurred in the open-label extension.
  AST/ALT elevation occurs in ~51% of patients; cholestatic pattern (ALP + bilirubin
  elevation) requires immediate permanent discontinuation. The TURALIO REMS program
  mandates: (1) certified prescriber training, (2) certified pharmacy dispensing only,
  (3) monthly hepatic AE reporting, (4) patient enrollment and education about symptoms
  (jaundice, dark urine, right upper quadrant pain, fatigue). Without REMS compliance,
  pexidartinib cannot legally be dispensed in the US.

  SURGERY FIRST PRINCIPLE: TGCT treatment begins with surgical assessment. For localized
  TGCT (nodular type), complete surgical excision is curative with <20% recurrence.
  For diffuse-type TGCT (D-TGCT), total synovectomy is attempted but 40-80% recurrence
  rates drive the need for systemic therapy. Pexidartinib is for patients where surgery
  has failed, will fail, or will cause unacceptable morbidity.

  UKRAINE CONTEXT: Pexidartinib (Turalio) is NOT registered in Ukraine. REMS-based
  named-patient import adds regulatory complexity beyond standard compassionate use.
  Access requires: (1) special MoH authorization, (2) coordination with Daiichi Sankyo
  (US and EU markets), (3) certified REMS dispensing from EU-registered pharmacy.
  Approximate cost: USD ~25,000/month. Clinical trial enrollment strongly preferred.

rationale_ua: >
  Пексидартиніб (Turalio) — єдина FDA-схвалена системна терапія симптоматичної ТГКП,
  що не піддається покращенню хірургічним шляхом. ILLUMINATE фаза III (Tap 2019 Lancet):
  ORR 38% (RECIST) та 56% (TTP-MRI) проти 0% плацебо (p<0,0001).
  Механізм: CSF1R/KIT/FLT3 інгібітор — елімінує CSF1R+ макрофаги, що становлять
  основну масу ТГКП. Молекулярне підтвердження CSF1R НЕ ПОТРІБНЕ для лікування.
  Критична безпека: холестатична гепатотоксичність (~51% підвищення АЛТ/АСТ);
  програма REMS обов'язкова (щотижневий контроль ЛФП перші 8 тижнів).
  Україна: НЕ зареєстровано; вартість ~25 000 USD/міс; named-patient import складний.
  Хірургія ПЕРША — пексидартиніб для нерезектабельних або хірургічно-рецидивуючих.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

do_not_do:
  - "НЕ призначати без REMS-реєстрації — пексидартиніб може відпускатись лише в сертифікованих аптеках через ризик фатальної гепатотоксичності"
  - "НЕ призначати при AST або ALT >1,5× ВМН на початку — абсолютне протипоказання ILLUMINATE/REMS"
  - "НЕ продовжувати при холестатичному патерні (підвищення ЛФ + білірубін) — постійне відміна, гепатологічна консультація"
  - "НЕ застосовувати при резектабельній ТГКП — спочатку хірургія"
  - "НЕ ігнорувати щотижневий контроль ЛФП перші 8 тижнів — обов'язкова вимога REMS"
  - "НЕ комбінувати з сильними інгібіторами CYP3A4 без корекції дози та посиленого моніторингу"

sources:
  - source_id: SRC-ILLUMINATE-TAP-2019
    position: supports
    relevant_quote_paraphrase: >
      ILLUMINATE Phase III RCT (Tap 2019 Lancet; N=120): pexidartinib 400 mg BID vs
      placebo in symptomatic TGCT. ORR at 25 weeks: 38% (RECIST) and 56% (TTP-MRI)
      vs 0% placebo (p<0.0001). mDOR not reached. Serious hepatotoxicity — REMS required.
  - source_id: SRC-NCCN-SARCOMA
    position: supports
    relevant_quote_paraphrase: >
      NCCN Soft Tissue Sarcoma: pexidartinib Category 1 for symptomatic TGCT not amenable
      to improvement with surgery. Surgery is first-line; systemic therapy for unresectable
      or recurrent disease after surgical failure.

known_controversies:
  - topic: "Surgery vs pexidartinib sequence in diffuse-type TGCT"
    positions:
      - position: "Surgery first (synovectomy attempt), then pexidartinib at failure/recurrence — NCCN and ESMO standard approach. Limits drug exposure and hepatotoxicity risk."
        sources: [SRC-NCCN-SARCOMA, SRC-ESMO-SARCOMA-2024]
      - position: "Pexidartinib as neoadjuvant to downstage disease before surgery — may allow less extensive surgery; limited evidence; not FDA-approved indication."
        sources: [SRC-ILLUMINATE-TAP-2019]
        evidence_note: "Some centers use neoadjuvant pexidartinib to reduce tumor volume before planned surgery; not yet standard."
    our_default: "Surgery first; pexidartinib for unresectable or surgical failure per FDA label and NCCN."
  - topic: "REMS feasibility in resource-limited settings"
    positions:
      - position: "REMS program is an absolute requirement in the US (and equivalent safety requirements in EU REMS); cannot legally be bypassed."
        sources: [SRC-NCCN-SARCOMA]
      - position: "In Ukraine/non-REMS countries: named-patient import requires MoH authorization and hepatotoxicity monitoring equivalent to REMS protocol — feasibility limited."
        sources: [SRC-NCCN-SARCOMA]
    our_default: "REMS compliance mandatory; in Ukraine, named-patient import with equivalent hepatic monitoring per MoH special authorization."

