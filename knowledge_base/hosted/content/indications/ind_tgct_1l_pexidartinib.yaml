id: IND-TGCT-1L-PEXIDARTINIB
plan_track: standard

applicable_to:
  disease_id: DIS-TGCT
  line_of_therapy: 1
  stage_requirements:
    - "Symptomatic TGCT (diffuse-type / PVNS) — severe functional limitation — not amenable to improvement with surgery alone"
    - "Post-surgical recurrence with severe functional impairment"
  biomarker_requirements_required:
    - biomarker_id: BIO-CSF1R
      required: false
      value_constraint: "CSF1R expression assumed (constitutively expressed in TGCT macrophage-rich stroma; not required for eligibility per FDA label)"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-PEXIDARTINIB-TGCT
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~38% (ILLUMINATE); 0% placebo"
  complete_response: "~15%"
  progression_free_survival: "Median DOR not reached in responders"
  overall_survival_5y: "Not applicable (TGCT rarely fatal); functional improvement primary endpoint"

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-LFT
  - TEST-CBC
  - TEST-CMP
desired_tests: []

rationale: >
  Pexidartinib (CSF1R/KIT/FLT3 inhibitor) is the first and only
  FDA-approved systemic therapy for TGCT (2019). ILLUMINATE trial:
  ORR 38% vs 0% placebo; 15% complete response; median DOR not
  reached. TGCT (formerly PVNS) is driven by constitutive CSF1
  overexpression (via COL6A3-CSF1 translocation in ~50%), recruiting
  CSF1R+ macrophages constituting the tumor bulk — pexidartinib
  depletes these cells. Reserved for adults with severe, functionally
  debilitating TGCT not amenable to surgical improvement. EMA refused
  registration (hepatotoxicity); available via REMS in US only.
  Mandatory weekly LFT monitoring for first 2 months.

rationale_ua: >
  Пексидартиніб (pexidartinib, інгібітор CSF1R/KIT/FLT3) — перша і єдина схвалена
  FDA системна терапія для ТГКП (2019). Дослідження ILLUMINATE: ORR 38% vs 0% (плацебо);
  15% повна відповідь; медіана тривалості відповіді не досягнута. ТГКП (раніше PVNS)
  зумовлена конститутивною гіперекспресією CSF1 (через транслокацію COL6A3-CSF1 у ~50%
  випадків), що рекрутує CSF1R+ макрофаги, які формують основну масу пухлини —
  пексидартиніб виснажує ці клітини. Зарезервовано для дорослих із тяжкою,
  функціонально інвалідизуючою ТГКП, що не піддається хірургічному покращенню.
  EMA відмовила в реєстрації (гепатотоксичність); у США — лише через REMS.
  Обов'язковий тижневий моніторинг LFT перших 2 місяці.
