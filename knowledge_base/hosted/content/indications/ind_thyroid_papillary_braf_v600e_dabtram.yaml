id: IND-THYROID-PAPILLARY-BRAF-V600E-DABTRAM
plan_track: standard

applicable_to:
  disease_id: DIS-THYROID-PAPILLARY
  line_of_therapy: 1
  stage_requirements:
    - "Locally advanced or metastatic RAI-refractory differentiated thyroid cancer"
    - "Predominantly papillary thyroid carcinoma (BRAF V600E found in ~40-60% of classical PTC)"
    - "Systemic therapy indicated; surgery/RAI not feasible or RAI-refractory"
  biomarker_requirements:
    - "BRAF V600E mutation confirmed by validated molecular assay (PCR, NGS, or Cobas)"
    - "BRAF V600E prevalence: ~40-60% of papillary thyroid cancers; enriched in tall cell variant"

recommended_regimen: REG-DABRAFENIB-TRAMETINIB-NSCLC

concurrent_therapy: []

followed_by:
  - "Continue dabrafenib+trametinib until progression"
  - "At progression: consider re-biopsy for acquired resistance mutations (NRAS, MEK)"
  - "Post-progression: lenvatinib, sorafenib, or clinical trial"

evidence_level: moderate
strength_of_recommendation: moderate
nccn_category: 2A

expected_outcomes:
  orr_percent: 54
  pfs_note: "Median PFS ~14.4 months in BRAF V600E thyroid cancer cohort"
  notes: >
    Subbiah V et al. Cancer Discovery 2020 (ROAR basket trial; BRAF V600E non-melanoma cohorts;
    thyroid n=36): ORR 54% (95% CI 36-71%); DCR 86%; median PFS 14.4 months.
    FDA approved approved May 2018 for BRAF V600E anaplastic thyroid (ATC); NCCN Thyroid 2025:
    Category 2A for BRAF V600E RAI-refractory DTC.

hard_contraindications:
  - "BRAF V600E not confirmed"
  - "Prior BRAF or MEK inhibitor therapy (prior resistance)"
  - "Active severe skin disease (SJS/TEN risk)"
  - "ECOG PS 4 (engine hard gate)"
  - "RET fusion or NTRK fusion present (prioritize selpercatinib or larotrectinib instead)"

red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-LFT
  - TEST-CMP
  - "BRAF V600E molecular testing (mandatory for eligibility)"
  - "ECG with QTc baseline (trametinib QTc effect)"
  - "Ophthalmology exam baseline and periodically (retinal detachment, uveitis)"
  - "Echocardiogram: LVEF baseline and q12 weeks (trametinib cardiomyopathy)"
  - "Dermatology baseline (cutaneous squamous cell carcinoma risk; dabrafenib)"

desired_tests:
  - "TSH and thyroid function (thyroiditis risk)"
  - "Blood glucose (hyperglycemia risk — dabrafenib)"
  - "Concurrent medication review (CYP3A4/2C8 interactions)"

rationale: >
  Dabrafenib + trametinib (BRAF + MEK co-inhibition) overcomes paradoxical MAPK reactivation
  from single-agent BRAF inhibition. ROAR basket trial demonstrated ORR 54% and mPFS 14.4 months
  in BRAF V600E DTC. FDA approved for BRAF V600E anaplastic thyroid cancer (May 2018); used
  off-label for BRAF V600E RAI-refractory DTC per NCCN. Preferred over single-agent BRAF
  inhibitor (vemurafenib) due to improved tolerability and higher ORR. RET- or NTRK-fusion
  should be prioritized if identified alongside BRAF V600E (co-occurrence rare but reported).

sources:
  - SRC-NCCN-THYROID-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  STUB - authored 2026-05-04 (Workstream EC). Thyroid papillary BRAF V600E dabrafenib+trametinib.
  NCCN Cat 2A (less evidence vs RET/NTRK Cat 1; ROAR trial small basket).
  Two-reviewer clinical signoff required.
