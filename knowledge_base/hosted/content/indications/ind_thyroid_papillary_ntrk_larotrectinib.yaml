id: IND-THYROID-PAPILLARY-NTRK-LAROTRECTINIB
plan_track: standard

applicable_to:
  disease_id: DIS-THYROID-PAPILLARY
  line_of_therapy: 1
  stage_requirements:
    - "Locally advanced or metastatic RAI-refractory differentiated thyroid cancer (DTC)"
    - "Includes papillary, follicular, or poorly differentiated thyroid carcinoma"
    - "No satisfactory alternative treatments or disease progressed on prior treatment"
  biomarker_requirements:
    - "NTRK1, NTRK2, or NTRK3 gene fusion confirmed by validated assay (NGS preferred)"
    - "NTRK fusion prevalence: ~2-5% of papillary thyroid carcinomas; enriched in radiation-associated PTC"

recommended_regimen: REG-LAROTRECTINIB-PANTUMOR

concurrent_therapy: []

followed_by:
  - "Continue larotrectinib until progression; no planned discontinuation"
  - "At TRK resistance: assess for on-target resistance mutations (NTRK xDFG or solvent-front)"
  - "Post-larotrectinib resistance: consider selitrectinib (RET-NTRK resistance inhibitor; clinical trial)"
  - "Fallback: lenvatinib or sorafenib"

evidence_level: high
strength_of_recommendation: strong
nccn_category: 1

expected_outcomes:
  orr_percent: 75
  dor_note: "12-month DOR rate ~67%; median DOR not reached in early follow-up"
  notes: >
    NAVIGATE/SCOUT (Drilon A NEJM 2018; pediatric and adult basket; n=55 thyroid cancer
    subset): ORR 75% in NTRK fusion-positive solid tumors including thyroid.
    FDA granted accelerated approval August 2018 (any NTRK fusion solid tumor — tumor-agnostic).
    NCCN Thyroid 2025: Category 1 for NTRK fusion+ thyroid cancer.

hard_contraindications:
  - "NTRK fusion not confirmed (do not use empirically)"
  - "ECOG PS 4 (engine hard gate)"
  - "Active severe hepatic impairment (Child-Pugh C; dose reduction or hold required)"

red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-LFT
  - TEST-CMP
  - "NTRK gene fusion testing (NGS comprehensive panel preferred; IHC pan-TRK can screen)"
  - "RAI scan to confirm RAI-refractory status if not prior documented"

desired_tests:
  - "Brain MRI (larotrectinib has CNS activity; important if neurological symptoms)"
  - "Pregnancy test for females of reproductive potential"
  - "CYP3A4 inhibitor/inducer medication review"

rationale: >
  Larotrectinib (VITRAKVI) is a highly selective pan-TRK inhibitor with FDA tumor-agnostic
  approval for NTRK fusion-positive solid tumors. In thyroid cancer, NTRK fusions (primarily
  ETV6-NTRK3 from radiation exposure) confer sensitivity to TRK inhibition with ORR ~75%.
  NCCN Thyroid 2025: Category 1 for NTRK fusion+ thyroid cancer. The tumor-agnostic approval
  covers all solid tumors with NTRK fusion where surgery is not feasible and disease progressed
  or no satisfactory alternatives exist. Intracranial activity demonstrated.

sources:
  - SRC-NCCN-THYROID-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  STUB - authored 2026-05-04 (Workstream EC). Thyroid papillary NTRK fusion larotrectinib.
  Two-reviewer clinical signoff required.
