id: IND-THYROID-PAPILLARY-RET-FUSION-SELPERCATINIB
plan_track: standard

applicable_to:
  disease_id: DIS-THYROID-PAPILLARY
  line_of_therapy: 1
  stage_requirements:
    - "Locally advanced or metastatic RAI-refractory differentiated thyroid cancer (DTC)"
    - "RAI-refractory defined: no RAI uptake on scan, or progression despite RAI, or cumulative RAI dose ≥600 mCi"
    - "Includes papillary, follicular, Hurthle cell, poorly differentiated thyroid carcinoma"
  biomarker_requirements:
    - "RET gene fusion confirmed by validated molecular assay (NGS preferred; FISH acceptable)"
    - "RET fusion prevalence: ~10-20% of papillary thyroid carcinomas"

recommended_regimen: REG-SELPERCATINIB-DTC

concurrent_therapy: []

followed_by:
  - "Continue selpercatinib until progression; no planned discontinuation"
  - "At progression: assess for on-target RET resistance mutations (RET G810 solvent-front mutation most common)"
  - "Post-selpercatinib: lenvatinib, sorafenib, or clinical trial for RET resistance"

evidence_level: high
strength_of_recommendation: strong
nccn_category: 1

expected_outcomes:
  orr_percent: 79
  dor_note: "Median DOR not reached at 18.4 months follow-up; 1-year DOR rate 64%"
  notes: >
    LIBRETTO-001 (Wirth LJ NEJM 2020; Subbiah 2021 update; n=55 previously treated RET
    fusion+ DTC): ORR 79% (95% CI 64-90%). FDA approved May 2020. NCCN Thyroid 2025: Cat 1
    preferred for RET fusion+ RAI-refractory DTC. Durable responses with ongoing benefit
    in majority of responders at 18 months.

hard_contraindications:
  - "RET fusion not confirmed (do not use empirically)"
  - "Active severe uncontrolled infection"
  - "QTc >470ms at baseline (risk of QTc prolongation)"
  - "ECOG PS 4 (engine hard gate)"
  - "Active severe hepatic impairment (Child-Pugh C)"

red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - "ECG with QTc measurement at baseline"
  - "Thyroid function (TSH, free T4)"
  - "Blood pressure baseline"
  - "RET fusion molecular testing (NGS or FISH) — MANDATORY for eligibility"
  - "RAI scan to confirm RAI-refractory status"

desired_tests:
  - "Pregnancy test for females of reproductive potential"
  - "Concurrent medications review (CYP3A4 inhibitor/inducer check)"

rationale: >
  Selpercatinib (RETEVMO) is a highly selective and potent RET kinase inhibitor with
  intracranial activity. LIBRETTO-001 demonstrated 79% ORR in previously treated RET
  fusion-positive DTC — the highest reported efficacy for any targeted agent in this
  population. FDA approved May 2020 for RET fusion-positive thyroid cancer.
  NCCN Thyroid 2025: Category 1 preferred treatment for RET fusion+ RAI-refractory DTC.
  RET fusions occur predominantly in papillary thyroid cancer (~10-20%) and can arise from
  radiation exposure (e.g., post-Chernobyl PTC often RET/PTC1 or RET/PTC3 rearranged).

sources:
  - SRC-NCCN-THYROID-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  STUB - authored 2026-05-04 (Workstream EC). Thyroid papillary RET fusion selpercatinib.
  Two-reviewer clinical signoff required.
