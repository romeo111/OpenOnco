id: IND-UROTHELIAL-2L-EV
plan_track: standard

applicable_to:
  disease_id: DIS-UROTHELIAL
  line_of_therapy: 2
  stage_requirements:
  - "Locally advanced unresectable or metastatic urothelial carcinoma (bladder, upper tract, urethra)"
  - "Prior platinum-containing chemotherapy (1L or prior)"
  - "Prior anti-PD-(L)1 therapy (avelumab maintenance, or ICI as separate prior line)"
  - "No prior EV-containing therapy (EV-naive 2L patients)"
  - "If prior 1L = EV+pembro (EV-302): EV monotherapy is NOT standard 2L (EV re-challenge has no data) — use platinum chemo 2L; see IND-UROTHELIAL-2L-PLATINUM-CHEMO"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 1
    notes: "EV-301 enrolled ECOG 0-1; ECOG 2 outside trial criteria"

recommended_regimen: REG-EV-MONO-UROTHELIAL
concurrent_therapy: []
followed_by:
- "CT CAP response assessment q8 weeks (every 2 cycles)"
- "Continue until progression or unacceptable toxicity"

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~40.6% (EV-301 vs 17.9% chemo)"
  progression_free_survival: "~5.6 months (EV-301)"
  overall_survival: "~12.9 months (EV-301 vs 9.0 months chemo; HR 0.70)"

hard_contraindications: []
red_flags_triggering_alternative: []
