- TEST-CT-CAP
- TEST-CBC
- TEST-CMP
desired_tests: []
rationale: >
  EV (enfortumab vedotin, anti-Nectin-4 ADC with MMAE payload) vs chemotherapy
  in EV-301 (Powles 2021, NEJM, n=608): ORR 40.6% vs 17.9%; mPFS 5.6 vs 3.7 months;
  mOS 12.9 vs 9.0 months (HR 0.70, p=0.001). This established EV as NCCN Category 1
  for 2L+ advanced UC after platinum + anti-PD-(L)1. IMPORTANT CONTEXT 2025/2026:
  EV-301 trial enrolled patients who received platinum AND anti-PD-L1 as separate lines.
  Now that EV+pembro is 1L standard (EV-302), EV monotherapy 2L applies primarily to
  patients who received alternative 1L therapy (platinum+avelumab maintenance).
  For post-EV+pembro patients: 2L is typically platinum chemo (sequencing not EV re-challenge).
  FGFR2/3 testing is mandatory before 2L — erdafitinib (THOR: HR 0.58) has better outcomes
  for FGFR-altered patients.

rationale_ua: >
  EV монотерапія для лікування раніше лікованого поширеного УК 2L після платини + ICI.
  EV-301 (n=608): ORR 40.6% vs 17.9% хіміотерапія; мOS 12.9 vs 9.0 міс (HR 0.70).
  NCCN Категорія 1. Застереження 2025/2026: EV+пембролізумаб є стандартом 1L (EV-302);
  EV монотерапія в 2L найбільш актуальна для пацієнтів, що отримували платину+авелумаб 1L
  (не EV+пемброл). При FGFR2/3 мутації → ердафітиніб переважає (THOR, HR 0.58).

