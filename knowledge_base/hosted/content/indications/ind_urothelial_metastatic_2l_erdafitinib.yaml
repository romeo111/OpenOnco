sources:
  - source_id: SRC-NCCN-BLADDER-2025
    position: supports
    relevant_quote_paraphrase: "Erdafitinib is a Cat 1 option for FGFR2/3-altered metastatic urothelial carcinoma post ≥1 prior line including PD-(L)1 inhibitor (THOR cohort 1); FDA full approval Jan 2024"
  - source_id: SRC-EAU-BLADDER-2024
    position: supports
    relevant_quote_paraphrase: "FGFR2/3 alteration testing recommended in metastatic urothelial carcinoma; erdafitinib is a recommended 2L+ option upon FGFR-alteration confirmation post-PD-(L)1 progression"

known_controversies:
  - topic: "Erdafitinib positioning vs enfortumab vedotin monotherapy 2L+ mUC"
    positions:
      - position: "Erdafitinib preferred 2L for FGFR2/3-altered post-EV-pembro-1L (THOR cohort 1 mOS 12.1 mo, HR 0.64; biomarker-driven)"
        sources: [SRC-NCCN-BLADDER-2025]
      - position: "Enfortumab vedotin monotherapy alternative if patient FGFR-altered but EV not yet received in 1L (e.g., if 1L was platinum-only; EV-203 single-arm)"
        sources: [SRC-NCCN-BLADDER-2025]
        evidence_note: "EV-302 paradigm has established EV+pembro as 1L for nearly all comers — restricts 2L EV-mono to platinum-1L-treated patients"
    our_default: "Erdafitinib for FGFR2/3-altered post-EV-pembro-1L; EV-monotherapy 2L only if EV not yet received"
    rationale: "Biomarker-driven OS benefit + Cat 1 status drive erdafitinib choice in FGFR-altered subgroup"
  - topic: "FGFR alteration testing modality (Therascreen companion diagnostic vs comprehensive NGS)"
    positions:
      - position: "Therascreen FGFR RGQ RT-PCR Kit — FDA-approved companion diagnostic; covers THOR-eligible alterations"
        sources: [SRC-NCCN-BLADDER-2025]
      - position: "Comprehensive NGS (RNA-NGS preferred for fusions) — broader actionability assessment, picks up co-alterations"
        sources: [SRC-NCCN-BLADDER-2025]
        evidence_note: "NGS preferred when tissue allows; Therascreen sufficient if NGS unavailable / insufficient tissue"
    our_default: "Comprehensive NGS preferred (RNA-NGS for fusions); Therascreen acceptable when NGS unavailable"
    rationale: "NGS identifies broader actionability; both modalities recognized in NCCN-BLADDER-2025"

do_not_do:
  - "НЕ призначати без підтвердження FGFR2/3 alteration (Therascreen companion diagnostic OR comprehensive NGS) — generic FGFR overexpression by IHC недостатня."
  - "НЕ використовувати в PD-(L)1-naive setting — THOR cohort 2 negative vs pembrolizumab."
  - "НЕ підвищувати дозу до 9 мг без перевірки фосфату на день 14-21 — up-titration лише при phosphate <5.5 мг/дл."
  - "НЕ ігнорувати baseline + serial офтальмологічний огляд — central serous retinopathy ~25%, often reversible але потребує hold."
  - "НЕ ігнорувати фосфат моніторинг — гіперфосфатемія ~76%; дієта + sevelamer; затримка / зниження дози при >7 мг/дл."
  - "НЕ комбінувати з потужними CYP3A4 OR CYP2C9 інгібіторами / індукторами — експозиція erdafitinib різко змінюється."
  - "НЕ ігнорувати nail / skin / mucosal care — onycholysis, paronychia, stomatitis високої частоти."
  - "НЕ підтверджувати план без funding pathway — erdafitinib не зареєстрований в UA (Janssen EAP / named-patient only)."

