id: IND-UROTHELIAL-2L-ERDAFITINIB
plan_track: aggressive

applicable_to:
  disease_id: DIS-UROTHELIAL
  disease_state: METASTATIC
  line_of_therapy: 2
  stage_requirements:
    - "Locally advanced unresectable or metastatic urothelial carcinoma"
    - "Disease progression on ≥1 prior systemic line including a PD-(L)1 inhibitor (THOR cohort 1 entry criteria)"
    - "FGFR2/3 alteration confirmed by FDA-approved companion diagnostic (Therascreen FGFR RGQ RT-PCR Kit) OR comprehensive NGS (RNA-NGS preferred for fusions)"
  biomarker_requirements_required:
    - biomarker_id: BIO-FGFR3-MUTATION
      required: true
      value_constraint: "FGFR3 activating mutation (S249C, R248C, G370C, Y373C) OR FGFR2 / FGFR3 fusion (THOR-eligible alterations); confirm with Therascreen companion diagnostic OR NGS"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-ERDAFITINIB-UROTHELIAL-2L
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~35.3% vs 8.5% chemo (THOR cohort 1)"
  progression_free_survival: "Median PFS 5.6 vs 2.7 mo chemo (THOR cohort 1; HR 0.58)"
  overall_survival_5y: "Median OS 12.1 vs 7.8 mo chemo (THOR cohort 1; HR 0.64, p=0.005)"

