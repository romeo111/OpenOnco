rationale: >
  Erdafitinib for FGFR2/3-altered metastatic urothelial carcinoma
  post ≥1 prior line including a PD-(L)1 inhibitor. THOR cohort 1
  (Loriot NEJM 2023, n=266; 136 erda vs 130 investigator-choice
  chemo): met primary endpoint mOS 12.1 vs 7.8 mo (HR 0.64, p=0.005),
  mPFS 5.6 vs 2.7 mo (HR 0.58), ORR 35.3% vs 8.5%. FDA converted
  accelerated to full approval Jan 2024 based on THOR cohort 1
  (BLC2001 single-arm cohort had supported 2019 accelerated approval).
  THOR cohort 2 (erda vs pembrolizumab in PD-(L)1-naive) was
  NEGATIVE and not used to support labeling — restricts Cat 1
  positioning to post-PD-(L)1 setting. Selected FGFR alterations
  required: FGFR3 mutations (S249C / R248C / G370C / Y373C) OR
  FGFR2/3 fusions; companion diagnostic = Therascreen FGFR RGQ RT-PCR
  Kit (or comprehensive NGS). Class FGFR-TKI toxicity (hyperphosphatemia
  ~76%, central serous retinopathy ~25%, nail toxicity ~57%, stomatitis)
  requires dedicated supportive-care protocol — see regimen
  REG-ERDAFITINIB-UROTHELIAL-2L. Up-titration from 8 to 9 mg ONLY
  if phosphate <5.5 mg/dL on day 14-21 of cycle 1 — pharmacodynamic-
  guided dosing. UA access barrier: not registered; named-patient /
  Janssen EAP only. Position in 2L+ landscape: sequenced AFTER
  EV-pembro 1L (EV-302 paradigm); for FGFR2/3-altered patients
  who progressed on EV-pembro 1L, erdafitinib is the preferred 2L
  option where access permits. Alternative: platinum-based chemo
  (if not received), enfortumab vedotin monotherapy (post-1L PD-1
  + chemo eligibility), or clinical trial.

rationale_ua: >
  Ердафітиніб (erdafitinib) для FGFR2/3-зміненої метастатичної уротеліальної карциноми
  після ≥1 попередньої лінії, включаючи інгібітор PD-(L)1. THOR когорта 1 (Loriot,
  NEJM 2023, n=266; 136 ерда проти 130 ХТ за вибором): первинна кінцева точка медіана ЗВ
  12.1 проти 7.8 міс (HR 0.64, p=0.005), медіана ВБП 5.6 проти 2.7 міс (HR 0.58), ORR
  35.3% проти 8.5%. FDA конвертував прискорене схвалення у повне (січень 2024) на підставі
  THOR когорта 1. THOR когорта 2 (ерда проти пембролізумабу у PD-(L)1-наївних) виявилась
  НЕГАТИВНОЮ — позиціонування Кат 1 обмежується постICI-сеттингом. Відібрані зміни FGFR:
  мутації FGFR3 (S249C, R248C, G370C, Y373C) або злиття FGFR2/3; необхідний companion
  diagnostic (Therascreen FGFR RGQ RT-PCR) або комплексний NGS. Класова токсичність
  FGFR-TKI (гіперфосфатемія ~76%, центральна серозна ретинопатія ~25%, нігтьова токсичність
  ~57%, стоматит) потребує виділеного протоколу підтримуючої терапії
  (REG-ERDAFITINIB-UROTHELIAL-2L). Підвищення дози з 8 до 9 mg ЛИШЕ якщо
  фосфат <5.5 mg/дл на 14-21 день циклу 1 — фармакодинамічне дозування.
  Бар'єр доступу в UA: не зареєстрований; доступний лише через Janssen EAP / named-patient.
