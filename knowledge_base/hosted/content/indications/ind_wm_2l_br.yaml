sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN WM 2025 Category 2A: bendamustine + rituximab (BR) for relapsed/refractory
      WM; chemo-sensitive late relapse preferred indication; not for prior BR-refractory
      disease.
  - source_id: SRC-ESMO-WM-2024
    position: supports
    relevant_quote_paraphrase: >
      ESMO WM 2024: BR acceptable for chemo-sensitive late relapse; myelosuppression
      monitoring mandatory; preferred over R-CHOP due to lower toxicity (Rummel 2013 StiL).

do_not_do:
  - "При BR-рефрактерності (рецидив ≤6 міс після BR): ре-лікування BR неефективне; переходити на занубрутиніб або VRd"
  - "Без HBV скринінгу: ритуксимаб → деплеція B-клітин → реактивація HBV; ентекавір якщо HBsAg+ або HBcAb+"
  - "КК <30 мл/хв: бендамустин накопичується — протипоказаний; переходити на VRd або BTKi"
  - "Без Г-КСФ підготовки при наявності факторів ризику: BR-індукована нейтропенія grade 3-4 ~40% → ФН без профілактики"
  - "IgM-сплеск після 1-го циклу: не припиняти BR — транзиторний підйом перед відповіддю; плазмаферез при симптомах гіперв'язкості"

