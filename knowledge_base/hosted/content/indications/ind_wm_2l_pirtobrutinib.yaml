do_not_do:
  - "Піртобрутиніб при MYD88-WT WM: недостатньо доказів; перевагу надати VRd"
  - "Піртобрутиніб як 1L WM: лише після кБТКіназ; zanubrutinib/ibrutinib для кБТКі-naive"
  - "Без MYD88 статусу перед призначенням: статус MYD88-L265P визначає доцільність"
  - "Ігнорувати IgM-флер у 1-2 циклах: очікуваний; не припиняти терапію"
  - "Без HBV-скринінгу перед ритуксимабом (якщо додається): реактивація HBV летальна"

