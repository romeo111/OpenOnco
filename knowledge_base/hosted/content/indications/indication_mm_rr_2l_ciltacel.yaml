rationale: >
  Ciltacabtagene autoleucel (cilta-cel) lifted to 2L for lenalidomide-
  refractory R/R multiple myeloma after 1-3 prior lines, per CARTITUDE-4
  (San-Miguel 2023 NEJM): ORR ~85%, ≥CR ~73%, mPFS Not Reached vs
  11.8 mo standard-of-care (HR 0.26; p<0.001). This indication moves
  CAR-T earlier in the treatment sequence — historical 4L+ → 2L —
  for the lenalidomide-refractory subset, which represents a major
  shift in MM treatment paradigm. Single infusion after fludarabine +
  cyclophosphamide lymphodepletion (Days -5 to -3). Standard cilta-cel
  safety profile applies: CRS Grade ≥3 ~5%, ICANS Grade ≥3 ~5%, late
  MNT signal ~5-10% (movement/neurocognitive AEs, including
  parkinsonism). Tocilizumab + dexamethasone for CRS; hospital
  observation 14 days minimum. Universal hypogammaglobulinemia → IVIG;
  PJP + HSV/VZV prophylaxis ≥6 mo. Manufacturing window (4 weeks)
  excludes rapidly progressive patients — bridge therapy mandatory.
  Distinguishes from IND-MM-RR-3L-CILTACEL by line of therapy (2L vs
  3L+) and enrolment criterion (lenalidomide-refractory vs triple-class
  refractory). Ukraine access: not registered (2026-04); international
  referral required.

rationale_ua: >
  Цилтакабтаген аутолейцел (cilta-cel) переведений на 2L для
  леналідомід-рефрактерної р/р множинної мієломи після 1-3 попередніх
  ліній за CARTITUDE-4 (San-Miguel 2023 NEJM): ORR ~85%, ≥CR ~73%,
  mPFS Not Reached проти 11.8 міс. SOC (HR 0.26; p<0.001). Це
  показання зміщує CAR-T раніше у послідовності лікування —
  історично 4L+ → 2L — для підгрупи леналідомід-рефрактерних, що є
  значним зрушенням парадигми лікування MM. Одна інфузія після
  флударабін + циклофосфамід лімфодеплеції (дні -5 до -3). Стандартний
  профіль безпеки cilta-cel: CRS ≥3 ступеня ~5%, ICANS ≥3 ступеня ~5%,
  пізній MNT сигнал ~5-10% (рухові/нейрокогнітивні AEs, включно з
  паркінсонізмом). Тоцилізумаб + дексаметазон при CRS; госпітальне
  спостереження мінімум 14 днів. Універсальна гіпогаммаглобулінемія →
  ВВІГ; PJP + HSV/VZV профілактика ≥6 міс. Виробниче вікно (4 тижні)
  виключає швидко прогресуючих пацієнтів — bridge-терапія обов'язкова.
  Відрізняється від IND-MM-RR-3L-CILTACEL за лінією терапії (2L проти
  3L+) і критерієм відбору (леналідомід-рефрактерний vs тричі-класно-
  рефрактерний). Доступ в Україні: не зареєстрований (2026-04);
  потрібне міжнародне направлення.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
  - source_id: SRC-NCCN-MM-2025
    position: supports
    relevant_quote_paraphrase: "Ciltacabtagene autoleucel (cilta-cel) is Cat 1 preferred for lenalidomide-refractory R/R MM after 1-3 prior lines per CARTITUDE-4; major shift moving CAR-T to earlier line"
  - source_id: SRC-ESMO-MM-2023
    position: supports
    relevant_quote_paraphrase: "BCMA CAR-T (cilta-cel) for lenalidomide-refractory R/R MM at 2L preferred when manufacturing window tolerable; CARTITUDE-4 mPFS NR vs SOC HR 0.26"
  - source_id: SRC-CARTITUDE-1-BERDEJA-2021
    position: supports
    relevant_quote_paraphrase: "CARTITUDE-1 established cilta-cel safety + efficacy in heavily pre-treated MM (ORR 98%); CARTITUDE-4 extends to earlier line (1-3 prior) in lenalidomide-refractory subset"

do_not_do:
  - "Не призначати при не-леналідомід-рефрактерній хворобі без перегляду включення — CARTITUDE-4 критерій відбору."
  - "Не починати без HBV скринінгу + entecavir prophylaxis при HBsAg+ або anti-HBc+ — ризик HBV реактивації."
  - "Не пропускати оцінку CRS/ICANS і пізнього руху/нейрокогнітивних AEs (MNTs) — унікальний сигнал безпеки cilta-cel."
  - "Не пропускати IVIG-замісну терапію — універсальна гіпогаммаглобулінемія підвищує ризик важких інфекцій."
  - "Не пропускати PJP + HSV/VZV профілактику ≥6 міс. — пролонгована імуносупресія."
  - "Не призначати без bridge-терапії при швидкому прогресуванні — 4-тижневе виробниче вікно неприйнятне."

known_controversies:
  - topic: 2L cilta-cel (CARTITUDE-4) vs continued IMiD/PI/anti-CD38 triplet at 2L
    positions:
      - position: Cilta-cel 2L — mPFS Not Reached vs 11.8 mo SOC (HR 0.26); paradigm-shifting depth/durability
        sources:
          - SRC-NCCN-MM-2025
        evidence_note: "CARTITUDE-4 demonstrates major PFS benefit; preserves later-line bispecifics + alternative-target options"
      - position: Triplet at 2L (e.g. DKd, KRd) — broadly available, no manufacturing window, no CAR-T toxicity (CRS/ICANS/MNT)
        sources:
          - SRC-ESMO-MM-2023
        evidence_note: "Operationally simpler; preserved when CAR-T inaccessible OR rapid progression"
    our_default: Cilta-cel 2L preferred for lenalidomide-refractory patients when manufacturing window tolerable + access available; triplet otherwise
    rationale: CARTITUDE-4 demonstrates substantial PFS advantage; reserved for fitter patients with disease tempo permitting 4-week wait

time_critical: false
