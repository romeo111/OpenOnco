id: IND-MM-RR-2L-CILTACEL
plan_track: aggressive

applicable_to:
  disease_id: DIS-MM
  line_of_therapy: 2
  stage_requirements:
    - "Relapsed/refractory multiple myeloma after 1-3 prior lines"
    - "Lenalidomide-refractory (CARTITUDE-4 enrolment criterion)"
    - "Active progressive disease (IMWG criteria)"
    - "ECOG 0-1 (CARTITUDE-4 enrolment); 2 acceptable in real-world"
    - "Adequate organ function for fludarabine + cyclophosphamide lymphodepletion"
    - "No prior BCMA-directed therapy (or sufficient washout)"
    - "Available manufacturing slot (4-week wait acceptable for disease tempo)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    age_min: 18
    ecog_max: 2

recommended_regimen: REG-CILTACEL-MM-2L
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~85% (CARTITUDE-4; San-Miguel 2023 NEJM)"
  complete_response: "~73% sCR / CR (cilta-cel arm)"
  progression_free_survival: "Median PFS Not Reached vs 11.8 mo SOC (HR 0.26; CARTITUDE-4)"
  overall_survival_median: "Not Reached at 16-mo median follow-up (CARTITUDE-4); OS HR favours cilta-cel"

