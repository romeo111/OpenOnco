id: IND-MM-RR-3L-CILTACEL
plan_track: aggressive

applicable_to:
  disease_id: DIS-MM
  line_of_therapy: 3
  stage_requirements:
    - "Relapsed/refractory multiple myeloma"
    - "Triple-class exposed/refractory (post-PI, post-IMiD, post-anti-CD38)"
    - "≥3 prior systemic lines (CARTITUDE-1 cohort)"
    - "Active progressive disease (IMWG criteria)"
    - "ECOG 0-1 (CARTITUDE-1 enrolment); 2 acceptable in real-world"
    - "Adequate organ function for fludarabine + cyclophosphamide lymphodepletion"
    - "No prior BCMA-directed therapy (or sufficient washout)"
    - "Available manufacturing slot (4-week wait acceptable for disease tempo)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    age_min: 18
    ecog_max: 2

recommended_regimen: REG-CILTACEL-MM-3L
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~98% (CARTITUDE-1; Berdeja 2021 Lancet, Martin 2023 JCO 3-yr update)"
