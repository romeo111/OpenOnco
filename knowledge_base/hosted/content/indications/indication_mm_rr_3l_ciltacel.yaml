rationale: >
  Ciltacabtagene autoleucel (cilta-cel; Carvykti) is a BCMA-targeted
  CAR-T cell therapy with the deepest + most durable responses of any
  treatment for triple-class refractory R/R multiple myeloma after ≥3
  prior lines. CARTITUDE-1 (Berdeja 2021 Lancet, Martin 2023 JCO 3-yr
  update): ORR 98%, sCR/CR 83%, mPFS ~35 mo, 30-mo OS landmark 74% in
  patients with median 6 prior lines. Single infusion after fludarabine
  + cyclophosphamide lymphodepletion (Days -5 to -3). CRS Grade ≥3 ~5%,
  ICANS Grade ≥3 ~10%, but late-onset neurotoxicity (movement and
  neurocognitive treatment-emergent AEs — MNTs, including parkinsonism)
  ~5-10% is unique safety signal — likely BCMA expression in basal
  ganglia. Tocilizumab + dexamethasone for CRS; hospital observation
  14 days minimum. Universal hypogammaglobulinemia → IVIG; PJP +
  HSV/VZV prophylaxis ≥6 mo. Manufacturing window (4 weeks) excludes
  rapidly progressive patients — bridge therapy mandatory. Best-
  efficacy CAR-T for triple-class refractory MM; ide-cel as alternate
  when cilta-cel slot unavailable. Ukraine access: not registered
  (2026-04); international referral required.

rationale_ua: >
  Цилтакабтаген аутолейцел (cilta-cel; Carvykti) — BCMA-таргетна
  CAR-T клітинна терапія з найглибшими + найбільш тривалими
  відповідями серед усіх лікувань тричі-класно-рефрактерної р/р
  множинної мієломи після ≥3 попередніх ліній. CARTITUDE-1 (Berdeja
  2021 Lancet, Martin 2023 JCO 3-річний update): ORR 98%, sCR/CR 83%,
  mPFS ~35 міс., 30-міс. OS landmark 74% у пацієнтів з медіаною 6
  попередніх ліній. Одна інфузія після флударабін + циклофосфамід
  лімфодеплеції (дні -5 до -3). CRS ≥3 ступеня ~5%, ICANS ≥3 ступеня
  ~10%, але пізня нейротоксичність (рухові й нейрокогнітивні AEs —
  MNTs, включно з паркінсонізмом) ~5-10% — унікальний сигнал безпеки,
  ймовірно через експресію BCMA у базальних гангліях. Тоцилізумаб +
  дексаметазон при CRS; госпітальне спостереження мінімум 14 днів.
  Універсальна гіпогаммаглобулінемія → ВВІГ; PJP + HSV/VZV
  профілактика ≥6 міс. Виробниче вікно (4 тижні) виключає швидко
  прогресуючих пацієнтів — bridge-терапія обов'язкова. Найкраща за
  ефективністю CAR-T для тричі-класно-рефрактерної MM; ide-cel —
  альтернатива при недоступності слоту cilta-cel. Доступ в Україні:
  не зареєстрований (2026-04); потрібне міжнародне направлення.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
  - source_id: SRC-CARTITUDE-1-BERDEJA-2021
    position: supports
    relevant_quote_paraphrase: "Cilta-cel in triple-class refractory MM after ≥3 prior lines (CARTITUDE-1 phase 1b/2): ORR 98%, ≥CR 83%, mPFS ~35 mo at 3-yr update (Berdeja 2021 Lancet; Martin 2023 JCO)"
  - source_id: SRC-NCCN-MM-2025
    position: supports
    relevant_quote_paraphrase: "Ciltacabtagene autoleucel (cilta-cel) is Cat 1 preferred for R/R MM after ≥3 prior lines; deepest + most durable responses of any current MM therapy"
  - source_id: SRC-ESMO-MM-2023
    position: supports
    relevant_quote_paraphrase: "BCMA CAR-T (cilta-cel preferred over ide-cel on efficacy; ide-cel preferred on manufacturing access) for triple-class refractory MM when manufacturing window tolerable"

do_not_do:
  - "Не починати без HBV скринінгу + entecavir prophylaxis при HBsAg+ або anti-HBc+ — ризик HBV реактивації."
  - "Не пропускати оцінку CRS/ICANS і пізнього руху/нейрокогнітивних AEs (MNTs) — унікальний сигнал безпеки cilta-cel."
  - "Не пропускати IVIG-замісну терапію — універсальна гіпогаммаглобулінемія підвищує ризик важких інфекцій."
  - "Не пропускати PJP + HSV/VZV профілактику ≥6 міс. — пролонгована імуносупресія."
  - "Не призначати без bridge-терапії при швидкому прогресуванні — 4-тижневе виробниче вікно неприйнятне."
  - "Не призначати після попередньої BCMA-таргетної терапії без достатнього washout — ризик antigen-loss escape."

known_controversies:
  - topic: Cilta-cel vs ide-cel vs BCMA bispecific for triple-class refractory MM
    positions:
      - position: Cilta-cel — ORR 98%, mPFS 35 mo, deepest + most durable responses
        sources:
          - SRC-CARTITUDE-1-BERDEJA-2021
        evidence_note: "Best-in-class efficacy; unique late MNT signal"
      - position: Ide-cel — ORR 73%, mPFS 12 mo (KarMMa); broader manufacturing capacity
        sources:
          - SRC-KARMMA-MUNSHI-2021
      - position: Teclistamab (BCMA bispecific) — off-the-shelf, no manufacturing window, ORR 63%
        sources:
          - SRC-MAJESTEC-1-MOREAU-2022
        evidence_note: "More prolonged immunosuppression than CAR-T"
    our_default: Cilta-cel preferred when manufacturing window tolerable AND no prior BCMA exposure; ide-cel as alternate CAR-T; bispecifics when CAR-T not feasible
    rationale: Cilta-cel has best efficacy data; ide-cel acceptable alternative; bispecifics for off-the-shelf needs

time_critical: false
