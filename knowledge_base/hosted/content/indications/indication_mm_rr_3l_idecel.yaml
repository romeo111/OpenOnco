rationale: >
  Idecabtagene vicleucel (ide-cel; Abecma) is a BCMA-targeted CAR-T
  cell therapy for triple-class exposed/refractory R/R multiple myeloma
  after ≥3 prior lines (PI + IMiD + anti-CD38). KarMMa pivotal (Munshi
  2021 NEJM): ORR ~73%, ≥CR ~33%, mPFS ~12.1 mo, mOS ~24.8 mo in
  patients with median 6 prior lines. Single infusion after fludarabine
  + cyclophosphamide lymphodepletion (Days -5 to -3). CRS Grade ≥3
  ~5%, ICANS Grade ≥3 ~3%; tocilizumab + dexamethasone for CRS;
  hospital observation 14 days minimum. Universal hypogammaglobulinemia
  → IVIG; PJP + HSV/VZV prophylaxis ≥6 mo. Manufacturing window
  (4 weeks) excludes rapidly progressive patients — bridge therapy
  mandatory. Sibling option to cilta-cel CAR-T: ide-cel has broader
  manufacturing capacity but lower depth/durability of response than
  cilta-cel (CARTITUDE-1: ORR 98%, mPFS 35 mo) — see known_controversies.
  Ukraine access: not registered (2026-04); international referral
  required.

rationale_ua: >
  Ідекабтаген віклейцел (ide-cel; Abecma) — BCMA-таргетна CAR-T
  клітинна терапія для тричі-класно-експонованої/рефрактерної р/р
  множинної мієломи після ≥3 попередніх ліній (PI + IMiD + анти-CD38).
  KarMMa pivotal (Munshi 2021 NEJM): ORR ~73%, ≥CR ~33%, mPFS ~12.1
  міс., mOS ~24.8 міс. у пацієнтів з медіаною 6 попередніх ліній. Одна
  інфузія після флударабін + циклофосфамід лімфодеплеції (дні -5 до -3).
  CRS ≥3 ступеня ~5%, ICANS ≥3 ступеня ~3%; тоцилізумаб + дексаметазон
  при CRS; госпітальне спостереження мінімум 14 днів. Універсальна
  гіпогаммаглобулінемія → ВВІГ; PJP + HSV/VZV профілактика ≥6 міс.
  Виробниче вікно (4 тижні) виключає швидко прогресуючих пацієнтів —
  bridge-терапія обов'язкова. Альтернатива cilta-cel CAR-T: ide-cel
  має ширшу виробничу потужність, але меншу глибину/тривалість
  відповіді ніж cilta-cel (CARTITUDE-1: ORR 98%, mPFS 35 міс.) — див.
  known_controversies. Доступ в Україні: не зареєстрований (2026-04);
  потрібне міжнародне направлення.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
  - source_id: SRC-KARMMA-MUNSHI-2021
    position: supports
    relevant_quote_paraphrase: "Idecabtagene vicleucel (KarMMa pivotal phase 2): ORR 73%, ≥CR 33%, mPFS 12.1 mo, mOS 24.8 mo in triple-class exposed R/R MM after ≥3 prior lines (Munshi 2021 NEJM)"
  - source_id: SRC-NCCN-MM-2025
    position: supports
    relevant_quote_paraphrase: "Idecabtagene vicleucel is recommended (Cat 1) for R/R MM after ≥3 prior lines including PI, IMiD, anti-CD38; CAR-T option with broader manufacturing capacity than cilta-cel"
  - source_id: SRC-ESMO-MM-2023
    position: supports
    relevant_quote_paraphrase: "BCMA CAR-T (ide-cel, cilta-cel) preferred over BCMA bispecifics for triple-class refractory MM when manufacturing window tolerable; cilta-cel has deeper responses, ide-cel as alternate CAR-T"

do_not_do:
  - "Не починати без HBV скринінгу + entecavir prophylaxis при HBsAg+ або anti-HBc+ — ризик HBV реактивації."
  - "Не пропускати оцінку CRS/ICANS у перші 14 днів — обов'язкове госпітальне спостереження."
  - "Не пропускати IVIG-замісну терапію — універсальна гіпогаммаглобулінемія підвищує ризик важких інфекцій."
  - "Не пропускати PJP + HSV/VZV профілактику ≥6 міс. — пролонгована імуносупресія."
  - "Не призначати без bridge-терапії при швидкому прогресуванні — 4-тижневе виробниче вікно неприйнятне."
  - "Не призначати після попередньої BCMA-таргетної терапії без достатнього washout — ризик antigen-loss escape."

known_controversies:
  - topic: Ide-cel vs cilta-cel (BCMA CAR-T choice) for triple-class refractory MM
    positions:
      - position: Cilta-cel — ORR ~98%, mPFS ~35 mo, deeper + more durable responses (CARTITUDE-1)
        sources:
          - SRC-CARTITUDE-1-BERDEJA-2021
        evidence_note: "Best-in-class efficacy; unique late MNT (movement/neurocognitive) signal"
      - position: Ide-cel — ORR ~73%, mPFS ~12 mo, broader manufacturing capacity (KarMMa)
        sources:
          - SRC-KARMMA-MUNSHI-2021
        evidence_note: "Operational advantage when cilta-cel slot unavailable"
    our_default: Cilta-cel preferred when manufacturing slot available + no prior BCMA exposure; ide-cel as alternate CAR-T
    rationale: Cilta-cel has best efficacy data; ide-cel acceptable when cilta-cel inaccessible

time_critical: false
