rationale: >
  Talquetamab (GPRC5D × CD3 bispecific, subcutaneous) for triple-class
  exposed/refractory R/R multiple myeloma after ≥3 prior lines.
  Distinctive role in the Tier-2 R/R MM ecosystem: GPRC5D target is
  independent of BCMA, so prior BCMA-directed therapy (teclistamab,
  elranatamab, ide-cel, cilta-cel) does NOT preclude response.
  MonumenTAL-1 phase 1/2 (Chari 2022 NEJM): ORR ~73% across QW
  0.4 mg/kg and Q2W 0.8 mg/kg cohorts; ≥CR ~33%; mPFS ~7.5 mo (QW) /
  ~11.9 mo (Q2W). Step-up dosing with inpatient observation REQUIRED
  (CRS Grade 1-2 in ~76% during step-up; Grade ≥3 ~3%). Distinctive
  on-target/off-tumour AEs: dysgeusia (~50%), oral toxicities (dry
  mouth, dysphagia), nail/skin changes — GPRC5D expression in oral
  mucosa, nail bed, skin. Less hypogammaglobulinemia than BCMA
  bispecifics — IVIG less universally needed. Ukraine access: not
  registered (2026-04); international referral required.

rationale_ua: >
  Талквотамаб (GPRC5D × CD3 біспецифічне антитіло, підшкірно) для
  тричі-класно-експонованої/рефрактерної р/р множинної мієломи після
  ≥3 попередніх ліній. Ключова відмінність у Tier-2 R/R MM ландшафті:
  ціль GPRC5D незалежна від BCMA, тому попередня BCMA-таргетна терапія
  (теклістамаб, елранатамаб, ide-cel, cilta-cel) НЕ виключає відповіді.
  MonumenTAL-1 фаза 1/2 (Chari 2022 NEJM): ORR ~73% у когортах QW
  0.4 мг/кг і Q2W 0.8 мг/кг; ≥CR ~33%; mPFS ~7.5 міс. (QW) / ~11.9 міс.
  (Q2W). Step-up dosing зі стаціонарним спостереженням ОБОВ'ЯЗКОВЕ
  (CRS ступеня 1-2 у ~76% під час step-up; ≥3 ступеня ~3%). Унікальні
  on-target/off-tumour побічні ефекти: дисгевзія (~50%), оральні
  токсичності (сухість у роті, дисфагія), нігтьові/шкірні зміни —
  експресія GPRC5D у слизовій рота, нігтьовому ложі, шкірі. Менше
  гіпогаммаглобулінемії ніж у BCMA-біспецифіків — ВВІГ потрібний не
  настільки універсально. Доступ в Україні: не зареєстрований (2026-04);
  потрібне міжнародне направлення.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
  - source_id: SRC-NCCN-MM-2025
    position: supports
    relevant_quote_paraphrase: "Talquetamab (GPRC5D bispecific) recommended for triple-class refractory MM after ≥3 prior lines, including patients with prior BCMA-directed therapy; on-target oral/skin/nail AEs are class-distinctive"
  - source_id: SRC-ESMO-MM-2023
    position: supports
    relevant_quote_paraphrase: "Talquetamab (GPRC5D × CD3) preferred when prior BCMA exposure has produced antigen-loss escape; alternate-target rescue option in penta-refractory MM"

do_not_do:
  - "Не починати без HBV скринінгу + entecavir prophylaxis при HBsAg+ або anti-HBc+ — ризик HBV реактивації."
  - "Не пропускати step-up dosing і стаціонарне спостереження — ризик CRS під час нарощування дози."
  - "Не пропускати оцінку оральних токсичностей (дисгевзія, дисфагія) — нутритивна підтримка може знадобитися."
  - "Не пропускати PJP + HSV/VZV профілактику — імуносупресія тривала, хоча менш універсальна за BCMA-біспецифіки."
  - "Не призначати при активній неконтрольованій інфекції — ризик летальної інфекції на тлі CRS/імуносупресії."
  - "Не плутати з BCMA-біспецифіками — інша мішень (GPRC5D), інший токсичний профіль."

known_controversies:
  - topic: Talquetamab (GPRC5D) vs BCMA bispecifics after triple-class refractory MM
    positions:
      - position: Talquetamab — preferred after prior BCMA exposure (alternate target, no antigen-loss cross-resistance)
        sources:
          - SRC-ESMO-MM-2023
        evidence_note: "Distinct GPRC5D target preserves response in BCMA-exposed patients"
      - position: BCMA bispecific (teclistamab/elranatamab) — preferred BCMA-naive (more mature data, ORR comparable)
        sources:
          - SRC-MAJESTEC-1-MOREAU-2022
          - SRC-NCCN-MM-2025
        evidence_note: "Longer follow-up + slightly higher ≥CR rates BCMA-naive"
    our_default: "Talquetamab when prior BCMA exposure (or planned BCMA CAR-T sequence); BCMA bispecific BCMA-naive"
    rationale: "Sequencing strategy: preserve GPRC5D as second-target rescue after BCMA-directed exhaustion"

time_critical: false
