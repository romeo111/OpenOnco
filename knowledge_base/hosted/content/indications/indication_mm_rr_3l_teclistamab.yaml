rationale: >
  Teclistamab (BCMA × CD3 bispecific) for triple-class exposed/refractory
  R/R multiple myeloma after ≥3 prior lines including PI, IMiD, and
  anti-CD38 antibody. MajesTEC-1 (Moreau 2022 NEJM): ORR 63%, CR/sCR
  39%, mPFS ~11.3 mo, mOS ~22 mo — substantially better than historical
  triple-class-refractory outcomes (mOS ~6 mo with conventional therapy).
  Off-the-shelf availability (no manufacturing window, unlike CAR-T) is a
  major operational advantage in rapidly progressive disease, but
  prolonged + severe immunosuppression (universal hypogammaglobulinemia,
  high opportunistic-infection burden) is the dominant safety dimension.
  Step-up dosing with inpatient observation REQUIRED (CRS Grade 1-2 in
  ~70% during step-up; Grade ≥3 ~1%). IVIG support throughout treatment;
  PJP + HSV/VZV prophylaxis mandatory. Ukraine access: not registered
  (2026-04); international referral required.

rationale_ua: >
  Теклістамаб (BCMA × CD3 біспецифічне антитіло) для тричі-класно-
  експонованої/рефрактерної р/р множинної мієломи після ≥3 попередніх
  ліній, включно з PI, IMiD та анти-CD38. MajesTEC-1 (Moreau 2022 NEJM):
  ORR 63%, CR/sCR 39%, mPFS ~11.3 міс., mOS ~22 міс. — суттєво краще за
  історичні результати тричі-класно-рефрактерних пацієнтів (mOS ~6 міс.
  на стандартній терапії). Відсутність виробничого вікна (на відміну від
  CAR-T) — значна операційна перевага у швидко прогресуючій хворобі,
  але тривала + важка імуносупресія (універсальна гіпогаммаглобулінемія,
  високий ризик опортуністичних інфекцій) — домінантний вимір безпеки.
  Step-up dosing зі стаціонарним спостереженням ОБОВ'ЯЗКОВЕ (CRS
  ступеня 1-2 у ~70% під час step-up; ≥3 ступеня ~1%). ВВІГ-підтримка
  упродовж лікування; PJP + HSV/VZV профілактика обов'язкові. Доступ в
  Україні: не зареєстрований (2026-04); потрібне міжнародне направлення.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction

sources:
  - source_id: SRC-MAJESTEC-1-MOREAU-2022
    position: supports
    relevant_quote_paraphrase: "Teclistamab in triple-class exposed R/R MM (MajesTEC-1 phase 1/2): ORR 63%, ≥CR 39%, mPFS ~11.3 mo at median follow-up 14.1 mo (Moreau 2022 NEJM)"
  - source_id: SRC-NCCN-MM-2025
    position: supports
    relevant_quote_paraphrase: "Teclistamab is recommended for triple-class refractory MM after ≥3 prior lines including a PI, IMiD, and anti-CD38 mAb (Cat 2A/Cat 1 per regulatory cohort)"
  - source_id: SRC-ESMO-MM-2023
    position: supports
    relevant_quote_paraphrase: "BCMA bispecifics (teclistamab, elranatamab) recommended for triple-class refractory MM where CAR-T not feasible or rapid progression precludes manufacturing window"

do_not_do:
  - "Не починати без HBV скринінгу + entecavir prophylaxis при HBsAg+ або anti-HBc+ — ризик HBV реактивації."
  - "Не пропускати step-up dosing і стаціонарне спостереження — ризик CRS під час нарощування дози."
  - "Не пропускати IVIG-замісну терапію — універсальна гіпогаммаглобулінемія підвищує ризик важких інфекцій."
  - "Не пропускати PJP + HSV/VZV профілактику — пролонгована імуносупресія значно підвищує ризик опортуністичних інфекцій."
  - "Не призначати при активній неконтрольованій інфекції — ризик летальної інфекції на тлі CRS/імуносупресії."
  - "Не плутати показання з CARTITUDE-4 (2L cilta-cel) — теклістамаб для ≥3 ліній, не для раннього R/R."

known_controversies:
  - topic: BCMA bispecific (teclistamab) vs BCMA CAR-T (cilta-cel/ide-cel) for triple-class refractory MM
    positions:
      - position: BCMA bispecific (teclistamab) — off-the-shelf, no manufacturing window, ORR ~63%
        sources:
          - SRC-MAJESTEC-1-MOREAU-2022
        evidence_note: "Operational advantage when manufacturing window not feasible; deeper immunosuppression than CAR-T"
      - position: BCMA CAR-T (cilta-cel) — ORR ~98%, mPFS ~35 mo, deeper + more durable responses
        sources:
          - SRC-CARTITUDE-1-BERDEJA-2021
        evidence_note: "Better efficacy when manufacturing window tolerable + no prior BCMA exposure"
    our_default: Teclistamab when CAR-T not feasible (rapid progression, no manufacturing slot, prior BCMA exposure); cilta-cel preferred when manufacturing window tolerable
    rationale: BCMA CAR-T has superior depth + durability of response; teclistamab as off-the-shelf BCMA option

