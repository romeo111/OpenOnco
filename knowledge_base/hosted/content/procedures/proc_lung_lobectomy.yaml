notes: >
  Anatomic lobectomy with mediastinal lymph node dissection (or
  systematic sampling of stations 2R/4R/7/8/9 right; 5/6/7/8/9 left) is
  the curative-intent operation for resectable stage I-IIIB NSCLC per
  NCCN v3.2025 and ESMO 2024. Pneumonectomy is reserved for tumors
  involving the mainstem bronchus or proximal pulmonary artery where
  lobectomy / sleeve resection is not feasible — pneumonectomy carries
  meaningfully higher mortality (5-10%) and BPF risk (4-10%) than
  lobectomy.

  Sublobar resection (segmentectomy / wedge): JCOG-0802 and CALGB-140503
  established that anatomic segmentectomy is non-inferior to lobectomy
  for peripheral cT1aN0 NSCLC ≤2 cm; for larger tumors, locally-advanced
  disease, or central locations lobectomy remains the standard.

  Minimally invasive approach: VATS or RATS lobectomy is preferred over
  open thoracotomy when oncologically feasible — lower morbidity (pain,
  pulmonary complications), shorter hospital stay, equivalent oncologic
  outcomes per multiple meta-analyses + the VIOLET RCT (Lim 2022).

  Mediastinal nodal dissection is mandatory for accurate pathologic
  staging — at least 3 N2 stations + N1 nodes per NCCN. Extent of
  dissection (systematic sampling vs complete dissection) is
  surgeon-discretion; ACOSOG-Z0030 showed equivalent survival with
  systematic sampling in cN0/cN1 disease.

  Center-volume gradient: high-volume thoracic centers (>40
  lobectomies/yr) show 30-day mortality ~1-3% vs ~4-6% at low-volume
  centers; NCCN recommends referral to high-volume centers for
  resectable NSCLC.

  Pairs with neoadjuvant pembro+chemo and adjuvant pembro in the
  KEYNOTE-671 perioperative sequence (Wakelee NEJM 2023) — see
  IND-NSCLC-PERIOPERATIVE-PEMBRO.
notes_ua: >
  Анатомічна лобектомія з медіастинальною лімфодисекцією (видалення
  лімфатичних вузлів середостіння; або
  систематичним семплінгом станцій 2R/4R/7/8/9 справа; 5/6/7/8/9 зліва)
  є операцією з куративним наміром при резектабельному НДРЛ стадій
  I-IIIB згідно з NCCN v3.2025 та ESMO 2024. Пневмонектомія
  резервується для пухлин з ураженням головного бронха або
  проксимальної легеневої артерії, коли лобектомія чи слівер-резекція
  технічно нездійсненні; пневмонектомія супроводжується суттєво вищою
  летальністю (5-10%) та ризиком бронхоплеврального свища (4-10%)
  порівняно з лобектомією.

  Сублобарна резекція (сегментектомія / клиноподібна): дослідження
  JCOG-0802 та CALGB-140503 довели, що анатомічна сегментектомія не
  поступається лобектомії при периферичному НДРЛ cT1aN0 розміром до
  2 cm; для більших пухлин, місцево-поширеного процесу або
  центрального розташування стандартом залишається лобектомія.

  Мінімально-інвазивний доступ: відеоторакоскопічна (VATS) або
  робот-асистована (RATS) лобектомія є кращим вибором порівняно з
  відкритою торакотомією за умови онкологічної доцільності — нижча
  захворюваність (післяопераційний біль, легеневі ускладнення),
  коротший термін госпіталізації та еквівалентні онкологічні результати
  згідно з численними метааналізами та РКД VIOLET (Lim 2022).

  Медіастинальна лімфодисекція є обов’язковою для точного
  патологічного стадіювання — щонайменше 3 станції N2 разом із
  вузлами N1 згідно з NCCN. Обсяг дисекції (систематичний семплінг
  проти повної дисекції) лишається на розсуд хірурга; дослідження
  ACOSOG-Z0030 продемонструвало еквівалентну виживаність при
  систематичному семплінгу у пацієнтів з cN0/cN1.

  Залежність від обсягу центру: торакальні центри з високим обсягом
  (>40 лобектомій на рік) демонструють 30-денну летальність близько
  1-3% проти 4-6% у центрах із меншим обсягом; NCCN рекомендує
  направлення пацієнтів із резектабельним НДРЛ до центрів високого
  обсягу.

  Поєднується з неоад’ювантною комбінацією pembro+хіміотерапія та
  ад’ювантним pembro у периопераційному режимі KEYNOTE-671
  (Wakelee NEJM 2023) — див. IND-NSCLC-PERIOPERATIVE-PEMBRO.
