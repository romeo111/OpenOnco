id: SUR-MENINGIOMA-RESECTION
names:
  preferred: "Maximal safe meningioma resection"
  ukrainian: "Maximal safe meningioma resection"
  english: "Maximal safe meningioma resection"
  synonyms:
    - "Gross total resection for meningioma"
    - "Subtotal resection for skull-base meningioma"

type: neurosurgical_resection
intent: curative

target_organ: meninges
applicable_diseases:
  - DIS-MENINGIOMA

operative_mortality_pct: "Varies by location, age, and center; skull-base and parasagittal tumors have higher morbidity"

common_complications:
  - name: "New or worsened neurologic deficit"
    frequency: "Location-dependent"
  - name: "Seizure"
    frequency: "Location-dependent"
  - name: "Venous sinus injury or thrombosis"
    frequency: "Higher for parasagittal/falx tumors"
  - name: "CSF leak or wound complication"
    frequency: "Uncommon; higher for skull-base approaches"

sources:
  - SRC-EANO-MENINGIOMA-2024
  - SRC-NCCN-CNS-2025

last_reviewed: "2026-05-11"
notes: >
  First-line meningioma treatment is observation for small asymptomatic tumors
  or maximal safe resection for symptomatic, growing, or mass-effect lesions.
  Extent of resection is balanced against neurologic morbidity, especially at
  skull base, cavernous sinus, parasagittal, or eloquent cortex sites.
