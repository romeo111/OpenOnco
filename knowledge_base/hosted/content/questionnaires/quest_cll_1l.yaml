id: QUEST-CLL-1L
disease_id: DIS-CLL
line_of_therapy: 1
title: "Chronic Lymphocytic Leukemia / SLL — first line"

intro: >
  Опитувальник для CLL/SLL з iwCLL treatment indication. Алгоритм
  розрізняє standard-risk (BTKi continuous, default) vs high-risk
  cytogenetics (venetoclax + obinutuzumab time-limited, alternative
  preferred). 6-8 хвилин.

fixed_fields:
  disease:
    icd_o_3_morphology: "9823/3"
  line_of_therapy: 1

groups:
  - title: "Демографія + iwCLL treatment indication"
    description: "Asymptomatic CLL без iwCLL indication = active surveillance, не treatment."
    questions:
      - field: patient_id
        label: "ID пацієнта (synthetic)"
        type: text
        impact: required
        default_value: "VIRTUAL-CLL-001"

      - field: demographics.age
        label: "Вік"
        type: integer
        impact: critical
        range_min: 18
        range_max: 110
        units: "років"
        triggers:
          - "filter:age у виборі intensive vs less intensive (FCR обмежений ≤65)"
        helper: >
          Вік + IGHV mutated → можливість FCR (рідкісно зараз). Старші
          ≥65 → BTKi або VenO virtually завжди.

      - field: demographics.sex
        label: "Стать"
        type: enum
        impact: optional
        options:
          - {value: "male", label: "Чоловіча"}
          - {value: "female", label: "Жіноча"}

      - field: demographics.ecog
        label: "ECOG Performance Status"
        type: enum
        impact: critical
        options:
          - {value: 0, label: "0"}
          - {value: 1, label: "1"}
          - {value: 2, label: "2"}
          - {value: 3, label: "3"}
          - {value: 4, label: "4"}
        triggers:
          - "filter:ecog_max=3 у IND-CLL-1L-BTKI"
        helper: "ECOG 4 — palliative track only; engine не запропонує active treatment."

      - field: demographics.fit_for_chemoimmunotherapy
        label: "Придатний до хіміоімунотерапії (FCR/BR)?"
        type: boolean
        impact: required
        helper: >
          У 2025 chemoimmunotherapy витіснено BTKi/venetoclax. Поле
          залишене для historical compatibility — для більшості 1L
          ставимо false.
        default_value: false

      - field: "findings.iwcll_indication_present"
        label: "iwCLL treatment indication present?"
        type: boolean
        impact: critical
        helper: >
          Хоч одна з: progressive cytopenia (Hb<10, plt<100), bulky/
          progressive splenomegaly або lymphadenopathy, B-symptoms,
          autoimmune cytopenia не на стероїдах, lymphocyte doubling
          time <6 міс. БЕЗ цього → active surveillance, no plan.

  - title: "Cytogenetic + molecular risk (defines BTKi vs VenO)"
    description: "del(17p), TP53 mut, IGHV-unmutated, complex karyotype = high-risk composite."
    questions:
      - field: "biomarkers.BIO-CLL-HIGH-RISK-GENETICS"
        label: "CLL composite high-risk?"
        type: enum
        impact: critical
        options:
          - {value: "high_risk", label: "High-risk (≥1 з: TP53 mut / del17p / IGHV-unmutated / complex karyotype)"}
          - {value: "standard_risk", label: "Standard-risk"}
          - {value: "unknown", label: "Pending FISH/IGHV"}
        triggers:
          - "RF-CLL-HIGH-RISK → IND-CLL-1L-VENO як preferred"
        helper: >
          Engine за NCCN рекомендує VenO для high-risk (BTKi не resensitизує
          del17p, fixed-duration вигідніше).

      - field: "findings.tp53_mutation"
        label: "TP53 mutation"
        type: boolean
        impact: critical
        triggers:
          - "RF-CLL-HIGH-RISK"
        helper: "~5-7% NDxg CLL; робить FCR/BR contraindicated."
        default_value: false

      - field: "findings.del_17p"
        label: "del(17p) by FISH"
        type: boolean
        impact: critical
        triggers:
          - "RF-CLL-HIGH-RISK"
        helper: "~5-10% 1L; найгірший single marker."
        default_value: false

      - field: "findings.ighv_unmutated"
        label: "IGHV-unmutated (≥98% germline homology)"
        type: boolean
        impact: required
        triggers:
          - "RF-CLL-HIGH-RISK"
        helper: "~50% CLL — unmutated = adverse, mutated = favorable."
        default_value: false

      - field: "findings.complex_karyotype"
        label: "Complex karyotype (≥3 abnormalities)"
        type: boolean
        impact: recommended
        triggers:
          - "RF-CLL-HIGH-RISK"
        helper: "≥5 = highly complex, асоційовано з gross prognosis."
        default_value: false

  - title: "Кардіальна безпека (BTKi-specific)"
    description: "BTKi (acalabrutinib/zanubrutinib) — атипова фібриляція передсердь, hypertension."
    questions:
      - field: "findings.afib_history"
        label: "Атипова фібриляція передсердь в анамнезі?"
        type: boolean
        impact: required
        triggers:
          - "filter:IND-CLL-1L-BTKI relative contraindication → favors VenO"
        helper: >
          AFib history = relative contra на BTKi (особливо ibrutinib).
          Acalab/zanub safer але не zero. VenO без cardiac risk.
        default_value: false

      - field: "findings.bleeding_risk_high"
        label: "High bleeding risk (anticoagulation, GI bleed history)?"
        type: boolean
        impact: required
        triggers:
          - "filter:IND-CLL-1L-BTKI → favors VenO"
        helper: "BTKi ↑ bleeding ризик ~2-3×. Anticoagulant interaction issue."
        default_value: false

  - title: "TLS risk (VenO-specific)"
    description: "Venetoclax ramp-up — TLS prophylaxis required."
    questions:
      - field: "findings.absolute_lymphocyte_count_k_ul"
        label: "Absolute lymphocyte count (K/μL)"
        type: float
        impact: recommended
        range_min: 0
        range_max: 500
        units: "K/μL"
        triggers:
          - "SUP-TLS-PROPHYLAXIS intensive ramp-up (allopurinol + IV hydration)"
        helper: ">25 K/μL = high TLS risk → 5-week ramp-up з hospitalization weeks 1-2."
        default_value: 30

      - field: "findings.bulky_lymph_nodes_5cm"
        label: "Lymph nodes ≥5 см?"
        type: boolean
        impact: recommended
        helper: "Bulky disease = TLS high-risk irrespective of ALC."
        default_value: false

  - title: "HBV + опортуністичні інфекції"
    description: "BTKi + venetoclax — risk of HSV/VZV, рідше PJP."
    questions:
      - field: "findings.hbsag"
        label: "HBsAg"
        type: enum
        impact: critical
        options:
          - {value: "negative", label: "Негативний"}
          - {value: "positive", label: "Позитивний"}
        triggers:
          - "RF-HBV-COINFECTION (особливо при VenO + obinutuzumab)"
        helper: >
          Obinutuzumab (anti-CD20) — HBV reactivation ризик. Engine
          вимагає entecavir prophylaxis якщо HBsAg+.
        default_value: "negative"

      - field: "findings.anti_hbc_total"
        label: "Anti-HBc total"
        type: enum
        impact: required
        options:
          - {value: "negative", label: "Негативний"}
          - {value: "positive", label: "Позитивний (occult)"}
        default_value: "negative"

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
reviewer_signoffs: 0

notes: >
  STUB — pending Clinical Co-Lead approval per CHARTER §6.1.
