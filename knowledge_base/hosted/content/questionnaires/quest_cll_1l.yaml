id: QUEST-CLL-1L
disease_id: DIS-CLL
line_of_therapy: 1
title: "Chronic Lymphocytic Leukemia / SLL — first line"

intro: >
  Questionnaire for CLL/SLL with iwCLL treatment indication. Algorithm
  distinguishes standard-risk (BTKi continuous, default) vs high-risk
  cytogenetics (venetoclax + obinutuzumab time-limited, alternative
  preferred). 6-8 minutes.

fixed_fields:
  disease:
    icd_o_3_morphology: "9823/3"
  line_of_therapy: 1

groups:
  - title: "Demographics + iwCLL treatment indication"
    description: "Asymptomatic CLL without iwCLL indication = active surveillance, not treatment."
    questions:
      - field: patient_id
        label: "Patient ID (synthetic)"
        type: text
        impact: required
        default_value: "VIRTUAL-CLL-001"

      - field: demographics.age
        label: "Age"
        type: integer
        impact: critical
        range_min: 18
        range_max: 110
        units: "years"
        triggers:
          - "filter:age in choice of intensive vs less intensive (FCR limited to ≤65)"
        helper: >
          Age + IGHV mutated → possibility of FCR (rarely used now). Age
          ≥65 → BTKi or VenO virtually always.

      - field: demographics.sex
        label: "Sex"
        type: enum
        impact: optional
        options:
          - {value: "male", label: "Male"}
          - {value: "female", label: "Female"}

      - field: demographics.ecog
        label: "ECOG Performance Status"
        type: enum
        impact: critical
        options:
          - {value: 0, label: "0"}
          - {value: 1, label: "1"}
          - {value: 2, label: "2"}
          - {value: 3, label: "3"}
          - {value: 4, label: "4"}
        triggers:
          - "filter:ecog_max=3 in IND-CLL-1L-BTKI"
        helper: "ECOG 4 — palliative track only; engine will not propose active treatment."

      - field: demographics.fit_for_chemoimmunotherapy
        label: "Eligible for chemoimmunotherapy (FCR/BR)?"
        type: boolean
        impact: required
        helper: >
          In 2025 chemoimmunotherapy has been displaced by BTKi/venetoclax.
          Field retained for historical compatibility — for most 1L cases
          set to false.
        default_value: false

      - field: "findings.iwcll_indication_present"
        label: "iwCLL treatment indication present?"
        type: boolean
        impact: critical
        helper: >
          At least one of: progressive cytopenia (Hb<10, plt<100), bulky/
          progressive splenomegaly or lymphadenopathy, B-symptoms,
          autoimmune cytopenia not on steroids, lymphocyte doubling
          time <6 months. WITHOUT this → active surveillance, no plan.

  - title: "Cytogenetic + molecular risk (defines BTKi vs VenO)"
    description: "del(17p), TP53 mut, IGHV-unmutated, complex karyotype = high-risk composite."
    questions:
      - field: "biomarkers.BIO-CLL-HIGH-RISK-GENETICS"
        label: "CLL composite high-risk?"
        type: enum
        impact: critical
        options:
          - {value: "high_risk", label: "High-risk (≥1 of: TP53 mut / del17p / IGHV-unmutated / complex karyotype)"}
          - {value: "standard_risk", label: "Standard-risk"}
          - {value: "unknown", label: "Pending FISH/IGHV"}
        triggers:
          - "RF-CLL-HIGH-RISK → IND-CLL-1L-VENO as preferred"
        helper: >
          Engine per NCCN recommends VenO for high-risk (BTKi does not
          resensitize del17p; fixed-duration is advantageous).

      - field: "findings.tp53_mutation"
        label: "TP53 mutation"
        type: boolean
        impact: critical
        triggers:
          - "RF-CLL-HIGH-RISK"
        helper: "~5-7% newly-diagnosed CLL; makes FCR/BR contraindicated."
        default_value: false

      - field: "findings.del_17p"
        label: "del(17p) by FISH"
        type: boolean
        impact: critical
        triggers:
          - "RF-CLL-HIGH-RISK"
        helper: "~5-10% 1L; worst single marker."
        default_value: false

      - field: "findings.ighv_unmutated"
        label: "IGHV-unmutated (≥98% germline homology)"
        type: boolean
        impact: required
        triggers:
          - "RF-CLL-HIGH-RISK"
        helper: "~50% CLL — unmutated = adverse, mutated = favorable."
        default_value: false

      - field: "findings.complex_karyotype"
        label: "Complex karyotype (≥3 abnormalities)"
        type: boolean
        impact: recommended
        triggers:
          - "RF-CLL-HIGH-RISK"
        helper: "≥5 = highly complex, associated with poor prognosis."
        default_value: false

  - title: "Cardiac safety (BTKi-specific)"
    description: "BTKi (acalabrutinib/zanubrutinib) — atrial fibrillation, hypertension."
    questions:
      - field: "findings.afib_history"
        label: "History of atrial fibrillation?"
        type: boolean
        impact: required
        triggers:
          - "filter:IND-CLL-1L-BTKI relative contraindication → favors VenO"
        helper: >
          AFib history = relative contraindication to BTKi (especially ibrutinib).
          Acalabrutinib/zanubrutinib safer but not zero risk. VenO has no cardiac risk.
        default_value: false

      - field: "findings.bleeding_risk_high"
        label: "High bleeding risk (anticoagulation, GI bleed history)?"
        type: boolean
        impact: required
        triggers:
          - "filter:IND-CLL-1L-BTKI → favors VenO"
        helper: "BTKi ↑ bleeding risk ~2-3×. Anticoagulant interaction issue."
        default_value: false

  - title: "TLS risk (VenO-specific)"
    description: "Venetoclax ramp-up — TLS prophylaxis required."
    questions:
      - field: "findings.absolute_lymphocyte_count_k_ul"
        label: "Absolute lymphocyte count (K/μL)"
        type: float
        impact: recommended
        range_min: 0
        range_max: 500
        units: "K/μL"
        triggers:
          - "SUP-TLS-PROPHYLAXIS intensive ramp-up (allopurinol + IV hydration)"
        helper: ">25 K/μL = high TLS risk → 5-week ramp-up with hospitalization weeks 1-2."
        default_value: 30

      - field: "findings.bulky_lymph_nodes_5cm"
        label: "Lymph nodes ≥5 cm?"
        type: boolean
        impact: recommended
        helper: "Bulky disease = TLS high-risk irrespective of ALC."
        default_value: false

  - title: "HBV + opportunistic infections"
    description: "BTKi + venetoclax — risk of HSV/VZV, less commonly PJP."
    questions:
      - field: "findings.hbsag"
        label: "HBsAg"
        type: enum
        impact: critical
        options:
          - {value: "negative", label: "Negative"}
          - {value: "positive", label: "Positive"}
        triggers:
          - "RF-HBV-COINFECTION (especially with VenO + obinutuzumab)"
        helper: >
          Obinutuzumab (anti-CD20) — HBV reactivation risk. Engine
          requires entecavir prophylaxis if HBsAg+.
        default_value: "negative"

      - field: "findings.anti_hbc_total"
        label: "Anti-HBc total"
        type: enum
        impact: required
        options:
          - {value: "negative", label: "Negative"}
          - {value: "positive", label: "Positive (occult)"}
        default_value: "negative"

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
reviewer_signoffs: 0

notes: >
  STUB — pending Clinical Co-Lead approval per CHARTER §6.1.
