id: QUEST-HCV-MZL-1L
disease_id: DIS-HCV-MZL
line_of_therapy: 1
title: "HCV-asociated Marginal Zone Lymphoma — first line"

intro: >
  Опитувальник для підтвердженої HCV-асоційованої MZL у пацієнта без
  попереднього лікування лімфоми. Заповнення займає 5-7 хвилин. Поля
  позначені як CRITICAL — обов'язкові; без них engine видасть warning
  замість Plan.

# Engine-required scaffolding that the form fills automatically — not
# asked from the clinician. ICD-O-3 9699/3 = Extranodal MZL of MALT
# (the morphology code DIS-HCV-MZL resolves to).
fixed_fields:
  disease:
    icd_o_3_morphology: "9699/3"
  line_of_therapy: 1

groups:
  - title: "Демографія + загальний стан"
    description: "Базовий портрет пацієнта."
    questions:
      - field: patient_id
        label: "ID пацієнта (synthetic)"
        type: text
        impact: required
        helper: "Будь-який неперсональний ID — для збереження в історії."
        default_value: "VIRTUAL-001"

      - field: demographics.age
        label: "Вік"
        type: integer
        impact: required
        range_min: 18
        range_max: 110
        units: "років"
        triggers:
          - "filter:age_max constraints на BR-aggressive (немає для HCV-MZL, але впливає на frailty)"
        helper: "Вплив непрямий — старші 75 з більшою ймовірністю отримають антивірусний-only трек."

      - field: demographics.sex
        label: "Стать"
        type: enum
        impact: optional
        options:
          - {value: "male", label: "Чоловіча"}
          - {value: "female", label: "Жіноча"}
        helper: "Не впливає на алгоритм HCV-MZL 1L. Запитується для render layer."

      - field: demographics.ecog
        label: "ECOG Performance Status"
        type: enum
        impact: critical
        options:
          - {value: 0, label: "0 — повністю активний"}
          - {value: 1, label: "1 — обмеження тяжкої фізичної активності"}
          - {value: 2, label: "2 — самостійний у самообслуговуванні, ходить >50% часу"}
          - {value: 3, label: "3 — обмежений у самообслуговуванні"}
          - {value: 4, label: "4 — повністю прикутий до ліжка"}
        triggers:
          - "filter:ecog_max=2 у IND-HCV-MZL-1L-BR-AGGRESSIVE"
        helper: >
          ECOG > 2 виключає BR-aggressive track — engine не запропонує
          chemo, тільки antiviral monotherapy.

      - field: demographics.fit_for_chemoimmunotherapy
        label: "Придатність до хіміоімунотерапії"
        type: boolean
        impact: required
        triggers:
          - "filter:IND-HCV-MZL-1L-BR-AGGRESSIVE applicable_to"
        helper: >
          Лікар оцінює загальну fit (комoрбідності, кардіо- і ниркова функція,
          dialogo з пацієнтом). False → BR-aggressive track filter'иться.

  - title: "HCV статус (defining biomarker)"
    description: "HCV є етіологічним driver'ом для цієї лімфоми."
    questions:
      - field: "biomarkers.BIO-HCV-RNA"
        label: "HCV RNA (PCR)"
        type: enum
        impact: critical
        options:
          - {value: "positive", label: "Позитивний (active infection)"}
          - {value: "negative", label: "Негативний (cleared)"}
        triggers:
          - "select:IND-HCV-MZL-1L-ANTIVIRAL якщо positive + indolent"
          - "select:IND-HCV-MZL-1L-BR-AGGRESSIVE якщо negative або bulky"
        helper: >
          HCV RNA positive — основа для antiviral-first track. Якщо negative,
          engine fallback'ить на BR-aggressive (стандартний approach без
          eтіологічного інструменту).

      - field: "findings.HCV RNA positive"
        label: "HCV RNA positive (boolean — для engine clause)"
        type: boolean
        impact: critical
        helper: >
          Технічне поле що дублює biomarker для evaluation. Заповнюється
          автоматично з попереднього питання — true якщо positive.
        when: "biomarkers.BIO-HCV-RNA == 'positive'"

      - field: demographics.decompensated_cirrhosis
        label: "Декомпенсований цироз?"
        type: boolean
        impact: critical
        triggers:
          - "RF-DECOMP-CIRRHOSIS"
          - "ci:CI-DECOMP-CIRRHOSIS-GLEC"
        helper: >
          Child-Pugh B/C — блокує glecaprevir/pibrentasvir DAA. Engine
          обере sof/vel + RBV альтернативу (якщо HCV positive) АБО
          відкладе антивірусну терапію до hepatology consultation.

  - title: "Tumor burden + phenotype"
    description: "Чи indolent / bulky / aggressive — основа для вибору track."
    questions:
      - field: "findings.dominant_nodal_mass_cm"
        label: "Найбільший нодальний масив (см)"
        type: float
        impact: critical
        range_min: 0
        range_max: 30
        units: "см"
        triggers:
          - "RF-BULKY-DISEASE при ≥7 см → switches на BR-aggressive"
        helper: >
          Bulky (≥ 7 см) = автоматично BR-aggressive track навіть
          при HCV positive. Antiviral-only недостатньо швидко reduce
          tumor burden.

      - field: "findings.mediastinal_ratio"
        label: "Медіастинально-торакальне співвідношення (mediastinal mass / thoracic diameter)"
        type: float
        impact: recommended
        range_min: 0
        range_max: 1
        triggers:
          - "RF-BULKY-DISEASE при ≥0.33 (alternative bulky criterion)"
        helper: "Альтернативний критерій bulky disease — за CT thorax."
        default_value: 0

      - field: "findings.symptomatic_b_symptoms_severe"
        label: "Тяжкі B-симптоми (febr. >38°C, drenching night sweats, weight loss >10% за 6 міс)?"
        type: boolean
        impact: critical
        triggers:
          - "RF-BULKY-DISEASE alternative trigger"
        helper: >
          Severe B-symptoms — relative indication для chemotherapy
          навіть без bulky.

      - field: "findings.Indolent presentation (non-bulky, asymptomatic or minimally symptomatic)"
        label: "Indolent presentation (підсумок: non-bulky + min symptoms)?"
        type: boolean
        impact: critical
        helper: >
          Технічне поле для algorithm clause. True якщо НЕ bulky AND НЕ
          severe B-symptoms. Заповнюється автоматично з попередніх питань.

  - title: "Гістологія + transformation risk"
    description: "Виключення трансформації в DLBCL."
    questions:
      - field: "findings.biopsy_shows_dlbcl"
        label: "Біопсія показує DLBCL transformation?"
        type: boolean
        impact: critical
        triggers:
          - "RF-AGGRESSIVE-HISTOLOGY-TRANSFORMATION → BR-aggressive obligatory"
        helper: >
          Якщо trasformation в DLBCL підтверджено — engine видає попередження
          і відсилає на DLBCL-specific Algorithm (не HCV-MZL). Поки що
          fallback — BR-aggressive як safest option.
        default_value: false

      - field: "findings.ldh_ratio_to_uln"
        label: "LDH ratio to ULN"
        type: float
        impact: recommended
        range_min: 0.5
        range_max: 10
        triggers:
          - "RF-AGGRESSIVE-HISTOLOGY-TRANSFORMATION при ratio ≥ 2"
        helper: "LDH > 2× ULN — surrogate marker трансформації."
        default_value: 1.0

      - field: "findings.clinical_progression_weeks"
        label: "Клінічний прогрес за останні X тижнів (rapid worsening)?"
        type: integer
        impact: optional
        range_min: 0
        range_max: 200
        units: "тижнів"
        helper: >
          Час від notice'у нової маси / симптомів до visit. <12 тижнів +
          high LDH = підозра на transformation.
        default_value: 52

  - title: "HBV скринінг (mandatory if anti-CD20 planned)"
    description: "Будь-який BR-aggressive містить rituximab → HBV reactivation risk."
    questions:
      - field: "findings.hbsag"
        label: "HBsAg"
        type: enum
        impact: critical
        options:
          - {value: "negative", label: "Негативний"}
          - {value: "positive", label: "Позитивний"}
        triggers:
          - "RF-HBV-COINFECTION → entecavir prophylaxis required"
        helper: >
          HBsAg positive без prophylaxis — заборона на rituximab. Engine
          активує CI-HBV-NO-PROPHYLAXIS contraindication.

      - field: "findings.anti_hbc_total"
        label: "Anti-HBc total"
        type: enum
        impact: required
        options:
          - {value: "negative", label: "Негативний"}
          - {value: "positive", label: "Позитивний (occult / past infection)"}
        triggers:
          - "RF-HBV-COINFECTION (occult HBV)"
        helper: "Anti-HBc+ HBsAg- = occult HBV → monitoring + prophylaxis за NCCN."

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-MZL-2024
  - SRC-EASL-HCV-2023

last_reviewed: "2026-04-25"
reviewer_signoffs: 0

notes: >
  STUB — pending Clinical Co-Lead approval per CHARTER §6.1. Field
  paths must match what engine reads (plan.py:_findings_flatten flattens
  demographics + biomarkers + findings into one dict).
