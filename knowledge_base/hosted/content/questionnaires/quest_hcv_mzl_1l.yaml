id: QUEST-HCV-MZL-1L
disease_id: DIS-HCV-MZL
line_of_therapy: 1
title: "HCV-asociated Marginal Zone Lymphoma — first line"

intro: >
  Questionnaire for confirmed HCV-associated MZL in a patient without
  prior lymphoma treatment. Completion takes 5-7 minutes. Fields
  marked CRITICAL are required; without them the engine will issue a
  warning instead of a Plan.

# Engine-required scaffolding that the form fills automatically — not
# asked from the clinician. ICD-O-3 9699/3 = Extranodal MZL of MALT
# (the morphology code DIS-HCV-MZL resolves to).
fixed_fields:
  disease:
    icd_o_3_morphology: "9699/3"
  line_of_therapy: 1

groups:
  - title: "Demographics + general status"
    description: "Basic patient profile."
    questions:
      - field: patient_id
        label: "Patient ID (synthetic)"
        type: text
        impact: required
        helper: "Any non-personal ID — for session history."
        default_value: "VIRTUAL-001"

      - field: demographics.age
        label: "Age"
        type: integer
        impact: required
        range_min: 18
        range_max: 110
        units: "years"
        triggers:
          - "filter:age_max constraints on BR-aggressive (none for HCV-MZL, but affects frailty assessment)"
        helper: "Indirect effect — patients ≥75 more likely to receive antiviral-only track."

      - field: demographics.sex
        label: "Sex"
        type: enum
        impact: optional
        options:
          - {value: "male", label: "Male"}
          - {value: "female", label: "Female"}
        helper: "Does not affect the HCV-MZL 1L algorithm. Collected for the render layer."

      - field: demographics.ecog
        label: "ECOG Performance Status"
        type: enum
        impact: critical
        options:
          - {value: 0, label: "0 — fully active"}
          - {value: 1, label: "1 — restricted in strenuous activity"}
          - {value: 2, label: "2 — ambulatory and capable of self-care, up >50% of time"}
          - {value: 3, label: "3 — limited self-care"}
          - {value: 4, label: "4 — fully bedridden"}
        triggers:
          - "filter:ecog_max=2 in IND-HCV-MZL-1L-BR-AGGRESSIVE"
        helper: >
          ECOG > 2 excludes BR-aggressive track — engine will not propose
          chemo, only antiviral monotherapy.

      - field: demographics.fit_for_chemoimmunotherapy
        label: "Eligible for chemoimmunotherapy"
        type: boolean
        impact: required
        triggers:
          - "filter:IND-HCV-MZL-1L-BR-AGGRESSIVE applicable_to"
        helper: >
          Clinician assesses overall fitness (comorbidities, cardiac and renal
          function, discussion with patient). False → BR-aggressive track is filtered out.

  - title: "HCV status (defining biomarker)"
    description: "HCV is the etiological driver of this lymphoma."
    questions:
      - field: "biomarkers.BIO-HCV-RNA"
        label: "HCV RNA (PCR)"
        type: enum
        impact: critical
        options:
          - {value: "positive", label: "Positive (active infection)"}
          - {value: "negative", label: "Negative (cleared)"}
        triggers:
          - "select:IND-HCV-MZL-1L-ANTIVIRAL if positive + indolent"
          - "select:IND-HCV-MZL-1L-BR-AGGRESSIVE if negative or bulky"
        helper: >
          HCV RNA positive — basis for antiviral-first track. If negative,
          engine falls back to BR-aggressive (standard approach without
          etiological tool).

      - field: "findings.HCV RNA positive"
        label: "HCV RNA positive (boolean — for engine clause)"
        type: boolean
        impact: critical
        helper: >
          Technical field duplicating the biomarker for evaluation. Auto-filled
          from the previous question — true if positive.
        when: "biomarkers.BIO-HCV-RNA == 'positive'"

      - field: demographics.decompensated_cirrhosis
        label: "Decompensated cirrhosis?"
        type: boolean
        impact: critical
        triggers:
          - "RF-DECOMP-CIRRHOSIS"
          - "ci:CI-DECOMP-CIRRHOSIS-GLEC"
        helper: >
          Child-Pugh B/C — blocks glecaprevir/pibrentasvir DAA. Engine
          will select sof/vel + RBV alternative (if HCV positive) OR
          defer antiviral therapy pending hepatology consultation.

  - title: "Tumor burden + phenotype"
    description: "Whether indolent / bulky / aggressive — basis for track selection."
    questions:
      - field: "findings.dominant_nodal_mass_cm"
        label: "Largest nodal mass (cm)"
        type: float
        impact: critical
        range_min: 0
        range_max: 30
        units: "cm"
        triggers:
          - "RF-BULKY-DISEASE at ≥7 cm → switches to BR-aggressive"
        helper: >
          Bulky (≥7 cm) = automatically BR-aggressive track even
          if HCV positive. Antiviral-only is too slow to reduce
          tumor burden.

      - field: "findings.mediastinal_ratio"
        label: "Mediastinal-thoracic ratio (mediastinal mass / thoracic diameter)"
        type: float
        impact: recommended
        range_min: 0
        range_max: 1
        triggers:
          - "RF-BULKY-DISEASE at ≥0.33 (alternative bulky criterion)"
        helper: "Alternative bulky disease criterion — by CT thorax."
        default_value: 0

      - field: "findings.symptomatic_b_symptoms_severe"
        label: "Severe B-symptoms (fever >38°C, drenching night sweats, weight loss >10% over 6 months)?"
        type: boolean
        impact: critical
        triggers:
          - "RF-BULKY-DISEASE alternative trigger"
        helper: >
          Severe B-symptoms — relative indication for chemotherapy
          even without bulky disease.

      - field: "findings.Indolent presentation (non-bulky, asymptomatic or minimally symptomatic)"
        label: "Indolent presentation (summary: non-bulky + minimal symptoms)?"
        type: boolean
        impact: critical
        helper: >
          Technical field for algorithm clause. True if NOT bulky AND NOT
          severe B-symptoms. Auto-filled from preceding questions.

  - title: "Histology + transformation risk"
    description: "Exclude transformation to DLBCL."
    questions:
      - field: "findings.biopsy_shows_dlbcl"
        label: "Biopsy shows DLBCL transformation?"
        type: boolean
        impact: critical
        triggers:
          - "RF-AGGRESSIVE-HISTOLOGY-TRANSFORMATION → BR-aggressive obligatory"
        helper: >
          If transformation to DLBCL is confirmed — engine issues a warning
          and redirects to the DLBCL-specific algorithm (not HCV-MZL). Currently
          fallback — BR-aggressive as safest option.
        default_value: false

      - field: "findings.ldh_ratio_to_uln"
        label: "LDH ratio to ULN"
        type: float
        impact: recommended
        range_min: 0.5
        range_max: 10
        triggers:
          - "RF-AGGRESSIVE-HISTOLOGY-TRANSFORMATION at ratio ≥ 2"
        helper: "LDH > 2× ULN — surrogate marker of transformation."
        default_value: 1.0

      - field: "findings.clinical_progression_weeks"
        label: "Clinical progression over last X weeks (rapid worsening)?"
        type: integer
        impact: optional
        range_min: 0
        range_max: 200
        units: "weeks"
        helper: >
          Time from first notice of new mass / symptoms to visit. <12 weeks +
          high LDH = suspicion of transformation.
        default_value: 52

  - title: "HBV screening (mandatory if anti-CD20 planned)"
    description: "Any BR-aggressive regimen contains rituximab → HBV reactivation risk."
    questions:
      - field: "findings.hbsag"
        label: "HBsAg"
        type: enum
        impact: critical
        options:
          - {value: "negative", label: "Negative"}
          - {value: "positive", label: "Positive"}
        triggers:
          - "RF-HBV-COINFECTION → entecavir prophylaxis required"
        helper: >
          HBsAg positive without prophylaxis — rituximab is contraindicated. Engine
          activates CI-HBV-NO-PROPHYLAXIS contraindication.

      - field: "findings.anti_hbc_total"
        label: "Anti-HBc total"
        type: enum
        impact: required
        options:
          - {value: "negative", label: "Negative"}
          - {value: "positive", label: "Positive (occult / past infection)"}
        triggers:
          - "RF-HBV-COINFECTION (occult HBV)"
        helper: "Anti-HBc+ HBsAg- = occult HBV → monitoring + prophylaxis per NCCN."

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-MZL-2024
  - SRC-EASL-HCV-2023

last_reviewed: "2026-04-25"
reviewer_signoffs: 0

notes: >
  STUB — pending Clinical Co-Lead approval per CHARTER §6.1. Field
  paths must match what engine reads (plan.py:_findings_flatten flattens
  demographics + biomarkers + findings into one dict).
