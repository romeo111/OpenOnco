id: QUEST-MM-1L
disease_id: DIS-MM
line_of_therapy: 1
title: "Multiple Myeloma — newly diagnosed (1L)"

intro: >
  Questionnaire for newly-diagnosed multiple myeloma. The 1L algorithm
  distinguishes standard-risk (VRd triplet) vs high-risk cytogenetics
  (D-VRd quadruplet, if daratumumab is available). 8-10 minutes
  to complete.

fixed_fields:
  disease:
    icd_o_3_morphology: "9732/3"
  line_of_therapy: 1

groups:
  - title: "Demographics + transplant eligibility"
    description: "Age + fitness drive transplant-eligible vs ineligible track."
    questions:
      - field: patient_id
        label: "Patient ID (synthetic)"
        type: text
        impact: required
        default_value: "VIRTUAL-MM-001"

      - field: demographics.age
        label: "Age"
        type: integer
        impact: critical
        range_min: 18
        range_max: 110
        units: "years"
        triggers:
          - "filter:age_max=70 for transplant-eligible track (NCCN)"
        helper: >
          Age ≤70 + ECOG ≤2 without severe comorbidities = transplant-eligible.
          Engine will not propose autoSCT consolidation if age >75.

      - field: demographics.sex
        label: "Sex"
        type: enum
        impact: required
        options:
          - {value: "male", label: "Male"}
          - {value: "female", label: "Female"}
        triggers:
          - "ci:CI-LENALIDOMIDE-PREGNANCY if female + reproductive age"
        helper: >
          Women of reproductive age — negative beta-hCG required
          + two contraceptive methods before lenalidomide (REMS).

      - field: demographics.ecog
        label: "ECOG Performance Status"
        type: enum
        impact: critical
        options:
          - {value: 0, label: "0"}
          - {value: 1, label: "1"}
          - {value: 2, label: "2"}
          - {value: 3, label: "3"}
          - {value: 4, label: "4"}
        triggers:
          - "filter:ecog_max=2 for transplant-eligible"
        helper: "ECOG > 2 → transplant-ineligible track, doses are reduced."

      - field: demographics.fit_for_transplant
        label: "Candidate for autoSCT (transplant-eligible)?"
        type: boolean
        impact: critical
        triggers:
          - "select:induction → autoSCT consolidation (4-6 cycles VRd instead of continuous)"
        helper: >
          Hematologist's clinical judgment — NOT automatically derived from age.
          Takes into account comorbidities, cardiac/renal function, performance.

  - title: "Cytogenetic risk (defining for VRd vs D-VRd)"
    description: "FISH panel (minimum del17p / t(4;14) / t(14;16) / 1q gain) — driver of selection."
    questions:
      - field: "biomarkers.BIO-MM-CYTOGENETICS-HR"
        label: "MM cytogenetics composite — high-risk?"
        type: enum
        impact: critical
        options:
          - {value: "high_risk", label: "High-risk (≥1 of: del17p, t(4;14), t(14;16), gain 1q)"}
          - {value: "standard_risk", label: "Standard-risk"}
          - {value: "unknown", label: "Not performed / pending"}
        triggers:
          - "RF-MM-HIGH-RISK-CYTOGENETICS → IND-MM-1L-DVRD default"
        helper: >
          High-risk → engine selects D-VRd (quadruplet with daratumumab)
          as default instead of VRd. Standard-risk → VRd remains.

      - field: "findings.del_17p"
        label: "del(17p) by FISH"
        type: boolean
        impact: required
        triggers:
          - "RF-MM-HIGH-RISK-CYTOGENETICS"
        helper: "Worst single cytogenetic marker; ~10% NDMM."
        default_value: false

      - field: "findings.t_4_14"
        label: "t(4;14) (IgH-FGFR3)"
        type: boolean
        impact: required
        triggers:
          - "RF-MM-HIGH-RISK-CYTOGENETICS"
        helper: "~15% NDMM; bortezomib partially mitigates."
        default_value: false

      - field: "findings.t_14_16"
        label: "t(14;16) (IgH-MAF)"
        type: boolean
        impact: required
        triggers:
          - "RF-MM-HIGH-RISK-CYTOGENETICS"
        default_value: false

      - field: "findings.gain_1q"
        label: "Gain 1q (≥3 copies)"
        type: boolean
        impact: required
        triggers:
          - "RF-MM-HIGH-RISK-CYTOGENETICS"
        helper: "+1q = additional adverse marker."
        default_value: false

      - field: "findings.tp53_mutation"
        label: "TP53 mutation (NGS)"
        type: boolean
        impact: required
        triggers:
          - "RF-MM-HIGH-RISK-CYTOGENETICS (frequently co-occurs with del17p)"
        helper: "TP53 mutation with or without del17p — poor prognosis."
        default_value: false

  - title: "Renal function"
    description: "MM-induced renal failure is common and affects dosing."
    questions:
      - field: "findings.creatinine_clearance_ml_min"
        label: "Creatinine clearance (Cockcroft-Gault)"
        type: float
        impact: critical
        range_min: 5
        range_max: 200
        units: "mL/min"
        triggers:
          - "RF-MM-RENAL-DYSFUNCTION at <40 → dose modifications"
        helper: >
          CrCl <40 → bortezomib without adjustment, lenalidomide cuts to 10 mg.
          CrCl <30 → daratumumab in monitoring window.

      - field: "findings.serum_creatinine_mg_dl"
        label: "Serum creatinine (baseline)"
        type: float
        impact: required
        range_min: 0.3
        range_max: 15
        units: "mg/dL"
        triggers:
          - "RF-MM-RENAL-DYSFUNCTION at ≥2"
        default_value: 1.0

      - field: "findings.mm_renal_failure"
        label: "Active MM-induced renal failure?"
        type: boolean
        impact: required
        triggers:
          - "RF-MM-RENAL-DYSFUNCTION"
        helper: "Cast nephropathy or light-chain proximal tubulopathy — consider VTd as bridge."
        default_value: false

  - title: "Safety: pregnancy + neuropathy + HBV"
    description: "Contraindications that block specific drugs."
    questions:
      - field: demographics.pregnancy_status
        label: "Pregnancy / possibility of pregnancy"
        type: enum
        impact: critical
        options:
          - {value: "not_pregnant", label: "Not pregnant / not of reproductive age"}
          - {value: "reproductive_age_negative_test", label: "Reproductive age, test negative + contraception"}
          - {value: "pregnant", label: "Pregnant"}
        triggers:
          - "ci:CI-LENALIDOMIDE-PREGNANCY if pregnant"
        helper: >
          Pregnancy — absolute contraindication to lenalidomide. Engine blocks
          both VRd and D-VRd, falls back to bortezomib + dex (Vd).
        default_value: "not_pregnant"

      - field: "findings.severe_neuropathy_grade"
        label: "Pre-existing neuropathy (CTCAE grade)"
        type: enum
        impact: required
        options:
          - {value: 0, label: "0 — none"}
          - {value: 1, label: "1 — minimal, no functional impact"}
          - {value: 2, label: "2 — limits ADL"}
          - {value: 3, label: "3 — severe"}
          - {value: 4, label: "4 — disabling"}
        triggers:
          - "ci:CI-BORTEZOMIB-SEVERE-NEUROPATHY if ≥3"
        helper: >
          Grade ≥3 — bortezomib SC contraindicated. Engine falls back to
          carfilzomib-based induction (Kd, KCd, KRd).
        default_value: 0

      - field: "findings.hbsag"
        label: "HBsAg"
        type: enum
        impact: critical
        options:
          - {value: "negative", label: "Negative"}
          - {value: "positive", label: "Positive"}
        triggers:
          - "RF-HBV-COINFECTION (especially with D-VRd — anti-CD38 + dex highly immunosuppressive)"
        helper: >
          HBV reactivation risk on D-VRd is even higher than with rituximab. Engine
          requires entecavir prophylaxis.
        default_value: "negative"

  - title: "Bone disease + supportive care indicators"
    description: "Does not change the algorithm, but adds supportive care components."
    questions:
      - field: "findings.lytic_lesions_present"
        label: "Lytic bone lesions on CT/MRI/PET?"
        type: boolean
        impact: recommended
        triggers:
          - "SUP-MM-BONE-PROTECTION (zoledronate / denosumab)"
        helper: ">2 lytic lesions = bone-modifying agent obligatory ≥2 years."
        default_value: true

      - field: "findings.vte_history_or_high_risk"
        label: "History of thrombosis or high VTE risk?"
        type: boolean
        impact: recommended
        triggers:
          - "SUP-MM-VTE-PROPHYLAXIS (LMWH instead of aspirin)"
        helper: >
          Lenalidomide + dex baseline VTE risk ~10-20%. High-risk → LMWH
          instead of aspirin 81 mg.
        default_value: false

sources:
  - SRC-NCCN-MM-2025

last_reviewed: "2026-04-25"
reviewer_signoffs: 0

notes: >
  STUB — pending Clinical Co-Lead approval per CHARTER §6.1.
