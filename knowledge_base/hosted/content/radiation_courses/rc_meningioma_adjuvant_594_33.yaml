id: RC-MENINGIOMA-ADJUVANT-594-33
names:
  preferred: "Adjuvant fractionated radiotherapy for high-risk meningioma"
  ukrainian: "Adjuvant fractionated radiotherapy for high-risk meningioma"
  english: "Adjuvant fractionated radiotherapy for high-risk meningioma"
  synonyms:
    - "Postoperative RT for WHO grade II-III meningioma"
    - "Fractionated RT 59.4 Gy in 33 fractions"

total_dose_gy: 59.4
fractions: 33
fraction_size_gy: 1.8
target_volume: "Postoperative tumor bed plus residual disease / at-risk dura per radiation oncology contouring protocol"
schedule: "5 fractions/week x about 6.5 weeks"

intent: adjuvant

sources:
  - SRC-EANO-MENINGIOMA-2024
  - SRC-NCCN-CNS-2025

last_reviewed: "2026-05-11"
notes: >
  Representative adjuvant fractionated RT course for high-risk meningioma,
  especially WHO grade III, recurrent disease, or subtotal resection with
  high-risk histology. Dose and target volume must be individualized by
  radiation oncology.
