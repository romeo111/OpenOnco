id: RF-ACTIVE-AUTOIMMUNE-DISEASE-ICI-RISK
definition: >
  Patient with active or incompletely controlled pre-existing autoimmune
  or inflammatory disease (sarcoidosis, rheumatoid arthritis, IBD, SLE,
  autoimmune hepatitis, inflammatory myopathy, myasthenia gravis, or
  similar) is considered for immune checkpoint inhibitor (ICI) therapy —
  elevated risk of immune-related adverse events (irAE) flare or de-novo
  grade 3-4 irAE. Requires specialist (rheumatology / pulmonology /
  gastroenterology) pre-treatment review; prefer lower-irAE-burden
  backbone when options exist (pembrolizumab mono > ipilimumab+nivolumab).
definition_ua: >
  Пацієнт із активним або недостатньо контрольованим передіснуючим
  аутоімунним чи запальним захворюванням (саркоїдоз, ревматоїдний
  артрит, ЗЗК, ВКВ, аутоімунний гепатит, запальна міопатія, міастенія
  гравіс та ін.) розглядається для терапії інгібіторами
  імунних контрольних точок (ІКТ) — підвищений ризик загострення
  імуноопосередкованих небажаних явищ (irAE) або de-novo gr 3-4 irAE.
  Потребує консультації профільного спеціаліста (ревматологія /
  пульмонологія / гастроентерологія) перед початком лікування;
  перевага надається режимам з нижчим irAE-тягарем за наявності альтернатив
  (пембролізумаб моно > іпілімумаб+нівол умаб).

