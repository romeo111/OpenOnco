notes: >
  Pre-existing autoimmune disease is present in ~10-15% of patients
  eligible for ICI therapy; historically excluded from pivotal trials.
  Real-world data (Abdel-Wahab 2018, 3557 pts) shows 55% experienced
  irAE flare and ~29% required systemic immunosuppression beyond steroids.
  Risk stratification by SITC 2021:

  - **Low risk** (generally safe to proceed with monitoring): thyroiditis,
    vitiligo, stable psoriasis, type 1 diabetes — irAE flare mild, manageable.
  - **Moderate risk** (proceed with specialist input): RA, IBD (Crohn/UC),
    sarcoidosis, sicca syndrome, psoriatic arthritis — flare rate ~50%;
    baseline DMARDs often OK to continue (methotrexate, HCQ but NOT
    high-dose steroids or anti-TNF at start).
  - **High risk** (strongest caution; consider alternative if available):
    active autoimmune hepatitis, myasthenia gravis, inflammatory myopathy,
    neuromyelitis optica — flare can be life-threatening; benefit-risk
    discussion mandatory.

  Pulmonary sarcoidosis specifically: ICI-induced sarcoid-like reactions
  are well-documented (5-7% of patients on ICI), often mimicking disease
  progression on imaging. Active pulmonary sarcoidosis + ICI raises risk
  of severe pulmonary irAE (gr 3 pneumonitis). Pre-ICI chest CT baseline
  recommended; pulmonology consult mandatory if active disease.

  Algorithm action: no automatic track-switch (shifts_algorithm empty) —
  fires as MDT advisory requiring specialist review before ICI initiation.
  When combination ICI is the planned regimen, flag explicitly to consider
  pembrolizumab mono as lower-irAE alternative.

notes_ua: >
  Передіснуюче аутоімунне захворювання присутнє у ~10-15% пацієнтів,
  що відповідають критеріям для ІКТ-терапії; ця категорія історично
  виключалась із ключових РКД. Реальні дані (Abdel-Wahab 2018, 3557 пацієнтів)
  показують: 55% мали загострення irAE та ~29% потребували системної
  імуносупресії понад стероїди.

  Стратифікація ризику за SITC 2021:
  - **Низький ризик**: тиреоїдит, вітиліго, стабільний псоріаз, цукровий
    діабет 1-го типу — загострення irAE легке, кероване.
  - **Помірний ризик**: РА, ЗЗК (Crohn/UC), саркоїдоз, сіндром Шегрена,
    псоріатичний артрит — частота загострень ~50%.
  - **Високий ризик**: активний аутоімунний гепатит, міастенія гравіс,
    запальна міопатія — загострення може бути загрозливим для життя.

  Легеневий саркоїдоз: саркоїдоподібні реакції на ІКТ — 5-7% пацієнтів,
  часто імітують прогресування на КТ. Активний легеневий саркоїдоз + ІКТ
  підвищує ризик тяжкого пневмоніту (gr 3). Обов'язкова: базова КТ ОГК
  та консультація пульмонолога перед початком.

  Дія алгоритму: автоматичного переключення треку немає —
  RF спрацьовує як МДТ-рекомендація консультації спеціаліста перед ІКТ.
