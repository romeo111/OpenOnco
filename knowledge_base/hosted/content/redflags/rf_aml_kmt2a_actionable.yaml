notes: >
  Detection: karyotype + FISH break-apart probe at diagnosis; RT-PCR
  or RNA-NGS for fusion partner identification. Differentiation
  syndrome on revumenib (~16%) — monitor for fever, dyspnea, weight
  gain, effusions; treat with dexamethasone + hold revumenib until
  resolution. QTc prolongation requires baseline + serial ECG with
  K+/Mg++ correction. AlloHCT bridge for fit responders — revumenib
  alone NOT curative. Algorithm wiring deferred — IND-AML-2L-KMT2A-
  REVUMENIB created but not yet routed by ALGO-AML-2L (would require
  step-restructure, out of chunk scope). MDT review during chunk
  rollout. STUB — requires clinical co-lead signoff.
notes_ua: >
  Виявлення: каріотип + FISH break-apart probe при діагностиці; RT-PCR або RNA-NGS для ідентифікації партнера
  злиття. Синдром диференціації на ревуменібі (~16%) — моніторинг лихоманки, задишки, набору ваги, випотів;
  лікування дексаметазоном + пауза ревуменібу до розрішення. Подовження QTc — вихідна та серійні ЕКГ з
  корекцією K+/Mg++. АлоТГСК-місток для придатних респондерів — монотерапія ревуменібом НЕ є курабельною.
  Маршрутизація алгоритмом відкладена — IND-AML-2L-KMT2A (IND-AML-2L-KMT2A-REVUMENIB) створено, але ще
  не підключено до ALGO-AML-2L (потребує реструктуризації кроків, поза обсягом чанку). МДК-розгляд під
  час впровадження. СТАБ — потребує схвалення клінічного співкерівника.
