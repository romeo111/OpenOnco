id: RF-AML-KMT2A-ACTIONABLE
definition: >
  KMT2A rearrangement (MLL fusion at 11q23) in AML — ~5-10% prevalence
  in adult AML; ELN-2022 adverse-risk classifier. Revumenib (menin
  inhibitor; AUGMENT-101 phase 1/2) FDA-approved Nov 2024 for relapsed/
  refractory KMT2A-rearranged acute leukemia after ≥1 prior line
  (ORR ~63%, CR/CRh ~23%). Ziftomenib alternative menin inhibitor in
  late-phase trials. Common partners: AF9 (t(9;11)) and AF4 (t(4;11)).
definition_ua: >
  Перебудова KMT2A (фузія MLL у 11q23) при ГМЛ — ~5-10% поширеність
  у дорослій ГМЛ; класифікатор несприятливого ризику ELN-2022.
  Ревуменіб (інгібітор меніну; AUGMENT-101 фаза 1/2) FDA-схвалено
  листопад 2024 для рецидивуючої / рефрактерної KMT2A-перебудованої
  гострої лейкемії після ≥1 попередньої лінії (ORR ~63%, ПР/ПРн ~23%).
  Зіфтоменіб — альтернативний інгібітор меніну в пізніх фазах. Часті
  партнери: AF9 (t(9;11)) та AF4 (t(4;11)).

