id: RF-AML-TP53-ADVERSE
definition: >
  TP53-mutated AML — ELN-2022 adverse-risk classifier and WHO 5th-
  edition entity. ~10-15% of de-novo AML; enriched (~30-40%) in
  therapy-related and AML-MRC. Median OS 5-9 months on standard chemo
  or HMA-based therapy; alloHCT carries higher relapse risk vs TP53-WT
  AML but remains the only potentially curative pathway. Multi-hit
  (biallelic) predicts even worse outcome than mono-hit. Routes to:
  (1) alloHCT consideration when fit, (2) ven+aza backbone for unfit,
  (3) clinical-trial referral preferentially.
definition_ua: >
  TP53-мутована ГМЛ — класифікатор несприятливого ризику ELN-2022
  та сутність WHO 5-го видання. ~10-15% de-novo ГМЛ; збагачена
  (~30-40%) у терапія-пов'язаній ГМЛ та ГМЛ-MRC. Медіана ЗВ 5-9
  місяців на стандартній хімії або HMA-базованій терапії; алоТГСК
  має вищий ризик рецидиву vs TP53-WT ГМЛ, але залишається єдиним
  потенційно курабельним шляхом. Мульти-хіт (біалельна) предиктує
  ще гірший прогноз ніж моно-хіт. Маршрутизує на: (1) розгляд
  алоТГСК у придатних, (2) ven+aza бекбон для непридатних, (3)
  направлення на клінічне дослідження preferentially.

