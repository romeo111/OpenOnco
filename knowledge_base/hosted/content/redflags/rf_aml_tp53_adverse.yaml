draft: false

notes: >
  Detection: NGS myeloid panel at diagnosis (mandatory per ELN-2022)
  + FISH for del(17p13.1). VAF % critical — ≥10% threshold often used
  for adverse classification (lower-VAF subclonal TP53 may not drive
  prognosis). Multi-hit definition: biallelic TP53 by either two
  mutations, mutation + del(17p), or LOH on SNP array. Active research
  questions: ven+aza (CR ~40% but PFS short ~5 mo), magrolimab+aza
  (failed phase-3 ENHANCE), eprenetapopt+aza (mixed phase 2/3).
  Distinct from RF-MDS-TP53-MUTATION (MDS-specific) — AML-scoped
  routing is more aggressive (alloHCT priority). Algorithm wiring
  deferred — RF surfaces as adverse-risk annotation; ven+aza backbone
  + alloHCT bridge for fit per existing ALGO-AML-1L step routing.
  STUB — requires clinical co-lead signoff.
notes_ua: >
  Виявлення: NGS-мієлоїдна панель при діагностиці (обов'язкова за
  ELN-2022) + FISH для del(17p13.1). VAF % критично — ≥10% поріг
  часто використовується для класифікації несприятливого ризику
  (нижче-VAF субклональний TP53 може не керувати прогнозом).
  Визначення мульти-хіт: біалельна TP53 через дві мутації, мутація
  + del(17p), або LOH на SNP-масиві. Активні наукові питання: ven+aza
  (ПР ~40%, але БПВ коротка ~5 міс), magrolimab+aza (провалив
  фазу-3 ENHANCE), eprenetapopt+aza (змішані фаза 2/3).
  Відрізняється від RF-MDS-TP53-MUTATION (МДС-специфічний) —
  ГМЛ-обмежений маршрут більш агресивний (пріоритет алоТГСК).
  Маршрутизація алгоритмом відкладена — RF поверхне як
  несприятливо-ризикова анотація; ven+aza бекбон + алоТГСК-міст
  для придатних відповідно до існуючої маршрутизації кроків
  ALGO-AML-1L. STUB — потребує схвалення клінічного співкерівника.
