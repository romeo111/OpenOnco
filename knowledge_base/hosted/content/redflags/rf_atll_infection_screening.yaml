id: RF-ATLL-INFECTION-SCREENING
definition: "HTLV-1 confirmation by serology + PCR; Strongyloides screen mandatory (HTLV-1 endemic areas);
  HBV/HCV/HIV pre-treatment."
definition_ua: "HTLV-1 підтвердження серологією + PCR; Strongyloides скринінг обов'язковий (HTLV-1 ендемічні
  регіони); HBV/HCV/HIV перед терапією."

trigger:
  type: biomarker
  any_of:
  - finding: "htlv1_serology"
    value: "positive"
  - finding: "strongyloides_endemic_exposure"
    value: true


clinical_direction: investigate
severity: major
priority: 100
category: infection-screening

relevant_diseases: [DIS-ATLL]
shifts_algorithm: []

sources:
- SRC-NCCN-BCELL-2025
- SRC-ESMO-PTCL-2024

last_reviewed: "2026-04-25"
draft: false

notes: >
  HTLV-1 confirmation is part of diagnosis; Strongyloides hyperinfection mortality post-immunosuppression
  is high in endemic-area exposure.
notes_ua: >
  Підтвердження HTLV-1 є частиною діагнозу; летальність від гіперінфекційного синдрому Strongyloides після
  імуносупресії висока у пацієнтів з ендемічної зони.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_09
draft_revision: 2
