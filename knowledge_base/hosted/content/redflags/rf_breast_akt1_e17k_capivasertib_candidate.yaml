notes: >
  Pairs AKT1 E17K with prior-therapy class gate (post-endocrine ±
  CDK4/6i) — closer to actual CAPItello-291 enrollment criterion than
  the broader RF-BREAST-AKT1-E17K-ACTIONABLE (priority 65, fires on
  E17K alone). Priority 66 sits adjacent so engine resolution behavior
  is deterministic when both fire (same clinical_direction = intensify).
  Toxicity: diarrhea (~70%), rash (~35%), hyperglycemia (~16%) — class
  on-target effects; lower hyperglycemia rate vs alpelisib. Pre-treatment
  fasting glucose + HbA1c required; diabetes optimization plan.
  Concurrent PIK3CA + AKT1 + PTEN testing recommended at first AI ±
  CDK4/6i progression — any single alteration triggers pathway-targeted
  therapy. CAPItello-291 trial Source ingested (SRC-CAPITELLO291-TURNER-
  2023).
notes_ua: >
  Поєднує AKT1 E17K з gate класу попередньої терапії (post-endocrine ±
  CDK4/6i) — ближче до фактичного критерію включення CAPItello-291,
  ніж ширший RF-BREAST-AKT1-E17K-ACTIONABLE (пріоритет 65, спрацьовує
  лише на E17K). Пріоритет 66 розташований поруч, щоб поведінка
  вирішення двигуна була детермінованою при одночасному спрацьовуванні
  (однаковий clinical_direction = intensify). Токсичність: діарея
  (~70%), висип (~35%), гіперглікемія (~16%) — класові on-target
  ефекти; нижчий рівень гіперглікемії порівняно з алпелісибом.
  Необхідні передтерапевтична глюкоза натще + HbA1c; план оптимізації
  діабету. Рекомендоване одночасне тестування PIK3CA + AKT1 + PTEN при
  першому прогресуванні на AI ± CDK4/6i — будь-яка єдина альтерація
  активує таргетну терапію шляху. Джерело CAPItello-291 інгестоване
  (SRC-CAPITELLO291-TURNER-2023).
