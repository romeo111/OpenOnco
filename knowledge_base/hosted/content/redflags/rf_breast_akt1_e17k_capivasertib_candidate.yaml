id: RF-BREAST-AKT1-E17K-CAPIVASERTIB-CANDIDATE
definition: >
  AKT1 E17K activating hotspot specifically positioning capivasertib +
  fulvestrant in HR+/HER2- metastatic breast post-endocrine ± CDK4/6i.
  CAPItello-291 (Turner 2023) enrolled patients with PIK3CA / AKT1 /
  PTEN-altered tumors; AKT1 E17K accounted for ~7% of the altered
  cohort. Capivasertib + fulvestrant mPFS 7.3 vs 3.1 mo (HR 0.50,
  p<0.001) in the altered population. AKT1 E17K is the dominant (>90%)
  AKT1 hotspot. Candidate RF specifically anchors the E17K → capivasertib
  pairing distinct from the broader RF-BREAST-AKT1-E17K-ACTIONABLE.
definition_ua: >
  Активуючий hotspot AKT1 E17K, що специфічно позиціонує
  капівасертиб + фулвестрант при HR+/HER2- метастатичному РМЗ після
  ендокринотерапії ± CDK4/6i. CAPItello-291 (Turner 2023) включало
  пацієнтів із PIK3CA / AKT1 / PTEN-альтерованими пухлинами; AKT1
  E17K складало ~7% альтерованої когорти. Капівасертиб + фулвестрант
  мПФВ 7.3 проти 3.1 міс (HR 0.50, p<0.001) у альтерованій популяції.
  AKT1 E17K — домінуючий (>90%) hotspot AKT1. RF-кандидат специфічно
  фіксує парування E17K → капівасертиб, відмінне від ширшого
  RF-BREAST-AKT1-E17K-ACTIONABLE.

