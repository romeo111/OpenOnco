  - SRC-ESMO-BREAST-METASTATIC-2024
  - SRC-EMERALD-BIDARD-2022

last_reviewed: "2026-04-29"
draft: false

notes: >
  Hotspot-specific narrowing of RF-BREAST-ESR1-MUT-ACTIONABLE. Y537S +
  D538G together account for ~70% of LBD mutations and are the
  hotspots most consistently represented in EMERALD subgroup analyses.
  Test on ctDNA at progression on AI ± CDK4/6i — preferred specimen
  due to subclonal + polyclonal nature of ESR1 mutations in tissue.
  Priority 67 sits between the broad ESR1-MUT-ACTIONABLE (70) and the
  AKT/PIK3CA family (65) — the engine should fire both this hotspot
  RF and the broader ESR1 RF when applicable; conflict resolution
  defers to clinical_direction (both intensify, no conflict). When
  ESR1-WT post-AI: elacestrant did not show benefit; switch to
  fulvestrant + capivasertib / alpelisib if PIK3CA / AKT1 / PTEN
  altered. EMERALD trial Source ingested (SRC-EMERALD-BIDARD-2022).
notes_ua: >
  Hotspot-специфічне уточнення RF-BREAST-ESR1-MUT-ACTIONABLE. Y537S +
  D538G разом становлять ~70% LBD-мутацій і є hotspot, найбільш
  послідовно представленими в підгрупових аналізах EMERALD. Тестування
  на цоДНК при прогресуванні на AI ± CDK4/6i — переважний зразок через
  субклональну + поліклональну природу мутацій ESR1 у тканині.
  Пріоритет 67 — між широким ESR1-MUT-ACTIONABLE (70) та родиною
  AKT/PIK3CA (65) — двигун має активувати і цей hotspot RF, і ширший
  RF ESR1 при застосовності; розв'язання конфлікту покладається на
  clinical_direction (обидва intensify, конфлікту немає). При ESR1-WT
  після AI: елацестрант не показав виграшу; перехід на фулвестрант +
  капівасертиб / алпелісиб при альтерації PIK3CA / AKT1 / PTEN.
  Джерело EMERALD інгестоване (SRC-EMERALD-BIDARD-2022).
