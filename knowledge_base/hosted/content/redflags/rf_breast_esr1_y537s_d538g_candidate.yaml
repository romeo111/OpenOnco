id: RF-BREAST-ESR1-Y537S-D538G-CANDIDATE
definition: >
  ESR1 ligand-binding-domain hotspot Y537S or D538G — the two dominant
  hotspots (~70% of all ESR1-LBD mutations) acquired in HR+/HER2-
  metastatic breast progressing on aromatase inhibitor. EMERALD
  (Bidard 2022) randomized post-AI ± CDK4/6i HR+ MBC to elacestrant vs
  endocrine standard-of-care; PFS benefit was concentrated in the
  ESR1-mutant subgroup (mPFS 3.8 vs 1.9 mo, HR 0.55). Y537S is
  associated with more aggressive biology than D538G in some series.
  Candidate RF refines RF-BREAST-ESR1-MUT-ACTIONABLE for the
  predominant hotspots specifically targeted by elacestrant data.
definition_ua: >
  Hotspot ліганд-зв'язуючого домену ESR1 Y537S або D538G — два
  домінуючі hotspot (~70% усіх мутацій ESR1-LBD), набуті при HR+/HER2-
  метастатичному РМЗ під час прогресування на інгібіторі ароматази.
  EMERALD (Bidard 2022) рандомізував HR+ МРМЗ після AI ± CDK4/6i до
  елацестранту проти стандартної ендокринотерапії; виграш ПФВ
  концентрувався в ESR1-мутантній підгрупі (мПФВ 3.8 проти 1.9 міс,
  HR 0.55). Y537S асоційована з агресивнішою біологією, ніж D538G,
  у деяких серіях. RF-кандидат уточнює RF-BREAST-ESR1-MUT-ACTIONABLE
  для домінуючих hotspot, на які націлені дані елацестранту.

trigger:
  type: biomarker
  any_of:
    - finding: "esr1_y537s"
      value: true
    - finding: "esr1_d538g"
      value: true
    - finding: "esr1_hotspot"
      value: "Y537S"
    - finding: "esr1_hotspot"
      value: "D538G"
    - finding: "esr1_mutation"
      value: "Y537S"
    - finding: "esr1_mutation"
      value: "D538G"

clinical_direction: intensify

severity: major
priority: 60
category: high-risk-biology

relevant_diseases:
  - DIS-BREAST
shifts_algorithm:
  - ALGO-BREAST-HR-POS-2L

sources:
