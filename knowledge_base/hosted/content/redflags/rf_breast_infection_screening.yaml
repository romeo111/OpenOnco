id: RF-BREAST-INFECTION-SCREENING
definition: "HBV/HCV/HIV serology + dental evaluation pre-bisphosphonate/denosumab + DPYD genotyping for
  capecitabine-containing regimens (EU practice)."
definition_ua: "HBV/HCV/HIV серологія + стоматологічна оцінка перед бісфосфонатом/деносумабом + DPYD генотипування
  для капецитабінових режимів."

trigger:
  type: composite_clinical
  any_of:
  - finding: "hbsag"
    value: "positive"
  - finding: "dental_clearance_pending"
    value: true
  - finding: "dpyd_deficient"
    value: true

clinical_direction: investigate
severity: major
priority: 100
category: infection-screening

relevant_diseases: [DIS-BREAST]
shifts_algorithm: []

sources:
- SRC-NCCN-BREAST-2025
- SRC-ESMO-BREAST-EARLY-2024

last_reviewed:
draft: false

notes: >
  Cross-disease HBV reactivation handled by RF-UNIVERSAL-HBV-REACTIVATION-
  RISK. DPYD deficiency screening unique to fluoropyrimidine-containing
  regimens; severe / fatal toxicity in homozygous deficient patients —
  EU/EMA-recommended pre-test.
notes_ua: >
  Міжхворобна реактивація HBV обробляється через RF-UNIVERSAL-HBV-REACTIVATION (RF-UNIVERSAL-HBV-REACTIVATION-RISK).
  Скринінг дефіциту DPYD специфічний для схем з фторпіримідином; тяжка / летальна токсичність у гомозиготних
  дефіцитних пацієнтів — рекомендований EU/EMA попередній тест.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_09
draft_revision: 2
