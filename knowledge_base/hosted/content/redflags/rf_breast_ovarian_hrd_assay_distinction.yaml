id: RF-BREAST-OVARIAN-HRD-ASSAY-DISTINCTION
definition: >
  HRD assay platform mismatch in breast or ovarian cancer: HRD-positive
  call by Myriad myChoice CDx (composite Genomic Instability Score
  GIS = LOH + TAI + LST, threshold ≥42) is NOT interchangeable with
  HRD-positive by FoundationOne CDx HRD (LOH-high ≥16% genomic LOH +
  BRCA1/2 status, no TAI / LST). The two FDA-approved companion
  diagnostics use different scoring systems and have ~10-15%
  discordance in head-to-head series; clinical-trial regimen approvals
  are platform-locked: olaparib + bevacizumab maintenance in advanced
  ovarian (PAOLA-1, Ray-Coquard NEJM 2019) is FDA-indicated only on
  Myriad GIS-based HRD; niraparib monotherapy maintenance (PRIMA,
  González-Martín NEJM 2019) is also Myriad-validated. F1CDx HRD-high
  has no companion-diagnostic indication in ovarian PARPi maintenance
  — using F1CDx LOH-high to indicate olaparib + bev or niraparib is
  off-label / extrapolated. Action: when an HRD result is reported,
  identify the assay platform; if F1CDx is the only HRD source and
  ovarian PARPi-maintenance is being considered, recommend Myriad
  myChoice reflex (or BRCA1/2 germline+somatic confirmation as
  fall-back).
definition_ua: >
  Невідповідність платформи HRD-аналізу при раку молочної залози
  (РМЗ) або яєчників: HRD-позитивний результат за Myriad myChoice CDx
  (композитний Genomic Instability Score GIS = LOH + TAI + LST,
  поріг ≥42) НЕ взаємозамінний з HRD-позитивним за FoundationOne CDx
  HRD (LOH-high ≥16% геномної LOH + статус BRCA1/2, без TAI / LST).
  Два FDA-схвалених companion-діагностики використовують різні
  системи скорування, ~10-15% розбіжність у head-to-head серіях;
  схвалення режимів за дослідженнями платформо-зафіксовані:
  олапариб + бевацизумаб підтримка при поширеному раку яєчників
  (PAOLA-1, Ray-Coquard NEJM 2019) — FDA-індикований лише за Myriad
  GIS-валідованим HRD; ніпарариб монопідтримка (PRIMA, González-
  Martín NEJM 2019) — також Myriad-валідовано. F1CDx HRD-high не
  має companion-діагностичної індикації для PARPi-підтримки в
  яєчниках — використання F1CDx LOH-high для олапариб + bev або
  ніпарариб — off-label / екстрапольовано. Дія: при отриманні
  HRD-результату ідентифікувати платформу; якщо F1CDx — єдине
  джерело HRD, а PARPi-підтримка при раку яєчників розглядається,
  рекомендувати Myriad myChoice reflex (або BRCA1/2 germline+somatic
  підтвердження як fallback).

