notes: >
  **Why platform-locked matters clinically:**

  PARPi-maintenance ovarian regimen | HRD CDx in pivotal trial | FDA
  indication wording
  -----------------------------------------------------------------
  - olaparib + bev (PAOLA-1) | Myriad myChoice GIS ≥42 | "HRD-positive
    by an FDA-approved test" → in practice Myriad
  - niraparib mono (PRIMA) | Myriad myChoice GIS ≥42 | "regardless of
    HRD" but HRD-positive subgroup HR 0.43 vs HRD-neg HR 0.68
  - olaparib mono (SOLO-1) | gBRCA / sBRCA only | not HRD-score-based
  - rucaparib (ARIEL3) | LOH-high (Foundation Medicine LOH only) |
    EU only, US withdrawn 2022 — narrow precedent for F1CDx-LOH

  **Discordance mechanism:** Myriad GIS captures three independent
  genome-scarring footprints (LOH, telomeric allelic imbalance TAI,
  large-scale state transitions LST). F1CDx HRD aggregates only LOH
  + BRCA. A tumor with high TAI but moderate LOH may be Myriad-
  positive and F1CDx-negative; a tumor with widespread LOH from
  non-HRR causes (chromothripsis, CDK12-loss) may be F1CDx-positive
  but Myriad-negative on the composite cut-point. Empirical concordance
  ~85-90%; the disagreement zone is clinically consequential when
  PARPi-maintenance benefit is being decided.

  **Action when this RF fires:**
  1. Confirm HRD platform on the report (Myriad myChoice CDx vs F1CDx
     vs Caris vs lab-developed test).
  2. If F1CDx-only → Myriad myChoice reflex test on existing FFPE
     block (turnaround 2-3 weeks); if block insufficient, request
     re-biopsy or use BRCA1/2 germline + somatic + select-HRR-gene
     panel (RAD51C, RAD51D, PALB2 — limited PARPi evidence base) as
     proxy.
  3. If Myriad myChoice unavailable (resource-limited setting),
     document off-label rationale + cite the BRCA1/2-anchored
     subgroup HR (PAOLA-1 BRCA-mut HR 0.31 vs HRD non-BRCA HR 0.43
     vs HRD-neg HR 0.92).
  4. **Breast cancer caveat:** HRD assays are NOT FDA companion-
     diagnostic indicated in breast PARPi (talazoparib, olaparib are
     gBRCA-anchored only). Reporting "HRD-positive" in breast outside
     a trial is informational; do NOT use to indicate off-trial PARPi.

  **Negative space (when NOT to fire):**
  - HRD-negative result by either platform — different RF (HRR-
    proficient → less PARPi benefit, but olaparib + bev PAOLA-1 has
    BRCA-anchored benefit independent of HRD score).
  - BRCA1/2 mutation present (germline or somatic) — that is the
    primary actionable signal; HRD-platform discordance is moot when
    BRCA-mut is the indication anchor (PARPi indicated regardless of
    HRD score).

  **Cited limit:** PAOLA-1 / PRIMA pivotal trials used Myriad
  myChoice CDx exclusively; clinicians regularly report F1CDx HRD-
  positive without recognizing the off-label gap. RF is a corrective
  / disambiguation flag.
notes_ua: >
  **Чому платформо-зафіксованість має клінічне значення:**

  PARPi-підтримуючий режим у яєчниках / HRD CDx у pivotal-дослідженні / FDA-статус:
  - олапариб + bev (PAOLA-1) / Myriad myChoice GIS ≥42 / «HRD-позитивний за FDA-затвердженим тестом» —
    на практиці Myriad
  - ніпарариб моно (PRIMA) / Myriad myChoice GIS ≥42 / незалежно від HRD, але HRD-позитивна підгрупа
    HR 0.43 проти HRD-neg HR 0.68
  - олапариб моно (SOLO-1) / gBRCA / sBRCA only / не на основі HRD-скору
  - рукапариб (ARIEL3) / LOH-high (Foundation Medicine LOH only) / лише ЄС; США відкликало 2022

  **Механізм розбіжності:** Myriad GIS захоплює три незалежні footprint геномного скарування (LOH, TAI,
  LST). F1CDx HRD агрегує лише LOH + BRCA. Емпірична конкордантність ~85-90%; зона незгоди клінічно значуща
  при вирішенні питання PARPi-підтримки.

  **Дія при спрацюванні RF:** Підтвердити HRD-платформу в звіті — Myriad myChoice CDx, F1CDx, Caris або
  лабораторно-розроблений тест. Якщо лише F1CDx → Myriad myChoice reflex-тест (turnaround 2-3 тижні). Якщо
  Myriad myChoice недоступний, задокументувати off-label обґрунтування.

  **Засторога РМЗ:** HRD-аналізи НЕ є FDA companion-діагностично індикованими при PARPi РМЗ — лише
  gBRCA-якірні. Повідомлення «HRD-позитивний» у РМЗ поза дослідженням — інформаційно; НЕ використовувати
  для індикації off-trial PARPi.


  **Засторога РМЗ:** HRD-аналізи НЕ є FDA companion-діагностично індикованими при PARPi РМЗ — лише gBRCA-якірні.
