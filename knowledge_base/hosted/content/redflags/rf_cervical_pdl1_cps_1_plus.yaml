id: RF-CERVICAL-PDL1-CPS-1-PLUS
definition: >
  Persistent, recurrent, or metastatic cervical cancer with PD-L1 CPS ≥1
  by 22C3 IHC. KEYNOTE-826 (Colombo NEJM 2021; final OS 2023) established
  pembrolizumab + chemotherapy ± bevacizumab as 1L over chemo ± bev
  alone for CPS ≥1 (mOS 28.6 vs 16.5 mo at CPS ≥1, HR 0.64). FDA + EMA
  approved pembrolizumab + paclitaxel + cisplatin or carboplatin
  ± bevacizumab for CPS ≥1 cervical cancer 1L. KEYNOTE-A18 (Lorusso
  Lancet 2024) extends pembrolizumab to high-risk locally advanced
  cervical cancer + chemoradiation regardless of PD-L1.
definition_ua: >
  Стійкий, рецидивний або метастатичний рак шийки матки з PD-L1 CPS ≥1
  за 22C3 IHC. KEYNOTE-826 (Colombo NEJM 2021; фінальний OS 2023)
  встановило пембролізумаб + хіміо ± бевацизумаб 1L над хіміо ± бев
  у монорежимі при CPS ≥1 (мОВ 28.6 проти 16.5 міс при CPS ≥1, HR 0.64).
  FDA + EMA схвалили пембролізумаб + паклітаксел + цисплатин або
  карбоплатин ± бевацизумаб для CPS ≥1 цервікального раку 1L.
  KEYNOTE-A18 (Lorusso Lancet 2024) розширив пембролізумаб на
  high-risk локально-поширений цервікальний + ХПТ незалежно від PD-L1.

