notes: >
  CPS ≥1 captures ~85% of cervical cancers (vs HNSCC where the cutoff
  is more discriminative). Cemiplimab (EMPOWER-Cervical-1, Tewari NEJM
  2022) — second-line ICI option for platinum-pretreated, also CPS-
  agnostic in approval but with greater benefit at higher PD-L1.
  Tisotumab vedotin (innovaTV-204, FDA 2021) — ADC for 2L+ R/R cervical
  regardless of PD-L1, mDOR ~8 mo. KEYNOTE-A18 extends ICI to LOCALLY
  ADVANCED disease (FIGO IIIB-IVA): pembro + cisplatin-RT (concurrent)
  improved PFS, regulatory approval pending in many jurisdictions.
  Detection: 22C3 IHC; reported as CPS, NOT TPS (cervical PD-L1 lives
  in tumor + immune cells, CPS captures both). Pseudoprogression and
  hyperprogression rates similar to other ICI tumors. Access UA:
  pembrolizumab NSZU-listed for cervical CPS ≥1 (2025) — major access
  improvement.
notes_ua: >
  CPS ≥1 охоплює ~85% цервікального раку (на відміну від HNSCC, де
  cutoff більш дискримінативний). Цеміпліма (EMPOWER-Cervical-1, Tewari
  NEJM 2022) — 2L ICI опція для platinum-pretreated, теж CPS-агностично
  у схваленні, але з більшою вигодою при вищому PD-L1. Тісотумаб ведотин
  (innovaTV-204, FDA 2021) — ADC для 2L+ р/р цервікал незалежно від
  PD-L1, мDOR ~8 міс. KEYNOTE-A18 розширює ICI на ЛОКАЛЬНО ПОШИРЕНУ
  хворобу (FIGO IIIB-IVA): пембро + цисплатин-ПТ (concurrent) покращив
  ПФВ, регуляторне схвалення триває у багатьох юрисдикціях. Виявлення:
  22C3 IHC; CPS, НЕ TPS (цервікальний PD-L1 — у tumor + immune клітинах,
  CPS охоплює обидва). Псевдопрогресія + гіперпрогресія — як в інших
  ICI пухлинах. Доступ в Україні: пембролізумаб у НСЗУ-списку для
  цервікального CPS ≥1 (2025) — значне покращення доступу.

