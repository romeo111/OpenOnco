id: RF-CHOLANGIO-FGFR2-FUSION-ACTIONABLE
definition: >
  FGFR2 fusion or rearrangement in advanced/metastatic intrahepatic
  cholangiocarcinoma (~10–20% of iCCA; rare in extrahepatic / gallbladder).
  Treatment-defining for 2L+: pemigatinib (FIGHT-202 ORR 35.5%, mPFS
  6.9 mo, mOS 21.1 mo; FDA Apr 2020) preferred when FGFR2 fusion
  confirmed; futibatinib (FOENIX-CCA2) covalent FGFR-TKI alternative,
  including some pemigatinib-resistance variants. Common partners:
  BICC1-FGFR2, FGFR2-AHCYL1, FGFR2-CCDC6.
definition_ua: >
  Фузія / перебудова FGFR2 у поширеній / метастатичній
  інтрагепатальній холангіокарциномі (~10–20% iCCA; рідко в позапечінкових
  / жовчного міхура). Лікування-визначальний маркер для 2L+:
  пеміґатиніб (FIGHT-202 ORR 35.5%, мПФВ 6.9 міс, мЗВ 21.1 міс;
  FDA квітень 2020) переважно при підтвердженій фузії FGFR2;
  футибатиніб (FOENIX-CCA2) — ковалентний FGFR-TKI як альтернатива,
  у т. ч. при деяких варіантах резистентності до пеміґатинібу.
  Поширені партнери: BICC1-FGFR2, FGFR2-AHCYL1, FGFR2-CCDC6.

trigger:
  type: biomarker
  any_of:
  - finding: "fgfr2_fusion"
    value: true
  - finding: "fgfr2_rearrangement"
    value: "positive"
  - finding: "fgfr2_status"
    value: "fusion_positive"

clinical_direction: intensify

severity: critical
priority: 60
category: high-risk-biology

