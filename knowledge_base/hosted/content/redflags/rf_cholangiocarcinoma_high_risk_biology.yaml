id: RF-CHOLANGIOCARCINOMA-HIGH-RISK-BIOLOGY
definition: "Actionable molecular alteration in cholangiocarcinoma — FGFR2 fusion / rearrangement, IDH1
  R132 mutation, BRAF V600E, HER2 amplification, NTRK fusion, MSI-high / dMMR, or BRCA1/2 mutation — opens
  a targeted-therapy line distinct from gem-cis-durvalumab and is decisive at progression."
definition_ua: "Дієвоспроможна молекулярна аберація при холангіокарциномі — FGFR2-фузія/перебудова, мутація
  IDH1 R132, BRAF V600E, HER2-ампліфікація, NTRK-фузія, MSI-H/dMMR або мутація BRCA1/2 — відкриває таргетну
  лінію, відмінну від gem-cis-durvalumab, і визначальна при прогресії."

trigger:
  type: biomarker
  any_of:
  - finding: "BIO-FGFR2-FUSION"
    value: "positive"
  - finding: "BIO-IDH1-MUTATION"
    value: "positive"
  - finding: "BIO-BRAF-V600E"
    value: "positive"
  - finding: "BIO-HER2-SOLID"
    value: "positive"
  - finding: "BIO-NTRK-FUSION"
    value: "positive"
  - finding: "BIO-MSI"
    value: "high"
  - finding: "BIO-BRCA-GERMLINE"
    value: "positive"

