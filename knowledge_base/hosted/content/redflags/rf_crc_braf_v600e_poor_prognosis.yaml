id: RF-CRC-BRAF-V600E-POOR-PROGNOSIS
definition: >
  BRAF V600E mutation in mCRC: ~8-10% prevalence, poor prognosis
  (median OS halved vs BRAF-WT on standard chemo). Cetuximab/panitumumab
  ineffective. Encorafenib + cetuximab (BEACON CRC) is preferred 2L+;
  some 1L data favor FOLFOXIRI + bev intensification in MSS BRAF-mutant.
definition_ua: >
  Мутація BRAF V600E при метастатичному КРР: ~8-10%, поганий прогноз
  (мОС вдвічі нижче). Цетуксимаб/панітумумаб неефективні. Енкорафеніб +
  цетуксимаб (BEACON) — preferred 2L+; FOLFOXIRI + bev у 1L MSS.

trigger:
  type: biomarker
  any_of:
  - finding: "braf_v600e_mutation"
    value: true

clinical_direction: intensify

severity: major
priority: 80
category: high-risk-biology

relevant_diseases:
- DIS-CRC
shifts_algorithm: []
branch_targets: {}

sources:
- SRC-NCCN-COLON-2025
- SRC-ESMO-COLON-2024

last_reviewed: "2026-04-26"
draft: false

notes: >
  ~30% of BRAF-mutant CRC are MSI-H — RF-CRC-MSI-H-ACTIONABILITY takes
  precedence (immunotherapy-track outranks chemo-intensification).
  In MSS BRAF-V600E mutants (the harder subgroup), TRIBE-2 / FOLFOXIRI+bev
  has ORR 56% but inferior to immunotherapy combinations under study.
notes_ua: >
  BRAF V600E при КРР є незалежно несприятливим прогностичним маркером (медіана ЗВ ~16 проти ~32 міс).
  BRAF-мутантний КРР є MSI-H у ~20-30%; MSI-H BRAF V600E парадоксально кращий прогноз через ICI-чутливість
  (перекриття з RF-CRC-MSI-H-ACTIONABILITY). Енкорафеніб+цетуксимаб (BEACON; ORR ~26%, ЗВ ~9 міс) — стандарт
  2L при BRAF V600E мМСС. Загальна частота відповіді на комбінацію encorafenib+binimetinib+cetuximab ~56%
  у підгрупі BEACON triple. Бевацизумаб + FOLFIRI/FOLFOX ORR невисокий при BRAF V600E. СТАБ — потребує
  підпису клінічного співкерівника.
