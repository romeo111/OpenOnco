id: RF-CRC-FRAILTY-AGE
definition: >
  Frailty/age profile precluding doublet-intensive or triplet chemo:
  ECOG ≥3, OR (age ≥80 + Charlson ≥3), OR composite (age ≥75 + albumin
  <3.0 + ≥2 comorbidities). Triggers de-escalation toward 5-FU/LV mono,
  capecitabine mono, or best supportive care.
definition_ua: >
  Профіль frailty при КРР: ECOG ≥3 АБО (≥80 + Charlson ≥3) АБО (≥75 +
  альбумін <3.0 + ≥2 коморбідностей). De-escalation до 5-FU/LV mono,
  капецитабіну, або BSC.

trigger:
  type: composite_score
  any_of:
  - finding: "ecog"
    threshold: 3
    comparator: ">="
  - all_of:
    - finding: "age"
      threshold: 80
      comparator: ">="
    - finding: "charlson_score"
      threshold: 3
      comparator: ">="
  - all_of:
    - finding: "age"
      threshold: 75
      comparator: ">="
    - finding: "albumin_g_dl"
      threshold: 3.0
      comparator: "<"
    - finding: "comorbidity_count"
      threshold: 2
      comparator: ">="

clinical_direction: de-escalate

severity: major
priority: 100
category: frailty-age

relevant_diseases:
- DIS-CRC
shifts_algorithm: []
branch_targets: {}

sources:
- SRC-NCCN-COLON-2025
- SRC-ESMO-COLON-2024

last_reviewed: "2026-04-26"
draft: false

notes: >
  IDEA pooled analysis: 3 mo CAPOX adjuvant non-inferior to 6 mo for
  low-risk (T1-3 N1) stage III — explicitly designed for elderly /
  fragile. FOCUS-2 trial: capecitabine ± oxaliplatin in elderly mCRC
  showed acceptable efficacy with reduced toxicity. BSC alone if PS 4
  or organ failure precludes any chemo.
notes_ua: >
  FOLFOX/FOLFIRI скорочені схеми (зменшені оксаліплатин/іринотекан або видалені) або капецитабін-моно
  (XELOX-зменшений) при PS ≥2. Бевацизумаб підвищує ризик кровотечі/тромбозу у пацієнтів з ССЗ — показаний
  з обережністю. Тільки BSC при PS ≥3 або органній недостатності, що виключає будь-яку хіміо. СТАБ — потребує
  підпису клінічного співкерівника.
ukrainian_review_status: pending_clinical_signoff
