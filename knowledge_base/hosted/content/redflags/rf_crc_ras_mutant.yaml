id: RF-CRC-RAS-MUTANT
definition: >
  Metastatic colorectal cancer with KRAS or NRAS hotspot mutation (KRAS
  exon 2 codons 12/13 — most common ~40% of mCRC, exon 3 codons 59/61,
  exon 4 codons 117/146; NRAS exon 2/3/4 ~5%). RAS-mutant mCRC is
  REFRACTORY to anti-EGFR monoclonal antibodies (cetuximab, panitumumab) —
  PRIME post-hoc analysis (Douillard JCO 2013) showed OS detriment with
  panitumumab + FOLFOX in RAS-mutant patients (mOS 15.5 vs 19.3 mo).
  Routes 1L mCRC to bevacizumab + FOLFOX/FOLFIRI/FOLFOXIRI; KRAS-G12C
  subset (~3% of mCRC) eligible for sotorasib + panitumumab 2L+
  (CodeBreaK-300, Fakih NEJM 2023). MSI-H or BRAF-V600E status takes
  priority over RAS for routing.
definition_ua: >
  Метастатичний КРР з KRAS або NRAS hotspot мутацією (KRAS exon 2 кодони
  12/13 — найпоширеніше ~40% mCRC, exon 3 кодони 59/61, exon 4 кодони
  117/146; NRAS exon 2/3/4 ~5%). RAS-мутантний mCRC — РЕФРАКТЕРНИЙ до
  anti-EGFR МКА (цетуксимаб, панітумумаб) — PRIME post-hoc аналіз
  (Douillard JCO 2013) показав OS-detriment панітумумаб + FOLFOX у
  RAS-мутантних (мОВ 15.5 проти 19.3 міс). Маршрутизує 1L mCRC на
  бевацизумаб + FOLFOX/FOLFIRI/FOLFOXIRI; KRAS-G12C підгрупа (~3% mCRC) —
  придатна до соторасиб + панітумумаб 2L+ (CodeBreaK-300, Fakih NEJM 2023).
  MSI-H або BRAF-V600E статус має пріоритет над RAS для routing.

trigger:
  type: biomarker
  any_of:
    - finding: "kras_mutation"
      value: true
    - finding: "kras_status"
      value: "mutated"
    - finding: "nras_mutation"
      value: true
    - finding: "nras_status"
      value: "mutated"
    - finding: "ras_status"
      value: "mutated"
    - finding: "extended_ras_status"
      value: "mutated"
    - finding: "BIO-RAS-MUTATION"
      value: "positive"

clinical_direction: de-escalate

severity: major
priority: 60
category: high-risk-biology

relevant_diseases:
  - DIS-CRC
shifts_algorithm:
  - ALGO-CRC-METASTATIC-1L
  - ALGO-CRC-METASTATIC-2L

sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  De-escalate direction reflects "anti-EGFR is REMOVED from the option
  set" — chemo backbone (FOLFOX/FOLFIRI/FOLFOXIRI) + bevacizumab is the
  routing target. MSI-H + RAS-mut combination (~3% of mCRC) — pembrolizumab
  still preferred 1L (RF-CRC-MSI-H-ACTIONABILITY priority 50). BRAF V600E
  + RAS-mut is essentially exclusive (mutual exclusivity ~99%) but if
  both present, BRAF routing (encorafenib + cetuximab BEACON) takes
  precedence. KRAS-G12C subset: sotorasib + panitumumab (CodeBreaK-300)
  2L mPFS 5.6 vs 2.0 mo, FDA-approved 2024 — counterintuitive that
  panitumumab adds benefit despite KRAS-mut, mechanism is suppression
  of adaptive EGFR feedback when KRAS is locked by sotorasib. Adagrasib +
  cetuximab (KRYSTAL-1, Yaeger NEJM 2023) — similar rationale, FDA-
  approved 2L+. KRAS-G12D and KRAS-G12V subsets: investigational
  (MRTX1133, RMC-9805). Detection: NGS panel covers extended-RAS in one
  test; reflex testing at diagnosis of mCRC mandatory before any
  anti-EGFR consideration. Liquid-biopsy at progression for clonal
  evolution if anti-EGFR rechallenge considered (CHRONOS pathway).
notes_ua: >
  Напрямок "de-escalate" відображає "anti-EGFR ВИДАЛЕНО з опційного
  набору" — хіміо backbone (FOLFOX/FOLFIRI/FOLFOXIRI) + бевацизумаб —
  ціль routing. MSI-H + RAS-mut комбінація (~3% mCRC) — пембролізумаб
  усе ще переважно 1L (RF-CRC-MSI-H-ACTIONABILITY priority 50). BRAF
  V600E + RAS-mut по суті взаємовиключні (mutual exclusivity ~99%) але
  якщо обидві присутні, BRAF routing (енкорафеніб + цетуксимаб BEACON)
  має пріоритет. KRAS-G12C підгрупа: соторасиб + панітумумаб (CodeBreaK-300)
  2L мПФВ 5.6 vs 2.0 міс, FDA-схвалено 2024 — контр-інтуїтивно, що
  панітумумаб додає вигоду попри KRAS-mut, механізм — пригнічення
  adaptive EGFR feedback коли KRAS заблокований соторасибом.
  Адаграсиб + цетуксимаб (KRYSTAL-1, Yaeger NEJM 2023) — аналогічна
  логіка, FDA-схвалено 2L+. KRAS-G12D і KRAS-G12V — investigational
  (MRTX1133, RMC-9805). Виявлення: NGS-панель охоплює extended-RAS в
  одному тесті; reflex-тестування при діагнозі mCRC обов'язкове до
  будь-якого розгляду anti-EGFR. Liquid-biopsy при прогресії для
  clonal evolution якщо розглядається anti-EGFR rechallenge
  (CHRONOS pathway).
