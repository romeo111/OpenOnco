id: RF-DLBCL-CD20-POS-GLOFITAMAB-CANDIDATE
definition: >
  Relapsed/refractory DLBCL with confirmed CD20 expression on
  malignant B-cells, post ≥2 prior systemic therapies including
  one anti-CD20 antibody-containing regimen (R-CHOP), CAR-T-ineligible
  or post-CAR-T failure — candidate for glofitamab (CD20xCD3 2:1
  bispecific T-cell engager; intravenous; fixed 12-cycle duration).
  Pivotal data NP30179 phase 1/2 (Dickinson 2022 NEJM): ORR 52%,
  CR 39%, mPFS 4.9 mo, mDOR 18.4 mo in 3L+ R/R DLBCL after fixed
  treatment course. Differentiator vs epcoritamab: fixed-duration
  (12 cycles ≈ 8.3 mo) vs continuous; IV vs SC; obinutuzumab
  pre-treatment 7 days before C1D1 reduces CRS. Off-the-shelf
  alternative to CAR-T. Often considered after epcoritamab failure
  in BiTE-sequencing strategies, though direct comparative data
  are lacking.
definition_ua: >
  Рецидивна/рефрактерна DLBCL з підтвердженою експресією CD20 на
  злоякісних B-клітинах, після ≥2 попередніх системних терапій,
  включно з одним анти-CD20-антитіло-вмісним режимом (R-CHOP),
  CAR-T-ineligible або post-CAR-T невдача — кандидат для
  глофітамабу (CD20xCD3 2:1 біспецифічний T-cell engager; в/в;
  фіксована тривалість 12 циклів). Базові дані NP30179 фаза 1/2
  (Dickinson 2022 NEJM): ORR 52%, ПР 39%, мПФВ 4.9 міс, мТВ 18.4 міс
  при 3L+ R/R DLBCL після фіксованого курсу лікування. Відмінність
  від епкоритамабу: фіксована тривалість (12 циклів ≈ 8.3 міс) vs
  continuous; в/в vs п/ш; обінутузумаб pre-treatment за 7 днів до
  C1D1 зменшує CRS. Off-the-shelf альтернатива CAR-T. Часто
  розглядається після невдачі епкоритамабу у BiTE-послідовності,
  хоча прямих порівняльних даних немає.

trigger:
  type: composite_score
  all_of:
    - any_of:
        - finding: "cd20_status"
          value: "positive"
        - finding: "cd20_ihc"
          value: "positive"
        - finding: "cd20_expression"
          value: "preserved"
    - any_of:
        - finding: "prior_lines_count"
          threshold: 2
          comparator: ">="
        - finding: "post_cart_failure"
          value: true
        - finding: "post_epcoritamab_failure"
          value: true
        - finding: "primary_refractory"
          value: true
    - any_of:
        - finding: "cart_ineligible"
          value: true
        - finding: "cart_ineligibility_reason"
        - red_flag: RF-DLBCL-CART-INELIGIBLE-POST-2L
        - red_flag: RF-CAR-T-INELIGIBLE-AGE-COMORBID
        - red_flag: RF-CAR-T-INELIGIBLE-ORGAN
        - finding: "post_cart_relapse"
          value: true

clinical_direction: intensify

severity: major
priority: 60
category: high-risk-biology

relevant_diseases:
  - DIS-DLBCL-NOS
shifts_algorithm: []  # orphan cleared — algorithm(s) not yet wired to reference this RF

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024

last_reviewed: "2026-04-29"
draft: false

notes: >
  Pivotal trial Source SRC-NP30179-DICKINSON-2022 not yet ingested —
  flagged in commit body for follow-up source-stub chunk; efficacy
  figures cited inline reflect Dickinson et al. NEJM 2022
  387(24):2220-2231 (DOI 10.1056/NEJMoa2206913). Schedule: obinutuzumab
  1000 mg IV pre-treatment day -7; step-up C1D8 2.5 mg, C1D15 10 mg,
  C2D1 30 mg, then 30 mg q3w cycles 2-12 (fixed 12 cycles total).
  CRS ~63% any grade / 4% G3+ (concentrated cycle 1); ICANS ~8% /
  ~3% G3+. Tocilizumab + corticosteroid for CRS. Sequencing:
  glofitamab activity post-CAR-T preserved; post-BiTE (epcoritamab)
  data emerging. Fixed-duration is operationally simpler than
  continuous SC dosing for low-resource settings. NOT to be used
  in CD20-negative escape variants — re-biopsy if late-relapse.
  STUB — requires clinical co-lead signoff.
notes_ua: >
  Базове джерело SRC-NP30179-DICKINSON-2022 ще не внесене —
  позначено в commit body для подальшого source-stub чанку;
  цифри ефективності inline відображають Dickinson et al. NEJM 2022
  387(24):2220-2231 (DOI 10.1056/NEJMoa2206913). Схема: обінутузумаб
  1000 мг в/в pre-treatment день -7; step-up C1D8 2.5 мг, C1D15 10 мг,
  C2D1 30 мг, далі 30 мг кожні 3 тижні цикли 2-12 (фіксовано 12 циклів).
  CRS ~63% будь-якого ступеня / 4% G3+ (концентрація в циклі 1);
  ICANS ~8% / ~3% G3+. Тоцилізумаб + кортикостероїди при CRS.
  Послідовність: активність глофітамабу після CAR-T збережена;
  дані після BiTE (епкоритамаб) накопичуються. Фіксована тривалість
  операційно простіша за continuous п/ш дозування для low-resource
  settings. НЕ застосовувати при CD20-негативних escape-варіантах —
  ре-біопсія при пізньому рецидиві.
  STUB — потребує схвалення клінічного співкерівника.
