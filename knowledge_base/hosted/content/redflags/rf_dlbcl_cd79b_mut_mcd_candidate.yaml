notes: >
  Informational RF — surfaces LymphGen MCD subtype for MDT
  discussion + prospective clinical-trial eligibility (e.g.,
  ESCALADE, ongoing acalabrutinib + R-CHOP trials in non-GCB).
  Detection: targeted NGS panel (≥20 genes recommended) covering
  CD79B (exon 5, Y196), MYD88 (L265P), and ABC-subtype defining
  loci. Clinical correlates: extranodal disease (testicular DLBCL
  ~75% MCD; primary CNS lymphoma ~70% MCD-like), CNS-IPI score
  high. CNS-prophylaxis decision is informed by MCD signature
  + extranodal sites — independent of CD79B per se. Active
  research: BTKi addition to R-CHOP (PHOENIX, ESCALADE),
  ibrutinib monotherapy R/R MCD (Wilson Nat Med 2015 ABC
  subtype ORR 37%). NOT to be used to redirect 1L therapy
  outside clinical trial — RF is shifts_algorithm: [] by design.
  STUB — requires clinical co-lead signoff.
notes_ua: >
  Інформативний RF — виявляє LymphGen MCD-підтип для МДК-
  обговорення + проспективної клінічно-дослідної eligibility
  (наприклад, ESCALADE, поточні випробування акалабрутинібу
  + R-CHOP при non-GCB). Виявлення: таргетна NGS-панель (≥20
  генів рекомендовано), що охоплює CD79B (екзон 5, Y196),
  MYD88 (L265P) та ABC-підтипо-визначальні локуси. Клінічні
  кореляти: екстранодальна хвороба (тестикулярна DLBCL
  ~75% MCD; первинна ЦНС-лімфома ~70% MCD-like), CNS-IPI
  high. Рішення про ЦНС-профілактику визначається MCD-
  сигнатурою + екстранодальні ділянки — незалежно від CD79B
  per se. Активні дослідження: додавання BTKi до R-CHOP
  (PHOENIX, ESCALADE), ібрутиніб монотерапія R/R MCD
  (Wilson Nat Med 2015 ABC-підтип ORR 37%). НЕ використовувати
  для перенаправлення 1L терапії поза клінічним випробуванням —
  RF має shifts_algorithm: [] свідомо.
  STUB — потребує схвалення клінічного співкерівника.
