id: RF-DLBCL-CD79B-MUT-MCD-CANDIDATE
definition: >
  CD79B mutation (most commonly Y196 hotspot in ITAM domain) in
  DLBCL, often co-occurring with MYD88 L265P — informational
  flag for LymphGen MCD subtype (Schmitz NEJM 2018; Wright Cancer
  Cell 2020). MCD-like DLBCL: ABC subtype + chronic active
  BCR signaling, frequent extranodal involvement (CNS, testis,
  breast, skin), inferior outcome on standard R-CHOP. Targeted
  therapy implications: BTK inhibitor (ibrutinib) hypothesis-
  generated benefit (PHOENIX subgroup analysis Younes 2019 JCO
  in age <60 + non-GCB), polatuzumab vedotin (POLARIX subgroup
  analysis suggests preferential MCD benefit). NOT yet
  algorithm-shifting in routine NCCN/ESMO 2025 — RF acts as
  surveillance / MDT-discussion / clinical-trial-eligibility
  signal pending prospective LymphGen-stratified data. Distinct
  from RF-DLBCL-HIGH-RISK-BIOLOGY (broader composite).
definition_ua: >
  Мутація CD79B (найчастіше hotspot Y196 у ITAM-домені) при DLBCL,
  часто ко-присутня з MYD88 L265P — інформативний флаг для
  LymphGen MCD-підтипу (Schmitz NEJM 2018; Wright Cancer Cell
  2020). MCD-like DLBCL: ABC-підтип + хронічно активна BCR-
  сигналізація, часте екстранодальне залучення (ЦНС, яєчко,
  молочна залоза, шкіра), гірший прогноз на стандартному R-CHOP.
  Імплікації таргетної терапії: інгібітор BTK (ібрутиніб)
  гіпотезо-генеруюча користь (PHOENIX subgroup analysis Younes
  2019 JCO у віці <60 + non-GCB), полатузумаб ведотин (POLARIX
  subgroup analysis свідчить про preferential MCD-користь).
  Поки не алгоритм-зсувний у рутинних NCCN/ESMO 2025 — RF діє
  як сигнал для нагляду / МДК-обговорення / клінічно-дослідної
  eligibility, очікуючи проспективних LymphGen-стратифікованих
  даних. Відрізняти від RF-DLBCL-HIGH-RISK-BIOLOGY (ширший
  композит).

