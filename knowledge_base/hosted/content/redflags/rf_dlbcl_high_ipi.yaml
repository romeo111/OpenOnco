id: RF-DLBCL-HIGH-IPI
definition: "DLBCL with International Prognostic Index ≥2 — selects intensified Pola-R-CHP over R-CHOP
  per POLARIX evidence"
definition_ua: "DLBCL з міжнародним прогностичним індексом IPI ≥2 — обирає інтенсифікований Pola-R-CHP
  замість R-CHOP за даними POLARIX"

trigger:
  type: composite_score
  any_of:
  - finding: "ipi_score"
    threshold: 2
    comparator: ">="
  - finding: "high_ipi"
    value: true

clinical_direction: intensify

category: risk-score
priority: 60
relevant_diseases:
- DIS-DLBCL-NOS
shifts_algorithm:
- ALGO-DLBCL-1L

sources:
- SRC-NCCN-BCELL-2025
- SRC-ESMO-DLBCL-2024

last_reviewed: "2026-04-25"
notes: >
  Per POLARIX trial: in IPI ≥2 newly-diagnosed DLBCL, Pola-R-CHP showed
  superior PFS (~6.5% absolute at 2 years) vs R-CHOP. Toxicity profile
  comparable except higher peripheral neuropathy with polatuzumab. Major
  access constraint in Ukraine — polatuzumab not НСЗУ-reimbursed; flag
  funding pathway in Plan.
notes_ua: >
  Відповідно до дослідження POLARIX: при IPI ≥2 вперше діагностованій DLBCL, Pola-R-CHP показав перевагу
  ЗВБп (~6.5% абсолютних на 2 роки) проти R-CHOP. Профіль токсичності співставний, крім вищої периферичної
  нейропатії при polatuzumab. Суттєве обмеження доступу в Україні — polatuzumab не відшкодовується НСЗУ;
  необхідно позначити шлях фінансування в Плані.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_09
draft_revision: 2
