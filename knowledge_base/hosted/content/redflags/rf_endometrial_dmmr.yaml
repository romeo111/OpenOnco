  type: biomarker_status
  any_of:
    - finding: "mmr_status"
      value: "deficient"
    - finding: "mmr_status"
      value: "dMMR"
    - finding: "msi_status"
      value: "MSI-H"
    - finding: "msi_status"
      value: "MSI-high"
    - finding: "msi_status"
      value: "high"
    - finding: "mlh1_ihc"
      value: "loss"
    - finding: "msh2_ihc"
      value: "loss"
    - finding: "msh6_ihc"
      value: "loss"
    - finding: "pms2_ihc"
      value: "loss"

