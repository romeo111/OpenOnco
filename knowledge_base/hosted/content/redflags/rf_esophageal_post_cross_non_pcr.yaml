id: RF-ESOPHAGEAL-POST-CROSS-NON-PCR
definition: >
  Post-CROSS-CRT-then-esophagectomy with residual disease — pathology
  shows ypT+ and/or ypN+ (no pCR). ~70% of CROSS patients fall into
  this category. Treatment-defining: shifts the patient out of the
  resectable-1L (CROSS neoadjuvant) pathway into adjuvant nivolumab ×
  1 year per CheckMate-577 (DFS 22 vs 11 mo placebo, HR 0.69).
  Eligibility window: initiate within 4-16 weeks post-surgery.
  Applies to both adenocarcinoma and squamous-cell histology.
definition_ua: >
  Після-CROSS-ХПТ-тоді-езофагектомія з залишковою хворобою —
  патологія показує ypT+ та/або ypN+ (без pCR). ~70% пацієнтів CROSS
  потрапляють у цю категорію. Лікування-визначальна: переводить
  пацієнта з резектабельний-1L (CROSS неоад'ювантний) шляху на
  ад'ювантний ніволумаб × 1 рік per CheckMate-577 (DFS 22 проти 11
  міс. плацебо, HR 0.69). Вікно прийнятності: початок 4-16 тижнів
  після операції. Застосовується до аденокарциноми і squamous-cell
  гістології.

trigger:
  type: post_treatment_pathology_composite
  any_of:
    - finding: "post_cross_residual_disease_ypT_or_ypN_positive"
      value: true
    - all_of:
        - finding: "post_cross_pCR"
          value: false
        - any_of:
            - finding: "ypT_residual"
              value: true
            - finding: "ypN_residual"
              value: true

clinical_direction: intensify

severity: critical
priority: 60
category: high-risk-biology

relevant_diseases:
  - DIS-ESOPHAGEAL
shifts_algorithm:
  - ALGO-ESOPH-RESECTABLE-1L
  - ALGO-ESOPHAGEAL-ADJUVANT-1L

sources:
  - SRC-NCCN-ESOPHAGEAL-2025
  - SRC-ESMO-ESOPHAGEAL-2024

last_reviewed: "2026-04-30"
draft: false

notes: >
  Engine wiring: when post-CROSS non-pCR biology is detected on a
  patient profile that lacks `disease_state` (so the resectable-1L
  algorithm is the only line=1 esophageal algorithm reached by
  load-order fallback), this RedFlag fires inside
  ALGO-ESOPH-RESECTABLE-1L step 0 to redirect the engine to the
  adjuvant indication (IND-ESOPH-ADJUVANT-NIVOLUMAB-POST-CROSS)
  instead of the neoadjuvant default. Once curated patient JSONs
  migrate to set `disease_state: "adjuvant"`, the dedicated
  ALGO-ESOPHAGEAL-ADJUVANT-1L picks them up directly and this step 0
  becomes redundant (still safe — additive). pCR patients (ypT0N0M0)
  excluded from CheckMate-577 — adjuvant nivo is contraindicated in
  that subset.
notes_ua: >
  Інженерне вмонтування: коли після-CROSS не-pCR біологія виявлена на
  профілі пацієнта, який не має `disease_state` (отже резектабельний-1L
  алгоритм — єдиний line=1 езофагеальний алгоритм досяжний через
  load-order fallback), цей RedFlag спрацьовує в
  ALGO-ESOPH-RESECTABLE-1L крок 0 щоб перенаправити двигун на
  ад'ювантну індикацію (IND-ESOPH-ADJUVANT-NIVOLUMAB-POST-CROSS)
  замість неоад'ювантного дефолту. Як тільки куровані профілі мігрують
  на `disease_state: "adjuvant"`, окремий
  ALGO-ESOPHAGEAL-ADJUVANT-1L підхоплює їх прямо і цей крок 0 стає
  надлишковим (досі безпечно — additive). pCR пацієнти (ypT0N0M0)
  виключені з CheckMate-577 — ад'ювантний ніво — протипоказано в цій
  підгрупі.
