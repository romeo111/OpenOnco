id: RF-FITNESS-ECOG-POOR
category: frailty-age
severity: critical
priority: 100

definition: >
  Patient has poor performance status (ECOG PS ≥ 3) precluding standard systemic
  therapy. ECOG 3 = capable of only limited self-care, confined to bed/chair >50%
  of waking hours. ECOG 4 = completely disabled, no self-care possible.
  Most oncology trials and approved indications require ECOG 0–2; ECOG ≥ 3 typically
  triggers best supportive care (BSC) or highly dose-reduced / palliative-intent
  regimen discussion.

definition_ua: >
  Низький функціональний стан пацієнта (ECOG ПС ≥ 3), що унеможливлює стандартну
  системну терапію. ECOG 3 = лише обмежений самодогляд, прикутий до ліжка/крісла
  >50% неспальних годин. ECOG 4 = повністю знерухомлений. Більшість схвалених індикацій
  вимагають ECOG 0–2; ECOG ≥ 3 зазвичай потребує переходу на BSC або суттєво
  редукованого / паліативного режиму.

trigger:
  type: composite_score
  any_of:
    - finding: ecog
      threshold: 3
      comparator: ">="
    - finding: performance_status_ecog
      threshold: 3
      comparator: ">="
    - finding: fit_for_systemic_therapy
      value: false

clinical_direction: de-escalate

shifts_algorithm: []

relevant_diseases:
  - "*"

sources:
  - source_id: SRC-NCCN-GENERAL-PRINCIPLES-2025
    position: supports
    relevant_quote_paraphrase: >
      NCCN general principles: ECOG PS ≥ 3 is a relative or absolute contraindication
      for most standard chemotherapy regimens; BSC discussion mandatory.

notes: >
  ECOG PS ≥ 3 is the most common reason patients are deemed ineligible for standard
  systemic therapy across all tumor types. Disease-agnostic RF — relevant for any
  indication requiring ECOG 0-2. Engine should surface BSC discussion and/or
  highly dose-reduced/palliative alternatives. Note: some targeted therapies
  (e.g., TKIs for EGFR-mutant NSCLC, ibrutinib for CLL) may be feasible even at
  ECOG 3 if PS is driven by the malignancy itself and may improve with treatment
  response — clinical judgment required.

notes_ua: >
  ECOG ПС ≥ 3 — найпоширеніша причина недопустимості до стандартної системної
  терапії. Disease-агностичний RF. Деякі таргетні терапії (TKI при EGFR+ NSCLC,
  ібрутиніб при ХЛЛ) можуть бути доцільними навіть при ECOG 3, якщо ПС
  обумовлений самою хворобою — потрібне клінічне рішення.

