notes: >
  Two-tier CPS approach: CPS ≥5 = strong evidence (CheckMate-649 primary
  endpoint, EMA-approved cutoff); CPS 1-4 = secondary subgroup, FDA-
  approved but EMA restricts. Pembrolizumab (KEYNOTE-859) approved
  similarly for CPS ≥1 with chemo. HER2 testing precedes PD-L1 in
  the algorithm — HER2+ disease routes to trastuzumab + chemo (KEYNOTE-811
  established pembrolizumab + trastuzumab + chemo for HER2+ CPS ≥1).
  MSI-H gastric (~5%) overrides PD-L1 (KEYNOTE-859 MSI-H subset shows
  exceptional response — single-agent pembrolizumab acceptable).
  EBV-positive gastric (~10%) is also IO-responsive but no biomarker
  threshold established. Detection: 22C3 IHC, central or local
  laboratory; Dako 28-8 (used in CheckMate-649) and 22C3 are
  interchangeable for gastric CPS in clinical practice.
notes_ua: >
  Двоступеневий CPS-підхід: CPS ≥5 — сильні докази (CheckMate-649
  primary endpoint, EMA-схвалений cutoff); CPS 1-4 — secondary subgroup,
  FDA-схвалено але EMA обмежує. Пембролізумаб (KEYNOTE-859) схвалений
  аналогічно при CPS ≥1 з хіміо. HER2-тестування передує PD-L1 в
  алгоритмі — HER2+ хвороба маршрутизується на трастузумаб + хіміо
  (KEYNOTE-811 встановив пембролізумаб + трастузумаб + хіміо для HER2+
  CPS ≥1). MSI-H gastric (~5%) переважає PD-L1 (KEYNOTE-859 MSI-H subset
  показав виняткову відповідь — single-agent пембролізумаб прийнятний).
  EBV-позитивний gastric (~10%) теж IO-чутливий, але порогу не
  встановлено. Виявлення: 22C3 IHC центральна або локальна лабораторія;
  Dako 28-8 (використано в CheckMate-649) і 22C3 — взаємозамінні для
  гастро CPS на практиці.

