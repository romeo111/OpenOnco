id: RF-GASTRIC-PDL1-CPS-1-PLUS
definition: >
  Advanced/metastatic gastric or GE-junction adenocarcinoma with PD-L1
  combined positive score (CPS) ≥1 by 22C3 IHC. CheckMate-649 (Janjigian
  Lancet 2021; final OS 2024) established nivolumab + chemo (FOLFOX or
  XELOX) over chemo alone for CPS ≥5 (mOS 14.4 vs 11.1 mo, HR 0.71)
  with continued benefit at CPS ≥1 (HR 0.78). FDA approved nivolumab +
  chemo for HER2-negative gastric/GEJ adenocarcinoma 1L regardless of
  CPS; EMA restricts to CPS ≥5. NCCN/ESMO 2024 favor adding nivolumab
  to FOLFOX/XELOX for CPS ≥1 (with stronger preference at CPS ≥5).
definition_ua: >
  Поширена/метастатична аденокарцинома шлунка або стравохідно-шлункового
  з'єднання з PD-L1 CPS (combined positive score) ≥1 за 22C3 IHC.
  CheckMate-649 (Janjigian Lancet 2021; фінальний OS 2024) встановило
  ніволумаб + хіміо (FOLFOX або XELOX) над хіміо в монорежимі при CPS ≥5
  (мОВ 14.4 проти 11.1 міс, HR 0.71) зі збереженням вигоди при CPS ≥1
  (HR 0.78). FDA схвалило ніволумаб + хіміо для HER2-негативної
  гастро/GEJ-аденокарциноми 1L незалежно від CPS; EMA обмежує до CPS ≥5.
  NCCN/ESMO 2024 підтримують додавання ніволумабу до FOLFOX/XELOX при
  CPS ≥1 (з сильнішою преференцією при CPS ≥5).

