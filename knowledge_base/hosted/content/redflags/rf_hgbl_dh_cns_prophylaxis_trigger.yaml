id: RF-HGBL-DH-CNS-PROPHYLAXIS-TRIGGER
definition: "HGBL double-/triple-hit lymphoma — biology alone meets CNS-prophylaxis indication independent
  of CNS-IPI; mandates HD-MTX intercalation or IT MTX"
definition_ua: "HGBL double-/triple-hit — біологія сама по собі є показанням до CNS-профілактики незалежно
  від CNS-IPI; HD-MTX в чергуванні або IT MTX"

trigger:
  type: composite
  any_of:
  - finding: "myc_rearranged"
    value: true
  - finding: "double_hit_lymphoma"
    value: true
  - finding: "triple_hit_lymphoma"
    value: true

clinical_direction: investigate

category: high-risk-biology
priority: 60
relevant_diseases:
- DIS-HGBL-DH
shifts_algorithm: []

sources:
- SRC-NCCN-BCELL-2025
- SRC-ESMO-DLBCL-2024

last_reviewed: "2026-04-27"
draft: true
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  Per NCCN B-cell v.X.2025 HGBL section: CNS prophylaxis recommended for
  all HGBL-DH/TH regardless of CNS-IPI score (biology-driven); typical
  approach HD-MTX 3-3.5 g/m² IV intercalated with DA-EPOCH-R cycles.
  Direction INVESTIGATE because RF doesn't shift main regimen — adds
  CNS-directed therapy as plan particularity. shifts_algorithm:[] per
  REDFLAG_AUTHORING_GUIDE §4 rule 2. STUB — requires clinical co-lead
  signoff.
notes_ua: >
  За розділом NCCN B-cell v.X.2025 HGBL: CNS-профілактика рекомендована для всіх HGBL-DH/TH незалежно
  від балу CNS-IPI (біологічно обумовлена); типовий підхід HD-MTX 3-3.5 g/m² в/в в чергуванні з циклами
  DA-EPOCH-R. Напрямок ОБСТЕЖЕННЯ, оскільки RF не переключає основну схему — додає ЦНС-спрямовану терапію
  як особливість плану. shifts_algorithm:[] за §4 правило 2 REDFLAG_AUTHORING_GUIDE. СТАБ — потребує підпису
  клінічного співкерівника.
