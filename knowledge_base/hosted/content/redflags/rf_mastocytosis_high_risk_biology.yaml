id: RF-MASTOCYTOSIS-HIGH-RISK-BIOLOGY
definition: "Aggressive systemic mastocytosis variant by WHO 5th ed.: SM with associated hematologic neoplasm (SM-AHN), aggressive SM (ASM), mast cell leukemia (MCL ≥10% mast cells in PB or ≥20% in BM), mast cell sarcoma; KIT D816V detected"
definition_ua: "Агресивний варіант системного мастоцитозу за ВООЗ 5-те вид.: SM з асоційованим гематологічним новоутворенням (SM-AHN), агресивний SM (ASM), мастоцитоз-лейкоз (MCL ≥10% у ПК або ≥20% у КМ), саркома мастоцитів; KIT D816V"

trigger:
  type: composite
  any_of:
    - finding: "sm_ahn_diagnosis"
      value: true
    - finding: "asm_diagnosis"
      value: true
    - finding: "mast_cell_leukemia"
      value: true
    - finding: "mast_cell_sarcoma"
      value: true
    - finding: "kit_d816v_positive"
      value: true

clinical_direction: intensify

severity: critical
priority: 40
category: high-risk-biology
