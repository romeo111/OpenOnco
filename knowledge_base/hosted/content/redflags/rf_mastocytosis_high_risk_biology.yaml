review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  KIT D816V is present in ≥90% of advSM and is the actionable target for
  midostaurin (RATIFY/PATHWAY studies) and avapritinib (PATHFINDER, EXPLORER).
  AHN component (most often myeloid neoplasm — CMML, MDS, MPN-U) is
  treated separately per its own algorithm AND with KIT-directed therapy.
  Direction INTENSIFY → KIT-targeted therapy + AHN-directed regimen.
  STUB — requires clinical co-lead signoff.
notes_ua: >
  KIT D816V виявляється у ≥90% випадків advSM і є придатною мішенню для
  мідостауріну (midostaurin) (дослідження RATIFY/PATHWAY) та авапритинібу
  (avapritinib) (PATHFINDER, EXPLORER). Компонент AHN (найчастіше мієлоїдна
  пухлина — ХММЛ, МДС, МПН-Н) лікується окремо за власним алгоритмом І
  разом з KIT-спрямованою терапією. Напрям «INTENSIFY» → KIT-таргетна
  терапія + AHN-спрямований режим. STUB — потребує клінічного підпису
  провідного спеціаліста.
