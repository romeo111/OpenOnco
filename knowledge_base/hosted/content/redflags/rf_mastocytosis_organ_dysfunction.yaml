id: RF-MASTOCYTOSIS-ORGAN-DYSFUNCTION
definition: "Mastocytosis with C-finding (organ-damage) criteria per WHO 5th ed.: cytopenia (Hb <10, platelets <100K, ANC <1.0K), hepatomegaly + ascites or hypoalbuminemia, splenomegaly + hypersplenism, malabsorption + weight loss, large osteolyses + pathological fractures"
definition_ua: "Мастоцитоз із C-критеріями (органні ураження) за ВООЗ 5-те вид.: цитопенія (Hb <10, тромбоцити <100K, АНГ <1.0K), гепатомегалія + асцит або гіпоальбумінемія, спленомегалія + гіперспленізм, мальабсорбція + втрата ваги, великі остеолізи + патологічні переломи"

trigger:
  type: composite
  any_of:
    - finding: "hemoglobin_g_dl"
      threshold: 10
      comparator: "<"
    - finding: "platelet_count_k_ul"
      threshold: 100
      comparator: "<"
    - finding: "anc_k_ul"
      threshold: 1.0
      comparator: "<"
    - finding: "ascites_present"
      value: true
    - finding: "albumin_g_dl"
      threshold: 3.5
      comparator: "<"
    - finding: "pathologic_fracture_present"
      value: true
    - finding: "malabsorption_weight_loss"
      value: true

clinical_direction: intensify

severity: major
priority: 60
category: organ-dysfunction
relevant_diseases:
  - DIS-MASTOCYTOSIS
shifts_algorithm:
  - ALGO-ADVSM-1L

sources:
  - SRC-NCCN-SM-2025
  - SRC-WHO-LNSC-2023

last_reviewed: "2026-04-27"
draft: true
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  WHO 5th ed. (2022/2023) C-findings define advSM and trigger cytoreductive
  therapy (avapritinib, midostaurin, cladribine, IFN-α). Per NCCN-SM:
  presence of any C-finding mandates KIT-directed therapy regardless of
  symptomatic load. Direction INTENSIFY shifts toward avapritinib
  (KIT D816V-positive ASM/SM-AHN/MCL) per PATHFINDER trial. STUB —
  requires clinical co-lead signoff.
notes_ua: >
  ВООЗ 5-те вид. (2022/2023) C-знахідки визначають advSM і ініціюють
  циторедуктивну терапію (авапритиніб (avapritinib), мідостаурин, кладрибін,
  IFN-α). За NCCN-SM: наявність будь-якої C-знахідки вимагає KIT-спрямованої
  терапії незалежно від симптоматичного навантаження. Напрям «INTENSIFY»
  спрямовує до авапритинібу (KIT D816V-позитивний ASM/SM-AHN/MCL) за
  даними дослідження PATHFINDER. STUB — потребує клінічного підпису
  провідного спеціаліста.
ukrainian_review_status: pending_clinical_signoff
