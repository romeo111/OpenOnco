notes: >
  Distinguish from RF-PRIOR-BTKI-PROGRESSION (universal, broad) — that
  flag fires on any cBTKi PD; this flag is mutation-confirmed C481S
  resistance, the canonical mechanism of acquired cBTKi resistance in
  MCL (similar prevalence to CLL ~80% on cBTKi PD). PLCG2 mutations
  (R665W, S707F/Y, L845F) are an alternative resistance mechanism
  (~15%) — also responds to pirtobrutinib. Test at PD by ddPCR or NGS
  on peripheral-blood mononuclear cells. Brexucabtagene autoleucel
  (CAR-T, ZUMA-2) is the alternative for CAR-T-eligible post-cBTKi
  MCL; pirtobrutinib preferred for CAR-T-ineligible (age, comorbidity,
  organ dysfunction). Access UA: pirtobrutinib not yet NSZU-listed;
  international early-access pathways.
notes_ua: >
  Відрізняти від RF-PRIOR-BTKI-PROGRESSION (універсальний, широкий) — той
  спрацьовує на будь-яку cBTKi PD; цей — мутаційно-підтверджена C481S
  резистентність, канонічний механізм набутої резистентності до cBTKi
  у МКЛ (поширеність схожа з ХЛЛ ~80% при cBTKi PD). PLCG2 мутації
  (R665W, S707F/Y, L845F) — альтернативний механізм (~15%) — теж
  відповідає на піртобрутиніб. Тестувати при PD ddPCR або NGS на
  периферичних мононуклеарах. Брексукабтаген автолейцел (CAR-T,
  ZUMA-2) — альтернатива для CAR-T-eligible post-cBTKi МКЛ;
  піртобрутиніб переважно для CAR-T-ineligible (вік, коморбідність,
  органна дисфункція). Доступ в Україні: піртобрутиніб ще не в
  НСЗУ-списку; міжнародні early-access шляхи.

