id: RF-MCL-POST-BTKI-C481-ACTIONABLE
definition: >
  MCL with acquired BTK C481S (rarely C481R/F/Y) mutation after progression
  on covalent BTK inhibitor (ibrutinib, acalabrutinib, zanubrutinib).
  C481S abolishes covalent binding of cBTKi to BTK; non-covalent BTKi
  pirtobrutinib retains activity (BRUIN MCL-321, Wang Lancet Oncol 2024;
  pirtobrutinib in cBTKi-pretreated MCL ORR 51%, mPFS 7.4 mo). Routes
  3L+ post-cBTKi MCL with confirmed C481-axis resistance to pirtobrutinib
  over chemoimmunotherapy or alternative cBTKi (which would not regain
  activity given the on-target resistance mechanism).
definition_ua: >
  МКЛ із набутою BTK C481S (рідко C481R/F/Y) мутацією після прогресії
  на ковалентному BTK-інгібіторі (ібрутиніб, акалабрутиніб, занубрутиніб).
  C481S скасовує ковалентне зв'язування cBTKi з BTK; нековалентний
  піртобрутиніб зберігає активність (BRUIN MCL-321, Wang Lancet Oncol
  2024; піртобрутиніб у cBTKi-предлікованих МКЛ ORR 51%, мПФВ 7.4 міс).
  Маршрутизує 3L+ post-cBTKi МКЛ з підтвердженою C481-axis резистентністю
  на піртобрутиніб замість chemoimmuno або альтернативного cBTKi (який
  не відновить активність через on-target механізм резистентності).

