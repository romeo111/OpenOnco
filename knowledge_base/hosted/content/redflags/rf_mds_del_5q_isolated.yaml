id: RF-MDS-DEL-5Q-ISOLATED
definition: "MDS with isolated del(5q) (or del(5q) plus one additional non-7 abnormality) — lenalidomide-responsive subgroup with ~67% RBC transfusion independence; favorable prognosis"
definition_ua: "МДС з ізольованою del(5q) (або del(5q) плюс одна додаткова не-7 аномалія) — підгрупа, чутлива до леналідоміду, з ~67% досягнення трансфузійної незалежності щодо еритроцитів; сприятливий прогноз"

trigger:
  type: biomarker
  any_of:
    - finding: "del_5q_isolated"
      value: true
    - finding: "isolated_del_5q"
      value: true
    - finding: "mds_del_5q"
      value: "positive"
    - all_of:
        - finding: "del_5q"
          value: true
        - finding: "monosomy_7"
          value: false
        - finding: "complex_karyotype"
          value: false

clinical_direction: investigate

severity: major
priority: 80
category: high-risk-biology
relevant_diseases:
  - DIS-MDS-LR
shifts_algorithm: []  # clinical_direction=investigate per REDFLAG_AUTHORING_GUIDE §4 rule 2 — must remain empty even when algorithm step references this RF; fixture-test gates this invariant.

sources:
  - SRC-NCCN-AML-2025
  - SRC-ESMO-MDS-2021

last_reviewed: "2026-04-30"
notes: >
  Direction "investigate" — surfaces a treatment-option annotation
  (lenalidomide track) rather than a binary indication switch.
  Lenalidomide 10 mg/day × 21 days q28d achieves cytogenetic response
  ~50% + RBC transfusion independence ~67% in del(5q) MDS-LR. Monitor
  for cytopenias requiring dose reduction. Pregnancy gating mandatory
  (potent teratogen). TP53 mutation (~20% of del(5q)) co-occurrence
  predicts resistance + AML transformation. STUB — requires clinical
  co-lead signoff.
notes_ua: >
  Напрям «investigate» — виносить анотацію лікувальної опції (трек
  леналідоміду (lenalidomide)) на розгляд, а не здійснює бінарне
  перемикання показання. Леналідомід 10 mg/day × 21 день кожні 28 днів
  досягає цитогенетичної відповіді ~50% + незалежності від трансфузій
  еритроцитарної маси ~67% при del(5q) МДС-НР. Моніторинг цитопеній з
  необхідністю зниження дози. Шлюзова оцінка вагітності є обов'язковою
  (потужний тератоген). Мутація TP53 (~20% при del(5q)) у поєднанні
  прогнозує резистентність + трансформацію в ГМЛ. STUB — потребує
  клінічного підпису провідного спеціаліста.
ukrainian_review_status: pending_clinical_signoff
