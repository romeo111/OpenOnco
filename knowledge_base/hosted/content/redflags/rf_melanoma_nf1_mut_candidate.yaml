id: RF-MELANOMA-NF1-MUT-CANDIDATE
definition: >
  Cutaneous melanoma with somatic NF1 loss-of-function mutation
  (frameshift / nonsense / splice / large deletion) and absent canonical
  BRAF V600 / NRAS Q61 driver — corresponds to the NF1 subtype of the
  TCGA Cell 2015 four-genome classification (~14% of cutaneous
  melanomas). Informational only at MVP: there is no FDA-approved
  NF1-directed targeted therapy in melanoma (2026); MEK inhibitor
  monotherapy (selumetinib, trametinib) has shown activity in
  RASopathy-associated MPNST and plexiform neurofibroma but is not
  approved for NF1-mutant melanoma. Phenotype: high-UV-mutational-burden,
  sun-exposed sites, often older patients — typically excellent
  candidates for ICI (anti-PD-1 monotherapy or ipi/nivo) given the high
  TMB. Flag exists to surface (a) trial-eligibility for MEK / SHP2 / RAS
  inhibitor studies and (b) the implicit "no BRAF / NRAS driver" status
  that pre-empts targeted-therapy first-line.
definition_ua: >
  Шкірна меланома з соматичною NF1 LOF-мутацією (frameshift / nonsense /
  splice / велика делеція) і відсутністю канонічного BRAF V600 / NRAS Q61
  драйвера — відповідає NF1-підтипу TCGA Cell 2015 чотиригеномної
  класифікації (~14% шкірних меланом). На MVP — лише інформаційний:
  FDA-схваленої NF1-направленої таргетної терапії при меланомі не існує
  (2026); MEK-інгібітор монотерапія (селуметиніб, траметиніб) має
  активність при RASopathy-асоційованій MPNST та плексиформній
  нейрофібромі, але не схвалена для NF1-mut меланоми. Фенотип: висока
  UV-мутаційна навантаження, сонцеекспоновані ділянки, переважно
  старші пацієнти — типово відмінні кандидати на ICI (anti-PD-1
  монотерапія або ipi/nivo) через високу TMB. Прапорець потрібен щоб
  поверхневити (а) eligibility до MEK / SHP2 / RAS-інгібітор досліджень
  та (б) імпліцитний "no BRAF / NRAS driver" статус, що виключає
  таргетну терапію 1L.

