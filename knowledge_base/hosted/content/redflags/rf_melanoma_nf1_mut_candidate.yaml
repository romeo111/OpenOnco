notes: >
  TCGA cutaneous-melanoma subtype assignment (Cell 2015): BRAF-mut
  (~50%), RAS-mut (~28%), NF1-mut (~14%), triple-WT (~9%). NF1-mut
  melanomas often co-occur with secondary RAS-pathway alterations
  (RASA2, PTPN11) but the canonical hot-spots BRAF V600 and NRAS Q61
  are typically absent. UV-signature mutational burden is among the
  highest of the four subtypes — translates to ICI sensitivity.

  **Therapeutic implications (MVP-conservative):**
  - First-line: anti-PD-1 monotherapy (pembrolizumab / nivolumab) OR
    ipilimumab + nivolumab combo (CheckMate-067) per fitness and brain-met
    status — same as for triple-WT or general ICI-eligible melanoma.
  - No BRAF/MEK targeted-therapy indication (BRAF V600 absent). Trametinib
    monotherapy off-label for NF1-mut melanoma has shown limited single-
    agent activity (case series, ORR <20%) and is not endorsed by NCCN /
    ESMO 2024.
  - Trial-eligibility: SHP2 inhibitors (e.g., RMC-4630, TNO155),
    pan-RAS inhibitors (e.g., RMC-6236), MEK + SHP2 combinations are
    in early-phase trials enrolling NF1-LOF tumors.

  **Why a separate RF (vs. just "no driver"):** NF1-LOF carries an
  implicit RAS-pathway-active state that argues against future single-
  agent MEK-inhibitor compassionate-use requests, and is a positive
  marker for trial-screening. Distinct from triple-WT (where the
  trial pool differs).

  Detection: NGS panel covering NF1 truncating / splice / CNV events —
  hot-spot panels miss NF1 LOF. Tumor-only NGS detects somatic events;
  a germline pathogenic NF1 (NF1 syndrome / neurofibromatosis type 1)
  is a separate phenotype with its own surveillance implications.
notes_ua: >
  TCGA-підтипізація шкірної меланоми (Cell 2015): BRAF-mut (~50%),
  RAS-mut (~28%), NF1-mut (~14%), triple-WT (~9%). NF1-mut меланоми
  часто мають вторинні RAS-pathway альтерації (RASA2, PTPN11), але
  канонічні гарячі точки BRAF V600 та NRAS Q61 зазвичай відсутні.
  UV-сигнатурне мутаційне навантаження — серед найвищих з чотирьох
  підтипів, що транслюється у чутливість до ICI.

  **Терапевтичні наслідки (MVP-консервативно):**
  - Перша лінія: anti-PD-1 монотерапія (пембролізумаб / ніволумаб)
    АБО іпілімумаб + ніволумаб комбо (CheckMate-067) за fitness і
    статусом мет в мозок — як і для triple-WT / загального ICI-eligible
    меланоми.
  - Немає BRAF/MEK таргетної індикації (BRAF V600 відсутній).
    Траметиніб монотерапія off-label для NF1-mut меланоми показала
    обмежену активність (case series, ORR <20%) — не рекомендовано
    NCCN / ESMO 2024.
  - Eligibility до досліджень: SHP2-інгібітори (RMC-4630, TNO155),
    pan-RAS-інгібітори (RMC-6236), MEK + SHP2 комбо — у ранніх фазах
    залучають NF1-LOF пухлини.

  **Чому окремий RF (а не просто "no driver"):** NF1-LOF несе
  імпліцитний активний RAS-pathway статус, що аргументує проти
  майбутніх compassionate-use запитів на single-agent MEK, і є
  позитивним маркером для скринінгу досліджень. Відрізняється від
  triple-WT (де trial-пул інший).

  Виявлення: NGS-панель з покриттям NF1 truncating / splice / CNV —
  hot-spot панелі пропускають NF1 LOF. Tumor-only NGS виявляє
  соматичні події; зародкова патогенна NF1 (NF1-синдром /
  нейрофіброматоз 1 типу) — окремий фенотип з власними
  surveillance-наслідками.
