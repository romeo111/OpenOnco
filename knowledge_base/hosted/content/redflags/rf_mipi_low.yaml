id: RF-MIPI-LOW
definition: "Mantle cell lymphoma with MIPI low risk (MIPI <5.7 / 0-3 simplified points) — supports standard intensified induction in fit younger patients (Nordic / R-DHAP-based) without further treatment escalation"
definition_ua: "Мантійноклітинна лімфома з низьким ризиком MIPI (MIPI <5.7 / 0-3 спрощених бали) — підтримує стандартну інтенсифіковану індукцію у молодих фітних пацієнтів (Nordic / R-DHAP) без додаткової ескалації"

trigger:
  type: composite_score
  any_of:
    - finding: "mipi_score"
      threshold: 5.7
      comparator: "<"
    - finding: "mipi_simplified_score"
      threshold: 3
      comparator: "<="
    - finding: "mipi_risk_group"
      value: "low"

clinical_direction: de-escalate

severity: major
priority: 80
category: high-risk-biology
relevant_diseases:
  - DIS-MCL
shifts_algorithm:
  - ALGO-MCL-1L

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-MCL-2024

last_reviewed: "2026-04-27"
notes: >
  MIPI (Hoster 2008) is the validated MCL prognostic index combining
  age, ECOG, LDH, WBC. MIPI low-risk has 5-yr OS ~80%; intermediate
  ~60%; high ~35%. In fit younger MCL, low-risk MIPI without TP53
  / blastoid features supports the standard ASCT-eligible Nordic /
  alternating R-CHOP/R-DHAP backbone — no need to add early BTKi
  (TRIANGLE outcome favored ibrutinib in all-comers but Ukraine access
  constraints make low-risk patients pragmatic candidates for the
  classic intensified arm). de-escalate direction means "do not add
  further intensification beyond the fit-younger Nordic baseline".
notes_ua: >
  MIPI (Hoster 2008) — валідований прогностичний індекс для МКЛ, що
  поєднує вік, ECOG, ЛДГ, ЛЛ. MIPI-низький ризик: 5-річна загальна
  виживаність ~80%; проміжний ~60%; високий ~35%. При МКЛ у молодих
  фізично придатних пацієнтів без TP53-мутації / бластоїдних ознак
  MIPI-низький підтримує стандартний придатний-до-АТКМ Nordic /
  альтернуючий R-CHOP/R-DHAP — не потребує раннього BTK-інгібітора
  (TRIANGLE показало перевагу ібрутинібу для всіх включених, проте
  обмеженість доступу в Україні робить пацієнтів низького ризику
  прагматичними кандидатами для класичного інтенсивованого рукава).
  Напрям «de-escalate» означає «не додавати подальшої інтенсифікації
  поза базисом Nordic для молодих придатних пацієнтів».

ukrainian_review_status: pending_clinical_signoff
