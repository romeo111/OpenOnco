notes: >
  CD38 expression is universal in MM — RF acts as enabler/eligibility
  signal rather than rare-event flag. Severity = moderate (rather
  than major) reflects this: it routes the patient toward a
  CD38-mAb-containing arm but does not flag adverse biology.
  Daratumumab SC (1800 mg + hyaluronidase) preferred over IV for
  IRR mitigation (~13% SC vs ~50% IV any grade). Pre-medication:
  acetaminophen 650-1000 mg + dexamethasone 20 mg + diphenhydramine
  25-50 mg + montelukast 10 mg (cycle 1). Schedule: weekly cycles
  1-2, q2w cycles 3-6, q4w cycle 7+. Interferes with type-and-screen
  (anti-CD38 binds RBC CD38) — pre-transfusion phenotype required.
  HBV reactivation risk — screening + prophylaxis. CD38 loss-of-
  expression after prior daratumumab exposure typically transient;
  re-treatment feasibility depends on duration off-therapy + flow
  re-assessment.
  STUB — requires clinical co-lead signoff.
notes_ua: >
  Експресія CD38 універсальна в ММ — RF діє як enabler/eligibility
  сигнал, а не як рідкісний adverse флаг. Severity = moderate
  (а не major) це відображає: маршрутизує пацієнта в CD38-mAb
  arm, але не сигналізує про несприятливу біологію. Даратумумаб
  п/ш (1800 мг + гіалуронідаза) переважніше за в/в для зниження
  IRR (~13% п/ш vs ~50% в/в будь-якого ступеня). Премедикація:
  ацетамінофен 650-1000 мг + дексаметазон 20 мг + дифенгідрамін
  25-50 мг + монтелукаст 10 мг (цикл 1). Схема: щотижня цикли
  1-2, кожні 2 тижні цикли 3-6, кожні 4 тижні цикл 7+. Інтерферує
  з типуванням групи крові (анти-CD38 зв'язується з еритроцитарним
  CD38) — необхідне передтрансфузійне фенотипування. Ризик
  реактивації HBV — скринінг + профілактика. CD38 loss-of-expression
  після попередньої експозиції даратумумабу зазвичай транзиторна;
  доцільність повторного лікування залежить від тривалості перерви +
  перепроведеної проточної цитометрії.
  STUB — потребує схвалення клінічного співкерівника.
