id: RF-MM-CD38-EXPRESSION-DARA-CANDIDATE
definition: >
  CD38 expression on plasma cells in newly-diagnosed or relapsed/
  refractory multiple myeloma — universally high on malignant
  plasma cells (>95% MM), making CD38-targeting monoclonal
  antibodies a backbone class. Daratumumab (anti-CD38 IgG1κ;
  IV original / SC formulation post-2020) integrated into
  multiple regimens: D-VRd / D-VTd induction (transplant-eligible
  newly-diagnosed), D-Rd (MAIA Facon 2019 NEJM — mPFS not reached
  vs 31.9 mo, OS HR 0.66 in transplant-ineligible NDMM), D-Vd
  (CASTOR Palumbo 2016 NEJM — mPFS 16.7 vs 7.1 mo), D-Rd post-Len
  exposure (POLLUX Dimopoulos 2016 NEJM — mPFS 44.5 vs 17.5 mo),
  D-VMP (ALCYONE Mateos 2018 NEJM — mPFS not reached vs 19.3 mo
  in transplant-ineligible NDMM). Isatuximab (anti-CD38 IgG1κ;
  alternative CD38 mAb; IKEMA, ICARIA-MM data). Gates
  CD38-mAb-naive cohort; addresses CD38-loss-of-expression escape
  on prior CD38 exposure (~30-50% transient downregulation).
definition_ua: >
  Експресія CD38 на плазматичних клітинах при вперше діагностованій
  або рецидивній/рефрактерній множинній мієломі — універсально
  висока на злоякісних плазматичних клітинах (>95% ММ), що робить
  CD38-таргетні моноклональні антитіла backbone класом. Даратумумаб
  (анти-CD38 IgG1κ; в/в оригінальний / п/ш форма з 2020) інтегрований
  у множину режимів: D-VRd / D-VTd індукція (transplant-eligible
  нововиявлена), D-Rd (MAIA Facon 2019 NEJM — мПФВ не досягнуто
  vs 31.9 міс, ЗВ HR 0.66 у transplant-ineligible NDMM), D-Vd
  (CASTOR Palumbo 2016 NEJM — мПФВ 16.7 vs 7.1 міс), D-Rd після
  Len-експозиції (POLLUX Dimopoulos 2016 NEJM — мПФВ 44.5 vs 17.5 міс),
  D-VMP (ALCYONE Mateos 2018 NEJM — мПФВ не досягнуто vs 19.3 міс
  у transplant-ineligible NDMM). Ісатуксимаб (анти-CD38 IgG1κ;
  альтернативне CD38 mAb; дані IKEMA, ICARIA-MM). Гейтить
  CD38-mAb-naive когорту; враховує CD38-loss-of-expression escape
  після попередньої CD38-експозиції (~30-50% транзиторна
  downregulation).

