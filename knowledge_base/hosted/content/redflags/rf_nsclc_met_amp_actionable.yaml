id: RF-NSCLC-MET-AMP-ACTIONABLE
definition: >
  High-level MET amplification (MET/CEP7 ratio ≥4.0 OR mean GCN ≥10) in
  metastatic NSCLC — distinct from MET ex14 skipping. Two contexts:
  (1) De-novo MET-amp NSCLC (~1-5%) — capmatinib (GEOMETRY mono-1
  high-amp cohort: ORR 40%, mPFS 5.5 mo; off-label expansion beyond
  ex14 label). (2) Acquired MET-amp post-osimertinib resistance in
  EGFR-mut NSCLC — osimertinib + savolitinib (SAVANNAH; not yet FDA-
  approved). Low-level amp (GCN 5-9) NOT actionable.
definition_ua: >
  Високорівнева MET ампліфікація (співвідношення MET/CEP7 ≥4.0 АБО
  середня GCN ≥10) при метастатичному НДРЛ — відрізняється від
  пропуску екзону 14 MET. Два контексти: (1) De-novo MET-амп НДРЛ
  (~1-5%) — капматиніб (GEOMETRY mono-1 високо-амп когорта: ORR 40%,
  мПФВ 5.5 міс; off-label поза ex14 призначенням). (2) Набута MET-амп
  після резистентності до осимертинібу при EGFR-mut НДРЛ —
  осимертиніб + саволітиніб (SAVANNAH; ще не схвалено FDA).
  Низькорівнева ампліфікація (GCN 5-9) НЕ actionable.

trigger:
  type: biomarker
  any_of:
    - finding: "met_amplification"
      value: true
    - finding: "met_amplification"
      value: "positive"
    - finding: "met_amp"
      value: "positive"
    - finding: "met_cep7_ratio_ge_4"
      value: true
    - finding: "met_gcn_ge_10"
      value: true
    - finding: "met_status"
      value: "amplified"

clinical_direction: intensify

severity: major
priority: 60
category: high-risk-biology

relevant_diseases:
  - DIS-NSCLC
shifts_algorithm:
  - ALGO-NSCLC-METASTATIC-2L

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
  - SRC-GEOMETRY-WOLF-2020

last_reviewed: "2026-04-29"
draft: false

notes: >
  GEOMETRY mono-1 enrolled MET-amp cohort by GCN strata: GCN ≥10 cohort
  (high-amp) showed clinically meaningful response to capmatinib;
  GCN 6-9 cohort showed minimal benefit. Detection: FISH (Cappuzzo /
  Schildhaus criteria — MET/CEP7 ≥4 = high-level) preferred; NGS
  copy-number calls require assay-specific high-amp threshold. IHC alone
  is screening only — confirmation by FISH or NGS required. EGFR-mut
  NSCLC progressing on osimertinib: MET-amp is dominant non-T790M
  resistance mechanism; SAVANNAH (osi + savolitinib) showed ORR ~49%
  but not FDA-approved (covered indirectly by amivantamab + lazertinib
  via MET arm in MARIPOSA-2). Routes via ALGO-NSCLC-METASTATIC-2L
  step-10 area (parallel to MET ex14 — capmatinib regimen reused).
notes_ua: >
  GEOMETRY mono-1 включив MET-амп когорту за стратами GCN: когорта
  GCN ≥10 (висока ампліфікація) показала клінічно значущу відповідь
  на капматиніб; когорта GCN 6-9 показала мінімальну користь. Виявлення:
  FISH (критерії Cappuzzo / Schildhaus — MET/CEP7 ≥4 = високий рівень)
  переважно; NGS виклики копій вимагають високо-амп порогу для
  кожного аналізу. ІГХ окремо — лише скринінг; підтвердження FISH
  або NGS обов'язкове. EGFR-mut НДРЛ з прогресуванням на осимертинібі:
  MET-амп — домінантний не-T790M механізм резистентності; SAVANNAH
  (осі + саволітиніб) показав ORR ~49% але не схвалений FDA
  (опосередковано охоплено amivantamab + lazertinib через MET-плече
  в MARIPOSA-2). Маршрутизація через ALGO-NSCLC-METASTATIC-2L крок-10
  (паралельно з MET ex14 — повторне використання режиму капматиніб).
