id: RF-NSCLC-NRG1-FUSION-ZENO-CANDIDATE
definition: >
  NRG1 (neuregulin-1) gene fusion in NSCLC — predominant in invasive
  mucinous adenocarcinoma (~7-27% of KRAS-WT IMA). NRG1 fusions
  produce aberrant ligand-display driving HER2-HER3 heterodimer
  signalling. Zenocutuzumab (MCLA-128, Bizengri) — first-in-class
  HER2 × HER3 bispecific IgG1 — granted FDA accelerated approval
  4 Dec 2024 for advanced NSCLC and pancreatic NRG1+ post-prior systemic
  therapy. eNRGy phase-2 (Schram 2024; n=204): NSCLC ORR 33%, mDOR ~9
  months. RNA-NGS testing critical — DNA-only panels miss fusions in
  30-40% of cases. Candidate RF until pivotal trial-Source
  SRC-ENRGY-SCHRAM-2024 ingested.
definition_ua: >
  Фузія гена NRG1 (нейрегулін-1) при НДРЛ — переважно в інвазивній
  муцинозній аденокарциномі (~7-27% KRAS-WT IMA). Фузії NRG1
  створюють аберантне відображення ліганду, що активує сигналізацію
  гетеродимеру HER2-HER3. Зеноцутузумаб (MCLA-128, Bizengri) — перший
  у класі біспецифічний IgG1 HER2 × HER3 — отримав прискорене схвалення
  FDA 4 грудня 2024 для поширеного НДРЛ та раку підшлункової NRG1+
  після попередньої системної терапії. eNRGy фаза-2 (Schram 2024;
  n=204): НДРЛ ORR 33%, мDOR ~9 місяців. Тестування RNA-NGS критичне —
  DNA-only панелі пропускають фузії у 30-40% випадків. RF-кандидат
  до інгестії ключового джерела випробування SRC-ENRGY-SCHRAM-2024.

