notes: >
  Candidate RF — eNRGy trial-Source not yet ingested
  (SRC-ENRGY-SCHRAM-2024 flag for ingestion chunk). Routes 2L+ to
  zenocutuzumab 750 mg IV every 2 weeks. Highest NSCLC prevalence in
  invasive mucinous adenocarcinoma (~7-27% KRAS-WT IMA); rare in
  conventional adenocarcinoma. Testing methodology critical — RNA-NGS
  preferred (Archer FusionPlex, Oncomine Comprehensive Plus, FoundationOne
  CDx with RNA add-on). DNA-only panels report 30-40% false-negative
  rate due to NRG1 large-intron breakpoint variability. Reflex RNA-NGS
  recommended at progression in KRAS-WT IMA-NSCLC and KRAS-WT
  pancreatic. Priority 60 sits with other NSCLC fusion RFs (ALK 50,
  ROS1 50, RET 50, NTRK 50) — slightly lower because zenocutuzumab is
  2L (post-prior systemic therapy per FDA accelerated approval label),
  not 1L.
notes_ua: >
  Кандидатний RF — джерело випробування eNRGy ще не інгестоване
  (SRC-ENRGY-SCHRAM-2024 позначено для chunk інгестії). Маршрутизує
  2L+ до зеноцутузумабу 750 mg IV кожні 2 тижні. Найвища поширеність
  в НДРЛ — інвазивна муцинозна аденокарцинома (~7-27% KRAS-WT IMA);
  рідкісна в звичайній аденокарциномі. Методологія тестування критична —
  переважна RNA-NGS (Archer FusionPlex, Oncomine Comprehensive Plus,
  FoundationOne CDx з додатком RNA). DNA-only панелі повідомляють
  30-40% хибно-негативних через варіабельність точок розриву великих
  інтронів NRG1. Рефлекторна RNA-NGS рекомендована при прогресуванні
  в KRAS-WT IMA-НДРЛ та KRAS-WT панкреатичному. Пріоритет 60 разом з
  іншими RF фузій НДРЛ (ALK 50, ROS1 50, RET 50, NTRK 50) — трохи
  нижчий, оскільки зеноцутузумаб — 2L (післяпопередньої системної
  терапії за міткою прискореного схвалення FDA), а не 1L.
