id: RF-NSCLC-SVC-SYNDROME
definition: "NSCLC with superior vena cava syndrome: facial/upper-extremity edema, distended neck/chest veins, dyspnea, plethora, headache — most often right-upper-lobe / bulky mediastinal NSCLC"
definition_ua: "НМРЛ із SVC-синдромом: набряк обличчя/верхніх кінцівок, розширені вени шиї та грудної клітки, задишка, плетора, головний біль — найчастіше правоверхньодольовий / масивний медіастинальний НМРЛ"

trigger:
  type: composite
  any_of:
    - finding: "svc_syndrome_present"
      value: true
    - finding: "facial_upper_extremity_edema"
      value: true
    - finding: "distended_neck_veins"
      value: true

clinical_direction: hold

severity: critical
priority: 20
category: organ-dysfunction
relevant_diseases:
  - DIS-NSCLC
shifts_algorithm:
  - ALGO-NSCLC-METASTATIC-1L

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

last_reviewed: "2026-04-27"
draft: true
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  SVC syndrome occurs in ~5-10% of NSCLC at presentation. Per NCCN-NSCLC:
  emergency endovascular SVC stenting OR urgent palliative RT (30 Gy/10
  fx) is first-line stabilization; chemoradiation begun in parallel
  for limited-stage; systemic therapy started thereafter for metastatic.
  Direction HOLD on definitive systemic therapy until SVC obstruction
  relieved (stent or RT). Priority 12. STUB — requires clinical
  co-lead signoff.
notes_ua: >
  Синдром верхньої порожнистої вени виникає у ~5-10% НДРЛ при зверненні.
  За NCCN-NSCLC: невідкладне ендоваскулярне стентування ВПВ АБО термінова
  паліативна ПТ (30 Gy/10 фракцій) — стабілізація першої лінії; хіміопроменева
  терапія розпочинається паралельно при обмеженій стадії; системна терапія —
  після при метастатичному. Напрям «hold» на дефінітивну системну терапію до
  відновлення прохідності ВПВ (стент або ПТ). Пріоритет 12. STUB — потребує
  клінічного підпису провідного спеціаліста.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_10
