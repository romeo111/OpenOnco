id: RF-OLIGOMET-DEFINITION
definition: >
  Oligometastatic esophagogastric adenocarcinoma per OMEC-1 (OligoMetastatic
  Esophagogastric Cancer) European Delphi consensus (Kroese et al., Eur J
  Cancer 2023, PMID 36947929). Defined as ≤3 distant metastatic lesions
  amenable to local therapy in a patient with controllable primary disease
  and ECOG 0-1 fitness. Excluded scenarios: peritoneal carcinomatosis,
  leptomeningeal disease, >3 brain metastases. RENAISSANCE / AIO-FLOT5 trial
  (NCT02578368) eligibility narrower: ≤1 incurable organ-system involvement,
  no ascites, ≤1 retroperitoneal LN station — uses FLOT chemo ± surgical
  resection (gastrectomy/oesophagectomy + metastasectomy). Triggers MDT
  consideration of metastasis-directed local therapy (metastasectomy or
  SBRT) added to systemic chemo, and registration on RENAISSANCE-pattern
  trials where available.
definition_ua: >
  Олігометастатична езофагогастральна аденокарцинома за консенсусом OMEC-1
  (OligoMetastatic Esophagogastric Cancer) European Delphi (Kroese et al.,
  Eur J Cancer 2023, PMID 36947929). Визначення: ≤3 дистантних
  метастатичних вогнищ, придатних до локальної терапії, у пацієнта з
  контрольованим первинним вогнищем та ECOG 0-1. Виключення: перитонеальний
  карциноматоз, лептоменінгеальне ураження, >3 мозкових метастазів. Критерії
  RENAISSANCE / AIO-FLOT5 (NCT02578368) вужчі: ≤1 incurable orган-система,
  без асциту, ≤1 ретроперитонеальної ЛВ-станції — FLOT хіміо ± хірургічна
  резекція (гастректомія/езофагектомія + метастазектомія). Запускає
  MDT-обговорення метастазо-направленої локальної терапії (метастазектомія
  або SBRT) у поєднанні з системною хіміо, та включення до RENAISSANCE-
  подібних протоколів за наявності.

trigger:
  type: composite_score
  all_of:
    - finding: "distant_metastasis_count"
      threshold: 3
      comparator: "<="
    - finding: "ecog_performance_status"
      threshold: 1
      comparator: "<="
    - finding: "primary_tumor_controllable"
      value: true
    - finding: "all_metastatic_sites_amenable_to_local_therapy"
      value: true
  none_of:
    - finding: "peritoneal_carcinomatosis"
      value: true
    - finding: "leptomeningeal_disease"
      value: true
    - finding: "brain_metastases_count_gt_3"
      value: true

