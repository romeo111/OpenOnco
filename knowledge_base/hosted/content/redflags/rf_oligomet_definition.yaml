notes: >
  OMEC-1 consensus criteria (Kroese et al., Eur J Cancer 2023):
    1. ≤3 distant metastatic lesions (primary numerical threshold).
    2. Includes metachronous oligo-recurrence ≥6 months after curative-
       intent treatment.
    3. Required diagnostic workup: PET/CT, EUS, brain MRI for symptomatic
       patients.
    4. Required clinical fitness: ECOG 0-1, controllable primary, all
       metastatic sites amenable to local therapy (metastasectomy or
       SBRT).
    5. Excluded: peritoneal carcinomatosis, leptomeningeal disease, >3
       brain metastases.

  RENAISSANCE / AIO-FLOT5 (NCT02578368) eligibility is narrower than
  OMEC-1 consensus and represents the trial-grade cutoff:
    - ≤1 incurable organ-system involvement (e.g. liver-only OR
      retroperitoneal-LN-only).
    - No ascites.
    - ≤1 retroperitoneal lymph-node station.
    - Adequate response to induction FLOT before randomisation to
      surgery vs continued FLOT.

  Note on SOURCE ID year: SRC-OMEC-1-KROESE-2018 ID assigned with year
  2018 in the upstream manifest; the actual Delphi consensus paper was
  published 2023 (PMID 36947929; protocol companion 2022 PMID 36184420).
  ID preserved verbatim per chunk-specs and #400 backlog rename
  consideration; do not edit ID here.

  Local-therapy entities (metastasectomy Surgery, SBRT RadiationCourse)
  for oligomet are future Phase C extensions — not yet in KB. RF triggers
  MDT review and routes to oligomet indications which describe sequence
  in notes/description text rather than typed phases (§17 phases skipped
  for v0.1; planning doc gi2_wave §4.5 + §17 ratification 2026-05-07).

  Algorithm wiring deferred: shifts_algorithm intentionally empty.
  Existing ALGO-GASTRIC-METASTATIC-1L and esoph metastatic algorithms
  do not yet have an oligomet branch. D2 follow-up: extend algorithms
  with oligomet decision step gated by RF-OLIGOMET-DEFINITION → routes
  to IND-GASTRIC-OLIGOMET-SYSTEMIC-PLUS-LOCAL or
  IND-ESOPH-OLIGOMET-SYSTEMIC-PLUS-LOCAL.

  Engine smoke (synthetic patient: gastric, mets=liver_2_lesions +
  1_lymph_node, ECOG 1, primary_controllable=true): does not currently
  route via existing 1L algorithm steps. RF fires, but no algorithm
  branch consumes it yet — D2 algorithm-extension chunk needed to wire.
notes_ua: >
  Критерії OMEC-1 (Kroese et al., Eur J Cancer 2023):
    1. ≤3 дистантних метастатичних вогнищ (основний числовий поріг).
    2. Включає метахронну олігорецидивність ≥6 місяців після лікування
       з куративною метою.
    3. Обов'язковий діагностичний workup: PET/CT, EUS, MRI головного
       мозку для симптомних пацієнтів.
    4. Обов'язкова клінічна придатність: ECOG 0-1, контрольоване
       первинне вогнище, всі метастатичні вогнища доступні локальній
       терапії (метастазектомія або SBRT).
    5. Виключення: перитонеальний карциноматоз, лептоменінгеальне
       ураження, >3 мозкових метастазів.

  RENAISSANCE / AIO-FLOT5 (NCT02578368): критерії вужчі за OMEC-1
  консенсус та представляють trial-grade cutoff:
    - ≤1 incurable orгано-система (напр., тільки печінка АБО тільки
      ретроперитонеальна ЛВ).
    - Без асциту.
    - ≤1 ретроперитонеальної ЛВ-станції.
    - Адекватна відповідь на індукційний FLOT перед рандомізацією на
      хірургію vs продовження FLOT.
