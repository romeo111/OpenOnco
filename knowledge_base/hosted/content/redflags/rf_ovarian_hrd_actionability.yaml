id: RF-OVARIAN-HRD-ACTIONABILITY
definition: >
  HRD-positive (BRCA1/2 mutation OR Genomic Instability Score ≥42)
  high-grade serous ovarian carcinoma. Treatment-defining for PARPi
  maintenance after platinum-based induction. Olaparib (SOLO-1 BRCA-only,
  PAOLA-1 with bev) + niraparib (PRIMA all-comer) substantially improve
  PFS in HRD-positive subset.
definition_ua: >
  HRD-позитивна (BRCA1/2 мутація АБО Genomic Instability Score ≥42)
  high-grade серозна карцинома яєчників. Визначає вибір PARPi-підтримки
  після індукції на основі платини.

trigger:
  type: biomarker
  any_of:
    - finding: "hrd_status"
      value: "HRD-positive"
    - finding: "brca1_brca2_pathogenic"
      value: true

clinical_direction: intensify

severity: critical
priority: 60
category: high-risk-biology

relevant_diseases:
  - DIS-OVARIAN
shifts_algorithm:
  - ALGO-OVARIAN-ADVANCED-1L

sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024

last_reviewed: "2026-04-26"
draft: false

notes: >
  HRD testing on FFPE tumor + paired germline. Reflex BRCA → if WT,
  proceed to GIS scoring. SOLO-1: BRCA-mut maintenance olaparib mPFS
  56 vs 14 mo. PAOLA-1: HRD-positive (BRCA-mut OR GIS+) bev+olap
  mPFS 37 vs 22 mo. PRIMA: niraparib all-comer maintenance benefit
  weighted toward HRD+ subset.
notes_ua: >
  Тестування HRD на FFPE-пухлині + парна гермінальна. Рефлекс BRCA → при WT
  переходять до GIS-скорингу. SOLO-1: підтримуючий олапариб при BRCA-мут мПФВ
  56 проти 14 міс. PAOLA-1: HRD-позитивні (BRCA-мут АБО GIS+) бев+олапариб
  мПФВ 37 проти 22 міс. PRIMA: нірапариб підтримуючий ефект у всіх популяціях,
  найбільший у HRD+ підгрупі.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_10
