id: RF-PAN-CTDNA-MRD-POSITIVE
definition: >
  Post-treatment ctDNA-detected molecular residual disease (MRD) — any
  positive call by a tumor-informed (Signatera, RaDaR) or tumor-agnostic
  liquid-biopsy assay after curative-intent surgery / chemoradiation, in
  the absence of imaging-detectable disease. Tumor-type-agnostic concept;
  best validated in resected stage II-III colon cancer (GALAXY /
  CIRCULATE-Japan, Kotani Nat Med 2023; ALTAIR planned readout) — ctDNA-
  positive at week 4 post-op carries 6-12× higher 24-month recurrence
  hazard vs ctDNA-negative, identifying the subgroup that benefits from
  adjuvant chemo intensification (oxaliplatin-doublet vs observation,
  pending randomized confirmation). Emerging evidence in muscle-
  invasive bladder (IMvigor010 ctDNA subgroup, atezolizumab benefit
  restricted to ctDNA+), early breast (c-TRAK-TN, talazoparib re-
  initiation), early NSCLC (LIBRETTO-001 surveillance), and resected
  HR+ breast (lead-time over imaging by 6-18 months in retrospective
  series). Action: escalate surveillance cadence, eligibility for
  adjuvant intensification trials, or consideration of switch-therapy
  if recurrence is biopsy-confirmed.
definition_ua: >
  Після-лікувальна ctDNA-виявлена молекулярна залишкова хвороба (МЗХ) —
  будь-який позитивний результат tumor-informed (Signatera, RaDaR) або
  tumor-agnostic liquid-biopsy аналізу після куративної хірургії /
  хіміопроменевої терапії, при відсутності візуалізаційно-виявленої
  хвороби. Tumor-type-agnostic концепція; найкраще валідована при
  резектованому раку товстої кишки стадії II-III (GALAXY / CIRCULATE-
  Japan, Kotani Nat Med 2023; ALTAIR — заплановані дані) — ctDNA-
  позитивний на 4-му тижні після операції несе 6-12× вищий 24-міс
  ризик рецидиву vs ctDNA-негативний, ідентифікуючи підгрупу, що
  отримує користь від інтенсифікації ад'юванта (oxaliplatin-дублет
  vs спостереження, очікуються рандомізовані дані). Накопичуються
  дані при м'язово-інвазивному раку сечового міхура (IMvigor010
  ctDNA-підгрупа, атезолізумаб лише при ctDNA+), ранньому РМЗ
  (c-TRAK-TN, повторне призначення талазопарибу), ранньому НДРЛ
  (LIBRETTO-001 нагляд), і резектованому HR+ РМЗ (випередження
  візуалізації на 6-18 міс у ретроспективі). Дія: ескалація частоти
  нагляду, eligibility до досліджень інтенсифікації ад'юванта, або
  розгляд switch-терапії при біопсійно-підтвердженому рецидиві.

