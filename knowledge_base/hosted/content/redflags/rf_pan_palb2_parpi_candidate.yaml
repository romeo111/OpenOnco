id: RF-PAN-PALB2-PARPI-CANDIDATE
definition: >
  Germline PALB2 pathogenic variant — BRCA2's recruitment partner;
  biallelic LOF produces an HRR-deficient phenotype. Pan-tumor PARPi
  candidate signal weaker than gBRCA1/2 but emerging. Disease
  applicability: breast (lifetime risk ~35-55%, NCCN high-penetrance —
  PARPi off-label / investigational), PDAC (~3-5x baseline risk, POLO
  label is gBRCA-only but PALB2 frequently grouped clinically),
  prostate mCRPC (cohort-B in PROfound HRR-non-BRCA/ATM — smaller
  absolute olaparib benefit but PARPi remains an option per NCCN 2025).
  Genetic counseling + cascade testing of first-degree relatives
  required.
definition_ua: >
  Зародкова патогенна варіація PALB2 — партнер з рекрутингу BRCA2;
  біалельна LOF дає HRR-дефіцитний фенотип. Пан-пухлинний сигнал
  кандидата на PARPi слабший, ніж gBRCA1/2, але такий, що з'являється.
  Застосовність: РМЗ (ризик ~35-55%, високопенетрантний за NCCN — PARPi
  off-label / дослідницький), PDAC (~3-5х базовий ризик, мітка POLO
  лише gBRCA, але PALB2 часто групують клінічно), простата мКРРПЗ
  (когорта-B у PROfound HRR-не-BRCA/ATM — менший абсолютний виграш на
  олапарибі, але PARPi залишається опцією за NCCN 2025). Обов'язкове
  генетичне консультування + каскадне тестування родичів першого
  ступеня.

trigger:
  type: biomarker
  any_of:
    - finding: "palb2_germline"
      value: "pathogenic"
    - finding: "palb2_status"
      value: "pathogenic"
    - finding: "germline_palb2"
      value: "pathogenic"
    - finding: "palb2_pathogenic"
      value: true

clinical_direction: intensify

severity: major
priority: 65
category: high-risk-biology

relevant_diseases:
  - DIS-BREAST
  - DIS-PDAC
  - DIS-PROSTATE
shifts_algorithm: []

sources:
  - SRC-PROFOUND-DEBONO-2020
  - SRC-NCCN-BREAST-2025
  - SRC-NCCN-PANCREATIC-2025
  - SRC-NCCN-PROSTATE-2025

last_reviewed: "2026-04-29"
draft: false

notes: >
  References BIO-PALB2-GERMLINE. Surveillance recommendations: enhanced
  breast screening (annual MRI from age 30), pancreatic surveillance per
  CAPS consortium when family history present. RF distinct from
  RF-BREAST-BRCA-GERMLINE-ACTIONABLE (BRCA-specific) and
  RF-PROSTATE-HIGH-RISK-BIOLOGY (which captures HRR pathway broadly via
  hrr_pathway_mutation key but does not key on palb2_germline directly).
  No NCCN hereditary-cancer panel source exists in KB — using
  disease-specific NCCN sources instead; flagged in commit body.
notes_ua: >
  Посилається на BIO-PALB2-GERMLINE. Рекомендації спостереження:
  посилений скринінг РМЗ (щорічна МРТ з 30 років), панкреатичне
  спостереження за CAPS-консорціумом за наявності сімейного анамнезу.
  RF відрізняється від RF-BREAST-BRCA-GERMLINE-ACTIONABLE (BRCA-специфічний)
  та RF-PROSTATE-HIGH-RISK-BIOLOGY (який охоплює HRR-шлях широко через
  ключ hrr_pathway_mutation, але не на palb2_germline напряму).
