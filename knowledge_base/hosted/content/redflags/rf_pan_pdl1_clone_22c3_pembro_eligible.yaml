last_reviewed: "2026-04-29"
draft: false

notes: >
  **Why clone identity matters (Blueprint PD-L1 Comparison summary):**

  Clone | Platform | Companion drug | Interchangeable for TPS? |
  Interchangeable for CPS?
  --------------------------------------------------------------
  22C3 | Dako Autostainer Link 48 | pembrolizumab | reference |
  reference
  28-8 | Dako | nivolumab | yes (TPS within 5%) | not validated for
  pembro-CPS thresholds
  SP263 | Ventana BenchMark | durvalumab / atezolizumab (some) |
  yes (TPS within 5%) | not validated for pembro-CPS thresholds
  SP142 | Ventana | atezolizumab | NO — under-stains tumor cells,
  separate "IC%" score | NO

  **Indication-specific 22C3 cut-points (pembrolizumab):**
  - NSCLC 1L mono: TPS ≥50 (KEYNOTE-024)
  - NSCLC 1L combo eligibility: TPS ≥1 (KEYNOTE-189 / -407)
  - Gastric / GEJ adeno 1L combo: CPS ≥1 (KEYNOTE-859); FDA
    pivot to ≥5 in subgroups (label evolution 2024)
  - Esophageal squamous 1L combo: CPS ≥10 (KEYNOTE-590)
  - TNBC 1L combo: CPS ≥10 (KEYNOTE-355)
  - Cervical 1L combo: CPS ≥1 (KEYNOTE-826)
  - H&N squamous 1L: CPS ≥1 (KEYNOTE-048 mono); CPS ≥20 mono-
    superior subgroup
  - Urothelial 1L: CPS ≥10 (KEYNOTE-052 cisplatin-ineligible);
    label evolution 2024 narrowed mono use

  **Action when this RF fires:**
  1. Confirm 22C3 clone on the IHC report (look for "Dako pharmDx"
     or kit lot reference).
  2. If non-22C3 clone (28-8 / SP263 / SP142 / lab-developed) and a
     pembrolizumab-CPS-driven indication is being considered → request
     22C3 reflex on existing FFPE block (turnaround 3-7 days at most
     reference labs).
  3. If 22C3 unavailable in the testing region (resource-limited
     setting), document substitution-rationale + cite the Blueprint
     concordance data + accept ~5-10% mis-classification risk; prefer
     CPS-anchored indications where ≥10 cut-point provides safety
     margin over the discordance band.
  4. **Atezolizumab caveat:** SP142 IC≥1% (TNBC pre-IMpassion130-
     withdrawal; HCC + NSCLC select indications) — that is its own
     workflow; the SP142 platform is NOT interchangeable with 22C3
     for any pembrolizumab decision. Treat atezolizumab eligibility
     as a separate biomarker workflow.

  **Negative space (when NOT to fire):**
  - PD-L1-negative result by 22C3 (TPS / CPS below cut-point) —
    distinct RF (PD-L1-negative may still indicate combo IO + chemo
    in NSCLC / TNBC; not a clone-disambiguation issue).
  - SP142 (atezolizumab) result with TNBC question — informational
    only post-IMpassion130 label withdrawal (US 2021); pembrolizumab +
    chemo (KEYNOTE-355) is the SOC pivot, requires 22C3 CPS≥10.

  **Why pan-tumor relevant_diseases:** The clone-identity disambiguation
  is identical across all CPS-anchored pembrolizumab indications;
  encoding per-disease would duplicate the same logic. Disease-specific
  cut-points and algorithm-branching live in the per-indication RFs
  (e.g., RF-NSCLC-PDL1-50-PLUS, RF-GASTRIC-PDL1-CPS-1-PLUS, RF-
  CERVICAL-PDL1-CPS-1-PLUS) which assume 22C3 as the reference clone.
notes_ua: >
  **Чому ідентичність клону важлива (Blueprint PD-L1 Comparison):**

  Клон | Платформа | Companion-препарат | Взаємозамін. TPS? |
  Взаємозамін. CPS?
  --------------------------------------------------------------
  22C3 | Dako Autostainer Link 48 | пембролізумаб | reference |
  reference
  28-8 | Dako | ніволумаб | так (TPS ±5%) | не валідовано для
  pembro-CPS порогів
  SP263 | Ventana BenchMark | дурвалумаб / атезолізумаб | так
  (TPS ±5%) | не валідовано для pembro-CPS порогів
  SP142 | Ventana | атезолізумаб | НІ — недо-фарбує пухлинні клітини,
  окремий "IC%" скор | НІ

  **Індикаційно-специфічні 22C3 cut-points (пембролізумаб):**
  - НДРЛ 1L моно: TPS ≥50 (KEYNOTE-024)
  - НДРЛ 1L комбо eligibility: TPS ≥1 (KEYNOTE-189 / -407)
  - Gastric / GEJ адено 1L комбо: CPS ≥1 (KEYNOTE-859); FDA-зсув
    до ≥5 у підгрупах (еволюція label 2024)
  - Стравохідна плоскоклітинна 1L комбо: CPS ≥10 (KEYNOTE-590)
  - TNBC 1L комбо: CPS ≥10 (KEYNOTE-355)
  - Шийкова 1L комбо: CPS ≥1 (KEYNOTE-826)
  - H&N плоскоклітинна 1L: CPS ≥1 (KEYNOTE-048 моно); CPS ≥20
    моно-superior підгрупа
  - Уротеліальна 1L: CPS ≥10 (KEYNOTE-052 cisplatin-ineligible);
    еволюція label 2024 звузила mono-використання

  **Дія при спрацюванні RF:**
  1. Підтвердити 22C3 клон у звіті ІГХ (шукати "Dako pharmDx" або
     посилання на kit lot).
  2. Якщо не-22C3 клон (28-8 / SP263 / SP142 / lab-developed) і
     розглядається pembrolizumab-CPS-driven індикація → запит
     22C3 reflex на існуючому FFPE-блоці (turnaround 3-7 днів у
     більшості референс-лабораторій).
  3. Якщо 22C3 недоступний у регіоні тестування (ресурс-обмежене
     середовище), задокументувати обґрунтування заміни + цитувати
     Blueprint-конкордантність + прийняти ~5-10% ризик
     мискласифікації; обирати CPS-якірні індикації, де cut-point
     ≥10 створює запас безпеки понад зону розбіжності.
  4. **Засторога atezolizumab:** SP142 IC≥1% (TNBC до-IMpassion130-
     withdrawal; HCC + НДРЛ окремі індикації) — окремий workflow;
     SP142-платформа НЕ взаємозамінна з 22C3 для жодного
     pembrolizumab-рішення. Eligibility на atezolizumab — окремий
     біомаркер-workflow.

  **Negative space (коли НЕ спрацьовувати):**
  - PD-L1-негативний результат за 22C3 (TPS / CPS нижче cut-point) —
    окремий RF (PD-L1-негативний може все одно показувати combo IO +
    хіміо у НДРЛ / TNBC; це не питання disambiguation клону).
  - SP142 (atezolizumab) результат з TNBC-питанням — лише
    інформаційно після відкликання IMpassion130 label (США 2021);
    пембролізумаб + хіміо (KEYNOTE-355) — SOC-зсув, потребує 22C3
    CPS≥10.

  **Чому pan-tumor relevant_diseases:** disambiguation ідентичності
  клону — однаковий для всіх CPS-якірних pembrolizumab-індикацій;
  кодування per-disease дублювало б ту ж логіку. Disease-specific
  cut-points + гілкування алгоритму живуть у per-indication RFs
  (напр., RF-NSCLC-PDL1-50-PLUS, RF-GASTRIC-PDL1-CPS-1-PLUS,
  RF-CERVICAL-PDL1-CPS-1-PLUS), що припускають 22C3 як референс-клон.
