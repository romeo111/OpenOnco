id: RF-PAN-PDL1-CLONE-22C3-PEMBRO-ELIGIBLE
definition: >
  PD-L1 IHC result generated using the Dako 22C3 pharmDx clone — the
  FDA-approved companion-diagnostic clone for pembrolizumab indications
  across NSCLC (TPS), gastric / GEJ adenocarcinoma (CPS), esophageal
  squamous (CPS), urothelial (CPS), TNBC (CPS), cervical (CPS), and
  H&N squamous (CPS). Clone-platform identity matters because the
  Blueprint PD-L1 Comparison phase 1 + 2 studies (Hirsch JTO 2017;
  Tsao JTO 2018) showed 22C3 / 28-8 / SP263 as analytically near-
  equivalent for tumor-cell staining (NSCLC TPS), but SP142 (Ventana,
  atezolizumab CDx) markedly under-stains tumor cells and is NOT
  interchangeable. CPS (combined positive score; tumor + lymphocyte +
  macrophage staining) is operationally clone-22C3-anchored across
  pembrolizumab indications — substituting SP263 / 28-8 / SP142 for
  CPS-driven indication selection is off-label. Action: confirm 22C3
  on the report; if a non-22C3 clone is the only PD-L1 source for a
  pembrolizumab-CPS-driven decision (gastric CPS≥1/5, cervical CPS≥1,
  TNBC CPS≥10, H&N CPS≥1, urothelial CPS≥10), recommend 22C3 reflex
  test on the same FFPE block.
definition_ua: >
  Результат PD-L1 ІГХ, отриманий клоном Dako 22C3 pharmDx — FDA-
  схвалений companion-діагностичний клон для індикацій пембролізумабу
  при НДРЛ (TPS), gastric / GEJ-аденокарциномі (CPS), стравохідній
  плоскоклітинній (CPS), уротеліальній (CPS), TNBC (CPS), шийковій
  (CPS), H&N плоскоклітинній (CPS). Ідентичність клон-платформи має
  значення, бо дослідження Blueprint PD-L1 Comparison phase 1 + 2
  (Hirsch JTO 2017; Tsao JTO 2018) показали 22C3 / 28-8 / SP263 як
  аналітично майже еквівалентні для забарвлення пухлинних клітин
  (TPS у НДРЛ), але SP142 (Ventana, атезолізумаб-CDx) суттєво
  недо-фарбує пухлинні клітини і НЕ взаємозамінний. CPS (combined
  positive score; пухлина + лімфоцит + макрофаг) операційно якорено
  клоном 22C3 для всіх pembrolizumab-індикацій — заміна SP263 / 28-8
  / SP142 для CPS-driven вибору індикації — off-label. Дія: підтвердити
  22C3 у звіті; якщо не-22C3 клон — єдине джерело PD-L1 для
  pembrolizumab-CPS-driven рішення (gastric CPS≥1/5, cervical CPS≥1,
  TNBC CPS≥10, H&N CPS≥1, urothelial CPS≥10), рекомендувати 22C3
  reflex-тест на тому ж FFPE-блоці.

