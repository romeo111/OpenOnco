id: RF-PROSTATE-AR-AMP-ARSI-RESISTANCE
definition: >
  AR (androgen receptor) gene amplification detected on tumor or ctDNA
  NGS in mCRPC — INFORMATIONAL signal of mechanistic ARSI resistance.
  AR amplification is one of the most common acquired resistance
  mechanisms to abiraterone / enzalutamide / apalutamide / darolutamide;
  detected in ~30-50% of post-ARSI mCRPC ctDNA samples. AR-amp argues
  against ARSI-after-ARSI sequencing (limited cross-class benefit) and
  for early switch to taxane chemotherapy (docetaxel, cabazitaxel) or
  radioligand 177Lu-PSMA-617 (if PSMA-PET-positive). FDA has NOT
  approved any therapy decision keyed on AR-amp status — surfaces in
  MDT brief to flag patients in whom further ARSI escalation is
  unlikely to add benefit. Companion to RF-PROSTATE-AR-V7-ARSI-RESISTANCE
  (AR-V7 splice variant); both detect distinct facets of AR-driven
  resistance.
definition_ua: >
  Ампліфікація гена AR (рецептора андрогену), виявлена на пухлинному
  або ctDNA NGS при мКРРПЗ — ІНФОРМАЦІЙНИЙ сигнал механістичної
  резистентності до ARSI. Ампліфікація AR — один з найпоширеніших
  набутих механізмів резистентності до абіратерону / ензалутаміду /
  апалутаміду / даролутаміду; виявляється в ~30-50% зразків ctDNA
  мКРРПЗ після ARSI. AR-amp — аргумент проти послідовності ARSI-після-ARSI
  (обмежений виграш у межах класу) і за ранній перехід на таксанову
  хіміотерапію (доцетаксел, кабазітаксел) або радіоліганд 177Lu-PSMA-617
  (за PSMA-PET-позитивності). FDA НЕ схвалив жодного терапевтичного
  рішення на основі AR-amp — з'являється в MDT-брифі, щоб позначити
  пацієнтів, у яких подальше підсилення ARSI малоймовірно додасть виграш.
  Парний до RF-PROSTATE-AR-V7-ARSI-RESISTANCE (AR-V7 сплайс-варіант);
  обидва виявляють різні аспекти AR-керованої резистентності.

trigger:
  type: biomarker
  any_of:
    - finding: "ar_amplification"
      value: "positive"
    - finding: "ar_amp"
      value: "positive"
    - finding: "ar_copy_number"
      value: "amplified"
    - finding: "androgen_receptor_amplification"
      value: "positive"

clinical_direction: investigate

severity: major
priority: 80
category: high-risk-biology

relevant_diseases:
  - DIS-PROSTATE
# Informational — does NOT shift any algorithm in this chunk. Tx-modifying
# branch ("ARSI-amp → taxane / 177Lu-PSMA-617") would require new IND
# wiring; deferred. RF surfaces in MDT brief only.
shifts_algorithm: []

sources:
  - SRC-NCCN-PROSTATE-2025
  - SRC-ESMO-PROSTATE-2024
  - SRC-EAU-PROSTATE-2024

last_reviewed: "2026-04-29"
draft: false

notes: >
  References BIO-AR-AMPLIFICATION. Detection: ctDNA NGS (Guardant360,
  FoundationOne Liquid CDx) is the practical platform — tumor biopsy
  in mCRPC frequently fails (bone-only disease, low cellularity).
  Co-occurring resistance markers include AR-V7 splice variant, AR LBD
  point mutations (L702H, T878A, F877L), and lineage plasticity
  (neuroendocrine transformation). Priority 76 chosen to fall just
  below RF-PROSTATE-AR-V7-ARSI-RESISTANCE (75) — both are
  informational and complementary; AR-V7 evidence (PROPHECY)
  prospectively validated, AR-amp evidence largely retrospective
  ctDNA cohorts. KB scope choice: ships as biomarker + RF
  (informational) only — no new IND, no algorithm step. Tx-modifying
  signal deferred to a future taxane-mCRPC IND chunk that branches on
  AR-amp / AR-V7 / LBD-mutation status.
notes_ua: >
  Посилається на BIO-AR-AMPLIFICATION. Виявлення: ctDNA NGS
  (Guardant360, FoundationOne Liquid CDx) — практична платформа;
  пухлинна біопсія при мКРРПЗ часто невдала (кістково-обмежене
  ураження, низька клітинність). Супутні маркери резистентності:
  сплайс-варіант AR-V7, точкові мутації AR LBD (L702H, T878A, F877L),
  лінійна пластичність (нейроендокринна трансформація). Пріоритет 76
  обрано трохи нижче RF-PROSTATE-AR-V7-ARSI-RESISTANCE (75) — обидва
  інформаційні та доповнюючі; докази AR-V7 (PROPHECY) проспективно
  валідовані, докази AR-amp здебільшого ретроспективні ctDNA-когорти.
