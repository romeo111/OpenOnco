id: RF-PROSTATE-AR-V7-ARSI-RESISTANCE
definition: >
  AR-V7 (androgen receptor splice variant 7) detected in CTCs / ctDNA
  in mCRPC — predictive marker of ARSI (abiraterone, enzalutamide,
  apalutamide, darolutamide) failure. PROPHECY (Antonarakis 2019):
  AR-V7-positive on Epic CTC IHC associated with HR ~3 for inferior
  PFS/OS on ARSI vs AR-V7-negative; switch to taxane (docetaxel,
  cabazitaxel) recovers responses. INFORMATIONAL — FDA has NOT
  approved any therapy decision keyed on AR-V7; surfaces in MDT brief
  to flag patients in whom ARSI-after-ARSI is unlikely to work.
definition_ua: >
  AR-V7 (сплайс-варіант 7 рецептора андрогену), виявлений у CTC /
  ctDNA при мКРРПЗ — предиктивний маркер невдачі ARSI (абіратерон,
  ензалутамід, апалутамід, даролутамід). PROPHECY (Antonarakis 2019):
  AR-V7-позитивні на Epic CTC IHC мають HR ~3 для гіршого ПФВ/ЗВ на
  ARSI порівняно з AR-V7-негативними; перехід на таксан (доцетаксел,
  кабазітаксел) відновлює відповіді. ІНФОРМАЦІЙНИЙ — FDA НЕ схвалив
  жодного терапевтичного рішення на основі AR-V7; з'являється в
  MDT-брифі для позначення пацієнтів, у яких ARSI-після-ARSI
  малоймовірно працюватиме.

trigger:
  type: biomarker
  any_of:
    - finding: "ar_v7"
      value: "positive"
    - finding: "ar_v7_ctc"
      value: "positive"
    - finding: "ar_v7_status"
      value: "positive"
    - finding: "androgen_receptor_splice_variant_7"
      value: "positive"

clinical_direction: investigate

severity: major
priority: 80
