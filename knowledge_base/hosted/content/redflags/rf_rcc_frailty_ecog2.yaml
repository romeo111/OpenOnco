id: RF-RCC-FRAILTY-ECOG2
category: frailty-age
severity: major
priority: 80

definition: >
  Advanced/metastatic RCC patient with ECOG PS 2 or significant comorbidities
  reducing tolerability of high-intensity ICI+TKI combinations (lenvatinib+pembrolizumab
  in particular). ECOG 2 = ambulatory and capable of self-care but unable to carry
  out any work activities; up and about >50% of waking hours.
  Lenvatinib+pembrolizumab (CLEAR trial) has higher rates of G3-4 toxicity than
  nivolumab+ipilimumab or pembrolizumab+axitinib — ECOG 2 increases risk of early
  dose modification / treatment discontinuation and shifts the benefit-risk ratio
  toward less intense TKI backbone (cabozantinib, axitinib) or ICI-doublet.

definition_ua: >
  Пацієнт з метастатичним ПКК та ECOG ПС 2 або значними коморбідностями, що
  знижують переносимість комбінацій ІКТ+ТKI (особливо ленватиніб+пембролізумаб).
  ECOG 2 збільшує ризик раннього переривання ленватинібу (токсичність G3-4 >50%
  в CLEAR) — перевага для менш інтенсивних TKI-основ (кабозантиніб, акситиніб)
  або ІКТ-дублета нів+іпі.

trigger:
  type: composite_score
  any_of:
  - finding: ecog
    threshold: 2
    comparator: ">="
  - finding: performance_status_ecog
    threshold: 2
    comparator: ">="
  - all_of:
    - finding: age
      threshold: 70
      comparator: ">="
    - finding: comorbidity_count
      threshold: 2
      comparator: ">="

clinical_direction: de-escalate

shifts_algorithm:
- ALGO-RCC-METASTATIC-1L

relevant_diseases:
- DIS-RCC

sources:
- SRC-NCCN-KIDNEY-2025
- SRC-CLEAR-MOTZER-2021
notes: >
  In the CLEAR trial, lenvatinib+pembrolizumab had the highest ORR (~71%) but also
  the highest G3-4 toxicity (71.8%) and dose modification rate (68.8%) of the
  1L regimens. ECOG 2 patients were included (PS 0-2) but post-hoc tolerability
  data suggest they experience disproportionate toxicity. Preferred alternatives
  for ECOG 2: pembro+axitinib (KEYNOTE-426 had ECOG 0-2; well-tolerated) or
  nivo+ipi (for IMDC intermediate/poor, ECOG 0-1 per CM-214 eligibility — but
  observed up to ECOG 2 in compassionate use). Cabozantinib-based combos (nivo+cabo)
  also acceptable. Engine should down-weight lenv+pembro when ECOG 2 fires.

notes_ua: >
  Ленватиніб+пембролізумаб має найвищий показник токсичності G3-4 (71.8%) з усіх
  режимів 1L при ПКК (CLEAR). При ECOG 2: пребролізумаб+акситиніб (KEYNOTE-426
  включав ECOG 0-2) або ніволумаб+іпілімумаб (IMDC int/poor) — кращі альтернативи.

