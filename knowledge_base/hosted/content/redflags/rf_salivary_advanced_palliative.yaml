id: RF-SALIVARY-ADVANCED-PALLIATIVE
definition: "Metastatic salivary gland carcinoma with ECOG ≥3 OR rapid progression — palliative supportive care + symptom-directed RT only."
definition_ua: "Метастатична карцинома слинних залоз з ECOG ≥3 АБО швидке прогресування — паліативна допомога + симптоматична RT."

trigger:
  type: composite_clinical
  all_of:
    - finding: "stage"
      threshold: "metastatic"
      comparator: "=="
    - any_of:
        - finding: "ecog_status"
          threshold: 3
          comparator: ">="
        - finding: "rapid_progression"
          threshold: true
          comparator: "=="

clinical_direction: de-escalate
severity: major
priority: 100
category: frailty-age

relevant_diseases: [DIS-SALIVARY]

sources:
  - SRC-NCCN-HEAD-AND-NECK
  - SRC-ESMO-SALIVARY

last_reviewed: '2026-04-30'
draft: false

reviewer_signoffs:
  - reviewer_id: REV-DENISOVA-OLGA
    timestamp: "2026-04-30T13:30:00Z"
    rationale: "Reviewed palliative de-escalation criteria; metastatic salivary gland carcinoma with ECOG ≥3 or rapid progression has no OS-positive SoC — BSC + palliative RT aligns with NCCN Head-and-Neck + ESMO Salivary guidance."

notes: >
  Salivary gland cancer histologically diverse. Metastatic disease has
  no SoC with proven OS benefit — palliative taxane+platinum most-used.
  Frailty/ECOG ≥3 → BSC + palliative RT only.
notes_ua: >
  Рак слинних залоз є гістологічно різноманітним. Метастатичне захворювання не
  має стандарту лікування з доведеним виграшем у загальній виживаності —
  паліативний таксан+платина є найпоширенішим. Слабкість/ECOG ≥3 → кращий
  підтримуючий догляд + паліативна ПТ.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_10
draft_revision: 2
