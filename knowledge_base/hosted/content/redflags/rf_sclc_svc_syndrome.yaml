id: RF-SCLC-SVC-SYNDROME
definition: "Small-cell lung cancer with superior vena cava syndrome: facial/upper-extremity edema, distended neck veins, dyspnea, plethora — SCLC is a top oncologic cause of SVC syndrome (alongside NSCLC and lymphoma)"
definition_ua: "Дрібноклітинний рак легені із SVC-синдромом: набряк обличчя/верхніх кінцівок, розширені вени шиї, задишка, плетора — ДКРЛ є провідною онкологічною причиною SVC-синдрому"

trigger:
  type: composite
  any_of:
    - finding: "svc_syndrome_present"
      value: true
    - finding: "facial_upper_extremity_edema"
      value: true
    - finding: "distended_neck_veins"
      value: true

clinical_direction: hold

severity: critical
priority: 20
category: organ-dysfunction
relevant_diseases:
  - DIS-SCLC
shifts_algorithm:
  - ALGO-SCLC-1L

sources:
  - SRC-NCCN-SCLC-2025
  - SRC-ESMO-SCLC-2021

last_reviewed: "2026-04-27"
draft: true
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  SVC syndrome occurs in ~10% of SCLC at presentation. Per NCCN-SCLC +
  ESMO-SCLC 2021: SCLC is highly chemosensitive; cisplatin/carboplatin +
  etoposide first-line is preferred (not RT) when SVC is uncomplicated;
  endovascular SVC stenting ± urgent palliative RT (30 Gy/10 fx) for
  rapid relief if neurologic compromise. Direction HOLD on definitive
  systemic start until vascular access ensured + airway secured;
  priority 12. STUB — requires clinical co-lead signoff.
notes_ua: >
  Синдром ВПВ при SCLC (~5-10% при зверненні): ургентна паліативна ПТ
  (30 Gy/10 фракцій) або ендоваскулярне стентування для стабілізації.
  Хіміотерапія платина-етопозидом починається паралельно при LS-SCLC.
  Напрям «hold» до стабілізації обструкції ВПВ.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_10
