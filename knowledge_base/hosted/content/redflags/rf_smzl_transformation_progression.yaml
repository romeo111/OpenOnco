id: RF-SMZL-TRANSFORMATION-PROGRESSION
definition: "Histologic transformation to DLBCL (rapid progression, new constitutional symptoms, LDH spike) — biopsy-confirmed transformation reclassifies as DLBCL pathway."
definition_ua: "Гістологічна трансформація в DLBCL (швидка прогресія, нові constitutional симптоми, стрибок LDH) — biopsy-підтверджена трансформація реклассифікує як DLBCL шлях."

trigger:
  type: composite_clinical
  any_of:
    - finding: "biopsy_shows_dlbcl"
      value: true
    - finding: "smzl_transformation_suspected"
      value: true

clinical_direction: intensify
severity: critical
priority: 100
category: transformation-progression

relevant_diseases: [DIS-SPLENIC-MZL]

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-MZL-2024

last_reviewed: "2026-04-25"
draft: false

notes: >
  Transformation to DLBCL changes the disease classification entirely — the engine should hand off to DLBCL Algorithm with the DLBCL biopsy result.
notes_ua: >
  Трансформація у DLBCL відбувається у ~5-10% SMZL. Повторна біопсія
  обов'язкова при підозрі на трансформацію. При підтвердженні трансформації —
  схеми R-CHOP або R-ICE + ауто-ТГСК при хіміочутливості.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_10
draft_revision: 2
