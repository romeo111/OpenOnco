id: RF-T-ALL-INFECTION-SCREENING
definition: "HIV/HBV/HCV/CMV serology + PCP prophylaxis pre-induction; nelarabine-containing regimens require PJP prophylaxis throughout treatment."
definition_ua: "HIV/HBV/HCV/CMV серологія + PCP профілактика перед індукцією; nelarabine-вмісні режими — PJP профілактика весь курс."

trigger:
  type: biomarker
  any_of:
    - finding: "hbsag"
      value: "positive"
    - finding: "hiv_serology"
      value: "positive"
    - finding: "anti_hcv"
      value: "positive"


clinical_direction: investigate
severity: major
priority: 100
category: infection-screening

relevant_diseases: [DIS-T-ALL]
shifts_algorithm: []

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-PTCL-2024

last_reviewed: "2026-04-25"
draft: false

notes: >
  T-ALL induction profoundly lymphopenic; opportunistic infection prophylaxis (PCP, fluconazole, acyclovir) standard regardless of serology — but baseline screen ensures appropriate prophylaxis intensity.
notes_ua: >
  Обов'язковий скринінг HBV/HCV/HIV перед ремісійно-індукційною ХТ та перед
  алоТГСК. ЦМВ і ЕBV-статус (вихідний D/R serostatus) при плануванні
  трансплантації. Профілактика PJP (ко-тримоксазол або атоваквон) під час
  та після індукції.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_10
draft_revision: 2
