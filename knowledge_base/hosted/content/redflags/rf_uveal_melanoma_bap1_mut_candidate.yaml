id: RF-UVEAL-MELANOMA-BAP1-MUT-CANDIDATE
definition: >
  Uveal (intraocular — choroidal, ciliary-body, iris) melanoma with
  somatic BAP1 loss-of-function mutation OR loss of BAP1 nuclear
  staining by IHC. BAP1-loss in uveal melanoma is the strongest single
  prognostic marker for metastasis-prone disease — class-2 GEP
  (gene-expression profile) tumors per Harbour 2010 / Onken 2010
  carry ~70-80% 5-year metastasis rate vs. ~5% for class-1 (BAP1-
  intact) tumors. Metastatic uveal melanoma was historically
  unresponsive to ICI (ORR <5% with anti-PD-1 mono; ORR ~12-18% with
  ipi/nivo combo) due to low TMB; tebentafusp (gp100 × CD3 ImmTAC,
  IMCgp100-202 phase 3, Nathan NEJM 2021) is the first approved
  systemic therapy for HLA-A*02:01+ metastatic uveal melanoma, with
  mOS 21.7 vs 16.0 mo vs investigator-choice. Informational at MVP:
  uveal melanoma is not a separately-modeled disease (DIS-UVEAL not
  defined); RF surfaces (a) the BAP1-loss → high-metastasis-risk
  prognostic shift and (b) tebentafusp HLA-A*02:01 testing prompt
  for metastatic disease.
definition_ua: >
  Увеальна (внутрішньоочна — хоріоїдальна, циліарного тіла, райдужки)
  меланома з соматичною BAP1 LOF-мутацією АБО втратою ядерного
  забарвлення BAP1 за ІГХ. BAP1-loss в увеальній меланомі — найсильніший
  окремий прогностичний маркер метастаз-схильної хвороби: class-2 GEP
  (gene-expression profile) пухлини за Harbour 2010 / Onken 2010 мають
  ~70-80% 5-річну частоту метастазування проти ~5% для class-1 (BAP1-
  intact) пухлин. Метастатична увеальна меланома історично не
  відповідала на ICI (ORR <5% при anti-PD-1 монотерапії; ORR ~12-18%
  при ipi/nivo комбо) через низьку TMB; tebentafusp (gp100 × CD3 ImmTAC,
  IMCgp100-202 phase 3, Nathan NEJM 2021) — перша схвалена системна
  терапія для HLA-A*02:01+ метастатичної увеальної меланоми, мОВ 21.7
  проти 16.0 міс vs investigator-choice. На MVP — лише інформаційний:
  увеальна меланома не моделюється окремо (DIS-UVEAL не визначено);
  RF поверхневлює (а) прогностичний зсув "BAP1-loss → високий ризик
  метастазів" і (б) запит на HLA-A*02:01 тестування для tebentafusp при
  метастатичній хворобі.

