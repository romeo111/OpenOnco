notes: >
  W5c RF authoring. Converts free-text `{condition: "CXCR4-WHIM mutation
  positive"}` in ALGO-WM-2L step 1 into a formal RF entity. Step 1 is a
  partial gate: the RF covers the CXCR4-mutation branch; the second branch
  ("bortezomib-intolerant due to baseline neuropathy AND PI-class still
  indicated") remains a free-text condition in the algo for MDT evaluation.

  Clinical rationale: CXCR4 WHIM mutations attenuate BTKi response in WM.
  In the iNNOVATORY-WM ibrutinib cohort, CXCR4-mutated patients had
  major response rate 36% vs 77% in CXCR4-WT (Treon NEJM 2015). In
  ASPEN zanubrutinib cohort, CXCR4 mutation status maintained as a
  predictive marker for attenuated response (Castillo Blood 2020 analysis).
  Carfilzomib-based regimens (carfilzomib + rituximab ± dexamethasone)
  are not BTKi-class and do not share this resistance mechanism.

  Note: ALGO-WM-2L step 1 also includes `condition: "Bortezomib-intolerant
  due to baseline neuropathy AND PI-class still indicated"` which is a
  clinical contraindication gate, NOT covered by this RF. That condition
  refers to bortezomib (step 1 routes to CaRd/carfilzomib-based, which
  is distinct from bortezomib). Keep as free-text MDT-evaluated condition.

  BMA-CXCR4-WHIM-WM (ESCAT IB) confirms the evidence base. Sources
  SRC-NCCN-BCELL-2025 and SRC-ESMO-WM-2024 are the primary guideline
  authorities. Treon 2015 (NEJM, PMC) and Castillo 2020 (Blood) are
  the primary evidence — no standalone source stubs for these yet;
  clinical co-lead to verify.

  CHARTER §6.1: Two-reviewer clinical co-lead signoff required before
  removing draft: true.
