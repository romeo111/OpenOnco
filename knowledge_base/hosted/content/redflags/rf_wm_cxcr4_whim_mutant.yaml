id: RF-WM-CXCR4-WHIM-MUTANT
definition: >
  CXCR4 WHIM-like nonsense or frameshift mutation in the C-terminal
  regulatory domain (e.g., S338X, R334X) in Waldenström macroglobulinemia
  (WM). CXCR4 WHIM-like mutations co-occur with MYD88 L265P in ~30-40%
  of MYD88-mutant WM and cause constitutive CXCR4 signaling via loss of
  the C-terminal regulatory domain. These mutations confer relative
  resistance to BTK inhibitor (BTKi) monotherapy — lower overall response
  rate and major-response rate, slower IgM decline kinetics compared to
  CXCR4-WT MYD88-mutant WM (Treon NEJM 2015; Castillo Blood 2020).

  Fires to route ALGO-WM-2L step 1 to carfilzomib-based therapy
  (IND-WM-2L-CARFILZOMIB-CXCR4MUT) rather than zanubrutinib BTKi
  monotherapy (IND-WM-2L-ZANUBRUTINIB), as BTKi efficacy is substantially
  attenuated in CXCR4-mutated WM.

  Detection: CXCR4 C-terminal sequencing by targeted PCR + Sanger or NGS
  panel with CXCR4 C-terminus coverage. Note: standard NGS panels
  frequently omit CXCR4 C-terminus; dedicated assay required. Bone marrow
  aspirate with CD138+ enrichment preferred for adequate WM clone
  representation.

  CXCR4 mutation testing is recommended at WM diagnosis per NCCN B-Cell
  Lymphomas 2025 (alongside MYD88 L265P) to guide initial therapy
  selection. In CXCR4-mutated patients, BTKi monotherapy response is
  attenuated; proteasome-inhibitor-based regimens or BR are preferred
  1L per NCCN/ESMO. In 2L, carfilzomib-based regimens offer benefit
  in BTKi-refractory or BTKi-intolerant CXCR4-mutated WM.

definition_ua: >
  CXCR4 WHIM-подібна нонсенс- або фреймшифт-мутація C-кінцевого регуляторного
  домену при макроглобулінемії Вальденстрема (МВ). Зустрічається у ~30-40%
  MYD88-L265P МВ; спричиняє конститутивну активацію CXCR4-сигналізації.
  Конферує відносну резистентність до BTK-інгібіторів (знижений ЗВВ, повільна
  кінетика зниження IgM). Маршрутизує до схем на основі карфілзомібу (2L) або
  бортезоміб/BR-режимів (1L) замість монотерапії BTKi. NCCN B-Cell 2025:
  тестування CXCR4 рекомендовано при встановленні діагнозу МВ.

