notes_ua: >
  Авторизація RF W5c. Конвертує вільний текст у ALGO-WM-2L крок 1 у формальну
  RF-сутність. Крок 1 є частковим воротами: RF покриває гілку CXCR4-мутації;
  друга гілка (непереносимість бортезомібу + PI-клас ще показаний) залишається
  вільним текстом для МДТ-оцінки. Клінічне обґрунтування: CXCR4-мутації
  послаблюють відповідь на BTKi при МВ. У когорті iNNOVATORY-WM (ібрутиніб)
  CXCR4-мутовані пацієнти мали частку великих відповідей 36% проти 77% у
  CXCR4-WT (Treon NEJM 2015). У когорті ASPEN (занубрутиніб) статус CXCR4-
  мутації підтримувався як предиктор послабленої відповіді (аналіз Castillo
  Blood 2020). Схеми на основі карфілзомібу (carfilzomib + rituximab ±
  dexamethasone) не належать до класу BTKi та не поділяють цей механізм
  резистентності. Доказова база підтверджена BMA-CXCR4-WHIM-WM (ESCAT IB).
  Джерела: SRC-NCCN-BCELL-2025, SRC-ESMO-WM-2024.
