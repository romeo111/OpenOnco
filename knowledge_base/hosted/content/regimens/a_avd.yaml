last_reviewed: "2026-04-25"
notes: >
  ECHELON-1 trial (Connors 2018, follow-up 2022): superior OS for
  advanced cHL vs ABVD (HR ~0.59 for OS at 6 years). Bleomycin replaced
  by brentuximab → eliminates BPT risk. G-CSF mandatory (vs ABVD where
  G-CSF avoided). Preferred 1L for advanced Hodgkin per NCCN where
  brentuximab accessible.
notes_ua: >
  Дослідження ECHELON-1 (Connors 2018, спостереження 2022): перевага за загальною
  виживаністю при поширеній класичній лімфомі Годжкіна (cHL) порівняно з ABVD
  (HR ~0.59 за OS через 6 років). Блеоміцин замінено брентуксимабом (brentuximab
  vedotin) — усувається ризик блеоміцин-асоційованої легеневої токсичності (BPT).
  Г-КСФ обов'язковий (на відміну від ABVD, де Г-КСФ протипоказаний). Переважний
  режим першої лінії при поширеній лімфомі Годжкіна за NCCN за умови доступності
  брентуксимабу.
