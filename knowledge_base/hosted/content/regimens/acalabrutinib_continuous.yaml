id: REG-ACALABRUTINIB-CONTINUOUS
name: "Acalabrutinib monotherapy (continuous, until progression or intolerance)"
name_ua: "Акалабрутиніб монотерапія (безперервно до прогресії або непереносимості)"
alternate_names: ["Acalabrutinib mono", "ELEVATE-TN-style"]

components:
  - drug_id: DRUG-ACALABRUTINIB
    dose: "100 mg"
    schedule: "PO twice daily continuous"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression or intolerance"
toxicity_profile: low-moderate

premedication: ["Hydration if high-burden disease (TLS unusual but possible)"]
mandatory_supportive_care: []
monitoring_schedule_id: MON-CLL-BTKI

dose_adjustments:
  - condition: "Concomitant strong CYP3A4 inhibitor (azoles, ritonavir)"
    modification: "Hold during inhibitor course OR reduce to 100 mg once daily"
    source_refs: [SRC-NCCN-BCELL-2025]
  - condition: "Severe hepatic impairment (Child-Pugh C)"
    modification: "Avoid"
  - condition: "Concomitant PPI/H2-blocker"
    modification: "Separate dosing 2h apart OR switch to acalabrutinib maleate (PPI-compatible)"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Acalabrutinib registered but NOT reimbursed via НСЗУ — funding gap; ibrutinib (REG-IBRUTINIB-CLL or similar) may substitute as fallback"

sources: [SRC-NCCN-BCELL-2025]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Acalabrutinib continuous for CLL 1L (ELEVATE-TN). BTKi pattern:
# headache, GI, bleeding, AF, infections. STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Помірний головний біль протягом перших тижнів"
    action_ua: "Часто минає за 1-2 місяці — занотовуйте інтенсивність"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Помірна нудота, легка діарея"
    action_ua: "Зазвичай легкі — занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Незвичні синці, кровотеча ясен або носа"
    action_ua: "Подзвоніть у клініку того ж дня — BTKi підвищують ризик кровотеч"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Прискорене серцебиття, нерівномірний пульс"
    action_ua: "Подзвоніть у клініку того ж дня — можлива миготлива аритмія"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Лихоманка з ознобом"
    action_ua: "Подзвоніть у клініку того ж дня — імуносупресія підвищує ризик інфекції"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Сильна тривала кровотеча або раптовий сильний головний біль"
    action_ua: "Звертайтесь у лікарню негайно"
    urgency: er_now
    sources:
      - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
notes: >
  Preferred BTKi for CLL 1L per NCCN 2025 (over ibrutinib due to less
  cardiac toxicity). ELEVATE-TN (1L CLL): superior PFS vs Clb+O at 5y;
  ELEVATE-RR (r/r): non-inferior to ibrutinib with better safety. Funding
  pathway must be confirmed pre-start in Ukraine.
notes_ua: >
  Переважний інгібітор BTK першої лінії при ХЛЛ за NCCN 2025 (порівняно з ібрутинібом —
  менша кардіотоксичність). ELEVATE-TN (ХЛЛ 1L): перевага за ВБП порівняно з Clb+O
  через 5 років; ELEVATE-RR (рецидивний/рефрактерний): не поступається ібрутинібу
  за ефективністю при кращому профілі безпеки. Перед початком терапії в Україні
  необхідно підтвердити шлях фінансування.
ukrainian_review_status: pending_clinical_signoff
