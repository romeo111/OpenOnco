    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Прискорене серцебиття"
    action_ua: "Подзвоніть у клініку того ж дня — миготлива аритмія"
    urgency: call_clinic_same_day
