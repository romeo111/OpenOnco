last_reviewed: "2026-04-25"
notes: >
  1L for unfit / older MCL (age >65 OR ECOG ≥2 OR transplant-ineligible)
  AND for TP53-mutant / blastoid / high-risk where chemoimmuno fails.
  SHINE trial showed BTKi+R+chemo modestly superior to chemo alone in
  older fit; access constraints in Ukraine push toward BTKi+R simpler.
notes_ua: >
  Режим першої лінії для пацієнтів з MCL, непридатних до інтенсивного лікування:
  вік >65 років, або ECOG ≥2, або непридатність до трансплантації; також — при
  TP53-мутованому, бластоїдному чи іншому варіанті високого ризику, де
  хіміоімунотерапія неефективна. Дослідження SHINE показало помірну перевагу
  BTKi+R+хіміотерапія над хіміотерапією у літніх пацієнтів, придатних до лікування;
  обмеженість доступу в Україні зумовлює перевагу спрощеного режиму BTKi+R.
ukrainian_review_status: pending_clinical_signoff
