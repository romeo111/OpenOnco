last_reviewed: "2026-04-25"
notes: >
  Standard 1L for low/intermediate-risk APL (Sanz WBC ≤10). APL0406:
  2-y EFS 97% vs 86% with ATRA+chemo (AIDA), OS 99% vs 91%, less
  hematologic toxicity, no anthracycline cardiotoxicity. ATRA initiated
  IMMEDIATELY at clinical APL suspicion (do NOT wait for cytogenetic
  confirmation). Daily ECG + electrolyte protocol mandatory during
  ATO induction. STUB — requires clinical co-lead signoff before
  publication.
notes_ua: >
  стандарт 1L for low/проміжного ризику APL (Sanz WBC ≤10). APL0406: 2-y EFS 97% проти
  86% with ATRA+chemo (AIDA), OS 99% проти 91%, less hematologic токсичність, ні anthracycline
  кардіотоксичність. ATRA initiated IMMEDIATELY at clinical APL suspicion (do NOT
  wait for cytogenetic confirmation). Daily ECG + electrolyte protocol обов'язковий
  during ATO індукція. STUB — requires clinical co-lead signoff before publication.
ukrainian_review_status: pending_clinical_signoff
