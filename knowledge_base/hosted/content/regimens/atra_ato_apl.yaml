- trigger_ua: "Сухість шкіри або губ, лусковий висип"
  action_ua: "Очікувано від ATRA — використовуйте зволожувач, занотуйте інтенсивність"
  urgency: log_at_next_visit
  cycle_day_window: "Week 2+"
  sources:
  - SRC-ELN-APL-2019
