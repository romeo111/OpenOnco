last_reviewed: "2026-04-25"
notes: >
  Standard 1L for MDS-HR (and bridging to alloHCT in eligible patients).
  Azacitidine and decitabine functionally equivalent; choice often local.
  Do NOT discontinue before cycle 6 unless overt progression — response
  is delayed. Ven+aza in HR-MDS is increasingly used (off-label
  extrapolation from VIALE-A AML data; no Phase-3 HR-MDS-specific RCT).
  STUB — requires clinical co-lead signoff before publication.
notes_ua: >
  Стандарт першої лінії при МДС високого ризику (та підготовча терапія до алоТГСК у
  відповідних пацієнтів). Азацитидин (azacitidine) та децитабін (decitabine) функціонально
  рівнозначні; вибір часто визначається локальними можливостями. Не слід припиняти
  терапію до 6-го циклу за відсутності явного прогресування — відповідь розвивається
  поступово. Комбінація венетоклакс+азацитидин при МДС-ВР застосовується дедалі ширше
  (позареєстраційна екстраполяція даних VIALE-A при ГМЛ; рандомізованих досліджень
  фази 3, специфічних для МДС-ВР, немає). STUB — потребує підписання клінічним
  співкерівником перед публікацією.
