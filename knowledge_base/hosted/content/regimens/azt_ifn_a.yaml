last_reviewed: "2026-04-25"
notes: >
  STUB. AZT inhibits HTLV-1 reverse transcriptase; IFN — immune
  modulation + apoptosis induction. PEG-IFN може заміняти standard
  IFN — easier dosing (weekly). Не для acute / lymphoma type.
notes_ua: >
  STUB. АЗТ (zidovudine) інгібує зворотну транскриптазу HTLV-1; IFN — імунна
  модуляція та індукція апоптозу. ПЕГ-інтерферон (PEG-IFN) може замінювати стандартний
  IFN — зручніше дозування (один раз на тиждень). Режим не застосовується при
  гострому лейкозі чи лімфомній формі HTLV-1-асоційованого захворювання.
ukrainian_review_status: pending_clinical_signoff
