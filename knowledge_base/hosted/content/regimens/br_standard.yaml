id: REG-BR-STANDARD
name: "Bendamustine + Rituximab (BR), 6 cycles"
name_ua: "Бендамустин + Ритуксимаб (BR), 6 циклів"
alternate_names:
- "BR"
- "R-B"

components:
- drug_id: DRUG-RITUXIMAB
  dose: "375 mg/m²"
  schedule: "day 1 of each 28-day cycle"
  route: IV
- drug_id: DRUG-BENDAMUSTINE
  dose: "90 mg/m²"
  schedule: "days 1 and 2 of each 28-day cycle"
  route: IV

cycle_length_days: 28
total_cycles: "6"

toxicity_profile: moderate

premedication:
- "Antihistamine + acetaminophen before rituximab"
- "5-HT3 antagonist antiemetic before bendamustine (see SUP-ANTIEMETIC-PREMED)"
mandatory_supportive_care:
- SUP-ANTIEMETIC-PREMED
- SUP-PJP-PROPHYLAXIS
monitoring_schedule_id: MON-BR-REGIMEN

dose_adjustments:
- condition: "FIB-4 > 3.25 OR compensated cirrhosis"
  modification: "Reduce bendamustine to 70 mg/m² days 1-2"
  rationale: "Hepatic dysfunction increases bendamustine exposure; dose reduction
    preserves efficacy while managing toxicity"
  source_refs:
  - SRC-ESMO-MZL-2024
- condition: "Creatinine clearance 30-50 mL/min"
  modification: "Reduce bendamustine to 70 mg/m²"
  rationale: "Renal impairment affects bendamustine clearance"
  source_refs:
  - SRC-NCCN-BCELL-2025
- condition: "Absolute neutrophil count <1500/µL at cycle start"
  modification: "Delay cycle; consider G-CSF support"
  rationale: "Cumulative myelosuppression is a key BR toxicity"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "Both bendamustine and rituximab reimbursed per НСЗУ for indolent B-cell
    lymphomas"

sources:
- SRC-ESMO-MZL-2024
- SRC-NCCN-BCELL-2025

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Bendamustine has a deep + prolonged nadir window (Day 14-21);
# rituximab adds infusion-reaction risk + HBV-reactivation watch.
# STUB pending §6.1 two-Co-Lead signoff (dev-mode exemption).
between_visit_watchpoints:
- trigger_ua: "Помірна втома протягом 1-2 тижнів після циклу"
  action_ua: "Очікувано — приділяйте більше уваги відпочинку, занотуйте, якщо триває
    довше за 2 тижні"
  urgency: log_at_next_visit
  cycle_day_window: "Day 1-14"
  sources:
  - SRC-NCCN-BCELL-2025
- trigger_ua: "Легке випадання волосся (рідше, ніж при CHOP)"
  action_ua: "Можливе при бендамустині — занотуйте і обговоріть"
  urgency: log_at_next_visit
  cycle_day_window: "Day 14-30"
  sources:
  - SRC-NCCN-BCELL-2025
- trigger_ua: "Помірна нудота протягом перших 1-3 днів циклу"
  action_ua: "Приймайте призначені протиблювотні; занотуйте, якщо нудота утруднює
    прийом їжі"
  urgency: log_at_next_visit
  cycle_day_window: "Day 1-3"
  sources:
  - SRC-CTCAE-V5
- trigger_ua: "Лихоманка вище 38°C — особливо на 2-3 тижні після циклу"
  action_ua: "Подзвоніть у клініку того ж дня — на цей період бендамустин дає найнижчу
    кількість нейтрофілів і найбільший ризик інфекції"
  urgency: call_clinic_same_day
  cycle_day_window: "Day 14-21"
  sources:
  - SRC-NCCN-BCELL-2025
  - SRC-CTCAE-V5
- trigger_ua: "Висип у вигляді почервонілих плям, які злущуються або вкриваються пухирями"
  action_ua: "Подзвоніть у клініку того ж дня — бендамустин рідко може спричиняти
    тяжкі шкірні реакції"
  urgency: call_clinic_same_day
  sources:
  - SRC-NCCN-BCELL-2025
  - SRC-CTCAE-V5
- trigger_ua: "Легка або помірна реакція під час інфузії ритуксимабу: озноб, легка
    лихоманка, незначне утруднення дихання"
  action_ua: "Повідомте медсестру негайно — інфузію зазвичай сповільнюють або призупиняють"
  urgency: call_clinic_same_day
  cycle_day_window: "Day 1 of cycle 1"
  sources:
  - SRC-NCCN-BCELL-2025
- trigger_ua: "Тяжка інфузійна реакція на ритуксимаб: різке утруднення дихання, набряк
    обличчя, втрата свідомості"
  action_ua: "Якщо в клініці — медперсонал реагує негайно. Якщо реакція виникла вдома
    (рідко після першого циклу) — викликайте швидку"
  urgency: er_now
  cycle_day_window: "Day 1"
  sources:
  - SRC-NCCN-BCELL-2025
  - SRC-CTCAE-V5
- trigger_ua: "Озноб + лихоманка + різке погіршення стану"
  action_ua: "Звертайтесь у лікарню негайно — на низькому рівні нейтрофілів інфекція
    може швидко переходити у сепсис"
  urgency: er_now
  sources:
  - SRC-CTCAE-V5

last_reviewed: "2026-04-24"
notes: >
  Standard chemoimmunotherapy regimen for indolent B-cell lymphomas.
  In HCV-MZL, reserved for cases that are non-responsive to antiviral
  therapy or have aggressive/bulky disease at presentation requiring
  immediate cytoreduction.
notes_ua: >
  Стандартна схема хіміоімунотерапії при індолентних В-клітинних лімфомах. При
  HCV-асоційованій МЗЛ призначається у випадках, що не відповідають на противірусну
  терапію, або при агресивному/масивному захворюванні на момент звернення, що вимагає
  негайної цитредукції.
ukrainian_review_status: pending_clinical_signoff
