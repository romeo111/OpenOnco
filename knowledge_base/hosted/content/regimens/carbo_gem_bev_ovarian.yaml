last_reviewed: "2026-04-27"

notes: >
  OCEANS regimen — primary platinum-sensitive 2L regimen with strongest
  carbo+gem+bev RCT evidence. PFS 12.4 vs 8.4 mo (HR 0.484) over carbo+gem
  alone. OS not improved (33.3 vs 32.9 mo). Preferred over carbo+PLD+bev
  in UA per access (PLD often OOP). Day-8 gemcitabine commonly held for
  thrombocytopenia — acceptable; protocol tolerates dose reductions.
notes_ua: >
  Схема OCEANS — основний режим другої лінії при платиночутливому рецидиві з
  найвищим рівнем доказів РКД для комбінації карбоплатин+гемцитабін+бевацизумаб.
  ВБП 12.4 міс. проти 8.4 міс. (HR 0.484) порівняно з карбоплатином+гемцитабіном.
  Загальна виживаність не покращилась (33.3 проти 32.9 міс.). В умовах України
  є переважним перед карбоплатин+PLD+бевацизумаб через доступність (PLD переважно
  платний). Затримка дози гемцитабіну на 8-й день при тромбоцитопенії є допустимою —
  протокол толерантний до зниження доз.
ukrainian_review_status: pending_clinical_signoff
