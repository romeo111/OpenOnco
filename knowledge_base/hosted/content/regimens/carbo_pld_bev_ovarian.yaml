last_reviewed: "2026-04-27"

notes: >
  Carbo+PLD+bev is the platinum-sensitive recurrence backbone preferred
  in patients with residual peripheral neuropathy from prior taxane
  exposure (PLD substitutes for paclitaxel). Direct carbo+PLD+bev RCT
  evidence is extrapolated from GOG-0213 (carbo+pacli+bev) plus the
  separate carbo+PLD vs carbo+pacli equivalence (CALYPSO, Pujade-Lauraine
  JCO 2010 — comparable PFS, distinct toxicity profile favoring PLD for
  neuropathy). Lower bev dose (10 mg/kg q14d) per OCEANS-style schedule;
  alternative 15 mg/kg q21d acceptable.
notes_ua: >
  Карбоплатин + PLD + бевацизумаб є переважною схемою при рецидиві
  платиночутливого раку яєчників у пацієнтів із залишковою периферичною
  нейропатією від попередньої терапії таксанами (PLD замінює паклітаксел).
  Пряме РКД-підґрунтя карбо+PLD+бев екстрапольоване з GOG-0213
  (карбо+паклі+бев) плюс окрема еквівалентність карбо+PLD vs карбо+паклі
  (CALYPSO, Pujade-Lauraine JCO 2010 — зіставна ВБП, відмінний профіль
  токсичності на користь PLD щодо нейропатії). Схема: карбоплатин AUC 5 +
  PLD 30 мг/м² день 1 q28d + бевацизумаб (bevacizumab) 10 mg/kg кожні
  14 днів. Нижча доза бевацизумабу (10 mg/kg q14d); альтернатива
  15 mg/kg q21d прийнятна. Кумулятивний антрациклін: PLD зупинити при ~550 мг/м².
