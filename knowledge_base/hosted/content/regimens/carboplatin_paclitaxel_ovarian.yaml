id: REG-CARBO-PACLI-OVARIAN
name: "Carboplatin + Paclitaxel (ovarian 3-weekly)"
name_ua: "Карбоплатин + Паклітаксел (3-тижневий, для яєчників)"
alternate_names: ["CP", "Carbo-pacli q3w"]

components:
  - drug_id: DRUG-CARBOPLATIN
    dose: "AUC 5-6"
    schedule: "IV day 1 every 21d"
    route: IV
  - drug_id: DRUG-PACLITAXEL
    dose: "175 mg/m²"
    schedule: "IV day 1 every 21d"
    route: IV

cycle_length_days: 21
total_cycles: "6 cycles (per GOG-218 / ICON-7 induction); subsequent maintenance per HRD/biomarker stratification"

toxicity_profile: severe
premedication: ["Paclitaxel: dex 20 mg PO 12+6h pre + diphenhydramine 50 mg + ranitidine 50 mg IV", "5-HT3 antagonist day 1"]
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Grade 2-3 peripheral neuropathy"
    modification: "Reduce paclitaxel to 135 mg/m² OR switch to weekly dose-dense (80 mg/m² weekly) — JGOG-3016 superior PFS but more myelosuppression"
    source_refs: [SRC-NCCN-OVARIAN-2025]
  - condition: "Grade 3-4 thrombocytopenia"
    modification: "Reduce carboplatin AUC to 4 next cycle"
  - condition: "Renal impairment CrCl 30-60"
    modification: "Recalculate Calvert formula; cap GFR at 125"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "Both components NSZU-funded; dose-dense weekly Pacli + 3-weekly Carbo (JGOG-3016) regimen is acceptable variation."

sources: [SRC-NCCN-OVARIAN-2025, SRC-ESMO-OVARIAN-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Carbo+paclitaxel q3w — workhorse ovarian 1L. Key axes: paclitaxel
# hypersensitivity in cycles 1-2, peripheral neuropathy (cumulative),
# carbo cytopenia, late carbo allergy in cycles 6+. STUB pending §6.1.
between_visit_watchpoints:
  - trigger_ua: "Поколювання або оніміння в кистях/стопах"
    action_ua: "Паклітаксел може спричиняти нейропатію — занотовуйте інтенсивність, обговоріть на візиті"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-OVARIAN-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Випадання волосся (на 2-3 тижні)"
    action_ua: "Очікувано — повертається після завершення курсу"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-OVARIAN-2025
  - trigger_ua: "Біль у м'язах і суглобах через 2-3 дні після паклітакселу"
    action_ua: "Поширений побічний ефект — зазвичай минає за тиждень; парацетамол допомагає"
    urgency: log_at_next_visit
    cycle_day_window: "Day 2-7"
    sources:
      - SRC-NCCN-OVARIAN-2025
  - trigger_ua: "Лихоманка вище 38°C"
    action_ua: "Подзвоніть у клініку того ж дня — карбоплатин дає нейтропенію"
    urgency: call_clinic_same_day
    cycle_day_window: "Day 7-14"
    sources:
      - SRC-NCCN-OVARIAN-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Поколювання стає сильним болем, заважає тримати дрібні предмети"
    action_ua: "Подзвоніть у клініку того ж дня — нейропатія потребує корекції дози паклітакселу"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-OVARIAN-2025
  - trigger_ua: "Сильна реакція на інфузію паклітакселу: задишка, висип, набряк обличчя"
    action_ua: "Інфузія в клініці — повідомте медсестру негайно. Премедикація стероїдами знижує ризик"
    urgency: er_now
    cycle_day_window: "Day 1 of cycles 1-2"
    sources:
      - SRC-NCCN-OVARIAN-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Алергічна реакція на карбоплатин (зазвичай після 6+ циклів)"
    action_ua: "Якщо вдома — викликайте швидку. У клініці — медперсонал реагує негайно"
    urgency: er_now
    sources:
      - SRC-NCCN-OVARIAN-2025

last_reviewed: "2026-04-26"

notes: >
  Backbone of advanced ovarian 1L for ~25 years. ICON-7 + GOG-218
  added bevacizumab to induction + maintenance — maintenance bev
  improves PFS but not OS (selected stage III suboptimally debulked
  + stage IV benefit). Weekly dose-dense Pacli (JGOG-3016) PFS
  superior vs 3-weekly in Asian-population trial; not consistently
  reproduced in Western GOG-262 / ICON-8.
notes_ua: >
  Основна схема першої лінії при поширеному раку яєчників понад 25 років. ICON-7
  та GOG-218 додали бевацизумаб до індукції та підтримувальної терапії —
  підтримувальна терапія бевацизумабом покращує ВБП, але не загальну виживаність
  (виграш — у субоптимально прооперованих стадії III та стадії IV). Щотижневий
  щільно-дозований паклітаксел (JGOG-3016) перевершував 3-тижневий за ВБП у
  дослідженні на азіатській популяції; ця перевага не відтворилась стабільно у
  GOG-262 / ICON-8 (популяції Заходу).
ukrainian_review_status: pending_clinical_signoff
