    action_ua: "Очікувано на тлі променевої терапії — пийте холодні рідини, м'яка їжа; занотовуйте інтенсивність"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-ESOPHAGEAL-2025
  - trigger_ua: "Поколювання або оніміння в кистях/стопах"
    action_ua: "Паклітаксел спричиняє нейропатію — занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-ESOPHAGEAL-2025
  - trigger_ua: "Випадання волосся, втома"
    action_ua: "Очікувано — волосся повертається після курсу"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-ESOPHAGEAL-2025
  - trigger_ua: "Сильний біль при ковтанні, неможливість їсти і пити"
    action_ua: "Подзвоніть у клініку того ж дня — потрібна оцінка променевого езофагіту і можливо знеболення"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-ESOPHAGEAL-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Лихоманка вище 38°C"
    action_ua: "Подзвоніть у клініку того ж дня — нейтропенія від карбо"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-ESOPHAGEAL-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Зневоднення (запаморочення стоячи, мала кількість сечі) через неможливість ковтати"
    action_ua: "Подзвоніть у клініку того ж дня — може знадобитись інфузійна терапія або тимчасова зонда"
