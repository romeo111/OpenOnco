    sources:
      - SRC-NCCN-ESOPHAGEAL-2025

last_reviewed: "2026-04-26"

notes: >
  CROSS protocol concurrent with RT 41.4 Gy / 23 fractions. Both
  squamous and adeno benefit (CROSS subgroup analyses) with pCR ~25%
  (squamous higher than adeno). The RT component is NOT modellable in
  current OpenOnco schema — see PROPOSAL §17. This regimen entry
  represents the chemo-only backbone; "CROSS" the full modality is
  free-text on the Indication awaiting proposal ratification.
notes_ua: >
  Протокол CROSS — одночасна хіміопроменева терапія з опроміненням 41.4 Gy / 23
  фракції. Виграш при плоскоклітинному та аденогенному раку (аналіз підгруп CROSS);
  pCR ~25% (при плоскоклітинному вищий, ніж при аденокарциномі). Компонент
  променевої терапії наразі не відображається в схемі OpenOnco — див. PROPOSAL §17.
  Цей запис схеми представляє виключно хіміотерапевтичну основу; "CROSS" як повна
  мультимодальна схема є вільним текстом у показанні в очікуванні ратифікації
  пропозиції.
ukrainian_review_status: pending_clinical_signoff
