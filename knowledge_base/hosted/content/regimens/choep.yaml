last_reviewed: "2026-04-25"
notes: >
  Used for fit younger PTCL NOS / AITL when CD30 negative or brentuximab
  not accessible. CHOEP (with etoposide) showed improvement over CHOP
  in younger T-cell patients per Nordic data. 6 cycles + autoSCT
  consolidation in fit transplant-eligible — practice standard for
  PTCL/AITL despite limited RCT evidence.
notes_ua: >
  Used for fit younger PTCL NOS / AITL when CD30 negative or brentuximab not accessible.
  CHOEP (with етопозид) showed покращення over CHOP in younger T-cell patients per
  Nordic дані. 6 цикли + аутоТГСК консолідація in fit придатний до трансплантації
  — practice стандарт for PTCL/AITL despite limited РКД докази.
ukrainian_review_status: pending_clinical_signoff
