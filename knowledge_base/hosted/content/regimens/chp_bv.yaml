last_reviewed: "2026-04-25"
notes: >
  ECHELON-2 trial (Horwitz 2019): CHP-Bv superior to CHOP for CD30+
  systemic ALCL + CD30+ PTCL/AITL — improved PFS + OS (~85% 3y PFS
  for ALCL ALK-). Vincristine REPLACED by brentuximab (avoiding
  additive MMAE neuropathy stack). Patients must be CD30+ ≥10% by IHC.
  ALCL is universally CD30+ → CHP-Bv preferred. PTCL NOS / AITL
  ~40-60% CD30+ → CHP-Bv if expression confirmed; else CHOEP.
notes_ua: >
  ECHELON-2 дослідження (Horwitz 2019): CHP-Bv перевершує CHOP for CD30+ systemic
  ALCL + CD30+ PTCL/AITL — покращений PFS + OS (~85% 3-річна ВБП for ALCL ALK-). вінкристин
  REPLACED by brentuximab (avoiding additive MMAE нейропатія stack). Patients must
  be CD30+ ≥10% by IHC. ALCL is universally CD30+ → CHP-Bv переважний. PTCL NOS /
  AITL ~40-60% CD30+ → CHP-Bv if експресія confirmed; else CHOEP.
ukrainian_review_status: pending_clinical_signoff
