id: REG-CISPLATIN-RADIOSENS
name: "Cisplatin radiosensitization (concurrent with EBRT + brachytherapy)"
name_ua: "Цисплатин-радіосенсибілізація (одночасно з EBRT + брахітерапія)"
alternate_names: ["Weekly cisplatin during pelvic CRT"]

components:
  - drug_id: DRUG-CISPLATIN
    dose: "40 mg/m² (cap 70 mg)"
    schedule: "IV weekly × 5-6 doses concurrent with EBRT"
    route: IV

cycle_length_days: 7
total_cycles: "5-6 weekly doses (~6 weeks of CRT)"

toxicity_profile: severe
premedication:
  - "Mandatory hydration: 1L NS + 20 mEq KCl + 1g MgSO4 over 2h pre-cisplatin"
  - "5-HT3 + dexamethasone + NK1-RA (aprepitant) for emetogenic prophylaxis"
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "CrCl 50-60"
    modification: "Reduce cisplatin to 30 mg/m² weekly"
    source_refs: [SRC-NCCN-CERVICAL-2025]
  - condition: "CrCl <50"
    modification: "Substitute carboplatin AUC 2 weekly OR omit cisplatin (continue RT alone — inferior outcomes)"
    source_refs: [SRC-NCCN-CERVICAL-2025]
  - condition: "Grade 2 hearing loss"
    modification: "Discontinue cisplatin"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "Cisplatin NSZU-funded; radiotherapy modality not in Drug entity scope — see PROPOSAL §17."

sources: [SRC-NCCN-CERVICAL-2025, SRC-ESMO-CERVICAL-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Concurrent chemoradiation for cervical cancer. Cisplatin weekly +
# external beam RT + brachytherapy. Key axes: cisplatin nephrotoxicity,
# ototoxicity, RT-related skin/bowel/bladder reactions, anemia.
# STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Помірна втома, що наростає до кінця курсу"
    action_ua: "Очікувано — більше відпочивайте; занотовуйте інтенсивність"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-CERVICAL-2025
  - trigger_ua: "Подразнення шкіри в зоні опромінення (червоність, лущення)"
    action_ua: "Використовуйте призначений зволожувач; уникайте мила і тертя; занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-CERVICAL-2025
  - trigger_ua: "Помірна нудота протягом 1-2 днів після цисплатину"
    action_ua: "Приймайте призначені протиблювотні; пийте багато води"
    urgency: log_at_next_visit
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Часті позиви до сечовипускання, печіння"
    action_ua: "Подзвоніть у клініку того ж дня — потрібно виключити променевий цистит або інфекцію сечових шляхів"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-CERVICAL-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Шум у вухах, зниження слуху"
    action_ua: "Подзвоніть у клініку того ж дня — цисплатин може впливати на слух; потрібна оцінка"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-CERVICAL-2025
  - trigger_ua: "Зменшення кількості сечі, набряки гомілок"
    action_ua: "Подзвоніть у клініку того ж дня — цисплатин може впливати на нирки; потрібен аналіз креатиніну"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-CERVICAL-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Сильна тривала діарея або кровотеча з прямої кишки"
    action_ua: "Подзвоніть у клініку того ж дня — потрібна оцінка реакції з боку кишечника"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-CERVICAL-2025
  - trigger_ua: "Лихоманка вище 38°C з ознобом"
    action_ua: "Звертайтесь у лікарню негайно — на тлі лікування і можливої інфекції потрібна термінова оцінка"
    urgency: er_now
    sources:
      - SRC-NCCN-CERVICAL-2025
      - SRC-CTCAE-V5

last_reviewed: "2026-04-26"

notes: >
  Concurrent CRT for FIGO IB3-IVA cervical: EBRT 45-50.4 Gy / 25-28 fx
  + cisplatin weekly + brachytherapy boost (24-30 Gy HDR equivalent).
  RT dose, fractionation, and brachytherapy are NOT modellable in
  current OpenOnco schema — see PROPOSAL §17. This regimen entry
  captures the cisplatin-only chemo backbone.
notes_ua: >
  Concurrent CRT for FIGO IB3-IVA cervical: EBRT 45-50.4 Gy / 25-28 fx + цисплатин weekly + brachytherapy boost (24-30 Gy HDR еквівалентний). RT доза, fractionation, and brachytherapy are NOT modellable in current OpenOnco schema — see PROPOSAL §17. This схема entry captures the цисплатин-only chemo основа схеми.
