id: REG-DA-EPOCH-R
name: "Dose-Adjusted EPOCH + Rituximab (DA-EPOCH-R), 6 cycles"
name_ua: "Dose-Adjusted EPOCH + Ритуксимаб (DA-EPOCH-R), 6 циклів"
alternate_names: ["DA-EPOCH-R", "Wilson protocol"]

components:
  - {drug_id: DRUG-RITUXIMAB, dose: "375 mg/m²", schedule: "IV day 1 each cycle", route: IV}
  - {drug_id: DRUG-ETOPOSIDE, dose: "50 mg/m²/day", schedule: "Continuous IV days 1-4 (96h infusion); dose adjust per ANC nadir prior cycle", route: IV}
  - {drug_id: DRUG-DOXORUBICIN, dose: "10 mg/m²/day", schedule: "Continuous IV days 1-4 (96h infusion); dose adjust", route: IV}
  - {drug_id: DRUG-VINCRISTINE, dose: "0.4 mg/m²/day (no cap)", schedule: "Continuous IV days 1-4 (96h infusion)", route: IV}
  - {drug_id: DRUG-CYCLOPHOSPHAMIDE, dose: "750 mg/m² (start; dose-adjusted up)", schedule: "IV day 5", route: IV}
  - {drug_id: DRUG-PREDNISONE, dose: "60 mg/m² BID", schedule: "PO days 1-5", route: PO}

cycle_length_days: 21
total_cycles: "6 cycles for Burkitt; CNS prophylaxis IT MTX/cytarabine intercalated"
toxicity_profile: high

premedication:
  - "Standard rituximab premedications first dose"
  - "Aggressive TLS prophylaxis (allopurinol/rasburicase + IV hydration) cycle 1"
  - "Antiemetic regimen + steroids"
mandatory_supportive_care:
  - SUP-PJP-PROPHYLAXIS
  - SUP-TLS-PROPHYLAXIS
  - SUP-ANTIEMETIC-PREMED
monitoring_schedule_id: MON-R-CHOP-REGIMEN  # reuse — same baseline + on-treatment structure

dose_adjustments:
  - condition: "ANC nadir <500/µL OR thrombocytopenia <25K nadir prior cycle"
    modification: "Reduce etoposide + doxorubicin + cyclophosphamide by one dose level"
  - condition: "ANC nadir >500 + plt >25K nadir prior cycle"
    modification: "INCREASE etoposide + doxorubicin + cyclophosphamide by one dose level (up to 5 levels)"
  - condition: "G-CSF support always in HIV+ patients"
    modification: "Filgrastim from day 6 each cycle"
  - condition: "CNS involvement"
    modification: "Add HD-MTX 3 g/m² intercalated cycles 3 + 5; IT MTX/cytarabine ×6"

ukraine_availability: {all_components_registered: true, all_components_reimbursed: true}
sources: [SRC-NCCN-BCELL-2025]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# DA-EPOCH-R for HGBL / PMBCL / Burkitt-like 1L. Inpatient continuous
# infusion. Cytopenia + cardiac + neuropathy. STUB pending §6.1.
between_visit_watchpoints:
  - trigger_ua: "Виражена втома, мукозит"
    action_ua: "Поширене — м'яка їжа, полоскання"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Випадання волосся, нудота"
    action_ua: "Очікувано — протиблювотні"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Поколювання в кистях/стопах"
    action_ua: "Вінкристин нейропатія — занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Лихоманка вище 38°C"
    action_ua: "Звертайтесь у лікарню негайно — тривала нейтропенія"
    urgency: er_now
    cycle_day_window: "Day 7-14"
    sources:
      - SRC-NCCN-BCELL-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Нова задишка, прискорене серцебиття"
    action_ua: "Подзвоніть у клініку того ж дня — доксорубіцин впливає на серце"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Тяжка інфузійна реакція на ритуксимаб"
    action_ua: "Інфузія в клініці — медперсонал реагує негайно"
    urgency: er_now
    cycle_day_window: "Day 1 of cycle 1"
    sources:
      - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
notes: >
  Dose-adjustment up/down based on prior-cycle ANC nadir is the
  signature of DA-EPOCH — preserves intensity while limiting toxicity.
  CALGB 10002 (Burkitt): ~90% sustained CR in adult Burkitt including
  HIV+. Continuous infusion delivery requires central venous access
  + ambulatory pump. Tumor lysis can be severe — pre-phase reduction
  with low-dose cyclophosphamide + steroids advised in bulky disease.
notes_ua: >
  доза-adjustment up/down based on prior-цикл ANC nadir is the signature of DA-EPOCH — preserves intensity while limiting токсичність. CALGB 10002 (Burkitt): ~90% sustained CR in дорослий Burkitt включаючи HIV+. тривала інфузія delivery requires central venous access + ambulatory pump. пухлина lysis can be severe — pre-phase зниження with low-доза циклофосфамід + steroids advised in bulky хвороба.
