id: REG-DAA-GLEC-PIBR
name: "Glecaprevir/Pibrentasvir 8 weeks (treatment-naive non-cirrhotic)"
name_ua: "Глекапревір/Пібрентасвір 8 тижнів"
alternate_names:
  - "G/P 8w"
  - "Mavyret 8w"

components:
  - drug_id: DRUG-GLECAPREVIR-PIBRENTASVIR
    dose: "300/120 mg PO (3 tablets)"
    schedule: "once daily with food"
    route: PO
    duration: "8 weeks (12 weeks if compensated cirrhosis)"

cycle_length_days: 56
total_cycles: "1 (continuous 8-week course)"

toxicity_profile: low

dose_adjustments:
  - condition: "Compensated cirrhosis (Child-Pugh A)"
    modification: "Extend to 12 weeks"
    rationale: "EASL 2023 — fibrosis prolongs duration"
    source_refs:
      - SRC-EASL-HCV-2023

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true

sources:
  - SRC-EASL-HCV-2023

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Glecaprevir/pibrentasvir 8-12 weeks for HCV. Pan-genotypic DAA alt
# to SOF/VEL. Generally well-tolerated. STUB pending §6.1.
between_visit_watchpoints:
  - trigger_ua: "Помірний головний біль, втома"
    action_ua: "Поширене на початку — занотовуйте"
    urgency: log_at_next_visit
    cycle_day_window: "Day 1-30"
    sources:
      - SRC-EASL-HCV-2023
  - trigger_ua: "Помірна нудота"
    action_ua: "Приймайте з їжею"
    urgency: log_at_next_visit
    sources:
      - SRC-EASL-HCV-2023
  - trigger_ua: "Жовтяниця, потемніння сечі"
    action_ua: "Подзвоніть у клініку того ж дня — потрібна оцінка функції печінки"
    urgency: call_clinic_same_day
    sources:
      - SRC-EASL-HCV-2023
      - SRC-CTCAE-V5
  - trigger_ua: "Виражений висип, що поширюється"
    action_ua: "Подзвоніть у клініку того ж дня — потрібна оцінка реакції"
    urgency: call_clinic_same_day
    sources:
      - SRC-CTCAE-V5

last_reviewed: "2026-04-25"
notes: >
  Alternative pan-genotypic DAA, shorter duration than SOF/VEL.
  Contraindicated in decompensated cirrhosis (CI-DECOMP-CIRRHOSIS-GLEC).
notes_ua: >
  Alternative pan-genotypic DAA, shorter duration than SOF/VEL. протипоказаний in decompensated cirrhosis (CI-DECOMP-CIRRHOSIS-GLEC).
