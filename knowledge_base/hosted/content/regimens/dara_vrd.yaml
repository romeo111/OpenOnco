id: REG-DARA-VRD
name: "Daratumumab + Bortezomib + Lenalidomide + Dexamethasone (D-VRd), 4-6 induction
  cycles"
name_ua: "Даратумумаб + Бортезоміб + Леналідомід + Дексаметазон (D-VRd), 4-6 циклів
  індукції"
alternate_names:
- "D-VRd"
- "Dara-VRd"
- "DVRd"

components:
- drug_id: DRUG-DARATUMUMAB
  dose: "1800 mg SC (or 16 mg/kg IV)"
  schedule: "weekly cycles 1-2 (days 1, 8, 15, 22), every 2 weeks cycles 3-6 (days
    1, 15)"
  route: SC
- drug_id: DRUG-BORTEZOMIB
  dose: "1.3 mg/m²"
  schedule: "SC days 1, 8, 15 of each 28-day cycle"
  route: SC
- drug_id: DRUG-LENALIDOMIDE
  dose: "25 mg"
  schedule: "PO days 1-21 of each 28-day cycle"
  route: PO
- drug_id: DRUG-DEXAMETHASONE
  dose: "40 mg (20 mg if age >75 or frail; given before daratumumab as part of premedication)"
  schedule: "PO/IV days 1, 8, 15, 22 of each 28-day cycle"
  route: PO

cycle_length_days: 28
total_cycles: "4 cycles before stem-cell harvest (transplant-eligible) OR 6 cycles
  induction + maintenance (transplant-ineligible per MAIA-style schedule)"

toxicity_profile: high

premedication:
- "Pre-daratumumab: dexamethasone (already in regimen) + paracetamol 650-1000 mg +
  diphenhydramine 25 mg + montelukast 10 mg (before first dose)"
- "Post-daratumumab: paracetamol/diphenhydramine for 1-2 days as needed (delayed reactions)"
- "Acyclovir 400 mg PO BID (HSV/VZV prophylaxis)"
- "Aspirin 81-100 mg PO daily (VTE prophylaxis, LMWH if higher risk)"
mandatory_supportive_care:
- SUP-HSV-PROPHYLAXIS
- SUP-MM-VTE-PROPHYLAXIS
- SUP-MM-BONE-PROTECTION
- SUP-PJP-PROPHYLAXIS
monitoring_schedule_id: MON-VRD-REGIMEN

dose_adjustments:
- condition: "CrCl 30-60 mL/min"
  modification: "Lenalidomide 10 mg daily; bortezomib unchanged; daratumumab unchanged"
  rationale: "Daratumumab is not renally cleared; lenalidomide reduction per renal
    function"
  source_refs:
  - SRC-NCCN-MM-2025
- condition: "Age >75 OR frail (IMWG frailty score ≥2)"
  modification: "Dexamethasone 20 mg weekly; consider lenalidomide 15-20 mg"
  rationale: "Reduces steroid and IMiD toxicity in frail elderly"
  source_refs:
  - SRC-NCCN-MM-2025
- condition: "Grade ≥2 peripheral neuropathy"
  modification: "Reduce bortezomib to 1.0 mg/m² or switch to weekly (already in this
    schedule)"
  rationale: "Neuropathy is dose-limiting"
- condition: "Severe infusion reaction to daratumumab IV"
  modification: "Switch to SC formulation (Faspro); rate-modified IV protocol if SC
    unavailable"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: >
    Daratumumab is NOT reimbursed via НСЗУ as of 2026-04-25 — clinical
    trial enrollment, charitable funding, or out-of-pocket are the only
    access pathways. This is a meaningful barrier and must be flagged
    explicitly to the patient before D-VRd is offered.

sources:
- SRC-NCCN-MM-2025

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Inherits VRd's neuropathy + dexamethasone + thrombosis pattern;
# daratumumab adds infusion-reaction risk (especially first dose) +
# increased infection susceptibility from anti-CD38 immunosuppression.
# STUB pending §6.1 two-Co-Lead signoff (dev-mode exemption).
