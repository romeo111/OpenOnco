last_reviewed: "2026-04-25"
notes: >
  Quadruplet induction — preferred for transplant-eligible newly-diagnosed
  MM with high-risk cytogenetics, and increasingly the standard-of-care
  for all transplant-eligible patients per NCCN 2025 (PERSEUS, GRIFFIN
  trial data showing improved MRD-negativity rate). Always paired with
  HBV screening + entecavir prophylaxis if HBsAg+ or anti-HBc+, and
  pre-treatment red-cell phenotyping (daratumumab interferes with
  crossmatch).
notes_ua: >
  Quadruplet індукція — переважний for придатний до трансплантації newly-diagnosed
  MM with високого ризику cytogenetics, and increasingly the стандарт-of-care for
  all придатний до трансплантації patients per NCCN 2025 (PERSEUS, GRIFFIN дослідження
  дані showing покращений МЗХ-negativity rate). Always paired with HBV screening +
  entecavir prophylaxis if HBsAg+ or anti-HBc+, and pre-лікування red-cell phenotyping
  (даратумумаб interferes with crossmatch).
ukrainian_review_status: pending_clinical_signoff
