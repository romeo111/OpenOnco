last_reviewed: "2026-04-25"
notes: >
  Time-limited (6 months) chemoimmuno for WM — preferred when BTKi
  not accessible OR for CXCR4-WHIM-mutated WM (BTKi response weaker).
  IgM flare with rituximab can worsen hyperviscosity — plasmapheresis
  first if symptomatic.
notes_ua: >
  Хіміоімунотерапія з обмеженим терміном (6 місяців) при макроглобулінемії
  Вальденстрема — переважна за відсутності доступу до інгібіторів BTK або при
  CXCR4-WHIM-мутованій МВ (відповідь на BTKi знижена). Спалах IgM на ритуксимабі
  може посилити гіперв'язкість — за наявності симптомів спершу плазмаферез.
ukrainian_review_status: pending_clinical_signoff
