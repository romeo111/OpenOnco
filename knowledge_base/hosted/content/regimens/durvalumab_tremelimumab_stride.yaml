last_reviewed: "2026-04-26"

notes: >
  HIMALAYA: STRIDE regimen 1L unresectable HCC, Child-Pugh A. mOS 16.4
  vs 13.8 sorafenib. Preferred when bevacizumab contraindicated (varices,
  recent thromboembolic, severe HTN). Single priming-dose tremelimumab
  has acceptable safety vs older Q4W schedules. CTLA-4 irAE pattern
  earlier + more colitis vs PD-1 alone.
notes_ua: >
  HIMALAYA: схема STRIDE у першій лінії при нерезектабельній ГЦК, Child-Pugh A.
  Медіана загальної виживаності 16.4 міс. проти 13.8 міс. на сорафенібі (sorafenib).
  Переважна при протипоказаннях до бевацизумабу (варикоз стравоходу, нещодавня
  тромбоемболія, тяжка артеріальна гіпертензія). Одноразова доза тремелімумабу
  (tremelimumab) для праймування має прийнятний профіль безпеки порівняно зі
  старішими схемами Q4W. Небажані явища, пов'язані з CTLA-4, розвиваються раніше
  та частіше у вигляді коліту, ніж при монотерапії інгібітором PD-1.
ukrainian_review_status: pending_clinical_signoff
