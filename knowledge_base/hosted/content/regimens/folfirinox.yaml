id: REG-FOLFIRINOX
name: "FOLFIRINOX"
name_ua: "FOLFIRINOX"
alternate_names: ["mFOLFIRINOX (modified)", "ACCORD-11 regimen"]

components:
  - drug_id: DRUG-OXALIPLATIN
    dose: "85 mg/m²"
    schedule: "IV day 1 every 14d"
    route: IV
  - drug_id: DRUG-IRINOTECAN
    dose: "180 mg/m² (full); 150 mg/m² in modified FOLFIRINOX (mFOLFIRINOX)"
    schedule: "IV day 1"
    route: IV
  - drug_id: DRUG-LEUCOVORIN
    dose: "400 mg/m²"
    schedule: "IV day 1"
    route: IV
  - drug_id: DRUG-5-FLUOROURACIL
    dose: "400 mg/m² IV bolus + 2400 mg/m² CIV over 46h (modified omits bolus to reduce mucositis)"
    schedule: "Day 1 bolus, day 1-2 CIV"
    route: IV

cycle_length_days: 14
total_cycles: "12 cycles (PRODIGE-24 adjuvant); until progression / toxicity (metastatic)"

toxicity_profile: severe

premedication: ["5-HT3 + dexamethasone + atropine for cholinergic syndrome (irinotecan)"]
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "UGT1A1 *28/*28 homozygous"
    modification: "Reduce irinotecan to 135 mg/m² (or 120 mg/m² in mFOLFIRINOX) for first cycle"
    rationale: "Severe neutropenia + diarrhea risk"
    source_refs: [SRC-NCCN-PANCREATIC-2025]
  - condition: "Bilirubin 1.5-3 ULN"
    modification: "Reduce irinotecan 25-50%"
    source_refs: [SRC-NCCN-PANCREATIC-2025]
  - condition: "Bilirubin >3 ULN"
    modification: "Hold irinotecan; consider gem-nab-pac switch"
    source_refs: [SRC-NCCN-PANCREATIC-2025]
  - condition: "Grade 3 diarrhea"
    modification: "Loperamide intensive; reduce irinotecan and 5-FU 25%"
  - condition: "Grade 3+ neuropathy"
    modification: "Hold or reduce oxaliplatin"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "All four components NSZU-funded; G-CSF prophylaxis recommended due to febrile-neutropenia rate ~10% in metastatic, ~3% in modified."

sources: [SRC-NCCN-PANCREATIC-2025, SRC-ESMO-PANCREATIC-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# FOLFIRINOX is the most toxic of standard PDAC regimens — fit ECOG
# 0-1 only. Adds irinotecan (severe diarrhea — cholinergic + delayed)
# and oxaliplatin neuropathy on top of 5-FU. STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Поколювання або оніміння в кистях/стопах"
    action_ua: "Характерно для оксаліплатину — занотовуйте інтенсивність, обговоріть на візиті"
    urgency: log_at_next_visit
    cycle_day_window: "Day 1-7"
    sources:
      - SRC-NCCN-PANCREATIC-2025
  - trigger_ua: "Чутливість до холоду, дискомфорт у горлі від холодного"
    action_ua: "Очікувано перші 3-5 днів циклу — уникайте холодного"
    urgency: log_at_next_visit
    cycle_day_window: "Day 1-5"
    sources:
      - SRC-NCCN-PANCREATIC-2025
  - trigger_ua: "Випадання волосся (на 2-3 тижні)"
    action_ua: "Очікувано — волосся повертається після завершення курсу"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-PANCREATIC-2025
  - trigger_ua: "Помірна нудота, помірна діарея"
    action_ua: "Приймайте призначені протиблювотні і лоперамід; занотовуйте інтенсивність"
    urgency: log_at_next_visit
    cycle_day_window: "Day 1-7"
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Тяжка діарея — більше 6 разів на день, з кров'ю або сильним болем"
    action_ua: "Подзвоніть у клініку того ж дня — іринотекан може спричиняти небезпечну діарею; потрібна корекція"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-PANCREATIC-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Лихоманка вище 38°C — особливо на 7-14 день циклу"
    action_ua: "Подзвоніть у клініку того ж дня — на FOLFIRINOX ризик фебрильної нейтропенії високий навіть з G-CSF"
    urgency: call_clinic_same_day
    cycle_day_window: "Day 7-14"
    sources:
      - SRC-NCCN-PANCREATIC-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Поколювання стає сильним болем, заважає ходити"
    action_ua: "Подзвоніть у клініку того ж дня — нейропатія потребує корекції дози оксаліплатину"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-PANCREATIC-2025
  - trigger_ua: "Раптова виражена слабкість, тяжке зневоднення (запаморочення стоячи, мала кількість сечі)"
    action_ua: "Звертайтесь у лікарню негайно — потрібна інфузійна терапія, можливо термінова"
    urgency: er_now
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Сплутаність свідомості, висока лихоманка з ознобом"
    action_ua: "Звертайтесь у лікарню негайно — ознаки сепсису на тлі нейтропенії"
    urgency: er_now
    sources:
      - SRC-NCCN-PANCREATIC-2025

last_reviewed: "2026-04-26"

notes: >
  ACCORD-11: FOLFIRINOX vs gemcitabine in metastatic PDAC, ECOG 0-1 —
  mOS 11.1 vs 6.8 mo (significant). PRODIGE-24: mFOLFIRINOX adjuvant
  for resected stage I-III (R0/R1) — mOS 54 mo vs 35 gem-mono. Eligible
  patients PS 0-1, bilirubin <1.5 ULN, no severe cardiac comorbidity.
notes_ua: >
  ACCORD-11: FOLFIRINOX проти гемцитабіну (gemcitabine) при метастатичній аденокарциномі
  підшлункової залози (PDAC), ECOG 0-1 — медіана загальної виживаності 11.1 міс. проти
  6.8 міс. (достовірна різниця). PRODIGE-24: mFOLFIRINOX ад'ювантно при резектованій
  стадії I-III (R0/R1) — медіана загальної виживаності 54 міс. проти 35 міс.
  (гемцитабін монотерапія). Критерії відбору: PS 0-1, білірубін <1.5 ВМН, відсутність
  тяжкої серцево-судинної коморбідності.
ukrainian_review_status: pending_clinical_signoff
