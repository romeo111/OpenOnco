id: REG-FOLFOX
name: "FOLFOX (mFOLFOX6)"
name_ua: "FOLFOX (модифікований FOLFOX6)"
alternate_names: ["mFOLFOX6", "FOLFOX-6"]

components:
  - drug_id: DRUG-OXALIPLATIN
    dose: "85 mg/m²"
    schedule: "IV over 2h, day 1"
    route: IV
  - drug_id: DRUG-LEUCOVORIN
    dose: "400 mg/m²"
    schedule: "IV over 2h, day 1 (concurrent with oxaliplatin)"
    route: IV
  - drug_id: DRUG-5-FLUOROURACIL
    dose: "400 mg/m² IV bolus + 2400 mg/m² CIV over 46h"
    schedule: "Day 1 bolus, day 1-2 CIV"
    route: IV
cycle_length_days: 14
total_cycles: "12 cycles (6 mo) for adjuvant stage III; until progression / unacceptable toxicity for metastatic; 4 cycles (8 wk) periop trials"

toxicity_profile: moderate

premedication:
  - "5-HT3 antagonist (ondansetron 8 mg IV) + dexamethasone 8 mg IV"
  - "Optional NK1-RA (aprepitant) for highly emetogenic profile"

mandatory_supportive_care: []

monitoring_schedule_id:

dose_adjustments:
  - condition: "Grade 2 sensory neuropathy with functional impairment"
    modification: "Reduce oxaliplatin to 65 mg/m² OR omit oxaliplatin (continue 5-FU/LV alone)"
    rationale: "Cumulative neurotoxicity; oxaliplatin holiday after 8 cycles common"
    source_refs: [SRC-NCCN-COLON-2025]
  - condition: "Grade 3-4 neutropenia / thrombocytopenia"
    modification: "Reduce 5-FU CIV to 1800 mg/m² and oxaliplatin 25%"
    rationale: "Standard NCCN dose-modification table"
    source_refs: [SRC-NCCN-COLON-2025]

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "All components on НСЗУ formulary for adjuvant + metastatic CRC."

sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Oxaliplatin-driven cold-sensitivity + peripheral neuropathy is the
# signature pattern; 5-FU adds diarrhea + cytopenia. Anaphylactoid
# reactions on cycles 5+ are rare but ER-tier.
# STUB pending CHARTER §6.1 two-Co-Lead signoff (dev-mode exemption).
between_visit_watchpoints:
  - trigger_ua: "Поколювання або оніміння в кистях/стопах"
    action_ua: "Це характерна ознака оксаліплатину — занотуйте, і обговоріть на наступному візиті, особливо якщо поколювання заважає в побуті"
    urgency: log_at_next_visit
    cycle_day_window: "Day 1-7 of each cycle"
    sources:
      - SRC-NCCN-COLON-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Чутливість до холоду — холодне питво, морозильник, холодне повітря викликають дискомфорт у горлі або кистях"
    action_ua: "Очікувано в перші 3-5 днів циклу — уникайте холодного питва і холодного повітря на обличчя; занотуйте інтенсивність"
    urgency: log_at_next_visit
    cycle_day_window: "Day 1-5"
    sources:
      - SRC-NCCN-COLON-2025
  - trigger_ua: "Помірна втома і нудота протягом 3-7 днів після циклу"
    action_ua: "Поширене; приймайте призначені протиблювотні. Занотуйте, якщо нудота утруднює прийом їжі"
    urgency: log_at_next_visit
    cycle_day_window: "Day 1-7"
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Лихоманка вище 38°C"
    action_ua: "Подзвоніть у клініку того ж дня — на 7-14 день циклу можлива низька кількість нейтрофілів і ризик інфекції"
    urgency: call_clinic_same_day
    cycle_day_window: "Day 7-14"
    sources:
      - SRC-NCCN-COLON-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Сильна діарея — більше 4 разів на день або з кров'ю"
    action_ua: "Подзвоніть у клініку того ж дня — 5-фторурацил може спричиняти зневоднення; може знадобитись корекція дози"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-COLON-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Поколювання стає таким сильним, що складно тримати дрібні предмети або відчувати стопи"
    action_ua: "Подзвоніть у клініку того ж дня — потрібна оцінка нейропатії; можлива корекція дози оксаліплатину"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-COLON-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Виражена задишка, тиск у грудях або відчуття стиснення горла під час інфузії оксаліплатину (зазвичай на циклах 5+)"
    action_ua: "Повідомте медсестру негайно під час інфузії; якщо виникло вдома — викликайте швидку. Це може бути алергічна реакція"
    urgency: er_now
    cycle_day_window: "Cycle 5+"
    sources:
      - SRC-NCCN-COLON-2025
      - SRC-CTCAE-V5

last_reviewed: "2026-04-26"
notes: >
  Standard adjuvant for stage III colon, also stage II high-risk
  (T4 / lymphovascular invasion / <12 LN sampled / poorly diff).
  Metastatic 1L for RAS-WT right-sided OR RAS-mutant + bev (combined
  with bevacizumab) — see Indication entries for biologic-add-on logic.
notes_ua: >
  стандарт ад'ювантний for stage III colon, also stage II високого ризику (T4 / lymphovascular invasion / <12 LN sampled / poorly diff). метастатичний 1L for RAS-WT right-sided OR RAS-mutant + bev (combined with бевацизумаб) — see показання entries for biologic-add-on logic.
ukrainian_review_status: pending_clinical_signoff
