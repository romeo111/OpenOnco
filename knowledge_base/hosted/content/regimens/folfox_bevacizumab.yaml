id: REG-FOLFOX-BEV
name: "FOLFOX + Bevacizumab"
name_ua: "FOLFOX + Бевацизумаб"
alternate_names: ["mFOLFOX6 + bev"]

components:
  - drug_id: DRUG-OXALIPLATIN
    dose: "85 mg/m²"
    schedule: "IV day 1"
    route: IV
  - drug_id: DRUG-LEUCOVORIN
    dose: "400 mg/m²"
    schedule: "IV day 1"
    route: IV
  - drug_id: DRUG-5-FLUOROURACIL
    dose: "400 mg/m² IV bolus + 2400 mg/m² CIV over 46h"
    schedule: "Day 1 bolus, day 1-2 CIV"
    route: IV
  - drug_id: DRUG-BEVACIZUMAB
    dose: "5 mg/kg"
    schedule: "IV day 1"
    route: IV

cycle_length_days: 14
total_cycles: "Until progression / unacceptable toxicity (mCRC 1L)"

toxicity_profile: severe
premedication: ["5-HT3 + dexamethasone"]
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Hypertension Grade 2 (SBP ≥150 OR DBP ≥100)"
    modification: "Optimize antihypertensive (ACE-i / CCB); hold bevacizumab if uncontrolled"
    source_refs: [SRC-NCCN-COLON-2025]
  - condition: "Proteinuria >3.5 g/24h"
    modification: "Hold bevacizumab until <2 g/24h"
    source_refs: [SRC-NCCN-COLON-2025]
  - condition: "Recent / planned major surgery"
    modification: "Hold bevacizumab ≥28 days pre-op + ≥28 days post-op until wound healing"
    source_refs: [SRC-NCCN-COLON-2025]

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "FOLFOX components NSZU-funded; bevacizumab biosimilars increasingly available; original molecule typically out-of-pocket."

sources: [SRC-NCCN-COLON-2025, SRC-ESMO-COLON-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Inherits FOLFOX's neuropathy + cold-sensitivity + cytopenia pattern;
# bevacizumab adds BP, proteinuria, bleeding-tendency, and rare bowel-
# perforation watchpoints. STUB pending §6.1 two-Co-Lead signoff.
between_visit_watchpoints:
  - trigger_ua: "Поколювання або оніміння в кистях/стопах"
    action_ua: "Характерна ознака оксаліплатину — занотуйте і обговоріть на наступному візиті"
    urgency: log_at_next_visit
    cycle_day_window: "Day 1-7"
    sources:
      - SRC-NCCN-COLON-2025
  - trigger_ua: "Підвищений артеріальний тиск (вимірюйте 1-2 рази на тиждень)"
    action_ua: "Бевацизумаб може підвищувати тиск — занотуйте показники, обговоріть на наступному візиті"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-COLON-2025
  - trigger_ua: "Чутливість до холоду — холодне питво або повітря викликають дискомфорт"
    action_ua: "Очікувано перші 3-5 днів циклу — уникайте холодного"
    urgency: log_at_next_visit
    cycle_day_window: "Day 1-5"
    sources:
      - SRC-NCCN-COLON-2025
  - trigger_ua: "Лихоманка вище 38°C"
    action_ua: "Подзвоніть у клініку того ж дня — можлива низька кількість нейтрофілів"
    urgency: call_clinic_same_day
    cycle_day_window: "Day 7-14"
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Кров у сечі або сеча, що піниться більше звичайного"
    action_ua: "Подзвоніть у клініку того ж дня — бевацизумаб може впливати на нирки; потрібен аналіз сечі"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-COLON-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Сильний головний біль або запаморочення з підвищеним тиском"
    action_ua: "Подзвоніть у клініку того ж дня — можлива гіпертонічна криза, що потребує корекції лікування"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-COLON-2025
  - trigger_ua: "Сильна діарея — більше 4 разів на день, особливо з кров'ю"
    action_ua: "Подзвоніть у клініку того ж дня — 5-фторурацил може спричиняти зневоднення"
    urgency: call_clinic_same_day
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Раптовий гострий біль у животі"
    action_ua: "Звертайтесь у лікарню негайно — рідкісне ускладнення бевацизумабу (перфорація кишківника)"
    urgency: er_now
    sources:
      - SRC-NCCN-COLON-2025
  - trigger_ua: "Кровохаркання або значна кровотеча, що не спиняється"
    action_ua: "Звертайтесь у лікарню негайно — бевацизумаб підвищує ризик кровотеч"
    urgency: er_now
    sources:
      - SRC-NCCN-COLON-2025

last_reviewed: "2026-04-26"

notes: >
  mCRC 1L for RAS-mutant patients (where anti-EGFR contraindicated)
  AND right-sided RAS-WT (CALGB-80405 — bev preferred over cetux for
  right-sided per ESMO 2024). Adds ~2-4 mo PFS over FOLFOX alone.
  Required pre-treatment: recent BP control, no recent surgery (≤28 d),
  no active hemorrhage, UPCR baseline.
notes_ua: >
  mCRC 1L for RAS-mutant patients (where anti-EGFR протипоказаний) AND right-sided RAS-WT (CALGB-80405 — bev переважний over cetux for right-sided per ESMO 2024). Adds ~2-4 mo PFS over FOLFOX alone. обов'язковий pre-лікування: recent BP control, ні recent surgery (≤28 d), ні active hemorrhage, UPCR базове.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
