last_reviewed: "2026-04-26"

notes: >
  mCRC 1L for RAS-WT LEFT-sided primary (CALGB-80405 / FIRE-3 /
  CRYSTAL). Right-sided RAS-WT primaries get bevacizumab preferentially.
  BRAF V600E precludes anti-EGFR (no benefit). Acneiform rash strongly
  correlates with response — patient education on skin care critical.
notes_ua: >
  mCRC 1L for RAS-WT LEFT-sided primary (CALGB-80405 / FIRE-3 / CRYSTAL). Right-sided RAS-WT primaries get бевацизумаб preferentially. BRAF V600E precludes anti-EGFR (ні виграш). Acneiform висип strongly correlates with відповідь — patient education on skin care critical.
