id: REG-FOLFOX-NIVO
name: "FOLFOX + Nivolumab"
name_ua: "FOLFOX + Ніволумаб"
alternate_names: ["CheckMate-649 regimen (chemo + nivo arm)"]

components:
  - drug_id: DRUG-OXALIPLATIN
    dose: "85 mg/m²"
    schedule: "IV day 1 every 14d"
    route: IV
  - drug_id: DRUG-LEUCOVORIN
    dose: "400 mg/m²"
    schedule: "IV day 1"
    route: IV
  - drug_id: DRUG-5-FLUOROURACIL
    dose: "400 mg/m² IV bolus + 2400 mg/m² CIV over 46h"
    schedule: "Day 1 bolus, day 1-2 CIV"
    route: IV
  - drug_id: DRUG-NIVOLUMAB
    dose: "240 mg IV q2w (alternatively 480 mg IV q4w)"
    schedule: "IV day 1 of each 14-d cycle"
    route: IV

cycle_length_days: 14
total_cycles: "Until progression / unacceptable toxicity (chemo backbone capped at ~12 cycles in some protocols; nivo continues mono until 2 years)"

toxicity_profile: severe
premedication: ["5-HT3 + dexamethasone"]
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Grade 3+ irAE"
    modification: "Hold nivo permanently; continue FOLFOX if disease control needed"
  - condition: "Grade 2 oxaliplatin-induced neuropathy"
    modification: "Reduce / discontinue oxaliplatin; continue 5-FU + nivo"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Nivolumab out-of-pocket; chemo backbone NSZU-funded."

sources: [SRC-NCCN-GASTRIC-2025, SRC-ESMO-GASTRIC-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# FOLFOX + nivolumab for gastric/GEJ adeno 1L (CheckMate-649).
# FOLFOX neuropathy + IO irAEs. STUB pending §6.1.
between_visit_watchpoints:
  - trigger_ua: "Поколювання або оніміння в кистях/стопах"
    action_ua: "Оксаліплатин — занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-GASTRIC-2025
  - trigger_ua: "Чутливість до холоду"
    action_ua: "Уникайте холодного питва і повітря"
    urgency: log_at_next_visit
    cycle_day_window: "Day 1-5"
    sources:
      - SRC-NCCN-GASTRIC-2025
  - trigger_ua: "Шкірний свербіж від ніволумабу"
    action_ua: "Використовуйте зволожувач"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-GASTRIC-2025
  - trigger_ua: "Лихоманка вище 38°C"
    action_ua: "Подзвоніть у клініку того ж дня — нейтропенія можлива"
    urgency: call_clinic_same_day
    cycle_day_window: "Day 7-14"
    sources:
      - SRC-NCCN-GASTRIC-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Помірна діарея (3-4 рази на день)"
    action_ua: "Подзвоніть у клініку того ж дня — імунний коліт або 5-ФУ-токсичність"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-GASTRIC-2025
  - trigger_ua: "Жовтяниця, біль у правому верхньому квадранті"
    action_ua: "Подзвоніть у клініку того ж дня — імунний гепатит"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-GASTRIC-2025
  - trigger_ua: "Тяжка діарея або сильна задишка"
    action_ua: "Звертайтесь у лікарню негайно"
    urgency: er_now
    sources:
      - SRC-NCCN-GASTRIC-2025

last_reviewed: "2026-04-26"

notes: >
  CheckMate-649: FOLFOX + nivo in PD-L1 CPS ≥5 (per FDA label) — mOS
  benefit. Pembrolizumab + chemo (KEYNOTE-859) is a label-equivalent
  alternative without strict CPS gating but practical CPS ≥1 cutoff.
  HER2+ patients route to trastuzumab + chemo instead.
notes_ua: >
  CheckMate-649: FOLFOX + nivo in PD-L1 CPS ≥5 (per FDA label) — mOS виграш. пембролізумаб + chemo (KEYNOTE-859) is a label-еквівалентний alternative without strict CPS gating but practical CPS ≥1 cutoff. HER2+ patients route to трастузумаб + chemo instead.
ukrainian_review_status: pending_clinical_signoff
