last_reviewed: "2026-04-25"
notes: >
  STUB. Salvage / pre-transplant cytoreduction. Hemorrhagic cystitis ризик
  без mesna фатальний; ifosfamide encephalopathy — methylene blue treatable.
  Used у HSTCL induction + DLBCL R/R + Hodgkin salvage.
notes_ua: >
  STUB. сальвадж / pre-transplant cytoreduction. Hemorrhagic cystitis ризик без mesna
  фатальний; іфосфамід encephalopathy — methylene blue treatable. Used у HSTCL індукція
  + DLBCL р/р + Hodgkin сальвадж.
