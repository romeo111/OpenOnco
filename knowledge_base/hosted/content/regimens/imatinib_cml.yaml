id: REG-IMATINIB-CML
name: "Imatinib (CML chronic phase 1L)"
name_ua: "Іматиніб (ХМЛ хронічна фаза 1L)"
alternate_names:
  - "Imatinib 400"
  - "Glivec/Gleevec 400"
  - "IRIS regimen"

components:
  - drug_id: DRUG-IMATINIB
    dose: "400 mg PO once daily with food + large glass of water"
    schedule: "continuous, lifelong (or until durable deep molecular response permits TFR attempt per ELN 2020 criteria)"
    route: PO

cycle_length_days:
total_cycles: "Continuous; check BCR-ABL1 IS at 3, 6, 12 months for milestone-based response (≤10%, ≤1%, ≤0.1% respectively); TKI switch on suboptimal / failure"

toxicity_profile: low

premedication:
  - "Take with meal (reduces GI upset)"
  - "Antiemetic only if needed early on (nausea usually self-limited)"
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Suboptimal molecular response at 3 mo (BCR-ABL1 IS >10%)"
    modification: "Confirm adherence + check kinase-domain mutations; switch to 2nd-gen TKI (dasatinib / nilotinib / bosutinib by comorbidity matrix) per ELN 2020"
    rationale: "Milestone failure predicts inferior long-term outcome on imatinib"
    source_refs:
      - SRC-ELN-CML-2020
  - condition: "Failure at 12 mo (BCR-ABL1 IS >1%) or progression to AP/BP"
    modification: "Switch to 2nd-gen TKI (dasatinib 100 mg or nilotinib 400 mg BID); ponatinib for T315I"
    rationale: "Treatment failure"
    source_refs:
      - SRC-ELN-CML-2020
  - condition: "Severe toxicity (cytopenias gr ≥3, severe edema, severe muscle cramps)"
    modification: "Hold; resume 300 mg daily once recovered; switch TKI if intolerance recurs"
    rationale: "Toxicity management"
  - condition: "Hepatic dysfunction (transaminases >5× ULN, bilirubin >3× ULN)"
    modification: "Hold; resume at reduced dose with hepatology co-management"
    rationale: "Hepatotoxicity is recognized AE"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "Imatinib generic widely НСЗУ-reimbursed for CML. Most accessible 1L TKI in Ukraine."

sources:
  - SRC-NCCN-MPN-2025
  - SRC-ELN-CML-2020
  - SRC-ESMO-CML-2017
  - SRC-IRIS-OBRIEN-2003

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Imatinib is taken long-term (often years). Most patients tolerate
# well; key axes are GI side effects, fluid retention, muscle cramps,
# and rare cardiac/hepatic toxicity. STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Помірна нудота, особливо якщо приймаєте препарат натще"
    action_ua: "Приймайте іматиніб з їжею і повною склянкою води — це часто вирішує проблему. Занотуйте, якщо нудота триває"
    urgency: log_at_next_visit
    sources:
      - SRC-ELN-CML-2020
  - trigger_ua: "М'язові судоми, біль у м'язах"
    action_ua: "Поширений побічний ефект — пийте достатньо води, додавайте магній за порадою лікаря. Занотовуйте частоту"
    urgency: log_at_next_visit
    sources:
      - SRC-ELN-CML-2020
  - trigger_ua: "Легкі набряки під очима або на гомілках"
    action_ua: "Поширене на іматинібі — занотовуйте, обговоріть на наступному візиті, особливо якщо набряки збільшуються"
    urgency: log_at_next_visit
    sources:
      - SRC-ELN-CML-2020
  - trigger_ua: "Висип, який поширюється або свербіж шкіри"
    action_ua: "Подзвоніть у клініку того ж дня — потрібна оцінка реакції; може знадобитись пауза в препараті"
    urgency: call_clinic_same_day
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Жовтяниця або потемніння сечі"
    action_ua: "Подзвоніть у клініку того ж дня — рідко іматиніб може впливати на печінку; потрібен аналіз крові"
    urgency: call_clinic_same_day
    sources:
      - SRC-ELN-CML-2020
      - SRC-CTCAE-V5
  - trigger_ua: "Раптова виражена задишка або різке збільшення набряків"
    action_ua: "Звертайтесь у лікарню негайно — рідко іматиніб може спричиняти затримку рідини у легенях"
    urgency: er_now
    sources:
      - SRC-ELN-CML-2020
      - SRC-CTCAE-V5
  - trigger_ua: "Лихоманка з ознобом, виражена слабкість"
    action_ua: "Подзвоніть у клініку того ж дня — потрібен контроль показників крові й виключення інфекції"
    urgency: call_clinic_same_day
    sources:
      - SRC-CTCAE-V5

last_reviewed: "2026-04-25"
notes: >
  Standard 1L for low-risk CML chronic phase, elderly, comorbid patients,
  or where cost / access is limiting. IRIS established imatinib 400 mg
  daily; 10-y OS ~83%. ELN 2020 milestones: ≤10% at 3 mo, ≤1% at 6 mo,
  ≤0.1% (MMR) at 12 mo. PCR monitoring q3mo for first year, then q3-6mo.
  TFR attempt eligible after ≥3 years on TKI + sustained DMR (MR4.5)
  ≥2 years per ELN. STUB — requires clinical co-lead signoff before
  publication.
notes_ua: >
  стандарт 1L for низького ризику CML chronic phase, літнього віку, comorbid patients, or where cost / access is limiting. IRIS усталений іматиніб 400 mg daily; 10-y OS ~83%. ELN 2020 milestones: ≤10% at 3 міс., ≤1% at 6 міс., ≤0.1% (MMR) at 12 mo. PCR моніторинг q3mo for first year, then q3-6mo. TFR attempt eligible after ≥3 years on TKI + sustained DMR (MR4.5) ≥2 years per ELN. STUB — requires clinical co-lead signoff before publication.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
