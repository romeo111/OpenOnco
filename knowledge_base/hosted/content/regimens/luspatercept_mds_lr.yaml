id: REG-LUSPATERCEPT-MDS-LR
name: "Luspatercept (MDS-LR with RS or post-ESA failure)"
name_ua: "Луспатерцепт (MDS-LR з кільцеподібними сидеробластами або невдача ESA)"
alternate_names:
  - "Reblozyl"
  - "MEDALIST regimen"
  - "COMMANDS regimen"

components:
  - drug_id: DRUG-LUSPATERCEPT
    dose: "1.0 mg/kg SC q3wk; titrate to 1.33 mg/kg then 1.75 mg/kg if no transfusion-burden reduction after 2 doses"
    schedule: "every 3 weeks SC"
    route: SC

cycle_length_days: 21
total_cycles: "Continue if transfusion-burden reduction; reassess at 24 weeks"

toxicity_profile: low

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "No transfusion-burden reduction at 24 weeks (1.75 mg/kg)"
    modification: "Discontinue luspatercept; consider HMA escalation or alternative"
    rationale: "Non-responders unlikely to benefit"
    source_refs:
      - SRC-COMMANDS-FENAUX-2020
      - SRC-ESMO-MDS-2021
  - condition: "Hypertension (new or worsening)"
    modification: "Hold; antihypertensives; resume at lower dose once BP controlled"
    rationale: "HTN is recognized AE"
  - condition: "Thromboembolic event"
    modification: "Hold; anticoagulation; permanent discontinuation per severity"
    rationale: "VTE risk"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Luspatercept NOT registered in Ukraine — major access barrier. ESA → repeat ESA dose-titration is the practical reimbursed pathway."

sources:
  - SRC-NCCN-AML-2025
  - SRC-ESMO-MDS-2021
  - SRC-COMMANDS-FENAUX-2020

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Luspatercept SC q3w for transfusion-dependent MDS-LR. Most patients
# are older. Tolerability profile: fatigue, GI, occasional thrombosis,
# rare HTN. STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Помірна втома, помірний головний біль"
    action_ua: "Зустрічаються — занотовуйте інтенсивність"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-AML-2025
  - trigger_ua: "Реакція в місці підшкірної ін'єкції — почервоніння, легкий біль"
    action_ua: "Зустрічається — чергуйте місця ін'єкцій"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-AML-2025
  - trigger_ua: "Помірна діарея, нудота"
    action_ua: "Зазвичай мінімальні — занотовуйте інтенсивність"
    urgency: log_at_next_visit
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Підвищений тиск (вимірюйте 1-2 рази на тиждень)"
    action_ua: "Подзвоніть у клініку того ж дня — лусперцепт може підвищувати тиск"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-AML-2025
  - trigger_ua: "Біль або припухлість в одній нозі (особливо литка)"
    action_ua: "Подзвоніть у клініку того ж дня — лусперцепт рідко може підвищувати ризик тромбозу"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-AML-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Раптова задишка, біль у грудях, кашель з кров'ю"
    action_ua: "Звертайтесь у лікарню негайно — можлива легенева тромбоемболія"
    urgency: er_now
    sources:
      - SRC-NCCN-AML-2025

last_reviewed: "2026-04-25"
notes: >
  Originally established as 2L (MEDALIST: RS-MDS post-ESA failure).
  COMMANDS later established luspatercept as 1L over ESA for
  transfusion-dependent LR-MDS broadly. SF3B1+ / RS subtype shows
  strongest benefit. NOT registered in Ukraine — pragmatic 1L in our
  setting remains ESA. STUB — requires clinical co-lead signoff before
  publication.
notes_ua: >
  Спочатку встановлений як препарат другої лінії (MEDALIST: RS-МДС після невдачі
  ESA). Дослідження COMMANDS згодом встановило люспатерцепт (luspatercept) як
  першолінійну терапію замість ESA при трансфузійно-залежному МДС низького ризику
  загалом. Підтип SF3B1+ / RS показує найбільший виграш. В Україні НЕ зареєстрований —
  прагматична перша лінія залишається ESA. STUB — потребує підписання клінічним
  співкерівником перед публікацією.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_11
