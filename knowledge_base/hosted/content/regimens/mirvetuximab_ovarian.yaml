  - trigger_ua: "Поколювання або оніміння в кистях/стопах"
    action_ua: "Можлива нейропатія — занотовуйте інтенсивність"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-OVARIAN-2025
  - trigger_ua: "Виражене розмиття зору, біль в очах, чутливість до світла"
    action_ua: "Подзвоніть у клініку того ж дня — потрібна термінова оцінка офтальмолога; може знадобитись пауза в препараті"
    urgency: call_clinic_same_day
