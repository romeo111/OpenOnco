last_reviewed: "2026-04-27"

notes: >
  Single-agent ADC. Mandatory baseline ophthalmology evaluation
  (slit-lamp + visual acuity) before cycle 1, then every other cycle
  for first 8 cycles (or per symptoms). Steroid + lubricant eye-drop
  prophylaxis is non-negotiable — keratopathy/visual impairment is the
  defining toxicity (~50% blurred vision, ~37% keratopathy in MIRASOL).
  Avoid contact lenses during therapy. Do not initiate without
  documented FRα-high status by VENTANA FOLR1 RxDx (≥75% TPS at ≥2+).
notes_ua: >
  Однокомпонентний ADC. Обов'язковий базовий офтальмологічний огляд
  (щілинна лампа + гострота зору) до циклу 1, потім кожні 2 цикли
  впродовж перших 8 циклів (або за симптомами). Профілактика стероїдними
  та зволожуючими очними краплями є обов'язковою — кератопатія/порушення
  зору є визначальною токсичністю (~50% розмитого зору, ~37% кератопатії
  у MIRASOL). Уникати контактних лінз під час терапії. Не починати без
  підтвердженого статусу FRα-high за VENTANA FOLR1 RxDx (≥75% TPS при ≥2+).
  MIRASOL (Moore Lancet 2024, n=453): мірветуксимаб соравтансин (mirvetuximab
  soravtansine) 6 мг/кг AIBW в/в кожні 21 день проти стандартної хімії
  (паклітаксел, топотекан або PLD) при FRα-high платинорезистентному раку
  яєчників, ≥1-3 попередніх лінії. мВБП 5,6 проти 3,9 міс. (ВР 0,65),
  мЗВ 16,9 проти 12,9 міс. (ВР 0,67), ЗРВ 42,3% проти 15,9%. Прискорене
  схвалення FDA листопад 2022; повне схвалення очікується. Обов'язкове
  тестування FRα за VENTANA FOLR1 RxDx.
