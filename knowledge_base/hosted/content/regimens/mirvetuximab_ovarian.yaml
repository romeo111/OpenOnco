    sources:
      - SRC-NCCN-OVARIAN-2025
      - SRC-MIRASOL-MOORE-2024
  - trigger_ua: "Помірна втома, нудота, помірна діарея"
    action_ua: "Зустрічається — приймайте призначені протиблювотні; занотовуйте"
    urgency: log_at_next_visit
    sources:
