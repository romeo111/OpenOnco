id: REG-NIRAPARIB-MAINT-OVARIAN
name: "Niraparib maintenance (HRD+ recurrent platinum-sensitive ovarian, NOVA / PRIMA)"
name_ua: "Нірапариб підтримка (HRD+ рецидив платиночутливого раку яєчників, NOVA / PRIMA)"
alternate_names: ["NOVA maintenance", "PRIMA maintenance"]

components:
  - drug_id: DRUG-NIRAPARIB
    dose: "200 mg PO daily if baseline weight <77 kg OR platelets <150 × 10⁹/L; otherwise 300 mg PO daily (individualized starting dose per Berek et al. 2018 update)"
    schedule: "Continuous"
    route: PO

cycle_length_days: null
total_cycles: "Until progression or unacceptable toxicity"

toxicity_profile: moderate
premedication: ["Optional 5-HT3 antagonist for nausea (most patients tolerate after first weeks)"]
mandatory_supportive_care: []
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Grade 3-4 thrombocytopenia (defining toxicity, ~36%)"
    modification: "Hold until platelets ≥100, then resume at 100-mg-lower dose level (300 → 200 → 100 mg)"
    source_refs: [SRC-NOVA-MIRZA-2016]
  - condition: "Grade 3-4 anemia / neutropenia"
    modification: "Hold until ≤Grade 1, resume at one dose level lower"
  - condition: "Grade 3 hypertension"
    modification: "Initiate / intensify antihypertensives; hold until ≤Grade 1"
  - condition: "Persistent Grade 2 nausea"
    modification: "Aggressive antiemetics; consider dose reduction if persistent"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "Нірапариб — НСЗУ-фінансований для оваріальної підтримуючої терапії 1L (PRIMA) і 2L+ платиночутливого рецидиву (НОВА). Перевірено 2026-04-27."

sources: [SRC-NCCN-OVARIAN-2025, SRC-ESMO-OVARIAN-2024, SRC-NOVA-MIRZA-2016, SRC-PRIMA-GONZALEZ-MARTIN-2019]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Niraparib maintenance for ovarian post-platinum response (PRIMA 1L,
# NOVA 2L+). Same PARPi pattern as olaparib + higher rates of
# thrombocytopenia early on (especially low body weight). STUB pending §6.1.
between_visit_watchpoints:
  - trigger_ua: "Помірна втома, нудота"
    action_ua: "Очікувано в перші тижні — занотовуйте інтенсивність"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-OVARIAN-2025
  - trigger_ua: "Підвищений тиск (вимірюйте 1-2 рази на тиждень)"
    action_ua: "Нірапариб може підвищувати тиск — занотовуйте показники"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-OVARIAN-2025
  - trigger_ua: "Незвичні синці або кровотечі"
    action_ua: "Подзвоніть у клініку того ж дня — нірапариб часто знижує тромбоцити, особливо в перші 2 місяці"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-OVARIAN-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Виражена втома, задишка"
    action_ua: "Подзвоніть у клініку того ж дня — потрібна оцінка анемії"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-OVARIAN-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Лихоманка вище 38°C"
    action_ua: "Подзвоніть у клініку того ж дня — нейтропенія можлива"
    urgency: call_clinic_same_day
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Тяжка кровотеча, що не спиняється"
    action_ua: "Звертайтесь у лікарню негайно — на тлі тромбоцитопенії"
    urgency: er_now
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Раптова сильна задишка, новий сухий кашель"
    action_ua: "Звертайтесь у лікарню негайно — рідко нірапариб може спричиняти пневмоніт"
    urgency: er_now
    sources:
      - SRC-NCCN-OVARIAN-2025

last_reviewed: "2026-04-27"

notes: >
  NOVA (2L+ recurrent platinum-sensitive maintenance): gBRCA mPFS 21.0
  vs 5.5 mo; non-gBRCA HRD+ 12.9 vs 3.8 mo; non-gBRCA all 9.3 vs 3.9 mo.
  Individualized starting-dose rule (Berek 2018) reduces thrombocytopenia
  without compromising efficacy. CBC weekly first month, then monthly.
  Long-term MDS/AML risk warrants pre-treatment counseling.

notes_ua: >
  NOVA (підтримуюча терапія 2L+ рецидив платиночутливого раку яєчників): медіана
  виживаності без прогресування (мВБП) при зародковій мутації BRCA (gBRCA) — 21,0
  проти 5,5 міс.; при HR-дефіцитній (HRD+) популяції без gBRCA — 12,9 проти
  3,8 міс.; загальна non-gBRCA когорта — 9,3 проти 3,9 міс. Правило
  індивідуалізованої початкової дози (Berek 2018): якщо вихідна маса тіла
  <77 кг або тромбоцити <150 × 10⁹/л — 200 мг/добу, в іншому разі — 300 мг/добу;
  знижує тромбоцитопенію без шкоди ефективності. Загальний аналіз крові щотижня
  протягом першого місяця, потім щомісяця. Довготривалий ризик розвитку МДС/ГМЛ
  потребує консультації перед початком лікування.
