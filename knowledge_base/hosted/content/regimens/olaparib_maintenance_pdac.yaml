id: REG-OLAPARIB-MAINT-PDAC
name: "Olaparib maintenance (BRCA-mut PDAC post-platinum, POLO)"
name_ua: "Олапариб підтримка (BRCA-мут PDAC після платини, POLO)"
alternate_names: ["POLO maintenance"]

components:
  - drug_id: DRUG-OLAPARIB
    dose: "300 mg PO BID continuous"
    schedule: "Continuous"
    route: PO

cycle_length_days:
total_cycles: "Until progression / unacceptable toxicity"

toxicity_profile: moderate
premedication: ["5-HT3 PRN for nausea (settles after 4 weeks usually)"]
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Grade 2 anemia"
    modification: "Hold + transfuse if symptomatic; resume at 250 mg BID"
    source_refs: [SRC-NCCN-PANCREATIC-2025]
  - condition: "Persistent Grade 3 nausea"
    modification: "Reduce to 250 then 200 mg BID + aggressive antiemetics"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Out-of-pocket / charitable pathway."

sources: [SRC-NCCN-PANCREATIC-2025, SRC-ESMO-PANCREATIC-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Olaparib maintenance for BRCA-germline metastatic PDAC post-platinum
# (POLO). Same PARPi pattern. STUB pending §6.1.
between_visit_watchpoints:
  - trigger_ua: "Помірна втома, нудота"
    action_ua: "Часто проходить через 2-3 місяці"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-PANCREATIC-2025
  - trigger_ua: "Виражена втома, задишка"
    action_ua: "Подзвоніть у клініку того ж дня — олапариб може спричиняти анемію"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-PANCREATIC-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Лихоманка вище 38°C"
    action_ua: "Подзвоніть у клініку того ж дня — нейтропенія можлива"
    urgency: call_clinic_same_day
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Незвичні синці, кровотеча"
    action_ua: "Подзвоніть у клініку того ж дня — тромбоцитопенія"
    urgency: call_clinic_same_day
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Раптова задишка, новий сухий кашель"
    action_ua: "Звертайтесь у лікарню негайно — рідко може спричиняти пневмоніт"
    urgency: er_now
    sources:
      - SRC-NCCN-PANCREATIC-2025

last_reviewed: "2026-04-26"

notes: >
  POLO trial: olaparib maintenance in germline BRCA-mut mPDAC after
  ≥16 weeks platinum-based induction without progression — mPFS 7.4
  vs 3.8 mo placebo (OS endpoint NS but PFS practice-changing).
  Long-term MDS/AML risk warrants pre-treatment counseling.
notes_ua: >
  POLO дослідження: олапариб підтримка in герміногенний BRCA-mut mPDAC after ≥16 weeks platinum-based індукція without прогресування — mPFS 7.4 проти 3.8 mo placebo (OS endpoint NS but PFS practice-changing). Long-term MDS/AML risk warrants pre-лікування counseling.
ukrainian_review_status: pending_clinical_signoff
