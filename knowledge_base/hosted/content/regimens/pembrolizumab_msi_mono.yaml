last_reviewed: "2026-04-26"

notes: >
  KEYNOTE-177: PFS 16.5 vs 8.2 mo over FOLFOX+bev in MSI-H mCRC 1L; OS
  endpoint diluted by crossover but persistent ORR + duration benefit.
  Single-agent (no chemo backbone needed for MSI-H — explosive ORR ~50%).
  irAE awareness critical — hyperprogression rare but reported in MSI-L
  patients incorrectly treated.
notes_ua: >
  KEYNOTE-177: PFS 16.5 проти 8.2 mo over FOLFOX+bev in MSI-H mCRC 1L; OS endpoint diluted by crossover but persistent ORR + duration виграш. Single-agent (ні chemo основа схеми needed for MSI-H — explosive ORR ~50%). irAE awareness critical — hyperprogression рідкісний but reported in MSI-L patients incorrectly treated.
