id: REG-PEMBROLIZUMAB-MSI-MONO
name: "Pembrolizumab monotherapy (MSI-H mCRC 1L)"
name_ua: "Пембролізумаб монотерапія (MSI-H мКРР 1L)"
alternate_names: ["KEYNOTE-177 regimen"]

components:
  - drug_id: DRUG-PEMBROLIZUMAB
    dose: "200 mg IV q3w OR 400 mg IV q6w"
    schedule: "Until progression / unacceptable toxicity / 35 cycles (about 2 years)"
    route: IV

cycle_length_days: 21
total_cycles: "Until progression / unacceptable toxicity / max 35 cycles per KEYNOTE-177"

toxicity_profile: low

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Grade 2 immune-related adverse event (irAE)"
    modification: "Hold drug; corticosteroids prednisone 0.5-1 mg/kg/d; resume when ≤Grade 1"
    rationale: "irAE management protocol per NCCN Immunotherapy-Related Toxicities"
    source_refs: [SRC-NCCN-COLON-2025]
  - condition: "Grade 3-4 irAE"
    modification: "Discontinue permanently for most Grade 3-4; high-dose steroids prednisone 1-2 mg/kg/d; consider IL-6 (tocilizumab) for steroid-refractory colitis"
    source_refs: [SRC-NCCN-COLON-2025]

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Pembrolizumab out-of-pocket in Ukraine; MSI-H pan-cancer indication has selective charitable / clinical-trial pathway access."

sources: [SRC-NCCN-COLON-2025, SRC-ESMO-COLON-2024, SRC-KEYNOTE-177-ANDRE-2020]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Pembrolizumab is generally well-tolerated; the dominant axes are
# immune-related adverse events (irAEs) which can affect any organ —
# colitis, pneumonitis, hepatitis, thyroiditis, hypophysitis. Most are
# manageable with steroids if caught early. The watchpoint pattern here
# is reusable across other anti-PD-1 / anti-PD-L1 monotherapies
# (nivolumab, atezolizumab, durvalumab) per Wave 1 priority.
# STUB pending §6.1 two-Co-Lead signoff (dev-mode exemption).
between_visit_watchpoints:
  - trigger_ua: "Помірна втома після інфузії"
    action_ua: "Очікувано перші дні після інфузії — занотовуйте інтенсивність"
    urgency: log_at_next_visit
    cycle_day_window: "Day 1-3 of each infusion"
    sources:
