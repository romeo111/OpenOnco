id: REG-R-CHOP
name: "Rituximab + CHOP (R-CHOP), 6 cycles"
name_ua: "Ритуксимаб + CHOP (R-CHOP), 6 циклів"
alternate_names:
  - "R-CHOP"
  - "R-CHOP-21"

components:
  - drug_id: DRUG-RITUXIMAB
    dose: "375 mg/m²"
    schedule: "IV day 1 of each 21-day cycle"
    route: IV
  - drug_id: DRUG-CYCLOPHOSPHAMIDE
    dose: "750 mg/m²"
    schedule: "IV day 1 of each 21-day cycle"
    route: IV
  - drug_id: DRUG-DOXORUBICIN
    dose: "50 mg/m²"
    schedule: "IV day 1 of each 21-day cycle"
    route: IV
  - drug_id: DRUG-VINCRISTINE
    dose: "1.4 mg/m² (capped at 2 mg total)"
    schedule: "IV day 1 of each 21-day cycle"
    route: IV
  - drug_id: DRUG-PREDNISONE
    dose: "100 mg"
    schedule: "PO days 1-5 of each 21-day cycle"
    route: PO

cycle_length_days: 21
total_cycles: "6 (with consideration of 2-month interim PET-CT after cycles 2-4)"

toxicity_profile: moderate

premedication:
  - "Antihistamine + acetaminophen + IV steroid before rituximab (especially first dose)"
  - "5-HT3 antagonist + dexamethasone before doxorubicin/cyclophosphamide"
mandatory_supportive_care:
  - SUP-PJP-PROPHYLAXIS
  - SUP-TLS-PROPHYLAXIS
  - SUP-ANTIEMETIC-PREMED
monitoring_schedule_id: MON-R-CHOP-REGIMEN

dose_adjustments:
  - condition: "Cumulative anthracycline approaching 450-500 mg/m² lifetime"
    modification: "Echo + LVEF check before next dose; consider regimen change if borderline"
    rationale: "Cardiotoxicity is dose-cumulative"
    source_refs:
      - SRC-NCCN-BCELL-2025
  - condition: "Total bilirubin >3 mg/dL"
    modification: "Reduce vincristine + doxorubicin per hepatic-impairment dosing"
    rationale: "Both are hepatically cleared"
    source_refs:
      - SRC-NCCN-BCELL-2025
  - condition: "Grade ≥2 peripheral neuropathy"
    modification: "Hold or reduce vincristine; may convert to non-vincristine regimen"
    rationale: "Vincristine neuropathy is dose-cumulative and often permanent"
  - condition: "ANC <1500 or platelets <100K at cycle start"
    modification: "Delay cycle ≥7 days; consider G-CSF support"
    rationale: "Cumulative myelosuppression"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "All R-CHOP components reimbursed via НСЗУ for B-cell lymphoma indications"

sources:
  - SRC-NCCN-BCELL-2025

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# R-CHOP combines anti-CD20 infusion-reaction risk + classic cytopenia +
# anthracycline cardiac watchpoints + lymphoma-specific HBV reactivation
# (separate emergency RF — surfaces in banner not here).
# STUB pending CHARTER §6.1 two-Co-Lead signoff (dev-mode exemption).
between_visit_watchpoints:
  - trigger_ua: "Помірна втома протягом 3-5 днів після інфузії"
    action_ua: "Це нормально — занотуйте, і відпочивайте більше у ці дні. Обговоріть на наступному візиті, якщо втома триває довше"
    urgency: log_at_next_visit
    cycle_day_window: "Day 1-5 of each cycle"
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Випадання волосся (початок на 2-3 тижні після першого циклу)"
    action_ua: "Очікуване від доксорубіцину — занотуйте, обговоріть на візиті. Волосся повертається після завершення курсу"
    urgency: log_at_next_visit
    cycle_day_window: "Day 14-21"
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Помірна нудота протягом перших 1-3 днів після циклу"
    action_ua: "Приймайте призначені протиблювотні; занотуйте, якщо стають слабшими — обговоріть на наступному візиті"
    urgency: log_at_next_visit
    cycle_day_window: "Day 1-3"
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Лихоманка вище 38°C — особливо на 7-14 день циклу"
    action_ua: "Подзвоніть у клініку того ж дня — це період можливої низької кількості нейтрофілів і ризику інфекції"
    urgency: call_clinic_same_day
    cycle_day_window: "Day 7-14"
    sources:
      - SRC-NCCN-BCELL-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Незвичні синці, кровотеча ясен або носа, що довго не спиняється"
    action_ua: "Подзвоніть у клініку того ж дня — це може свідчити про знижену кількість тромбоцитів"
    urgency: call_clinic_same_day
    cycle_day_window: "Day 7-14"
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Нова задишка, прискорене серцебиття або біль у грудях"
    action_ua: "Подзвоніть у клініку того ж дня — доксорубіцин може впливати на серце; потрібна оцінка"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BCELL-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Тяжка реакція на інфузію ритуксимабу (особливо першу): задишка, набряк обличчя, висип, тиск падає"
    action_ua: "Інфузія зазвичай проводиться в клініці — повідомте медсестру негайно. Якщо реакція виникла вдома, викликайте швидку"
    urgency: er_now
    cycle_day_window: "Day 1 of cycle 1"
    sources:
      - SRC-NCCN-BCELL-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Озноб + лихоманка + сплутаність свідомості"
    action_ua: "Звертайтесь у лікарню негайно — це ознаки можливого сепсису на тлі низьких нейтрофілів"
    urgency: er_now
    sources:
      - SRC-CTCAE-V5

last_reviewed: "2026-04-25"
notes: >
  Standard 1L regimen for newly-diagnosed DLBCL NOS for the past 20+
  years. ~60% cure rate overall, ~80% for low-IPI / ~55% for high-IPI.
  HBV screening + entecavir prophylaxis if HBsAg+ or anti-HBc+ MANDATORY
  before first rituximab dose. Echocardiogram (LVEF) baseline + after
  cumulative dose >300 mg/m². Interim PET-CT after cycles 2-4 helpful
  for response assessment but doesn't routinely change therapy unless
  PD seen.
notes_ua: >
  стандарт 1L схема for newly-diagnosed DLBCL NOS for the past 20+ years. ~60% cure rate overall, ~80% for low-IPI / ~55% for high-IPI. HBV screening + entecavir prophylaxis if HBsAg+ or anti-HBc+ обов'язковий before first ритуксимаб доза. Echocardiogram (LVEF) базове + after cumulative доза >300 mg/m². Interim PET-CT after цикли 2-4 helpful for відповідь assessment but doesn't routinely change терапія unless PD seen.
