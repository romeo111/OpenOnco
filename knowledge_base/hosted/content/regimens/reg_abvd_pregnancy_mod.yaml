id: REG-ABVD-PREGNANCY-MOD
name: "ABVD (modified) for classical Hodgkin lymphoma in 2nd-3rd trimester pregnancy"
name_ua: "ABVD (модифікований) при класичній лімфомі Ходжкіна при вагітності (2-3 триместр)"
alternate_names: ["ABVD pregnancy", "pregnancy-adapted ABVD CHL", "AVD pregnancy CHL"]

components:
  - drug_id: DRUG-DOXORUBICIN
    dose: "25 mg/m²"
    schedule: "IV days 1+15 Q28D"
    route: IV
    notes: "Standard dose; generally considered safe after 1st trimester"
  - drug_id: DRUG-BLEOMYCIN
    dose: "10 units/m²"
    schedule: "IV days 1+15 Q28D (consider omission — some protocols use AVD without B)"
    route: IV
    notes: "Bleomycin: teratogenic risk uncertain; many centers OMIT bleomycin during pregnancy (use AVD instead). Omit bleomycin if DLCO assessment not feasible or if pulmonary function testing unavailable. MDT decision"
  - drug_id: DRUG-VINBLASTINE
    dose: "6 mg/m²"
    schedule: "IV days 1+15 Q28D"
    route: IV
    notes: "Generally safe in 2nd-3rd trimester; neonatal bone marrow suppression risk if given near delivery — last dose ≥3 weeks before delivery"
  - drug_id: DRUG-DACARBAZINE
    dose: "375 mg/m²"
    schedule: "IV days 1+15 Q28D"
    route: IV
    notes: "Minimal human teratogenicity data; generally used in 2nd-3rd trimester. Antiemetic essential"

cycle_length_days: 28
number_of_cycles: "Typically 2–4 cycles to control disease until delivery; complete treatment post-partum"

special_requirements:
  - "MDT MANDATORY: oncology + obstetrics + neonatology + ethics consultation before initiation"
  - "Contraindicated in 1st trimester (organogenesis): delay until ≥13 weeks gestation"
  - "Last cycle: plan completion ≥3 weeks before anticipated delivery date (avoid neonatal myelosuppression)"
  - "Fetal monitoring: serial ultrasound Q3-4 weeks for fetal growth restriction"
  - "G-CSF: use if Grade 4 neutropenia (filgrastim/pegfilgrastim safety in pregnancy — limited data; benefit likely outweighs risk)"
  - "Consider AVD (omit bleomycin) if pulmonary function assessment not feasible during pregnancy"

premedications:
  - "Aprepitant + dexamethasone + 5-HT3 antagonist (dacarbazine emetogenic)"
  - "Bleomycin test dose: 1–2 units if not previously given"

supportive_care:
  - "CBC: before each cycle + weekly"
  - "Echo + LVEF: baseline and after cumulative doxorubicin ≥200 mg/m²"
  - "DLCO: optional — pulmonary function testing limited by pregnancy positioning"
  - "Fetal heart monitoring: during/after chemotherapy infusion"

sources:
  - SRC-NCCN-BCELL-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  ABVD in pregnancy: Registry and case series data support relative safety of
  ABVD in 2nd-3rd trimester. First trimester is an absolute contraindication
  (risk of organogenesis defects). Key modifications: (1) many centers omit
  bleomycin creating AVD regimen due to uncertain teratogenicity; (2) last dose
  must be ≥3 weeks pre-delivery; (3) G-CSF used for severe neutropenia;
  (4) MDT essential. Median gestational age at delivery ~36-38 weeks in
  CHL pregnancy series. Neonatal outcomes generally favorable with 2nd-3rd
  trimester exposure. References: NCCN CHL guidelines + Avilés et al series.
