id: REG-ACALABRUTINIB-MCL
name: "Acalabrutinib monotherapy (continuous, ACE-LY-004) — r/r MCL"
name_ua: "Акалабрутиніб монотерапія (безперервно, ACE-LY-004) — рефрактерна/рецидивна MCL"
alternate_names: ["Acala mono MCL", "ACE-LY-004 regimen"]

components:
  - drug_id: DRUG-ACALABRUTINIB
    dose: "100 mg"
    schedule: "PO twice daily, continuous until progression or intolerance"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous"
toxicity_profile: low-moderate

premedication: ["Hydration if high-burden disease"]
mandatory_supportive_care: []
monitoring_schedule_id: MON-CLL-BTKI

dose_adjustments:
  - condition: "Concomitant strong CYP3A4 inhibitor (azoles, ritonavir)"
    modification: "Hold during inhibitor course OR reduce to 100 mg once daily"
    source_refs: [SRC-NCCN-BCELL-2025]
  - condition: "Severe hepatic impairment (Child-Pugh C)"
    modification: "Avoid"
  - condition: "Concomitant PPI/H2-blocker"
    modification: "Separate dosing 2h apart OR switch to acalabrutinib maleate (PPI-compatible)"
  - condition: "New-onset atrial fibrillation"
    modification: "Hold; cardiology consult; rate control + anticoagulation; resume if benefit justifies; switch BTKi if recurrent"
    rationale: "Lower afib rate than ibrutinib but possible"
  - condition: "Major hemorrhage / planned surgery"
    modification: "Hold ≥3-7 days pre-procedure; resume post-op once hemostasis confirmed"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: >
    Acalabrutinib registered in Ukraine but NOT NSZU-reimbursed for
    MCL. Ibrutinib reimbursed via НСЗУ for MCL — practical fallback
    where access blocking, but worse cardiac safety profile (afib
    ~7-15% vs ~3% with acala).

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-MCL-2024

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Acalabrutinib BTKi for R/R MCL. Continuous oral. Same BTKi pattern
# as acalabrutinib CLL — atrial fibrillation, bleeding, infections,
# headache. Lower AF rate vs ibrutinib. STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Помірний головний біль, особливо у перші тижні"
    action_ua: "Часто проходить через 1-2 місяці — занотовуйте інтенсивність"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Помірна нудота, помірна діарея"
    action_ua: "Зазвичай легкі — занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Незвичні синці, кровотеча ясен або носа"
    action_ua: "Подзвоніть у клініку того ж дня — BTKi підвищують ризик кровотеч"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BCELL-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Прискорене серцебиття, нерівномірний пульс"
    action_ua: "Подзвоніть у клініку того ж дня — BTKi може спричиняти миготливу аритмію"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Лихоманка з ознобом, кашель"
    action_ua: "Подзвоніть у клініку того ж дня — BTKi пригнічує імунну систему"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Сильна тривала кровотеча, що не спиняється"
    action_ua: "Звертайтесь у лікарню негайно"
    urgency: er_now
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Раптовий головний біль із порушенням зору або мовлення"
    action_ua: "Звертайтесь у лікарню негайно — на тлі BTKi підвищений ризик внутрішньочерепної кровотечі"
    urgency: er_now
    sources:
      - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
notes: >
  ACE-LY-004 trial (Wang 2018, follow-up 2020): r/r MCL after ≥1
  prior line — ORR 81%, CR 40%, mDOR ~26 mo, mPFS ~22 mo. FDA-
  approved for r/r MCL after ≥1 prior line. Substantial cardiac-
  safety advantage over ibrutinib (afib ~3% vs ~7-15%). Preferred
  cBTKi for MCL when accessible — particularly for older patients
  with cardiac history, hypertension, or anticoagulation. Funding
  pathway must be confirmed; ibrutinib + R fallback if acala access
  blocking.
notes_ua: >
  ACE-LY-004 дослідження (Wang 2018, спостереження 2020): р/р MCL after ≥1 prior line — ORR 81%, CR 40%, mDOR ~26 міс., mPFS ~22 mo. FDA- схвалений для р/р MCL after ≥1 prior line. Substantial cardiac- безпека advantage over ібрутиніб (afib ~3% проти ~7-15%). переважний cBTKi for MCL when accessible — особливо for older patients with cardiac history, гіпертензія, or anticoagulation. Funding pathway must be confirmed; ібрутиніб + R fallback if acala access blocking.
ukrainian_review_status: pending_clinical_signoff
