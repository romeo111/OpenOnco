last_reviewed:
notes: >
  LATITUDE: ADT + abiraterone superior to ADT alone in high-risk mHSPC.
  COU-AA-302 / COU-AA-301: established in chemo-naive and post-chemo
  mCRPC. Always with prednisone — NEVER alone (mineralocorticoid syndrome).

  Cross-disease use: same regimen reused for mCRPC 1L and high-risk mHSPC.
notes_ua: >
  LATITUDE: ADT + абіратерон перевершує ADT alone in високого ризику mHSPC. COU-AA-302
  / COU-AA-301: усталений in chemo-naive and post-chemo mCRPC. Always with prednisone
  — NEVER alone (mineralocorticoid syndrome).

  Cross-хвороба use: same схема reused for mCRPC 1L and високого ризику mHSPC.
ukrainian_review_status: pending_clinical_signoff
