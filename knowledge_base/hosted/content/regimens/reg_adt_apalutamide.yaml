id: REG-ADT-APALUTAMIDE
name: "ADT + apalutamide (continuous)"
name_ua: "АДТ + апалутамід (безперервно)"
alternate_names: ["TITAN-style (mHSPC)", "SPARTAN-style (nmCRPC)"]

components:
- drug_id: DRUG-LEUPROLIDE
  dose: "11.25 mg IM q3 months"
  schedule: "Continuous"
  route: IM
- drug_id: DRUG-APALUTAMIDE
  dose: "240 mg PO daily"
  schedule: "Continuous"
  route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression"
toxicity_profile: low-moderate

premedication: []
mandatory_supportive_care:
- SUP-BONE-HEALTH-PROSTATE
monitoring_schedule_id:

dose_adjustments:
- condition: "G3+ rash"
  modification: "Hold; resume at 180 mg or 120 mg after resolution"
- condition: "Hypothyroidism"
  modification: "Levothyroxine; continue apalutamide"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Apalutamide registered but not currently NSZU-reimbursed; out-of-pocket.
    Verify funding pathway pre-start."

sources: [SRC-NCCN-PROSTATE-2025, SRC-ESMO-PROSTATE-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# ADT + apalutamide for mHSPC/nmCRPC (TITAN/SPARTAN). Same ARPI
# pattern as enzalutamide + higher rash rate. STUB pending §6.1.
between_visit_watchpoints:
- trigger_ua: "Гарячі припливи, втома, втрата лібідо"
  action_ua: "Очікувані ефекти від ADT"
  urgency: log_at_next_visit
  sources:
  - SRC-NCCN-PROSTATE-2025
- trigger_ua: "Помірний висип"
  action_ua: "Поширене на апалутамідi — використовуйте зволожувач"
  urgency: log_at_next_visit
  sources:
  - SRC-NCCN-PROSTATE-2025
- trigger_ua: "Помірне запаморочення, падіння"
  action_ua: "Вставайте повільно"
  urgency: log_at_next_visit
  sources:
  - SRC-NCCN-PROSTATE-2025
- trigger_ua: "Виражений висип з пухирями, лущенням"
  action_ua: "Подзвоніть у клініку того ж дня — рідко SJS"
  urgency: call_clinic_same_day
  sources:
