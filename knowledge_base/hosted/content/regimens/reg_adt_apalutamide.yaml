  - SRC-CTCAE-V5
- trigger_ua: "Постійна спрага, втрата ваги"
  action_ua: "Подзвоніть у клініку того ж дня — метаболічні зміни"
  urgency: call_clinic_same_day
  sources:
  - SRC-NCCN-PROSTATE-2025
- trigger_ua: "Раптовий судомний напад"
