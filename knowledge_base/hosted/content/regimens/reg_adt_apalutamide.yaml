last_reviewed:
notes: >
  TITAN: mHSPC benefit. SPARTAN: nmCRPC benefit. Distinguishing AE: rash
  (~24%); hypothyroidism (~8%) — monitor TSH. Less CNS penetration than
  enzalutamide.
notes_ua: >
  TITAN: mHSPC виграш. SPARTAN: nmCRPC виграш. Distinguishing AE: висип (~24%); hypothyroidism
  (~8%) — monitor TSH. Less проникнення в ЦНС than ензалутамід.
ukrainian_review_status: pending_clinical_signoff
