id: REG-ADT-LEUPROLIDE
name: "ADT — leuprolide depot (continuous)"
name_ua: "АДТ — лейпрорелін депо (безперервно)"
alternate_names: ["LHRH agonist monotherapy", "Leuprolide ADT"]

components:
  - drug_id: DRUG-LEUPROLIDE
    dose: "11.25 mg IM q3 months (or 22.5 mg q6 months)"
    schedule: "Continuous from initiation"
    route: IM

cycle_length_days: 90
total_cycles: "Continuous until disease progression to CRPC"
toxicity_profile: low-moderate

premedication:
  - "Bicalutamide 50 mg PO daily x 2-4 weeks at initiation if high-volume disease (anti-androgen flare protection)"
mandatory_supportive_care:
  - SUP-BONE-HEALTH-PROSTATE
monitoring_schedule_id:

dose_adjustments: []

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "ADT backbone — НСЗУ-reimbursed."

sources: [SRC-NCCN-PROSTATE-2025, SRC-ESMO-PROSTATE-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Leuprolide ADT monotherapy or backbone. ADT signature: hot flashes,
# fatigue, BMD loss, cardiometabolic. STUB pending §6.1.
between_visit_watchpoints:
  - trigger_ua: "Гарячі припливи, втома, втрата лібідо"
    action_ua: "Очікувано — занотовуйте інтенсивність"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-PROSTATE-2025
  - trigger_ua: "Реакція в місці ін'єкції"
    action_ua: "Зустрічається — чергуйте місця"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-PROSTATE-2025
  - trigger_ua: "Постійна спрага, часте сечовипускання, втрата ваги"
    action_ua: "Подзвоніть у клініку того ж дня — ADT може спричиняти метаболічні зміни"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-PROSTATE-2025
  - trigger_ua: "Біль у грудях, прискорене серцебиття"
    action_ua: "Подзвоніть у клініку того ж дня — ADT підвищує серцево-судинний ризик"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-PROSTATE-2025
  - trigger_ua: "Сильний головний біль, порушення зору або мовлення"
    action_ua: "Звертайтесь у лікарню негайно — ADT підвищує ризик інсульту"
    urgency: er_now
    sources:
      - SRC-NCCN-PROSTATE-2025

last_reviewed:
notes: >
  Backbone for hormone-sensitive disease. Almost always combined with
  ARPI (abiraterone, enzalutamide, apalutamide, darolutamide) — ADT-mono
  is the older standard of care, now reserved for patients unable to
  tolerate ARPI addition.
notes_ua: >
  основа схеми for hormone-sensitive хвороба. Almost always combined with ARPI (абіратерон, ензалутамід, апалутамід, даролутамід) — ADT-mono is the older стандарт лікування, now reserved for patients unable to tolerate ARPI addition.
ukrainian_review_status: pending_clinical_signoff
