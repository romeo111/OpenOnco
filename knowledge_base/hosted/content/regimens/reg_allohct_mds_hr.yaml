last_reviewed: "2026-04-25"
notes: >
  AlloHCT remains the ONLY curative option for MDS-HR. Mandatory
  consideration in all transplant-eligible patients (typically
  age <70-75 + adequate organ function + suitable donor + adequate
  caregiver support). HMA bridging during 3-6 month donor search
  is standard. Post-HCT azacitidine maintenance ×12 months reduces
  relapse in high-risk subset (Oran et al., emerging data). STUB —
  pending Co-Lead sign-off. Conditioning regimen selection is
  institution-specific — this entity is a placeholder pointing to
  the alloHCT pathway with HMA bridging, not a fully specified
  conditioning chemotherapy regimen.
notes_ua: >
  AlloHCT remains the ONLY curative option for MDS-HR. обов'язковий consideration
  in all придатний до трансплантації patients (типово age <70-75 + adequate organ
  function + suitable donor + adequate caregiver support). HMA bridging during 3-6
  month donor search is стандарт. Post-HCT азацитидин підтримка ×12 months зменшує
  рецидив in високого ризику subset (Oran et al., новий дані). STUB — pending Co-Lead
  sign-off. Conditioning схема selection is institution-specific — this сутність is
  a placeholder pointing to the alloHCT pathway with HMA bridging, not a fully specified
  conditioning хіміотерапія схема.
ukrainian_review_status: pending_clinical_signoff
