last_reviewed: "2026-05-09"
reviewers: []
reviewer_signoffs: []
notes: >
  MARIPOSA (Cho NEJM 2024, NCT04487080): amivantamab + lazertinib vs
  osimertinib monotherapy in 1L EGFR-mutated (ex19del or L858R)
  advanced NSCLC (n=1074 across three arms). Median PFS 23.7 vs 16.6
  mo (HR 0.70; p<0.001) by BICR. ORR 86% vs 85%; median DoR 25.8 vs
  16.8 mo. Significant added toxicity vs osimertinib alone: VTE
  ~37% any-grade (DOAC prophylaxis mandatory first 4 mo), rash,
  paronychia, infusion reactions. Basis for FDA approval Aug 2024 as
  1L alternative to osimertinib monotherapy. SC amivantamab
  (PALOMA-3) preferred where available — IRR rate <10% vs ~65% IV.
  Distinct from MARIPOSA-2 (2L post-osi) regimen
  (REG-AMIVANTAMAB-LAZERTINIB-NSCLC-2L) which uses split-day cycle 1
  with chemotherapy-combo arms. STUB pending §6.1 sign-off.

notes_ua: >
  MARIPOSA (Cho NEJM 2024, NCT04487080): амівантамаб (amivantamab) +
  лазертиніб (lazertinib) порівняно з монотерапією осимертинібом у 1L
  EGFR-мутованому (ex19del або L858R) поширеному НДРЛ (n=1074 у трьох
  групах). Медіана ВБП (мВБП) 23,7 проти 16,6 міс. (ВР 0,70; p<0,001)
  за оцінкою незалежного комітету (BICR). ЗРВ 86% проти 85%; медіана
  тривалості відповіді 25,8 проти 16,8 міс. Суттєва додаткова
  токсичність порівняно з осимертинібом монотерапією: тромбоемболічні
  ускладнення (ТЕУ) ~37% будь-якого ступеня — профілактика ПОАК
  (апіксабан / ривароксабан) обов'язкова перші 4 міс.; акнеформний
  висип; паронихія; інфузійні реакції. Підстава для схвалення FDA
  серпень 2024 як альтернатива монотерапії осимертинібом у 1L.
  Підшкірна форма амівантамабу (PALOMA-3) є переважнішою там, де
  доступна — частота інфузійних реакцій <10% проти ~65% при в/в
  введенні. Від'ємне регламентне посилання: MARIPOSA-2 (2L
  після осимертинібу) — REG-AMIVANTAMAB-LAZERTINIB-NSCLC-2L.
