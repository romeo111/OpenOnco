last_reviewed: "2026-04-27"
notes: >
  MARIPOSA-2: ami+laz+chemo PFS HR 0.44 vs chemo alone in EGFR-mutated
  NSCLC progressing on osimertinib. Combination ami+laz without chemo
  also assessed (similar PFS but better tolerated). VTE prophylaxis
  mandatory first 4 mo. SC amivantamab (PALOMA-3) preferred where
  available — IRR rate <10% vs ~65% IV.

notes_ua: >
  MARIPOSA-2: комбінація амівантамаб (amivantamab) + лазертиніб (lazertinib)
  + хіміотерапія забезпечила ВР ВБП 0,44 порівняно з самою хіміотерапією
  у пацієнтів із EGFR-мутованим НДРЛ, що прогресував на фоні осимертинібу.
  Комбінація амівантамаб + лазертиніб без хіміотерапії також оцінена
  (подібна ВБП, краща переносимість). Профілактика тромбоемболічних
  ускладнень (ПОАК) обов'язкова перші 4 міс. (~30% ТЕУ у комбінованій
  групі). Підшкірна форма амівантамабу (PALOMA-3) є переважнішою де
  доступна — частота інфузійних реакцій <10% проти ~65% при в/в введенні.
