last_reviewed: "2026-04-27"
notes: >
  CHRYSALIS: ORR 40%, mPFS 8.3 mo, mOS 22.8 mo in EGFR Ex20ins
  pretreated. FDA accelerated approval 2021. PAPILLON (1L combo with
  carbo+pem) is now SoC for treatment-naïve EGFR Ex20ins; mono used
  2L+ post-platinum. SC formulation strongly preferred.

notes_ua: >
  CHRYSALIS: ЗРВ 40%, мВБП 8,3 міс., мЗВ 22,8 міс. у попередньо лікованих
  пацієнтів з EGFR Ex20ins. Прискорене схвалення FDA 2021. Програма
  PAPILLON (1L комбінація з карбоплатином + пеметрекседом) є сучасним
  стандартом лікування вперше виявленого EGFR Ex20ins; монотерапія
  амівантамабом (amivantamab) застосовується у 2L+ після
  платиновмісної хіміотерапії. Підшкірна форма є наполегливо
  рекомендованою.
ukrainian_review_status: pending_clinical_signoff
