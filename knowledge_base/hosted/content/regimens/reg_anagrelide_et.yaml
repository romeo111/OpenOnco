last_reviewed: "2026-04-27"
notes: >
  ET 2L cytoreduction for HU-intolerant or HU-resistant patients per
  PT-1 (Harrison 2005). PT-1 noted MORE arterial thrombosis + serious
  bleeding + MF progression on anagrelide vs HU — therefore anagrelide
  is NOT preferred 1L; reserved for HU failure. Pegylated interferon-α
  (e.g. ropeginterferon) is an alternative 2L (especially for younger
  patients with disease-modification goal). Cardiac baseline assessment
  recommended (ECG ± echo) before initiation if any cardiac comorbidity.
  STUB — requires Clinical Co-Lead signoff.
notes_ua: >
  ET 2L cytoreduction for HU-intolerant or HU-resistant patients per PT-1 (Harrison 2005). PT-1 noted MORE arterial thrombosis + serious bleeding + MF прогресування on анагрелід vs HU —, тому анагрелід is NOT переважний 1L; reserved for HU failure. Pegylated інтерферон-α (e.g. ropeginterferon) is an alternative 2L (особливо for younger patients with хвороба-modification goal). Cardiac базове assessment рекомендований (ECG ± echo) before initiation if any cardiac коморбідність. STUB — requires Clinical Co-Lead signoff.
ukrainian_review_status: pending_clinical_signoff
