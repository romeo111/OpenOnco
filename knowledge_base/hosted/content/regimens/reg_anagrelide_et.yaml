id: REG-ANAGRELIDE-ET
name: "Anagrelide — ET 2L cytoreduction (HU-intolerant / HU-resistant)"
name_ua: "Анагрелід — ET 2L цитозниження (HU-непереносимість / HU-резистентність)"
alternate_names:
  - "Anagrelide monotherapy"
  - "Agrylin / Xagrid"

components:
  - drug_id: DRUG-ANAGRELIDE
    dose: "Start 0.5 mg PO BID; titrate weekly by 0.5 mg/day to platelet target <400-450 × 10⁹/L. Maximum 10 mg/day; usual maintenance 1-3 mg/day in 2-4 divided doses."
    schedule: "Continuous PO daily, divided 2-4 doses; titrated to platelet response"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until intolerance / progression to MF / patient preference"
toxicity_profile: moderate

premedication:
  - "Baseline ECG + echocardiogram (LVEF) recommended if any cardiac risk factor"
  - "Continued low-dose ASA 81-100 mg PO daily (bleeding risk additive — monitor)"
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Platelet count <600 × 10⁹/L early — no further escalation"
    modification: "Hold escalation; maintain current dose; reassess in 2 weeks"
    rationale: "Slow titration prevents over-shoot and minimizes cardiovascular AE"
    source_refs:
      - SRC-PT1-HARRISON-2005
      - SRC-NCCN-MPN-2025
  - condition: "Symptomatic palpitations / new-onset arrhythmia"
    modification: "Hold; cardiology evaluation; resume at lower dose only if benign workup"
    rationale: "PDE3 inhibition causes vasodilation and positive inotropy — tachycardia common, decompensation possible"
    source_refs:
      - SRC-PT1-HARRISON-2005
  - condition: "New CHF or LVEF drop ≥10%"
    modification: "Discontinue; transition to alternate cytoreduction (peg-IFN-α, busulfan)"
    rationale: "Anagrelide has BBW for cardiovascular events; cardiomyopathy reported"
    source_refs:
      - SRC-PT1-HARRISON-2005
  - condition: "Severe persistent headache / refractory to acetaminophen"
    modification: "Slow titration further; consider split-dose 4× daily; avoid abrupt dose increase"
    rationale: "Headache (~40%) usually self-limits over 1-2 weeks; gradual titration improves tolerance"
  - condition: "Hepatic impairment (ALT/AST >3× ULN OR severe Child-Pugh C)"
    modification: "Reduce dose 50%; severe impairment — avoid"
    rationale: "Hepatic metabolism; impaired clearance increases AE risk"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Anagrelide registered in Ukraine but NOT НСЗУ-reimbursed for ET as of 2026 — major access barrier (out-of-pocket, ~UAH 8000-12000/mo)."

sources:
  - SRC-PT1-HARRISON-2005
  - SRC-NCCN-MPN-2025
  - SRC-ESMO-MPN-2015

