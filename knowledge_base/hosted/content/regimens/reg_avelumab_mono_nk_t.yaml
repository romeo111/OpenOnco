id: REG-AVELUMAB-MONO-NK-T
name: "Avelumab monotherapy for r/r NK/T-cell nasal lymphoma (off-label)"
name_ua: "Авелумаб монотерапія для рецидивного/рефрактерного NK/T-клітинної назальної лімфоми (off-label)"
alternate_names: ["Avelumab mono NKTCL"]

components:
  - drug_id: DRUG-AVELUMAB
    dose: "800 mg"
    schedule: "IV every 2 weeks until progression or unacceptable toxicity"
    route: IV

cycle_length_days: 14
total_cycles: "Until progression / unacceptable toxicity (typically 12+ cycles in responders)"
toxicity_profile: moderate

premedication:
  - "Acetaminophen + diphenhydramine before first 4 infusions (mitigate infusion reactions ~25% rate)"
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Grade ≥2 immune-mediated AE (pneumonitis, colitis, hepatitis, endocrinopathy, nephritis)"
    modification: "Hold; manage per NCCN immunotherapy toxicity guidelines (steroid taper); resume only if Grade ≤1"
    source_refs: [SRC-NCCN-BCELL-2025]
  - condition: "Grade ≥3 immune-mediated AE"
    modification: "Permanent discontinuation in most cases; multidisciplinary management"
  - condition: "Severe infusion reaction"
    modification: "Slow rate; intensify premedication; permanent discontinuation if anaphylactoid"
  - condition: "Suspected myocarditis"
    modification: "Permanent discontinuation; cardiology consultation; high-dose steroids"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Avelumab not registered in Ukraine; access via international
    supply / out-of-pocket. Off-label for NK/T-cell lymphoma
    indication. Major UA access barrier.

sources:
  - SRC-NCCN-BCELL-2025

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Avelumab monotherapy for relapsed NK/T-cell lymphoma. Anti-PD-L1
# irAE pattern. STUB pending §6.1.
between_visit_watchpoints:
  - trigger_ua: "Помірна втома, шкірний свербіж"
    action_ua: "Очікувано — зволожувач"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Помірна діарея"
    action_ua: "Подзвоніть у клініку того ж дня — імунний коліт"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Жовтяниця, біль у правому верхньому квадранті"
    action_ua: "Подзвоніть у клініку того ж дня — імунний гепатит"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Нова задишка, сухий кашель"
    action_ua: "Подзвоніть у клініку того ж дня — пневмоніт"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Виражена слабкість, постійна спрага"
    action_ua: "Подзвоніть у клініку того ж дня — щитоподібна реакція"
    urgency: call_clinic_same_day
    sources:
