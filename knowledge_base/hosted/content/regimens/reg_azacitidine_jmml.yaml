id: REG-AZACITIDINE-JMML
disease_context: DIS-JMML
line_of_therapy: 1
plan_track: standard

regimen_type: "chemotherapy_iv_sc"

agents:
  - drug_id: DRUG-AZACITIDINE
    dose: "75 mg/m²/day SC or IV"
    route: "SC or IV"
    schedule: "Once daily × 5–7 days every 28-day cycle (EWOG-MDS protocol: typically 3 days in very young infants; 5–7 days for children ≥1 year)"
    administration_notes: >
      SC injection: rotate injection sites (abdomen, thigh); allow room temperature
      for 30 minutes before injection; do not rub after injection.
      IV: dilute in NS; infuse over 10–40 minutes.
      Pediatric dosing: 75 mg/m²/day × 5–7 days Q28 days (same dose as adult MDS;
      dose-per-m² is weight-adjusted in young children).
      INTENT: This is BRIDGING THERAPY to allogeneic HSCT — goal is cytoreduction
      and disease burden reduction before transplant. This is NOT long-term maintenance
      therapy for JMML. Typically 1–3 cycles used; proceed to HSCT when donor is
      confirmed and conditioning is planned.
      Timing relative to HSCT: coordinate with transplant center; last azacitidine
      dose typically 7–14 days before start of conditioning regimen.
      Anti-emetic: 5-HT3 antagonist (ondansetron) before each injection/infusion day.
    dose_modifications:
      - trigger: "ANC <0.5×10⁹/L (Grade 4 neutropenia) or platelets <25×10⁹/L"
        action: "Delay next cycle by 1 week; check CBC. JMML often has baseline cytopenias — do not over-delay if cytopenia is disease-related, not drug-induced"
      - trigger: "Grade ≥3 injection-site reaction (SC route)"
        action: "Switch to IV administration"
      - trigger: "Grade ≥3 nausea/vomiting uncontrolled by antiemetics"
        action: "Optimize antiemetics (add dexamethasone, metoclopramide); consider 5-day schedule if 7-day not tolerated"

when_to_use: >
  JMML with somatic RAS/MAPK pathway mutation (PTPN11, KRAS, NRAS, NF1, CBL) confirmed,
  allogeneic HSCT planned but donor search ongoing or pre-conditioning window available.
  Azacitidine reduces JMML disease burden (splenomegaly, peripheral monocytosis, blast
  count) before transplant. Typically 1–3 cycles.
  NOT indicated for Noonan syndrome (germline PTPN11)-associated spontaneous remission
  pathway or CBL syndrome (germline CBL) watch-and-wait approach.
  EWOG-MDS protocol data supports azacitidine as the preferred pre-HSCT cytoreductive
  agent in JMML (over hydroxyurea or 6-mercaptopurine, historically used).

contraindications_relative:
  - "Noonan syndrome (germline PTPN11) JMML if spontaneous remission occurring — observation preferred; azacitidine bridges only if progressive"
  - "CBL syndrome (germline CBL) — may spontaneously resolve; individualized MDT decision"
  - "HSCT not planned (patient/family refuses transplant or no donor identified) — role of long-term azacitidine in JMML without HSCT is investigational and not standard"
  - "Severe hepatic impairment (Child-Pugh C) — azacitidine contraindicated"

monitoring:
  - "CBC with differential: before each cycle and day 14 of each cycle (CBC nadir monitoring)"
  - "Liver function tests (ALT/AST/ALP/bilirubin): baseline + before each cycle"
  - "Bone marrow aspirate: after cycle 1 or 2 (assess cytoreduction response; monosomy 7 FISH)"
  - "Abdominal ultrasound: before and after each cycle (spleen size — key disease response indicator)"
  - "JMML disease burden assessment: peripheral blood monocyte count, WBC differential, blast count each cycle"
  - "Chimerism testing (post-HSCT): not applicable pre-HSCT; plan with transplant center"

sources:
  - SRC-EWOG-JMML-AZACITIDINE
  - SRC-COG

last_reviewed: "2026-05-04"
reviewers: []
reviewer_signoffs: 0
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  STUB — pending Clinical Co-Lead sign-off. Authored 2026-05-04 (Workstream DO).
  JMML is exclusively pediatric (median age 1.8 years). Dosing follows EWOG-MDS
  protocol; pediatric weight-based dose is 75 mg/m²/day (same per-m² as adult MDS).
  Note: JMML is NOT MDS — azacitidine mechanism in JMML is cytoreductive + epigenetic,
  same as in MDS, but the treatment goal is different (bridge to HSCT, not long-term).
  Historical alternatives (no longer preferred): hydroxyurea, 6-mercaptopurine,
  cytarabine-based induction — these are used in settings without azacitidine access.
  Splenomegaly response: spleen size reduction is a clinically meaningful response
  indicator in JMML (often symptomatic splenomegaly from extramedullary hematopoiesis).
  Post-HSCT relapse management: second transplant or investigational SHP2/MEK inhibitors
  (trametinib in compassionate use / trials for relapsed JMML post-HSCT).
