id: REG-BELZUTIFAN-MONO
name: "Belzutifan monotherapy (VHL-disease tumors / mRCC 2L+)"
name_ua: "Белзутифан монотерапія (пухлини при синдромі VHL / мНКК 2L+)"
alternate_names: ["LITESPARK-004", "LITESPARK-005"]
components:
  - {drug_id: DRUG-BELZUTIFAN, dose: "120 mg PO once daily, continuous", schedule: "Continuous until progression or unacceptable toxicity", route: PO}
cycle_length_days: 28
total_cycles: "Until progression / unacceptable toxicity"
toxicity_profile: moderate
premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:
dose_adjustments:
  - condition: "Anemia G3 (Hgb 7-8 g/dL)"
    modification: "Hold until G1-2; resume at 80 mg daily; transfuse / EPO support PRN"
  - condition: "Anemia G4 (Hgb <7 g/dL)"
    modification: "Permanently discontinue"
  - condition: "Hypoxia (SpO2 <88% at rest or on exertion)"
    modification: "Hold; reduce to 80 mg if recurrent; supplemental O2"
ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Belzutifan not registered in Ukraine. Access via international
    referral (EU centers) or compassionate-use programme. Out-of-pocket
    cost prohibitive for most patients without foundation support.
sources: [SRC-NCCN-KIDNEY-2025, SRC-ESMO-RCC-2024]

