last_reviewed: "2026-04-26"
notes: >
  Used in two distinct contexts:
  (1) VHL-syndrome-associated tumors (RCC, CNS hemangioblastomas,
      pancreatic NETs not requiring immediate surgery) — LITESPARK-004
      basis for FDA 2021 approval.
  (2) Sporadic advanced ccRCC after PD-(L)1 + VEGF-TKI failure —
      LITESPARK-005, FDA expanded indication 2023.

  Anemia is the dose-limiting on-target toxicity. EPO support permitted
  per protocol; many patients tolerate G2 anemia chronically. Hypoxia
  is rarer but more concerning — SpO2 monitoring at home recommended
  for elderly / cardiopulmonary-comorbid patients.
