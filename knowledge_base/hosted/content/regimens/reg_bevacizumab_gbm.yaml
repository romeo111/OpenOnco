id: REG-BEVACIZUMAB-GBM
name: "Bevacizumab for recurrent GBM"
components:
  - drug_id: DRUG-BEVACIZUMAB
cycle_length_days: 14
total_cycles: "Until progression or unacceptable toxicity"
sources:
  - SRC-NCCN-CNS-2025
last_reviewed: "2026-05-07"
notes: "Thin regimen stub added to resolve existing recurrent GBM bevacizumab references."
notes_ua: >
  Бевацизумаб (bevacizumab) 10 мг/кг в/в кожні 14 днів при рецидивуючій
  гліобластомі (GBM). FDA схвалення травень 2009 (прискорене) для рецидивуючої
  GBM. Подовжує ВБП (~6 місяців), але не демонструє покращення ЗВ у РКД
  (AVAglio, RTOG 0825). Зменшення кортикостероїдів (steroid-sparing) і
  поліпшення якості життя є клінічним обґрунтуванням. Тонкий шаблон-alias.
