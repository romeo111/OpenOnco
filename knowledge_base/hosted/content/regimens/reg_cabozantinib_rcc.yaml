last_reviewed: "2026-05-03"
notes: >
  Cabozantinib 60mg monotherapy for 2L RCC after prior TKI (METEOR). Also used
  for non-clear cell RCC as first-line (NCCN preferred; papillary subtype).
  Inhibits VEGFR2, MET, and AXL — broader kinase profile than sunitinib/pazopanib.
  MET pathway relevance in papillary RCC. Note: this file is the 60mg monotherapy
  regimen; the combination with nivolumab (CheckMate-9ER, 40mg) is a separate
  regimen (REG-NIVO-CABO-RCC).
notes_ua: "Кабозантиніб 60 мг — монотерапія 2L НКК (METEOR). Також при папілярному підтипі 1L."
