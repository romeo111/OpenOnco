last_reviewed: "2026-04-27"
notes: >
  CAPItello-291: AKT-pathway-altered (PIK3CA / AKT1 / PTEN) cohort
  PFS 7.3 vs 3.1 mo (HR 0.50). Pathway-alteration testing (NGS for
  PIK3CA / AKT1 + combined IHC + NGS for PTEN loss) required
  pre-start. Intermittent 4-on/3-off dosing intentional — improves
  tolerability vs continuous (phase 1/2 finding). Diarrhea management
  dominant clinical workflow burden.

notes_ua: >
  CAPItello-291: когорта зі змінами шляху AKT (PIK3CA / AKT1 / PTEN) —
  ВБП 7,3 проти 3,1 міс. (ВР 0,50). Тестування на зміни шляху (NGS для
  PIK3CA / AKT1 + комбіновані ІГХ і NGS на втрату PTEN) обов'язкове
  до початку лікування. Переривчастий режим дозування 4-дні-прийом /
  3-дні-відпочинок є навмисним — покращує переносимість порівняно з
  безперервним прийомом (дані фаз 1/2). Капівасертіб (capivasertib)
  400 мг перорально двічі на добу у дні 1–4, 8–11, 15–18, 22–25 циклу;
  фулвестрант (fulvestrant) 500 мг внутрішньом'язово — навантажувальні
  дози у дні 1, 15, 29, далі кожні 4 тижні. Управління діареєю є
  домінуючим клінічним навантаженням.
