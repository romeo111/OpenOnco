id: REG-CAPMATINIB-NSCLC
name: "Capmatinib monotherapy (GEOMETRY mono-1) — MET ex14 NSCLC"
name_ua: "Капматініб моно (GEOMETRY mono-1) — MET ex14 НДРЛ"
alternate_names:
  - "Tabrecta"
  - "INC280"

components:
  - drug_id: DRUG-CAPMATINIB
    dose: "400 mg PO BID with food"
    schedule: "Continuous"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Peripheral edema Grade ≥2"
    modification: "Diuretics, leg elevation, compression; reduce to 300 mg BID then 200 mg BID if persistent"
    rationale: "Edema dominant AE; usually manageable"
    source_refs: [SRC-GEOMETRY-WOLF-2020]
  - condition: "Hepatic transaminase elevation Grade ≥3"
    modification: "Hold; resume at lower dose after recovery"
    source_refs: [SRC-GEOMETRY-WOLF-2020]
  - condition: "ILD / pneumonitis any grade"
    modification: "Hold; permanent discontinuation if confirmed pneumonitis"
  - condition: "Severe nausea / vomiting"
    modification: "Antiemetics; dose reduction if persistent"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Capmatinib NOT registered in UA. Access via Novartis named-patient
    pathway (Tabrecta EAP), cross-border (EU) per наказ МОЗ 988, or
    clinical trial.

sources:
  - SRC-GEOMETRY-WOLF-2020
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Capmatinib for MET exon-14-skipping NSCLC. METi: peripheral edema
# (very common), nausea, transaminitis, photosensitivity. STUB
# pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Набряки гомілок, обличчя, рук"
    action_ua: "Поширене на капматинібі — підніміть ноги відпочиваючи; занотовуйте інтенсивність"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-NSCLC-2025
      - SRC-GEOMETRY-WOLF-2020
  - trigger_ua: "Помірна нудота, помірна втома"
    action_ua: "Часто проходить — занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Чутливість шкіри до сонця"
    action_ua: "Завжди використовуйте сонцезахисний крем SPF 50+; занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Сильні набряки, виражене збільшення ваги"
    action_ua: "Подзвоніть у клініку того ж дня — потрібна оцінка функції серця"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Жовтяниця, потемніння сечі"
    action_ua: "Подзвоніть у клініку того ж дня — капматиніб може впливати на печінку"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-NSCLC-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Раптова сильна задишка, новий сухий кашель"
    action_ua: "Звертайтесь у лікарню негайно — рідко може спричиняти ушкодження легень"
    urgency: er_now
    sources:
      - SRC-NCCN-NSCLC-2025

last_reviewed: "2026-04-27"
notes: >
  GEOMETRY mono-1: MET ex14 1L ORR 68%, mPFS 12.4 mo; pretreated ORR
  41%, mPFS 5.4 mo. Approved for MET ex14 NSCLC any line. CNS activity
  demonstrated. Tepotinib (VISION) once-daily alternative with similar
  efficacy; choice driven by tolerability (capmatinib less edema, but
  BID burden).

notes_ua: >
  GEOMETRY mono-1: MET ex14 у першій лінії — ЗРВ 68%, мВБП 12,4 міс.;
  у попередньо лікованих — ЗРВ 41%, мВБП 5,4 міс. Схвалено для НДРЛ з
  пропуском екзону 14 MET на будь-якій лінії. Внутрішньочерепна
  активність підтверджена. Капматиніб (capmatinib) 400 мг перорально
  двічі на добу з їжею. Тепотиніб (tepotinib, VISION) — альтернатива
  з прийомом раз на добу і схожою ефективністю; вибір визначається
  переносимістю (капматиніб — менша набряклість, але потребує прийому
  двічі на добу).
ukrainian_review_status: pending_clinical_signoff
