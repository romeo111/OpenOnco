  - SRC-ESMO-DLBCL-2024
- trigger_ua: "Висока лихоманка (>38.5°C), низький тиск, прискорене серцебиття"
  action_ua: "Звертайтесь у лікарню негайно — ознаки тяжкого CRS; потрібен тоцилізумаб"
  urgency: er_now
  cycle_day_window: "Day 1-21"
  sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024
- trigger_ua: "Раптова сильна задишка, синюшність губ"
  action_ua: "Звертайтесь у лікарню негайно — можливий тяжкий CRS з ушкодженням легень"
