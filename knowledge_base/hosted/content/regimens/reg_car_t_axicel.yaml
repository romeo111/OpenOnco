  urgency: call_clinic_same_day
  sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
notes: >
  ZUMA-1 (r/r DLBCL, ≥2 prior lines): ORR ~83%, CR ~58%, durable ~40%
  at 5-year follow-up. ZUMA-7 expanded indication to 2L for primary-
  refractory or early-relapse (<12 mo) DLBCL: superior EFS vs salvage
  chemo + autoSCT. Centre must be FACT/JACIE/REMS-accredited. Boxed
  warnings: CRS, ICANS, secondary T-cell malignancy (FDA 2024). Plan
  bridging therapy + caregiver-presence-for-4-weeks-post-infusion as
  standard. Tisagenlecleucel (Kymriah) and lisocabtagene maraleucel
  (Breyanzi) are alternative CD19 CAR-T products — separate Regimen
  entities (future).
notes_ua: >
  ZUMA-1 (р/р DLBCL, ≥2 prior lines): ORR ~83%, CR ~58%, durable ~40% at 5-year спостереження.
  ZUMA-7 expanded показання to 2L for primary- рефрактерний or early-рецидив (<12
  міс.) DLBCL: перевершує EFS vs сальвадж chemo + аутоТГСК. Centre must be FACT/JACIE/REMS-accredited.
  спеціальні попередження в інструкції: CRS, ICANS, secondary T-cell злоякісне новоутворення
  (FDA 2024). Plan бриджингова терапія + caregiver-presence-for-4-weeks-post-infusion
  as стандарт. тисагенлеклеуцел (Kymriah) and лісокабтаген маралейцел (Breyanzi) are
  alternative CD19 CAR-T products — separate схема entities (future).
ukrainian_review_status: pending_clinical_signoff
