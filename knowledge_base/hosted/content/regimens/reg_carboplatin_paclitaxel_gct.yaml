id: REG-CARBOPLATIN-PACLITAXEL-GCT
name: "Carboplatin + Paclitaxel (adult granulosa cell tumor, advanced/recurrent)"
name_ua: "Карбоплатин + Паклітаксел (доросла гранульозоклітинна пухлина, поширена/рецидивна)"
alternate_names:
  - "Carbo-Tax GCT"
  - "CP GCT"

components:
  - drug_id: DRUG-CARBOPLATIN
    dose: "AUC 5–6 IV on Day 1"
    schedule: "Every 21 days"
    route: IV
  - drug_id: DRUG-PACLITAXEL
    dose: "175 mg/m² IV over 3 hours on Day 1"
    schedule: "Every 21 days"
    route: IV

cycle_length_days: 21
total_cycles: "6 cycles (standard adjuvant/advanced); adjust for recurrent disease"
toxicity_profile: moderate

premedication:
  - "Dexamethasone 20 mg PO/IV 12 h + 6 h before paclitaxel (hypersensitivity prophylaxis)"
  - "Diphenhydramine 50 mg IV 30 min before paclitaxel"
  - "H2 blocker (famotidine 20 mg IV or ranitidine) 30 min before paclitaxel"
mandatory_supportive_care:
  - "Baseline CBC, CMP — nadir monitoring day 10–14"
  - "G-CSF prophylaxis if high febrile neutropenia risk"
  - "Baseline LVEF if cumulative anthracycline history"

dose_adjustments:
  - condition: "Febrile neutropenia or ANC <0.5 × 10⁹/L nadir"
    modification: "Reduce paclitaxel by 20% next cycle; add G-CSF prophylaxis"
    rationale: "Neutropenia is the main dose-limiting toxicity"
    source_refs:
      - SRC-NCCN-OVARIAN-2025
  - condition: "Grade ≥2 peripheral neuropathy"
    modification: "Reduce paclitaxel by 20%; discontinue if Grade ≥3 persists"
    rationale: "Cumulative paclitaxel neuropathy"
    source_refs:
      - SRC-NCCN-OVARIAN-2025

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "Both carboplatin and paclitaxel are registered in Ukraine and reimbursed under NSZU oncology program. Generic formulations available."

between_visit_watchpoints:
  - trigger_ua: "Температура ≥38°C (особливо в 7–14 дні після хіміотерапії)"
    action_ua: "Невідкладно до лікарні — можлива фебрильна нейтропенія"
    urgency: er_now
    sources:
      - SRC-NCCN-OVARIAN-2025
  - trigger_ua: "Оніміння або поколювання в кінцівках"
    action_ua: "Занотуйте ступінь; обговоріть на візиті — нейропатія від паклітакселу"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-OVARIAN-2025
  - trigger_ua: "Сильна нудота та блювота"
    action_ua: "Прийміть протиблювотні (ондансетрон/метоклопрамід); якщо не проходить >24 год — зателефонуйте в клініку"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-OVARIAN-2025

sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024

last_reviewed: "2026-05-04"
notes: >
  Carboplatin + paclitaxel is widely used as first-line chemotherapy for
  advanced/recurrent adult granulosa cell tumor (AGCT), extrapolated from
  ovarian cancer chemotherapy practice. No large randomized trial specific
  to GCT. BEP (bleomycin-etoposide-cisplatin) is an alternative (especially
  in younger patients or when platinum-taxane sensitivity unknown).
  Response rates ~50–70% in recurrent disease. Surgery remains primary
  modality; chemo is for advanced/inoperable or chemotherapy-sensitive
  recurrence. Hormone-directed therapy (leuprolide, letrozole) is active
  in hormone receptor-positive GCT, especially for maintenance.
notes_ua: >
  Карбоплатин + паклітаксел — поширена схема 1-ї лінії для поширеної/
  рецидивної АГКП (екстраполяція з рак яєчника). Немає великих РКД специфічно
  для ГКП. BEP — альтернатива. Хірургія є первинним методом.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
