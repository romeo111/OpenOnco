id: REG-CEMIPLIMAB-BCC
name: "Cemiplimab monotherapy for locally advanced or metastatic BCC"
name_ua: "Цеміплімаб монотерапія при локально поширеному або метастатичному БКР"
alternate_names: ["cemiplimab 350 mg Q3W BCC", "LIBTAYO BCC"]

components:
  - drug_id: DRUG-CEMIPLIMAB
    dose: "350 mg"
    schedule: "IV Q21D (every 3 weeks)"
    route: IV
    duration: "Until disease progression or unacceptable toxicity"
    notes: "Fixed flat dose (not weight-based). Infuse over 30 minutes."

cycle_length_days: 21
number_of_cycles: "Until progression or toxicity (continuous)"

premedications:
  - "Antihistamine (diphenhydramine 25-50 mg IV or equivalent): 30 min before infusion if prior infusion reaction"
  - "No routine premedication required for first infusion"

supportive_care:
  - "Dermatology co-management for skin irAEs (rash, dermatitis)"
  - "Monitor TSH every 3-6 months (immune-mediated thyroiditis)"
  - "Ophthalmology if uveitis symptoms (rare but reported)"

dose_modifications:
  - toxicity: "Grade 2 irAE (non-endocrine)"
    action: "Hold until ≤Grade 1; consider corticosteroids (prednisone 0.5-1 mg/kg/day)"
  - toxicity: "Grade 3-4 irAE (severe)"
    action: "HOLD; high-dose steroids (methylprednisolone 1-2 mg/kg/day IV); consider permanent discontinuation for Grade 4"
  - toxicity: "Grade 3-4 infusion reaction"
    action: "Discontinue infusion; premedicate future infusions with antihistamine + acetaminophen + corticosteroid"
  - toxicity: "Confirmed Grade 4 irAE or life-threatening immune toxicity"
    action: "PERMANENTLY DISCONTINUE cemiplimab"

administration_notes: >
  Cemiplimab is administered as a flat 350 mg dose IV over 30 minutes Q21D.
  Do NOT administer as IV push or bolus.
  Monitor for infusion reactions during and for 1 hour after infusion.
  Patients should be counselled regarding immune-mediated adverse reactions:
  pneumonitis, colitis, hepatitis, endocrinopathies, nephritis, skin reactions.
  Contraindicated in active autoimmune disease requiring systemic therapy and
  in patients on systemic immunosuppression.

contraindications:
  - "Active autoimmune disease requiring systemic therapy (ICI contraindication)"
  - "Active systemic infection"
  - "Prior organ transplant on immunosuppression"
  - "Pregnancy (reproductive-age patients require effective contraception)"

sources:
  - SRC-EMPOWER-BCC1-STRATIGOS-2021
  - SRC-NCCN-SKIN-2025

last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
