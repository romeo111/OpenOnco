# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Cisplatin + gemcitabine for urothelial 1L (cisplatin-eligible).
# Cisplatin nephrotoxicity + ototoxicity + emesis dominate; gemcitabine
# adds cytopenia + hepatic. STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Помірна втома, нудота протягом 1-3 днів після цисплатину"
    action_ua: "Приймайте призначені протиблювотні; пийте багато води для захисту нирок"
    urgency: log_at_next_visit
    cycle_day_window: "Day 1-3"
    sources:
      - SRC-NCCN-BLADDER-2025
  - trigger_ua: "Випадання волосся легке"
    action_ua: "Гемцитабін зрідка дає випадання — занотовуйте, обговоріть на візиті"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-BLADDER-2025
  - trigger_ua: "Шум у вухах або зниження слуху"
    action_ua: "Подзвоніть у клініку того ж дня — цисплатин може впливати на слух; потрібна оцінка"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BLADDER-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Зменшення кількості сечі, набряки гомілок"
    action_ua: "Подзвоніть у клініку того ж дня — цисплатин впливає на нирки; потрібен аналіз креатиніну"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BLADDER-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Лихоманка вище 38°C"
    action_ua: "Подзвоніть у клініку того ж дня — гемцитабін дає нейтропенію"
    urgency: call_clinic_same_day
    cycle_day_window: "Day 7-14"
    sources:
      - SRC-NCCN-BLADDER-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Жовтяниця, потемніння сечі"
    action_ua: "Подзвоніть у клініку того ж дня — гемцитабін може впливати на печінку"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BLADDER-2025
  - trigger_ua: "Раптова сильна задишка, біль у грудях"
    action_ua: "Звертайтесь у лікарню негайно — рідко гемцитабін може спричиняти ушкодження легень"
    urgency: er_now
    sources:
      - SRC-NCCN-BLADDER-2025

