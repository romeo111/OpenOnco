last_reviewed: "2026-04-25"
notes: >
  NCI-9015 / Mossé 2017 (children + AYA): r/r ALK+ ALCL — ORR 88-90%,
  rapid responses (within 4 weeks), durable in adults with continuous
  therapy. ALK+ ALCL has NPM1-ALK fusion in ~70% (other ALK partners
  also responsive). Off-label use for adult ALCL (FDA approval is for
  pediatric ALK+ ALCL ≥1 year of age + some adult R/R). Bridge to
  alloSCT in fit transplant-eligible responders standard. Practical
  advantage in UA: drug on-shelf via existing NSCLC supply route.
  Newer ALK TKIs (alectinib, brigatinib, lorlatinib) may have CNS
  advantage but limited ALCL-specific data.
notes_ua: >
  NCI-9015 / Mossé 2017 (children + AYA): р/р ALK+ ALCL — ORR 88-90%, rapid responses (within 4 weeks), durable in adults with continuous терапія. ALK+ ALCL has NPM1-ALK злиття in ~70% (other ALK partners also responsive). off-label use for дорослий ALCL (FDA схвалення is for педіатричний ALK+ ALCL ≥1 year of age + some дорослий р/р). Bridge to алоТГСК in fit придатний до трансплантації responders стандарт. Practical advantage in UA: drug on-shelf via existing NSCLC supply route. Newer ALK TKIs (алектиніб, брігатиніб, лорлатиніб) may have CNS advantage but limited ALCL-specific дані.
ukrainian_review_status: pending_clinical_signoff
