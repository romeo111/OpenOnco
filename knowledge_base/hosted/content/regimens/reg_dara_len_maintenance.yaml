id: REG-DARA-LEN-MAINTENANCE
name: "Daratumumab + Lenalidomide maintenance post-ASCT (PERSEUS schedule)"
name_ua: "Даратумумаб + Леналідомід підтримуюча терапія після ASCT (PERSEUS)"
alternate_names:
  - "Dara-len maintenance"
  - "D-R maintenance"
  - "PERSEUS maintenance arm"

# PERSEUS maintenance phase: daratumumab q4w + lenalidomide 10 mg PO d1-21
# until progression. Starts after D-VRd × 2 consolidation (~6 months post-ASCT).
components:
  - drug_id: DRUG-DARATUMUMAB
    dose: "1800 mg SC (or 16 mg/kg IV)"
    schedule: "q4w (day 1 of each 28-day maintenance cycle) — every 8 weeks after cycle 6 per PERSEUS protocol"
    route: SC
  - drug_id: DRUG-LENALIDOMIDE
    dose: "10 mg PO daily on days 1-21 of each 28-day cycle"
    schedule: "Continuous 21/28 schedule; start 90-100 days post-ASCT after completion of consolidation"
    route: PO

cycle_length_days: 28
total_cycles: "Until progression or unacceptable toxicity (PERSEUS median maintenance ~38 months)"
toxicity_profile: low-moderate

premedication:
  - "Pre-daratumumab: methylprednisolone 100 mg IV (or equivalent) + diphenhydramine + acetaminophen before each SC injection — reduce infusion reactions"
  - "Aspirin 81-100 mg PO daily for VTE prophylaxis (lenalidomide IMiD class); LMWH if prior VTE or high-risk profile"
  - "Confirm two reliable contraceptive methods (women of reproductive potential) — REMS / iPLEDGE-equivalent required for lenalidomide"

mandatory_supportive_care:
  - SUP-MM-VTE-PROPHYLAXIS
  - SUP-MM-BONE-PROTECTION

monitoring_schedule_id: MON-VRD-REGIMEN

dose_adjustments:
  - condition: "ANC <1000 OR platelets <50K"
    modification: "Hold lenalidomide; resume at next-lower dose (10 mg → 5 mg → 5 mg every other day); daratumumab continues if ANC ≥500"
    rationale: "Cumulative lenalidomide myelosuppression during prolonged maintenance"
    source_refs: [SRC-NCCN-MM-2025]
  - condition: "CrCl 30-60 mL/min"
    modification: "Lenalidomide 10 mg PO every other day (not daily); daratumumab dose unchanged"
    rationale: "Lenalidomide ~80% renally cleared; dose interval extension recommended"
    source_refs: [SRC-NCCN-MM-2025]
  - condition: "CrCl <30 mL/min (no dialysis)"
    modification: "Lenalidomide 5 mg PO daily (or every other day); consider discontinuing if <15 mL/min"
    rationale: "Major lenalidomide exposure increase"
    source_refs: [SRC-NCCN-MM-2025]
  - condition: "Grade ≥3 infusion-related reaction to daratumumab"
    modification: "Withhold daratumumab; manage with systemic corticosteroids + bronchodilators; restart at 50% rate if resolved to ≤Grade 1; discontinue if Grade 4"
    rationale: "Anti-CD38 infusion reactions most common at first 1-2 doses; rare at maintenance-phase doses"
    source_refs: [SRC-PERSEUS-SONNEVELD-2024]
  - condition: "Second primary malignancy detected"
    modification: "Discontinue lenalidomide; daratumumab may continue per MDT decision; risk-benefit reassessed individually"
    rationale: "PERSEUS + CALGB 100104 reported elevated SPM rate with lenalidomide maintenance (~5-7% absolute); counseling required upfront"
    source_refs: [SRC-NCCN-MM-2025]

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: >
    Lenalidomide reimbursed via НСЗУ for myeloma (maintenance indication
    covered). Daratumumab is NOT currently НСЗУ-reimbursed — funding
    pathway (clinical trial / charitable / out-of-pocket) MUST be
    confirmed before this maintenance phase is finalized. Without
    daratumumab funding, REG-LENALIDOMIDE-MAINTENANCE (len-only, CALGB
    100104) is the standard-access alternative.

