id: REG-DDGP-NK-T
name: "DDGP (Dexamethasone + Cisplatin + Gemcitabine + Pegaspargase) for NK/T-cell nasal lymphoma"
name_ua: "DDGP (Дексаметазон + Цисплатин + Гемцитабін + Пегаспарагаза) для NK/T-клітинної назальної лімфоми"
alternate_names: ["DDGP NK/T", "cisplatin-based NK/T regimen", "Wang 2015 regimen"]
components:
  - drug_id: DRUG-DEXAMETHASONE
    dose: "15 mg/m² IV daily days 1-4"
    schedule: "IV daily days 1-4 of each 28-day cycle"
    route: IV
    notes: "IV dexamethasone for antiemesis, lymphoma cytoreduction, and CNS penetration."
  - drug_id: DRUG-CISPLATIN
    dose: "25 mg/m² IV daily days 1-3"
    schedule: "IV days 1-3 with aggressive hydration (1L normal saline before + 1L after each dose)"
    route: IV
    notes: >
      Cisplatin 25 mg/m²/day × 3 days (total 75 mg/m² per cycle). Aggressive pre/post-hydration
      MANDATORY. Antiemetics: ondansetron + NK1 antagonist (aprepitant 125 mg d1, 80 mg d2-3).
      Renal function check before each cycle: CrCl must be ≥60 mL/min. Reduce if CrCl 45-60;
      substitute with carboplatin AUC4 if CrCl <45 (DDGP variant; less evidence).
  - drug_id: DRUG-GEMCITABINE
    dose: "800 mg/m² IV days 1 and 8"
    schedule: "IV 30-minute infusion day 1 and day 8"
    route: IV
    notes: >
      Standard 30-minute gemcitabine infusion. Days 1 and 8 (bi-weekly within cycle).
      CBC before day 8 dose: ANC must be ≥1.0×10⁹/L, PLT ≥50×10⁹/L for day 8 dosing.
  - drug_id: DRUG-L-ASPARAGINASE
    dose: "6000 IU/m² IM days 1, 8, 10 (or pegaspargase 2500 IU/m² IM day 1 if available)"
    schedule: "Days 1, 8, 10 IM (native L-asparaginase) OR day 1 only (pegaspargase)"
    route: IM
    notes: >
      PREFERRED: Pegaspargase 2500 IU/m² IM/IV day 1 only (longer half-life; fewer injections;
      lower immunogenicity). If only native L-asparaginase available: 6000 IU/m² IM days 1, 8, 10.
      Hypersensitivity test before first dose. Switch to Erwinia asparaginase if grade ≥2 allergy.
      CRITICAL: Asparaginase is P-glycoprotein bypass drug — essential component (do not omit).
cycle_length_days: 28
total_cycles: "4-6 cycles; 4 cycles standard for responders followed by RT (localized); 6 cycles for advanced stage"
toxicity_profile: high
premedication:
  - "Ondansetron 8 mg IV + aprepitant 125 mg PO 30 min before cisplatin (day 1)"
  - "Ondansetron 8 mg IV before cisplatin days 2-3 (aprepitant 80 mg PO days 2-3)"
  - "Diphenhydramine 25 mg IV before L-asparaginase (allergy prophylaxis)"
mandatory_supportive_care:
  - "Aggressive IV hydration: 1L normal saline over 1h BEFORE cisplatin + 1L over 2h AFTER each cisplatin dose; maintain urine output ≥100 mL/h during cisplatin"
  - "Antiemetic: ondansetron + aprepitant (NK1 antagonist) on cisplatin days 1-3; prochlorperazine breakthrough"
  - "PJP prophylaxis: TMP-SMX 160/800 mg PO 3×/week (dexamethasone + asparaginase additive immunosuppression)"
  - "G-CSF: pegfilgrastim 6 mg SC day 9 (or filgrastim 300 µg/day d9-13) prophylactically (myelosuppression Grade 3-4 in ~40%)"
  - "Antithrombin III monitoring (asparaginase → AT-III depletion → VTE risk): AT-III activity before each cycle; FFP if AT-III <50%"
  - "Fibrinogen monitoring (asparaginase hypofibrinogenemia): cryo / FFP if fibrinogen <100 mg/dL"
  - "Coagulation panel (PT/APTT/fibrinogen): before each cycle and day 8"
  - "Uric acid + electrolytes: pre-hydration monitoring (tumor lysis risk in bulky disease)"
  - "Magnesium repletion: cisplatin → hypomagnesemia; magnesium sulfate IV supplementation as needed"
  - "EBV-DNA PCR quantitative: baseline + after each cycle (NK/T pharmacodynamic biomarker)"
dose_adjustments:
  - condition: "CrCl <60 mL/min at cycle start"
    modification: "Hold cisplatin; delay cycle until CrCl recovers OR substitute carboplatin AUC4 (less evidence for DDGP variant)"
  - condition: "Grade ≥3 neutropenia (ANC <1.0×10⁹/L) at day 8"
    modification: "Hold day-8 gemcitabine; restart when ANC ≥1.0×10⁹/L (gemcitabine; asparaginase dose not split — day-1 dose given)"
  - condition: "Grade ≥2 asparaginase allergy (urticaria, bronchospasm)"
    modification: "Switch to Erwinia asparaginase (Erwinaze) at equivalent dose; desensitization if no alternative"
  - condition: "Fibrinogen <100 mg/dL"
    modification: "Hold asparaginase; cryoprecipitate infusion; restart asparaginase when fibrinogen ≥150 mg/dL"
  - condition: "Grade ≥3 hearing loss (cisplatin ototoxicity)"
    modification: "Hold cisplatin; audiometry; consider carboplatin substitution for remaining cycles"
  - condition: "Grade ≥3 peripheral neuropathy (cisplatin cumulative)"
    modification: "Reduce cisplatin to 20 mg/m²/day or consider carboplatin substitution"
drug_interactions:
  - "Cisplatin + aminoglycosides: additive nephrotoxicity — avoid concurrent gentamicin/tobramycin"
  - "Cisplatin + loop diuretics (furosemide): additive ototoxicity — minimize furosemide; use cautiously"
  - "Asparaginase + MTX: asparaginase inhibits MTX uptake (not relevant in DDGP which has no MTX; note if switching to SMILE)"
  - "Dexamethasone + CYP3A4 inducers (rifampicin, carbamazepine): decrease dexamethasone bioavailability"
  - "Gemcitabine + warfarin: increased INR risk; monitor INR weekly"
notes: >
  DDGP (dexamethasone + cisplatin + gemcitabine + pegaspargase) for NK/T-cell nasal lymphoma.
  Wang et al. 2015 J Hematol Oncol: Phase 3 randomized trial in stage III/IV NKTCL.
  DDGP vs SMILE: ORR 89.8% vs 79.2%; 5-year OS 72.6% vs 50.5%; better toxicity profile.
  SMILE median OS 6.7 months for stage III/IV vs DDGP not reached at median 31.6 months follow-up.

  POSITIONING vs SMILE:
  - DDGP: cisplatin-based (no HD-MTX); suitable when MTX contraindicated (HD-MTX requires CrCl ≥50)
  - DDGP: superior evidence for stage III/IV advanced NK/T-cell lymphoma vs SMILE
  - SMILE: HD-MTX requires CrCl ≥50; higher CNS penetration via MTX

  POSITIONING vs P-GEMOX:
  - DDGP includes asparaginase (P-glycoprotein bypass) → superior antitumor activity
  - P-GEMOX lacks asparaginase → used when asparaginase unavailable or patient intolerant
  - DDGP cisplatin requires CrCl ≥60; P-GEMOX oxaliplatin has less nephrotoxicity
last_reviewed: "2026-05-04"
