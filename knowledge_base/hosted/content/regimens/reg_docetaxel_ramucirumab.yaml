last_reviewed: "2026-04-25"
notes: >
  REVEL trial (Garon 2014): 2L NSCLC (post-platinum, mostly pre-ICI
  era) — docetaxel + ramucirumab vs docetaxel mOS 10.5 vs 9.1 mo
  (HR 0.86); modest absolute benefit but PFS gain 4.5 vs 3.0 mo,
  ORR 23% vs 14%. In modern post-ICI+chemo failure setting, doc-ram
  remains rational 2L cytotoxic option. Single-agent docetaxel is
  acceptable alternative without ramucirumab — comparable safety
  profile minus VEGFR2 toxicity. Hypertension + bleeding management
  + 28-day pre/post-surgery hold mandatory.
notes_ua: >
  REVEL дослідження (Garon 2014): 2L NSCLC (post-platinum, mostly pre-ICI era) — доцетаксел + рамуцирумаб vs доцетаксел mOS 10.5 проти 9.1 міс. (HR 0.86); modest absolute виграш but PFS gain 4.5 проти 3.0 міс., ORR 23% проти 14%. In modern post-ICI+chemo failure setting, doc-ram remains rational 2L cytotoxic option. Single-agent доцетаксел is прийнятний alternative without рамуцирумаб — співставний профіль безпеки minus VEGFR2 токсичність. гіпертензія + bleeding management + 28-day pre/post-surgery утримати обов'язковий.
ukrainian_review_status: pending_clinical_signoff
