id: REG-DOCETAXEL-RAMUCIRUMAB
name: "Docetaxel + Ramucirumab (REVEL) — 2L+ NSCLC post-platinum / post-ICI"
name_ua: "Доцетаксель + Рамуцирумаб (REVEL) — 2L+ НДРЛ після платини / ICI"
alternate_names:
  - "Doc-Ram"
  - "REVEL regimen"

components:
  - drug_id: DRUG-DOCETAXEL
    dose: "75 mg/m²"
    schedule: "IV day 1 of each 21-day cycle"
    route: IV
  - drug_id: DRUG-RAMUCIRUMAB
    dose: "10 mg/kg"
    schedule: "IV day 1 of each 21-day cycle"
    route: IV

cycle_length_days: 21
total_cycles: "Until progression or unacceptable toxicity (typically 6+ cycles for responders)"
toxicity_profile: severe

premedication:
  - "Pre-docetaxel: dexamethasone 8 mg PO BID × 3 days starting day before infusion (fluid retention + hypersensitivity prevention)"
  - "Antiemetics — moderate-emetogenic prophylaxis"
mandatory_supportive_care:
  - SUP-GCSF-NEUTROPENIA  # primary G-CSF prophylaxis if febrile neutropenia history
monitoring_schedule_id:

dose_adjustments:
  - condition: "Hypertension Grade ≥2 (SBP ≥150 OR DBP ≥100)"
    modification: "Optimize antihypertensives; hold ramucirumab if uncontrolled"
    source_refs: [SRC-NCCN-NSCLC-2025]
  - condition: "Proteinuria >2 g/24h"
    modification: "Hold ramucirumab until <2 g/24h"
    source_refs: [SRC-NCCN-NSCLC-2025]
  - condition: "Recent / planned major surgery"
    modification: "Hold ramucirumab ≥28 days pre-op + ≥28 days post-op until wound healing"
    source_refs: [SRC-NCCN-NSCLC-2025]
  - condition: "Grade 4 neutropenia OR febrile neutropenia"
    modification: "Reduce docetaxel to 60 mg/m²; G-CSF prophylaxis"
  - condition: "Grade ≥2 peripheral neuropathy"
    modification: "Reduce docetaxel; consider switch to single-agent or alternate cytotoxic"
  - condition: "Active hemoptysis OR recent GI bleed / ulcer"
    modification: "Discontinue ramucirumab"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: >
    Docetaxel reimbursed via НСЗУ for NSCLC. Ramucirumab registered but
    NOT reimbursed for NSCLC — out-of-pocket / charitable pathway
    required. Single-agent docetaxel (without ramucirumab) is the
    fallback when ramucirumab funding unavailable.

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

