id: REG-DORDAVIPRONE-DMG
name: "Dordaviprone monotherapy for H3K27M-mutant diffuse midline glioma"
name_ua: "Дордавіпрон (монотерапія) при дифузній серединній гліомі з мутацією H3K27M"
alternate_names: ["ONC201 monotherapy", "Ogenio weekly", "dordaviprone 625mg weekly"]

components:
  - drug_id: DRUG-DORDAVIPRONE
    dose: "625 mg PO once weekly (adults)"
    schedule: "Once weekly on the same day each week; continuous until progression or unacceptable toxicity"
    route: PO
    notes: >
      Adult dose 625 mg once weekly. Pediatric dosing is weight-based per Ogenio USPI.
      Can be taken with or without food. Take at approximately the same time each week.
      No dose reduction steps defined for most toxicities; dose delay for QTc >500ms.

cycle_length_days: 7
number_of_cycles: "Continuous weekly dosing until progression or unacceptable toxicity"

premedications:
  - "Antiemetics as needed (nausea is common): ondansetron 4-8 mg PO PRN 1 hour before dose"
  - "No mandatory premedication protocol; titrate antiemetics based on patient tolerance"

supportive_care:
  - "Baseline ECG before first dose (QTc monitoring)"
  - "CBC, CMP at baseline and every 4-8 weeks"
  - "MRI brain (±spine for leptomeningeal involvement) every 8 weeks: assess response vs. pseudoprogression"
  - "Neurological assessment at each clinic visit (symptom tracking)"
  - "Dexamethasone weaning as tolerated (minimize steroid-related immunosuppression)"
  - "Seizure management: anti-epileptic drugs per standard neurology protocol"

dose_modifications:
  - toxicity: "QTc >500ms or >60ms increase from baseline"
    action: "Hold dordaviprone; correct electrolytes (K+, Mg2+); reassess ECG; restart when QTc ≤480ms"
  - toxicity: "Grade 3+ nausea/vomiting despite antiemetics"
    action: "Delay dose by 1 week; optimize antiemetic regimen; add lorazepam or metoclopramide"
  - toxicity: "Grade 3 neurological toxicity"
    action: "Hold; neurology consult; assess for tumor progression vs. treatment toxicity (MRI)"
  - toxicity: "Grade 4 any non-neurological toxicity"
    action: "Permanently discontinue dordaviprone"

special_requirements:
  - "H3K27M mutation CONFIRMED by IHC (anti-H3K27M RM-2118) or molecular sequencing BEFORE starting"
  - "Prior radiotherapy REQUIRED (FDA indication: after prior RT)"
  - "ECOG PS 0-2 (limited data in PS ≥3)"
  - "No active severe QTc prolongation (>480ms at baseline) or concurrent QTc-prolonging drugs"
  - "Oral route only (no IV formulation)"
  - "Biopsy required to confirm H3K27M histology — clinical/imaging diagnosis insufficient for eligibility"

sources:
  - SRC-ACTION1-OU-2024
  - SRC-NCCN-CNS-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  ACTION-1 (NCT05009992): Phase 3 dordaviprone vs placebo for H3K27M-mutant diffuse
  glioma after prior RT. ORR ~33-35%; PFS improvement demonstrated.
  FDA accelerated approval April 2024 (Ogenio; Chimerix/Prelude Therapeutics).
  NCCN CNS Tumor Guidelines 2025: Category 2A.
  First and only FDA-approved systemic therapy for H3K27M-mutant diffuse glioma.
  Mechanism: DRD2 antagonism + ClpP activation → UPRmt → selective apoptosis in H3K27M cells.
  Generally well-tolerated (oral once-weekly). H3K27M IHC confirmation MANDATORY.
