notes: >
  STUB scaffold. Dosing summary only.
notes_ua: >
  Доксорубіцин (doxorubicin) 75 мг/м² + іфосфамід (ifosfamide) 10 г/м²
  протягом 4 днів, кожні 3 тижні × 6 циклів при поширеній/метастатичній
  злоякісній пухлині оболонки периферичного нерва (MPNST), 1L. Іфосфамід
  вимагає обов'язкової профілактики геморагічного циститу месною (mesna);
  ризик іфосфамід-індукованої енцефалопатії — клінічна настороженість,
  метиленовий синій при необхідності. Кумулятивний ліміт доксорубіцину
  ~450 мг/м². Шаблон STUB.
ukrainian_review_status: pending_clinical_signoff
