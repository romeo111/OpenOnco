    dose: "1500 mg IV q4 weeks"
    schedule: "Up to 24 months OR until progression / unacceptable toxicity"
    route: IV

cycle_length_days: 28
total_cycles: "Up to 24 months consolidation post-concurrent CRT"
toxicity_profile: moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
