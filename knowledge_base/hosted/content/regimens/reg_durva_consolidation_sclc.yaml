last_reviewed:
notes: >
  ADRIATIC (Cheng NEJM 2024, NCT03703297): durvalumab 1500 mg q4w
  consolidation × up to 24 months in LS-SCLC patients without
  progression after concurrent platinum-based CRT — mOS 55.9 vs 33.4
  months (HR 0.73; p=0.01); mPFS 16.6 vs 9.2 months (HR 0.76; p=0.02).
  First major OS-positive trial in LS-SCLC in decades. FDA approval
  Dec-2024; new standard of care. Tremelimumab arm (durva+treme) did
  not improve outcomes vs durva alone — durva monotherapy is the
  approved consolidation regimen.
notes_ua: >
  ADRIATIC (Cheng NEJM 2024): дурвалумаб 1500 мг q4т консолідація до
  24 місяців у пацієнтів з ЛС-ДКРЛ без прогресування після одночасної
  платино-вмісної ХПТ — медіана ЗВ 55.9 проти 33.4 міс (HR 0.73);
  медіана БПВ 16.6 проти 9.2 міс. Перше велике OS-позитивне
  дослідження при ЛС-ДКРЛ за десятиліття. Схвалення FDA груд-2024;
  новий стандарт лікування.
ukrainian_review_status: pending_clinical_signoff
