last_reviewed: "2026-04-27"
notes: >
  EMERALD: ESR1-mutant cohort PFS 3.8 vs 1.9 mo (HR 0.55). Benefit
  enriched in patients with ≥12 mo prior CDK4/6i exposure
  (post-hoc). ESR1-mutation testing (ctDNA preferred — polyclonal,
  acquired on AI) required pre-start. Other oral SERDs in late
  development (camizestrant, giredestrant, imlunestrant); elacestrant
  is the first FDA-approved (2023).

notes_ua: >
  EMERALD: когорта ESR1-мутантів — ВБП 3,8 проти 1,9 міс. (ВР 0,55).
  Перевага збагачена у пацієнтів із ≥12 міс. попередньої терапії
  інгібіторами CDK4/6 (post-hoc аналіз). Тестування на мутацію ESR1
  (цДНК крові є переважним — полікловальна мутація, набута на фоні
  інгібіторів ароматази) є обов'язковим до початку. Елацестрант
  (elacestrant) 345 мг перорально щоденно з їжею. Інші пероральні
  SERD-препарати (камізестрант, гіредестрант, імлунестрант) на пізніх
  стадіях розробки; елацестрант є першим схваленим FDA (2023).
ukrainian_review_status: pending_clinical_signoff
