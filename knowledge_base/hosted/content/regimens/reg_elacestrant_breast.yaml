id: REG-ELACESTRANT-BREAST
name: "Elacestrant monotherapy (HR+/HER2- ESR1-mutant metastatic post-AI/CDK4/6i)"
name_ua: "Елацестрант моно (HR+/HER2- ESR1-mut метастаз після ІА/CDK4/6i)"
alternate_names: ["EMERALD regimen"]

components:
  - drug_id: DRUG-ELACESTRANT
    dose: "345 mg PO once daily with food"
    schedule: "Continuous, no off-day"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: low

premedication:
  - "Antiemetic at first dose; routine prn thereafter"
mandatory_supportive_care: []
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Nausea / vomiting G≥2"
    modification: "Antiemetic optimization; if persistent, hold and resume after recovery"
  - condition: "Hepatic enzyme elevation G≥3"
    modification: "Hold; resume at reduced dose 258 mg PO daily after recovery to ≤G1"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Elacestrant not registered in Ukraine. Named-patient import / EAP / cross-border (EU) only. Major access barrier; ESR1-mutation testing (ctDNA) also a UA-availability issue."

sources: [SRC-EMERALD-BIDARD-2022, SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Elacestrant for ESR1-mut HR+/HER2- breast 2L+ (EMERALD). Oral SERD;
# generally well-tolerated. Key axes: GI, hot flashes, fatigue,
# liver. STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Помірна нудота, втрата апетиту"
    action_ua: "Зустрічається — приймайте препарат з їжею"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-BREAST-2025
  - trigger_ua: "Гарячі припливи, легка втома"
    action_ua: "Очікувано — занотовуйте"
