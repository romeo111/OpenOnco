id: REG-ENASIDENIB-AML
name: "Enasidenib monotherapy for R/R IDH2-mutated AML"
name_ua: "Енасиденіб монотерапія для R/R IDH2-мутованої ГМЛ"
alternate_names:
- "Enasidenib mono"
- "Idhifa mono"

components:
- drug_id: DRUG-ENASIDENIB
  dose: "100 mg PO once daily"
  schedule: "continuous, 28-day cycles, until progression / unacceptable toxicity"
  route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression / unacceptable toxicity; proceed to alloHCT
  in fit responders. Continue ≥6 cycles before declaring non-response (median time
  to first response ~1.9 mo)."

toxicity_profile: moderate

premedication:
- "Antiemetic PRN"
- "Baseline differentiation-syndrome education + corticosteroid kit (dexamethasone
  10 mg IV q12h available on demand)"
- "Baseline + serial CBC, LFT (bilirubin), CMP"
- "TLS prophylaxis (allopurinol; hydration) in high-burden disease"

mandatory_supportive_care:
- SUP-PJP-PROPHYLAXIS
- SUP-HSV-PROPHYLAXIS
- SUP-HBV-PROPHYLAXIS
monitoring_schedule_id:

dose_adjustments:
- condition: "Differentiation syndrome (fever, dyspnea, weight gain, effusions, leukocytosis)"
  modification: "Dexamethasone 10 mg IV q12h + hydroxyurea if hyperleukocytosis; hold
    enasidenib only if severe (grade ≥3); resume at full dose on resolution"
  rationale: "DS fatal if untreated; corticosteroids + cytoreduction lifesaving (~14%
    incidence in AG221-AML-001)"
  source_refs:
  - SRC-NCCN-AML-2025
- condition: "Indirect hyperbilirubinemia (asymptomatic) due to UGT1A1 inhibition"
  modification: "No dose adjustment unless symptomatic (jaundice, transaminitis);
    monitor LFT q2 weeks until stable"
  rationale: "Biochemical UGT1A1 inhibition is on-target effect; ~80% any grade but
    largely asymptomatic"
  source_refs:
  - SRC-NCCN-AML-2025
- condition: "Symptomatic hyperbilirubinemia or transaminitis grade ≥3"
  modification: "Hold; resume at 50 mg PO daily on recovery to grade ≤1"
  rationale: "Distinguish from progression-related liver dysfunction; rare but documented"
  source_refs:
  - SRC-NCCN-AML-2025
- condition: "Concomitant strong CYP3A4 inducer (rifampin, phenytoin, carbamazepine)"
  modification: "Avoid; if unavoidable, monitor for loss of efficacy"
  rationale: "Strong inducer reduces enasidenib exposure"
  source_refs:
  - SRC-NCCN-AML-2025
- condition: "Severe hepatic impairment (Child-Pugh C)"
  modification: "Avoid; insufficient PK data"
  rationale: "Hepatic CYP3A4 + UGT1A1 metabolism predominant"
  source_refs:
  - SRC-NCCN-AML-2025

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Enasidenib NOT registered in Ukraine; EU access also limited (CHMP negative
    opinion 2018). International referral (US) or compassionate-use pathway required."

sources:
- SRC-NCCN-AML-2025
- SRC-ELN-AML-2022

