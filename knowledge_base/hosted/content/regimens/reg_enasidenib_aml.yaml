last_reviewed: "2026-04-30"
notes: >
  Standard 2L+ for R/R IDH2-mutated AML per AG221-AML-001 (FDA approval
  Aug 2017). Bridge to alloHCT for fit candidates achieving CR/CRh —
  enasidenib monotherapy is not curative; durable responses in trial
  were largely consolidated by alloHCT. Differentiation syndrome (~14%)
  is the signature AE — same dexamethasone protocol as ivosidenib.
  Hyperbilirubinemia (~80% any grade) is biochemical UGT1A1 inhibition
  — usually asymptomatic, no dose adjustment unless symptomatic.
  Trial sources SRC-AG221-AML-001 + SRC-IDHENTIFY pending — citing
  umbrella SRC-NCCN-AML-2025. STUB — pending Co-Lead sign-off.
notes_ua: >
  Стандарт 2L+ для R/R IDH2-мутованої ГМЛ за AG221-AML-001
  (FDA-схвалено серпень 2017). Міст до алоТГСК для придатних
  кандидатів, що досягли ПР/ПРн — енасиденіб монотерапія не
  курабельна. Синдром диференціації (~14%) — сигнатурний НЯ; той же
  дексаметазон-протокол, як для івосиденібу. Гіпербілірубінемія
  (~80% будь-якого ступеня) — біохімічне інгібування UGT1A1; зазвичай
  безсимптомна, без корекції дози, якщо немає симптомів. Джерела
  досліджень SRC-AG221-AML-001 + SRC-IDHENTIFY очікуються —
  посилання на umbrella SRC-NCCN-AML-2025. STUB — очікує
  схвалення співкерівника.
ukrainian_review_status: pending_clinical_signoff
