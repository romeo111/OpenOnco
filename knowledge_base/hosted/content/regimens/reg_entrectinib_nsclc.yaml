id: REG-ENTRECTINIB-NSCLC
name: "Entrectinib monotherapy (STARTRK-2) — ROS1+ NSCLC (CNS-active)"
name_ua: "Ентректініб моно (STARTRK-2) — ROS1+ НДРЛ (CNS-активний)"
alternate_names:
  - "Rozlytrek"
  - "RXDX-101"

components:
  - drug_id: DRUG-ENTRECTINIB
    dose: "600 mg PO once daily"
    schedule: "Continuous"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Cognitive / mood AE Grade ≥2"
    modification: "Hold; resume at 400 mg daily; permanent discontinuation if recurs Grade 3"
    rationale: "TRK class CNS effect"
    source_refs: [SRC-STARTRK2-DRILON-2020]
  - condition: "Cardiomyopathy / LVEF decline"
    modification: "Cardiology consult; hold; assess reversibility"
    source_refs: [SRC-STARTRK2-DRILON-2020]
  - condition: "Hyperuricemia symptomatic"
    modification: "Allopurinol; reduce dose if persistent"
  - condition: "QTc >500 ms"
    modification: "Hold; correct electrolytes; resume lower dose"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Entrectinib NOT registered in UA. Access via Roche named-patient
    pathway (Rozlytrek EAP), cross-border (EU), or clinical trial.

sources:
  - SRC-STARTRK2-DRILON-2020
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Entrectinib for ROS1+ / NTRK-fusion NSCLC + tumor-agnostic 1L.
# TKI signature: weight gain, dysgeusia, dizziness, cognitive,
# QT, cardiac. STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Зміни смаку, набір ваги, легке запаморочення"
    action_ua: "Зустрічається на тлі ентректинібу — занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Помірна втома, помірна нудота"
    action_ua: "Зазвичай легкі — занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Зміни настрою, плутаність мислення"
    action_ua: "Подзвоніть у клініку того ж дня — ентректиніб може впливати на психічний стан"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-NSCLC-2025
      - SRC-STARTRK2-DRILON-2020
  - trigger_ua: "Нова задишка при навантаженні, набряки"
    action_ua: "Подзвоніть у клініку того ж дня — потрібна оцінка функції серця"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Раптова втрата свідомості, серцебиття ненормальне"
    action_ua: "Звертайтесь у лікарню негайно — ентректиніб може подовжувати QT"
    urgency: er_now
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Раптова сильна задишка"
    action_ua: "Звертайтесь у лікарню негайно — рідко може спричиняти ушкодження легень"
    urgency: er_now
    sources:
      - SRC-NCCN-NSCLC-2025

last_reviewed: "2026-04-27"
notes: >
  Integrated ALKA-372-001 / STARTRK-1 / STARTRK-2: ROS1+ NSCLC ORR
  77%, mPFS 19.0 mo, intracranial ORR 55%. Preferred 1L for ROS1+
  with CNS disease (vs crizotinib's poor CNS penetration). 2L use
  post-crizotinib retains activity. Repotrectinib (TRIDENT-1) is the
  next-generation alternative for solvent-front-resistant disease.

notes_ua: >
  Інтегрований аналіз ALKA-372-001 / STARTRK-1 / STARTRK-2: ROS1+
  НДРЛ — ЗРВ 77%, мВБП 19,0 міс., внутрішньочерепний ЗРВ 55%.
  Переважний вибір у першій лінії для ROS1+ з ураженням ЦНС (на
  відміну від кризотинібу з поганим проникненням в ЦНС). Ентректиніб
  (entrectinib) 600 мг перорально раз на добу. Активність у 2L після
  кризотинібу зберігається. Репотректиніб (repotrectinib, TRIDENT-1)
  є альтернативою наступного покоління при резистентності,
  пов'язаній з solvent-front мутацією.
ukrainian_review_status: pending_clinical_signoff
