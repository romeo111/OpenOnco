id: REG-EVEROLIMUS-EXEMESTANE
name: "Everolimus + Exemestane (HR+/HER2- breast 3L+, post CDK4/6i and PI3Ki/AKTi)"
name_ua: "Еверолімус + Екземестан (HR+/HER2- РМЗ 3L+, після CDK4/6i і PI3Ki/AKTi)"
alternate_names:
  - "BOLERO-2 regimen"
  - "Eve-Exe"
  - "EVE+EXE"

components:
  - drug_id: DRUG-EVEROLIMUS
    dose: "10 mg PO daily continuous"
    schedule: "Continuous PO daily"
    route: PO
  - drug_id: DRUG-EXEMESTANE
    dose: "25 mg PO daily continuous"
    schedule: "Continuous PO daily"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: moderate

premedication:
  - "Dexamethasone 0.1% mouthwash (10 mL swish-and-spit QID) for first 8 weeks — SWISH trial: reduces stomatitis G≥2 from ~33% to ~2%"
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Stomatitis G≥2"
    modification: "Hold everolimus until G≤1; resume at 5 mg daily; topical steroid mouthwash; pain control"
    rationale: "mTOR-class effect; usually preventable with steroid mouthwash prophylaxis"
    source_refs: [SRC-NCCN-BREAST-2025]
  - condition: "Non-infectious pneumonitis G≥2"
    modification: "Hold; CT chest + pulmonology; corticosteroids if G≥2 symptomatic; permanent discontinuation if G≥3 or recurrent G2"
    source_refs: [SRC-NCCN-BREAST-2025]
  - condition: "Hyperglycemia (fasting glucose >250 mg/dL or HbA1c >8%)"
    modification: "Initiate or intensify oral hypoglycaemic; metformin first-line; consider endocrinology"
    source_refs: [SRC-NCCN-BREAST-2025]
  - condition: "Hyperlipidemia (LDL >190 or TG >500)"
    modification: "Statin initiation; fenofibrate if TG >500"
  - condition: "Strong CYP3A4 inhibitor (azole, clarithromycin, ritonavir)"
    modification: "Avoid combination; if unavoidable, reduce everolimus to 2.5 mg daily and monitor closely"
    rationale: "Everolimus is CYP3A4 substrate; major exposure increase"
  - condition: "Strong CYP3A4 inducer (rifampin, phenytoin, carbamazepine)"
    modification: "Increase everolimus to 20 mg daily if combination unavoidable"
  - condition: "Hepatic impairment Child-Pugh B"
    modification: "Everolimus 5 mg daily"
  - condition: "Hepatic impairment Child-Pugh C"
    modification: "Everolimus 2.5 mg daily; use with caution"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "Еверолімус + екземестан — обидва реімбурсуються НСЗУ для HR+/HER2- метастатичного РМЗ після прогресії на ендокринній терапії."

sources:
  - SRC-NCCN-BREAST-2025
  - SRC-ESMO-BREAST-METASTATIC-2024
  - SRC-BOLERO2-BASELGA-2012

