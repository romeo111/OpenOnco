last_reviewed: "2026-04-27"
reviewers: []
notes: >
  BOLERO-2 (Baselga 2012, NEJM): everolimus + exemestane vs exemestane
  alone in HR+ MBC progressing on non-steroidal AI — mPFS 7.8 vs 3.2 mo.
  Now positioned 3L+ in the era of CDK4/6i (1L) and PI3K/AKT inhibitors
  (alpelisib for PIK3CA-mut, capivasertib for AKT-pathway alterations).
  Stomatitis is dominant toxicity — dexamethasone mouthwash prophylaxis
  (SWISH trial, Rugo 2017) is mandatory and dramatically reduces G2+
  stomatitis. Pneumonitis (1-2% G3) requires prompt recognition. Useful
  for endocrine-sensitive disease where CDK4/6i + AI/fulvestrant has
  failed; alternative to chemo in slowly-progressive ER+ MBC.
notes_ua: >
  BOLERO-2 (Baselga 2012, NEJM): еверолімус + екземестан vs екземестан
  при HR+ метастатичному РМЗ з прогресією на нестероїдному ІА — mPFS
  7.8 vs 3.2 міс. Тепер 3L+ в епоху CDK4/6i (1L) і PI3K/AKT-інгібіторів
  (альпелісиб для PIK3CA-мут, капівасертиб для AKT-шляху). Стоматит —
  домінуюча токсичність; дексаметазон-мауссвош-профілактика (SWISH,
  Rugo 2017) обов'язкова і драматично зменшує G2+ стоматит.
