last_reviewed: "2026-05-03"
reviewer_signoffs: []
notes: >
  RADIANT-3 (Yao NEJM 2011): everolimus 10 mg/day vs placebo in progressive
  well-differentiated pNET (n=410). mPFS 11.0 vs 4.6 mo (HR 0.35, p<0.001).
  No significant OS benefit demonstrated (confounded by >70% crossover post-
  progression). SSA prior / concurrent use allowed. Stomatitis prophylaxis
  (dexamethasone mouthwash, SWISH trial) reduces G2+ stomatitis dramatically.
  Sunitinib 37.5 mg/day is the alternative (Raymond NEJM 2011 — similar
  mPFS 11.4 vs 5.5 mo, HR 0.42); no head-to-head comparison; choice based
  on comorbidities (cardiac/renal → prefer everolimus; diabetes/steroids →
  consider sunitinib). STUB pending §6.1 signoff.
notes_ua: >
  RADIANT-3 (Yao NEJM 2011): еверолімус 10 мг/добу проти плацебо у прогресуючій добре-диференційованій
  pNET (n=410). мВБП 11.0 проти 4.6 міс (HR 0.35, p<0.001). Значного переваги ЗВ не
  виявлено (заплутано >70% перехресним переходом після прогресії). Попереднє/одночасне
  використання SSA дозволялось. Профілактика стоматиту (дексаметазон-ополіскувач,
  SWISH дослідження) різко знижує G2+ стоматит. Сунітиніб 37.5 мг/добу є альтернативою
  (Raymond NEJM 2011 — схожа мВБП 11.4 проти 5.5 міс, HR 0.42); немає прямого порівняння;
  вибір на основі коморбідностей (серцеві/ниркові → перевага еверолімусу; діабет/стероїди
  → розглянути сунітиніб). STUB очікує підпис §6.1.
ukrainian_review_status: pending_clinical_signoff
