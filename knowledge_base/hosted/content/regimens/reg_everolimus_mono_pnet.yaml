  urgency: call_clinic_same_day
  sources:
  - SRC-NCCN-NET-2025
- trigger_ua: "Лихоманка вище 38°C або ознаки інфекції"
  action_ua: "Подзвоніть у клініку того ж дня — підвищений ризик інфекцій на фоні
