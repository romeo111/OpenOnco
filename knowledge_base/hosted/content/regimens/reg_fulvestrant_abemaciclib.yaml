id: REG-FULVESTRANT-ABEMACICLIB
name: "Fulvestrant + abemaciclib (HR+/HER2- metastatic 2L post-AI)"
name_ua: "Фулвестрант + абемацикліб (HR+/HER2- метастаз 2L після ІА)"
alternate_names: ["MONARCH-2 regimen"]

components:
  - drug_id: DRUG-FULVESTRANT
    dose: "500 mg IM days 1, 15, 29, then monthly"
    schedule: "Loading + monthly maintenance"
    route: IM
  - drug_id: DRUG-ABEMACICLIB
    dose: "150 mg PO BID continuous"
    schedule: "Continuous (no off-week)"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression"
toxicity_profile: moderate

premedication:
  - "Loperamide 4 mg PO at first sign of diarrhea, then 2 mg every 4 hours up to 16 mg/day"
mandatory_supportive_care:
  - SUP-BONE-HEALTH-PROSTATE
monitoring_schedule_id:

dose_adjustments:
  - condition: "Diarrhea G3 despite loperamide"
    modification: "Hold abemaciclib; reduce to 100 mg BID after recovery"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Fulvestrant reimbursed; abemaciclib reimbursement pending. Out-of-pocket for combination; clinical-review queue item."

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Fulvestrant + abemaciclib for HR+/HER2- breast 2L (MONARCH-2).
# Abemaciclib has higher diarrhea + VTE rates than other CDK4/6i.
# STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Помірна діарея"
    action_ua: "Абемацикліб часто спричиняє діарею — занотовуйте, лоперамід за призначенням"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-BREAST-2025
  - trigger_ua: "Помірна втома, нудота"
    action_ua: "Очікувано — занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-BREAST-2025
  - trigger_ua: "Тяжка діарея (≥6 разів/день)"
    action_ua: "Подзвоніть у клініку того ж дня — потрібна корекція"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BREAST-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Лихоманка вище 38°C"
    action_ua: "Подзвоніть у клініку того ж дня — нейтропенія можлива"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BREAST-2025
  - trigger_ua: "Біль або припухлість в одній нозі"
    action_ua: "Подзвоніть у клініку того ж дня — абемацикліб підвищує ризик тромбозу"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BREAST-2025
  - trigger_ua: "Раптова задишка, біль у грудях"
    action_ua: "Звертайтесь у лікарню негайно — можлива легенева тромбоемболія"
    urgency: er_now
    sources:
      - SRC-NCCN-BREAST-2025

last_reviewed:
notes: >
  MONARCH-2: PFS + OS benefit post-AI failure. Diarrhea management
  is the dominant clinical workflow burden — patient-counseling and
  immediate access to loperamide critical.
notes_ua: >
  MONARCH-2: PFS + OS виграш post-AI failure. діарея management is the dominant clinical workflow burden — patient-counseling and immediate access to loperamide critical.
ukrainian_review_status: pending_clinical_signoff
