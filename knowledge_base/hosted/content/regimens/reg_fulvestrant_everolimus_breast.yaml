last_reviewed: "2026-04-27"
notes: >
  Pivotal trial: BOLERO-2 used everolimus + exemestane (PFS 10.6 vs
  4.1 mo). PrECOG 0102 (Kornblum 2018) substituted fulvestrant for
  exemestane (PFS 10.3 vs 5.1 mo) — mechanistically equivalent and
  preferred when fulvestrant already in use. Stomatitis prophylaxis
  with dexamethasone mouthwash (SWISH) reduces G2+ stomatitis from
  ~33% to ~2% — mandatory pre-medication. Used as default 2L when no
  PIK3CA/AKT1/PTEN/ESR1 alteration is found and HER2-low not
  available; no biomarker gating.

notes_ua: >
  Ключове дослідження: BOLERO-2 застосовував еверолімус (everolimus) +
  екземестан (ВБП 10,6 проти 4,1 міс.). PrECOG 0102 (Kornblum 2018)
  замінив екземестан фулвестрантом (fulvestrant, ВБП 10,3 проти
  5,1 міс.) — механістично еквівалентно і є переважним, якщо фулвестрант
  вже застосовується. Стоматитна профілактика з дексаметазон-ополіскувачем
  (SWISH) знижує частоту стоматиту ступеня ≥2 з ~33% до ~2% — обов'язкова
  премедикація: 5 мл дексаметазону 0,5 мг/5 мл (без спирту) — полоскати
  2 хвилини та виплюнути, двічі на добу перші 8 тижнів. Застосовується
  як стандарт 2L за відсутності мутацій PIK3CA/AKT1/PTEN/ESR1 та при
  недоступності HER2-низького статусу; биомаркерного відбору не потребує.
