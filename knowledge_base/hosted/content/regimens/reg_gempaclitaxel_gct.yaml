id: REG-GEMPACLITAXEL-GCT
name: "Gemcitabine + Paclitaxel (GemPac) for relapsed GCT"
name_ua: "Гемцитабін + Паклітаксел (GemPac) при рецидивній ГКП"
alternate_names:
  - "GemPac"
  - "Paclitaxel + Gemcitabine salvage GCT"

disease_context: DIS-TESTICULAR-GCT
line_of_therapy: 3
plan_track: standard

components:
  - drug_id: DRUG-PACLITAXEL
    dose: "110 mg/m² IV"
    route: IV
    schedule: "Days 1 and 8 of each 21-day cycle"
    administration_notes: >
      Administer as 1-hour IV infusion. Premedicate with dexamethasone
      20 mg PO/IV 12h and 6h before, plus diphenhydramine 50 mg IV and
      cimetidine 300 mg IV (or ranitidine 50 mg IV) 30 min before — HSR
      prevention mandatory. Paclitaxel requires special non-DEHP, non-PVC
      tubing and bags (Cremophor EL vehicle leaches plasticizers).
      Peripheral neuropathy risk: cumulative; monitor at each visit.
  - drug_id: DRUG-GEMCITABINE
    dose: "1000 mg/m² IV"
    route: IV
    schedule: "Days 1 and 8 of each 21-day cycle"
    administration_notes: >
      Infuse over 30 minutes (standard infusion rate — prolonged infusion
      at fixed dose-rate 10 mg/m²/min shows no consistent benefit in
      GCT salvage; use standard 30-min infusion). Administer immediately
      after paclitaxel. Gemcitabine myelosuppression: nadir day 10-14;
      monitor CBC weekly.

when_to_use: >
  Third-line or subsequent salvage for relapsed/refractory GCT (NSGCT or
  seminoma) after failure of ≥2 prior cisplatin-based regimens (BEP/EP + TIP;
  or BEP/EP + HDCT/ASCT). NCCN Category 2A. GemPac is the most commonly
  used 3L regimen in this setting; ORR ~20-32% including durable CRs in a
  minority of patients. GCT remains potentially curable even at 3L+ — enroll
  in clinical trial whenever available.

cycle_length_days: 21
total_planned_cycles: "4 cycles then response assessment. Continue for 6+ cycles if response. Discontinue at progression or unacceptable toxicity."

premedication:
  - "Dexamethasone 20 mg PO/IV — 12h and 6h before each paclitaxel dose (HSR prevention)"
  - "Diphenhydramine 50 mg IV — 30 min before each paclitaxel dose"
  - "H2 blocker (cimetidine 300 mg IV or ranitidine 50 mg IV) — 30 min before each paclitaxel"
  - "Antiemetics: ondansetron 8 mg IV before gemcitabine (low emetogenicity; add dexamethasone if nausea from dex premedication insufficient)"

growth_factor_support:
  mandatory: false
  protocol: >
    G-CSF not standard primary prophylaxis for GemPac. Use if Grade 4
    neutropenia develops in cycle 1, or if dose modifications require
    dose-dense scheduling. Primary G-CSF prophylaxis per ASCO guidelines
    if febrile neutropenia risk ≥20% based on prior treatment history.

monitoring:
  - "CBC with differential: before each cycle and day 15 nadir check"
  - "Renal function (creatinine): before each cycle"
  - "Tumor markers (AFP, hCG, LDH): before each cycle (early response assessment)"
  - "CT CAP: after cycles 2 and 4 (RECIST 1.1 response)"
  - "Peripheral neuropathy assessment: each visit (cumulative paclitaxel neuropathy — Grade ≥2 = dose modification)"

dose_adjustments:
  - condition: "Grade 4 neutropenia (ANC <0.5×10⁹/L) at day 8 dose"
    modification: "Hold day 8 both agents if ANC <1.0×10⁹/L. Administer only if ANC ≥1.0 and platelets ≥75×10⁹/L."
  - condition: "Grade ≥2 peripheral neuropathy (paclitaxel cumulative)"
    modification: "Reduce paclitaxel to 80 mg/m² (Grade 2) or discontinue paclitaxel and continue gemcitabine monotherapy (Grade 3)."
  - condition: "CrCl <30 mL/min"
    modification: "Gemcitabine: reduce to 800 mg/m²; do not use if CrCl <15. Paclitaxel: no renal dose adjustment required."
  - condition: "Grade 3-4 paclitaxel HSR"
    modification: "Discontinue paclitaxel permanently. Consider substituting with docetaxel 75 mg/m² d1 q21d + gemcitabine (NCCN mentions docetaxel alternatives; less GCT data)."

special_precautions:
  - "HSR RISK (PACLITAXEL): Life-threatening hypersensitivity in ~1-3% despite premedication — monitor BP/O2/HR during infusion; have resuscitation equipment available."
  - "PERIPHERAL NEUROPATHY: Cumulative paclitaxel neuropathy — especially relevant in GCT patients with prior cisplatin neuropathy from BEP/TIP. Assess neuropathy baseline before each cycle."
  - "PULMONARY TOXICITY (GEMCITABINE): Rare interstitial pneumonitis (<1%) — dyspnea + new infiltrates = hold gemcitabine."
  - "CURATIVE INTENT: Even at 3L, complete resection of residual mass (RPLND) after GemPac remission can be curative. Refer to GCT specialty center."

alternative_regimen: >
  Gemcitabine + oxaliplatin (GEMOX): gemcitabine 1000 mg/m² IV d1 +
  oxaliplatin 130 mg/m² IV d1 q21d. Alternative at centers where paclitaxel
  is unavailable or neuropathy limits paclitaxel use. NCCN Category 2B for
  GCT. ORR ~15-20% in heavily pre-treated GCT (smaller series than GemPac).

watchpoints_ua:
  - "КРИТИЧНО: Премедикація перед паклітакселем ОБОВ'ЯЗКОВА — дексаметазон 20 мг 12г і 6г до + дифенгідрамін + Н2-блокатор (ризик анафілаксії)"
  - "КРИТИЧНО: Спеціальні трубки та флакони для паклітакселю (без ПВХ) — розчин на Кремофорі розчиняє ПВХ"
  - "УВАГА: Периферична нейропатія — особливо у пацієнтів з попередньою нейропатією від цисплатину (BEP/TIP)"
  - "УВАГА: Пухлинні маркери (АФП, ХГЧ, ЛДГ) перед кожним циклом — рання оцінка відповіді"
  - "Після ремісії — консультація з РЗЛУ щодо RPLND залишкових мас (куративний потенціал навіть у 3L)"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: >
    Paclitaxel and gemcitabine both generically available in Ukraine; NSZU
    reimbursement for GCT salvage requires verification. Paclitaxel: ensure
    non-PVC infusion set available (Cremophor EL vehicle).

sources:
  - SRC-NCCN-TESTICULAR-2025

last_reviewed: "2026-05-04"
notes: >
  GemPac (gemcitabine + paclitaxel) is the most commonly used salvage
  regimen for GCT patients after failure of ≥2 prior lines (BEP/TIP or
  BEP/HDCT). NCCN Category 2A. Primary evidence from phase 2 studies
  (Kollmannsberger 1999, JCO: ORR 31% in heavily pretreated GCT; durable
  CRs in ~15%) and institutional series. IGCCCG estimated ORR ~20-32%
  across pooled salvage data. GEMOX (gemcitabine+oxaliplatin) is an
  alternative at centers where paclitaxel unavailable.
  Curative intent maintained — RPLND for residual mass post-GemPac remission
  can achieve cure even in multiply-relapsed GCT.
notes_ua: >
  GemPac — найчастіше застосовуваний сальвадж-режим для ГКП після невдачі
  ≥2 попередніх ліній. NCCN Категорія 2A. ORR ~20-32% у важко лікованих
  пацієнтів (фаза 2 дані; Kollmannsberger 1999). GEMOX є альтернативою.
  Куративний потенціал зберігається — RPLND після ремісії може забезпечити
  виліковання навіть при множинних рецидивах.
ukrainian_review_status: pending_clinical_signoff
