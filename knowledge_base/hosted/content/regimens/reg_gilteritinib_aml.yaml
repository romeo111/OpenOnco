last_reviewed: "2026-04-25"
notes: >
  Standard 2L+ for R/R FLT3-mutated AML per ADMIRAL. Bridge to
  alloHCT for fit candidates achieving CR/CRh — gilteritinib alone
  is not curative. Continue gilteritinib post-HCT as maintenance
  (off-label, supported by emerging data MORPHO trial). STUB —
  pending Co-Lead sign-off.
notes_ua: >
  стандарт 2L+ for р/р FLT3-mutated AML per ADMIRAL. Bridge to alloHCT for fit candidates
  achieving CR/CRh — гілтеритиніб alone is not curative. Continue гілтеритиніб post-HCT
  as підтримка (off-label, supported by новий дані MORPHO дослідження). STUB — pending
  Co-Lead sign-off.
ukrainian_review_status: pending_clinical_signoff
