id: REG-GLECIRASIB-NSCLC
name: "Glecirasib monotherapy for KRAS G12C mutant NSCLC (2L+)"
name_ua: "Глецирасиб при KRAS G12C-мутантному НДКРЛ (2+ лінія)"
alternate_names: ["glecirasib KRAS G12C", "KRAS G12Ci NSCLC", "KRYSTAL-6"]

components:
  - drug_id: DRUG-GLECIRASIB
    dose: "400 mg PO BID"
    schedule: "Continuous oral BID; with or without food; same time each day"
    route: PO
    notes: "Capsules/tablets; do not crush. Hold for Grade 3+ toxicity. CYP3A4 substrate — avoid strong CYP3A4 inhibitors/inducers."

cycle_length_days: 28
number_of_cycles: "Until progression or unacceptable toxicity"

premedications:
  - "No routine premedication required"

supportive_care:
  - "ECG at baseline and as clinically indicated (QTc monitoring)"
  - "LFTs: baseline and monthly x 3 months, then as indicated"
  - "CBC: baseline and periodic"
  - "Electrolytes: baseline (hypokalemia/hypomagnesemia worsen QTc)"

dose_modifications:
  - toxicity: "Grade 3 diarrhea"
    action: "Hold until Grade ≤1; restart at same or reduced dose; loperamide for symptomatic management"
  - toxicity: "QTc >500ms or increase >60ms from baseline"
    action: "Hold until QTc ≤480ms; reduce dose; correct electrolytes; assess concomitant QT drugs"
  - toxicity: "Grade 3+ hepatotoxicity (ALT/AST >5x ULN)"
    action: "Hold until Grade ≤1; consider permanent discontinuation if recurrent Grade 3+"
  - toxicity: "Grade 3+ peripheral edema"
    action: "Hold; diuretic support; restart when resolved"

special_requirements:
  - "KRAS G12C mutation REQUIRED (tissue or ctDNA NGS): wild-type is contraindication"
  - "After prior systemic therapy (platinum-based, ICI per NCCN): 2L+ setting"
  - "STK11/KEAP1 co-mutation: associated with lower ORR; counsel about reduced benefit"

sources:
  - SRC-NCCN-NSCLC-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  FDA approved October 2024 (accelerated approval) based on KRYSTAL-6 trial
  in KRAS G12C NSCLC after prior systemic therapy.
  NCCN NSCLC 2025: KRAS G12C 2L+ option alongside adagrasib (approved Dec 2022)
  and sotorasib (approved May 2021). Third KRAS G12C inhibitor class approval in NSCLC.
  Differentiation: lower QTc prolongation signal vs adagrasib; comparable efficacy
  data in monotherapy setting. Combination strategies (glecirasib+cetuximab for CRC,
  glecirasib+SHP2 inhibitor) under investigation.
