notes: >
  Non-drug regimen stub added to resolve existing GBM elderly hypofractionated
  RT indication references. Radiation dose/fractionation should be curated in
  a radiation-specific schema or phase-aware regimen pass.
notes_ua: >
  Гіпофракціонована променева терапія при GBM у літніх або ослаблених
  пацієнтів (ECOG ≥2 або вік ≥65 років). Типові схеми: 40 Гр/15 фракцій
  (2,67 Гр/фр), 34 Гр/10 фракцій (3,4 Гр/фр) або 25 Гр/5 фракцій. NORDIC
  trial і Perry 2017 (NEJM): гіпофракціонована ПТ з темозоломідом vs лише
  ПТ у пацієнтів ≥60 р. — перевага виживання у MGMT-метильованих хворих.
  Шаблон-alias для небіологічного режиму ПТ.
