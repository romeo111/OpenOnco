id: REG-IMATINIB-KIT-MELANOMA
name: "Imatinib (KIT-mutant mucosal/acral melanoma)"
name_ua: "Іматиніб (меланома мукозальна/акральна KIT-мутована)"
alternate_names: ["Imatinib 400 BID", "Glivec/Gleevec — melanoma"]

components:
  - drug_id: DRUG-IMATINIB
    dose: "400 mg PO BID with food + large glass of water (Carvajal 2011 trial dose)"
    schedule: "Continuous"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: low

premedication:
  - "Take with meal (reduces GI upset)"
mandatory_supportive_care: []
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Severe edema / fluid retention"
    modification: "Diuretic; reduce to 400 mg daily if persistent"
  - condition: "Grade ≥3 cytopenias"
    modification: "Hold until recovery; resume at 400 mg daily"
  - condition: "Hepatic dysfunction (transaminases >5× ULN, bilirubin >3× ULN)"
    modification: "Hold; resume at reduced dose with hepatology co-management"
  - condition: "No response by 12 weeks (no PR/CR or progression)"
    modification: "Discontinue; switch to ICI (anti-PD-1 mono) or BRAFi+MEKi if BRAF-co-mutated"
    source_refs: [SRC-CARVAJAL-KIT-MELANOMA-2013]

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "Іматиніб (генерик) — НСЗУ-покритий для CML, Ph+ ALL, GIST. Off-label використання для KIT-мутованої меланоми технічно не покрите індикацією, але препарат доступний — переважно через MDT-обґрунтоване off-label призначення."

sources:
  - SRC-NCCN-MELANOMA-2025
  - SRC-ESMO-MELANOMA-2024
  - SRC-CARVAJAL-KIT-MELANOMA-2013

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Imatinib for KIT-mutant mucosal/acral melanoma (off-label). Same
# imatinib pattern as CML/GIST: edema + fluid retention + GI + cytopenia
# + rare hepatotoxicity. STUB pending §6.1.
between_visit_watchpoints:
  - trigger_ua: "Періорбітальні набряки (опухлі повіки) вранці"
    action_ua: "Очікувано від іматинібу — занотовуйте; обмежте сіль"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-MELANOMA-2025
  - trigger_ua: "Помірна нудота, спазми у м'язах"
    action_ua: "Приймайте препарат з їжею; зволоження; занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-MELANOMA-2025
  - trigger_ua: "Швидкий набір ваги, виражені набряки ніг, задишка"
    action_ua: "Подзвоніть у клініку того ж дня — затримка рідини"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-MELANOMA-2025
  - trigger_ua: "Лихоманка вище 38°C"
    action_ua: "Подзвоніть у клініку того ж дня — нейтропенія"
    urgency: call_clinic_same_day
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Жовтяниця, темна сеча"
    action_ua: "Подзвоніть у клініку того ж дня — гепатотоксичність"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-MELANOMA-2025

last_reviewed: "2026-04-27"
notes: >
  Carvajal et al. JAMA 2011 (NCT00470470): imatinib 400 BID in
  KIT-mutant or KIT-amplified mucosal/acral/CSD melanoma — durable
  responses in patients with KIT exon 11 (L576P) or exon 13 (K642E)
  mutations; ORR 23%. KIT amplification alone NOT predictive — must
  have actionable point mutation. ESCAT IIA per ESMO molecular
  targets. Niche but high-value: ~15-20% of mucosal/acral melanoma
  carry KIT mutations; this is an oral, low-toxicity alternative to
  IO/chemo when actionable variant present. Off-label in melanoma
  (Glivec licensed in UA for CML/GIST/Ph+ALL); MDT documentation
  required.

notes_ua: >
  Carvajal et al. JAMA 2011 (NCT00470470): іматиніб (imatinib) 400 мг
  двічі на добу при KIT-мутованій або KIT-ампліфікованій
  мукозальній/акральній/ССП (CSD) меланомі — стійкі відповіді
  у пацієнтів із мутаціями KIT екзону 11 (L576P) або екзону 13 (K642E);
  ЗРВ 23%. Ампліфікація KIT сама по собі не є предиктором — необхідна
  дієздатна точкова мутація. ESCAT IIA за молекулярними цілями ESMO.
  Нішеве, але цінне застосування: ~15-20% мукозальної/акральної меланоми
  несуть мутації KIT; цей препарат є пероральною малотоксичною
  альтернативою ІО/хіміотерапії за наявності дієздатного варіанта.
  Позаінструкційне застосування при меланомі (Glivec зареєстровано в UA
  для ХМЛ/GIST/Ph+ГЛЛ); документація МДГ обов'язкова.
