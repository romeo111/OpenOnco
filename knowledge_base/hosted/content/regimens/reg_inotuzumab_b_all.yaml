id: REG-INOTUZUMAB-B-ALL
name: "Inotuzumab ozogamicin for R/R Ph- B-ALL 2L+ (bridge to alloHCT)"
name_ua: "Інотузумаб озогаміцин для R/R Ph- B-ALL 2L+ (міст до alloHCT)"
alternate_names:
  - "Inotuzumab mono"
  - "Besponsa B-ALL"
  - "INO-VATE regimen"

components:
  - drug_id: DRUG-INOTUZUMAB-OZOGAMICIN
    dose: "Cycle 1 induction: 0.8 mg/m² IV day 1, 0.5 mg/m² IV days 8 + 15 (total 1.8 mg/m²); Cycle 2-6 consolidation post-CR: 0.5 mg/m² IV days 1, 8, 15 (total 1.5 mg/m²)"
    schedule: "Cycles every 21-28 days; max 6 cycles; bridge to alloHCT after 1-2 cycles for transplant-eligible (limit pre-HCT exposure to mitigate VOD risk)"
    route: IV

cycle_length_days: 21
total_cycles: "Up to 6 cycles; transplant-eligible patients should bridge to alloHCT after 1-2 cycles to minimize VOD/SOS risk (boxed warning)"

toxicity_profile: severe

premedication:
  - "Antiemetics — moderate-emetogenic prophylaxis (ondansetron + dexamethasone)"
  - "Pre-cycle CBC + LFT (bilirubin + ALT + AST) + LDH"
  - "Allopurinol 300 mg PO daily for TLS prophylaxis (especially cycle 1)"
  - "Antimicrobial prophylaxis per institutional protocol"
  - "Pre-treatment HBV / HCV / HIV screening"

mandatory_supportive_care:
  - SUP-TLS-PROPHYLAXIS
  - SUP-HBV-PROPHYLAXIS

monitoring_schedule_id:

dose_adjustments:
  - condition: "Bilirubin >1.5× ULN OR AST/ALT >2.5× ULN"
    modification: "Hold; resume reduced dose on resolution; permanent discontinuation if Grade ≥3 hepatotoxicity persists OR VOD diagnosed"
    rationale: "Hepatotoxicity precursor to VOD; boxed warning"
    source_refs:
      - SRC-INOVATE-KANTARJIAN-2016
      - SRC-NCCN-BCELL-2025
  - condition: "Pre-alloHCT setting"
    modification: "Limit to 2 cycles maximum pre-HCT; avoid dual-alkylator conditioning (no Bu/Cy); use Bu/Flu instead; hepatic monitoring intensified"
    rationale: "VOD/SOS post-HCT incidence ~14% — minimize cumulative exposure + alkylator burden"
    source_refs:
      - SRC-INOVATE-KANTARJIAN-2016
  - condition: "QTc >500 ms"
    modification: "Hold; correct electrolytes; resume reduced exposure"
    rationale: "QTc prolongation observed"
    source_refs:
      - SRC-NCCN-BCELL-2025
  - condition: "No CR/CRi after 2 cycles"
    modification: "Discontinue; consider blinatumomab, CAR-T, or palliation"
    rationale: "Lack of response per INO-VATE; alternative therapies needed"
    source_refs:
      - SRC-INOVATE-KANTARJIAN-2016

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Inotuzumab ozogamicin (Besponsa) NOT registered in Ukraine. International referral or compassionate-use pathway required."

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-INOVATE-KANTARJIAN-2016

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Inotuzumab CD22 ADC for R/R B-ALL (INO-VATE). Signature: VOD risk
# (boxed warning, especially post-SCT), cytopenia, IRR.
# STUB pending §6.1.
between_visit_watchpoints:
  - trigger_ua: "Помірна втома, нудота"
    action_ua: "Очікувано — занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Жовтяниця, набір ваги, біль у правому верхньому квадранті"
    action_ua: "Звертайтесь у лікарню негайно — інотузумаб може спричиняти веноокклюзивну хворобу печінки (VOD); особливо при наступному alloHCT"
    urgency: er_now
    sources:
      - SRC-NCCN-BCELL-2025
      - SRC-INOVATE-KANTARJIAN-2016
  - trigger_ua: "Лихоманка вище 38°C"
    action_ua: "Звертайтесь у лікарню негайно — глибока нейтропенія"
    urgency: er_now
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Незвичні синці, кровотеча"
    action_ua: "Подзвоніть у клініку того ж дня — тромбоцитопенія"
    urgency: call_clinic_same_day
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Тяжка інфузійна реакція"
    action_ua: "Інфузія в клініці — медперсонал реагує негайно"
    urgency: er_now
    cycle_day_window: "Day 1 of cycle 1"
    sources:
      - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
notes: >
  Anti-CD22 ADC for R/R Ph- B-ALL. INO-VATE: CR/CRi 80.7% vs
  29.4%; MRD-neg 78.4% vs 28.1%. Bridge-to-HCT intent dominant.
  VOD/SOS boxed warning — limit pre-HCT exposure + avoid dual
  alkylator conditioning. STUB — pending Co-Lead sign-off.
notes_ua: >
  Anti-CD22 ADC for р/р Ph- B-ALL. INO-VATE: CR/CRi 80.7% проти 29.4%; МЗХ-neg 78.4% проти 28.1%. Bridge-to-HCT intent dominant. VOD/SOS спеціальне попередження в інструкції — limit pre-HCT exposure + avoid dual alkylator conditioning. STUB — pending Co-Lead sign-off.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
