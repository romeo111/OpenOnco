last_reviewed: "2026-05-07"
reviewer_signoffs: []
notes: >
  IKEMA trial (Moreau 2021, NEJM): in r/r MM after 1-3 prior lines including
  a PI and an IMiD, Isa-Kd (n=179) vs Kd (n=123). Primary endpoint: PFS HR
  0.531 (95% CI 0.318-0.889; p=0.0014); 18-month PFS ~68% vs 50%. ORR 86.6%
  vs 82.9%; MRD negativity (10^-5) 29.6% vs 13.0%. Isatuximab dosing in cycle
  1 is weekly (days 1, 8, 15, 22) then biweekly from cycle 2 (days 1, 15).
  Carfilzomib ramp-up: 20 mg/m^2 days 1-2 cycle 1, then 56 mg/m^2. Dexamethasone
  20 mg on 8 days per cycle (premedication overlap with isatuximab IRR prophylaxis
  on infusion days). Near-equivalent alternative to DKd (CANDOR) — choose based
  on drug access; no head-to-head data. Anti-CD38 (isatuximab) interferes with
  red-cell crossmatch — DAT/Coombs baseline mandatory before cycle 1.

notes_ua: >
  Дослідження IKEMA (Moreau 2021, NEJM): при р/р ММ після 1-3 попередніх ліній
  лікування, включаючи інгібітор протеасоми та ІМіД, Isa-Kd (n=179) проти Kd
  (n=123). Первинна кінцева точка: ВБП ВР 0,531 (95% ДІ 0,318–0,889;
  p=0,0014); 18-місячна ВБП ~68% проти 50%. ЗРВ 86,6% проти 82,9%;
  МРД-негативність (10^-5) 29,6% проти 13,0%. Дозування ізатуксимабу
  (isatuximab): у 1-му циклі — щотижнево (дні 1, 8, 15, 22), з 2-го
  циклу — кожні 2 тижні (дні 1, 15). Карфілзоміб (carfilzomib): ескалація
  20 мг/м² у дні 1-2 циклу 1, далі 56 мг/м². Дексаметазон 20 мг у 8 днів
  кожного циклу. Близька до еквівалентної альтернатива — DKd (CANDOR); вибір
  залежить від доступності препарату, порівняльних даних немає. Анти-CD38
  (ізатуксимаб) заважає перехресному типуванню еритроцитів — базовий
  DAT/Кумбс обов'язковий до 1-го циклу.
