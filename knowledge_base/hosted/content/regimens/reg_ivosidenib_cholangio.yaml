id: REG-IVOSIDENIB-CHOLANGIO
name: "Ivosidenib monotherapy (ClarIDHy; IDH1-mutant intrahepatic CCA)"
drugs:
  - drug_id: DRUG-IVOSIDENIB
    dose: "500 mg PO once daily"
    route: oral
    schedule: "continuous daily until progression or unacceptable toxicity"
    notes: >
      Take on empty stomach or with low-fat meal. Avoid grapefruit (CYP3A4).
      Hold for QTc >500 ms; resume at same dose when QTc ≤480 ms.
      No dose reduction levels established in ClarIDHy; hold/discontinue per
      QTc and toxicity guidance.

cycle_length_days: 28
number_of_cycles: "until progression or unacceptable toxicity"
regimen_type: targeted_oral_monotherapy

dosing_notes: >
  ClarIDHy protocol (Abou-Alfa 2020 NEJM; 2023 JCO): ivosidenib 500 mg PO QD continuous.
  ECG mandatory: baseline, day 8 of cycle 1, day 1 of each subsequent cycle × 3, then
  q3 months. If QTc 481-500 ms: ECG in 1 week, reduce/hold concomitant QT-prolonging drugs.
  If QTc >500 ms: hold ivosidenib; recheck in 1 week; resume when QTc ≤480 ms.
  IDH differentiation syndrome (IDS): rare in CCA (unlike AML); if fever + respiratory
  symptoms + fluid retention → hold + dexamethasone 10 mg IV bid; restart at clinician
  discretion.
  Drug interactions: strong CYP3A4 inhibitors (ketoconazole, clarithromycin, grapefruit)
  ↑ ivosidenib Cmax/AUC; rifampin/St John's wort ↓ levels (avoid).
  Statins: ivosidenib ↑ statin exposure via CYP3A4/OATP1B1 inhibition — use lowest
  effective statin dose or switch to pravastatin (non-CYP3A4).

key_toxicities:
  - "QTc prolongation (~24% any grade; ~7% Grade ≥3) — ECG monitoring mandatory"
  - "Ascites/fluid retention (~22% — often from underlying liver disease + disease progression)"
  - "Fatigue (~40%)"
  - "Nausea (~30%)"
  - "Diarrhea (~25%)"
  - "IDH differentiation syndrome (IDS; ~7% AML rate; lower in CCA; monitor for fever/hypoxia)"

special_precautions:
  - "QTc monitoring: concomitant QT-prolonging agents (ondansetron, azithromycin, haloperidol) require additive monitoring; avoid Class Ia/III antiarrhythmics"
  - "IDH1 mutation confirmation: mandatory before starting — R132C/H/G/S/L only; IDH1-WT or IDH2-mut do not respond"
  - "Biliary stent/drainage: bilirubin must be controlled before starting (biliary obstruction in CCA is common; elevated bilirubin affects drug metabolism)"
  - "Ukraine access: ivosidenib NOT registered; named-patient import only — inform patient of access limitations"

sources:
  - SRC-NCCN-HEPATOBILIARY
  - SRC-ESMO-BTC-2023
last_reviewed: "2026-05-04"
drafted_by: claude_extraction
