notes: >
  STUB scaffold. Dosing summary only.
notes_ua: >
  Лароректиніб (larotrectinib) 100 мг/м² перорально двічі на добу
  безперервно (діти) / 100 мг перорально двічі на добу безперервно (дорослі)
  при NTRK-fusion-позитивній інфантильній фібросаркомі (IFS).
  Лароректиніб — пан-NTRK TKI; прискорене схвалення FDA листопад 2018
  для будь-якої пухлини з NTRK-злиттям після прогресії на системній терапії.
  Особливо ефективний при IFS (ETV6-NTRK3): ЗРВ у дітей >90%. Загалом
  добра переносимість; запаморочення, нудота, підвищення трансаміназ. Шаблон STUB.
