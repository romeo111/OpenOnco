last_reviewed: "2026-04-27"
notes: >
  Pooled NAVIGATE / SCOUT / phase-1: ORR 75% (IRC) across 17 tumor
  types incl. NSCLC subset. Tumor-agnostic FDA approval 2018. NTRK
  fusion frequency in NSCLC ~0.2% — RNA-NGS panel testing required to
  identify. Best tolerated TRK inhibitor; entrectinib alternative
  (broader spectrum incl. ROS1 / ALK but more CNS-AE); repotrectinib
  next-gen for resistance mutations (G595R / G667C).

notes_ua: >
  Зведений аналіз NAVIGATE / SCOUT / фаза 1: ЗРВ 75% (IRC) у 17 типах
  пухлин, включаючи підгрупу НДРЛ. Пан-пухлинне схвалення FDA 2018.
  Частота злиття NTRK у НДРЛ ~0,2% — для виявлення потрібна РНК-NGS
  панель. Ларотректиніб (larotrectinib) 100 мг перорально двічі на добу
  (дорослі); педіатрично — 100 мг/м² двічі на добу. Найкраще переносимий
  інгібітор TRK; ентректиніб (entrectinib) є альтернативою ширшого
  спектру (охоплює також ROS1 / ALK, але більше НЯ з боку ЦНС);
  репотректиніб (repotrectinib) — наступне покоління при резистентних
  мутаціях (G595R / G667C).
ukrainian_review_status: pending_clinical_signoff
