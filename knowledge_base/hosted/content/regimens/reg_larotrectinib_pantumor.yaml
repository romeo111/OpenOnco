id: REG-LAROTRECTINIB-PANTUMOR
name: "Larotrectinib monotherapy (NAVIGATE / SCOUT) — NTRK fusion+ solid tumors (tumor-agnostic, incl. NSCLC)"
name_ua: "Ларотректініб моно (NAVIGATE / SCOUT) — NTRK fusion+ солідні пухлини (tumor-agnostic, вкл. НДРЛ)"
alternate_names:
  - "Vitrakvi"
  - "LOXO-101"

components:
  - drug_id: DRUG-LAROTRECTINIB
    dose: "100 mg PO BID (adults); pediatric 100 mg/m² BID"
    schedule: "Continuous"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: low

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Hepatic transaminase elevation Grade ≥3"
    modification: "Hold; resume at 75 mg BID after recovery"
    source_refs: [SRC-NAVIGATE-DRILON-2018]
  - condition: "Cognitive / mood AE Grade ≥2"
    modification: "Reduce to 75 mg BID; further reduction or discontinuation if persistent"
    rationale: "TRK class CNS effect (less than entrectinib)"
    source_refs: [SRC-NAVIGATE-DRILON-2018]
  - condition: "Withdrawal symptoms on discontinuation"
    modification: "Taper rather than abrupt stop"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Larotrectinib NOT registered in UA (despite tumor-agnostic FDA / EMA
    approval since 2018). Access via Bayer named-patient pathway,
    cross-border (EU) per наказ МОЗ 988, or clinical trial. Highest
    access priority of NTRK options given best tolerability + longest
    track record.

sources:
  - SRC-NAVIGATE-DRILON-2018
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

