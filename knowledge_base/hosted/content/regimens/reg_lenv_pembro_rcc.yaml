last_reviewed: "2026-05-03"
notes: >
  CLEAR: lenv+pembro vs sunitinib, PFS 23.9 vs 9.2 mo (HR 0.39) — largest PFS
  gain in any 1L ccRCC trial. mOS HR 0.66. However, highest toxicity burden of
  the 1L combos: hypertension G3-4 ~36%, proteinuria G3 ~6%, fatigue ~10%.
  Dose reductions frequent (69% for lenvatinib). Max 2 years pembrolizumab.
  Lenvatinib dose starts at 20mg; reduces to 14→10→8mg for toxicity.
  Favored when maximal tumor response is the priority (conversion, symptomatic
  high-burden disease). Use with caution in patients with borderline BP control.
notes_ua: "Ленватиніб 20 мг + пембролізумаб 200 мг q3w. CLEAR: PFS HR 0.39 vs сунітиніб."
