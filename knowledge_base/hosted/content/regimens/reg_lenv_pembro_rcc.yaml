id: REG-LENV-PEMBRO-RCC
name: "Lenvatinib + pembrolizumab (RCC, 1L)"
name_ua: "Ленватиніб + пембролізумаб (НКК, 1L)"
alternate_names: ["CLEAR", "LEAP-011", "lenvima+keytruda"]
components:
- drug_id: DRUG-LENVATINIB
  dose: "20 mg PO daily"
  schedule: "Continuous daily dosing"
  route: PO
- drug_id: DRUG-PEMBROLIZUMAB
  dose: "200 mg IV q3w (or 400 mg q6w)"
  schedule: "Until progression or 2 years maximum"
  route: IV
cycle_length_days: 21
total_cycles: "Until progression or max 35 cycles (~2 years) for pembrolizumab; lenvatinib continues until progression"
toxicity_profile: severe
premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:
dose_adjustments:
- condition: "Grade 3 hypertension"
  modification: "Hold lenvatinib; reduce to 14 mg → 10 mg → 8 mg on resumption"
- condition: "Grade 4 hypertension or hypertensive crisis"
  modification: "Permanently discontinue lenvatinib"
- condition: "UPCR ≥ 2 g/24h"
  modification: "Hold lenvatinib until < 2 g; reduce dose on resumption"
- condition: "Immune-mediated AE G≥2 from pembrolizumab"
  modification: "Hold pembrolizumab; corticosteroids if G≥3"
- condition: "G3 non-hematologic lenvatinib AE"
  modification: "Hold; reduce by one dose level on resumption"
