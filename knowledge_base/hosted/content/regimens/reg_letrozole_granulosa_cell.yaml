id: REG-LETROZOLE-GRANULOSA-CELL
name: "Letrozole for recurrent adult granulosa cell tumor"
name_ua: "Летрозол при рецидивуючій дорослій гранульозоклітинній пухлині"
alternate_names: ["letrozole 2.5 mg QD GCT", "aromatase inhibitor GCT"]

components:
  - drug_id: DRUG-LETROZOLE
    dose: "2.5 mg"
    schedule: "PO once daily, continuously"
    route: PO
    duration: "Until disease progression or unacceptable toxicity"
    notes: "Take at the same time each day. Can be taken with or without food."

cycle_length_days: 28
number_of_cycles: "Continuous until progression"

supportive_care:
  - "Calcium 1000-1200 mg/day + vitamin D 800-1000 IU/day (bone protection with AI)"
  - "DXA bone density: baseline + annually (AI-induced bone loss)"
  - "Inhibin B + AMH: every 3 months (tumor marker monitoring)"
  - "Joint symptoms/arthralgia: common NSAID-managed; consider switching to megestrol or leuprolide if severe"

alternative_regimens_for_premenopausal:
  - "Leuprolide acetate 3.75 mg IM Q28D OR 11.25 mg IM Q84D (GnRH agonist; preferred if premenopausal)"
  - "Megestrol acetate 160 mg PO QD (progestin; older option with different toxicity profile)"
  - "Anastrozole 1 mg PO QD (alternative AI; equivalent to letrozole)"

administration_notes: >
  Letrozole is the preferred hormonal agent for postmenopausal patients with
  recurrent AGCT. For premenopausal patients, leuprolide (GnRH agonist) is
  preferred because it suppresses ovarian estrogen production that would
  otherwise negate peripheral AI effect.
  Monitoring: inhibin B is the most sensitive tumor marker for AGCT
  (more reliable than CA-125); measure Q3 months. A rising inhibin B
  precedes imaging evidence of recurrence by months — use it as an early
  warning signal to reassess with imaging.

sources:
  - SRC-NCCN-OVARIAN-2025

last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
