id: REG-LIFILEUCEL-TIL-MELANOMA
name: "Lifileucel TIL therapy (Amtagvi, melanoma 3L+)"
name_ua: "Ліфілеуцел TIL-терапія (Amtagvi, меланома 3L+)"
alternate_names: ["Amtagvi", "C-144-01 regimen", "TIL"]

components: []  # phases supersede; kept empty for back-compat with downstream
                # consumers that still iterate `components` directly. PR3 of
                # regimen-phases-refactor — see plan-doc 2026-04-28 §4 + §5.

phases:
  - name: lymphodepletion
    purpose_ua: "виснаження лімфоцитів перед TIL для приживлення клітин (NMA-Cy/Flu)"
    purpose_en: "lymphocyte depletion before TIL infusion to enable engraftment (NMA-Cy/Flu)"
    duration: "7 days: cyclophosphamide 60 mg/kg × 2 days, then fludarabine 25 mg/m² × 5 days"
    timing_relative_to: "main_infusion"
    timing_offset_days: -7
    optional: false
    components:
      - drug_id: DRUG-CYCLOPHOSPHAMIDE
        dose: "60 mg/kg/day"
        schedule: "IV × 2 days (lymphodepletion)"
        route: IV
      - drug_id: DRUG-FLUDARABINE
        dose: "25 mg/m²/day"
        schedule: "IV × 5 days (lymphodepletion, after cyclophosphamide)"
        route: IV
    sources:
      - SRC-C14401-CHESNEY-2024
      - SRC-NCCN-MELANOMA-2025
  - name: main
    purpose_ua: "основна TIL інфузія (Amtagvi)"
    purpose_en: "main TIL infusion (Amtagvi)"
    duration: "single infusion"
    timing_relative_to: "absolute"
    optional: false
    components:
      - drug_id: DRUG-LIFILEUCEL
        dose: "Single IV infusion of 7.5 × 10⁹ to 72 × 10⁹ viable autologous TIL cells"
        schedule: "Once, after lymphodepletion; followed by IL-2 supportive bolus regimen"
        route: IV
        duration: "single infusion"
    sources:
      - SRC-C14401-CHESNEY-2024
      - SRC-NCCN-MELANOMA-2025
  - name: il2_support
    purpose_ua: "IL-2 (aldesleukin) болюсна підтримка для розширення TIL клітин: 600 000 МО/кг IV q8-12h, до 6 доз, розпочато протягом 24 год після інфузії TIL"
    purpose_en: "IL-2 (aldesleukin) bolus support for TIL expansion: 600,000 IU/kg IV q8-12h, max 6 doses, started within 24 h of TIL infusion"
    duration: "up to 6 doses q8-12h, started within 24 h of TIL infusion"
    timing_relative_to: "previous_phase_completion"
    timing_offset_days: 0
    optional: false
    components: []  # aldesleukin (IL-2) details captured in purpose_ua/duration —
                   # no DRUG-ALDESLEUKIN entity exists in the KB yet (PR4 scope).
    sources:
      - SRC-C14401-CHESNEY-2024

cycle_length_days: null
total_cycles: "Single TIL infusion (one-time treatment intent); ~6-week inpatient pathway including lymphodepletion + TIL + IL-2 + recovery"
toxicity_profile: severe

premedication:
  - "Tumor procurement (~1.5 cm³ resection) → central manufacturing ~22 days"
  - "Bridging therapy permitted during manufacturing window if disease threatening"
  - "G-CSF support starting D+1 post-TIL"
  - "Antimicrobial prophylaxis: PCP, HSV, fungal during prolonged neutropenia"

mandatory_supportive_care: []
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Hemodynamic instability during IL-2 (SBP <90, oliguria, hypoxia)"
    modification: "Hold IL-2; vasopressors / fluid resuscitation per ICU protocol; resume only if recovered before next scheduled dose"
    source_refs: [SRC-C14401-CHESNEY-2024]
  - condition: "Cardiac arrhythmia (atrial fibrillation, ischemia)"
    modification: "Discontinue IL-2; cardiology consult"
    source_refs: [SRC-C14401-CHESNEY-2024]
  - condition: "Suspected sepsis during neutropenic phase"
    modification: "Empirical broad-spectrum antibiotics per institutional febrile-neutropenia protocol; ICU-level support"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Ліфілеуцел не зареєстрований в Україні (2026-04); немає вітчизняних viral vector / TIL манufacturing capabilities. Pathway = international referral до spec center (US — Iovance authorized treatment centers; EU pilot sites). Loft cost (TIL product alone) ~USD 515K + lymphodepletion + IL-2 + ICU + housing. Без НСЗУ покриття; charity / fundraising single pathway."

sources:
  - SRC-NCCN-MELANOMA-2025
  - SRC-C14401-CHESNEY-2024

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Lifileucel TIL therapy for advanced melanoma post-checkpoint. Highly
# intensive: lymphodepletion + cell infusion + 6 doses IL-2. Toxicity
# is dominated by IL-2 capillary leak + cytopenia; entire course is
# inpatient. STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Виражена втома, що триває тижнями після курсу"
    action_ua: "Очікувано — кістковий мозок відновлюється повільно; відпочивайте"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-MELANOMA-2025
  - trigger_ua: "Виражений висип, лущення шкіри"
    action_ua: "Очікувано від IL-2 — використовуйте зволожувач; занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-MELANOMA-2025
  - trigger_ua: "Лихоманка вище 38°C — особливо в перші тижні після виписки"
    action_ua: "Подзвоніть у клініку того ж дня — на тлі тривалої нейтропенії ризик інфекції"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-MELANOMA-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Виражені набряки, задишка, набір ваги"
    action_ua: "Подзвоніть у клініку того ж дня — IL-2-залежний синдром капілярного просочування може зберігатись"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-MELANOMA-2025
      - SRC-C14401-CHESNEY-2024
  - trigger_ua: "Зменшення кількості сечі, біль у попереку"
    action_ua: "Подзвоніть у клініку того ж дня — IL-2 може впливати на нирки"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-MELANOMA-2025
  - trigger_ua: "Раптова сильна задишка, синюшність губ"
    action_ua: "Звертайтесь у лікарню негайно — можливий тяжкий капілярний витік або серцева подія"
    urgency: er_now
    sources:
      - SRC-NCCN-MELANOMA-2025
  - trigger_ua: "Сплутаність свідомості, висока лихоманка з ознобом"
    action_ua: "Звертайтесь у лікарню негайно — ознаки можливого сепсису"
    urgency: er_now
    sources:
      - SRC-CTCAE-V5

last_reviewed: "2026-04-27"
notes: >
  C-144-01 pooled cohorts (n=153): ORR 31.4%, mDoR not reached at
  27.6 mo follow-up, mOS 13.9 mo — first cellular therapy approved
  for any solid tumor (FDA 2024-02-16, Iovance Amtagvi). Single-
  infusion treatment intent (no maintenance). Treatment-related
  mortality ~7% — patient selection critical: ECOG ≤1, organ
  function adequate for IL-2 (LVEF ≥45, FEV1 ≥60, DLCO ≥60), no
  active infection, no chronic immunosuppression. CRITICAL: must
  AVOID systemic corticosteroids before and shortly after TIL
  infusion (abrogate TIL function). Specialty-center authorization
  + REMS-style accreditation required. Ukraine pathway: international
  referral only.

notes_ua: >
  C-144-01 зведені когорти (n=153): ЗРВ 31,4%, медіана тривалості
  відповіді не досягнута при медіані спостереження 27,6 міс., мЗВ
  13,9 міс. — перша клітинна терапія, схвалена FDA для будь-якої
  солідної пухлини (FDA 2024-02-16, Iovance Amtagvi). Однократна
  інфузія як ціль лікування (підтримки немає). Лікувально-асоційована
  летальність ~7% — відбір пацієнтів критичний: ECOG ≤1, адекватна
  функція органів для IL-2 (LVEF ≥45, FEV1 ≥60, DLCO ≥60), немає
  активних інфекцій, немає хронічної імуносупресії. КРИТИЧНО: необхідно
  УНИКАТИ системних кортикостероїдів до та незабаром після інфузії TIL
  (відміняють функцію TIL). Потрібна авторизація спеціалізованого
  центру + акредитація типу REMS. Шлях для України: виключно
  міжнародне направлення.
