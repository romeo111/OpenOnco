id: REG-LUTETIUM-PSMA
name: "Lutetium-177 PSMA-617 radioligand therapy"
name_ua: "Лютецій-177 PSMA-617 радіолігандна терапія"
alternate_names: ["Pluvicto", "VISION regimen"]

components:
  - drug_id: DRUG-LUTETIUM-177-PSMA
    dose: "7.4 GBq IV"
    schedule: "q6 weeks × 6 cycles"
    route: IV

cycle_length_days: 42
total_cycles: "6 (extend to 8 if responding and tolerated, per protocol)"
toxicity_profile: moderate

premedication:
  - "Hydration pre + post infusion"
  - "Dental evaluation pre-start (xerostomia mitigation)"
mandatory_supportive_care:
  - SUP-BONE-HEALTH-PROSTATE
monitoring_schedule_id:

dose_adjustments:
  - condition: "Persistent G3+ bone marrow suppression"
    modification: "Discontinue"
  - condition: "Renal function decline (CrCl <50)"
    modification: "Reduce dose or discontinue"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Not registered in Ukraine. Access via international referral (EU centers — Germany, Czech Republic). Major access barrier; flagged for clinical-review queue."

sources: [SRC-NCCN-PROSTATE-2025, SRC-ESMO-PROSTATE-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Lutetium-177 PSMA radioligand for PSMA+ mCRPC post-ARPI/taxane
# (VISION trial). Signature: dry mouth (salivary uptake), cytopenia
# (radiation marrow), fatigue, GI. STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Сухість у роті, утруднене ковтання сухої їжі"
    action_ua: "Очікувано — пийте більше води, використовуйте штучну слину; занотовуйте інтенсивність"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-PROSTATE-2025
  - trigger_ua: "Помірна втома, що триває тижнями після кожної дози"
    action_ua: "Очікувано після радіолігандної терапії — відпочивайте більше"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-PROSTATE-2025
  - trigger_ua: "Помірна нудота"
    action_ua: "Часто проходить за тиждень — приймайте призначені протиблювотні"
    urgency: log_at_next_visit
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Виражена втома, задишка при невеликому навантаженні"
    action_ua: "Подзвоніть у клініку того ж дня — Lu-PSMA може спричиняти анемію"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-PROSTATE-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Лихоманка вище 38°C"
    action_ua: "Подзвоніть у клініку того ж дня — нейтропенія можлива через тижні після дози"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-PROSTATE-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Незвичні синці, кровотеча ясен або носа"
    action_ua: "Подзвоніть у клініку того ж дня — потрібен контроль тромбоцитів"
    urgency: call_clinic_same_day
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Зменшення кількості сечі, набряки гомілок"
    action_ua: "Подзвоніть у клініку того ж дня — Lu-PSMA може впливати на нирки"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-PROSTATE-2025

last_reviewed:
notes: >
  VISION trial: significant rPFS + OS benefit in PSMA-PET-positive mCRPC
  post-ARPI + post-taxane. Requires nuclear medicine infrastructure +
  PSMA-PET. UA access concentrated in 2-3 academic centers.
notes_ua: >
  VISION дослідження: significant rPFS + OS виграш in PSMA-PET-positive mCRPC post-ARPI + post-taxane. Requires nuclear medicine infrastructure + PSMA-PET. UA access concentrated in 2-3 academic centers.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
