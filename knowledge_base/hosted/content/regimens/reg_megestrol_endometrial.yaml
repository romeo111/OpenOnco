id: REG-MEGESTROL-ENDOMETRIAL
name: "Megestrol acetate (hormonal therapy, recurrent endometrial)"
name_ua: "Мегестрол ацетат (гормональна терапія, рецидивуючий ендометрій)"
alternate_names:
  - "Progestin monotherapy"
  - "Megace endometrial"

disease_context: DIS-ENDOMETRIAL
line_of_therapy: 2
plan_track: standard

components:
  - drug_id: DRUG-MEGESTROL-ACETATE
    dose: "160 mg PO once daily (as single 160 mg tablet or 40 mg × 4 tablets)"
    route: PO
    schedule: "Continuous daily dosing until progression or unacceptable toxicity"
    administration_notes: >
      Take with or without food. Consistent daily administration. Higher doses
      (320 mg/day) do not improve efficacy vs 160 mg in endometrial cancer
      (historical GOG data) and increase toxicity (thromboembolic risk, weight gain).
      Antitumor effect mechanism: progestin → PR-mediated suppression of estrogen
      receptor signaling + direct anti-proliferative effect on ER+/PR+ tumor cells.

alternative_hormonal_options: >
  Aromatase inhibitors (AIs) — alternative to progestins in post-menopausal patients:
  - Letrozole 2.5 mg PO once daily (preferred AI; NCCN Cat 2A for endometrial)
  - Anastrozole 1 mg PO once daily
  - Exemestane 25 mg PO once daily
  AIs: ORR ~9-14% in unselected endometrial (GOG 263; Colombo 2007); better
  tolerated than progestins (less thrombotic risk, less weight gain).
  Tamoxifen 20 mg PO bid: GOG 119 ORR ~22% (historical; risk of endometrial
  stimulation at high dose — not first choice for residual endometrial cancer).

cycle_length_days: 28
total_planned_cycles: >
  Continue until disease progression, unacceptable toxicity, or patient
  withdrawal. Response assessment every 3 months (CT CAP). Median
  duration of response ~6 months in responders; some patients have
  durable benefit (12-24+ months) with low-grade tumors.

premedication:
  - "No premedication required — oral daily medication"

mandatory_supportive_care:
  - "DVT prophylaxis: discuss risk vs benefit; megestrol increases VTE risk ~3-fold. Low-risk patients: ambulation + hydration. High-risk (prior VTE, immobile): consider prophylactic anticoagulation."
  - "Blood glucose monitoring: megestrol causes hyperglycemia in ~12% (especially diabetics or pre-diabetics)"

monitoring_schedule:
  - "CT chest/abdomen/pelvis: every 3 months (response assessment per RECIST 1.1)"
  - "Weight: each visit (megestrol causes weight gain; appetite stimulation)"
  - "Blood glucose: monthly in diabetics or HbA1c >6.5%"
  - "Serum electrolytes: if clinical fluid retention suspected (megestrol: adrenal insufficiency risk with long-term use)"
  - "Adrenal function (AM cortisol): if prolonged use (>6 months) or symptoms of adrenal insufficiency"

dose_adjustments:
  - condition: "Symptomatic edema or fluid retention"
    modification: "Reduce megestrol to 80 mg/day + add low-dose diuretic if needed."
  - condition: "Diabetes mellitus worsening (HbA1c increase >1.5%)"
    modification: "Adjust antidiabetic therapy; no megestrol dose change needed unless intolerable hyperglycemia."
  - condition: "DVT/PE on megestrol"
    modification: "Initiate therapeutic anticoagulation (LMWH or DOAC — enoxaparin or rivaroxaban). Consider switching to aromatase inhibitor (lower thrombogenic risk)."

special_precautions:
  - "THROMBOEMBOLIC RISK: Megestrol is progestogenic and increases VTE risk ~3-fold. Avoid in patients with prior VTE unless anticoagulated. Counsel on VTE signs."
  - "ADRENAL SUPPRESSION: Long-term megestrol suppresses HPA axis (glucocorticoid-like activity). Risk of adrenal crisis with abrupt discontinuation or physiological stress. Taper slowly after >3 months use."
  - "WEIGHT GAIN: Megestrol stimulates appetite; weight gain of 2-10 kg is common. May be beneficial (cancer cachexia) or undesirable depending on patient preference."
  - "HYPERGLYCEMIA: Monitor glucose especially in diabetics."
  - "ADRENAL INSUFFICIENCY ON STRESS: Patients on chronic megestrol may need stress-dose corticosteroids for surgery/illness after prolonged treatment."

watchpoints_ua:
  - "УВАГА: ТГВ/ТЕЛА ризик — мегестрол збільшує ризик тромбозу в ~3 рази; антикоагуляція при тромбоза в анамнезі"
  - "УВАГА: Моніторинг глюкози крові — мегестрол спричиняє гіперглікемію (~12%)"
  - "УВАГА: Надниркова недостатність при різкому відміненні — поступово знижувати дозу"
  - "При ТГВ/ТЕЛА на мегестролі: терапевтична антикоагуляція + розгляд переходу на інгібітор ароматази"
  - "Альтернатива: летрозол 2,5 мг/день або анастрозол 1 мг/день — менший ризик тромбозу ніж мегестрол"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: >
    Megestrol acetate (Megace, generic) registered in Ukraine. AIs (letrozole,
    anastrozole) registered and NSZU-reimbursed for breast cancer; endometrial
    off-label but accessible generically at low cost.

sources:
  - SRC-NCCN-UTERINE-2025

last_reviewed: "2026-05-04"
notes: >
  Megestrol acetate 160 mg/day — standard first-choice progestin for recurrent
  ER+/PR+ Grade 1-2 endometrioid carcinoma. Evidence from GOG 081 (megestrol
  vs medroxyprogesterone: ORR ~25%; PR 6-8mo median) and GOG 119. NCCN Uterine
  2025 Category 2A for hormonal therapy in recurrent/metastatic ER+ endometrioid.
  AIs (letrozole, anastrozole) are equivalent alternatives with lower thrombotic
  risk. CDK4/6 inhibitor + AI combinations (GOG 3015/NRG-GY023) are emerging
  but not yet standard; track for future update.
notes_ua: >
  Мегестрол 160 мг/день — стандарт при рецидивуючій ER+/PR+ ендометріоїдній
  карциномі Grade 1-2 (NCCN кат.2A). AIs (летрозол, анастрозол) — альтернативи
  з меншим тромботичним ризиком. CDK4/6 + AI комбінації (NRG-GY023) — емерджентні.
ukrainian_review_status: pending_clinical_signoff
