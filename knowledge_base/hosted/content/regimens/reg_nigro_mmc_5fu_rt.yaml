notes_ua: >
  Протокол Ніґро (Nigro): мітоміцин-C (mitomycin-C) 10-12 мг/м² болюс дні 1
  і 29 + 5-ФУ (fluorouracil) 1000 мг/м²/добу безперервна інфузія дні 1-4 і
  29-32 + одночасна ПТ 45-54 Гр; стандарт 1L при плоскоклітинному раку
  анального каналу (ASCC). ACT I/II (UK CCCR-UKCCCR): 5-річна ЗВ ~65%,
  збереження функції ануса >70%. G-КСФ при мієлосупресії. Мітоміцин-C —
  кумулятивний гемолітичний уремічний синдром при >40 мг/м² (2 дози
  10-12 мг/м² = безпечно). При прогресуванні — рятівна абдомінально-
  промежинна резекція (APR).
