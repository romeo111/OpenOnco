last_reviewed: "2026-05-03"
notes: >
  CheckMate-9ER: nivo+cabo vs sunitinib, PFS 16.6 vs 8.3 mo (HR 0.51), mOS 37.7
  vs 34.3 mo (HR 0.70), ORR 55.7% vs 27.1%. Cabo dose 40 mg (not 60 mg monotherapy
  dose) in combination. Benefit across all IMDC risk groups. Tolerable safety profile
  relative to other ICI+TKI combos; preferred when MET pathway co-activation is
  suspected or in papillary histology (off-label, but biological rationale via MET).
  Max nivolumab duration 2 years; cabozantinib continues until progression.
notes_ua: "Ніволумаб 240мг q2w + кабозантиніб 40 мг щоденно. CheckMate-9ER: PFS HR 0.51."
ukrainian_review_status: pending_clinical_signoff
