id: REG-NIVO-CABO-RCC
name: "Nivolumab + cabozantinib (RCC, 1L)"
name_ua: "Ніволумаб + кабозантиніб (НКК, 1L)"
alternate_names: ["CheckMate-9ER", "nivo+cabo RCC"]
components:
- drug_id: DRUG-NIVOLUMAB
  dose: "240 mg IV q2w (or 480 mg IV q4w)"
  schedule: "Until progression or max 2 years"
  route: IV
- drug_id: DRUG-CABOZANTINIB
  dose: "40 mg PO daily"
  schedule: "Continuous daily dosing (note: 40 mg in combination — lower than 60 mg monotherapy)"
  route: PO
cycle_length_days: 28
total_cycles: "Until progression or max ~24 cycles nivolumab; cabozantinib continues until progression"
toxicity_profile: severe
premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:
dose_adjustments:
- condition: "Grade 3-4 cabozantinib-related AE"
  modification: "Hold cabozantinib; reduce to 20 mg on resumption (40→20 mg only one step)"
- condition: "Immune-mediated AE G≥2 from nivolumab"
  modification: "Hold nivolumab; corticosteroids for G≥3"
- condition: "Grade 4 AE or recurrent G3 requiring >12w hold"
  modification: "Permanently discontinue nivolumab"
ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Both registered in Ukraine. Out-of-pocket for most patients."
sources:
- SRC-CHECKMATE9ER-CHOUEIRI-2021
- SRC-NCCN-KIDNEY-2025
- SRC-ESMO-RCC-2024

