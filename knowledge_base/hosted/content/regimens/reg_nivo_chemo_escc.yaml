id: REG-NIVO-CHEMO-ESCC
name: "Nivolumab + platinum/fluoropyrimidine chemotherapy (ESCC)"
components:
  - drug_id: DRUG-NIVOLUMAB
  - drug_id: DRUG-CISPLATIN
  - drug_id: DRUG-5-FLUOROURACIL
cycle_length_days: 28
total_cycles: "Until progression or unacceptable toxicity; chemotherapy backbone per local protocol"
sources:
  - SRC-NCCN-ESOPHAGEAL-2025
  - SRC-ESMO-ESOPHAGEAL-2024
last_reviewed: "2026-05-07"
notes: >
  Thin regimen alias added to resolve existing esophageal ESCC indication
  references. Detailed dose/schedule curation should reconcile with the
  canonical esophageal 1L regimen set.
notes_ua: >
  Ніволумаб (nivolumab) у комбінації з платиновою + фторпіримідиновою
  хіміотерапією при ESCC 1L. CheckMate 648: ніво 360 мг q3w +
  цисплатин 80 мг/м² + 5-ФУ 800 мг/м²/добу × 5 днів q3w. ЗВ ВР 0,54
  (PD-L1 ≥1%), 0,74 (ITT) vs хімія. Схвалення FDA травень 2022.
  Тонкий alias-шаблон; деталі схеми — у повному регіменті ESCC.
ukrainian_review_status: pending_clinical_signoff
