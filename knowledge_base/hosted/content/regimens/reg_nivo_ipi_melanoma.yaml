id: REG-NIVO-IPI-MELANOMA
name: "Nivolumab + ipilimumab (melanoma, 1L metastatic)"
name_ua: "Ніволумаб + іпілімумаб (меланома, 1L метастаз)"
alternate_names: ["CheckMate-067"]
components:
  - {drug_id: DRUG-NIVOLUMAB, dose: "1 mg/kg IV induction → 480 mg flat IV q4w maintenance", schedule: "Induction with ipi cycles 1-4", route: IV}
  - {drug_id: DRUG-IPILIMUMAB, dose: "3 mg/kg IV (higher than RCC)", schedule: "Days 1 of cycles 1-4", route: IV}
cycle_length_days: 21
total_cycles: "4 induction; nivo maintenance until progression OR 2 years"
toxicity_profile: severe
premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:
dose_adjustments: [{condition: "Immune-mediated AE G≥2", modification: "Hold; corticosteroids"}]
ukraine_availability: {all_components_registered: true, all_components_reimbursed: false, notes: "Out-of-pocket"}
sources: [SRC-NCCN-MELANOMA-2025, SRC-ESMO-MELANOMA-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Combo nivo+ipi has the highest irAE rate of any standard checkpoint
# regimen — ~55% grade 3-4 immune AEs in CheckMate-067. Watchpoints
# emphasize early irAE recognition. STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Помірна втома, легкий шкірний свербіж або сухість"
    action_ua: "Часто і зазвичай легко — використовуйте зволожувач, занотуйте інтенсивність"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-MELANOMA-2025
  - trigger_ua: "Біль у суглобах легкий"
    action_ua: "Зустрічається — занотовуйте інтенсивність, обговоріть на візиті"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-MELANOMA-2025
  - trigger_ua: "Помірна діарея (3-4 рази на день)"
    action_ua: "Подзвоніть у клініку того ж дня — комбінація нiвo+іпі часто спричиняє коліт; рання оцінка важлива"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-MELANOMA-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Жовтяниця, біль у правому верхньому квадранті живота"
    action_ua: "Подзвоніть у клініку того ж дня — імунний гепатит зустрічається на нiвo+іпі"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-MELANOMA-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Сильна слабкість, постійна спрага, втрата ваги, нудота"
    action_ua: "Подзвоніть у клініку того ж дня — можлива імунна реакція щитоподібної залози або гіпофіза"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-MELANOMA-2025
  - trigger_ua: "Нова задишка, сухий кашель"
    action_ua: "Подзвоніть у клініку того ж дня — можливий імунний пневмоніт"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-MELANOMA-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Тяжка діарея (≥7 разів на день, з кров'ю)"
    action_ua: "Звертайтесь у лікарню негайно — тяжкий імунний коліт потребує госпіталізації і високих доз стероїдів"
    urgency: er_now
    sources:
      - SRC-NCCN-MELANOMA-2025
  - trigger_ua: "Сильна задишка у спокої, синюшність губ"
    action_ua: "Звертайтесь у лікарню негайно — тяжкий імунний пневмоніт"
    urgency: er_now
    sources:
      - SRC-NCCN-MELANOMA-2025
  - trigger_ua: "Раптовий стан тяжкої слабкості, плутаність свідомості, низький тиск"
    action_ua: "Звертайтесь у лікарню негайно — може бути криз надниркових залоз (рідкісний імунний ускладнення)"
    urgency: er_now
    sources:
      - SRC-NCCN-MELANOMA-2025

