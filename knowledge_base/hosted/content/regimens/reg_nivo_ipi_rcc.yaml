      - SRC-NCCN-KIDNEY-2025
  - trigger_ua: "Сильна слабкість, постійна спрага, втрата ваги"
    action_ua: "Подзвоніть у клініку того ж дня — можлива імунна реакція щитоподібної залози або гіпофіза"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-KIDNEY-2025
  - trigger_ua: "Нова задишка, сухий кашель"
    action_ua: "Подзвоніть у клініку того ж дня — можливий імунний пневмоніт"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-KIDNEY-2025
  - trigger_ua: "Тяжка діарея (≥7 разів на день, з кров'ю)"
    action_ua: "Звертайтесь у лікарню негайно — тяжкий імунний коліт"
    urgency: er_now
    sources:
      - SRC-NCCN-KIDNEY-2025
