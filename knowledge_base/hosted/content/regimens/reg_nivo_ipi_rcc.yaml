# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Nivo+ipi (CheckMate-214) for IMDC intermediate/poor RCC 1L. Lower
# ipi dose than melanoma (1 mg/kg vs 3 mg/kg) → fewer Grade 3 irAEs
# but still significant. Patterns reuse from melanoma checkpoint.
# STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Помірна втома після інфузій"
    action_ua: "Очікувано — відпочивайте більше у дні 1-3"
    urgency: log_at_next_visit
    cycle_day_window: "Day 1-3"
    sources:
      - SRC-NCCN-KIDNEY-2025
  - trigger_ua: "Шкірний свербіж або сухість шкіри"
    action_ua: "Часто і зазвичай легко — використовуйте зволожувач"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-KIDNEY-2025
  - trigger_ua: "Помірна діарея (3-4 рази на день)"
    action_ua: "Подзвоніть у клініку того ж дня — комбінація може спричиняти імунний коліт; рання оцінка важлива"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-KIDNEY-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Жовтяниця, біль у правому верхньому квадранті живота"
    action_ua: "Подзвоніть у клініку того ж дня — імунний гепатит зустрічається на нiвo+іпі"
    urgency: call_clinic_same_day
