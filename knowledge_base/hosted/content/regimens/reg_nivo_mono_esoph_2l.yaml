last_reviewed: "2026-04-26"

notes: >
  ATTRACTION-3 (Kato 2019): 2L advanced esophageal squamous-cell
  carcinoma post-fluoropyrimidine + platinum — nivolumab vs taxane
  (docetaxel/paclitaxel) mOS 10.9 vs 8.4 mo (HR 0.77), better safety
  profile (Grade ≥3 AE 18% vs 63%). NCCN cat 1 for 2L ESCC. KEYNOTE-181
  (pembrolizumab) parallel evidence for 2L ESCC (PD-L1 CPS ≥10
  subset only). Adenocarcinoma 2L benefit less established for ICI
  monotherapy — patients route to ramucirumab + paclitaxel (gastric-style).
notes_ua: >
  ATTRACTION-3 (Kato 2019): 2L поширений esophageal squamous-cell карцинома post-fluoropyrimidine + platinum — ніволумаб vs taxane (доцетаксел/паклітаксел) міс. 10.9 проти 8.4 міс. (HR 0.77), краще профіль безпеки (Grade ≥3 AE 18% проти 63%). NCCN cat 1 for 2L ESCC. KEYNOTE-181 (пембролізумаб) parallel докази for 2L ESCC (PD-L1 CPS ≥10 subset only). Adenocarcinoma 2L виграш less усталений for ICI монотерапія — patients route to рамуцирумаб + паклітаксел (gastric-style).
ukrainian_review_status: pending_clinical_signoff
