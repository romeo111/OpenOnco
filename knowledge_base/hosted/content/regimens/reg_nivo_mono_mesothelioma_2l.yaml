last_reviewed: "2026-05-07"
reviewers: []
reviewer_signoffs: []
notes: >
  CONFIRM trial (Fennell 2021, Lancet Oncol): nivolumab 240 mg IV q2w vs placebo in
  relapsed MPM after ≥1 prior platinum-based regimen. Phase 3, double-blind RCT, n=332.
  OS: median 9.2 mo vs 6.6 mo (HR 0.72, 95% CI 0.55–0.94; p=0.018).
  PFS: HR 0.61 (95% CI 0.46–0.81; p=0.0003). ORR: 11% vs 2%.
  Benefit observed across epithelioid and non-epithelioid histological subtypes
  and regardless of PD-L1 expression (unselected population).
  Dose: CONFIRM used 240 mg flat dose q2w (not weight-based 3 mg/kg) — consistent
  with post-2018 flat-dose nivolumab standardisation. Up to 12 months (24 cycles).
  Monitoring: CBC, CMP, LFTs, TSH q2-4 weeks; CT chest/abdomen q8-12 weeks using
  modified RECIST for MPM (bidimensional pleural measurement — NOT standard RECIST 1.1).
  Hepatitis B/C serology required before first dose.

notes_ua: >
  Дослідження CONFIRM (Fennell 2021, Lancet Oncol): ніволумаб (nivolumab) 240 mg (3 mg/kg) в/в q2w проти плацебо при рецидивуючій злоякісній плевральній мезотеліомі (MPM) після
  ≥1 попереднього платиновмісного режиму. Фаза 3, подвійно-сліпе РКД, n=332.
  ЗВ: медіана 9,2 проти 6,6 міс. (ВР 0,72, 95% ДІ 0,55–0,94; p=0,018).
  ВБП: ВР 0,61 (95% ДІ 0,46–0,81; p=0,0003). ЗРВ: 11% проти 2%.
  Перевага спостерігається при епітеліоїдному і неепітеліоїдному гістологічних
  підтипах та незалежно від рівня PD-L1 (неселектована популяція). Доза:
  CONFIRM використовував фіксовану дозу 240 мг q2w (не 3 мг/кг за масою) —
  відповідає стандартизації фіксованих доз ніволумабу після 2018 р. До 12 місяців
  (24 цикли). Моніторинг: ЗАК, хімічна панель, ПФП, ТТГ кожні 2–4 тижні; КТ
  грудної клітки/черевної порожнини кожні 8–12 тижнів за модифікованим RECIST для
  MPM (двовимірне плевральне вимірювання — НЕ стандартний RECIST 1.1).
  Серологія на гепатити B/C потрібна до першої дози.
