last_reviewed: "2026-04-27"
reviewers: []
notes: >
  CLL11 (Goede 2014, NEJM): G-Clb vs R-Clb vs Clb monotherapy in
  previously-untreated CLL with comorbidities (CIRS >6 OR CrCl 30-69)
  — mPFS 26.7 vs 15.2 vs 11.1 mo, with G-Clb also showing OS benefit
  vs Clb alone. Established obinutuzumab as the preferred anti-CD20
  for elderly comorbid CLL. Now positioned behind venetoclax-
  obinutuzumab (CLL14, fixed-duration) and BTK-inhibitor monotherapy
  in fit comorbid patients, but G-Clb remains a reasonable
  fixed-duration option when targeted-agent access or tolerability
  is limited. HBV screening + TLS prophylaxis are mandatory.
  Monitor closely cycle 1 for IRR (highest first dose).
notes_ua: >
  CLL11 (Goede 2014, NEJM): G-Clb vs R-Clb vs Clb-моно в раніше
  нелікованих CLL з коморбідностями (CIRS >6 АБО CrCl 30-69) —
  mPFS 26.7 vs 15.2 vs 11.1 міс, G-Clb також демонструє OS-користь
  vs Clb-моно. Встановив обінутузумаб як переважний анти-CD20 для
  літніх коморбідних CLL. Зараз позиціюється після venetoclax-
  obinutuzumab (CLL14, фіксованої тривалості) і BTKi-монотерапії
  у придатних, але G-Clb залишається розумною fixed-duration опцією
  при обмеженому доступі або переносимості таргетних агентів.
  HBV-скринінг + TLS-профілактика обов'язкові.
