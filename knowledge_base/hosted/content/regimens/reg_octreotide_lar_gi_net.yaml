last_reviewed: "2026-05-04"
reviewer_signoffs: []
notes: >
  PROMID (Rinke JCO 2009; Phase 3 RCT; n=85): octreotide LAR 30 mg q4w
  vs placebo in metastatic midgut well-differentiated NET.
  Time to tumour progression: 14.3 vs 6.0 months (HR 0.34; p=0.000072).
  Tumour stabilisation rate at 6 months: 67% vs 37%.
  Both octreotide LAR and lanreotide Autogel are NCCN Category 1 for
  GI-NET G1/G2. Octreotide LAR studied predominantly in midgut NET (PROMID);
  lanreotide in broader GEP-NET including pNET and hindgut (CLARINET).
  No head-to-head RCT — choice based on availability, patient/centre preference.
  IMPORTANT distinction: octreotide LAR is IM (deep gluteal); lanreotide
  Autogel is SC (self-injectable). IM requires clinic/nurse administration.
  STUB pending §6.1 signoff.
ukrainian_review_status: pending_clinical_signoff
