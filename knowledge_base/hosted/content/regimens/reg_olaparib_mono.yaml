id: REG-OLAPARIB-MONO
name: "Olaparib monotherapy (mCRPC, HRR-mutant)"
name_ua: "Олапариб монотерапія (мКРРПЗ, HRR-мутант)"
alternate_names: ["PROfound regimen"]

components:
  - drug_id: DRUG-OLAPARIB
    dose: "300 mg PO BID continuous"
    schedule: "Until progression or unacceptable toxicity"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression"
toxicity_profile: moderate

premedication: []
mandatory_supportive_care:
  - SUP-BONE-HEALTH-PROSTATE
monitoring_schedule_id:

dose_adjustments:
  - condition: "CrCl 31-50 mL/min"
    modification: "Reduce to 200 mg PO BID"
  - condition: "CrCl <30 mL/min"
    modification: "Avoid"
  - condition: "Anemia ≥G2"
    modification: "Hold; reduce to 250 mg → 200 mg BID stepwise"
  - condition: "New respiratory symptoms"
    modification: "Hold; rule out pneumonitis"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Registered for ovarian/breast indications; prostate reimbursement under negotiation. Out-of-pocket for prostate use until formulary update."

sources: [SRC-NCCN-PROSTATE-2025, SRC-ESMO-PROSTATE-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Olaparib mono for HRR-mutated mCRPC (PROfound). Same PARPi pattern.
# STUB pending §6.1.
between_visit_watchpoints:
  - trigger_ua: "Помірна втома, нудота"
    action_ua: "Часто проходить за 2-3 місяці"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-PROSTATE-2025
  - trigger_ua: "Виражена втома, задишка"
    action_ua: "Подзвоніть у клініку того ж дня — олапариб може спричиняти анемію"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-PROSTATE-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Лихоманка вище 38°C"
    action_ua: "Подзвоніть у клініку того ж дня — нейтропенія"
    urgency: call_clinic_same_day
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Незвичні синці, кровотеча"
    action_ua: "Подзвоніть у клініку того ж дня — тромбоцитопенія"
    urgency: call_clinic_same_day
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Раптова задишка, новий сухий кашель"
    action_ua: "Звертайтесь у лікарню негайно — рідко може спричиняти пневмоніт"
    urgency: er_now
    sources:
      - SRC-NCCN-PROSTATE-2025

last_reviewed:
notes: >
  PROfound: olaparib superior to enzalutamide / abiraterone in HRR-mutant
  mCRPC post-ARPI. BRCA1/2 cohort largest benefit. Requires germline +/-
  somatic HRR testing pre-start.
notes_ua: >
  PROfound: олапариб перевершує ензалутамід / абіратерон in HRR-mutant mCRPC post-ARPI. BRCA1/2 cohort largest виграш. Requires герміногенний +/- соматичний HRR testing pre-start.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
