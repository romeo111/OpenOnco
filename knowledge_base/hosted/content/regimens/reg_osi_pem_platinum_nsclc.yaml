id: REG-OSI-PEM-PLATINUM-NSCLC
name: "Osimertinib + pemetrexed + carboplatin/cisplatin (FLAURA-2 regimen, EGFR-mut NSCLC, 1L)"
name_ua: "Осимертиніб + пеметрексед + карбоплатин/цисплатин (схема FLAURA-2, EGFR-мут НДРЛ, 1L)"
alternate_names: ["FLAURA2 regimen", "Osimertinib + platinum-pemetrexed"]

components:
  - drug_id: DRUG-OSIMERTINIB
    dose: "80 mg PO once daily"
    schedule: "Continuous from day 1 of cycle 1 until progression"
    route: PO
  - drug_id: DRUG-PEMETREXED
    dose: "500 mg/m² IV"
    schedule: "Day 1 q3 weeks; cycles 1-4 with platinum, then maintenance with osimertinib until progression"
    route: IV
  - drug_id: DRUG-CARBOPLATIN
    dose: "AUC 5 IV"
    schedule: "Day 1 q3 weeks; cycles 1-4 only"
    route: IV
  - drug_id: DRUG-CISPLATIN
    dose: "75 mg/m² IV"
    schedule: "Day 1 q3 weeks; cycles 1-4 only (alternative to carboplatin)"
    route: IV

cycle_length_days: 21
total_cycles: "4 cycles induction (osi + pem + platinum); then osi + pemetrexed maintenance q3 weeks until progression"
toxicity_profile: moderate-severe

premedication:
  - "Folic acid 400-1000 mcg PO daily starting 7 days before pemetrexed; continue throughout"
  - "Vitamin B12 1000 mcg IM starting 1 week before pemetrexed; q9 weeks thereafter"
  - "Dexamethasone 4 mg PO BID days -1, 0, +1 around pemetrexed (rash prophylaxis)"
  - "Standard antiemetic prophylaxis for platinum-containing regimen (5-HT3 + dexamethasone + NK1 antagonist for cisplatin)"
  - "IV hydration pre/post cisplatin (if cisplatin selected) to mitigate nephrotoxicity"
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "QTc >500 ms"
    modification: "Hold osimertinib; resume at 40 mg when normalized"
  - condition: "Pneumonitis any grade (osimertinib boxed warning)"
    modification: "Hold osimertinib; corticosteroids; permanent discontinuation if Grade ≥3 / recurrent"
  - condition: "Renal impairment CrCl <45 mL/min"
    modification: "Avoid pemetrexed; consider osimertinib monotherapy continuation"
  - condition: "Cisplatin nephrotoxicity (rising creatinine)"
    modification: "Switch cisplatin → carboplatin AUC 5"
  - condition: "Grade ≥3 cytopenias"
    modification: "Delay platinum/pemetrexed; consider G-CSF; dose-reduce platinum next cycle"
  - condition: "LVEF decline on osimertinib"
    modification: "Cardiology consult; hold and reassess"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Osimertinib registered; reimbursement under negotiation (out-of-pocket for most patients). Pemetrexed + carboplatin/cisplatin chemo backbone widely available and partially reimbursed. Combination cost remains a major access barrier."

sources: [SRC-FLAURA-2-PLANCHARD-2023, SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# FLAURA-2 combines osimertinib (rash, diarrhea, ILD, QTc) with
# pemetrexed (mucositis, fatigue, myelosuppression) + platinum
# (nausea, cytopenias, neuropathy/nephrotoxicity for cisplatin).
# Additive toxicity vs osi mono. STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Помірна втома, зниження апетиту після інфузії"
    action_ua: "Очікувано — відпочивайте більше у дні 1-3 після платини+пеметрекседу; занотовуйте інтенсивність"
    urgency: log_at_next_visit
    cycle_day_window: "Day 1-3"
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Легкий висип на обличчі або тілі (поширений у перші місяці на осимертинібі)"
    action_ua: "Зазвичай легкий — використовуйте зволожувач і м'яке очищення; занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Помірна діарея (1-3 епізоди на день)"
    action_ua: "Зазвичай контролюється лоперамідом — занотовуйте частоту, обговоріть на наступному візиті"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-NSCLC-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Легкий мукозит порожнини рота, болючість при їжі"
    action_ua: "Поширене на пеметрексед — чистіть зуби м'якою щіткою; полоскання водою з содою; B12 + фолат за призначенням"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Лихоманка вище 38°C — особливо на 7-14 день циклу"
    action_ua: "Подзвоніть у клініку того ж дня — карбоплатин/цисплатин дають нейтропенію"
    urgency: call_clinic_same_day
    cycle_day_window: "Day 7-14"
    sources:
      - SRC-NCCN-NSCLC-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Тяжка діарея (≥6 разів на день, з кров'ю або сильним болем у животі)"
    action_ua: "Подзвоніть у клініку того ж дня — потрібна корекція; ризик зневоднення"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-NSCLC-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Виражений висип, особливо з пухирями або злущуванням"
    action_ua: "Подзвоніть у клініку того ж дня — рідко потрібна корекція дози осимертинібу"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-NSCLC-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Зниження сечовиділення, набряки ніг (особливо після цисплатину)"
    action_ua: "Подзвоніть у клініку того ж дня — можлива нефротоксичність цисплатину"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Нова задишка при невеликому навантаженні, новий сухий кашель"
    action_ua: "Звертайтесь у лікарню негайно — це може бути ушкодження легень (інтерстиціальна хвороба легень) на тлі осимертинібу або пеметрекседу"
    urgency: er_now
    sources:
      - SRC-NCCN-NSCLC-2025
      - SRC-ESMO-NSCLC-METASTATIC-2024
      - SRC-FLAURA-2-PLANCHARD-2023
  - trigger_ua: "Раптова втрата свідомості, серцебиття ненормально швидке або повільне"
    action_ua: "Звертайтесь у лікарню негайно — осимертиніб може подовжувати інтервал QT"
    urgency: er_now
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Сильна задишка у спокої, синюшність губ, висока лихоманка з ознобом"
    action_ua: "Звертайтесь у лікарню негайно — можливий тяжкий пневмоніт або фебрильна нейтропенія"
    urgency: er_now
    sources:
      - SRC-NCCN-NSCLC-2025

last_reviewed:
notes: >
  FLAURA-2 (Planchard NEJM 2023, NCT04035486): osimertinib 80 mg PO
  daily + pemetrexed 500 mg/m² IV q3w + carboplatin AUC 5 OR cisplatin
  75 mg/m² IV q3w × 4 cycles, then osi + pemetrexed maintenance until
  progression. Median PFS by investigator 25.5 vs 16.7 mo (HR 0.62;
  p<0.001) vs osi monotherapy; BICR PFS 29.4 vs 19.9 mo. CNS PFS HR
  0.40 in patients with baseline CNS metastases. Higher Grade ≥3 AE
  rate (64% vs 27%) — additive cytopenia, mucositis, fatigue. Reserve
  for high-burden disease (CNS mets, L858R, large tumor volume) where
  PFS extension justifies added toxicity. FDA approval Feb 2024; NCCN
  cat 1 alternative-preferred 1L.
notes_ua: >
  FLAURA-2 (Planchard NEJM 2023): осимертиніб 80 мг PO щодня +
  пеметрексед 500 мг/м² IV q3w + карбоплатин AUC 5 АБО цисплатин
  75 мг/м² IV q3w × 4 цикли, потім осі + пеметрексед підтримуюча
  терапія до прогресії. Медіана PFS дослідниками 25.5 vs 16.7 міс
  (HR 0.62; p<0.001). Резервувати для high-burden disease (CNS-метс,
  L858R) де приріст PFS виправдовує додаткову токсичність.
ukrainian_review_status: pending_clinical_signoff
