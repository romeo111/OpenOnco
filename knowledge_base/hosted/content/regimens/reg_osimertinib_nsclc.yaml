id: REG-OSIMERTINIB-NSCLC
name: "Osimertinib monotherapy (EGFR-mut NSCLC, 1L metastatic OR adjuvant)"
name_ua: "Осимертиніб моно (EGFR-мут НДРЛ, 1L метастатичний АБО ад'ювант)"
alternate_names: ["FLAURA regimen", "ADAURA regimen"]

components:
  - drug_id: DRUG-OSIMERTINIB
    dose: "80 mg PO once daily"
    schedule: "Continuous"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression (metastatic) OR 3 years (ADAURA adjuvant)"
toxicity_profile: low-moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "QTc >500 ms"
    modification: "Hold; resume at 40 mg when normalized"
  - condition: "Pneumonitis any grade"
    modification: "Hold; corticosteroids; permanent discontinuation if severe / recurrent"
  - condition: "LVEF decline"
    modification: "Cardiology consult"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Registered; reimbursement under negotiation. Out-of-pocket for most patients in Ukraine — major access barrier for EGFR-mut metastatic + adjuvant indications."

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Osimertinib daily oral pill, taken long-term in EGFR+ NSCLC.
# Generally well-tolerated; key axes: rash, diarrhea, rare ILD
# (interstitial lung disease — boxed warning), QT prolongation,
# cardiac function decline. STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Легкий висип на обличчі або тілі (поширений у перші місяці)"
    action_ua: "Зазвичай легкий — використовуйте зволожувач і м'яке очищення; занотовуйте інтенсивність"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Помірна діарея (1-3 епізоди на день)"
    action_ua: "Зазвичай контролюється лоперамідом — занотовуйте частоту, обговоріть на наступному візиті"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-NSCLC-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Сухість шкіри, нігтів, тріщини на пальцях"
    action_ua: "Очікувані зміни — використовуйте зволожувач для шкіри і нігтів; занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Виражений висип, особливо з пухирями або злущуванням"
    action_ua: "Подзвоніть у клініку того ж дня — рідко потрібна корекція дози"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-NSCLC-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Тяжка діарея (≥6 разів на день, з кров'ю або сильним болем у животі)"
    action_ua: "Подзвоніть у клініку того ж дня — потрібна корекція; ризик зневоднення"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-NSCLC-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Нова задишка при невеликому навантаженні, новий сухий кашель"
    action_ua: "Звертайтесь у лікарню негайно — це може бути ушкодження легень (інтерстиціальна хвороба легень) на тлі осимертинібу"
    urgency: er_now
    sources:
      - SRC-NCCN-NSCLC-2025
      - SRC-ESMO-NSCLC-METASTATIC-2024
  - trigger_ua: "Раптова втрата свідомості, серцебиття ненормально швидке або повільне"
    action_ua: "Звертайтесь у лікарню негайно — осимертиніб може подовжувати інтервал QT"
    urgency: er_now
    sources:
      - SRC-NCCN-NSCLC-2025

last_reviewed:
notes: >
  FLAURA: superior PFS/OS vs 1G TKIs in 1L EGFR-mut metastatic.
  FLAURA2: osi + chemo extends PFS further. ADAURA: 3-year adjuvant
  in stage IB-IIIA EGFR-mut resected — 80% reduction in recurrence.
notes_ua: >
  FLAURA: перевершує PFS/OS vs 1G TKIs in 1L EGFR-mut метастатичний. FLAURA2: osi + chemo extends PFS further. ADAURA: 3-year ад'ювантний in stage IB-IIIA EGFR-mut resected — 80% зниження in рецидив.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
