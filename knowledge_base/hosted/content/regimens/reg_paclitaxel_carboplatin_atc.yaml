notes_ua: >
  Паклітаксел (paclitaxel) 175 мг/м² + карбоплатин (carboplatin) AUC 5
  в/в кожні 3 тижні при анапластичному раку щитоподібної залози (ATC),
  паліативна 1L терапія. ATC має дуже агресивний перебіг; хімія застосовується
  у fit пацієнтів для паліації. Для BRAF V600E-мутованого ATC перевагу має
  поєднання дабрафеніб + траметиніб (ROAR). Преміка паклітакселу обов'язкова
  (гіперчутливість). Шаблон STUB.
