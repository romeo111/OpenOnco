notes_ua: >
  Паклітаксел (paclitaxel) 175 мг/м² + карбоплатин (carboplatin) AUC 5
  в/в кожні 3 тижні × 6 циклів при паліативній терапії карциноми слинних
  залоз. Загальний рівень відповіді ~30-40% при муко-епідермоїдному /
  аденокарциномному підтипах; нижча активність при аденоїдно-кістозній
  карциномі. Преміка паклітакселу обов'язкова. Шаблон STUB.
