id: REG-PAZOPANIB-RCC
name: "Pazopanib (RCC)"
name_ua: "Пазопаніб (НКК)"
alternate_names: ["Votrient", "GW786034"]
components:
- drug_id: DRUG-PAZOPANIB
  dose: "800 mg PO daily"
  schedule: "Continuous daily dosing; take without food (≥1h before or 2h after meal)"
  route: PO
cycle_length_days: 28
total_cycles: "Until progression or unacceptable toxicity"
toxicity_profile: moderate
premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:
dose_adjustments:
- condition: "ALT > 3× ULN"
  modification: "Hold; recheck weekly. Resume at 400 mg if ALT returns to ≤ grade 1"
- condition: "ALT > 8× ULN or hepatotoxicity with bilirubin"
  modification: "Permanently discontinue"
- condition: "Grade 3-4 non-hematologic AE"
  modification: "Reduce to 400 mg → 200 mg as needed"
ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Registered in Ukraine. Reimbursement limited."
sources:
- SRC-NCCN-KIDNEY-2025
- SRC-ESMO-RCC-2024

