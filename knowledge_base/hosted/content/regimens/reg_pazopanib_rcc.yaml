last_reviewed: "2026-05-03"
notes: >
  Pazopanib 800mg continuous is non-inferior to sunitinib (COMPARZ 2013) with
  different toxicity profile: less fatigue and hand-foot syndrome vs sunitinib
  but more hepatotoxicity. Remains acceptable NCCN alternative for patients where
  ICI combination is contraindicated. Fasting intake required — food significantly
  increases exposure (risk of toxicity if taken with food).
notes_ua: "Пазопаніб 800 мг щоденно. Не гірший за сунітиніб. Приймати натще."
