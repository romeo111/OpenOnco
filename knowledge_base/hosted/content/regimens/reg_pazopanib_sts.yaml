id: REG-PAZOPANIB-STS
disease_context: DIS-SOFT-TISSUE-SARCOMA
line_of_therapy: 2
plan_track: standard

regimen_type: "targeted_therapy_oral"

agents:
  - drug_id: DRG-PAZOPANIB
    dose: "800 mg PO daily (continuous)"
    route: PO
    schedule: "Once daily, at the same time each day"
    administration_notes: "Take on empty stomach (1 hour before or 2 hours after food). Do NOT crush or dissolve tablets."
    dose_modifications:
      - trigger: "Grade ≥3 hepatotoxicity (AST/ALT >5 × ULN)"
        action: "Hold pazopanib; resume at 400 mg QD if resolved to Grade ≤1; permanently discontinue if no improvement"
      - trigger: "Grade 3 HTN (SBP >160 or DBP >100 mmHg, symptomatic)"
        action: "Add/optimize antihypertensive; reduce pazopanib to 600 mg QD if refractory"
      - trigger: "Grade ≥3 proteinuria (>3.5 g/24h)"
        action: "Hold until <3 g/24h; resume at 600 mg QD"
      - trigger: "Grade 3 diarrhea"
        action: "Reduce to 600 mg QD; anti-diarrheal management (loperamide)"
      - trigger: "Any Grade 4 non-hematologic toxicity"
        action: "Permanently discontinue"
    dose_reduction_levels:
      - "800 mg → 600 mg → 400 mg (minimum; further dose reduction not recommended)"

when_to_use: >
  2L+ metastatic or unresectable non-adipocytic STS (leiomyosarcoma, synovial sarcoma,
  angiosarcoma, fibrosarcoma, MFH/UPS, MPNST, etc.) after anthracycline-based chemotherapy.
  PALETTE (van der Graaf 2012): PFS HR 0.35 (4.6 vs 1.6 months); OS not significant (HR 0.86).
  NCCN Category 1 for 2L+ non-adipocytic STS.
  NOT for liposarcoma (excluded from PALETTE). NOT for GIST (different TKI landscape).

contraindications_relative:
  - "Liposarcoma (adipocytic STS) — excluded from PALETTE; limited efficacy evidence"
  - "GIST — imatinib/sunitinib/regorafenib are standard"
  - "Uncontrolled hypertension"
  - "Recent (within 6 months) arterial thrombosis, MI, stroke"
  - "Hepatic impairment (Child-Pugh B/C) — pazopanib hepatically metabolized"

monitoring:
  - "LFT (AST, ALT, bilirubin): baseline, weeks 3, 5, 7, then monthly × 4 months, then q3 months — hepatotoxicity is most serious AE"
  - "BP: baseline + weekly × 4, then monthly — HTN common (40-45%)"
  - "Urinalysis (proteinuria): baseline + q3 cycles (dipstick; if 2+: 24h urine protein)"
  - "Thyroid function (TSH): baseline + q3 months — hypothyroidism (TKI class effect)"
  - "CBC: baseline + as clinically indicated (less hematologic toxicity than chemo)"
  - "CT CAP: q9-12 weeks (RECIST 1.1 response assessment)"
  - "ECG: baseline (QTc prolongation risk)"

drug_interactions:
  - "CYP3A4 inhibitors (azole antifungals, ritonavir): significantly increase pazopanib exposure — reduce dose or avoid"
  - "CYP3A4 inducers (rifampicin, phenytoin, carbamazepine): reduce pazopanib levels — increase dose or avoid"
  - "Simvastatin: increased risk of hepatotoxicity and rhabdomyolysis — avoid; switch to rosuvastatin"
  - "Warfarin: INR monitoring required; consider LMWH instead"
  - "PPIs (omeprazole, pantoprazole): significantly reduce pazopanib absorption — use H2 blockers or antacids (separated timing)"

cycle_length_days: 28
total_planned_cycles: "Continue until progression or unacceptable toxicity"

watchpoints_ua:
  - "КРИТИЧНО: Гепатотоксичність — моніторинг АЛТ/АСТ/білірубіну обов'язковий (тижні 3, 5, 7, потім щомісяця × 4, потім кожні 3 місяці); Grade ≥3 = відміна + перерахунок"
  - "КРИТИЧНО: НЕ призначати при ліпосаркомі — PALETTE виключив адипоцитарні пухлини; обмежені докази ефективності"
  - "КРИТИЧНО: НЕ призначати при GIST — є специфічні TKI (іматиніб/сунітиніб)"
  - "УВАГА: Гіпертензія (40-45%) — щотижнева перевірка АТ × 4 тижні, потім щомісяця; при Grade 3 — антигіпертензивна + зниження дози до 600 мг"
  - "УВАГА: НЕ приймати з їжею — за 1 год до або через 2 год після їжі; НЕ подрібнювати таблетки"
  - "УВАГА: Інгібітори протонної помпи (омепразол) значно знижують всмоктування пазопанібу — перейти на H2-блокатори або антациди з інтервалом часу"
  - "УВАГА: Симвастатин + пазопаніб — ризик гепатотоксичності та рабдоміолізу; перейти на розувастатин"
  - "УВАГА: При прогресуванні після пазопанібу — клінічне випробування; трабектедин (при ліпосаркомі або LMS якщо недоступний раніше)"

