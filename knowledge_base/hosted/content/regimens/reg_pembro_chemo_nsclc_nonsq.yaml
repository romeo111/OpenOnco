id: REG-PEMBRO-CHEMO-NSCLC-NONSQ
name: "Pembrolizumab + carboplatin + pemetrexed (NSCLC non-squamous, 1L)"
name_ua: "Пембролізумаб + карбоплатин + пеметрексед (НДРЛ non-sq, 1L)"
alternate_names: ["KEYNOTE-189 regimen"]

components:
  - drug_id: DRUG-PEMBROLIZUMAB
    dose: "200 mg IV q3 weeks"
    schedule: "Continuous up to 2 years"
    route: IV
  - drug_id: DRUG-CARBOPLATIN
    dose: "AUC 5 IV"
    schedule: "Cycles 1-4"
    route: IV
  - drug_id: DRUG-PEMETREXED
    dose: "500 mg/m² IV"
    schedule: "Cycles 1-4 + maintenance until progression"
    route: IV

cycle_length_days: 21
total_cycles: "4 cycles induction; then pembro + pemetrexed maintenance until progression OR 2 years total pembro"
toxicity_profile: moderate-severe

premedication:
  - "Folic acid 400-1000 mcg PO daily + Vit B12 1000 mcg IM q9 weeks (pemetrexed)"
  - "Dexamethasone 4 mg PO BID days 0, 1, 2 (rash prophylaxis)"
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Renal impairment (CrCl <45)"
    modification: "Avoid pemetrexed"
  - condition: "Immune-mediated AE"
    modification: "Hold pembro; corticosteroids"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Pembrolizumab reimbursement variable; chemo backbone reimbursed. Out-of-pocket for combination."

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Pembro + carbo + pemetrexed for non-squamous NSCLC 1L (KEYNOTE-189).
# Combines IO irAEs with carbo cytopenia + pemetrexed mucositis +
# rare pneumonitis (additive). STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Помірна втома після кожного циклу"
    action_ua: "Очікувано — відпочивайте більше у дні 1-3"
    urgency: log_at_next_visit
    cycle_day_window: "Day 1-3"
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Зниження апетиту, легкий мукозит порожнини рота"
    action_ua: "Поширене на пеметрексед — чистіть зуби м'якою щіткою; полоскання водою з содою; B12 + фолат за призначенням"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Шкірний свербіж або сухість шкіри"
    action_ua: "Зустрічається на тлі пембролізумабу — використовуйте зволожувач"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Лихоманка вище 38°C — особливо на 7-14 день циклу"
    action_ua: "Подзвоніть у клініку того ж дня — карбоплатин дає нейтропенію"
    urgency: call_clinic_same_day
    cycle_day_window: "Day 7-14"
    sources:
      - SRC-NCCN-NSCLC-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Помірна діарея (3-4 рази на день)"
    action_ua: "Подзвоніть у клініку того ж дня — можливий імунний коліт"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Нова задишка, сухий кашель"
    action_ua: "Подзвоніть у клініку того ж дня — імунний пневмоніт або прогресування потребують термінової оцінки"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Жовтяниця, біль у правому верхньому квадранті живота"
    action_ua: "Подзвоніть у клініку того ж дня — можливий імунний гепатит"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Сильна задишка у спокої, синюшність губ"
    action_ua: "Звертайтесь у лікарню негайно — тяжкий імунний пневмоніт"
    urgency: er_now
    sources:
      - SRC-NCCN-NSCLC-2025

last_reviewed:
notes: >
  KEYNOTE-189: superior OS in non-sq NSCLC 1L driver-negative
  regardless of PD-L1 status.

  NOTE: DRUG-PEMETREXED not yet in KB — placeholder reference; if
  pemetrexed YAML missing this regimen will surface ref-error. Will be
  created in cross-disease drug pass.
notes_ua: >
  KEYNOTE-189: перевершує OS in non-sq NSCLC 1L driver-negative regardless of PD-L1 status.

  NOTE: DRUG-PEMETREXED not yet in KB — placeholder reference; if pemetrexed YAML missing this схема will surface ref-error. Will be created in cross-хвороба drug pass.
ukrainian_review_status: pending_clinical_signoff
