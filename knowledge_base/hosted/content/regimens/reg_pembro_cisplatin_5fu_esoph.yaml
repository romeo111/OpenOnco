notes_ua: >
  Пембролізумаб (pembrolizumab) 200 мг + цисплатин 80 мг/м² + 5-ФУ
  (fluorouracil) 800 мг/м²/добу × 5 днів q3w при ESCC/EAC 1L.
  KEYNOTE-590 (EAC+ESCC): мЗВ 12,4 vs 9,8 міс. (ВР 0,73) загальна популяція;
  ESCC PD-L1 CPS ≥10: ВР 0,57. Схвалення FDA березень 2021. Тонкий
  alias-шаблон; деталі схеми — у повному регіменті стравоходу.
