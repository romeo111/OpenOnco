id: REG-PEMBRO-CISPLATIN-5FU-ESOPH
name: "Pembrolizumab + cisplatin + fluorouracil"
components:
  - drug_id: DRUG-PEMBROLIZUMAB
  - drug_id: DRUG-CISPLATIN
  - drug_id: DRUG-5-FLUOROURACIL
cycle_length_days: 21
total_cycles: "Until progression or unacceptable toxicity; chemotherapy duration per protocol"
sources:
  - SRC-NCCN-ESOPHAGEAL-2025
  - SRC-ESMO-ESOPHAGEAL-2024
last_reviewed: "2026-05-07"
notes: >
  Thin regimen alias added to resolve existing esophageal pembro-chemo
