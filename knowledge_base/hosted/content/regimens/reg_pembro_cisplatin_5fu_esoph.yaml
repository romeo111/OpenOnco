id: REG-PEMBRO-CISPLATIN-5FU-ESOPH
name: "Pembrolizumab + cisplatin + 5-FU for esophageal carcinoma 1L"
name_ua: "Пембролізумаб + цисплатин + 5-ФУ при раку стравоходу 1L"
alternate_names: ["KEYNOTE-590 regimen", "pembrolizumab + platinum-5FU esophageal"]

components:
  - drug_id: DRUG-PEMBROLIZUMAB
    dose: "200 mg"
    schedule: "IV Q21D (day 1)"
    route: IV
    notes: "Flat dose; infuse over 30 minutes"
  - drug_id: DRUG-CISPLATIN
    dose: "80 mg/m²"
    schedule: "IV day 1 Q21D"
    route: IV
    notes: "Hydration protocol mandatory (1-2 L NS before; 2-4 L NS after)"
  - drug_id: DRUG-FLUOROURACIL
    dose: "800 mg/m²/day"
    schedule: "CI IV days 1-5 Q21D"
    route: IV
    notes: "Continuous infusion via central line × 5 days"

cycle_length_days: 21
number_of_cycles: "6 cycles of combination; then pembrolizumab 400 mg Q6W or 200 mg Q3W maintenance until progression (≤35 cycles)"

premedications:
  - "Antiemetics: 5-HT3 + dexamethasone + NK-1 inhibitor (cisplatin emetogenicity)"
  - "IV hydration: 2 L NS ± KCl/MgSO4 pre/post cisplatin"

supportive_care:
  - "G-CSF: secondary prophylaxis if Grade 3-4 neutropenia"
  - "TSH: Q3 months on pembrolizumab"
  - "CBC + CMP + LFT: before each cycle"

sources:
  - SRC-NCCN-ESOPHAGEAL-2025
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  Based on KEYNOTE-590 (Sun 2021 NEJM; N=749): pembrolizumab + chemotherapy vs
  chemotherapy alone in advanced esophageal/EGJ carcinoma 1L.
  mOS 12.4 vs 9.8 months (all-comers; HR 0.73; p<0.001).
  FDA approval March 2021 for ESCC (CPS ≥10) and HER2-negative EGJ adenocarcinoma.
  NCCN Cat 1 for ESCC 1L and EGJ adenocarcinoma 1L.
