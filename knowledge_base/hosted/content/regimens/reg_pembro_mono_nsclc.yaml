id: REG-PEMBRO-MONO-NSCLC
name: "Pembrolizumab monotherapy (NSCLC PD-L1 ≥50%, driver-negative, 1L)"
name_ua: "Пембролізумаб моно (НДРЛ PD-L1 ≥50%, driver-negative, 1L)"
alternate_names: ["KEYNOTE-024 regimen"]

components:
  - drug_id: DRUG-PEMBROLIZUMAB
    dose: "200 mg IV q3 weeks (or 400 mg q6 weeks)"
    schedule: "Continuous until progression OR 2 years"
    route: IV

cycle_length_days: 21
total_cycles: "Up to 2 years (35 cycles q3w) — KEYNOTE-024 protocol"
toxicity_profile: moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Immune-mediated AE G≥2"
    modification: "Hold; corticosteroids; discontinue if recurrent G3+"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Registered; reimbursement varies by indication. Out-of-pocket for many."

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Pembrolizumab monotherapy for NSCLC PD-L1 ≥50% (KEYNOTE-024).
# Same irAE pattern as pembro-mono MSI-H mCRC. STUB pending §6.1.
between_visit_watchpoints:
  - trigger_ua: "Помірна втома після інфузій"
    action_ua: "Очікувано — відпочивайте більше у дні 1-3"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Шкірний свербіж або сухість шкіри"
    action_ua: "Часто і зазвичай легко — використовуйте зволожувач"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Помірна діарея (3-4 рази на день)"
    action_ua: "Подзвоніть у клініку того ж дня — можливий імунний коліт"
    urgency: call_clinic_same_day
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Нова задишка, сухий кашель"
    action_ua: "Подзвоніть у клініку того ж дня — можливий імунний пневмоніт; на тлі легеневої пухлини потрібна термінова оцінка"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Жовтяниця, біль у правому верхньому квадранті живота"
    action_ua: "Подзвоніть у клініку того ж дня — можливий імунний гепатит"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Виражена слабкість, постійна спрага, втрата ваги"
    action_ua: "Подзвоніть у клініку того ж дня — можлива імунна реакція щитоподібної залози або новий діабет"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Тяжка діарея (≥7 разів на день, з кров'ю)"
    action_ua: "Звертайтесь у лікарню негайно — тяжкий імунний коліт"
    urgency: er_now
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Сильна задишка у спокої, синюшність губ"
    action_ua: "Звертайтесь у лікарню негайно — тяжкий імунний пневмоніт"
    urgency: er_now
    sources:
      - SRC-NCCN-NSCLC-2025

last_reviewed:
notes: >
  KEYNOTE-024: pembro mono superior to platinum-doublet chemo in
  PD-L1≥50% driver-negative metastatic NSCLC (5-year OS ~32% vs 16%).
notes_ua: >
  KEYNOTE-024: pembro mono перевершує platinum-дублет chemo in PD-L1≥50% driver-negative метастатичний NSCLC (5-річна ЗВ ~32% проти 16%).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
