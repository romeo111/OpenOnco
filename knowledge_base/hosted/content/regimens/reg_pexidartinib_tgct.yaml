id: REG-PEXIDARTINIB-TGCT
disease_context: DIS-TGCT
line_of_therapy: 1
plan_track: standard

regimen_type: "targeted_therapy_oral"

agents:
  - drug_id: DRUG-PEXIDARTINIB
    dose: "400 mg PO BID (800 mg/day total)"
    route: PO
    schedule: "Twice daily continuously WITH FOOD — do not take fasted"
    administration_notes: >
      Must be taken with a complete meal (high-calorie intake significantly increases
      absorption; AUC +119% with high-fat meal vs fasted state).
      Do not open or crush capsules. Swallow whole.
      REMS enrollment for prescriber, dispensing pharmacy, and patient is MANDATORY
      before first dispensing. Contact Daiichi Sankyo TURALIO REMS at 1-833-887-2546.
    dose_modifications:
      - trigger: "AST or ALT 1-3× ULN (Grade 1-2 elevation)"
        action: "Continue at same dose; increase LFT monitoring frequency to weekly until resolved to baseline"
      - trigger: "AST or ALT 3-5× ULN (Grade 2-3) without cholestatic features"
        action: "Hold pexidartinib; recheck LFTs within 1 week; if resolution to ≤1× ULN within 4 weeks, may resume at 800 mg/day (400 mg BID); if not resolved, discontinue"
      - trigger: "AST or ALT >5× ULN OR any cholestatic elevation (ALP >2× ULN + total bilirubin >ULN)"
        action: "DISCONTINUE PERMANENTLY — do NOT rechallenge. Immediately refer to hepatology. Report to REMS."
      - trigger: "Grade 3 peripheral edema"
        action: "Reduce to 600 mg/day (300 mg BID); diuretic management per clinical judgment"
      - trigger: "Grade ≥3 other non-hepatic toxicity"
        action: "Hold until resolution to Grade ≤1; resume at 600 mg/day (300 mg BID)"
    dose_reduction_levels:
      - "800 mg/day (400 mg BID) — standard full dose"
      - "600 mg/day (300 mg BID) — first reduction (non-hepatic toxicity)"
      - "400 mg/day (200 mg BID) — second reduction (rare; clinical trial data limited)"
      - "Discontinue if unable to tolerate 400 mg/day"

when_to_use: >
  Symptomatic TGCT (tenosynovial giant cell tumor; diffuse or localized type) in adults
  where surgery would not adequately control disease, where surgical morbidity is high
  (e.g., knee requiring amputation or major functional loss), or in patients with
  recurrent/progressive TGCT after prior surgery.
  ILLUMINATE Phase III (Tap 2019 Lancet): ORR 38% (RECIST 1.1) and 56% (TTP-MRI) vs 0%
  placebo; mDOR not reached at median 23 months follow-up. NCCN Category 1.
  No companion diagnostic required — all symptomatic unresectable/surgical-failure TGCT
  patients are eligible regardless of CSF1R/CSF1 molecular testing results.

contraindications_relative:
  - "Hepatic impairment (AST/ALT >1.5× ULN or total bilirubin >ULN at baseline) — absolute exclusion per ILLUMINATE"
  - "Concomitant strong CYP3A4 inhibitors — significantly increases pexidartinib exposure"
  - "Resectable TGCT where surgery would provide adequate disease control — surgery first"
  - "Localized TGCT (nodular type) of tendon sheath — surgery is curative in most; pexidartinib is for symptomatic disease not amenable to surgical improvement"

monitoring:
  - "LFTs (ALT, AST, ALP, total bilirubin): baseline; weekly × 8 weeks (REMS mandatory); then monthly × 2 months; then every 3 months thereafter"
  - "CBC: baseline and periodically (anemia, neutropenia less common than hepatotoxicity)"
  - "MRI (target lesion) every 12 weeks (RECIST 1.1 + TTP-MRI response assessment for TGCT)"
  - "Clinical assessment (joint range of motion, pain, functional status) every 8-12 weeks"
  - "REMS compliance documentation: monthly hepatic adverse event reporting as required"

sources:
  - SRC-ILLUMINATE-TAP-2019
  - SRC-NCCN-SARCOMA

last_reviewed: "2026-05-04"
reviewers: []
reviewer_signoffs: 0
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  STUB — pending Clinical Co-Lead sign-off. Authored 2026-05-04 (Workstream DH).
  HEPATOTOXICITY IS THE CRITICAL SAFETY ISSUE: REMS program, weekly LFT monitoring
  for 8 weeks mandatory. Cholestatic hepatitis was fatal in one patient in open-label
  extension — permanent discontinuation required for any cholestatic pattern.
  MRI (TTP-MRI) is the preferred response assessment in TGCT (better than RECIST 1.1
  for synovial-based disease); RECIST 1.1 underestimates response vs TTP-MRI.
