last_reviewed: "2026-04-25"
notes: >
  GO29365 randomized phase 1b/2 (Sehn 2020): in r/r DLBCL ineligible for
  autoSCT, Pola-BR vs BR alone showed CR 40% vs 18%, mPFS 9.5 vs 3.7 mo,
  mOS 12.4 vs 4.7 mo. Approved 2L+ for transplant-ineligible r/r DLBCL.
  Active CD20 + CD79b expression both required (post-CD19/CD20 CAR-T
  patients — verify CD20 retention by repeat IHC). Bendamustine
  myelosuppression cumulative — GCSF prophylaxis recommended.
notes_ua: >
  GO29365 randomized phase 1b/2 (Sehn 2020): in р/р DLBCL непридатний для аутоТГСК,
  Pola-BR vs BR alone showed CR 40% проти 18%, mPFS 9.5 проти 3.7 міс., міс. 12.4
  проти 4.7 mo. схвалений 2L+ for непридатний до трансплантації р/р DLBCL. Active
  CD20 + CD79b експресія both обов'язковий (post-CD19/CD20 CAR-T patients — verify
  CD20 retention by repeat IHC). бендамустин myelosuppression cumulative — GCSF prophylaxis
  рекомендований.
