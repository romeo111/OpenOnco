last_reviewed: '2026-04-27'
notes: Standard 2L for SMZL/NMZL after rituximab monotherapy failure. ORR ~85-90%; median PFS ~3-4 years. PJP prophylaxis ≥6 mo post-anti-CD20; HBV reactivation surveillance mandatory.
notes_ua: >-
  стандарт 2L for SMZL/NMZL after ритуксимаб монотерапія failure. ORR ~85-90%; медіана ВБП ~3-4 years. PJP prophylaxis ≥6 mo post-anti-CD20; HBV reactivation спостереження обов'язковий.
