id: REG-RELATLIMAB-NIVOLUMAB-MELANOMA
name: "Relatlimab + nivolumab (Opdualag, melanoma)"
name_ua: "Релатлімаб + ніволумаб (Opdualag, меланома)"
alternate_names: ["Opdualag", "RELATIVITY-047 regimen", "rela+nivo"]

components:
  - drug_id: DRUG-RELATLIMAB
    dose: "160 mg (fixed-dose co-formulation with nivolumab 480 mg)"
    schedule: "IV q4w, over 30 min"
    route: IV
  - drug_id: DRUG-NIVOLUMAB
    dose: "480 mg (fixed-dose co-formulation with relatlimab 160 mg)"
    schedule: "IV q4w, over 30 min"
    route: IV

cycle_length_days: 28
total_cycles: "Until progression or unacceptable toxicity (typical 24 mo cap in trial)"
toxicity_profile: moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Grade ≥2 immune-mediated adverse event (any organ)"
    modification: "Hold; corticosteroids per irAE management protocol; resume per organ-specific algorithm"
    source_refs: [SRC-RELATIVITY-047-TAWBI-2022]
  - condition: "Suspected myocarditis (troponin↑, new ECG changes, dyspnea)"
    modification: "PERMANENT discontinuation; high-dose corticosteroids; cardiology consult"
    source_refs: [SRC-RELATIVITY-047-TAWBI-2022]
  - condition: "Grade 3-4 immune-mediated AE that does not resolve to ≤Grade 1 within 12 weeks"
    modification: "Permanent discontinuation"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Релатлімаб не зареєстрований в Україні (2026-04); pathway = named-patient import. Ніволумаб зареєстрований + НСЗУ-покриваний для меланоми 1L (моно або з ipi). Opdualag fixed-dose — недоступний без імпорту."

sources:
  - SRC-NCCN-MELANOMA-2025
  - SRC-ESMO-MELANOMA-2024
  - SRC-RELATIVITY-047-TAWBI-2022

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Relatlimab + nivolumab (Opdualag) for melanoma 1L (RELATIVITY-047).
# LAG-3 + PD-1 dual checkpoint — slightly higher irAE rate than
# nivo mono but lower than nivo+ipi. STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Помірна втома, шкірний свербіж"
    action_ua: "Очікувано — використовуйте зволожувач"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-MELANOMA-2025
  - trigger_ua: "Помірна діарея (3-4 рази на день)"
    action_ua: "Подзвоніть у клініку того ж дня — можливий імунний коліт"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-MELANOMA-2025
  - trigger_ua: "Жовтяниця, біль у правому верхньому квадранті живота"
    action_ua: "Подзвоніть у клініку того ж дня — імунний гепатит"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-MELANOMA-2025
  - trigger_ua: "Виражена слабкість, постійна спрага"
    action_ua: "Подзвоніть у клініку того ж дня — імунна реакція щитоподібної залози або новий діабет"
    urgency: call_clinic_same_day
