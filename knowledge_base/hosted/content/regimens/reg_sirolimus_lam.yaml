id: REG-SIROLIMUS-LAM
name: "Sirolimus monotherapy (progressive LAM)"
name_ua: "Сіролімус моно (прогресуючий ЛАМ)"
alternate_names:
  - "Rapamune LAM"
  - "MILES regimen"

components:
  - drug_id: DRUG-SIROLIMUS
    dose: "2 mg PO once daily initially; titrate to target trough 5–15 ng/mL"
    schedule: "Continuous; long-term treatment; monitor trough levels"
    route: PO

cycle_length_days: 28
total_cycles: "Long-term continuous"
toxicity_profile: low_moderate

premedication: []
mandatory_supportive_care:
  - "Trough level monitoring: check 1–2 weeks after each dose change; target 5–15 ng/mL"
  - "Baseline: PFTs (FEV1, DLCO), serum VEGF-D, CBC, CMP, lipid panel"
  - "PFT monitoring q3–6 months to assess response"
  - "Lipid panel monitoring (dyslipidemia — common mTOR effect)"
  - "Contraception — teratogenicity; avoid during pregnancy"

dose_adjustments:
  - condition: "Trough <5 ng/mL (subtherapeutic)"
    modification: "Increase dose by 0.5–1 mg increments; recheck trough"
    rationale: "Target trough 5–15 ng/mL per MILES protocol"
    source_refs:
      - SRC-MILES-MCCORMACK-2011
  - condition: "Grade ≥2 stomatitis"
    modification: "Dose reduction or temporary interruption; topical triamcinolone paste"
    rationale: "Class mTOR toxicity"
    source_refs:
      - SRC-MILES-MCCORMACK-2011
  - condition: "Non-infectious pneumonitis"
    modification: "Hold; consider corticosteroids; discontinue if severe"
    rationale: "mTOR class effect — monitor for new pulmonary symptoms in already-compromised LAM lung"
    source_refs:
      - SRC-MILES-MCCORMACK-2011

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Sirolimus (Rapamune) is registered in Ukraine for transplant immunosuppression but off-label for LAM. NSZU does not reimburse for LAM indication. Generic sirolimus may reduce cost."

between_visit_watchpoints:
  - trigger_ua: "Виразки в роті, труднощі з ковтанням"
    action_ua: "Поширений побічний ефект (стоматит) — занотуйте; обговоріть на візиті"
    urgency: log_at_next_visit
    sources:
      - SRC-MILES-MCCORMACK-2011
  - trigger_ua: "Погіршення задишки або нова задишка, кашель"
    action_ua: "Зателефонуйте в клініку — потрібна оцінка (пневмоніт як побічний ефект)"
    urgency: call_clinic_same_day
    sources:
      - SRC-MILES-MCCORMACK-2011
  - trigger_ua: "Ознаки інфекції (температура >38°C, продуктивний кашель)"
    action_ua: "Зателефонуйте в клініку того ж дня — імуносупресія підвищує ризик інфекцій"
    urgency: call_clinic_same_day
    sources:
      - SRC-MILES-MCCORMACK-2011

sources:
  - SRC-MILES-MCCORMACK-2011

last_reviewed: "2026-05-04"
notes: >
  MILES trial (McCormack 2011 NEJM): sirolimus stabilized FEV1 trajectory
  in LAM (±1 vs −12 mL/month, p<0.001). Benefits appear to be disease-
  stabilizing rather than curative — FEV1 decline may resume after stopping.
  Indicated for LAM with abnormal lung function (FEV1 <70% predicted) or
  rapidly declining lung function. Serum VEGF-D ≥800 pg/mL identifies likely
  responders and is diagnostic; VEGF-D monitoring also used for response
  assessment. Everolimus is alternative for TSC-associated LAM.
notes_ua: >
  MILES (McCormack 2011 NEJM): сіролімус стабілізував FEV1 при ЛАМ. Ефект
  стабілізуючий, а не лікувальний. VEGF-D ≥800 пг/мл ідентифікує відповідачів.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
