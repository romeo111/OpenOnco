id: REG-SONIDEGIB-BCC
name: "Sonidegib monotherapy (locally advanced BCC)"
name_ua: "Сонідегіб моно (місцево-поширений БКК)"
alternate_names:
- "Odomzo BCC"
- "BOLT regimen"

components:
- drug_id: DRUG-SONIDEGIB
  dose: "200 mg PO once daily on an empty stomach (≥1 h before or ≥2 h after food)"
  schedule: "Continuous until progression or unacceptable toxicity"
  route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression"
toxicity_profile: moderate

premedication: []
mandatory_supportive_care: []
dose_adjustments:
- condition: "Grade ≥3 muscle spasms / elevated CK >2.5× ULN (asymptomatic)"
  modification: "Hold until ≤Grade 1; resume at 200 mg if within 3 weeks"
  rationale: "CK elevation and muscle cramps are class effects; rhabdomyolysis rare but possible"
  source_refs:
  - SRC-NCCN-SKIN-2025
- condition: "Rhabdomyolysis or CK >10× ULN"
  modification: "Permanently discontinue"
  rationale: "Risk of renal failure"
  source_refs:
  - SRC-NCCN-SKIN-2025

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Sonidegib NOT registered in Ukraine. Access via DEC named-patient import. Note: FDA approval limited to locally advanced BCC (not metastatic BCC)."

between_visit_watchpoints:
- trigger_ua: "М'язові спазми або слабкість + темна сеча"
  action_ua: "Зателефонуйте в клініку того ж дня — потребує оцінки рабдоміолізу (КФК-тест)"
  urgency: call_clinic_same_day
  sources:
  - SRC-NCCN-SKIN-2025
- trigger_ua: "Вагітність або затримка менструації"
  action_ua: "Зателефонуйте в клініку негайно — препарат вкрай небезпечний для плода"
  urgency: call_clinic_same_day
  sources:
  - SRC-NCCN-SKIN-2025

sources:
- SRC-NCCN-SKIN-2025

last_reviewed: "2026-05-04"
notes: >
  BOLT trial (Migden 2015): 200 mg once daily — ORR ~58% in laBCC at
  30-month update; FDA-approved for locally advanced BCC only (not mBCC).
  Very long half-life (~28 days) requires extended contraception counseling
  (20 months post-dose for females, 8 months for males). Rhabdomyolysis
  is rare but serious — CK monitoring protocol needed.
notes_ua: >
  BOLT: ORR ~58% при місцево-поширеному БКК. Тільки для laBCC (не mBCC).
  Дуже тривалий T½ (~28 днів) — контрацептивне консультування 20 місяців.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
