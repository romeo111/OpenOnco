id: REG-SONIDEGIB-BCC
name: "Sonidegib (locally advanced BCC)"
alternate_names: ["Odomzo", "HHI - sonidegib"]

components:
  - drug_id: DRUG-SONIDEGIB
    dose: "200 mg PO once daily on an empty stomach"
    schedule: "Continuous; at least 1 hour before or 2 hours after a meal"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Severe or intolerable musculoskeletal adverse reactions"
    modification: "Interrupt until clinical improvement; resume at 200 mg daily or discontinue for recurrent severe/intolerable events"
    source_refs:
      - SRC-FDA-ODOMZO-LABEL-2024
  - condition: "Creatine kinase elevation or renal-function worsening"
    modification: "Interrupt or permanently discontinue according to CK level, recurrence, and renal function"
    source_refs:
      - SRC-FDA-ODOMZO-LABEL-2024

sources:
  - SRC-FDA-ODOMZO-LABEL-2024
  - SRC-BOLT-MIGDEN-2015
  - SRC-NCCN-SKIN-2025
last_reviewed: "2026-05-07"
reviewers: []
reviewer_signoffs: []
notes: >
  Draft BCC regimen. FDA label scope is locally advanced BCC only; do not reuse
  for metastatic BCC without a separate source-backed indication review.
