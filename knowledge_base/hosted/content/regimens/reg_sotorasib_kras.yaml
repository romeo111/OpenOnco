# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Sotorasib for KRAS G12C NSCLC 2L+. Targeted KRASi: GI, hepatic
# (transaminitis), fatigue. Generally manageable. STUB pending §6.1.
between_visit_watchpoints:
  - trigger_ua: "Помірна діарея (1-3 рази на день)"
    action_ua: "Контролюється лоперамідом — занотовуйте частоту"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Помірна нудота, втома"
    action_ua: "Зустрічається — занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Біль у м'язах, помірна слабкість"
    action_ua: "Зустрічається — занотовуйте інтенсивність"
    urgency: log_at_next_visit
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Жовтяниця, потемніння сечі"
    action_ua: "Подзвоніть у клініку того ж дня — сотурасіб може впливати на печінку; потрібен аналіз"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-NSCLC-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Тяжка діарея (≥6 разів на день, з кров'ю)"
