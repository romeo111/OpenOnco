    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-NSCLC-2025
  - trigger_ua: "Раптова сильна задишка, новий сухий кашель"
    action_ua: "Звертайтесь у лікарню негайно — рідко сотурасіб може спричиняти ушкодження легень"
    urgency: er_now
    sources:
      - SRC-NCCN-NSCLC-2025

