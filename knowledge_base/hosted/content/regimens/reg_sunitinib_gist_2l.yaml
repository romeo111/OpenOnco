id: REG-SUNITINIB-GIST-2L
name: "Sunitinib monotherapy (GIST 2L; imatinib-resistant/intolerant)"
name_ua: "Сунітиніб моно (ГІСТ 2L; іматиніб-резистентний/непереносимий)"
alternate_names:
- "Sutent GIST 2L"
- "A6181004 regimen"

components:
- drug_id: DRUG-SUNITINIB
  dose: "50 mg PO once daily for 4 weeks on, 2 weeks off (4/2 schedule); continuous 37.5 mg alternative (per physician preference)"
  schedule: "4 weeks on / 2 weeks off (standard GIST dosing); repeat cycles until progression"
  route: PO

cycle_length_days: 42
total_cycles: "Continuous until progression"
toxicity_profile: moderate

premedication: []
mandatory_supportive_care: []
dose_adjustments:
- condition: "Grade ≥3 hypertension"
  modification: "Hold until ≤Grade 2; antihypertensives; resume at 37.5 mg"
  rationale: "Hypertension is VEGFR-mediated; significant CV toxicity"
  source_refs:
  - SRC-NCCN-GIST-2025
- condition: "Grade ≥3 hand-foot syndrome (PPE)"
  modification: "Hold ×1 week until ≤Grade 2; resume at 37.5 mg; discontinue if recurs at 37.5 mg"
  rationale: "PPE is dose-limiting"
  source_refs:
  - SRC-NCCN-GIST-2025
- condition: "LVEF decline >20% from baseline or below LLN"
  modification: "Hold or discontinue; cardiology consultation"
  rationale: "Cardiac dysfunction (class TKI toxicity)"
  source_refs:
  - SRC-NCCN-GIST-2025

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Sunitinib (Sutent) is registered in Ukraine. NSZU reimburses for GIST and RCC — confirm current reimbursement list for GIST 2L specifically. Generic sunitinib may reduce cost."

between_visit_watchpoints:
- trigger_ua: "Набряки, почервоніння, біль в долонях або ступнях"
  action_ua: "Кистево-стопний синдром — занотуйте; може знадобитись корекція дози"
  urgency: log_at_next_visit
  sources:
  - SRC-NCCN-GIST-2025
- trigger_ua: "Сильний головний біль або задишка"
  action_ua: "Зателефонуйте в клініку того ж дня — гіпертензія або серцева токсичність"
  urgency: call_clinic_same_day
  sources:
  - SRC-NCCN-GIST-2025
- trigger_ua: "Симптоми гіпотиреозу: втома, набір ваги, відчуття холоду"
  action_ua: "Занотуйте — регулярний моніторинг ТТГ; замісна терапія при необхідності"
  urgency: log_at_next_visit
  sources:
  - SRC-NCCN-GIST-2025

sources:
- SRC-NCCN-GIST-2025

last_reviewed: "2026-05-04"
notes: >
  Phase III trial (Demetri 2006 Lancet): sunitinib vs placebo in imatinib-
  resistant/intolerant GIST — mPFS 27.3 vs 6.4 weeks (HR 0.33, p<0.0001).
  Trial stopped early. FDA approved 2006. KIT exon 9 or wild-type GIST
  may derive greater benefit than exon 11. Continuous 37.5 mg dosing is
  an alternative to the 4/2 schedule (per some studies, similar efficacy,
  improved tolerability). Regorafenib is standard 3L after sunitinib failure.
notes_ua: >
  Sunitinib vs плацебо при ГІСТ (Demetri 2006): mPFS 27.3 vs 6.4 тижні.
  FDA схвалено 2006. KIT exon 9 / WT можуть більше виграти. 3L — регорафеніб.
ukrainian_review_status: pending_clinical_signoff
