id: REG-SUNITINIB-MONO-PNET
name: "Sunitinib monotherapy (advanced pNET; SUN1111 / Raymond 2011)"
name_ua: "Сунітиніб монотерапія (поширена pNET; SUN1111)"
alternate_names: ["SUN1111 regimen", "sunitinib pNET continuous", "Sutent pNET"]
components:
  - drug_id: DRUG-SUNITINIB
    dose: "37.5 mg PO daily"
    schedule: "Continuous daily dosing (NOT 4-week on / 2-week off as in RCC; continuous schedule per SUN1111)"
    route: PO
cycle_length_days: 28
total_cycles: "Until progression or unacceptable toxicity"
toxicity_profile: moderate
premedication: []
mandatory_supportive_care:
  - "Blood pressure monitoring at every visit (hypertension Grade 3 in ~13%; anti-HTN therapy if SBP >140)"
  - "Thyroid function q3 months (sunitinib → hypothyroidism in ~29%; levothyroxine supplementation)"
  - "CBC + LFTs q4 weeks (myelosuppression: neutropenia Grade 3-4 in ~17%; thrombocytopenia ~21%)"
  - "LFTs q4 weeks: rare hepatotoxicity; monitor ALT/AST"
  - "Cardiac monitoring: LVEF baseline and q3 months (sunitinib → cardiomyopathy rare)"
monitoring_schedule_id:
dose_adjustments:
  - condition: "Grade 3 hypertension (SBP ≥160)"
    modification: "Hold sunitinib; dose reduce to 25 mg/day on resumption; optimize anti-HTN"
  - condition: "Grade 4 hypertension or hypertensive crisis"
    modification: "Permanently discontinue sunitinib"
  - condition: "Grade 3-4 neutropenia (ANC <1.0×10⁹/L) or thrombocytopenia (PLT <50×10⁹/L)"
    modification: "Hold sunitinib 1-2 weeks until recovery; reduce to 25 mg on resumption"
  - condition: "Grade 3 hand-foot syndrome (PPE)"
    modification: "Hold sunitinib 1-2 weeks; dose reduce to 25 mg on resumption; topical urea cream 40%"
  - condition: "Symptomatic hypothyroidism"
    modification: "Continue sunitinib; initiate levothyroxine supplementation; no dose reduction required"
  - condition: "Grade 3-4 mucositis"
    modification: "Hold sunitinib; dose reduce to 25 mg on resumption; salt water rinses"
drug_interactions:
  - "Strong CYP3A4 inhibitors (ketoconazole, clarithromycin, grapefruit): increase sunitinib AUC by ~49% — reduce dose to 25 mg or avoid"
  - "Strong CYP3A4 inducers (rifampicin, carbamazepine, St John's Wort): decrease sunitinib — avoid"
  - "Warfarin: monitor INR closely (sunitinib affects warfarin metabolism)"
notes: >
  CRITICAL dosing distinction: sunitinib for pNET uses CONTINUOUS 37.5 mg/day,
  NOT the 4-weeks-on/2-weeks-off schedule used in RCC (50 mg/day × 4w, 2w rest).
  SUN1111 (Raymond 2011 NEJM): 37.5 mg continuous dosing was the registered dose
  for progressive pNET. Using RCC dose/schedule is a common prescribing error.

  Mechanism: sunitinib is a multi-targeted VEGFR 1-3, PDGFRα/β, KIT, FLT3, CSF-1R,
  RET inhibitor. Angiogenesis is critical for pNET growth — pNETs are highly vascular.

  pNET vs carcinoid: sunitinib specifically studied in pNET (pancreatic origin); data
  in carcinoid/extra-pancreatic NETs is more limited.

  Ukraine: sunitinib (Sutent, Pfizer) registered for RCC and GIST; pNET indication
  is off-label in Ukraine (approved in EU/US for progressive well-differentiated pNET).
  NSZU coverage for RCC — pNET use requires MDT compassionate-use request.
last_reviewed: "2026-05-04"
