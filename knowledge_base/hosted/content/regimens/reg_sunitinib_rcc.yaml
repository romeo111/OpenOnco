last_reviewed: "2026-05-03"
notes: >
  Sunitinib 50mg 4/2 was the historical 1L standard for RCC (NCCN cat 1 prior
  to ICI combinations). Remains acceptable for select patients ineligible for
  combination ICI+TKI (e.g., autoimmune contra to ICI, very elderly, frail).
  Also used as comparator arm in CheckMate-214, KEYNOTE-426, CLEAR, and CheckMate-9ER.
  Dose reductions to 37.5 mg → 25 mg daily available for toxicity management.
notes_ua: "Сунітиніб 50 мг 4/2 — історичний стандарт 1L НКК. Допустимий при протипоказах до ICI."
