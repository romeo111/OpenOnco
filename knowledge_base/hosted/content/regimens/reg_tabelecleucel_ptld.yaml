id: REG-TABELECLEUCEL-PTLD
name: "Tabelecleucel (tab-cel; Ebvallo) for EBV+ PTLD"
name_ua: "Табелеклейсел (tab-cel; Ebvallo) при ЕБВ+ ПТЛЗ"
alternate_names: ["tab-cel PTLD", "ATA129 PTLD", "allogeneic EBV-CTL PTLD"]

components:
  - drug_id: DRUG-TABELECLEUCEL
    dose: "2×10^6 cells/kg (body weight-based)"
    schedule: "IV weekly on days 1, 8, 15 of each 21-day cycle"
    route: IV
    duration: "Cycles continue until complete response, disease progression, or unacceptable toxicity"
    notes: "HLA-matched lot selected from inventory (≥2/8 loci match). Thaw and infuse per institutional protocol."

cycle_length_days: 21
number_of_cycles: "Until CR, progression, or toxicity; assess response every 1-2 cycles"

premedications:
  - "No routine premedication required for first infusion"
  - "If prior infusion reaction: acetaminophen 650 mg PO + diphenhydramine 25-50 mg IV 30 min before"

supportive_care:
  - "Immunosuppression: maintain current immunosuppression regimen during tabelecleucel (do NOT reduce IS as would be done for the reduce-IS strategy)"
  - "EBV DNA quantitative PCR: before each cycle (monitor EBV viral load as response marker)"
  - "LDH: before each cycle (disease burden monitoring)"
  - "CBC: before each cycle"
  - "Note: tabelecleucel does not cause cytopenia of the depth seen with chemotherapy — less intensive monitoring required"

response_assessment:
  - "PET-CT or CT: after every 2 cycles (every 42 days) to assess objective response"
  - "EBV DNA PCR: before each weekly dose and at end of each cycle"

administration_notes: >
  Tabelecleucel is an off-the-shelf allogeneic product stored frozen.
  Administration requirements:
  - Certified center with experience in cellular therapy
  - HLA typing of patient required before ordering (to match with appropriate lot)
  - Lot selection: Atara Biotherapeutics (manufacturer) provides HLA-matched lot
    from inventory; ≥2 of 8 HLA loci match required (deeper match preferred)
  - Thaw and infuse per REMS-equivalent protocol (IV 15-30 minutes)
  - No preconditioning lymphodepletion required (unlike CAR-T therapy)
  - Immunosuppression is MAINTAINED (contrast: reduce-IS strategy for 1L PTLD
    requires IS reduction, which is impossible or dangerous in some SOT patients)
  Important: if no HLA-compatible lot available in inventory, the product
  cannot be administered. Coordinate with Atara Biotherapeutics early.

contraindications:
  - "EBV-negative PTLD (tabelecleucel is only active against EBV-expressing tumor cells)"
  - "Active uncontrolled GvHD (HCT recipients)"
  - "Severe organ dysfunction that would prevent IV administration"

sources:
  - SRC-ALLELE-PROCKOP-2023
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
drafted_by: claude_extraction
