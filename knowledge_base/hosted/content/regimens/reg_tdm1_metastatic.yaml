id: REG-TDM1-METASTATIC
name: "T-DM1 (trastuzumab emtansine) 3.6 mg/kg IV q3w — HER2+ metastatic breast (2L+)"
name_ua: "T-DM1 (трастузумаб емтанзин) 3.6 мг/кг IV q3w — HER2+ метастатичний рак молочної залози (2L+)"
alternate_names:
  - "T-DM1 metastatic"
  - "ado-trastuzumab emtansine mBC"
  - "EMILIA regimen"
  - "Kadcyla metastatic"

components:
  - drug_id: DRUG-TRASTUZUMAB-EMTANSINE
    dose: "3.6 mg/kg IV"
    schedule: "Day 1 of a 21-day cycle. Continue until disease progression or unacceptable toxicity."
    route: IV
    notes: >
      Infuse over 90 min for cycle 1; reduce to 30 min for subsequent cycles if cycle 1 well tolerated.
      DO NOT substitute T-DM1 for trastuzumab or pertuzumab — different pharmacology and dosing.
      DO NOT co-administer with other HER2-targeting agents.
      T-DM1 = trastuzumab + DM1 (maytansine microtubule inhibitor) via thioether linker — single ADC.

cycle_length_days: 21
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: moderate

premedication: []

mandatory_supportive_care:
  - "CBC before each cycle (thrombocytopenia is dose-limiting)"
  - "LFTs before each cycle (hepatotoxicity, including nodular regenerative hyperplasia with prolonged use)"
  - "Cardiac function assessment (LVEF) baseline + every 3 months (HER2-targeted cardiotoxicity risk)"
  - "Peripheral neuropathy assessment every cycle (DM1 microtubule inhibitor; cumulative)"
  - "Pregnancy test and effective contraception (teratogenic — category X equivalent)"

dose_adjustments:
  - condition: "Platelet count <75,000/µL (Grade 3 thrombocytopenia)"
    modification: "Hold; resume at same dose when PLT ≥75,000/µL if nadir was ≥50,000; reduce 1 dose level if nadir <50,000"
    rationale: "T-DM1 thrombocytopenia is common (~31%); dose reduction preserves duration"
  - condition: "Platelet count <25,000/µL (Grade 4)"
    modification: "Reduce 1 dose level (from 3.6→3.0→2.4 mg/kg) on recovery"
    rationale: "Grade 4 thrombocytopenia requires permanent reduction"
  - condition: "AST/ALT Grade 3 (>5-20× ULN)"
    modification: "Hold until ≤Grade 2; resume at 3.0 mg/kg (dose reduce 1 level)"
    rationale: "DM1 hepatotoxicity; monitor for nodular regenerative hyperplasia with extended use"
  - condition: "AST/ALT Grade 4 (>20× ULN) OR total bilirubin >2× ULN"
    modification: "Permanently discontinue"
    rationale: "Severe hepatotoxicity — fatal cases reported"
  - condition: "LVEF decline ≥10 percentage points to <50%"
    modification: "Hold; reassess in 3 weeks; discontinue if persistent or symptomatic HF"
    rationale: "HER2-targeted cardiotoxicity; similar monitoring to trastuzumab"
  - condition: "Grade 3-4 peripheral neuropathy"
    modification: "Hold until recovery to ≤Grade 2; resume at reduced dose or discontinue"
    rationale: "Cumulative DM1 neuropathy; may be persistent"
  - condition: "Interstitial lung disease / pneumonitis Grade ≥2"
    modification: "Permanently discontinue"
    rationale: "ADC-class ILD risk; less frequent than T-DXd but possible"

drug_interactions:
  - "Strong CYP3A4 inhibitors (ketoconazole, ritonavir): may increase DM1 exposure; caution"
  - "P-gp inhibitors: potential increase in T-DM1 exposure; monitor"
  - "Do NOT combine with other anti-HER2 therapies (trastuzumab, pertuzumab, T-DXd) — overlapping mechanism and cardiotoxicity"
  - "Anticoagulants: thrombocytopenia from T-DM1 increases bleeding risk; monitor INR closely"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: >
    T-DM1 (Kadcyla) зареєстровано в Україні, але НЕ є НСЗУ-фінансованим у метастатичному
    контексті (2026). Потенційно доступний через пацієнтські програми, фонди або спеціальні
    схеми (сирітський доступ). T-DXd (ENHERTU) — ще менш доступний (вищі витрати).
    T-DM1 є більш доступним HER2-ADC варіантом порівняно з T-DXd в UA.
    Perевіряйте доступність у центрі призначення перед маршрутизацією.

sources:
  - SRC-NCCN-BREAST-2025
  - SRC-ESMO-BREAST-METASTATIC-2024

