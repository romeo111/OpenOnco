last_reviewed: "2026-05-04"
reviewers: []
notes: >
  T-DM1 (ado-trastuzumab emtansine) 3.6 mg/kg IV q21d for HER2+ metastatic
  breast cancer (mBC) in the 2L+ setting, used when T-DXd (ENHERTU, trastuzumab
  deruxtecan) is inaccessible.

  EMILIA TRIAL (Verma 2012 NEJM; NCT00829166):
  - Population: HER2+ mBC previously treated with taxane + trastuzumab (n=991)
  - T-DM1 vs lapatinib+capecitabine: mPFS 9.6 vs 6.4 mo (HR 0.65; p<0.001)
  - mOS 30.9 vs 25.1 mo (HR 0.68; p<0.001)
  - ORR 43.6% vs 30.8%
  - FDA-approved February 2013; NCCN Cat 1 for HER2+ mBC 2L

  SUPERSEDED BY T-DXd: DESTINY-Breast03 (Cortés 2022 NEJM):
  - T-DXd vs T-DM1 in HER2+ mBC 2L (post-THP): mPFS 28.8 vs 6.8 mo (HR 0.33; p<0.001)
  - T-DXd is now NCCN Cat 1 preferred 2L when accessible
  - T-DM1 remains Cat 1 when T-DXd is not accessible (NCCN language: "preferred" ≠ "only")

  UKRAINIAN ACCESS CONTEXT:
  T-DXd (ENHERTU): Not NSZU-reimbursed for mBC 2026; very high cost (~$14,000/cycle);
  access through AstraZeneca/Daiichi Sankyo patient support limited in UA.
  T-DM1 (Kadcyla): Not NSZU-reimbursed but registered; lower cost than T-DXd; accessible
  through some oncology foundations (Tabletochki, Lybid, etc.) in select UA centres.

  T-DM1 is the pragmatic 2L standard in most UA centres until T-DXd becomes reimbursed.

  STUB pending §6.1 clinical signoff.
ukrainian_review_status: pending_clinical_signoff
