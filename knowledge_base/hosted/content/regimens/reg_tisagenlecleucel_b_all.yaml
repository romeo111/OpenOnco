id: REG-TISAGENLECLEUCEL-B-ALL
name: "Tisagenlecleucel CD19 CAR-T for R/R B-ALL ≤25 years"
name_ua: "Тисагенлеклеуцел CD19 CAR-T для R/R B-ALL ≤25 років"
alternate_names:
  - "Tisa-cel B-ALL"
  - "Kymriah B-ALL"
  - "ELIANA regimen"

components: []  # phases supersede; kept empty for back-compat with downstream
                # consumers that still iterate `components` directly. PR3 of
                # regimen-phases-refactor — see plan-doc 2026-04-28 §4 + §5.

phases:
  - name: lymphodepletion
    purpose_ua: "виснаження лімфоцитів перед CAR-T для приживлення клітин (ELIANA-style: Flu × 4 days + Cy × 2 days)"
    purpose_en: "lymphocyte depletion before CAR-T to enable cell engraftment (ELIANA-style: Flu × 4 days + Cy × 2 days)"
    duration: "4 days, days -4 to -1"
    timing_relative_to: "main_infusion"
    timing_offset_days: -4
    optional: false
    components:
      - drug_id: DRUG-FLUDARABINE
        dose: "30 mg/m² IV daily × 4 days (lymphodepleting conditioning)"
        schedule: "Days -4 to -1 before CAR-T infusion"
        route: IV
      - drug_id: DRUG-CYCLOPHOSPHAMIDE
        dose: "500 mg/m² IV daily × 2 days (lymphodepleting conditioning)"
        schedule: "Days -4 to -3 before CAR-T infusion"
        route: IV
    sources:
      - SRC-ELIANA-MAUDE-2018
      - SRC-NCCN-BCELL-2025
  - name: main
    purpose_ua: "основна CAR-T інфузія"
    purpose_en: "main CAR-T infusion"
    duration: "single infusion"
    timing_relative_to: "absolute"
    optional: false
    components:
      - drug_id: DRUG-TISAGENLECLEUCEL
        dose: "Single IV infusion: 0.2 to 5.0 × 10⁶ CAR-positive viable T cells per kg for patients ≤50 kg; 0.1 to 2.5 × 10⁸ CAR-positive viable T cells (not weight-based) for patients >50 kg"
        schedule: "Single infusion day 0 after lymphodepletion completion; no maintenance"
        route: IV
    sources:
      - SRC-ELIANA-MAUDE-2018
      - SRC-NCCN-BCELL-2025

cycle_length_days:
total_cycles: "Single infusion procedure; no maintenance; bridge chemo during 3-4 week manufacturing window for active disease"

toxicity_profile: severe

premedication:
  - "Confirm CD19 expression on tumor (CD19 IHC or flow on baseline biopsy; CD19+ at original diagnosis sufficient)"
  - "Confirm REMS / FACT-JACIE accreditation of administering center"
  - "Tocilizumab on-site (≥2 doses) BEFORE CAR-T infusion — mandatory"
  - "Bridging chemotherapy during 3-4 week manufacturing window for active disease (avoid corticosteroids)"
  - "Pre-CAR-T infectious workup (HBV / HCV / HIV / CMV / TB) + ECHO + brain MRI"
  - "Pre-conditioning hospitalization + ICU bed availability"
  - "IVIG availability for prolonged hypogammaglobulinemia post-CAR-T"

mandatory_supportive_care:
  - SUP-TLS-PROPHYLAXIS
  - SUP-PJP-PROPHYLAXIS
  - SUP-HSV-PROPHYLAXIS
  - SUP-HBV-PROPHYLAXIS

monitoring_schedule_id:

dose_adjustments:
  - condition: "Grade ≥2 CRS"
    modification: "Tocilizumab 8 mg/kg IV (max 800 mg); supportive care; ICU monitoring"
    rationale: "Boxed warning — Grade ≥3 CRS ~46% in ELIANA; tocilizumab + ICU mandatory"
    source_refs:
      - SRC-ELIANA-MAUDE-2018
      - SRC-NCCN-BCELL-2025
  - condition: "Grade ≥2 ICANS"
    modification: "Dexamethasone 10 mg IV q6h; intensify for higher grades; permanent discontinuation possible"
    rationale: "Boxed warning — Grade ≥3 ICANS ~13% in ELIANA"
    source_refs:
      - SRC-ELIANA-MAUDE-2018
  - condition: "Pre-existing CNS-2/3 disease (symptomatic)"
    modification: "Generally exclude from CAR-T per ELIANA registration; CNS-1 or asymptomatic CNS-2 acceptable per institution"
    rationale: "Symptomatic CNS disease excluded from ELIANA; ICANS risk + lack of efficacy data"
    source_refs:
      - SRC-ELIANA-MAUDE-2018
  - condition: "Active uncontrolled infection"
    modification: "Defer CAR-T until controlled — lymphodepletion + CRS = high mortality"
    rationale: "Absolute pre-infusion contraindication"
    source_refs:
      - SRC-NCCN-BCELL-2025
  - condition: "B-cell aplasia + IgG <400 + recurrent infections post-CAR-T"
    modification: "IVIG 400-600 mg/kg q3-4wk"
    rationale: "Hypogammaglobulinemia can persist >12 months"
    source_refs:
      - SRC-NCCN-BCELL-2025

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Tisagenlecleucel (Kymriah) NOT registered in Ukraine; NO domestic manufacturing. International referral pathway (Israel / Poland / Germany / Spain) required, USD 350-500K all-in. Lymphodepleting fludarabine + cyclophosphamide registered + reimbursed."

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ELIANA-MAUDE-2018

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Tisagenlecleucel CD19 CAR-T for R/R B-ALL pediatric. Signature
# toxicities: cytokine release syndrome (CRS) and ICANS — both can
# escalate quickly in the first 2-4 weeks post-infusion. Most
# patients are inpatient during peak risk. STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Помірна втома, зниження апетиту після інфузії"
    action_ua: "Очікувано — занотовуйте інтенсивність"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Помірна температура (37.5-38°C), легкий головний біль протягом перших 1-2 тижнів"
    action_ua: "Подзвоніть у клініку того ж дня — навіть невелика лихоманка може бути першою ознакою CRS; потрібна оцінка"
    urgency: call_clinic_same_day
    cycle_day_window: "Day 1-21 post-infusion"
    sources:
      - SRC-NCCN-BCELL-2025
      - SRC-ELIANA-MAUDE-2018
  - trigger_ua: "Розмиття мови, плутаність, утруднене писання — навіть легке"
    action_ua: "Звертайтесь у лікарню негайно — це може бути ICANS (нейротоксичність CAR-T); рання оцінка критична"
    urgency: er_now
    cycle_day_window: "Day 1-30 post-infusion"
    sources:
      - SRC-NCCN-BCELL-2025
      - SRC-ELIANA-MAUDE-2018
  - trigger_ua: "Висока лихоманка (>38.5°C), низький тиск, прискорене серцебиття"
    action_ua: "Звертайтесь у лікарню негайно — ознаки тяжкого CRS; потрібна термінова оцінка і можливо тоцилізумаб"
    urgency: er_now
    cycle_day_window: "Day 1-21 post-infusion"
    sources:
      - SRC-NCCN-BCELL-2025
      - SRC-ELIANA-MAUDE-2018
  - trigger_ua: "Раптова виражена задишка, синюшність губ, неможливість лежати рівно"
    action_ua: "Звертайтесь у лікарню негайно — можливий тяжкий CRS з ушкодженням легень"
    urgency: er_now
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Судомний напад, втрата свідомості"
    action_ua: "Звертайтесь у лікарню негайно — тяжкий ICANS"
    urgency: er_now
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Часті інфекції протягом місяців після CAR-T (B-cell aplasia)"
    action_ua: "Подзвоніть у клініку того ж дня — потрібна оцінка і можливо IVIG; будьте уважні до ознак інфекції на тривалий час"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
notes: >
  CD19 CAR-T (4-1BB costimulation) for R/R B-ALL ages ≤25.
  ELIANA: ORR 81%, CR/CRi 60%, 12-mo EFS 50%, OS 76%. Single
  curative-intent infusion. CRS + ICANS boxed warnings —
  REMS/FACT-JACIE-accredited center mandatory. Bridging chemo
  during manufacturing window. Adult B-ALL (>25) — brexucabtagene
  autoleucel (Tecartus) is the registered alternative (separate
  Regimen entity, future). STUB — pending Co-Lead sign-off.
notes_ua: >
  CD19 CAR-T (4-1BB costimulation) for р/р B-ALL ages ≤25. ELIANA: ORR 81%, CR/CRi 60%, 12-mo EFS 50%, OS 76%. Single curative-intent infusion. CRS + ICANS спеціальні попередження в інструкції — REMS/FACT-JACIE-accredited center обов'язковий. Bridging chemo during manufacturing window. дорослий B-ALL (>25) — брексукабтаген аутолейцел (Tecartus) is the registered alternative (separate схема сутність, future). STUB — pending Co-Lead sign-off.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
