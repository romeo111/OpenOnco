id: REG-TMZ-MONO
name: "Temozolomide monotherapy"
components:
  - drug_id: DRUG-TEMOZOLOMIDE
cycle_length_days: 28
total_cycles: "Until progression or unacceptable toxicity; schedule per GBM protocol"
sources:
  - SRC-NCCN-CNS-2025
last_reviewed: "2026-05-07"
notes: "Thin regimen stub added to resolve existing GBM temozolomide indication references."
notes_ua: >
  Темозоломід (temozolomide) монотерапія при GBM. Ад'ювантна схема
  (Stupp): 150-200 мг/м²/добу × 5 днів кожні 28 днів, 6 циклів після
  ХПТ. Для рецидивуючої GBM: ре-виклик темозоломідом або дозоущільнена
  схема 75-100 мг/м²/добу × 21 день q28d. MGMT-метилювання — предиктор
  відповіді. Профілактика пневмоцистної пневмонії (ТМП/СМК або пентамідин)
  при тривалому прийомі. Тонкий шаблон-alias.
