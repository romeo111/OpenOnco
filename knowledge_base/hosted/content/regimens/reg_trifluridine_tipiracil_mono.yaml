notes: >
  RECOURSE Phase III (2015): chemo-refractory mCRC, TAS-102 vs placebo,
  mOS 7.1 vs 5.3 mo (HR 0.68). NCCN Cat 1 monotherapy option for 3L+.
  Mechanism: trifluridine is a thymidine analog incorporated into DNA;
  tipiracil inhibits thymidine phosphorylase preventing trifluridine
  degradation. TS-independent — distinct from prior fluoropyrimidine
  exposure. SUNLIGHT combination (TAS-102 + bevacizumab) is preferred
  where bev accessible (mOS 10.8 vs 7.5 mo combo vs mono); this
  monotherapy regimen is the bev-contraindicated / bev-not-funded
  fallback. Myelosuppression (neutropenia + anemia) is dominant
  toxicity; G-CSF prophylaxis NOT routine but PRN.

notes_ua: >
  RECOURSE Фаза III (2015): хіміорефрактерний мКРР, TAS-102 проти
  плацебо, мЗВ 7,1 проти 5,3 міс. (ВР 0,68). NCCN Категорія 1
  монотерапія для 3L+. Механізм: трифлуридин (trifluridine) є
  аналогом тимідину, що включається у ДНК; тіпірацил (tipiracil)
  пригнічує тимідинфосфорилазу, запобігаючи деградації трифлуридину.
  Незалежний від TS — відрізняється від попереднього впливу
  фторпіримідинів. Трифлуридин-тіпірацил (trifluridine-tipiracil)
  35 мг/м² перорально двічі на добу (округлюється до 5 мг) дні 1–5 +
  дні 8–12 кожних 28 днів. При CrCl 30–59 мл/хв: знизити початкову
  дозу до 20 мг/м² двічі на добу. Комбінація SUNLIGHT (TAS-102 +
  бевацизумаб) є переважною там, де доступний бев (мЗВ 10,8 проти
  7,5 міс. комбінація проти монотерапії); ця монотерапія є резервним
  варіантом при протипоказаннях/недоступності бев. Мієлосупресія
  (нейтропенія + анемія) є домінуючою токсичністю.
