id: REG-VEMURAFENIB-HCL-RELAPSED
name: Vemurafenib + rituximab for relapsed/refractory BRAF-V600E HCL
name_ua: Вемурафеніб + ритуксимаб при рецидивному/рефрактерному HCL з BRAF V600E
alternate_names:
  - Vem-R HCL
  - Vemurafenib HCL
components:
  - drug_id: DRUG-VEMURAFENIB
    dose: "960 mg PO twice daily (BID)"
    schedule: "Continuous PO × 8 weeks (56 days); fixed-duration alongside rituximab"
    route: PO
    notes: >
      Take with or without food; avoid high-fat meal within 2 hours (reduces Cmax).
      Avoid grapefruit (CYP3A4 inhibitor). SPF 50+ sunscreen MANDATORY throughout
      and for 6 months after treatment. QTc monitoring: baseline ECG + repeat at
      2-4 weeks. Cutaneous toxicity (rash, photosensitivity): dose reduce to
      720 mg BID for Grade ≥2.
  - drug_id: DRUG-RITUXIMAB
    dose: 375 mg/m²
    schedule: "IV q2 weeks × 4 doses (weeks 1, 3, 5, 7), then q4 weeks × 4 doses (weeks 11, 15, 19, 23) — 8 total doses over ~24 weeks (Tiacci 2021 protocol)"
    route: IV
cycle_length_days: 28
total_cycles: "Fixed duration: vemurafenib 960 mg BID × 8 weeks; rituximab × 8 doses over ~24 weeks (Tiacci 2021 protocol)"
toxicity_profile: moderate
premedication:
  - Acetaminophen + diphenhydramine before rituximab
mandatory_supportive_care:
  - "ECG MANDATORY: baseline QTc (Fridericia formula) before starting; repeat at 2-4 weeks (vemurafenib QTc risk). Hold if QTc >500 ms."
  - "PHOTOSENSITIVITY: SPF 50+ broadspectrum sunscreen + protective clothing from day 1; counsel patient explicitly — severe phototoxic burns occur with routine sun exposure"
  - "DERMATOLOGY SURVEILLANCE: clinical skin exam q1-3 months during and for 6 months after treatment (cuSCC/keratoacanthoma risk; easily excised when caught early)"
  - "HBV SEROLOGY mandatory before rituximab (HBsAg, anti-HBc): HBsAg+ or anti-HBc+/DNA+ → antiviral prophylaxis (entecavir) for 12+ months after last rituximab"
  - "RITUXIMAB PREMEDICATION: acetaminophen 500-1000 mg PO + diphenhydramine 25-50 mg IV 30-60 min pre-infusion (infusion-reaction prophylaxis)"
monitoring_schedule_id: MON-RITUXIMAB-MONO
dose_adjustments:
  - condition: Grade ≥2 cutaneous toxicity (rash, photosensitivity)
    modification: Reduce vemurafenib to 720 mg BID; topical steroid; sunscreen mandatory
    source_refs:
      - SRC-NCCN-BCELL-2025
ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: Vemurafenib registered for melanoma in UA; not separately reimbursed for HCL — off-label access requires individual funding pathway. Drug stub not yet curated in KB.
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-MOZ-UA-LYMPH-2013

