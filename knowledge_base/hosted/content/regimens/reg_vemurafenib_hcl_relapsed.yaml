last_reviewed: '2026-05-04'
notes: >
  Tiacci et al. 2021 NEJM (phase 2; n=30 r/r HCL): vemurafenib + rituximab
  ORR 100%; CR 87% (26/30); uMRD (bone-marrow MRD-negative) 66.7% (20/30);
  mPFS not reached at 37-month median follow-up. NCCN Category 1 for r/r
  BRAF-V600E HCL. DRUG-VEMURAFENIB entity authored 2026-05-04 (Workstream CL).
  UA: vemurafenib off-label for HCL; not NSZU-funded for HCL; rituximab
  accessible (NSZU-funded for hematologic malignancies).
notes_ua: >-
  Tiacci 2021 NEJM: вемурафеніб 960 мг двічі на добу × 8 тижнів + ритуксимаб
  375 мг/м² × 8 доз. ЗВ 100%; ПВ 87%; МЗХ-негативність КМ 66,7%;
  mВБП не досягнута (спостереження 37 міс). NCCN Cat 1. В Україні: вемурафеніб
  (Zelboraf) зареєстрований для меланоми — позареєстроване застосування при ВКЛ;
  НСЗУ не відшкодовує. Ритуксимаб — НСЗУ-доступний.
ukrainian_review_status: pending_clinical_signoff
