last_reviewed: "2026-04-29"
notes: >
  CARTITUDE-4 (NCT04181827, San-Miguel NEJM 2023, PMID 37272512):
  randomized phase-3 of single-infusion cilta-cel vs investigator's
  choice (PVd or DPd) in lenalidomide-refractory R/R multiple
  myeloma after 1-3 prior lines (n=419, 1:1 randomization).
  Cilta-cel arm: ORR 84.6%, sCR 73.1%; mPFS not reached vs 11.8 mo
  control (HR 0.26, p<0.001); 12-mo PFS 75.9% vs 48.6%. Established
  cilta-cel as superior to standard-of-care triplets in
  lenalidomide-refractory 2L+ MM. FDA approval Apr 2024 (this 2L
  indication). MNT mitigation strategies (low tumor burden via
  bridging, prompt CRS/ICANS rx) reduced delayed-onset
  neurotoxicity from ~5% (CARTITUDE-1) to ~1% (CARTITUDE-4).
  Centre must be FACT/JACIE/REMS-accredited. Boxed warnings unchanged
  from CARTITUDE-1 (CRS, ICANS, MNT, HLH/MAS, prolonged cytopenia,
  secondary T-cell malignancy). Single curative-intent attempt;
  no maintenance.
  STUB — pending Co-Lead sign-off.
  TODO source: SRC-CARTITUDE-4-SAN-MIGUEL-2023 (NEJM PMID 37272512)
  not yet registered in KB; CARTITUDE-1 source cited as proxy for
  trial-design + cilta-cel-specific safety information until
  CARTITUDE-4 source ingested.
notes_ua: >
  CARTITUDE-4 (NCT04181827, San-Miguel NEJM 2023, PMID 37272512):
  рандомізоване дослідження фази 3 одноразової інфузії cilta-cel
  vs вибір дослідника (PVd або DPd) у леналідомід-рефрактерній р/р
  множинній мієломі після 1-3 попередніх ліній (n=419, рандомізація
  1:1). Група cilta-cel: ORR 84.6%, sCR 73.1%; mPFS не досягнуто
  vs 11.8 міс. контроль (HR 0.26, p<0.001); 12-міс. PFS 75.9% vs
  48.6%. Встановлено перевагу cilta-cel над стандартними триплетами
  у леналідомід-рефрактерній 2L+ MM. Реєстрація FDA — квітень 2024
  (це 2L показання). Стратегії пом'якшення MNT (низький пухлинний
  тягар через bridging, швидка терапія CRS/ICANS) зменшили частоту
  відстроченої нейротоксичності з ~5% (CARTITUDE-1) до ~1%
  (CARTITUDE-4). Центр має бути FACT/JACIE/REMS-акредитований.
  Спеціальні попередження в інструкції незмінні з CARTITUDE-1 (CRS,
  ICANS, MNT, HLH/MAS, тривала цитопенія, вторинні T-клітинні
  злоякісні новоутворення). Одноразова куративна спроба;
  підтримуюча терапія відсутня.
  STUB — очікує клінічного підтвердження Co-Lead.
