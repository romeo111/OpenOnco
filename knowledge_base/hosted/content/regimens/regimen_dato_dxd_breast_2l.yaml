id: REG-DATO-DXD-BREAST-2L
name: "Datopotamab deruxtecan (Dato-DXd) monotherapy (HR+/HER2- pre-treated metastatic post-ET + chemo)"
name_ua: "Датопотамаб дерукстекан моно (HR+/HER2- метастаз після ET + хіміо)"
alternate_names: ["TROPION-Breast01 regimen", "Dato-DXd 2L+ HR+/HER2-"]

components:
  - drug_id: DRUG-DATOPOTAMAB-DERUXTECAN
    dose: "6 mg/kg IV every 3 weeks"
    schedule: "Day 1 of every 21-day cycle"
    route: IV

cycle_length_days: 21
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: moderate

premedication:
  - "Antiemetic prophylaxis — moderate-emetogenic regimen (5-HT3 + dexamethasone +/- NK1)"
  - "Corticosteroid mouthwash prophylaxis (dexamethasone 0.1 mg/mL swish-and-spit) starting day 1; ice chips during infusion"
  - "Preservative-free artificial tears from cycle 1; baseline ophthalmology assessment recommended"
  - "Baseline chest CT for ILD risk stratification"
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Stomatitis G≥2"
    modification: "Optimize topical steroid mouthwash + ice chips; if G≥3 hold until ≤G1, resume at 5 mg/kg → 4 mg/kg"
  - condition: "Dry eye / keratitis G≥2"
    modification: "Ophthalmology referral; preservative-free lubricants; topical cyclosporine if persistent; hold for G≥3 until recovery"
  - condition: "Nausea/vomiting G≥3 despite prophylaxis"
    modification: "Add olanzapine or NK1 antagonist; hold if persistent until ≤G1, resume at reduced dose"
  - condition: "Interstitial lung disease / pneumonitis suspect"
    modification: "Hold immediately; high-resolution CT chest + pulmonology consultation; G≥2 confirmed → permanent discontinuation; corticosteroid taper per T-DXd ILD algorithm"
  - condition: "Neutropenia G≥4 or febrile neutropenia"
    modification: "Hold until ≤G2; resume at 5 mg/kg → 4 mg/kg; G-CSF support per ASCO guideline"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Datopotamab deruxtecan not registered in Ukraine. Named-patient import / EAP / cross-border (EU) only. Major access barrier."

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed:
notes: >
  TROPION-Breast01 (NCT05104866): Phase III, HR+/HER2- pre-treated
  metastatic breast cancer (1-2 prior chemo lines for metastatic +
  prior endocrine therapy). Dato-DXd vs investigator-choice chemo
  (eribulin / vinorelbine / gemcitabine / capecitabine). Median PFS
  6.9 vs 4.9 mo (HR 0.63). FDA approval Jan 2025 (Datroway) for HR+/
  HER2- (IHC 0, IHC 1+, IHC 2+/ISH-) metastatic post-ET + chemo.
  Distinguishing AE profile vs T-DXd: higher stomatitis + ocular
  toxicity, lower (~3% vs ~12%) ILD rate. TROP2-IHC not required as
  predictive biomarker per current label (broad-eligibility). Trial-
  source SRC-TROPION-BREAST01-BARDIA-2024 not yet ingested into KB —
  citation falls back to NCCN + ESMO guideline Sources; flagged for
  follow-up source-stub generation.
notes_ua: >
  TROPION-Breast01 (NCT05104866): Фаза III, HR+/HER2- попередньо
  лікований метастатичний РМЗ (1–2 попередніх лінії хімії для
  метастатичного + попередня гормональна терапія). Датопотамаб
  дерукстекан (datopotamab deruxtecan) 6 мг/кг q21d проти хімії на
  вибір дослідника (еврибулін / вінорелбін / гемцитабін /
  капецитабін). Медіана ВБП 6,9 проти 4,9 міс. (ВР 0,63).
  Схвалення FDA січень 2025 (Datroway) для HR+/HER2- (IHC 0,
  IHC 1+, IHC 2+/ISH-) метастатичного після гормональної терапії +
  хімії. Відмінний профіль НЯ порівняно з T-DXd: вищий стоматит +
  очна токсичність, нижча (~3% проти ~12%) частота ІУЛ. Тест TROP2-IHC
  не є обов'язковим предиктивним біомаркером за поточним маркуванням.
ukrainian_review_status: pending_clinical_signoff
