last_reviewed: "2026-05-01"
notes: >
  Full-dose monotherapy phase of elranatamab — separated from step-up
  phase (REGIMEN-ELRANATAMAB-STEP-UP-DOSING-MM). MagnetisMM-3
  (Lesokhin 2023, Nat Med): triple-class refractory MM after ≥3 prior
  lines — ORR ~61%, CR/sCR ~35%, mPFS ~17 mo (BCMA-naive cohort).
  FDA approved 2023 for triple-class refractory MM. Response-adapted
  schedule: 76 mg SC weekly for 24 weeks, then q2-weekly. Trial
  Source SRC-MAGNETISMM-3-LESOKHIN-2023 not yet ingested into KB —
  citing NCCN-MM-2025 only; trial Source ingestion pending
  (flagged in commit body).
notes_ua: >
  Фаза повної дози монотерапії елранатамабом — відокремлена від
  фази step-up (REGIMEN-ELRANATAMAB-STEP-UP-DOSING-MM). MagnetisMM-3
  (Lesokhin 2023, Nat Med): triple-class рефрактерна ММ після ≥3
  ліній — ORR ~61%, CR/sCR ~35%, mPFS ~17 міс. (когорта BCMA-naive).
  FDA схвалено 2023 для triple-class рефрактерної ММ. Схема
  залежно від відповіді: 76 мг п/ш щотижня протягом 24 тижнів, потім
  раз на 2 тижні. Джерело-стаб дослідження SRC-MAGNETISMM-3-LESOKHIN-2023
  ще не внесене у KB — цитуємо лише NCCN-MM-2025; завантаження джерела
  очікує (зазначено у тілі коміту).
ukrainian_review_status: pending_clinical_signoff
