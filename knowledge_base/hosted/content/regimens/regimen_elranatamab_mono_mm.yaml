id: REGIMEN-ELRANATAMAB-MONO-MM
name: "Elranatamab BCMA × CD3 bispecific monotherapy — SC weekly then q2-weekly (MagnetisMM-3)"
name_ua: "Елранатамаб BCMA × CD3 біспецифік у монотерапії — підшкірно щотижня з переходом
  на раз на 2 тижні (MagnetisMM-3)"
alternate_names:
- "Elranatamab monotherapy"
- "Elrexfio"
- "MagnetisMM-3 maintenance"

components:
- drug_id: DRUG-ELRANATAMAB
  dose: >
    76 mg SC once weekly from week 1 (after completion of step-up;
    see REGIMEN-ELRANATAMAB-STEP-UP-DOSING-MM) through week 24, then
    76 mg SC every 2 weeks from week 25 onward (per MagnetisMM-3
    response-adapted schedule and FDA label).
  schedule: "Weekly SC for first 24 weeks of full-dose phase, then q2-weekly"
  route: SC

cycle_length_days: 28
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: severe

premedication:
- "Premedication required only during step-up phase (REGIMEN-ELRANATAMAB-STEP-UP-DOSING-MM);
  discontinued for full-dose weekly / q2-weekly phase unless symptomatic CRS recurs."
- "Tocilizumab 8 mg/kg IV must remain on-site for emergency CRS management throughout
  therapy."
mandatory_supportive_care:
- SUP-PJP-PROPHYLAXIS
- SUP-HSV-PROPHYLAXIS
- SUP-IVIG-HYPOGAMMA
dose_adjustments:
- condition: "CRS Grade 1 during weekly / q2-weekly phase"
  modification: "Acetaminophen + observation; hold next dose until afebrile ≥48h."
  source_refs: [SRC-NCCN-MM-2025]
- condition: "CRS Grade 2-4 OR ICANS Grade 2+"
  modification: "Tocilizumab 8 mg/kg IV ± dexamethasone; escalate to high-dose steroids
    / ICU per institutional CRS protocol."
  rationale: "Severe CRS / ICANS may be fatal if untreated."
  source_refs: [SRC-NCCN-MM-2025]
- condition: "Active infection any time during therapy"
  modification: "Hold elranatamab + targeted antibiotics; resume after resolution;
    consider IVIG if hypogammaglobulinemic."
  rationale: "Infection is the leading cause of treatment-related mortality with bispecifics."
  source_refs: [SRC-NCCN-MM-2025]
- condition: "IgG <400 mg/dL"
  modification: "IVIG 0.4 g/kg q4 weeks (or until IgG >500); continue throughout elranatamab
    + ≥6 mo post-discontinuation."
  rationale: "On-target B-cell aplasia universal; IVIG reduces severe infection rate."
  source_refs: [SRC-NCCN-MM-2025]
- condition: "Persistent Grade 4 cytopenia"
  modification: "Hold; G-CSF; transfusions; resume at next dose level if recovery
    within 4 weeks."

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Elranatamab NOT registered in Ukraine; NOT available domestically.
    International referral pathway (clinical trial / charitable / out-
    of-pocket). Centre must have CRS / ICANS management capability +
    ICU access. Off-the-shelf alternative to BCMA CAR-T.

sources:
- SRC-NCCN-MM-2025

