last_reviewed: "2026-05-01"
notes: >
  One-time inpatient step-up induction phase prior to weekly full-dose
  monotherapy (REGIMEN-ELRANATAMAB-MONO-MM). MagnetisMM-3 schedule:
  12 → 32 → 76 mg SC at days 1, 4, 8 with ≥48h between doses.
  Hospitalization for ≥48h after each step-up dose AND first full
  dose required by FDA label due to CRS risk (~58% any-grade,
  <1% Grade 3+ in MagnetisMM-3). Trial Source
  SRC-MAGNETISMM-3-LESOKHIN-2023 not yet ingested into KB — citing
  NCCN-MM-2025 only; trial Source ingestion pending (flagged in
  commit body).
notes_ua: >
  Одноразова стаціонарна фаза step-up індукції перед щотижневою
  монотерапією повною дозою (REGIMEN-ELRANATAMAB-MONO-MM). Схема
  MagnetisMM-3: 12 → 32 → 76 мг п/ш у дні 1, 4, 8 з ≥48 год між
  дозами. Госпіталізація на ≥48 год після кожної step-up дози ТА
  першої повної дози вимагається маркуванням FDA через ризик CRS
  (~58% будь-якого ступеня, <1% Grade 3+ у MagnetisMM-3). Джерело-стаб
  дослідження SRC-MAGNETISMM-3-LESOKHIN-2023 ще не внесене у KB —
  цитуємо лише NCCN-MM-2025; завантаження джерела очікує.
ukrainian_review_status: pending_clinical_signoff
