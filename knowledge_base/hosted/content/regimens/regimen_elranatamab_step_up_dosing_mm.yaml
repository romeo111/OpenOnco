id: REGIMEN-ELRANATAMAB-STEP-UP-DOSING-MM
name: "Elranatamab BCMA × CD3 bispecific — inpatient step-up dosing schedule"
name_ua: "Елранатамаб BCMA × CD3 біспецифік — стаціонарна схема step-up dosing"
alternate_names:
- "Elranatamab step-up"
- "Elrexfio induction"
- "MagnetisMM-3 step-up phase"

components:
- drug_id: DRUG-ELRANATAMAB
  dose: >
    Step-up dose 1: 12 mg SC on day 1.
    Step-up dose 2: 32 mg SC on day 4 (≥48h after dose 1).
    First full treatment dose: 76 mg SC on day 8 (≥48h after dose 2).
  schedule: "Days 1, 4, 8 of a one-time 8-day inpatient induction window"
  route: SC

cycle_length_days: 8
total_cycles: "1 (one-time step-up; transition to REGIMEN-ELRANATAMAB-MONO-MM weekly)"
toxicity_profile: severe

premedication:
- "Pre-step-up doses (each of 3 doses): dexamethasone 20 mg IV/PO + diphenhydramine
  25 mg IV/PO + acetaminophen 650 mg PO 1h before dosing — required for CRS mitigation
  per FDA label."
- "Tocilizumab 8 mg/kg IV must be on-site for emergency CRS management."
- "Hospitalize for ≥48h after each step-up dose AND first full dose (CRS / ICANS surveillance)
  per FDA label."
mandatory_supportive_care:
- SUP-PJP-PROPHYLAXIS
- SUP-HSV-PROPHYLAXIS
- SUP-IVIG-HYPOGAMMA
dose_adjustments:
- condition: "CRS Grade 1 (fever ≥38°C only) during step-up"
  modification: "Acetaminophen + observation; do not advance to next step-up dose
    until afebrile ≥48h."
  source_refs: [SRC-NCCN-MM-2025]
- condition: "CRS Grade 2 (hypotension responsive to fluids OR low-flow O₂)"
  modification: "Tocilizumab 8 mg/kg IV; ± dexamethasone 10 mg IV q6h; supportive
    care; do not advance step-up until CRS resolved."
  source_refs: [SRC-NCCN-MM-2025]
- condition: "CRS Grade 3-4 OR ICANS Grade 2+"
  modification: "Tocilizumab + high-dose dexamethasone OR methylprednisolone 1 g/day;
    ICU; anakinra for refractory; pause step-up indefinitely pending recovery + multidisciplinary
    review."
  rationale: "Severe CRS / ICANS may be fatal if untreated."
- condition: "Step-up dose delayed >7 days"
  modification: "Restart step-up at the previous tolerated dose level (per FDA label
    / MagnetisMM-3 protocol)."

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Elranatamab NOT registered in Ukraine; NOT available domestically.
    Step-up dosing requires inpatient capability with continuous
    monitoring + tocilizumab on-site + ICU access. International
    referral only.

sources:
- SRC-NCCN-MM-2025

