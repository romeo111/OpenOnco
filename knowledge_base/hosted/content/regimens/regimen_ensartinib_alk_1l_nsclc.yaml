id: REG-ENSARTINIB-ALK-1L-NSCLC
name: "Ensartinib monotherapy (eXalt3) — ALK+ NSCLC, 1L metastatic"
name_ua: "Енсартиніб моно (eXalt3) — ALK+ НДРЛ, 1L метастатичний"
alternate_names:
  - "Ensacove"
  - "X-396"

components:
  - drug_id: DRUG-ENSARTINIB
    dose: "225 mg PO once daily"
    schedule: "Continuous"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: low-moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Rash Grade ≥2 (dominant AE)"
    modification: "Topical steroids + antihistamines; hold for Grade ≥3 until ≤Grade 1; resume at reduced dose (200 → 175 → 150 mg QD)"
    rationale: "Rash is the most distinctive AE vs other ALK-TKIs (~67% all-grade in eXalt3); usually manageable with dermatologic support"
  - condition: "Hepatic transaminase elevation Grade ≥3"
    modification: "Hold; resume at lower dose after recovery"
  - condition: "Pruritus Grade ≥2"
    modification: "Antihistamines, topical care; dose hold if intolerable"
  - condition: "Edema (peripheral / periorbital) Grade ≥2"
    modification: "Diuretics, leg elevation; dose reduction if persistent"
  - condition: "Severe hepatic impairment (Child-Pugh C)"
    modification: "Reduce to 150 mg QD; close monitoring"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Ensartinib NOT registered in UA. FDA-approved 2024-12 for ALK+
    metastatic NSCLC not previously treated with an ALK inhibitor. Access
    via Xcovery / BeiGene named-patient pathway, cross-border (EU) per
    наказ МОЗ 988, or clinical trial. Within ALK 1L armamentarium,
    alectinib (ALEX) and brigatinib (ALTA-1L) remain primary preference;
    ensartinib is an option where alectinib/brigatinib are unavailable
    or contraindicated, given less mature OS data.

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
