# n=290 ALK-TKI-naive ALK+ NSCLC; ensartinib vs crizotinib. mPFS 25.8
# vs 12.7 mo (HR 0.51), independent-review ORR 74 vs 67%, intracranial
# response in CNS-baseline subset 64 vs 21%. Flag per chunk Quality Gate.

last_reviewed: "2026-04-29"
notes: >
  eXalt3 (phase III, n=290): ensartinib vs crizotinib in 1L ALK-TKI-naive
  ALK+ advanced NSCLC. mPFS 25.8 vs 12.7 mo (HR 0.51), CNS ORR 64 vs 21%
  in patients with baseline brain mets. Distinguishing AE profile: rash
  + pruritus dominate (67% all-grade rash; ~12% Grade ≥3) vs alectinib's
  myalgia/hepatic profile or brigatinib's early pulmonary events.
  Single daily dose convenient. Choice within ALK 1L: alectinib (ALEX)
  remains the cross-trial reference for OS + tolerability; brigatinib
  (ALTA-1L) preferred for high CNS burden; ensartinib is a viable
  alternative when access / tolerability dictate, but generally not
  preferred over alectinib/brigatinib/lorlatinib (CROWN) where available.
  Lorlatinib (CROWN) shows the deepest 1L PFS but with neurocognitive
  trade-offs.

notes_ua: >
  eXalt3 (фаза III, n=290): енсартиніб (ensartinib) проти кризотинібу
  у 1L ALK-TKI-наївному ALK+ поширеному НДРЛ. мВБП 25,8 проти 12,7 міс.
  (ВР 0,51), ЗРВ ЦНС 64 проти 21% у пацієнтів з базовими метастазами
  в мозок. Відмінний профіль НЯ: висип + свербіж домінують (67% будь-якого
  ступеня, ~12% ≥3 ст.) на відміну від міалгії/гепатотоксичності алектинібу
  або ранніх пульмональних подій бригатинібу. Енсартиніб (ensartinib)
  225 мг перорально раз на добу. Зручний прийом раз на добу. Вибір у 1L
  ALK: алектиніб (ALEX) залишається міжтраяльним стандартом по ЗВ +
  переносимості; бригатиніб (ALTA-1L) кращий при значному ураженні ЦНС;
  лорлатиніб (CROWN) забезпечує найглибшу мВБП у 1L, але з нейрокогнітивними
  компромісами; енсартиніб — прийнятна альтернатива при недоступності або
  непереносимості алектинібу/бригатинібу/лорлатинібу (схвалений FDA грудень 2024).
