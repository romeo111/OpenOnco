notes: >
  First-in-class subcutaneous CD20×CD3 bispecific T-cell engager for
  relapsed/refractory diffuse large B-cell lymphoma after ≥2 prior lines
  (including patients ineligible for or relapsed after CAR-T). EPCORE
  NHL-1 (Thieblemont et al., J Clin Oncol 2023): in r/r LBCL ≥3L (n=157,
  ~39% prior CAR-T) — ORR ~63%, CR ~39%, median DOR ~12 months, median
  PFS ~4.4 mo, median OS not reached at primary analysis. Step-up dosing
  (0.16 → 0.8 → 48 mg) + cycle-1 corticosteroid prophylaxis reduce CRS
  to predominantly Grade 1-2 (any-grade ~50%, G≥3 ~3%). ICANS ~6%
  any-grade. SC route + ambulatory schedule favourable vs IV bispecifics
  for outpatient-heavy practices. Continuous indefinite dosing (vs 12-cycle
  fixed-duration glofitamab) is the principal sequencing trade-off.
  See REGIMEN-EPCORITAMAB-STEP-UP-DOSING for the standalone cycle-1
  step-up sub-schedule. Trial source SRC-EPCORE-NHL-1-THIEBLEMONT-2023
  absent from KB at chunk authoring time — citing NCCN-BCELL-2025 +
  ESMO-DLBCL-2024 pending source-stub creation.
notes_ua: >
  Перший у класі підшкірний CD20×CD3 біспецифічний Т-клітинний енгейджер для рецидивної/рефрактерної
  дифузної великоклітинної B-клітинної лімфоми після ≥2 попередніх ліній (включно
  з пацієнтами, непридатними для CAR-T або з рецидивом після нього). EPCORE NHL-1
  (Thieblemont et al., J Clin Oncol 2023): у р/р ВКЛ ≥3L (n=157, ~39% попередня CAR-T)
  — ORR ~63%, ПВ ~39%, медіана DOR ~12 місяців, медіана PFS ~4.4 міс, медіана ЗВ не
  досягнута на момент первинного аналізу. Покрокове дозування (0.16 → 0.8 → 48 мг)
  + кортикостероїдна профілактика циклу 1 знижують CRS переважно до 1-2 ступеня (будь-який
  ступінь ~50%, G≥3 ~3%). ICANS ~6% будь-якого ступеня. Підшкірний шлях + амбулаторний
  графік — перевага порівняно з IV біспецифіками для практик з акцентом на амбулаторне
  ведення. Безперервне невизначене дозування (на відміну від 12-циклового фіксованого
  глофітамабу) — головний компроміс послідовності. Див. REGIMEN-EPCORITAMAB-STEP-UP-DOSING
  для окремого підграфіка ескалації циклу 1. Джерело випробування SRC-EPCORE-NHL-1-THIEBLEMONT-2023
  відсутнє в БЗ на момент авторингу чанку — цитуються NCCN-BCELL-2025 + ESMO-DLBCL-2024
  до створення стабу джерела.
