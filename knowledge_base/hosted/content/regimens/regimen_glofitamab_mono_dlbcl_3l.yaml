notes: >
  IV CD20×CD3 bispecific T-cell engager (2:1 CD20-bivalent / CD3-monovalent
  format) with fixed 12-cycle duration for relapsed/refractory diffuse
  large B-cell lymphoma after ≥2 prior lines. NP30179 pivotal phase 2
  (Dickinson et al., NEJM 2022): in r/r DLBCL ≥3L (n=155, ~33% prior
  CAR-T) — ORR ~52%, CR ~39%, median CR DOR not reached, 12-month PFS
  among CR responders ~71%, OS at 12 months ~50%. Obinutuzumab 1000 mg
  IV pretreatment day -7 + step-up dosing (2.5 → 10 → 30 mg in cycle 1)
  + corticosteroid premedication suppress CRS to predominantly Grade 1-2
  (any-grade ~63%, G≥3 ~4%). ICANS ~8% any-grade. Distinguishing feature
  vs epcoritamab is fixed 12-cycle duration (~8.5 months from cycle 1 day 1)
  vs continuous indefinite dosing — improves treatment-free interval +
  immune reconstitution but raises re-treatment-on-progression question
  (not established). See REGIMEN-GLOFITAMAB-OBINUTUZUMAB-PRETREATMENT
  for the standalone day -7 sub-regimen. Trial source SRC-NP30179-DICKINSON-2022
  absent from KB at chunk authoring time — citing NCCN-BCELL-2025 +
  ESMO-DLBCL-2024 pending source-stub creation.
notes_ua: >
  IV CD20×CD3 біспецифічний Т-клітинний енгейджер (формат 2:1 CD20-двовалентний / CD3-моновалентний) з фіксованою тривалістю 12 циклів для рецидивної/рефрактерної дифузної великоклітинної B-клітинної лімфоми після ≥2 попередніх ліній. NP30179 опорне дослідження фази 2 (Dickinson et al., NEJM 2022): у р/р DLBCL ≥3L (n=155, ~33% попередня CAR-T) — ORR ~52%, ПВ ~39%, медіана DOR у пацієнтів з ПВ не досягнута, 12-місячний PFS серед пацієнтів з ПВ ~71%, ЗВ на 12 міс ~50%. Преттрітмент обінутузумабом 1000 мг IV у день -7 + покрокове дозування (2.5 → 10 → 30 мг у циклі 1) + кортикостероїдна премедикація знижують CRS переважно до 1-2 ступеня (будь-який ступінь ~63%, G≥3 ~4%). ICANS ~8% будь-якого ступеня. Ключова відмінність від епкоритамабу — фіксована тривалість 12 циклів (~8.5 міс від циклу 1 дня 1) проти безперервного невизначеного дозування — покращує інтервал без лікування + імунну реконституцію, але порушує питання повторної терапії при прогресії (не встановлено). Див. REGIMEN-GLOFITAMAB-OBINUTUZUMAB-PRETREATMENT для окремого підграфіка дня -7. Джерело випробування SRC-NP30179-DICKINSON-2022 відсутнє в БЗ на момент авторингу чанку — цитуються NCCN-BCELL-2025 + ESMO-DLBCL-2024 до створення стабу джерела.
