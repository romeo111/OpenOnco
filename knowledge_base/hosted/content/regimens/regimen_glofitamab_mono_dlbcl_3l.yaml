id: REGIMEN-GLOFITAMAB-MONO-DLBCL-3L
name: "Glofitamab IV monotherapy with obinutuzumab pretreatment, fixed-duration 12 cycles, for r/r DLBCL ≥3L (NP30179)"
name_ua: "Глофітамаб IV монотерапія з преттрітментом обінутузумабом, фіксована тривалість 12 циклів, для р/р DLBCL у ≥3-й лінії (NP30179)"
alternate_names:
  - "Glofitamab mono DLBCL"
  - "Columvi DLBCL 3L"
  - "NP30179 regimen"

components: []  # phases supersede; obinutuzumab pretreatment is a distinct
                # phase 7 days before cycle-1 step-up dosing
                # (regimen-phases-refactor PR3 — plan-doc 2026-04-28 §4 + §5).

phases:
  - name: obinutuzumab_pretreatment
    purpose_ua: "однократне введення обінутузумабу 1000 мг IV за 7 днів до першої дози глофітамабу — попередня деплеція циркулюючих B-клітин для зниження ризику CRS"
    purpose_en: "single 1000 mg IV obinutuzumab dose 7 days before first glofitamab dose — pre-deplete circulating B-cells to mitigate first-dose CRS"
    duration: "1 day, day -7"
    timing_relative_to: "main"
    timing_offset_days: -7
    optional: false
    components:
      - drug_id: DRUG-OBINUTUZUMAB
        dose: "1000 mg IV single dose (Gpt — pretreatment dose; not weight-adjusted at this dose)"
        schedule: "Day -7 (7 days before glofitamab cycle 1 day 1); standard anti-CD20 infusion premedication required"
        route: IV
    sources:
      - SRC-NCCN-BCELL-2025
  - name: main
    purpose_ua: "глофітамаб з покроковим дозуванням у циклі 1 (2.5 → 10 → 30 мг), потім 30 мг IV у день 1 кожного 21-денного циклу до циклу 12 (фіксована тривалість)"
    purpose_en: "glofitamab with cycle-1 step-up dosing (2.5 → 10 → 30 mg), then 30 mg IV day 1 of each 21-day cycle through cycle 12 (fixed duration)"
    duration: "12 cycles × 21 days ≈ 8.5 months from cycle 1 day 1"
    timing_relative_to: "absolute"
    optional: false
    components:
      - drug_id: DRUG-GLOFITAMAB
        dose: "Cycle 1: 2.5 mg IV day 1 (step-up dose 1) → 10 mg IV day 8 (step-up dose 2) → 30 mg IV day 15 (first full dose); Cycles 2-12: 30 mg IV day 1 of each 21-day cycle; STOP at end of cycle 12 (no maintenance)"
        schedule: "21-day cycles; cycle 1 day 15 first 30 mg dose requires hospital-monitored 4-8h observation for CRS"
        route: IV
    sources:
      - SRC-NCCN-BCELL-2025

cycle_length_days: 21
total_cycles: "12 cycles fixed duration; no maintenance; re-treatment on progression not established"

toxicity_profile: severe

premedication:
  - "Obinutuzumab pretreatment day -7 (see obinutuzumab_pretreatment phase) — MANDATORY"
  - "Cycle 1 day 1, day 8, day 15 mandatory pre-medication BEFORE each glofitamab dose:"
  - "  - Dexamethasone 20 mg IV (or methylprednisolone 80 mg IV equivalent) 30-60 min pre-dose"
  - "  - Acetaminophen 650-1000 mg PO 30-60 min pre-dose"
  - "  - Diphenhydramine 25-50 mg IV/PO 30-60 min pre-dose"
  - "Hospital admission / extended-monitoring (≥4-8 hours) required for first 30 mg full dose (cycle 1 day 15) — CRS observation window"
  - "Pre-treatment infectious workup (HBV / HCV / HIV) — HBV reactivation risk; entecavir / tenofovir prophylaxis if HBcAb+"
  - "Adequate hydration day-of-dose; baseline ECG + cardiac risk assessment"

mandatory_supportive_care:
  - SUP-PJP-PROPHYLAXIS
  - SUP-HSV-PROPHYLAXIS
  - SUP-HBV-PROPHYLAXIS

monitoring_schedule_id:

dose_adjustments:
  - condition: "CRS Grade 1 (fever ≥38°C without hypotension/hypoxia)"
    modification: "Supportive care + antipyretics; continue scheduled dosing under close observation"
    rationale: "NP30179 any-grade CRS ~63%, predominantly Grade 1-2 and confined to cycle 1; obinutuzumab pretreatment + step-up + corticosteroid premedication substantially reduce risk"
    source_refs:
      - SRC-NCCN-BCELL-2025
  - condition: "CRS Grade 2 (hypotension fluid-responsive OR hypoxia low-flow O₂)"
    modification: "Hold next dose; tocilizumab 8 mg/kg IV (max 800 mg) ± dexamethasone 10 mg IV q6h; resume after resolution"
    rationale: "IL-6R blockade is first-line; class precedent from CAR-T CRS management"
    source_refs:
      - SRC-NCCN-BCELL-2025
  - condition: "CRS Grade 3-4"
    modification: "Hold; tocilizumab + high-dose dexamethasone (10-20 mg q6h) or methylprednisolone 1 g/day; ICU; permanent discontinuation for recurrent G3 or any G4"
    rationale: "Severe CRS may be fatal if untreated; aggressive immunomodulation indicated"
    source_refs:
      - SRC-NCCN-BCELL-2025
  - condition: "ICANS any grade"
    modification: "Hold glofitamab; dexamethasone 10 mg IV q6h for G≥2; intensify per CAR-T-style protocols for G3-4; permanent discontinuation for G4"
    rationale: "ICANS ~8% any grade in NP30179; managed similarly to CAR-T ICANS"
    source_refs:
      - SRC-NCCN-BCELL-2025
  - condition: "Severe / opportunistic infection (G≥3)"
    modification: "Hold glofitamab until resolved; broad-spectrum antimicrobials; consider IVIG if IgG <400 + recurrent infections"
    rationale: "B-cell aplasia + hypogammaglobulinaemia common but recover faster after fixed-duration discontinuation than with continuous bispecifics"
    source_refs:
      - SRC-NCCN-BCELL-2025
  - condition: "Missed dose >2 weeks"
    modification: "Consider re-introduction of step-up dosing if interval prolonged; consult prescribing information"
    rationale: "Re-step-up mitigates CRS risk after prolonged interruption"
    source_refs: []

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Glofitamab (Columvi) NOT registered in Ukraine as of 2026-04-29; no
    NSZU reimbursement pathway. Obinutuzumab IS registered domestically
    (separate indication for follicular lymphoma) but its use as
    glofitamab pretreatment is off-label without registered partner drug.
    The fixed-duration 12-cycle schedule has favourable access economics
    over indefinite continuous bispecifics if registration is achieved
    later. Access via international clinical trial or compassionate-use
    only at this time. Cost — out-of-pocket if accessed abroad —
    comparable to other novel lymphoma biologics.

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024

