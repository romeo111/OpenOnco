last_reviewed: "2026-05-01"

notes: >
  Standalone authoring of the obinutuzumab single-dose pretreatment
  sub-regimen used to pre-deplete circulating CD20+ B-cells 7 days
  before glofitamab cycle 1 day 1. Mechanistically reduces CRS risk by
  shrinking the bispecific T-cell-engager substrate at first exposure;
  in NP30179 the combined obinutuzumab pretreatment + glofitamab step-up
  + corticosteroid premedication strategy held G≥3 CRS to ~4%. Sub-regimen
  entity authored separately for reuse across DLBCL / FL / future
  glofitamab combinations and to allow the renderer to surface the day -7
  scheduling requirement as a distinct phase in patient-facing plans.
  Pair with parent schedule (REGIMEN-GLOFITAMAB-MONO-DLBCL-3L) starting
  7 days later. Trial source SRC-NP30179-DICKINSON-2022 absent from KB
  at chunk authoring time.
notes_ua: >
  Окреме авторінг підрегіму однократної премедикації обінутузумабом, що використовується
  для попередньої деплеції циркулюючих CD20+ B-клітин за 7 днів до циклу 1 дня 1 глофітамабу.
  Механістично знижує ризик CRS шляхом зменшення субстрату для біспецифічного Т-клітинного
  енгейджера при першому впливі; у NP30179 поєднана стратегія премедикації обінутузумабом
  + ескалаційного дозування глофітамабу + кортикостероїдної премедикації утримала
  CRS G≥3 на рівні ~4%. Сутність підрегіму створена окремо для повторного використання
  у DLBCL / FL / майбутніх комбінаціях глофітамабу та для того, щоб рендерер міг відобразити
  вимогу планування дня -7 як окрему фазу у планах для пацієнтів. Поєднувати з батьківським
  графіком (REGIMEN-GLOFITAMAB-MONO-DLBCL-3L), що починається через 7 днів. Джерело
  випробування SRC-NP30179-DICKINSON-2022 відсутнє в БЗ на момент авторингу чанку.
