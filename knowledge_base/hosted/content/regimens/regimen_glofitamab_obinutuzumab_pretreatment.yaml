id: REGIMEN-GLOFITAMAB-OBINUTUZUMAB-PRETREATMENT
name: "Obinutuzumab single-dose pretreatment 7 days before glofitamab cycle 1 (CRS
  mitigation)"
name_ua: "Однократне введення обінутузумабу за 7 днів до циклу 1 глофітамабу (мітигація
  CRS)"
alternate_names:
- "Obinutuzumab Gpt"
- "Glofitamab pretreatment"
- "Gpt day -7"

components:
- drug_id: DRUG-OBINUTUZUMAB
  dose: "1000 mg IV single dose (Gpt — pretreatment dose; not weight-adjusted at this
    dose)"
  schedule: "Day -7 (7 days before glofitamab cycle 1 day 1); standard anti-CD20 infusion
    premedication; infusion-rate escalation per obinutuzumab prescribing information"
  route: IV

cycle_length_days:
total_cycles: "Single 1000 mg IV dose; not repeated; precedes definitive glofitamab
  schedule (REGIMEN-GLOFITAMAB-MONO-DLBCL-3L) by 7 days"

toxicity_profile: moderate

premedication:
- "Standard anti-CD20 infusion premedication 30-60 min pre-dose:"
- "  - Acetaminophen 650-1000 mg PO"
- "  - Diphenhydramine 25-50 mg PO/IV"
- "  - Methylprednisolone 80-100 mg IV (or equivalent)"
- "Pre-treatment HBV serology — entecavir / tenofovir prophylaxis if HBcAb+ (HBV reactivation
  risk class label across anti-CD20 antibodies)"
- "Slow infusion rate per obinutuzumab prescribing information for first dose; observe
  ≥1h post-infusion for IRR"
- "This is a sub-regimen — must be paired with REGIMEN-GLOFITAMAB-MONO-DLBCL-3L (or
  future glofitamab combinations) starting 7 days later; not used standalone as definitive
  therapy"

mandatory_supportive_care:
- SUP-HBV-PROPHYLAXIS
monitoring_schedule_id:

dose_adjustments:
- condition: "Infusion-related reaction (IRR) Grade 1-2"
  modification: "Slow infusion rate; supportive care + additional antihistamine; resume
    at slower rate after symptoms resolve"
  rationale: "IRR most common with anti-CD20 first dose; obinutuzumab IRR rate ~65%
    any grade in CD20+ B-cell malignancies"
  source_refs: []
- condition: "IRR Grade 3-4"
  modification: "Hold infusion; aggressive supportive care; permanent discontinuation
    for life-threatening IRR; in that case glofitamab pretreatment is incomplete —
    discuss with treating team whether to proceed with glofitamab cycle 1 at a more
    conservative step-up schedule or defer"
  rationale: "Without obinutuzumab pretreatment, glofitamab cycle 1 CRS risk is substantially
    higher; deferring or modifying may be safer than proceeding without pretreatment"
  source_refs:
  - SRC-NCCN-BCELL-2025
- condition: "HBV reactivation evidence (HBV DNA detection during/after pretreatment)"
  modification: "Hold glofitamab; intensify antiviral therapy; consult hepatology"
  rationale: "Anti-CD20 class effect; HBV reactivation can be fatal if untreated"
  source_refs:
  - SRC-NCCN-BCELL-2025
- condition: "Severe / opportunistic infection at time of pretreatment"
  modification: "Defer pretreatment + glofitamab cycle 1 until infection controlled"
  rationale: "B-cell depletion in active infection raises mortality"
  source_refs:
  - SRC-NCCN-BCELL-2025

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: >
    Obinutuzumab IS registered in Ukraine (separate indication for
    follicular lymphoma); reimbursement varies by indication. Use as
    glofitamab pretreatment is off-label without registered partner drug
    (glofitamab itself is not registered domestically). If glofitamab
    becomes available domestically or via international referral, this
    pretreatment sub-regimen is administrable using domestically-sourced
    obinutuzumab.

sources:
- SRC-NCCN-BCELL-2025

