last_reviewed: "2026-04-29"
notes: >
  KarMMa (NCT03361748, Munshi NEJM 2021): single-infusion ide-cel
  (BCMA-directed CAR-T, 4-1BB costimulation, murine scFv) in
  heavily pretreated R/R multiple myeloma after ≥3 prior lines
  including PI + IMiD + anti-CD38 (n=128, median 6 prior lines).
  ORR 73% overall, 81% at 450×10⁶ dose; sCR 33%; mPFS 8.8 mo
  (450×10⁶ dose 12.1 mo); mOS 24.8 mo. KarMMa-3 (Rodriguez-Otero
  NEJM 2023, separate publication TODO source) expanded to 2L+ in
  triple-class-exposed patients with superior PFS vs standard
  triplet (mPFS 13.3 vs 4.4 mo). FDA approval Mar 2021 (3L+),
  expanded Apr 2024 (2L+ triple-class-exposed). Centre must be
  FACT/JACIE/REMS-accredited. Boxed warnings: CRS, ICANS,
  HLH/MAS, prolonged cytopenia, secondary T-cell malignancy
  (FDA 2024 class warning). Single curative-intent attempt;
  no maintenance. STUB — pending Co-Lead sign-off.
notes_ua: >
  KarMMa (NCT03361748, Munshi NEJM 2021): одноразова інфузія ide-cel
  (BCMA-направлена CAR-T, 4-1BB костимуляція, мишачий scFv) у
  важко-пролікованій р/р множинній мієломі після ≥3 попередніх ліній
  включно з PI + IMiD + анти-CD38 (n=128, медіана 6 попередніх ліній).
  ORR 73% загалом, 81% на дозі 450×10⁶; sCR 33%; mPFS 8.8 міс.
  (доза 450×10⁶ — 12.1 міс.); mOS 24.8 міс. KarMMa-3 (Rodriguez-Otero
  NEJM 2023, окрема публікація — джерело TODO) розширила показання
  на 2L+ для тричі-класно-експонованих пацієнтів із вищим PFS
  порівняно зі стандартним триплетом (mPFS 13.3 vs 4.4 міс.).
  Реєстрація FDA — березень 2021 (3L+), розширення — квітень 2024
  (2L+ тричі-класно-експоновані). Центр має бути
  FACT/JACIE/REMS-акредитований. Спеціальні попередження в інструкції:
  CRS, ICANS, HLH/MAS, тривала цитопенія, вторинні T-клітинні
  злоякісні новоутворення (класове попередження FDA 2024).
  Одноразова куративна спроба; підтримуюча терапія відсутня.
  STUB — очікує клінічного підтвердження Co-Lead.
