last_reviewed: "2026-05-01"

notes: >
  CD19 CAR-T (4-1BB costimulation) with defined 1:1 CD4:CD8 cell composition
  for r/r large B-cell lymphoma (DLBCL NOS, HGBL incl. double/triple-hit,
  PMBCL, FL grade 3B, transformed indolent NHL) after ≥2 prior lines of
  systemic therapy. TRANSCEND NHL 001 (Abramson et al., Lancet 2020):
  ORR 73%, CR 53%, durable responses sustained ≥1 year in ~40%; favourable
  CRS/ICANS profile vs other anti-CD19 CAR-T (any-grade CRS 42% / G≥3 2%;
  any-grade ICANS 30% / G≥3 10%). Boxed warnings: CRS, ICANS, secondary
  T-cell malignancy (FDA 2024 class label). REMS / FACT-JACIE-accredited
  centre mandatory. Caregiver presence x 4 weeks post-infusion standard.
  Axi-cel (REG-CAR-T-AXICEL) and tisa-cel are alternative CD19 CAR-T
  products at 3L+; sequencing depends on local availability + toxicity
  considerations (liso-cel often preferred for older / higher comorbidity
  patients given lower G≥3 CRS/ICANS rates). For 2L primary-refractory or
  early-relapse (<12 mo) DLBCL see REGIMEN-LISOCEL-DLBCL-2L (TRANSFORM).
notes_ua: >
  CD19 CAR-T (4-1BB костимуляція) з визначеним співвідношенням CD4:CD8 = 1:1 для рецидивної/рефрактерної великоклітинної B-клітинної лімфоми (DLBCL NOS, HGBL включно з double/triple-hit, ПМЛБК, FL grade 3B, трансформована індолентна НХЛ) після ≥2 попередніх ліній системної терапії. TRANSCEND NHL 001 (Abramson et al., Lancet 2020): ORR 73%, ПВ 53%, стійка відповідь ≥1 рік у ~40%; сприятливий профіль CRS/ICANS порівняно з іншими anti-CD19 CAR-T (CRS будь-якого ступеня 42% / G≥3 2%; ICANS будь-якого ступеня 30% / G≥3 10%). Спеціальні попередження в інструкції: CRS, ICANS, вторинне Т-клітинне злоякісне новоутворення (клас-маркер FDA 2024). REMS / FACT-JACIE-акредитований центр обов'язковий. Присутність опікуна протягом 4 тижнів після інфузії — стандарт. Аксікабтаген цилолейцел (REG-CAR-T-AXICEL) та тисагенлеклеуцел — альтернативні CD19 CAR-T продукти у 3L+; послідовність залежить від локальної доступності та профілю токсичності (ліcо-cel часто бажаний для старших/коморбідних пацієнтів через нижчу частоту CRS/ICANS G≥3). Для 2L первинно рефрактерної або раннього рецидиву (<12 міс) DLBCL — див. REGIMEN-LISOCEL-DLBCL-2L (TRANSFORM).
