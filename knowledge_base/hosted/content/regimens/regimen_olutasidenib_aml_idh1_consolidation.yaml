id: REG-OLUTASIDENIB-AML-IDH1-CONSOLIDATION
name: "Olutasidenib monotherapy (R/R IDH1-mutant AML, post-induction consolidation/maintenance)"
name_ua: "Олутасиденіб моно (Р/Р IDH1-мутований ГМЛ, консолідація/підтримання після індукції)"
alternate_names:
  - "Rezlidhia AML"
  - "FT-2102"
  - "Study 2102-HEM-101 regimen"

components:
  - drug_id: DRUG-OLUTASIDENIB
    dose: "150 mg PO twice daily on an empty stomach (≥1 hour before or 2 hours after a meal), continuous"
    schedule: "Continuous BID dosing in 28-day cycles until disease progression, unacceptable toxicity, or transition to allo-HSCT"
    route: PO

cycle_length_days: 28
total_cycles: "Until progression, unacceptable toxicity, or HSCT transition; median treatment duration in pivotal trial ~4-6 cycles in responders"
toxicity_profile: moderate

premedication:
  - "Confirm IDH1 mutation by validated PCR / NGS assay (R132H most common; R132C/L/G/S also targeted)"
  - "Document prior failure / intolerance of intensive induction OR ineligibility for intensive chemo"
  - "Baseline ECG (QTcF) — QT prolongation risk; correct electrolytes"
  - "Baseline LFTs (AST, ALT, total bilirubin) — Grade ≥3 transaminitis ~21%, hepatotoxicity BOXED WARNING"
  - "Baseline CBC + differential — monitor for differentiation syndrome (DS) for first 1-3 months"
  - "Educate patient on DS warning signs (dyspnea, weight gain, edema, fever, hypotension) — instruct to call clinic same-day"
  - "Avoid strong CYP3A4 inducers (rifampin, phenytoin, carbamazepine, St John's wort) — reduce olutasidenib exposure"

mandatory_supportive_care:
  - SUP-TLS-PROPHYLAXIS
  - SUP-PJP-PROPHYLAXIS

monitoring_schedule_id:

dose_adjustments:
  - condition: "Differentiation syndrome (any grade) — fever, dyspnea, hypoxia, pulmonary infiltrates, pleural/pericardial effusion, weight gain, edema, hypotension"
    modification: "Initiate dexamethasone 10 mg IV q12h immediately; diuretics for fluid overload; hold olutasidenib for severe (Grade ≥3) DS or symptoms not improving within 48 hours of steroids; resume at same dose once symptoms resolve to ≤Grade 2"
    rationale: "BOXED WARNING — DS occurred in ~16% of pivotal trial patients (Study 2102-HEM-101); can be fatal if untreated; can occur 1 day to 5 months after initiation"
    source_refs:
      - SRC-NCCN-AML-2025
  - condition: "Grade ≥3 hepatotoxicity (AST/ALT >5× ULN OR total bilirubin >3× ULN)"
    modification: "Hold until ≤Grade 1; resume at 150 mg PO once daily (one dose level reduction); permanently discontinue if not recovered within 28 days OR recurrent at reduced dose"
    rationale: "BOXED WARNING — hepatotoxicity median onset ~2 months; transaminitis Grade ≥3 ~21%; weekly LFT monitoring × first 2 months recommended"
    source_refs:
      - SRC-NCCN-AML-2025
  - condition: "QTcF >480 ms OR change >60 ms from baseline"
    modification: "Hold; correct electrolytes (K, Mg); review concomitant QT-prolonging drugs; resume once QTcF <480 ms; permanently discontinue if Torsades or sustained QTcF >500 ms"
    rationale: "Class effect of IDH inhibitors; periodic ECG mandated"
    source_refs:
      - SRC-NCCN-AML-2025
  - condition: "Grade 4 cytopenia ≥28 days"
    modification: "Hold until recovery to Grade ≤2; resume at 150 mg PO once daily; permanently discontinue if recurrent Grade 4 ≥28 days at reduced dose"
    rationale: "Differentiation effect on hematopoiesis; transient cytopenias common during induction phase of IDH inhibitor therapy"
    source_refs:
      - SRC-NCCN-AML-2025
  - condition: "Concurrent strong CYP3A4 inducer (rifampin, phenytoin, carbamazepine, St John's wort)"
    modification: "Avoid; if unavoidable, increase olutasidenib to 300 mg PO BID with close monitoring"
    rationale: "AUC reduction risk; loss of efficacy"
    source_refs:
      - SRC-NCCN-AML-2025
  - condition: "Allogeneic HSCT donor identified + fit for transplant"
    modification: "Continue olutasidenib through induction/consolidation; transition to HSCT preparative regimen per institutional protocol; do not delay HSCT for olutasidenib continuation"
    rationale: "Olutasidenib is a bridge to HSCT in fit patients; HSCT remains curative-intent goal in IDH1-mutant AML"
    source_refs:
      - SRC-NCCN-AML-2025

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Olutasidenib (Rezlidhia) NOT registered in Ukraine; NOT reimbursed by NSZU. Access via individual import / international pharmacy / clinical trial only. Out-of-pocket cost USD 25-30K/month. IDH1 mutation testing available at specialized molecular hematology labs (Kyiv, Lviv) but not all NSZU-covered. Ivosidenib (alternative IDH1 inhibitor) similarly not registered."

sources:
  - SRC-NCCN-AML-2025

last_reviewed: "2026-04-29"
notes: >
  Selective IDH1 inhibitor for R/R IDH1-mutant AML in adults. Pivotal Study
  2102-HEM-101 (single-arm, n=153, R/R IDH1-mut AML, olutasidenib 150 mg
  PO BID) — CR + CRh 35%; mDOR 25.9 mo (CR/CRh subgroup); transfusion
  independence 56-month; ~30% transitioned to allo-HSCT. Compares
  favorably to ivosidenib (alternative IDH1 inhibitor — separate regimen
  entity, future). BOXED WARNINGS: differentiation syndrome (~16%) +
  hepatotoxicity (~21% Grade ≥3 transaminitis). Used as bridge to allo-HSCT
  in fit patients. Ivosidenib + azacitidine combination (AGILE trial,
  newly-diagnosed unfit IDH1-mut AML) is a separate regimen entity.
  STUB — pending Study 2102-HEM-101 trial Source ingestion
  (SRC-OLUTASIDENIB-2102-HEM-101) and Co-Lead sign-off.
notes_ua: >
  Селективний інгібітор IDH1 для дорослих рецидиву/рефрактерного IDH1-мутованого
  ГМЛ. Реєстраційне дослідження 2102-HEM-101 (одногрупове, n=153, Р/Р
  IDH1-мут ГМЛ, олутасиденіб 150 мг PO BID) — CR + CRh 35%; mDOR 25.9 міс
  (підгрупа CR/CRh); незалежність від трансфузій 56 місяців; ~30% перейшли
  до алло-ТГСК. Порівнюється сприятливо з івосиденібом (альтернативний
  інгібітор IDH1 — окрема сутність схеми, у майбутньому). ЗАСТЕРЕЖЕННЯ В
  РАМЦІ: синдром диференціювання (~16%) + гепатотоксичність (~21%
  трансаміназ Grade ≥3). Використовується як bridge до алло-ТГСК у
  придатних пацієнтів. Комбінація івосиденіб + азацитидин (дослідження
  AGILE, вперше діагностований непридатний IDH1-мут ГМЛ) є окремою
  сутністю схеми. STUB — очікує ingestion Study 2102-HEM-101 trial Source
  та підпис клінічного Co-Lead.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
