id: REG-REPOTRECTINIB-NTRK-PAN-TUMOR
name: "Repotrectinib monotherapy (TRIDENT-1) — NTRK-fusion+ solid tumors (pan-tumor, TKI-naive or post-prior TRK-TKI)"
name_ua: "Репотректініб моно (TRIDENT-1) — NTRK-fusion+ солідні пухлини (TKI-naive або після TRK-TKI)"
alternate_names:
  - "Augtyro"
  - "TPX-0005"

components:
  - drug_id: DRUG-REPOTRECTINIB
    dose: "160 mg PO once daily x14 days, then 160 mg PO BID continuous (lead-in mitigates CNS-AE)"
    schedule: "Lead-in then continuous"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Vestibular / dizziness Grade ≥2"
    modification: "Maintain dose if tolerable; reduce to 120 mg BID if Grade 3 or persistent; usually adapts after 4-8 weeks"
    rationale: "Vestibular AE ~60% but usually transient with continued therapy"
    source_refs: [SRC-TRIDENT1-DRILON-2024]
  - condition: "Hepatic transaminase elevation Grade ≥3"
    modification: "Hold; resume at lower dose"
    source_refs: [SRC-TRIDENT1-DRILON-2024]
  - condition: "Skeletal fracture (long-term)"
    modification: "Bone density monitoring; bisphosphonate consideration"
  - condition: "CNS effects (paresthesia, mood change, cognitive)"
    modification: "Lead-in dosing first; reduce to 120 mg BID if persistent Grade ≥2"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Repotrectinib NOT registered in UA. FDA-approved 2024-06 for adult +
    pediatric (≥12 yo) NTRK-fusion+ locally advanced or metastatic solid
    tumors after prior systemic therapy or where surgical resection causes
    severe morbidity. Access via BMS named-patient pathway (Augtyro EAP),
    cross-border (EU), or clinical trial. Distinct from REG-REPOTRECTINIB-NSCLC
    (ROS1+ NSCLC indication).

sources:
  - SRC-TRIDENT1-DRILON-2024
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

last_reviewed: "2026-04-29"
notes: >
  TRIDENT-1 NTRK cohort: TKI-naive ORR 58%, mPFS not reached (≥1 yr
  follow-up), intracranial activity demonstrated. TKI-pretreated NTRK
  ORR 50% incl. activity against solvent-front (G595R, G623R) and
  gatekeeper resistance mutations that compromise larotrectinib /
  entrectinib. FDA approval 2024-06 covers pan-tumor NTRK-fusion+
  scope independent of organ-of-origin. Mechanistic edge: rigid
  macrocyclic scaffold designed to bypass canonical TRK resistance
  positions. Lead-in dosing (160 mg QD x 14d → 160 mg BID) critical
  to manage CNS/vestibular AE — direct BID worsens vestibular toxicity.
  Pediatric ≥12 yo dosing 160 mg QD lead-in then 160 mg BID (adult
  scheme) per FDA label.
