id: REG-TALAZOPARIB-MONO-BREAST
name: "Talazoparib monotherapy (gBRCA-mutant HER2- locally advanced or metastatic breast)"
name_ua: "Талазопариб моно (gBRCA-мут HER2- місцево-поширений або метастатичний РМЗ)"
alternate_names: ["EMBRACA regimen"]

components:
  - drug_id: DRUG-TALAZOPARIB
    dose: "1 mg PO once daily continuous"
    schedule: "Continuous, no off-day; reduce to 0.75 / 0.5 / 0.25 mg for AE management"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: moderate

premedication:
  - "Baseline CBC; weekly CBC first month, then monthly — anemia is dominant AE"
  - "Confirm germline BRCA1/2 pathogenic/likely-pathogenic variant pre-start"
  - "Antiemetic prn at first dose"
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Anemia G≥3 (Hb <8 g/dL) or transfusion-dependent"
    modification: "Hold until ≤G2; resume at 0.75 mg → 0.5 mg → 0.25 mg PO daily; transfusion support; iron/EPO per institutional protocol"
  - condition: "Neutropenia G≥3 (ANC <1.0 ×10⁹/L)"
    modification: "Hold until ≤G2; resume at reduced dose; G-CSF prophylaxis per ASCO guideline if recurrent"
  - condition: "Thrombocytopenia G≥3 (PLT <50 ×10⁹/L)"
    modification: "Hold until ≤G2; resume at reduced dose; transfusion support if symptomatic"
  - condition: "Pneumonitis suspect"
    modification: "Hold immediately; pulmonology evaluation; permanent discontinuation if confirmed G≥2 (PARP class effect)"
  - condition: "MDS/AML suspect (persistent cytopenia, dysplastic blood smear)"
    modification: "Hold; bone marrow biopsy + cytogenetics; permanent discontinuation if confirmed"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Talazoparib registered in Ukraine for HER2- BRCA-mutant metastatic breast (EMBRACA indication). NSZU does not cover for breast as of 2026-04 — patients pay out-of-pocket or charity. Major access barrier despite registration."

sources: [SRC-EMBRACA-LITTON-2018, SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Talazoparib for BRCA+ HER2- metastatic breast (EMBRACA). Same PARPi
# pattern as olaparib + higher rates of cytopenia (especially anemia
# requiring transfusions). STUB pending §6.1 signoff.
