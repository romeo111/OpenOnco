last_reviewed:
notes: >
  EMBRACA (NCT01945775): Phase III, gBRCA1/2-mutant HER2- locally
  advanced or metastatic breast cancer (≤3 prior cytotoxic regimens
  for advanced disease). Talazoparib 1 mg PO daily vs physician's-
  choice single-agent chemo (capecitabine / eribulin / gemcitabine /
  vinorelbine). Median PFS 8.6 vs 5.6 mo (HR 0.54); ORR 62.6% vs
  27.2%. OS not significantly different at final analysis (HR 0.85,
  p=0.17). FDA approval Oct 2018. Greater PARP-trapping potency than
  olaparib — anemia is dose-limiting AE (~53% any grade, ~39% G≥3);
  transfusion support frequently required. Germline BRCA1/2 testing
  (peripheral blood) required pre-start. Monotherapy alternative to
  olaparib OlympiAD; head-to-head not done.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
