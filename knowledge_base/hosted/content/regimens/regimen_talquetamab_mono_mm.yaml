id: REGIMEN-TALQUETAMAB-MONO-MM
name: "Talquetamab GPRC5D × CD3 bispecific monotherapy — SC (post step-up; QW or Q2W schedule)"
name_ua: "Талквотамаб GPRC5D × CD3 біспецифік у монотерапії — підшкірно (після step-up; QW або Q2W схема)"
alternate_names:
  - "Talquetamab monotherapy"
  - "Talvey"
  - "MonumenTAL-1 monotherapy"

components:
  - drug_id: DRUG-TALQUETAMAB
    dose: >
      After step-up (REGIMEN-TALQUETAMAB-STEP-UP-DOSING-MM), choose ONE
      of two FDA-approved schedules per MonumenTAL-1 dosing cohorts:
      (a) 0.4 mg/kg SC once weekly, or
      (b) 0.8 mg/kg SC every 2 weeks (Q2W cohort — see
      REGIMEN-TALQUETAMAB-QW-Q2W-MM).
    schedule: "Weekly OR every 2 weeks SC, continuous"
    route: SC

cycle_length_days: 7
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: severe

premedication:
  - "Premedication discontinued after step-up unless symptomatic CRS recurs."
  - "Tocilizumab 8 mg/kg IV must remain on-site for emergency CRS management throughout therapy."
  - "Oral / dental / nutrition assessment at baseline + ≥q3 months — GPRC5D on-target toxicities (dysgeusia, oral mucosal/skin/nail changes, weight loss) common (~70%) and may require dose modification."
mandatory_supportive_care:
  - SUP-PJP-PROPHYLAXIS
  - SUP-HSV-PROPHYLAXIS
  - SUP-IVIG-HYPOGAMMA

dose_adjustments:
  - condition: "CRS Grade 1 during full-dose phase"
    modification: "Acetaminophen + observation; hold next dose until afebrile ≥48h."
    source_refs: [SRC-NCCN-MM-2025]
  - condition: "CRS Grade 2-4 OR ICANS Grade 2+"
    modification: "Tocilizumab 8 mg/kg IV ± dexamethasone; escalate to high-dose steroids / ICU per institutional CRS protocol."
    rationale: "Severe CRS / ICANS may be fatal if untreated."
    source_refs: [SRC-NCCN-MM-2025]
  - condition: "Active infection any time during therapy"
    modification: "Hold talquetamab + targeted antibiotics; resume after resolution; consider IVIG if hypogammaglobulinemic."
    rationale: "Infection risk lower than with BCMA bispecifics but still significant; vigilance required."
    source_refs: [SRC-NCCN-MM-2025]
  - condition: "Severe dysgeusia / weight loss >10% / inability to maintain oral intake"
    modification: "Dose hold until improvement to Grade ≤1; consider dose interval extension (QW→Q2W) or dose reduction; nutrition consult."
    rationale: "GPRC5D on-target oral / taste / weight toxicities are dose-limiting in MonumenTAL-1 — interval extension preserves response with improved tolerability."
    source_refs: [SRC-NCCN-MM-2025]
  - condition: "Grade 3+ skin / nail toxicity"
    modification: "Topical corticosteroids; emollients; dose hold for severe / symptomatic cases until Grade ≤1; consider interval extension on resumption."
    rationale: "On-target GPRC5D expression in keratinized epithelia."
  - condition: "IgG <400 mg/dL"
    modification: "IVIG 0.4 g/kg q4 weeks (or until IgG >500); continue throughout talquetamab + ≥6 mo post-discontinuation."
    rationale: "B-cell aplasia less universal than with BCMA bispecifics but supplementation still indicated when hypogammaglobulinemic."
    source_refs: [SRC-NCCN-MM-2025]

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Talquetamab NOT registered in Ukraine; NOT available domestically.
    International referral pathway (clinical trial / charitable / out-
    of-pocket). Centre must have CRS / ICANS management capability +
    ICU access. Non-BCMA target — consider for patients progressing
    on prior BCMA-directed therapy (CAR-T or BCMA bispecific).

sources:
  - SRC-NCCN-MM-2025

last_reviewed: "2026-05-01"
notes: >
  Full-dose monotherapy phase of talquetamab (first-in-class GPRC5D ×
  CD3 bispecific) — separated from step-up phase
  (REGIMEN-TALQUETAMAB-STEP-UP-DOSING-MM). MonumenTAL-1 (Chari 2022,
  NEJM): triple-class refractory MM after ≥3 prior lines — ORR ~74%
  (0.4 mg/kg QW), ~72% (0.8 mg/kg Q2W); mDOR ~9-13 mo. FDA approved
  2023 for triple-class refractory MM. Orthogonal to BCMA — active
  in patients with prior BCMA exposure (~63% ORR after BCMA CAR-T /
  bispecific). Trial Source SRC-MONUMENTAL-1-CHARI-2022 not yet
  ingested into KB — citing NCCN-MM-2025 only; trial Source
  ingestion pending (flagged in commit body).
notes_ua: >
  Фаза повної дози монотерапії талквотамабом (перший у класі GPRC5D ×
  CD3 біспецифік) — відокремлена від фази step-up
  (REGIMEN-TALQUETAMAB-STEP-UP-DOSING-MM). MonumenTAL-1 (Chari 2022,
  NEJM): triple-class рефрактерна ММ після ≥3 ліній — ORR ~74%
  (0.4 мг/кг QW), ~72% (0.8 мг/кг Q2W); mDOR ~9-13 міс. FDA схвалено
  2023 для triple-class рефрактерної ММ. Ортогональний до BCMA —
  активний у пацієнтів з попередньою експозицією BCMA (~63% ORR
  після BCMA CAR-T / біспецифіка). Джерело-стаб дослідження
  SRC-MONUMENTAL-1-CHARI-2022 ще не внесене у KB — цитуємо лише
  NCCN-MM-2025; завантаження джерела очікує.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
