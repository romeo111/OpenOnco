id: REGIMEN-TECLISTAMAB-MONO-MM
name: "Teclistamab BCMA × CD3 bispecific monotherapy — continuous SC weekly (post step-up)"
name_ua: "Теклістамаб BCMA × CD3 біспецифік у монотерапії — підшкірно щотижня (після step-up)"
alternate_names:
  - "Teclistamab monotherapy"
  - "Tecvayli weekly"
  - "MajesTEC-1 weekly phase"

components:
  - drug_id: DRUG-TECLISTAMAB
    dose: >
      1.5 mg/kg SC once weekly (after completion of inpatient step-up
      schedule — see REGIMEN-TECLISTAMAB-STEP-UP-DOSING-MM).
    schedule: "Day 1 of every 7-day cycle, continuous"
    route: SC

cycle_length_days: 7
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: severe

premedication:
  - "Premedication (dexamethasone + diphenhydramine + acetaminophen) NOT required after the first 3 step-up doses unless symptomatic CRS occurred during step-up."
  - "Tocilizumab 8 mg/kg IV must remain on-site for emergency CRS management throughout therapy."
mandatory_supportive_care:
  - SUP-PJP-PROPHYLAXIS
  - SUP-HSV-PROPHYLAXIS
  - SUP-IVIG-HYPOGAMMA

dose_adjustments:
  - condition: "CRS Grade 1 (fever ≥38°C only) during weekly phase"
    modification: "Acetaminophen + observation; hold next dose 48h until afebrile."
    source_refs: [SRC-NCCN-MM-2025]
  - condition: "CRS Grade 2-4 OR ICANS Grade 2+"
    modification: "Tocilizumab 8 mg/kg IV ± dexamethasone; escalate to high-dose steroids / ICU per institutional CRS protocol."
    rationale: "Severe CRS / ICANS may be fatal if untreated."
    source_refs: [SRC-NCCN-MM-2025]
  - condition: "Active infection any time during therapy"
    modification: "Hold teclistamab + targeted antibiotics; resume after resolution; consider IVIG if hypogammaglobulinemic."
    rationale: "Infection is the leading cause of treatment-related mortality with bispecifics."
    source_refs: [SRC-NCCN-MM-2025]
  - condition: "IgG <400 mg/dL"
    modification: "IVIG 0.4 g/kg q4 weeks (or until IgG >500); continue throughout teclistamab + ≥6 mo post-discontinuation."
    rationale: "On-target B-cell aplasia is universal; IVIG reduces severe infection rate."
    source_refs: [SRC-NCCN-MM-2025]
  - condition: "Sustained ≥VGPR for ≥6 months on weekly dosing"
    modification: "Per protocol amendment, may transition to 1.5 mg/kg SC every 2 weeks."
    rationale: "MajesTEC-1 protocol amendment — q2-weekly dosing maintains response with lower infection burden."
    source_refs: [SRC-MAJESTEC-1-MOREAU-2022]
  - condition: "Persistent Grade 4 cytopenia"
    modification: "Hold; G-CSF; transfusions; resume at next dose level if recovery within 4 weeks."

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Teclistamab NOT registered in Ukraine; NOT available domestically.
    International referral pathway (clinical trial / charitable / out-
    of-pocket) — estimated USD 250-350K/year. Centre must have CRS /
    ICANS management capability + ICU access.

sources:
  - SRC-MAJESTEC-1-MOREAU-2022
  - SRC-NCCN-MM-2025

last_reviewed: "2026-05-01"
notes: >
  Weekly continuous monotherapy phase of teclistamab — separated from
  step-up phase (REGIMEN-TECLISTAMAB-STEP-UP-DOSING-MM) to make
  inpatient/outpatient transition explicit. MajesTEC-1 (Moreau 2022,
  ASH 2023 update): triple-class refractory MM after ≥3 prior lines
  (median 5) — ORR 63%, CR/sCR 39%, mPFS ~11 mo, mDOR ~22 mo. FDA
  approved 4L+ triple-class refractory (post-PI, post-IMiD,
  post-anti-CD38). Q2-weekly dosing per protocol amendment for
  patients sustaining ≥VGPR ≥6 mo.
notes_ua: >
  Фаза щотижневої безперервної монотерапії теклістамабом —
  відокремлена від фази step-up (REGIMEN-TECLISTAMAB-STEP-UP-DOSING-MM)
  для явного переходу стаціонар/амбулаторно. MajesTEC-1 (Moreau 2022):
  triple-class рефрактерна ММ після ≥3 ліній (медіана 5) — ORR 63%,
  CR/sCR 39%, mPFS ~11 міс., mDOR ~22 міс. FDA схвалено 4L+ triple-
  class рефрактерну (post-PI, post-IMiD, post-anti-CD38). Дозування
  раз на 2 тижні за поправкою до протоколу для пацієнтів зі стійким
  ≥VGPR ≥6 міс.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
