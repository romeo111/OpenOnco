last_reviewed: "2026-04-29"
notes: >
  eNRGy (phase I/II pan-tumor, n=204): zenocutuzumab is a HER2 x HER3
  bispecific that uniquely blocks NRG1-driven HER3 dimerization. NSCLC
  (n=93) ORR 37.2%, mDOR 14.9 mo, mPFS 6.8 mo. Pancreatic adenocarcinoma
  (n=36) ORR 42%. Activity independent of fusion partner. FDA approval
  2024-12 covers BOTH NSCLC and pancreatic. NRG1 fusion prevalence ~0.2%
  pan-cancer; testing gap is the practical bottleneck — DNA-only NGS
  routinely misses NRG1 (large intronic breakpoints), RNA fusion assays
  required. This file is NSCLC-anchored (~46% of treated population);
  same regimen applies to NRG1-fusion+ pancreatic and other solid
  tumors. Generally well-tolerated; infusion reactions + diarrhea +
  fatigue are dominant AEs; rare LVEF decreases.
