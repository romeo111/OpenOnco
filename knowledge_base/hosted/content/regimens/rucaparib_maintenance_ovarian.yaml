last_reviewed: "2026-04-27"

notes: >
  ARIEL3 (recurrent platinum-sensitive maintenance after CR/PR to most
  recent platinum, ≥2 prior platinum lines): BRCA-mut mPFS 16.6 vs 5.4
  mo (HR 0.23); HRD+ 13.6 vs 5.4 mo (HR 0.32); all-comers 10.8 vs 5.4
  mo (HR 0.36). Third PARPi maintenance option after olaparib (SOLO-2)
  and niraparib (NOVA). Distinct AE: ALT/AST elevation common but
  usually transient; non-progressive creatinine elevation (transporter
  effect) is not nephrotoxicity.
notes_ua: >
  ARIEL3 (рецидив платиночутливий підтримка після CR/PR на останню
  платину, ≥2 попередні платинові лінії): BRCA-мут мВБП 16,6 проти 5,4 міс.
  (ВР 0,23); HRD+ 13,6 проти 5,4 міс. (ВР 0,32); усі пацієнти 10,8 проти
  5,4 міс. (ВР 0,36). Рукапариб (rucaparib) 600 мг перорально двічі на добу
  безперервно. Третій варіант PARPi підтримки після олапарибу (SOLO-2) та
  нірапарибу (NOVA). Відмінні НЯ: підвищення АЛТ/АСТ часте, але зазвичай
  транзиторне; непрогресуюче підвищення креатиніну (транспортерний ефект)
  не є нефротоксичністю — контроль через цистатин C при сумнівах.
  Фотосенсибілізація шкіри (рідко) — особливий для рукапарибу ефект.
