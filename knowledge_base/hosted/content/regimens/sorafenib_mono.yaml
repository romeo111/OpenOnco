id: REG-SORAFENIB-MONO
name: "Sorafenib monotherapy"
name_ua: "Сорафеніб монотерапія"
alternate_names: ["Sorafenib"]

components:
  - drug_id: DRUG-SORAFENIB
    dose: "400 mg PO BID (start 200 mg BID; escalate to 400 mg if tolerated)"
    schedule: "Continuous"
    route: PO

cycle_length_days:
total_cycles: "Until progression / unacceptable toxicity"

toxicity_profile: moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Hand-foot skin reaction Grade 2-3"
    modification: "Reduce to 400→200 mg BID OR 400 mg daily; emollient prophylaxis; urea cream"
    source_refs: [SRC-NCCN-HCC-2025]
  - condition: "Hepatic decompensation (ascites, encephalopathy onset)"
    modification: "Hold; reassess Child-Pugh; consider permanent discontinuation if CP-C"
    source_refs: [SRC-NCCN-HCC-2025]
  - condition: "Severe diarrhea"
    modification: "Hold + supportive care; resume at reduced dose"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "NSZU-funded for advanced HCC (Child-Pugh A primarily; CP-B individual decision)."

sources: [SRC-NCCN-HCC-2025, SRC-AASLD-HCC-2023]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Sorafenib for advanced HCC when atezo+bev not feasible. Multi-kinase
# TKI: hand-foot syndrome, diarrhea, hypertension, hepatic, fatigue.
# STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Почервоніння, лущення, болючі тріщини на долонях і стопах"
    action_ua: "Hand-foot синдром від сорафенібу — крем, м'яке взуття; занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-HCC-2025
  - trigger_ua: "Помірна діарея (1-3 рази на день)"
    action_ua: "Зазвичай контролюється лоперамідом — занотовуйте частоту"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-HCC-2025
  - trigger_ua: "Підвищений тиск"
    action_ua: "Сорафеніб може підвищувати тиск — вимірюйте 1-2 рази на тиждень"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-HCC-2025
  - trigger_ua: "Виражений біль на долонях / стопах, заважає ходити"
    action_ua: "Подзвоніть у клініку того ж дня — потрібна корекція дози"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-HCC-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Тяжка діарея (≥6 разів на день, з кров'ю)"
    action_ua: "Подзвоніть у клініку того ж дня — ризик зневоднення"
    urgency: call_clinic_same_day
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Жовтяниця, потемніння сечі"
    action_ua: "Подзвоніть у клініку того ж дня — сорафеніб може впливати на печінку"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-HCC-2025
  - trigger_ua: "Кровотеча з вен стравоходу — блювота кров'ю або чорний кал"
    action_ua: "Звертайтесь у лікарню негайно — у пацієнтів з цирозом і варикозом"
    urgency: er_now
    sources:
      - SRC-AASLD-HCC-2023

last_reviewed: "2026-04-26"

notes: >
  SHARP trial 2008 — first systemic therapy with proven OS benefit in
  advanced HCC. Now 2L+ after atezo+bev / durva+treme failure, OR 1L
  alternative when ICI-combinations contraindicated (autoimmune disease,
  organ transplant). Lenvatinib (REFLECT) is non-inferior alternative
  with better PFS/ORR.
notes_ua: >
  SHARP дослідження 2008 — first systemic терапія with proven OS виграш in поширений HCC. Now 2L+ after atezo+bev / durva+treme failure, або 1L alternative when ICI-combinations протипоказаний (автоімунний хвороба, organ transplant). ленватиніб (REFLECT) is не гірше alternative with краще PFS/ORR.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
