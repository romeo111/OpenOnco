  - trigger_ua: "Тяжкий головний біль, що відрізняється від звичайного, особливо вранці"
    action_ua: "Подзвоніть у клініку того ж дня — потрібна оцінка можливого набряку мозку"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-CNS-2025
  - trigger_ua: "Сильний кашель з мокротинням, нова задишка"
    action_ua: "Подзвоніть у клініку того ж дня — на тлі лімфопенії можлива опортуністична інфекція легень (PJP)"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-CNS-2025
  - trigger_ua: "Незвичні синці, кровотеча ясен або носа, що довго не спиняється"
    action_ua: "Подзвоніть у клініку того ж дня — темозоломід знижує тромбоцити"
    urgency: call_clinic_same_day
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Раптовий судомний напад, втрата свідомості"
    action_ua: "Звертайтесь у лікарню негайно — потрібна термінова оцінка можливого прогресування або судомного синдрому"
    urgency: er_now
    sources:
      - SRC-NCCN-CNS-2025
  - trigger_ua: "Сильна слабкість в одній стороні тіла, утруднена мова, асиметрія обличчя"
