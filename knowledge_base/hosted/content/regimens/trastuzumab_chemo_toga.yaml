id: REG-TRASTUZUMAB-CHEMO-TOGA
name: "Trastuzumab + capecitabine + cisplatin (TOGA / KEYNOTE-811)"
name_ua: "Трастузумаб + капецитабін + цисплатин (TOGA / KEYNOTE-811)"
alternate_names: ["TOGA regimen (capecitabine arm)", "Trastuzumab + chemo backbone"]

components:
  - drug_id: DRUG-TRASTUZUMAB
    dose: "8 mg/kg IV loading then 6 mg/kg q3w"
    schedule: "IV day 1 every 21d"
    route: IV
  - drug_id: DRUG-CAPECITABINE
    dose: "1000 mg/m² PO BID days 1-14"
    schedule: "PO days 1-14"
    route: PO
  - drug_id: DRUG-CISPLATIN
    dose: "80 mg/m²"
    schedule: "IV day 1 q3w"
    route: IV

cycle_length_days: 21
total_cycles: "Until progression / unacceptable toxicity (chemo backbone often capped at 6-8 cycles, trastuzumab continues mono)"

toxicity_profile: severe
premedication:
  - "Cisplatin: hydration + Mg/K + 5-HT3 + dex + NK1-RA"
  - "Trastuzumab: monitor for infusion reaction (pre-medication generally not required)"
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "LVEF decline >10% to <50%"
    modification: "Hold trastuzumab; cardiology + repeat echo in 4 weeks; resume only if LVEF normalizes"
    source_refs: [SRC-NCCN-GASTRIC-2025]
  - condition: "CrCl 50-60"
    modification: "Reduce cisplatin to 60 mg/m² (or substitute carboplatin AUC 5)"
  - condition: "Grade 3-4 hand-foot syndrome"
    modification: "Hold capecitabine until ≤Grade 1; resume at 75% dose"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "Trastuzumab biosimilars NSZU-funded for gastric HER2+; chemo NSZU-funded."

sources: [SRC-NCCN-GASTRIC-2025, SRC-ESMO-GASTRIC-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Trastuzumab + cisplatin + 5-FU/capecitabine for HER2+ gastric 1L
# (TOGA). Trastuzumab adds cardiac watch (LVEF) + IRR; cisplatin adds
# nephro/oto-toxicity; 5-FU adds GI/cytopenia. STUB pending §6.1.
between_visit_watchpoints:
  - trigger_ua: "Помірна втома, нудота протягом 1-3 днів після циклу"
    action_ua: "Приймайте призначені протиблювотні; пийте багато води"
    urgency: log_at_next_visit
    cycle_day_window: "Day 1-3"
    sources:
      - SRC-NCCN-GASTRIC-2025
  - trigger_ua: "Помірна діарея, легка втрата апетиту"
    action_ua: "Поширене на тлі 5-фторурацилу — занотовуйте інтенсивність"
    urgency: log_at_next_visit
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Шум у вухах або зниження слуху"
    action_ua: "Подзвоніть у клініку того ж дня — цисплатин може впливати на слух"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-GASTRIC-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Зменшення кількості сечі, набряки гомілок"
    action_ua: "Подзвоніть у клініку того ж дня — цисплатин впливає на нирки"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-GASTRIC-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Нова задишка при навантаженні, набряки ніг, прискорене серцебиття"
    action_ua: "Подзвоніть у клініку того ж дня — трастузумаб може впливати на серце; потрібна оцінка функції"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-GASTRIC-2025
      - SRC-CTCAE-V5
  - trigger_ua: "Лихоманка вище 38°C"
    action_ua: "Подзвоніть у клініку того ж дня — потрібен контроль показників крові"
    urgency: call_clinic_same_day
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Тяжка реакція на інфузію трастузумабу: задишка, висип, втрата свідомості"
    action_ua: "Інфузія в клініці — медперсонал реагує негайно"
    urgency: er_now
    cycle_day_window: "Day 1 of cycle 1"
    sources:
      - SRC-NCCN-GASTRIC-2025

last_reviewed: "2026-04-26"

notes: >
  TOGA trial 2010 — first targeted therapy approval in metastatic
  gastric. mOS 13.8 vs 11.1 chemo-only; HER2 IHC 3+ subgroup mOS 17.9.
  KEYNOTE-811 added pembrolizumab to trastuzumab+chemo for HER2+ +
  PD-L1 CPS ≥1 — improved ORR + PFS. T-DXd (trastuzumab-deruxtecan)
  preferred 2L+ for HER2+ post-trastuzumab failure (DESTINY-Gastric01).
notes_ua: >
  TOGA дослідження 2010 — first таргетна терапія схвалення in метастатичний gastric. міс. 13.8 проти 11.1 chemo-only; HER2 IHC 3+ subgroup mOS 17.9. KEYNOTE-811 added пембролізумаб to трастузумаб+chemo for HER2+ + PD-L1 CPS ≥1 — покращений ORR + PFS. T-DXd (трастузумаб-deruxtecan) переважний 2L+ for HER2+ post-трастузумаб failure (DESTINY-Gastric01).
ukrainian_review_status: pending_clinical_signoff
