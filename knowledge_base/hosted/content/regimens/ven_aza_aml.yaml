last_reviewed: "2026-04-25"
notes: >
  Standard 1L for AML unfit for intensive 7+3 (VIALE-A: median OS 14.7
  vs 9.6 mo for aza alone). TLS prophylaxis MANDATORY for first ramp
  cycle (5-week ramp not used in AML — accelerated 3-day ramp instead).
  Strong CYP3A4 inhibitor co-administration (azole prophylaxis) requires
  venetoclax dose reduction. STUB — requires clinical co-lead signoff
  before publication.
notes_ua: >
  стандарт 1L for AML непридатний до intensive 7+3 (VIALE-A: медіана ЗВ 14.7 проти
  9.6 mo for aza alone). TLS prophylaxis обов'язковий for first ramp цикл (5-week
  ramp not used in AML — accelerated 3-day ramp instead). Strong CYP3A4 інгібітор
  co-введення (azole prophylaxis) requires венетоклакс зниження дози. STUB — requires
  clinical co-lead signoff before publication.
ukrainian_review_status: pending_clinical_signoff
