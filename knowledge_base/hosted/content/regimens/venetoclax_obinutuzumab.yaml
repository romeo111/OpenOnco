  action_ua: "Якщо в клініці — медперсонал реагує негайно. Якщо вдома — викликайте
    швидку"
  urgency: er_now
  cycle_day_window: "Day 1"
  sources:
  - SRC-NCCN-BCELL-2025
  - SRC-CTCAE-V5
- trigger_ua: "Раптова сильна слабкість, серцебиття ненормальне — у перші тижні венетоклаксу"
  action_ua: "Звертайтесь у лікарню негайно — критичний час ризику тяжкого синдрому
