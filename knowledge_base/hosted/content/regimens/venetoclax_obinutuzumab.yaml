  urgency: er_now
  cycle_day_window: "Day 1-35"
  sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
notes: >
  CLL14 trial (Fischer 2019, follow-up 2024): superior 6-year PFS vs
  Clb+O. Fixed-duration (12 mo) attractive vs continuous BTKi. Preferred
  in some guidelines for high-risk CLL (TP53/del 17p/IGHV-unmutated).
  TLS PROTOCOL CRITICAL: skipping ramp = fatal hyperkalemia + AKI.
  PJP prophylaxis throughout therapy.
notes_ua: >
  CLL14 дослідження (Fischer 2019, спостереження 2024): перевершує 6-year PFS vs Clb+O.
  Fixed-duration (12 міс.) attractive vs continuous BTKi. переважний in some настанови
  for високого ризику CLL (TP53/del 17p/IGHV-unmutated). TLS PROTOCOL CRITICAL: skipping
  ramp = fatal hyperkalemia + AKI. PJP prophylaxis throughout терапія.
ukrainian_review_status: pending_clinical_signoff
