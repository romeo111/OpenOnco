id: REG-VENETOCLAX-OBINUTUZUMAB
name: "Venetoclax + Obinutuzumab (VenO), 12 months fixed-duration (CLL14 schedule)"
name_ua: "Венетоклакс + Обінутузумаб (VenO), 12 місяців фіксованої тривалості (CLL14)"
alternate_names: ["VenO", "Ven-Obi", "CLL14"]

components:
- drug_id: DRUG-OBINUTUZUMAB
  dose: "100 mg cycle 1 day 1; 900 mg day 2; 1000 mg days 8 + 15; then 1000 mg day
    1 of cycles 2-6"
  schedule: "IV monthly (28-day cycles), 6 cycles total"
  route: IV
- drug_id: DRUG-VENETOCLAX
  dose: >
    5-week ramp starting cycle 1 day 22: 20 → 50 → 100 → 200 → 400 mg
    PO daily, then 400 mg daily continuous through cycle 12
  schedule: "PO daily, total 12 months from start of ramp"
  route: PO
- drug_id: DRUG-ALLOPURINOL
  dose: "300 mg PO daily"
  schedule: "Start 72h before venetoclax ramp; continue ≥1 week post highest dose"
  route: PO

cycle_length_days: 28
total_cycles: "6 obinutuzumab + 12 months total venetoclax"
toxicity_profile: moderate-high

premedication:
- "Pre-obinutuzumab: methylprednisolone IV + acetaminophen + diphenhydramine for first
  dose"
- "Pre-venetoclax ramp: hydration + allopurinol; serial labs every 6-8h during first
  24h of each ramp step in high-burden patients"
mandatory_supportive_care:
- SUP-TLS-PROPHYLAXIS
- SUP-PJP-PROPHYLAXIS
monitoring_schedule_id: MON-CLL-BTKI

dose_adjustments:
- condition: "Concomitant strong CYP3A4 inhibitor"
  modification: "Hold during inhibitor; resume after washout. Avoid during ramp-up
    phase."
  source_refs: [SRC-NCCN-BCELL-2025]
- condition: "High tumor burden (ALC >25K OR any LN ≥10 cm OR LN ≥5 cm + ALC ≥25K)"
  modification: "Hospitalize for first 3 ramp-up doses with q6h labs (TLS surveillance)"
  rationale: "Fatal TLS reported when ramp-up done outpatient in high-burden patients"
- condition: "ANC <1000 OR febrile neutropenia"
  modification: "Hold venetoclax + G-CSF support; resume at lower step"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: >
    Venetoclax registered, NOT reimbursed via НСЗУ. Obinutuzumab
    registered + reimbursed for some indications. Funding pathway must
    be confirmed pre-start.

sources: [SRC-NCCN-BCELL-2025, SRC-ESMO-CLL-2024]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Venetoclax requires careful TLS-prophylaxis ramp-up over 5 weeks in
# cycle 1; obinutuzumab is anti-CD20 with infusion-reaction +
# reactivation risks similar to rituximab. STUB pending §6.1 signoff.
between_visit_watchpoints:
- trigger_ua: "Помірна втома після інфузії обінутузумабу"
  action_ua: "Очікувано — більше відпочивайте у дні 1-3; занотовуйте інтенсивність"
  urgency: log_at_next_visit
  cycle_day_window: "Day 1-3"
  sources:
  - SRC-NCCN-BCELL-2025
- trigger_ua: "Помірна нудота на тлі венетоклаксу"
  action_ua: "Приймайте з їжею і повною склянкою води; занотовуйте, обговоріть на
    наступному візиті"
  urgency: log_at_next_visit
  sources:
  - SRC-NCCN-BCELL-2025
- trigger_ua: "Лихоманка вище 38°C"
  action_ua: "Подзвоніть у клініку того ж дня — обінутузумаб посилює імуносупресію,
    ризик інфекції підвищений"
  urgency: call_clinic_same_day
  sources:
  - SRC-NCCN-BCELL-2025
  - SRC-CTCAE-V5
- trigger_ua: "Помірна реакція під час інфузії обінутузумабу: озноб, лихоманка, висип"
  action_ua: "Повідомте медсестру негайно — інфузію зазвичай сповільнюють і додають
    преміедикацію"
  urgency: call_clinic_same_day
  cycle_day_window: "Day 1 of cycle 1"
  sources:
  - SRC-NCCN-BCELL-2025
- trigger_ua: "Зменшення кількості сечі, набряки, біль у попереку — у перші 5 тижнів
    венетоклаксу"
  action_ua: "Подзвоніть у клініку того ж дня — критичне вікно ризику синдрому розпаду
    пухлини під час нарощування дози"
  urgency: call_clinic_same_day
  cycle_day_window: "Day 1-35"
  sources:
  - SRC-NCCN-BCELL-2025
- trigger_ua: "Тяжка інфузійна реакція на обінутузумаб: різке утруднення дихання,
