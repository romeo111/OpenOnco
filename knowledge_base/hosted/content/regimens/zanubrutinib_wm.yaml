id: REG-ZANUBRUTINIB-WM
name: "Zanubrutinib monotherapy (continuous)"
name_ua: "Занубрутиніб монотерапія (безперервно)"
alternate_names: ["Zanu mono", "ASPEN-style"]

components:
  - {drug_id: DRUG-ZANUBRUTINIB, dose: "160 mg PO BID OR 320 mg PO once daily", schedule: "Continuous until progression or intolerance", route: PO}

cycle_length_days: 28
total_cycles: "Continuous"
toxicity_profile: low-moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id: MON-CLL-BTKI  # reuse — same surveillance pattern

dose_adjustments:
  - {condition: "Strong CYP3A4 inhibitor", modification: "Hold or reduce dose"}
  - {condition: "Severe hepatic impairment", modification: "Avoid"}

ukraine_availability: {all_components_registered: true, all_components_reimbursed: false, notes: "Zanubrutinib NOT НСЗУ-reimbursed; ibrutinib substitute (also BTKi, more cardiac toxicity but reimbursed)"}
sources: [SRC-NCCN-BCELL-2025]

# Patient between-visit watchpoints (PATIENT_MODE_SPEC §3.4).
# Zanubrutinib for WM (Waldenström macroglobulinemia). BTKi pattern;
# WM patients often have elevated IgM hyperviscosity at baseline.
# STUB pending §6.1 signoff.
between_visit_watchpoints:
  - trigger_ua: "Помірний головний біль, нудота"
    action_ua: "Часто минає за місяць — занотовуйте"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Помірна діарея"
    action_ua: "Поширене — занотовуйте інтенсивність"
    urgency: log_at_next_visit
    sources:
      - SRC-CTCAE-V5
  - trigger_ua: "Незвичні синці, кровотеча ясен"
    action_ua: "Подзвоніть у клініку того ж дня — BTKi підвищують ризик кровотеч"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Лихоманка з ознобом, кашель"
    action_ua: "Подзвоніть у клініку того ж дня — імуносупресія"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Сильний головний біль, розмиття зору, шум у вухах — ознаки гіпервіскозного синдрому"
    action_ua: "Подзвоніть у клініку того ж дня — у WM ризик гіпервіскозності, потрібна оцінка"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Раптова сильна головний біль із порушенням зору або мовлення"
    action_ua: "Звертайтесь у лікарню негайно — можливий тромб або гіпервіскозна криза"
    urgency: er_now
    sources:
      - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
notes: >
  ASPEN trial demonstrated superior hematologic + safety profile vs
  ibrutinib in MYD88-mutated WM. Preferred BTKi for WM 1L. CXCR4
  WHIM-mutated subset has reduced depth of response — consider chemo
  combination.
notes_ua: >
  ASPEN дослідження продемонстровано перевершує hematologic + профіль безпеки vs ібрутиніб in MYD88-mutated WM. переважний BTKi for WM 1L. CXCR4 WHIM-mutated subset has зменшений depth of відповідь — consider chemo комбінація.
ukrainian_review_status: pending_clinical_signoff
