key_findings: >
  Olutasidenib monotherapy in relapsed/refractory IDH1-mutant AML. ORR 48%; CR/CRi
  35%. Median OS 11.6 months; median DOR 25.9 months (durable remissions).
  Differentiation syndrome in 14% (Grade 3+ in 3%). FDA approved December 2022
  for R/R IDH1-mutant AML.
