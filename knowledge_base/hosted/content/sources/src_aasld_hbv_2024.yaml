notes: >
  Joint AASLD-IDSA practice guideline (announced 2024, journal version
  Nov 2025) on prevention, surveillance, and treatment of chronic
  hepatitis B (CHB). Recommends entecavir, tenofovir disoproxil
  fumarate, and tenofovir alafenamide as preferred nucleos(t)ide
  analogues. Treatment goals: prevent cirrhosis, reduce liver-related
  complications, achieve viral suppression, and where possible attain
  functional cure (HBsAg loss). GRADE methodology. Used in OpenOnco for
  HBV reactivation prophylaxis in patients receiving anti-CD20
  immunochemotherapy and for co-infection management with HCV / HDV /
  HIV. First HBV-specific source in the KB; needed because all DLBCL /
  FL / MZL / CLL anti-CD20 indications require HBV serology pre-treatment
  but had no HBV-side authority cited.
