id: SRC-ACT2-JAMES-2013
title: "Mitomycin or cisplatin chemoradiation with or without maintenance chemotherapy for treatment of squamous-cell carcinoma of the anus (ACT II): a randomised, phase 3, open-label, 2×2 factorial trial"
type: clinical_trial
hosting_mode: referenced

citation:
  authors: "James RD, Glynne-Jones R, Meadows HM, et al."
  title: "Mitomycin or cisplatin chemoradiation with or without maintenance chemotherapy for treatment of squamous-cell carcinoma of the anus (ACT II): a randomised, phase 3, open-label, 2×2 factorial trial"
  journal: "Lancet Oncology"
  year: 2013
  volume: 14
  issue: 6
  pages: "516–524"
  pmid: "23973330"
  doi: "10.1016/S1470-2045(13)70086-X"

trial_name: "ACT II"
phase: 3
design: "2×2 factorial randomized; n=940; open-label"

population: "Histologically confirmed squamous cell carcinoma of the anal canal, stage I-IIIb (any T, any N, M0), fit for chemoradiation"

interventions:
- "Arm A: MMC 12 mg/m² d1 + 5-FU 1000 mg/m²/d d1-4 + d29-32 CI + RT 50.4 Gy → no maintenance"
- "Arm B: Cisplatin 60 mg/m² d1+d29 + 5-FU 1000 mg/m²/d d1-4 + d29-32 CI + RT 50.4 Gy → no maintenance"
- "Arm C: MMC + 5-FU + RT → maintenance cisplatin+5-FU × 2 cycles"
- "Arm D: Cisplatin + 5-FU + RT → maintenance cisplatin+5-FU × 2 cycles"

primary_endpoint: "Complete response at 26 weeks"

key_results:
  complete_response_at_26w_mmc: "90.5%"
  complete_response_at_26w_cis: "89.6%"
  primary_conclusion: "MMC and cisplatin chemoradiation were equivalent in complete response; MMC remains standard"
  maintenance_benefit: "No benefit from maintenance chemotherapy — maintenance arm no improvement in PFS or OS"
  3y_progression_free_survival: "74.0% (MMC) vs 72.7% (cisplatin)"
  3y_overall_survival: "83.6% (MMC) vs 80.1% (cisplatin) — not significantly different"
  toxicity_grade3_4_mmc: "~25% hematologic toxicity vs lower with cisplatin — MMC more myelosuppressive"

clinical_significance: >
  ACT II definitively established mitomycin C + 5-FU + RT as the global standard of care
  for locally advanced anal SCC. Cisplatin substitution for MMC provides no efficacy
  advantage despite lower hematologic toxicity — MMC is standard. Maintenance
  chemotherapy after CRT provides no benefit and should NOT be given. ACT II confirmed
  the organ-preserving chemoradiation approach (Nigro protocol) with curative intent:
  ~74-75% of patients are relapse-free at 3 years without APR.

relates_to_diseases:
- DIS-ANAL-SCC

relates_to_regimens:
- REG-NIGRO-MMC-5FU-RT

