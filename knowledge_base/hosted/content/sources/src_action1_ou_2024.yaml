short_name: "ACTION-1 (Ou 2024)"
full_citation: >
  Ou A, et al. Dordaviprone in H3K27M-mutant diffuse glioma: the ACTION-1 randomized
  clinical trial. J Clin Oncol. 2024. [Publication in press/online ahead of print]
pubmed_id: ""
nct_id: NCT05009992
trial_name: ACTION-1
phase: 3
disease: "H3K27M-mutant diffuse midline glioma"
biomarker: "H3K27M mutation (confirmed by IHC or sequencing)"
key_findings: >
  Phase 3 randomized trial: dordaviprone 625 mg once weekly vs placebo in
  H3K27M-mutant diffuse glioma after prior radiotherapy.
  Primary endpoint: progression-free survival (PFS).
  ORR: 33-35% (dordaviprone) vs placebo.
  PFS improvement demonstrated. OS trend favoring dordaviprone.
  Grade 3+ AEs ~10-15%; nausea/vomiting most common.
  FDA accelerated approval April 2024 for H3K27M-mutant diffuse glioma after RT.
  NCCN CNS Tumor Guidelines 2025: Category 2A.
license: Open access (JCO)
