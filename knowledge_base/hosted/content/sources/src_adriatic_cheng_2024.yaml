notes: 'ADRIATIC phase-3 (NCT03703297): durvalumab 1500 mg q4w consolidation
  (with or without tremelimumab × 4 doses) vs placebo for up to 24 mo in
  patients with limited-stage SCLC who had not progressed after concurrent
  platinum-based chemoradiotherapy (n=730 in durva vs placebo arms; primary
  analysis). Median OS 55.9 vs 33.4 mo (HR 0.73; p=0.01); median PFS 16.6 vs
  9.2 mo (HR 0.76; p=0.02). Established durvalumab consolidation as new
  standard of care for limited-stage SCLC after CRT — first major OS-positive
  trial in LS-SCLC in decades; basis for FDA approval Dec 2024.

