notes: >
  Pivotal trial for durvalumab perioperative NSCLC. FDA approved Apr 2024.
  NCCN NSCLC 2025: Cat 1. Durvalumab dose: 1500 mg flat Q3W (neoadjuvant) →
  1500 mg Q4W (adjuvant) × 12 months. Most recent of the three perioperative
  approvals. EFS HR 0.68 numerically lower than KEYNOTE-671/CM-77T (HR 0.58)
  but cross-trial comparison is invalid. Chemo backbone: cisplatin or carboplatin
  + paclitaxel or nab-paclitaxel × 4 cycles. Exact citation details require
  clinical reviewer verification; DOI/pages may need correction at signoff.
