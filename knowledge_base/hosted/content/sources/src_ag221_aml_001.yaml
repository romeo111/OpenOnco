key_findings: >
  Enasidenib (IDH2 inhibitor) in relapsed/refractory IDH2-mutant AML. ORR 40.3%
  including CR 19.3% among 239 evaluable patients. Median OS 9.3 months overall;
  19.7 months in responders. Differentiation syndrome reported in 11% (2-grade 3+).
  FDA approved August 2017 for R/R IDH2-mutant AML.
