id: SRC-AGILE-DINARDO-2022
source_type: clinical_trial_report
citation: >
  DiNardo CD, Onizuka T, Tanden P, et al. Ivosidenib combined with azacitidine in
  newly diagnosed IDH1-mutated acute myeloid leukaemia (AGILE): a double-blind,
  placebo-controlled, randomised, phase 3 trial. Lancet Oncol. 2022;23(10):1293–1304.
doi: "10.1016/S1470-2045(22)00492-9"
trial_name: "AGILE"
trial_registry_id: NCT03173248
phase: "3 (randomized, double-blind, placebo-controlled)"
year: 2022
journal: "Lancet Oncology"

population: >
  Patients with newly diagnosed IDH1-mutated (R132) AML who were not candidates
  for intensive chemotherapy (age ≥75, or age 18-74 with comorbidities precluding
  intensive induction). N=146.

intervention: "Ivosidenib 500 mg PO QD + azacitidine 75 mg/m² SC/IV days 1-7 of 28-day cycle"
comparator: "Placebo + azacitidine 75 mg/m² days 1-7 of 28-day cycle"

primary_endpoints:
  - "Event-free survival (EFS) per RECIST v1.1"

key_results:
  efs_hr: "0.33 (95% CI 0.16–0.69; p=0.0011)"
  cr_rate: "47.2% (ivosidenib+aza) vs 14.9% (placebo+aza)"
  median_os: "24.0 months vs 7.9 months (HR 0.44; 95% CI 0.27–0.73; p=0.0008)"
  orr: "62.5% vs 18.9%"

regulatory_impact: >
  FDA approved: May 25, 2022 — ivosidenib in combination with azacitidine for
  adults with newly diagnosed IDH1-mutated AML who are ≥75 years old or who have
  comorbidities that preclude use of intensive induction chemotherapy.
  Companion diagnostic: Abbott RealTime IDH1 Assay (detects IDH1 R132 mutations).
  EMA approved 2022 for ND IDH1-mut AML unfit for intensive chemotherapy.

nccn_category_reference: "NCCN AML 2025: Category 1 for IDH1-mutated ND AML not candidates for intensive chemotherapy"

hosting_status: referenced
license: "Lancet (institutional access)"

last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  Workstream EW 2026-05-04. AGILE trial: ivosidenib+azacitidine for ND IDH1-mut
  unfit AML. CR rate 47.2% vs 14.9%; OS HR 0.44; FDA May 2022. Fills PROD-5
  deferred gap in AML 1L algorithm.
  Companion diagnostic: Abbott RealTime IDH1 assay required for IDH1 R132 confirmation.
  Two-reviewer clinical signoff required per CHARTER §6.1.
