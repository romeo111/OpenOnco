notes: >
  ALLELE Phase 3 (NCT02822495): tabelecleucel for r/r EBV+ PTLD in SOT and
  HCT recipients after ≥1 prior therapy.
  RESULTS (SOT cohort; N=43):
    - ORR: 50% (21/43; 12 CR + 9 PR)
    - CR rate: 28%
    - Duration of response: median 25.9 months
    - 1-year OS: 68%
  RESULTS (HCT cohort; N=19):
    - ORR: 33% (6/19)
    - CR rate: 16%
  SAFETY:
    - Infusion reactions: 20% (Grade 3+: 2%)
    - GvHD: occurred but not attributable to tabelecleucel
    - CRS Grade 3+: <2%
  FDA APPROVAL: November 2, 2022 (SOT), expanded November 2023 (HCT).
  EMA APPROVAL: August 2023.
  SIGNIFICANCE: First allogeneic, off-the-shelf EBV-specific T-cell therapy
  approved for a lymphoma indication. Provides a non-chemotherapy option for
  chemotherapy-intolerant PTLD patients.
