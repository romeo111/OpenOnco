id: SRC-ALSYMPCA-PARKER-2013
title: >
  Alpha Emitter Radium-223 and Survival in Metastatic Prostate Cancer
type: clinical_trial
hosting: referenced

citation:
  authors: "Parker C, Nilsson S, Heinrich D, Helle SI, O'Sullivan JM, Fosså SD, et al."
  title: >
    Alpha Emitter Radium-223 and Survival in Metastatic Prostate Cancer
  journal: "New England Journal of Medicine"
  year: 2013
  volume: 369
  issue: 3
  pages: "213-223"
  doi: "10.1056/NEJMoa1213755"
  pmid: "23863051"

study_design:
  type: RCT
  phase: 3
  n: 921
  population: "mCRPC with symptomatic bone metastases, no known visceral metastases, prior docetaxel or ineligible"
  intervention: "Radium-223 dichloride 50 kBq/kg (updated: 55 kBq/kg per approved label) IV q4w × 6 injections"
  comparator: "Placebo"
  primary_endpoint: "Overall survival"

key_results:
  os_hr: 0.70
  os_radium_months: 14.9
  os_placebo_months: 11.3
  p_value: "<0.001"
  time_to_first_skeletal_related_event_hr: 0.66
  psa_progression_hr: 0.64
  alkaline_phosphatase_response: "47% vs 3%"

safety:
  grade34_hematologic: "Neutropenia 3%; thrombocytopenia 6%; anemia 6% — generally low hematologic toxicity"
  bone_marrow_suppression: "Transient, mild"
  combination_warning: >
    ERA 223 trial (Fizazi 2019): Ra-223 + abiraterone + prednisone → increased fracture risk
    and death compared to placebo + abiraterone. Ra-223 must NOT be combined with novel ARPIs.
    ALSYMPCA+ (Ra-223 + docetaxel): increased toxicity without additional benefit — avoid combination.

clinical_significance: >
  ALSYMPCA established radium-223 as a bone-targeting alpha emitter that improves OS in
  mCRPC with symptomatic bone mets and no visceral disease. Mechanism: Ra-223 mimics calcium,
  concentrates at sites of bone turnover (osteoblastic mets), delivers high-LET alpha radiation
  locally. Only 6 injections (q4w × 6) — treatment course 6 months. NCCN Category 1 for
  symptomatic bone-predominant mCRPC. Significant bone pain palliation benefit.
  CRITICAL RESTRICTION: Do NOT combine with docetaxel or abiraterone/enzalutamide —
  ERA 223 showed increased fractures; ALSYMPCA+ showed increased toxicity.

nccn_category: "1"
evidence_grade: high

