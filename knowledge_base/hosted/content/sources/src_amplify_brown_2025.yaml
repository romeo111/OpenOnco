notes: >
  AMPLIFY phase-3 (NCT03836261): three-arm 1:1:1 trial of fixed-duration
  acalabrutinib + venetoclax (AV, cycles 1-14) vs acalabrutinib + venetoclax +
  obinutuzumab (AVO, cycles 2-7 obi) vs chemoimmunotherapy (investigator choice:
  FCR or BR, cycles 1-6) in previously untreated CLL without del(17p)/TP53
  mutation (n=867). Primary endpoint: PFS (AV vs chemo). 36-mo PFS: AV 76.5%,
  AVO 83.1%, chemo 66.5%; AV vs chemo HR 0.65 (p=0.004); AVO vs chemo HR 0.42.
  Established fixed-duration AV and AVO as 1L options in CLL. NEJM
  2025;392(8):748-762. NOTE: task brief listed first author as Neal JT / year
  2024 — verified first author is Brown JR; published February 2025.
