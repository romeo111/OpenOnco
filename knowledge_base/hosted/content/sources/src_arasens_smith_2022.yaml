notes: >
  ARASENS phase 3 (NCT02799602): darolutamide 600mg BID + docetaxel 6 cycles +
  ADT vs docetaxel + ADT (placebo) in mHSPC (n=1306; all enrolled, not
  volume-selected). Death risk HR 0.68 (p<0.001); mOS not reached vs 48.9 mo.
  Benefits across high- and low-volume subgroups. Established darolutamide+docetaxel
  +ADT triplet as NCCN category 1 for mHSPC, particularly high-volume/high-risk.
  Darolutamide preferred over enzalutamide/apalutamide in triplet due to superior
  CNS penetration/tolerability and head-to-head BCMA/ARAFOR evidence.
  Companion trial ENZAMET (enzalutamide + docetaxel + ADT) also supports triplet.
