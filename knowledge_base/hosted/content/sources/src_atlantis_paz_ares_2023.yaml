key_findings: >
  Lurbinectedin + doxorubicin vs standard 2L chemotherapy (topotecan or CAV) in
  relapsed SCLC. mOS 8.6 vs 7.6 months (HR 0.90; p=0.30) — primary OS endpoint
  not met. mPFS 3.9 vs 2.2 months (HR 0.69). ORR 33% vs 23%. Despite Phase 3
  failure, lurbinectedin maintains FDA accelerated approval (basket approval based
  on Phase 2 basket trial PM1183-B-005-14; ORR 35.2% in SCLC).
  NCCN 2B for 2L SCLC based on single-arm data.
