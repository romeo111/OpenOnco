key_findings: >
  Revumenib (menin inhibitor) in relapsed/refractory KMT2A-rearranged acute leukemia
  (AML and ALL, adult + pediatric). ORR 63%; CR/CRh 23% (KMT2A cohort). Median DOR
  6.4 months. Among NPM1-mutant AML cohort: ORR 53%, CR/CRh 17%. Differentiation
  syndrome in 10%. FDA approved November 2024 for R/R acute leukemia with KMT2A
  translocation (first menin inhibitor approval).
