trial_acronym: "BELIEF"
phase: 2
population: >
  Relapsed or refractory peripheral T-cell lymphoma (PTCL) after ≥1 prior
  systemic therapy. Includes PTCL-NOS, AITL, ALCL (ALK-), and other PTCL
  subtypes. ECOG PS 0-2. Adequate organ function. No prior belinostat.
n_enrolled: 129
n_evaluable: 120
primary_endpoint: "ORR by independent central review (Cheson 2007)"
primary_result:
  overall_orr: "25.8% (31/120 evaluable)"
  cr_rate: "11% (13/120)"
  median_dor_months: "13.6"
cohorts:
  ptcl_nos:
    n: 69
    orr: "~23%"
    notes: "Lower ORR in PTCL-NOS vs AITL subgroup"
  aitl:
    n: 28
    orr: "~46%"
    notes: "AITL highest-responding subtype; consistent with HDACi mechanism in epigenetically dysregulated AITL"
  alcl_alk_neg:
