last_verified: "2026-05-04"
notes: >
  BELIEF (CLN-19) trial: pivotal phase II study establishing belinostat for r/r PTCL.
  Overall ORR 25.8% (n=120 evaluable) — comparable to pralatrexate (PROPEL: ORR 29%)
  and romidepsin (NCI 1312: ORR 25%). AITL subgroup ORR ~46% is substantially higher
  than PTCL-NOS (~23%), consistent with HDACi mechanism in TET2/DNMT3A-mutated AITL.

  Key pharmacology: belinostat is metabolized primarily by UGT1A1 (glucuronidation),
  unlike romidepsin (CYP3A4). UGT1A1 *28/*28 homozygous patients (~10% of population)
  have reduced metabolism → dose reduce to 750 mg/m² at first cycle.

  Toxicity advantages vs comparators:
  - vs pralatrexate: much lower mucositis/stomatitis (no leucovorin rescue needed)
  - vs romidepsin: less nausea/emesis, less cardiac monitoring burden (QT risk is class
    effect but lower with belinostat than romidepsin per class data)

  Agent selection in r/r PTCL-NOS is primarily driven by access and toxicity profile
  — no head-to-head RCT among all three agents. All three are bridges to consolidative
  alloSCT for fit patients achieving CR/PR.

  Ukraine access: belinostat (Beleodaq) is not registered in Ukraine. Named-patient
  import or compassionate access required. HDACi class includes romidepsin (also
  unregistered) and vorinostat (registered in some countries for cutaneous T-cell).
corpus_role: pivotal_phase2
