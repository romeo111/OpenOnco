    orr: "~15%"
arms:
  experimental: "Belinostat 1000 mg/m² IV days 1-5 q21d until progression or unacceptable toxicity"
secondary_results:
  median_pfs_months: "1.6 (overall cohort)"
  median_os_months: "7.9"
  ugt1a1_note: >
    UGT1A1 *28/*28 homozygous patients have reduced belinostat glucuronidation
    → higher drug exposure → dose reduction to 750 mg/m² recommended at baseline
    in *28/*28 individuals.
  safety_profile: >
    Most common Grade ≥3: thrombocytopenia 13%, neutropenia 13%, anemia 10%.
    Mucositis lower than pralatrexate. Nausea lower than romidepsin.
    QTc prolongation: baseline ECG required; clinically significant QTcF >500 ms
    is a contraindication.
