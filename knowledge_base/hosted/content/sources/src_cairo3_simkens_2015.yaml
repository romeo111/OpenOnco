notes: >
  CAIRO3 phase-3 (NTR1577): 558 patients with previously untreated mCRC who
  achieved at least stable disease after 6 cycles of induction CAPOX-B
  (capecitabine + oxaliplatin + bevacizumab) randomised to maintenance with
  capecitabine 625 mg/m^2 BID continuous + bevacizumab 7.5 mg/kg q3w vs
  observation, until first progression (PFS1). Upon PFS1 both groups received
  CAPOX-B reintroduction until second progression (PFS2, primary endpoint).
  Median PFS2 11.7 mo (maintenance) vs 8.5 mo (observation), HR 0.67
  (95% CI 0.56-0.81, p<0.0001); median PFS1 8.5 vs 4.1 mo (HR 0.43); OS
  numerically improved (21.6 vs 18.1 mo, HR 0.89, NS). Established
  cape+bev as a guideline-supported maintenance option after induction
  oxaliplatin-based + bevacizumab in mCRC, supporting de-escalation of
  oxaliplatin neuropathy while preserving disease control.
