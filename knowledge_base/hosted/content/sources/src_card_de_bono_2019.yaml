id: SRC-CARD-DE-BONO-2019
title: >
  Olaparib for Metastatic Castration-Resistant Prostate Cancer
type: clinical_trial
hosting: referenced

citation:
  authors: "de Bono JS, Mateo J, Fizazi K, Saad F, Shore N, Sandhu S, et al."
  title: >
    Olaparib for Metastatic Castration-Resistant Prostate Cancer
  journal: "New England Journal of Medicine"
  year: 2019
  volume: 381
  issue: 18
  pages: "1711-1723"
  doi: "10.1056/NEJMoa1911440"
  pmid: "31566699"

study_design:
  type: RCT
  phase: 3
  n: 255
  population: "mCRPC progressing during or after docetaxel + prior ARPI (enzalutamide or abiraterone)"
  intervention: "Cabazitaxel 25 mg/m² q21d + prednisone"
  comparator: "Investigator's choice of second ARPI (enzalutamide or abiraterone, whichever not given previously)"
  primary_endpoint: "Imaging-based progression-free survival (iPFS) by PCWG3/RECIST v1.1"
  secondary_endpoints: ["Overall survival", "PSA response rate", "Objective response rate", "Time to PSA progression"]

key_results:
  ipfs_hr: 0.54
  ipfs_cabazitaxel_months: 8.0
  ipfs_arpi_months: 3.7
  os_hr: 0.64
  os_cabazitaxel_months: 13.6
  os_arpi_months: 11.0
  orr_cabazitaxel: "35.7%"
  orr_arpi: "12.2%"
  psa_response_cabazitaxel: "35.7%"
  psa_response_arpi: "13.5%"

clinical_significance: >
  CARD established cabazitaxel as the preferred 2L option in mCRPC patients who progressed
  after BOTH prior docetaxel AND prior ARPI. Head-to-head comparison with second ARPI showed
  clearly superior rPFS (HR 0.54), OS (HR 0.64), and ORR (35.7% vs 12.2%).
  ARPI cross-resistance (AR-pathway) limits second ARPI efficacy post-prior ARPI, whereas
  cabazitaxel retains activity via tubulin-binding mechanism. NCCN Category 1.

nccn_category: "1"
evidence_grade: high

