key_findings: >
  Ciltacabtagene autoleucel (cilta-cel; BCMA CAR-T) vs standard-of-care (PVd or
  DPd) in lenalidomide-refractory multiple myeloma (1–3 prior lines). mPFS not
  reached vs 11.8 months (HR 0.26; p<0.001). ORR 84.6% vs 67.3%; CR+ 73.1% vs
  21.8%. MRD-negativity 60.6% vs 15.6%. FDA approved April 2024 for lenalidomide-
  refractory MM after ≥1 prior line. This trial established cilta-cel in earlier
  lines (2L) beyond the original ≥4-line approval.
disease_context: "Multiple myeloma (lenalidomide-refractory, 1–3 prior lines)"
