key_findings: >
  Infigratinib (FGFR1/2/3 inhibitor) in previously treated advanced/metastatic
  intrahepatic cholangiocarcinoma with FGFR2 fusions or rearrangements. ORR 23.1%;
  CR 0.9%; mDOR 5.0 months; mPFS 7.3 months; mOS 12.2 months.
  FDA approved May 2021 under accelerated approval for previously treated FGFR2-
  rearranged/fusion cholangiocarcinoma. Accelerated approval withdrawn October 2022
  after post-marketing trial failed to verify clinical benefit.
  NCCN: pemigatinib (Phase 2, FIGHT-202) and futibatinib (Phase 2, FOENIX) preferred.
