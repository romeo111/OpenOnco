notes: >
  CCTG CE.6 phase 3 (NCT00482677): hypofractionated RT (40 Gy / 15 fractions,
  2.67 Gy/fx) + TMZ (concurrent + adjuvant) vs hypofractionated RT alone in GBM
  patients ≥65 years (n=562). mOS 9.3 vs 7.6 mo (HR 0.67, p<0.001). MGMT-
  methylated patients derived the greatest benefit (mOS 13.5 vs 7.7 mo).
  MGMT-unmethylated patients: TMZ adds less benefit (mOS 7.9 vs 7.4 mo, HR 0.75
  — borderline). Established hypofractionated RT (40 Gy/15 fx) ± TMZ as the
  standard for elderly GBM ≥65. MGMT-methylation drives the TMZ-addition decision
  in elderly patients. NCCN category 1 for elderly GBM (with Nordic data together).
