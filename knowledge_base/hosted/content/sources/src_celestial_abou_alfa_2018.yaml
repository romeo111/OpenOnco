id: SRC-CELESTIAL-ABOU-ALFA-2018
type: trial_publication
hosting_mode: referenced

citation:
  authors: "Abou-Alfa GK, Meyer T, Cheng AL, et al."
  title: "Cabozantinib in Patients with Advanced and Progressing Hepatocellular Carcinoma"
  journal: "New England Journal of Medicine"
  year: 2018
  volume: "379"
  issue: "1"
  pages: "54-63"
  doi: "10.1056/NEJMoa1717002"
  pmid: "30110589"

study_type: phase_3_rct
trial_name: "CELESTIAL"
disease_context: "Advanced HCC, Child-Pugh A, ≥1 prior line systemic therapy including sorafenib"
intervention: "Cabozantinib 60 mg PO daily"
control: "Placebo"
primary_endpoint: "Overall survival"
key_results:
  - "mOS cabozantinib 10.2 mo vs placebo 8.0 mo (HR 0.76, 95% CI 0.63–0.92, p=0.005)"
  - "mPFS 5.2 mo vs 1.9 mo (HR 0.44)"
  - "ORR: 4% vs 0.4% (RECIST 1.1)"
  - "Grade 3-4 AEs: hand-foot syndrome 17%, hypertension 16%, elevated AST 12%, fatigue 10%"
  - "FDA approved January 2019 for HCC after sorafenib"
  - "Also effective in 2nd and 3rd-line (up to 2 prior systemic lines); enrolled post-sorafenib AND post-other TKI"

fda_approval_basis: true
approval_year: 2019
approval_indication: "HCC previously treated with sorafenib"

license_classification: open_access_article
source_quality: high
last_verified: "2026-05-04"
notes: >
  CELESTIAL studied cabozantinib (multi-TKI targeting VEGFR1/2/3, MET, AXL, RET)
  in patients with 1-2 prior systemic lines. Notably different from cabozantinib
  in RCC (same 60 mg dose in METEOR monotherapy; same drug, different tumor type).
  MET and AXL are overexpressed in HCC and implicated in sorafenib resistance —
  dual VEGFR+MET inhibition rationale for activity post-sorafenib.
