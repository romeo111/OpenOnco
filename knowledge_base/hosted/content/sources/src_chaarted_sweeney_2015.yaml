notes: >
  CHAARTED phase 3 (NCT00309985): docetaxel 6 cycles + ADT vs ADT alone in mHSPC
  (n=790). mOS 57.6 vs 47.2 mo overall (HR 0.72, p=0.003); greatest benefit in
  high-volume disease (≥4 bone mets OR visceral mets): mOS 49.2 vs 32.2 mo
  (HR 0.60). Low-volume disease: no significant OS benefit from docetaxel. Defined
  CHAARTED high-volume criteria used in ARASENS triplet eligibility and NCCN
  treatment algorithms. Established early docetaxel intensification for high-volume
  mHSPC; now largely superseded by ARASENS triplet for triplet-eligible patients.
