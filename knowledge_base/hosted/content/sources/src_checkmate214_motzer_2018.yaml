notes: >
  CheckMate-214 phase 3 (NCT02231749): nivolumab 3mg/kg + ipilimumab 1mg/kg q3w
  x 4 → nivo 480mg q4w maintenance vs sunitinib 50mg 4/2 in untreated ccRCC.
  Primary endpoint IMDC intermediate/poor (n=847): mOS 56.0 vs 26.6 mo (HR 0.66);
  ORR 42% vs 27%. Overall population (n=1096): PFS HR 0.89 (NS). Favorable risk:
  sunitinib numerically superior at early follow-up (nivo+ipi not preferred for
  favorable). Extended follow-up (48-mo): mOS 56 vs 26.6 mo (IMDC int/poor).
  Establishes nivo+ipi as NCCN category 1 for IMDC intermediate/poor ccRCC 1L.
