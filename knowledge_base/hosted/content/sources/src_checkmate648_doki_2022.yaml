notes: >
  CheckMate-648 phase 3 (NCT03143153): nivolumab + chemotherapy (5-FU + cisplatin)
  vs nivolumab + ipilimumab vs chemotherapy alone in untreated advanced esophageal
  squamous-cell carcinoma (ESCC, n=970). Coprimary endpoints in PD-L1 CPS ≥1 and
  all-randomized populations. Nivo+chemo vs chemo: mOS 15.4 vs 9.1 mo (CPS≥1,
  HR 0.54, p<0.0001); mOS 13.2 vs 10.7 mo (all, HR 0.74, p=0.002). Nivo+ipi vs
  chemo: mOS 13.7 vs 9.1 mo (CPS≥1, HR 0.64); mOS 12.7 vs 10.7 mo (all, HR 0.78).
  Nivo+chemo preferred over nivo+ipi as 1L for ESCC (better tolerability, larger
  OS benefit in CPS≥1). NCCN category 1 for ESCC 1L (CPS≥1 preferred; all-comers
  acceptable). Note: only squamous-cell histology enrolled.
