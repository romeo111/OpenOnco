  authors: "Ferris RL, Blumenschein G Jr, Fayette J, Guigay J, Colevas AD, Licitra L, et al."
  title: >
    Nivolumab for Recurrent Squamous-Cell Carcinoma of the Head and Neck
  journal: "New England Journal of Medicine"
