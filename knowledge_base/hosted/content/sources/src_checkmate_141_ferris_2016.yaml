study_design:
  type: RCT
  phase: 3
  n: 361
  population: "Recurrent or metastatic HNSCC (oral cavity, oropharynx, hypopharynx, larynx) progressing within 6 months after platinum-based therapy; ICI-naive"
  intervention: "Nivolumab 3 mg/kg IV q2w"
  comparator: "Investigator's choice: methotrexate, docetaxel, or cetuximab"
  primary_endpoint: "Overall survival"

key_results:
  os_hr: 0.70
  os_nivolumab_months: 7.5
  os_comparator_months: 5.1
  p_value: "0.01"
  orr_nivolumab: "13.3%"
  orr_comparator: "5.8%"
  pdl1_pos_subgroup_hr: 0.55
  pdl1_neg_subgroup_hr: 0.89
  one_year_os_nivolumab: "36%"
  one_year_os_comparator: "16.6%"

clinical_significance: >
  CheckMate-141 established nivolumab as the first immunotherapy to show OS benefit
  in platinum-refractory HNSCC (2L+). mOS 7.5 vs 5.1 months (HR 0.70, p=0.01).
  One-year OS 36% vs 16.6% — durable responders. PD-L1 ≥1% subgroup had greater
  benefit (HR 0.55). FDA approved November 2016. NCCN Category 1 for platinum-
  refractory ICI-naive recurrent/metastatic HNSCC.
  Modern context (2025/2026): most patients receive 1L pembrolizumab (KEYNOTE-048);
  nivolumab 2L primarily applies to the CPS <1 EXTREME-treated cohort (ICI-naive).

