last_verified: "2026-05-04"
notes: >
  CheckMate 743 established nivo+ipi as the preferred 1L for unresectable MPM —
  first FDA approval in MPM in 15 years (since pemetrexed+cisplatin in 2004).
  The histology-driven benefit was striking: non-epithelioid histology (sarcomatoid/
  biphasic) had mOS 18.1 vs 8.8 mo (HR 0.46), while epithelioid showed more modest
  benefit (HR 0.86). This makes histology the key clinical routing factor.
  Nivolumab 3 mg/kg q2w (weight-based) differs from the flat-dose 360 mg q3w
  or 480 mg q4w used in other tumor types.
