study_type: phase_3_rct
trial_name: "CheckMate 743"
disease_context: "Unresectable malignant pleural mesothelioma (MPM), treatment-naive, not candidates for curative resection"
intervention: "Nivolumab 3 mg/kg IV q2w + ipilimumab 1 mg/kg IV q6w, up to 2 years"
control: "Cisplatin or carboplatin + pemetrexed q3w × 6 cycles"
primary_endpoint: "Overall survival"
key_results:
- "mOS nivo+ipi 18.1 mo vs chemo 14.1 mo (HR 0.74, 95% CI 0.60–0.91, p=0.005)"
- "2-year OS rate: 41% nivo+ipi vs 27% chemo"
- "Non-epithelioid (sarcomatoid/biphasic) histology: mOS 18.1 vs 8.8 mo (HR 0.46) — dramatic benefit"
- "Epithelioid histology: mOS 18.7 vs 16.7 mo (HR 0.86) — modest benefit"
- "ORR: 40% nivo+ipi vs 43% chemo (ORR similar; duration of response longer with ICI)"
- "Grade 3-4 AEs: 30% nivo+ipi vs 32% chemo; immune-mediated: hepatitis 4%, rash 4%"
- "FDA approved October 2020 for unresectable MPM — first new 1L approval in MPM in 15 years"

fda_approval_basis: true
