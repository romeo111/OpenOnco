notes: >
  CheckMate-9ER phase 3 (NCT03141177): nivolumab 240mg q2w + cabozantinib 40mg
  daily vs sunitinib 50mg 4/2 in untreated advanced ccRCC (all IMDC risk groups,
  n=651). PFS 16.6 vs 8.3 mo (HR 0.51, p<0.001); mOS 37.7 vs 34.3 mo (HR 0.70,
  p=0.001); ORR 55.7% vs 27.1%. Benefit across all IMDC risk subgroups.
  Cabo 40mg (reduced from 60mg) selected for combination due to tolerability.
  NCCN category 1, all IMDC risk groups.
