notes: 'CheckMate-9LA phase-3 (NCT03215706): nivolumab 360 mg q3w + ipilimumab 1
  mg/kg q6w + 2 cycles platinum-doublet chemotherapy vs 4 cycles platinum-doublet
  chemotherapy alone in 1L stage IV / recurrent NSCLC regardless of PD-L1 or histology
  (n=719). Primary endpoint OS at pre-planned interim: median OS 14.1 vs 10.7 mo
  (HR 0.69; p=0.00065). 2-year OS update (Reck ESMO Open 2021): 38% vs 26%; benefit
  consistent across PD-L1 strata (including PD-L1 <1%) and squamous/non-squamous.
  Established nivo+ipi+limited-chemo as 1L option for advanced NSCLC, especially
  for patients where PD-L1-agnostic IO+chemo with shorter chemo exposure is desired;
  basis for FDA approval May 2020 and EMA approval Nov 2020.

