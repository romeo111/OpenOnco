notes: >
  ClarIDHy phase 3 RCT (NCT02989857): ivosidenib 500 mg PO daily vs
  placebo, 2:1 randomisation, in patients with IDH1-mutant cholangiocarcinoma
  progressed on 1-2 prior systemic regimens; n=185. Primary endpoint PFS
  by independent radiology review. mPFS 2.7 vs 1.4 mo (HR 0.37; 95% CI
  0.25-0.54; p<0.0001). Crossover from placebo to ivosidenib permitted at
  radiologic progression (~70% crossed over), confounding OS analysis;
  rank-preserving structural failure time (RPSFT) adjusted mOS 10.3 vs
  5.1 mo (HR 0.49). DCR 53% vs 28%. FDA approved August 2021 for previously
  treated IDH1-mutant cholangiocarcinoma. ESCAT tier IB / NCCN category 1
  for IDH1-mutated 2L+ iCCA. PMID brief: corrected from 32758454 (which is
  unrelated COVID schools paper) to 32416072 via NCBI esearch verification.
  NCT02989857.
