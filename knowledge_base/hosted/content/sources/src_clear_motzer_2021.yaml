notes: >
  CLEAR phase 3 (NCT02811861): lenvatinib 20mg daily + pembrolizumab 200mg q3w
  vs lenvatinib + everolimus vs sunitinib in untreated advanced ccRCC (all IMDC
  risk groups, n=1069). Lenv+pembro vs sunitinib: PFS 23.9 vs 9.2 mo (HR 0.39,
  p<0.001); mOS 33.6 vs 29.5 mo at interim (HR 0.66, p=0.005); ORR 71% vs 36%.
  Benefit consistent across all IMDC risk groups. Largest PFS gain of any 1L
  ccRCC study. NCCN category 1, all IMDC risk groups.
