title: >
  Perioperative Nivolumab in Resectable Lung Cancer (CheckMate-77T):
  A Randomised, Double-Blind, Phase 3 Trial
authors:
  - "Cascone T"
  - "Awad MM"
  - "Spicer JD"
  - "et al."
journal: "New England Journal of Medicine"
year: 2023
volume: "390"
issue: "19"
