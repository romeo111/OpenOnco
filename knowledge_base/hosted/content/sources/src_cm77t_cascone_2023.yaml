pmid: "38381688"
trial_name: CheckMate-77T
nct_id: NCT04025879
phase: 3
design: Randomised, double-blind, placebo-controlled

key_findings:
  - "pCR rate: 25.3% nivo vs 4.7% placebo (p<0.0001) — primary endpoint met"
  - "EFS: HR 0.58 (95% CI 0.43-0.78; p=0.0002) — key secondary endpoint"
  - "18-month EFS: ~70% nivo vs ~50% placebo"
  - "MPR (≤10% viable tumor): 35.4% vs 12.1%"
  - "OS: not yet mature; trend toward benefit"

population:
  disease: Resectable NSCLC
  stage: "Stage IIA, IIIB, or select IIIC (surgically resectable)"
  prior_treatment: None (neoadjuvant setting)
  histology: "Non-squamous and squamous NSCLC; EGFR/ALK-unselected"
  pd_l1: "Unselected for PD-L1"
  n_enrolled: 461

intervention: "Nivolumab 360 mg IV Q3W + platinum-based chemo × 4 cycles → surgery → nivolumab 480 mg Q4W × 52 weeks adjuvant"
comparator: "Placebo + platinum-based chemo × 4 cycles → surgery → placebo × 52 weeks"

