notes: >
  Pivotal trial for nivolumab perioperative NSCLC. FDA approved Dec 2023.
  NCCN NSCLC 2025: Cat 1. Highest pCR rate among the three perioperative
  trials (25.3% vs KEYNOTE-671 18.1% vs AEGEAN 17.2%) — cross-trial caution.
  Nivolumab adjuvant given Q4W (not Q3W) at 480 mg — longer interval than
  neoadjuvant 360 mg Q3W. Total adjuvant nivolumab: up to 52 weeks (13 Q4W doses).
  Chemo backbone: carboplatin + paclitaxel or nab-paclitaxel; or cisplatin-based.
  Exact citation details require clinical reviewer verification.
