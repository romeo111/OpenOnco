  notes: >
    CheckMate-8HW (Lenz HJ et al.; Lancet 2024): nivo+ipi dramatically improved PFS
    vs chemotherapy in 1L MSI-H/dMMR mCRC (PFS HR ~0.21; p<0.0001 — one of the
    strongest PFS effects seen in mCRC). ORR ~45% (nivo+ipi) vs ~29% (chemo).
    Median PFS not reached for nivo+ipi arm at data cutoff.
    OS data: trending positive; long-term follow-up ongoing.
    FDA approval for 1L MSI-H/dMMR mCRC: approved based on CheckMate-8HW ~2024.
    NCCN COLON 2025: Category 1 preferred alongside pembrolizumab (KEYNOTE-177).
    CAUTION: exact PFS HR, ORR values, NCT number, DOI/PMID require clinical reviewer
    verification — extracted from secondary sources.

