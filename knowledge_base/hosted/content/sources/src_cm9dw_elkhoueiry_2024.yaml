id: SRC-CM9DW-ELKHOUEIRY-2024
type: primary_trial
hosting: referenced
short_name: "CheckMate-9DW (El-Khoueiry 2024)"
full_citation: >
  El-Khoueiry AB, et al. Nivolumab plus Ipilimumab versus Sorafenib or Lenvatinib in
  Advanced Hepatocellular Carcinoma. N Engl J Med. 2024;391(12):1091-1102.
  doi:10.1056/NEJMoa2308640.
pubmed_id: "39316504"
nct_id: NCT04039607
trial_name: CheckMate-9DW
phase: 3
disease: HCC
biomarker: "No biomarker requirement; Child-Pugh A or selected B; no prior systemic therapy"
key_findings: >
  n=668 advanced HCC; nivolumab 1 mg/kg + ipilimumab 3 mg/kg Q6W vs investigator-choice
  sorafenib 400 mg PO BID or lenvatinib 8-12 mg PO QD (control).
  mOS 23.7 vs 20.6 months (HR 0.79; 95% CI 0.65-0.96; p=0.018).
  ORR: 36% vs 13% (p<0.001).
  mPFS: 7.7 vs 3.7 months (HR 0.74).
  Grade 3-4 AEs: 52% (nivo+ipi) vs 60% (sorafenib/lenvatinib).
  FDA approved June 6, 2024 for 1L advanced HCC.
  NCCN HCC 2025: Category 1.
