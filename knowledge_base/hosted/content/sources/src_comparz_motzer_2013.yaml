notes: >
  COMPARZ phase 3 non-inferiority (NCT00720941): pazopanib 800 mg PO daily
  vs sunitinib 50 mg daily on 4-weeks-on / 2-weeks-off schedule, as 1L
  therapy for clear-cell metastatic renal cell carcinoma; n=1110. Primary
  endpoint PFS non-inferiority (pre-specified margin HR upper 95% CI <1.25).
  mPFS 8.4 vs 9.5 mo (HR 1.05; 95% CI 0.90-1.22) — met non-inferiority.
  mOS 28.4 vs 29.3 mo (HR 0.91; 95% CI 0.76-1.08), comparable. Pazopanib
  showed lower rates of fatigue, hand-foot syndrome, and thrombocytopenia;
  better quality-of-life on multiple HRQoL instruments. Higher rates of
  ALT/AST elevation with pazopanib. Established pazopanib as comparable
  1L alternative to sunitinib for clear-cell mRCC; NCCN category 1.
