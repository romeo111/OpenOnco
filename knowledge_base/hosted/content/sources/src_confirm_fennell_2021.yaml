notes: 'CONFIRM phase-3 (NCT03063450): nivolumab 240 mg q2w vs placebo in patients
  with pleural or peritoneal malignant mesothelioma who had progressed on >=1 prior
  platinum-based chemotherapy regimen (n=332; 24 UK hospitals). Median OS 9.2 vs 6.6
  mo (HR 0.72; p=0.018); median PFS 3.0 vs 1.8 mo (HR 0.61; p<0.001). 12-mo OS 39.5%
  vs 26.9%. First positive randomised phase-3 trial of single-agent IO in post-platinum
  mesothelioma; established nivolumab monotherapy as 2L option for relapsed mesothelioma.
  Distinct from CheckMate-743 (1L nivo+ipi). Fully UK-funded (Stand Up To Cancer/CRUK).

