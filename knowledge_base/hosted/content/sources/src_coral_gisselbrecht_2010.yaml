notes: >
  CORAL: Phase 3 R-ICE vs R-DHAP followed by BEAM-autoSCT in r/r CD20+ DLBCL post-R-CHOP.
  Primary endpoint (3yr EFS) NS: R-ICE 26% vs R-DHAP 35% (p=0.14). Both achieved ~63% ORR.
  Key finding: No significant difference between R-ICE and R-DHAP salvage — choice is
  per center preference, toxicity profile, and cisplatin eligibility (R-DHAP cisplatin-based).
  Critical prognostic insight: prior rituximab dramatically worsened outcomes vs pre-rituximab
  era — rituximab-refractory DLBCL has ORR ~60% vs ~80% historically (PARMA era).
  Only chemosensitive patients (≥PR to salvage) proceed to autoSCT. ~40-50% of patients
  do not respond to salvage and cannot proceed to transplant.
  PARMA trial (Philip 1995): established autoSCT superiority in chemosensitive relapse
  (3yr EFS autoSCT 46% vs chemo alone 12%) — foundation for R-ICE/R-DHAP→autoSCT pathway.
corpus_role: pivotal_rct
