trial_acronym: "CORAL"
phase: 3
population: >
  Relapsed or refractory CD20+ DLBCL (or transformed FL) within 12 months of completing
  1L R-CHOP or equivalent immunochemotherapy. ECOG PS 0-2. Age 18-60 years.
  Prior rituximab-containing 1L required (post-rituximab era).
n_enrolled: 396
n_randomized: 396
arms:
  experimental: "R-ICE × 3 cycles (rituximab + ifosfamide + carboplatin + etoposide) then BEAM-autoSCT for responders (n=200)"
  comparator: "R-DHAP × 3 cycles (rituximab + dexamethasone + HD-cytarabine + cisplatin) then BEAM-autoSCT for responders (n=196)"
primary_endpoint: "3-year event-free survival (EFS)"
primary_result:
  r_ice_3yr_efs: "26%"
  r_dhap_3yr_efs: "35%"
  p_value: "0.14 (NS — no significant difference between R-ICE and R-DHAP)"
secondary_results:
  orr_r_ice: "63.5%"
  orr_r_dhap: "63.0%"
  cr_rate_r_ice: "26%"
  cr_rate_r_dhap: "33%"
  proportion_reaching_autosct: "~51% (R-ICE) and ~59% (R-DHAP)"
  autosct_3yr_pfs: "~42% (from autoSCT)"
prognostic_findings:
  prior_rituximab_impact: "Prior rituximab 1L significantly reduced ORR to salvage vs rituximab-naive historical controls (main lesson: rituximab-refractory disease has much worse salvage outcomes)"
  ipi_2_above_poor_outcome: "IPI 2+ at relapse associated with 3-yr EFS ~17%"
