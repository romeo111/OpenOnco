key_findings: >
  CORRECT Phase III: regorafenib vs placebo in chemo-refractory mCRC (after standard
  chemo + biologic failure). Primary endpoint OS: mOS 6.4 vs 5.0 mo (HR 0.77, p=0.0052).
  mPFS 1.9 vs 1.7 mo (HR 0.49). ORR ~1%; DCR 41% vs 15%. First targeted agent approved
  for chemo-refractory unselected mCRC.

