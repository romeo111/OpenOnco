notes: 'DeLLphi-301 phase-2 (NCT05060016): tarlatamab — half-life-extended
  bispecific T-cell engager (BiTE) targeting DLL3 and CD3 — at 10 mg or 100 mg
  IV q2w (after step-up dosing in cycle 1) in patients with relapsed/refractory
  SCLC after ≥2 prior lines (n=220 in primary analysis; 100 at 10 mg, 88 at
  100 mg). ORR 40% (10 mg) vs 32% (100 mg) by BICR; median DoR not reached;
  mPFS 4.9 mo (10 mg). Cytokine release syndrome 51% (mostly G1-2; G3 ≤1%);
  ICANS-type neurologic events 8%. Established tarlatamab (10 mg dose) as
  first DLL3-targeted therapy for pretreated SCLC; basis for FDA accelerated
  approval May 2024.

