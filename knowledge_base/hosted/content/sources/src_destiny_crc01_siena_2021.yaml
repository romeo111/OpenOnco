notes: >
  DESTINY-CRC01 (NCT03384940): single-arm phase 2 study of trastuzumab-
  deruxtecan (T-DXd, DS-8201) in HER2-expressing metastatic CRC. Cohort A
  (HER2 IHC 3+ or IHC 2+/ISH+, RAS-WT, n=53): ORR 45.3%, mPFS 6.9 mo, mOS
  15.5 mo, DCR 83%. Cohort B (HER2 IHC 2+/ISH−) and Cohort C (HER2 IHC 1+):
  minimal activity. Median 4 prior lines (heavily pretreated). ILD/pneumonitis
  ~6% all-grade, ~3% Grade ≥3 — key safety signal. Established T-DXd as an
  active option for HER2-amplified RAS-WT mCRC after standard chemo failure.
  NCCN Cat 2A. ESCAT IIA.
