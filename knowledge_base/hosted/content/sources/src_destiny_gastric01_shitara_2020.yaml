notes: >
  DESTINY-Gastric01 phase 2 (NCT03329690): trastuzumab deruxtecan (T-DXd)
  6.4 mg/kg q3w vs investigator-choice chemotherapy (irinotecan or paclitaxel)
  in HER2-positive advanced gastric/GEJ adenocarcinoma after ≥2 prior regimens
  including trastuzumab (n=187, Asian population). ORR 51% vs 14% (p<0.001);
  median OS 12.5 vs 8.4 mo (HR 0.59; p=0.01). ILD any-grade 9.6%, including
  one fatal case. Established T-DXd as standard 3L for HER2+ gastric/GEJ.
  Single-region trial — confirmatory global data pending; NCCN category 2A.
