phase: 2
population: >
  Previously treated patients with HER2-overexpressing (IHC 2+ or IHC 3+) unresectable
  or metastatic solid tumors (7 cohorts): biliary tract, bladder/urinary tract,
  cervical, endometrial/uterine, ovarian, pancreatic, and salivary gland cancers.
  Prior anti-HER2 therapy not required (tumor types where anti-HER2 is not standard).
  ≥1 prior line of standard systemic therapy.
