notes: >
  DESTINY-PanTumor02: Phase 2 basket trial, T-DXd 5.4 mg/kg q3w in 7 HER2-overexpressing
  solid tumor cohorts (IHC 2+ or 3+) where anti-HER2 therapy is not standard of care.
  Primary endpoint: confirmed ORR by BICR.
  Endometrial/uterine cohort (n=40): ORR 57.5% — highest activity signal in trial.
  Most uterine cohort patients had serous or clear-cell histology; HER2 overexpression
  (~30% of uterine serous carcinoma). IHC 3+ threshold drives current FDA tumor-agnostic label.

  Key toxicity: ILD/interstitial lung disease — occurs in ~12% at Grade 1-2;
  potentially fatal. Requires proactive monitoring: CT chest at baseline, at every
  2 cycles for first 6 cycles, then every 3 cycles; hold immediately for new respiratory
  symptoms; grade ≥2 = corticosteroids; grade ≥3 = permanent discontinuation.

  IHC 3+ required for FDA tumor-agnostic label. IHC 2+ showed activity but
  is not covered by current FDA approval for non-breast/non-lung indications.
corpus_role: pivotal_phase2
