notes: >
  EANO 2022 guidelines aligned with WHO CNS 5th edition (2021). Key content:
  mandates IDH mutation testing + 1p/19q codeletion FISH for all adult diffuse
  gliomas; oligodendroglioma = IDH-mut + 1p/19q-codel (ESCAT IA for PCV+RT
  per RTOG 9802 / EORTC 26951 phase III evidence); astrocytoma = IDH-mut + ATRX
  loss (mutually exclusive with codeletion). TERT promoter mutation co-occurs in
  oligodendroglioma (~95%).
  NOTE: Citation details (DOI, PMID, URL) are approximate stubs and require manual
  verification against PubMed/EANO.eu before clinical sign-off.
