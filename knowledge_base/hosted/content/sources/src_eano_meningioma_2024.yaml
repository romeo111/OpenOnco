notes: >
  European Association of Neuro-Oncology guidelines on meningioma management (2024 update).
  Covers: WHO grading (2021 5th edition criteria including molecular markers), surgical
  extent-of-resection principles, radiotherapy (SRS, fractionated SRT, IMRT), systemic
  therapy for progressive/recurrent grade II-III meningioma, NF2-related meningioma
  management. Relevant molecular biomarkers: NF2, TRAF7, AKT1, SMO, KLF4 (secretory
  subtype), CDKN2A/B deletion (adverse prognosis), TERT promoter mutation (adverse).
  Investigational agents: AKT inhibitors (AKT1 E17K), vismodegib (SMO-mutant), anti-PR agents.
  NCCN CNS guidelines (SRC-NCCN-CNS-2025) provide parallel North American guidance.
  Note: Verify if 2024 update is published; earlier versions (2021, 2022) exist. Replace
  with confirmed citation.
