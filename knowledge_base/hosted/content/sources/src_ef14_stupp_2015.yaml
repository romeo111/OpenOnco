notes: >
  EF-14 phase 3 (NCT00916409): tumor-treating fields (TTFields, Optune device,
  200 kHz, ≥18h/day) + adjuvant temozolomide vs TMZ alone in newly diagnosed GBM
  post-Stupp concurrent phase (n=695). mOS 20.9 vs 16.0 mo (HR 0.63, p<0.001);
  2-yr OS 43% vs 29%; 5-yr OS 13% vs 5%. Benefit largest in MGMT-methylated (mOS
  28.7 vs 16.7 mo) and in patients with ≥75% TTFields compliance. FDA approved
  Optune for GBM maintenance 2015 (supratentorial, newly diagnosed after Stupp
  CRT). Compliance is key — benefit highly correlated with device wear time.
  Practical barriers: device cost (~$21k/month), scalp electrodes require shaving,
  daily maintenance. NCCN category 1 (2A in some versions due to compliance
  challenges). Not available in Ukraine.
