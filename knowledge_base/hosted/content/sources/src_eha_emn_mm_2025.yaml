notes: >
  EHA-EMN evidence-based guidelines for smouldering, newly-diagnosed,
  and relapsed/refractory multiple myeloma. Updates the 2021 EHA-ESMO
  guideline by incorporating 14 novel EMA/FDA-approved regimens
  (anti-CD38 quadruplets, BCMA / GPRC5D bispecifics, BCMA CAR-T) and
  adds R2-ISS staging, MRD by next-generation flow / sequencing,
  circulating plasma cells, and mass-spectrometry monoclonal-protein
  assessment as prognostic / response factors. Algorithms include
  levels of evidence + grades of recommendation. Supersedes
  SRC-ESMO-MM-2023 for new clinical recommendations; ESMO is no longer
  a co-publisher (publication moved from Annals of Oncology to Nature
  Reviews Clinical Oncology under EHA-EMN authorship).
