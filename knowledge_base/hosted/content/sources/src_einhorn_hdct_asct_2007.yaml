id: SRC-EINHORN-HDCT-ASCT-2007
type: clinical_trial
hosting: referenced

citation:
  authors: "Einhorn LH, Williams SD, Chamness A, Brames MJ, Perkins SM, Abonour R."
  title: >
    High-dose chemotherapy and stem-cell rescue for metastatic germ-cell tumors
  journal: "New England Journal of Medicine"
  year: 2007
  volume: 357
  issue: 4
  pages: "340-348"
  doi: "10.1056/NEJMoa067080"
  pmid: "17596594"

study_design:
  type: phase_2_prospective_registry
  n: 173
  population: >
    Relapsed/refractory GCT after prior cisplatin-containing chemotherapy.
    Indiana University high-dose protocol. Includes cisplatin-refractory and
    previously treated patients with poor prognostic features.
  intervention: >
    High-dose chemotherapy × 2 tandem cycles:
    Carboplatin 700 mg/m²/d × 3 (d1-3) + etoposide 750 mg/m²/d × 3 (d1-3) per cycle.
    Followed by autologous peripheral blood stem cell rescue (ASCT) after each cycle.
    2 tandem cycles total (cycles given approximately 3-4 weeks apart).
  primary_endpoint: "No evidence of disease (NED) at 2 years"

key_results:
  ned_2year: "63%"
  ned_favorable_group: "78% (good Indiana prognostic score)"
  ned_unfavorable_group: "53%"
  treatment_related_mortality: "<3%"
  grade34_toxicity: "Significant myelosuppression; mucositis common; renal toxicity from carboplatin"

indiana_prognostic_model:
  good: "AFP <1000 ng/mL, hCG <1000 IU/L, no liver/bone/brain mets at relapse, no cisplatin-refractory history"
  poor: "AFP ≥1000 or hCG ≥1000 or liver/bone/brain mets or cisplatin-refractory disease"

clinical_significance: >
  Einhorn 2007 established high-dose carboplatin + etoposide + tandem ASCT (HDCT-ASCT)
  as the standard salvage approach for relapsed GCT with poor prognostic features or
  cisplatin-refractory disease. 63% durable NED at 2 years across the entire cohort;
  78% in favorable group. HDCT-ASCT is potentially curative even in multiply-relapsed
  GCT. Requires specialized ASCT center. NCCN Category 1 for poor-prognostic-score
  relapsed GCT and cisplatin-refractory disease.

nccn_category: "1"
evidence_grade: moderate

license: open_access_oa
hosting_justification: null

last_reviewed: "2026-05-04"
