notes: >
  Fifth-version ELN guidance for adult CML. Modifies prior (2020) advice
  to switch TKI on failure of molecular milestones in favour of
  individualised dose reduction; updates treatment-discontinuation /
  treatment-free remission criteria with mature data; adds management
  guidance for parenting (men and women) on TKI; aligns with the WHO
  reclassification of CML as biphasic disease. Supersedes
  SRC-ELN-CML-2020 for new clinical recommendations.
