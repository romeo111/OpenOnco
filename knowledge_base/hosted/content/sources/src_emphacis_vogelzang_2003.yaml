id: SRC-EMPHACIS-VOGELZANG-2003
type: clinical_trial
hosting_mode: referenced

citation:
  authors: "Vogelzang NJ, Rusthoven JJ, Symanowski J, et al."
  title: "Phase III study of pemetrexed in combination with cisplatin versus cisplatin alone in patients with malignant pleural mesothelioma"
  journal: "Journal of Clinical Oncology"
  year: 2003
  volume: 21
  issue: 14
  pages: "2636–2644"
  pmid: "12860938"
  doi: "10.1200/JCO.2003.11.136"

trial_name: "EMPHACIS"
phase: 3
design: "Randomized, international; n=456"

population: >
  Malignant pleural mesothelioma (MPM), chemotherapy-naive;
  all histological subtypes; ECOG 0-2; CrCl ≥45 mL/min

interventions:
  - "Arm A: pemetrexed 500 mg/m² d1 + cisplatin 75 mg/m² d1 q21d × 6 cycles"
  - "Arm B: cisplatin 75 mg/m² d1 q21d (monotherapy)"
  - "Important: mandatory folic acid + vitamin B12 supplementation added during trial to reduce toxicity"

primary_endpoint: "Overall survival"

key_results:
  overall_response_rate_combo: "41.3%"
  overall_response_rate_mono: "16.7%"
  median_overall_survival_combo: "12.1 months"
  median_overall_survival_mono: "9.3 months"
  os_hr: "0.77 (p=0.020)"
  progression_free_survival_combo: "5.7 months"
  progression_free_survival_mono: "3.9 months"
  pfs_p_value: "p<0.001"
  vitamin_supplement_subset_os: "13.3 vs 10.0 months (HR 0.75) — in fully supplemented patients"

clinical_significance: >
  EMPHACIS is the landmark phase 3 trial establishing pemetrexed+cisplatin as the
  global standard of care for MPM. First and only large randomized trial showing
  OS benefit over cisplatin monotherapy (12.1 vs 9.3 months, HR 0.77, p=0.020).
  ORR more than doubled (41% vs 17%). KEY SAFETY FINDING: mandatory folic acid +
  vitamin B12 supplementation dramatically reduces toxicity (Grade 3/4 neutropenia
  ~18% with supplements vs ~60% without). Pemetrexed FDA-approved for MPM February 2004.
  Note: with the subsequent emergence of nivolumab+ipilimumab (CheckMate-743), the
  first-line choice depends on ICI eligibility — nivo+ipi is now preferred for fit
  patients; pemetrexed+cisplatin remains standard for ICI-contraindicated patients
  and is commonly used after ICI 1L progression.

relates_to_diseases:
  - DIS-MESOTHELIOMA

relates_to_regimens:
  - REG-PEMETREXED-CISPLATIN-MPM

