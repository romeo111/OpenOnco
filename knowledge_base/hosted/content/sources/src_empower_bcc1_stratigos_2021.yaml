notes: >
  EMPOWER-BCC-1 (NCT03132636): Phase 2 single-arm trial of cemiplimab 350 mg IV Q3W
  in locally advanced BCC (laBCC) after HHI progression or intolerance.
  N=84 (laBCC cohort).
  PRIMARY ENDPOINT: ORR per central review.
  KEY RESULTS:
    - ORR: 21% (18/84 patients in laBCC cohort)
    - CR: 6%; PR: 15%
    - Duration of response: median not reached (range 3.5-53+ months)
    - Disease control rate (CR+PR+SD ≥16 weeks): 48%
    - Median follow-up: ~15 months
  SAFETY:
    - Grade 3-4 TRAEs: 27% (mainly inflammatory, rash, fatigue)
    - IRAEs: similar to other PD-1 inhibitors
  FDA APPROVAL: February 9, 2021 — cemiplimab for laBCC post-HHI.
  Extended to mBCC (metastatic BCC) September 2021 based on additional
  EMPOWER-BCC-1 mBCC cohort data.
  NCCN Skin Cancer: cemiplimab Category 1 for laBCC and mBCC after HHI progression
  or for patients where HHI is not appropriate.
  NOTE: Cemiplimab is the ONLY anti-PD-1 antibody approved for BCC; pembrolizumab
  is NOT FDA-approved for BCC (EMPOWER-BCC-2 data not mature as of 2024).
