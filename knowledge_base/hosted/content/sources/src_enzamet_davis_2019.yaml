notes: >
  ENZAMET phase 3 (NCT02446405): enzalutamide + ADT ± concurrent docetaxel vs
  non-steroidal anti-androgen (bicalutamide/flutamide/nilutamide) + ADT in mHSPC
  (n=1125). 3-yr OS 80% vs 72% (HR 0.67, p<0.001). In enzalutamide + docetaxel
  subgroup: OS benefit further enhanced (supports triplet concept). Established
  enzalutamide+ADT as NCCN category 1 ARPI doublet for mHSPC. Enzalutamide can
  be combined with docetaxel (triplet) though darolutamide+docetaxel+ADT (ARASENS)
  is the preferred triplet per most guidelines due to tolerability profile.
