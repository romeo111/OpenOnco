id: SRC-EORTC62012-JUDSON-2014
title: "Doxorubicin alone versus intensified doxorubicin plus ifosfamide for first-line treatment of advanced or metastatic soft-tissue sarcoma: a randomised controlled phase 3 trial"
type: clinical_trial
hosting_mode: referenced

citation:
  authors: "Judson I, Verweij J, Gelderblom H, et al. (EORTC Soft Tissue and Bone Sarcoma Group)"
  title: "Doxorubicin alone versus intensified doxorubicin plus ifosfamide for first-line treatment of advanced or metastatic soft-tissue sarcoma: a randomised controlled phase 3 trial"
  journal: "Lancet Oncology"
  year: 2014
  volume: 15
  issue: 4
  pages: "415–423"
  pmid: "24618336"
  doi: "10.1016/S1470-2045(14)70063-4"

trial_name: "EORTC 62012"
phase: 3
design: "Randomized, open-label; n=455"

population: >
  Advanced or metastatic soft-tissue sarcoma (excluding GIST, dermatofibrosarcoma
  protuberans, Kaposi sarcoma); any histological subtype; no prior anthracycline;
  ECOG 0-2; adequate organ function

interventions:
- "Arm A (doxorubicin mono): doxorubicin 75 mg/m² IV day 1 q21d × up to 6 cycles"
- "Arm B (AI combination): doxorubicin 75 mg/m² d1 + ifosfamide 10 g/m² over 4d (d1-4) + mesna q21d × up to 6 cycles; G-CSF mandatory"

primary_endpoint: "Overall survival"

key_results:
  overall_response_rate_ai: "26.5%"
  overall_response_rate_dox: "13.6%"
  progression_free_survival_ai: "7.4 months"
  progression_free_survival_dox: "4.6 months"
  pfs_hr: "0.74 (95% CI 0.60–0.90; p=0.003)"
  overall_survival_ai: "14.3 months"
  overall_survival_dox: "12.8 months"
  os_hr: "0.83 (95% CI 0.67–1.03; p=0.076) — NOT statistically significant"
  grade_3_4_neutropenia_ai: "~71%"
  grade_3_4_neutropenia_dox: "~36%"

clinical_significance: >
  EORTC 62012 is the definitive phase 3 trial establishing the comparative efficacy
  of doxorubicin monotherapy vs AI (dox+ifosfamide) in advanced STS. KEY FINDING:
  AI achieves significantly higher ORR (~26% vs 14%) and improved PFS, but does NOT
  improve overall survival (HR 0.83, p=0.076). PRACTICE IMPLICATIONS:
  (1) Doxorubicin monotherapy is preferred for most patients with advanced STS
      (palliative intent, tolerability priority, older/less fit patients);
  (2) AI combination appropriate when tumor response/shrinkage is a priority:
      neoadjuvant (downstaging for resection), rapidly progressive disease,
      or when complete response would meaningfully improve prognosis.
  This trial ended the debate about routine AI combination — OS equivalence means
  dox monotherapy is the default for most palliative-intent patients.

relates_to_diseases:
- DIS-SOFT-TISSUE-SARCOMA

