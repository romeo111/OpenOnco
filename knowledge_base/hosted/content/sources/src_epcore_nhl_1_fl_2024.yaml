key_findings: >
  Epcoritamab SC in relapsed/refractory FL ≥2 prior lines (EPCORE NHL-1 FL
  expansion cohort, n=128). ORR ~82%; CR ~68%; median DOR not reached at
  primary analysis; median PFS ~25.2 months. CRS any-grade ~50% (Grade 3+
  rare, ~2%); same step-up dosing schedule as DLBCL indication (0.16 →
  0.8 → 48 mg SC). FDA approved for R/R FL ≥2 prior lines February 29, 2024
  (same NDA as DLBCL, extended indication). NCCN B-cell lymphoma 2025: Cat 2A
  preferred for FL ≥3L alongside mosunetuzumab.
disease_context: "Follicular lymphoma (relapsed/refractory, ≥2 prior systemic lines including anti-CD20 + alkylator)"
