key_findings: >
  Epcoritamab (subcutaneous CD3×CD20 bispecific antibody) in relapsed/refractory
  DLBCL (≥3 prior lines including CAR-T). ORR 63%; CR 39%. Median DOR 12.0 months
  in all patients; mDoR not reached in CRs (>12 months). CRS Grade 1–2 in 49%;
  Grade 3+ rare (2%). ICANS 6%. FDA approved May 2023 for R/R DLBCL ≥2 prior lines.
