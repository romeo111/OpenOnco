id: SRC-ERIBULIN312-SCHOFFSKI-2016
source_type: clinical_trial
title: "Eribulin versus dacarbazine in previously treated patients with advanced liposarcoma or leiomyosarcoma: a randomised, open-label, multicentre, phase 3 trial"
pmid: "26441396"
doi: "10.1016/S0140-6736(15)60651-3"
journal: "Lancet"
year: 2016
authors:
  - "Schöffski P"
  - "Chawla S"
  - "Maki RG"
  - "Italiano A"
  - "Gelderblom H"
  - "Choy E"
  - "Grignani G"
  - "Camargo V"
  - "Blay JY"
  - "Rutkowski P"
  - "Demetri GD"
trial_acronym: "ERIBULIN-312 (E7389-G000-312)"
phase: 3
population: >
  Previously treated advanced liposarcoma (LPS) or leiomyosarcoma (LMS).
  Prior anthracycline-based chemotherapy required. ECOG PS 0-2.
  LPS subtypes: well-differentiated, dedifferentiated, myxoid/round cell.
  LMS subtypes: uterine or extra-uterine LMS.
n_enrolled: 452
n_randomized: 452
arms:
  experimental: "Eribulin mesylate 1.4 mg/m² IV on days 1 and 8 q21d (n=228)"
  comparator: "Dacarbazine 850-1200 mg/m² IV q21d (n=224)"
primary_endpoint: "Overall survival"
primary_result:
  os_hr: 0.768
  os_hr_ci: "0.618-0.954"
  p_value: "0.017"
  median_os_experimental_months: 13.5
  median_os_comparator_months: 11.5
subgroup_results:
  liposarcoma_subgroup:
    os_hr: 0.51
    os_hr_ci: "0.35-0.75"
    n_lps: 143
    notes: "Strong OS benefit in LPS; FDA-approved specifically for liposarcoma"
  leiomyosarcoma_subgroup:
    os_hr: 0.93
    os_hr_ci: "0.71-1.22"
    n_lms: 309
    notes: "OS benefit NOT significant in LMS subgroup; LPS drove the overall OS benefit"
secondary_results:
  pfs_hr: 0.88
  pfs_hr_ci: "0.71-1.09"
  pfs_p_value: "0.23"
  orr_experimental: "4%"
  orr_comparator: "5%"
regulatory:
  fda_approval: "January 28, 2016 — eribulin mesylate (Halaven) for unresectable or metastatic liposarcoma following prior anthracycline-containing regimen"
  fda_basis: "OS benefit in LPS subgroup (HR 0.51); overall OS HR 0.768; FDA restricted approval to LPS only (not LMS) due to lack of benefit in LMS subgroup"
access_level: public
hosting_mode: referenced
license:
  name: "Lancet standard"
  spdx_id: null
relates_to_diseases:
  - DIS-SOFT-TISSUE-SARCOMA
last_verified: "2026-05-04"
notes: >
  ERIBULIN-312: Phase 3 eribulin vs dacarbazine in LPS/LMS. Overall OS HR 0.768 (p=0.017).
  Critical subgroup finding: LPS subgroup OS HR 0.51 (very strong); LMS subgroup OS HR 0.93
  (NS). FDA approved eribulin for LIPOSARCOMA ONLY (not LMS) — this subgroup distinction
  drives the FDA label and clinical use. NCCN recommends eribulin for liposarcoma (Cat 1
  in US guidelines); EU approval broader.
  Peripheral neuropathy is the main toxicity (cumulative sensory neuropathy); neutropenia
  also common. QT prolongation monitoring required.
  Compare with ET-743-SAR-3007: trabectedin showed PFS HR 0.55 in LPS+LMS but OS NS.
  The two trials together support: eribulin preferred for liposarcoma (OS benefit);
  trabectedin as alternative or LMS-preferred option.
corpus_role: pivotal_rct
