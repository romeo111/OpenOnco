title: "ESMO Clinical Practice Guidelines: Anal Cancer"
short_name: "ESMO Anal Cancer"
authors: "Glynne-Jones R, Nilsson PJ, Aschele C, et al."
journal: "Annals of Oncology"
year: 2014
volume: 25
pages: "v10-v20"
doi: "10.1093/annonc/mdu159"
pmid: "25223450"
key_findings: >
  ESMO guidelines for anal carcinoma management. Definitive chemoradiation
  (mitomycin-C + 5-FU + concurrent RT) for non-metastatic squamous cell carcinoma
  of the anal canal; cisplatin + 5-FU for locally advanced disease.
  Systemic therapy for metastatic anal cancer: carboplatin or cisplatin + 5-FU
  combinations. Updated recommendations align with recent immunotherapy data.
