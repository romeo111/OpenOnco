notes: >
  Companion ESMO guideline to ELN 2020. Covers Sokal/EUTOS/ELTS scoring,
  TKI selection by comorbidity, response milestones (BCR-ABL1 IS), and
  treatment-free remission criteria. Slightly older than ELN 2020 but still
  the canonical ESMO reference.
  Freshness check 2026-04-27: ESMO has not published a CML guideline
  refresh since 2017. The ELN-CML-2025 update (Apperley et al, Leukemia
  39:1797-1813, doi 10.1038/s41375-025-02664-w; SRC-ELN-CML-2025 in KB)
  effectively supersedes the 2017 ESMO content for treatment selection,
  response milestones, and TKI-switching logic. Source kept for
  historical reference and for structured ESMO citation in algorithms
  that pre-date 2025.
