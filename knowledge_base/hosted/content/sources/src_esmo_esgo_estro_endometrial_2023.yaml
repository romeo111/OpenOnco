notes: >
  ESMO-ESGO-ESTRO 2023 joint endometrial carcinoma guideline. Key content relevant
  to OpenOnco: molecular subtyping (ProMisE / TCGA-surrogate: POLE-ultramutated,
  MMR-deficient, p53-aberrant, NSMP); p53-aberrant subtype → adjuvant chemoradiotherapy
  (carboplatin/paclitaxel + RT) per PORTEC-3 molecular subgroup analysis
  (León-Castillo JCO 2020). This is the current ESMO evidence backbone for
  endometrial molecular subtyping actionability.
