notes: >
  ET-743-SAR-3007: Phase 3 trabectedin vs dacarbazine in previously treated LPS/LMS.
  Primary endpoint PFS met: HR 0.55 (4.2 vs 1.5 months; p<0.0001). OS not significant
  (HR 0.93; 12.4 vs 12.9 months). FDA approved October 2015 based on PFS benefit.
  Liposarcoma subtypes included: well-differentiated, dedifferentiated, myxoid/round cell.
  Hepatotoxicity is the principal toxicity (transaminase elevation >80%); dexamethasone
  20 mg IV premedication has hepatoprotective effect. PICC line/port required for 24h infusion.
  Note: eribulin (ERIBULIN-312) showed OS benefit specifically in LPS subgroup (HR 0.51)
  vs trabectedin's NS OS effect — some guidelines prefer eribulin for liposarcoma,
  trabectedin for LMS (where LMS subgroup OS HR was more favorable in ERIBULIN-312 analysis).
corpus_role: pivotal_rct
