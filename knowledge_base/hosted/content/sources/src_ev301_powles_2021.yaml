id: SRC-EV301-POWLES-2021
type: clinical_trial
hosting_mode: referenced

citation:
  authors: "Powles T, Rosenberg JE, Sonpavde GP, et al."
  title: "Enfortumab vedotin in previously treated advanced urothelial carcinoma"
  journal: "New England Journal of Medicine"
  year: 2021
  volume: 384
  issue: 12
  pages: "1125–1135"
  pmid: "33577729"
  doi: "10.1056/NEJMoa2035807"

trial_name: "EV-301"
phase: 3
design: "Randomized, open-label; n=608"

population: >
  Locally advanced or metastatic urothelial carcinoma; prior treatment with
  platinum-containing chemotherapy AND a PD-(L)1 inhibitor (either as separate
  lines or in combination); ECOG 0-1; CrCl ≥30 mL/min

interventions:
  - "Arm A: Enfortumab vedotin (EV) 1.25 mg/kg IV days 1, 8, 15 q28d"
  - "Arm B: Chemotherapy (investigator choice: vinflunine 320 mg/m² q3w, OR docetaxel 75 mg/m² q3w, OR paclitaxel 175 mg/m² q3w)"

primary_endpoint: "Overall survival"

key_results:
  overall_response_rate_ev: "40.6%"
  overall_response_rate_chemo: "17.9%"
  median_overall_survival_ev: "12.9 months"
  median_overall_survival_chemo: "9.0 months"
  os_hr: "0.70 (95% CI 0.56–0.89; p=0.001)"
  median_pfs_ev: "5.6 months"
  median_pfs_chemo: "3.7 months"
  pfs_hr: "0.62 (p<0.001)"
  grade_3_4_peripheral_neuropathy_ev: "~8%"
  grade_3_4_skin_reactions_ev: "~4%"
  grade_3_4_hyperglycemia_ev: "~5%"

clinical_significance: >
  EV-301 is the pivotal trial establishing enfortumab vedotin (EV) as the standard
  of care for previously treated advanced urothelial carcinoma in patients who received
  prior platinum AND prior anti-PD-(L)1. EV demonstrated statistically significant
  OS benefit over standard taxane/vinflunine chemotherapy (mOS 12.9 vs 9.0 months,
  HR 0.70, p=0.001). CONTEXT: With EV+pembrolizumab now approved as 1L (EV-302),
  EV-301 data is most applicable to: (1) patients who received platinum-containing
  chemotherapy as 1L (with or without avelumab maintenance) and are now progressing
  in 2L; (2) patients who have received EV in a prior combination but require
  re-evaluation (note: EV monotherapy in post-EV+pembro setting has limited data).
  FDA approved October 2021 for previously treated advanced UC.

relates_to_diseases:
  - DIS-UROTHELIAL

license: "Publicly citable (NEJM, PMID available)"
last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
