notes: >
  EV-302/KEYNOTE-A39 phase 3 (NCT04223856): enfortumab vedotin + pembrolizumab
  vs platinum-based chemotherapy (GC or MVAC) in untreated locally advanced or
  metastatic urothelial carcinoma (n=886), regardless of cisplatin eligibility or
  PD-L1 status. mPFS 12.5 vs 6.3 mo (HR 0.45, p<0.001); mOS 31.5 vs 16.1 mo
  (HR 0.47, p<0.001); ORR 67.7% vs 44.4%. Paradigm-shifting: establishes EV+pembro
  as NCCN category 1 preferred 1L for all cisplatin-eligible patients and most
  cisplatin-ineligible patients. Replaces platinum+ICI as de facto 1L standard.
