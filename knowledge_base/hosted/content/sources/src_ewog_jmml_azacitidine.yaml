notes: >
  STUB — requires clinical verification of exact citation. The European Working
  Group on MDS in Childhood (EWOG-MDS; Niemeyer group, Freiburg) has published
  multiple studies on pre-HSCT azacitidine in JMML, including a prospective pilot
  (NCT00450814) and retrospective analyses showing cytoreductive benefit before HSCT.
  Key findings from EWOG-MDS azacitidine-JMML data: azacitidine 75 mg/m²/day × 3-7
  days Q28 (1-3 cycles) used as bridging therapy to HSCT; reduces disease burden
  as assessed by JMML scoring systems; may improve post-HSCT outcomes.
  Azacitidine in JMML is NOT equivalent to azacitidine in MDS — the goal is cytoreduction
  before transplant, not long-term disease control. HSCT remains the only curative treatment.
  Primary reference to verify: Stachowiak M et al., Pediatr Blood Cancer; and/or
  Cseh A et al., Leukemia (EWOG-MDS publications ~2015–2022).
  NCT00450814 is the EWOG-MDS azacitidine JMML pilot study — check clinicaltrials.gov
  for publications.
