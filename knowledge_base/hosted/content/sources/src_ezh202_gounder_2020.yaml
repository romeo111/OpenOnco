notes: >
  Phase II single-arm trial: tazemetostat (EZH2 inhibitor) in patients with metastatic or
  locally advanced epithelioid sarcoma with SMARCB1/INI1 loss (confirmed by IHC).
  N=62 patients (62 evaluable). Primary endpoint: ORR by RECIST 1.1.
  ORR: 15% (9/62; 1 CR, 8 PR). Clinical benefit rate (CR+PR+SD): 26%.
  mDOR: not reached in responders. Generally well tolerated; myeloid malignancy risk noted
  (class effect — long-term exposure monitoring).
  Formed basis of FDA accelerated approval (January 2020) for tazemetostat in epithelioid sarcoma.
  Note: separate EZH2-mutant follicular lymphoma cohort in same program (different indication).
  Citation: Gounder M et al. Lancet Oncol. 2020;21(11):1423-1432. DOI: 10.1016/S1470-2045(20)30471-2
