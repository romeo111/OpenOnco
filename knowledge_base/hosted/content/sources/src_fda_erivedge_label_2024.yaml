notes: >
  Regulatory label anchor for vismodegib in advanced basal cell carcinoma.
  The label states adult metastatic BCC and locally advanced BCC that has
  recurred after surgery, or where the patient is not a candidate for surgery
  and radiation. Recommended dose is 150 mg orally once daily until progression
  or unacceptable toxicity.
