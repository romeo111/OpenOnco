notes: >
  Initial FDA approval (2020-03-02; approval letter
  accessdata.fda.gov/drugsatfda_docs/appletter/2020/761113Orig1s000ltr.pdf)
  of isatuximab-irfc + pomalidomide + dexamethasone for adult patients
  with multiple myeloma after >=2 prior therapies including lenalidomide
  and a proteasome inhibitor (per ICARIA-MM trial; SRC-ICARIA-ATTAL-2019
  in KB). Subsequent approvals expanded the label: 2021-03-31 added
  isatuximab + carfilzomib + dexamethasone for R/R MM after 1-3 prior
  lines (per IKEMA; SRC-IKEMA-MOREAU-2021); 2024-09-20 added
  isatuximab + bortezomib + lenalidomide + dexamethasone for newly
  diagnosed MM patients ineligible for ASCT (per IMROZ;
  SRC-IMROZ-FACON-2024). Recommended dose: 10 mg/kg IV weekly x 4
  then every 2 weeks. Used in OpenOnco as the regulatory anchor for
  isatuximab access-pathway and dosing rules in the MM vertical.
