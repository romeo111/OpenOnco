notes: >
  Regulatory label anchor for sonidegib in locally advanced basal cell
  carcinoma that recurred after surgery or radiation therapy, or where the
  patient is not a candidate for surgery or radiation therapy. Recommended dose
  is 200 mg orally once daily on an empty stomach until progression or
  unacceptable toxicity.
