title: "FDA Approval: Retifanlimab-dlwr (Zynyz) for Squamous Cell Carcinoma of the Anal Canal"
short_name: "FDA Zynyz approval SCAC"
authors: "U.S. Food and Drug Administration"
year: 2023
url: "https://www.fda.gov/drugs/drug-approvals-and-databases/drug-trials-snapshots-zynyz"
key_findings: >
  FDA accelerated approval (August 2023) of retifanlimab-dlwr (Zynyz; anti-PD-1)
  for adults with metastatic or recurrent locally advanced squamous cell carcinoma
  of the anal canal (SCAC) in combination with carboplatin and paclitaxel.
  Accelerated approval based on POD1UM-202 Phase 2 data; confirmed by POD1UM-303
  Phase 3 (full approval 2025). First immunotherapy approved for SCAC.
