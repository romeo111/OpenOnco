notes: >
  FIRE-3 (AIO KRK-0306, NCT00433927): randomized phase 3 trial comparing
  FOLFIRI + cetuximab vs FOLFIRI + bevacizumab as 1L for KRAS wild-type
  (later expanded to RAS-WT) metastatic CRC. Primary RAS-WT population
  results: ORR 65.5% (cetux) vs 59.6% (bev); mOS 33.1 vs 25.6 mo (HR 0.70,
  p=0.011) — OS was a secondary endpoint. mPFS 10.4 vs 10.2 mo (NS).
  Sidedness analysis (Stahler 2016): left-sided RAS-WT: mOS 38.3 vs 28.0 mo
  favoring cetuximab. Right-sided: bevacizumab numerically favored. Together
  with CALGB-80405 (Venook 2017 JCO), established sidedness-guided selection
  of anti-EGFR vs anti-VEGF for RAS-WT mCRC 1L.
