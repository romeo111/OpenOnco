id: SRC-FLAURA2-PLANCHARD-2023
type: primary_trial
hosting: referenced
short_name: "FLAURA2 (Planchard 2023)"
full_citation: >
  Planchard D, et al. Osimertinib plus Chemotherapy in EGFR-Mutated Advanced NSCLC.
  N Engl J Med. 2023;389(21):1935-1948. doi:10.1056/NEJMoa2306434.
pubmed_id: "37870976"
nct_id: NCT04035048
trial_name: FLAURA2
phase: 3
disease: NSCLC
biomarker: "EGFR exon 19 deletion or L858R"
key_findings: >
  n=557 EGFR ex19del/L858R 1L NSCLC. Osimertinib+carbo+pem vs osimertinib monotherapy:
  mPFS 25.5 vs 16.7 months (HR 0.62; 95% CI 0.49-0.78; p<0.001).
  OS HR 0.75 (95% CI 0.57-0.97; p=0.0096) — statistically significant OS improvement.
  Grade 3+ AEs: 64% (combo) vs 28% (monotherapy).
  FDA approved August 19, 2024 for 1L EGFR ex19del/L858R NSCLC with carboplatin+pemetrexed.
