notes: 'FLAURA-2 phase-3 (NCT04035486): osimertinib 80 mg PO daily + platinum
  (cisplatin or carboplatin) + pemetrexed × 4 cycles → osimertinib + pemetrexed
  maintenance vs osimertinib monotherapy in 1L EGFR-mutated (exon 19 del or L858R)
  advanced NSCLC (n=557). Median PFS by investigator 25.5 vs 16.7 mo (HR 0.62;
  p<0.001); BICR PFS 29.4 vs 19.9 mo. CNS PFS HR 0.40 in patients with baseline
  CNS metastases. OS data immature at primary analysis. Established osimertinib +
  chemo as a 1L option for EGFR-mut advanced NSCLC, particularly with high-risk
  features (CNS mets, L858R); basis for FDA approval Feb 2024.

  '
