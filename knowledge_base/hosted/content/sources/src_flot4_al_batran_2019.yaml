notes: >
  FLOT4-AIO phase 2/3 (NCT01216644): perioperative FLOT (5-FU, leucovorin,
  oxaliplatin, docetaxel) 4 cycles pre + 4 post vs ECF/ECX (epirubicin +
  cisplatin + 5-FU/capecitabine) 3 cycles pre + 3 post in resectable gastric
  or gastro-oesophageal junction adenocarcinoma cT2-N+M0 (n=716). Median OS
  50 vs 35 mo (HR 0.77; 95% CI 0.63-0.94; p=0.012). Median DFS 30 vs 18 mo
  (HR 0.75; p=0.0036). pCR 16% vs 6%. Established FLOT as new global standard
  perioperative regimen for resectable gastric/GEJ adenocarcinoma. NCCN/ESMO
  category 1.
