notes: 'FORTITUDE-101 (NCT05052801): Amgen-sponsored phase 3 randomized double-blind
  placebo-controlled trial of bemarituzumab (anti-FGFR2b mAb, 15 mg/kg IV q2w with
  cycle 1 day 8 booster 7.5 mg/kg) + mFOLFOX6 vs placebo + mFOLFOX6 in FGFR2b-overexpressing
  (IHC 2+/3+ ≥10% of tumor cells) HER2-non-positive 1L unresectable or metastatic
  gastric/GEJ adenocarcinoma. Presented ESMO Congress 2025 (Berlin, Germany, October
  17-21, 2025) as LBA10 by Sun Young Rha (Yonsei University College of Medicine,
  Seoul, South Korea) on October 20, 2025. Primary analysis (median follow-up 11.8
  mo): mOS 17.9 vs 12.5 mo (HR 0.61, p=0.005); mPFS 8.6 vs 6.7 mo (HR 0.71, 95% CI
  0.53-0.95); ORR ~45% both arms. Descriptive update (median follow-up 19.4 mo):
  mOS 14.5 vs 13.2 mo (HR 0.82, 95% CI 0.62-1.08) — initial OS gain attenuated. Ocular
  toxicity (~70% any-grade corneal events, ~25% grade ≥3, 28% withdrew, typical onset
  ~6 mo) is the dose-defining AE — mandatory baseline + serial slit-lamp ophthalmology.
  Practice-changing status disputed at ESMO 2025 (discussants flagged absence of
  PD-1 backbone in control arm and shrinking median OS difference). paper_pending:
  true — full peer-reviewed publication awaited; PubMed indexing not yet available
  as of 2026-05-07. Cited by IND-GASTRIC-METASTATIC-1L-FGFR2B-BEMARITUZUMAB and
  REG-BEMARITUZUMAB-MFOLFOX6.'
