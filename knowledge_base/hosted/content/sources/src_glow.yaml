trial_name: "GLOW"
trial_phase: "Phase 3"
nct_id: "NCT03653507"
key_findings: >
  Zolbetuximab + CAPOX (capecitabine + oxaliplatin) vs placebo + CAPOX in CLDN18.2+
  (IHC ≥75% of cells 2+/3+), HER2-negative gastric/GEJ adenocarcinoma 1L.
  mPFS 8.2 vs 6.8 months (HR 0.69; p=0.0003). mOS 14.4 vs 12.2 months (HR 0.77;
  p=0.0053). Confirmatory trial alongside SPOTLIGHT for FDA approval.
  Together these two Phase 3 trials established zolbetuximab as the first CLDN18.2-
  targeted therapy FDA approved (October 2024).
