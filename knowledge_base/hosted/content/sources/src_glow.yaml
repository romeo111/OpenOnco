title: "Zolbetuximab plus CAPOX in HER2-negative, CLDN18.2-positive gastric or gastro-oesophageal junction adenocarcinoma (GLOW)"
short_name: "GLOW"
authors: "Shah MA, Shitara K, Ajani JA, et al."
journal: "Nature Medicine"
year: 2023
volume: 29
pages: "2133-2141"
