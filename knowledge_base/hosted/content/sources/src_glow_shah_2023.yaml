notes: >
  GLOW phase 3 (NCT03653507): zolbetuximab 800/600 mg/m2 q3w + CAPOX vs
  placebo + CAPOX as 1L in CLDN18.2-positive (≥75% IHC 2+/3+), HER2-negative
  advanced gastric/GEJ adenocarcinoma (n=507). Median PFS 8.21 vs 6.80 mo
  (HR 0.687; 95% CI 0.544-0.866; p=0.0007). Median OS 14.39 vs 12.16 mo
  (HR 0.771; p=0.0118). Nausea (G3+ 7% vs 3%) and vomiting (G3+ 12% vs 4%)
  more frequent with zolbetuximab. Confirmatory companion to SPOTLIGHT —
  together established CLDN18.2 + zolbetuximab + chemo as 1L standard for
  CLDN18.2+ HER2- advanced gastric/GEJ. FDA approval 2024-10-18.
