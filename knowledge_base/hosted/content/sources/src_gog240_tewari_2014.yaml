notes: >
  GOG 240 phase 3 (NCT00803062): bevacizumab + chemotherapy (cisplatin+paclitaxel
  or topotecan+paclitaxel) vs chemotherapy alone in recurrent/metastatic cervical
  cancer (n=452). mOS 17.0 vs 13.3 mo (HR 0.71, p=0.004). Established bevacizumab
  as the first biological agent to show OS benefit in cervical cancer. Provided the
  chemotherapy backbone (paclitaxel+cisplatin/carboplatin+bev) later augmented by
  pembrolizumab in KEYNOTE-826. Cisplatin 50 mg/m² + paclitaxel 135-175 mg/m²
  + bevacizumab 15 mg/kg q3w was the preferred cisplatin-bev arm.
