key_findings: >
  Regorafenib vs placebo in GIST after failure of imatinib and sunitinib (3L+).
  mPFS 4.8 vs 0.9 months (HR 0.27; p<0.0001). Disease control rate 52.6% vs 9.1%.
  mOS 17.4 vs 12.0 months (HR 0.77; not significant). FDA approved February 2013
  for GIST 3L+. NCCN Cat 1 for GIST 3L.
