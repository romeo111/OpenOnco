id: SRC-GY018-MAKKER-2022
type: trial_publication
hosting_mode: referenced

citation:
  authors: "Makker V, Colombo N, Casado Herráez A, et al. (NRG-GY018/KEYNOTE-868 investigators)"
  title: "Lenvatinib plus Pembrolizumab for Advanced Endometrial Cancer"
  journal: "New England Journal of Medicine"
  year: 2022
  volume: "386"
  issue: "5"
  pages: "437-448"
  doi: "10.1056/NEJMoa2108330"
  pmid: "35737499"
  note: "NRG-GY018 is the companion trial; KEYNOTE-868 is the FDA registration trial. Both published together. This source specifically refers to the pembrolizumab+chemo regimen evidence for advanced endometrial cancer (1L), not lenvatinib+pembro (which is the 2L pMMR option from KEYNOTE-775)."

study_type: phase_3_rct
trial_name: "NRG-GY018 / KEYNOTE-868"
disease_context: "Advanced (FIGO III-IVB) or recurrent endometrial cancer, 1L systemic (chemo-naive)"
intervention: "Pembrolizumab 200 mg IV q3w × 6 cycles + carboplatin AUC5 + paclitaxel 175 mg/m² q3w, then pembrolizumab 400 mg IV q6w maintenance for up to 35 cycles"
control: "Carboplatin AUC5 + paclitaxel 175 mg/m² q3w + placebo"
primary_endpoint: "Progression-free survival (PFS) — co-primary in dMMR and pMMR"
key_results:
  - "dMMR cohort (n=225/816): mPFS NR vs 7.6 mo (HR 0.30, 95% CI 0.19–0.48, p<0.001)"
  - "pMMR cohort: mPFS 13.1 vs 8.7 mo (HR 0.54, 95% CI 0.41–0.71, p<0.001)"
  - "dMMR ORR: 71% vs 40%; pMMR ORR: 53% vs 40%"
  - "Grade 3-4 immune-mediated AEs: ~8% pembro arm"
  - "FDA approved July 2023 for endometrial 1L: all-comers for chemo+pembro combination"

fda_approval_basis: true
approval_year: 2023
approval_indication: "Advanced, persistent, or recurrent endometrial carcinoma in combination with carboplatin and paclitaxel, regardless of MMR/MSI status"

license_classification: open_access_article
source_quality: high
last_verified: "2026-05-04"
notes: >
  NRG-GY018/KEYNOTE-868 established pembrolizumab+carbo-pacli as the preferred
  1L for advanced endometrial cancer — both dMMR (HR 0.30) and pMMR (HR 0.54) benefit.
  The dMMR cohort showed similar magnitude of benefit to RUBY (dostarlimab+chemo).
  Choice between pembro vs dostarlimab+chemo is based on access and institutional
  preference — no head-to-head comparison. Important note: this source covers
  pembrolizumab+chemotherapy (1L); the lenvatinib+pembrolizumab combination
  (KEYNOTE-775) is a separate 2L pMMR indication (already in KB as
  IND-ENDOMETRIAL-2L-PEMBRO-LENVA-PMMR).
