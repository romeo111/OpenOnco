notes: >
  HERIZON-BTC-01 single-arm phase 2b trial (NCT04466891): zanidatamab
  (HER2-targeted bispecific antibody binding two non-overlapping HER2
  epitopes — biparatopic) 20 mg/kg IV q2w in patients with HER2-amplified,
  unresectable / locally advanced / metastatic biliary tract cancer
  progressed on prior gem-cis-based therapy; n=87 in primary efficacy
  cohort 1 (HER2 IHC 3+ or IHC 2+/ISH+). Primary endpoint confirmed ORR
  per independent central review = 41.3% (95% CI 30.4-52.8); DCR 68.8%;
  median DoR 14.9 mo. Manageable safety profile, infusion reactions and
  diarrhoea most common. Treatment-related grade ≥3 AEs in 18% (no
  treatment-related deaths). Single-arm phase 2b — evidence tier 2 (no
  randomised comparator). FDA accelerated approval November 2024 for
  previously treated HER2-positive (IHC 3+) BTC. ESCAT tier IB / NCCN
  category 2A for HER2-amplified 2L+ BTC. NCT04466891.
