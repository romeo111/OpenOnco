key_findings: >
  Brentuximab vedotin (BV) + nivolumab (N) in relapsed/refractory classical Hodgkin
  lymphoma (cHL) — post-ASCT or BTK-inhibitor-naïve 2L. ORR 82%; CR 61%.
  2-year PFS 73%. Bridge to transplant in majority of CR patients.
  CRS Grade 1–2 common; peripheral neuropathy dose-cumulative.
  BV+nivo is NCCN preferred regimen for cHL 2L+ as bridge to ASCT (Cat 2A/2B).
