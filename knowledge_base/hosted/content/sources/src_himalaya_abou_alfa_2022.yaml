id: SRC-HIMALAYA-ABOU-ALFA-2022
type: trial_publication
hosting_mode: referenced

citation:
  authors: "Abou-Alfa GK, Lau G, Kudo M, et al."
  title: "Tremelimumab plus Durvalumab in Unresectable Hepatocellular Carcinoma"
  journal: "NEJM Evidence"
  year: 2022
  volume: "1"
  issue: "8"
  pages: "EVIDoa2100070"
  doi: "10.1056/EVIDoa2100070"
  pmid: "35658005"

study_type: phase_3_rct
trial_name: "HIMALAYA"
disease_context: "Unresectable HCC (BCLC B/C), Child-Pugh A, no prior systemic therapy"
intervention: "Tremelimumab 300 mg IV × 1 dose (STRIDE) + durvalumab 1500 mg IV q4w"
control: "Sorafenib 400 mg PO BID"
primary_endpoint: "Overall survival"
key_results:
  - "mOS STRIDE: 16.4 mo vs sorafenib 13.8 mo (HR 0.78, 95% CI 0.65–0.93, p=0.006)"
  - "36-month OS rate: 30.7% STRIDE vs 24.7% sorafenib"
  - "ORR: 20.1% STRIDE vs 5.1% sorafenib; durable responses (mDOR 22.3 mo)"
  - "Grade 3-4 AEs: 50.1% STRIDE vs 52.4% sorafenib; immune-mediated AEs: hepatitis 5.5%, colitis 0.7%"
  - "FDA approved October 2022 for unresectable HCC"
  - "Key advantage over atezo+bev: no bevacizumab-related risks (variceal bleeding, proteinuria, HTN)"

fda_approval_basis: true
approval_year: 2022
approval_indication: "Unresectable hepatocellular carcinoma"

license_classification: open_access_article
source_quality: high
last_verified: "2026-05-04"
notes: >
  HIMALAYA STRIDE regimen (single priming tremelimumab + durvalumab maintenance)
  is the preferred alternative to atezo+bev for HCC 1L when bevacizumab is
  contraindicated (varices, anticoagulation, portal hypertension). Durvalumab
  monotherapy arm also studied but inferior to STRIDE. OS benefit more modest
  than atezo+bev (HR 0.78 vs 0.58) but better tolerated in variceal patients.
