notes: >
  ICARIA-MM phase-3: isatuximab 10 mg/kg IV weekly x 4 then q2w +
  pomalidomide 4 mg PO d1-21 + low-dose dexamethasone vs Pd alone, in
  R/R MM with >=2 prior lines including lenalidomide and a proteasome
  inhibitor. Median PFS 11.5 vs 6.5 mo (HR 0.596). PR 60% vs 35%
  (P<0.0001). Basis for FDA approval (Mar 2020) of isatuximab +
  pomalidomide + dexamethasone (Isa-Pd) in R/R MM. NOTE: audit
  originally referenced PMID 31806175 — that PMID does not match this
  trial; correct PMID is 31735560 (verified via PubMed). First isatuximab
  trial source in the KB; needed because the MM vertical now includes
  isatuximab regimens for both 2L+ and 1L (per IMROZ + IKEMA + ICARIA)
  but had no anchoring trial publications cited.
