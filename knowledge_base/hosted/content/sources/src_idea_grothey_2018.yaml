notes: >
  IDEA collaboration: pooled analysis of 6 phase-3 trials (N=12,834) comparing
  3 vs 6 months adjuvant FOLFOX or CAPOX in stage III colon cancer.
  Key finding: for low-risk (T1-3 N1) tumors, 3 mo CAPOX non-inferior to 6 mo
  (5-yr DFS HR 0.85, 95% CI 0.71-1.01) with markedly less grade ≥2 neuropathy
  (16% vs 48%). FOLFOX 3 mo was inferior to 6 mo overall (HR 1.16).
  High-risk (T4 or N2): 6 months preferred regardless of regimen.
  Practice-changing for CAPOX selection in low-risk stage III: 3 mo is
  now preferred per NCCN (category 1) and ESMO.
