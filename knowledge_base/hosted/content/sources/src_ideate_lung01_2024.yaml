id: SRC-IDEATE-LUNG01-2024
type: primary_trial
hosting: referenced
short_name: "IDeate-Lung01 (2024)"
full_citation: >
  Mansfield AS, et al. Ifinatamab deruxtecan in previously treated small-cell lung cancer:
  a single-arm, open-label, phase 2 basket study (IDeate-Lung01).
  Lancet Oncol. 2024; doi:10.1016/S1470-2045(24)00213-7.
pubmed_id: ""
nct_id: NCT04145622
trial_name: IDeate-Lung01
phase: 2
disease: SCLC
biomarker: "B7-H3 (CD276) — not required for eligibility; expressed broadly in SCLC"
key_findings: >
  Phase 2 basket study in heavily pretreated SCLC (≥2 prior lines including platinum).
  Ifinatamab deruxtecan 12 mg/kg IV Q3W.
  ORR: ~52.4%; mDOR: ~7.0 months; mOS: ~12.9 months.
  Grade 3+ ILD/pneumonitis: ~6-9% — requires active monitoring.
  FDA accelerated approval 2024 for ES-SCLC with prior platinum + ≥1 other line.
  NCCN SCLC 2025: Category 2A for 3L+ SCLC.
license: Open access
access_url: "https://www.thelancet.com/journals/lanonc/article/PIIS1470-2045(24)00213-7"
last_reviewed: "2026-05-04"
drafted_by: claude_extraction
notes: >
  Pending clinical signoff. ILD risk is the key safety signal; higher than typical
  with DXd-payload ADCs. Active pulmonary monitoring mandatory.
