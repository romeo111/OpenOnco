id: SRC-IDHENTIFY
type: clinical_trial
title: "Enasidenib vs conventional care in older patients with late-stage IDH2-mutant AML"
short_name: "IDHENTIFY"
authors: "Vyas P, Labopin M, Stein E, et al. / Stein EM, DiNardo CD, et al."
journal: "Leukemia"
year: 2021
volume: 35
pages: "3373-3383"
doi: "10.1038/s41375-021-01383-w"
pmid: "34385682"
trial_name: "IDHENTIFY"
trial_phase: "Phase 3"
nct_id: "NCT02577406"
key_findings: >
  Enasidenib vs conventional care (azacitidine, low-dose cytarabine, or supportive
  care) in elderly (≥60 years) relapsed/refractory IDH2-mutant AML. ORR 40.5% vs
  9.9% (p<0.001). No OS benefit (HR 1.01; median OS 6.5 vs 6.2 months). However,
  significant ORR improvement supports use as an option in this population.
  Event-free survival and CR rate improved with enasidenib.
disease_context: "Acute myeloid leukemia (relapsed/refractory, IDH2-mutant, elderly)"
