notes: >
  AST Infectious Diseases Community of Practice consensus on diagnosis,
  management, and prevention of post-transplant lymphoproliferative
  disorders (PTLD) and other EBV syndromes after solid-organ
  transplantation. Defines pre-transplant EBV-seronegativity / primary
  EBV infection as principal risk factors; recommends WHO pathology
  classification of tissue biopsy as diagnostic gold standard.
  Treatment approach: reduction in immunosuppression (RIS) is the
  best-validated intervention; for CD20+ PTLD, response-adapted
  sequential RIS → rituximab → R-CHOP-style chemotherapy. First
  PTLD/EBV-side source in the KB; needed because the DLBCL / B-cell
  lymphoma vertical includes PTLD as a relevant entity but had no
  PTLD-specific authority cited. (Authoring uses "IDSA" in source ID
  per audit's missing-source label; the publishing society is AST
  Infectious Diseases Community of Practice, which is the analogous
  transplant-ID specialty body.)
