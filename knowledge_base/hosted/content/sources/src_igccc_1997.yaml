citation:
  authors: "International Germ Cell Cancer Collaborative Group (IGCCC)"
  title: "International Germ Cell Consensus Classification: a prognostic factor-based staging system for metastatic germ cell cancers"
  journal: "Journal of Clinical Oncology"
  year: 1997
  volume: "15"
  issue: "2"
  pages: "594-603"
  doi: "10.1200/JCO.1997.15.2.594"
  pmid: "9158945"

study_type: retrospective_prognostic_analysis
disease_context: "Metastatic germ cell tumors (seminoma and non-seminoma)"
key_results:
  - "Good risk (non-seminoma): AFP <1000, LDH <1.5×ULN, hCG <5000, no non-pulmonary visceral mets → 5-year OS ~92%; BEP ×3"
  - "Intermediate risk (non-seminoma): AFP 1000-10000, LDH 1.5-10×ULN, hCG 5000-50000 → 5-year OS ~80%; BEP ×4"
  - "Poor risk (non-seminoma): AFP >10000, LDH >10×ULN, hCG >50000, OR non-pulmonary visceral mets (liver, bone, brain) → 5-year OS ~50%; BEP ×4"
  - "Good risk (seminoma): no non-pulmonary visceral mets, any LDH/hCG → 5-year OS ~92%; BEP ×3"
  - "Intermediate risk (seminoma): non-pulmonary visceral mets → 5-year OS ~80%; BEP ×4"
  - "No poor-risk category for seminoma in IGCCC"

license_classification: open_access_article
source_quality: high
last_verified: "2026-05-04"
notes: >
  The IGCCC 1997 classification remains the standard prognostic stratification
  for metastatic GCT, defining treatment intensity (BEP ×3 vs ×4 cycles).
  Serum tumor markers (AFP, beta-hCG, LDH) are measured BEFORE chemotherapy
  initiation; all three must be assessed. AFP is not produced by pure seminoma
  (AFP elevation in apparent seminoma → reclassify as NSGCT).
