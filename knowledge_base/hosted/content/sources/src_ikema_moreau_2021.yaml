notes: >
  IKEMA phase-3: isatuximab 10 mg/kg IV weekly x 4 then q2w +
  carfilzomib 20-56 mg/m² + dexamethasone vs Kd alone, in relapsed MM
  with 1-3 prior lines. Median PFS NR vs 19.15 mo (HR 0.53). VGPR or
  better 73% vs 56%. CR 40% vs 28%. MRD-negative 30% vs 13%. Basis
  for FDA approval (Mar 2021) of Isa-Kd in R/R MM after 1-3 prior
  lines. NOTE: audit originally referenced PMID 34481559 — that PMID
  does not match this trial; correct PMID is 34097854 (verified via
  PubMed). Final OS analysis published in Lancet Haematol 2024
  (PMID 39067465) confirmed OS benefit. Companion to ICARIA-MM and
  IMROZ for the isatuximab MM evidence stack.
