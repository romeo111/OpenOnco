notes: >
  Phase III RCT: pexidartinib (CSF1R inhibitor) vs placebo in symptomatic tenosynovial
  giant cell tumor (TGCT) not amenable to improvement with surgery.
  N=120 (61 pexidartinib, 59 placebo). Primary endpoint: overall response rate (ORR) by
  RECIST 1.1 at week 25. ORR: 38% vs 0% (p<0.0001). mDOR: not reached vs N/A.
  Significant hepatotoxicity (AST/ALT elevation) in pexidartinib arm — FDA REMS required.
  Formed basis of FDA approval (August 2019) for pexidartinib (Turalio).
  Citation: Tap WD et al. Lancet. 2019;394(10197):478-487. DOI: 10.1016/S0140-6736(19)31495-9
