arms:
  experimental: "Ibrutinib 560 mg PO once daily continuous until progression or unacceptable toxicity"
primary_endpoint: "ORR by independent central review (IPCG criteria for PCNSL)"
primary_result:
  combined_orr: "73.1% (38/52; PCNSL + PVRL combined)"
  pcnsl_orr: "52.3% (23/44)"
  median_pfs_months_combined: "4.8"
  median_os_months_combined: "14.5"
secondary_results:
  cns_penetration_note: >
    Ibrutinib achieves CSF concentrations adequate for BTK inhibition.
    CSF:plasma ratio ~0.3-1.0 at 560 mg/day. CNS activity primarily via
    BTK inhibition of B-cell receptor signaling + NF-κB pathway, both
    constitutively active in PCNSL (MYD88 L265P in ~85%, CD79B in ~40%).
  btk_pathway_rationale: >
    PCNSL is genetically characterized by MYD88 L265P + CD79B mutations
    activating B-cell receptor (BCR) / NF-κB pathway — same oncogenic
    mechanism as activated B-cell DLBCL. Ibrutinib irreversibly inhibits
    BTK, blocking BCR signaling. This is the rational mechanistic basis
    for high ORR in PCNSL (~52% monotherapy; ~77% in combination
    [Grommes 2019 JCO — ibrutinib + MTX/temozolomide]).
regulatory:
  fda_approval: "No FDA approval specifically for PCNSL. Used off-label per NCCN Cat 2A. No randomized phase 3 RCT in PCNSL."
  nccn_category: "2A (NCCN CNS Lymphomas 2025: ibrutinib for r/r PCNSL post-MTX failure)"
