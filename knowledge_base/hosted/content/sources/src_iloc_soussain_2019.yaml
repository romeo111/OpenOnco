last_verified: "2026-05-04"
notes: >
  iLOC trial: ibrutinib 560 mg/d monotherapy in n=52 r/r PCNSL/PVRL.
  Combined ORR 73.1% (including PVRL high responders). PCNSL-only ORR 52.3%.
  Median PFS 4.8 months — limited PFS but responses can be very durable (subset
  with prolonged response in BTK-sensitive disease).

  BTK pathway rationale is mechanistically strong (MYD88 L265P ~85% of PCNSL;
  CD79B ~40%). Ibrutinib has adequate BBB penetration at 560 mg daily.

  Key safety concerns for CNS disease:
  - Intracranial hemorrhage risk: ibrutinib causes platelet dysfunction
    (COX-1/TXA2 independent platelet aggregation inhibition). Avoid with
    anticoagulants (warfarin, NOACs). Hold 3-7 days before/after neurosurgery.
  - Atrial fibrillation: 5-10%/year incidence. Baseline ECG; monitor.
    New afib: rhythm control + consider acalabrutinib switch (lower afib risk).
  - CYP3A4 drug interactions: strong inhibitors (azole antifungals, HIV PIs)
    dramatically increase ibrutinib levels — reduce to 140 mg if unavoidable;
    prefer voriconazole-free prophylaxis (use posaconazole with dose reduction).

  Combination ibrutinib+MTX: Grommes 2019 JCO showed ORR ~77% in r/r PCNSL
  with ibrutinib 560 mg + HD-MTX — no significant improvement over ibrutinib
  monotherapy; single-agent ibrutinib is standard 2L.

  Ukraine access: ibrutinib (Imbruvica, J&J) is registered for MCL/CLL/WM
  in Ukraine; PCNSL use is off-label (no PCNSL-specific NSZU reimbursement);
  named-patient use or compassionate access may be available.
corpus_role: pivotal_phase2
