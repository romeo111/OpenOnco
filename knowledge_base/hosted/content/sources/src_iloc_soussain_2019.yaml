    n: 44
    orr: "52.3% (23/44)"
    cr_rate: "15.9% (7/44)"
    median_pfs_months: 4.8
    notes: "ORR 52% overall; responses durable in CR patients. Some sources cite combined PCNSL+PVRL ORR ~73% — variation due to PVRL cohort inclusion."
  pvrl:
