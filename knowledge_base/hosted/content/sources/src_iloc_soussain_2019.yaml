trial_acronym: "iLOC"
phase: 2
population: >
  Relapsed or refractory primary CNS lymphoma (PCNSL) and primary vitreoretinal
  lymphoma (PVRL) after ≥1 prior line of therapy including high-dose methotrexate.
  ECOG PS 0-3. No prior ibrutinib or BTKi. Adequate organ function.
n_enrolled: 52
n_evaluable: 52
cohorts:
