id: SRC-IMBRAVE150-FINN-2020
title: "Atezolizumab plus Bevacizumab in Unresectable Hepatocellular Carcinoma"
type: trial_publication
hosting_mode: referenced

citation:
  authors: "Finn RS, Qin S, Ikeda M, et al."
  title: "Atezolizumab plus Bevacizumab in Unresectable Hepatocellular Carcinoma"
  journal: "New England Journal of Medicine"
  year: 2020
  volume: "382"
  issue: "20"
  pages: "1894-1905"
  doi: "10.1056/NEJMoa1915745"
  pmid: "32402160"

study_type: phase_3_rct
trial_name: "IMbrave150"
disease_context: "Advanced/unresectable HCC (BCLC B/C), Child-Pugh A, no prior systemic therapy"
intervention: "Atezolizumab 1200 mg IV + bevacizumab 15 mg/kg IV q3w"
control: "Sorafenib 400 mg PO BID"
primary_endpoint: "Overall survival (OS) and progression-free survival (PFS) — co-primary"
key_results:
- "mOS: atezo+bev not reached vs sorafenib 13.2 mo (HR 0.58, 95% CI 0.42–0.79, p<0.001)"
- "12-month OS rate: 67.2% vs 54.6%"
- "mPFS: 6.8 mo vs 4.3 mo (HR 0.59, 95% CI 0.47–0.76, p<0.001)"
- "ORR (RECIST 1.1): 27.3% vs 11.9%; mDOR 18.1 mo"
- "Grade 3-4 AEs: 56.5% atezo+bev vs 55.1% sorafenib; hypertension, proteinuria, fatigue dominant in atezo+bev"
- "FDA approved May 2020 for unresectable/metastatic HCC (first ICI-containing 1L approval in HCC)"

fda_approval_basis: true
approval_year: 2020
approval_indication: "Unresectable or metastatic hepatocellular carcinoma"

license_classification: open_access_article
source_quality: high
last_verified: "2026-05-04"
notes: >
  IMbrave150 established atezolizumab+bevacizumab as the preferred 1L for
  advanced HCC in Child-Pugh A patients, replacing sorafenib after 10+ years
  as single standard. Key exclusions: varices not adequately treated,
  Child-Pugh B/C, prior anti-VEGF or anti-PD-L1 therapy. Updated OS
  (Finn et al NEJM 2021 update) confirmed sustained benefit.
source_type: trial_publication
