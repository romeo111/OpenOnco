notes: >
  International consensus on adult T-cell leukemia-lymphoma (ATL), a
  mature T-cell malignancy caused by chronic HTLV-1 infection. Updates
  the 2009 Tsukasaki consensus. Defines clinical subtypes (acute,
  lymphoma, chronic, smouldering), prognostic factors (Shimoyama
  classification + indolent vs aggressive), treatment recommendations
  (watch-and-wait for indolent; mLSG15 / VCAP-AMP-VECP or EPOCH-style
  for aggressive; mogamulizumab; alloHCT for fit aggressive subtypes;
  AZT + IFN-α for leukaemic subtypes), and response criteria for
  clinical trials. First HTLV-1 / ATL source in KB; needed because the
  PTCL vertical includes HTLV-1-associated ATL but had no
  HTLV/ATL-specific authority cited. Replaces the audit's "IMC-HTLV"
  placeholder identifier (the actual document is the 2019 ATL
  international consensus, of which the 2017 Lugano report is a
  precursor); 2017-vintage retained in source ID for cross-reference
  stability.
