notes: 'IMpower010 phase-3 (NCT02486718): atezolizumab 1200 mg q3w × 16 cycles vs
  best supportive care after adjuvant cisplatin-based chemotherapy in completely
  resected stage IB (>=4 cm)–IIIA NSCLC (n=1005). In stage II–IIIA PD-L1 TC >=1%
  population: median DFS not reached vs 35.3 mo (HR 0.66; p=0.0039). All-randomised
  stage II–IIIA: HR 0.79 (p=0.020). Largest benefit in PD-L1 TC >=50% subgroup
  (HR 0.43). Established adjuvant atezolizumab as standard for resected stage II–IIIA
  PD-L1+ NSCLC; basis for FDA approval Oct 2021 (PD-L1 >=1%) and EMA approval (PD-L1
  >=50% without EGFR/ALK). Cited as foundational evidence for adjuvant IO in early-stage
  NSCLC alongside KEYNOTE-091 (pembrolizumab).

