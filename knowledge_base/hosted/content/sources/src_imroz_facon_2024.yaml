notes: >
  IMROZ phase-3: isatuximab + bortezomib + lenalidomide + dexamethasone
  (Isa-VRd) vs VRd, in newly-diagnosed multiple myeloma patients age
  18-80 ineligible for autologous stem-cell transplantation. At median
  follow-up 59.7 mo, 60-mo PFS 63.2% (Isa-VRd) vs 45.2% (VRd) (HR 0.60,
  P<0.001). >=CR 74.7% vs 64.1% (P=0.01). MRD-negative (1e-5) 58.1%
  vs 43.6%. Basis for FDA approval (2024-09-20; SRC-FDA-ISATUXIMAB-2020)
  of Isa-VRd in transplant-ineligible 1L NDMM. NOTE: audit referenced
  PMID 38847600 — correct PMID is 38832972 (verified via PubMed); the
  38847600 PMID is a related congress abstract / commentary, not the
  primary NEJM publication. Together with ICARIA-MM and IKEMA, IMROZ
  completes the isatuximab evidence stack across 1L (transplant-
  ineligible) and 2L+ MM.
