key_findings: >
  Inavolisib (PI3Kα inhibitor) + palbociclib + fulvestrant vs placebo + palbociclib +
  fulvestrant in HR+/HER2-negative PIK3CA-mutated advanced breast cancer progressed
  on or after CDK4/6 inhibitor + aromatase inhibitor. mPFS 15.0 vs 7.3 months
  (HR 0.43; p<0.001). ORR 58% vs 25%. Hyperglycemia 5% vs 0% Grade 3+.
  FDA approved October 2024 for PIK3CA-mutated HR+/HER2- advanced breast cancer.
