notes: >
  INDIGO Phase 3 RCT (NCT04164901): vorasidenib 40 mg QD vs placebo in IDH1/2-mutant
  WHO grade 2 diffuse glioma (residual/recurrent disease post-surgery, NOT requiring
  immediate RT/chemotherapy). N=331 (vorasidenib n=168; placebo n=163).
  Primary endpoint: imaging-based PFS (independent radiology review, RANO criteria).
  Results:
  - mPFS: 27.7 months (vorasidenib) vs 11.1 months (placebo); HR 0.39; 95% CI 0.27–0.56; p<0.001
  - Time to next intervention (TTI): NR vs 17.8 months; HR 0.26; p<0.001
  - Objective response rate (vorasidenib): 3.6% (grade 2 LGG rarely shrinks on imaging)
  - Grade ≥3 AEs: 22.8% vs 13.5% (vorasidenib vs placebo)
  - ALT elevation Grade ≥3: 9.6% (vorasidenib) vs 0% (placebo) — key safety signal
  Basis of FDA approval August 6, 2024 (vorasidenib/Voranigo; Servier).
