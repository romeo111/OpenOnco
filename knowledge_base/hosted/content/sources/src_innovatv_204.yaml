key_findings: >
  Tisotumab vedotin (TV; tissue factor ADC) in recurrent/metastatic cervical cancer
  ≥2 prior lines. ORR 24%; CR 7%; median DOR 8.3 months. Median OS 12.1 months.
  Key AEs: alopecia (38%), nausea (37%), epistaxis (28%), peripheral neuropathy (27%),
  conjunctivitis 16% (ocular prophylaxis protocol mandatory). FDA approved September
  2021 under accelerated approval.
