key_findings: >
  Tisotumab vedotin vs chemotherapy (paclitaxel, vinorelbine, topotecan, irinotecan,
  or gemcitabine) in previously treated recurrent/metastatic cervical cancer (1–2 prior
  lines). mOS 11.5 vs 9.5 months (HR 0.70; p<0.001). mPFS 4.2 vs 2.9 months.
  ORR 17.8% vs 5.2%. Converted accelerated approval to full FDA approval
  January 2024. NCCN Cat 1 for 2L+ cervical cancer.
