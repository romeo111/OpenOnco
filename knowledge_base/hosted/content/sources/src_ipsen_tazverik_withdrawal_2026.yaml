notes: >
  Ipsen announced voluntary withdrawal of Tazverik in all indications from all
  Ipsen markets, including follicular lymphoma and epithelioid sarcoma,
  effective 2026-03-09, citing emerging SYMPHONY-1 safety data with secondary
  hematologic malignancy concerns. The company stated it was working with FDA
  on withdrawal steps. This source should trigger freshness review before any
  new tazemetostat indication is authored or promoted.
