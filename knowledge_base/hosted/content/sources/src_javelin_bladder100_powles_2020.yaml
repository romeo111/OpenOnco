notes: >
  JAVELIN Bladder 100 phase 3 (NCT02603432): avelumab 800mg q2w (+ BSC) vs BSC
  alone as switch maintenance after platinum-based chemotherapy (4-6 cycles) in
  advanced urothelial carcinoma that had not progressed on chemotherapy (n=700).
  mOS 21.4 vs 14.3 mo (HR 0.69, p=0.001) in overall population; greater benefit
  in PD-L1-positive (HR 0.56). Established platinum→avelumab maintenance as
  NCCN category 1. Role reduced by EV-302 (2024): platinum+avelumab maintenance
  now primarily for patients ineligible for or progressing through EV+pembro.
