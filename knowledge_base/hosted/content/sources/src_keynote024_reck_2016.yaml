notes: >
  KEYNOTE-024 phase-3 (NCT02142738): pembrolizumab 200 mg q3w mono
  vs investigator-choice platinum-doublet chemo in 1L metastatic
  NSCLC with PD-L1 TPS ≥50% (n=305). Median PFS 10.3 vs 6.0 mo
  (HR 0.50); mOS 30.0 vs 14.2 mo (5-yr update Brahmer ESMO 2020);
  5-year OS 31.9% vs 16.3%. Established pembrolizumab mono as 1L
  standard for high-PD-L1 NSCLC; basis for FDA approval Oct 2016.
