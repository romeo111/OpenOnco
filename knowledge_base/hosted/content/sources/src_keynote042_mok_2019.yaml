notes: >
  KEYNOTE-042 phase-3 (NCT02220894): pembrolizumab mono vs platinum
  doublet chemo in 1L locally advanced/metastatic NSCLC with PD-L1
  TPS ≥1% (n=1274). Median OS in TPS≥50%: 20.0 vs 12.2 mo
  (HR 0.69); TPS≥20%: 17.7 vs 13.0 mo; TPS≥1%: 16.7 vs 12.1 mo.
  Extended pembro-mono use to PD-L1 ≥1% albeit benefit driven by
  high-expressors. Basis for FDA expansion to PD-L1 ≥1% Apr 2019.
