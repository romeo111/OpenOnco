id: SRC-KEYNOTE045-BELLMUNT-2017
type: clinical_trial
hosting_mode: referenced

citation:
  authors: "Bellmunt J, de Wit R, Vaughn DJ, et al."
  title: "Pembrolizumab as second-line therapy for advanced urothelial carcinoma"
  journal: "New England Journal of Medicine"
  year: 2017
  volume: 376
  issue: 11
  pages: "1015–1026"
  pmid: "28212060"
  doi: "10.1056/NEJMoa1613683"

trial_name: "KEYNOTE-045"
phase: 3
design: "Randomized, open-label; n=542"

population: >
  Locally advanced or metastatic urothelial carcinoma (bladder, upper urinary tract,
  urethra); platinum-refractory; ECOG 0-2; no prior anti-PD-(L)1 therapy

interventions:
  - "Arm A: Pembrolizumab 200 mg IV q3w"
  - "Arm B: Investigator-choice chemotherapy (paclitaxel 175 mg/m² q3w, OR docetaxel 75 mg/m² q3w, OR vinflunine 320 mg/m² q3w)"

primary_endpoints: "Overall survival; progression-free survival (coprimary endpoints)"

key_results:
  overall_response_rate_pembro: "21.1%"
  overall_response_rate_chemo: "11.0%"
  median_overall_survival_pembro: "10.3 months"
  median_overall_survival_chemo: "7.4 months"
  os_hr: "0.73 (95% CI 0.59–0.91; p=0.002)"
  pdl1_cps_10_os_pembro: "8.0 months"
  pdl1_cps_10_os_chemo: "5.2 months"
  pdl1_cps_10_hr: "0.57 (95% CI 0.37–0.88)"
  complete_response_rate_pembro: "7.0%"
  complete_response_rate_chemo: "3.0%"
  durability: "~19% durable responders at 5 years (pembrolizumab)"

clinical_significance: >
  KEYNOTE-045 established pembrolizumab as a standard 2L treatment for platinum-
  refractory urothelial carcinoma in ICI-naive patients. Statistically significant
  OS improvement over chemotherapy (mOS 10.3 vs 7.4 months, HR 0.73). PD-L1 CPS ≥10
  subgroup had stronger benefit (HR 0.57). Durable responses in ~7% (CR) with some
  patients achieving long-term remission. FDA approved May 2017.
  RELEVANCE IN 2025/2026: With EV+pembro now standard 1L (EV-302) and platinum
  chemotherapy as 2L post-EV+pembro, pembrolizumab monotherapy in 2L is most
  applicable to patients who received platinum 1L WITHOUT any ICI (no avelumab
  maintenance, no PD-L1 inhibitor combination) — i.e., truly ICI-naive at 2L.
  For patients who received avelumab maintenance 1L: ICI re-challenge data is limited;
  EV monotherapy (EV-301) preferred over pembrolizumab in this setting.

relates_to_diseases:
  - DIS-UROTHELIAL

license: "Publicly citable (NEJM, PMID available)"
