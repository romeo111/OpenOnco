notes: >
  KEYNOTE-054 / EORTC-1325 phase-3 (NCT02362594): adjuvant
  pembrolizumab 200 mg q3w × 1 yr vs placebo in resected stage III
  melanoma (n=1019). 12-mo RFS 75.4% vs 61.0% (HR 0.57; p<0.001).
  5-yr update (Eggermont Lancet Oncol 2021): 5-yr RFS 55.4% vs
  38.3% (HR 0.61). Established adjuvant pembrolizumab for resected
  stage III melanoma; basis for FDA approval Feb 2019.
