trial_acronym: "KEYNOTE-158"
phase: 2
population: >
  KEYNOTE-158: multicohort phase 2 study of pembrolizumab 200 mg q3w in multiple
  advanced solid tumor types. Cohort B: advanced anal squamous cell carcinoma (SCC),
  ≥1 prior line of systemic therapy (platinum-based). Included PD-L1 unselected
  and MSI/dMMR unselected patients. ECOG PS 0-1.
n_enrolled_anal_cohort: 112
arms:
  experimental: "Pembrolizumab 200 mg IV q3w (flat dose) until progression or 24 months"
primary_endpoint: "ORR by independent central review (RECIST v1.1)"
primary_result:
  anal_scc_orr: "10.6% (12/113 evaluable patients)"
  anal_scc_cr_rate: "3.5%"
  anal_scc_median_dor: "Not reached (durable responders; >12 months in majority)"
  anal_scc_median_pfs_months: "2.0"
  anal_scc_os_12mo_pct: "50%"
secondary_results:
  pd_l1_cps_high_subgroup_note: "PD-L1 CPS ≥10 subgroup: higher ORR (~26%) vs CPS<10 (~3%). PD-L1 testing not required per FDA label but enriches response."
  msi_h_note: "MSI-H/dMMR anal SCC is rare (~1-2% of anal SCC) — FDA MSI-H tumor-agnostic approval applies"
supplementary_trial:
  keynote028_note: >
    KEYNOTE-028 (Ott 2017, Ann Oncol; n=24 PD-L1+ anal SCC): pembrolizumab ORR 17%,
    mOS 17.5 months. Early signal that supported KEYNOTE-158 enrollment.
    Combined KEYNOTE-028 + KEYNOTE-158 anal data cited by NCCN for Category 2A recommendation.
regulatory:
  fda_approval_tumor_agnostic: >
    Pembrolizumab has FDA tumor-agnostic approvals applicable to anal SCC patients:
    (1) MSI-H/dMMR solid tumors — initial approval May 2017, expanded;
    (2) TMB-H (≥10 mut/Mb) solid tumors — June 2020.
    No anal SCC-specific FDA approval exists.
  nccn_category: "2A (NCCN Anal 2025: pembrolizumab monotherapy for r/r anal SCC post-platinum, ≥2 prior lines)"
access_level: public
hosting_mode: referenced
license:
  name: "ASCO JCO standard"
  spdx_id: null
relates_to_diseases:
  - DIS-ANAL-SCC
last_verified: "2026-05-04"
notes: >
  KEYNOTE-158 cohort B (anal SCC): pembrolizumab 200 mg q3w in n=112 r/r anal SCC
  after ≥1 prior platinum-based therapy. ORR 10.6%; responses durable (DOR not reached).
  Modest overall ORR but durable responses in responders — characteristic of ICI benefit.
  PD-L1 CPS ≥10 enriches response rate (~26% vs ~3%); PD-L1 testing is informative.
  HPV-associated anal SCC: ~93% of anal SCC are HPV+ — may explain ICI activity
  (high immunogenicity, PD-L1 expression from viral integration). p16+ used as
  surrogate for HPV in clinical practice.
  Nivolumab also active in anal SCC (Esrick 2020, Ann Oncol — phase 2; ORR 24% in
  PD-L1+ r/r anal SCC) but less extensively studied than pembrolizumab.
  SRC-KEYNOTE028-OTT-2017 is a separate smaller source; combined evidence supports NCCN Cat 2A.
corpus_role: phase2_basket
