notes: >
  KEYNOTE-158 (NCT02628067): multicohort phase-2 pembrolizumab monotherapy
  pan-tumor. This biomarker analysis paper established TMB-high (≥10 mut/Mb,
  Foundation One CDx) as an FDA-approved biomarker for pembrolizumab pan-tumor
  use (June 2020). Key data: ORR 29% TMB-high vs 6% TMB-low across all
  cohorts; median DOR 30.9 mo (TMB-high). NSCLC was not a primary cohort in
  KEYNOTE-158; NSCLC subset (n=37) showed ORR 29%, OS not reached at 11.7 mo
  median follow-up. TMB-high NSCLC application extrapolates from KEYNOTE-042/
  KEYNOTE-189 subgroup analyses and KEYNOTE-158 pan-tumor data. FDA TMB-high
  approval (agnostic, 2020) was based on this publication.
