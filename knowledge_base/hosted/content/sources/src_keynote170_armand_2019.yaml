notes: >
  KEYNOTE-170: Phase 2 single-arm pembrolizumab 200 mg q3w in r/r PMBCL ≥2 prior lines.
  ORR 45.3%; CR 11.3%; responses highly durable (median DOR not reached).
  FDA accelerated approval June 2018; converted to regular approval based on follow-up data.
  PMBCL is uniquely sensitive to PD-1 blockade due to 9p24.1 amplification → PD-L1/L2 overexpression.
  This differentiates PMBCL from DLBCL-NOS, where pembrolizumab has modest activity in relapsed disease.
  KEYNOTE-013 PMBCL cohort (Armand 2016, JCO; n=19): ORR 41% with pembrolizumab —
  combined with KEYNOTE-170 data: pooled ORR ~48%.
  Key clinical note: PMBCL patients often have prior mediastinal RT which can complicate
  assessment of ICI-related pneumonitis; baseline CT is critical.
corpus_role: pivotal_phase2
