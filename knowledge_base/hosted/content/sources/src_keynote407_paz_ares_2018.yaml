notes: >
  KEYNOTE-407 phase-3 (NCT02775435): pembrolizumab + carboplatin/
  (nab-)paclitaxel vs placebo + chemo in 1L metastatic squamous
  NSCLC (n=559). Median OS 15.9 vs 11.3 mo (HR 0.64; p<0.001);
  mPFS 6.4 vs 4.8 mo (HR 0.56). 5-year update (Novello JCO 2023)
  confirmed durable benefit. Established pembro + carbo/taxane as
  1L standard for squamous NSCLC. NOTE: task brief listed PMID
  30244000 (a JCO companion) — primary registration paper for
  PMID 30280635 (NEJM) which is the canonical KEYNOTE-407 reference.
