notes: >
  KEYNOTE-426 phase 3 (NCT02853331): pembrolizumab 200mg q3w + axitinib 5mg BID
  vs sunitinib 50mg 4/2 in untreated ccRCC (all IMDC risk groups, n=861).
  mOS not reached vs 35.7 mo (HR 0.68, p<0.001); PFS 15.1 vs 11.1 mo (HR 0.69);
  ORR 59.3% vs 35.7%. Benefit consistent across IMDC risk subgroups including
  favorable risk. Updated OS (60-mo): HR 0.73. Establishes pembro+axi as NCCN
  category 1 for all IMDC risk groups ccRCC 1L.
