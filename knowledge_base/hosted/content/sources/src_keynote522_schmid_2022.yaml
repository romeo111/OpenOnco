notes: >
  Phase 3 RCT (KEYNOTE-522): pembrolizumab + carboplatin/paclitaxel neoadjuvant
  → surgery → adjuvant pembrolizumab vs placebo + same chemo in early-stage
  (stage II-III) TNBC. Co-primary endpoints: pCR and EFS. pCR 64.8% vs 51.2%
  (p<0.001); EFS HR 0.63 (95% CI 0.48–0.82, p<0.001) at ~36-month median follow-up.
  PD-L1 status did NOT modify EFS benefit (key contrast with KEYNOTE-355 in mTNBC).
  Established pembrolizumab as standard of care for early TNBC in both
  neoadjuvant and adjuvant settings. NCCN Category 1.

