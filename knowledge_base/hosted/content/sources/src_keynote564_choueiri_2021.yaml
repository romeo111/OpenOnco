notes: >
  KEYNOTE-564 phase 3 (NCT03142334): adjuvant pembrolizumab 200mg q3w x 17 cycles
  (≈1 year) vs placebo in clear-cell RCC after nephrectomy. Eligible: stage II
  high-risk (pT2 G4 or pT3 any G), stage III (pT3 G1-4), stage IV-NED (resected
  M1), or M1 NED. DFS HR 0.68 (p=0.002) at primary analysis. Updated: OS HR 0.62
  (p=0.001) — first adjuvant therapy to show OS benefit in RCC. Establishes
  pembrolizumab as NCCN category 1 adjuvant for high-risk/IV-NED ccRCC.
