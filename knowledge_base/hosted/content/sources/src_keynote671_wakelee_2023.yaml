key_findings:
  - "EFS: HR 0.58 (95% CI 0.46-0.72; p<0.001) — primary endpoint met"
  - "OS: HR 0.73 (95% CI 0.54-0.99; p=0.004 at interim) — second primary endpoint met"
  - "pCR rate: 18.1% pembro vs 4.0% placebo (p<0.001)"
