notes: >
  Pivotal trial for pembrolizumab perioperative NSCLC. FDA approved Sep 2023.
  NCCN NSCLC 2025: Cat 1 for resectable stage II-IIIB. The only perioperative
  NSCLC trial with positive OS data at primary analysis. Total pembro duration:
  up to ~17 cycles (4 neoadjuvant + 13 adjuvant). Chemo backbone: cisplatin or
  carboplatin + paclitaxel or nab-paclitaxel × 4 cycles. EGFR/ALK+ patients
  enrolled but showed attenuated benefit; most guidelines now recommend against
  ICI perioperative in known EGFR/ALK+ (use targeted adjuvant instead).
  Exact citation details require clinical reviewer verification.
