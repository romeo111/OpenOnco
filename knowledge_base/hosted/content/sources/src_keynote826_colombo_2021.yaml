notes: >
  KEYNOTE-826 phase 3 (NCT03635567): pembrolizumab + paclitaxel + (cisplatin or
  carboplatin) ± bevacizumab vs placebo + same chemo ± bevacizumab in persistent,
  recurrent, or metastatic cervical cancer (n=617; PD-L1 CPS ≥1 primary subgroup,
  n=548). In CPS≥1: mPFS 10.4 vs 8.2 mo (HR 0.62, p<0.001); mOS 28.6 vs 16.5 mo
  (HR 0.64, p<0.001) — final OS analysis (Lancet 2023). All-comers benefit similar.
  Bevacizumab used in ~63% of patients (when no contraindication). FDA approval
  October 2021 for PD-L1 CPS≥1. NCCN category 1, preferred 1L for metastatic
  cervical cancer CPS≥1. Squamous, adenocarcinoma, adenosquamous histologies.
