id: SRC-KEYNOTE859-RHA-2023
type: rct
full_citation: >
  Rha SY, Oh DY, Yañez P, et al. Pembrolizumab plus chemotherapy versus
  placebo plus chemotherapy for HER2-negative advanced gastric cancer
  (KEYNOTE-859): a multicentre, randomised, double-blind, phase 3 trial.
  Lancet Oncol. 2023;24(11):1181–1195.
trial_name: KEYNOTE-859
nct: NCT03675737
pmid: "37899673"
doi: "10.1016/S1470-2045(23)00515-4"

disease_context: DIS-GASTRIC
line_of_therapy: 1

population: >
  HER2-negative (IHC 0 or 1+, or IHC 2+/FISH-negative) advanced or
  metastatic gastric or gastroesophageal junction (GEJ) adenocarcinoma,
  no prior systemic therapy, ECOG 0-1. N=1579 randomised. Enrolled
  regardless of PD-L1 CPS status.

intervention: >
  Pembrolizumab 200 mg IV q3w + FOLFOX (oxaliplatin 85 mg/m² + leucovorin
  400 mg/m² + 5-FU 400 mg/m² bolus + 2400 mg/m² CIV q2w, nested into
  3-week pembrolizumab cycles) OR CAPOX (oxaliplatin 130 mg/m² day 1 +
  capecitabine 1000 mg/m² bid days 1-14 q3w).

comparator: "Placebo + FOLFOX or CAPOX"

key_results:
  os_all_comers:
    hr: 0.78
    ci95: "0.70–0.87"
    p: "<0.0001"
    median_experimental_months: 12.9
    median_control_months: 11.5
  os_pdl1_cps_gte1:
    hr: 0.74
    ci95: "0.65–0.84"
    p: "<0.0001"
  os_pdl1_cps_gte10:
    hr: 0.65
    ci95: "0.53–0.79"
    p: "<0.0001"
  os_msi_h_subgroup:
    hr: 0.38
    ci95: "0.19–0.74"
    note: >
      MSI-H/dMMR subgroup (n=113; ~7% of all patients): dramatic OS benefit.
      Magnitude substantially greater than CPS-unselected cohort.
  pfs_all_comers:
    hr: 0.76
    ci95: "0.67–0.85"
    p: "<0.0001"
  orr_experimental: "51.3%"
  orr_control: "42.0%"
  safety_notes: >
    Grade ≥3 TRAEs: pembrolizumab arm 59%, placebo arm 51%. ICI-related
    irAEs: hypothyroidism (~13%), pneumonitis (~3% G≥3 rare), hepatitis
    (~2%). No new safety signals vs established pembrolizumab profile.

nccn_category_supported: "1"
regulatory_status: >
  FDA approved pembrolizumab + fluoropyrimidine- and platinum-containing
  chemotherapy for HER2-negative advanced/unresectable/metastatic gastric
  or GEJ adenocarcinoma with PD-L1 CPS ≥1 (March 2023, based on KEYNOTE-859).
  MSI-H/dMMR benefit is post-hoc subgroup but biologically consistent.

license_class: referenced
source_quality: high
last_reviewed: "2026-05-04"
notes: >
  KEYNOTE-859 is one of two pivotal trials (alongside CheckMate-649 for
  FOLFOX+nivolumab) establishing chemo+ICI as 1L standard for HER2-negative
  advanced gastric/GEJ. Three co-primary endpoints (OS all-comers,
  OS CPS≥1, OS CPS≥10) — all met. MSI-H/dMMR subgroup (OS HR 0.38)
  shows exceptional ICI sensitivity, making this subgroup a treatment-defining
  biomarker. CPS ≥1 FDA label; CPS ≥10 EMA broader benefit; MSI-H
  independent of CPS threshold.
