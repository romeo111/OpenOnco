notes: >
  KEYNOTE-022 phase-2 (NCT02130466): triplet dabrafenib + trametinib
  + pembrolizumab vs dabrafenib + trametinib + placebo in 1L
  BRAF V600E/K-mutant metastatic melanoma (n=120). Median PFS
  16.0 vs 10.3 mo (HR 0.66; not statistically significant). DOR
  not reached vs 12.5 mo. Triplet associated with higher Grade 3+
  TRAEs (58% vs 25%). Hypothesis-generating; not standard. NOTE:
  task brief listed PMID 30559433 — that PMID belongs to a separate
  abstract; primary KEYNOTE-022 PMID is 31171878 (verified).
