  Pembrolizumab versus methotrexate, docetaxel, or cetuximab for recurrent or metastatic
  head-and-neck squamous cell carcinoma (KEYNOTE-040): a randomised, open-label,
  phase 3 study
type: clinical_trial
hosting: referenced

citation:
  authors: "Cohen EEW, Soulières D, Le Tourneau C, Dinis J, Licitra L, Ahn MJ, et al."
  title: >
    Pembrolizumab versus methotrexate, docetaxel, or cetuximab for recurrent or metastatic
    head-and-neck squamous cell carcinoma (KEYNOTE-040): a randomised, open-label,
    phase 3 study
  journal: "Lancet"
