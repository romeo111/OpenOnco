  orr_comparator: "10.1%"
  grade34_aes_pembro: "13%"
  grade34_aes_comparator: "36%"

clinical_significance: >
  KEYNOTE-040 showed pembrolizumab numerical OS benefit vs investigator-choice chemotherapy
  in platinum-refractory ICI-naive HNSCC (2L): mOS 8.4 vs 6.9 months (HR 0.80).
  Did not meet pre-specified hierarchical statistical threshold (p=0.0161 vs p=0.0175 required)
  but favored pembrolizumab numerically. CPS ≥20 subgroup: OS HR 0.53 (strong benefit signal).
  Grade 3/4 AEs significantly lower with pembrolizumab (13% vs 36%).
  Context: CheckMate-141 (nivolumab 2L HNSCC; HR 0.70, p=0.01) met primary endpoint —
  nivolumab has stronger 2L evidence by regulatory standard.
  Modern 2L context (2025/2026): most 1L patients receive pembrolizumab (KEYNOTE-048);
  2L ICI applies primarily to CPS <1 EXTREME-treated patients (ICI-naive at 2L).
  NCCN: both pembrolizumab and nivolumab are listed as 2L options for ICI-naive patients.

nccn_category: "1"
