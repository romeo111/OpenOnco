study_design:
  type: RCT
  phase: 3
  n: 495
  population: "Recurrent or metastatic HNSCC progressing after platinum-based therapy; ICI-naive; ECOG 0-1"
  intervention: "Pembrolizumab 200 mg IV q3w"
  comparator: "Investigator's choice: methotrexate 40 mg/m² IV weekly, docetaxel 75 mg/m² q3w, or cetuximab 250 mg/m² weekly"
  primary_endpoint: "Overall survival"

key_results:
  os_hr: 0.80
  os_pembro_months: 8.4
  os_comparator_months: 6.9
  nominal_p_value: "0.0161 (did not meet hierarchical significance threshold)"
  cps_ge1_os_hr: 0.74
  cps_ge20_os_hr: 0.53
