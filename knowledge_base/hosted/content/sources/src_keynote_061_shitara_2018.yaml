notes: >
  KEYNOTE-061 phase 3 (NCT02370498): pembrolizumab 200 mg q3w vs paclitaxel
  80 mg/m^2 weekly as 2L therapy for advanced gastric / gastro-oesophageal
  junction adenocarcinoma progressing after platinum + fluoropyrimidine
  (n=592 with PD-L1 CPS≥1 in primary analysis). Primary endpoints: OS and
  PFS in PD-L1 CPS≥1. mOS 9.1 vs 8.3 mo (HR 0.82; 95% CI 0.66-1.03; p=0.0421
  one-sided, did not meet pre-specified threshold p=0.0135). PFS not improved
  overall. Subgroup signals: greater pembrolizumab benefit in PD-L1 CPS≥10
  and MSI-H. EBV-positive subset analysis is a downstream report (see
  follow-up source ingest). Parent trial cited here for KN-061 evidence
  base; NCCN reference for 2L pembrolizumab in MSI-H/dMMR or PD-L1 CPS≥10
  gastric/GEJ.
