notes: >
  KEYNOTE-189 phase-3 (NCT02578680): pembrolizumab 200 mg q3w +
  pemetrexed/platinum vs placebo + pemetrexed/platinum in 1L
  metastatic non-squamous NSCLC without EGFR/ALK alterations
  (n=616). 12-mo OS 69.2% vs 49.4% (HR 0.49; p<0.001); median PFS
  8.8 vs 4.9 mo. 5-year update (Garassino JCO 2023): mOS 22.0 vs
  10.6 mo across PD-L1 strata. Established pembro + chemo as 1L
  standard for non-squamous NSCLC regardless of PD-L1.
