notes: >
  KEYNOTE-590 phase 3 (NCT03189719): pembrolizumab + cisplatin + 5-FU vs
  chemotherapy alone as 1L for advanced esophageal carcinoma (ESCC + EAC
  including GEJ Siewert I, n=749). Coprimary endpoints OS and PFS in ESCC
  CPS≥10, ESCC all, and all-histology all-comers. ESCC CPS≥10: mOS 13.9 vs
  8.8 mo (HR 0.57, p<0.0001). All-ESCC: mOS 12.6 vs 9.8 mo (HR 0.72, p<0.001).
  All-comers: mOS 12.4 vs 9.8 mo (HR 0.73, p<0.0001). EAC subgroup (GEJ I
  included): mOS 11.6 vs 10.2 mo (HR 0.73; not separately powered). Pembrolizumab
  benefit concentrated in CPS≥10 for both SCC and adeno. NCCN category 1 for
  ESCC CPS≥10 and all-ESCC; also applies to EAC CPS≥10.
