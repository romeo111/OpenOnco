notes: 'KEYNOTE-671 phase-3 (NCT03425643): neoadjuvant pembrolizumab 200 mg q3w +
  cisplatin-based chemo × 4 cycles → surgery → adjuvant pembrolizumab × 13 cycles
  vs neoadjuvant chemo + placebo → surgery → placebo in resectable stage II–IIIB
  (T3-T4N2) NSCLC (n=797). 24-mo EFS 62.4% vs 40.6% (HR 0.58; p<0.001); pCR 18.1%
  vs 4.0%; mPR 30.2% vs 11.0%. OS update (Spicer NEJM 2024): mOS not reached vs
  52.4 mo (HR 0.72; p=0.005). Established perioperative pembrolizumab as standard
  for resectable stage II–IIIB NSCLC without targetable EGFR/ALK alterations;
  basis for FDA approval Oct 2023.

