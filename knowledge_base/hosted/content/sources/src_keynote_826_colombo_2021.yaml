notes: >
  KEYNOTE-826 double-blind phase 3 (NCT03635567): pembrolizumab 200 mg
  q3w + paclitaxel + cisplatin/carboplatin ± bevacizumab vs placebo +
  same chemotherapy backbone in 1L persistent/recurrent/metastatic
  cervical cancer; n=617. In PD-L1 CPS ≥1 (n=548): mPFS 10.4 vs 8.2 mo
  (HR 0.62; p<0.001); 24-mo OS 53.0% vs 41.7% (HR 0.64; p<0.001).
  Benefit consistent in CPS ≥10 and ITT populations; ~63% of patients
  received bevacizumab. Grade ≥3 anaemia and neutropenia common in
  both arms; no unexpected safety signals. Established pembrolizumab +
  platinum/paclitaxel ± bevacizumab as 1L standard for PD-L1 CPS ≥1
  persistent/recurrent/metastatic cervical cancer; supported FDA
  approval (Oct 2021).
  Cited by CSD-9A actionability RFs for cervical cancer PD-L1 CPS ≥1
  selection.
