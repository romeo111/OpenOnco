notes: >
  KEYNOTE-859 phase 3 (NCT03675737): pembrolizumab 200 mg q3w + investigator-choice
  chemotherapy (FP or CAPOX) vs placebo + chemotherapy as 1L for HER2-negative
  locally advanced unresectable or metastatic gastric/GEJ adenocarcinoma
  (n=1579). Median OS 12.9 vs 11.5 mo (HR 0.78; 95% CI 0.70-0.87; p<0.0001).
  Benefit greatest in PD-L1 CPS≥10: mOS 15.7 vs 11.8 mo (HR 0.65). Median PFS
  6.9 vs 5.6 mo (HR 0.76). ORR 51.3% vs 42.0%. Established pembrolizumab + chemo
  as 1L standard for HER2-negative advanced gastric/GEJ; NCCN category 1 for
  PD-L1 CPS≥1.
