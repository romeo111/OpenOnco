notes: >
  KEYNOTE-966 phase 3 RCT (NCT04003636): pembrolizumab 200 mg q3w +
  gemcitabine 1000 mg/m^2 + cisplatin 25 mg/m^2 (days 1, 8 q3w x up to
  8 cycles) followed by pembrolizumab + gemcitabine maintenance, vs
  placebo + gem-cis, as 1L therapy for advanced/metastatic biliary
  tract cancer (intrahepatic / extrahepatic cholangiocarcinoma and
  gallbladder cancer); n=1069. Primary endpoint OS. mOS 12.7 vs 10.9 mo
  (HR 0.83; 95% CI 0.72-0.95; p=0.0034). mPFS 6.5 vs 5.6 mo (HR 0.86,
  ns). ORR 29% vs 29% (no improvement in objective response). Benefit
  consistent across PD-L1 CPS subgroups; magnitude smaller than TOPAZ-1
  but corroborates anti-PD-(L)1 + chemo as new 1L standard. FDA approved
  October 2023 for 1L advanced BTC in combination with gem-cis. NCCN
  category 1 alternative preferred regimen alongside TOPAZ-1 / durva
  combination.
