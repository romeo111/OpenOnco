notes: >
  Prospective phase-2 investigator-initiated study of pembrolizumab as
  salvage therapy in 61 patients with metastatic gastric cancer with
  comprehensive molecular characterization (WES, RNA-seq, EBER-ISH,
  PD-L1 IHC, ctDNA monitoring). Key biomarker-stratified outcomes:
  EBV-positive subset ORR 100% (6/6); MSI-H subset ORR 85.7% (6/7);
  PD-L1+ vs PD-L1- ORR 50% vs 0% (p<0.001). Decreased ctDNA at 6 weeks
  correlated with response and improved PFS. Established EBV-positive
  gastric adenocarcinoma as a high-priority candidate population for
  ICI benefit despite small sample size; cited by NCCN gastric and
  ESMO gastric guidelines as supporting evidence for EBV-subtype
  immunotherapy rationale. Note: study was conducted independently
  (Samsung Medical Center, Korea) rather than as a registered KEYNOTE
  secondary analysis. Single-center, single-arm; small EBV+ cohort
  (n=6) — hypothesis-generating, not practice-changing on its own.
