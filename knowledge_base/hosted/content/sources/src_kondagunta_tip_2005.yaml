id: SRC-KONDAGUNTA-TIP-2005
title: >
  Combination of paclitaxel, ifosfamide, and cisplatin is an effective second-line
  therapy for patients with relapsed testicular germ cell tumors
type: clinical_trial
hosting: referenced

citation:
  authors: "Kondagunta GV, Bacik J, Donadio A, Bajorin D, Marion S, Sheinfeld J, et al."
  title: >
    Combination of paclitaxel, ifosfamide, and cisplatin is an effective second-line
    therapy for patients with relapsed testicular germ cell tumors
  journal: "Journal of Clinical Oncology"
  year: 2005
  volume: 23
  issue: 27
  pages: "6549-6555"
  doi: "10.1200/JCO.2005.19.638"
  pmid: "15860858"

study_design:
  type: phase_2_single_arm
  n: 46
  population: >
    Relapsed or refractory testicular GCT (seminoma or NSGCT) after ≥1 prior
    cisplatin-containing regimen. Cisplatin-sensitive or previously platinum-refractory.
    Memorial Sloan Kettering series.
  intervention: "Paclitaxel 250 mg/m² 24h CIV d1 + ifosfamide 1.5 g/m²/d d2-5 + cisplatin 25 mg/m²/d d2-5 + G-CSF q21d × 4 cycles"
  primary_endpoint: "Complete response rate + durable NED"

key_results:
  complete_response_rate: "63% (29/46)"
  durable_ned_rate: "52%"
  favorable_vs_unfavorable_prognostic: "Favorable group (AFP <1000, no liver/bone/brain mets): 76% CR; Unfavorable: 45% CR"
  toxicity_grade34_neutropenia: "Significant; G-CSF mandatory"

clinical_significance: >
  TIP established as a preferred cisplatin-sensitive salvage regimen for relapsed GCT.
  63% complete response rate; 52% long-term durable NED. Paclitaxel pre-exposure for
  24 hours before ifosfamide/cisplatin may enhance sensitization (pre-treatment with
  paclitaxel depletes S-phase cells). G-CSF mandatory due to myelosuppression.
  TIP is now the NCCN Category 1 standard salvage regimen for cisplatin-sensitive
  relapsed GCT (good/intermediate Indiana prognostic score).

nccn_category: "1"
evidence_grade: moderate

