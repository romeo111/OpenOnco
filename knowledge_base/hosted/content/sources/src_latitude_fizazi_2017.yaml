notes: >
  LATITUDE phase 3 (NCT01715285): abiraterone acetate 1000mg + prednisone vs
  placebo + ADT in high-risk de-novo mHSPC (n=1199). High-risk defined as ≥2 of:
  Gleason ≥8, ≥3 bone mets, visceral mets. mOS 53.3 vs 36.5 mo (HR 0.62,
  p<0.001); rPFS HR 0.47 (p<0.001). Established abiraterone+ADT as NCCN category 1
  for high-risk mHSPC. Framing differs from CHAARTED (volume-based): LATITUDE uses
  risk factors, not volume as primary stratification.
