id: SRC-LAURA-ZHOU-2024
source_type: clinical_trial_report
citation: >
  Zhou C, Wu YL, Chen G, et al. Osimertinib after Chemoradiotherapy in Stage III
  EGFR-Mutated NSCLC. N Engl J Med. 2024;391(7):585–597.
doi: "10.1056/NEJMoa2402614"
trial_name: "LAURA"
trial_registry_id: NCT03521154
phase: "3 (randomized, double-blind, placebo-controlled)"
year: 2024
journal: "New England Journal of Medicine"

population: >
  Patients with unresectable stage III NSCLC with EGFR exon 19 deletion or
  L858R mutation who had not progressed following platinum-based concurrent or
  sequential chemoradiotherapy (CRT). N=216.

intervention: "Osimertinib 80 mg PO QD until progression or unacceptable toxicity (up to ~5 years)"
comparator: "Placebo QD"

primary_endpoints:
  - "Progression-free survival (PFS) by blinded independent central review"

key_results:
  pfs_hr: "0.16 (95% CI 0.10–0.24; p<0.001)"
  median_pfs: "39.1 months vs 5.6 months"
  orr: "57% vs 33% (post-CRT)"
  os_note: "OS data immature at primary analysis (HR 0.81; 95% CI 0.42–1.56; p=0.53; not significant)"
  cns_pfs: "HR 0.24 for CNS PFS — osimertinib substantially reduces brain metastases"

regulatory_impact: >
  FDA approved: September 5, 2024 — osimertinib for unresectable stage III NSCLC
  with EGFR exon 19 deletion or exon 21 L858R mutations after concurrent or sequential
  chemoradiotherapy without disease progression.
  This approval establishes osimertinib as the standard post-CRT consolidation for
  EGFR-mutated stage III unresectable NSCLC, replacing durvalumab (PACIFIC) in this subgroup.

nccn_category_reference: "NCCN NSCLC 2025: Category 1 for EGFR-mutated stage III unresectable NSCLC post-CRT"

hosting_status: referenced
license: "NEJM (institutional access)"

last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  Workstream EX 2026-05-04. LAURA trial: osimertinib post-CRT for EGFR-mutated
  stage III unresectable NSCLC. PFS HR 0.16 (extraordinary benefit); FDA Sep 2024.
  This is one of the most impactful approvals in lung cancer in 2024:
  changes the paradigm for EGFR+ stage III patients (previously treated the same
  as EGFR-WT with durvalumab, now specifically targeted with osimertinib).
  Two-reviewer clinical signoff required per CHARTER §6.1.
