id: SRC-LMIND-SALLES-2020
source_type: clinical_trial_report
citation: >
  Salles G, Duell J, González Barca E, et al. Tafasitamab plus lenalidomide
  in relapsed or refractory diffuse large B-cell lymphoma (L-MIND): a
  multicentre, prospective, single-arm, phase 2 study.
  Lancet Oncol. 2020;21(7):978–988.
doi: "10.1016/S1470-2045(20)30225-4"
trial_name: "L-MIND"
trial_registry_id: NCT03019640
phase: "2 (single-arm, open-label)"
year: 2020
journal: "Lancet Oncology"

population: >
  Adults with relapsed or refractory DLBCL not otherwise specified, including
  DLBCL arising from low-grade lymphoma (e.g., transformed follicular lymphoma);
  not eligible for autologous stem cell transplant (autoSCT);
  1-3 prior lines of systemic therapy; ECOG PS 0-2; N=80 enrolled, N=71 efficacy-evaluable.

intervention: >
  Tafasitamab 12 mg/kg IV (loading: cycle 1 d1, d4, d8, d15, d22; cycles 2-3
  d1, d8, d15, d22; cycles ≥4 d1, d15) + lenalidomide 25 mg PO d1-21 of 28-day
  cycle × 12 cycles, then tafasitamab monotherapy until progression.
comparator: "Single-arm (no randomized comparator)"

primary_endpoints:
  - "Best overall response rate (ORR) per Lugano criteria"

key_results:
  orr: "57.5% (updated analysis; 40.6% per original primary data cut)"
  complete_response: "40.0% (updated analysis)"
  median_duration_of_response: "43.9 months (patients achieving response)"
  median_pfs: "12.1 months"
  median_os: "33.5 months"
  notes: >
    L-MIND primary analysis (Salles 2020 Lancet Oncol) and updated 3-year
    follow-up (Duell 2021 Leukemia) consistently showed ORR ~57-60%, CR ~40%,
    durable responses (mDOR ~44 months). Single-arm design limits formal
    comparison vs. chemotherapy; no randomized OS benefit demonstrated.
    FDA granted accelerated approval July 31, 2020 based on ORR/DOR endpoint.

regulatory_impact: >
  FDA accelerated approval: July 31, 2020 — tafasitamab-cxix (Monjuvi) with
  lenalidomide for adults with R/R DLBCL not otherwise specified (including
  DLBCL arising from low-grade lymphoma) not eligible for autoSCT.
  EMA conditional marketing authorization: 2021 (Minjuvi) for R/R DLBCL ≥2L.
  Indication requires co-administration with lenalidomide (single-agent data
  insufficient for approval; tafasitamab monotherapy is maintenance only after
  lenalidomide completion).

nccn_category_reference: >
  NCCN B-Cell Lymphomas 2025: Category 2A for R/R DLBCL in patients who are
  transplant-ineligible and cannot receive or have failed Pola-BR. Lower category
  than Pola-BR (Cat 1) due to single-arm trial design.

hosting_status: referenced
license: "Elsevier/Lancet (institutional access)"

last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  Workstream EY 2026-05-04. L-MIND: tafasitamab+lenalidomide for R/R DLBCL
  not eligible for autoSCT. Key results: ORR 57.5%, CR 40%, mDOR 43.9 months,
  mOS 33.5 months. FDA accelerated approval Jul 31, 2020. NCCN Cat 2A.
  Single-arm design — no randomized control; accelerated (not regular) approval.
  Updated 3-year analysis: Duell J et al. Leukemia 2021;35(9):2567–2579
  (DOI: 10.1038/s41375-021-01313-2) confirms durable ORR/CR.
  Two-reviewer clinical signoff required per CHARTER §6.1.
