id: SRC-LOEHRER-1995
type: clinical_trial
title: "Importance of bleomycin in favorable-prognosis disseminated germ cell tumors: an Eastern Cooperative Oncology Group trial"
short_name: "Loehrer 1995 ECOG (GCT EP backbone)"
authors: "Loehrer PJ, Johnson D, Elson P, et al."
journal: "Journal of Clinical Oncology"
year: 1995
volume: 13
pages: "470-476"
doi: "10.1200/JCO.1995.13.2.470"
pmid: "7844612"
trial_name: "ECOG EST 1582"
trial_phase: "Phase 3"
key_findings: >
  BEP (bleomycin + etoposide + cisplatin) vs EP (etoposide + cisplatin) in
  good-prognosis disseminated germ cell tumors. 3-year OS 95% (BEP) vs 86% (EP;
  p=0.01). Established BEP as the standard for favorable-risk GCT; EP (without
  bleomycin) is acceptable only when bleomycin is contraindicated (pulmonary
  toxicity risk). IGCCCG good-risk GCT: BEP × 3 is standard.
