key_findings: >
  Elranatamab (subcutaneous BCMA×CD3 bispecific antibody) in triple-refractory
  multiple myeloma (≥4 prior lines including PI, IMiD, anti-CD38). Cohort A
  (BCMA-naive): ORR 61.2%; CR/sCR 35.3%. Median DOR not reached at median follow-up
  14.7 months. CRS Grade 1–2 in 56%; Grade 3+ in 1%. ICANS 3%. FDA approved
  August 2023 for ≥4 prior lines RRMM.
