id: SRC-MAGNITUDE-CHI-2023
type: clinical_trial_publication
hosting_status: referenced

title: >
  Niraparib plus Abiraterone Acetate and Prednisone in Patients with Metastatic
  Castration-Resistant Prostate Cancer and Homologous Recombination Repair Gene Alterations
  (MAGNITUDE): A Randomised, Double-Blind, Phase 3 Trial
authors:
  - "Chi KN"
  - "Rathkopf D"
  - "Smith MR"
  - "et al."
journal: Lancet Oncology
year: 2023
volume: "24"
issue: "1"
pages: "11-24"
doi: "10.1016/S1470-2045(22)00769-7"
pmid: "36455557"
trial_name: MAGNITUDE
nct_id: NCT03748836
phase: 3
design: Randomised, double-blind, placebo-controlled

key_findings:
  - "BRCA1/2-mutant cohort (primary endpoint): rPFS HR 0.47 (95% CI 0.35-0.64; p<0.0001)"
  - "Non-BRCA HRR cohort: NO benefit — futility boundary crossed at interim analysis"
  - "ORR (BRCA1/2 measurable disease): ~54% niraparib arm vs ~33% placebo arm"
  - "OS (BRCA1/2): HR 0.82 (maturing; trend toward benefit)"
  - "Hypertension Grade 3-4: ~25% niraparib (class effect); anemia ~27%"

population:
  disease: mCRPC (castration-resistant prostate cancer, metastatic)
  prior_treatment: "mCRPC, 1-2 prior hormonal treatments; ARPI-naive and ARPI-exposed enrolled"
  biomarker: "BRCA1/2 primary cohort; non-BRCA HRR secondary (NEGATIVE)"
  n_enrolled: ~423 (BRCA1/2 cohort); ~247 (non-BRCA HRR cohort)

intervention: "Niraparib 200 mg QD + abiraterone acetate 1000 mg QD + prednisone 5 mg BID"
comparator: "Placebo + abiraterone acetate 1000 mg QD + prednisone 5 mg BID"

regulatory:
  fda_approval: "August 2023 — niraparib (Zejula) + abiraterone acetate (Zytiga) for BRCA1/2-mutant mCRPC"
  ema_status: "Under review (check current status)"
  nccn_category: "1 (BRCA1/2-mutant mCRPC ONLY; non-BRCA HRR negative)"

license_class: referenced
hosting_justification: none

last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  Pivotal trial for niraparib+abiraterone in mCRPC.
  FDA approval Aug 2023 for BRCA1/2-mutant mCRPC (Zejula+Zytiga label).
  NCCN PROSTATE 2025: Cat 1 for BRCA1/2-mutant mCRPC.
  CRITICAL: Non-BRCA HRR cohort was NEGATIVE — futility boundary crossed.
  MAGNITUDE is BRCA1/2-specific unlike TALAPRO-2 (which covers broader HRR).
  Key differentiators from TALAPRO-2: abiraterone (not enzalutamide) as ARPI
  backbone; niraparib (not talazoparib) as PARPi; BRCA-only (not HRR-broad).
  Safety: abiraterone hepatotoxicity + hypertension from niraparib.
  Exact citation details require clinical reviewer verification.
