notes: 'MARIPOSA phase-3 (NCT04487080): amivantamab (EGFR/MET bispecific) +
  lazertinib (3rd-gen EGFR TKI) vs osimertinib monotherapy vs lazertinib
  monotherapy in 1L EGFR-mutated (exon 19 del or L858R) advanced NSCLC (n=1074
  across three arms; primary comparison ami+laz vs osi). Median PFS 23.7 vs
  16.6 mo (HR 0.70; p<0.001) by BICR. ORR 86% vs 85%; median DoR 25.8 vs 16.8 mo.
  Higher rates of VTE, rash, and infusion reactions in ami+laz arm; prophylactic
  anticoagulation now recommended. Established ami+laz as 1L option for EGFR-mut
  advanced NSCLC; basis for FDA approval Aug 2024.

  '
