id: SRC-MARIPOSA-PASSARO-2024
type: primary_trial
hosting: referenced
short_name: "MARIPOSA (Passaro 2024)"
full_citation: >
  Passaro A, et al. Amivantamab plus Lazertinib versus Osimertinib in EGFR-Mutated NSCLC.
  N Engl J Med. 2024;391(16):1486-1498. doi:10.1056/NEJMoa2403714.
pubmed_id: "39018534"
nct_id: NCT04487080
trial_name: MARIPOSA
phase: 3
disease: NSCLC
biomarker: "EGFR exon 19 deletion or L858R"
key_findings: >
  n=1074 EGFR ex19del/L858R 1L NSCLC. Amivantamab+lazertinib vs osimertinib monotherapy:
  mPFS 23.7 vs 16.6 months (HR 0.70; 95% CI 0.58-0.85; p<0.001).
  OS HR 0.80 (95% CI 0.61-1.05; p=0.10) — trend favoring ami+laz (not yet significant).
  Grade 3+ AEs: ~75% (ami+laz) vs 43% (osimertinib). VTE rate ~37% with ami+laz.
  DOAC prophylaxis required first 4 months per protocol.
  FDA approved August 19, 2024 for 1L EGFR ex19del/L858R NSCLC.
