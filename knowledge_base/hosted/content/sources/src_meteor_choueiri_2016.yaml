notes: >
  METEOR phase 3 (NCT01865747): cabozantinib 60mg daily vs everolimus 10mg daily
  in previously treated (≥1 VEGFR-TKI) advanced RCC (n=658). PFS 7.4 vs 3.8 mo
  (HR 0.58, p<0.001); mOS 21.4 vs 16.5 mo (HR 0.66, p=0.0003); ORR 17% vs 3%.
  Established cabozantinib as preferred 2L agent after TKI failure in ccRCC.
  FDA-approved 2016 for advanced RCC previously treated with anti-angiogenic therapy.
