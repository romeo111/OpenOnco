notes: >
  Phase III RCT: sirolimus vs placebo in patients with LAM and either abnormal FEV1 or
  evidence of functional impairment. N=89 (46 sirolimus, 43 placebo). 12-month treatment,
  12-month observation.
  Primary endpoint: change in FEV1 from baseline to 12 months.
  FEV1 slope: +1 mL/month (sirolimus) vs -12 mL/month (placebo), difference 11 mL/month (p<0.001).
  Also improved: FVC, VEGF-D, quality of life, 6-min walk. Benefits lost after discontinuation.
  No survival benefit demonstrated (insufficient follow-up).
  Formed basis of FDA approval (2015) and EMA approval (2017) of sirolimus for LAM.
  Everolimus used for TSC-related LAM and angiomyolipoma in separate trials.
  Citation: McCormack FX et al. N Engl J Med. 2011;364(17):1595-1606. DOI: 10.1056/NEJMoa1100391
