notes: >
  Phase 3 RCT (monarchE): abemaciclib 150 mg BID + endocrine therapy x 2 years
  adjuvant vs endocrine therapy alone in early HR+/HER2- node-positive high-risk
  breast cancer (N=5,637). Preplanned 4-year interim analysis (median follow-up
  42 months). 4-yr iDFS HR 0.664 (95% CI 0.578-0.762; nominal p<0.0001);
  4-yr iDFS 85.8% vs 79.4%; absolute benefit 6.4 percentage points.
  OS HR 0.929 (NS at interim). High-risk criteria: >=4 positive axillary nodes,
  OR 1-3 positive nodes + T>=5cm OR grade 3 OR Ki-67 >=20%.
  Established adjuvant CDK4/6i as standard for high-risk early HR+/HER2- BC.
  Epub: 2022-12-06.
