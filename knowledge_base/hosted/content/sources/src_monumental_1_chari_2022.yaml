key_findings: >
  Talquetamab (GPRC5D × CD3 bispecific antibody) in relapsed/refractory multiple
  myeloma. ORR 73% (0.4 mg/kg QW) and 73% (0.8 mg/kg Q2W) in RRMM patients with
  median 5–6 prior lines. CR/sCR 34–35%. Median DOR 9.3–11.9 months.
  Distinctive AEs: skin-related (rash, nail changes 67–72%) and dysgeusia/oral
  toxicity (taste changes 64–74%). CRS primarily Grade 1–2 (~72%). FDA approved
  August 2023 for ≥4 prior lines.
