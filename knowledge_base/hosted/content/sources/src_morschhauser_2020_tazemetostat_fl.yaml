notes: >
  Phase 2 single-arm open-label trial (NCT01897571) of tazemetostat
  800 mg PO BID in heavily pretreated R/R follicular lymphoma stratified
  by EZH2 mutation status. n=99 (45 EZH2-mutant cohort, 54 EZH2 wild-
  type). ORR 69% in EZH2-mut vs 35% in EZH2-WT; median DoR 10.9 vs 13.0
  mo; mPFS 13.8 vs 11.1 mo. Well tolerated (grade 3+ AEs ≤5% per event).
  Established tazemetostat as first oral EZH2 inhibitor with FDA-
  approved indication (Jun 2020) in EZH2-mut R/R FL after ≥2 prior
  lines, or any R/R FL without satisfactory alternatives. NOTE: original
  task list cited PMID 32027842 — that PMID belongs to an unrelated
  henipavirus mAb paper; correct PMID for Morschhauser tazemetostat FL
  is 33035457 (verified via PubMed).
  Cited by CSD-9A actionability RFs for FL EZH2 mutation.
