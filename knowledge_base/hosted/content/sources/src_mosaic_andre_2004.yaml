notes: >
  MOSAIC phase-3 (N=2246): FOLFOX4 vs LV5FU2 adjuvant in stage II-III colon
  cancer. Stage III 6-yr OS 72.9% vs 68.7% (HR 0.80, p=0.023). Stage II
  no significant OS benefit overall; high-risk subgroup showed trend. Established
  FOLFOX as adjuvant standard for stage III colon cancer (NCCN category 1).
  6-yr follow-up published André et al., JCO 2009 (PMID 19451431).
