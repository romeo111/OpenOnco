notes: >
  MOUNTAINEER final analysis (NCT03043313): tucatinib plus trastuzumab in
  HER2-positive RAS wild-type chemotherapy-refractory unresectable or
  metastatic CRC. At 32.4 months median follow-up, confirmed ORR was 39.3%,
  median PFS was 8.1 months, and median OS was 23.9 months among 84 patients
  treated with tucatinib plus trastuzumab. Updates the primary analysis
  source `SRC-MOUNTAINEER-STRICKLER-2022`.
