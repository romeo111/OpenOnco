id: SRC-NAPOLI1-WANG-GILLAM-2016
type: trial_publication
hosting_mode: referenced

citation:
  authors: "Wang-Gillam A, Li CP, Bodoky G, et al. (NAPOLI-1 Study Group)"
  title: "Nanoliposomal irinotecan with fluorouracil and folinic acid in metastatic pancreatic cancer after previous gemcitabine-based therapy (NAPOLI-1): a global, randomised, open-label, phase 3 trial"
  journal: "Lancet"
  year: 2016
  volume: "387"
  issue: "10018"
  pages: "545-557"
  doi: "10.1016/S0140-6736(15)00986-1"
  pmid: "26524560"

study_type: phase_3_rct
disease_context: "Metastatic pancreatic adenocarcinoma, 2L after prior gemcitabine-based therapy"
intervention: "Nal-IRI (nanoliposomal irinotecan) 80 mg/m² (salt) = 70 mg/m² (free base) + 5-FU 2400 mg/m² 46h CI + LV 400 mg/m² q2w"
control: "5-FU 2400 mg/m² + LV 400 mg/m² q2w (5-FU/LV alone)"
primary_endpoint: "Overall survival"
key_results:
  - "mOS nal-IRI+5-FU/LV 6.1 mo vs 5-FU/LV 4.2 mo (HR 0.67, 95% CI 0.49–0.92, p=0.012)"
  - "mPFS 3.1 mo vs 1.5 mo (HR 0.56, p<0.001)"
  - "ORR 16% vs 1%"
  - "Grade 3-4 neutropenia 27%, diarrhea 13%, vomiting 11%, fatigue 14%"
  - "Basis for FDA approval of nal-IRI (ONIVYDE) October 2015 (approved prior to publication)"

fda_approval_basis: true
approval_year: 2015
approval_indication: "Metastatic pancreatic adenocarcinoma in combination with 5-FU and LV after prior gemcitabine-based therapy"

license_classification: open_access_article
source_quality: high
last_verified: "2026-05-04"
notes: >
  Landmark trial establishing nal-IRI (ONIVYDE) as the standard 2L regimen
  for mPDAC after gemcitabine-based 1L. NCCN Category 1 for post-gemcitabine
  2L. Nal-IRI monotherapy arm (without 5-FU/LV) did NOT show OS benefit
  (HR 0.99) — combination required. Dosing note: 80 mg/m² refers to the
  irinotecan HCl salt form on the FDA label; 70 mg/m² free base is the same dose.
