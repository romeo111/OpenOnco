notes: >
  NATALEE phase-3 RCT (NCT03701334): ribociclib 400 mg QD days 1-21 of each
  28-day cycle x 3 years plus nonsteroidal AI versus AI alone in HR+/HER2-
  early breast cancer (stage II-III; N=5,101). Broader eligibility than
  monarchE — includes node-negative patients with >=1 high-risk clinical
  feature. Primary endpoint: invasive disease-free survival (iDFS).
  3-year iDFS 90.4% (ribociclib + AI) vs 87.1% (AI alone);
  HR 0.75 (95% CI 0.62-0.91; p=0.003); absolute benefit ~3.3%.
  iDFS benefit observed across node-positive and node-negative subgroups.
  Key toxicities: neutropenia, QTc prolongation (ribociclib requires ECG
  monitoring), hepatotoxicity, interstitial lung disease. Ribociclib 400 mg
  adjuvant dose is lower than the 600 mg metastatic dose. Established
  ribociclib + AI as a second approved CDK4/6i adjuvant option (alongside
  abemaciclib/monarchE) with a broader, less node-centric eligibility.

  NOTE: Brief specified year 2023 / NEJM vol 388; verified PMID 38507751
  is the primary results paper published 2024, vol 390, pp 1080-1091.
  File and ID reflect verified publication data.

