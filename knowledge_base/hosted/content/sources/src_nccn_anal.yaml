id: SRC-NCCN-ANAL
type: guideline
title: "NCCN Clinical Practice Guidelines in Oncology: Anal Carcinoma"
short_name: "NCCN Anal Carcinoma"
authors: "NCCN (National Comprehensive Cancer Network)"
year: 2024
url: "https://www.nccn.org/guidelines/guidelines-detail?category=1&id=1448"
key_findings: >
  NCCN guidelines for squamous cell carcinoma of the anal canal. Covers definitive
  chemoradiation (mitomycin-C + 5-FU + RT) for localized disease; retifanlimab +
  carboplatin + paclitaxel for metastatic/recurrent disease (Category 1 from 2024);
  pembrolizumab for MSI-H/TMB-H subsets; best supportive care options.
  Retifanlimab-carbo-paclitaxel replaced cisplatin-5FU as preferred metastatic regimen.
