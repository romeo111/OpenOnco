registration_required: true
license: "NCCN proprietary — non-commercial use with attribution; requires NCCN.org registration"

key_recommendations:
  - "Definitive chemoradiation (CRT) with mitomycin C + 5-FU + RT (50.4 Gy) is NCCN Category 1 for stages I-III locally advanced anal SCC (organ-preserving approach)"
  - "MMC+5FU+RT preferred over cisplatin+5FU+RT (ACT II: equivalent efficacy, MMC is standard)"
  - "Abdominoperineal resection (APR) reserved for salvage after CRT failure — NOT primary treatment for anal canal SCC"
  - "Stage IV: platinum-based chemotherapy ± PD-1 inhibitor; retifanlimab+carbo+pacli (POD1UM-303) preferred"
  - "Biopsy required to confirm residual disease before salvage APR (early biopsy false-positive); re-stage 8-11 weeks post-CRT"
  - "HIV+ patients: same CRT approach; antiretroviral therapy should be optimized"

relates_to_diseases:
  - DIS-ANAL-SCC

