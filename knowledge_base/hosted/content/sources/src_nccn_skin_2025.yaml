  hedgehog pathway inhibitors (vismodegib, sonidegib) for locally advanced/metastatic BCC;
  cemiplimab for BCC after HHI progression; Gorlin syndrome surveillance. Also covers
  cutaneous squamous cell carcinoma (cemiplimab, pembrolizumab). Replace stub with current
  version URL and full citation when ingesting.
