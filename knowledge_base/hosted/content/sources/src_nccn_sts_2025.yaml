id: SRC-NCCN-STS-2025
type: clinical_guideline
hosting: referenced

citation:
  organization: "National Comprehensive Cancer Network (NCCN)"
  title: "NCCN Clinical Practice Guidelines in Oncology: Soft Tissue Sarcoma"
  version: "v2025.1"
  year: 2025
  url: "https://www.nccn.org/professionals/physician_gls/pdf/sarcoma.pdf"

scope: >
  NCCN evidence-based guidelines for diagnosis, staging, and treatment of soft tissue
  sarcomas (STS) including extremity/trunk/retroperitoneal STS, visceral STS, and
  specific subtypes. Excludes GIST (separate guideline), Kaposi sarcoma, and desmoid
  tumors (separate pathway).

key_recommendations:
  - "1L: Doxorubicin 75 mg/m² (monotherapy) or doxorubicin+ifosfamide (AI) for palliative/neoadjuvant intent"
  - "2L LMS/UPS: Gemcitabine+docetaxel (GemDoc; SARC002 Category 1)"
  - "2L non-adipocytic STS: Pazopanib 800 mg QD (PALETTE Category 1)"
  - "2L liposarcoma: Trabectedin (Category 1) or eribulin (Category 1 for LPS)"
  - "MDT discussion mandatory for all STS at initial presentation and recurrence"
  - "Pathology review at sarcoma reference center recommended"

nccn_category_system: >
  Category 1: uniform NCCN consensus based on high-level evidence.
  Category 2A: uniform consensus based on lower-level evidence.
  Category 2B: non-uniform consensus (no major disagreement).

license: "NCCN copyright — referenced only, not hosted"
