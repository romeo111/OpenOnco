notes: >
  NCCN Testicular Cancer guidelines cover staging (IGCCC risk classification),
  surveillance options for stage I, BEP/EP chemotherapy for good/intermediate/poor
  risk, retroperitoneal lymph node dissection (RPLND) indications, and salvage
  therapy (TIP, VIP, high-dose with ASCT). BEP ×3 (good-risk) and ×4
  (intermediate/poor-risk) are NCCN Category 1 recommendations.
