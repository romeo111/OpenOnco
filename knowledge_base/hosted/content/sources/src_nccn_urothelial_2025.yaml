id: SRC-NCCN-UROTHELIAL-2025
type: guideline
title: "NCCN Clinical Practice Guidelines in Oncology: Bladder Cancer (including Urothelial)"
short_name: "NCCN Bladder Cancer 2025"
authors: "NCCN (National Comprehensive Cancer Network)"
year: 2025
url: "https://www.nccn.org/guidelines/guidelines-detail?category=1&id=1417"
key_findings: >
  NCCN guidelines for bladder and urothelial carcinoma management, including
  systemic therapy for metastatic disease. Covers 1L platinum-based regimens
  (gem-cis preferred; gem-carbo for cisplatin-ineligible), avelumab switch
  maintenance, pembrolizumab 1L for cisplatin-ineligible, 2L options
  (erdafitinib for FGFR-altered, enfortumab vedotin, pembrolizumab),
  and taxane monotherapy for heavily pre-treated patients.
