notes: >
  Living federal HIV guideline set: (a) ARV initiation + first-line
  regimen selection (Adult & Adolescent ARV Guidelines, last full
  revision 2024-09-25), and (b) prevention and treatment of OIs (Adult &
  Adolescent OI Guidelines, archive snapshot 2024-12-16). Continuously
  updated on clinicalinfo.hiv.gov. Used in OpenOnco for HIV-associated
  lymphoma management (DLBCL, NHL, KSHV-associated MCD), TB / PCP /
  CMV / Cryptococcus prophylaxis during cytotoxic therapy, and ART
  management around chemotherapy. First HIV-side source in the KB; needed
  because all HIV-associated lymphoma indications require concurrent
  ART optimization but had no HIV-side authority cited.
