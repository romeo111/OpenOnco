notes: >
  Nordic phase 3 (NCT01502241): TMZ alone vs hypofractionated RT (34 Gy/10 fx)
  vs standard RT (60 Gy/30 fx) in GBM patients ≥60 years (n=342). TMZ superior
  to standard RT in ≥70 year subgroup (mOS 7.0 vs 5.2 mo, HR 0.35). MGMT-
  methylated patients had longer survival with TMZ. Hypofractionated RT (34 Gy/10)
  non-inferior to standard 60 Gy and better tolerated. Established:
  (1) TMZ alone as an option for MGMT-methylated elderly GBM ≥70
  (2) Hypofractionated RT as the alternative for MGMT-unmethylated elderly GBM
  Companion data from CCTG CE.6 (Perry 2017) extended these findings to
  hypofractionated RT + TMZ combination.
