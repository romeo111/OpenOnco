key_findings: >
  Glofitamab (IV CD3×CD20 bispecific, fixed-duration 12 cycles) in R/R DLBCL
  (≥2 prior lines, obinutuzumab pretreatment). ORR 51.6%; CR 39.4%.
  Median DOR in CRs not reached (>12 months); 12-month DOR rate 76.5%.
  Fixed-duration therapy — treatment discontinuation after 12 cycles.
  CRS Grade 1–2 in 60%; Grade 3 in 4%. FDA approved June 2023.
