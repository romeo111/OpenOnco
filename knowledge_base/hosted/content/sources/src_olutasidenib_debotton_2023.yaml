type: clinical_trial
title: "Olutasidenib (FT-2102) in patients with relapsed or refractory IDH1-mutated AML or MDS"
short_name: "Olutasidenib 2102-HEM-101 extended analysis"
authors: "De Botton S, Montesinos P, Schuh AC, et al."
journal: "Journal of Clinical Oncology"
year: 2023
