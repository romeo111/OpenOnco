trial_phase: "Phase 2"
nct_id: "NCT02719574"
key_findings: >
  Extended analysis of olutasidenib monotherapy in R/R IDH1-mutant AML. ORR 48%;
  CR/CRi 35%; median OS 11.6 months; median DOR in CR/CRi 25.9 months.
  17% achieved complete molecular remission (IDH1 mutation clearance).
  Companion to SRC-2102-HEM-101 with longer follow-up and JCO publication context.
