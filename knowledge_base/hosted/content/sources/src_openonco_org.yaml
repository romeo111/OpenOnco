notes: >
  Vendor-neutral comparison database for 100+ liquid biopsy cancer tests.
  Categories covered: MRD (minimal residual disease), early detection,
  treatment response monitoring, and comprehensive genomic profiling (CGP).

  **What this source would contribute to the KB:**
  - Structured, citable test specifications for assays named in BIO-CTDNA-MRD
    (Signatera, RaDaR, Reveal MRD, Tempus xM, Latitude, clonoSEQ, NeXT
    Personal, Pathlight, NavDx, and others)
  - FDA clearance / authorization status per assay
  - Reimbursement coverage notes (Medicare CPT codes, payer policy status)
  - Tumor-informed vs tumor-agnostic classification per test
  - Analytic sensitivity/specificity benchmarks where published

  **Name collision note:**
  Both this source and this project are named "OpenOnco". They are distinct
  organisations with non-overlapping products (test catalog vs treatment
  planner). No affiliation. Coordinate on naming if cooperation pursued
  (Track B).

  **Pending actions before this source can be cited:**
  1. Manually verify license at https://www.openonco.org/terms
  2. If permissive (CC-BY, CC0, or equivalent): update license.*, attribution.*,
     commercial_use_allowed, redistribution_allowed, legal_review.status → reviewed
  3. Add SRC-OPENONCO-ORG to BIO-CTDNA-MRD sources[]
  4. Consider creating BMA stubs for tumor-informed and tumor-agnostic ctDNA-MRD
     assay families, citing specific test pages (e.g. /mrd/navdx) as evidence
