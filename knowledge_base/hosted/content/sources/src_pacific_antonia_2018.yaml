id: SRC-PACIFIC-ANTONIA-2018
source_type: clinical_trial_report
citation: >
  Antonia SJ, Villegas A, Daniel D, et al. Overall Survival with Durvalumab after
  Chemoradiotherapy in Stage III NSCLC. N Engl J Med. 2018;379(24):2342–2350.
doi: "10.1056/NEJMoa1809697"
trial_name: "PACIFIC"
trial_registry_id: NCT02125461
phase: "3 (randomized, double-blind, placebo-controlled)"
year: 2018
journal: "New England Journal of Medicine"

population: >
  Patients with unresectable stage III NSCLC (any PD-L1 status; any histology)
  who had not progressed after ≥2 cycles of platinum-based concurrent chemoradiation
  therapy (cCRT). N=709.

intervention: "Durvalumab 10 mg/kg IV Q2W (or 1500 mg flat dose Q4W) up to 12 months"
comparator: "Placebo Q2W up to 12 months"

primary_endpoints:
  - "Progression-free survival (PFS)"
  - "Overall survival (OS)"

key_results:
  pfs_hr: "0.52 (95% CI 0.42–0.65; p<0.001)"
  os_hr: "0.68 (95% CI 0.53–0.87; p=0.0025)"
  five_year_os: "43.0% (durvalumab) vs 33.4% (placebo)"
  median_pfs: "16.9 months vs 5.6 months"
  pdl1_note: "PD-L1 <1% may show attenuated benefit in exploratory subgroup; NCCN does not restrict eligibility by PD-L1"

regulatory_impact: >
  FDA approved: February 16, 2018 — durvalumab consolidation for unresectable stage III
  NSCLC following concurrent platinum-based CRT without disease progression.
  NOTE (2024 update): LAURA trial (Zhou 2024 NEJM) demonstrated osimertinib post-CRT
  superior efficacy for EGFR-mutated subgroup (mPFS 39.1 vs 5.6 mo; HR 0.16);
  NCCN NSCLC 2025 now recommends osimertinib for EGFR-mutated stage III post-CRT
  instead of durvalumab (ICI generally less effective in EGFR-driven tumors).
  PACIFIC remains standard for EGFR/ALK/ROS1 wild-type stage III unresectable NSCLC.

nccn_category_reference: "NCCN NSCLC 2025: Category 1 for EGFR/ALK WT unresectable stage III NSCLC post-CRT"

hosting_status: referenced
license: "NEJM (institutional access)"

last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  Workstream EX 2026-05-04. PACIFIC primary OS publication. FDA Feb 2018.
  5-year OS 43% vs 33% — durable benefit. Now restricted to EGFR-WT post-LAURA
  (EGFR-mutated patients should receive osimertinib post-CRT per LAURA).
  Two-reviewer clinical signoff required per CHARTER §6.1.
