notes: >
  PACIFIC phase-3 (NCT02125461): durvalumab 10 mg/kg q2w (up to 12 months)
  vs placebo consolidation in stage III unresectable NSCLC without progression
  after concurrent platinum-based chemoradiotherapy. OS update (Antonia 2018
  NEJM): mOS not reached vs 28.7 mo (HR 0.68, p=0.0025); 24-month OS 66.3%
  vs 55.6%. PFS update: mPFS 17.2 vs 5.6 mo (HR 0.51). 5-year OS update
  (Spigel 2022 Ann Oncol): 42.9% vs 33.4% (HR 0.72). Established durvalumab
  consolidation as global standard for stage III unresectable NSCLC. FDA
  approval February 2018 (PFS) confirmed for OS benefit.
