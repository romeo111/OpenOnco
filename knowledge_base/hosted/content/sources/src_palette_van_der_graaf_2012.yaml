notes: >
  PALETTE phase 3 (NCT00753688): pazopanib 800 mg PO daily vs placebo (2:1)
  in metastatic non-adipocytic soft-tissue sarcoma progressing after
  ≥1 prior anthracycline-containing regimen; n=369; ECOG 0-1. Primary
  endpoint PFS. mPFS 4.6 vs 1.6 mo (HR 0.31; 95% CI 0.24-0.40; p<0.0001).
  mOS 12.5 vs 10.7 mo (HR 0.86; 95% CI 0.67-1.11; p=0.25, not significant).
  ORR 6%. Liposarcoma was excluded — pazopanib is NOT for adipocytic STS;
  GIST and embryonal rhabdomyosarcoma also excluded. Pivotal trial
  supporting FDA approval (April 2012); NCCN category 1 for 2L+ non-
  adipocytic metastatic STS. Common AEs with pazopanib: fatigue, diarrhoea,
  nausea, weight loss, hypertension.
