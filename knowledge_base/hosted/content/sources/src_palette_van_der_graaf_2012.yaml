id: SRC-PALETTE-VAN-DER-GRAAF-2012
type: clinical_trial
hosting: referenced

citation:
  authors: "van der Graaf WT, Blay JY, Chawla SP, Kim DW, Bui-Nguyen B, Casali PG, et al."
  title: >
    Pazopanib for metastatic soft-tissue sarcoma (PALETTE): a randomised, double-blind,
    placebo-controlled phase 3 trial
  journal: "Lancet"
  year: 2012
  volume: 379
  issue: 9829
  pages: "1879-1886"
  doi: "10.1016/S0140-6736(12)60651-5"
  pmid: "22595799"

study_design:
  type: RCT
  phase: 3
  n: 369
  population: >
    Metastatic soft tissue sarcoma (non-adipocytic) after ≥1 prior line of standard
    chemotherapy (not liposarcoma — excluded from trial). ECOG 0-1.
  intervention: "Pazopanib 800 mg PO daily (continuous)"
  comparator: "Placebo"
  primary_endpoint: "Progression-free survival"

key_results:
  pfs_hr: 0.35
  pfs_pazopanib_months: 4.6
  pfs_placebo_months: 1.6
  p_value: "<0.0001"
  os_hr: 0.86
  os_pazopanib_months: 12.5
  os_placebo_months: 10.7
  os_p_value: "0.25 (not significant)"
  orr_pazopanib: "6%"
  disease_control_rate: "67%"

exclusions:
  - "Liposarcoma (adipocytic STS) — excluded from PALETTE; pazopanib NOT for liposarcoma"
  - "Gastrointestinal stromal tumor (GIST)"
  - "Embryonal rhabdomyosarcoma"
  - "Prior pazopanib or other VEGFR TKI"

clinical_significance: >
  PALETTE established pazopanib as 2L+ standard for non-adipocytic STS. PFS benefit
  (HR 0.35) is meaningful; OS benefit not demonstrated (HR 0.86, NS). Disease control
  rate 67% — many patients achieve stable disease. NCCN Category 1 for 2L+ non-adipocytic
  metastatic STS. NOT for liposarcoma (excluded) and NOT for GIST (imatinib/sunitinib
  are standard). FDA approved April 2012.

nccn_category: "1"
evidence_grade: high

license: open_access_oa
hosting_justification: null

last_reviewed: "2026-05-04"
drafted_by: claude_extraction
review_status: pending_clinical_signoff
