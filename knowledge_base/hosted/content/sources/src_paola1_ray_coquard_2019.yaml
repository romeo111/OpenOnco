key_findings: >
  PAOLA-1 Phase III: olaparib + bevacizumab vs placebo + bevacizumab maintenance after
  first-line platinum-taxane + bevacizumab in advanced ovarian cancer. Primary endpoint PFS:
  all-comers mPFS 22.1 vs 16.6 mo (HR 0.59); HRD+ (including BRCA) mPFS 37.2 vs 17.7 mo
  (HR 0.33). HRD-pos non-BRCA mPFS 28.1 vs 16.6 mo (HR 0.43). BRCA-mut mPFS NR vs 21.7 mo.
  FDA-approved 2022 for HRD+ first-line maintenance in combination with bevacizumab.

