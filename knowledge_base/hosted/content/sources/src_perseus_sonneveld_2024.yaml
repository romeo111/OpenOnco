notes: >
  PERSEUS phase-3 (NCT03710603): daratumumab SC + VRd (bortezomib + lenalidomide
  + dexamethasone) induction + ASCT + D-VRd consolidation + daratumumab +
  lenalidomide maintenance vs VRd + ASCT + VRd consolidation + lenalidomide
  maintenance in transplant-eligible newly diagnosed MM (n=709). Primary
  endpoint: PFS. 4-yr PFS 84.3% vs 67.7% (HR 0.42; p<0.001). MRD-negativity
  rate significantly higher in D-VRd arm. NEJM 2024;390(4):301-313.
