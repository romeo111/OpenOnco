nct_id: "NCT02055781"
key_findings: >
  Pacritinib (200 mg BID or 400 mg QD) vs best available therapy in myelofibrosis
  regardless of cytopenias (including thrombocytopenic patients with platelets <100).
  Spleen volume reduction ≥35% at week 24: 18% (200 BID) vs 3% (BAT). TSS reduction
  ≥50%: 25% vs 14%. Pacritinib specifically beneficial in thrombocytopenic MF
  (platelets <50) where ruxolitinib is contraindicated. FDA approved February 2022
  for intermediate/high-risk MF with platelet count ≥50.
disease_context: "Myelofibrosis (intermediate/high-risk, prior JAK inhibitor or thrombocytopenic)"
