key_findings: >
  Retifanlimab + carboplatin + paclitaxel vs placebo + carboplatin + paclitaxel in
  previously untreated metastatic/locally advanced squamous cell anal carcinoma.
  mPFS 9.3 vs 7.1 months (HR 0.50; p=0.0006). ORR 56% vs 36%. Basis for FDA
  accelerated approval of retifanlimab for 1L metastatic SCAC (August 2023).
  Confirmed in Phase 3 POD1UM-303 (Paz-Ares 2024 NEJM).
