title: "Retifanlimab plus Carboplatin and Paclitaxel versus Placebo plus Carboplatin and Paclitaxel in Metastatic or Locally Advanced Squamous Cell Carcinoma of the Anal Canal (POD1UM-202)"
short_name: "POD1UM-202"
