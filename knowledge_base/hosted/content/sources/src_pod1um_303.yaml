key_findings: >
  Retifanlimab + carboplatin + paclitaxel vs placebo + carboplatin + paclitaxel in
  untreated metastatic squamous cell carcinoma of the anal canal. mPFS 9.3 vs 7.1
  months (HR 0.57; p<0.001). mOS 29.2 vs 23.0 months (HR 0.70; p=0.006). ORR 58%
  vs 36%. Confirmatory Phase 3 trial for retifanlimab in SCAC; converted accelerated
  to full FDA approval. NCCN Cat 1 for 1L metastatic SCAC.
