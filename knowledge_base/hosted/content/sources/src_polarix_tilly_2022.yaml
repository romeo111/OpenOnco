notes: >
  POLARIX phase-3 (NCT03274492): polatuzumab vedotin + R-CHP (pola-R-CHP) vs
  R-CHOP x 6 cycles in previously untreated DLBCL (n=879). Primary endpoint:
  investigator-assessed PFS. 2-yr PFS 76.7% vs 70.2% (HR 0.73; p=0.02).
  Established pola-R-CHP as standard alternative to R-CHOP for 1L DLBCL.
  NEJM 2022;386(4):351-363.
