notes: >
  POSEIDON phase-3 (NCT03164616): durvalumab + tremelimumab + chemo
  (4 cycles, then durva+treme maintenance) vs durva+chemo vs chemo
  alone in 1L metastatic NSCLC (n=1013). Triple regimen mOS 14.0 vs
  11.7 mo (HR 0.77; p=0.003); mPFS 6.2 vs 4.8 mo. Notable benefit
  in STK11/KEAP1/KRAS subgroups. Established durva+treme+chemo as
  alternative 1L IO doublet+chemo for metastatic NSCLC. NOTE: task
  brief listed PMID 36480974 — that PMID is the ESMO update;
  primary publication PMID is 36223558 (verified).
