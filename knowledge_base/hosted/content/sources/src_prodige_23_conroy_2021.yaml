notes: >
  UNICANCER-PRODIGE 23 phase-3 (NCT01804790): 461 patients with cT3-T4 M0
  locally advanced rectal cancer randomised to total neoadjuvant therapy (TNT)
  long-course CRT — induction FOLFIRINOX x 6 cycles, then preoperative
  chemoradiotherapy (LCCRT 50.4 Gy / 28 fx with capecitabine), TME, and
  3 months adjuvant chemo (mFOLFOX6 or capecitabine) — vs standard
  preoperative chemoradiotherapy (50.4 Gy + capecitabine), TME, and 6 months
  adjuvant chemo. Primary endpoint 3-yr disease-free survival: 76% vs 69%
  (HR 0.69, 95% CI 0.49-0.97, p=0.034); 3-yr metastasis-free survival
  79% vs 72% (HR 0.64). pCR 28% vs 12% (p<0.0001). Established induction
  FOLFIRINOX before LCCRT as a TNT option for high-risk LARC. NOTE: this is
  the rectal-cancer trial PRODIGE-23, distinct from PRODIGE-24 (pancreatic
  adjuvant mFOLFIRINOX). Supports future Phase C rectal TNT indications
  using §17 phases + RadiationCourse modelling.
