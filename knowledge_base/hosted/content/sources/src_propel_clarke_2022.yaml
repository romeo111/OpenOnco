id: SRC-PROPEL-CLARKE-2022
source_type: clinical_trial_report
citation: >
  Clarke NW, Armstrong AJ, Thiery-Vuillemin A, et al. Abiraterone and Olaparib for
  Metastatic Castration-Resistant Prostate Cancer. NEJM Evidence. 2022;1(9):EVIDoa2200043.
doi: "10.1056/EVIDoa2200043"
trial_name: "PROpel"
trial_registry_id: NCT03732820
phase: "3 (randomized, double-blind)"
year: 2022
journal: "NEJM Evidence"

population: >
  Patients with mCRPC who had not received prior ARPI or PARPi.
  Unselected for HRR mutation status. N=796.

intervention: "Olaparib 300 mg PO BID + abiraterone 1000 mg PO QD + prednisone 5 mg BID"
comparator: "Abiraterone 1000 mg PO QD + prednisone 5 mg BID + placebo"

primary_endpoints:
  - "Radiographic progression-free survival (rPFS) by investigator assessment"

key_results:
  rpfs_hr_all_comers: "0.66 (95% CI 0.54–0.81; p<0.001)"
  rpfs_hr_brca1_2: "0.23 (exploratory subgroup)"
  os_hr_all_comers: "0.81 (secondary; updated analysis Saad 2023 JCO)"
  os_hr_brca1_2: "0.29 (exploratory subgroup; Saad 2023 JCO)"
  orr: "Not primary endpoint; ~62% rPFS event-free at 24 months in combination arm"

regulatory_impact: >
  FDA approved: August 5, 2022 — olaparib + abiraterone + prednisone for adult
  patients with mCRPC. All-comer approval (not restricted to BRCA1/2 mutant);
  BRCA1/2 subgroup showed most pronounced benefit.
  EMA approved 2023 for mCRPC (all-comers).

nccn_category_reference: "NCCN Prostate 2025: Category 1 for mCRPC 1L; BRCA1/2 subgroup most evidence"

hosting_status: referenced
license: "NEJM Evidence (institutional access)"

last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  Workstream EV 2026-05-04. PROpel trial: olaparib+abiraterone for mCRPC 1L.
  First FDA-approved PARPi+ARPI combination (Aug 2022); all-comer approval.
  BRCA1/2 subgroup: rPFS HR 0.23 and OS HR 0.29 (most pronounced benefit).
  Second combination: talazoparib+enzalutamide (TALAPRO-2; Jun 2023) and
  third: niraparib+abiraterone (MAGNITUDE; Aug 2023 BRCA-only).
  Two-reviewer clinical signoff required per CHARTER §6.1.
