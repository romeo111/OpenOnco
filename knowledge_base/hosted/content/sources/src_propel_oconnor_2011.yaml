key_findings: >
  Pralatrexate monotherapy in relapsed/refractory PTCL (all histologies).
  ORR 29%; CR 11%; median DOR 10.1 months. AITL subgroup ORR 8/27 (30%).
  Mucositis (32% Grade 3–4) is the dose-limiting toxicity; leucovorin + B12
  supplementation mandatory to reduce mucositis. FDA approved September 2009
  for R/R PTCL (first FDA-approved drug specifically for PTCL).
