notes: >
  RAINBOW phase 3 (NCT01170663): ramucirumab 8 mg/kg q2w + paclitaxel
  80 mg/m2 d1,8,15 q4w vs placebo + paclitaxel as 2L for advanced gastric/GEJ
  adenocarcinoma after platinum/fluoropyrimidine progression (n=665). Median
  OS 9.6 vs 7.4 mo (HR 0.807; 95% CI 0.678-0.962; p=0.017). Median PFS 4.4
  vs 2.9 mo (HR 0.635; p<0.0001). ORR 28% vs 16%. Neutropenia G3+ 41% vs 19%;
  hypertension G3+ 14% vs 2%. Established ramucirumab + paclitaxel as 2L
  standard for advanced gastric/GEJ post-platinum. NCCN/ESMO category 1.
