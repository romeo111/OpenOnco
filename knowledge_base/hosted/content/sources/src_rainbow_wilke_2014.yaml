key_findings: >
  Ramucirumab + weekly paclitaxel vs placebo + paclitaxel in advanced gastric/GEJ
  adenocarcinoma 2L. mOS 9.6 vs 7.4 months (HR 0.807; p=0.0169). mPFS 4.4 vs
  2.9 months (HR 0.635; p<0.0001). ORR 28% vs 16%. FDA approved November 2014 for
  gastric/GEJ 2L in combination with paclitaxel. NCCN Cat 1 for gastric 2L.
