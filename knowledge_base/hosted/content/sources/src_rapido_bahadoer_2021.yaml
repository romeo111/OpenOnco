notes: >
  RAPIDO phase-3 (NCT01558921): 920 patients with locally advanced (high-risk)
  rectal cancer randomised to total neoadjuvant therapy (TNT) short-course
  radiotherapy 5 x 5 Gy followed by 6 cycles CAPOX or 9 cycles FOLFOX, then
  TME, vs standard long-course chemoradiotherapy (50.4 Gy / 28 fx with
  capecitabine), TME, and optional adjuvant chemo. Primary endpoint
  3-yr disease-related treatment failure (DrTF): 23.7% experimental vs 30.4%
  standard (HR 0.75, 95% CI 0.60-0.95, p=0.019). Distant metastases reduced
  (20.0% vs 26.8%, HR 0.69, p=0.005); pCR doubled (28% vs 14%, p<0.0001).
  Practice-changing: established short-course TNT (SCRT 25 Gy / 5 fx +
  consolidation chemo) as a guideline-supported option for high-risk LARC,
  alongside long-course CRT-based TNT (PRODIGE-23). Supports future Phase C
  rectal TNT indications using §17 phases + RadiationCourse modelling.
