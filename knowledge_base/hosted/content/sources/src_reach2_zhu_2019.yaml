id: SRC-REACH2-ZHU-2019
title: "Ramucirumab after sorafenib in patients with advanced hepatocellular carcinoma and increased α-fetoprotein concentrations (REACH-2): a randomised, double-blind, placebo-controlled, phase 3 trial"
type: trial_publication
hosting_mode: referenced

citation:
  authors: "Zhu AX, Kang YK, Yen CJ, et al. (REACH-2 study investigators)"
  title: "Ramucirumab after sorafenib in patients with advanced hepatocellular carcinoma and increased α-fetoprotein concentrations (REACH-2): a randomised, double-blind, placebo-controlled, phase 3 trial"
  journal: "Lancet Oncology"
  year: 2019
  volume: "20"
  issue: "2"
  pages: "282-296"
  doi: "10.1016/S1470-2045(18)30937-9"
  pmid: "30922890"

study_type: phase_3_rct
trial_name: "REACH-2"
disease_context: "Advanced HCC, Child-Pugh A, AFP ≥400 ng/mL, progression on or intolerance to sorafenib"
intervention: "Ramucirumab 8 mg/kg IV q2w"
control: "Placebo"
primary_endpoint: "Overall survival"
key_results:
- "mOS ramucirumab 8.5 mo vs placebo 7.3 mo (HR 0.71, 95% CI 0.53–0.95, p=0.0199)"
- "mPFS 2.8 mo vs 1.6 mo (HR 0.45)"
- "ORR: 5% vs 1%; DCR 59% vs 38%"
- "Grade 3-4 AEs: hypertension 13%, hyponatremia 5%, fatigue 4%"
- "FDA approved May 2019 for HCC after sorafenib with AFP ≥400 ng/mL"
- "First biomarker-selected 2L HCC approval (AFP≥400 defines a high-risk, anti-VEGFR-sensitive subgroup)"

fda_approval_basis: true
approval_year: 2019
approval_indication: "HCC after sorafenib with AFP ≥400 ng/mL"
biomarker_required: "AFP ≥ 400 ng/mL"

license_classification: open_access_article
source_quality: high
last_verified: "2026-05-04"
notes: >
  REACH-2 is the only biomarker-selected phase 3 trial in HCC 2L. The unselected
  REACH trial (REACH-1; Zhu 2015) did NOT show OS benefit in the overall population
  (HR 0.87, p=0.14) — benefit restricted to AFP≥400 subgroup, leading to the
  biomarker-prospective REACH-2. Ramucirumab (anti-VEGFR2 monoclonal antibody)
  is well-tolerated (primarily hypertension); minimal drug interactions.
source_type: trial_publication
