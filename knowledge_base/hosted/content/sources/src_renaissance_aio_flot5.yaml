notes: >
  RENAISSANCE / AIO-FLOT5 phase 3 (NCT02578368): trial-design / protocol
  publication for randomised comparison of FLOT chemotherapy alone vs FLOT
  followed by surgical resection (gastrectomy/oesophagectomy + metastasectomy)
  in patients with limited-metastatic gastric or oesophagogastric-junction
  adenocarcinoma (≤1 incurable organ-system involvement, no ascites, ≤1
  retroperitoneal LN station). Primary endpoint OS. Cited as the canonical
  reference for the RENAISSANCE design until full primary-results publication;
  ASCO 2024 interim analyses presented but full Lancet/JCO paper pending as
  of 2026-05-04. NCCN cites RENAISSANCE design as the basis for considering
  surgery in highly selected oligometastatic responders to systemic therapy.
