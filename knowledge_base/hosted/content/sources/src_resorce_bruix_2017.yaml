id: SRC-RESORCE-BRUIX-2017
type: trial_publication
hosting_mode: referenced

citation:
  authors: "Bruix J, Qin S, Merle P, et al. (RESORCE investigators)"
  title: "Regorafenib for patients with hepatocellular carcinoma who progressed on sorafenib treatment (RESORCE): a randomised, double-blind, placebo-controlled, phase 3 trial"
  journal: "Lancet"
  year: 2017
  volume: "389"
  issue: "10064"
  pages: "56-66"
  doi: "10.1016/S0140-6736(16)32453-9"
  pmid: "27932016"

study_type: phase_3_rct
trial_name: "RESORCE"
disease_context: "Advanced HCC, Child-Pugh A, progression on sorafenib 400 mg BID ≥21 days"
intervention: "Regorafenib 160 mg PO daily, days 1-21 q28 days"
control: "Placebo"
primary_endpoint: "Overall survival"
key_results:
  - "mOS regorafenib 10.6 mo vs placebo 7.8 mo (HR 0.63, 95% CI 0.50–0.79, p<0.0001)"
  - "mPFS 3.1 mo vs 1.5 mo (HR 0.46)"
  - "ORR: 11% vs 4% (RECIST 1.1); DCR 65% vs 36%"
  - "Grade 3-4 AEs: hypertension 15%, hand-foot skin reaction 13%, fatigue 9%; dose reductions in 54%"
  - "FDA approved April 2017 for HCC after sorafenib"
  - "Key eligibility: sorafenib-tolerant (not stopped due to toxicity); sorafenib ≥21 days at ≥400mg/d"

fda_approval_basis: true
approval_year: 2017
approval_indication: "HCC previously treated with sorafenib"

license_classification: open_access_article
source_quality: high
last_verified: "2026-05-04"
notes: >
  RESORCE was the first positive phase 3 trial in sorafenib-refractory HCC.
  Important eligibility criterion: patients must have TOLERATED sorafenib
  (not discontinued due to toxicity within 21 days) — patients who had good
  sorafenib tolerance are more likely to tolerate regorafenib. Sequential
  sorafenib→regorafenib OS benefit (combining both trial data): ~26 months
  from 1L initiation.
