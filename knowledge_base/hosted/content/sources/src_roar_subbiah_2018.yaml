id: SRC-ROAR-SUBBIAH-2018
type: trial_publication
hosting_mode: referenced

citation:
  authors: "Subbiah V, Kreitman RJ, Wainberg ZA, et al."
  title: "Dabrafenib and Trametinib Treatment in Patients with Locally Advanced or Metastatic BRAF V600–Mutant Anaplastic Thyroid Cancer"
  journal: "Journal of Clinical Oncology"
  year: 2018
  volume: "36"
  issue: "1"
  pages: "7-13"
  doi: "10.1200/JCO.2017.73.6785"
  pmid: "29360941"

study_type: phase_2_basket_trial
trial_name: "ROAR (Rare Oncology Agnostic Research)"
disease_context: "BRAF V600E-mutant anaplastic thyroid carcinoma (ATC), unresectable/metastatic"
intervention: "Dabrafenib 150 mg PO BID + trametinib 2 mg PO QD"
control: none
primary_endpoint: "Overall response rate (ORR) by investigator assessment (RECIST 1.1)"
key_results:
  - "ATC cohort n=29 (updated 2022 cohort n=36); ORR 69% (20/29) in initial report; updated ORR 56% (n=36, JCO 2022)"
  - "Disease control rate 90%; some CRs enabling subsequent surgical resection"
  - "mOS ~14.5 mo (vs historical mOS ~5 mo for unresectable ATC)"
  - "Median DOR 9.0 mo; responses durable in CR subset"
  - "Grade 3-4 adverse events: pyrexia 14%, hypertension 7%, QT prolongation (rare)"
  - "Basis for FDA accelerated approval of dabrafenib+trametinib for BRAF V600E ATC (May 2018)"

fda_approval_basis: true
approval_year: 2018
approval_indication: "Locally advanced or metastatic BRAF V600E-mutant anaplastic thyroid cancer in adults (FDA 2018; full approval 2022 pan-cancer BRAF V600E)"
update_reference: "Subbiah et al. JCO 2022 updated ROAR cohort analysis (PMID 34731050)"

license_classification: open_access_article
source_quality: high
last_verified: "2026-05-04"
notes: >
  ROAR basket trial is the evidence base for dabrafenib+trametinib in BRAF V600E
  ATC. ATC is historically a clinical emergency (mOS ~5 mo without effective therapy);
  ROAR demonstrated dramatic ORR 69% with ~14.5 mo mOS. NCCN ATC guidelines recommend
  BRAF V600E testing on the same day as biopsy diagnosis ("RAID" workflow) given urgency.
  Neoadjuvant use (to enable surgical resection) is reported in case series.
  Tumor-agnostic FDA approval (2022) also covers ATC.
