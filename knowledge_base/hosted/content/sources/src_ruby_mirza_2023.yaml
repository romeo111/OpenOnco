id: SRC-RUBY-MIRZA-2023
type: trial_publication
hosting_mode: referenced

citation:
  authors: "Mirza MR, Chase DM, Slomovitz BM, et al. (RUBY investigators)"
  title: "Dostarlimab for Primary Advanced or Recurrent Endometrial Cancer"
  journal: "New England Journal of Medicine"
  year: 2023
  volume: "388"
  issue: "23"
  pages: "2145-2158"
  doi: "10.1056/NEJMoa2216334"
  pmid: "36854745"

study_type: phase_3_rct
trial_name: "RUBY (ENGOT-EN6/GOG3031)"
disease_context: "Primary advanced (FIGO III-IV) or recurrent endometrial cancer, 1L systemic"
intervention: "Dostarlimab 500 mg IV q3w × 6 cycles + carboplatin AUC5 + paclitaxel 175 mg/m² q3w, then dostarlimab 1000 mg IV q6w maintenance for up to 3 years"
control: "Carboplatin AUC5 + paclitaxel 175 mg/m² q3w + placebo"
primary_endpoint: "Progression-free survival (PFS) in dMMR and all-comers"
key_results:
  - "dMMR/MSI-H cohort (n=118/494): mPFS NR vs 7.7 mo (HR 0.28, 95% CI 0.16–0.50, p<0.001)"
  - "All-comers: mPFS 11.8 vs 7.9 mo (HR 0.64, 95% CI 0.51–0.80, p<0.001)"
  - "dMMR OS: HR 0.55 (95% CI 0.32–0.95, p=0.03) at interim analysis"
  - "pMMR PFS HR 0.76 (95% CI 0.59–0.98); smaller benefit in pMMR"
  - "Grade 3-4 AEs: 71% dostarlimab arm vs 68% placebo; immune-mediated: thyroid 5%, pneumonitis 1%"
  - "FDA approved August 2023 for dMMR/MSI-H advanced or recurrent endometrial 1L"

fda_approval_basis: true
approval_year: 2023
approval_indication: "dMMR/MSI-H advanced or recurrent endometrial cancer in combination with carboplatin and paclitaxel, followed by single-agent dostarlimab maintenance"

license_classification: open_access_article
source_quality: high
last_verified: "2026-05-04"
notes: >
  RUBY/ENGOT-EN6 established dostarlimab+chemo as the preferred 1L for dMMR/MSI-H
  advanced or recurrent endometrial cancer (PFS HR 0.28, OS HR 0.55). The pMMR
  subgroup also benefited (HR 0.76) but less dramatically — pembro+chemo (GY018)
  is also approved for all-comers. Lynch syndrome screening recommended for all
  dMMR endometrial cancers.
