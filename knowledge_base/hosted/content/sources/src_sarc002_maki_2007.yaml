id: SRC-SARC002-MAKI-2007
type: clinical_trial
hosting: referenced

citation:
  authors: "Maki RG, Wathen JK, Patel SR, Priebat DA, Okuno SH, Samuels B, et al."
  title: >
    Randomized phase II study of gemcitabine and docetaxel compared with gemcitabine alone
    in patients with metastatic soft tissue sarcomas: results of Sarcoma Alliance for
    Research through Collaboration study 002 [corrected]
  journal: "Journal of Clinical Oncology"
  year: 2007
  volume: 25
  issue: 19
  pages: "2755-2763"
  doi: "10.1200/JCO.2006.10.4117"
  pmid: "17602081"

study_design:
  type: RCT
  phase: 2
  n: 122
  population: "Metastatic or unresectable STS (multiple histologies) — primarily leiomyosarcoma (LMS), undifferentiated pleomorphic sarcoma (UPS)"
  intervention: "Gemcitabine 900 mg/m² d1, d8 + docetaxel 100 mg/m² d8 q21d + G-CSF"
  comparator: "Gemcitabine alone 1200 mg/m² d1, d8, d15 q28d"
  primary_endpoint: "Progression-free survival at 3 months"

key_results:
  pfs3mo_gemdoc: "49.9%"
  pfs3mo_gem_mono: "33.9%"
  mPFS_gemdoc_months: 6.2
  mPFS_gem_mono_months: 3.0
  orr_gemdoc: "16%"
  orr_gem_mono: "8%"
  os_hr: 0.73
  os_gemdoc_months: 17.9
  os_gem_mono_months: 11.5
  lms_subgroup_benefit: "Most pronounced benefit in leiomyosarcoma subgroup"

clinical_significance: >
  SARC002 established gemcitabine + docetaxel (GemDoc) as superior to gemcitabine alone
  for metastatic STS, particularly leiomyosarcoma. PFS and OS benefit with GemDoc.
  LMS is the subtype with greatest benefit from GemDoc — considered preferred 2L regimen
  for uterine/retroperitoneal LMS. UPS (undifferentiated pleomorphic sarcoma) also responds.
  Gemcitabine rate control (10 mg/m²/min over 90 min) is important for gem efficacy.
  NCCN Category 1 for 2L STS.

nccn_category: "1"
evidence_grade: moderate

license: open_access_oa
hosting_justification: null

