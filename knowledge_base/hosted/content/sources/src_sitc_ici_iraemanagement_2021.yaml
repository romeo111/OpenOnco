notes: >
  SITC 2021 consensus guidelines on irAE management. Section 2.1 covers
  pre-existing autoimmune/inflammatory diseases: stratifies risk by condition
  type (low-risk thyroiditis/psoriasis vs. moderate-risk RA/IBD vs.
  high-risk myositis/autoimmune hepatitis/sarcoidosis with organ
  involvement). Recommends rheumatology/pulmonology pre-ICI consult for
  active moderate-to-high-risk conditions; close monitoring; consider
  lower-toxicity ICI backbone (pembro mono over ipi+nivo).
