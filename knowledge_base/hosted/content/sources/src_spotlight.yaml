id: SRC-SPOTLIGHT
type: clinical_trial
title: "Zolbetuximab plus mFOLFOX6 in patients with CLDN18.2+ and HER2-negative, untreated, locally advanced unresectable or metastatic gastric or gastro-oesophageal junction adenocarcinoma (SPOTLIGHT)"
short_name: "SPOTLIGHT"
authors: "Shitara K, Lordick F, Bang YJ, et al."
journal: "Lancet"
year: 2023
volume: 401
pages: "1655-1668"
doi: "10.1016/S0140-6736(23)00620-7"
