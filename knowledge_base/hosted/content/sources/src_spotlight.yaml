trial_name: "SPOTLIGHT"
trial_phase: "Phase 3"
nct_id: "NCT03504397"
key_findings: >
  Zolbetuximab + mFOLFOX6 vs placebo + mFOLFOX6 in CLDN18.2-positive (IHC ≥75%
  of cells 2+/3+), HER2-negative gastric/GEJ adenocarcinoma 1L. mPFS 10.6 vs
  8.7 months (HR 0.75; p=0.0066). mOS 18.2 vs 15.5 months (HR 0.75; p=0.0053).
  Nausea/vomiting higher with zolbetuximab (especially first cycle).
  Together with GLOW trial, formed basis for FDA approval October 2024.
