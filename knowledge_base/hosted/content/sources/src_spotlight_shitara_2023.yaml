notes: >
  SPOTLIGHT phase 3 (NCT03504397): zolbetuximab 800/600 mg/m2 q3w + mFOLFOX6
  vs placebo + mFOLFOX6 as 1L in CLDN18.2-positive (≥75% of tumour cells with
  IHC 2+/3+ staining), HER2-negative, advanced gastric/GEJ adenocarcinoma
  (n=565). Median PFS 10.61 vs 8.67 mo (HR 0.751; 95% CI 0.598-0.942;
  p=0.0066). Median OS 18.23 vs 15.54 mo (HR 0.750; p=0.0053). Nausea/vomiting
  more frequent with zolbetuximab (G3+ nausea 16% vs 6%). Established CLDN18.2
  as new actionable target; FDA approval 2024-10-18 for CLDN18.2+ HER2-
  advanced gastric. NCCN category 1.
