key_findings: >
  Selinexor + dexamethasone in penta-refractory multiple myeloma (resistant to
  bortezomib, carfilzomib, lenalidomide, pomalidomide, and anti-CD38). ORR 26.2%;
  mDOR 4.4 months. mOS 8.6 months. Dose-limiting AEs: thrombocytopenia (65%
  Grade 3+), nausea, fatigue, weight loss. FDA approved July 2019 as fifth-line
  option for penta-refractory MM (first XPO1 inhibitor approval).
disease_context: "Multiple myeloma (penta-refractory, ≥5 prior lines)"
