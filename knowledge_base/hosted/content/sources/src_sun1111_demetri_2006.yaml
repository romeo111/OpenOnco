key_findings: >
  Sunitinib vs placebo in imatinib-refractory/intolerant GIST. mTTP 27.3 vs
  6.4 weeks (HR 0.33; p<0.0001). mOS not reached vs 36.6 weeks (HR 0.49; p=0.007).
  ORR 7% vs 0%; clinical benefit rate 58% vs 13%. FDA approved January 2006 for GIST
  after imatinib failure. NCCN Cat 1 for GIST 2L.
