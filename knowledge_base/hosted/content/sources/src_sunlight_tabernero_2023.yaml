key_findings: >
  SUNLIGHT Phase III: trifluridine-tipiracil + bevacizumab vs trifluridine-tipiracil
  alone in chemo-refractory mCRC. Primary endpoint OS: mOS 10.8 vs 7.5 mo (HR 0.61,
  p<0.001); 1-yr OS 43% vs 30%. mPFS 5.6 vs 2.4 mo (HR 0.44). ORR 6.3% vs 1.0%.
  Combination now NCCN Cat 1 preferred 3L+ for refractory mCRC.

