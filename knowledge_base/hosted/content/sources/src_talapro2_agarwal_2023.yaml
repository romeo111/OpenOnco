id: SRC-TALAPRO2-AGARWAL-2023
type: clinical_trial_publication
hosting_status: referenced

title: >
  Talazoparib plus Enzalutamide in Men with First-line Metastatic Castration-Resistant
  Prostate Cancer (TALAPRO-2): A Randomised, Placebo-Controlled, Phase 3 Trial
authors:
  - "Agarwal N"
  - "Azad A"
  - "Carles J"
  - "et al."
journal: Lancet Oncology
year: 2023
volume: "24"
issue: "6"
pages: "600-612"
doi: "10.1016/S1470-2045(23)00155-0"
pmid: "37142371"
trial_name: TALAPRO-2
nct_id: NCT03395197
phase: 3
design: Randomised, double-blind, placebo-controlled

key_findings:
  - "HRR-mutant cohort (primary endpoint): rPFS HR 0.46 (95% CI 0.30-0.70; p<0.001)"
  - "All-comers (including HRR-unselected): rPFS HR 0.63 (95% CI 0.51-0.78)"
  - "BRCA1/2 subgroup (pre-specified): rPFS HR 0.20 (95% CI 0.11-0.36) — substantial benefit"
  - "ORR (measurable disease): ~62% talazoparib+enzalutamide vs ~43% placebo+enzalutamide in HRR-mutant"
  - "OS: not mature at primary analysis; subsequent analyses show OS benefit trend"
  - "Anemia Grade 3-4: ~46% in talazoparib arm (dose reductions common but manageable)"

population:
  disease: mCRPC (castration-resistant prostate cancer, metastatic)
  prior_treatment: "Asymptomatic/minimally symptomatic mCRPC; ARPI-naive at enrolment (enzalutamide naïve)"
  biomarker: "HRR-mutant (BRCA1/2, ATM, CDK12, PALB2, RAD51D, and others)"
  n_enrolled: ~805

intervention: "Talazoparib 0.5 mg QD + enzalutamide 160 mg QD"
comparator: "Placebo + enzalutamide 160 mg QD"

regulatory:
  fda_approval: "June 2023 — talazoparib (Talzenna) + enzalutamide (Xtandi) for BRCA1/2-mutant mCRPC"
  ema_status: "Under review / approved (check current status)"
  nccn_category: "1 (for BRCA1/2-mutant mCRPC; other HRR genes: weaker signal)"

license_class: referenced
hosting_justification: none

last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  Pivotal trial for talazoparib+enzalutamide combination in mCRPC.
  FDA approval Jun 2023 for BRCA1/2-mutant mCRPC (Talzenna+Xtandi label).
  NCCN PROSTATE 2025: Cat 1 for BRCA1/2-mutant mCRPC.
  Key differentiators from PROfound (olaparib mono): combination includes
  enzalutamide (ARPI component), used in first-line mCRPC (enzalutamide-naive),
  BRCA1/2 HR 0.20 dramatically better than PROfound cohort A HR 0.49 (cross-trial).
  Non-BRCA HRR benefit also present (HR 0.46 for full HRR-mutant cohort) —
  broader HRR coverage vs MAGNITUDE which is BRCA1/2-only.
  Exact citation details require clinical reviewer verification.
