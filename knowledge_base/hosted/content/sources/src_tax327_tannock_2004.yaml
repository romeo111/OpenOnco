id: SRC-TAX327-TANNOCK-2004
source_type: clinical_trial
title: "Docetaxel plus Prednisone or Mitoxantrone plus Prednisone for Advanced Prostate Cancer"
pmid: "15470213"
doi: "10.1056/NEJMoa040720"
journal: "New England Journal of Medicine"
year: 2004
authors:
  - "Tannock IF"
  - "de Wit R"
  - "Berry WR"
  - "Horti J"
  - "Pluzanska A"
  - "Chi KN"
  - "Oudard S"
  - "Théodore C"
  - "James ND"
  - "Turesson I"
  - "Rosenthal MA"
  - "Eisenberger MA"
trial_acronym: "TAX 327"
phase: 3
population: >
  Metastatic castration-resistant prostate cancer (mCRPC; then termed hormone-refractory
  prostate cancer). Prior chemotherapy not required. Karnofsky PS ≥60.
n_enrolled: 1006
n_randomized: 1006
arms:
  docetaxel_q3w: "Docetaxel 75 mg/m² IV q21d + prednisone 5 mg BID (n=335)"
  docetaxel_weekly: "Docetaxel 30 mg/m² IV weekly × 5/6w + prednisone 5 mg BID (n=334)"
  comparator: "Mitoxantrone 12 mg/m² IV q21d + prednisone 5 mg BID (n=337)"
primary_endpoint: "Overall survival"
primary_result:
  docetaxel_q3w_vs_mitoxantrone:
    os_hr: 0.76
    os_hr_ci: "0.62-0.94"
    p_value: "0.009"
    median_os_experimental_months: 18.9
    median_os_comparator_months: 16.5
  docetaxel_weekly_vs_mitoxantrone:
    os_hr: 0.87
    os_hr_ci: "0.71-1.06"
    p_value: "0.36"
    median_os_months: 17.4
secondary_results:
  psa_decline_50pct: "45% (q3w docetaxel) vs 32% (mitoxantrone); p<0.001"
  pain_palliation: "35% vs 22%; p=0.01"
  quality_of_life_improved: "22% vs 13%; p=0.009"
access_level: public
hosting_mode: referenced
license:
  name: "NEJM standard"
  spdx_id: null
relates_to_diseases:
  - DIS-PROSTATE
last_verified: "2026-05-04"
notes: >
  TAX 327: foundational Phase 3 trial establishing docetaxel q3w + prednisone as
  standard-of-care for mCRPC. Primary endpoint OS met for docetaxel q3w (HR 0.76,
  p=0.009); OS 18.9 vs 16.5 months vs mitoxantrone. Weekly docetaxel arm did not
  significantly improve OS (HR 0.87, NS). Q3w regimen became the standard.
  PSA decline ≥50%: 45% q3w docetaxel vs 32% mitoxantrone (p<0.001).
  Pain palliation and QoL also superior with docetaxel q3w.
  NCCN Category 1 for mCRPC. Note: in 2026 context, many patients receive docetaxel
  in mHSPC (CHAARTED, STAMPEDE); TAX 327 remains pivotal for mCRPC-specific docetaxel
  use in patients who deferred chemotherapy or are taxane-naive at mCRPC.
  Companion reference: Petrylak DP et al. 2004 NEJM (SWOG 99-16): docetaxel+estramustine
  vs mitoxantrone; OS HR 0.80 — parallel supporting trial.
corpus_role: pivotal_rct
