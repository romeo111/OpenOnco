notes: >
  TCGA gastric cancer landmark molecular classification paper (n=295 primary
  gastric adenocarcinomas; 227 profiled across all six molecular platforms).
  Defines four molecular subtypes: (1) Epstein-Barr virus-positive (~9%) with
  PIK3CA mutations and extreme DNA hypermethylation, JAK2/PD-L1/PD-L2
  amplification at 9p24.1; (2) microsatellite-unstable tumors (MSI) with
  elevated mutation rates; (3) genomically stable tumors enriched for diffuse
  histology with RHOA mutations; (4) chromosomal-instability (CIN) tumors with
  aneuploidy and RTK amplification. Establishes EBV+ gastric as a discrete
  molecular subtype and the canonical primary citation for EBV-subtype biology
  (cited by NCCN gastric v2025, ESMO gastric 2024, KEYNOTE-061 EBV+ subgroup
  analyses, and downstream BMA evidence summaries). Genomic atlas / cohort
  study; not an interventional trial.
