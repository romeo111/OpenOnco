key_findings: >
  Erdafitinib (FGFR2/3 inhibitor) vs chemotherapy (docetaxel or vinflunine) in
  previously treated (≥1 prior line including platinum) metastatic urothelial
  carcinoma with FGFR2/3 alterations. mOS 12.1 vs 7.8 months (HR 0.64; p<0.001).
  mPFS 5.6 vs 2.7 months. ORR 46% vs 12%. Confirmed superiority of erdafitinib
  over chemotherapy in FGFR-altered urothelial cancer; converted accelerated to
  full FDA approval April 2024.
disease_context: "Urothelial carcinoma (metastatic, FGFR2/3-altered, previously treated)"
