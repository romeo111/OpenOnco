id: SRC-TIVO3-ATKINS-2021
type: clinical_trial
title: "Tivozanib versus Sorafenib in Patients with Advanced Renal Cell Carcinoma (TIVO-3)"
short_name: "TIVO-3"
authors: "Atkins MB, Tannir NM, McDermott DF, et al."
journal: "Lancet Oncology"
year: 2020
volume: 21
pages: "95-104"
doi: "10.1016/S1470-2045(19)30734-1"
pmid: "31810797"
trial_name: "TIVO-3"
trial_phase: "Phase 3"
nct_id: "NCT02627963"
key_findings: >
  Tivozanib vs sorafenib in metastatic RCC ≥2 prior lines (including VEGFR inhibitor
  and immunotherapy). mPFS 5.6 vs 3.9 months (HR 0.73; p=0.016). mOS 16.4 vs 19.2
  months (not significant; HR 0.97). Tivozanib preferred for third-line after VEGFR
  and IO failure based on PFS benefit and better tolerability vs sorafenib.
  FDA approved March 2021 for R/R RCC ≥2 prior systemic therapies.
disease_context: "Renal cell carcinoma (clear cell, metastatic, ≥2 prior lines)"
