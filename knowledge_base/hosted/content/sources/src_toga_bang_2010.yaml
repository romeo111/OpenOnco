notes: >
  ToGA phase 3 (NCT01041404): trastuzumab 8 mg/kg loading then 6 mg/kg q3w +
  capecitabine/5-FU + cisplatin vs chemotherapy alone in HER2-positive (IHC3+
  or FISH+) advanced gastric or gastro-oesophageal junction adenocarcinoma
  (n=594). Median OS 13.8 vs 11.1 mo (HR 0.74; 95% CI 0.60-0.91; p=0.0046).
  Greatest benefit in IHC2+/FISH+ or IHC3+ subgroup: mOS 16.0 vs 11.8 mo.
  Established trastuzumab + chemo as 1L standard for HER2-positive advanced
  gastric/GEJ adenocarcinoma. NCCN/ESMO category 1.
