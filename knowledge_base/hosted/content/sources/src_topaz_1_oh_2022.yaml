notes: >
  TOPAZ-1 phase 3 RCT (NCT03875235): durvalumab 1500 mg q3w + gemcitabine
  1000 mg/m^2 + cisplatin 25 mg/m^2 (days 1, 8 q3w x up to 8 cycles) followed
  by durvalumab maintenance, vs placebo + gem-cis, as 1L therapy for advanced
  biliary tract cancer (intrahepatic / extrahepatic cholangiocarcinoma and
  gallbladder cancer); n=685. Primary endpoint OS. mOS 12.8 vs 11.5 mo (HR
  0.80; 95% CI 0.66-0.97; p=0.021); mPFS 7.2 vs 5.7 mo (HR 0.75); ORR 26.7%
  vs 18.7%. Benefit consistent across PD-L1 subgroups and BTC anatomic
  subsites. FDA approved September 2022 for 1L advanced BTC in combination
  with gem-cis. Established durva+gem-cis as new global standard of care
  for 1L advanced BTC; NCCN category 1 preferred regimen. Note: brief named
  publication as "NEJM Evidence" — verified as NEJM Evid 2022;1(8):EVIDoa2200015,
  PMID 38319896. NCT03875235.
