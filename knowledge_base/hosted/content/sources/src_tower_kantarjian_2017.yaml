key_findings: >
  Blinatumomab (BiTE CD19×CD3) vs standard-of-care chemotherapy in adult R/R
  B-cell ALL (Ph-negative). mOS 7.7 vs 4.0 months (HR 0.71; p=0.01). CR/CRh 39%
  vs 18%. MRD-negativity among responders 76% vs 48%. Established blinatumomab
  superiority over salvage chemotherapy in adult R/R B-ALL. FDA approved November
  2014 (accelerated); full approval July 2017.
disease_context: "B-cell ALL (relapsed/refractory, Ph-negative, adult)"
