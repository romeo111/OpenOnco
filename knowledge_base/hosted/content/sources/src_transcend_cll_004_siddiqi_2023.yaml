key_findings: >
  Liso-cel in R/R CLL/SLL after ≥3 prior lines including BTKi and BCL-2 inhibitor.
  ORR 43%; CR/CRi 20%; undetectable MRD (uMRD4) 63% in responders.
  Durable responses: 12-month DOR 78% in CRs. CRS Grade 3+ 9%; ICANS Grade 3+ 18%.
  FDA approved March 2024 for R/R CLL/SLL ≥2 prior lines including BTKi + BCL-2i.
