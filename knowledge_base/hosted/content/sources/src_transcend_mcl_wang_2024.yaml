key_findings: >
  Liso-cel (lisocabtagene maraleucel; CD19 CAR-T) in R/R MCL after ≥2 prior lines
  including BTK inhibitor. ORR 83.3%; CR 72.2%. Median DOR 15.7 months.
  CRS any grade 61% (Grade 3+ 1%); ICANS 30% (Grade 3+ 17%). BTK-inhibitor
  refractory subgroup maintained high ORR. FDA approved June 2024 for R/R MCL ≥2
  prior lines including a BTK inhibitor.
