id: SRC-TRANSFORM-KAMDAR-2022
source_type: clinical_trial
title: "Lisocabtagene maraleucel versus standard of care with salvage chemotherapy followed by autologous stem cell transplantation as second-line treatment in patients with relapsed or refractory large B-cell lymphoma (TRANSFORM): results from an open-label, randomised phase 3 trial"
pmid: "35767214"
doi: "10.1016/S0140-6736(22)00662-6"
journal: "The Lancet"
year: 2022
authors:
  - "Kamdar M"
  - "Solomon SR"
  - "Arnason JE"
  - "Johnston PB"
  - "Glass B"
  - "Bachanova V"
  - "Ibrahimova N"
  - "Bhatt VR"
  - "Scheinberg P"
  - "Mutsaers PGNJ"
  - "Ulrickson ML"
  - "Vose JM"
  - "McSweeney PA"
  - "Maddocks KJ"
  - "Sehgal AR"
  - "Abramson JS"
trial_acronym: "TRANSFORM"
phase: 3
population: >
  Relapsed or refractory large B-cell lymphoma (LBCL — DLBCL-NOS, HGBL,
  PMBCL, FL3B) that was primary refractory (no CR to first-line R-CHOP or
  equivalent) or relapsed <12 months from completion of first-line
  anti-CD20-containing chemotherapy. ECOG PS 0-1. Transplant-intended
  patients. No prior CD19-directed CAR-T. Adequate organ function.
n_enrolled: 184
n_evaluable: 184
arms:
  experimental: >
    Liso-cel: lymphodepletion with fludarabine 30 mg/m² + cyclophosphamide
    500 mg/m² days -5 to -3, then lisocabtagene maraleucel (Breyanzi)
    100×10⁶ CAR+ T cells infused on day 0.
  control: >
    Standard of care: salvage chemotherapy (investigator choice: R-ICE, R-DHAP,
    R-DHAX, R-GDP, or R-GemOx) × 3 cycles → high-dose therapy (BEAM or similar)
    + autologous stem cell transplantation for responders (≥PR).
    Non-responders received best available therapy at investigator discretion.
primary_endpoint: "Event-free survival (EFS) — time from randomisation to earliest of treatment failure, disease progression or relapse, start of new anti-lymphoma treatment, or death"
primary_result:
  efs_hr: "0.35 (95% CI 0.23-0.53; p<0.0001)"
  efs_liso_cel_median_months: "10.1"
  efs_soc_median_months: "2.3"
  orr_liso_cel: "86.2% (89/103)"
  orr_soc: "48.3% (43/89)"
  cr_rate_liso_cel: "73.6%"
  cr_rate_soc: "43.8%"
secondary_results:
  pfs_hr: "0.40 (95% CI 0.26-0.61)"
  os_note: >
    OS trend favourable for liso-cel but substantially confounded by crossover
    (41% of SoC failures crossed to liso-cel); OS difference not statistically
    significant in primary analysis. Long-term follow-up (Abramson et al., Blood
    2023; 2-year update) confirms durable remissions in liso-cel arm:
    2-year EFS 41.3% vs 23.4%.
  safety_crs: "Any-grade CRS 49% (liso-cel); Grade ≥3 CRS 1% — favourable vs axi-cel (ZUMA-7: G≥3 CRS 6%)"
  safety_icans: "Any-grade ICANS 12%; Grade ≥3 ICANS 4% — substantially lower than axi-cel (ZUMA-7: G≥3 ICANS 21%)"
regulatory:
  fda_approval: >
    June 24, 2022 — FDA approval expanded liso-cel (Breyanzi) to adults with
    relapsed or refractory LBCL that progressed within 12 months after first-line
    chemoimmunotherapy. Approval was based on TRANSFORM (primary refractory/early
    relapse) and PILOT cohort (transplant-ineligible patients).
  nccn_category: "1 (NCCN B-Cell Lymphomas 2025: liso-cel preferred Category 1 for 2L primary-refractory or early-relapse LBCL; alongside axi-cel [ZUMA-7])"
  ema_approval: "Not approved in EU as of 2025 for 2L indication specifically; under evaluation"
access_level: public
hosting_mode: referenced
license:
  name: "Elsevier The Lancet standard"
  spdx_id: null
relates_to_diseases:
