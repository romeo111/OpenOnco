notes: >
  Phase 3 RCT (NCT03575351): liso-cel vs standard of care (salvage chemo →
  autoSCT if eligible) in 2L transplant-intended primary-refractory or
  early-relapse LBCL (n=184). Primary endpoint: event-free survival (EFS).
  Liso-cel superior: median EFS 10.1 mo vs 2.3 mo (HR 0.35; 95% CI 0.23–0.53;
  p<0.0001). Interim analysis; data cutoff March 8, 2021; median follow-up
  6.2 months. Lancet 2022;399(10343):2294-2308.
  Basis for FDA approval of liso-cel in 2L r/r LBCL (June 2022).
