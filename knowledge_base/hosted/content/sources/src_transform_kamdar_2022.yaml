last_verified: "2026-05-04"
notes: >
  TRANSFORM: phase 3 randomized trial establishing liso-cel superiority over
  salvage chemo + autoSCT for 2L primary-refractory or early-relapse LBCL.

  Key clinical comparisons vs axi-cel (ZUMA-7):
  - Both trials show CAR-T 2L superiority over salvage chemo + autoSCT.
  - EFS HR: TRANSFORM 0.35 vs ZUMA-7 0.24 — not directly comparable (different populations).
  - Safety: liso-cel substantially safer (CRS G≥3 1% vs 6%; ICANS G≥3 4% vs 21%).
  - ORR: comparable (~86% liso-cel vs ~83% axi-cel).
  - Both NCCN Category 1; product choice based on patient toxicity profile and centre access.

  PILOT cohort (Sehgal et al., Blood 2023): liso-cel in transplant-ineligible 2L LBCL
  patients (elderly/frail excluded from TRANSFORM primary analysis) — ORR 80%, CR 54%;
  supports liso-cel for "2L transplant-ineligible" as well (separate indication pending).

  BELINDA (tisa-cel 2L): failed to demonstrate superiority over SoC (EFS HR 1.07);
  tisa-cel is NOT used as 2L DLBCL standard.

  Class-label FDA warning (November 2024): secondary T-cell malignancies (including
  fatal CAR-T-cell lymphoma) reported across all CAR-T products; boxed warning added.
  Risk is rare (<0.1%) but requires informed consent documentation.

  Ukraine context: liso-cel (Breyanzi, Bristol Myers Squibb) not registered in Ukraine.
  International referral to accredited CAR-T centre required (JACIE/FACT certified).
  Estimated all-in cost USD 350-500K. For patients unable to access CAR-T:
  salvage chemo (R-ICE, R-DHAP, R-GDP) + autoSCT remains standard fallback (CORAL).
corpus_role: pivotal_phase3
