notes: >
  TRIBE2 phase-3 (N=679): sequential FOLFOXIRI+bev then FOLFIRI+bev vs
  FOLFIRI+bev then FOLFOX+bev as 1L + 2L strategy in mCRC.
  Primary endpoint PFS2 (time to second progression): 19.2 vs 16.4 mo
  (HR 0.74, p=0.0005). mOS 27.6 vs 22.6 mo (HR 0.82, p=0.046).
  Confirms FOLFOXIRI+bev superiority across molecular subgroups including
  RAS-mutant and RAS/BRAF-WT. BRAF V600E sub-group showed numerical
  benefit. Supports FOLFOXIRI+bev as preferred 1L in fit patients
  (ECOG 0-1, age <75, no prior chemotherapy).
