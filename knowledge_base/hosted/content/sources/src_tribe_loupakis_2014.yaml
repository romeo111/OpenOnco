notes: >
  TRIBE phase-3 (N=508): FOLFOXIRI + bevacizumab vs FOLFIRI + bevacizumab
  1L mCRC. mPFS 12.1 vs 9.7 mo (HR 0.75, p=0.006); mOS 29.8 vs 25.8 mo
  (HR 0.80, p=0.030). Higher R0 resection rate in FOLFOXIRI arm (15% vs 12%).
  More grade 3-4 toxicity (neutropenia 50% vs 28%; diarrhea 19% vs 11%).
  ECOG 0-1 required. Established triplet + bevacizumab as a 1L option for
  fit patients, especially those with high tumor burden or conversion-to-surgery
  intent. Confirms higher response rate beneficial for liver-limited disease.
