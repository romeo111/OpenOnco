id: SRC-TRIGO-2020
title: "Lurbinectedin as second-line treatment for patients with small-cell lung cancer: a single-arm, open-label, phase 2 basket trial"
type: trial_publication
hosting_mode: referenced

citation:
  authors: "Trigo J, Subbiah V, Besse B, et al."
  title: "Lurbinectedin as second-line treatment for patients with small-cell lung cancer: a single-arm, open-label, phase 2 basket trial"
  journal: "Lancet Oncology"
  year: 2020
  volume: "21"
  issue: "5"
  pages: "645-654"
  doi: "10.1016/S1470-2045(20)30068-1"
  pmid: "32534626"

study_type: phase_2_basket_trial
disease_context: "Small-cell lung cancer (SCLC), relapsed/refractory after platinum-based 1L"
intervention: "Lurbinectedin 3.2 mg/m² IV q3w monotherapy"
control: none
primary_endpoint: "Overall response rate (ORR) by investigator assessment (RECIST 1.1)"
key_results:
- "SCLC cohort n=105; ORR 35.2% (95% CI 26.2–45.2%)"
- "Platinum-sensitive (CTFI ≥90 days, n=60): ORR 45.0%, mDOR 6.2 mo, mOS 11.9 mo"
- "Platinum-resistant (CTFI <90 days, n=45): ORR 22.2%, mDOR 4.7 mo, mOS 5.0 mo"
- "Grade 3-4 neutropenia 46.4%; febrile neutropenia 5%; reversible transaminitis common (CYP3A4)"
- "Basis for FDA accelerated approval of lurbinectedin for R/R SCLC (June 2020)"

fda_approval_basis: true
approval_year: 2020
approval_indication: "R/R SCLC after platinum-based 1L (accelerated approval on ORR/DOR; OS confirmatory trial ATLANTIS failed primary endpoint HR 0.97)"

license_classification: open_access_article
source_quality: high
last_verified: "2026-05-04"
notes: >
  FDA accelerated approval basis for lurbinectedin (Zepzelca) in R/R SCLC.
  ATLANTIS phase III (lurbinectedin+doxorubicin vs CAV/topotecan) did NOT
  meet OS primary endpoint (mOS 8.6 vs 7.6 mo, HR 0.97) — full approval
  conversion pending updated confirmatory trial. Monotherapy use rests on
  this basket trial.
source_type: trial_publication
