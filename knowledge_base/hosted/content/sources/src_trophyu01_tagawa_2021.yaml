id: SRC-TROPHYU01-TAGAWA-2021
source_type: clinical_trial_report
citation: >
  Tagawa ST, Balar AV, Petrylak DP, et al. TROPHY-U-01: A Randomized Phase II Cohort 1
  Study of Sacituzumab Govitecan in Patients with Metastatic Urothelial Carcinoma
  Progressing After Platinum-Based Chemotherapy and Checkpoint Inhibitors.
  J Clin Oncol. 2021;39(22):2474–2485.
doi: "10.1200/JCO.21.00464"
trial_name: "TROPHY-U-01 (Cohort 1)"
trial_registry_id: NCT03547973
phase: "2 (single-arm)"
year: 2021
journal: "Journal of Clinical Oncology"

population: >
  Patients with locally advanced or metastatic urothelial carcinoma (UC) who
  progressed after platinum-based chemotherapy AND prior anti-PD-(L)1 therapy.
  N=113 (Cohort 1).

intervention: "Sacituzumab govitecan 10 mg/kg IV days 1, 8 of 21-day cycle"
comparator: "Single-arm; no comparator"

primary_endpoints:
  - "Objective response rate (ORR) by independent central review (RECIST 1.1)"

key_results:
  orr: "27.7% (31/113)"
  median_duration_of_response: "7.2 months"
  median_os: "10.9 months"
  median_pfs: "5.4 months"
  dcr: "59% (complete + partial response + stable disease)"

regulatory_impact: >
  FDA accelerated approval: April 13, 2021 (post-platinum + post-PD-1/L1 UC).
  Converted to regular (full) FDA approval: January 2023 (based on confirmatory
  data from TROPHY-U-01 cohort and updated analysis).
  EMA approved 2021.

nccn_category_reference: "NCCN UC 2025: Category 2A for R/R UC post-platinum+ICI"

hosting_status: referenced
license: "Open access (JCO)"

last_reviewed: "2026-05-04"
review_status: pending_clinical_signoff
reviewer_signoffs: 0
drafted_by: claude_extraction
notes: >
  Workstream ET 2026-05-04. TROPHY-U-01 Cohort 1 — primary publication supporting
  sacituzumab govitecan FDA approval for metastatic UC. Cohort 2 (post-EV) also
  showed activity (ORR ~28%) but Cohort 1 is the basis for the FDA label.
  Two-reviewer clinical signoff required per CHARTER §6.1.
