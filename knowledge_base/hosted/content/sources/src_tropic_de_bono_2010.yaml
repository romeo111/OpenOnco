id: SRC-TROPIC-DE-BONO-2010
title: >
  Prednisone plus cabazitaxel or mitoxantrone for metastatic castration-resistant prostate cancer
  progressing after docetaxel treatment: a randomised open-label trial
type: clinical_trial
hosting: referenced

citation:
  authors: "de Bono JS, Oudard S, Ozguroglu M, Hansen S, Machiels JP, Kocak I, et al."
  title: >
    Prednisone plus cabazitaxel or mitoxantrone for metastatic castration-resistant prostate cancer
    progressing after docetaxel treatment: a randomised open-label trial
  journal: "Lancet"
  year: 2010
  volume: 376
  issue: 9747
  pages: "1147-1154"
  doi: "10.1016/S0140-6736(10)61389-X"
  pmid: "21113436"

study_design:
  type: RCT
  phase: 3
  n: 755
  population: "mCRPC progressing after docetaxel (pre-abiraterone/enzalutamide era)"
  intervention: "Cabazitaxel 25 mg/m² q21d + prednisone 10 mg/day"
  comparator: "Mitoxantrone 12 mg/m² q21d + prednisone 10 mg/day"
  primary_endpoint: "Overall survival"

key_results:
  os_hr: 0.70
  os_cabazitaxel_months: 15.1
  os_mitoxantrone_months: 12.7
  p_value: "<0.0001"
  pfs_hr: 0.74
  psa_response_cabazitaxel: "39.2%"
  psa_response_mitoxantrone: "17.8%"
  grade34_neutropenia_cabazitaxel: "82%"
  febile_neutropenia: "7.5%"

dose_notes: >
  PROSELICA (Eisenberger 2017): cabazitaxel 20 mg/m² vs 25 mg/m² — non-inferior OS
  (13.4 vs 14.5 months; HR 1.024) with lower Grade 3/4 hematologic toxicity.
  NCCN recommends 20 mg/m² as an acceptable alternative with better tolerability.

clinical_significance: >
  TROPIC established cabazitaxel as standard post-docetaxel therapy in mCRPC, providing
  a survival benefit over mitoxantrone. FDA approved June 2010. However, CARD (2019) later
  showed cabazitaxel superiority over second ARPI in the modern ARPI-pretreated setting.
  TROPIC dose (25 mg/m²) associated with significant febrile neutropenia; G-CSF prophylaxis
  and PROSELICA 20 mg/m² alternative now guide current practice.

nccn_category: "1"
evidence_grade: high

