key_findings: >
  Datopotamab deruxtecan (Dato-DXd; TROP2 ADC) vs physician's choice chemotherapy
  in HR+/HER2-negative metastatic breast cancer post-CDK4/6i and ≥1 endocrine agent.
  mPFS 6.9 vs 4.9 months (HR 0.63; p<0.001). ORR 36.4% vs 22.9%.
  No significant OS benefit at interim analysis. Interstitial lung disease (ILD) in
  10.5% (Grade 3+ 2.5%) — requires monitoring. FDA approved January 2025 for HR+/HER2-
  low/ultralow metastatic breast cancer post-endocrine therapy.
