key_findings: >
  Dato-DXd vs chemotherapy in previously treated inoperable/metastatic TNBC.
  mPFS 6.9 vs 4.9 months (HR 0.63). ORR 36.4% vs 22.9%. Trial ongoing for OS.
  Dato-DXd is being evaluated in TNBC as part of TROP2-ADC platform;
  FDA approval for TNBC pending full data maturation (HR+/HER2- approval January 2025
  was from TROPION-Breast01 with different patient population).
