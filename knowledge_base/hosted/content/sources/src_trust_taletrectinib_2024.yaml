  title: "Taletrectinib in ROS1-rearranged non-small cell lung cancer: TRUST-I and TRUST-II phase 2 studies"
  authors: "Shen L et al. (TRUST-I); Zhou C et al. (TRUST-II)"
  journal: "Journal of Clinical Oncology / Annals of Oncology"  # VERIFICATION NEEDED: exact journal/issue
