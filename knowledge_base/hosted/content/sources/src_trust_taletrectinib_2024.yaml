  primary_endpoint: "Objective response rate (ORR) by blinded independent central review (BICR)"

key_results:
  treatment_naive_orr_pct: 72  # ~72-91% across cohorts; TRUST-II global ~72%; TRUST-I China ~91%
  post_crizotinib_orr_pct: 55  # approximate; VERIFICATION NEEDED
  intracranial_orr_pct: ~80  # high intracranial activity; VERIFICATION NEEDED
  median_dor_months: ~15  # approximate from TRUST-I; VERIFICATION NEEDED
  notes: >
    TRUST-I (NCT04666748; China; treatment-naive): ORR ~91%; mDOR ~15.2 months.
    TRUST-II (NCT04919811; global; treatment-naive): ORR ~72%; mDOR maturing.
    Both cohorts: high intracranial ORR (~75-85%) in patients with measurable
    brain metastases. Active against ROS1 G2032R resistance mutation (crizotinib
    primary resistance mutation). FDA accelerated approval based on pooled TRUST-I
    + TRUST-II data, approximately 2024. NCCN NSCLC 2025: Category 1 preferred.
    CAUTION: Exact citation details (journal, DOI, PMID, publication date) require
    verification — extracted from secondary sources; primary publication details
    not directly confirmed.

