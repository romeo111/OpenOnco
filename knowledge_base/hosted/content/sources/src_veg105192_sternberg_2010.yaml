notes: >
  VEG105192 phase 3 (NCT00334282): pazopanib 800 mg PO daily vs placebo in
  locally advanced or metastatic clear-cell renal cell carcinoma; n=435
  (233 treatment-naive, 202 cytokine-pretreated), 2:1 randomisation.
  Primary endpoint PFS. mPFS 9.2 vs 4.2 mo overall (HR 0.46; 95% CI
  0.34-0.62; p<0.0001); treatment-naive subset 11.1 vs 2.8 mo; cytokine
  pretreated subset 7.4 vs 4.2 mo. ORR 30% vs 3%. Pivotal trial supporting
  FDA approval of pazopanib for advanced RCC (October 2009). NCCN category
  1 for first-line and subsequent-line therapy of advanced clear-cell RCC.
