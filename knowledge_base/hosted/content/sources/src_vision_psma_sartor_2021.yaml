notes: >
  VISION phase 3 (NCT03511664): [177Lu]Lu-PSMA-617 + BSC vs BSC alone in mCRPC
  with PSMA-PET-positive disease (n=831); required prior taxane + ARPI.
  Imaging-based PFS 8.7 vs 3.4 mo (HR 0.40, p<0.001); mOS 15.3 vs 11.3 mo
  (HR 0.62, p<0.001); PSA50 response 46% vs 7%. Established Lu-PSMA-617 as
  NCCN category 1 post-taxane + ARPI mCRPC. Eligibility: PSMA-PET/CT required
  (all sites PSMA-positive; no sites PSMA-negative with metastases). FDA approved
  March 2022 as Pluvicto. Note: this is distinct from SRC-VISION-PAIK-2020
  (tepotinib NSCLC; same trial name, different disease).
