id: SUP-ANTIEMETIC-PREMED
intervention_type: premedication
name: "Antiemetic premedication for moderately emetogenic chemotherapy"
name_ua: "Антиеметична премедикація"

standard_intervention:
  drug_id: DRUG-ONDANSETRON
  dose: "8 mg IV"
  schedule: "30 minutes before chemotherapy; then 8 mg PO q8h × 24-48h"
  notes: "Add dexamethasone 8-12 mg IV for higher emetogenicity"

triggers:
  relevant_regimens:
    - REG-BR-STANDARD

rationale: >
  Bendamustine is moderately emetogenic; standard 5-HT3 antagonist
  prevents acute and delayed nausea/vomiting.

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
