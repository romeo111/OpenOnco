id: SUP-GCSF-NEUTROPENIA
intervention_type: prophylaxis
name: "G-CSF support for neutropenia"
name_ua: "Підтримка G-CSF при нейтропенії"

standard_intervention:
  drug_id: DRUG-FILGRASTIM
  dose: "5 mcg/kg SC daily"
  schedule: "Start 24-72h after chemotherapy; continue until ANC > 1500/µL post-nadir"

triggers:
  relevant_regimens:
    - REG-BR-STANDARD
  clinical_condition: "Secondary prophylaxis after febrile neutropenia, OR primary prophylaxis if patient age >65 with comorbidities"

rationale: >
  BR primary FN risk is moderate (~10-20%) and increases with age and
  comorbidities. G-CSF reduces nadir duration and neutropenic complications.

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
