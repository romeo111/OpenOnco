id: SUP-HBV-PROPHYLAXIS
intervention_type: prophylaxis
name: "HBV reactivation prophylaxis with entecavir"
name_ua: "Профілактика реактивації HBV ентекавіром"

standard_intervention:
  drug_id: DRUG-ENTECAVIR
  dose: "0.5 mg PO daily"
  schedule: "Start before first anti-CD20 dose; continue ≥12 months after completing immunosuppression"
  notes: "Monitor HBV DNA quarterly during prophylaxis"

alternatives:
  - drug_id: DRUG-ENTECAVIR
    dose: "1 mg PO daily"
    schedule: "Same — increased dose only if lamivudine-experienced"

triggers:
  relevant_diseases: [DIS-HCV-MZL]
  clinical_condition: "HBsAg+ OR anti-HBc+ patient receiving anti-CD20 monoclonal antibody"

rationale: >
  Anti-CD20 therapy (rituximab, obinutuzumab) carries significant HBV
  reactivation risk in HBsAg+ patients (up to 50%) and anti-HBc+ patients
  (5-10% occult HBV reactivation). Prophylaxis with entecavir reduces
  reactivation to <1%.

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-EASL-HCV-2023

last_reviewed: "2026-04-25"
