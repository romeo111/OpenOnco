id: SUP-IVIG-HYPOGAMMA
intervention_type: replacement_therapy
name: "IVIG replacement for hypogammaglobulinemia"
name_ua: "IVIG замісна терапія при гіпогаммаглобулінемії"

standard_intervention:
  drug_id: null  # IVIG = pooled human immunoglobulin, not a single DRUG entity
  dose: "0.4 g/kg IV every 3-4 weeks (target IgG trough >500 mg/dL)"
  schedule: "Start when IgG <400 mg/dL with infection history OR <300 regardless. Continue during chemo + 6-12 months post; reassess IgG q3 mo"
  notes: "SCIG (subcutaneous, weekly) is alternative when venous access poor or for outpatient convenience. Premedicate with acetaminophen + diphenhydramine to reduce infusion reactions."

triggers:
  relevant_regimens:
    - REG-CHOEP
    - REG-CHP-BV
  clinical_condition: "Symptomatic hypogammaglobulinemia (IgG <400-600 mg/dL) with recurrent bacterial infections — particularly common in AITL (paraneoplastic) and post-anti-CD20 therapy"

rationale: >
  Hypogammaglobulinemia is paraneoplastic in AITL and treatment-related
  after anti-CD20 / anti-CD30 therapy. IgG replacement reduces serious
  bacterial infections (sinopulmonary primarily) — RCT evidence in
  CLL/MM extrapolated to T-cell with hypogamma + infection burden.

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
