id: SUP-PJP-PROPHYLAXIS
intervention_type: prophylaxis
name: "Pneumocystis jirovecii prophylaxis"
name_ua: "Профілактика пневмоцистної пневмонії"

standard_intervention:
  drug_id: DRUG-TMP-SMX
  dose: "160/800 mg PO 3x/week (Mon/Wed/Fri)"
  schedule: "Start with first cycle of chemoimmunotherapy; continue ≥6 months after last anti-CD20 dose"
  notes: "Alternative: dapsone 100 mg PO daily if sulfa allergy (verify G6PD status first)"

triggers:
  relevant_regimens:
    - REG-BR-STANDARD
  clinical_condition: "Sustained immunosuppression from rituximab + chemotherapy"

rationale: >
  Anti-CD20 therapy combined with cytotoxic chemotherapy substantially
  prolongs B-cell depletion and increases PJP risk for months after
  completion of treatment.

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
