id: SUP-TLS-PROPHYLAXIS
intervention_type: prophylaxis
name: "Tumor lysis syndrome prophylaxis"
name_ua: "Профілактика синдрому лізису пухлини"

standard_intervention:
  drug_id: DRUG-ALLOPURINOL
  dose: "300 mg PO daily"
  schedule: "Start 24-48h before chemotherapy; continue 5-7 days"
  notes: "Plus IV hydration 2-3 L/m²/day"

triggers:
  relevant_regimens:
    - REG-BR-STANDARD
  clinical_condition: "High tumor burden: bulky disease (>=7 cm), elevated LDH, or rapid clinical progression"

rationale: >
  TLS risk is moderate-to-high in bulky indolent lymphoma starting
  cytoreductive therapy. Prophylaxis with allopurinol + hydration
  reduces hyperuricemia and downstream renal injury.

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
