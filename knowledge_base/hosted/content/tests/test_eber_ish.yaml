id: TEST-EBER-ISH
names:
  preferred: "EBER in-situ hybridization (EBV-encoded RNA on tissue)"
  ukrainian: "EBER in-situ гібридизація (EBV-кодована РНК на тканині)"
  english: "EBER ISH"
  synonyms: ["EBER", "EBV ISH", "EBV-encoded RNA in situ"]
loinc_codes: []
category: pathology
purpose: "Виявляє EBV у пухлинній тканині (gold standard). Mandatory у workup AITL (мікрооточення часто EBV+ B-клітини), endemic Burkitt, NK/T nasal-type, EBV+ DLBCL of elderly, post-transplant LPD. Підтверджує EBV-етіологію + flag для surveillance вторинної EBV-driven B-клітинної лімфоми."
specimen: "FFPE tumor tissue (paraffin block)"
turnaround_time: "3-5 days"
priority_class: standard
availability_ukraine: {state_funded: false, typical_availability: "Reference path-labs only (LISOD, ОХМАТДИТ, regional cancer centers зі IHC capability)"}
sources: [SRC-NCCN-BCELL-2025]
notes: >
  Differs from serum EBV-DNA — EBER-ISH locates EBV WITHIN tumor cells
  (tissue diagnosis), serum EBV-DNA quantifies systemic viral load
  (surveillance + reactivation watch). Both used in AITL: EBER-ISH at
  diagnosis on lymph node biopsy; serum EBV-DNA periodic during therapy.
