id: TEST-FLOW-CYTOMETRY
names:
  preferred: "Flow Cytometry (Immunophenotyping)"
  ukrainian: "Імунофенотипування методом проточної цитометрії"
  english: "Flow Cytometry"
  synonyms: ["Immunophenotyping", "Flow"]
loinc_codes: ["48676-1"]
category: histology
purpose: "Immunophenotypic characterization of leukocytes — discriminates lymphoid vs myeloid lineage, B vs T vs NK, mature vs immature, monoclonal vs reactive. Mandatory у acute leukemia + lymphoma + MDS + MPN workup."
specimen: "Peripheral blood, bone marrow, lymph node fresh tissue, body fluids"
turnaround_time: "2-5 days"
priority_class: critical
availability_ukraine: {state_funded: true, typical_availability: "Major hematology centers"}
sources: [SRC-NCCN-AML-2025, SRC-NCCN-BCELL-2025, SRC-EHA-WORKUP-2024]
notes: "STUB. Disease-specific panels: B-cell (CD5, CD10, CD19, CD20, CD23, surface light chains); T-cell (CD2, CD3, CD4, CD5, CD7, CD8); AML (CD13, CD33, CD34, CD117, MPO, HLA-DR)."
