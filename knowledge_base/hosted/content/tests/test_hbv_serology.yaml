id: TEST-HBV-SEROLOGY
names:
  preferred: "Hepatitis B Serology Panel"
  ukrainian: "Серологія HBV: HBsAg, anti-HBc, anti-HBs"
  english: "Hepatitis B Serology Panel (HBsAg, anti-HBc total, anti-HBs)"
loinc_codes: ["5196-1", "16933-4", "10900-9"]
category: lab
purpose: "Mandatory before any anti-CD20 therapy or rituximab-containing regimen — identify HBV reactivation risk."
specimen: "Serum"
turnaround_time: "1-3 days"
priority_class: critical

availability_ukraine:
  state_funded: true
  typical_availability: "Available in major centers and certified labs"

sources:
  - SRC-NCCN-BCELL-2025
notes: >
  HBsAg+ or anti-HBc+ → mandatory antiviral prophylaxis before
  starting anti-CD20 (see SUP-HBV-PROPHYLAXIS).
