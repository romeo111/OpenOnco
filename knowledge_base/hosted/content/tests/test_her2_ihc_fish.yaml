notes: >
  IHC 0/1+ → HER2 negative; 3+ → HER2 positive; 2+ → reflex FISH for
  amplification ratio (≥2.0 → positive). Modern ASCO/CAP 2023 update
  introduces HER2-low (IHC 1+ or 2+/FISH-) category for T-DXd
  eligibility — distinct from HER2-positive.
