id: TEST-KARYOTYPE
names:
  preferred: "Conventional Cytogenetics (Karyotype)"
  ukrainian: "Класична цитогенетика (каріотип)"
  english: "Karyotype"
  synonyms: ["Cytogenetic analysis", "G-banding"]
loinc_codes: ["29770-2"]
category: genomic
purpose: "Detect chromosomal aberrations: t(9;22) CML, t(15;17) APL, t(8;14) Burkitt, complex karyotype (poor prognosis у MDS/AML/MM). Mandatory у acute leukemia + MDS + MM workup."
specimen: "Bone marrow aspirate (preferred) or peripheral blood (if blasts)"
turnaround_time: "7-14 days"
priority_class: critical
availability_ukraine: {state_funded: true, typical_availability: "Major academic centers only"}
sources: [SRC-NCCN-AML-2025, SRC-NCCN-MM-2025]
notes: "STUB. Failure of metaphase culture ~10% — FISH backup."
