id: TEST-LN-EXCISIONAL-BIOPSY
names:
  preferred: "Excisional Lymph Node Biopsy"
  ukrainian: "Ексцизійна біопсія лімфатичного вузла"
  english: "Excisional LN Biopsy"
  synonyms: ["LN excision"]
loinc_codes: ["44264-0"]
category: histology
purpose: "Preferred biopsy для будь-якого suspect lymphoma — preserves nodal architecture (critical для subtyping per WHO Classification). Provides material для histology + IHC + flow + cytogenetics + molecular."
specimen: "Whole lymph node from largest accessible non-inguinal site (preferred axillary > cervical > inguinal)"
turnaround_time: "Procedure same day; histology+IHC 5-10 days"
priority_class: critical
availability_ukraine: {state_funded: true, typical_availability: "Major centers (surgical)"}
sources: [SRC-NCCN-BCELL-2025, SRC-ESMO-MZL-2024]
notes: "STUB. Inguinal nodes — gorshe (often reactive); avoid якщо є alternatives. Send fresh + formalin для both flow and histology."
