id: TEST-NGS-LYMPHOID-PANEL
names:
  preferred: "NGS Lymphoid Panel"
  ukrainian: "NGS-панель лімфоїдних мутацій"
  english: "Lymphoid NGS Panel"
loinc_codes: []
category: genomic
purpose: "Targeted NGS for: TP53, ATM, BIRC3 (CLL); MYD88 L265P (Waldenström + activated B-cell DLBCL); CXCR4 (Waldenström response to ibrutinib); BTK / PLCG2 (acquired ibrutinib resistance); IGHV mutational status (CLL prognostic). Optional у MZL workup; mandatory CLL/SLL prognostic."
specimen: "Peripheral blood or bone marrow"
turnaround_time: "10-21 days"
priority_class: desired
availability_ukraine: {state_funded: false, typical_cost_uah: 15000.0, typical_availability: "Limited"}
sources: [SRC-NCCN-BCELL-2025, SRC-EHA-WORKUP-2024]
notes: "STUB. Не universal у basic lymphoma workup; додається при CLL/SLL diagnosis для prognostic + при relapse / Waldenström / DLBCL targeted therapy planning."
