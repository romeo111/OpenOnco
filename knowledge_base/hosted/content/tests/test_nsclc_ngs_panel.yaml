id: TEST-NSCLC-NGS-PANEL
names:
  preferred: "NSCLC comprehensive NGS panel (DNA + RNA fusion)"
  ukrainian: "NSCLC комплексна NGS панель (ДНК + РНК-фузії)"
test_type: molecular_somatic
priority_class: critical
specimen: "FFPE tumor block (minimum 200 cells; preferred ≥40% tumor content) OR plasma for ctDNA"
turnaround_hours_typical: 336
measures:
  - BIO-EGFR-MUTATION
  - BIO-ALK-FUSION
  - BIO-ROS1-FUSION
  - BIO-KRAS-G12C
  - BIO-BRAF-V600E
lab_availability_ua:
  - lab: "CSD Lab"
    product_code: "M081"
    product_name: "MyAction RNA-панель для раку легень"
    url: "https://www.csdlab.ua/analyzes/molekulyarno-genetichni-doslidzhennya-onkologichni"
    confirmation: "product_code_verified"
    coverage_notes: >
      RNA fusions only: ALK, ROS1, RET, MET ex14 skipping. Does NOT cover DNA
      point mutations (EGFR, KRAS G12C, BRAF V600E, HER2, NRG1) — order M065
      FoundationOne Liquid CDx (324-gene ctDNA) for full NSCLC coverage, or a
      separate DNA panel.
    last_verified: "2026-05-01"
  - lab: "CSD Lab"
    product_code: "M065"
    product_name: "FoundationOne Liquid CDx (324 genes, ctDNA)"
    url: "https://www.csdlab.ua/analyzes/molekulyarno-genetichni-doslidzhennya-onkologichni"
    confirmation: "product_code_verified"
    coverage_notes: >
      Full DNA + RNA fusion coverage of all NSCLC actionable genes. Use when
      tissue insufficient or when a comprehensive panel is preferred over
      M081. Cost ~139,000 UAH.
    last_verified: "2026-05-01"
sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed: null
notes: >
  Universal at advanced NSCLC diagnosis. Panel must cover EGFR (incl
  T790M), ALK, ROS1, KRAS G12C, BRAF V600E, MET ex14, RET, NTRK 1/2/3,
  HER2, NRG1. RNA-based fusion calls preferred for ALK/ROS1/RET/NTRK.
  ctDNA acceptable when tissue inadequate; tissue more sensitive.
  UA-availability concentrated in private labs + academic centers;
  funding pathway barrier.
