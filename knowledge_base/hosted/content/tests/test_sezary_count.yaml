id: TEST-SEZARY-COUNT
names:
  preferred: "Sézary cell count (flow cytometry + morphology, peripheral blood)"
  ukrainian: "Підрахунок клітин Сезарі (проточна цитометрія + морфологія, периферична кров)"
  english: "Sézary cell count"
  synonyms: ["Sezary count", "Sezary flow", "B-classification"]
loinc_codes: []
category: lab
purpose: "Визначає B-класифікацію (B0/B1/B2) у TNMB-стадіюванні MF/Sézary. B2 ≥1000 cells/μL = Sézary syndrome. Mandatory у workup усіх MF при підозрі на blood involvement (palpable LN, generalized erythroderma, advanced skin stage)."
specimen: "Peripheral blood EDTA (fresh, <24h)"
turnaround_time: "1-3 days"
priority_class: standard
availability_ukraine: {state_funded: false, typical_availability: "Reference labs зі флоу-цитометрією + досвідченим dermatopathologist (LISOD, ОХМАТДИТ, Kyiv центри)"}
sources: [SRC-NCCN-BCELL-2025]
notes: >
  Combined flow (CD3+CD4+CD7- or CD3+CD4+CD26- aberrant subset) +
  Wright-stained smear (cerebriform nuclei). Clonality confirmation
  via TCR PCR (TEST-TCR-CLONALITY) recommended when count borderline.
  B2 stage upstages to IVA1 (clinical Sézary syndrome) regardless of
  skin T-stage.
