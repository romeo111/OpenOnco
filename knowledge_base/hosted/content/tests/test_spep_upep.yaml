id: TEST-SPEP-UPEP
names:
  preferred: "Serum + Urine Protein Electrophoresis with Immunofixation"
  ukrainian: "Електрофорез білків сироватки та сечі з імунофіксацією"
  english: "SPEP / UPEP with IFE"
  synonyms: ["SPEP", "UPEP", "Protein electrophoresis"]
loinc_codes: ["1759-0", "1755-8"]
category: lab
purpose: "Detect monoclonal protein (M-spike). Mandatory: будь-який unexplained anemia + hypercalcemia + bone pain + renal failure + neuropathy. Diagnostic core MM/MGUS/Waldenström."
specimen: "Serum + 24-hour urine collection"
turnaround_time: "3-5 days (with IFE)"
priority_class: critical
availability_ukraine: {state_funded: true, typical_availability: "Major centers"}
sources: [SRC-NCCN-MM-2025, SRC-EHA-WORKUP-2024]
notes: "STUB. M-spike size + isotype з SPEP+IFE = first-step myeloma workup. Без UPEP propust у частини пацієнтів з light chain only disease."
