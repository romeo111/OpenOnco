id: TEST-TCR-CLONALITY
names:
  preferred: "T-cell receptor (TCR) clonality by PCR (gamma + beta rearrangement)"
  ukrainian: "Клональність T-клітинного рецептора (TCR) методом ПЛР (gamma + beta перебудова)"
  english: "TCR clonality"
  synonyms: ["TCR PCR", "TCR rearrangement", "BIOMED-2 T-cell"]
loinc_codes: []
category: molecular
purpose: "Підтверджує клональну T-клітинну популяцію — у MF/Sézary necessary для diagnosis (skin biopsy + blood when Sézary suspected; same clone in skin + blood = systemic involvement). Також у CTCL diagnostics ambiguous, T-cell rich diseases."
specimen: "FFPE skin biopsy (lesional) AND peripheral blood EDTA (when Sézary suspected)"
turnaround_time: "5-10 days"
priority_class: standard
availability_ukraine: {state_funded: false, typical_availability: "Reference molecular labs only (LISOD, Kyiv молекулярні центри)"}
sources: [SRC-NCCN-BCELL-2025]
notes: >
  BIOMED-2 PCR primer panel standard. Identical clone in skin + blood
  confirms systemic involvement (B2/Sézary). Negative TCR clonality в
  early-stage MF не виключає диагноз (sensitivity ~70-90% залежно
  від stage + biopsy quality). Always interpret with histology + IHC.
