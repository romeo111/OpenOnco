id: TEST-URINE-CYTOLOGY
names:
  preferred: "Voided urine cytology (Paris System)"
  ukrainian: "Цитологія сечі (Паризька система)"
  english: "Urine cytology"
loinc_codes: ["10362-2"]
category: lab
purpose: >
  Adjunct to cystoscopy for hematuria workup; sensitive for high-grade
  urothelial carcinoma and CIS, low sensitivity for low-grade tumors.
specimen: "≥30 mL voided urine, second-void preferred; three samples on consecutive days for upper-tract"
turnaround_time: "3-5 days"
priority_class: standard
