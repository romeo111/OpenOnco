id: WORKUP-SUSPECTED-ENDOMETRIAL
applicable_to:
  lineage_hints:
    - endometrial_carcinoma
    - solid_tumor_endometrial
    - uterine_cancer_suspect
  tissue_locations:
    - uterus
    - endometrium
  presentation_keywords:
    - postmenopausal_bleeding
    - abnormal_uterine_bleeding
    - intermenstrual_bleeding
    - endometrial_thickening
    - thickened_endometrium_postmenopausal
    - tamoxifen_associated_bleeding
    - lynch_screening_finding

# Pre-biopsy diagnostic + staging workup for suspected endometrial carcinoma
# per NCCN Uterine Neoplasms v1.2025 and ESMO Endometrial 2022.
required_tests:
  - TEST-TRANSVAGINAL-US                # endometrial-thickness assessment
  - TEST-ENDOMETRIAL-BIOPSY             # Pipelle first; hysteroscopy if non-dx
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT

desired_tests:
  - TEST-PELVIC-MRI                     # local staging — myometrial invasion depth
  - TEST-CECT-CAP                       # high-risk histology or clinically advanced
  - TEST-DMMR-IHC                       # reflex on biopsy — Lynch screening + treatment-relevant
  - TEST-NGS-COMPREHENSIVE              # ESMO 2022 molecular classification (POLE / MMR / p53 / NSMP)

mandatory_questions:
  - "Postmenopausal bleeding — duration, volume, prior episodes?"
  - "Tamoxifen / unopposed estrogen exposure?"
  - "Lynch syndrome family history (HNPCC-spectrum cancers in ≥2 first-degree relatives)?"
  - "Polycystic ovary syndrome / chronic anovulation history?"
  - "Obesity (BMI), diabetes, hypertension (metabolic risk-factor cluster)?"
  - "Pregnancy history / fertility-preservation desired (alters surgical plan in early-stage low-grade)?"

sources:
  - SRC-NCCN-UTERINE-2025
  - SRC-ESMO-ENDOMETRIAL-2022

last_reviewed: "2026-04-25"
notes: >
  Postmenopausal endometrial thickness >4 mm with bleeding is the
  standard threshold for biopsy. Pipelle endometrial sampling is
  ~90% sensitive; non-diagnostic samples or persistent bleeding
  require hysteroscopy with directed biopsy. ESMO 2022 / NCCN 2025
  mandate molecular classification (POLE / MMR / p53 / NSMP) on the
  diagnostic specimen — this drives adjuvant therapy stratification
  and identifies Lynch-syndrome candidates for germline testing.
