id: WORKUP-SUSPECTED-HCC
applicable_to:
  lineage_hints:
    - hepatocellular_carcinoma
    - liver_cancer
    - cirrhosis_with_nodule
  tissue_locations:
    - liver
  presentation_keywords:
    - liver_nodule
    - cirrhosis_surveillance_finding
    - elevated_afp
    - hepatic_mass

required_tests:
  - TEST-AFP
  - TEST-CT-CHEST-ABDOMEN-PELVIS  # multi-phase CT or MRI liver protocol
  - TEST-LFT
  - TEST-CHILD-PUGH-CALCULATION
  - TEST-CBC
  - TEST-EGD-VARICES-SCREENING  # mandatory pre-atezo+bev planning
  - TEST-HBV-SEROLOGY  # existing from lymphoma vertical
  - TEST-HCV-ANTIBODY  # existing from HCV-MZL vertical

desired_tests:
  - TEST-CT-PET  # for indeterminate metastasis assessment

mandatory_questions:
  - "Etiology: HBV / HCV / alcohol / MASH / other (combination)?"
  - "Cirrhosis severity (Child-Pugh class)?"
  - "Surveillance program adherence (US ± AFP q6mo)?"
  - "Transplant eligibility (Milan / UCSF expanded criteria; age, social support, abstinence)?"

sources:
  - SRC-NCCN-HCC-2025
  - SRC-AASLD-HCC-2023

last_reviewed: "2026-04-26"
notes: >
  Diagnostic non-biopsy criteria (AASLD): cirrhotic + nodule ≥1 cm with
  characteristic imaging (LIRADS-5) + AFP >400 ng/mL → HCC by clinical
  diagnosis. Biopsy reserved for indeterminate cases or non-cirrhotic.
  Multidisciplinary tumor board review mandatory before treatment plan.
