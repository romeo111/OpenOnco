id: WORKUP-SUSPECTED-OVARIAN
applicable_to:
  lineage_hints:
    - ovarian_carcinoma
    - solid_tumor_ovarian
    - fallopian_tube_carcinoma
    - primary_peritoneal_carcinoma
    - ovarian_cancer_suspect
  tissue_locations:
    - ovary
    - fallopian_tube
    - peritoneum
    - pelvis
  presentation_keywords:
    - adnexal_mass
    - complex_adnexal_mass
    - ascites
    - abdominal_distension
    - early_satiety
    - sister_mary_joseph_nodule
    - omental_caking
    - peritoneal_carcinomatosis
    - elevated_ca125

# Pre-biopsy diagnostic + staging workup for suspected epithelial ovarian
# / fallopian-tube / primary peritoneal carcinoma
# per NCCN Ovarian v1.2025 and ESMO Ovarian 2024.
required_tests:
  - TEST-TRANSVAGINAL-US                # IOTA Simple Rules / O-RADS triage
  - TEST-CA125
  - TEST-CECT-CAP                       # peritoneal carcinomatosis + chest screen
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT

desired_tests:
  - TEST-HE4-ROMA                       # premenopausal stratification
  - TEST-PELVIC-MRI                     # ambiguous adnexal mass
  - TEST-PET-CT                         # selective; recurrence assessment
  - TEST-GERMLINE-BRCA-PANEL            # all epithelial ovarian per NCCN — order at workup
  - TEST-NGS-COMPREHENSIVE              # somatic HRD / BRCA when germline negative

mandatory_questions:
  - "Family history of ovarian / breast / pancreatic / endometrial / colorectal cancer?"
  - "Personal history of breast / endometrial / colon cancer (HBOC, Lynch)?"
  - "BRCA1/2 status — known carrier?"
  - "Parity, age at menarche / menopause, OCP use (epidemiologic risk modifiers)?"
  - "Symptom duration — bloating, early satiety, urinary urgency for >12 days/month and recent onset?"
  - "Performance status / fitness for primary cytoreductive surgery?"

sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024

last_reviewed: "2026-04-25"
notes: >
  Definitive diagnosis is typically surgical via primary cytoreductive
  surgery (or staging laparotomy with frozen section). Pre-operative
  paracentesis cytology is acceptable when bulky ascites and
  unresectable carcinomatosis make neoadjuvant chemotherapy preferable
  (image-guided omental biopsy gives higher yield than ascites alone).
  Image-guided core biopsy of an adnexal mass is generally avoided in
  presumed early-stage disease due to seeding risk. Universal germline
  BRCA testing for all epithelial ovarian cancers per NCCN 2025;
  somatic HRD testing identifies additional PARPi candidates.
