id: WORKUP-SUSPECTED-SCLC
applicable_to:
  lineage_hints:
    - small_cell_lung_carcinoma
    - solid_tumor_lung_sclc
    - sclc_suspect
  tissue_locations:
    - lung
    - mediastinal_lymph_nodes
    - hilar_lymph_nodes
  presentation_keywords:
    - central_lung_mass
    - bulky_mediastinal_adenopathy
    - svc_syndrome
    - paraneoplastic_siadh
    - paraneoplastic_lems
    - paraneoplastic_cushing
    - rapid_growth_lung_mass
    - hyponatremia_with_lung_finding

# Pre-biopsy diagnostic + staging workup for suspected SCLC
# per NCCN SCLC v3.2025 and ESMO SCLC 2021.
required_tests:
  - TEST-CECT-CAP
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH                            # prognostic in SCLC
  - TEST-BRONCHOSCOPY-WITH-EBUS         # central tumor → diagnostic yield highest
  - TEST-BRAIN-MRI-CONTRAST             # mandatory at staging — high baseline brain-met rate
  - TEST-PET-CT                         # limited-stage classification

desired_tests:
  - TEST-NGS-COMPREHENSIVE              # selective; emerging biomarkers (DLL3, ASCL1)

mandatory_questions:
  - "Smoking history — pack-years (SCLC almost exclusively in smokers)?"
  - "Symptoms of SVC syndrome (facial swelling, headache, dilated chest veins)?"
  - "Neurologic symptoms (proximal weakness for LEMS, ataxia for paraneoplastic cerebellar)?"
  - "Hyponatremia (SIADH) — current sodium and trend?"
  - "Performance status — informs concurrent CRT vs sequential vs palliative?"

sources:
  - SRC-NCCN-SCLC-2025
  - SRC-ESMO-SCLC-2021

last_reviewed: "2026-04-25"
notes: >
  SCLC is a clinical emergency in many cases due to rapid doubling
  time, SVC syndrome, and paraneoplastic complications. Brain MRI
  is mandatory at diagnosis (not just symptomatic) — baseline
  brain-met rate ~10-15%, and prophylactic cranial irradiation
  decisions depend on it. Bronchoscopy preferred over CT-guided
  core for central tumors (typical SCLC location). Limited-stage
  vs extensive-stage definition (Veterans Administration system) is
  the primary therapeutic dichotomy and depends on PET/CT staging.
