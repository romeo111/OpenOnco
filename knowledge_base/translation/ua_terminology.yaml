# OpenOnco UA terminology — single source of truth for translation agents.
#
# Every translation agent reads this file. Agents do NOT edit it; new term
# proposals go to ``glossary_proposals.jsonl`` (per-agent), which the
# orchestrator reviews and folds back here in Phase 0 increments.
#
# Conventions
# -----------
# - ``stay_latin``: tokens that must NOT be transliterated. Rendered verbatim.
# - ``transliterate``: EN -> UA mappings the agent MUST use; case-insensitive
#   match on EN, exact UA replacement.
# - ``preserve_verbatim``: regex patterns to keep intact (dosing, %, NCT IDs,
#   gene HGVS, ESCAT/NCCN tier labels).
# - ``register``: prose-style notes — clinical UA register, third person,
#   hospital-discharge-letter tone, no patient-direct address in KB fields
#   (patient-direct lives only in patient-mode glossing).
#
# This file is loaded as plain YAML; no schema validation. Loader function
# lives at ``knowledge_base.translation.glossary.load_glossary``.

version: "2026-05-12"
status: phase0_seed

