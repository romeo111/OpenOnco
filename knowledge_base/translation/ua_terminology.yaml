# ── Patterns kept verbatim (regex, case-insensitive on EN side) ──────────
preserve_verbatim:
  # Dosing strings: 100 mg, 5 mg/kg, 60 mg/m², 2 g/day, 1.5 mg/kg/day
  - 'numeric_dose': '\b\d+(?:\.\d+)?\s*(?:mg|g|mcg|µg|kg|ml|mL|U|IU|MU)(?:/(?:m²|m\^2|kg|day|d|h|hr|wk))?\b'
  # Percentages
  - 'percent': '\b\d+(?:\.\d+)?\s*%'
  # Trial / NCT identifiers
  - 'nct': '\bNCT\d{6,8}\b'
  # PubMed IDs
  - 'pmid': '\bPMID:?\s*\d{6,9}\b'
  # OpenOnco internal IDs
  - 'oo_id': '\b(?:DIS|BIO|BMA|DRUG|IND|RF|REG|SRC|ALGO|PROC|RAD|EID)-[A-Z0-9-]+\b'
  # CIViC EID
  - 'eid': '\bEID\d{1,6}\b'
  # HGVS-style variants: p.V600E, c.123A>T, p.L858R
  - 'hgvs': '\b[pcgn]\.[A-Z][A-Za-z0-9*>=._-]+\b'
  # Cytogenetic notation: t(8;21), inv(16), del(5q)
  - 'cytogen': '\b(?:t|inv|del|dup|add|der)\(\d+(?:;\d+)?(?:[pq]\d+(?:\.\d+)?)?\)'
  # Years: 2024, (2018-2024)
  - 'year': '\b(?:19|20)\d{2}\b'

# ── Style register notes for agents ─────────────────────────────────────
register:
  tone: >
    Neutral clinical Ukrainian, hospital-discharge-letter / textbook
    register. Third person. Past tense for trial outcomes
    ("показано, що…"); present tense for guideline statements
    ("настанови рекомендують…").
  forbidden_in_kb_fields:
    - patient-direct address ("ви", "вам") — patient mode glosses these
      separately at render time
    - colloquialisms, hedging emoji, exclamation marks
    - direct treatment recommendations to a named individual — KB
      describes evidence; rule engine + render layer compose the plan
  uppercase_acronyms_keep_latin: true
  trial_names_keep_latin: true
  drug_first_mention_pattern: >
    On first mention in a long prose field, prefer "<UA name> (<EN INN>)"
    so non-UA-fluent reviewers can verify. On subsequent mentions in the
    same field, UA name alone is fine.
